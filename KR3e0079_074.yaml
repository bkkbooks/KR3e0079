body:
  text: 本草綱目卷三十目録果之二山果類三十四種梨别録鹿梨圖經棠梨綱目海紅綱目木瓜别録樝子食療榠樝圖經榅桲開寶山樝唐本查即山菴羅果開寶奈别録林檎開寶柿别録椑柿開寶君遷子拾遺柿牛奶安石榴别録橘本經柑開寶橙開寶柚日華枸櫞圖經緣即香金橘綱目枇杷别録楊梅開寶櫻桃别録山櫻桃别録銀杏日用果即白胡桃開寶榛子開寶阿月渾子拾遺櫧子拾遺鉤栗拾遺橡實唐本子即櫟槲實唐本若即槲右附方舊五十二新一百七十四本草綱目卷三十目録
