body:
  text: 本草綱目卷十一明李時珍撰金石之五鹵石類二十種附録二十七種食鹽别録中品校正志曰元在米部今移入此時珍曰併入本經大鹽釋名鹺音嗟時珍曰鹽字象器中煎鹵之形禮記鹽曰鹹鹺廣韻云天生曰鹵人造曰鹽許慎説文云鹽鹹也東方謂之斥西方謂之鹵河東謂之鹹黃帝之臣宿沙氏初煮海水為鹽本經大鹽即今解池顆鹽也别録重出食鹽今併為一方士呼鹽為海砂集解别録曰大鹽出邯鄲及河東池澤恭曰大鹽即河東印鹽也人之常食者形粗于食鹽𢎞景曰有東海鹽北海鹽南海鹽河東鹽池梁益鹽井西羌山鹽胡中樹鹽色類不同以河東者為勝東海鹽官鹽白草粒細北海鹽黃草粒粗以作魚鮓及鹹葅乃言北勝而藏􅗀必用鹽官者蜀中鹽小淡廣州鹽鹹苦不知其為療體復有優劣否藏器曰四海之內何處無之惟西南諸夷稍少人皆燒竹及木鹽當之頌曰并州末鹽乃刮鹹煎鍊者不甚佳所謂鹵鹹是也大鹽生河東池澤粗于末鹽即今解鹽也解州安邑兩池取鹽於池旁耕地沃以池水每得南風急則宿夕成鹽滿畦彼人謂之種鹽最為精好東海北海南海鹽者今滄密楚秀溫台明泉福廣瓊化諸州煮海水作之謂之澤鹽醫方謂之海鹽海邊掘坑上布竹木覆以蓬茅積沙于上每潮汐衝沙則鹵鹹淋於坑中水退則以火炬照之鹵氣衝火皆滅因取海鹵貯盤中煎之頃刻而就其煮鹽之器漢謂之牢盆今或鼓鐵為之南海人編竹為之上下周以蜃灰橫丈深尺平底置於竈背謂之鹽盤梁益鹽井者今歸州及四川諸郡皆有鹽井汲其水以煎作鹽如煮海法又濵州有土鹽煎鍊草土而成其色最粗黑不堪入藥通泰海州並有停夕刮鹹煎鹽輸官如并州末鹽之類而味更優以供給江湖極為饒衍時珍曰鹽品甚多海鹽取海鹵煎鍊而成今遼冀山東兩淮閩浙廣南所出是也井鹽取井鹵煎鍊而成今四川雲南所出是也池鹽出河東安邑西夏靈州今惟解州種之疏鹵地為畦隴而塹圍之引清水注入久則色赤待夏秋南風大起則一夜結成謂之鹽南風如南風不起則鹽失利亦忌濁水淤澱鹽脈也出海豐深州者亦引海水入池晒成并州河北所出皆鹻鹽也刮取鹻土煎鍊而成階成鳯川所出皆崖鹽也生于土崖之間狀如白礬亦名生鹽此五種皆食鹽也上供國課下濟民用海鹽井鹽鹻鹽三者出于人池鹽崖鹽二者出于天周禮云鹽人掌鹽之政令祭祀供其苦鹽散鹽賔客供其形鹽散鹽王之膳羞供飴鹽苦鹽即顆鹽也出於池其鹽為顆未鍊治其味鹹苦散鹽即末鹽出於海及井并煮鹻而成者其鹽皆散末也形鹽即印鹽或以鹽刻作虎形也或云積鹵所結其形如虎也飴鹽以飴拌成者或云生于戎地味甜而美也此外又有崖鹽生于山崖戎鹽生于土中傘子鹽生於井石鹽生於石木鹽生於樹蓬鹽生於草造化生物之妙誠難殫知也修治時珍曰凡鹽人多以礬消灰石之類雜之入藥須以水化澄去腳滓煎鍊白色乃良大鹽氣味甘鹹寒無毒別録曰食鹽鹹溫無毒多食傷肺喜咳權曰有小毒時珍曰鹹微辛寒無毒保并曰多食令人失色膚黑損筋力之才曰漏蘆為之使斆曰敝箄淡鹵烏賊骨亦淡鹵主治腸胃結熱喘逆胸中病令人吐本經傷寒寒熱吐胸中痰癖止心腹卒痛殺鬼蠱邪疰毒氣下部􅉶瘡堅肌骨别録除風邪吐下惡物殺蟲去皮膚風毒調和臟腑消宿物令人壯健藏器助水臟及霍亂心痛金瘡明目止風淚邪氣一切蟲傷瘡腫火灼瘡長肉補皮膚通大小便療疝氣滋五味大明空心揩齒吐水洗目夜見小字甄權解毒涼血潤燥定痛止癢吐一切時氣風熱痰飲關格諸病時珍發明𢎞景曰五味之中惟此不可缺西北方人食不耐鹹而多夀少病好顔色東南方人食絶欲鹹而少夀多病便是損人傷肺之效然以浸魚肉則能經久不敗以沾布帛則易致朽爛所施各有所宜也宗奭曰素問云鹹走血故東方食魚鹽之人多黑色走血之驗可知病喘嗽人及水腫者宜全禁之北狄用以淹尸取其不壞也其燒剝金銀鎔汁作藥仍須解州大鹽為佳時珍曰洪範水曰潤下作鹹素問曰水生鹹此鹽之根源也夫水周流於天地之間潤下之性無所不在其味作鹹凝結為鹽亦無所不在在人則血脈應之鹽之氣味鹹腥人之血亦鹹腥鹹走血血病無多食鹹多食則脈凝泣而變色從其類也煎鹽者用皂角收之故鹽之味微辛辛走肺鹹走腎喘嗽水腫消渴者鹽為大忌或引痰吐或泣血脈或助水邪故也然鹽為百病之主百病無不用之故服補腎藥用鹽湯者鹹歸腎引藥氣入本臟也補心藥用炒鹽者心苦虛以鹹補之也補脾藥用炒鹽者虛則補其母脾乃心之子也治積聚結核用之者鹽能軟堅也諸癰疽眼目及血病用之者鹹走血也諸風熱病用之者寒勝熱也大小便病用之者鹹能潤下也骨病齒病用之者腎主骨鹹入骨也吐藥用之者鹹引水聚也能收豆腐與此同義諸疆及蟲傷用之者取其解毒也頌曰唐栁栁州纂救三死方云元和十一年十月得霍亂上不可吐下不可利出冷汗三大斗許氣即絶何南房偉傳此方入口即吐絶氣復通一法用鹽一大匙􅘮令黃童子小便一升合和溫服少頃吐下即愈也附方舊四十二新二十七鍊鹽黑丸崔中丞鍊鹽黑丸方鹽末一升納粗瓷瓶中實築泥頭初以煻火燒漸漸加炭火勿令瓶破候赤徹鹽如水汁即去火待凝破瓶取出豉一升熬煎桃仁一兩和麩炒熟巴豆二兩去心膜紙中炒令油出須生熟得所熟即少力生又損人四物搗勻入蜜和丸梧子大每服三丸平旦時服天行時氣䜴汁及茶下心痛酒下入口便止血痢飲下初變水痢後便止鬼瘧茶飲下骨蒸蜜湯下忌久冷漿水合藥久則稍加之凡服藥後吐利勿怪吐利若多服黃連汁止之或遇殺藥人藥久不動者更服一兩丸藥後忌口二三日其藥臘月合之瓷瓶蜜封勿令泄氣一劑可救百人或在道途或在村落無藥可求但用此藥即敵大黃朴消數兩曾用有效小兒女子不可服被攪作也劉禹鍚傳信方卒中尸遁其狀腹脹急沖心或塊起或牽腰脊者是服鹽湯取吐孫真人方尸疰鬼疰下部蝕瘡炒鹽布裹坐尉之藥性論鬼擊中惡鹽一盞水二盞和服以冷水噀之即蘇救急方中惡心痛或連腰臍鹽如雞子大青布裹燒赤納酒中頓服當吐惡物愈論甄權藥性中風腹痛鹽半斤熬水乾著口中飲熱湯二斤得吐愈肘後方脫陽虛證四肢厥冷不省人事或小腹緊痛冷汗氣喘炒鹽尉臍下氣海取暖救急方心腹脹堅痛悶欲死鹽五合水一升煎服吐下即定不吐更服梅師方腹脹氣滿黑鹽酒服六銖後魏書酒肉過多脹滿不快用鹽花擦牙溫水潄下二三次即如湯沃雪也簡便方乾霍亂病上不得吐下不得利方見發明霍亂腹痛炒鹽一包尉其心腹令氣透又以一包尉其背救急方霍亂轉筋欲死氣絶腹有暖氣者以鹽填臍中災鹽上七壯即蘇方救急肝虛轉筋肝臟氣虛風冷摶于筋遍體轉筋入腹不可忍熱湯三斗入鹽半斤稍熱清之聖惠方一切腳氣鹽三升蒸熟分裹近壁以腳踏之令腳心熱又和槐白皮蒸之尤良夜夜用之食療本草腳氣疼痛每夜用鹽擦腿膝至足甲淹少時以熱湯泡洗有一人病此曾用驗救急方胸中痰飲傷寒熱病瘧疾須吐者並以鹽湯吐之外臺祕要病後脅脹天行病後兩脅脹滿熬鹽尉之外臺祕要方妊娠心痛不可忍鹽燒赤酒服一撮産寶妊婦逆生鹽摩産婦腹并塗兒足底仍急爪搔之千金方婦人陰痛青布裹鹽尉之藥性論小兒疝氣并內弔腎氣以葛袋盛鹽于户口懸之父母用手撚料盡即愈草日華子本小兒不尿安鹽於臍中以艾灸之藥性論小便不通濕紙包白鹽燒過吹少許入尿孔中立通普濟方氣淋臍痛鹽和醋服之廣利方二便不通鹽和苦酒傅臍中乾即易仍以鹽汁灌肛內并內用紙裹鹽投水中飲之家藏方漏精白濁雪白鹽一兩并築緊固齊煅一日出火毒白茯苓山藥各一兩為末棗肉和蜜丸梧子大每棗湯下三十丸蓋甘以濟鹹脾腎兩得也直指方下痢肛痛不可忍者熬鹽包坐尉之后肘方血痢不止白鹽紙包燒研調粥喫三四次即止也救急方中蠱吐血或下血如肝鹽一升苦酒一升煎化頓服得吐即愈乃支大醫方也小品方金瘡血出甚多若血冷則殺人宜炒鹽三撮酒調服之梅師方金瘡中風煎鹽令熱以匙抄􅅹却水熱瀉瘡上冷更著一日勿住取瘥大效肘后方小兒撮口鹽頭搗貼臍上灸之子母祕録病笑不休滄鹽煅赤研入河水煎沸啜之探吐熱痰數升即愈素問曰神有餘笑不休神心火也火得風則焰笑之象也一婦病此半年張子和用此方遂愈儒門事親飲酒不醉凡飲酒先食鹽一匕則后飲必倍肘后方明目堅齒去翳大利老眼海鹽以百沸湯泡散清汁于銀石器內熬取雪白鹽花新瓦器盛每早揩牙潄水以大指甲點水洗目閉坐良久乃洗面名洞視千里法極神妙方永類鈐風熱牙痛槐枝煎濃湯二碗入鹽一斤煮乾炒研日用揩牙以水洗目唐瑤經驗方齒𧈟齒動鹽半兩皂莢兩挺同燒赤研夜夜揩齒一月後並瘥其齒牢固食療本草齒齦宣露每旦噙鹽熱水含百遍五日後齒即牢千金方齒疼出血每夜鹽末厚封齗上有汁瀝盡乃臥其汁出時叩齒勿住不過十夜疼血皆止忌豬魚油菜等極驗肘后方喉中生肉綿裹筋頭拄鹽揩之日五六度孫真人方帝鍾喉風垂長半寸煆食鹽頻點之即消聖惠方風病耳鳴鹽五升蒸熱以耳枕之冷復易之肘后方耳卒疼痛方同上目中淚出鹽點目中冷水洗數次瘥范汪方目中浮翳遮睛白鹽生研少許頻點屢效小兒亦宜直指方小兒目翳或來或去漸大侵睛雪白鹽少許燈心蘸點日三五次不痛不礙屢用有效活幼口議塵物眯目以少鹽并豉置水中視之立出方孫真人酒皶赤鼻白鹽常擦之妙直指方口鼻急疳蝕爛腐臭斗子鹽白麵等分為末每以吹之普濟方面上惡瘡五色者鹽湯浸綿榻瘡上五六度即瘥藥性論體如蟲行風熱也鹽一斗水一石煎湯浴之三四次亦療一切風氣外臺祕要瘡癬痛癢初生者嚼鹽頻擦之妙千金翼手足心毒風氣毒腫鹽末椒末等分酢和傅之立瘥肘后方手足疣目鹽傅上以舌砥之不過三度瘥肘后方熱病生𧈟下部有瘡熬鹽尉之不過三次梅師方一切漏瘡故布裹鹽燒赤為末每服一錢外臺祕要膁瘡經年鹽中黑泥晒研搽之永類方蠼螋尿瘡鹽湯浸綿榻瘡上食療本草蜈蚣咬人嚼鹽塗之或鹽湯浸之妙梅師方蚯蚓咬毒形如大風眉鬢皆落惟濃煎鹽湯浸身數遍即愈浙西將軍張韶病此每夕蚯蚓鳴于體一僧用此方而安蚓畏鹽也經驗方蜂薑螫叮嚼鹽塗之千金方解黃蠅毒烏蒙山峽多小黃蠅生毒蛇鱗中囓人初無所覺漸癢為瘡勿搔但以冷水沃之擦鹽少許即不為瘡方輿勝覽毒蛇傷螫嚼鹽塗之灸三壯仍嚼鹽塗之徐伯玉方虱出怪病臨臥渾身虱出約至五升隨至血肉俱壞每宿漸多痛癢不可言狀惟喫水臥牀晝夜號哭舌尖出血不止身齒俱黑唇動鼻開但飲鹽醋湯十數日即安方夏子益竒疾解狼毒毒鹽汁飲之千金方藥箭毒氣鹽貼瘡上灸三十壯良集驗方救溺水死以大凳臥之後足放髙用鹽擦臍中待水自流出切勿倒提出水救急方潰癰作癢以鹽摩其四圍即止外科精義戎鹽本經下品釋名胡鹽别録羌鹽日華青鹽綱目秃登鹽唐本陰土鹽大明曰西畨所食者故號戎鹽羌鹽恭曰戎鹽即胡鹽也沙州名秃登鹽廓州名為陰土鹽生河岸山坂之陰土石問故名集解别録曰戎鹽生胡鹽山及西羌北地酒泉福祿城東南角北海青南海赤十月采當之曰戎鹽味苦臭是海潮水澆山石經久鹽凝著石取之北海者青南海者赤𢎞景曰史書言北地鹽有九種白鹽食鹽常食者黑鹽主腹脹氣滿胡鹽主耳聾目痛柔鹽主馬脊瘡又有赤鹽駁鹽臭鹽馬齒鹽四種並不入食馬齒即大鹽黑鹽疑是鹵鹹柔鹽疑是戎鹽而此戎鹽又名胡鹽二三相亂今戎鹽北地甚冇從涼州來亦從燉煌來其形作塊片或如雞鴨卵或如菱米色紫白味不甚鹹口嘗氣臭正如毈雞子臭者乃臭又河南鹽池泥中自有凝鹽如石片打破皆青黑色善療馬脊瘡又疑此是戎鹽又巴東朐䏰縣北崖有鹽井鹽水自凝生繖子鹽一二寸中央突張如繖形亦冇方如石膏博碁者恭曰戎鹽即胡鹽生河崖山坂之陰土石間大小不常堅白似石燒之不鳴蛇也宗奭曰戎鹽成垜裁之如枕細白味甘鹹頌曰陶氏所説九種今人不能遍識醫家治眼及補下藥多用青鹽恐即戎鹽也本草云北海青南海赤今青鹽從西羌來者形塊方稜明瑩而青黑色最竒北海來者作大塊而不光瑩又多孔竅若蜂窠狀色亦淺于西鹽彼人謂之鹽枕入藥差劣北胡又有一種鹽作片屑如碎白石彼人亦謂之青鹽緘封於匣與鹽枕并作禮贄不知是何色類時珍曰本草戎鹽云北海青南海赤而諸注乃用白鹽似與本文不合按涼州異物志云薑賴之墟今稱龍城剛鹵千里蒺藜之形其下冇鹽纍碁而生出于胡國故名戎鹽讚云鹽山二嶽二色為質赤者如丹黑者如漆小大從意鏤之為物作獸辟惡佩之為吉或稱戎鹽可以療疾此説與本草本文相合亦惟赤黑二色不言白者蓋白者乃光明鹽而青鹽赤鹽則戎鹽也故西涼記云青鹽池出鹽正方半寸其形如石甚甜美真臘記云山間有石味勝于鹽可琢為器梁四公傳言交河之間掘碵下數尺有紫鹽如紅如紫色鮮而甘其下丈許有醫珀北戶録亦言張掖池中出桃花鹽色如桃花隨月盈縮今寧夏近涼州地鹽井所出青鹽四方皎潔如石山丹衛即張掖地有池産紅鹽紅色此二鹽即戎鹽之青赤二色者醫方但用青鹽而不用紅鹽不知二鹽皆名戎鹽也所謂南海北海者指西海之南北而言非炎方之南海也張果玉洞要訣云赤戎鹽出西戎稟自然水土之氣結而成質其地水土之氣黃赤故鹽亦隨土氣而生味淡于石鹽力能伏陽精但於火中燒汁紅赤凝定色轉益者即真也亦名絳鹽抱朴子書有作赤鹽法又嶺南一種紅鹽乃染成者皆非真紅鹽也又丹房鑑源云蠻鹽可伏雌雄紅鹽為上氣味鹹寒無毒宗奭曰甘鹹大明曰平獨孤淹曰戎鹽赤黑二色能纍卵乾汞制丹砂主治明目目痛益氣堅肌骨去毒蠱本經心腹痛溺血吐血齒舌血出别録助水臟益精氣除五臟癥結心腹積聚痛瘡疥癬大明解芫青斑蝥毒時珍發明宗奭曰戎鹽甘鹹功在却血入腎治目中瘀赤澀昏時珍曰戎鹽功同食鹽不經煎鍊而味鹹帶甘入藥似勝周禮注云飴鹽味甜即戎盬不知果否或云以飴拌鹽也附方新六小便不通戎鹽湯用戎鹽彈丸大一枚茯苓半斤白术二兩水煎服之仲景金匱方風熱牙痛青鹽一斤槐枝半斤水四碗煎汁二碗煮鹽至乾炒研日用揩牙洗目唐氏經驗方牢牙明目青鹽二兩白鹽四兩川椒四兩煎汁拌鹽炒乾日用揩牙洗目永無齒疾目疾通變要法風眼爛弦戎鹽化水點之普濟方痔瘡漏瘡白礬四兩青鹽四兩為末豬尿脬一箇盛之陰乾每服五錢空心溫水下趙氏經驗方光明鹽唐本草釋名石鹽唐本聖石蜀本水晶鹽綱目時珍曰雷斆炮炙論序云聖石開盲明目而如雲離日則光明者乃兼形色與功而名也集解恭曰光明鹽生鹽州五原鹽池下鑿取之大者如升皆正方光徹頌曰今階州出一種石鹽生山石中不由煎鍊自然成鹽色甚明瑩彼人甚貴之云即光明鹽也時珍曰石鹽有山産水産二種山産者即崖鹽也一名生鹽生山崖之間狀如白礬出于階成陵鳯永康諸處水産者生池底狀如水晶石英出西域諸處吳録云天竺有新淘水味甘美下有石鹽白如水晶又波斯出自然白鹽如細石子金幼孜北征録云北地有鹽海子出白鹽瑩潔如水晶又有鹽池鹽色或青或白軍士采食之此皆水産者也梁四公子傳云髙昌國燒羊山出鹽大者如斗狀白如玉月望收者其文理粗明徹如水非月望收者其文理密金䄛子云胡中白鹽産于崖映月光明洞徹如水晶胡人以供國厨名君王鹽亦名玉華鹽此則山産者也皆自然之鹽所謂天成者也益州記云汶山有鹹石以水漬而煎之成鹽此亦石鹽之類而稍不同者氣味鹹甘平無毒主治頭痛諸風目赤痛多眵淚唐本發明時珍曰光明鹽得清明之氣鹽之至精者也故入頭風眼日諸藥尤良其他功同戎鹽而力差次之鹵鹹本經下品釋名鹵鹽寒石吳普石鹹補遺時珍曰鹹音有二音咸者潤下之味音減者鹽土之名後人作鹼作鹻是矣許慎説文云鹵西方鹹地也故字從西省文象鹽形東方謂之斥西方謂之鹵河東謂之鹹傳云兌為澤其於地也為剛鹵亦西方之義集解别録曰鹵鹹生河東池澤𢎞景曰今俗不復見鹵鹹疑是黑鹽又云是煎鹽釡下凝滓二説未詳恭曰鹵鹹生河東河東鹽不釡煎明非凝滓又疑是黑鹽皆不然此是鹼土也今人熟皮用之于鹼地掘取頌曰并州人刮鹹煎鍊不甚佳即鹵鹹也機曰鹵鹹即鹵水也時珍曰説文既言鹵鹹皆斥地之名則謂凝滓及鹵水之説皆非矣鹵鹽與鹵鹼不同山西諸州平野及大谷榆次髙亢處秋間皆生鹵望之如水近之如積雪土人刮而熬之為鹽微有蒼黃色者即鹵鹽也廣韻所謂天生曰鹵人造曰鹽是矣凡鹽未經滴去苦水則不堪食苦水即鹵水也鹵水之下澄鹽凝結如石者即鹵鹼也丹溪所謂石鹼者乃灰鹼也見土類吳普本草謂鹵鹹一名鹵鹽者指鹵水之鹽非鹵地之鹽也不妨同名氣味苦寒無毒别録苦鹹寒獨孤滔曰鹵鹽制四黃作銲藥同磠砂罨鐡一時即軟主治大熱消渴狂煩除邪及下蠱毒柔肌膚本經去五臟腸胃留熱結氣心下堅食已嘔逆喘滿明目目痛别録附方新二風熱赤眼虛腫澀痛鹵鹻一升青梅二十七箇古錢二十一文新瓶盛密封湯中煮一炊時三日後取點日三五度聖惠方齒腐齦爛不拘大人小兒用上好鹹土熱湯淋取汁石器熬乾刮下入麝香少許研摻之宣明方凝水石本經中品釋名白水石本經寒水石凌水石别録鹽精石泥精鹽枕綱目鹽根時珍曰拆片投水中與水同色其水凝動又可夏月研末煮湯入瓶倒懸井底即成凌氷故有凝水白水寒水凌水諸名生于積鹽之下故有鹽精以下諸名石膏亦有寒水之名與此不同集解别録曰凝水石色如雲母可拆者鹽之精也生常山谷又中水縣及邯鄲𢎞景曰常山即恆山屬并州中水屬河間邯鄲屬趙郡此處地皆鹹鹵故云鹽精而碎之亦似朴消此石末置水中夏月能為氷者佳時珍曰别録言凝水鹽之精也陶氏亦云鹵地所生碎之似朴消范子計然云出河東河東鹵地也獨孤滔丹房鑑源云鹽精出鹽池狀如水晶據此諸説則凝水即鹽精石也一名泥精昔人謂之鹽枕今人謂之鹽根生于鹵地積鹽之下精液滲入土中年久至泉結而成石大塊有齒稜如馬牙消清瑩如水精亦有帶青黑色者皆至暑月回潤入水浸久亦化陶氏注戎鹽謂鹽池泥中自有凝鹽如石片打破皆方而色青黑者即此也蘇頌注玄精石謂解池有鹽精石味更鹹苦乃玄精之類又注食鹽謂鹽枕作精塊有孔竅若蜂窠可緘封為禮贄者皆此物也唐宋諸醫不識此石而以石膏方解石為注誤矣今正之於下正誤恭曰凝水石冇縱理橫理兩種色清明者為上或云縱理為寒水石橫理為凝水石今出同州韓城色青橫理如雲母為良出澄州者斜理文色白為劣也頌曰今河東汾隰州及德順軍亦有之三月采又有一種冷油石全與此相類但投沸油鐺中油即冷者是也此石性冷有毒誤服令人腰以下不能舉宗奭曰凝水石文理通徹人或磨刻為枕以備暑月之用入藥須燒過或市人者入輕粉以亂真不可察陶氏言夏月能為氷者佳如此則舉世不能得矣閻孝忠曰石膏潔白堅硬有墻壁寒水石軟爛可以手碎外微青黑中有細文王隱君曰寒水石堅白晶潔狀若明礬蓬砂之質或冇碎之粒粒大小皆四方故又名方解石今人謂之硬石膏者是也時珍曰寒水石有二一是軟石膏一是凝水石惟陶𢎞景所注是凝水之寒水石與本文相合蘇恭蘇頌冦宗奭閻孝忠四家所説皆是軟石膏之寒水石王隱君所説則是方解石諸家不詳本文鹽精之説不得其説遂以石膏方解石指為寒水石唐宋以來相承其誤通以二石為用而鹽精之寒水絶不知用此千載之誤也石膏之誤近千載朱震亨氏始明凝水之誤非時珍深察恐終於絶響矣修治斆曰凡使須用生薑自然汁煮乾研粉用每十兩用生薑一鎰也氣味辛寒無毒别録曰甘大寒普曰神農辛岐伯醫和扁鵲甘無毒李當之大寒時珍曰辛鹹之才曰解巴豆毒畏地榆獨孤淹曰制丹砂伏玄精主治身熱腹中積聚邪氣皮中如火燒煩滿水飲之久服不飢本經除時氣熱盛五臟伏熱胃中熱止渴水腫小腹痺别録壓丹石毒風解傷寒勞復甄權治小便白內痺涼血降火止牙疼堅牙明目時珍發明時珍曰凝水石稟積陰之氣而成其氣大寒其味辛鹹入腎走血除熱之功同於諸鹽古方所用寒水石是此石唐宋諸方寒水石是石膏近方寒水石則是長石方解石俱附各條之下用者詳之附方舊二新二男女轉脬不得小便寒水石二兩滑石一兩葵子一合為末水一斗煮五升時服一升即利永類方牙齦出血有竅寒水石粉三兩米砂二錢甘草腦子一字為末乾摻方普濟湯火傷灼寒水石燒研傅之衛生易簡方小兒丹毒皮膚熱赤寒水石半兩白土一分為末米醋調塗之經驗方玄精石宋開寶釋名太乙玄精石陰精石綱目玄英石時珍曰此石乃鹹鹵至陰之精凝結而成故有諸名集解頌曰玄精石出解州解池及通泰州積鹽倉中亦有之其色青白龜背者佳采無時又解池有鹽精石味更鹹苦亦玄精之類也恭曰近地亦有之色亦青白片大不佳時珍曰玄精是鹹鹵津液流滲入土年久結成石片片狀如龜背之形䈬解出者其色青白通徹蜀中赤鹽之液所結者色稍紅光沈存中筆談云太陰玄精生解州鹽澤之鹵溝渠土內得大者如杏葉小者如魚鱗悉皆尖角端正如龜甲狀其裙襴小墮其前則剡其後則上剡正如穿山甲相掩之處前是龜甲更無異也色緑而瑩徹叩之則直埋而坼瑩如明鑑拆處亦六角如栁葉大燒過則悉解拆薄如栁葉片片相離白如霜雪平潔可愛此乃稟積陰之氣凝結故皆六角今天下所用玄精乃絳州山中所出絳石非玄精也氣味鹹溫無毒時珍曰甘鹹寒獨孤淹曰制硫黃丹砂主治除風冷邪氣濕痺益精氣婦人痼冷漏下心腹積聚冷氣止頭痛解肌開寶主陰證傷寒指甲而色青黑心下脹滿結硬煩渴虛汗不止或時狂言四肢逆冷咽喉不利腫痛脈沈細而疾宜佐他藥服之又合大藥塗大風瘡宗奭發明頌曰古方不見用近世補藥及傷寒多用之其著者治傷寒正陽丹出汗也時珍曰玄精石稟太陰之精與鹽同性其氣寒而不溫其味甘鹹而降同硫黃消石治上盛下虛救陰助陽有扶危拯逆之功故鐵甕申先生來復丹用之正取其寒以配消硫之熱也開寶本草言其性溫誤矣附方舊一新八正陽丹治傷寒三日頭痛壯熱四肢不利太陰玄精石消石硫黃各二兩硇砂二兩細研入甕瓶固濟以火半斤周一寸㶸之約近半日候藥青紫色住火待冷取出用臘月雪水拌勻入罐子中屋後北陰下陰乾又入地埋二七日取出細研麵糊和丸雞頭子大先用熱水浴後以艾湯研下一丸以衣蓋汗出為瘥圖經本草小兒風熱挾風藴熱體熱太陰玄精石一兩石膏七錢半龍腦半兩為末每服半錢新汲水下普濟方肺熱咳嗽方見不灰木下冷熱霍亂分利陰陽玄精石半夏各一兩硫黃三錢為末麵糊丸梧子大每末飲服三十丸指南方頭風腦痛玄精石末入羊膽中陰乾水調一字吹鼻中立止千金方目赤澀痛玄精石半兩黃蘗炙一兩為末點之良普濟方赤目失明內外障翳太隂玄精石陰陽火煆石決明各一兩㽔仁黃連各二兩羊子肝七箇竹刀切晒為末粟米飯丸梧子大每臥時茶服二十丸服至七日烙頂心以助藥力一月見效宋丞相言黃典史病此夢神傳此方愈朱氏集驗方目生赤脈玄精石一兩甘草半兩為末每服一錢小兒半錢竹葉煎湯調下總微論重舌涎出水漿不入太陰玄精石二兩牛黃硃砂龍腦一分為末以鐵針舌上去血鹽湯潄口摻末咽津神效聖惠方緑鹽唐本草釋名鹽緑石緑綱目集解恭曰緑鹽出焉耆國水中石下取之狀若扁青空青為眼藥之要今人以光明鹽硇砂赤銅屑釀之為瑰緑色以充之珣曰出波斯國生石上舶上將來謂之石緑裝色久而不變中國以銅醋造者不堪入藥色亦不久時珍曰方家言波斯緑鹽色青陰兩中乾而不濕者為真又造鹽緑法用熟銅器盛取漿水一升投青鹽一兩在內浸七日取出即緑色以物刮末入漿水冉浸一七或二七取出此非真緑鹽也氣味鹹苦辛平無毒主治目赤淚出膚翳眵暗唐本點目明目消翳療小兒無辜疳氣李珣附方新二𣅿赤眼痛鹽緑一分蜜半兩于蚌蛤內相和每夜臥時漿水洗目炙熱點之能斷根方聖濟目暗赤澀多淚鹽緑一錢㽔仁去皮一錢研熱入好酥一錢研勻每夜點一麻子方聖惠鹽藥拾遺集解藏器曰生海西南雷羅諸州山谷似芒消末細入口極冷南人少有服者恐極冷入腹傷人宜慎之氣味鹹冷無毒主治眼赤眥爛風赤細研水和點之又水研服去熱煩痰滿頭痛明目鎮心又主蛇虺惡蟲毒藥箭鏃毒疥癬􅏴腫瘰癧並摩傅之甚者水化服之又解獨自草箭毒藏器附録懸石保升曰人若常服鍊石者至殁冢中生懸石若芒消其冷如雪殺火毒朴消本經上品校正併入别録芒消嘉祐馬牙消釋名消石朴别録鹽消綱目皮消志曰消是本體之名石乃堅白之號朴者未化之義也以其芒消英消皆從此出故曰消石朴也時珍曰此物見水即消又能消化諸物故謂之消生于鹽鹵之地狀如末鹽凡牛馬諸皮須此治熟故今俗有鹽消皮消之稱煎鍊入盆凝結在下粗朴者為朴消在上有芒者為芒消有牙者為馬牙消神農本經止有朴消消石名醫别録復出芒消宋嘉祐本草又出馬牙消蓋不知消石即是火消朴消即是芒消馬牙消一物有精粗之異爾諸説不識此遂致紛紜也今併芒消牙消於一云集解别録曰朴消生益州山谷有鹹水之陽采無時色青白者佳黃者傷人赤者殺人又曰芒消生於朴消斆曰朴消中揀出形似麥芒號曰芒消志曰以暖水淋朴消取汁鍊之令減半投于盆中經宿乃有細芒生故謂之芒消也又有英消者其狀若白石英作四五稜瑩徹可愛主療與芒消同亦出於朴消其煎鍊自别有法亦呼為馬牙消宗奭曰朴消是初采得一煎而成者未經再鍊故曰朴消可以熟生牛馬皮及治金銀有偽芒消是朴消淋汁再鍊者時珍曰消有三品生西蜀者俗呼川消最勝生河東者俗呼鹽消次之生河北青齊者俗呼土消皆生于斥鹵之地彼人刮掃煎汁經宿結成狀如末鹽猶有沙土猥雜其色黃白故别録云朴消黃者傷人赤者殺人須再以水煎化澄去滓腳入蘿蔔數枚同煮熟去蘿蔔傾入盆中經宿則結成白消如氷如蠟故俗呼為盆消齊衛之消則底多而上面生細芒如鋒别録所謂芒消者是也川晉之消則底少而面上生牙如圭角作六稜縱橫玲瓏洞徹可愛嘉祐本草所謂馬牙消者是也狀如白石英又名英消二消之底則通名朴消也取芒消英消再三以蘿蔔煎鍊去鹹味即為甜消以二消置之風日中吹去水氣則輕白如粉即為風化消以朴消芒消英消同甘草煎過鼎罐升煅則為玄明粉陶𢎞景及唐宋諸人皆不知諸消是一物但有精粗之異因名迷實謬猜亂度殊無指歸詳見消石正誤下朴消本經氣味苦寒無毒别録曰苦辛大寒無毒鍊白如銀能寒能熱能滑能澀能辛能鹹能酸入地千年不變權曰苦鹹有小毒時珍曰别録所列神化之説乃消石之功詳見消石下之才曰石韋為之使惡麥句薑張從正曰畏三稜主治百病除寒熱邪氣逐六臟積聚結固留癖能化七十二種石鍊餌服之輕身神仙本經胃中食飲熱結破留血閉絶停痰痞滿推陳致新别録療熱脹養胃消縠皇甫諡治腹脹大小便不通女子月候不通甄權通泄五臟百病及癥結治天行熱疾頭痛消腫毒排膿潤毛髮大明芒消别録氣味辛苦大寒無毒權曰鹹有小毒主治五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新别録下瘰癧黃疸病時疾壅熱能散惡血墮胎傅膝瘡甄權馬牙消宋嘉祐氣味甘大寒無毒時珍曰鹹微甘即英消也主治除五臟積熱伏氣甄權末篩點眼赤去赤腫障翳澀淚痛亦入點眼藥中用大明功同芒消時珍發明成無已曰內經云鹹味下泄為陰又云鹹以耎之熱淫于內治以鹹寒氣堅者以鹹耎之熱盛者以寒消之故張仲景大陷胸湯大承氣湯調胃承氣湯皆用芒消以軟堅去實熱結不至堅者不可用也好古曰本草云朴消味辛是辛以潤腎燥也今人不用辛字只用鹹字鹹能耎堅也其義皆是本草言芒消利小便而墮胎然傷寒妊娠可下者用此兼大黃引之直入大腹潤燥耎堅瀉熱而母子俱安經云有故無殞亦無殞也此之謂歟以在下言之則便溺俱陰以前後言之則前氣後血以腎言之總主大小便難溺澀袐結俱為水少火盛經云熱淫於內治以鹹寒佐之以苦故用芒消大黃相須為使也元素曰芒消氣薄味厚沈而降陰也其用有三去實熱一也滌腸中宿垢二也破堅積熱塊三也孕婦惟三四月及七八月不可用餘皆無妨宗奭曰朴消是初得一煎而成者其味酷澀所以力緊急而不和治食鱠不消以此蕩逐之芒消是朴消淋過鍊成故其性和緩故今多用治傷寒時珍曰朴消澄下消之粗者也其質重濁芒消牙消結於上消之精者也其質清明甜消風化消則又芒消牙消之去氣味而甘緩輕爽者也故朴消止可施於鹵莽之人及傅塗之藥若湯散服餌必須芒消牙消為佳張仲景傷寒論只用芒消不用朴消正此義也消稟太陰之精水之子也氣寒味鹹走血而潤下蕩滌三焦腸胃實熱陽強之病乃折治火邪藥也唐時臘日賜郡臣紫雪紅雪碧雪皆用此消鍊成者通治積熱諸病冇神效貴在用者中的爾附方舊十七新一十五紫雪療傷寒溫瘧一切積熱煩熱狂易呌走瘴疫毒癘卒死腳氣五尸五疰心腹諸疾㽱刺切痛解諸熱毒邪熱發黃蠱毒鬼魅野道熱毒小兒驚癎百病黃金一百兩石膏寒水石滑石慈石各三斤搗碎水一斛煮四斗去滓入犀角屑羚羊角青木香沈香各五兩玄參洗焙升麻各一斤甘草炒八兩丁香一兩入前汁中煮取一斗五升去滓入鍊朴消十斤消石三十二兩於藥汁中微火煎之栁木不住攪至水氣欲盡傾水盆中待欲凝入麝香一兩二錢半硃砂末三兩攪勻收之每服一二錢涼水服臨時加減甚者一兩和濟局方紅雪治煩熱消宿食解酒毒開三焦利五臟除毒熱破積滯治傷寒狂燥胃爛發狂溫瘴腳氣黃疸頭痛目昏鼻塞口瘡喉痺重舌腸癰等病用川朴消十斤鍊去滓羚羊角屑黃斤升麻各三兩人參赤芍藥檳榔枳殼麩炒生甘草淡竹葉木香各二兩木通巵子葛根桑白皮大青藍葉各一兩半蘇方木六兩並銼片水二斗五升煎至九升去滓濾過煎沸下消不住手攪待水氣將盡傾入器中欲凝下朱砂一兩麝香半兩經宿成雪每服一二錢新汲水調下欲行則熱湯化服一兩和劑方碧雪治一切積熱天行時疾發狂昏憒或咽喉腫塞口舌生瘡心中煩燥或大小便不通胃火諸病朴消􅉭消馬牙消消石石膏水飛寒水石水飛各一斤以甘草一斤煎水五升入諸藥同煎不住手攪令消鎔得所入青黛一斤和勻傾盆內經宿結成雪為末每含咽或吹之或水調服二三錢欲通利則熱水服一兩和劑局方涼膈驅積王旻山人甘露飲治熱壅涼胸膈驅積滯蜀􅉭消末一大斤用蜜十二兩冬加一兩和勻入新竹筒內半筒已上即止不得令滿却入炊甑中令有藥處在飯內其虛處出其上蒸之飯熟取出綿濾入瓷鉢中竹箆欖勿停手待凝收入瓷盒每臥時含半匙漸漸咽之如要通轉即多服之劉禹錫傳信方乳石發動煩悶􅉭消蜜水調服一錢日三服聖惠方骨蒸熱病􅉭消末水服方寸匕日二服良干金方腹中痞塊皮消一兩獨蒜一箇大黃末八分搗作餅貼于患處以消為度邵氏經驗方食物過飽不消遂成痞膈馬牙消一兩吳茱茰半斤煎汁投消乘熱服之良久未轉更進一服立效竇羣在常州此方得效也經驗方關格不通大小便閉脹欲死兩三日則殺人􅉭消三兩泡湯一升服取吐即通方百一小便不通白花散用芒消三錢茴香酒下簡要濟衆方時氣頭痛朴消末二兩生油調塗頂上聖惠方赤眼腫痛朴消置豆腐上蒸化取汁收點簡便方風眼赤爛明淨皮消一盞水二碗煎化露一夜濾淨澄清朝夕洗日三日其紅即消雖半世者亦愈也方楊誠經驗退翳明目白龍散用馬牙消光淨者厚紙裹實安在懷內著肉養一百二十日研粉入少龍腦不計年嵗深逺眼生翳膜逺視不明但朣人不破散者並宜日點之經驗方諸眼障翳牙消十兩湯泡汁厚紙濾過瓦器熬乾置地上一夜入飛炒黃丹一兩麝香半分再羅過入腦子日點濟急仙方逐月洗眼􅉭消六錢水一盞六分澄清依法洗日至一年眼如童子也正月初三二月初八三月初四四月初四五月初五六月初四七月初三八月初一九月十三十月十三十一月十六十二月初五日聖惠方牙齒疼痛皂莢濃漿同朴消煎化淋於石上待成霜擦之普濟方食蟹齦腫朴消傅之即消普濟方喉痺腫痛外臺用朴消一兩細細含咽立效或加丹砂一錢之氣塞不通加生甘草末二錢半吹小兒重舌馬牙消塗於舌上下日三姚和衆口舌生瘡朴消含之良孫真人方小兒鵝口馬牙消擦舌上日五度簡要濟衆豌豆毒瘡未成膿者豬膽汁和芒消末塗之梅師代指腫痛芒消煎湯漬之聖惠方火熖丹毒水調􅉭消末塗之梅師一切風疹水煮􅉭消湯拭之梅師漆瘡作癢􅉭消湯塗之千金灸瘡飛蝶因艾灸火瘡痂退落瘡內鮮肉片子飛如蝶狀騰空飛去痛不可言是血肉俱熱怪病也用朴消大黃各半兩為末水調下微利即愈疾夏子益竒方婦人難産􅉭消末二錢童子小便溫服無不效者信效方死胎不下方同上豐城曾尉有貓孕五子一子已生四子死腹中用此灌之即下又治一牛亦下信效方女人扎足脫骨湯用杏仁一錢桑白皮四錢水五碗新瓶煎三碗入朴消五錢乳香一錢封口煎化置足於上先熏后洗三日一作十餘次后軟若束綿也闔閣事宜風化消修治時珍曰以􅉭消於風日中消盡水氣自成輕飄白粉也或以瓷瓶盛挂簷下待消滲出瓶外刮下收之别有甜瓜盛消滲出刮收者或黃牯牛膽收消刮取皆非甜消也主治上焦風熱小兒驚熱膈痰清肺解暑以人乳和塗去眼瞼赤腫及頭面暴熱腫痛煎黃連點赤目時珍發明時珍曰風化消甘緩輕浮故治上焦心肺痰熱而不泄利玄明粉藥性釋名白龍粉時珍曰玄水之色也明瑩徹也御藥院方謂之白龍粉修治時珍曰制法用白淨朴消十斤長流水一石煎化去滓星月下露一夜去水取消每一斗用蘿蔔一斤切片同煮熟濾淨再露一夜取出每消一斤用甘草一兩同煎去滓再露一夜取出以大沙罐一箇築實盛之鹽泥固濟厚半寸不蓋口置爐中以炭火十斤從文至武煆之待沸定以瓦一片蓋口仍前固濟再以十五斤頂火煆之放冷一伏時取出隔紙安地上盆覆三日出火毒研末每一斤入生甘草末一兩炙甘草末一兩和勻瓶收用氣味辛甘冷無毒主治心熱煩躁并五臟宿滯癥結甄權明目退膈上虛熱消腫毒大明發明杲曰玄明粉沈也陰也其用有二去胃中之實熱蕩腸中之宿垢大抵用此以代盆消耳玄明粉傳曰唐明皇帝聞終南山道士劉玄真服食多壽乃詔而問之玄真曰臣按仙經修鍊朴消號玄明粉止服此方遂無病長生其藥無滓性溫陰中有陽能除一百二十種疾生餌尚能救急難性命何况修鍊長服益精壯氣助陽證陰不拘丈夫婦入幼稚襁褓不問四時冷熱一切熱毒風冷痃癖氣脹滿五勞七傷骨蒸傳尸頭痛煩熱五內氣塞大小腸不通三焦熱淋疰忤咳嗽嘔逆口苦舌乾咽喉閉塞驚悸健忘營衛不調中酒中鱠飲食過度腰膝泠痛手足酸痺久冷久熱四肢壅塞背膊拘急目昏眩運久視無力腸風痔病血癖不調婦人産后小兒疳氣陰毒傷寒表裏疫癘此藥久服令人悅澤開關健脾駐顔明目輕身延壽功效不可具載但用一兩分為十二服臨時酌量加減似覺壅熱傷寒頭痛鼻塞四肢不舉飲食不下煩悶氣脹須通瀉求安者即看年紀髙下用藥二錢半或半兩以桃花煎湯下為使最上次用蔥湯下如未通以沸湯投之即效或食諸魚藕菜飲食諸毒藥用蔥白湯調服二錢毒物立泄下若女人身懷六甲長服安胎生子亦無瘡腫疾病若要微暢不閉塞但長服之稍稍得力朝服夕應不搜刮人五臟怡怡自泰其藥初服時每日空腹酒飲茶湯任下二錢七良久更下三錢七七日內常微泄利黃黑水涎沫等此是搜淘諸疾根本出去勿用畏之七日后漸知腹內暖稍食下氣長服除故養新氣血日安用大麻子湯下為使惟忌苦參詳見太陰經中好古曰玄明粉治陰毒一切非伏陽在內不可用若用治真陰毒殺人甚速震亨曰玄明粉火煆而成其性當溫曰長服久服輕身固胎駐顔益壽大能補益豈理也哉豫親見一二朋友不信豫言而亡故書以為戒時珍曰神農本草言朴消鍊餌服之輕身神仙蓋方士竄入之言後人因此制為玄明粉煆煉多偏佐以甘草去其鹹寒之毒遇有三焦腸胃實熱積滯少年氣壯者量與服之亦有速效若脾胃虛冷及陰虛火動者服之是速其咎矣附方新三熱厥氣痛玄明粉三錢熱童尿調下集簡方傷寒發狂玄明粉二錢朱砂一錢末之冷水服傷寒藴要鼻血不止玄明粉二錢水服聖濟消石本經上品釋名􅉭消别録苦消甄權熖消土宿火消綱目地霜蜀本生消宋本北帝玄珠志曰以其消化諸石故名消石初煎鍊時有細芒而狀若朴消故有芒消之號不與朴消及别録􅉭消同類宗奭曰消石是再煎煉時取去芒消凝結在下者精英既去但餘滓如石而已入藥功力亦緩惟能發煙火權曰芒消一作苦消言其味苦也時珍曰消石丹爐家用制五金入石銀工家用化金銀兵家用作烽燧火藥得火即熖起故有諸名狐剛子鍊粉圖謂之北帝玄珠開寶本草重出生消􅉭消今併為一並詳下文集解别録曰消石生益州山谷及武都隴西西羌采無時𢎞景曰消石療病與朴消相似仙經用此消化諸石今無真識此者或云與朴消同山所以朴消一名消石朴也又云一名􅉭消今芒消乃是煉朴消作之並未核研其驗有人得一種物色與朴消大同小異朏朏如握鹽雪以火燒之紫青煙起云是真消石也今宕昌以北諸山有鹹土處皆有之志曰此即地霜也所在山澤冬月地上有霜掃取以水淋汁後乃煎煉而成狀如叉腳好者長五分以來陶説多端蓋由不的識之故也又曰生消石茂州西山岩石間形塊大小不定色青白采無時時珍曰生消石諸鹵地皆産之而河北慶陽諸縣及蜀中尤多秋冬間遍地生白掃取煎煉而成貨者茍且多不潔淨須再以水煎化傾盆中一夜結成澄在下者狀如朴消又名生消謂鍊過生出之消也結在上者或有鋒􅉭如􅉭消或有圭稜如馬牙消故消石亦有芒消牙消之名與朴消之􅉭牙同稱而水火之性則異也崔昉外丹本草云消石陰石也此非石類乃鹹鹵煎成今呼熖消河北商城及懷衛界沿河人家刮鹵淋汁煉就與朴消小異南地不産也升玄子伏永圖云消石生烏場國其色青白用白石英炙熱點上便消入石中者為真其石出處氣極穢惡飛鳥不能過其上人或單衣過之身上諸蟲悉化為水能消金石為水服之長生以形若鵝管者佳謹按升玄子所説似與今之消石不同而姚寬西溪叢話以其説為真正消石豈外國所産與中國異耶抑别一種耶當俟博物者訂正正誤𢎞景曰神農本經無􅉭消只有消石一名􅉭消名醫别録乃出􅉭消療與消石同疑即消石也舊出寧州黃白粒大味極辛苦今醫家多用煮煉作色者全白粒細而味不甚烈皇甫士安言無朴消可用消石消石生山之陰鹽之膽也取石脾與消石以水煮之一斛得三斗正白如雪以水投中即消故名消石其味苦無毒主消渴熱中止煩滿三月采於赤山朴消者亦生山之陰有鹽鹹苦之水則朴消生於其陽其味苦無毒其色黃白主療熱腹中飽脹養胃消穀去邪氣亦得水而消其療與消石小異按如此説是取芒消合煮更成為真消石但不知石脾是何物也以朴消作􅉭消者用暖湯淋汁煮之著木盆中經宿即成矣今益州人復鍊礬石作消石絶柔白而味猶是礬爾又曰朴消今出益州北部汶山郡西川蠶陵二縣界生山崖上色多青白亦雜黑斑土人擇取白軟者以當消石用之當燒令汁沸出狀如礬石也藏器曰石脾芒消消石並出西戎鹵地鹹水結成恭曰朴消有縱理縵理二種用之無别其白軟者朴消苗也虛軟少力鍊為消石所得不多以當消石功力大劣也又曰消石即是􅉭消朴消一名消石朴今煉粗惡朴消取汁煎作芒消即是消石别録復出􅉭消誤矣晉宋古方多用消石少用芒消近代諸醫但用􅉭消鮮言消石理既明白不合重出頌曰舊説謂朴消芒消消石三物同種初采得苖以水淋汁煎成者為朴消一名消石朴又煉朴消或地霜而成堅白如石者為消石一名􅉭消又取朴消淋汁煉煎結成有細􅉭者為芒消雖一體異名而修煉之法既殊則主治之功亦别然本經所載疑是二種今醫方所用亦不能究但以未煉成塊微青色者為朴消煉成盆中有􅉭者為芒消亦謂之盆消芒消之底澄凝者為消石朴消力緊芒消次之消石更緩未知孰是蘇恭言晉宋古方多用消石少用􅉭消按張仲景傷寒論承氣陷胸皆用􅉭消葛洪肘后方傷寒時氣亦多用芒消惟治食鱠不化云無朴消用􅉭消代之是晉宋以前通用朴消芒消矣胡洽方十棗湯用􅉭消大五飲丸用消石並云無消石用􅉭消是梁隋間通用􅉭消消石矣以此言之朴消消石為精芒消為粗故陶氏引皇甫士安之言為證是消石當時已難得其真故方書通以相代矣又古方金石凌法用朴消消石芒消馬牙消四種相參次第下之方出唐世不知當時如何分别也又南方醫人著消説云本草有朴消消石􅉭消而無馬牙消諸家所注三種竟無斷決或古芒消消石是一物不合重出或言煎煉朴消經宿盆中有細芒為芒消或言馬牙消自是一物今諸消之體各異理亦易明而惑乃如此朴消味苦而微鹹出蜀郡者瑩白如氷雪內地者小黑皆蘇脆易碎風吹之則結霜泯泯如粉熬之煬沸亦可鎔鑄以水合甘草豬膽煮至減半投大盆中又下凝水石屑同漬一宿則凝結如白石英者􅉭消也掃地霜煎煉而成試竹上如解鹽而味辛苦燒之成熖都盡者消石也能消金石又性畏火而能制諸石使拒火亦天地之神物也牙消即是􅉭消也又有生消不因煮煉而成亦出蜀道類朴消而小堅也其論雖辨然與古人所説殊别亦未可全信也好古曰消石者消之總名也但不經火者謂之生消朴消經火者謂之芒消盆消時珍曰諸消自晉唐以來諸家皆執名而猜都無定見惟馬志開寶本草以消石為地霜煉成而芒消馬牙消是朴消煉出者一言足破諸家之惑矣諸家蓋因消石一名芒消朴消一名消石朴之名相混遂致費辨不決而不知消有水火二種形質雖同性氣逈别也惟神農本經朴消消石二條為正其别録􅉭消嘉祐馬牙消開寶生消俱係多出今並歸併之神農所列朴消即水消也有二種煎煉結出細芒者為芒消結出馬牙者為牙消其凝底成塊者通為朴消其氣味皆鹹而寒神農所列消石即火消也亦有二種煎煉結出細芒者亦名芒消結出馬牙者亦名牙消又名生消其凝底成塊者通為消石其氣味皆辛苦而大溫二消皆有芒消牙消之稱故古方有相代之説自唐宋以下所用芒消牙消皆是水消也南醫所辨雖明而以凝水石豬膽煎成者為芒消則誤矣今通正其誤其石脾一名消石者造成假消石也見後石脾下修治大明曰真消石栁枝湯煎三周時如湯少即加熱者伏火即止斆曰凡使消石先研如粉用雞腸菜柏子仁共二十五箇和作一處丸如小帝珠子以瓷瓶子於五斤火中煅赤投消石四兩于瓶內連投藥丸入瓶自然伏火也抱朴子曰能消柔五金化七十二石為水制之須用地蓮子豬牙皂角苦參南星巴豆漢防己晚蠶砂時珍曰溶化投甘草入內即伏火消石氣味苦寒無毒别鍊曰辛大寒無毒普曰神農苦扁鵲甘權曰鹹有小毒時珍曰辛苦微鹹有小毒陰中之陽也得陳皮性踈爽之才曰火為之使惡苦參苦菜畏女菀杏仁竹葉主治五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣煉之如膏久服輕身本經療五臟十二經脈中百二十疾暴傷寒腹中大熱止煩滿消渴利小便及瘻蝕瘡天地至神之物能化七十二種石别録破積散堅治腹脹破血下瘰癧瀉得根出甄權含咽治喉閉大明治伏暑傷冷霍亂吐利五腫淋疾女勞黑疸心腸㽱痛赤眼頭痛牙痛時珍生消氣味苦大寒無毒時珍曰辛苦大溫無毒主治風熱癲癎小兒驚邪瘛瘲風眩頭痛肺壅耳聾口瘡喉痺咽塞牙頷腫痛目赤熱多眵淚開寶發明土宿真君曰消石感海鹵之氣所産乃天地至神之物能寒能熱能滑能澀能辛能苦能酸能鹹入地千年其色不變七十二石化而為水制服草木柔潤五金制煉八石雖大丹亦不捨此也時珍曰土宿所説乃消石神化之妙别録列於朴消之下誤矣朴消屬水味鹹而氣寒其性下走不能上升陰中之陰也故惟蕩滌腸胃積滯折治三焦邪火消石屬火味辛帶苦微鹹而氣大溫其性上升水中之火也故能破積散堅治諸熱病升散三焦火鬱調和臟腑虛寒與硫黃同用則配類二氣均調陰陽有升降水火之功治冷熱緩急之病煆制礞石則除積滯痰飲蓋硫黃之性暖而利其性下行消石之性暖而散其性上行礞石之性寒而下消石之性暖而上一升一降一陰一陽此制方之妙也今兵家造烽火銃機等物用消石者直入雲漢其性升可知矣雷公炮炙論序云腦痛欲死鼻投消末是亦取其上升辛散乃從治之義本經言其寒别録言其大寒正與龍腦性寒之誤相似凡辛苦物未有大寒者况此物得火則熖生與樟腦火酒之性同安有性寒大寒之理哉史記倉公傳云災川王美人懷子不乳來召淳于意意往飲以莨𦿆藥一撮以酒飲之旋乳意復疹其脈躁躁者有餘病即飲以消石一劑出血如豆比五六枚而安此去自結之驗也附方新十四頭痛欲死消石末吹鼻內即愈炮炙論諸心腹痛熖消雄黃各一錢研細末每點少許入皆內名火龍丹集玄方腰腹諸痛方同上赤眼腫痛消石末臥時以銅筯點黍米大入目皆至旦以鹽水洗去之聖惠方眼目障翳男女內外障翳或三五箇月不見效者一點復明好熖消一兩銅器鎔化入飛過黃丹二分片腦二分銅匙急抄入罐內收之每點少許其效如神兖州朱秀才忽不見物朝夕拜天因夢神傳此方點之而愈張三丰仙方風熱喉痺及纒喉風病玉鑰匙用熖消一兩半白殭蠶一錢硼砂半兩腦子一字為末吹之三因方重舌鵝口竹瀝同熖消點之普濟伏暑瀉痢及腸風下血或酒毒下血一服見效逺年者不過三服消石舶上硫黃各一兩白礬滑石半兩飛麵四兩為末滴水丸梧子大每新汲水下三五十丸名甘露丸普濟方五種淋疾勞淋血淋熱淋便氣淋石淋及小不通至甚者透格散用消石一兩不夾泥土雪白者生研為末每服二錢各依湯使勞淋勞倦虛損小便不出小腹急痛葵子末煎湯下通後便須服補虛丸散小便不出時下血疼痛滿急熱淋小便熱赤色臍下急痛並用冷水調下氣淋小腹滿急尿後常有餘瀝木通煎湯下石淋莖內痛尿不能出內引小腹膨脹急痛尿下砂石令人悶絶將藥末先入銚內隔紙炒至紙焦為度再研用溫水調下小便不通小麥湯下卒患諸淋只以冷水下並空心調藥使消如水乃服之沈存中靈苑方蛟龍癥病方見雄黃發明下服石發瘡疼不可忍用紙圈圍之中心填消石令滿以匙抄水淋之覺不熱痛即止集兵部手發背初起惡寒嗇嗇或已生瘡腫隱疹消石三兩暖水一升泡化青布摺三重溫拓赤處熱即換頻易取瘥外臺祕要女勞黑疸仲景曰黃家口晡發熱及惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸腹脹如水大便黑時溏非水也腹滿者難治消石礬石燒等分為末以大麥溺汁和服方寸匕日三病隨大小便去小便黃大便黑是其候也金匱手足不遂大風及丹石熱風不遂用消石一兩生烏麻油二斤置鐺中以土墼蓋口紙泥固濟火煎初時氣腥熟則氣香更以生麻油二升合煎得所收不津器中服時坐室中重作小紙屋然火於內服一大合發汗力肚者日二服三七日頭面疱瘡皆減也然必以火為使波羅門僧方硇砂硇音磽唐本草釋名硇砂音硇狄鹽日華北庭砂四聲氣砂圖經透骨將軍土宿時珍曰硇砂性毒服之使人硇亂故曰硇砂狄人以當鹽食土宿本草云硇性透物五金籍之以為先鋒故號為透骨將軍炳曰生北庭者為上人呼為北庭砂解集恭曰硇砂出西戎形如牙消光淨者良頌曰今西涼夏國及河東陜西近邉州郡亦有之然西戎來者顆塊光明大者有如拳重三五兩小者如指面入藥最緊邊界出者雜碎如麻豆粒又夾砂石用之須水飛澄去土石訖亦無力彼人謂之氣砂時珍曰硇砂亦消石之類乃鹵液所結出于青海與月華相射而生附鹽而成質北人采取淋鍊而成狀如鹽塊以白淨者為良其性至透用黝罐盛懸火上則常乾或加乾薑同收亦良若近冷及得濕即化為水或滲失也一統志云臨洮蘭縣有洞出硇砂張匡鄴行程記云髙昌北庭山中常有煙氣涌起而無雲霧至夕光熖若炬火照見禽鼠皆赤色謂之火熖山采硇砂者乘木屐取之若皮底即焦矣北庭即今西域火州也修治宗奭曰凡用須水飛過去塵穢入瓷器中重湯煮乾則殺其毒時珍曰今時人多用水飛淨醋煮乾如霜刮下用之氣味鹹苦辛溫有毒恭曰不宜多服柔金銀可為銲藥權曰酸鹹有大毒能消五金八石腐壞人腸胃生食之化人心為血中其毒者生緑豆研汁飲一二升解之畏漿水忌羊血大明曰辛酸暖無毒畏一切酸凡修治用黃丹石灰作匱煆赤使用並無毒世人自疑爛肉而人被刀創所傷以之罨傳當時生痂藏器曰其性大熱服之有暴熱損髮云溫者誤也抱朴子曰伏硇藥甚多牡蠣海螵蛸晚蠶砂羊𢎞骨河豚魚膠魚腥草蘿蔔獨帚卷柏羊蹄商陸冬瓜半躑躅蒼耳烏梅斆曰硇過赤鬚汞留金鼎主治積聚破結血止痛下氣療咳嗽宿冷去惡肉生好肌爛胎亦入驢馬藥用唐本主婦人丈夫羸瘦積病血氣不調腸鳴飲食不消腰腳痛冷痃癖痰飲喉中結氣反胃吐水令人能食肥健藏器除冷病大益陽事甄權補水臟暖子宫消瘀血宿食不消食肉飽脹夜多小便丈夫腰胯酸重四肢不任婦人血氣疼痛氣塊痃癖及血崩帶下惡瘡息肉傅金瘡生肉大明去目翳弩肉宗奭消內積好古治噎膈癥瘕積痢骨哽除痣黶疣贅時珍發明藏器曰一飛為酸砂二飛為伏翼三飛為定精色如鵝兒黃入諸補藥為丸服之有暴熱頌曰此藥近出唐世而方書著古人單服一味伏火作丸子亦有兼硫黃馬牙消輩合弭者不知方出何時殊非古法此物本攻積聚熱而有毒多服腐壞人腸胃生用又能化人心為血固非平居可餌者而西土人用淹肉炙以當鹽食之無害蓋積習之久自不毒也宗奭曰金銀有偽投硇砂鍋中偽物盡消化况人腹中有久積豈不腐漬元素曰硇砂破堅癖不可獨用須入羣隊藥中用之時珍曰硇砂大熱有毒之物噎膈反胃積塊肉癥之病用之則有神功蓋此疾皆起於七情飲食所致痰氣鬱結遂成有形妨礙道路吐食痛脹非此物化消豈能去之其性善爛金銀銅錫庖人煮硬肉入硇砂少許即爛可以類推矣所謂化人心為血者亦甚言其不可多服爾張果玉洞要訣云北庭砂秉陰石之氣含陽毒之精能化五金八石去穢益陽其功甚著力並硫黃獨孤滔丹房鑑源云硇砂性有大毒為五金之賊有沈冷之疾則可服之疾減便止多服則成擁塞癰腫二説甚明而唐宋醫方乃有單服之法蓋欲得其助陽以縱欲而不虞其損陰以發禍也其方唐愼微已收附本草後今亦存之以備考者知警附方舊四新二十四服食法硇砂丸硇砂不計多少入罐子內上面更坐罐子一箇紙筋白土上下通泥了晒乾上面罐子內盛水以蒼耳乾葉為末鋪頭蓋底以火燒之火盡旋添火水盡旋添水從辰初起至戌一伏時住火勿動次日取出研米醋麵糊和丸梧子大每服四五丸溫酒或米飲下並無忌久服進食無痰經驗方元臟虛冷氣攻臍腹疼痛用硇砂一兩以纎霞草末二兩和勻用小砂罐不固濟慢火燒赤乃入硇在罐內不蓋口加項火一稱待火盡爐寒取出用川烏頭去皮臍生研末二兩和勻湯浸蒸餅丸梧子大每服三丸木香湯醋湯任下日一服陳巽方腎臟積冷氣攻心腹疼痛面青足冷硇砂二兩桃仁一兩去皮酒一小盞煎硇十餘沸去砂石入桃仁泥旋旋煎成膏蒸餅和丸梧子大每熟酒下二十丸聖惠方積年氣塊臍腹痛疼硇砂醋煮二兩木瓜三枚切須去瓤入硇在內碗盛於日中晒至瓜爛研勻以米醋五升煎如稀餳密收用時旋以附子末和丸梧子大熱酒化下一丸聖惠方痃癖癥塊硇砂丸治痃癖癥塊暖水臟殺三蟲婦人血氣子宫冷臘月收桑條灰淋去苦汁日乾每硇砂一兩用水三兩以水化硇拌灰乾濕得所以瓶盛灰半寸入硇於內以灰填蓋固濟文武火煆赤冷定取出研以箕鋪紙三重安藥於上以熱水淋之㚗待硇味盡即止以鉢盛汁於熱灰火中養之常令魚眼沸待汁乾入瓶再煆一食頃取出重研以粟飯和丸繅豆大每空心酒下五丸病去即止聖惠方噎膈反胃鄧才清興用北庭砂二錢水和蕎麥麵色之煆焦待冷取中間濕者焙乾一錢入檳榔二錢丁香二箇研勻每服七釐燒酒送下日三服愈即止後喫白粥半月仍服助胃丸藥兩孫天仁集效方用北庭砂二兩一兩用人言末一同入罐內文武火升三炷香取出燈盞上末一兩以黃丹末一兩同入罐內如上法升過取末用桑灰霜一兩研勻每服三分燒酒下愈即止湯又方平胃散各一錢入硇砂生薑各五分為末沸點服二錢當吐出黑物如石屢驗一切積痢靈砂丹用硇砂硃砂各二錢半為末用黃蠟半兩巴豆仁三七粒去膜同入石器內重湯煮一伏時候豆紫色為度去二七粒止將一七粒同二砂研勻溶蠟和收每旋丸緑豆大或三丸五丸淡薑湯下本事方月水不通臍腹積聚疼痛硇砂一兩皂角五挺去皮子銼為末以頭醋一大盞熬膏入陳橘皮末三兩搗三百杵丸梧子大每溫酒下五丸聖惠方死胎不下硇砂當歸各半兩為末分作二服溫酒調下如人行五里再一服瑞竹草方喉痺口噤硇砂馬牙消等分研勻點之聖濟方懸癰卒腫硇砂半兩綿裹含之咽津即安聖惠方牙齒腫痛老鼠一箇去皮以硇砂淹擦三日肉爛化盡取骨瓦上焙乾為末入樟腦一錢蟾酥二分每以少許點牙根上立止孫氏集效方偏頭風痛硇砂末一分水潤豉心一分搗丸皂子大綿色露出一頭隨左右內鼻中立效聖惠方損目生瘀赤肉弩出不退杏仁百箇蒸熟去皮尖研濾取淨汁入硇砂末一錢水煮化日點一二次自落普濟方鼻中息肉硇砂點之即落霞白飛方鼻中毛出晝夜可長一二尺漸漸粗圓如繩痛不可忍摘去復生此因食豬羊血過多致用生乳吞硇砂各一兩為末飯丸梧子大每空心臨臥各服十丸水下自然退落夏子益竒疾方魚骨哽咽硇砂少許嚼咽立下外臺祕要蚰蜒入耳硇砂膽礬等分為末每吹一字蟲化為水聖濟録割甲侵肉久不瘥硇砂礬石為末裹之以瘥為度外臺祕要蠍蠆叮螫水調硇砂塗之立愈千金方代指腫痛唾和白硇砂以麵作碗子套指入內一日瘥千金方面上疣目硇砂硼砂鐵鏽麝香等分研搽三次自落集效方疔瘡腫毒好硇砂雄黃等分研以銀箆刺破瘡口擠去惡血安藥一豆入內抵花貼住即效毒氣入腹嘔吐者服謢心散瑞竹堂方疝氣卵腫脹痛不可忍念珠丸用硇砂乳香各二錢黃蠟一兩研溶和丸分作一百單八丸以綿縫露一夜次日取出蛤粉為衣每用一丸乳香湯吞下日二服取效方本事諸勞久嗽方見獸部下張實之曰原本硇字皆作硇從包誤今改從蓬砂日華釋名硼砂日華盆砂時珍曰名義未解一作硼砂或云鍊出盆中結成謂之盆砂如盆消之義也集解頌曰硼砂出南海其狀甚光瑩亦有極大塊者諸方稀用可銲金銀宗奭曰南畨者色重褐其味和入藥其效速西戎者其色白其味焦入藥其功緩時珍曰硼砂生西南畨有黃白二種西者白如明礬南者黃如桃膠皆是煉結成如硇砂之類西者柔物去垢殺五金與消石同功用與砒石相得者也氣味苦辛暖無毒頌曰溫平時珍曰甘微鹹涼無毒獨孤滔曰制汞啞銅結砂子土宿真君曰知母鵝不食草蕓薹紫蘇甑帶何首烏皆能伏硼砂同砒石煆過有變化主治消痰止嗽破瘕結喉痺大明上焦痰熱生津液去口氣消障翳除噎膈反胃積塊結瘀肉陰㿉骨哽惡瘡及口齒諸病時珍發明頌曰今醫家用硼砂治咽喉最為要切宗奭曰含化咽津治喉中腫痛膈上痰熱初覺便治不能成喉痺亦緩取效可也時珍曰硼砂味甘微鹹而氣涼色白而質輕故能去胸膈上焦之熱素問云熱淫於內治以鹹寒以甘緩之是也其性能柔五金而去垢膩故治噎膈積聚骨哽結核惡肉陰㿉用之者取其柔物也治痰熱眼目障翳用之者取其去垢也洪邁夷堅志云鄱陽汪友良因食誤吞一骨哽于咽中百計不下恍惚夢一朱衣人曰惟南蓬砂最妙遂取一塊含化咽汁脫然而失此軟堅之徵也日華言其苦辛暖誤矣附方新十四鼻血不止硼砂一錢水服立止集簡方勞瘵有蟲硼砂硇砂兔屎等分為末蜜丸梧子大每服七丸生甘草一分新水一鍾揉汁送下自朔至望五更時令病人勿言服之韞乾坤祕木舌腫強硼砂末生薑片蘸楷少時即消普濟方咽喉穀賊腫痛蓬砂牙消等分為末蜜和半錢含咽直指方咽喉腫痛破棺丹用蓬砂白梅等分搗丸茨子大每噙化一丸經驗方喉痺牙疳盆砂末吹並擦之集簡方骨哽在咽方見發明小兒陰㿉腫大不消硼砂一分水研塗之大冇效集玄方飲酒不醉先服盆砂二錢妙相感志飲食毒物硼砂四兩甘草四兩真香油一斤瓶內浸之遇冇毒者服油一小盞久浸尤佳瑞竹堂經驗方一切惡瘡方同上弩肉瘀突南鵬砂黃色者一錢片腦少許研末燈草蘸點之直指方附録特蓬殺拾遺藏器曰味苦寒無毒主折傷內損瘀血煩悶欲死者酒消服之南人毒箭中人及深山大蝮傷人速將病者頂上十字釐之出血水藥末傅之并傅傷處當上下出黃水數升則悶解俚人重之以竹筒盛帶于腰以防毒箭亦主惡瘡熱毒癰腫赤白遊風瘻蝕等瘡並水和傅之出賀州山內石上似碎石硇砂之類石硫黃本經中品釋名硫黃吳普黃硇砂藥性黃牙陽侯綱目將軍時珍曰硫秉純陽火石之精氣而結成性質通硫色賦中黃故名硫黃含其猛毒為七十二石之將故藥品中號為將軍外家謂之陽侯亦曰黃牙又曰黃硇砂集解别録曰石硫黃生東海牧牛山谷中及大行河西山礬石液也普曰或生易陽或生河西或五色黃是潘水石液也燒金有紫熖八月九月采𢎞景曰東海郡屬北徐州而箕山亦有今第一出湖南林邑色如鵝子初出殼者名崑崙黃次出外國從蜀中來色深而煌煌此云礬石液今南方則無礬石恐不必爾珣曰廣州記云生崑崙國及波斯國西方明之境顆塊瑩淨不夾石者良蜀中雅州亦出之光膩甚好功力不及舶上來者頌曰今惟出南海諸畨嶺外州郡或有而不甚佳鵝黃者名崑崙黃赤色者名石亭脂青色者名冬結石半白半黑者名神驚石並不堪入藥又有一種水硫黃出廣南及資州溪澗水中流出以茅收取熬出號真珠黃氣腥臭止入瘡藥亦可煎煉成汁以模寫作器亦如鵝子黃色時珍曰凡産石硫黃之處必冇溫泉作硫黃氣魏書云盤盤國冇火山山旁皆焦溶流數十里乃凝堅即石硫黃也張華博物志云西域硫黃出且彌山去髙昌八百里有山髙數十丈晝則孔中狀如煙夜則如燈光庚辛玉册云硫黃有二種石硫黃生南海琉球山中土硫黃生於廣南以嚼之無聲者為佳舶上倭硫黃亦佳今人用配消石作烽燧煙火為軍中要物修治斆曰凡使勿用青赤色及半白半青半赤半黑者自有黃色內瑩淨似物命者貴也凡用四兩先以龍尾蒿自然汁一鎰東流水三鎰紫背天葵汁一鎰粟逐子莖汁四件合之攪令勻入坩鍋內用六乙泥固濟底下將硫黃碎之入鍋中以前汁旋旋添入火煮汁盡為度再以百部末十兩栁蚛末二斤一簇草二斤細銼以東流水同硫黃煮二伏時取出去諸藥用熟甘草湯洗了入鉢研二萬匝用時珍曰凡用硫黃入丸散用須以蘿蔔剜空入硫在內合定稻粳火煨熟去其臭氣以紫背浮萍同煮過消其火毒以皂莢湯淘之去其黑漿一法打碎以絹袋盛用無灰酒煮三伏時用又消石能化硫為水以竹筒盛硫埋馬糞中一月亦成水名硫黃液氣味酸溫有毒别録曰大熱普曰神農黃帝雷公鹹有毒醫和扁鵲苦無毒權曰有大毒以黑錫煎湯解之及食冷豬血珣曰人能制伏歸本色服之能除百病如有發動宜豬肉鴨羮餘甘子湯並解之葛洪曰四黃惟陽侯為尊金石煆煉者不可用惟草木制伏者堪入藥用桑灰益母紫荷波稜天鹽桑白皮地骨皮車前馬鞭草黃蘗何首烏石葦蕎麥獨帚地榆蛇牀兔絲萞麻蠶砂或灰或汁皆可伏之之才曰曽青為之使畏細辛飛廉朴消鐵醋玄夀先生曰硫是礬之液礬是鐵之精慈石是鐵之母故鐵砂慈石制入硫黃立成紫粉獨孤淹曰硫能乾汞見五金而黑得水銀則色赤也主治婦人陰蝕疽痔惡血堅筋骨除頭秃能化金銀銅鐵竒物本經療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部􅀈瘡止血殺疥蟲别録治婦人血結吳普下氣治腰腎久冷除冷風頑痺寒熱生用治疥癬鍊服主虛損泄精甄權壯陽道補筋骨勞損風勞氣止嗽殺臟蟲邪魅大明長肌膚益氣力老人風祕並宜鍊服李珣主虛寒久痢滑泄霍亂補命門不足陽氣暴絶隂毒傷寒小兒慢驚時珍發明𢎞景曰俗方用治腳弱及痼冷甚效仙經頗用之所化竒物並是黃白術及合丹法頌曰古方未有服餌硫黃者本經所用止於治瘡蝕攻積聚冷氣腳弱等而近世遂火煉治為常服丸散觀其治煉服食之法殊無本源非若乳石之有論議節度故服之其效雖緊而其患更速可不戒之土硫黃辛熱腥臭止可治疥殺蟲不可服宗奭曰今人治下元虛冷元氣將絶久患寒泄脾胃虛弱垂命欲盡服之無不效中病當便已不可盡劑世人蓋知用而為福而不知其為禍此物損益兼行故也如病熱危急可加丸數服少則不效仍加附子乾薑桂好古曰如太白丹來復丹皆用硫黃佐以消石至陽佐以至陰與仲景白通湯佐以人尿豬膽汁大意相同所以治內傷生冷外胃暑熱霍亂諸病能去格拒之寒兼有伏陽不得不爾如無伏陽只是陰虛更不必以陰藥佐之何也硫黃亦號將軍功能破邪歸正返滯還清挺出陽精消陰化魄時珍曰硫黃秉純陽之精賦大熱之性能補命門真火不足且其性雖熱而疏利大腸又與躁澀者不同蓋亦救危妙藥也但煉制久服則有偏勝之害况服食者又皆假此縱欲自速其咎於藥何責焉按孫升談圃云硫黃神仙藥也每嵗三伏日餌百粒去臟腑積滯有驗但硫黃伏生於石下陽氣溶液凝結而就其性大熱火煉服之多發背疽方勺泊宅編云金液丹乃硫黃煉成純陽之物有痼冷者所宜令夏至人多服之反為大患韓退之作文戒服食而晚年服硫黃而死可不戒乎夏英公有冷病服硫黃鍾乳莫之紀極竟以壽終此其稟受與人異也洪邁夷堅志云唐與正亦知醫能以意治疾吳巡檢病不得溲臥則微通立則不能涓滴遍用通利藥不效唐問其平日自制黑錫丹常服因悟曰此必結砂時硫飛去鉛不死鉛砂入膀胱臥則偏重猶可溲立則正塞水道故不通取金液丹三百粒分為十服煎瞿麥湯下鉛得硫氣則化纍纍水道下病遂愈硫之化鉛載在經方茍無變通豈能臻妙類編云仁和縣一吏早衰齒落不已一道人令以生硫黃入豬臟中煮熟搗丸或入蒸餅丸梧子大隨意服之飲啖倍常步履輕捷年踰九十猶康健後醉牛血遂洞泄如金水尫悴而死內醫官管範云豬肪能制硫黃此用豬臟尤妙王樞使亦常服之附方舊八新四十一硫黃杯此杯配合造化調理陰陽奪天地沖和之氣乃水火既濟之方不冷不熱不緩不急有延年却老之功脫胎換骨之妙大能清上實下升降陰陽通九竅殺九蟲除夢泄悅容顔解頭風開胸膈化痰涎明耳目潤肌膚添精髓蠲疝墜又治婦人血海枯寒赤白帶下其法用瓷碗以胡桃擦過用無砂石硫黃生溶成汁入明礬少許則塵垢悉浮以杖掠去綿濾過再入碗溶化傾入杯內蕩成杯取出埋土中一夜木賊打光用之欲紅入硃砂欲青則入葡蔔研勻同煮成每用熱酒二杯清早空心溫服則百病皆除無出此方也紫霞杯葉石林水雲録云用硫黃袋盛懸􅀈內以紫背浮萍同水煮之數十沸取出候乾研末十兩用珍珠琥珀乳香雄黃硃砂羊起石赤石脂片腦紫粉白芷甘松三奈木香血竭沒藥韶腦安息香各一錢麝香七分金薄二十片為末入銅杓中慢火溶化以好樣酒杯一箇周圍以粉紙􅊶裹中開一孔傾硫入內旋轉令勻投冷水中取出每旦盛酒飲二三杯功同上方昔中書劉景輝因遘勞瘵於大白山中遇一老仙親授是方服之果愈人能清心寡欲而服此仙緣可到也金液丹固真氣暖丹田堅筋骨壯陽道除久寒痼冷補勞傷虛損治男子腰腎久冷心腹積聚脅下冷痛腹中諸蟲失精遺尿形羸力劣腰膝痛弱冷風頑痺上氣衄血咳逆寒熱霍亂轉筋虛滑下利又治痔瘻濕􅉶生瘡下血不止及婦人血結寒熱隂蝕疽痔等用石硫黃十兩研水用瓷盒盛以水和赤石脂封口鹽泥固濟日乾地內先埋一小罐盛水令滿安盒在內用泥固濟慢火養七日七夜候足加頂火一斤煆俟冷取出研末每一兩用蒸餅一兩水寒浸為丸如梧子大每服三十丸空心米飲服又治傷身冷脈微或吐或利或自汗不止或小便不禁併宜服之得身熱脈出為度惠民和劑局方暖益腰膝王方平通靈玉粉散治腰膝暖水臟益顔色其功不可具載硫黃半斤桑柴灰五斗淋取汁煮三伏時以鐵匙抄于火上試之伏火即止候乾以大火煆之如未伏更􅀈以伏為度煆了研末穿地坑一尺二寸投水於中待水清取和硫末坩鍋內煎如膏鐵錢抄出細研飯丸麻子大每空心鹽湯下十丸極有效驗鄉人王昭遂服之年九十顔貌如童子力倍常人杜光庭王函方風毒腳氣痺弱硫黃末三兩鎾乳五升􅀈沸入水煎至三升每服三合又法牛乳三升煎一升半以五合調硫黃末一兩服厚蓋取汗勿見風未汗再服將息調理數日更服北人用此多效亦可煎為丸服肘后方陰證傷寒極冷厥逆煩躁腹痛無脈危極甚者舶上硫黃為末艾湯服三錢就得睡汗出而愈本事方陰陽二毒黑龍丹用舶上硫黃一兩栁木槌研二三日巴豆一兩和殼計箇數用三升鐺子一口將硫鋪底安豆於上以釅米醋半斤澆之盞子緊合定醋紙固縫頻以醋潤之文武火熬候豆作聲可一半為度急將鐺子離火即便入臼中搗細再以醋和茶腳洗鐺中藥入臼旋下蒸餅搗丸雞頭子大若是陰毒用椒四十九粒蔥白二莖水一盞煎六分熱吞下一丸陽毒用豆䜴四十九粒蔥白一莖水一盞煎同前吞下不得嚼破經五六日方可服之若未傳入或未及日數不可服有孕婦人吐瀉亦可服濟博方一切冷氣積塊作痛硫黃熖消各四兩結砂青皮陳皮各四兩為末糊丸梧子大每空心米飲下三十丸鮑氏方元臟久冷腹痛虛泄裏急玉粉丹用生硫黃五兩青鹽一兩細研以蒸餅丸緑豆大每服五丸空心熱酒下以食壓之經驗方元臟冷泄腹痛虛極硫黃一兩黃蠟化丸梧子大每服五丸新汲水下一加青鹽二錢蒸餅和丸酒下普濟方氣虛暴泄日夜三二十行腹痛不止夏月路行備急最妙朝真丹用硫黃二兩枯礬半兩研細水浸蒸餅丸梧子大硃砂為衣每服十五丸至二十丸溫水下或鹽湯任下孫尚藥祕寶方伏暑傷冷二氣交錯中脘痞結或泄或嘔或霍亂厥逆二氣丹硫黃消石等分研末石器炒成沙再研糯米糊丸梧子大每服四十丸新井水下濟生方傷暑吐瀉硫黃滑石等分為末每服一錢米飲下即止救急良方霍亂吐瀉硫黃一兩胡椒五錢為末黃蠟一兩化丸皂子大每涼水下一丸聖濟録小兒吐瀉不拘冷熱驚吐反胃一切吐利諸治不效者二氣散用硫黃半兩水銀二錢半研不見星每服一宇至半錢生薑水調下其吐立止或同炒結砂為丸方見靈砂下錢氏小兒方反胃嘔吐方見水銀脾虛下白脾胃虛冷停水滯氣凝成白涕下出舶上硫黃一兩研末炒麵一分同研滴冷熱水丸梧子大每米湯下五十丸楊子建護命方下痢虛寒硫黃半兩箆麻仁七箇為末糊丸梧子大每服十五丸米飲下指南方腸風下血方見鯽魚老人冷祕風祕或泄瀉暖元臟除積冷溫脾胃進飲食治心腹一切痃癖冷氣硫黃栁木槌研細半夏湯七次焙研等分生薑自然汁調蒸餅和杵百下丸梧子大每服十五丸至二十丸空心溫酒或薑湯下婦人醋湯下和劑局方久瘧不止鮑氏方用硫黃硃砂等分為末每服二錢臘茶清發日五更服當日或大作或不作皆其效也寒多倍硫熱多倍砂朱氏方用硫黃臘茶等分為末發日早冷水服二錢二服效寒多加硫熱多加茶酒鱉氣鱉嗜酒任氣血凝于氣則為氣鱉嗜酒痼冷敗血入酒則為血鱉搖頭掉尾大者如鱉小者如錢上侵人喉下蝕人肛或附脅背或隱腸腹用生硫黃末老酒調常服之直指方咳逆打厄硫黃燒煙噢之立止醫方摘要頭痛頭風如神丹光明硫黃消石各一兩細研水丸芡子大空心嚼一丸茶下普濟方腎虛頭痛聖惠方用硫黃一兩胡粉為末飯丸梧子大痛時冷水服五丸即止本事方用硫黃末食鹽等分水調生麵糊丸梧子大每薄荷茶下五丸子普濟方用生硫黃六錢烏藥四錢為末蒸餅丸梧大每服三五丸食後茶清下鼻上作痛上品硫黃末冷水調搽淡寮方酒皶赤鼻生硫黃半兩杏仁二錢輕粉一錢夜夜搽之為瑞竹堂方用舶上硫黃雞心檳榔等分片腦少許末絹色日日擦之加箆麻油更妙鼻面紫風乃風熱上攻陽明經絡亦治風刺癮疹舶上硫黃白礬枯等分為末每以黃丹少許以津液和塗之一月見效宣明方身面疣目蠟紙卷硫黃末少許點之焠之有聲自去普濟方癧瘍風病白色成片以布拭醋摩硫黃附子塗之或硫黃白礬擦之集驗方小兒聤耳硫黃末和蠟作挺插之日二易千金方小兒口瘡糜爛生硫黃水調塗手心足心效即洗去危氏得效方耳卒聲閉硫黃雄黃等分研末綿裹塞耳數日即聞人語也千金方諸瘡弩肉如蛇出數寸硫黃末一兩肉上簿之即縮聖惠方癰疽不合石硫黃粉以筯蘸押入孔中以瘥為度外臺祕要一切惡瘡真君妙神散用好硫黃三兩蕎麥粉二兩為末井水和揑作小餅日乾收之臨用細研新汲水調傅之痛者即不痛不痛則即痛而愈方坦仙皆效疥瘡有蟲硫黃末以雞子煎香油調搽極效救急良方頑癬不愈傾過銀有蓋罐子入硫黃一兩溶化取起冷定打開取硫同益研末搽之孫氏集效方癘風有蟲硫黃末酒調少許飲汁或加大風子油更好直指方女子陰瘡硫黃末傅之瘥乃止肘后方玉門寬冷硫黃煎水頻洗心傳方小兒夜啼硫黃二錢半鉛丹二兩研勻瓶固煆過埋土中七日取出飯丸黍米大每服二丸冷水下普濟方陰濕瘡疱硫黃傅之日三梅師方石硫赤别録有名未用釋名石亭脂圖經石硫丹𢎞景石流芝集解别録曰理如石者生山石間普曰生羌道山谷時珍曰此即硫黃之多赤者名石亭脂而近世通呼硫黃為石亭脂亦未考此也按抱朴子云石流丹石之赤精石硫黃之類也浸溢于涯岸之間其濡濕者可丸服堅結者可散服五嶽皆有而箕山為多許由巢父服之即石硫芝是矣氣味苦溫無毒主治婦人帶下止血輕身長年别録壯陽除冷治瘡殺蟲功同硫黃時珍附方新二赤鼻作痛紫色石亭脂紅色次之黃色勿用研末冷水調搽半月絶根聖濟録風濕腳氣石亭脂生用一兩川烏頭生一兩無名異二兩為末蔥白自然汁和丸梧子大每服一錢空心淡茶生蔥吞下日一服瑞竹堂方石硫青别録有名未用釋名冬結石别録曰生武都山石間青白色故名時珍曰此硫黃之多青色者蘇頌圖經言石亭脂冬結石並不堪入藥未深考此也氣味酸溫無毒主治療泄益肝氣明目輕身長年别録治瘡殺蟲功同硫黃時珍附録硫黃香拾遺藏器曰味辛溫無毒去惡氣殺蟲似硫黃而香云出毗南國在扶南南三十里礬石本經上品校正併入海藥波斯礬嘉祐栁絮礬釋名涅石綱目羽涅本經羽澤别録煅枯者名巴石輕白者名栁絮礬時珍曰礬者燔也燔石而成也山海經云女牀之山其陰處多涅石郭璞注云礬石也楚人名涅石秦人名為羽涅集解别録曰礬石生河西山谷及隴西武都石門采無時能使鐵為銅𢎞景曰今出益州北部西川從河西來色青白生者名馬齒礬煉成純白名白礬蜀人以當消石其黃黑者名雞屎礬不入藥用惟堪鍍作以合熟銅投苦酒中塗鐵皆作銅色外雖銅色內質不變恭曰礬石有五種白礬多入藥用青黑二礬療疳及瘡黃礬亦療瘡生肉兼染皮絳礬本來緑色燒之乃絳故名絳礬頌曰礬石初生皆石也采得燒碎煎煉乃成礬也凡有五種其色各異白礬黃礬緑礬黑礬絳礬也今白礬出晉州慈州無為州入藥及染人所用甚多黃礬丹竈家所須亦入藥黑礬惟出西戎亦謂之皂礬染鬚髸藥用之亦染皮用緑礬入咽喉口齒藥及染色絳礬燒之則赤今亦稀見又有礬精礬蝴蝶巴石栁絮礬皆是白礬也煉白礬時候其極沸盤心有濺溢如物飛出以鐵匕接之作蟲形者礬蝴蝶也但成塊光瑩如水精者礬精也三者入藥力緊于常礬其煎煉而成輕虛如綿絮者栁絮礬其燒汁至盡色白如雪者謂之巴石珣曰波斯大秦所出白礬色白而瑩淨內有束針文入丹竈家功力逾於河西石門者近日文州諸畨往往有之波斯又出金線打破內有金線文者為上多入燒煉家用時珍曰礬石折而辨之不止於五種也白礬方士謂之白君出晉地者上青州吳中者次之潔白者雪礬光明者為明礬亦名雲母礬文如束針狀如粉撲者為波斯白礬並入藥為良黑礬鉛礬也出晉地其狀如黑泥者為崑崙礬其狀如赤石脂有金星者為鐵礬其狀如紫石英火引之成金線盡力上即紫赤色者為波斯紫礬並不入服餌藥惟丹竈及瘡家用之緑礬絳礬黃礬俱見本條其雜色者則有雞屎礬鴨屎礬雞毛礬粥礬皆下品亦入外丹家用修治斆曰凡使白礬石以瓷瓶盛於火中煆令內外通赤用鉗揭起蓋旋安石蜂巢入內燒之每十兩用巢六兩燒盡為度取出放冷研粉以紙裹安五寸深土坑中一宿取用又法取光明如水晶酸鹹澀味全者研粉以瓷瓶用六一泥泥之待乾入粉三升在內旋旋入五方草紫背天葵各捶汁一鎰待汁乾蓋了瓶口更泥上下用火一百斤煆之從已至末去火取出其色如銀研如輕粉用之時珍曰今人但煅乾汁用謂之枯礬不煆者為生礬若入服食須循法度按九鼎神丹祕訣煉礬石入服食法用新桑合槃一具於密室淨掃以火燒地令熱灑水於上或灑苦酒于上乃布白礬於地上以槃覆之四面以灰擁定一日夜其石精皆飛于槃上掃取收上未盡者更如前法數遍乃止此為礬精若欲作水即以掃下礬精一斤納三年苦酒一斗中清之號曰礬華百日彌佳若急用之七日亦可氣味酸寒無毒普曰神農岐伯酸久服傷人骨扁鵲鹹雷公酸無毒權曰嗇涼有小毒之才曰甘草為之使惡牡蠣畏麻黃獨孤滔曰紅心灰藋制礬主治寒熱泄痢白沃陰蝕惡瘡目痛堅骨齒煉餌服之輕身不老增年本經除固熱在骨髓去鼻中息肉别録除風去熱消痰止渴暖水臟治中風失音和桃仁蔥湯浴可出汗大明生含咽津治急喉痺療鼻衄齆鼻鼠漏瘰癧疥癬甄權枯礬貼嵌甲牙縫中血出如衄宗奭吐下痰涎飲澼燥濕解毒追涎止血定痛食惡肉生好肉治癰疽疔腫惡瘡癲癎疸疾通大小便口齒眼目諸病虎犬蛇蠍百蟲傷時珍波斯白礬海藥氣味酸澀溫無毒主治赤白漏下陰蝕泄痢瘡疥解一切毒蛇蟲等去自赤暴腫齒痛火煉之良李珣栁絮礬嘉祐氣味同礬石主治消痰止渴潤心肝大明發明𢎞景曰俗中合藥火熬令燥以療齒痛多則壞齒即傷骨之説也而經云堅骨齒誠為可疑宗奭曰不可多服損心肺却水故也水化書紙上乾則水不能濡故知其性却水也治膈下涎藥多用者此意爾時珍曰礬石之用有四吐利風熱之痰延取其酸苦涌泄也治諸血痛脫肛陰挺瘡瘍取其酸澀而收也治痰飲泄痢崩帶風眼取其收而燥濕也治喉痺癰疽中蠱蛇蟲傷螫取其解毒也按李迅癰疽方云凡人病癰疽發背不問老少皆宜服黃礬丸服至一兩以上無不作效最止疼痛不動臟腑活人不可勝數用明亮白礬一兩生研以好黃蠟七錢溶化和丸梧子大每服十丸漸加至二十丸熟水送下如末破則內消已破即便合如服金石發瘡者引以白礬末一二匙溫酒調下亦三五服見效有人遍身生瘡狀如蛇頭服此亦效諸方俱稱竒效但一日中服近百粒則有力此藥不惟止痛生肌能防毒氣內攻護膜止瀉托裏化膿之功甚大服至半斤尤佳不可欺其淺近要知白礬大能解毒也今人名為蠟礬九用之委有效驗附方舊二十六新六十中風痰厥四肢不收氣閉膈塞者白礬一兩牙皂角五錢為末每服一錢溫水調下吐痰為度陳師古方胸中痰澼頭痛不欲食礬石一兩水二升煮一升納蜜半合頻服須臾大吐未吐飲少熱湯下之外臺祕要風痰癎病化痰丸生白礬一兩細茶五錢為末煉蜜丸如梧子大一嵗十丸茶湯下大人五十九久服痰自天便中出斷病根鄧事峯惟興小兒胎寒躽啼發癎白礬煆半日棗肉丸黍米大每乳下一九愈乃止最良保幼大全産後不語明氏孤鳯散用生白礬末一錢熟之調下日一婦人良方牙關緊急不開者白礬鹽化等分搽之涎出自開集簡方走馬喉痺用生白礬末塗於綿針上按於喉中立破綿針者用榆條上以綿立作棗大也儒門事親方喉癰乳蛾濟生帳帶散用礬三錢針銚內溶化入劈開巴豆三粒煎乾去豆研礬用之入喉立愈甚者以醋調灌之亦名通關散法製烏龍膽用白礬末盛入豬膽中風乾研末每吹一錢入喉取涎出妙咽喉穀賊腫痛生礬石未少少點腫處吐涎以癢為度聖惠方風熱喉痛白礬半斤研末化水新磚一片浸透取晒又浸又晒至水乾入糞厠中浸一月取洗安陰處待霜出掃收每服半錢水下普濟方懸癰垂長咽中煩悶白礬燒灰鹽花等分為末筯頭頻點在癰上去涎孫用和祕寶方小兒舌膜初生小兒有白膜皮裹舌或遍舌根可以指甲刮破令血出以燒礬末半緑豆許傅之若不摘去其兒必啞姚和衆至寶方牙齒腫痛白礬一兩燒灰大露蜂房一兩微炙每用二錢水煎含潄去涎簡要濟衆方患齒碎壞欲盡者常以綿裏礬石含嚼吐去汁肘后方齒斷血出不止礬石一兩燒水三升煮一升含潄千金方木舌腫強白礬桂心等分為末安舌下聖惠方大陰口瘡生甘草二寸白礬一粟大噙之咽津活法機要口舌生瘡下虛上壅定齋方用白礬泡湯濯足分張子和方用白礬末黃丹水飛炒等研擦之小兒鵝口滿口白爛枯礬一錢朱砂二分為末每以少許傅之日三次神驗普濟方小兒舌瘡飲乳不得白礬和雞子置醋中塗兒足底二七日愈千金方口中氣臭明礬入麝香為末擦牙上生生編衄血不止枯礬末吹之妙聖濟方鼻中息肉千金用礬燒末豬脂和綿裏塞之數日息肉隨藥出一一方用明礬一兩箆麻仁七箇鹽梅肉五箇麝香字杵丸錦裹塞之化水自下也眉毛脫落白礬十兩燒研蒸餅丸梧子大每空心溫水下七丸日加一丸至四十九日減一丸周而復始以愈為度聖濟録發斑怪證有人眼赤鼻張大喘渾身出斑毛髮如銅鐵乃熱毒氣結于下焦也白礬滑石各一兩為末作一服水三碗煎減半不住服盡即安夏子益竒疾方目翳弩肉白礬石納黍米大入目令淚出日日用之惡汁去盡其疾日減外臺祕要目生白膜礬石一升水四合銅器中煎半合入少蜜調之以綿濾過每日點三四度姚和衆延齡至寶方赤目風腫甘革水磨明礬傅眼胞上效或用枯礬頻擦睂心集簡方爛弦風眼白礬煅一兩銅青三錢研末湯泡澄清點洗永類方聤耳出汁枯礬一兩鉛丹炒一錢為末日吹之聖濟録卒死壯熱礬石半斤水一斗半煮湯浸腳及踝即得蘇也肘后方腳氣衝心白礬三兩水一斗五升煎沸浸洗千金方風濕膝痛腳氣風濕虛汗少力多痛及陰汗燒礬末一匙頭投沸湯淋洗痛處御藥院方黃腫水腫椎車丸用明礬二兩青礬一兩白麵半斤同炒令赤以醋煮米粉糊為丸棗湯下三十九濟急方女勞黃疸黃家日晡發熱而反惡寒膀胱急少腹滿日盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也自大勞大熱交接后入水所致腹滿者難治用礬石燒消石熬黃等分為散以大麥粥汁和服方寸匕日三服病從大小便去正黃大便正黑是其候也張仲景金匱方婦人黃疸經水不調房事觸犯所致白礬黃蠟各半兩陳橘皮三錢為末化蠟丸梧子大每服五十丸以滋血湯或調經湯下濟陰方婦人白沃經水不利子臟堅僻中有乾血下白物用礬石燒杏仁一分研勻煉蜜丸棗核大納入腸中日一易之張仲景金匱方婦人陰脫作癢礬石燒研空心酒服方寸匕日三千金翼男婦遺尿枯白礬牡蠣粉等分為末每服方寸匕溫酒下日三服竒余居士選方二便不通白礬末填滿臍中以新汲水滴之覺冷透腹內即自然通臍平者以紙圍環之經驗方霍亂吐瀉枯白礬末一錢百沸湯調下華他危病方伏暑泄瀉玉華丹白礬煆為末醋糊為丸量大小用本瓜湯下經驗方老人泄瀉不止枯白礬一兩訶黎勒煨七錢半為末米飲服二錢取愈大平聖惠方赤白痢下白礬飛過為末好醋飛羅麵為丸梧子大赤痢甘草湯白痢乾薑湯下生生方氣痢不止巴石丸取白礬一大斤以炭火淨地燒令汁盡其色如雪謂之巴石取一兩研末熟豬肝作丸梧子大空腹量人加減水牛肝更佳如素食人以蒸餅為丸或云白礬中青黑者名巴石劉禹錫傳信方冷勞泄痢食少諸藥不效白礬三兩燒羊肝一具去脂釅醋三升煮爛擂泥和丸梧子大每服二十丸米飲下早夜各一服普濟方泄瀉下痢白龍丹用明礬枯過為末飛羅麵醋打糊丸梧子大每服二三十丸白痢薑湯下赤痢甘草湯泄瀉米湯下經驗方瘧疾寒熱即上方用東南桃心七箇煎湯下反胃嘔吐白礬硫黃各二兩銚內燒過入硃砂一分為末麵糊丸小豆大每薑湯下十五丸心又方白礬枯三兩蒸餅丸梧子大每空米飲服十五丸普濟方化痰治嗽明礬二兩生參末一兩苦醋二升熬為膏子以油紙包收旋丸豌豆大每用一丸放舌下其嗽立止痰即消下定西侯方只用明礬末醋糊丸梧子大每睡時茶二三十丸摘要用明礬半生半燒山巵子炒黑等分為末薑汁糊為丸如上服丸雜興方用白明礬建茶等分為末糊服諸心氣痛儒門事親方用生礬一皂子大醋一盞煎七分服立止末邵真人方用明礬一兩燒硃砂一錢金箔三箇為每服一錢半空心白湯下中諸蟲毒晉礬建茶等分為末新汲水調服二錢瀉吐即效未吐再服方濟生蛇蟲諸毒毒蛇射工沙虱等傷人口噤日黑手足直毒氣入腹白礬甘草等分為末冷水服二錢錢瑞竹堂方馬汗毒所傷瘡痛白礬飛過黃丹炒紫等分貼之王氏博濟方虎犬傷人礬末納入裹之止痛尤妙肘后方蛇蛟蠍螫燒刀矛頭令赤置白礬於上汁出熱滴之立瘥此神驗之方也真元十三年冇兩僧流南方到鄧州俱為蛇囓令用此法便瘥更無他苦方劉禹錫傳信壁鏡毒人必死白礬塗之太平廣記刀斧金瘡白礬黃丹等分為末傅之最妙救急方折傷止痛白礬末一匙泡湯一碗帕蘸乘熱慰傷處少時痛止然後排整筋骨點藥靈苑方漆瘡作癢白礬湯拭之千金方牛皮癬瘡石榴皮蘸明礬末抹之切勿用醋即蟲沈下直指方小兒風疹作癢白礬燒投熱酒中馬尾揾酒塗之子母祕録小兒臍腫出汗不止白礬燒灰傅之聖惠方乾濕頭瘡白礬半生半煆酒調塗上生生編身面瘊子白礬地膚子等分煎水頻洗之多能鄙事腋下胡臭礬石絹袋盛之常粉腋下甚妙許堯臣方魚口瘡毒白礬枯研寒食麵糊調傅上即消救急良方陰瘡作臼取髙昌白礬麻仁等分研末豬脂和膏先以槐白皮煎湯洗過塗之外以楸葉貼上不過三度愈葛洪肘后方足瘡生蟲南方地卑濕人多患足瘡嵗久生蟲如蛭乃風毒攻注而然用牛或羊或豬肚屎不洗研如泥看瘡大小入煆過泥礬半兩已上研勻塗帛上貼之須臾癢入心徐徐連帛取下火上炙之蟲出絲髮馬尾千萬或青白赤黑以湯洗之三日一作不過數次蟲盡瘡愈南宫從岣嶁神書記嵌甲作瘡足趾甲入肉作瘡不可履靴礬石燒灰傅之蝕惡肉生好肉細細割去甲角旬日取愈此方神效肘后方雞眼肉刺枯礬黃丹朴消等分為末搽之次日浴二三次即愈多能鄙事冷瘡成漏明礬半生半飛飛者生肉生者追膿五靈芝水飛各半錢為末以皮紙裁條唾和末作小托子香油揑濕於末拖過剪作大小撚安入漏早安午換候膿出盡後有些小血出方得乾水住藥自然生肉痊好普濟方魚睛丁瘡枯礬末寒食麵糊調貼消腫無膿崔氏方丁瘡腫毒雪白礬末五錢蔥白煨熟搗和丸梧子大每服二錢五分以酒送下未效再服久病孕婦不可服衛生寶鎰癰疽腫毒方見前發明下陰汗濕癢枯礬撲之藥又泡湯沃洗御院方交接勞復卵腫或縮入腹痛欲絶礬石一分消三分大麥粥清服方寸匕日三服熱毒從二便出也肘后方女人陰痛礬石三分炒甘草末半方綿裹導之取瘥肘后百一方丁腫惡瘡二仙散用生礬黃丹臨時等分以三稜針刺血待盡傅之不過三上決愈乃太醫李管勾方衛生寶鑑蟲蛇獸毒及蟲毒生明礬明雄黃等分於端午日研末黃蠟和丸梧子大每服七丸念藥王菩薩七遍熟水送下方東坡良緑礬日華釋名皂礬綱目青礬煆赤者名絳礬唐本礬紅時珍曰緑礬可以染皂色故謂之皂礬又黑礬亦名皂礬不堪服食惟瘡家用之煆赤者俗名礬紅以别末紅集解頌曰緑礬出隰州溫泉縣池州銅陵縣並煎礬處生焉初生皆石也煎煉乃成其形似朴消而緑色取置鐵板上聚炭燒之礬沸流出色赤如金汁云者是真也沸定時汁盡則色如黃丹又有皂莢礬或即緑礬也恭曰緑礬新出窟未見風者正如琉璃色人以為石膽燒之赤色故名絳礬出瓜州者良時珍曰緑礬晉地河內西安沙州皆出之狀如熖消其中揀出深青瑩淨者即為青礬煆過變赤則為絳礬入圬墁及漆匠家多用之然貨者亦雜以沙土為塊昔人往往以青礬為石膽則誤矣氣味酸涼無毒主治疳及諸瘡蘇恭喉痺蟲牙口瘡惡瘡疥癬釀鯽魚燒灰服療腸風瀉血大明消積滯燥脾濕化痰涎除脹滿黃腫瘧利風眼口齒諸病時珍發明時珍曰緑礬酸涌澀收燥濕解毒化涎之功與白礬同而力差緩按張三丰仙傳方載伐木九云此方乃上清金蓬頭祖師所傳治脾土衰弱肝木氣盛木來尅土病心腹中滿或黃腫如土色服此能助土益元用蒼术二斤宋泔水浸二宿同黃酒麵麯四兩炒赤色皂礬一斤醋捽晒乾入瓶火煆為末醋糊丸梧子大每服三四十丸好酒宋湯任下日二三服時珍常以此方加平胃散治一賤役中滿腹脹果有效驗蓋此礬色緑味酸燒之則赤既能入血分伐木又能燥濕化涎利小便消食積故脹滿黃腫瘧痢疳疾方往往用之其源則自張仲景用礬石消石治女勞黃疸方中變化而來頌曰劉禹錫傅信方治喉痺用皂莢礬入好米醋同研含之咽汁立瘥此方出于李謨甚竒妙皂莢礬即緑礬也附方舊一新一十九重舌木舌皂礬二錢鐵上燒紅研摻之陸氏積德堂方喉風腫閉皂礬一斤末醋三斤拌晒乾吹之痰涎出盡用良薑末少許入茶內漱口咽之即愈孫氏集效方眼暴赤爛紅棗五箇入緑礬在內火煨熟以河水井水各一碗桃栁枝心各七箇煎稠每點少許入眥上摘玄方爛弦風眼青礬火煆出毒細研泡湯澄清點洗永類方倒睫拳毛方同上瘧疾寒熱礬紅獨蒜頭煨等分搗丸茨子大每白湯嚼下一丸端午日合之方普濟少陰瘧疾嘔吐緑礬一錢乾薑泡半夏薑製半兩為末每服半錢發日早以醋湯下録聖濟翻胃吐食白麵二斤半蒸作大饅頭一箇頭上開口剜空將皂礬填滿以新瓦圍注鹽泥封固穵土窟安放文武火燒一日夜取出研末棗肉為丸梧子大每服二十丸空心酒湯任下忌酒色要醫方摘大便不通皂礬一錢巴霜二箇同研入雞子內攪勻封頭濕紙裹煨熟食之酒下即通集玄方腸風下血積年不止虛弱甚者一服取效緑礬四兩入砂鍋內新瓦蓋定鹽泥固濟煅赤取出入青鹽生硫黃各一兩研勻再入鍋中固濟煅赤取出去火毒研入熱附子末一兩粟米粥糊丸梧子大每空心米飲溫酒任下三十丸永類方婦人血崩青鹽二兩輕粉一錢為末水丸梧子大每服二三十丸新汲水下摘玄方血證黃腫緑礬四兩百草霜一升炒麵半升為末沙糖和九梧子大每服三四十九食後薑湯下鄭時舉所傳又方小麥淘淨一斤皂礬半斤同炒黃為末黑棗肉半斤搗勻术醋打糊丸梧桐子大每薑湯下八九十丸日三服簡便方脾病黃腫青鹽四兩煆成赤珠子當歸四兩酒酻浸七日焙百草霜三兩為末以浸藥酒打糊丸梧子大每服五丸至七丸溫水下一月后黃去立效此方祖傳七世又方緑礬四兩百草霜五倍子各一兩木香一錢為末酒煎飛麵丸梧子大每空心酒下五凡又方平胃散青礬二兩為末醋糊丸米飲下或加烏沈湯四兩酒糊九亦可潔古活法機要酒黃水腫黃腫積痛青礬半斤醋一大盞和勻尾盆內煆乾為度平胃散烏藥順氣散各半兩為末醋煮糊丸梧子大每酒或薑湯下二三十丸不忌口加鍋灰方趙原楊真人濟急食勞黃病身目俱黃青礬鍋內安炭煆赤米醋拌為末棗肉和丸梧子大每服二三十丸食后薑湯下救急方腹中食積緑礬二兩研米醋一大碗瓷器煎之栁條攪成膏入赤腳烏一兩研丸緑豆大每空心溫酒下五丸聖惠方疳蟲食土及生物研緑礬末豬膽汁丸緑豆大每米飲下五七丸保幼大全小兒疳氣不可療者緑礬煆赤醋淬三次為末棗肉和丸緑豆大每服十丸溫水下日三集驗丸走馬疳瘡緑礬入鍋內炭火煆紅以醋拌勻如此三次為末入麝香少許溫漿水潄淨摻之談野翁試效方白秃頭瘡皂礬楝樹子燒研搽之普濟方小兒頭瘡絳礬一兩淡豉一兩炒黑膩粉二錢研勻以桑灰湯洗淨摻之良小兒甜瘡大棗去核填入緑礬燒存性研貼之拔萃方耳生爛瘡棗子去核包青礬煆研香油調傅之摘玄方蚰蜒入耳水調緑礬灌之普濟方蛆入耳中緑礬摻之即化為水摘玄方瘡中生蛆緑礬末摻貼即化為水摘玄方湯火傷灼皂礬和涼水澆之其疼即止腫亦消楊誠經驗方癬瘡作癢螺螄十四箇槿樹皮末一兩入碗內蒸熟入礬紅三錢搗勻搽之孫氏集效方甲疽延爛崔氏方治甲疽或因割甲傷肌或因甲長侵肉遂成瘡腫黃水浸淫相染五指俱爛漸上腳趺泡漿四邉起如火燒瘡日夜怪憎醫不能療緑礬石五兩燒至汁盡研末色如黃丹收之每以鹽湯洗拭用末厚傅之以軟帛暖裹當日即汁斷瘡乾每日一遍鹽湯洗濯有膿處使淨傅其痂乾處不須近但冇急痛處塗酥少許令潤五日即覺上痂起依前洗傅十日痂漸剝盡軟處或更生白膿泡即擦破傅之自然瘥也張侍郎病此臥經六十日京醫並處方無效得此法如神王燾外臺祕要婦人甲疽婦人趾甲內生瘡惡肉突出久不愈名臭田螺用皂礬日晒夜露每以一兩煎湯浸洗仍以礬末一兩加雄黃二錢硫黃一錢乳香沒藥各一錢研勻搽之醫方摘要塗染白髮緑礬薄荷烏頭等分為末以鐵漿水浸日染之相感志腋下胡氣緑礬半生半煆為末入少輕粉以半錢浴後薑汁調搽候十分熱痛乃止仁齋直指方黃礬綱目集解恭曰黃礬丹竈家所須亦入染皮用時珍曰黃礬出陜西瓜州沙州及舶上來者為上黃色狀如胡桐淚人於緑礬中揀出黃色者充之非真也波斯出者打破中冇金絲文謂之金線礬磨刀劍顯花文丹房鑑源云五色山脂吳黃礬也氣味酸澀鹹有毒主治療瘡生肉蘇恭野雞瘻痔惡瘡疥癬李珣治陽明風熱牙疼李杲附方新五聤耳出汁黃礬二兩燒枯綿裹二錢塞之聖惠方婦人頰瘡每年頻發水銀一兩半以豬脂揉擦令消盡入黃礬石末二兩胡粉一兩再加豬脂和令如泥洗瘡淨塗之别以胡粉塗膏上此甘家祕方也肘后方身上瘢痕黃礬石燒令汁盡胡粉炒令黃各八分細末以臘月豬脂和研如泥以生布揩令痛乃塗藥五度取鷹糞白燕窠巾草燒灰等分和人乳塗之其瘢自滅肉平如故方崔元亮海上集驗急疳蝕齒黃礬青礬半錢白礬燒一錢麝香一分為末傅之吐涎聖惠方妬精陰瘡黃礬青礬麝香等分為末傅之不過三度千金方湯瓶內鹼綱目集解時珍曰此煎湯瓶內澄結成水鹼如細砂者也主治止消渴以一兩為末粟米燒飯丸梧子大每人參湯下二十丸又小兒口瘡臥時以醋調末書十字兩足心驗時珍附方新二消渴引飲湯瓶內鹻葛根水萍焙等分每服五錢水煎服又方湯瓶內鹻菝葜根炒各一兩烏梅連核二兩焙為散每服二錢水一盞石器煎七分溫呷日一服聖濟録附録諸石二十七種時珍曰别録有名未用諸石及諸家所列而不詳難以類附者通附於此云石脾别録有名未用曰味甘無毒主胃中寒熱益氣令人有子一名胃石一名膏石一名消石生隱蕃山谷石間黑如大豆有赤文色微黃而輕簿如碁子采無時𢎞景曰皇甫士安言消石取石脾與消石以水煮之一斛得三斗正白如雪以水投中即消故名消石按此説是取消石合煮成為真消石不知石脾是何物本草冇石脾石肺人無識者藏器曰石脾生西戎鹵地鹹水結成者時珍曰石脾乃生成者陶氏所説是造成者按九鼎神丹經云石脾乃陰陽結氣五鹽之精因礬而成峨嵋山多有之俗無識者故古人作成代用其法用白礬戎鹽各一斤為末取苦參水二升鐺中煮五沸下二物煎減半去滓熬乾色白如雪此為石脾也用石脾朴消􅉭消各一斤為末苦參水二斗銅鐺煎十沸入三物煮減半去滓煎著器中冷水漬一夜即成消石可化諸石為水此與焰消之消石不同皆非真也石肺别録曰味辛無毒主癘咳零久痿益氣明日生水中狀如覆肺黑澤有赤文出水即乾𢎞景曰今浮石亦療咳似肺而不黑澤非此也石肝别録曰味酸無毒主身癢令人色美生常山色如肝石腎别録曰味酸主泄痢色白如珠紫石華别録曰味甘平無毒主渴去小腸熱一名芘石華生中牟山陰采無時白石華别録曰味辛無毒主脾消渴膀胱熱生腋北鄉北邑山采無時黃石華别録曰味甘無毒主陰痿消渴隔中熱去百毒生腋北山黃色采無時黑石華别録曰味甘無毒主陰痿消渴去熱療月水不利生不其勞山陰石間采無時陵石别録曰味甘無毒主益氣耐寒輕身長年生華山其形薄澤時珍曰按聖濟録云汗後耳聾用陵石有竅如銀眼者為末每服一錢冷水下終石别録曰味辛無毒主陰痿痺小便難益精氣生陵陰采無時封石别録曰味甘無毒主消渴熱中女子疽蝕生常山及少室采無時時珍曰虎尾之山遊戲之山嬰疾之山豐山服山多封石即此遂石别録曰味甘無毒主消渴傷中益氣生太山陰采無時五羽石别録曰主輕身長年一名金黃生海水中蓬葭山中黃如金紫佳石别録曰味酸無毒主痺血氣一名赤英一名石血生邯鄲石如爵茈二月采𢎞景曰三十六水方呼為紫賀石火藥綱目時珍曰味辛酸冇小毒主瘡癬殺蟲辟濕氣溫疫乃熖消硫黃杉木炭所合以為烽燧鋭機諸藥者石耆别録曰味甘無毒主咳逆氣生石間色赤如鐵脂四月采馬肝石綱目時珍曰按郭憲洞冥記云郅支國進馬肝石百片青黑如馬肝以金函盛水銀飬之用拭白髮應手皆黑云和九轉丹吞一粒彌年不飢亦可作硯豬牙石綱目時珍曰明目去翳出西畨文理如象牙棗紅色碧霞石綱目時珍曰明日去翳障龍涎石綱目時珍曰主大風癘瘡出齊州一名龍仙石鉛光石綱目時珍曰主哽骨太陽石綱目時珍曰劉守真宣明方治逺年近日一切日疾方用太陽石太陰石碧霞石豬牙石何浴石寒水石紫石英代赭石菩薩石金精石銀精石禹餘石礬礦石雲母石爐甘石井泉石陽起石滑石烏賊骨青鹽銅青各一兩硇砂半兩蜜陀僧一兩鵬砂三錢乳香二錢麝香腦子一錢輕粉一錢半黃丹四兩各為末熊膽一斤白砂蜜二斤井華水九碗同熬至四碗點水內不散為度濾淨收點此方所用太陽石太陰石等多無考證姑附以此朵梯牙綱目時珍曰按周憲王普濟方眼科去翳用水飛朵梯牙火煆大海螺焥糖霜為末日點又方用可鐵刺一錢阿飛勇一錢李子樹膠四錢白雪粉八錢為末雞子白調作錠每以乳女兒汁磨點之又方安咱蘆出回回地面黑丁香即蠟糞海螵蛸各為末日點所謂朵梯牙碗糖霜安咱蘆可鐵刺阿飛勇皆不知何物也附録於此以俟白獅子石拾遺藏器曰主白虎病江東人呼為歷節風是也置此於病者前自愈亦厭伏之意也白虎糞神名狀如貓掃屎置門下令人病此療法以雞子揩病病人痛處呪願送於屎堆之頭上勿反顧鎮宅大石拾遺藏器曰主災異不起荆楚嵗時記十二月暮日掘宅四角各埋一大石為鎮宅又鴻寶萬畢術云埋丸石於宅四隅槌桃核七枚則鬼無能殃也神丹拾遺藏器曰味辛溫有小毒主萬病有寒溫飛金石及諸藥合成服之長生神仙煙藥拾遺藏器曰味辛溫冇毒主瘰癧五痔瘻瘞瘤瘡根惡種乃石黃主青桂心並四兩乾薑一兩為末置鐵片上燒之以豬脂塗碗覆之待藥飛上如此五度隨瘡大小似鼠屎大納孔中麵封之三度根出也無孔針破納之本草綱目卷十一
