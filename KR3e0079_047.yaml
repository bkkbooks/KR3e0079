body:
  text: 本草綱目卷十七上明李時珍撰草之六毒草類一十七種大黄本經下品釋名黄良本經將軍當之火參呉普膚如呉普𢎞景曰大黄其色也將軍之號當取其駿快也杲曰推陳致新如戡定禍亂以致太平所以有將軍之號集解别錄曰大黄生河西山谷及隴西二月八月采根火乾普曰生蜀郡北郡或隴西二月卷生黄赤其葉四四相當莖高三尺許三月花黄五月實黒八月采根根有黄汁切片隂乾𢎞景曰今采益州北部汶山及西山者雖非河西隴西好者猶作紫地錦色味甚苦濇色至濃黒西川隂乾者勝北部日乾亦有火乾者皮小焦不如西耐蛀堪久此藥至勁利粗者便不中服恭曰葉子莖並佀羊蹄但莖高六七尺而脆味酸堪生啖葉粗長而厚根紅者亦佀宿羊蹄大者乃如盌長二尺其性濕潤而易蛀壞火乾乃佳作時燒石使熱横寸截著石上煿之一日微燥以繩穿眼乾今出宕州涼州西羌蜀地者皆佳幽并以北者漸細氣力不及蜀中者陶言蜀地不及隴西誤矣藏器曰凡用當分别之若取和厚深沈能攻病者可用蜀中佀牛舌片緊硬者若取㵼洩駿快推陳去熱者當取河西錦文者頌曰今蜀川河東陜西州郡皆有之以蜀川錦文者佳其次秦隴來者謂之土畨大黄正月内生青葉佀蓖麻大者如扇根如芋大者如盌長一二尺其細根如牛蒡小者亦如芋四月開黄花亦有青紅佀蕎麥花者莖青紫色形如竹二八月采根去黑皮切作横片火乾蜀大黄乃作緊片如牛舌形謂之牛舌大黄二者功用相等江淮出者曰土大黄二月開花結細實時珍曰宋祁益州方物圖言蜀大山中多有之赤莖大葉根巨若盌藥市以大者為枕紫地錦文也今人以莊浪出者為最莊浪即古涇原隴西地與别錄相合正誤頌曰鼎州出一種羊蹄大黄治疥瘙甚效初生苗葉累年長大即葉佀商陸而狹尖四月内抽條出穗五七莖相合花葉同色結實如蕎麥而輕小五月熟即黄色呼為金蕎麥三月采苗五月采實隂乾九月采根破之亦有錦文亦呼為土大黄時珍曰蘇説即老羊蹄根也因其佀大黄故謂之羊蹄大黄實非一類又一種酸模乃山大黄也狀佀羊蹄而生山上所謂土大黄或指此非羊蹄也俱見本條根修治雷曰凡使細切以丈如水旋斑緊重者剉片蒸之從已至未晒乾又洒臘水蒸之從未至亥如此凡七次晒乾却洒淡蜜水再蒸一伏時其大黄必如烏膏様乃晒乾用藏器曰凡用有蒸有生有熟不得一㮣用之承曰大黄采時皆以火石煿乾貨賣更無生者用之亦不須更多炮炙蒸煮氣味苦寒無毒别錄曰大寒普曰神農雷公苦有毒扁鵲苦無毒李當之大寒元素曰味苦氣寒氣味俱厚沈而降隂也用之須酒浸煨熟者寒因熟用酒浸入太陽經酒洗入陽明經餘經不用酒杲曰大黄苦峻下走用之于下必生用若邪氣在上非酒不至必用酒浸引上至高之分驅熱而下如物在高巔必射以取之也若用生者則遺至高之邪熱是以愈後或目赤或㗋痺或頭腫或膈上熱疾生也時珍曰凡病在氣分及胃寒血虚并姙娠産後並勿輕用其性苦寒能傷元氣耗隂血故也之才曰黄芩為之使無所畏權曰忌冷水惡乾漆主治下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟本經平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結别錄通女子經候利水腫利大小腸貼熱腫毒小兒寒熱時疾煩熱蝕膿甄權通宣一切氣調血脈利關節泄壅滯水氣温瘴熱瘧大明瀉諸實熱不通除下焦濕熱消宿食瀉心下痞滿元素下痢赤白裏急腹痛小便淋瀝實熱燥結潮熱譫語黄疸諸火瘡時珍發明之才曰得芍藥黄芩牡蠣細辛茯苓療驚恚怒心下悸氣得消石紫石英桃仁療女子血閉宗奭曰張仲景治心氣不足吐血衂血瀉心湯用大黄黄芩黄連或曰心氣既不足而不用補心湯更用瀉心何也答曰若心氣獨不足則當不吐衂也此乃邪熱因不足而客之故令吐衂以苦泄其熱以苦補其心葢一舉而兩得之有是證者用之無不效惟在量其虚實而已震亨曰大黄苦寒善泄仲景用之瀉心湯者正因少隂經不足本經之陽亢甚無輔以致隂血妄行飛越故用大黄瀉去亢甚之火使之平和則血歸經而自安夫心之隂氣不足非一日矣肺與肝俱各受火而病作故黄芩救肺黄連救肝肺者隂之主肝者心之母血之合也肝肺之火既退則隂血復其舊矣冦氏不明説而云邪熱客之何以明仲景之意而開悟後人也時珍曰大黄乃足太隂手足陽明手足厥隂五經血分之藥凡病在五經血分者宜用之若在氣分用之是謂誅伐無過矣瀉心湯治心氣不足吐血衂血者乃真心之氣不足而手厥隂心包絡足厥隂肝足太隂脾足陽明胃之邪火有餘也雖曰瀉心實瀉四經血中之伏火也又仲景治心下痞滿按之軟者用大黄黄連瀉心湯主之此亦瀉脾胃之濕熱非瀉心也病發于隂而反下之則作痞滿乃寒傷營血邪氣乘虚結于上焦胃之上脘在于心故曰瀉心實瀉脾也素問云太隂所致為痞滿又云濁氣在上則生䐜脹是矣病發於陽而反下之則成結胸乃熱邪陷入血分亦在上脘分野仲景大陷胸湯丸皆用大黄亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則只用小陷胸湯痞滿在氣分則用半夏瀉心湯矣成無已註釋傷寒詢亦不知分别此義成無已曰熱淫所勝以苦泄之大黄之苦以蕩滌瘀熱下燥結而泄胃強頌曰本草稱大黄推陳致新其效最神故古方下積滯多用之張仲景治傷寒用處尤多古人用毒藥攻病必隨人之虛實寒熱而處置非一切輕用也梁武帝因發熱欲服大黄姚僧坦曰大黄乃是快藥至尊年高不可輕用帝弗從幾至委頓梁元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黄無瘥理帝從之遂愈以此言之今醫用一毒藥而攻衆病其偶中便謂此方神竒其差誤則不言用藥之失可不戒哉附方舊十四新三十七吐血衂血治心氣不足吐血衂血者瀉心湯主之大黄二兩黄連黄芩各一兩水三升煮一升熱服取利張仲景金匱玉函吐血刺痛川大黄一兩為散每服一錢以生地黄汁一合水半盞煎三五沸無時服簡要濟衆方傷寒痞滿病發於隂而反下之心下滿而不痛按之濡此為痞也大黄黄連瀉心湯主之大黄二兩黄連一兩以麻沸湯二升漬之須臾絞汁分作二次温服仲景傷寒論熱病譫狂川大黄五兩剉炒微赤為散用臘雪水五升煎如膏每服半匙冷水下聖惠方傷寒發黄方同上水氣壯者大黄一兩二升漬一宿平旦煎汁一升入芒消一兩緩服須臾當利下傷寒類要腰脚風氣作痛大黄二兩切如碁子和少酥炒乾勿令焦搗篩每用二錢空心以水三大合入薑三片煎十餘沸取湯調服當下冷膿惡物即痛止方崔元亮海上一切壅滯經騐方治風熱積壅化痰涎治痞悶消食化氣導血用大黄四兩牽牛子半炒生四兩為末煉蜜丸如梧子大每服十丸白湯下並不損人如要微利加一二十丸全衛生寳鑑用皂筴熬膏和丸名墜痰丸又名真丸金宣宗服之有騐賜名保安丸痰為百病滚痰丸治痰為百病惟水瀉胎前産後不可服用大黄酒浸蒸熟切晒八兩生黄芩八兩沈香半兩青礞石二兩以焰消二兩同入砂鑵固濟煅紅研末二兩右各取末以水和丸梧子大常服一二十丸小病五六十丸緩病七八十丸急病一百二十丸温水吞下即卧勿動候藥逐上焦痰滯次日先下糟粕次下痰涎未下再服王隱君歳合四十餘斤愈疾數萬也養生主論男女諸病無極丸治婦人經血不通赤白帶下崩漏不止腸風下血五淋産後積血癥瘕腹痛男子五勞七傷小兒骨蒸潮熱等證其效甚速宜六癸日合之用錦紋大黄一斤分作四分一分用童尿一盌食鹽二錢浸一日切晒一分用醇酒一盌浸一日切晒再以巴豆仁三十五粒同炒豆黄去豆不用一分用紅花四兩泡水一盌浸一日切晒一分用當歸四兩入淡醋一盌同浸一日去歸切晒為末煉蜜丸梧子大每服五十丸空心温酒下取下惡物為騐未下再服此武當高士孫碧雲方也醫林集要心腹諸疾三物備急丸治心腹諸疾卒暴百病用大黄巴豆乾薑各一兩搗篩蜜和搗一千杵丸小豆大每服三丸凡中客卒忤心腹脹滿痛如錐刀氣急口噤停尸卒死者以暖水或酒服之或灌之未知更服三丸腹中鳴轉當吐下便愈若口已噤者折齒灌之入喉即瘥此乃仲景方司空裴秀改為散用不及九也圖經本草腹中痞塊大黄十兩為散醋三升蜜兩匙和煎丸梧子大每服三十丸生薑湯下吐利為度外臺秘要腹脇積塊風化石灰末半斤瓦器炒極熱稍冷入大黄末一兩炒熱入桂心末半兩畧炒下米醋攪成膏攤布貼之貼又方大黄二兩朴消一兩為末以大蒜同搗膏和之或加阿魏一兩尤妙心丹溪法久患積聚二便不利上搶心腹脹滿害食大黄白芍各二兩為末水丸梧子大每湯下四十丸日三以知為度千金方脾癖疳積不拘大人小兒錦紋大黄三兩為末醋一盞沙鍋内文武火熬成膏傾瓦上日晒夜露三日再研用舶上硫黄一兩形如琥珀者官粉一兩同研勻十歳以下小兒半錢大人一錢半米飲下忌一切生冷魚肉只食白粥半月如一服不愈半月之後再服若不忌口不如勿服聖濟總錄小兒無辜閃癖瘰癧或頭乾黄聳或乍痢乍瘥諸狀多者大黄煎主之大黄九兩錦紋新實者若微朽即不中用削去皮搗篩為散以好米醋三升和置瓦盌中於大鐺内浮湯上炭火慢煮候至成膏可丸乃貯器中三嵗兒一服七九梧子大日再服以下出青赤膿為度若不下或下少稍稍加丸若下多又須減之病重者七八劑方盡根大人亦可用之此藥惟下宿膿不令兒利也須禁食毒物乳母亦禁之一加木香一兩半崔知悌方小兒諸熱大黄煨熟黄芩各一兩為末煉蜜丸麻子大每服五丸至十丸蜜湯下加黄連名三黄丸錢氏小兒方骨蒸積熱漸漸黄瘦大黄四分以童子小便五六合煎取四合去滓空腹分為二服如人行五里再服廣利方赤白濁淋好大黄為末每服六分以雞子一個破頂入藥攪勻蒸熟空心食之不過三服愈方簡便相火秘結大黄末一兩牽牛頭末半兩每服三錢有厥冷者酒服無厥冷五心煩蜜湯服集劉河間保命諸痢初起大黄煨熟當歸各二三錢壯人各一兩水煎服取利或加檳榔集簡方熱痢裏急大黄一兩浸酒半日煎服取利集簡方忽喘悶絶不能語言涎流吐逆牙齒動揺氣出轉大絶而復蘇名傷寒併熱霍亂大黄人參各半兩水二盞煎一盞熱服可安方危氏得效食已即吐胸中有火也大黄一兩甘草二錢半水一升煮半升温服匱仲景金玉函方婦人血癖作痛大黄三兩酒二升煮十沸頓服取利千金翼産後血塊大黄末一兩頭醋半升熬膏丸梧子大每服五丸温酒化下良久當下千金方乾血氣痛錦丸大黄酒浸晒乾四兩為末好醋一升熬成膏芡子大卧時酒化一丸服大便利一二行紅漏自下乃調經仙藥也或加香附董氏集騐方婦人嫁痛小户腫痛也大黄一兩酒一升煮一沸頓服千金方男子偏墜作痛大黄末和醋塗之乾則易梅師方濕熱眩運不可當者酒炒大黄為末茶清服二錢急則治其標也丹溪纂要小兒腦熱常欲閉目大黄一分水三合浸一夜一歳兒服半合餘者塗頂上乾即再上姚和衆至寳方暴赤目痛四物湯加大黄酒煎服之傳信適用方胃火牙痛口含氷水一口以紙撚蘸大黄末隨左右㗜鼻立止儒門事親風熱牙痛紫金散治風熱積壅一切牙痛去口氣大有竒效好大黄瓶内燒存性為末早晚楷牙潄去都下一家專貨此藥兩宮常以數千贖之其門如市也千金家藏方風蟲牙痛齦常出血漸至崩落口臭極效大黄米泔浸軟生地黄各旋切一片合定貼上一夜即愈未愈再貼忌説話恐引入風本事方口瘡糜爛大黄枯礬等分為末擦之吐涎聖惠方鼻中生瘡生大黄杏仁搗勻猪脂和塗為又方生大黄黄連各一錢麝香少許末生油調搽方聖惠仙茅毒發舌脹出口方見仙茅下傷損瘀血三因方雞鳴散治從高墜下木石壓傷及一切傷損瘀凝積痛不可忍並以此藥推陳致新大黄酒蒸一兩杏仁去皮三七粒細研酒一盌煎六分雞鳴時服至曉取下瘀血即愈和濟方治跌壓瘀血在内脹滿大黄當歸等分炒研每服四錢温酒服取下惡物愈打撲傷㾗瘀血滚注或作潮熱者大黄末薑汁調塗一夜黒者紫二夜紫者白也瀕湖集簡方杖瘡腫痛大黄末醋調塗之童尿亦可調醫方摘𤣥金瘡煩痛大便不利大黄黄芩等分為末蜜丸先食水下十丸日三服千金方凍瘡破爛大黄末水調塗之衛生寳鑑湯火傷灼莊浪大黄生研蜜調塗之不惟止痛又且減瘢此乃金山寺神人所傳方洪邁夷堅志灸瘡飛蝶因艾灸訖火痂便退瘡内鮮肉片飛如蝶形而去痛不可忍是火毒也大黄朴消各半兩為末水服取利即愈張杲醫説蠼螋咬瘡大黄末塗之醫説火丹赤腫遍身者大黄磨水頻刷之急救方腫毒初起大黄五倍子黄蘖等分為末新汲水調塗日四五次簡便方癰腫焮熱作痛大黄末醋調塗之燥即易不過數易即退甚驗神方也肘后方乳癰腫毒金黄散用川大黄粉草各一兩為末好酒熬成膏收之以絹攤貼瘡上仰卧仍先以温酒服一大匙明日取下惡物婦人經騐方大風癩瘡大黄煨一兩皂莢刺一兩為末每服方寸匕空心温酒下取出惡毒物如魚腦狀未下再服即取下如亂髮之蟲取盡乃服雄黄花蛇藥名通天再造散十便良方葉氣味酸寒無毒主治置薦下辟虱蟲相感志商陸本經下品釋名蓫􅛅音逐湯當陸開寳章栁圖經白昌開寳馬尾廣雅夜呼本經時珍曰此物能逐蕩水氣故曰蓫䓪訛為商陸又訛為當陸北音訛為章栁或云枝枝相值葉葉相當故曰當陸或云多當陸路而生也集解别錄曰商陸生咸陽川谷如人形者有神恭曰此有赤白二種白者入藥用赤者見鬼神甚有毒保昇曰所在有之葉大如牛舌而厚脆赤花者根赤白花者根白二月八月采根日乾頌曰俗名章栁根多生於人家園圃中春生苗高三四尺青葉如牛舌而長莖青赤至柔脆夏秋開紅紫花作朶根如蘿葡而長八九月采之爾雅謂之蓫􅛅廣雅謂之馬尾易經謂之莧陸斆曰一種赤昌苗葉絶相類不可服之有傷筋骨消腎之毒惟花白年多者仙人采之作脯可下酒也時珍曰商陸昔人亦種之為蔬取白根及紫色者擘破作畦栽之亦可種子根苗莖並可洗蒸食或用灰汁煮過亦良服丹砂乳石人食之尤利其赤與黄色者有毒不可食按周憲王救荒本草云章栁幹粗似雞冠花幹微有線楞色微紫赤極易生植根修治斆曰取花白者根銅刀刮去皮薄切以東流水浸兩宿漉出架甑蒸以黑豆葉一重商陸一重如此蒸之從午至亥取出去豆葉暴乾剉用無豆葉以豆代之氣味辛平有毒别錄曰酸權曰甘有大毒忌犬肉大明曰白者苦冷得大蒜良赤者有毒能伏硇砂砒石雌黄拔錫恭曰赤者但可貼腫服之傷人痢血不已殺人令人見鬼神張仲景曰商陸以水服殺人杲曰商陸有毒陽中之隂其味酸辛其形類人其用療水其效如神主治水腫疝瘕痺熨除癰腫殺鬼精物本經療胸中邪氣水腫痿痺腹滿洪直䟽五臟散水氣别錄瀉十種水病喉痺不通薄切醋炒塗喉外良甄權通大小腸瀉蠱毒墮胎㶸腫毒傅惡瘡大明發明𢎞景曰方家不甚用惟療水腫切生根雜鯉魚煮作湯服道家乃散用之及煎釀服皆能去尸蟲見鬼神其實子亦入神藥花名䓪花尤良頌曰古方術家多用之亦可單服五月五日采根竹􅓕盛掛屋東北角隂乾百日搗篩井華水調服云神仙所秘法也時珍曰商陸苦寒沈也降也隂也其性下行専於行水與大㦸甘遂葢異性而同功胃氣虛弱者不可用方家治腫滿小便不利者以赤根搗爛入射香三分貼于臍心以帛束之得小便利即腫消又治濕水以指盡肉上隨散不成文者用白商陸香附子炒乾出火毒以酒浸一夜日乾為末每服三錢米飲下或以大蒜同商陸煮汁服亦可其莖葉作蔬食亦治腫疾嘉謨曰古讃云其味酸辛其形類人療水貼腫其效如神斯言盡之矣附方舊九新六濕氣脚軟樟栁根切小豆大煮熟更以綠豆同煮為飯每日食之以瘥為度最效斗門方水氣腫滿外臺秘要用白商陸根去皮切如豆大一大盞以水二升煮一升更以粒米一大盞同煮成粥每日空心服之取微利不得雜食千金髓用白商陸六兩取汁半合和酒半升看人與服當利下水取效升梅師方用白商陸一升羊肉六兩水一斗煮取六去滓和葱豉作臛食之腹中暴癥有物如石痛刺啼呼不治百日死多取商陸根搗汁或蒸之以布藉腹上安藥勿覆冷即易晝夜勿息孫真人千金方痃癖如石在脇下堅硬生商陸根汁一升杏仁一兩浸去皮搗如泥以商陸汁絞杏泥火煎如餳每服棗許空腹熱酒服以利下惡物為度聖惠方産後腹大堅滿喘不能卧白聖散用樟栁根三兩大㦸一兩半甘遂炒一兩為末每服二三錢熱湯調下大便宣利為度此乃主水聖藥也潔古保命集五尸注痛腹痛脹急不得喘息上攻心胸旁攻兩脇痛或磥塊涌起用商陸根熬以囊盛更互熨之取效肘後方小兒痘毒小兒將痘發熱失表忽作腹痛及膨脹弩氣乾霍亂由毒氣與胃氣相搏欲出不得出也以商陸根和葱白搗傅臍上斑止痘出方免無虞摘𤣥方耳卒熱腫生商陸削尖納入日再易聖濟錄喉卒攻痛商陸切根炙熱隔布熨之冷即易立愈圖經本草瘰癧喉痺攻痛生商陸根搗作餅置癧上以艾炷于上炙三四壯良外臺秘要一切腫毒商陸根和鹽少許搗傅日再易之方孫真人千金石癰如石堅硬不作膿者生商陸根搗擦之燥即易取軟為度亦治濕漏諸癤張文仲方瘡傷水毒商陸根搗炙布裹熨之冷即易之千金方􅛅花主治人心昏塞多忘喜卧取花隂乾百日搗末日暮水服方寸匕乃卧思念所欲事即於眠中醒悟也蘇頌狼毒本經下品釋名時珍曰觀其名知其毒矣集解别錄曰狼毒生秦亭山谷及奉高二月八月采根隂乾陳而沈水者良𢎞景曰宕昌亦出之乃言止有數畝地生蝮蛇食其根故為難得亦用太山者今用出漢中及建平云與防葵同根但置水中沈者是狼毒浮者是防葵俗用亦稀為療腹内要藥耳恭曰今出秦州成州秦亭原在二州之界秦隴地寒元無蝮蛇此物與防葵都不同類生處又别太山漢中亦不聞有陶説謬矣志曰狼毒葉似商陸及大黄莖葉上有毛根皮黄肉白以實重者為良輕者為力劣秦亭在隴西奉高是太山下縣陶云沈者是狼毒浮者是防葵此不足為信假使防葵秋冬采者堅實得水皆沈狼毒春夏采者輕虛得水皆浮且二物全别不可比類此與麻黄橘皮半夏枳實呉茱萸為六陳也保昇曰根似𤣥參惟虛浮者為劣也頌曰今陜西州郡及遼石州亦有之狀如馬志所説時珍曰狼毒出秦晉地今人往往以草䕡茹為之誤矣見䕡茹下也根氣味辛平有大毒大明曰苦辛有毒之才曰大豆為之使宜醋炒惡麥句薑畏古斯蜜陀僧也主治欬逆上氣破積聚飲食寒熱水氣惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸本經除胸下積僻别錄治痰飲癥瘕亦殺鼠大明合野葛納耳中治聾抱朴子附方舊四新六心腹連痛作脹用狼毒二兩附子半兩搗篩蜜丸梧子大一日服一丸二日二丸三日三丸止又從一丸起至三丸止以瘥為度肘後方九種心痛一蟲二蛀三風四悸五食六飲七冷八熱九氣也又治連年積冷流注心胸及落馬墮車瘀血中惡等證九痛丸用狼毒炙香呉茱萸湯泡巴豆去心炒取霜乾薑炮人參各一兩附子泡去皮三兩為末煉蜜丸梧子大每空心温酒下一丸和劑局方腹中冷痛水穀隂結心下停痰兩脇痞滿按之鳴轉逆害飲食用狼毒三兩附子一兩旋覆花三兩搗末蜜丸梧子大每服三丸食前白湯下日三服肘後方隂疝欲死丸縮入腹急痛欲死狼毒四兩防風二兩附子三兩燒以蜜丸梧子大每服三丸日夜三度白湯下方肘后兩脇氣結方同腹中冷痛方一切蟲病川狼毒杵末每服一錢用餳一皂子大沙糖少許以水化開卧時空腹服之次早即下蟲也集效方乾濕蟲疥狼毒不拘多少搗爛以猪油馬油調搽患處方睡勿以被蒙頭恐藥氣傷面此維揚潘氏所傳方簡氏經騐方積年疥癩狼毒一兩一半生研一半炒硏輕粉三合水銀三錢以茶末少許於瓦器内以津液擦化為末同以清油浸藥高一寸三日待藥沈油清遇夜不見燈火燕油塗瘡上仍以口鼻於藥盞上吸氣取效永類方積年乾癬生痂搔之黄水出每逢隂雨即痒用狼毒末塗之聖恵方惡疾風瘡狼毒秦芃等分為末每服方寸匕温酒下日一二服千金方防葵本經上品釋名房苑别錄梨葢本經利茹呉普又名爵離方葢農果恭曰根葉似葵花子根香味似防風故名防葵集解别錄曰防葵生臨淄川谷及嵩高太山少室三月三日采根暴乾普曰莖葉如葵上黒黄二月生根根大如桔梗根中紅白六月花白七月八月實白三月采根恭曰此物亦稀有襄陽望楚山東及興州西方有之興州者乃勝南者為隣蜀地也頌曰今惟出襄陽地他郡不聞也其葉似葵每莖三葉一本十數莖中發一幹其端開花如葱花景天輩而色白六月開花即結實根似防風香味亦如之依時采者乃沈水今乃用枯朽狼毒當之極為謬矣時珍曰唐時隴西成州貢之蘇頌所説詳明可據正誤𢎞景曰防葵今用建平者本與狼毒同根猶如三建其形亦相似但置水中不沈爾而狼毒陳久者亦不能沈矣斆曰凡使防葵勿誤用狼毒緣真相似而騐之有異效又不能切須審之恐誤人疾其防葵在葵州沙上中生采得二十日便生蟲用之惟輕為妙恭曰狼毒與防葵都不同類生處亦别藏器曰二物一是上品善惡不同形質又别陶氏以浮沈為别後人因而用之將以防葵破堅積為下品之物與狼毒同功今古因循遂無甄别殊為謬誤根修治斆曰凡使須揀去蟲末用甘草湯浸一宿漉出暴乾用黄精自然汁一二升拌了土器中炒至汁盡用氣味辛寒無毒别錄曰甘苦普曰神農辛寒桐君扁鵲無毒岐伯雷公黄帝辛苦無毒權曰有小毒主治疝瘕腸洩膀胱熱結溺不下欬逆濕瘖癲癎驚邪狂走久服堅骨髓益氣輕身本經療五臟虚氣小腹支䐽臚脹口乾除腎邪強志中火者不可服令人恍惚見鬼别錄久服主邪氣驚狂蘇恭主痃癖氣塊膀胱宿水血氣瘤大如盌者悉能消散治鬼瘧百邪鬼魅精怪通氣甄權發明時珍曰防葵乃神農上品藥黄帝岐伯桐君雷公扁鵲呉普皆言其無毒獨别錄言中火者服之令人恍惚見鬼陳延之小品方云防葵多服令人迷惑恍惚如狂按難經云重陽者狂脱陽者見鬼是豈上品養性所宜乎是豈寒而無毒者乎不然則本經及蘇恭所列者是防葵功用而别錄所列者乃似防葵之狼毒功用非防葵也狼毒之亂防葵其來亦逺矣不可不辨古方治蛇瘕鼈瘕大方中多用防葵皆是狼毒也附方舊一新二腫滿洪大防葵研末温酒服一刀圭至二三服身瞷及小不仁為效肘后方癲狂邪疾方同上傷寒動氣傷寒汗下後臍左有動氣防葵散用防葵一兩木香黄芩柴胡各半兩每服半兩水一盞半煎八分温服雲岐子保命集狼牙本經下品釋名牙子本經狼齒别錄狼子别錄犬牙呉普抱牙呉普支蘭李當之𢎞景曰其牙似獸之齒牙故有諸名集解别錄曰狼牙生淮南川谷及寃句八月采根暴乾中濕腐爛生衣者殺人普曰葉青根黄赤六七月華八月實黒正月八月采根保昇曰所在有之苗似蛇苺而厚大深綠色根黒若獸之牙三月八月采根日乾頌曰今江東汴東州郡多有之時珍曰范子計然云出建康及三輔色白者善根氣味苦寒有毒别錄曰酸普曰神農黄帝苦有毒桐君辛岐伯雷公扁鵲苦無毒之才曰蕪荑為之使惡地榆棗肌主治邪氣熱氣疥瘙惡瘍瘡痔去白蟲本經治浮風瘙痒煎汁洗惡瘡甄權殺腹臟一切蟲止赤白痢煎服大明附方舊六新四金瘡出血狼牙草莖葉熟搗貼之肘后方小便溺血金粟狼牙草焙乾入蚌粉炒槐花百藥煎等分為末每服三錢米泔空心調服亦治酒病衛生易簡方寸白諸蟲狼牙五兩搗末蜜丸麻子大隔宿不食明旦以漿水下一合服盡即瘥外臺秘要蟲瘡瘙癢六月以前采狼牙葉以後用根生㕮咀以木葉裹之煻火炮熟於瘡上熨之冷即止楊炎南行方小兒隂瘡狼牙草濃煮汁洗之千金方婦人隂癢狼牙二兩蛇牀子三兩煎水熱洗外臺秘要婦人隂蝕瘡爛者狼牙湯用狼牙三兩水四升煮取半升以筯纒綿浸湯瀝洗日四五遍張仲景金㡭玉函聤耳出汁狼牙研末綿裹日塞之聖惠方毒蛇傷螫獨莖狼子根或葉搗爛臘猪脂和塗立瘥崔氏方射工中人有瘡狼牙冬取根夏取葉搗汁飲四五合并傳之千金方䕡茹本經下品釋名離婁别錄掘据音結居白者名草䕡茹時珍曰䕡茹本作藘蕠其根牽引之貌掘据當作拮据詩云子手拮据手口共作之狀也集解别錄曰䕡茹生代郡川谷五月采根隂乾黒頭者良普曰草高四五尺葉圓黄四四相當四月華五月實黑根黄有汁亦黄色三月采葉四月五月采根𢎞景曰今第一出高麗色黄初斷時汁出凝黑如漆故云漆頭次出近道名草䕡茹色白皆燒鐵爍頭令黒以當漆非真也頌曰今河陽淄齊州亦有之二月生苗葉似大㦸而花黄色根如蘿蔔皮赤黄肉白初斷時汁出凝黒如漆三月開淺紅花亦淡黄色不箸子陶隱居謂出高麗者此近之又有一種草䕡茹色白古方兩用之故姚僧坦治癰疽生惡肉有白䕡茹散傅之看肉盡便停止但傅諸膏藥若不生肉又傅黄茋散惡肉仍不盡者可以漆頭赤皮䕡茹為散半錢和白䕡茹散三錢和傅之觀此則赤白皆可用也時珍曰范子計然云藘茹出武都黄色者善草䕡茹出建康白色今亦處處有之生山原中春初生苗高二三尺根長大如蘿蔔蔓菁壯或有岐出者皮黄赤肉白色破之有黄漿汁莖葉如大㦸而葉長微濶不甚尖折之有白汁抱莖有短葉相對團而出尖葉中出莖莖中分二三小枝二三月開細紫花結實如豆大一顆三粒相合生青熟黒中有白仁如續隨子之狀今人往往皆呼其根為狼毒誤矣狼毒葉似商陸大黄輩根無漿汁根氣味辛寒有小毒别錄曰酸普曰神農辛岐伯酸鹹有毒李當之大寒之才曰甘草為之使惡門冬主治蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不寐本經去熱痺破癥瘕除息肉别錄發明宗奭曰治馬疥尤善服食方用至少時珍曰素問治婦人血枯痛用烏鰂骨藘茹二物丸服方見烏鰂魚下王氷言藘茹取其散惡血又齊書云郡王子隆年二十身體過充徐嗣伯合藘茹丸服之自消則藘茹亦可服食但要斟酌爾孟詵必効方治甲疽生于脚趾邊腫爛用䕡茹三兩黄茋二兩苦酒浸一宿以猪脂五合合煎取膏三合日三塗之即消又聖惠方治頭風旋眩䲭頭丸中亦用之附方舊二新二緩疽腫痛䕡茹一兩為散温水服二錢匕聖惠方傷寒咽痛毒攻作腫真䕡茹爪甲大納口嚼汁嚥之當微覺為佳張文仲備急方中焦熱痞善忘不禁䕡茹二分甘草炙二兩消石為末每服一錢雞鳴時温酒下以知為度聖惠方疥瘡瘙癢䕡茄末入輕粉香油調傅之多能鄙事大㦸本經下品釋名卭鉅爾雅下馬仙綱目時珍曰其根辛苦㦸人咽喉故名今俚人呼為下馬仙言利人甚速也郭璞注爾雅云蕎卭鉅即大㦸也集解别錄曰大㦸生常山十二月采根隂乾保昇曰苗似甘遂而高大葉有白汁花黄根似細苦參皮黄肉黄白五月采苗二月八月采根用頌曰近道多有之春生紅芽漸長叢高一尺以來葉似初生楊栁小團三月四月開黄紫花團圓似杏花又似蕪荑根似細苦參秋冬采根隂乾淮甸出者莖圓高三四尺葉黄莖至心亦如百合苗江南生者葉似芍藥時珍曰大㦸生平澤甚多直莖高二三尺中空折之有白漿葉長狹如栁葉而不團其梢葉宻攅而上杭州紫大㦸為上江南土大㦸次之北方綿大㦸色白其根皮柔韌如綿甚峻利能傷人弱者服之或至吐血不可不知根修治斆曰凡使勿用附生者誤服令人洩氣不禁即煎薺苨湯解之采得後于槐砧上細剉與海芋葉拌蒸從已至申去芋葉晒乾用時珍曰凡采得以漿水煮軟去骨晒乾用海芋葉麻而有毒恐不可用也氣味苦寒有小毒别錄曰甘大寒權曰苦辛有大毒元素曰苦甘辛隂中微陽㵼肺損真氣時珍曰得棗即不損脾之才曰反甘草用菖蒲解之恭曰畏菖蒲蘆葦鼠屎大明曰赤小豆為之使惡薯預主治蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆本經頸腋癰腫頭痛發汗利大小便别錄瀉毒藥泄天行黄病温瘧破癥結大明下惡血癖塊腹内雷鳴通月水墮胎孕甄權治隱疹風及風毒脚腫並煮水日日熱淋取愈蘇頌發明成無已曰大㦸甘遂之苦以泄水者腎所主也好古曰大㦸與甘遂同為泄水之藥濕勝者苦燥除之也時珍曰痰涎之為物隨氣升降無處不到入于心則迷竅而成癲癎妄言妄見入于肺則塞竅而成欬唾稠粘喘急背冷入于肝則留伏蓄聚而成脇痛乾嘔寒熱往來入于經絡則麻痺疼痛入于筋骨則頸項胸背腰脇手足牽引隱痛陳無擇三因方並以控涎丹主之殊有竒效此乃治痰之本痰之本水也濕也得氣與火則凝滯而為痰為飲為涎為涕為癖大㦸能泄臟腑之水濕甘遂能行經隧之水濕白芥子能散皮裏膜外之痰氣惟善用者能收竒功也又錢仲陽謂腎為真水有補無瀉而復云痘瘡變黑歸腎一證用百祥膏下之以瀉腎非瀉腎也瀉其腑則臟自不實愚按百祥惟用大㦸一味大㦸能行水故曰瀉其腑則臟自不實腑者膀胱也竊謂百祥非獨瀉腑正實則瀉其子也腎邪實而瀉其肝也大㦸味苦濇浸水色青綠肝膽之藥也故百祥膏又治𠻳而能吐青綠水夫青綠者少陽風木之色也仲景亦云心下痞滿引脇下痛乾嘔短氣者十棗湯主之其中亦有大㦸夫乾嘔脇痛非肝膽之病乎則百祥之瀉肝膽也明矣肝乃東方宜瀉不宜補况瀉青瀉黄皆瀉其子同一瀉也何獨腎只瀉腑乎潔古老人治變黑歸腎證用宣風散代百祥膏亦是瀉子之意蓋毒勝火熾則水益涸風挾火勢則土受虧故津血内竭不能化膿而成青黒乾陷之證瀉其風火之毒所以救腎扶脾也或云脾虚腎旺故瀉腎扶脾者非也腎之真水不可瀉瀉其陷伏之邪毒爾附方新一十一百祥膏治𠻳而吐青綠水又治痘瘡歸腎紫黒乾陷不發寒者宜下之不黒者慎勿下紅芽大㦸不拘多少隂乾漿水煮極軟去骨日乾復納原汁盡焙為末水丸粟米大每服一二十丸研赤脂麻湯下結潔古活法機要棗變百祥丸治痘瘡變黒大便閉用大㦸一兩棗三枚水一盌同煮暴乾去大㦸以棗肉焙丸服從少至多以利為度控涎丹治痰涎留在胸膈上下變為諸病或頸項胸背腰脇手足胯髀隱痛不可忍筋骨牽引釣痛走易及皮膚麻痺似乎癱瘓不可誤作風氣風毒及瘡疸施治又治頭痛不可舉或睡中流涎或欬唾喘息或痰迷心竅並宜此藥數服痰涎自失諸疾尋愈紫大㦸白甘遂白芥子微炒各一兩為末薑汁打麫糊丸梧子大每服七丸或二十丸以津液嚥下若取利則服五六十丸三因方水腫喘急小便濇及水蠱大㦸炒二兩乾薑炮半兩為散每服三錢薑湯下大小便利為度聖濟總錄水病腫滿不問年月淺深大㦸當歸橘皮各一兩切以水二升煮取七合頓服利下水二三升勿怪至重者不過再服便瘥禁毒食一年永不復作此方出張尚客集李絳兵部手水氣腫脹大㦸一兩廣木香半兩為末五更酒服一錢半取下碧水後以粥補之忌鹹物酒簡便方用大㦸燒存性研末每空心服一錢匕水腫腹大如鼓或遍身浮腫用棗一斗入鍋内以水浸過用大㦸根苗葢之瓦盆合定煮熟取棗無時食之棗盡决愈又大㦸散用大㦸白牽牛木香等分為末每服一錢以猪腰子一對批開慘末在内濕紙煨熟空心食之左則塌左右則塌右張潔古活法機要牙齒揺痛大㦸咬於痛處良生生編中風發熱大㦸苦參四兩白酢漿一斗煮熟洗之寒乃止千金方澤漆本經下品釋名漆莖本經貓兒眼睛草綱目綠葉綠花草綱目五鳳草𢎞景曰是大㦸苗生時摘葉有白汁故名澤漆亦嚙人餘見下集解别錄曰澤漆大㦸苗也生太山川澤三月三日七月七日采莖葉隂乾大明曰此即大㦸花也川澤中有莖梗小花黄色葉似嫩菜五月采之頌曰今冀州鼎州明州及近道皆有之時珍曰别錄陶氏皆言澤漆是大㦸苗日華子又言是大㦸花其苗可食然大㦸苗洩人不可為菜今考土宿本草及寳藏論諸書並云澤漆是貓兒眼睛草一名綠葉綠花草一名五鳳草江湖原澤平陸多有之春生苗一科分枝成叢柔莖如馬齒莧綠葉如苜蓿葉葉圓而黄綠頗似貓睛故名貓兒眼莖頭凡五葉中分中抽小莖五枝每枝開細花青綠色復有小葉承之齊整如一故又名五鳳草綠葉綠花草掐莖有白汁粘人其根白色有硬骨或以此為大㦸苗者誤也五月采汁煮雄黄伏鍾乳結草砂據此則澤漆是貓兒眼睛草非大㦸苗也今方家用治水蠱脚氣有效尤與神農本文相合自漢人集别錄誤以為大㦸苗故諸家襲之爾用者宜審莖葉氣味苦微寒無毒别錄曰辛大明曰冷有小毒之才曰小豆為之使惡薯蕷主治皮膚熱大腹水氣四肢面目浮腫丈夫隂氣不足本經利大小腸明目輕身别錄主蠱毒蘇恭止瘧疾消痰退熱大明發明時珍曰澤漆利水功類大㦸故人見其莖有白汁遂誤以為大㦸然大㦸根苗皆有毒洩人而澤漆根硬不可用苗亦無毒可作菜食而利丈夫隂氣盛不相侔也附方舊二新六肺欬上氣脈沈者澤漆湯主之澤漆三斤以東流水五斗煮取一斗五升去滓入半夏半升紫參白前生薑各五兩甘草黄芩人參桂心各三兩煎取五升每服五合日三服張仲景金匱要畧方心下伏瘕大如盃不得食者澤漆四兩大黄葶藶熬三兩搗篩蜜丸梧子大每服二丸日三服葛洪肘後方十腫水氣澤漆十斤夏月取嫩莖葉入水一斗研汁約二斗於銀鍋内慢火熬如稀餳入瓶内收每日空心温酒調下一匙以愈為度聖惠方水氣蠱病生鮮貓眼睛草晒乾為末棗肉丸彈子大每服二丸白湯化下日二服覺腹中暖小便利為度乾坤秘韞脚氣赤腫行步脚痛貓兒眼睛草鷺鷥藤蜂窠等分每服一兩水五碗煎三碗薰洗之簡衛生易方牙齒疼痛貓兒眼睛草一搦研爛湯泡取汁含潄吐涎衛生易簡方男婦瘰癧貓兒眼睛草一二綑井水二桶五月五日午時鍋内熬至一桶去滓澄清再熬至一碗瓶收每以椒葱槐枝煎湯洗瘡浄乃搽此膏數次愈便民圖纂方癬瘡有蟲貓兒眼睛草晒乾為末香油調搽之衛生易簡方甘遂本經下品釋名甘藁别錄陵藁呉普陵澤别錄甘澤呉普重澤别錄苦澤呉普白澤呉普主田别錄鬼醜呉普時珍曰諸名義多未詳集解别錄曰甘遂生中山川谷二月采根隂乾普曰八月采𢎞景曰中山在代郡第一本出太山江東比來用京口者大不相似赤皮者勝白皮者都下亦有名草甘遂殊惡葢贋偽者也恭曰甘遂苗似澤漆其根皮赤肉白作連珠實重者良草甘遂乃是蚤休療體全别苗亦不同俗名重臺葉似鬼臼蓖麻根皮白色大明曰西京者上汴滄呉者次之形似和皮甘草節頌曰今陜西江東亦有之苗似澤漆莖短小而葉有汁根皮赤肉白作連珠大如指頭根修治斆曰凡采得去莖於槐砧上細剉用生甘草湯薺苨自然汁二味攪浸三日其水如黒汁乃漉出用東流水淘六七次令水清為度漉出于土器中熬脆用之時珍曰今人多以麫煨熟用以去其毒氣味苦寒有毒别錄曰甘大寒普曰神農桐君苦有毒岐伯雷公甘有毒元素曰純陽也之才曰𤓰蒂為之使惡逺志反甘草主治大腹疝瘕腹滿面目浮腫留飲宿食破癥堅積聚利水穀道本經下五水散膀胱留熱皮中痞熱氣腫滿别錄能瀉十二種水疾去痰水甄權瀉腎經及隧道水濕脚氣隂囊腫墜痰迷癲癎噎膈痞塞時珍發明宗奭曰此藥專于行水攻决為用元素曰味苦氣寒苦性泄寒勝熱直達水氣所結之處乃泄水之聖藥水結胸中非此不能除故仲景大陷胸湯用之但有毒不可輕用時珍曰肾主水凝則為痰飲溢則為腫脹甘遂能泄腎經濕氣治痰之本也不可過服但中病則止可也張仲景治心下留飲與甘草同用取其相反而立功也劉河間保命集云凡水腫服藥未全消者以甘遂末塗腹遶臍令滿内服甘草水其腫便去又王璆百一選方云脚氣上攻結成腫核及一切腫毒用甘遂末水調傳腫處即濃煎甘草汁服其腫即散二物相反而感應如此清流韓詠病脚疾用此一服病去七八再服而愈也附方舊三新一十九水腫腹滿甘遂炒二錢二分黑牽牛一兩半為末水煎時時呷之普濟方膜外水氣甘遂末大麥麵各半兩水和作餅燒熟食之取利聖濟總錄身面洪腫甘遂二錢生研為末以豶猪腎一枚分為七臠入末在内濕紙包煨令熟食之日一服至四五服當覺腹鳴小便利是其效也肘后方腎水流注腿膝攣急四肢腫痛即上方加木香四錢每用二錢煨熟温酒嚼下當利黄水為驗御藥院方傳正水脹急大小不利欲死甘草五錢半生半炒胭脂坏子十文研勻每以一錢白麫四兩水和作碁子大水煮令浮淡食之大小便利後用平胃散加熟附子每以二錢煎服普濟方小兒疳水珠子甘遂炒青橘皮等分為末三歳用一錢以麥芽湯下以利為度忌酸鹹三五日名水寳散總㣲論水蠱喘脹甘遂大㦸各一兩慢火炙研每服一字水半盞煎三五沸服不過十服聖濟錄水腫喘急大小便不通十棗丸用甘遂大㦸莞花等分為末以棗肉和丸梧子大每服四十丸侵晨熱湯下利去黄水為度否則次午再服方三因妊娠腫滿氣急小腹滿大小便不利已服猪苓散不瘥者用太山赤皮甘遂二兩搗篩白蜜和丸梧子大每服五十丸得微下仍服猪苓散不下再服之猪苓散見猪苓下小品方心下留飲堅滿脈伏其人欲自利反快甘遂半夏湯用甘遂大者三枚半夏十二個以水一升煮半升去滓入芍藥五枚甘草一節水二升煮半升去滓以蜜半升同煎八合頓服取利張仲景金匱玉函脚氣腫痛腎臟風氣攻注下部瘡痒甘遂半兩木鼈子仁四個為末猪腰子一個去皮膜切片用藥四錢摻在内濕紙包煨熟空心食之米飲下服後便伸兩足大便行後吃白粥二三日為妙本事方二便不通甘遂末以生麫糊調傅臍中及丹田内仍艾三壯飲甘草湯以通為度又太山赤皮甘遂末一兩煉蜜和勻分作四服日一服取利聖惠方小便轉脬甘遂末一錢猪苓湯調下立通筆峯雜興方疝氣偏腫甘遂茴香等分為末酒服二錢儒門事親婦人血結婦人少腹滿如敦狀小便微難而不渇此為水與血俱結在血室大黄二兩甘遂阿膠各一兩水一升半煮半升頓服其血當下張仲景方膈氣哽噎甘遂麪煨五錢南木香一錢為末壯者一錢弱者五分水酒調下怪病竒方痞證發熱盜汗胸背疼痛甘遂麪包漿水煮十沸去麪以細糠火炒黄為末大人三錢小兒一錢冷蜜水卧時服忌油膩魚肉普濟方消渴引飲甘遂麩炒半兩黄連一兩為末蒸餅丸綠豆大每薄荷湯下二丸忌甘草楊氏家藏方癲癎心風遂心丹治風痰迷心癲癎及婦人心風血邪用甘遂二錢為末以猪心取三管血和藥入猪心内縛定紙裏煨熟取末入辰砂末一錢分作四丸每服一丸將心煎湯調下大便下惡物為效不下再服生濟方馬脾風病小兒風熱喘促悶亂不安謂之馬脾風甘遂麪包煮一錢半辰砂水飛二錢半輕粉一角為末每服一字漿水少許滴油一小㸃抄藥在上沈下去漿灌之名無價散全幼心鑑麻木疼痛萬靈膏用甘遂二兩蓖麻子仁四兩樟腦一兩搗作餅貼之内飲甘草湯摘𤣥方耳卒聾閉甘遂半寸綿裹挿入兩耳内口中嚼少甘草耳卒自然通也永類方續隨子宋開寳釋名千金子開寳千兩金日華菩薩豆日華拒冬開寳聨步頌曰葉中出葉數數相續而生故名冬月始長故又名拒冬集解志曰續隨子生蜀郡處處亦有之苗如大㦸頌曰今南中多有北土産少苗如大㦸初生一莖莖端生葉葉中復出葉花亦類大㦸自葉中抽幹而生實青有殻人家園亭中多種以為飾秋種冬長春秀秋實時珍曰莖中亦有白汁可結水銀修治時珍曰凡用去殻取色白者以紙包壓去油取霜用氣味辛温有毒主治婦人血結月閉瘀血癥瘕痃癖除蠱毒鬼疰心腹痛冷氣脹滿利大小腸下惡滯物開寳積聚痰飲不下食嘔逆及腹内諸疾研碎酒服不過三顆當下惡物蜀本宣一切宿滯治肺氣水氣日服十粒瀉多以酸漿水或薄醋粥喫即止又塗疥癬瘡大明發明頌曰續隨下水最速然有毒損人不可過多時珍曰續隨與大㦸澤漆甘遂莖葉相似主療亦相似其功皆長于利水惟在用之得法亦皆要藥也附方舊二新四小便不通臍腹脹痛不可忍諸藥不效者不過再服用續隨子去皮一兩鈆丹半兩同少蜜搗作團瓶盛埋隂處臘月至春末取出研蜜丸梧子大每服二三十丸木通湯下化破尤妙病急亦可旋合聖濟錄水氣腫脹聨步一兩去殻研壓去油重研分作七服每治一人用一服丈夫生餅子酒下婦人荆芥湯五更服之當下利至曉自止後以厚朴湯補之頻喫益善忌鹽醋一百日乃不復作聨步即續隨子也斗門方陽水腫脹續隨子炒去油二兩大黄一兩為末酒水丸綠豆大每白湯下五十丸以去陳莝摘𤣥方涎積癥塊續隨子三十枚膩粉二錢青黛炒一錢研勻糯米飯丸芡子大每服一丸打破以大棗一枚燒熟去皮核同嚼冷茶送下半夜後取下積聚惡物為效聖濟錄蛇咬腫悶欲死用重臺六分續隨子仁七粒搗篩為散酒服方寸匕兼唾和少許塗咬處立效崔元亮海上方黑子疣贅續隨子熟時塗之自落普濟方葉及莖中白汁主治剝人面皮去䵟􅍍開寳傅白癜癧瘍大明搗葉傅蠍螫立止時珍莨菪音浪蕩品本經下釋名天仙子圖經横唐本經行唐時珍曰莨菪一作􅰣𦿆其子服之令人狂狼放宕故名集解别錄曰莨菪子生海濵川谷及雍州五月采子𢎞景曰今處處有之子形頗似五味核而極小保昇曰所在皆有之葉似菘藍莖葉皆有細毛花白色子殻作罌狀結實扁細若粟米大青黄色六月七月采子日乾頌曰處處有之苗莖高二三尺葉似地黄王不留行紅藍等而濶如三指四月開花紫色莖莢有白毛五月結實有殻作罌子狀如小石榴房中子至細青白色如粟米粒斆曰凡使勿用蒼蓂子其形相似只是微赤服之無效時人多以雜之時珍曰張仲景金匱要畧言菜中有水莨菪葉圓而光有毒誤食令人狂亂狀如中風或吐血以甘草汁解之子修治斆曰修事莨菪子十兩以頭醋一鎰煮乾為度却用黄牛乳汁浸一宿至明日乳汁黒即是真者晒乾搗篩用氣味苦寒無毒别錄曰甘權曰苦辛微熱有大毒藏器曰性温不寒大明曰温有毒服之熱發以綠豆汁甘草升麻犀角並解之斆曰有大毒誤服之衝人心大煩悶眼生暹火頌曰本經言性寒後人多云大熱而史記淳于意𫝊云淄川王美人懷子不乳飲以浪藥一撮以酒飲旋乳且不乳豈熱藥所治又古方主卒顛狂亦多單用莨菪豈果性寒耶主治齒痛出蟲肉痺拘急久服輕身使人健行走及奔馬强志益力通神見鬼多食令人狂走本經療癲狂風癎顛倒拘攣别錄安心定志聰明耳目除邪逐風變白主痃癖取子洗晒隔日空腹水下一指捻亦可小便浸令泣盡暴乾如上服勿令子破破則令人發狂藏器炒焦研末治下部脱肛止冷痢主蛀牙痛咬之蟲出甄權燒熏蟲牙及洗隂汗大明發明𢎞景曰入療顛狂方用然不可過劑久服自無嫌通伸健行足為大益而仙經不見用權曰以石灰清煮一伏時掬出去芽暴乾以附子乾薑陳橘皮桂心厚朴為丸服去一切冷氣積年氣痢甚温暖也不可生服傷人見鬼拾鍼狂亂時珍曰莨菪之功未見如所説而其毒有甚焉煮一二日而芽方生其為物可知矣莨菪雲實防葵赤商陸皆能令人狂惑見鬼者昔人未有發其義者葢此類皆有毒能使痰迷心竅蔽其神明以亂其視聽故耳唐安祿山誘奚契丹飲以莨菪酒醉而坑之又嘉靖四十三年二月陜西遊僧武如香挾妖術至昌黎縣民張柱家見其妻美設飯間呼其全家同坐將紅散入飯内食之少頃舉家昏迷任其奸汚復將魘法吹入柱耳中柱發狂惑見舉家皆是妖鬼盡行殺死凡一十六人並無血迹官司執柱囚之十餘日柱吐痰二椀許問其故乃知所殺者皆其父母兄嫂妻子姊姪也柱與如香皆論死世宗肅皇帝命榜示天下觀此妖藥亦是莨菪之流爾方其痰迷之時視人皆鬼矣解之之法可不知乎附方舊二新二十卒發顛狂莨菪三升為末以酒一升漬數日絞去滓煎令可丸如小豆三丸日三服當見面急頭中如有蟲行額及手足有赤豆處如此並是瘥候也未知再服取盡神良陳延之小品方風痺厥痛天仙子三錢炒大草烏頭甘草半兩五靈脂一兩為末糊丸梧子大以螺青為衣每服十丸男子菖蒲酒下女子莞花湯下聖濟錄久𠻳不止有濃血莨菪子五錢淘去浮者煮令芽出炒研真酥一雞子大大棗七枚同煎令酥盡取棗日食三枚又方莨菪子三撮吞之日五六度光祿李丞服之神驗孟詵必效方年久呷𠻳至三十年者莨菪子木香熏黄等分為末以羊脂塗青紙上撒末于上卷作筒燒烟熏吸之崔行功纂要方水腫蠱脹方見獸部麢羊下積冷痃癖不思飲食羸困者莨菪子三分水淘去浮者大棗四十九個水三升煮乾只取棗去皮核每空心食一個米飲下覺熱即止聖濟錄水瀉日久青州乾棗十個去核入莨菪子填滿札定燒存性每粟米飲服一錢聖惠方冷疳痢下莨菪子為末臘猪脂和丸綿裹棗許導下部因痢出更納新者不過三度瘥孟詵必效方赤白下痢腹痛腸滑後重大黄煨半兩莨菪子炒黑一撮為末每服一錢米飲下普濟方久痢不止變種種痢兼脱肛莨菪丸用莨菪子一升淘去浮者煮令芽出晒乾炒黄黒色青州棗一升去皮核釅醋二升同煮搗膏丸梧子大每服二十丸食前米飲下聖惠方腸風下血莨菪煎用莨菪實一升暴乾搗篩生薑半斤取汁銀鍋中更以無灰酒二升捜之上火煎如稠餳即旋杸酒度用酒可及五升即止慢火煎令可丸大如梧子每旦酒飲通下三丸增至五七丸止若丸時粘手則以兎絲粉襯隔之火候忌緊藥焦則失力也初服微熱勿怪疾甚者服過三日當下利疾去利亦止絶有效篋中方脱肛不收莨菪子炒研傅之聖惠方風牙蟲牙瑞竹堂方用天仙子一撮入小口瓶内燒烟竹筒引烟入蟲孔内熏之即死永不發令普濟方用莨菪子入瓶内以熱湯淋下口含瓶口氣熏之冷更作盡三合乃止有涎津可去甚效效備急方用莨菪子數納孔中以蠟封之亦牙齒宣落風痛莨菪子末綿裹咬之有汁勿嚥必效方風毒咽腫嚥水不下及瘰癧咽腫水服莨菪子末兩錢匕神驗外臺秘要乳癰堅硬新莨菪子半匙清水一盞服之不得嚼破外臺秘要石癰堅硬不作濃者莨菪子為末醋和𫝊瘡頭根即拔出千金方惡瘡似癩十年不愈者莨菪子燒研傅之千金方打撲折傷羊脂調莨菪子末傅之千金方惡犬咬傷莨菪子七枚吞之日三服千金方根氣味苦辛有毒主治邪瘧疥癬殺蟲時珍附方新六瘧疾不止莨菪根燒灰水服一合量人强弱用千金方惡癬有蟲莨菪根搗爛蜜和傅之千金翼趾間肉刺莨菪根搗汁塗之生雷公炮炙論序云脚肉刺裩繫菪根謂繫于裩帶上也狂犬咬人莨菪根和鹽搗傅日三上外臺秘要惡刺傷人莨菪根水煮汁浸之冷即易神方也千金方箭頭不出萬聖神應丹端午前一日不語尋見莨菪科根本枝葉花實全好者道云先生你却在這裹道罷用柴灰自東南起圍了以木椑子掘取根下周迴土次日日未出時依前不語用钁頭取出洗淨勿令雞犬婦人見于淨室中以石臼搗如泥丸彈子大黄丹為衣以紙袋封懸高處隂乾遇有箭頭不出者先以象牙末貼瘡口後用緋帛袋盛此藥放臍中綿兜肚繫了當便出也張子和儒門事親方雲實本經上品釋名員實别錄雲英别錄天豆呉普馬豆圖經羊石子圖經苗名草雲母唐本臭草圖經粘刺綱目時珍曰員亦音雲其義未詳豆以子形名羊石當作羊矢其子肖之故也集解别錄曰雲實生河間川谷十月采暴乾普曰莖高四五尺大葉中空葉如麻兩兩相值六月花八月九月實十月采𢎞景曰處處有之子細如葶藶子而小黑其實亦類莨菪燒之致鬼未見其法術恭曰雲實大如黍及大麻子等黄黑似豆故名天豆叢生澤旁高五六尺葉如細槐亦如苜蓿枝間微刺俗謂苗為草雲母陶云似葶藶者非也保昇曰所在平澤有之葉似細槐花黄白色其莢如豆其實青黄色大若麻子五月六月采實頌曰葉如槐而狹長枝上有刺苗名臭草又名羊石子草實名馬豆三月四月采苗十月采實過時即枯落也時珍曰此草山原甚多俗名枯刺赤莖中空有刺高者如蔓其葉如槐三月開黄花纍然滿枝莢長三寸許狀如肥皂莢内有子五六粒正如鵲豆兩頭微尖有黄黑班紋厚殻白仁咬之極堅重有腥氣實修治斆曰凡采得粗搗相對拌渾顆橡實蒸一日㨂出暴乾氣味辛温無毒别錄曰苦普曰神農辛小温黄帝鹹雷公苦主治泄痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱本經消渇别錄治瘧多用蘇頌主下䘌膿血時珍附方新一䘌下不止雲實女萎各一兩桂半兩川烏頭二兩為末蜜丸梧子大每服五丸水下日三服肘后方花主治見鬼精多食令人狂走久服輕身通神明本經殺精物下水燒之致鬼别錄發明時珍曰雲實花既能令人見鬼發狂豈有久服輕身之理此古書之訛也根主治骨哽及咽喉痛研汁嚥之時珍蓖麻蓖音卑唐本草釋名頌曰葉似大麻子形宛如牛蜱故名時珍曰蓖亦作螕螕牛虱也其子有麻㸃故名蓖麻集解恭曰此人間所種者葉似大麻葉而甚大結子如牛蜱今胡中來者莖赤高丈餘子大如皂莢核用之亦良保昇曰今在處有之夏生苗葉似葎草而大厚莖赤有節如甘蔗高丈餘秋生細花隨便結實殻上有刺狀類巴豆青黄班褐夏采莖葉秋采實冬采根日乾用時珍曰其莖有赤有白中空其葉大如瓠葉每葉凡五尖夏秋間椏裏抽出花穗纍纍黄色每枝結實數十顆上有刺攅族如蝟毛而軟凡三四子合成一顆枮時劈開狀如巴豆殻内有子大如豆殻有班㸃狀如牛螕再去班殻中有仁嬌白如續隨子仁有油可作印色及油紙子無刺者良子有刺者毒子修治斆曰凡使勿用黑天赤利子緣在地蔞上是顆兩頭尖有毒其蓖麻子節節有黄黑班凡使以鹽湯煮半日去皮取子研用時珍曰取蓖麻油法用蓖麻仁五升搗爛以水一斗煮之有沫撇起待沫盡乃止去水以沫煎至㸃燈不泎滴水不散為度氣味甘辛平有小毒時珍曰凡服蓖麻者一生不得食炒豆犯之必脹死其油能伏丹砂粉霜主治水癥以水研二十枚服之吐惡沫加至三十枚三日一服瘥則止又主風虚寒熱身體瘡痒浮腫尸疰惡氣榨取油塗之唐木研傅瘡痍疥癩塗手足心催生大明治瘰癧取子炒熟去皮每卧時嚼服二三枚漸加至十數枚有効宗奭主偏風不遂口眼喎斜失音口噤頭風耳聾舌脹喉痺齁喘脚氣毒腫丹瘤湯火傷鍼刺入肉女人胎衣不下子腸挺出開通關竅經絡能止諸痛消腫追膿拔毒時珍發明震亨曰蓖麻屬隂其性善收能追膿取毒亦外科要藥能出有形之滯物故取胎産胞衣剰骨膠血者用之時珍曰蓖麻仁甘辛有毒熱氣味頗近巴豆亦能利人故下水氣其性善走能開通諸竅經絡故能治偏風失音口噤口目喎斜頭風七竅諸病不止于出有形之物而已葢鸛鶘油能引藥氣入内蓖麻油能拔病氣出外故諸膏多用之一人病偏風手足不舉時珍用此油同羊脂麝香鯪鯉甲等藥煎作摩膏日摩數次一月餘漸復兼服捜風化痰養血之劑三月而愈一人病手臂一塊腫痛亦用蓖麻搗膏貼之一夜而愈一人病氣鬰徧頭痛用此同乳香食鹽搗㶸太陽穴一夜痛止一婦産後子腸不收搗仁貼其丹田一夜而上此藥外用累奏竒勛但内服不可輕率爾或言搗膏以筯㸃于鵞馬六畜舌根下即不能食或㸃肛内即下血死其毒可知矣附方舊九新二十九半身不遂失音不語取蓖麻子油一升酒一斗銅鍋盛油著酒中一日煮之令熟細細服之外臺秘要口目喎斜蓖麻子仁搗膏左貼右右貼左即正婦人良方用蓖麻子仁七七粒研作餅右喎安在左手心左喎安在右手心却以銅盂盛熱水坐藥上冷即換五六次即正也粒一方用蓖麻子仁七七粒巴豆十九麝香五分作餅如上用風氣頭痛不可忍者乳香蓖麻仁等分搗餅隨左右貼太陽穴解髮出氣甚驗德生堂方用蓖麻油紙剪花貼太陽亦効紙又方蓖麻仁半兩棗肉十五枚搗塗上捲筒插入鼻中下清涕即止八種頭風蓖麻子剛子各四十九粒去殻雀腦芌一大塊搗如泥糊丸彈子大線穿掛風處隂乾用時先將好末茶調成膏子塗盞内後將灰火燒前藥烟起以盞覆之待烟盡以百沸葱湯㸃盞内茶藥服之後以綿被裹頭卧汗出避風袖珍方鼻窒不通蓖麻子仁三百粒大棗去皮一枚搗勻綿裹塞之一日一易三十日聞香臭也聖濟錄天柱骨倒小兒疳疾及諸病後天柱骨倒乃體虚所致宜生筋散貼之木鼈子六箇去殻蓖麻子六十粒去殻研勻先包頭擦頂上令熱以津調藥貼之鄭氏小兒方五種風癎不問年月逺近用蓖麻子仁二兩黄連一兩石膏末一盌文武火煮之乾即添水三日兩夜取出黄連只用蓖麻風乾勿令見日以竹刀每個切作四段每服二十段食後荆芥湯下日二服終身忌食豆犯之必腹脹死衛生寳鑑舌上出血蓖麻子油紙撚燒烟熏鼻中自止摘𤣥方舌脹塞口蓖麻仁四十粒去殻研油塗紙上作撚燒烟熏之未退再熏以愈為度有人舌腫出口外一邨人用此法而愈經驗良方急喉痺塞牙關緊急不通用此即破以蓖麻子仁研爛紙卷作筒燒烟熏吸即通或只取油作撚尤妙名聖烟筒咽中瘡腫杜任方用蓖麻子仁一枚朴硝一錢同研新汲水服之連進二三服效嚥三因方用蓖麻仁荆芥穗等分為末蜜丸綿包噙之金千水氣腫滿蓖麻子仁研水解得三合清旦一頓服盡日中當下青黄水也或云壯人止可服五粒外臺秘要脚氣作痛蓖麻子七粒去殻研爛同蘇合香丸貼足心痛即止也外臺秘要小便不通蓖麻仁三粒研細入紙撚内插入莖中即通摘𤣥方齁喘咳𠻳蓖麻子去殻炒熟㨂甜者食之須多服見效終身不可食炒豆衛生簡易方催生下胞崔元亮海上集驗方取蓖麻子七粒去殻研膏塗脚心若胎及衣下便速洗去不爾則子腸出即以此膏塗頂則腸自入也各肘后方云産難取蓖麻子十四枚每手把七枚須㬰立下也子宮脱下蓖麻子仁枯礬等分為末安紙上托入仍以蓖麻子仁十四枚研膏塗頂心即入摘𤣥盤腸生産塗頂方同上催生下胎不拘生胎死胎蓖麻二個巴豆二個麝香一分研貼臍中并足心温又下生胎一月一粒酒吞下集簡方一切毒腫痛不可忍蓖麻子仁搗傅即止也肘后方癘風鼻塌手指攣曲節間痛不可忍漸至斷落用蓖麻子一兩去皮黄連一兩剉豆大以小瓶子入水一升同浸春夏二日秋冬五日後取蓖麻子一枚劈破面東以浸藥水吞之漸加至四五枚微利不妨瓶中水盡更添兩月後喫大蒜猪肉試之如不發是效也若發動再服直侯不發乃止杜任方小兒丹瘤蓖麻子五個去皮研入麪一匙水調塗之甚效修真秘㫖瘰癧結核蓖麻子炒去皮每睡時服二三枚取效一生不可喫炒豆阮氏經驗方瘰癧惡瘡及軟癤用白膠香一兩瓦器溶化去滓以蓖麻子六十四個去殻研膏溶膠投之攪勻入油半匙頭至㸃水中試軟硬添減膠油得所以緋帛量瘡大小攤貼一膏可治三五癤也儒門事親肺風面瘡起白屑或微有赤瘡用蓖麻子仁四十九粒白果膠棗各三粒瓦松三錢肥皂一個搗為丸洗面用之良一呉旻扶壽方面上雀斑萞麻子仁蜜陀僧硫黄各一錢為末用羊髓和勻夜夜傅之摘𤣥方髮黄不黑萞麻子仁香油煎焦去滓三日後頻刷之摘𤣥方耳卒聾閉萞麻子一百個去殻與大棗十五枚搗爛入乳小兒乳汁和丸作鋌每以綿裹一枚塞之覺耳中熱為度一日一易二十日瘞千金方湯火灼傷萞麻子仁蛤粉等分研膏湯傷以油調火灼以水調塗之驗古今錄鍼刺入肉萞麻子去殻一个先以帛襯傷處傅之頻看若見刺出即拔去恐藥緊弩出好肉或加白梅肉同研尤好衛生易簡方竹木骨硬萞麻子仁一兩凝水石二兩研勻每以一捻置舌根噙嚥自然不見含又方萞麻油紅麯等分研細沙糖丸皂子大綿裹嚥痰出大良雞魚骨哽萞麻子仁研爛入百藥煎研丸彈子大井花水化下半丸即下惡犬咬傷萞麻子五十粒去殻以井花研膏先以鹽水洗吹痛處乃貼此膏袖珍方葉氣味有毒主治脚氣風腫不仁蒸搗裹之日二三易即消又油塗炙熱熨𩕄上止鼻衂大驗蘇恭治痰喘欬𠻳時珍附方新一齁喘痰𠻳儒門事親方用九尖萞麻葉三錢入飛過白礬二錢以猪肉四兩薄批摻藥在内荷葉裹之文武火煨熟細嚼以白湯送下名九仙散普濟方治欬𠻳涎喘不問年深日近用經霜萞麻葉經霜桑葉御米殻蜜炒各一兩為末蜜丸彈子大每服一丸白湯化下日一服名無憂丸附錄博落迴拾遺藏器曰有大毒主惡瘡櫻根瘤贅瘜肉白癜風蠱毒精魅溪毒瘡瘻和百大青雞桑灰等分為末傅之蠱毒精魅當别有法生江南山谷莖葉如萞麻莖中空吹之作聲如博落迴折之有黄汁藥人立死不可輕用入口常山本經下品蜀漆同止釋名恒山呉普互草本經雞尿草日華鴨尿草日華時珍曰恒亦常也恒山乃北岳名在今定州常山乃郡名亦今真定豈此藥始産于此得名歟蜀漆乃常山苗功用相同今併為一集解别錄曰常山生益州川谷及漢中二月八月采根隂乾又曰蜀漆生江林山川谷及蜀漢中常山苗也五月采葉隂乾𢎞景曰常山出宜都建平細實黄者呼為雞骨常山用之最勝蜀漆是常山苗而所出又異者江林山即益州江陽山名故是同處爾彼人采得縈結作丸得時燥者佳恭曰常山生山谷間莖圓有節髙者不過三四尺葉似茗而狹長兩兩相當二月生白花青萼五月結實青圓三子為房其草暴燥色青白堪用若隂乾便黒爛鬱壞矣保昇曰今出金州房山梁州中江縣樹高三四尺根似荆根黄色而破五六月采葉名蜀漆也李含光曰蜀漆是常山莖八月九月采之頌曰今汴西淮浙湖南州郡亦有之並如上説而海州出者葉似楸葉八月有花紅白色子碧色似山楝子而小今天台山出一種草名土常山苗葉極甘人用為飲甘味如蜜又名蜜香草性涼益人非此常山也修治斆曰采時連根苗收如用莖葉臨時去根以甘草細剉同水拌濕蒸之臨時去甘草取蜀漆細剉又拌甘草水勻再蒸日乾用其常山凡用以酒浸一宿漉出日乾熬搗用時珍曰近時有酒浸蒸熟或瓦炒熟者亦不甚吐人又有醋制者吐人常山氣味苦寒有毒别錄曰辛微寒普曰神農岐伯苦桐君辛有毒李當之大寒權曰苦有小毒炳曰得甘草吐瘧之才曰畏玉札大明曰忌葱菜及菘菜伏砒石主治傷寒寒熱熱發温瘧鬼毒胸中痰結吐逆本經療鬼蠱往來水脹洒洒惡寒鼠瘻别錄治諸瘧吐痰涎治項下瘤癭甄權蜀漆氣味辛平有毒别錄曰微温權曰苦有小毒元素曰辛純陽炳曰桔梗為之使之才曰栝樓為之使惡貫衆主治瘧及欬逆寒熱腹中癥堅痞積聚邪氣蠱毒鬼疰本經療胸中邪結氣吐去之别錄治鬼瘧多時温瘧寒熱下肥氣甄權破血洗去腥與苦酸同用導膽邪元素發明斆曰蜀漆春夏用莖葉秋冬用根老人久病切忌服之頌曰常山蜀漆為治瘧之最要不可多進令人吐逆震亨曰常山性暴悍善驅逐能傷真氣病人稍近虚怯不可用也外臺乃用三兩作一服殊昧雷公老人久病切忌之戒時珍曰常山蜀漆有刼痰截瘧之功須在發散表邪及提出陽分之後用之得宜神效立見用失其法真氣必傷夫瘧有六經瘧五臟瘧痰濕食積瘴疫鬼邪諸瘧須分隂陽虚實不可一槩論也常山蜀漆生用則上行必吐酒蒸炒熟用則氣稍緩少用亦不致吐也得甘草則吐得大黄則利得烏梅鯪鯉甲則入肝得小麥竹葉則入心得秫米麻黄則入肺得龍骨附子則入腎得草果檳榔則入脾葢無痰不作瘧二物之功亦在驅逐痰水而已楊士瀛直指方云常山治瘧人皆薄之瘧家多蓄痰涎黄水或停瀦心下或結澼脇間乃生寒熱法當吐痰逐水常山豈容不用水在上焦則常山能吐之水在脇下則常山能破其澼而下其水但須行血藥品佐助之必收十全之功其有純熱發瘧或藴熱内實之證投以常山大便㸃滴而下似泄不泄者須用北大黄為佐泄利數行然後獲愈也又待制李燾云嶺南瘴氣寒熱所感邪氣多在營衛皮肉之間欲去皮膚毛孔中瘴氣根本非常山不可但性吐人惟以七寳散冷服之即不吐且驗也附方舊三新二十三截瘧諸湯外臺秘要用常山三兩漿水三升浸一宿煎取一升欲發前頓服取吐分肘后方用常山一兩秫米一百粒水六升煮三升三服先夜未發臨發時服盡養生主論王隠者驅瘧湯云予用此四十年竒效不能盡述切勿加減萬一無吐者常山酒煮晒乾知母貝母草果各一錢半水一鍾半煎半熟五更熱服渣以酒浸發前服截瘧諸酒肘后方用常山一兩酒一升漬二三日分作三服平旦一服少頃再服臨發又服或加甘草煮服之宋俠經心錄醇醨湯治間日瘧支太醫云乃桂廣州方也甚驗恒山一錢二分大黄二錢半炙甘草一錢二分水一盞半煎減半醇發日五更温服再以水一盞煎減半曰醨未發時温服虞搏醫學正傳治久瘧不止常山一錢半檳榔一錢丁香五分烏梅一個酒一盞浸一宿五更飲之一服便止永不再發如神截瘧諸丸千金方恒山丸治數年不瘥者兩劑瘥一月以来者一劑瘥恒山三兩研末雞子白和丸梧子大瓦器煮熟殺腥氣則取晒乾收之每服二十丸竹葉湯下五更一服天明一服發前一服或吐或否即止肘后丹砂丸恒山搗末三兩真丹一兩研白密和杵百下丸梧子大先發時三丸少頃再服三丸臨時服三丸酒下無不斷者黄曽世榮活幼心書黄丹丸治大小久瘧恒山二兩丹半兩烏梅連核瓦焙一兩為末糯米粉糊丸梧子大每服三五十丸涼酒下隔一夜一服平旦一服午後方食葛洪肘後方用恒山三兩知母一兩甘草半兩搗末蜜丸梧子大先發時服十丸次服七丸後服五六丸以瘥為度和劑局方瞻仰丸治一切瘧常山四兩炒存性草果二兩炒存性為末薄糊丸梧子大每卧時冷酒服五十丸五更再服忌鵞羊熱物兩又勝金丸治一切瘧胸膈停痰發不愈者常山八酒浸蒸焙檳榔二兩生研末糊丸梧子大如上法服雞集簡方二聖丸治諸瘧不拘逺近大小雞骨恒山心檳榔各一兩生研鯪鯉甲煨焦一兩半為末糯粉糊丸菉豆大黄丹為衣每服三五十丸如上法服厥隂肝瘧寒多熱少喘息如死狀或少腹滿小便如膿不問久近不吐不泄如神恒山一兩醋浸一夜瓦器煮乾每用二錢水一盞煎半盞五更冷服趙真人濟急方太隂肺瘧痰聚胸中病至令人心寒寒甚乃熱熱間善驚如有所見恒山三錢甘草半錢秫米三十五粒水二鍾煎一鍾發日早分三次服千金方少隂腎瘧凄凄然寒手足寒腰脊痛大便難目眴眴然恒山二錢半豉半兩烏梅一錢竹葉一錢半葱白三根水一升半煎一升發前分三服千金方牝瘧獨寒不熱者蜀漆散用蜀漆雲母煅三日夜龍骨各二錢為末每服半錢臨發日旦一服發前一服酢漿水調下温瘧又加蜀漆一錢張仲景金匱要畧牡瘧獨熱不冷者蜀漆一錢半甘草一錢麻黄二錢牡蠣粉二錢水二鍾先煎麻黄蜀漆去沬入藥再煎至一鍾未發前温服得吐則止王燾外臺秘要温瘧熱多恒山一錢小麥三錢淡竹葉二錢水煎五更服甚良藥性論三十年瘧肘后方治三十年老瘧及積年久瘧常山黄連各一兩酒三升漬一宿以瓦釡煮取一升半發日早服五合發時再服熱當吐冷當利無不瘥者二張文仲備急方用恒山一兩半龍骨五錢附子炮錢半大黄一兩為末雞子黄和丸梧子大未發時五丸將發時五丸白湯下支太醫云此方神驗無不斷者瘴瘧寒熱劉長春經驗方常山一寸草果一枚熱酒一盌浸一夜五更望東服之葢卧酒醒即愈談埜翁試驗方用常山檳榔甘草各二錢黒豆一百粒水煎服之乃彭司㓂所傳葛稚川肘后方用常山黄連香䜴各一兩附子炮七錢搗末蜜丸梧子大空腹飲服四丸欲發時三丸至午後乃食妊娠瘧疾酒蒸常山石膏煅各一錢烏梅炒五分甘草四分水一盞酒一盞浸一夜平旦温服姚僧坦集驗方百日兒瘧水鑑仙人歌曰瘧是邪風寒熱攻直須術治免成空常山刻作人形狀釘在孩兒生氣宮如金生人金生在巳即釘巳上木生人釘亥上火生人釘寅上水土生人釘申上也小兒驚忤暴驚卒死中惡用蜀漆炒二錢左顧牡蠣一錢二分漿水煎服當吐痰而愈名千金湯阮氏胸中痰飲恒山甘草各一兩水五升煮取一升去滓入蜜二合温服七合取吐不吐更服千金方附錄杜莖山圖經頌曰葉味苦寒主温瘴寒熱作止不定煩渴頭痛心躁杵爛新酒浸絞汁服吐出惡涎甚效生宜用莖高四五尺葉似苦蕒菜秋有花冬作實如枸杞子大而白土紅山頌曰葉甘微寒無毒主骨節疼痛勞熱瘴瘧生南恩州山野中大者高七八尺葉似枇杷而小無毛秋生白花如栗粒不實福州生者作細藤似芙蓉葉其葉上青下白根如葛頭土人取根米泔浸一宿以清水再浸一宿炒黄為末每服一錢水一盞生薑一片同煎服亦治勞瘴甚效時珍曰杜莖山即土恒山土紅山又杜莖山之類故並附之藜蘆本經下品釋名山葱别錄葱苒同葱菼音毯葱葵普豐蘆普憨葱綱目鹿葱時珍曰黑色曰黎其蘆有黑皮裹之故名根際似葱俗名葱管藜蘆是矣北人謂之憨葱南人謂之鹿葱集解别錄曰藜蘆生太山山谷三月采根隂乾普曰大葉小根相連𢎞景曰近道處處有之根下極似葱而多毛用之止剔取根微炙之保昇曰所在山谷皆有葉似鬱金秦芄蘘荷等根若龍膽莖下多毛夏生冬凋八月采根頌曰今陜西山南東西州郡皆有之遼州均州解州者尢佳三月生苗葉似初出椶心又似車前莖似葱白青紫色高五六寸上有黒皮裏莖似椶皮有花肉紅色根似馬腸根長四五寸許黄白色二月三月采根隂乾此有二種一種水藜蘆莖葉大同只是生在近水溪澗石上根鬚百餘莖不中藥用今用者名葱白藜蘆根鬚甚少只是三二十莖生高山者為佳均州土俗亦呼為鹿葱范子計然云出河東黄白者善根修治雷曰凡采得去頭用糯米泔汁煮之從已至未晒乾用氣味辛寒有毒别錄曰苦微寒普曰神農雷公辛有毒岐伯鹹有毒李當之大寒大毒扁鵲苦有毒之才曰黄連為之使反細辛芍藥人參沙參紫參丹參苦參惡大黄時珍曰畏葱白服之吐不止飲葱湯即止主治蠱毒欬逆洩痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌本經療噦逆喉痺不通鼻中息肉馬刀爛瘡不入湯用别錄主上氣去積年膿血泄痢權吐上膈風涎暗風癎病小兒􅀈齁痰疾頌末治馬疥癬宗奭發明頌曰黎蘆服錢匕一字則惡吐人又用通頂令人嚏而别本云治噦逆甚效未詳時珍曰噦逆用吐藥亦反胃用吐法去痰積之義吐藥不一常山吐瘧痰𤓰丁吐熱痰烏附尖吐濕痰萊菔子吐氣痰藜蘆則吐風痰者也按張子和儒門事親云一婦病風癎自六七年得驚風後每一二年一作至五七年五七作三十歳至四十歳則日作或甚至一日十餘作遂昏癡徤忘求死而已值歳大饑采百草食于野中見草若葱狀采歸蒸熟飽食至五更忽覺心中不安吐涎如膠連日不止約一二斗汗出如洗甚昏困三日后遂輕徤病去食進百脈皆和以所食葱訪人乃憨葱苗也即本草藜蘆是矣圖經言能吐風病此亦偶得吐法耳我朝荆和王妃劉氏年七十病中風不省人事牙關緊閉羣醫束手先考太醫吏目月池翁診視藥不能入自午至子不獲已打去一齒濃煎藜蘆湯灌之少頃噫氣一聲遂吐痰而甦調理而安藥弗瞑眩厥疾弗瘳誠然附方舊六新十三諸風痰飲藜蘆十分鬱金一分為末每以一字温漿水一盞和服探吐方經驗中風不省牙關緊急者藜蘆一兩去苗頭濃煎防風湯浴過焙乾切炒微褐色為末每服半錢小兒減半温水調灌以吐風涎為効未吐再服簡要濟衆中風不語喉中如曳鋸口中涎沬取藜蘆一分天南星一個去浮皮于臍上剜一坑納入陳醋二橡斗四面火逼黄色研為末生麪丸小豆大每服三丸温酒下經驗方諸風頭痛和州藜蘆一莖日乾研末入麝香少許吹鼻三又方通頂散藜蘆半兩黄連分㗜鼻聖惠久瘧痰多不食欲吐不吐藜蘆末半錢温虀水調下探吐保命集痰瘧積瘧藜蘆皂莢炙各一兩巴豆二十五枚熬黄研末蜜丸小豆大每空心服一丸未發時一丸臨發時又服一丸勿用飲食肘後黄疸腫疾藜蘆灰中炮為末水服半錢匕小吐不過數服效胸中結聚如駭駭不去者巴豆半兩去皮心炒擣如泥藜蘆炙研一兩蜜和擣丸麻子大每吞一二丸肘后身面黒痣藜蘆灰五兩水一大碗淋汁銅器重湯煮成黒膏以針微刺破㸃之不過三次效聖惠鼻中息肉藜蘆三分雄黄一分為末蜜和㸃之每日三上自消勿㸃兩畔聖濟方牙齒蟲痛藜蘆末内入孔中勿吞汁神效翼千金白秃蟲瘡藜蘆末猪脂調塗之肘後方頭生蟣虱藜蘆末摻之直指頭風白屑痒甚藜蘆末沐頭摻之緊包二日夜避風效本事方反花惡瘡惡肉反出如米藜蘆末猪脂和傅日三五上聖濟錄疥癬蟲瘡藜蘆末生油和塗羊疽瘡痒藜蘆二分附子八分為末傅之蟲自出也陶隠居方誤吞水蛭藜蘆炒為末水服一錢必吐出徳生堂方附錄山慈石别錄有名未用曰苦平無毒主女子帶下生山之陽正月生葉如藜蘆莖有衣一名爰茈參果根又曰苦有毒主鼠瘻生百餘根根有衣裹莖三月三日采根一名百連一名烏蓼一名鼠莖一名鹿蒲馬腸根宋圖經頌曰苦辛寒有毒主蠱除風葉療瘡疥生秦州葉似桑三月采葉五月六月采根木藜蘆拾遺釋名黄藜蘆綱目鹿驪集解藏器曰陶𢎞景注漏蘆云一名鹿驪山南人用苗北人用根按鹿驪乃木藜蘆非漏蘆也乃樹生如茱萸樹高二尺有毒時珍曰鹿驪俚人呼為黄藜蘆小樹也葉如櫻桃葉狹而長多皺文四月開細黄花五月結小長子如小豆大氣味苦辛温有毒主治疥癬殺蟲藏器附子本經下品釋名其母名曰烏頭時珍曰初種為烏頭象烏之頭也附烏頭而生者為附子如子附母也烏頭如芋魁附子如芋子葢一物也别有草烏頭白附子故俗呼此為黒附子川烏頭以别之諸家不分烏頭有川草兩種皆混雜註解今悉正之集解别錄曰附子生犍為山谷及廣漢冬月采為附子春月采為烏頭𢎞景曰烏頭與附子同根附子八月采八角者良烏頭四月采春時莖初生有腦頭如烏鳥之頭故謂之烏頭有兩岐其蒂狀如牛角者名烏喙取汁煎為射繭天雄似附子細而長乃至三四寸側子即附子邊角之大者並是同根而木經附子出犍為天雄出少室烏頭出朗陵分生三處當各有所宜也今則無别矣恭曰天雄附子烏頭並以蜀道綿州龍州者佳俱以八月采造餘處雖有造得者力弱都不相似江南來者全不堪用大明曰天雄大而長少角刺而實附子大而短有角平穩而實烏喙似天雄烏頭次于附子側子小于烏頭連聚生者名為虎掌並是天雄一裔子母之類氣力乃有殊等即宿根與嫩者爾斆曰烏頭少有莖苗身長而烏黒少有旁尖烏喙皮上蒼色有尖頭大者孕八九個周圍底陷黒如烏鐵天雄身全矮無尖周匝四面有附子孕十一個皮蒼色側子只是附子旁有小顆如棗核者木鼈子是喙附烏雄側中毗患者不入藥用保昇曰正者為烏頭兩岐者為烏喙細長三四寸者為天雄根旁如芋散生者為附子旁連生者為側子五物同出而異名苗高二尺許葉似石龍芮及艾宗奭曰五者皆一物但依大小長短以象而名之爾頌曰五者今並出蜀土都是一種所産其種出于龍州冬至前先將陸田耕五七遍以猪糞糞之然後布種逐月耘籽至次年八月後方成其苗高三四尺莖作四稜葉如艾其花紫碧色作穗其實細小如桑椹狀黑色本只種附子一物至成熟後乃有四物以長二三寸者為天雄割削附子旁尖角為側子附子之絶小者亦名側子元種者為烏頭其餘大小者皆為附子以八角者為上綿州彰明縣多種之惟赤水一鄉者最佳然收采時月與本草不同謹按本草冬采為附子春采為烏頭博物志言附子烏頭天雄一物也春秋冬夏采之各異而廣志云奚毒附子也一歳為側子二年為烏喙三年為附子四年為烏頭五年為天雄今一年種之便有此五物豈今人種蒔之法用力倍至故爾繁盛乎時珍曰烏頭有兩種出彰明者即附子之母今人謂之川烏頭是也春末生子故曰春采為烏頭冬則生子已成故曰冬采為附子其天雄烏喙側子皆是生子多者因象命名若生子少及獨頭者即無此數物也其産江左山南等處者乃本經所列烏頭今人謂之草烏頭者是也故曰其汁煎為射繭陶𢎞景不知烏頭有二以附子之烏頭註射􅗀之烏頭遂致諸家疑貳而雷斆之説尤不近理宋人楊天惠著附子記甚悉今撮其要讀之可不辯而明矣其説云綿州乃故廣漢地領縣八惟彰明出附子彰明領鄉二十惟赤水亷水昌明㑹昌四鄉産附子而赤水為多每歳以上田熟耕作壟取種於龍安龍州齊歸木門青塠小坪諸處十一月播種春月生苗其莖類野艾而澤其葉類地麻而厚其花紫瓣黄㽔長苞而圓七月采者謂之早水拳縮而小葢未長成也九月采者乃佳其品凡七本同而末異其初種之小者為烏頭附烏頭而旁生者為附子又左右附而偶生者為鬲子附而長者為天雄附而尖者為天錐附而上出者為側子附而散生者為漏藍子皆脈絡連貫如子附母而附子以貴故專附名也凡種一而子六七以上則皆小種一而子二三則稍大種一而子特生則特大附子之形以蹲坐正節角少者為上有節多䑕乳者次之形不正而傷缺風皺者為下本草言附子八角者為良其角為側子之説甚謬矣附子之色以花白者為上鐵色者次之青綠者為下天雄烏頭天錐皆以豐實盈握者為勝漏藍側子則園人以乞役夫不足數也謹按此記所載漏藍即雷斆所謂木鼈子大明所謂虎掌者也其鬲子即烏喙也天錐即天雄之類醫方亦無此名功用當相同爾修治保昇曰附子烏頭天雄側子烏喙采得以生熟湯浸半日勿令滅氣出以白灰裛之數易使乾又法以米粥及糟麯等淹之並不及前法頌曰五物收時一處造釀其法先於六月内造大小麪麴未采前半月用大麥煮成粥以麴造醋候熟去糟其醋不用太酸酸則以水解之將附子去根鬚於新甕内淹七日日攪一遍撈出以疎篩攤之令生白衣乃向慢風日中晒之百十日以透乾為度若猛日則皺而皮不附肉時珍曰按附子記云此物最多不能常熟或種美而苗不茂或苗秀而根不充或已釀而腐或已曝而攣若有神物隂為之者故圜人常禱於神目為藥妖其釀法用醋醅安密室中淹覆彌月乃發出㫰乾方出釀時其大有如拳者已定輒不盈握故及一兩者極難得土人云但得半兩以上者皆良蜀人餌者少惟秦陜閩浙人宜之然秦人纔市其下者閩浙纔得其中者其上品則皆貴人得之矣𢎞景曰凡用附子烏頭天雄皆熱灰微炮令析勿過焦惟薑附湯生用之俗方每用附子須甘草人參生薑相配者正制其毒故也斆曰凡使烏頭宜文武火中炮令皴拆擘破用若用附子須㡳平有九角如鐵色一個重一兩者即是氣全勿用雜木火只以栁木灰火中炮令皴拆以刀刮去上孕子并去㡳火擘破於屋下午地上掘一土坑安之一宿取出焙乾用若隂制者生去皮尖㡳薄切以東流水并黒豆浸五日夜漉出日中聮用震亨曰凡烏附天雄須用童子小便浸透煮過以殺其毒并助下行之力入鹽少許尤好或以小便浸二七日揀去壊者以竹刀每個切作四片井水淘淨逐日换水再浸七日晒乾用時珍曰附子生用則發散熟用則峻補生用者須如隂制之法去皮臍入藥熟用者以水浸過炮令發拆去皮臍乗熟切片再炒令内外俱黄去火毒入藥又法每一個用甘草二錢鹽水薑汁童尿各半盞同煮熟出火毒一夜用之則毒去也氣味辛温有大毒别錄曰甘大熱普曰神農辛岐伯雷公甘有毒李當之苦大温有大毒元素曰大辛大熱氣厚味薄可升可降陽中之隂浮中沈無所不至為諸經引用之藥好古曰人手少隂三焦命門之劑其性走而不守非若乾薑止而不行趙嗣真曰熟附配麻黄發中有補仲景麻黄附子細辛湯麻黄附子甘草湯是也生附配乾薑補中有發仲景乾薑附子湯通脉四逆湯是也戴原禮曰附子無乾薑不熱得甘草則性緩得桂則補命門李燾曰附子得生薑則能發散以熱攻熱又導虚熱下行以除冷病之才曰地膽為之使惡蜈蚣畏防風黑豆甘草人參黄耆時珍曰畏綠豆烏韮童溲犀角忌䜴汁得蜀椒食鹽下達命門主治風寒欬逆邪氣寒濕踒躄拘攣膝痛不能行步破癥堅積聚血瘕金瘡本經腰脊風寒脚氣冷冷弱心腹冷痛霍亂轉筋下痢赤白温中強隂堅肌骨又墮胎為百藥長别錄温暖脾胃除脾濕腎寒補下焦之陽虚元素除臟腑沈寒三陽厥逆濕淫腹痛胃寒蚘動治經閉補虚散壅李呆督脈為病脊強而厥好古治三隂傷寒隂毒寒疝中寒中風痰厥氣厥柔痓癲癎小兒慢驚風濕麻痺腫滿脚氣頭風腎厥頭痛暴㵼脱陽久痢脾泄寒瘧瘴氣久病嘔噦反胃噎膈癰疽不斂久漏冷瘡合葱涕塞耳治聾時珍烏頭即附子母主治諸風風痺血痺半身不遂除寒冷温養臟腑去心下堅痞感寒腹痛元素除寒濕行經散風邪破諸積冷毒李杲補命門不足肝風虛好古助陽退隂功同附子而稍緩時珍發明宗奭曰補虛寒須用附子風家即多用天雄大畧如此其烏頭烏喙附子則量其材而用之時珍曰按王氏究原方云附子性重滯温脾逐寒川烏頭性輕疎温脾去風若是寒疾即用附子風疾即用川烏頭一云凡人中風不可先用風藥及烏附若先用氣藥後用烏附乃宜也又凡用烏附藥並宜冷服者熱因寒用也葢隂寒在下虛陽上浮治之以寒則隂氣益甚而病增治之以熱則拒格而不納熱藥冷飲下咽之後冷體既消熱性便發而病氣隨愈不違其情而致大益此反治之妙也昔張仲景治寒疝内結用蜜煎烏頭近效方治喉痺用蜜炙附子含之嚥汁朱丹溪治疝氣用烏頭梔子並熱因寒用也李東垣治馮翰林姪隂盛格陽傷寒面赤目赤煩渇引飲脈來七八至但按之則散用薑附湯加人參投半斤服之得汗而愈此則神聖之妙也呉綬曰附子乃隂證要藥凡傷寒傳變三隂及中寒夾隂雖身大熱而脈沈者必用之或厥冷腹痛脈沈細甚則唇青囊縮者急須用之有退隂回陽之力起死回生之功近世隂證傷寒往往疑似不敢用附子直待隂極陽竭而用之已遲矣且夾隂傷寒内外皆隂陽氣頓衰必須急用人參健脈以益其原佐以附子温經散寒捨此不用將何以救之劉完素曰俗方治麻痺多用烏附其氣暴能衝開道路故氣愈麻及藥氣盡而正氣行則麻病愈矣張元素曰附子以白术為佐乃除寒濕之聖藥濕藥宜少加之引經又益火之原以消隂翳則便溺有節烏附是也虞摶曰附子稟雄壯之質有斬關奪將之氣能引補氣藥行十二經以追復散失之元陽引補血藥入血分以滋養不足之真隂引發散藥開腠理以驅逐在表之風寒引温煖藥達下焦以祛除在裏之冷濕震亨曰氣虚熱甚者宜少用附子以行參耆肥人多濕亦宜少加烏附行經仲景八味丸用為少隂嚮導後世因以附子為補藥誤矣附子走而不守取其健悍走下之性以行地黄之滯可致逺爾烏頭天雄皆氣壯形偉可為下部藥之佐無人表其害人之禍相習用為治風之藥及補藥殺人多矣王履曰仲景八味丸兼隂火不足者設錢仲陽六味地黄丸為隂虚者設附子乃補陽之藥非為行滯也好古曰烏附非身凉而四肢厥者不可僣用服附子以補火必妨涸水時珍曰烏附毒藥非危病不用而補藥中少加引導其功甚捷有人纔服錢匕即發燥不堪而昔人補劑用為常藥豈古今運氣不同耶荆府都昌王體瘦而冷無他病日以附子煎湯飲兼嚼硫黄如此數歳蘄州衛張百户平生服鹿茸附子藥至八十餘康健倍常宋張杲醫説載趙知府耽酒色每日煎乾薑熟附湯吞硫黄金液丹百粒乃能健啖否則倦弱不攴壽至九十他人服一粒即為害若此數人皆其臟腑稟賦之偏服之有益無害不可以常理㮣論也又瑣碎錄言滑臺風土極寒民啖附子如啖芋栗此則地氣使然爾附方舊二十六新八十七少隂傷寒初得二三日脈微細但欲寐小便色白者麻黄附子甘草湯微發其汁麻黄去節二兩甘草炙二兩附子炮去皮一枚水七升先煮麻黄去添納二味煮取三升分作三服取微汁張仲景傷寒論少隂發熱少隂病始得反發熱脈沈者麻黄附子細辛湯發其汗麻黄去節二兩附子炮去皮一枚細辛二兩水一斗先煮麻黄去沬乃納二味同煮三升分三服同上少隂下利少隂病下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯用大附子一個去皮生破八片甘草炙二兩乾薑三兩水三升煮一升分温再服其脈即出者愈面赤加葱九莖腹痛加芍藥二兩嘔加生薑二兩咽痛加桔梗一兩利止脈不出加人參二兩同上隂病惡寒傷寒已發汗不解反惡寒者虛也芍藥甘草附子湯補之芍藥三兩甘草炙三兩附子炮去皮一枚水五升煮取一升五合分服同上傷寒發躁傷寒下後又發其汗晝日煩燥不得眠夜不安靜不嘔不渇無表證脈沈微身無大熱者乾薑附子湯温之乾盞一兩生附子一枚去皮破作八片水三升煮取一升頓服傷寒論隂盛格陽傷寒隂盛格陽其人必躁熱而不飲水脈沈手足厥逆者是此證也霹靂散用大附子一枚燒存性為末蜜水調服逼散寒氣然後熱氣上行而汗出乃愈孫兆口訣熱病吐下及下利身冷脈微發躁不止者附子炮一枚去皮臍分作八片入鹽一錢水一升煎半升温服立效經驗良方隂毒傷寒孫兆口訣云房後受寒少腹疼痛頭疼腰重手足厥逆脈息沈細或作呃逆並宜退隂散用川烏頭乾薑等分切炒放冷為散每服一錢水一盞鹽一撮煎取半盞温服得汗解本事方玉女散治隂毒心腹痛厥逆惡候川烏頭去皮臍冷水浸七日切晒紙裹收之遇有患者取為末一錢入鹽八分水一盞煎八分服壓下隂毒如猪血相似再進一服濟生回陽散治隂毒傷寒面青四肢厥逆腹痛身冷一切冷氣大附子三枚炮裂去皮臍為末每服三錢薑汁半盞冷酒半盞調服良久臍下如火煖為度附續傳信方治隂毒傷寒煩燥迷悶急者用半兩重子一個生破作四片生薑一大塊作三片糯米一撮以水一升煎六合温服煖卧或汗出或不出候心定則以水解散之類解之不得與冷水如渇更煎滓服屢用多效中風痰厥昬不知人口眼喎斜并體虛之人患瘧疾寒多者五生飲用生川烏頭生附子並去皮臍各半兩生南星一兩生木香二錢五分毎服五錢生薑十片水二盞煎一盞温服方和劑局中風氣厥痰壅昬不知人六脉沈伏生附子去皮生南星去皮生木香半兩每服四錢薑九片水二盞煎七分温服之濟生方中風偏廢羌活湯用生附子一箇去皮臍羌活烏藥各一兩每服四錢生薑三片水一盞煎七分服王氏簡易方半身不遂遂令癖疰用附子一兩以無灰酒一升浸一七日隔日飲一合延年秘錄風病癱緩手足軃曳口眼喎斜語音蹇澀步履不正宜神驗烏龍丹主之川烏頭去皮臍五靈脂各五兩為末入龍腦麝香五分滴水為丸如彈子大每服一丸先以生薑汁研化暖酒調服一日二服至五七丸便覺手擡移得步十丸可以梳頭也梅師方風寒濕痺麻木不仁或手足不遂生川烏頭末每以香白米煮粥一盌入末四錢慢熬得所下薑汁一匙蜜三大匙空腹啜之或入薏苡末二錢左傳云風淫末病謂四末也脾主四肢風淫客肝則侵脾而四肢病也此湯極有力予毎授人良驗許學士本事方體虛有風外受寒濕身如在空中生附子生天南星各二錢生薑十片水一盞半慢火煎服子曽病此醫傳張子發授此方二服愈本事方口眼喎斜生烏頭青礬各等分為末每用一字㗜入鼻内取涕吐涎立效無比名通關散篋中秘寳方口卒噤瘖卒忤停尸並用附子末吹入喉中瘥千金翼産後中風身如角弓反張口噤不語川烏頭五兩剉塊黑大豆半升同炒半黒以酒三升傾鍋内急攪以絹濾取酒微温服一小盞取汗若口不開抝開灌之未效加烏雞糞一合炒納酒中服以瘥為度小品諸風血風烏荆主治諸風縱緩言語蹇濇徧身麻痛皮膚瘙痒及婦人血風頭痛目眩腸風臟毒下血不止者服之尤效有痛風攣搐頥頷不收者服六七服即瘥也川烏頭炮去皮臍一兩荆芥穗二兩為末醋麫糊丸梧子大温酒或熱水每服二十丸和劑方婦人血風虚冷月候不勻或手脚心煩熱或頭面浮腫頑麻用川烏頭一斤清油四兩鹽四兩鐺内同熬令裂如桑椹色為度去皮臍五靈脂四兩為末搗勻蒸餅丸如梧子大空心温酒鹽湯下二十丸亦治丈夫風疾梅師方諸風癎疾生川烏頭去皮二錢半五靈脂半兩為末猪心血丸梧子大每薑湯化服一丸小兒慢驚搐搦涎壅厥逆川烏頭生去皮臍一兩全蠍十箇去尾分作三服水一盞薑七片煎服孩湯氏嬰寳鑑小兒項軟乃肝腎虚風邪襲入用附子去皮臍天南星各二錢為末薑汁調攤貼天柱骨内服瀉青丸全幼心鑑小兒𩕄陷綿烏頭附子並生去皮臍二錢雄黄八分為末葱根搗和作餅貼陷處全幼心鑑麻痺疼痛仙桃丸治手足麻痺或癱瘓疼痛腰膝痺痛或打撲傷損閃肭痛不可忍生川烏不去皮五靈脂各四兩威靈仙五兩洗焙為末酒糊丸梧子大每服七丸至十丸鹽湯下忌茶此藥常服其效如神普濟方風痺肢痛營衛不行川烏頭炮去皮以大豆同炒至汗出為度去豆焙乾全蠍半錢焙為末釅醋熬稠丸綠豆大每温酒下七丸日一服惠聖方腰脚冷痺疼痛有風川烏頭三箇生去皮臍為散醋調塗帛上貼之須臾痛止聖惠方大風諸痺痰澼脹滿大附子半兩者二枚炮折酒漬之春冬五日夏秋三日每服一合以瘥為度聖惠方脚氣腿腫久不瘥者黒附子一箇生去皮臍為散生薑汁調知膏塗之藥乾再塗腫消為度簡要濟衆十脂疼痛麻木不仁生附子去皮臍木香各等分生薑五片水煎温服方王氏簡易捜風順氣烏附丸用川烏頭二十箇香附子半斤薑汁淹一宿炒焙為末酒糊丸梧子大每温酒下十丸肌體肥壯有風疾者宜常服之澹寮方頭風頭痛外臺秘要用臘月烏頭一升炒令黄末之以絹袋盛浸三斗酒中逐日温服孫兆口訣用附子炮石膏煅等分為末入腦麝少許每服半錢茶酒任下銚修真秘㫖用附子一枚生去皮臍綠豆一合同入子内煮荳熟為度去附子食綠豆立瘥每箇可煮五次後為末服之風毒頭痛聖惠方治風毒攻注頭目痛不可忍大附子一枚泡去皮為末以生薑一兩大黒豆一合炒熟同酒一盞煎七分調附末一錢温服皮又方治二三十年頭風不愈者用大川烏頭生去四兩天南星炮一兩為末每服二錢細茶三錢薄荷七葉鹽梅一箇水一盞煎七分臨卧温服錢朱氏集驗方治頭痛連臍者生烏頭一錢白芷四為末茶服一字仍以末㗜鼻有人用之得效風寒頭痛十便良方治風寒客于頭中清涕項筋急硬胸中寒痰嘔吐清水用大附子或大川烏頭二枚去皮蒸過川芎藭生薑各一兩焙研以茶湯調服一錢或剉片每用五錢水煎服隔三四日一服或加防風一兩三因方必效散治風寒流注偏正頭痛年久不愈最有神效用大附子一箇生切四片以薑汁一盞浸炙再浸再炙汁盡乃止高良薑等分為末每服一錢臘茶清調下忌熱物少時頭風摩散沐頭中風多汗惡風當先風一日則痛甚用大附子一箇炮食鹽等分為末以方寸匕摩𩕄上令藥力行或以油調稀亦可一日三上張仲景方年久頭痛川烏頭天南星等分為末葱汁調塗太陽穴經騐頭風斧劈難忍川烏頭末燒烟熏碗内温茶炮服之集簡方痰厥頭痛如破厥氣上衝痰塞胸膈炮附子三分釡墨四錢冷水調服方寸匕當吐即愈忌猪肉冷水腎厥頭痛指南方用大附子一箇炮熟去皮生薑半兩水一升半煎分三服刺經驗良方韭根丸治元陽虚頭痛如破眼睛如錐大川烏頭去皮微炮全蠍以糯米炒過去米等分為末韭根汁丸綠豆大每薄荷茶下十五丸一日一服氣虚頭痛氣虚上壅偏正頭痛不可忍者大附子一枚去皮臍研末葱汁麫糊丸綠豆大每服十丸茶清下僧繼洪澹寮方蠍附丸云氣虚頭痛惟此方最合造化之妙附子助陽扶虚鍾乳補陽鎭墜全蠍取其鑚透葱涎取其通氣湯使用椒以達下鹽以引用使虚氣下歸對證用之無不作效大附子一枚剜心入全蠍去毒三枚在内以餘附末同鍾乳粉二錢半白麫少許水和作劑包附煨熟去皮研末葱涎和丸梧子大每椒鹽湯下五十丸腎氣上攻頭頂不能轉移椒附丸用大熟附子一枚為末每用二錢以椒二十粒用白麫塡滿椒口水一盞半薑七片煎七分去椒入鹽空心㸃服椒氣下達以引逆氣歸經也方本事鼻淵腦泄生附子末葱涎和如泥酓涌泉穴普濟耳鳴不止無晝夜者烏頭燒作灰菖蒲等分為末綿裹塞之日再用取效楊氏産乳耳卒聾閉附子醋浸削尖挿之或更於上炙二七壯本草拾遺聤耳膿血生附子為末葱涕和灌耳中肘後喉痺腫塞附子去皮炮令拆以蜜塗上炙之令蜜入含之勿嚥汁已成者即膿出未成者即消出拾本草遺久患口瘡生附子為末醋麫調貼足心男左女右日再換之經驗風蟲牙痛普濟方用附子一兩燒灰枯礬一分為末揩之又方川烏頭川附子生研麪糊丸小豆大每綿包一丸咬之孔刪繁方用炮附子末納中乃止眼暴赤腫磣痛不得開淚出不止削附子赤皮末如蠶砂大著眥中以定為度張文仲備急方一切冷氣去風痰定遍身疼痛益元氣强力固精益髓令人少病川烏頭一斤用五升大甕鉢子盛以童子小便浸七日逐日添令溢出揀去壞者不用餘以竹刀切作四片新汲水淘七次乃浸之日日換水日足取焙為末酒煮麪糊丸綠豆大每服十丸空心鹽湯下少粥飯壓之經驗方升降諸氣暖則宣流熟附子一大箇分作二服水二盞煎一盞入沈香汁温服和劑局方中寒昬困薑附湯治體虚中寒昬不知人及臍腹冷痛霍亂轉筋一切虛寒之病生附子一兩去皮臍乾薑炮一兩每服三錢水二鍾煎一鍾温服和劑局方心腹冷痛冷熱氣不和山梔子川烏頭等分生研為末酒糊丸梧子大每服十五丸生薑湯下小腸氣痛加炒茴香葱酒下二十丸王氏博濟方心痛疝氣濕熱因寒鬱而發用梔子降濕熱烏頭破寒鬱烏頭為梔子所引其性急速不留胃中也川烏頭山梔子各一錢為末順流水入薑汁一匙調下丹溪纂要寒厥心痛及小腸膀胱痛不可止者神砂一粒丹用熟附子去皮鬱金橘紅各一兩為末醋麪糊丸如酸棗大朱砂為衣每服一丸男子酒下女人醋湯下宣明方寒疝腹痛遶臍手足厥冷白汗出脈弦而𦂳用大烏頭煎主之大烏頭五枚去臍水三升煮取一升去滓納蜜二升煎令水氣盡强人服七合弱人服五合不瘥明日更服張仲景金匱玉函方寒疝身痛腹痛手足逆冷不仁或身痛不能眠用烏頭桂枝湯主之烏頭一味以蜜二斤煎減半入桂枝湯五合解之得一升初服二合不知再服又不知加至五合其知者如醉狀得吐為中病也金匱玉函寒疝引脇肋心腹皆痛諸藥不效者大烏頭五枚去角四破以白蜜一斤煎令透取焙為末别以熟蜜和丸梧子大每服二十丸冷鹽湯下永除崔氏方寒疝滑泄腹痛腸鳴自汗厥逆熟附子去皮臍𤣥胡索炒各一兩生木香半兩每服四錢水二盞薑七片煎七分温服濟生方小腸諸疝倉卒散治寒疝腹痛小腸氣膀胱氣脾腎諸痛攣急難忍汗出厥逆大附子炒去皮臍一枚山梔子炒焦四兩每用二錢水一盞酒半盞煎七分入鹽一捻温服宣明方治隂疝小腹腫痛加蒺藜子等分虚者加桂枝等分薑糊為丸温酒服五十丸虚寒腰痛鹿茸去毛酥炙微黄附子炮去皮臍各二兩鹽花三分為末棗肉和丸梧子大每服三十丸空心温酒下夷堅志云時康祖大夫病心胷一漏數竅流汁已二十年又苦腰痛行則傴僂形神憔悴醫不能治通判韓子温為檢聖惠方得此方令服旬餘腰痛減久服遂瘥心漏亦瘥精力倍常步履輕捷此方本治腰而效乃如此元臟傷冷經驗方用附子炮去皮臍為末以水二盞入藥二錢鹽葱薑棗同煎取一盞空心服去積冷暖下元肥腸益氣酒食無碍子梅師方二虎丸補元臟進飲食壯筋骨用烏頭附合四兩釅醋浸三宿切作片子掘一小坑炭火燒赤以醋三升同藥傾入坑内用盆合之一宿取出去砂土入青鹽四兩同炒赤黄色為末醋打麪糊丸如梧子大空心冷酒下十五丸婦人亦宜胃冷有痰脾弱嘔吐生附子半夏各二錢薑十片水二盞煎七分空心温服一方並炮熟加木香五分竒效良方久冷反胃經驗方用大附子一箇生薑一兩剉細同煮研如麪糊每米飲化服一錢衛生家寳方用薑汁打糊和附子末為丸大黄為衣每温水服十丸逼斗門方用長大附子一箇坐于磚上四面著火漸以生薑自然汁淬之依前再逼再淬約薑汁盡半碗乃止研末每服一錢粟米飲下不過三服瘥或以猪腰子切片炙熟蘸食四方便集用大附子一箇切下頭子剜一竅安丁香十丸箇在内仍合定線紥入砂銚内以薑汁浸過文火熬乾為末每挑少許置掌心䑛喫日十數次忌毒物生冷脾寒瘧疾濟生方云五臟氣虚隂陽相勝發為痎瘧寒多熱少或但寒不熱宜七束湯主之用附子一枚炮七次鹽湯浸七次去皮臍分作二服水一碗生薑七片棗七枚煎七分露一宿發日空心温服未久再進一服王璆百一選方云寒痰宜附子風痰宜烏頭若用烏頭則寒多者火炮七次熱多者湯炮七次去皮焙乾如上法用烏頭性熱炮多則熱散也盞又杲附湯用熟附子去皮草果仁各二錢半水一薑七片棗一枚煎七分發日早温服塗肘后方臨發時以醋和附子于背上寒熱瘧疾附子一枚重五錢者麪煨人參丹砂各一錢為末煉蜜丸梧子大每服二十丸未發前連進三服中病則吐或身體麻木未中病來日再服論龎安常傷寒瘴瘧寒熱冷瘴寒熱往來頭痛身疼嘔痰或汗多引飲或自利煩躁宜薑附湯主之大附子一枚四破每以一片水一盞生薑十片煎七分温服李侍制云此方極妙章傑云嶺南以啞瘴為危急不過一二日而死醫謂極熱感寒也用生附子一味治之多愈得非以熱攻熱而發散寒邪乎真起死回生之藥也嶺南衛生方小便虚閉兩尺脉沈微用利小水藥不效者乃虚寒也附子一箇炮去皮臍鹽水浸良久澤㵼一兩每服四錢水一盞半燈心七莖煎服即愈普濟方腫疾喘滿大人小兒男女腫因積得既取積而腫再作小便不利若再用利藥性寒而小便愈不通矣醫者到此多束手葢中焦下焦氣不升降為寒痞隔故水凝而不通惟服沈附湯則小便自通喘滿自愈用生附子一箇去皮臍切片生薑十片入沈香一錢磨水同煎食前冷飲附子雖三五十枚亦無害小兒每服三錢水煎服朱氏集驗方脾虚濕腫大附子五枚去皮四破以赤小豆半升藏附子于中慢火煮熟去豆焙研末以薏苡仁粉打糊丸梧子大每服十丸蘿蔔湯下朱氏集驗方隂水腫滿烏頭一升桑白皮五升水五升煮一升去滓銅器盛之重湯煎至可丸丸小豆大每服三五丸取小便利為佳忌油膩酒麪魚肉皮又方大附子童便浸三日夜逐日換尿以布擦去搗如泥酒糊和丸小豆大每服三十丸煎流氣飲送下普濟方大腸冷秘附子一枚炮去皮取中心如棗大為末二錢蜜水空心服之聖濟總錄老人虚泄不禁熟附子一兩赤石脂一兩為末醋糊丸梧子大米飲下五十丸楊氏家藏方冷氣洞泄生川烏頭一兩木香半兩為末醋糊丸梧子大每陳皮湯下二十丸本事方臟寒脾泄及老人中氣不足久泄不止肉豆蔲二兩煨熟大附子去皮臍一兩五錢為末粥丸梧子大毎服八十丸蓮肉煎湯下十便良方治脾胃虛冷大腸滑泄米穀不化乏力用大附子十兩連皮同大棗二斤於石器内以水煮一日常令水過兩指取出每箇切作三片再同煮半日削去皮切焙為末别以棗肉和丸梧子大每空心米飲下三四十丸小兒吐泄注下小便少白龍丸用熟附子五錢白石脂煅龍骨煅各二錢半為末醋麪糊丸黍米大每米飲量兒大小服全幼心鑑霍亂吐泄不止附子重七錢者炮去皮臍為末每服四錢水二盞鹽半錢煎一盞温服立止孫兆秘寳方水泄久痢川烏頭二枚一生用一以黒豆半合同煮熟研丸綠豆大每服五丸黄連湯下普濟方久痢赤白獨聖丸用川烏頭一箇灰火燒烟盡取出地上盞葢良久研末酒化蠟丸如大麻子大每服三丸赤痢黄連甘草黒豆煎湯放冷吞下白痢甘草黒豆煎湯冷吞如㵼及肚痛以水吞下並空心服之忌熱物經驗良方久痢休息熟附子半兩研末雞子白二枚搗和丸梧子大傾入沸湯煮數沸漉出作兩服米飲下聖濟總錄下痢欬逆脈沈隂寒者退隂散主之陳自明云一人病此不止服此兩服而愈方見前隂毒傷寒下下血虚寒日久腸冷者熟附子去皮枯白礬一兩為末每服三錢米飲下又方熟附子一枚去皮生薑三錢半水煎服或加黒豆一百粒並聖惠方陽虚吐血生地黄一斤搗汁入酒少許以熟附子一兩半去皮臍切片入汁内石器煮成膏取附片焙乾入山藥三兩研末以膏和搗丸梧子大每空心米飲下三十丸昔葛察判妻苦此疾百藥皆試得此而愈屢發屢效余居士選竒方溲數白濁熟附子為末每服二錢薑三片水一盞煎六分温服普濟方虚火背熱虛火上行背内熱如火炙者附子末津調塗涌泉穴摘𤣥方經水不調血臟冷痛此方平易捷徑熟附子去皮當歸等分每服三錢水煎服普濟方斷産下胎生附子為末淳酒和塗右足心胎下去之小品方折腕損傷卓氏膏用大附子四枚生切以猪脂一斤三年苦醋同濆三宿取脂煎三上三下日摩傅之深師方癰疽腫毒川烏頭炒黄蘗炒各一兩為末唾調塗之留頭乾則以米泔潤之同上癰疽久漏瘡口冷膿水不絶内無惡肉大附子以水浸透切作大片厚三分安瘡口上以艾炙之隔數日一炙炙至五七次仍服内托藥自然肌肉長滿研末作餅子亦可心薛已外科法癰疽弩肉如眼不斂諸藥不治此法極妙附子削如碁子大以唾粘貼上用艾火炙之附子焦復唾濕再炙令熱氣徹内即瘥千金方癰疽肉突烏頭五枚濃醋三升濆三日洗之日夜三四度古今錄驗丁瘡腫痛醋和附子末塗之乾再上千金翼久生疥癬川烏頭生切以水煎洗甚驗聖惠手足凍裂附子去皮為末以水麪調塗之良驗談埜翁試方足釘怪疾兩足心凸腫上生黒豆瘡硬如釘脛骨生碎孔髓流出身發寒頭惟思飲酒此是肝腎冷熱相吞用炮川烏頭末傅之内服韭子湯效夏氏竒疾方烏頭附子尖主治為末茶服半錢吐風痰癲癎時珍發明時珍曰烏附用尖亦取其銳氣直達病所爾無他義也保幼大全云小兒慢脾驚風四肢厥逆用附子尖一箇硫黄棗大一箇蠍稍七箇為末薑汁麪糊丸黄米大每服十丸米飲下亦治久瀉尫羸凡用烏附不可執為性熱審其手足冷者輕則用湯甚則用丸重者用膏候手足暖陽氣回即為佳也按此方乃和劑局方碧霞丹變法也非真慢脾風不可輒用故初虞世有金虎碧霞之戒附方舊一新七風厥癲癎凡中風痰厥癲癎驚風痰涎上壅牙關𦂳急上視搐搦並宜碧霞丹主之烏頭尖附子尖蠍稍各七十箇石綠研九度飛過十兩為末麪糊丸芡子大每用一丸薄荷汁半盞化下更服温酒半合須㬰吐出痰涎為妙小兒驚癎加白僵蠶等分和劑局方臍風撮口生川烏尖三箇全足蜈蚣半條酒浸炙麝香少許為末以少許吹鼻得嚏乃以薄荷湯灌一字永類方木舌腫脹川烏尖巴豆研細醋調塗刷集簡方牙痛難忍附子尖天雄尖全蠍各七箇生研為末㸃之永類方奔豚疝氣作痛或隂囊腫痛去鈴丸用生川烏尖七箇巴豆七枚去皮油為末糕糊丸梧子大朱砂麝香為衣每服二丸空心冷酒或冷鹽湯下三兩日一服不可多澹寮方割甲成瘡連年不愈川烏頭尖黄蘗等分為末洗了貼之以愈為度古今錄驗老幼口瘡烏頭尖一箇天南星一箇研末薑汁和塗足心男左女右不過二三次即愈本草綱目卷十七上
