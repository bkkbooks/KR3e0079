body:
  text: 本草綱目卷三十四明李時珍撰木之一香木類三十五種内附六種栢本經上品釋名椈音菊側栢李時珍曰按魏子才六書精藴云萬木皆向陽而栢獨西指蓋隂木而有貞徳者故字從白白者西方也陸佃埤雅云柏之指西猶鍼之指南也柏有數種入藥惟取葉扁而側生者故曰側柏寇宗奭曰予官陜西登髙望柏千萬株皆一一西指葢此木至堅不畏霜雪得木之正氣他木不及所以受金之正氣所制一一西指也集解别録曰柏實生太山山谷柏葉尤良四時各依方靣采陰乾陶𢎞景曰處處有柏當以太山為佳爾並忌取塜墓上者其葉以秋夏采者良蘇恭曰今太山無復采子惟出陜州冝州為勝八月采之蘇頌曰柏實以乾州者為最三月開花九月結子成熟取采蒸曝舂礧取仁用其葉名側柏密州出者尤佳雖與他柏相類而其葉皆側向而生功効殊别古柏葉尤竒益州諸葛孔明廟中有大柏木相傳是蜀世所植故人多采以作藥其味甘香異常柏也雷斆曰柏葉有花柏葉叢柏葉及有子圓葉其有子圓葉成片如大片雲母葉皆側葉上有微赤毛者宜入藥用花柏葉其樹濃葉成朶無子叢柏葉其樹緑色並不入藥陳承曰陶隱居説柏忌塜墓上者而今乾州者皆是乾陵所出他處皆無大者但取其州土所宜子實氣味豐美可也其柏異於他處木之文理大者多為菩薩雲氣人物鳥獸狀極分明可觀有盗得一株徑尺者值萬錢宜其子實為貴也時珍曰史記言松柏為百木之長其樹聳直其皮薄其肌膩其花細𤨏其實成毬狀如小鈴霜後四裂中有數子大如麥粒芬香可愛柏葉松身者檜也其葉尖硬亦謂之栝今人名圓柏以别側柏松葉柏身者樅也松檜柏半者檜柏也蛾睂山中一種竹葉柏身者謂之竹柏柏實修治斆曰凡使先以酒浸一宿至明漉出曝乾用黄精自然汁於日中煎之緩火煑成膏為度每煎柏子仁三兩用酒五兩浸時珍曰此法是服食家用者尋常用只蒸熟曝烈舂簸取仁炒研入藥氣味甘平無毒甄權曰甘辛畏菊花羊蹄草徐之才曰見葉下主治驚悸益氣除風濕安五臓久服令人潤澤美色耳目聰明不飢不老輕身延年本經療恍惚虚損吸吸歴節腰中重痛益血止汗别録治頭風腰腎中冷膀胱冷濃宿水興陽道益夀去百邪鬼魅小兒驚癎甄權潤肝好古養心氣潤腎燥安魂定魄益智寧神燒瀝澤頭髮治疥癬時珍𤼵明王好古曰柏子仁肝經氣分藥也又潤腎古方十精丸用之時珍曰柏子仁性平而不寒不燥味甘而補辛而能潤其氣清香能透心腎益脾胃葢仙家上品藥也宜乎滋養之劑用之列仙傳云赤松子食柏實齒落更生行及奔馬諒非虚語也附方舊二新四服柏實法八月連房取實暴收去殻研末毎服二錢温酒下一日三服渴即飲水令人悦澤一方加松子仁等分以松脂和丸一方加菊花等分蜜丸服竒效方用柏子仁二斤為末酒浸為膏棗肉三斤白蜜白术末地黄末各一斤擣匀丸彈子大毎嚼一丸一日三服百日百病愈久服延年壯神老人虚祕柏子仁松子仁大麻仁等分同研溶蜜蠟丸梧子大以少黄丹湯食前調服二三十丸日二服宼宗奭腸風下血柏子十四箇搥碎囊貯浸好酒三盞煎八分服立止方普濟小兒躽啼驚癎腹滿大便青白色用柏子仁末温水調服一錢聖惠方黃水濕瘡真柏油二兩香油二兩熬稠搽之如神陸氏積徳堂方柏葉修治斆曰凡用挼去兩畔并心枝了用糯泔浸七日以酒拌蒸一伏時毎一斤用黄精自然汁十二兩浸焙又浸又焙待汁乾用之時珍曰此服食治法也常用或生或炒各従本方氣味苦㣲温無毒權曰苦辛性濇與酒相宜頌曰性寒之才曰𤓰子牡礪桂為之使畏菊花羊蹄諸石及麫麴伏砒硝𢎞景曰柏之葉實服餌所重此云惡麴而人以釀酒無妨恐酒米相和異單用也主治吐血衂血痢血崩中赤白輕身益氣令人耐寒暑去濕痺生肌别録治冷風歴節疼痛止尿血甄權炙罯凍瘡燒取汁塗頭黒潤鬂髮太明傅湯火傷止痛滅瘢服之療蠱痢作湯常服殺五臓蠱益人蘇頌發明震亨曰柏屬隂與金善守故采其葉隨月建方取其多得月令之氣此補陰之要藥其性多燥久服之大益脾土以滋其肺時珍曰柏性後凋而耐久禀堅凝之質乃多夀之木所以可入服食道家以之㸃湯常飲元旦以之浸酒辟邪皆有取於此麝食之而體香毛女食之而體輕亦其證驗矣毛女者秦王宫人闗東賊至驚走入山飢無所食有一老公教喫松柏葉初時苦澀久乃相宜遂不復飢冬不寒夏不熱至漢成帝時獵者於終南山見一人無衣服身生黒毛跳坑越澗如飛乃密圍獲之去秦時二百餘載矣事出葛洪抱朴子書中附方舊十新九服松柏法孫真人枕中記云嘗以三月四月采新生松葉長三四寸許并花蕋隂乾又於深山巖谷中采當年新生柏葉長二三寸者隂乾為末白蜜丸如小豆大常以日未出時燒香東向手持八十一丸以酒下服一年延十年命服二年延二十年命欲得長肌肉加大麻巨勝欲心力壯健者加伏苓人參此藥除百病益元氣滋五臓六腑清明耳目强壯不衰老延年益夀神騐用七月七日露水丸之更佳服時仍祝曰神仙真藥體合自然服藥入腹天地同年祝畢服藥忌諸雜肉五辛神仙服餌五月五日采五方側柏葉三斤逺志去心二斤白伏苓去皮一斤為末煉蜜和丸梧子大毎以仙靈脾酒下三十丸日再服並無所忌勿示非人中風不省涎潮口禁語言不出手足軃曵得病之日便進此藥可使風退氣和不成癈人柏葉一握去枝葱白一握連根研如泥無灰酒一升煎一二十沸温服如不飲酒分作四五服方進他藥楊氏家藏方時氣瘴疫社中西南柏樹東南枝取暴乾研末毎服一錢新水調下日三四服聖恵方霍亂轉筋柏葉搗爛裹脚上及煎汁淋之聖恵方吐血不止張仲景柏葉湯用青柏葉一把乾薑二片阿膠一挺炙三味以水二升煑一升去滓别絞馬通汁一升合煎取一升綿濾一服盡之聖惠方用柏葉米飲服二錢或蜜丸或水煎服並良憂恚嘔血煩滿少氣胷中疼痛柏葉為散米飲調服二方寸匕聖恵方衂血不止柏葉榴花研末吹之普濟方小便尿血柏葉黄連焙研酒服三錢急濟方大腸下血隨四時方向采側柏葉燒研毎米飲服二錢王渙之舒州病此陳宜父大夫𫝊方二服愈百一選方酒毒下血或下痢嫩柏葉九蒸九晒二兩陳槐花炒焦一兩為末蜜丸梧子大毎空心温酒下四十丸普濟方蠱痢下血男子婦人小兒大腹下黒血茶脚色或膿血如淀色柏葉焙乾為末與黄連同煎為汁服之圖經小兒洞痢柏葉煑汁代茶飲之經騐方月水不斷側柏葉炙芍藥等分毎用三錢水酒各半煎服室女用側柏葉木賊炒微焦等分為末毎服二錢米飲下聖濟總録湯火燒灼柏葉生擣塗之繫定二三日止痛滅瘢本草圖經鼠瘻核痛未成膿以柏葉擣塗熬塩熨之氣下即消姚僧坦集騐方大風癘疾眉髪不生側柏葉九蒸九晒為末煉蜜丸梧子大毎服五丸至十丸日三夜一服百日即生聖恵方頭髮不生側柏葉隂乾作末和麻油塗之梅師方頭髮黃赤生柏葉末一升猪膏一斤和丸彈子大毎以布裹一丸納泔汁中化開沭之一月色黒而潤矣聖恵方枝節主治煑汁釀酒去風痺歴節風燒取􅢧油療瘑疥及蟲癩良蘇恭附方舊二新一霍亂轉筋以煖物裹脚後以柏术片煑湯淋之經騐方齒䘌腫痛柏枝燒熱柱孔中須㬰蟲縁枝出聖恵惡瘡有蟲久不愈者以柏枝節燒瀝取油傅之三五次無不愈亦治牛馬疥陳承本草别説脂主治身靣疣目同松脂研匀塗之數夕自失聖惠根白皮氣味苦平無毒主治火灼爛瘡長毛髮别録附方舊一熱油灼傷柏白皮以臘猪脂煎油塗瘡上肘后方松别録上品釋名時珍曰按王安石字説云松柏為百木之長松猶公也柏猶伯也故松從公柏從白集解别録曰松脂出太山山谷六月采頌曰松處處有之其葉有兩鬛五鬛七鬛歳久則實繁中原雖有不及塞上者佳好也松脂以通明如薰陸香顆者為勝宗奭曰松黄一如蒲黄但味差淡松子多海東來今闗右亦有但細小味薄也時珍曰松樹磥砢修聳多節其皮粗厚有鱗形其葉後凋二三月抽㽔生花長四五寸采其花蕋為松黄結實狀如猪心疊成鱗砌秋老則子長鱗裂然葉有二針三針五針之别三針者為栝子松五針者為松子松其子大如柏子惟遼海及雲南者子大如巴豆可食謂之海松子詳見果部孫思邈云松脂以衡山者為良衡山東五百里滿谷所出者與天下不同蘇軾云鎮定松脂亦良抱朴子云凡老松皮内自然聚脂為第一勝於鑿取及煑成者其根下有傷處不見日月者為陰脂尤佳老松餘氣結為伏苓千年松脂化為琥珀玉策記云千年松樹四邊枝起上杪不長如偃葢其精化為青牛青羊青犬青人伏龜其夀皆千歳松脂别名松膏本經松肪同松膠綱目松香同瀝青修治𢎞景曰采煉松脂法並在服食方中以桑灰汁或酒煑軟挼納寒水中數十過白滑則可用頌曰凡用松脂先須鍊治用大釡加水置甑用白茅藉甑底又加黄砂於茅上厚寸許然後布松脂於上炊以桑薪湯減頻添熱水候松脂盡入釡中乃出之投于冷水既凝又蒸如此二過其白如玉然後入用氣味苦甘温無毒權曰甘平震亨曰松脂屬陽金伏汞主治癰疽惡瘡頭瘍白秃疥瘙風氣安五臓除熱久服輕身不老延年本經除胃中伏熱咽乾消渴風痺死肌鍊之令白其赤者主惡痺别録煎膏生肌止痛排膿抽風貼諸瘡膿血瘻爛塞牙孔殺蟲甄權除邪下氣潤心肺治耳聾古方多用辟穀大明强筋骨利耳目治崩帶時珍發明𢎞景曰松柏皆有脂潤凌冬不凋理為佳物服食多用但人多輕忽之耳頌曰道人服餌或合伏苓松柏實菊花作丸亦可單服時珍曰松葉松實服餌所須松節松心耐久不朽松枝則又樹之津液精華也在土不朽流脂日久變為琥珀宜其可以辟穀延齡葛洪抱朴子云上黨趙瞿病癩歴年垂死其家棄之送置山穴中瞿怨泣經月有仙人見而哀之以一囊藥與之瞿服百餘日其瘡都愈顔色豐悦肌膚玉澤仙人再過之瞿謝活命之恩乞求其方仙人曰此是松脂山中便多此物汝錬服之可以長生不死瞿乃歸家長服身體轉輕氣力百倍登危渉險終日不困年百餘歳齒不墜髪不白夜卧忽見屋間有光大如鏡久而一室盡明如晝又見靣上有采女一人戱於口鼻之間後入抱犢山成地仙於時人聞瞿服此脂皆競服之車運驢負積之盈室不過一月未覺大益皆輙止焉志之不堅如此張杲醫説有服松丹之法附方舊七新十七服食辟穀千金方用松脂十斤以桑薪灰汁一石煑五七沸漉出冷水中旋復煑之凡十遍乃白細研為散毎服一二錢粥飲調下日三服服至十兩以上不饑饑再服之一年以後夜視目明久服延年益夀服又法百鍊松脂治下篩蜜和納角中勿見風日毎一團一日二服服至百日耐寒暑二百日五臓補益五年即見西王母伏虎禪師服法用松脂十斤鍊之五度令苦味盡毎一斤入伏苓四兩毎旦水服一刀圭能令不食而復延齡身輕清爽强筋補益四聖不老丹用明松脂一斤以無灰酒沙鍋内桑柴火煑數沸竹杖攪稠乃住火傾入水内結塊復以酒煑九遍其脂如玉不苦不澀乃止為細末用十二兩入白伏苓末半斤黄菊花末半斤柏子仁去油取霜半斤鍊蜜丸如梧子大毎空心好酒送下七十二丸須擇吉日修合勿令婦人雞犬見之松梅丸用松脂以長流水桑柴煑拔二次再以桑灰滴汁煑七次扯㧞更以好酒煑二次仍以長流水煑二次色白不苦為度每一斤入九蒸地黄末十兩烏梅末六兩錬蜜丸梧子大毎服七十丸空心塩米湯下健陽補中强筋潤肌大能益人竒白飛霞方外方揩齒固牙松脂出鎮定者佳稀布盛入沸湯煑取浮水靣者投冷水中不出者不用研末入白伏苓末和勻日用揩齒潄口亦可嚥之固牙駐顔蘇東坡仇池筆記歴節諸風百節酸痛不可忍松脂三十斤錬五十遍以錬酥三升和脂三升攪令極稠毎旦空心酒服方寸匕日三服數食麫粥為佳慎血腥生冷酢物果子一百日瘥外臺秘要肝虚目淚鍊成松脂一斤釀米二斗水七斗麴二斗造酒頻飲之婦人白帶松香五兩酒二升煑乾木臼杵細酒糊丸如梧子大毎服百丸温酒下摘𤣥方小兒秃瘡簡便方用松香五錢猪油一兩熬搽一日數次數日即愈麻衛生寶鑑用瀝青一兩黄蠟一兩半銅緑一錢半油一兩半文武熬收毎攤貼之神效小兒𦂳唇松脂炙化貼之聖恵方風蟲牙痛刮松上脂滚水泡化一漱即止已試騐集簡方齲齒有孔松脂絍塞須臾蟲從脂出也梅師方久聾不聽錬松脂三兩巴豆一兩和搗成丸薄綿裹塞一日二度梅師方一切瘻瘡鍊成松脂末填令滿日三四度聖恵方一切腫毒松香八兩銅青二錢蓖麻仁五錢同搗作膏攤貼甚妙李樓竒方軟節頻發翠玉膏用通明瀝青八兩銅緑二兩麻油三錢雄猪膽汁三箇先溶瀝青乃下油膽傾入水中扯拔器盛毎月緋帛攤貼不須再換小金絲膏治一切瘡癤腫毒瀝青白膠香各二兩乳香二錢沒藥一兩黃蠟三錢又以香油三錢同熬至滴下不散傾入水中扯千遍收貯毎捻作餅貼之疥癬濕瘡松膠香研細少入輕粉先以油塗瘡糝末在上一日便乾頑者三二度愈劉涓子鬼遺方隂囊濕痒欲潰者用板兒松香為末紙卷作筒毎根入花椒三粒浸燈盞内三宿取出㸃燒淋下油搽之先以米泔洗過簡便方金瘡出血瀝青末少加生銅屑末糝之立愈唐珤經騐方猪囓成瘡松脂錬作餅貼之千金刺入肉中百理不瘥松脂流出如乳頭香者傅上以帛裹三五日當有根出不痛不痒不覺自安兵部手集松節氣味苦温無毒主治百節久風風虚脚痺疼痛别録釀酒主脚弱骨節風𢎞景炒焦治筋骨間病能燥血中之濕震亨治風蛀牙痛煎水含漱或燒灰日揩有效時珍發明時珍曰松節松之骨也質堅氣勁久亦不朽故筋骨間風濕諸病宜之附方舊三新四歴節風痛四肢如解脱松節酒用二十斤酒五斗浸三七日毎服一合日五六服外臺轉筋攣急松節一兩剉如米大乳香一錢銀石器慢火炒焦存一二分性出火毒研末毎服一二錢熱木𤓰酒調下一應筋病皆治之孫用和秘寶方風熱牙病聖恵方用油松節如棗大一塊碎切胡椒七顆入燒酒須二三盞乘熱入飛過白礬少許噙漱三五口立瘥又用松節二兩槐白皮地骨皮各一兩漿水煎湯熱漱冷吐瘥乃止反胃吐食松節煎酒細飲之百一方隂毒腹痛油松木七塊炒焦冲酒二鍾熱服集簡方顛撲損傷松節煎酒服方談埜翁松􅢧音詣火燒松枝取液也主治瘡疥及馬牛瘡蘇恭松葉别名松毛氣味苦温無毒主治風濕瘡生毛髮安五臓守中不饑延年别録細切以水及麫飲服之或擣屑丸服可斷穀及治惡疾𢎞景炙罯凍瘡風瘡佳大明去風痛脚痺殺米蟲時珍附方舊六新三服食松葉松葉細切更研毎日食前以酒調下二錢亦可煑汁作粥食初服稍難久則自便矣令人不老身生緑毛輕身益氣久服不已絶穀不飢不渴聖恵方天行温疫松葉細切酒服方寸匕日三服能辟五年瘟傷寒類要中風口喎青松葉一斤搗汁清酒一升浸二宿近火一宿初服半升漸至一升頭靣汗出即止千金方三年中風松葉一斤細切以酒一斗煮取三升頓服汗出立瘥千金方歴節風痛松葉搗汁一升以酒三升浸七日服一合日三服千金方脚氣風痺松葉酒治十二風痺不能行服更生散四劑及衆療不得力服此一劑便能行逺不過兩劑松葉六十斤細剉以水四石煮取四斗九升以米五斗釀如常法别煑松葉汁以漬米并饙飯泥釀封頭七日發澄飲之取醉得此酒力者甚衆千金方風牙腫痛松葉一握塩一合酒二升煎漱聖恵方大風惡瘡猪肉松葉二斤麻黄去節五兩剉以生絹袋盛清酒二斗浸之春夏五日秋冬七日每温服一小盞常令醺醺以效為度聖恵方陰囊濕痒松毛煎湯頻洗簡便方松花别名松黄氣味甘温無毒震亨曰多食發上焦熱病主治潤心肺益氣除風止血亦可釀酒時珍𤼵明恭曰松花即松黄拂取正似蒲黄常服令輕身療病勝似皮葉及脂也頌曰花上黄粉山人及時拂取作湯㸃之甚佳但不堪停久故無用寄逺時珍曰今人收黃和白沙糖印為餅膏充果餅食之且難久收恐輕身療病之功未必勝脂葉也附方舊一新一頭旋腦腫三月收松花並薹五六寸如鼠尾者蒸切一升以生絹囊貯浸三升酒中五日空心暖飲五合普濟方産後壯熱頭痛頰赤口乾唇焦煩渴昬悶用松花蒲黄川芎當歸石膏等分為末每服二錢水二合紅花二捻同煎七分細呷本草衍義根白皮氣味苦温無毒主治辟糓不饑别録補五勞益氣大明木皮别名赤龍皮主治癰疽瘡口不合生肌止血治白秃杖瘡湯火瘡時珍附方新四腸風下血松木皮去粗皮取裏白者切晒焙研為末毎服一錢臘茶湯下楊氏家藏方三十年痢赤松上蒼皮一斗為末麫粥和服一升日三不過一斗救人聖恵方金瘡杖瘡赤龍鱗即古松皮煆存性研末搽之最止痛永類銓方小兒頭瘡浸濕名胎風瘡古松上自有缺調皮入豆䜴少許瓦上炒存性研末入輕粉香油塗之經騐良方松實見果部艾納見草部苔類桑花松蕈見菜部香蕈下杉别録中品釋名煔音杉沙木綱目㯳木音敬集解頌曰杉材舊不著所出州土今南中深山多有之木類松而徑直葉附枝生若刺針郭璞註爾雅云煔似松生江南可以為船及棺材作柱埋之不腐又人家常用作桶板甚耐水宗奭曰杉幹端直大抵如松冬不凋但葉濶成枝也今處處有之入藥須用油杉及臭者良時珍曰杉木葉硬㣲扁如刺結實如楓實江南人以驚蟄前後取枝挿種出倭國者謂之倭木並不及蜀黔諸峒所産者尤良其木有赤白二種赤杉實而多油白杉虚而乾燥有斑紋如雉者謂之野雞斑作棺尤貴其木不生白蟻燒灰最發火藥杉材氣味辛微温無毒主治漆瘡煮湯洗之無不瘥别録煮水浸捋脚氣腫滿服之治心腹脹痛去惡氣蘇恭治風毒奔豚霍亂上氣並煎湯服大明發明震亨曰杉屑属金有火其節煮汁浸捋脚氣腫滿尤效頌曰唐栁栁州纂救三死方云元和十二年二月得脚氣夜半痞絶脇有塊大如石且死困不知人搐搦上視三月家人號哭榮陽鄭洵美傳杉木湯服半食頃大下三行氣通塊散方用杉木節一大升橘葉切一大升無葉則以皮代之大腹檳榔七枚連子碎之童子小便三大升共煮一大升半分為兩服若一服得快即停後服此乃死病㑹有教者乃得不死恐人不幸病此故傳之云附方新四肺壅痰滯上焦不利卒然欬嗽杉木屑一兩皂角去皮酥炙三兩為末蜜丸梧子大毎米飲下十丸一日四服聖恵方小兒陰腫赤痛日夜啼呌數日退皮愈而復作用老杉木燒灰入膩粉清油調傅效危氏得効方肺壅失音杉木燒炭入盌中以小盌覆之用湯淋下去盌飲水不愈再作音出乃止集簡方臁瘡黒爛多年老杉木節燒灰麻油調隔箬葉隔之絹帛包定數貼而愈救急方皮主治金瘡血出及湯火傷灼取老樹皮燒存性研傅之或入雞子清調傅一二日愈時珍葉主治風蟲牙痛同芎藭細辛煎酒含漱時珍子主治疝氣痛一歳一粒燒研酒服時珍杉菌見菜部附録丹桎木皮桎音直藏器曰生江南深山似杉木皮主治傷風取一握去土打碎煎如糖日日塗之桂别録上品牡桂本經上品釋名梫音寢時珍曰按范成大桂海志云凡木葉心皆一縱理獨桂有兩道如圭形故字從圭陸佃埤雅云桂猶圭也宣導百藥為之先聘通使如執圭之使也爾雅謂之梫者能梫害他木也故呂氏春秋云桂枝之下無雜木雷公炮炙論云桂釘木根其木即死是也桂即牡桂之厚而辛烈者牡桂即桂之薄而味淡者别録不當重出今併為一而分目於下集解别録曰桂生桂陽牡桂生南海山谷二月八月十月采皮隂乾𢎞景曰南海即是廣州神農本經惟有牡桂菌桂俗用牡桂扁廣殊薄皮黄脂肉甚少氣如木蘭味亦類桂不是知别樹是桂之老宿者􅌲桂正圓如竹三重者良俗中不見惟以嫩枝破卷成圓者用之非真菌桂也並宜研訪今俗又以半卷多脂者單名為桂入藥最多是桂有三種矣此桂廣州出者好交州桂州者形叚小而多脂肉亦好湘州始興桂陽縣者即是小桂不如廣州者經云桂葉如柏葉澤黒皮黄心赤齊武帝時湘州送樹植芳林苑中今東山有桂皮氣粗相類而葉乖異亦能凌冬恐是牡桂人多呼為丹桂正謂皮赤爾北方重此毎食輙須之葢禮所云薑桂以為芬芳也恭曰桂惟有二種陶氏引經云似柏葉不知此言從何所出又於别録剰出桂條為深誤也單名桂者即是牡桂乃爾雅所謂梫木桂也葉長尺許花子皆與菌桂同大小枝皮俱名牡桂但大枝皮肉理粗虚如木而肉少味薄名曰木桂亦云大桂不及小嫩枝皮肉多而半卷中必皺起其味辛美一名肉桂亦名桂枝一名桂心出融州桂州交州甚良其菌桂葉似柿葉中有縱文三道表裏無毛而光澤肌理𦂳薄如竹大枝小枝皮俱是筒其大枝無肉老皮堅版不能重卷味極淡薄不入藥用小枝薄而卷及二三重者良或名筒桂陶云小桂是也今惟出韶州保昇曰桂有三種菌桂葉似柿葉而尖狭光淨花白蕋黄四月開五月結實樹皮青黄薄卷若筒亦名筒桂其厚硬味薄者名版桂不入藥用牡桂葉似枇杷葉狹長於菌桂葉一二倍其嫩枝皮半卷多紫而肉中皺起肌理虚軟謂之桂枝又名肉桂削去上皮名曰桂心其厚者名曰木桂藥中以此為善陶氏言半卷多脂者為桂又引仙經云葉似柏葉此則桂有三種明矣陶雖是梁武帝時人實生於宋孝武建元三年歴齊為諸王侍讀曾見芳林苑所植之樹蘇恭只知有二種指陶為誤何臆斷之甚也藏器曰菌桂牡桂桂心三色同是一物桂林桂嶺因桂得名今之所生不離此郡從嶺以南際海盡有桂樹惟栁象州最多味既多烈皮又厚堅厚者必嫩薄者必老采者以老薄為一色嫩厚為一色嫩既辛烈兼又筒卷老必味淡自然版薄薄者即牡桂卷者即菌桂也桂心即是削除皮上甲錯取其近理而有味者承曰諸家所説幾不可考今廣交商人所販及醫家見用惟陳蔵器一説最近之頌曰爾雅但言梫木桂一種本草載桂及牡桂菌桂三種今嶺表所出則有筒桂肉桂桂心官桂板桂之名而醫家用之罕有分别舊説菌桂正圓如竹有二三重者則今之筒桂也牡桂皮薄色黄少脂肉者則今之官桂也桂是半卷多脂者則今之板桂也而今觀賓宜韶欽諸州所圖上者種類亦各不同然總謂之桂無復别名叅考舊注謂菌桂葉似柿中有三道文肌理緊薄如竹大小皆成筒與今賓州所出者相類牡桂葉狹於菌桂而長數倍其嫩枝皮半卷多紫與今宜州韶州所出者相類彼土人謂其皮為木蘭皮肉為桂心此又有黄紫兩色益可騐也桂葉如柏葉而澤皮黄心赤與今欽州所出者葉密而細恐是其類但不作柏葉形為異爾蘇恭以單桂牡桂為一物亦未可據其木俱髙三四丈多生深山巒洞中人家園圃亦有種者移植於嶺北則氣味殊少辛辣不堪入藥也三月四月生花全類茱萸九月結實今人多以裝綴花果作筵具其葉甚香可用作飲尤佳二月八月采皮九月采花並陰乾不可近火時珍曰桂有數種以今㕘訪牡桂葉長如枇杷葉堅硬有毛及鋸齒其花白色其皮多脂菌桂葉如柿葉而尖狹光淨有三縱文而無鋸齒其花有黃有白其皮薄而卷今商人所貨皆此二桂但以卷者為菌桂半卷及板者為牡桂即自明白蘇恭所説正合醫家見今用者陳蔵器陳承斷菌牡為一物者非矣陶𢎞景復以單字桂為葉似柏者亦非也柏葉之桂乃服食家所云非此治病之桂也蘇頌所説稍明亦不當以欽州者為單字之桂也按尸子云春花秋英曰桂嵇含南方草木狀云桂生合浦交趾生必髙山之巔冬夏常青其類自為林更無雜樹有三種皮赤者為用桂葉似柿者為菌桂葉似枇杷者為牡桂其説甚明足破諸家之辯矣又有巖桂乃蘭桂之類詳菌桂下韓衆采藥詩云闇河之桂實大如棗得而食之後天而老此又一種也闇河不知在何處正誤好古曰宼氏衍義言官桂不知縁何立名予考圖經今觀賓宜諸州出者佳世人以觀字畫多故寫作官也時珍曰此誤圖經今觀乃今視之意嶺南無觀州曰官桂者乃上等供官之桂也桂别録時珍曰此即肉桂也厚而辛烈去粗皮用其去内外皮者即為桂心氣味甘辛大熱有小毒權曰桂心苦辛無毒元素曰曰肉桂氣熱味大辛純陽也杲桂辛熱有毒陽中之陽浮也氣之薄者桂枝也氣之厚者桂肉也氣薄則發泄桂枝上行而發表氣厚則發熱桂肉下行而補腎此天地親上親下之道也好古曰桂枝入足太陽經桂心入手少隂經血分桂肉入足少陰太隂經血分細薄者為枝為嫩厚脂者為肉為老去其皮與裏當其中者為桂心别録言有小毒又云久服神仙不老雖有小毒亦從類化與黃岑黃連為使小毒何施與烏頭附子為使全取其熱性而已與巴豆硇砂乾漆穿山甲水蛭等同用則小毒化為大毒與人參麥門冬甘草同用則調中益氣便可久服也之才曰桂得人參甘草麥門冬大黃黄芩調中益氣得柴胡紫石英乾地黄療吐逆忌生葱石脂主治利肝肺氣心腹寒熱冷痰霍亂轉筋頭痛腰痛出汗止煩止唾欬𠻳鼻齆墮胎温中堅筋骨通血脉理疏不足宣導百藥無所畏久服神仙不老别録補下焦不足治沈寒痼冷之病滲泄止渴去營衛中風寒表虚自汗春夏為禁藥秋冬下部腹痛非此不能止元素補命門不足益火消陰好古治寒痺風瘖隂盛失血瀉痢驚癎時珍桂心藥性論斆曰用紫色厚者去上粗皮并内薄皮取心中味辛者用中土又有桂草以煑丹陽木皮偽充桂心也時珍曰按酉陽雜俎云丹陽山中有山桂葉如麻開細黄花此即雷氏所謂丹陽木皮也氣味苦辛無毒詳前桂下主治九種心痛腹内冷氣痛不可忍欬逆結氣壅痺脚痺不仁止下痢殺三蟲治鼻中息肉破血通利月閉胞衣不下甄權治一切風氣補五勞七傷通九竅利闗節益精明目暖腰膝治風痺骨節攣縮續筋骨生肌肉消淤血破痃癖癥瘕殺草木毒大明治風僻失音喉痺陽虚失血内托癰疽痘瘡能引血化汗化膿解蛇蝮毒時珍牡桂本經時珍曰此即木桂也薄而味淡去粗皮用其最薄者為桂枝枝之嫩小者為栁桂氣味辛温無毒權曰甘辛元素曰桂枝味辛甘氣微熱氣味俱薄體輕而上行浮而升陽也餘見前單桂下主治上氣欬逆結氣喉痺吐吸利闗節補中益氣久服通神輕身不老本經心痛脇痛脇風温筋通脉止煩出汗别録去冷風疼痛甄權去傷風頭痛開腠理解表發汗去皮膚風濕元素泄奔豚散下焦畜血利肺氣成無已横行手臂治痛風震亨發明宗奭曰桂甘辛大熱素問云辛甘發散為陽故漢張仲景桂枝湯治傷寒表虚皆須此藥正合辛甘發散之意本草三種之桂不用牡桂菌桂者此二種性止於温不可以治風寒之病也然本經止言桂仲景又言桂枝者取枝上皮也好古曰或問本草言桂能止煩出汗而張仲景治傷寒有當發汗凡數處皆用桂枝湯又云無汗不得服桂枝汗家不得重發汗若用桂枝是重發其汗汗多者用桂枝甘草湯此又用桂枝閉汗也一藥二用與本草之義相通否乎曰本草言桂辛甘大熱能宣導百藥通血脉止煩出汗是調其血而汗自出也仲景云太陽中風陰弱者汗自出衛實營虚故發熱汗出又云太陽病發熱汗出者此為營弱衛强陰虚陽必凑之故皆用桂枝發其汗此乃調其營氣則衛氣自和風邪無所容遂自汗而解非桂枝能開凑理發出其汗也汗多用桂枝者以之調和營衛則邪從汗出而汗自止非桂枝能閉汗孔也昧者不知出汗閉汗之意遇傷寒無汗者亦用桂枝誤之甚矣桂枝湯下發汗字當認作出字汗自然發出非若麻黄能開腠理發出其汗也其治虚汗亦當逆察其意可也成無已曰桂枝本為解肌若太陽中風腠理緻密營衛邪實津液禁固其脉浮緊發熱汗不出者不可與此必也皮膚疎泄自汗脉浮緩風邪干於衛氣者乃可投之發散以辛甘為主桂枝辛熱故以為君而以芍藥為臣甘草為佐者風滛所勝平以辛苦以甘緩之以酸收之也以薑棗為使者辛甘能發散而又用其行脾胃之津液而和營衛不專於發散也故麻黄湯不用薑棗專於發汗不待行其津液也承曰凡桂之厚實氣味重者宜入治水臓及下焦藥輕薄氣味淡者宜入治頭目發散藥故本經以菌桂飬精神牡桂利闗節仲景發汗用桂枝乃枝條非身榦也取其輕薄能發散又有一種栁桂乃桂之嫩小枝條尤宜入上焦藥用時珍曰麻黄遍徹皮毛故專於發汗而寒邪散肺主皮毛辛走肺也桂枝透逹營衛故能解肌而風邪去脾主營肺主衛甘走脾辛走肺也肉桂下行導火之原此東垣所謂腎苦燥急食辛以潤之開腠理致津液通其氣者也聖恵方言桂心入心引血化汗化膿葢手少隂君火厥隂相火與命門同氣者也别録云桂通血脉是矣曾世榮言小兒驚風及泄瀉並宜用五苓散以瀉丙火滲土濕内有桂能抑肝風而扶脾土又醫餘録云有人患赤眼腫痛脾虚不能飲食肝脉盛脾脉弱用凉藥治肝則脾愈虚用暖藥治脾則肝愈盛但於温平藥中倍加肉桂殺肝而益脾故一治兩得之傳云木得桂而枯是也此皆與别録桂利肝肺氣牡桂治脇痛脇風之義相符人所不知者今為拈出又桂性辛散能通子宫而破血故别録言其墮胎龎安時乃云炒過則不損胎也又丁香官桂治痘瘡灰塌能温托化膿詳見丁香下附方舊二十新十二隂痺熨法寒痺者留而不去時痛而皮不仁刺布衣者以火焠之刺大人者以藥熨之熨法用醇酒二十斤蜀椒一斤乾薑一斤桂心一斤凡四物㕮咀漬酒中用綿絮一斤細白布四丈并納酒中置馬矢煴中封塗勿使泄氣五日五夜出布絮暴乾復漬以盡其汁毎漬必捽其日乃出乾之并用滓與絮複布為複巾長六七尺為六七巾毎用一巾生桑炭火炙巾以熨寒痺所刺之處令熱入至病所寒則復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起歩内中無見風毎刺必熨如此病已矣靈樞經足躄筋急桂末白酒和塗之一日一上皇甫謐甲乙經中風口喎靣目相引偏僻頰急舌不可轉桂心酒煑取汁故布蘸榻病上正即止左喎榻右右喎榻左常用大效千金方中風逆冷吐清水宛轉啼呼桂一兩水一升半煎半升冷服肘后方中風失音桂着舌下嚥汁服又方桂末三錢水二盞煎一盞取汁千金方喉痺不語方同上偏正頭風天隂風雨即發桂心末一兩酒調塗傅額上及頂上聖恵方暑月解毒桂苓丸用肉桂去粗皮不見火伏苓去皮等分為細末煉蜜丸龍眼大毎新汲水化服一丸和劑方桂漿渴水夏月飲之解煩渇益氣消痰桂末一大兩白蜜一升以水三斗先煎取一斗入新瓷瓶中乃下二物打二三百轉先以油紙一重覆上加二重封之毎日去紙一重七日開之氣香味美格韻絶髙今人多作之圖經本草九種心痛聖恵方用桂心二錢半為末酒一盞半煎半盞飲立效臾外臺秘要桂末酒服方寸匕須六七次心腹脹痛氣短欲絶桂二兩水一升二合煑八合頓服之肘后方中惡心痛方同上千金寒疝心痛四肢逆冷全不飲食桂心研末一錢熱酒調下取效聖恵方産後心痛惡血冲心氣悶欲絶桂心為末狗膽汁丸芡子大毎熱酒服一丸聖恵産後瘕痛桂末酒服方寸匕取效肘后死胎不下桂末二錢待痛𦂳時童子小便温熱調下名觀音救生散亦治産難横生加麝香少許酒下比之水銀等藥不損人何氏方血崩不止桂心不拘多少砂鍋内煆存性為末毎米飲空腹服一二錢名神應散婦人良方反腰血痛桂末和苦酒塗之乾再上肘后方吐血下血肘后用桂心為末水服方寸匕趙王璆曰此陰采陽之症也不可服凉藥南陽宣徳暴吐血服二次而止其甥亦以二服而安小兒久痢赤白用桂去皮以薑汁炙紫黄連以茱萸炒過等分為末紫蘇木𤓰煎湯服之名金鎖散全㓜心鑑小兒遺尿桂末雄雞肝等分擣丸小豆大温水調下日二服外臺嬰兒臍腫多因傷濕桂心炙熱熨之日四五次姚和衆方外腎偏腫桂末水調方寸匕塗之梅師方食果腹脹不拘老小用桂末飯和丸緑豆大吞五六丸白湯下未消再服經騐方打撲傷損淤血溷悶身體疼痛辣桂為末酒服二錢方直指乳癰腫痛桂心甘草各二分烏頭一分炮為末和苦酒塗之帋覆住膿化為水神效方肘后重舌鵝口桂末和薑汁塗之湯氏寶書諸蛇傷毒桂心䒷蔞等分為末竹筒密塞遇毒蛇傷即傅之塞不密即不中用也閉口椒毒氣欲絶或出白沫身體冷急煎桂汁服之多飲新汲水一二升梅師方中鉤吻毒解芫青毒並煮桂汁服葉主治擣碎浸水洗髮去垢除風時珍箘桂音窘品本經上釋名筒桂唐本小桂恭曰箘者竹名此桂嫩而易卷如筒即古所用筒桂也筒佀箘字後人誤書為箘習而成俗亦復因循也時珍曰今本草又作從草之菌愈誤矣牡桂為大桂故此稱小桂集解别録曰箘桂生交趾桂林山谷巖厓間無骨正圓如竹立秋采之𢎞景曰交趾屬交州桂林屬廣州蜀都賦云箘桂臨巖是矣俗中不見正圓如竹者惟嫩枝破卷成圓猶依桂用非真箘桂也仙經用箘桂云三重者良則明非今桂矣别是一物應更研訪時珍曰箘桂葉佀柿葉者是詳前桂下别録所謂正圓如竹者謂皮卷如竹筒陶氏誤疑是木形如竹反謂卷成圓者非真也今人所栽巖桂亦是箘桂之類而稍異其葉不佀柿葉亦有鋸齒如枇杷葉而粗澀者有無鋸齒如巵子葉而光潔者叢生巖嶺間謂之巖桂俗呼為木犀其花有白者名銀桂黃者名金桂紅者名丹桂有秋花者春花者四季花者逐月花者其皮薄而不辣不堪入藥惟花可収茗浸酒鹽漬及作香搽髪澤之類耳皮三月七月采氣味辛温無毒主治百病養精神和顔色為諸藥先聘通使久服輕身不老靣生光華媚好常如童子本經發明見前桂下時珍曰箘桂主治與桂心牡桂逈然不同昔人所服食者葢此類耳正誤𢎞景曰仙經服食桂以葱稊合和雲母蒸化為水服之慎㣲曰抱朴子云桂可合竹瀝餌之亦可以龜腦和服之七年能歩行水上長生不死趙佗子服桂二十年足下生毛日行五百里力舉千斤列仙傳云范蠡好食桂飲水賣藥世人見之又桂父象林人常服桂皮葉以龜腦和之時珍曰方上謬言類多如此唐氏收入本草恐誤後人故詳記木犀花氣味辛温無毒主治同百藥煎孩兒茶作膏餅噙生津辟臭化痰治風虫牙痛同麻油蒸熟潤髮及作面脂時珍天竺桂海藥集解珣曰天竺桂生南海山谷功用佀桂其皮薄不甚辛烈宗奭曰皮與牡桂相同但薄耳時珍曰此即今閩粤浙中山桂也而台州天竺最多故名大樹繁花結實如蓮子狀天竺僧人稱為月桂是矣詳月桂下皮氣味辛温無毒主治腹内諸冷血氣脹痛蔵器破産後惡血治血痢腸風補暖腰脚功與桂心同方家少用珣月桂拾遺集解藏器曰今江東諸處毎至四五月後晦多於衢路間得月桂子大於貍豆破之辛香古老相傳是月中下也餘杭靈隱寺僧種得一株近代詩人多所論述洞㝠記云有逺飛雞朝往夕還常啣桂實歸於南土南土月路也故北方無之山桂猶堪為藥况月桂乎時珍曰吳剛伐月桂之説起於隋唐小説月桂落子之説起於武后之時相傳有梵僧自天竺鷲嶺飛來故八月常有桂子落於天竺唐書亦云垂拱四年三月有月桂下降於台州十餘日乃止宋仁宗天聖丁夘八月十五夜月明天淨杭州靈隱寺月桂子降其繁如雨其大如豆其圓如珠其色有白者黄者黒者殻如芡實味辛拾以進呈寺僧種之得二十五株慈雲式公有序記之張君房宿錢塘月輪寺亦見桂子紛如烟霧回旋成穂墜如牽牛子黄白相間咀之無味據此則月中真若有樹矣竊謂月乃陰魄其中婆娑者山河之影爾月既無桂則空中所墜者何物耶泛觀羣史有雨塵沙土石雨金鉛錢汞雨絮帛穀粟雨草木花藥雨毛血魚肉之類甚衆則桂子之雨亦妖怪所致非月中有桂也桂生南方故惟南方有之宋史云元豐三年六月饒州雨木子數畆狀類山芋子味辛而香即此類也道經月桂謂之不時花不可供獻子氣味辛温無毒主治小兒耳後月蝕瘡研碎𫝊之藏器木蘭本經上品釋名杜蘭别録林蘭本經木蓮綱目黄心時珍曰其香如蘭其花如蓮故名其木心黃故曰黄心集解别録曰木蘭生零陵山谷及太山皮似桂而香十二月采皮陰乾𢎞景曰零陵諸處皆有之狀如楠樹皮甚薄而味辛香今益州者皮厚狀如厚朴而氣味為勝今東人皆以山桂皮當之亦相類道家用合香亦好保昇曰所在皆有樹髙數仞葉似菌桂葉有三道縱文其葉辛香不及桂也皮如板桂有縱横文三月四月采皮陰乾頌曰今湖嶺蜀川諸州皆有之此與桂全别而韶州所上乃云與桂同是一種取外皮為木蘭中肉為桂心葢是桂中之一種爾十一月十二月采陰乾任昉述異記云木蘭洲在潯陽江中多木蘭又七里洲中有魯班刻木蘭舟至今在洲中今詩家云木蘭舟出於此時珍曰木蘭枝葉俱踈其花内白外紫亦有四季開者深山生者尤大可以為舟按白樂天集云木蓮生巴峽山谷間民呼為廣心樹大者髙五六丈渉冬不凋身如青楊有白紋葉如桂而厚大無脊花如蓮花香色豔膩皆同獨房蕋有異四月初始開二十日即謝不結實此説乃真木蘭也其花有紅黄白數色其木肌細而心黄梓人所重蘇頌所言韶州者是牡桂非木蘭也或云木蘭樹雖去皮亦不死羅願言其冬花實如小柿甘美者恐不然也皮氣味苦寒無毒主治身大熱在皮膚中去靣熱赤皰酒皶惡風癲疾陰下痒濕明耳目本經療中風傷寒及癰疽水腫去臭氣别録治酒疸利小便療重舌時珍附方舊二新一小兒重舌木蘭皮一尺廣四寸削去粗皮入醋一升漬汁噙之子母秘録靣上皶皰皯􅍍用木蘭皮一斤細切以三年酢漿漬之百日晒乾搗末毎漿水服方寸匕日三服肘後用酒漬之巵子仁一斤古今録騐方酒疸發斑赤黒黄色心下燠痛足脛腫滿小便黄由大醉當風入水所致用木蘭皮一兩黄茋二兩為末酒服方寸匕日三服肘後方花主治魚哽骨哽化鐡丹用之時珍辛夷本經上品釋名辛雉本經侯桃同房木同木筆拾遺迎春時珍曰夷者荑也其苞初生如荑而味辛也揚雄甘泉賦云列辛雉於林薄服䖍注云即辛夷雉夷聲相近也今本草作辛矧傳寫之誤矣藏器曰辛夷花未發時苞如小桃子有毛故名侯桃初發如筆頭北人呼為木筆其花最早南人呼為迎春集解别録曰辛夷生漢中魏興梁州川谷其樹似杜仲髙丈餘子似冬桃而小九月采實暴乾去心及外毛毛射人肺令人欬𢎞景曰今出丹陽近道形如桃子小時氣味辛香恭曰此是樹花未開時收之正月二月好采云九月采實者恐誤也保昇曰其樹大連合抱髙數仞葉似柿葉而狹長正月二月花似有毛小桃色白而帶紫花落而無子夏杪復着花如小筆又有一種花蘂皆同但三月花開四月花落子赤似相思子二種所在山谷皆有禹錫曰今苑中有樹髙三四丈其枝繁茂正二月花開紫白色花落乃生葉夏初復生花經伏歴冬葉花漸大如有毛小桃至來年正二月始開初是興元府進來樹纔三四尺有花無子經二十餘年方結實葢年淺者無子非有二種也其花開早晚各隨方土節氣爾宗奭曰辛夷處處有之人家園亨亦多種植先花後葉即木筆花也其花未開時苞上有毛尖長如筆故取象而名花有桃紅紫色二種入藥當用紫者須未開時收之已開者不佳時珍曰辛夷花初出枝頭苞長半寸而尖鋭儼如筆頭重重有青黄茸毛順鋪長半分許及開則似蓮花而小如盞紫苞紅熖作蓮及蘭花香亦有白色者人呼為玉蘭又有千葉者諸家言苞似小桃者比類欠當苞修治斆曰凡用辛夷拭去赤肉毛了以芭蕉水浸一宿用漿水煑之從已至未取出焙乾用若治眼目中患即一時去皮用向裏實者大明曰入藥微炙氣味辛温無毒時珍曰氣味俱薄浮而散陽也入手太陰足陽明經之才曰芎藭為之使惡五石脂畏昌蒲蒲黄黄連石膏黄環主治五臓身體寒熱風頭腦痛靣䵟久服下氣輕身明目增年耐老本經温中解肌利九竅通鼻塞涕出治靣腫引齒痛眩冐身兀兀如在車船之上者生鬚髮去白蟲别録通闗脉治頭痛憎寒體噤瘙癢入靣脂生光澤大明鼻淵鼻鼽鼻窒鼻瘡及痘後鼻瘡並用研末入麝香少許葱白蘸入數次甚良時珍發明時珍曰鼻氣通於天天者頭也肺也肺開竅於鼻而陽明胃脉環鼻而上行腦為元神之府而鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利辛夷之辛温走氣而入肺其體輕浮能助胃中清陽上行通於天所以能温中治頭靣目鼻九竅之病軒岐之後能達此理者東垣李杲二人而已沉香别録上品釋名沉水香綱目蜜香時珍曰木之心節置水則沈故名沈水亦曰水沈半沉者為棧香不沉者為黄熟香南越志言交州人稱為蜜香謂其氣如蜜脾也梵書名阿迦嚧香集解恭曰沉香青桂雞骨馬蹄煎香同是一樹出天竺諸國木似櫸栁樹皮青色葉似橘葉經冬不凋夏生花白而圓秋結實似檳榔大如桑椹紫而味辛藏器曰沉香枝葉並似椿云似橘者恐未是也其枝節不朽沉水者為沈香其肌理有黒脉浮者為煎香雞骨馬蹄皆是煎香並無别功止可熏衣去臭頌曰沉香青桂等香出海南諸國及交廣崖州沈懐逺南越志云交趾蜜香樹彼人取之先斷其積年老木根經年其外皮幹俱朽爛木心與枝節不壊堅黒沈水者即沉香也半浮半沈與水靣平者為雞骨香細枝緊實末爛者為青桂香其幹為棧香其根為黃熟香其根節輕而大者為馬蹄香此六物同出一樹有精粗之異爾並采無時劉恂嶺表録異云廣管羅州多棧香樹身似柜栁其花白而繁其葉如橘其皮堪作紙名香皮紙灰白色其紋如魚子沾水即爛不及楮紙亦無香氣沉香雞骨黄熟棧香雖是一樹而根榦枝節各有分别也又丁謂天香傳云此香竒品最多四香凡四十二狀出於一木木體如白楊葉如冬青而小海北竇化髙雷皆出香之地比海南者優劣不侔既所禀不同復售者多而取者速其香不待稍成乃趨利伐賊之深也非同璚管黎人非時不妄剪伐故木無夭札之患必得異香焉宗奭曰嶺南諸郡悉有傍海處尤多交幹連枝岡嶺相接千里不絶葉如冬青大者數抱木性虛柔山民以構茅廬或為橋梁為飯甑為狗槽有香者百無一二葢木得水方結多在折枝枯幹中或為沈或為煎或為黄熟自枯死者謂之水盤香南息髙竇等州惟産生結香葢山民入山以刀斫曲幹斜枝成坎經年得兩水浸漬遂結成香乃鋸取之刮去白木其香結為斑㸃名鷓鴣斑燔之極清烈香之良者惟任璚崖等州俗謂之角沈黄沈乃枯木得者宜入藥用依木皮而結者謂之青桂氣尤清在土中歳久不待創剔而成薄片者謂之龍鱗削之自卷咀之柔靭者謂之白蠟沈无難得也承曰諸品之外又有龍鱗麻葉竹葉之類不止一二十品要之入藥惟取中實沈水者或沈水而有中心空者則是雞骨謂中有朽路如雞骨中血眼也時珍曰沈香品類諸説頗詳今攷楊億談苑蔡條叢話范成大桂海志張師正倦游録洪駒父香譜葉廷珪香録諸書撮其未盡者補之云香之等凡三曰沈曰棧曰黄熟是也沈香入水則沈其品凡四曰熟結乃膏脉凝結自朽出者曰生結乃刀斧伐仆膏脉結聚者曰脱落乃因水朽而結者曰蟲漏乃因蠧隙而結者生結為上熟脱次之堅黒為上黄色次之角沈黒潤黄沈黄潤蠟沈柔靭革沈紋横皆上品也海島所出有如石杵如肘如拳如鳯雀龜蛇雲氣人物及海南馬蹄牛頭燕口蠒栗竹葉芝菌梭子附子等香皆因形命名爾其棧香入水半浮半沈即沈香之半結連木者或作煎香畨名婆木香亦曰弄水香其類有蝟刺香雞骨香葉子香皆因形而名有大如竺者為蓬莱香有如山石枯槎者為光香入藥皆次於沉香其黄熟香即香之輕虚者俗訛為速香是矣有生速斫伐而取者有熟速腐朽而取者其大而可雕刻者謂之水盤頭並不堪入藥但可焚爇葉廷珪云出渤泥占城真蠟者謂之畨沈亦曰舶沈曰藥沈醫家多用之以真蠟為上蔡絛云占城不若真臘真臘不若海南黎峒黎峒又以萬安黎母山東峒者冠絶天下謂之海南沉一片萬錢海北髙化諸州者皆棧香爾范成大云黎峒出者泥土沈香或曰崖香雖薄如紙者入水亦沈萬安在島東鍾朝陽之氣故香尤醖藉土人亦自難得舶沈香多腥烈尾烟必焦交趾海北之香聚於欽州謂之欽香氣尤焦烈南人不甚重之惟以入藥正誤時珍曰按李珣海藥本草謂沉者為沉香浮者為檀香梁元帝金樓子謂一木五香根為檀節為沉花為雞舌膠為薫陸葉為霍香並誤也五香各是一種所謂五香一本者即前蘇恭所言沈棧青桂馬蹄雞骨者是矣修治斆曰凡使沈香須要不枯如觜角硬重沈於水下者為上半沈者次之不可見火時珍曰欲入丸散以紙褁置懐中待燥研之或入乳鉢以水磨粉晒乾亦可若入煎劑惟磨汁臨時入之氣味辛微温無毒珣曰苦温大明曰辛熱元素曰陽也有升有降時珍曰咀嚼香甜者性平辛辣者性熱主治風水毒腫去惡氣别録主心腹痛霍亂中惡邪鬼疰氣清人神竝宜酒煑服之諸瘡腫宜入膏中李珣調中補五臓益精壯陽暖腰膝止轉筋吐瀉冷氣破癥癖冷風麻痺骨節不任風濕皮膚瘙癢氣痢大明補右腎命門元素補脾胃及痰涎血出於脾李杲益氣和神劉完素治上熱下寒氣逆喘急大腸虛閉小便氣淋男子精冷時珍附方新七諸虚寒熱冷痰虚熱冷香湯用沉香附子炮等分水一盞煎七分露一夜空心温服壘王好古醫元戎胃冷久呃沉香紫蘇白豆蔲仁各一錢為末毎柿蒂湯服五七分吳球活人心鏡心神不足火不降水不升健忘驚悸朱雀丸用沉香五錢伏神一兩為末煉蜜和丸小豆大毎食後人參湯服三十丸日二服王璆百一選方腎虛目黒煖水臓用沉香一兩蜀椒去目炒出汗四兩為末酒糊丸梧子大毎服三十丸空心塩湯下普濟方胞轉不通非小腸膀胱厥陰受病乃强忍房事或過忍小便所致當治其氣則愈非利藥可通也沉香木香各二錢為末白湯空腹服之以通為度醫壘元戎大腸虚閉因房事精液耗涸者沉香一兩肉蓯蓉酒浸焙二兩各研末以麻仁研汁作糊丸梧子大每服一百丸蜜湯下嚴子禮濟生方痘瘡黒䧟沉香檀香乳香等分爇於盆内抱兒於上薫之即起鮮于樞鉤𤣥蜜香拾遺釋名木蜜内典没香綱目多香木同阿􅜚音矬集解藏器曰蜜香生交州大樹節如沉香法華經注云木蜜香蜜也樹形似槐而香伐之五六年乃取其香異物志云其葉如椿樹生千歳斫仆之四五歳乃徃㸔已腐敗惟中節堅貞者是香珣曰生南海諸山中種之五六年便有香交州記云樹似沉香無異也時珍曰按魏王花木志云木蜜號千歳樹根本甚大伐之四五歳取不腐者為香觀此則陳蔵器所謂生千歳乃斫者葢誤訛也叚成式酉陽雜俎云沒樹出波斯國拂林國人呼為阿􅜚樹長丈餘皮青白色葉似槐而長花似橘花而大子黒色大如山茱萸酸甜可食廣州志云肇慶新興縣出多香木俗名蜜香辟惡氣殺鬼精晉書云太康五年大秦國獻蜜香樹皮紙微褐色有紋如魚子極香而堅靭觀此數説則蜜香亦沉香之類故形狀功用兩相彷彿南越志謂交人稱沉香為蜜香交州志謂蜜香似沉香嶺表録言棧香皮紙似魚子尤可互證楊慎丹鉛録言蜜樹是蜜蒙花樹者謬也又枳梖木亦名木蜜不知亦同類否詳見果部氣味辛温無毒主治去臭除鬼氣蔵器辟惡去邪鬼尸注心氣李珣丁香宋開寶校正併入别録雞舌香釋名丁子香嘉祐雞舌香藏器曰雞舌香與丁香同種花實叢生其中心最大者為雞舌擊破有順理而解為兩向如雞舌故名乃是母丁香也禹錫曰按齊民要術云雞舌香俗人以其似丁子故呼為丁子香時珍曰宋嘉祐本草重出雞舌今併為一集解恭曰雞舌香樹葉及皮並似栗花如梅花子似棗核此雌樹也不入香用其雄樹雖花不實采花釀之以成香出崑崙及交州愛州以南珣曰丁香生東海及崑崙國二月三月花開紫白色至七月方始成實小者為丁香大者如巴豆為母丁香志云丁香生交廣南畨按廣州圖上丁香樹髙丈餘木類桂葉似櫟葉花圓細黄色凌冬不凋其子出枝蕊上如釘長三四分紫色其中有粗大如山茱萸者俗呼為母丁香二月八月采子及根一云盛冬生花子至次年春采之頌曰雞舌香唐本草言其木似栗南越志言是沉香花廣志言是草花蔓生實熟貫之可以香口其説不定今人皆以乳香中揀出木實似棗核者為之堅頑枯燥絶無氣味燒亦無香用療氣與口臭則甚乖疎不知縁何以為雞舌也京下老醫言雞舌與丁香同種其中最大者為雞舌即母丁香療口臭最良治氣亦效葛稚川百一方治暴氣刺心痛用雞舌香酒服又抱朴子書以雞舌黄連乳汁煎之注目治百疹之在目者皆愈更加精明古方治瘡癰五香連翹湯用雞舌香而孫真人千金方無雞舌用丁香似為一物也其采花釀成香之説絶無知者慎㣲曰沈存中筆談云予集靈苑方據陳蔵器拾遺以雞舌為丁香母今考之尚不然雞舌即丁香也齊民要術言雞舌俗名丁子香日華子言丁香治口氣與三省故事載漢時郎官日含雞舌香欲其奏事芬芳之説相合及千金方五香湯用丁香無雞舌最為明騐開寶本草重出丁香謬矣今世以乳香中大如山茱茰者為雞舌畧無氣味治疾殊乖承曰嘉祐補注及蘇頌圖經引諸書以雞舌為丁香抱朴子言可注眼但丁香恐不宜入眼含之口中熱臭不可近乳香中所揀者雖無氣味却無臭氣有痰利九竅之理諸方用治小兒驚癎亦欲其逹九竅也斆曰丁香有雌雄雄者顆小雌者大如山茰更名母丁香入藥最勝時珍曰雄為丁香雌為雞舌諸説甚明獨陳承所言甚為謬妄不知乳香中所揀者乃畨棗核也即無漏子之核見果部前人不知丁香即雞舌誤以此物充之爾乾薑熖硝尚可㸃眼草果阿魏畨人以作食料則丁香之㸃眼噙口又何害哉鷄舌香别録氣味辛微温無毒時珍曰辛温主治風水毒腫霍亂心痛去惡熱别録吹鼻殺腦疳入諸香中令人身香甄權同薑汁塗㧞去白鬚孔中即生黒者異常藏器丁香開寶氣味辛温無毒時珍曰辛熱好古曰純陽入手太隂足少隂陽明經斆曰方中多用雌者力大膏煎中若用雄須去丁葢乳子𤼵人背癰也不可見火畏鬱金主治溫脾胃止霍亂壅脹風毒諸腫齒疳䘌能𤼵諸香開寶風䘌骨槽勞臭殺蟲辟惡去邪治奶頭花止五色毒痢五痔李珣治口氣冷氣冷勞反胃鬼疰蠱毒殺酒毒消痃癖療腎氣奔豚氣隂痛腹痛壯陽暖腰膝大明療嘔逆甚騐保昇去胃寒理元氣氣血盛者勿服元素治虚噦小兒吐瀉痘瘡胃虚灰白不𤼵時珍𤼵明好古曰丁香與五味子廣茂同用治奔豚之氣亦能泄肺能補胃大能療腎宗奭曰日華子言丁香治口氣此正是御史所含之香也治脾胃冷氣不和甚良母丁香氣味尤佳震亨曰口居上地氣出焉脾有鬱火溢入肺中失其清和之意而濁氣上行𤼵為口氣若以丁香治之是揚湯止沸爾惟香薷治之甚㨗時珍曰宋末太醫陳文中治小兒痘瘡不光澤不起𤼵或脹或瀉或渇或氣促表裏俱虚之證並用木香散異攻散倍加丁香官桂甚者丁香四五十枚官桂一二錢亦有服之而愈者此丹溪朱氏所謂立方之時必運氣在寒水司天之際又值嚴冬鬱遏陽氣故用大辛熱之劑𤼵之者也若不分氣血虚實寒熱經絡一槩驟用其殺人也必矣葛洪抱朴子云凡百病在目者以雞舌香黄連乳汁煎注之皆愈此得辛散苦降養隂之妙陳承言不可㸃眼者葢不知此理也附方舊八新十八暴心氣痛雞舌香末酒服一錢肘後方乾霍亂痛不吐不下丁香十四枚研末以沸湯一升和之頓服不瘥更服思邈千金方小兒吐瀉丁香橘紅等分煉蜜丸黃豆大米湯化下劉氏小兒方小兒嘔吐不止丁香生半夏各一錢薑汁浸一夜晒乾為末薑汁打麫糊丸黍米大量大小用薑湯下全㓜心鑑嬰兒吐乳小兒百日晬内吐乳或糞青色用年少婦人乳汁一盞入丁香十枚陳皮去白一錢石器煎一二十沸細細與服陳文中小兒方小兒冷疳靣黄腹大食即吐者母丁香七枚為末乳汁和蒸三次薑湯服之衛生易簡方胃冷嘔逆氣厥不通母丁香三箇陳橘皮一塊去白焙水煎熱服十便良方反胃吐食袖珍方用母丁香一兩為末以塩梅入搗和丸芡子大每噙一丸聖恵方用母丁香神麴炒等分為末米飲服一錢朝食暮吐丁香十五箇研末甘蔗汁薑汁和丸蓮子大噙嚥之𤣥摘方反胃闗格氣噎不通丁香木香各一兩每服四錢水一盞半煎一盞先以黄泥做成盌濾藥汁于内食前服此方乃椽史吳安之𫝊於都事葢耘夫有效試之果然土盌取其助脾也徳生堂經驗方傷寒呢逆及噦逆不定丁香一兩乾柿蒂焙一兩為末每服一錢煎人參湯下簡要濟衆方毒腫入腹雞舌香青木香薫陸香麝香各一兩水四升煑二升分二服肘后方食蟹致傷丁香末薑湯服五分證治要訣婦人崩中晝夜不止丁香二兩酒二升煎一升分服梅師方婦人産難母丁香三十六粒滴乳香三錢六分為末同活兎膽和杵千下丸作三十六丸每服一丸好酒化下立騐名如意丹頤真堂經騐方婦人陰冷母丁香末紗嚢盛如指大納入陰中病即已本草衍義鼻中息肉丁香綿褁納之聖恵方風牙宣露發歇口氣雞舌香射干一兩麝香一分為末日揩聖濟總録齲齒黒臭雞舌香煑汁含之外臺秘要唇舌生瘡雞舌香末綿褁含之外臺乳頭裂破丁香末傅之梅師方妬乳乳痛丁香末水服方寸匕梅師方癰疽惡肉丁香末傅之外以膏藥䕶之怪證竒方桑蝎螫人丁香末蜜調塗聖恵方香衣辟汗丁香一兩為末川椒六十粒和之絹袋盛佩絶無汗氣多能鄙事丁皮時珍曰即樹皮也似桂皮而厚氣味同香主治齒痛李珣心腹冷氣諸病方家用代丁香時珍枝主治一切冷氣心腹脹滿惡心泄瀉虚滑水榖不消用枝杖七斤肉豆䓻麫煨八斤白麫炒六斤甘草炒十一斤炒塩中三斤為末日日㸃服出御藥院方根氣味辛熱有毒主治風熱毒腫不入心腹之用開寶檀香别録下品釋名㫋檀綱目真檀時珍曰檀善木也故字從亶亶善也釋氏呼為㫋檀以為湯沐猶言離垢也畨人訛為真檀雲南人呼紫檀為勝沉香即赤檀也集解藏器曰白檀出海南樹如檀恭曰紫真檀出崑崙盤盤國雖不生中華人間遍有之頌曰檀香有數種黄白紫之異今人盛用之江淮河朔所生檀木即其類但不香爾時珍曰按大明一統志云檀香出廣東雲南及占城真臘𤓰哇渤泥暹邏三佛齊回回等國今嶺南諸地亦皆有之樹葉皆似荔枝皮青色而滑澤葉廷珪香譜云皮實而色黄者為黄檀皮潔而色白者為白檀皮腐而色紫者為紫檀其木並堅重清香而白檀尤良宜以紙封收則不洩氣王佐格古論云紫檀諸溪峒出之性堅新者色紅舊者色紫有蟹爪文新者以水浸之可染物真者揩壁上色紫故有紫檀色黄檀最香俱可作帶骻扇骨等物白㫋檀氣味辛温無毒大明曰熱元素曰陽中微陰入手太陰足少陰通行陽明經主治消風熱腫毒𢎞景治中惡鬼氣殺蟲蔵器煎服止心腹痛霍亂腎氣痛水磨塗外腎并腰腎痛處大明散冷氣引胃氣上升進飲食元素噎膈吐食又靣生黒子每夜以漿水洗拭令赤磨汁塗之甚良時珍發明杲曰白檀調氣引芳香之物上至極髙之分最宜橙橘之屬佐以薑棗輔以葛根縮砂益智豆䓻通行陽明之經在胸膈之上處咽嗌之間為理氣要藥時珍曰楞嚴經云白㫋檀塗身能除一切熱惱今西南諸畨酋皆用諸香塗身取此義也杜寶大業録云隋有夀禪師妙醫術作五香飲濟人沉香飲檀香飲丁香飲澤蘭飲甘松飲皆以香為主更加别藥有味而止渴兼補益人也道書檀香謂之浴香不可燒供上真紫檀氣味鹹㣲寒無毒主治摩塗惡毒風毒别録刮末傅金瘡止血止痛療淋𢎞景醋磨傅一切卒腫大明發明時珍曰白檀辛温氣分之藥也故能理衛氣而調脾肺利胸膈紫檀鹹寒血分之藥也故能和營氣而消腫毒治金瘡降真香證類釋名紫藤香綱目雞骨香珣曰仙𫝊伴和諸香燒烟直上感引鶴降醮星辰燒此香為第一度籙功力極騐降真之名以此時珍曰俗呼舶上來者為畨降亦名雞骨與沉香同名集解慎㣲曰降真香出黔南珣曰生南海山中及大秦國其香似蘇方木燒之初不甚香得諸香和之則特美入藥以畨降紫而潤者為良時珍曰今廣東廣西雲南安南漢中施州永順保靖及占城暹邏渤泥琉球諸畨皆有之朱輔山溪蠻叢話云雞骨香即降香本出海南今溪峒僻處所出者似是而非勁瘦不甚香周逹觀真臘記云降香生叢林中畨人頗費砍斫之功乃樹心也其外白皮厚八九寸或五六寸焚之氣勁而逺又嵇含草木狀云紫藤香長莖細葉根極堅實重重有皮花白子黒其莖截置烟熖中經久成紫香可降神按嵇氏所説與前説稍異豈即朱氏所謂似是而非者乎抑中國者與畨降不同乎氣味辛温無毒主治燒之辟天行時氣宅舍怪異小兒帶之辟邪惡氣李珣療拆傷金瘡止血定痛消腫生肌時珍發明時珍曰降香唐宋本草失收唐慎微始増入之而不著其功用今拆傷金瘡家多用其節云可代沒藥血竭按名醫録云周崈被海㓂刃傷血出不止筋如斷骨如拆用花蕊石散不效軍士李髙用紫金散掩之血止痛定明日結痂如鐵遂愈且無瘢㾗叩其方則用紫藤香瓷瓦刮下研末爾云即降之最佳者曽救萬人羅天益衛生寶鑑亦取此方云甚效也附方新二金瘡出血降真香五倍子銅花等分為末傅之醫林集要癰疽惡毒畨降末楓乳香等分為丸熏之去惡氣甚妙集簡方楠别録上品校正併入海藥柟木皮拾遺柵木枝葉釋名柟與楠字同時珍曰南方之木故字從南海藥本草柵木皮即柟字之誤今正之集解藏器曰柟木髙大葉如桑出南方山中宗奭曰楠材今江南造船皆用之其木性堅而善居水久則當中空為白蛾所穴時珍曰楠木生南方而黔蜀諸山尤多其樹直上童童若幢葢之狀枝葉不相礙葉似豫章而大如牛耳一頭尖經歳不凋新陳相换其花赤黃色實似丁香色青不可食幹甚端偉髙者十餘丈巨者數十圍氣甚芬芳為梁棟器物皆佳葢良材也色赤者堅白者脆其近根年深向陽者結成草木山水之狀俗呼為骰柏楠宜作器楠材氣味辛微温無毒藏器曰苦温無毒大明曰熱微毒主治霍亂吐下不止煑汁服别録煎湯洗轉筋及足腫枝葉同功大明附方新三水腫自足起削楠木桐木煑汁漬足并飲少許日日為之肘後方心脹腹痛未得吐下取楠木削三四兩水三升煑三沸飲之肘後方聤耳出膿楠木燒研以綿杖繳入聖恵方皮氣味苦温無毒主治霍亂吐瀉小兒吐乳暖胃正氣並宜煎服李珣樟拾遺釋名時珍曰其木理多文章故謂之樟集解藏器曰江東􅔓船多用樟木縣名豫章因木得名時珍曰西南處處山谷有之木髙丈餘小葉似楠而尖長背有黄赤茸毛四時不凋夏開細花結小子木大者數抱肌理細而錯縱有文宜於雕刻氣甚芬烈豫章乃二木名一類二種也豫即釣樟見下條樟材氣味辛温無毒主治惡氣中惡心腹痛鬼疰霍亂腹脹宿食不消常吐酸臭水酒煑服無藥處用之煎湯浴脚氣疥癬風癢作履除脚氣蔵器發明時珍曰霍亂及乾霍亂須吐者以樟木屑煎濃汁吐之甚良又中惡鬼氣卒死者以樟木燒烟熏之待甦乃用藥此物辛烈香竄能去濕氣辟邪惡故也附方新一手足痛風冷痛如虎咬者用樟木屑一斗急流水一石煎極滚泡之乘熱安足於桶上薫之以草薦圍住勿令湯氣入目其功甚㨗此家𫝊經騐方也虞槫醫學正傳癭節主治風疰鬼邪時珍附方新一三木節散治風勞靣色青白肢節沉重膂間痛或寒或熱或躁或嗔思食不能食被䖝侵蝕證狀多端天靈葢酥炙研二兩牛黄人中白焙各半兩麝香二錢為末别以樟木瘤節皂莢木瘤節槐木瘤節各為末五兩每以三錢水一盞煎半盞去滓調前末一錢五更頓服取下䖝物為妙聖恵方釣樟别録下品校正併入拾遺枕材釋名烏樟𢎞景棆音綸枕音沈豫綱目時珍曰樟有大小二種紫淡二色此即樟之小者按鄭樵通志云釣樟亦樟之類即爾雅所謂棆無疪是也又相如賦云楩楠豫章顔師古注云豫即枕木章即樟木二木生至七年乃可分别觀此則豫即别録所謂釣樟者也根似烏藥香故又名烏樟集解𢎞景曰釣樟出睢陽邵陵諸處亦呼作烏樟方家少用而俗人多識恭曰生郴州山谷樹髙丈餘葉似楠葉而尖長背有赤毛若枇杷葉上毛八月九月采根皮日乾炳曰根似烏藥香藏器曰枕生南海山谷作􅔓船次於樟木根皮氣味辛温無毒主治金瘡止血刮屑傅之甚驗别録磨服治霍亂二炳治奔豚脚氣水腫煎湯服亦可浴瘡痍疥癬風瘙併研末傅之大明莖葉主治置門上辟天行時氣蕭炳烏藥宋開寶釋名旁其拾遺鰟魮綱目矮樟時珍曰烏以色名其葉狀似鰟魮鯽魚故俗呼為鰟魮樹拾遺作旁其方音訛也南人亦呼為矮樟其氣似樟也集解藏器曰烏藥生嶺南邕州容州及江南樹生似茶髙丈餘一葉三椏葉青隂白根狀似山芍藥及烏樟根色黒褐作車轂紋横生八月采根其直根者不堪用頌曰今台州雷州衡州皆有之以天台者為勝木似茶檟髙五七尺葉㣲圓而尖靣青背白有紋四五月開細花黄白色六月結實根有極大者又似釣樟根然根有二種嶺南者黒褐色而堅硬天台者白而虛軟並以八月采根如車轂紋形如連珠者佳或云天台者香白可愛而不及海南者力大承曰世稱天台者為勝今比之洪州衡州者天台香味為劣入藥功效亦不及但肉色頗赤而差細小爾時珍曰吳楚山中極多人以為薪根葉皆有香氣但根不甚大纔如芍藥爾嫩者肉白老者肉褐色其子如冬青子生青熟紫核殻極薄其仁亦香而苦根氣味辛温無毒好古曰氣厚於味陽也入足陽明少陰經主治中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲藏器除一切冷霍亂反胃吐食瀉痢癰癤疥癘并解冷熱其功不可悉載猫犬百病並可磨服大明理元氣好古中氣脚氣疝氣氣厥頭痛腫脹喘急止小便頻數及白濁時珍發明宗奭曰烏藥性和來氣少走泄多但不甚剛猛同沈香同磨作湯㸃服治胸腹冷氣甚穩當時珍曰烏藥辛温香竄能散諸氣故恵民和劑局方治中風中氣諸症用烏藥順氣散者先疏其氣氣順則風散也嚴用和濟生方治七情鬱結上氣喘急用四磨湯者降中兼升瀉中帶補也其方以人參烏藥沈香檳榔各磨濃汁七分合煎細細嚥之朱氏集騐方治虛寒小便頻數縮泉丸用同益智子等分為丸服者取其通陽明少陰經也方見草部益智子下附方新十一烏沈湯治一切氣一切冷補五臓調中壯陽暖腰膝去邪氣冷風麻痺膀胱腎間冷氣攻衝背膂俛仰不利風水毒腫吐瀉轉筋癥癖刺痛中惡心腹痛鬼氣疰忤天行瘴疫婦人血氣痛用天台烏藥一百兩沈香五十兩人參三兩甘草爁四兩為末每服半錢薑塩湯空心㸃服和劑局方一切氣痛不拘男女冷氣血氣肥氣息賁氣伏梁氣奔豚氣搶心切痛冷汗喘息欲絶天台烏藥小者酒浸一夜炒茴香炒青橘皮去白炒良薑炒等分為末温酒童便調下衛生家寶方男婦諸病香烏散用香附烏藥等分為末毎服一二錢飲食不進薑棗湯下瘧疾乾薑白塩湯下腹中有䖝檳榔湯下頭風虛腫茶湯下婦人冷氣米飲下產後血攻心脾痛童便下婦人血海痛男子疝痛茴香湯下韞乾坤秘小腸疝氣烏藥一兩升麻八錢水二鍾煎一鍾露一宿空心熱服孫天仁集效方脚氣掣痛郷村無藥初發時即取土烏藥不犯鐵器布揩去土瓷瓦刮屑好酒浸一宿次早空心温服溏泄即愈入麝少許尤佳痛入腹者以烏藥同雞子瓦罐中水煑一日去雞子切片蘸食以湯送下甚效永類鈐方血痢瀉血烏藥燒存性研陳米飯丸梧子大每米飲下三十丸濟普方小兒慢驚昬沈或搐烏藥磨水灌之濟急方氣厥頭痛不拘多少及産後頭痛天台烏藥川芎藭等分為末每服二錢臘茶清調下産後鐵錘燒紅淬酒調下濟生方咽㗋閉痛生烏藥即矮樟根以酸醋二盞煎一盞先噙後嚥吐出痰涎為愈經騐方孕中有癰洪州烏藥軟白香辣者五錢水一盞牛皮膠一片同煎至七分温服乃龔彦徳方也婦人良方心腹氣痛烏藥水磨濃汁一盞入橘皮一片蘇一葉煎服集簡方嫩葉主治炙碾煎飲代茗補中益氣止小便滑數藏器發明時珍曰烏藥下通少陰腎經上理脾胃元氣故丹溪朱氏補陰丸藥中徃徃加烏藥葉也子主治隂毒傷寒腹痛欲死取一合炒起黒烟投水中煎三五沸服一大盞汗出陽回即瘥斗門方附録研藥珣曰生南海諸州小樹葉如椒根如烏藥而圓小根味苦温無毒主霍亂下利赤白中惡蠱毒腹内不調者剉水煎服櫰香音懷綱目釋名兠婁婆香集解時珍曰櫰香江淮湖嶺山中有之木大者近丈許小者多被樵采葉青而長有鉅齒狀如小薊葉而香對節生其根狀如枸杞根而大煨之甚香楞嚴經云壇前安一小臚以兠婁婆香煎水沐浴即此香也根氣味苦濇平無毒主治頭癤腫毒碾末麻脂調塗七日腐落時珍必栗香拾遺釋名花木香詹香集解藏器曰必栗香生髙山中葉如老椿擣置上流魚悉暴腮而死木為書軸白魚不損書也氣味辛温無毒主治鬼疰心氣斷一切惡氣煑汁服之燒為香殺蟲魚蔵器楓香脂唐本草釋名白膠香時珍曰楓樹枝弱善揺故字從風俗呼香楓金光明經謂其香為須薩折羅婆香頌曰爾雅謂楓為攝攝言風至則攝攝而鳴也梵書謂之薩闍羅婆香集解恭曰楓香脂所在大山中皆有之頌曰今南方及闗陜甚多樹甚髙大似白楊葉圓而作岐有三角而香二月有花白色乃連着實大如鴨卵八月九月熟時暴乾可燒南方草木狀云楓實惟九真有之用之有神乃難得之物其脂為白膠香五月斫為坎十一月采之説文解字云楓木厚葉弱枝善揺漢宫殿中多植之至霜後葉丹可愛故稱楓宸任昉述異記云南中有楓子鬼木之老者為人形亦呼為靈楓葢瘤癭也至今越巫有得之者以雕刻鬼神可致靈異保昇曰王瓘軒轅本紀云黄帝殺蚩尤於黎山之丘擲其械於大荒之中化為楓木之林爾雅注云其脂入地千年為琥珀時珍曰楓木枝幹修聳大者連數圍其木甚堅有赤有白白者細膩其實成毬有柔刺嵇含言楓實惟出九真者不知即此楓否孫炎爾雅正義云楓子鬼乃攝木上寄生枝髙三四尺天旱以泥塗之即雨也荀伯子臨川記云嶺南楓木歳久生瘤如人形遇暴雷驟雨則暗長三五尺謂之楓人宋齊丘化書云老楓化為羽人數説不同大抵癭瘤之説猶有理也香脂修治時珍曰凡用以虀水煑二十沸入冷水中揉扯數十次晒乾用氣味辛苦平無毒主治癮疹風痒浮腫煮水浴之又主齒痛唐本一切癰疽瘡疥金瘡吐衂咯血活血生肌止痛解毒燒過揩牙永無牙疾時珍發明震亨曰楓香屬金有水與火其性疏通故木易有蟲穴為外科要藥近世不知誤以松脂之清瑩者為之甚謬宗奭曰楓香松脂皆可亂乳香但楓香微白黄色燒之可見真偽時珍曰楓香松脂皆可亂乳香其功雖次於乳香而亦彷彿不逺附方舊一新十五吐血不止白膠香為散每服二錢新汲水調下簡要濟衆吐血衂血白膠香蛤粉等分為末姜汁調服王璆百一選方吐血咯血澹寮方用白膠香銅青各一錢為末入乾柿内紙包煨熟食之為聖恵方用白膠香切片炙黄一兩新綿一兩燒灰末每服一錢米飲下金瘡斷筋楓香末傅之危氏方便癰膿血白膠香一兩為末入麝香輕粉少許摻之袖珍方小兒奶疽生靣上用楓香為膏攤貼之活幼全書瘰癧軟癤白膠香一兩化開以箆麻子六十四粒研入待成膏攤貼儒門事親諸瘡不合白膠香輕粉各二錢猪脂和塗直指方一切惡瘡水沉金絲膏用白膠香瀝青各一兩以麻油黄蠟各二錢半同溶化入冷水中扯千遍攤貼之儒門事親惡瘡疼痛楓香膩粉等分為末漿水洗淨貼之夀親養老書久近脛瘡白膠香為末以酒瓶上箬葉夾末貼之袖珍方小兒疥癬白膠香黄蘖輕粉等分為末羊骨髓和傅之儒門事親大便不通白膠香半棗大鼠糞二枚研勻水和作挺納入肛門良久自通普濟方年久牙疼楓香脂為末以香爐内灰和勻每旦揩擦危氏得效方魚骨哽咽白膠香細細吞之聖恵方木皮氣味辛平有小毒蘇恭主治水腫下水氣煑汁用之蘇恭煎飲止水痢為最藏器止霍亂刺風冷風煎湯浴之大明正誤藏器曰楓皮性澀能止水痢蘇云下水腫水腫非澀藥所療又云有毒明見其謬附方新一大風瘡楓子木燒存性研輕粉等分麻油調搽極妙章貢有鼓角匠病此一道人𫝊方遂愈經騐良方根葉主治癰疽已成擂酒飲以滓貼之時珍菌氣味有毒食之令人笑不止地漿解之𢎞景薫陸香乳香别録上品釋名馬尾香海藥天澤香内典摩勒香綱目多伽羅香宗奭曰薫陸即乳香為其垂滴如乳頭也鎔塌在地者為塌香皆一也時珍曰佛書謂之天澤香言其潤澤也又謂之多伽羅香又曰杜嚕香李珣言薫陸是樹皮乳是樹脂陳藏器言乳是薰陸之類宼宗奭言是一物陳承言薫陸是總名乳是薫陸之乳頭也今攷言譜言乳有十餘品則乳乃薫陸中似乳頭之一品爾陳承之説為近理二物原附沉香下宋嘉祐本草分出二條今據諸説合併為一集解恭曰薫陸香形似白膠香出天竺者色白出單于者夾緑色香亦不甚珣曰按廣志云薫陸香是樹皮鱗甲采之復生乳頭香生南海是波斯松樹脂也紫赤如櫻桃透明者為上蔵器曰乳香即薫陸之類也禹錫曰按南方異物志云薫陸出大秦國在海邊有大樹枝葉正如古松生於沙中盛夏木膠流出沙上狀如桃膠夷人采取賣與商賈無賈則自食之宗奭曰薫陸木葉類棠梨南印度界呵叱釐國出之謂之西香南畨者更佳即乳香也承曰西出天竺南出波斯等國西者色黄白南者色紫赤日久重叠者不成乳頭雜以沙石其成乳者乃新出未雜沙石者也薫陸是總名乳是薫陸之乳頭也今松脂楓脂中亦有此狀者甚多時珍曰乳香今人多以楓香雜之惟燒之可辨南畨諸國皆有宋史言乳香有一十三等按葉廷珪香録云乳香一名薫陸香出大食國南其樹類松以斤斫樹脂溢於外結而成香聚而成塊上品為揀香圓大如乳頭透明俗呼滴乳又曰明乳次為瓶香以瓶收者次為乳塌雜沙石者次為黒塌色黒次為水濕塌水漬色敗氣變者次為斫削雜碎不堪次為纒末播揚為塵者觀此則乳有自流出者有斫樹溢出者諸説皆言其樹類古松㓂氏言類棠梨恐亦𫝊聞當從前説道書乳香檀香謂之浴香不可燒祀上真修治頌曰乳性至粘難碾用時以繒袋掛於忩隙間良久取研乃不粘也大明曰入丸散微炒殺毒則不粘時珍曰或言乳香入丸藥以少酒研如泥以水飛過晒乾用或言以燈心同研則易細或言以糯米數粒同研或言以人指甲二三片同研或言以乳鉢坐熱水中乳之皆易細外丹本草云乳香以韭實葱蒜煆伏成汁最柔五金丹房鑑源云乳香啞銅氣味微温無毒大明曰乳香辛熱微毒元素曰苦辛純陽震亨曰善竄入手少隂經主治薫陸主風水毒腫去惡氣伏尸癮疹癢毒乳香同功别録乳香治耳聾中風口噤不語婦人血氣止大腸洩澼療諸瘡令内消能發酒理風冷藏器下氣益精補腰膝治腎氣止霍亂衝惡中邪氣心腹痛疰氣煎膏止痛長肉大明治不眠之才補腎定諸經之痛元素仙方用以辟穀李珣消癰疽諸毒托裏䕶心活血定痛伸筋治婦人產難折傷時珍發明時珍曰乳香香竄能入心經活血定痛故為癰疽瘡瘍心腹痛要藥素問云諸痛痒瘡瘍皆屬心火是矣産科諸方多用之亦取其活血之功爾陳自明婦人良方云知蘄州施少卿得神寢丸方於蘄州徐大丞云婦人臨産月服之令胎滑易生極有效騐用通明乳香半兩枳殻一兩為末煉蜜丸梧子大每空心酒服三十丸李嗣直治癰疽初起内托䕶心散云香徹瘡孔中能使毒氣外出不致内攻也方見穀部緑豆下按葛洪抱朴子云浮炎洲在南海中出薫陸香乃樹有傷穿木膠流墮夷人采之恒患狤􅠝獸啖之此獸斫刺不死以缺能之皮不傷而骨碎乃死觀此則乳香之治折傷缺活血止痛亦其性然也楊清叟云凡人筋不伸者敷藥宜加乳香其性能伸筋附方舊五新二十六口目喎斜乳香燒烟熏之以順其血脉證治要訣袪風益顔真乳香二斤白蜜三斤瓷器合煎如餳毎旦服二匙竒效方急慢驚風乳香半兩甘遂半兩同研末每服半錢用乳香湯下小便亦可王氏博濟方小兒内釣腹痛用乳香沒藥木香等分水煎服之阮氏小兒方小兒夜啼乳香一錢燈花七枚為末每服半匙乳汁下聖恵方心氣疼痛不可忍用乳香三兩真茶四兩為末以臘月鹿血和丸彈子大每温醋化一丸服之方瑞竹堂經騐冷心氣痛乳香一粒胡椒四十九粒研入薑汁熱酒調服潘氏經騐方隂證呃逆乳香同硫黄燒烟嗅之傷寒藴要辟禳瘟疫每臘月二十四日五更取第一汲井水浸乳香至元旦五更温熱從小至大每人以乳一塊飲水三呷則一年無時災孔平仲云此乃宣聖之方孔氏七十餘代用之也夢寐遺精乳香一塊拇指大卧時細嚼含至三更嚥下三五服即效醫林集要淋癃溺血取乳香中夾舌者研細米飲服一錢危氏得效方難産催生簡要濟衆方用黄明乳香五錢為末母猪血和丸梧子大每酒服五丸經騐方用乳香以五月五日午時令一人在壁内奉乳鉢一童子在壁外以筆管自壁縫中逐粒遞過用鉢内研細水丸芡子大每服一丸無灰酒下少聖恵方用明乳香一豆大為末新汲水一盞入醋許令産婦兩手捉石燕念慮藥三遍乃飲之畧行數歩即下乆海上方用乳香硃砂等分為末麝香酒服一錢良自下咽㗋骨哽乳香一錢水研服之衛生易簡方香口辟臭滴乳噙之摘𤣥方風蟲牙痛不可忍者梅師方用薫陸香嚼嚥其汁立瘥朱氏集騐方用乳香豆許安孔中燒烟筋烙化立止中又方乳香川椒末各一錢為末化蠟和作丸塞孔直指方用乳香巴豆等分研和蠟丸塞之分聖恵方用乳香枯礬等蠟丸塞之大風癘疾摩勒香一斤即乳頭内光明者細研入牛乳五升甘草末四兩瓷盒盛之安桌子上置中庭安劒一口夜於北極下祝禱去盒子葢露一夜次日入甑中蒸炊三斗米熟即止夜間依前祝露又蒸如此三次乃止每服一茶匙空心及晚食前温酒調服服後當有惡物出至三日三夜乃愈也聖恵方漏瘡膿血白乳香二錢牡蠣粉一錢為末雪糕丸麻子大每薑湯服三十丸直指方斑豆不快乳香研細猪心血和丸芡子大每温水化服一丸聞人䂓痘疹論癰疽寒顫乳香半兩熟水研服顫發於脾乳香能入脾故也指仁齋直方甲疽弩肉濃血疼痛不愈用乳香為末膽礬燒研等分傅之肉消即愈靈苑方玉莖作腫乳香葱白等分搗傅山居四要野火丹毒自兩足起乳香末羊脂調塗幼㓜新書癧瘍風駁薫陸香白歛同研日日揩之并作末水服千金方杖瘡潰爛乳香煎油搽瘡口永類鈐方沒藥宋開寶釋名末藥時珍曰沒末皆梵言集解志曰沒藥生波斯國其塊大小不定黒色似安息香頌曰今南海諸國及廣州或有之木之根株皆如橄㰖葉青而宻歳乆者則有脂液流滴在地下凝結成塊或大或小亦類安息香采無時珣曰按徐表南州記云是波斯松脂也狀如神香赤黒色時珍曰按一統志云沒藥樹髙大如松皮厚一二寸采時掘樹下為坎用斧伐其皮脂流於坎旬餘方取之李珣言乳香是波斯松脂此又言沒藥亦是松脂葢出𫝊聞之誤爾所謂神香者不知何物也修治同乳香氣味苦平無毒主治破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤開寶破癥瘕宿血損傷瘀血消腫痛大明心膽虚肝血不足好古墮胎及産後心腹血氣痛並入丸散服李珣散血消腫定痛生肌時珍發明權曰凡金刀所傷打損踠跌墜馬筋骨疼痛心腹血瘀者並宜研爛熱酒調服推陳致新能生好血宗奭曰沒藥大槩通滯血血滯則氣壅瘀氣壅瘀則經絡滿急經絡滿急故痛且腫凡打撲踠跌皆傷經絡氣血不行瘀壅作腫痛也時珍曰乳香活血用沒藥散血皆能止痛消腫生肌故二藥每每相兼而附方舊二新七歴節諸風骨節疼痛晝夜不止沒藥末半兩虎脛骨酥炙為末三兩毎服二錢温酒調下圖經本草筋骨損傷米粉四兩炒黄入沒藥乳香末各半兩酒調成膏攤貼之方御藥院金刃所傷未透膜者乳香沒藥各一錢以童子小便半盞酒半盞温化服之為末亦可竒效良方小兒盤腸氣痛沒藥乳香等分為末以木香磨水煎沸調一錢服立效孩楊氏嬰寶鑑婦人腹痛内傷癘刺沒藥末一錢酒服便止圖經本草婦人血運方同上血氣心痛沒藥末二錢水一盞酒一盞煎服醫林集要産後惡血沒藥血竭末各一錢童子小便温酒各半盞煎沸服良久再服惡血自下更不生痛婦人良方女人異疾女人月事退出皆作禽獸之形欲來傷人先將綿塞隂戸乃頓服沒藥末一兩白湯調下即愈方危氏騏驎竭唐本草釋名血竭時珍曰騏驎亦馬名也此物如乾血故謂之血竭曰騏驎者隱之也舊與紫􅀈同條紫􅀈乃此樹上蟲所造成今分入蟲部集解恭曰騏驎竭樹名渴留紫􅀈樹名渇禀二物大同小異志曰二物同條功效亦别紫􅀈色赤而黑其葉大如盤􅀈從葉上出騏驎竭色黄而赤從木中出如松脂珣曰按南越志云騏驎竭是紫􅀈樹之脂也欲騐真偽但嚼之不爛如蠟者為上頌曰今南畨諸國及廣州皆出之木髙數丈婆娑可愛葉似櫻桃而有三角其脂液從木中流出滴下如膠飴狀久而堅凝乃成竭赤作血色采無時舊説與紫􅀈大都相類而别是一物功力亦殊斆曰凡使勿用海母血真相似只是味鹹并腥氣騏驎竭味微鹹甘似巵子氣也時珍曰騏驎竭是樹脂紫是蟲造按一統志云血竭樹畧如沒藥樹其肌赤色采法亦於樹下掘坎斧伐其樹脂流於坎旬日取之多出大食諸國今人試之以透指甲者為真獨孤滔丹房鑑源云此物出於西胡禀熒惑之氣而結以火燒之有赤汁涌出久而灰不變本色者為真也修治斆曰凡使先研作粉篩過入丸散中用若同衆藥搗則化作塵飛也氣味甘鹹平無毒大明曰得蜜佗僧良主治心腹卒痛金瘡血出破積血止痛生肉去五臟邪氣唐本傷折打損一切疼痛血氣攪刺内傷血聚補虛並宜酒服李珣補心包絡肝血不足好古益陽精消隂滯氣太清修鍊法傅一切惡瘡疥癬久不合性急不可多使却引膿大明散滯血諸痛婦人血氣小兒瘛瘲時珍發明時珍曰騏驎竭木之脂液如人之膏血其味甘鹹而走血葢手足厥隂藥也肝與心包皆主血故爾河間劉氏云血結除血痛為和血之聖藥是矣乳香沒藥雖主血病而兼入氣分此則専於血分者也附方舊一新十一白虎風痛走注兩膝熱腫用騏驎竭硫黄末各一兩每温酒服一錢恵聖方新久脚氣血竭乳香等分同研以木𤓰一箇剜孔入藥在内以麫厚褁砂鍋煑爛連麫搗丸梧子大每温酒服三十丸忌生冷竒效方慢驚瘛瘲定魄安魂益氣用血竭半兩乳香二錢半同搗成劑火炙溶丸梧子大每服一丸薄荷煎湯化下夏月用人參湯御藥院方鼻出衂血血竭蒲黄等分為末吹之醫林集要血痔腸風血竭末傅之直指方金瘡出血騏驎竭末傅之立止廣利方産後血衝心胸滿喘命在須臾用血竭没藥各一錢研細童便和酒調服醫林集要産後血運不知人及狂語用騏驎竭一兩研末每服二錢温酒調下太平聖恵方收歛口瘡血竭末一匙麝香少許大棗燒灰半錢同研津調塗之方究原臁瘡不合血竭末傅之以乾為度濟急仙方嵌甲疼痛血竭末傅之集醫林要腹中血塊血竭末藥各一兩滑石牡丹皮同煑過一兩為末醋糊丸梧子大服之方摘𤣥質汗宋開寶釋名時珍曰汗音寒畨語也集解蔵器曰質汗出西畨煎檉乳松淚甘草地黄并熱血成之畨人試藥以小兒斷一足以藥納口中將足蹋之當時能走者良氣味甘温無毒主治金瘡傷折瘀血内捐補筋肉消惡血下血氣婦人産後諸血結腹痛内冷不下食並以酒消服之亦傅病處藏器附方新一室女經閉血結成塊心腹攻痛質汗薑黄川大黄炒各半兩為末每服一錢温水下録聖濟總安息香唐本草釋名時珍曰此香辟惡安息諸邪故名或云安息國名也梵書謂之拙貝羅香集解恭曰安息香出西戎狀如松脂黄黒色為塊新者亦柔靭珣曰生南海波斯國樹中脂也狀若桃膠秋月采之禹錫曰按叚成式酉陽雜俎云安息香樹出波斯國呼為辟邪樹長二三丈皮色黄黒葉有四角經寒不凋二月開花黄色花心㣲碧不結實刻其樹皮其膠如飴名安息香六七月堅凝乃取之燒之通神辟衆惡時珍曰今安南三佛齊諸畨皆有之一統志云樹如苦棟大而且直葉似羊桃而長木心有脂作香葉廷珪香録云此乃樹脂形色類胡桃穰不宜於燒而能發衆香故人取以和香今人和香有如餳者謂之安息油機曰或言燒之能集鼠者為真氣味辛苦平無毒主治心腹惡氣鬼疰唐本邪氣魍魎鬼胎血邪辟蠱毒霍亂風痛男子遺精暖腎氣婦人血噤并産後血運大明婦人夜夢鬼交同臭黃燒熏丹穴永斷李珣燒之去鬼來神蕭炳治中惡魘寐勞瘵𫝊尸時珍附方新四卒然心痛或經年頻發安息香研末沸湯服半錢危氏得效方小兒肚痛曲脚而啼安息香丸用安息香酒蒸成膏沈香木香丁香藿香八角茴香各三錢香附子􅒦砂仁炙甘草各五錢為末以膏和煉蜜丸芡子大每服一錢紫蘇湯化下全幼心鑑小兒驚邪安息香一豆許燒之自除竒效良方歴節風痛用精猪肉四兩切片褁安息香二兩以瓶盛灰大火上着一銅版片隔之安香於上燒之以瓶口對痛處熏之勿令透氣聖恵方蘇合香别録上品釋名時珍曰按郭義恭廣志云此香出蘇合國因以名之梵書謂之咄魯瑟劒集解别録曰蘇合香出中臺川谷恭曰今從西域及崑崙來紫赤色與紫真檀相似堅實極芳香性重如石燒之灰白者好頌曰今廣州雖有蘇合香但類蘇木無香氣藥中只用如膏油者極芬烈陶隱居以為獅子矢者亦是指此膏油者言之爾梁書云中天竺國出蘇合香是諸香汁煎成非自然一物也又云大秦國人采得蘇合香先煎其汁以為香膏乃賣其滓與諸國賈人是以展轉來逹中國者不大香也然則廣南貨者其經煎煑之餘乎今用如膏油者乃合治成者爾時珍曰按寰宇志云蘇合油出安南三佛齊諸畨國樹生膏可為藥以濃而無滓者為上葉廷珪香譜云蘇合香油出大食國氣味皆類篤耨者沈括筆談云今之蘇合香赤色如堅木又有蘇合油如黐膠人多用之而劉夢得傳信方言蘇合香多薄葉子如金色按之即倒放之即起良久不定如蟲動氣烈者佳如此則全非今所用者宜精攷之竊按沈氏所説亦是油也不必致疑正誤𢎞景曰蘇合香俗𫝊是獅子屎外國説不爾今皆從西域來亦不復入藥惟供合好香爾恭曰此是胡人誑言陶不悟也藏器曰蘇合香色黄白獅子屎色赤黒二物相似而不同獅子屎極臭或云獅子屎是西國草木皮汁所為胡人將來極貴重之故飾其名爾氣味甘溫無毒主治辟惡殺鬼精物溫瘧蠱毒癎痓去三蟲除邪令人無夢魘久服通神明輕身長年别録發明時珍曰蘇合香氣竄能通諸竅臓腑故其功能辟一切不正之氣按沈括筆談云太尉王文正公氣羸多病宋真宗靣賜藥酒一瓶令空腹飲之可以和氣血辟外邪公飲之大覺安健次日稱謝上曰此蘇合香酒也每酒一斗入蘓合香丸一兩同煑極能調和五臓却腹中諸疾每冐寒夙興則宜飲一杯自此臣庻之家皆倣為之此方盛行於時其方本出唐𤣥宗開元廣濟方謂之白术丸後人亦編入千金外臺治疾有殊效附方新二蘇合香丸治𫝊尸骨蒸殗殢肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴痢瘀血月閉􅴖癖丁腫小兒驚癎客忤大人中風中氣狐狸等病用蘇合油一兩安息香末二兩以無灰酒熬成膏入蘇合油内白术香附子青木香白檀香沉香丁香麝香畢撥訶梨勒煨去核硃砂烏犀角鎊各二兩龍腦薫陸香各一兩為末以香膏加煉蜜和成劑蠟紙包收每服旋丸梧子大早朝取井華水温冷任意化服四丸老人小兒一丸恵氏和劑局方水氣浮腫蘇合香白粉水銀等分搗勻蜜丸小豆大每服二丸白湯下當下水出肘後方詹糖香别録上品釋名時珍曰詹言其粘糖言其狀也集解𢎞景曰出晉安岑州上真淳者難得多以其皮及蠧蟲屎雜之惟軟者為佳皆合香家要用不正入藥恭曰詹糖樹似橘煎枝葉為香似沙糖而黒出交廣以南生晉安近方多用之時珍曰其花亦香如茉莉花香氣氣味苦微温無毒主治風水毒腫去惡氣伏尸别録治惡核惡瘡𢎞景和胡桃青皮搗塗髮令黒如漆時珍附録結殺藏器曰結殺生西國樹之花也極香同胡桃仁入膏和香油塗頭去頭風白屑篤耨香綱目釋名集解時珍曰篤耨香出真蠟國樹之脂也樹如松形其香老則溢出色白而透明者名白篤耨盛夏不融香氣清逺土人取後夏月以火炙樹令脂液再溢至冬乃凝復收之其香夏融冬結以瓠瓢盛置隂凉處乃得不融雜以樹皮者則色黒名黒篤耨為下品附録膽八香時珍曰膽八樹生交阯南畨諸國樹如稚木犀葉鮮紅色類霜楓其實壓油和諸香爇之辟惡氣氣味缺主治靣黧䵟􅍍同白附子冬𤓰子白及石榴皮等分為末酒浸三日洗靣後傅之久則靣瑩如玉時珍龍腦香唐本草釋名片腦綱目羯婆羅香衍義膏名婆律香時珍曰龍腦者因其狀加貴重之稱也以白瑩如氷及作梅花片者為良故俗呼為氷片腦或云梅花腦畨中又有米腦速腦金脚腦蒼龍腦等稱皆因形色命名不及氷片梅花者也清者名腦油金光明經謂之羯婆羅香恭曰龍腦是樹根中乾脂婆律香是根下清脂舊出婆律國因以為名也集解恭曰龍腦香及膏香出婆律國樹形似杉木腦形似白松脂作杉木氣明淨者善久經風日或如雀屎者不佳或云子似豆䓻皮有錯甲即杉脂也今江南有杉木未經試或方土無脂猶甘蕉之無實也頌曰今惟南海畨舶賈客貨之南海山中亦有之相傳云其木髙七八丈大可六七圍如積年杉木狀旁生枝其葉正圓而背白結實如豆䓻皮有甲錯香即木中脂也膏即根下清液謂之婆律膏按叚成式酉陽雜爼云龍腦香樹名固不婆律無花實其樹有肥有痩痩者出龍腦肥者出婆律膏香在木心中波斯國亦出之斷其樹剪取之其膏於樹端流出斫樹作坎而承之兩説大同小異唐天寶中交趾貢龍腦皆如蟬蠶之形彼人云老樹根節方有之然極難得禁中呼為瑞龍腦帶之衣衿香聞十餘歩外後不復有此今海南龍腦多用火煏成片其中亦容雜偽入藥惟貴生者狀若梅花片甚佳也珣曰是西海波律國波律樹中脂也狀如白膠香其龍腦油本出佛誓國從樹取之宗奭曰西域記云西方抹羅短叱國在南印度境有羯布羅香幹如松株而葉異花果亦異濕時無香木乾之後循理折之中有香狀類雲母色如冰雪即龍腦香也時珍曰龍腦香南畨諸國皆有之葉廷珪香録云乃深山窮谷中千年老杉樹其枝幹不曽損動者則有香若損動則氣洩無腦矣土人觧作板板縫有腦出乃劈取之大者成片如花瓣清者名腦油江南異聞録云南唐保大中貢龍腦漿云以縑囊貯龍腦懸於琉璃缾中小頃滴瀝成水香氣馥烈大補益元氣按此漿與腦油稍異葢亦其類爾宋史熈寧九年英州雷震一山梓樹盡枯中皆化為龍腦此雖怪異可見龍腦亦有變成者也修治恭曰龍腦香合糯米炭相思子貯之則不耗時珍曰或言以雞毛相思子同入小瓷罐宻收之佳相感志言以杉木炭養之更良不耗今人多以樟腦升打亂之不可不辨也相思子見本條氣味辛苦㣲寒無毒珣曰辛苦温無毒元素曰熱陽中之陽主治婦人難産研末少許新汲水服立下别録心腹邪氣風濕積聚耳聾明目去目赤膚翳唐本目外障眼鎮心袐精治三蟲五痔李珣散心盛有熱好古入骨治骨痛李杲治大腸脱元素療㗋痺腦痛鼻瘜齒痛傷寒舌出小兒痘䧟通諸竅散鬱火時珍蒼龍腦主治風瘡䵟􅍍入膏煎良不可㸃眼傷人李珣婆律香膏主治耳聾摩一切風蘇恭發明宗奭曰此物大通利關隔熱塞大人小兒風涎閉塞及暴得驚熱甚為濟用然非常服之藥獨行則勢弱佐使則有功於茶亦相宜多則掩茶氣味甚清香為百藥之先萬物中香無出其右者震亨曰龍腦屬火世知其寒而通利然未逹其熱而輕浮飛越喜其香而貴細動輙與麝同為桂附之助然人之陽易動隂易虧不可不思杲曰龍腦入骨風病在骨髓者宜用之若風在血脉肌肉輙用腦麝反引風入骨髓如油入麫莫之能出也王綸曰龍腦大辛善走故能散熱通利結氣目痛㗋痺下疳諸方多用之者取其辛散也人欲死者吞之為氣散盡也世人誤以為寒不知其辛散之性似乎凉爾諸香皆屬陽豈有香之至者而性反寒乎時珍曰古方眼科小兒科皆言龍腦辛凉能入心經故治目病驚風方多用之痘瘡心熱血瘀倒黶者用引猪血直入心竅使毒氣宣散於外則血活痘發其説皆似是而實未當也目病驚病痘病皆火病也火鬱則發之從治之法辛主發散故爾其氣先入肺𫝊於心痺能走能散使壅塞通利則經絡條達而驚熱自平瘡毒能出用猪心血能引龍腦入心經非龍腦能入心也沈存中良方云痘瘡周宻盛則變黒者用生猪猪血一橡斗龍腦半分温酒和服潘氏云一女病發熱腰痛手足厥逆目加昬悶形證極惡疑是痘候時暑月急取屠家敗血倍用龍腦和服得睡須㬰一身瘡出而安若非此方則横夭矣又宋文天祥賈似道皆服腦子求死不得惟廖瑩中以熱酒服數握九竅流血而死此非腦子有毒乃熱酒引其辛香散溢經絡氣血沸亂而然爾附方舊二新十二目生膚翳龍腦末一兩日㸃三五度聖濟總録目赤目膜龍腦雄雀屎各八分為末以人乳汁一合調成膏日日㸃之無有不騐聖恵方頭目風熱上攻用龍腦末半兩南蓬砂末一兩頻㗜兩鼻御藥院方頭腦疼痛片腦一錢紙卷作撚燒烟熏鼻吐出痰涎即愈夀域方風熱㗋痺燈心一錢黄蘖五分並燒存性白礬七分煆過氷片腦三分為末每以一二分吹患處此陸一峯家傳絶妙方也瀕湖集簡方鼻中息肉垂下者用片腦㸃之自入集簡方傷寒舌出過寸者梅花片腦半分為末摻之隨手即愈堅洪邁夷志中風牙噤無門下藥者開闗散揩之五月五日午時用龍腦天南星等分為末每以一匙揩齒二三十遍其口自開牙齒疼痛梅花腦硃砂末各少許揩之立止集簡方痘瘡狂躁心煩氣喘妄語或見鬼神瘡色赤未透者經騐方用龍腦一錢細研旋以猪心血丸芡子大每服一丸紫草湯下少時心神便定得睡瘡發總微論用獖猪第二畨血清半盞酒半盃和勻入龍腦一分温服良久利下瘀血一二行瘡即紅活此治痘瘡黒黶候惡醫所不治者百發百中内外痔瘡片腦一二分葱汁化搽之簡便方酒皶鼻赤腦子真酥頻搽普濟方夢漏口瘡經絡中火邪夢漏恍惚口瘡烟燥龍腦三錢黄蘖三兩為末宻丸梧子大每麥門冬湯下十丸摘𤣥方子氣味辛温氣似龍腦主治下惡氣消食散脹滿香人口蘇恭附録元慈勒藏器曰出波斯國狀似龍腦香乃樹中脂也味甘平無毒主心病流血合金瘡去腹内惡血血痢下血婦人帶下明目去翳障風淚弩肉樟腦綱目釋名韶腦集解時珍曰樟腦出韶州漳州狀似龍腦白色如雪樟樹脂膏也胡演升鍊方云煎樟腦法用樟木新者切片以井水浸三日三夜入鍋煎之栁木頻攪待汁減半桞上有白霜即濾去滓傾汁入瓦盆内經宿自然結成塊也他處雖有樟木不解取腦又鍊樟腦法用銅盆以陳壁土為粉糝之却糝樟腦一重又糝壁土如此四五重以薄荷安土上再用一盆覆之黄泥封固於火上𣢾𣢾炙之須以意度之不可太過不及勿令走氣候冷取出則腦皆升於上盆如此升三兩次可充片腦也修治時珍曰凡用每一兩以二盌合住濕紙糊口文武火燲之半時許取出冷定用又法每一兩用黄連薄荷六錢白芷細辛四錢荆芥宻䝉花二錢當歸槐花一錢以新土盌鋪杉木片於底安藥在上入水半盞置腦於上再以一盌合住糊口安火煨之待水乾取開其腦自升於上以翎掃下形似松脂可入風熱眼藥人亦多以亂片腦不可不辨氣味辛熱無毒主治通闗竅利滯氣治中惡邪氣霍亂心腹痛寒濕脚氣疥癬風瘙齲齒殺蟲辟蠧着鞵中去脚氣時珍𤼵明時珍曰樟腦純陽與熖硝同性水中生火其焰益熾今丹爐及烟火家多用之辛熱香竄禀龍火之氣去濕殺䖝此其所長故燒烟薫衣筐席簟能辟壁虱䖝蛀李石續博物志云脚弱病人用杉木為桶濯足排樟腦於兩股間用帛綳定月餘甚妙王璽醫林集要方治脚氣腫痛用樟腦二兩烏頭三兩為末醋糊丸彈子大每置一丸於足心踏之下以微火烘之衣被圍覆汗出如涎為效附方新二小兒秃瘡韶腦一錢花椒二錢脂麻二兩為末以退猪湯洗後搽之簡便方牙齒蟲痛普濟方用韶腦硃砂等分擦之神效核余居士選竒方用樟腦黄丹肥皂去皮等分研勻蜜丸塞孔中阿魏唐本草校正自草部移入此釋名阿虞綱目薫渠唐本哈昔泥時珍曰夷人自稱曰阿此物極臭阿之所畏也波斯國呼為阿虞天竺國呼為形虞湼槃經謂之央匱䝉古人謂之哈昔泥元時食用以和料其根名穩展云淹羊肉甚香美功同阿魏見飲饍正要集解恭曰阿魏生西畨及崑崙苗葉根莖酷似白芷擣根汁日煎作餅者為上截根穿暴乾者為次體性極臭而能止臭亦為竒物也又婆羅門云薫渠即是阿魏取根汁暴之如膠或載根日乾並極臭西國持咒人禁食之常食用之云去臭氣戎人重此猶俗中貴胡椒巴人重負蠜也珣曰按廣志云生崑崙國是木津液如桃膠狀其色黒者不堪其狀黄散者為上雲南長河中亦有如舶上來者滋味相似一般只無黄色頌曰今惟廣州有之云是木膏液滴釀結成與蘇恭所説不同按叚成式酉陽雜爼云阿魏木生波斯國及伽闍那國即北天竺也長八九尺皮色青黄三月生葉似鼠耳無花實其枝汁出如飴久乃堅凝名阿魏摩伽陀僧言取其汁和米豆屑合釀而成其説與廣州所上者相近承曰阿魏合在木部今江浙人家亦種之枝葉香氣皆同而差淡薄無汁膏爾時珍曰阿魏有草木二種草者出西域可晒可煎蘓恭所説是也木者出南畨取其脂汁李珣蘓頌陳承所説是也一統志所載有此二種云出火州及沙鹿海牙國者草髙尺許根株獨立枝葉如蓋臭氣逼人生取汁熬作膏名阿魏出三佛齊及暹羅國者樹不甚髙土人納竹筒於樹内脂滿其中冬月破筒取之或云其脂最毒人不敢近每采時以羊繫於樹下自逺射之脂之毒着羊羊斃即為阿魏觀此則其有二種明矣葢其樹低小如枸杞牡荆之類西南風土不同故或如草如木也繋羊射脂之説俗亦相傳但無實據諺云黄芩無假阿魏無真以其多偽也劉純詩云阿魏無真却有真臭而止臭乃為珍炳曰人多言煎蒜白為假者斆曰騐法有三第一以半銖安熟銅器中一宿至明沾阿魏處白如銀汞無赤色第二將一銖置於五㪷草自然汁中一夜至明如鮮血色第三將一銖安於柚樹上樹立乾便是真者凡用乳鉢研細熱酒器上滚過入藥氣味辛平無毒主治殺諸小蟲去臭氣破癥積下惡氣除邪鬼蟲毒唐本治風邪鬼疰心腹中冷李珣𫝊尸冷氣辟瘟治瘧主霍亂心腹痛腎氣瘟瘴禦一切蕈菜毒大明解自死牛羊馬肉諸毒汪機消肉積震亨發明炳曰阿魏下細蟲極效時珍曰阿魏消肉積殺小蟲故能解毒辟邪治瘧痢疳勞尸注冷痛諸證按王璆百一選方云䕫州潭逺病瘧半年故人竇藏叟授方用真阿魏好丹砂各一兩研勻米糊和丸皂子大每空心人參湯化服一丸即愈世人治瘧惟用常山砒霜毒物多有所損此方平易人所不知草忩周宻云此方治瘧以無根水下治痢以黄連木香湯下瘧痢亦多起於積滯故爾附方新十辟鬼除邪阿魏棗許為末以牛乳或肉汁煎五六沸服之至暮以乳服安息香棗許乆者不過十日忌一切菜孫侍郎用之有效唐崔行功纂要惡疰腹痛不可忍者阿魏末熱酒服一二錢立止永類鈐方尸疰中惡近死尸惡氣入腹終身不愈用阿魏三兩每用二錢拌麫褁作餛飩十餘枚煑熟食之日三服至三七日永除忌五辛油物聖恵方㿗疝疼痛敗精惡血結在隂囊所致用阿魏二兩醋和蕎麥麫作餅褁之煨熟大檳榔二枚鑽孔溶乳香填滿亦以蕎麫褁之煨熟入硇砂末一錢赤芍藥末一兩糊丸梧子大每食前酒下三十丸危氏得效方小兒盤腸内弔腹痛不止用阿魏為末大蒜半瓣炮熟研爛和丸麻子大每艾湯服五丸總㣲論脾積結塊鷄子五箇阿魏五分黄蠟一兩同煎化分作十服每空心細嚼流水送下諸物不忌腹痛無妨十日後大便下血乃積化也保夀堂經騐方痞塊有積阿魏五錢五靈脂炒烟盡五錢為末以黄雄狗膽汁和丸黍米大空心唾津送下三十丸忌羊肉醋麫扶夀精方五噎膈氣方同上痎瘧寒熱阿魏臙脂各一豆大研勻以蒜膏和覆虎口上男左女右聖濟總録牙齒蟲痛阿魏臭黄等分為末糊丸緑豆大每綿褁一丸隨左右挿入耳中立效聖恵方盧㑹宋開寶校正自草部移入此釋名奴㑹開寶訥㑹拾遺象膽時珍曰名義未詳藏器曰俗呼為象膽以其味苦如膽也集解珣曰盧㑹生波斯國狀似黒餳乃樹脂也頌曰今惟廣州有來者其木生山野中滴脂淚而成采之不拘時月時珍曰盧㑹原在草部藥譜及圖經所狀皆言是木脂而一統志云𤓰哇三佛齊諸國所出者乃草屬狀如鱟尾采之以玉器搗成膏與前説不同何哉豈亦木質草形乎氣味苦寒無毒主治熱風煩悶胸膈間熱氣明目鎮心小兒癲癎驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒開寶主小兒諸疳熱李珣單用殺疳蚘吹鼻殺腦疳除鼻癢甄權研末傅䘌齒甚妙治濕癬出黃汁蘇頌發明時珍曰盧㑹乃厥隂經藥也其功専於殺蟲清熱已上諸病皆熱與蟲所生故也頌曰唐劉禹錫傳信方云予少年曽患癬初在頸頂間後延上左耳遂成濕瘡浸滛用斑蝥狗膽桃根諸藥徒令蜇蠚其瘡轉盛偶於楚州賣藥人教用盧㑹一兩炙甘草半兩研末先以温漿水洗癬拭淨傅之立乾便瘥真神竒也附方新一小兒脾疳盧㑹使君子等分為末每米飲服一二錢衛生易簡方胡桐淚唐本草校正自草部移入此釋名胡桐鹼綱目胡桐律珣曰胡桐淚是胡桐樹脂也故名淚作律字者非也律淚聲訛爾時珍曰西域傳云車師國多胡桐顔師古注云胡桐似桐不似桑故名胡桐蟲食其樹而汁出下流者俗名胡桐淚言似眼淚也其入土石成塊如􅒾鹼者為梧桐鹼音减或云律當作瀝非訛也猶松脂名瀝青之義亦通集解恭曰胡桐淚出肅州以西平澤及山谷中形似黄礬而堅實有夾爛木者云是胡桐樹脂淪入土石鹼􅒾地者其樹髙大皮葉似白楊青桐桑輩故名胡桐木堪器用保昇曰凉州以西有之初生似栁大則似桑桐其津下入地與土石相染狀如薑石極鹹苦得水便消若礬石消石之類冬月采之大明曰此有二般木律不中入藥惟用石律石上采之形如小石片子黄土色者為上頌曰今西畨亦有商人貨之時珍曰木淚乃樹脂流出者其狀如膏油石淚乃脂入土石間者其狀成塊以其得鹵斥之氣故入藥為勝氣味鹹苦大寒無毒恭曰伏砒石可為金銀銲藥主治大毒熱心腹煩滿水和服之取吐牛馬急黃黒汗水研三二兩灌之立瘥唐本主風蟲牙齒痛殺火毒麫毒大明風疳䘌齒骨瘤風勞能軟一切骨多服令人吐李珣瘰癧非此不能除元素咽喉腫痛水磨掃之取涎時珍發明頌曰古方稀用今治口瘡者多用為最要之物時珍曰石淚入地受鹵氣故其性寒能除熱其味鹹能入骨堅軟附方新六濕熱牙痛喜吸風胡桐淚入麝香摻之牙痛出血胡桐淚半兩研末夜夜貼之或入麝香少許聖恵方走馬牙疳胡桐鹼黄丹等分為末摻之醫林集要牙疳宣露膿血臭氣者胡桐淚一兩枸杞根一両每用五錢煎水熱漱又方胡桐淚葶藶等分研摻聖恵方牙齒蠧黒乃腎虚也胡桐淚一兩丹砂半兩麝香一分為末摻之聖濟總録返魂香海藥集解珣曰按漢書云武帝時西國進返魂香内傳云西域國屬州有返魂樹狀如楓柏花葉香聞百里采其實於釡中水煑取汁鍊之如漆乃香成也其名有六曰返魂驚精回生振靈馬精却死凡有疫死者燒豆許薫之再活故曰返魂時珍曰張華博物志云武帝時西域月氏國度弱水貢此香三枚大如燕卵黒如桑椹值長安大疫西使請燒一枚辟之官中病者聞之即起香聞百里數日不歇疫死未三日者薫之皆活乃返生神藥也此説雖渉詭怪然理外之事容或有之未可便指為謬也附録兠木香藏器曰漢武故事云西王母降燒兠木香末乃兠渠國所進如大豆塗宫門香聞百里關中大疫死者相枕聞此香疫皆止死者皆起此乃靈香非常物也本草綱目卷三十四
