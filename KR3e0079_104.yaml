body:
  text: 本草綱目卷四十四鱗之三魚類三十一種鯉魚本經上品釋名時珍曰鯉鱗有十字文理故名鯉雖困死鱗不反白頌曰崔豹云兖州人呼赤鯉為𤣥駒白鯉為黄驥黄鯉為黄騅集解别録曰生九江池澤取無時頌曰處處有之其脇鱗一道従頭至尾無大小皆三十六鱗每鱗有小黑㸃諸魚惟此最佳故為食品上味𢎞景曰鯉為諸魚之長形既可愛又能神變乃至飛越江湖所以仙人琴高乗之也山上水中有此不可食肉氣味甘平無毒日華曰凉有小毒宗奭曰鯉至陰之物其鱗三十六陰極則陽復故素問言魚熱中脉訣言熱則生風食之多能發風熱日華言凉非也風家食之貽禍無窮時珍曰按丹溪朱氏言諸魚在水無一􅒚之停皆能動風動火不獨鯉也詵曰鯉脊上兩筋及黑血有毒溪澗中者毒在腦俱不可食凡炙鯉魚不可使烟入目損目光三日内必騐也天行病後下痢及宿癥俱不可食服天門冬硃砂人不可食不可合犬肉及葵菜食主治煮食治欬逆上氣黄疸止渴治水腫脚滿下氣别録治懷妊身腫及胎氣不安日華煮食下水氣利小便時珍作鱠溫補去冷氣痃癖氣塊横闗伏梁結在心腹藏器治上氣欬𠻳喘促心鏡燒末能發汗定氣喘欬𠻳下乳汁消腫米飲調服治大人小兒暴痢用童便浸煨止反胃及惡風入腹時珍發明時珍曰鯉乃陰中之陽其功長於利小便故能消腫脹黄疸脚氣喘𠻳濕熱之病作鱠則性溫故能去痃結冷氣之病燒之則従火化故能發散風寒平肺通乳解腸胃及腫毒之邪按劉河間云鯉之治水鶩之利水所謂因其氣相感也附方舊五新八水腫范汪用大鯉魚一頭醋三升煮乾食一日一作外臺用大鯉一尾赤小豆一升水二斗煮食飲汁一頓服盡當下利盡即差妊娠水腫方同上水腫脹滿赤尾鯉魚一觔破開不見水及鹽以生礬五錢研末入腹内火紙包裹外以黄土泥包放竈内煨熟取出去紙泥送粥食頭者上消食身尾者下消一日用盡屢試經驗揚拱醫方摘要妊娠感寒用鯉魚一頭燒末酒服方寸匕令汗出秘録胎氣不長用鯉魚肉同鹽棗煮汁飲之集驗胎動不安及婦人數傷胎下血不止鯉魚一箇治凈阿膠炒一兩糯米二合水二升入葱薑橘皮鹽各少許煮臛食五七日效聖恵方乳汁不通用鯉魚一頭燒末每服一錢酒調下産寶咳𠻳氣喘用鯉魚一頭去鱗紙裹炮熟去刺研末同糯米煮粥空心食心鏡惡風入腹久腫惡風入腹及女人新産風入産户内如馬鞭嘘吸短氣咳𠻳者用鯉魚長一尺五寸以尿浸一宿平旦以木箆従頭貫至尾文火炙熟去皮空心頓食勿用鹽醋外臺反胃吐食用鯉魚一頭童便浸一夜炮焦研末同米煮粥食之夀域一切腫毒已潰未潰者用鯉魚燒灰醋和塗之以愈為度外臺積年骨疽一揑一汁出者熬飴餹勃瘡上仍破生鯉魚潝之頃時刮視蟲出更洗傅藥蟲盡則愈肘後小兒木舌長大滿口鯉魚肉切片貼之以帛繫定聖恵方鮓氣味鹹平無毒𢎞景曰不可合豆藿食乃成消渴主治殺蟲藏器附方新一聤耳有蟲膿血日夜不止用鯉魚鮓三觔鯉魚腦一枚鯉魚腸一具洗切烏麻子炒研一升同搗入器中㣲火炙暖布裹貼耳兩食頃有白蟲出盡則愈慎風寒千金膽氣味苦寒無毒之才曰蜀漆為使主治目熱赤痛青盲明目乆服强悍益志氣本經㸃眼治赤腫翳痛塗小兒熱腫甄權㸃雀目燥痛即明肘後滴耳治聾藏器附方舊一新三小兒咽腫痺痛者用鯉魚膽二十枚和竈底土以塗咽外立效千金方大人陰痿鯉魚膽雄雞肝各一枚為末雀卵和丸小豆大每吞一丸千金方睛上生暈不問久新鯉魚長一尺一寸者取膽滴銅鏡上陰乾竹刀刮下每㸃少許總録赤眼腫痛聖濟總録用鯉魚膽十枚膩粉一錢和匀瓶收日㸃十便良方用鯉膽五枚黄連末半兩和勻入蜂蜜少許瓶盛安飯上蒸熟每用貼目皆日五七度亦治飛血赤脉脂主治食之治小兒驚忤諸癎大明腦髓主治諸癎蘇恭煮粥食治暴聾大明和膽等分頻㸃目眥治青盲時珍附方新二耳卒聾竹筒盛鯉魚腦於飯上蒸過注入耳中千金耳膿有蟲鯉魚腦和桂末搗匀綿裹塞之千金方血主治小兒火瘡丹腫瘡毒塗之立差蘇恭腸主治小兒肌瘡蘇恭䁎耳有蟲同酢𢷬爛帛褁塞之痔瘻有蟲切斷炙熟帛褁坐之俱以蟲盡為度時珍子𢎞景曰合猪肝食害人目主治刺瘡傷風傷水作腫燒灰傅之汁出即愈藏器齒主治石淋别録末頌曰古今録驗治石淋用齒一升研以三嵗醋和分三服一日服盡外臺治卒淋用酒服時珍曰古方治石淋多用之未詳其義骨主治女子赤白帶下别録陰瘡魚鯁不出蘇恭皮主治病丙穩禾疹蘇恭燒灰水服治魚鯁六七日不出者日二服録驗鱗主治産婦滯血腹痛燒灰酒服亦治血氣蘇頌燒灰治吐血崩中漏下帶下痔瘻魚鯁時珍發明時珍曰古方多以皮鱗燒灰入崩漏痔瘻藥中葢取其行滯血耳治魚鯁者従其類也附方新三痔漏疼痛鯉魚鱗二三片綿裹如棗形納入坐之其痛即止儒門事親諸魚骨鯁鯉脊三十六鱗焙研凉水服之其刺自跳出神妙筆峯雜興鼻衂不止鯉魚鱗炒成灰每冷水服二錢普濟方鱮魚音序綱目釋名鰱魚時珍曰酒之美者曰􅀈魚之美者曰鱮陸佃云鱮好羣行相與也故曰鱮相連也故曰鰱傳云魚屬連行是矣集解時珍曰鱮魚處處有之狀如鱅而頭小形扁細鱗肥腹其色最白故西征賦云華魴躍鱗素鱮揚鬐失水易死葢弱魚也肉氣味甘溫無毒主治溫中益氣多食令人熱中發渴又發瘡疥時珍鱅魚音庸拾遺釋名鱃魚音秋出海經時珍曰此魚中之下品葢魚之庸常以供饈食者故曰鱅曰饈鄭𤣥作溶魚集解藏器曰陶注鮑魚云今以鱅魚長尺許者完作淡乾魚都無臭氣其魚目旁有骨名乙禮記云食魚去乙是矣然劉元紹言海上鱅魚其臭如尸海人食之當别一種也時珍曰處處江湖有之狀如鰱而色黒其頭最大有至四五十觔者味亞于鰱鰱之美在腹鱅之美在頭或以鰱鱅為一物誤矣首之大小色之黑白大不相侔山海經云鱃魚似鯉大首食之已疣是也肉氣味甘溫無毒藏器曰秪可供食别無功用主治暖胃益人汪頴食之已疣多食動風熱發瘡疥時珍鱒魚綱目釋名鮅魚必赤眼魚時珍曰説文云鱒鮅赤目魚也孫炎云鱒好獨行尊而必者故字従尊従必集解時珍曰處處有之狀如鯶而小赤脉貫瞳身圓而長鱗細于鯶青質赤草好食螺蚌善于遁網肉氣味甘溫無毒主治暖胃和中多食動風熱發疥癬時珍鯇魚音患拾遺釋名鰀魚音緩草魚時珍曰鯇又音混郭璞作鯶其性舒緩故曰鯇曰鰀俗名草魚因其食草也江閩畜魚者以草飼之也集解藏器曰鯇生江湖中似鯉時珍曰郭璞云鯶子似鱒而大是矣其形長身圓肉厚而鬆狀類青魚有青鯇白鯇二色白者味勝商人多䱒之肉氣味甘溫無毒時珍曰李廷飛云能發諸瘡主治暖胃和中時珍膽臘月收取陰乾氣味苦寒無毒主治喉痺飛尸水和攪服藏器一切骨鯁竹木刺在喉中以酒化二枚溫呷取吐時珍青魚宋開寶釋名時珍曰青亦作鯖以色名也大者名䱾魚集解頌曰青魚生江湖間南方多有北地時或有之取無時似鯇而背正青色南人多以作鮓古人所謂五侯鯖即此其頭中枕骨蒸令氣通曝乾狀如琥珀荆楚人煮拍作酒器梳箆甚佳舊注言可代琥珀者非也肉氣味甘平無毒日華曰㣲毒服术人忌之主治脚氣濕痺開寶同韭白煮治脚氣脚弱煩悶益氣力張鼎鮓氣味與服石人相反開寶𢎞景曰不可合生胡荽生葵菜豆藿麥醤同食頭中枕主治水磨服主心腹卒氣痛開寶治血氣心痛平水氣日華作飲器解蠱毒時珍眼睛汁主治注目能夜視開寶膽臘月收取陰乾氣味苦寒無毒主治㸃暗目塗熱瘡開寶消赤目腫痛吐喉痺痰涎及魚骨鯁療惡瘡時珍發明時珍曰東方青色入通肝膽開竅於目用青魚膽以治目疾葢取此義其治喉痺骨鯁則取漏泄係乎酸苦之義也附方新二乳蛾喉痺青魚膽含嚥用一方用汁灌鼻中取吐萬氏膽礬盛青魚膽中陰乾每用少許㸃喉取吐一方用朴硝代膽礬赤目障翳青魚膽頻頻㸃之一方加黄連海螵蛸各等分大龔氏易簡用黄連切片井水熬濃去滓煎成膏入青魚膽汁和就入片腦少許瓶收宻封每日㸃之甚妙一切障瞖魚膽丸用青魚膽鯉魚膽青羊膽牛膽各半兩熊膽二錢半麝香少許石决明一兩為末糊丸梧子大每空心茶下十丸龍木論竹魚綱目集解時珍曰出桂林湘灕諸江中狀如青魚大而少骨刺色如竹色青翠可愛鱗下間以朱㸃味如鱖魚肉為廣南珍品肉氣味甘平無毒主治和中益氣除濕氣時珍鯔魚宋開寳釋名子魚時珍曰鯔色鯔黒故名粤人訛為子魚集解志曰鯔魚生江河淺水中似鯉身圓頭扁骨軟性喜食泥時珍曰生東海狀如青魚長者尺餘其子滿腹有黄脂味美獺喜食之吳越人以為佳品醃為鮝腊肉氣味甘平無毒主治開胃利五臟令人肥健與百藥無忌開寶白魚宋開寳釋名鱎魚音喬去聲時珍曰白亦作鮊白者色也鱎者頭尾向上也集解劉翰曰生江湖中色白頭昂大者長六七尺時珍曰鮊形窄腹扁鱗細頭尾俱向上肉中有細刺武王白魚入舟即此肉氣味甘平無毒詵曰鮮者宜和豉作羮雖不發病多食亦泥人經宿者勿食令人腹冷炙食亦少動氣或醃或糟藏皆可食瑞曰多食生痰與棗同食患腰痛主治開胃下氣去水氣令人肥健開寶助脾氣調五臟理十二經絡舒展不相及氣食療治肝氣不足補肝明目助血脈炙瘡不發者作鱠食之良患瘡癤人食之發膿日華發明時珍曰白魚比他魚似可食亦能熱中發瘡所謂補肝明目調五臟理十二經絡者恐亦溢美之詞未足多信當以開寶注為正鯼魚食療釋名時珍曰鯼性啖魚其目瞍視故謂之鯼異物志以為石首魚非也食療作鯮古無此字集解時珍曰鯮生江湖中體圓厚而長似鱤魚而腹稍起扁額長喙口在頷下細鱗腹白背㣲黄色亦能噉魚大者二三十觔肉氣味甘平無毒主治補五臟益筋骨和脾胃多食宜人作鮓尤宜曝乾香美亦不發病孟詵鱤魚音感綱目釋名􅗫魚音紺鰥魚黄頰魚時珍曰鱤敢也􅗫䐄也䐄音陷食而無厭也健而難取吞㗖同類力敢而䐄物者也其性獨行故曰鰥詩云其魚魴鰥是矣集解時珍曰鱤生江湖中體似鯮而腹平頭似鯇而口大頰似鮎而色黄鱗似鱒而稍細大者三四十觔啖魚最毒池中有此不能畜魚東山經云姑兒之水多鱤魚是也異苑云諸魚欲産􅗫以頭衝其腹世謂之衆魚生母然諸魚生子必雄魚衝其腹仍尿白以葢其子不必盡是􅗫魚也肉氣味甘平無毒主治食之已嘔暖中益胃時珍石首魚宋開寶釋名石頭魚嶺表録鮸魚音免録拾遺江魚浙志黄花魚臨海志乾者名鮝魚音想亦作鱶養時珍曰鮝能養人人恒想之故字従羅願云諸魚薨乾皆為鮝其美不及石首故獨得専稱以白者為佳故呼白鮝若露風則變紅色失味也集解志曰石首魚出水能鳴夜視有光頭中有石如碁子一種野鴨頭中有石云是此魚所化時珍曰生東南海中其形如白魚扁身弱骨細鱗黄色如金首有白石二枚瑩潔如玉至秋化為冠鳬即野鴨有冠者也腹中白鰾可作膠臨海異物志云小者名䠓水其次名春來田九成逰覽志云每嵗四月來自海洋綿亘數里其聲如雷海人以竹筒探水底聞其聲乃下網截流取之潑以淡水皆圉圉無力初水來者甚佳二水三水來者魚漸小而味漸減矣附録墨頭魚時珍曰四川嘉州出之狀類鯶子長者及尺其頭黑如墨頭上有白子二枚又名北斗魚常以二三月出漁人以火夜炤乂之肉氣味甘平無毒主治合蓴菜作羮開胃益氣開寶鮝主治炙食能消𤓰成水治暴下痢及卒腹脹不消開寶消宿食主中惡鮮者不及張鼎發明時珍曰陸文量菽園雜記云痢疾最忌油膩生冷惟白鮝宜食此説與本草主下痢相合葢鮝飲鹹水而性不熱且無脂不膩故無熱中之患而消食理腸胃也附方新一蜈蚣咬傷白鮝皮貼之集成頭中石魫主治下石淋水磨服亦燒灰飲服日三開寶研末或燒研水服主淋瀝小便不通煮汁服解砒霜毒野菌毒蠱毒時珍附方新二石淋諸淋石首魚頭石十四箇當歸等分為末水二升煮一升頓服立愈外臺秘要方聤耳出膿石首魚魫研末或燒存性研摻耳集簡方勒魚綱目釋名時珍曰魚腹有硬刺勒人故名集解時珍曰勒魚出東南海中以四月至漁人設網候之聴水中有聲則魚至矣有一次二次三次乃止狀如鰣魚小首細鱗腹下有硬刺如鰣腹之刺頭上有骨合之如鶴喙形乾者謂之勒鮝吳人嗜之甜𤓰生者用勒鮝骨挿蒂上一夜便熟石首鮝骨亦然肉氣味甘平無毒主治開胃暖中作鮝尤良時珍鰓主治瘧疾以一寸入七寶飲酒水各半煎露一夜服時珍方摘𤣥鱭魚音劑食療釋名鮆魚音劑鮤魚音列􅀈刀音篾魛魚音刀鰽魚廣韻音道亦作鮂望魚時珍曰魚形如劑物裂篾之刀故有諸名魏武食制謂之望魚集解時珍曰鱭生江湖中常以三月始出狀狹而長薄如削木片亦如長薄尖刀形細鱗白色吻上有二硬鬚腮下有長鬛如麥芒腹下有硬角刺快利若刀腹後近尾有短鬛肉中多細刺煎炙或作鮓鱐食皆美烹煮不如淮南子云鮆魚飲而不食鱣鮪食而不飲又異物志云鰽魚初夏従海中泝流而上長尺餘腹下如刀肉中細骨如毛云是鰽鳥所化故腹内尚有鳥腎二枚其鳥白色如鷖羣飛至夏鳥藏魚出變化無疑然今鱭魚亦自生子未必盡鳥化也肉氣味甘溫無毒詵曰發疥不可多食源曰助火動痰發疾鮓主治貼痔瘻時珍附方新一瘻有數孔用耕垈土燒赤以苦酒浸之合壁土令熱以大鮆鮓展轉染土貼之每日一次千金方鰣魚食療釋名寗源曰初夏時有餘月則無故名出産時珍曰按孫愐云鰣出江東今江中皆有而江東獨盛故應天府以充御貢每四月鱭魚出後即出云従海中泝上人甚珍之惟蜀人呼為瘟魚畏而不食集解時珍曰鰣形秀而扁㣲似魴而長白色如銀肉中多細刺如毛其子甚細膩故何景明稱其銀鱗細骨彭淵材恨其美而多刺也大者不過三尺腹下有三角硬鱗如甲其肪亦在鱗甲中自甚惜之其性浮㳺漁人以絲網沈水數寸取之一絲罣鱗即不復動才出水即死最易餒敗故袁達禽蟲述云鰣魚罥網而不動䕶其鱗也不宜烹煮惟以筍莧芹荻之屬連鱗蒸食乃佳亦可糟藏之其鱗與他魚不同石灰水浸過晒乾層層起之以作女人花鈿甚良肉氣味甘平無毒詵曰發疳痼主治補虚勞孟詵蒸下油以瓶盛埋土中取塗湯火傷甚效寗源嘉魚宋開寶釋名鮇魚音味拙魚綱目丙穴魚藏器曰左思蜀都賦云嘉魚出於丙穴李善註云魚以丙日出穴或云穴向丙耳魚豈能擇日出入耶按抱朴子云燕避戊巳鶴知夜半魚豈不知丙日乎時珍曰嘉美也杜甫詩云魚知丙穴由來美是矣河陽呼為鮇魚言味美也蜀人呼為拙魚言性純也丙穴之説不一按文選注云丙穴在漢中沔縣北有二所常以三八月取之丙地名也水經云丙水出丙穴穴口向丙故名嘉魚常以三月出穴十月入穴黄鶴云蜀中丙穴甚多不獨漢中也嘉州雅州梁山大邑順政諸縣皆有丙穴嘉魚常以春末出游冬月入穴集解志曰嘉魚乃乳穴内小魚也常食乳水所以益人時珍曰按任豫益州記云嘉魚蜀郡處處有之狀如鯉而鱗細如鱒肉肥而美大者五六觔食乳泉出丙穴二三月隨水出穴八九穴逆水入穴䕫州志云嘉魚春社前出秋社後歸首有黒㸃長身細鱗肉白如玉味頗鹹食鹽泉故也范成大虞衡志云嘉魚狀如鰣而多脂味極美梧州人以為鮓餉逺劉恂嶺表録云蒼梧戎縣江水日出嘉魚似鱒而肥美衆魚莫及每炙食以芭蕉隔火恐脂滴火中也又可為脡肉氣味甘溫無毒詵曰㣲有毒而味多珍美主治食之令人肥健悅澤開寶煑食治腎虚消渴勞痩虚損藏器發明志曰此魚食乳水功用同乳能久食之力强於乳有似英雞詵曰常於崖石下孔中食乳石沫故補益也鯧魚拾遺釋名䱽魚録異鯧鯸魚拾遺昌䑕藏器時珍曰昌美也以味名或云魚游於水羣魚隨之食其涎沫有類於娼故名閩人訛為䱽魚廣人連骨煮食呼為狗瞌睡魚集解藏器曰鯧魚生南海狀如鯽身正圓無硬骨作炙食至美時珍曰閩浙廣南海中四五月出之嶺表録云形似鯿魚腦上突起連背身圓肉厚白如鱖肉只有一脊骨治之以葱薑缶之以梗米其骨亦軟而可食肉氣味甘平無毒主治令人肥健益氣力藏器腹中子氣味有毒令人痢下藏器鯽魚别録上品釋名鮒魚音附時珍按陸佃埤雅云鯽魚旅行以相即也故謂之鯽以相附也故謂之鮒集解保昇曰鯽所在池澤有之形似小鯉色黒而體促壯大而脊隆大者至三四觔時珍曰鯽喜偎泥不食雜物故能補胃冬月肉厚子多其味尤美酈道元水經註云蘄州廣齊青林湖鯽魚大二尺食之肥美辟寒暑東方朔神異經云南方湖中多鯽魚長數尺食之宜暑而辟風寒吕氏春秋云魚之美者有洞庭之鮒觀此則鯽為佳品自古尚矣附録䲙魚詵曰一種䲙魚與鯽頗同而味不同功亦不及云䲙是櫛化鯽是稷米所化故腹尚有米色寛大者是鯽狹小者是䲙也時珍曰孟氏言鯽䲙皆櫛稷化成者殊為謬説惟鼢䑕化䲙䲙化鼢䑕鎦績霏雪録中嘗書之時珍亦嘗見之此亦生生化化之理鯽䲙多子不盡然爾䲙魚即爾雅所謂鱖鯞郭璞所謂妾魚婢魚崔豹所謂青衣魚世俗所謂鰟魮鯽也似鯽而小且薄黑而揚赤其形以三為率一前二後若婢妾然故名鯽頌曰黔中一種重唇石鯽魚味美亦之類也肉氣味甘溫無毒鼎曰和蒜食少熱同沙餹食生疳蟲同芥菜食成腫疾同猪肝雞肉雉肉鹿肉猴肉食生癰疽同麥門冬食害人主治合五味煮食主虛羸藏器溫中下氣大明止下痢腸痔保昇冬夏月熱痢有益月不宜合蓴作羮主胃弱不下食調中益五臟合茭首作羮主丹石發熱孟詵生𢷬塗惡核腫毒不散及瘑瘡同小豆𢷬塗丹毒燒灰和醬汁塗諸瘡十年不瘥者以猪脂煎灰服治腸癰蘇恭合小豆煑汁服消化腫炙油塗婦人陰疳諸瘡殺蟲止痛釀白礬燒研飲服治腸風血痢釀硫黄煅研釀五倍子煅研酒服竝治下血釀茗葉煨服治消渴釀胡蒜煨研飲服治膈氣釀緑礬煆研飲服治反胃釀鹽花燒研摻齒疼釀當歸燒研揩牙烏髭止血釀砒燒研治急疳瘡釀白鹽煨研搽骨疽釀附子炙焦同油塗頭瘡白秃時珍發明震亨曰諸魚屬火獨鯽屬土有調胃實腸之功若多食亦能動火附方舊五新三十二鶻突羮治脾胃虚冷不下食以鯽魚半觔切碎用沸䜴汁投之入胡椒蒔蘿薑橘末空心食之心鏡卒病水腫用鯽魚三尾去腸留鱗以商陸赤小豆等分填滿扎定水三升煑糜去魚食豆飲汁二日一作不過三次小便利愈肘後方消渴飲水用鯽魚一枚去腸留鱗以茶葉填滿紙包煨熟食之不過數枚即愈吳氏心統腸風下血百一方治活鯽一大尾去腸留鱗入五倍子末填滿泥固煆存性為末酒服一錢或飯丸日三服又用硫黄一兩如上法煆服亦效酒積下血酒煮鯽魚常食最效便氏食療方腸痔滴血常以鯽魚作羮食外臺腸風血痔用活鯽魚翅側穿孔去腸留鱗入白礬末二錢以儍包紙裹煨存性研末每服二錢米飲下每日二服直指方血痢禁口方同上反胃吐食用大鯽魚一尾去腸留鱗入緑礬末令滿泥固煆存性研末每米飲服一錢日二本事膈氣吐食用大鯽魚去腸留鱗切大蒜片填滿紙包十日泥封晒半乾炭火煨熟取肉和平胃散末一兩杵丸梧子大蜜收每服三十丸米飲下經驗小腸疝氣每頓用鯽魚十箇同茴香煮食久食自愈生生編妊娠感寒時行者用大鯽一頭燒灰酒服方寸匕無汗腹中緩痛者以醋服取汗産乳熱病目暗因瘥後食五辛而致用鯽魚作臛食之集驗方目生弩肉鮮鯽魚取一片中央開竅貼于眶上日三五度聖濟總録婦人血崩鯽魚一箇長五寸者去腸入血竭乳香在内綿包燒存性研末每服三錢熱酒調下葉氏摘𤣥方小兒齁喘活鯽魚七箇以器盛令兒自便尿養之待紅煨熟食甚效一女年十嵗用此永不發也集簡方小兒舌腫鮮鯽魚切片貼之頻換總㣲論小兒丹毒従髀起流下陰頭赤腫出血用鯽魚肉切五合赤小豆末二合𢷬匀入水和傅之千金方小兒秃瘡千金用鯽魚燒灰醬汁和塗一用鯽魚去腸入皂礬燒研搽錢危氏用大鯽去腸入亂髮填滿燒研入雄黄末二先以虀水洗拭生油調搽小兒頭瘡晝開出膿夜即復合用鯽魚長四寸一枚去腸大附子一枚去皮研末填入炙焦研傅搗蒜封之效聖恵走馬牙疳用鯽魚一箇去腸入砒一分生地黄一兩紙包燒存性入枯白礬麝香少許為末摻之牙疳出血大鯽魚一尾去腸留鱗入當歸末泥固燒存性入煆過鹽和匀日用聖恵方揩牙烏鬚方同上刮骨取牙用鯽魚一箇去腸入砒在内露于陰地待有霜刮下瓶收以針捜開牙根㸃少許欬𠻳自落又方用磠砂入鯽魚内煨過瓶收待有霜刮取如上法用諸瘡腫毒鯽魚一觔者去腸柏葉填滿紙裹泥包煆存性入輕粉二錢為末麻油調搽普濟方浸淫毒瘡凡卒得毒氣攻身或腫痛或赤痒上下周匝煩毒欲死此浸淫毒瘡也生鯽魚切片和鹽𢷬貼頻易之聖恵方骻上便毒鯽魚一枚山藥五錢同𢷬傅之即消醫林集要骨疽膿出黒色鯽魚一箇去腸入白鹽令滿札定以水一盞石器内煮至乾焦為末猪油調搽少痛勿怪危氏方手足瘭疽累累如赤豆剥之汁岀大鯽魚長三四寸者亂髮一雞子大猪脂一升同煎膏塗之千金方臁脛生瘡用中鯽魚三尾洗淨穿山甲二錢以長皂莢一挺劈開兩片夾住扎之煨存性研末先以井水洗淨膿水用白竹葉刺孔貼之候水出盡以麻油輕粉調藥傅之日一次直指方小兒撮口出白沫以艾炙口之上下四壯鯽魚燒研酒調少許灌之仍搯手足兒一嵗半則以魚網洗水灌之小兒方婦人陰瘡方見主治鱠主治久痢赤白腸澼痔疾大人小兒丹毒風眩藏器治脚風及上氣思邈溫脾胃去寒結氣時珍鮓主治瘑瘡批片貼之或同桃葉𢷬傅殺其蟲時珍附方新一赤痢不止鯽魚鮓二臠切秫米一把薤白一虎口切合煮粥食之聖恵頭主治小兒頭瘡口瘡重舌目瞖蘇恭燒研飲服療欬𠻳藏器燒研飲服治下痢酒服治脱肛及女人陰脱仍以油調搽之醬汁和塗小兒面上黄水瘡時珍子忌猪肝主治調中益肝氣張鼎骨主治䘌瘡燒灰傅數次即愈張鼎膽主治取汁塗疳瘡陰蝕瘡殺蟲止痛㸃喉中治骨鯁竹刺不出時珍附方舊一新二小兒腦疳鼻痒毛髪作穂黄痩用鯽魚膽滴鼻中三五日甚效聖恵消渴飲水用浮石蛤蚧蟬蛻等分為末以鯽魚膽七枚調服三錢神效本事滴耳治聾鯽魚膽一枚烏驢脂少許生麻油半兩和勻納入樓葱管中七日取滴耳中日二次聖恵方腦主治耳聾以竹筒蒸過滴之聖恵魴魚音房食療釋名鯿魚音編時珍曰魴方也鯿扁也其狀方其身扁也集解時珍魴魚處處有之漢沔尤多小頭縮項穹脊濶腹扁身細鱗其色青白腹内有肪味最腴美其性宜活水故詩云豈其食魚必河之魴俚語云伊洛鯉魴美如牛羊又有一種火燒鯿頭尾俱似魴而脊骨更隆上有赤鬛連尾如蝙蝠之翼黑質赤章色如烟薰故名其大有至二三十觔者肉氣味甘溫無毒主治調胃氣利五臟和芥食之能助肺氣去胃風消穀作鱠食之助脾氣令人能食作羮臛食宜人功與鯽同疳痢人勿食孟詵鱸魚宋嘉定釋名四鰓魚時珍曰黒色曰盧此魚白質黒章故名淞人名四鰓魚集解時珍曰鱸出吳中淞江尤盛四五月方出長僅數寸狀㣲似鱖而色白有黒㸃巨口細鱗有四鰓楊誠齋詩頗盡其狀云鱸出鱸鄉蘆葉前垂虹亭下不論錢買來玉尺如何短鑄出銀梭直是圓白質黑章三四㸃細鱗巨口一雙鮮春風已有真風味想得秋風更逈然南郡記云吳人獻淞江鱸鱠於隋煬帝帝曰金虀玉鱠東南佳味也肉氣味甘平有小毒宗奭曰雖有小毒不甚發病禹錫曰多食發痃癖瘡腫不可同乳酪食李廷飛云肝不可食剥人面皮詵曰中鱸魚毒者蘆根汁解之主治補五臟益筋骨和腸胃治水氣多食宜人作鮓尤良曝乾甚香美嘉定益肝腎宗奭安胎補中作鱠尤佳孟詵鱖魚居衛切開寶釋名罽魚音薊石桂魚開寶水豚時珍曰鱖蹶也其體不能屈曲如僵蹶也罽􅖯也其紋斑如織􅖯也大明曰其味如豚故名水豚又名鱖豚志曰昔有仙人劉憑常食石桂魚桂鱖同音當即是此集解時珍曰鱖生江湖中扁形濶腹大口細鱗有黒斑采斑色明者為雄稍晦者為雌皆有鬐鬛刺人厚皮𦂳肉肉中無細刺有肚能嚼亦啖小魚夏月居石穴冬月偎泥罧魚之沈下者也小者味佳至三五觔者不美李廷飛延夀書云鱖鬐刺凡十二以應十二月誤鯁害人惟橄欖核磨水可解葢魚畏橄欖故也附録鰧魚時珍曰按山海經云洛水多鰧魚狀如鱖居于逵蒼文赤尾食之不癰可以治瘻郭注云鰧音滕逵乃水中穴道交通者愚按鰧之形狀居止功用俱與鱖同亦鱖之類也日華子謂鱖為水豚者豈此鰧與肉氣味甘平無毒日華曰㣲毒主治腹内惡血去腹内小蟲益氣力令人肥健開寶補虚勞益脾胃孟詵治腸風瀉血日華發明時珍曰按張杲醫説云越州邵氏女年十八病勞瘵累年偶食鱖魚羮遂愈觀此正與補勞益胃殺蟲之説相符則仙人劉慿隠士張志和之嗜此魚非無謂也尾主治小兒軟癤貼之良時珍膽氣味苦寒無毒主治骨鯁不拘久近時珍附方舊一骨鯁竹木刺入咽喉不拘大人小兒日久或入臟腑痛刺黄瘦甚者服之皆出臘月收鱖魚膽懸北簷下令乾每用一皂子煎酒溫呷得吐則鯁隨涎出未吐再服以吐為度酒隨量飲無不出者蠡鯇鯽膽皆可勝金方鯊魚綱目釋名鮀魚爾雅吹沙郭璞沙溝魚俗名沙鰮音問時珍曰此非海中沙魚乃南方溪澗中小魚也居沙溝中吹沙而游咂沙而食鮀者肉多形圓陀陀然也集解時珍曰鯊魚大者長三四寸其頭尾一般大頭狀似鱒體圓似鱓厚肉重唇細鱗黄白色有黒斑㸃文背有鬐刺甚硬其尾不岐小時即有子味頗美俗呼為阿浪魚肉氣味甘平無毒主治暖中益氣時珍杜父魚拾遺釋名渡父魚綱目黄䱂魚音么舩矴魚綱目伏念魚臨海志時珍曰杜父當作渡父溪澗小魚渡父所食也見人則以喙挿入泥中如舩矴也集解藏器曰杜父魚生溪澗中長二三寸狀如吹沙而短其尾岐大頭闊口其色黄黒有斑脊背上有鬐刺螫人氣味甘溫無毒主治小兒差頽用此魚擘開口咬之七下即消藏器大差頽陰核小也石斑魚綱目釋名石礬魚延夀書高魚集解時珍曰石斑生南方溪澗水石處長數寸白鱗黒斑浮游水面聞人聲則劃然深入臨海水土記云長者尺餘其斑如虎文而性婬春月與蛇醫交牝故其子有毒南方異物志云高魚似鱒有雌無雄二三月與蜥蜴合於水上其胎毒人酉陽雜爼云石斑與蛇交南方有土蜂土人殺此魚摽樹上引鳥食之蜂窠皆盡也子及腸氣味有毒令人吐瀉醫説云用魚尾草汁少許解之石鮅魚拾遺集解藏器曰生南方溪澗中長一寸背裹腹下赤南人以作鮓云甚美氣味甘平有小毒主治瘡疥癬藏器黄鯝魚音固綱目釋名黄骨魚時珍曰魚腸肥曰鯝此魚腸腹多脂漁人煉取黄油然燈甚鯹也南人訛為黄姑北人訛為黄骨魚集解時珍曰生江湖中小魚也狀似白魚而頭尾不昻扁身細鱗白色闊不踰寸長不近尺可作鮓葅煎炙甚美肉氣味甘溫無毒主治白煮汁飲止胃寒洩瀉時珍油主治瘡癬有蟲然燈昏人目時珍鰷魚綱目釋名白鯈音條䱗魚音餐鮂魚音囚鮂時珍曰鰷條也䱗粲也囚也條其狀也粲其色也囚其性也集解時珍曰鰷生江湖中小魚也長僅數寸形狹而扁狀如栁葉鱗細而整潔白可愛性好羣游荀子曰鯈浮陽之魚也最宜鮓葅氣味甘溫無毒主治煮食已憂暖胃止冷瀉時珍鱠殘魚食鑑釋名王餘魚綱目銀魚時珍曰按博物志云吳王闔閭江行食魚鱠棄其殘餘於水化為此魚故名或又作越王及僧寶誌者益出傅會不足致辯集解時珍曰鱠殘出蘇松浙江大者長四五寸身圓如筯潔白如銀無鱗若巳鱠之魚但目有兩黒㸃爾彼人尤重小者曝乾以貨四方清明前有子食之甚美清明後子出而瘦但可作鮓腊耳氣味甘平無毒主治作羮食寛中健胃寗源鱵魚音針綱目釋名姜公魚俗名銅哾魚音税臨海志時珍曰此魚喙有一鍼故有諸名俗云姜太公釣鍼葢亦傅㑹也集解時珍曰生江湖中大小形狀並同鱠殘但喙尖有一細黒骨如鍼為異耳東山經云沢水北注于湖中多箴魚狀如鯈其喙如鍼即此氣味甘平無毒主治食之無疫時珍鱊魚音聿綱目釋名春魚俗名作腊名鵝毛脡時珍曰爾雅云鱊鯞小魚也名義未詳春以時名也脡以乾腊故名集解時珍曰按段公路北户録云廣之恩州出鵝毛脡用鹽藏之其細如毛其味絶美郭義恭所謂武陽小魚大如針一觔千頭蜀人以為醬者也又一統志云廣東陽江縣出之即鱊魚兒也然今興國州諸處亦有之彼人呼為春魚云春月自巖穴中隨水流出狀似初化魚苗土人取收曝乾為脡以充苞苴食以薑醋味同蝦末或云即鱧魚苗也氣味甘平無毒主治和中益氣令人喜悦時珍金魚綱目集解時珍曰金魚有鯉鯽鰍䱗數種鰍䱗尤難得獨金鯽耐久前古罕知惟博物志云出優婆塞江腦中有金葢亦訛傳述異記載晉桓冲遊廬山見湖中有赤鱗魚即此也自宋始有畜者今則處處人家養玩矣春末生子於草上好自吞㗖亦易化生初出黒色久乃變紅又或變白者名銀魚亦有紅白黒斑相間無常者其肉味短而靭物類相感志云金魚食橄欖渣肥皂水即死得白楊皮不生蝨又有丹魚不審即此類否今附於下附録丹魚按抱朴子云丹水出京兆上洛縣冢嶺山八千汋水中出丹魚先夏至上夜伺之魚浮水側必有赤光上照若火割血塗足可以履冰肉氣味甘鹹平無毒主治久痢時珍附方新一久痢禁口病勢欲死用金絲鯉魚一尾重一二觔者如常治淨用鹽醬葱必入胡椒末三四錢煮熟置病人前噢之欲喫隨意連湯食一飽病即除根屢治有效揚拱醫方摘要鱗之四無鱗魚二十八種附録九種鱧魚本經上品釋名蠡魚本經黑鱧圖經𤣥鱧埤雅烏鱧綱目鮦魚音同本經文魚時珍曰鱧首有七星夜朝北斗有自然之禮故謂之鱧又與蛇通氣色黒北方之魚也故有𤣥黒諸名俗呼火柴頭魚即此也其小者名鮦魚蘇頌圖經引毛詩諸註謂鱧即鯇魚者誤矣今直削去不煩辯正集解别録曰生九江池澤取無時𢎞景曰處處有之言是公蠣蛇所化然亦有相生者性至難死猶有蛇性也時珍曰形長體圓頭尾相等細鱗𤣥色有斑㸃花文頗類蝮蛇有舌有齒有肚背腹有鬛連尾尾無岐形狀可憎氣息鮏惡食品所卑南人有珍之者北人尤絶之道家指為水厭齋籙所忌肉氣味甘寒無毒有瘡者不可食令人瘢白别録源曰有小毒無益不宜食之宗奭曰能發痼疾療病亦取其一端耳主治療五痔治濕痺面目浮腫下大水本經𢎞景曰合小豆白煑療腫滿甚效下大小便壅塞氣作鱠與脚氣風氣人食良孟詵主妊娠有水氣蘇頌附方舊三新二十種水氣垂死鱧魚一觔重者煮汁和冬𤓰葱白作羮食心鏡下一切氣詵曰用大鱧一頭開肚入胡椒末半兩大蒜片三顆縫合同小豆一升煮熟下蘿蔔三五顆葱一握俱切碎煮熟空腹食之至飽并飲汁至夜洩惡氣無限也五日更一作腸痔下血鱧魚作鱠以蒜虀食之忌冷毒物外臺一切風瘡頑癬疥癩年久不愈者不過二三服必愈用黒火柴頭魚一箇即烏鱧也去腸肚以蒼耳葉填滿外以蒼耳安鍋底置魚于上少少著水慢火煨熟去皮骨淡食勿入鹽醬功效甚大醫林集要浴兒免痘除夕黄昏時用大烏魚一尾小者二三尾煮湯浴兒遍身七竅俱到不可嫌鯹以清水洗去也若不信但留一手或一足不洗遇出痘時則未洗處偏多也此乃異人所傳不可輕易揚拱醫方摘要腸及肝主治冷敗瘡中生蟲别録腸以五味炙香貼痔瘻及蛀骭瘡引蟲盡為度日華膽氣味甘平日華曰諸魚膽苦惟此膽甘可食為異也臘月收取陰乾主治喉痺將死者㸃入少許即差病深者水調灌之靈苑方鰻鱺魚别録中品釋名白鱓綱目蛇魚綱目乾者名風鰻時珍曰鰻鱺舊注音漫黎按許慎説文鱺與鱧同趙辟公雜録亦云此魚有雄無雌以影漫於鱧魚則其子皆附于鱧鬐而生故謂之鰻鱺與許説合當以鱧音為正曰蛇曰鱓象形也集解頌曰所在有之似鱓而腹大青黄色云是蛟蜃之屬善攻江岸人酷畏之詵曰歙州溪潭中出一種背有五色文者頭似腹蛇入藥最勝江河中難得五色者時珍曰鰻鱺其狀如蛇背有肉鬛連尾無鱗有舌腹白大者長數尺脂膏最多背有黄脉者名金絲鰻鱺此魚善穿深穴非若蛟蜃之攻岸也或云鮎亦産鰻或云鰻與蛇通正誤𢎞景曰鰻鱺能縁樹食藤花恭曰鯢魚能上樹鰻無足安能上樹耶謬説也肉氣味甘平有毒思邈曰大溫士良曰寒斑宗奭曰動風呉瑞曰腹下有黒者毒甚與銀杏同食患軟風璣曰小者可食重四五觔及水行昻頭者不可食嘗見舟人食之七口皆死時珍曰按夷堅續志云四目者殺人背有白㸃無鰓者不可食妊娠食之令胎有疾主治五痔瘡瘻殺諸蟲詵曰痔瘻薰之蟲即死殺諸蟲燒炙為末空腹食三五度即瘥治惡瘡女人陰瘡蟲痒治傳尸疰氣勞損暖腰膝起陽日華療濕脚氣腰腎間濕風痺常如水洗以五味煮食甚補益患諸瘡瘻癧腸風人宜常食之孟詵治小兒疳勞及蟲心痛時珍婦人帶下療一切風瘙如蟲行又壓諸草石藥毒不能為害張鼎發明頌曰魚雖有毒以五味煮羮能補虚損及久病勞瘵時珍曰鰻鱺所主諸病其功專在殺蟲去風耳與蛇同類故主治近之稽神録云有人病瘵相傳死者數人取病者置棺中棄於江以絶害流至金山漁人引起開視乃一女子猶活取置漁舍每以鰻鱺食之遂愈因為漁人之妻張鼎云燒烟熏蚊令化為水熏氊及屋舍竹木斷蛀蟲置骨於衣箱斷諸蠧觀此則别録所謂能殺諸蟲之説益可證矣附方舊三諸蟲心痛多吐清水鰻鱺淡煮飽食三五度即瘥外臺骨蒸勞痩用鰻鱺二觔治淨酒二盞煑熟入鹽醋食之聖恵腸風下蟲同上膏主治諸瘻瘡陶𢎞景耳中蟲痛蘇恭曝乾㣲炙取油塗白駁風即時色轉五七度便瘥宗奭頭集驗方云白駁生面上浸淫漸長似癬者刮令燥痛炙熟脂搽之不過三度即瘥骨及頭主治炙研入藥治疳痢腸風崩帶燒灰敷惡瘡燒熏痔瘻殺諸蟲時珍附方舊一一切惡瘡用蛇魚骨炙為末入諸色膏藥中貼之外以紙䕶之經驗血主治瘡疹入眼生瞖以少許㸃之時珍海鰻鱺日華釋名慈鰻鱺日華狗魚日華集解日華曰生東海中類鰻鱺而大功用相同氣味主治同鰻鱺治皮膚惡瘡疥疳䘌痔瘻日華按時珍曰李九華云狗魚暖而不補即此鱓善魚别録上品釋名黄䱇音旦宗奭曰鱓腹黄故世稱黄鱓時珍曰異苑作黄䱇云黄疸之名取乎此也藏器言當作鱣魚誤矣鱣字平聲黄魚也集解韓保昇曰鱓魚生水岸泥窟中似鰻鱺而細長亦似蛇而無鱗有青黄二色時珍曰黄質黒章體多涎沫大者長二三尺夏出冬蟄一種蛇變者名蛇鱓有毒害人南人鬻鱓肆中以缸貯水畜數百頭夜以燈照之其蛇化者必項下有白㸃通身浮水上即棄之或以蒜瓣投於缸中則羣鱓跳擲不已亦物性相制也藏器曰作臛當重煑之不可用桑柴亦蛇類也𢎞景曰鱓是荇芩根所化又云死人髪所化今其腹中自有子不必盡是變化也肉氣味甘大溫無毒思邈曰黑者有毒𢎞景曰性熱能補時行病後食之多復宗奭曰動風氣多食令人霍亂曾見一郎官食此吐利幾死也時珍曰按延夀書云多食發諸瘡亦損人夀大者有毒殺人不可合犬肉犬血食之主治補中益血療瀋唇别録補虚損婦人産後惡露淋瀝血氣不調羸痩止血除腹中冷氣腸鳴及濕痺氣藏器善補氣婦人産後宜食震亨補五臟逐十二風邪患濕風惡氣人作臛空腹飽食暖卧取汗出如膠従腰脚中出候汗乾暖五枝湯浴之避風三五日一作甚妙孟詵專貼一切冷漏痔瘻臁瘡引蟲時珍附方新二臁瘡蛀爛用黄鱓魚數條打死香油抹腹蟠瘡上繫定頃則痛不可忍然後取下㸔腹有針眼皆蟲也未盡更作後以人脛骨灰油調搽之竒效肉痔出血鱓魚煮食其性凉也療便民食血尾上取之主治塗癬及瘻藏器療口眼喎斜同麝香少許左喎塗右右喎塗左正即洗去治耳痛滴數㸃入耳治鼻衂滴數㸃入鼻治疹後生翳㸃少許入目治赤疵同蒜汁墨汁頻塗之又塗赤遊風時珍發明時珍曰鱓善穿穴無足而竄與蛇同性故能走經脉療十二風邪及口喎耳目諸竅之病風中血脉則口眼喎斜用血主之従其類也頭五月五日收氣味甘平無毒主治燒服止痢主消渴去冷氣除痞癥食不消别録同蛇頭地龍頭燒灰酒服治小腸癰有效集成百蟲入耳燒研綿裹塞之立出時珍皮主治婦人乳核硬疼燒灰空心溫酒服聖恵鰌魚音酋綱目釋名泥鰍俗名鰼魚爾雅動時珍曰按陸佃云鰌性酋健好善優故名小者名鰌魚孫炎云鰼者尋習其泥也集解時珍曰海鰌生海中極大江鰌生江中長七八寸泥鰌生湖池最小長三四寸沈於泥中狀㣲似鱓而小鋭首肉身青黒色無鱗以涎自染滑疾難握與他魚牝牡故莊子云鰌與魚游生沙中者㣲有文采閩廣人劙去瘠骨作臛食甚美相感志云燈心煮鰌甚妙氣味甘平無毒𢎞景曰不可合白犬血食一云凉主治暖中益氣醒酒解消渴時珍同米粉煮羮食調中收痔吳球附方新五消渴飲水同泥鰌魚十頭陰乾去頭尾燒炭乾荷葉等分為末每服二錢新汲水調下日三名沃焦散普濟方喉中物哽用生鰍魚線縳其頭以尾先入喉中牽拽出之濟普方揩牙烏髭泥鰍魚槐蕋狼把草各一兩雄燕子一箇酸石榴皮半兩搗成團入瓦罐内鹽泥固濟先文後武燒炭十觔取研日用一月以來白者皆黒普濟陽事不起泥鰍煮食之方集簡牛狗羸痩取鰌魚一二枚従口鼻送入立肥也陳藏器鱣魚音邅拾遺校正時珍曰食療黄魚係重出今併為一釋名黄魚食療蠟魚御覽玉版魚時珍曰鱣肥而不善游有邅如之象曰黄白蠟言其脂色也玉版言其肉色也異物志名含光言光脂肉夜有光也飲膳正要云遼人名阿八兒忽魚集解藏器曰鱣長二三丈純灰色體有三行甲逆上龍門能化為龍也時珍曰鱣出江淮黄河遼海深水處無鱗大魚也其狀似鱘其色灰白其背有骨甲三行其鼻長有鬚其口近頷下其尾岐其出也以三月逆水而生其居也在磯石湍流之間其食也張口接物聴其自入食而不飲蟹魚多誤入之昔人所謂鱣鮪岫居世俗所謂鱘鱑魚喫自來食是以其行也在水底去地數寸漁人以小釣近于沈而取之一釣着身動而䕶痛諸釣皆着船遊數日待其困憊方敢掣取其小者近百觔其大者長二三丈至一二千觔其氣甚鯹其脂與肉層層相間肉色白脂色黄如蠟其脊骨及鼻并鬐與鰓皆脆軟可食其肚及子鹽藏亦佳其鰾亦可作膠其肉骨煮炙及作鮓皆美翰墨大全云江淮人以鱘鱑魚作鮓名片醬亦名玉版鮓也肉氣味甘平有小毒詵曰發氣動風發瘡疥和蕎麥食令人失音寗源曰味極肥美楚人尤重之多食生熱痰作鮓竒絶亦不益人時珍曰服荆芥藥不可食主治利五臟肥美人多食難尅化時珍肝氣味無毒主治惡血疥癬勿以鹽炙食藏器鱘魚拾遺釋名鱏魚尋淫二音鮪魚音洧王鮪爾雅碧魚時珍曰此魚延長故従尋従覃皆延長之義月令云季春天子薦鮪於寢廟故有王鮪之稱郭璞云大者名王鮪小者名叔鮪更小者名鮥子音洛李竒漢書注云周洛曰鮪蜀曰䱴䲛音亘懵毛詩疏義云遼東登萊人名尉魚言樂浪尉仲明溺海死化為此魚葢尉亦鮪字之訛耳飲膳正要云今遼人名乞里麻魚集解藏器曰鱘生江中背如龍長一二丈時珍曰出江淮黄河遼海深水處亦鱣屬也岫居長者丈餘至春始出而浮陽見日則目眩其狀如鱣而背上無甲其色青碧腹下色白其鼻長與身等口在頷下食而不飲煩下有青斑紋如梅花狀尾岐如丙肉色純白味亞於鱣鬐骨不脆羅願云鱘狀如鬵鼎上大下小大頭哆口似銕兠鍪其鰾亦可作膠如鱘鮧也亦能化龍肉氣味甘平無毒詵曰有毒味雖美而發諸藥毒動風氣發一切瘡疥久食令人心痛腰痛服丹石人忌之勿與乾筍同食發癱瘓風小兒食之成咳𠻳及癥瘕作鮓雖珍亦不益人主治補虛益氣令人肥健藏器煑汁飲治血淋孟詵鼻肉作脯名鹿頭亦名鹿肉言美也主治補虚下氣藏器子狀如小豆主治食之肥美殺腹内小蟲藏器牛魚拾遺集解藏器曰生東海其頭似牛時珍曰按一統志云牛魚出女直混同江大者長丈餘重三百觔無鱗骨其肉脂相間食之味長又異物志云南海有牛魚一名引魚重三四百觔狀如鱧無鱗骨背有斑文腹下青色知海潮肉味頗長觀二説則此亦鱏屬也鱏引聲亦相近肉無毒主治六畜疫疾作乾脯為末以水和灌鼻即出黄涕亦可置病牛處令氣相熏藏器鮠魚音桅拾遺釋名鮰魚音回鱯魚化獲二音􅫛魚化上聲䲚魚癩人時珍曰北呼鱯南人呼鮠並與鮰音相近邇來通稱鮰魚而鱯鮠之名不彰矣􅫛又鱯音之轉也秦人謂其發癩呼為䲚魚餘見鮎魚集解時珍曰鮠生江淮間無鱗魚亦鱘屬也頭尾身鬐俱似鱘狀惟鼻短爾口亦在頷下骨不柔脆腹似鮎魚背有肉鬐郭璞云鱯魚似鮎而大白色者是矣正誤藏器曰鮠生海中大如石首不腥作鱠如雪隋朝吳都進鮠魚鱠取快日暴乾瓶盛臨時以布裹水浸用與初鱠無異時珍曰藏器所説出杜寳拾遺録其説云隋大業六年吳郡獻海鮸乾鱠其法五六月取大鮸四五尺者鱗細而紫無細骨不腥取肉切晒極乾以新瓶盛之泥封固用時以布裹水浸少頃去水則皎白如新也珍按此乃海鮸即石首之大者有鱗不腥若江河鮠魚則無鱗極腥矣陳氏葢因鮸鮠二字相類不加攷䆒遂致謬誤耳今正之肉氣味甘平無毒頌曰能動痼疾不可合野猪野雞肉食令人生癩主治開胃下膀胱水藏器鮧魚音夷品别録上釋名鯷魚音題􅀈魚音偃鮎魚時珍曰魚額平夷低偃其涎粘滑鮧夷也􅀈偃也鮎粘也古曰􅀈今曰鮎北人曰􅀈南人曰鮎集解𢎞景曰鯷即鮎也又有鱯似鯷而大鮠似鯷而色黄人魚似鮎而有四足保昇曰口腹俱大者名鱯背青口小者名鮎口小背黄腹白者名鮠時珍曰二説俱欠詳覈鮎乃無鱗之魚大首􅀈額大口大腹鮠身體尾有齒有胃有鬚生流水者色青白生止水者色青黄大者亦至三四十觔俱是大口大腹並無口小者鱯即今之鮰魚似鮎而口在頷下尾有岐南人方音轉為鮠也今釐正之凡食鮎鮠先割翅下懸之則涎自流盡不粘滑也肉氣味甘溫無毒詵曰無鱗有毒勿多食頌曰寒而有毒非佳品也赤目赤鬚無腮者並殺人不可合牛肝食令人患風噎涎不可合野猪肉食令人吐瀉𢎞景曰不可合鹿肉食令人筋甲縮時珍曰反荆芥主治百病别録作臛補人𢎞景療水腫利小便蘇恭治口眼喎斜活鮎切尾尖朝吻貼之即正又五痔下血肛痛同葱煮食之時珍附方新一身面白駮鮎魚半觔一頭去腸以粳飯鹽椒如常作鮓以荷葉作三包繫之更以荷葉重包令臭爛先以布栻赤乃炙鮮包乘熱熨令汗出以綿衣包之勿令見風以瘥為度總録涎主治三消渴疾和黄連末為丸烏梅湯每服五七丸日三服效蘇頌目主治刺傷中水作痛燒灰塗之思邈肝主治骨鯁時珍附方新一骨鯁在喉栗子肉上皮半兩研末乳香鮎魚肝各一分同搗丸梧子大以綿裹一丸吞下釣出總録䱱魚音啼綱目校正時珍曰舊注見魚今分出釋名人魚𢎞景孩兒魚時珍曰䱱聲如孩兒故有諸名作鯷鮧者並非集解𢎞景曰人魚荆州臨沮青溪多有之似鯷而有四足聲如小兒其膏然之不消耗秦始皇􅌐山塚中所用人膏是也宗奭曰䱱魚形㣲似獺四足腹重墜如囊身㣲紫色無鱗與鮎鮠相類甞剖視之中有小蟹小魚小石數枚也時珍曰孩兒魚有二種生江湖中形色皆如鮎鮠腹下翅形似足其顋頰軋軋音如兒啼即䱱魚也一種生溪澗中形聲皆同但能上樹乃鯢魚也北山經云决水多人魚狀如鯷四足音如小兒食之無瘕疾又云休水北注於洛中多䱱魚狀如蟄蜼而長距足白而對食之無蠱疾可以禦兵按此二説前與陶合後與冦合葢一物也今漁人網得以為不利即驚異而棄之葢不知其可食如此也下徐鉉稽神録云謝仲玉者見婦人出沒水中腰已皆魚乃人魚也又徂異記云查道奉使高麗見海沙中一婦人肘後有紅鬛問之曰人魚也此二者乃名同物異非䱱鯢也氣味甘有毒主治食之療瘕疾𢎞景無蠱疾時珍鯢魚音倪拾遺釋名人魚山海經魶魚音納鰨魚音塔大者名鰕音霞時珍曰鯢聲如小兒故名即䱱魚之能上樹者俗云鮎魚上竿乃此也與海中鯨同名異物蜀人名魶秦人名鰨爾雅云大者曰鰕異物志云有魚之形以足行如鰕故名鰕陳藏器以此為鱯魚欠攷矣又云一名王鮪誤矣王鮪乃鱘魚也集解藏器曰鯢生山溪中似鮎有四足長尾能上樹大旱則含水上山以草葉覆身張口鳥來飲水因吸食之聲如小兒啼時珍按郭璞云鯢魚似鮎四足前脚似猴後脚似狗聲如兒啼大者長八九尺山海經云決水有人魚狀如䱱食之已疫疾蜀志云雅州西山峽谷出魶魚似鮎有足能緣木聲如嬰兒可食酉陽雜爼云峽中人食鯢魚縳樹上鞭至白汁出如構汁方可治食不爾有毒也氣味甘有毒主治食之已疫疾山海經黄顙魚食療釋名黄鱨魚古名黄頰魚詩註䱀䰲央軋黄䰲時珍曰顙頰以形鱨以味䱀軋以聲也今人析而呼為黄䱀黄軋陸璣作黄楊謬矣集解時珍曰黄顙無鱗魚也身尾俱似小鮎腹下黄背上青黄腮下有二横骨兩鬚有胃羣游作聲如軋軋性最難死陸璣云魚身無頭頰骨正黄魚之有力能飛躍者陸佃云其膽春夏近上秋冬近下亦一異也氣味甘平㣲毒詵曰無鱗之魚不益人發瘡疥時珍曰反荆芥害人主治肉至能醒酒𢎞景袪風吳瑞煑食消水腫利小便燒灰治瘰癧久潰不收斂及諸惡瘡時珍附方新三水氣浮腫用黄顙三尾緑豆一合大蒜三瓣水煑爛去魚食豆以汁調啇陸末一錢服其水化為清氣而消詩云一頭黄顙八鬚魚緑豆同煎一合餘白煑作羮成頓服𬋩教水腫自消除要集瘰癧潰壞用黄䰲魚破開入箆麻子二十粒拈定安厠坑中冬三日春後一日夏半日取出洗淨黄泥固濟煆存性研香油調傅臁瘡浸淫方同上並普濟涎翅下取之主治消渴吳瑞附方新一生津丸治消渴飲水無度以黄顙魚涎和青蛤粉滑石末等分丸梧子大每粟未湯下三十丸頰骨主治喉痺腫痛燒研茶服三錢時珍普並出濟河豚宋開寶校正併入食療鯸鮧拾遺䲅魚釋名鯸鮧一作鯸鮐鰗鮧日華䲅魚一作鮭嗔魚拾遺吹肚魚俗氣包魚時珍曰豚言其味美也侯夷狀其形醜也鯢謂其體圓也吹肚氣包象其嗔脹也北山經名䰽魚音沛集解志曰河豚江淮河海皆有之藏器曰腹白背有赤道如印目能開闔觸物即嗔怒腹脹如氣毬浮起故人以物撩而取之時珍曰今吳越最多狀如蝌斗大者尺餘背色青白有黄縷又無鱗無腮無膽腹下白而不光率以三頭相従為一部彼人春月甚珍貴之尤重其腹腴呼為西施乳嚴有翼藝苑雌黄云河豚水族之竒味世傳其殺人余守丹陽宣城見土人户户食之但用菘菜蔞蒿荻芽三物煮之亦未見死者南人言魚之無鱗無腮無膽有聲目能􅀈者皆有毒河豚備此數者故人畏之然有二種其色炎黑有文㸃者名斑魚毒最甚或云三月後則為斑魚不可食也又按雷公炮炙論云鮭魚挿樹立便乾枯狗膽塗之復當榮盛陶覽云河豚魚雖小而獺及大魚不敢啖之則不惟毒人又能毒物也王充論衡云萬物含太陽火氣而生者皆有毒在魚則鮭與􅯚䱙故鮭肝死人􅯚䱙螫人氣味甘溫有毒宗奭曰河豚有大毒而云無毒何也味雖珍美修治失法食之殺人厚生者宜逺之藏器曰海中者大毒江中者次之煮之不可近鍋當以物縣之時珍曰煮忌煤炲落中與荆芥菊花桔梗甘草附子烏頭相反宜荻笋蔞蒿秃菜畏橄欖甘蔗蘆根糞汁按陶九成輟耕録凡食河豚一日内不可服湯藥恐犯荆芥二物大相反亦惡烏頭附子之屬余在江陰親見一儒者因此䘮命河豚子必不可食曾以水浸之一夜大如芡實也世傳中其毒者以至寶丹或橄欖及龍腦浸水皆可解復得一方惟以槐花㣲炒與乾臙脂等分同擣粉水調灌之大妙又案物類相感志言凡煑河豚用荆芥同煮五七沸換水則無毒二説似相反得非河豚之毒入于荆芥耶寧従陶説庶不致悔也主治補虛去濕氣理腰脚去痔疾殺蟲開寶伏硇砂土宿本草肝及子氣味有大毒藏器曰入口爛舌入腹爛腸無藥可解惟橄欖木魚茗木蘆根烏蓲草根煮汁可解時珍曰吳人言其血有毒脂令舌麻子令腹脹眼令目花有油麻子脹眼睛花之語而江陰人鹽其子糟其白埋過治食此俚言所謂捨命喫河豚者耶主治疥癬蟲瘡用子同蜈蚣燒研香油調搽之時珍海豚魚釋名海豨文選生江中者名江豚拾遺江猪綱目水猪異物志鱀魚音志饞魚音讒䱐䰽音敷沛名時珍曰海豚江豚皆因形命郭璞賦海豨江豚是也魏武食制謂之䱐沛南方異物志謂之水猪又名饞魚謂其多涎也集解藏器曰海豚生海中候風潮出沒形如豚鼻在腦上作聲噴水直上百數為羣其子如蠡魚子數萬隨母而行人取子繫水中其母自來就而取之江豚生江中狀如海豚而小出沒水上舟人候之占風其中有曲脂㸃燈照樗蒱即明照讀書工作即暗俗言懶婦所化也時珍曰其狀大如數百觔猪形色青黒如鮎魚有兩乳有雌雄類人數枚同行一浮一沒謂之拜風其骨硬其肉肥不中食其膏最多和石灰艌船良肉氣味鹹腥味如水牛肉無毒主治飛尸蠱毒瘴瘧作脯食之藏器肪主治摩惡瘡疥癬痔瘻犬馬瘑疥殺蟲藏器比目魚食療釋名鰈音蝶鞋底魚時珍曰比並也魚各一目相並而行也爾雅所謂東方有比目魚不比不行其名曰鰈是也段氏北户録謂之鰜音兼吳都賦謂之魪音介上林賦謂之魼音墟鰈猶屧也鰜兼也魪相介也魼相胠也俗名鞋底魚臨海志名婢蓰魚臨海風土記名奴屩魚南越志名版魚南方異物志名箬葉魚皆因形也集解時珍曰按郭璞云所在水中有之狀如牛脾及女人鞋底細鱗紫白色兩片相合乃得行其合處半邊平而無鱗口近腹下劉淵林以為王餘魚葢不然氣味甘平無毒主治補虛益氣力多食動氣孟詵鮹魚音梢拾遺集解藏器曰出江湖形似馬鞭尾有兩岐如鞭鞘故名氣味甘平無毒主治五痔下血瘀血在腹藏器鮫魚唐本草釋名沙魚拾遺䱜魚鵲錯二音鰒魚音剥溜魚時珍曰鮫波有沙其文交錯鵲駮故有諸名古曰鮫今曰沙其實一也或曰本名訛為鮫段成式曰其力健强稱為河伯健兒藏器曰鮫與石決明同名而異類也集解恭曰鮫出南海形似鼈無脚有尾保昇曰圓廣尺餘尾亦長尺許背皮粗錯頌曰有二種皆不類鼈南人通謂之沙魚大而長喙如鋸者曰胡沙性善而肉美小而皮粗者曰白沙肉彊而有小毒彼人皆鹽作修脯其皮刮治去沙剪作鱠為食品美味食益人其皮可飾刀靶宗奭曰鮫魚沙魚形稍異而皮一等時珍曰古曰鮫今曰沙是一類而有數種也東南近海諸郡皆有之形並似魚青目赤頰背上有鬛腹下有翅味並肥美南人珍之大者尾長數尺能傷人皮皆有沙如真珠斑其背有珠文如鹿而堅彊者曰鹿沙亦曰白沙云能變鹿也背有斑文如虎而堅彊者曰虎沙亦曰胡沙云虎魚所化也鼻前有骨如斧斤能擊物壞舟者曰鋸沙又曰挺額魚亦曰鱕䱜謂鼻骨如鐇斧也音蕃沈懷逺南越志云環雷魚䱜魚也長丈許腹有兩洞腹貯水養子一腹容二子子朝従口中出暮還入腹鱗皮有珠可飾刀劒治骨角藏器曰其魚狀貌非一皆皮上有沙堪揩木如木賊也小者子隨母行驚即従口入母腹中肉氣味甘平無毒主治作鱠補五臟功亞于鯽亦可作鱐鮓詵甚益人頌皮氣味甘鹹平無毒主治心氣鬼疰蠱毒吐血别録蠱氣蠱疰恭燒灰水服主食魚中毒藏器燒研水服解鯸鮧魚毒治食魚鱠成積不消時珍附方舊一新一治疰鮫魚皮散頌曰胡洽治五尸鬼疰百毒惡氣鮫魚皮炙硃砂雄黄金牙蜀椒細辛鬼臼乾薑莽草天雄麝香雞舌香各一兩貝母半兩蜈蚣蜥蜴各炙二枚為末毎服半錢温酒服日二亦可佩之時珍曰千金鮫魚皮散治鬼疰用鮫魚皮炙龍角鹿角犀角麝香蜈蚣雄黄硃砂乾薑蜀椒蘘荷根等分為末酒服方寸匕日三服亦可佩膽臘月收之主治喉痺和白礬灰為丸綿裹納喉中吐去惡涎即愈詵烏賊魚本經中品釋名烏鰂素問墨魚綱目纜魚日華乾者名鮝日華骨名海螵蛸頌曰陶隠居言此是􅖂鳥所化今其口腹具存猶頗相似腹中有墨可用故名烏鰂能吸波噀墨令水溷黑自衛以防人害又南越志云其性嗜烏毎自浮水上飛鳥見之以為死而啄之乃卷取入水而食之因名烏賊言為烏之賊害也時珍曰案羅源爾雅翼云九月寒烏入水化為此魚有文墨可為法則故名烏鰂鰂者則也骨名螵蛸象形也大明曰魚有兩須遇風波即以鬚下矴或粘石如纜故名纜魚瑞曰鹽乾者名明鮝淡乾者名脯鮝集解别録曰烏賊魚生東海池澤取無時頌曰近海州郡皆有之形若革囊口在腹下八足聚生于口旁其背上只有一骨厚三四分狀如小舟形輕虚而白又有兩鬚如帶甚長腹中血及膽正如墨可以書字但逾年則迹滅惟存空紙爾世言烏賊懷墨而知禮故俗謂是海若白事小吏也時珍曰烏鰂無鱗有鬚黒皮白肉大者如蒲扇􅨘熟以薑醋食之脆美背骨名海螵蛸形似樗蒲子而長兩頭尖色白脆如通草重重有紋以指甲可刮為末人亦鏤之為鈿飾又相感志云烏鰂過小滿則形小也藏器曰海人云是秦王東游棄算袋於海化為此魚故形猶似之墨尚在腹也禹錫曰陶𢎞景及蜀本圖經皆言是􅖂鳥所化􅖂乃水鳥似鶂短項腹翅紫白背上緑色唐蘇恭乃言無􅖂鳥誤矣附録柔魚頌曰一種柔魚與烏賊相似但無骨爾越人重之肉氣味酸平無毒瑞曰味珍美動風氣主治益氣强志别録益人通月經大明骨一名海螵蛸修治𢎞景曰炙黄用斆曰凡使勿用沙魚骨其形真似但以上文順者是真横者是假以血滷作水浸并煮一伏時漉出掘一坑燒紅入魚骨在内經宿取出入藥其效加倍也氣味鹹㣲溫無毒普曰冷權曰有小毒之才曰惡白及白斂附子能淡鹽伏硇縮銀主治女子赤白漏下經汁血閉陰蝕腫痛寒熱癥瘕無子本經驚氣入腹腹痛環臍丈夫陰中腫痛令人有子又止瘡多膿汁不燥别録療血崩殺蟲日華炙研飲服治婦人血瘕大人小兒下痢殺小蟲藏器又曰投骨于井水蟲皆死治眼中熱淚及一切浮翳研末和蜜㸃之久服益精孟詵恭曰亦治牛馬障翳主女子血枯病傷肝唾血下血治瘧消癭研末傅小兒疳瘡痘瘡臭爛丈夫陰瘡湯火傷跌傷出血燒存性酒服治婦人水戸嫁痛同雞子黄塗小兒重舌鵝口同蒲黄末傅舌腫血出如泉同槐花末吹鼻止衂血同銀硃吹鼻治喉痺同白礬末吹鼻治蝎螫疼痛同麝香吹耳治聤耳有膿及耳聾時珍發明時珍曰烏鰂骨厥陰血分藥也其味鹹而走血也故血枯血瘕經閉崩帶下痢疳疾厥陰本病也寒熱瘧疾聾癭少腹痛陰痛厥陰經病也目翳流淚厥陰竅病也厥陰屬肝肝主血故諸血病皆治之按素問云有病胸脇支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名曰血枯得之年少時有所大脱血或醉入房中氣竭肝傷故月事衰少不來治之以四烏鰂骨一蘆茹為末丸以雀卵大如小豆毎服五丸飲以鮑魚汁所以利腸中及傷肝也觀此則其入厥陰血分無疑矣正誤鼎曰久服絶嗣無子時珍曰按本經云主癥瘕無子别録云令人有子孟詵亦云久服益精而張鼎此説獨相背戾必誤矣若云血病無多食鹹烏鰂亦主血閉故有此説然經閉有有餘不足二證有餘者血滯不足者肝傷烏鰂所主者肝傷血閉不足之病正與素問相合豈有令人絶嗣之理當以本經别録為正恐人承誤故辨正之附方舊三新二十女子血枯見上赤白目翳聖恵治傷寒熱毒攻眼生赤白翳用烏鰂魚骨一兩去皮為末入龍腦少許㸃之日三治諸目翳用烏鰂骨五靈脂等分為細末熟猪肝切片蘸食日二赤瞖攀睛照水丹治眼瞖惟厚者尤效及赤瞖攀睛貫瞳人用海螵蛸一錢辰砂半錢乳細水飛澄取以黄臘少許化和成劑收之臨卧時火上旋丸黍末大揉入眥中睡至天明溫水洗下未退更用一次即效海上方雀目夜眼烏賊骨半觔為末化黄臘三兩和揑作錢大餅子毎服一餅以猪肝二兩竹刀批開摻藥札定米泔水半碗煮熟食之以汁送下楊氏家藏血風赤眼女人多之用烏賊魚骨二錢銅緑一錢為末毎用一錢熱湯泡洗楊氏家藏疳眼流淚烏賊魚骨牡蠣等分為末糊丸皂子大毎用一丸同猪肝一具米泔煮熟食經驗底耳出膿海螵蛸半錢麝香一字為末以綿杖繳淨吹入耳中澹寮方鼻瘡疳慝烏賊魚骨臼及各一錢輕粉二字為末搽之錢乙小兒方小兒臍瘡出血及膿海螵蛸臙脂為末油調搽之聖恵方頭上生瘡海螵蛸白膠香各二錢輕粉五分為末先以油潤淨乃搽末二三次即愈簡衛生易方癧瘍白駮先以布拭赤用烏賊骨磨三年酢塗之外臺秘要疔瘡惡腫先刺出血以海螵蛸末摻之其疔即出普濟方蝎螫痛楚烏賊骨一錢白礬二分為末㗜鼻在左壁者㗜左鼻在右壁者㗜右鼻衛生寶鑑炙瘡不瘥烏賊骨白礬等分為末日日塗之千金小兒痰齁多年海螵蛸末米飲服一錢葉氏摘𤣥方小便血淋海螵蛸末一錢生地黄汁調服錢又方海螵蛸生地黄赤茯苓等分為末毎服一柏葉車前湯下驗經方大腸下血不拘火人小兒臟毒腸風及内痔下血日久多食易饑先用海螵蛸炙黄去皮研末毎服一錢木賊湯下三日後服猪臟黄連丸直指方卒然吐血烏賊骨末米飲服二錢聖恵骨硬在喉烏賊魚骨陳橘紅焙等分為末寒食麵和餳丸芡子大每用一丸含化嚥汁録聖濟總舌腫出血如泉烏賊骨蒲黄各等分炒為細末每用塗之簡便單方跌破出血烏賊魚骨末傅之直指方陰囊濕痒烏賊骨蒲黄撲之醫宗三法血主治耳聾甄權腹中墨主治血刺心痛醋磨服之藏器炒研醋服亦可章魚綱目釋名章舉韓文􅀢魚音佶臨海志集解頌曰章魚石距二物似烏賊而差大更珍好食品所重不入藥用時珍曰章魚生南海形如烏賊而大八足身上有肉閩粤人多採鮮者薑醋食之味如水母韓退之所謂章舉馬甲柱鬬以怪自呈者也石距亦其類身小而足長入鹽燒食極美氣味甘鹹寒無毒時珍曰按李九華云章魚冷而不泄主治養血益氣時珍海鷂魚拾遺釋名邵陽魚食鑑作少陽荷魚韻作魺鱝魚音忿鯆魮魚音鋪毗蕃蹹魚畨沓石蠣時珍曰海鷂象形少陽荷並言形色也餘義莫詳集解藏器曰生東海形似鷂有肉翅能飛上石頭齒如石版尾有大毒逢物以尾撥而食之其尾刺人甚者至死候人尿處釘之令人陰腫痛拔去乃愈海人被刺毒者以魚麅竹及海獺皮解之又有䑕尾魚地青魚並生南海總有肉翅刺在尾中食肉去刺時珍曰海中頗多江湖亦時有之狀如盤及荷葉大者圍七八尺無足無鱗背青腹白口在腹下目在額上尾長有節螫人甚毒皮色肉味俱同鮎魚肉内皆骨節節聯比脆軟可食吳人腊之魏武食制云蕃蹹魚大者如箕尾長數尺是以嶺表録異云雞子魚嘴形如鷂肉翅無鱗色類鮎魚尾尖而長有風濤即乘風飛於海上此亦海鷂之類也肉氣味甘鹹平無毒時珍曰有小毒主治不益人𢎞景男子白濁膏淋玉莖澀痛寗源齒無毒主治瘴瘧燒黑研末酒服二錢七藏器尾有毒主治齒痛陶𢎞景文鰩魚拾遺釋名飛魚集解藏器曰生海南大者長尺許有翅與尾齊羣飛海上海人候之當有大風吳都賦云文鷂夜飛而觸網是矣時珍曰按西山經云觀水西注于流沙多文鰩魚狀如鯉鳥翼魚身蒼文白首赤喙常以夜飛従西海游于東海其音如鸞雞其味甘食之已狂見則大穰林邑記云飛魚身圓大者丈餘翅如胡蟬出入羣飛游翔翳薈沈則泳于海底又一統志云陜西鄠縣澇水出飛魚狀如鮒食之已痔疾也肉氣味甘酸無毒主治婦人難産燒黑研末酒服一錢臨月帶之令人易産藏器已狂已痔時珍魚虎拾遺釋名土奴魚臨海記集解藏器曰生南海頭如虎背皮如猬有刺着人如蛇咬亦有變為虎者時珍曰按倦游録云海中泡魚大如斗身有刺如猬能化為豪猪此即魚虎也述異記云老則變為鮫魚氣味有毒魚師綱目集解時珍曰陳藏器諸魚注云魚師大者有毒殺人今無識者但唐韻云鰤老魚也山海經云歴㶁之水有師魚食之殺人其即此與海䖳拾遺釋名水母拾遺樗蒲魚拾遺石鏡時珍曰䖳作宅二音南人訛為海折或作蜡鮓者並非劉恂云閩人曰䖳廣人曰水母異苑名石鏡也集解藏器曰䖳生東海狀如血䘓大者如牀小者如斗無眼目腹胃以蝦為目蝦動䖳沈故曰水母目蝦亦猶蛩蛩之與駏驉也煤出以薑醋進之海人以為常味時珍曰水母形渾然凝結其色紅紫無口眼腹下有物如懸絮羣蝦附之咂其涎洙浮汎如飛為潮所擁則蝦去而䖳不得歸人因割取之浸以石灰礬水去其血汁其色遂白其最厚者謂之䖳頭味更勝生熟皆可食茄柴灰和鹽水淹之良氣味鹹溫無毒主治婦人勞損積血帶下小兒風疾丹毒湯火傷藏器療河魚之疾時珍出異苑鰕别録下品釋名時珍曰鰕音霞俗作蝦入湯則紅色如霞也集解時珍曰江湖出者大而色白溪池出者小而色青皆磔鬚鉞鼻背有斷節尾有硬鱗多足而好躍其腸屬腦其子在腹外凡有數種米鰕糠鰕以精粗名也青鰕白鰕以色名也梅鰕以梅雨時有也泥鰕海鰕以出産名也嶺南有天鰕其蟲大如蟻秋社後羣墮水中化為鰕人以作鮓食凡鰕之大者蒸曝去殻謂之鰕米食以薑醋饌品所珍氣味甘溫有小毒詵曰生水田及溝渠者有毒鮓内者尤有毒藏器曰以熱飯盛宻器中作鮓食毒人至死𢎞景曰無鬚及腹下通黒并煮之色白者並不可食小兒及雞狗食之脚屈弱鼎曰動風發瘡疥冷積源曰動風熱有病人勿食主治五野雞病小兒赤白遊腫搗碎傅之孟詵作羮治鼈瘕托痘瘡下乳汁法制壯陽道煮汁吐風痰搗膏傅蟲疽時珍附方新五鼈瘕疼痛類編云陳拱病鼈瘕隠隠見皮内痛不可忍外醫洪氏曰可以鮮鮓作羮食之久久痛止明年又作再如前治而愈遂絶根本補腎興陽用鰕米一觔蛤蚧二枚茴香蜀椒各四兩並以青鹽化酒炙炒以木香粗末一兩和匀乘熱收新缾中宻封毎服一匙空心鹽酒嚼下甚妙宣吐風痰用連殻鰕半觔入葱薑醬煮汁先喫鰕後喫汁𦂳束肚腹以翎探引取吐臁瘡生蟲用小鰕三十尾去頭足殻同糯米飯研爛隔紗貼瘡上别以紗罩之一夜解下掛㸔皆是小赤蟲即以葱椒湯洗淨用舊茶籠内白竹葉隨大小剪貼一日二換待汁出盡逐日煎苦揀根湯洗之以好膏貼之將生肉勿換膏藥忌發物直指方血風臁瘡生鰕黄丹擣和貼之日一換方集簡海鰕拾遺釋名紅鰕藏器鰝浩雅爾集解藏器曰海中紅鰕長一尺鬚可為簪崔豹古今注云遼海間有飛蟲如蜻蛉名繙紺七月羣飛闇天夷人食之云鰕所化也時珍曰按段公路北户録云海中大紅鰕長二尺餘頭可作盃鬚可作簪杖其肉可為鱠甚美又劉恂嶺表録云海鰕皮殻嫩紅色前足有鉗者色如朱最大者長七八尺至一丈也閩中有五色鰕亦長尺餘彼人兩兩乾之謂之對鰕以充上饌氣味甘平有小毒時珍曰同猪肉食令人多唾鮓主治飛尸蚘蟲口中甘􅉶齲齒頭瘡去疥癬風瘙身痒治山蚊子入人肉初食瘡發則愈藏器海馬拾遺釋名水馬𢎞景曰是魚鰕類也狀如馬形故名集解藏器曰海馬出南海形如馬長五六寸鰕類也南州異物志云大小如守宫其色黄褐婦人難産割裂而出者手持此蟲即如羊之易産也宗奭曰其首如馬其身如鰕其背傴僂有竹節紋長二三寸頌曰異魚圖云漁人布網罟此魚多罣網上收取曝乾以雌雄為對時珍曰按聖濟總録云海馬雌者黄色雄者青色又徐表南方異物志云海馬有魚狀如馬頭其喙垂下或黄或黒海人捕得不以啖食曝乾熇之以備産患即此也又抱朴子云水馬合赤斑蜘蛛同馮夷水仙丸服之可居水中今水仙丸無所攷矣氣味甘溫平無毒主治婦人難産帶之於身甚騐臨時燒末飲服并手握之即易産藏器主難産及血氣痛蘇頌暖水臟壯陽道消瘕塊治疔瘡腫毒時珍發明時珍曰海馬雌雄成對其性溫暖有交感之義故難産及陽虚房中方術多用之如蛤蚧郎君子之功也鰕亦壯陽性應同之附方新二海馬湯治逺年虚實積聚癥塊用海馬雌雄各一枚木香一兩大黄炒白牽牛炒各二兩巴豆四十九粒青皮二兩童子小便浸軟包巴豆紥定入小便内再浸七日取出麩炒黄色去豆不用取皮同衆藥為末毎服二錢水一盞煎三五沸臨卧溫服聖濟録海馬拔毒散治疔瘡發背惡瘡有竒效用海馬炙黄一對穿山甲黄土炒硃砂水銀各一錢雄黄三錢龍腦麝香各少許為末入水銀研不見星毎以少許㸃之一日一㸃毒自出也秘傳外科鮑魚别録上品釋名薧魚禮記音考蕭折魚魏武食制乾魚時珍曰鮑即今之乾魚也魚之可包者故字従包禮記謂之薧魏武食制謂之蕭折皆以蕭蒿承曝而成故也其淡壓為腊者曰淡魚曰鱐魚音捜以物穿風乾者曰法魚曰魥魚音怯其以鹽漬成者曰醃魚曰鹹魚曰䱒魚音葉曰􅀈魚音蹇今俗通呼曰乾魚舊注混淆不明今並削正于下集解别録曰鮑魚辛臭勿令中鹹𢎞景曰俗人以鹽䱒成名䱒魚䱒字似鮑也今鮑乃鱅魚淡乾者都無臭氣不知入藥者正何種魚也方家亦少用之恭曰李當之言以繩穿貫而胸中濕者良葢以魚去腸繩穿淡暴使乾則味辛不鹹魚肥則中濕而彌臭似尸氣無鹽故也若􅀈魚則沔州復州作之以鹽䱒成味鹹不辛臭亦與鮑不同濕亦非獨胸中以有鹽故也二者雜魚皆可為之頌曰今漢沔所作淡乾魚味辛而臭者是也或言海中自有一種鮑魚形似小鱅氣最臭秦始皇車中亂臭者是此然無的據時珍曰别録既云勿令中鹹即是淡魚無疑矣諸注反自多事按周禮注云鮑魚以魚置􅟺室中用糗乾之而成􅟺室土室也張耒明道志云漢陽武昌多魚土人剖之不用鹽暴乾作淡魚載至江西賣之饒信人飲食祭享無此則非盛禮雖臭腐可惡而更以為竒據此則鮑即淡魚益可證矣但古今治法不同耳又蘇氏所謂海中一種鮑魚豈顧野王所載海中鮇魚似鮑者耶不然即今之白鮝也鮝亦乾魚之總稱也又今淮人以鯽作淡法魚頗佳入藥亦當以石首鯽魚者為勝若漢沔所造者魚性不一恐非所宜其鹹魚近時亦有用者因附之正誤保昇曰鮧魚口小背黄者名鮑魚時珍按鮧魚注所引是鮠魚非鮑魚也葢鮠鮑字誤耳肉氣味辛臭溫無毒時珍曰李九華云妊婦食之令子多疾主治墜墮骽與腿同蹷厥踠折瘀血血痺在四肢不散者女子崩中血不止别録煑汁治女子血枯病傷肝利腸同麻仁葱䜴煑羮通乳汁時珍附方舊一妊娠感寒腹痛乾魚一枚燒灰酒服方寸匕取汗瘥子母秘録頭主治煑汁治眯目燒灰療疔腫瘟氣時珍附方新三雜物眯目鮑魚頭二枚地膚子半合水煮爛取汁注目中即出聖恵方魚臍疔瘡似新火針瘡四邊赤中夾黑可刺之若不大痛即殺人也用臘月魚頭灰髪灰等分以雞溏屎和塗之千金方預辟瘟疫鮑魚頭燒灰方寸匕合小豆末七枚米飲服之令溫疫氣不相染也肘後方䱒魚氣味鹹溫無毒主治小兒頭瘡出膿水以麻油煎熟取油頻塗時珍穿鮑繩主治眯目去刺煮汁洗之大良蘇恭鱁鮧拾遺釋名鰾匹少切作膠名鰾膠藏器曰鱁鮧音逐題乃魚白也時珍曰鱁鮧音逐夷其音題者鮎魚也按賈思勰齊民要術云漢武逐夷至海上見漁人造魚腸于坑中取而食之遂命此名言因逐夷而得是矣沈括筆談云鱁鮧烏賊魚腸也孫愐唐韻云鹽藏魚腸也南史云齊明帝嗜鱁鮧以蜜漬之一食數升觀此則鰾與腸皆得稱鱁鮧矣今人以鰾煮凍作膏切片以薑醋食之呼為魚膏者是也故宋齊丘化書云鱁鮧與足垢無殊鰾即諸魚之白脬其中空如泡故曰鰾可治為膠亦名縼膠諸鰾皆可為膠而海漁多以石首鰾作之名江鰾謂江魚之鰾也粘物甚固此乃工匠日用之物而記籍多畧之鰾氣味甘平無毒主治竹木入肉經久不出者取白傅瘡上四邊肉爛即出藏器止折傷血出不止時珍燒灰傅陰瘡瘻瘡月蝕瘡李珣附方新一折傷出血但不透膜者以海味中鹹白鰾大片色白有紅絲者成片鋪在傷處以帛縛之即止普濟方鰾膠氣味甘鹹平無毒主治燒存性治婦人難産産後風搐破傷風痙止嘔血散瘀血消腫毒伏硇砂時珍附方新十産難魚膠五寸燒存性為末溫酒服皆效方産後搐搦强直者不可便作風中乃風入子臟與破傷風同用鰾膠一兩以螺粉炒焦去粉為末分三服煎蟬蛻湯下産寶産後血運鰾膠燒存性酒和童子小便調服三五錢良事林廣記經血逆行魚膠切炒新綿燒灰毎服二錢米飲調下即愈多能鄙事破傷風搐口噤强直者危氏香膠散用魚膠燒存性一兩麝香少許為末毎服二錢蘇木並酒調下仍煑一錢封瘡口保命集治破傷風有表證未解者用江鰾半兩炒焦蜈蚣一對炙研為末以防風羌活獨活川芎等分煎湯調服一錢嘔血不止鰾膠長八寸廣二寸炙黄刮二錢以甘蔗節三十五箇取汁調下經驗便毒腫痛已大而軟者直指方用魚鰾膠熱湯或醋煮軟乘熱研爛貼之戴氏治露􅗢即羊核用石首膠一兩燒存性研末酒服外以石菖蒲生研􅝛之妙八般頭風魚鰾燒存性為末臨卧以葱酒腹二錢赤白崩中魚􅀈膠三尺焙黄研末同雞子煎餅好酒食之魚鱠音檜拾遺釋名魚生時珍曰劊切而成故謂之鱠凡諸魚之鮮活者薄切洗淨血鮏沃以蒜虀薑醋五味食之氣味甘溫無毒藏器曰近夜勿食不消成積勿飲冷水生蟲時行病後食之胃弱勿同乳酪食令人霍亂不可同𤓰食時珍曰按食治云凡殺物命既虧仁噯且肉未停冷動性猶存旋烹不熟食猶害人况魚鱠肉生損人尤甚為癥瘕為痼疾為竒病不可不知昔有食魚生而生病者用藥下出已變蟲形繪縷尚存有食鼈肉而成積者用藥下出已成動物而能行皆可驗也主治溫補去冷氣濕痺除胱膀水腹内伏梁氣塊冷痃結癖疝氣喉中氣結心下酸水開胃口利大小腸補腰脚起陽道藏器宜脚氣風氣人治上氣喘咳思邈鯽鱠主久痢腸澼痔疾大人小兒丹毒風眩孟詵發明汪穎曰魚鱠辛辣有刼病之功予在蒼梧見一婦人病吞酸諸藥不效偶食魚鱠其病遂愈葢此意也魚鮓拾遺釋名時珍曰按劉熈釋名云鮓醖也以鹽糝醖釀而成也諸魚皆可為之大者曰鮓小者曰􅀈一云南人曰􅀈北人曰鮓氣味甘鹹平無毒藏器曰凡鮓皆發瘡疥鮓内有髪害人瑞曰鮓不熟者損人脾胃反致疾也時珍曰諸鮓皆不可合生胡荽葵菜豆藿麥醬蜂蜜食令人消渴及霍亂凡諸無鱗魚鮓食之尤不益人主治癬瘡和柳葉搗碎炙熱傅之取酸臭者連糝和屋上塵傅蟲瘡及馬瘑瘡藏器治聤耳痔瘻諸瘡有蟲療白駮代指病主下痢膿血時珍附方新二白駮風以荷葉裹鮓令臭拭熱頻頻擦之取效乃止千金方代指痛先刺去血炙鮓皮裹之魚脂拾遺釋名魚油時珍曰脂㫖也其味甘㫖也氣味甘溫有小毒時珍曰魚脂㸃燈盲人目主治癥疾用和石灰泥船魚脂鯹臭者二觔安銅器内燃火炷令暖隔紙熨癥上晝夜勿息火又塗牛狗疥立愈藏器時珍曰南畨用魚油和石灰艌船亦用江豚油魚魫枕目綱釋名時珍曰諸魚腦骨曰魫曰丁魚尾曰魩音抹曰丙魚腸曰􅀈曰乙魚骨曰鯁曰刺魚脬曰鰾曰白魚翅曰鰭曰鬛魚子曰䱊曰䲑主治能消毒藏器解蠱毒作器盛飲食遇蠱輙裂破也時珍書延夀魚鱗綱目釋名時珍曰鱗者𥻘也魚産于水故鱗似𥻘鳥産于林故羽似葉獸産于山故毛似草魚行上水鳥飛上風恐亂鱗羽也主治食魚中毒煩亂或成癥積燒灰水服二錢時珍諸魚鱗燒灰主魚骨鯁别録魚子綱目釋名䱊音米䲑音蟻集解孟詵曰凡魚生子皆粘在草上及土中冬月寒水過後亦不腐壞到五月三伏日雨中便化為魚時珍曰凡魚皆冬月孕子至春末夏初則於湍水草際生子有牡魚隨之洒白葢其子數日即化出謂之魚苗最易長大孟氏之説葢出謬傳也氣味缺主治目中障翳時珍發明時珍曰魚子古方未見用惟聖濟總録治目决明散中用之亦不言是何魚之子大抵當取青魚鯉鯽之屬爾附方新一决明散治一切逺年障翳弩肉赤腫疼痛用魚子活水中生下者半兩以硫黄水溫溫洗淨石决明草决明青箱子穀精草枸杞子黄連炙甘草枳實麩炒牡蠣粉蛇蜕燒灰白芷龍骨黄蘖各一兩白附子炮白蒺藜炒黄芩炒羌活各半兩虎睛一隻切作七片文武火炙乾毎一料用一片右通為末每服三錢五更時茶服午夜再服赤白翳膜七日減去弩肉赤腫痛不可忍者三五日見效忌猪魚酒麵辛辣色欲凡過惱怒酒色風熱即疼者是活眼尚可醫治如不疼是死眼不必醫也總録本草綱目卷四十四
