body:
  text: 本草綱目卷十六目録草之五隰草類下七十三種地黃本經附胡面莽牛膝本經紫菀本經女菀本經麥門冬本經萱草嘉祐槌胡根拾遺淡竹葉綱目鴨跖草嘉祐菜即作葉冬葵本經蜀葵嘉祐兔葵唐本黃蜀葵嘉祐龍葵唐本龍珠拾遺酸漿本經草即燈籠蜀羊泉本經鹿蹄草綱目敗醬本經菜即苦迎春花綱目款冬花本經鼠麴草日華耳即米麴佛草決明本經地膚本經帚即落瞿麥本經王不留行别録剪春羅綱目金盞草綱目葶藶本經車前本經狗舌草唐本馬鞭草别録牙即龍蛇含夲經女青别録鼠尾草别録狼把草開寶狗尾草綱目鱧腸唐本草即旱蓮連翹本經陸英本經蒴藋别録水英圖經藍本經藍澱綱目青黛開寶附雀翹甘藍拾遺蓼本經水蓼唐本馬蓼綱目葒草别録毛蓼拾遺海根拾遺火炭母草圖經三白草唐本蠶繭草拾遺蛇菵草拾遺虎杖别録蕕草拾遺萹蓄本經藎草本經蒺藜本經穀精草開寶海金沙嘉祐地楊梅拾遺水楊梅綱目地蜈蚣綱目半邉蓮綱目紫花地丁綱目鬼針草拾遺獨用將軍唐本附留軍待見腫消圖經攀倒甑圖經水甘草圖經右附方舊一百七十一新二百九十一本草綱目卷十六目録
