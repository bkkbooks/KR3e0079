body:
  text: 本草綱目卷四十七明李時珍撰禽之一水禽類二十三種附三種鶴宋嘉祐釋名仙禽綱目胎禽時珍曰鶴字篆文象翹首短尾之形一云白色㿥㿥故名八公相鶴經云鶴乃羽族之宗仙人之驥千六百年乃胎産則胎仙之稱以此世謂鶴不卵生者誤矣集解禹錫曰鶴有白玄黃蒼入藥用蒼者他色次之時珍曰鶴大於鵠長三尺髙三尺餘喙長四寸丹頂赤目赤頰青腳修頸凋尾粗膝纎指白羽黑翎亦有灰色蒼色者嘗以夜半鳴聲唳雲霄雄鳴上風雌鳴下風聲交而孕亦啖蛇虺聞降真香則降其糞能化石皆物類相感也按相鶴經云鶴陽鳥也而遊於隂行必依洲渚止不集林木二年落子毛易黑點三年産伏又七年羽翮具又七年飛薄雲漢又七年舞應節又七年鳴中律又七年大毛落氄毛生或白如雪或黑如漆百六十年雌雄相視而孕千六百年形始定飲而不食乃胎化也又按俞琰云龜鶴能運任脈故多壽無死氣於中也鶴骨為笛甚清越白鶴血氣味鹹平無毒主治益氣力補虛乏去風益肺嘉祐發明禹錫曰按穆天下傳云天子至巨搜二氏獻白鶴之血飲之云益人氣力也腦主治和天雄蔥實服之令人目明夜能書字抱朴卵氣味甘鹹平無毒主治預解痘毒多者令少少者令不出每用一枚煮與小兒食之時珍全出活幼書骨主治酥炙入滋補藥時珍肫中砂石子主治磨水服解蠱毒邪嘉祐鸛别録下品釋名皂君詩疏負釡同黑尻時珍曰鸛字篆大象形其背尾色黑故陸璣詩疏有皂君諸名集解𢎞景曰鸛有兩種似鵠而巢樹者為白鸛黑色曲頸者為烏鸛今宜用白者宗奭曰鸛身如鶴但頭無丹項無烏帶兼不善唳止以喙相擊而鳴多在樓殿吻上作窠嘗日夕觀之並無作池養魚之説時珍曰鸛似鶴而頂不丹長頸赤喙色灰白翅尾俱黑多巢于髙木其飛也奮於層霄旋繞如陳仰天號鳴必主有雨其抱卵以影或云以聲䀨之禽經云鸛生三子一為鶴巽極成震影變陽也震為鶴巽為鸛也正誤藏器曰人探巢取鸛子六十里旱能羣飛激散雨也其巢中以泥為池含水滿中養魚蛇以哺子鸛之伏卵恐冷取礜石圍之以助燥氣時珍曰寥郭之大隂陽升降油然作雲沛然下雨區區微鳥豈能以私忿使天壞赤旱耶况鸛乃水鳥可以候雨乎作池取石之説俱出自陸璣詩疏張華博物志可謂愚矣骨氣味甘大寒無毒藏器有小毒入沐湯浴頭令髮盡脫更不生也又殺樹木主治鬼蠱諸疰毒五尸心腹痛别録甄權曰亦可單炙黃研空心暖酒服方寸匕時珍曰千金治尸疰有鸛骨丸腳骨及嘴主治喉痺飛尸蛇虺咬及小兒閃癖大腹痞滿並煮汁服之亦燒灰飲服藏器卵主治預解痘毒水煮一枚與小兒啖之令不出痘或出亦稀時珍全出活幼書屎主治小兒天釣驚風發歇不定炒研半錢入牛黃麝香各半錢炒蠍五枚為末每服半錢新汲水服時珍鶬雞食物釋名鶬鴰爾雅麋鴰爾雅鴰鹿爾雅翼麥雞時珍曰按羅願云鶬麋其色蒼如麋也鴰鹿其聲也關西呼曰鴰鹿山東呼曰鶬鴰訛為錯落南人呼為鶬雞江人呼為麥雞集解頴曰鶬雞狀如鶴大而頂無丹兩頰紅時珍曰鶬水鳥也食于田澤洲渚之間大如鸛青蒼色亦有灰色者長頸髙腳羣飛可以候霜或以為即古之鷫鸘其皮可為裘與鳯同名者也附録鷫鸘時珍曰按羅願爾雅翼云鷫鸘水鳥雁屬也似雁而長頸緑色皮可為裘霜時乃來就暖故禽經云鸘飛則霜􅀈飛則雨􅀈即商羊也又西方之鳯亦名鷫鸘肉氣味甘溫無毒主治殺蟲解蠱毒汪穎發明時珍曰鶬古人多食之故宋玉小招云鵠酸臇惟鳬煎鴻鶬景差大招云炙鴰蒸鳬煔鶉􅞽只今俚人捕食不復充饌品矣陽鳥拾遺釋名陽鴉拾遺集解藏器曰陽鳥出建州似鸛而殊小身黑頸長而白嘴主治燒灰酒服治惡蟲咬成瘡藏器鵚鶖食物釋名扶老古今注鴜䳓俗作鷀䳓時珍曰凡鳥至秋毛脫秃此鳥頭秃如秋毨又如老人頭童及扶杖之狀故得諸名説文作秃􅀈集解時珍曰秃鶖水鳥之大者也出南方有大湖泊處其狀如鶴而大青蒼色張翼廣五六尺舉頭髙六七尺長頸赤目頭項皆無毛其頂皮方二寸許紅色如鶴頂其喙深黃色而扁直長尺餘其嗉下亦有胡袋如鵜鶘狀其足爪如雞黑色性極貪惡能與人鬬好啖魚蛇及鳥雛詩云有鶖在梁即此自元入我朝常賦猶有鴜䳓之供獻案飲膳正要云鴜䳓有三種有白者黑者花者名為胡鴜䳓其肉色亦不同也又案景煥間談云海鳥鵎鶋即今之秃鶖其説與環氏吳紀所謂鳥之大者秃鶖小者鷦鷯相合今潦年鶖或飛來近市人或怪駭此又同魯人怪鶢鶋之意皆由不常見耳肉氣味鹹微寒無毒正要曰甘溫主治中蟲魚毒汪頴補中益氣甚益人炙食尤美作脯􅀈食強氣力令人走及奔馬時珍古出飲膳正要及今注禽經髓氣味甘溫無毒主治補精髓正要喙主治魚骨哽汪穎毛主治解水蟲毒時珍雅出埤鸏􅀈音蒙童綱目釋名越王鳥綱目鶴頂同䴂雕同集解時珍曰案劉欣期交州志云鸏􅀈即越王鳥水鳥也出九真交趾大如孔雀喙長尺餘黃白黑色光瑩如漆南人以為飲器羅山疏云越王鳥狀如烏鳶而足長口勾末如冠可受二升許以為酒器極堅緻不踐地不飲江湖不唼百草不食魚惟啖木葉糞似薰陸香山人得之以為香可入藥用楊慎丹鉛録云鸏􅀈即今鶴頂也糞主治水和塗雜瘡竺真羅山疏鵜鶘宋嘉祐釋名犁鶘鴮􅀈音户澤逃河一作淘淘鵝禹錫曰昔有人竊肉入河化為此鳥今猶有肉因名逃河時珍曰此俚言也案山海經云沙水多犁鶘其名自呼後人轉為鵜鶘耳又吳諺云夏至前來謂之犁鶘言主水也夏至後來謂之犁塗言主旱也陸機云遇水澤即以胡盛水戽涸取魚食故曰鴮􅀈曰淘河俗名淘鵝因形也又訛而為駝鶴集解禹錫曰鵜鶘大如蒼鵝頥下有皮袋容二升物展縮由之袋中盛水以養魚云身是水沫惟胸前有兩塊肉列如拳詩云惟鵜在梁不濡其咮咮喙也言愛其嘴也時珍曰鵜鶘處處有之水鳥也似鶚而甚大灰色如蒼鵝喙長尺餘直而且廣口中正赤頷下胡大如數升囊好羣飛沈水食魚亦能竭小水取魚俚人食其肉取其脂入藥用翅骨䯒骨作筒吹喉鼻藥甚妙其盛水養魚身是水沫之説蓋妄談也魚又案朝以道云鵜之屬有曰漫畫者以嘴畫水求無一息之停有曰信天緣者終日凝立不易其處俟魚過乃取之所謂信天緣者即俗名青翰者也又名青莊此可喻人之貪廉脂油時珍曰剝取其脂熬化掠取就以其嗉盛之則不滲漏他物即透走也氣味鹹溫滑無毒主治塗癰腫治風痺透經絡通耳聾時珍發明時珍曰淘鵝油性走能引諸藥透入病所拔毒故能治聾痺腫毒諸病附方新一耳聾用淘鵝油半匙磁石一小豆麝香少許和勻以綿裹成挺子塞耳中口含生鐵少許用三五次即有效青囊嘴氣味鹹平無毒主赤白久痢成疳燒存性研末水服一方寸匕嘉祐舌主治疔瘡時珍毛皮主治反胃吐食燒存性每酒服二錢時珍濟出普鵝别録上品釋名家雁綱目舒雁時珍曰鵝鳴自呼江東謂之舒雁似雁而舒遲也集解時珍曰江淮以南多畜之有蒼白二色及大而垂胡者並緑眼黃喙紅掌善鬬其夜鳴應更師曠禽經云腳近臎者能步鵝鶩是也又云鵝伏卵則逆月謂向月取氣助卵也性能啖蛇及蚓制射工故養之能辟蟲虺或言鵝性不食生蟲者不然白鵝膏臘月鍊收氣味甘微寒無毒主治灌耳治卒聾别録潤皮膚可合靣脂日華塗面急令人悅白唇瀋手足皴裂消癰腫解礜石毒時珍肉氣味甘平無毒日華曰白鵝辛涼無毒蒼鵝冷有毒發瘡腫詵曰鵝肉性冷多食令人霍亂發痼疾李廷飛曰嫩鵝毒老鵝良主治利五臟别録解五臟熱服丹石人宜之孟詵煮汁止消渴藏器發明藏器曰蒼鵝食蟲主射工毒為良白鵝不食蟲止渴為勝時珍曰鵝氣味俱厚發風發瘡莫此為甚火薰者尤毒曾目擊其害而本草謂其性涼利五臟韓􅐂醫通謂其疏風豈其然哉又葛洪肘後方云人家養白鵝白鴨可辟食射工則謂白鵝不食渴不發病之説亦非矣但比蒼鵝薄乎云耳若夫止凡發胃氣者皆能生津豈獨止渴者便曰性涼乎參苓白术散乃治渴要藥何嘗寒涼耶臎一名尾罌尾肉也時珍曰內則舒鴈臎不可食為氣臊可厭耳而俗夫嗜之主治塗手足皴裂納耳中治聾及聤耳日華血氣味鹹平微毒主治中射工毒者飲之并塗其身陶𢎞景解藥毒時珍曰祈禱家多用之膽氣味苦寒無毒主治解熱毒及痔瘡初起頻塗抹之自消時珍附方新一痔瘡有核白鵝膽二三枚取汁入熊膽二分片腦半分研勻瓷器密封勿令泄氣用則手指塗之立效劉氏保壽堂方卵氣味甘溫無毒主治補中益氣多食發痼疾孟詵涎主治咽喉榖賊時珍發明時珍曰按洪邁夷堅志云小兒誤吞稻芒著咽喉中不能出者名曰穀賊惟以鵝涎灌之即愈蓋鵝涎化榖相制耳毛主治射工水毒别録小兒驚癎又燒灰酒服治噎疾蘇恭發明𢎞景曰東川多溪毒養鵝以辟之毛羽亦佳并飲其血鵝未必食射工蓋以威相制耳時珍曰禽經云鵝飛則蜮沉蜮即射工也又嶺南異物志云雍州蠻人選鵝腹毳毛為衣被絮柔暖而性冷嬰兒尤宜之能辟驚癎栁子厚詩云鵝毛禦臘縫山罽即此蓋毛與肉性不同也附方新二通氣散治誤吞銅錢及鉤繩鵝毛一錢燒灰滋石皂子大煆象牙一錢燒存性為末每服半錢新汲水下醫方妙選噎食病白鵝尾毛燒灰米湯每服一錢掌上黃皮主治燒研搽腳趾縫濕爛焙研油調塗凍瘡良時珍諸出談野翁方屎主治絞汁服治小兒鵝口瘡時珍録出祕蒼鵝屎傅蟲蛇咬毒日華附方新一鵝口瘡自內生出可治自外生入不可治用食草白鵝下清糞濾汁入沙糖少許搽之或用雄鵝糞眠倒者燒灰入麝香少許搽之立效永類鈐方鴈本經上品釋名鴻時珍曰按禽經云鳱以水言自南而北䲸以山言自北而南張華注云鳱䲸並音鴈冬則適南集于水干故字從干春則嚮北集于山䲸故字從岸小者曰鴈大者曰鴻鴻大也多集江渚故從江梵書謂之僧娑集解别録曰鴈生江南池澤取無時𢎞景曰詩疏云大曰鴻小曰鴈今鴈類亦有大小皆同一形又有野鵝大于鴈似人家蒼鵝謂之駕鵝鴈在江湖夏當産伏故皆往北恐鴈門北人不食之也雖采無時以冬月為好恭曰鴈為陽鳥與燕往來相反冬南翔夏北徂孳育于北也豈因北人不食之乎宗奭曰鴈熱則即北寒則即南以就和氣所以為禮幣者一取其信二取其和也時珍曰鴈狀似鵝亦有蒼白二色今人以白而小者為鴈大者為鴻蒼者為野鵝亦曰鴚鵝爾雅謂之鵱鸚也鴈有四德寒則自北而南止于衡陽熱則自南而北歸于鴈門其信也飛則有序而前鳴後和其禮也失偶不再配其節也夜則羣宿而一奴巡警盡則㗸蘆以避繒繳其智也而捕者豢之為媒以誘其類是則一愚矣南來時瘠瘦不可食北嚮時乃肥故宜取之又漢唐書並載有五色鴈云鴈肪正誤一名鶩肪𢎞景曰鶩是野鴨本經鴈肪亦名鶩是鴈鶩相類而誤耳氣味甘平無毒主治風攣拘急偏枯血氣不通利久服益氣不飢輕身耐老本經淨心鏡云上證用肪四兩鍊每日空心暖酒服一匙長毛髮鬚眉别録詵曰合生髮膏用之殺諸石藥毒吳普治耳聾和豆黃作丸補勞瘦肥白人日華塗癰腫耳疳又治結熱胸痞嘔吐時珍曰外臺治此證有鴈肪湯附方新一生髮鴈肪日日塗之千金方肉氣味甘平無毒思邈曰七月勿食雁傷人神禮云食鴈去腎不利人也主治風麻痺久食動氣壯筋骨日華利臟腑解丹石毒時珍發明𢎞景曰鴈肪人不多食亦應好宗奭曰人不食鴈謂其知隂陽之升降少長之行序也道家謂之天厭亦一説耳食之則治諸風骨主治燒灰和米泔沐頭長髮孟詵毛主治喉下白毛療小兒癎有效蘇恭自落翎毛小兒佩之辟驚癎日華發明時珍曰案酉陽雜俎云臨邑人春夏羅取鴻鴈毛以禦暑又淮南萬畢術云鴻毛作囊可以渡江此亦中流一壺之意水行者不可不知屎白主治炙瘡腫痛和人精塗之梅師鵠食物釋名天鵝時珍曰案師曠禽經云鵠鳴哠哠故謂之鵠吳僧贊寧云凡物大者皆以天名天者大也則天鵝名義蓋亦同此羅氏謂鵠即鴨亦不然集解時珍曰鵠大于鴈羽毛白澤其翔極髙而善步所謂鵠不浴而白一舉千里是也亦有黃鵠丹鵠湖海江漢之間皆有之出遼東者尤甚而畏海青鶻其皮毛可為服飾謂之天鵝絨案飲膳正要云天鵝有四等大金頭鵝似鴈而長項入食為上美于鴈小金頭鵝形差小花鵝色花一種不能鳴鵝飛則翔響其肉微腥並不及大金頭鵝各有所産之地肉氣味甘平無毒頴曰冷忽氏曰熱主治醃炙食之益人氣力利臟腑時珍油冬月取肪鍊收氣味缺主治塗癰腫治小兒疳耳時珍附方新一疳耳出膿用天鵝油調草烏末入龍腦少許和傳立效無則以鴈油代之通玄論絨毛主治刀杖金瘡貼之立愈江頴鴇音保綱目釋名獨豹時珍曰案羅願云鴇有豹文故名獨豹而訛為鴇也陸佃云鴇性羣居如鴈有行列故字從􅀢􅀢音保相次也詩云鴇行是矣集解時珍曰鴇水鳥也似雁而斑文無后趾性不木止其飛也肅肅其食也齝肥腯多脂肉粗味美關語曰鴇無舌兔無脾或云純雌無雄與他鳥合或云鴇見鷙鳥激糞射之其毛自脫也肉氣味甘平無毒時珍曰禮記不食鴇奧奧者膍胵也深奧之處也主治補益虛人去風痺氣正要肪主治長毛髮澤肌膚塗癰腫時珍鶩音木品别録上釋名鴨説文舒鳬爾雅家鳬綱目􅵒鴄音末匹時珍曰鶩通作木鶩性質木而無他心故庶人以為贄曲禮云庶人執匹匹雙鶩也匹夫卑末故廣雅謂鴨為􅵒鵾禽經云鴨鳴呷呷其名自呼鳬能髙飛而鴨舒緩不能飛故曰舒鳬正誤𢎞景曰鶩即鴨有家鴨野鴨藏器曰尸子云野鴨為鳧家鴨為鶩不能飛翔如庶人守耕稼而已保升曰爾雅云野鳧鶩而本草鶩肪乃家鴨也宗奭曰據數説則鳧鶩皆鴨也王勃滕王閣序云落霞與孤鶩齊飛則鶩為野鴨明矣勃乃名儒必有所據時珍曰四家惟藏器為是陶以鳧鶩混稱冦以鶩為野鴨韓引爾雅錯舒鳧為野鳧並誤矣今正之蓋鶩有舒鳧之名而鳧有野鶩之稱故王勃可以通用而其義自明案周禮庶人執鶩豈野鴨乎國風弋鳧與鴈豈家鴨乎屈原離騷云寧與騏驥抗軛乎將與雞鶩爭食乎寧昻昻若千里駒乎將泛汛若水中之鳧乎此以鳧鶩對言則家也野也益自明矣集解時珍曰案格物論云鴨雄者緑頭文翅雌者黃斑色但有純黑純白者又有白而烏骨者藥食更佳鴨皆雄瘖雌鳴重陽后乃肥腯味美清明后生卵則內陷不滿伏卵聞礱磨之聲則􅖁而不成無雌抱伏則以牛屎嫗而出之此皆物理之不可曉者也鶩肪白鴨者鍊過用氣味甘大寒無毒思邈曰甘平主治風虛寒熱水腫别録附方新一瘰癧汁出不止用鴨脂調半夏末傅之未類方肉氣味甘冷微毒𢎞景曰黃雌鴨為補最勝詵曰白鴨肉最良黑鴨肉有毒滑中發冷利腳氣不可食目白者殺人瑞曰腸風下血人不可食時珍曰嫩者毒老者良尾臎不可食見禮記昔有人食鴨肉成癥用􅐕米治之而愈見􅐕米下主治補虛除客熱和臟腑及水道療小兒驚癎别録解丹毒止熱痢日華頭生瘡腫和蔥䜴煮汁飲之去卒然煩熱孟詵鴨並用白發明劉完素曰鶩之利水因其氣相感而為使也時珍曰鴨水禽也治水利小便宜用青頭雄鴨取水木生發之象治虛勞熱毒宜用烏骨白鴨取金水寒肅之象也附方舊三新一白鳳膏葛可久云治久虛發熱咳嗽吐痰咳血火乘金位者用黑嘴白鴨一隻取血入溫酒量飲使直入肺經以酒補之將鴨乾撏去毛脅下開竅去腸拭淨入大棗肉二升參苓平胃散末一升縳定用沙甕一箇置鴨在內以炭火慢煨將陳酒一瓶作三次入之酒乾為度取起食鴨及棗頻作取愈十藥神書大腹水病小便短少百一方用青頭雄鴨煮汁飲厚蓋取汗心鏡治十種水病垂死用青頭鴨一隻如常治切和米并五味煮作粥食又方用白鴨一隻治淨以䜴半升同薑椒入鴨腹中縫定蒸熟食之頭雄鴨者良主治煮服治水腫通利小便恭曰古方有鴨頭丸附方新一鴨頭丸治陽水暴腫靣赤煩燥喘急小便澀其效如神此裴河東方也用甜葶藶炒二兩熬膏漢防己末二兩以緑頭鴨血同頭全搗三千杵丸梧子大每木通湯下七十丸日三服一加豬苓一兩外臺祕要腦主治凍瘡取塗之良時珍血白鴨者良氣味鹹冷無毒主治解諸毒别録熱飲解野葛毒已死者入咽即活孟詵熱血解中生金生銀丹石砒霜諸毒射工毒又治中惡及溺水死者灌之即活蚯蚓咬瘡塗之即愈時珍附方新三卒中惡死或先病痛或卧而忽絶並取雄鴨向死人口斷其頭瀝血入口外以竹筒吹其下部極則易人氣通即活也肘后解百蠱毒白鴨血熱飲之廣記小兒白痢似魚凍者白鴨殺取血滚酒泡服即止也摘玄方舌主治痔瘡殺蟲取相制也時珍涎主治小兒痓風頭及四肢皆往後以鴨涎滴之又治蚯蚓吹小兒隂腫取雄鴨抹之即消時珍上出海膽氣味苦辛寒無毒主治塗痔核良又點赤目初起亦效時珍肫衣即膍胵內皮也主治諸骨硬炙研水服一錢即愈取其消導也時珍卵氣味甘鹹微寒無毒詵曰多食發冷氣令人氣短背悶小兒多食腳軟鹽藏食之即宜人士良曰生瘡毒者食之令惡肉突出𢎞景曰不可合鱉肉李子食害人合椹食令人生子不順主治心腹胸膈熱日華發明時珍曰今人鹽藏鴨子其法多端俗傳小兒泄痢炙鹹卵食之亦間有愈者蓋鴨肉能治痢而炒鹽亦治血痢故耳白鴨通即鴨屎也與馬通同義氣味冷無毒主治殺石藥毒解結縳散畜熱别録主熱毒毒痢又和雞子白塗熱瘡腫毒即消塗蚯蚓咬亦效孟詵絞汁服解金銀銅鐵毒時珍附方舊一新二石藥過劑白鴨屎為末水服二錢效百一方乳石發動煩熱用白鴨通一合湯一盞漬之澄清冷飲聖惠方熱瘡腫痛不可忍用家鴨糞同雞子清調傅即消聖惠鳬食療釋名野鴨詩疏野鶩同上鸍音施沉鳬時珍曰鳬從几音殊短羽髙飛貌鳬義取此爾雅云鸍沉鳬也鳬性好沒故也俗作晨鳬云鳬常以晨飛亦通集解時珍曰鳬東南江海湖泊中皆有之數百為羣晨夜蔽天而飛聲如風雨所至稻粱一空陸幾詩疏云狀似鴨而小雜青白色背上有文短喙長尾卑腳紅掌水鳥之謹願者肥而耐寒或云食用緑頭者為上尾央者次之海中一種冠鳬頭上有冠乃石首魚所化也並宜冬月取之肉氣味甘涼無毒詵曰九月以後立春以前即中食大益病人全勝家者雖寒不動氣日華曰不可合胡桃木耳豆䜴同食主治補中益氣平胃消食除十二種蟲身上有諸小熱瘡年久不愈者但多食之即瘥孟詵治熱毒風及惡瘡癤殺腹臟一切蟲治水腫日華血主治解挑生蠱毒熱飲探吐時珍玄出摘鸊鷉音甓梯拾遺釋名須螺爾雅水􅀢音札正要䴇􅀈日用刁鴨食療油鴨俗時珍曰鸊鷉須螺並未詳􅀢刁零丁皆狀其小也油言其肥也集解藏器曰鸊鷉水鳥也大如鳩鴨腳連尾不能陸行常在水中人至即沉或擊之便起其膏塗刀劍不繡續英華詩云馬㗸苜蓿葉劍瑩鸊鷉膏是也韓保升曰野鴨有與家鴨相似者有全别者其甚小者名刁鴨味最佳時珍曰鸊鷉南方湖溪多有之似野鴨而小蒼白文多脂味美冬月取之其類甚多楊雄方言所謂野鳬甚小而好沒水中者南楚之外謂之鸊鷉大者謂之鶻鸊是也肉氣味甘平無毒主治補中益氣五味炙食甚美時珍正出要膏主治滴耳治聾藏器鴛鴦宋嘉祐釋名黃鴨綱目匹烏時珍曰鴛鴦終日並遊有宛在水中央之意也或曰雄鳴曰鴛雌鳴曰鴦崔豹古今注云鴛鴦雄雌不相離人獲其一則一相思而死故謂之匹烏涅槃經謂之婆羅迦鄰提集解時珍曰鴛鴦鳬類也南方湖溪中有之棲于土穴中大如小鴨其質杏黃色有文采紅頭翠鬛黑翅黑尾紅掌頭有白長毛垂之至尾交頸而卧其交不再肉氣味鹹平有小毒孫曰苦微溫無毒瑞曰酸無毒詵曰多食令人患大風主治諸瘻疥癬以酒浸炙令熱傅貼瘡上冷即易嘉祐清酒炙食治瘻瘡作羮臛食之令人肥麗夫婦不和者私與食之即相愛憐孟詵炙食治夢寐思慕者孫思邈附方舊一新一五瘻漏瘡鴛鴦一隻治如常法炙熟細切以五味醋食之作羮亦妙食醫心鏡血痔不止鴛鴦一隻治淨切片以五味椒鹽醃炙空心食之奉親養老方鸂鷘音溪敇宋嘉祐釋名溪鴨異物志紫鴛鴦時珍曰按杜臺卿賦云鸂鷘尋邪而逐害此鳥專食短狐乃溪中敕逐害物者其遊于溪也左雄右雌羣伍不亂似有式度者故説文人作溪鵡其形大于鴛鴦而色多紫亦好並遊故謂之紫鴛鴦也集解藏器曰鸂鷘南方有短狐處多有之性食短狐也所居處無復毒氣人家宜畜之形小如鴨毛有五采首有纓尾有毛如船柁形肉氣味甘平無毒冬月用之主治食之去驚邪及短狐毒嘉祐鵁鶄音交睛拾遺釋名交矑説文茭雞俗鳽音堅出爾雅時珍曰按禽經云白鷁相睨而孕鵁鶄睛交而孕又曰旋目其名鷃方目其名鴋交目其名鳽觀其眸子而命名之義備矣説文謂之交矑矑亦目瞳子也俗呼茭雞云多居茭菰中而腳髙似雞其説亦通集解藏器曰鵁鶄水鳥也出南方池澤似鴨緑衣人家養之馴擾不去可厭火災博物志云鵁鶄巢于髙樹生子穴中㗸其母翼飛下飲食時珍曰鵁鶄大如鳬鶩而髙腳似雞長喙好啄其頂有紅毛如冠翠鬛碧斑丹嘴青脛養之可玩附方旋目水鳥也生荆郢間大如鷺而短尾紅白色深目目旁毛皆長而旋上林賦云交睛旋日是矣方目一名鴋音紡一名澤虞俗名護田鳥西人謂之蝦蟇護水鳥也常在田澤中形似鷗鷺蒼黑色頭有白肉冠赤足見人輒鳴喚不去漁人呼為烏雞閩人訛為姑雞肉氣味甘鹹平無毒主治炙食解諸魚蝦毒時珍鷺食物釋名鷺鷥禽經絲禽陸龜蒙雪客李昉所命舂鋤爾雅白鳥時珍曰禽經云鸘飛則霜鷺飛則露步於淺水好自低昻如舂如鋤之狀故青齊間謂之舂鋤遼東吳楊皆云白鷺集解時珍曰鷺水鳥也林棲水食羣飛成序潔白如雪頭細而長腳青善翹高尺餘解指短尾喙長三寸頂有長毛十數莖毿毿然如絲欲取魚則弭之郭景純云其毛可為睫㒿變化論云鷺以目盼而受胎頴曰似鷺而頭無絲腳黃色者俗名白鶴子又有紅鶴相類色紅禽經所謂朱鷺是也肉氣味鹹平無毒主治虛瘦益脾補氣炙熟食之汪頴頭主治破傷風肢強口緊連尾燒研以臘豬脂調傅瘡口救急方鷗食物釋名鷖音醫水梟時珍曰鷗者浮水上輕漾如漚也鷖者鳴聲也梟者形似也在海者名海鷗在江者名江鷗江夏人訛為江鵝也海中一種隨潮往來謂之信鳬集解時珍曰鷗生南方江海湖溪間形色如白鴿及小白雞長喙長腳羣飛耀日三月生卵羅氏謂青黑色誤矣肉氣味缺鸀鳿音燭玉拾遺釋名鸑鷟時珍曰鸀鳿名義未詳案許慎説文云鸑鷟鳯屬也又江中有鸑鷟似鳬而大赤目據此則鸀鳿乃鷟鸑聲轉蓋此鳥有文彩如鳯毛故得同名耳集解藏器曰鸀鳿山溪有水毒處即有之因為食毒出所致也其狀如鴨而大長項赤目斑嘴毛紫紺色如鵁鶄色也時珍曰案三輔黃圖及事類合壁並以今人所呼白鶴子者為鸀鳿謂其鳥潔白如玉也與陳氏似鴨紫紺之説不同白鶴子狀白如鷺長喙髙腳但頭無絲耳姿標如鶴故得鶴名林栖水食近水處極多人捕食之味不甚佳毛及屎主治燒灰水服治溪鳥毒砂蝨水弩射工蜮短狐蝦鬚等病亦可將鳥近病人即能唼人身訖以物承之當有沙出其沙即含沙射人之箭也又可籠鳥近人令鳥氣相吸藏器發明藏器曰巳上數病大略相似俱是山水間蟲含沙射影所致亦有無水處患者或如瘧或如天行寒熱或有瘡無瘡但夜卧時以手摩身體有辣痛處熟視當有赤點如針頭急捻之以芋葉入內刮出細沙以蒜封之則愈否則寒熱漸深也惟蝦鬚瘡最毒十活一二桂嶺獨多但早覺時以芋及甘蔗葉屈角入肉勾出其根如蝦鬚狀則愈遲則根入至骨有如丁腫最惡好著人隱處時珍曰水弩短狐射上蜮一物也陳氏分為四非矣溪毒有氣無形砂蝨沙中細蟲也鸕鷀别録下品釋名鷧音意爾雅水老鴉衍義時珍曰案韻書盧與兹並黑也此鳥色深黑故名鷧者其聲自呼也集解時珍曰鸕鷀處處水鄉有之似鶂而小色黑亦如鴉而長喙微曲善沒水取魚日集洲渚夜巢林木久則糞毒多令木枯也南方漁舟往往縻畜數十令其捕魚杜甫詩家家養鳥鬼頓頓食黃魚或謂即此又一種似鸕鷀而蛇頭長項冬月羽毛落盡栖息溪岸見人不能行即沒入水者此即爾雅所謂􅀈頭魚鮫者不入藥用􅀈音拗藏器曰一種頭細身長項上白者名魚鮫不入用正誤𢎞景曰此鳥不卵生口吐其雛亦一異也藏器曰此鳥胎生從口出如兔吐兒故産婦執之易生宗奭曰人言孕婦忌食鸕鷀為其口吐雛常官于澧州公廨后有一大木上有三四十巢日夕視之既能交合又有碧色卵殼布地則陶陳之説誤聽人言也時珍曰一種鶂鳥或作鷁似鸕鷀而色白人誤以為白鸕鷀是也雌雄相似雄鳴上風雌鳴下風而孕口吐其子莊周所謂白鶂相視眸子不運而風化者也昔人誤以吐雛為鸕鷁蓋鶂鷧音相近耳鶂善髙飛能風能水故舟首畫之又有似鶂而短項背上緑色腹背紫白色者名青鶂一名鳥􅖂陶氏謂烏賊魚乃此鳥所化或云即鴨非也肉氣味酸鹹冷微毒主治大腹鼓脹利水道時珍發明時珍曰鸕鷀别録不見功用惟雷氏炮炙論序云體寒腹大全賴鸕鷀注云治腹大如鼓體寒者以鸕鷀燒存性為末米飲服之立愈切謂諸腹鼓大皆屬于熱衛氣並循于血脈則體寒此乃水鳥其氣寒冷而利水寒能勝熱利水能去濕故也又外臺云凡魚骨哽者但密念鸕鷀不已即下此乃厭伏之意耳頭氣味微寒主治哽及噎燒研酒服别録骨主治燒灰水服下魚骨哽𢎞景附方新一雀卵面斑鸕鷀骨燒研入白芷末豬脂和夜塗旦洗摘玄方喙主治噎病發㗸之便安范汪嗉主治魚哽吞之最效時珍翅羽主治燒灰水服半錢治魚哽噎即愈時珍御出太平覽蜀水花别録曰鸕鷀屎也𢎞景曰溪谷間甚多當自取之擇用白處市賣者不可信頌曰屎多在山石上色紫如花就石刮取别録謂屎即蜀水花而唐面膏方中二物並用未知其的時珍曰當以别録為正唐方蓋傳寫之訛誤也氣味冷微毒主治去面上黑皯黶志别録療面瘢疵及湯火瘡痕和脂油傅疔瘡大明南人治小兒疳蛔乾研為末炙豬肉蘸食云有竒效蘇頌殺蟲時珍附方舊二新一鼻面酒皶鸕鷀屎一合研末以臘月豬脂和之每夜塗旦洗千金魚骨哽咽鸕鷀屎研水服方寸匕并以水和塗喉外范汪方斷酒鸕鷀屎燒研水服方寸匕日一服外臺魚狗拾遺釋名竭爾雅天狗同水狗同魚虎禽經魚師同翠碧鳥時珍曰狗虎師皆獸之噬物者此鳥害魚故得此類命名集解藏器曰此即翠鳥也穴土為窠大者名翠鳥小者名魚狗青色似翠其尾可為飾亦有斑白者俱能水上取魚時珍曰魚狗處處水涯有之大如燕喙尖而長足紅而短背毛翠色帶碧翅毛黑色揚青可飾女人首物亦翡翠之類肉氣味鹹平無毒主治魚哽及魚骨入肉不出痛甚者燒研飲服或煮汁飲亦佳藏器發明時珍曰今人治魚骨哽取得去腸用隂陽瓦泥固煆存性入藥用蓋亦取其相制之意附録翡翠時珍曰爾雅謂之鷸出交廣南越諸地飲喙水側穴居生子亦巢于木似魚狗梢大或云前身翡後身翠如鵝翠雁翠之義或云雄為翡其色多赤雌為翠其色多青彼人亦以肉作臘食之方書不見用功應與魚狗相同蚊母鳥拾遺釋名吐蚊鳥鷏爾雅音田集解藏器曰此鳥大如雞黑色生南方池澤茹藘中江東亦多其聲如人嘔吐每吐出蚊一二升夫蚊乃惡水中蟲羽化所生而江東有蚊母鳥塞北有蚊母樹嶺南有虻母草此三物異類而同功也時珍曰郭璞言蚊母似鳥􅖂而大黃白雜文鳴如鴿聲嶺南異物志言吐蚊鳥大如青鷁大嘴食魚豈各地之産差異耶翅羽主治作扇辟蚊藏器本草綱目卷四十七
