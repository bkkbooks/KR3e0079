body:
  text: 本草綱目卷十明李時珍撰金石之四石類下三十九種陽起石本經中品釋名羊起石别録白石本經石生時珍曰以能命名集解别録曰陽起石生齊山山谷及琅琊或雲山雲母根也采無時普曰生太山𢎞景曰此所出與雲母同而甚似雲但厚異爾今用乃出益州與礬石同處色小黃黑但礬石雲母根未知何者是俗用乃稀仙經服之恭曰此石以白色肌理似殷孽仍夾帶雲母滋潤者為良故本經之一名白石今用純黑如炭者誤矣雲母之黑者名雲膽服損人則黑陽起石亦必惡矣今齊山在齊州西其無陽起石石乃在齊山西北六七里廬山出之本經雲山或廬字訛也太山沂州惟有黑者白者獨出齊州珣曰太山所出黃者絶佳邢州鵲山出白者亦好頌曰今惟出齊州他處不復有齊州惟一土山石出其中彼人謂之陽起山其山常有溫暖氣雖盛冬大雪遍境獨此山無積白蓋石氣熏蒸使然也山惟一穴官中常禁閉至初冬則州發丁夫遣人監取嵗月積久其穴益深鑱鑿他石得之甚難以白色明瑩若狼牙者為上亦有挾他石作塊者不堪每嵗采擇上供之餘州中貨之不爾無由得也貨者雖多而精好者亦難得舊説是雲母根其中猶帶雲母今不復見此矣古方服食不見用者今補下藥多便之時珍曰今以雲頭雨腳輕鬆如狼牙者為佳具鋪茸茁角者不佳王建平典術乃云黃白而赤重厚者佳雲母之根也庚辛玉册云陽起陽石也齊州揀金山出者勝其尖似箭簇者力強如狗牙者力微置大雪中倐然沒者為真修治大明曰凡入藥燒後水煅用之凝白者佳時珍曰凡用火中煅赤酒淬七次研細水飛過日乾亦冇用燒酒浸過同樟腦入罐升煉取粉用者氣味鹹微溫無毒普曰神農扁鵲酸無毒桐君雷公岐伯鹹無毒李當之小寒權曰甘平之才曰桑螵蛸為之使惡澤㵼菌桂雷丸石葵蛇蛻皮畏兔絲子忌羊血不入湯主治崩中漏下破子臟中血癥瘕結氣寒熱腹痛無子隂痿不起補不足本經療男子莖頭寒隂下濕癢去臭汗消水腫久服不飢令人有子别録補腎氣精乏腰疼膝冷濕痺子宫久冷冷癥寒瘕止月水不定甄權治帶下溫疫冷氣補五勞七傷大明補命門不足好古散諸熱腫時珍發明宗奭曰男子婦人下部虛冷腎氣乏絶子臟久寒者須水飛用之凡石藥冷熱皆有毒亦宜斟酌時珍曰陽起石右腎命門氣分藥也下焦虛寒者宜用之然亦非久服之物張子和儒門事親云喉痺相火急連之病也相火龍火也宜以火逐之一男子病纒喉風腫表裏皆藥不能下以涼藥灌入鼻中下十餘行外以陽起石燒赤伏龍肝等分細未日以新汲水調掃百遍三日熱始退腫始消此亦從合之道也附方新三丹毒腫癢陽起石煅研新水調塗儒門事親元氣虛寒精滑不禁大腑溏泄手足厥冷陽起石煆研鍾乳粉各等分酒煮附子末同麵糊丸梧子大每空心米飲服五十丸以愈為度濟生方隂痿隂汗陽起石煆為末每服二錢鹽酒下普濟方慈石本經中品釋名玄石本經處石别録㶸鐵石衍義吸針石藏器曰慈石取鐵如慈母之招子故名時珍曰石之不慈者不能引鐵謂之玄石而别録復出玄石于後集解别録曰慈石生太山川谷及慈山山隂有鐵處則生其陽采無時𢎞景曰今南方亦有好者能懸吸鐵虛連三為佳仙經丹房黃白石中多用之藏器曰出雄州北山頌曰今慈州徐州及南海傍山中皆有之慈州者嵗貢最佳能吸鐵虛連數十針或一二斤刀器回轉不落者尤良采無時其石中有孔孔中有黃赤色其上有細毛功用更勝按南川異物志云漲海﨑頭水淺而多慈石徼外大舟以鐵葉固之者至此皆不得過以此言之海南所出尤多也斆曰凡使勿誤用玄中石并中麻石此二石俱似慈石只是吸鐵不得而中麻石心有赤皮粗是鐵山石也誤服令人生惡瘡不可療真慈石一片四靣吸鐵一斤者此名延年沙四靣只吸鐵八兩者名續采石四靣吸五兩者名慈石宗奭曰慈石其毛輕紫石上頗澀可吸連鐵俗謂之㶸鐵石其玄石即慈石之黑色者慈磨鐵鋒則能指南然常遍東不全南也其法取新纊中獨縷以半芥子許蠟綴于鐵腰無風處垂之則鐵常指南以針橫貫燈心浮水上亦指南然常偏丙位蓋丙為大火庚辛受其制物理相感爾土宿真君曰鐵受太陽之氣始生之初石産焉一百五十年而成慈石又二百年孕而成鐵修治斆曰凡修事一斤用五花皮一鎰地榆一鎰取綿十五兩二件並銼于石上槌碎作二三十塊將石入瓷瓶中下草藥以東流水煮三日夜漉出拭乾布褁再槌細乃碾如塵水飛過再碾用宗奭曰入藥須火燒醋淬碾末水飛或醋煮三日夜氣味辛寒無毒權曰鹹有小毒大明曰甘澀平藏器曰性溫云寒誤也之才曰柴胡為之使殺鐵毒消金惡牡丹莽草畏黃石脂獨孤滔曰伏丹砂養永去銅暈主治周痺風濕肢節中痛不可持物洗洗酸消除大熱煩滿及耳聾本經養腎臟強骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癎鍊水飲之亦令人有子别録補男子腎虛風虛身強腰中不利加而用之甄權治筯骨羸弱補五勞七傷眼昏除煩躁小兒誤吞針鐵等即研細末以筯肉莫令斷與末同吞下之大明明目聰耳止金瘡血時珍發明宗奭曰養腎氣填精髓腎虛耳聾目昏者皆用之藏器曰重可去怯慈石鐵粉之類是也時珍曰慈石法水色黑而入腎故治腎家諸病而通耳明目一士子頻病目漸覺昏暗生翳時珍用東垣羌活勝風湯加減法與服而以磁硃丸佐之兩月遂如故蓋慈石入腎鎮養真精使神水不外移硃砂入心鎮養心血使邪火不上侵而佐以神麴消化滯氣生熟並用溫養脾胃發生之氣乃道家黃婆媒合嬰妮之理制方者宜窺造化之奧乎方見孫真人十金石神麴丸但云明目百嵗可讀細書而未發出藥微義也孰謂古方不可治今病耶獨孤滔云慈石乃堅頑之物無融化之氣止可假其氣服食不可久服渣滓必有大患夫藥以治病中病則止砒􅚑猶可餌服何獨慈石不可服耶慈石既鍊末亦匪堅頑之物惟在用者能得病情而中的爾淮南萬畢術云慈石懸井亡人自歸注云以亡人衣裹慈石懸于井中逃人自反也附方舊三新一十二耳卒聾閉㶸鐵石半錢入病耳內鐵砂末入不病耳內自然通透直指方腎虛耳聾真慈石一豆大穿山甲燒存性研一字新綿塞耳內口含生鐵一塊覺耳中如風雨聲即通濟生方老人耳聾慈石一斤搗末水淘去赤汁綿裹之豬腎一具細切以水五斤煮石取二斤入腎下鹽豉作羮食之米煮粥食亦可養老方老人虛損風濕腰肢痺痛慈石三十兩白石英二十兩捶碎甕盛水二斗浸于露地每日取水作粥食經年氣力強盛顔如童子方養老陽事不起慈石五斤研清酒漬二七日每服三分日三夜一千金眼昏內障慈朱丸治神水寬大漸散昏如霧露中行漸覩空花物成二體久則光不收及內障神水淡緑淡白色者真慈石火煅醋淬七次二兩硃砂一兩神麴生用三兩為末更以神麴末一兩煮糊加蜜丸梧子大每服二十丸空心飯湯下服後俯視不見仰視微見星月此其效也亦治心火乘金水衰反制之病久病纍發者服之永不更作倪微德原機啓微集小兒驚癎慈石鍊水飲之聖濟録子宫不收名瘣疾痛不可忍慈石丸用慈石酒浸煅研末米糊丸梧子大每卧時滑石湯下四十丸次早用慈石散米湯服二錢散用慈石酒浸半兩鐵粉二錢半當歸五錢為末大腸脫肛直指方慈石半兩火煅醋淬七次為末每空心米飲服一錢簡便方用慈石末麵糊調塗𩕄上入後洗去金瘡腸出納入以慈石滑石各三兩為末米飲服方寸七日再劉涓子鬼遺方金瘡血出慈石末傅之止痛斷血千金方誤吞針鐵真慈石棗核大鑽孔線穿吞拽之立出篋錢相公中方丁腫熱毒慈石末酢和封之拔根立出外臺祕要諸般腫毒吸鐵石三錢金銀藤四兩黃丹八兩香油一斤如常熬膏貼之乾坤祕韞磁石毛氣味醎溫無毒主治補絶傷益陽道止小便白數治腰腳去瘡瘻長肌膚令人有子宜入酒藏器曰本經言石不言毛毛石功狀殊也玄石别録中品釋名玄水石别録處石時珍曰玄以色名集解别録曰玄石生太山之陽山隂有銅銅者雌鐵者雄𢎞景曰本經慈石一名玄石别録又出玄石一名處石名既同療體又相似而寒溫銅鐵畏惡有異俗方不用亦無識者不知與磁石相類否恭曰此物鐵液也慈石中有細孔孔中黃赤色初破好者能拾鐵吸鐵其無孔而光澤純黑者玄石也不能拾療體亦劣于慈石頌曰今北畨以慈石作禮物其塊多光澤吸鐵無力疑即此玄石也醫方罕用時珍曰慈石生山之隂有鐵處玄石玄石生山之陽有銅處雖形相似性則不同故玄石不能吸鐵氣味鹹溫無毒之才曰畏松脂柏實菌桂主治大人小兒驚癎女子絶孕小腹冷痛少精身重服之令人有子别録代赭石本經下品釋名須丸本經血師别録土硃綱目鐵硃别録曰出代郡者名代赭出姑幕者名須丸時珍曰赭赤色也代即雁門也今俗呼為土硃鐵硃管子云山上有赭其下有鐵鐵硃之名或緣此不獨因其形色也集解别録曰代赭生齊國山谷赤紅青色如雞冠有澤染瓜甲不渝者良采無時𢎞景曰是代郡城門下赤土也江東久絶俗用乃踈而為仙方之要與戎鹽鹵鹹皆是急須恭曰此石多從代州來云山中采得非城門下土也今齊州亭山出赤石其色有赤紅青者其赤者亦如雞冠且潤澤土人惟采以丹楹柱而紫色且暗與代州出者相似古來用之今靈州鳴沙縣界河北平地掘深四五尺得者皮上赤滑中紫如雞肝大勝齊代所出者頌曰今河東江東山中亦有之古方紫丸治小兒用代赭云無真以左顧牡蠣代使乃知真者難得今醫家所用多擇取大塊其上文頭有如浮漚丁者為勝謂之丁頭代赭北山經云少陽之山中多美赭西山經云石脆之山灌水出焉中有流赭以塗牛馬無病郭璞注云􅀈赤土也今人以塗牛角云辟惡時珍曰赭石處處山中有之以西北出者為良宋時虔州嵗貢萬金崔昉外丹本草云代赭陽石也與太乙餘根並生山峽中研之作朱色可點書又可罨金益色赤張華以赤土栻寶劍陪益精明即此也修治斆曰凡使研細以臘水重重飛過水面上有赤色如簿雲者去之乃用細茶腳湯煮一伏時取出又研一萬匝以淨鐵鐺燒赤下白蜜蠟一兩待化投新汲水沖之再煮一二十沸取出晒乾用時珍曰今人惟煅赤以醋淬三次或七次研水飛過用取其相制并為肝經血分引用也相感志云代赭以酒醋煮之插鐵釘于內扇之成汁氣味苦寒無毒别録曰甘權曰甘平之才曰畏天雄附子乾薑為之使主治鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下本經帶下百病産難胞不出墮胎養血氣除五臟血脈中熱血痺血瘀大人小兒驚氣入腹及隂痿不起别録安胎健脾止反胃吐血鼻衄月經不止腸風痔瘻瀉痢脫精遺溺夜多小兒驚癎疳疾金瘡長肉辟鬼魅大明發明好古曰代赭入手少隂足厥隂經怯則氣浮重所以鎮之代赭之重以鎮虛逆故張仲景治傷寒汗吐下後心下痞鞭噫氣不深者旋覆代赭湯主之用旋覆花二兩代赭石一兩人參二兩生薑五兩甘草三兩半夏半斤大棗十二枚水一斗煮六升去滓再煎三升溫服一升日三服時珍曰代赭乃肝與包絡二經血分藥也故所主治皆三經血分之病昔有小兒瀉後眼上三日不乳目黃如金氣將絶有名醫曰此慢驚風也宜治肝用水飛代赭石末每服半錢冬瓜仁煎湯調下果愈附方舊二新一十四哮呷有聲卧睡不得土硃末米醋調時時進一二服普濟方傷寒無汗代赭石乾薑等分為末熱醋調塗兩手心合掌握定夾于大腿內側溫覆汗出乃愈傷寒藴要嬰兒瘧疾無計可施代赭石五枚煆紅醋淬硃砂五分砒霜一豆大同以紙包七重打濕煨乾入麝香少許為末香油調一字塗鼻尖上及眉心四肢神應保幼大全急慢驚風弔眼撮口搐搦不定代赭石火燒醋淬十次細研水飛日乾每服一錢或半錢煎真金湯調下連進三服兒腳脛上有赤斑即是驚氣已出病當安也無斑點者不可治直指方慢肝驚風方見發明小腸疝氣代赭石火煅醋淬為末每白湯服二錢夀咸方腸風下血血師一兩火煅米醋淬盡醋一升搗羅如麵每服一錢白湯下斗門吐血衄血方同墮胎下血不止代赭石末一錢生地黃汁半盞調日三五次以瘥為度聖濟録婦人血崩赭石火煅醋淬七次為末日湯服二錢普濟方赤眼腫閉土硃二分石膏一分為末新汲水調傅眼頭尾及太陽穴直指方喉痺腫痛紫硃煮汁飲普濟方牙宣有􅉶土硃荆芥同研楷之三日普濟方諸丹熱毒土硃青黛各二錢滑石荆芥各一錢為末每服一錢半蜜水調下仍外傅之直指方一切瘡􅟻土硃虢丹牛皮膠等分為末好酒一碗沖之澄清服以渣傅之乾再上朱氏集驗方百合病發已汗下復發者百合七個擘破泉水浸一宿赭一兩滑石三兩泉水二鍾炙一鍾入百合汁再煎一鍾溫服傷寒蘊要附録藏器曰出淄川北海山谷土石中如赤土代赭之類土人以當朱呼為赤石一名零陵恐是代赭之類味甘平溫無毒主驚恐身熱邪氣鎮心久服令人眼明悅澤時珍曰此亦他方代赭耳故其功效不甚相逺也禹餘糧本經上品釋名白餘糧時珍曰石中有細粉如麵故曰餘糧俗呼為太一禹餘糧見太一下承曰會稽山中出者甚多彼人云昔太禹會稽于此餘糧者本為此耳集解别録曰禹餘糧生東海池澤及山島中或池澤中𢎞景曰今多出東陽形如鵝鴨卵外有殼重疊中冇黃細末如蒲黃無沙者佳近年茅山鑿地大得之極精好狀如牛黃重重甲錯其佳處乃紫色靡靡如麵嚼之無復嘇仙經服食用之南人又呼平澤中一種藤葉如菝葜根作塊有節似菝葜而色赤味似薯蕷謂為禹餘糧此與生池澤者復有髣佛或疑今石即是太一也頌曰今惟澤州潞州有之舊説形如鵝鴨卵外有殼今圖上者全是山石之形都不作卵狀與舊説小異采無時張華博物志言扶海洲上有蒒草其實食之如大麥名自然穀亦名禹餘糧世傳禹治水棄其所餘食于江中而為藥則蒒草與此異物同名抑與生池澤者同種乎時珍曰禹餘糧乃石中黃粉生于池澤其生山谷者為太一餘糧本文明白陶引藤生禹餘糧蘇引草生禹餘糧雖名同而實不同殊為迂逺詳太一餘糧下修治𢎞景曰凡用細研水洮取汁澄之勿令有沙土也斆曰見太一下氣味甘寒無毒别録曰平權曰鹹之才曰牡丹為之使伏五金制三黃主治咳逆寒熱煩滿下赤白血閉癓瘕大熱錬餌服之不飢輕身延年本經療小腹痛結煩疼别録主崩中甄權治邪氣及骨節疼四肢不仁痔瘻等疾久服耐寒暑大明催生固大腸時珍發明成無已曰重可去怯禹餘糧之重為鎮固之劑時珍曰禹餘糧手足陽明血分重劑也其性澀故主下焦前後諸病李知先詩曰下焦有病人難會須用餘糧赤石脂抱朴子云禹餘糧丸日再服三日後令人多氣力負擔逺行身輕不極其方藥多不録附方舊三新六大腸咳嗽咳則遺矢者赤石脂禹餘糧湯主之方同下潔古家珍冷勞腸泄不止神效太一丹禹餘糧四兩火煅醋淬烏頭一兩冷水浸一夜去皮臍焙為末醋糊丸梧子大每食煎溫水下五丸聖惠丸傷寒下痢不止心下痞靳利在下焦者赤石脂禹餘糧湯主之赤石脂禹餘糧各一斤並淬之水六升煮取一升去滓分再服仲景傷寒論要赤白帶下禹餘糧火煅醋淬乾薑等分赤下乾薑減半為末空心服二錢匕勝金方崩中漏下青黃赤白使人無子禹餘糧煅研赤石脂煅研牡蠣煅研烏賊骨伏龍肝炒桂心等分為末溫酒服方寸匕日服忌蔥蒜張文仲備急方育腸氣痛婦人少腹痛禹餘糧為末每米飲服二錢日二服極效方衛生易簡産後煩躁禹餘糧一枚狀如酸䭑者入地埋一半緊築炭灰一斤煅之濕土罨一宿打破去外靣石取裏靣細者研水淘五七度日乾再研萬遍用甘草湯服二錢一服立效方經驗身靣㿍䀶禹餘糧半夏等分為末雞子黃和傅先以布拭赤勿見風日三十日十年者亦滅聖濟録大風癘疾眉髮落落遍身頑痺禹餘糧二斤白礬一斤青鹽一斤為末罐子固濟炭火一稱煅之從辰至戌候冷研粉埋土中三日取出每一兩入九蒸九暴炒熟胡麻末三兩每服二錢荆芥茶下日二服聖惠方太一餘糧本經上品釋名石腦本經禹哀吳晉藏器曰太一者道之宗源太者大也一者道也大道之師即理化神君禹之師也師嘗服之故有太一之名張司空云還魂石中黃子鬼物禽獸守之不可妄得會稽有地名蓼出餘糧土人掘之以物請買所請有數依數必得此猶有神豈非太一乎集解别録曰太一餘糧生太山山谷九月采生太山上有甲甲中有白白中有黃如雞子黃色采無時𢎞景曰本草有太一餘糧禹餘糧兩種治體相同而今世惟有禹餘糧不復識太一登真隱訣長生四鎮丸云太一禹餘糧定六腑鎮五臟合其二名莫辨何者的是今人亦總呼為太一禹餘糧有人于銅官采空青于石坎大得黃赤色石極似今之餘糧而色過赤好疑此是太一也彼人呼為雌黃塗物正如雄色恭曰太一餘糧及禹餘糧乃一物而以精粗為名爾其殼若瓷方圓不定初在殼中未凝結猶是黃水名石中黃子久凝乃有數色或青或白或赤或黃年多變赤因赤漸紫紫及赤者俱名太一其諸色通謂禹餘糧今太山不見采得而會稽王屋澤潞州諸山皆有陶云黃赤色疑是太一然無殼褁殊非的稱斆曰凡使勿誤用石中黃并卵石黃二石真相似其石中黃句裏赤黑黃味淡微跙卵石黃味酸個箇卬卬內有子一塊不堪用若誤餌之令人腸乾太一餘糧看即如石輕敲便碎如粉兼重重如葉子雌黃也宗奭曰太一餘糧是用其殼也故入藥須火燒醋淬石中黃是殼中乾者及細水者石中黃水是未成餘糧黃濁水也時珍曰按别録言禹餘糧生東海池澤及山島太一餘糧生太山山谷石中黃出餘糧處有之乃殼中末成餘糧黃濁水也據此則三者一物也生于池澤者為禹餘糧生于山谷者為太一餘糧其中水黃濁者為石中黃水其凝結如粉者為餘糧凝乾如石者為石中黃其説本明而注者臆度反致義晦晉宋以來不分山谷池澤所産故通呼為太一禹餘糧而蘇恭復以紫赤色者為太一諸色為禹餘糧皆由未加詳究本文也冦宗奭及醫方乃用石殼為禹餘糧殊不察未成餘糧黃濁水之文也其殼粗頑不入藥庚辛玉册云太一禹餘糧隂石也所在有之片片層疊深紫色中有黃土名曰石黃其性最熱冬月有餘糧處其雪光消雲林石譜云鼎州祈閣山出石石中有黃土目之為太一餘糧色紫黑礧瑰大小圓扁外多粘綴碎石滌去黃土即空虛可貯水為硯滴丹方鑑云五色餘糧及石中黃皆可乾未出金色修治斆曰凡修事用黑豆五合黃精五合水二斗煮取五升置瓷鍋中下餘糧四兩煮之旋添汁盡為度其藥氣自然香如新米搗了又研一萬杵方用氣味甘平無毒普曰神農岐伯雷公甘平李當之小寒扁鵲甘無毒之才曰杜仲為之使畏貝母菖蒲鐵落主治咳逆上氣癥瘕血閉漏下除邪氣肢節不利久服耐寒暑不飢輕身飛行千里神仙本經治大飽絶力身重别録益脾安臟氣雷斆定六腑鎮五臟𢎞景發明時珍曰禹餘糧太一餘糧石中黃水性味功用皆同但入藥有精粗之等爾故服食家以黃水為上太一次之禹餘糧又次之列仙傳言巴戎赤斧上華山餌禹餘糧即此石中黃子唐本草釋名宗奭曰子當作水既云黃濁水焉得名子集解恭曰此禹餘糧殼中未成餘糧黃濁水也出餘糧處有之頌曰今惟河中府中條山谷出之其石形如麵劑紫黑色石皮內黃色者謂之中黃葛洪抱朴子云石中黃子所在有之沁水山尤多在大石中其石常潤濕不燥打其石有數十重見之赤黃溶溶如雞子之在殼中也即當未堅時飲之不爾便漸堅凝如石不中服也破一石中多者有一升少者數合可頓服之機曰石中乾者及細末者當名餘糧不當名石中黃詳本文未成餘糧四字可見時珍曰餘糧乃石中已凝細粉也石中黃則堅凝如石者也石中黃水則未凝者也故雷斆云用餘糧勿用石中黃是矣氣味甘平無毒主治久服輕身延年不老唐本空青本經上品釋名楊梅青時珍曰空言質青言色楊梅言似也集解别録曰空青生益州山谷及越嶲山有銅處銅精熏則生空青其腹中空三月中采亦無時能化銅鐵鉛錫作金𢎞景曰越嶲屬益州益州諸郡無復有恐久不采之故也今出銅官者色最鮮深出始興者弗如涼州髙平郡有空青山亦甚多今空青但圓實如鐵珠無空腹者皆鑿土石中取之而以合丹成則化鉛為金諸石藥中惟此最貴醫方乃希用之而多充畫色殊為可惜恭曰出銅處兼有諸青但空青為難得今出蔚州蘭州宣州梓州宣州者最好塊段細時有腹中空者蔚州蘭州者片塊大色極深無空腹者陶氏所謂圓實如鐵珠者乃白青也大明曰空青大者如雞子小者如相思子其青厚如荔枝殼其內有漿酸甜藏器曰銅之精華大者即空緑次即空青也頌曰今饒信州亦時有之狀若楊梅故名楊梅青其腹中空破之有漿者絶難得宗奭曰真宗常詔取空青中有水者久而方得其楊梅青信州穴山而取極難得治醫極有功中亦或有水者用與空青同第有優劣爾時珍曰張果玉洞要訣云空青似楊梅受赤金之精甲乙隂霛之氣近泉而生久而含潤新從坎中出鑽破中有水久即乾如珠金星燦燦庚辛玉册云空青隂石也産上饒似鍾孔者佳大片含紫色有光采次出蜀嚴道及北代山生金坎中生生不已故青為之丹有如拳大及卵形者中空有水如油治盲立效出銅坑者亦佳堪畫又有楊梅青石青皆是一體而氣有精粗點化以曾青為上空青次之楊梅青又次之造化指南云銅得紫陽之氣而生緑緑二百年而生石緑銅始生其中焉曾空二青則石緑之得道者均謂之礦又二百年得青陽之氣化為鍮石觀此諸説則空青有金坑銅坑二種或大如拳卵小如豆粒或成片塊或若楊梅雖有精粗之異皆以有漿為上不空無漿者為下也方家以藥塗銅物生青刮下偽作空青者終是銅青非石緑之得道者也氣味甘酸寒無毒别録曰大寒權曰畏兔絲子酒浸醋拌制過乃可變化主治青盲耳聾明目利九竅通血脈養精神益肝氣久服輕身延年本經療目赤痛去膚翳止淚出利水道下乳汁通關節破堅積令人不忘志髙神仙别録治頭風鎮肝瞳人破者得再見物甄權鑽孔取漿點多年青盲內障翳膜養精氣其殼摩翳大明中風口喎不正以豆許含咽甚效時珍出范汪方發明保升曰空青法水故色青靣主肝頌曰治眼翳障為最要之藥時珍曰東方甲乙是生肝膽其氣之清者為肝血其精英為膽汁開竅于目血五臟之英皆因而注之為神膽汁充則目明汁減則目昏銅亦青陽之氣所生其氣之清者為緑猶肝血也其精英為空青之漿猶膽汁也其為治目神藥蓋亦以類相感應耳石中空者埋土中三五日自有漿水附方舊二新三眼目昏昏不明空青少許漬露一宿點之千金方黑翳覆瞳空青礬石燒各一兩貝子四枚研細日點聖濟録膚翳昏暗空青二錢㽔仁去皮一兩片腦三錢細研日點聖濟録一切目疾雀目赤目青盲內外障翳風眼用此覺目中涼冷為驗楊梅青洗淨胡黃連洗各二錢半槐牙日未出時勿語采之入青竹筒內垂于天月二德方候乾勿見雞犬為末一錢半為末入龍腦一字密收每卧時嗽口仰頭吹一字入兩鼻內便睡隔夜便用聖濟録中風口喎見主治曾青本經上品釋名時珍曰曾音層其青層層而生故名或云其生從實至空從空至層故曰曾青也集解别録曰曾青生蜀中山谷及越嶲采無恃能化金銅普曰生蜀郡石山其山有銅處曾青出其陽青者銅之精𢎞景曰舊説與空青同山療體亦相似今銅官更無曾青惟出始興形纍纍如黃連相綴色理相類空青甚難得而貴仙經少用之化金之事法同空青恭曰出蔚州者好鄂州者次之餘州並不任用時珍曰但出銅處年古即生形如黃連相綴又如蚯蚓屎方稜色深如波斯青黛層層而生打之如金聲者為真造化指南云層青生銅礦中乃石録之得道者肌膚得東方正色可以合鍊大丹點化與三黃齊軀衡山記云山有層青岡出層青可合仙藥修治斆曰凡使勿用夾石及銅青每一兩要紫背天葵甘草青芝草三件乾濕各一鎰細銼放瓷鍋內安青于中東流水二鎰緩緩煮之五晝夜勿令水火失時取出以東流水浴過研乳如粉用氣味酸小寒無毒之才曰畏兔絲子獨孤滔云曾青住火成膏可結汞制丹砂蓋含金氣所生也須酒醋漬煮用葛洪曰曾青塗鐵色赤如銅主治目痛止淚出風痺利關節通九竅破癥堅積聚久服輕身不老本經養肝膽除寒熱殺白蟲療頭風腦中寒止煩渴補不足盛隂氣别録發明時珍曰曾青治目義同空青古方辟邪太乙神精丹用之扁鵲治積聚留飲有層青九並見古今録驗方藥多不録附方新三斑瘡入目不退者曾青一錢丹砂二錢為末蠐螬五枚搗汁和點聖濟録風熱目病曾青散治一切風熱毒氣上攻目赤或爛怕日羞明隱澀眵淚或癢或痛曾青四兩蔓荆子二兩白薑炮防風各一兩為末每以少許畜鼻中立有功效和劑局方耳內惡瘡曾青五錢雄黃七錢半黃岑二錢五分為末傅之衛生寶鑑緑青本經上品釋名石緑唐本大緑綱目集解别録曰緑青生山之隂穴中色青白𢎞景曰此即用畫緑色者亦出穴青中相挾帶今畫工呼為碧青而呼穴青作緑青正相反矣恭曰緑青即扁青也畫工呼為石緑其碧青即白青也不入畫用頌曰舊不著所出州土但云生山之隂穴中次空青條上云生益州山谷及越嶲山有銅處此物當是生其山之隂爾今出韶州信州其色青白畫工用為緑色者極有大塊其中青白花文可愛信州人琢為腰帶器物及婦人服飾其入藥當用顆塊如乳㕿者佳宗奭曰其色黑緑色者佳時珍曰石緑隂石也生銅坑中乃銅之祖氣也銅得紫陽之氣而生緑緑久則成石謂之石緑而銅生於中與空青曾青同一根源也今人呼為大緑范成大桂海志云石緑銅之苗也出廣西古江有銅處生石中質如石者名石録一種脆爛如碎土者名泥緑品最下大明會典云青緑石礦淘淨緑一十一兩四錢暗色緑每礦一斤淘淨緑一十兩八錢􅚑砂一斤燒造􅚑砂緑一十五兩五錢氣味時珍曰有小毒主治益氣止泄痢療鼽鼻别録吐風痰甚效蘇頌發明頌曰今醫家多用吐風痰其法揀上色精好者研篩水飛再研如風痰眩悶取二三錢同生龍腦三四豆許研勻以生薄荷汁合酒溫調服之偃卧須臾涎自口角流出乃愈不嘔吐其功速于他藥今人用之比比皆效故著之宗奭曰同􅚑砂作吐上涎藥驗則驗矣亦能損心時珍曰痰在上宜吐之在下宜利之亦須觀人之虛實強弱而察其脈乃可投之初虞世有金虎碧霞之戒正此意也金虎丹治風痰用大雄賦粉諸藥者附方新四急驚昏迷不省人事石緑四兩輕粉一錢為末薄荷汁入酒調一字服取吐全嬰方風痰迷悶碧霞丹用石緑十兩鳥頭尖附子尖蠍稍各七十箇為末糊丸芡子大每服一丸薄荷汁入酒半合化下須臾吐出痰涎和劑局方小兒疳瘡腎疳鼻疳頭瘡耳瘡久不差者石緑白芷等分為末先以甘草水洗瘡拭淨傅之一日愈集玄方腋下胡臭石緑三錢輕粉一錢濃醋調塗五次斷根集玄方扁青本經上品釋名石青綱目大青時珍曰扁以形名集解别録曰扁青生朱崖山谷武都朱提采無時𢎞景曰朱提音殊匙在南海中仙經俗方都無用者普曰生蜀郡恭曰此即緑青也朱崖已南及林邑扶南舶上來者形塊大如拳其色又青腹中亦時有空者武昌者片塊小而色更佳簡州梓州者形扁作片而色淺時珍曰蘇恭言即緑青者非也今之石青是矣繪畫家用之其色青翠不渝俗呼為大青楚蜀諸處亦有之而今貨石青者有天青大青西夷回回青佛頭青種種不同而回青尤貴本草所載扁青層青碧青白青皆其類耳氣味甘平無毒普曰神農雷公小寒無毒主治目痛明目折跌癰腫金瘡不瘳破積聚解毒氣利精神久服輕身不老本經去寒熱風痺及丈夫莖中百病益精别録治丈夫內絶令人有子吳普吐風痰癲癎平肝時珍附方新一頑痰不化石青一兩石緑半兩並水飛為末麴糊丸緑豆大每服十丸溫水下吐去痰一二碗不損人瑞竹堂方白青本經上品釋名碧青唐本魚目青集解别録曰白青生豫章山谷采無時可消為銅劍辟五兵𢎞景曰醫方不用市無賣者仙經三十六水方中時有須處銅劍之法在九元子術中恭曰此即陶氏所云空青圓如鐵珠色白而腹不空者是也研之色白如碧亦謂之碧青不入畫用無空青時亦用之名魚目青以形似魚目故也今出簡州梓州者好時珍曰此即石青之屬色深者為石青淡者為碧青也今繪彩家亦用范子計然云白青出𢎞農豫章而新淦青色者善淮南萬畢術云白青得鐵即化為銅也氣味甘酸鹹平無毒普曰神農甘平雷公鹹無毒主治明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身本經附録緑膚青别録曰味辛鹹平無毒主蟲毒及蛇菜肉諸毒惡瘡不可久服令人瘻一名推青一名推石生益州山谷𢎞景曰俗方仙經無用人亦不識碧石青别録曰味甘無毒主明目益精去白癬延年石膽本經上品釋名膽礬綱目黑石本經畢石本經君石當之銅勒吳普立制石時珍曰膽以色味命名俗因其似礬呼為膽礬集解别録曰石膽生秦州羌道山谷大石間或羌里句青山二月庚子辛丑日采其為石也青色多白文易破狀似空青能化鐵為銅合成金銀𢎞景曰仙經時用俗方甚少此藥始絶今人時有采者其色青緑狀如琉璃而有白丈易破折梁州信都無復有俗乃以青色礬當之殊無髣佛恭曰此物出銅處有之形似曾青兼緑相間味極酸苦磨鐵作銅色此是真者出蒲州虞卿縣東亭谷窟及薛集窟中有塊如雞卵者為真陶云似琉璃者乃緑礬也比來人亦以充之又以醋揉青礬為之並偽矣頌曰今惟信州鉛山縣有之生於銅坑中采得煎鍊而成又有自然生者尤為珍貴並深碧色今南方醫人多使之又著其説云石膽最上出蒲州大者如拳小者如桃栗擊之縱橫解皆成疊文色青見用久則緑擊破其中亦青其次出上饒曲江銅坑間者粒細有亷稜如叉股米粒本草言偽者以醋揉青礬為之全不然但取粗惡石膽合消石銷溜而成之塊大色淺渾渾無脈理擊之則碎無亷稜者是也亦氣扶石者乃削取石膽牀溜造時投消石中乃疑則相著也時珍曰石膽出蒲州山穴中鴨觜色者為上俗呼膽礬出羌里者色少黑次之信州又次之此物乃生于石其經煎鍊者即多偽也但以火燒之成汁者必偽也塗于鐵及銅上燒之紅者真也又以銅器盛水投少許入中及不青碧數日不異者真也玉洞要訣云石膽陽石也出嵩嶽及蒲州中條山稟靈石異氣形如琴瑟其性流通精感入石能化五金變化無窮沈括筆談載鉛山有苦泉流為澗挹水熬之則成膽礬所熬之釡久亦化為銅也此乃煎熬作偽非真石膽也不可入藥氣味酸辛寒有毒普曰神農酸小寒李當之大寒桐君辛有毒扁鵲苦無毒大明曰酸澀無毒權曰有大毒之才曰水英為之使畏牡桂菌桂芫花辛夷白微主治明目目痛金瘡諸癎痙女子隂蝕痛石淋寒熱崩中下血諸邪毒氣令人有子鍊餌服不老久服增夀神仙本經散癓積刻逆上氣及鼠瘻惡瘡别録治蟲牙鼻內息肉大明帶下赤白靣黃女子臟急蘇恭入吐風痰藥最快蘇頌發明時珍曰石膽氣寒味酸而辛入少陽膽經其性收斂上行能涌風熱痰涎發散風火相火又能殺蟲故治咽喉口齒瘡毒有竒功也周密齊東時語云密過南浦有老醫授治喉痺極速垂死方用真鴨觜膽礬末醋調灌之大吐膠痰數升即瘥臨汀一老兵妻苦此絶水粒三日矣如法用之即瘥凡用無不立驗神方也又周必大隂德録云治蠱脹及水腫祕方有用蒲州信州膽礬明亮如翠琉璃似鴨觜者米醋煮以君臣之藥服之勝于鐵砂鐵蛾蓋膽礬乃銅之精液味辛酸入肝膽制脾鬼故也安城魏清臣腫科黑丸子消腫甚妙不傳即用此者附方舊五新一十五老小風痰膽礬末一錢小兒一字溫醋湯調下立吐出涎便醒談氏小兒方女人頭運天地轉動名曰心眩非血風也膽子礬一兩細研用胡餅劑子一箇按平一指厚以箆子勒成骰子大塊勿界斷于瓦上焙乾每服一骰子為末燈心竹茹湯調下許學士本事方喉痺喉風二聖散用鴨觜膽礬二錢半白僵蠶炒五錢研每以少許吹之吐涎濟生方齒痛及落研細石膽以人乳和膏擦之日三四次止痛復生齒百日後復故乃止每日以新汲水潄淨祕王燾外科要口舌生瘡衆療不差膽礬半兩入銀鍋內火煅赤出毒一夜細研每以少許傅之吐去酸涎水二三次瘥勝金方走馬牙疳北棗一枚去核入鴨觜膽礬紙包煅赤出入毒研末傅之追涎楊起間便方小兒齒疳鴨觜膽礬一錢匙上煅紅麝香少許研勻傅齦上立效活幼口議小兒鼻疳蝕爛膽礬燒煙盡研末摻之一二日愈集簡方風眼赤爛膽礬三錢燒研泡湯日洗明目經驗方百蟲入耳膽礬末和醋灌之即出千金方風犬咬毒膽礬末傅之立愈濟急方一切諸毒膽子礬末糯米糊丸如雞頭子大以朱砂為衣仍以朱砂養之冷水化一丸服立愈勝金方挑生蠱毒胸口痛者膽礬二錢茶清泡服即吐出嶺南衛生方腋下胡鼻膽礬半生半熟入膩粉少許為末每用半錢以自然薑汁調塗十分熱痛乃止數日一用以愈為度黎居士簡易方赤白癜風膽礬牡蠣粉各半兩生研醋調摩之聖濟録甲疽腫痛石膽一兩燒煙盡研末傅之不過四五度瘥梅師方痔瘡熱腫鴨觜青膽礬煅研蜜水調傅可以消脫直指方腫毒不破膽礬雀屎各少許點之直指方楊梅毒瘡醋調膽礬末搽之痛甚者加乳香沒藥出惡水一二日即乾津又方膽礬白礬水銀各三錢半研不見星入香油唾各少許和勻坐帳內取藥塗兩足心以兩手心對足心摩擦良久再塗再擦盡即卧汗出或大便去垢口出穢涎為驗每一次強者用四錢弱者二錢連用三日外服踈風散并澡洗劉氏經驗方礜石本經下品釋名白礜石太白石别録立制石本經青介石固羊石本經石鹽别録澤乳吳普鼠鄉吳普時珍曰礜義不解許氏説丈云礜毒石也西山經云臯塗之山有白石其名曰礜可以毒鼠郭璞注云鼠食則死蠶食而肥則鼠鄉之意以此集解别録曰礜石生漢中山谷及少室采無時當之曰或生少室或生魏興十二月采𢎞景曰今蜀漢亦有而好者出南康南野溪及彭城界中汶陽縣南塹又湖東新寧及零陵皆有白礜石能柔金以黃泥包炭火燒之一日一夕則解可用丹房及黃白術多用之恭曰此石能拒火久燒但解散不可脫其堅今市人乃取潔白理石當之燒即為灰也今漢川武當西遼坂名礜石谷即是真出處少室有粒細理不如漢中者頌曰今梁州階州亦有之時珍曰詳見特牛礜石下氣味辛大熱有毒别録曰甘生溫熟熱普曰神農岐伯辛有毒桐君黃帝甘有毒權曰甘有小毒鉛丹為之使惡羊血不入湯之才曰得火良棘針為之使惡馬目毒公鶩尿虎掌細辛畏水主治寒熱鼠瘻蝕死肌風痺腹中堅癖邪氣本經除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉久服令人筋攣火鍊百日服一刀圭不鍊服則殺人及百獸别録除胸膈間積氣去冷濕風痺瘙癢積年者甄權發明𢎞景曰常取生礜石納水令水不氷如此説則生者性亦大熱矣張仲景云生用破人心肝恭曰此藥攻擊積冷之病為良若以餘物代之療病無效正為此也宗輿曰治久積及久病腹冷用功直須慎用其毒不可試也時珍曰礜石性氣與砒石相近蓋亦其類也古方礜石礬石常相渾書蓋二字相似故誤耳然礬石性寒無毒礜石性熱有毒不可不審陸農師云礜石之力十倍鍾乳按洪容齋隨筆云王子敬靜息帖言礜石深是可疑凡喜散者輒發癰蓋散者寒食散也古人多服之中有礜石性熱有毒故云深可疑也劉表在荆州與王粲登彰山見一岡不生百草粲曰此必古冢其人在世服生礜石熱不出外故草木焦滅表掘之果有礜石滿塋又今洛水不氷下亦有礜石人謂之溫洛是也取此石安甕中水亦不氷文鸛伏卵取石置巢中以助溫氣其性如此豈可服豫兄文安公鎮金陵秋暑減食醫者湯三益教服礜石丸已而飲啖日進遂加意服之越十月而毒作衄血斗餘自是數數不止竟至精液皆竭而死時珍竊謂洪文安之病未必是礜石毒發蓋亦因其健啖自恃厚味房勞縱恣無忌以致精竭而死夫因感食而服石食既進則病去藥當止矣而猶服之不已恃藥妄作是果藥之罪歟附方新一風冷腳氣白礜石煅二斤酒三斗漬三日稍稍飲之肘后方特生礜石别録下品釋名蒼礜石蒼石别録鼠毒恭曰特生礜石一名蒼礜石梁州礜石赤有青者漢中人亦以毒鼠不入方用宗奭曰礜石特生礜石止是一物但以特生不特生為異耳所謂特生者不附著他石為特爾今用者絶少時珍曰礜石有蒼白二種而蒼者多特生故此云一名蒼礜石則别録蒼石係重出矣其功療皆相同今併為一集解别録曰特生礜石一名蒼礜石生西域采無時又曰蒼石生西域采無時𢎞景曰舊説鵲巢中者佳鵲常入水冷故取以壅卵令熱今不可得惟出漢中者其外形紫赤色內白如霜中央有白狀形如齒者佳又出荆州新城郡房陵縣縹白赤者為好亦先以黃土包燒一日亦可納斧孔中燒之今玉壺諸凡仙經不言特生止是白礜石耳恭曰陶説中如齒臼形者正是今出梁州北馬道戍澗中赤有之形塊小于白礜石而肌粒大數倍乃如小豆許其白礜粒細如粟米耳今房陵漢川均州荆州與白礜石同處有色青者是也宗奭曰博物志言鸛伏卵取礜石入巢助暖方家得此石乃真陶氏以注特生礜石則二石是一物明矣但屢檢鸛巢無此石况礜石焉得處處有之若鸛入水冷故取此石則鸕鷀之類皆食于水亦自然生化繁息此則乃俗士之言未嘗究其實而窮其理也時珍曰礜石有數種白礜石蒼礜石紫礜石紅皮礜石桃花礜石金星礜石銀星礜石特生礜石俱是一物但以形色立名其性皆熱毒並可毒鼠制永惟蒼白二色入藥用諸礜生于山則草木不生霜雪不積生于水則水不氷凍或有溫泉其氣之熱可知矣庚辛玉册云礜陽石也生山谷水中濯出似礬有文理橫截在其中為佳伏大制砂永其狀頗與方解石相似但投水不氷者為真其出金穴中者名雪礜石氣味甘溫有毒之才曰火煉之良畏水主治明目利耳腹內絶寒破堅結及鼠瘻殺百蟲惡獸久服延年别録蒼石主寒熱下氣瘻蝕殺禽獸别録發明時珍曰别録言礜石久服令人筋攣特生礜石久服延年丹書亦云礜石化為水能伏水銀煉入長生藥此皆方士謬説也與服砒石永長生之義同其死而無悔者乎掘雪礜石唐本草集解恭曰握雪礜石出徐州宋里山入土丈餘於爛土石間得之細散如麵黃白色土人號為握雪礜石一名化工石一名石腦云服之長生時珍曰謹按獨孤滔丹房鑑源云握雪礜石出曲灘澤盛寒時有髓生于石上可采一分結汞十兩又按南宫從岣嶁神書云石液即丹礬之脂液也此石出襄陽曲灘澤中或在山或在水色白而粗糯至冬月有脂液出其上旦則見日而伏當于日未出時以銅刀刮置器內火煅通赤取出楮汁為丸其液沾處便如鐵色以液一銖制水銀四兩器中火之立乾但此液亦不多得乃神理所惜采時須用白雞清酒祭之此石華山嵩山皆出而有脂液者惟此曲灘又熊太古冀越集亦言丹山礬十兩可乾汞十兩此乃人格物之精發天地之祕也據三書所引則握雪礜石乃石之液非土中石腦也蘇恭所説自是石腦其説與别録及陶𢎞景所注石腦相合不當復注于此又按諸書或作礜石或作礬石未知孰是古書二字每每訛混以理推之似是礬石礜石有毒礬石無毒故也氣味甘溫無毒主治痼冷積聚輕身延年多食令人熱唐本治大風瘡時珍砒石宋開寶釋名信石人言綱目生者名砒黃鍊者名砒霜時珍曰砒性猛如貔故名惟出信州故人呼為信石而又隱信字為人言集解頌曰砒霜不著所出郡縣今近銅山處亦有之惟信州者佳其塊有甚大者色如鵝子黃明徹不雜此類本處自是難得之物一兩大塊真者人兢珍之不啻千金古服食方中亦載用之必得此類乃可入藥其市肆所畜片如細屑亦夾土石入藥服之為害不淺承曰信州玉山有砒井官中封禁甚嚴生不夾石者色赤甚于雄黃以冷水磨解熱毒近火即殺人所謂不啻金價者此也今市貨者取山中夾砂石者燒煙飛作白霜乃碎屑而芒刺其傷火多者塊大而微黃所謂如鵝子色明徹者此也古方並不入藥惟燒煉丹石家用之近人多以治瘧但以瘧本傷暑而此物生者能解熱毒也今俗醫不究其理即以所燒霜服之必大吐下因此幸有安者遂為所損極多不可不慎初燒霜時人在上風十餘丈外立下風所近草木皆死又以和飯毒鼠死鼠貓犬食之亦死毒過于朱罔逺矣衡山所出一種力差劣于信州者宗奭曰今信鑿坑井下取之其坑常封鎖坑中有濁緑水先絞水盡然後下鑿取生砒謂之砒黃色如牛肉或有淡白路謂石非石謂土非土磨酒飲治積氣有火便有毒不可造次服也取法將生砒就置火上以器覆之令煙上飛著器凝結纍然下垂如乳尖者入藥為勝平短者次之大塊乃是下等片如細屑者極下也時珍曰此乃錫之苗故新錫器盛酒日久能殺人者為有砒毒也生砒黃以赤色者為良熟砒霜以白色者為良修治斆曰凡使用以小瓷瓶盛後入紫背天葵石龍芮二味火煅從已至申便用甘草水浸從申至子出栻乾入瓶再煅别研三萬下用時珍曰草家皆言生砒輕見火則毒甚而雷氏治法用火煅今所用多是飛鍊者蓋皆欲求速效不惜其毒也曷若用生者為愈乎氣味苦酸暖有毒時珍曰辛酸大熱有大毒大明曰畏緑豆冷水如入藥酸煮殺毒用土宿真君曰砒石用草制鍊出金花成汁化銅乾永青鹽鶴項草消石蒜水蓼常山益母獨帚水律菖蒲三角酸鵝不食草波稜萵苜皆能伏砒主治砒黃治瘧疾腎氣帶之辟蚤虱大明冷水磨服解熱毒治痰壅陳承磨服治癖積氣宗奭除齁喘積痢爛肉蝕瘀腐瘰􅊓時珍砒霜療諸瘧風痰在胸膈可作吐藥不可久服傷人開寶治婦人血氣衝心痛落胎大明蝕癰疽敗肉枯痔殺蟲殺人及禽獸時珍發明宗奭曰砒霜瘧家用或過劑則吐瀉兼作須煎緑豆汁兼冷水飲之徐純曰瘧丹多用砒霜大毒之藥本草謂主諸瘧風疾在胸膈可作吐藥蓋以性之至烈大能燥痰也雖有燥痰之功大傷胸氣脾胃虛者切宜戒之時珍曰砒乃大熱大毒之藥而砒霜之毒尤烈鼠雀食少許即死貓犬食鼠雀亦殆人服至一錢許亦死雖鉤吻射罔之力不過如此而宋人著本草不甚言其毒何哉此亦古者礜石之一種也若得酒及燒酒則腐爛腸胃頃刻殺人雖緑豆冷水亦難解矣今之收瓶酒者往往以砒煙熏瓶則酒不壞其亦嗜利不仁者哉飲酒潛受其毒者徒歸咎于酒耳此物不入湯飲惟入丹丸凡痰瘧及齁喘用此真有劫病立地之效但須冷水吞之不可飲食杯勺之物靜卧一日或一夜亦不作吐少物引發即作吐也其燥烈純熱之性與燒酒熖消同氣寒疾濕痰被其劫而怫鬱頓開故也今煙大家用少許則爆聲更大急烈之性可知矣此藥亦止宜于山野藜藿之人若嗜酒膏梁者非其所宜疾亦再作不慎口欲故爾凡頭瘡及諸瘡見血者不可用此其毒入經必殺人李樓竒方云一婦病心痛數年不愈一醫用人言半分茶末一分白湯調下吐瘀血一塊而愈得日華子治婦人血氣心痛之旨乎附方舊五新十中風痰壅四肢不收昏憒若醉砒霜如緑豆大研新汲水調下少許以熱水投之大吐即愈未吐再服聖惠方寒熱痁疾孫真宗祕寶方用信砒二兩研粉寒水石三兩别搗末用生鐵銚一箇鋪石末後鋪砒在上又以石末蓋之厚盞覆定醋糊紙條蜜封十餘重炭火一斤煅之待紙條黑時取出候冷刮盞上砒末乳細粟米飯丸緑豆火辰砂為衣每用三四丸小兒一二丸發日早以臘茶清下一日不得食熱物男人患女人著藥入口中女人患男人著藥入口中本事方用人言一錢緑豆末一兩為末無根井水丸緑豆大黃丹為衣隂乾發日五更冷水下五七丸衛生寶鑑一剪金用人言醋煮硫黃緑豆等分為末每一豆許用紅絹包之采絲扎定每剪下一粒新汲水空心吞下治瘧聖藥也錢醫纍元戎九轉靈砂丹用砒霜黃丹紫河車各一為末雄黑豆一百粒水浸一夜研泥和丸梧子緑豆黍米三樣大每服一二十丸發日五更向東無根水下紫河車緑豆黑豆皆解砒毒也斤本草權度不二散用砒一錢麵二兩和勻香油一煎黃色以草紙壓去油入茶三兩為末每服一錢發日早冷茶下一切積利砒霜黃丹等分蠟和收旋丸緑豆大每米飲下三丸普濟方休息下痢經一二年不瘥嬴瘦衰弱砒霜成塊者為末黃丹各半兩化蠟入砒以栁條覺焦則換至七條取起收之每旋丸梧子大冷水送下小兒黍米大和劑局方脾疼腰痛即上方用冷水下婦人血氣心痛方見發明下走馬牙疳惡瘡砒石銅緑等分為末攤紙上貼之其效如神米又方砒霜半兩醋調如糊碗內盛待乾刮下用粟大綿褁安齒縫來日取出有蟲自死久患者不過三日即愈普濟方項上瘰􅊓梁州砒黃研末濃墨汁丸梧子大銚內炒乾竹筒盛之每用針破將藥半丸貼之自落蝕盡為度靈苑方痰喘齁䶎方見榖部豉下一切漏瘡有孔用信石新瓦火煅研末以津調少許於紙撚上插入蝕去惡管漏多勿齊上最妙易急救方土黃綱目修治時珍曰用砒石二兩木鱉子仁巴豆仁各半兩硇砂二錢為末用木鱉子油石腦油和成一塊油褁埋土坑內四十九日取出劈作小塊籖器收用氣味辛酸熱有毒獨孤滔曰土黃制雄黃主治枯瘤贅痔乳食瘻癧并諸瘡惡肉時珍金星石宋嘉祐附銀星石集解頌曰金星石銀星石並出濠州并州采無時二石主療大體相似宗奭曰二石治大風疾别有法須燒用之金星石生於蒼石內外有金色麩片銀星石有銀色麩片又一種深青色堅潤中有金色如麩片者不入藥用工人碾為器或婦人首飾用時珍曰金星有數種蘇頌所説二石武當山亦有之或云金星出膠東銀星出雁門蓋亦礞石之類也冦宗奭所説二石治大風者今考聖惠方大風門皆作金星礜石銀星礜石則似是礜石之類丹方鑑源礜石篇中亦載二石名似與蘇説者不同且金星銀星無毒主熱涎血病礜石則有毒主風癩疾觀此則金星銀星入藥各有二種矣又歙州硯石亦有金星銀星者璚州亦出金星石皆可作硯翡翠石能屑金亦名金星石此皆名同物異也劉河間宣明方點眼藥方中用金精石銀精石不知即此金星銀星否也氣味甘寒無毒主治脾肺壅毒及肺損吐血嗽血下熱涎解衆毒嘉祐水磨少許服鎮心神不寧亦治骨哽時珍附方新二吐血嗽血肺損者金星石銀星石玄精石不灰水陽起石雲母石等分用坩鍋一箇鋪冬月水牛糞一二寸鋪藥一層鋪灰二寸又藥一層重重如此以灰蓋之鹽泥固濟用炭一稱火煅一日夜埋土中一夜取出藥塊去灰為末每一兩入龍腦麝香各半錢阿膠二錢半炒每服一錢糯米湯下日三服聖惠方大風蟲瘡有五色蟲取下諸石丸用金星礜石銀星礜石雲母石禹餘糧石滑石陽起石慈石凝水石蜜陀僧自然銅龍涎石等分搗碎瓶盛鹽泥固濟之炭火十斤煅過為末醋糊丸小豆大每服十五丸白花蛇酒下一日三服以愈為度太平聖惠方附録金石拾遺藏器曰味甘溫無毒主久羸瘦不能食無顔色補腰腳冷令人健壯益陽有暴熱脫髮飛鍊服之生五臺山清涼寺石中金屑作赤褐色也婆娑石宋開寶釋名摩挲石時珍曰姚西溪叢話云舶船過産石山下愛其石以手捫之故曰摩挲不知然否集解志曰婆娑石生南海胡人采得之其石緑色無班點有金星磨成乳汁者為上又有豆班石雖亦解毒而功力不及復有鄂緑有文理磨鐵成鋼色人多以此為之非真也驗法以水磨點雞冠熱血當化成水是也宗奭曰石如淡色石緑間微有金星者佳又有豆班石亦如此石但有黑班點無金星頌曰胡人尤珍貴之以金裝飾作指彄帶之每欲食及食罷輒含吮數次以防毒今人有得指靣許塊則價直百金也時珍曰庚辛玉册云摩挲石陽石也出三佛齊海南有山五色聳峙其石有光熖其水下滚如箭船過其下人以刀斧擊取燒之作硫黃氣以形如黃龍齒而堅重者為佳匱五金伏三黃制鉛汞氣味甘痰寒無毒主治解一切藥毒瘴疫熱悶頭痛開寶礞石宋嘉祐釋名青礞石時珍曰其色濛濛然故名集解時珍曰礞石江北諸山往往有之以旴山出者為佳有青白二種以青者為佳堅細而青黑打開中有白星點煅後則星黃如麩金其無星點者不入藥用通城縣一山産之工人以為器物修治時珍曰用大坩鍋一箇以礞石四兩打碎入消石四兩拌勻炭火十五斤簇定煆至消盡其石色如金為度取出研末水飛去消毒晒乾用氣味甘鹹平無毒主治食積不消留滯臟腑宿食癥塊久不瘥小兒食積羸瘦婦人積年食癥攻刺心腹得巴豆硇砂大黃荆三稜作丸服良嘉祐治積痰驚癎咳嗽喘急時珍發明時珍曰青礞石氣味平鹹其性下行隂也沉也乃厥隂之藥舟經風木大過來制脾上氣不運化積滯生痰壅塞上中二焦變主風熱諸病故宜此藥重墜制以消石其性踈快使木平氣下而痰積通利諸證自除湯衡嬰孩寶鑑言礞石乃治驚利痰之聖藥吐痰在水上以石末糝之痰即隨水而下則其沉墜之性可知然止可用之救急氣弱脾虛者不宜久服楊士瀛謂其功能利痰而性非胃家所好如慢驚之類皆宜佐以木香而王隱君則謂痰為百病不論虛實寒熱概用滚痰丸通治百病豈理也哉朱丹溪言一老人忽病目盲乃大虛證一醫與礞石藥服之至夜而死吁此乃盲醫虛虛之過礞石豈殺人者乎况目盲之病與礞石並不相干附方新四滚痰丸通治痰為百病惟水瀉雙娠者不可服礞石熖硝各二兩煅過研飛晒乾一兩大黃酒蒸八兩黃岺酒洗八兩沉香五錢為末水丸梧子大常服一二十丸欲利大便則服一二百丸溫水下主王隱君養生論一切積病金寶神丹治一切虛冷久積滑泄久痢癖塊血刺心腹下痢及婦人崩中漏下青礞石半斤為末消石末二兩坩鍋內鋪頭蓋底按實炭火二十斤煅過取出入赤石脂末二兩滴水丸芡子大候乾入坩鍋內下火煅紅收之每服一丸至二三丸空心溫水下少許壓之久病瀉痢加至五七丸楊氏家藏方急慢驚風奪命散治急慢驚風痰涎壅塞咽喉命在須臾服此墜下風痰乃治驚利痰之聖藥也真礞石一兩熖消一兩同煅過為末每服半錢或一錢急驚痰熱者薄荷自然汁入生蜜調下慢驚脾虛者木香湯入熟蜜調下亦或雪羔丸緑豆大每服二三丸孩湯氏嬰寶鑑小兒急驚青礞石磨水服衛生方花乳石宋嘉祐釋名花蘃石宗奭曰黃石中間有淡白點以此得花之名圖經作花蘃石是取其色黃也集解禹錫曰花乳石出陜華諸郡色正黃形之大小方圓無定頌曰出陜州閿鄉體至堅重色如硫黃形塊冇極大者陜西人鐫為器用采無時時珍曰玉册云花乳石隂石也生代州山谷中有五色可代丹砂匱藥蜀中汶山彭縣亦有之修治時珍曰凡入丸散以罐固濟頂火煅過出大毒研細水飛晒乾用氣味酸澀平無毒主治金瘡出血刮末傅之即合仍不作膿又療婦人血運惡血嘉祐治一切失血傷損內漏目翳時珍發明頌曰花蘃石古方未有者近世以此合硫黃同煅研末傅金瘡其效如神人有倉卒中金創不及煅治者但刮末傅之亦效時珍曰花蘃石舊無氣味今嘗試之其氣平其味澀而酸蓋厥隂經血分藥也其功専于止血能使血化為水酸以收之也而又能下死胎落胞衣去惡血惡血化則胎與胞無阻滯之患矣東垣所謂胞衣不出澀劑可以下之故赤石脂亦能下胞胎與此同義葛可久治吐血出升斗有花蘂石散和劑局方治諸血及損傷金瘡胎産有花蘂石散皆云能化血為水則此石之功蓋非尋常草木之比也附方新五花蘂石散治五內崩損噴血出斗升用此治之花蘂石煅存性研如粉以童子小便一鍾男入酒一半女入醋一半煎溫食後調復三錢甚者五錢能使瘀血化為黃水後以獨參湯補之藥葛可久十神書花蘂石散治一切金創箭簇傷及打撲傷損狗咬至死者急以藥摻傷處其血化為黃水再摻便活更不疼痛如內損血入臟腑煎童子小便入酒少許熱調一錢服立效􅀈牲抵傷腸出不損者急納入桑白皮線縫之摻藥血止立活婦人産後及血不盡血運惡血奔心胎死腹中胎衣不下至死但心頭溫暖者急以童子小便調服一錢取下惡物如豬肝終身不患血風血氣若膈上有血化為黃水即時吐出或隨小便出甚效硫黃四兩花蘂石一兩並為粗末拌勻以膠泥固濟日乾瓦罐一箇盛之泥封口焙乾安在西方磚上磚上書八卦五行字用炭一稱簇匝從巳午時自下生火服至炭消冷定取出為細末瓶收用之和劑局方金瘡出血方見主治多年障翳花蘂石水飛焙防風川芎藭甘菊花白附子牛蒡子各一兩甘草炙半兩為末每服半錢臘茶下衛生家寶方腳􅀈出水好黃丹入花蘂石末摻之談野翁試效方白羊石宋圖經集解頌曰生兗州白羊山春中掘地采之以白瑩者為良又有黑羊石生兗州宫山之西亦春中掘地采之以黑色有墻壁光瑩者為上氣味淡生涼熟熱無毒主治解藥毒黑羊石同蘇頌金牙石别録下品釋名黃牙石時珍曰象形集解别録曰金牙生蜀郡如金色者良𢎞景曰今出蜀漢似粗金大如碁子而方又有銅牙亦相似但外黑內色小淺不入藥用恭曰金牙離本處入土水中久皆黑色不可謂之銅牙也此出漢中金牙湍湍兩片石間打出者內即金色岸頽入水久者皆黑近南山溪谷茂州維州亦有勝于漢中者頌曰今雍州亦有之時珍曰崔昉本草云金牙石陽石也生川陜山中似蜜粟子有金點形者妙聖濟經治癘風大方中用金牙石銀牙石銀牙恐即金牙石之白色者爾方書並無言及者姑闕修治大明曰入藥燒亦去粗乃用氣味鹹平無毒大明曰甘平主治鬼疰毒蟲諸疰别録治一切冷風氣筋骨攣急腰腳不遂燒浸酒服甄權暖腰膝補水臟驚悸小兒驚癎大明發明𢎞景曰金牙惟酒散及五疰丸用之餘方少用頌曰葛洪肘後方治風毒厥有大小金牙酒但浸其汁飲之孫思邈千金方治風毒及鬼疰南方障氣傳尸等各有大小金牙散之類是也小金牙酒主風疰百病虛勞濕冷緩弱不仁不能行步近人用之多效故著其法云金牙細辛莽草防風地膚子地黃附子茵蕷續斷蜀椒蒴藋根各四兩獨活一斤十二物金牙搗末别盛練囊餘皆薄切同入一大囊以清酒四斗漬之密器泥口四宿酒成溫服二合日二次取效金剛石綱目釋名金剛鑽時珍曰其砂可以鑽玉補瓷故謂之鑽集解時珍曰金剛石出西畨天竺諸國葛洪抱朴子云扶南出金剛生水底石上如鍾乳狀體似紫石英可以刻玉人沒水取之雖鐵椎擊之亦不能傷惟羚羊角扣之則漼然氷泮丹房鑑源云紫背鉛能碎金剛鑽周密齊東野語云玉人攻玉必以邢河之砂其鐫鏤之具有金剛鑽者其形如鼠矢青黑色如石如鐵相傳出西域回紇高山頂上鷹帶食入腹中遺糞于河北砂磧間往往得之然竟莫知為何物也記云大秦國出金剛一名刻玉刀大者長尺許小者如稻黍著環中可以刻玉觀此則金剛有甚大者畨僧以充佛牙是也欲辨真偽但燒赤淬醋中如故不酥辟者為真若覺鈍則煅赤冷定即鋭也故西方以金剛喻佛性羚羊角喻煩惱十洲記載西海流砂有昆吾石治之作劍如鐵光明如水精割玉如泥此亦金剛之大者又獸有貘及嚙鐵狡兔皆能食鐵其糞俱可為兵切玉詳見獸部貘下主治磨水塗湯火傷作叉鐶服佩辟邪惡毒氣時珍砭石音邉綱目釋名鐵石集解時珍曰按東山經云髙氏之山鳬麗之山皆多鐵石郭璞注云可為砭鐵也素問異法方宜論云東方之域魚鹽之地海濵嗙水其病為瘡瘍其治宜砭石故砭石亦從東方來王氷注云砭石如玉可以為針蓋古者以石為針季世以針代石今人又以瓷針刺病亦砭之遺意也但砭石無識者豈即石砮之屬為之歟附録石砮時珍曰石砮出肅慎國人以枯木為矢青石為鏃施毒中人即死石生山中禹貢荆州梁州皆貢砮即此石也又南方藤州以青石為刀劍如銅鐵婦人用作環玦琉璃國人墾田以石為刀長尺餘皆此類也主治刺百病癰腫越砥别録中部釋名磨刀石藏器羊肝石綱目礪石時珍曰尚書荆州厥貢砥礪注云砥以細密為名礪以粗糲為稱俗稱者為羊肝石因形色也𢎞景曰越砥今細礪石也出臨平氣味甘無毒主治目盲止痛除熱瘙本經磨汁點目除障翳燒赤投酒飲破血瘕痛切藏器礪石主治破宿血下石淋除結瘕伏鬼物惡氣燒赤投酒中飲之人言踏之患帶下未知所由藏器磨刀垽一名龍白泉粉主治傅蠼螋尿瘡有效藏器塗瘰􅊓結核時珍薑石唐木草釋名􅀈礰石時珍曰薑石以形名或作礓礫邵伯溫云天有至戾地有至幽石類得之則為礓礫是也俗作􅀈礰集解恭曰薑石所在有之生土石間狀如薑有五種以色白而爛不磣者良齊城歷城東者好采無時宗奭曰所在皆有須不見日色旋取微白者佳氣味鹹寒無毒主治熱踠豆瘡丁毒等腫唐本附方舊二新三丁瘡腫痛白薑石末和雞子清傅之乾即易丁自出神驗崔氏方乳癰腫大如碗腫痛方同上外臺祕要産後脹衝氣噎􅀈礰石代赭石等分為末醋糊丸梧子大每服三五十丸醋湯下潔古保命集通身水腫薑石燒赤納黑牛尿中熱服日飲一升方千金麥飯石宋圖經釋名時珍曰象形集解時珍曰李迅云麥飯石處處山溪中有之其石大小不等或如拳或如鵝卵或如盞或如餅大略狀如掘聚一團麥飯有粒點如豆如米其色黃白但於溪間麻石中尋有此狀者即是古方云曾作磨者佳誤矣此石不可作磨若無此石但以舊麵磨近齒處石代之取其有麥性故耳氣味甘溫無毒主治一切癰疽發背時珍發明頌曰大凡石類多主癰疽世傳麥飯石膏治發背瘡甚效乃中嶽山人吕子華祕方裴員外啖之以名第河南尹脅之以重刑吕寧絶榮望守死不傳其方取此石碎如碁子炭火燒赤投米醋中浸之如此十次研末篩細入乳鉢內用數人更碾五七日要細膩如麵四兩鹿角一具要生取連腦骨者其自脫者不堪用每二三寸截之炭火燒令煙盡即止為末研細二兩白斂生研末二兩用三年米醋入銀石器內煎令魚目沸旋旋入藥在內竹杖子不住攪熬一二時久稀稠得所傾在盆內待冷以紙蓋收勿令塵入用時以鵝翎拂膏于腫上四圍赤處盡塗之中留錢大泄氣如末有膿即內消已作頭即撮小已潰即排膿如湍水若病久肌肉爛落見出筋骨者即塗細布上帖之乾即易逐日瘡口收斂但中隔不穴者即無不瘥已潰者用時先以豬蹄湯洗去膿血故帛挹乾乃用藥其瘡切忌手觸動嫩肉仍不可以口氣吹風及肢氣月經有孕人見之合藥亦忌此等初時一日一洗一換十日後二日一換此藥要極細方有效若不細塗之即極痛也此方孫真人千金月令已有之但不及此詳悉耳又北齊馬嗣明治楊遵彥背瘡取用黃石如鵝卵大者猛火燒赤納濃醋中當有屑落醋中再燒再淬石至盡取屑日乾搗篩極細末和醋塗之立愈劉禹錫傳信方謂之鍊石法用傳瘡腫無不驗水中白石拾遺集解時珍曰此石處處溪澗中有之大者如雞子小者如指頂冇黑白二色入藥用白小者主治食魚鱠多脹滿成瘕痛悶日漸嬴弱取數十枚燒赤投五升水中七遍熱飲如此三五度當利出瘕也又燒淬水中納鹽三合洗風瘙癮疹藏器治背上忽腫如盤不識名者取一二碗燒熱投水中頻洗之立瘥蘇頌發明時珍曰昔人有煮石為良法即用此石也其法用胡蔥汁或地榆根等煮之即熟如芋謂之石羮抱朴子云洛陽道士董威辟榖方用防風子甘草之屬十許種為散先服三方寸七乃吞石子如雀卵十二枚足百日不食氣力顔色如故欲食則飲葵湯下去石子又有赤龍血青龍膏皆可煮石又有引石散投方寸七可煮白石子一斗立熟如芋可食河沙拾遺釋名砂小石也字從少石會意主治石淋取細曰沙三升炒熱以酒三升淋汁服一合日再服又主絞腸沙痛炒赤冷水淬之澄清服一二合時珍風濕頑痺不仁筋骨攣縮冷風癱緩血脈斷絶六月取河砂烈日暴令極熱伏坐其中冷即易之取熱徹通汗隨病用藥切忌風冷勞役藏器附方新一人溺水死白沙炒覆死人靣上下惟露七孔冷濕即易千金杓上砂綱目集解時珍曰此淘米杓也有木杓瓢杓皆可用主治靣上風粟或青或黃赤隱暗澀痛及人唇上生瘡者本家杓上刮去唇砂一二粒即安又婦人吹乳取砂七枚溫酒送下更以炊帚枝通乳孔此皆莫解其理時珍石燕唐本草集解李績曰石燕出零陵恭曰永州祁陽縣西北一十里有土岡上掘深丈餘取之形似蚶而小堅重如石也俗云因雷雨則自石穴中出隨雨飛隋者妄也頌曰祁陽縣江畔沙灘上有之或云生洞中凝僵似石者佳采無時宗奭曰石燕如蜆蛤之狀色如土堅重如石既無羽翼焉能飛出其言近妄時珍曰石燕有二一種是此乃石類也狀類燕而有文圓大者為雄長小者為雌一種是鍾乳穴中石燕似蝙蝠者食乳汁能飛乃禽類也見禽部禽石燕食乳食之補助與鍾乳同功故方書助陽藥多用之俗人不知往往用此石為助陽藥刋于方册誤矣氣味甘涼無毒主治淋疾煮汁飲之婦人難産兩手各把一枚立驗唐本療眼目障翳諸般淋瀝久患消渴臟腑頻瀉腸風痔瘻年久不瘥靣色虛黃飲食無味婦人月水湛濁赤白帶下多年者每日磨汁飲之一枚用三日以此為準亦可為末水飛過每日服半錢至一錢米飲服至一月諸疾悉平時珍發明時珍曰石燕性涼乃利竅行濕熱之物宋人修本草以食鍾乳禽石燕混收入此石燕下故世俗誤傳此石能助陽不知其正相反也附方舊三新七傷寒尿澀小腹脹滿石燕為末蔥白湯調半錢脹通為度見聖惠方小便淋痛石燕子七枚搗黍米大新桑根白皮三兩銼拌勻分作七帖每帖用水一盞煎七分空心午前各一服簡要濟衆血淋心煩石燕子商陸赤小豆紅花等分為末每服一錢蔥白湯調下方聖惠久年腸風石燕磨水常服勿歇靈苑方赤白帶下多年不止石燕一枚磨水服立效徐氏家傳方襁褓吐乳咳嗽久不愈石燕子為末以蜜調少許塗唇上日三五次衛生寶鑑牢牙止痛石燕三對火煅醋淬七次青鹽乳香各一兩細辛半兩為未揩之荆芥湯潄口一方去乳香細辛加麝香齒踈不堅石燕子五對火煅米醋淬七次為末青鹽麝香各少許研勻日用揩牙後以溫酒嗽燕之元遺山方服石發動石燕子七箇打碎水煮頻洗聖濟拳毛倒睫摘去拳毛石燕一雌一雄磨水點後以黃連水洗乾坤生意石蟹宋開寶集解志曰石蟹生南海云是尋常蟹爾年月深久水沫相著因化成石每遇海潮即漂出又有一種入洞穴年深者亦然皆細研水飛入諸藥相助用之頌曰近海州郡皆有之體質石也而都與蟹相似但有泥與粗石相著爾時珍曰按顧玠海槎録云崖州榆林港內半里許土極細膩最寒但蟹入則不能運動片時成石矣人獲之名石蟹置之几案云能明目也復有石蝦似蝦出海邉石魚似魚出湘山縣石魚蝦並不入藥用一統志言鳯翔汧陽縣西有山魚隴掘地破石得之云可辟蠧氣味鹹寒無毒主治青盲目淫膚翳丁翳漆瘡開寶解一切藥毒并蠱毒天行熱疾催生落胎療血運並熱水磨服大明醋摩傅癰腫熟水磨服解金石毒蘇頌附方新一喉痺腫痛石蟹磨水飲并塗喉外聖濟録石蛇宋圖經集解頌曰石蛇出南海水旁山石間其形盤屈如蛇無首尾內空紅紫色以左盤者良又似車螺不知何物所化大抵與石蟹同類功用亦相近宗奭曰石蛇色如古墻上土盤結如查梨大空中兩頭巨細一等不與石蟹同類蟹則真蟹所化蛇非真蛇今人用之絶少時珍曰按姚寬西溪叢話云南恩州海邉有石山觜每蟹過之則化為石蛇過亦然此説不知果否若然則石蛇亦真蛇所化氣味鹹平無毒主治解金石毒蘇頌石蠶宋開寶釋名石僵蠶綱目集解志曰石蠶生海岸石旁狀如蠶其實石也氣味苦熱無毒藥訣曰苦熱有毒獨孤滔曰制丹砂主治金瘡止血生肌破石淋血結磨服當下辟石開寶石鱉綱目集解時珍曰石鱉生海邉形狀大小儼如􅀈蟲蓋亦化成者􅀢蟲俗名土鱉氣味甘涼無毒主治淋疾血病磨水服時珍蛇黃唐本草集解恭曰蛇黃出嶺南蛇腹中得之圓重如錫黃黑青雜色志曰蛇黃多赤色有吐出者野人或得之頌曰今越州信州亦有之今醫所用云是蛇冬蟄時所含土到春發蟄吐之而去大如彈丸堅如石外黃內黑色二月采之與舊説不同未知孰是時珍曰蛇黃生腹中正如牛黃之意世人因其難得遂以蛇含石代之以其同出於蛇故爾廣西平南縣有蛇黃圖土人九月掘下七八尺始得蛇黃大者如雞子小者如彈丸其色紫庚辛玉册云蛇含自是一種石云蛇入蟄時含土一塊起蟄時化作黃石不稽之言也有人掘蛇窟尋之並無此説修治大明曰入藥燒赤醋淬三四次研末水飛用氣味冷無毒主治心痛疰忤石淋小兒驚癎婦人産難以水煮研服汁唐本鎮心大明磨汁塗腫毒時珍附方新六暗風癎疾忽然仆地不知人事良久方醒蛇黃火煅醋淬七次為末每調酒服二錢數服愈年深者亦效危氏得效方驚風癎疳神穴月治急驚風癎疾天弔疳熱等證用紫色蛇黃四兩煅過豶豬屎二兩小者泥圖服過鐵粉一兩朱砂半兩麝香一錢為末糯粉糊丸茨子大漆盤晒乾看之每丸有一小穴故名神穴丹每服一丸薄荷酒化下立醒疳熱冷水化下靈苑方小兒項軟因風虛者蛇含石一塊煅七次醋淬七次研鬱金等分為末入麝香少許白米飯丸龍眼大每服一丸薄荷湯化服一日一服活幼全書瘴瘧鬼瘧食瘧蛇含石末一兩信石末一兩研勻入水火鼎內上以盞蓋六一泥固濟煅至藥升在盞刮下為末米榚糊丸緑豆大雄黃為衣每服一丸黑豆研水五更送下摘玄方血痢不止蛇含石二枚火煅醋淬末每服三錢米飲下普濟方腸風下血脫肛蛇黃二顆火煅醋淬七次為末每服三錢陳米飲下普濟方霹靂砧拾遺釋名雷揳時珍曰舊作針及屑誤矣集解藏珍曰此物伺候震處掘地三尺得之其形非一有似斧刀者銼刀者有穴二孔者一云出雷州并河東山澤間因雷震後得者多似斧色青黑班文至硬如玉或言是人間石造納與天曹不知事實時珍曰按雷書云雷斧如斧銅鐵為之雷砧似砧乃石也紫黑色雷鎚重數斤雷鑽長尺餘皆如銅鐵雷神以劈物擊物者雷環如玉環乃雷神所珮遺落者雷珠乃神龍所含遺下者夜光滿室又博物志云人間往往見細石形如小斧名霹靂斧一名霹靂楔玄中記云玉門之西有一國山上立廟國人年年出鑽以給雷用此謬言也雷雖隂陽二氣激薄有聲實有神物司之故亦隨萬物啓蟄斧鑽砧鎚皆實物也若曰在天成象在地成形如星隕為石則雨金石雨粟麥雨毛血及諸異物者亦在地成形者乎必太虛中有神物使然也陳時蘇紹雷鎚重九斤宋時沈括于震木之下得雷楔似斧而無孔鬼神之道幽微誠不可究極主治無毒主大驚失心恍惚不識人并石淋磨汁服亦煮服作枕除魔夢不祥藏器刮末服主瘵疾殺勞蟲下蠱毒止泄泄置箱篢間不生蛀蟲諸雷物珮之安神定志治驚邪之疾時珍出雷書雷墨綱目集解時珍曰按雷書云凡雷書木石謂本札入二三分青黃色或云雄黃青黛丹砂合成以雷楔書之或云蓬雷山石脂所書雷州每雷雨大作飛下如沙石大者如塊小者如脂堅硬如石黑色先豔至重劉恂嶺表録云雷州驟雨後人于野中得石如黳石謂之雷公墨扣之錚然光瑩可愛又李肇國史補云雷州多雷秋則伏蟄狀如人掘取食之觀此則雷果有物矣主治小兒驚癎邪魅諸病以桃符湯磨服即安時珍本草綱目卷十
