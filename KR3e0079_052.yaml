body:
  text: 本草綱目卷十九目録草之八水草類二十二種內附四種澤瀉本經酸惡附蔛草唐本羊蹄本經酸模日華蛇牛舌麕舌舌附龍舌草綱目菖蒲本經白菖别録香蒲本經蒲黃本經菰别録苦草綱目水萍本經蘋吳普萍蓬草拾遺莕菜唐本草蓴别録水藻綱目海藻本經海藴拾遺海帶嘉祐昆布别録越王餘算拾遺石帆日華水松綱目右附方舊四十八新七十一本草綱目卷十九目録
