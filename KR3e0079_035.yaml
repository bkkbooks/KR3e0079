body:
  text: 本草綱目卷十二目録草部李時珍曰天造地化而草木生焉剛交于柔而成根荄柔交于剛而成枝幹葉萼屬陽華實屬隂由是草巾有木木中有草得氣之粹者為良得氣之戾者為毒故有五形焉金木水火土五氣焉香臭臊腥膻五色焉青赤黃白黑五味焉酸苦甘辛鹹五性焉寒熱溫涼平五用焉升降浮沉中炎農嘗而辨之軒岐述而著之漢魏唐宋明賢良醫代有增益但三品雖存淄澠交混諸條重出涇渭不分茍不察其精微審其善惡何以權七方衡十劑而寄死生耶于是翦繁去復繩繆補遺析族區類振綱分目除穀菜外凡得草屬之可供醫藥者六百一十種分為十類曰山曰芳曰隰曰毒曰蔓曰水曰石曰苔曰雜曰有名未用舊本草部上中下三品共四百四十七種今併入三十一種移二十三種入菜部三種入穀部四種入果部二種入木部自木部移併一十四種蔓草二十九種菜部移併一十三種果部移併四種外類有名未用共二百四十七種神農本草經一百六十四種梁陶𢎞景注名醫别録一百三十種陶𢎞景注未七十八種有名用李氏藥録一種魏李當之吳氏本草一種魏吳普唐本草三十四種唐蘇恭藥性本草一種唐甄權本草拾遺六十八種唐陳藏器食療本草二種唐孟詵海藥本草四種唐李珣四聲本草一種唐蕭炳開寶本草三十七種宋馬志嘉祐本草一十七種宋掌禹錫圖經本草五十四種宋蘇頌日華本草七種宋人大明用藥法象一種元李杲本草補遺一種元朱震亨本草會編一種明汪機本草綱目八十六種明李時珍附注宋雷斆炮炙論唐楊損之刪繁北齊徐之才藥對唐孫思邈千金蜀韓保升重注宋寇宗奭衍義南唐陳士良食性唐愼微證類陳承别説湯液元王好古金張元素珍珠囊吳瑞日用明汪潁食物陳嘉謨蒙筌王綸集要憲王救荒寧原食鑑草之一山草類上三十一種甘草本經黃耆本經人參本經沙參本經薺苨别録桔梗本經長松拾遺黃精别録萎㽔本經鹿藥委蛇附知母本經肉蓯蓉本經列當開寶瑣陽補遺赤箭天麻本經术本經狗脊本經貫衆本經巴戟天本經附巴棘逺志本經百脈根唐本淫羊藿本經仙茅開寶玄參本經地榆本經丹參本經紫參本經王孫本經紫草本經白頭翁本經白及本經三七綱目右附方舊八十六新二百六十本草綱目卷十二目録
