  text: 本草綱目卷一目録序例歴代諸家本草引據古今醫家書目引據古今經史百家書目采集諸家本草藥品總數神農本經名例陶氏别録合藥分劑法則采藥六氣嵗物七方十劑氣味陰陽五味宜忌標本陰陽升降浮沉四時用藥例五運六滛用藥式五臓六腑用藥氣味補瀉五臟五味補瀉臟腑虚實標本用藥式引經報使本草綱目卷一目錄
