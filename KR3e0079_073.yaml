body:
  text: 本草綱目卷二十九明李時珍撰果之一五果類一十二種李别録下品釋名嘉慶子時珍曰按羅願爾雅翼云李乃木之多子者故字從木子竊謂木之多子者多矣何獨李稱木子耶按素問言李味鹹屬肝東方之果也則李於五果屬木故得專稱爾今人呼乾李為嘉慶子按韋述兩京記云東都嘉慶坊有美李人稱為嘉慶子久之稱謂既熟不復知其所自矣梵書名李曰居陵迦集解𢎞景曰李類甚多京口有麥李麥秀時熟小而肥甜核不入藥姑熟有南居李解核如杏子形者入藥為佳志曰李有緑李黃李紫李牛李水李並甘美堪食核不中用有野李味苦核仁入藥頌曰李處處有之郭璞註爾雅休乃無實李也一名趙李痤音磋乃接慮李也一名麥李細熟有溝道與麥同熟駁乃赤李也陶氏所謂南居李今不復識醫家但用核若杏核者宗奭曰李樹大者髙丈許一種御李子大如櫻桃紅黃色先諸李熟醫家用者亦少時珍曰李緑葉白花樹能耐久其種近百其子大者如柸如卵小者如彈如櫻其味有甘酸苦濇數種其色有青緑紫朱黃赤縹綺胭脂青皮紫灰之殊其形有牛心馬肝柰李杏李水李離核合核無核匾縫之異其産有武陵房陵諸李早則麥李御李四月熟遲則晚李冬李十月十一月熟又有季春李冬花春實也按王禎農書云北方一種御黃李形大而肉厚核小甘香而美江南建寧一種均亭李紫而肥大味甘如蜜有擘李熟則自裂有餻李肥粘如餻皆李之嘉美者也今人用鹽曝糖藏蜜煎為果惟曝乾白李有益其法夏李色黃時摘之以鹽挼去汁合鹽晒萎去核復晒乾薦酒作飣皆佳實氣味苦酸微温無毒時珍曰李味甘酸其苦濇者不可食不沉水者有毒不可食大明曰多食令人臚脹發虚熱詵曰臨水食之令發痰瘧不可合雀肉食合蜜食損五臟宗奭曰不可合漿水食發霍亂澀氣而然服水人忌之主治曝食去痼熱調中别録去骨節間勞熱孟詵肝病宜食之思邈核仁氣味苦平無毒主治僵仆踒折瘀血骨痛别録令人好顔色呉普治女人少腹腫滿利小腸下水氣除浮腫甄權治面䵟黑子蘇頌附方舊一新一女人面䵟用李核仁去皮細研以雞子白和如稀餳塗之至旦以漿水洗去後塗胡粉不過五六日效忌見風崔元亮海上方蠍薑螫痛苦李仁嚼塗之良古今録驗根白皮修治時珍曰李根皮取東行者刮去皺皮炙黃入藥用别録不言用何等李根亦不言其味但藥性論云入藥用苦李根皮味鹹而張仲景治奔豚氣奔豚湯中用甘李根白皮則甘苦二種皆可用與氣味大寒無毒大明曰凉無毒主治消渴止心煩逆奔豚氣别録治瘡呉普煎水含漱治齒痛𢎞景煎汁飲主赤白痢大明炙黃煎湯日再飲之治女人卒赤白下有驗孟詵治小兒暴熱解丹毒時珍苦李根皮味鹹治脚下氣主熱毒煩躁煑汁服止消渴甄權附方新二小兒丹毒從兩股走及隂頭用李根燒為末以田中流水和塗之千金咽喉卒塞無藥處以皁角末吹鼻取嚏仍以李樹近根皮磨水塗喉外良驗菽園雜記花氣味苦香無毒主治令人面澤去粉滓䵟􅍍時珍附方新一面黑粉滓用李花梨花櫻桃花白葵花白蓮花紅蓮花旋復花秦椒各六兩桃花木𤓰花丁香沉香青木香鍾乳粉各三兩珍珠玉屑各二兩蜀水花一兩大豆末七合為細末瓶收每日盥靧用洗手面百日光潔如玉也普濟方葉氣味甘酸平無毒主治小兒壯熱痁疾驚癎煎湯浴之良大明附方新一惡刺瘡痛李葉棗葉搗汁㸃之效千金樹膠氣味苦寒無毒主治目翳定痛消腫時珍附録徐李别録有名未用曰生太山之隂樹如李而小其實青色無核熟則采食之輕身益氣延年時珍曰此即無核李也唐崔奉國家有之乃異種也謬言龍耳血墮地所生杏别録下品釋名甜梅時珍曰杏字篆文象子在木枝之形或云從口及從可者並非也江南録云楊行密改杏名甜梅集解别録曰杏生晉川山谷五月采之頌曰今處處有之有數種黃而圎者名金杏相傳種出自濟南郡之分流山彼人謂之漢帝杏言漢武帝上苑之種也今近汴洛皆種之熟最早其扁而青黃者名木杏味酢不及之山杏不堪入藥杏仁今以從東來人家種者為勝宗奭曰金杏深赭色核大而扁乃接成者其味最勝又有白杏熟時色青白或微黄味甘淡而不酢生杏可晒脯作乾果食之山杏輩只可收仁用耳時珍曰諸杏葉皆圎而有尖二月開紅花亦有千葉者不結實甘而有沙者為沙杏黃而帶酢者為梅杏青而𢃄黃者為柰杏其金杏大如梨黄如橘西京雜記載蓬萊杏花五色盖異種也按王禎農書云北方肉杏甚佳赤大而扁謂之金剛拳凡杏熟時榨濃汁塗盤中晒乾以手摩刮收之可和水調麨食亦五果為助之義也實氣味酸熟有小毒生食多傷筋骨别録頌曰杏之類梅者味酢類桃者味甘宗奭曰凡杏性皆熱小兒多食致瘡癰膈熱扁鵲曰多食動宿疾令人目盲鬚眉落源曰多食生痰熱昏精神産婦尤忌之主治曝脯食止渴去冷熱毒心之果心病宜食之思邈核仁修治别録曰五月采之𢎞景曰凡用杏仁以湯浸去皮尖炒黃或用麫麩炒過斆曰凡用以湯浸去皮尖每觔入白火石一觔烏豆三合以東流水同煑從已至午取出晒乾用時珍曰治風寒肺病藥中亦有連皮尖用者取其發散也氣味甘苦温冷利有小毒兩仁者殺人可以毒狗震亨曰杏仁性熱因寒者可用思邈曰杏仁作湯如白沬不解者食之令氣壅身熱湯經宿者動冷氣時珍曰凡杏桃諸花皆五出若六出必雙仁為其反常故有毒也徐之才曰得火良惡黃苓黃茋葛根畏蘘草主治欬逆上氣雷鳴喉痺下氣産乳金瘡寒心賁豚本經驚癎心下煩熱風氣往來時行頭痛解肌消心下急滿痛殺狗毒别録解錫毒之才治腹痺不通發汗主温病脚氣欬嗽上氣喘促入天門冬煎潤心肺和酪作湯潤聲氣甄權除肺熱治上焦風燥利胸膈氣逆潤大腸氣秘元素殺蟲治諸瘡疥消腫去頭面諸風氣􅖟皰時珍發明元素曰杏仁氣薄味厚濁而沉墜降也隂也入手太隂經其用有三潤肺也消食積也散滯氣也杲曰杏仁散結潤燥除肺中風熱欬嗽杏仁下喘治氣也桃仁療狂治血也俱治大便秘當分氣血晝則便難行陽氣也夜則便難行隂血也故虚人便閉不可過泄脈浮者屬氣用杏仁陳皮脈沉者屬血用桃仁陳皮手陽明與手太隂為表裏賁門主往來魄門主收閉為氣之通道故並用陳皮佐之好古曰張仲景麻黃湯及王朝奉治傷寒氣上喘逆並用杏仁者為其利氣瀉肺解肌也時珍曰杏仁能散能降故解肌散風降氣潤燥消積治傷損藥中用之治瘡殺蟲用其毒也按醫餘云凡索麫豆粉近杏仁則爛頃一兵官食粉成積醫師以積氣丸杏仁相半研為丸熟水下數服愈又野人閒話云翰林學士辛士遜在青城山道院中夢皇姑謂曰可服杏仁令汝聰明老而健壯心力不倦求其方則用杏仁一味毎盥潄畢以七枚納口中良久脫去皮細嚼和津液頓嚥日日食之一年必換血令人輕健此申天師方也又楊士瀛直指方云凡人以水浸杏仁五枚五更端坐逐粒細嚼至盡和津吞下久則能潤五臟去塵滓驅風明目治肝腎風虚瞳人帶青眼翳風痒之病珍按杏仁性熱降氣亦非久服之藥此特其咀嚼吞納津液以消積穢則可耳古有服杏丹法云是左慈之方唐慎微收入本草云久服夀至千萬其說妄誕可鄙今刪其紕謬之辭存之於下使讀者母信其誑也附方舊三十五新十八杏金丹左慈秘訣云亦名草金丹方出渾皇子服之長年不死夏姬服之壽年七百乃仙去也世人不信皆由不肯精心修治故也其法須人罕到處寅月钁斸杏樹地下通陽氣二月除樹下草三月離樹五步作畦壟以通水亢旱則引泉灌溉有霜雪則燒火樹下以救花苞至五月杏熟自落收仁六斗以湯浸去皮及雙仁者用南流水三石和研取汁兩石八斗去滓以新鐵釡用酥三觔以糠火及炭然釡少少磨酥至盡乃内汁入釡釡上安盆盆上鑚孔用弦懸車轄至釡底以紙塞孔勿令泄氣初着糠火一日三動車轄以衮其汁五日有露液生十日白霜起又二日白霜盡即金花出丹乃成也開盆炙乾以翎掃下棗肉和丸梧子大每服三丸空心煖酒下至七日宿疾皆除瘖盲攣跛疝痔癭癎瘡腫萬病皆愈久服通靈不死云云衍文不録頌曰古方用杏仁修治如法自朝蒸至午便以慢火微炒至七日乃收之每旦空腹噉之久久不止駐顔延年云是夏姬之法然杏仁能使人血溢少誤必出血不已或至委頓故近人少有服者或云服至二三年往往或瀉或臍中出物皆不可治也杏酥法頌曰去風虚除百病搗爛杏仁一石以好酒二石研濾取汁一石五斗入白蜜一斗五升攪勻封於新甕中勿洩氣三十日看酒上酥出即掠取納瓷器中貯之取其酒滓團如梨大置空屋中作格安之候成飴脯狀旦服一枚以前酒下半藏器曰杏酪服之潤五臟去痰嗽生熟喫俱可若生半熟服之殺人又法宗奭曰治肺燥喘熱大腸秘潤五臟用杏仁去皮研細毎一升入水一升半搗稠汁入生薑四兩甘草一寸銀石器中慢火熬成稀膏入酥二兩同收每夜沸湯㸃服一匙衍義萬病丸治男婦五勞七傷一切諸疾杏仁一斗二升童子小便煑七次以蜜四兩拌勻再以童便五升於椀内重蒸取出日晒夜露數日任意嚼食即愈補肺丸治咳嗽用杏仁二大升山中者不用去雙仁者以童子小便二斗浸之春夏七日秋冬二七日連皮尖於砂盆中研濾取汁煑令魚眼沸候軟如麫糊即成以粗布攤曝之可丸即丸服之食前後總須服三五十丸茶酒任下忌白水粥劉禹錫傳信方欬嗽寒熱旦夕加重少喜多嗔面色不潤忽進忽退積漸少食脈弦𦂳者杏仁半兩去皮尖童子小便浸七日漉出温水淘洗砂盆内研如泥以小便三升煎如膏每服一錢熟水下婦人室女服之尤妙方千金久患肺氣喘急至欬甚者不過二劑永瘥杏仁去皮尖二兩童子小便浸一日一換夏月三四換滿半月取出焙乾研細每服一棗大薄荷一葉蜜一雞子大水一鍾煎七分食後温服忌腥物勝金方欬逆上氣不拘大人小兒以杏仁三升去皮尖炒黃研膏入蜜一升杵熟每食前含之嚥汁千金上氣喘急杏仁桃仁各半兩去皮尖炒研用水調生麫和丸梧子大每服十丸薑蜜湯下微利為度聖濟總録喘促浮腫小便淋瀝用杏仁一兩去皮尖熬研和米煑粥空心喫二合妙心鏡頭面風腫杏仁搗膏雞子黃和杵塗帛上厚褁之乾則又塗不過七八次愈也千金方風虛頭痛欲破者杏仁去皮尖晒乾研末水九升研濾汁煎如麻腐狀取和羮粥食七日後大汗出諸風漸減此法神妙可深秘之慎風冷豬雞魚蒜醋千金方頭面諸風眼瞤鼻寒眼出冷淚用杏仁三升研細水煑四五沸洗頭待冷汗盡三度愈千金偏風不遂失音不語生吞杏仁七枚不去皮尖逐日加至七七枚周而復始食後仍飲竹瀝以瘥為度外臺秘要破傷風腫杏仁杵膏厚塗上撚燭遥炙之千金方金瘡中風角弓反張用杏仁杵碎蒸令氣溜絞脂服一小升兼摩瘡上良必效方温病食勞杏仁五兩酢二升煎取一升服之取汗瘥類要心腹結氣杏仁桂枝橘皮訶黎勒皮等分為丸每服三十丸白湯下無忌孟詵食療喉痺痰嗽杏仁去皮熬黄三分和桂末一分研泥褁含之嚥汁陳藏器本草喉熱生瘡方同上卒失音聲方同上凖文潞公藥肺病咯血杏仁四十個以黄蠟炒黄研入青黛一錢作餅用柿餅一個破開包藥濕紙褁煨熟食之取效丹溪方卒不小便杏仁二七枚去皮尖炒黄研末米飲服之古今録驗方血崩不止諸藥不效服此立止用甜杏仁上黄皮燒存性為末每服三錢空心熱酒服保壽堂方五痔下血杏仁去皮尖及雙仁者水三升研濾汁煎减半同米煑粥食之食醫心鏡榖道􅉶痛腫痒杏仁杵膏頻頻傅之肘後方隂瘡爛痛杏仁燒黑研成膏時時傅之鈐方産門蟲疽痛痒不可忍用杏仁去皮燒存性杵爛綿褁納入隂中取効孟詵食療本草身面疣目杏仁燒黒研膏擦破日日塗之千金方面上皯皰杏仁去皮搗和雞子白夜塗之旦以煖酒洗去孟詵食療兩頰赤痒其狀如疿名頭面風以杏仁頻頻揩之内服消風散證治要訣耳卒聾閉杏仁七枚去皮拍碎分作三分以綿褁之着鹽如小豆許以器盛於飯上蒸熟令病人側臥以一褁捻油滴耳中良久又以一褁滴之取效外臺耳出膿汁杏仁炒黒搗膏綿褁納入耳三四易之妙梅師方鼻中生瘡杏仁研末乳汁和傅千金方疳瘡蝕鼻杏仁燒壓取油傅之千金方牙齒蟲䘌杏仁燒存性研膏髮褁納蟲孔中殺蟲去風其痛便止重者不過再上食療牙齗痒痛杏仁一百枚去皮以鹽方寸匕水一升煑令汁出含漱吐之三度愈方千金風蟲牙痛杏仁鍼刺於燈上燒煙乗熱搭病牙上又復燒搭七次絶不疼病牙逐時斷落也普濟方目中赤脈痒痛時見黑花用初生杏子仁一升古五銖錢七文入瓶内蜜封埋門限下一百日化為水每夕㸃之聖濟總録胎赤眼疾杏仁壓油半雞子殻食鹽一錢入石器中以栁枝一握𦂳束研至色黒以熟艾一團安椀内燒烘之令氣透火盡即成每㸃少許入兩皆甚妙聖濟總録目中翳遮但瞳子不破者用杏仁二升去皮麫褁作三包煻火煨熟去麫研爛壓去油每用一錢入銅緑一錢研勻㸃之同上目生弩肉或痒或痛漸覆瞳人用杏仁去皮二錢半膩粉半錢研勻綿褁筯頭㸃之同上傷目生弩廣利方用生杏仁七枚去皮細嚼吐於掌中乗熱以綿褁筯頭㸃弩肉上不過四五度愈總録用杏仁研膏人乳化開日㸃三次小兒血眼兒初生艱難血瘀眦睚遂濺滲其睛不見瞳人輕則外胞赤腫上下弦爛用杏仁二枚去皮尖嚼乳汁三五匙入膩粉少許蒸熟絹包頻㸃重者加黄連朴消最良全㓜心鑑小兒臍爛成風杏仁去皮研傅子母秘録小兒咽腫杏仁炒黑研爛含嚥普濟方鍼入肉内不出者雙杏仁搗爛以車脂調貼其鍼自出瑞竹堂方箭鏑在咽或刀刃在咽膈諸隠處杵杏仁傅之肘後方狐尿瘡痛杏仁研爛煑一兩沸及熱浸之冷即易必效方狗咬傷瘡爛嚼杏仁塗之冦氏食狗不消心下堅脹口乾發熱妄語杏仁一升去皮尖水三升煎沸去渣取汁分三服下肉為度梅師方解狼犬毒杏仁搗爛水和服之千金方一切食停氣滿膨脹用紅杏仁三百粒巴豆二十粒同炒色變去豆不用研杏為末橘皮湯調下藏楊氏家方白癜風斑杏仁連皮尖每早嚼二七粒揩令赤色夜卧再用聖濟總録諸瘡腫痛杏仁去皮研濾取膏入輕粉麻油調搽神效不拘大人小兒鮑氏小兒頭瘡杏仁燒研傅之事林廣記蛆蟲入耳杏仁搗泥取油滴入非出則死扶壽精方花氣味苦温無毒主治補不足女子傷中寒熱痺厥逆别録附方新二婦人無子二月丁亥日取杏花桃花隂乾為末戊子日和井華水服方寸匕日三服簡衛生易方粉滓面䵟杏花桃花各一升東流水浸七日洗面三七遍極妙聖濟總録葉主治人卒腫滿身面洪大煑濃汁熱漬亦少少服之肘後枝主治墮傷取一握水一升煑减半入酒三合和勻分服大效蘇頌附方舊一墜撲瘀血在内煩悶者用東引杏樹枝三兩細剉微熬好酒一升煎十餘沸分二服塞上方根主治食杏仁多致迷亂將死切碎煎湯服即解時珍巴旦杏綱目釋名八擔杏正要忽鹿麻集解時珍曰巴旦杏出囬囬舊地今闗西諸土亦有樹如杏而葉差小實亦尖小而肉薄其核如梅核殻薄而仁甘美㸃茶食之味如榛子西人以充方物氣味甘平温無毒主治止欬下氣消心腹逆悶時珍出飲膳正要梅本經中品釋名時珍曰梅古文作􅀢象子在木上之形梅乃杏類故反杏為􅀢書家訛為甘木後作梅從每諧聲也或云梅者媒也媒合衆味故書云若作和羮爾惟鹽梅而梅字亦從某也陸佃埤雅言梅入比方變為杏郭璞註爾雅以柟為梅皆誤矣柟即柟木荆人呼為梅見陸璣草木疏集解别録曰梅實生漢中山谷五月采實火乾頌曰今襄漢川蜀江湖淮嶺皆有之時珍曰按陸璣詩疏云梅杏類也樹葉皆畧似杏葉有長尖先衆木而花其實酢曝乾為脯入羮臛虀中又含之可以香口子赤者材堅子白者材脆范成大梅譜云江海野生者不經栽接花小而香子小而硬消梅實圎鬆脆多液無滓惟可生噉不入煎造緑蕚梅枝跗皆緑重葉梅花葉重叠結實多雙紅梅花色如杏杏梅色淡紅實扁而斑味全似杏鴛鴦梅即多葉紅梅也一蔕雙實一云苦楝接梅則花帶黑色譚子化書云李接桃而本強者其實毛梅接杏而本強者其實甘梅實采半黄者以烟薰之為烏梅青者鹽淹曝乾為白梅亦可蜜煎糖藏以充果飣熟者笮汁晒收為梅醬惟烏梅白梅可入藥梅醬夏月可調渇水飲之實氣味酸平無毒大明曰多食損齒傷筋蝕脾胃令人發膈上痰熱服黄精人忌食之食梅齒齼者嚼胡桃肉解之酸物類相感志云梅子同韶粉食則不不軟牙發明宗奭曰食梅則津液泄者水生木也津液泄則傷腎腎屬水外為齒故也時珍曰梅花開於冬而實熟於夏得木之全氣故其味最酸所謂曲直作酸也肝為乙木膽為甲木人之舌下有四竅兩竅通膽液故食梅則津生者類相感應也故素問云味過於酸肝氣以津又云酸走筋筋病無多食酸不然物之味酸者多矣何獨梅能生津耶烏梅修治𢎞景曰用須去核微炒之時珍曰造法取青梅籃盛於突上熏黑若以稻灰淋汁潤濕蒸過則肥澤不蠧氣味酸温平濇無毒杲曰寒忌豬肉主治下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑誌蝕惡肉本經去痺利筋脈止下痢好唾口乾别録水漬汁飲治傷寒煩熱𢎞景止渴調中去痰治瘧瘴止吐逆霍亂除冷熱痢藏器治虚勞骨蒸消酒毒令人得睡和建茶乾薑為丸服止休息痢大驗大明歛肺澀腸止久𠻳瀉痢反胃噎膈蚘厥吐利消腫涌痰殺蟲解魚毒馬汗毒硫黄毒時珍白梅釋名鹽梅霜梅修治取大青梅以鹽汁漬之日晒夜漬十日成矣久乃上霜氣味酸醎平無毒主治和藥㸃誌蝕惡肉𢎞景刺在肉中者嚼傅之即出孟詵治刀箭傷止血研爛傅之大明乳癰腫毒杵爛貼之佳汪頴除痰蘇頌治中風驚癎喉痺痰厥僵仆牙闗𦂳閉者取梅肉揩擦牙齦涎出即開又治瀉痢煩渴霍亂吐下下血血崩功同烏梅時珍發明𢎞景曰生梅烏梅白梅功應相似好古曰烏梅脾肺二經血分藥也能收肺氣治燥嗽肺欲收急食酸以收之時珍曰烏梅白梅所主諸病皆取其酸收之義惟張仲景治蚘厥烏梅丸及蟲􅉶方中用者取蟲得酸即止之義稍有不同耳醫說載曾魯公痢血百餘日國醫不能療陳應之用鹽水梅肉一枚研爛合臘茶入醋服之一啜而安大丞梁莊肅公亦痢血應之用烏梅胡黄連竈下土等分為末茶調服亦效盖血得酸則歛得寒則止得苦則濇故也其蝕惡瘡弩肉雖是酸收却有物理之妙說出本經其法載於劉涓子鬼遺方用烏梅肉燒存性研傅惡肉上一夜立盡聖惠用烏梅和蜜作餅貼者其力緩按楊起簡便方云起臂生一疽膿潰百日方愈中有惡肉突起如蠶豆大月餘不消醫治不效因閱本草得此方試之一日夜去其大半再上一日而平乃知世有竒方如此遂留心捜刻諸方始基於此方也附方舊十三新二十諸瘡弩肉方見上癰疽瘡腫已潰未潰皆可用鹽白梅燒存性為末入輕粉少許香油調塗四圍王氏簡易方喉痺乳蛾氷梅丸用青梅二十枚鹽十二兩淹五日取梅汁入明礬三兩桔梗白芷防風各二兩豬牙皂角三十條俱為細末拌汁和梅入瓶收之每用一枚噙嚥津液凡中風痰厥牙闗不開用此擦之尤佳總録用白梅包生礬末作丸含嚥或納吞消渴煩悶烏梅肉二兩微炒為末每服二錢水二盞煎一盞去滓入䜴二百粒煎至半盞温服衆簡要濟方泄痢口渴烏梅煎湯日飲代茶扶壽精方産後痢渴烏梅肉二十箇麥門冬十二分每以一升煑七合細呷之必效方赤痢腹痛直指用陳白梅同真茶蜜水各半煎飲之大聖惠用烏梅肉炒黄連各四兩為末煉蜜丸梧子每米飲服二十丸日三服便痢膿血烏梅一兩去核燒過為末每服二錢米飲下立止聖濟總録久痢不止腸垢已出肘後用烏梅肉二十個水一盞煎六分食前分二服袖珍用烏梅肉白梅肉各七箇搗爛入乳香末少許杵丸梧桐子大每服二三十丸茶湯下日三大便下血及酒痢久痢不止用烏梅三兩燒存性為末醋煑米糊和丸梧子大每空心米飲服二十丸日三濟生方小便尿血烏梅燒存性研末醋糊丸梧子大每服四十丸酒下血崩不止烏梅肉七枚燒存性研末米飲服之日二大便不通氣奔欲死者烏梅十顆湯浸去核丸棗大納入下部少時即通食療本草霍亂吐痢鹽梅煎湯細細飲之如宜方蚘蟲上行出於口鼻烏梅煎湯頻飲并含之即安食鑑本草水氣滿急烏梅大棗各三枚水四升煑二升納蜜和勻含嚥之聖濟總録梅核膈氣取半青半黄梅子每個用鹽一兩淹一日夜晒乾又浸又晒至水盡乃止用青錢三個夾二梅麻線縛定通裝磁礶内封埋地下百日取出每用一枚含之嚥汁入喉即消收一年者治一人二年者治二人其妙絶倫龔氏經驗方心腹脹痛短氣欲絶者烏梅二七枚水五升煑一沸納大錢二七枚煑二升半頓服之肘後勞瘧劣弱烏梅十四枚豆䜴二合桃栁枝各一虎口甘草三寸生薑一塊以童子小便二升煎一半温服即止圗經本草久欬不已烏梅肉微炒罌栗殻去筋膜蜜炒等分為末每服二錢睡時蜜湯調下痰厥頭痛如破者烏梅肉三十個鹽三撮酒三升煑一升頓服取吐即愈肘後方傷寒頭痛壯熱胸中煩痛四五日不解烏梅十四枚鹽五合水一升煎半升温服取吐吐後避風良梅師方折傷金瘡乾梅燒存性傅之一宿瘥千金方馬汗入瘡作痛用烏梅連核搗爛以頭醋和傅仍先刺瘡出去紫血乃傅之繫定經騐方猘犬傷毒烏梅末酒服二錢千金方指頭腫毒痛甚者烏梅肉和魚鮓𢷬封之妙李樓竒方傷寒䘌瘡生下部者烏梅肉三兩炒為末煉蜜丸梧子大以石榴根皮煎湯食前下三十丸聖惠方小兒頭瘡烏梅燒末生油調塗聖濟方香口去臭曝乾梅脯常時含之硫黄毒發令人背膞痛悶目暗漠漠烏梅肉焙一兩沙糖半兩漿水一大盞煎七分呷之總録核仁氣味酸平無毒主治明目益氣不饑呉普除煩熱孟詵治代指忽然腫痛搗爛和醋浸之時珍方肘後花氣味微酸濇無毒發明時珍曰白梅花古方未見用者近時有梅花湯用半開花溶蠟封花口投蜜罐中過時以一兩朶同蜜一匙㸃沸湯服又有蜜漬梅花法用白梅肉少許浸雪水潤花露一宿蜜浸薦酒又梅花粥法用落英入熟米粥再煑食之故楊誠齋有蜜㸃梅花帶露餐及脫蕊收將熬粥喫之句皆取其助雅致清神思而已葉氣味酸平無毒主治休息痢及霍亂煑濃汁飲之大明藏器曰嵩陽子言清水揉梅葉洗蕉葛衣經夏不脆有驗時珍曰夏衣生黴㸃梅葉煎湯洗之即去甚妙附方舊一新二中水毒病初起頭痛惡寒心煩拘急旦醒暮劇梅葉搗汁三升飲之良肘後下部蟲䘌梅葉桃葉一斛杵爛蒸極熟内小器中隔布坐蒸之蟲盡死也外臺秘要月水不止梅葉焙棕櫚皮灰各等分為末每服二錢酒調下聖濟總録根主治風痺别録殺出土者人初生小兒取根同桃李根煑湯浴之無瘡熱之患崔氏纂要煎湯飲治霍亂止休息痢大明樃梅綱目集解時珍曰樃梅出均州太和山相傳真武折梅枝挿於樃樹誓曰吾道若成開花結果後果如其言今樹尚在五龍宫北樃木梅實杏形桃核道士每嵗采而蜜煎以充貢獻焉樃乃榆樹也實氣味甘酸平無毒主治生津止渴清神下氣消酒時珍桃本經下品校正木部有拾遺桃橛今併入此釋名時珍曰桃性早花易植而子繁故字從木兆十億曰兆言其多也或云從兆諧聲也集解别録曰桃生太山川谷𢎞景曰今處處有之核仁入藥當取解核者種之為佳山桃仁不堪用頌曰汴東陜西者尤大而美大抵佳果肥美者皆圃人以他木接成殊失本性入藥當用本生者為佳今市肆賣者多雜接核之仁為不堪也宗奭曰山中一種桃正合月令桃始華者花多子少不堪㗖惟堪取仁入藥汴中有油桃小於衆桃光如塗油不益脾胃太原有金桃色深黄洛中有崑崙桃肉深紅紫色又有餅子桃狀如香餅子其味皆甘時珍曰桃品甚多易於栽種且早結實五年宜以刀剥其皮出其脂液則多延數年其花有紅紫白千葉二色之殊其實有紅桃緋桃碧桃緗桃白桃烏桃金桃銀桃胭脂桃皆以色名者也有綿桃油桃御桃方桃匾桃偏核桃皆以形名者也有五月早桃十月冬桃秋桃霜桃皆以時名者也並可供食惟山中毛桃即爾雅所謂禠桃者小而多毛核粘味惡其仁充滿多脂可入藥用盖外不足者内有餘也冬桃一名西王母桃一名仙人桃即崑崙桃形如苦蔞表裏微赤得霜始熟方桃形微方匾桃出南畨形匾肉澀核狀如盒其仁甘美畨人珍之名波淡樹樹甚髙大偏核桃出波斯形薄而尖頭偏狀如半月其仁酷似新羅桃子可食性熱又楊維禎宋濓集中並載元朝御庫蟠桃核大如盌以為神異按王子年拾遺記載漢明帝時常山獻巨核桃霜下始花隆暑方熟𤣥中記載積石之桃大如斗斛器酉陽雜爼載九疑有桃核半扇可容米一升及蜀後主有桃核盃半扇容水五升良久如酒味可飲此皆桃之極大者昔人謂桃為仙果殆此類歟生桃切片瀹過曝乾為脯可充果食又桃酢法取爛熟桃納甕中盖口七日漉去皮核蜜封二七日酢成香美可食種樹書云柿接桃則為金桃李接桃則為李桃梅接桃則脆桃樹生蟲煑豬頭汁澆之即止皆物性之微妙也實氣味辛酸甘熱微毒多食令人有熱詵曰能發丹石毒生者尤損人思邈曰黄帝書云食桃飽入水浴令人成淋及寒熱病時珍曰生桃多食令人膨脹及生癰癤有損無益五果列桃為下以此忌瑞曰桃與鼈同食患心痛服术人食之主治作脯食益顔色大明肺之果肺病宜食之思邈冬桃食之解勞熱時珍註出爾雅核仁修治别録曰七月采取仁隂乾斆日凡使須去皮用白术烏豆二味同於坩鍋中煑二伏時漉出劈開心黄如金色乃用時珍曰桃仁行血宜連皮尖生用潤燥活血宜湯浸去皮尖炒黄用或麥麩同炒或燒存性各隨本方雙仁者有毒不可食説見杏仁下氣味苦甘平無毒思邈曰苦甘辛平詵曰温𢎞景曰桃仁作酪性冷香附為之使主治瘀血血閉癥瘕邪氣殺小蟲本經止欬逆上氣消心下堅硬除卒暴擊血通月水止心腹痛别録治血結血秘血燥通潤大便破畜血元素殺三蟲又每夜嚼一枚和蜜塗手面良孟詵主血滯風痺骨蒸肝瘧寒熱鬼注疼痛産後血病時珍發明杲曰桃仁苦重於甘氣薄味厚沉而降隂中之陽手足厥隂經血分藥也苦以泄滯血甘以生新血故破凝血者用之其功有四治熱入血室一也泄腹中滯血二也除皮膚血熱燥痒三也行皮膚凝滯之血四也成無已曰肝者血之源血聚則肝氣燥肝苦急急食甘以緩之桃仁之甘以緩肝散血故張仲景抵當湯用之以治傷寒八九日内有畜血發熱如狂小腹滿痛小便自利者又有當汗失汗熱毒深入吐血及血結胸煩燥讝語者亦以此湯主之與䖟蟲水蛭大黄同用附方舊十九新十二延年去風令人光潤用桃仁五合去皮用粳米飯漿同研絞汁令盡温温洗面極妙千金翼偏風不遂及癖疾用桃仁二千七百枚去皮尖雙仁以好酒一斗三升浸二十一日取出晒乾杵細作丸如梧子大每服二十丸以原酒吞之外臺秘要風勞毒腫攣痛或牽引小腹及腰痛桃仁一升去皮尖熬令黑烟出熱研如脂膏以酒三升攪和服煖卧取汗不過三度瘥食醫心鏡瘧疾寒熱桃仁一百枚去皮尖乳砵内研成膏不得犯生水入黄丹三錢丸梧子大每服三丸當發日面北温酒吞下五月五日午時合之忌雞犬婦人見唐慎微本草骨蒸作熱桃仁一百二十枚留尖去皮及雙仁杵為丸平旦井花水頻服之令盡量飲酒至醉仍須任意喫水隔日一劑百日不得食肉外臺秘要上氣喘急方見杏仁上氣欬嗽胸滿氣喘桃仁三兩去皮尖以水一大升研汁和粳米一合煑粥食之心鏡卒得欬嗽桃仁三升去皮杵着器中密封蒸熟日乾絹袋盛浸二斗酒中七日可飲日飲四五合尸疰鬼疰乃五尸之一又挾鬼邪為祟其病變動有三十六種至九十九種大畧使人寒熱淋瀝沉沉黙黙不知所苦而無處不惡累年積月以至於死死後復傅傍人急以桃仁五十枚研泥水煮取四升服之取吐吐不盡三四日再吐肘後方傳尸鬼氣咳嗽痃癖注氣血氣不通日漸消瘦桃仁一兩去皮尖杵碎水一升半煑汁入米作粥空心食之鬼疰心痛桃仁一合爛研煎湯服之急救方卒然心痛桃仁七枚去皮尖研爛水一合服之肘後方人好魘寐桃仁熬去皮尖三七枚以小便服之千金方下部蟲䘌病人齒無色舌上白喜睡憒憒不知痛痒處或下痢乃下部生蟲食肛也桃仁十五枚苦酒二升鹽一合煑六合服之肘後方崩中漏下不止者桃核燒存性研細酒服方寸匕日三千金婦人難産數日不出桃仁一個劈開一片書可字一片書出字吞之即生刪繁方産後百病千金桃仁煎治婦人産後百病諸氣取桃仁一千二百枚去皮尖雙仁熬擣極細以清酒一斗半研如麥粥納小瓶中麫封入湯中煑一伏時每服一匙温酒和服日再圖經本草産後身熱如火皮如粟粒者桃仁研泥同臘猪脂傅之日日易之千金方産後血閉桃仁二十枚去皮尖藕切塊水煎服之良唐珤經驗方産後隂腫桃仁燒研傅之婦人隂癢桃仁杵爛綿褁塞之肘後方男子隂腫作痒用桃仁炒香為末酒服方寸匕日二仍擣傅之外臺小兒卵㿗方同上小兒爛瘡初起腫漿似火瘡桃仁研爛傳之秘録小兒聤耳桃仁炒研綿褁日日塞之千金方風蟲牙痛鍼刺桃仁燈上燒烟出吹滅安痛齒上咬之不過五六次愈衛生家寶方唇乾裂痛桃仁擣和猪脂傅海上大便不快裏急後重用桃仁三兩去皮呉茱茰二兩食鹽一兩同炒熟去鹽茱每嚼桃仁五七粒總録急勞欬嗽煩熱用桃仁三兩去皮尖猪肝一枚童子小便五升同煑乾於木桕内擣爛入蒸餅和丸梧子大每温水下三十丸聖惠方冷勞减食漸至黒瘦用桃仁五百顆吴茱萸三兩同入鐵鐺中微火炒一炊久将桃仁去皮微黄色即漸加火待微煙出即乗熱收入新瓶内厚紙封住勿令洩氣每日空心取桃仁二十粒去皮嚼之以温酒下至重者服五百粒愈聖惠方預辟瘴癘桃仁一觔呉茱茰青鹽各四兩同炒熟以新瓶密封一七取出揀去茱鹽將桃仁去皮尖每嚼一二十枚山居尤宜之余居士選竒方桃毛毛桃實上毛也刮取用之氣味辛平微毒主治破血閉下血瘕寒熱積聚無子帶下諸疾别録療崩中破癖氣大明治惡鬼邪氣孟詵桃梟釋名桃奴别録桃景同上神桃别録曰此桃實經冬不落正月采之中實者良時珍曰桃子乾懸如梟首磔木之狀故名奴者言其不能成實也家寶方謂之神桃言其辟惡也千葉桃花結子在樹不落者名鬼髑髏雷斆炮炙論有修治之法而方書未見用者斆曰鬼髑髏十一月采得以酒拌蒸之從已至未焙乾以銅刀切焙取肉用氣味苦微温有小毒主治殺百鬼精物本經殺精魅五毒不祥療中惡腹痛别録氣頌曰胡洽治中惡毒蠱疰有桃梟湯治肺氣腰痛破血療心痛酒磨煖服之大明主吐血諸藥不效燒存性研末米湯調服有驗汪穎治小兒虚汗婦人妊娠下血破伏梁結氣止邪瘧燒烟熏痔瘡燒黒油調傅小兒頭上肥瘡軟癤時珍附方舊三新五伏梁結氣在心下不散桃奴三兩為末空心温酒每服二錢聖惠方鬼瘧寒熱樹上自乾桃子二七枚為末滴水丸梧子大朱砂為衣每服一丸侵晨面東井華水下良録聖濟總五種瘧疾家寶通神丸用神桃即桃奴十四枚巴豆七粒黑豆一兩研勻以冷水和丸梧子大朱砂為衣發日五更念藥玉菩薩七遍井華水下一丸立瘥不過二次妙不可言王隠君養生主論妊娠下血不止用桃梟燒存性研水服取瘥葛洪方盜汗不止樹上乾桃子一個霜梅二個葱根七箇燈心二莖陳皮一錢稻根大麥芽各一撮水二鍾煎服經驗方白秃頭瘡乾桃一兩黑豆一合為末臘脂調搽聖惠方小兒頭瘡樹上乾桃燒研入膩粉麻油調搽聖惠食桃成病桃梟燒灰二錢水服取吐即愈陸光禄説有人食桃不消化作病時於林間得槁桃燒服登時吐出即愈此以類相攻也張文仲備急方花修治别録曰三月三日采隂乾之斆曰桃花勿用千葉者令人鼻衂不止目黄收花揀淨以絹袋盛懸簷下令乾用氣味苦平無毒主治殺疰惡鬼令人好顔色本經悦澤人面除水氣破石淋利大小便下三蟲别録消腫滿下惡氣蘇頌治下腹痛及秃瘡孟詵利宿水痰飲積滯治風狂研末傅頭下肥瘡手足瘑瘡時珍發明𢎞景曰肘後方言服三樹桃花盡則面色紅潤悦澤如桃花也頌曰太清草木方言酒漬桃花飲之除百疾益顔色時珍曰按歐陽詢初學記載北齊崔氏以桃花白雪與兒靧面云令面妍華光悦盖得本草令人好顔色悦澤人面之義而陶蘇二氏乃引服桃花法則因本草之言而謬用者也桃花性走泄下降利大腸甚快用以治氣實人病水飲腫滿積滯大小便閉塞者則有功無害若久服即耗人隂血損元氣豈能恱澤顔色耶按張從正儒門事親載一婦滑泄數年百治不效或言此傷飲有積也桃花落時以棘鍼刺取數十蕚勿犯人手以麫和作餅煨熟食之米飲送下不一二時瀉下如傾六七日行至數百行昏困惟飲涼水而平觀此則桃花之峻利可徴矣又蘇鶚杜陽編載范純佑女喪夫發狂閉之室中夜斷窗櫺登桃樹上食桃花㡬盡及旦家人接下自是遂愈也珍按此亦驚怒傷肝痰夾敗血遂致發狂偶得桃花利痰飲散滯血之功與張仲景治積熱發狂用承氣湯畜血發狂用桃仁承氣湯之意相同而陳藏器乃言桃花食之患淋何耶附方舊三新十三大便艱難桃花為末水服方寸匕即通千金産後秘塞大小便不通用桃花葵子滑石檳榔等分為末每空心葱白湯服二錢即利集驗方心腹積痛三月三日采桃花晒乾杵末以水服二錢匕良孟詵食療本草瘧疾不已桃花為末酒服方寸匕良梅師方痰飲宿水桃花散收桃花隂乾為末温酒服一合取利覺虚食少粥不似轉下藥也崔行功纂要方脚氣腫痛桃花一升隂乾為末每温酒細呷之一宿即消外臺秘要腰脊作痛三月三日取桃花一斗一升井華水三斗麴六升米六斗炊熟如常釀酒每服一升日三服神良千金膿瘻不止桃花為末豬脂和傅之日二千金頭上秃瘡三月三日收未開桃花隂乾與桑椹赤者等分作末以豬脂和先取灰汁洗去痂即塗之食療頭上肥瘡一百五日寒食節收桃花為末食後以水半盞調服方寸匕日三甚良崔元亮海上方黄水面瘡方同上足上瘑瘡桃花食鹽等分杵勻醋和傅之肘後方雀卵面皰桃花冬𤓰仁研末等分蜜調傅之聖惠乾糞塞腸脹痛不通用毛桃花濕者一兩和麫三兩作餛飩煑熟空心食之日午腹鳴如雷當下惡物也聖惠方面上粉刺㿔子如米粉用桃花丹砂各三兩為末每服一錢空心井水下日三服十日知二十日小便當出黒汁面色瑩白也聖惠方令面光華三月三日收桃花七月七日收雞血和塗面上三二日後脫下則光華顔色也聖濟總録葉頌曰采嫩者名桃心入藥尤勝氣味苦平無毒主治除尸蟲出瘡中小蟲别録治惡氣小兒寒熱客忤大明療傷寒時氣風痺無汗治頭風通大小便止霍亂腹痛時珍發明頌曰桃葉蒸汗法張文仲備急方治天行病有支太醫桃葉湯熏法用水二石煑桃葉取七斗安床簀下厚被盖臥床上乗熱熏之少時當雨汗汗遍去湯速粉之并灸大推穴則愈又陳廪丘小品方有阮河南桃葉蒸法云連發汗汗不出者死可蒸之如中風法燒地令熱去火以少水洒之布乾桃葉於上厚二三寸安席葉上臥之温覆得大汗被中傅粉極燥便瘥也凡柏葉麥麩蚕沙皆可如此法用張苗言曽有人疲極汗出臥簟受冷但苦寒倦四日凡八發汗汗不出用此法而瘥也時珍曰按許叔微本事方云傷寒病醫者須顧表裏循次第昔范雲為梁武帝屬官得時疫熱疾召徐文伯診之是時武帝有九錫之命期在旦夕雲恐不預求速愈文伯曰此甚易政恐二年後不坐起爾雲曰朝聞道夕死可矣况二年乎文伯乃以火煆地布桃柏葉於上令雲臥之少頃汗出粉之翌日遂愈後二年雲果卒取汗先期尚能促壽况不顧表裏時日便欲速愈者乎夫桃葉發汗妙法也猶有此戒可不慎歟附方舊十新一風襲項強不得顧視穿地作坑煆赤以水洒之令冷鋪生桃葉於内臥席上以項着坑上蒸至汗出良久即瘥千金方小兒傷寒時氣用桃葉三兩水五升煑十沸取汁日五六遍淋之後燒雄鼠糞二枚服之妙傷寒類要二便不通桃葉杵汁半升服冬用桃皮人孫真方霍亂腹痛桃葉三升切水五升煑一升分二服外臺除三尸蟲桃葉杵汁服一升外臺秘要腸痔出血桃葉一斛杵納小口器中坐蒸之有蟲自出肘後方女人隂瘡如蟲咬痒痛者生擣桃葉綿褁納之日三四易食療本草足上瘑瘡桃葉搗和苦酒傅之肘後方鼻内生瘡桃葉嫰心杵爛塞之無葉用枝簡便方身面癬瘡日午擣桃葉取汁搽之千金諸蟲入耳桃葉挼熟塞之或搗汁滴之或作枕枕一夕自出方梅師莖及白皮修治時珍曰樹皮根皮皆可用根皮尤良並取東行者刮去粗皮取白皮入藥氣味苦平無毒主治除邪鬼中惡腹痛去胃中熱别録治疰忤心腹痛解蠱毒辟疫癘療黄疸身目如金殺諸瘡蟲時珍附方舊十四新五天行疫癘常以東行桃枝煎熬湯浴之佳類要黄疸如金清明時清晨勿令雞犬婦人見取東引桃根細如筯若釵股者一握切細以水一大升煎一小升空腹頓服後三五日其黄離離如薄雲散開百日方平復也黄散後可時時飲清酒一盃則眼中易散否則散遅忌食熱麫猪魚等物此是徐之才家秘方也初虞世必效方肺熱喘急集驗治肺熱悶喘急寒熱往來欲死不堪服藥者用桃皮芫花各一升以水四升煑取一升以故布納汁中取薄胸口温四肢盈數刻即止圗經喉痺塞痛桃皮煑汁三升服千金翼心虚健忘令耳目聰明用戊子日取東引桃枝三寸枕之木又方五月五日日未出時取東引桃枝刻作三寸人着衣帶領中佩之千金翼卒得心痛東引桃枝一把切以酒一升煎半升頓服大效肘後方鬼疰心痛東引桃枝一握去粗皮切水二升煎半升頻服崔氏解中蠱毒用東引桃白皮烘乾大㦸斑蝥去足翅熬三物等分為末以冷水服半方寸匕即出不出更服或因酒得以酒服因食得以食服初虞世云此乃李饒州法也亦可以米泔丸服蘇頌圗經卒得惡瘡人不識者取桃皮作屑納之孫真人方卒患瘰癧不痛者取桃樹白皮貼瘡上炙二七壯良孫真人方熱病口瘡成䘌桃枝煎濃汁含之部有瘡納入之類要下下部䘌瘡桃白皮煑取濃汁如稀餳入熊膽少許以綿蘸藥納入下部瘡上梅師五痔作痛桃根水煎汁浸洗之當有蟲出小兒濕癬桃樹青皮為末和醋頻傅之子母秘録狂狗咬傷桃白皮一握水三升煎一升服梅師方水腫尿短桃皮三觔去内外皮秫米一斗女麴一升以水二斗煑桃皮取汁一斗以一半漬麴一半漬秫飯如常釀成酒每服一合日三次以體有熱為候小便多是病去忌生冷一切毒物聖濟總録婦人經閉數年不通面色萎黄唇口青白腹内成塊肚上筋起腿脛或腫桃根煎煑之用桃樹根牛蒡根馬鞭草根牛膝蓬虆各一斤剉以水三斗煎一斗去滓更以慢火煎如餳狀收之每以熱酒調服一匙聖惠牙疼頰腫桃白皮栁白皮槐白皮等分煎酒熱潄冷則吐之聖惠方小兒白秃桃皮五兩煎汁入白麫沭之并服同上桃膠修治時珍曰桃茂盛時以刀割樹皮久則膠溢出采收以桑灰湯浸過曝乾用如服食當依本方修鍊氣味苦平無毒主治鍊服保中不飢忍風寒别録下石淋破血治中惡疰忤蘇恭主惡鬼邪氣孟詵和血益氣治下痢止痛時珍發明頌曰本草言桃膠鍊服保中不飢按仙方服膠法取膠二十觔絹袋盛於櫟木灰汁一石中煑三五沸取掛髙處候乾再煑如此三度曝乾研篩蜜和丸梧子大每空腹酒服二十丸久服身輕不老時珍曰按抱朴子云桃膠以桑灰汁漬過服之除百病數月斷榖久則晦有夜光如月又列仙傳云髙丘公服桃膠得仙古方以桃膠為仙藥而後人不復用之豈其功亦未必如是之殊耶附方舊二新三虚熱作渴桃膠如彈丸大含之佳外臺石淋作痛桃木膠如棗大夏以冷水三合冬以湯三合和服日三服當下石石盡即止古方録驗血淋作痛桃膠炒木通石膏各一錢水一盞煎七分食後服楊氏家藏方産後下痢赤白裏急後重腹痛用桃膠焙乾沉香蒲黄炒各等分為末每服二錢食前米飲下婦人良方痘黶發搐黑䧟者用桃膠煎湯飲之或水熬成膏酒化服之大效總微論桃符主治中惡精魅邪氣水煑汁服之孟詵發明時珍曰典術云桃乃西方之木五木之精仙木也味辛氣惡故能厭伏邪氣制百鬼今人門上用桃符以此玉燭寶典云户上着桃板辟邪取山海經神荼鬱壘居東海蟠桃樹下主領衆鬼之義許慎云羿死於桃棓棓杖也故鬼畏桃而今人用桃梗作杙橛以辟鬼也禮記云王弔則巫祝以桃茢前引以辟不祥茢者桃枝作帚也博物志云桃根為印可以召鬼甄異傳云鬼但畏東南枝爾據此諸說則本草桃之枝葉根核桃梟桃橛皆辟鬼祟産忤盖有由來矣錢乙小兒方疎取積熱及結胸用巴豆硇汞之藥以桃符煎湯下亦是厭之之義也桃橛拾遺於時珍曰橛音掘即杙也人多釘地下以鎮家宅三載者良主治卒心腹痛鬼疰破血辟邪惡氣脹滿煑汁服之與桃符同功藏器附方新一風蟲牙痛門下桃橛燒取汁少少納孔中以蠟固之聖惠方桃寄生見木部桃蠧蟲移入蟲部栗别録上品釋名時珍曰栗說文作㮚從􅓒音條象花實下垂之狀也梵書名篤迦集解别録曰栗生山隂九月采𢎞景曰今㑹稽諸暨栗形大皮厚不美剡及始豐栗皮薄而甜乃佳頌曰栗處處有之而兖州宣州者最勝木髙二三丈葉極類櫟四月開花青黄色長條似胡桃花實有房彚大者若拳中子三四小者若桃李中子惟一二將熟則鏬拆子出栗類亦多按陸璣詩疏云栗五方皆有之周秦呉揚特饒惟濮陽及范陽栗甜美味長他方者不及也倭韓國諸島上栗大如雞子味短不美桂陽有莘栗叢生實大如杏仁皮子形色與栗無異但小耳又有粤栗皆與栗同子圎而細惟江湖有之或云即莘也莘音榛詩云樹之榛栗是矣恭曰板栗錐栗二樹皆大茅栗似板栗而細如橡子其樹雖小葉亦不殊但春生夏花秋實冬枯為異耳宗奭曰湖北一種旋栗頂圎末尖即榛栗象榛子形也栗欲乾收莫如曝之欲生收莫如潤沙藏之至夏初尚如新也時珍曰栗但可種成不可移栽按事類合璧云栗木髙二三丈苞生多刺如蝟毛每枝不下四五箇苞有青黄赤三色中子或單或雙或三或四其殻生黄熟紫殻内有膜裹仁九月霜降乃熟其苞自裂而子墜者乃可久藏苞未裂者易腐也其花作條大如筯頭長三四寸可以㸃燈栗之大者為板栗中心扁子為栗楔稍小者為山栗山栗之圎而末尖者為錐栗圎小如橡子者為莘栗小如指頂者為茅栗即爾雅所謂栭栗也一名栵栗可炒食之劉恂嶺表録云廣中無栗惟靳州山中有石栗一年方熟圎如彈子皮厚而味如胡桃得非栗乃木果不宜於炎方耶實氣味鹹温無毒銑曰呉栗雖大味短不如北栗凡栗日中曝乾食即下氣補益不爾猶有木氣不補益也火煨去汗亦殺木氣生食則發氣煑蒸炒熱食則壅氣凡患風水人不宜食味鹹生水也恭曰栗作粉食勝於菱芡但以飼孩兒令齒不生宗奭曰小兒不可多食生則難化熟則滯氣隔食生蟲往往致病主治益氣厚腸胃補腎氣令人耐飢别録生食治腰脚不遂思邈療筋骨斷碎腫痛瘀血生嚼塗之有效蘇恭栗楔音屑中時珍曰一毬三顆其扁者栗楔也主治筋骨風痛士良活血尤效頌曰今衡山合活血丹用之每日生食七枚破冷痃癖又生嚼罯惡刺出箭頭傅瘰癧腫毒痛大明發明思邈曰栗腎之果也腎病宜食之𢎞景曰相傳有人患腰脚弱往栗樹下食數升便能起行此是補腎之義然應生噉若服餌則宜蒸曝之宗奭曰栗之補腎為其味鹹又滯其氣也時珍曰栗於五果屬水水潦之年則栗不熟類相應也有人内寒暴洩如注令食煨栗二三十枚頓愈腎主大便栗能通腎於此可驗經驗方治腎虚腰脚無力以袋盛生栗懸乾每旦喫十餘顆次喫豬腎粥助之久必強健盖風乾之栗勝於日曝而火煨油炒勝於煑蒸仍須細嚼連液吞嚥則有益若頓食至飽反致傷脾矣按蘇子由詩云老去自添腰脚病山翁服栗舊傳方客來為說晨興晚三咽徐收白玉漿此得食栗之訣也王禎農書云史記載秦飢應侯請發五苑棗栗則本草栗厚腸胃補腎氣令人耐飢之說殆非虚語矣附方舊三新五小兒疳瘡生嚼栗子傅之外臺葦刺入肉方同上馬汗入肉成瘡者方同上勝金方馬咬成瘡獨顆栗子燒研傅之醫說熊虎爪傷方同上小兒口瘡大栗煑熟日日與食之甚效普濟衂血不止宣州大栗七枚刺破連皮燒存性出火毒入麝香少許研勻每服二錢温水下聖濟總録金刅斧傷用獨殻大栗研傅或倉卒嚼傅亦可集簡方栗荴音孚恭曰栗内薄皮也氣味甘平濇無毒主治擣散和蜜塗面令光急去皺文蘇恭附方新一骨鯁在咽栗子内薄皮燒存性研末吹入咽中即下聖濟總録用栗子肉上皮半兩為末鮎魚肝一個乳香二錢半同擣丸梧子大看鯁逺近以線繫綿褁一丸水潤吞之提線釣出也栗殻栗之黑殻也氣味同荴主治反胃消渴煑汁飲之孟詵煑汁飲止瀉血大明附方新一鼻衂不止累醫不效栗殻燒存性研末粥飲服二錢聖惠方毛毬栗外刺包也主治煑汁洗火丹毒腫蘇恭花主治瘰癧呉瑞樹皮主治煑汁洗沙蝨溪毒蘇恭療瘡毒蘇頌治丹毒五色無常剥皮有刺者煎水洗之孟詵方出肘后根主治偏腎氣酒煎服之汪穎天師栗綱目集解時珍曰按宋祁益州方物記云天師栗惟西蜀青城山中有之他處無有也云張天師學道於此所遺故名似栗而味美惟獨房若橡為異耳今武當山所賣娑羅子恐即此物也氣味甘温無毒主治久食已風攣時珍記出益州棗本經上品釋名時珍曰按陸佃埤雅云大曰棗小曰棘棘酸棗也棗性髙故重束棘性低故並束束音次棗棘皆有刺鍼㑹意也集解别録曰棗生河東平澤𢎞景曰世傳河東猗氏縣棗特異今青州出者形大而核細多膏甚甜鬰州𤣥市者亦好小不及耳江東臨沂金城棗形大而虚少脂好者亦可用之南棗大惡不堪啖頌曰近北州郡皆出棗惟青州之種特佳晉州綘州者雖大而不及青州肉厚也江南出者堅燥少脂今園圃種蒔者其種甚多美者有水菱棗御棗之類皆不堪入藥盖肌肉輕虚故也南郡人煑而曝乾皮薄而皺味更甘於他棗謂之天蒸棗亦不入藥按郭璞註爾雅云壺棗大而銳猶壺瓠也邉腰棗也細腰今謂之轆轤棗櫅白棗也子白乃熟洗大棗也出河東猗氏縣大如雞卵遵羊棗也實小紫黑俗名羊矢棗樲酸棗也木小而實酢還味稔棗也其味短蹶泄苦棗也其味苦晳無實棗也宗奭曰大棗先青州次晉州皆可晒曝入藥益脾胃餘者止可充食用耳青州人以棗去皮核焙乾為棗圈以為竒果有御棗甘美輕脆後衆棗熟而易生蟲今人所謂撲落酥者是也又有牙棗先衆棗熟亦甘美微酸而尖長二棗皆可噉不堪收曝時珍曰棗木赤心有刺四月生小葉尖觥光澤五月開小花白色微青南北皆有惟青晉所出者肥大甘美入藥為良其類甚繁爾雅所載之外郭義恭廣志有狗牙雞心牛頭羊角獼猴細腰赤心三星駢白之名又有木棗氐棗桂棗夕棗灌棗墟棗蒸棗白棗丹棗棠棗及安邑信都諸棗穀城紫棗長二寸羊角棗長三寸宻雲所出小棗脆潤核細味亦甘美皆可充果食不堪入藥入藥須用青州及晉地晒乾大棗為良按賈思勰齊民要術云凡棗全赤時日日撼而收曝則紅皺若半赤收者肉未充滿乾即色黄赤收者味亦不佳食經作乾棗法須治淨地鋪菰箔之類承棗日晒夜露擇去胖爛曝乾收之切而晒乾者為棗脯煑熟榨出者為棗膏亦曰棗瓤蒸熟者為膠棗加以糖蜜拌蒸則更甜以麻油葉同蒸則色更潤澤搗棗膠晒乾者為棗油其法取紅軟乾棗入釡以水僅淹平煑沸漉出砂盆研細生布絞取汁塗盤上晒乾其形如油以手摩刮為末收之每以一匙投湯盌中酸甜味足即成美漿用和米麨最止飢渴益脾胃也盧諶祭法云春祀用棗油即此生棗氣味甘辛熱無毒多食令人寒熱凡羸瘦者不可食思邈曰多食令人熱渴膨脹動臟腑損脾元助濕熱大棗釋名乾棗别録美棗别録良棗别録曰八月采曝乾瑞曰此即晒乾大棗也味最良美故宜入藥今人亦有用膠棗之肥大者氣味甘平無毒思邈曰甘辛熱滑無毒杲曰温大明曰有齒病甘病蟲䘌人不宜啖棗小兒尤不宜食又忌與葱同食令人五臟不和與魚同食令人腰腹痛時珍曰今人蒸棗多用糖蜜拌過蒸食最損脾助濕熱也啖棗多令人齒黄生䘌故嵇康養生論云齒處晉而黄蝨處頭而黑主治心腹邪氣安中養脾氣平胃氣通九竅助十二經補少氣少津液身中不足大驚四肢重和百藥久服輕身延年本經脾宗奭曰煑取肉和胃藥甚佳補中益氣堅志強力除煩悶療心下懸除腸澼久服不飢神仙别録潤心肺止嗽補五臟治虚損除腸胃癖氣和光粉燒治疳痢大明小兒患秋痢與蛀棗食之良孟詵殺烏頭附子天雄毒之才和隂陽調榮衛生津液李杲發明𢎞景曰道家方藥以棗為佳餌其皮利肉補虚所以合湯皆擘之也杲曰大棗氣味俱厚陽也温以補不足甘以緩隂血成無已曰邪在榮衛者辛甘以解之故用薑棗以和榮衛生發脾胃升騰之氣張仲景治奔豚用大棗滋脾土以平腎氣也治水飲脇痛有十棗湯益土而勝水也震亨曰棗屬土而有火味甘性緩甘先入脾補脾者未常用甘故今人食甘多者脾必受病也時珍曰素問言棗為脾之果脾病宜食之謂治病和藥棗為脾經血分藥也若無故頻食則生蟲損齒貽害多矣按王好古云中滿者勿食甘甘令人滿故張仲景建中湯心下痞者减餳棗與甘草同例此得用棗之方矣又按許叔微本事方云一婦病臟燥悲泣不止祈禱備至予憶古方治此證用大棗湯遂治與服盡劑而愈古人識病治方妙絶如此又陳自明婦人良方云程虎卿内人妊娠四五箇月遇晝則慘戚悲傷淚下數欠如有所慿醫巫兼治皆無益管伯周說先人曽語此治須大棗湯乃愈虎卿借方治藥一投而愈方見下條又摘𤣥方治此證用紅棗燒存性酒服三錢亦大棗湯變法也附方舊七新十二調和胃氣以乾棗去核緩火逼燥為末量多少入少生薑末白湯㸃服調和胃氣甚良衍義反胃吐食大棗一枚去核用斑蝥一枚去頭翅入在内煨熟去蝥空心食之白湯下良小腸氣痛大棗一枚去核用斑蝥一枚去頭翅入棗内紙包煨熟去蝥食棗以桂心畢澄茄湯下直指傷寒熱病後口乾咽痛喜唾大棗二校烏梅十枚搗入蜜丸含一杏仁嚥汁甚效千金方婦人臟燥悲傷欲哭象若神靈數欠者大棗湯主之大棗十枚少麥一升甘草二兩每服一兩水煎服之亦補脾氣妊娠腹痛大紅棗十四枚燒焦為末以小便服之梅師大便燥塞大棗一枚去核入輕粉半錢縳定煨熟食之仍以棗湯送下直指呪棗治瘧執棗一枚呪曰吾有棗一枚一心歸大道優他或優降或劈火燒之念七遍吹棗上與病人食之即愈􅒖嶁神書煩悶不眠大棗十四枚葱白七莖水三升煑一升頓服千金上氣欬嗽治傷中筋脈急上氣咳嗽者用棗二十枚去核以酥四兩微火煎入棗肉中泣盡酥取收之常含一枚微微嚥之取瘥聖惠方肺疽吐血因啖辛辣熱物致傷者用紅棗連核燒存性百藥煎煆過等分為末每服二錢米飲下三因耳聾鼻塞不聞音聲香臭者取大棗十五枚去皮核蓖麻子三百枚去皮和擣綿褁塞耳鼻日一度三十餘日聞聲及香臭也先治耳後治鼻不可並塞孟詵食療久服香身用大棗肉和桂心白𤓰仁松樹皮為丸久服之食療本草走馬牙疳新棗肉一枚同黄蘗燒焦為末油和傅之若加砒少許更妙王氏愽濟諸瘡久壊不愈者棗膏三升煎水頻洗取愈千金痔瘡疼痛大肥棗一枚剥去皮取水銀掌中以唾研令極熟傅棗瓤上納入下部良外臺下部蟲癢蒸大棗取膏以水銀和捻長三寸以綿褁夜納下部中明日蟲皆出也肘後卒急心疼海上方訣云一個烏梅二個棗七枚杏仁一處搗男酒女醋送下之不害心疼直到老食椒閉氣京棗食之即解也百一選方三嵗陳棗核中仁氣味燔之苦平無毒主治腹痛邪氣别録惡氣卒疰忤孟詵核燒研摻脛瘡良時珍發明時珍曰按劉根别傳云道士陳孜如痴人江夏袁仲陽敬事之孜曰今春當有疾可服棗核中仁二十七枚後果大病服之而愈又云常服棗仁百邪不復干也仲陽服之有效則棗果有治邪之説矣又道書云常含棗核治氣令口行津液嚥之佳謝承後漢書亦云孟節能含棗核不食可至十年也此皆藉棗以生津受氣而嚥之又能逹黄宫以交離坎之義耳葉氣味甘温微毒别録曰散服使人瘦久則嘔吐主治覆麻黄能令出汗本經和葛粉揩熱疿瘡良别録治小兒壯熱煎湯浴之大明附方新二小兒傷寒五日以後熱不退用棗葉半握麻黄半兩葱白豆䜴各一合童子小便二鍾煎一鍾分二服取汗總録反胃嘔噦乾棗葉一兩藿香半兩丁香二錢半每服二錢薑三片水一盞煎服聖惠方木心氣味甘濇温有小毒主治中蠱腹痛面目青黄淋露骨立剉取一斛水淹三寸煑至二斗澄清煎五升旦服五合取吐即愈又煎紅棗服之能通經􅍺時珍品出小方根主治小兒赤丹從脚趺起煎湯頻浴之時珍金出千附方舊一令髮易長取東行棗根三尺横安甑上蒸之兩頭汗出收取傅髮即易長聖惠方皮主治同老桑樹皮並取北向者等分燒研每用一合井水煎澄取清洗目一月三洗昬者復明忌葷酒房事時珍仲思棗宋開寶釋名仙棗志曰北齊時有仙人仲思得此棗種之因以為名集解志曰仲思棗形如大棗長二寸正紫色細文小核味甘今亦少有時珍曰按杜寶大業拾遺記云隋時信都郡獻仲思棗長四寸圍五寸肉肥核小有味勝於青州棗亦名仙棗觀此則廣志之西王母棗穀城紫棗皆此類也氣味甘温無毒主治補虚益氣潤五臟去痰嗽冷氣久服令人肥健好顔色神仙不飢開寶苦棗食性釋名蹶泄爾雅詳名義未集解士良曰苦棗處處有之色青而小味苦不堪人多不能食實氣味苦大寒無毒主治傷寒熱伏在臟腑狂蕩煩滿大小便閉澀取肉煑研和蜜丸服士良本草綱目卷二十九
