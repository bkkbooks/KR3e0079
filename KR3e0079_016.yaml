body:
  text: 本草綱目卷三下明李時珍撰百病主治藥上血汗即䏎衄又名脈益血自毛孔出心主血又主汗極虛有火也內治人參氣散血虛紅汗汙衣同歸茋諸藥煎服又建中湯辰砂妙香散皆宜􅎲傷血絡血出不止以一兩煎服葎草産婦大喜汗出赤色汚衣喜則氣出也搗汁一升入醋二合時服一杯黃芩炙瘡血出不止酒炒末下生薑汁毛竅節次血出不出則皮脹如鼓須臾口目皆脹合名脈益以水和汁各半服郁李仁鵝梨汁調末服止血汗硃砂血汗入麝水服人中白血從膚腠出入麝酒服二錢水銀毛孔出血同硃砂麝香服黃犢臍中屎九竅四肢指岐間血出乃暴怒所致燒末水服方寸七日五涎外治旱蓮傅炙瘡血出不止蜣螂灰同上糞桶􅀈燒傅搔癢血出不止五靈脂摻㧓痣血出不止男子胎髮醫毛孔血出煮酒瓶上紙同上咳嗽血咳血出于肺咯血出于心嗽血出于脾唾血出于腎有火鬱有虛勞火鬱麥門冬片黃芩桔梗生地黃金絲草茅根貝母薑黃牡丹皮芎藭白芍藥大青香附子茜根丹參知母荷葉末藕汁桃仁柿霜乾柿人脾肺消宿血咯血痰涎血杏仁肺熱咳血同青黛黃蠟作餅乾柿夾煨日食水蘇研末飲服紫菀同五味子蜜丸服并治吐血后咳白前久咳唾血同桔梗甘草桑白皮煎服荆芥穗喉脘痰血同甘桔煎服蒲黃桑白皮伏神柳絮末韭汁和童尿生薑蘸百草霜黃蘗槐花末服槲若水煎髮灰童尿並主咳咯唾血巵子炒焦清胃脘血訶子火鬱嗽血烏鴉勞嗽吐血虛勞人參地黃百合紫菀白及黃茋五味子阿膠白膠酥酪黃明膠肺損嗽血炙研湯服豬􅏬一切肺病咳唾膿血豬肺肺虛咳血蘸薏苡仁末食豬心心虛咯血包洗香半夏末煨食烏賊骨女子血枯傷肝唾血諸汗有氣虛濕血虛風熱熱氣虛黃茋泄邪火益元氣實皮毛人參一切虛汗怔同當歸豬腎煮食止忡自汗白术末服或同小麥煎服止自汗同黃茋石斛牡蠣末服主脾虛自汗麻黃根止諸汗必用或末或煎或外撲葳㽔知母地榆並止自汗附子亡陽自汗艾葉盜汗同伏神烏梅煎服何首烏貼臍鬱金塗乳粳米粉外撲麻勃中風汗出糯米同麥麩炒末服韭根四十九根煎果服止盜汗木酸棗仁睡中汗出同參苓末服伏神虛汗盜汗烏梅湯服湯血虛心頭出汗艾調服柏實養心止汗桂主表虛自汗杜仲産后虛汗同牡蠣服吳茱萸産後盜汗惡寒雷丸同胡蟲粉撲獸五倍子同蕎麥粉作餅煨食仍以唾和填臍中牡蠣粉氣虛盜汗同杜仲酒服盜虛勞盜汗同黃茋麻黃根煎服産後汗麩炒研豬肉汁服薑陰汗同蛇牀子乾麻黃根撲之龍骨止夜臥驚汗黃雌雞傷寒後虛汗同麻黃根煮汁入內蓯蓉牡蠣粉煎服豬肝脾虛食即汗出為丸服羊胃作羹食牛羊脂酒服止卒汗血虛草獸當歸地黃白芍藥豬膏産後虛汗同薑汁蜜酒煎服豬心心虛自汗同參歸煮食腎産後汗蓐勞煮粥臛食風熱草部防風止盜汗同人參芎藭末服自汗為末麥湯服白芷盜汗同硃砂服荆芥冷風出汗煮汁服龍膽男女小兒及傷寒一切盜汗為末酒服或加防風黃連降心火止汗胡黃連小兒自汗麥門冬穀菜小麥浮麥麥麵盜汗作丸煮食䜴盜汗熬未酒服蒸餅每夜食一枚止自汗盜汗黃蒸米醋並止黃汗胡瓜小兒出汗同黃連胡黃連黃蘗果大黃諸藥丸服木桃梟止盜汗同霜梅蔥白燈心等煎服椒目盜汗炒研豬唇湯服鹽麩子收汗經霜桑葉除寒熱盜汗末服竹瀝産後虛服汗熱服器敗蒲扇灰水服并撲甑蔽灰水服死人席灰煮浴五色帛拭盜汗乃棄之怔忡血虛有火有痰養血清神草木人參同當歸末豬腎煮食當歸地黃黃茋遠志黃芩黃連瀉心火去心竅惡血巴戟天益氣去心痰香附憂愁心忪少氣疲瘦牡丹皮主神不足瀉包絡火麥門冬伏神茯苓酸棗柏實安魂定魄益智寧神健忘心虛兼痰兼火補虛草木甘草安魂魄瀉火養血主健忘人參開心益智令人不忘同豬肪煉過酒服遠志定心腎氣益智慧不忘為末酒服石菖蒲開心孔通九竅久服不忘不惑為末酒下仙茅久服通神強記聰明淫羊藿益氣強志老人昏耄中年健忘丹參當歸地黃並養血安神定志預知子心氣不足恍惚錯忘忪悸煩鬱同穀人參菖蒲山藥黃精等為丸服菜果木麻勃主健忘七夕日收一升同人參二兩為末蒸熟每卧服一刀圭能盡知四方事山藥鎮心神安魂魄主健忘開達心孔多記事龍眼安志強魂主思慮傷脾健忘怔忡自汗驚悸歸脾湯用之蓮實清心寧神末服乳香心神不足水火不濟健忘驚悸同沉香伏神丸服伏神茯苓柏實酸棗白龍骨健忘同遠志末湯服虎骨同龍骨遠志末服六畜心心昏多忘研末酒服痰熱草果黃連降心火令人不忘玄參補腎止忘麥門冬牡丹皮柴胡木通通利諸經脈壅寒熱之氣令人不忘商陸花人心昏塞多忘喜誤為末夜服夢中亦醒悟也桃枝作枕及刻人金石佩之主健忘獸舊鐵鏵心虛恍惚健忘火燒淬酒浸水日服鐵鏵粉金薄銀薄銀膏硃砂空青白石英心臟風熱驚悸善忘化痰安神同硃砂為末服牛黃除痰熱健忘驚悸有火有痰兼虛清鎮草穀黃連瀉心肝火去心竅惡血止驚悸麥門冬遠志丹參牡丹皮玄參知母並定心安魂魄止驚悸甘草驚悸煩悶安魂魄傷寒心悸脈代煎服半夏心下悸忪同麻黃丸服天南星心膽被驚神不守舍恍惚健忘妄言妄見同硃砂琥珀丸服柴胡除煩止驚平肝膽包絡相火龍膽退肝膽邪熱止驚悸芍藥瀉肝除煩熱驚狂人參黃茋白及胡麻山藥淡竹瀝黃蘗柏實伏神茯苓乳香沒藥血竭酸棗仁厚朴震燒木火驚失志金煮汁服石霹靂砧大驚失心恍惚安神定志天子籍田犁下土驚悸顚邪水服金屑銀屑生銀硃砂銀硃砂銀膏自然銅鉛霜黃丹鐵精鐵粉紫石英煮汁雄黃玻璃白石英五色石脂鱗介禽獸龍骨龍齒夜明沙鼉甲牛黃羚羊角虎睛骨膽羖羊角象牙麝臍香犀角醍