魚小兒差頽核有大小以魚咬之七下即消淡菜腰痛禽疝瘕獸烏雞寒疝絞痛同生地黃蒸取汁服當下出寒癖雞子黃小腸疝氣溫水攪服雄雞翅陰腫如斗隨左右燒灰飮服雀腎冷偏墜疝氣同茴香縮砂椒桂煨食酒下小腸疝同金絲礬研酒服雀卵雀屎並疝瘕烏鴉偏墜疝氣煆研同胡桃蒼耳子末酒服狐陰莖狸陰莖男子卵㿉燒灰水服濕熱草部黃芩小腹絞痛小便如淋同木通甘草煎服柴胡平肝膽三焦火疝氣寒熱龍膽厥陰病臍下至足腫痛丹參通心包絡沙參玄參並主卒得疝氣小腹陰中相引痛欲死各酒服二錢地膚子膀胱疝瘕㿉疝危急者炒研酒服狐疝陰卵疾同白术桂心末服馬鞭草婦人疝氣酒煎熱服仍浴身取汗羌活男子奔豚女人疝瘕海藻疝氣下墜卵腫藁本蛇牀子白鮮皮並主婦人疝瘕澤瀉屋遊赤小豆主小腸膀胱奔豚氣萵苣子陰㿉腫痛為末煎服絲瓜小腸氣痛連果心燒研酒服木梨葉小兒疝痛煎服巵子濕熱因寒氣鬱抑劫藥以巵子降濕熱烏頭去寒鬱引入下焦不留胃中有效杏仁甘李根皮桐木皮訶梨勤水石甘爛水並主奔豚氣代赭石小腸疝氣火煆醋淬末服禹餘糧有腸氣痛為末飮服甘鍋偏墜疝熱酒服痰積草木牽牛腎氣作痛同川椒茴香入豬腎煨食取下惡物射干利積痰瘀血疝毒陰疝痛刺搗汁服取利亦丸服大黃小腹痛老血留結甘遂疝瘕末偏氣同茴香酒服狼毒陰疝欲死同防風附子丸服荆芥破結聚氣下瘀血服陰㿉腫痛焙末酒蒲黃同五靈脂治諸疝痛三稜破積蓬莪茂破痃癖婦人血氣丈夫奔豚一切氣痛疝痛煨研蔥酒服香附子治食積痰氣疝痛同海石末薑汁服商陸天南星貝母芫花防葵巴豆乾漆五加皮鼠李山查核同枳實末服青橘皮並主疝瘕積氣胡盧巴小腸疝同茴香蕎麵蟲丸服取下白膿去根獸斑蝥小腸氣棗包煨食芫青地膽桑螵蛸糞五靈脂疝瘕猬皮疝積燒灰酒服挾虛甘草緩火止痛蒼术疝多濕熱有挾虛者先疏滌而后用參术佐以踈導虛損偏墜四制蒼术丸赤箭當歸芎藭芍藥並主疝瘕搜肝止痛山茱茰巴戟遠志牡丹皮並主奔豚冷氣熟地黃臍下急痛豬脬疝氣墜痛入諸藥煮食陰㿉外治地膚子野蘇槐白皮並煎湯洗馬鞭草大黃和醋白堊土並塗傅蒺藜粉摩莧根塗陰上冷痛入腹殺人熱灰吐症醋調塗釡月下土同上白頭翁搗塗一夜成瘡二十日愈木芙蓉同黃蘗末以木鱉子磨醋和塗雄雞翅灰同蛇牀子末傅石灰同巵子五倍子末醋和傅牡蠣粉水㿉同乾薑末傅鐵精粉蓬砂水研地龍糞馬齒莧並塗小兒陰腫茱茰冷氣內外腎釣痛同鹽研罨蜀椒陰冷漸入囊欲死作袋包本草綱目卷三下
