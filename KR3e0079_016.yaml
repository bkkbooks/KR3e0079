body:
  text: 本草綱目卷三下明李時珍撰百病主治藥上血汗即䏎衂又名脉益血自毛孔出心主血又主汗極虛有火也内治人參氣散血虛紅汗汙衣同歸茋諸藥煎服又建中湯辰砂妙香散皆宜􅎲傷血絡血出不止以一兩煎服葎草産婦大喜汗出赤色汚衣喜則氣出也擣汁一升入醋二合時服一盃黄芩炙瘡血出不止酒炒末下生薑汁毛竅節次血出不出則皮脹如皷須臾口目皆脹合名脉益以水和汁各半服郁李仁鵞梨汁調末服止血汗硃砂血汗入麝水服人中白血從膚腠出入麝酒服二錢水銀毛孔出血同硃砂麝香服黄犢臍中屎九竅四肢指岐間血出乃暴怒所致燒末水服方寸七日五㳄外治旱蓮傅炙瘡血出不止蜣螂灰同上糞桶􅀈燒傅搔痒血出不止五靈脂摻㧓痣血出不止男子胎髪醫毛孔血出煑酒瓶上紙同上欬嗽血欬血出于肺咯血出于心嗽血出于脾唾血出于腎有火鬱有虛勞火鬱麥門冬片黄芩桔梗生地黄金絲草茅根貝母薑黄牡丹皮芎藭白芍藥大青香附子茜根丹參知母荷葉末藕汁桃仁柿霜乾柹人脾肺消宿血咯血痰涎血杏仁肺熱欬血同青黛黄蠟作餅乾柹夾煨日食水蘇研末飲服紫菀同五味子蜜丸服并治吐血后欬白前久欬唾血同桔梗甘草桑白皮煎服荆芥穗㗋脘痰血同甘桔煎服蒲黄桑白皮伏神柳絮末韭汁和童尿生薑蘸百草霜黄蘗槐花末服槲若水煎髪灰童尿並主欬咯唾血巵子炒焦清胃脘血訶子火鬱嗽血烏鴉勞嗽吐血虛勞人參地黄百合紫菀白及黄茋五味子阿膠白膠酥酪黄明膠肺損嗽血炙研湯服豬􅏬一切肺病欬唾膿血豬肺肺虛欬血蘸薏苡仁末食豬心心虛咯血包洗香半夏末煨食烏賊骨女子血枯傷肝唾血諸汗有氣虛濕血虛風熱熱氣虛黄茋泄邪火益元氣實皮毛人參一切虛汗怔同當歸猪腎煑食止忡自汗白术末服或同小麥煎服止自汗同黄茋石斛牡蠣末服主脾虛自汗麻黄根止諸汗必用或末或煎或外撲葳㽔知母地榆並止自汗附子亡陽自汗艾葉盗汗同伏神烏梅煎服何首烏貼臍鬱金塗乳粳米粉外撲麻勃中風汗出糯米同麥麩炒末服韭根四十九根煎果服止盜汗木酸棗仁睡中汗出同參苓末服伏神虛汗盜汗烏梅湯服湯血虚心頭出汗艾調服柏實養心止汗桂主表虛自汗杜仲産后虛汗同牡蠣服吳茱萸産後盜汗惡寒雷丸同胡䖝粉撲獸五倍子同蕎麥粉作餅煨食仍以唾和塡臍中牡蠣粉氣虛盜汗同杜仲酒服盜虛勞盜汗同黄茋麻黄根煎服産後汗麩炒研猪肉汁服薑陰汗同蛇牀子乾麻黄根撲之龍骨止夜臥驚汗黄雌鷄傷寒後虛汗同麻黄根煑汁入内蓯蓉牡蠣粉煎服猪肝脾虛食卽汗出為丸服羊胃作羹食牛羊脂酒服止卒汗血虚草獸當歸地黄白芍藥猪膏産後虛汗同薑汁蜜酒煎服猪心心虛自汗同參歸煑食腎産後汗蓐勞煑粥臛食風熱草部防風止盜汗同人参芎藭末服自汗為末麥湯服白芷盗汗同硃砂服荆芥冷風出汗煑汁服龍膽男女小兒及傷寒一切盜汗為末酒服或加防風黄連降心火止汗胡黄連小兒自汗麥門冬穀菜小麥浮麥麥麫盗汗作丸煑食䜴盗汗熬未酒服蒸餅每夜食一枚止自汗盗汗黄蒸米醋並止黄汗胡𤓰小兒出汗同黄連胡黄連黄蘗果大黄諸藥丸服木桃梟止盜汗同霜梅葱白燈心等煎服椒目盜汗炒研猪唇湯服鹽麩子收汗經霜桑葉除寒熱盜汗末服竹瀝産後虛服汗熱服器敗蒲扇灰水服并撲甑蔽灰水服死人席灰煑浴五色帛拭盜汗乃棄之怔忡血虛有火有痰養血清神草木人參同當歸末猪腎煑食當歸地黄黄茋遠志黄芩黄連瀉心火去心竅惡血巴㦸天益氣去心痰香附憂愁心忪少氣疲瘦牡丹皮主神不足瀉包絡火麥門冬伏神茯苓酸棗柏實安魂定魄益智寧神徤忘心虛兼痰兼火補虛草木甘草安魂魄瀉火養血主徤忘人參開心益智令人不忘同猪肪煉過酒服遠志定心腎氣益智慧不忘為末酒服䂖菖蒲開心孔通九竅久服不忘不惑為末酒下仙茅久服通神強記聰明滛羊藿益氣強志老人昬耄中年徤忘丹參當歸地黄並養血安神定志預知子心氣不足恍惚錯忘忪悸煩鬱同穀人參菖蒲山藥黄精等為丸服菜果木麻勃主徤忘七夕日收一升同人參二兩為末蒸熟毎卧服一刀圭能盡知四方事山藥鎭心神安魂魄主徤忘開達心孔多記事龍眼安志強魂主思慮傷脾徤忘怔忡自汗驚悸歸脾湯用之蓮實清心寧神末服乳香心神不足水火不濟徤忘驚悸同沉香伏神丸服伏神茯苓柏實酸棗白龍骨徤忘同遠志末湯服虎骨同龍骨遠志末服六畜心心昬多忘研末酒服痰熱草果黄連降心火令人不忘𤣥參補腎止忘麥門冬牡丹皮柴胡木通通利諸經脉壅寒熱之氣令人不忘商陸花人心昬塞多忘喜誤為末夜服夢中亦醒悟也桃枝作枕及刻人金石佩之主徤忘獸舊鐵鏵心虛恍惚徤忘火燒淬酒浸水日服鐵鏵粉金薄銀薄銀膏硃砂空青白石英心臟風熱驚悸善忘化痰安神同硃砂為末服牛黄除痰熱健忘驚悸有火有痰兼虛清鎭草穀黄連瀉心肝火去心竅惡血止驚悸麥門冬遠志丹參牡丹皮𤣥參知母並定心安魂魄止驚悸甘草驚悸煩悶安魂魄傷寒心悸脉代煎服半夏心下悸忪同麻黄丸服天南星心膽被驚神不守舎恍惚徤忘妄言妄見同硃砂琥珀丸服柴胡除煩止驚平肝膽包絡相火龍膽退肝膽邪熱止驚悸芍藥瀉肝除煩熱驚狂人參黄茋白及胡麻山藥淡竹瀝黄蘗柏實伏神茯苓乳香没藥血竭酸棗仁厚朴震燒木火驚失志金煑汁服石霹靂碪大驚失心恍惚安神定志天子籍田犁下土驚悸顚邪水服金屑銀屑生銀硃砂銀硃砂銀膏自然銅鉛霜黄丹鐵精鐵粉紫石英煑汁雄黄玻瓈白石英五色石脂鱗介禽獸龍骨龍齒夜明沙鼉甲牛黄羚羊角虎睛骨膽羖羊角象牙麝臍香犀角醍醐並鎭心平肝除驚悸猪心除驚補血産後驚悸煑食猪心血同青黛硃砂丸服治心病邪熱猪腎心腎虛損同參歸煑食六畜心心虛作痛驚悸恐惑震肉因驚失心作脯食人魄磨水服定驚悸狂走狂惑有火有痰及畜血清鎭草部黄連藍汁麥門冬薺苨茵蔯海金沙並主傷寒發狂葳㽔紫參白頭翁並主狂瘧白微暴中風熱忽忽不知人狂惑邪氣白鮮皮腹中大熱飲水欲走發狂龍膽傷寒發狂為末入鷄子清生蜜凉水服撒法卽卽畨紅花水浸服主傷寒發狂葛根栝樓根大黄熱病譫狂為散服攀倒甑汁主風熱狂躁服苦參熱病發狂不避水火蜜丸服麥門冬芍藥景天鴨跖草並主熱狂葶藶卒發狂白犬血丸服鬱金失心顚狂同明礬丸服莨菪子防葵並主顚狂多穀服令人狂走菜麥苗汁主時疾狂熱麥奴陽毒熱狂大渴䓤白天行熱狂百合顚邪狂呌涕泣淡竹笋熱狂果有痰木𤓰蒂熱水服取吐甘蔗天行熱狂臘月瓶封糞坑中絞汁服苦棗桃花楝實淡竹葉並主熱狂竹瀝痰在胸膈使人顚狂二小兒狂語夜後便發毎服合巵子畜熱狂躁同䜴煎服取吐桐木皮吐下雷丸顚癎狂走欒花諸風狂痙經死繩灰卒發狂水服水土金石半天河鬼狂臘雪熱狂伏龍肝狂顚風邪水服釡墨百草霜並陽毒發狂車脂中風發狂醋服一團硃砂顚癎狂亂猪心煑過同伏神丸服産後敗血入心狂顚見祟為末地龍滚過酒服寒水石傷寒發狂踰垣上屋同黄連末服𤣥明粉傷寒發狂同硃砂服粉霜傷寒積熱及風熱生驚如狂同鉛霜輕粉白麪作丸服𤣥精石菩薩石雄黄並熱狂鐵落平肝去怯善怒發狂為飮服下痰氣鐵甲憂結善怒狂易鐵漿發熱狂走銀屑銀膏金屑鱗介龍齒並鎭神定狂熱文􅀈食之已狂貝子玳瑁並主傷䖝寒熱狂禽蠶退紙灰顚狂邪祟狂走悲泣自高酒服一匕白雄鷄顚邪狂妄自賢自聖作羹粥食煑驚憤邪僻志氣錯越入眞珠薤白食鷄子天行熱疾狂走生吞一枚鷗躁渴狂邪五味醃食鵲巢灰服主顚狂鳳凰臺磨水服獸主熱狂人羚羊角驚夢狂越僻謬平肝安魂犀角時疾熱毒入心狂言妄語鎭肝退熱消痰解毒牛黄㹈牛黄並驚驢脂狂顚和烏梅丸服驢肉風狂憂愁不樂安心止煩煑食或作粥食之六畜毛蹄甲顚狂妄走猳猪肉狂病久不愈白犬血熱病發狂見鬼垂死熱貼胸上狗肝心風發狂擦消石黄丹煑嚼靈猫陰狂邪鬼神鎭心安神人中黄熱病發狂如見鬼久不得汗及不知人煆研水服人屎時行大熱狂走水服人尿血悶熱狂人魄磨水服定驚悸顚狂胞衣水諸熱毒狂言紫河車煑食主失心風耳塞顚狂鬼神煩躁肺主煩腎主躁有痰有火有蟲厥清鎭草部黄連黄芩麥門冬知母貝母車前子丹參𤣥參甘草柴胡甘蕉根白前葳㽔龍膽草防風蠡實芍藥地黄五味子酸漿青黛栝樓子葛根菖蒲菰筍萱根土𤓰根王不留行並主熱煩海苔研飮止煩悶胡黄連主心煩熱米飮末服牛蒡根服汁止熱攻心煩欵冬花潤心肺除煩白术煩悶煎服苧麻蒲黄並主産穀後心煩菜小麥糯米泔浙二泔赤小豆䜴麨蘖米醬汁米醋芋蓳水芹菜白菘菜淡竹筍壺蘆冬𤓰越𤓰果木西𤓰甜𤓰烏梅及核仁李根白皮杏仁大棗榅桲椑柿荔枝巴旦杏橄欖波羅蜜梨汁枳椇葡萄甘蔗刺宻都咸子都桷子藕荷葉芡莖猴桃竹瀝竹葉淡竹葉楝實厚朴黄櫨盧㑹巵子荆瀝猪苓酸棗仁胡桐淚伏神茯苓槐子大熱心煩燒研酒服黄蘗金石鈆霜不灰木眞玉禹餘根滑石煎汁煑粥五色石脂硃砂理石凝水石石膏𤣥明粉石䶨甜消鱗介龍骨文蛤眞珠合知母服蟶肉禽獸抱出鷄子殻小兒煩滿欲死燒末酒服鷄子白諸畜血驢肉羚羊角並主熱煩犀角磨汁服鎭心解大熱風毒攻心􅀈氉熱悶水羊角灰氣逆煩滿水服白犬骨灰産後煩懣水服不眠有心虛膽虛兼火清熱草部燈心草夜不合眠煎湯代茶半夏陽盛陰虛目不得瞑同秫米煎以千里流水炊以葦火飲之即得卧地黄助心膽氣麥門冬降心肺熱穀安魂魄菜秫米大豆日夜不眠以新布火炙熨目并蒸豆枕之乾薑虛勞不眠研末二錢湯服取汗苦竹笋睡菜蕨菜馬蘄子果木烏梅樃榆並令人得睡榆莢仁作糜羹食令人多睡㽔核熟用酸棗膽虛煩心不得眠炒熟為末竹葉湯下或加人參茯苓白术甘草煎服砂或加人参辰乳香丸服大棗煩悶不眠同葱白煎服木槿葉炒煎飲服令人得眠郁李仁因悸不得眠為末酒服松蘿去痰熱令人得睡乳香治不服入心活血伏神知母牡丹皮金石生銀紫石英硃砂蟲獸蜂蜜白鴨煑汁馬頭骨灰膽虛不眠同乳香酸棗末服多眠脾虛兼濕熱風熱脾濕草木木通脾病常欲眠术葳㽔黄茋人參沙參土茯苓茯苓荆瀝南燭並主好睡㽔核生用治足睡花構葉人耽睡晒研鱗湯服日二禽龍骨主多寐洩精尸鳩安神定志令人少睡風熱草部苦參營實並除有熱好睡甘藍及子久食益心力治人多睡龍葵酸漿並令人少睡當歸地黄並主脾氣痿躄嗜臥蒼耳白微風溫灼熱多眠白苣苦苣果木茶治風熱昬憒多睡不醒臯盧除煩消痰令人不睡酸棗膽熱好眠生研湯服棗葉生煎獸飲部馬頭骨灰膽熱多眠燒灰水服日三夜一亦作枕龍又同硃砂鐵粉膽丸服消渴上消少食如中消多食下消小便膏油生津潤燥草部栝樓根為消渴要藥煎湯作粉熬膏皆良黄栝樓酒洗熬膏白礬丸服王𤓰子食後嚼二三兩王𤓰根生葛根煑服白芍藥同甘草煎服日三渴十年者亦愈蘭葉生津止渴除陳氣芭蕉根汁日飲牛蒡子葵根消渴小便不利煎服消中尿多亦煎服甘藤汁大瓠藤汁穀菜菰米煮汁青梁米粟米麻子仁煑汁漚麻汁波稜根同鷄内金末米飲日服治日飲水一石者出了子蘿蔔杵汁飲或為末日服止渴潤燥蔓菁根竹筍生薑鯽魚膽果和丸服木烏梅止渴生津微研水煎入䜴再煎服椑柿止煩渴君遷子李根白皮山礬石蟲礬石五倍子生津止