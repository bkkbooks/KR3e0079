body:
  text: 本草綱目卷三十九明李時珍撰蟲之一卵生類上二十三種蜂蜜本經上品釋名蜂糖俗名生巖石者名石蜜本經石飴同上巖蜜時珍曰蜜以密成故謂之蜜本經原作石蜜蓋以生巖石者為良耳而諸家反致疑辨今直題曰蜂蜜正名也正誤恭曰土蜜出氐羌最勝今關中白蜜甘美耐久全勝江南者陶未見故以南土為勝耳今以水牛乳沙糖作者亦名石蜜此蜜既蜜作宜去石字宗奭曰嘉祐本草石蜜有二一見蟲魚一見果部乳糖既曰石蜜則蟲部石蜜不當言石矣石字乃白字誤耳故今人尚言白沙蜜蓋新蜜稀而黃陳蜜白而沙也藏器曰巖蜜出南方巖嶺間入藥最勝石蜜宜改為巖字蘇恭是荆襄間人地無崖險不知石蜜之勝故也時珍曰按本經石蜜生諸山石中色白如膏者良是蜜取山石者為勝矣蘇恭不考山石字因乳糖同名而欲去石字冦氏不知真蜜有白沙而偽蜜稀黃但以新久立説並誤矣凡試蜜以燒紅火筋插入提出起氣是真起煙是偽無疑集解别録曰石蜜生武都山谷河源山谷及諸山石間色白如膏者良𢎞景曰石蜜即崖蜜也在髙山巖石間作之色青味小酸食之心煩其蜂黑色似虻其木蜜懸樹枝作之色青白土蜜在土中作之色亦青白味醶人家及樹空作者亦白而濃厚味美今出晉安檀崖者多土蜜云最勝出東陽臨海諸處及江南向西者多木蜜出於潛懷安諸縣者多崖蜜亦有樹木及人家養者諸蜜例多添雜及煎煮不可入藥必須親自看取乃無雜耳凡蜂作蜜皆須人小便以釀諸花乃得和熟狀似作飴須蘖也藏器曰尋常蜜亦有石上作者土中作者北方地燥多在土中南方地濕多在木中各隨土地所宜其蜜一也崖蜜别是一蜂如陶所説出南方崖嶺間房懸崖上或土窟中人不可到但以長竿刺令蜜出以物承取多者至三四石味醶色緑入藥勝於凡蜜張華博物志云南方諸山幽僻處出蜜蠟蜜蠟所著皆絶巖石壁非攀緣所及惟於山頂以藍輿懸下遂得采取蜂去餘蠟如在石有鳥如雀羣來啄之殆盡名曰靈雀至春蜂歸舊人亦占護其處謂之蜜塞此即石蜜也頌曰食蜜亦有兩種一在山林木上作房一在人家作窠檻收養之蜜皆濃厚味美近世宣州有黃連蜜色黃味小苦主目熱雍洛間有梨花蜜白如凝脂亳州太清宫有檜花蜜色小赤柘城縣有何首烏蜜色更赤並蜂采其花作之各隨花性之溫涼也宗奭曰山蜜多在石中木上有經一二年者氣味醇厚人家者一嵗二取氣味不足故不及且久收易酸也時珍曰陳藏器所謂靈雀者小鳥也一名蜜母黑色正月則至巖石間尋求安處羣蜂隨之也南方有之修治斆曰凡煉蜜一斤只得十二兩半是數若火少太過並用不得時珍曰凡煉沙蜜每斤入水四兩銀石器內以桑柴火慢煉掠去浮沫至滴水成珠不散乃用謂之水火煉法又法以器盛置重湯中煮一日候滴水不散取用亦佳且不傷火也氣味甘平無毒别録曰微溫頴曰諸蜜氣味當以花為主冬夏為上秋次之春則易變而酸閩廣蜜極熱以南方少霜雪諸花多熱也川蜜溫西蜜則涼矣劉完素曰蜜成於蜂蜂寒而蜜溫同質異姓也時珍曰蜂蜜生涼熟溫不冷不燥得中和之氣故十二臟腑之病罔不宜之但多食亦生濕熱蟲𧈟小兒尤當戒之王充論衡云蜂蠆稟太陽火氣而生故毒在尾蜜為蜂液食多則令人毒不可不知煉過則無毒矣宗奭曰蜜雖無毒多食亦生諸風也朱震亨曰蜜喜入脾西北髙燥故人食之有益東南卑濕多食則害生於脾也思邈曰七月勿食生蜜令人暴下霍亂青赤酸者食之心煩不可與生蔥萵苣同食令人利下食蜜飽後不可食鮓令人暴亡主治心腹邪氣諸驚癎痙安五臟諸不足益氣補中止痛解毒除衆病和百藥久服強志輕身不飢不老延年神仙本經養脾氣除心煩飲食不下止腸澼肌中疼痛口瘡明耳目别録牙齒疳𧈟唇口瘡目膚赤障殺蟲藏器治卒心痛及赤白痢水作蜜漿頓服一碗止或以薑汁同蜜各一合水和頓服常服面如花紅甄權治心腹血刺痛及赤白痢同生地黃汁各一匙服即下孟詵同薤白搗塗湯火傷即時痛止宗奭曰肘后用白蜜塗上竹膜貼之日三和營衛潤臟腑通三焦調脾胃時珍發明𢎞景曰石蜜道家丸餌莫不須之仙方亦單服食云至長生不老也時珍曰蜂采無毒之花釀以大便而成蜜所謂臭腐生神奇也其入藥之功有五清熱也補中也解毒也潤燥也止痛也生則性涼故能清熱熟則性溫故能補中甘而和平故能解毒柔而濡澤故能潤燥緩可以去急故能止心腹肌肉瘡瘍之痛和可以致中故能調和百藥而與甘草同功張仲景治陽明結燥大便不通蜜煎導法誠千古神方也詵曰但凡覺有熱四肢不和即服蜜漿一碗甚良又點目中熱膜以家養白蜜為上木蜜次之崖蜜更次之也與薑汁熬煉治癩甚效附方舊十三新六大便不通張仲景傷寒論云陽明病自汗小便反利大便哽者津液內渴也蜜煎導之用蜜二合銅器中微火煎之候凝如飴狀至可丸乘熱捻作挺令頭鋭大如指長寸半許候冷即硬納便道中少頃即通也一法加皂角細辛為末少許尤速噫不下食取崖蜜含微微咽下廣利方産後口渴用煉過蜜不計多少熟水調服即止産書難産橫生蜂蜜真麻油各半碗煎減半服立下海上方天口虜瘡比嵗有病天行斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療數日必死差後瘡瘢黯色十嵗方滅此惡毒之氣世人云建武中南陽擊虜所得仍呼為虜瘡諸醫參詳療之取好蜜通摩瘡上以蜜煎升麻數七拭之肘后痘疹作養難忍抓成瘡及疱欲落不落百花膏用上等石蜜不拘多少湯和時時以翎刷之其瘡易落自無瘢痕全幼心鑑病丙穩禾疹瘙癢白蜜不拘多少好酒調下有效五色丹毒蜜和乾薑未傅之肘後口中生瘡蜜浸大青葉含之藥性論隂頭生瘡以蜜煎甘草塗之瘥外臺肛門生瘡肛門主肺肺熱即肛塞腫縮生瘡白蜜一斤豬膽汁一枚相和微火煎令可丸丸三寸長作挺塗油納下部臥令後重須臾通泄梅師疔腫惡毒用生蜜與隔年蔥研膏先刺破塗之如人行五里許則疔出後以熱醋湯洗去濟急仙方熱油燒痛以白蜜塗之梅師大瘋癩瘡取白蜜一斤生薑二斤搗取汁先稱銅鐺斤兩下薑汁於蜜中消之又稱之令知斤兩即下蜜於鐺中微火煎令薑汁盡稱蜜斤兩在即藥已成矣患三十年癩者平旦服棗許大一丸一日三服溫酒下忌生冷醋滑臭物功用甚多不能一一具之食療方面上皯點取白蜜和茯苓末塗之七日便瘥也孫真人食忌目生珠管以生蜜塗目仰臥半日乃可洗之日一次肘後方誤吞銅錢煉蜜服二升可出矣葛氏方諸魚骨鯁以好蜜稍稍服之令下葛氏拔白生黑治年少髮白拔去白髮以白蜜塗毛孔中即生黑髮不生取梧桐子搗汁塗上必生黑者梅師方蜜蠟本經上品釋名𢎞景曰生於蜜中故謂蜜蠟時珍曰蠟猶鬛也蜂造蜜蠟而皆成鬛也集解别録曰蠟生武都山谷蜜廬木石間𢎞景曰蜂先以此為蜜跖煎蜜亦得之初時極香軟人更煮煉或少加醋酒便黃赤以作褐色為好今醫家皆用白蠟但取削之於夏月暴百日許自然白也卒用之煬內水中十餘遍亦白宗奭曰新蠟色白隨久則黃白蠟乃蠟之精英者也時珍曰蠟乃蜜脾底也取蜜後煉過濾入水中候凝取之色黃者俗名黃蠟煎煉極淨色白者為白蠟非新則白而久則黃也與今時所用蟲造白蠟不同氣味甘微溫無毒之才曰惡芫花齊蛤主治蜜蠟主下痢膿血補中續絶傷金瘡益氣不飢耐老本經權曰和松脂杏仁棗肉茯苓等分合成食後服五十丸便不飢頌曰古人荒嵗多食蠟以度飢但合大棗咀嚼即易爛也白蠟療人泄澼後重見白膿補絶傷利小兒久服輕身不飢别録孕婦胎動下血不絶欲死以雞子大煎三五沸投美酒半升服立瘥又主白髮鑷去消蠟點孔中即生黑者甄權發明時珍曰蜜成於蠟而萬物之至味莫甘於蜜莫淡於蠟得非厚於此必薄於彼耶蜜之氣味俱厚屬於隂也故養脾蠟之氣味俱薄屬乎秋也故養胃厚者味甘而性緩質柔故潤臟腑薄者味淡而性嗇質堅故止泄痢張仲景治痢有調氣飲千金方治痢有膠蠟湯其效甚捷蓋有見於此歟又華他治老少下痢食入即吐用白蠟方寸匕雞子黃一箇石蜜苦酒髮灰黃連末各半雞子殼先煎蜜蠟苦酒雞子四味令勻乃納連髮熬至可丸乃止二日服盡神效無比也此方用之屢經效驗乃知本經主下痢膿血之言深當膺服也附方舊十八新十五仲景調氣飲治赤白痢小腹痛不可忍下重或面青手足俱變者用黃蠟三錢阿膠三錢同溶化入黃連末五錢攪勻分三次熱服神妙金匱千金膠蠟湯治熱痢及婦人産後下痢用蠟二碁子大阿膠二錢當歸二錢半黃連三錢黃蘗一錢陳廩米半升水三鍾煮米至一升去米入藥煎至一鍾溫服神效千金方急心疼痛用黃蠟燈上燒化丸芡子大百草霜為衣井水下三丸肺虛咳嗽立效丸治肺虛隔熱咳嗽氣急煩滿咽乾燥渴欲飲冷水體倦肌瘦發熱減食喉音嘶不出黃蠟溶濾令淨漿水煮過八兩再化作一百二十丸以蛤粉四兩為衣養藥每服一丸胡桃半箇細嚼溫水下即臥閉口不語日二普濟方肝虛雀目黃蠟不拘多少溶汁取出入蛤粉相和得所每用刀子切下二錢以豬肝二兩批開摻藥在內麻繩札定水一碗同入銚子內煮熟取出乘熱蒸眼至溫并肝食之日二以平安為度其效如神集驗方頭瘋掣疼湖南押衙顔思退傳方用蠟二斤鹽半斤相和於鏭羅中溶令相入揑作一兜鍪勢可合腦大小空頭至額其痛立止也經驗方腳上轉筋劉禹錫續傳信方用蠟半斤銷之塗舊絹帛上隨患大小潤狹乘熱纒腳須當腳心便著襪褁之冷即易仍貼兩手心圖經暴風身冷暴風通身水冷如癱緩者用上方法隨所患大小濶狹攤貼并褁手足心風毒驚悸同上方法破傷風濕如瘧者以黃蠟一塊熱酒化開服立效與玉真散對用尤妙瑞竹堂方代指疼痛以蠟松膠相和火炙籠指即瘥千金翼腳上凍瘡濃煎黃蠟塗之姚和衆狐尿刺人腫痛用熱蠟者瘡并煙熏之令汁出即愈肘后方犬咬瘡發以蠟炙溶灌入瘡中氏葛方蛇毒螫傷以竹筒合瘡上溶蠟灌之效徐玉方湯火傷瘡焮赤疼痛毒腐成膿用此拔熱毒止疼痛斂瘡口用麻油四兩當歸一兩煎焦去滓入黃蠟一兩攪化放冷攤帛貼之神效要醫林集臁脛爛瘡用桃柳槐椿楝五枝同荆芥煎湯洗拭淨以生黃蠟攤油紙上隨瘡大小貼十層以帛拴定三日一洗除去一層不用一月痊愈醫林集要妊娠胎漏黃蠟一兩老酒一碗溶化熱服頃刻即止厄逆不止黃蠟燒煙熏二三次即止醫方摘方霍亂吐利蠟一彈丸熱酒一升化服即止肘後方諸般瘡毒臁瘡金瘡湯火等瘡用黃蠟一兩香油二兩黃丹半兩同化開頓冷瓶收攤貼王仲勉經驗蜜蜂本經上品釋名蠟蜂綱目􅢮時珍曰蜂尾垂鋒故謂之蜂蜂有禮範故謂之􅢮禮記云范則冠而蟬有緌化書云蜂有君臣之禮是矣集解别録曰蜂子生武都山谷頌曰今處處有之即蜜蜂子也在蜜脾中如蠶蛹而白色嶺南人取頭足未成者油炒食之時珍曰蜂子即蜜蜂子未成時白蛹也禮記有雀鷃蜩范皆以供食則自古食之矣其蜂有三種一種在林木或土穴中作房為野蜂一種人家以器收養者為家蜂並小而微黃蜜皆濃美一種在山巖髙峻處作房即不蜜也其蜂黑色似牛虻三者皆羣居有王王大於衆蜂而色青蒼皆一日兩衙應潮上下凡蜂之雄者尾鋭雌者尾岐相交則黃退嗅花則以鬚代鼻采花則以股抱之按王元之蜂記云蜂王無毒窠之始營必造一臺大如桃李王居臺上生子於中王之子盡復為王嵗分其族而去其分也或鋪如扇或圓如罌擁其王而去王之所在蜂不敢螫若失其王則衆潰而死其釀蜜如脾謂之蜜脾凡取其蜜不可多多則蜂飢而不蕃又不可少少則蜂惰而不作嗚呼王之無毒似君德也營巢如臺似建國也子復為王似分定也擁王而行似衛主也王所不螫似遵法也王失則潰守義節也取惟得中似什一而稅也山人貪其利恐其分而刺其子不仁甚矣蜂子氣味甘平微寒無毒大明曰涼有毒食之者須以冬瓜苦蕒生薑紫蘇制其毒之才曰畏黃芩芍藥牡蠣白前主治頭瘋除蠱毒補虛羸傷中久服令人光澤好顔色不老本經面𢎞景曰酒漬傅令人悅白輕身益氣治心腹痛面目黃大人小兒腹中五蟲從口吐出者别録主丹毒風疹腹內留熱利大小便澀去浮血下乳汁婦人帶下病藏器大風癘疾時珍發明時珍曰蜂子古人以充饌品故本經别録著其功效而聖濟總録治大風疾兼用諸蜂子蓋亦足陽明太隂之藥也附方新一大瘋癘疾鬚眉墮落皮肉已爛成瘡者用蜜蜂子胡蜂子黃蜂子並炒各一分白花蛇烏蛇並酒浸去皮骨炙乾全蝎去尾炒白薑蠶炒各一兩地龍去土炒半兩􅙴虎全用炒赤足蜈蚣全者炒各十五枚丹砂一兩雄黃醋熬一分龍腦半錢右為末每服一錢匕溫蜜湯調下日三五服總録土蜂别録校正舊與蜜蜂子同條今分出釋名蜚零本經蟺蜂音蟬同上馬蜂頌曰郭璞注爾雅云今江東呼大蜂在地中作房者為土蜂即馬蜂也荆巴間呼為蟺蜂集解别録曰土蜂生武都山谷藏器曰土蜂穴居作房赤黑色最大螫人至死亦能釀蜜其子亦大而白頌曰土蜂子江東人亦啖之又有木蜂似土蜂人亦食其子然則蜜蜂土蜂木蜂黃蜂子俱可食大抵蜂類同科其性效不相逺矣蜂主治燒末油和傳蜘蛛咬瘡藏器曰此物能食蜘蛛取其相伏也蜂子氣味甘平有毒大明曰同蜜蜂畏亦同也主治癰腫本經嗌痛别録利大小便治婦人帶下日華功同蜜蜂子藏器酒浸傅面令人悅白時珍附方新一面黑令白土蜂子未成頭翅者炒食并以酒浸傳面聖惠方房主治癰疽不消為末醋調塗之乾更易之不入服食藥性療丁腫瘡毒時珍附方新一疔腫瘡毒已篤者二服即愈輕者一服立效用土蜂房一箇蛇蛻一條黃泥固濟煅存性為末每服一錢空心好酒下少頃腹中大痛痛止其瘡已化為黃水矣普濟方大黃蜂别録校正舊與蜜蜂同條今分出釋名黑色者名胡蜂廣雅壺蜂方言􅫴􅕕蜂音鈎婁玄瓠蜂時珍曰凡物黑色者謂之胡其壺瓠􅫴􅕕皆象形命名也􅫴􅕕苦瓠之名楚辭云玄蜂若壺是矣大黃蜂色黃􅫴􅕕蜂色黑乃一類二種也陶説為是蘇頌以為一種非矣然蜂蛹蜂房功用則一故不必分條集解𢎞景曰大黃蜂子乃人家屋上者及􅫴􅕕蜂也頌曰大黃蜂子在人家屋上作房及大木間即􅫴􅕕蜂之子也嶺南人取其子作饌食之其蜂黃色比蜜蜂更大按嶺表録異云宣歙人好食蜂兒山林間大蜂結房大者如巨鐘其房數百層土人采時著草衣蔽身以捍其毒螫復以煙火熏去蜂母乃敢攀緣崖木斷其蒂一房蜂兒五六斗至一石揀狀如蠶蛹瑩白者以鹽炒暴乾寄入京洛以為方物然房中蜂兒三分之一翅足已成則不堪用據此則木上作房蓋􅫴􅕕之類然今宣城蜂子乃握地取之似土蜂也郭璞注爾雅云土蜂乃大蜂在地中作房木蜂似土蜂而小江東人並食其子然則二蜂皆可食久矣大抵性味亦不相逺也蜂子氣味甘涼有小毒大明曰見蜜蜂下主治心腹脹滿痛乾嘔輕身益氣别録治雀卵斑面皰餘功同蜜蜂子時珍附方新一雀斑面皰七月七日取露蜂子於漆碗中水酒浸過濾汁調胡粉傅之普濟方露蜂房本經中品釋名蜂腸本經蜂􅀈􅀈與窠同百穿並别録紫金沙集解别録曰露蜂房生牂牁山谷七月七日采隂乾𢎞景曰此蜂房多在樹木中及地中今曰露蜂房當用人家屋間及樹枝間苞褁者乃逺舉牂牁未解所以恭曰此房懸在樹上得風露者其蜂黃黑色長寸許螫馬牛及人乃至欲死非人家屋下小小蜂房也韓保升曰此樹上大黃蜂窠也所在皆有大者如甕小者如桶十一二月采之宗奭曰露蜂房有二褈一種小而色淡黃窠長六七寸至一尺濶二三寸如蜜脾下垂一邊多在叢木深林之中謂之牛舌蜂一種多在髙木之上或屋之下外面圍如三四斗許或一二斗中有窠如瓠狀由此得名玄瓠蜂其色赤黃大於諸蜂今人皆兼用之斆曰蜂房有四件一名革蜂窠大者一二丈圍在樹上內窠小隔六百二十六箇大者至一千二百四十箇其裹粘木蒂是七姑木汁其蓋是牛糞沫其隔是葉蕊也二名石蜂窠只在人家屋上大小如拳色蒼黑內有青色蜂二十一箇或只十四箇其蓋是石垢其粘處是七姑木汁其隔是竹蛀也三名獨蜂窠大小如鵝卵大皮厚蒼黃色是小蜂并蜂翅盛向裏只有一箇蜂大如小石燕子許人馬被螫著立亡也四名是草蜂窠也入藥以革蜂窠為勝時珍曰革蜂乃山中大黃蜂也其房有重重如樓臺者石蜂草蜂尋常所見蜂也獨蜂俗名七里蜂者是矣其毒最猛修治斆曰凡使革蜂窠先以鴉豆枕等同拌蒸從已至未時出鴉豆枕了晒乾用大明曰入藥並炙用氣味甘平有毒别録曰鹹芩之才曰惡乾薑丹參黃芍藥牡礪主治驚癎瘈瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良本經療蜂毒毒腫合亂髮蛇皮燒灰以酒日服二方寸匕治惡疽附骨癰根在臟腑厯節腫出丁腫惡脈諸毒皆瘥别録療上氣赤白痢遺尿失禁燒灰酒服主隂痿水煮洗狐尿刺瘡服汁下乳石毒蘇恭煎水洗熱病後毒氣衝目炙研和豬脂塗瘰癧成瘻蘇頌煎水漱牙齒止風蠱疼痛又洗乳癰蜂疔惡瘡大明發明時珍曰露蜂房陽明藥也外科齒科及他病用之者亦皆取其以毒攻毒兼殺蠱之功耳附方舊十五新十八小兒卒癎大蜂房一枚水三升煮濃汁浴之日三四次佳千金方臍風濕腫久不瘥者蜂房燒末傅之效子母祕録手足風痺黃蜂窠大者一箇小者三四箇燒灰獨頭蒜一碗百草霜一錢半同搗傅上一時取下埋在隂處忌生冷葷腥乾坤祕韞風氣瘙癢及病丙穩禾疹蜂房炙蟬蛻等分為末酒服一錢日三服梅師方用露蜂房煎汁入芒硝傅之日五次風熱牙腫連及頭面用露蜂房燒存性研末以酒少許調噙漱之十便良方風蠱牙痛露蜂房煎醋熱漱之研袖珍方用草蜂房一枚鹽實孔內燒過末擦之鹽湯漱去或取一塊咬之祕方也同普濟方用露蜂房一箇乳香三塊煎水漱之又細辛煎水漱之又露蜂房全蠍同研擦之之聖惠用蜂房蒂綿包咬效喉痺腫痛露蜂房灰白殭蠶等分為末每乳香湯服半錢入食醫心鏡用蜂房燒灰每以一錢吹喉內不拘大人小兒重舌腫痛蜂房炙研酒和傅之日三四次聖惠方舌上出血竅如針孔用紫金沙即露蜂房頂上實處一兩貝母四錢盧會三錢為末蜜和丸雷丸大每用一丸水一小盞煎至五分溫服吐血溫酒調服雲臺方吐血衄血方同上崩中漏下五色使人無子蜂房末三指撮溫酒服之大神效張文仲方小兒下痢赤白者蜂房燒末飲服五分張傑母子祕録小兒咳嗽蜂房二兩洗淨燒研每服一字米飲下勝金二便不通蜂房燒末酒服二三錢日二服不拘大人小兒録子母祕隂痿不興蜂窠燒研新汲井水服二錢可御十女􅒖嶁神書隂寒痿弱峰房灰夜傅隂上即熱起千金方隂毒腹痛露蜂房三錢燒存性蔥白五寸同研為丸男左女右著手中握隂臥之汗出即愈寸白蛔蟲蜂窠燒存性酒服一匙蟲即死出生生編乳石熱毒壅悶頭痛口乾便漩赤少者用蜂房煮汁五合服乳石末從小便中下大效水圖經云用十二分炙以二升煮八合分服藥毒上攻如聖散用蜂房甘草等分麩炒黃色去麩為末水二碗煎八分臨臥頓服明日取下惡物經驗方鼻外􅖟瘤膿水血出蜂房炙研酒服方寸匕日三服肘后方頭上瘡癬蜂房研末臘豬脂和塗之效聖惠軟癤頻作露蜂房二枚燒存性以巴豆二十一粒煎清油二三沸去豆用油調傅甚效唐氏得效方女人妬乳乳癰汁不出內結成腫名妬乳用蜂房燒灰研每服二錢水一小盞煎六分去渣溫服方濟衆風瘻不合露蜂房一枚炙黃研末每以一錢臘豬脂和塗肘後方下部漏疾大露蜂房燒存性研摻之乾則以真菜子油調唐氏經驗方蜂螫腫疼蜂房為末豬羔和傅或煎水洗千金方竹蜂拾遺釋名留師郭璞作笛師集解藏器曰方言云竹蜂留師也蜂如小指大正黑色嚙竹而窠蜜如稠糖酸甜好食時珍曰六占云竹蜜蜂出蜀中于野竹上結窠紺色大如雞子長寸許有蒂窠有蜜甘倍常蜜即此也按今人家一種黑蜂大如指頭能穴竹木而居腹中有蜜小兒撲殺取食亦此類也又杜陽編言外國鸞蜂大十餘斤其蜜碧色服之成仙此亦不經之言未足深信又有刺蜜木蜜生草木上俱見東部本條木蜜即枳椇留師蜜氣味甘酸寒無毒主治牙齒𧈟痛及口瘡並含之良藏器赤翅蜂集解藏器曰出嶺南狀如土蜂翅赤頭黑大如螃蟹穿土為窠食蜘蛛蜘蛛遙知蜂來皆狼狽藏隱蜂以預知其處食之無遺時珍曰此毒蜂穿土作窠者一種獨蜂作窠於木亦此類也其窠大如鵝卵皮厚蒼黃色只有一箇蜂大如小石燕子人馬被螫立亡也又一種蛒蜂出巴中在褰鼻蛇穴內其毒倍常中人手足輒斷中心胸即圮裂非方藥可療惟禁術可制故元稹詩云巴蛇蟠窟穴穴下有巢蜂近樹禽垂翅依原獸絶蹤微遭斷手足厚毒破心胸昔甚招魂句那知眼自逢此蜂之毒如此附見於此養生逺害者不可不知主治有毒療蜘蛛咬及疔腫疽病燒黑和油塗之或取蜂窠土以酢和塗之蜘蛛咬處當得絲出藏器獨腳蜂拾遺集解藏器曰出嶺南似小蜂黑色一足連樹根不得去不能動搖五月采之又有獨腳蟻亦連樹根不能動搖功用與蜂同時珍曰嶺南有樹小兒樹蛺蝶及此蜂蟻皆生於樹是亦氣化乃無情而生有情也酉陽雜俎云嶺南毒菌夜有光經雨則腐化為巨蜂黑色其喙若鋸長三分囓人甚毒物類之變化不一有如此主治疔腫癰疽燒研和油塗之藏器􅝡螉音噎翁品本經下釋名土蜂别録細腰蜂莊子蜾裸詩經蒲蘆爾雅𢎞景曰此類甚多雖名土蜂不就土中作窟謂摙土作房爾時珍曰蠮螉象其聲也集解别録曰蠮螉生熊耳川谷及牂牁或人屋間𢎞景曰今一種蜂黑色腰甚細㗸泥於人屋及器物邊作房如併竹管者是也其生子如粟米大置中乃捕取草上青蜘蛛十餘枚滿中仍塞口以待其子大為糧也其一種入蘆管中者亦取草上青蟲詩云螟蛉有子果螺負之言細腰之物無雌皆取青蟲教祝便變成己子斯為謬矣造詩者未審而夫子何為因其僻耶豈聖人有缺多皆類此韓保升曰按詩疏云螟蛉桑蟲也果螺蒲蘆也言蒲蘆負桑蟲以成其子也亦負他蟲封之數日則成蜂飛去今有人候其封六壞而看之見有卵如粟在死蟲之上果如陶説蓋詩人知其大而不知其細也此蜂所在有之隨處作窠或隻或雙不拘土石竹木間也正誤李含光曰視變成子近有數見者非虛言也頌曰詩言螟蛉有子果螺負之楊雄方言亦云螟蛉之子殪而逢果螺祝之曰類我類我久之變為蜂陶氏蜀本皆以為生子如粟捕諸蟲為糧段成式亦云書齋多􅝡螉窠祝聲可聽開而視之悉是小蜘蛛以沈隔之乃知不獨負桑蟲也數説不同然物類變化固不可度蚱蟬生於轉丸衣魚生於瓜子之類非一桑蟲蜘蛛之變為蜂不為異也如陶所説卵如粟者未必非祝蟲而成之也宋齊丘所謂􅝡螉之蟲孕螟蛉之子傳其情交其精溷其氣和其神隨物大小俱得其真蠢動無定情萬物無定形斯言得之矣蟲宗奭曰諸家之説終不敢捨詩之義嘗拆窠視之果有子如粟米大色白而微黃所負青菜蟲却在子下不與蟲相著陶説近之時珍曰􅝡螉之説各異今通考諸説并視驗其卵及蜂之雙雙往來必是雌雄當以陶氏冦氏之説為正李氏蘇氏之説為誤按解頤新語云果螺自有卵如粟寄在蟲身其蟲不死不生久則漸枯子大食之而出正如蠅卵寄附於蠶身久則卵化穴繭而出也列子言純雄無雌其名稚蜂莊子言細腰者化則自古已失之矣羅願爾雅翼云陶説實當物理但以此疑聖人則不知詩之本旨矣詩云螟蛉有子果嬴負之教誨爾子式穀似之蓋言國君之民為他人所取爾説者不知似字乃似續之似誤以為如似之似遂附會其説爾猶云鴟梟鴟梟既取我子亦可謂梟以衆鳥為子乎今屢破其房見子與他蟲同處或子已去而蟲存空殼或蟲成蛹而子尚小蓋蟲終不壞至其成蛹子乃食之而出也近時王浚川著雅述亦云年年驗之皆如陶氏之説焉氣味辛平無毒大明曰有毒入藥妙用主治久聾咳逆毒氣出刺出汗本經療鼻窒别録治嘔逆生研能罯竹木刺大明乾􅒖嶁書云五月五日取􅝡螉隂為末用兵死人血丸置衣領中云令人畏伏土蜂窠見土部附録雄黃蟲别録有名未用明目辟兵不祥益氣力狀如􅝡螉蟲白蠟會編集解機曰蟲白蠟與蜜蠟之白者不同乃小蟲所作也其蟲食冬青樹汁久而化為白脂粘敷樹枝入謂蟲屎著樹而然非也至秋刮取以水煮溶濾置冷水中則凝聚成塊矣碎之文理如白石膏而瑩徹人以和油澆燭大勝蜜蠟也時珍曰唐宋以前澆燭入藥所用白蠟皆蜜蠟也此蟲白蠟則自元以來人始知之今則為日用物矣四川湖廣滇南閩嶺吳越東南諸郡皆有之以川滇衡永産者為勝蠟樹枝葉狀類冬青四時不凋五月開白花成叢結實纍纍大如蔓荆子生青熟紫冬青樹子則紅色也其蟲大如蟣虱芒種後則延緣樹枝食汁吐涎粘於嫩莖化為白脂乃結成蠟狀如凝霜處暑後則剝取謂之蠟渣若過白露即粘住難刮矣其渣煉化濾淨或甑中蒸化瀝下器中待凝成塊即為蠟也其蟲嫩時白色作蠟及老則赤黑色乃結苞於樹枝初若黍米大入春漸長大如雞頭子紫赤色纍纍抱枝宛若樹之結實也蓋蟲將遺卵作房正如雀甕螵蛸之類爾俗呼為蠟種亦曰蠟子子內皆白卵如細蟣一包數百次年立夏日摘下以箬葉包之分繫各樹芒種後苞拆卵化蟲乃延出葉底復上樹作蠟也樹下要潔淨防蟻食其蟲又有水蠟樹葉微似榆亦可放蟲生蠟甜櫧樹亦可産蠟氣味甘溫無毒主治生肌止血定痛補虛續筋接骨震亨入丸散服殺瘵蟲時珍發明震亨曰白蠟屬金稟受收斂堅強之氣為外科要藥與合歡皮同入長肌肉膏中用之神效但未試其可服否也時珍曰蠟樹葉亦治瘡腫故白蠟為外科要藥正如桑螵蛸與桑木之氣相通附方新一頭上秃瘡蠟燭頻塗勿令日晒久則自然生髮集玄方紫􅑭音礦草唐本校正原與騏驎竭同條今自木部分入此釋名赤膠蘇恭紫梗時珍曰􅑭與礦同此物色紫狀如礦石破開乃紅故名今南畨連枝折取謂之紫梗是矣集解恭曰紫􅑭紫色如膠作赤麖皮反寶鈿用為假色亦以膠寶物云蟻於海畔樹藤皮中為之紫􅑭樹名渴稟騏驎竭樹名渴留正如蜂造蜜也研取用之吳録所謂赤膠是也珣曰廣州記云紫􅑭生南海山谷其樹紫赤色是木中津液結成可作胡胭脂餘滓則玉作家用之騏驎竭乃紫􅑭樹之脂也志曰按别本注言紫􅑭騏驎竭二物同條功效全别紫􅑭色赤而黑其葉大如盤􅑭從葉上出騏驎竭色黃而赤從木中出如松脂也頌曰按段成式酉陽雜俎云紫􅑭樹出真蠟國彼人呼為勒佉亦出波斯國木髙丈許枝葉鬱茂葉似橘柚經冬不凋三月開花白色不結子天有霧露及雨沾濡其枝條即出紫􅑭波斯使者所説如此而真臘使者言是蟻運土上於樹端作窠蟻壤得雨露凝結而成紫􅑭崑崙出者善波斯次之又交州地志亦云本州嵗貢紫􅑭出於蟻壤乃知與血竭俱出於木而非一物明矣今醫家亦罕用惟染家須之宗奭曰紫􅑭狀如糖霜結於細枝上纍纍然紫黑色研破則紅今人用造綿􅀈􅫰邇來亦難得時珍曰紫􅑭出南畨乃細蟲如蟻虱緣樹枝造成正如今之冬青樹上小蟲造白蠟一般故人多插枝造之今吳人用造胭脂按張勃吳録云九真移風縣有土赤色如膠人視土知其有蟻因墾發以木枝插其上則蟻緣而上生漆凝結如螳螂螵蛸子之狀人折漆以染絮物其色正赤謂之蟻漆赤絮此即紫􅑭也血竭乃其樹之脂膏别見木部氣味甘鹹平有小毒大明曰無毒主治五臟邪氣金瘡帶下破積血生肌止痛與騏驎竭大同小異蘇恭濕癢瘡疥宜入膏用李珣益陽精去隂滯氣太清伏鍊法附方新三齒縫出血紫礦乳香麝香白礬等分為末摻之水潄衛生易簡方産後血運狂言失志用紫􅑭一兩為末酒服二錢匕徐氏家傳方經水不止日漸黃瘦紫礦末每服二錢空心白湯下氏家藏方五倍子開寶校正自木部移入此釋名文蛤開寶百蟲倉拾遺法釀過名百藥煎時珍曰五倍當作五􅚰見山海經其形似海中文蛤故亦同名百蟲倉會意也百藥煎隱名也集解志曰五倍子在處有之其子色青大者如拳而內多蟲頌曰以蜀中者為勝生於膚木葉上七月結實無花其木青黃色其實青至熟而黃九月采子曝乾染家用之時珍曰五倍子宋開寶本草收入草部嘉祐本草移入木部雖知生於膚木之上而不知其乃蟲所造也膚木即鹽膚子木也詳見果部鹽麩子下此木生叢林處者五六月有小蟲如蟻食其汁老則遺種結小毬於葉間正如蛅蟖之作雀甕蠟蟲之作蠟子也初起甚小漸漸長堅其大如拳或小如菱形狀圓長不等初時青緑久則細黃綴於枝葉宛若結成其殼堅脆其中空虛有細蟲如蠛蠓山人霜降前采取蒸殺貨之否則蟲必穿壞而殼薄且腐矣皮工造為百藥煎以染皂色大為時用他樹亦有此蟲毬不入藥用木性殊也氣味酸平無毒主治齒宣疳𧈟肺臟風毒流溢皮膚作風濕癬疥癢膿水五痔下血不止小兒面鼻疳瘡開寶腸虛泄痢為末熟湯服之藏器生津液消酒毒治中蠱毒毒藥日華口瘡摻之便可飲食宗奭斂肺降火化痰飲止咳嗽消渴盜汗嘔吐失血久痢黃病心腹痛小兒夜啼烏鬚髮治眼赤濕爛消腫毒喉痺斂潰瘡金瘡收脫肛子腸墜下時珍發明震亨曰五倍子屬金與水噙之善收頑痰解熱毒佐他藥尤良黃昏咳嗽乃火氣浮入肺中不宜用涼藥宜五倍五味斂而降之時珍曰鹽麩子及木葉皆酸鹹寒涼能除痰飲咳嗽生津止渴解熱毒酒毒治喉痺下血血痢諸病五倍子乃蟲食其津液結成者故所主治與之同功其味酸鹹能斂肺止血化痰止渴收汗其氣寒能散熱毒瘡腫其性收能除泄痢濕爛附方舊二新六十九虛勞遺濁玉鎖丹治腎經虛損心氣不足思慮太過真陽不固漩有餘瀝小便白濁如膏夢中頻遺骨節拘痛面黧肌瘦盜汗虛煩食減乏力此方性溫不熱極有神效用五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸食前用鹽湯送下日三服和劑方寐中盜汗五倍子末蕎麥麵等分水和作餅煨熟夜臥待飢時乾喫二三箇勿飲茶水甚妙集靈自汗盜汗常出為自汗睡中出為盜汗用五倍子研末津調填臍中縛定一夜即止也同上心疼腹痛五倍子生研末每服一錢鐵杓內炒起煙黑色者為度以好酒一鍾傾八杓內服之立止方邵真人經驗消渴飲水五倍子為末水服方寸匕日三服危氏得效小兒嘔吐不定用五倍子二箇一生一熟甘草一握濕紙煨過同研為末每服半錢米泔調下立瘥珍袖方小兒夜啼五倍子末津調填於臍內楊起簡便方暑月水泄五倍子末飲丸黃豆大每服二十丸荷葉煎水下即時見效余居士選竒方熱瀉下痢五倍子一兩枯礬五錢為末糊丸梧子大每服五十丸米湯送下鄧筆峯雜興方瀉痢不止五倍子一兩半生半燒為末糊丸梧子大每服三十丸紅痢酒下白痢水酒下水泄米湯下集靈用五倍子末每米飲服一錢滑痢不止用五倍子醋炒七次為末米湯送下脾泄久痢五倍子炒半斤倉米妙一升白丁香細辛木香各三錢花椒五錢為末每服一錢蜜湯下日二服忌生冷魚肉集靈方赤痢不止文蛤炒研末水浸烏梅肉和丸梧子大每服七十丸烏梅湯下腸風下血五倍子白礬各半兩為末順流水丸梧子大每服七丸米飲下忌酒本事方臟毒下血五倍子不拘多少為末大鯽魚一枚去腸胃鱗腮填藥令滿入瓶內煅存性為末每服一錢溫酒下王璆百一選方糞後下血不拘大人小兒五倍子末艾湯服一錢全幼心鑑腸風臟毒下血不止五倍子半生半燒為末陳米飯和丸如梧子大每服二十丸食前粥飲送下日三服聖惠方酒痢腸風下血見百藥煎小兒下血腸風臟毒五倍子末煉蜜丸小豆大每米飲服二十丸氏鄭大腸痔疾五倍子煎湯薰洗或燒煙薰之自然收縮直指方脫肛不收三因方用五倍子末三錢入白礬一塊水一碗煎湯洗之立效簡便用五倍子半斤水煮極爛盛坐桶上薰之待溫以手輕托上內服參茋升麻藥翎普濟方用五倍子百草霜等分為末醋熬成膏鵝掃傅上即入産後腸脫五倍子末摻之或以五倍子白礬煎湯熏洗婦人良方女人隂血因交接傷動者五倍子末摻之良熊氏孕婦漏胎五倍子末酒服二錢神效朱氏集驗方風毒攻眼腫癢澀痛不可忍者或上下臉赤爛或浮醫瘀肉侵睛神效驅風散用五倍子一兩蔓荆子一兩半為末服二錢水二盞銅石器內煎汁去滓乘熱洗留滓再煎用大能明目去澀博濟方小便尿血五倍子末鹽梅搗和丸梧子大每空心酒服五十丸集簡方風眼赤爛集靈方用五倍子煅存性為末入飛過黃丹少許傳之日三上甚良普濟方用五倍子研末傅之名拜堂散爛弦風眼五倍子銅青白墡士等分為末熟湯泡開閉目淋洗冷即再熱洗之眼弦不可入湯濟急方眼中弩肉方同上耳瘡腫痛五倍子末冷水調塗濕則乾摻之名海上方聤耳出膿普濟方用五倍子末吹之燒經驗用五倍子焙乾一兩全蠍存性三錢為末摻耳中鼻出衄血五倍子末吹之仍以末同新綿灰等分米飲服二錢牙縫出血不止者五倍子燒存性研末傅之即止衛生易簡方牙齒動搖及外物傷動欲落者五倍子乾地龍炒等分為末先以薑揩過然後傅之御藥院方牙齦腫痛五倍子一兩瓦焙研末每以半錢傅痛處片時吐去涎內服去風熱藥楊子建護命方風牙腫痛五倍子一錢黃丹花椒各五分為末摻之即止也五倍末冷水調塗頰外甚效唇緊作痛五倍子訶子等分為末傅之端效方天行口瘡五倍子末摻之吐涎即愈龎氏傷寒論咽中懸癰舌腫塞痛五倍子末白薑蠶末甘草末等分白梅肉搗和丸彈子大噙咽其癰自破也朱氏經驗方口舌生瘡儒門事親赴筵散用五倍子蜜陀僧等分為末醬水潄過乾貼之院方加脫蠶蛾炙淡寮方用五倍子一兩滑石半兩黃柏蜜半兩為末潄淨摻之便可飲食白口惡瘡狀似木耳不拘大人小兒並用五倍子青黛等分為末以筒吹之端效方走馬牙疳五倍子青黛枯礬黃蘖等分為末先以鹽湯潄淨摻之立效便覽牙齦疳臭五倍子炒焦一兩枯礬銅青各一錢為末先以米泔潄淨摻之絶效方也集簡方疳蝕口鼻五倍子燒存性研末摻之普濟方小兒口疳白礬裝入五倍子內燒過同研摻之簡便方下部疳瘡全幼心鑑用五倍子枯礬等分研末先以虀水洗過搽之杏林摘要用五倍子花椒去子炒各一錢細辛焙三分為末先以蔥湯洗淨搽之一二日生肉也隂囊濕瘡出水不瘥用五倍子臘茶各五錢􅕹粉少許研末先以蔥椒湯洗過香油調搽以瘥為度太平聖惠方魚口瘡毒初起未成膿者用南五倍子炒黃研末入百草霜等分以臘醋調塗于患處一日一夜即消杏林摘要一切諸瘡五倍子黃蘖等分為末傅之普濟方一切腫毒五倍子炒紫黑色蜜調塗之黃簡便治一切腫毒初起無頭者五倍子大黃蘗等分為末新汲水調塗四圍日三五次一切癬瘡五倍子去蟲白礬燒過各等分為末搽之乾則油調簡便方癩頭軟癤及諸熱瘡用五倍子七箇研末香油四兩熬至一半布絞去渣搽之三四遍即可勿以水洗之普濟方風癩濕爛五倍子末津調塗之同上頭瘡熱瘡風濕諸毒用五倍子白芷等分研末摻之膿水即乾如乾者以清油調塗衛生易簡瘡口不收五倍焙研末以臘醋腳調塗四圍效一切金瘡五倍子降真香等分炒研末傅之皮肉自痊名啄合山拔萃方金瘡出血不止者五倍子末貼之若閉氣者以五倍子末二錢入龍骨末少許湯服立效談野翁方杖瘡腫痛五倍子去穰米醋浸一日慢火炒黃研末乾摻之不破者醋調塗之衛生易簡方手足皸裂五倍子末同牛骨髓填納縫中即安也醫方大成雞骨哽咽五倍子末摻入喉中即化下方海上名小兒脫肛五倍子為末先以艾葉捲倍子末成筒放便桶內以瓦盛之令病者坐于桶上以火點著使藥煙燻入肛門其肛自上隨後將白礬為末復搽肛門其肛自緊再不復脫魚口便毒五倍子不拘多少以淨瓦器盛之用醋熬成膏用綿布攤貼之如乾即換三五次即愈偏墜氣痛用五倍子一箇放食鹽少許在內以火紙包定用水浸濕放文武火灰內煨存性為末酒調服染烏鬚髮聖濟總録用針砂八兩米醋浸五日炒略紅色研末五倍子百藥煎沒石子各二兩訶黎勒皮三兩研末各包先以皂莢水洗髭鬚用米醋打蕎麥麵糊和針砂末傅上荷葉包過一夜次日取去以蕎麥糊四味敷之一日洗去即黑杏林摘要用五倍子一斤研末銅鍋炒之勿令成塊如有煙起即提下攪之從容上火慢炒直待色黑為度以濕青布包扎足踏成餅收貯聽用每用時以皂角水洗淨鬚髮用五倍子一兩紅銅末酒炒一錢六分生白礬六分訶子肉四分沒石子四分硇砂一分為末烏梅酸榴皮煎湯調勻碗盛重湯煮四五十沸待如飴狀以眉掠刷於鬚髮上一時洗去再上包住次日洗去以核桃油潤之半月一染甚妙中河豚毒五倍子白礬末等分以水調下林出事廣記百藥煎修治時珍曰用五倍子為粗末每一斤以真茶一兩煎濃汁入酵糟四兩擂爛拌和器盛置粳缸中罯之待發起如發麵狀即成矣揑作餅丸晒乾用嘉謨曰入藥者五倍子鮮者十斤舂細用瓷缸盛稻草蓋􅝛七日夜取出再搗入桔梗甘草末各二兩又􅝛一七仍搗仍􅝛滿七次取出揑餅晒乾用如無鮮者用乾者水漬為之又方五倍子一斤生糯米一兩滚水浸過細茶一兩上右共研末入罐內封固六月要一七取開配合用又方五倍子一斤研末酒麯半斤細茶一把研末右用小蓼汁調勻入鉢中按緊上以長稻草封固另用籮一箇多著稻草將藥鉢坐草中上以稻草蓋置淨處過一七後看藥上長起長霜藥則已成矣或揑作丸或作餅晒乾才可收用氣味酸鹹微甘無毒主治清肺化痰定嗽解熱生津止渴收濕消酒烏鬚髮止下血久痢脫肛牙齒宣𧈟面鼻疳蝕口舌糜爛風濕諸瘡時珍發明時珍曰百藥煎功與五倍子不異但經釀造其體輕虛其性浮收且味帶餘甘治上焦心肺咳嗽痰飲熱渴諸病含噙尤為相宜附方新二十二斂肺劫嗽百藥煎訶黎勒荆芥穗等分為末薑汁入蜜和丸芡子大時時噙之丹溪心法定嗽化痰百藥煎片黃芩橘紅甘草各等分共為細末蒸餅丸菉豆大時時乾咽數丸佳瀕湖醫案清氣化痰百藥煎細茶各一兩荆芥穗五錢海螵蛸一錢蜜丸芡子大每服噙一丸妙筆峯雜興染烏鬚髮川百藥煎一兩針砂醋炒蕎麥麵各半兩先洗鬚髮以荷葉熬醋調刷荷葉包一夜洗去即黑妙普濟方沐髮除䐈百藥煎末乾搽髮上一夜箆之同上揩牙烏鬚川百藥煎半兩玄胡索三錢雄黃三錢為末先以薑擦去涎用此揩牙以津洗目日日用之甚佳普濟牙痛引頭方同上風熱牙痛百藥煎泡湯噙潄聖濟總録牙齦疳蝕百藥煎五倍子青鹽煅各一錢半銅緑一錢為末日摻二三次神效普濟方煉眉瘡癬小兒面湮瘡又名鍊銀瘡乃母受胎時食酸辣邪物所致用百藥煎五錢生白礬二錢為末油調搽之外科精義腳肚生瘡初起如粟米大搔之不已成片包腳相交黃水出癢不可忍久成痼疾用百藥煎末唾調逐瘡四圍塗之自外入內先以貫衆煎湯洗之日一次醫林集要乳結硬痛百藥煎末每服三錢酒一盞煎數沸服之取效經驗方腸癰內痛大棗連核燒存性百藥煎等分為末每服一錢溫酒服日一取效直指方大腸便血百藥煎荆芥穗燒存性等分為末糊丸梧子大每服五十丸米飲下聖惠方腸風下血百藥煎二兩半生用半炒存性為末飯丸梧子大每服五十丸米飲下名聖金丸王璆百一選方大腸氣痔作痛下血百藥煎末每服三錢稀粥調服日二次集簡腸風臟毒下血者用百藥煎燒存性烏梅連核燒過白芷不見火為末水糊丸如梧子大每服七十丸米飲下濟生酒痢下血百藥煎五倍子陳槐花等分焙研末酒糊丸梧子大每服五十丸米飲送下本事方下痢脫肛百藥煎一塊陳白梅三箇木瓜一握以水一碗煎半碗日二服聖濟總録男婦血淋用真百藥煎車前子炒黃連各三錢半木香二錢滑石一錢為末空心燈草湯服二錢日二服普濟方消暑止渴百藥煎蠟茶等分為末烏梅肉搗和丸芡子大每含一丸名水瓢丸事林廣記五倍子內蟲主治赤眼爛弦同爐甘石末乳細點之時珍螳蜋桑螵蛸本經上品釋名蟷蜋音當郎刀蜋綱目拒斧説文不過爾雅蝕疣音尤其子房名螺蛸音飄綃蜱蛸音皮䗚蟭音煿焦致神别録野狐鼻涕頌曰爾雅云莫貈蟷蠰不過螳蜋也其子蜱蛸郭璞云江東呼為石蜋時珍曰蟷蜋兩臂如斧當轍不避故得當郎之名俗呼為刀蜋兖人謂之拒斧又呼不過也代人謂之天馬因其首如驤馬也燕趙之間謂之蝕疣疣即疣子小肉贅也今人病疣者往往捕此食之其來有自矣其子房名螵蛸者其狀輕飄如綃也村人每炙焦飼小兒云止夜尿則􅡯蟭致神之名蓋取諸此酉陽雜俎謂之野狐鼻涕象形也又楊雄方言云螳蜋或謂之髠或謂之羊匕齊兖以東謂之敷常螵蛸亦名夷冒集解𢎞景曰螳蜋俗名石蜋逢樹便産以桑上者為好是兼得桑皮之津氣也惟連枝斷取者為真偽者亦以膠著桑枝之上也保升曰螵蛸在處有之螳蜋卵也多在小桑樹上叢荆棘間三四月中一枝出小螳蜋數百枚時珍曰螳蜋驤首奮臂修頸大腹二手四足善緣而捷以鬚代鼻喜食人髮能翳葉捕蟬或云術家取翳作法可以引形深秋乳子作房粘著枝上即螵蛸也房長寸許大如拇指其內重重有隔房每房有子如蛆卵至芒種節後一齊出故月令有云仲夏螳蜋生也修治别録曰桑螵蛸生桑枝上螳蜋子也二月三月采蒸過火炙用不爾令人泄斆曰凡使勿用雜樹上生者名螺螺須覓桑樹東畔枝上者采得去核子用沸漿水浸淘七次鍋中熬乾用别作修事無效也韓保升曰三四月采得以熱漿水浸一伏時焙乾於柳木灰中炮黃用螳蜋主治小兒急驚風搐搦又出箭鏃生者能食疣目時珍發明時珍曰螳蜋古方不見用者惟普濟方治驚風吹鼻定搐法中用之蓋亦蠶􅙴定搐之義古方風藥多用螵蛸則螳蜋治風同一理也又醫林集要出箭鏃亦用之附方新二驚風定搐中分散用螳蜋一箇蜥蝪一條赤足蜈蚣一條各中分之隨左石研末記定男用左女用右每以一字吹鼻內搐之吹左即左定吹右即右定也普濟箭鏃入肉不可拔者用螳蜋一箇巴豆半箇同研傅傷處微癢且忍極癢乃撼拔之以黃連貫衆湯洗拭石灰傳之桑螵蛸氣味鹹甘平毒之才曰得龍骨療泄精畏旋覆花戴椹主治傷中疝瘕隂痿益精生子女子血閉腰痛通五淋利小便小道本經療男子虛損五臟氣微夢寐失精遺溺久服益氣養神别録炮熟空心食之止小便利甄權發明時珍曰桑螵蛸肝腎命門藥也古方盛用之權曰男子身衰精自出及虛而小便利者加而用之頌曰古方漏精及風藥中多用之宗奭曰男女虛損腎衰隂痿夢中失精遺溺白濁疝瘕不可闕也鄰家一男子小便日數十次如稠米泔心神恍惚瘦瘁食減得之女勞食服桑螵蛸散藥未終一劑而愈其藥安神魂定心志治健忘補心氣止小便數用桑螵蛸逺志龍骨菖蒲人參茯神當歸龜甲醋炙各一兩為末臥時人參湯調下二錢如無桑上者即用他樹者以炙桑白皮佐之桑白皮行水以接螵蛸就腎經也附方舊三新七遺精白濁盜汗虛勞桑螵蛸炙白龍骨等分為細末每服二錢空心用鹽湯送下外臺小便不通桑螵蛸炙黃三十枚黃芩二兩水煎分二服聖惠婦人胞轉小便不通用桑螵蛸炙為末飲服方寸匕日用二産書婦人遺尿桑螵蛸酒炒為末薑湯服二錢千金翼妊娠遺尿不禁桑螵蛸十二枚為末分二服米飲下産乳書産後遺尿或尿數桑螵蛸炙半兩龍骨一兩為末每米飲服二錢徐氏胎産方咽喉腫塞桑上螳蜋窠一兩燒灰馬屁勃半兩研勻蜜丸梧子大煎犀角湯每服三五丸總病論咽喉骨硬桑螵蛸醋煎呷之經驗良方底耳疼痛桑螵蛸一箇燒存性麝香一字研末每用半字摻入神效有膿先繳淨經驗方小兒軟癤桑螵蛸燒存性研末油調傅之危氏方雀甕本經下品釋名雀兒飯甕蜀本蛅蟖房别録音髯斯蚝蟲窠音刺躁舍本經天漿子圖經棘剛子衍義紅姑娘綱目毛蟲藏器曰毛蟲作繭形如甕故名雀甕俗呼雀癰聲相近也保升曰雀好食其甕中子故俗呼雀兒飯甕𢎞景曰蛅蟖背毛螫人故名蚝音刺與蠔同時珍曰俗呼毛蟲又名楊痢子因有螫毒也此蟲多生石榴樹上故名天漿天漿乃甜榴之名也宗奭曰多在棘枝上故曰棘剛子集解别録曰雀甕出漢中生樹枝間蛅蟖房也八月采蒸之𢎞景曰蛅蟖蚝蟲也在石榴樹上其背毛螫人生卵形如雞子大如巴豆藏器曰蚝蟲好在果樹上大小如蠶身面背上有五色斑毛有毒能刺螫人欲老者口中吐白汁凝聚漸硬正如雀卵其蟲以甕為繭在中成蛹如蠶之在繭也夏月羽化而出作蛾放子於葉間如蠶子陶言其生卵如雞子誤矣恭曰雀甕在樹間似螵蛸蟲此物紫白襇斑狀似硨磲文可愛也時珍曰蛄蟖處處樹上有之牡丹上尤多入藥惟取榴棘上房內有蛹者正如螵蛸取桑上者氣味甘平無毒日華曰有毒主治寒熱結氣蠱毒鬼疰小兒驚癎本經治頌曰今醫家小兒慢驚用天漿子有蟲者曰殭蠶乾􅙴三物各三枚微炒搗末煎麻黃湯調服一字日三服如減大有效也藏器曰雀甕打破取汁與小兒飲令無疾小兒病撮口者漸漸口撮不得飲乳但先𠢐口傍見血以甕研汁塗之或同鼠婦生搗塗之今人産子時凡諸物皆令開口不令閉者蓋厭禳之也附方新五撮口噤風用棘科上雀兒飯甕子末開口者取內物和乳汁研灌之又方棘剛子五枚赤足蜈蚣一條燒存性研勻飯丸麻子大每服三五丸孔汁下亦可末服一字普聖惠小兒臍風白龍骨用天漿子有蟲者一枚真殭蠶炒一枚膩粉少許研勻以薄荷自然汁調灌之取下毒物神效聖惠急慢驚風口眼喎斜搐搦痰盛用天漿子房去皮生用三枚乾􅙴生用七枚硃砂一錢研勻飲丸粟大每服二丸荆芥湯送下聖惠方乳蛾喉痺用天漿子即紅姑娘徐徐嚼咽小兒癎疾棘枝上雀甕研其間蟲出取汁灌之聖惠方蠶本經中品校正拾遺烏爛蠶及繭鹵汁嘉祐蠶蛻今併為一釋名自死者名白殭蠶時珍曰蠶從替象其頭身之形從䖵以其繁也俗作蠶字者非矣蠶音腆蚯蚓之名也蠶病風死其色自白故曰白殭死而不朽曰殭再養者曰原蠶蠶之屎曰沙皮曰蛻甕曰繭蛹曰螝音龜蛾曰羅卵曰蛻音兑蠶初出曰䖢音苖蠶紙曰連集解時珍曰蠶孕絲蟲也種類甚多有大小白烏斑色之異其蟲屬陽喜燥惡濕食而不飲三眠三起二十七日而老自卵出而為䖢自䖢蛻而為蠶蠶而繭繭而蛹蛹而蛾蛾而卵卵而復䖢亦有胎生者與母同老蓋神蟲也南粵有三眠四眠兩生七出八出者其繭有黃白二色爾雅云蟓桑繭也雔由樗繭也蚢蕭繭也棘繭欒繭皆各因所食之葉命名而蟓即今桑上野蠶也今之柘蠶與桑蠶並育即棘繭是也南海橫州有風繭絲作釣緡凡諸草木皆有蚅蠋之類食葉吐絲不如蠶絲可以衣被天下故莫得並稱凡蠶類入藥俱用食桑者白殭蠶修治别録曰生頴川平澤四月取自死者勿令中濕有毒不可用𢎞景曰人家養蠶時有合箔皆殭者即暴燥都不壞今見小白似有鹽度者恭曰蠶自殭死其色自白云有鹽度誤矣頌曰所在養蠶處有之不拘早晚但用白色而條直食桑葉者佳用時去絲綿及子炒過宗奭曰蠶有兩三畨惟頭畨殭蠶最佳大而無蛆涎斆曰凡使先以糯米泔浸一日待蠶桑涎出如蝸浮水上然後灑出微火焙乾以布拭淨黃肉毛并黑口甲了搗篩如粉入藥氣味鹹辛平無毒甄權曰微溫有小毒萆惡桑螵蛸桔梗茯苓茯神薢主治小兒驚癎夜啼去三蟲滅黑黯令人面色好男子隂癢病本經女子崩中赤白産後腹痛滅諸瘡瘢痕為末封丁腫拔根極效别録治口噤發汗同白魚鷹屎白等分治瘡滅痕藥性以七枚為末酒服治中風失音并一切風疰小兒客忤男子隂癢痛女子帶下日華焙研薑汁調灌治中風喉痺欲絶下喉立愈蘇頌散風痰結核瘰􅐇頭風風蟲齒痛皮膚風瘡丹毒作癢痰瘧癥結婦人乳汁不通崩中下血小兒疳蝕鱗體一切金瘡疔腫風痔時珍發明元素曰殭蠶性微溫味微辛氣味俱薄輕浮而升陽中之陽故能去皮膚諸風如蟲行震亨曰殭蠶屬火兼土與金木老得金氣殭而不化治喉痺者取其清化之氣從治相火散濁逆結滯之痰也王貺曰凡咽喉腫痛及喉痺用此下咽立愈無不效也大能救人吳开內翰云屢用得效時珍曰殭蠶蠶之病風者也治風化痰散結行經所謂因其氣相感而以意使之者也又人指甲軟薄者用此燒煙熏之則厚亦是此義蓋厥隂陽明之藥故又治諸血病瘧病疳病也附方舊十五新十九一切風痰白殭蠶七個直者細研薑汁調灌之勝金方小兒驚風白殭蠶􅙴稍等分天雄尖附子尖各一錢微炮為末每服一字或半錢以薑湯調灌之甚效寇氏衍義風痰喘嗽夜不能臥白殭蠶炒研好茶末各一兩為末每用五錢臥時泡沸湯服瑞竹堂方酒後咳嗽白殭蠶焙研末每茶服一錢怪證竒方喉風喉痺仁存開關散用白殭蠶炒白礬半生半燒等分為末每以一錢用自然薑汁調灌得吐頑痰立效小兒加薄荷生薑少許同調一方用白梅肉和丸綿褁含之咽汁也汁朱氏集驗用白殭蠶炒半兩生甘草一錢為末薑調服涎出立愈一聖惠用白殭蠶三七枚乳香一分為末每以錢燒煙熏入喉中涎出即愈急喉風痺王氏博濟如聖散用白殭蠶天南星等分生研為末每服一字薑汁調灌涎出即愈後以生薑炙過含之南百一選方無星撮口噤風面黃赤氣喘啼聲不出由胎氣挾熱流毒心脾故令舌強唇青聚口發噤用白殭蠶二枚去觜略炒為末蜜調傅唇中甚效聖惠方大頭風小兒驚風並用大蒜七箇先燒紅地以蒜逐箇於地上磨成膏却以殭蠶一兩去頭足安蒜上碗覆一夜勿令泄氣只取蠶研末每用嗅鼻口內含水有效普濟方偏正頭風并夾頭風連兩太陽穴痛聖惠方用白殭蠶為末蔥茶調服方寸匕葉椿治頭風用白殭蠶髙良薑等分為末每服一錢臨臥時茶服日二服卒然頭痛白殭蠶為末每用熟水下二錢立瘥斗門方牙齒疼痛白僵蠶直者生薑同炒赤黃色去薑為末以皂角水調擦之即止普濟風蟲牙痛白直殭蠶炒蠶蛻紙燒等分為末擦之良久以鹽湯潄口直指方瘧疾不止白僵蠶直者一箇切作七段綿裹為丸硃砂為衣作一服日未出時面向東用桃李枝七寸煎湯吞下院方腹內龜病普濟方詩云人間龜病不堪言肚裏生成硬似磚自死殭蠶白馬尿不過時刻軟如綿神效面上黑黯白殭蠶末水和搽之聖惠方粉滓面皯令人面色好用白殭蠶黑牽牛細研等分為末如澡豆日用之斗門方病丙穩禾疹風瘡疼痛白殭蠶焙研酒服一錢立瘥聖惠野火丹毒從背上兩脅起者殭蠶二七枚和慎火草搗塗楊氏産乳小兒鱗體皮膚如蛇皮鱗甲之狀由氣血否澀亦曰胎垢又曰蛇體白殭蠶去嘴為末煎湯浴之一加蛇蛻保幼大全小兒久疳體虛不食諸病後天柱骨倒醫者不識謂之五軟者用白殭蠶直者炒研每服半錢薄荷酒下名金靈散鄭氏方小兒口瘡通白者白殭蠶炒黃拭去黃肉毛研末蜜和傅之立效氣小兒宫風疳蝕瘡同上方項上瘰癧白殭蠶為末水服五分日三服十日瘥臺外風痔腫痛發歇不定者是也白殭蠶二兩洗銼炒黃為末烏梅肉和丸梧桐子大每薑蜜湯空心下五丸妙勝金子一切金瘡及刀斧傷白殭蠶炒黃研末傅上立愈斗門乳汁不通白殭蠶末二錢酒服少頃以脂麻茶一盞投之梳頭數十遍奶汁如泉也經驗方崩中下血不止用白殭蠶衣中白魚等分為末井華水服之日二千金重舌木舌殭蠶為末吹之吐痰甚妙為一蜜炒二錢為末摻之涎出妙殭蠶一錢黃連陸氏積德方腸風下血殭蠶炒去嘴足烏梅肉焙各一兩為末米糊丸梧子大每服百丸食前白湯下一日三服雜筆峯興方烏爛死蠶拾遺氣味有小毒藏器曰此在簇上烏臭者主治蝕瘡有根者及外野雞病並傳之白死者主白遊疹赤死者主赤遊疹藏器蠶蛹瑞曰繅絲後蛹子今人食之呼小蜂兒思邈曰􅱭犬嚙者終身忘食發則難免主治炒食治風及勞瘦研傳瘑瘡惡瘡大明為末飲服治小兒疳瘦長肌退熱除蛔蟲煎汁飲止消渴時珍附方新一消渴煩亂蠶蛹二兩以無灰酒一中盞水一大盞同煮一中盞溫服聖惠方繭鹵汁藏器曰此是繭中蛹汁非鹹鹵也於繭甕下收之主治百蟲入肉𧈟蝕瘙疥及牛馬蟲瘡為湯浴小兒瘡疥殺蟲以竹筒盛之浸山蜍山蛭入肉蚊子諸蟲咬毒亦可預帶一筒取一蛭入中并持乾海苔一片亦辟諸蛭藏器發明藏器曰蘇恭注蛭云山人自有療法蓋此法也時珍曰山蛭見蛭條山蜍音余蜘蛛也囓人甚毒蠶繭已出蛾者氣味甘溫無毒主治燒灰酒服治癰腫無頭次日即破又療諸疳瘡及下血血淋血崩煮汁飲止消渴反胃除蛔蟲時珍曰𢎞景曰繭甕入術用發明時珍曰蠶繭方書多用而諸家本草並不言及誠缺文也近世用治癰疽代針用一枚即出一頭二枚即出二頭神效無比煮湯治消渴古方甚稱之丹溪朱氏言此物屬火有隂之用能瀉膀胱中相火引清氣上朝於口故能止渴也繅絲湯及絲綿煮部汁功並相同又黃絲絹能補脬錦灰止血並見服器附方新五痘瘡疳蝕膿水不絶用出了蠶蛾繭以生白礬末填滿煅枯為末擦之甚效陳文中小兒方口舌生瘡蠶繭五箇包蓬砂瓦上焙焦為末抹之大小便血繭黃散治腸風大小便血淋瀝疼痛用繭黃蠶蛻紙並燒存性晚蠶沙白殭蠶並炒等分為末入麝香少許每服二錢用米飲送下日三服甚效聖惠方婦人血崩方法同上反胃吐食蠶繭十箇煮汁烹雞子三枚食之以無灰酒下日二服神效或以繅絲湯煮粟米粥食之惠濟方蠶蛻釋名馬明退嘉祐佛退氣味甘平無毒主治血病益婦人嘉祐婦人血風宗奭治目中翳障及疳瘡時珍蠶連主治吐血鼻洪腸風瀉血崩中帶下赤白痢傳疔腫瘡日華治婦人血露宗奭牙宣牙痛牙癰牙疳頭瘡喉痺風癲狂祟蟲毒藥毒沙證腹痛小便淋閟婦人難産及吹乳疼痛時珍發明禹錫曰蠶蛻今醫家多用初出蠶子殼在紙上者東方諸醫用老蠶眠起所蛻皮功用相近當以蛻皮為正入藥微炒用宗奭曰蠶蛻當用眠起時所蛻皮蠶連燒灰亦可用時珍曰馬明退蠶連紙功用相同亦如蟬蛻蛇蛻之義但古方多用蠶紙者因其易得耳附方舊四新十五吐血不止蠶蛻紙燒存性蜜和丸芡實大含化咽津集驗牙宣牙癰及口瘡並用蠶蛻紙燒灰乾傅之集驗風蟲牙痛蠶紙燒灰擦之良久鹽湯漱口指直方走馬牙疳集驗用蠶蛻紙灰入麝香少許貼之直指加白殭蠶等分一切疳瘡馬明退燒灰三錢輕粉乳香少許先以溫漿水洗淨傳之儒門事親小兒頭瘡蠶蛻紙燒存性入輕粉少許麻油調傅聖惠纒喉風疾用蠶蛻紙燒存性煉蜜和丸如芡實大含化咽津集驗熏耳治聾蠶蛻紙作撚入麝香二錢入筆筒燒煙熏之三次即開癲狂邪祟凡狂發欲走或自高貴稱神或悲泣呻吟此為邪祟以蠶紙燒灰酒水任下方寸匕亦治風癲方肘後沙證壯熱江南有沙證狀如傷寒頭痛壯熱嘔惡手足指末微厥或腹痛悶亂須臾殺人先用蠶蛻紙剪碎安于瓷中以碟蓋之滚湯沃之封固良久乘熱服暖臥取汗活人書中蠱藥毒雖面青脈絶腹脹吐血者服之即活用蠶蛻紙燒存性為末新汲水服一錢嶺南衛生方中諸藥毒用蠶紙數張燒灰冷水服衛生易簡方小便澀痛不通用蠶蛻紙燒存性入麝香少許米飲每服二錢王氏博濟方熱淋如血蠶種燒灰入麝香少許水服二錢極效方也衛生家寶崩中不止蠶故紙一張剪碎炒焦槐子炒黃各等分為末酒服立愈易衛生簡方吹奶疼痛馬明退燒灰一錢五分輕粉五分麝香少許酒服儒門事親婦人難産蠶布袋一張蛻蛻一條入新瓦中以鹽泥固煅為末以榆白皮湯調服集成婦人斷産蠶子故紙一尺燒為末酒服終身不産千金痔瘻下血蠶紙半張碗內燒灰酒服自除急奚囊備方繅絲湯主治止消渴大驗時珍原蠶别録中品釋名晚蠶日華魏蠶方言夏蠶廣志熱蠶𢎞景曰原蠶是重養者俗呼為魏蠶宗奭曰原者有原復敏速之義此是第二畨蠶也時珍曰按鄭玄注周禮云原再也謂再養者郭璞注方言云魏細也秦晉人所呼今轉為二蠶是矣永嘉記云郡蠶自三月至十月有八輩謂蠶種為蛻再養為珍珍豫為愛子集解頌曰原蠶東南州郡多養之此是重養者俗呼為晚蠶北人不甚養之周禮禁原蠶鄭康成注云蠶生于火而藏千秋與馬同氣物莫能兩大禁原蠶為其害馬也然害馬亦一事耳淮南子云原蠶一嵗再收非不利也而王法禁之者為其殘桑是也人既稀養貨者多是早蛾不可用也𢎞景曰殭蠶為末塗馬齒即不能食草以桑葉拭去乃還食此見蠶即馬類也時珍曰馬與龍同氣故有龍馬而蠶又與馬同氣故蠶有龍頭馬頭者蜀人謂蠶之先為馬頭娘者以此好事者因附會其蛻以為馬皮卷女入桑化蠶謬矣北人重馬故禁之南方無馬則有一嵗至再至三及七出八出者矣然先王仁愛及物蓋不忍其一嵗再致湯鑊且妨農事亦不獨專為害馬殘桑而已雄原蠶蛾氣味鹹溫有小毒時珍曰按徐之才藥對云熱無毒入藥炒去翅足用主治益精氣強隂道交接不倦亦止精别録壯陽事止泄精尿血暖水臟治暴風金瘡凍瘡湯火瘡滅瘢痕時珍發明宗奭曰蠶蛾用第二畨取其敏於生育也時珍曰蠶蛾性淫出繭即媾至於枯稿乃已故強隂益精用之正誤頌曰今治小兒撮口及發噤者用晚蠶蛾二枚炙黃研末蜜和塗唇內便瘥時珍曰此方出聖惠乃是白僵蠶蘇氏引作蠶蛾誤矣蠶蛾原無治驚之文今正之附方舊二新八丈夫隂痿未連蠶蛾二升去頭翅足炒為末蜜丸梧子大每夜服一丸可御十室以菖蒲酒止之千金方遺精白濁晚蠶蛾焙乾去翅足為末飯丸菉豆大每服四十丸淡鹽湯下此丸常以火烘否則易傷濕也唐氏方血淋疼痛晚蠶蛾為末熱酒服一錢惠聖方小兒口瘡及風疳瘡宫氣方用晚蠶蛾為末貼之妙普濟方治小兒口瘡及百日內口瘡入麝香少許摻之止血生肌蠶蛾散治刀斧傷創血出如箭用晚蠶蛾炒為末傅之即止甚效勝金方刀斧金瘡端午午時取晚蠶蛾石灰茅花搗成團草蓋令發熱過收貯每用刮下末摻之竹刺入肉五月五日取晚蠶蛾生投竹筒中令自乾死為末取少許津和塗之便民圖纂蛇虺咬傷生蠶蛾研傅之必效方玉枕生瘡生枕骨上如癰破後如筯頭用原蠶蛾炒石韋等分為末乾貼取瘥聖濟總録原蠶沙頌曰蠶沙蠶蛾皆用晚出者良時珍曰蠶沙用晒乾淘淨再晒可久收不壞氣味甘辛溫無毒時珍曰伏硇砂熖硝粉霜主治腸鳴熱中消渴風痺病丙穩禾疹别録炒黃袋盛浸酒去風緩諸節不隨皮膚頑痺腹內宿冷冷血瘀血腰腳冷疼炒熱袋盛尉偏風筋骨癰緩手足不隨腰腳軟皮膚頑痺藏器治消渴癥結及婦人血崩頭風風赤眼去風除濕時珍發明𢎞景曰蠶沙多入諸方不但尉風而已宗奭曰蠶屎飼牛可以代穀用三升醇酒拌蠶沙五斗甑蒸於暖室中鋪油單上令患風冷氣痺及近感癱風人就以患處一邊臥沙上厚蓋取汗若虛人須防大熱昏悶令露頭面若未全愈間日再作時珍曰蠶屬火其性燥燥能勝風去濕故蠶沙主療風濕之病有人病風痺用此尉法得效按陳氏經驗方一抹膏治爛弦風眼以真麻油浸蠶沙二三宿研細以箆子塗患處不問新舊隔宿即愈表兄盧少樊患此用之而愈親筆于册也時珍家一婢病此十餘年試用之二三次頓瘳其功亦在去風收濕也又同桑柴灰淋汁煮鱉肉作丸治腹中癥結見鱉條李九華云蠶沙煮酒色味清美又能療疾附方新四新六半身不遂蠶沙二碩以二袋盛之蒸熟更互尉患處仍以羊肚粳米煮粥日食一枚十日即止風瘙病丙穩禾疹作癢成瘡用蠶沙一升水五斗煮取一斗二升去滓洗浴避風惠聖方頭風白屑作癢蠶沙燒灰淋汁洗之聖惠方眯目不出蠶沙㨂淨空心以新汲水吞下十枚勿嚼破聖惠消渴飲水晚蠶沙焙乾為末每用冷水下二錢不過數服門斗方婦人血崩蠶沙為末酒服三五錢儒門事親月經久閉蠶沙四兩砂鍋炒半黃色入無灰酒一壺煮沸澄去沙每溫服一盞即通轉女為男婦人始覺有孕用原蠶屎一枚井華水服之日三千金趺撲傷損扭閃出骨竅等證蠶沙四兩炒黃緑豆粉四兩炒黃枯礬二兩四錢為末醋調傅之絹包縳定換三四次即愈忌産婦近之邵真人經驗良方男婦心痛不可忍者晚蠶沙一兩滚湯泡通濾淨取清水服即止瑞竹堂方石蠶本經下品校正併入有名未用石蠧蟲釋名沙蝨本經石蠧蟲别録石下新拾遺間𢎞景曰沙蝨乃東水中細蟲人入水浴著身略不可見痛如針刺挑亦得之今此或名同而物異耳時珍曰按吳普本草沙蝨作沙蚌集解經曰石蠶生江漢池澤宗奭曰石蠶在處山河中多有之附生水中石上作絲繭如叉股長寸許以蔽其身其色如泥蠶在其中故謂之石蠶亦水中蟲耳方家用者絶稀别録曰石蠧蟲生石中藏器曰石蠧蟲一名石下新今伊洛間水底石下有之狀如蠶解放絲連綴小石如繭春夏羽化作小蛾水上飛時珍曰本經石蠶别録石蠧今觀陳冦二説及主治功用蓋是一物無疑矣又石類亦有石蠶蟲與此不同正誤𢎞景曰李當之云石蠶江左不識謂為草根其實類蟲形如老蠶生附石上傖人得而食之味鹹微辛所言有理但江漢非傖地大都是生氣物如海中蛤蠣輩附石生不動皆活物也今俗用草根黑色多角節亦似蠶恐未是實方家不用恭曰石蠶形似蠶細小有角節青黑色生江漢側石穴中岐隴間亦有北人多不用采者遂絶耳韓保升曰李謂是草根陶謂是生氣物蘇恭之説半似草半似蟲皆妄矣此蟲所在水石間有之取為鈎餌馬湖石門最多彼人啖之云鹹微辛頌曰石蠶陶蘇都無定論蜀本之説為是今川廣中多有之其草根之似蠶者亦名石蠶出福州今信州山石上四時常有之亦采入藥詳見菜部草石蠶下附録雲師雨虎時珍曰按遁甲開山圖云霍山有雲師雨虎榮氏注云雲師如蠶長六寸有毛似兔雨虎如蠶長七八寸似蛙雲雨則出在石內可炙食之此亦石蠶之類也氣味鹹寒有寒保升曰鹹微辛吳普曰雷公鹹無毒主治五癃破石淋墮胎其肉解結氣利水道除熱本經石蠧蟲主石癃小便不利别録發明宗奭曰石蠶謂之草者謬也經言肉解結氣注中更不辨定何耶時珍曰石蠶連皮殼用也肉則去皮殼也九香蟲綱目釋名黑兜蟲集解時珍曰九香蟲産于貴州永寧衛赤水河中大如小指頭狀如水黽身青黑色至冬伏于水下土人多取之以充人事至驚蟄後即飛出不可用矣氣味鹹溫無毒主治膈脘滯氣脾腎虧損壯元陽時珍發明時珍曰攝生方烏龍丸治上證久服益人四川何卿總兵常服有效其方用九香蟲一兩半生焙車前子微炒陳橘皮各四錢白术焙五錢杜仲酥炙八錢右為末煉蜜丸梧桐子大每服一錢五分以鹽白湯或鹽酒服早晚各一服此方妙在此蟲海蠶海藥集解李珣曰按南州記云海蠶生南海山石間狀如蠶大如拇指其沙甚白如玉粉狀每有節難得真者彼人以水搜葛粉石灰以梳齒印成偽充之縱服無益反能損人宜慎之沙氣味鹹大溫無毒主治虛勞冷氣諸風不遂久服補虛嬴令人光澤輕身延年不老李珣雪蠶綱目釋名雪蛆集解時珍曰按葉子竒草木子云雪蠶生隂山以北及峨嵋山北人謂之雪蛆二山積雪厯世不消其中生此大如瓠味極甘美又王子年拾遺記云員嶠之山有水蠶長六七寸黑色有鱗角以霜雪覆之則作繭長一尺抽五色絲纎為文錦入水不濡投火不燎堯時海人獻之其質輕暖柔滑按此亦雪蠶之類也氣味甘寒無毒主治解內熱渴疾時珍枸杞蟲拾遺釋名蠋爾雅集解藏器曰此蟲生枸杞上食枸杞葉狀如蠶作繭為蛹時取之曝乾收用時珍曰此爾雅所謂蚅烏蝎也其狀如蠶亦有五色者老則作繭化蛾孚子諸草木皆有之亦各隨所食草木之性故廣志云藿蠋香槐蠋臭氣味鹹溫無毒主治益陽道令人悅澤有子炙黃和地黃末為丸服之大起陽益精藏器治腎家風虛時珍普濟方蘹香蟲綱目集解時珍曰生蘹香枝葉中狀如尺蠖青色主治小腸疝氣時珍本草綱目卷三十九
