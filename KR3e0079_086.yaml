body:
  text: 本草綱目卷三十五下明李時珍撰木之二喬木類三十四種内附一種秦皮本經中品校正併入拾遺樳木釋名梣皮音岑樳木音尋石檀别錄樊槻𢎞景盆桂日華苦樹蘇恭苦櫪時珍曰秦皮本作梣皮其木小而岑髙故因以爲名人訛爲樳木又訛而爲秦木或云本出秦地故得秦名也高誘注淮南子云梣苦櫪木也恭曰樹葉似檀故名石檀俗因味苦呼爲苦樹集觧别録曰秦皮生廬江川谷及寃句水邉二月八月采皮隂乾𢎞景曰俗云是樊槻皮而水漬以和墨書色不脫㣲青㳟曰此樹似檀葉細皮有白㸃而不粗錯取皮漬水便碧色書紙看之皆青色者是真頌曰今陜西川郡及河陽亦有之其木大都似檀枝幹皆青綠色葉如匙頭虚大而不光並無花實根似槐根俗呼爲白樳木皮氣味苦微寒無毒别録曰大寒普曰神農雷公黄帝岐伯酸無毒李當之小寒權曰平惡苦瓠防葵之才曰惡吳茱萸大㦸爲之使主治風寒濕脾洗洗寒氣除熱目中青瞖白膜乆服頭不白輕身本經療男子少精婦人帶下小兒癎身熱可作洗目湯乆服皮膚光澤肥大有子别錄明目去目中乆熱両目赤腫疼痛風淚不止作湯浴小兒身熱煎水澄清洗赤目極效甄權主熱痢下重下焦虚好古同葉煮湯洗蛇咬并研末傳之藏器發明𢎞景曰秦皮俗方惟以療目道家亦有用處大明曰秦皮之功洗肝益精眀目退熱元素曰秦皮沉也陰也其用有四治風寒濕邪成痺青白幻翳遮睛女子崩中帶下小兒風熱驚癎好古曰痢則下焦虚故張仲景白頭翁湯以黄蘗黄連秦皮同用皆苦以堅之也秦皮浸水青藍色與紫草同用治目病以增光暈尤佳時珍曰梣皮色青氣寒味苦性濇乃是厥陰肝少陽膽經藥也故治目病驚癎取其平木也治下痢崩帶取其収濇也又能治男子少精益精有子皆取其濇而補也故老子云天道貴濇此藥乃服食及驚癎崩痢所宜而人止知其治目一節幾於廢棄良爲可惋淮南子云梣皮色青治目之要藥也又萬畢術云梣皮止水謂其能収淚也高誘解作致水言能使水沸者謬也附方舊三新三赤眼生瞖秦皮一兩水一升半煮七合澄清日日温洗一方加滑石黄連等分秘外臺眼暴腫痛秦皮黄連各一兩苦竹葉半升水二升半煑取八合食後温服此乃謝道人方也外臺秘要赤眼睛瘡秦皮一兩清水一升白盌中浸春夏一食頃以上看碧色出即以筋頭纒綿仰卧㸃令滿眼微痛勿畏良久瀝取熱汁日㸃十度以上不過兩日瘥也外䑓秘要眼弦挑鍼乃肝脾積熱剉秦皮夾沙糖水煎調大黄末一錢㣲利佳仁齋直指方血痢連年秦皮鼠尾草薔薇根等分以水煎取汁銅器重釡煎成丸如梧子大毎服五六丸日二服稍增以止爲度亦可煎飲千金方天蛇毒瘡似癩非癩天蛇乃草間花蜘蛛也人被其螫爲露水所濡乃成此疾以秦皮煑汁一斗飲之即瘥寇宗奭本草合歡本經中品釋名合昬唐本夜合日華青裳圖經萌葛綱目鳥頼樹頌曰崔豹古今注云欲蠲人之忿則贈以青裳青裳合歡也植之庭除使人不忿故嵇康養生論云合歡蠲忿萱草忘憂藏器曰其葉至暮即合故云合昬時珍曰按王璆百一選方云夜合俗名萌葛越人謂之烏賴樹又金光明經謂之尸利灑樹集解本經曰合歡生豫州山谷樹如狗骨樹别録曰生益州山谷𢎞景曰俗間少識當以其非療病之功也恭曰此樹葉似皂莢及槐極細五月花發紅白色上有絲茸秋實作莢子極薄細所在山谷有之今東西京第宅山池間亦有種者名曰合昬頌曰今汴洛間皆有之人家多植於庭除間本似梧桐枝甚柔弱葉似皂角極細而繁宻互相交結毎一風來輒白相解了不相牽綴采皮及葉用不拘時月宗奭曰合歡花其色如今之醮暈綠上半白下半肉紅散垂如絲爲花之異其綠葉至夜則合也嫩時煠熟水淘亦可食木皮去粗皮炒用氣味甘平無毒主治安五臟和心志令人歡樂無憂久服輕身眀目得所欲本經煎膏消癰腫續筋骨大明殺蟲搗末和鐺下墨生油調塗蜘蛛咬瘡用葉洗衣垢藏器折傷疼痛研末酒服二錢匕宗奭和血消腫止痛時珍發明震亨曰合歡属土補陰之功甚㨗長肌肉續筋骨概可見矣與白蠟同入膏用神效而外科家末曾錄用何也附方舊二新三肺癰唾濁心胸煩錯取夜合皮一掌大水三升煑取一半分二服韋宙獨行方撲損折骨夜合樹皮即合歡皮去粗皮炒黑色四兩芥菜子炒一兩爲末每服二錢温酒卧時服以滓傅之接骨甚妙王璆百一選方髮落不生合歡木灰二合墻衣五合鉄精一合水萍末二合研匀生油調塗一夜一次普濟方小兒撮口夜合花枝濃煑汁拭口中并洗之錄子母秘中風攣縮夜合枝酒夜合枝栢枝槐枝桑枝石榴枝各五兩並生剉糯米五升黑豆五升羗活二兩防風五錢細麯七斤半先以水五斗煎五枝取二斗五升浸米豆蒸熟入麵與防風羗活如常釀酒法封三七日壓汁毎飲五合勿過醉致吐常令有酒氣也竒效良方皂莢本經中品釋名皂角綱日雞栖子綱目烏犀綱目懸刀時珍曰莢之樹皂故名廣志謂之雞栖子曾氏方謂之烏犀外丹本草謂之懸刀集解别錄曰皂莢生雍州山谷及魯鄒縣如猪牙者良九月十月采莢陰乾𢎞景曰處處有之長尺二者良俗人見其有䖝孔而未甞有䖝形皆言不可近令人惡病殊不爾也其䖝状如草葉上青䖝㣲黑便出所以難見㳟曰此物有三種猪牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其尺二者粗大長虚而無潤若長六七寸圓厚節促直者皮薄多肉味濃大好頌曰所在有之以懐孟者爲勝木極有髙大者本經用如猪牙者陶用尺二者蘇用六寸圓厚者今醫家作疎風氣丸煎多用長皂莢治齒及取積藥多用牙皂莢所用雖殊性味不甚相逺其初生嫩芽以爲蔬茹更益人時珍曰皂樹髙大葉如槐葉瘦長而尖枝間多刺夏開細黄花結實有三種一種小如猪牙一種長而肥厚多脂而粘一種長而瘦薄枯燥不粘以多脂者爲佳其樹多刺難上采時以篾篐其樹一夜自落亦一異也有不結實者樹鑿一孔入生鉄三五斤泥封之即結莢人以鉄砧槌皂莢即自損鉄碾碾之久則成孔鉄鍋㸑之多爆片落豈皂莢與鉄有感召之情耶皂莢修治斆曰凡使要赤肥并不蛀者以新汲水浸一宿用銅刀削去粗皮以酥反復灸透槌去子弦用毎莢一兩用酥五錢好古曰凡用有蜜灸酥灸絞汁燒灰之異各依方法氣味辛鹹温有小毒好古曰入厥陰經氣分時珍曰入手太陰陽明經氣分之才曰栢實爲之使惡麥門冬畏空青人參苦參機曰伏丹砂粉霜硫黄硇砂主治風痺死肌邪氣風頭淚出利九竅殺精物本經療腹脹満消榖除欬𠻳囊結婦人胞不落眀目益精可為沐藥不入湯别録通關節頭風消痰殺蟲治骨蒸開胃中風口噤大明破堅癥腹中痛能墮胎又将浸酒中取盡其精煎成膏塗帛貼一切腫痛甄權溽暑久雨時合蒼术燒烟辟瘟疫邪濕氣宗奭燒烟熏乆痢脱肛汪機搜肝風瀉肝氣好古通肺及大膓氣治咽喉痺塞痰氣喘欬風癘疥癬時珍發明好古曰皂莢厥陰之藥活人書治陰毒正氣散内用皂莢引入厥陰也時珍曰皂莢属金入于太陰陽明之經金勝木燥勝風故兼入足厥隂治風木之病其味辛而性燥氣浮而散吹之導之則通上下諸竅服之則治風濕痰喘腫滿殺䖝塗之則散腫消毒搜風治瘡按龎安時傷寒總病論云元祐五年自春至秋蘄黄二郡人患急㗋痺十死八九速者半日一日而死黄州推官潘昌言得黑龍膏方救活數千人也其方治九種㗋痺急㗋痺纒㗋風結㗋爛㗋遁䖝䖝蝶重舌木舌飛絲入口用大皂莢四十挺切水三斗浸一夜煎至一斗半入人參末半兩甘草末一兩煎至五升去滓入無灰酒一升釡煤二匕煎如餳入瓶封埋地中一夜毎温酒化下一匙或掃入㗋内取惡涎盡爲度後含甘草片又孫用和家傅秘寳方云凡人卒中風昏昏如醉形體不収或倒或不倒或口角流涎出斯須不治便成大病此證風涎潮於上胸痺氣不通宜用急救稀涎散吐之用大皂莢肥實不蛀者四挺去黑皮白礬光明者一兩爲末毎用半錢重者三字温水調灌不大嘔吐只是㣲㣲稀冷涎或出一升二升當待惺惺乃用藥調治不可便大吐之恐過劑傷人累效不能書述宗奭曰此法用皂莢末一兩生礬末半兩膩粉半兩水調一二錢過咽即吐涎用礬者分膈下涎也附方舊二十新三十六中風口噤不開涎潮壅上皂角一挺去皮猪脂塗炙黄色爲末毎服一錢温酒調下氣壮者二錢以吐出風涎爲度簡要濟衆方中風口喎皂角五兩去皮爲末三年大醋和之左喎塗右右喎塗左乾更上之外䑓秘要中暑不省皂莢一兩燒存性廿草一兩㣲炒爲末温水調一錢灌之澹寮方鬼魘不寤皂莢末刀圭吹之能起死人千金方自縊将死皂莢末吹鼻中外一方水溺卒死一宿者尚可活紙褁皂莢末納下部須臾出水即活外臺秘要急喉痺塞逡廵不救皂莢生研末毎以少許㸃患處外以醋調厚封項下須臾便破出血即愈或挼水灌之亦良直指方川皂角肉半截水醋半盞煎七分破出濃血即愈咽喉腫痛牙皂一挺去皮米醋浸炙七次勿令大焦爲末毎吹少許入咽吐涎即止錄聖濟總風癎諸痰五癎膏治諸風耴痰如神大皂角半斤去皮子以蜜四兩塗上慢火炙透槌碎以熱水浸一時挼取汁慢火熬成膏入麝香少許攤在夾綿紙上晒乾剪作紙花毎用三四片入淡漿水一小盞中洗淋下以筒吹汁入鼻内待痰涎流盡吃芝麻餅一箇涎盡即愈立效普濟方風邪癎疾皂莢燒存性四兩蒼耳根莖葉日乾四兩蜜陀僧一兩爲末成丸梧子大硃砂爲衣毎服三四十丸棗湯下日二服稍退只服二十丸名抵住丸永類方一切痰氣皂莢燒存性蘿蔔子炒等分薑汁入煉蜜丸梧子大毎服五七十丸白湯下簡便方胸中痰結皂莢三十挺去皮切水五升浸一夜挼耴汁慢熬至可丸丸如梧子大毎食後塩漿水下十丸又釣痰膏用半夏醋煑過以皂角膏和匀入明礬少許以柿餅搗膏丸如彈子噙之聖惠方欬逆上氣唾濁不得卧皂莢丸用皂莢炙去皮子研末蜜丸梧子大毎服一丸棗膏湯下日三夜一服張仲景方痰喘欬𠻳長皂莢三條去皮子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十粒用薑汁制杏仁麻油制巴豆蜜制半夏一處火灸黄色爲末毎用一字安手心臨卧以薑汁調之喫下神效選余居士竒方卒寒欬𠻳皂莢燒研䜴湯服二錢千金方牙病喘息㗋中水鷄鳴用肥皂莢兩挺酥灸取肉爲末蜜丸豆大毎服一丸取微利爲度不利更服一日一服必效方腫満入腹脹急皂莢去皮子灸黄爲末酒一斗石器煑沸服一斗日三服肘後方二便關格千金方用皂莢燒研粥飲下三錢立通糊宣明方鉄脚丸用皂莢炙去皮子爲末酒麪丸毎服五十丸酒下坐聖惠方用皂莢燒烟于桶内上熏之即通食氣黄腫氣喘胸滿用不蛀皂角去皮子醋塗炙焦爲末一錢巴豆七枚去油膜以淡醋研好墨和丸麻子大毎服三丸食後陳橘皮湯下日三服隔一日增一丸以愈爲度經驗方胸腹脹満欲令瘦者猪牙皂角相續量長一尺微火煨去皮子𢷬篩蜜丸大如梧子服時先喫羊肉兩臠汁三兩口後以肉汁香藥十丸以快利爲度覺得力更服以利清水即止藥瘥後一月不得食肉及猪油膩崔元亮海上集驗方身面卒腫洪滿用皂莢去皮灸黄剉三升酒一斗漬透煑沸毎服一升一日三服肘後方卒熱勞疾皂莢續成一尺以上酥一大兩微塗緩灸酥盡搗篩蜜丸梧子大毎日空腹飲下十五丸漸增至二十丸重者不過兩劑愈崔元亮海上方急勞煩熱體瘦三皂丸用皂莢皂莢樹皮皂莢刺各一斤同燒灰以水三斗淋汁冄淋如此三五度煎之候少凝入麝香末一分以童子小便浸蒸餅丸小豆大毎空心温水下七丸聖惠方脚氣腫痛皂角赤小豆爲末酒醋調貼腫處永類方傷寒初得不問隂陽以皂角一挺肥者燒赤爲末以水五合和頓服之陰病極效千金方時氣頭痛煩熱用皂角燒研新汲水一中盞薑汁蜜各少許和二錢服之先以煖水淋浴後服藥取汗即愈聖惠卒病頭痛皂角末吹鼻取嚏斗門方腦宣不止不蛀皂角去皮子蜜炙搥碎入水挼取濃汁熬成膏㗜鼻口内咬定良乆涎出為度張子和儒門事親齆鼻不通皂角末吹之千金方風熱牙痛皂角一挺去子入塩滿殻仍加白礬少許黄泥固濟煆研日擦之相誠經驗方風蟲牙痛外䑓秘要方用皂莢末塗齒上有涎吐之千金方用猪牙皂角食塩等分爲末日揩之揩牙烏鬚大皂角二十挺以薑汁地黄汁蘸炙十遍爲末日用揩牙甚妙普濟方霍亂轉筋皂角末吹豆許入鼻取嚏即安深師方腸風下血用長尺皂角五挺去皮子酥灸三次研末精羊肉十兩細切搗爛和丸梧子大毎温水下二十丸聖惠大腸脱肛不蛀皂角五挺槌碎水挼取汁二升浸之白収上収後以湯盪其腰肚上下令皂角氣行則不冄作仍以皂角去皮酥灸爲末棗肉和丸米飲下三十丸聖惠方下部􅉶瘡皂莢燒研綿褁導之肘后方外腎偏疼皂角和皮爲末水調傅之良梅師方便毒腫痛皂角炒焦水粉炒等分研末以熱醋調攤貼患處頻以水潤之即效又方用猪牙皂角七片煨黄去皮弦出火毒爲末空心温酒服五錢袖珍方便毒癰疽皂角一條醋熬膏傅之屢效方直指婦人吹乳袖珍方用猪牙皂角去皮蜜炙爲末酒服一錢又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一盃調八字管教時刻笑呵呵丁腫惡瘡皂角去皮酥炙焦爲末入麝香少許人糞少許和塗五日後根出普濟方小兒頭瘡粘肥及白秃用皂角燒黑爲末去痂傅之不過三次即愈鄧筆鋒衛生雜典小兒惡瘡皂莢水洗拭乾以少麻油搗爛塗之方肘後足上風瘡作痒甚者皂角灸熱烙之潘氏方大風諸癩長皂角二十條灸去皮子以酒煎稠濾過候冷入雪糕丸梧子大每酒下五十丸直指方積年疥瘡猪肚内放皂角煑熟去皂角食之袖珍方射工水毒生瘡皂莢長尺二者苦酒一升煎汁熬如飴塗之肘後方咽喉骨哽猪牙皂角二條切碎生絹袋盛縫滿線縛頂中立消簡便方魚骨哽咽皂角末吹鼻取嚏聖惠方九里蜂毒皂莢鑽孔貼叮處艾灸孔上三五壮即安救急方腎風隂痒以稻草燒皂角烟熏十餘次即止濟急仙方子修治斆日捒取圎滿堅硬不蛀者以瓶煮熟剥去硬皮一重取向裏白肉両片去黄以銅刀切晒用其黄消人腎氣氣味辛温無毒主治炒舂去赤皮以水浸軟煮熟糖漬食之疎道五臟風熱壅宗奭核中白肉入治肺藥核中黄心嚼食治膈痰吞酸蘇頌仁和血潤腸李杲治風熱大腸虚祕瘰癧腫毒瘡癬時珍發明機曰皂角核燒存性治大便燥結其性得濕則滑滑則燥結自通也時珍曰皂莢味辛属金能通大腸陽明燥金乃辛以潤之之義非得濕則滑也附方舊三新十一腰脚風痛不能履地皂角子一千二百箇洗净以少酥熬香爲末蜜丸梧子大毎空心以蒺藜子酸棗仁湯下三十丸千金方大腸虚祕風人虚人脚氣人大腸或秘或利用上方服至百丸以通爲度下痢不止諸藥不效服此三服宿垢去盡即變黄色屢驗皂角子瓦焙爲末米糊丸梧子大毎服四五十丸陳茶下醫方摘要腸風下血皂莢子槐實一兩用占穀糠炒香去糠爲末陳粟米飲下一錢名神效㪚聖惠方裏急後重不蛀皂角子米糠炒過枳殻炒等分爲末飯丸梧子大每米飲下三十丸普濟方小兒流涎脾熱有痰皂莢子仁半兩半夏薑湯泡七次一錢二分爲末姜汁丸麻子大毎温水下五丸聖濟總錄惡水入口及皂莢水入口熱痛不止以皂莢子燒存性一分沙糖半兩和膏舍之博濟方婦人難産皂角子二枚吞之千金方風蟲牙痛皂角子末綿褁彈子大兩顆醋煮熱更互熨之日三五度聖惠方粉滓面䵟皂角子杏仁等分研匀夜以津和塗之聖惠方預免瘡櫛凡小兒毎年六月六日照年嵗吞皂莢子可免瘡癤之患大人亦可吞七枚或二十一枚林静齋所傳方也吳昊扶夀方便癰初起皂角子七箇研末水服效一方照年嵗吞之親儒門事方一切丁腫皂角子仁作末傅之五日愈千金方年乆瘰癧阮氏經驗方用不蛀皂角子一百粒米醋一升硇砂二錢同煑乾炒令酥看􅊓子多少如一箇服一粒十箇服十粒細嚼米湯下酒浸煮服亦可聖濟總録言虛人不可用硇砂也刺一名天丁氣味辛温無毒主治米醋熬嫩刺作煎塗瘡癬有竒效蘇頌治癰腫妬乳風癘惡瘡胎衣不下殺蟲時珍發明楊士瀛曰皂莢刺能引諸藥性上行治上焦病震亨曰能引諸癰疽潰處甚驗時珍曰皂莢刺治風殺䖝功與莢同但其銳利直逹病所爲異耳神仙傳云左親騎軍崔言一旦得大風惡疾雙目昏盲眉髮自落鼻梁崩倒勢不可救遇異人傳方用皂角刺三斤燒灰蒸一時久日乾爲末食後濃煎大黄湯調一匕飲之一旬眉髮冄生肌潤目眀後入山修道不知所終又劉守真保命集云癘風乃營氣熱風寒客于脉而不去宜先用樺皮散服五七日後灸承漿穴七壮三灸後毎旦早服樺皮散午以升麻葛根湯下錢氏瀉青丸晚服一聖散用大黄末半兩煎湯調皂角刺灰三錢乃緩疎泄血中之風熱也仍戒房室三年樺皮散見樺皮下又追風冄造散即一聖散云服之便出黒䖝爲騐數日冄服直候䖝盡爲絶根也新䖝嘴赤老䖝嘴黑附方新十二小兒重舌皂角刺灰入朴硝或腦子少許漱口摻入舌下涎出自消聖惠方小便淋閉皂角刺燒存性破故紙等分爲末無灰酒服聖濟總錄腸風下血便前近腎肝便後近心肺皂角刺灰二兩胡桃仁破故紙炒槐花炒各一兩爲末毎服一錢米飲下普濟方傷風下痢風傷久不已而下痢膿血日數十度用皂角刺枳實麩炒槐花生用各半兩爲末煉蜜丸梧子大毎服三十丸米湯下日二服袖珍方胎衣不下皂角刺燒爲末毎服一錢温酒調下熊氏補遺婦人乳癰皂角刺燒存性一兩􅑕粉一錢和研每服一錢温酒下直指方乳汁結毒産後乳汁不泄結毒者皂角刺蔓荆子各燒存性等分爲末毎温酒服二錢方袖珍腹内生瘡在腸臟不可藥治者取皂角刺不拘多少好酒一椀煎至七分温服其膿血悉從小便中出極效不飲酒者水煎亦可蘭氏經騐方瘡腫無頭皂角刺燒灰酒服三錢嚼葵子三五粒其處如針刺爲效儒門事親癌瘭惡瘡皂角刺燒存性研白及少許爲末傅之直指方大風癘瘡選竒方用黄蘖末皂角刺灰各三錢研空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如四肢腫用針刺出水冄服忌一切魚肉發風之物取下䖝大小長短其色不一約一二升其病乃愈也仁存方發背不潰皂角刺麥麩炒黄一兩綿黄茋焙一兩甘草半兩爲末毎服一大錢酒一琖乳香一塊煎七分去滓温服普濟本事方木皮根皮氣味辛温無毒主治風熱痰氣殺蟲時珍附方新二肺風惡瘡瘙痒用木乳即皂莢根皮秋冬采如羅紋者隂乾炙黄白蒺藜炒黄茋人參枳殻炒甘草灸等分爲末沸湯毎服一錢普濟方産後膓脱不収用皂角樹皮半斤皂角核一合川楝樹皮半斤石蓮子炒去心一合爲粗末以水煎湯乗熱以物圍定坐熏洗之挹乾便喫補氣丸藥一服仰睡婦人良方葉主治入洗風瘡渫用時珍附錄鬼皂莢藏器曰生江南驛畔状如皂莢高一二尺作湯浴去風瘡疥癬挼葉去衣垢沬髮令長肥皂莢綱目集解時珍曰肥皂莢生高山中其樹高大葉如檀及皂莢葉五六月開白花結莢長三四寸状如雲實之莢而肥厚多肉内有黒子數顆大如指頭不正圓其色如漆而甚堅中有白仁如栗煨熟可食亦可種之十月采莢煮熟搗爛和白麪及諸香作丸澡身面去垢而膩潤勝于皂莢也相感志言肥皂莢水死金魚辟馬螘麸見之則不就亦物性然耳莢氣味辛温微毒主治去風濕下痢便血瘡癬腫毒時珍附方新九腸風下血獨子肥皂燒存性一片爲末糊丸成米飲下普濟方下痢禁口肥皂莢一枚以塩實其内燒存性爲末以少許入白米粥内食之即效乾坤生意風虚牙腫老人腎虚或因凉藥擦牙致痛用獨子肥皂以青塩實之燒存性研末摻之或入生樟腦十五文寳衛生家方頭耳諸瘡眉癬燕窩瘡並用肥皂煆存性一錢枯礬一分研匀香油調塗之方摘𤣥小兒頭瘡因傷湯水成膿出水不止用肥皂燒存性入膩粉麻油調搽海上方臘梨頭瘡不拘大人小兒用獨核肥皂去核填入沙糖入巴豆二枚札定塩泥包煆存性入檳榔輕粉五七分研匀香油調搽先以灰汁洗過温水冄洗拭乾乃搽一宿見效不須冄洗普濟方癬瘡不愈以川槿皮煎湯用肥皂去核及内膜浸湯時時搽之楊起簡便方便毒初起肥皂搗爛傅之甚效簡便方玉莖濕癢肥皂一箇燒存性香油調搽即愈攝生方核氣味甘腥温無毒主治除風氣時珍無患子宋開寳釋名桓拾遺木患子綱目噤婁拾遺肥珠子綱目油珠子綱目菩提子綱目鬼見愁藏器曰桓患字聲訛也崔豹古今注云昔有神巫曰瑶㲘能符劾百鬼得鬼則以此木爲棒棒殺之世人相傳以此木爲器用以厭鬼魅故號曰無患人又訛爲木患也時珍曰俗名爲鬼見愁道家禳解方中用之緣此義也釋家取爲數珠故謂之菩提子與薏苡同名纂文言其木名盧鬼木山人呼為肥珠子油珠子因其實如肥油而子圓如珠也集解藏器曰無患子髙山大樹也子黑如漆珠博物志云桓葉似櫸柳葉核堅正黑如瑿可作香纓及浣垢宗奭曰今釋子取爲念珠以紫紅色小者佳入藥亦少西洛亦有之時珍曰生高山中樹甚高大枝葉皆如椿特其葉對生五六月開白花結實大如彈丸状如銀杏及苦楝子生青熟黄老則文皺黄時肥如油􅨘之形味辛氣䐈且硬其蒂下有二小子相粘承之實中一核堅黑似肥皂莢之核而正圓如珠殻中有仁如榛子仁亦辛䐈可炒食十月采實煮熟去核搗和麥麪或豆麪作澡藥去垢同于肥皂用洗真珠甚妙山海經云袂周之山其木多桓郭璞注云葉似柳皮黄不錯子似楝着酒中飲之辟惡氣浣之去垢核堅正黒即此也今武當山中所出鬼見愁亦是樹莢之子其形正如刀豆子而色褐彼人亦以穿數珠别又是一物非無患也子皮即核外肉也氣味微苦平有小毒主治澣垢去面䵟喉痺研納喉中立開又主飛尸藏器附方新二洗頭去風明目用槵子皮皂角胡餅菖蒲同槌碎漿水調作彈子大毎用泡湯洗頭良事多能鄙洗面去䵟槵子肉皮搗爛入白麪和丸大丸毎日用洗面去垢及䵟甚良簡集方子中仁氣味辛平無毒主治燒之辟邪惡氣藏器煨食辟惡去口臭時珍附方新一牙齒腫痛肥珠子一兩大黄香附各一兩青塩半兩泥固煆研日用擦牙普濟方欒華本經下品集解别録曰欒華生漢中川谷五月采恭曰此樹葉似木槿而薄細花黄似槐而稍長大子殻似酸漿其中有實如熟豌豆圓黒堅硬堪爲數珠者是也五月六月花可収南人以染黄甚鮮眀又以療目赤爛頌曰今南方及汴中園圃間或有之宗奭曰長安山中亦有之其子謂之木欒子携至京都爲數珠未見入藥華氣味苦寒無毒之才曰决明爲之使主治目痛淚出傷眥消目腫本經合黄連作煎療目赤爛蘇㳟無食子唐本草釋名沒石子開寳墨石子炮炙論麻荼澤珣曰波斯人毎食以代果故番胡呼爲沒食子梵書無與沒同音今人呼爲墨石沒石轉傳訛矣集解㳟曰無食子生西戎沙磧間樹似檉禹錫曰按叚成式酉陽雜爼云無食子出波斯國呼爲摩澤樹髙六七丈圍八九尺葉似桃而長三月開花白色心微紅子圓如彈丸初青熟乃黄白䖝蝕成孔者入藥用其樹一年生無食子一年生㧞屢子大如指長三寸上有股中仁如栗黄可噉時珍曰按方輿志云大食國有樹一年生如栗子而長名曰蒲盧子可食次年則生麻荼澤即沒石子也間嵗互生一根異産如此一統志曰沒石子出大食諸畨樹如樟實如中國芧栗子修治斆曰凡使勿犯銅鉄并被火驚用顆小無杴米者妙用漿水於砂盆中研令盡焙乾冄研如烏犀色入藥氣味温苦無毒主治赤白痢腸滑生肌肉唐本腸虚冷痢益血生精和氣安神烏髭髮治隂毒痿燒灰用李珣温中治隂瘡隂汗小兒疳䘌冷滑不禁馬志發明宗奭曰沒石子合他藥染鬚造墨家亦用之珣曰張仲景用治隂汗燒灰先以湯浴了布褁灰撲之甚良附方舊三新五血痢不止沒石子一兩爲末飯丸小豆大毎食前米飲下五十丸普濟方小兒乆痢沒石子兩箇熬黄研末作餛飩食之宫氣方産後下痢沒石子一箇燒存性研末酒服熱即用飲下日二子母秘錄牙齒疼痛綿褁無食子末一錢咬之涎出吐去錄聖濟總鼻面酒皶南方沒石子有孔者水磨成膏夜夜塗之甚妙危氏得效方口鼻急疳沒石子末吹下部即瘥千金方大小口瘡沒石子炮三分甘草一分研末掺之月内小兒生者少許置乳上吮之入口即啼不過三次聖惠方足趾肉刺無食子三枚肥皂莢一挺燒存性爲末醋和傅之立效竒效方訶黎勒唐本草釋名訶子時珍曰訶黎勒梵言天主持來也集解㳟曰訶黎勒生交州愛州頌曰今嶺南皆有而廣州最盛樹似木槵花白子形似巵子橄㰖青黄色皮肉相着七月八月實熟時采六路者佳嶺南異物志云廣川法性寺有四五十株子極小而味不濇皆是六路每嵗州貢只以此寺者寺有古井木根蘸水水味不醎每子熟時有佳客至則院僧煎湯以延之其法用新摘訶子五枚甘草一寸破之汲井水同煎色若新茶今其寺謂之乾明古寺尚在舊木猶有六七株南海風俗尚貴此湯然煎之不必盡如昔時之法也訶子未熟時風飄墮者謂之隨風子暴乾収之益小者佳彼人尤珍貴之蕭炳曰波斯舶上來者六路黒色肉厚者良六路即六稜也斆曰凡使勿用皉黎勒个个皉頭也若訶黎勒文只有六路或多或少並是雜路勒皆圓而露文或八路至十三路號曰榔精勒濇不堪用修治斆曰凡用訶黎勒酒浸後蒸一伏時刀削去皮取肉剉焙用用核則去肉氣味苦温無毒權曰苦甘炳曰苦酸珣曰酸濇温好古曰苦酸平苦重酸輕味厚陰也降也主治冷氣心腹脹満下食唐本破胸膈結氣通利津液止水道黑髭髮甄權下宿物止腸澼乆洩赤白痢蕭炳消痰下氣化食開胃除煩治水調中止嘔吐霍亂心腹虚痛奔豚腎氣肺氣喘急五膈氣腸風瀉血崩中帶下懐孕漏胎及胎動欲生脹悶氣喘并患痢人肛門急痛産婦隂痛和蠟燒烟熏之及煎湯熏洗大明治痰𠻳咽喉不利含三數枚殊勝蘇㳟實大腸歛肺降火震亨發明宗奭曰訶黎勒氣虚人亦宜緩緩煨熟少服此物雖濇腸而又泄氣其味苦濇故爾杲曰肺苦氣上逆急食苦以泄之以酸補之訶子苦重瀉氣酸輕不能補肺故嗽藥中不用震亨曰訶子下氣以其味苦而性急肺苦急急食苦以瀉之謂降而下走也氣實者宜之若氣虚者似難輕服又治肺氣因火傷極遂一遏脹滿其味酸苦有収斂降火之功也時珍曰訶子同烏梅五倍子用則收斂同橘皮厚朴用則下氣同人參用則能補肺治咳𠻳東垣云𠻳藥不用者非矣但欬𠻳未久者不可驟用爾嵇含草木状言作飲久服令髭髮白者變黒亦取其濇也珣曰訶黎皮主嗽肉主眼濇痛波斯人将訶黎勒大腹等在舶上用防不虞或遇大魚放涎滑水中数里船不能通乃煮此洗其涎滑尋化為水則其治氣消痰功力可知矣藥慎微曰金光明經言流水長者除病品云熱病下服訶黎勒又廣異記云高仙芝在大食國得訶黎勒長三寸置抹肚下便覺腹中痛因大痢十餘行疑訶黎勒爲祟後問火食長老云此物人帶一切病消利者乃出惡物爾仙芝寳之後被誅失所在唐頌曰訶黎主痢唐本草不載張仲景治氣痢有方劉禹錫傳信方云予曽苦赤白下諸藥服遍久不瘥轉爲白膿令狐将軍傳此方用訶黎勒三枚兩炮一生並取皮末之以沸漿水一合服之若只水痢加一錢匕甘草末若微有膿血加三匕血多亦加三匕附方舊九新六下氣消食訶黎一枚爲末瓦器中水一大升煎三兩沸下藥更煎三五沸如麴塵色入少塩飲之食醫心鏡一切氣疾宿食不消訶黎一枚入夜含之至明嚼嚥又方訶黎三枚濕紙包煨熟去核細嚼以牛乳下千金方氣𠻳日久生訶黎一枚含之嚥汁瘥後口爽不知食味却煎㯽榔湯一盌服立便有味此知連州成宻方也經騐方嘔逆不食訶黎勒皮二兩炒研糊丸梧子大空心湯服二十丸日三服廣濟方風痰霍亂食不消大便濇訶黎三枚取皮爲末和酒頓服三五次妙外䑓秘要小兒霍亂訶黎一枚爲末沸湯服一半未止冄服子母秘錄小兒風痰壅閉語音不出氣促喘悶手足動摇訶子半生半炮去核大腹等皮分水煎服名二聖散全㓜心鑑風熱衝頂熱悶訶黎二枚爲末芒消一錢同入醋中攪令消磨塗熱處外䑓秘要氣痢水瀉訶黎勒十枚麪褁煻火煨熟去核研末粥飲頓服亦可飯丸服一加木香大又長服方訶黎勒陳橘皮厚朴各三兩搗篩蜜丸如梧子毎服二三十丸白湯下圖經本草水瀉下痢訶黎勒炮二分肉豆蔲一分爲末米飲毎服二錢聖惠方下痢轉白訶子三箇二炮一生爲末沸湯調服水痢加甘草末一錢普濟方赤白下痢訶子十二箇六生六煨去核焙爲末赤痢生甘草湯下白痢炙甘草湯下不過冄服趙原陽濟急方妬精下疳大訶子燒灰入麝香少許先以采泔水洗後搽之或以荆芥黄蘗甘草馬鞭草葱白煎湯洗亦可昔方士周守真醫唐靖爛莖一二寸用此取效也洪邁夷堅志核主治磨白蜜注目去風赤痛神良蘇頌止欬及痢時珍葉主治下氣消痰止渇及洩痢煎飲服功同訶黎時珍吏唐包佶有病中謝李部惠訶黎勒葉詩婆羅得宋開寳釋名婆羅勒時珍曰婆羅得梵言重生果也集解珣曰婆羅得生西海波斯國樹似中華柳樹子如蓽麻子方家多用之時珍曰按王壽外䑓秘要婆羅勒似蓽麻子但以指甲爪之則有汁出即此物也子氣味辛温無毒主治冷氣塊温中補腰腎破痃癖可染髭髪令黒藏器附方新一拔白生黒婆羅勒十顆去皮取汁熊脂二兩白馬鬐膏煉過一兩生薑炒一兩母丁香半兩爲末和煎每㧞白㸃之揩令入肉即生黑者此嚴中丞所用方也孟詵近效方櫸别錄下品釋名櫸栁衍義鬼栁時珍曰其樹髙舉其木如柳故名山人訛爲鬼柳郭璞注爾雅作柜柳云似柳皮可煮飲也集解𢎞景曰櫸樹山中處處有之皮似檀槐葉如櫟槲人多識之㳟曰所在皆有多生溪澗水側葉似樗而狹長樹大者連抱高數仞皮極粗厚殊不似檀宗奭曰櫸木今人呼爲櫸柳其葉謂柳非柳謂槐非槐最大者木高五六丈合二三人抱湖南北甚多然亦不材也不堪爲器嫩皮取以緣栲栳及箕唇時珍曰櫸材紅紫作箱案之類甚佳鄭樵通志云櫸乃榆須而枚烈其實亦如榆錢之状鄉人采其葉爲甜茶木皮修治斆曰凡使勿用三四年者無力用二十年以來者心空其樹只有半邉向西生者良剝下去粗皮細剉蒸之從已至未出焙乾用氣味苦大寒無毒主治時行頭痛熱結在腸胃别録夏日煎飲去熱𢎞景俗用煮汁服療水氣斷痢蘇㳟安胎止妊婦腹痛山櫸皮性平治熱毒風熁腫毒大明附方舊一新四通身水腫櫸樹皮煑汁日飲聖惠方毒氣攻腹手足腫痛櫸樹皮和槲皮煮汁煎如飴糖以樺皮煮濃汁化飲肘後方蟲毒下血櫸皮一尺蘆根五寸水二升煮一升頓服當下蠱出千金方小兒痢血梁州櫸皮二十分炙犀角十二分水三升煑取一升分三服取瘥古今錄騐方飛血赤眼櫸皮去粗皮切二兩古錢七文水一升半煎七合去滓熱洗日二次聖濟總録葉氣味苦冷無毒主治挼貼火爛瘡有效蘇恭治腫爛惡瘡塩搗罯之大明桞本經下品釋名小楊説文楊桞𢎞景曰栁即今水楊栁也恭曰栁與水楊全不相似水楊葉圓濶而尖枝條短硬栁葉狭長而青緑枝條長軟陶以栁為水楊非也藏器曰江東人通名楊栁北人都不言楊楊樹枝葉短栁樹枝葉長時珍曰楊枝硬而揚起故謂之楊栁枝弱而垂流故謂之栁葢一類二種也蘇㳟所説為是按説文云楊蒲栁也從木易聲栁小楊也從木丣聲昜音陽丣音酉又爾雅云楊蒲栁也旄澤栁也檉河栁也觀此則楊可稱栁栁亦可稱楊故今南人猶併稱楊栁余宗本種樹書言順挿為栁倒挿為楊其説牽强且失楊起之意宗奭曰釋家謂栁為尼俱律陀木集解别録曰栁華生琅邪川澤頌曰今處處有之俗所謂楊栁者也其類非一蒲栁即水楊也枝勁靭可為箭笴多生河北杞栁生水旁葉粗而白木理微赤可為車轂今人取其細條火逼令柔屈作箱箧孟子所謂杞栁為桮棬者魯地及河朔尤多檉栁見本條時珍曰楊栁縦横倒順挿之皆生春初生柔荑即開黄蕊花至春晚葉長成後花中結細黒子蕊落而絮出如白絨因風而飛子着衣物能生䖝入池沼即化為浮萍古者春取榆栁之火陶朱公言種栁千樹可足柴炭其嫩芽可作飲湯柳華釋名栁絮本經正誤見下氣味苦寒無毒主治風水黄疸面熱黒本經痂疥惡瘡金瘡柳實主潰癰逐濃血子汁療渇别錄華主止血治濕痺四肢攣急膝痛甄權發明𢎞景曰栁花熟時隨風状如飛雪當用其未舒時者子亦隨花飛止應水漬汁爾藏器曰本經以柳絮爲花其誤甚矣花即初發時黄蕊其子乃飛絮也承曰柳絮可以捍氊代羊毛爲茵褥柔軟性凉宜與小兒卧尤佳宗奭曰柳花黄蕊乾時絮方出収之貼炙瘡良絮之下連小黒子因風而起得水濕便生如苦買地丁之花落結子成絮古人以絮爲花謂花如雪者皆誤矣藏器之說爲是又有實及子汁之文諸家不解今人亦不見用時珍曰本經主治風水黄疸者柳花也别錄主治惡瘡金瘡潰癰逐膿血藥性論止血療痺者栁絮及實也花乃嫰蕊可搗汁服子與絮連難以分别惟可貼瘡止血褁痺之用所謂子汁療渇者則連絮浸漬研汁服之爾又崔寔四民月令言三月三日及上除日采絮愈疾則入藥多用絮也附方新六吐血咯血柳絮焙研米飲服一錢經騐方金瘡血出柳絮封之即止要外䑓秘面上膿瘡柳絮膩粉等分以燈盞油調塗普濟方走馬牙疳楊花燒存性入麝香少許搽保㓜大全大風癘瘡楊花四兩搗成餅貼壁上待乾取下米泔水浸一時取起瓦焙研末二兩白花蛇烏蛇各一條去頭尾酒浸取肉全蠍蜈蚣蟾酥雄黄各五錢苦參天麻各一兩爲末水煎麻黄取汁熬膏和丸梧子大硃砂爲衣毎服五十丸温酒下一日三服以愈爲度效孫氏集良方脚多汗濕楊花着鞋及襪内穿之摘𤣥葉氣味同華主治惡疥痂瘡馬疥煎煮洗之立愈又療心腹内血止痛别録煎水洗漆瘡𢎞景天行熱病傳尸骨蒸勞下水氣煎膏續筋骨長肉止痛主服金石人發大熱悶湯火瘡毒入腹熱悶及丁瘡日華療白濁解丹毒時珍附方舊一新五小便白濁清明栁葉煎湯代茶以愈爲度集簡方小兒丹煩柳葉一斤水一斗煮取汁三升榻洗赤處日七八度子母秘錄眉毛脱落垂柳葉隂乾爲末毎薑汁于鉄器中調夜夜摩之聖惠方卒得惡瘡不可名識者柳葉或皮水煮汁入少塩頻洗之肘後方面上惡瘡方上同痘爛生蛆嫩柳葉舖席上卧之蛆盡出而愈也方李樓竒枝及根白皮氣味同華主治痰熱淋疾可為浴湯洗風腫瘙痒煮酒潄齒痛蘇㳟小兒一日五日寒熱煎枝浴之藏器煎服治黄疸白濁酒煮熨諸痛腫去風止痛消腫時珍發明頌曰柳枝皮及根亦入藥葛洪肘後方治癰疽腫毒妬乳等多用之韋宙獨行方主丁瘡及反花瘡並煎柳枝葉作膏塗之今人作浴湯膏藥牙齒藥亦用其枝爲最要之藥時珍曰柳枝去風消腫止痛其嫩枝削爲牙杖滌齒甚妙附方舊十新八黄疸初起柳枝煮濃汁半升頓服外䑓秘要脾胃虚弱不思飲食食下不化病似翻胃噎膈清明日取柳枝一大把熬湯煮小米作飯酒麵滚成珠子晒乾袋懸風處每用燒滚水隨意下米米沉住火少時米浮取看無硬心則熟可頓食之久則麪散不粘矣名曰絡索米簡楊起便方走注氣痛氣痛之病忽有一處如打撲之状不可忍走注不定静時其處冷如霜雪此皆暴寒傷之也以白酒煮楊柳白皮暖熨之有赤㸃處鑱去血妙凡諸卒腫急痛熨之皆即止姚増坦集騐方風毒卒腫方同上隂卒腫痛柳枝三尺長二十枚細剉水煮極熟以故帛褁包腫處仍以熱湯洗之集騐方項下癭氣水涯露出柳根三十斤水一斛煮取五升以糯米三斗如常釀酒日飲范汪方齒齦腫痛垂柳枝槐白皮桑白皮白楊皮等分煎水熱含冷吐芎又方柳枝槐枝桑枝煎水熬膏入薑汁細辛藭末每用擦牙聖惠方風蟲牙痛楊柳白皮卷如指大含咀以汁漬齒根數過即愈又方柳枝一握剉入少塩花漿水煎含甚騐清又方柳枝剉一升大豆一升合炒豆熟瓷器盛之酒三升漬三日頻含漱涎三日愈古今錄騐耳痛有膿柳根細切熟搗封之燥即易之斗門方漏瘡腫痛柳根紅鬚煎水日洗内摘𤣥方用楊柳條罐燒烟熏之出水即效乳癰妬乳初起堅紫衆療不瘥柳根皮熟搗火温帛褁熨之冷更易一宿消肘後方翻花惡瘡肉出如飯粒根深膿潰柳枝葉三斤水五升煎汁二升熬如餳日三塗之聖恵方天竈丹毒赤從背起栁木灰水調塗之外䑓秘要湯火灼瘡柳皮燒灰塗之亦可以根白皮煎猪脂頻傅之肘後方痔瘡如瓜腫痛如火柳枝煎濃湯洗之艾灸三五壮王及郎中病此驛吏用此方灸之覺熱氣入腸大下血穢至痛一頃遂消馳馬而去本事方柳膠主治惡瘡及結砂子時珍柳寄生見後寓木類柳耳見菜部木耳柳蠧見䖝部檉柳音偵寳宋開釋名赤檉日華赤楊古今注河柳爾雅雨師詩疏垂絲柳綱目人柳綱目三眠柳衍義觀音柳時珍曰按羅願爾雅翼云天之将雨檉先知之起氣以應又負霜雪不凋乃木之聖者也故字從聖又名雨師或曰得雨則垂垂如絲當作兩絲三輔故事云漢武帝苑中有柳状如人號曰人柳一日三起三眠則檉柳之聖又不獨知雨負雪而已今俗稱長夀仙人柳亦曰觀音柳謂觀音用此洒水也宗奭曰今人謂之三春柳以其一年三秀故名集解志曰赤檉木生河西沙地皮赤色細葉禹錫曰爾雅檉河柳也郭璞注云今河旁赤莖小楊也陸璣詩疏云生水旁皮赤如絳枝葉如松時珍曰檉柳小幹弱枝挿之易生赤皮細葉如絲婀娜可愛一年三次作花花穗長三四寸水紅色如蓼花色南齊時益州獻蜀栁條長状若絲縷者即此柳也叚成式酉陽雜爼言凉州有赤白檉大者爲炭其灰汁可以煮銅故沈烔賦云檉似栢而香王禎農書云山柳赤而脆河柳白而明則檉又有白色者也宗奭汴京甚多河西或人取滑枝爲鞭木氣味甘鹹温無毒主治剝驢馬血入肉毒取木片火炙熨之并煮汁浸之開寳枝葉消痞解酒毒利小便時珍附方新三腹中痞積觀音柳煎湯露一夜五更空心飲數次痞自消衛生易簡方一切諸風不問逺近檉葉半斤切枝亦可荆芥半斤水五升煮二升澄清入白蜜五合竹瀝五合新瓶盛之油紙封入重湯煮一伏時每服一小盞日三服普濟方酒多致病長壽仙人柳晒乾爲末毎服一錢温酒調下衛生易簡方檉乳即脂汁主治合質汗藥治金瘡開寶水楊唐本草釋名青楊綱目蒲柳爾雅蒲楊古今注蒲栘音移栘柳古今注雚苻音丸蒲時珍曰楊枝硬而楊起故謂之楊多宜水涘蒲雚之地故有水楊蒲柳雚苻之名集解㳟曰水楊葉圓濶而尖枝條短硬與柳全别柳葉狹長枝條長軟頌曰爾雅楊蒲栁也其枝勁靱可爲箭苛左傳所謂董澤之蒲又謂之雚苻今河北沙地多生之楊柳之類亦多崔豹古今注云白楊葉圓青楊葉長柳葉長而細栘楊葉圓而弱水楊即蒲柳亦曰蒲楊葉似青楊莖可作矢赤楊霜降則葉赤材理亦赤然今人鮮能分别機曰蘇恭說水楊葉圓濶崔豹說蒲楊似青楊青楊葉長似不相類時珍曰按陸璣詩疏云蒲柳有二種一種皮正青一種皮正白可爲矢北土尤多花與柳同枝葉氣味苦平無毒主治久痢赤白搗汁一升服日二大效唐本主癰腫痘毒時珍發明時珍曰水楊根治癰腫故近人用枝葉治痘瘡魏直博愛心鑑云痘瘡數日䧟頂漿滯不行或風寒所阻者宜用水楊枝葉無葉用枝五斤流水一大釡煎湯温浴之如冷添湯良久照見纍起有暈絲者漿行也如不滿冄浴之力弱者只洗頭面手足如屢浴不起者氣血敗矣不可冄浴始出及痒塌者皆不可浴痘不行漿乃氣澁血滯腠理固宻或風寒外阻而然浴令暖氣透逹和暢欝蒸氣血通徹毎隨暖氣而發行漿貫滿功非淺也若内服助氣血藥藉此升之其效更速風寒亦不得而阻之矣直見一嫗在村中用此有騐即得其方行之百發百中慎勿易之誠有爕理之妙也盖黄鍾一動而蟄蟲啟戸東風一吹而堅氷解腹同一春也羣書皆無此法故詳著之木白皮及根氣味同華主治金瘡痛楚乳癰諸腫痘瘡時珍發明時珍曰按李仲南永類鈐方云有人治乳癰持藥一根生擂貼瘡其熱如火冄貼遂平求其方乃水楊柳根也葛洪肘后方治乳癰用柳根則楊與柳性氣不逺可通用也附方新一金瘡苦痛楊木白皮熬燥碾末水服方寸匕仍傅之日三次千金方白楊唐本草釋名獨揺宗奭曰本身似楊㣲白故曰白楊非如粉之白也時珍曰鄭樵通志言白楊一名高飛與栘楊同名今俗通呼栘楊爲白楊且白楊亦因風獨摇故得同名也集解恭曰白楊取葉圓大蒂小無風自動者藏器曰白楊北土極多人種墟墓間樹大皮白其無風自動者乃栘楊非白楊也頌曰今處處有之北土尤多株甚高大葉圓如梨葉皮白色木似楊采無時崔豹古今注云白楊葉圓青楊葉長是也宗奭曰陜西甚多永耀間居人修盖多此木也其根不時碎札入土即生根故易繁植土地所宜爾風纔至葉如大雨聲謂無風自動則無此事但風㣲時其葉孤絶處則徃徃獨揺以其蒂長葉重大勢使然也時珍曰白楊木高大葉圓似梨而肥大有尖面青而光背甚白色有鋸齒木肌細白性堅直用爲梁栱終不撓曲與栘楊乃一類二種也治病之功大抵彷彿嫰葉亦可荒老葉可作酒麹料木皮修治斆曰凡使銅刀刮去粗皮蒸之從已至未以布袋盛掛屋東角待乾用氣味苦寒無毒大明曰酸冷主治毒風脚氣腫四肢緩弱不隨毒氣游易在皮膚中痰癖等酒漬服之唐本去風痺宿血折傷血瀝在骨肉間痛不可忍及皮膚風瘙腫雜五木為湯浸損處藏器治撲損瘀血竝煎酒服煎膏可續筋骨大明煎湯日飲止孕痢煎醋含潄止牙痛煎漿水入塩含潄治口瘡煎水釀酒消癭氣時珍附方舊一新一姙娠下痢白楊皮一斤水一斗煮取二升分三服千金方項下癭氣秫米三斗炊熟取圓葉白楊皮十兩勿令見風􅋀水五升煮取二升漬麹末五兩如常釀酒每旦一盞日冄服崔氏方枝主治消腹痛治吻瘡時珍附方舊二新一口吻爛瘡白楊嫩枝鐵上燒灰和脂傅之外䑓秘要腹満癖堅如石積年不損者必效方用白楊木東枝去粗皮辟風細剉五升熬黄以酒五升淋訖用絹袋盛滓還納酒中宻封冄宿每服一合日三服外䑓秘要面色不白白楊皮十八兩桃花一兩白瓜子仁三兩爲末毎服方寸匕日三服五十日面及手足皆白聖濟總錄葉主治齲齒煎水含潄又治骨疽久發骨從中出頻擣傅之時珍扶栘音夫移拾遺釋名栘楊古今注唐棣爾雅髙飛崔豹獨揺時珍曰栘乃白楊同類故得楊名按爾雅唐棣栘也崔豹曰栘楊江東呼爲夫移圓葉弱蒂微風則大揺故名髙飛又曰獨搖陸璣以唐棣爲郁李者誤矣郁李乃常棣非唐棣也集觧藏器曰扶栘木生江南山谷樹大十數圍無風葉動花反而後合詩云唐棣之華偏其反而是也時珍曰栘楊與白楊是同類二種今南人通呼爲白楊故俚人有白楊葉有風掣無風掣之語其入藥之功大抵相近木皮氣味苦平有小毒主治去風血脚氣疼痺腕損瘀血痛不可忍取白皮火炙酒浸服之和五木皮煮湯捋脚氣殺瘃蟲風瘙燒作灰置酒中令味正經時不敗藏器發明時珍曰白楊栘楊皮並雜五木皮煑湯浸捋損痺諸痛腫所謂五木者桑槐桃楮柳也並去風和血附方新一婦人白崩䃿楊皮半斤牡丹皮四兩升麻牡蠣煆各一兩每用一兩酒二鍾煎一鍾食前服集簡方松楊拾遺校正併入唐本草椋子木釋名椋子木音凉時珍曰其材如松其身如楊故名松楊爾雅云椋即來也其隂可䕃凉故曰椋木藏器曰江西人呼爲凉木松楊縣以此得名集解藏器曰松楊生江南林落間大樹葉如梨志曰椋子木葉似柿兩葉相當子細圓如牛李生青熟黒其木堅重煮汁色赤郭璞云椋材中車輛八月九月采木日乾用木氣味甘鹹平無毒主治折傷破惡血養好血安胎止痛生肉唐本木皮氣味苦平無毒主治水痢不問冷熱濃煎令黒服一升藏器榆俞由二音本經上品釋名零榆本經白者名枌時珍曰按王安石字說云榆瀋俞柔故謂之榆其枌則有分之之道故謂之枌其莢飄零故曰零榆集解别錄曰榆皮生頴川山谷二月采皮取白暴乾八月采實並勿令中濕濕則傷人𢎞景曰此即今之榆樹取皮刮去上赤皮亦可臨時用之性至滑利初生莢仁以作糜羮令人多睡嵇康所謂榆令人瞑也㳟曰榆三月實熟尋即落矣今云八月采實恐誤也藏器曰江東無大榆有刺榆秋實故經云八月采者誤也刺榆皮不滑利頌曰榆處處有之二月生莢古人采仁以爲糜羮今無復食者惟用陳老實作醤耳按爾雅疏云榆類有數十種葉皆相似但皮及木理有異耳刺榆有針刺如柘其葉如榆㵸爲蔬羮滑于白榆即爾雅所謂樞荎詩經所謂山有樞是也白榆先生葉却着莢皮色白二月剝皮刮去粗皵中極滑白即爾雅所謂榆白枌是也荒嵗農人取皮爲粉食之當粮不損人四月采實宗奭曰榆皮初春先生莢者是也嫩時収貯爲羮茹嘉祐中豐沛人缺食多用之時珍曰邢昺爾雅疏云榆有數十種今人不能盡别惟知莢榆白榆刺榆樃榆數者而已莢榆白榆皆大榆也有赤白二種白者名枌其木甚髙大未生葉時枝條間先生榆莢形状似錢而小色白成串俗呼榆錢後方生葉似山茱萸葉而長尖􅕏潤澤嫩葉􅨘浸淘過可食故内則云堇荁枌榆兎藁􅎵瀡以滑之三月采榆錢可作羮亦可収至冬釀酒㵸過晒乾可爲醤即榆仁醤也崔寔月令謂之􅛙䤅音牟偷者是也山榆之莢名蕪荑與此相近但味稍苦耳諸榆性皆扇地故其下五穀不植古人春取榆火今人采其白皮爲榆麪水調和香劑粘滑勝于膠漆承曰榆皮濕搗如糊用粘瓦石極有力汴洛人以石爲碓嘴用此膠之白皮氣味甘平滑利無毒主治大小便不通利水道除邪氣乆服斷穀輕身不饑其實尤良本經療腸胃邪熱氣消腫治小兒頭瘡痂疕别録通經脉搗涎傅癬瘡大明滑胎利五淋治齁喘療不眠甄權生皮擣和三年醋滓封暴患赤腫女人妬乳腫日六七易效孟詵利竅滲濕熱行津液消癰腫時珍發明詵曰高昌人多搗白皮爲末和菜葅食甚美令人能食仙家長服服丹石人亦服之取利闗節故也時珍曰榆皮榆葉性皆滑利下降手足太陽手陽明經藥也故人小便不通五淋腫滿喘嗽不眠經脉胎産諸證宜之本草十劑云滑可去著冬葵子榆白皮之屬盖亦取其利竅滲濕熱消留著有形之物爾氣盛而壅者宜之若胃寒而虚者久服滲利恐洩真氣本經所謂久服輕身不飢蘇頌所謂榆粉多食不損人者恐非確論也附方舊九新九斷穀不饑榆皮檀皮爲末日服數合救荒本草齁喘不止榆白皮隂乾焙爲末毎日旦夜用水五合末二錢煎如膠服食療本草乆𠻳欲死許明則有效方用厚榆皮削如指大長尺餘納喉中頻出入當吐膿血而愈古今錄騐虚勞白濁榆白皮二升水三斗煮取五升分五服千金方小便氣淋榆枝石燕子煎水日服普濟方五淋澀痛榆白皮隂乾焙研毎以二錢水五合煎如膠日二服普濟方渇而尿多非淋也用榆皮二片去黑皮以水一斗煮取五升一服三合日三服外䑓秘要身體暴腫榆皮搗末同米作粥食之小便良僃急方臨月易産榆皮焙爲末臨月日三服方寸匕令産極易别陳承本草說墮胎下血不止榆白皮當歸焙各半兩入生薑水煎服之普濟方胎死腹中或母病欲下胎榆白皮煮汁服二升子母秘錄身首生瘡榆白皮末油和塗之䖝當出子母秘錄火灼爛瘡榆白皮嚼塗之千金髓五色丹毒俗名逰腫犯者多死不可輕視以榆白皮末鷄子白和塗之千金小兒蟲瘡榆皮末和猪脂塗綿上覆之䖝出立瘥千金方癰疽發背榆根白皮切清水洗搗極爛和香油傅之畱頭出氣燥則以苦茶頻潤不粘更換新者将愈以桑葉嚼爛隨大小貼之口合乃止神效救急方小兒瘰癧榆白皮生搗如泥封之頻易必效方小兒秃瘡醋和榆白皮末塗之䖝當出産乳方葉氣味同上主治嫩葉作羹及􅨘食消水腫利小便下石淋壓丹石藏器時珍曰暴乾爲末淡塩水拌或炙或晒乾拌菜食之亦辛滑下水氣煎汁洗酒皶鼻同酸棗仁等分蜜丸日服治膽熱虚勞不眠時珍花主治小兒癎小便不利傷熱别錄莢仁氣味辛平無毒主治作糜羹食令人多睡𢎞景主婦人𢃄下和牛肉作羮食藏器子醤似蕪荑能助肺殺諸蟲下氣令人能食消心腹間惡氣卒心痛塗諸瘡癬以陳者良孟詵榆耳見木耳樃榆拾遺集解藏器曰樃榆生山中状如榆其皮有滑汁秋生莢如大榆時珍曰大榆二月生莢樃榆八月生莢可分别皮氣味甘寒無毒主治下熱淋利水道令人睡藏器治小兒解顱時珍蕪荑别錄中品釋名莁荑爾雅無姑本經􅀢䕋音殿唐木名楩音偏時珍曰按說文云楩山扮榆也有刺實爲蕪荑爾雅云無姑其實荑又云蕪荑蔱􅀢則此物乃莁樹之荑故名也㳟曰􅀢䕋乃蔱􅀢二字之誤集解别錄曰蕪荑生晋山川谷三月采實陰乾𢎞景曰今惟出高麗状如榆莢氣臭如犱彼人皆以作醤食之性殺䖝置物中亦辟蛀但患其臭㳟曰今延州同州者甚好志曰河東河西處處有之頌曰近道亦有之以太原者良大抵榆類而差小其實亦早成此榆乃大氣臭郭璞爾雅注云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑也采實隂乾用今人又多取作屑以芼五味惟陳者良人収藏之多以塩漬則失氣味但宜食品不堪入藥珣曰按廣州記云生大秦國是波斯蕪荑也藏器曰蕪荑氣羶者良乃山榆仁也時珍曰蕪荑有大小兩種小者即榆莢也揉取仁醖爲醤味尤辛人多以外物相和不可不擇去之入藥皆用大蕪荑别有種氣味辛平無毒權曰苦平珣曰辛温詵曰作醤甚香美功尤勝于榆仁可少食之過多發熱爲辛故也秋月食之尤宜人主治五内邪氣散皮膚骨節中滛滛温行毒去三蟲化食本經逐寸白散腸中嗢嗢喘息别録主積冷氣心腹癥痛除䏎膚節中風滛滛如蟲行蜀本五臟皮膚肢節邪氣長食治五痔殺中惡蟲毒諸病不生孟詵治腸風痔瘻惡瘡疥癬大明殺蟲止痛治婦人子宫風虚孩子疳瀉冷痢得訶子豆蔲良李珣和豬脂擣塗熱瘡和蜜治濕癬和沙牛酪或馬酪治一切瘡張鼎附方舊三新七脾胃有蟲食即作痛面黄無色以石州蕪荑仁二兩和麪炒黄色爲末非時米飲服二錢匕千金方制殺諸蟲生蕪荑生㯽榔各四兩爲末蒸餅丸梧子大每服二十丸白湯下本事方疳熱有蟲痩悴久服充肥用榆仁一兩黄連一兩爲末猪胆汁七枚和入盌内飯上蒸之一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸綠豆大毎服五七丸至一二十九米飲下直錢氏小兒訣小兒蟲癎胃寒䖝上諸證危惡與癎相似用白蕪荑乾漆燒存性等分爲末米飲調服一字至一錢杜壬方結隂下血蕪荑一兩搗爛紙壓去油爲末以雄猪膽汁丸梧子大每服九丸甘草湯下日五服三日斷根普濟方脾胃氣泄久患不止蕪荑五兩搗末飯丸梧子大每日空心午飯前陳米飲下三十丸久服去三尸益神駐顔此方得之章鐐曽用得力續王紹顔傳信方膀胱氣急宜下氣用蕪荑搗和食塩末等分以綿褁如棗大納下部或下惡汁並下氣佳外䑓秘要嬰孩驚瘖風後失瘖不能言肥兒丸用蕪荑炒神麴炒麥蘖炒黄連炒各一錢爲末猪膽汁打糊丸黍米大每服十丸木通湯下黄連能去心竅惡血全㓜心鑑蟲牙作痛以蕪荑仁安蛀孔中及縫中甚效危氏得效方腹中鼈瘕平時嗜酒血入于酒則爲酒鼈平時多氣血凝于氣則爲氣鼈虚勞痼冷敗血雜痰則爲血鼈搖頭掉尾如䖝之行上侵人咽下蝕人肛或附脇背或隠胸腹大則如鼈小或如錢治法惟用蕪荑炒煎服之兼用暖胃益血理中之類乃可殺之若徒事雷丸錫灰之類無益也見仁齋直指方蘇方木唐本草釋名蘇木時珍曰海島有蘇方木其地産此木故名今人省呼爲蘇木耳集解恭曰蘇方木自南海崑崙來而交州愛州亦有之樹似菴羅葉苦榆葉而無澀抽條長丈許花黄子青熟黒其木人用染絳色珣曰按徐表南州記云生海畔葉似絳木若女貞時珍曰按嵇含南方草木状云蘓方樹類槐黄花黒子出九真煎汁忌鉄器則色黯其木蠧之糞名曰紫納亦可用暹羅國人賤用如薪修治斆曰凡使去上粗皮并節若得中心文横如紫角者號曰木中尊其力倍常百等須細剉重搗拌細梅樹枝蒸之從巳至申隂乾用氣味甘鹹平無毒杲曰甘鹹凉可升可降陽中隂也好古曰味甘而微酸辛其性平主治破血産後血脹悶欲死者水煮五両取濃汁服唐本婦人血氣心腹痛月候不調及蓐勞排濃止痛消癰腫撲損淤血女人失音血噤赤白痢幷後分急痛大明虚勞血癖氣壅滯産後惡露不安心腹攪痛及經絡不通男女中風口噤不語並宜細研乳頭香末方寸匕以酒煎蘇方木調服立吐惡物瘥海藥霍亂嘔逆及人常嘔吐用水煎服藏器破瘡瘍死血産後敗血李呆發明元素曰蘓木性凉味微辛發散表裏風氣宜與防風同用又能破死血産後血腫脹滿欲死者宜之時珍曰蘓方木乃三隂經血分藥少用則和血多用則破血附方舊一新五産後血運蘓方木三兩水五升煎取二升分服産後氣喘面黒欲死乃血入肺也用蘓木二兩水兩碗煮一碗入人參末一兩服隨時加減神效不可言耳胡氏方破傷風病蘓方木爲散三錢酒服立效名獨聖散普濟方脚氣腫痛蘓方木鷺鷥藤等分細剉入定粉少許水二斗煎一斗五升先熏後洗普濟方偏墜腫痛蘓方木二兩好酒一壺煮熟頻飲立好集簡方金瘡接指凡指斷及刀斧傷用真蘓木末傅之外以蠶繭包縛完固數日如故攝生方烏木綱目釋名烏樠木樠音漫烏文木時珍曰本名文木南人呼文如樠故也集解時珍曰烏木生海南雲南南畨葉似㯶櫚其木漆黒體重堅緻可爲筋及器物有間道者嫩木也南人多以檕木染色僞之南方草物状云文木樹高七八尺其色正黒如水牛角作馬鞭日南有之古今注云烏文木出波斯舶上将來烏文闗然温括婺等州亦出之皆此物也氣味甘鹹平無毒主治解毒又主霍亂吐利取屑研末温酒服時珍樺木宋開寳釋名􅀈藏器曰晉中書令王珉傷寒身騐方中作􅀈字時珍曰畵工以皮燒烟熏紙作古畵字故名􅀈俗省作樺字也集解藏器曰樺木似山桃皮堪爲燭宗奭曰皮上有紫黒花勻者褁鞍弓鐙時珍曰樺木生遼東及臨洮河州西北諸地其木色黄有小斑㸃紅色能収肥膩其皮厚而輕虚軟柔皮匠家用襯鞾裏及爲刀靶之類謂之暖皮胡人尤重之以皮卷蠟可作燭㸃木皮氣味苦平無毒主治諸黄疸濃煮汁飲之良開寶煮汁冷飲主傷寒時行熱毒瘡特良即今豌豆瘡也藏器燒灰合他藥治肺風毒宗奭治乳癰時珍附方舊一新四乳癰初發腫痛結硬欲破一服即瘥以北來真樺皮燒存性研無灰酒温服方寸匕即卧覺即瘥也沈存中靈苑方乳癰腐爛靴内年久樺皮燒灰酒服一錢日一服經唐瑤騐肺風毒瘡遍身瘡疥如癘及病丙穩禾疹瘙痒面上風刺婦人粉刺並用樺皮散主之樺皮燒灰四兩枳殻去穰燒四兩荆芥穗二兩炙廿草半兩各爲末杏仁水煮過去皮尖二兩研泥爛研匀每服二錢食後温酒調下瘡疥甚者日三服和劑方小便熱短樺皮濃煮汁飲集簡方染黒鬚髮􅀈皮一片包側栢一枝燒烟熏香油盌内成烟以手抺在鬚鬂上即黒也多能鄙事脂主治燒之辟鬼邪藏器綟木拾遺釋名集解藏器曰生林澤山谷木文側戾故曰綟木氣味甘温無毒主治風血羸痩補腰脚益陽道宜浸酒飲藏器櫚木拾遺集解藏器曰出安南及南海用作床几似紫檀而色赤性堅好時珍曰木性堅紫紅色亦有花紋者謂之花櫚木可作器皿扇骨諸物俗作花梨誤矣氣味辛温無毒主治産後惡露衝心癥瘕結氣赤白漏下竝剉煎服李珣破血塊冷𠻳煮汁熱服爲枕令人頭痛性熱故也藏器㯶櫚宋嘉祐釋名栟櫚時珍曰皮中毛縷如馬之騣凶鬯匕䰕故名㯶俗作棕䰕音閭鬛也栟音并集解頌曰㯶櫚出嶺南西川今江南亦有之木高一二丈無枝條葉大而圓有如車輪萃于樹杪其下有皮重疊褁之毎皮一匝爲一節二旬一采皮轉復生上六七月生黄白花八九月結實作房如魚子黒色九月十月采其皮用山海經云石翠之山其木多㯶是也藏器曰其皮作繩入水千嵗不爛昔有人開塜得一索已生根嶺南有桄榔㯽榔椰子冬葉虎散多羅等木葉皆與栟櫚相類時珍曰㯶櫚廣川甚多令江南亦種之最難長初生葉如白及葉高二三尺則木端數葉大如扇上聳四散岐裂其莖三稜四時不凋其幹正直無枝近葉處有皮褁之毎長一層即爲一節幹身赤黒皆筋絡宜爲鐘杵亦可旋爲器物其皮有絲毛錯縱如織剝取縷解可織衣帽褥椅之属大爲時利每嵗必兩三剝之否則樹死或不長也三月于木端莖中出數黄苞苞中有細子成列乃花之孕也状如魚腹孕子謂之㯶魚亦曰㯶笋漸長出苞則成花穗黄白色結實纍纍大如豆生黄熟黒甚堅實或云南方此木有兩種一種有皮絲可作繩一種小而無絲惟葉可作帚鄭樵通志以爲王篲者非也王篲乃落帚之名即地膚子别有蒲葵葉與此相似而柔薄可爲扇笠許慎說文以爲㯶櫚亦誤矣筍及子花氣味苦濇平無毒藏器曰有小毒㦸人喉未可輕服珣曰温有大毒不堪食時珍曰㯶筍皆言有毒不可食而廣蜀人蜜煮醋浸以供佛寄逺蘇東坡亦有食㯶笋詩乃制去其毒爾主治澀腸止瀉痢腸風崩中帶下及養血藏器附方新一大腸下血㯶筍煑熟切片晒乾爲末蜜湯或酒服一二錢集簡方皮氣味同子主治止鼻衂吐血破癥治腸風赤白痢崩中帶下燒存性用大明主金瘡疥癬生肌止血李珣發明宗奭曰㯶皮燒黒治婦人血露及吐血須佐以他藥時珍曰㯶灰性澀若失血去多淤滯已盡者用之切當所謂澀可去脫也與亂髮同用更良年久敗㯶入藥尤妙附方新六鼻血不止㯶櫚灰隨左右吹之黎居士方血崩不止㯶櫚皮燒存性空心淡酒服三錢一方加煅白礬等分婦人良方血淋不止㯶櫚皮半燒半炒爲末每服二錢甚效衛生家寳方下血不止㯶櫚皮半斤栝樓一箇燒灰毎服二錢米飲調下百一選方水穀痢下㯶櫚皮燒研水服方寸匕近效方小便不通㯶皮毛燒存性以水酒服二錢即通利累試甚驗攝生方橉木橉良刅切拾遺釋名橝木音潭集解藏器曰橉木生江南深山大樹樹有數種取葉厚大白花者入藥白餘灰入染家用時珍曰此木最硬梓人謂之橉筋木是也木入染絳用葉亦可釀酒木灰氣味甘温小毒主治卒心腹癥瘕堅満痃癖淋汁八升釀米一斗待酒熟每温飲半合漸增至一二盞即愈藏器後出肘柯樹拾遺釋名集解木奴珣曰按廣志云生廣南山谷波斯家用木爲船舫者也白皮氣味辛平有小毒主治大腹水病采皮煮汁去滓煎令可丸如梧子大平旦空心飲下三丸須臾又一丸氣水竝從小便出也藏器烏臼木唐本草釋名鵶臼時珍曰烏臼烏喜食其子因以名之陸龜䝉詩云行歇毎依鵶臼影桃頻時見鼠姑心是矣鼠姑牡丹也或云其木老則根下黒爛成臼故得此名鄭樵通志言烏臼即拒栁者非集解恭曰生山南平澤樹高數仞葉似梨杏五月開細花黄白色子黒色藏器曰葉可染皂子可壓油然燈極明宗奭曰葉如小杏葉但微薄而綠色差淡子八九月熟初青後黒分爲三瓣時珍曰南方平澤甚多今江西人種植采子蒸煮取脂澆燭貨之子上皮脂勝于仁也根白皮氣味苦微温有毒大明曰性凉慢火炙乾黄乃用主治暴水癥結積聚唐本療頭風通大小便大明解蛇毒震亨發明時珍曰烏臼根性沉而降隂中之隂利水通腸功勝大㦸一野人病腫滿氣壮令掘此根搗爛水煎服一盌連行數行而病平氣虚人不可用之此方出太平聖惠方言其功神聖但不可多服爾誠然附方舊一新九小便不通烏臼根皮煎湯飲之肘后方大便不通烏臼木根方長一寸劈破水煎半盞服之立通不用多喫其功神聖兼能取水斗門方二便關格二三日則殺人烏臼東南根白皮乾爲末熱水服二錢先以芒硝二兩煎湯服取吐甚效肘後方水氣虚腫小便澀烏臼皮㯽榔木通一兩爲末毎服二錢米飲下聖惠方脚氣濕瘡極痒有蟲烏臼根為末傅之少時有涎出良摘𤣥方尸注中惡心腹痛刺沉黙錯亂用烏臼根皮煎濃汁一合調硃砂末一錢服之肘後方無硃砂永類方暗疔昬狂瘡頭凸紅桕樹根經行路者取二尺許去皮搗爛井華水調一盞服待㵼過以三角銀杏仁浸油搗合患處聖濟總録嬰兒胎瘡滿頭用水邉烏臼樹根晒研入雄黄末少許生油調搽經騐良方䑕莽砒毒烏臼根半兩擂水服之醫方大成塩齁痰喘桕樹皮去粗搗汁和飛麪作餅烙熟早晨與兒喫三四箇待吐下塩涎乃佳如不行熱茶催之摘𤣥方葉氣味同根主治食牛馬六畜肉生疔腫欲死者搗自然汁一二盌頓服得大利去毒即愈未利再服冬用根時珍桕油氣味甘凉無毒主治塗頭變白為黑服一合令人下利去隂下水氣炒子作湯亦可藏器塗一切腫毒瘡疥時珍附方新二膿泡疥瘡桕油二兩水銀二錢樟腦五錢同研頻入唾津不見星乃止以温湯洗净瘡以藥填入唐瑶經騐方小兒蟲瘡用舊絹作衣化桕油塗之與兒穿着次日蟲皆出油上取下爁之有聲是也别以油衣與穿以蟲盡爲度效瀕海集簡方巴豆本經下品釋名巴菽本經剛子炮炙老陽子時珍曰此物出巴蜀而形如菽豆故以名之宋本草一名巴椒乃菽字傳訛也雷斆炮炙論又分𦂳小色黄者爲巴有三稜色黒者爲豆小而兩頭尖者爲剛子云巴與豆可用剛子不可用殺人其說殊乖益𦂳小者是雌冇稜及兩頭尖者是雄雄者峻利雌者稍緩也用之得宜皆有功力用之失宜參术亦能爲害况巴豆乎集解别錄曰巴豆生巴郡川谷八月采陰乾用之去心皮頌曰今嘉州眉州戎州皆有之木高一二丈葉如櫻桃而厚大初生青色後漸黄赤至十二月葉漸稠二月復漸生四月舊葉落盡新葉齊生即花發成穗㣲黄色五六月結實作房生青至八月熟而黄類白豆蔲漸漸自落乃収之一房有二瓣一瓣一子或三子子仍有殻用之去殻戎州出者殻上有縱文隠起如線一道至兩三道彼土人呼爲金線巴豆最爲上等他處亦稀有時珍曰巴豆房似大風子殻而脆薄子及仁皆似海松子所云似白豆蔲者殊不類修治𢎞景曰巴豆最能㵼人新者佳用之去皮心熬令黄黑搗如膏乃和丸散斆曰凡用巴與豆敲碎以麻油并酒等煮乾研膏用每一兩用油酒各七合大明曰凡入丸散炒用不如去心膜換水煮五度各一沸也時珍曰巴豆有用仁者用殻者用油者有生用者麩炒者醋煮者燒存性者有研爛以紙包壓去油者謂之巴豆霜氣味辛温有毒别録曰生温熟寒有大毒普曰神農岐伯桐君辛有毒黄帝甘有毒李當之熱元素曰性熱味苦氣薄味厚體重而沉降隂也杲曰性熱味辛有大毒浮也陽中陽也時珍曰巴豆氣熱味辛生猛熟緩能吐能下能止能行是可升可降藥也别錄言其熟則性寒張氏言其降李氏言其浮皆泥于一偏矣盖此物不去膜則傷胃不去心則作嘔以沉香水浸則能升能降與大黄同用㵼人反緩爲其性相畏也王充論衡云萬物合太陽火氣而生者皆有毒故巴豆辛熱有毒之才曰芫花爲之使畏大黄黄連蘆笋菰笋藜蘆醤䜴冷水得火良惡蘘草與牽牛相反中其毒者用冷水黄連汁大豆汁解之主治傷寒温瘧寒熱破癥瘕結聚堅積留飲痰癖大腹蕩練五臟六腑開通閉塞利水穀道去惡肉除鬼毒蟲疰邪物殺蟲魚本經療女子月閉爛胎金瘡膿血不利丈夫殺斑蝥蛇虺毒可練餌之益血脉令人色好變化與鬼神通别錄治十種水腫痿痺落胎藥性通宣一切病泄壅滯除風補勞健脾開胄消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩丁腫日華導氣消積去臟腑停寒治生冷硬物所傷元素治瀉痢驚癎心腹痛疝氣風蝸耳聾喉痺牙痛通利開竅時珍發明元素曰巴豆乃斬闗奪門之将不可輕用震亨曰巴豆去胃中寒積無寒積者勿用元素曰世以巴豆熱藥治酒病膈氣以其辛熱能開腸胃欝結也但欝結雖開而亡血液損其真隂從正曰傷寒風溼小兒瘡痘婦人産後用之下膈不死亦危奈何庸人畏大黄而不畏巴豆以其性熱而劑小耳豈知以蠟匱之猶能下後使人津液枯竭胷熱口燥耗却天真留毒不去他病轉生故下藥官以爲禁藏器曰巴豆主癥癖痃氣痞滿積聚冷氣血塊宿食不消痰飲吐水取青黒大者每日空腹服一枚去殻勿令白膜破乃作兩片并四邉不得有損缺吞之以飲壓令下少頃腹内熱如火利出惡物雖利而不虚若久服亦不利人白膜破者不用好古曰若急治爲水穀道路之劑去皮心膜油生用若緩治爲消堅磨積之劑炒去烟令紫黒用可以通腸可以止㵼世所不知也張仲景治百病客忤備急丸用之時珍曰巴豆峻用則有戡亂刼病之功㣲用亦有撫緩調中之妙譬之蕭曹絳灌乃勇猛武夫而用之爲相亦能輔治太平王海藏言其可以通腸可以止㵼此發千古之秘也一老婦年六十飲病溏泄已五年肉食油物生冷犯之即作痛服調脾升提止澀諸藥入腹則泄反甚延余診之脉沉而滑此乃脾胃久傷冷積凝滯所致王太僕所謂大寒凝内久利溏泄愈而復發綿歴歳年者法當以熱下之則寒去利止遂用蠟匱巴豆丸藥五十丸與服二日大便不通亦不利其泄遂愈自是毎用治泄痢積滯諸病皆不㵼而病瘉者近百人妙在配合得宜藥病相對耳茍用所不當用則犯輕用損隂之戒矣正誤𢎞景曰道家亦有煉餌法服之云可神仙人吞一枚便死而䑕食之三年重三十斤物性乃有相耐如此時珍曰漢時方士言巴豆錬餌令人色好神仙名醫别錄采入本草張華博物志言䑕食巴豆重三十斤一謬一誣陶氏信爲實語誤矣又言人吞一枚即死亦近過情今並正之附方舊十三新二十六一切積滯巴豆一兩蛤粉二兩黄蘗三兩爲末水丸緑豆大毎水下五丸醫學切問寒澼宿食不消大便閉塞巴豆仁一升清酒五升煮三日三夜研熟合酒微火煎令可丸如豌豆大每服一丸水下欲吐者二丸千金方水蟲大腹動揺水聲皮膚色黒巴豆九十枚去心皮熬黄杏仁六十枚去皮尖熬黄擣九小豆大水下一丸以利爲度勿飲酒備張文仲急方飛尸鬼擊中惡心痛腹脹大便不通走馬湯用巴豆二枚去皮心熬黄杏仁二枚以綿包椎碎熱湯一合捻取白汁服之當下而瘉量老小用之外䑓食瘧積瘧巴豆去皮心二錢皂莢去皮子六錢搗丸綠豆大一服一丸冷湯下肘后方積滯泄痢腹痛裏急杏仁去皮尖巴豆去皮心各四十九箇同燒存性研泥溶蠟和丸綠豆大毎服二三丸煎大黄湯下間日一服一加百草霜三錢劉守真宣明方氣痢赤白巴豆一兩去皮心熬研以熟猪肝丸綠豆大空心米飲下三四丸量人用此乃鄭獬侍御所𫝊方也經騐方瀉血不止巴豆一箇去皮以雞子開一孔納入紙封煨熟去豆食之其病即止虚人分作二服決效普濟方小兒下痢赤白用巴豆煨熟去油一錢百草霜二錢研末飛羅麪煮糊丸黍米大量人用之赤用甘草湯白用米湯赤白用薑湯下全㓜心鑑夏月水瀉不止巴豆一粒針頭燒存性化蠟和作一丸倒流水下效危氏得方小兒吐瀉巴豆一箇針穿燈上燒過黄蠟一豆大燈上燒滴入水中同杵丸黍米大毎用五七丸蓮子燈心湯下同上伏暑霍亂傷冷吐利煩濕水浸丹用巴豆二十五箇去皮心及油黄丹炒研一兩二錢半化黄蠟和丸綠豆大毎服五七丸水浸少頃别以新汲水吞下和劑方乾霍亂病心腹脹痛不吐不利欲死巴豆一枚去皮心熱水研服得吐利即定也二便不通巴豆連油連黄各半兩搗作餅子先滴葱塩汁在臍内安餅子上灸二七壮取利爲度家楊氏藏寒痰氣喘青橘皮一片展開入剛子一箇麻紥定火上燒存性研末薑汁和酒一鍾呷服天台李翰林用此治莫秀才到口便止神方也張杲醫說風濕痰病人坐宻室中左用滚水一盆右用炭火一盆前置一桌書一册先将無油新巴豆四十九粒研如泥紙壓去油分作三餅如病在左令病人将右手仰置書上安藥于掌心以盌安藥上傾熱水入盌内水凉即換良久汗出立見神效病在右安左掌心一云隨左右安之保壽堂經騐方隂毒傷寒心結按之極痛大小便閉但出氣稍暖者急取巴豆十粒研入麪一錢捻作餅安臍内以小艾炷灸五壮氣逹即通此太師陳北山方也方仁齋直指解中毒藥巴豆去皮不去油馬牙硝等分研丸冷水服一彈丸廣利方喉痺垂死止有餘氣者巴豆去皮線穿内入喉中牽出即甦千金纒喉風痺巴豆兩粒紙卷作角切斷兩頭以針穿孔内入喉中氣透即通勝金方傷寒舌出巴豆一粒去油取霜以紙撚卷内入鼻中舌即収上普濟方舌上出血如箸孔巴豆一枚亂髪鷄子大燒研酒服聖惠中風口喎巴豆七枚去皮研左喎塗右手心右喎塗左手心仍以暖水一盞安藥上須臾即正洗去聖惠方小兒口瘡不能食乳剛子一枚連油研入黄丹少許剃去𩕄上髮貼之四邉起粟泡便用温水洗去乃以菖蒲湯冄洗即不成瘡神效瑞竹堂方風蟲牙痛聖惠用巴豆一粒煨黄去殻蒜一瓣切一頭剜去中心入豆在内盖定綿褁隨左右塞耳中經騐方用巴豆一粒研綿褁咬之三乂方針刺巴豆燈上燒令烟出熏痛處五次神效天絲入咽凡露地飲食有飛絲入上食之令人咽喉生瘡急以白礬巴豆燒灰吹入即愈𤨏碎錄耳卒聾閉巴豆一粒紙裹針刺孔通氣塞之取效經騐風瘙隠疹心下迷悶巴豆五十粒去皮水七升煮二升以帛染拭之隨手瘉千金翼疥瘡搔痒巴豆十粒炮黄去皮心右順手研入酥少許膩粉少許抓破㸃上不得近目并外腎上如熏目著腎則以黄丹塗之甚妙千金方荷錢癬瘡巴豆仁三箇連油杵泥以生絹包擦日一二次三日痊好碑以正經騐方一切惡瘡巴豆三十粒麻油煎黒去豆以油調硫黄輕粉末頻塗取效普濟癰疽惡肉烏金膏解一切瘡毒及腐化瘀肉最能推陳致新巴豆仁炒焦研膏㸃痛處則解毒塗瘀肉上則自化加乳香少許亦可若毒深不能収歛者宜作撚紝之不致成痛外科精義疣痣黑子巴豆一錢石灰炒過人言一錢糯米五分炒研㸃之怪症方箭鏃入肉不可㧞出者用新巴豆仁畧熬與蜣蜋同研塗之斯須痛定微痒忍之待極痒不可忍便撼㧞動之取出速以生肌膏傅之而痊亦治瘡腫夏侯鄲在潤州得此方後至洪州旅舍主人妻病背瘡呻吟不已鄲用此方試之即痛止也經騐方小兒痰喘巴豆一粒杵爛綿褁塞鼻男左女右痰即自下龔氏醫鑑牛疫動頭巴豆二粒生麻油三兩漿水半升和灌之賈相公牛經油主治中風痰厥氣厥中惡喉痺一切急病咽喉不通牙關𦂳閉以研爛巴豆綿紙包壓取油作撚㸃燈吹滅熏鼻中或用熱烟刺入喉内即時出涎或惡血便甦又舌上無故出血以熏舌之上下自止時珍殻主治消積滯治瀉痢時珍附方新二一切瀉痢脉浮洪者多日難已脉微小者服之立止名勝金膏巴豆皮楮葉同燒存性研化蠟丸綠豆大毎甘草湯下五丸劉河間宣明方痢頻脱肛黒色堅硬用巴豆殻燒灰芭蕉自然汁煮入朴硝少許洗軟用真麻油㸃火滴于上以枯礬龍骨少許爲末摻肛頭上以芭蕉葉托入方危氏得效樹根主治癰疽發背腦疽鬢疽大患掘取洗擣敷患處留頭妙不可言収根隂乾臨時水搗亦可時珍誠出楊經騐方大風子補遺釋名時珍曰能治大風疾故名集解時珍曰大風子今海南諸蕃國皆有之按周逹觀真臘記云大風乃大樹之子状如椰子而圓其中有核數十枚大如雷丸子中有仁白色久則黄而油不堪入藥仁修治時珍曰取大風子油法用子三斤去殻及黄油者研極爛瓷器盛之封口入滚湯中葢鍋宻封勿令透氣文武火煎至黒色如膏名大風油可以和藥氣味辛熱有毒主治風癬疥癩楊梅諸瘡攻毒殺蟲時珍發明震亨曰粗工治大風病佐以大風油殊不知此物性熱有燥痰之功而傷血至有病将愈而先失明者時珍曰大風油治瘡有殺蟲刼毒之功盖不可多服用之外塗其功不可没也附方新五大風諸癩大風子油一兩苦參末三兩入少酒糊丸梧子大每服五十丸空心温酒下仍以苦參湯洗之普濟方大風瘡裂大風子燒存性和麻油輕粉研塗仍以殻煎湯洗之生嶺南衛方楊梅惡瘡方同上風刺赤鼻大風子仁木鼈子仁輕粉硫黄爲末夜夜唾調塗之手背皴裂大風子搗泥塗之壽域海紅豆海藥釋名集解珣曰按徐表南州記云生南海人家園圃中大樹而生葉圓有莢近時蜀中種之亦成時珍曰樹高二三丈葉似梨葉而圓按宋祁益部方物圖云紅豆葉如冬青而圓澤春開花白色結莢枝間其子累累而綴珠若大紅豆而扁皮紅肉白以似得名蜀人用爲果飣豆氣味微寒有小毒主治人黑皮䵟􅍍花癬頭面遊風宜入面藥及澡豆李珣相思子綱目釋名紅豆時珍曰按古今詩話云相思子圓而紅故老言昔有人歿于邉其妻思之哭于樹下而卒因以名之此與韓憑塜上相思樹不同彼乃連理梓木也或云即海紅豆之類未審的否集解時珍曰相思子生嶺南樹髙丈餘白色其葉似槐其花似皂莢其莢似扁豆其子大如小豆半截紅色半截黒色彼人以嵌首飾叚公路北戸錄言有蔓生用子収龍腦香相宜令香不耗也氣味苦平有小毒吐人主治通九竅去心腹邪氣止熱悶頭痛風痰瘴瘧殺腹臟及皮膚内一切蟲除蠱毒取二七枚研服即當吐出時珍附方新三瘴瘧寒熱相思子十四枚水研服取吐立瘥千金貓鬼野道眼見貓鬼及耳有所聞用相思子蓖麻子巴豆各一枚硃砂末蠟各四銖合搗丸如麻子大服之即以灰圍患人面前着一斗灰火吐藥入火中沸即畫十字于火上其貓鬼者死也千金方解中蠱毒必效方用未鑚相思子十四枚杵碎爲末温水半盞和服欲吐抑之勿吐少頃當大吐非常輕者但服七枚神效要外臺秘猪腰子綱目集觧時珍曰豬腰子生柳州蔓生結莢内子大若豬之内腎状酷似之長三四寸色紫而肉堅彼人以充土宜饋送中土氣味甘微辛無毒主治一切瘡毒及毒箭傷研細酒服一二錢并塗之時珍石瓜綱目集觧時珍曰石𤓰出四川峨眉山中及芒部地方其樹脩幹樹端挺葉肥滑如冬青状佀桑其花淺黄色結實如綴長而不圓壳裂則子見其形似瓜其堅如石者液黄色氣味苦平無毒主治心痛煎汁洗風痺時珍本草綱目卷三十五下
