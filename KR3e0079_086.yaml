body:
  text: 本草綱目卷三十五下明李時珍撰木之二喬木類三十四種內附一種秦皮本經中品校正併入拾遺樳木釋名梣皮音岑樳木音尋石檀别録樊槻𢎞景盆桂日華苦樹蘇恭苦櫪時珍曰秦皮本作梣皮其木小而岑髙故因以為名人訛為樳木又訛而為秦木或云本出秦地故得秦名也高誘注淮南子云梣苦櫪木也恭曰樹葉似檀故名石檀俗因味苦呼為苦樹集解别録曰秦皮生廬江川谷及寃句水邉二月八月采皮隂乾𢎞景曰俗云是樊槻皮而水漬以和墨書色不脫微青恭曰此樹似檀葉細皮有白點而不粗錯取皮漬水便碧色書紙看之皆青色者是真頌曰今陜西川郡及河陽亦有之其木大都似檀枝幹皆青緑色葉如匙頭虛大而不光並無花實根似槐根俗呼為白樳木皮氣味苦微寒無毒别録曰大寒普曰神農雷公黃帝岐伯酸無毒李當之小寒權曰平惡苦瓠防葵之才曰惡吳茱萸大戟為之使主治風寒濕脾洗洗寒氣除熱目中青翳白膜久服頭不白輕身本經療男子少精婦人帶下小兒癎身熱可作洗目湯久服皮膚光澤肥大有子别録明目去目中久熱兩目赤腫疼痛風淚不止作湯浴小兒身熱煎水澄清洗赤目極效甄權主熱痢下重下焦虛好古同葉煮湯洗蛇咬并研末傳之藏器發明𢎞景曰秦皮俗方惟以療目道家亦有用處大明曰秦皮之功洗肝益精眀目退熱元素曰秦皮沉也陰也其用有四治風寒濕邪成痺青白幻翳遮睛女子崩中帶下小兒風熱驚癎好古曰痢則下焦虛故張仲景白頭翁湯以黃蘗黃連秦皮同用皆苦以堅之也秦皮浸水青藍色與紫草同用治目病以增光暈尤佳時珍曰梣皮色青氣寒味苦性澀乃是厥陰肝少陽膽經藥也故治目病驚癎取其平木也治下痢崩帶取其收澀也又能治男子少精益精有子皆取其澀而補也故老子云天道貴澀此藥乃服食及驚癎崩痢所宜而人止知其治目一節幾於廢棄良為可惋淮南子云梣皮色青治目之要藥也又萬畢術云梣皮止水謂其能收淚也高誘解作致水言能使水沸者謬也附方舊三新三赤眼生翳秦皮一兩水一升半煮七合澄清日日溫洗一方加滑石黃連等分祕外臺眼暴腫痛秦皮黃連各一兩苦竹葉半升水二升半煮取八合食後溫服此乃謝道人方也外臺祕要赤眼睛瘡秦皮一兩清水一升白碗中浸春夏一食頃以上看碧色出即以筋頭纒綿仰卧點令滿眼微痛勿畏良久瀝取熱汁日點十度以上不過兩日瘥也外臺祕要眼弦挑針乃肝脾積熱銼秦皮夾沙糖水煎調大黃末一錢微利佳仁齋直指方血痢連年秦皮鼠尾草薔薇根等分以水煎取汁銅器重釡煎成丸如梧子大每服五六丸日二服稍增以止為度亦可煎飲千金方天蛇毒瘡似癩非癩天蛇乃草間花蜘蛛也人被其螫為露水所濡乃成此疾以秦皮煮汁一斗飲之即瘥寇宗奭本草合歡本經中品釋名合昏唐本夜合日華青裳圖經萌葛綱目鳥賴樹頌曰崔豹古今注云欲蠲人之忿則贈以青裳青裳合歡也植之庭除使人不忿故嵇康養生論云合歡蠲忿萱草忘憂藏器曰其葉至暮即合故云合昏時珍曰按王璆百一選方云夜合俗名萌葛越人謂之烏賴樹又金光明經謂之尸利灑樹集解本經曰合歡生豫州山谷樹如狗骨樹别録曰生益州山谷𢎞景曰俗間少識當以其非療病之功也恭曰此樹葉似皂莢及槐極細五月花發紅白色上有絲茸秋實作莢子極薄細所在山谷有之今東西京第宅山池間亦有種者名曰合昏頌曰今汴洛間皆有之人家多植於庭除間本似梧桐枝甚柔弱葉似皂角極細而繁密互相交結每一風來輒白相解了不相牽綴采皮及葉用不拘時月宗奭曰合歡花其色如今之醮暈緑上半白下半肉紅散垂如絲為花之異其緑葉至夜則合也嫩時煠熟水淘亦可食木皮去粗皮炒用氣味甘平無毒主治安五臟和心志令人歡樂無憂久服輕身眀目得所欲本經煎膏消癰腫續筋骨大明殺蟲搗末和鐺下墨生油調塗蜘蛛咬瘡用葉洗衣垢藏器折傷疼痛研末酒服二錢匕宗奭和血消腫止痛時珍發明震亨曰合歡屬土補陰之功甚捷長肌肉續筋骨概可見矣與白蠟同入膏用神效而外科家末曾録用何也附方舊二新三肺癰唾濁心胸煩錯取夜合皮一掌大水三升煮取一半分二服韋宙獨行方撲損折骨夜合樹皮即合歡皮去粗皮炒黑色四兩芥菜子炒一兩為末每服二錢溫酒卧時服以滓傅之接骨甚妙王璆百一選方髮落不生合歡木灰二合墻衣五合鐵精一合水萍末二合研勻生油調塗一夜一次普濟方小兒撮口夜合花枝濃煮汁拭口中并洗之録子母祕中風攣縮夜合枝酒夜合枝柏枝槐枝桑枝石榴枝各五兩並生銼糯米五升黑豆五升羌活二兩防風五錢細麯七斤半先以水五斗煎五枝取二斗五升浸米豆蒸熟入麵與防風羌活如常釀酒法封三七日壓汁每飲五合勿過醉致吐常令有酒氣也竒效良方皂莢本經中品釋名皂角綱日雞栖子綱目烏犀綱目懸刀時珍曰莢之樹皂故名廣志謂之雞栖子曾氏方謂之烏犀外丹本草謂之懸刀集解别録曰皂莢生雍州山谷及魯鄒縣如豬牙者良九月十月采莢陰乾𢎞景曰處處有之長尺二者良俗人見其有蟲孔而未嘗有蟲形皆言不可近令人惡病殊不爾也其蟲狀如草葉上青蟲微黑便出所以難見恭曰此物有三種豬牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其尺二者粗大長虛而無潤若長六七寸圓厚節促直者皮薄多肉味濃大好頌曰所在有之以懷孟者為勝木極有髙大者本經用如豬牙者陶用尺二者蘇用六寸圓厚者今醫家作疏風氣丸煎多用長皂莢治齒及取積藥多用牙皂莢所用雖殊性味不甚相逺其初生嫩芽以為蔬茹更益人時珍曰皂樹髙大葉如槐葉瘦長而尖枝間多刺夏開細黃花結實有三種一種小如豬牙一種長而肥厚多脂而粘一種長而瘦薄枯燥不粘以多脂者為佳其樹多刺難上采時以篾篐其樹一夜自落亦一異也有不結實者樹鑿一孔入生鐵三五斤泥封之即結莢人以鐵砧槌皂莢即自損鐵碾碾之久則成孔鐵鍋㸑之多爆片落豈皂莢與鐵有感召之情耶皂莢修治斆曰凡使要赤肥并不蛀者以新汲水浸一宿用銅刀削去粗皮以酥反復灸透槌去子弦用每莢一兩用酥五錢好古曰凡用有蜜灸酥灸絞汁燒灰之異各依方法氣味辛鹹溫有小毒好古曰入厥陰經氣分時珍曰入手太陰陽明經氣分之才曰柏實為之使惡麥門冬畏空青人參苦參機曰伏丹砂粉霜硫黃硇砂主治風痺死肌邪氣風頭淚出利九竅殺精物本經療腹脹滿消榖除咳嗽囊結婦人胞不落眀目益精可為沐藥不入湯别録通關節頭風消痰殺蟲治骨蒸開胃中風口噤大明破堅癥腹中痛能墮胎又將浸酒中取盡其精煎成膏塗帛貼一切腫痛甄權溽暑久雨時合蒼术燒煙辟瘟疫邪濕氣宗奭燒煙熏久痢脫肛汪機搜肝風瀉肝氣好古通肺及大腸氣治咽喉痺塞痰氣喘咳風癘疥癬時珍發明好古曰皂莢厥陰之藥活人書治陰毒正氣散內用皂莢引入厥陰也時珍曰皂莢屬金入于太陰陽明之經金勝木燥勝風故兼入足厥隂治風木之病其味辛而性燥氣浮而散吹之導之則通上下諸竅服之則治風濕痰喘腫滿殺蟲塗之則散腫消毒搜風治瘡按龎安時傷寒總病論云元祐五年自春至秋蘄黃二郡人患急喉痺十死八九速者半日一日而死黃州推官潘昌言得黑龍膏方救活數千人也其方治九種喉痺急喉痺纒喉風結喉爛喉遁蟲蟲蝶重舌木舌飛絲入口用大皂莢四十挺切水三斗浸一夜煎至一斗半入人參末半兩甘草末一兩煎至五升去滓入無灰酒一升釡煤二匕煎如餳入瓶封埋地中一夜每溫酒化下一匙或掃入喉內取惡涎盡為度後含甘草片又孫用和家傅祕寶方云凡人卒中風昏昏如醉形體不收或倒或不倒或口角流涎出斯須不治便成大病此證風涎潮於上胸痺氣不通宜用急救稀涎散吐之用大皂莢肥實不蛀者四挺去黑皮白礬光明者一兩為末每用半錢重者三字溫水調灌不大嘔吐只是微微稀冷涎或出一升二升當待惺惺乃用藥調治不可便大吐之恐過劑傷人纍效不能書述宗奭曰此法用皂莢末一兩生礬末半兩膩粉半兩水調一二錢過咽即吐涎用礬者分膈下涎也附方舊二十新三十六中風口噤不開涎潮壅上皂角一挺去皮豬脂塗炙黃色為末每服一錢溫酒調下氣壯者二錢以吐出風涎為度簡要濟衆方中風口喎皂角五兩去皮為末三年大醋和之左喎塗右右喎塗左乾更上之外臺祕要中暑不省皂莢一兩燒存性草草一兩微炒為末溫水調一錢灌之淡寮方鬼魘不寤皂莢末刀圭吹之能起死人千金方自縊將死皂莢末吹鼻中外一方水溺卒死一宿者尚可活紙褁皂莢末納下部須臾出水即活外臺祕要急喉痺塞逡巡不救皂莢生研末每以少許點患處外以醋調厚封項下須臾便破出血即愈或挼水灌之亦良直指方川皂角肉半截水醋半盞煎七分破出濃血即愈咽喉腫痛牙皂一挺去皮米醋浸炙七次勿令大焦為末每吹少許入咽吐涎即止録聖濟總風癎諸痰五癎膏治諸風耴痰如神大皂角半斤去皮子以蜜四兩塗上慢火炙透槌碎以熱水浸一時挼取汁慢火熬成膏入麝香少許攤在夾綿紙上晒乾剪作紙花每用三四片入淡漿水一小盞中洗淋下以筒吹汁入鼻內待痰涎流盡吃芝麻餅一箇涎盡即愈立效普濟方風邪癎疾皂莢燒存性四兩蒼耳根莖葉日乾四兩蜜陀僧一兩為末成丸梧子大硃砂為衣每服三四十丸棗湯下日二服稍退只服二十丸名抵住丸永類方一切痰氣皂莢燒存性蘿蔔子炒等分薑汁入煉蜜丸梧子大每服五七十丸白湯下簡便方胸中痰結皂莢三十挺去皮切水五升浸一夜挼耴汁慢熬至可丸丸如梧子大每食後鹽漿水下十丸又釣痰膏用半夏醋煮過以皂角膏和勻入明礬少許以柿餅搗膏丸如彈子噙之聖惠方咳逆上氣唾濁不得卧皂莢丸用皂莢炙去皮子研末蜜丸梧子大每服一丸棗膏湯下日三夜一服張仲景方痰喘咳嗽長皂莢三條去皮子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十粒用薑汁制杏仁麻油制巴豆蜜制半夏一處火灸黃色為末每用一字安手心臨卧以薑汁調之喫下神效選余居士竒方卒寒咳嗽皂莢燒研䜴湯服二錢千金方牙病喘息喉中水雞鳴用肥皂莢兩挺酥灸取肉為末蜜丸豆大每服一丸取微利為度不利更服一日一服必效方腫滿入腹脹急皂莢去皮子灸黃為末酒一斗石器煮沸服一斗日三服肘後方二便關格千金方用皂莢燒研粥飲下三錢立通糊宣明方鐵腳丸用皂莢炙去皮子為末酒麵丸每服五十丸酒下坐聖惠方用皂莢燒煙于桶內上熏之即通食氣黃腫氣喘胸滿用不蛀皂角去皮子醋塗炙焦為末一錢巴豆七枚去油膜以淡醋研好墨和丸麻子大每服三丸食後陳橘皮湯下日三服隔一日增一丸以愈為度經驗方胸腹脹滿欲令瘦者豬牙皂角相續量長一尺微火煨去皮子搗篩蜜丸大如梧子服時先喫羊肉兩臠汁三兩口後以肉汁香藥十丸以快利為度覺得力更服以利清水即止藥瘥後一月不得食肉及豬油膩崔元亮海上集驗方身面卒腫洪滿用皂莢去皮灸黃銼三升酒一斗漬透煮沸每服一升一日三服肘後方卒熱勞疾皂莢續成一尺以上酥一大兩微塗緩灸酥盡搗篩蜜丸梧子大每日空腹飲下十五丸漸增至二十丸重者不過兩劑愈崔元亮海上方急勞煩熱體瘦三皂丸用皂莢皂莢樹皮皂莢刺各一斤同燒灰以水三斗淋汁冉淋如此三五度煎之候少凝入麝香末一分以童子小便浸蒸餅丸小豆大每空心溫水下七丸聖惠方腳氣腫痛皂角赤小豆為末酒醋調貼腫處永類方傷寒初得不問隂陽以皂角一挺肥者燒赤為末以水五合和頓服之陰病極效千金方時氣頭痛煩熱用皂角燒研新汲水一中盞薑汁蜜各少許和二錢服之先以暖水淋浴後服藥取汗即愈聖惠卒病頭痛皂角末吹鼻取嚏斗門方腦宣不止不蛀皂角去皮子蜜炙捶碎入水挼取濃汁熬成膏嗅鼻口內咬定良久涎出為度張子和儒門事親齆鼻不通皂角末吹之千金方風熱牙痛皂角一挺去子入鹽滿殼仍加白礬少許黃泥固濟煆研日擦之相誠經驗方風蟲牙痛外臺祕要方用皂莢末塗齒上有涎吐之千金方用豬牙皂角食鹽等分為末日揩之揩牙烏鬚大皂角二十挺以薑汁地黃汁蘸炙十遍為末日用揩牙甚妙普濟方霍亂轉筋皂角末吹豆許入鼻取嚏即安深師方腸風下血用長尺皂角五挺去皮子酥灸三次研末精羊肉十兩細切搗爛和丸梧子大每溫水下二十丸聖惠大腸脫肛不蛀皂角五挺槌碎水挼取汁二升浸之白收上收後以湯蕩其腰肚上下令皂角氣行則不冉作仍以皂角去皮酥灸為末棗肉和丸米飲下三十丸聖惠方下部􅉶瘡皂莢燒研綿褁導之肘后方外腎偏疼皂角和皮為末水調傅之良梅師方便毒腫痛皂角炒焦水粉炒等分研末以熱醋調攤貼患處頻以水潤之即效又方用豬牙皂角七片煨黃去皮弦出火毒為末空心溫酒服五錢袖珍方便毒癰疽皂角一條醋熬膏傅之屢效方直指婦人吹乳袖珍方用豬牙皂角去皮蜜炙為末酒服一錢又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一杯調八字管教時刻笑呵呵丁腫惡瘡皂角去皮酥炙焦為末入麝香少許人糞少許和塗五日後根出普濟方小兒頭瘡粘肥及白秃用皂角燒黑為末去痂傅之不過三次即愈鄧筆鋒衛生雜典小兒惡瘡皂莢水洗拭乾以少麻油搗爛塗之方肘後足上風瘡作癢甚者皂角灸熱烙之潘氏方大風諸癩長皂角二十條灸去皮子以酒煎稠濾過候冷入雪糕丸梧子大每酒下五十丸直指方積年疥瘡豬肚內放皂角煮熟去皂角食之袖珍方射工水毒生瘡皂莢長尺二者苦酒一升煎汁熬如飴塗之肘後方咽喉骨哽豬牙皂角二條切碎生絹袋盛縫滿線縛頂中立消簡便方魚骨哽咽皂角末吹鼻取嚏聖惠方九里蜂毒皂莢鑽孔貼叮處艾灸孔上三五壯即安救急方腎風隂癢以稻草燒皂角煙熏十餘次即止濟急仙方子修治斆日捒取圎滿堅硬不蛀者以瓶煮熟剝去硬皮一重取向裏白肉兩片去黃以銅刀切晒用其黃消人腎氣氣味辛溫無毒主治炒舂去赤皮以水浸軟煮熟糖漬食之疏道五臟風熱壅宗奭核中白肉入治肺藥核中黃心嚼食治膈痰吞酸蘇頌仁和血潤腸李杲治風熱大腸虛祕瘰癧腫毒瘡癬時珍發明機曰皂角核燒存性治大便燥結其性得濕則滑滑則燥結自通也時珍曰皂莢味辛屬金能通大腸陽明燥金乃辛以潤之之義非得濕則滑也附方舊三新十一腰腳風痛不能履地皂角子一千二百箇洗淨以少酥熬香為末蜜丸梧子大每空心以蒺藜子酸棗仁湯下三十丸千金方大腸虛祕風人虛人腳氣人大腸或祕或利用上方服至百丸以通為度下痢不止諸藥不效服此三服宿垢去盡即變黃色屢驗皂角子瓦焙為末米糊丸梧子大每服四五十丸陳茶下醫方摘要腸風下血皂莢子槐實一兩用占穀粳炒香去粳為末陳粟米飲下一錢名神效散聖惠方裏急後重不蛀皂角子米粳炒過枳殼炒等分為末飯丸梧子大每米飲下三十丸普濟方小兒流涎脾熱有痰皂莢子仁半兩半夏薑湯泡七次一錢二分為末薑汁丸麻子大每溫水下五丸聖濟總録惡水入口及皂莢水入口熱痛不止以皂莢子燒存性一分沙糖半兩和膏舍之博濟方婦人難産皂角子二枚吞之千金方風蟲牙痛皂角子末綿褁彈子大兩顆醋煮熱更互尉之日三五度聖惠方粉滓面皯皂角子杏仁等分研勻夜以津和塗之聖惠方預免瘡櫛凡小兒每年六月六日照年嵗吞皂莢子可免瘡癤之患大人亦可吞七枚或二十一枚林靜齋所傳方也吳昊扶夀方便癰初起皂角子七箇研末水服效一方照年嵗吞之親儒門事方一切丁腫皂角子仁作末傅之五日愈千金方年久瘰癧阮氏經驗方用不蛀皂角子一百粒米醋一升硇砂二錢同煮乾炒令酥看􅊓子多少如一箇服一粒十箇服十粒細嚼米湯下酒浸煮服亦可聖濟總録言虛人不可用硇砂也刺一名天丁氣味辛溫無毒主治米醋熬嫩刺作煎塗瘡癬有竒效蘇頌治癰腫妬乳風癘惡瘡胎衣不下殺蟲時珍發明楊士瀛曰皂莢刺能引諸藥性上行治上焦病震亨曰能引諸癰疽潰處甚驗時珍曰皂莢刺治風殺蟲功與莢同但其鋭利直逹病所為異耳神仙傳云左親騎軍崔言一旦得大風惡疾雙目昏盲眉髮自落鼻梁崩倒勢不可救遇異人傳方用皂角刺三斤燒灰蒸一時久日乾為末食後濃煎大黃湯調一匕飲之一旬眉髮冉生肌潤目眀後入山修道不知所終又劉守真保命集云癘風乃營氣熱風寒客于脈而不去宜先用樺皮散服五七日後灸承漿穴七壯三灸後每旦早服樺皮散午以升麻葛根湯下錢氏瀉青丸晚服一聖散用大黃末半兩煎湯調皂角刺灰三錢乃緩疏泄血中之風熱也仍戒房室三年樺皮散見樺皮下又追風冉造散即一聖散云服之便出黑蟲為驗數日冉服直候蟲盡為絶根也新蟲嘴赤老蟲嘴黑附方新十二小兒重舌皂角刺灰入朴硝或腦子少許漱口摻入舌下涎出自消聖惠方小便淋閉皂角刺燒存性破故紙等分為末無灰酒服聖濟總録腸風下血便前近腎肝便後近心肺皂角刺灰二兩胡桃仁破故紙炒槐花炒各一兩為末每服一錢米飲下普濟方傷風下痢風傷久不已而下痢膿血日數十度用皂角刺枳實麩炒槐花生用各半兩為末煉蜜丸梧子大每服三十丸米湯下日二服袖珍方胎衣不下皂角刺燒為末每服一錢溫酒調下熊氏補遺婦人乳癰皂角刺燒存性一兩􅑕粉一錢和研每服一錢溫酒下直指方乳汁結毒産後乳汁不泄結毒者皂角刺蔓荆子各燒存性等分為末每溫酒服二錢方袖珍腹內生瘡在腸臟不可藥治者取皂角刺不拘多少好酒一碗煎至七分溫服其膿血悉從小便中出極效不飲酒者水煎亦可蘭氏經驗方瘡腫無頭皂角刺燒灰酒服三錢嚼葵子三五粒其處如針刺為效儒門事親癌瘭惡瘡皂角刺燒存性研白及少許為末傅之直指方大風癘瘡選竒方用黃蘖末皂角刺灰各三錢研空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如四肢腫用針刺出水冉服忌一切魚肉發風之物取下蟲大小長短其色不一約一二升其病乃愈也仁存方發背不潰皂角刺麥麩炒黃一兩綿黃茋焙一兩甘草半兩為末每服一大錢酒一盞乳香一塊煎七分去滓溫服普濟本事方木皮根皮氣味辛溫無毒主治風熱痰氣殺蟲時珍附方新二肺風惡瘡瘙癢用木乳即皂莢根皮秋冬采如羅紋者隂乾炙黃白蒺藜炒黃茋人參枳殼炒甘草灸等分為末沸湯每服一錢普濟方産後腸脫不收用皂角樹皮半斤皂角核一合川楝樹皮半斤石蓮子炒去心一合為粗末以水煎湯乘熱以物圍定坐熏洗之挹乾便喫補氣丸藥一服仰睡婦人良方葉主治入洗風瘡泄用時珍附録鬼皂莢藏器曰生江南驛畔狀如皂莢高一二尺作湯浴去風瘡疥癬挼葉去衣垢沫髮令長肥皂莢綱目集解時珍曰肥皂莢生高山中其樹高大葉如檀及皂莢葉五六月開白花結莢長三四寸狀如雲實之莢而肥厚多肉內有黑子數顆大如指頭不正圓其色如漆而甚堅中有白仁如栗煨熟可食亦可種之十月采莢煮熟搗爛和白麵及諸香作丸澡身面去垢而膩潤勝于皂莢也相感志言肥皂莢水死金魚辟馬蟻麩見之則不就亦物性然耳莢氣味辛溫微毒主治去風濕下痢便血瘡癬腫毒時珍附方新九腸風下血獨子肥皂燒存性一片為末糊丸成米飲下普濟方下痢禁口肥皂莢一枚以鹽實其內燒存性為末以少許入白米粥內食之即效乾坤生意風虛牙腫老人腎虛或因涼藥擦牙致痛用獨子肥皂以青鹽實之燒存性研末摻之或入生樟腦十五文寶衛生家方頭耳諸瘡眉癬燕窩瘡並用肥皂煆存性一錢枯礬一分研勻香油調塗之方摘玄小兒頭瘡因傷湯水成膿出水不止用肥皂燒存性入膩粉麻油調搽海上方臘梨頭瘡不拘大人小兒用獨核肥皂去核填入沙糖入巴豆二枚札定鹽泥包煆存性入檳榔輕粉五七分研勻香油調搽先以灰汁洗過溫水冉洗拭乾乃搽一宿見效不須冉洗普濟方癬瘡不愈以川槿皮煎湯用肥皂去核及內膜浸湯時時搽之楊起簡便方便毒初起肥皂搗爛傅之甚效簡便方玉莖濕癢肥皂一箇燒存性香油調搽即愈攝生方核氣味甘腥溫無毒主治除風氣時珍無患子宋開寶釋名桓拾遺木患子綱目噤婁拾遺肥珠子綱目油珠子綱目菩提子綱目鬼見愁藏器曰桓患字聲訛也崔豹古今注云昔有神巫曰瑶氍能符劾百鬼得鬼則以此木為棒棒殺之世人相傳以此木為器用以厭鬼魅故號曰無患人又訛為木患也時珍曰俗名為鬼見愁道家禳解方中用之緣此義也釋家取為數珠故謂之菩提子與薏苡同名纂文言其木名盧鬼木山人呼為肥珠子油珠子因其實如肥油而子圓如珠也集解藏器曰無患子髙山大樹也子黑如漆珠博物志云桓葉似櫸柳葉核堅正黑如醫可作香纓及浣垢宗奭曰今釋子取為念珠以紫紅色小者佳入藥亦少西洛亦有之時珍曰生高山中樹甚高大枝葉皆如椿特其葉對生五六月開白花結實大如彈丸狀如銀杏及苦楝子生青熟黃老則文皺黃時肥如油􅨘之形味辛氣䐈且硬其蒂下有二小子相粘承之實中一核堅黑似肥皂莢之核而正圓如珠殼中有仁如榛子仁亦辛䐈可炒食十月采實煮熟去核搗和麥麵或豆麵作澡藥去垢同于肥皂用洗真珠甚妙山海經云袂周之山其木多桓郭璞注云葉似柳皮黃不錯子似楝著酒中飲之辟惡氣浣之去垢核堅正黑即此也今武當山中所出鬼見愁亦是樹莢之子其形正如刀豆子而色褐彼人亦以穿數珠别又是一物非無患也子皮即核外肉也氣味微苦平有小毒主治浣垢去面皯喉痺研納喉中立開又主飛尸藏器附方新二洗頭去風明目用槵子皮皂角胡餅菖蒲同槌碎漿水調作彈子大每用泡湯洗頭良事多能鄙洗面去皯槵子肉皮搗爛入白麵和丸大丸每日用洗面去垢及皯甚良簡集方子中仁氣味辛平無毒主治燒之辟邪惡氣藏器煨食辟惡去口臭時珍附方新一牙齒腫痛肥珠子一兩大黃香附各一兩青鹽半兩泥固煆研日用擦牙普濟方欒華本經下品集解别録曰欒華生漢中川谷五月采恭曰此樹葉似木槿而薄細花黃似槐而稍長大子殼似酸漿其中有實如熟豌豆圓黑堅硬堪為數珠者是也五月六月花可收南人以染黃甚鮮眀又以療目赤爛頌曰今南方及汴中園圃間或有之宗奭曰長安山中亦有之其子謂之木欒子携至京都為數珠未見入藥華氣味苦寒無毒之才曰決明為之使主治目痛淚出傷眥消目腫本經合黃連作煎療目赤爛蘇恭無食子唐本草釋名沒石子開寶墨石子炮炙論麻荼澤珣曰波斯人每食以代果故番胡呼為沒食子梵書無與沒同音今人呼為墨石沒石轉傳訛矣集解恭曰無食子生西戎沙磧間樹似柳禹錫曰按假成式酉陽雜爼云無食子出波斯國呼為摩澤樹髙六七丈圍八九尺葉似桃而長三月開花白色心微紅子圓如彈丸初青熟乃黃白蟲蝕成孔者入藥用其樹一年生無食子一年生拔屢子大如指長三寸上有股中仁如栗黃可噉時珍曰按方輿志云大食國有樹一年生如栗子而長名曰蒲盧子可食次年則生麻荼澤即沒石子也間嵗互生一根異産如此一統志曰沒石子出大食諸畨樹如樟實如中國芧栗子修治斆曰凡使勿犯銅鐵并被火驚用顆小無杴米者妙用漿水於砂盆中研令盡焙乾冉研如烏犀色入藥氣味溫苦無毒主治赤白痢腸滑生肌肉唐本腸虛冷痢益血生精和氣安神烏髭髮治隂毒痿燒灰用李珣溫中治隂瘡隂汗小兒疳𧈟冷滑不禁馬志發明宗奭曰沒石子合他藥染鬚造墨家亦用之珣曰張仲景用治隂汗燒灰先以湯浴了布褁灰撲之甚良附方舊三新五血痢不止沒石子一兩為末飯丸小豆大每食前米飲下五十丸普濟方小兒久痢沒石子兩箇熬黃研末作餛飩食之宫氣方産後下痢沒石子一箇燒存性研末酒服熱即用飲下日二子母祕録牙齒疼痛綿褁無食子末一錢咬之涎出吐去録聖濟總鼻面酒皶南方沒石子有孔者水磨成膏夜夜塗之甚妙危氏得效方口鼻急疳沒石子末吹下部即瘥千金方大小口瘡沒石子炮三分甘草一分研末摻之月內小兒生者少許置乳上吮之入口即啼不過三次聖惠方足趾肉刺無食子三枚肥皂莢一挺燒存性為末醋和傅之立效竒效方訶黎勒唐本草釋名訶子時珍曰訶黎勒梵言天主持來也集解恭曰訶黎勒生交州愛州頌曰今嶺南皆有而廣州最盛樹似木槵花白子形似巵子橄欖青黃色皮肉相著七月八月實熟時采六路者佳嶺南異物志云廣川法性寺有四五十株子極小而味不澀皆是六路每嵗州貢只以此寺者寺有古井木根蘸水水味不醎每子熟時有佳客至則院僧煎湯以延之其法用新摘訶子五枚甘草一寸破之汲井水同煎色若新茶今其寺謂之乾明古寺尚在舊木猶有六七株南海風俗尚貴此湯然煎之不必盡如昔時之法也訶子未熟時風飄墮者謂之隨風子暴乾收之益小者佳彼人尤珍貴之蕭炳曰波斯舶上來者六路黑色肉厚者良六路即六稜也斆曰凡使勿用皉黎勒個個皉頭也若訶黎勒文只有六路或多或少並是雜路勒皆圓而露文或八路至十三路號曰榔精勒澀不堪用修治斆曰凡用訶黎勒酒浸後蒸一伏時刀削去皮取肉銼焙用用核則去肉氣味苦溫無毒權曰苦甘炳曰苦酸珣曰酸澀溫好古曰苦酸平苦重酸輕味厚陰也降也主治冷氣心腹脹滿下食唐本破胸膈結氣通利津液止水道黑髭髮甄權下宿物止腸澼久泄赤白痢蕭炳消痰下氣化食開胃除煩治水調中止嘔吐霍亂心腹虛痛奔豚腎氣肺氣喘急五膈氣腸風瀉血崩中帶下懷孕漏胎及胎動欲生脹悶氣喘并患痢人肛門急痛産婦隂痛和蠟燒煙熏之及煎湯熏洗大明治痰嗽咽喉不利含三數枚殊勝蘇恭實大腸斂肺降火震亨發明宗奭曰訶黎勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣其味苦澀故爾杲曰肺苦氣上逆急食苦以泄之以酸補之訶子苦重瀉氣酸輕不能補肺故嗽藥中不用震亨曰訶子下氣以其味苦而性急肺苦急急食苦以瀉之謂降而下走也氣實者宜之若氣虛者似難輕服又治肺氣因火傷極遂一遏脹滿其味酸苦有收斂降火之功也時珍曰訶子同烏梅五倍子用則收斂同橘皮厚朴用則下氣同人參用則能補肺治咳嗽東垣云嗽藥不用者非矣但咳嗽未久者不可驟用爾嵇含草木狀言作飲久服令髭髮白者變黑亦取其澀也珣曰訶黎皮主嗽肉主眼澀痛波斯人將訶黎勒大腹等在舶上用防不虞或遇大魚放涎滑水中數里船不能通乃煮此洗其涎滑尋化為水則其治氣消痰功力可知矣藥慎微曰金光明經言流水長者除病品云熱病下服訶黎勒又廣異記云高仙芝在大食國得訶黎勒長三寸置抹肚下便覺腹中痛因大痢十餘行疑訶黎勒為祟後問火食長老云此物人帶一切病消利者乃出惡物爾仙芝寶之後被誅失所在唐頌曰訶黎主痢唐本草不載張仲景治氣痢有方劉禹錫傳信方云豫曽苦赤白下諸藥服遍久不瘥轉為白膿令狐將軍傳此方用訶黎勒三枚兩炮一生並取皮末之以沸漿水一合服之若只水痢加一錢匕甘草末若微有膿血加三匕血多亦加三匕附方舊九新六下氣消食訶黎一枚為末瓦器中水一大升煎三兩沸下藥更煎三五沸如麴塵色入少鹽飲之食醫心鏡一切氣疾宿食不消訶黎一枚入夜含之至明嚼咽又方訶黎三枚濕紙包煨熟去核細嚼以牛乳下千金方氣嗽日久生訶黎一枚含之咽汁瘥後口爽不知食味却煎檳榔湯一碗服立便有味此知連州成密方也經驗方嘔逆不食訶黎勒皮二兩炒研糊丸梧子大空心湯服二十丸日三服廣濟方風痰霍亂食不消大便澀訶黎三枚取皮為末和酒頓服三五次妙外臺祕要小兒霍亂訶黎一枚為末沸湯服一半未止冉服子母祕録小兒風痰壅閉語音不出氣促喘悶手足動搖訶子半生半炮去核大腹等皮分水煎服名二聖散全幼心鑑風熱衝頂熱悶訶黎二枚為末芒消一錢同入醋中攪令消磨塗熱處外臺祕要氣痢水瀉訶黎勒十枚麵褁煻火煨熟去核研末粥飲頓服亦可飯丸服一加木香大又長服方訶黎勒陳橘皮厚朴各三兩搗篩蜜丸如梧子每服二三十丸白湯下圖經本草水瀉下痢訶黎勒炮二分肉豆蔲一分為末米飲每服二錢聖惠方下痢轉白訶子三箇二炮一生為末沸湯調服水痢加甘草末一錢普濟方赤白下痢訶子十二箇六生六煨去核焙為末赤痢生甘草湯下白痢炙甘草湯下不過冉服趙原陽濟急方妬精下疳大訶子燒灰入麝香少許先以采泔水洗後搽之或以荆芥黃蘗甘草馬鞭草蔥白煎湯洗亦可昔方士周守真醫唐靖爛莖一二寸用此取效也洪邁夷堅志核主治磨白蜜注目去風赤痛神良蘇頌止咳及痢時珍葉主治下氣消痰止渴及泄痢煎飲服功同訶黎時珍吏唐包佶有病中謝李部惠訶黎勒葉詩婆羅得宋開寶釋名婆羅勒時珍曰婆羅得梵言重生果也集解珣曰婆羅得生西海波斯國樹似中華柳樹子如蓽麻子方家多用之時珍曰按王壽外臺祕要婆羅勒似蓽麻子但以指甲爪之則有汁出即此物也子氣味辛溫無毒主治冷氣塊溫中補腰腎破痃癖可染髭髮令黑藏器附方新一拔白生黑婆羅勒十顆去皮取汁熊脂二兩白馬鬐膏煉過一兩生薑炒一兩母丁香半兩為末和煎每拔白點之揩令入肉即生黑者此嚴中丞所用方也孟詵近效方櫸别録下品釋名櫸栁衍義鬼栁時珍曰其樹髙舉其木如柳故名山人訛為鬼柳郭璞注爾雅作匱柳云似柳皮可煮飲也集解𢎞景曰櫸樹山中處處有之皮似檀槐葉如櫟槲人多識之恭曰所在皆有多生溪澗水側葉似樗而狹長樹大者連抱高數仞皮極粗厚殊不似檀宗奭曰櫸木今人呼為櫸柳其葉謂柳非柳謂槐非槐最大者木高五六丈合二三人抱湖南北甚多然亦不材也不堪為器嫩皮取以緣栲栳及箕唇時珍曰櫸材紅紫作箱案之類甚佳鄭樵通志云櫸乃榆須而枚烈其實亦如榆錢之狀鄉人采其葉為甜茶木皮修治斆曰凡使勿用三四年者無力用二十年以來者心空其樹只有半邉向西生者良剝下去粗皮細銼蒸之從已至未出焙乾用氣味苦大寒無毒主治時行頭痛熱結在腸胃别録夏日煎飲去熱𢎞景俗用煮汁服療水氣斷痢蘇恭安胎止妊婦腹痛山櫸皮性平治熱毒風熁腫毒大明附方舊一新四通身水腫櫸樹皮煮汁日飲聖惠方毒氣攻腹手足腫痛櫸樹皮和槲皮煮汁煎如飴糖以樺皮煮濃汁化飲肘後方蟲毒下血櫸皮一尺蘆根五寸水二升煮一升頓服當下蠱出千金方小兒痢血梁州櫸皮二十分炙犀角十二分水三升煮取一升分三服取瘥古今録驗方飛血赤眼櫸皮去粗皮切二兩古錢七文水一升半煎七合去滓熱洗日二次聖濟總録葉氣味苦冷無毒主治挼貼火爛瘡有效蘇恭治腫爛惡瘡鹽搗罯之大明桞本經下品釋名小楊説文楊桞𢎞景曰栁即今水楊栁也恭曰栁與水楊全不相似水楊葉圓濶而尖枝條短硬栁葉狹長而青緑枝條長軟陶以栁為水楊非也藏器曰江東人通名楊栁北人都不言楊楊樹枝葉短栁樹枝葉長時珍曰楊枝硬而揚起故謂之楊栁枝弱而垂流故謂之栁蓋一類二種也蘇恭所説為是按説文云楊蒲栁也從木易聲栁小楊也從木丣聲昜音陽丣音酉又爾雅云楊蒲栁也旄澤栁也柳河栁也觀此則楊可稱栁栁亦可稱楊故今南人猶併稱楊栁余宗本種樹書言順插為栁倒插為楊其説牽強且失楊起之意宗奭曰釋家謂栁為尼俱律陀木集解别録曰栁華生琅邪川澤頌曰今處處有之俗所謂楊栁者也其類非一蒲栁即水楊也枝徑韌可為箭笴多生河北杞栁生水旁葉粗而白木理微赤可為車轂今人取其細條火逼令柔屈作箱篋孟子所謂杞栁為杯棬者魯地及河朔尤多柳栁見本條時珍曰楊栁縱橫倒順插之皆生春初生柔荑即開黃蕊花至春晚葉長成後花中結細黑子蕊落而絮出如白絨因風而飛子著衣物能生蟲入池沼即化為浮萍古者春取榆栁之火陶朱公言種栁千樹可足柴炭其嫩芽可作飲湯柳華釋名栁絮本經正誤見下氣味苦寒無毒主治風水黃疸面熱黑本經痂疥惡瘡金瘡柳實主潰癰逐濃血子汁療渴别録華主止血治濕痺四肢攣急膝痛甄權發明𢎞景曰栁花熟時隨風狀如飛雪當用其未舒時者子亦隨花飛止應水漬汁爾藏器曰本經以柳絮為花其誤甚矣花即初發時黃蕊其子乃飛絮也承曰柳絮可以捍氊代羊毛為茵褥柔軟性涼宜與小兒卧尤佳宗奭曰柳花黃蕊乾時絮方出收之貼炙瘡良絮之下連小黑子因風而起得水濕便生如苦買地丁之花落結子成絮古人以絮為花謂花如雪者皆誤矣藏器之説為是又有實及子汁之文諸家不解今人亦不見用時珍曰本經主治風水黃疸者柳花也别録主治惡瘡金瘡潰癰逐膿血藥性論止血療痺者栁絮及實也花乃嫩蕊可搗汁服子與絮連難以分别惟可貼瘡止血褁痺之用所謂子汁療渴者則連絮浸漬研汁服之爾又崔實四民月令言三月三日及上除日采絮愈疾則入藥多用絮也附方新六吐血咯血柳絮焙研米飲服一錢經驗方金瘡血出柳絮封之即止要外臺祕面上膿瘡柳絮膩粉等分以燈盞油調塗普濟方走馬牙疳楊花燒存性入麝香少許搽保幼大全大風癘瘡楊花四兩搗成餅貼壁上待乾取下米泔水浸一時取起瓦焙研末二兩白花蛇烏蛇各一條去頭尾酒浸取肉全蠍蜈蚣蟾酥雄黃各五錢苦參天麻各一兩為末水煎麻黃取汁熬膏和丸梧子大硃砂為衣每服五十丸溫酒下一日三服以愈為度效孫氏集良方腳多汗濕楊花著鞋及襪內穿之摘玄葉氣味同華主治惡疥痂瘡馬疥煎煮洗之立愈又療心腹內血止痛别録煎水洗漆瘡𢎞景天行熱病傳尸骨蒸勞下水氣煎膏續筋骨長肉止痛主服金石人發大熱悶湯火瘡毒入腹熱悶及丁瘡日華療白濁解丹毒時珍附方舊一新五小便白濁清明栁葉煎湯代茶以愈為度集簡方小兒丹煩柳葉一斤水一斗煮取汁三升榻洗赤處日七八度子母祕録眉毛脫落垂柳葉隂乾為末每薑汁于鐵器中調夜夜摩之聖惠方卒得惡瘡不可名識者柳葉或皮水煮汁入少鹽頻洗之肘後方面上惡瘡方上同痘爛生蛆嫩柳葉鋪席上卧之蛆盡出而愈也方李樓竒枝及根白皮氣味同華主治痰熱淋疾可為浴湯洗風腫瘙癢煮酒潄齒痛蘇恭小兒一日五日寒熱煎枝浴之藏器煎服治黃疸白濁酒煮尉諸痛腫去風止痛消腫時珍發明頌曰柳枝皮及根亦入藥葛洪肘後方治癰疽腫毒妬乳等多用之韋宙獨行方主丁瘡及反花瘡並煎柳枝葉作膏塗之今人作浴湯膏藥牙齒藥亦用其枝為最要之藥時珍曰柳枝去風消腫止痛其嫩枝削為牙杖滌齒甚妙附方舊十新八黃疸初起柳枝煮濃汁半升頓服外臺祕要脾胃虛弱不思飲食食下不化病似翻胃噎膈清明日取柳枝一大把熬湯煮小米作飯酒麵滚成珠子晒乾袋懸風處每用燒滚水隨意下米米沉住火少時米浮取看無硬心則熟可頓食之久則麵散不粘矣名曰絡索米簡楊起便方走注氣痛氣痛之病忽有一處如打撲之狀不可忍走注不定靜時其處冷如霜雪此皆暴寒傷之也以白酒煮楊柳白皮暖尉之有赤點處鑱去血妙凡諸卒腫急痛尉之皆即止姚增坦集驗方風毒卒腫方同上隂卒腫痛柳枝三尺長二十枚細銼水煮極熟以故帛褁包腫處仍以熱湯洗之集驗方項下癭氣水涯露出柳根三十斤水一斛煮取五升以糯米三斗如常釀酒日飲范汪方齒齦腫痛垂柳枝槐白皮桑白皮白楊皮等分煎水熱含冷吐芎又方柳枝槐枝桑枝煎水熬膏入薑汁細辛藭末每用擦牙聖惠方風蟲牙痛楊柳白皮卷如指大含咀以汁漬齒根數過即愈又方柳枝一握銼入少鹽花漿水煎含甚驗清又方柳枝銼一升大豆一升合炒豆熟瓷器盛之酒三升漬三日頻含漱涎三日愈古今録驗耳痛有膿柳根細切熟搗封之燥即易之斗門方漏瘡腫痛柳根紅鬚煎水日洗內摘玄方用楊柳條罐燒煙熏之出水即效乳癰妬乳初起堅紫衆療不瘥柳根皮熟搗火溫帛褁尉之冷更易一宿消肘後方翻花惡瘡肉出如飯粒根深膿潰柳枝葉三斤水五升煎汁二升熬如餳日三塗之聖惠方天竈丹毒赤從背起栁木灰水調塗之外臺祕要湯火灼瘡柳皮燒灰塗之亦可以根白皮煎豬脂頻傅之肘後方痔瘡如瓜腫痛如火柳枝煎濃湯洗之艾灸三五壯王及郎中病此驛吏用此方灸之覺熱氣入腸大下血穢至痛一頃遂消馳馬而去本事方柳膠主治惡瘡及結砂子時珍柳寄生見後寓木類柳耳見菜部木耳柳蠧見蟲部柳柳音偵寶宋開釋名赤柳日華赤楊古今注河柳爾雅雨師詩疏垂絲柳綱目人柳綱目三眠柳衍義觀音柳時珍曰按羅願爾雅翼云天之將雨柳先知之起氣以應又負霜雪不凋乃木之聖者也故字從聖又名雨師或曰得雨則垂垂如絲當作兩絲三輔故事云漢武帝苑中有柳狀如人號曰人柳一日三起三眠則柳柳之聖又不獨知雨負雪而已今俗稱長夀仙人柳亦曰觀音柳謂觀音用此灑水也宗奭曰今人謂之三春柳以其一年三秀故名集解志曰赤柳木生河西沙地皮赤色細葉禹錫曰爾雅柳河柳也郭璞注云今河旁赤莖小楊也陸璣詩疏云生水旁皮赤如絳枝葉如松時珍曰柳柳小幹弱枝插之易生赤皮細葉如絲婀娜可愛一年三次作花花穗長三四寸水紅色如蓼花色南齊時益州獻蜀栁條長狀若絲縷者即此柳也假成式酉陽雜爼言涼州有赤白柳大者為炭其灰汁可以煮銅故沈烔賦云柳似柏而香王禎農書云山柳赤而脆河柳白而明則柳又有白色者也宗奭汴京甚多河西或人取滑枝為鞭木氣味甘鹹溫無毒主治剝驢馬血入肉毒取木片火炙尉之并煮汁浸之開寶枝葉消痞解酒毒利小便時珍附方新三腹中痞積觀音柳煎湯露一夜五更空心飲數次痞自消衛生易簡方一切諸風不問逺近柳葉半斤切枝亦可荆芥半斤水五升煮二升澄清入白蜜五合竹瀝五合新瓶盛之油紙封入重湯煮一伏時每服一小盞日三服普濟方酒多致病長壽仙人柳晒乾為末每服一錢溫酒調下衛生易簡方柳乳即脂汁主治合質汗藥治金瘡開寶水楊唐本草釋名青楊綱目蒲柳爾雅蒲楊古今注蒲栘音移栘柳古今注雚苻音丸蒲時珍曰楊枝硬而楊起故謂之楊多宜水涘蒲雚之地故有水楊蒲柳雚苻之名集解恭曰水楊葉圓濶而尖枝條短硬與柳全别柳葉狹長枝條長軟頌曰爾雅楊蒲栁也其枝徑韌可為箭苛左傳所謂董澤之蒲又謂之雚苻今河北沙地多生之楊柳之類亦多崔豹古今注云白楊葉圓青楊葉長柳葉長而細栘楊葉圓而弱水楊即蒲柳亦曰蒲楊葉似青楊莖可作矢赤楊霜降則葉赤材理亦赤然今人鮮能分别機曰蘇恭説水楊葉圓濶崔豹説蒲楊似青楊青楊葉長似不相類時珍曰按陸璣詩疏云蒲柳有二種一種皮正青一種皮正白可為矢北土尤多花與柳同枝葉氣味苦平無毒主治久痢赤白搗汁一升服日二大效唐本主癰腫痘毒時珍發明時珍曰水楊根治癰腫故近人用枝葉治痘瘡魏直博愛心鑑云痘瘡數日陷頂漿滯不行或風寒所阻者宜用水楊枝葉無葉用枝五斤流水一大釡煎湯溫浴之如冷添湯良久照見纍起有暈絲者漿行也如不滿冉浴之力弱者只洗頭面手足如屢浴不起者氣血敗矣不可冉浴始出及癢塌者皆不可浴痘不行漿乃氣澀血滯腠理固密或風寒外阻而然浴令暖氣透逹和暢鬱蒸氣血通徹每隨暖氣而發行漿貫滿功非淺也若內服助氣血藥藉此升之其效更速風寒亦不得而阻之矣直見一嫗在村中用此有驗即得其方行之百發百中慎勿易之誠有燮理之妙也蓋黃鍾一動而蟄蟲啓戶東風一吹而堅氷解腹同一春也羣書皆無此法故詳著之木白皮及根氣味同華主治金瘡痛楚乳癰諸腫痘瘡時珍發明時珍曰按李仲南永類鈐方云有人治乳癰持藥一根生擂貼瘡其熱如火冉貼遂平求其方乃水楊柳根也葛洪肘后方治乳癰用柳根則楊與柳性氣不逺可通用也附方新一金瘡苦痛楊木白皮熬燥碾末水服方寸匕仍傅之日三次千金方白楊唐本草釋名獨搖宗奭曰本身似楊微白故曰白楊非如粉之白也時珍曰鄭樵通志言白楊一名高飛與栘楊同名今俗通呼栘楊為白楊且白楊亦因風獨搖故得同名也集解恭曰白楊取葉圓大蒂小無風自動者藏器曰白楊北土極多人種墟墓間樹大皮白其無風自動者乃栘楊非白楊也頌曰今處處有之北土尤多株甚高大葉圓如梨葉皮白色木似楊采無時崔豹古今注云白楊葉圓青楊葉長是也宗奭曰陜西甚多永耀間居人修蓋多此木也其根不時碎札入土即生根故易繁植土地所宜爾風才至葉如大雨聲謂無風自動則無此事但風微時其葉孤絶處則往往獨搖以其蒂長葉重大勢使然也時珍曰白楊木高大葉圓似梨而肥大有尖面青而光背甚白色有鋸齒木肌細白性堅直用為梁栱終不撓曲與栘楊乃一類二種也治病之功大抵倣佛嫩葉亦可荒老葉可作酒麴料木皮修治斆曰凡使銅刀刮去粗皮蒸之從已至未以布袋盛挂屋東角待乾用氣味苦寒無毒大明曰酸冷主治毒風腳氣腫四肢緩弱不隨毒氣遊易在皮膚中痰癖等酒漬服之唐本去風痺宿血折傷血瀝在骨肉間痛不可忍及皮膚風瘙腫雜五木為湯浸損處藏器治撲損瘀血並煎酒服煎膏可續筋骨大明煎湯日飲止孕痢煎醋含潄止牙痛煎漿水入鹽含潄治口瘡煎水釀酒消癭氣時珍附方舊一新一妊娠下痢白楊皮一斤水一斗煮取二升分三服千金方項下癭氣秫米三斗炊熟取圓葉白楊皮十兩勿令見風􅋀水五升煮取二升漬麴末五兩如常釀酒每旦一盞日冉服崔氏方枝主治消腹痛治吻瘡時珍附方舊二新一口吻爛瘡白楊嫩枝鐵上燒灰和脂傅之外臺祕要腹滿癖堅如石積年不損者必效方用白楊木東枝去粗皮辟風細銼五升熬黃以酒五升淋訖用絹袋盛滓還納酒中密封冉宿每服一合日三服外臺祕要面色不白白楊皮十八兩桃花一兩白瓜子仁三兩為末每服方寸匕日三服五十日面及手足皆白聖濟總録葉主治齲齒煎水含潄又治骨疽久發骨從中出頻搗傅之時珍扶栘音夫移拾遺釋名栘楊古今注唐棣爾雅髙飛崔豹獨搖時珍曰栘乃白楊同類故得楊名按爾雅唐棣栘也崔豹曰栘楊江東呼為夫移圓葉弱蒂微風則大搖故名髙飛又曰獨搖陸璣以唐棣為郁李者誤矣郁李乃常棣非唐棣也集解藏器曰扶栘木生江南山谷樹大十數圍無風葉動花反而後合詩云唐棣之華偏其反而是也時珍曰栘楊與白楊是同類二種今南人通呼為白楊故俚人有白楊葉有風掣無風掣之語其入藥之功大抵相近木皮氣味苦平有小毒主治去風血腳氣疼痺腕損瘀血痛不可忍取白皮火炙酒浸服之和五木皮煮湯捋腳氣殺瘃蟲風瘙燒作灰置酒中令味正經時不敗藏器發明時珍曰白楊栘楊皮並雜五木皮煮湯浸捋損痺諸痛腫所謂五木者桑槐桃楮柳也並去風和血附方新一婦人白崩䃿楊皮半斤牡丹皮四兩升麻牡蠣煆各一兩每用一兩酒二鍾煎一鍾食前服集簡方松楊拾遺校正併入唐本草椋子木釋名椋子木音涼時珍曰其材如松其身如楊故名松楊爾雅云椋即來也其隂可蔭涼故曰椋木藏器曰江西人呼為涼木松楊縣以此得名集解藏器曰松楊生江南林落間大樹葉如梨志曰椋子木葉似柿兩葉相當子細圓如牛李生青熟黑其木堅重煮汁色赤郭璞云椋材中車輛八月九月采木日乾用木氣味甘鹹平無毒主治折傷破惡血養好血安胎止痛生肉唐本木皮氣味苦平無毒主治水痢不問冷熱濃煎令黑服一升藏器榆俞由二音本經上品釋名零榆本經白者名枌時珍曰按王安石字説云榆瀋俞柔故謂之榆其枌則有分之之道故謂之枌其莢飄零故曰零榆集解别録曰榆皮生頴川山谷二月采皮取白暴乾八月采實並勿令中濕濕則傷人𢎞景曰此即今之榆樹取皮刮去上赤皮亦可臨時用之性至滑利初生莢仁以作糜羮令人多睡嵇康所謂榆令人瞑也恭曰榆三月實熟尋即落矣今云八月采實恐誤也藏器曰江東無大榆有刺榆秋實故經云八月采者誤也刺榆皮不滑利頌曰榆處處有之二月生莢古人采仁以為糜羮今無復食者惟用陳老實作醬耳按爾雅疏云榆類有數十種葉皆相似但皮及木理有異耳刺榆有針刺如柘其葉如榆瀹為蔬羮滑于白榆即爾雅所謂樞荎詩經所謂山有樞是也白榆先生葉却著莢皮色白二月剝皮刮去粗皵中極滑白即爾雅所謂榆白枌是也荒嵗農人取皮為粉食之當糧不損人四月采實宗奭曰榆皮初春先生莢者是也嫩時收貯為羮茹嘉祐中豐沛人缺食多用之時珍曰邢昺爾雅疏云榆有數十種今人不能盡别惟知莢榆白榆刺榆樃榆數者而已莢榆白榆皆大榆也有赤白二種白者名枌其木甚髙大未生葉時枝條間先生榆莢形狀似錢而小色白成串俗呼榆錢後方生葉似山茱萸葉而長尖􅕏潤澤嫩葉􅨘浸淘過可食故內則云堇荁枌榆兔藁􅎵瀡以滑之三月采榆錢可作羮亦可收至冬釀酒瀹過晒乾可為醬即榆仁醬也崔實月令謂之􅛙䤅音牟偷者是也山榆之莢名蕪荑與此相近但味稍苦耳諸榆性皆扇地故其下五穀不植古人春取榆火今人采其白皮為榆麵水調和香劑粘滑勝于膠漆承曰榆皮濕搗如糊用粘瓦石極有力汴洛人以石為碓嘴用此膠之白皮氣味甘平滑利無毒主治大小便不通利水道除邪氣久服斷穀輕身不飢其實尤良本經療腸胃邪熱氣消腫治小兒頭瘡痂疕别録通經脈搗涎傅癬瘡大明滑胎利五淋治齁喘療不眠甄權生皮搗和三年醋滓封暴患赤腫女人妬乳腫日六七易效孟詵利竅滲濕熱行津液消癰腫時珍發明詵曰高昌人多搗白皮為末和菜葅食甚美令人能食仙家長服服丹石人亦服之取利關節故也時珍曰榆皮榆葉性皆滑利下降手足太陽手陽明經藥也故人小便不通五淋腫滿喘嗽不眠經脈胎産諸證宜之本草十劑云滑可去著冬葵子榆白皮之屬蓋亦取其利竅滲濕熱消留著有形之物爾氣盛而壅者宜之若胃寒而虛者久服滲利恐泄真氣本經所謂久服輕身不飢蘇頌所謂榆粉多食不損人者恐非確論也附方舊九新九斷穀不飢榆皮檀皮為末日服數合救荒本草齁喘不止榆白皮隂乾焙為末每日旦夜用水五合末二錢煎如膠服食療本草久嗽欲死許明則有效方用厚榆皮削如指大長尺餘納喉中頻出入當吐膿血而愈古今録驗虛勞白濁榆白皮二升水三斗煮取五升分五服千金方小便氣淋榆枝石燕子煎水日服普濟方五淋澀痛榆白皮隂乾焙研每以二錢水五合煎如膠日二服普濟方渴而尿多非淋也用榆皮二片去黑皮以水一斗煮取五升一服三合日三服外臺祕要身體暴腫榆皮搗末同米作粥食之小便良僃急方臨月易産榆皮焙為末臨月日三服方寸匕令産極易别陳承本草説墮胎下血不止榆白皮當歸焙各半兩入生薑水煎服之普濟方胎死腹中或母病欲下胎榆白皮煮汁服二升子母祕録身首生瘡榆白皮末油和塗之蟲當出子母祕録火灼爛瘡榆白皮嚼塗之千金髓五色丹毒俗名逰腫犯者多死不可輕視以榆白皮末雞子白和塗之千金小兒蟲瘡榆皮末和豬脂塗綿上覆之蟲出立瘥千金方癰疽發背榆根白皮切清水洗搗極爛和香油傅之留頭出氣燥則以苦茶頻潤不粘更換新者將愈以桑葉嚼爛隨大小貼之口合乃止神效救急方小兒瘰癧榆白皮生搗如泥封之頻易必效方小兒秃瘡醋和榆白皮末塗之蟲當出産乳方葉氣味同上主治嫩葉作羹及􅨘食消水腫利小便下石淋壓丹石藏器時珍曰暴乾為末淡鹽水拌或炙或晒乾拌菜食之亦辛滑下水氣煎汁洗酒皶鼻同酸棗仁等分蜜丸日服治膽熱虛勞不眠時珍花主治小兒癎小便不利傷熱别録莢仁氣味辛平無毒主治作糜羹食令人多睡𢎞景主婦人𢃄下和牛肉作羮食藏器子醬似蕪荑能助肺殺諸蟲下氣令人能食消心腹間惡氣卒心痛塗諸瘡癬以陳者良孟詵榆耳見木耳樃榆拾遺集解藏器曰樃榆生山中狀如榆其皮有滑汁秋生莢如大榆時珍曰大榆二月生莢樃榆八月生莢可分别皮氣味甘寒無毒主治下熱淋利水道令人睡藏器治小兒解顱時珍蕪荑别録中品釋名莁荑爾雅無姑本經􅀢䕋音殿唐木名楩音偏時珍曰按説文云楩山扮榆也有刺實為蕪荑爾雅云無姑其實荑又云蕪荑蔱􅀢則此物乃莁樹之荑故名也恭曰􅀢䕋乃蔱􅀢二字之誤集解别録曰蕪荑生晉山川谷三月采實陰乾𢎞景曰今惟出高麗狀如榆莢氣臭如犱彼人皆以作醬食之性殺蟲置物中亦辟蛀但患其臭恭曰今延州同州者甚好志曰河東河西處處有之頌曰近道亦有之以太原者良大抵榆類而差小其實亦早成此榆乃大氣臭郭璞爾雅注云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑也采實隂乾用今人又多取作屑以芼五味惟陳者良人收藏之多以鹽漬則失氣味但宜食品不堪入藥珣曰按廣州記云生大秦國是波斯蕪荑也藏器曰蕪荑氣羶者良乃山榆仁也時珍曰蕪荑有大小兩種小者即榆莢也揉取仁醖為醬味尤辛人多以外物相和不可不擇去之入藥皆用大蕪荑别有種氣味辛平無毒權曰苦平珣曰辛溫詵曰作醬甚香美功尤勝于榆仁可少食之過多發熱為辛故也秋月食之尤宜人主治五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食本經逐寸白散腸中嗢嗢喘息别録主積冷氣心腹癥痛除䏎膚節中風淫淫如蟲行蜀本五臟皮膚肢節邪氣長食治五痔殺中惡蟲毒諸病不生孟詵治腸風痔瘻惡瘡疥癬大明殺蟲止痛治婦人子宫風虛孩子疳瀉冷痢得訶子豆蔲良李珣和豬脂搗塗熱瘡和蜜治濕癬和沙牛酪或馬酪治一切瘡張鼎附方舊三新七脾胃有蟲食即作痛面黃無色以石州蕪荑仁二兩和麵炒黃色為末非時米飲服二錢匕千金方制殺諸蟲生蕪荑生檳榔各四兩為末蒸餅丸梧子大每服二十丸白湯下本事方疳熱有蟲瘦悴久服充肥用榆仁一兩黃連一兩為末豬膽汁七枚和入碗內飯上蒸之一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸緑豆大每服五七丸至一二十九米飲下直錢氏小兒訣小兒蟲癎胃寒蟲上諸證危惡與癎相似用白蕪荑乾漆燒存性等分為末米飲調服一字至一錢杜壬方結隂下血蕪荑一兩搗爛紙壓去油為末以雄豬膽汁丸梧子大每服九丸甘草湯下日五服三日斷根普濟方脾胃氣泄久患不止蕪荑五兩搗末飯丸梧子大每日空心午飯前陳米飲下三十丸久服去三尸益神駐顔此方得之章鐐曽用得力續王紹顔傳信方膀胱氣急宜下氣用蕪荑搗和食鹽末等分以綿褁如棗大納下部或下惡汁並下氣佳外臺祕要嬰孩驚瘖風後失瘖不能言肥兒丸用蕪荑炒神麴炒麥蘖炒黃連炒各一錢為末豬膽汁打糊丸黍米大每服十丸木通湯下黃連能去心竅惡血全幼心鑑蟲牙作痛以蕪荑仁安蛀孔中及縫中甚效危氏得效方腹中鱉瘕平時嗜酒血入于酒則為酒鱉平時多氣血凝于氣則為氣鱉虛勞痼冷敗血雜痰則為血鱉搖頭掉尾如蟲之行上侵人咽下蝕人肛或附脅背或隱胸腹大則如鱉小或如錢治法惟用蕪荑炒煎服之兼用暖胃益血理中之類乃可殺之若徒事雷丸錫灰之類無益也見仁齋直指方蘇方木唐本草釋名蘇木時珍曰海島有蘇方木其地産此木故名今人省呼為蘇木耳集解恭曰蘇方木自南海崑崙來而交州愛州亦有之樹似菴羅葉苦榆葉而無澀抽條長丈許花黃子青熟黑其木人用染絳色珣曰按徐表南州記云生海畔葉似絳木若女貞時珍曰按嵇含南方草木狀云蘇方樹類槐黃花黑子出九真煎汁忌鐵器則色黯其木蠧之糞名曰紫納亦可用暹羅國人賤用如薪修治斆曰凡使去上粗皮并節若得中心文橫如紫角者號曰木中尊其力倍常百等須細銼重搗拌細梅樹枝蒸之從巳至申隂乾用氣味甘鹹平無毒杲曰甘鹹涼可升可降陽中隂也好古曰味甘而微酸辛其性平主治破血産後血脹悶欲死者水煮五兩取濃汁服唐本婦人血氣心腹痛月候不調及蓐勞排濃止痛消癰腫撲損淤血女人失音血噤赤白痢並後分急痛大明虛勞血癖氣壅滯産後惡露不安心腹攪痛及經絡不通男女中風口噤不語並宜細研乳頭香末方寸匕以酒煎蘇方木調服立吐惡物瘥海藥霍亂嘔逆及人常嘔吐用水煎服藏器破瘡瘍死血産後敗血李呆發明元素曰蘇木性涼味微辛發散表裏風氣宜與防風同用又能破死血産後血腫脹滿欲死者宜之時珍曰蘇方木乃三隂經血分藥少用則和血多用則破血附方舊一新五産後血運蘇方木三兩水五升煎取二升分服産後氣喘面黑欲死乃血入肺也用蘇木二兩水兩碗煮一碗入人參末一兩服隨時加減神效不可言耳胡氏方破傷風病蘇方木為散三錢酒服立效名獨聖散普濟方腳氣腫痛蘇方木鷺鷥藤等分細銼入定粉少許水二斗煎一斗五升先熏後洗普濟方偏墜腫痛蘇方木二兩好酒一壺煮熟頻飲立好集簡方金瘡接指凡指斷及刀斧傷用真蘇木末傅之外以蠶繭包縛完固數日如故攝生方烏木綱目釋名烏樠木樠音漫烏文木時珍曰本名文木南人呼文如樠故也集解時珍曰烏木生海南雲南南畨葉似棕櫚其木漆黑體重堅緻可為筋及器物有間道者嫩木也南人多以檕木染色偽之南方草物狀云文木樹高七八尺其色正黑如水牛角作馬鞭日南有之古今注云烏文木出波斯舶上將來烏文關然溫括婺等州亦出之皆此物也氣味甘鹹平無毒主治解毒又主霍亂吐利取屑研末溫酒服時珍樺木宋開寶釋名􅀈藏器曰晉中書令王珉傷寒身驗方中作􅀈字時珍曰畫工以皮燒煙熏紙作古畫字故名􅀈俗省作樺字也集解藏器曰樺木似山桃皮堪為燭宗奭曰皮上有紫黑花勻者褁鞍弓鐙時珍曰樺木生遼東及臨洮河州西北諸地其木色黃有小斑點紅色能收肥膩其皮厚而輕虛軟柔皮匠家用襯鞾裏及為刀靶之類謂之暖皮胡人尤重之以皮卷蠟可作燭點木皮氣味苦平無毒主治諸黃疸濃煮汁飲之良開寶煮汁冷飲主傷寒時行熱毒瘡特良即今豌豆瘡也藏器燒灰合他藥治肺風毒宗奭治乳癰時珍附方舊一新四乳癰初發腫痛結硬欲破一服即瘥以北來真樺皮燒存性研無灰酒溫服方寸匕即卧覺即瘥也沈存中靈苑方乳癰腐爛靴內年久樺皮燒灰酒服一錢日一服經唐瑤驗肺風毒瘡遍身瘡疥如癘及病丙穩禾疹瘙癢面上風刺婦人粉刺並用樺皮散主之樺皮燒灰四兩枳殼去穰燒四兩荆芥穗二兩炙草草半兩各為末杏仁水煮過去皮尖二兩研泥爛研勻每服二錢食後溫酒調下瘡疥甚者日三服和劑方小便熱短樺皮濃煮汁飲集簡方染黑鬚髮􅀈皮一片包側柏一枝燒煙熏香油碗內成煙以手抹在鬚鬢上即黑也多能鄙事脂主治燒之辟鬼邪藏器綟木拾遺釋名集解藏器曰生林澤山谷木文側戾故曰綟木氣味甘溫無毒主治風血羸瘦補腰腳益陽道宜浸酒飲藏器櫚木拾遺集解藏器曰出安南及南海用作床几似紫檀而色赤性堅好時珍曰木性堅紫紅色亦有花紋者謂之花櫚木可作器皿扇骨諸物俗作花梨誤矣氣味辛溫無毒主治産後惡露衝心癥瘕結氣赤白漏下並銼煎服李珣破血塊冷嗽煮汁熱服為枕令人頭痛性熱故也藏器棕櫚宋嘉祐釋名栟櫚時珍曰皮中毛縷如馬之騣凶鬯匕䰕故名棕俗作棕䰕音閭鬛也栟音并集解頌曰棕櫚出嶺南西川今江南亦有之木高一二丈無枝條葉大而圓有如車輪萃于樹杪其下有皮重疊褁之每皮一匝為一節二旬一采皮轉復生上六七月生黃白花八九月結實作房如魚子黑色九月十月采其皮用山海經云石翠之山其木多棕是也藏器曰其皮作繩入水千嵗不爛昔有人開塜得一索已生根嶺南有桄榔檳榔椰子冬葉虎散多羅等木葉皆與栟櫚相類時珍曰棕櫚廣川甚多令江南亦種之最難長初生葉如白及葉高二三尺則木端數葉大如扇上聳四散岐裂其莖三稜四時不凋其幹正直無枝近葉處有皮褁之每長一層即為一節幹身赤黑皆筋絡宜為鐘杵亦可旋為器物其皮有絲毛錯縱如織剝取縷解可織衣帽褥椅之屬大為時利每嵗必兩三剝之否則樹死或不長也三月于木端莖中出數黃苞苞中有細子成列乃花之孕也狀如魚腹孕子謂之棕魚亦曰棕笋漸長出苞則成花穗黃白色結實纍纍大如豆生黃熟黑甚堅實或云南方此木有兩種一種有皮絲可作繩一種小而無絲惟葉可作帚鄭樵通志以為王篲者非也王篲乃落帚之名即地膚子别有蒲葵葉與此相似而柔薄可為扇笠許慎説文以為棕櫚亦誤矣筍及子花氣味苦澀平無毒藏器曰有小毒戟人喉未可輕服珣曰溫有大毒不堪食時珍曰棕筍皆言有毒不可食而廣蜀人蜜煮醋浸以供佛寄逺蘇東坡亦有食棕笋詩乃制去其毒爾主治澀腸止瀉痢腸風崩中帶下及養血藏器附方新一大腸下血棕筍煮熟切片晒乾為末蜜湯或酒服一二錢集簡方皮氣味同子主治止鼻衄吐血破癥治腸風赤白痢崩中帶下燒存性用大明主金瘡疥癬生肌止血李珣發明宗奭曰棕皮燒黑治婦人血露及吐血須佐以他藥時珍曰棕灰性澀若失血去多淤滯已盡者用之切當所謂澀可去脫也與亂髮同用更良年久敗棕入藥尤妙附方新六鼻血不止棕櫚灰隨左右吹之黎居士方血崩不止棕櫚皮燒存性空心淡酒服三錢一方加煅白礬等分婦人良方血淋不止棕櫚皮半燒半炒為末每服二錢甚效衛生家寶方下血不止棕櫚皮半斤栝樓一箇燒灰每服二錢米飲調下百一選方水穀痢下棕櫚皮燒研水服方寸匕近效方小便不通棕皮毛燒存性以水酒服二錢即通利纍試甚驗攝生方橉木橉良創切拾遺釋名橝木音潭集解藏器曰橉木生江南深山大樹樹有數種取葉厚大白花者入藥白餘灰入染家用時珍曰此木最硬梓人謂之橉筋木是也木入染絳用葉亦可釀酒木灰氣味甘溫小毒主治卒心腹癥瘕堅滿痃癖淋汁八升釀米一斗待酒熟每溫飲半合漸增至一二盞即愈藏器後出肘柯樹拾遺釋名集解木奴珣曰按廣志云生廣南山谷波斯家用木為船舫者也白皮氣味辛平有小毒主治大腹水病采皮煮汁去滓煎令可丸如梧子大平旦空心飲下三丸須臾又一丸氣水並從小便出也藏器烏臼木唐本草釋名鴉臼時珍曰烏臼烏喜食其子因以名之陸龜蒙詩云行歇每依鴉臼影桃頻時見鼠姑心是矣鼠姑牡丹也或云其木老則根下黑爛成臼故得此名鄭樵通志言烏臼即拒栁者非集解恭曰生山南平澤樹高數仞葉似梨杏五月開細花黃白色子黑色藏器曰葉可染皂子可壓油然燈極明宗奭曰葉如小杏葉但微薄而緑色差淡子八九月熟初青後黑分為三瓣時珍曰南方平澤甚多今江西人種植采子蒸煮取脂澆燭貨之子上皮脂勝于仁也根白皮氣味苦微溫有毒大明曰性涼慢火炙乾黃乃用主治暴水癥結積聚唐本療頭風通大小便大明解蛇毒震亨發明時珍曰烏臼根性沉而降隂中之隂利水通腸功勝大戟一野人病腫滿氣壯令掘此根搗爛水煎服一碗連行數行而病平氣虛人不可用之此方出太平聖惠方言其功神聖但不可多服爾誠然附方舊一新九小便不通烏臼根皮煎湯飲之肘后方大便不通烏臼木根方長一寸劈破水煎半盞服之立通不用多喫其功神聖兼能取水斗門方二便關格二三日則殺人烏臼東南根白皮乾為末熱水服二錢先以芒硝二兩煎湯服取吐甚效肘後方水氣虛腫小便澀烏臼皮檳榔木通一兩為末每服二錢米飲下聖惠方腳氣濕瘡極癢有蟲烏臼根為末傅之少時有涎出良摘玄方尸注中惡心腹痛刺沉默錯亂用烏臼根皮煎濃汁一合調硃砂末一錢服之肘後方無硃砂永類方暗疔昏狂瘡頭凸紅桕樹根經行路者取二尺許去皮搗爛井華水調一盞服待㵼過以三角銀杏仁浸油搗合患處聖濟總録嬰兒胎瘡滿頭用水邉烏臼樹根晒研入雄黃末少許生油調搽經驗良方鼠莽砒毒烏臼根半兩擂水服之醫方大成鹽齁痰喘桕樹皮去粗搗汁和飛麵作餅烙熟早晨與兒喫三四箇待吐下鹽涎乃佳如不行熱茶催之摘玄方葉氣味同根主治食牛馬六畜肉生疔腫欲死者搗自然汁一二碗頓服得大利去毒即愈未利再服冬用根時珍桕油氣味甘涼無毒主治塗頭變白為黑服一合令人下利去隂下水氣炒子作湯亦可藏器塗一切腫毒瘡疥時珍附方新二膿泡疥瘡桕油二兩水銀二錢樟腦五錢同研頻入唾津不見星乃止以溫湯洗淨瘡以藥填入唐瑶經驗方小兒蟲瘡用舊絹作衣化桕油塗之與兒穿著次日蟲皆出油上取下爁之有聲是也别以油衣與穿以蟲盡為度效瀕海集簡方巴豆本經下品釋名巴菽本經剛子炮炙老陽子時珍曰此物出巴蜀而形如菽豆故以名之宋本草一名巴椒乃菽字傳訛也雷斆炮炙論又分緊小色黃者為巴有三稜色黑者為豆小而兩頭尖者為剛子云巴與豆可用剛子不可用殺人其説殊乖益緊小者是雌冇稜及兩頭尖者是雄雄者峻利雌者稍緩也用之得宜皆有功力用之失宜參术亦能為害况巴豆乎集解别録曰巴豆生巴郡川谷八月采陰乾用之去心皮頌曰今嘉州眉州戎州皆有之木高一二丈葉如櫻桃而厚大初生青色後漸黃赤至十二月葉漸稠二月復漸生四月舊葉落盡新葉齊生即花發成穗微黃色五六月結實作房生青至八月熟而黃類白豆蔲漸漸自落乃收之一房有二瓣一瓣一子或三子子仍有殼用之去殼戎州出者殼上有縱文隱起如線一道至兩三道彼土人呼為金線巴豆最為上等他處亦稀有時珍曰巴豆房似大風子殼而脆薄子及仁皆似海松子所云似白豆蔲者殊不類修治𢎞景曰巴豆最能㵼人新者佳用之去皮心熬令黃黑搗如膏乃和丸散斆曰凡用巴與豆敲碎以麻油并酒等煮乾研膏用每一兩用油酒各七合大明曰凡入丸散炒用不如去心膜換水煮五度各一沸也時珍曰巴豆有用仁者用殼者用油者有生用者麩炒者醋煮者燒存性者有研爛以紙包壓去油者謂之巴豆霜氣味辛溫有毒别録曰生溫熟寒有大毒普曰神農岐伯桐君辛有毒黃帝甘有毒李當之熱元素曰性熱味苦氣薄味厚體重而沉降隂也杲曰性熱味辛有大毒浮也陽中陽也時珍曰巴豆氣熱味辛生猛熟緩能吐能下能止能行是可升可降藥也别録言其熟則性寒張氏言其降李氏言其浮皆泥于一偏矣蓋此物不去膜則傷胃不去心則作嘔以沉香水浸則能升能降與大黃同用㵼人反緩為其性相畏也王充論衡云萬物合太陽火氣而生者皆有毒故巴豆辛熱有毒之才曰芫花為之使畏大黃黃連蘆笋菰笋藜蘆醬䜴冷水得火良惡蘘草與牽牛相反中其毒者用冷水黃連汁大豆汁解之主治傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹蕩練五臟六腑開通閉塞利水穀道去惡肉除鬼毒蟲疰邪物殺蟲魚本經療女子月閉爛胎金瘡膿血不利丈夫殺斑蝥蛇虺毒可練餌之益血脈令人色好變化與鬼神通别録治十種水腫痿痺落胎藥性通宣一切病泄壅滯除風補勞健脾開胄消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩丁腫日華導氣消積去臟腑停寒治生冷硬物所傷元素治瀉痢驚癎心腹痛疝氣風蝸耳聾喉痺牙痛通利開竅時珍發明元素曰巴豆乃斬關奪門之將不可輕用震亨曰巴豆去胃中寒積無寒積者勿用元素曰世以巴豆熱藥治酒病膈氣以其辛熱能開腸胃鬱結也但鬱結雖開而亡血液損其真隂從正曰傷寒風溼小兒瘡痘婦人産後用之下膈不死亦危奈何庸人畏大黃而不畏巴豆以其性熱而劑小耳豈知以蠟匱之猶能下後使人津液枯竭胸熱口燥耗却天真留毒不去他病轉生故下藥官以為禁藏器曰巴豆主癥癖痃氣痞滿積聚冷氣血塊宿食不消痰飲吐水取青黑大者每日空腹服一枚去殼勿令白膜破乃作兩片并四邉不得有損缺吞之以飲壓令下少頃腹內熱如火利出惡物雖利而不虛若久服亦不利人白膜破者不用好古曰若急治為水穀道路之劑去皮心膜油生用若緩治為消堅磨積之劑炒去煙令紫黑用可以通腸可以止㵼世所不知也張仲景治百病客忤備急丸用之時珍曰巴豆峻用則有戡亂劫病之功微用亦有撫緩調中之妙譬之蕭曹絳灌乃勇猛武夫而用之為相亦能輔治太平王海藏言其可以通腸可以止㵼此發千古之祕也一老婦年六十飲病溏泄已五年肉食油物生冷犯之即作痛服調脾升提止澀諸藥入腹則泄反甚延余診之脈沉而滑此乃脾胃久傷冷積凝滯所致王太僕所謂大寒凝內久利溏泄愈而復發綿歷歲年者法當以熱下之則寒去利止遂用蠟匱巴豆丸藥五十丸與服二日大便不通亦不利其泄遂愈自是每用治泄痢積滯諸病皆不㵼而病愈者近百人妙在配合得宜藥病相對耳茍用所不當用則犯輕用損隂之戒矣正誤𢎞景曰道家亦有煉餌法服之云可神仙人吞一枚便死而鼠食之三年重三十斤物性乃有相耐如此時珍曰漢時方士言巴豆錬餌令人色好神仙名醫别録采入本草張華博物志言鼠食巴豆重三十斤一謬一誣陶氏信為實語誤矣又言人吞一枚即死亦近過情今並正之附方舊十三新二十六一切積滯巴豆一兩蛤粉二兩黃蘗三兩為末水丸緑豆大每水下五丸醫學切問寒澼宿食不消大便閉塞巴豆仁一升清酒五升煮三日三夜研熟合酒微火煎令可丸如豌豆大每服一丸水下欲吐者二丸千金方水蟲大腹動搖水聲皮膚色黑巴豆九十枚去心皮熬黃杏仁六十枚去皮尖熬黃搗九小豆大水下一丸以利為度勿飲酒備張文仲急方飛尸鬼擊中惡心痛腹脹大便不通走馬湯用巴豆二枚去皮心熬黃杏仁二枚以綿包椎碎熱湯一合捻取白汁服之當下而愈量老小用之外臺食瘧積瘧巴豆去皮心二錢皂莢去皮子六錢搗丸緑豆大一服一丸冷湯下肘后方積滯泄痢腹痛裏急杏仁去皮尖巴豆去皮心各四十九箇同燒存性研泥溶蠟和丸緑豆大每服二三丸煎大黃湯下間日一服一加百草霜三錢劉守真宣明方氣痢赤白巴豆一兩去皮心熬研以熟豬肝丸緑豆大空心米飲下三四丸量人用此乃鄭獬侍御所傳方也經驗方瀉血不止巴豆一箇去皮以雞子開一孔納入紙封煨熟去豆食之其病即止虛人分作二服決效普濟方小兒下痢赤白用巴豆煨熟去油一錢百草霜二錢研末飛羅麵煮糊丸黍米大量人用之赤用甘草湯白用米湯赤白用薑湯下全幼心鑑夏月水瀉不止巴豆一粒針頭燒存性化蠟和作一丸倒流水下效危氏得方小兒吐瀉巴豆一箇針穿燈上燒過黃蠟一豆大燈上燒滴入水中同杵丸黍米大每用五七丸蓮子燈心湯下同上伏暑霍亂傷冷吐利煩濕水浸丹用巴豆二十五箇去皮心及油黃丹炒研一兩二錢半化黃蠟和丸緑豆大每服五七丸水浸少頃别以新汲水吞下和劑方乾霍亂病心腹脹痛不吐不利欲死巴豆一枚去皮心熱水研服得吐利即定也二便不通巴豆連油連黃各半兩搗作餅子先滴蔥鹽汁在臍內安餅子上灸二七壯取利為度家楊氏藏寒痰氣喘青橘皮一片展開入剛子一箇麻扎定火上燒存性研末薑汁和酒一鍾呷服天台李翰林用此治莫秀才到口便止神方也張杲醫説風濕痰病人坐密室中左用滚水一盆右用炭火一盆前置一桌書一册先將無油新巴豆四十九粒研如泥紙壓去油分作三餅如病在左令病人將右手仰置書上安藥于掌心以碗安藥上傾熱水入碗內水涼即換良久汗出立見神效病在右安左掌心一云隨左右安之保壽堂經驗方隂毒傷寒心結按之極痛大小便閉但出氣稍暖者急取巴豆十粒研入麵一錢捻作餅安臍內以小艾炷灸五壯氣逹即通此太師陳北山方也方仁齋直指解中毒藥巴豆去皮不去油馬牙硝等分研丸冷水服一彈丸廣利方喉痺垂死止有餘氣者巴豆去皮線穿內入喉中牽出即蘇千金纒喉風痺巴豆兩粒紙卷作角切斷兩頭以針穿孔內入喉中氣透即通勝金方傷寒舌出巴豆一粒去油取霜以紙撚卷內入鼻中舌即收上普濟方舌上出血如箸孔巴豆一枚亂髮雞子大燒研酒服聖惠中風口喎巴豆七枚去皮研左喎塗右手心右喎塗左手心仍以暖水一盞安藥上須臾即正洗去聖惠方小兒口瘡不能食乳剛子一枚連油研入黃丹少許剃去𩕄上髮貼之四邉起粟泡便用溫水洗去乃以菖蒲湯冉洗即不成瘡神效瑞竹堂方風蟲牙痛聖惠用巴豆一粒煨黃去殼蒜一瓣切一頭剜去中心入豆在內蓋定綿褁隨左右塞耳中經驗方用巴豆一粒研綿褁咬之三乂方針刺巴豆燈上燒令煙出熏痛處五次神效天絲入咽凡露地飲食有飛絲入上食之令人咽喉生瘡急以白礬巴豆燒灰吹入即愈瑣碎録耳卒聾閉巴豆一粒紙裹針刺孔通氣塞之取效經驗風瘙隱疹心下迷悶巴豆五十粒去皮水七升煮二升以帛染拭之隨手愈千金翼疥瘡搔癢巴豆十粒炮黃去皮心右順手研入酥少許膩粉少許抓破點上不得近目并外腎上如熏目著腎則以黃丹塗之甚妙千金方荷錢癬瘡巴豆仁三箇連油杵泥以生絹包擦日一二次三日痊好碑以正經驗方一切惡瘡巴豆三十粒麻油煎黑去豆以油調硫黃輕粉末頻塗取效普濟癰疽惡肉烏金膏解一切瘡毒及腐化瘀肉最能推陳致新巴豆仁炒焦研膏點痛處則解毒塗瘀肉上則自化加乳香少許亦可若毒深不能收斂者宜作撚紝之不致成痛外科精義疣痣黑子巴豆一錢石灰炒過人言一錢糯米五分炒研點之怪症方箭鏃入肉不可拔出者用新巴豆仁略熬與蜣蜋同研塗之斯須痛定微癢忍之待極癢不可忍便撼拔動之取出速以生肌膏傅之而痊亦治瘡腫夏侯鄲在潤州得此方後至洪州旅舍主人妻病背瘡呻吟不已鄲用此方試之即痛止也經驗方小兒痰喘巴豆一粒杵爛綿褁塞鼻男左女右痰即自下龔氏醫鑑牛疫動頭巴豆二粒生麻油三兩漿水半升和灌之賈相公牛經油主治中風痰厥氣厥中惡喉痺一切急病咽喉不通牙關緊閉以研爛巴豆綿紙包壓取油作撚點燈吹滅熏鼻中或用熱煙刺入喉內即時出涎或惡血便蘇又舌上無故出血以熏舌之上下自止時珍殼主治消積滯治瀉痢時珍附方新二一切瀉痢脈浮洪者多日難已脈微小者服之立止名勝金膏巴豆皮楮葉同燒存性研化蠟丸緑豆大每甘草湯下五丸劉河間宣明方痢頻脫肛黑色堅硬用巴豆殼燒灰芭蕉自然汁煮入朴硝少許洗軟用真麻油點火滴于上以枯礬龍骨少許為末摻肛頭上以芭蕉葉托入方危氏得效樹根主治癰疽發背腦疽鬢疽大患掘取洗搗敷患處留頭妙不可言收根隂乾臨時水搗亦可時珍誠出楊經驗方大風子補遺釋名時珍曰能治大風疾故名集解時珍曰大風子今海南諸蕃國皆有之按周逹觀真臘記云大風乃大樹之子狀如椰子而圓其中有核數十枚大如雷丸子中有仁白色久則黃而油不堪入藥仁修治時珍曰取大風子油法用子三斤去殼及黃油者研極爛瓷器盛之封口入滚湯中蓋鍋密封勿令透氣文武火煎至黑色如膏名大風油可以和藥氣味辛熱有毒主治風癬疥癩楊梅諸瘡攻毒殺蟲時珍發明震亨曰粗工治大風病佐以大風油殊不知此物性熱有燥痰之功而傷血至有病將愈而先失明者時珍曰大風油治瘡有殺蟲劫毒之功蓋不可多服用之外塗其功不可沒也附方新五大風諸癩大風子油一兩苦參末三兩入少酒糊丸梧子大每服五十丸空心溫酒下仍以苦參湯洗之普濟方大風瘡裂大風子燒存性和麻油輕粉研塗仍以殼煎湯洗之生嶺南衛方楊梅惡瘡方同上風刺赤鼻大風子仁木鱉子仁輕粉硫黃為末夜夜唾調塗之手背皴裂大風子搗泥塗之壽域海紅豆海藥釋名集解珣曰按徐表南州記云生南海人家園圃中大樹而生葉圓有莢近時蜀中種之亦成時珍曰樹高二三丈葉似梨葉而圓按宋祁益部方物圖云紅豆葉如冬青而圓澤春開花白色結莢枝間其子纍纍而綴珠若大紅豆而扁皮紅肉白以似得名蜀人用為果飣豆氣味微寒有小毒主治人黑皮皯􅍍花癬頭面遊風宜入面藥及澡豆李珣相思子綱目釋名紅豆時珍曰按古今詩話云相思子圓而紅故老言昔有人歿于邉其妻思之哭于樹下而卒因以名之此與韓憑塜上相思樹不同彼乃連理梓木也或云即海紅豆之類未審的否集解時珍曰相思子生嶺南樹髙丈餘白色其葉似槐其花似皂莢其莢似扁豆其子大如小豆半截紅色半截黑色彼人以嵌首飾假公路北戶録言有蔓生用子收龍腦香相宜令香不耗也氣味苦平有小毒吐人主治通九竅去心腹邪氣止熱悶頭痛風痰瘴瘧殺腹臟及皮膚內一切蟲除蠱毒取二七枚研服即當吐出時珍附方新三瘴瘧寒熱相思子十四枚水研服取吐立瘥千金貓鬼野道眼見貓鬼及耳有所聞用相思子萆麻子巴豆各一枚硃砂末蠟各四銖合搗丸如麻子大服之即以灰圍患人面前著一斗灰火吐藥入火中沸即畫十字于火上其貓鬼者死也千金方解中蠱毒必效方用未鑽相思子十四枚杵碎為末溫水半盞和服欲吐抑之勿吐少頃當大吐非常輕者但服七枚神效要外臺祕豬腰子綱目集解時珍曰豬腰子生柳州蔓生結莢內子大若豬之內腎狀酷似之長三四寸色紫而肉堅彼人以充土宜饋送中土氣味甘微辛無毒主治一切瘡毒及毒箭傷研細酒服一二錢并塗之時珍石瓜綱目集解時珍曰石瓜出四川峨眉山中及芒部地方其樹修幹樹端挺葉肥滑如冬青狀似桑其花淺黃色結實如綴長而不圓壳裂則子見其形似瓜其堅如石者液黃色氣味苦平無毒主治心痛煎汁洗風痺時珍本草綱目卷三十五下
