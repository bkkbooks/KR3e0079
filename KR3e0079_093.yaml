body:
  text: 本草綱目卷三十九目録蟲部李時珍曰蟲乃生物之微者其類甚繁故字從三蟲會意按攷工記云外骨内骨却行仄行連行紆行以脰鳴注味同鳴旁鳴翼鳴腹鳴胸鳴者謂之小蟲之屬其物雖微不可與麟鳯龜龍為伍然有羽毛鱗介倮之形胎卵風濕化生之異蠢動含靈各具性氣録其功明其毒故聖人辨之况蜩􅢮蟻蚳可供饋食者見於禮記蜈蠶蟾蠍可供七劑載在方書周官有庶氏除毒蠱剪氏除蠧物蟈氏去鼃黽赤氏除牆壁貍蟲蠼螋之屬壺涿氏除水蟲狐􅈮之屬則聖人之於微𤨏㒺不致慎學者可不究夫物理而察其良毒乎於是集小蟲之有功有害者為蟲部凡一百零六種分為三類曰卵生曰化生曰濕生舊本蟲魚部三品共二百三十六種今析出鱗介二部併入六種移八種入禽獸服器部自有名未用移入六種木部移入二種神農本草經二十九種梁陶𢎞景註名醫别録一十七種梁陶𢎞景註唐本草一種唐蘓恭本草拾遺二十四種唐陳藏器海藥本草一種唐李珣開寳本草二種宋馬志圖經本草二種宋蘓頌日華本草一種宋人大明證類本草二種宋唐慎微本草會編一種明汪機本草綱目二十六種明李時珍附註魏李當之藥録宋雷斆炮灸吴普本草藥對齊徐之才唐甄權藥性繁唐楊損之删唐孫思邈千金孟詵食療南唐陳士良食性宋掌禹錫補註蜀韓保昇重註冦宗奭衍義張元素珍珠囊汪好古湯液元李杲法象朱霍亨補遺吴瑞日用物明汪頴食蟲之一卵生類上二十三種蜂蜜本經附靈雀蜜蠟本經蜜蜂本經土蜂别録大黄蜂别録露蜂房本經竹蜂拾遺赤翅蜂拾遺獨脚蜂拾遺蠮蜂本經黄即果蠃雄蟲附蟲白蠟會編紫鈃唐本梗即紫五倍子開寳煎百藥螳螂桑螵蛸本經雀甕本經子即天漿蠶本經原蠶别録蠶即晚石蠶本經虎雲師雨附九香蟲綱目海蠶海藥雪蠶綱目枸杞蟲拾遺蘹香蟲綱目右附方舊六十四新二百零五本草綱目卷三十九目録
