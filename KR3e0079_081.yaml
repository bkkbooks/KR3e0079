body:
  text: 本草綱目卷三十三明李時珍撰果之五蓏類九種内附一種甜𤓰宋嘉祐校正自菜部移入此併入本經𤓰蔕釋名甘𤓰唐本果𤓰時珍曰𤓰字篆文象𤓰在鬚蔓間之形甜𤓰之味甜于諸𤓰故獨得甘甜之稱舊列菜部誤矣按王禎云𤓰類不同其用有二供果者為果𤓰甜𤓰西𤓰是也供菜者為菜𤓰胡𤓰越𤓰是也在木曰果在地曰蓏大曰𤓰小曰瓞其子曰坻其肉曰瓤其跗曰環謂脱花處也其蒂曰疐謂繫蔓處也禮記為天子削𤓰及𤓰祭皆指果𤓰也本草𤓰蒂亦此𤓰之蔕也集解别録曰𤓰蔕生嵩高平澤七月七日采隂乾頌曰𤓰蔕即甜𤓰蔕也處處有之園圃所蒔有青白二種子色皆黄入藥當用早青𤓰蔕為良時珍曰甜𤓰北土中州種蒔甚多二三月下種延蔓而生葉大數寸五六月花開黄色六七月𤓰熟其類最繁有團有長有尖有扁大或徑尺小或一捻其稜或有或無其色或青或緑或黄斑糝斑或白路黄路其瓤或白或紅其子或黄或赤或白或黒按王禎農書云𤓰品甚多不可枚舉以狀得名則有龍肝虎掌兎頭狸首羊髓蜜筒之稱以色得名則有烏𤓰白團黄㼐白㼐小青大斑之别然其味不出乎甘香而已廣志惟以遼東燉煌廬江之𤓰為勝然𤓰州之大𤓰陽城之御𤓰西蜀之温𤓰永嘉之寒𤓰未可以優劣論也甘肅甜𤓰皮瓤皆甘勝餹蜜其皮暴甘猶美浙中一種隂瓜種于隂處熟則色黄如金膚皮稍厚藏之至春食之如新此皆種藝之功不必拘以土地也甜𤓰子曝裂取仁可充果食凡𤓰最畏麝氣觸之甚至一蔕不収𤓰瓤氣味甘寒滑有小毒大明曰無毒思邈曰多食發黄疸令人虛羸多忘解藥力病後食多或反胃脚氣人食之患永不除也詵曰多食令人隂下濕痒生瘡動宿令癥癖病破腹發虛熱令人惙惙氣弱脚手無力少食則可龍魚河圖云凡𤓰有兩鼻兩蔕者殺人五月𤓰沉水者食之得冷病終身不瘥九月被霜者食之冬病寒熱與油餅同食發病多食𤓰作脹者食鹽花即化𢎞景曰食𤓰多即入水自漬便消時珍曰張華愽物志言人以冷水漬至膝可頓啖𤓰至數十枚漬至項其啖轉多水皆作𤓰氣也則水浸消𤓰亦物性也𤓰最忌麝與酒凡食𤓰過多但飲酒及水服麝香尤勝於食鹽漬水也主治止渴除煩熱利小便通三焦間壅塞氣治口鼻瘡嘉祐暑月食之永不中暑宗奭發明宗奭曰甜𤓰雖解暑氣而性冷消損陽氣多食未有不下利者夏月多食深秋作痢最為難治惟以皮蜜浸收之良皮亦可作羮食𢎞景曰凡𤓰皆冷利早青者尤甚熟𤓰除瓤食之不害人時珍曰𤓰性最寒曝而食之尤冷故稽聖賦云𤓰寒於曝油冷於煎此物性之異也王冀洛都賦云𤓰則消暑蕩悁解渴療饑又竒效良方云昔冇男子病膿血惡痢痛不可忍以水浸甜𤓰食數枚即愈此亦消暑之驗也𤓰子仁修治斆曰凡收得曝乾杵細馬尾篩篩過成粉以紙三重褁壓去油用不去油其力短也西𤓰子仁同氣味甘寒無毒主治腹内納聚破潰膿血最為腸胃脾内壅要藥别録止月經太過研末去油水調服藏器經炮炙論序曰血泛過飲調𤓰子炒食補中宜人孟詵清肺潤腸和中止渴時珍附方舊一新二口臭用甜𤓰子杵末蜜和為丸每旦潄口後含一丸亦可貼齒千金腰腿疼痛甜𤓰子三兩酒浸十日為末每服三錢空心酒下日三壽域神方腸癰已成小腹腫病小便似淋或大便難澀下膿用甜𤓰子一合當歸炒一兩蛇退皮一條㕮咀每服四錢水一盞半煎一盞食前服利下惡物為妙聖惠𤓰蔕本經上品釋名𤓰丁千金苦丁香象形修治斆曰凡使勿用白𤓰蔕要取青緑色𤓰氣足時其蔕自然落在蔓上采得繫屋東有風處吹乾用宗奭曰此甜𤓰蔕也去𤓰皮用蔕約半寸許曝極乾臨時研用時珍曰按唐珤云甜𤓰蔕以團而短𤓰團𤓰者良若香甜𤓰及長如瓠子者皆供菜之𤓰其蔕不可用也氣味苦寒有毒大明曰無毒主治大水身面四肢浮腫下水殺蠱毒欬逆上氣及食諸果病在胸腹中皆吐下之本經去鼻中瘜肉療黄疸别録治腦寒熱齆眼昏吐痰大明吐風熱痰涎治風眩頭痛癲癎喉痺頭目有濕氣時珍得麝香細辛治鼻不聞香臭好古發明張機曰病如桂枝證頭不痛項不强寸脈微浮胸中痞哽氣上衝咽喉不得息者此為胸中有寒也當吐之太陽中膈身熱頭痛而脈微弱此夏月傷冷水水行皮中也宜吐之少陽病頭痛發寒熱脈緊不大是膈上有痰也宜吐之病胸上諸實鬱鬱而痛不能食欲人按之而反有濁唾下利日十餘行寸口脈微弦者當吐之懊憹煩躁不得眠末經汗下者謂之實煩當吐之宿食在上脘者當吐之並宜以𤓰蔕散主之惟諸亡血虛家不可與𤓰蔕散也成無已曰高者越之在上者涌之故越以𤓰蔕香䜴之苦涌以赤小豆之酸酸苦涌泄為陰也杲曰難經云上部有脈下部無脈其人當吐不吐者死此飲食内傷填塞胸中食傷太陰風木生發之氣伏于下宜𤓰蔕散吐之素問所謂本鬱則逹之也吐去上焦有形之物則本得舒暢天地交而萬物通矣若尺脈絶者不宜用此恐損真元令人胃氣不復也宗奭曰此物吐涎甚不損人全勝石緑硇砂輩也震亨曰𤓰蔕性急能損胃氣胃弱者宜以他藥代之病後産後尤宜深戒時珍曰𤓰蔕乃陽明經除濕熱之藥故能引去胸脘痰涎頭日濕氣皮膚水氣黄疸濕熱諸證凡胃弱人及病後産後用吐藥皆宜加慎何獨𤓰蔕為然附方舊七新十四𤓰蔕散治證見上其方用𤓰蔕二錢半熬黄赤小豆二錢半為末每用一錢以香䜴一合熱湯七合煮糜去滓和服少少加之快吐乃止仲景傷寒論太陽中暍身熱頭痛而脈微弱此夏月傷冷水水行皮中所致𤓰蔕二七箇水一升煮五合頓服取吐金匱要畧風涎暴作氣塞倒仆用𤓰蔕為末每用一二錢膩粉一錢匕以水半合調灌良乆涎自出不出含沙餹一塊下咽即涎出也㓂氏衍義諸風諸癎諸風膈痰諸癎涎涌用𤓰蔕炒黄為末量人以酸虀水一盞調下取吐風癎加蠍稍半錢濕氣腫滿加赤小豆末一錢有䖝加狗油五七㸃雄黄一錢甚則加芫花半錢立吐䖝出東垣活法機要風癎喉風欬𠻳及遍身風疹急中涎潮等證不拘大人小兒此藥不大吐逆只出涎水𤓰蔕為末壯年服一字老少半字早晨井華水下一食頃含沙餹一塊良乆涎如水出年深者出墨涎有塊布水上也涎盡食粥一兩日如吐多人困甚即以麝香泡湯一盞飲之即止經驗後方急黄喘息心上堅硬欲得水喫者𤓰蔕二小合赤小豆一合研末暖漿水五合服方寸匕一炊乆當吐不吐再服吹鼻取水亦可傷寒類要遍身如金𤓰蔕四十九枚丁香四十九枚乾鍋内燒存性為末毎用一字吹鼻取出黄水亦可揩牙追涎經驗方熱病發黄𤓰蒂為末以大豆許吹鼻中輕則半日重則一日流取黄水乃愈千金翼黄疸癊黄並取𤓰蔕丁香赤小豆各七枚為末吹豆許入鼻少時黄水流出隔日一用瘥乃止孟詵食療身面浮腫方同上十種蠱氣苦丁香為末棗肉和丸梧子大每服三十丸棗湯下甚效瑞竹堂方濕熱頭痛𤓰蔕末一字㗜入鼻中口含冷水取出黄水愈活人書瘧疾寒熱𤓰蒂二枚水半盞浸一宿頓服取吐愈千金發狂欲走𤓰蔕末井水服一錢取吐即愈聖惠方大便不通𤓰蒂七枚研末綿褁塞入下部即通必效方鼻中瘜肉聖惠用陳𤓰蒂末吹之日三次瘥乃已猪又方𤓰蒂末白礬末各半錢綿褁塞之或以脂和梃子塞之日一換後又方青甜𤓰蒂二枚雄黄麝香半分為末先抓破貼之日三次湯液用𤓰蒂十四箇丁香一箇黍米四十九粒研末口中含水㗜鼻取下乃止風熱牙痛𤓰蒂七枚炒研麝香少許和之綿褁咬定流涎聖濟總録雞屎白秃甜𤓰蔓連蒂不拘多少以水浸一夜砂鍋熬取苦汁去滓再熬如餳盛收毎剃去痂疕洗浄以膏一盞加半夏末二錢薑汁一匙狗膽汁一枚和勻塗之不過三上忌食動風之物儒門事親齁喘痰氣苦丁香三箇為末水調服吐痰即止集朱氏驗方蔓陰乾主治女人月經斷絶同使君子各半兩甘草六錢為末每酒服二錢花主治心痛欬逆别録葉主治人無髪擣汁塗之即生嘉祐補中治小兒疳及打傷損折為末酒服去瘀血孟詵附方新一面上黶子七月七日午時取𤓰葉七枚直持入北堂中向南立逐枚拭黶即滅去也畢淮南萬術西𤓰日用釋名寒𤓰見下集解瑞曰契丹破囘紇始得此種以牛糞覆而種之結實如斗大而圓如匏色如青玉子如金色或黒麻色北地多有之時珍曰按胡嶠䧟盧記言嶠征囘紇得此種歸名曰西𤓰則西𤓰自五代時始入中國今則南北皆有而南方者味稍不及亦甜𤓰之類也二月下種蔓生花葉皆如甜𤓰七八月實熟有圍及徑尺者長至二尺者其稜或有或無其色或青或緑其瓤或白或紅紅者味尤勝其子或黄或紅或黒或白白者味更劣其味有甘有淡有酸酸者為下陶𢎞景註𤓰蔕言永嘉有寒𤓰甚大可藏至春者即此也葢五代之先𤓰種已入浙東但無西𤓰之名未遍中國爾其𤓰子曝裂取仁生食炒熟俱佳皮不堪啖亦可蜜煎醬藏穎曰一種楊溪𤓰秋生冬熟形略長扁而大瓤色如臙脂味勝可留至次年云是異人所遺之種也𤓰瓤氣味甘淡寒無毒瑞曰有小毒多食作吐利胃弱者不可食同油餅食損脾時珍曰按延壽書云北人禀厚食之猶慣南人稟薄多食易至霍亂冷病終身也又按相感志云食西𤓰後食其子即不噫𤓰氣以𤓰劃破曝日中少頃食即冷如水也得酒氣近糯米即易爛貓踏之即易沙主治消煩止渴解暑熱吳瑞療喉痺汪穎寛中下氣利小水治血痢解酒毒寗原含汁治口瘡震亨發明穎曰西𤓰性寒解熱有天生白虎湯之號然亦不宜多食時珍曰西𤓰甜𤓰皆屬生冷世俗以為醍醐灌頂甘露洒心取其一時之快不知其傷脾助濕之害也真西山衛生歌云𤓰桃生冷宜少飱免致秋來成瘧痢是矣又李廷飛延夀書云防州太守陳逢原避暑食𤓰過多至秋忽腰腿痛不能舉動遇商助教療之乃愈此皆食𤓰之患也故集書于此以為鑑戒云人洪忠宜松漠紀聞言有人苦目病或令以西𤓰切片暴乾日日服之遂愈由其性冷降火故也皮氣味甘凉無毒主治口舌唇内生瘡燒研噙之震亨附方新二閃挫腰痛西𤓰㫖皮陰乾為末塩酒調服三錢攝生衆妙方食𤓰過傷𤓰皮煎湯解之諸𤓰皆同事林廣記𤓰子仁氣味甘寒無毒主治與甜𤓰仁同時珍葡萄本經上品釋名蒲桃古字草龍珠時珍曰葡萄漢書作蒲桃可以造酒人酺飲之則醄然而醉故有是名其圓者名草龍珠長者名馬乳葡萄白者名水晶葡萄黒者名紫葡萄漢書言張騫使西域還始得此種而神農本草已有葡萄則漢前隴西舊有但未入闗耳集解别録曰葡萄生隴西五原燉煌山谷𢎞景曰魏國使人多賫來南方狀如五味子而甘美可作酒云用藤汁殊美北人多肥徤耐寒葢食斯乎不植淮南亦如橘之變于河北也人説即是此間蘡薁恐亦如枳之與橘耶㳟曰蘡薁即山葡萄苗葉相似亦堪作酒葡萄取子汁釀酒陶云用藤汁謬矣頌曰今河東及近汴州郡皆有之苗作藤蔓而極長太盛者一二本綿被山谷間花極細而黄白色其實有紫白二色有圓如珠者有長似馬乳者有無核者皆七月八月熟取汁可釀酒按史記云大宛以葡萄釀酒富人藏酒萬餘石乆者十數年不敗張騫使西域得其種還中國始有葢此果之最珍者今太原尚作此酒寄逺也其根莖中空相通暮溉其根而晨朝水浸子中矣故俗呼其苗為木通以利小腸江東出一種實細而酸者名蘡薁子宗奭曰叚成式言葡萄有黄白黒三種唐書言波斯所出者大如雞卵此物最難乾不乾不可收不問土地但收皆可釀酒時珍曰葡萄折藤壓之最易生春月萌苞生葉頗似括樓葉而有五尖生鬚延蔓引數十丈三月開小花成穗黄白色仍連着實星編珠聚七八月熟有紫白二色西人及太原平陽皆作葡萄乾貨之四方蜀中有綠葡萄熟時色緑雲南所出者大如棗味尤長西邊有瑣瑣葡萄大如五味子而無核按物類相感志云甘草作釘鍼葡萄立死以麝香入葡萄皮内則葡萄盡作香氣其愛憎異于他草如此又言其藤穿過棗樹則實味更美也三元延壽書言葡萄架下不可飲酒恐䖝屎傷人實氣味甘平濇無毒詵曰甘酸温多食令人卒煩悶眼暗主治筋骨濕痺益氣倍力强志令人肥健耐饑忍風寒乆食輕身不老延年可作酒本經逐水利小便别錄除腸間水調中治淋甄權時氣痘瘡不出食之或研酒飲甚效蘇頌發明頌曰按魏文帝詔羣臣曰蒲桃當夏末涉秋尚有餘暑醉酒宿酲掩露而食甘而不飴酸而不酢冷而不寒味長汁多除煩解渴又釀為酒甘于麴蘗善醉而易醒他方之果寜有匹之者乎震亨曰葡萄屬土有水與木火東南人食之多病熱西北人食之無恙葢能下走滲道西北人禀氣厚故耳附方新三除煩止渴生葡萄搗濾取汁以瓦器熬稠入熟蜜少許同收㸃湯飲甚良居家必用熱淋澀痛葡萄擣取自然汁生藕擣取自然汁生地黄搗取自然汁白沙蜜各五合每服一盞石器温服聖惠方胎上衝心葡萄煎湯飲之即下聖惠方根及藤葉氣味同實主治煮濃汁細飲止嘔噦及霍亂後惡心孕婦子上衝心飲之即下胎安孟詵治腰脚肢腿痛煎湯淋洗之良又飲其汁利小便通小腸消腫滿時珍附方新一水腫葡萄嫩心十四箇螻蛄七箇去頭尾同研露七日曝乾為末每服半錢淡酒調下暑月尤佳也潔古保命集蘡薁音嬰郁綱目校正原附葡萄下今分出釋名燕薁毛詩嬰舌廣雅山葡萄唐註野葡萄俗名藤名木龍時珍曰名義未詳集解㳟曰蘡薁蔓生苗葉與葡萄相似而小亦有莖大如椀者冬月惟葉凋而藤不死藤汁味甘子味甘酸即千歳虆也頌曰蘡薁子生江東實似葡萄細而味酸亦堪為酒時珍曰蘡薁野生林墅間亦可挿植蔓葉花實與葡萄無異其實小而圓色不甚紫也詩云六月食薁即此其莖吹之氣出有汁如通草也正誤藏器曰蘇恭註千歳虆即是蘡薁妄言也千歲虆藤如葛而葉背白子赤可食蘡薁藤斫斷通氣更無甘汁詳見草部千歲虆下時珍曰蘇恭所説蘡薁形狀甚是但以為千歲虆則非矣實氣味甘酸平無毒主治止渴悦色益氣蘇恭藤氣味甘平無毒主治噦逆傷寒後嘔噦搗汁飲之良蘇恭止渴利小便時珍附方新三嘔啘厥逆蘡薁藤煎汁呷之肘後方目中障翳蘡薁藤以水浸過吹氣取汁滴入目中去熱翳赤白障拾遺本草五淋血淋木龍湯用木龍即野葡萄藤也竹圍荽淡竹葉麥門冬連根苖紅棗肉燈心草烏梅當歸各等分煎湯代茶飲百一選根氣味同藤主治下焦熱痛淋閟消腫毒時珍附方新四男婦熱淋野葡萄根七錢葛根三錢水一鍾煎七分入童子小便三分空心温服秘乾坤韞女人腹痛方同上一切腫毒赤龍散用野葡萄根晒研為末水調塗之即消也儒門事親方赤遊風腫忽然腫痒不治則殺人用野葡萄根搗如泥塗之即消要通變法獼猴桃宋開寶釋名獼猴梨開寶藤梨同上陽桃日用木子時珍曰其形如梨其色如桃而獼猴喜食故有諸名閩人呼為陽桃集解志曰生山谷中藤暑樹生葉圓有毛其實形似雞卵大其皮褐色經霜始甘美可食皮堪作紙宗奭曰今陜西永興軍南山甚多枝條柔弱高二三丈多附木而生其子十月爛熟色淡綠生則極酸子繁細其色如芥子淺山傍道則有子者深山則多為猴所食矣實氣味酸甘寒無毒藏器曰鹹酸無毒多食冷脾胃動洩澼宗奭曰有實熱者宜食之太過則令人臟寒作洩主治止暴渴解煩熱壓丹石下淋石熱壅開寶和詵曰並宜取瓤蜜作煎食調中下氣主骨節風癱緩不隨長年白髪野雞内痔病藏器藤中汁氣味甘滑寒無毒主治反胃和生薑汁服之又下石淋藏器枝葉主治殺蟲煮汁飼狗療瘑疥開寶甘蔗音柘品别錄中釋名竿蔗草木狀藷音遮草時珍曰按野史云吕惠卿言凡皆正生嫡出惟蔗側種根上庻出故字從庻也嵇含作竿蔗謂其莖如竹竿也離騷漢書皆作柘字通用也藷字出許慎説文葢蔗音之轉也集解𢎞景曰蔗出江東為勝廬陵亦有好者廣州一種數年生皆大如竹長丈餘取汁為沙餹甚益人又冇荻蔗節疎而細亦可噉也頌曰今江浙閩廣湖南蜀川所生大者亦髙丈許其葉似荻有二種荻蔗莖細短而節疎但堪生噉亦可煎稀餹竹蔗莖粗而長可笮汁為沙餹泉福吉廣諸州多作之鍊沙餹和牛乳為乳餹惟蜀川作之南人販至北地者荻蔗多而竹蔗少也詵曰蔗有赤色者名崑崙蔗白色者名荻蔗竹蔗以蜀及嶺南者為勝江東雖有而劣于蜀産㑹稽所作乳餹殆勝于蜀時珍曰蔗皆畦種叢生最困地力莖似竹而内實大者圍數寸長六七尺根下節密以漸而疎抽葉如蘆葉而大長三四尺扶疎四埀八九月收莖可留過春充果食按王灼餹霜譜云蔗有四色曰杜蔗即竹蔗也綠嫩薄皮味極醇厚專用作霜曰西蔗作霜色淺曰芀蔗亦名蠟蔗即荻蔗也亦可作沙餹曰紅蔗亦名紫蔗即崑崙蔗也止可生啖不堪作餹凡蔗榨漿飲固佳又不若咀嚼之味雋永也蔗氣味甘平濇無毒大明曰冷詵曰共酒食發痰瑞曰多食發虛熱動䘐血相感志云同榧子食則渣軟主治下氣和中助脾氣利大腸别錄利大小腸消痰止渴除心胸煩熱解酒毒大明止嘔噦反胃寛胸膈時珍發明時珍曰蔗脾之果也其漿甘寒能瀉火熱素問所謂甘溫除大熱之意煎鍊成餹則甘温而助濕熱所謂積溫成熱也蔗漿消渴解酒自古稱之故漢書郊祀歌云百味㫖酒布蘭生泰尊柘漿析朝酲唐王維櫻桃詩云飽食不須愁内熱大官還有蔗漿寒是矣而孟詵乃謂共酒食發痰者豈不知其有解酒除熱之功耶日華子大明又謂沙餹能解酒毒則不知既經煎鍊便能助酒為熱與生漿之性異矣按眺氏客話云甘草遇火則熱麻油遇火則冷甘蔗煎飴則熱水成湯則冷此物性之異醫者可不知乎又野史云盧絳中病痁疾疲瘵忽夢白衣婦人云食蔗可愈及旦買蔗數挺食之翌日疾愈此亦助脾和中之騐與附方舊三新五發熱口乾小便赤澀取甘蔗去皮嚼汁嚥之飲漿亦可外臺秘要痰喘氣急方見山藥反胃吐食朝食暮吐暮食朝吐旋旋吐者用甘蔗汁七升生薑汁一升和勻日日細呷之梅師方乾嘔不息蔗汁温服半升日三次入薑汁更佳肘後方痁瘧疲瘵見前眼暴赤腫磣澀疼痛甘蔗汁二合黄連半兩入銅器内慢火養濃去滓㸃之濟普虛熱欬𠻳口乾涕唾用甘蔗汁一升半青粱米四合煮粥日食二次極潤心肺董氏方小兒口疳蔗皮燒研摻之簡便方滓主治燒存性研末烏桕油調塗小兒頭瘡白秃頻塗取瘥燒烟勿令入人目能使暗明時珍沙餹唐本草集解恭曰波餹出蜀地西戎江東並有之笮甘蔗汁煎成紫色瑞曰稀者為蔗餹乾者為沙餹毬者為毬餹餅者為餹餅沙餹中凝結如石破之如沙透明白者為餹霜時珍曰此紫沙餹也法出西域唐太宗始遣人傳其法入中國以蔗汁過樟木槽取而煎成清者為蔗餳凝結有沙者為沙餹漆甕造成如石如霜如氷者為石蜜為餹霜為氷餹也紫餹亦可煎化印成鳥獸果物之狀以充席獻今之貨者又多雜以米餹諸物不可不知氣味甘寒無毒恭曰冷利過于石蜜詵曰性溫不冷多食令人心痛生長䖝消肌肉損齒發疳䘌與鯽魚同食成疳䖝與葵同食生流澼與笋同食不消成癥身重不能行主治心腹熱脹口乾渴唐本潤心肺大小腸熱解酒毒臘月瓶封窖糞坑中患天行熱狂者絞汁服甚良大明和中助脾緩肝氣時珍發明宗奭曰蔗汁清故費煎鍊致紫黒色今醫家治暴熱多用為先導兼啖駝馬解熱小兒多食則損齒生蟲者土制水倮蟲屬土得甘即生也震亨曰餹生胃火乃濕土生熱故能損齒生與食棗病齲同意非土制水也時珍曰沙餹性温殊於蔗漿故不宜多食與魚筍之類同食皆不益人今人毎用為調和徒取其適口而不言陰受其害也但其性能和脾緩肝故治脾胃及瀉肝藥用為先導本草言其性寒蘇恭謂其冷利皆昧此理附方舊一新五下痢禁口沙餹半斤烏梅一箇水二椀煎一椀時時飲之摘𤣥方腹中𦂳脹白餹以酒三升煮服之不過再服子母秘錄痘不落痂沙餹調新汲水一盃服之白湯調亦可日二服劉提㸃方虎傷人瘡水化沙餹一椀服并塗之摘𤣥方上氣喘𠻳煩熱食即吐逆用沙餹薑汁等分相和慢煎二十沸每嚥半匙取效食韭口臭沙餹解之摘要方石蜜唐本草釋名白沙餹恭曰石蜜即乳餹也與䖝部石蜜同名時珍曰按萬震凉州異物志云石蜜非石類假石之名也實乃甘蔗汁煎而曝之則凝如石而體甚輕故謂之石蜜也集解志約曰石蜜出益州及西戎煎鍊沙餹為之可作餅塊黄白色恭曰石蜜用水牛乳米粉和煎成塊作餅堅重西戎來者佳江左亦有殆勝于蜀詵曰自蜀中波斯來者良東吳亦有不及兩處者皆煎蔗汁牛乳則易細白耳宗奭曰石蜜川浙者最佳其味厚他處皆次之煎鍊以銅象物達京師至夏月及乆陰雨多自消化土人先以竹葉及紙褁包外用石夾埋之不得見風遂可免今人謂之乳餹其作餅黄白色者謂之捻餹易消化入藥至妙時珍曰石蜜即白沙餹也凝結作餅塊如石者為石蜜輕白如霜者為餹霜堅白如冰者為冰餹皆一物有精粗之異也以白餹煎化模印成人物獅象之形者為饗餹後漢書註所謂猊餹是也以石蜜和諸果仁及橙橘皮縮砂薄荷之類作成餅塊者為餹纒以石蜜和牛乳酥酪作成餅塊者為乳餹皆一物數變也唐本草明言石蜜煎沙餹為之而諸註皆以乳餹即為石蜜殊欠分明按王灼餹霜譜云古者惟飲蔗漿其後煎為蔗餳又曝為石蜜唐初以蔗為酒而餹霜則自大厯間有鄒和尚者來住蜀之遂寧繖山始傳造法故甘蔗所在植之獨有福建四明番禺廣漢遂寜有冰餹他處皆顆碎色淺味薄惟竹蔗綠嫩味厚作霜最佳西蔗次之凡霜一甕其中各色亦自不同惟疊如假山者為上團枝次之甕缺次之小顆塊又次之沙脚為下紫色及如水晶色者為上深琥珀色次之淺黄又次之淺白為下氣味甘寒冷利無毒主治心腹熱脹口乾渴唐本治目中熱膜明目和棗肉巨勝末為丸噙之潤肺氣助五臓生津孟詵潤心肺燥熱治𠻳消痰解酒和中助脾氣緩肝氣時珍發明震亨曰石蜜甘喜入脾食多則害必生于脾西北地髙多燥得之有益東南地下多濕得之未有不病者亦兼氣之厚薄不同耳時珍曰石蜜餹霜氷餹比之紫沙餹性稍平功用相同入藥勝之然不冷利若乆食則助熱損齒生䖝之害同也刺蜜拾遺校正自草部移入此釋名草蜜拾遺給㪍羅集解藏器曰交河沙中有草頭上有毛毛中生蜜胡人名為給㪍羅時珍曰按李延壽北史云高昌有草名羊刺其上生蜜味甚甘美又梁四公子記云高昌貢刺蜜杰公云南平城羊刺無葉其蜜色白而味甘鹽城羊刺葉大其蜜色青而味薄也高昌即交河在西畨今為火州又叚成式酉陽雜俎云北天竺國有蜜草蔓生大葉秋冬不死因受霜露遂成蜜也又大明一綂志云西番撒馬兒罕地有小草叢生葉細如藍秋露凝其上味甘如蜜可熬為餳土人呼為逹即古賔葢甘露也按此二説皆草蜜也但不知其草即羊刺否也又有䭱齊樹亦出蜜云可入藥而不得其詳今附于左附錄䭱齊音别有按叚成式云䭱齊出波斯國拂林國亦之名頓㪍梨佗頓音奪樹長丈餘皮色青薄光净葉似􅀈魏生于枝端一枝三葉八月伐之臘月更抽新條七月斷其枝有黄汁如蜜微香可以入藥療病也氣味甘平無毒主治骨蒸發熱痰𠻳暴痢下血開胃止渴除煩藏器果之六水果類六種蓮藕本經上品釋名其根藕爾雅其實蓮同上其莖葉荷韓保昇曰藕生水中其葉名荷按爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中菂菂中薏邢昺註云芙蕖總名也别名芙蓉江東人呼為荷菡萏蓮花也菂蓮實也薏菂中青心也郭璞註云蔤乃莖下白蒻在泥中者蓮乃房也菂乃子也薏乃中心苦薏也江東人呼荷花為芙蓉北人以藕為荷亦以蓮為荷蜀人以藕為茄此皆習俗傳誤也陸機詩疏云其莖為荷其花未發為菡萏已發為芙蕖其實蓮蓮之皮青裏白其子菂菂之殻青肉白菂内青心二三分為苦薏也時珍曰爾雅以荷為根名韓氏以荷為葉名陸機以荷為莖名按莖乃負葉者也有負荷之義當從陸説蔤乃嫩蒻如竹之行鞭者節生二莖一為葉一為花盡處乃生藕為花葉根實之本顯仁藏用花成不居可謂退藏于宻矣故謂之蔤花葉常偶生不偶不生故根曰藕或云藕善耕泥故字從耦耦者耕也茄音加加于蔤上也蕸音遐逺于蔤也菡萏函合未發之意芙蓉敷布容艶之意蓮者連也花實相連而出也菂者的也子在房中㸃㸃如的也的乃凡物㸃注之名薏猶意也含苦在内也古詩云食子心無棄苦心生意存是矣集解别録曰藕實莖生汝南池澤八月采當之曰所在池澤皆有豫章汝南者良苗高五六尺葉團青大如扇其花赤子黒如羊矢時珍曰蓮藕荆揚豫益諸處湖澤陂池皆有之以蓮子種者生遲藕芽種者最易發其芽穿泥成白蒻即蔤也長者至丈餘五六月嫩時没水取之可作蔬茹俗呼藕絲菜節生二莖一為藕荷其葉貼水其下旁行生藕也一為芰荷其葉出水其旁莖生花也其葉清明後生六七月開花花有紅白粉紅三色花心有黄鬚蕋長寸餘鬚内即蓮也花褪連房成菂菂在房如蜂子在窠之狀六七月采嫩者生食脆美至秋房枯子黒其堅如石謂之石蓮子八九月收之斫去黑殻貨之四方謂之蓮肉冬月至春掘藕食之藕白有孔有絲大者如肱臂長六七尺凡五六節大抵野生及紅花者蓮多藕劣種植及白花者蓮少藕佳也其花白者香紅者艶千葉者不結實别有合歡並頭者有夜舒荷夜布晝卷睡蓮花夜入水金蓮花黄碧蓮花碧繡蓮花如繡皆是異種故不述相感志云荷梗塞穴鼠自去煎湯洗鑞垢自新物性然也蓮實釋名藕實本經菂爾雅薂音吸同上石蓮子别錄水芝本經澤芝古今注修治𢎞景曰藕實即蓮子八九月采黒堅如石者乾摶破之頌曰其菂至秋黒而沈水為石蓮子可磨為飯食時珍曰石蓮刴去黒殻謂之蓮肉以水浸去赤皮青心生食甚佳入藥須蒸熟去心或晒或焙乾用亦有每一斤用豶豬肚一箇盛貯煮熟搗焙用者今藥肆一種石蓮子狀如土石而味苦不知何物也氣味甘平濇無毒别錄曰寒大明曰蓮子石蓮性俱溫時珍曰嫩菂性平石蓮性溫得茯苓山藥白术枸杞子良詵曰生食過多微動冷氣脹人蒸食甚良大便燥濇者不可食主治補中養神益氣力除百疾乆服輕身耐老不饑延年本經主五臟不足傷中益十二經脈血氣孟詵止渴去熱安心止痢治腰痛及泄精多食令人歡喜大明交心腎厚腸胃固精氣强筋骨補虛損利耳目除寒濕止脾泄乆痢赤白濁女人帶下崩中諸血病時珍擣碎和米作粥飯食輕身益氣令人强健蘇頌疏出詩安靖上下君相火邪嘉謨發明時珍曰蓮産于淤泥而不為泥染居于水中而不為水没根莖花實凡品難同清淨濟用羣美兼得自蒻蔤而節節生莖生葉生花生藕由菡萏而生蕋生蓮生菂生薏其蓮菂則始而黄黄而青青而綠綠而黒中含白肉内隠青心石蓮堅剛可厯永乆薏藏生意藕復萌芽展轉生生造化不息故釋氏用為引譬妙理其存醫家取為服食百病可却葢蓮之味甘氣温而性嗇禀清芳之氣得稼穡之味乃脾之果也脾者黄宫所以交媾水火會合木金者也土為元氣之母母氣既和津液相成神乃自生乆視耐老此其權輿也昔人治心腎不交勞傷白濁有清心蓮子飲補心腎益精血冇瑞蓮丸皆得此理藏器曰經秋正黒石蓮子入水必沈惟煎鹽鹵能浮之此物居山海間經百年不壞人得食之令髪黒不老詵曰諸烏猿猴取得不食藏之石室内人得三百年者食之永不老也又雁食之糞于田野山巖之中不逢陰雨經乆不壞人得之每旦空腹食十枚身輕能登高涉逺也附方舊四新十服食不饑詵曰石蓮肉蒸熟去心為末煉蜜丸梧子大日服三十九此仙家方也清心寧神宗奭曰用蓮蓬中乾石蓮子肉於砂盆中檫去赤皮留心同為末入龍腦㸃湯服之補中强志益耳日聰明用蓮實半兩去皮心研末水煮熟以粳米三合作粥入末攪匀食方聖惠補虛益損水芝丹用蓮實半升酒浸二宿以牙豬肚一箇洗淨入蓮在内縫定煮􅌻取出晒乾為末酒煮米糊丸梧子大每服五十丸食前溫酒送下醫學發明小便頻數下焦眞氣虛弱者用上方醋糊丸服白濁遺精石蓮肉龍骨益智仁等分為末每服二錢空心米飲下分普濟用蓮肉白茯苓等為末白湯調服心虛赤濁蓮子六一湯用石蓮肉六兩炙甘草一兩為末毎服一錢燈心湯下直指方乆痢禁口石蓮肉炒為末每服二錢陳倉米調下便覺思食甚妙加入香連丸尤妙丹溪心法脾泄腸滑方同上噦逆不止石蓮肉六枚炒赤黄色研末冷熟水半盞和服便止蘇頌國經産後欬逆嘔吐心忡目運用石蓮子兩半白茯苓一兩丁香五錢為末每米飲服二錢良方補遺眼赤作痛蓮實去皮研末一盞粳米半升以水煮粥常食普濟方小兒熱渴蓮實二十枚炒浮萍二錢半生薑少許水煎分三服聖濟總錄反胃吐食石蓮肉為末入少肉豆蔲末米湯調服之直指方藕氣味甘平無毒大明曰溫時珍曰相感志云藕以鹽水供食則不損口同油煠麫米果食則無渣煮忌鐵器主治熱渴散留血生肌乆服令人心懽别錄止怒止洩消食解酒毒及病後乾渴藏器擣汁服止悶除煩開胃治霍亂破産後血閟擣膏罯金瘡并傷折止暴痛蒸煮食之大能開胃大明生食治霍亂後虛渴蒸食甚補五臟實下焦同蜜食令人腹臟肥不生諸蟲亦可休糧孟詵汁解射菵毒蟹毒徐之才擣浸澄粉服食輕身益年臞仙發明𢎞景曰根入神仙家宋時太宫作血䘓音勘庖人削藕皮誤落血中遂散渙不凝故醫家用以破血多效也䘓者血羮也詵曰産後忌生冷物獨藕不同生冷者為能破血也時珍曰白花藕大而孔扁者生食味甘煮食不美紅花及野藕生食味澀煮蒸則佳夫藕生于卑汚而潔白自若質柔而穿堅居下而有節孔竅玲瓏絲綸内隠生于嫩蒻而發為莖葉花實又復生芽以續生生之脈四時可食令人心懽可謂靈根矣故其所主者皆心脾血分之疾與蓮之功稍不同云附方舊四新六時氣煩渴生藕汁一盞生蜜一合和匀細服聖惠傷寒口乾生藕汁生地黄汁童子小便各半盞煎溫服之龎安時傷寒論霍亂煩渴藕汁一鍾薑汁半鍾和匀飲聖濟總錄霍亂吐痢生藕𢷬汁服聖惠上焦痰熱藕汁梨汁各半盞和服簡便産後悶亂血氣上衝口乾腹痛梅師方用生藕汁三升飲之龎安時用藕汁生地黄汁童子小便等分煎服小便熱淋生藕汁生地黄汁葡萄汁各等分毎服半盞入蜜温服墜馬血瘀積在胸腹唾血無數者乾藕根為末酒服方寸匕日二次千金方食蟹中毒生藕汁飲之聖惠凍脚裂坼蒸熟藕搗爛塗之塵芒入目大藕洗搗綿褁滴汁入目中即出也普濟方藕蔤釋名藕絲菜五六月嫰時采為蔬茹老則為藕稍味不堪矣氣味甘平無毒主治生食主霍亂後虛渴煩悶不能食解酒食毒蘓頌功與藕同時珍解煩毒下瘀血汪穎藕節氣味澀平無毒大明曰冷㐲硫黄主治擣汁飲主吐血不止及口鼻出血甄權消瘀血解熱毒産後血悶和地黄研汁入熱酒小便飲大明能止欬血唾血血淋溺血下血血痢血崩時珍發明時珍曰一男子病血淋痛脹祈死予以藕汁調髮灰毎服二錢服三日而血止痛除按趙溍養痾謾筆云宋孝宗患痢衆醫不効髙宗偶見一小藥肆召而問之其人問得病之由乃食湖蟹所致遂診脈曰此冷痢也乃用新采藕節擣爛熱酒調下數服即愈高宗大喜就以搗藥金杵臼賜之人遂稱為金杵臼嚴防禦家可謂不世之遇也大抵藕能消瘀血解熱開胃而又解蟹毒故也附方新五鼻䘐不止藕節擣汁飲并滴鼻中卒暴吐血雙荷散用藕節荷蔕各七箇以蜜少許擂爛用水二鍾煎八分去滓温服或為末丸服亦可聖惠大便下血藕節晒乾研末人參白蜜煎湯調服二錢日二服全㓜心鑑遺精白濁心虚不寜金鎻玉闗九用藕節蓮花鬚蓮子肉芡􅧙肉山藥白茯苓白茯神各二兩為末用金櫻子二斤搥碎以水一斗熬八分去滓再熬成膏入少麫和藥丸梧子大毎服七十丸米飲下鼻淵腦瀉藕節芎藭焙研為末每服二錢米飲下普濟蓮薏即蓮子中青心也釋名苦薏氣味苦寒無毒藏器曰食蓮子不去心令人作吐主治血渴産後渴生研末米飲服二錢立愈士良止霍亂大明清心去熱時珍㫖出綂附方新二勞心吐血蓮子心七箇糯米二十一粒為末酒服此臨安張上舍方也是齋百一方小便遺精蓮子心一撮為末入辰砂一分每服一錢白湯下日二醫林集要蓮蕋鬚釋名佛座鬚花開時采取陰乾亦可充果食氣味甘濇温無毒大明曰忌地黄葱蒜主治清心通腎固精氣烏鬚髪悦顔色益血止血崩吐血時珍發明時珍曰蓮鬚本草不收而三因諸方固眞丸巨勝子丸各補益方中往往用之其功大抵與蓮子同也附方新一乆近痔漏三十年者三服除根用蓮花蕋黒牽牛頭末各一兩半當歸五錢為末毎空心酒服二錢忌熱物五日見効孫氏集効方蓮花釋名芙蓉古今注芙蕖同上水華氣味苦甘温無毒忌地黄葱蒜主治鎭心益色駐顔身輕大明家𢎞景曰花入神仙用入香尤妙附方舊二新二服食駐顔七月七日采蓮花七分八月八日采根八分九月九日采實九分陰乾搗篩每服方寸匕溫酒調服太清草木方天泡濕瘡荷花貼之簡便方難産催生蓮花一葉書人字吞之即易産肘後方墜損嘔血墜跌積血心胃嘔血不止用乾荷花為末毎酒服方寸匕其效如神楊拱醫方摘要蓮房釋名蓮蓬殻陳乆者良氣味苦濇溫無毒主治破血孟詵治血脹腹痛及産後胎衣不下酒煮服之水煮服之解野菌毒藏器止血崩下血溺血時珍發明時珍曰蓮房入厥陰血分消瘀散血與荷葉同功亦急則治標之意也附方新六經血不止瑞蓮散用陳蓮蓬殻燒存性研末每服二錢熱酒下婦人經驗方血崩不止不拘冷熱用蓮蓬殻荆芥穗各燒存性等分為末每服二錢米飲下聖惠方産後血崩蓮蓬殻五箇香附二兩各燒存性為末毎服二錢米飲下日二婦人良方漏胎下血蓮房燒研麫糊丸梧子大每服百丸湯酒任下日二朱氏集驗方小便血淋蓮房燒存性為末入麝香少許每服二錢半米飲調下日二經驗方天泡濕瘡蓮蓬殻燒存性研末井泥調塗神效海上方荷葉釋名嫰者荷錢象形貼水者藕荷生藕者出水者芰荷生花者蔕名荷鼻修治大明曰入藥並炙用氣味苦平無毒時珍曰畏桐油伏白銀伏硫黄主治止渴落胞破血治産後口乾心肺躁煩大明治血脹腹痛産後胎衣不下酒煮服之荷鼻安胎去惡血留好血止血痢殺菌蕈毒並煮水服藏器生發元氣禆助脾胃澀精渭散瘀血消水腫癰腫發痘瘡治吐血咯血䘐血下血溺血血淋崩中産後惡血損傷敗血時珍發明果曰潔古張先生口授枳水丸方用荷葉燒飯為丸當時末悟其理老年味之始得夫震者動也人感之生足少陽甲膽是属風木為生化萬物之根蒂人之飲食入胃營氣上行即少陽甲膽之氣與手少陽三焦元氣同為生發之氣素問云履端于始序則不愆荷葉生于水土之下汙穢之中挺然獨立其色青其形仰其中空象震卦之體食藥感此氣之化胃氣何由不升乎用此為引可謂逺識合道矣更以燒飯和藥與白术恊力滋養補令胃厚不致内傷其利廣矣大矣世之用巴豆牽牛者豈足語此時珍曰燒飯見榖部飯下按東垣試効方云雷頭風證頭靣疙瘩腫痛憎寒發熱狀如傷寒病在三陽不可過用寒藥重劑誅伐旡過一人病此諸藥不効余處清震湯治之而愈用荷葉一枚升麻五錢蒼术五錢水煎温服葢震為雷而荷葉之形象震體其色又青乃涉類象形之義也又案聞人規痘疹八十一論云痘瘡已出復為風寒外襲則竅閉血凝其㸃不長或變黒色此為倒黶必身痛四肢微厥但溫肌散邪則熱氣復行而斑自出也宜紫背荷葉散治之葢荷葉能升發陽氣散瘀血留好血僵蠶能解結滯之氣故也此藥易得而活人甚多勝于人牙龍腦也又戴原禮證治要訣云荷葉服之令人瘦劣故單服可以消陽水浮腫之氣附方舊四新二十二陽水浮腫敗荷葉燒存性研末每服二錢米飲調下日三服證治要訣脚膝浮腫荷葉心藳本等分煎湯淋洗之永類方痘瘡倒黶紫背荷葉散又名南金散治風寒外襲倒黶勢危者萬無一失用霜后荷葉貼水紫背者炙乾白僵蠶直者炒去絲等分為末毎服半錢用胡荽湯或温酒調下聞人規痘疹論諸般癰腫㧞毒止痛荷葉中心蒂如錢者不拘多少煎湯淋洗拭乾以飛過寒水石同臘猪脂塗之又治癰腫柞木飲方中亦用之本事方打撲損傷惡血攻心悶亂疼痛者以乾荷葉五片燒存性為末毎服取童子熱尿一盞食前調下日三服利下惡物為度聖惠方産後心痛惡血不盡也荷葉炒香為末每服方寸匕沸湯或童子小便調下或燒灰或煎汁皆可救急方胎衣不下方同上傷寒産後血運欲死用荷葉紅花薑黄等分炒研末童子小便調服二錢龎安常傷寒論孕婦傷寒大熱煩渴恐傷胎氣用嫰卷荷葉焙半兩蚌粉二錢半為末每服三錢新汲水入蜜調服并塗腹上名罩胎散方鄭氏妊娠胎動已見黄水者乾荷蒂一枚炙研為末糯米淘汁一鍾調服即安唐氏經驗方吐血不止嫰荷葉七箇擂水服之甚佳服又方乾荷葉生蒲黄等分為末每三錢桑白皮煎湯調下焙肘后方用經霜敗荷燒存性研末新水服二錢吐血咯血荷葉培乾為末米湯調服二錢一日二服以知為度麥聖濟總綠用敗荷葉蒲黄各一兩為末毎服二錢門冬湯下吐血䘐血陽乘于陰血熱妄行宜服四生丸陳日華云屢用得効用生荷葉生艾葉生栢葉生地黄等分擣爛丸雞子大每服一丸水三盞煎一盞去滓服濟生方崩中下血荷葉燒研半兩蒲黄黄苓各一兩為末每空心酒服三錢血痢不止荷葉蒂水煮汁服之普濟方下痢赤白荷葉燒研每服二錢紅痢蜜白痢沙餹湯下脱肛不收貼水荷葉焙研酒服二錢仍以荷葉盛末坐之經驗良方牙齒疼痛青荷葉剪取錢蒂七箇以濃米醋一盞煎半盞去滓熬成膏時時拌之妙唐氏經驗方赤遊火丹新生荷葉擣爛入鹽塗之摘𤣥方漆瘡作痒乾荷葉煎湯洗之良集驗方徧身風癘荷葉三十枚石灰一斗淋汁合煮漬之半日乃出數日一作良聖惠方偏頭風痛升麻蒼术各一兩荷葉一箇水二鍾煎一鍾食後温服或燒荷葉一箇為末以煎汁調服簡便方刀斧傷瘡荷葉燒研搽之集簡方陰腫痛痒荷葉浮萍蛇牀等分煎水日洗之醫壘元戎紅白蓮花拾遺校正自草部移入此集解藏器曰紅蓮花白蓮花生西國胡人將來也時珍曰此不知即蓮花否而功與蓮同以類相從姑移入此氣味甘平無毒主治乆服令人好顔色變白却老藏器芰實音妓品别錄上釋名蔆别錄水栗風俗通沙角時珍曰其葉支散故字從支其角稜峭故謂之蔆而俗呼為蔆角也昔人多不分别惟王安貧武陵記以三角四角者為芰兩角者為蔆左傳屈到嗜芰即此物也爾雅謂之厥攗音眉又許愼説文云蔆楚謂之芰秦謂之薢茩楊氏丹鉛錄以芰為雞頭引離騷緝芰荷以為衣言蔆葉不可緝衣皆誤矣案爾雅薢茩乃決明之名非厥攗也又埤雅芰荷乃藕上出水生花之莖非雞頭也與蔆同名異物許楊二氏失于詳攷故正之集解𢎞景曰芰實廬江間最多皆取火燔以為米充糧今多蒸暴食之頌曰蔆處處有之葉浮水上花黄白色花落而實生漸向水中乃熟實有二種一種四角一種兩角兩角中又有嫰皮而紫色者謂之浮蔆食之尤美江淮及山東人暴其實以為米代糧時珍曰芰蔆有湖濼處則有之蔆落泥中最易生發有野蔆家蔆皆三月生蔓延引葉浮水上扁而有尖光靣如鏡葉下之莖有股如蝦股一莖一葉兩兩相差如蝶翅狀五六月開小白花背日而生畫合宵炕隨月轉移其實有數種或三角四角或兩角無角野蔆自生湖中葉實俱小其角硬直刺人其色嫰青老黒嫰時剝食甘美老則蒸煮食之野人暴乾刴米為飰為粥為餻為果皆可代糧其莖亦可暴收和米作飰以皮荒歉葢澤農有利之物也家蔆種于陂塘葉實俱大角耎而脆亦有兩角彎卷如弓形者其色有青有紅有紫嫰時剝食皮脆肉美葢佳果也老則殻黒而硬墜入泥中謂之烏蔆冬月取之風乾為果生熟皆佳夏月以糞水澆其葉則實更肥美案叚成式酉陽襍爼云蘓州折腰蔆多兩角荆州郢城蔆三角無刺可以按莎漢武帝昆明池有浮根蔆亦曰青水蔆葉没水下蔆出水上或云𤣥都有雞翔蔆碧色狀如雞飛仙人鳧伯子常食之氣味甘平無毒詵曰生食性冷利多食傷人臟腑損陽氣痿莖生蟯虫水族中此物最不治病若過食腹脹者可暖薑酒服之即消亦可含吳茱茰咽津時珍曰仇池筆記言蔆花開背日芡花開向日故蔆寒而芡暖别錄言芰實性平豈生者性冷而乾者則性平與主治安中補五臟不饑輕身别錄蒸暴和蜜餌之斷糓長生𢎞景解丹石毒蘇頌解暑解傷寒積熱止消渴解酒毒射菵毒時珍擣爛澄粉食補中延年臞仙芰花氣味濇主治入染鬚髪方時珍烏蔆殻主治入染鬚髪方亦止泄痢時珍芡實音儉品本經上釋名雞頭本經鴈喙同鴈頭古今注鴻頭韓退之雞雍莊子卯蔆管子蒍子音唯水流黄𢎞景曰此即今蒍子也莖上花佀雞冠故名雞頭頌曰其苞形類雞鴈頭故有諸名時珍曰芡可濟儉歉故謂之芡雞雍見莊子无鬼篇卯蔆見管子五行篇揚雄方言云南楚謂之雞頭幽燕謂之鴈頭徐青淮泗謂之芡子其莖謂之蒍亦曰䓈鄭樵通志以鉤芙為芡誤矣鉤芙陸生草也其莖可食水流黄見下集解别錄曰雞頭實生雷池池澤八月采之保昇曰苗生水中葉大如荷皺而有刺花子若拳大形作雞頭實若石榴其皮青黒肉白如蔆米也頌曰處處冇之生水澤中其葉俗名雞頭盤花下結實其莖嫰者名蒍􅀢亦名䓈菜人采為蔬茹宗奭曰天下皆有之臨水居人采子去皮擣仁為粉蒸煠作餅可以代糧時珍曰芡莖三月生葉貼水大于荷葉皺文如縠蹙䘐如沸面青背紫莖葉皆有刺其莖長至丈餘中亦有孔有絲嫰者剥皮可食五六月生紫花花開向日結苞外有青刺如蝟刺及栗毬之形花在苞頂亦如雞喙及蝟喙剥開肉有斑駁軟肉裹子累累如珠璣殻内白米狀如魚目深秋老時澤農廣收爛取芡子藏至囷石以備歉荒其根狀如三稜煮食如芋修治詵曰凡用蒸熟烈日晒裂取仁亦可舂取粉用時珍曰新者煮食良入澀精藥連殻用亦可案陳彦和可日記云芡實一斗以防風四兩煎湯浸過用且經乆不壞氣味甘平濇無毒𢎞景曰小兒多食令不長詵曰生食多動風冷氣宗奭曰食多不益脾胃兼難消化主治濕痺腰脊膝痛補中除暴疾益精氣强志令耳目聰明乆服輕身不饑耐老神仙本經開胃助氣日華止渴益腎治小便不禁遺精白濁帶下時珍發明𢎞景曰仙方取此合蓮實餌之甚益人㳟曰作粉食益人勝于蔆也頌曰取其實及中子𢷬爛暴乾冄擣篩末熬金櫻子煎和丸服之云補下益人謂之水陸丹時珍曰案孫升談圃云芡本不益人而俗謂之水流黄何也葢人之食芡必咀嚼之終日囁囁而芡味甘平腴而不胒食之者能使華液流通轉相灌漑其功勝于乳石也淮南子云貍頭愈癙雞頭已瘻註者云即芡實也附方舊一新三雞頭粥益精氣强志意利耳目雞頭實三合煮熟去殻粳米一合煮粥日日空心食經驗玉鎖丹治精氣虛滑用芡實蓮莖方見藕節下四精丸治思慮色慾過度損傷心氣小便數遺精用秋石白茯苓芡實蓮肉各二兩為末蒸棗和丸梧子大每服三十丸空心鹽湯送下永類方分清丸治濁病用芡實粉白茯苓粉黄蠟化蜜和丸梧桐子大每服百丸鹽湯下方摘𤣥雞頭菜即䓈菜芡莖也氣治鹹甘平無毒主治止煩渴除虛熱生熟皆宜時珍根氣味同莖主治小腹結氣痛煮食之士良附方新一偏墜氣塊雞頭根切片煮熟鹽醋食之法天生意烏芋别録中品釋名鳬茈音庛鳧茨音瓷葧臍衍義黒三棱傅濟方芍音曉地栗鄭樵通志雅時珍曰烏芋其根如芋而色烏也鳧喜食之故爾名鳧茈後遂訛為鳧茨又訛為葧臍葢切韻鳧葧同一字母音相近也三棱地栗皆形佀也瑞曰小者名鳬茈大者名地栗集解頌曰烏芋今鳧茨也苗佀龍鬚而細色正青根如指頭大黒色皮厚冇毛又有一種皮薄無毛者亦同田中人並食之宗奭曰皮厚色黒肉硬而白者謂之豬葧臍皮薄澤色淡紫肉軟而脆者謂之羊葧臍正二月人采食之此二等藥中罕用荒歳人多采以充糧時珍曰鳧茈生淺水田中其苗三四月出土一莖直上無枝葉狀如龍鬚肥田栽者粗近葱蒲高二三尺其根白蒻秋後結顆大如山查栗子而臍有聚毛累累下生入泥底野生者黒而小食之多滓種出者紫而大食之多毛吳人以沃田種之三月下種霜后苗枯冬春掘收為果生食煮食皆良正誤别録曰烏芋一名藉姑二月生葉如芋三月三日采根暴乾𢎞景曰藉姑生水田中葉有椏狀如澤瀉不正佀芋其根黄佀芋子而小疑有烏者根極相佀細而美葉狀如莧草呼為鳧茨恐即此也恭曰烏芋一名槎丫一名茨菰時珍曰烏芋慈姑原是二物慈姑有葉其根散生烏芋有莖無葉其根下生氣味不同主治亦異而别録誤以藉姑為烏芋謂其葉如芋陶蘇二氏因鳧茨慈姑字音相近遂致混註而諸家説者因之不明今正其誤根氣味甘微寒滑無毒詵曰性冷先有冷氣人不可食令人腹脹氣滿小兒秋月食多臍下結痛也主治消渴痺熱温中益氣别錄下丹石消風毒除胸中實熱氣可作粉食明耳目消黄疸孟詵開胃下食大明作粉食厚人腸胃不饑能解毒服金石人宜之蘇頌療五種膈氣消宿食飯後宜食之治誤吞銅物汪機主血痢下血血崩辟蠱毒時珍發明機曰烏芋善毁銅合銅錢嚼之則錢化可見其為消堅削積之物故能化五種膈疾而消宿食治誤吞銅也時珍曰按王氏愽濟方治五積冷氣攻心變為五膈諸病金鎖丸中用黒三稜註云即鳧茈乾者則汪氏所謂消堅之説葢本于此又董炳集驗方云地栗晒乾為末白湯毎服二錢能辟蠱毒傳聞下蠱之家知有此物便不敢下此亦前人所未知者附方新五大便下血葧臍搗汁大半鍾好酒半鍾空心温服三日見效神秘方下痢赤白午日午時取完好葧臍洗浄拭乾勿令損破於瓶内入好燒酒浸之黄泥宻封收貯遇有患者取二枚細嚼空心用原酒送下唐珤經驗方婦人血崩鳧茈一歳一箇燒存性研末酒服之方李氏小兒口瘡用葧臍燒存性研末摻之楊起簡便方誤吞銅錢生鳧茈研汁細細呷之自然消化成水王璆百一選方慈姑日華校正原混烏芋下今分出仍併入圖經外類剪刀草釋名藉姑别錄水萍别錄河鳧茈圖經白地栗同上苗名剪刀草圖經箭搭草救荒槎丫草蘇恭燕尾草大明根時珍曰慈姑一歳生十二子如慈姑之乳諸子故以名之作茨菰者非矣河鳧茈白地栗所以别烏芋之鳧茈地栗也剪刀箭搭槎丫燕尾並象葉形也集解别錄曰藉姑三月三日采根暴乾𢎞景曰藉姑生水田中葉有椏狀如澤瀉其根黄似芋子而小煮之可啖恭曰慈姑生水中葉似錍箭之簇澤瀉之類也頌曰剪刀草生江湖及汴洛近水河溝沙磧中葉如剪刀形莖幹似嫰蒲又似三稜苗甚軟其色深青綠每叢十餘莖内抽出一兩莖上分枝開小白花四瓣蕋深黄色根大者如杏小者如栗色白而瑩滑五六七月采葉正二月采根即慈姑也煮熟味甘甜時人以作果子福州别有一種小異三月開花四時采根功亦相似時珍曰慈姑生淺水中人亦種之三月生苖青莖中空其外有稜葉如燕尾前尖後岐霜後葉枯根乃練結冬及春初掘以為果須灰湯煮熟去皮食乃不麻澀㦸人咽也嫰莖亦可􅨘食又取汁可制粉霜雌黄又有山慈姑名同實異見草部根氣味苦甘微寒無毒大明曰冷有毒多食發虛熱及腸風痔漏崩中帶下瘡癤以生姜同煮佳懷孕人不可食詵曰吳人常食之令人發脚氣癱緩風損齒失顔色皮肉乾燥卒食之使人乾嘔也主治百毒産後血悶攻心欲死産難胞衣不出擣汁服一升又下石淋大明葉主治諸惡瘡腫小兒遊瘤丹毒擣爛塗之即便消退甚佳蘇頌治蛇蟲咬擣爛封之大明調蚌粉塗瘙疿時珍附錄諸果綱目二十一種拾遺一種諸果有毒並叧附於末時珍曰方册所記諸果名品甚多不能詳其性味狀既列于果則養生者不可不知因略采附以俟津符子時珍曰孫真人千金方云味苦平滑多食令人口爽不知五味必思荅又曰忽必烈飲膳正要云味甘無毒調中順氣出囘囘田地甘劍子又曰范成大桂海志云狀似巴欖子仁附肉有白靨不可食發人病北人呼為海胡桃是也楊搖子又曰沈瑩臨海異物志云生閩越其子生樹皮中其體有脊形甚異而味甘無竒色青黄長四五寸海梧子又曰嵇含南方草木狀云出林邑樹似梧桐色白葉似青桐其子如大栗肥甘可食木竹子又曰桂海志云皮色形狀全似大枇杷肉味甘美秋冬實熟出廣西櫓罟子又曰桂海志云大如半升盌數十房攅聚成毬每房有絳冬生青至夏紅破其瓣食之微甘出廣西羅晃子又曰桂海志云狀如橄欖其皮七層出廣西顧玠海槎錄云横州出九層皮果至九層方見肉也夏熟味如栗㯆子又曰徐表南州記云出九真交趾樹生子如桃實長寸餘二月開花連着子五月熟色黄鹽藏食之味酸似梅夫編子又曰南州記云樹生交趾山谷三月開花仍連着子五六月熟入雞魚猪鴨羮中味美亦可鹽藏白緣子又曰劉欣期交州記云出交趾樹高丈餘實味甘美如胡桃繫彌子又曰郭義㳟廣志云狀圓而細赤如軟棗其味初苦後甘可食人面子又曰草木狀云出南海樹似含桃子如桃實無味以蜜漬可食其核正如人面可玩祝穆方輿勝覽云出廣中大如梅李春花夏實秋熟蜜煎甘酸可食其核兩邊似人面口目鼻皆具黄皮果又曰海槎錄云出廣西横州狀如楝子及小棗而味酸四味果又曰叚成式酉陽雜爼云出祁連山木生如棗剖以竹刀則甘鐵刀則苦木刀則酸蘆刀則辛行旅得之能止饑渴千歳子又曰草木狀云出交趾蔓生子在根下鬚綠色交加如織一苞恒二百餘顆皮殻青黄色殻中有肉如栗味亦如之乾則殻肉相離撼之有聲桂海志云狀似青黄李味甘侯騷子又曰酉陽雜爼云蔓生子大如雞卵既甘且冷消酒輕身王太僕曽獻之酒杯藤子又曰崔豹古今註云出西域藤大如臂花堅硬可以酌酒夾章映澈實大如指味如豆䓻食之消酒張騫得其種于大宛蕳音間子又曰賈思勰齊民要術云藤生交趾合蒲縁樹木正二月花四五月熟如梨赤如雞冠核如魚鱗生食味淡山棗又曰寰宇志云出廣西肇慶府葉似梅果似荔枝九月熟可食隈支又曰宋祁益州方物圖云生邛州山谷中樹高丈餘枝修而弱開白花實大若雀卵狀似荔枝肉黄膚甘靈牀上果子拾遺藏器云人夜讝語食之即止諸果有毒拾遺凡果未成核者食之令人發癰癤及寒熱凡果落地有惡蟲緣過者食之令人患九漏凡果雙仁者有毒殺人凡𤓰雙蔕者有毒殺人沈水者殺人凡果忽有異常者根下必有毒蛇食之殺人本草綱目卷三十三
