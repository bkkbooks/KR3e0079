  text: 本草綱目卷三十一目録果之三夷果類三十一種内附四種荔枝開寳龍眼别録龍荔綱目橄欖開寳木威子拾遺菴摩勒唐本毗梨勒唐本没離梨拾遺五斂子綱目桃即陽五子實綱目榧實别録海松子開寳㯽榔别録大腹子開寳椰子開寳無漏子拾遺棗即波斯桄榔子開寳䔋木麪海藥波羅蜜綱目無花果食物仙文光果天果附阿勃勒拾遺沙棠果綱目棎子拾遺麂目拾遺都桷子拾遺都念子拾遺都咸子拾遺摩厨子拾遺慶齊墩果徳果附韶子拾遺馬㯽榔㑹編枳椇唐本右附方舊二十一新四十一本草綱目巻三十一目録
