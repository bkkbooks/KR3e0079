body:
  text: 本草綱目卷三十七明李時珍撰木之四寓木類一十二種茯苓本經上品釋名伏靈綱目伏本經松腴不死麵記事抱根者名伏神别録宗奭曰多年樵斫之松根之氣味抑鬱未絶精英未淪其精氣盛者發泄于外結為茯苓故不抱根離其本體有零之義也津氣不盛止能附結本根既不離本故曰伏神時珍曰茯苓史記龜莢傳作伏靈蓋松之神靈之氣伏結而成故謂之伏靈伏神也仙經言伏靈大如拳者佩之令百鬼消滅則神靈之氣亦可徴矣俗作苓者傳寫之訛爾下有伏靈上有絲故又名伏或云其形如兔故名亦通集解别録曰茯苓伏神生大山山谷大松下二月八月采隂乾𢎞景曰今出鬱州大者如三四升器外皮黑而細皺內堅白形如鳥獸龜鱉者良虛赤者不佳性無杇蛀埋地中三十年猶色理無異也恭曰今泰山亦有茯苓實而理小不復采用第一出華山形極粗大雍州南山亦有不如華山保升曰所在大松處皆有惟華山最多生枯松樹下形塊無定以似龜鳥形者為佳禹錫曰范子計然言茯苓出嵩山及三輔淮南子言千年之松下有茯苓上有兔絲典術言松脂入地千歲為茯苓望松樹赤者有之廣志言伏神乃松汁所作勝於茯苓或云即茯苓貫著松根者生朱提濮陽縣頌曰今大華嵩山皆有之出大松下附根而生無苗葉花實作塊如拳在土底大者至數斤有赤白二種或云松脂變成或云假松氣而生今東人見山中古松久為人斬伐其枯折槎枿枝葉不復上生者謂之茯苓撥即于四面丈餘地內以鐵頭錐刺地如有茯苓則錐固不可拔乃掘取之其撥大者茯苓亦大皆自作塊不附著根其包根面輕虛者為伏神則假氣生者其説勝矣龜策傳云茯苓在兔絲之下狀如飛鳥之形新雨已霽天靜無風以火夜燒兔絲去之即篝燭此地罩之火滅即記其處明乃掘取入地四尺或七尺得矣此類今不聞有之宗奭曰上有絲之説甚為輕信時珍曰下有茯苓則上有靈氣如絲之狀山人亦時見之非絲子之絲也注淮南子者以絲子及女蘿為説誤矣茯苓有大如斗者有堅如石者絶勝其輕虛者不佳蓋年淺未堅故爾劉宋王微茯苓贊云皓苓下居彤絲上會中狀雞鳬其容龜蔡神侔少司保延幼艾終志不移柔紅可佩觀此彤絲即兔絲之證矣冦氏未解此義修治斆曰凡用皮去心搗細于水盆中攪濁浮者濾去之此是茯苓赤筋若誤服餌令人瞳子并黑睛點小兼盲目𢎞景曰作丸散者先煮二三沸乃切暴乾用氣味甘平無毒元素曰性溫味甘而淡氣味俱薄浮而升陽也之才曰馬問為之使得甘草防風芍藥紫石英麥門冬共療五臟惡白斂畏牡蒙地榆雄黃秦芃龜甲忌米醋及酸物𢎞景曰藥無馬問或是馬莖也恭曰李氏本草馬刀為茯苓使問字草書似刀字傳訛爾志曰二注恐皆非也當是馬藺字主治胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年本經止消渴好睡大腹淋瀝膈中痰水水腫淋結開胸腑調臟氣伐腎邪長隂益氣力保神氣别録開胃止嘔逆善安心神主肺痿痰壅心腹脹滿小兒驚癎女人熱淋甄權補五勞七傷開心益志止健忘暖腰膝安胎大明止渴利小便除濕益燥和中益氣利腰臍間血元素逐水緩脾生津導氣平火止泄除虛熱開腠理李杲瀉膀胱益脾胃治腎積奔豚好古赤茯苓主治破結氣甄權瀉心小腸膀胱濕熱利竅行水時珍茯苓皮主治水腫膚脹開水道開腠理時珍發明𢎞景曰茯苓白色者補赤色者利俗用甚多仙方服食亦為至要云其通神而致靈和魂而鍊魄利竅而益肌厚腸而開心調營而理衛上品仙藥也善能斷穀不飢宗奭曰茯苓行水之功多益心脾不可缺也元素曰伏苓赤瀉白補上古無此説氣味俱薄性浮而升其用有五利小便也開腠理也生津液也除虛熱也止㵼也如小便利或數者多服則損人目汗多人服之亦損元氣天人為其淡而滲也又云淡為天之陽陽當上行何以利水而瀉下氣薄者陽中之隂所以茯苓利水㵼下不離陽之體故入手太陽杲曰白者入壬癸赤者入丙丁味甘而淡降也陽中隂也其用有六利竅而除濕益氣而和中治驚悸生津液小便多者能止小便結者能通又云濕淫所勝小便不利淡以利竅甘以助湯溫平能益脾逐水乃除濕之聖藥也好古曰白者入手太隂足太陽經氣分赤者入足太隂手少隂太陽氣分伐腎邪小便多能止之小便澀能利之與車前子相似雖利小便而不走氣酒浸與光明朱砂同用能袐童元味甘而平如何是利小便耶震亨曰茯苓得松之餘氣而成屬金仲景利小便多用之此暴新病之要藥也若隂虛者恐未為宜此物有行水之功久服損人八味丸用之者亦不過接引他藥歸就腎經去胞中久陳積垢為搬運之功爾時珍曰伏苓本草又言利小便伐腎邪至李東垣王海藏乃言小便多者能止澀者能通同朱砂能祕真元而朱丹溪又言隂虛者不宜用義似相反何哉伏苓氣味淡而滲其性上行生津液開腠理滋水之原而下降利小便故張潔古謂其屬陽浮而升言其性也東垣謂其為陽中之隂降而下言其功也素問云飲食入胃遊溢精氣上輸于肺通調水道下輸膀胱觀此則知淡滲之藥俱皆上行而後下降非直下行也小便多其源亦異素問云肺氣盛則便數而欠虛則欠咳小便遺數心虛則少氣遺溺下焦虛則遺溺胞移熱于膀胱則遺溺膀胱不利為癃不約為遺厥隂病則遺溺閉癃所謂肺氣盛者實熱也其人必氣壯脈強宜用茯苓甘淡以滲其熱故曰小便多者能止也若夫肺虛心虛胞熱厥隂病者皆虛熱也其人必上熱下寒脈虛而弱法當用升陽之藥以升水降火膀胱不約下焦虛者乃火投于水水泉不藏脫陽之證其人必肢冷脈遲法當用溫熱之藥峻補其下交濟坎離二證皆非茯苓輩淡滲之藥所可治故曰隂虛者不宜用也仙家雖有服食之法亦當因人而用焉伏神氣味甘平無毒主治辟不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神别録補勞乏主心下急痛堅滿人虛而小腸不利者加而用之甄權神木即伏神心內木也又名黃松節主治偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘甄權治腳氣痺痛諸筋牽縮時珍發明𢎞景曰仙方止云茯苓而無伏神為療既同用應無嫌時珍曰神農本草止言伏苓名醫别録始添伏神而主治皆同後人治心病必用伏神故潔古張氏云風眩心虛非伏神不能除然茯苓亦未嘗不治心病也陶𢎞景始言茯苓赤瀉白補李杲復分赤入丙丁白入壬癸此其發前人之祕者時珍則謂牡苓伏神只當云赤入血分白入氣分各從其類如丹芍藥之義不當以丙丁壬癸分也若以丙丁壬癸分則白伏神不能治心病赤茯苓不能入膀胱矣張元素不分赤白之説于理欠通聖濟録松節散用伏神心中木一兩乳香一錢石器炒研為末每服二錢木瓜酒下治風寒冷濕摶于筋骨足筋攣痛行步艱難但是諸筋攣縮疼痛並主之附方舊五新二十六服茯苓法頌曰集仙方多單餌伏苓其法取白茯苓五斤去黑皮搗篩以熟絹囊盛于二斗米下蒸之米熟即止暴乾又蒸如此三遍乃取牛乳二斗和合著銅器中微火煮如膏收之每食以竹刀割隨性飽食辟穀不飢也如欲食穀先煮葵汁飲之又茯苓酥法白茯苓三十斤山之陽者甘美山之隂者味苦去皮薄切暴乾蒸之以湯淋去苦味淋之不止其汁當甜乃暴乾篩末用酒三石蜜三升相和置大甕中攪之百匝密封勿泄氣冬五十日夏二十五日酥自浮出酒上掠取其味極甘美作掌大塊空室中隂乾色赤如棗飢時食一枚酒送之終日不食名神仙度世之法又服食法以茯苓合白菊花或合桂心或合术為散丸自任皆可常服補益殊勝儒門事親方用茯苓四兩頭白麵二兩水調作餅以黃蠟三兩煎熟飽食一頓便絶食辟穀至三日覺難受以後氣力漸生也經驗後方服法用華山挺子茯苓削如棗大方塊安新甕內好酒浸之紙封一重百日乃開其色當如餳糖可日食一塊至百日肌體潤澤一年可夜視物久久腸化為筋延年耐老面若童顔嵩高記用茯苓松脂各二斤淳酒浸之和以白蜜日三服之久久通靈錢又法白茯苓去皮酒浸十五日漉出為散每服三水調下日三服夜孫真人枕中記云茯苓久服百日病除二百日晝不眠二年役使鬼神四年後玉女來侍能葛洪抱朴子云王子季服茯苓十八年玉女從之隱能彰不食穀炙瘢滅面體玉澤又黃初起服茯苓五萬日能坐在立亡日中無影交感丸方見草部莎根下吳仙丹方見果部吳茱茰下胸脅氣逆脹滿茯苓一兩人參半兩每服三錢水煎服日三聖濟總録養心安神朱雀丸治心神不定恍惚健忘不樂火不下降水不上升時復振跳常服消隂養火全心氣伏神二兩去皮沈香半兩為末煉蜜丸小豆大每服三十丸食後人參湯下百一選方血虛心汗别處無汗獨心孔有汗思慮多則汗亦多宜養心血以艾湯調伏苓末日服一錢證治要訣心虛夢泄或白濁白茯苓末二錢米湯調下日二服蘇東坡方也直指方虛滑遺精白茯苓二兩縮砂仁一兩為末入鹽二錢精羊肉批片摻藥炙食以酒送下普濟方漏精白濁方見菜部薯蕷下濁遺帶下威喜丸治丈夫元陽虛憊精氣不固小便下濁餘瀝常流夢寐多驚頻頻遺泄婦人白淫白帶並治之白茯苓去皮四兩作匱以豬苓四錢半入內煮二十餘沸取出日乾擇去豬苓為末化黃蠟搜和丸彈子大每嚼一丸空心津下以小便清為度忌米醋李時珍曰抱朴子言茯苓千萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光燒之不焦帶之辟兵服之長生和劑局方威喜丸之名蓋取諸此小便頻多白茯苓去皮乾山藥去皮以白礬水瀹過焙等分為末每米飲服二錢儒門事親方小便不禁茯苓丸治心腎俱虛神志不守小便淋瀝不禁用白伏苓赤茯苓等分為末以新汲水挼洗去筋控乾以酒煮地黃汁搗膏搜和丸彈子大每嚼一丸空心鹽酒下三因方小便淋濁由心腎氣虛神舍不守或夢遺白濁赤白茯苓等分為末新汲水飛去沫控乾以地黃汁同搗酒熬作膏和丸彈子大空心鹽湯嚼下一丸三因方下虛消渴土盛下虛心火炎爍腎水枯涸不能交濟而成渴證白茯苓一斤黃連一斤為末熬天花粉作糊丸梧子大每溫湯下五十丸德生堂經驗方下部諸疾龍液膏用堅實白茯苓去皮焙研取清溪流水洗浸去筋膜復焙入瓷內以好蜜和勻入銅釡內重湯桑柴灰煮一日取出收之每空心白湯下二三匙解煩鬱躁渴一切下部疾皆可除積善堂方飱泄滑痢不止白茯苓一兩木香煨半兩為末紫蘇木瓜湯下二錢百一選方妊娠水腫小便不利惡寒赤茯苓去皮葵子各半兩為末每服二錢新汲水下禹講師方卒然耳聾黃蠟不拘多少和茯苓末細嚼茶湯下普濟方面皯雀斑白茯苓末蜜和夜夜傳之二七日愈姚僧坦集驗方豬雞骨哽五月五日取楮子晒乾白茯苓等分為末每服二錢乳香湯下一方不用楮子以所哽骨煎湯下經驗良方痔漏神方赤白茯苓去皮沒藥各二兩破故紙四兩石臼搗成一塊春秋酒浸三日夏二日冬五日取出木籠蒸熟晒乾為末酒糊丸梧子大每酒服二十丸漸加至五十丸驗革炳集方血餘怪病手十指節斷壞惟有筋連無節肉蟲出如燈心長數寸遍身緑毛卷名曰血餘以茯苓胡黃連煎湯飲之愈夏子益竒疾方水腫尿澀伏苓皮椒目等分煎湯日飲取效普濟方琥珀别録上品釋名江珠時珍曰虎死則精魄入地化為石此物狀似之故謂之虎魄俗文從玉以其類玉也梵書謂之阿濕摩揭婆集解别録曰琥珀生永昌𢎞景曰舊説松脂淪入地千年所化今燒之亦作松氣亦有中有一蜂形色如生者博物志乃云燒蜂巢所作恐非實也此或蜂為松脂所沾因墜地淪沒爾亦有煮毈雞子及青魚魫作者並非真惟以手心摩熱拾芥為真今並從外國來而出茯苓處並無不知出琥珀處復有茯苓否也珣曰琥珀是海松木中津液初若桃膠後乃凝結復有南珀不及舶上來者保升曰楓脂入地千年變為琥珀不獨松脂變也大抵木脂入地千年皆化但不及楓松有脂而多經年歲爾蜂巢既燒安有蜂形尚在其間宗奭曰今西戎亦有其色差淡而明徹南方者色深而重濁彼土人多碾為物形若謂千年伏苓所化則其粘著蜂蟻宛然具在極不然也地理志云海南林邑多出琥珀松脂淪入地所化有琥珀則旁無草木入土淺者五尺深者八九尺大者如斛削去皮乃成此説為勝但土地有所宜不宜故有能化不化燒蜂之説不知何據承曰諸家所説茯苓琥珀雖有小異同皆云松脂所化但茯苓伏神乃大松摧折或斫伐而根瘢不朽津液下流而結成故治心腎通津液也若琥珀乃是松樹枝節榮盛時為炎日所灼流脂出樹身外日漸厚大因墮土中津潤歲久為土所滲泄而光瑩之體獨存今可拾芥尚有粘性故其蟲蟻之類乃未入土時所粘者二物皆自松出而所稟各異茯苓生于隂而成于陽琥珀生于陽而成于隂故皆治營安心而利水也斆曰凡用須分紅松脂石珀水珀花珀物象珀㙠珀琥珀其紅松脂如琥珀只是濁大脆文橫水珀多無紅色如淺黃多皺文石珀如石重色黃不堪用花珀文似新馬尾松心文一路赤一路黃物象珀其內自有物命入用神妙㙠珀是象珀之長琥珀如血色以布拭熱吸得芥子者真也時珍曰琥珀拾芥乃草芥即禾草也雷氏言拾芥子誤矣唐書載西域康千河松木入水一二年化為石正與松楓諸木瀋入土化珀同一理也今金齒麗江亦有之其伏苓千年化琥珀之説亦誤傳也按曹昭格古論云琥珀出西畨南畨乃楓木津液多年所化色黃而明瑩者名蠟珀色若松香紅而且黃者名明珀有香者名香珀出髙麗倭國者色深紅有蜂蟻松枝者尤好修治斆曰入藥用水調側柏子末安瓷鍋中置琥珀于內煮之從巳至申當有異光搗粉篩用氣味甘平無毒主治安五臟定魂魄殺精魅邪鬼消瘀血通五淋别録壯心明目磨翳止心痛顛邪療蠱毒破結瘕治産後血枕痛大明止血生肌合金瘡藏器清肺利小腸元素發明震亨曰古方用為利小便以燥脾土有功脾能運化肺氣下降故小便可通若血少不利者反致其燥急之苦𢎞景曰俗中多帶之辟惡刮削服療瘀血至驗仙經無正用藏器曰和大黃鱉甲作散酒下方寸匕下惡血婦人腹內血盡即止宋高祖時寧州貢琥珀枕碎以賜軍士傳金瘡附方舊四新五琥珀散止血生肌鎮心明目破癥瘕氣塊産後血運悶絶兒枕痛並宜餌此方琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黃六銖熬搗為散空心酒服三錢七日再服神驗莫及産後即減大黃海藥本草小兒胎驚琥珀防風各一錢朱砂半錢為末豬乳調一字入口中最妙直指方小兒胎癎琥珀朱砂各少許全蝎一枚為末麥門冬湯調一字服方直指小便轉胞真琥珀一兩為末用水四升蔥白十莖煮汁三升入珀末二錢溫服沙石諸淋三服皆效聖惠方小便淋瀝琥珀為末二錢麝香少許白湯服之或萱草煎湯服老人虛人以人參湯下亦可蜜丸以赤茯苓湯下普濟方小便尿血琥珀為末每服二錢燈心湯下直指方從高墜下有瘀血在內刮琥珀屑酒服方寸匕或入蒲黃三二七日服四五次要外臺祕金瘡悶絶不識人琥珀研粉童子小便調一錢三服瘥鬼遺方魚骨哽咽六七日不出用琥珀珠一串推入哽所牽引之即出外臺祕要醫音黟祐宋嘉釋名醫珀斆曰醫是衆珀之長故號醫珀時珍曰亦作醫其色黳黑故名集解恭曰古來相傳松脂千年為茯苓又千年為琥珀又千年為醫二物燒之皆有松氣狀似玄玉而輕出西戎而有茯苓處無此物今西州南三百黑磧中得者大則方尺黑潤而輕燒之腥臭高昌人名為木醫謂玄玉為石醫共州土石間得者燒作松氣功同琥珀見風拆破不堪為器恐此二種及琥珀或非松脂所為也慎微曰梁公子傳奈公云交河之間平磧中掘深一丈下有醫珀黑逾純漆或大如車輪末服攻婦人小腸癥瘕諸疾時珍曰醫即琥珀之黑色者或因土色薰染或是一種木瀋結成未必是千年琥珀復化也玉策經言松脂千年作茯苓茯苓千年作琥珀琥珀千年作石膽石膽千年作威喜大扺皆是神異之説未可深憑雷斆琥珀下所説諸珀可據氣味甘平無毒主治補心安神破血生肌治婦人癥瘕唐本小兒帶之辟惡磨滳目翳赤障藏器豬苓本經中品釋名豭豬屎本經豕槖莊子地烏挑圖經𢎞景曰其塊黑似豬屎故以名之司馬彪注莊子云豕槖一名苓其根似豬矢是也時珍曰馬屎曰通豬屎曰􅀈即苓字其塊零落而下故也集解别録曰豬苓生衡山山谷及濟隂寃句二月八月采隂乾𢎞景曰是楓樹苓其皮黑色肉白而實者佳削去皮用頌曰今蜀州習州亦有之生土底不必楓根下始有也時珍曰豬苓亦是木之餘氣所結如松之餘氣結茯苓之義他木皆有楓木為多耳修治斆曰采得銅刀削去粗皮薄切以東流水浸一夜至明漉出細切以升麻葉對蒸一日去葉晒乾用時珍曰豬苓取其行濕生用更佳氣味甘平無毒普曰神農甘雷公苦無毒權曰微熱元素曰氣平味甘氣味俱薄升而微降與茯苓同杲曰淡甘平降也陽中隂也好古曰甘重于苦陽也入足太陽足少隂經主治痎瘧解毒蠱疰不祥利水道久服輕身耐老本經解傷寒溫疫大熱發汗主腫脹滿腹急痛甄權治渴除濕去心中懊憹元素㵼膀胱好古開腠理治淋腫腳氣白濁帶下妊娠子淋胎腫小便不利時珍發明頌曰張仲景治消渴脈浮小便不利微熱者豬苓散發其汗病欲飲水而復吐名為水逆冬時寒嗽如瘧狀者亦與豬苓此即五苓散也豬苓茯苓术各三兩澤㵼五分桂二分細搗篩水服方寸匕日三多飲暖水汗出即愈利水道諸湯劑無若此駚今人皆用之杲曰苦以泄滯甘以助陽淡以利竅故能除濕利小便宗奭曰豬苓引水之功多久服必損腎氣昏人目久服者宜詳審之元素曰豬苓淡滲大燥亡津液無濕證者勿服之時珍曰豬苓淡滲氣升而又能降故能開腠理利小便與茯苓同功但入補藥不如茯苓也附方舊五新二傷寒口渴邪在臟也豬苓湯主之豬苓茯苓澤㵼滑石阿膠各一兩以水四升煮取二升每服七合日三服嘔而思水者亦主之張仲景方小兒袐結豬苓一兩以水少許煮雞屎白一錢調服立通外臺祕要通身腫滿小便不利豬苓五兩為末熟水服方寸匕日三服楊氏産乳妊娠腫渴從腳至腹小便不利微渴引飲方同上法子母祕録妊娠子淋方同上法日三夜二以通為度小品方壯年遺溺方見草部半夏下消渴白濁方見半夏雷丸本經下品釋名雷實别録雷矢同上竹苓時珍曰雷斧雷楔皆霹靂擊物精氣所化此物生土中無苗葉而殺蟲逐邪猶雷之丸也竹之餘氣所結故曰竹苓苓亦屎也古者屎苓字通用集解别録曰雷丸生石城山谷及漢中土中八月采根暴乾𢎞景曰今出建平宜都間纍纍相連如丸恭曰雷丸竹之苓也無有苗蔓皆零無相連者今出房州金州時珍曰雷丸大小如栗狀如豬苓而圓皮黑肉白甚堅實修治斆曰凡使用甘草水浸一夜銅刀刮去黑皮破作四五片以甘草水再浸一宿蒸之從巳至未日乾酒拌再蒸日乾用大明曰入藥炮用氣味苦寒有小毒别録曰鹹微寒有小毒赤者殺人白者善普曰神農苦黃帝岐伯桐君甘有毒扁鵲甘無毒李當之大寒權曰苦有小毒時珍曰甘微苦平之才曰荔實厚朴蓄根芫花為之使惡葛根主治殺三蟲逐毒氣胃中熱利丈夫不利女子本經作摩膏除小兒百病逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止久服令人隂痿别録逐風主癲癎狂走甄權發明𢎞景曰本經云利丈夫别録曰久服隂痿于事相反志曰經言利丈夫不利女子乃疏利男子元氣不疏利女子臟氣故曰久服令人隂痿也時珍曰按陳正敏遁齊間覽云楊勔中年得異疾每發語腹中有小聲應之久漸聲大有道士見之曰此應聲蟲也但讀本草取不應者治之讀至雷丸不應遂頓服數粒而愈附方舊一新二小兒出汗有熱雷丸四兩粉半斤為末撲之千金方下寸白蟲雷丸水浸去皮切焙為末五更初食炙肉少許以稀粥飲服一錢匕須上半月服蟲乃下經驗方筋肉化蟲方見石部雄黃下桑上寄生本經上品釋名寄屑本經寓木本經宛童本經蔦鳥吊二音時珍曰此物寄寓他木而生如鳥立于上故曰寄生寓木蔦木俗呼為寄生草東方朔傳云在樹為寄生在地為窶藪集解别録曰桑上寄生生𢎞農川谷桑樹上三月三日采莖葉隂乾𢎞景曰寄生松上楊上楓上皆有形類一般但根津所因處為異則各隨其樹名之生樹枝間根在枝節之內葉圓青赤厚澤易折旁自生枝節冬夏生四月花白五月實赤大如小豆處處皆有以出彭城者為勝俗呼為續斷用之而本經續斷别在上品主療不同市人混雜無識者恭曰此多生楓槲櫸栁水楊等樹上葉無隂陽如細栁葉而厚脆莖粗短子黃色大如小棗惟虢州有桑上者子汁甚黏核大似小豆九月始熟黃色陶言五月實赤大如小豆蓋未見也江南人相承用其莖為續斷殊不相關保升曰諸樹多有寄生莖葉並相似云是烏鳥食一物子糞落樹上感氣而生葉如橘而厚軟莖如槐而肥脆處處雖有須桑上者佳然非自采即難以别可斷莖視之色深黃者為驗又圖經云葉似龍膽而厚濶莖短似雞腳作樹形三月四月花黃白色六月七月結子黃緑色如小豆以汁稠黏者良也大明曰人多收櫸樹上者為桑寄生桑上極少縱有形與櫸上者亦不同次即楓樹上者力與櫸樹上者相同黃色七月六月采宗奭曰桑寄生皆言處處有之從官南北處處難得豈歲歲斫踐之苦不能生耶抑方宜不同耶若以為鳥食物子落枝節間感氣而生則麥當生麥穀當生穀不當生此一物也自是感造化之氣别是一物古人惟取桑上者是假其氣爾第以難得真者真者下咽必驗如神向有求此于吳中諸邑者豫遍搜不可得遂以實告之鄰邑以他木寄生送上服之逾月而死可不慎哉震亨曰桑寄生藥之要品而人不諳其的惜哉近海州邑及海外之境其地暖而不蠶桑無採捋之苦氣厚意濃自然生出也何嘗節間可容他子耶時珍曰寄生高者二三尺其葉圓而微尖厚而柔靣青而光澤背淡紫而有茸人言川蜀桑多時有生者他處鮮得須自采或連桑采者乃可用世俗多以雜樹上者充之氣性不同恐反有害也按鄭樵通志云寄生有兩種一種大者葉如石榴葉一種小者葉如麻黃葉其子皆相似大者曰蔦小者曰女蘿今觀蜀本韓氏所説亦是兩種與鄭説同修治斆曰采得銅刀和根枝莖葉細銼隂乾用勿見火氣味苦平無毒别録曰甘無毒主治腰痛小兒背強癰腫充肌膚堅髮齒長鬚眉安胎本經去女子崩中內傷不足産後餘疾下乳汁主金瘡去痺别録助筋骨益血脈大明主懷妊漏血不止令胎牢固甄權實氣味甘平無毒主治明目輕身通神本經附方新四膈氣生桑寄生搗汁一盞服之集簡方胎動腹痛桑寄生一兩半阿膠炒半兩艾葉半兩水一盞半煎一盞去滓溫服或去艾葉聖惠方毒痢膿血六脈微小並無寒熱宜以桑寄生二兩防風大芎二錢半灸甘草三銖為末每服二錢水一盞煎八分和滓服楊子建護命方下血後虛下血止後但覺丹田元氣虛乏腰膝沈重少力桑寄生為末每服一錢非時白湯點服方楊子建護命松蘿本經中品釋名女蘿别録松上寄生時珍曰名義未詳集解别録曰松蘿生熊耳山谷松樹上五月采隂乾𢎞景曰山東甚多生雜樹上而以松上者為真詩云鳥與女蘿施于松上蔦是寄生以桑上者為真不用松上者互有異同爾時珍曰按毛萇詩注云女蘿兔絲也吳晉本草絲一名松蘿陽𢎞景謂蔦是桑上寄生松蘿是松上寄生陸佃埤雅言蔦是松柏上寄生女蘿是松上浮蔓又言在木為女蘿在草為絲鄭樵通志言寄生有二種大曰蔦小曰女蘿陸璣詩疏言兔絲蔓生草上黃赤如金非松蘿也松蘿蔓延松上生枝正青與兔絲殊異羅願爾雅翼云女羅色青而細長無雜蔓故山鬼云被薜荔兮帶女蘿謂青長如帶也兔絲黃赤不相類然二者附物而生有時相結故古樂府云南山羃羃兔絲花北陵青青女蘿樹由來花葉同一心今日枝條分兩處唐樂府云兔絲故無情隨風任顛倒誰使女蘿枝而來強縈抱兩草猶一心人心不如草據此諸説則女蘿之為松上蔓當以二陸羅氏之説為的其曰兔絲者誤矣氣味苦甘平無毒主治瞋怒邪氣止虛汗頭風女子隂寒腫痛本經療痰熱溫瘧可為吐湯利水道别録治寒熱胸中客熱痰涎去頭瘡頂上瘤癭令人得眠甄權發明時珍曰松蘿能平肝邪去寒熱同瓜蒂諸藥則能吐痰非松蘿能吐人也葛洪肘後方治胸中有痰頭痛不欲食氣壯者用松蘿杜蘅三兩瓜蒂二十枚酒一升二合漬再宿旦飲一合取吐不吐晚再服一合孫思邈千金方治胸膈痰辟積熱斷膈湯用松蘿甘草各一兩恆山三兩瓜蒂二十一枚水酒各一升半煮取一升分三服取吐楓栁唐本草集解恭曰楓栁出原州葉似槐莖赤根黃子六月熟緑色而細剝取莖皮用時珍曰蘇恭言楓栁有毒出原州陳藏器駁之以為楓栁皮即今風樹皮性澀能止水痢按斗門方言即今楓樹上寄生其葉亦可制粉霜此説是也若是楓樹則處處甚多何必專出原州耶陳説誤矣楓皮見前楓香脂下皮氣味辛大熱有毒主治風齲齒痛唐本積年痛風不可忍久治無效者細銼焙不限多少入腦麝浸酒常服以醉為度斗門方桃寄生綱目氣味苦辛無毒主治小兒中蠱毒腹內堅痛面目青黃淋露骨立取二兩為末如茶點服日四五服時珍聖惠方栁寄生綱目集解時珍曰此即寄生之生栁上者氣味苦平無毒主治膈氣刺痛搗汁服一杯時珍占斯别録下品釋名炭皮别録良無極綱目時珍曰占斯范注方謂之良無極劉涓子鬼遺方謂之木占斯盛稱其功而别録一名炭皮殊不可曉集解别録曰占斯生太山山谷采無時𢎞景曰李當之云是樟樹上寄生樹大銜枝在肌肉今人皆以胡桃皮為之非是真也按桐君采藥録云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃似厚朴而無正縱橫理不知此復是何物莫測真假也氣味苦溫無毒權曰辛平無毒茱茰為之使主治邪氣濕痺寒熱疽瘡除水堅積血癥月閉無子小兒躄不能行諸惡瘡癰腫止腹痛令女人有子别録主脾熱洗手足水爛傷甄權解狼毒毒藏器附方新一木占斯散治發背腸癰疽痔婦人乳癰諸産癥瘕無有不療服之腫去痛止膿消已潰者便早愈也木占斯甘草炙厚朴炙細辛栝樓防風乾薑人參桔梗敗醬各一兩為散酒服方寸匕晝七夜四以多為善此藥入咽當覺流入瘡中令化為水也癰疽炙不發敗壞者尤可服之內癰在上者當吐膿血在下者當下膿血其瘡未壞及長服者去敗醬一方加桂心劉涓子鬼遺方石刺木拾遺集解藏器曰石刺木乃木上寄生也生南方林筤間其樹江西人呼為靳刺亦種為籬院樹似棘而大枝上有逆鈎根皮氣味苦平無毒主治破血産後餘血結瘕煮汁服神驗不可言藏器木之五苞木類四種竹本經中品釋名時珍曰竹字象形許慎説文云竹冬生草也故字從倒草戴凱之竹譜云植物之中有名曰竹不剛不柔非草非木小異實虛大同節目集解𢎞景曰竹類甚多入藥用䈽竹次用淡苦竹又一種薄殼者名甘竹葉最勝又有實中竹篁竹並以筍為佳于藥無用頌曰竹處處有之其類甚多而入藥惟用䈽竹淡竹苦竹三種人多不能盡别按竹譜䈽竹堅而促節體圓而質徑皮白如霜大者宜刺船細者可為笛苦竹有白有紫甘竹似篁而茂即淡竹也然今之刺船者多用桂竹作笛自有一種亦不名䈽竹苦竹亦有二種一出江西閩中本極粗大笋味殊苦不可噉一出江浙肉厚而葉長濶笋微有苦味俗呼甜苦笋是也今南人入藥燒瀝惟用淡竹一品肉薄節間有粉者時珍曰竹惟江河之南甚多故曰九河鮮有五嶺實繁大扺皆土中苞笋各以時而出旬日落籜而成竹也莖有節節有枝枝有節節有葉葉必三之枝必兩之根下之枝一為雄二為雌雌者生笋其根鞭喜行東南而宜死貓畏皂刺油麻以五月十三日為醉日六十年一花花結實其竹則枯竹枯曰箹竹實曰􅘽小曰篠大曰簜其中皆虛而有實心竹出滇廣其外皆圓而有方竹出川蜀其節或暴或無或促或疏暴節竹出蜀中高節磊砢即笻竹也無節竹出溱州空心直上即通竹也篃竹一尺數節出荆南笛竹一節尺餘出吳楚篔簹竹一節近丈出南廣其幹或長或短或巨或細交廣由吾竹長三四丈其肉薄可作屋柱䈏竹大至數圍其肉厚可為梁楝永昌漢竹可為桶斛􅥮竹可為舟船嚴州越王竹高止尺餘辰州龍絲竹細僅如針高不盈尺其葉或細或大鳯尾竹葉細三分龍公竹葉若芭蕉百葉竹一枝百葉其性或柔或徑或滑或澀澀者可以錯甲謂之􅓁簩滑者可以為席謂之桃枝徑者可以為戈刀箭矢謂之矛竹箭竹筋竹石麻柔者可為繩索謂之蔓竹弓竹苦竹把髮其色有青有黃有白有赤有烏有紫有斑斑者駁文點染紫者黯色黝然烏者黑而害母赤者厚而直白者薄而曲黃者如金青者如玉其别種有棘竹一名竻竹􅉭棘森然大者圍二尺可禦盜賊棕竹一名實竹其葉似棕可為拄杖慈竹一名義竹叢生不散人栽為玩廣人以筋竹絲為竹布甚脆䈽竹葉氣味苦平無毒别録曰大寒主治咳逆上氣溢筋急惡瘍殺小蟲本經除煩熱風痙喉痺嘔吐别録煎湯尉霍亂轉筋時珍淡竹葉氣味辛平大寒無毒權曰甘寒主治胸中痰熱咳逆上氣别録吐血熱毒風止消渴壓丹石毒甄權消痰治熱狂煩悶中風失音不語壯熱頭痛頭風止驚悸溫疫迷悶妊婦頭旋倒地小兒驚癎天弔大明喉痺鬼疰惡氣煩熱殺小蟲孟詵涼心經益元氣除熱緩脾元素煎濃汁潄齒中出血洗脫肛不收時珍苦竹葉氣味苦冷無毒主治口瘡目痛明目利九竅别録治不睡止消渴解酒毒除煩熱發汗療中風瘖啞大明殺蟲燒末和豬膽塗小兒頭瘡耳瘡疥癬和雞子白塗一切惡瘡頻用取效時珍發明𢎞景曰甘竹葉最勝詵曰竹葉堇苦淡甘之外餘皆不堪入藥不宜人淡竹為上甘竹次之宗奭曰諸竹笋性皆寒故知其葉一致也張仲景竹葉湯惟用淡竹元素曰竹葉苦平隂中微陽杲曰竹葉辛苦寒可升可降陽中隂也其用有二除新久風邪之煩熱止喘促氣勝之上衝附方新二上氣發熱因奔趁走馬後飲冷水所致者竹葉三斤橘皮三兩水一斗煎五升細服三日一劑肘後方時行發黃竹葉五升切小麥七升石膏三兩水一斗半煮取七升細服盡劑愈肘後方䈽竹根主治作湯益氣止渴補虛下氣本經消毒别録淡竹根主治除煩熱解丹石發熱渴煮汁服藏器消痰去風熱驚悸迷悶小兒驚癎大明同葉煎湯洗婦人子宫下脫時珍甘竹根主治煮汁服安胎止産後煩熱時珍苦竹根主治下心肺五臟熱毒氣銼一斤水五升煮汁一升分三服孟詵附方新一産後煩熱逆氣用甘草根切一斗五升煮取七升去滓入小麥二升大棗二十枚煮三四沸入甘草一兩麥門冬一升再煎至二升每服五合婦人良方淡竹茹氣味甘微寒無毒主治嘔啘溫氣寒熱吐血崩中别録止肺痿唾血鼻衄治五痔甄權噎膈孟詵傷寒勞復小兒熱癎婦人胎動時珍苦竹茹主治下熱壅孟詵水煎服止尿血時珍筀竹茹主治勞熱大明附方舊五新五傷寒勞復傷寒後交接勞復卵腫股痛竹皮一升水三升煮五沸服汁朱肱南陽活人書婦人勞復病初愈有所勞動致熱氣衝胸手足搐搦拘急如中風狀淡竹青茹半斤栝樓二兩水二升煎一升分二服活人書産後煩熱內虛短氣甘竹茹湯用甘竹茹一升人參茯苓甘草各二兩黃芩二兩水六升煎二升分服日三服婦人良方婦人損胎孕八九月或墜傷牛馬驚傷心痛用青竹茹五兩酒一升煎五合服子母祕録月水不斷青竹茹微炙為末每服三錢水一盞煎服普濟方小兒熱痛口噤體熱竹青茹三兩醋三升煎一升服一合子母祕録齒血不止生竹皮醋浸令人含之噀其背上三過以茗汁漱之方千金牙齒宣露黃竹葉當歸尾研末煎湯入鹽含漱永類方飲酒頭痛竹茹二兩水五升煮三升納雞子三枚煮三沸食之千金方傷損內痛兵杖所加木石所迮血在胸背脅下刺痛用青竹茹亂髮各一團炭火炙煎為末酒一升煮三沸服之三服愈千金方淡竹瀝修治機曰將竹截作二尺長劈開以磚兩片對立架竹于上以火炙出其瀝以盤承取時珍曰一法以竹截長五六寸以瓶盛倒懸下用一器承之周圍以炭火逼之其油瀝于器下也氣味甘大寒無毒時珍曰薑汁為之使主治暴中風風痺胸中大熱止煩悶消渴勞復别録中風失音不語養血清痰風痰虛痰在胸膈使人癲狂痰在經絡四肢及皮裏膜外非此不逹不行震亨治子冒風痓解射罔毒時珍䈽竹瀝主治風痓别録苦竹瀝主治口瘡目痛明目利九竅别録同功淡竹大明治牙疼時珍慈竹瀝主治療熱風和粥飲服孟詵發明𢎞景曰凡取竹瀝惟用淡苦䈽竹者雷曰久渴心煩宜投竹瀝震亨曰竹瀝滑痰非助以薑汁不能行諸方治胎産金瘡口噤與血虛自汗消渴小便多皆是隂虛之病無不用之産後不礙虛胎前不損子本草言其大寒似與石膏黃苓同類而世俗因大寒二字棄而不用經云隂虛則發熱竹瀝味甘性緩能除隂虛之有大熱者寒而能補與薯蕷寒補義同大寒言其功非獨言其氣也世人食筍自幼至老未有因其寒而病者瀝即筍之液也又假於火而成何寒如此之甚耶但能食者用荆瀝不能食者用竹瀝時珍曰竹瀝性寒而滑大抵因風火燥熱而有痰者宜之苦寒濕胃虛腸滑之人服之則反傷腸胃筍性滑利多食㵼人僧家謂之刮腸箆即此義也丹溪朱氏謂大寒言其功不言其氣殊悖于理謂大寒為氣何害于功淮南子云稿竹有火不鑽不然今貓獠人以乾竹片相戞取火則竹性雖寒亦未必大寒也神仙傳云昔薑公服竹汁餌桂得長生蓋竹汁性寒以桂濟之亦與用薑汁佐竹瀝之意相同淡竹今人呼為水竹有大小二種此竹汁多而甘沈存中言苦竹之外皆為淡竹誤矣附方舊十二新九中風口噤竹瀝薑汁等分日日飲之千金方小兒口噤體熱用竹瀝二合暖飲分三四服兵部手集産後中風口噤身直面青手足反張竹瀝飲一二升即蘇梅師方破傷中風凡閃脫折骨諸瘡慎不可當風用扇中風則發痓口噤項急殺人急飲竹瀝二三升忌冷飲食及酒竹瀝卒難得可合十許束併燒取之外臺祕要金瘡中風口噤欲死竹瀝半升微微暖服廣利方大人喉風筀竹油頻飲之集簡方小兒重舌竹瀝漬黃蘗時時點之簡便方小兒傷寒淡竹瀝葛根汁各六合細細與服千金方小兒狂語夜後便發竹瀝夜服二合姚和衆至寶方婦人胎動妊娠因夫所動困絶以竹瀝飲一升立愈産寶孕婦子煩竹瀝頻頻飲之兩梅師方伏苓二竹瀝一升水四升煎二升分三服不瘥更作之時氣煩燥五六日不解青竹瀝半盞煎熱數數飲之厚覆取汗千金方消渴尿多竹瀝恣飲數日愈肘後方咳嗽肺痿大人小兒咳逆短氣胸中吸吸咳出涕吐嗽出臭膿用淡竹瀝一合服之日三五次以愈為度李綘兵部手集産後虛汗淡竹瀝三合暖服須臾再服咱殷産寶小兒吻瘡竹瀝和黃連黃蘖黃丹傳之全幼心鑑小兒赤目淡竹瀝點之或入人乳古今録驗赤目眥痛不得開者肝經實熱所致或生障翳用苦竹瀝五合黃連二分綿褁浸一宿頻點之令熱淡出梅師方卒牙齒痛苦竹燒一頭其一頭汁出熱揩之姚僧坦集驗方丹石毒發頭眩耳鳴恐懼不安淡竹瀝頻服二三升古今録驗竹筍見菜部慈竹籜主治小兒頭身惡瘡燒散和油塗之或入輕粉少許時珍竹實主治通神明輕身益氣本經發明别録曰竹實出益州𢎞景曰竹實出藍田江東乃有花而無實頃來斑斑有實狀如小麥可為飯食承曰舊有竹實鸞鳯所食今近道竹間時見開花小白如棗花亦結實如小麥子無氣味而澀江浙人號為竹米以為荒年之兆其竹即死必非鸞鳯所食者近有餘干人言竹實大如雞子竹葉層層包褁味甘勝蜜食之令人心膈清涼生深竹林茂盛蒙密處頃因得之但日久汁枯乾而味尚存爾乃知鸞鳯所食非常物也時珍曰按陳藏器本草云竹肉一名竹實生苦竹枝上大如雞子似肉臠有大毒須以灰汁煮二度煉訖乃依常菜茹食煉不熟則戟人喉出血手爪盡脫也此説與陳承所説竹實相似恐即一物但苦竹上者有毒爾與竹米之竹實不同山白竹即山間小白竹也主治燒灰入腐爛癰疽藥時珍爆竹主治辟妖氣山魈慎微曰李畋該聞集云仲叟者家為山魈所祟擲石開戶畋令旦夜于庭中爆竹數十竿若除夕然其祟遂止竹黃宋開寶釋名竹膏志曰天竺黃生天竺國今諸竹內往往得之人多燒諸骨及葛粉等雜之大明曰此是南海邊竹內塵沙結成者宗奭曰此是竹內所生如黃土著竹成片者時珍曰按吳僧贊寧云竹黃生南海鏞竹中此竹極大又名天竹其內有黃可以療疾本草作天竺者非矣􅥮竹亦有黃此説得之氣味甘寒無毒大明曰平伕粉霜主治小兒驚風天弔去諸風熱鎮心明目療金瘡滋養五臟開寶治中風痰壅卒失音不語小兒客忤癎疾大明制藥毒發熱保升發明宗奭曰天竹黃涼心經去風熱作小兒藥尤宜和緩故也時珍曰竹黃出于大竹之津氣結成其氣味功用與竹瀝同而無寒滑之害附方新一小兒驚熱天竹黃二錢雄黃牽牛末各一錢研勻麵糊丸粟米大每服三五丸薄荷湯下錢乙方仙人杖宋嘉祐集解藏器曰此是筍欲成竹時立死者色黑如漆五六月收之苦竹桂竹多生此别有仙人杖草見草部又枸杞亦名仙人杖與此同名氣味鹹平無毒大明曰冷主治噦氣嘔逆小兒吐乳大人吐食反胃辟痁並水煮服之藏器小兒驚癎及夜啼置身伴睡良又燒為末水服方寸匕主痔病忌牛肉大明煮汁服下魚骨硬時珍鬼齒拾遺釋名鬼針藏器曰此腐竹根先入地者為其賊惡故隱其名草部亦有鬼針氣味苦平無毒主治中惡注忤心腹痛煮汁服之藏器煮汁服下骨硬燒存性入輕粉少許油調塗小兒頭瘡時珍附方新二魚骨硬咽籬腳朽竹去泥研末蜜丸芡子大綿裹含之其骨自消也王璆百一選方小便尿血籬下竹根入土多年者不拘多少洗淨煎湯併服數碗立止救急良方木之六雜木類七種附録二十種淮木本經下品校正併入别録有名未用城裏赤柱釋名百歲城中木本經城裏赤柱别録曰淮木生晉陽平澤又云城裏赤柱生晉平陽時珍曰按吳普本草淮木生晉平陽河東平澤與别録城裏赤柱出處及主治相同乃一物也即古城中之木晉人用之故云生晉平陽及河東今併為一但淮木字恐有差訛耳氣味苦平無毒别録曰辛普曰神農雷公無毒主治久咳上氣傷中虛羸本經女子隂蝕漏下赤白沃城裏赤柱療婦人漏血白沃隂蝕濕痺邪氣補中益氣並别録煮湯服主難産杜正論城東腐木别録有名未用校正併入拾遺腐木地主二條釋名地主藏器曰城東腐木即城東古木在土中腐爛者一名地主城東者猶東牆土之義也杜正倫方用古城柱木煮湯服治難産即其類也氣味鹹溫無毒藏器曰平主治心腹痛止泄便膿血别録主鬼氣心痛酒煮一合服蜈蚣咬者取腐木漬汁塗之亦可研末和醋傅之藏器凡手足掣痛不仁不隨者朽木煮湯熱漬痛處甚良時珍東家雞棲木拾遺釋名時珍曰酉陽雜俎作東門雞棲木主治無毒主失音不語燒灰水服盡一升效藏器古厠木拾遺厠籌附主治鬼魅傳尸溫疫魍魎神崇以太歲所在日時當戶燒熏又熏杖瘡令冷風不入藏器附録厠籌主難産及霍亂身冷轉筋中惡鬼氣並於牀下燒取熱氣徹上此物雖微其功可録藏器古櫬板拾遺集解藏器曰此古冢中棺木也彌古者隹杉材最良千歲者通神宜作琴底爾雅注云杉木作棺埋之不腐主治無毒主鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所􅑂撓者水及酒和東引桃枝煎服當得吐下藏器附方新一小兒夜啼朽棺木燒明照之即止聖惠震燒木拾遺釋名霹靂木時珍曰此雷所擊之木也方士取刻符印以召鬼神周日用注博物志云用擊鳥影其鳥必自墮也主治火驚失心煮汁服之又挂門户大厭火災藏器河邊木拾遺主治令人飲酒不醉五月五日取七寸投酒中二遍飲之必能飲也藏器附録諸木一十九種新雉木别録曰味苦香溫無毒主風眩痛可作沐藥七月采隂乾實如桃合新木别録曰味辛平無毒解心煩止瘡痛生遼東俳蒲木别録曰味甘平無毒主少氣止煩生陵谷葉如奈實赤三稜遂陽木别録曰味甘無毒主益氣生山中如白楊葉三月實十月熱赤可食學木核别録曰味甘寒無毒主脅下留飲胃氣不平除熱如蕤核五月采隂乾栒音荀核别録曰味苦療水身面癰腫五月采木核别録曰療腸澼花療不足子療傷中根療心腹逆氣止渴十月采荻皮别録曰味苦止消渴白蟲益氣生江南如松葉有别刺實赤黃十月采柵木皮珣曰味苦溫無毒主霍亂吐瀉小兒吐乳暖胃正氣並宜水煎服按廣志云生廣南山野其樹如桑乾陀木皮珣曰按西域記云生西國彼人用染僧褐故名乾陀褐色也樹大皮厚葉如櫻桃安南亦有溫平無毒主癥瘕氣塊溫腹暖胃止嘔逆並良破宿血婦人血閉腹內血塊酒煎服之馬瘍木根皮藏器曰有小毒主惡瘡疥癬有蟲為末和油塗之出江南山谷樹如櫪也角落木皮藏器曰味苦溫無毒主赤白痢煮汁服之生江西山谷似茱萸獨莖也芺樹藏器曰有大毒主風㾖偏枯筋骨攣縮癰􅂒皮膚不仁疼冷等取枝葉搗碎大甑蒸熱鋪牀上卧之冷更易骨節間風盡出當得大汗用補藥及羮粥食之慎風冷勞復生江南深山葉長厚冬月不凋山人識之白馬骨藏器曰無毒主惡瘡和黃連細辛白調牛膝雞桑皮黃荆等燒末淋汁取治瘰癧惡瘡蝕息肉白癜風揩破塗之又單取莖葉煮汁服止水痢生江東似石榴而短小對節慈母枝葉藏器曰炙香作飯下氣止渴令人不睡主小兒痰痞生山林間葉如櫻桃而小樹髙丈餘山人並識之黃屑藏器曰味苦寒無毒主心腹痛霍亂破血酒煎服之酒疸目黃及野雞病熱痢下血並水煮服之從西南來者並作屑染黃用之樹如檀那耆悉藏器曰味苦寒無毒主結熱熱黃大小便澀赤丹毒諸熱明目取汁洗目主赤爛熱障生西南諸國一名龍花帝休藏器曰主帶之愁自銷生少室山嵩高山山海經云少室山有木名帝休其枝五衢黃花黑實服之不愁今嵩山應有此木人未識固宜求之亦如萱草之忘憂也大木皮頌曰生施州四時有葉無花樹之大小定其皮味苦澀性溫無毒采無時土人與苦桃皮櫻桃皮三皮刮洗淨焙乾等分搗羅酒服一錢治一切熱毒氣服食無忌本草綱目卷三十七
