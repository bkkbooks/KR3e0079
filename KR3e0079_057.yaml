body:
  text: 本草綱目卷二十一明李時珍撰草之十苔類十六種內附五種陟釐别録中品釋名側梨恭水苔開寶石髮同石衣廣雅水衣説文水綿綱目藫音覃恭曰藥對云河中側梨側梨陟釐聲相近也王子年拾遺記晉武帝賜張華側理紙乃水苔為之後人訛陟釐為側理耳此乃水中粗苔作紙青緑色名苔紙青澀范東陽方云水中石上生者如毛緑色石髮之名以此時珍曰郭璞曰藫水草也一名石髮江東食之案石髮有二生水中者為陟釐生陸地者為烏韭集解别録曰陟釐生江南池澤𢎞景曰此即南人用作紙者惟合斷下藥用之志曰此即石髮也色類苔而粗澀為異水苔性冷浮水中陟釐性溫生水中石上宗奭曰陟釐今人乾之治為苔脯堪啖青苔亦可作脯食皆利人汴京市中甚多頌曰石髮乾之作菜以虀臛啖之尤美苔之類有井中苔垣衣昔邪屋遊大抵主療略同陸龜蒙苔賦云高有瓦苔畀有澤葵散巖竇者曰石髮補空田者曰垣衣在屋曰昔邪在藥曰陟釐是矣澤葵鳬葵也雖異類而皆感瓦石之氣而生故推類而云耳時珍曰陟釐有水中石上生者蒙茸如髮有水汚無石而自生者纒牽如絲綿之狀俗名水綿其性味皆同述異記言苔錢謂之澤葵與鳬葵同名異物蘇氏指為鳬葵者誤矣苔賦所述猶未詳盡蓋苔衣之類有五在水曰陟釐在石曰石濡在瓦曰屋遊在牆曰垣衣在地曰地衣其蒙翠而長數寸者亦有五在石曰烏韭在屋曰瓦松在墻曰土馬騣在山曰卷柏在水曰藫也氣味甘大溫無毒主治心腹大寒溫中消穀強胃氣止泄痢别録搗汁服治天行病心悶日華作脯食止渴疾禁食鹽宗奭搗塗丹毒赤遊時珍乾苔食療集解藏器曰乾苔海族之流也時珍曰此海苔也彼人乾之為脯海水鹹故與陟釐不同張華博物志云石髮生海中者長尺餘大小如韭葉以肉雜蒸食極美張勃吳録云紅蘺生海水中正青似亂髮乃海苔之類也蘇恭以此為水苔者不同水苔不甚鹹氣味鹹寒無毒大明曰溫𢎞景曰柔苔寒乾苔熱詵曰苔脯食多發瘡疥令人痿黃少血色瑞曰有咳嗽人不可食主治癭瘤結氣𢎞景治痔殺蟲及霍亂嘔吐不止煮汁服孟詵心腹煩悶者冷水研如泥飲之即止藏器下一切丹石諸藥毒納木孔中殺蠧日華消茶積瑞燒末吹鼻止衄血湯浸搗傳手背腫痛時珍發明時珍曰洪氏夷堅志云河南一寺僧盡患癭疾有洛陽僧共寮每食取苔脯同餐經數月僧項贅皆消乃知海物皆能除是疾也井中苔及萍藍别録中品集解𢎞景曰廢井中多生苔萍及磚土間多生雜草菜藍既解毒在井中者尤佳非别一物也氣味甘大寒無毒主治漆瘡熱瘡水腫井中藍殺野葛巴豆諸毒别録療湯火傷灼瘡𢎞景船底苔食療氣味甘冷無毒主治鼻洪吐血淋疾同炙甘草豉汁濃煎湯呷之孟詵解天行熱病伏熱頭目不清神志昏塞及諸大毒以五兩和酥餅末一兩半麵糊丸梧子大每溫酒下五十丸時珍發明時珍曰案方賢竒效方云水之精氣漬船板木中纍見風日久則變為青色蓋因太陽晒之中感陰陽之氣故服之能分陰陽去邪熱調臟腑物之氣味所宜也附方舊二小便五淋船底苔一團雞子大水煮飲陳藏器乳石發動小便淋瀝心神悶亂船底青苔半雞子大煎汁溫服日三四次聖惠方石蕊拾遺校正併入有名未用别録石濡釋名石濡别録石芥同雲茶綱目蒙頂茶時珍曰其狀如花蕊其味如茶故名石芥乃茶字之訛集解藏器曰石蕊生太山石上如花蕊為丸散服之今時無復有此也王隱晉書唐褒入林慮山食木實餌石蕊遂得長年即此也又曰石濡生石之陰如屋遊垣衣之類得雨即展故名石濡早春青翠端開四葉山人名石芥時珍曰别録石濡具其功用不言形狀陳藏器言是屋遊之類復出石蕊一條功同石濡蓋不知其即一物也此物惟諸高山石上者為良今人謂之蒙頂茶生兖州蒙山石上乃煙霧熏染日久結成蓋苔衣類也彼人春初刮取曝乾餽人謂之雲茶其狀白色輕薄如花蕊其氣香如菌其味甘澀如茗不可煎飲止宜咀嚼及浸湯啜清涼有味唐褒入山餌此以代茗而已長年之道未必盡緣此物也氣味甘溫無毒時珍曰甘澀涼主治石濡明目益精氣令人不飢渴輕身延年别録石蘂主長年不飢藏器生津潤咽解熱化痰時珍地衣草目華校正併入拾遺土部仰天皮釋名仰天皮拾遺掬天皮綱目集解大明曰此乃陰濕地被日晒起苔蘚也藏器曰即濕地土苔衣如草狀者耳氣味苦冷微毒藏器曰平無毒主治卒心痛中惡以人垢膩為丸服七粒又主馬反花瘡生油調傅大明明目藏器研末新汲水服之治中暑時珍附方新三身面丹腫如蛇狀者以雨滴階上苔痕水花塗蛇頭上即愈危氏得效方雀目夜昏七月七日九月九日取地衣草陰乾為末酒服方寸匕日三服一月愈崔知悌方陰上粟瘡取停水濕處乾卷皮為末傅之神效外臺祕要垣衣别録中品釋名垣嬴别録天韭别録鼠韭别録昔邪别録集解别録曰垣衣生古垣墻陰或屋上三月三日采陰乾恭曰此即古墻北陰青苔衣也其生石上者名昔邪一名烏韭生屋上者名屋遊形並相似為療略同江南少澀故陶𢎞景云方不復用俗中少見也時珍曰此乃磚墻城垣上苔衣也生屋瓦上者即為屋遊氣味酸冷無毒主治黃疸心煩咳逆血氣暴熱在腸胃暴風口噤金瘡內塞酒漬服之久服補中益氣長肌肉好顔色别録搗汁服止衄血燒灰油和傅湯火傷時珍屋遊别録下品釋名瓦衣綱目瓦苔嘉祐瓦蘚綱目博邪集解别録曰屋遊生屋上陰處八月九月采𢎞景曰此古瓦屋上苔衣也剝取用之時珍曰其長數寸者即為瓦松也氣味甘寒無毒主治浮熱在皮膚往來寒熱利小腸膀胱氣别録止消渴之才小兒癎熱時氣煩悶開寶煎水入鹽潄口治熱毒牙齦宣露研末新汲水調服二錢止鼻衄時珍發明時珍曰别録主治之證與本經烏韭文相同蓋一類性氣不甚遼逺也附方新一犬咬舊屋瓦上刮下青苔屑按之即止經驗方昨葉何草唐本草釋名瓦松唐本瓦花綱目向天草綱目赤者名鐵腳婆羅門草綱目天王鐵塔草時珍曰其名殊不可解頌曰瓦松如松子作層故名集解恭曰昨葉何草生上黨屋上如蓬初生高尺餘遠望如松栽志曰處處有之生年久瓦屋上六月七月采苗日乾氣味酸平無毒時珍曰按庚辛玉册云向天草即瓦松陰草也生屋瓦上及深山石縫中莖如漆圓鋭葉背有白毛有大毒燒灰淋汗沭髮髮即落誤入目令人瞽搗汁能結草砂伏雌雄砂术白礬其説與本草無毒及生眉髮之説相反不可不知主治口中乾痛水穀血痢止血唐本生睂髮膏為要藥馬志行女子經絡蘇頌大腸下血燒灰水服一錢又塗諸瘡不斂時珍附方舊一新丸小便沙淋瓦松即瓦上無根草煎濃湯乘熱熏洗小腹約兩時即通經驗良方通經破血舊屋陰處瓦花活者五兩熬膏當歸鬚乾漆一兩燒煙盡當門子二錢為末棗肉和丸梧子大每服七十丸紅花湯下摘玄方染烏髭髮乾瓦松一斤半生麻油二斤同煎令焦為末另以生麻油浸塗甚妙聖濟録頭風白屑瓦松暴乾燒灰淋汁熱洗不過六七次聖惠方牙齦腫痛瓦花白礬等分水煎漱之立效摘玄方唇裂生瘡瓦花生薑入鹽少許搗塗摘玄方湯火灼傷瓦松生柏葉同搗傅乾者為末醫方摘要瘡不斂瓦松陰乾為末先以槐枝蔥白湯洗後糝之立效濟生祕覽惡瘡不斂方同上風狗咬傷瓦松雄黃研貼即不發生生編附録紫衣拾遺藏器曰味苦無毒主黃疸暴熱目黃沉重下水廕亦止熱痢煮服之作灰淋汁沐頭長髮此古木錦花也石瓦皆有之堪染褐烏韭本經下品校正移入有名未用别録鬼釋名石髮唐本石衣日華石苔唐本石花綱目石馬騣綱目鬼與麗同𢎞景曰垣衣亦名烏韭而為療異非此種類也時珍曰别録主療之證與垣衣相同則其為一類通名烏韭亦無害也但石髮與陟釐同名則有水陸之性稍有不同耳集解别録曰烏韭生山谷石上又曰鬼生石上挼之日乾為末恭曰石苔也又名石髮生巖石之陰不見日處與卷柏相類藏器曰生大石及木間陰處青翠茸茸者似苔而非苔也大明曰此即石衣也長者可四五寸氣味甘寒無毒大明曰冷有毒垣衣為之使主治皮膚往來寒熱利小腸膀胱氣本經療黃疸金瘡內塞補中益氣别録燒灰沐頭長髮令黑大明附方新三腰腳風冷石花浸酒飲之聖惠方婦人血崩石花細茶焙為末舊漆碟燒存性各一匙以碗盛酒放鍋內煮一滚乃入藥末露一宿侵晨連藥再煮一滚溫服董炳避水方湯火傷灼石花焙研傅之海上方附録百蘂草宋圖經頌曰生河中府秦州劍州根黃白色形如瓦松莖葉俱青有如松葉無花三月生苗四月長及五六寸許四時采根晒用下乳汁順血脈調氣甚佳時珍曰烏韭是瓦松之生于石上者百蘂草是瓦松之生于地下者也土馬騣宋嘉祐集解禹錫曰所在背陰古墻垣上有之嵗多雨則茂盛或以為垣衣非也垣衣生垣墻之側此生垣牆之上比垣衣更長故謂之馬騣苔之類也時珍曰垣衣乃磚牆上苔衣此乃土牆上烏韭也氣味甘酸寒無毒主治骨熱敗煩熱毒壅衄鼻嘉祐沐髮令長黑通大小便時珍附方新五九竅出血牆頭苔挼塞之海上方鼻衄不止寸金散用牆上土馬騣二錢半石州黃藥子五錢為末新水服二錢再服立止衛生寶鑑二便不通土馬騣水淘淨瓦􅏼過切每服二錢水一盞煎服普濟耳上濕瘡土馬騣井中苔等分為末燈盞內油和塗之聖濟録少年髮白土馬騣石馬騣五倍子半夏各一兩生薑二兩胡桃十箇膽礬半兩為末搗作一塊每以絹袋盛一彈子用熱酒入少許浸汁洗髮一月神效聖濟録卷柏本經上品釋名萬歲别録長生不死草綱目豹足吳普求股别録交時别録時珍曰卷柏豹足象形也萬歲長生言其耐久也集解别録曰卷柏生常山山谷石間五月七月采陰乾𢎞景曰今出近道叢生石土上細葉似柏屈藏如雞足青黃色用之去下近沙石處禹錫曰出建康范子計然曰出三輔頌曰今關陜及沂兖諸州亦有之宿根紫色多鬚春生苗似柏葉而細拳攣如雞足高三五寸無花子多生石上修治時珍曰凡用以鹽水煮半日再以井水煮半日晒乾焙用氣味辛平無毒别録曰甘溫普曰神農辛平桐君雷公甘微寒主治五臟邪氣女子陰中寒熱痛癥瘕血閉絶子久服輕身和顔色本經止咳逆治脫肛散淋結頭中風眩痿躄強陰益精令人好容顔别録通月經治尸疰鬼疰腹痛百邪鬼魅啼泣甄權鎮心除面皯頭風暖水臟生用破血炙用止血大明附方新二大腸下血卷柏側柏棕櫚等分燒存性為末每服三錢酒下亦可飯丸服仁存方遠年下血卷柏地榆焙等分每用一兩水一碗煎數十沸通口服百一選方附録地柏宋圖經頌曰主臟毒下血與黃茋等分為末米飲每服二錢蜀人甚神此方其草生蜀中山谷河中府亦有之根黃狀如絲莖細上有黃點子無花葉三月生長四五寸許四月采暴乾用蜀中九月采市多貨之時珍曰此亦卷柏之生于地上者耳含生草拾遺藏器曰生靺鞨國葉如卷柏而大性平無毒主婦人難産含之咽汁即生玉柏别録有名未用釋名玉遂别録藏器曰舊作玉伯乃傳寫之誤集解别録曰生石上如松高五六寸紫花用莖葉時珍曰此即石松之小者也人皆采置盆中養數年不死呼為千年柏萬年松氣味酸溫無毒主治輕身益氣止渴别録石松拾遺集解藏器曰生天台山石上似松高一二尺山人取根莖用時珍曰此即玉柏之長者也名山皆有之氣味苦辛溫無毒主治久患風痺腳膝疼冷皮膚不仁氣力衰弱久服去風血風瘙好顔色變白不老浸酒飲良藏器桑花日華釋名桑蘚綱目桑錢集解大明曰生桑樹上白蘚如地錢花樣刀刮取炒用不是桑椹花也氣味苦暖無毒主治健脾澀腸止鼻洪吐血腸風崩中𢃄下大明治熱咳時珍附方新一大便後血桑樹上白蘚花水煎服或末服亦止吐血聖惠方附録艾納時珍曰艾納生老松樹上緑苔衣也一名松衣和合諸香燒之煙清而聚不散别有艾納香與此不同又嶺南海島中檳榔木上有苔如松之艾納單爇極臭用合泥香則能發香如甲香也霏雪録云金華山中多樹衣僧家以為蔬味極美馬勃别録下品釋名馬疕音屁馬􅀢􅀢音庀灰菰綱目牛屎菰集解别録曰馬勃生園中久腐處𢎞景曰俗呼馬􅀢勃是也紫色虛軟狀如狗肝彈之粉出宗奭曰生濕地及腐木上夏秋采之有大如斗者小亦如升杓韓退之所謂牛溲馬勃俱收並蓄者是修治時珍曰凡用以生布張開將馬勃于上摩擦下以盤承取末用氣味辛平無毒主治馬瘡馬疥别録傅諸瘡甚良𢎞景去膜以蜜拌揉少以水調呷治喉痺咽疼宗奭清肺散血熱解毒時珍發明時珍曰馬勃輕虛上焦肺經藥也故能清肺熱咳嗽喉痺衄血失音諸病李東垣治大頭病咽喉不利普濟消毒飲亦用之附方新九咽喉腫痛咽物不得馬勃一分蛇退皮一條燒末綿褁一錢含咽立瘥聖惠方走馬喉痺馬屁勃即灰菰熖消一兩為末每吹一字吐涎血即愈經驗良方聲失不出馬􅀢勃馬牙消等分研末沙糖和丸芡子大噙之摘玄方久嗽不止馬勃為末蜜丸梧子大每服二十丸白湯下即愈普濟方魚骨哽咽馬勃末蜜丸彈子大噙咽聖濟録積熱吐血馬屁勃為末沙糖丸如彈子大每服半丸冷水化下袖珍方妊娠吐衄不止馬勃末濃米飲服半錢聖惠方斑瘡入眼馬屁勃蛇皮各五錢皂角子十四箇為末入罐內鹽泥固濟燒存性研每溫酒服一錢閻孝忠集效方膁瘡不斂蔥鹽湯洗淨拭乾以馬屁勃末傅之即愈仇遠稗史草之十一雜草及有名未用共一百五十三種時珍曰諸草尾瑣或無從考證不可附屬并本經及别録有名未用諸草難遺者通彚於此以備考雜草九種百草拾遺藏器曰五月五日采一百種草陰乾燒灰和石灰為團煆研傅金瘡止血亦傅犬咬又燒灰和井華水作團煆白以釅醋和作餅腋下夾之乾即易當抽一身盡痛悶瘡出即止以小便洗之不過三度愈時珍曰按千金方治洞注下痢以五月五日百草灰吹入下部又治瘰癧已破五月五日采一切雜草煮汁洗之百草花拾遺藏器曰主治百病長生神仙亦煮汁釀酒服按異類云鳳剛者漁陽人常采百花水漬泥封埋百日煎為丸卒死者納口中即活也剛服藥百餘歲入地肺山井口邊草拾遺藏器曰小兒夜啼私著席下勿令母知思邈曰五月五日取井中倒生草燒研水服勿令知即惡酒不飲或飲亦不醉也樹孔中草綱目時珍曰主小兒腹痛夜啼暗著戶上即止出聖惠方産死婦人塜上草拾遺藏器曰小兒醋瘡取之勿回顧作湯浴之不過三度瘥燕蓐草宋嘉祐藏器曰即燕窠中草也無毒主眠中遺尿燒黑研末水進方寸匕亦止噦啘時珍曰千金方治丈夫婦人無故尿血用胡燕窠中草燒末酒服半錢七聖惠方消渴飲水燕窠中草燒灰一兩牡蠣煆二兩白羊肺一具切晒研末每新汲水三錢又一切瘡痕不滅用燕蓐草燒灰鷹屎白等分人乳和塗日三五次又浸淫瘡出黃水燒灰傅之雞窠草宋嘉祐大明曰小兒夜啼安席下勿令母知藏器曰小兒白秃瘡和白頭翁花燒灰臘月豬脂和傅之以醋泔洗淨時珍曰千金方治産後遺尿燒末酒服一錢又不自祕方治天絲入目燒灰淋汁洗之豬窠草大明曰小兒夜啼密安席下勿令母知牛齝草見獸部牛下神農本經二種名以下俱有未用屈草本經曰味苦微寒無毒主胸脅下痛邪氣腸間寒熱陰痺久服輕身益氣耐老别録曰生漢中川澤五月采别羇本經曰味苦微溫無毒主風寒濕痺身重四肢疼酸寒歷節痛别録曰一名别枝生藍田川谷二月八月采𢎞景曰方家時有用處今亦絶矣名醫别録七十八種離樓草别録曰味鹹平無毒主益氣力多子輕身長年生常山七月八月采實神護草别録曰生常山北八月采可使獨守叱咄人寇盜不敢入門時珍曰物類志謂之護門草一名靈草彼人以置門上人衣過草必叱之王筠詩云霜被守宮槐風驚護門草即此也而不著其形狀惜哉黃護草别録曰無毒主痺益氣令人嗜食生隴西雀醫草别録曰味苦無毒主輕身益氣洗爛瘡療風水一名白氣春生秋花白冬實黑木甘草别録曰主療癰腫盛熱煮洗之生木間三月生大葉如蛇狀四四相值但折枝種之便生五月花白實核赤三月三日采之益決草别録曰味辛溫無毒主咳肺傷生山陰根如細辛九熟草别録曰味甘溫無毒主出汗止泄療悶一名鳥粟一名雀粟生久家庭中葉如棗一歲九熟七月采兊草别録曰味酸平無毒主輕身益氣長年冬生蔓草木上葉黃有毛異草别録曰味甘無毒主痿痺寒熱去黑子生籬木上葉如葵莖旁有角汁白灌草别録曰一名鼠肝葉滑清白主癰腫䒻草别録曰味辛無毒主傷金瘡䒻音起莘草别録曰味甘無毒主盛傷痺腫生山澤如蒲黃葉如芥英草華别録曰味辛平無毒主痺氣強陰療女勞疸解煩堅筋骨療風頭可作沭藥生蔓木上一名鹿英九月采隂乾封華别録曰味甘有毒主疥瘡養肌去惡肉夏至日采㥏華音腆别録曰味甘無毒主上氣解煩堅筋骨節華别録曰味苦無毒主傷中痿痺浮腫皮主脾中客熱氣一名山節一名達節一名通漆十月采暴乾讓實别録曰味酸主喉痺止泄痢十月采陰乾羊實别録曰味苦寒主頭秃惡瘡疥瘙痂癬生蜀郡桑莖實别録曰味酸溫無毒主乳孕餘病輕身益氣一名草王葉如荏方莖大葉生園中十月采可聚實别録曰味甘溫無毒主輕身益氣明目一名長壽生山野道中穗如麥葉如艾五月采蒲陰實别録曰味酸平無毒主益氣除熱止渴利小便長年生深山及園中莖如芥葉小實如櫻桃七月成普曰蔓如瓜馬顚别録曰味甘有毒療浮腫不可多食馬逢别録曰味辛無毒主癬蟲兔棗别録曰味酸無毒主輕身益氣生丹陽陵地高尺許實如棗鹿良别録曰味鹹臭主小兒驚癎賁豚瘛瘲大人痓五月采雞涅别録曰味甘平無毒主明目中寒風諸不足水腫邪氣補中止泄痢療女子白沃一名陰洛生雞山采無時犀洛别録曰味甘無毒主癃疾一名星洛一名泥洛雀梅别録曰味酸寒有毒主蝕惡瘡一名千雀生海水石谷間𢎞景曰葉與實俱如麥李燕齒别録曰主小兒癎寒熱五月五日采土齒别録曰味甘平無毒主輕身益氣長年生山陵地中狀如馬牙金莖别録曰味苦平無毒主金瘡內漏一名葉金草生澤中高處白背别録曰味苦平無毒主寒熱洗惡瘡疥生山陵根似紫葳葉如燕盧采無時青雌别録曰味苦主惡瘡秃敗瘡火氣殺三蟲一名蟲損一名孟推生方山山谷白辛别録曰味辛有毒主寒熱一名脫尾一名羊草生楚山三月采根白而香赤舉别録曰味甘無毒主腹痛一名羊飴一名陵渴生山陰二月花鋭蔓草上五月實黑中有核三月三日采葉陰乾赤涅别録曰味甘無毒主疰崩中止血益氣生蜀郡山石陰地濕處采無時赤赫别録曰味苦寒有毒主痂痬惡敗瘡除三蟲邪氣生益州川谷二月八月采黃秫别録曰味苦無毒主心煩止汗出生如桐根黃辨别録曰味甘平無毒主心腹疝瘕口瘡臍傷一名經辨紫給别録曰味鹹主毒風頭泄注一名野葵生高陵下地三月三日采根根如烏頭紫藍别録曰味鹹無毒主食肉得毒能消除之糞藍别録曰味苦主身癢瘡白秃漆瘡洗之生房陵巴朱别録曰味甘無毒主寒上血帶下生雒陽柴紫别録曰味苦主小腹痛利小腹破積聚長肌肉久服輕身長年生寃句二月七月采文石别録曰味甘主寒熱心煩一名黍石生東郡山澤中水下五色有汁潤澤路石别録曰味甘酸無毒主心腹止汗生肌酒痂益氣耐寒實骨髓一名陵石生草石上天雨獨乾日出獨濡花黃莖赤黑三歲一實赤如麻子五月十月采莖葉陰乾曠石别録曰味甘平無毒主益氣養神除熱止渴生江南如石草敗石别録曰味苦無毒主渴痺石劇别録曰味甘無毒止消渴中石藝别録曰味甘無毒主目痛淋露寒熱溢血一名螫烈一名顧啄三月五月采莖葉陰乾竹付别録曰味甘無毒止痛除血祕惡别録曰味酸無毒主療肝邪氣一名杜逢盧精别録曰味平治蠱毒生益州唐夷别録曰味苦無毒主療踒折知杖别録曰味甘無毒療疝河煎别録曰味酸主結氣癰在喉頸者生海中八月九月采區余别録曰味辛無毒主心腹熱癃王明别録曰味苦主身熱邪氣小兒身熱以浴之生山谷一名王草師系别録曰味甘無毒主癰腫惡瘡煮洗之一名臣堯一名巨骨一名鬼芭生平澤八月采并苦别録曰主咳逆上氣益肺氣安五臟一名􅈮薰一名玉荆三月采陰乾􅈮音或索千别録曰味苦無毒主易耳一名馬耳良達别録曰主齒痛止渴輕身生山陰莖蔓延大如葵子滑小戈共别録曰味苦寒無毒主驚氣傷寒腹痛羸瘦皮中有邪氣手足寒無色生益州山谷惡蜚臁船虹别録曰味酸無毒主下氣止煩渴可作浴湯藥色黃生蜀郡立秋取姑活别録曰味甘溫無毒主大風邪氣濕痺寒痛久服輕身益氣耐老一名冬葵子生河東𢎞景曰藥無用者乃有固活丸即是野葛之名冬葵亦非菜之冬葵子也恭曰别本一名雞精白女腸别録曰味辛溫無毒主泄痢腸澼療心痛破疝瘕生深山谷葉如藍實赤赤女腸同白扇根别録曰味苦寒無毒主瘧皮膚寒熱出汗令人變黃白支别録曰生山陵三月四月采根暴乾父陛根别録曰味辛有毒以尉癰腫膚脹一名膏魚一名梓藻疥拍腹别録曰味辛溫無毒主輕身療痺五月采陰乾五母麻别録曰味苦有毒主痿痺不便下痢一名鹿麻一名歸澤麻一名天麻一名苦草生田野五月采時珍曰茺蔚之白花者亦名天麻草五色符别録曰味苦微溫主咳逆五臟邪氣調中益氣明目殺蟲青符白符赤符黑符黃符各隨色補其臟白符一名女木生巴山谷救赦人者别録曰味甘有毒主疝痺通氣諸不足生人家宮室五月十月采暴乾常吏之生蜀本吏作更别録曰味苦平無毒主明目實有刺大如稻粱載别録曰味酸無毒主諸惡氣慶别録曰味苦無毒主咳嗽腂音戶瓦切别録曰味甘無毒主益氣延年生山谷中白順理十月采芥别録曰味苦寒無毒主消渴止血婦人痰除痺一名梨葉如大青本草拾遺一十三種鴆鳥漿藏器曰生江南林木下高一二尺葉陰紫色冬不凋有赤子如珠味甘溫無毒能解諸毒故名山人浸酒服主風血羸老頌曰鴆鳥威生信州山野中春生青葉九月有花如蓬蒿菜花淡黃色不結實實療癰腫癤毒采無時吉祥草藏器曰生西國胡人將來也味甘溫無毒主明目強記補心力時珍曰今人種一種草葉如漳蘭四時青翠夏開紫花成穗易繁亦名吉祥草非此吉祥也雞腳草藏器曰生澤畔赤莖對葉如百合苗味苦平無毒主赤白久痢成疳兔肝草藏器曰初生細葉軟似兔肝一名雞肝味甘平無毒主金瘡止血生肉解丹石發熱斷罐草藏器曰主丁瘡合白牙荲菜半夏地骨皮青苔蜂窠小兒髮緋帛等分五月五日燒灰每湯服一錢拔根也荲音畜羊蹄根也千金䥶藏器曰生江南高二三尺主蛇蠍蟲咬毒搗傅瘡上生肌止痛土落草藏器曰生嶺南山谷葉細長味甘溫無毒主腹冷氣痛痃癖酒煎服亦搗汁溫服倚待草藏器曰生桂州如安山谷葉圓高二三尺八月采味甘溫無毒主血氣虛勞腰膝疼弱風緩羸瘦無顔色絶陽無子婦人老血浸酒服逐病極速故名倚待藥王草藏器曰苗莖青色摘之有汁味甘平無毒解一切毒止鼻衄吐血祛煩躁筋子根藏器曰生四明山苗高尺餘葉圓厚光潤冬不凋根大如指亦名根子味苦溫無毒主心腹痛不問冷熱遠近惡鬼氣注刺痛霍亂蠱毒暴下血酒飲磨服頌曰根子生威州山中味苦辛溫主心中結塊久積氣攻臍下痛廅藥藏器曰生胡國似乾茅黃赤色味鹹溫無毒主折傷內損瘀血生膚止痛治五臟除邪氣補虛損産後血病水煮服之亦搗傅傷處時珍曰外臺祕要治墮馬內損取廅藥末一兩牛乳一盞煎服無風獨搖草拾遺珣曰生大秦國及嶺南五月五日采諸山野亦往往有之頭若彈子尾若鳥尾兩片開合見人自動故曰獨搖性溫平無毒主頭骨遊風遍身癢煮汁淋洗藏器曰帶之令夫相愛時珍曰羌活天麻鬼臼蘼御四者皆名無風獨搖草而物不同也假成式酉陽雜爼言雅州出舞草三葉如決明一葉在莖端兩葉居莖之半相對人近之歌謳及抵掌則葉動如舞按此即虞美人草亦無風獨搖之類也又按山海經云姑媱之山帝女死焉化為䔄其葉相重花黃實如兔絲服之媚人郭璞注云一名荒夫草此説與陳藏器佩之相愛之語相似豈即一物與唐海藥本草一種宜南草珣曰生廣南山谷有莢長二尺許內有薄片似紙大小如蟬翼主邪小男女以緋絹袋盛佩之臂上辟惡止驚此草生南方故名與萱草之宜男不同宋開寶本草一種陀得花志曰味甘溫無毒主一切風血浸酒服生西國胡人將來胡人采此花以釀酒呼為三勒漿宋圖經外類二十種建水草頌曰生福州枝葉似桑四時常有土人取葉焙乾研末溫酒服治走注風痛百藥祖頌曰生天台山中冬夏常青土人采葉治風有效催風使頌曰生天台山中冬夏常青土人采葉治風有效時珍曰五加皮亦名催風使刺虎頌曰生睦州凌冬不凋采根葉枝入藥味甘主一切腫痛風疾銼焙為末酒服一錢時珍曰壽域方治丹瘤用虎刺即壽星草搗汁塗之又伏牛花一名隔虎刺石逍遙頌曰生常州冬夏常有無花實味苦微寒無毒主癱瘓諸風手足不遂為末煉蜜丸梧子大酒服二十丸日二服百日瘥久服益氣輕身初服時微有頭痛無害黃寮郎頌曰生天台山中冬夏常青土人采根治風有效時珍曰按醫學正傳云黃寮郎俗名倒摘刺治喉痛用根擂汁入少酒滴之即愈又醫學集成云牙痛者取倒摘刺刀上燒之取煙煤綿蘸塞痛處即止黃花子頌曰生信州春生青葉三月開花似辣菜花黃色秋中結實采無時治咽喉口齒病效百兩金頌曰生戎州河中府雲安軍苗高二三尺有幹如木凌冬不凋葉似荔枝初生背面俱青秋後背紫面青初秋開花青碧色結實如豆大生青熟赤無時采根去心用味苦性平無毒治壅熱咽喉腫痛含一寸咽汁其河中出者根赤如蔓菁莖細青色四月開碎黃花似星宿花五月采根長及一寸晒乾用治風涎地茄子頌曰生商州三月開花結子五六月采陰乾味微辛溫有小毒主中風痰涎麻痺下熱毒氣破堅積利膈消癰腫瘡癤散血墮胎田母草頌曰生臨江軍無花實三月采根性涼主煩熱及小兒風熱尤效田麻頌曰生信州田野及溝澗旁春夏生青葉八月中生小莢冬月采葉治癰癤腫毒芥心草頌曰生淄州引蔓白色根黃色四月采苗葉搗末治瘡疥甚效苦芥子頌曰生秦州苗長一尺餘莖青葉如柳開白花似榆葉其子黑色味苦大寒無毒明目治血風煩躁布里草頌曰生南恩州原野中莖高三四尺葉似李而大至夏不花而實食之瀉人采根皮焙為末味甘寒有小毒治瘡疥殺蟲茆質汙頌曰生信州葉青花白七月采根治風腫行血有效胡堇草頌曰生密州東武山田中枝葉似小堇菜花紫色似翹軺花一枝七葉花出兩三莖春采苗味辛滑無毒主五臟營衛肌肉皮中痂血止痛散血搗汁塗金瘡凡打撲損傷筋骨惡癰腫用同松枝乳香亂髮灰花桑柴炭同搗丸彈子大每酒服一丸其痛立止小兒羣頌曰生施州叢高一尺以來春夏生苗葉無花冬枯其根味辛性涼無毒同左纒草即葖花根焙乾等分為末每酒服一錢治淋疾無忌獨腳仙頌曰生福州山林旁陰泉處多有之春生苗葉圓落下紫腳長三四寸秋冬葉落夏連根葉采焙為末酒煎半錢服治婦人血塊撮石合草頌曰生眉州平田中莖高二尺以來葉似穀葉十二月萌芽二月有花不結實其苗味甘無毒療金瘡露筋草頌曰生施州株高三尺以來春生苗隨即開花結子碧緑色四時不凋其根味辛澀性涼無毒主蜘蛛蜈蚣傷焙研以白礬水調貼之本草綱目三十八種九龍草時珍曰生平澤生紅子狀如楊梅其苗解諸毒治喉痛搗汗灌之折傷骨筋者搗罨患處蛇虺傷者搗汗入雄黃二錢服其痛立止又楊清叟外科云喉風重舌牙關緊閉者取九龍草一名金叉草單枝上者為妙只用根不用皮打碎綿裹筯上擦牙關即開乃插深喉中取出痰涎乃以火炙熱帶鹽點之即愈荔枝草時珍曰衛生易簡方治蛇咬犬傷及破傷風取草一握約三兩以酒二碗煎一碗服取汗出效水銀草時珍曰衛生易簡方治眼昏每服三錢入木賊少許水一錢煎八分服透骨草時珍曰治筋骨一切風濕疼痛攣縮寒濕腳氣孫氏集效方治癘風遍身瘡癬用透骨草苦參大黃雄黃各五錢研末煎湯于密室中席圍先熏至汗出如雨淋洗之普濟方治反胃噎食透骨草獨科蒼耳生牡蠣各一錢薑三片水煎服楊誠經驗方治一切腫毒初起用透骨草漏蘆防風地榆等分煎湯綿蘸乘熱不住蕩之二三日即消蛇眼草時珍曰生古井及年久陰下處形如淡竹葉背後皆是紅圈如蛇眼狀唐珤經驗方治蛇咬搗爛傅患處鵝項草時珍曰臞仙壽域方治咽喉生瘡取花同白芷椒根皮研末吹瘡口即效蛇魚草時珍曰戴原禮證治要訣云治金瘡血出不止搗傅之九里香草時珍曰傅滋醫學集成治肚癰搗碎浸酒服白筵草時珍曰香草也蟲最畏之孫真人千金方治諸蟲瘡疥癩取根葉煎水隔日一洗環腸草時珍曰張子和儒門事親方治蠱脹晒乾煎水日服以小便利為度劄耳草時珍曰王執中資生經治氣聾方中用之耳環草時珍曰危亦林得效方治五痔挼軟納患處即效一名碧蟬兒花銅鼓草時珍曰范成大虞衡志云出廣西其實如瓜治瘍毒蠶繭草時珍曰摘玄方治腫脹用半斤同冬瓜皮半斤紫蘇根葉半斤生薑皮三兩煎湯熏洗暖臥取汗洗三次小便清長自然脹退野芕草時珍曰摘玄方治痞滿用五斤以一半安烏盆內置雞子十箇在草上以草一半蓋之米醋浸二宿雞子殼軟乃取于飯上蒸熟頓食之塊漸消也經驗纎霞草時珍曰陳巽經驗方元臟虛冷氣攻臍腹痛用硇砂一兩生烏頭去皮二兩纎霞草二兩為末以小沙罐固濟慢火燒赤以此草拌硇入內不蓋口頂火一稱煆之爐冷取出同烏頭末蒸餅丸梧子大每服三丸醋湯下牛脂艻時珍曰經驗良方治七孔出血為粗末每服一勺瓦器煎服以紗合頭項并扎小指根鴨腳青時珍曰普濟方治疔瘡如連珠者同䔡蘇研爛糖水拌刷之天仙蓮時珍曰衛生易簡方治惡毒瘡癤搗葉傅之雙頭蓮時珍曰一名催生草主婦人産難左手把之即生又主腫脹利小便衛生易簡方治大人小兒牙疳搗爛貼之豬藍子時珍曰衛生易簡方治耳內有膿名通耳用子為末筒吹入不過二三次愈天芥菜時珍曰生平野小葉如芥狀味苦一名雞痾粘主蛇傷同金沸草入鹽搗傅之王璽醫林集要治腋下生腫毒以鹽醋同搗傅之散腫止痛膿已成者亦安亦治一切腫毒佛掌花時珍曰普濟方治疔瘡如櫻桃者用根同生薑蜜研汁服之外以天茄葉貼之郭公刺時珍曰一名光骨刺取葉搗細油調傅天泡瘡虞搏醫學正傳治哮喘取根銼水煎服即止籩箕柴時珍曰生山中王永輔惠濟方治癧瘡取皮煎湯服須臾癢不可忍以手爬破出毒氣即愈碎米柴時珍曰主癰疽發背取藥入傅藥用羊屎柴時珍曰一名牛屎柴生山野葉類鶴虱四月開白花亦有紅花者結子如羊屎狀名鐵草子根可毒魚夏用苗葉冬用根主癰疽發背搗爛傅之能合瘡口散膿血乾者為末漿水調傅又治下血如傾水取生根一斤生白酒二斗煮一斗空心隨量飲山枇杷柴時珍曰危亦林得效方治湯火傷取皮焙研末蜜調傅之三角風時珍曰一名三角尖取石上者尤良主風濕流注疼痛及癰疽腫毒葉下紅時珍曰主飛絲入目腫痛同鹽少許絹包滴汁入目仍以塞鼻左塞右右塞左滿江紅時珍曰主癰疽入膏用隔山消時珍曰出太和山白色主腹脹積滯孫天仁集效方治氣隔噎食轉食用隔山消二兩雞肫皮一兩牛膽南星朱砂各一兩急性子二錢為末煉蜜丸小豆大每服一錢淡薑湯下石見穿時珍曰主骨痛大風癰腫醉醒草時珍曰天寶遺事玄宗于興慶池邊植之叢生葉紫而心殷醉客摘草嗅之立醒墓頭回時珍曰董炳集驗方治崩中赤白𢃄下用一把酒水各半盞童尿半盞新紅花一捻煎七分臥時溫服日近者一服久則三服愈其效如神一僧用此治蔡大尹內人有效羊茅時珍曰羊喜食之故名普濟方治喉痺腫痛搗汁咽之阿兒只時珍曰劉郁西域記云出西域狀如苦參主打撲傷損婦人損胎用豆許咽之自消又治魚鼠瘡阿息兒時珍曰西域記云出西域狀如地骨皮治婦人産後衣不下又治金瘡膿不出嚼爛塗之即出奴哥撒兒時珍曰西域記云出西域狀如桔梗治金瘡及腸與筋斷者嚼爛傅之自續也本草綱目卷二十一
