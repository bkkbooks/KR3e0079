body:
  text: 本草綱目卷二十六目録菜部李時珍曰草木可茹者謂之菜韭薤葵葱藿五菜也素問五穀為養五菜為充所以輔穀氣疏壅滯也菜固不止于五而已我國初周憲王圖草木之可濟生者四百餘種為救荒本草厥有㫖哉夫隂之所生本在五味隂之五宫傷在五味謹和五味臟腑以通氣血以流骨正筋柔腠理以宻可以長久是以内則有訓食醫有方菜之于人補非小也但五氣之良毒各不同五味之所入有偏勝民生日用而不知乃搜可茹之草凡一百五種為菜部分為五類曰葷辛曰柔滑曰蓏曰水曰芝栭舊本菜部三品共六十五種今併入五種移十三種入草部六種入果部自草部移入及併二十三種自穀部移入一種果部移入一種外類有名未用移入三種神農本草經一十三種梁陶𢎞景註名醫别録一十七種梁陶𢎞景註唐本草七種唐蘇恭千金食治二種唐孫思邈本草拾遺一十三種唐陳藏器食療本草三種唐孟詵張鼎食性本草一種南唐陳士良蜀本草二種蜀韓保昇日華本草二種宋人大明開寳本草六種宋馬志嘉祐本草十種宋掌禹錫圖經本草四種宋蘇頌證類本草一種宋唐慎微日用本草三種元呉瑞食物本草二種明汪頴食鑑本草一種明甯原救荒本草一種明周王本草綱目一十七種明李時珍附註魏李當之藥録齊徐之才藥對呉普本草性唐甄權藥宋雷斆炮炙蕭炳四聲唐李珣海藥珠囊楊損之刪繁象宋冦宗奭衍義金張元素珍元李杲法王好古湯液元朱震亨補遺明陳嘉謨蒙筌明汪機會編菜之一葷辛類三十二種内附七種韭别錄山韭千金附孝文韭葱别錄茖葱千金胡葱開寳薤别録蓼即藠子蕎附蒜别録山蒜拾遺葫别録蒜即大五辛菜拾遺蕓薹唐本菜即油菘别録菜即白芥别録白芥開寳蕪菁别録青即蔓萊菔唐本蔔即蘿生薑别録乾薑本經薑天竺乾附茼蒿嘉祐邪蒿嘉祐胡荽嘉祐胡蘿蔔綱目水斳本經菜即芹堇唐本芹即旱紫堇圖經馬蘄唐本蘹香唐本香即茴蒔蘿開寳勒蜀胡爛答數低池得馬思吉附羅勒嘉祐香即蘭白花菜食物蔊菜綱目草䜴拾遺右附方舊一百五十新二百九十二本草綱目卷二十六目録
