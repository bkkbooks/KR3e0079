body:
  text: 本草綱目卷一上明李時珍撰序例上歴代諸家本草神農本草經掌禹錫曰舊説本草經三卷神農所作而不經見漢書藝文志亦無録焉漢平帝紀云元始五年舉天下通知方術本草者所在軺𫝊遣詣京師樓䕶𫝊稱䕶少誦醫經本草方術數十萬言本草之名葢見於此唐李世勣等以梁七録載神農本草三卷推以為始又疑所載郡縣有後漢地名似張機華佗輩所為皆不然也淮南子云神農嘗百草滋味一日而七十毒由是醫方興焉葢上世未著文字師學相傳謂之本草兩漢以來名醫益衆張華輩始因古學附以新説通為編述本草繇是見於經録寇宗奭曰漢書雖言本草不能斷自何代而作淮南子雖言神農嘗百草以和藥亦無本草之名惟帝王世紀云黄帝使岐伯嘗味草木定本草經造醫方以療衆疾乃知本草之名自黄帝始葢上古聖賢具生知之智故能辨天下品物性味合世人疾病所宜後世賢智之士從而和之又增其品焉韓保昇曰藥有玉石草木蟲獸而云本草者為諸藥中草類最多也名醫别録李時珍曰神農本草藥分三品計三百六十五種以應周天之數梁陶𢎞景復增漢魏以下名醫所用藥三百六十五種謂之名醫别錄凡七卷首敘藥性之源論病名之診次分玉石一品草一品木一品果菜一品米食一品冇名未用三品以朱書神農墨書别録進上梁武帝𢎞景字通明宋末為諸王侍讀歸隱勾曲山號華陽隱居武帝毎咨訪之年八十五卒謚貞白先生其書頗有禆補亦多謬誤𢎞景自序曰隱居先生在乎茅山之上以吐納餘暇㳺意方技覽本草藥性以為盡聖人之心故撰而論之舊稱神農本經予以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯夭傷之命此三道者厯衆聖而滋彰文王孔子彖象繇辭幽贊人天后稷伊尹播厥百榖惠被羣生岐黄彭扁振揚輔𨗳㤙流含氣嵗踰三千民到於今頼之但軒轅已前文字未𫝊藥性所主當以識識相因不爾何繇得聞至於桐雷乃著在編簡此書應與素問同類但後人多更修飭之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懐奔迸文籍焚㸏十不遺一今之所存冇此三卷其所出郡縣乃後漢時制疑仲景元化等所記又有桐君採藥録説其花葉形色藥對四卷論其佐使相須魏晉以來吳普李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則智識有淺深今輙苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫别品亦三百六十五合七百三十種精粗皆取無復遺落分别科條區畛物類兼注詔時用土地所出及仙經道術所須並此序凡合為七卷雖未能追踵前賢葢亦一家撰製吾去世之後可貽諸知音爾桐君采藥録時珍曰桐君黄帝時臣也書凡二卷紀其花葉形色今已不傳後人又有四時采藥太常采藥時月等書雷公藥對禹錫曰北齊徐之才撰以衆藥名品君臣性毒相反及所主疾病分類記之凡二卷時珍曰陶氏前已有此書吳氏本草所引雷公是也盖黄帝時雷公所著之才增飾之爾之才丹陽人博識善醫歴事北齊諸帝得寵仕終尚書左僕射年八十卒贈司徒封西陽郡王謚文明北史有傳李氏藥録保昇曰魏李當之華陀弟子修神農本草三卷而世少行時珍曰其書散見吳氏陶氏本草中頗有發明吳氏本草保昇曰魏吳普廣陵人華陀弟子凡一卷時珍曰其書分記神農黄帝岐伯桐君雷公扁鵲華陀李氏所説性味甚詳今亦失傳雷公炮炙論時珍曰劉宋時雷斆所著非黄帝時雷公也自稱内究守國安正公或是官名也胡洽居士重加定述藥凡三百種為上中下三卷其性味炮炙熬煑修事之法多古奥文亦古質别是一家多本於乾寧宴先生其首序論述物理亦甚幽𤣥録載於後乾寧先生名宴封著制伏草石論六卷盖丹石家書也唐本草時珍曰唐髙宗命司空英國公李勣等修陶隱居所注神農本草經增為七卷世謂之英公唐本草頗有增益顯慶中右監門長史蘇恭重加訂註表請修定帝復命太尉趙國公長孫無忌等二十二人與恭詳定增藥一百一十四種分為玉石草木人獸禽蟲魚果米穀菜冇名未用十一部凡二十卷目録一卷别為藥圖二十五卷圖經七卷共五十三卷世謂之唐新本草蘇恭所釋雖明亦多駁誤禮部郎中孔志約序曰天地之大徳曰生運隂陽以播物含靈之所保曰命資亭育以盡年蟄穴棲巢感物之情盖寡範金揉木逐欲之道方滋而五味或爽時昧甘辛之節六氣斯沴易愆寒燠之宜中外交侵形神分戰飲食伺釁成腸胃之眚風濕候隙搆手足之災機纒膚腠莫知救止漸固膏肓期于夭折暨炎暉紀物識藥石之功雲瑞名官窮診候之術草木咸得其性鬼神無所逃情刳麝剸犀驅洩邪惡飛丹煉石引納清和大庇蒼生普濟黔首功侔造化㤙邁裁成日用不知于今是賴岐和彭緩騰絶軌于前李華張吳振英聲于後昔秦政煨燔兹經不預永嘉䘮亂斯道尚存梁陶𢎞景雅好攝生研精藥術以為本草經者神農之所作不刋之書也惜其年代寖逺簡編殘蠧與桐雷衆記頗或蹐駮興言撰緝勒成一家亦以琱琢經方潤色醫業然而時鍾鼎峙聞見闕於殊方事非僉議詮釋拘于獨學至如重建平之防已棄槐里之半夏秋採榆仁冬收雲實謬梁米之黄白混荆子之牡蔓異蘩縷於雞腸合由䟦於鳶尾防葵狼毒妄曰同根鈎吻黄精引為連類鈆錫莫辨橙橘不分凡此比例盖亦多矣自時厥後以迄於今雖方技分鑣名醫繼軌更相祖述罕能釐正乃復採杜衡于及已求忍冬于絡石捨陟釐而取莂藤退飛亷而用馬薊承疑行妄曾無冇覺疾瘵多殆良深嘅嘆既而朝議郎行右監門府長史騎都尉臣蘇㳟摭陶氏之乖違辨俗用之紕紊遂表請修定深副聖懐乃詔太尉揚州都督監修國史上柱國趙國公臣無忌大中大夫行尚藥奉御臣許孝崇等二十二人與蘇恭詳撰竊以動植形生因方舛性春秋節變感氣殊功離其本土則質同而效異乖于采摘乃物是而時非名實既爽寒温多謬用之凡庶其欺已甚施之君父逆莫大焉於是上禀神䂓下詢衆議普頒天下營求藥物羽毛鱗介無逺不臻根莖花實有名咸萃遂乃詳探秘要博綜方術本經雖缺有騐必書别録雖存無稽必正考其同異擇其去取鉛翰昭章定羣言之得失丹青綺煥備庶物之形容撰本草并圖經目録等凡成五十四卷庶以網羅今古開滌耳目盡醫方之妙極拯生靈之性命傳萬祀而无昧懸百工而不朽藥總訣禹錫曰梁陶隱居撰凡二卷論藥品五味寒熱之性主療疾病及采蓄時月之法一本題曰藥象口訣不著譔人名藥性本草禹錫曰藥性論凡四卷不著撰人名氏分藥品之性味君臣佐使主病之効一本云陶隱居撰然其藥性之功有與本草相戾者疑非隱居書也時珍曰藥性論即藥性本草乃唐甄權所著也權扶溝人仕隋為秘省正字唐太宗時年百二十嵗帝幸其第訪以藥性因上此書受朝散大夫其書論主治亦詳又著脉經明堂人形圖各一卷詳見唐史千金食治時珍曰唐孫思邈撰千金備急方三十卷采摭素問扁鵲華陀徐之才等所論補飬諸説及本草闗于食用者分米穀果菜鳥獸䖝魚為食治附之亦頗明悉思邈隱于太白山隋唐徵拜皆不就年百餘嵗卒所著有千金翼方枕中素書攝生真錄福禄論三教論老子莊子注食療本草禹錫曰唐同州刺史孟詵譔張鼎又補其不足者八十九種並舊為二百二十七條凡三卷時珍曰詵梁人也武后時舉進士累遷鳳閣舍人出為台州司馬轉同州刺史睿宗召用固辭卒年九十因周禮食醫之義著此書多有增益又譔必效方十卷補飬方三卷唐史有傳本草拾遺禹錫曰唐開元中三元縣尉陳藏器譔以神農本經雖有陶蘇補集之説然遺沉尚多故别為序例一卷拾遺六卷解紛三卷總曰本草拾遺時珍曰藏器四明人其所著述博極羣書精覈物類訂繩謬誤搜羅幽隱自本草以來一人而已膚謭之士不察其該詳惟誚其僻怪宋人亦多刪削豈知天地品物無窮古今隱顯亦異用舍有時名稱或變豈可以一隅之見而遽譏多聞哉如辟虺雷海馬胡豆之類皆隱于昔而用于今仰天皮燈花敗扇之類皆萬家所用者若非此書收載何從稽考此本草之書所以不厭詳悉也海藥本草禹錫曰南海藥譜二卷不著譔人名氏雜記南方藥物所産郡縣及療疾之功頗無倫次時珍曰此即海藥本草也凡六卷唐人李珣所譔珣盖肅代時人收采海藥亦頗詳明又鄭䖍有胡本草七卷皆胡中藥物今不傳四聲本草禹錫曰唐蘭陵處士蕭炳撰取本草藥名上一字以平上去入四聲相從以便討閲無所發明凡五卷進士王收序之刪繁本草禹錫曰唐潤州醫博士兼節度隨軍楊損之譔刪去本草不急及有名未用之類為五卷開元以後人也無所發明本草音義時珍曰凡二卷唐李含光譔又甄立言殷子嚴皆有音義本草性事類禹錫曰京兆醫工杜善方譔不詳何代人凡一卷以本草藥名隨類解釋附以諸藥制使畏惡相反相宜解毒者食性本草禹錫曰南唐陪戎副尉劍州醫學助教陳士良譔取神農陶隱居蘇恭孟詵陳藏器諸家藥闗于飲食者類之附以食醫諸方及五時調飬臟腑之法時珍曰書凡十卷總集舊説無甚新義古冇淮南王食經一百二十卷崔浩食經九卷竺喧食經十卷膳饈飬療二十卷咎殷食醫心鑑三卷婁居中食治通説一卷陳直奉親飬老書二卷並有食治諸方皆祖食醫之意也蜀本草時珍曰蜀主孟昶命翰林學士韓保昇等與諸醫士取唐本草叅校增補註釋别為圖經凡二十卷昶自為序世謂之蜀本草其圖説藥物形狀頗詳于陶蘇也開寶本草時珍曰宋太祖開寶六年命尚藥奉御劉翰道士馬志等九人取唐蜀本草詳校仍取陳藏器拾遺諸書相叅刋正别名增藥一百三十三種馬志為之註解翰林學士盧多遜等刋正七年復詔志等重訂學士李助等看詳凡神農者白字名醫所傳者墨字别之並目録共二十一卷序曰三墳之書神農預其一百藥既辨本草存其録舊經三卷世所流傳名醫别録互為編纂至梁正白先生陶𢎞景乃以别録叅其本經朱墨雜書時謂明白而又考彼功用為之註釋列為七卷南國行焉逮乎有唐别加叅校增藥餘八百味添註為二十一卷本經漏缺則補之陶氏誤説則證之然而載厯年祀又踰四百朱字墨字旡本得同舊註新註其文互缺非聖主撫大同之運永無疆之休其何以改而正之哉乃命盡考傳誤刋為定本類例非允從而革焉至于筆頭灰兔毫也而在草部今移附兔頭骨之下半天河地漿皆水也亦在草部今移附玉石類之間敗鼔皮移附于獸皮胡桐淚改從于木類紫鑛亦木也自玉石品而取焉伏翼實禽也由蟲魚部而移焉橘柚附于果實食鹽附于光鹽生薑乾薑同歸一説至于雞腸繁縷陸英蒴藋以類相侣從而附之仍采陳藏器拾遺李含光音義或討源于别本或傳效于醫家叅而較之辨其臧否至于突厥白舊説灰類也今是木根天麻根解以赤箭今又全異去非取是特立新條自餘刋正不可悉數下采衆議定為印板乃以白字為神農所説墨字為名醫所傳唐附今附各加顯註詳其解釋審其形性證謬誤而辨之者署為今註考文記而述之者又為今按義既刋定理亦詳明今以新舊藥合九百八十三種并目録二十一卷廣頒天下𫝊而行焉嘉祐補註本草時珍曰宋仁宗嘉祐二年詔光禄卿直秘閣掌禹錫尚書祠部郎中秘閣校理林億等同諸醫官重修本草新補八十二種新定一十七種通計一千八十二條謂之嘉祐補註本草共二十卷其書雖有校修無大發明其序畧云神農本草經三卷藥止三百六十五種至陶隱居又進名醫别録亦三百六十五種因而註釋分為七卷唐蘇㳟等又增一百一十四種廣為二十卷謂之唐本草國朝開寶中兩詔醫工劉翰道士馬志等修增一百三十三種為開寶本草偽蜀孟昶亦常命其學士韓保昇等稍有增廣謂之蜀本草嘉祐二年八月詔臣禹錫臣億等再加校正臣等被命遂更研覈竊謂前世醫工原診用藥隨效輙記遂至增多㮣見諸書浩博難䆒雖屢加刪定而去取非一或本經已載而所述粗畧或俚俗常用而太醫未聞嚮非因事詳著則遺散多矣乃請因其䟽捂更為補註因諸家醫書藥譜所載物品功用並從採掇惟名近迂僻類乎怪誕則所不取自餘經史百家雖非方餌之急其間或有叅説藥騐較然可據者亦兼收載務從該洽以副詔意凡名本草者非一家今以開寶重定本為正其分布卷類經註雜糅間以朱墨並從舊例不復釐改凡補註並據諸書所説其意義與舊文相叅者則從刪削以避重複其舊已著見而意有未完後書復言亦具存之欲詳而易曉仍毎條並以朱書其端云臣等謹按某書云某事其别立條者則解于其末云見某書凡所引書唐蜀二本草為先他書則以所著先後為次第凡書舊名本草者今所引用但著其所作人名曰某惟唐蜀本則曰唐本云蜀本云凡字朱墨之别所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間于朱字餘所增者皆别立條並以墨字凡陶隱居所進者謂之名醫别録並以其註附于末几顯慶所增者亦註其末曰唐本先附凡開寶所增者亦註其末曰今附凡今所増補舊經未冇于逐條後開列云新補凡藥舊分上中下三品今之新補難于詳辨但以類附見如緑礬次于礬石山薑花次于豆寇枎栘次于水楊之類是也凡藥有功用本經未見而舊註已曾引註今之所增但渉相類更不立條並附本註之末曰續註如地衣附于垣衣燕覆附于通草馬藻附于海藻之類是也凡舊註出于陶氏者曰陶隱居云出于顯慶者曰唐本註出于開寳者曰今註其開寶考據傳記者别曰今按今詳又按皆以朱字别書於其端凡藥名本經已見而功用未備今有所益者亦附于本註之末凡藥有今世已甞用而諸書未見無所辨證者如胡蘆巴海帶之類則請從太醫衆論叅議别立為條曰新定舊藥九百八十三種新補八十二種附于註者不預焉新定一十七種總新舊一千八十二條皆隨類附著之英公陶氏開寶三序皆有義例所不可去仍載于首卷云圖經本草時珍曰宋仁宗既命掌禹錫等編繹本草累年成書又詔天下郡縣圖上所産藥物用唐永徽故事専命太常博士蘇頌譔述成此書凡二十一卷考證詳明頗冇發揮但圖與説異兩不相應或冇圖無説或有物失圖或説是圖非如江州菝葜乃仙遺糧滁州青木香乃兠鈴根俱混列圖棠毬子即赤木𤓰天花粉即栝樓根乃重出條之類亦其小小踈漏耳頌字子容同安人舉進士哲宗朝位至丞相封魏國公證類本草時珍曰宋徽宗大觀二年蜀醫唐愼微取嘉祐補註本草及圖經本草合為一書復拾唐本草陳藏器本草孟詵食療本草舊本所遺者五百餘種附入各部並增五種仍采雷公炮炙及唐本食療陳藏器諸説收未盡者附于各條之後又采古今單方並經史百家之書有闗藥物者亦附之共三十一卷名證類本草上之朝廷改名大觀本草愼㣲貌寢陋而學該博使諸家本草及各藥單方垂之千古不致淪没者皆其功也政和中復命醫官曹孝忠校正刋行故又謂之政和本草本草别説時珍曰宋哲宗元祐中閬中醫士陳承合本草及圖經二書為一間綴數語謂之别説髙宗紹興末命醫官王繼先等校正本草亦冇所附皆淺俚無髙論日華諸家本草禹錫曰國初開寶中明人譔不著姓氏但云日華子大明序集諸家本草近世所用藥各以寒温性味華實䖝獸為類其言功用甚悉凡二十卷時珍曰按十家姓大姓出東萊日華子盖姓大名明也或云其姓田未審然否本草衍義時珍曰宋政和中醫官通直郎寇宗奭譔以補註及圖經二書叅考事實覈其精理援引辨證發明良多東垣丹溪諸公亦尊信之但以蘭花為蘭草卷丹為百合是其誤也書及序例凡三卷平陽張魏卿以其説分附各藥之下合為一書潔古珍珠囊時珍曰書凡一卷金易州明醫張元素所著元素字潔古舉進士不第去學醫深闡軒岐秘奥叅悟天人幽微言古方新病不相能自成家法辨藥性之氣味隂陽厚薄升降浮沉補瀉六氣十二經及隨證用藥之法立為主治秘訣心法要㫖謂之珍珠囊大揚醫理靈素之下一人而已後人翻為韻語以便記誦謂之東垣珍珠囊謬矣惜乎止論百品未及徧評又著病機氣宜保命集四卷一名活法機要後人誤作河間劉元素所著偽譔序文詞調于卷首以附㑹之其他潔古諸書多是後人依托故駁雜不倫用藥法象時珍曰書凡一卷元眞定明醫李杲所著杲字明之號東垣通春秋書易忠信有守富而好施援例為濟源監税官受業于潔古老人盡得其學益加闡發人稱神醫祖潔古珍珠囊增以用藥凡例諸經嚮𨗳綱要活法著為此書謂世人惑于内傷外感混同施治乃辨其脉證元氣隂火飲食勞倦有餘不足著辨惑論三卷脾胃論三卷推明素問難經本草脉訣及雜病方論著醫學發明九卷蘭室秘藏五卷辨析經絡脉法分比傷寒六經之則著此事難知二卷别有癰疽眼目諸書及試效方皆其門人所集述者也湯液本草時珍曰書凡二卷元醫學教授古趙王好古撰好古字進之號海藏東垣髙弟醫之儒者也取本草及張仲景成無已張潔古李東垣之書間附已意集而為此别著湯液大法四卷醫壘元戎十卷隂證畧例㿀論萃英錢氏補遺各一卷日用本草時珍曰書凡八卷元海寧醫士吳瑞取本草之切於飲食者分為八門間增數品而已瑞字瑞卿元文宗時人本草謌括時珍曰元瑞州路醫學教授胡仕可取本草藥性圖形作謌以便童蒙者我明劉純熊宗立傳滋輩皆有謌括及藥性賦以授初學記誦本草衍義補遺時珍曰元末朱震亨所著震亨義烏人字彦修從許白雲講道世稱丹溪先生嘗從羅太無學醫遂得劉張李三家之㫖而推廣之為醫家宗主此書葢因寇氏衍義之義而推衍之近二百種多所發明但蘭草之為蘭花胡粉之為錫粉未免泥于舊説而以諸藥分配五行失之牽强耳所著冇格致餘論局方發揮傷寒辨疑外科精要新論風木問答諸書本草發揮時珍曰書凡三卷洪武時丹溪弟子山隂徐彦純用誠所集取張潔古李東垣王海藏朱丹溪成無已數家之説合成一書爾别無增益救荒本草時珍曰洪武初周憲王因念旱澇民饑咨訪野老田夫得草木之根苖花實可備荒者四百四十種圖其形狀著其出産苖葉花子性味食法凡四卷亦頗詳明可據近人翻刻削其大半雖其淺見亦書之一厄也王號誠齋性質聰敏集普濟方一百六十八卷袖珍方四卷詩文樂府等書嘉靖中髙郵王磐著野菜譜一卷繪形綴語以告救荒畧而不詳庚辛玉册時珍曰宣徳中寧獻王取崔昉外丹本草土宿真君造化指南獨孤淊丹房鑑源軒轅述寶藏論青霞子丹臺録諸書所載金石草木可備丹爐者以成此書分為金石部靈苖部靈植部羽毛部鱗甲部飲饌部鼎器部通計二卷凡五百四十一品所説出産形狀分别隂陽亦可考據焉王號􅋯仙該通百家所著醫卜農圃琴棋仙學詩家諸書凡數百卷造化指南三十三篇載靈草五十三種云是土宿昆元真君所説抱朴子註解葢亦宋元時方士假托者爾古有太清草木方太清服食經太清丹藥録黄白秘法三十六水法伏制草石論諸書皆此類也本草集要時珍曰𢎞治中禮部郎中慈谿王綸取本草常用藥品及潔古東垣丹溪所論序例畧節為八卷别無增益斤斤泥古者也綸字汝言號節齋舉進士仕至都御史食物本草時珍曰正徳時九江知府江陵汪頴撰東陽盧和字亷夫嘗取本草之繫于食品者編次此書頴得其稿釐為二卷分為水穀菜果禽獸魚味八類云食鑑本草時珍曰嘉靖時京口寗原所編取可食之物畧載數語無所發明本草㑹編時珍曰嘉靖中祁門醫士汪機所編機字省之懲王氏本草集要不收草木形狀乃削去本草上中下三品以類相從菜穀通為草部果品通為木部並諸家序例共二十卷其書撮要似乎簡便而混同反難檢閲冠之以薺識陋可知掩去諸家更覺零碎臆度疑似殊無實見僅有數條自得可取爾本草蒙筌時珍曰書凡十二卷祁門醫士陳嘉謨撰謨字廷采嘉靖末依王氏集要部次集成毎品具氣味産采治療方法創成對語以便記誦間附已意于後頗冇發明便于初學名曰蒙筌誠稱其實本草綱目明楚府奉祠璧敕封文林郎蓬溪知縣蘄州李時珍東譔蒐羅百氏訪采四方始于嘉靖壬子終于萬歴戊寅稿凡三易分為五十二卷列為一十六部部各分類類凡六十標名為綱列事為目增藥三百七十四種方八千一百六十引據古今醫家書目時珍曰自陶𢎞景以下唐宋諸本草引用醫書凡八十四家而唐慎㣲居多時珍今所引除舊本外凡二百七十六家黄帝素問王氷註唐𤣥宗開元廣濟方天寶單方圖唐徳宗貞元廣利方太倉公方宋太宗太平聖惠方扁鵲方三卷張仲景金匱玉函方華佗方十卷張仲景傷寒論成無已註支太醫方張文仲隨身備急方徐文伯方初虞世古今録驗方秦承祖方王燾外臺秘要方華佗中藏經姚和衆延齡至寶方范汪東陽方孫真人千金備急方孫真人食忌孫真人千金翼方孫真人枕中記席延賞方孫真人千金髓方葉天師枕中記篋中秘寶方許孝宗篋中方錢氏篋中方劉禹錫傳信方王紹顔續傳信方延年秘録栁州救三死方李絳兵部手集方御藥院方崔行功纂要方劉涓子鬼遺方乘間集效方陳延之小品方葛洪肘後百一方服氣精義方謝士㤗刪繁方胡洽居士百病方孫兆口訣梅師集驗方崔元亮海上集驗方深師脚氣論即梅師姚僧坦集驗方孫氏集驗方孟詵必效方平堯卿傷寒類要斗門方韋宙獨行方王珉傷寒身驗方勝金方文潞公藥準周應簡要濟衆方塞上方王衮博濟方沈存中靈苑方救急方張路大效方崔知悌勞瘵方近效方陳抃經驗方陳氏經驗後方蘇沈良方東坡存中十全博救方昝殷食醫心鏡必用方張傑子母秘録楊氏産乳集驗方昝殷産寶譚氏小兒方小兒宫氣方萬全方太清草木方李翺何首烏傳普救方神仙服食方嵩陽子威靈仙傳寒食散方賈相公牛經賈誠馬經已上八十四家係舊本所引靈樞經王氷𤣥宻張杲醫説黄帝書褚氏遺書李濓醫史秦越人難經聖濟總録劉氏病機賦皇甫謐甲乙經宋徽宗聖濟經劉克用藥性賦王叔和脉經張仲景金匱要略彭祖服食經巢元方病原論神農食經神仙服食經宋俠經心録魏武帝食制李氏食經王執中資生經婁居中食治通説飲膳正要劉河間原病式太清靈寶方元明粉方劉河間宣明方戴起宗脉訣刋誤呉猛服椒訣許洪本草指南黄氏本草權度陸氏證治本草土宿真君造化指南醫餘録月池人參傳李言聞胡演升鍊丹藥秘訣名醫録月池艾葉傳張子和儒門事親張潔古醫學啟源菖蒲傳醫鑑龔信活法機要楊天惠附子傳潔古家珍李東垣醫學發明東垣辨惑論東垣脾胃論東垣蘭室秘藏東垣試效方王海藏醫家大法海藏醫壘元戎東垣此事難知海藏隂證發明羅天益衞生寶鑑丹溪格致餘論丹溪局方發揮盧和丹溪心法丹溪醫案楊珣丹溪心方廣丹溪心法附餘丹溪活套程充丹溪心法滑伯仁攖寧心要惠民和濟局方陳言三因方孫真人千金月令方嚴用和濟生方王氏易簡方王碩楊子建萬全䕶命方繼洪澹寮方是齋指迷方王貺楊士瀛仁齋