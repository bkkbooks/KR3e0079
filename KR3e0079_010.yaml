三臣九佐使也𢎞景曰用藥猶如立人之制若多君少臣多臣少佐則氣力不周也然檢仙經世俗諸方亦不必皆爾大扺飬命之藥多君飬性之藥多臣療病之藥多佐猶依本性所主而復斟酌之上品君中復有貴賤臣佐之中亦復如之所以門冬逺志别有君臣甘草國老大黄將軍明其優劣皆不同秩也岐伯曰方制君臣者主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也所以明善惡之殊貫也張元素曰為君者最多為臣者次之佐者又次之藥之于證所主同者則各等分或云力大者為君李杲曰凡藥之所用皆以氣味為主補瀉在味隨時换氣主病為君假令治風防風為君治寒附子為君治濕防己為君治上焦熱黄芩為君中焦熱黄連為君兼見何證以佐使藥分治之此制方之要也本草上品為君之説各從其宜耳藥有隂陽配合子母兄弟韓保昇曰凡天地萬物皆有隂陽大小各冇色類並冇法象故羽毛之類皆生于陽而屬于隂鱗介之類皆生于隂而屬于陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雄黄法土故色黄而主脾磁石法水故色黑而主腎餘皆以此類推之子母兄弟若榆皮為母厚朴為子之類是也根莖花實苖皮骨肉元素曰凡藥根之在土中者中半已上氣脉之上行也以生苖者為根中半已下氣脉之下行也以入土者為梢病在中焦與上焦者用根在下焦者用梢根升梢降人之身半已上天之陽也用頭中焦用身身半已下地之隂也用梢乃述類象形者也時珍曰草木有單使一件者如𦍑活之根木通之莖欵冬之花葶藶之實敗醬之苖大青之葉大腹之皮郁李之核蘗木之皮沉香之節蘇木之肌胡桐之淚龍腦之膏是也有兼用者逺志小草蜀漆常山之類是也有全用者枸杞甘菊之類是也有一物兩用者當歸頭尾麻黄根節赤白茯苓牛滕春夏用苖秋冬用根之類是也羽毛鱗介玉石水火之屬徃徃皆然不可一律論也有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和視之當用相須相使者良勿用相惡相反者如有毒宜制可用相畏相殺者不爾勿合用也保昇曰本經三百六十五種中單行者七十一種相須者十二種相使者九十種相畏者七十八種相惡者六十種相反者十八種相殺者三十六種凡此七情合和視之𢎞景曰凡檢舊方用藥亦有相惡相反者如仙方廿草丸有防已細辛俗方玉石散用栝樓乾薑之類服之乃不為害或有制持之者譬之冦賈輔漢程周佐吳大體既正不得以私情為害雖爾不如不用尤良半夏有毒須用生薑取其相畏相制也宗奭曰相反為害深于相惡者謂彼雖惡我我無忿心猶如牛黄惡龍骨而龍骨得牛黄更良此有以制服故也相反者則彼我交讐必不和合今畵家用雌黄胡粉相近便自黯妬可證矣時珍曰藥有七情獨行者單方不用輔也相須者同類不可離也如人参甘草黄蘗知母之類相使者我之佐使也相惡者奪我之能也相畏者受彼之制也相反者兩不相合也相殺者制彼之毒也古方多有用相惡相反者葢相須相使同用者帝道也相畏相殺同用者王道也相惡相反同用者霸道也有經有權在用者識悟耳藥有酸鹹甘苦辛五味又有寒熱温凉四氣宗奭曰凡稱氣者是香臭之氣其寒熱温凉是藥之性且如鵞白脂性冷不可言氣冷也四氣則是香臭腥臊如蒜阿魏鮑魚汚襪則其氣臭雞魚鴨蛇則其氣腥狐狸白馬莖人中白則其氣臊沉檀龍麝則其氣香是也則氣字當改為性字于義方允時珍曰寇氏言寒熱温凉是性臭香腥臊是氣其説與禮記文合但自素問以来只以氣味言卒難改易姑從舊爾好古曰味冇五氣冇四五味之中各有四氣如辛則有石膏之寒桂附之熱半夏之温薄荷之冷是也氣者天也味者地也温熱者天之陽寒凉者天之隂辛廿者地之陽鹹苦者地之隂本草五味不言淡四氣不言凉只言温大温熱大熱寒大寒微寒平小毒大毒有毒無毒何也淡附于廿微寒即凉也及有毒無毒岐伯曰病有久新方有大小有毒無毒固宜常制大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食飬盡之無使過之傷其正也又曰耐毒者以厚藥不勝毒者以薄藥王氷云藥氣有偏勝則臟氣有偏絶故十分去其六七八九而止也隂乾暴乾採造時月生熟𢎞景曰凡採藥時月皆是建寅嵗首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未充枝葉勢力淳濃也至秋枝葉乾枯津潤歸流于下也大抵春寧宜早秋寧宜晚花實莖葉各隨其成熟爾嵗月亦有早晏不必都依本文也所謂隂乾者就六甲隂中乾之也又依遁甲法甲子句隂中在癸酉以藥著酉地也實不必然但露暴于隂影處乾之爾若可兩用益當為善孫思邈曰古之醫者自解採取隂乾暴乾皆如法用藥必依土地所以治病十愈八九今之醫者不知採取時節至于出産土地新陳虚實所以治病十不得五也馬志曰今按法隂乾者多惡如鹿葺隂乾悉爛火乾且良草木根苖九月以前採者悉宜日乾十月以後採者隂乾乃好時珍曰生産有南北節氣冇早遲根苖異收採制造異法度故市之地黄以鍋煑熟大黄用火焙乾松黄和蒲黄樟腦雜龍腦皆失制作偽者也孔志約云動植形生因地舛性春秋節變感氣殊功離其本土則質同而效異乖于採取則物是而時非名實既虚寒温多謬施于君父逆莫大焉嘉謨曰醫藥貿易多在市家諺云賣藥者兩眼用藥者一眼服藥者無眼非虚語也古壙灰云死龍骨首蓿根為土黄耆麝香搗荔核攙藿香採茄葉雜煮半夏為元胡索鹽松梢為肉蓯蓉草仁充草豆蔲西呆代南木香熬廣膠入蕎麫作阿膠煮雞子及魚枕為琥珀枇杷蕋代欵冬驢脚脛作虎骨松脂混麒麟竭畨硝和龍腦香巧詐百般甘受其侮甚致殺人歸咎用藥乃大闗係非比尋常不可不慎也土地所出眞偽陳新並各有法𢎞景曰諸藥所生皆的有境界秦漢已前當言列國今郡縣之名後人所増爾江東以來小小雜藥多出近道氣力性理不及本邦假令荆益不通則全用歴陽當歸錢塘三建豈得相似所以療病不及徃人亦當縁此又且醫不識藥惟聼市人市人又不辨䆒皆委採送之家傳習造作真偽好惡並皆莫測所以鍾乳醋煮令白細辛水潰使直黄耆蜜蒸為甜當歸酒洗取潤蜈蚣朱足令赤螵蛸膠于桑枝以蛇牀當蘼蕪以薺苨亂人参此等既非事實合藥不量剥除只如逺志牡丹纔不收半地黄門冬三分耗一凡去皮除心之屬分兩不應不知取足王公貴勝合藥之日羣下竊换好藥終不能覺以此療病固難責效宗奭曰凡用藥必須擇土地所宜者則真用之有據如上黨人参川西當歸齊州半夏華州細辛東壁土冬月灰半天河水熱湯漿水之類其物至微其用至廣葢亦有理若不推䆒厥理治病徒費其功杲曰陶隠居本草言狼毒枳實橘皮半夏麻黄吳茱萸皆須陳久者良其餘須精新也然大黄木賊荆芥芫花槐花之類亦宜陳久不獨六陳也凡藥味須要專精至元庚辰六月許伯威年五十四中氣本弱病傷寒八九日熱甚醫以凉藥下之又食梨冷傷脾胃四肢逆冷時發昏憒心下悸動吃噫不止面色青黄目不欲開其脉動中有止時自還乃結脉也用仲景復脉湯加人参肉桂急扶正氣生地黄减半恐傷陽氣服二劑病不退再為診之脉證相對因念莫非藥欠專精陳腐耶再市新藥與服其證减半又服而安凡諸草木昆蟲産之有地根葉花實採之有時失其地則性味少異失其時則氣味不全又况新陳之不同精粗之不等倘不擇而用之其不效者醫之過也唐耿湋詩曰老醫迷舊疾朽藥誤新方是矣嵗物專精見後藥性冇宜丸者宜散者宜水煑者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越𢎞景曰又按病有宜服丸服散服湯服酒服膏煎者亦兼叅用以為其制華佗曰病有宜湯宜丸者宜散者宜下者宜吐者宜汗者湯可以蕩滌臟腑開通經絡調品隂陽丸可以逐風冷破堅積進飲食散可以去風寒暑濕之邪散五臟之結伏開腸利胃可下而不下使人心腹脹滿煩亂可汗而不汗使人毛孔閉塞悶絶而終可吐而不吐使人結胷上喘水食不入而死杲曰湯者蕩也去大病用之散者散也去急病用之丸者緩也舒緩而治之也㕮咀者古制也古無鐵刅以口咬細煎汁飲之則易升易散而行經絡也凡治至髙之病加酒煎去濕以生薑補元氣以大棗發散風寒以蔥白去膈上痰以蜜細末者不循經絡止去胃中及臟腑之積氣厚味者白湯調氣味薄者煎之和滓服去下部之痰其丸極大而光且圓治中焦者次之治上焦者極小稠麫糊取其遲化直至中下或酒或醋取其散之意也凡半夏南星欲去濕者丸以薑汁稀糊取其易化也水浸宿炊餅又易化滴水丸又易化煉蜜丸者取其遲化而氣循經絡也蠟丸取其難化而旋旋取效或毒藥不傷脾胃也元素曰病在頭面及皮膚者藥須酒炒在咽下臍上者酒洗之在下者生用寒藥須酒浸暴乾恐傷胃也當歸酒浸助發散之用也嘉謨曰製藥貴在適中不及則功效難求太過則氣味反失火製四煆炮炙炒也水製三漬泡洗也水火共製蒸煮二者焉法造雖多不離于此酒製升提薑製發散入鹽走腎而軟堅用醋注肝而住痛童便製除劣性而降下米泔製去燥性而和中乳製潤枯生血蜜製甘緩益元陳壁土製竊眞氣驟補中焦麥麩皮製抑酷性勿傷上膈烏豆湯甘草湯漬曝並解毒致令和平羊酥油猪脂油塗燒咸渗骨容易脆斷去穰者免脹抽心者除煩大㮣具陳初學熟玩欲療病先察其源先候病機五臟未虚六腑未竭血脉未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全𢎞景曰自非明醫聼聲察色診脉孰能知未病之病乎且未病之人亦無肯自療故齊侯怠于皮膚之微以致骨髓之病非但識悟之為難亦乃信受之弗易倉公有言信巫不信醫死不治也時珍曰素問曰上古作湯液故為而弗服中古道徳稍衰邪氣時至服之萬全當今之世必齊毒藥攻其中鑱石針艾治其外又曰中古治病至而治之湯液十日不已治以草蘇荄枝本末為助標本已得神氣乃復暮世之病不本四時不知日月不審逆從病勢已成以為可救故病未已新病復起淳于意曰病冇六不治驕恣不論于理一不治輕身重財二不治衣食不適三不治隂陽臟氣不定四不治形羸不能服藥五不治信巫不信醫六不治六者有一則難治也宗奭曰病有六失失于不審失于不信失于過時失于不擇醫失于不識病六失冇一即為難治又有八要一曰虚二曰實三曰冷四曰熱五曰邪六曰正七曰内八曰外也素問言凡治病察其形氣色澤觀人勇怯骨肉皮膚能知其情以為診法若患人脉病不相應既不得見其形醫止據脉供藥其可得乎今豪富之家婦人居幃幔之内復以帛幪手臂既無望色之神聼聲之聖又不能盡切脉之巧未免詳問病家厭繁以為術疎徃徃得藥不服是四診之術不得其一矣可謂難也嗚呼若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度𢎞景曰今藥中單行一兩種有毒只如巴豆甘遂將軍不可便令盡劑如經所云一物一毒服一丸如細麻二物一毒服二丸如大麻三物一毒服三丸如胡豆四物一毒服四丸如小豆五物一毒服五丸如大豆六物一毒服六丸如梧子從此至十皆以梧子為數其中又有輕重且如狼毒鉤吻豈如附子芫花輩耶此類皆須量宜宗奭曰須有此例更合論人老少虚實病之新久藥之多毒少毒斟量之不可執為定法療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以毒藥癰疽瘡瘤以瘡藥風濕以風濕藥各隨其所宜𢎞景曰藥性一物兼主十餘病者取其偏長為本復觀人之虚實補瀉男女老少苦樂榮悴鄉壤風俗並各不同褚澄療寡婦尼僧異乎妻妾此是達其性懐之所致也時珍曰氣味有厚薄性用有躁静治體有多少力化有淺深正者正治反者反治用熱逺熱用寒逺寒用凉逺凉用温逺温發表不逺熱攻裏不逺寒不逺熱則熱病至不逺寒則寒病至治熱以寒温而行之治寒以熱凉而行之治温以清冷而行之治清以温熱而行之木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之髙者抑之下者舉之冇餘折之不足補之堅者削之客者除之勞者温之結者散之留者行之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之吐之汗之下之補之瀉之新久同法又曰逆者正治從者反治反治者熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已又曰諸寒之而熱者取之隂熱之而寒者取之陽所謂求其屬以衰之也此皆約取素問之粹言病在胸膈已上者先食後服藥病在心腹已下者先服藥而後食病在四肢血脉者宜空服而在旦病在骨髓者宜飽滿而在夜𢎞景曰今方家先食後食葢此義也又有須酒服者飲服者冷服者熱服者服湯則有踈有數煑湯則有生有熟各有法用並宜詳審杲曰古人服藥活法病在上者不厭頻而少病在下者不厭頓而多少服則滋榮于上頓服則峻補于下凡云分再服三服者要令勢力相及並視人之强弱病之輕重以為進退增减不必泥法夫大病之主有中風傷寒寒熱温瘧中惡霍亂大腹水腫腸澼下痢大小便不通奔豚上氣咳逆嘔吐黄疸消渴留飲癖食堅積癥瘕癲邪驚癎鬼疰喉痺齒痛耳聾目盲金瘡踒折癰腫惡瘡痔瘻癭瘤男子五勞七傷虚乏羸瘦女子帶下崩中血閉隂蝕蟲蛇蠱毒所傷此大畧宗兆其間變動枝葉各宜依端緒以收之𢎞景曰藥之所主止説病之一名假令中風乃有數十種傷寒證候亦有二十餘條更復就中求其類例大體歸其始終以本性為根宗然後配證以合藥爾病之變狀不可一㮣言之所以醫方千卷猶未盡其理春秋以前及和緩之書蔑聞而道經畧載扁鵲數法其用藥猶是本草家意至漢淳于意及華陀等方今時冇存者亦皆條理藥性惟張仲景一部最為衆方之祖又悉依本草但其善診脉明氣候以意消息之爾至于刳腸剖臆刮骨續筋之法乃别術所得非神農家事自晉代以來有張苖宫㤗劉徳史脱靳邵趙泉李子豫等一代良醫其貴勝阮徳如張茂先輩逸民皇甫士安及江左葛洪蔡謨殷仲堪諸名人等並研精藥術宋有羊欣元有胡洽秦承祖齊有尚書褚澄徐文伯嗣伯羣從兄弟療病亦十愈八九凡此諸人各有所撰用方觀其指趣莫非本草者或時用别藥亦循其性度非相踰越范汪方百餘卷及葛洪肘後其中冇細碎單行經用者或田舍試騐之法或殊域異識之術如藕皮散血起自庖人牽牛逐水近出野老麵店蒜虀乃是下蛇之藥路邊地菘而為金瘡所秘此盖天地間物莫不為天地間用觸遇則㑹非其主對矣顔光禄亦云道經仙方服食斷穀延年却老乃至飛丹鍊石之竒雲騰羽化之妙莫不以藥道為先用藥之理一同本草但制御之途小異世法所用不多逺至二十餘物或單行數種嵗月深積便至大益即本草所云久服之效不如俗人㣲覺便止今庸醫處療皆恥看本草或倚約舊方或聞人傳説便攬筆疏之以此表竒其畏惡相反故自寡昧而藥類違僻分兩参差不以為疑偶爾値瘥則自信方騐旬月未瘳則言病源深結了不反求諸己虚搆聲稱自應貽譴矣其闕經四部軍國禮服少有乖越止于事迹非宜爾至于湯藥一物有謬便性命及之千乘之君百金之長可不深思戒慎耶宗奭曰人有貴賤少長病當别論病有新久虚實理當别藥盖人心如面各各不同惟其心不同臟腑亦異欲以一藥通治衆人之病其可得乎張仲景曰有土地髙下不同物性剛柔飱居亦異是故黄帝興四方之問岐伯舉四治之能且如貴豪之家形樂志苦者也衣食足則形樂而外實患慮多則志苦而内虚故病生於脉與貧下異當因人而治後世醫者委此不行所失甚矣又凡人少長老其氣血有盛壯衰三等故岐伯曰少火之氣壯壯火之氣衰盖少火生氣壯火散氣况衰火乎故治法亦當分三等其少日服餌之藥于壯老之時皆須别處决不可忽慮又云人以氣血為本世有童男室女積想在心思過當多致勞損男則神色先散女則月水先閉葢憂愁思慮則傷心心傷則血逆竭故神色先散而月水先閉也火既受病不能營飬其子故不嗜食脾既虚則金氣虧故發𠻳嗽既作水氣絶故四肢乾木氣不充故多怒鬢髮焦筋痿俟五臟傳遍故卒不能死然終死矣此于諸勞最為難治或能改易心志用藥扶接間得九死一生耳煙冇人病久嗽肺虚生寒熱以欵冬花焚三兩芽俟出以筆管吸其煙滿口則嚥之至倦乃已日作五七次遂瘥乃有人病瘧月餘又以藥吐下之氣遂弱觀其脉病夏傷暑秋又傷風因與柴胡湯一劑安後又飲食不節寒熱復作吐逆不食脇下急痛此名痰瘧以十棗湯一服下痰水數升服理中散二錢遂愈凡有婦人病吐逆大小便不通煩亂四肢冷漸無脉一日半與大承氣湯二劑至夜半大便漸通脉漸生翼日乃安此闗格之病極難治經曰闗則吐逆格則不得小便亦有不得大便者有人苦風痰頭痛顫掉吐逆飲食减醫以為傷冷物温之不愈又以丸下之遂厥復與金液丹後譫語吐逆顫掉不省人狂若見鬼循衣摸床手足冷脉伏此胃中有結熱故昬瞀不省人以陽氣不能布于外隂氣不持于内即顫掉而厥遂與大承氣湯至一劑乃愈大有婦人病温已十二日診其脉六七至而澁寸稍尺稍小發寒熱頰赤口乾不了了耳聾問之病後數日經水乃行此屬少陽熱入血室治不對病必死乃與小柴胡湯二日又加桂枝乾薑湯一日寒熱止但云我臍下急痛與抵當丸微利痛止身凉尚不了了復與小柴胡湯次日云我胸中熱燥口鼻乾又少與調胃承氣湯不利與大陷胸丸半服利三行次日虚煩不寧妄有所見狂言知冇燥屎以其極虚不敢攻之與竹葉湯去其煩熱其大便自通中有燥屎數枚狂煩盡解惟欬嗽唾沬此肺虚也不治恐乗虚作肺痿以小柴胡去人参薑棗加乾薑五味子湯一日欬减二日悉痊之有人年六十脚腫生瘡忽食猪肉不安醫以藥下稍愈時出外中風汗出頭面暴腫起紫黑色多睡耳輪中有浮泡小瘡黄汁出乃與小續命湯倍加羌活服之遂愈有人年五十四素羸多中寒小年常服土硫黄數斤近服兔絲有效脉左上二部右下二部弦𦂳有力五七年來病右手足筋急拘攣言語稍遲遂與仲景小續命湯加薏苡仁一兩以治筋急减黄芩人参芍藥各半以避中寒杏仁只用一百五枚後云尚覺大冷因盡去人參芩芍加當歸一兩半遂安小續命湯今人多用不能逐證加减遂至危殆故舉以為例陶隱居名醫别録合藥分劑法則古秤惟有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子榖秬黍之制從來均之已久依此用之蘓㳟曰古秤皆複今南秤是也後漢以來分一斤為二斤一兩為二兩古方惟張仲景而已渉今秤若用古秤則水為殊少矣杲曰六銖為一分即二錢半也二十四銖為一兩古云三兩即今之一兩云二兩即今之六錢半也時珍曰蠶初吐絲曰忽十忽曰絲十絲曰氂四氂曰絫音壘十氂曰分四絫曰字二分半也十絫曰銖四分也四字曰錢十分也六銖曰一分去聲二錢半也四分曰兩二十四銖也八兩曰錙二錙曰斤二十四兩曰鎰一斤半也准官秤十二兩三十斤曰鈞四鈞曰石一百二十斤也方中有曰少許者些子也今古異制古之一兩今用一錢可也今方家云等分者非分兩之分謂諸藥分兩多少皆同爾多是丸散用之丸散云刀圭者十分方寸匕之一准如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度五匕者即今五銖錢邊五字者抄之不落為度一撮者四刀圭也匕即匙也藥以升合分者謂藥有虚實輕重不得用斤兩則以升平之十撮為一勺十勺為一合十合為一升升方作上徑一寸下徑六分深八分内散藥物按抑之正爾微動令平爾時珍曰古之一升即今之二合半也量之所起為圭四圭為撮十撮為勺十勺為合十合為升十升為斗五斗為斛二斛曰石凡湯酒膏藥云㕮咀者謂秤畢搗之如大豆又吹去細末藥有易碎難碎多末少末今皆細切如㕮咀也㳟曰㕮咀商量斟酌之也宗奭曰㕮咀有含味之意如人以口齒咀囓雖破而不塵古方多言㕮咀此義也杲曰㕮咀古制也古無鐵刅以口咬細令如麻豆煎之今人以刀剉細爾凡丸藥云如細麻者即胡麻也不必扁扁略相稱爾黍粟亦然云如大麻子者准三細麻也如胡豆者即今青斑豆也以二大麻准之如小豆者今赤小豆也以三大麻准之如大豆者以二小豆准之如梧子者以二大豆准之如彈丸及雞子黄者以四十梧子准之宗奭曰今人用古方多不效者何也不知古人之意爾如仲景治胸痺心中痞堅逆氣搶心用治中湯人参术乾薑廿草四物共一十二兩水八升煮取三升毎服一升日三服以知為度或作丸須雞子黄大皆奇效今人以一丸如楊梅許服之病既不去乃曰藥不神非藥之罪用藥者之罪也凡方云巴豆若干枚者粒有大小當去心皮秤之以一分准十六枚附子烏頭若干枚者去皮畢以半兩准一枚枳實若干枚者去穰畢以一分准二枚橘皮一分准三枚棗大小二枚准一兩乾薑一累者以一兩為正凡方云半夏一升者洗畢秤五兩為正蜀椒一升三兩為正吳茱萸一升五兩為正兎絲子一升九兩為正菴閭子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正其子各有虚實輕重不可秤准者取平升為正凡方云用桂一尺者削去皮重半兩為正甘草一尺者二兩為正云某草一束者三兩為正云一把者二兩為正凡方云蜜一斤者有七合猪膏一斤者有一升二合也凡丸散藥亦先切細暴燥乃擣之有各擣者有合擣者並隨方其潤濕藥如天門冬地黄輩皆先增分兩切暴獨擣碎更暴若逢隂雨微火烘之既燥停冷擣之時珍曰凡諸草木藥及滋補藥並忌錢器金性剋木之生發之氣肝腎受傷也惟宜銅刀竹刀修治乃佳亦有忌銅器者並宜如法丸散須用青石碾石磨石臼其砂石者不良凡篩丸散用重蜜絹各篩畢更合于臼中擣數百遍色理和同乃佳也巴豆杏仁胡麻諸膏膩藥皆先熬黄搗令如膏指㩢莫結切視泯泯乃稍稍入散中合研擣散以輕疎絹篩度之再合擣匀凡煑湯欲微火令小沸其水依方大約二十兩藥用水一斗煑取四升以此為准然利湯欲注少水而多取汁補湯欲熟多水而少取汁不得令水多少用新布兩人以尺木絞之澄去垽濁紙覆令宻温湯勿用鐵器服湯寧小沸熱則易下冷則嘔涌之才曰湯中用酒須臨熟乃下之時珍曰陶氏所説乃古法也今之小小湯劑每一兩用水二甌為准多則加少則减之如劑多水少則藥味不出劑少水多又煎耗藥力也凡煎藥並忌銅鐵器宜用銀器瓦灌洗浄封固令小心者㸔守須識火候不可太過不及火用木炭蘆葦為佳其水須新汲味甘者流水井水沸湯等各依方詳見水部若發汗藥必用𦂳火熱服攻下藥亦用𦂳火煎熟下硝黄再煎温服補中藥宜慢火温服隂寒急病亦宜𦂳火急煎服之又有隂寒煩躁及暑月伏隂在内者宜水中沉冷服凡漬藥酒皆須細切生絹袋盛入酒宻封隨寒暑日數漉出滓可暴燥微擣更漬亦可為散服時珍曰别有釀酒者或以藥煮汁和飯或以藥袋安置酒中或煑物和飯同釀皆隨方法又有煮酒者以生絹袋藥入壜宻封置大鍋中水煮一日埋土中七日出火毒乃飲凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑皆先暴燥陳藏器曰凡湯中用麝香牛黄犀角羚羊角蒲黄丹砂芒硝阿膠輩須細末如粉臨時納湯中攪和服之凡合膏初以苦酒漬令淹浹不用多汁宻覆勿洩云晬時者周時也從今旦至明旦亦有止一宿者煮膏當三上三下以洩其熱勢令藥味得出上之使匝匝沸乃下之使沸静良久乃止中有薤白者以兩頭微焦黄為候有白芷附子者以小黄色為度以新布絞去滓滓亦可酒煮飲之摩膏滓可傅病上膏中有雄黄朱砂麝香輩皆别擣如麫絞膏畢乃投中疾攪勿使沉聚在下有水銀胡粉者於凝膏中研令消散時珍曰凡熬貼癰疽風濕諸病膏者先以藥浸油中三日乃煎之煎至藥枯以絹濾浄煎熱下黄丹或胡粉或宻陀僧三上三下煎至滴水成珠不散傾入器中以水浸三日去火毒用若用松脂者煎至成絲傾入水中㧞扯數百遍乃止俱宜謹守火候勿令太過不及也其冇朱砂雄黄龍腦麝香血竭乳香没藥等料者並待膏成時投之黄丹胡粉宻陀僧並須水飛瓦炒過松脂須鍊數遍乃良凡丸中用蠟皆烊投少蜜中攪調以和藥杲曰丸藥用蠟取其固䕶藥之氣味勢力以過闗膈而作效也若投以蜜下咽亦易散化如何得到臟中若有毒藥反又害之非用蠟之本意也几用蜜皆先大煎掠去其沫令色微黄則丸藥經久不壊雷斆曰凡煉蜜毎一斤止得十二兩半是數火少火過並不得用也修合丸藥用蜜只用蜜用餳只用餳用糖只用糖勿交雜用必瀉人也采藥分六氣歳物岐伯曰厥隂司天為風化在泉為酸化清毒不生少隂司天為熱化在泉為苦化寒毒不生太隂司天為濕化在泉為甘化燥毒不生少陽司天為火化在泉為苦化寒毒不生陽明司天為燥化在泉為辛化濕毒不生太陽司天為寒化在泉為鹹化毒熱不生治病者必明六化分治五味所生五臟所宜乃可言盈虚病生之緒本乎天者天之氣本乎地者地之氣謹候氣宜無失病機司歲備物則無遺主矣歲物者天地之專精也非司嵗物則氣散質同而異等也氣味有厚薄性用有躁静治保有多少力化有淺深上滛于下所勝平之外滛于内所勝治之王氷曰化于天者為天氣化于地者為地氣五毒皆五行之氣所為故所勝者不生惟司天在泉之所生者其味正故藥工專司嵗氣所收藥物則所主無遺畧矣五運有餘則專精之氣藥物肥濃使用當其正氣味也不足則藥不專精而氣散物不純形質雖同力用則異矣故天氣淫于下地氣淫于内者皆以所勝平治之如風勝濕酸勝甘之類是也七方岐伯曰氣有多少形有盛衰治有緩急方有大小又曰病有逺近證有中外治有輕重近者奇之逺者偶之汗不以奇下不以偶補上治上制以緩補下治下制以急近而偶竒制小其服逺而竒偶制大其服大則數少小則數多多則九之少則一之竒之不去則偶之偶之不去則反佐以取之所謂寒熱温凉反從其病也王氷曰臟位有髙下腑氣冇逺近病證有表裏藥用有輕重單方冇竒複方為偶心肺為近肝腎為逺脾胃居中腸䐈胞膽亦有逺近識見髙逺權以合宜方竒而分兩偶方偶而分兩竒近而偶制多數服之逺而竒制少數服之則肺服九心服七脾服五肝服三腎服一為常制也方與其重也寧輕與其毒也寧善與其大也寧小是以竒方不去偶方主之偶方不去則反佐以同病之氣而取之夫微小之熱折之以寒㣲小之冷消之以熱甚大寒熱則必能與異氣相格聲不同不相應氣不同不相合是以反其佐以同其氣復令寒熱叅合使其始同終異也時珍曰逆者正治從者反治反佐即從治也謂熱在下而上有寒邪拒格則寒藥中入熱藥為佐下膈之後熱氣既散寒性隨發也寒在下而上冇浮火拒格則熱藥中入寒藥為佐下膈之後寒氣既消熱性隨發也此寒因熱用熱因寒用之妙也温凉倣此完素曰流變在乎病主病在乎方制方在乎人方冇七大小緩急竒偶複也制方之體本乎氣味寒熱温凉四氣生于天酸苦辛鹹甘淡六味成于地是以有形為味無形為氣氣為陽味為隂辛甘發散為陽酸苦涌泄為隂鹹味涌泄為隂淡味渗泄為陽或収或散或緩或急或燥或潤或輭或堅各隨臟腑之證而施藥之品味乃分七方之制也故竒偶複者三方也大小緩急者四制之法也故曰治有緩急方冇大小大方岐伯曰君一臣二佐九制之大也君一臣三佐五制之中也君一臣二制之小也又曰逺而竒偶制大其服近而竒偶制小其服大則數少小則數多多則九之少則二之完素曰身表為逺裏為近大小者制竒偶之法也假如小承氣湯調胃承氣湯竒之小方也大承氣湯抵當湯竒之大方也所謂因其攻裏而用之也桂枝麻黄偶之小方也葛根青龍偶之大方也所謂因其發表而用之也故曰汗不以竒下不以偶張從正曰大方冇二冇君一臣三佐九之大方病冇兼證而邪不一不可以一二味治者宜之有分兩大而頓服之大方肝腎及下部之病道逺者宜之王大僕以心肺為近腎肝為逺脾胃為中劉河間以身表為逺身裏為近以予觀之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也小方從正曰小方有二冇君一臣二之小方病無兼證邪氣專一可一二味治者宜之有分兩少而頻服之小方心肺及在上之病者宜之徐徐細呷是也完素曰肝腎位逺數多則其氣緩不能速逹于下必大劑而數少取其迅急下走也心肺位近數多則其氣急下走不能升發于上必小劑而數多取其易散而上行也王氏所謂肺服九心服七脾服五肝服三腎服一乃五臓生成之數也緩方岐伯曰補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其病所逺而中道氣味之者食而過之無越其制度也王氷曰假如病在腎而心氣不足服藥宜急過之不以氣味飼心腎藥凌心心復益衰矣餘上下逺近例同完素曰聖人治上不犯下治下不犯上治中上下俱無犯故曰誅伐無過命曰大惑好古曰治上必妨下治表必違裏用黄芩以治肺必妨脾用蓯蓉以治腎必妨心用乾薑以治中必僣上服附子以補火必涸水從正曰緩方冇五冇甘以緩之之方甘草糖蜜之屬是也病在胸膈取其留戀也有九以緩之之方比之湯散其行遲慢也冇品件衆多之緩方藥衆則逓相拘制不得各騁其性也有無毒治病之緩方無毒則性純功緩也有氣味俱薄之緩方氣味薄則長于補上治上比至其下藥力已衰矣急方完素曰味厚者為隂味薄者為隂中之陽故味厚則下泄味薄則通氣氣厚者陽陽氣薄為陽中之隂故氣厚則發熱氣薄則發汗是也好古曰治主宜緩緩則治其本也治客宜急急則治其標也表裏汗下皆有所當緩所當急從正曰急方有四有急病急攻之急方中風闗格之病是也有湯散蕩滌之急方下咽易散而行速也有毒藥之急方毒性能上涌下泄以奪病勢也有氣味俱厚之急方氣味俱厚直趨于下而力不衰也竒方王氷曰單方也從正曰竒方有二有獨用一物之竒方病在上而近者宜之有藥合陽數一三五七九之竒方宜下不宜汗完素曰假如小承氣竒之小方也大承氣抵當湯竒之大方也所謂因其攻下而為之也桂枝麻黄偶之小方也葛根青龍偶之大方也所謂因其發散而用之也偶方從正曰偶方有三有兩味相配之偶方有古之二方相合之偶方古謂之複方皆病在下而逺者宜之有藥合隂數二四六八十之偶方宜汗不宜下王太僕言汗藥不以偶則氣不足以外發下藥不以竒則藥毒攻而致過意者下本易行故單行則力孤而微汗或難出故併行則力齊而大乎而仲景制方桂枝汗藥反以五味為竒大承氣下藥反以四味為偶何也豈臨事制宜復有增損乎複方岐伯曰竒之不去則偶之是謂重方好古曰竒之不去複以偶偶之不去複以竒故曰複複者再也重也所謂十補一泄數泄一補也又傷寒見風脉傷風見寒脉為脉證不相應宜以複方生之從正曰複方有三有二方三方及數方相合之複方如桂枝二越婢一湯五積散之屬是也有本方之外别加餘藥如調胃承氣加連翹薄荷黄芩梔子為凉膈散之屬是也冇分兩均齊之複方如胃風湯各等分之屬是也王太僕以偶為複方今七方有偶又有複豈非偶乃二方相合複乃數方相合之謂乎本草綱目卷一上
