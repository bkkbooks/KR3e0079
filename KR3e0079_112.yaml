熱為佳李察院亮卿常用有效耳聾不聽雞矢白炒半升烏豆炒一升以無灰酒二升乘熱投入服取汗耳如鼓鼙勿訝外臺面目黃疸雞矢白小豆􅐕米各二分為末分作三服水下當有黃汁出也肘後方子死腹中雌雞糞二十一枚水二升五合煮之下米作粥食産寶乳妬乳癰雞矢白炒研酒服方寸匕三服愈寶産乳頭破裂方同上內癰未成取伏雞屎水和服即瘥千金頭瘡白秃雄雞屎末和陳醬苦酒洗之千金消滅瘢痕以豬脂三升飼烏雞一隻三日後取矢同白芷當歸各一兩煎十沸去滓入鷹矢白半兩調傅外臺耳中惡瘡雞矢白炒研傅之惠聖瘰癧瘻瘡雄雞矢燒灰臘豬脂和傅之千金食金中毒已死取雞矢半升水淋取汁一升飲之日三肘後方縊死未絶雞矢白如棗大酒半盞和灌口鼻肘后尸腳折裂無冬夏者雞屎煮湯漬半日取瘥乃止千金射工溪毒白雞矢白者二枚以餳和塗瘡上肘后骨疽不合骨從孔中出掘地作坑口小裏大深三尺以乾雞屎二升同艾及荆葉搗碎入坑內燒令煙出以疽口就熏用衣擁之勿令泄氣半日當有蟲出甚效千金方隂毒腹痛雞糞烏豆地膚子各一把亂髮一團同炒煙起傾入好酒一碗浸之去滓熱服即止生生編小兒心痛白烏骨雞屎五錢晒研松脂五錢為末蔥頭汁和丸梧子大黃丹為衣每醋湯服五丸忌生冷硬物三四日立效嬰童百問雞子即雞卵也黃雌者為上烏雌者次之氣味甘平無毒思邈曰微寒畏醇醋張鼎曰勿多食令人腹中有聲動風氣和蔥蒜食之氣短同韭子食成風痛共鱉肉食損人共獺肉食成遁尸同兔肉食成泄痢妊婦以雞子鯉魚同食令兒生瘡同糯米食令兒生蟲時珍曰小兒患痘疹忌食雞子及聞煎食之氣令生翳膜主治除熱火灼爛瘡癎痓可作虎魄神物别録𢎞景曰用欲毈子黃白混雜者煮作之極相似惟不拾芥爾又煮白合銀口含須臾色如金也鎮心安五臟止驚安胎治妊娠天行熱疾狂走男子隂囊濕癢及開喉聲失音醋煮食之治赤白久痢及産後虛痢光粉同炒乾止疳痢及婦人隂瘡和豆淋酒服治賊風麻痺醋浸令壞傅疵皯作酒止産後血運暖水臟縮小便止耳鳴和蠟沙治耳鳴聾及疳痢日華益氣以濁水煮一枚連水服之主産後痢和蠟煎止小兒痢藏器小兒發熱以白蜜一合和三顆攪服立瘥孟詵形太平御覽云正旦吞烏雞子一枚可以練岣嶁神書云八月晦日夜半面北吞烏雞子一枚有事可隱形發明時珍曰卵白象天其氣清其性微寒卵黃象地其氣渾其性溫卵則兼黃白而用之其性平精不足者補之以氣故卵白能淸氣治伏熱目赤咽痛諸疾形不足者補之以味故卵黃能補血治下痢胎産諸疾卵則兼理氣血故治上列諸疾也附方舊八新二十三天行不解己汗者用新生雞子五枚傾盞中入水一雞子攪渾以水一升煮沸投入納少醬啜之令汗出愈許仁則方天行嘔逆食入即吐雞子一枚水煮三五沸冷水浸少頃吞之外臺傷寒發狂煩燥熱極吞生雞子一枚效食鑑三十六黃急救方用雞子一顆連殼燒灰研酢一合和之溫服鼻中蟲出為效身體極黃者不過三枚神效外臺袐要白虎風病藏器曰取雞子揩病處咒願送糞堆頭上不過三次瘥白虎是糞神愛喫雞子也身面腫滿雞子黃白相和塗腫處乾再上肘后方年深哮喘雞子略敲損浸尿缸中三四日煮食能去風痰集成心氣作痛雞子一枚打破醋二合調服肘后小兒疳痢肚脹用雞子一箇開孔入巴豆一粒輕粉一錢用紙五十重裹于飯上蒸三度放冷去殼研入麝香少許糊和丸米粒大食後溫湯下二丸至三丸經驗方預解痘毒保和方用雞卵一枚活地龍一條入卵內飯上蒸熟去地龍與兒食每歲立春日食一枚終身不出痘也李氏用雞卵一枚童便浸七日水煮食之永不出疽煮李捷用頭生雞子三五枚浸厠坑內五七日取出熟與食數日再食一枚永不出痘徐都司得于浙人之方痘瘡出瘢雞子一箇酒醅浸七日白殭蠶二七枚和勻揩赤塗之甚效聖惠雀卵面皰雞卵醋浸壞取出傅之聖惠妊娠時疾冷胎不動以雞子七枚納井中令冷取出打破吞之子母祕録病欲去胎雞子一枚入鹽三指撮服張文仲方胎動下血藏器曰雞子二枚打破以白粉和稀食之子死腹中用三家雞卵各一枚三家鹽各一撮三家水各一升同煮令婦東向飲之千金方産後血多不止烏雞子三枚醋半升酒二升和攪煮取一升分四服拾遺産後心痛雞子煮酒食即安備急方産後口乾舌縮用雞子一枚打破水一盞攪服經驗方婦人白帶用酒及艾葉煮雞卵日日食之袖珍方頭風白屑新下烏雞子三枚沸湯五升攪作三度沭之甚良集驗腋下胡臭雞子兩枚煮熟去殼熱夾待冷棄之三乂路上勿回顧如此三次效肘后方乳石發渴水浸雞子取清生服甚良總録解野葛毒已死者抉開口後灌雞子三枚須臾吐出野葛乃蘇肘后方胡蔓野毒即斷腸草一葉入口百竅流血惟急取鳯凰胎即雞卵抱未成雛者已成者不用研爛和麻血灌之吐出毒物乃生少遲即死嶺南衛生方癰疽發背初作及經十日以上腫赤焮熱日夜疼痛百藥不效者用毈雞子一枚新狗屎如雞子大攪勻微火熬令稀稠得所捻作餅子于腫頭上貼之以帛包抹時時看視覺餅熱即易勿令轉動及歇氣經一宿定如日多者三日貼之一日一易至瘥乃止此方穢惡不可施之貴人一切諸方皆不能及但可備擇而已千金方蛛蠍蛇傷雞子一箇輕敲小孔合之立瘥兵部手集蠼螋尿瘡同上法身體發熱不拘大人小兒用雞卵三枚白蜜一合和服立痰普濟方卵白氣味甘微寒無毒主治目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人産難胞衣不出並生吞之醋浸一宿療黃疸破大煩熱别録産後血閉不下取白一枚入醋一半攪服藏器和赤小豆末塗一切熱毒丹腫腮痛神效冬月以新生者酒漬之密封七日取出每夜塗面去皯􅍍皶皰令人悅色時珍發明宗奭曰産後血運身痙直口目向上牽急不知人取雞子一枚去殼分清以荆芥末二錢調服即安甚敏捷烏雞子尤善附方舊四新六時行發黃醋酒浸雞子一宿吞其白數枚肘后方下痢赤白生雞子一箇取白攤連紙上日乾摺作四重包肥烏梅十箇安尉斗中以白炭燒存性取出碗覆冷定研末入水銀粉少許大人分二服小兒三服空心井華水調下如覺微利不須再服類澄蛔蟲攻心口吐清水以雞子一枚去黃納好漆入雞子殼中和合仰頭吞之蟲即出也古今録驗五種遁尸其狀腹脹氣急沖心或磊磈踊起或牽腰脊以雞卵白七枚頓吞之良千金咽塞鼻瘡及乾嘔頭痛食不下用雞子一枚開一竅去黃留白著米酢煻火頓沸取下更頓如此三次乘熱飲之不過一二度即愈普濟方面生皰瘡雞子以三歲苦酒浸之三宿待軟取白塗之肘后湯火燒灼雞子清和酒調洗勤洗即易生肌忌發物或主傅之亦可經驗祕方頭髮垢䐈雞子白塗之少頃洗去光澤不燥頻湖面黑令白雞子三枚酒浸密封四七日每夜以白傅面如雪白也普濟塗面駐顔雞子一枚開孔去黃留白入金華胭脂及硇砂少許紙封與雞抱之俟别卵抱出以塗面洗之不落半年尚紅也普濟卵黃氣味甘溫無毒主治醋煮治産後虛痢小兒發熱煎食除煩熱鍊過治嘔逆和常山末為丸竹葉湯服治久瘧藥性炒取油和粉傅頭瘡日華卒乾嘔者生吞數枚良小便不通者亦生吞之數次效補隂血解熱毒治下痢甚驗時珍發明時珍曰雞子黃氣味俱厚隂中之隂故能補形昔人謂其與阿膠同功正此意也其治嘔逆諸瘡則取其除熱引蟲而已頌曰雞子入藥最多而髮煎方特竒劉禹錫傳信方云亂髮雞子膏治孩子熱瘡用雞子五枚煮熟去白取黃亂髮如雞子大相和於鐵銚中炭火熬之初甚乾少頃即髮焦乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參末粉之頃在武陵生子蓐內便有熱瘡塗諸藥無益而日益劇蔓延半身晝夜號啼不乳不睡因閲本草髮髮條云合雞子黃煎之消為水療小兒驚熱下痢注云俗中嫗母為小兒作雞子煎用髮雜熬之良久得汁與小兒服去痰熱主有病又雞子條云療火瘡因是用之果如神效也附方舊三新十一赤白下痢雞卵一枚取黃去白入胡粉滿殼燒存性以酒服一錢匕氏葛方妊娠下痢絞痛用烏雞子一枚開孔去白留黃入黃丹一錢在內厚紙裹定泥固煨乾為末每服三錢米飲下一服愈者是男兩服愈者是女三因方子死腹中雞子黃一枚薑汁一合和服當下小腸疝氣雞子黃攪溫水服之三服效小兒癎疾雞子黃和乳汁攪服不過三兩枚自定普濟小兒頭瘡煮熱雞子黃炒令油出以麻油膩粉搽之事林廣記鼠瘻已潰雞卵一枚米下蒸半日取黃熬令黑先拭瘡令乾以藥納孔中三度即愈金千方腳上臭瘡熟雞子黃一箇黃蠟一錢煎油塗之湯火傷瘡熱雞子一個取黃炒取油入膩粉十文攪勻掃上三五日永除瘢痕集驗方杖瘡已破雞子黃熬油搽之甚效驗唐瑶經方天泡水瘡方同上消滅瘢痕雞子五七枚煮熟取黃炒黑拭塗日三久久自滅聖惠方妊娠胎漏血下不止血盡則子死用雞子黃十四枚以好酒二升煮如餳服之未瘥再作以瘥為度普濟方耳疳出汁雞子黃炒油塗之甚妙談野翁方抱出卵殼時珍曰俗名混沌池鳯凰蛻用抱出者取其蛻脫之義也李石續博物志云踏雞子殼令人生白癜風主治研末磨障翳日華傷寒勞復熬令黃黑為末熱湯和一合服取汗出即愈蘇頌方出深師燒灰油調塗癬及小兒頭身諸瘡酒服二錢治反胃時珍附方舊二新七小便不通雞子殼海蛤滑石等分為末每服半錢米飲下日三聖惠方小兒煩滿欲死雞子殼燒末酒服方寸匕子母祕録癍痘入目雞子殼燒研入片腦少許點之鴻飛集頭瘡白秃雞子殼七箇炒研油和傅之祕録頭上軟癤用抱出雞卵殼燒存性研末入輕粉少許清油調傅危氏方耳疳出濃用抱出雞卵殼炒黃為末油調灌之疼即止杏林摘要玉莖下疳雞卵殼炒研油調傅之同上外腎癰瘡抱出雞卵殼黃連輕粉等亦為細末用鍊過香油調塗醫林正宗痘瘡惡證癍痘倒陷毒氣壅遏於裏則為便血昏睡不醒其證甚惡用抱出雞子殼去膜新瓦焙研每服半錢熱湯調下嬰兒以酒調抹唇舌上并塗風池胸背神效卵殼中白皮主治久咳氣結得麻黃紫苑服立效别録發明時珍曰按仙傳外科云有人偶含刃在口割舌已垂未斷一人用雞子白皮袋之摻止血藥於舌根血止以臘化蜜調沖和膏敷雞子皮上三日接住乃去皮只用蜜蠟勤敷七日全安若無連效以金鎗藥參治之此用雞子白皮無他但取其柔軟而薄護舌而透藥也附方新二咳嗽日久雞子白皮炒十四枚麻黃三兩焙為末每服方寸匕飲下日二必效方風眼腫痛雞子白皮枸杞白皮等分為末吹鼻中一日三次聖濟總録雞白蠧肥脂本經𢎞景曰不知是何物恐别一種耳藏器曰今雞亦有白臺如卵而硬有白無黃云是牡雞所生名父公臺臺字似槖字疑傳誤也機曰此本經文列于黑雌雞條下似指雌雞之肥脂如蠧蟲之肥白因其似而名之也時珍曰蠧音妬而藏器以為槖何耶今牡雞生子亦時或有之然不當有肥脂字當以機説為近否則必雌雞之生腸也本經有其名不具其功蓋脫簡之文窠中草主治頭療白秃和白頭翁草燒灰豬脂調傅日華天絲入眼燒灰淋清汁洗之良時珍祕出不自方附方舊一新一小兒夜啼雞窠草安席下勿令母知日華本草産後遺尿雞窠草燒末酒服一錢匕聖惠方燖雞湯主治消渴飲水無度用燖雄雞水濾澄服之不過二雞之水愈神效楊氏經驗方附方新一雞眼作痛剝去皮以燖雞湯洗之簡便方雉别録中品釋名野雞宗奭曰雉飛若矢一往而墮故字從矢今人取其尾置舟車上欲其快速也漢吕太后名雉髙祖改雉為野雞其實雞類也時珍曰黃氏韻會云雉理也雉有文理也故尚書謂之華蟲曲禮謂之疏趾雉類甚多亦各以形色為辨耳禽經云雉介鳥也素質五采備曰翬雉青質五采備日鷂雉朱黃曰鷩雉白曰鵫雉音罩玄曰海雉爾雅云鷂雉青質五采鴇雉黃色自呼翟雉山雉也長尾鷮雉長尾走且鳴秋秩海雉也梵書謂雉曰迦頻暗羅集解時珍曰雉南北皆有之形大如雞而斑色繡翼雄者文采而尾長雌者文暗而尾短其性好鬬其名曰鷕鷕音杳其交不再其卵褐色將卵時雌避其雄而潛伏之否則雄食其卵也月令仲冬雉始雊謂陽動則雉鳴而勾其頸也孟冬雉入大水為蜃蜃大蛤也陸佃埤雅云蛇交雉則生蜃蜃蛟類也類書云蛇與雉交而生子曰蟂蟂水蟲也陸禋續水經云蛇雉遺卵於地千年而為蛟龍之屬似蛇四足能害人魯至剛俊靈機要云正月蛇與雉交生卵遇雷入土數丈為蛇形經二三百年成蛟飛騰若卵不入土仍為雉耳又任昉述異記云江淮中有獸名能音耐乃蛇精所化也冬則為雉春復為蛇晉時武庫有雉張華曰必蛇化也視之果得蛇蛻此皆異類同情造化之變易不可臆測者也肉氣味酸微寒無毒恭曰溫日華曰平微毒秋冬益春夏毒有痢人不可食頌曰周禮庖人供六禽雉是其一亦食品之貴然有小毒不可常食損多益少詵曰久食令人瘦九月至十一月稍有補他月則發五痔諸瘡疥不與胡桃同食發頭風眩運及心痛與菌輩木耳同食發五痔立下血同蕎麥食生肥蟲卵同蔥食生寸白蟲自死瓜甲不申者殺人正誤思邈曰黃帝書云丙午日勿食雞雉肉丈夫燒死目盲女人血死妄見野雞肉同家雞子食成遁尸尸鬼纒身𢎞景曰雉非辰屬正是離禽丙午不可食明王於火也時珍曰雉屬離火雞屬巽木故雞煮則冠變雉煮則冠紅明其屬火也春夏不可食者為其食蟲蟻及與蛇交變化有毒也能發痔及瘡疥令人瘦病者為其能生蟲與雞肉同也有鄙人者假黃帝為書謂丙午日不可食及成遁尸之説乃不經謬談而陶氏和之孫氏取之皆誤矣今正其誤主治補中益氣力止泄痢除蟻瘻别録發明時珍曰雉肉諸家言其發痔下痢人不可食而别録用治痢瘻何邪蓋雉在禽上應胃上故能補中而又食蟲蟻故能治蟻瘻取其制伏耳若久食及食非其時則生蟲有毒故不宜也附方舊三新一脾虛下痢日夜不止野雞一隻如食法入橘皮蔥椒五味和作餛飩煮空心食之鏡食醫心産後下痢用野雞一隻作餛飩食之同上消渴飲水小便數用野雞一隻五味煮取三升已來汁飲之肉亦可食甚效同上心腹脹滿野雞一隻不拘雄雌茴香炒馬芹子炒川椒炒陳皮生薑等分用醋以一夜蒸餅和雉肉作饀料外以麵皮包作餛飩煮熟食仍早服嘉禾散辰服此午服導氣抧殼丸朱氏集驗方腦主治塗凍瘡時珍嘴主治蟻瘻孫思邈尾主治燒灰和麻油傅天火丹毒時珍屎主治久瘧時珍附方新一久瘧不止雄野雞屎熊膽五靈脂恆山等分為末醋糊丸黑豆大正發時冷水下一丸聖惠鸐雉音狄食療釋名鸐雞禽經山雞同上山雉時珍曰翟美羽貌雉居原野鸐居山林故得山名大者為鷮集解頌曰伊洛江淮間一種雉小而尾長者為山雞人多畜之樊中即爾雅所謂鸐山雞也時珍曰山雞有四種名同物異似雉而尾長三四尺者鸐雉也似鸐而尾長五六尺能走且鳴者鷮雉也俗通呼為鸐矣其二則鷩雉錦雞也鷮鸐皆勇健自愛其尾不入叢林雨雪則岩伏木栖不敢下食往往餓死故師曠云雪封枯原文禽多死南方𨽻人多插其尾於冠其肉皆美于雉傳云四足之美有麃兩足之美有鷮肉氣味甘平有小毒詵曰發五痔久食瘦人和蕎麥食生肥蟲同䜴食害人卵同蔥食生寸白蟲餘並同雉主治五臟氣喘不得息者作羮臛食孟詵炙食補中益氣時珍鷩雉敝鱉二音拾遺釋名山雞禽經錦雞同上金雞綱目采雞周書鵕鸃音峻儀時珍曰鷩性憋急耿介故名鵕鸃儀容俊秀也周有鷩冕漢有鵕鸃冠皆取其文明俊秀之義鷩與鸛同名山雞鸐大而鷩小鷩與鷊同名錦雞鷊文在綬而鷩文在身以此為異大抵皆雉屬也按禽經云首有采毛曰山雞腹有采色曰錦雞項有采裳曰避株是山雞錦雞又稍有分别而俗通呼為一矣蓋是一類不甚相遠也集解藏器曰鷩似雉五色山海經云小華之山多赤鷩養之禳火災是也時珍曰山雞出南越諸山中湖南湖北亦有之狀如小雞其冠亦小背有黃赤文緑項紅腹紅嘴利距善鬬以家雞鬬之即可獲此乃爾雅所謂鷩山雞者也逸周書謂之采雞錦雞則小於鷩而背文揚赤膺前五色炫耀如孔雀羽此乃爾雅所謂鶾大雞者也逸周書謂之大鶾音汗二種大袛同類而錦雞文尤燦爛如錦或云錦雞乃其雄者亦通劉敬叔異苑云山雞愛其羽毛照水即舞目眩多死照鏡亦然與鸐雞愛尾餓死皆以文纍其身者也附録吐綬雞時珍曰出巴峽及閩廣山中人多畜玩大如家雞小者如鴝鵒頭頰似雉羽色多黑雜以黃白圓點如真珠斑項有嗉囊內藏肉綬常時不見每春夏晴明則向日擺之頂上先出兩翠角二寸許乃徐舒其頷下之綬長濶近尺紅碧相間采色煥爛踰時悉斂不見或剖而視之一旡所覩此鳥生亦反哺行則避草木故禽經謂之避株食物本草謂之吐錦雞古今注謂之錦囊恭氏詩話謂之真珠雞倦遊録謂之孝鳥詩經謂之鷊音厄卭有旨鷊是矣肉氣味甘溫微毒主治食之令人聰慧汪穎養之禳火災藏器鶡雞曷渴二音拾遺釋名時珍曰其羽色黑黃而褐故曰鶡青黑色者名曰䲸音介性耿介也青鳯亦名鶡取象於此也集解藏器曰鶡雞出上黨魏武帝賦云鶡雞猛氣其鬬期於必死今人以鶡為冠象此也時珍曰鶡狀類雉而大黃黑色首有毛角如冠性愛其黨有被侵者直往赴鬬雖死猶不置故古者虎賁戴鶡冠禽經云鶡穀鳥也穀不知死是矣性復粗暴每有所攫應手摧碎上黨即今潞州肉氣味甘平無毒主治炙食令人勇健藏器炙食令人肥潤汪穎白鷴圖經校正原附雉條今分出釋名白鶾音寒間客時珍曰按張華云行止間暇故曰鷴李昉命為間客薛氏以為雉類汪氏以為白雉按爾雅白雉名鶾南人呼間字如寒則鷴即鶾音之轉也當作白鶾如錦雞謂之文鶾也鶾者羽美之貌又西京雜記云南粵王獻白鷴黑鷴各一蓋雉亦有黑色者名鸕雉彼通呼為鶾矣集解頌曰白鷴出江南雉類也白色而背有細黑文可畜彼人亦食之穎曰即白雉也時珍曰鷴似山雞而色白有黑文如連􅀈尾長三四尺體備冠距紅頰赤嘴丹瓜其性耿介李太白言其卵可以雞伏亦有黑鷴肉氣味甘平無毒主治補中解毒汪穎鷓鴣唐本草釋名越雉時珍曰按禽經云隨陽越雉也飛必南翥晉安曰懷南江左曰逐影張華注云鷓鴣其名自呼飛必南向雖東西回翔開翅之始必先南翥其志懷南不徂北也集解孔志約曰鷓鴣生江南形似母雞鳴云鈎輈格磔者是有鳥相似不作此鳴者則非矣頌曰今江西閩廣蜀夔州郡皆有之形似母雞頭如鶉臆前有白圓點如真珠背毛有紫赤浪文時珍曰鷓鴣性畏霜露早晚稀出夜栖以木葉蔽身多對啼今俗謂之其鳴曰行不得也哥哥其性好潔獵人因以􅤽竿粘或用煤誘取南人專以炙食充庖云肉白面脆味勝雞雉肉氣味甘溫無毒日華曰微毒詵曰不可與竹笋同食令人小腹脹自死者不可食或言此鳥天地之神每月取一隻饗至尊所以自死者不可食主治嶺南野葛菌子毒生金毒及溫瘧久病欲死者合毛熬酒漬服之或生搗汁服最良唐本酒服主蠱氣欲死日華能利五臟益心力聰明孟詵發明時珍曰按南唐書云丞相馮延已苦腦痛不已太醫吳廷詔曰公多食山雞鷓鴣其毒發也投以甘草湯而愈此物多食鳥頭半夏苗故以此解其毒爾又類説云楊玄之通判廣州歸楚州因多食鷓鴣遂病咽喉間生癰潰而膿血不止寢食俱廢醫者束手適楊吉老赴郡邀診之曰但先啖生薑一斤乃可投藥初食覺甘香至半斤覺稍寬盡一斤覺辛辣粥食入口了旡滯礙此鳥好啖半夏毒發耳故以薑制之也觀此二説則鷓鴣多食亦有微毒矣而其功用又能解毒解蠱功過不相掩也凡鳥獸自死者皆有毒不可食為其受厲氣也何獨鷓鴣即神取饗帝乎鄙哉其言也脂膏主治塗手皸瘃令不龜裂蘇頌竹雞拾遺釋名山菌子藏器雞頭鶻蘇東坡集泥滑滑穎曰山菌子即竹雞也時珍曰菌子言味美如菌也蜀人呼為雞頭鶻南人呼為泥滑滑因其聲也集解藏器曰山菌子生江東山林間狀如小雞無尾時珍曰竹雞生江南川廣處處有之多居竹林形比鷓鴣差小褐色多斑赤文其性好啼見其儔必鬬捕者以媒誘其鬬因而網之諺云家有竹雞啼白蟻化為泥蓋好食蟻也亦辟壁虱附録杉雞時珍曰按臨海異物志云閩越有杉雞常居杉樹下頭上有長黃毛冠頰正青色如垂縷亦可食如竹雞肉氣味甘平無毒時珍曰按磨小説云崔魏公暴亡太醫梁新診之曰中食毒也僕曰好食竹雞新曰竹雞多食半夏苗也命搗薑汁抉齒灌之遂蘇則吳廷紹楊吉老之治鷓毒蓋祖乎此主治野雞病殺蟲煮炙食之藏器英雞拾遺集解藏器曰英雞出澤州有石英處常食碎石英狀如雞而雉尾體熱無毛腹下毛赤飛翔不遠腸中常有石英人食之取英之功也今人以石英末飼雞取卵食終不及此肉氣味甘溫無毒主治益陽道補虛損令人肥健悅澤能食不患冷常有實氣而不發也藏器秧雞食物集解時珍曰秧雞大如小雞白頰長嘴短尾背有白斑多居田澤畔夏至後夜鳴逹旦秋後即止一種䳾音鄧雞亦秧雞之類也大如雞而長腳紅冠雄者大而色褐雌者稍小而色斑秋月即無其聲甚大人益食之肉氣味甘溫無毒主治蟻瘻汪穎鶉嘉祐釋名時珍曰鶉性醇竄伏淺草無常居而有常匹隨地而安莊子所謂聖人鶉居是矣其行遇小草即旋避之亦可謂醇矣其子曰􅀈宗奭曰其卵初生謂之羅鶉至秋初謂之早秋中秋已後謂之白唐一物四名也集解禹錫曰鶉蝦蟇所化也楊億談苑云正道二年夏秋汴人鬻鶉者車載積市皆蛙所化猶冇未全變者列子所謂蛙聲為鶉也宗奭曰鶉有雌雄常於田野屢得其卵何得言化也時珍曰鶉大如雞雛頭細而無尾毛有斑點甚肥雄者足髙雌者足卑其性畏寒其在田野夜則羣飛晝則草伏人能以聲呼取之畜令鬬摶萬畢術云蝦蟇得瓜化為鶉交州記云南海有黃魚九月變為鶉以鹽炙食甚肥美蓋鶉始化成終以卵生故四時常有之鴽則始由鼠化終復為鼠故夏有冬無肉氣味甘平無毒禹錫曰四月以前未堪食不可合豬肝食令人生黑子合菌子食令人發痔主治補五臟益中續氣實筋骨耐寒暑消結熱和小豆生薑煮食止泄痢酥煎食令人下焦肥嘉祐小兒患疳及下痢五色旦旦食之有效冦宗奭發明時珍曰按董炳集驗方云魏秀才妻病腹大如鼓四肢骨立不能貼席惟衣被懸卧榖食不下者數日矣忽思鶉食如法進之遂運劇少頃雨汗莫能言但有更衣狀扶而圊小便突出白液凝如鵝脂如此數次下盡遂起此蓋中焦濕熱積久所致也詳本草鶉解熱結療小兒疳亦理固然也董氏所説如此時珍謹按鶉乃蛙化氣性相同蛙與蝦蟇皆解熱治疳利水消腫則鶉之消鼓脹蓋亦同功云鷃拾遺釋名鵪一作䳺鸋音寧鴽音如鳸時珍曰鷃不木處可謂安寧自如矣莊子所謂騰躍不過數仞下翔蓬蒿之間者也張華注禽經謂之籬鷃即此鵪則鷃音之轉也青州謂之鴾母亦曰鷃雀又鳸有九種此其一也集解藏器曰鷃是小鳥鶉類也一名鴽鄭玄注禮記雉兔鶉鷃以鷃為鴽人多食之時珍曰鷃候鳥也常晨鳴如雞趨民收麥行者以為候春秋運斗樞云立春雨水鶉鵪鳴是矣鵪與鶉兩物也形狀相似俱黑色但無斑者為鵪也今人總以鵪鶉名之按夏小正云三月田鼠化為鴽八月鴽化為田鼠注云鵪也爾雅云鶉子鴿鴽子鸋注云鵪鶉屬也鴽鵪也禮記云鶉羮鴽釀之以蓼注云鴽小不可為羮以酒蓼釀之蒸煮食也據數説則鶉與鵪為兩物明矣因其俱在田野而形狀倣佛故不知别之則夫鶉也始由蝦蟇海魚所化終即自卵生故有斑而四時常有焉鷃也始由鼠化終復為鼠故無斑而夏有冬無焉本原既殊性療當别何可混邪肉氣味甘平無毒主治諸瘡隂􅉶煮食去熱時珍鷸音述拾遺集解藏器曰鷸如鶉色蒼觜長在泥塗間作鷸鷸聲村民云田雞所化亦鵪鶉類也蘇秦所謂鷸蚌相持者即此時珍曰説文云鷸知天將兩則鳴故知天文者冠鷸今田野間有小鳥未雨則啼者是矣與翡翠同名而物異肉氣味甘溫無毒主治補虛甚暖人藏器鴿宋嘉祐釋名鵓鴿食療飛奴時珍曰鴿性淫而易合故名鵓者其聲也張九齡以鴿傳書目為飛奴梵書名迦布德迦集解宗奭曰鴿之毛色於禽中品第最多惟白鴿入藥凡鳥皆雄乘雌此獨雌乘雄故其性最淫時珍曰處處人家畜之亦有野鴿名品雖多大要毛羽不過青白皂緑鵲斑數色眼目有大小黃赤緑色而已亦與鳩為匹偶白鴿肉氣味鹹平無毒詵曰暖主治解主藥毒及人馬久患疥食之立愈嘉祐調精益氣治惡瘡疥癬風瘡白癜癧瘍風炒熟酒服雖益人食多恐減藥力孟詵附方舊一新一消渴飲水不知足用白花鴿一隻切作小片以上蘇煎含咽心鏡預解痘毒每至除夜以白鴿煮炙飼兒仍以毛煎湯浴之則出痘希少血主治解諸藥百蠱毒時珍廣出事林記卵主治解瘡毒痘毒時珍附方新一預解痘毒小兒食之永不出痘或出亦希用白鴿卵一對入竹筒封置厠中半月取出以卵白和辰砂三錢丸菉豆大每服三十丸三豆飲下毒從大小便出也灊江方屎名左盤龍時珍曰野鴿者尤良其屎皆左盤故宣明方謂之左盤龍也氣味辛溫微毒主治人馬疥瘡炒研傅之驢馬和草飼之嘉祐消腫及腹中痞塊汪穎消瘰癧諸瘡療破傷風及隂毒垂死者殺蟲時珍附方舊四新六帶下排膿宗奭野鴿糞一兩炒微焦白术麝香各一分赤芍藥青木香各半兩延胡索炒赤一兩柴胡三分為末溫無灰酒空心調服一錢候膿盡即止後服補子臟藥破傷中風病傳入裏用左蟠龍即野鴿糞江鰾白僵蠶各炒半錢雄黃一錢為末蒸餅丸梧子大每服十五丸溫酒下取效保命集隂症腹痛面青甚者鴿子糞一大抄研末極熱涸一鍾和勻澄清頓服即愈劉氏蛔蟲腹痛白鴿屎燒研飲和服之外臺冷氣心痛鴿屎燒存性酒服一錢即止項上瘰癧左盤龍炒研末飯和丸梧桐子大每服三五十丸米飲下張子和方頭癢生瘡白鴿屎五合醋煮三沸杵傅之日三上聖惠頭瘡白秃鴿屎研末傅之先以醋泔洗淨亦可燒研摻之同上反花瘡毒初生惡肉如米粒破之血出肉隨生反出于外用鵓鴿屎三兩炒黃為末溫漿水洗後傅之聖惠方鵝掌風鴿屎白雄雞屎炒研煎水日洗突厥雀拾遺釋名鵽鳩音奪冦雉藏器曰雀從北來當有賊下邊人候之故名時珍曰案唐書云髙宗時突厥犯塞有鳴鵽羣飛入塞邊人驚曰此鳥一名突厥雀南飛則突厥必入冦已而果然案此即爾雅鵽鳩冦雉也然則奪冦之義亦由此矣集解藏器曰突厥雀生塞北狀如雀而身赤時珍曰案郭璞云鵽鳩生北方沙漠池大如鴿形似雌雉鼠腳旡後趾岐尾為鳥憨急羣飛張華云鵽生關西飛則雌前雄後隨其行止莊周云青鵽愛其子而忘其母肉氣味甘熱無毒主治補虛暖中藏器雀别録中品釋名瓦雀賔雀時珍曰雀短尾小鳥也故字從小從佳佳音錐短尾也栖宿簷瓦之間馴近階除之際如賔客然故曰瓦雀賔雀又謂之嘉賔也俗呼老而斑者為麻雀小而黃口者為黃雀集解時珍曰雀處處有之羽毛斑褐頷觜皆黑頭如顆蒜目如擘椒尾長二寸許瓜距黃白色躍而不步其視驚瞿其目夜盲其卵有斑其性最淫小者名黃雀八九月羣飛田間體絶肥背有脂如披綿性味皆同可以炙食作鮓甚美案逸周書云季秋雀入大水為蛤雀不入水國多淫泆又臨海異物志云南海有黃雀魚常以六月化為黃雀十月入海為魚則所謂雀化蛤者蓋此類若家雀則未常變化也又有白雀緯書以為瑞應所感肉氣味甘溫無毒𢎞景曰雀肉不可合李食不可諸肝食妊婦食雀肉飲酒令子多淫食雀肉豆醬令子靣皯凡服白术人忌之主治冬三月食之起陽道令人有子藏器壯陽益氣暖腰膝縮小便治血崩帶下日華益精髓縮五臟不足氣宜常食之不可停輟孟詵發明宗奭曰正月以前十月以後宜食之取其隂陽靜定未泄也故卵亦取第一畨者頌曰今人取雀肉和蛇牀子熬膏和藥丸服補下有效謂之驛馬丸此法起于唐世云明皇服之有驗時珍曰聖濟總録治虛寒雀附丸用肥雀肉三四十枚同附子熬膏丸藥亦祖此意也附方新八補益老人治老人臟腑虛損羸瘦陽氣之弱雀兒五隻如常治粟米一合蔥白三莖先炒雀熟入酒一合煮少時入水二盞下蔥米作粥食食治方心氣勞傷朱雀湯治心氣勞傷因變諸疾用雄雀一隻取肉炙赤小豆一合人參赤茯苓大棗肉紫石英小麥各一兩紫苑遠志肉丹參各半兩甘草炙二錢半細銼拌勻每服三錢用水一盞煎六分去滓食遠溫服竒效方腎冷偏墜疝氣用生雀三枚燎毛去腸勿洗以舶上茴香三錢胡椒一錢縮砂桂肉各二錢入肚內濕紙褁煨熟空心服之酒下良直指方小腸疝氣用帶毛雀兒一枚去腸入金絲礬末五錢縫合以桑柴火煨成炭為末空心無灰酒服年深者二服愈瑞竹堂方赤白痢下臘月取雀兒去腸肚皮毛以巴豆仁一枚入肚內瓶固濟煆存性研末以好酒煮黃蠟百沸取蠟和丸梧子大每服一二十丸紅痢甘草湯下白痢乾薑湯下普濟方內外目障治目昏生翳遠視似有黑花及內障不見物用雀兒十箇去翅足觜連腸胃骨肉研爛磁石煆醋淬七次水飛神麴炒青鹽肉蓯蓉酒浸炙各一兩兔絲子酒浸三日晒三兩為末以酒二升少入煉蜜同雀鹽研膏和丸梧子大每溫酒下二十丸日二服聖惠方雀卵氣味酸溫無毒五月取之主治下氣男子隂痿不起強之令熱多精有子别録和天雄兔絲子末為丸空心酒下五丸治男子隂痿不起女子帶下便溺不利除疝瘕孟詵發明𢎞景曰雀利隂陽故卵亦然術云雀卵和天雄服之令莖不衰頌曰按素問云胸脅肢滿者妨於食病至則先聞臊臭出清液先唾血四肢清目眩時時前後血病名血枯得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來治之以烏鰂魚骨藘茹二物并合之丸以雀卵大如小豆以五丸為後飯飲鰂骨汁以利腸中及腸肝也飲後藥先為後飯本草三藥益不治血枯而經法用之是攻其所生所起耳時珍曰今人知雀卵能益男子陽虛不知能治女子血枯蓋雀卵益精血耳肝主治腎虛陽弱聖惠四雄丸用之頭血主治雀盲别録𢎞景曰雀盲乃人患黃昏時無所見如雀目夜盲也日二取血點之腦氣味平主治綿裹塞耳治聾又塗凍瘡孟詵時珍曰按張子和方臘月雀腦燒灰油調塗之亦可喙及腳脛骨主治小兒乳癖每用一具煮汁服或燒灰米飲調服時珍雄雀屎一名白丁香俗名青丹拾遺雀蘇炮炙論修治日華曰凡鳥左翼掩右者是雄其屎頭尖挺直斆曰凡使勿用雀兒糞雀兒口黃未經淫者也其雀蘇底坐尖在上是雄兩頭圓者是雌隂人使雄陽人使雌臘月采得去兩畔附著者鉢中研細以甘草水浸一夜去水焙乾用時珍曰别録止用雄雀屎雌雄分用則出自雷氏也氣味苦溫微毒主治療目痛決癰疽女子帶下溺不利除疝瘕别録療齲齒陶𢎞景和首生男子乳點目中弩肉赤脈貫童子者即消神效和蜜丸服治癥瘕久痼諸病和少乾薑服之大肥悅人蘇恭癰癤不潰者點塗即潰急黃欲死者湯化服之立蘇腹中痃癖諸塊伏梁者和乾薑桂心艾葉為丸服之能令消爛藏器和天雄乾薑丸服能強隂孟詵消積除脹通咽塞口噤女人乳腫瘡瘍中風風蟲牙痛發明時珍曰雀食諸穀易致消化故所治疝瘕積脹痃癖及目翳弩肉癰疽瘡癤咽噤齒齲諸症皆取其能消爛之義也附方舊六新八霍亂不通脹悶欲死因傷飽取涼者用雄雀糞二十一粒研末溫酒服未效再服總録目中翳膜治目熱生赤白膜以雄雀屎和人乳點上自爛肘后方風蟲牙痛雄雀屎綿褁塞孔中日二易之效外臺咽喉噤塞雄雀屎末溫水灌半錢外臺小兒口噤中風用雀屎水丸麻子大飲下二丸即愈千金方小兒不乳用雀屎四枚抹之與吮總微小兒痘黶白丁香末入麝少許米飲服一錢保幼大全婦人吹乳白丁香半兩為末以溫酒服一錢聖惠破傷風瘡作白痂無血者殺人最急以黃雀糞直者研末熱酒服半錢普濟破決癰癤諸癰已成膿懼針者取雀屎塗瘡頭即易決梅師方瘭瘡作痛用雀屎燕窠土研傅之直指浸淫瘡癬洗淨以雀屎醬瓣和研日塗之翼千金喉痺乳蛾白丁香二十個以沙糖和作三丸每以一丸綿褁含咽即時遂愈甚者不過一丸極有竒效普濟方面鼻酒皶白丁香十二粒蜜半兩早夜點久久自去聖惠方蒿雀拾遺集解藏器曰蒿雀似雀青黑色在蒿間塞外彌多食之美於諸雀肉氣味甘溫無毒主治食之益陽道補精髓藏器腦主治塗凍瘡手足不皸藏器巧婦鳥拾遺釋名鷦鷯詩疏桃蟲詩經蒙鳩荀子女匠方言黃脰草俗曰時珍按爾雅云桃蟲鷦其雌曰鳩揚雄方言云自關而東謂之巧雀或謂之女匠自關而西謂之襪雀或謂之巧女燕人謂之巧婦江東謂之桃雀亦曰有呼鳩性拙鷦性巧故得諸名集解藏器曰巧婦小於雀在林藪間為窠窠如小袋時珍曰鷦鷯處處有之生蒿木之間居藩籬之上狀似黃雀而小灰色有斑聲如吹噓喙如利錐取茅葦毛毳為窠大如雞卵而繫之以麻髮至為精密懸於樹上或一房二房故曰巢林不過一枝每食不過數粒小人畜馴教其作戲也又一種鷦鷯爾雅謂之剖葦似雀而青灰斑色長尾好食葦蠧亦憔類也肉氣味甘溫無毒主治炙食甚美令人聰明汪頴窠主治燒煙熏手令婦人巧蠶藏器治膈氣噎疾以一枚燒灰酒服或一服三錢時珍簡出衛生易方燕别録中品釋名乙鳥説文玄鳥禮記鷙鳥古今注鷾鴯莊子遊波泡炙論天女易占時珍曰燕字篆文象形乙者其鳴自呼也玄其色也鷹鷂食之則死能制海東青鶻故有鷙鳥之稱能興波祈雨故有遊波之號雷斆云海蝎江枯投遊波而立汛是矣京房云人見白燕主生貴女故燕名天女集解别録曰燕生髙山平谷𢎞景曰燕有兩種紫胸輕小者是越燕不入藥用有斑黑而聲大者是胡燕可入藥用胡燕作窠長能容二匹絹者令人家富也若窠戶北向而尾屈色白者是數百歲燕仙經謂之肉芝食之延年時珍曰燕大如雀而身長籋口豐頷布翅岐尾背飛向宿營巢避戊巳日春社來秋社去其來也銜泥巢於屋宇之下其去也伏氣蟄於窟穴之中或謂其渡海者謬談也玄鳥至時祈髙禖可以求嗣或以為吞燕卵而生子者怪説也或云燕蟄於井底燕不入屋井虛也燕巢有艾則不居凡狐貉皮毛見燕則毛脫物理使然肉氣味酸平有毒𢎞景曰燕肉不可食損人神氣入水為蛟龍所吞亦不宜殺之時珍曰淮南子言燕入水為蜃蛤故髙諉注謂蛟龍嗜燕人食燕者不可入水而祈禱家用燕召龍切謂燕乃蟄而不化者化蛤之説未審然否但燕肉既有毒自不必食之主治出痔蟲瘡蟲别録胡燕卵黃主治卒水浮腫每吞十枚别録秦燕毛主治解諸藥毒取二七枚燒灰水服時珍屎氣味辛平有毒主治蟲毒鬼疰逐不祥邪氣破五癃利小便熬香用之别録頌曰胡洽治症病青羊脂丸中用之療痔殺蟲去目翳蘇恭治口瘡瘧疾孫思邈作湯浴小兒驚癎𢎞景附方舊三新三解蠱毒藏器曰取燕屎三合炒獨蒜去皮十枚和搗丸梧子大每服三丸蠱當隨利而出厭瘧疾藏器曰燕屎方寸匕發日平旦和酒一升令病人兩手捧住吸氣慎勿入口害人下石淋用燕屎末以冷水服五錢旦服至食時當尿石水下通小便用燕屎豆䜴各一合糊丸梧子大每白湯下三丸日三服千金止牙痛用燕子屎丸梧桐子大於疼處咬之丸化即疼止袖珍小兒卒驚似有痛處而不知用燕窠中糞煎湯洗浴之救急方窠中土見土部燕蓐草即窠草見草部之九石燕日華釋名土燕綱目集解詵曰石燕在乳穴石洞中者冬月采之堪食餘月止可治病炳曰石燕似蝙蝠口方食石乳汁時珍曰此非石部之石燕也廣志云燕有三種此則土燕乳于巖穴者是矣肉氣味甘暖無毒主治壯陽暖腰膝添精補髓益氣潤皮膚縮小便禦風寒嵐瘴溫疫氣日華詵曰治法取石燕二七枚和五味炒熟以酒一斗浸三日每夜卧時飲一二盞甚能補益令人健力能食伏翼本經上品校正時珍曰本經上品有伏翼條又有天鼠屎今依李當之本草合而為一釋名蝙蝠音編福天鼠本經仙鼠唐本飛鼠宋本夜燕恭曰伏翼者以其晝伏有翼也時珍曰伏翼爾雅作服翼齊人呼為仙鼠仙經列為肉芝集解别録曰伏翼生太山川谷及人家屋間立夏後采隂乾天鼠屎生合浦山谷十一月十二月采𢎞景曰伏翼非白色倒懸者不可服恭曰伏翼即仙鼠也在山孔中食諸乳石精汁皆千歲純白如雪頭上有冠大如鳩鵲隂乾服之令人肥健長生夀千歲其大如鶉未白者已百歲而並倒懸其腦重也其屎皆白色入藥當用此屎頌曰恭説乃仙經所謂肉芝者然今蝙蝠多生古屋中白而太者蓋稀其屎亦有白色料其出乳石孔者當應如此耳宗奭曰伏翼日亦能飛但畏鷙鳥不敢出耳此物善服氣故能夀冬月不食可知矣時珍曰伏翼形似鼠灰黑色有薄肉翅連合四足及尾如一夏出冬蟄日伏夜飛食蚊蚋自能生育或云鼉虱化蝠鼠亦化蝠蝠又化魁蛤恐不盡然生乳穴者甚大或云燕避戊巳蝠伏庚申此理之不可曉者也若夫白色者自有此種爾仙經以為千百歲服之令人不死者乃方士誑言也陶氏蘇氏從而信之迂矣按李石續博物志云唐陳子真得白蝙蝠大如鴉服之一夕大泄而死又宋劉亮得白蝙蝠白蟾蛤仙丹服之立死嗚呼書此足以破惑矣其説始載於抱朴子書葛洪誤世之罪通乎天下又唐書云吐畨有天鼠狀如雀大如貓皮可為裘此則别是一種鼠非此天鼠也伏翼修治斆曰凡使要重一斤者先拭去肉上毛及去瓜腸留肉翅并嘴腳以好酒浸一宿取出以黃精自然汁五兩塗炙至盡炙乾用時珍曰近世用者多煆存性耳氣味鹹平無毒日華曰微熱有毒之才曰莧實雲實為之使主治目瞑癢痛明目夜視有精光久服令人熹樂媚好無憂本經日華曰久服解愁療五淋利水道别録主女人生子餘疾帶下病無子蘇恭治久咳上氣久瘧瘰癧金瘡內漏小兒鬾病驚風時珍藏器曰五月五日取倒懸者晒乾和桂心薰陸香燒煙辟蚊子夜明砂鱉甲為末燒煙亦辟蚊發明時珍曰蝙蝠性能瀉人故陳子真等服之皆致死觀後治金瘡方皆玫下利其毒可知本經謂其無毒久服熹樂無憂日華云久服解愁者皆誤後世之言適足以增憂益愁而已治病可也服食不可也附方舊三新八仙乳丸治上焦熱晝常好瞑用伏翼五兩重一枚連腸骨炙燥雲實炒五兩威靈仙三兩牽牛炒莧實各二兩丹砂鉛丹各一兩膩粉半兩為末蜜丸緑豆大每服七丸木通湯下以知為度普濟久咳上氣十年二十年諸藥不效用蝙蝠除翅足燒焦研末米飲服之百一方久瘧不止范汪方用蝙蝠七個去頭翅足搗千下丸梧子大每服一丸清湯下雞鳴時一丸禺中一丸久瘧不止伏翼丸用蝙蝠一枚炙蛇蛻皮一條燒蜘蛛一枚去足炙鱉甲一枚醋炙麝香半錢為末五月五日午時研勻入煉蜜和丸麻子大每溫酒下五丸聖惠方小兒驚癎用入蟄蝙蝠一個入成塊硃砂三錢在腹內以新瓦合煆存性候冷為末空心分四服兒小分五服白湯下成醫學集小兒慢驚返魂丹治小兒慢驚及天弔夜啼用蝙蝠一枚去腸翅炙黃焦人中白乾蠍焙麝香各一分為末煉蜜丸緑豆大每服乳汁下三丸聖惠方多年瘰癧不愈神效方用蝙蝠一個貓頭一個俱撒上黑豆燒至骨化為末摻之乾即油調傅內服連翹湯集要金瘡出血不止成內漏用蝙蝠二枚燒末水服方寸匕當下水而血消也鬼遺方腋下胡臭用蝙蝠一個以赤石脂末半兩塗遍黃泥包固晒乾煆存性以田螺水調塗腋下待毒氣上沖急服下藥行一二次妙乾坤袐韞乾血氣痛蝙蝠一箇燒存性每酒服一錢即愈生生編婦人斷産蝙蝠一個燒研以五朝酒酵調下摘玄方腦主治塗面去女子面皰服之令人不忘藏器血及膽主治滴目令人不睡夜中見物藏器𢎞景曰伏翼自及膽術家用為洞視法天鼠屎本經釋名鼠法本經石肝同上夜明砂日華黑砂星𢎞景曰方家不用俗不識也李當之曰即伏翼屎也方言名天鼠爾修治時珍曰凡采得以水淘去灰土惡氣取細砂晒乾焙用其砂乃蚊蚋眼也氣味辛寒無毒之才曰惡白斂白微主治面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸本經去面上黑皯别録燒灰酒服方寸匕下死胎蘇恭炒服治瘰癧日華治馬撲損痛以三枚投熱酒一升取清服立止數便瘥蘇頌出續傳信方搗熬為末拌飯與三歲小兒食之治無辜病甚驗慎微治疳有效宗奭治目盲障翳明目除瘧時珍發明時珍曰夜明砂及蝙蝠皆厥隂肝經血分藥也能活血消積故所治目翳盲障瘧鬾疳驚淋帶瘰癧癰腫皆厥隂之病也按類説云定海徐道亨患赤眼食蟹遂成內障五年忽夢一僧以藥水洗之令服羊肝丸求其方僧曰用洗淨夜明砂當歸蟬蛻木賊去節各一兩為末黑羊肝四兩水煮爛和丸梧子大食後熟水下五十丸如法服之遂復明也附方舊一一新十內外障翳夜明砂末北入豬肝內煮食飲汁效直指方青盲不見夜明砂糯米炒黃一兩柏葉炙一兩為末牛膽汁和丸梧子大每夜卧時竹葉湯下二十丸至五更米飲下二十丸瘥乃止聖惠小兒雀目夜明砂炒研豬膽汁和丸緑豆大每米飲下五丸一方加黃芩等分為末米泔煮豬肝取汁調服半錢五瘧不止聖惠用夜明砂末每冷茶服一錢立效硃又方治瘧發作無時經久不瘥用蝙蝠糞五十粒砂半兩麝香一錢為末糯米飯丸小豆大未發時白湯下十丸胎前瘧疾夜明砂末三錢空心溫酒服經驗祕方咳嗽不止蝙蝠去翅足燒酒為末一錢食後白湯下壽域神方小兒鬾病以紅紗袋盛夜明砂佩之方直指一切疳毒夜明砂五錢入瓦瓶內以精豬肉三兩薄切入瓶內水煮熟了前以肉與兒食飲其汁取下服中胎毒次用生薑四兩和皮切炒同黃連末一兩糊丸黍米大米飲服日三次心全幼鑑聤耳出汁夜明砂二錢麝香一字為末拭淨摻之聖惠潰腫排膿夜明砂一兩桂半兩乳香一分為末入乾砂糖半兩井水調傅直指方腋下胡臭夜明砂末䜴汁調風蚛牙痛夜明砂炒吳茱茰湯泡炒等分為末蟾酥和九麻子大綿褁二丸含之吐延方普濟鸓鼠纍壘二音本經下品校正鼺鼠原在獸部今據爾雅説文移入禽部釋名鼺鼠本經鼯鼠爾雅耳鼠山海經夷由爾雅鵜禽經飛生鳥𢎞景時珍曰案許慎説文云鸓飛走且乳之鳥也故字從鳥又名飛生本經從鼠以形似也此物肉翹連尾飛不能上易至礧墜故謂之鸓俗謂癡物為鸓義取乎此亦名鼯鼠與螻蛄同名集解别録曰鼺鼠生山都平谷𢎞景曰此鼠即鼯鼠飛生鳥也狀如蝙蝠大如鴟鳶毛紫色暗夜行飛人取其皮毛與産婦持之令易生頌曰今湖嶺山中多有之南人見之多以為怪宗奭曰關西山中甚有毛極密俱向下飛不能致逺人捕取皮為暖帽時珍曰案郭氏注爾雅云鼯鼠狀如小狐似蝙蝠肉翅四足翅尾項脅毛皆紫赤色背上蒼艾色腹下黃色喙頷雜白色腳短瓜長尾長三尺許飛而乳子子即隨母後聲如人呼食火煙能從髙赴下不能從下上髙性喜夜鳴山海經云耳鼠狀如鼠兔首麋耳以其尾飛食之不眯可禦百毒即此也其形翅聯四足及尾與蝠同故曰以尾飛生嶺南者好食龍眼氣味微溫有毒主治墮胎令易産本經發明頌曰人取其皮毛與産婦臨蓐時持之令兒易生而小品方乃入服藥用飛生一枚槐子故弩箭羽各十四枚合搗丸梧子大以酒服二丸即易産也時珍曰鸓能飛而且産故寢其皮懷其爪皆能催生其性相感也濟生方治難産金液丸用其腹下毛為丸服之寒號蟲宋開寶校正自蟲部入此釋名鶡鴠獨舂屎名五靈脂時珍曰楊氏丹鉛録謂寒號蟲即鶡鵈今從之鶡鴠詩作盍旦禮作曷旦説文作䳚鴠廣志作侃旦唐詩作渴旦皆隨義借名耳楊雄方言云自關而西謂之鶡鴠自關而東謂之城旦亦曰倒懸周魏宋楚謂之獨舂郭璞云鶡鴠夜鳴求旦之鳥夏月毛盛冬月雜體晝夜鳴呌故曰寒號曰鶡旦古刑有城旦春謂晝夜舂米也故又有城旦獨舂之名月令云仲冬曷旦不鳴蓋冬至陽生漸暖故也其屎名五靈脂者謂狀如凝脂而受五行之靈氣也集解志曰五靈脂出北地寒號蟲糞也禹錫曰寒號蟲四足有肉翅不能逺飛頌曰今惟河東州郡有之五靈脂色黑如鐵采無時時珍曰曷旦乃候時之鳥也五臺諸山甚多其狀如小雞四足有肉翅夏月毛采五色自鳴若曰鳯凰不如我至冬毛落如鳥雛忍寒而號曰得過且過其屎恆集一處氣甚臊惡粒大如豆采之有如糊者有粘塊如糖者人亦以沙石雜而貨之凡用以糖心潤澤者為真肉氣味甘溫無毒主治食之補益人汪頴五靈脂修治頌曰此物多夾沙石絶難修治凡用研為細末以酒飛去沙石晒乾收用氣味甘溫無毒惡人參損人主治心腹冷氣小兒五疳辟疫治腸風通利氣脈女子血閉開寶療傷冷積蘇頌凡血崩過多者半炒半生酒服能行血止血治血氣刺痛甚效震亨止婦人經水過多赤帶不絶胎前産後血氣諸痛男女一切心腹脅肋少腹諸痛疝痛血痢腸風腹痛身體血痺刺痛肝瘧發寒熱反胃消渴及痰涎挾血成窠血貫瞳子血凝齒痛重舌小兒驚風五癎癲疾殺蟲解藥毒及蛇蠍蜈蚣傷時珍發明宗奭曰五靈脂引經有功不能生血此物入肝最速也常有人病目中翳往來不定此乃血所病也肝受血則能視目病不治血為背理也用五靈脂之藥而愈又有人被毒蛇所傷良久昏憒一老僧以酒調藥二錢灌之遂蘇仍以滓傅咬處少頃復灌二錢其苦皆去問之乃五靈脂一兩雄黃半兩同為末耳其后有中蛇毒者用之咸效時珍曰五靈脂足厥隂肝經藥也氣味俱厚隂中之隂故入血分肝主血諸痛皆屬于木諸蟲皆生于風故此藥能治血病散血和血而止諸痛治驚癎除瘧痢消積化痰療疳殺蟲治血痺血眼諸症皆屬肝經也失笑散不獨治婦人心痛血痛凡男女老幼一切心腹脅肋少腹痛疝氣并胎前産後血氣作痛及血崩經溢百藥不效者俱能奏功屢用屢驗真近世神方也又案李仲南云五靈脂治崩中非止治血之藥乃去風之劑風動物也衝任經虛被風傷襲營血以致崩中暴下與荆芥防風治崩義同方悟古人識見深奧如此此亦一説但未及肝血虛滯亦有生風之意附方舊六新三十一失笑散治男女老少心痛腹痛少腹痛小腸疝氣諸藥不效者能行能止婦人妊娠心痛及産後心痛少腹痛血氣痛尤妙用五靈脂蒲黃等分研末先以醋二杯調末熬成膏入水一盞煎至七分連藥熱服未止再服一方以酒代醋一方以醋糊和丸童尿酒服和劑局方紫金丸治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食又治久有瘀血月水不調黃瘦不食亦療心痛功與失笑散同以五靈脂水淘淨炒末一兩以好米醋調希慢火熬膏入真蒲黃末和丸龍眼大每服一丸以水與童子小便各半盞煎至七分溫服少頃再服惡露即下血塊經閉者酒磨服之楊氏産乳靈脂散治丈夫脾積氣痛婦人血崩諸痛飛過五靈脂炒煙盡研末每服一錢溫酒調下此藥氣惡難喫燒存性乃妙也或以酒水童便煎服名抽刀散治産后心腹脅肋腰胯痛能散惡血如心煩口渴者加炒蒲黃減半霹靂酒下腸風下血者煎烏梅柏葉湯下中風麻痺痛者加草烏半錢同童尿水酒煎服永類鈐方産后血運治産婦血運不知人事用五靈脂二兩半生半炒為末每服一錢白水調下如口噤者斡開灌之入喉即愈圖經産后腹痛五靈脂香附桃仁等分研末醋糊丸服一百丸或用五靈脂末神麴糊丸白术陳皮湯下丹溪方兒枕作痛五靈脂慢炒研末酒服二錢産寶血氣刺痛五靈脂生研三錢酒一盞煎沸熱服靈苑方卒暴心痛五靈脂炒一錢半乾薑炮三分為末熱酒服立愈事林廣記心脾蟲痛不拘男女用五靈脂檳榔等分為末水煎石菖蒲調服三錢作餅豬肉一二丸海上仙方小兒蛔痛五靈脂末二錢靈礬火飛半錢每服一錢水一盞煎五分溫服當吐蟲出愈閻孝忠集效方經血不止五靈脂炒煙盡研每服二錢當歸兩片酒一盞煎六分熱服三五度取效經效方血崩不止頌曰用五靈脂十兩研末水五碗煎三碗去滓澄清再煎為膏入神麴末二兩和丸梧子大每服二十丸空心溫酒下便止極效服集要用五靈脂燒研以鐵杵錘燒紅淬酒調以效為度胎衣不下惡血沖心用五靈脂半生半炒研末每服二錢溫酒下産寶子腸脫出五靈脂燒煙薰之先以鹽湯洗淨危氏吐血嘔血五靈脂一兩盧會三錢研末滴水丸芡子大每漿水化服二丸黃又治血妄行入胃吐不止五靈脂一兩茋半兩為末新汲水服二錢吐逆不止不拘男女連日粥飲湯藥不能下者即效五靈脂治淨為末狗膽汁和丸芡子大每服二丸煎生薑酒磨化猛口熱吞不得潄口急將溫粥少許壓之經驗化食消氣五靈脂一兩木香半兩巴豆四十枚煨熟去油為末糊丸菉豆大每白湯下五丸普濟方久瘧不止或一日二發或一日二三發或二三日一發用五靈脂頭垢各一錢古城石灰二錢研末飰丸皂子大每服一丸五更無根水下即止神效方也海上消渴飲水竹籠散用五靈脂黑豆去皮等分為末每服三錢冬瓜皮湯下無皮用葉亦可日二服不可更服熱藥宜八味丸去附子加五味子若小渴者二三服即止保命集中風癱緩追魂散即五靈脂研末以水飛去上靣黑濁下靣沙石研末每服二錢熱酒調下日一服細服小續命湯竒效方手足冷麻冦曰風冷氣血閉手足身體疼痛冷麻五靈脂二兩沒藥一兩乳香半兩川烏頭一兩半炮去皮為术滴水丸如彈子大每用一丸生薑溫酒磨服本草衍義骨折腫痛五靈脂白及各一兩乳香沒藥各三錢為末熟水同香油調塗患處乾坤袐韞損傷接骨五靈脂一兩茴香一錢為末先以乳香末于極痛處傅上以小黃米粥塗之乃摻二末于粥上帛褁木牌子夾定三五日效儒門事親五疳潮熱肚脹髮焦不可用大黃黃芩損傷胃氣恐生别症五靈脂水飛一兩胡黃連五錢為末雄豬膽汁丸香米大每服一二十丸米飲下鑑全幼心咳嗽肺脹皺肺丸用五靈脂二兩胡桃仁八個柏子仁半兩研勻滴水和丸小豆大每服二十丸甘草湯下普濟痰血凝結紫芝丸用五靈脂水飛半夏湯泡等分為末薑汁浸蒸餅丸梧子大每飲下二十丸百一方酒積黃腫五靈脂末一兩入麝香少許飯丸小豆大每米飲下一丸普濟方目生浮翳五靈脂海螵蛸各等分為細末熟豬肝日蘸食經明目驗方重舌脹痛五靈脂一兩淘淨為末煎米醋漱經驗良方惡血齒痛五靈脂末米醋煎汁含咽直指方血痣潰血一人舊有一痣偶抓破血出一線七日不止欲死或用五靈脂末摻上即止也楊拱醫方選要血潰怪病凡人目中白珠渾黑而物如常毛髮堅直如鐵條能飲食而不語如醉名曰血潰以五靈脂為末湯服二錢即愈夏子益竒疾方大風瘡癩油調五靈脂末塗之摘玄方蟲虺螫􅀢凡蜈蚣蛇蠍毒蟲傷以五靈脂末塗之立愈玄金匱鈎毒蛇傷螫同上本草綱目卷四十八
