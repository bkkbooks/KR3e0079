body:
  text: 本草綱目卷十七下明李時珍撰草之六毒草類三十種天雄本經下品釋名白幕本經時珍曰天雄乃種附子而生出或變出其形長而不生子故曰天雄其長而尖者謂之天錐象形也集解别録曰天雄生少室山谷二月采根隂乾𢎞景曰今采用八月中旬天雄似附子細而長乃至三四寸許此與烏頭附子三種本出建平故謂之三建今宜都佷山者最好謂為西建錢塘間者謂為東建氣力小弱不相似故曰西水猶勝東白也其用灰殺之時有水強者不佳恭曰天雄附子烏頭並以蜀道綿州龍州出者佳餘處縱有力弱不相似陶以三物俱出建平故名之者非也烏頭苗名堇音靳爾雅云芨堇草是也今訛堇為建遂以建平譯之矣承曰天雄諸説悉備但始種而不生附子側子經年獨長大者是也蜀人種之尤忌生此以為不利如養蠶而成白殭之意時珍曰天雄有二種一種是蜀人種附子而生出長者或種附子而盡變成長者即如種芋形狀不一之類一種是他處草烏頭之類自生成者故别録注烏喙云長三寸已上者為天雄是也入藥須用蜀産曽經釀制者或云須重二兩半有象眼者乃佳餘見附子下修治斆曰宜炮皴去皮尖底用或隂制如附子法亦得大明曰凡丸散炮去皮用飲藥即和皮生使甚佳時珍曰熟用一法每十兩以酒浸七日掘土坑用炭半稱煆赤去火以醋二升沃之候乾乘熱入天雄在內小盆合一夜取出去臍用之氣味辛溫有大毒别録曰甘大溫權曰大熱宜乾薑制之之才曰逺志為之使惡腐婢忌豉汁主治大風寒濕痺厯節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行本經療頭面風去來疼痛心腹結聚關節重不能行步除骨間痛長隂氣強志令人武勇力作不倦别録禹錫曰按淮南子云天雄雄雞志氣益注云取天雄一枚納雄雞腸中搗食之令人勇治風痰冷痺軟腳毒風能止氣喘促急殺禽蟲毒甄權治一切風一切氣助陽道暖水臟補腰膝益精明目通九竅利皮膚調血脈四肢不遂下胸膈水破痃癖癰結排膿止痛續骨消瘀血背脊傴僂霍亂轉筋發汗止隂汗炮含治喉痺大明發明宗奭曰補虛寒須用附子風家多用天雄亦取其大者以其尖角多熱性不肯就下故取其敷散也元素曰非天雄不能補上焦之陽虛震亨曰天雄烏頭氣壯形偉可為下部之佐時珍曰烏附天雄皆是補下焦命門陽虛之藥補下所以益上也若是上焦陽虛即屬心脾之分當用參茋不當用天雄也且烏附天雄之尖皆是向下生者其氣下行其臍乃向上生苗之處寇宗奭言其不肯就下張元素言其補上焦陽虛皆是誤認尖為上爾惟朱震亨以為下部之佐者得之而未發出此義雷斆炮炙論序云咳逆數數酒服熟雄謂以天雄炮研酒服一錢也附方新三三建湯治元陽素虛寒邪外攻手足厥冷大小便滑數小便白渾六脈沉微除固冷扶元氣及傷寒隂毒用烏頭附子天雄並炮裂去皮臍等分㕮咀每服四錢水二盞薑十五片煎八分溫服方肘後男子失精天雄三兩炮白术八兩桂枝六兩龍骨三兩為散每酒服半錢張仲景金匱要略大風惡癩三月四月采天雄烏頭苗及根去土勿洗搗汁漬細粒黑豆摩去皮不落者一夜取出晒乾又浸如此七次初吞三枚漸加至六七枚禁房室豬魚雞蒜犯之即死側子别録下品釋名萴子時珍曰生于附子之側故名許慎説文作萴子集解𢎞景曰此附子邉角之大者削取之昔時不用比來醫家以療腳氣多驗恭曰側子附子皆是烏頭下旁出者以小者為側子大者為附子今以附子角為側子理必不然若當陽以下江左山南嵩髙齊魯間附子時復有角如大豆許夔州以上劍南所出者附子之角但如黍粟豈可充用比來都下皆用細附子有效未嘗取角也保升曰今附子邉果有角如大棗核及檳榔以來者形狀自是一顆且不小乃烏頭旁出附子附子旁出側子甚明時珍曰側子乃附子旁粘連小者爾故吳普陶𢎞景皆指為附子角之大者其又小於側子者即漏藍子矣故楊氏附子記言側子漏籃園人皆不重之以乞役夫修治同附子氣味辛大熱有大毒普曰神農岐伯有大毒八月采畏惡與附子同主治癰腫風痺厯節腰腳疼冷寒熱鼠瘻又墮胎别録療腳氣冷風濕痺大風筋骨攣急甄權冷酒調服治遍身風疹神妙雷斆發明機曰烏頭乃原生之腦得母之氣守而不移居乎中者也側子散生旁側體無定在其氣輕揚宜其發散四肢充達皮毛為治風之藥天雄長而尖其氣親上宜其補上焦之陽虛木鱉子則餘氣所結其形催殘宜其不入湯服令人喪目也時珍曰唐元希聲侍郎治癱瘓風有側子湯見外臺祕要藥多不録漏藍子綱目釋名木鱉子炮炙論虎掌日華時珍曰此乃附子之瑣細未成者小而漏藍故名南星之最小者名虎掌此物類之故亦同名大明會典載四川成都府嵗貢天雄二十對附子五十對烏頭五十對漏藍二十斤不知何用氣味苦辛有毒教曰服之令人喪目主治惡痢冷漏瘡惡瘡癘風時珍發明時珍曰按楊士瀛直指方云凡漏瘡年久者復其元陽當用漏藍子輩加減用之如不當用而輕用之又恐熱氣乘虛變移結核而為害尤甚也又按類編云一人兩足生瘡臭潰難近夜宿五夫人祠下夢神授方用漏藍子一枚生研為末入膩粉少許井水調塗依法治之果愈蓋此物不堪服餌止宜入瘡科也附方新一一切惡痢雜下及休息痢百嵗丸用漏藍子一箇大者阿膠木香黃連罌粟殼各半兩俱炒焦存性入乳香少許為末糊丸梧子大每一嵗一丸米飲下羅天益衛生寶鑑烏頭本經下品校正併入拾遺獨白草釋名烏喙本經即兩頭尖草烏頭綱目土附子日華奚毒本經耿子吳普毒公吳普又名帝秋金鴉綱目苗茗茛音艮芨音及堇音近獨白草拾遺鴛鴦菊綱目汁煎名射罔普曰烏頭形如烏之頭也有兩歧相合如烏之喙者名曰烏喙喙即烏之口也恭曰烏喙即烏頭異名也此有三歧者然兩歧者少若烏頭兩歧名烏喙則天雄附子之兩歧者復何以名之時珍曰此即烏頭之野生於他處者俗為之草烏頭亦曰竹節烏頭出江北者曰淮烏頭日華子所謂土附子者是也烏喙即偶生兩歧者今俗呼為兩頭尖因形而名其實乃一物也附子天雄之偶生兩歧者亦謂之烏喙功亦同于天雄非此烏頭也蘇恭不知此義故反疑之草烏頭取汁晒為毒藥射禽獸故有射罔之稱後魏書言遼東塞外秋收烏頭為毒藥射禽獸陳藏器所引續漢五行志言西國生獨白草煎為藥敷箭射人即死者皆此烏頭非川烏頭也菊譜云鴛鴦菊即烏喙苗也集解别録曰烏頭烏喙生朗陵山谷正月二月采隂乾長三寸以上者為天雄普曰正月始生葉厚莖方中空葉四四相當與蒿相似𢎞景曰今采用四月亦以八月采搗笮莖汁日煎為射罔獵人以傅箭射禽獸十步即倒中人亦死宜速解之朗陵屬汝南郡大明曰土附子生去皮搗濾汁澄清旋添晒乾取膏名為射罔以作毒箭時珍曰處處有之根苗花實並與川烏頭相同但此係野生又無釀造之法其根外黑內白皺而枯燥為異爾然毒則甚焉段成式酉陽雜俎言雀芋狀如雀頭置乾地反濕濕地反乾飛鳥觸之墮走獸遇之僵似亦草烏之類而毒更甚也又言建寧郡烏勾山有牧靡草鳥鵲誤食烏喙中毒必急食此草以解之牧靡不知何藥也修治時珍曰草烏頭或生用或炮用或以烏大豆同煮熟去其毒用烏頭氣味辛溫有大毒别録曰甘大熱大毒普曰神農雷公桐君黃帝甘有毒權曰苦辛大熱有大毒大明曰味蘞辛熱有毒之才曰莽草逺志為之使反半夏栝樓貝母白斂白芨惡藜蘆時珍曰伏丹砂砒石忌䜴汁畏飴糖黑豆冷水能解其毒主治中風惡風洗洗出汗除寒濕痺咳逆上氣破積聚寒熱其汁煎之名射罔殺禽獸本經消胸上痰冷食不下心腹冷痰臍間痛不可俯仰目中痛不可久視又墮胎别録主惡風憎寒冷痰包心腸腹㽱痛痃癖氣塊齒痛益陽事強志甄權治頭風喉痺癰腫疔毒時珍烏喙一名兩頭尖氣味辛微溫有大毒普曰神農雷公桐君黃帝有毒權曰苦辛大熱畏惡同烏頭主治風濕丈夫腎濕隂寒癢寒熱厯節掣引腰痛不能行步癰腫膿結又墮胎别録男子腎氣衰弱隂汗瘰癧嵗月不消甄權主大風頑痺時珍射罔氣味苦有大毒之才曰溫大明曰人中射罔毒以甘草藍汁小豆葉浮萍冷水薺苨皆可一味禦之主治尸疰癥堅及頭中風痺别録瘻瘡瘡根結核瘰癧毒腫及蛇咬先取塗肉四畔漸漸近瘡習習逐病至骨瘡有熱膿及黃水塗之若無膿水有生血及新傷破即不可塗立殺人藏器發明時珍曰草烏頭射罔乃至毒之藥非若川烏頭附子人所栽種加以釀制殺其毒性之比自非風頑急疾不可輕投甄權藥性論言其益陽事治男子腎氣衰弱者未可遽然也此類止能搜風勝濕開頑痰治頑瘡以毒攻毒而已豈有川烏頭附子補右腎命門之功哉吾蘄郝知府自負知醫因病風癬服草烏頭木鱉子藥過多甫入腹而麻痺遂至不救可不慎乎機曰烏喙形如烏嘴其氣鋒鋭宜其通經絡利關節尋蹊達徑而直抵病所煎為射罔能殺禽獸非氣之鋒鋭捷利能如是乎楊清叟曰凡風寒濕痺骨內冷痛及損傷入骨年久發痛或一切隂疽腫毒並宜草烏頭南星等分少加肉桂為末薑汁熱酒調塗未破者能內消久潰者能去黑爛二藥性味辛烈能破惡塊逐寒熱遇冷即消遇熱即潰附方舊四新四十八隂毒傷寒生草烏頭為末以蔥頭蘸藥納穀道中名提盆散王海藏隂證略例二便不通即上方名霹靂箭中風癱瘓手足顫掉言語蹇澀左經丸用草烏頭炮去皮四兩川烏頭炮去皮二兩乳香沒藥各一兩為末生烏豆一升以斑蝥三七箇去頭翅同煮豆熟去蝥取豆焙乾為末和勻以醋麵糊丸梧子大每服三十丸溫酒下簡易方癱瘓頑風骨節疼痛下元虛冷諸風痔漏下血一切風瘡草烏頭川烏頭兩頭尖各三錢硫黃麝香丁香各一錢木鱉子五箇為末以熟蘄艾揉軟合成一處用鈔紙包褁燒熏病處名雷丸孫天仁集效方諸風不遂宋氏集驗方用生草烏頭晚蠶沙等分為末取生地龍搗和入少醋糊丸梧子大每服四五丸白湯下甚妙勿多服恐麻人名鄂渚小金丹經驗濟世方用草烏頭四兩去皮大豆半升鹽一兩同以沙瓶煮三伏時去豆將烏頭入木臼搗三百杵作餅焙乾為末酒糊丸梧子大每空心鹽湯下十丸名至寶丹一切頑風神應丹用生草烏頭生天麻各洗等分擂爛絞汁傾盆中砌一小坑其下燒火將盆放坑上每日用竹片攪一次夜則露之晒至成膏作成小鋌子每一鋌分作三服用蔥薑自然汁和好酒熱服乾坤祕韞一切風證不問頭風痛風黃鴉吊腳風痺生淮烏頭一斤生川烏頭一枚生附子一枚並為末蔥一斤薑一斤擂如泥和作餅子以草鋪盤內加楮葉於上安餅於葉上又鋪草葉蓋之待出汗黃一日夜乃晒之舂為末以生薑取汁煮麵糊和丸梧子大初服三十丸日二服服後身痺汗出即愈避風乾坤祕韞破傷風病夀域方用草烏頭為末每以一二分溫酒服之出汗冷儒門事親方用草烏尖白芷并生研末每服半錢酒一盞入蔥白一根同煎服少頃以蔥白熱粥投之汗出即愈年久麻痺或厯節走氣疼痛不仁不拘男女神授散用草烏頭半斤去皮為末以袋一箇盛豆腐半袋入烏末在內再將豆腐填滿壓乾入鍋中煮一夜其藥即堅如石取出晒乾為末每服五分冷風濕氣以生薑湯下麻木不仁以蔥白湯下之活人心統風濕痺木黑神丸草烏頭連皮生研五靈脂等分為末六月六日滴水丸彈子大四十嵗以下分六服病甚一丸作二丸薄荷湯化下覺微麻為度本事方風濕走痛黑弩前丸用兩頭尖五靈脂各一兩乳香沒藥當歸三錢為末醋糊丸梧子大每服十丸至三十丸臨卧溫酒下忌油膩濕麵孕婦勿服瑞竹堂方腰腳冷痛烏頭三箇去皮臍研末醋調貼須臾痛止十便良方膝風作痛草烏細辛防風等分為末摻靴襪中及安護膝內能除風濕健步扶夀方逺行腳腫草烏細辛防風等分為末摻鞋底內如草鞋以水微濕摻之用之可行千里甚妙經驗腳氣掣痛或胯間有核生草烏頭大黃木鱉子作末薑汁煎茶調貼之又法草烏一味為末以薑汁或酒糟同搗貼之永類方濕滯足腫早輕晚重用草烏頭一兩以生薑一兩同研交感一宿蒼术一兩以蔥白一兩同研交感一宿各焙乾為末酒糊丸梧子大每服五十丸酒下艾元英如宜方除風去濕治痺胃虛弱久積冷氣飲食減少用草烏頭一斤蒼术二斤以去白陳皮半斤生甘草四兩黑豆三升水一石同煮乾只揀烏术晒焙為末酒糊丸梧子大焙乾收之每空心溫酒下二三十丸覺麻即漸減之名烏术丸集簡方偏正頭風草烏頭四兩川芎藭四兩蒼术半斤生薑四兩連鬚生蔥一把搗爛同入瓷瓶封固埋土中春五夏三秋五冬七日取出晒乾揀去蔥薑為末醋麵糊和丸梧子大每服九丸臨卧溫酒下立效戴古渝經驗方久患頭風草烏頭尖生用一分赤小豆三十五粒麝香一字為末每服半錢薄荷湯冷服更隨左右嗅鼻指南方風痰頭痛體虛傷風停聚痰飲上厥頭痛或偏或正草烏頭炮去皮尖半兩川烏頭生去皮尖一兩藿香乳香三皂子大為末每服二錢薄荷薑湯下食後服陳言三因湯女人頭痛血風證草烏頭巵子等分為末自然蔥汁隨左右調塗太陽及額上勿過眼避風濟生方腦泄臭穢草烏去皮半兩蒼术一兩川芎二兩並生研末麵糊丸緑豆大每服十丸茶下忌一切熱物聖濟總録耳鳴耳癢如流水及風聲不治成聾用生烏頭掘得乘濕削如棗核大塞之日易二次不三日愈千金方喉痺口噤不開欲死草烏頭皂莢等分為末入麝香少許擦牙并嗅鼻內牙關自開也濟生方用草烏尖石膽等分為末每用一錢醋煮皂莢汁調稀掃入腫上流涎數次其毒即破也虛壅口瘡滿口連舌者草烏一箇南星一箇生薑一大塊為末睡時以醋調塗手心足心或以草烏頭吳茱萸等分為末蜜調塗足心本事方疳蝕口鼻穿透者草烏頭燒灰入麝香等分為末貼之風蟲牙痛草烏炒黑一兩細辛一錢為末揩之吐出涎一方草烏食鹽同炒黑摻之海上方寒氣心疝三十年者射罔食茱萸等分為末蜜丸麻子大每酒下二丸日三服劉國英所祕之方方范汪東陽寒瘧積瘧巴豆一枚去心皮射罔去皮如巴豆大大棗去皮一枚搗成丸梧子大清旦先發時每服一丸白湯下肘後方脾寒厥瘧先寒後熱名寒瘧但寒不熱而色黑者名厥瘧寒多熱少面黃腹痛名脾瘧三者並宜服此賈耘老用之二十年纍試有效不蛀草烏頭削去皮沸湯泡二七度以盞蓋良久切焙研稀糊丸梧子大每服三十丸薑十片棗三枚蔥三根煎湯清早服以棗壓之如人行十里許再一服絶勿飲湯便不發也蘇東坡良方腹中癥結害妨飲食羸瘦射罔二兩椒三百粒搗末雞子白和丸麻子大每服一丸漸至三丸以愈為度肘後方水泄寒痢大草烏一兩以一半生研一半燒灰醋糊和丸緑豆大每服七丸并華水下忌生冷魚肉方十便良泄痢注下三神丸治清濁不分泄㵼注下或赤或白腹臍刺痛裏急後重用草烏頭三箇去皮尖以一箇火炮一箇醋煮一箇燒灰為末醋糊丸緑豆大每服二十丸水㵼流水下赤痢甘草湯下白痢薑湯下忌魚腥生冷和劑局方結隂下血腹痛草烏頭蛤粉炒去皮臍切一兩茴香炒三兩每用三錢水一盞入鹽少許煎八分去滓露一夜五更冷服聖濟録老人遺尿不知出者草烏頭一兩童便浸七日去皮同鹽炒為末酒糊丸緑豆大每服二十丸鹽湯下普濟內痔不出草烏為末津調點肛門內痔即反出乃用枯痔藥點之外科集驗方疔毒初起草烏頭七箇川烏頭三箇杏仁九箇飛羅麵一兩為末無根水調搽留口以紙蓋之乾則以水潤之方唐珤經驗疔毒惡腫生烏頭切片醋熬成膏攤貼次日根出又方兩頭尖一兩巴豆四箇搗貼疔自拔出普濟方疔瘡發背草烏頭去皮為末用蔥白連鬚和搗丸豌豆大以雄黃為衣每服一丸先將蔥一根細嚼以熱酒送下或有惡心嘔三四口用冷水一口止之即卧以被厚蓋汗出為度亦治頭風乾坤祕韞惡毒諸瘡及發背疔瘡便毒等證二烏膏用草烏頭川烏頭于瓦上以井華水磨汁塗之如有口即塗四邉乾再上亦可單用草烏磨醋塗之永類方大風癬瘡遍身黑色肌體麻木痺痛不常草烏頭一斤刮洗去皮極淨攤乾以清油四兩鹽四兩同入銚內炒令深黃色傾出剩油只留鹽并藥再炒令黑煙出為度取一枚擘破心內如米一點白者始好白多再炒乘熱杵羅為末醋麵糊丸梧子大每服三十丸空心溫酒下草烏性毒難制五七日間以黑豆煮粥食解其毒繼洪淡寮方遍身生瘡隂囊兩腳尤甚者草烏一兩鹽一兩化水浸一夜炒赤為末豬腰子一具去膜煨熟竹刀切搗醋糊丸緑豆大每服三十丸空心鹽湯下淡寮方一切諸瘡未破者草烏頭為末入輕粉少許臘豬油和搽普濟方瘰癧初作未破作寒熱草烏頭半兩木鱉子二箇以米醋磨細入搗爛蔥頭蚯蚓糞少許調勻傅上以紙條貼令通氣孔妙醫林正宗馬汗入瘡腫痛急療之遲則毒深以生烏頭末傅瘡口良久有黃水出即愈靈苑方蛇蝎螫人射罔傅之頻易血出愈梅師方中沙虱毒射罔傅之佳千金白附子别録下品釋名見後發明下集解别録曰白附子生蜀郡三月采𢎞景曰此物久絶無復真者恭曰本出髙麗今出涼州以西蜀郡不復有生砂磧下濕地獨莖似鼠尾草細葉周匝生於穗間根形似天雄珣曰徐表南州異物記云生東海新羅國及遼東苗與附子相似時珍根正如草烏頭之小者長寸許乾者皺文有節氣味辛甘大溫有小毒保升曰甘辛溫大明曰無毒珣曰小毒入藥炮用杲曰純陽引藥勢上行主治心痛血痺面上百病行藥勢别録中風失音一切冷風氣面皯瘢疵大明諸風冷氣足弱無力疥癬風瘡隂下濕癢頭面䀶入面脂用李珣補肝風虛好古風痰震亨發明時珍曰白附子乃陽明經藥因與附子相似故得此名實非附子類也按楚國先賢傳云孔休傷頰有瘢王莽賜玉屑白附子香與之消瘢附方新十二中風口喎半身不遂牽正散用白附子白薑蠶全蝎並等分生研為末每服二錢熱酒調下楊氏家藏方小兒暑風暑毒入心痰塞心孔昏迷搐搦此乃危急之證非此丸生料暝眩之劑不能伐之三生丸用白附子天南星半夏並去皮等分生研豬膽汁和丸黍米大量兒大小以薄荷湯下令兒側卧嘔出痰水即蘇全幼心鑑風痰眩運頭痛氣鬱胸膈不利白附子炮去皮臍半斤石膏煆紅半斤硃砂二兩二錢半龍腦一錢為末粟米飯丸小豆大每服三十丸食後茶酒任下御藥院方偏正頭風白附子白芷豬牙皂角去皮等分為末食後茶清服仰卧少頃方普濟本事痰厥頭痛白附子天南星半夏等分生研為末生薑自然汁浸蒸餅丸緑豆大每服四十丸食後薑湯下濟生方赤白汗斑白附子硫黃等分為末薑汁調稀茄蒂蘸擦日數次簡便方面上皯􅍍白附子為末卧時漿水洗面以白蜜和塗紙上貼之久久自落簡衛生易方耳出膿水白附子炮羌活一兩為末豬羊腎各一箇每箇入末半錢濕紙包煨熟五更食溫酒下聖濟録喉痺腫痛白附子末枯礬等分研末塗舌上有涎吐出聖惠方偏墜疝氣白附子一箇為末津調填臍上以艾灸三壯或五壯即愈楊起簡便方小兒吐逆不定虛風喘急白附子藿香等分為末每米飲下半錢保幼大全方慢痺驚風白附子半兩天南星半兩黑附子一錢並炮去皮為末每服二錢生薑五片水煎服亦治大人風虛止吐化痰宣和間真州李博士用治吳內翰女孫甚效康州陳侍郎病風虛極昏吳內翰令服三四服即愈藏楊氏家虎掌本經下品天南星宋開寶釋名虎膏綱目鬼蒟蒻日華恭曰其根四畔有圓牙看如虎掌故有此名頌曰天南星即本草虎掌也小者名由跋古方多用虎掌不言天南星南星近出唐人中風痰毒方中用之乃後人採用别立此名爾時珍曰虎掌因葉形似之非根也南星因根圓白形如老人星狀故名南星即虎掌也蘇恭説甚明白宋開寶不當重出南星條今併入集解别録曰虎掌生漢中山谷及寃句二月八月采隂乾𢎞景曰近道亦有形似半夏但大而四邉有子如虎掌今用多破作三四片方藥不甚用也恭曰此是由跋宿根其苗一莖莖頭一葉枝了扶莖根大者如拳小者如雞卵都似扁柿四畔有圓牙看如虎掌由跋是新根大如半夏二三倍四畔無子牙陶説似半夏乃由跋也保升曰莖頭有八九葉花生莖間藏器曰天南星生安東山谷葉如荷獨莖用根頌曰虎掌今河北州郡有之初生根如豆大漸長大似半夏而扁年久者根圓及寸大者如雞卵周匝生圓牙三四枚或五六枚三四月生苗髙尺餘獨莖上有葉如爪五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙褁莖作房旁開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠九月苗殘取根今冀州人菜圃中種之呼為天南星又曰天南星處處平澤有之二月生苗似荷梗其莖髙一尺以來葉如蒟蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色二月八月采根似芋而圓扁與蒟蒻相類人多誤采了不可辨但蒟蒻莖斑花紫南星根小柔膩肌細炮之易裂為可辨爾南星即本經虎掌也大者四邉皆有牙子采時削去之江州一種草葉大如掌面青背紫四畔有牙如虎掌生三四葉為一本冬青不結花實治心疼寒熱積氣亦與虎掌同名故附見之時珍曰大者為虎掌南星小者為由跋乃一種也今俗又言大者為鬼臼小者為南星殊為謬誤修治頌曰九月采虎掌根去皮臍入器中湯浸五七日日换三四遍洗去涎暴乾用或再火炮裂用時珍曰凡天南星須用一兩以上者佳治風痰有生用者須以溫湯洗淨仍以白礬湯或入皂角汁浸三日夜日日换水暴乾用若熟用者須於黃土地掘一小坑深五六寸以炭火燒赤以好酒沃之安南星於內瓦盆覆定灰泥固濟一夜取出用急用即以濕紙包于煻灰火中炮裂也一法治風熱痰以酒浸一宿桑柴火蒸之常灑酒入甑內令氣猛一伏時取出竹刀切開味不麻舌為熟未熟再蒸至不麻乃止脾虛多痰則以生薑渣和黃泥包南星煨熟去泥焙用造南星麴法以薑汁礬湯和南星末作小餅子安籃內楮葉包蓋待上黃衣乃取晒收之造膽星法以南星生研末臘月取黃牯牛膽汁和劑納入膽中繫懸風處乾之年久者彌佳氣味苦溫有大毒别録曰微寒普曰虎掌神農雷公苦有毒岐伯桐君辛有毒大明曰辛烈平杲曰苦辛有毒隂中之陽可升可降乃肺經之本藥震亨曰欲其下行以黃蘖引之之才曰蜀漆為之使惡莽草大明曰畏附子乾薑生薑時珍曰得防風則不麻得牛膽則不燥得火炮則不毒生能伏雄黃丹砂熖消主治心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道本經除隂下濕風眩别録主疝瘕腸痛傷寒時疾強隂甄權天南星主中風麻痺除痰下氣利胸膈攻堅積消癰腫散血墮胎開寶金瘡折傷瘀血搗傅之藏器蛇蟲咬疥癬惡瘡大明去上焦痰及眩運元素主破傷風口噤身強李杲補肝風虛治痰功同半夏好古治破癎口眼喎斜喉痺口舌瘡糜結核解顱時珍發明時珍曰虎掌天南星乃手足太隂脾肺之藥味辛而麻故能治風散血氣溫而燥故能勝濕除涎性緊而毒故能攻積拔腫而治口喎舌縻楊士瀛直指方云諸風口噤宜用南星更以人參石菖蒲佐之附方舊十新二十九中風口噤目瞑無門下藥者開關散用天南星為末入白龍腦等分五月五日午時合之每用中指點末揩齒三二十遍揩大牙左右其口自開又名破棺散經驗方諸風口噤天南星炮銼大人三錢小兒三字生薑五片蘇葉一錢水煎減半入雄豬膽汁少許溫服直仁齋指方小兒口噤牙關不開天南星一枚煨熟紙褁斜包剪一小孔透氣于口中牙關自開也汁一方用生南星同薑擦之自開小兒驚風墜涎散用天南星一兩重一箇换酒浸七伏時取出安新瓦上周回炭火灸裂合濕地出火毒為末入硃砂一分每服半錢荆芥湯調下每日空心一服午時一服經驗方吐㵼慢驚天王散治小兒吐㵼或誤服冷藥脾虛生風痰慢驚天南星一箇重八九錢者去臍黃土坑深三寸炭火五斤煆赤入好酒半盞安南星在內仍架炭三條在上候發裂取銼再炒熟為末用五錢天麻煨熟研末一錢麝香一字和勻三嵗小兒用半錢以生薑防風煎湯調下亦治久嗽惡心錢乙小兒方風癎痰迷墜痰丸用天南星九蒸九晒為末薑汁麵糊丸梧子大每服二十丸人參湯下石菖蒲麥門冬湯亦可衛生寶鑑小兒癎瘖癎後瘖不能言以天南星濕紙包煨為末雄豬膽汁調服二字全幼心鑑治癎利痰天南星煨香一兩硃砂一錢為末豬心血丸梧子大每防風湯化下一丸普濟方口眼喎斜天南星生研末自然薑汁調之左貼右右貼左仁存方角弓反張南星半夏等分為末薑汁竹瀝灌下一錢仍灸印堂摘玄方破傷中風胡氏奪命散又名玉真散治打撲金刃傷及破傷風傷濕發病強直如癎狀者天南星防風等分為末水調敷瘡出水為妙仍以溫酒調服一錢已死心尚溫者熱童便調灌二錢門毆內傷墜壓者酒和童便連灌三服即蘇亦可煎服三因方破傷風瘡生南星末水調塗瘡四圍水出有效普濟方婦人頭風攻目作痛天南星一箇掘地坑燒赤安藥於中以醋一盞沃之蓋定勿令透氣候冷研末每服一字以酒調下重者半錢千金方風痰頭痛不可忍天南星一兩荆芥葉一兩為末薑汁糊丸梧子大每食後薑湯下二十丸又上清丸用天南星茴香等分生研末鹽醋煮麵糊丸如上法服並出經效濟世方風痰頭運目眩吐逆煩悶飲食不下玉壺丸用生南星生半夏各一兩天麻半兩白麵二兩為末水丸梧子大每服三十丸以水先煎沸入藥煮五七沸漉出放溫以薑湯吞之惠民和劑局方腦風流涕邪風入腦鼻內結硬遂流髓涕大白南星切片沸湯泡二次焙乾每用二錢棗七箇甘草五分同煎服三四服其硬物自出腦氣流轉髓涕自收以大蒜蓽茇末作餅隔紗貼𩕄前尉斗尉之或以香附蓽茇末頻吹鼻中直指方小兒風痰熱毒壅滯涼心壓驚抱龍丸用牛膽南星一兩入金錢薄荷十片丹砂一錢半龍腦麝香各一字研末煉蜜丸芡子大每服一丸竹葉湯化下全幼心鑑壯人風痰及中風中氣初起星香飲用南星四錢木香一錢水二盞生薑十四片煎六分溫服王碩易簡方痰迷心竅夀星丸治心膽被驚神不守舍或痰迷心竅恍惚健忘妄言妄見天南星一斤先掘土坑一尺以炭火三十斤燒赤入酒五升滲乾乃安南星在內盆覆定以灰塞之勿令走氣次日取出為末琥珀一兩硃砂二兩為末生薑汁打麵糊丸梧子大每服三十丸至五十丸煎人參石菖蒲湯下一日三服和劑局方風痰注痛方見羊躑躅下痰濕臂痛右邉者南星制蒼术等分生薑三片水煎服之摘玄方風痰咳嗽大天南星一枚炮製研末每服一錢水一盞薑三片煎五分溫服每日早午晚各一服千金博濟氣痰咳嗽玉粉丸南星麴半夏麴陳橘皮各一兩為末自然薑汁打糊丸如梧子大每服四十丸薑湯下寒痰去橘皮加官桂東垣蘭室祕藏清氣化痰三仙丸治中脘氣滯痰涎煩悶頭目不清生南星去皮半夏各五錢並湯泡七次為末自然薑汁和作餅鋪竹篩內以楮葉包覆待生黃成麴晒乾每用二兩入香附末一兩糊丸梧子大每服四十丸食後薑湯下選王璆百一方溫中散滯消導飲食天南星炮髙良薑炮各一兩砂仁二錢半為末薑汁糊丸梧子大每薑湯下五十丸和劑方酒積酒毒服此即解天南星丸用正端天南星一斤土坑燒赤沃酒一斗入坑放南星盆覆泥固濟一夜取出酒和水洗淨切片焙乾為末入硃砂末一兩薑汁麵糊丸梧子大每服五十丸薑湯下蔡丞相吕丞相嘗用有驗楊氏家藏丸吐泄不止四肢厥逆虛風不省人事服此則陽回名回陽散天南星為末每服三錢京棗三枚水二鍾煎八分溫服未省再服南星末貼足心又方醋調普濟方腸風瀉血諸藥不效天南星石灰炒焦黃色為末酒糊丸梧子大每酒下二十丸普濟方吐血不止天南星一兩銼如豆大以爐灰汁浸一宿洗焙研末每服一錢以自然銅磨酒調下勝金方初生貼𩕄頭熱鼻塞者天南星炮為末水調貼𩕄上灸手尉之危氏得效方小兒解顱𩕄開不合鼻塞不通天南星炮去皮為末淡醋調緋帛上貼𩕄門灸手頻尉之立效錢乙小兒直訣解頤脫臼不能收上用南星末薑汁調塗兩頰一夜即上醫説小兒口瘡白屑如鵝口不須服藥以生天南星去皮臍研末醋調塗足心男左女右閻孝忠集效方走馬疳蝕透骨穿腮生南星一箇當心剜空入雄黃一塊麵褁燒候雄黃作汁以盞子合定出火毒去麵為末入麝香少許拂瘡數日甚效經驗方風蟲牙痛南星末塞孔以霜梅酓住去涎摘玄方喉風喉痺天南星一箇剜心入白僵蠶七枚紙包煨熟研末薑汁調服一錢甚者灌之吐涎愈名如聖散博濟方痰瘤結核南星膏治人皮肌頭面上生瘤及結核大者如拳小者如栗或軟或硬不疼不癢宜用此藥不可輒用針灸生天南星大者一枚研爛滴好醋五七點如無生者以乾者為末醋調先用針刺令氣透乃貼之覺癢則頻貼取效嚴子禮濟生方身面疣子醋調南星末塗之簡易方由跋本經下品釋名集解恭曰由跋是虎掌新根大于半夏一二倍四畔未有子牙其宿根即虎掌也藏器曰由跋生林下苗髙一尺似蒟蒻根如雞卵保升曰春抽一莖莖端有八九葉根圓扁而肉白時珍曰此即天南星之小者其氣未足不堪服食故醫方罕用惟重八九錢至一兩餘者氣足乃佳正如附子之側子不如附子之義也正誤𢎞景曰由跋本出始興今人亦種之狀如烏翣而布地花紫色根似附子苦酒磨塗腫亦效恭曰陶氏所説乃鳶尾根即鳶頭也又言虎掌似半夏是以鳶尾為由跋以由跋為半夏非惟不識半夏亦不識鳶尾與由跋也今南人猶以由跋為半夏時珍曰陳延之小品方亦以東海鳶頭為由跋則其訛誤久矣氣味辛若溫有毒主治毒腫結熱本經蒟蒻宋開寶釋名蒻頭開寶鬼芋圖經鬼頭集解志曰蒻頭出吳蜀葉似由跋半夏根大如碗生隂地雨滴葉下生子又有斑杖苗相似至秋有花直出生赤子根如蒻頭毒猛不堪食虎杖亦名斑杖與此不同頌曰江南吳中出白蒟蒻亦曰鬼芋生平澤極多人采以為天南星了不可辨市中所收往往是此但南星肌細膩而蒟蒻莖斑花紫南星莖無斑花黃為異爾時珍曰蒟蒻出蜀中施州亦有之呼為鬼頭閩中人亦種之宜樹隂下掘坑積糞春時生苗至五月移之長一二尺與南星苗相似但多斑點宿根亦自生苗其滴露之説蓋不然經三年者根大如碗及芋魁其外理白味亦麻人秋後采根須淨擦或搗或片段以釅灰汁煮十餘沸以水淘洗换水更煮五六遍即成凍了切片以苦酒五味淹食不以灰汁則不成也切作細絲沸湯汋過五味調食狀如水母絲馬志言其苗似半夏楊慎丹鉛録言蒟醬即此者皆誤也王禎農書云救荒之法山有粉葛蒟蒻橡栗之利則此物亦有益于民者也其斑杖即天南星之類有斑者根氣味辛寒有毒李廷飛曰性冷甚不益人冷氣人少食之生則戟人喉出血主治癰腫風毒摩傅腫上搗碎以灰汁煮成餅五味調食主消渴開寶發明機曰按三元延夀書云有人患瘵百物不忌見鄰家修蒟蒻求食之美遂多食而瘵愈又有病腮癰者數人多食之亦皆愈附録菩薩草宋圖經頌曰生江浙州郡凌冬不凋秋冬有花直出赤子如蒻頭冬月采根用味苦無毒主中諸毒食毒酒研服之又諸蟲傷搗汁飲并傅之婦人妊娠咳嗽搗篩蜜丸服效半夏本經下品釋名守田本經水玉本經地文别録和姑本經時珍曰禮記月令五月半夏生蓋當夏之半也故名守田會意水玉因形集解别録曰半夏生槐里川谷五月八月采根暴乾普曰生微丘或生野中二月始生葉三三相偶白花圓上𢎞景曰槐里屬扶風今第一出青州吳中亦有以肉白者為佳不厭陳久恭曰所在皆有生平澤中者名羊眼半夏圖白為勝然江南者大乃徑寸南人特重之頃來互用功狀殊異其苗似是由跋誤以為半夏也頌曰在處有之以齊州者為佳二月生苗一莖莖端三葉淺緑色頗似竹葉而生江南者似芍藥葉根下相重上大下小皮黃肉白五月八月采根以灰裛二日湯洗暴乾蜀圓經云五月采則虛小八月采乃實大其平澤生者甚小名羊眼半夏由跋絶類半夏而苗不同斆曰白傍蔑子真似半夏只是咬著微酸不入藥用修治𢎞景曰凡用以湯洗十許過令滑盡不爾有毒戟人咽喉方中有半夏必須用生薑者以制其毒故也斆曰修事半夏四兩用白芥子末二兩釅醋二兩攪濁將半夏投中洗三遍用之若洗涎不盡令人氣逆肝氣怒滿時珍曰全治半夏惟洗去皮垢以湯泡浸七日逐日换湯朗乾切片薑汁拌焙入藥或研為末以薑汁入湯浸澄三日瀝去涎水晒乾用謂之半夏粉或研末以薑汁和作餅子日乾用謂之半夏餅或研末以薑汁白礬湯和作餅楮葉包置藍中待生黃衣日乾用謂之半夏麴白飛霞醫通云痰分之病半夏為主造而為麴尤佳治濕痰以薑汁白礬湯和之治風痰以薑汁及皂莢煮汁和之治火痰以薑汁竹瀝或荆瀝和之治寒痰以薑汁􅈨湯入白芥子末和之此皆造麴妙法也根氣味辛平有毒别録曰生微寒熟溫生令人吐熟令人下湯洗盡滑用元素曰味辛苦性溫氣味俱薄沉而降隂中陽也好古曰辛厚苦輕陽中隂也入手陽明太隂少隂三經之才曰射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭權曰柴胡為之使忌羊血海藻飴糖元素曰熱痰佐以黃芩風痰佐以南星寒痰佐以乾薑痰痞佐以陳皮白术多用則㵼脾胃諸血證及口渴者禁用為其燥津液也孕婦忌之用生薑則無害主治傷寒寒熱心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗本經消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫療痿黃悅澤面目墮胎别録消痰下肺氣開胃健脾止嘔吐去胸中痰滿生者摩癰腫除瘤癭氣甄權治吐食反胃霍亂轉筋腸腹冷痰瘧大明治寒痰及形寒飲冷傷肺而咳消胸中痞膈上痰除胸寒和胃氣燥脾濕治痰厥頭痛消腫散結元素治眉稜骨痛震亨補肝風虛好古除腹脹目不得瞑白濁夢遺帶下時珍發明權曰半夏使也虛而有痰氣宜加用之頌曰胃冷嘔噦方藥之最要成無已曰辛者散也潤也半夏之辛以散逆氣結氣除煩嘔發音聲行水氣而潤腎燥好古曰經云腎主五液化為五濕自入為唾入肝為泣入心為汗入脾為痰入肺為涕有痰曰嗽無痰曰咳痰者因咳而動脾之濕也半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形痰有形無形則潤有形則燥所以為流濕潤燥也俗以半夏為肺藥非也止嘔吐為足陽明除痰為足太隂柴胡為之使故今柴胡湯中用之雖為止嘔亦助柴胡黃芩主往來寒熱是又為足少陽陽明也宗奭曰今人惟知半夏去痰不言益脾蓋能分水故也脾惡濕濕則濡困困則不能治水經云水勝則㵼一男子夜數如厠或教以生薑一兩半夏大棗各三十枚水一升瓷瓶中慢火燒為熟水時呷之便已也趙繼宗曰丹溪言二陳湯治一身之痰世醫執之凡有痰者皆用夫二陳內有半夏其性燥烈若風痰寒痰濕痰食痰則相宜至于勞痰失血諸痰用之反能燥血液而加病不可不知機曰俗以半夏性燥有毒多以貝母代之貝母乃太隂脾經之藥半夏乃太隂脾經陽明胃經之藥何可代也夫咳嗽吐痰虛勞吐血或痰中見血諸鬱咽痛喉痺肺癰肺痿癰疽婦人乳難此皆貝母為向導半夏乃禁用之藥若涎者脾之液美味膏粱炙􅏼皆能生脾胃濕熱故涎化為痰久則痰火上攻令人昏憒口噤偏廢僵仆寋澀不語生死旦夕自非半夏南星曷可治乎若以貝母代之則翹首待斃矣時珍曰脾無留濕不生痰故脾為生痰之源肺為貯痰之器半夏能主痰飲及腹脹者為其體滑而味辛性溫也涎滑能潤辛溫能散亦能潤故行濕而通大便利竅而泄小便所謂辛走氣能化液辛以潤之是矣潔古張氏云半夏南星治其痰而咳嗽自愈丹溪朱氏云二陳湯能使大便潤而小便長聊攝成氏云半夏辛而散行水氣而潤腎燥又和劑局方用半硫丸治老人虛祕皆取其滑潤也世俗皆以南星半夏為性燥誤矣濕去則土燥痰涎不生非二物之性燥也古方治咽痛喉痺吐血下血多用二物非禁劑也二物亦能散血故破傷打撲皆主之惟隂虛勞損則非濕熱之邪而用利竅行濕之藥是乃重竭其精液醫之罪也豈藥之咎哉甲乙經用治夜不眠是果性燥者乎岐伯云衛氣行于陽陽氣滿不得入于隂隂氣虛故目不得瞑治法飲以半夏湯一劑隂陽既通其卧立至方用流水千里者八升揚之萬遍取清五升煮之炊以葦薪大沸入秫米一升半夏五合煮一升半飲汁一杯日三以知為度病新發者覆杯則卧汗出則已久者三飲而已附方舊十五新五十三法制半夏清痰化飲壯脾順氣用大半夏湯洗七次焙乾再洗如此七轉以濃米泔浸一日夜每一兩用白礬一兩半溫水化浸五日焙乾以鉛白霜一錢溫水化又浸七日以漿水慢火內煮沸焙乾收之每嚼一二粒薑湯送化下御藥院方紅半夏法消風熱清痰涎降氣利咽大半夏湯浸焙制如上法每一兩入龍腦五分硃砂為衣染之先鋪燈草一重約一指厚排半夏于上再以燈草蓋一指厚以炒豆焙之候乾取出每嚼一兩粒溫水送下御藥院方化痰鎮心袪風利膈辰砂半夏丸用半夏一斤湯泡七次為末篩過以水浸三日生絹濾去滓澄清去水晒乾一兩入辰砂一錢薑汁打糊丸梧子大每薑湯下七十丸此周府方也袖珍化痰利氣三仙丸方見虎掌下消痰開胃去胸膈壅滯斗門方用半夏湯泡焙乾為末自然薑汁和作餅濕紙裹煨香以熟水二盞同餅二錢入鹽五分煎一盞服之大壓痰毒及酒食傷極驗經驗用半夏天南星各二兩為末水五升入壜內浸一宿去清水焙乾重研每服二錢水二盞薑三片煎服中焦痰涎利咽清頭目進飲食半夏泡七次四兩枯礬一兩為末薑汁打糊或煮棗肉和丸梧子大每薑湯下十五丸寒痰加丁香五錢熱痰加寒水石煆四兩名玉液丸和劑局方老人風痰大腑熱不識人及肺熱痰實不利半夏炮七次焙消石半兩為末入白麵搗勻水和丸緑豆大每薑湯下五十丸普濟膈壅風痰半夏半斤酸漿浸一宿溫湯洗五十遍去惡氣日乾為末漿水搜作餅日乾再研為末每五兩入生龍腦一錢以漿水濃腳和丸雞頭子大紗袋盛避風處隂乾每服一丸好茶或薄荷湯嚼下御藥院方搜風化痰定志安神利頭目辰砂化痰丸用半夏麴三兩天南星炮一兩辰砂枯礬各半兩為末薑汁打糊丸梧子大每服三十丸食後薑湯送下和劑局方痰厥中風省風湯用半夏湯泡八兩甘草炙二兩防風四兩每服半兩薑二十片水二盞煎服竒效方風痰頭運嘔逆目眩面色青黃脈弦者水煮金花丸用生半夏生天南星寒水石煅各一兩天麻半兩雄黃二錢小麥麵三兩為末水和成餅水煮浮起漉出搗丸梧子大每服五十丸薑湯下極效亦治風痰咳嗽二便不通風痰頭痛潔古活法機要方風痰濕痰青壼丸半夏一斤天南星半兩各湯炮晒乾為末薑汁和作餅焙乾入神麴半兩白术末二兩枳實末二兩薑汁麵糊丸梧子大每服五十丸薑湯下葉氏方風痰喘逆兀兀欲吐眩運欲倒半夏一兩雄黃三錢為末薑汁浸蒸餅丸梧子大每服三十丸薑湯下已吐者加檳榔活法機要風痰喘急千緡湯用半夏湯洗七箇甘草炙皂莢炒各一寸薑二片水一盞煎七分溫服和劑局方上焦熱痰咳嗽制過半夏一兩片黃芩末二錢薑汁打糊丸緑豆大每服七十丸淡薑湯食後服此周憲王親制方也方袖珍肺熱痰嗽制半夏栝樓仁各一兩為末薑汁打糊丸梧子大每服二三十丸白湯下或以栝樓瓤煮熟丸濟生方熱痰咳嗽煩熱面赤口燥心痛脈洪數者小黃丸用半夏天南星各一兩黃芩一兩半為末薑汁浸蒸餅丸梧子大每服五七十丸食後薑湯下潔古活法機要小兒痰熱咳嗽驚悸半夏南星等分為末牛膽汁和入膽內懸風處待乾蒸餅丸緑豆大每薑湯下三五丸摘玄方濕痰咳嗽面黃體重嗜卧驚兼食不消脈緩者白术丸用半夏南星各一兩白术一兩半為末薄糊丸梧子大每服五七十丸薑湯下活法機要氣痰咳嗽面白氣促灑浙惡寒愁憂不樂脈澀者玉粉丸用半夏南星各一兩官桂半兩為末糊丸梧子大每服五十丸薑湯下要活法機小結胸痛正在心下按之則痛胍浮滑者小陷胸湯主之半夏半升黃連一兩栝樓實大者一箇水六升先煮栝樓至三升去滓內二味煮取二升分三服仲景傷寒論濕痰心痛喘急者半夏油炒為末粥糊丸緑豆大每服二十丸薑湯下丹溪心法急傷寒病半夏四錢生薑七片酒一盞煎服胡洽居士百病方結痰不出語音不清年久者亦宜玉粉丸半夏半兩桂心一字草烏頭半字為末薑汁浸蒸餅丸芡子大每服一丸夜臥含咽活法機要停痰冷飲嘔逆橘皮半夏湯用半夏水煮熟陳橘皮各一兩每服四錢生薑七片水二盞煎一盞溫服和劑局方停痰留飲胸膈滿悶氣短惡心飲食不下或吐痰水茯苓半夏湯用半夏泡五兩茯苓三兩每服四錢薑七片水一鍾半煎七分甚捷徑和劑局方攴飲作嘔嘔家本渴不渴者心下有攴飲也或似喘不喘似嘔不嘔似噦不噦心下憒憒並宜小半夏湯用半夏泡七次一升生薑半升水七升煮一升五合分服張仲景金匱要略噦逆欲死半夏生薑湯主之即上方也痘瘡噦氣方同上嘔噦眩悸穀不得下半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎一升半分溫服之金匱要略目不得眠見發明下心下悸忪半夏麻黃丸半夏麻黃等分為末蜜丸小豆大每服三十丸日三金匱要略傷寒乾啘半夏熟洗研末生薑湯服一錢匕梅師方嘔逆厥逆內有寒痰半夏一升洗滑焙研小麥麵一升水和作彈丸水煮熟初吞四五枚日三服稍增至十五枚旋煮旋吞覺病減再作忌羊肉餳糖此乃許仁則方也外臺祕要嘔吐反胃大半夏湯半夏三升人參三兩白蜜一升水一斗二升和揚之一百二十遍煮取三升半溫服一升日再服亦治膈間支飲金匱要略胃寒噦逆停痰留飲藿香半夏湯用半夏湯泡炒黃二兩藿香葉一兩丁香半兩每服四錢水一盞薑七片煎服方和劑局小兒吐瀉脾胃虛寒齊州半夏泡七次陳粟米各一錢半薑十片水盞半煎八分溫服錢乙小兒小兒痰吐或風壅所致或咳嗽發熱飲食即吐半夏泡七次半兩丁香一錢以半夏末水和包丁香用麵重包煨熟去麵為末生薑自然汁和丸麻子大每服二三十丸陳皮湯下議活幼口妊娠嘔吐半夏二兩人參乾薑各一兩為末薑汁麵糊丸梧子大每飲服十丸日三服略仲景金匱要霍亂腹脹半夏桂等分為末水服方寸匕肘後方小兒腹脹半夏末少許酒和丸粟米大每服二丸薑湯下不瘥加之或以火炮研末薑汁調貼臍亦佳子母祕録黃疸喘滿小便自利不可除熱半夏生薑各半斤水七升煮一升五合分再服有人氣結而死心下暖以此少許入口遂活張仲景方伏暑引飲脾胃不利消暑丸用半夏醋煮一斤茯苓半斤生甘草半斤為末薑汁麵糊丸梧子大每服五十丸熱湯下和劑局方老人虛祕冷祕及痃癖冷氣半硫丸半夏炮炒生硫黃等分為末自然薑汁煮糊丸如梧子大每空心溫酒下五十丸方和劑局失血喘急吐血下血崩中帶下喘急痰嘔中滿宿瘀用半夏槌扁以薑汁和麵包煨黃研末米糊丸梧子大每服三十丸白湯下直指方白濁夢遺半夏一兩洗十次切破以木豬苓二兩同炒黃出火毒去豬苓入煆過牡礪一兩以山藥糊丸梧子大每服三十丸茯苓湯送下腎氣閉而一身精氣無所管攝妄行而遺者宜用此方蓋半夏有利性豬苓導水使腎氣通也與下元虛憊者不同許學士本事方八般頭風三決見效半夏末入百草霜少許作紙撚燒煙就鼻肉嗅之口中含水有涎吐去再含衛生寶鑑少隂咽痛生瘡不能言語聲不出者苦酒湯主之半夏七枚打碎雞子一枚頭開一竅去黃納苦酒令小滿入半夏在內以鐶子坐于炭火上煎三沸去滓置杯中時時咽之極驗未瘥更作仲景傷寒論喉痺腫塞生半夏末嗅鼻內涎出效簡集方骨哽在咽半夏白芷等分為末水服方寸匕當嘔出忌羊肉外臺祕要重舌木舌脹大塞口半夏煎醋含漱之酒又方半夏二十枚水煮過再炮片時乘熱以一升浸之密封良久熱漱冷吐之小兒𩕄陷乃冷也水調半夏末塗足心面上黑氣半夏焙研米醋調敷不可見風不計遍數從早至晚如此三日皂角湯洗下面瑩如玉也摘玄方癩風眉落生半夏羊屎燒焦等分為末自然薑汁日調塗聖濟録盤腸生産産時子腸先出産後不收者名盤腸産以半夏末頻嗅鼻中則上也婦人良方産後運絶半夏末冷水和丸大豆大納鼻中即愈此扁鵲法也肘後方小兒驚風生半夏一錢皂角半錢為末吹少許入鼻名嚏驚散即蘇直指方卒死不寤半夏末吹鼻中即活南嶽夫人紫靈魏元君方也五絶急病一曰自縊二曰墻壓三曰溺水四曰魘魅五曰産乳並以半夏末納大豆一丸入鼻中心溫者一日可活也子母祕録癰疽發背及乳瘡半夏末雞子白調塗之肘後方吹奶腫痛半夏一箇煨研酒服立愈一方以末隨左右嗅鼻效劉長春經驗方打撲瘀痕水調半夏末塗之一宿即沒也永類鈐方逺行足趼方同上集簡方金刃不出入骨脈中者半夏白斂等分為末酒服方寸匕日三服至二十日自出李荃大白經飛蟲入耳生半夏末麻油調塗耳門外本事方蝎蠆螫人半夏末水調塗之立止錢相公篋中方蝎瘻五孔被蝎傷五孔相通者用半夏為末水調塗之日二次痛自止無不效者太平聖惠方莖涎主治煉取塗髮眉墮落者即生雷斆蚤休本經下品釋名蚩休别録螫休日華紫河車圖經重臺唐本重樓金線唐本三層草綱目七葉一枝花蒙筌草甘遂唐本白甘遂時珍曰蟲蛇之毒得此治之即休故有蚤休螫休諸名重臺三層因其葉狀也金線重樓因其花狀也甘遂因其根狀也紫河車因其功用也集解别録曰蚤休生山陽川谷及寃句恭曰今謂重樓金線者是也一名重臺南人名為甘遂一莖六七葉似王孫鬼臼萞麻輩葉有二三層根如肥大菖蒲細肌脆白保升曰葉似鬼臼牡蒙年久者二三重根如紫參皮黃肉白五月采根日乾大明曰根如尺二蜈蚣大如肥紫菖蒲頌曰即紫河車也今河中河陽華鳳文州及江淮間亦有之葉似王孫鬼臼等作二三層六月開黃紫花蕊赤黃色上有金絲垂下秋結紅子根似肥薑皮赤肉白四月五月采之宗奭曰蚤休無旁枝止一莖挺生髙尺餘顛有四五葉葉有歧似苦杖中心又起莖亦如是生葉惟根入藥用時珍曰重樓金線處處有之生于深山隂濕之地一莖獨上莖當葉心葉緑色似芍藥凡二三層每一層七葉莖頭夏月開花一花七瓣有金絲蕊長三四寸王屋山産者至五七層根如鬼臼蒼术狀外紫中白有粘糯二種外丹家采制三黃砂永入藥洗切焙用俗諺云七葉一枝花深山是我家癰疽如遇者一似手拈拏是也根氣味苦微寒有毒大明曰冷無毒伏雄黃丹砂蓬砂及鹽主治驚癎搖頭弄舌熱氣在腹中本經癲疾癰瘡除蝕下三蟲去蛇毒别録生食一升利水唐本治胎風手足搐能吐泄瘰癧大明去瘧疾寒熱時珍發明恭曰摩醋傅􅏴腫蛇毒甚有效時珍曰紫河車足厥隂經藥也凡本經驚癎瘧疾瘰􅐇癰腫者宜之而道家有服食法不知果有益否也附方新五服食法紫河車根以竹刀刮去皮切作骰子大塊麵裹入瓷瓶中水煮候浮漉出凝冷入新布袋中懸風處待乾每服三丸五更初面東念呪井水下連進三服即能休糧若要飲食先以黑豆煎湯飲之次以藥丸煮稀粥漸漸食之呪曰天朗氣清金雞鳴吾今服藥欲長生吾今不飢復不渴賴得神仙草有靈小兒胎風手足搐搦用蚤休即紫河車為末每服半錢冷水下衛生易簡方慢驚發搐帶有陽證者白甘遂末即蚤休一錢栝樓根末二錢同于慢火上炒焦黃研勻每服一字煎麝香薄荷湯調下錢乙小兒方中鼠莽毒金線重樓根磨水服即愈集簡方咽喉穀賊腫痛用重臺赤色者川大黃炒木鱉子仁馬牙消半兩半夏炮一分為末蜜丸芡子大含之聖惠方鬼臼本經下品校正併入圖經璚田草釋名九臼本經天臼别録鬼藥綱目解毒别録爵犀本經馬目毒公本經害母草圖經羞天花綱目术律草綱目璚田草綱目獨腳蓮上宿本草獨荷草上宿山荷葉綱目旱荷綱目八角盤綱目唐婆鏡𢎞景曰鬼臼根如射干白而味甘九臼相連有毛者良故名時珍曰此物有毒而臼如馬眼故名馬目毒公殺蠱解毒故有犀名其葉如鏡如盤如荷而新苗生則舊苗死故有鏡盤荷蓮害母諸名蘇東坡詩集云璚田草俗號唐婆鏡即本草鬼臼也嵗生一臼如黃精根而堅瘦可以辟穀宋祁劔南方物贊云羞天花蜀地處處有之依莖綴花蔽葉自隱俗名羞天子改為羞寒花即本草鬼臼也贊云冒寒而茂莖修葉廣附莖作花葉蔽其上以其自蔽若有羞狀别有羞天草與此不同即海芋也集解别録曰鬼臼生九真山谷及寃句二月八月采根𢎞景曰鬼臼生山谷中八月采隂乾似射干术輩又似鉤吻有兩種出錢塘近道者味甘上有叢毛最勝出會稽吳興者大而味苦無叢毛力劣今馬目毒公狀如黃精根其臼處似馬眼而柔潤今方家多用鬼臼面少用毒公不知此那復乖越如此恭曰鬼臼生深山巖石之隂葉如萆麻重樓輩生一莖莖端一葉亦有兩歧者年長一莖莖枯則為一臼假令生來二十年則有二十臼豈惟九臼耶根肉皮鬚並似射干今俗用多是射干而江南别送一物非真者今荆州當陽縣硤州逺安縣襄州荆山縣山中並貢之亦極難得頌曰今江寧府滁舒商齊杭襄峽州荆門軍亦有之並如蘇恭所説花生莖間赤色三月開後結實又一説鬼臼生深山隂池葉六出或五出如鴈掌莖端一葉如繖旦時東向及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未常見日一年生一莖既枯則生一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也故俗名害母車如芋魁烏頭津亦然新苗生則舊苗死前年之臼腐矣而本草注謂全似射干今射干體狀雖相似然臼形淺薄與鬼臼大異鬼臼如八九箇南星側比相疊而色理正如射干用耆當使人求苗采之市中不復有也肘珍曰鬼臼根如天南星相疊芝狀故市人道謂小者為南星大者為鬼臼珠為謬誤按黃山谷集云唐婆鏡葉底開花俗名羞天花即鬼臼也嵗生一臼潘十二嵗則可為藥今方家乃以鬼燈檠為鬼臼誤矣又鄭樵通志云鬼臼葉如小荷形如鳥掌年長一莖莖枯則根為一臼亦名八角盤以其葉似之也據此二説則似是今人所謂獨腳蓮者也又名山荷葉獨荷草旱荷葉八角鏡南方處處深山隂密處有之北方惟龍門山王屋山有之一莖獨上莖生葉心而中空一莖七葉圓如初生小荷葉面青背紫揉其葉作瓜李香開花在葉下亦有無花者其根全似蒼术紫河車丹爐家采根制三黃砂汞或云其葉八角者更靈或云其根與紫河車一樣但以白色者為河車赤色者為鬼臼恐亦不然而庚辛玉册謂蚤休陽草旱荷隂草亦有分别陶𢎞景以馬目毒公與鬼臼為二物殊不知正是一物而有二種也又唐獨孤滔丹房鏡源云术律草有二種根皆似南星赤莖直上莖端生葉一種葉凡七瓣一種葉作數層葉似萞麻面青背紫而有細毛葉下附莖開一花狀如鈴鐸倒垂青白色黃蕊中空結黃子風吹不動無風自搖可制砂汞按此即鬼臼之二種也其説形狀甚明根氣味辛溫有毒别録曰微溫𢎞景曰甘溫有毒權曰苦之才曰畏垣衣主治殺蟲毒鬼疰精物辟惡氣不祥逐邪解百毒本經殺大毒療咳嗽喉結風邪煩惑失魄妄見去目中膚翳不入湯别録主尸疰殗殜勞疾傳尸瘦疾甄權下死胎治邪瘧癰疽蛇毒射工毒時珍發明頌曰古方治五尸鬼疰百毒惡氣多用之又曰今福州人三月采璚田草根葉焙乾搗末蜜丸服治風疾附方新三子死腹中胞破不生此方纍效救人嵗萬數也鬼臼不拘多少黃色者去毛為細末不用篩羅只撚之如粉為度每服一錢無灰酒一盞同煎八分通口服立生如神名一字神散婦人良方射工中人寒熱發瘡鬼臼葉一把苦酒漬搗取汁服一升日二次千金方黑黃急病黑黃面黑黃身如土色不妨食脈沉若青脈入口者死宜烙口中黑脈耳會玉泉章門心俞用生鬼臼搗汁一小盞服乾者為末水服三十六黃方射干本經下品釋名烏扇本經烏翣别録烏吹别録烏蒲本經鳳翼拾遺鬼扇土宿扁竹綱目仙人掌土宿紫金牛土宿野萱花綱目草薑别録黃逺吳普𢎞景曰射干方書多音夜頌曰射干之形莖梗疏長正如射之長竿之狀得名由此爾而陶氏以夜音為疑蓋古字音多通呼若漢官僕射主射事而亦音夜非有别義也時珍曰其葉叢生橫鋪一面如鳥翅及扇之狀故有烏扇烏翣鳳翼鬼扇仙人掌諸名俗呼扁竹謂其葉扁生而根如竹也根葉又如蠻薑故曰草薑扇翣音所甲切也集解别録曰射干生南陽山谷田野三月三日采根隂乾𢎞景曰此是烏翣根黃色庭臺多種之人言其葉是鳶尾而復有鳶頭此若相似爾恐非烏翣也又别有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城此不入藥用恭曰鳶尾葉都似射干而花紫碧色不抽髙莖根似髙良薑而肉白名鳶頭保升曰射干髙二三尺花黃實黑根多鬚皮黃黑肉黃赤所在皆有二月八月采根去皮日乾藏器曰射干鳶尾二物相似人多不分射干即人間所種為花草名鳳翼者葉如鳥翅秋生紅花赤點鳶尾亦人間所種苗低下於射干狀如鳶尾夏生紫碧花者是也大明曰射干根潤形似髙良薑大小赤黃色淡硬五六七八月采頌曰今在處有之人家種之春生苗髙一二尺葉大類蠻薑而狹長橫張疏如翅羽狀故名烏翣葉中抽莖似萱草莖而強硬六月開花黃紅色瓣上有細文秋結實作房中子黑色一説射干多生山崖之間其莖雖細小亦類木故荀子云西方有木名曰射干莖長四寸生於髙山之上是也陶𢎞景所説花白者自是射干之類震亨曰根為射干葉為烏翣紫花者是紅花者非杋曰按諸注則射干非一種有花白者花黃者花紫者花紅者丹溪獨取紫花者必曽試有驗也時珍曰射干即今扁竹也今人所種多是紫花者呼為紫蝴蝶其花三四月開六出大如萱花結房大如拇指頗似泡桐子一房四隔一隔十餘子子大如胡椒而色紫極硬咬之不破七月始枯陶𢎞景謂射干鳶尾是一種蘇恭陳藏器謂紫碧花者是鳶尾紅花者是射干韓保升謂黃花者是射干蘇頌謂花紅黃者是射干白花者亦其類朱震亨謂紫花者是射干紅花者非各執一説何以憑依謹按張揖廣雅云鳶尾射干也易通卦驗云冬至射干坐土宿真君本草云射干即扁竹葉扁生如側手掌形莖亦如之青緑色一種紫花一種黃花一種碧花多生江南湖廣川浙平陸間八月取汁煮雄黃伏雌黃制丹砂能拒火據此則鳶尾射干本是一類但花色不同正如牡丹芍藥菊花之類其色各異皆是同屬也大抵入藥功不相逺藏器曰射干之名有三佛經射干貂㩆此是惡獸似青黃狗食人能緣木阮公云射干臨層城者是樹殊有髙大者本草射干是草即今人所種者也根修治斆曰凡采根先以米泔水浸一宿漉出然後以䈽竹葉煮之從午至亥日乾用氣味苦平有毒别録曰微溫久服令人虛保升曰微寒權曰有小毒元素曰苦陽中隂也時珍曰寒多服瀉人主治咳逆上氣喉痺咽痛不得消息散結氣腹中邪逆食飲大熱本經療老血在心脾間咳唾言語氣臭散胸中熱氣别録苦酒摩塗毒腫𢎞景治疰氣消瘀血通女人月閉甄權消痰破癥結胸膈滿腹脹氣喘痃癖開胃下食鎮肝明目大明治肺氣喉痺為佳宗奭去胃中癰瘡元素利積痰疝毒消結核震亨降實火利大腸治瘧母時珍發明震亨曰射干屬金有木與火行太隂厥隂之積痰使結核自消甚捷又治便毒此足厥隂濕氣因疲勞而發取射干三寸與生薑同煎食前服利三兩行甚效時珍曰射干能降火故古方治喉痺咽痛為要藥孫真人千金方治喉痺有烏翣膏張仲景金匱玉函方治咳而上氣喉中作水雞聲有射干麻黃湯又治瘧母鱉甲煎丸亦用烏扇燒過皆取其降厥陽相火也火降則血散腫消而痰結自解癥瘕自除矣附方舊二新八咽喉腫痛射干花根山豆根隂乾為末吹之如神袖珍方傷寒咽閉腫痛用生射干豬脂各四兩合煎令焦去滓每噙棗許取瘥龎安常傷寒論喉痺不通漿水不入外臺祕要用射干一片含咽汁良或醫方大成用扁竹新根擂汁咽之大腑動即解醋研汁噙引涎出亦妙分便民方用紫蝴蝶根一錢黃芩生甘草桔梗各五為末水調頓服立愈名奪命散二便不通諸藥不效紫花扁竹根生水邉者佳研汁一盞服即通普濟水蠱腹大動搖水聲皮膚黑用鬼扇根搗汁服一杯水即下肘後方隂疝腫刺發時腫痛如刺用生射干搗汁與服取利亦可丸服肘後方乳癰初腫扁竹根如僵蠶者同萱草根為末蜜調傅之神效永類方中射工毒生瘡者烏翣升麻各二兩水三升煎二升溫服以滓傅瘡上集姚僧坦驗方鳶尾本經下品釋名烏園本經根名鳶頭時珍曰並以形命名烏園當作烏鳶集解别録曰烏鳶生九疑山谷五月采𢎞景曰方家言是射干苗而主療亦是當别是一種方用鳶頭當是其根療體相似而本草不題恭曰此草所在有之人家亦種葉似射干而濶短不抽長莖花紫碧色根似髙良薑皮黃肉白嚼之戟人咽喉與射干全别射干花紅抽莖長根黃有臼保升曰草名鳶尾根名鳶頭亦謂之鳶根葉似射干布地生黑根似髙良薑而節大數箇相連九月十月采根日乾時珍曰此即射干之苗非别一種也肥地者莖長根粗瘠地者莖短根瘦其花自有數色諸家皆是強分陳延之小品方言東海鳶頭即由跋者亦訛也東海出之故耳氣味苦平有毒恭曰有小毒主治蠱毒邪氣鬼疰諸毒破癥瘕積聚去水下三蟲本經殺鬼魅療頭眩别録附方舊一新一飛尸逰蠱著喉中氣欲絶者鳶尾根削去皮納喉中摩病處令血出為佳本陳藏器草拾遺鬼魅邪氣四物鳶頭散東海鳶頭黃牙即金牙莨菪子防葵為末酒服方寸匕欲令病人見鬼增防葵一分欲令知鬼又增一分立驗不可多服陳延之小品方玉簪綱目釋名白鶴仙時珍曰並以花象命名集解時珍曰玉簪處處人家栽為花草二月生苗成叢髙尺許柔莖如白菘其葉大如掌團而有尖葉上紋如車前葉青白色頗嬌瑩六七月抽莖莖上有細葉中出花朵十數枚長二三寸本小末大未開時正如白玉搔頭簪形又如羊肚蘑菰之狀開時微綻四出中吐黃蕊頗香不結子其根連生如鬼臼射干生薑輩有鬚毛舊莖死則根有一臼新根生則舊根腐亦有紫花者葉微狹皆鬼臼射干之屬根氣味甘辛寒有毒主治搗汁服解一切毒下骨硬塗癰腫時珍附方新五乳癰初起內消花即玉簪花取根擂酒服以渣傅之海上方婦人斷産白鶴仙根白鳳仙子各一錢半紫葳二錢半辰砂二錢搗末蜜和丸梧子大産內三十日以酒半盞服之不可著牙齒能損牙齒也摘玄方解斑蝥毒玉簮根擂水服之即解趙真人濟急方下魚骨哽玉簮花根山裏紅果根同搗自然汁以竹筒灌入咽中其骨自下不可著牙齒􅋯仙乾坤生意刮骨取牙玉簮根乾者一錢白砒三分白􅔈七分蓬砂二分威靈仙三分草烏頭一分半為末以少許點疼處即自落也余居士選竒方葉氣味同根主治蛇虺螫傷搗汁和酒服以渣傅之中心留孔泄氣時珍鳳仙綱目釋名急性子救荒旱珍珠綱目金鳳花綱目小桃紅救荒夾竹桃救荒海蒳音納染指甲草救荒菊婢時珍曰其花頭翅尾足具翹翹然如鳯狀故以名之女人采其花及葉包染指甲其實狀如小桃老則迸裂故有指甲急性小桃諸名宋光宗李后諱鳳宫中呼為好女兒花張宛丘呼為菊婢韋居呼為羽客集解時珍曰鳳仙人家多種之極易生二月下子五月可再種苗髙二三尺莖有紅白二色其大如指中空而脆葉長如尖似桃栁葉而有鋸齒丫間開花或黃或白或紅或紫或碧或雜色亦自變易狀如飛禽自夏初至秋盡開謝相續結實纍然大如櫻桃其形微長色如毛桃生青熟黃犯之即自裂皮卷如拳苞中有子似蘿蔔子而小褐色人采其肥莖汋􅀈以充萵笋嫩華酒浸一宿亦可食但此草不生蟲蠧蜂蝶亦不近恐亦不能無毒也子氣味微苦溫有小毒主治産難積塊噎膈下骨哽透骨通竅時珍發明時珍曰鳳仙子其性急速故能透骨軟堅庖人烹魚肉硬者投數粒即易軟爛是其驗也緣其透骨最能損齒與玉簪根同凡服者不可著齒也多用亦戟人咽附方新五産難催生鳳仙子二錢研末水服勿近牙外以萞麻子隨年數搗塗足心集簡方噎食不下鳳仙花子酒浸三宿晒乾為末酒丸緑豆大每服八粒溫酒下不可多用即急性子也摘玄方咽中骨哽欲死者白鳳仙子研水一大呷以竹筒灌入咽其物即軟不可經牙或為末吹之普濟方牙齒欲取金鳳花子研末入砒少許點疼牙根取之摘玄方小兒痞積急性子水葒花子大黃各一兩俱生研末每味取五錢外用皮消一兩拌勻將白鵓鴿一箇或白鴨亦可去毛屎剖腹勿犯水以布拭淨將末裝入內用線扎定沙鍋內入水三碗重重紙封以小火煮乾將鴿鴨翻調焙黃色冷定早辰食之日酉時疾軟三日大便下血病去矣忌冷物百日孫天仁集效方花氣味甘滑溫無毒主治蛇傷擂酒服即解又治腰脅引痛不可忍者研餅晒乾為末空心每酒服三錢活血消積時珍附方新一風濕卧床不起用金鳳花柏子仁朴消木瓜煎湯洗浴每日二三次內服獨活寄生湯精吳旻扶夀方根葉氣味苦甘辛有小毒主治雞魚骨哽誤吞銅鐵杖朴腫痛散血通經軟堅透骨時珍附方新三咽喉物硬金鳳花根嚼爛噙咽骨自下雞骨尤效即以溫水漱口免損齒也亦治誤吞銅鐵危氏得效方打杖腫痛鳳仙花葉搗如泥塗腫破處乾則又上一夜血散即愈冬月收取乾者研末水和塗之葉廷器通變要法馬患諸病白鳳仙花連根葉熬膏遇馬有病抹其眼四角上即汗出而愈衛生易簡方坐拏草宋圖經集解頌曰生江西及滁州六月開紫花結實采其苗入藥甚易得後因人用有效今頗貴重時珍曰按一統志云出吉安永豐縣氣味辛熱有毒主治風痺壯筋骨兼治打撲傷損蘇頌發明頌曰神醫普救方治風藥中已有用者時珍曰危氏得效方麻藥煮酒方中用之聖濟録治膈上虛熱咽喉噎塞小便赤澀神困多睡有坐拏丸用坐拏草大黃赤芍藥木香升麻麥門冬黃茋木通酸棗仁薏苡仁枳殼等分為末蜜丸梧子大每服二十丸麥門冬湯下附録押不蘆時珍曰按周密癸辛雜志云漠北回回地方有草名押不蘆土人以少許磨酒飲即通身麻痺而死加以刀斧亦不知至三日則以少藥投之即活御藥院中亦儲之貪官汚吏罪甚者則服百日丹皆用此也昔華他能刳腸滌胃豈不有此等藥耶曼陀羅花綱目釋名風茄兒綱目山茄子時珍曰法華經言佛説法時天雨曼陀羅花又道家北斗有陀羅星使者手執此花故後人因以名花曼陀羅梵言雜色也茄乃因葉形爾姚伯聲花品呼為惡客集解時珍曰曼陀羅生北土人家亦栽之春生夏長獨莖直上髙四五尺生不旁引緑莖碧葉葉如茄葉八月開白花凡六瓣壯如牽牛花而大攢花中折駢葉外包而朝開夜合結實圓而有丁拐中有小子八月采花九月采實花子氣味辛溫有毒主治諸風及寒濕腳氣煎湯洗之又主驚癎及脫肛并入麻藥時珍發明時珍曰相傳此花笑采釀酒飲令人笑舞采釀酒飲令人舞子常試之飲須半酣更令一人或笑或舞引之乃驗也八月采此花七月采火麻子花隂乾等分為末熱酒調服三錢少頃昏昏如醉割瘡灸火宜先服此則不覺苦也附方新三面上生瘡曼陀羅花晒乾研末少許貼之衛生易簡方小兒慢驚曼陀羅花七朵重一字天麻二錢半全蝎炒十枚天南星炮丹砂乳香各二錢半為末每服半錢薄荷湯調下方御藥院大腸脫肛曼陀羅子連殼一對橡斗十六箇同銼水煎三五沸入朴消少許洗之親儒門事羊躑躅本經下品釋名黃躑躅綱目黃杜鵑蒙筌羊不食草拾遺閙羊花綱目驚羊花綱目老虎花綱目玉枝别録𢎞景曰羊食其葉躑躅而死故名闡當作惱惱亂也集解别録曰羊躑躅生太行山川谷及淮南山三月采花隂乾𢎞景曰近道諸山皆有之花黃似鹿蔥不可近眼恭曰花亦不似鹿蔥正似旋花色黃者也保升曰小樹髙二尺葉似桃葉花黃似瓜花三月四月采花日乾頌曰所在有之春生苗似鹿蔥葉似紅花莖髙三四尺夏開花似凌霄花山石榴輩正黃色羊食之則死今嶺南蜀道山谷遍生皆深紅色如錦繡然或云此種不入藥時珍曰韓保升所説似桃葉者最的其花五出蕊瓣皆黃氣味皆惡蘇頌所謂深紅色者即山石榴名紅躑躅者無毒與此别類張揖廣雅謂躑躅一名決光者誤矣決光決明也按唐李紳文集言駱谷多山枇杷毒能殺人其花明艷與杜鵑花相似樵者識之其説似羊躑躅未知是否要亦其類耳花氣味辛溫有大毒權曰惡諸石及麵不入湯使伏丹砂􅔈砂雌黃畏巵子主治賊風在皮膚中淫淫痛溫瘧惡毒諸痺本經邪氣鬼疰蠱毒别録發明頌曰古之大方多用躑躅如胡洽治時行赤散及治五嗽四滿丸之類并治風諸酒方皆雜用之又治百病風濕等魯王酒中亦用躑躅花今醫方捋腳湯中多用之南方治蠱毒下血有躑躅花散云甚勝時珍曰此物有大毒曽有人以其根入酒飲遂至於斃也和劑局方治中風癱瘓伏虎丹中亦用之不多服耳附方新四風痰注痛躑躅花天南星並生時同搗作餅甑上蒸四五遍以稀葛囊盛之臨時取焙為末蒸餅丸梧子大每服三丸溫酒下腰腳骨痛空心服手臂痛食後服大良續傳信方痛風走注黃躑躅根一把糯米一盞黑豆半盞酒水各一碗徐徐服大吐大泄一服便能動也醫學集成風濕痺痛手足身體收攝不遂肢節疼痛言語蹇澀躑躅花酒拌蒸一炊久晒乾為末每以牛乳一合酒二合調服五分聖惠方風蟲牙痛躑躅一錢草烏頭二錢半為末化臘丸豆大綿包一丸咬之追涎海上仙方附録山躑躅時珍曰處處山谷有之髙者四五尺低者一二尺春生苗葉淺緑色枝少而花繁一枝數蕚二月始開花如羊躑躅而蒂如石榴花有紅者紫者五出者千葉者小兒食其花味酸無毒一名紅躑躅一名山石榴一名映山紅一名杜鵑花其黃色者即有毒羊躑躅也羊不喫草拾遺藏器曰生蜀川山谷葉細長在諸草中羊不喫者是也味苦辛溫無毒主一切風血補益攻諸病煮之亦浸酒服時珍曰此草似羊躑躅而云無毒蓋别有此也芫花本經下品校正自木部移入此釋名杜芫别録赤芫吳普去水本經毒魚别録頭痛花綱目兒草吳普敗華吳普根名黃大戟吳普蜀桑别録時珍曰芫或作杬其義未詳去水言其功毒魚言其性大戟言其似也俗人因其氣惡呼為頭痛花山海經云首山其草多芫是也集解别録曰芫花生淮源川谷三月三日采花隂乾普曰芫根生邯鄲二月生葉青色加厚則黑華有紫赤白者三月實落盡葉乃生三月采花五月采葉八月九月采根隂乾保升曰近道處處有之苗髙二三尺葉似白前及栁葉根皮黃似桑根正月二月花發紫碧色葉未生時收采日乾葉生花落即不堪用也頌曰在處有之宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根春生苗葉小而尖似楊栁枝葉二月開紫花頗似紫荆而作穗又似藤花而細今絳州出者花黃謂之黃芫花時珍曰顧野王玉篇云芫水出豫章煎汁藏果及卵不壞洪邁容齋隨筆云今饒州處處有之莖幹不純是木小人爭鬪者取葉挼擦皮膚輒作赤腫如被傷以誣人至和鹽擦卵則又染其外若赭色也修治𢎞景曰用當微熬不可近眼時珍曰芫花留數年陳久者良用時以好醋煮十數沸去醋以水浸一宿晒乾用則毒滅也或以醋炒者次之氣味根同辛溫有小毒别録曰苦微溫普曰神農黃帝雷公苦有毒扁鵲岐伯苦李當之有大毒多服令人泄之才曰決明為之使反甘草主治咳逆上氣喉鳴喘咽腫短氣蟲毒鬼瘧疝瘕癰腫殺蟲魚本經消胸中痰水喜唾水腫五水在五臟皮膚及腰痛下寒毒肉毒根療疥瘡可用毒魚别録治心腹脹滿去水氣寒痰涕唾如膠通利血脈治惡瘡風痺濕一切毒風四肢攣急不能行步甄權療咳嗽瘴瘧大明治水飲痰澼脅下痛時珍發明時珍曰張仲景治傷寒太陽證表不解心下有水氣乾嘔發熱而咳或喘或利者小青龍湯主之若表已解有時頭痛出汗惡寒心下有水氣乾嘔痛引兩脅或喘或咳者十棗湯主之蓋小青龍治未發散表邪使水氣自毛竅而出乃內經所謂開鬼門法也十棗湯驅逐裏邪使水氣自大小便而泄乃內經所謂潔淨府去陳莝法也夫飲有五皆由內啜水漿外受濕氣鬱蓄而為留飲流于肺則為支飲令人喘咳寒熱吐沫背寒流于肝則為懸飲令人咳唾痛引缺盆兩脅流于心下則為伏飲令人胸滿嘔吐寒熱眩運流于腸胃則為痰飲令人腹鳴吐水胸脅支滿或作泄㵼忽肥忽瘦流于經絡則為溢飲令人沉重注痛或作水氣胕腫芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之取效甚捷不可過劑泄人真元也陳言三因方以十棗湯藥為末用棗肉和丸以治水氣喘急浮腫之證蓋善變通者也楊士瀛直指方云破癖須用芫花行水後便養胃可也好古曰水者肺腎脾三經所主有五臟六腑十二經之部分上而頭中而四肢下而腰腳外而皮毛中而肌肉內而筋骨脈有尺寸之殊浮沉之别不可輕㵼當知病在何經何臟方可用之若誤投之則害深矣芫花與甘草相反而胡洽居士方治痰癖飲癖以甘遂大戟芫花大黃甘草同用蓋欲其大吐以泄濕因相反而相激也正誤慎微曰三國志云魏初平中有青牛先生常服芫花年百餘嵗常如五六十人時珍曰芫花乃下品毒物豈堪久服此方外迂怪之言不足信也附方舊五新一十九卒得咳嗽芫花一升水三升煮汁一升以棗十四枚煮汁乾日食五枚必愈肘後卒嗽有痰芫花一兩炒水一升煮四沸去滓白糖入半斤每服棗許勿食酸醎物偹張文仲急方喘嗽失音暴傷寒冷喘嗽失音取芫花連根一虎口切暴乾令病人以薦自裹舂令灰飛揚入其七孔中當眼冷出口鼻皆辣待芫根盡乃止病即愈古今録驗乾嘔脅痛傷寒有時頭痛心下痞滿痛引兩脅乾嘔短氣汗出不惡寒者表解裏未和也十棗湯主之芫花熬甘遂大戟各等分為散以大棗十枚水一升半煮取八合去渣納藥強人服一錢羸人半錢平旦服之當下利病除如不除明旦更服仲景傷寒論水腫支飲及癖飲用十棗湯加大黃甘草五物各一兩大棗十枚同煮如法服一方加芒消一兩胡洽百病方天行煩亂凝雪湯治天行毒病七八日熱積胸中煩亂欲死用芫花一斤水三升煮取一升半漬故布薄胸上不過再三薄熱則除當溫四肢護厥逆也千金方久瘧結癖在腹脅堅痛者芫花炒二兩硃砂五錢為末蜜丸梧子大每服十丸棗湯下直指水蠱脹滿芫花枳殼等分以醋煮芫花至爛乃下枳殼煮爛搗丸梧子大每服三十丸白湯下普濟方酒疸尿黃發黃心懊痛足脛滿芫花椒目等分燒末水服半錢日二服肘後背腿間痛一點痛不可忍者芫花根末米醋調傅之如不住以帛束之婦人産後有此尤宜袖珍諸般氣痛芫花醋煮半兩玄胡索炒一兩半為末每服一錢男子元臟痛蔥酒下瘧疾烏梅湯下婦人血氣痛當歸酒下諸氣痛香附湯下小腸氣痛茴香湯下仁存鬼胎癥瘕經候不通芫花根三兩銼炒黃為末每服一錢桃仁煎湯調下當利惡物而愈聖惠方催生去胎芫花根剝皮以綿裹點麝香套入隂穴三寸即下攝生妙用方産後惡物不下芫花當歸等分炒為末調一錢服保命集心痛有蟲芫花一兩醋炒雄黃一錢為末每服一字溫醋湯下乾坤生意牙痛難忍諸藥不效芫花末擦之令熱痛定以溫水潄之永類方白秃頭瘡芫花末豬脂和傅之集效方癰腫初起芫花末和膠塗之千金癰癤已潰芫花根皮搓作撚插入則不生合令膿易竭也集簡方痔瘡乳核芫根一握洗淨入木臼搗爛入少水絞汁於石器中慢火煎成膏將絲線於膏內度過以線繫痔當微痛候痔乾落以紙撚蘸膏納竅內去根當永除根也一方只搗汁浸線一夜用不得使水經驗瘰癧初起氣壯人用芫根擂水一盞服大吐利即平黃州陳大用所傳瀕湖集簡方便毒初起芫根擂水服以渣傳之得下即消黃州熊珍所傳瀕湖集簡方贅瘤焦法甘草煎膏筆粧瘤之四圍上三次乃用芫花大戟甘遂等分為末醋調别以筆粧其中勿近甘草次日縮小又以甘草膏粧小暈三次如前仍上此藥自然焦縮危氏得效方一切菌毒因蛇蟲毒氣熏蒸所致用芫花生研新汲水服一錢以利為度危氏得效方蕘花音饒品本經下釋名時珍曰蕘者饒也其花繁饒也集解别録曰蕘花生咸陽川谷及河南中牟六月采花隂乾𢎞景曰中牟者時從河上來形似芫花而極細白色恭曰苗似胡荽莖無刺花細黃色四月五月收與芫花全不相似也保升曰所在有之以雍州者為好生岡原上苗髙二尺許宗奭曰今京洛間甚多時珍曰按蘇頌圖經言絳州所出芫花黃色謂之黃芫花其圖小株花成簇生恐即此蕘花也生時色黃乾則如白故陶氏言細白也或言無蕘花以桃花代之取其利耳氣味苦寒有毒别録曰辛微寒有毒主治傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌胸中留癖飲食寒熱邪氣利水道本經療痰飲咳嗽别録治咳逆上氣喉中腫滿疰氣蠱毒痃癖氣塊甄權發明宗奭曰張仲景傷寒論以蕘花治利者取其行水也水去則利止其意如此今用之當斟酌不可過使與不及也須有是證乃用之好古曰仲景小青龍湯云若微利去麻黃加蕘花如雞子大熬令赤色用之蓋利水也時珍曰蕘花蓋亦芫花之類氣味主治大略相近醉魚草綱目釋名閙魚花綱目魚尾草綱目樚木集解時珍曰醉魚草南方處處有之多在塹岸邉作小株生髙者三四尺根狀如枸杞莖似黃荆有微稜外有薄黃皮枝易繁衍葉似水楊對節而生經冬不凋七八月開花成穗紅紫色儼如芫花一樣結細子漁人采花及葉以毒魚盡圉圉而死呼為醉魚兒草池沼邉不可種之此花色狀氣味並如芫花毒魚亦同但花開不同時為異爾按山海經云熊耳山有草焉其狀如蘇而赤華名曰葶䔭可以毒魚其此草之類與花葉氣味辛苦溫有小毒主治痰飲成齁遇寒便發取花研末和米粉作粿炙熟食之即效又治誤食石斑魚子中毒吐不止及諸魚骨鯁者搗汁和冷水少許咽之吐即止骨即化也久瘧成癖者以花填鯽魚腹中濕紙裹煨熟空心食之仍以花和海粉搗貼便消時珍莽草本草下品校正自木部移入此釋名菵草音罔芒草山海經鼠莽𢎞景曰莽本作菵字俗訛呼爾時珍曰此物有毒食之令人迷罔故名山人以毒鼠謂之鼠莽正誤别録曰一名葞一名春草禹錫曰按爾雅云葞春草孫炎注云藥草也俗呼為菵草郭璞注云一名芒草所見異也時珍曰葞音尾白薇也薇葞字音相近爾别録白薇下云一名春草而此又以為菵草蓋因孫炎之誤也今正之集解别録曰莽草生上谷山谷及寃句五月采葉隂乾𢎞景曰今東間處處皆有葉青辛烈者良又用搗以和陳粟米粉納水中魚吞即死浮出人取食之無妨頌曰今南中州郡及蜀川皆有之木若石南而葉稀無花實五月七月采葉隂乾一説藤生繞木石間既謂之草乃藤生者是也宗奭曰莽草諸家皆謂之草而本草居木部今世所用皆木葉如石南葉枝梗乾則皺揉之其臭如椒斆曰凡用葉勿用尖及攣生者時珍曰范子計然云莽草出三輔青色者善葉修治斆曰凡使取葉細銼以生甘草水蓼二味同盛入生稀絹袋中甑中蒸一日去二件煞乾用氣味辛溫有毒普曰神農辛雷公桐君苦有毒時珍曰莽草制雌黃雄黃而有毒誤食害人惟紫河車磨水服及黑豆煮汁服可解豆汁澆其根即爛性相制也主治風頭癰腫乳癰疝瘕除結氣疥瘙殺蟲魚本經療喉痺不通乳難頭風癢可用沭勿令入眼别録治風疽疝氣腫墜凝血治瘰癧除濕風不入湯服主頭瘡白秃殺蟲與白斂赤小豆為末雞子白調如糊㶸毒腫乾更易上甄權治皮膚麻痺煎濃湯淋風蟲牙痛大明發明頌曰古方治風毒痺厥諸酒皆用菵草今醫家取葉煎湯熱含少頃吐之治牙齒風蟲及喉痺甚效宗奭曰濃煎湯淋泄皮膚麻痺周禮煎氏掌除􅀢物以菵草熏之則死時珍曰古方治小兒傷寒有莽草湯又瑣碎録云思村王氏之子生七日而兩腎縮入二醫云此受寒氣而然也以硫黃茱萸大蒜研塗其腹以菵草蛇床子燒煙熏其下部而愈也附方舊四新五賊風腫痺風入五臟恍惚宜莽草膏主之莽草一斤烏頭附子躑躅各二兩切以水和醋一升漬一宿豬脂一斤煎三上三下絞去滓向火以手摩病上三百度應手即瘥若耳鼻疾可以綿裹塞之疥癬雜瘡並宜摩之肘後小兒風癎掣瘲戴眼極者日數十發又治大人賊風莽草雷丸各一雞子黃大化豬脂一斤煎七沸去滓摩痛處勿近目及隂日凡三四次外臺祕要頭風久痛莽草煎湯沐之勿令入目聖惠方風蟲牙痛肘後方用莽草煎湯熱漱冷吐芫一加山椒皮椒一加獨活分一加郁李仁吐一加花一加川細辛各等煎湯熱漱冷為聖惠用莽草半兩皂角三挺去皮子漢椒七粒末棗肉丸芥子大每以一丸塞孔中吐涎取效瘰癧結核菵草一兩為末雞子白調塗帛上貼之日二易取效止聖惠方癰瘡未潰方同上得痛為良乳腫不消莽草小豆等分為末苦酒和傅之衛生易簡狗咬昏悶浸椒水調莽草末傅之便民圖纂茵芋本經下品釋名莞草别録卑共别録時珍曰茵芋本作因預未詳其義莞草與莆莞名同集解别録曰茵蕷生太山川谷三月三日采葉隂乾𢎞景曰好者出彭城今近道亦有莖葉狀似莽草而細軟連細莖采之方用甚稀惟合療風酒大明曰出自海鹽形似石南樹生葉厚五六七月采頌曰今雍州絳州華州杭州亦有之春生苗髙三四尺莖赤葉似石榴而短厚又似石南葉四月開細白花五月結實三月四月七月采莖葉日乾莖葉氣味苦溫有毒别録曰微溫有毒權曰苦辛有小毒主治五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痺痛本經療久風濕走四肢腳弱别録治男子女人軟腳毒風拘急攣痛甄權一切冷風筋骨怯弱羸顫入藥炙用大明發明時珍曰千金外臺諸古方治風癎有茵蕷丸治風痺有茵蕷酒治婦人産後中風有茵蕷膏風濕諸方多用茵蕷石南莽草皆古人也治風妙品而近世罕知亦醫家疏缺附方舊一新二茵蕷酒治賊風手足枯痺拘攣用茵蕷附子天雄烏頭秦艽女萎防風防己石南葉躑躅花細辛桂心各一兩十二味切以絹袋盛清酒一斗漬之冬七夏三春秋五日藥成每服一合日二服以微痛為度方出胡治居士百病方圖經本草茵芋丸治風氣積滯成腳氣發則痛者茵芋葉炒薏苡仁各半兩郁李仁一兩牽牛子三兩生研末半兩右為末煉蜜丸如梧子大每服二十丸五更薑棗湯下取利未利再服取快本事方産後中風茵芋五兩木防己半斤苦酒九升漬一宿豬脂四斤煎三上三下膏成每服熱摩千遍千金方石龍芮本經中品校正併入菜部水堇釋名地椹本經天豆别録石能别録魯果能别録水堇吳普音謹又音芹苦堇爾雅堇葵郭璞胡椒菜救荒彭根别録𢎞景曰生于石上其葉芮芮短小故名恭曰實如桑椹故名地椹禹錫曰爾雅云齧苦堇也郭璞云即苦堇也本草言味甘而此云苦者古人語倒猶甘草謂之大苦也時珍曰芮芮細兒其椹之子細芮故名地椹以下皆子名也水堇以下皆苗名也苗作蔬食味辛而滑故有椒葵之名唐本草菜部水堇係重出今依吳普本草合併為一集解别録曰石龍芮生大山川澤石邉五月五日采子二月八月采皮隂乾𢎞景曰今出近道子形粗似蛇牀子而扁非真好者人言是災菜子也東山石上所生者其葉芮芮短小其子狀如葶藶黃色而味小辛此乃是真也恭曰今用者俗名水堇苗似附子實如桑椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者陶以細者為真未為通論又曰堇菜野生非人所種葉似蕺花紫色藏器曰爾雅云芨堇草注云烏頭苗也蘇恭注天雄亦云石龍芮葉似堇草故名水堇據此則堇草是烏頭苗水堇定是石龍芮更非别草也頌曰今惟出兖州一叢數莖莖青紫色每莖三葉其葉短小多刻缺子如葶􅐗而色黃蘇恭所説乃水堇非石龍芮也兖州所生者正與本草及陶氏説合為得其真宗奭曰石龍芮有兩種水中生者葉光而子圓陸地生者葉毛而子鋭入藥須水生者陸生者又謂之天灸而補不足莖冷失精時珍曰蘇恭言水堇即石龍芮蘇頌非之非矣按漢吳普本草石龍芮一名水堇其説甚明唐本草菜部所出水堇言其苗也本經石龍芮言其子也寇宗奭所言陸生者乃是毛華有大毒不可食水堇即俗稱胡椒菜者處處有之多生近水下濕地髙者尺許其根如薺二月生苗叢生圓莖分枝一枝三葉葉青而光滑有三尖多細缺江淮人三四月采苗瀹過晒蒸黑色為蔬四五月開細黃花結小實大如豆狀如初生桑椹青緑色搓散則子甚細如葶藶子即石龍芮也宜半老時采之范子計然云石龍芮出三輔色黃者善子根皮同氣味苦平無毒普曰神農苦平岐伯酸扁鵲大寒雷公醎無毒之才曰大戟為之使畏茱萸蛇蛻皮主治風寒濕痺心腹邪氣利關節止煩滿久服輕身明目不老本經平腎胃氣補隂氣不足失精莖冷令人皮膚光澤有子别録逐諸風除心熱燥大明發明時珍曰石龍芮乃平補之藥古方多用之其功與枸杞覆盆子相埒而世人不知用何哉水堇氣味甘寒無毒時珍曰微辛苦澀主治搗汁洗馬毒瘡并服之又塗蛇蝎毒及癰腫唐本久食除心下煩熱主寒熱鼠瘻瘰􅐇生瘡結核聚氣下瘀血止霍亂又生搗汁半升服能殺鬼毒即吐出孟詵發明詵曰堇葉止霍亂與香茙同功香茙即香薷也附方舊二新一結核氣堇菜日乾為末油煎成膏摩之日三五度便瘥孟詵食糜蛇咬傷瘡生堇杵汁塗之萬畢術血疝初起胡椒菜葉挼按揉之集簡方毛茛音艮拾遺校正併入毛建草釋名毛建草拾遺水茛綱目毛堇音芹天灸衍義自灸綱目猴蒜時珍曰茛乃草烏頭之苗此草形狀及毒皆似之故名肘後方謂之水茛又名毛建亦茛字音訛也俗名毛堇似水堇而有毛也山人截瘧采葉挼貼寸口一夜作泡如火燎故呼為天灸自灸集解藏器曰陶注鉤吻云或是毛茛蘇恭云毛茛是有毛石龍芮也有毒與鉤吻無干葛洪百一方云菜中有水茛葉圓而先生水旁有毒蟹多食之人誤食之狂亂如中風狀或吐血以甘草汁解之又曰毛建草生江東地田野澤畔葉如芥而大上有毛花黃色子如蒺藜時珍曰毛建毛茛即今毛堇也下濕處即多春生苗髙者尺餘一枝三葉葉有三尖及細缺與石龍芮莖葉一樣但有細毛為别四五月開小黃花五出甚光艷結實狀如欲綻青桑椹如有尖峭與石龍芮子不同人以為鵝不食草者大誤也方士取汁煮砂伏硫沈存中筆談所謂石龍芮有兩種水生者葉光而末圓陸生者葉毛而末鋭此即葉毛者宜辨之附録海薑隂命藏器曰陶注鉤吻云海薑生海中赤色狀如石龍芮有大毒又曰隂命生海中赤色著木懸其子有大毒今無的識者葉及子氣味辛溫有毒主治惡瘡癰腫疼痛未潰搗葉傅之不得入瘡令肉爛又患瘧人以一握微碎縛於臂上男左女右勿令近肉即便成瘡和薑搗塗腹破冷氣藏器牛扁本經下品釋名扁特唐本扁毒唐夲集解别録曰牛扁生桂陽川谷𢎞景曰今人不復識此恭曰此藥似堇草石龍芮輩根如秦芃而細生平澤下地田野人名為牛扁療牛虱甚太常名扁特或名扁毒保升曰今出寧州葉似石龍芮附子等二月八月采根日乾頌曰今潞州一種便特六月有花八月結實采其根苗搗末油調殺蟣虱主療大都相似疑即扁特也但聲近而字訛耳氣味苦微寒無毒主治身皮瘡熱氣可作浴湯殺牛虱小蟲又療牛病本經附録虱建草拾遺藏器曰苦無毒主蟣虱挼汁沐頭虱盡死人有誤吞虱成病者搗汁服一小合亦主諸蟲瘡生山足濕地發葉似山丹微赤髙一二尺又有水竹葉生水中葉如竹葉而短小可生食亦去蟣虱蕁麻蕁音燖宋圖經釋名毛蕁時珍曰蕁字本作蕁杜子美有除蕁草詩是也集解頌曰蕁麻生江寧府山野中時珍曰川黔諸處甚多其莖有刺髙二三尺葉似花桑或青或紫背紫者入藥上有毛芒可畏觸人如蜂蠆螫蠚以人溺濯之即解有花無實冒冬不凋挼投水中能毒魚氣味辛苦寒有大毒吐利人不止主治蛇毒搗塗之蘇頌風疹初起以此點之一夜皆失時珍格注草唐本草集解恭曰出齊魯山澤間葉似蕨根紫色若紫草根一株有二十許二月八月采根五月六月采苗日乾用氣味辛苦溫有大毒主治蠱痊諸毒疼痛等唐本海芋綱目釋名觀音蓮綱目羞天草玉册天荷綱目隔河仙見下集解時珍曰海芋生蜀中今亦處處有之春生苗髙四五尺大葉如芋葉而有幹夏秋間抽莖開花如一瓣蓮花碧色花中有藥長作穗如觀音像在圓光之狀故俗呼為觀音蓮方士號為隔河仙云可變金其根似芋魁大者如升碗長六七寸蓋野芋之類也庚辛玉册云羞天草隂草也生江廣深谷澗邉其葉極大可以禦雨葉背紫色花如蓮花根葉皆有大毒可煆粉霜硃砂小者名野芋宋祁海芋贊云木幹芋葉擁腫盤戾農經弗載可以治癘氣味辛有大毒主治瘧瘴毒腫風癩伏􅔈砂時珍附録透山根時珍曰按岣嶁神書云透山根生蜀中山谷草類蘼蕪可以點鐵成金昔有人采藥誤研此草刀忽黃軟成金也又庚辛玉册云透山根出武都取汁點鐵立成黃金有大毒人誤食之化為紫水又有金英草亦生蜀中狀如馬齒莧而色紅摸鐵成金亦有大毒入口殺人須臾為紫水也又何逺春渚紀聞云劉均父吏部罷官歸成都有水銀一篋過峽篋漏急取渡旁叢草塞之久而開視盡成黃金矣宋初有軍士在澤州澤中割馬草歸鐮皆成金以草燃釡亦成黃金又臨安僧法堅言有客過於潛山中見一蛇腹脹囓一草以腹磨之而消念此草必能消脹取置篋中夜宿旅館聞鄰房有人病腹脹呻吟以釡煎藥一杯與服頃之不復聞聲念已安矣至旦視之其人血肉俱化為水獨骸骨在牀爾視其釡則通體成金矣觀何氏所載即是透山根乃金英草之類如此毒草不可不知故備載之耳鉤吻本經下品釋名野葛本經毒根吳普胡蔓草圖經斷腸草綱目黃藤綱目火把花𢎞景曰言其入口則鉤人喉吻也或言吻當作挽字牽挽人腸而絶之也時珍曰此草雖名野葛非葛根之野者也或作冶葛王充論衡云冶地名也在東南其説甚通廣人謂之胡蔓草亦曰斷腸草入人畜腹內即粘腸上半日則黑爛又名爛腸草滇人謂之火把花因其花紅而性熱如火也嶽州謂之黃藤集解時珍曰鉤吻生傅髙山谷及會稽東野折之青煙出者名固活二月八月采普曰秦鉤吻一名除辛生南越山及寒石山或益州葉如葛赤莖大如箭而方根黃色正月采之恭曰野葛生桂州以南村墟閭巷間皆有彼人通名鉤吻亦謂苗為鉤吻根名野葛蔓生其葉如柿其根新采者皮白骨黃宿根似地骨嫩根如漢防己皮節斷者良正與白花藤相類不深别者頗亦惑之新者折之無塵氣經年以後則有塵起從骨之細孔中出今折枸杞根亦然夲草言折之青煙起者名固活為良亦不達之言也人誤食其葉者致死而羊食其苗大肥物有相伏如此博物志云鉤吻蔓生葉似鳬葵是也時珍曰嵇含南方草木狀云野葛蔓生葉如羅勒光而厚一名胡蔓草人以雜生蔬中毒人半日輒死假成式酉陽雜俎云胡蔓草生雍州容州之間叢生花扁如巵子而稍大不成朵色黃白其葉稍黑又按嶺南衛生方云胡蔓草葉如荼其花黃而小一葉入口百竅潰血人無復生也時珍又訪之南人云鉤吻即胡蔓草今人謂之斷腸草是也蔓生葉圓而光春夏嫩苗毒甚秋冬枯老稍緩五六月開花似櫸栁花數十朵作穗生嶺南者花黃生滇南者花紅呼為火把花此數説皆與吳普蘇恭説相合陶𢎞景等别生分辨並正于下正誤𢎞景曰五符經亦言鉤吻是野葛核事而言似是兩物野葛是根狀如牡丹所生處亦有毒飛鳥不得集今人用合膏服之無嫌鉤吻别是一物葉似黃精而莖紫當心抽花黃色初生極類黃精故人采多感之遂致死生之反或云鉤吻是毛茛參錯不同未詳云何斆曰凡使黃精勿用鉤吻真似黃精只是葉有毛鉤子二個黃精葉似竹葉又曰凡使鉤吻勿用地精莖苗相同鉤吻治人身上惡毒瘡其地精殺人也恭曰鉤吻蔓生葉如柿陶言飛鳥不集者妄也黃精直生葉似栁及龍膽草殊非比類毛茛乃有毛石龍芮與鉤吻何干頌曰江南人説黃精莖苗稍類鉤吻但鉤吻葉頭極大而根細與蘇恭所説不同恐南北之産異也禹錫曰陶説鉤吻似黃精者當是蘇説似柿葉者别是一物也又言苗名鉤吻根名野葛者亦非通論時珍曰神農本草鉤吻一名野葛一句已明草木狀又名胡蔓草顯是藤生吳普蘇恭所説正合本文陶氏以藤生為野葛又指小草為鉤吻復疑是毛茛乃祖雷斆之説諸家遂無定見不辨其蔓生小草相去逺也然陶雷所説亦是一種有毒小草但不得指為鉤吻爾昔天姥對黃帝言黃精益夀鉤吻殺人乃是以二草善惡比對而言陶氏不審疑是相似遂有此説也餘見黃精下氣味辛溫大有毒普曰神農辛雷公有毒殺人時珍曰其性大熱本草毒藥止云有大毒此獨變文曰大有毒可見其毒之異常也之才曰半夏為之使惡黃芩主治金瘡乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒本經破癥積除腳膝痺痛四肢拘攣惡瘡疥蟲殺鳥獸搗汁入膏中不入湯飲别録主喉痺咽塞聲音變吳普發明藏器曰鉤吻食葉飲冷水即死冷水發其毒也彼土毒死人懸尸樹上汁滴地上生菌子收之名菌藥烈於野葛也蕹菜搗汁解野葛毒取汁滴野葛苗即萎死南人先食蕹菜後食野葛二物相伏自然無苦魏武帝噉野葛至尺先食此菜也時珍曰按李石續博物志云胡蔓草出二廣廣人負債急每食此草而死以誣人以急水吞即死急慢水吞死稍緩或取毒蛇殺之覆以此草澆水生菌為毒藥害人葛洪肘後方云凡中野葛毒口不可開者取大竹筒洞節以頭拄其兩脅及臍中灌冷水入筒中數易水須臾口開乃可下藥解之惟多飲甘草汁人屎汁白鴨或白鵝斷頭瀝血入口中或羊血灌之嶺南衛生方云即時取雞卵抱未成雛者研爛和麻油灌之吐出毒物乃生稍遲即死也本草綱目卷十七下
