body:
  text: 本草綱目卷十九明李時珍撰草之八水草類二十二種內附四種澤瀉本經上品釋名水瀉本經鵠瀉本經及瀉别録蕍音俞芒芋别録禹孫珍曰去水曰瀉如澤水之瀉也禹能治水故曰禹孫餘未詳集解别録曰澤瀉生汝南池澤五月采葉八月采根九月采實隂乾𢎞景曰汝南郡屬豫州今近道亦有不堪用惟用漢中南鄭青州代州者形大而長尾間必有兩岐為好此物易朽蠧常須密藏之叢生淺水中葉狹而長恭曰今汝南不復采惟以涇州華州者為善頌曰今山東河陜江淮亦有之漢中者為佳春生苗多在淺水中葉似牛舌獨莖而長秋時開白花作叢似穀精草秋末采根暴乾根修治斆曰不計多少細銼酒浸一宿取出暴乾任用氣味甘寒無毒别録曰鹹權曰苦元素曰甘平沉而降隂也杲曰甘鹹寒降隂也好古曰隂中微陽入足太陽少隂經扁鵲曰多服病人眼之才曰畏海蛤文蛤主治風寒濕痺乳難養五臟益氣力肥健消水久服耳目聰明不飢延年輕身面生光能行水上本經補虛損五臟痞滿起隂氣止泄精消渴淋瀝逐膀胱三焦停水别録主腎虛精自出治五淋宣通水道甄權主頭旋耳虛鳴筋骨攣縮通小腸止尿血主難産補女人血海令人有子大明入腎經去舊水養新水利小便消腫脹滲泄止渴元素去脬中留垢心下水痞李杲滲濕熱行痰飲止嘔吐瀉痢疝痛腳氣時珍發明頌曰素問治酒風身熱汗出用澤瀉术深師方治支飲亦用澤瀉术但煮法小别耳張仲景治雜病心下有支飲苦冒有澤瀉湯治傷寒有大小澤瀉湯五苓散輩皆用澤瀉行利停水為最要藥元素曰澤瀉乃除濕之聖藥入腎經治小便淋瀝去隂間汗無此疾服之令人目盲宗奭曰澤瀉之功長於行水張仲景治水蓄渴煩小便不利或吐或瀉五苓散主之方用澤瀉故知其長於行水本草引扁鵲云多服病人眼誠為行去其水也凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用之仲景八味九用之者亦不過引接桂附等歸就腎經别無他意好古曰本經云久服明目扁鵲云多服昏目何也易老云去脬中留垢以其味鹹能瀉伏水故也瀉伏水去留垢故明目小便利腎氣虛故昏目王履曰寇宗奭之説王好古韙之切謂八味丸以地黃為君餘藥佐之非止補血兼補氣也所謂陽旺則能生隂血也地黃山茱萸茯苓牡丹皮皆腎經之藥附子官桂乃右腎命門之藥皆不待澤瀉之接引而后至也則八味丸之用此蓋取其瀉腎邪養五臟益氣力起隂氣補虛損五勞之功而已雖能瀉腎從于諸補藥羣衆之中則亦不能瀉矣時珍曰澤瀉氣平味甘而淡淡能滲泄氣味俱薄所以利水而泄下脾胃有濕熱則頭重而目昏耳鳴澤瀉滲去其濕則熱亦隨去而上氣得令清氣上行天氣明爽故澤瀉有養五臟益氣力治頭旋聰明耳目之功若久服則降令太過清氣不升真隂潛耗安得不目昏耶仲景地黃丸用茯苓澤瀉者乃取其瀉膀胱之邪氣非引接也古人用補藥必兼瀉邪邪去則補藥得力一闢一闔此乃玄妙后世不知此理專一于補所以久服必至偏勝之害也正誤𢎞景曰仙經服食斷穀皆用之亦云身輕能步行水上頌曰仙方亦單服澤瀉一物搗篩取末水調日分服六兩百日體輕而健行時珍曰神農書列澤瀉于上品復云久服輕身面生光能行水上典術云澤瀉久服令人身輕日行五百里走水上一名澤芝陶蘇皆以為信然愚切疑之澤瀉行水瀉腎久服且不可又安有此神功耶其謬可知附方舊一新五酒風汗出素問黃帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名酒風治之以澤㵼白术各三五分麋銜五分合以三指撮為度服後飯後飯者先服藥也見十五卷薇御發明條內水濕腫脹白术澤㵼各一兩為末或為丸每服三錢茯苓湯下保命集冒暑霍亂小便不利頭運引飲三白散用澤瀉白木白茯苓各三錢水一盞薑五片燈心十莖煎八分溫服支飲苦冒仲景澤瀉湯用澤瀉五兩白术二兩水二升煮一升分二服深師方先以水二升煮二物取一升又以水一升煮澤瀉取五合二汁分再服病甚欲眩者服之必瘥腎臟風瘡澤瀉皂莢水煮爛焙研煉蜜丸如梧子大空心溫酒下十五丸至二十丸經驗方瘧後怪症口鼻中氣出盤旋不散凝如黑蓋色過十日漸至肩與肉相連堅勝金石無由飲食煎澤瀉湯日飲三盞連服五日愈夏子益竒疾方葉氣味鹹平無毒主治大風乳汁不出産難強隂氣久服輕身别録壯水臟通血脈大明實氣味甘平無毒主治風痺消渴益腎氣強隂補不足除邪濕久服面生光令人無子别録發明時珍曰别録言澤瀉葉及實強隂氣久服令人無子而日華子言澤瀉催生補女人血海令人有子似有不同既云強隂何以令人無子既能催生何以令人有子蓋澤瀉同補藥能逐下焦濕熱邪垢邪氣既去隂強海淨謂之有子可也若久服則腎氣大泄血海反寒謂之無子可也所以讀書不可執一附録酸惡别録有名未用曰主惡瘡去白蟲生水旁狀如澤瀉蔛草唐本草釋名蔛菜恭蔛榮集解恭曰蔛菜所在有之生水旁葉似澤瀉而小花青白色亦堪蒸啖江南人用蒸魚食甚美五六月采莖暴乾用氣味甘寒無毒主治暴熱喘息小兒丹腫恭羊蹄本經下品釋名蓄經秃菜𢎞景敗毒菜綱目牛舌菜同羊蹄大黃庚辛玉册鬼目本經東方宿同連蟲陸同水黃芹俗子名金蕎麥𢎞景曰今人呼為秃菜即蓄字音訛也時珍曰羊蹄似根名牛舌以葉形名秃菜以治秃瘡名也詩小雅云言采其蓫陸機注云蓫即蓄字今之羊蹄也幽州人謂之蓫根似長蘆蔔而莖赤亦可瀹為茹滑美鄭樵通志指蓫為爾雅之菲及蕢者誤矣金蕎麥以相似名集解别録曰羊蹄生陳留川澤保升曰所在有之生下濕地春生苗髙者三四尺葉狹長頗似萵苣而色深莖節間紫赤開青白花成穗結子三稜夏中即枯根似牛蒡而堅實宗奭曰葉如菜中波稜但無岐而色差青白葉厚花與子亦相似葉可潔擦䃋石子名金蕎麥燒煉家用以制鉛汞時珍曰近水及濕地極多葉長尺餘似牛舌之形不似波稜入夏起薹開花結子花葉一色夏至即枯秋深即生凌冬不死根長近尺赤黃色如大黃胡蘿蔔形根氣味苦寒無毒恭曰辛苦有小毒時珍曰能制三黃砒石丹砂水銀主治頭秃疥瘙除熱女子隂蝕本經浸淫疽痔殺蟲别録療蠱毒恭治癬殺一切蟲醋磨貼腫毒大明搗汁二三匙入水半盞煎之空腹溫服治産後風祕殊驗宗奭發明震亨曰羊蹄根屬水走血分頌曰新采者磨醋塗癬速效亦煎作丸服采根不限多少搗絞汁一大升白蜜半斤同熬如稠餳更用防風末六兩搜和令可丸丸如梧子大用栝樓甘草煎酒下三二十丸日二三服附方舊六新七大便卒結羊蹄根一兩水一大盞煎六分溫服聖惠方腸風下血敗毒菜根洗切用連皮老薑各半盞同炒赤以無灰酒淬之碗蓋少頃去滓任意飲永類方喉痺不語羊蹄獨根者勿見風日及婦人雞犬以三年醋研如泥生布拭喉外令赤塗之千金方面上紫塊如錢大或滿面俱有野大黃四兩取汁穿山甲十片燒存性川椒末五錢生薑四兩取汁和研生絹包擦如乾入醋潤濕數次如初纍效陸氏積德堂方癧瘍風駁羊蹄草根于生鐵上磨好醋旋旋刮塗硫黃少許更妙日日用之聖惠汗斑癜風羊蹄根二兩獨科掃帚頭一兩枯礬五錢輕粉一錢生薑半兩同杵如泥以湯澡浴用手抓患處起粗皮以布包藥著力擦之暖臥取汗即愈也乃鹽山劉氏方比用硫黃者更妙藺氏經驗方頭風白屑羊蹄草根杵同羊膽汁塗之永除聖惠方頭上白秃獨根羊蹄勿見婦女雞犬風日以陳醋研如泥生布擦赤傅之日一次肘後癬久不瘥簡要濟衆方用羊蹄根杵絞汁入輕粉少許和如膏塗之三五次即愈搗永類方治癬經年者敗毒菜根獨生者即羊蹄根三錢入川百藥煎二錢白梅肉擂勻以井華水一盞濾汁澄清天明空心服之不宜食熱物其滓抓破擦之三次即愈千金方治細癬用羊蹄根五斤桑柴灰煮四五沸取汁洗之仍以羊蹄汁和礬末塗之漏瘤濕癬浸濕日廣癢不可忍愈後復發出黃水羊蹄根搗和大醋洗淨塗上一時以冷水洗之日一次疥瘡有蟲羊蹄根搗和豬脂入鹽少許日塗之外臺祕要葉氣味甘滑寒無毒主治小兒疳蟲殺胡夷魚鮭魚檀胡魚毒作菜多食滑大腑大明時珍曰胡夷鮭魚皆河豚名檀胡未詳作菜止癢不宜多食令人下氣詵連根爛蒸一碗食治腸痔瀉血甚效時珍附方舊一縣癰舌腫咽生息肉羊蹄草煮汁熱含冷即吐之聖惠實氣味苦澀平無毒主治赤白雜痢恭婦人血氣時珍酸模日華釋名山羊蹄綱目山大黃拾遺薞蕪爾雅酸母綱目蓚同當藥時珍曰薞蕪乃酸模之音轉酸模又酸母之轉皆以味而名與三葉酸母草同名掌禹錫以薞蕪為蔓菁菜誤矣集解𢎞景曰一種極似羊蹄而味酸呼為酸模亦療疥也大明曰所在有之生山岡上狀似羊蹄葉而小黃莖葉俱細節間生子若茺蔚子藏器曰即是山大黃一名當藥其葉酸美人亦采食其英爾雅須薞蕪郭璞注云似羊蹄而稍細味酸可食一名蓚也時珍曰平地亦有根葉花形並同羊蹄但葉小味酸為異其根赤黃色連根葉取汁煉霜可制雄汞氣味酸寒無毒時珍曰葉酸根微苦主治暴熱腹脹生搗汁服當下利殺皮膚小蟲藏器治疥𢎞景療痢乃佳保升去汗斑同紫萍搗擦數日即沒時珍附方新一瘭疽毒瘡肉中忽生黯子如粟豆大者如梅李或赤或黑或青或白其中有核核有深根應心腫泡紫黑色能爛筋骨毒人臟腑殺人宜炙黯上百壯以酸模葉薄其四面防其長也內服葵根汁其毒自愈千金方附録牛舌實别録有名未用曰味鹹溫無毒主輕身益氣生水中澤旁大葉長尺五月采實一名豕首器曰今東土人呼田水中大葉如牛耳者為牛耳菜時珍曰今人呼羊蹄為牛舌菜恐羊蹄是根此是其實否則是羊蹄之生水中者也麕舌别録曰味辛微溫無毒主霍亂腹痛吐逆心煩生水中五月采之𢎞景曰生小小水中今人五月五日采乾以治霍亂甚良龍舌草綱目集解時珍曰龍舌生南方池澤湖泊中葉如大葉菘菜及芣苡狀根生水底抽莖出水開白花根似胡蘿蔔根而香杵汁能耎鵝鴨卵方家用煮丹砂煅白礬制三黃氣味甘鹹寒無毒主治癰疽湯火灼傷搗塗之時珍附方新一乳癰腫毒龍舌草忍冬藤研爛蜜和傅之多能鄙事菖蒲本經上品釋名昌陽别録堯韭普水劍草時珍曰菖蒲乃蒲類之昌盛者故曰菖蒲又吕氏春秋云冬至後五十七日菖始生菖者百草之先生者於是始耕則菖蒲昌陽又取此義也典術云堯時天降精于庭為韭感百隂之氣為菖蒲故曰堯韭方士隱為水劍因葉形也集解别録曰菖蒲生上洛池澤及蜀郡嚴道一寸九節者良露根不可用五月十二月采根隂乾𢎞景曰上洛郡蜀梁州嚴道縣在蜀郡今乃處處有生石磧上概節為好在下濕地大根者名昌陽不堪服食真菖蒲葉有脊一如劒創四月五月亦作小釐花也東間溪澤又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊俗人多呼此為石上菖蒲者謬矣此止主咳逆斷蚤虱不入服食用詩詠多云蘭蓀芷謂此也大明曰菖蒲石澗所生堅小一寸九節者上出宣州二月八月采頌曰處處有之而池州戎州者佳春生青葉長一二尺許其葉中心有脊狀如劒無花實今以五月五日收之其根盤屈有節狀如馬鞭大一根旁引三四根旁根節尤密亦有一寸十二節者采之初虛軟曝乾方堅實折之中心色微赤嚼之辛香少滓人多植於乾燥沙石土中臘月移之尤易活黔蜀蠻人常將隨行以治卒患心痛其生蠻谷中者尤佳人家移種者亦堪用但乾後辛香堅實不及蠻人持來者此皆醫方所用石菖蒲也又有水菖蒲生溪澗水澤中不堪入藥今藥肆所貨多以二種相雜尤難辨也承曰今陽羡山中生水石間者其葉逆水而生根鬚絡石略無少泥土根葉極緊細一寸不啻九節入藥極佳二浙人家以瓦石器種之旦暮易水則茂水濁及有泥滓則萎近方多用石菖蒲必此類也其池澤所生肥大節疏粗慢恐不可入藥唯可作果盤氣味不烈而和淡爾時珍曰菖蒲凡五種生於池澤蒲葉肥根髙二三尺者泥菖蒲白菖也生於溪澗蒲葉瘦根髙二三尺者水菖蒲溪蓀也生於水石之間葉有劍脊瘦根密節髙尺餘者石菖蒲也人家以砂栽之一年至春剪洗愈剪愈細髙四五寸葉如韭根如匙柄粗者亦石菖蒲也甚則根長二三分葉長寸許謂之錢蒲是矣服食入藥須用二種石菖蒲餘皆不堪此草新舊相代四時常青羅浮山記言山中菖蒲一寸二十節抱朴子言服食以一寸九節紫花者尤善蘇頌言無花實然今菖蒲二三月間抽莖開細黃花成穗而昔人言菖蒲難得見花非無花也應劭風俗通云菖蒲放花人得食之長年是矣根修治斆曰凡使勿用泥菖夏菖二件如竹根鞭形黑氣穢味腥惟石上生者根條嫩黃緊硬節稠一寸九節者是真也采得以銅刀刮去黃黑硬節皮一重以嫩桑枝條相拌蒸熟暴乾銼用時珍曰服食須如上法制若常用但去毛微炒耳氣味辛溫無毒權曰苦辛平之才曰秦皮秦芃為之使惡地膽麻黃大明曰忌飴糖羊肉勿犯鐵器令人吐逆主治風寒濕痺咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾癰瘡溫腸胃止小便利久服輕身不忘不迷惑延年益心智髙志不老本經四肢濕痺不得屈伸小兒溫瘧身積熱不解可作浴湯别録治耳鳴頭風淚下鬼氣殺諸蟲惡瘡疥瘙甄權除風下氣丈夫水臟女人血海冷敗多忘除煩悶止心腹痛霍亂轉筋及耳痛者作末炒乘熱褁罯甚驗大明心積伏梁好古治中惡卒死客忤癲癎下血崩中安胎漏散癰腫搗汁服解巴豆大戟毒時珍發明頌曰古方有單服菖蒲法蜀人治心腹冷氣搊痛者取一二寸槌碎同吳茱萸煎湯飲之亦將隨行卒患心痛嚼一二寸熱湯或酒送下亦效時珍曰國初周顛仙對太祖髙皇帝常嚼菖蒲飲水問甚故云服之則可無腹痛之疾髙皇御製碑中載之菖蒲氣溫味辛乃手少隂足厥隂之藥心氣不足者用之虛則補其母也肝苦急以辛補之是矣道藏經有菖蒲傳一卷其語粗陋今略節其要云菖蒲者水草之精英神仙之靈藥也其法采緊小似魚鱗者一斤以水及米泔浸各一宿刮去皮切暴乾搗篩以糯米粥和勻更入熱蜜搜和丸如梧子大稀葛袋盛置當風處令乾每旦酒飲任下三十丸臨卧更服三十丸服至一月消食二月痰除服至五年骨髓充顔色澤白髮黑落齒更生其藥以五德配五行葉青花赤節白心黃根黑能治一切諸風手足頑痺癱緩不遂五勞七傷填血補腦堅骨髓長精神潤五臟禆六腑開胃口和血脈益口齒明耳目澤皮膚去寒熱除三尸九蟲天行時疾瘴疫瘦病􅂒痢痔漏婦人帶下産後血運並以酒服河內葉敬母中風服之一年而百病愈冦天師服之得道至今廟前猶生菖蒲鄭魚曾原等皆以服此得道也又按葛洪抱朴子云韓衆服菖蒲十三年身上生毛冬袒不寒日記萬言商丘子不娶惟食菖蒲根不飢不老不知所終神仙傳云咸陽王典食菖蒲得長生安期生采一寸九節菖蒲服仙去又按臞仙神隱書云石菖蒲置一盆於几上夜間觀書則收煙無害目之患或置星露之下至旦取葉尖露水洗目大能明視久則白晝見星端午日以服酒尤妙蘇東坡云凡草生石上必須微土以附其根惟石菖蒲濯去泥土漬以清水置盆中可數十年不枯節葉堅瘦根鬚連絡蒼然於几案間久更可喜其延年終身之功既非昌陽可比至于忍寒淡泊不待泥土而生又豈昌陽所能倣佛哉楊士瀛曰下痢禁口雖是脾虛亦熱氣閉隔心胸所致俗用木香失之溫用山藥失之閉惟參苓白术散加石菖蒲粳米飲調下或用參苓石蓮肉少入菖蒲服胸次一開自然思食附方舊九新一十八服食法甲子日取菖蒲一寸九節者隂乾百日為末每酒服方寸匕日三服久服耳目聰明益智不忘千金方健忘益智七月七日取菖蒲為末酒服方寸匕飲酒不醉好事者服而驗之久服聰明忌鐵器千金方三十六風有不治者服之悉效菖蒲薄切日乾三斤盛以絹袋玄水一斛即清酒也懸浸之蜜封一百日視之如菜緑色以一斗熟黍米納中封十四日取出日飲夏禹神仙經癲癎風疾九節菖蒲不聞雞犬聲者去毛水臼搗末以黑豶豬心一箇批開砂罐煮湯調服三錢日一服醫學正傳尸厥魘死尸厥之病卒死脈猶動聽其耳目中如微語聲股間暖者是也魘死之病臥忽不寤勿以火照但痛齧其踵及足拇趾甲際唾其面即蘇仍以菖蒲末吹鼻中桂末納舌下并以菖蒲根汁灌之肘後方卒中客忤菖蒲根搗汁含之立止肘後方除一切惡端午日切菖蒲漬酒飲之或加雄黃少許洞天保生録喉痺腫痛菖蒲根嚼汁燒鐵稱錘淬酒一杯飲之聖濟總録霍亂脹痛生菖蒲銼四兩水和搗汁分溫四服聖惠方諸積鼓脹食積氣積血積之類石菖蒲八兩銼班蝥四兩去翅足同炒黃去斑蝥不用以布袋盛拽去蝥末為末醋糊丸梧子大每服三五十丸溫白湯下治腫脹尤妙或入香附末二錢竒效方肺損吐血九節菖蒲末白麵等分每服三錢新汲水下一日一服聖濟録解一切毒石菖蒲白礬等分為末新汲水下事林廣記赤白帶下石菖蒲破故紙等分炒為末每服二錢更以菖蒲浸酒調服日一婦人良方胎動半産卒動不安或腰痛胎轉搶心下血不止或日月未足而欲産並以菖蒲根搗汁一二升服之千金産後崩中下血不止菖蒲一兩半酒二盞煎取一盞去滓分三服食前溫服千金方耳卒聾閉菖蒲根一寸巴豆一粒去心同搗作七丸綿褁一丸塞耳日一換一方不用巴豆用萆麻仁肘後方病後耳聾生菖蒲汁滴之聖惠方蚤虱入耳菖蒲末炒熱袋盛枕之即愈録聖濟諸般赤眼攀晴雲翳菖蒲擂自然汁文武火熬作膏日點之效聖濟録眼瞼挑針獨生菖蒲根同鹽研傅壽域聖方飛絲入目石菖蒲捶碎左目塞右鼻右目塞左鼻百發百中危氏得效方頭瘡不瘥菖蒲末油調傅之日三夜二次法天生意癰疽發背生菖蒲搗貼之瘡乾者為末水調塗之孫用和祕寶方露岐便毒生菖蒲根搗傅之訣證治治要熱毒濕瘡宗奭曰有人遍身生瘡痛而不癢手足尤甚粘著衣被曉夕不得睡有人教以菖蒲三斗日乾為末布席上臥之仍以衣被覆之既不粘衣又復得睡不五七日其瘡如失後以治人應手神驗衍義本草風癬有蟲菖蒲末五斤酒漬釡中蒸之使味出先絶酒一日每服一升或半升千金方隂汗濕癢石菖蒲蛇牀子等分為末日搽二三次濟急仙方葉主治洗疥大風瘡時珍白昌别録有名未用釋名水昌蒲别録水宿别録莖蒲别録昌陽拾遺溪孫拾遺蘭孫𢎞景時珍曰此即今池澤所生昌蒲葉無劍脊根肥白而節疏慢故謂之白昌古人以根為葅食謂之昌本亦曰昌歜文王好食之其生溪澗者名溪蓀集解别録曰白昌十月采藏器曰即令之溪蓀也一名昌陽生水畔人亦呼為菖蒲與石上菖蒲都别根大而臭色正白頌曰水菖蒲生溪澗水澤中甚多失水則枯葉似石菖但中心無脊其根乾後輕虛多滓不堪入藥時珍曰此有二種一種根大而肥白節疏者白菖也俗謂之泥菖蒲一種根瘦而赤節稍密者溪蓀也俗謂之水菖蒲葉俱無劍脊溪蓀氣味勝似白菖並可殺蟲不堪服食氣味甘無毒别録曰甘辛溫汁制雄黃雌黃砒石主治食諸蟲别録主風濕咳逆去蟲斷蚤虱𢎞景研末油調塗疥瘙蘇頌香蒲本經上品蒲黃本經上品釋名甘蒲蘇恭醮石吳普花上黃粉名蒲黃恭曰香蒲即甘蒲可作薦者春初生取白為葅亦堪蒸食山南人謂之香蒲以菖蒲為臭蒲也蒲黃即此蒲之花也集解别録曰香蒲生南海池澤蒲黃生河東河澤四月采之頌曰香蒲蒲黃苗也處處有之以秦州者為良春初生嫩葉出水時紅白色茸茸然取其中心入地白蒻大如匕柄者生啖之甘脆又以醋浸如食筍大美周禮謂之蒲葅今人罕有食之者至夏抽梗於叢葉中花抱梗端如武士棒杵故俚俗謂之蒲槌亦曰蒲萼花其蒲黃即花中蕊屑也細若金粉當欲開時便取之市㕓以蜜搜作果食貨賣時珍曰蒲叢生水際似莞而褊有脊而柔二三月苗采其嫩根瀹過作鮓一宿可食亦可􅨘食蒸食及晒乾磨粉作飲食詩云其蔌伊何惟筍及蒲是矣八九月收葉以為席亦可作扇軟滑而溫正誤𢎞景曰香蒲方藥不復用人無采者南海人亦不復識江南貢菁茅一名香茅以供宗廟縮酒或云是薰草又云是燕麥此蒲亦相類耳野恭曰陶氏所引菁茅乃三脊茅也香茅燕麥薰草俗皆識都非香蒲類也蒲蒻一名蒲筍食物蒲兒根野菜譜氣味甘平無毒時珍曰寒主治五臟心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老本經去熱燥利小便寧原生啖止消渴汪穎補中益氣和血脈正要搗汁服治妊婦勞熱煩躁胎動下血時珍乳出産附方舊二妬乳乳癰蒲黃草根搗封之并煎汁飲及食之咱殷産寶熱毒下痢蒲根二兩粟米二合水煎服日二次聖濟總録蒲黃本經上品修治斆曰凡使勿用松黃并黃蒿其二件全似只是味跙及土人真蒲黃須隔三重紙焙令色黃蒸半日却再焙乾用之妙大明曰破血消腫者生用之補血止血者須炒用氣味甘平無毒主治心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙本經治痢血鼻衄吐血尿血瀉血利水道通經絡止女子崩中甄權婦人帶下月候不勻血氣心腹痛妊婦下血墜胎血運血癥兒枕氣痛顚撲血悶排膿瘡癤遊風腫毒下乳汁止泄精大明涼血活血止心腹諸痛時珍發明𢎞景曰蒲黃即蒲釐花上黃粉也甚療血仙經亦用之宗奭曰汴人初得羅去滓以水調為膏擘為塊人多食之以解心臟虛熱小兒尤嗜之過月則燥色味皆淡須蜜水和不可多食令人自利極能虛人時珍曰蒲黃手足厥隂血分藥也故能治血治痛生則能行熟則能止與五靈脂同用能治一切心腹諸痛詳見禽部寒號蟲下按許叔微本事方云有士人妻舌忽脹滿口不能出聲一老叟教以蒲黃頻摻比曉乃愈又芝隱方云宋度宗欲賞花一夜忽舌腫滿口蔡御醫用蒲黃乾薑末等分乾搽而愈據此二説則蒲黃之涼血活血可證矣蓋舌乃心之外候而手厥隂相火乃心之臣使得乾薑是隂陽相濟也附方舊十四新十一舌脹滿口方見上重舌生瘡蒲黃末傅之不過三上瘥金千方肺熱衄血蒲黃青黛各一錢新汲水服之或去青黛入油髮灰等分生地黃汁調下單簡便方吐血唾血蒲黃末二兩每日溫酒或冷水服三錢妙簡要濟衆方老幼吐血蒲黃末每服半錢生地黃汁調下量人加減或入髮灰等分聖濟總録小便出血方同上小便轉胞以布包蒲黃褁腰腎令頭致地數次取通肘後方金瘡出血悶絶蒲黃半兩熱酒灌下危氏方瘀血內漏蒲黃末二兩每服方寸匕水調下服盡止肘後方腸痔出血蒲黃末方寸匕水服之日三服肘後方小兒妳痔蒲黃空心溫酒服方寸匕日三塞上方脫肛不收蒲黃和豬脂傅日三五度子母祕録胎動欲産日月未足者蒲黃二錢井華水服集一方産婦催生蒲黃地龍洗焙陳橘皮等分為末另收臨時各炒一錢新汲水調服立産此常親用甚妙唐慎微方胞衣不下蒲黃二錢井水服之集驗方産後下血羸瘦逮死蒲黃二兩水二升煎八合頓服産寶方産後血瘀蒲黃三兩水三升煎一升頓服梅師方兒枕血瘕蒲黃三錢米飲服産寶産後煩悶蒲黃方寸匕東流水服極良産寶墜傷撲損瘀血在內煩悶者蒲黃末空心溫酒服三錢塞上方關節疼痛蒲黃八兩熟附子一兩為末每服一錢涼水下日一肘後方隂下濕癢蒲黃末傅三四度瘥千金方聤耳出膿蒲黃末摻之聖惠口耳大衄蒲黃阿膠炙各半兩每用二錢水一盞生地黃汁一合煎至六分溫服急以帛繫兩乳止乃已方聖惠耳中出血蒲黃炒黑研末摻入簡便方滓蒲黃中篩出赤滓名曰蒲萼也主治炒用澀腸止瀉血血痢妙大明菰别録下品釋名茭草説文蔣草時珍曰按許氏説文菰本作苽從瓜諧聲也有米謂之雕菰已見穀部菰米下江南人呼菰為茭以其根交結也蔣義未詳集解保升曰菰根生水中葉如蔗荻久則根盤而厚夏月生菌堪啖名菰菜三年者中心生白薹如藕狀似小兒臂而白軟中有黑脈堪啖者名菰首也藏器曰菰首小者臂之內有黑灰如墨者名烏鬱人亦食之晉張翰思吳中蓴菰即此也頌曰菰根江湖陂澤中皆有之生水中葉如蒲葦輩刈以秣馬甚肥春末生白茅如筍即菰菜也又謂之茭白生熟皆可啖甜美其中心如小兒臂者名菰手作菰首者非矣爾雅云出墜蘧蔬注云生菰草中狀似土菌江東人啖之甜滑即此也故南方人至今謂菌為菰亦緣此義其根亦如蘆根冷利更甚二浙下澤處菰草最多其根相結而生久則并生浮於水上彼人謂之菰葑刈去其葉便可耕蒔又名葑田其苗有莖硬者謂之菰蔣草至秋結實乃雕胡米也歲飢人以當糧宗奭曰菰乃蒲類河朔邊人止以飼馬作薦八月開花如葦結青子合粟為粥食甚濟飢杜甫所謂波漂菰米沉雲黑者是也菰筍一名茭筍日用茭白圖經菰菜同氣味甘冷滑無毒詵曰滑中不可多食頌曰菰之種類皆極冷不可過食甚不益人惟服金石人相宜耳主治利五臟邪氣酒皶面赤白癩癧瘍目赤熱毒風氣卒心痛可鹽醋煮食之孟詵去煩熱止渴除目黃利大小便止熱痢雜鯽魚為羮食開胃口解酒毒壓丹石毒發藏器菰手一名菰菜日用茭白通志茭粑俗名蘧蔬音毬㲣氣味甘冷滑無毒大明曰微毒詵曰性滑發冷氣令人下焦寒傷陽道禁蜜食發痼疾服巴豆人不可食主治心胸中浮熱風氣滋人齒孟詵煮食止渴及小兒水痢藏器菰根氣味甘大寒無毒頌曰菰根亦如蘆根冷利更甚主治腸胃痼熱消渴止小便利搗汁飲之别録燒灰和雞子白塗火燒瘡藏器附方舊二小兒風瘡久不愈者用菰蔣節燒研傅之子母祕録毒蛇傷囓菰蔣草根燒灰傅之外臺祕要葉主治利五臟大明菰米見穀部苦草綱目集解時珍曰生湖澤中長二三尺狀如茅蒲之類氣味缺主治婦人白帶煎湯服又主好嗜乾茶不已面黃無力為末和炒脂麻不時乾嚼之時珍水萍本經中品釋名别録曰水萍生雷澤池澤三月采暴乾𢎞景曰此是水中大萍非今浮萍子藥對云五月有花白色即非今溝渠所生者楚王渡江所得乃斯實也藏器曰水萍有三種大者曰蘋葉圓闊寸許小萍子是溝渠間者本經云水萍應是小者頌曰爾雅云萍蓱其大者蘋蘇恭言有三種大者曰蘋中者曰荇小者即水上浮萍今醫家鮮用大蘋惟用浮萍時珍曰本草所用水萍乃小浮萍非大蘋也陶蘇俱以大蘋注之誤矣萍之與蘋音雖相近字腳不同形亦逈别今釐正之互見蘋下浮萍處處池澤止水中甚多季春始生或云楊花所化一葉經宿即生數葉葉下有微鬚即其根也一種背面皆緑者一種面青背紫赤若血者謂之紫萍入藥為良七月采之淮南萬畢術云老血化為紫萍恐自有此種不盡然也小雅呦呦鹿鳴食野之蘋者乃蒿屬陸佃指為萍誤矣修治時珍曰紫背浮萍七月采之㨂淨以竹篩攤晒下置水一盆映之即易乾也氣味辛寒無毒别録曰酸主治暴熱身癢下水氣勝酒長鬚髮止消渴久服輕身木經下氣以沐浴生毛髮别録治熱毒風熱熱狂熁腫毒湯火傷風疹大明搗汁服主水腫利小便為末酒服方寸匕治人中毒為膏傅面皯藏器主風濕麻痺腳氣打撲傷損目赤翳膜口舌生瘡吐血衄血癜風丹毒時珍發明震亨曰浮萍發汗勝於麻黃頌曰俗醫用治時行熱病亦堪發汗甚有功其方用浮萍一兩四月十五日采之麻黃去根節桂心附子炮裂去臍皮各半兩四物搗細篩每服一錢以水一中盞生薑半分煎至六分和滓熱服汗出乃瘥又治惡疾癘瘡遍身者濃煮汁浴半日多效此方甚竒古也時珍曰浮萍其性輕浮入肺經達皮膚所以能發揚邪汗也世傳宋時東京開河掘得石碑梵書大篆一詩無能曉者真人林靈素逐字辨譯乃是治中風方名去風丹也詩云天生靈草無根幹不在山間不在岸始因飛絮逐東風泛梗青青飄水面神仙一味去沉疴采時須在七月半選甚癱風與大風些小微風都不算豆淋酒化服三丸鐵鏷頭上也出汗其法以紫色浮萍晒乾為細末煉蜜和丸彈子大每服一粒以豆淋酒化下治左癱右瘓三十六種風偏正頭風口眼喎斜大風癩風一切無名風及腳氣并打撲傷折及胎孕有傷服過百粒即為全人此方後人易名紫萍一粒丹附方舊七新十八夾驚傷寒紫背浮萍一錢犀角屑半錢鈎藤鈎三七箇為末每服半錢蜜水調下連進三服出汗為度聖濟録消渴飲水日至一石者浮萍搗汁服之又方用乾浮萍栝樓根等分為末人乳汁和丸梧子大空腹飲服二十丸三年者數日愈千金方小便不利膀胱水氣流滯浮萍日乾為末飲服方寸匕日二服千金翼水氣洪腫小便不利浮萍日乾為末每服方寸匕白湯下日二服聖惠方霍亂心煩蘆根炙一兩半水萍焙人參枇杷葉炙各一兩每服五錢入薤白四寸酒煎溫服聖惠方吐血不止紫背浮萍焙半兩黃茋炙二錢半為末每服一錢薑蜜水調下聖濟總録鼻衄不止浮萍末吹之聖惠方中水毒病手足指冷至膝肘即是以浮萍日乾為末飲服方寸匕良姚僧坦集驗方大腸脫肛水聖散用紫浮萍為末乾貼之危氏得效方身上虛癢浮萍末一錢以黃芩一錢同四物湯煎湯調下丹溪纂要風熱癮疹浮萍蒸過焙乾牛蒡子酒煮晒乾炒各一兩為末每薄荷湯服一二錢日二次古今録驗風熱丹毒浮萍搗汁遍塗之子母祕録汗斑癜風端午日收紫背浮萍晒乾每以四兩煎水浴并以萍擦之或入漢防己二錢亦可袖珍方少年面皰外臺用浮萍日挼􅝛之并飲汁少許普濟方用紫背萍四兩防己一兩煎濃汁洗之仍以萍於斑皯上熱擦日三五次物雖微末其功甚大不可小看普濟方粉滓面皯溝渠小萍為末日傅之聖惠方大風癘疾浮萍草三月采淘三五次窨三五日焙為末不得見日每服三錢食前溫酒下常持觀音聖號忌豬魚雞蒜又方七月七日取紫背浮萍日乾為末半升入好消風散五兩每服五錢水煎頻飲仍以煎湯洗浴之十便良方㿀瘡入目浮萍隂乾為末以生羊子肝半箇同水半盞煮熟搗爛絞汁調末服甚者不過一服已傷者十服見效危氏得效方弩肉攀睛青萍少許研爛入片腦少許貼眼上效危氏得效方毒腫初起水中萍子草搗傅之肘後方發背初起腫焮赤熱浮萍搗和雞子清貼之聖惠方楊梅瘡癬水萍煎汁浸洗半日數日一作集簡方燒煙去蚊五月取浮萍隂乾用之人孫真方蘋吳普本草釋名芣菜拾遺四葉菜巵言田字草時珍曰蘋本作薲左傳蘋蘩藴藻之菜可薦於鬼神可羞於王公則薲有賓之之義故字從賓其草四葉相合中折十字故俗呼為四葉菜田字草破銅錢皆象形也諸家本草皆以蘋注水萍蓋由蘋萍二字音相近也按韻書蘋在真韻蒲真切萍在庚韻蒲經切切腳不同為物亦異今依吳普本草别出於此集解普曰水萍一名水亷生池澤水上葉圓小一莖一葉根入水底五月白花三月采日乾之𢎞景曰水中大萍五月有花白色非溝渠所生之萍乃楚王渡江所得即斯實也恭曰萍有三種大者名蘋中者名荇葉皆相似而圓其小者即水上浮萍也藏器曰蘋葉圓闊寸許葉下有一點如水沫一名芣菜曝乾可入藥用小萍是溝渠間者禹錫按爾雅云萍蓱也其大者曰蘋又詩云于以采蘋于澗之濱陸機注云其粗大者謂之蘋小者為萍季春始生可糝蒸為茹又可以苦酒淹之按酒今醫家少用此蘋惟用小萍耳時珍曰蘋乃四葉菜也葉浮水面根連水底其莖細於蓴莕其葉大如指頂面青背紫有細紋頗似馬蹄決明之葉四葉合成中折十字夏秋開小白花故稱白蘋其葉攢簇如萍故爾雅謂大者如蘋也吕氏春秋云菜之美者有崑崙之蘋即此韓詩外傳謂浮者為藻沉者為蘋臞仙謂白花者為蘋黃花者為莕即金蓮也蘇恭謂大者為蘋小者為莕楊愼巵言謂四葉菜為莕陶𢎞景謂楚王所得者為蘋皆無一定之言蓋未深加體審惟據紙上猜度而已時珍一一采視頗得其真云其葉徑一二寸有一缺而形圓如馬蹄者蓴也似蓴而稍尖長者莕也其花並有黃白二色葉徑四五寸如小荷葉而黃花結實如小角黍者萍蓬草也楚王所得萍實乃此萍之實也四葉合成一葉如田字形者蘋也如此分别自然明白又項氏言白蘋生水中青蘋生陸地按今之田字草有水陸二種陸生者多在稻田沮洳之處其葉四片合一與白蘋一樣但莖生地上髙三四寸不可食方士取以煅硫結砂煮汞謂之水田翁項氏所謂青蘋蓋即此也或以青蘋為水草誤矣氣味甘寒滑無毒主治暴熱下水氣利小便吳普搗塗熱瘡搗汁飲治蛇傷毒入腹內曝乾栝樓等分為末人乳和丸服止消渴藏器食之已勞山海經萍蓬草拾遺釋名水粟綱目水栗子時珍曰陳藏器拾遺萍蓬草即今水粟也其子如粟如蓬子也俗人呼水粟包又云水栗子言其根味也或作水笠集解藏器曰萍蓬草生南方池澤葉大如荇花亦黃未開時狀如算袋其根如藕飢年可以當穀時珍曰水粟三月出水莖大如指葉似荇葉而大徑四五寸初生如荷葉六七月開黃花結實狀如角黍長二寸許內有細子一包如罌粟澤農采之洗擦去皮蒸曝春取米作粥飯食之其根大如栗赤如雞頭子根儉年人亦食之作藕香味如栗子昔楚王渡江得萍實大如斗赤如日食之甜如蜜者蓋此類也若水萍安得有實耶三四月采莖葉取汁煮硫黃能拒火又段公路北戶録有睡蓮亦此類也其葉如荇而大其花布葉數重當夏晝開花夜縮入水晝復出也子氣味甘澀平無毒主治助脾厚腸令人不飢時珍根氣味甘寒無毒主治煮食補虛益氣力久食不飢厚腸胃藏器莕菜唐本草釋名鳬葵唐本水葵馬融傳水鏡草土宿本草靨子菜野菜譜金蓮子接余時珍曰按爾雅云莕接余也其葉苻則鳬葵當作苻葵古文通用耳或云鳬喜食之故稱鳬葵亦通其性滑如葵其葉頗似莕故曰葵曰莕詩經作荇俗呼荇絲菜池人謂之莕公鬚淮人謂之靨子菜江東謂之金蓮子許氏説文謂之䖂音戀楚詞謂之屏風云紫莖屏風文緑波是矣集解恭曰鳬葵即莕菜也生水中頌曰處處池澤有之葉似蓴而莖澀根甚長花黃色郭璞注爾雅云叢生水中葉圓在莖端長短隨水深淺江東人食之陸機詩疏云荇莖白而葉紫赤色正圓徑寸餘浮在水上根在水底大如叉股上青下白可以按酒用苦酒浸其白莖肥美今人不食醫方亦鮮用之時珍曰莕與蓴一類二種也並根連水底葉浮水上其葉似馬蹄而圓者蓴也葉似蓴而微尖長者莕也夏月俱開黃花亦有白花者結實大如棠梨中有細子按獻寧王庚辛玉册云鳬葵黃花者是莕菜白花者是白蘋即水鏡草一種泡子名水鱉雖有數種其用一也其莖葉根花並可伏硫煮砂制礬此以花色分别蘋莕似亦未隱詳見蘋下正誤恭曰鳬葵南人名豬蓴堪食有名未用條中載也志曰鳬葵即莕菜葉似蓴根極長江南人多食之今云是豬蓴誤矣今以春夏細長肥滑者為絲蓴至冬粗短者為豬蓴亦呼為龜蓴與鳬葵殊不相似也而有名未用類即無鳬葵豬蓴之名蓋後人刪去也時珍曰楊愼巵言以四葉菜為莕者亦非也四葉菜乃蘋也氣味甘冷無毒主治消渴去熱利小便唐本搗汁服療寒熱開寶搗傅諸腫毒火丹遊腫時珍附方新四一切癰疽及瘡癤用莕絲菜或根馬蹄草莖或子即蓴也各取半碗同苧麻根五寸去皮以石器搗爛傅毒四圍春夏秋日換四五次冬換二三次換時以薺水洗之甚效保生餘録穀道生瘡荇葉搗爛綿褁納之下部日三次范汪方毒蛇螫傷牙入肉中痛不可堪者勿令人知私以荇葉覆其上穿以物包之一時折牙自出也肘後方點眼去翳莕絲菜根一錢半搗爛即葉如馬蹄開黃花者川練子十五箇膽礬七分石決明五錢皂莢一兩海螵蛸二錢各為末同菜根以水一鍾煎二宿去滓一日點數次七日見效也孫氏集效方蓴别録下品釋名茆卯柳二音水葵詩疏露葵綱目馬蹄草時珍曰蓴字本作蓴從純純乃絲名其莖似之故也齊民要術云蓴性純而易生種以淺深為候水深則莖肥而葉少水淺則莖瘦而葉多其性逐水而滑故謂之蓴菜并得葵名顔之推家訓云蔡朗父諱蓴改蓴為露葵北人不知以緑葵為之詩云薄菜其茆即蓴也或諱其名謂之錦帶集解保升曰蓴葉似鳬葵浮在水上采莖堪啖花黃白色子紫色三月至八月莖細如叉股黃赤色短長隨水深淺名為絲蓴味甜體軟九月至十月漸粗硬十一月萌在泥中粗短名瑰蓴味苦體澀人惟取汁作羮猶勝雜菜時珍曰蓴生南方湖澤中惟吳越人善食之葉如荇菜而差圓形似馬蹄其莖紫色大如筋柔滑可羮夏月開黃花結實青紫色大如棠梨中有細子春夏嫩莖未葉者名稚蓴稚者小也葉稍舒長者名絲蓴其莖如絲也至秋老則名葵蓴或作豬蓴言可飼豬也又訛為瑰蓴龜蓴焉餘見鳬葵下氣味甘寒無毒藏器曰蓴雖水草而性熱擁詵日蓴雖冷補熱食及多食亦擁氣不下甚損人胃及齒令人顔色惡損毛髮和醋食令人骨痿李廷飛曰多食性滑發痔七月有蟲著上食之令人霍亂主治消渴熱痺别録和鯽魚作羮食下氣止嘔多食壓丹石補大小腸虛氣不宜過多孟詵治熱疸厚腸胃安下焦逐水解百藥毒并蠱氣大明發明𢎞景曰蓴性冷而補下氣雜鱧魚作羮食亦逐水而性滑服食家不可多用恭曰蓴久食大宜人合鮒魚作羮食主胃弱不下食者至效又宜老人應入上品故張翰臨秋風思吳中之鱸蓴羮也藏器曰蓴體滑常食發氣令關節急嗜睡腳氣論中令人食之此誤極深也溫病後脾弱不能磨化食者多死豫所居近湖湖中有蓴藕年中疫甚飢人取蓴食之雖病瘥者亦死至秋大旱人多血痢湖中水竭掘藕食之闔境無他蓴藕之功於斯見矣附方新三一切癰疽馬蹄草即蓴菜春夏用莖冬月用子就於根側尋取搗爛傅之未成即消已成即毒散用菜亦可保生餘録頭上惡瘡以黃泥包豆䜴煨熟取出為末以蓴菜油調傅之全保幼大數種疔瘡馬蹄草又名缺盆草大青葉臭紫草各等分擂爛以酒一碗浸之去滓溫服三服立愈經驗良方水藻綱目釋名時珍曰藻乃水草之有文者潔淨如藻浴故謂之藻集解頌曰藻生水中處處有之周南詩云于以采藻于沼于沚于彼行潦是也陸機注云藻生水底有二種葉如雞蘇莖如筯長四五尺一種葉如蓬蒿莖如叉股謂之聚藻二藻皆可食熟挼去腥氣米麵糝蒸為茹甚滑美荆揚人飢荒以當穀食藏器曰馬藻生水中如馬齒相連時珍曰藻有二種水中甚多水藻葉長二三寸兩兩對生即馬藻也聚藻葉細如絲及魚鰓狀節節連生即水藴也俗名鰓草又名牛尾藴是矣爾雅云莙牛藻也郭璞注云細葉蓬茸如絲可愛一節長數寸長者二三十節即藴也二藻皆可食入藥以馬藻為勝左傳云蘋蘩藴藻之菜即此氣味甘大寒滑無毒主治去暴熱熱痢止渴搗汁服之小兒赤白遊疹火焱熱瘡搗爛封之藏器發明思邈曰凡天下極冷無過藻菜但有患熱毒腫并丹毒者取渠中藻菜切搗傅之厚三分乾即易其效無比海藻本經中品釋名􅙛音單出爾雅别録作藫落首本經海蘿爾雅注集解别録曰海藻生東海池澤七月七日采暴乾𢎞景曰生海島上黑色如亂髮而大少許葉大都似藻葉藏器曰此有二種馬尾藻生淺水中如短馬尾細黑色用之當浸去鹹味大葉藻生深海中新羅國葉如水藻而大海人以繩繫腰沒水取之五月以後有大魚傷人不可取也爾雅云綸以綸組似組東海有之正為二藻也頌曰此即水藻生於海中者令登萊諸州有之陶隱居引爾雅綸組注昆布謂昆布似組青苔紫菜似綸而陳藏器以綸組為二藻陶説似近之時珍曰海藻近海諸地采取亦作海菜乃立名目貨之四方云修治斆曰凡使須用生烏豆并紫背天葵三件同蒸伏時日乾用時珍曰近人但洗淨鹹味焙乾用氣味苦鹹寒無毒權曰鹹有小毒之才曰反甘草時珍曰按東垣李氏治瘰癧馬刀散腫潰堅湯海藻甘草兩用之蓋以堅積之病非平和之藥所能取捷必令反奪以成其功也主治癭瘤結氣散頸下硬核痛癰腫癥瘕堅氣腹中上下雷鳴下十二水腫本經療皮間積聚暴㿉瘤氣結熱利小便别録辟百邪鬼魅治氣急心下滿疝氣下墜疼痛卵腫去腹中幽幽作聲甄權治奔豚氣腳氣水氣浮痛宿食不消五膈痰壅李珣發明元素曰海藻氣味俱厚純隂沉也治癭瘤馬刀諸瘡堅而不潰者經云鹹能軟堅營氣不從外為浮腫隨各引經藥治之腫無不消成無已曰鹹味涌泄故海藻之鹹以泄水氣也洗曰海藻起男子隂消男子㿉疾宜常食之南方人多食北方人效之倍生諸疾更不宜矣時珍曰海藻鹹能潤下寒能泄熱引水故能消癭瘤結核隂㿉之堅聚而除浮腫腳氣留飲痰氣之濕熱使邪氣自小便出也附方舊二新三海藻酒治癭氣用海藻一斤絹袋盛之以清酒二升浸之春夏二日秋冬三日每服兩合日三酒盡再作其滓曝乾為末每服方寸匕日三服不過兩劑即瘥范汪方癭氣初起海藻一兩黃連二兩為末時時舐咽先斷一切厚味丹溪方項下瘰癧如梅李狀宜連服前方海藻酒消之肘後方蛇盤瘰癧頭項交接者海藻菜以蕎麵炒過白殭蠶炒等分為末以白梅泡湯和丸梧子大每服六十丸米飲下必泄出毒氣危氏得效方海藴溫緼醖三音拾遺校正自草部移入此釋名時珍曰縕亂絲也其葉似之故名氣味鹹寒無毒主治癭瘤結氣在喉間下水藏器主水廕蘇頌海帶宋嘉祐集解禹錫曰海帶出東海水中石上似海藻而粗柔韌而長今登州人乾之以束器物醫家用以下水勝於海藻昆布氣味鹹寒無毒主治催生治婦人病及療風下水嘉祐治水病癭瘤功同海藻時珍昆布别録中品釋名綸布時珍曰按吳普本草綸布一名昆布則爾雅所謂綸似綸東海有之者即昆布也綸音關青絲綬也訛而為昆耳陶𢎞景以綸為青苔紫菜輩謂組為昆布陳藏器又謂綸組是二種藻不同如此集解别録曰昆布生東海𢎞景曰今惟出髙麗繩把索之如卷麻作黃黑色柔韌可食爾雅云綸似綸組似組東海有之今青苔紫菜皆似綸而昆布亦似組恐即是也藏器昆布生南海葉如手大似蓴葦紫赤色其細葉者海藻也珣曰其草順流而生出新羅者葉細黃黑色胡人搓之為索隂乾從舶上來中國時珍曰昆布生登萊者搓如繩索之狀出閩浙者大葉似菜蓋海中諸菜性味相近主療一致雖稍有不同亦無大異也修治斆曰凡使昆布每一斤用甑箄大小十箇同銼細以東流水煮之從巳至亥待鹹味去乃晒焙用氣味鹹寒滑無毒普曰酸鹹寒無毒權曰溫有小毒主治十二種水腫癭瘤聚結氣瘻瘡别録破積聚思邈治隂㿉腫含之咽汁藏器利水道去面腫治惡瘡鼠瘻甄權發明杲曰鹹能軟堅故癭堅如石者非此不除與海藻同功詵曰昆布下氣久服瘦人無此疾者不可食海島之人愛食之為無好菜只食此物服久相習病亦不生遂傳説其功於北人北人食之皆生病是水土不宜耳凡是海中菜皆損人不可多食附方舊四昆布臛治膀胱結氣急宜下氣用髙麗昆布一斤白米泔浸一宿洗去鹹味以水一斛煮熟劈細入蔥白一握寸斷之更煮極爛乃下鹽酢糝薑橘椒末調和食之仍宜食梁米粳米飯極能下氣無所忌海藻亦可依此法作之廣濟方癭氣結核㿔㿔腫硬以昆布一兩洗去鹹晒乾為散每以一錢綿褁好醋中浸過含之咽汁味盡再易之聖惠方項下五癭方同上項下卒腫其囊漸大欲成癭者昆布海藻等分為末蜜丸杏核大時時含之咽汁外臺越王餘算海藥釋名缺集解珣曰越王餘算生南海水中如竹算子長尺許劉敬叔異苑云昔晉安越王渡南海將黑角白骨作算籌其有餘者棄於水中而生此故葉白者似骨黑者似角遂名之相傳可食附録沙箸時珍曰按劉恂嶺表録有沙箸似是餘算之類今附於此云海岸沙中生沙箸春吐苗其心茗骨白而且徑可為酒籌凡欲采者須輕步向前拔之不然聞行聲遽縮入沙中不可得也氣味鹹溫無毒主治水腫浮氣結聚宿滯不消腹中虛鳴並煮服之李珣石帆日華集解𢎞景曰石帆狀如柏水松狀如松藏器曰石帆生海底髙尺餘根如漆色至稍上漸軟作交羅紋大明曰石帆紫色梗大者如筯見風漸硬色如漆人以飾作珊瑚裝頌曰左思吳都賦草則石帆水松劉淵林注云石帆生海嶼石上草類也無葉髙尺許其花離樓相貫連若死則浮水中人於海邊得之稀有見其生者氣味甜鹹平無毒主治石淋𢎞景煮汁服主婦人血結月閉藏器水松綱目集解𢎞景曰水松狀如松頌曰出南海及交趾生海水中氣味甘鹹寒無毒主治溪毒𢎞景水腫催生藏器本草綱目卷十九
