body:
  text: 本草綱目卷十四目録草之三芳草類五十六種當歸本經芎藭本經蘼蕪本經蛇牀本經藁本本經附徐黃蜘蛛香綱目白芷香本經芍藥本經牡丹本經附鼠姑木香本經甘松香開寶山奈綱目廉薑拾遺杜若本經山薑藥性髙良薑别録即紅豆䓻豆蔲别録果即草白豆蔲開寶縮砂蔤開寶益智子開寶蓽茇開寶蒟醬唐本肉豆蔲唐本補骨脂開寶即破故紙薑黃唐本鬱金唐本蓬莪荗開寶荆三稜開寶莎根香附子别録瑞香綱目茉莉綱目附素馨鬱金香開寶茅香開寶白茅香拾遺排草香綱目迷迭香拾遺藒車香拾遺艾納香開寶兜納香海藥線香綱目藿香嘉祐薰草零陵香别録蘭草本經澤蘭本經馬蘭日華香薷别録石香葇開寶爵牀本經赤車使者唐本假蘇荆芥本經薄荷唐本積雪草本經蘇哵録荏别録蘇即白水蘇本經蘇即雞薺薴拾遺附石薺薴右附方舊八十一新三百七十一本草綱目卷十四目録
