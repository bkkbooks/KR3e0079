body:
  text: 本草綱目卷一下明李時珍撰序例上十劑徐之才曰藥有宣通補洩輕重澀滑燥濕十種是藥之大體而本經不言後人未述凡用藥者審而詳之則靡所遺失矣宣劑之才曰宣可去壅生薑橘皮之属是也杲曰外感六滛之邪欲傳入裏三隂實而不受逆于胷中天分氣分窒塞不通而或噦或嘔所謂壅也三隂者脾也故必破氣藥如薑橘藿香半夏之類㵼其壅塞從正曰俚人以宣為㵼又以宣為通不知十劑之中已有㵼與通矣仲景曰春病在頭大法宜吐是宣劑即通劑也經曰髙者因而越之木欝則達之宣者升而上也以君召臣曰宣是矣凡風癎中風胷中諸實痰飲寒結胷中熱欎上而不下久則嗽喘滿脹水腫之病生焉非宣劑莫能愈也吐中有汗如引涎追淚嚏鼻凡上行者皆吐法也完素曰欎而不散為壅必宣以散之如痞滿不通之類是矣攻其裏則宣者上也泄者下也涌劑則𤓰蒂巵子之属是矣發汗解表亦同好古曰經有五欎木欎達之火欎發之土欎奪之金欎泄之水鬱折之皆宣也教曰宣揚制曰宣朗君召臣曰宣喚臣奉君命宣布上意皆宣之意也時珍曰壅者塞也宣者布也散也欎塞之病不升不降傳化失常或欎久生病或病久生欎必藥以宣布敷散之如承流宣化之意不獨涌越為宣也是以氣欎有餘則香附撫芎之屬以開之不足則補中益氣以運之火欎㣲則山巵青黛以散之甚則升陽解肌以發之濕欎則蒼术白芷之屬以燥之甚則風藥以勝之痰欎㣲則南星橘皮之屬以化之甚則𤓰蒂黎蘆之屬以涌之血欎㣲則桃仁紅花以行之甚則或吐或利以逐之食欎㣲則山查神麯以消之甚則上涌下利以去之皆宣劑也通劑之才曰通可去滯通草防已之屬是也完素曰留而不行必通以行之如水病為痰澼之類以木通防已之屬攻其内則留者行也滑石茯苓芫花甘逐大㦸牽牛之類是也從正曰通者流通也前後不得溲便宜木通海金沙琥珀大黄之屬通之痺痛欎滯經隧不利亦宜通之時珍曰滯留滯也濕熱之邪留于氣分而為痛痺癃閉者宜淡味之藥上助肺氣下降通其小便而洩氣中之滯木通猪苓之類是也濕熱之邪留于血分而為痺痛腫注二便不通者宜苦寒之藥下引通其前後而洩血中之滯防已之類是也經曰味薄者通故淡味之藥謂之通劑補劑之才曰補可去弱人參羊肉之屬是也呆曰人參甘温能補氣虗羊肉甘熱能補血虗羊肉補形人參補氣凡氣味與二藥同者皆是也從止曰五臓各有補㵼五味各補其臓有表虗裏虗上虗下虗隂虗陽虗氣虗血虗經曰精不足者補之以味形不足者補之以氣五穀五菜五菓五肉皆補養之物也時珍曰經云不足者補之又云虗則補其母生薑之辛補肝炒鹽之醎補心甘草之甘補脾五味子之酸補肺黄蘗之苦補腎又如茯神之補心氣生地黄之補心血人參之補脾氣白芍藥之補脾血黄茋之補肺氣阿膠之補肺血杜仲之補腎氣熟地黄之補腎血芎藭之補肝氣當歸之補肝血之類皆補劑不特人參羊肉為補也洩劑之才曰洩可去閉葶藶大黄之屬是也杲曰葶藶苦寒氣味俱厚不减大黄能洩肺中之閉又泄大腸大黄走而不守能洩血閉腸胃渣穢之物一洩氣閉利小便一洩血閉利大便凡與二藥同者皆然從止曰實則㵼之諸痛為實痛隨利減芒消大黄牽牛甘逐巴豆之屬皆㵼劑也其催生下乳磨積逐水破經洩氣凡下行者皆下法也時珍曰去閉當作去實經云實者㵼之實則㵼其子是矣五臓五味皆有㵼不獨葶藶大黄也肝實㵼以芍藥之酸心實㵼以甘草之甘脾實㵼以黄連之苦肺實㵼以石膏之辛腎實洩以澤㵼之醎是矣輕劑之才曰輕可去實麻黄葛根之屬是也從正曰風寒之邪始客皮膚頭痛身熱宜解其表内經所謂輕而揚之也癰瘡疥痤俱宜解表汗以泄之毒以薫之皆輕劑也凡薫洗蒸灸熨烙刺砭導引按摩皆汗法也時珍曰當作輕可去閉有表閉裏閉上閉下閉表閉者風寒傷營腠理閉宻陽氣怫欎不能外出而為發熱惡寒頭痛脊强諸病宜輕揚之劑發其汗而表自解也裏閉者火熱欎抑津液不行皮膚乾閉而為肌熱煩熱頭痛目腫昏瞀瘡瘍諸病宜輕揚之劑以解其肌而火自散也上閉有二一則外寒内熱上焦氣閉發為咽喉閉痛之證宜辛凉之劑以揚散之則閉自開一則飲食寒冷抑遏陽氣在下發為胷膈痞滿閉塞之證宜揚其清而抑其濁則痞自㤗也下閉亦有二有陽氣䧟下發為裏急後重數至圊而不行之證但升其陽而大便自順所謂下者舉之也有燥熱傷肺金氣膹欎竅開于上而膀胱閉于下為小便不利之證以升麻之類探而吐之上竅通而小便自利矣所謂病在下取之上也重劑之才曰重可去怯磁石鐵粉之屬是也從正曰重者鎮縋之謂也怯則氣浮如䘮神守而驚悸氣上硃砂水銀沉香黄丹寒水石之倫皆體重也久病咳𠻳涎潮于上形羸不可攻者以此縋之經云重者因而減之貴其漸也時珍曰重劑凡四有驚則氣亂而魂氣飛揚如䘮神守者有怒則氣逆而肝火激烈病狂善怒者並鐵粉雄黄之類以平其肝有神不守舍而多驚健忘迷惑不寧者宜硃砂紫石英之類以鎮其心有恐則氣下精志失守而畏如人將捕者宜磁石沉香之類以安其腎大抵重劑壓浮火而墜痰涎不獨治怯也故諸風掉眩及驚癎痰喘之病吐逆不止及反胃之病皆浮火痰涎為害俱宜重劑以墜之滑劑之才曰滑可去著冬葵子榆白皮之屬是也完素曰澀則氣著必滑劑以利之滑能養竅故潤利也從正曰大便燥急宜麻仁郁李之類小便淋瀝宜葵子滑石之類前後不通兩隂俱閉也名曰三焦約約者束也宜先以滑劑潤養其燥然後攻之時珍曰著者有形之邪留著于經絡臓腑之間也便尿濁帶痰涎胞胎癰腫之類是矣皆宜滑藥以引去其留著之物此與木通猪苓通以去滯相類而不同木通猪苓淡洩之物去濕熱無形之邪葵子榆皮甘滑之類去濕熱有形之邪故彼曰滯此曰著也大便澀者波稜牽牛之屬小便澀者車前榆皮之屬精竅澀者黄蘖葵花之屬胞胎澀者黄葵子王不留行之屬引痰涎自小便去者則半夏茯苓之屬引瘡毒自小便去者則五葉藤萱草根之屬皆滑劑也半夏南星皆辛而涎滑能洩濕氣通大便盖辛能潤能走氣能化液也或以為燥物謬矣濕去則土燥非二物性燥也澀劑之才曰澀可去脱牡蠣龍骨之屬是也完素曰滑則氣脱如開腸洞泄便溺遺失之類必澀劑以収斂之從正曰寢汗不禁澀以麻黄根防風滑泄不已澀以豆蔲枯礬木賊罌粟殻喘嗽上奔澀以烏梅訶子凡酸味同乎澀者収斂之義也然此種皆宜先攻其本而後収之可也時珍曰脱者氣脱也血脱也精脱也神脱也脱則散而不収故用酸澀温平之藥以斂其耗散汗出亡陽精骨不禁泄痢不止大便不固小便自遺久𠻳亡津皆氣脱也下血不已崩中暴下諸大亡血皆血脱也牡蠣龍骨海螵蛸五倍子五味子烏梅榴皮訶黎勒罌粟殻蓮房㯶灰赤石脂麻黄根之類皆澀藥也氣脱兼以氣藥血脱兼以血藥及兼氣藥氣者血之帥也脱陽者見鬼脱隂者目盲此神脱也非澀藥所能収也燥劑之才曰燥可去濕桑白皮亦小豆之屬是也完素曰濕氣滛勝腫滿脾濕必燥劑以除之桑皮之屬濕勝于上以苦吐之以淡滲之是也從正曰積寒久冷吐利腥穢上下所出水液澄澈清冷此大寒之病宜薑附胡椒軰以燥之若病濕氣則白术陳皮木香蒼术之屬除之亦燥劑也而黄連黄蘖巵子大黄其味皆苦苦屬火皆能燥濕此内經之本㫖也豈獨薑附之儔為燥劑乎好古曰濕有在上在中在下在經在皮在裏時珍曰濕有外感有内傷外感之濕雨露嵐霧地氣水濕襲于皮肉筋骨經絡之間内傷之濕生于水飲酒食及脾弱腎强固不可一例言也故風藥可以勝濕燥藥可以除濕淡藥可以滲濕洩小便可以引濕利大便可以逐濕吐痰涎可以袪濕濕而有熱苦寒之劑燥之濕而冇寒辛熱之劑燥之不獨桑皮小豆為燥劑也濕去則燥故謂之燥潤劑之才曰濕可去枯白石英紫石英之屬是也從正曰濕者潤濕也雖與滑類少有不同經云辛以潤之辛能走氣能化液故也鹽消味雖鹹屬真隂之水誠濡枯之上藥也人有枯涸皴掲之病非獨金化葢有火以乘之故非濕劑不能愈完素曰津耗為枯五臓痿弱榮衛涸流必濕劑以潤之好古曰有减氣而枯有减血而枯時珍曰濕劑當作潤劑枯者燥也陽明燥金之化秋令也風熱怫甚則血液枯涸而為燥病上燥則渇下燥則結筋燥則强皮燥則掲肉燥則裂骨燥則枯肺燥則痿腎燥則消凡麻仁阿膠膏潤之屬皆潤劑也養血則當歸地黄之屬生津則麥門冬栝樓根之屬益精則蓯蓉枸杞之屬若但以石英為潤藥則偏矣古人以服石為滋補故爾劉完素曰制方之體欲成七方十劑之用者必本于氣味也寒熱温凉四氣生于天酸苦辛醎甘淡六味成乎地是以有形為味無形為氣氣為陽味為隂陽氣出上竅隂味出下竅氣化則精生味化則形長故地産養形形不足者温之以氣天産養精精不足者補之以味辛甘發散為陽酸苦涌泄為隂醎味涌泄為隂淡味滲洩為陽辛散酸収甘緩苦堅醎耎各隨五臓之病而制藥性之品味故方有七劑有十方不七不足以盡方之變劑不十不足以盡劑之用方不對證非方也劑不蠲疾非劑也此乃太古先師設繩墨而取曲直叔世方士乃出規矩以為方圓夫物各有性制而用之變而通之施於品劑其功用豈有窮哉如是有因其性為用者有因其所勝而為制者有氣同則相求者有氣相尅則相制者有氣有餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性上竄而引藥蟬之性外脱而退翳䖟飲血而用以治血鼠善穿而用以治漏所謂因其性而為用者如此弩牙速産以機發而不括也杵糠下噎以杵築下也所謂因其用而為使者如此浮萍不沉水可以勝酒獨活不揺風可以治風所謂因其所勝而為制也如此麻木榖而治風豆水榖而治水所謂氣相同則相求者如此牛土畜乳可以止渇疾豕水畜心可以鎮恍惚所謂因其氣相尅則相制也如此熊肉振羸兎肝明視所謂其氣有餘補不足也如此鯉之治水鶩之利水所謂因其氣相感則以意使者如此蜜成於蜂蜜温而蜂寒油生於麻麻温而油寒兹同質而異性也蘼蕪生於芎藭蓬虆生於覆盆兹名異而實同者也所以如此之類不可勝舉故天地賦形不離隂陽形色自然皆有法象毛羽之類生於陽而屬於隂鱗甲之類生於隂而屬於陽空青法水色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黑而主腎黄石脂法土色黄而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以語人之疾病不然則如無目夜逰無足登涉動致顛殞而欲愈疾者未之有也雷斆炮炙論序曰若夫世人使藥豈知自有君臣既辨君臣寧分相制秪如栨毛今鹽草也霑溺立銷班腫之毒象膽揮黏乃知藥有情異鮭魚挿樹立便乾枯用狗膽塗以犬膽灌之挿魚處立如故也却當榮盛無名無名異形似玉仰面又如石灰味别止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同頭止血尾破血㽔子熟生足睡不眠立據弊箄淡鹵常使者甑中箄能淡鹽味如酒霑交今蜜枳繳枝又云交加枝鐵遇神砂如泥似粉石經鶴糞化作塵飛栨見橘花似髓斷絃折劍遇鸞血而如初以鸞血煉作膠粘折䖏鐵物永不斷海竭江枯投游波鷰子是也而立泛令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背有紫背天葵如常食葵菜秪是背紫面青能堅鉛形留砒住鼎全賴宗心别有宗心草今呼石竹不是食者糭心恐誤其草出􅗄州生處多虫獸雌得芹花其草名為立起其形如芍藥花色青可長三尺已來葉上黄斑色味苦澀堪用煮雌黄立住火立便成庾􅓀遇赤鬚其草名赤鬚今呼為虎鬚草是用煑􅓀砂即生火木留金鼎水中生火非猾髓而莫能海中有獸名曰猾以髓入在油中粘水水中火生不可救之用酒噴之即止勿於屋下収長齒生牙賴雄鼠之骨末其齒若年多不生者取雄鼠脊骨作末揩折處齒立生如故髪眉墮落塗半夏而立生眉髪墮落者以生半夏莖杵之取涎塗髪落處立生目辟眼􅀈有五花而自正五加皮其葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸飲之其目􅀈者正脚生肉栨裩繫菪根脚有肉栨者取莨菪根於裩帶上繫之感應永不痛囊皺漩多夜煎竹木多小便者夜煎萆薢一件服之永不夜起也體寒腹大全賴鸕鷀若患腹大如鼓米飲調鸕鷀末服立枯如故也血泛經過飲調𤓰子甜𤓰子内仁搗作末去油飲調服之立絶咳逆數數酒服熟䧺天雄炮過以酒調一錢服立定也遍體疹風冷調生側附子旁生者為側子作末冷酒服立瘥也陽虗㵼痢須假草零搗五倍子作末以熟水下之立止也久渇心煩宜投竹瀝除癥去塊全仗消硇消硇即硇砂消石二味於乳鉢中研作粉同鍜了酒服神效也益食加觴須煎蘆朴不食者并飲酒少者煎逆水蘆根并厚朴二味湯服强筋徤骨須是蓯鱓蓯蓉并鱓魚二味作末以黄精汁丸服之可力倍常也出乾寧記中駐色延年精蒸神錦黄精自然汁拌細研神錦於栁木甑中蒸七日了以木蜜丸服顔貌可如㓜女之容色也知瘡所在口㸃隂膠隂膠即是甑中氣垢少許於口中可知臓腑所起直至住處知痛乃可醫也産後肌浮甘皮酒服産後肌浮酒服甘皮立愈口瘡舌拆立愈黄蘇口瘡舌拆以根黄塗蘇炙作末含之立瘥腦痛欲亡鼻投消末頭痛者以消石作末内鼻中立止心痛欲死速覔延胡以延胡索作散酒服之立愈如斯百種是藥之功某忝遇明時謬看醫理雖尋聖法難可窮㣲略陳藥餌之功能豈溺仙人之要術其制藥炮熬煑炙不能記年月矣欲審元由須看海集某不諒短見直録炮熬煑炙列藥制方分為上中下三卷有三百件名具陳于後氣味隂陽隂陽應象論曰積陽為天積隂為地隂静陽躁陽生隂長陽殺隂藏陽化氣隂成形陽為氣隂為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味隂味出下竅陽氣出上竅清陽發腠理濁隂走五臓清陽實四肢濁隂歸六腑味厚者為隂薄者為隂中之陽氣厚者為陽薄者為陽中之隂味厚則泄薄則通氣薄則發泄厚則發熱辛甘發散為陽酸苦涌泄為隂醎味涌泄為隂淡味滲洩為陽六者或収或散或緩或急或潤或燥或耎或堅以所利而行之調其氣使之平也元素曰清之清者發腠理清之濁者寔四肢濁之濁者歸六腑濁之清者走五臓附子氣厚為陽中之陽大黄味厚為隂中之隂茯苓氣薄為陽中之隂所以利小便入手太陽不離陽之體也麻黄味薄為隂中之陽所以發汗入手太隂不離隂之體也几同氣之物必有諸味同味之物必有諸氣氣味各有厚薄故性用不等呆曰味之薄者則通酸苦醎平是也味之厚者則泄醎苦酸寒是也氣之厚者發熱辛甘温熱是也氣之薄者滲泄甘淡平凉是也滲謂小汗泄謂利小便也宗奭曰天地既判生萬物者五氣耳五氣定位則五味生故曰生物者氣也成之者味也以竒生則成而偶以偶生則成而竒寒氣堅故其味可用以耎熱氣耎故其味可用以堅風氣散故其味可用以収燥氣収故其味可用以散上者冲氣之所生冲氣則無所不和故其味可用以緩氣堅則壮故苦可以養氣脉耎則和故鹹可以養脉骨収則强故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以耎収之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦病矣古之養生治疾者必先通乎此否則能已人之疾者盖寡矣李杲曰夫藥有温凉寒熱之氣辛甘淡酸苦醎之味也升降浮沉之相互厚薄隂陽之不同一物之内氣味兼有一藥之中理性具焉或氣一而味殊或味同而氣異氣象天温熱者天之陽凉寒者天之隂天有隂陽風寒暑濕燥火三隂三陽上奉之也味象地辛甘淡者地之陽酸苦醎者地之隂地有隂陽金木水火土生長化収藏下應之也氣味薄者輕清成象本乎天者親上也氣味厚者重濁成形本乎地者親下也好占曰本草之味有五氣有四然一味之中有四氣如辛味則石膏寒桂附熱半夏温薄荷凉之類是也夫氣者天也温熱天之陽寒凉天之隂陽則升隂則降味者地也辛甘淡地之陽酸苦鹹地之隂陽則浮隂則沉有使氣者使味者氣味俱使者先使氣而後使味者先使味而後使氣者有一物一味者一物三味者一物一氣者一物二氣者或生熟異氣味或根苗異氣味或温多而成熱或凉多而成寒或寒熱各半而成温或熱者多寒者少寒不為之寒或寒者多熱者少熱不為之熱不可一途而取也或寒熱各半書服則從熱之屬而升夜服則從寒之屬而降或晴則從熱隂則從寒變化不一如此况四時六位不同五運六氣各異可以輕用為哉六節臓象論云天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生又曰形不足者温之以氣精不足者補之以味王氷曰五氣者臊氣凑肝焦氣凑心香氣凑脾腥氣凑肺腐氣凑腎也心榮色肺主音故氣藏于肺而明色彰聲也氣為水之母故味藏于腸胃而養五氣孫思邈曰精以食氣氣養精以榮色形以食味味養形以生力精順五氣以靈形受五味以成若食氣相反則傷精食味不調則損形是以聖人先用食禁以存生後製藥物以防命氣味温補以存精形五味宜忌岐伯曰木生酸火生苦土生甘金生辛水生醎辛散酸収甘緩苦堅醎耎毒藥攻邪五穀為養五果為助五畜為益五菜為充氣合而服之以補精益氣此五味各有所利四時五臓病隨所宜也又曰隂之所生本在五味隂之五官傷在五味骨正筋柔氣血以流腠理以宻骨氣以清長有天命又曰聖人春夏養陽秋冬養隂以從其根二氣常存春食凉夏食寒以養陽秋食温冬食熱以養隂五欲肝欲酸心欲苦脾欲甘肺欲辛腎欲醎此五味合五臓之氣也五宜青色宜酸肝病宜食麻犬李韭赤色宜苦心病宜食麥羊杏薤黄色宜甘脾病宜食粳牛棗葵白色宜辛肺病宜食黄黍雞桃蔥黒色宜醎腎病宜食大豆黄巷猪栗藿五禁肝病禁辛宜食甘粳牛棗葵心病禁醎宜食酸麻犬李韭脾病禁酸宜食醎大豆豕栗藿肺病禁苦宜食麥羊杏薤腎病禁甘宜食辛黄黍雞桃蔥思邈曰春宜省酸増甘以養脾夏宜省苦増辛以養肺秋宜省辛増酸以養肝冬宜省醎増苦以養心四季宜省甘増醎以養腎時珍曰五欲者五味入胃喜歸本臓有餘之病宜本味通之五禁者五臟不足之病畏其所勝而宣其所不勝也五走酸走筋筋病毋多食酸多食令人癃酸氣澀収胞得酸而縮卷故水道不通也苦走骨骨病毋多食苦多食令人變嘔苦入下脘三焦皆閉故變嘔也甘走肉肉病毋多食甘多食令人悗心甘氣柔潤胃柔則緩緩則蟲動故悗心也辛走氣氣病毋多食辛多食令人洞心辛走上焦與氣俱行久留心下故洞心也醎走血血病毋多食醎多食令人渇血與醎相得則凝則胃汁注之故咽路焦而舌本乾九鍼論作醎走骨骨病毋多食醎苦走血血病毋多食苦五傷酸傷筋辛勝酸苦傷氣醎勝苦甘傷肉酸勝甘辛傷皮毛苦勝辛醎傷血甘勝醎五過味過于酸肝氣以冿脾氣乃絶肉胝傷䐢而唇掲味過于苦脾氣不濡胃氣乃厚皮稿而毛㧞味過于甘心氣喘滿色黒腎氣不平骨痛而髪落味過于辛筋脈沮絶精神乃失筋急而𤓰枯味過于醎大骨氣勞短心氣抑脈凝澁而變色時珍曰五走五傷者本臓之味自傷也即隂之五宫傷在五味也五過者本臓之味伐其所勝也即臟氣偏勝也五味偏勝岐伯曰五味入胃各歸所喜酸先入肝苦先入心甘先入脾辛先入肺醎先入腎久而増氣物化之常氣増而久天之由也王氷曰入肝為温入心為熱入肺為清入腎為寒入脾為至隂而四氣兼之皆為増其味而益其氣故各從本臟之氣久則從化故久服黄連苦參反熱從苦化也餘味倣此氣増不已則臓氣偏勝必有偏絶臓有偏絶必有暴夭是以藥不具五味不備四氣而久服之雖暫獲勝久必致夭故絶粒服餌者不暴亡無五味資助也果曰一隂一陽之謂道偏隂偏陽之謂疾陽劑剛勝積若燎原為消狂癰疽之屬則天癸竭而榮涸隂劑柔勝積若凝水為洞泄寒中之病則真火㣲而衛散故大寒大熱之藥當從權用之氣平而止有所偏助令人臓氣不平天之由也標本隂陽李杲曰夫治病者當知標本以身論之外為標内為本陽為標隂為本故六腑屬陽為標五臓屬隂為本臓腑在内為本十二經絡在外為標而臓腑隂陽氣血經絡又各有標本焉以病論之先受為本後傳為標故百病必先治其本後治其標否則邪氣滋甚其病益蓄縱先生輕病後生重病亦先治其輕後治其重則邪氣乃伏有中滿及病大小便不利則無問先後標本必先治滿及大小便為其急也故曰緩則治其本急則治其標又從前來者為實邪後來者為虗邪實則㵼其子虗則補其母假如肝受心火為前來實邪當於肝經刺榮穴以㵼心火為先治其本於心經刺榮穴以㵼心火為後治其標用藥則入肝之藥為引用㵼心之藥為君經云本而標之先治其本後治其標是也又如肝受腎水為虗邪當於腎經刺井穴以補肝木為先治其標後於肝經刺合穴以㵼腎水為後治其本用藥則入腎之藥為引補肝之藥為君經云標而本之先治其標後治其本是也升降浮沉李杲曰藥有升降浮沉化生長収藏成以配四時春升夏浮秋収冬藏土居中化是以味薄者升而生氣薄者降而収氣厚者浮而長味厚者沉而藏氣味平者化而成但言補之以辛甘温熱及氣味之薄者即助春夏之升浮便是㵼秋冬収藏之藥也在人之身肝心是矣但言補之以酸苦醎寒及氣味之厚者即助秋冬之降沉便是㵼春夏生長之藥也在人之身肺腎是矣淡味之藥滲即為升泄即為降佐使諸藥者也用藥者循此則生逆此則死縱令不死亦危困矣王好古曰升而使之降須知抑也沉而使之浮須知載也辛散也而行之也横甘發也而行之也上苦泄也而行之也下酸収也其性縮醎耎也其性舒其不同如此鼔掌成聲沃火成沸二物相合象在其間矣五味相制四氣相和其變可輕用哉本草不言淡味凉氣亦缺文也味薄者升甘平辛平辛㣲温㣲苦平之藥是也氣薄者降甘寒甘凉甘淡寒凉酸温酸平醎平之藥是也氣厚者浮甘熱辛熱之藥是也味厚者沉苦寒醎寒之藥是也氣味平者兼四氣四味甘平甘温甘凉甘辛平甘㣲苦平之藥是也李時珍曰酸醎無升甘辛無降寒無浮熱無沉其性然也而升者引之以醎寒則沉而直達下焦沉者引之以酒則浮而上至顛頂此非窺天地之奥而達造化之權者不能至此一物之中有根升稍降生升熟降是升降在物亦在人也四時用藥例李時珍曰經云必先歳氣毋伐天和又曰升降浮沉則順之寒熱温凉則逆之故春月宜加辛温之藥薄荷荆芥之類以順春升之氣夏月宜加辛熱之藥香薷生薑之類以順夏浮之氣長夏宜加甘苦辛温之藥人參白术蒼术黄蘗之類以順化成之氣秋月宜加酸温之藥芍藥烏梅之類以順秋降之氣冬月宜加苦寒之藥黄芩知母之類以順冬沉之氣所謂順時氣而養天和也經又云春省酸増甘以養脾氣夏省苦増辛以養肺氣長夏省甘増醎以養腎氣秋省辛増酸以養肺氣冬省醎増苦以養腎氣此則既不伐天和而又防其大過所以體天地之大徳也昧者捨本從標春用辛凉以伐木夏用醎寒以抑火秋用苦温以泄金冬用辛熱以涸水謂之時藥殊背素問逆順之理以夏月伏隂冬月伏陽推之可知矣雖然月有四時日有四時或春得秋病夏得冬病神而明之機而行之變通權宜又不可泥一也王好古曰四時總以芍藥為脾劑蒼术為胃劑柴胡為時劑十一臓皆取决于少陽為發生之始故也凡用純寒純熱之藥及寒熱相雜並宜用甘草以調和之惟中滿者禁用甘爾五運六淫用藥式厥隂司天己亥年風淫所勝平以辛凉佐以苦甘以甘緩之以酸㵼之王注云厥隂氣未為盛熱故以凉藥平之清反勝之治以酸温佐以甘苦少隂司天子午年熱淫所勝平以醎寒佐以苦甘以酸収之寒反勝之治以甘温佐以苦酸辛太隂司天丑未年濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦温佐以甘辛以汗為故身半以上濕氣有餘火氣復鬰則宜解表流汗而袪之也熱反勝之治以苦寒佐以苦酸少陽司天寅申年火滛所勝平以酸冷佐以苦甘以酸収之以苦發之以酸復之熱氣已退時發動者是為心虗氣散不斂以酸収之仍兼寒助乃能除根熱見太甚則以苦發之汗已便凉是邪氣盡汗已猶熱是邪未盡則以酸収之已汗又熱又汗復熱是臓虗也則補其心可也寒反勝之治以甘熱佐以苦辛陽明司天卯酉年燥淫所勝平以苦温佐以酸辛以苦下之制燥之法以苦温宜下必以苦宜補必以酸宜㵼必以辛熱反勝之治以辛寒佐以苦甘太陽司天辰戌年寒淫所勝平以辛熱佐以甘苦以醎㵼之熱反勝之治以醎冷佐以苦辛厥隂在泉寅申年風滛于内治以辛凉佐以苦以甘緩之以辛散之風喜温而惡清故以辛凉勝之以苦隨所利也木苦急以甘緩之木苦抑以辛散之清反勝之治以酸温佐以苦甘以辛平之少隂在泉夘酉年熱淫于内治以醎寒佐以甘苦以酸収之以苦發之熱性惡寒故以醎寒熱甚于表以苦發之不盡復寒制之寒制不盡復苦發之以酸収之甚者再方㣲者一方可使必已時發時止亦以酸収之寒反勝之治以甘熱佐以苦辛以醎平之太隂在泉辰戌年濕淫于内治以苦熱佐以酸淡以苦燥之以淡泄之濕其燥反故以苦熱佐以酸淡利竅也熱反勝之治以苦冷佐以醎甘以苦平之少陽在泉己亥年火淫于内冶以醎冷佐以苦辛以酸収之以苦發之火氣大行于心腹醎性柔耎以制之以酸収其散氣大法須汗者以辛佐之寒反勝之治以甘熱佐以辛苦以醎平之陽明在泉子午年燥淫于内治以甘辛以苦下之温利凉性故以苦下之熱反勝之治以辛寒佐以苦甘以酸平之以和為利太陽在泉丑未年寒淫于内治以甘熱佐以苦辛以醎㵼之以辛潤之以苦堅之以熱治寒是為摧勝折其氣也熱反勝之治以鹹冷佐以甘辛以苦平之李時珍曰司天主上半年天氣司之故六淫謂之所勝上淫于下也故曰平之在泉主下半年地氣司之故六淫謂之于内外淫于内也故曰治之當其時而反得勝已之氣者謂之反勝六氣之勝何以徴之燥甚則地乾暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地涸是也其六氣勝復主客證治病機甚詳見素問至真要大論文多不載六腑五臓用藥氣味補㵼肝膽温補凉㵼辛補酸㵼心小腸熱補寒㵼鹹補甘㵼肺大腸凉補濕㵼酸補辛㵼腎膀胱寒補熱㵼苦補鹹㵼脾胃濕熱補寒凉㵼各從其宜甘補苦㵼三焦命門同心張元素曰五臓更相平也一臓不平所勝平之故云安榖則昌絶榖則亡水去則營散榖消則衛亡神無所居故血不可不養衛不可不温血温氣和營衛乃行常有天命五臓五味補㵼肝苦急急食甘以緩之甘草以酸㵼之赤芍藥實則㵼子甘草欲散急食辛以散之川芎以辛補之細辛虗則補母地黄黄蘗心苦緩急食酸以収之五味子以甘㵼之甘草參茋實則㵼子甘草欲耎急食鹹以耎之􅉭消以鹹補之澤㵼虗則補母生薑脾苦濕急食苦以燥之白术以苦㵼之黄連實則㵼子桑白皮欲緩急食甘以緩之炙甘草以甘補之人參虗則補母炒鹽肺苦氣逆急食苦以泄之訶子以辛㵼之桑白皮實則㵼子澤㵼欲収急食酸以収之白芍藥以酸補之五味子虗則補母五味子腎苦燥急食辛以潤之黄蘗知母以鹹㵼之凙㵼實則㵼子芍藥欲堅急食苦以堅之知母以苦補之黄蘗虗則補母五味子張元素曰凡藥之五味隨五臓所入而為補㵼亦不過因其性而調之酸入肝苦入心甘入脾辛入肺鹹入腎辛主散酸主収甘主緩苦主堅鹹主耎辛能散結潤燥致津液通氣酸能収緩斂散甘能緩急調中苦能燥濕堅耎鹹能耎堅淡能利竅李時珍曰甘緩酸収苦燥辛散鹹耎淡滲五味之本性一定而不變者也其或補或㵼則因五臓四時而迭相施用者也温凉寒熱四氣之本性也其於五臓補㵼亦迭相施用也此特潔古張氏因素問飲食補㵼之義舉數藥以為例耳學者宜因意而充之臓腑虗實標本用藥式肝藏血屬木膽火寄于中主血主目主筋主呼主怒本病諸風眩運僵仆强直驚癎兩脇腫痛胸肋滿痛嘔血小腹疝痛痃瘕女人經病標病寒熱瘧頭痛吐涎目赤面青多怒耳閉頰腫筋攣卵縮丈夫㿗疝女人少腹腫痛隂病有餘㵼之㵼子甘草行氣香附芎藭瞿麥牽牛青橘皮行血紅花大黄鼈甲水蛭桃仁䖟虫莪蒁蘇木京三稜牡丹皮穿山甲鎮驚雄黄胡粉金箔銀箔鐵落鉛丹真珠龍骨代赭石石决明夜明砂搜風羌活獨活荆芥防風薄荷皂莢槐子烏頭蔓荆子白附子白花蛇殭蠶蟬蜕不足補之補母枸把苦參杜仲萆薢狗脊阿膠熟地黄兎絲子補血當歸血竭牛膝沒藥續斷芎藭白芍藥補氣天麻决明柏子仁榖精草白术生薑菊花細辛宻蒙花本熱寒之㵼木芍藥烏梅澤㵼㵼火黄連龍膽草黄芩苦茶猪膽攻裏大黄標熱發之和解柴胡半夏解肌桂枝麻黄心藏神為君火包絡為相火代君行令主血主言主汗主笑本病諸熱瞀瘛驚惑譫妄煩亂啼笑罵詈怔忡徤忘自汗諸痛痒瘡瘍標病肌熱畏寒戰慄舌不能言面赤目黄手心煩熱胸脇滿痛引腰背肩胛肘臂火實㵼之㵼子黄連大黄氣丼草人參赤茯苓木通黄蘗血丹參牡丹生地黄𤣥參鎮驚硃砂牛黄紫石英神虗補之補母細辛烏梅酸棗仁生薑陳皮氣桂心蒲澤㵼石菖白茯苓伏神逺志血當歸乳香熟地黄沒藥本熱寒之㵼火黄芩竹葉麥門冬􅉭消炒鹽凉血地黄巵子天竺黄標熱發之散火甘草獨活麻黄柴胡龍腦脾藏智屬土為萬物之母主營衛主味主肌肉主四肢本病諸濕腫脹痞滿噫氣大小便閉黄疸痰飲吐㵼霍亂心腹痛飲食不化標病身體胕腫重困嗜卧四肢不舉舌本强痛足大趾不用九竅不通諸痙項强土實㵼之㵼子訶子防風桑白皮葶藶吐豆䜴虀汁巵子藜蘆蘿蔔子赤常山苦參小豆𤓰蔕鹽湯鬱金苦茶下大黄芫花􅉭消青礞石大㦸甘遂續隨子土虗補之補母桂心茯苓氣人參藿香黄茋葳㽔升麻縮砂葛根木香甘草扁豆陳皮血白术木𤓰蒼术烏梅白芍蜂蜜膠飴大棗乾薑本濕除之燥中宫白术南星蒼术蔲橘皮芥半夏草豆白子吳茱茰潔淨府木通赤茯苓猪苓藿香標濕滲之開鬼門葛根蒼术麻黄獨活肺藏魄屬金總攝一身元氣主聞主哭主皮毛本病諸氣膹鬱諸痿喘嘔氣短欬嗽上逆欬唾膿血不得卧小便數而欠遺失不禁標病洒淅寒熱傷風自汗肩背痛冷臑臂前亷痛氣實㵼之㵼子澤㵼葶藶桑白皮地骨皮除濕半夏橘皮白礬白茯苓薏苡仁木𤓰㵼火梗米石膏寒水石知母訶子通滯枳殻杏仁薄荷皂莢乾生薑桔梗木香紫蘇厚朴氣虗補之補母甘草人參升麻黄茋山藥潤燥蛤蚧冬阿膠天門麥門冬貝母百合天花粉歛肺烏梅粟殻五味子芍藥五倍子本熱清之清金黄芩紫苑知母冬麥門冬天門巵子沙參本寒温之温肺丁香益智藿香縮砂欵冬花糯米檀香百部白豆蔲標寒散之解表麻黄葱白紫蘇腎藏志屬水為天一之源主聽主骨主二隂本病諸寒厥逆骨痿腰痛腰冷如冰足胻腫寒少腹滿急疝瘕大便閉泄吐利腥穢水液澄澈清冷不禁消渇引飲標病發熱不惡熱頭眩頭痛咽痛舌燥脊股後亷痛水强㵼之㵼子大㦸牽牛㵼腑澤㵼猪苓車前子防已茯苓水弱補之補母人參山藥氣知母𤣥參補骨脂砂仁苦參血黄蘗茰枸杞山茱熟地黄阿膠鎻陽子肉蓯蓉五味本熱攻之下傷寒少隂證口燥咽乾大承氣湯本寒温之温裏附子乾薑官桂蜀椒白术標寒解之解表麻黄細辛獨活桂枝標熱凉之清熱𤣥參連翹甘草猪膚命門為相火之原天地之始藏精生血降則為漏升則為鉛主三焦元氣本病前後癃閉氣逆裏急疝痛奔豚消渇膏淋精漏精寒赤白濁溺血崩中帶漏火强㵼之㵼相火黄蘗黄生地知母茯苓牡丹皮𤣥參地骨皮寒水石火弱補之益陽附子頭肉桂川烏益智子硫黄破故紙天雄沉香烏藥陽起石當歸舶茴香蛤蚧胡桃覆盆巴㦸天丹砂精脱固之澀滑牡蠣茰山茱芡實蛤粉金櫻子五味子逺志三焦為相火之用分布命門元氣主升降出入游行天地之間總領五臓六腑營衛經絡内外上下左右之氣號中清之府上主納中主化下主出本病諸熱瞀瘛暴病暴死暴瘖躁擾狂越譫妄驚駭諸血溢血泄諸氣逆衝上諸瘡瘍痘疹瘤核上熱則喘滿諸嘔吐酸胸痞脇痛飲食不消頭上出汗中熱則善饑而瘦解㑊中滿諸脹腹大諸病有聲鼔之如鼓上下闗格不通霍亂吐利下熱則暴注下廹水液渾濁下部腫滿小便淋瀝或不通大便閉結下痢上寒則吐飲食痰水胸痺前後引痛食已還出中寒則飲食不化寒脹反胃吐水濕㵼不竭下寒則二便不禁臍腹冷疝痛標病惡寒戰慄如䘮神守耳鳴耳聾嗌腫㗋痺諸疾胕腫疼酸驚駭手小指次指不用實火㵼之汗麻黄羌活柴胡石膏葛根荆芥升麻薄荷吐𤓰蒂滄鹽虀汁下大黄􅉭消虗火補之上人參天雄桂心中人參黄茋丁香木香草果下附子紙桂心破故硫黄人參沉香烏藥本熱寒之上黄芩黄連翹生地巵子知母𤣥參石膏中黄連連翹生苄石膏下黄蘗知母生苄石膏牡丹地骨皮標熱散之解表柴胡細辛荆芥羌活葛根石膏膽屬木為少陽相火發生萬物為决斷之官十一臓之主主同肝本病口苦嘔苦汁善太息澹澹如人將捕狀目昏不眠標病寒熱往來痁瘧胸脇痛頭額痛耳痛鳴聾瘰癧結核馬刀足小指次指不用實火㵼之㵼膽龍膽黄連牛膝苦茶猪膽生㽔仁生酸棗仁虗火補之温膽人參當歸細辛地黄半夏炒㽔仁炒酸棗仁本熱平之降火黄芩黄連芍藥連翹鎮驚黑鉛水銀標熱和之和解柴胡芍藥黄芩半夏甘草胃屬土主容受為水穀之海主同脾本病噎膈反胃中滿腫脹嘔吐㵼痢霍亂腹痛消中善饑不消食傷飲食胃管當心痛支兩脇標病發熱蒸蒸身前熱身前寒發狂譫語咽痺上齒痛口眼喎斜鼻痛鼽衂赤􅖟胃實㵼之濕熱大黄􅉭消飲食巴豆三稜神麴輕粉山查阿魏硇砂欎金胃虚補之濕熱蒼术白术半夏茯苓橘皮生薑寒濕乾薑人參附子黄茋草果官桂丁香肉豆蔲本熱寒之降火石膏地黄犀角黄連標熱解之解肌升麻葛根豆䜴大腸屬金主變化為傳送之官本病大便閉結泄痢下血裏急後重疽痔脱肛腸鳴而痛標病齒痛㗋痺頸腫口乾咽中如核鼽衂目黄手大指次指痛宿食發熱寒慄腸實㵼之熱大黄石膏􅉭消桃花牽牛巴豆郁李仁氣枳殻木香橘皮㯽榔腸虗補之氣皂莢燥桃仁當歸麻仁蓉杏仁肉蓯地黄乳香松子濕白术蒼术半夏硫黄䧟升麻葛根脱龍骨脂白堊赤石訶子粮粟殻禹餘烏梅皮白礬石榴本熱寒之清熱秦艽槐角地黄黄芩本寒溫之温裏乾薑附子肉豆蔲標熱散之解肌石膏白芷升麻葛根小腸主分泌水榖為受盛之官本病大便水榖利小便短小便閉小便血小便自利大便後血小腸氣痛宿食夜熱旦止標病身熱惡寒嗌痛頷腫口糜耳聾實熱㵼之氣木通猪苓滑石瞿麥澤㵼燈草血地黄蒲黄赤茯苓牡丹皮巵子虗寒補之氣白术楝實茴香砂仁神麴扁豆血桂心𤣥胡索本熱寒之降火黄蘗黄苓黄連連翹巵子標熱散之解肌藁本羌活防風蔓荆膀胱主津液為胞之府氣化乃能出號州都之官諸病皆干之本病小便淋瀝或短數或黄赤或白或遺失或氣痛標病發熱惡寒頭痛腰脊强鼻窒足小指不用實熱㵼之泄火滑石猪苓澤㵼茯苓下虚補之熱黄蘗知母寒桔梗升麻益智烏藥山茱茰本熱利之降火地黄皮巵子地骨茵陳黄蘗牡丹皮標寒發之發表麻黄木賊桂枝羌活蒼术防已黄茋引經報使潔古珍珠嚢手少隂心黄連細辛手太陽小腸藁本黄蘗足少隂腎獨活知母桂枝細辛足太陽膀胱羌活手太隂肺桔梗葱白升麻白芷手陽明大腸白芷石膏升麻足太隂脾升麻葛根蒼术白芍足陽明胃白芷石膏升麻葛根手厥隂心主柴胡皮牡丹足少陽膽柴胡青皮足厥隂肝青皮川芎吳茱茰柴胡手少陽三焦連翹柴胡中青皮上地骨皮下附子本草綱目卷一下
