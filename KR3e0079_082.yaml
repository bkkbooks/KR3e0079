body:
  text: 本草綱目卷三十四目録木部李時珍曰木乃植物五行之一性有土宜山谷原隰肇由氣化爰受形質喬條苞灌根葉華實堅脆美惡各具太極色香氣味區辨品類食備果蔬材充藥器寒温毒良直有考彚多識其名奚止讀詩埤以本草益啟其知乃肆蒐獵萃而類之是為木部凡一百八十種分為六類曰香曰喬曰灌曰寓曰苞曰襍舊本木部三品共二百六十三種今併入二十五種移一十四種入草部二十九種入蔓草三十一種入果部三種入菜部一十六種入器用部二種入蟲部自草部移入二種外類有名未用移八十一種神農本草四十四種梁陶𢎞景註名醫别録二十三種梁陶𢎞景註唐本草二十二種唐蘓恭本草拾遺三十九種唐陳藏器海藥本草五種唐李珣蜀本草一種蜀韓保昇開寶本草一十五種宋馬志嘉祐本草六種宋掌禹錫圖經本草一種宋蘓頌日華本草一種宋人大明證類本草一種宋唐慎微本草補遺一種元朱震亨本草綱目二十一種明李時珍附註魏李當之藥録宋雷斆炮灸吴普本草藥對齊徐之才唐甄權藥性唐孟詵食療孫思邈千金楊損之刪繁蕭炳四聲説宋陳承别南唐陳士良食性㓂宗奭衍義金張元素珍珠囊王好古湯液元李杲法象元吳瑞日用明汪穎食物周憲王救荒汪機㑹徧王綸集要寗原食鑑陳嘉謨蒙筌木之一香木類三十五種内附六種柏本經松别録杉别録附丹桎木桂本經箘桂本經天竺桂海藥月桂拾遺木蘭本經辛夷本經沈香别録蜜香拾遺丁香開寶香即雞舌檀香别録降真香證類楠别録樟拾遺釣樟别録烏藥開寶附研藥櫰香綱目香即兠婁必栗香拾遺楓香脂唐本香即白膠薰陸香乳香别録没藥開寶騏驎竭唐本竭即血質汗開寳安息香唐本蘓合香别録詹糖香别録附結殺篤耨香綱目附膽香樟腦綱目阿魏唐本蘆薈開寳胡桐淚唐本返魂香海藥附兠木香木草綱目卷三十四目録
