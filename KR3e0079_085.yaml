body:
  text: 本草綱目卷三十五上明李時珍撰木之二喬木類十八種内附三種蘗木本經上品釋名黄蘗别錄根名檀桓時珍曰蘗木名義未詳本經言蘗木及根不言蘗皮豈古時木與皮通用乎俗作黄柏者省寫之謬也集解别錄曰蘗木生漢中山谷及永昌𢎞景曰今出邵陵者輕薄色深為勝出東山者厚而色淺其根於道家入木芝品今人不知取服又有一種小樹狀如石榴其皮黄而苦俗呼為子蘗亦主口瘡又一種小樹多刺皮亦黄色亦主口瘡恭曰子蘗亦名山石榴子似女貞皮白不黄亦名小蘗所在有之今云皮黄謬矣按今俗用子蘗皆多刺小樹名刺蘗非小蘗也禹錫曰按蜀木圖經云黄蘗樹髙數丈葉似吳茱萸亦如紫椿經冬不凋皮外白裏深黄色其根結塊如松下茯苓今所在有本出房商合等州山谷中皮𦂳厚二三分鮮黄者上二月五月采皮日乾機曰房商者治裏治下用之邵陵者治表治上用之各適其宜爾頌曰處處有之以蜀中出者肉厚色深為佳修治斆曰凡使蘗皮削去粗皮用生蜜水浸半日漉出晒乾用蜜塗文武火炙令蜜盡為度每五兩用蜜三兩元素曰二制治上焦單制治中焦不制治下焦也時珍曰黄蘗性寒而沈生用則降實火熟用則不傷胃酒制則治上鹽制則治下蜜制則治中氣味苦寒無毒元素曰性寒味苦氣味俱厚沈而降陰也又云苦厚微辛隂中之陽入足少陰經為足太陽引經藥好古曰黄芩栀子入肺黄連入心黄蘗入腎燥濕所歸各從其類也故活人書四味解毒湯乃上下内外通治之藥也之才曰惡乾漆伏硫黄主治五臟腸胃中結熱黄疸腸痔止洩痢女子漏下赤白隂傷蝕瘡本經療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神别錄熱瘡皰起蟲瘡血痢止消渴殺蛀蟲藏器男子陰痿及傅莖上瘡治下血如雞鴨肝片甄權安心除勞治骨蒸洗肝明目多淚口乾心熱殺疳蟲治蚘心痛鼻衂腸風下血後急熱腫痛大明瀉膀胱相火補腎水不足堅腎壯骨髓療下焦虛諸痿癱瘓利下竅除熱元素瀉伏火救腎水治衝脈氣逆不渴而小便不通諸瘡痛不可忍李杲得知母滋隂降火得蒼术除濕清熱為治痿要藥得細辛瀉膀胱火治口舌生瘡震亨傅小兒頭瘡時珍發明元素曰黄蘗之用有六瀉膀胱龍火一也利小便結二也除下焦濕腫三也痢疾先見血四也臍中痛五也補腎不足壯骨髓六也凡腎水膀胱不足諸痿厥腰無力於黄茋湯中加用使兩足膝中氣方涌出痿軟即便去也乃癱瘓必用之藥蜜炒研末治口瘡如神故雷公炮灸論云口瘡舌折立愈黄酥謂以酥灸根黄含之也杲曰黄蘗蒼术乃治痿要藥凡去下焦濕熱作腫及痛并膀胱有火邪并小便不利及黄澀者並用酒洗黄蘗知毋為君茯苓澤瀉為佐凡小便不通而口渇者邪熱在氣分肺中伏熱不能生水是絶小便之源也法當用氣味俱薄淡滲之藥猪苓澤瀉之類瀉肺火而清肺金滋水之化源若邪熱在下焦血分不渇而小便不通者乃素問所謂無陰則陽無以生無陽則陰無以化膀胱者州都之官津液藏焉氣化則能出矣法當用氣味俱厚陰中之陰藥治之黄蘗知母是也長安王善夫病小便不通漸成中滿腹堅如石脚腿裂破出水雙睛凸出飲食不下痛苦不可名狀治滿利小便滲洩之藥服遍矣予診之曰此乃奉養太過膏粱積熱損傷腎水致膀胱久而乾涸小便不化火又逆上而為嘔噦難經所謂關則不得小便格則吐逆者潔古老人言熱在下焦但治下焦其病必愈遂處以北方寒水所化大苦寒之藥黄蘗知母各一兩酒洗焙碾入桂一錢為引熟水丸如芡子大每服二百丸沸湯下少時如刀刺前陰火燒之狀溺如瀑泉涌出牀下成流顧盼之間腫脹消散内經云熱者寒之腎惡燥急食辛以潤之以黄蘗之苦寒瀉熱補水潤燥為君知母之苦寒瀉腎火為佐肉桂辛熱為使寒因熱用也震亨曰黄蘗走至陰有瀉火補陰之功非陰中之火不可用也火有二君火者人火也心火也可以濕伏可以水滅可以直折黄連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕折之當從其性而伏之惟黄蘗之屬可以降之時珍曰古書言知母佐黄蘗滋陰降火有金水相生之義黄蘗無知母猶水母之無蝦也蓋黄蘗能制膀胱命門陰中之火知母能清肺金滋腎水之化源故潔古東垣丹溪皆以為滋陰降火要藥上古所未言也蓋氣為陽血為陰邪火煎熬則陰血漸涸故陰虛火動之病須之然必少壯氣盛能食者用之相宜若中氣不足而邪火熾甚者久服則有寒中之變近時虚損及縱慾求嗣之人用補陰藥往往以此二味為君日日服餌降令太過脾胃受傷真陽暗損精氣不暖致生他病蓋不知此物苦寒而滑滲且苦味久服有反從火化之害故葉氏醫學統㫖有四物加知母黄蘗久服傷胃不能生陰之戒附方舊十二新三十一陰火為病大補丸用黄蘗去皮鹽酒炒褐為末水丸梧子大血虚四物湯下氣虚四君子湯下丹溪方男女諸虚孫氏集效方坎離丸治男子婦人諸虚百損小便淋漓遺精白濁等證黄蘗去皮切二斤熟糯米一升童子小便浸之九浸九晒蒸過晒研為末酒煮麫糊丸梧子大毎服一百丸温酒送下上盛下虚水火徧盛消中等證黄蘗一斤分作四分用醇酒蜜湯鹽水童尿浸洗晒炒為末以知母一斤去毛切搗熬膏和丸梧子大毎服七十丸白湯下活人心統四治坎離諸丸方見草部蒼术下臟毒痔漏下血不止孫探𤣥集效方蘗皮丸用川黄蘗皮刮浄一斤分作四分三分用酒醋童尿各浸七日洗晒焙一分生炒黑色為末煉蜜丸梧子大毎空心温酒下五十丸久服除根刮楊誠經驗方百補丸專治諸虚赤白濁用川蘗皮浄一斤分作四分用酒蜜人乳糯米泔各浸透灸乾切研廩米飯丸如上法服又陸一峯蘗皮丸黄蘗一斤分作四分三分用醇酒鹽湯童尿各浸二日焙研一分用酥灸研末以猪臟一條去膜入藥在内紥煮熟搗丸如上法服之下血數升黄蘗一兩去皮雞子白塗灸為末水丸綠豆大毎服七丸温水下名金虎丸普濟方小兒下血或血痢黄蘗半兩赤芍藥四錢為末飯丸麻子大毎服一二十丸食前米飲下閻孝忠集效方妊娠下痢白色晝夜三五十行根黄厚者蜜炒令焦為末大蒜煨熟去皮搗爛和丸梧子大毎空心米飲下三五十丸日三服神妙不可述婦人良方小兒熱瀉黄蘗削皮焙為末用米湯和丸粟米大毎服一二十丸米湯下十全博救方赤白濁淫及夢洩精滑真珠粉丸黄蘗炒真蛤粉各一斤為末毎服一百丸空心温酒下黄蘗苦而降火蛤粉醎而補腎也又方加知母炒牡蠣粉煆山藥炒等分為末糊丸梧子大毎服八十丸鹽湯下潔古家珍積熱夢遺心忪恍惚膈中有熱宜清心丸主之黄蘗末一兩片腦一錢煉蜜丸梧子大毎服十五丸麥門冬湯下此大智禪師方也許學士本事方消渴尿多能食黄蘗一斤水一升煮三五沸渇即飲之恣飲數日即止韋宙獨行方嘔血熱極黄蘗蜜塗灸乾為末麥門冬湯調服二錢即瘥經驗方時行赤目黄蘗去粗皮為末濕紙包裹黄泥固煨乾毎用一彈子大紗帕包之浸水一盞飯上蒸熟乗熱熏洗極效此方有金木水火土故名五行湯一丸可用三二次論龍木嬰兒赤目在蓐内者人乳浸黄蘗汁㸃之小品同眼目昏暗毎旦含黄蘗一片吐津洗之終身行之永無目疾矣普濟方卒喉痺痛黄蘗片舍之又以一斤酒一斗煮二沸恣飲便愈矣肘后方小兒重舌黄蘗浸苦竹瀝㸃之千金方口舌生瘡外臺用黄蘗含之良脾深師用蜜漬取汁含之吐涎冦氏衍義治心有熱舌頰生瘡蜜灸黄蘗青黛各一分為末入生龍腦一字摻之吐涎等赴筵散用黄蘗細辛等分為末摻或用黄蘗乾薑分亦良口疳臭爛綠雲散用黄蘗五錢銅綠二錢為末摻之漱去涎三因方鼻疳有蟲黄蘗二兩冷水浸一宿絞汁溫服聖惠方鼻中生瘡黄蘗檳榔末猪脂和傅普濟方脣瘡痛痒黄蘗末以薔薇根汁調塗立效聖濟錄鬈毛毒瘡生頭中初生如蒲桃痛甚黄蘗一兩乳香二錢半為末槐花煎水調作餅貼于瘡口普濟方小兒𩕄腫生下即腫者黄蘗末水調貼足心效普濟方傷寒遺毒手足腫痛欲斷黄蘗五斤水三升煮漬之后肘方癰疽乳發初起者黄蘗末和雞子白塗之乾即易之梅師方癰疽腫毒黄蘗皮炒川烏頭炮等分為末唾調塗之留頭頻以米泔水潤濕之集簡方小兒臍瘡不合者黄蘗末塗之效子母秘錄小兒膿瘡遍身不乾用黄蘗末入枯礬少許摻之即愈楊起簡便方男子陰瘡有二種一者陰蝕作臼膿出一者只生熱瘡熱瘡用黄蘗黄芩等分煎湯洗之仍以黄蘗黄連作末傅之肘又法黄蘗煎湯洗之塗以白蜜效后方臁瘡熱瘡黄蘗末一兩輕粉三錢猪膽汁調搽之或止用蜜灸黄蘗一味火毒生瘡凡人冬月向火火氣入内兩股生瘡其汁淋漓用黄蘗末摻之立愈一婦病此人無識者有用此而愈張杲醫說凍瘡裂痛乳汁調黄蘗末塗之儒門事親自死肉毒自死六畜有毒以黄蘗末水服方寸匕肘后方斂瘡生肌黄蘗末麫糊調塗效宣明方檀桓拾遺集解藏器曰檀桓乃百歳蘗之根如天門冬長三四尺别在一旁以小根綴之一名檀桓芝出靈寳方時珍曰本經但言黄蘗根名檀桓陳氏所說乃蘗旁所生檀桓芝也與陶𢎞景所說同氣味苦寒無毒主治心腹百病安魂魄不饑渇久服輕身延年通神本經長生神仙去萬病為散飲服方寸匕盡一枚有驗藏器小蘗唐本草釋名子蘗𢎞景山石榴時珍曰此與金櫻子杜鵑花並名山石榴非一物也集解𢎞景曰子蘗樹小狀如石榴其皮黄而苦又一種多刺皮亦黄並主口瘡恭曰小蘗生山石間所在皆有襄陽峴山東者為良一名山石榴其樹枝葉與石榴無别但花異子細黒圓如牛李子及女貞子爾其樹皮白陶云皮黄恐謬矣今太常所貯乃小樹多刺而葉細者名刺蘗非小蘗也藏器曰凡是蘗木皆皮黄今既不黄非蘗也小蘗如石榴皮黄子赤如枸杞子兩頭尖人剉枝以染黄若云子黑而圓恐是别物非小蘗也時珍曰小蘗山間時有之小樹也其皮外白裏黄狀如蘗皮而薄小氣味苦大寒無毒主治口瘡疳䘌殺諸蟲去心腹中熱氣唐本治血崩時珍茄婦人良方治血崩阿陀丸方中用之黄櫨宋嘉祐集解藏器曰黄櫨生商洛山谷四川界甚有之葉圓木黄可染黄色木氣味苦寒無毒主治除煩熱解酒疸目黄水煮服之藏器洗赤眼及湯火漆瘡時珍附方新一大風癩疾黄櫨木五兩剉用新汲水一斗浸二七日焙研蘇枋木五兩烏麻子一斗九蒸九暴天麻二兩丁香乳香一兩為末以赤黍米一升淘浄用浸黄櫨木煮米粥搗和丸梧子大毎服二三十丸食後漿水下日二夜一聖濟總錄厚朴本經中品校正併入有名未用逐折釋名烈朴日華赤朴别錄厚皮同重皮廣雅樹名榛别錄子名逐折别錄故時珍曰其木質朴而皮厚味辛烈而色紫赤有厚朴烈赤諸名頌曰廣雅謂之重皮方書或作厚皮也集解别錄曰厚朴生交趾寃句三月九月十月采皮陰乾𢎞景曰今出建平宜都極厚肉紫色為好殻薄而白者不佳俗方多用道家不須也頌曰今洛陽陜西江淮湖南蜀川山谷中往往有之而以梓州龍州者為上木高三四丈徑一二尺春生葉如槲葉四季不凋紅花而青實皮極鱗皺而厚紫色多潤者佳薄而白者不堪宗奭曰今伊陽縣及商州亦有但薄而色淡不如梓州者厚而紫色有油時珍曰朴樹膚白肉紫葉如槲葉五六月開細花細實如冬青子生青熟赤有核七八月采之味甘美皮修治斆曰凡使要紫色味辛者為好刮去粗皮入自然丸散毎一斤用酥四兩炙熟用若入湯飲用薑汁八兩灸盡為度大明曰凡入藥去粗皮用薑汁灸或浸炒用宗奭曰味苦不以薑制則棘人喉舌氣味苦温無毒别錄曰大温吳普曰神農岐伯雷公苦無毒李當之小温權曰苦辛大熱元素曰氣温味苦辛氣味俱厚體重濁而微降陰中陽也杲曰可升可降之才曰乾薑為之使惡澤㵼硝石寒水石忌豆食之動氣主治中風傷寒頭痛寒熱驚悸氣血痺死肌去三蟲本經温中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止洩痢淋露除驚去留熱心煩滿厚腸胃别錄健脾治反胃霍亂轉筋冷熱氣瀉膀胱及五臟一切氣婦人産前産後腹臟不安殺腸中蟲明耳目調關節大明治積年冷氣腹内雷鳴虚吼宿食不消去結水破宿血化水穀止吐酸水大温胃氣治冷痛主病人虚而尿白甄權主肺氣脹滿膨而喘欬好古發明宗奭曰厚朴平胃㪚中用最調中至今此藥盛行既能温脾胃又能走冷氣為世所須也元素曰厚朴之用有三平胃一也去腹脹二也孕婦忌之三也雖除腹脹若虚弱人宜斟酌用之誤服脫人元氣惟寒脹大熱藥中兼用乃結者散之之神藥也震亨曰厚朴屬土有火其氣温能瀉胃中之實也平胃散用之佐以蒼术正為瀉胃中之濕平胃土之太過以致於中和而已非謂温補脾胃也習以成俗皆謂之補哀哉其治腹脹者因其味辛以提其滯氣滯行則宜去之若氣實人誤服參茋藥多補氣脹悶或作喘宜此瀉之好古曰本草言厚朴治中風傷寒頭痛温中益氣消痰下風厚腸胃去腹滿果泄氣乎果益氣乎蓋與枳實大黄同用則能泄實滿所謂消痰下氣是也若與橘皮蒼术同用則能除濕滿所謂温中益氣是也與解利藥同用則治傷寒頭痛與瀉利藥同用則厚腸胃大抵其性味苦温用苦則泄用温則補也故成無已云厚朴之苦以泄腹滿杲曰苦能下氣故泄實滿温能益氣故散濕滿附方舊七新七厚朴煎丸孫兆甫云補腎不如補脾脾胃氣壯則能飲食飲食既進則益營衞養精血滋骨髓是以素問曰精不足者補之以味形不足者補之以氣此藥大補脾胃虚損温中降氣化痰進食去冷飲嘔吐泄瀉等證用厚朴去皮剉片用生薑二斤連皮切片以水五升同煮乾去薑焙朴以乾薑四兩甘草二兩再同厚朴以水五升煮乾去草焙薑朴為末用棗肉生薑同煮熟去薑搗棗和丸梧子大毎服五十丸米飲下一方加熟附子王璆百一選方痰壅嘔逆心胸滿悶不下飲食厚朴一兩薑汁灸黄為末非時米飲調下二錢匕效聖惠方腹脹脈數厚朴三物湯用厚朴半斤枳實五枚以水一斗二升煎取五升入大黄四兩再煎三升温服一升轉動更服不動勿服張仲景金匱要畧腹痛脹滿厚朴七物湯用厚朴半斤制甘草大黄各三兩棗十枚大枳實五枚桂二兩生薑五兩以水一斗煎取四升温服八合日三嘔者加半夏五合金匱要畧男女氣脹心悶飲食不下冷熱相攻久患不愈厚朴薑汁灸焦黑為末以陳米飲調服二錢匕日三服斗門方反胃止瀉方同上中滿洞瀉厚朴乾薑等分為末蜜丸梧子大毎服五十丸米飲下鮑氏方小兒吐瀉胃虚及有痰驚梓朴散用梓州厚朴一兩半夏湯泡七次薑汁浸半日晒乾一錢以米泔三升同浸一百刻水盡為度如未盡少加火熬乾去厚朴只研半夏毎服半錢或一字薄荷湯調下錢乙小兒直訣霍亂腹痛厚朴湯用厚朴灸四兩桂心二兩枳實五枚生薑二兩水六升煎取二升分三服此陶隠居方也唐石泉公王方慶廣南方云此方不惟治霍亂凡諸病皆治汲聖惠方用厚朴薑汁灸研末新水服二錢如神下痢水穀久不瘥者厚朴三兩黄連三兩水三升煎一升空心細服梅師方大腸乾結厚朴生研猪臟煮搗和丸梧子大毎薑水下三十丸十便良方尿渾白濁心脾不調腎氣渾濁用厚朴薑汁炙一兩白茯苓一錢水酒各一椀煎一椀温服經驗良方月水不通厚朴三兩灸切水三升煎一升分二服空心飲不過三四劑神驗一加桃仁紅花出梅師方逐折氣味甘温無毒主治療鼠瘻明目益氣别錄正誤别錄有名未用曰逐折殺鼠益氣明目一名百合一名厚實生木間莖黄七月實黒如大豆𢎞景曰杜仲子亦名逐折出别錄厚朴條下已言子名逐折而有名未用中復逐折主治相同惟鼠瘻殺鼠字誤未知孰是爾所云厚實乃厚朴實也故皮謂之厚皮陶氏不知援引杜仲為註皆誤矣今正之附錄浮爛羅勒藏器曰生康國皮似厚朴味酸平無毒主一切風氣開胃補心除冷痺調臟腑杜仲本經上品釋名思仲别錄思仙本經木綿吳普檰時珍曰昔有杜仲服此得道因以名之思仲思仙皆由此義其皮中有銀絲如綿故曰木綿其子名逐折與厚朴子同名集解别錄曰杜仲生上虞山谷及上黨漢中二月五月六月九月采皮𢎞景曰上虞在豫州虞虢之虞非會稽上虞縣也今用出建平宜都者狀如厚朴折之多白絲者為佳保昇曰生深山大谷所在有之樹高數丈葉似辛夷頌曰今出商州成州峽州近處大山中葉亦類柘其皮折之白絲相連江南謂之檰初生嫩葉可食謂之檰芽花實苦澀亦堪入藥木可作履益脚皮修治斆曰凡使削去粗皮每一斤用酥一兩蜜三兩和塗火炙以盡為度細剉用氣味辛平無毒别錄曰甘温權曰苦煖元素曰性温味辛甘氣味俱薄沈而降陰也杲曰陽也降也好古曰肝經氣分藥也之才曰惡𤣥參蛇蛻皮主治腰膝痛補中益精氣堅筋骨强志除陰下癢濕小便餘瀝久服輕身耐老本經脚中酸疼不欲踐地别錄治腎勞腰脊攣大明腎冷䐴腰痛人虚而身强直風也腰不利加而用之甄權能使筋骨相著李杲潤肝燥補肝經風虚好古發明時珍曰杜仲古方只知滋腎惟王好古言是肝經氣分藥潤肝燥補肝虚發昔人所未發也蓋肝主筋腎主骨腎充則骨强肝充則筋健屈申利用皆屬於筋杜仲色紫而潤味甘微辛其氣温平甘温能補微辛能潤故能入肝而補腎子能令母實也按龎元英談藪一少年新娶後得脚軟病且疼甚醫作脚氣治不效路鈐孫琳診之用杜仲一味寸斷片拆毎以一兩用半酒半水一大盞煎服三日能行又三日全愈琳曰此乃腎虚非脚氣也杜仲能治腰膝痛以酒行之則為效容易矣附方舊三新三青娥丸方見補骨脂下腎虚腰痛崔元亮海上集驗方用杜仲去皮炙黄一大斤分作十劑毎夜取一劑以水一大升浸至五更煎三分減一取汁以羊腎三四枚切下再煮三五沸如作羮法和以椒鹽空腹頓服斤聖惠方入薤白七莖篋中方加五味子半風冷傷腎腰背虚痛杜仲一斤切炒酒二升漬十日日服三合此陶隱居得效方也三因方為末毎旦以温酒服二錢病後虚汗及目中流汁杜仲牡蠣等分為末卧時水服五匕不止更服之肘後方頻慣墮胎或三四月即墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末以山藥五六兩為末作糊丸梧子大毎服五十丸空心米飲下肘後方用杜仲焙研棗肉為丸糯米飲下方楊起簡便産後諸疾及胎臟不安杜仲去皮瓦上焙乾木臼搗末煮棗肉和丸彈子大毎服一丸糯米飲下日二服勝金方檰芽氣味缺主治作蔬去風毒脚氣久積風冷腸痔下血亦可煎湯蘇頌椿樗唐本草校正併入嘉祐椿莢釋名香者名椿集韻作櫄夏書作杶左傳作橁臭者名樗音丑居切亦作㯉山樗名栲音考虎目樹拾遺大眼桐時珍曰椿樗易長而多夀考故有椿栲之稱莊子言大椿以八千歳為春秋是矣椿香而樗臭故椿字又作櫄其氣熏也㯉字從虖其氣臭人呵嘑之也樗亦椿音之轉爾藏器曰俗呼椿為猪椿北人呼樗為山椿江束呼為虎目樹亦名虎眼謂葉脫處有痕如虎之眼目又如樗蒲子故得此名集解恭曰椿樗二樹形相似但樗木疏椿木實為别也頌曰二木南北皆有之形幹大抵相類但椿木實而葉香可噉樗木疏而氣臭膳夫亦能熬去氣並采無時樗木最為無用莊子所謂吾有大木人謂之樗其本擁腫不中繩墨小枝曲拳不中規矩者爾雅云栲山樗郭璞註云栲似樗色小白生山中因名亦類漆樹俗語云櫄樗栲漆相似如一陸璣詩疏云山栲與田樗無異葉差狹爾吳人以葉為茗宗奭曰椿樗皆臭但一種有花結子一種無花不實世以無花而木身大其幹端直者為椿椿木用葉其有花莢而木身小幹多迂矮者為樗樗用根及莢葉又虫部有樗雞不言椿雞以顯有雞者為樗無雞者為椿古人命名其義甚明禹錫曰樗之有花者無莢有莢者無花其莢夏月常生臭樗上未見椿上有莢者然世俗不辨椿樗之異故呼樗莢為椿莢爾時珍曰椿樗栲乃一木三種也椿木皮細肌實而赤嫩葉香甘可茹樗木皮粗肌虚而白其葉臭惡歉年人或采食栲木即樗之生山中者木亦虚大梓人亦或用之然爪之如腐朽故古人以為不材之木不似椿木堅實可入棟梁也葉氣味苦温有小毒詵曰椿芽多食動風熏十二經脈五臟六腑令人神昏血氣微若和猪肉熱麫頻食則中滿蓋擁經絡也時珍曰椿葉無毒樗葉有小毒主治煮水洗瘡疥風疽樗木根葉尤良唐本白秃不生髮取椿桃楸葉心搗汁頻塗之時珍嫩芽瀹食消風袪毒生生編白皮及根皮修治斆曰凡使椿根不近西頭者為上采出拌生葱蒸半日剉細以袋盛掛屋南畔陰乾用時珍曰椿樗木皮根皮並刮去粗皮陰乾臨時切焙入用氣味苦温無毒權曰微熱震亨曰凉而燥藏器曰樗根有小毒時珍曰樗根制硫黄砒石黄金主治疳䘌樗根尤良唐本去口鼻疳蟲殺蚘蟲疥䘌鬼注傳尸蠱毒下血及赤白久痢藏器得地榆止疳痢蕭炳止女子血崩産後血不止赤帶腸風瀉血不住腸滑瀉縮小便蜜炙用大明利溺澀雷斆治赤白濁赤白帶濕氣下痢精滑夢遺燥下濕去肺胃陳積之痰震亨發明詵曰女子血崩及産後血不止月信来多并赤帶下宜取東引細椿根一大握洗浄以水一大升煮汁分服便斷小兒疳痢亦宜多服仍取白皮一握粳米五十粒葱白一握炙甘草三寸豉兩合水一升煮半升以意服之枝葉功用皆同震亨曰椿根白皮性凉而能澀血凡濕熱為病瀉痢濁帶精滑夢遺諸證無不用之有燥下濕及去肺胃陳痰之功治泄瀉有除濕實腸之力但痢疾滯氣未盡者不可遽用宜入丸散亦可煎服不見有害予毎用炒研糊丸看病作湯使名固腸丸也時珍曰椿皮色赤而香樗皮色白而臭多服微利人蓋椿皮入血分而性濇樗皮入氣分而性利不可不辨其主治之功雖同而濇利之效則異正如伏苓芍藥赤白頗殊也凡血分受病不足者宜用椿皮氣分受病有鬱者宜用樗皮此心得之微也乾坤生意治瘡腫下藥用樗皮以無根水研汁服二三椀取利數行是其驗矣故陳藏器言樗皮有小毒蓋有所試也宗奭曰洛陽一女人年四十六七耽飲無度多食魚蟹畜毒在臟日夜二三十瀉大便與膿血雜下大腸連肛門痛不堪任醫以止血痢藥不效又以腸風藥則益甚蓋腸風則有血無膿如此半年餘氣血漸弱食減肌痩服熱藥則腹愈痛血愈下服冷藥即注泄食減服温平藥則病不知如此期年垂命待盡或人教服人參散一服知二服減三服膿血皆定遂常服之而愈其方治大腸風虚飲酒過度挾熱下痢膿血痛甚多日不瘥用樗根白皮一兩人參一兩為末毎服二錢空心温酒調服米飲亦可忌油膩濕麫青菜果子甜物雞猪魚羊蒜薤等附方舊六新十去鬼氣樗根一握細切以童兒小便二升豉一合浸一宿絞汁煎一沸三五日一度服之陳藏器本草小兒疳疾椿白皮日乾二兩為末以粟米淘浄研濃汁和丸梧子大十歳三四丸米飲下量人加減仍以一丸納竹筒中吹入鼻内三度良子母秘錄小兒疳痢困重者用樗白皮搗粉以水和棗作大餫飩子日晒少時又搗如此三遍以水煮熟空肚吞七枚重者不過七服忌油膩熱麫毒物再又方用樗根濃汁一蜆殻和粟米泔等分灌下部度即瘥其驗如神大人亦宜用外臺秘要休息痢疾日夜無度腥臭不可近臍腹撮痛東垣脾胃論用椿根白皮訶黎勒各半兩母丁香三十箇為末醋糊丸梧子大每服五十丸米飲下唐瑶經驗方用椿根白皮東南行者長流水内漂三日去黄皮焙為末毎一兩加木香二錢粳米飯為丸毎服一錢二分空腹米飲下水穀下痢及毎至立秋前後即患痢兼腰痛取樗根一大兩𢷬篩以好麫捻作餫飩如皂子大水煮熟毎日空心服十枚並無禁忌神良劉禹錫傳信方下痢清血腹中刺痛椿根白皮洗刮晒研醋糊丸梧子大毎空心米飲下三四十丸一加蒼术枳殻減半經驗方臟毒下痢赤白用香椿洗刮取皮日乾為末飲下一錢立效也經驗方臟毒下血温白丸用椿根白皮去粗皮酒浸晒研棗肉和丸梧子大每淡酒服五十丸或酒糊丸亦可儒門事親下血經年樗根二錢水一盞煎七分入酒半盞服或作丸服虚者加人參等分即虎眼樹仁存方血痢下血臘月日未出時取背陰地北引樗根皮東流水洗浄掛風處陰乾為末毎二兩入寒食麫一兩新汲水丸梧子大陰乾毎服三十丸水煮滚傾出温水送下忌見日則無效名如神丸出普濟方脾毒腸風因營衞虚弱風氣襲之熱氣乗之血滲腸間故大便下血用臭椿根刮去粗皮焙乾四兩蒼术米泔浸焙枳殻麩炒各一兩為末醋糊丸如梧子大毎服五十丸米飲下日三服效本事方産後腸脫不能收拾者樗枝取皮焙乾一握水五升連根葱五莖漢椒一撮同煎至三升去滓傾盆内乗熱熏洗冷則再熱一服可作五次用洗後睡少時忌鹽鮓醬麫發風毒物及用心勞力等事年深者亦治之方婦人良女人白帶椿根白皮滑石等分為末粥丸梧子大毎空腹白湯下一百丸黄又方椿根白皮一兩半乾薑炒黒白芍藥炒黒蘗炒黒各二錢為末如上法丸服丹溪方男子白濁方同上莢釋名鳳眼草象形主治大便下血嘉祐附方新三腸風瀉血椿莢半生半燒為末毎服二錢半飲下出普濟方誤吞魚刺生生編用椿樹子燒研酒服二錢服保夀堂方用香椿樹子陰乾半盌擂碎熱酒衝良久連骨吐出洗頭明目用鳳眼草即椿樹上叢生莢也燒灰淋水洗頭經一年眼如童子加椿皮灰尤佳正月七日二月八日三月四日四月五日五月二日六月四日七月七日八月三日九月二十日十月二十三日十一月二十九日十二月十四日洗之衞生易簡方漆本經上品釋名桼時珍曰許慎說文云漆本作桼木汁可以䰍物其字象水滴而下之形也集解别錄曰乾漆生漢中山谷夏至後采乾之𢎞景曰今梁州漆最甚益州亦有廣州漆性急易燥其諸處漆桶中自然乾者狀如蜂房孔孔隔者為佳保昇曰漆樹高二三丈餘皮白葉似椿花似槐其子似牛李子木心黄六月七月刻取滋汁金州者最善漆性並急凡取時須荏油解破故淳者難得可重重别制拭之上等清漆色黑如瑿若鐵石者好黄嫩若蜂窠者不佳頌曰今蜀漢今峽襄歙州皆有之以竹筒釘入木中取汁崔豹古今注云以剛斧斫其皮開以竹管承之滴汁則成漆也宗奭曰濕漆藥中未見用者皆乾漆爾其濕者在燥熱及霜冷時則難乾得陰濕雖寒月亦易乾亦物之性也若霑漬人以油治之凡驗漆惟稀者以物蘸起細而不斷斷而急收更又塗於乾竹上蔭之速乾者並佳時珍曰漆樹人多種之春分前移栽易成有利其身如柿其葉如椿以金州者為佳故世稱金漆人多以物亂之試訣有云微扇光如鏡懸絲急似鈎撼成琥珀色打著有浮漚今廣浙中出一種漆樹似小榎而大六月取汁漆物黄澤如金即唐書所謂黄漆者也入藥仍當用黑漆廣南漆作飴糖氣沾沾無力乾漆修治大明曰乾漆入藥須搗碎炒熟不爾損人腸胃若是濕漆煎乾更好亦有燒存性者氣味辛温無毒權曰辛鹹宗奭曰苦元素曰辛平有毒降也陽中陰也之才曰半夏為之使畏雞子忌油脂𢎞景曰生漆毒烈人以雞子和服之去蟲猶自囓腸胃也畏漆人乃致死者外氣亦能使身肉瘡腫自有療法大明曰毒發飲鐵漿并黄櫨汁甘豆湯喫蟹並可制之時珍曰今人貨漆多雜桐油故多毒淮南子云蟹見漆而不乾相感志云漆得蟹而成水蓋物性相制也凡人畏漆者嚼蜀椒塗口鼻則可免生漆瘡者杉木湯紫蘇湯漆姑草湯蟹湯浴之皆良主治絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痺生漆去長蟲久服輕身耐老本經乾漆療欬嗽消瘀血痞結腰痛女子疝瘕利小腸去蚘蟲别錄殺三蟲主女人經脈不通甄權治傳尸勞除風大明削年深堅結之積滯破日久凝結之瘀血元素發明𢎞景曰仙方用蟹消漆為水錬服長生抱朴子云淳漆不粘者服之通神長生或以大蟹投其中或以雲母水或以玉水合之服九蟲悉下惡血從鼻出服至一年六甲行厨至也震亨曰漆屬金有水與火性急而飛補用為去積滯之藥中節則積滯去後補性内行人不知也時珍曰漆性毒而殺蟲降而行血所主諸證雖繁其功只在二者而已附方舊四新七小兒蟲病胃寒危惡證與癎相似者乾漆搗燒烟盡白蕪荑等分為末米飲服一字至一錢止杜仁方九腫心痛及腹脇積聚滯氣筒内乾漆一兩搗炒烟盡研末醋煮麫糊丸梧子大毎服五丸至九丸熱酒下簡要濟衆女人血氣婦人不曽生長血氣疼痛不可忍及治丈夫疝氣小腸氣撮痛者並宜服二聖丸濕漆一兩熬一食傾入乾漆末一兩和丸梧子大毎服三四丸温酒下怕漆人不可服經驗方女人經閉指南方萬應丸治女人月經瘀閉不来繞臍寒疝痛徹及産後血氣不調諸癥瘕等病用乾漆一兩打碎炒烟盡牛膝末一兩以生地黄汁一升入銀石器中慢熬俟可丸丸如梧子大毎服一丸加至三五丸酒飲任下以通為度産寶方治女人月經不利血氣上攻欲嘔不得睡用當歸四錢乾漆三錢炒烟盡為末煉蜜丸梧子大毎服十五丸空心温酒下下千金治女人月水不通臍下堅如盃時發熱往来痢羸瘦此為血瘕若生肉癥不可治也乾漆一斤燒研生地黄二十斤取汁和煎至可丸丸梧子大毎服三丸空心酒下産後青腫疼痛及血氣水疾乾漆大麥芽等分為末新瓦􅀈相間鋪滿鹽泥固濟煆赤放冷研散毎服一二錢熱酒下但是産後諸疾皆可服婦人經驗方五勞七傷補益方用乾漆柏子仁山茱萸酸棗仁各等分為末蜜丸梧子大毎服二七丸温酒下日二服千金方喉痺欲絶不可針藥者乾漆燒烟以筒吸之錄聖濟總解中蠱毒平胃散末以生漆和丸梧子大毎空心温酒下七十丸至百丸指直方下部生瘡生漆塗之良見肘後方漆葉氣味缺主治五尸勞疾殺蟲暴乾研末日用酒服一錢匕時珍發明頌曰華佗傳載彭城樊阿少師事佗佗授以漆葉青黏散方云服之去三蟲利五臟輕身益氣使人頭不白阿從其言年五百餘歳漆葉所在有之青黏生豐沛彭城及朝歌一名地節一名黄芝主理五臟益精氣本出於迷人入山見仙人服之以告佗佗以為佳語阿阿秘之近者人見阿之夀而氣力强盛問之因醉誤說人服多驗後無復人識青黏或云即黄精之正葉者也時珍曰按葛洪抱朴子云漆葉青黏凡藪之草也樊阿服之得壽二百歳而耳目聰明猶能持鍼治病此近代之實事良史所記者按洪說猶近於理前言可年五百歳者誤也或云青黏即葳㽔漆子主治下血時珍漆花主治小兒解顱腹脹交脛不行方中用之時珍梓本經下品釋名木王時珍曰梓或作杍其義未詳按陸佃埤雅云梓為百木長故呼梓為木王蓋木莫良于梓故書以梓材名篇禮以梓人名匠朝廷以梓宫名棺也羅願云屋室有此木則餘木皆不震其為木可知集解别錄曰梓白皮生河内山谷𢎞景曰此即梓樹之皮梓有三種當用朴素不腐者頌曰今近道皆有之宫寺人家園亭亦多植之木似桐而葉小花紫爾雅云椅梓郭璞注云即楸也詩鄘風云椅桐梓漆爰伐琴瑟陸璣注云楸之疎理白色而生子者為梓梓實桐皮為椅大同而小異也入藥當用有子者又一種䑕梓一名楰亦楸屬也枝葉木理皆如楸今人謂之苦楸江東人謂之虎梓詩小雅云北山有楰是也䑕李一名鼠梓或云即此然花實都不相類恐别一物而名同爾藏器曰楸生山谷間與梓樹本同末異或以為一物者誤矣大明曰梓有數般惟楸梓皮入藥佳餘皆不堪機曰按爾雅翼云說文言椅梓也梓楸也檟亦楸也然則椅梓檟楸一物四名而陸璣詩疏以楸之白理生子者為梓梓實桐皮者為椅賈思勰齊民要術又以白色有角者為梓即角楸也又名子楸黄色無子者為椅楸又名荆黄楸但以子之有無為别其角細長如箸其長近尺冬後葉落而角猶在樹其實亦名豫章時珍曰梓木處處有之有三種木理白者為梓赤者為楸梓之美文者為椅楸之小者為榎諸家疏注殊欠分明桐亦名椅與此不同此椅即尸子所謂荆有長松文椅者也梓白皮氣味苦寒無毒主治熱毒去三蟲本經療目中疾主吐逆胃反小兒熱瘡身頭熱煩蝕瘡煎湯浴之并搗傅别錄煎湯洗小兒壯熱一切瘡疥皮膚瘙癢大明治温病復感寒邪變為胃啘煮汁飲之時珍附方新一時氣温病頭痛壯熱初得一日用生梓木削去黑皮取裏白者切一升水二升五合煎汁毎服八合取瘥肘后方葉主治搗傅猪瘡飼猪肥大三倍别錄療手脚火爛瘡𢎞景曰桐葉梓葉肥猪之法未見應在商丘子養猪經中恭曰二樹花葉飼猪並能肥大且易養見李當之本草及博物志然不云傅猪瘡也附方新一風癬疙瘩梓葉木綿子羯羊屎鼠屎等分入瓶中合定燒取其汁塗之試效錄驗方楸拾遺釋名榎時珍曰楸葉大而早脫故謂之楸榎葉小而早秀故謂之榎唐時立秋日京師賣楸葉婦女兒童剪花戴之取秋意也爾雅云葉小而皵榎葉大而皵楸皵音鵲皮粗也集解見梓下色周憲王曰楸有二種一種刺楸其樹髙大皮蒼白上有黄白斑㸃枝梗間多大刺葉似楸而薄味甘嫩時煠熟水淘過拌食時珍曰楸有行列莖幹直聳可愛至上垂條如線謂之楸線其木濕時脆燥則堅故謂之良材宜作棋枰即梓之赤者也木白皮氣味苦小寒無毒珣曰微温主治吐逆殺三蟲及皮膚蟲煎膏粘傅惡瘡疽瘻癰腫疳痔除膿血生肌膚長筋骨藏器消食澀腸下氣治上氣欬嗽亦入面藥李珣口吻生瘡貼之頻易取效時珍附方舊一新一瘻瘡楸枝作煎頻洗取效肘后方白癜風瘡楸白皮五斤水五斗煎五升去滓煎如稠膏日三摩之聖濟總錄葉氣味同皮主治𢷬傅瘡腫煮湯洗膿血冬取乾葉用之諸癰腫潰及内有刺不出者取葉十重貼之藏器出范汪方發明時珍曰楸乃外科要藥而近人少知葛常之韻語陽秋云有人患發背潰壊腸胃可窺百方不瘥一醫用立秋日太陽未升時采楸樹葉熬之為膏傅其外内以雲母膏作小丸服盡四兩不累日而愈也東晉范汪名醫也亦稱楸葉治瘡腫之功則楸有拔毒排膿之力可知附方舊一新七上氣欬嗽腹滿羸瘦者楸葉三斗水三斗煮三十沸去滓煎至可丸如棗大以筒納入下部中立愈崔元亮海上集驗方一切毒腫不問硬軟取楸葉十重傅腫上舊帛褁之日三易之當重重有毒氣為水流在葉上冬月取乾葉鹽水浸軟或取根皮搗爛傅之皆效止痛消腫食膿血勝于衆藥范汪東陽方瘰癧瘻瘡楸煎神方秋分前後早晚令人持袋摘楸葉納袋斤秤取十五斤以水一石浄釡中煎取三斗又換鍋煎取七八升又換鍋煎取二升乃納不津器中用時先取麻油半合蠟一分酥一栗子許同消化又取杏仁七粒生薑少許同研米粉二錢同入膏中攪匀先塗瘡上經二日来乃拭却即以箆子匀塗楸煎滿瘡上仍以軟帛褁之且日一拭更上新藥不過五六上已破者即便生肌未破者即内消瘥後須將慎半年采藥及煎時并禁孝子婦人僧道雞犬見之中篋方炙瘡不瘥痒痛不瘥楸葉頭及根皮為末傅之聖惠方頭癢生瘡楸葉搗汁頻塗聖惠方兒髮不生楸葉中心搗汁頻塗千金方小兒目翳嫩楸葉三兩爛搗紙包泥褁燒乾去泥入水少許絞汁銅器慢熬如稀餳瓷合收之毎旦㸃之普濟方小兒秃瘡楸葉搗汁塗之聖惠方桐本經下品釋名白桐𢎞景黄桐圖經泡桐綱目椅桐𢎞景榮桐時珍曰本經桐葉即白桐也桐華成筒故謂之桐其材輕虚色白而有綺文故俗謂之白桐泡桐古謂之椅桐也先花後葉故爾雅謂之榮桐或言其花而不實者未之察也陸璣以椅為梧桐郭璞以榮為梧桐並誤集解别錄曰桐葉生桐柏山谷𢎞景曰桐樹有四種青桐葉皮青似梧而無子梧桐皮白葉似青桐而有子子肥可食白桐一名椅桐人家多植之與崗桐無異但有花子二月開花黄紫色禮云三月桐始華者也堪作琴瑟崗桐無子是作琴瑟者本草用桐華應是白桐頌曰桐處處有之陸璣草木疏言白桐宜為琴瑟雲南牂牁人取花中白毳淹漬績以為布似毛服謂之華布椅即梧桐也今江南人作油者即岡桐也有子大于梧子江南有頳桐秋開紅花無實有紫桐花如百合實堪糖煮以噉嶺南有刺桐花色深紅宗奭曰本經桐葉不指定是何桐致難執用但四種各有治療白桐葉三杈開白花不結子無花者為岡桐不中作琴體重荏桐子可作桐油梧桐結子可食時珍曰陶注桐有四種以無子者為青桐岡桐有子者為梧桐白桐冦注言白桐岡桐皆無子蘇注以岡桐為油桐而賈思勰齊民要術言實而皮青者為梧桐華而不實者為白桐白桐冬結似子者乃是明年之華房非子也岡桐即油桐也子大有油其說與陶氏相反以今咨訪互有是否蓋白桐即泡桐也葉大徑尺最易生長皮色粗白其木輕虚不生蟲蛀作器物屋柱甚良二月開花如牽牛花而白色結實大如巨棗長寸餘殻内有子片輕虚如榆莢葵實之狀老則殻裂隨風飄揚其花紫色者名岡桐荏桐即油桐也青桐即梧桐之無實者按陳翥桐譜分别白桐岡桐甚明云白花桐文理粗而體性慢喜生朝陽之地因子而出者一年可起三四尺由根而出者可五七尺其葉圓大而尖長有角光滑而毳先花後葉花白色花心微紅其實大二三寸内為兩房房内有肉肉上有薄片即其子也紫花桐文理細而體性堅亦生朝陽之地不如白桐易長其葉三角而圓大如白桐色青多毛而不光且硬微赤亦先花後葉花色紫其實亦同白桐而微尖狀如訶子而粘房中肉黄色二桐皮色皆一但花葉小異體性堅慢不同爾亦有冬月復花者桐葉氣味苦寒無毒主治惡蝕瘡著陰本經消腫毒生髮時珍附方新四手足腫浮桐葉煮汁漬之并飲少許或加小豆尤妙聖惠方癰疽發背大如盤臭腐不可近桐葉醋蒸貼上退熱止痛漸漸生肉收口極驗秘方也醫林正宗髮落不生桐葉一把麻子仁三升米泔煮五六沸去滓日日洗之則長肘後方髮白染黒經霜桐葉及子多收搗碎以甑蒸之生布絞汁沐頭普濟方木皮主治五痔殺三蟲本經療奔豚氣病别録五淋沐髮去頭風生髮滋潤甄權治惡瘡小兒丹毒煎汁塗之時珍附方新三腫從脚起削桐木煮汁漬之并飲少許肘后方傷寒發狂六七日熱極狂言見鬼欲走取桐皮削去黑擘斷四寸一束以酒五合水一升煮半升去滓頓服當吐下青黄汁數升即瘥矣肘后方跌撲傷損木桐樹皮去青留白醋炒搗傅集簡方花主治傅猪瘡飼猪肥大三倍本經附方新一眼見諸物禽蟲飛走乃肝膽之疾青桐子花酸棗仁𤣥明粉羌活各一兩為末毎服二錢水煎和滓日三服經驗良方梧桐綱目釋名櫬時珍曰梧桐名義未詳爾雅謂之櫬因其可為棺左傳所謂桐棺三寸是矣舊附桐下今别出條集解𢎞景曰梧桐皮白葉似青桐而子肥可食頌曰陶氏謂白桐一名椅桐陸璣謂梓實桐皮為椅即今梧桐是二種俱有椅名也遁甲書云梧桐可知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二月有閏十三葉小餘者視之則知閏何月也故曰梧桐不生則九州異宗奭曰梧桐四月開嫩黄小花一如棗花枝頭出絲墮地成油沾漬衣履五六月結子人收炒食味如菱芡此是月令清明桐始華者時珍曰梧桐處處有之樹似桐而皮青不皵其木無節直生理細而性𦂳葉似桐而稍小光滑有尖其花細蕋墜下如醭其莢長三寸許五片合成老則裂開如箕謂之櫜鄂其子綴於櫜鄂上多者五六少或二三子大如胡椒其皮皺羅願爾雅翼云梧桐多陰青皮白骨似青桐而多子其木易生烏銜子墮輒生但晚春生葉早秋即凋古稱鳳凰非梧桐不棲豈亦食其實乎詩云梧桐生矣于彼朝陽齊民要術云梧桐生山石間者為樂器更鳴響也木白皮氣味缺主治燒研和乳汁塗鬚髮變黄赤時珍治腸痔蘇頌五刪繁方治痔青龍生膏中用之葉主治發背炙焦研末蜜調傅乾即易肘后子氣味甘平無毒主治𢷬汁塗㧞去白髮根下必生黒者又治小兒口瘡和雞子燒存性研摻時珍罌子桐拾遺釋名虎子桐拾遺荏桐衍義油桐時珍曰罌子因實狀似罌也虎子以其毒也荏者言其油似荏油也集解藏器曰罌子桐生山中樹似梧桐頌曰南人作油者乃岡桐也有子大于梧子宗奭曰荏桐早春先開淡紅花狀如鼓子花成筒子子可作桐油時珍曰岡桐即白桐之紫花者油桐枝幹花葉並類岡桐而小樹長亦遲花亦微紅但其實大而圓毎實中有二子或四子大如大風子其肉白色味甘而吐人亦或謂之紫花桐人多種蒔收子貨之為油入漆家及艌船用為時所須人多偽之惟以篾圈蘸起如鼓面者為真桐子油氣味甘微辛寒有大毒大明曰冷微毒時珍曰桐油吐人得酒即解主治摩疥癬蟲瘡毒腫毒鼠至死藏器傅惡瘡及宣水腫塗鼠咬處能辟鼠大明塗脛瘡湯火傷瘡吐風痰喉痺及一切諸疾以水和油掃入喉中探吐或以子研末吹入喉中取吐又㸃燈燒銅箸頭烙風熱爛眼亦妙時珍附方新七癰腫初起桐油㸃燈入竹筒内薫之得出黄水即消去醫林正宗血風臁瘡胡粉煆過研桐油調作隔紙膏貼之桐又方用船上陳桐油石灰煆過又以人髮拌油炙乾為末仍以桐油調作膏塗紙上刺孔貼之楊起簡便方脚肚風瘡如癩桐油人乳等分掃之數次即愈集簡方酒皶赤鼻桐油入黄丹雄黄傅之摘𤣥方凍瘡皸裂桐油一盌髮一握熬化瓶收毎以温水洗令軟傅之即安救急方解砒石毒桐油二升灌之吐即毒解病華佗危方附錄􅀈桐音而郢切藏器曰生山谷間狀似青桐葉有椏人取皮以漚絲木皮味甘温無毒治蠶咬毒氣入腹末服之雞犬食蠶欲死者煎汁灌之絲爛即愈葉主蛇蟲蜘蛛咬毒搗爛封之海桐宋開寶釋名刺桐珣曰生南海山谷中樹似桐而皮黄白色有刺故以名之集解頌曰海桐生南海及雷州近海州郡亦有之葉大如手作三花尖皮若梓白皮而堅靭可作繩入水不爛不拘時月采之又云嶺南有刺桐葉如梧桐其花附幹而生側敷如掌形若金鳳枝幹有刺花色深紅江南有赬桐紅花無實時珍曰海桐皮有巨刺如黿甲之刺或云即刺桐皮也按嵇含南方草木狀云九真有刺桐布葉繁宻三月開花赤色照映三五房凋則三五復發陳翥桐譜云刺桐生山谷中文理細𦂳而性喜折裂體有巨刺如欓樹其實如楓赬桐身青葉圓大而長髙三四尺便有花成朶而繁紅色如火為夏秋榮觀木皮氣味苦平無毒大明曰温主治霍亂中惡赤白久痢除疳䘌疥癬牙齒蟲痛並煮服及含之水浸洗目除膚赤開寶主腰脚不遂血脈頑痺腿膝疼痛赤白瀉痢李珣去風殺蟲煎湯洗赤目時珍發明頌曰古方多用浸酒治風蹶南唐筠州刺史王紹顔撰續傳信方云頃年予在姑熟得腰膝痛不可忍醫以腎臟風毒攻刺諸藥莫療因覧劉禹錫傳信方備有此驗修服一劑便減五分其方用海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半錢薏苡仁二兩生地黄十兩並浄洗焙乾剉以綿包褁入無灰酒二斗浸之冬二匕夏一匕空心飲一盞毎日早午晚各一次長令醺醺此方不得添減禁毒食時珍曰海桐皮能行經絡達病所又入血分及去風殺蟲附方新三風癬有蟲海桐皮蛇牀子等分為末以臘猪脂調搽之艾元英如宜方風蟲牙痛海桐皮煎水漱之效聖惠方中惡霍亂海桐皮煮汁服之聖濟總錄刺桐花主治止金瘡血殊效蘇頌附錄雞桐時珍曰生嶺南山間其葉如楝用葉煮湯洗渫足膝風濕痺氣楝本經下品釋名苦楝圖經實名金鈴子時珍曰按羅願爾雅翼云楝葉可以練物故謂之棟其子如小鈴熟則黄色名金鈴象形也集解别錄曰楝實生荆山山谷𢎞景曰處處有之俗人五月五日取葉佩之云辟惡也恭曰此有雌雄兩種雄者無子根赤有毒服之使人吐不能止時有至死者雌者有子根白微毒入藥當用雌者頌曰楝實以蜀川者為佳木高丈餘葉宻如槐而長三四月開花紅紫色芬香滿庭實如彈丸生青熟黄十二月采之根采無時時珍曰楝長甚速三五年即可作椽其子正如圓棗以川中者為良王禎農書言鵷雛食其實應劭風俗通言獬豸食其葉宗懍歳時記言蛟龍畏楝故端午以葉包粽投江中祭屈原實修治斆曰凡采得熬乾酒拌令透蒸待皮軟刮去皮取肉去核用凡使肉不使核使核不使肉如使核槌碎用漿水煮一伏時晒乾其花落子謂之石茱萸不入藥用嘉謨曰石茱萸亦入外科用氣味苦寒有小毒元素曰酸苦平陰中之陽時珍曰得酒煮乃寒因熱用也茴香為之使主治温疾傷寒大熱煩狂殺三蟲疥瘍利小便水道本經主中大熱狂失心躁悶作湯浴不入湯使甄權入心及小腸止上下部腹痛李杲瀉膀胱好古治諸疝蟲痔時珍發明元素曰熱厥暴痛非此不能除時珍曰楝實導小腸膀胱之熱因引心包相火下行故心腹痛及疝氣為要藥甄權乃言不入湯使則本經何以有治熱狂利小便之文耶近方治疝有四治五治七治諸法蓋亦配合之巧耳附方舊三新八熱厥心痛或發或止身熱足寒久不愈者先灸大溪崑崙引熱下行内服金鈴散用金鈴子𤣥胡索各一兩為末毎服三錢温酒調下潔古活法機要小兒冷疝氣痛膚囊浮腫金鈴子去核五錢吳茱萸二錢半為末酒糊丸黍米大毎鹽湯下二三十丸全幼心鑑丈夫疝氣本臟氣傷膀胱連小腸等氣金鈴子一百箇温湯浸過去皮巴豆二百箇微打破以麫二升同於銅鐺内炒至金鈴子赤為度放冷取出去核為末巴麫不用毎服三錢熱酒或醋湯調服一方入鹽炒茴香半兩經驗方㿗疝腫痛澹寮方楝實丸治鈞腎偏墜痛不可忍用川楝子肉五兩分作五分一兩用破故紙二錢炒黄一兩用小茴香三錢食鹽半錢同炒一兩用莱菔子一錢同炒一兩用牽牛子三錢同炒一兩用斑蝥七枚去頭足同炒揀去食鹽萊菔牽牛斑蝥只留故紙茴香同研為末以酒打麫糊丸梧子大毎空心酒下五十丸棟得效方楝實丸治一切疝氣腫痛大有神效用川子酒潤取肉一斤分作四分四兩用小麥一合斑蝥四十九箇同炒熟去蝥四兩用小麥一合巴豆四十九枚同炒熟去豆四兩用小麥一合巴㦸肉一兩同炒熟去㦸四兩用小茴香一合食鹽一兩同炒熟去鹽加破故紙酒炒一兩廣木香不見火一兩為末酒煮麫糊丸梧子大毎服五十丸鹽湯空心下日三服直指方楝實丸治外腎脹大麻木痛破及奔豚疝氣用川楝子四十九箇分七處切取肉七箇用小茴香五錢同炒七箇用破故紙二錢半同炒七箇用黑牽牛二錢半同炒七箇用食鹽二錢同炒七箇用蘿蔔子二錢半同炒七箇用巴豆十四箇同炒七箇用斑蝥十四箇去頭足同炒揀去蘿蔔子巴豆斑蝥三味不用入青木香五錢南木香官桂各二錢半為末酒煮麫糊丸梧子大毎服三十丸食前用鹽湯下一日三服臟毒下血苦揀子炒黄為末蜜丸梧子大米飲毎吞十丸至二十丸經驗方腹中長蟲楝實以淳苦酒漬一宿綿褁塞入穀道中三寸許日二易之外臺秘要耳卒熱腫楝實五合搗爛綿褁塞之頻換聖惠方腎消膏淋病在下焦苦楝子茴香等分炒為末毎温酒服一錢聖惠方小兒五疳川楝子肉川芎藭等分為末猪膽汁丸米飲下摘𤣥方根及木皮氣味苦微寒微毒大明曰雄者根赤有毒吐瀉殺人不可誤服雌者入服食毎一兩可入糯米五十粒同煎殺毒若瀉者以冷粥止之不瀉者以熱葱粥發之主治蚘蟲利大腸别錄苦酒和塗疥癬甚良𢎞景治遊風熱毒風疹惡瘡疥癩小兒壯熱並煎湯浸洗大明附方舊二新八消渇有蟲苦楝根白皮一握切焙入麝香少許水二椀煎至一椀空心飲之雖困頓不妨下蟲如蚘而紅色其渇自止消渇有蟲人所不知也洪邁夷堅志小兒蚘蟲楝木皮削去蒼皮水煮汁量大小飲之雞斗門方用為末米飲服二錢集簡方用根皮同卵煮熟空心食之次日蟲下毎經驗方抵聖散用苦楝皮二兩白蕪荑半兩為末以一二錢水煎服之簡便方用楝根白皮去粗二斤切水一斗煮取汁三升沙鍋成膏五更初温酒服一匙以蟲下為度小兒諸瘡惡瘡秃瘡蠼螋瘡浸淫瘡並宜楝樹皮或枝燒灰傅之乾者猪脂調千金方口中瘻瘡東行楝根細剉水煮濃汁日日含漱吐去勿嚥肘后方蜈蚣蜂傷楝樹枝葉汁塗之良簡楊起便方疥瘡風蟲楝根皮皂角去皮子等分為末猪脂調塗竒效方花主治熱疿焙末摻之鋪席下殺蚤虱時珍葉主治疝入囊痛臨發時煎酒飲時珍槐本經上品校正併入嘉祐槐花槐膠釋名櫰音懐時珍曰按周禮外朝之法面三槐三公位焉吳澄注云槐之言懐也懐来人於此也王安石釋云槐黄中懐其美故三公位之春秋元命包云槐之言歸也古者樹槐聴訟其下使情歸實也集解别錄曰槐實生河南平澤可作神燭頌曰今處處有之其木有極高大者按爾雅槐有數種葉大而黒者名櫰槐晝合夜開者名守宫槐葉細而青綠者但謂之槐其功用不言有别四月五月開黄花六月七月結實七月七日采嫰實搗汁作煎十月采老實入藥皮根采無時醫家用之最多時珍曰槐之生也季春五日而目十日而鼠耳更旬而始規二旬而葉成初生嫰芽可􅨘熟水淘過食亦可作飲代茶或采槐子種畦中采苗食之亦良其木材堅重有青黄白黑色其花未開時狀如米粒炒過煎水染黄甚鮮其實作莢連珠中有黒子以子連多者為好周禮秋取槐檀之火淮南子老槐生火天𤣥主物簿云老槐生丹槐之神異如此藏器曰子上房七月收之堪染皂槐實修治斆曰凡采得去單子并五子者只取兩子三子者以銅鎚鎚破用烏牛乳浸一宿蒸過用氣味苦寒無毒别錄曰酸鹹之才曰景天為之使主治五内邪氣熱止涎唾補絶傷火瘡婦人乳瘕子臟急痛本經久服明目益氣頭不白延年治五痔瘡瘻以七月七日取之搗汁銅器盛之日煎令可丸如鼠屎納竅中日三易乃愈又墮胎别錄治大熱難産甄權殺蟲去風合房陰乾煮飲明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉瀁瀁如船車上者藏器治丈夫女人陰瘡濕痒催生吞七粒大明疎導風熱宗奭治口齒風凉大腸潤肝燥李杲發明好古曰槐實純陰肝經氣分藥也治證與桃仁同𢎞景曰槐子以十月巳日采相連多者新盆盛合泥百日皮爛為水核如大豆服之令腦滿髮不白而長生頌曰折嫰房角作湯代茗主頭風明目補腦水吞黑子以變白髮扁鵲明目使髮不落法十月上巳日取槐子去皮納新瓶中封口二七日初服一枚再服二枚日加一枚至十日又從一枚起終而復始令人可夜讀書延年益氣力大良時珍曰按太清草木方云槐者虚星之精十月上巳日采子服之去百病長生通神梁書言庾肩吾常服槐實年七十餘髮鬢皆黑目看細字亦其驗也古方以子入冬月牛膽中漬之陰乾百日毎食後吞一枚云久服明目通神白髮還黑有痔及下血者尤宜服之附方舊一新四槐角丸治五穜腸風瀉血糞前有血名外痔糞後有血名内痔大腸不收名脫肛穀道四面弩肉如嬭名舉痔頭上有孔名瘻瘡内有蟲名蟲痔並皆治之槐角去梗炒一兩地榆當歸酒焙防風黄芩枳殻麩炒各半兩為末酒糊丸梧子大毎服五十丸米飲下和劑局方大腸脫肛槐角槐花各等分炒為末用羊血蘸藥炙熟食之以酒送下猪腰子去皮蘸炙亦可百一選方内痔外痔許仁則方用槐角子一斗搗汁晒稠取地膽為末同煎丸梧子大毎飲服十丸兼作挺子納下部或以苦參末代地膽亦可外臺秘要目熱昬暗槐子黄連二兩為末蜜丸梧子大毎漿水下二十丸日二服聖濟總錄大熱心悶槐子燒末酒服方寸匕千金方槐花修治宗奭曰未開時采收陳久者良入藥炒用染家以水煮一沸出之其稠滓為缺染色更鮮也氣味苦平無毒元素曰味厚氣薄純陰也主治五痔心痛眼赤殺腹臟蟲及皮膚風熱腸風瀉血赤白痢並炒研服大明凉大腸元素炒香頻嚼治失音及喉痺又療吐血衂崩中漏下時珍發明時珍曰槐花味苦色黄氣凉陽明厥陰血分藥也故所主之病多屬二經附方舊一新二十衂血不止槐花烏賊魚骨等分半生半炒為末吹之普濟方舌衂出血槐花末傅之即止朱氏集驗吐血不止槐花燒存性入麝香少許研匀糯米飲下三錢普濟方咯血唾血槐花炒研毎服三錢糯米飲下仰臥一時取效朱氏方小便尿血槐花炒鬱金煨各一兩為末毎服二錢淡豉湯下立效篋中秘宻方大腸下血經驗方用槐花荆芥穗等分為末酒服一錢匕珍集簡方用柏葉三錢槐花六錢煎湯日服袖用槐花枳殻等分炒存性為末新汲水服二錢暴熱下血生猪臟一條洗浄控乾以炒槐花末填滿扎定米醋炒鍋内煮爛擂丸彈子大日乾毎服一丸空心當歸煎酒化下永類鈐方酒毒下血槐花半生半炒一兩山栀子焙五錢為末新汲水服二服經驗良方臟毒下血新槐花炒研酒服三錢日三服或用槐白皮煎湯服普濟方婦人漏血不止槐花燒存性研毎服二三錢食前温酒下聖惠方血崩不止槐花三兩黄芩二兩為末毎服半兩酒一盌銅秤錘一枚桑柴火燒紅浸入酒内調服忌口乾坤秘韞中風失音炒槐花三更後仰臥嚼咽得危氏效方癰疽發背凡人中熱毒眼花頭暈口乾舌苦心驚背熱四肢麻木覺有紅暈在背後者即取槐花子一大抄鐵杓炒褐色以好酒一盌汗之乗熱飲酒一汗即愈如未退再炒一服極效縱成膿者亦無不愈彭幸菴云此方三十年屢效者劉松石保夀堂方楊梅毒瘡乃陽明積熱所生槐花四兩畧炒入酒二盞煎十餘沸熱服胃虚寒者勿用也集簡方外痔長寸用槐花煎湯頻洗并服之數日自縮集簡方疔瘡腫毒一切癰疽發背不問已成未成但焮痛者皆治槐花微炒核桃仁二兩無灰酒一鍾煎十餘沸熱服未成者二三服已成者一二服見效醫方摘要發背散血槐花菉豆粉各一升同炒象牙色研末用細茶一兩煎一盌露一夜調末三錢傅之留頭勿犯婦女手見攝生妙用方下血血崩槐花一兩椶灰五錢鹽一錢水三鍾煎減半服方摘𤣥白帶不止槐花炒牡蠣煆等分為末毎酒服三錢取效同上葉氣味苦平無毒主治煎湯治小兒驚癎壯熱疥癬及丁腫皮莖同用大明邪氣産難絶傷及病丙穩禾疹牙齒諸風采嫩葉食孟詵附方舊二新一霍亂煩悶槐葉桑葉各一錢炙甘草三分水煎服之聖惠方腸風痔疾用槐葉一斤蒸熟晒乾研末煎飲代茶久服明目食醫心鏡鼻氣窒塞以水五升煮槐葉取三升下葱豉調和再煎飲千金方枝氣味同葉主治洗瘡及陰囊下濕痒八月斷大枝候生嫩蘗煮汁釀酒療大風痿痺甚效别錄炮熱熨蠍毒恭青枝燒瀝塗癬煆黒揩牙去蟲煎湯洗痔核頌燒灰沐頭長髮藏器治赤目崩漏時珍發明頌曰劉禹錫傳信方著硤州王及郎中槐湯灸痔法甚詳以槐枝濃煎湯先洗痔便以艾灸其上七壯以知為度王及素有痔疾充西川安撫使判官乗騾入駱谷其痔大作狀如胡𤓰熱氣如火至驛僵仆郵吏用此法灸至三五壯忽覺熱氣一道入腸中因大轉瀉先血後穢其痛甚楚瀉後遂失胡𤓰所在登騾而馳矣附方舊五新一風熱牙痛槐枝燒熱烙之聖惠方胎赤風眼槐木枝如馬鞭大長二尺作二段齊頭麻油一匙置銅鉢中晨使童子一人以其木研之至暝乃止令仰臥以塗目日三度瘥九種心痛當太歳上取新生槐枝一握去兩頭用水三大升煎取一升頓服千金崩中赤白不問逺近取槐枝燒灰食前酒下方寸匕日二服深師方胎動欲産日月未足者取槐樹東引枝令孕婦手把之即易生矣子母秘錄陰瘡濕痒槐樹北面不見日枝煎水洗三五徧冷再暖之孟詵必效方木皮根白皮氣味苦平無毒主治爛瘡喉痺寒熱别錄煮汁淋陰囊墜腫氣痛煮漿水漱口齒風疳䘌血甄權治中風皮膚不仁浴男子陰疝卵腫浸洗五痔一切惡瘡婦人産門痒痛及湯火瘡煎膏止痛長肉消癰腫大明煮汁服治下血蘇頌附方舊四新二中風身直不得屈申反復者取槐皮黄白者切之以酒或水六升煮取二升稍稍服之效肘后方破傷中風避陰槐枝上皮旋刻一片安傷處用艾灸皮上百壯不痛者灸至痛痛者灸至不痛布裹之普濟風蟲牙痛槐樹白皮一握切以酪一升煮去滓入鹽少許含漱廣濟方隂下濕痒槐白皮炒煎水日洗生生方痔瘡有蟲作痒或下膿血多取槐白皮濃煮汁先熏後洗良久欲大便當有蟲出不過三度即愈仍以皮為末綿褁納下部中師梅方蠼螋惡瘡槐白皮醋浸半日洗之孫真人千金翼槐膠氣味苦寒無毒主治一切風化涎肝臟風筋脈抽掣及急風口噤或四肢不收頑痺或毒風周身如蟲行或破傷風口眼偏斜腰背强硬任作湯散丸煎雜諸藥用之亦可水煮和藥為丸嘉祐煨熱綿褁塞可治風熱聾閉時珍槐耳見菜部木耳檀拾遺釋名時珍曰朱子云檀善木也其字從亶以此亶者善也集解藏器曰按蘇恭言檀似秦皮其葉堪為飲樹體細堪作斧柯至夏有不生者忽然葉開當有大水農人候之以占水旱號為水檀又有一種葉如檀高五六尺生高原四月開花正紫亦名檀樹其根如葛頌曰江淮河朔山中皆有之亦檀香類但不香爾時珍曰檀有黄白二種葉皆如槐皮青而澤肌細而膩體重而堅狀與梓榆莢蒾相似故俚語云研檀不諦得莢蒁莢蒾尚可得駁馬駁馬梓榆也又名六駁皮色青白多癬駁也檀木宜杵楤鎚器之用皮及根皮氣味辛平有小毒主治皮和榆皮為粉食可斷穀救荒根皮塗瘡疥殺蟲藏器莢蒾唐本草釋名擊迷詩疏羿先同上集解恭曰莢蒾葉似木槿及榆作小樹其子如疏溲兩兩相對而色赤味甘陸璣詩疏云檀榆之類也所在山谷有之藏器曰生北土山林中皮堪為索枝葉氣味甘苦平無毒主治三蟲下氣消穀煮汁和米作粥飼小兒甚美唐本作粥灌六畜瘡中生蛆立出藏器本草綱目卷三十五上
