  text: 本草綱目卷四十一目録蟲之三化生類三十二種附十一種蠐螬本經乳蟲綱目木蠧蟲拾遺桑蠧蟲别録栁蠧蟲綱目桃蠧蟲日華桂蠧蟲綱目柘蠧蟲拾遺棗蠧蟲綱目竹蠧蟲綱目蘆蠧蟲拾遺蒼耳蠧蟲綱目青蒿蠧蟲綱目皂莢蠧蟲綱目茶蛀蟲綱目蚱蟬本經蟬花證類蜣蜋本經蜉蝣天社蟲附天牛綱目附飛生蟲螻蛄本經螢火本經衣魚本經鼠婦本經附丹戩蟅蟲本經蜚蠊本經行夜别録竈馬綱目附促織蛗螽拾遺蟲吉丁蟲金龜子腆頭叩頭蟲媚蝶附木虻本經蜚蟲本經蚋扁前蚊子子附竹蟲綱目右附方舊二十四新一百零四本草綱目卷四十一目録
