body:
  text: 本草綱目卷五十二目録人部李時珍曰神農本草人物惟髪髲一種所以别人於物也後世方伎之士至於骨肉肌血咸稱為藥甚哉不仁也今於此部凡經人用者皆不可遺惟無害於義者則詳述之其慘忍邪穢者則畧之仍闢斷於各條之下通計三十五種不復分類舊本二十五種今移五種入服器部自玉石部移入一種神農本草經一種梁陶𢎞景註名醫别録五種梁陶𢎞景註唐本草一種唐蘓頌本草拾遺八種唐陳藏器日華本草二種宋人大明開寳本草一種宋馬志嘉祐本草四種宋掌禹錫證類本草一種宋唐慎微本草蒙詮一種明陳嘉謨本草綱目一十三種明李時珍附註魏吳普本草宋雷斆炮炙李當之本録對齊徐之才藥孫思邈千金唐孟詵食療甄權藥性重註蜀韓保昇宋寇宗奭衍義王好古湯液元李杲法象朱震亨補遺明汪機㑹編人之一凡三十五種内附二種髮髲本經亂髪别録頭垢别録耳塞日華膝垢綱目爪甲綱目牙齒日華人屎别録小兒胎屎綱目人尿别録溺白垽唐本即人中白秋石蒙筌淋石嘉祐癖石綱目乳汁别録婦人月水嘉祐人血拾遺人精嘉祐口津唾綱目齒垽嘉祐人汗綱目眼淚綱目人氣綱目人魄綱目髭鬚證類隂毛拾遺人骨拾遺天靈葢開寳人胞拾遺胞衣水拾遺初生臍帶拾遺人勢綱目人胆拾遺人肉拾遺木乃伊綱目方民綱目人傀綱目右附方舊六十七新二百二十本草綱目卷五十二目録
