body:
  text: 本草綱目卷四十七目録禽部李時珍曰嘗考禽經山禽巖棲原鳥地處林鳥朝嘲水鳥夜㖡山禽咮短而尾修水禽咮長而尾促其交也或以尾臎或以睛睨或以聲音或合異類雉孔與蛇交之類其生也或以翼孚卵或以同氣變鷹化鳩之類或以異類化田鼠化鴽之類或變入無情雀入水為蛤之類噫物理萬殊若此學者其可不致知乎五鳩九扈少皥取以名官雄雉鴟梟詩人得之觀感厥旨微矣不妖夭不覆巢不殈卵而庖人供六禽翨音翅氏攻猛鳥硩蔟覆天鳥之巢聖人之於物也用舍仁殺之意夫豈徒然哉記曰天産作陽羽類則陽中之陽大抵多養陽於是集其可供庖藥及毒惡當知者為禽部凡七十七種分為四類曰水曰原曰林曰山舊本禽部三品共五十六種今併入一種自獸部移入一種蟲部移入一種有名未用移入一種神農本草經五種梁陶𢎞景注名醫别録一十一種梁陶𢎞景注唐本草二種唐蘇恭本草拾遺二十六種唐陳藏器食療本草二種唐孟詵張鼎開寶本草一種宋馬志嘉祐本草一十三種宋掌禹鍚日華本草一種宋人大明圖經本草一種宋蘇頌食物本草十種明汪頴本草綱目五種明李時珍附注魏李當之藥録齊徐之才藥對吳普本草性宋雷斆炮炙唐甄權藥蕭炳四聲唐李珣海藥食孫思邈千金升楊損之刪繁宗南唐陳士良性蜀韓保重注宋冦奭衍義囊唐慎微證類象陳承别説湯金張元素珍珠元李杲法王好古液吳瑞日用原食鑑朱震亨補遺陳明徐用誠發揮汪機會編嘉謨蒙筌寧禽之一水禽類二十三種附三種鶴嘉祐鸛别録鶬雞食物附鷫鸘陽鳥拾遺鵚􅒗食物鸏􅀈綱目鵜鶘嘉祐鵝即淘鵝别録鴈本經鵠食物鵝即天鴇綱目鶩别録即鴨鳬食療鴨即野鸊鷉拾遺鴛鴦嘉祐鸂鶒嘉祐鵁鶄拾遺目旋目方附鷺食物鷗食物鸀鳿拾遺鸕鷀别録魚狗拾遺附翡翠蚊母鳥拾遺右附方舊七新十七本草綱目卷四十七目録
