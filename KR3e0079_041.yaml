body:
  text: 本草綱目卷十四明李時珍撰草之三芳草類五十六種當歸本經中品釋名乾歸本經山蘄爾雅白蘄爾雅文無綱目頌曰按爾雅薜山蘄又云薜白蘄薜音百蘄即古芹字郭璞註云當歸也似芹而粗大許慎說文云生山中者名薜一名山蘄然則當歸芹類也在平地者名芹生山中粗大者名當歸也宗奭曰今川蜀皆以畦種尤肥好多脂不以平地山中為等差也時珍曰當歸本非芹類特以花葉似芹故得芹名古人娶妻為嗣續也當歸調血為女人要藥有思夫之意故有當歸之名正與唐詩胡麻好種無人種正是歸時又不歸之㫖相同崔豹古今注云古人相贈以芍藥相招以文無文無一名當歸芍藥一名將離故也承曰當歸治妊婦産後惡血上衝倉卒取效氣血昬亂者服之即定能使氣血各有所歸恐當歸之名必因此出也集解别錄曰當歸生隴西川谷二月八月采根隂乾𢎞景曰今隴西四陽黑水當歸多肉少枝氣香名馬尾當歸西川北部當歸多根枝而細厯陽所出者色白而氣味薄不相似呼為草當歸缺少時亦用之恭曰今出當州宕州翼州松州以宕州者最勝有二種一種似大葉芎藭者名馬尾當歸今人多用一種似細葉芎藭者名蠶頭當歸即陶稱厯陽者不堪用莖葉並卑下於芎藭頌曰今川蜀陜西諸郡及江寧府滁州皆有之以蜀中者為勝春生苗綠葉有三瓣七八月開花似蒔蘿淺紫色根黑黄色以肉厚而不枯者為勝時珍曰今陜蜀秦州汶州諸處人多栽蒔為貨以秦歸頭圎尾多色紫氣香肥潤者名馬尾歸最勝他處頭大尾粗色白堅枯者為鑱頭歸止宜入發散藥爾韓􅐂言川産者力剛而善攻秦産者力柔而善補是矣根修治斆曰凡用去蘆頭以酒浸一宿入藥止血破血頭尾效各不同若要破血即使頭一節硬實處若要止痛止血即用尾若一併用服食無效不如不使惟單使妙也元素曰頭止血尾破血身和血全用即一破一止也先以水洗淨土治上酒浸治外酒洗過或火乾日乾入藥杲曰頭止血而上行身養血而中守梢破血而下流全活血而不走時珍曰雷張二氏所說頭尾功效各異凡物之根身半已上氣脈上行法乎天身半已下氣脈下行法乎地人身法象天地則治上當用頭治中當用身治下當用尾通治則全用乃一定之理也當以張氏之說為優凡晒乾乗熱紙封甕收之不蛀氣味苦温無毒别錄曰辛大温普曰神農黄帝桐君扁鵲甘無毒岐伯雷公辛無毒李當之小温杲曰甘辛温無毒氣厚味薄可升可降陽中微隂入手少隂足太隂厥隂經血分之才曰惡䕡茹濕麫畏菖蒲海藻牡蒙生薑制雄黄主治欬逆上氣温瘧寒熱汎汎在皮膚中婦人漏下絶子諸惡瘡瘍金瘡煑汁飲之本經温中止痛除客血内塞中風痓汗不出濕痺中惡客氣虚冷補五臟生􅡌肉别錄止嘔逆虚勞寒熱下痢腹痛齒痛女人瀝血腰痛崩中補諸不足甄權治一切風一切氣補一切勞破惡血養新血及癥癖膓胃冷大明治頭痛心腹諸痛潤膓胃筋骨皮膚治癰疽排膿止痛和血補血時珍主痿癖嗜卧足下熱而痛衝脈為痛氣逆裏急帶脈為病腹痛腰溶溶如坐水中好古發明權曰患人虚冷者加而用之承曰世俗多謂惟能治血而金匱外臺千金諸方皆為人補不足决取立效之藥古方用治婦人産後惡血上衝取效無急於此凡氣血昬亂者服之即定可以補虚備産後要藥也宗奭曰藥性論補女子諸不足一說盡當歸之用矣成無已曰脈者血之府諸血皆屬心凡通脈者必先補心益血故張仲景治手足厥寒脉細欲絶者用當歸之苦温以助心血元素曰其用有三一心經本藥二和血三治諸病夜甚凡血受病必湏用之血壅而不流則痛當歸之甘温能和血辛温能散内寒苦温能助心散寒使氣血各有所歸好古曰入手少隂以其心生血也入足太隂以其皮裹血也入足厥隂以其肝藏血也頭能破血身能養血尾能行血全用同人參黄茋則補氣而生血同牽牛大黄則行氣而破血從桂附茱茰則熱從大黄芒消則寒佐使分定用者當知酒蒸治頭痛諸痛皆屬火故以血藥主之璣曰治頭痛酒煑服凊取其浮而上也治心痛酒調末服取其濁而半沈半浮也治小便出血用酒煎服取其沈入下極也自有髙低之分如此王每藏言當歸血藥如何治胸中欬逆上氣按當歸其味辛散乃血中氣藥也况欬逆上氣有隂虛陽無所附者故用血藥補隂則血和而氣降矣韓􅐂曰當歸主血分之病川産力剛可攻秦産力柔宜補凡用本病宜酒制有痰以薑制導血歸源之理血虚以人參石脂為佐血熱以生地黄條芩為佐不絶生化之源血積配以大黄要之血藥不容舎當歸故古方四物湯以為君芍藥為臣地黄為佐芎藭為使也附方舊八新一十九血虚發熱當歸補血湯治肌熱燥熱困渇引飲目赤面紅晝夜不息其脈洪大而虚重按全無力此血虛之候也得於饑困勞役證象白虎但目不長實為異耳若誤服白虎湯即死宜此主之當歸身酒洗二錢綿黄茋宻炙一兩作一服水二鍾煎一鍾空心温服日再服東垣蘭室秘藏失血眩運凡傷胎去血産後去血崩中去血金瘡去血㧞牙去血一切去血過多心煩眩運悶絶不省人事當歸二兩芎藭一兩毎用五錢水七分酒三分煎七分熱服日再婦人良方衂血不止當歸焙研末毎服一錢米飲調下聖濟錄小便出血當歸四兩剉酒三升煑取一升頓服肘後頭痛欲裂當歸二兩酒一升煑取六合飲之日再服外臺秘要方内虚目暗補氣養血用當歸生晒六兩附子火炮一兩為末煉蜜丸梧子大毎服三十丸温酒下名六一丸総聖濟錄心下痛刺當歸為末酒服方寸匕必效方手臂疼痛當歸三兩切酒浸三日温飲之飲盡别以三兩再浸以瘥為度事林廣記温瘧不止當歸一兩水煎飲日一服聖濟総錄久痢不止當歸二兩吳茱茰一兩同炒香去茰不用為末蜜丸梧子大每服三十丸米飲下名勝金丸普濟方大便不通當歸白芷等分為末每服二錢米湯下聖濟總錄婦人百病諸虚不足者當歸四兩地黄二兩為末蜜丸梧子大毎食前米飲下十五丸法大醫支存方月經逆行從口鼻出先以京墨磨汁服止之次用當歸尾紅花各三錢水一鍾半煎八分温服其經即通簡便方室女經閉當歸尾沒藥各一錢為末紅花浸酒面北飲之一日一服普濟方婦人血氣臍下氣脹月經不利血氣上攻欲嘔不得睡當歸四錢乾漆燒存性二錢為末煉蜜丸梧子大每服十五丸温酒下永類方墮胎下血不止當歸焙一兩葱白一握每服五錢酒一盞半煎八分温服聖濟總錄妊娠胎動神妙佛手散治婦人妊娠傷動或子死腹中血下疼痛口噤欲死服此探之不損則痛止已損便立下此乃徐玉神驗方也當歸二兩芎藭一兩為粗末每服三錢水一盞煎令沸沸欲乾投酒一盞再煎一沸温服或灌之如人行五里再服不過三五服便效張文仲備急方産難胎死横生倒生用當歸三兩芎藭一兩為末先以大黒豆炒焦入流水一盞童便一盞煎至一盞分為二服未效再服婦人良方倒産子死不出當歸末酒服方寸匕子母秘錄産後血脹腹痛引脇當歸二錢乾薑炮五分為末每服三錢水一盞煎八分入鹽酢少許熱服婦人良方産後腹痛如絞當歸末五錢白蜜一合水一盞煎一盞分為二服未效再服婦人良方産後自汗壯熱氣短腰脚痛不可轉當歸三錢黄茋白芍藥酒炒各二錢生薑五片水一盞半煎七分温服和劑局方産後中風不省人事口吐涎沫手足瘛瘲當歸荆芥穗等分為末每服二錢水一盞酒少許童尿少許煎七分灌之下咽即有生意神效聖惠方小兒胎寒好啼晝夜不止因此成癎當歸末一小豆大以乳汁灌之日夜三四度肘後方小兒臍濕不早治成臍風或腫赤或出水用當歸末傅之一方入麝香少許一方用胡粉等分試之最驗若愈後因尿入復作再傅即愈聖惠方湯火傷瘡焮赤潰爛用此生肌拔熱止痛當歸黄蠟各一兩麻油四兩以油煎當歸焦黄去滓納蠟攪成膏出火毒攤貼之方和劑局白黄色枯舌縮恍惚若語亂者死當歸白术二兩水煎入生苄汁蜜和服六三十黄方芎藭音穹窮品本經上釋名胡藭别錄川芎綱目香果别錄山鞠窮綱目時珍曰芎本作􅀢名義未詳或云人頭穹窿窮髙天之象也此藥上行專治頭腦諸疾故有芎藭之名以胡戎者為佳故曰胡藭古人因其根節狀如馬御謂之馬銜芎藭後世因其狀如雀腦謂之雀腦芎其出關中者呼為京芎亦曰西芎出蜀中者為川芎出天台者為台芎出江南者為撫芎皆因地而名也左傳楚人謂蕭人曰有麥麴乎有山鞠窮乎河魚腹疾奈何二物皆禦濕故以諭之丹溪朱氏治六鬱越鞠丸中用越桃鞠窮故以命名金光明經謂之闍莫迦集解别錄曰芎藭葉名蘼蕪生武功川谷斜谷西嶺三月四月采根暴乾普曰芎藭或生胡無桃山隂或泰山葉細香青黒文赤如藁本冬夏叢生五月花赤七月實黑附端兩葉三月采根有節如馬衘𢎞景曰武功斜谷西嶺俱近長安今出厯陽䖏處亦有人家多種之葉似蛇狀而香節大莖細狀如馬銜謂之馬銜芎藭蜀中亦有而細恭曰今出秦州其厯陽出者不復用其人間種者形塊大重實多脂山中采者瘦細味苦辛以九月十月采之為佳若三月四月虚惡非時也頌曰關陜川蜀江東山中多有之而以川蜀者為勝四五月生葉似水芹胡荽蛇牀軰作叢而莖細其葉倍香江東蜀人采葉作飲七八月開碎白花如蛇牀子花根堅瘦黄黒色關中出者形塊重實作雀腦狀者為雀腦芎最有力時珍曰蜀地少寒人多栽蒔深秋莖葉亦不萎也清明後宿根生苗分其枝横埋之則節節生根八月根下始結芎藭乃可掘取蒸暴貨之救荒本草云葉似芹而微細窄有了又文似白芷葉亦細又似胡荽葉而微壯一種似蛇牀葉而亦粗嫩葉可食宗奭曰凡用以川中大塊裏色白不油嚼之微辛甘者佳他種不入藥止可為末煎湯沐浴而已根氣味辛温無毒普曰神農黄帝岐伯雷公辛無毒扁鵲酸無毒李當之生温熟寒元素曰性温味辛若氣厚味薄浮而升陽也少陽本經引經藥入手足厥隂氣分之才曰白芷為之使畏黄連伏雌黄得細辛療金瘡止痛得牡蠣療頭風吐逆主治中風入腦頭痛寒痺筋攣緩急金瘡婦人血閉無子本經除腦中冷動面上遊風去来目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脇風痛温中内寒别録腰脚軟弱半身不遂胞衣不下甄權一切風一切氣一切勞損一切血補五勞壯筋骨調衆脈破癥結宿血養新血吐血鼻血溺血腦癰發背瘰􅊓癭贅痔瘻瘡疥長肉排膿消瘀血大明捜肝氣補肝血潤肝燥補風虚好古燥濕止瀉痢行氣開鬱時珍蜜和大丸夜服治風痰殊效蘇頌齒根出血含之多瘥𢎞景發明宗奭曰今人用此最多頭面風不可缺也然須以他藥佐之元素曰川芎上行頭目下行血海故清神及四物湯皆用之能散肝經之風治少陽厥隂經頭痛及血虚頭痛之聖藥也其用有四為少陽引經一也諸經頭痛二也助清陽之氣三也去濕氣在頭四也杲曰頭痛必用川芎如不愈加各引經藥太陽羗活陽明白芷少陽柴胡太隂蒼术厥隂吳茱茰少隂細辛是也震亨曰鬱在中焦須撫芎開提其氣以升之氣升則鬱自降故撫芎総解諸鬱直達三焦為通隂陽氣血之使時珍曰芎藭血中氣藥也肝苦急以辛補之故血虚者宜之辛以散之故氣鬱者宜之左𫝊言麥麴鞠藭禦濕治河魚腹疾予治濕瀉每加二味其應如響也血痢已通而痛不止者乃隂虧氣鬱藥中加芎為佐氣行血調其病立止此皆醫學妙㫖圎機之士始可語之宗奭曰沈栝筆談云一族子舊服芎藭醫鄭叔見之云芎藭不可久服多令人暴死後族子果無疾而卒又朝士張子通之妻病腦風服芎藭甚久一日暴亡皆目見者此皆单服既久則走散真氣若使他藥佐使又不久服中病便已則焉能至此哉虞摶曰骨蒸多汗及氣弱之人不可久服其性辛散令真氣走洩而隂愈虚也時珍曰五味入胃各歸其本臟久服則増氣偏勝必有偏絶故有暴夭之患若藥具五味備四氣君臣佐使配合得宜豈有此害哉如芎藭肝經藥也若單服既久則辛喜歸肺肺氣偏勝金来賊木肝必受邪久則偏絶豈不夭亡故醫者貴在格物也附方舊七新一十二生犀丸宋真宗賜髙相國去痰清目進飲食生犀丸用川芎十兩𦂳小者粟米泔浸二日換切片子日乾為末分作兩料每料入腦麝各一分生犀半兩重湯煑蜜和丸小彈子大茶酒嚼下一丸痰加硃砂半兩膈痰加牛黄一分水飛鐵粉一分頭目昬加細辛一分口眼喎斜加炮天南星一分御藥院方氣虚頭痛真川芎藭為末臘茶調服二錢甚㨗曽有婦人産後頭痛一服即愈集簡方氣厥頭痛婦人氣盛頭痛及産後頭痛川芎藭天台烏藥等分為末每服二錢葱茶調下煎御藥院方加白术水服風熱頭痛川芎藭一錢茶葉二錢水一鍾煎五分食前熱服簡便方頭風化痰川芎洗切晒乾為末煉蜜丸如小彈子大不拘時嚼一丸茶清下方經驗後偏頭風痛京芎細剉浸酒日飲之斗門方風熱上衝頭目運眩或胸中不利川芎槐子各一兩為末每服三錢用茶清調下胸中不利以水煎服張潔古保命集首風旋運及偏正頭疼多汗惡風胸膈痰飲川芎藭一斤天麻四兩為末煉蜜丸如彈子大每嚼一丸茶清下劉河間宣明方失血眩運方見當歸下一切心痛大芎一箇為末燒酒服之一箇住一年兩箇住二年孫氏集效方經閉驗胎經水三箇月不行驗胎法川芎生為末空心煎艾湯服一匙腹内微動者是有胎不動者非也靈苑方損動胎氣因跌撲舉重損胎不安或子死腹中者芎藭為末酒服方寸匕須㬰一二服即出千金方崩中下血晝夜不止千金方用芎藭一兩清酒一大盞煎取五分徐徐進之聖惠加生地黄汁二合同煎酒癖脇脹時復嘔吐腹有水聲川芎藭三稜炮各一兩為末每服二錢葱白湯下聖濟總錄小兒腦熱好閉目或太陽痛或目赤腫川芎藭薄荷朴消各二錢為末以少許吹鼻中全幼心鑑齒敗口臭水煑芎藭含之廣濟方牙齒疼痛大川芎藭一箇入舊糟内藏一月取焙入細辛同研末揩牙本事方諸瘡腫痛撫芎煆研入輕粉麻油調塗普濟方産後乳懸婦人産後兩乳忽長細小如膓垂過小肚痛不可忍危亡須㬰名曰乳懸將芎藭當歸各一斤以半斤剉散於瓦石器内用水濃煎不拘多少頻服仍以一斤半剉塊於病人桌下燒烟令將口鼻吸烟用盡未愈再作一料仍以􅒝麻子一粒貼其頂心夏子益竒疾方蘼蕪本經上品釋名薇蕪别錄蘄茞爾雅江蘺别錄頌曰蘄茞古芹芷字也時珍曰蘼蕪一作蘪蕪其莖葉蘼弱而繁蕪故以名之當歸名蘄白芷名蘺其葉似當歸其香似白芷故有蘄茞江蘺之名王逸云蘺草生江中故曰江蘺是也餘見下集解别錄曰芎藭葉名蘼蕪又曰蘼蕪一名江蘺芎藭苗也生雍州川澤及寃句四月五月采葉暴乾𢎞景曰今出厯陽處處人家多種之葉似蛇牀而香騷人借以為譬方藥稀用恭曰此有二種一種似芹葉一種似蛇牀香氣相似用亦不殊時珍曰别錄言蘼蕪一名江蘺芎藭苗也而司馬相如子虚賊稱芎藭菖蒲江蘺蘼蕪上林賦云被以江蘺揉以蘼蕪似非一物何耶盖嫩苗未結根時則為蘼蕪既結根後乃為芎藭大葉似芹者為江蘺細葉似蛇牀者為蘼蕪如此分别自明白矣淮南子云亂人者若芎藭之與藁本蛇牀之與蘼蕪亦指細葉者言也廣志云蘼蕪香草可藏衣中管子云五沃之土生蘼蕪郭璞賛云蘼蕪香草亂之蛇牀不損其真自裂以芳又海中苔髪亦名江離與此同名耳氣味辛温無毒主治欬逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神本經主身中老風頭中久風風眩别錄作飲止泄瀉蘇頌花主治入面脂用時珍蛇牀本經上品釋名蛇粟本經蛇米本經虺牀爾雅馬牀廣雅墻蘼别錄又名思益繩毒棗棘時珍曰蛇虺喜卧于下食其子故有蛇虺蛇粟諸名其葉似蘼蕪故曰墻蘼爾雅云旴虺牀也集解别錄曰蛇牀生臨淄川谷及田野五月采實隂乾𢎞景曰田野墟落甚多花葉正似蘼蕪保昇曰葉似小葉芎藭花白子如黍粒黄白色生下濕地所在皆有以揚州㐮州者為良頌曰三月生苗髙三二尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月乃開白色又似繖狀子黄褐色如黍米至輕虚時珍曰其花如碎米攅簇其子兩片合成似蒔蘿子而細亦有細稜凡花實似蛇牀者當歸芎藭水芹藁本胡蘿蔔是也子修治斆曰凡使須用濃藍汁并百部草根自然汁同浸一伏時漉出日乾却用生地黄汁相拌蒸之從巳至亥取出日乾用大明曰凡服食即挼去皮殻取仁微炒殺毒即不辣也作湯洗浴則生用之氣味苦平無毒别錄曰辛甘無毒權曰有小毒之才曰惡牡丹貝母巴豆伏硫黄主治男子隂痿濕癢婦人隂中腫痛除痺氣利關節癲癎惡瘡久服輕身好顔色本經温中下氣令婦人子臟熱男子隂强久服令人有子别錄治男子女人虚濕痺毒風􅍙痛去男子腰痛浴男子隂去風冷大益陽事甄權暖丈夫陽氣女人隂氣治腰胯酸疼四肢頑痺縮小便去隂汗濕癬齒痛赤白帶下小兒驚癎撲損瘀血煎湯浴大風身癢大明發明斆曰此藥令人陽氣盛數號曰鬼考也時珍曰蛇牀乃右腎命門少陽三焦氣分之藥神農列之上品不獨補助男子而又有益婦人世人捨此而求補藥於逺域豈非賤目貴耳乎附方舊三新十一陽事不起蛇牀子五味子兎絲子等分為末蜜丸梧子大每服三十丸温酒下日三服千金方赤白帶下月水不来用蛇牀子枯白礬等分為末醋麫糊丸彈子大胭脂為衣綿裹納入隂戸如熱極再換日一次儒門事親方子宮寒冷温中坐藥蛇牀子散取蛇牀子仁為末入白粉少許和勻如棗大綿裹納之自然温也金匱王函方婦人隂癢蛇牀子一兩白礬二錢煎湯頻洗集簡方産後隂脫絹盛蛇牀子蒸熱熨之又法蛇牀子五兩烏梅十四箇煎水日洗五六次千金方婦人隂痛方同上男子隂腫脹痛蛇牀子末雞子黄調傅之永類方大膓脫肛蛇牀子甘草各一兩為末每服一錢白湯下日三服并以蛇牀末傅之經驗方痔瘡腫痛不可忍蛇牀子煎湯熏洗簡便方小兒癬瘡蛇牀子杵末和猪脂塗之千金方小兒甜瘡頭目耳邊連引流水極痒久久不愈者蛇牀子一兩輕粉三錢為細末油調搽之普濟方耳内濕瘡蛇牀子黄連各一錢輕粉一字為末吹之全幼心鑑風蟲牙痛千金用蛇牀子燭燼同研塗之集簡方用蛇牀子煎湯乗熱潄數次立止冬月喉痺腫痛不可下藥者蛇牀子燒烟於瓶中口含瓶嘴吸烟其痰自出聖惠方藁本本經中品釋名藁茇綱目鬼卿本經鬼新本經微莖别錄恭曰根上苗下似禾藁故名藁本本根也時珍曰古人香料用之呼為藁本香山海經名藁茇集解别錄曰藁本生崇山山谷正月二月采根暴乾三十日成𢎞景曰俗中皆用芎藭根鬚其形氣乃相類而桐君藥錄說芎藭苗似藁本論說花實皆不同所生處又異今東山别有藁本形氣甚相似惟長大耳恭曰藁本莖葉根味與芎藭小别今出宿州者佳頌曰今西川河東州郡及兖州杭州皆有之葉似白芷香又似芎藭但芎藭似水芹而大藁本葉細爾五月有白花七八月結子根紫色時珍曰江南深山中皆有之根似芎藭而輕虚味麻不堪作飲也根氣味辛温無毒别錄曰微寒權曰微温元素曰氣温味苦大辛無毒氣厚味薄升也陽也足太陽本經藥之才曰惡䕡茹畏青葙子主治婦人疝瘕隂中寒腫痛腹中急除風頭痛長肌膚恱顔色本經辟霧露潤澤療風邪軃曵金瘡可作沐藥面脂别錄治一百六十種惡風鬼疰流入腰痛冷能化小便通血去頭風䵟皰甄權治皮膚疵皯酒齄粉刺癎疾大明治太陽頭痛巔頂痛大寒犯腦痛連齒頰元素頭面身體皮膚風濕李杲督脈為病脊强而厥好古治癰疽排膿内塞時珍發明元素曰藁本乃太陽經風藥其氣雄壯寒氣鬱於本經頭痛必用之藥顛頂痛非此不能除與木香同用治霧露之清邪中於上焦與白芷同作面脂既治風又治濕亦各從其類也時珍曰邵氏聞見錄云夏英公病泄太醫以虚治不效霍翁曰風客于胃也飲以藁本湯而止盖藁本能去風濕故耳附方新三大實心痛已用利藥用此徹其毒藁本半兩蒼术一兩作二服水二鍾煎一鍾温服要活法機乾洗頭屑藁本白芷等分為末夜擦旦梳垢自去也便民圗纂小兒疥癬藁本煎湯浴之并以浣衣保幼大全實主治風邪流入四肢别錄附錄徐黄别錄有名未用曰味辛平無毒主心腹積瘕莖主惡瘡生澤中大莖細葉香如藁本蜘蛛香綱目集解時珍曰蜘蛛香出蜀西茂州松潘山中草根也黒色有粗鬚狀如蜘蛛及藁本芎藭氣味芳香彼人亦重之或云貓喜食之根氣味辛温無毒主治辟瘟疫中惡邪精鬼氣尸疰時珍白芷本經上品釋名白茞音止又昌海切芳香本經澤芬别錄苻蘺别錄䖀許驕切莞音官葉名蒿麻音力葯音約時珍曰徐鍇云初生根幹為芷則白芷之義取乎此也王安石字說云茞香可以養鼻又可養體故茞字從􅀈􅀈音怡養也許慎說文云晉謂之囂齊謂之茞楚謂之蘺又謂之葯生於下澤芬芳與蘭同德故騷人以蘭茞為詠而本草有芳香澤芬之名古人謂之香白芷云集解别錄曰白芷生河東川谷下澤二月八月采根暴乾𢎞景曰今處處有之東間甚多葉可合香頌曰所在有之吳地尤多根長尺餘粗細不等白色枝幹去地五寸以上春生葉相對婆娑紫色濶三指許花白微黄入伏後結子立秋後苗枯二月八月采暴以黄澤者為佳斆曰凡采勿用四條一處生者名䘮公藤又勿用馬蘭根根修治斆曰采得刮去土皮細剉以黄精片等分同蒸一伏時㬠乾去黄精用時珍曰今人采根洗刮寸截以石灰拌勻晒收為其易蛀并欲色白也入藥微焙氣味辛温無毒元素曰氣温味苦大辛氣味俱輕陽也手陽明引經本藥同升麻則通行手足陽明經亦入手太隂經之才曰當歸為之使惡旋復花制雄黄硫黄主治女人漏下赤白血閉隂腫寒熱頭風侵目淚出長肌膚潤澤顔色可作面脂本經療風邪久渇吐嘔兩脇滿頭眩目癢可作膏藥别錄治目赤弩肉去面皯疵瘢補胎漏滑落破宿血補新血乳癰發背瘰􅊓膓風痔瘻瘡痍疥癬止痛排膿大明能蝕膿止心腹血刺痛女人瀝血腰痛血崩甄權解利手陽明頭痛中風寒熱及肺經風熱頭面皮膚風痺燥癢元素治鼻淵鼻衂齒痛眉稜骨痛大膓風袐小便去血婦人血風眩運飜胃吐食解砒毒蛇傷刀箭金瘡時珍發明杲曰白芷療風通用其氣芳香能通九竅表汗不可缺也劉完素曰治正陽明頭痛熱厥頭痛加而用之好古曰同辛夷細辛用治鼻病入内托散用長肌肉則入陽明可知矣時珍曰白芷色白味辛行手陽明庚金性温氣厚行足陽明戊土芳香上達入手太隂肺經肺者庚之弟戊之子也故所主之病不離三經如頭目眉齒諸病三經之風熱也如漏帶癰疽諸病三經之濕熱也風熱者辛以散之濕熱者温以除之為陽明主藥故又能治血病胎病而排膿生肌止痛按王璆百一選方云王定國病風頭痛至都梁求明醫楊介治之連進三丸即時病失懇求其方則用香白芷一味洗晒為末煉蜜丸彈子大每嚼一丸以茶清或荆芥湯化下遂命名都梁丸其藥治頭風眩運女人胎前産後傷風頭痛血風頭痛皆效戴原禮要訣亦云頭痛挾熱項生磊塊者服之甚宜又􅋯仙神隱書言種白芷能辟蛇則夷堅志所載治蝮蛇傷之方亦制以所畏也而本草不曽言及宗奭曰藥性論言白芷能蝕膿今人用治帶下膓有敗膿淋露不已腥穢殊甚遂致臍腹冷痛皆由敗膿血所致須此排膿白芷一兩單葉紅蜀葵根二兩白芍藥白枯礬各半兩為末以蠟化丸梧子大每空心及飲前米飲下十丸或十五丸俟膿盡乃以他藥補之附方舊一新三十三一切傷寒神白散又名聖僧散治時行一切傷寒不問隂陽輕重老少男女孕婦皆可服之用白芷一兩生甘草半兩薑三片葱白三寸棗一枚豉五十粒水二碗煎服取汗不汗再服病至十餘日未得汗者皆可服之此藥可卜人之好惡也如煎得黒色或誤打翻即難愈如煎得黄色無不愈者煎時要至誠忌婦人雞犬見衛生家寳方一切風邪方同上風寒流涕香白芷一兩荆芥穗一錢為末蠟茶㸃服二錢百一選方小兒流涕是風寒也白芷末葱白擣丸小豆大每茶下二十丸仍以白芷末薑汁調塗太陽穴乃食熱葱粥取汗聖惠方小兒身熱白芷煑湯浴之取汗避風子母秘録頭面諸風香白芷切以蘿蔔汁浸透日乾為末每服二錢白湯下或以㗜鼻直指方偏正頭風百藥不治一服便可天下第一方也香白芷炒二兩五錢川芎炒甘草炒川烏頭半生半熟各一兩為末每服一錢細茶薄荷湯調下試談埜翁效方頭風眩運都梁丸見發明下眉稜骨痛屬風熱與痰白芷片芩酒炒等分為末每服二錢茶清調下丹溪纂要風熱牙痛香白芷一錢硃砂五分為末蜜丸芡子大頻用擦牙此乃濠州一村婦以醫人者廬州郭醫云絶勝他藥也或以白芷呉茱茰等分浸水潄涎要醫林集一切眼疾白芷雄黄為末煉蜜丸龍眼大硃砂為衣毎服二丸食後茶下日二服名還睛丸普濟方口齒氣臭百一選方用香白芷七錢為末食後井水服一錢濟生方用白芷川芎等分為末蜜丸芡子大日噙之盜汗不止太平白芷二兩辰砂半兩為末毎服二錢温酒下屢驗朱氏集驗方血風反胃香白芷一兩切片瓦炒黄為末用猪血七片沸湯沧七次蘸末食之日一次婦人良方脚氣腫痛白芷芥子等分為末薑汁和塗之效醫方摘要婦人白帶白芷四兩以石灰半斤淹三宿去灰切片炒研末酒服二錢日三服醫學集成婦人難産白芷五錢水煎服之唐瑶經驗胎前産後烏金散治胎前産後虚損月經不調崩漏及横生逆産用白芷百草霜等分為末以沸湯入童子小便同醋調服二錢丹溪加滑石以芎歸湯調之普濟方大便風祕香白芷炒為末每服二錢米飲入蜜少許連進二服十便良方小便氣淋結澀不通白芷醋浸焙乾二兩為末煎木通甘草酒調下一錢連進二服濟普方鼻衂不止就以所出血調白芷末塗山根立止簡便方小便出血白芷當歸等分為末米飲每服二錢經驗方腸風下血香白芷為末每服二錢米飲下神效余居士選竒方痔漏出血方同上并煎湯熏洗直指方痔瘡腫痛先以皂角煙熏之後以鵞膽汁調白芷末塗之即消醫方摘要腫毒熱痛醋調白芷末傅之衛生易簡方乳癰初起白芷貝母各二錢為末温酒服之秘傳外科方疔瘡初起白芷一錢生薑一兩擂酒一盞温服取汗即散此陳指揮方也袖珍方癰疽赤腫白芷大黄等分為末米飲服二錢經驗方小兒丹瘤遊走入腹必死初發急以截風散截之白芷寒水石為末生葱汁調塗全幼心鑑刀箭傷瘡香白芷嚼爛塗之集簡方解砒石毒白芷末井水服二錢事林廣記諸骨哽咽白芷半夏等分為末水服一錢即嘔出普濟方毒蛇傷螫臨川有人被蝮傷即昬死一臂如股少頃遍身皮脹黄黒色一道人以新汲水調香白芷末一斤灌之覺臍中搰搰然黄水自口出腥穢逆人良久消縮如故云以麥門冬湯調尤妙仍以末搽之又經山寺僧為蛇傷一脚潰爛百藥不愈一遊僧以新水數洗淨腐敗見白筋挹乾以白芷末入膽礬麝香少許摻之惡水涌出日日如此一月平復洪邁夷堅志葉主治作浴湯去尸蟲别錄浴丹毒癮疹風瘙時珍附方新一小兒身熱白芷苗苦參等分煎漿水入鹽少許洗之衛生総微論芍藥芍音杓又音勺本經中品釋名將離綱目梨食别錄白术别錄餘容别錄鋋别錄白者名金芍藥圗經赤者名木芍藥時珍曰芍藥猶綽約也婥約美好貌此草花容婥約故以為名羅願爾雅翼言制食之毒莫良于勺故得藥名亦通鄭風詩云伊其相謔贈之以芍藥韓詩外傳云勺藥離草也董子云勺藥一名將離故將别贈之俗呼其花之千葉者為小牡丹赤者為木芍藥與牡丹同名也集解别錄曰芍藥生中岳川谷及邱陵二月八月采根暴乾𢎞景曰今出白山蔣山茅山最好白而長尺許餘處亦有而多赤赤者小利志曰此有赤白兩種其花亦有赤白二色頌曰今處處有之淮南者勝春生紅芽作叢莖上三枝五葉似牡丹而狹長髙一二尺夏初開花有紅白紫數種結子似牡丹子而小秋時采根崔豹古今注云芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非矣安期生服鍊法芍藥有金芍藥色白多脂木芍藥色紫瘦多脉承曰本經芍藥生邱陵今世多用人家種植者乃欲其花葉肥大必加糞壤毎嵗八九月取根分削因利以為藥今淮南真陽尤多根雖肥大而香味不佳入藥少效時珍曰昔人言洛陽牡丹楊州芍藥甲天下今藥中所用亦多取楊州者十月生芽至春乃長三月開花其品凡三十餘種有千葉单葉樓子之異入藥宜單葉之根氣味全厚根之赤白隨花之色也根修治斆曰凡采得竹刀刮去皮并頭上剉細以蜜水拌蒸從巳至末晒乾用時珍曰今人多生用惟避中寒者以酒炒入女人血藥以醋炒耳氣味苦平無毒别錄曰酸微寒有小毒普曰神農苦桐君甘無毒岐伯鹹雷公酸李當之小寒元素曰性寒味酸氣厚味薄升而微降陽中隂也杲曰白芍藥酸平有小毒可升可降隂也好古曰味酸而苦氣薄味厚隂也降也為手足太隂行經藥入肝脾血分之才曰須丸為之使惡石斛芒消畏消石鼈甲小薊反藜蘆禹鍚曰别本須丸作雷丸時珍同白术補脾同芎藭瀉肝同人參補氣同當歸補血以酒炒補隂同甘草止腹痛同黄連止瀉痢同防風發痘疹同薑棗温經散濕主治邪氣腹痛除血痺破堅積寒熱疝瘕止痛利小便益氣本經通順血脈緩中散惡血逐賊血去木氣利膀胱大小膓消癰腫時行寒熱中惡腹痛腰痛别錄治臟腑擁氣强五臟補腎氣治時疾骨熱婦人血閉不通能蝕膿甄權女人一切病胎前産後諸疾治風補勞退熱除煩益氣驚狂頭痛目赤明目膓風瀉血痔瘻發背瘡疥大明瀉肝安脾肺收胃氣止瀉利固腠理和血脈收隂氣歛逆氣元素理中氣治脾虚中滿心下痞脇下痛善噫肺急脹逆喘欬太陽鼽衂目濇肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如坐水中好古止下痢腹痛後重時珍發明恭曰赤者利小便下氣白者止痛散血大明曰赤者補氣白者補血𢎞景曰赤者小利俗方以止痛不減當歸白者道家亦服食之及煑石用成無已曰白補而赤瀉白收而赤散酸以收之甘以緩之故酸甘相合用補隂血通氣而除肺燥又云芍藥之酸歛津液而益營血收隂氣而泄邪熱元素曰白補赤散瀉肝補脾胃酒浸行經上中部腹痛與薑同用温經散濕通塞利腹中痛胃氣不通白芍入脾經補中焦乃下利必用之藥盖瀉利皆太隂病故不可缺此得炙甘草為佐治腹中痛夏月少加黄芩惡寒加桂此仲景神方也其用凡六安脾經一也治腹痛二也收胃氣三也止瀉痢四也和血脉五也固腠理六也宗奭曰芍藥須用單葉紅花者為佳然氣虚寒人禁之古人云減芍藥以避中寒誠不可忽震亨曰芍藥瀉脾火性味酸寒冬月必以酒炒凡腹痛多是血脈凝濇亦必酒炒用然止能治血虚腹痛餘並不治為其酸寒收歛無温散之功也下痢腹痛必炒用後重者不炒産後不可用者以其酸寒伐生發之氣也必不得已亦酒炒用之時珍曰白芍藥益脾能於土中瀉木赤芍藥散邪能行血中之滯日華子言赤補氣白治血欠審矣産後肝血已虚不可更瀉故禁之酸寒之藥多矣何獨避芍藥耶以此頌曰張仲景治傷寒多用芍藥以其主寒熱利小便故也杲曰或言古人以酸濇為收本經何以言利小便曰芍藥能益隂滋濕而停津液故小便自行非因通利也曰又言緩中何也曰損其肝者緩其中即調血也故四物湯用芍藥大抵酸濇者為收斂停濕之劑故主手足太隂經收斂之體又能治血海而入于九地之下後至厥隂經白者色在西方故補赤者色在南方故瀉附方舊六新一十服食法頌曰安期生服鍊芍藥法云芍藥有二種救病用金芍藥色白多脂肉其木芍藥色紫瘦多脈若取審看勿令差錯凡采得淨洗去皮以東流水煑百沸隂乾停三日又於木甑内蒸之上覆以淨黄土一日夜熟出隂乾擣末以麥飲或酒服三錢七日三服滿三百可以登嶺絶穀不饑圗經本草腹中虚痛白芍藥三錢炙甘草一錢夏月加黄芩五分惡寒加肉桂一錢冬月大寒再加桂一錢水二盞煎一半温服潔古用藥法象風毒骨痛在髓中芍藥二分虎骨一兩炙為末夹絹袋盛酒三升漬五日每服三合日三服經驗方脚氣腫痛白芍藥六兩甘草一兩為末白湯㸃服事林廣記消渇引飲白芍藥甘草等分為末每用一錢水煎服日三服鄂渚辛祐之患此九年服藥止而復作蘇朴授此方服之七日頓愈古人處方殆不可曉不可以平易而忽之也陳日華經驗方小便五淋赤芍藥一兩梹榔一箇麫褁煨為末每服一錢水一盞煎七分空心服博濟方衂血不止赤芍藥為末水服一錢七事林廣記衂血咯血白芍藥一兩犀角末二錢半為末新水服一錢七血止為限古今錄驗崩中下血小腹痛甚者芍藥一兩炒黄色柏葉六兩微炒每服二兩水一升煎六合入酒五合再煎七合空心分為兩服亦可為末酒服二錢聖惠方經水不止白芍藥香附子熟艾葉各一錢半水煎服之熊氏補遺血崩帶下赤芍藥香附子等分為末每服二錢鹽一捻水一盞煎七分温服日二服十服見效名如神散良方赤白帶下年深月久不瘥者取白芍藥三兩并乾薑半兩剉熬令黄搗末空心水飲服二錢七日再服廣濟方只用芍藥炒黒研末酒服之貞元廣利方金瘡血出白芍藥一兩熬黄為末酒或米飲服二錢漸加之仍以末傅瘡上即止良驗廣利方痘瘡脹痛白芍藥為末酒服半錢七痘疹方木舌腫滿塞口殺人紅芍藥甘草煎水熱潄総聖濟録魚骨哽咽白芍藥嚼細嚥汁事林廣記牡丹本經中品釋名鼠姑本經鹿韭本經百兩金唐本木芍藥綱目花王時珍曰牡丹以色丹者為上雖結子而根上生苗故謂之牡丹唐人謂之木芍藥以其花似芍藥而宿幹似木也羣花品中以牡丹第一芍藥第二故世謂牡丹為花王芍藥為花相歐陽修花譜所載凡三十餘種其名或以地或以人或以色或以異詳見本書集解别錄曰牡丹生巴郡山谷及漢中二月八月采根隂乾𢎞景曰今東間亦有色赤者為好恭曰生漢中劍南苗似羊桃夏生白花秋實圎緑冬實赤色凌冬不凋根似芍藥肉白皮丹土人謂之百兩金長安謂之吳牡丹者是真也今俗用者異於此别有臊氣也頌曰今出合州者佳和州宣州者並良白者補赤者利大明曰此便是牡丹花根也巴蜀喻合州者上海鹽者次之頌曰今丹延青越滁和州山中皆有但花有黄紫紅白數色此當是山牡丹其莖梗枯燥黑白色二月於梗上生苗葉三月開花其花葉與人家所種者相似但花瓣止五六葉爾五月結子黒色如鷄頭子大根黄白色可長五七寸大如筆管近世人多貴重欲其花之詭異皆秋冬移接培以壤土至春盛開其狀百變故其根性殊失本真藥中不可用此絶無力也宗奭曰牡丹花亦有緋者深碧色者惟山中單葉花紅者根皮入藥為佳市人或以枝梗皮充之尤謬時珍曰牡丹惟取紅白单瓣者入藥其千葉異品皆人巧所致氣味不純不可用花譜載丹州延州以西及褒斜道中最多與荆棘無異土人取以為薪其根入藥尤妙凡栽花者根下着白歛末辟蟲穴中㸃硫黄殺蠧以烏賊骨鍼其樹必枯此物性亦不可不知也根皮修治斆曰凡采得根日乾以銅刀劈破去骨剉如大豆許用酒細拌蒸從巳至未日乾用氣味辛寒無毒别錄曰苦微寒普曰神農岐伯辛雷公桐君苦無毒桐君苦有毒好古曰氣寒味苦辛隂中微陽入手厥隂足少隂經之才畏貝母大黄兎絲子大明曰忌蒜胡荽伏砒主治寒熱中風瘛瘲驚癎邪氣除癥堅瘀血留舎膓胃安五臟療癰瘡本經除時氣頭痛客熱五勞勞氣頭腰痛風噤癩疾别錄久服輕身益壽吳普治冷氣散諸痛女子經脈不通血瀝腰痛甄權通關腠血脉排膿消撲損瘀血續筋骨除風痺治胎下胞産後一切冷熱血氣大明治神志不足無汗之骨蒸衂血吐血元素和血生血涼血治血中伏火除煩熱時珍發明元素曰牡丹乃天地之精為羣花之首葉為陽發生也花為隂成實也丹者赤色火也故能瀉隂胞中之火四物湯加之治婦人骨蒸又曰牡丹皮入手厥隂足少隂故治無汗之骨蒸地骨皮入足少隂手少陽故治有汗之骨蒸神不足者手少隂志不足者足少隂故仲景腎氣丸用之治神志不足也又能治膓胃積血及吐血衂血必用之藥故犀角地黄湯用之杲曰心虚膓胃積熱心火熾甚心氣不足者以牡丹皮為君時珍曰牡丹皮治手足少隂厥隂四經血分伏火盖伏火即隂火也隂火即相火也古方惟以此治相火故仲景腎氣丸用之後人乃專以黄蘖治相火不知牡丹之功更勝也此乃千載秘奥人所不知今為拈出赤花者利白花者補人亦罕悟宜分别之附方舊三新三􅒃疝偏墜氣脹不能動者牡丹皮防風等分為末酒服二錢甚效千金方婦人惡血攻聚上面多怒牡丹皮半兩乾漆燒烟盡半兩水二鍾煎一鍾服諸證辨疑傷損瘀血牡丹皮二兩䖟蟲二十一枚熬過同搗末每旦温酒服方寸匕血當化為水下貞元廣利方金瘡内漏牡丹皮為末水服三指撮立尿出血也千金方下部生瘡已決洞者牡丹末湯服方寸七日三服肘後方解中蠱毒牡丹根擣末服一錢七日三服外臺秘要附錄鼠姑别錄曰味苦平無毒主欬逆上氣寒熱鼠廔惡瘡邪氣一名􅀈生丹水𢎞景曰今人不識而牡丹一名鼠姑鼠婦亦名鼠姑末知孰是木香本經上品釋名蜜香别錄青木香𢎞景五木香圗經南木香綱目時珍曰木香草類也本名蜜香因其香氣如蜜也縁沉香中有蜜香遂訛此為木香爾昔人謂之青木香後人因呼馬兠鈴根為青木香乃呼此為南木香廣木香以别之今人又呼一種薔微為木香愈亂真矣三洞珠囊云五香者即青木香也一株五根一莖五枝一枝五葉葉間五節故名五香燒之能上徹九天也古方治癰疽有五香連翹湯内用青木香古樂府云氊毺􅂒􅚊五木香皆指此也頌曰修養書云正月一日取五木香湯以浴令人至老鬚髮黒徐鍇注云道家謂青木香亦云五木多以為浴是矣金光明經謂之矩琵佗香集解别録曰木香生永昌山谷𢎞景曰此即青木香也永昌不復貢今皆從外國舶上来乃云出大秦國今皆以合香不入藥用恭曰此有二種當以崑崙来者為佳西湖来者不善葉似羊蹄而長大花如菊花結實黄黒所在亦有之功用極多陶云不入藥用非也權曰南州異物志云青木香出天竺是草根狀如甘草也頌曰今惟廣州舶上来他無所出根窠大類茄子葉似羊蹄而長大亦有如山藥而根大開紫花者不拘時月采根芽為藥以其形如枯骨味苦粘牙者為良江淮間亦有此種名土青木香不堪藥用蜀本草言孟㫤苑中亦嘗種之云苗髙三四尺葉長八九寸皺軟而有毛開黄花恐亦是土木香種也斆曰其香是蘆蔓根條左盤旋采得二十九日方硬如朽骨其有蘆頭丁盖子色青者是木香神也宗奭曰常自岷州出塞得青木香持歸西洛葉如牛蒡但狹長莖髙二三尺花黄一如金錢其根即香也生嚼即辛香尤行氣承曰本香今皆從外國来陶說為是蘇頌圗經所載廣州者乃是木類又載滁鬼海州者乃是馬兠鈴根治療冷熱殊不相似皆誤圗耳時珍曰木香南畨諸國皆有一統志云葉類絲瓜冬月取根晒乾根修治時珍曰凡入理氣藥只生用不見火若實大膓宜麫煨熟用氣味辛温無毒元素曰氣熱味辛苦氣味俱厚沈而降隂也杲曰苦甘辛微温降也隂也好古曰辛苦熱味厚於氣隂中陽也主治邪氣辟毒疫温鬼强志主淋露久服不夢寤魘寐本經消毒殺鬼精物温瘧蠱毒氣劣氣不足肌中偏寒引藥之精别錄治心腹一切氣膀胱冷痛嘔逆反胃霍亂泄瀉痢疾健脾消食安胎大明九種心痛積年冷氣痃癖癥塊脹痛壅氣上衝煩悶羸劣女人血氣刺心痛不可忍末酒服之甄權散滯氣調諸氣和胃氣泄肺氣元素行肝經氣煨熟實大膓震亨治衝脉為病逆氣裏急主脬滲小便袐好古發明𢎞景曰青木香大秦國人以療毒腫消惡氣有驗今惟制蛀蟲丸用之常以煑汁沐浴大佳宗奭曰木香專泄决胸腹間滯塞冷氣他則次之得橘皮肉豆蔲生薑相佐使絶佳效尤速元素曰木香除肺中滯氣若治中下二焦氣結滯及不轉運須用㯽榔為使震亨曰調氣用木香其味辛氣能上升如氣鬱不達者宜之若隂火衝上者則反助火邪當用黄蘖知母而少以木香佐之好古曰本草云生氣劣氣不足補也通壅氣導一切氣破也安胎健脾胃補也除痃癖癥塊破也其不同如此潔古張氏但言調氣不言補也機曰與補藥為佐則補與泄藥為君則泄也時珍曰木香乃三焦氣分之藥能升降諸氣諸氣膹鬱皆屬於肺故上焦氣滯用之者乃金鬱則泄之也中氣不運皆屬於脾故中焦氣滯宜之者脾胃喜芳香也大膓氣滯則後重膀胱氣不化則癃淋肝氣鬱則為痛故下焦氣滯者宜之乃塞者通之也權曰隋書言樊子盖為武威太守車駕入吐谷渾子盖以彼多瘴氣獻青木香以禦霧露之邪頌曰續𫝊信方著張仲景青木香丸主陽衰諸不足用崑崙青木香六路訶子皮各二十兩擣篩糖和丸梧子大每空腹酒下三十丸日再其效尤速鄭駙馬去沙糖用白蜜加羚羊角十二兩用藥不類古方而云仲景不知何從而得也附方舊二新一十九中氣不省閉目不語如中風狀南木香為末冬𤓰子煎湯灌下三錢痰盛者加竹瀝薑汁濟生方氣脹懶食即青木香丸見發明下熱者牛乳下冷者酒下聖惠方心氣刺痛青木香一兩皂角炙一兩為末糊丸梧桐子大每湯服五十丸甚效攝生方一切走注氣痛不和廣木香温水磨濃汁入熱酒調服簡便方内釣腹痛木香乳香沒藥各五分水煎服之阮氏小兒方小膓疝氣青木香四兩酒三斤煑過每日飲三次集孫天仁效方氣滯腰痛青木香乳香各二錢酒浸飯上蒸均以酒調服聖惠方耳卒聾閉崑崙真青木香一兩切以苦酒浸一夜入胡麻油一合微火煎三上三下以綿濾去滓日滴三四次以愈為度外臺秘要耳内作痛木香末以葱黄染鵞脂蘸末深納入耳中聖濟錄霍亂轉筋腹痛木香末一錢木𤓰汁一盞入熱酒調服聖濟総錄一切下痢不拘丈夫婦人小兒木香一塊方圎一寸黄連半兩二味用水半升同煎乾去黄連薄切木香焙乾為末分作三服第一服橘皮湯下二服陳米飲下三服甘草湯下此乃李景純所傳有一婦人久痢將死夢中觀音授此方服之而愈也孫兆秘寳方香連丸方方見黄連下膓風下血木香黄連等分為末入肥猪大膓内兩頭紥定煑極爛去藥食膓或連藥搗為丸服劉松石保壽堂方小便渾濁如精狀木香沒藥當歸等分為末以刺棘心自然汁和丸梧子大每食前鹽湯下三十丸濟普方小兒隂腫小兒陽明經風熱濕氣相搏隂莖無故腫或痛縮宜寛此一經自愈廣木香枳殻麩炒二錢半炙甘草二錢水煎服曾氏小兒方小兒天行壯熱頭痛本香六分白檀香三分為末清水和服仍温水調塗𩕄頂上取瘥聖惠方天行發斑赤黒色青木香一兩水二升煑一升服外臺秘方一切癰疽瘡癤疳瘻惡瘡下疰臁瘡潰後外傷風寒惡汁臭敗不歛並主之木香黄連㯽榔等分為末油調頻塗之取效和劑局方惡蛇虺傷青木香不拘多少煎水服效不可述袖珍方腋臭隂濕凡腋下隂下濕臭或作瘡青木香以好醋浸夹於腋下隂下為末傅之外臺秘要牙齒疼痛青木香末入麝香少許揩牙鹽湯潄之聖濟錄甘松香宋開寳釋名苦彌哆音扯時珍曰産於川西松州其味甘故名金光明經謂之苦彌哆集解志曰廣志云甘松出姑臧涼州諸山細葉引蔓叢生可合諸香及裛衣頌曰今黔蜀州郡及遼州亦有之叢生山野葉細如茅草根極繁宻八月采之作湯浴令人身香根氣味甘温無毒好古曰平主治惡氣卒心腹痛滿下氣開寶黒皮䵟􅍍風疳齒䘌野鷄痔得白芷附子良藏器理元氣去氣鬱好古脚氣膝浮煎湯淋洗時珍發明時珍曰甘松芳香能開脾鬱少加入脾胃藥中甚醒脾氣杜寳拾遺錄云壽禪師妙醫術作五香飲更加别藥止渇兼補益最妙一沈香飲二丁香飲三檀香飲四澤蘭飲五甘松飲也附方新四勞瘵熏法甘松六兩𤣥參一斤為末每日焚之竒效方風疳蟲牙蝕肉至盡甘松膩粉各二錢半蘆薈半兩猪腎一對切炙為末夜潄口後貼之有涎吐出聖濟總錄腎虚齒痛甘松硫黄等分為末泡湯潄之神效經效濟世方面䵟風瘡香附子甘松各四兩黒牽牛半斤為末日用洗面婦人良方山柰綱目釋名山辣綱目三柰時珍曰山柰俗訛為三柰又訛為三賴皆土音也或云本名山辣南人舌音呼山為三呼辣如賴故致謬誤其說甚通集解時珍曰山柰生廣中人家栽之根葉皆如生薑作樟木香氣土人食其根如食薑切斷暴乾則皮赤黄色肉白色古之所謂㢘薑恐其類也段成式酉陽雜俎云柰祗出拂林國長三四尺根大如鴨卵葉似蒜中心抽條甚長莖端有花六出紅白色花心黄赤不結子其草冬生夏死取花壓油塗身去風氣按此說頗似山柰故附之根氣味辛温無毒主治暖中辟瘴癘惡氣治心腹冷氣痛寒濕霍亂風蟲牙痛入合諸香用時珍附方新六一切牙痛三柰子一錢麫包煨熟入麝香二字為末隨左右㗜一字入鼻内口含温水潄去神效名海上一字散普濟方風蟲牙痛仁存方用山柰為末鋪紙上捲作筒燒燈吹滅乗熱和藥吹入鼻内痛即止椒攝生方用肥皂一箇去穰入山柰甘松各三分花食鹽不拘多少填滿麫包煨紅取研日用擦牙潄去面上雀斑三柰子鷹糞蜜佗僧蓖麻子等分研勻以乳汁調之夜塗旦洗去醒頭去屑三柰甘松香零陵香一錢樟腦二分滑石半兩為末夜擦旦箆去小雲錄心腹冷痛三柰丁香當歸甘草等分為末醋糊丸梧子大每服三十丸酒下集簡方㢘薑拾遺釋名薑彚綱目蔟葰音族綏集解𢎞景曰杜若苗似㢘薑藏器曰㢘薑似薑生嶺南劍南人多食之時珍曰按異物志云生沙石中似薑大如甕氣猛近於臭南人以為葢其法陳皮以黒梅及鹽汁潰之乃成也又鄭樵云㢘薑似山薑而根大氣味辛熱無毒主治胃中冷吐水不下食藏器温中下氣消食益智時珍杜若本經上品校正併入圗經外類山薑釋名杜衡本經杜蓮别錄若芝别錄楚衡廣雅㺐子薑㺐音𤓰藥性論山薑别錄云一名白蓮一名白岑頌曰此草一名杜衡而草部中品自有杜衡條即爾雅所謂土鹵者也杜若即廣雅所謂楚衡者也其類自别古人多相雜引用故九歌云采芳洲兮杜若離騷云雜杜衡與芳芷王逸軰皆不分别但云香草故二名相混古方或用今人罕使故少有識者集解别錄曰杜若生武陵川澤及寃句二月八月采根曝乾𢎞景曰今處䖏有之葉似薑而有文理根似髙良薑而細味辛香又絶似旋葍根殆欲相亂葉小異爾楚辭云山中人兮芳杜若是矣恭曰今江湖多有之生隂地苗似㢘薑根似髙良薑全少辛味陶云似旋葍根者即真杜若也保昇曰苗似山薑花黄子赤大如棘子中似豆蔲今出嶺南硤州者甚好范子計然云杜衡杜若出南郡漢中大者大善頌曰衛州一種山薑莖葉如薑開紫花不結子八月采根入藥時珍曰杜若人無識者今楚地山中時有之山人亦呼為良薑根似薑味亦辛甄權註豆蔲所謂㺐子薑蘇頌圗經外類所謂山薑皆此物也或又以大者為髙良薑細者為杜若唐時峽州貢之修治斆曰凡使勿用鴨喋草根真相似只是味效不同凡采得根以刀刮去黄赤皮細剉用三重絹袋隂乾臨使以蜜浸一夜漉出用根氣味辛微温無毒之才曰得辛夷細辛良惡柴胡前胡蘇頌曰山薑辛平有小毒主治胸脇下逆氣温中風入腦戸頭腫痛涕淚久服益精明目輕身令人不忘本經治眩倒目昏昏止痛除口臭氣别錄山薑去皮間風熱可作煠湯又主暴冷及胃中逆冷霍亂腹痛蘇頌發明時珍曰杜若乃神農上品治足少隂太陽諸證要藥而世不知用惜哉山薑藥性釋名美草𢎞景曰東人呼為山薑南人呼為美草時珍曰與杜若之山薑名同物異也集解權曰山薑根及苗並如薑而大作樟木臭南人食之又有㺐子薑黄色而𦂳辛辣破血氣殊强於此薑頌曰山薑出九真交趾今閩廣皆有之劉恂嶺表錄異云莖葉皆薑也但根不堪食亦與豆䓻花相似而微小爾花生葉間作穗如麥粒嫩紅色南人取其末大開者謂之含胎花以鹽水淹藏入甜糟中經冬如琥珀色辛香可愛用為膾無以加矣又以鹽殺治暴乾者煎湯服之極除冷氣甚佳時珍曰山薑生南方葉似薑花赤色甚辛子似草豆蔲根如杜若及髙良薑今人以其子偽充草豆蔲然其氣甚猛烈根氣味辛熱無毒主治腹中冷痛煑服甚效作丸散服辟穀止饑𢎞景去惡氣温中中惡霍亂心腹冷痛功用如薑甄權花及子氣味辛温無毒主治調中下氣破冷氣作痛止霍亂消食殺酒毒大明髙良薑别錄中品校正併入開寳本草紅豆䓻釋名蠻薑綱目子名紅豆䓻時珍曰陶隱居言此薑始出髙良郡故得此名按髙良即今髙州也漢為髙凉縣吳改為郡其山髙而稍凉因以為名則髙良當作髙凉也集解時珍曰出髙良郡二月三月采根形氣與杜若相似而葉如山薑恭曰出嶺南者形大虚軟生江左者細𦂳亦不甚辛其實一也今人呼細者為杜若大者為髙良薑亦非也頌曰今嶺南諸州及黔蜀皆有之内郡雖有而不堪入藥春生莖葉如薑苗而大髙一二尺許花紅紫色如山薑花珣曰紅豆䓻生南海諸谷髙良薑子也其苗如蘆其葉如薑花作穗嫩葉卷之而生微帶紅色嫩者入鹽纍纍作朶不散落須以朱槿花染令色深善醒醉解酒毒無他要使也時珍曰按范成大桂海志云紅豆䓻花叢生葉瘦如碧蘆春末始發初開花抽一榦有大籜包之籜拆花見一穗數十蕋淡紅鮮妍如桃杏花色蘂重則下垂如葡萄又如火劑瓔珞及剪彩鸞枝之狀每蘂有心兩瓣人比之連理也其子亦似草豆蔲修治時珍曰髙良薑紅豆蔲並宜炒過入藥亦有以薑同吳茱茰東壁土炒過入藥用者根氣味辛大温無毒志曰辛苦大熱無毒張元素曰辛熱純陽浮也入足太隂陽明經主治暴冷胃中冷逆霍亂腹痛别錄下氣益聲好顔色煑飲服之止痢藏器治風破氣腹内久冷氣痛去風冷痺弱甄權轉筋瀉痢反胃解酒毒消宿食大明含塊嚥津治忽然惡心嘔清水逡廵即瘥若口臭者同草豆蔲為末煎飲蘇頌健脾胃寛噎膈破冷癖除瘴瘧時珍發明楊士瀛曰噫逆胃寒者髙良薑為要藥人參茯苓佐之為其温胃解散胃中風邪也時珍曰孫思邈千金方言心脾冷痛用髙良薑細剉微炒為漠米飲服一錢立止太祖髙皇帝御製周顛仙碑文亦載其有驗云又穢跡佛有治心口痛方云凡男女心口一㸃痛者乃胃脘有滯或有蟲也多因怒及受寒而起遂致終身俗言心氣痛者非也用髙良薑以酒洗七次焙研香附子以醋洗七次焙研各記收之病因寒得用薑末二錢附末一錢因怒得用附末二錢薑末一錢寒怒兼有各一錢半以米飲加入生薑汁一匙鹽一捻服之立止韓飛霞醫通書亦稱其功云附方舊三新八霍亂吐利火炙髙良薑令焦香每用五兩以酒一升煑三四沸頓服亦治腹痛中惡外臺霍亂腹痛髙良薑一兩剉以水三大盞煎二盞半去滓入粳米一合煑粥食之便止方聖惠霍亂嘔甚不止用髙良薑生剉二錢大棗一枚水煎冷服立定名氷壺湯普濟方脚氣欲吐蘇恭曰凡患脚氣人每旦飽食午後少食日晚不食若饑可食豉粥若覺不消欲致霍亂者即以髙良薑一兩水三升煑一升頓服盡即消若卒無者以母薑一兩代之清酒煎服雖不及髙良薑亦甚效也心脾冷痛髙良薑丸用髙良薑四兩切片分作四分一兩用陳廩米半合炒黄去米一兩用陳壁土半兩炒黄去土一兩用巴豆三十四箇炒黄去豆一兩用斑蝥三十四箇炒黄去蝥吳茱茰一兩酒浸一夜同薑再炒為末以浸茱酒打糊丸梧子大毎空心薑湯下五十丸永類鈐方用髙良薑三錢五靈脂六錢為末每服三錢醋湯調下養脾温胃去冷消痰寛胸下氣大治心脾疼及一切物傷用髙良薑乾薑等分炮研漠麫糊丸梧子大毎食後橘皮湯下十五丸妊婦勿服和劑局方脾虚寒瘧寒多熱少飲食不思用髙良薑麻油炒乾薑炮各一兩為漠每服五錢用猪膽汁調成膏子臨發時熱酒調服以膽汁和丸每服四十丸酒下亦佳吳开内翰致和丁酉居全椒縣歲瘧大作用此救人以百計張大亨病此甚欲致仕亦服之愈大抵寒發於膽用猪膽引二薑入膽去寒而燥脾胃一寒一熱隂陽相制所以作效也一方只用二薑半生半炮各半兩穿山甲炮三錢為漠每服二錢猪腎煑酒下朱氏集驗方妊婦瘧疾先因傷寒變成者用髙良薑三錢剉以豶豬膽汁浸一夜東壁土炒黑去土以肥棗肉十五枚同焙為漠每用三錢水一盞煎熱將發時服神效永類鈐方暴赤眼痛以管吹良薑末入鼻取嚏或彈出鼻血即散談㘳翁試驗方風牙痛腫髙良薑二寸全蠍焙一枚為末摻之吐涎以鹽湯𠻳口此乃樂清丐者所傳鮑季明病此用之果效王璆百一選方頭痛㗜鼻髙良薑生研頻㗜普濟方紅豆蔲開寳氣味辛温無毒權曰苦辛多食令人舌粗不思飲食時珍曰辛熱陽也浮也入手足太隂經生生編云最能動火傷目致衂食料不宜用之主治膓虚水瀉心腹絞痛霍亂嘔吐酸水解酒毒藏器冷氣腹痛消瘴霧毒氣去宿食温腹膓吐瀉痢疾甄權治噎膈反胃虚瘧寒脹燥濕散寒時珍發明時珍曰紅豆蔲李東垣脾胃藥中常用之亦取其辛熱芳香能醒脾温肺散寒燥濕消食之功爾若脾肺素有伏火者切不宜用附方新一風寒牙痛紅豆蔲為末隨左右以少許㗜鼻中并摻牙取涎或加麝香衛生家寳方豆蔲别錄上品校正自果部移入此釋名草豆蔲開寳漏蔲草物志草果鄭樵通志宗奭曰豆蔲草豆蔲也此是對肉豆蔲而名若作果則味不和前人編入果部不知有何義意花性熱淹至京師味微苦不甚美乾則色淡紫為能消酒毒故為果爾時珍曰按揚雄方言云凡物盛多白蔲豆蔲之名或取此義豆象形也南方異物志作漏蔲盖南人字無正音也今雖不專為果猶入茶食料用尚有草果之稱焉金光明經三十二品香藥謂之蘇乞迷羅細集解别錄曰豆蔲生南海恭曰苗似山薑花黄白色苗根及子亦似杜若頌曰草豆蔲今嶺南皆有之苗似蘆其葉似山薑杜若軰根似髙良薑二月開花作穗房生於莖下嫩葉卷之而生初如芙蓉花微紅穗頭深色其葉漸廣花漸出而色漸淡亦有黄白色者南人多采花以當果尤貴其嫩者并穗入鹽同淹治疊疊作朶不散又以木槿花同浸欲其色紅爾其結實若龍眼子而銳皮無鱗甲皮中子如石榴瓣夏月熟時采之暴乾根苗微作樟木香根莖子並辛香珣曰豆蔲生交趾其根似益智皮殻小厚核如石榴而辛香葉如芄蘭而小三月采其葉細破隂乾用味近苦而有甘時珍曰草豆蔲草果雖是一物然微有不同今建寧所産豆蔲大如龍眼而形微長其皮黄白薄而稜峭其仁大如縮砂仁而辛香氣和滇廣所産草果長大如訶子其皮黒厚而稜宻其子粗而辛臭正如斑蝥之氣彼人皆用芼茶及作食料恒用之物廣人取生草蔲入梅汁鹽漬令紅暴乾薦酒名紅鹽草果其初結小者名鸚哥舌元朝飲膳皆以草果為上供南人復用一種火楊梅偽充草豆蔲其形园而粗氣味辛猛而不和人亦多用之或云即山薑實也不可不辨修治斆曰凡使須用蔕取向裏子及皮用茱茰同於𨫼上緩炒待茱茰微黄黒即去茱茰取草豆蔲皮及子杵用之時珍曰今人惟以麫裹煻火煨熟去皮用之仁氣味辛温濇無毒好古曰大辛熱陽也浮也入足太隂陽明經主治温中心腹痛嘔吐去口臭氣别錄下氣止霍亂一切冷氣消酒毒開寳調中補胃健脾消食去客寒心與胃痛李杲治瘴癘寒瘧傷暑吐下洩痢噎膈反胃痞滿吐酸痰飲積聚婦人惡阻帶下除寒燥濕開鬱破氣殺魚肉毒制丹砂時珍發明𢎞景曰豆蔲辛烈甚香可常食之其五和糝中物皆宜入豆蔲㢘薑枸櫞甘焦麂目是也宗奭曰草豆蔲氣味極辛微香性温而調散冷氣甚速虚弱不能飲食者宜此與木瓜烏梅縮砂益智麴蘗甘草生薑同用也杲曰風寒客邪在胃口之上當心作疼者宜煨熟用之震亨曰草豆蔲性温能散滯氣消膈上痰若明知身受寒邪口食寒物胃腕作疼方可温散用之如鼓應桴或濕痰鬱結成病者亦效若熱鬱者不可用恐積温成熱也必用巵子之劑時珍曰豆蔲治病取其辛熱浮散能入太隂陽明除寒燥濕開鬱化食之力而已南地卑下山嵐烟瘴飲啖酸鹹脾胃常多寒濕鬱滯之病故食料必用與之相宜然過多亦能助脾熱傷肺損目或云與知母同用治瘴瘧寒熱取其一隂一陽無偏勝之害盖草果治太隂獨勝之寒知母治陽明獨勝之火也附方舊一新九心腹脹滿短氣用草豆蔲一兩去皮為末以木𤓰生薑湯調服半錢千金方胃弱嘔逆不食用草豆蔲仁二枚髙良薑半兩水一盞煑取汁入生薑汁半合和白麫作撥刀以羊肉臛汁煑熟空心食之普濟霍亂煩渇草豆蔲黄連各一錢半烏豆五十粒生薑三片水煎服之聖濟総錄虚瘧自汗不止用草果一枚麫褁煨熟連麫研入平胃散二錢水煎服世經效濟方氣虚瘴瘧熱少寒多或單寒不熱或虚熱不寒用草果仁熟附子等分水一盞薑七片棗一枚煎半盞服名果附湯濟生方脾寒瘧疾寒多熱少或單寒不熱或大便洩而小便多不能食用草果仁熟附子各二錢半生薑七片棗肉二枚水三盞煎一盞温服醫方大成脾腎不足草果仁一兩以舶茴香一兩炒香去􅚬不用吳茱茰湯泡七次以破故紙一兩炒香去故紙不用胡盧巴一兩以山茱茰一兩炒香去茱茰不用右三味為糝酒糊丸梧子大毎服六十丸鹽湯下方百一選赤白帶下連皮草果一枚乳香一小塊麫褁煨焦黄同麫研細每米飲服二錢日二服衛生易簡方香口辟臭豆蔲細辛為末含之肘後方脾痛脹滿草果仁二箇酒煎服之直指方花氣味辛熱無毒主治下氣止嘔逆除霍亂調中補胃氣消酒毒大明白豆蔲宋開寳釋名多骨集解藏器曰白豆蔲出伽古羅國呼為多骨其草形如芭焦葉似杜若長八九尺而光滑冬夏不凋花淺黄色子作朶如葡萄初出微青熟則變白七月采之頌曰今廣州宜州亦有之不及畨舶来者佳時珍曰白豆蔲子圎大如白牽牛子其殻白厚其仁如縮砂仁入藥去皮炒用仁氣味辛大温無毒好古大辛熱味薄氣厚輕清而升陽也浮也入手太隂經主治積冷氣止吐逆反胃消穀下氣開寳散肺中滯氣寛膈進食去白睛翳膜李杲補肺氣益脾胃理元氣收脫氣好古治噎膈除瘧疾寒熱解酒毒時珍發明頌曰古方治胃冷喫食即欲吐及嘔吐六物湯皆用白豆蔲大抵胃主冷即相宜也恭曰白豆蔲氣味俱薄其用有五專入肺經本藥一也散胸中滯氣二也去感寒腹痛三也温暖脾胃四也治赤眼暴發去太陽經目内大眥紅筋用少許五也時珍曰按楊士瀛云白豆蔲治脾虚瘧疾嘔吐寒熱能消能磨流行三焦營衛一轉諸證自平附方舊一新四胃冷惡心凡食即欲吐用白豆蔲子三枚擣細好酒一盞温服併飲數服佳備張文仲急方人忽惡心多嚼白豆蔲子最佳肘後方小兒吐乳胃寒者白豆蔲仁十四箇縮砂仁十四箇生甘草二錢炙甘草二錢為末常摻入兒口中危氏得效方脾虚反胃白豆蔲縮砂仁各二兩丁香一兩陳廩米一升黄土炒焦去土研細薑汁和丸梧子大每服百丸薑湯下名太倉丸濟生方産後呃逆白豆蔲丁香各半兩研細桃仁湯服一錢少頃再服乾坤生意縮砂蔤宋開寳釋名時珍曰名義未詳藕下白篛多蔤取其宻藏之意此物實在根下仁藏殻内亦或此意與集解珣曰縮砂蔤生西海及西戎波斯諸國多從安東道来志曰生南地苗似㢘薑子形如白豆蔲其皮𦂳厚而皺黄赤色八月采之頌曰今惟嶺南山澤間有之苗莖似髙良薑髙三四尺葉長八九寸濶半寸已来三月四月開花在根下五六月成實五七十枚作一穗狀似益智而圎皮𦂳厚而皺有粟紋外有細刺黄赤色皮間細子一團八隔可四十餘粒如大黍米外微黒色内白而香似白豆蔲仁七月八月采之辛香可調食味及蜜煎糖纒用仁氣味辛温濇無毒權曰辛苦藏器曰酸珣曰辛鹹平得訶子豆蔲白蕪夷鼈甲良好古曰辛温陽也浮也入手足太隂陽明太陽足少隂七經得白檀香豆蔲為使入肺得人參益智為使入脾得黄蘗茯苓為使入腎得赤白石脂為使入大小膓也主治虚勞冷瀉宿食不消赤白洩痢腹中虚痛下氣開寳主冷氣痛止休息氣痢勞損消化水穀温暖肝腎甄權上氣欬𠻳奔豚鬼疰驚癎邪氣藏器一切氣霍亂轉筋能起酒香味大明和中行氣止痛安胎楊士瀛治脾胃氣結滯不散元素補肺醒脾養胃益腎理元氣通滯氣散寒飲脹痞噎膈嘔吐止女子崩中除咽喉口齒浮熱化銅鐵骨哽時珍發明時珍曰按韓􅐂醫通云腎惡燥以辛潤之縮砂仁之辛以潤腎燥又云縮砂屬土主醒脾調胃引諸藥歸宿丹田香而能竄和合五臟冲和之氣如天地以土為冲和之氣故補腎藥用同地黄丸蒸取其達下之㫖也又化骨食草木藥及方士錬三黄皆用之不知其性何以能制此物也附方舊二新一十四冷滑下痢不禁虛羸用縮砂仁熬為末以羊子肝薄切摻之瓦上焙乾為末入乾薑末等分飯丸梧子大每服四十丸白湯下日二服又方縮砂仁炮附子乾薑厚朴陳橘皮等分為末飯丸梧子大每服四十丸米飲下日二服並藥性論大便瀉血三代相𫝊者縮砂仁為末米飲熱服二錢以愈為度十便良方小兒脫肛縮砂去皮為末以猪腰子一片批開擦末在内縛定煑熟與兒食次服白礬丸如氣逆腫喘者不冶保幼大全遍身腫滿隂亦腫者用縮砂仁土狗一箇等分研和老酒服之直指方痰氣膈脹砂仁擣碎以蘿蔔汁浸透焙乾為末每服一二錢食逺沸湯服簡便方上氣欬逆砂仁洗淨炒研生薑連皮等分擣爛熱酒食逺泡服簡便方子癎昬冐縮砂和皮炒黑熱酒調下二錢不飲者米飲下此方安胎止痛皆效不可盡述温隱居方妊娠胎動偶因所觸或跌墜傷損致胎不安痛不可忍者縮砂熨斗内炒熟去皮用仁擣碎每服二錢熱酒調下須㬰覺腹中胎動極熱即胎已安矣神效孫尚藥方婦人血崩新縮砂仁新瓦焙研末米飲服三錢婦人良方熱擁咽痛縮砂殻為末水服一錢戴原禮方牙齒疼痛縮砂常嚼之良直指方口吻生瘡縮砂殻煆研擦之即愈此蔡醫愽袐方也黎居士簡易方魚骨入咽縮砂甘草等分為末綿褁含之嚥汁當随痰出矣王璆百一選方誤吞諸物金銀銅錢等物不化者濃煎縮砂湯飲之即下方危氏得效一切食毒縮砂仁末水服一二錢事林廣記益智子宋開寳釋名時珍曰脾主智此物能益脾胃故也與龍眼名益智義同按蘇軾記云海南産益智花實皆長穗而分為三節觀其上中下節以候早中晚禾之豐凶大豐則皆實大凶皆不實罕有三節並熟者其為藥只治水而無益於智其得此名豈以其知嵗耶此亦一說也終近穿鑿集解藏器曰益智出崑崙國及交趾今嶺南州郡往往有之顧微廣州記云其葉似蘘荷長丈餘其根上有小枝髙八九寸無華萼莖如竹箭子從心出一枝有十子叢生大如小棗其中核黒而皮白核小者佳含之攝涎穢或四破去核取外皮蜜煑為粽食味辛晉盧循遺劉裕益智粽是此也恭曰益智子似連翹子頭未開者苗葉花根與豆無别惟子小爾時珍曰按嵇含南方草木狀云益智二月花連着實五六月熟其子如筆頭而兩頭尖長七八分雜五味中飲酒芬芳亦可鹽曝及作粽食觀此則顧微言其無華者誤矣今之益智子形如棗核而皮及仁皆似草豆蔲云仁氣味辛温無毒主治遺精虚漏小便餘瀝益氣安神補不足利三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有竒驗藏器治客寒犯胃和中益氣及人多唾李杲益脾胃理元氣補腎虚滑瀝好古冷氣腹痛及心氣不足夢洩赤濁熱傷心系吐血血崩諸證時珍發明劉元素曰益智辛熱能開發鬱結使氣宣通王好古曰益智本脾藥主君相二火在集香丸則入肺在四君子湯則入脾在大鳯髓丹則入腎三藏互有子母相關之義當于補藥中兼用之勿多服時珍曰益智大辛行陽退隂之藥也三焦命門氣弱者宜之按楊士瀛直指方云心者脾之毋進食不止於和脾火能生土當使心藥入脾胃藥中庶幾相得故古人進食藥中多用益智土中益火也又按洪邁夷堅志云秀川進士陸迎忽得吐血不止氣蹷驚顫狂躁直視至深夜欲投戸而出如是兩夕徧用方藥弗瘳夜夢觀音授一方命但服一料永除病根夢覺記之如方治藥其病果愈其方用益智子仁一兩生硃砂二錢青橘皮五錢麝香一錢碾為細末每服一錢空心燈心湯下附方新八小便頻數脬氣不足也雷州益智子鹽炒去鹽天台烏藥等分為漠酒煑山藥粉為糊丸如梧子大每服七十丸空心鹽湯下名縮泉丸朱氏集驗方心虚尿滑及赤白二濁益智子仁白茯苓白术等分為漠每服三錢白湯調下白濁腹滿不拘男婦用益智仁鹽水浸炒厚朴薑汁炒等分薑三片棗一枚水煎服永類鈴方小便赤濁益智子仁㐲神各二兩逺志甘草水煑各半斤為漠酒糊丸梧子大空心薑湯下五十丸腹脹忽瀉日夜不止諸藥不效此氣脫也用益智子仁二兩濃煎飲之立愈危氏得效方婦人崩中益智子炒碾細米飲入鹽服一錢産寳香口辟臭益智子仁一兩甘草二錢碾粉䑛之經驗良方漏胎下血益智仁半兩縮砂仁一兩為末每服三錢空心白湯下日二服胡氏濟隂方蓽茇宋開寳釋名蓽撥時珍曰蓽撥當作蓽茇出南方草木狀畨語也陳藏器本草作畢勃扶南傳作逼撥大明㑹典作畢蕟又段成式酉陽雜爼云摩伽陀國呼為蓽撥梨拂菻國呼為阿梨訶陀集解恭曰蓽撥生波斯國叢生莖葉似蒟醬其子𦂳細味辛烈於蒟醬胡人將来入食味用也藏器曰其根名畢勃莈似柴胡而黒硬頌曰今嶺南特有之多生竹林内正月發苗作叢髙三四尺其莖如筯葉青圎如蕺菜濶二三寸如桑面光而厚三月開花白色在表七月結子如小指大長二寸已来青黒色類椹子而長九月收采晒曝乾南人愛其辛香或取葉生茹之復有舶上来者更辛香時珍曰段成式言青州防風子可亂蓽茇盖亦不然蓽茇氣味正如胡椒其形長一二寸防風子圎如胡荽子大不相侔也修治斆曰凡使去挺用頭以醋浸一宿焙乾以刀刮去皮粟子令淨乃用免傷人肺令人上氣氣味辛大温無毒時珍曰氣熱味辛陽也浮也入手足陽明經然辛熱耗散能動脾肺之火多用令人目昬食料尤不宜之主治温中下氣補腰脚殺腥氣消食除胃冷隂疝癖藏器霍亂冷氣心痛血氣大明水瀉虚痢嘔逆醋心産後洩痢與阿魏和合良得訶子人參桂心乾薑治臟腑虚冷膓鳴神效李珣治頭痛鼻淵牙痛時珍發明宗奭曰蓽茇走膓胃冷氣嘔吐心腹滿痛者宜之多服走泄真氣令人膓虚下重頌曰按唐太宗實錄云貞觀中上以氣痢久未痊服名醫藥不應因詔訪求其方有術士進黄牛乳煎蓽茇方御用有效劉禹錫亦記其事云後累試於虚冷者必效時珍曰牛乳煎詳見獸部牛乳下蓽茇為頭痛鼻淵牙痛要藥取其辛熱能入陽明經散浮熱也附方舊二新八冷痰惡心蓽茇一兩為末食前用米湯服半錢聖惠方暴泄身冷自汗甚則欲嘔小便清脈微弱宜已寒九治之蓽茇肉桂各二錢半髙良薑乾薑各三錢半為末糊丸梧子大每服三十丸薑湯下和濟方胃冷口酸流清水心下連臍痛用蓽茇半兩厚朴薑汁浸炙一兩為末入熱鯽魚肉研和丸綠豆大每米飲下二十丸立效余居士選竒方瘴氣成塊在腹不散用蓽茇一兩大黄一兩並生為末入麝香少許煉蜜丸梧子大每冷酒服三十丸永類鈐方婦人血氣作痛及下血無時月水不調用蓽茇鹽炒蒲黄炒等分為末煉蜜丸梧子大每空心温酒服三十丸兩服即止名二神丸陳氏方偏頭風痛蓽茇為末令患者口含温水隨左右痛以左右鼻吸一字有效經驗良方鼻流清涕蓽茇末吹之有效衛生易簡方風蟲牙痛蓽茇末揩之煎蒼耳湯潄去涎開本草權度用蓽茇末木鼈子肉研膏化㗜鼻聖濟総錄用蓽茇胡椒等分為末化蠟丸麻子大每以一丸塞孔中蓽勃沒氣味辛温無毒主治五勞七傷冷氣嘔逆心腹脹滿食不消化隂汗寒疝核腫婦人内冷無子治腰腎冷除血氣藏器蒟醬蒟音矩唐本草釋名蒟子廣志土蓽茇食療苗名扶惡士蔞藤時珍曰按稽含云蒟子可以調食故謂之醬乃蓽茇之類也故孟詵食療謂之土蓽茇其蔓葉名扶留藤一作扶􅀈一作浮留莫解其義蔞則留字之訛也集解恭曰蒟醬生巴蜀中蜀都賦所謂流味於番禺者蔓生葉似王𤓰而厚大光澤味辛香實似桑椹而皮黒肉白西戎亦時將来細而辛烈交州愛州人家多種之蔓生其子長大苖名浮留藤取葉合㯽榔食之辛而香也頌曰今䕫州嶺南皆有之昔漢武帝使唐䝉曉諭南越越王食蒙以蒟醬曰此出番禺城下武帝感之遂開牂牁越雋也劉淵林注蜀都賦云蒟醬縁木而生其子如桑椹熟時正青長二三寸以蜜及鹽藏而食之辛香與蘇恭所說大同小異盖淵林所云乃蜀産蘇恭所云乃海南者爾今惟貴蓽茇而不尚蒟醬故鮮有用者季珣曰廣州記云出波斯國實狀若桑根紫褐色者為尚黒者是老根不堪然近多黑色少見褐者黔中亦有形狀滋味一般時珍曰蒟醬今兩廣滇南及川南渝瀘威茂施諸州皆有之其苗謂之蔞葉蔓生依樹根大如筯彼人食㯽榔者以此葉及蚌灰少許同嚼食之云辟瘴癘去胸中惡氣故諺曰㯽榔浮留可以忘憂其花實即蒟子也按稽含草木狀云蒟醬即蓽茇也生於蕃國者大而紫謂之蓽茇生於番禺者小而青謂之蒟子本草以蒟易蔞子非矣蔞子一名扶留其草形全不相同時珍竊謂蒟子蔓生蓽茇草生雖同類而非一物然其花實氣味功用則一也稽氏以二物為一物謂蒟子非扶留盖不知扶留非一種也劉歆期交州記云扶留有三種一名穫留其根香美一名扶留其藤味亦辛一名南扶留其葉青味辛是矣今蜀人惟取蔞葉作酒麴云香美修治斆曰凡采得後以刀刮去粗皮擣細每五錢用生薑自然汁五兩拌之蒸一日曝乾用根葉子氣味辛温無毒時珍曰氣熱味辛陽也浮也主治下氣温中破痰唐本欬逆上氣心腹蟲痛胃弱虚瀉霍亂吐逆解酒食味李珣散結氣心腹冷痛消穀孟詵解瘴癘去胸中惡邪氣温脾燥熱時珍附方新一牙疼蒟醬細辛各半兩大皂莢五鋌去子毎孔入青鹽燒存性同研末頻摻吐涎御藥院方肉豆蔲宋開寳釋名肉果綱目迦拘勒宗奭曰肉豆蔲對草豆蔲為名去殻只用肉肉油色者佳枯白瘦虚者劣時珍曰花實皆似豆蔲而無核故名集解藏器曰肉豆蔲生胡國胡名迦拘勒大舶来即有中國無之其形圎小皮紫𦂳薄中肉辛辣珣曰生崑崙及大秦國頌曰今嶺南人家亦種之春生苗夏抽莖開花結實似豆蔲六月七月采時珍曰肉豆蔲花及實狀雖似草豆蔲而皮肉之顆則不同類外有皺紋而内有斑纈紋如㯽榔紋最易生蛀惟烘乾宻封則稍可留實修治斆曰凡使須以糯米粉熟湯㮴褁豆蔲於煻灰火中煨熟去粉用勿令犯鐵氣味辛温無毒權曰苦辛好古曰入手足陽明經主治温中消食止洩治積冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫冷氣小兒乳霍開寳調中下氣開胃解酒毒消皮外絡下氣大明治宿食痰飲止小兒吐逆不下乳腹痛甄權主心腹蟲痛脾胃虚冷氣併冷熱虚洩赤白痢研末粥飲服之李珣暖脾胃固大膓時珍發明大明曰肉豆蔲調中下氣消皮外絡下氣味珍力更殊宗奭曰亦善下氣多服則泄氣得中則和平其氣震亨曰屬金與土為丸温中補脾日華子稱其下氣以脾得補而善運化氣自下也非若陳皮香附之駛泄冦氏不詳其實遂以為不可服也機曰痢痰用此濇膓為傷乳泄瀉之要藥時珍曰土愛煖而喜芳香故肉豆蔲之辛温理脾胃而治吐利附方舊一新六暖胃除痰進食消食肉豆蔲二箇半夏薑汁炒五錢木香二錢半為末蒸餅丸芥子大每食後津液下五丸十丸普濟霍亂吐利肉豆蔲為末薑湯服一錢普濟方久瀉不止肉豆蔲煨一兩木香二錢半為末棗肉和丸米飲服四五十丸又方肉豆蔲煨一兩熟附子七錢為末糊丸米飲服四五十丸四又方肉豆蔲煨粟殻炙等分為末醋糊丸米飲服五十丸選並百一方老人虚瀉肉豆蔲三錢麫褁煨熟去麫研乳香一兩為末陳米粉糊丸梧子大每服五七十丸米飲下此乃常州侯教授所傳方瑞竹堂方小兒泄瀉肉豆蔲五錢乳香二錢半生薑五片同炒黒色去薑研為膏收旋丸綠豆大每量大小米飲下全幼心鑑脾泄氣痢豆蔲一顆米醋調麫褁煨令焦黄和麫研末更以攩子炒研末一兩相和又以陳廩米炒焦為末和勻每以二錢煎作飲調前二味三錢旦暮各一服便瘥續傳信方冷痢腹痛不能食者肉豆蔲一兩去皮醋和麫褁煨擣末每服一錢粥飲調下聖惠方補骨脂宋開寳釋名破故紙開實婆固脂藥性論胡韭子日華時珍曰補骨脂言其功也胡人呼為婆固脂而俗訛為破故紙也胡韭子因其子之狀相似非胡地之韭子也集解志曰補骨脂生嶺南諸州及波斯國頌曰今嶺外山坂間多有之四川合州亦有皆不及畨舶者佳莖髙三四尺葉小似薄荷花微紫色實如麻子圎扁而黒九月采大明曰徐表南州記云是胡韭子也南畨者色赤廣南者色綠入藥微炒用子修治斆曰此性燥毒須用酒浸一宿漉出以東流水浸三日夜蒸之從已至申日乾用一法以鹽同炒過曝乾用氣味辛大温無毒權曰苦辛珣曰惡甘草時珍曰忌芸薹及諸血得胡桃胡麻良主治五勞七傷風虚冷骨髓傷敗腎冷精流及婦人血氣墮胎開寳男子腰疼膝冷囊濕逐諸冷痺頑止小便腹中冷甄權興陽事明耳目大明治腎泄通命門煖丹田歛精神時珍發明頌曰破故紙今人多以胡桃合服此法出於唐鄭相國自叙云予為南海節度年七十有五越地卑濕傷於内外衆疾俱作陽氣衰絶服乳石補藥百端不應元和七年有訶陵國舶主李摩訶知予病狀遂傳此方并藥予初疑而未服摩訶稽首固請遂服之經七八日而覺應驗自爾常服其功神效十年二月罷郡歸京錄方傳之用破故紙十兩淨擇去皮洗過曝擣篩令細胡桃瓤二十兩湯浸去皮細研如泥更以好蜜和令如飴餹瓷器盛之旦日以煖酒二合調藥一匙服之便以飯壓如不飲酒人以暖熱水調之彌久則延年益氣恱心明目補添筋骨但禁芸薹羊血餘無所忌此物本自外畨隨海舶而来非中華所有畨人呼為補骨脂語訛為破故紙也王紹顔續傳信方載其事頗詳故錄之時珍曰此方亦可作丸温酒服之按白飛霞方外竒方云破故紙屬火收歛神明能使心包之火與命門之火相通故元陽堅固骨髓充實濇以治脫也胡桃屬木潤燥養血血屬隂惡燥故油以潤之佐破故紙有木火相生之妙故語云破故紙無胡桃猶水母之無鰕也又破故紙惡甘草而瑞竹堂方青娥丸内加之何也豈甘草能調和百藥惡而不惡耶又許叔微學士本事方云孫真人言補腎不若補脾予曰補脾不若補腎腎氣虚弱則陽氣衰劣不能熏蒸脾胃脾胃氣寒令人胸膈痞塞不進飲食遲於運化或腹脇虚脹或嘔吐痰涎或膓鳴泄瀉譬如鼎釡中之物無火力雖終日不熟何能消化濟生二神丸治脾胃虚寒泄瀉用破故紙補腎肉豆蔲補脾二藥雖兼補但無斡旋往往常加木香以順其氣使之斡旋空虚倉廩倉廩空虚則受物矣屢用見效不可不知附方舊二新一十三補骨脂丸治下元虚敗脚手沈重夜多盜汗縱慾所致此藥壯筋骨益元氣補骨脂四兩炒香兎絲子四兩酒蒸胡桃肉一兩去皮乳香沒藥沈香各研二錢半煉蜜丸如梧子大每服二三十丸空心鹽湯温酒任下自夏至起冬至止日一服此乃唐宣宗時張壽太尉知廣州得方於南畨人有詩云三年時節向邊隅人信方知藥力殊奪得春光来在手青娥休笑白髭鬚和劑方男女虚勞男子女人五勞七傷下元久冷一切風病四肢疼痛駐顔壯氣烏髭鬚補骨脂一斤酒浸一宿晒乾却用烏油麻一升和炒令麻子聲絶簸去只取補骨脂為末醋煑麫糊丸如梧子大每服二三十丸空心温酒鹽湯任下經驗方腎虚腰痛經驗方用破故紙一兩炒為末温酒服三錢神妙或加木香一錢相和劑局方青娥丸治腎氣虚弱風冷乘之或血氣搏腰痛如折俛仰不利或因勞役傷腎或痺濕傷腰或損墜墮傷或風寒客搏或氣滯不散皆令腰痛或腰間如物重墜用破故紙酒浸炒一斤杜仲去皮薑汁浸炒一斤胡桃肉去皮二十箇為末以蒜擣膏一兩和丸梧子大每空心温酒服二十丸婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顔色妊娠腰痛通氣散用破故紙二兩炒香為末先嚼胡桃肉半箇空心温酒調下二錢此藥神妙婦人良方定心補腎養血返精丸破故紙炒二兩白茯苓一兩為末沒藥五錢以無灰酒浸髙一指煑化和末丸梧子大每服三十丸白湯下昔有人服此至老不衰盖故紙補腎茯苓補心沒藥養血三者既壯自然身安朱氏集驗方精氣不固破故紙青鹽等分同炒為末每服二錢米飲下三因方小便無度腎氣虚寒破故紙十兩酒蒸茴香十兩鹽炒為末酒糊丸梧子大毎服百丸鹽酒下或以米糝猪腎煨食之方普濟小兒遺尿膀胱冷也夜屬隂故小便不禁破故紙炒為末每夜熱湯服五分嬰童百問玉莖不痿精滑無歇時時如鍼刺揑之則脆此名腎漏用破故紙韭子各一兩為末每用三錢水二盞煎六分服日三次愈則止夏子益竒方脾腎虚瀉二神丸用破故紙炒半斤肉豆蔲生用四兩為末肥棗丸研膏和丸梧子大每空心米飲服五七十丸本事方加木香二兩名三神丸水瀉久痢破故紙炒一兩粟殻炙四兩為末煉蜜丸彈子大每服一丸薑棗同水煎服選百一方牙痛日久腎虚也補骨脂二兩青鹽半兩炒研擦之御藥院方風蟲牙痛上連頭腦補骨脂炒半兩乳香二錢半為末擦之或為丸塞孔内日用有效傳信適用方打墜腰痛瘀血凝滯破故紙炒茴香炒辣桂等分為末每熱酒服二錢故紙主腰痛行血直指方薑黄唐本草釋名蒁音述寳鼎香綱目集解恭曰薑黄根葉都似鬱金其花春生於根與苗並出入夏花爛無子根有黄青白三色其作之方法與鬱金同西戎人謂之蒁其味辛少苦多亦與鬱金同惟花生異耳藏器曰薑黄真者是經種三年以上老薑能生花花在根際一如蘘荷根節堅硬氣味辛辣種薑處有之終是難得西畨亦有来者與鬱金蒁藥相似如蘇恭所說即是蒁藥而非薑黄又言薑黄是蒁鬱金是胡蒁如此則三物無别遞相連名総稱為蒁則功狀當不殊而今鬱金味苦寒色赤主馬熱病薑黄味辛温色黄蒁味苦色青三物不同所用各别大明曰海南生者即蓬莪蒁江南生者即為薑黄頌曰薑黄今江廣蜀川多有之葉青綠長一二尺許濶三四寸有斜文如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實根盤屈黄色類生薑而圎有節八月采根片切暴乾蜀人以治氣脹及産後敗血攻心甚驗蠻人生噉云可以袪邪辟惡按鬱金薑黄蒁藥三物相近蘇恭不能分别乃為一物陳藏器以色味分别三物又言薑黄是三年老薑所生近年汴都多種薑往往有薑黄生賣乃是老薑市人買噉云治氣為最大方亦時用之又有㢘薑亦是其類而自是一物時珍曰近時以扁如乾薑形者為片子薑黄圎如蟬腹形者為蟬肚鬱金並可浸水染色蒁形雖似鬱金而色不黄也根氣味辛苦大寒無毒藏器曰辛少苦多性熱不冷云大寒誤矣主治心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金唐本治癥瘕血塊通月經治撲損瘀血止暴風痛冷氣下食大明袪邪辟惡治氣脹産後敗血攻心蘇頌治風痺臂痛時珍發明時珍曰薑黄鬱金蒁藥三物形狀功用皆相近但鬱金入心治血而薑黄兼入脾兼治氣蒁藥則入肝兼治氣中之血為不同爾古方五痺湯用片子薑黄治風寒濕氣手臂痛戴原禮要訣云片子薑黄能入手臂治痛其兼理血中之氣可知附方舊二新二心痛難忍薑黄一兩桂三兩為末醋湯服一錢經驗方胎寒腹痛啼哭吐乳大便色青狀若驚搐出冷汗薑黄一錢沒藥沒香乳香二錢為末蜜丸芡子大每服一丸鈎藤煎湯化下和濟方産後血痛有塊用薑黄桂心等分為末酒服方寸匕血下盡即愈昝殷産寳瘡癬初生薑黄末摻之妙千金翼鬱金唐本草釋名馬蒁震亨曰鬱金無香而性輕揚能致達酒氣於髙逺古人用治鬱遏不能升者恐命名因此也時珍曰酒和鬱鬯昔人言是大秦國所産鬱金花香惟鄭樵通志言即是此鬱金其大秦三代時未通中國安得有此草羅願爾雅翼亦云是此根和酒令黄如金故謂之黄流其說並通此根形狀皆似莪蒁而醫馬病故名馬蒁集解恭曰鬱金生蜀地及西戎苗似薑黄花白質紅末秋出莖心而無實其根黄赤取四畔子根去皮火乾馬藥用之破血而補胡人謂之馬蒁嶺南者有實似小豆不堪噉頌曰今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑如蘇恭所說宗奭曰鬱金不香今人將染婦人衣最鮮明而不耐日炙微有鬱金之氣時珍曰鬱金有二鬱金香是用花見本條此是用根者其苗如薑其根大小如指頭長者寸許體圎有横紋如蟬腹狀外黄内赤人以浸水染色亦微有香氣根氣味辛苦寒無毒元素曰氣味俱厚純隂獨孤及曰灰可結砂子主治血積下氣生肌止血破惡血血淋尿血金瘡唐本單用治女人宿血氣心痛冷氣結聚温醋摩傅之亦治馬脹甄權凉心元素治陽毒入胃下血頻痛李杲治血氣心腹痛産後敗血衝心欲死失心顛狂蠱毒時珍發明震亨曰鬱金屬火與土有水其性輕揚上行治吐血衂血唾血血腥及經脉逆行並宜鬱金未加韭汁薑汁童尿同服其血自清痰中帶血者加竹瀝又鼻血上行者鬱金韭汁加四物湯服之時珍曰鬱金入心及包絡治血病經驗方治失心顛狂用真鬱金七兩明礬三兩為末薄糊丸梧子大每服五十丸白湯下有婦人顛狂十年至人授此初服心胸間有物脫去神氣洒然再服而甦此驚憂痰血絡聚心竅所致鬱金入心去惡血明礬化頑痰故也龎安常傷寒論云斑豆始有白泡忽搐入腹漸作紫黒色無膿日夜呌亂者鬱金一枚甘草二錢半水半盌煑乾去甘草切片焙研為末入真腦子炒半錢毎用一錢以生猪血五七滴新汲水調下不過二服甚者毒氣從手足心出如扈狀乃瘥此乃五死一生之候也又范石湖文集云嶺南有挑生之害於飲食中行厭勝法魚肉能反生於人腹中而人以死則隂役其家初得覺胸腹痛次日刺人十日則生在腹中也凡胸膈痛即用升麻或膽礬吐之若膈下痛急以米湯調鬱金末二錢服即瀉出惡物或合升麻鬱金服之不吐則下李巽巖侍郎為雷州推官鞠獄得此方活人甚多也附方舊三新十失心顛狂方見發明下痘毒入心方見發明下厥心氣痛不可忍鬱金附子乾薑等分為末醋糊丸梧子大硃砂為衣每服三十丸男酒女醋下竒效方産後心痛血氣上衝欲死鬱金燒存性為末二錢米醋一呷調灌即甦袖珍方自汗不止鬱金末卧時調塗于乳上集簡衂血吐血川鬱金為末井水服二錢甚者再服易黎居七簡方陽毒下血熱氣入胃痛不可忍鬱金五大箇牛黄一皂莢子為散每服用醋醬水一盞同煎三沸混服孫用和祕寶方尿血不定鬱金末一兩葱白一握水一盞煎至三合温服日三服經驗方風痰壅滯鬱金一分藜蘆十分為末每服一字温漿水調下仍以漿水一盞潄口以食壓之經驗方挑生蠱毒方見發明下中砒霜毒鬱金末二錢入蜜少許冷水調服事林廣記痔瘡腫痛鬱金末水調塗之即消醫方摘要耳内作痛鬱金末一錢水調傾入耳内急傾出之聖濟総錄蓬莪荗音述寳宋開釋名蒁藥集解志曰蓬莪荗生西戎及廣南諸州葉似蘘荷子似乾椹荗在根下並生一好一惡惡者有毒西人取之先放羊食羊不食者棄之藏器曰一名蓬莪黒色二名蒁黄色三名波殺味甘有大毒大明曰即南中薑黄根也海南生者名蓬莪蒁頌曰今浙江或有之三月生苗在田野中其莖如錢大髙二三尺葉青白色長一二尺大五寸以来頗類蘘荷五月有花作穗黄色頭微紫根如生薑而荗在根下似鷄鴨卵大小不常九月采削去粗皮蒸熟暴乾用根修治斆曰凡使於砂盆中以醋磨令盡然後於火畔㶸乾重篩過用頌曰此物極堅硬難擣治用時熱灰火中煨令透乗熱擣之即碎如粉時珍曰今人多以醋炒或煑熟入藥取其引入血分也氣味苦辛温無毒大明曰得酒醋良主治心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒研服之又療婦人血氣結積丈夫奔豚開寳破痃癖冷氣以酒醋磨服甄權治一切氣開胃消食通月經消瘀血止撲損痛下血及内損惡血大明通肝經聚血好古發明頌曰蓬莪荗古方不見用者今醫家治積聚諸氣為最要之藥與荆三稜同用之良婦人藥中亦多使好古曰蓬莪色黑破氣中之血入氣藥發諸香雖為泄劑亦能益氣故孫尚藥用治氣短不能接續及大小七香丸集香丸諸湯散多用此也又為肝經血分藥時珍曰鬱金入心專治血分之病薑黄入脾兼治血中之氣蒁入肝治氣中之血稍為不同按王執中資生經云執中久患心脾疼服醒脾藥反服用耆域所載蓬莪蒁麫褁炮熟研末以水與酒醋煎服立愈盖此藥能破氣中之血也附方舊一新七一切冷氣槍心切痛發即欲死久患心腹痛時發者此可絶根蓬莪荗二兩醋煑木香一兩煨為末每服半錢淡醋湯下衛生家寳小膓臟氣非時痛不可忍蓬莪荗研末空心葱酒服一錢楊子建䕶命方婦人血氣遊走作痛及腰痛蓬莪荗乾漆二兩為末酒服二錢腰痛核桃酒下普濟方小兒盤膓内釣痛以莪荗半兩用阿魏一錢化水浸一日夜焙研每服一字紫蘇湯下保幼大全小兒氣痛蓬莪荗炮熟為末熱酒服一大錢十全博救方上氣喘急蓬莪荗五錢酒一盞半煎八分服保生方氣短不接正元散治氣不接續兼治滑泄及小便熱王丞相服之有驗用蓬莪荗一兩金鈴子去核一兩為末入蓬砂一錢煉過研細每服二錢温酒或鹽湯空心服孫用和秘寳方初生吐乳不止蓬莪荗少許鹽一緑豆以乳一合煎三五沸去滓入牛黄兩粟大服之甚效也保幼大全渾身燎泡方見荆三稜荆三稜宋開寳校正併入開寳草三稜釋名京三稜開寳草三稜開寳鷄爪三稜開寳黒三稜圗經石三稜頌曰三稜草有三稜也生荆楚地故名荆三稜以著其地開寳本草作京者誤矣又出草三稜條云即鷄爪三稜生蜀地二月八月采之其實一類随形命名爾故併見之集解藏器曰三稜総有三四種京三稜黄色體重狀若鯽魚而小又有黒三稜狀如烏梅而稍大體輕有鬚相連蔓延作漆包蜀人以織為器一名䔷者是也療體並同頌曰京三稜舊不著所出地土今荆襄江淮濟南河陜間皆有之多生淺水旁及陂澤中春生苗葉似莎草極長髙三四尺又似茭蒲葉而有三稜五六月抽莖髙四五尺大如人指有三稜如削成莖端開花大體皆如莎草而大黄紫色苗下即魁初生成塊如附子大或有扁者其旁有根横貫一根則連數魁魁上亦出苗其魁皆扁長如小鯽魚體重者三稜也其根末將盡一魁未發苗小圎如烏梅者黒三稜也又根之端鈎曲如爪者鷄爪三稜也皆皮黑肌白而至輕或云不出苖只生細根者謂之鷄爪三稜又不生細根者謂之黑三稜大小不常其色黒去皮即白三者本一種但力有剛柔各適其用因其形為名如烏頭烏啄雲母雲苗之類本非兩物也今人乃妄以鳬茈香附子為之又河中府有石三稜根黄白色形如釵股葉綠如蒲苗髙及尺亦有三稜四月開花白色如蓼葓花五月采根亦消積氣今舉世所用三稜皆淮南紅蒲根也秦州尤多其體至堅重刻削魚形葉扁形圎不復有三稜不知何縁命名為三稜也雖太醫亦不以為謬流習既久用根者不識其苗采藥者莫究其用因縁差失不復辨别今三稜皆獨旁引下根無直下根其形大體多如鯽魚時珍曰三稜多生荒廢陂池濕地春時叢生夏秋抽髙莖莖端復生數葉開花六七枝花皆細碎成穗黄紫色中有細子其葉莖花實俱有三稜並與香附苗葉花實一様但長大爾其莖光滑三稜如㯶之葉莖莖中有白穰剖之織物柔靱如藤呂忱字林云䔷草生水中根可縁器即此草莖非根也抱朴子言䔷根化鱓亦是此草其根多黄黒鬚削去鬚皮乃如鯽狀非本根似鯽也根修治元素曰入用須炮熟時珍曰消積須用醋浸一日炒或煑熟焙乾入藥乃良氣味苦平無毒藏器曰甘平温大明曰甘濇涼元素曰苦甘無毒隂中之陽能瀉真氣真氣虚者勿用主治老癖癥瘕積聚結塊産後惡血血結通月水墮胎止痛利氣開寳治氣脹破積氣消撲損瘀血婦人血脈不調心腹痛産後腹痛血運大明心膈痛飲食不消元素通肝經積血治瘡腫堅硬好古下乳汁時珍發明好古曰三稜色白屬金破血中之氣肝經血分藥也三稜莪荗治積塊瘡硬者乃堅者削之也志曰俗傳昔人患癥癖死遺言令開腹取之得病塊乾硬如石文理有五色以為異物削成刀柄後因以刀刈三稜柄消成水乃知此藥可療癥癖也時珍曰三稜能破氣散結故能治諸病其功可近於香附而力峻故難久服按戴原禮證治要訣云有人病癥癖腹脹用三稜莪荗以酒煨煎服之下一黒物如魚而愈也附方舊三新五癥瘕鼓脹三稜煎用三稜根切一石水五石煑三石去滓更煎取三斗汁入鍋中重湯煎如稠糖蜜器收之每旦酒服一七日二服千金翼方痃癖氣塊草三稜荆三稜石三稜青橘皮陳橘皮木香各半兩肉豆蔲㯽榔各一兩硇砂二錢為末糊丸梧子大每薑湯服三十丸方竒效痃癖不瘥脇下硬如石京三稜一兩炮川大黄一兩為末醋熬成膏毎日空心生薑橘皮湯下一匙以利下為度聖惠方小兒氣癖三稜煑汁作羹粥與奶母食日亦以棗許與兒食小兒新生百日及十嵗以下無問癎熱痃癖等皆理之秘妙不可具言大效子母秘錄痞氣胸滿口乾肌瘦食減或時壮熱石三稜京三稜鷄爪三稜並炮蓬莪荗三枚㯽榔一枚青橘皮五十片醋浸去白陳倉米一合醋浸淘過巴豆五十箇去皮同青皮倉米炒乾去豆為末糊丸綠豆大每米飲下三丸日一服聖濟総錄反胃惡心藥食不下京三稜炮一兩半丁香三分為末每服一錢沸湯㸃服聖濟総錄乳汁不下京三稜三箇水二盌煎汁一盌洗奶取汁出為度極妙要外臺秘渾身燎泡如棠梨狀每箇出水有石一片如指甲大其泡復生抽盡肌膚肉即不可治用荆三稜蓬莪荗各五兩為末分三服酒調連進愈危氏得效方莎草香附子别錄中品釋名雀頭香唐本草附子圗經水香稜圗經水巴㦸圗經水莎圗經侯莎爾雅莎結圗經夫須别錄續根草圗經地藾根綱目地毛廣雅時珍曰别錄止言莎草而不言用苗用根後世皆用其根名香附子而不知莎草之名也其草可為笠及雨衣踈而不沾故字從草從沙亦作蓑字因其為衣垂緌如孝子衰衣之狀故又從衰也爾雅云薃音浩侯莎其實緹是也又云薹夫須也薹乃笠名賤夫所須也其根相附連續而生可以合香故謂之香附子上古謂之雀頭香按江表傳云魏文帝遣使于呉求雀頭香即此其葉似三稜及巴㦸而生下濕地故有水三稜水巴㦸之名俗人呼為雷公頭金光明經謂月萃哆記事珠謂之抱靈居士集解别錄曰莎草生田野二月八月采𢎞景曰方藥不復用古人為詩多用之而無識者乃有鼠莎療體異此恭曰此草根名香附子一名雀頭香所在有之莖葉都似三稜合和香用之頌曰今處處有之苗葉如薤而瘦根如筯頭大謹按唐𤣥宗天寳單方圗載水香稜功狀與此相類云水香稜原生博平郡池澤中苗名香稜根名莎結亦名草附子河南及淮南下濕地即有名水莎隴西謂之地藾根蜀郡名續根草亦名水巴㦸今涪都最饒名三稜草用莖作鞋履所在皆有采苗及花與根療病宗奭曰香附子今人多用雖生於莎草根然根上或有或無有薄皸皮紫黒色非多毛也刮去皮則色白若便以根為之則誤矣時珍曰莎葉如老韭葉而硬光澤有劍脊稜五六月中抽一莖三稜中空莖端復出數葉開青花成穗如黍中有細子其根有鬚鬚下結子一二枚轉相延生子上有細黑毛大者如羊棗而兩頭尖采得燎去毛暴乾貨之此乃近時日用要藥而陶氏不識諸註亦畧乃知古今藥物興癈不同如此則本草諸藥亦不可以今之不識便廢棄不收安知異時不為要藥如香附者乎根修治斆曰凡采得隂乾於石臼中搗之切忌鐵器時珍曰凡采得連苗暴乾以火燎去苗及毛用時以水洗淨石上磨去皮用童子小便浸透洗晒搗用或生或炒或以酒醋鹽水浸諸法各從本方詳見於下又稻草煑之味不苦氣味甘微寒無毒宗奭曰苦頌曰天寳單方云辛微寒無毒性濇元素曰甘苦微寒氣厚於味陽中之隂血中之氣藥也時珍曰辛微苦甘平足厥隂手少陽藥也能兼行十二經八脈氣分得童子小便醋芎藭蒼术良主治除胸中熱充皮毛久服令人益氣長鬚眉别錄治心腹中客熱膀胱間連脇下氣妨常日憂愁不樂心忪少氣蘇頌治一切氣霍亂吐瀉腹痛腎氣膀胱冷氣李杲散時氣寒疫利三焦解六鬱消飲食積聚痰飲痞滿胕腫腹脹脚氣止心腹肢體頭目齒耳諸痛癰疽瘡瘍吐血下血尿血婦人崩漏帶下月候不調胎前産後百病時珍苗及花主治丈夫心肺中虚風及客熱膀胱連脇下時有氣妨皮膚瘙痒癮疹飲食不多日漸瘦損常有憂愁心忪少氣等證並收苗花二十餘斤剉細以水二石五斗煑一石五斗斛中浸浴令汗出五六度其瘙痒即止四時常用癮疹風永除天寳單方闕煎飲散氣鬱利胸膈降痰熱時珍發明好古曰香附治膀胱兩脇氣妨心忪少氣是能益氣乃血中之氣藥也本草不言治崩漏而方中用治崩漏是能益氣而止血也又能逐去瘀血是推陳也正如巴豆治大便不通而又止泄瀉同意又云香附陽中之隂血中之氣藥凡氣鬱血氣必用之炒黒能止血治崩漏此婦人之仙藥也多服亦能走氣震亨曰香附須用童子小便浸過能総解諸鬱凡血氣必用之藥引至氣分而生血此正隂生陽長之義本草不言補而方家言於老人有益意有存焉盖於行中有補理天之所以為天者健而有常也健運不息所以生生無窮即此理爾今即香中亦用之時珍曰香附之氣平而不寒香而能竄其味多辛能散微苦能降微甘能和乃足厥隂肝手少陽三焦氣分主藥而兼通十二經氣分生則上行胸膈外達皮膚熟則下走肝腎外徹腰足炒黒則止血得童溲浸炒則入血分而補虚鹽水浸炒則入血分而潤燥青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚薑汁炒則化痰飲得參术則補氣得歸苄則補血得木香則流滯和中得檀香則理氣醒脾得沈香則升降諸氣得芎藭蒼术則總解諸鬱得巵子黄連則能降火熱得茯神則交濟心腎得茴香破故紙則引氣歸元得厚朴半夏則决壅消脹得紫蘇葱白則解散邪氣得三稜莪荗則消磨積塊得艾葉則治血氣暖子宮乃氣病之總司女科之主帥也飛霞子韓􅐂云香附能推陳致新故諸書皆云益氣而俗有耗氣之說宜于婦人不宜于男子者非矣盖婦人以血用事氣行則無疾老人精枯血閉惟氣是資小兒氣日充則形乃日固大凡病則氣滯而餒故香附於氣分為君藥世所罕知臣以參茋佐以甘草治虚怯甚速也􅐂遊方外時懸壺輕齎治百病黄鶴丹治婦人青囊丸随宜用引輙有小效人索不已用者當思法外意可也黄鶴丹乃銖衣翁在黄鶴樓所授之方故名其方用香附一斤黄連半斤洗晒為末水糊丸梧子大假如外感葱薑湯下内傷米飲下氣病香湯下血病酒下痰病薑湯下火病白湯下餘可類推青囊丸乃邵應節真人禱母病感方士所授者方用香附略炒一斤烏藥略炮五兩三錢為末水醋煑麫糊為丸隨證用引如頭痛茶下痰氣薑湯下血病酒下為妙附方舊一新四十七服食法頌曰唐𤣥宗天寳單方圗云水香稜根名莎結亦名草附子說已見前其味辛微寒無毒凡丈夫心中客熱膀胱間連脇下氣妨常日憂愁不樂心忪少氣者取根二大升擣熬令香以生絹袋盛貯於三大斗無灰清酒中浸之三月後浸一日即堪服十月後即七日近暖處乃佳每空服温飲一盞日夜三四次常令酒氣相續以知為度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗為散以蜜和為丸擣一千杵丸如梧子大每空腹酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥為度交感丹凡人中年精耗神衰盖由心血少火不下降腎氣憊水不上升致心腎膈絶營衛不和上則多驚中則塞痞飲食不下下則虚冷遺精愚醫徒知峻補下田非惟不能生水滋隂而反見衰悴但服此方半年屏去一切暖藥絶嗜欲然後習袐固泝流之術其效不可殫述俞通奉年五十一遇鐵甕城申先生授此服之老猶如少年至八十五乃終也因普示羣生同登壽域香附子一斤新水浸一宿石上擦去毛炒黄伏神去皮木四兩為末煉蜜丸彈子大每服一丸侵早細嚼以降氣湯下降氣湯用香附子如上法半兩伏神二兩炙甘草一兩半為末㸃沸湯服前藥薩謙齋瑞竹堂經驗方一品丸治氣熱上攻頭目昬眩及治偏正頭痛大香附子去皮水煑一時搗晒焙研為末煉蜜丸彈子大每服一丸水一盞煎八分服女人醋湯煎之竒效良方升降諸氣治一切氣病痞脹喘噦噫酸煩悶虚痛走注常服開胃消痰散壅思食早行山行尤宜服之去邪辟瘴香附子炒四百兩沈香十八兩縮砂仁四十八兩炙甘草一百二十兩為末每服一錢入鹽少許白湯㸃服和劑局方一切氣疾心腹脹滿噎塞噫氣吞酸痰逆嘔惡及宿酒不解香附子一斤縮砂仁八兩甘草炙四兩為末每白湯入鹽㸃服為粗末煎服亦可名快氣湯和劑局方調中快氣心腹刺痛小烏沈湯香附子擦去毛焙二十兩烏藥十兩甘草炒一兩為末每服二錢鹽湯隨時㸃服和劑局方心脾氣痛白飛霞方外竒方云凡人胸膛軟處一㸃痛者多因氣及寒起或致終身或子母相傳俗名心氣痛非也乃胃脘有滯爾惟此獨步散治之甚妙香附米醋浸略炒為末髙良薑酒洗七次略炒為末俱各封收因寒者薑二錢附一錢因氣者附二錢薑一錢因氣與寒者各等分和勻以熱米湯入薑汁一匙鹽一捻調下立止不過七八次除根愈王璆百一方云内翰呉开夫人心痛欲死服此即類編云梁混心脾痛數年不愈供事穢跡佛夢傳此方一服而愈因名神授一七散心腹諸痛艾附丸治男女心氣痛腹痛少腹痛血氣痛不可忍者香附子二兩蘄艾葉半兩以醋湯同煑熟去艾炒為末米醋糊丸梧子大每白湯服五十丸集簡方停痰宿飲風氣上攻胸膈不利香附皂莢水浸半夏各一兩白礬末半兩薑汁麫糊丸梧子大每服三四十丸薑湯隨時下仁存方元臟腹冷及開胃香附子炒為末每用二錢薑鹽同煎服普濟方酒腫虚腫香附子艾米醋煑乾焙研為末米醋糊丸服久之敗水從小便出神效經驗方氣虚浮腫香附子一斤童子小便浸三日焙為末糊丸每米飲下四五十丸日二丹溪心法老小痃癖往來疼痛香附南星等分為末薑汁糊丸梧子大每薑湯下二三十丸聖惠㿗疝脹痛及小膓氣香附末二錢以海藻一錢煎酒空心調下并食海藻隨湖集簡方腰痛揩牙香附子五兩生薑二兩取自然汁浸一宿炒黄為末入青鹽二錢擦牙數次其痛即止乾坤生意血氣刺痛香附子炒一兩荔枝核燒存性五錢為末每服二錢米飲調下婦人良方女人諸病瑞竹堂方四制香附丸治婦人女子經候不調兼諸病大香附子擦去毛一斤分作四分四兩醇酒浸四兩醇醋浸四兩鹽水浸四兩童子小便浸春三秋五夏一冬七日淘洗净晒乾搗爛微焙為末醋煑麫糊丸梧子大每酒下七十丸瘦人加澤蘭赤茯苓末二兩氣虛加四君子籵血虛加四物料法生堂方煑附濟隂丸治婦人月經不調久成癥樍一切風氣用香附子一斤分作四分以童溲鹽水酒醋各浸三日艾葉一斤漿水浸過醋糊和作餅晒乾晚蠶砂半斤炒莪荗四兩酒浸當歸四兩酒浸各焙為末醋糊丸梧子大每服七十丸米飲下日二脇醋附丸治婦人室女一切經候不調血氣刺痛腹膨脹心怔乏力面色痿黄頭運惡心崩漏帶下便血癥瘕積聚及婦人數墮胎由氣不升降服此尤妙香附子米醋浸半日砂鍋煑乾搗焙石臼為末醋糊為丸醋湯下煑澹寮方艾附丸治同上香附子一斤熟艾四兩醋當歸酒浸二兩為末如上丸服婦人氣盛血衰變生諸症頭運腹滿皆宜抑氣散主之香附子四兩炒茯苓甘草炙各一兩橘紅二兩為末每服二錢沸湯下濟生方下血血崩血如山崩或五色漏帶並宜常服滋血調氣乃婦人之仙藥也香附子去毛炒焦為末極熱酒服二錢立愈昬迷甚者三錢米飲下亦可加㯶灰事許學士本赤白帶下及血崩不止香附子赤芍藥等分為末鹽一捻水二盞煎一盞食前温服聖惠方安胎順氣鐵罩散香附子炒為末濃煎紫蘇湯服一二錢一加砂仁藏中經妊娠惡阻胎氣不安氣不升降嘔吐酸水起坐不便飲食不進二香散用香附子二兩藿香葉甘草各二錢為末每服二錢沸湯入鹽調下聖惠方臨産順胎九月十月服此永無驚恐福胎飲用香附子四兩縮砂仁炒三兩甘草炙一兩為末每服二錢米飲下朱氏集驗方産後狂言血運煩渇不止生薑附子去毛為末每服二錢薑棗水煎服同上氣鬱吐血丹溪用童子小便調香附末二錢服為澹寮方治吐血不止莎草根一兩白茯苓半兩末每服二錢陳粟米飲下肺破咯血香附末一錢米飲下日二服百一選方小便尿血香附子新地榆等分各煎湯先服香附湯三五呷後服地榆湯至盡未效再服指迷方小便血淋痛不可忍香附子陳皮赤茯苓等分水煎服十便良方諸般下血香附童子小便浸一日搗碎米醋拌焙為末每服二錢米飲下米直指方用香附以醋酒各半煑熟焙研為末黄􅐕糊丸梧子大每服四十丸米飲下日二服少戴原禮云只以香附子末二錢入百草霜麝香各許同服效尤速也老小脫肛香附子荆芥穗等分為末每服一匙水一大盌煎十數沸淋洗三因方偏正頭風香附子炒一斤烏頭炒一兩甘草二兩為末煉蜜丸彈子大每服一丸葱茶嚼下本事方氣鬱頭痛澹寮方用香附子炒四兩川芎藭二兩為末每服二錢臘茶清調下常服除根明目草華佗中藏經加甘一兩石膏二錢半頭風睛痛方同妊娠惡阻女人頭痛香附子末茶服三錢日三五服經驗良方肝虚睛痛冷淚羞明補肝散用香附子一兩夏枯草半兩為末每服一錢茶清下簡易方耳卒聾閉香附子瓦炒研末蘿蔔子煎湯早夜各服二錢忌鐵器衛生易簡方聤耳出汁香附末以綿杖送入蔡邦度知府常用有效經驗良方諸般牙痛香附艾葉煎湯潄之仍以香附末擦之去涎普濟方牢牙去風益氣烏髭治牙疼牙宣乃鐡甕先生妙方也香附子炒存性三兩青鹽生薑各半兩為末日擦濟生方消渇累年不愈莎草根一兩白茯苓半兩為末每陳粟米飲服三錢日二癰疽瘡瘍曽孚先云凡癰疽瘡瘍皆因氣滯血凝而致宜服諸香藥引氣通血常器之云凡氣血聞香即行聞臭即逆瘡瘍皆由氣濇而血聚最忌臭穢不潔觸之毒必引蔓陳正節公云大凡疽疾多因怒氣而得但服香附子藥進食寛氣大有效也獨勝散用香附子去毛以生薑汁淹一宿焙乾碾為細末無時以白湯服二錢如瘡初作以此代茶瘡潰後亦宜服之或只以局方小烏沈湯少用甘草愈後服至半年尤妙陳自明外科精要蜈蚣咬傷嚼香附塗之立效袖珍方瑞香綱目集解時珍曰南土處處山中有之枝幹婆娑柔條厚葉四時不凋冬春之交開花成簇長三四分如丁香狀有黄白紫三色格古論云瑞香髙者三四尺有數種有枇杷葉者楊梅葉者柯葉者毬子者攣枝者惟攣枝者花紫香烈枇杷葉者結子其始出于廬山宋時人家栽之始著名攣枝者其節攣曲如斷折之狀也其根綿軟而香根氣味甘鹹無毒主治急喉風用白花者研水灌之時珍曰出醫學集成茉莉綱目釋名柰花時珍曰稽含草木狀作末利洛陽名園記作抹厲佛經作抹利王龜齡集作沒利洪邁集作末麗盖末利本胡語無正字隨人㑹意而已韋君呼為狎客張叔敏呼為逺客楊慎丹鉛錄云晉書都人簮柰花即今末利花也集解時珍曰末利原出波斯移植南海今滇廣人栽蒔之其性畏寒不宜中土弱莖繁枝綠葉圎尖初夏開小白花重瓣無蕋秋盡乃止不結實有千葉者紅色者蔓生者其花皆夜開芬香可愛女人穿為首餙或合面脂亦可熏茶或蒸取液以代薔薇水又有似末利而瓣大其香清絶者謂之狗牙亦名雪瓣海南有之素馨指甲皆其類也並附于下附錄素馨時珍曰素馨亦自西域移来謂之耶悉茗花即酉陽雜俎所載野悉蜜花也枝幹裊娜葉似末利而小其花細瘦四瓣有黄白二色采花壓油澤頭甚香滑也指甲花有黄白二色夏月聞香似木犀可染指甲過于鳯仙花花氣味辛熱無毒主治蒸油取液作面脂頭澤長髮潤燥香肌亦入茗湯時珍根氣味熱有毒主治以酒磨一寸服則昬迷一日乃醒二寸二日三寸三日凡跌損骨節脫臼接骨者用此則不知痛也汪機鬱金香宋開寳校正禹錫曰陳氏言鬱是草英不當附于木部今移入此釋名鬱香御覽紅藍花綱目紫述香綱目草麝香茶矩摩佛書頌曰許慎說文解字云鬱芳草也十葉為貫百二十貫築以煑之鬱鬯乃百草之英合而釀酒以降神乃逺方鬱人所貢故謂之鬱鬱今鬱林郡也時珍曰漢鬱林郡即今廣西貴州潯柳邕賔諸州之地一統志維載柳州羅城縣出鬱金香即此也金光明經謂之茶矩麽香此乃鬱金花香與今時所用鬱金根名同物異唐慎微本草收此入彼下誤矣按趙古則六書本義鬯字象米在器中以七扱之之意鬱字从臼奉缶置于凡上鬯有彡飾五體之意俗作鬱則鬱乃取花築酒之意非指地言地乃因此草得名耳集解藏器曰鬱金香生大秦國二月三月有花狀如紅藍四月五月采花即香也時珍曰按鄭𤣥云鬱草似蘭楊孚南州異物志云鬱金出罽賓國人種之先以供佛數日萎然後取之色正黄與芙蓉花褁嫩蓮者相似可以香酒又唐書云太宗時伽毘國獻鬱金香葉似麥門冬九月花開狀似芙蓉其色紫碧香聞數十步花而不實欲種者取根二說皆同但花色不同種或不一也古樂府云中有鬱金蘇合香者是此鬱金也晉左貴嬪有鬱金頌云伊有竒草名曰鬱金越自殊域厥珍来尋芳香酷烈恱目怡心明德惟馨淑人是欽氣味苦温無毒藏器曰平主治蠱野諸毒心腹間惡氣鬼疰鵶鶻等一切臭入諸香藥用藏器茅香宋開寳校正併入宋圗經香麻釋名嗢尸羅金光明經香麻時珍曰蘇頌圗經復出香麻一條云出福州煎湯浴風甚良此即香茅也閩人呼茅如麻故爾今併為一集解志曰茅香生劍南道諸州其莖葉黒褐色花白色即非白茅香也頌曰今陜西河東汴東州郡亦有之遼澤州充貢三月生苗似大麥五月開白花亦有黄花者有結實者有無實者並正月二月采根五月采花八月采苗宗奭曰茅香根如茅但明潔而長可作浴湯同藁本尤佳仍入印香中合香附子用時珍曰茅香凡有二此是一種香茅也其白茅香别是南畨一種香草唐慎微本草不知此義乃以白茅花及白茅香詣註引入茅香之下今並提歸各條花氣味苦温無毒主治中惡温胃止嘔吐療心腹冷痛開寳附方新一冷勞久病茅香花艾葉四兩燒存性研末粟米飯丸梧子大初以蛇牀子湯下二十丸至三十丸微吐不妨後用棗湯下立效聖濟総錄苗葉主治作浴湯辟邪氣令人身香開寳白茅香拾遺集解藏器曰白茅香生安南如茅根道家用作浴湯珣曰廣志云生廣南山谷合諸名香甚竒妙尤勝舶上来者時珍曰此乃南海白茅香亦今排香之類非近道之白茅及北土茅香花也根氣味甘平無毒主治惡氣令人身香煑湯服治腹内冷藏器小兒遍身瘡疱合桃葉煎湯浴之李珣排草香綱目集解時珍曰排草香出交趾今嶺南亦或蒔之草根也白色狀如細柳根人多偽襍之案范成大桂海志云排草香狀如白茅香芬烈如麝香人亦用以合香諸香無及之者又有麝香木出占城乃老朽樹心節氣頗類麝根氣味辛温無毒主治辟臭去邪惡氣時珍附錄瓶香珣曰案陳藏器云生南海山谷草之狀也其味寒無毒主鬼魅邪精天行時氣並宜燒之水煑洗水浮氣與土薑芥子煎湯浴風瘧甚效耕香藏器曰生烏許國莖生細葉味辛温無毒主鬼氣調中去臭時珍曰二香皆草狀恐亦排草之類也故附之迷迭香拾遺集解藏器曰廣志云出西海魏畧云出大秦國時珍曰魏文帝時自西域移植庭中同曹植等各有賦大意其草修幹柔莖細枝弱根繁花結實嚴霜弗凋收采幽殺摘去枝葉入袋佩之芳香甚烈與今之排香同氣氣味辛温無毒主治惡氣令人衣香燒之去鬼藏器珣曰性平不温合羗活為丸燒之辟蚊蚋䔾車香拾遺集解藏器曰廣志云䔾車香主徐州髙數尺黄葉白花爾雅䔾車乞與郭璞云香草也珣曰生海南山谷齊民要術云凡諸樹木虫蛀者煎此香冷淋之即辟也時珍曰楚詞畦留夷與䔾車則昔人常栽蒔之與今蘭香零陵相類也氣味辛温無毒珣曰微寒主治鬼氣去臭及蟲魚蛀蠧藏器治霍亂辟惡氣薰衣佳珣艾納香宋開寳集解志曰廣志云艾納出西國似細艾又有松樹皮上綠衣亦名艾納可以和合諸香燒之能聚其烟青白不散而與此不同禹錫曰案古樂府云行胡從何方列國持何来氍毺􅚊􅂒五木香迷迭艾納及都梁是也氣味甘温平無毒主治惡氣殺蟲主腹冷洩痢志傷寒五洩心腹注氣止膓鳴下寸白燒之辟瘟疫合蜂窠浴脚氣良珣治癬辟蛇藏器兠納香海藥集解珣曰案廣志云出西海㔄國諸山魏畧云出大秦國草類也氣味辛平無毒藏器曰甘温主治温中除暴冷藏器惡瘡腫瘻止痛生肌並入膏用燒之辟逺近惡氣帶之夜行壯膽安神與茅香柳枝煎湯浴小兒易長李珣線香綱目集解時珍曰今人合香之法甚多惟線香可入瘡科用其料加減不等大抵多用白芷芎藭獨活甘松三柰丁香藿香藁本髙良薑角茴香連喬大黄黄芩柏木兠婁香末之類為末以榆皮麫作糊和劑以唧筩笮成線香成條如線也亦或盤成物象字形用鐵銅絲懸爇者名龍挂香氣味辛温無毒主治熏諸瘡癬時珍附方新一楊梅毒瘡龍挂香孩兒茶皁角子各一錢銀硃二錢為末紙卷作撚㸃燈置桶中以鼻吸烟一日三次三日止内服解毒藥瘡即乾集簡方藿香宋嘉祐校正承曰宜入草部釋名兠婁婆香時珍曰豆葉曰藿其葉似之故名楞嚴經云壇前以兠婁婆香煎水洗浴即此法華經謂之多摩羅跋香金光明經謂之缽怛羅香皆兠婁二字梵言也湼槃又謂之迦算香集解禹錫曰按廣志云藿香出海邊國莖如都梁葉似水蘇可著衣服中稽含南方草木狀云出交趾丸真武平興古諸國吏民自種之叢生五六月采日乾乃芬香頌曰藿香嶺南多有之人家亦多種二月生苗莖梗甚宻作叢葉似桑而小薄六月七月采之須黄色乃可收金樓子及俞益期牋皆云扶南國人言五香共是一木其根是旃檀節是沈香花是雞舌葉是藿香膠是薫陸故本草以五香共條義亦出此今南中藿香乃是草類與稽含所說正相符合范瞱合香方云零藿虚燥古人乃以合香即此扶南之說似涉欺岡也時珍曰藿香方莖有節中虚葉微似茄葉潔古東垣惟用其葉不用枝梗今人併枝梗用之因葉多偽故耳唐史云頓遜國出藿香挿枝便生葉如都良者是也劉欣期交州記言藿香似蘇合香者謂其氣相似非謂形狀也枝葉氣味辛微温無毒元素曰辛甘又曰甘苦氣厚味薄浮而升陽也杲曰可升可降陽也入手足太隂經主治風水毒腫去惡氣止霍亂心腹痛别錄脾胃吐逆為要藥蘇頌助胃氣開胃口進飲食元素温中快氣肺虚有寒上焦壅熱飲酒口臭煎湯潄好古發明杲曰芳香之氣助脾胃故藿香能止嘔逆進飲食好古曰手足太隂之藥故入順氣烏藥散則補肺入黄茋四君子湯則補脾也附方新六升降諸氣藿香一兩香附炒五兩為末每以白湯㸃服一錢經效濟世方霍亂吐瀉垂死者服之回生用藿香葉陳皮各半兩水二盞煎一盞温服百一選方暑月吐瀉滑石炒二兩藿香二錢半丁香五分為末每服一二錢淅米泔調服禹講師經驗方胎氣不安氣不升降嘔吐酸水香附藿香甘草二錢為末每服二錢入鹽少許沸湯調服之聖惠香口去臭藿香洗淨煎湯時時噙潄摘𤣥方冷露瘡爛藿香葉細茶等分燒灰油調塗葉上貼之應驗方薫草别錄中品零陵香宋開寳釋名蕙草别錄香草開寳燕草綱目黄零草玉冊時珍曰古者燒香草以降神故曰薫曰蕙薰者薰也蕙者和也漢書云薰以香自燒是矣或云古人袚除以此草薰之故謂之薰亦通范成大虞衡志言零陵即今永州不出此香惟融宜等州甚多土人以編席薦性煖宜人謹按零陵舊治在今全州全乃湘水之源多生此香今人呌為廣零陵香者乃真薰草也若永州道州武岡州皆零陵屬地也今鎮江丹陽皆蒔而刈之以酒灑制貨之芬香更烈謂之香草與蘭草同稱楚辭云既滋蘭之九畹又樹蕙之百畝則古人皆栽之矣張揖廣雅云鹵薰也其葉謂之蕙而黄山谷言一幹數花者為蕙盖因不識蘭草蕙草強以蘭花為分别也鄭樵修本草言蘭即蕙蕙即零陵香亦是臆見殊欠分明但蘭草蕙草乃一類二種耳集解别錄曰薰草一名蕙草生下濕地三月采隂乾脫節者良又曰蕙實生魯山平澤𢎞景曰桐君藥錄薰草葉如麻兩兩相對山海經云浮山有草麻葉而方莖赤華而黑實氣如蘼蕪名曰薰草可以已癘今俗人皆呼燕草狀如茅而香者為薰草人家頗種之者非也詩書家多用蕙而竟不知是何草尚其名而迷其實皆此類也藏器曰薰草即是零陵香薰乃蕙草根也志曰零陵香生零陵山谷葉如羅勒南越志云土人名燕草又名薰草即香草也山海經薰草即是此頌曰零陵香今湖廣諸州皆有之多生下濕地葉如麻兩兩相對莖方常以七月中旬開花至香古云薰草是也嶺南人皆作窰竈以火炭焙乾令黄色乃佳江淮亦有土生者亦可作香但不及湖嶺者至枯槁香尤芬薰耳古方但用薰草不用零陵香今合香家及面脂澡豆諸法皆用之都下市肆貨之甚便時珍曰今惟吳人栽造貨之亦廣薫草氣味甘平無毒權曰苦無毒珣曰辛温無毒不宜多服令人氣喘玉冊云伏三黄硃砂主治明目止淚療洩精去臭惡氣傷寒頭痛上氣腰痛别錄單用治鼻中息肉鼻齆甄權零陵香主惡氣心腹痛滿下氣令體香和諸香作湯丸用得酒良開寳主風邪衝心虚勞疳䘌得升麻細辛煎飲治牙齒腫痛善李珣治血氣腹脹莖葉煎酒服大明婦人浸油飾頭香無以加宗奭發明時珍曰薰草芳馨其氣辛散上達故心腹惡氣齒痛鼻塞皆用之脾胃喜芳香芳香可以養鼻是也多服作喘為能耗散真氣也附方新十傷寒下痢蕙草湯用蕙草當歸各二兩黄連四兩水六升煑二升服日三服范汪方傷寒狐惑食肛者蕙草黄連各四兩㕮咀以白酸漿一斗漬一宿煑取二升分三服品小方頭風旋運痰逆惡心懶食真零陵香藿香葉莎草根炒等分為末每服二錢茶下日三服方本事小兒鼻塞頭熱用薰草一兩羊髓三兩銚内慢火熬成膏去滓日摩背上三四次方聖惠頭風白屑零陵香白芷等分水煎汁入鷄子白攪勻傅數十次終身不生聖惠方牙齒疼痛零陵香梗葉煎水含潄之普濟方風牙疳牙零陵香洗炙蓽茇炒等分為末摻之普濟方夢遺失精薫草湯用薫草人參白术白芍藥生地黄各二兩伏神桂心甘草炙各二兩大棗十二枚水八升煑三升分二服外臺秘要婦人斷産零陵香為末酒服二錢每服至一兩即一年絶孕盖血聞香即散也醫林集要五色諸痢返魂丹用零陵香草去根以鹽酒浸半月炒乾每兩入廣木香一錢半為末裹急腹痛者用冷水服一錢半通了三四次用熱米湯服一錢半止痢只忌生梨一味集簡方蕙實别錄有名未用部藏器曰即蘭蕙之蕙也五月采之辛香氣味辛平無毒主治明目補中别錄根莖中涕主治傷寒寒熱出汗中風面腫消渇熱中逐水别錄主五痔脫肛有蟲時珍金出千蘭草本經上品釋名簡音閑水香本經香水蘭開寳女蘭綱目香草綱目燕尾香開寳大澤蘭炮炙論蘭澤草𢎞景煎澤草唐本省頭草綱目都梁香李當之孩兒菊綱目千金草志曰葉似馬蘭故名蘭草其葉有岐俗呼燕尾香時人煑水以浴風故又名香水蘭藏器曰蘭草生澤畔婦人和油澤頭故云蘭澤盛𢎞之荆州記云都梁有山下有水清淺其中生蘭草因名都梁香時珍曰都梁即今之武岡州也又臨淮旴𣅿縣亦有都梁山産此香蘭乃香草能辟不祥陸璣詩疏言鄭俗三月男女秉蕳于水用以自袚除盖蘭以閩之蕑以閑之其義一也淮南子云男子種蘭美而不芳則蘭須女子種之女蘭之名或因乎此其葉似菊女子小兒喜佩之則女蘭孩菊之名又或以此也唐珤經驗方言江南人家種之夏月采置髮中令頭不䐈故名省頭草其說止合煎澤之義古人蘭蕙皆稱香草如零陵香草都梁香草後人省之通呼為香草爾近世但知蘭花不知蘭草惟虚谷方回考訂極言古之蘭草即今之千金草俗名孩兒菊者其說可據詳下正誤集解别錄曰蘭草生太湖池澤四月五月采𢎞景曰方藥俗人並不識用太吳應是吳國太伯所居故呼太呉今東門有煎澤草名蘭香或是此也李當之云是今人所種都梁香草也澤蘭亦名都梁香恭曰蘭即蘭澤香草也圎莖紫蕚八月花白俗名蘭香煑以洗浴生溪澗水旁人間亦多種之以飭庭池陶所引煎澤草都梁香者是也而不能的識保昇曰生下濕地葉似澤蘭尖長有岐花紅白色而香藏器曰蘭草澤蘭二物同名陶不能知蘇亦浪别蘭草生澤畔葉光潤根小紫五月六月采隂乾即都梁香也澤蘭葉尖微有毛不光潤莖方節紫初采微辛乾之亦辛蘇云八月花白者即澤蘭也以註蘭草殊誤矣時珍曰蘭草澤蘭一類二種也俱生水旁下濕處二月宿根生苗成叢紫莖素枝赤節綠葉葉對節生有細齒但以莖圎節長而葉光有岐者為蘭草莖微方節短而葉有毛者為澤蘭嫩時並可挼而佩之八九月後漸老髙者三四尺開花成穗如鷄蘇花紅白色中有細子雷斆炮炙論所謂大澤蘭即蘭草也小澤蘭即澤蘭也禮記佩恱蘭茝楚辭紉秋蘭以為佩西京雜記載漢時池苑種蘭以降神或雜粉藏衣書中辟蠧者皆此二蘭也今呉人蒔之呼為香草夏月刈取以酒油灑制纒作把子貨為頭澤佩帶與别錄所出大呉之文正相符合諸家不知二蘭乃一物二種但功用有氣血之分故無定指惟冦氏朱氏之誤尤甚故考正于下或云家蒔者為蘭草野生者為蘭澤亦通正誤㓂宗奭曰蘭草諸家之說異同乃未的識故無定論今江陵鼎澧州山谷之間頗有之山外平田即無多生隂地幽谷葉如麥門冬而濶且靱長及一二尺四時常青花黄綠色中間瓣上有細紫㸃春芳者為春蘭色深秋芳者為秋蘭色淡開時滿室盡香與他花香又别朱震亨曰蘭葉稟金水之氣而似有火人知其花香之貴而不知其葉有藥方盖其葉能散久積陳鬱之氣甚有力即今之栽置座右者時珍曰二氏所說乃近世所謂蘭花非古之蘭草也蘭有數種蘭草澤蘭生水旁山蘭即蘭草之生山中者蘭花亦生山中與三蘭逈别蘭花生近處者葉如麥門冬而春花生福建者葉如营茅而秋花黄山谷所謂一幹一花為蘭一幹數花為蕙者盖因不識蘭草蕙草遂以蘭花強生分别也蘭草與澤蘭同類故陸機言蘭似澤蘭但廣而長節離騷言其綠葉紫莖素枝可紉可佩可藉可膏可浴鄭詩言士女秉蕳應劭風俗通言尚書奏事懷香握蘭禮記言諸侯贄薫大夫贄蘭漢書言蘭以香自燒也若夫蘭花有葉無枝可玩而不可紉佩藉浴秉握膏焚故朱子離騷辨證言古之香草必花葉俱香而燥濕不變故可刈佩今之蘭蕙但花香而葉乃無氣質弱易萎不可刈佩必非古人所指甚明古之蘭似澤蘭而蕙即今之零陵香今之似茅而花有兩種者不知何時誤也熊大古冀越集言世俗之蘭生於深山窮谷决非古時水澤之蘭也陳遯齋閑覽言楚騷之蘭或以為都梁香或以為澤蘭或以為猗蘭當以澤蘭為正今人所種如麥門冬者名幽蘭非真蘭也故陳止齋著盜蘭說以譏之方虚谷訂蘭說言古之蘭草即今之千金草俗名孩兒菊者今之所謂蘭其葉如茅而嫩者根名土續斷因花馥郁故得蘭名也楊升菴云世以如蒲萱者為蘭九畹之受誣久矣又吳草廬有蘭說甚詳云蘭為醫經上品之藥有枝有莖草之植者也今所謂蘭無枝無莖因黄山谷稱之世遂謬指為離騷之蘭冦氏本草亦溺於俗反疑舊說為非夫醫經為實用豈可誤哉今之蘭果可利水殺蠱而除痰癖乎其種盛于蘭末子乃閩人豈不識其土産而反辨析如此世俗至今猶以非蘭為蘭何其惑之難解也嗚呼觀諸儒之明析如此則冦朱二氏之誤可知而醫家用蘭草者當不復疑矣葉修治見澤蘭下氣味辛平無毒杲曰甘寒主治利水道殺蠱毒辟不祥久服益氣輕身不老通神明本經除胸中痰癖别錄生血調氣養營雷斆其氣清香生津止渇潤肌肉治消渇膽癉李杲煑水浴風病馬志消癰腫調月經煎水解中牛馬毒時珍主惡氣香澤可作膏塗髮藏器發明時珍曰按素問云五味入口藏于脾胃以行其精氣津液在脾令人口甘此肥美所發也其氣上溢轉為消渇治之以蘭除陳氣也王氷註云辛能發散故也李東垣治消渇生津飲用蘭葉盖本于此詳見澤蘭下又此草浸油塗髮去風垢令香潤史記所謂羅襦襟解微聞香澤者是也崔寔四時月令作香澤法用清油浸蘭香藿香雞舌香苜蓿葉四種以新綿褁浸胡麻油和猪脂納銅鐺中沸定下少許青蒿以綿幕瓶鐺嘴瀉出瓶收用之附方新一食牛馬毒殺人者省頭草連根葉煎水服即消唐瑶經驗方澤蘭本經中品校正併入嘉祐地笋釋名水香吳普都梁香𢎞景虎蘭本經虎蒲别錄龍棗本經孩兒菊綱目風藥綱目根名地笋嘉祐𢎞景曰生于澤旁故名澤蘭亦名都梁香時珍曰此草亦可為香澤不獨指其生澤旁也齊安人呼為風藥呉普本草一名水香陶氏云亦名都梁今俗通呼為孩兒菊則其與蘭草為一物二種尤可證矣其根可食故曰地笋集解别錄曰澤蘭生汝南諸大澤旁三月三日采隂乾普曰生下地水旁葉如蘭二月生苗赤節四葉相值支節間𢎞景曰今處處有之多生下濕地葉微香可煎油及作浴湯人家多種之而葉小異今山中又有一種甚相似莖方葉小强不甚香既云澤蘭則山中者為非而藥家乃采用之恭曰澤蘭莖方節紫葉似蘭草而不甚香今京下用者是也陶說乃是蘭草莖圎紫蕚白花殊非澤蘭也頌曰今荆徐隨壽蜀梧州河中府皆有之根紫黑色如粟根二月生苗髙二三尺莖幹青紫色作四稜葉生相對如薄荷微香七月開花帶紫白色蕚通紫色亦似薄荷花三月采苗隂乾荆湖嶺南人家多種之壽州出者無花子此與蘭草大抵相類但蘭草生水旁葉光潤根小紫五六月盛而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節七月八月初采微辛此為異爾斆曰凡使須别雌雄大澤蘭莖葉皆圎根青黄能生血調氣與榮合小澤蘭逈别葉上班根頭尖能破血通久積宗奭曰澤蘭出土便分枝梗葉皆如菊但尖長爾呉普言葉似蘭誤矣今蘭葉如麥門冬殊不相似時珍曰呉普所說乃真澤蘭也雷斆所說大澤蘭即蘭草也小澤蘭即此澤蘭也冦宗奭所說澤蘭則是而破呉普之說則非盖由誤認蘭花為蘭草也詳見蘭草正誤下葉修治斆曰凡用大小澤蘭細剉以絹袋盛懸于屋南畔角上令乾用氣味苦微温無毒别錄曰甘普曰神農黄帝岐伯桐君酸無每李當之小温權曰苦辛之才曰防己為之使主治金瘡癰腫瘡膿本經産後金瘡内塞别錄産後腹痛頻産血氣衰冷成勞瘦羸婦人血瀝腰痛甄權産前産後百病通九竅利關節養血氣破宿血消癥瘕通小膓長肌肉消撲損瘀血治鼻血吐血頭風目痛婦人勞瘦丈夫面黄大明發明頌曰澤蘭婦人方中最為急用古人治婦人澤蘭尤甚多時珍曰蘭草澤蘭氣香而温味辛而散隂中之陽足太隂厥隂經藥也脾喜芳香肝宜辛散脾氣舒則三焦通利而正氣和肝鬱散則營衛流行而病邪解蘭草走氣道故能利水道除痰癖殺蠱辟惡而為消渇良藥澤蘭走血分故能治水腫塗癰毒破瘀血消癥瘕而為婦人要藥雖是一類而功用稍殊正如赤白茯苓芍藥補瀉皆不同也雷斆言雌者調氣生血雄者破血通積正合二蘭主治大澤蘭之為蘭草尤可憑據血生於氣故曰調氣生血也又荀子云澤芷以養鼻謂澤蘭白芷之氣芳香通乎肺也附方舊一新四産後水腫血虚浮腫澤蘭防己等分為末每服二錢醋酒下張文仲備急方小兒蓐瘡嚼澤蘭心封之良子母袐錄瘡腫初起澤蘭擣封之良集簡方損傷瘀腫方同上産後隂翻産後隂戸燥熱遂成翻花澤蘭四兩煎湯熏洗二三次再入枯礬煎洗之即安集簡方地笋宋嘉祐氣味甘辛温無毒主治利九竅通血脉排膿治血藏器止鼻洪吐血産後心腹痛産婦可作蔬菜食佳大明子主治婦人三十六疾千金方承澤丸中用之馬蘭日華釋名紫菊時珍曰其葉似蘭而大其花似菊而紫故名俗稱物之大者為馬也集解藏器曰馬蘭生澤旁如澤蘭而氣臭楚詞以惡草喻惡人北人見其花呼為紫菊以其似單瓣菊花而紫也又有山蘭生山側似劉寄奴葉無椏不對生花心微黄赤亦大破血皆可用時珍曰馬蘭湖澤卑濕處甚多二月生苗赤莖白根長葉有刻齒狀似澤蘭但不香爾南人多采汋晒乾為蔬及饅饀入夏髙二三尺開紫花花罷有細子楚辭無馬蘭之名陳氏指為惡草何據根葉氣味辛平無毒主治破宿血養新血止鼻衂吐血合金瘡斷血痢解酒疸及諸菌毒蠱毒生擣塗蛇咬大明主諸瘧及腹中急痛痔瘡時珍發明時珍曰馬蘭辛平能入陽明血分故治血與澤蘭同功近人用治庤漏云有效春夏取生秋冬取乾者不用鹽醋白水煑食并飲其汁或以酒煑焙研糊丸米飲日日服之仍用煎水入鹽少許日日熏洗之醫學集成云治痔用馬蘭根擣傅片時看肉平即去之稍遲恐肉反出也附方新六諸瘧寒熱赤脚馬蘭擣汁入水少許發日早服或入少糖亦可聖濟總錄絞腸沙痛馬蘭根葉細嚼嚥汁立安壽域神方打傷出血竹節草即馬蘭同旱蓮草松香皂子葉即柜子葉冬用皮為末搽入刀口摘𤣥方喉痺口𦂳用地白根即馬蘭根或葉擣汁入米醋少許滴鼻孔中或灌喉中取痰自開孫一松試效方水腫尿澀馬蘭葉一虎口黒豆小麥各一撮酒水各一鍾煎一鍾食前温服以利小水四五日愈楊起簡便方纒蛇丹毒馬蘭丹草擂醋搽之濟急方附錄麻伯别錄有名未用曰味酸無毒主益氣出汗一名君莒一名行草一名道止一名自死生平陵如蘭葉黒厚白褁莖實赤黒九月采根相鳥又曰味苦主隂痿一名鳥葵如蘭香赤莖生山陽五月十五日采隂乾天雄草又曰味甘温無毒主益氣隂痿生山澤中狀如蘭實如大豆赤色益妳草拾遺藏器曰味苦平無毒主五痔脫肛止血炙令香浸酒服生永嘉山谷葉如澤蘭莖赤髙二三尺也香薷音柔品别錄中校正自菜部移入此釋名香葇食療香茸同上香菜千金蜜蜂草綱目時珍曰薷本作葇土萹云葇菜蘇之類是也其氣香其葉柔故以名之草初生曰茸孟詵食療作香戎者非是俗呼蜜蜂草象其花房也集解𢎞景曰家家有此作菜生食十月中取乾之頌曰所在皆種但北土差少似白蘇而葉更細壽春及新安皆有之彼間又有一種石香葇生石上莖葉更細色黄而辛香彌甚用之尤佳呉人以為茵陳用之宗奭曰香薷生山野間荆湖南北二川皆有之汴洺作圃種之暑月亦作蔬菜葉如茵蔯花茸紫連邊成穗凡四五十房為一穗如荆芥穗别是一種香氣時珍曰香薷有野生有家蒔中州人三月種之呼為香菜以充蔬品丹溪朱氏惟取大葉者為良而細葉者香烈更甚今人多用之方莖尖葉有刻缺頗似黄荆葉而小九月開紫花成穗有細子細葉者僅髙數寸葉如落帚葉即石香葇也修治斆曰凡采得去根留葉剉暴乾勿令犯火服至十兩一生不得食白山桃也時珍曰八九月開花着穗時采之隂乾入用氣味辛微温無毒主治霍亂腹痛吐下散水腫别錄去熱風卒轉筋者煑汁頓服半升即止為末水服止鼻衂孟詵下氣除煩熱療嘔逆冷氣大明夏月煑飲代茶可無熱病調中温胃含汁潄口去臭氣汪頴主脚氣寒熱時珍發明𢎞景曰霍亂煑飲無不瘥者作煎除水腫尤良頌曰霍亂轉筋者單煑服之若四肢煩冷汗出而渇者加蓼子同煑服震亨曰香薷屬金與水有徹上徹下之功解暑利小便又治水甚㨗以大葉者濃煎丸服肺得之清化行而熱自降也時珍曰世醫治暑病以香薷飲為首藥然暑有乗凉飲冷致陽氣為隂邪所遏遂病頭痛發熱惡寒煩躁口渇或吐或瀉或霍亂者宜用此藥以發越陽氣散水和脾若飲食不節勞後作䘮之人傷暑大熱大渇汗泄如雨煩躁喘促或瀉或吐者乃勞倦内傷之證必用東垣清暑益氣湯人參白虎湯之類以瀉火益元可也若用香薷之藥是重虚其表而又濟之以熱矣盖香薷乃夏月解表之藥如冬月之用麻黄氣虚者尤不可多服而今人不知暑傷元氣不拘有病無病㮣用代茶謂能辟暑真癡前說夢也且其性温不可熱飲反致吐逆飲者惟宜冷服則無拒格之患其治水之功果有竒效一人妻自腰以下胕腫面目亦腫喘急欲死不能伏枕大便溏泄小便短少服藥罔效時珍診其脉沈而大沈主水大主虚乃病後冐風所致是名風水也用千金神袐湯加麻黄一服喘定十之五再以胃苓湯吞深師薷术丸二日小便長腫消十之七調理數日全安益見古人方皆有至理但神而明之存乎其人而已附方舊四新六一切傷暑和劑局方香薷飲治暑月卧濕當風或生冷不節真邪相干便致吐利或發熱頭痛體痛或心腹痛或轉筋或乾嘔或四肢逆冷或煩悶欲死並主之用香薷一斤厚朴薑汁炙白扁豆微炒各半斤剉散每服五錢水二盞酒半盞煎一盞水中沈冷連進二服立效活人書去扁豆入黄連四兩薑汁同炒黄色用水病洪腫胡冾居士香薷煎用乾香薷五十斤剉入釡中以水淹過三寸煑使氣力都盡去滓澄之微火煎至可丸丸如梧子大一服五丸日三服日漸増之以小便利則愈蘇頌圗經本草通身水腫深師薷术丸治暴水風水氣水通身皆腫服至小便利為效用香薷葉一斤水一斗熬極爛去滓再熬成膏加白术末七兩和丸梧子大每服十丸米飲下日五夜一服外臺秘要四時傷寒不正之氣用水香薷為末熱酒調服一二錢取汗衛生易簡方心煩脇痛連胸欲死者香薷搗汁一二升服肘后鼻衂不止香薷研末水服一錢錄聖濟總舌上出血如鑽孔者香薷煎汁服一升日三服肘後方口中臭氣香薷一把煎汁含之千金方小兒髮遲陳香薷二兩水一盞煎汁三分入猪脂半兩和勻日日塗之永類鈐方白秃慘痛即上方入胡粉和塗之子母秘錄石香葇宋開寳附釋名石蘓集解志曰石香葇生蜀郡陵榮資簡州及南中諸處生山巖石縫中二月八月采苗莖花實俱可用宗奭曰處處有之但山中臨氷附厓處或有之不必山巖石縫也九月十月尚有花時珍曰香薷石香薷一物也但隨所生而名爾生平地者葉大厓石者葉細可通用之氣味辛香温無毒主治調中温胃止霍亂吐瀉心腹脹滿腹痛膓鳴開寳功比香薷更勝蕭炳制硫黄時珍爵牀本經中品釋名爵麻吳普香蘇别錄赤眼老母草唐本時珍曰爵牀不可解按吳氏本草作爵麻甚通集解别錄曰爵牀生漢中川谷及田野恭曰此草生平澤熱田近道旁似香葇葉長而大或如荏且細俗名赤眼老母草時珍曰原野甚多方莖對節與大葉香薷一様但香薷搓之氣香而爵牀搓之不香微臭以此為别莖葉氣味鹹寒無毒時珍曰微辛主治腰脊痛不得搘牀俛仰艱難除熱可作浴湯本經療血脹下氣治杖瘡搗汁塗之立瘥蘇恭赤車使者唐本草釋名小錦枝炮炙論集解恭曰赤車使者苗似香葇蘭香葉莖赤根紫赤色八月九月采根日乾保昇曰生荆州襄州根紫如蒨根二月八月采時珍曰此與爵牀相類但以根色紫赤為别爾根修治斆曰此草原名小錦枝凡用並粗搗以七嵗童子小便拌蒸晒乾入藥氣味辛苦温有毒權曰有小毒主治風冷邪疰蠱毒癥瘕五臟積氣蘇恭治惡風冷氣服之恱澤肌皮好顔色甄權發明頌曰古方治大風風痺有赤車使者酒今人稀用鮮有識者時珍曰上古辟瘟疫邪氣有赤車使者丸此藥不怪苟加詢采必能得之但古今名稱或不同耳假蘇本經中品校正自菜部移入此釋名薑芥别錄荆芥吳普鼠蓂本經𢎞景曰假蘇方藥不復用恭曰此即菜中荆芥也薑芥聲訛爾先居草部今錄入菜部士良曰荆芥本草呼為假蘇假蘇又别是一物葉銳多野生以香氣似蘇故呼為蘇頌曰醫官陳巽言江左人謂假蘇荆芥實兩物蘇恭以本草一名薑芥荆芥聲訛謂為荆芥非矣時珍曰按呉普本草云假蘇一名荆芥葉似落藜而細蜀中生噉之普乃東漢末人去别錄時未逺其言當不謬故唐人蘇恭祖其說而陳士良蘇頌復啟為兩物之疑亦臆說耳曰蘇曰薑曰芥皆因氣味辛香如蘇如薑如芥也集解别錄曰假蘇生漢中川澤頌曰今處處有之葉似落藜而細初生香辛可噉人取作生菜古方稀用近世醫家為要藥並取花實成穗者曝乾入藥又有胡荆芥俗呼新羅荆芥又有石荆芥生山石間體性相近入藥亦同時珍曰荆芥原是野生今為世用遂多栽蒔二月布子生苗炒食辛香方莖細葉似獨帚葉而狹小淡黄綠色八月開小花作穗成房房如紫蘇房内有細子如葶藶子狀黄赤色連穗收采用之正誤藏器曰張鼎食療本草荆芥一名析蓂誤矣䓆蓂自有本條見草部時珍曰汪機本草㑹編言假蘇是白蘇亦誤矣白蘇乃荏也見後莖穗氣味辛温無毒詵曰作菜食乆動渇疾熏人五臟神反驢肉無鱗魚詳後發明下主治寒熱鼠瘻瘰􅊓生瘡破結聚氣下瘀血除濕疸本經去邪除勞渇冷風出汗煑汁服之擣爛醋和傅丁腫腫毒藏器單用治惡風賊風口面喎斜遍身􅍙痺心虚忘事益力添精辟邪毒氣通利血脈傳送五臟不足氣助脾胃甄權主血勞風氣壅滿背脊疼痛虚汗理丈夫脚氣筋骨煩疼及隂陽毒傷寒頭痛頭旋目眩手足筋急士良利五臟消食下氣醒酒作菜生熟皆可食并煎茶飲之以豉汁煎服治暴傷寒能發汗日華治婦人血風及瘡疥為要藥蘇頌産後中風身强直研末酒服孟詵散風熱清頭目利咽喉消瘡腫治項強目中黑花及生瘡隂㿗吐血衂血下血血痢崩中痔漏時珍發明元素曰荆芥辛苦氣味俱薄浮而升陽也好古曰肝經氣分藥也能搜肝氣時珍曰荆芥入足厥隂經氣分其功長於袪風邪散瘀血破結氣消瘡毒盖厥隂乃風木也主血而相火寄之故風病血病瘡病為要藥其治風也賈丞相稱為再生丹許學士謂有神聖功戴院使許為産後要藥蕭存敬呼為一捻金陳無擇隱為舉卿古拜散夫豈無故而得此隆譽哉按唐韻荆字舉卿切芥字古拜切盖二字之反切隱語以秘其方也又曰荆芥反魚蟹河豚之說本草醫方並未言及而稗官小說往往載之按李廷飛延夀書云凡食一切無鱗魚忌荆芥食黄鱨魚後食之令人吐血惟地漿可解與蟹同食動風又蔡條鐵山叢話云予居嶺嶠見食黄顙魚犯薑芥者立死甚於釣吻洪邁夷堅志云呉人魏幾道啖黄顙魚羮後采荆芥和茶飲少頃足痒上徹心肺狂走足皮欲裂急服藥兩日乃解陶九成輟耕錄云凡食河豚不可服荆芥藥大相反予在江隂見一儒者因此䘮命韋航細談云凡服荆芥風藥忌食魚楊誠齊曽見一人立致於死也時珍按荆芥乃日用之藥其相反如此故詳錄之以為警戒又按物類相感志言河豚用荆芥同煑三五次換水則無毒其說與諸書不同何哉大抵養生者寜守前說為戒可也附方舊四新二十七頭項風强八月後取荆芥穗作枕及鋪牀下立春日去之千金方風熱頭痛荆芥穗石膏等分為末每服二錢茶調下永類鈐方風熱牙痛荆芥根烏桕根葱根等分煎湯頻含潄之小兒驚癎一百二十種用荆芥穗二兩白礬半生半枯一兩為末糊丸黍米大硃砂為衣每薑湯下二十丸日二服醫學集成一切偏風口眼喎斜用青荆芥一斤青薄荷一斤同入砂盆内研爛生絹絞汁於甆器中煎成膏漉去滓三分之一將二分日乾為末以膏和丸梧子大每服三十丸湯下早暮各一服忌動風物經驗方中風口噤荆芥穗為末酒服二錢立愈名荆芥散賈似道云此方出曾公談錄前後用之甚驗其子名順者病此已革服之即定真再生丹也産後中風華佗愈風散治婦人産後中風口噤手足瘛㢔如角弓或産後血運不省人事四肢强直或心眼倒築吐瀉欲死用荆芥穗子微焙為末每服三錢豆淋酒調服或童子小便服之口噤則挑齒灌之斷噤則灌入鼻中其效如神大抵産後太眩則汗出而腠理踈則易於中風也時珍曰此方諸書盛稱其妙姚僧坦集驗方以酒服名如聖散云藥下可立待應效陳氏方名舉卿古拜散蕭存敬方用古老錢煎湯服名一捻金王貺指迷方加當歸等分水煎服許叔微本事方云此藥委有竒效神聖之功一婦人産後睡久及醒則昬昬如醉不省人事醫用此藥及交加散云服後當睡必以左手搔頭用之果然昝殷産寳方云此病多因怒氣傷肝或憂氣内鬱或坐草受風而成急宜服此藥也戴原禮證治要訣名獨行散賈似道恱生隨抄呼為再生丹産後迷悶因怒氣發熱迷悶者獨行散用荆芥穗以新瓦半炒半生為末童子小便服一二錢若角弓反張以豆淋酒下或剉散童尿煎服極妙盖荆芥乃産後要藥而角弓反張乃婦人急候得此證者十存一二而已戴原禮要訣産後血運築心倒風縮欲死者取乾荆芥穂𢷬篩末每用二錢七童子小便一酒盞調勻熱服立效口噤者挑齒口閉者灌鼻中皆效近世名醫用之無不如神也圖經本草産後血眩風虚精神昬胃荆芥穗一兩三錢桃仁五錢去皮尖炒為末水服三錢若喘加杏仁去皮尖炒甘草炒各三錢集保命産後下痢大荆芥四五穗於盞内燒存性不得犯油火入麝香少許以沸湯些須調下此藥雖微能愈大病不可忽之深師方産後鼻衂荆芥焙研末童子小便服二錢海止方也婦人良方九竅出血荆芥煎酒通口服之直指方口鼻出血如涌泉因酒色太過者荆芥燒研陳皮湯服二錢不過二服也吐血不止經驗方用荆芥連根洗搗汁半盞服乾穗為末亦可汁聖惠方用荆芥穗為末生地黄調服二錢小便尿血荆芥縮砂等分為末糯米飲下三錢日三服集簡崩中不止荆芥穗於麻油燈上燒焦為末每服二錢童子小便服此夏太君娘娘方也婦人良方痔漏腫痛荆芥煑湯日日洗之簡易方大便下血經驗方用荆芥炒為末每米飲服二錢婦人用酒下亦可拌麫作餛飩食之簡便方用荆芥二兩槐花一兩同炒紫為末每服三錢清茶送下小兒脫肛荆芥皂角等分煎湯洗之以鐵漿塗上亦治子宮脫出經驗方隂㿗腫痛荆芥穂瓦焙為散酒服二錢即消夀域神方小兒臍腫荆芥煎湯洗淨以煨葱刮薄出火毒貼之即消海上方瘰􅊓潰爛􅊓瘡牽至胸前兩腋塊如茄子大或牽至兩肩上四五年不能療者皆治之其效如神武進縣朱守仁傳云其項不能回頭用此數日滅可如瘡爛破者用荆芥根下一段剪碎煎沸湯温洗良久看爛破處紫黒以鍼一刺出血再洗三四次愈用樟腦雄黄等分為未麻油調掃上出水次日再洗再掃以愈為度活法機要丁腫諸毒荆芥一握切以水五升煑取一升分二服冷飲藥性論一切瘡疥荆芥末以地黄自然汁熬膏和丸梧子大每服三十五丸茶酒任下普濟方脚椏濕爛荆芥葉搗傳之簡便方纒脚生瘡荆芥燒灰葱汁調傅先以甘草湯洗之摘𤣥方小兒風寒煩熱有痰不省人事荆芥穂半兩焙麝香片腦各一字為末每茶服半錢大人亦冶普濟方頭目諸疾一切眼􅔂血勞風氣頭痛頭旋目眩荆芥穗為末每酒服三錢龍樹論癃閉不通小腹急痛無問久新荆芥大黄為末等分每温水服二錢小便不通大黄減半大便不通荆芥減半名倒換散普濟方薄荷唐本草校正白菜部移入此釋名菝􅀢音跋活蕃荷菜蕃音鄱吳菝􅀢食性南薄荷衍義金錢薄荷時珍曰薄荷俗稱也陳士良食性本草什菝􅀢揚雄甘泉賦作茇葀呂沈字林作茇䒷則薄荷之為訛稱可知矣孫思邈千金方作蕃荷又方音之訛也今人藥用多以蘇州者為勝故陳士良謂之呉菝􅀢以别胡菝􅀢也宗奭曰世稱此為南薄荷為有一種龍腦薄荷所以别之機曰小兒方多用金錢薄荷謂其葉小頗圓如錢也書作金銀誤矣集解頌曰薄荷處處有之莖葉似荏而尖長經冬根不死夏秋采莖葉曝乾古方稀用或與薤作虀食近世治風寒為要藥故人家多蒔之又有胡薄荷與此相類但味少甘為别生江浙間彼人多以作茶飲之俗呼新羅薄荷近汴洛僧寺或植一二本部天寶單方所謂連錢草者是也又有石薄荷生江南山石間葉微小至冬紫色不聞有别功用恭曰薄荷人家種之亦堪生食一種蔓生者功用相似時珍曰薄荷人多栽蒔二月宿根生苗清明前後分之方莖赤色其葉對生初蒔形長而頭圎及長則尖呉越川湖人多以代茶蘇州所蒔者莖小而氣芳江西者稍粗川蜀者更粗入藥以蘇産為勝物類相感志云凡收薄荷須隔夜以糞水澆之雨後乃悉刈收則性凉不爾不凉也野生者莖葉氣味都相似莖葉氣味辛温無毒思邈曰苦辛平元素曰辛凉斆曰莖性燥甄權曰同薤作虀食相宜新病瘥人勿食之令人虚汗不止瘦弱人久食之動消渇病主治賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煑汁服之發汗大解勞乏亦堪生食唐本作菜久食却腎氣辟邪毒除勞氣令人口氣香潔煎湯洗漆瘡思邈通利關節發毒汗去憤氣破血止痢甄權療隂陽毒傷寒頭痛四季宜食士良治中風失音吐痰日華主傷風頭腦風通關格及小兒風涎為要藥蘇頌杵汁服去心臟風熱孟詵清頭目除風熱李杲利咽喉口齒諸病治瘰􅊓瘡疥風瘙癮疹擣汁含潄去舌胎語澀挼葉塞鼻止衂血塗蜂螫蛇傷時珍發明元素曰薄荷辛凉氣味俱薄浮而升陽也故能去髙巔及皮膚風熱士良曰薄荷能引諸藥入營衛故能發散風寒宗奭曰小兒驚狂壯熱須此引藥又治骨蒸熱勞用其汁與衆藥熬為膏貓食薄荷則醉物相感爾好古曰薄荷手足厥隂氣分藥也能搜肝氣又主肺盛有餘肩背痛及風寒汗出時珍曰薄荷入手太隂足厥隂辛能發散凉能清利專於消風散熱故頭痛頭風眼目咽喉口齒諸病小兒驚熱及瘰􅊓瘡疥為要藥戴原禮氏治貓咬取其汁塗之有效盖取其相制也陸儂師曰薄荷貓之酒也犬虎之酒也桑椹鳩之酒也苬草魚之酒也昝殷食醫心鏡云薄荷煎䜴湯煖酒和飲煎茶生食並宜盖菜之有益者也附方舊二新八清上化痰利咽膈治風熱以薄荷末煉蜜丸芡子大每噙一丸白沙糖和之亦可方簡便單風氣瘙痒用大薄荷蟬蛻等分為末每温酒調服一錢永類鈴方舌胎語蹇薄荷自然汁和白蜜薑汁擦之醫學集成眼弦赤爛薄荷以生薑汁浸一宿晒乾為末每用一錢沸湯炮洗明目經驗方瘰􅊓結核或破未破以新薄荷二斤取汁皂莢一挺水㓎去皮搗取汁同於銀石器内熬膏入連翹末半兩連白青皮陳皮黒牽牛半生半炒各一兩皂莢仁一兩半同搗和丸梧子大每服三十丸煎連翹湯下濟生方衂血不止薄荷汁滴之或以乾者水煑綿褁塞鼻許學士本事方血痢不止薄荷葉煎湯常服普濟水入耳中薄荷汁滴入立效外臺秘要蜂蠆螫傷薄荷葉挼貼之同上火毒生瘡如灸火毒氣入内兩股生瘡汁水淋漓者用薄荷煎汁頻塗立愈張杲醫說積雪草本經中品釋名胡薄荷天寳方地錢草唐本連錢草藥圖海蘇𢎞景曰積雪草方藥不用想此草以寒凉得名耳恭曰此草葉圎如錢荆楚人謂為地錢草徐儀藥草圖名連錢草餘見下集解别録曰積雪草生荆州川谷恭曰此草葉圎大如錢莖細而勁蔓生溪澗側生處亦移頌曰今處處有之八九月采苗葉隂乾用叚成式酉陽雜俎云地錢葉側莖細有蔓延地一曰積雪草一曰連錢草謹按天寳單行方云連錢草生咸陽下濕地亦生臨淄郡濟陽郡池澤中甚香俗間或云圎葉似薄荷江東呉越丹陽郡極多彼人常充生菜食之河北柳城郡盡呼為海蘇好近水生經冬不死咸陽洛陽亦有之或名胡薄荷所在皆有單服療女子小腹庝宗奭曰積雪草南方多有生隂濕地不必荆楚形如水荇而小面亦光㓗微尖為異葉葉各生今人謂之連錢草盖取象也時珍曰按蘇恭注薄荷云一種蔓生功用相似蘇頌經云胡薄荷與薄荷相類但味少甘生江浙間彼人多以作茶飲俗呼為新羅薄荷天寳方所用連錢草是也據二說則積雪草即胡薄荷乃薄荷之蔓生者爾又臞仙庚辛玉册云地錢隂草也生荆楚江淮閩浙間多在宮院寺廟磚砌間草圎似錢引蔓摶地香如細辛不見開花也莖葉氣味苦寒無毒大明曰苦辛頌曰甘平無毒時珍曰取汁結草砂伏硫黄主治大熱惡瘡癰疽浸滛赤熛皮膚赤身熱本經擣傅熱腫丹毒蘇恭主暴熱小兒寒熱腹内熱結擣汁服之藏器單用治瘰􅊓鼠漏寒熱時節来往甄權以鹽挼貼腫毒并風疹疥癬日華胡菝􅀢主風氣壅併攻胸膈作湯飲之立效士良研汁㸃暴赤眼良時珍附方舊二新二熱毒癰腫秋後收連錢草隂乾為末水調傅之生搗亦可冠氏衍義女子少腹痛頌曰天寳單行方云女子忽得小腹中痛月經初来便覺腰中切痛連脊間如刀錐所刺不可忍者衆醫不别謂是鬼疰妄服諸藥終無所益其疾轉増審察前狀相當即用此藥其藥夏五月正放花時即采曝乾搗篩為糝每服二方寸匕和好醋二小合攪勻平旦空腹頓服之每旦一服以知為度如女子隂冷者即取前藥五兩加桃仁二百枚去皮尖熬搗為散以蜜為丸如梧子大每旦空腹以飲及酒下三十丸日再服以愈為度忌麻子蕎麥圖經本草方男女血病九仙驅紅散治嘔吐諸血及便血婦人崩中神效用積雪草五錢當歸酒洗巵子仁酒炒蒲黄炒黄連炒條黄芩酒炒生地黄酒沈陳槐花炒各一錢上部加藕節一錢五分下部加地榆一錢五分水二鍾煎一鍾服神效此方得之甚秘此草與本草主治不同不可曉也董炳集驗方牙痛塞耳用連錢草即積雪草和水溝汚泥同搗爛隨左右塞耳内摘𤣥方蘇别錄中品校正自菜部移入此釋名紫蘇食療赤蘇肘後方桂荏時珍曰蘓從穌音酥舒暢也蘓性舒暢行氣和血故謂之蘇曰紫蘇者以别白蘇也蘇乃荏類而味更辛如桂故爾雅謂之桂荏集解𢎞景曰蘇葉下紫色而氣甚香其無紫色不香似荏者名野蘇不堪用頌曰蘓紫蘓也處處有之以背面皆紫者佳夏采莖葉秋采子有數種水蘇魚蘓山魚蘓皆是荏類各有别條時珍曰紫蘇白蘇皆以二三月下種或宿子在地自生其莖方其葉圎而有尖四圍有鉅齒肥地者面背皆紫瘠地者面青背紫其面背皆白者即白蘇乃荏也紫蘇嫩時采葉和蔬茹之或鹽及梅滷作葅食甚香夏月作熟湯飲之五六月連根采收以火煨其根隂乾則經久葉不落八月開細紫花成穗作房如荆芥穗九月半枯時收子子細如芥子而色黄赤亦可取油如荏油務本新書云凡地畔近道可種蘇以遮六畜收子打油燃燈甚明或熬之以油器物丹房鏡源云蘓子油能柔五金八石沙州記云乞弗虜之地不種五穀惟食蘇子故王禎云蘇有遮䕶之功又有燈油之用不可闕也今有一種花紫蘇其葉細齒宻紐如剪成之狀香色莖子並無異者人稱回囘蘓云斆曰薄荷根莖真似紫蘇但葉不同爾薄荷莖燥紫蘓莖和入藥須以刀刮去青薄皮用之莖葉氣味辛温無毒李廷飛曰不可同鯉魚食生毒瘡主治下氣除寒中其子尤良别録除寒熱治一切冷氣孟詵補中益氣治心腹脹滿止霍亂轉筋開胃下食止脚氣通大小膓日華通心經益脾胃煑飲尤勝與橘皮相宜蘇頌解肌發表散風寒行氣寛中消痰利肺和血温中止痛定喘安胎解魚蟹毒治蛇犬傷時珍以葉生食作羮殺一切魚肉毒甄權發明頌曰若宣通風毒則單用莖去節尢良時珍曰紫蘓近世要藥也其味辛入氣分其色紫入血分故同橘皮砂仁則行氣安胎同藿香烏藥則温中止痛同香附麻黄則發汗解肌同芎藭當歸則和血散血同木𤓰厚朴則散濕解暑治霍亂脚氣同桔梗枳殻則利膈寛膓同杏仁菜菔子則消痰定喘也機曰宋仁宗命翰林院定湯飲奏曰紫蘇熟水第一以其能下胸膈浮氣也盖不知其久則泄人真氣焉宗奭曰紫蘇其氣香其味微辛甘能散今人朝暮飲紫蘇湯甚無益醫家謂芳草致豪貴之􅔂者此有一焉若脾胃寒人多致滑泄往往不覺正誤頌曰蘓主雞瘕本經不著南齊禇澄治李道念食白瀹雞子成瘕以蘇煑服吐出鷄雛而愈也時珍曰按南齊書禇登所用者蒜也非蘓也盖二字相似勝錄誤耳蘇氏欠考矣詳見蒜下附方舊二新一十三感寒上氣蘇葉三兩橘皮四兩酒四升煑一升半分再服肘後方傷寒氣喘不止用赤蘇一把水三升煮一升稍稍飲之肘後勞復食復欲死者蘇葉煑汁二升飲之亦可入生薑豆䜴同煑飲肘後卒啘不止香蘇濃煑頓服三升良千金霍亂脹滿未得吐下用生蘇𢷬汁飲之佳乾蘇煑汁亦可肘後方諸失血病紫蘇不限多少入大碢内水煎令乾去滓熬膏以炒熟赤豆為末和丸梧子大每酒下三五十丸常服之斗門方金瘡出血不止以嫩紫蘓葉桑葉同𢷬貼之永類鈐方攧撲傷損紫蘓𢷬傅之瘡口自合方談野翁試驗傷損血出不止以陳紫蘓葉蘸所出血挼爛傳之血不作膿且愈後無瘢甚妙也永類鈐方風狗咬傷紫蘓葉嚼傅之千金方蛇虺傷人紫蘓葉𢷬飲之千金方食蟹中毒紫蘇煑汁飲二升金匱要略飛絲入目令人舌上生泡用紫蘇葉嚼爛白湯嚥之危氏得效方乳癰腫痛紫蘇煎湯頻服并搗封之海上仙方欬逆短氣紫蘇莖葉二錢人參一錢水一鍾煎服普濟子氣味辛温無毒主治下氣除寒温中别錄治上氣欬逆冷氣及腰脚中濕氣風結氣研汁煑粥長食令人肥白身香甄權調中益五臟止霍亂嘔吐反胃補虚勞肥徤人利大小便破癥結消五膈消痰止𠻳潤心肺日華治肺氣喘急宗奭治風順氣利膈寛膓解魚蟹毒時珍發明𢎞景曰蘇子下氣與橘皮相宜時珍曰蘓子與葉同功發散風氣宜用葉清利上下則宜用子也附方舊三新六順氣利膓紫蘇子麻子仁等分研爛水瀘取汁同米煑粥食之濟生方治風順氣利腸寛中用紫蘇子一升微炒杵以生絹袋盛於三斗清酒中浸三宿炒飲之聖恵一切冷氣紫蘇子髙良薑橘皮等分蜜丸梧子大每服十丸空心酒下藥性論風濕脚氣方同上風寒濕痺四肢攣急脚腫不可踐地用紫蘇子二兩杵碎以水三升研取汁煑粳米二合作粥和葱椒薑豉食之聖恵方消渇變水服此令水從小便出用紫蘇子炒三兩蘿蔔子炒三兩為末每服二錢桑根白皮煎湯服日二次聖濟總錄夢中失精蘇子一升熬杵研末酒服方寸匕日再服外臺秘要食蟹中毒紫蘇子煑汁飲之金匱要略上氣欬逆紫蘇子入水研濾汁同粳米煑粥食簡便方水蘇本經中品校正自菜部移入此釋名雞蘇呉普香蘇肘后龍腦薄荷日用芥蒩音祖芥苴並别錄時珍曰此草似蘇而好生水旁故名水蘇其葉香辛可以煑雞故有龍腦香蘇雞蘇諸名芥蒩芥苴當作芥蘇乃是一名而誤錄爾亦因味辛如芥故名宋惠民和劑局方有龍腦薄荷凡専治血病元呉瑞日用本草謂即水蘇必有所據也周憲王救荒本草言薄荷即雞蘇以生東平龍腦岡者為良故名陳嘉誤本草蒙筌以薄荷種於蘇州府學地名龍腦者得名俱不同何哉集解别錄曰水蘇生九真池澤七月采𢎞景曰方藥不用莫能識九真遼逺亦無能訪之恭曰此蘇生下澤水側苗似旋復兩葉相當大香馥青齊河間人名為水蘇江左名為薺薴呉㑹謂之雞蘇而陶氏更於菜部出雞蘇誤矣保昇曰葉似白薇兩葉相當花生節間紫白色味辛而香六月采莖葉日乾頌曰水蘇處處有之多生水岸旁南人多以作菜江北甚多而人不敢食又江左人謂雞蘇水蘇是兩種陳藏器謂薺薴自是一物非水蘇水蘇葉有鴈齒氣香而辛薺薴葉上有毛稍長氣臭也又茵蔯註云江南所用茵蔯莖葉都是家茵蔯而大髙三四尺氣極芬香味甘辛俗名龍腦薄荷宗奭曰水蘇氣味與紫蘇不同辛而不和然狀一如蘇但面不紫及周圍槎牙如鴈齒耳瑞曰水蘇即雞蘇俗呼為龍腦薄荷時珍曰水蘇薺薴一類二種爾水蘇氣香薺薴氣臭為異水蘇三月生苗方莖中虚葉似蘇葉而微長宻齒面皺色青對節生氣甚辛烈六七月開花成穗如蘇穗水紅色穂中有細子狀如荆芥子可種易生宿根亦自生沃地者苗髙四五尺莖葉氣味辛微温無毒主治下氣殺穀除飲食辟口臭去邪毒辟惡氣久服通神明輕身耐老本經主吐血衂血血崩别錄治肺痿血痢崩中帶下日華主諸氣疾及脚腫蘇頌釀酒清酒及酒煑汁常服治頭風目眩及産後中風惡血不止服之彌妙孟銑作生菜食除胃間酸水時珍發明時珍曰雞蘇之功專於理血下氣清肺辟惡消穀故太平和劑局方治吐血衂血睡血欬血下血血淋口臭口苦口甜喉腥邪熱諸病有龍腦薄荷丸方藥多不錄用治血病果有殊效也附方舊六新九漏血欲死雞蘇煑汁一升服之梅師方吐血下血雞蘇莖葉煎汁飲之梅師方吐血欬𠻳龍腦薄荷焙研末米飲服一錢取效衂血不止梅師方用雞蘇五合香豉二合同檮槎如棗核大納鼻孔中即止聖惠方用雞蘇二兩防風一兩為末每服二錢温水下仍以葉塞鼻末普濟方用龍腦薄荷生地黄等分為冷水服腦熱鼻淵肺壅多涕雞蘇葉麥門冬川芎藭桑白皮炒黄耆炙甘草炙生地黄焙等分為末煉蜜丸梧子大每服四十丸人參湯下聖濟総錄風熱頭痛熱結上焦致生風氣痰厥頭痛用水蘇葉五兩皂莢炙去皮子三兩芫花醋炒焦一兩為末煉蜜丸梧子大每服二十丸食後荆芥湯下聖惠方耳卒聾閉雞蘇葉生搗綿褁塞之孟銑食療沐髮令香雞蘇煑汁或燒灰淋汁沐之普濟頭生白屑方同上暑月目昬多眵淚生龍腦薄荷葉擣爛生絹絞汁㸃之聖濟總錄霍亂困篤雞蘇三兩水二升煎一升分三服聖恵中諸魚毒香蘇濃煎汁飲之良肘後方蛇虺螫傷龍腦薄荷葉研末酒服并塗之易簡方薺薴拾遺釋名臭蘇日華青白蘇時珍曰日華子釋水蘇云一名臭蘇一名青白蘇正此草也誤作水蘇爾其形似水蘇而臭似白蘇而青故有二名集解藏器曰按蘇恭言江左名水蘇為薺薴按水蘇葉有鴈齒氣香而辛薺薴葉稍長其上有毛氣臭亦可為生菜時珍曰薺薴處處平地有之葉似野蘇而稍長有毛氣臭山人茹之味不甚佳莖葉氣味辛温無毒主治冷氣洩痢生食除胸間酸水挼碎傅蟻瘻藏器附錄石薺薴藏器曰味辛温無毒主風冷氣瘡疥瘙痒痔瘻下血煑汁服之生山石間細葉紫花髙一二尺山人用之本草綱目卷十四
