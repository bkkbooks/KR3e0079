body:
  text: 本草綱目卷四十五目録介部李時珍曰介蟲三百六十而龜為之長周官鱉人取互物以時籍春獻鱉蜃秋獻龜魚祭祀供蠯螺蚳以授醢人則介物亦供饌所不廢况可充藥品乎唐宋本草混入蟲魚今析為介部四十六種分二類曰龜鱉曰蚌蛤神農本草經八種梁陶𢎞景注名醫别録五種梁陶𢎞景注唐本草二種唐蘇恭本草拾遺一十種唐陳藏器海藥本草二種唐李珣蜀本草一種蜀韓保升開寶本草二種宋馬志嘉祐本草八種宋掌禹錫圖經本草一種宋蘇頌本草綱目六種明李時珍本草蒙筌一種明陳嘉謨附注魏吳普本草對齊徐之才藥李當之藥録唐甄權藥性宋雷斆炮炙論孫思邈千金唐孟詵張鼎食療南唐陳士良食性楊損之刪繁義宋寇宗奭衍蕭炳四聲大明日華金張元素珍珠囊朱震亨補遺元李呆法象吳瑞日用王好古湯液明汪穎食物明寧源食鑑明汪機會編介之一龜魚類十七種附二種水龜本經秦龜别録蠵龜綱目附龜􅠦玳瑁開寶附散八兒緑毛龜蒙筌瘧龜拾遺鶚龜拾遺旋龜攝龜蜀本賁龜綱目鱉本經納鱉圖經能鱉綱目朱鱉拾遺珠鱉綱目黿拾遺蟹本經鱟嘉祐右附方舊一十九新四十六本草綱目卷四十五目録
  hash: sha256:fb830d3489b2e8d6e030e372dd0c4a82a41a14e32b4f104ce65c5e398f53835b
