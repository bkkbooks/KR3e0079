body:
  text: 本草綱目卷四十六目録介之二蚌蛤類二十九種附一種牡蠣本經蚌嘉祐馬刀本經􅒕䗯嘉祐蜆嘉祐真珠開寶石決明别録海蛤本經文蛤本經蛤蜊嘉祐粉即蛤蟶嘉祐擔羅拾遺車螯嘉祐魁蛤别録子即瓦壟車渠海藥貝子本經紫貝唐本珂唐本石􅨒綱目腳即龜淡菜嘉祐海螺拾遺香即甲甲煎拾遺田螺别録蝸螺别録蓼螺拾遺寄居蟲拾遺海月拾遺附海鏡海燕綱目郎君子海藥右附方舊二十二新九十六本草綱目卷四十六目録
