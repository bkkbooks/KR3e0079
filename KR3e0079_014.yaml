  text: 本草綱目卷三目録百病主治藥上諸風痙風項強癲癎卒厥傷寒熱病瘟疫暑濕火熱諸氣痰飲脾胃吞酸嘈雜噎膈反胃嘔吐噦啘厄逆霍亂泄瀉痢瘧心下痞滿脹滿諸腫黃疸腳氣痿轉筋喘逆咳嗽肺痿肺癰虛損瘵疰邪祟寒熱吐血衄血齒衄血汗咳嗽血諸汗怔忡健忘驚悸煩惑狂躁不眼多眠消渴遺精夢泄赤白濁癃淋溲數遺尿小便血隂痿強中囊癢大便燥結脫肛痔瘻下血瘀血積聚癥瘕諸蟲腸鳴心腹痛脅痛腰痛疝㿉本草綱目卷三目録
