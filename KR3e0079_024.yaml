body:
  text: 本草綱目卷六明李時珍撰火凡一十一種陽火隂火綱目集解李時珍曰火者五行之一有氣而無質造化兩間生殺萬物顯仁藏用神玅無窮火之用其至矣哉愚嘗繹而思之五行皆一惟火有二二者隂火陽火也其綱凡三其目凡十有二所謂三者天火也地火也人火也所謂十有二者天之火四地之火五人之火三也試申言之天之陽火二太陽真火也星精飛火也赤物暾暾降則有灾俗呼火殃天之隂火二龍火也雷火也龍口有火光霹靂之火神火也地之陽火三鑽木之火也擊石之火也戞金之火也地之隂火二石油之火也見石部石腦油水中之火也江湖河海夜動有火或云水神夜出則有火光人之陽火一丙丁君火也心小腸离火也人之陰火二命門相火也起於北海坎火也遊行三焦寄位肝膽三昧之火也純陽乾火也合而言之陽火六陰火亦六共十二焉諸陽遇草而焫得木而燔可以濕伏可以水滅諸陰火不焚草木而流金石得濕愈熖遇水益熾以水折之則光熖詣天物窮方止以火逐之以灰撲之則灼性自消光熖自滅故人之善反於身者上體於天而下驗於物則君火相火正治從治之理思過半矣此外又有蕭丘之寒火蕭丘在南海中上有自然之火春生秋滅生一種木但小焦黒出抱朴子外篇又陛游云火山軍其地鋤耘深入則有烈熖不妨種植亦寒火也澤中之陽熖狀如火熖起於水面出素問王氷註野外之鬼燐其火色青其狀如炬或聚或散俗呼鬼火或云諸血之燐光也金銀之精氣凡金銀玉寳皆夜有火光此皆似火而不能焚物者也至於樟腦猾髓皆能水中發火樟腦見木部猾髓見獸部濃酒積油得熱氣則火自生燒酒醇酒得火氣則自焚油滿百石則火自生油紙油衣油鐵得熱蒸激皆自生火也南荒有厭火之民國近黒崑崙人能食火炭食火之獸原化記云禍斗獸狀如犬而食火糞復為火能燒人屋西戎有食火之鳥駝鳥見禽部火鴉蝙蝠能食熖煙火龜火鼠生於火地火龜見介部龜下火鼠見獸部鼠下此皆五行物理之常而乍聞者目為怪異蓋未深詣乎此理故爾復有至人入水不溺入火不焚入金石無礙步日月無影斯人也與道合真不知其名謂之至人蔡九峰止言木火石火雷火水火蟲火燐火似未盡該也震亨曰太極動而生陽靜而生陰陽動而變陰靜而合而生水火木金土各一其性惟火有二曰君火人火也曰相火天火也火内陰而外陽主乎動者也故凡動皆屬火以名而言形氣相生配於五行故謂之君以位而言生於虛無守位稟命因其動而可見故謂之相天主生物故恒於動人有此生亦恒於動動者皆相火之為也見於天者出於龍雷則木之氣出於海則水之氣也具於人者寄於肝腎二部肝木而腎水也膽者肝之腑膀胱者腎之腑心包絡者腎之配三焦以焦言而下焦司肝腎之分皆陰而下者也天非此火不能生物人非此火不能自生天之火雖出於木而皆本乎地故雷非伏龍非蟄海非附於地則不能鳴不能飛不能波也鳴也飛也波也動而為火者也肝腎之陰悉具相火人而同乎天也然而東垣以火為元氣之賊與元氣不兩立一勝則一負者何哉周子曰神發知矣五性感物而萬事出有知之後五者之性為物所感而動即内經五火也五性厥陽之火與相火相扇則妄動矣火起於妄變化莫測煎熬真陰陰虛則病陰絶則死君火之氣經以暑與濕言之相火之氣經以火言之蓋表其暴悍酷烈甚於君火也故曰相火元氣之賊周子又曰聖人定之以中正仁義而主靜朱子曰必使道心常為一身之主而人心毎聽命焉夫人心聽命而又主之以靜則彼五火之動皆中節相火惟有裨補造化以為生生不息之運用爾何賊之有或曰内經止于六氣言火未言及臟腑也曰岐伯歴舉病機一十九條而屬火者五諸熱瞀瘛皆屬於火諸逆衝上皆屬於火諸躁狂越皆屬於火諸禁鼔慄如喪神守皆屬於火諸病腑腫疼酸驚駭皆屬於火是也劉河間云諸風掉眩屬於肝風火也諸氣膹鬱屬於肺燥火也諸濕腫滿屬於脾濕火也諸痛痒瘡屬於心鬱火也是皆火之為病出於臟腑者然也以陳無擇之通敏猶以暖温為君火日用之火為相火無怪乎後人之聾瞽也燧火綱目集解時珍曰周官司爟氏四時變國火以救時疾季春出火季秋納火民咸從之蓋人之資于火食者疾病夀天生焉四時鑽燧取新火以為飲食之用依嵗氣而使无亢不及所以救民之時疾也榆桞先百木而青故春取之其火色青杏棗之木心赤故夏取之其火色赤柞楢之木理白故秋取之其火色白槐檀之木心黒故冬取之其火色黒桑柘之木肌黄故季夏取之其火色黄天文大人之次于星為心季香龍見于辰而出火于時為暑季秋龍伏于戌而納火于時為寒順天道而百工之作息皆因之以免水旱災祥之流行也後世寒食禁火乃季春改火遺意而俗作介推事謬矣道書云竈下灰火謂之伏龍屎不可爇香事神桑柴火綱目主治癰疽發背不起瘀肉不腐及陰瘡瘰癧流注臁瘡頑瘡然火吹滅日灸二次未潰拔毒止痛已潰補接陽氣去腐生肌凡一切補藥諸膏宜此火煎之但不可㸃艾傷肌時珍發明震亨曰火以暢逹拔引鬱毒此從治之法也時珍曰桑木能利闗節養津液得火則拔引毒氣而袪逐風寒所以能去腐生新抱朴子云一切仙藥不得桑煎不服桑乃箕星之精能助藥力除風寒痺諸痛久服終身不患風疾故也藏器曰桑柴火炙蛇則足見炭火綱目集解時珍曰燒木為炭木久則腐而炭入土不腐者木有生性炭旡生性也塟家用炭能使蟲蟻不入竹木之根自回亦緣其旡生性耳古者冬至夏至前二日垂土炭于衡兩端輕重令勻陽氣至則土重隂氣至則炭重也主治櫟炭火宜煆鍊一切金石藥烰炭火宜烹煎焙炙百藥丸散時珍白炭主治誤吞金銀銅鐵在腹燒紅急為末煎湯呷之甚者刮末三錢井水調服未效再服又解水銀輕粉毒帶火炭納水底能取水銀出也上立炭帶之辟邪惡鬼氣除夜立之户内亦辟邪惡時珍附方新六卒然咽噎炭末蜜丸含嚥千金方白虎風痛日夜走注百節如齧炭灰五升蚯蚓屎一升紅花七捻和熬以醋拌之用故布包二包更互熨痛處取效聖惠方久近腸風下血用𦂳炭三錢枳殻燒存性五錢為末毎服三錢五更米飲下一服天明再服當日見効忌油膩毒物普濟方湯火灼瘡炭末香油調塗濟急方白癩頭瘡白炭燒紅投沸湯中溫洗之取效百一方陰囊濕痒􅀈炭紫蘇葉末摸之經驗方蘆火竹火綱目主治宜煎一切滋補藥時珍發明時珍曰凡服湯藥雖品物專精修治如法而煎藥者鹵莽造次水火不良火候失度則藥亦旡功觀夫茶味之美惡飯味之甘餲皆係于水火烹飪之得失即可推矣是以煎藥須用小心老成人以深罐宻封新水活火先武後文如法服之未有不効者火用陳蘆枯竹取其不強不損藥力也桑柴火取其能助藥力烰炭取其力慢櫟炭取其力𦂳温養用糠及馬屎牛屎者取其暖而能使藥力勻徧也艾火綱目主治灸百病若灸諸風冷疾入硫黄末少許尤良時珍發明時珍曰凡灸艾火者宜用陽燧火珠承日取太陽真火其次則鑽槐取火為良若急卒難備即用真麻油燈或蠟燭火以艾莖燒㸃於炷滋潤灸瘡至愈不痛也其戞金擊石鑽燧入木之火皆不可用邵子云火無體因物以為體金石之火烈於草木之火是以八木者松火難瘥柏火傷神多汗桑火傷肌肉柘火傷氣脉棗火傷内吐血橘火傷榮衛經絡榆火傷骨失志竹火傷筋損目也南齊書載武帝時有沙門從北齊齎赤火來其火赤於常火而小云以療疾貴賤爭取之灸至七炷多得其驗吳興楊道慶虚疾二十年灸之即瘥咸稱為聖火詔禁之不止不知此火何物之火也附録陽燧時珍曰火鏡也以銅鑄成其面凹摩熱向日以艾承之則得火周禮司烜氏以火燧取明火于日是矣火珠見石部水精下神鍼火綱目主治心腹冷痛風寒濕痺附骨陰疽凡在筋骨隠痛者鍼之火氣直達病所甚效時珍發明時珍曰神鍼火者五月五日取東引桃枝制為木針如雞子大長五六寸乾之用時以綿紙三五層櫬于患處將鍼蘸麻油㸃着吹滅乘熱針之又有雷火神針法用熟蘄艾末二兩乳香没藥穿山甲硫黄雄黄草烏頭川烏頭桃樹皮末各一錢麝香五分為末拌艾以厚紙裁成條鋪藥艾於内𦂳卷如指大長三四寸收貯瓶内埋地中七七日取出用時于燈上㸃着吹滅隔紙一層乘熱鍼于患處熱氣直入病處其效更速並忌冷水火鍼綱目釋名燔鍼素問焠鍼素問燒鍼傷寒論煨鍼時珍曰火鍼者素問所謂燔鍼焠鍼也張仲景謂之燒鍼川蜀人謂之煨鍼其法麻油滿盞以燈草二七莖㸃燈將鍼頻塗麻油燈上燒令通赤用之不赤或冷則反損人且不能去病也其鍼須用火筯鐵造之為佳㸃穴墨記要明白差則無功主治風寒筋急攣引痺痛或癱緩不仁者鍼下疾出急按孔穴則疼止不按則疼甚癥塊結積冷病者鍼下慢出仍轉動以發出汚濁癰疽發背有膿無頭者鍼令膿潰勿按孔穴凡用火鍼太深則傷經絡太淺則不能去病要在消息得中鍼後發熱惡寒此為中病凡面上及夏月濕熱在兩脚時皆不可用此時珍發明時珍曰素問云病在筋調之筋燔鍼刼刺其下及筋急者病在骨調之骨焠鍼藥熨之又靈樞經叙十二經筋所發諸痺痛皆云治在燔鍼刼刺以知為度以痛為輸又云經筋之病寒則反折筋急熱則縱弛不收陰痿不用焠刺者焠寒急也縱緩不收者無用燔鍼觀此則燔鍼乃為筋寒而急者設以熱治寒正治之法也而後世以鍼積塊亦假火氣以散寒涸而發出汚濁也或又以治癰疽者則是以從治之法潰泄其毒氣也而昧者以治傷寒熱病則非矣張仲景云太陽傷寒加温鍼必發驚營氣微者加燒鍼則血流不行更發熱而煩燥太陽病下之心下痞表裏俱虛隂陽俱竭復加燒鍼胸煩面色青黄膚潤者難治此皆用鍼者不知往哲設鍼之理而謬用以致害人也又凡肝虚目昏多淚或風赤及生翳膜頑厚成病後生白膜失明或五臟虛勞風熱上衝于目生翳並宜熨烙之法蓋氣血得温則宣流得寒則凝澀故也其法用平頭鍼如翳大小燒赤輕輕當翳中烙之烙後翳破即用除翳藥傅㸃燈火綱目主治小兒驚風昏迷搐搦竄視諸病又治頭風脹痛視頭額太陽絡脈盛處以燈心蘸麻油㸃燈焠之良外痔腫痛者亦焠之油能去風解毒火能通經也小兒初生因冒寒氣欲絶者勿斷臍急烘絮包之將胎衣烘熱用燈炷於臍下往來燎之煖氣入腹内氣囘自甦又燒銅匙柄熨烙眼弦内去風退赤甚妙時珍發明時珍曰凡燈惟胡麻油蘇子油然者能明目治病其諸魚油諸禽獸油諸菜子油綿花子油桐油豆油石腦油諸燈烟皆能損目亦不治病也附方新七攪腸沙痛陰陽腹痛手足冷但身上有紅㸃以燈草蘸油㸃火焠於㸃上濟急方小兒諸驚仰向後者燈火焠其𩕄門兩眉齊之上下眼翻不下者焠其臍之上下不省人事者焠其手足心心之上下手拳不開口往上者焠其頂心兩手心撮口出白沫者焠其口上下手足心風小兒驚秘訣百蟲咬傷以燈火熏之出水妙濟急方楊梅毒瘡方廣心法附餘用鈆汞結砂銀硃各二錢白花蛇一錢為末作紙撚七條初日用三條自後日用一條香油㸃燈于烘爐中放被内蓋卧勿透風須食飽口含椒茶熱則吐去再含神燈熏法用銀硃二錢孩兒茶龍掛香皂角子各一錢為末以紙卷作燈心大長三寸毎用一條安燈盞内香油浸㸃置水桶中以被圍坐用鼻吸烟嚥之口含冷茶熱則吐去日熏二次三日後口中破皮以陳醫水潄之神燈照法治楊梅瘡年久破爛坑䧟者用銀硃水粉線香各三錢乳香没藥各五分片腦二分為末以紙卷作撚浸油㸃燈照瘡日三次七日見効須先服通聖散數帖臨時口含椒茶以防毒氣入齒也年深疥癬遍身延蔓者硫黄艾葉研勻作撚浸油㸃燈于被中薫之以油塗口鼻耳目露之集𤣥方燈花拾遺氣味缺主治傅金瘡止血生肉藏器小兒邪熱在心夜啼不止以二三顆燈心湯調抹乳吮之時珍發明時珍曰昔陸賈言燈花爆而百事喜漢書藝文志有占燈花術則燈花固靈物也錢乙用治夜啼其亦取此義乎我明宗室富順王一孫嗜燈花但開其氣即哭索不已時珍胗之曰此癖也以殺蟲治癖之藥丸服一料而愈燭燼綱目集解時珍曰燭有蜜蠟燭蟲蠟燭柏油燭牛脂燭惟蜜蠟桕油者燼可入藥氣味缺主治丁腫同胡麻鍼砂等分為末和醋傅之治九漏同陰乾馬齒莧等分為末以泔水洗淨和臘猪脂傅之日三上時珍本草綱目卷六
