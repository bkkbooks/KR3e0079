body:
  text: 本草綱目卷十三目録草之二山草類下三十九種黃連本經胡黃連開寶黃芩本經秦艽本經柴胡本經前胡本經防風本經獨活羌活本經土當歸綱目都管草圖經升麻本經苦參本經白鮮本經延胡索開寶貝母本經山慈姑嘉祐石蒜圖經水仙會編白茅本經地筋州録即菅茅芒拾遺龍膽本經細辛本經杜衡本經辛附木細及己别録鬼督郵唐本徐長卿本經白微本經白前别録草犀拾遺叉子股海藥吉利草綱目硃砂根綱目辟虺雷拾遺錦地羅綱目紫金牛圖經拳參圖經鐵線草圖經金絲草綱木右附方舊七十一新二百一十四本草綱目卷十三
