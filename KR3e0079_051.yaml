body:
  text: 本草綱目卷十八下明李時珍撰草之七蔓草類四十九種内附二十種外附録諸藤十九種補遺一種萆薢别錄中品釋名赤節别錄百枝吳普竹木炮炙論白菝葜時珍曰萆薢名義未詳日華本草言時人呼為白菝葜象形也赤節百枝與狗脊同名集解别錄曰萆薢生真定山谷二月八月采根曝乾𢎞景曰今處處有之根似菝葜而小異根大不甚有角節色小淺恭曰此有二種莖有刺者根白實無刺者根虚軟軟者為勝蔓生葉似薯蕷頌曰今河峽汴東荆蜀諸郡皆有之作蔓生苗葉俱青葉作三又似山薯又似緑豆葉花有黄紅白數種亦有無花結白子者根黄白色多節三指許大春秋采根曝乾令成徳軍所産者根亦如山薯而體硬其苗引蔓葉似蕎麥子三稜不拘時月采根利刀切片曝乾用時珍曰萆薢蔓生葉似菝葜而大如盌其根長硬大者如商陸而堅今人皆以土茯苓為萆薢誤矣莖葉根苗皆不同吳普本草又以萆薢為狗脊亦誤矣詳狗脊下宋史以懷慶萆薢充貢根氣味苦平無毒别錄曰甘之才曰薏苡為之使畏葵根大黄柴胡前胡主治腰脊痛强骨節風寒濕周痺惡瘡不瘳熱氣本經傷中恚怒隂痿失溺老人五緩關節老血别錄冷風􅍙痺腰脚癱緩不遂手足驚掣男子䐴腰痛久冷腎間有膀胱宿水甄權頭旋癎疾補水臟堅筋骨益精明目中風失音大明補肝虛好古治白濁莖中痛痔瘻壞瘡時珍發明時珍曰萆薢足陽明厥隂經藥也厥隂主筋屬風陽明主肉屬濕萆薢之功長于去風濕所以能治緩弱􅍙痺遺濁惡瘡諸病之屬風濕者萆薢菝葜土茯苓三物形雖不同而主治之功不相逺豈亦一類數種乎雷斆炮炙論序云囊皺漩多夜煎竹木竹木萆薢也漩多白濁皆是濕氣下流萆薢能除陽明之濕而固下焦故能去濁分清楊倓家藏方治真元不足下焦虚寒小便頻數白濁如膏有萆薢分清飲正此意也又楊子建萬全䕶命方云凡人小便頻數不計度數便時莖内痛不可忍者此疾必先大腑祕熱不通水液只就小腸大腑愈加乾竭甚則渾身熱心躁思涼水如此即重證也此疾本因貪酒色積有餘毒腐物瘀血之類隨虚水入于小腸故便時作痛也不飲酒者必平生過食辛熱葷膩之物又因色傷而然此乃小便頻數而痛與淋證澀而痛者不同也宜用萆薢一兩水浸少時以鹽半兩同炒去鹽為末每服二錢水一盞煎八分和滓服之使水道轉入大腸仍以葱湯頻洗穀道令氣得通則小便數及痛自減也附方舊二新三腰脚痺軟行履不穩者萆薢二十四分杜仲八分搗篩每旦温酒服三錢七禁牛肉利唐徳宗貞元廣方小便頻數川萆薢一斤為末酒糊丸梧子大毎鹽酒下七十丸方集𤣥白濁頻數漩面如油澄下如膏乃真元不足下焦虚寒萆薢分清飲用萆薢石菖蒲益智仁烏藥等分每服四錢水一盞入鹽一捻煎七分食前温服日一服效乃止腸風痔漏如聖散用萆薢貫衆去土等分為末每服三錢温酒空心服之孫尚藥傳家祕寶方頭痛發汗萆薢旋覆花虎頭骨酥炙等分為散欲發時以温酒服二錢暖臥取汗立瘥聖濟錄菝葜上蒲入切下棄入切别錄中品釋名菝􅀢同葜金剛根日華鐵菱角綱目王𤓰草日華時珍曰菝􅀢猶􅀈䂒也􅀈䂒短也此草莖蔓强堅短小故名菝􅀢而江浙人謂之菝葜根亦曰金剛根楚人謂之鐵菱角皆狀其堅而有尖刺也鄭樵通志云其葉頗近王𤓰故名王𤓰草集解别錄曰生山野二月八月采根曝乾𢎞景曰此有三種大畧根苗並相類菝葜莖紫而短小多刺小減萆薢而色深人用作飲恭曰陶云三種乃狗脊菝葜萆薢相類非也萆薢有刺者葉粗相類根不相類萆薢細長而白色菝葜根作塊結黄赤色殊非狗脊之流頌曰今近道及江浙州郡多有之苗莖成蔓長二三尺有刺其葉如冬青烏藥葉而差大秋生黄花結黒子如櫻桃大其根作塊人呼金剛根時珍曰菝葜山野中甚多其莖似蔓而堅强植生有刺其葉團大狀如馬蹄光澤似柿葉不類冬青秋開黄花結紅子其根甚硬有硬鬚如刺其葉煎飲酸濇野人采其根葉入染家用名鐵菱角吳普本草以菝葜為狗脊非矣詳見狗脊下根氣味甘酸平温無毒主治腰背寒痛風痺益血氣止小便利别錄治時疾瘟瘴大明補肝經風虚好古治消渇月崩下利時珍發明時珍曰菝葜足厥隂少隂藥氣温味酸性濇而收與萆薢彷彿孫真人元旦所飲辟邪屠蘇酒中亦用之頌曰取根浸赤汁煮粉食辟㢓附方新五小便滑數金剛骨為末毎服三錢温酒下睡時儒門事親方沙石淋疾重者取去根本用菝葜二兩為末每米飲服二錢後以地椒煎湯浴腰腹須臾即通也聖濟錄消渇不止拔穀即菝葜㕮咀半兩水三盞烏梅一個煎一盞温服普濟方下痢赤白金剛根蠟茶等分為末白梅肉搗丸芡子大毎服五七丸小兒三丸白痢甘草湯下赤痢烏梅湯下易衛生簡方風毒脚弱痺滿上氣田舍貧家用此最良菝葜洗剉一斛以水三斛煮取九斗漬麴去滓取一斛漬飲如常釀酒任意日飲之肘後方土茯苓綱目校正併入拾遺禹餘糧釋名土萆薢綱目刺猪苓圖經山猪糞綱目草禹餘糧拾遺仙遺糧綱目冷飯團綱目硬飯綱目山地栗綱目時珍曰按陶𢎞景注石部禹餘糧云南中平澤有一種藤生葉如菝葜根作塊有節似菝葜而色赤味如薯蕷亦名禹餘糧言昔禹行山乏食采此充糧而棄其餘故有此名觀陶氏此説即今土茯苓也故今尚有仙遺糧冷飯團之名亦其遺意陳藏器本草草禹餘糧蘇頌圖經猪苓下刺猪苓皆此物也今皆併之茯苓猪苓山地栗皆象形也俗又名過岡龍謬稱也集解藏器曰草禹餘糧生海畔山谷根如盞連綴半在土上皮如茯苓肉赤味澀人取以當穀食不飢頌曰施州一種刺猪苓蔓生春夏采根削皮焙乾彼土人用傅瘡毒殊效時珍曰土茯苓楚蜀山箐中甚多蔓生如蓴莖有細㸃其葉不對狀頗類大竹葉而質厚滑如瑞香葉而長五六寸其根狀如菝葜而圓其大若雞鴨子連綴而生逺者離尺許近或數寸其肉軟可生啖有赤白二種入藥用白者良按中山經云鼓鐙之山有草焉名曰榮莫其葉如柳其本如雞卵食之已風恐即此也昔人不知用此近時𢎞治正徳間因楊梅瘡盛行率用輕粉藥取效毒留筋骨漬爛終身至人用此遂為要藥諸醫無從考證往往指為萆薢及菝葜然其根苗逈然不同宜參考之但其功用亦頗相近葢亦萆薢菝葜之類也根氣味甘淡平無毒時珍曰忌茶茗主治食之當穀不飢調中止洩徤行不睡藏器徤脾胃强筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰腫解汞粉銀朱毒時珍發明机曰近有好淫之人多病楊梅毒瘡藥用輕粉愈而復發久則肢體拘攣變為癰漏延綿歲月竟致廢篤惟剉土萆薢三兩或加皂莢牽牛各一錢水六盌煎三盌分三服不數劑多瘥葢此疾始由毒氣干於陽明而發加以輕粉燥烈久而水衰肝挾相火來凌脾土土屬濕主肌肉濕熱鬰蓄于肌腠故發為癰腫甚則拘攣内經所謂濕氣害人皮肉筋骨是也土萆薢甘淡而平能去脾濕濕去則營衛從而筋脉柔肌肉實而拘攣癰漏愈矣初病服之不效者火盛而濕未鬱也此藥長于去濕不能去熱病久則熱衰氣耗而濕鬰為多故也時珍曰楊梅瘡古方不載亦無病者近時起于嶺表傳及四方葢嶺表風土卑炎嵐瘴熏蒸飲啖辛熱男女淫猥濕熱之邪積畜旣深發為毒瘡遂致互相𫝊染自南而北遍及海宇然皆淫邪之人病之其類有數種治之則一也其證多屬厥隂陽明二經而兼乎他經邪之所在則先發出如兼少隂太隂則發于咽㗋兼太陽少陽則發于頭耳之類葢相火寄于厥隂肌肉屬于陽明故也醫用輕粉銀朱劫劑五七日即愈葢水銀性走而不守加以鹽礬升為輕粉銀朱其性燥烈善逐痰涎涎乃脾之液此物入胃氣歸陽明故涎被劫隨火上升從㗋頰齒縫而出故瘡即乾痿而愈若服之過劑及用不得法則毒氣竄入經絡筋骨之間莫之能出痰涎旣去血液耗涸筋失所養營衛不從變為筋骨攣痛發為癰毒疳漏久則生蟲為癬手足皺裂遂成廢痼惟土茯苓氣平味甘而淡為陽明本藥能徤脾胃去風濕脾胃徤則營衛從風濕去則筋骨利故諸證多愈此亦得古人未言之妙也今醫家有搜風解毒湯治楊梅瘡不犯輕粉病深者月餘淺者半月即愈服輕粉藥筋骨攣痛癱瘓不能動履者服之亦效其方用土茯苓一兩薏苡仁金銀花防風木𤓰木通白鮮皮各五分皂莢子四分氣虚加人參七分血虚加當歸七分水二大盌煎飲一日三服惟忌飲茶及牛羊雞鵞魚肉燒酒法麫房勞葢祕方也附方新六楊梅毒瘡鄧筆峰雜興方用冷飯團四兩皂角子七個水煎代茶飲淺者二七深者四七見效金一方冷飯團一兩五加皮皂角子苦參各三錢銀花一錢用好酒煎日一服小兒楊梅瘡起于口内延及遍身以土萆薢末乳汁調服月餘自愈外科發揮骨攣癰漏薛已外科發揮云服輕粉致傷脾胃氣血筋骨疼痛久而潰爛成癰連年累月至于終身成廢疾者土萆薢一兩有熱加芩連氣虚加四君子湯血虚加四物湯水煎代茶月餘即安朱氏集騐方用過山龍四兩即硬飯加四物湯一兩皂角子七個川椒四十九粒燈心七根水煎日飲瘰癧漬爛冷飯團切片或為末水煎服或入粥内食之須多食為妙江西所出色白者良忌鐵器發物陸氏積徳堂方白斂本經下品釋名白草本經白根别錄兔核别錄貓兒卵綱目崑崙别錄宗奭曰白斂服餌方少用惟斂瘡方多用之故名曰斂時珍曰兔核貓兒卵皆象形也崑崙言其皮黑也集解别錄曰白斂生衡山山谷二月八月采根曝乾𢎞景曰近道處處有之作藤生根如白芷破片竹穿日乾恭曰根似天門冬一株下有十許根皮赤黑肉白如芍藥不似白芷蔓生枝端有五葉所在有之頌曰今江淮及荆襄懷孟商齊諸州皆有之二月生苗多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵而長三五枚同一窠皮黑肉白一種赤斂花實功用皆同但表裏俱赤爾根氣味苦平無毒别錄曰甘微寒權曰有毒之才曰代赭為之使反烏頭主治癰腫疽瘡散結氣止痛除熱目中赤小兒驚癎温瘧女子隂中腫痛帶下赤白本經殺火毒别錄治發背瘰癧面上疱瘡腸風痔漏血痢刀箭瘡撲損生肌止痛大明解狼毒毒時珍發明𢎞景曰生取根搗傳癰腫有效頌曰今醫治風及金瘡面藥方多用之往往與白及相須而用附方舊三新十發背初起水調白斂末塗之肘後方丁瘡初起方同上聖惠方一切癰腫權曰白斂赤小豆䒽草為末雞子白調塗之陶隱居方用白斂二分藜蘆一分為末酒和貼之日三上面鼻酒皶白斂白石脂杏仁各半兩為末雞子清調塗旦洗御藥院方面生粉刺白斂二分杏仁半分雞屎白一分為末蜜和雜水拭面肘後方凍耳成瘡白斂黄蘗等分為末生油調搽談埜翁方湯火灼爛白斂末傅之外臺方諸物哽咽白斂白芷等分為末水服二錢聖惠方鐵刺諸哽及竹木哽在咽中白斂半夏泡等分為末酒服半錢日二服聖惠方刺在肉中方同上胎孕不下白斂生半夏等分為末滴水丸梧子大每榆皮湯下五十丸保命集風痺筋急腫痛屈轉易常處白斂二分熟附子一分為末每酒服半刀圭日二服以身中熱行為候十日便覺忌猪肉冷水方千金諸瘡不斂白斂赤斂黄蘗各三錢炒研輕粉一錢用葱白漿水洗淨傅之瑞竹堂方女萎李當之本草集解恭曰女萎葉似白斂蔓生花白子細荆襄之間名為女萎亦名蔓楚用苗不用根與萎㽔全别今太常謬以為白頭翁者是也時珍曰諸家誤以女萎解葳㽔正誤見葳㽔下修治斆曰凡采得隂乾去頭并白蕊於槐砧上剉拌豆淋酒蒸之從已至未出晒乾氣味辛温無毒主治止下痢消食當之風寒洒洒霍亂洩痢腸鳴遊氣上下無常驚癎寒熱百病出汗唐本附方新三久痢脱肛女萎切一升燒熏之楊氏産乳方䘌下不止女萎雲實各一兩川烏頭二兩桂心五錢為末蜜丸梧子大毎服五丸水下一日三服肘後方身體癧瘍斑駁女葳膏用魯國女葳白芷各一分附子一枚雞舌香木香各二分為末臘猪脂七合和煎入麝香一錢以浮石磨破日擦之古令錄騐赭魁本經下品釋名時珍曰其根如魁有汁如赭故名魁乃酒器名集解别錄曰生山谷中二月采𢎞景曰狀如小芋肉白皮黄近道亦有恭曰赭魁大者如斗小者如升蔓生草木上葉似杜衡陶所説乃土卵也土卵不堪藥用梁漢人蒸食之名黄獨非赭魁也保昇曰苗蔓延生葉似蘿藦根若菝葜皮紫黑肉黄赤大者輪囷如升小者如拳所在有之時珍曰赭魁閩人用之染青􅣙中云易上色沈括筆談云本草所謂赭魁皆未詳審今南中極多膚黑肌赤似何首烏切破中有赤理如檳榔有汁赤如赭彼人以染皮製靴閩人謂之餘糧本草石部禹餘糧陶氏所引乃此物也謹按沈氏所説赭魁甚明但謂是禹餘糧者非矣禹餘糧乃今之土茯苓可食故得糧名赭魁不可食豈得稱糧耶土卵即土芋也見菜部根氣味甘平無毒恭曰有小毒主治心腹積聚除三蟲本經鵝抱宋圖經集解頌曰生宜州山林下附石而生作蔓似大豆其根形似萊菔大者如三升器小者如拳二月八月采根切片隂乾用氣味苦寒無毒主治風熱上壅咽㗋腫痛及解蠻箭藥毒搗末酒服有效亦消風熱結毒酒摩塗之立愈蘇頌伏雞子根拾遺釋名承露仙集解藏器曰生四明天台山蔓延生葉圓薄似錢根似鳥形者良氣味苦寒無毒主治解百藥毒諸熱煩悶急黄天行黄疸瘧瘴中惡寒熱頭痛疽瘡馬黄牛瘡水磨服之新者尤佳亦傅癰腫與陳家白藥同功藏器附錄仰盆拾遺藏器曰味辛温有小毒水磨服少許治蠱飛尸㗋痺亦磨傅皮膚惡腫生東陽山谷苗似承露仙根圓如仰盆狀大如雞卵人肝藤拾遺藏器曰主解諸藥毒遊風手脚軟痺並生研服之塗之生嶺南山石間引蔓而生葉有三椏花紫色與伏雞子同名承露仙而伏雞子葉圓時珍曰以根三兩磨汁或煎濃汁服並解蠱毒千金藤宋開寶校正自木部移入此集解藏器曰千金藤有數種南北名模不同大畧主療相似或是皆近干藤也生北地者根大如指色似漆生南土者黄赤如細辛舒廬間有一種藤似木蓼又有烏虎藤遶樹生冬青亦名千金藤江西林間有草生葉頭有癭子似鶴膝葉如柳亦名千金藤又一種似荷葉只大如錢許亦呼為千金藤又名古藤主痢及小兒大腹千金者以貴為名豈俱一物亦狀異而名同耶若取的稱未知孰是又云嶺南有陳思岌亦名千金藤氣味缺主治一切血毒諸氣霍亂中惡天行虚勞瘧瘴痰嗽不利癰腫大毒藥石發癲癎悉主之藏器附錄陳思岌拾遺藏器曰出嶺南山野蔓生如小豆根及葉辛香一名石黄香一名千金藤其根味辛平無毒解諸藥毒熱毒丹毒癰腫天行壯熱㗋痺蠱毒並磨汁服之亦磨塗瘡腫珣曰味苦平浸酒服治風補益輕身九仙子綱目釋名仙女嬌集解時珍曰九仙子出均州太和山一根連綴九枚大者如雞子小者如半夏白色二月生苗蔓髙六七尺莖細而光葉如烏桕葉而短扁不圓每葉椏生子枝或一或二裊裊下垂六七月開碎青黄色花隨即結實碎子叢簇如穀精草子狀九月采根氣味苦涼無毒主治咽痛㗋痺散血以新汲水或醋磨汁含嚥甚良時珍山豆根宋開寶釋名解毒綱目黄結綱目中藥頌曰其蔓如大豆因以為名集解頌曰山豆根生劍南及宜州果州山谷今廣西亦有以忠州萬州者為佳苗蔓如豆葉青經冬不凋八月采根廣南者如小槐髙尺餘石鼠食其根故嶺南人捕鼠取腸胃曝乾解毒攻熱効氣味甘寒無毒時珍曰按沈括筆談云山豆根味極苦本草言味甘大誤矣主治解諸藥毒止痛消瘡腫毒發熱欬嗽治人及馬急黄殺小蟲開寶含之嚥汁解咽㗋腫毒極妙蘇頌研末湯服五分治腹脹喘滿酒服三錢治女人血氣腹脹又下寸白諸蟲丸服止下痢磨汁服止卒患熱厥心腹痛五種痔痛研汁塗諸熱腫秃瘡蛇狗蜘蛛傷時珍附方舊十新三解中蠱毒密取山豆根和水研服少許未定再服已禁聲者亦愈五般急黄山豆根末水服二錢若帶蠱氣以酒下霍亂吐利山豆根末橘皮湯下三錢赤白下痢山豆根末蜜丸梧子大毎服二十丸空腹白湯下三服自止已上並備急方水蠱腹大有聲而皮色黒者山豆根末酒服二錢聖惠方卒患腹痛山豆根水研半盞服入口即定頭風熱痛山豆根末油調塗兩太陽頭上白屑山豆根末浸油日塗之牙齦腫痛山豆根一片含于痛所已上並備急方㗋中發癕山豆根磨醋噙之追涎即愈勢重不能言者頻以雞翎掃入喉中引涎出就能言語永類方麩豆諸瘡煩熱甚者水研山豆根汁服少許經騐方疥癬蟲瘡山豆根末臘猪脂調塗備急方喉風急證牙關𦂳閉水穀不下山豆根白藥等分水煎噙之嚥下二三口即愈楊清叟外科黄藥子宋開寶校正自本部移入此釋名木藥子綱目大苦綱目赤藥圖經紅藥子時珍曰按沈括筆談云本草甘草注引郭璞注爾雅云蘦大苦者云即甘草也蔓生葉似薄荷而色青黄莖赤有節節有枝相當此乃黄藥也其味極苦故曰大苦非甘草也集解頌曰黄藥原出嶺南今䕫陜州郡及明越秦隴山中亦有之以忠州萬州者為勝藤生髙三四尺根及莖似小桑十月采根秦州出者謂之紅藥子施州謂之赤藥葉似蕎麥枝梗赤色七月開白花其根濕時紅赤色曝乾即黄本經有藥實根云生蜀郡山谷蘇恭云即藥子也用其核仁疑即黄藥之實但言葉似杏其花紅白色子肉味酸此為不同時珍曰黄藥子今處處人栽之其莖髙二三尺柔而有節似藤實非藤也葉大如拳長三寸許亦不似桑其根長者尺許大者圍二三寸外褐内黄亦有黄赤色者肉色頗似羊蹄根人皆擣其根入染藍􅣙中云易變色也唐蘇恭言藥實根即藥子宋蘇頌遂以為黄藥之實然今黄藥冬枯春生開碎花無實蘇恭所謂藥子亦不專指黄藥則蘇頌所以言亦未可憑信也根氣味苦平無毒大明曰涼治馬心肺熱疾主治諸惡腫瘡瘻喉痺蛇犬咬毒研水服之亦含亦塗開寶涼血降火消癭解毒時珍發明頌曰孫思邈千金月令方療忽生癭疾一二年者以萬州黄藥子半斤須𦂳重者為上如輕虚即是他州者力慢須用加倍取無灰酒一斗投藥入中固濟瓶口以糠火燒一復時待酒冷乃開時時飲一盃不令絶酒氣經三五日後常把鏡自照覺消即停飲不爾便令人項細也劉禹錫傳信方亦著其效云得之邕州從事張岧岧目擊有效復試其騐如神其方並同惟小有異處是燒酒候香出外瓶頭有津出即止不待一宿火不可得猛耳附方舊三新三項下癭氣黄藥子一斤洗剉酒一斗浸之每日早晚常服一盞忌一切毒物及戒怒仍以線逐日度之乃知其效也斗門方吐血不止藥子一兩水煎服聖惠方咯血吐血百一選方用蒲黄黄藥子等分為末掌中䑛之王衮博濟方用黄藥子漢防己各一兩為末毎服一錢小麥湯食後調服一日二服鼻衂不止黄藥子為末每服二錢煎淡膠湯下良久以新水調麪一匙頭服之兵部手集方只以新汲水磨汁一盌頓服簡要濟衆方産後血運惡物冲心四肢冰冷唇青腹脹昏迷紅藥子一兩頭紅花一錢水二盞婦人油釵二隻同煎一盞服大小便俱利血自下也禹講師經騐方天泡水瘡黄藥子末搽之集簡方解毒子唐本草釋名地不容唐本苦藥子圖經集解恭曰地不容生川西山谷采無時鄉人呼為解毒子也頌曰出戎州蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黄白色外皮微粗褐纍纍相連如藥實而圓大采無時又開州與元府出苦藥子大抵與黄藥相類春采根曝乾亦入馬藥用時珍曰四川志云苦藥子出忠州性寒解一切毒川蜀諸處皆有即解毒子也或云卭州苦藥子即黄藥子方言稱呼不同耳理亦近之根氣味苦大寒無毒主治解蠱毒止煩熱辟瘴癘利喉閉及痰毒唐本治五臟邪氣清肺壓熱蘇頌消痰降火利咽喉退目赤時珍附方新二咽喉腫痛水漿不下苦藥山豆根甘草硝石各一分射干柑皮升麻各半兩為末蜜丸噙之聖惠方眉稜骨痛熱毒攻眼頭痛眉痛壯熱不止解毒子木香川大黄各三分為末漿水調膏攤貼乾即易之普濟方附錄奴會子海藥珣曰味辛平無毒主小兒無辜冷疳虚渇脱肛骨立痩損脾胃不磨劉五娘方用為煎服生西國諸戎大小如苦藥子藥實根本經曰味辛温無毒主邪氣諸痺疼酸續絶傷補骨髓一名連木别錄曰生蜀郡山谷采無時恭曰此藥子也當今盛用胡名那疏出通州渝州其子味辛平無毒主破血止痢消腫除蠱疰蛇毒樹生葉似杏花紅白色子肉味酸止用其仁本經誤載根字時珍曰此藥子雖似黄藥苦藥子而稍有不同二藥子不結子此則樹之子也葛洪肘後方云婆羅門名那疎樹子中國人名藥子去皮取中仁細研服治諸病也白藥子唐本草集解恭曰白藥子出原州三月生苗葉似苦苣四月抽赤莖長似壺盧蔓六月開白花八月結子亦名𤓰萎九月葉落枝折采根洗切日乾根皮黄色名白藥子頌曰今䕫施合州江西嶺南亦有之江西出者葉似烏桕子如綠豆至六月變成赤色治馬熱方用之根氣味辛温無毒權曰苦冷主治金瘡生肌唐本消腫毒㗋痺消痰止嗽治渴并吐血大明治㗋中熱塞不通咽中常痛腫甄權解野葛生金巴豆藥毒刀斧折傷乾末傅之能止血痛馬志散血降火消痰解毒時珍附方舊四新八天行熱病白藥為末漿水一盞冷調二錢服仰臥少頃心悶或腹鳴㽲痛當吐利數行如不止喫冷粥一盌止之聖濟錄心痛解熱白藥根野猪尾二味洗去粗皮焙乾等分搗篩酒服一錢甚效黔人用之蘇頌圖經風熱上壅咽㗋不利白藥三兩黒牽牛半兩同炒香去牽牛一半為末防風末三兩和勻每茶服一錢聖惠方㗋中熱塞腫痛散血消痰白藥朴消等分為末吹之日四五次直指方咽㗋腫痛白藥末一兩龍腦一分蜜和丸芡子大每含嚥一丸聖惠方吐血不止白藥燒存性糯米飲服三錢聖惠方衂血不止紅棗白藥各燒存性等分為末糯米飲服或煎湯洗鼻頻頻縮藥令入經驗良方胎熱不安鐵罩散用白藥子一兩白芷半兩為末每服二錢紫蘇湯下心煩熱入砂糖少許聖惠方一切疳眼赤爛生瞖白藥子一兩甘草半兩為末猪肝一具批開摻末五錢煮熟食之直指方小兒疳瀉吐利方同上諸骨哽咽白藥煎米醋細嚥在上即吐出在下即下出普濟方癰腫不散生白藥根搗貼乾則易之無生者研末水和貼圖經附錄陳家白藥拾遺藏器曰味苦寒無毒主解諸藥毒水研服之入腹與毒相攻必吐出未盡更服亦去心胸煩熱天行瘟瘴出蒼梧陳家故有陳家之號明山有之蔓及根並似土𤓰葉如錢根似防己𦂳小者良人亦采食之與婆羅門白藥及赤藥功用並相似時珍曰按劉恂嶺表錄云陳家白藥善解毒諸藥皆不及之救人甚多封州康州有種之者廣府每歲充土貢按此藥當時充貢今無復有或有之古今名謂不同耳甘家白藥拾遺藏器曰味苦大寒有小毒解諸藥毒水研服即吐出未盡再吐與陳家白藥功相似二物性冷與霍亂下利人相反出龔州以南生隂處葉似車前根如半夏其汁飲之如蜜因人而名嶺南多毒物亦多解毒物豈天資之乎會州白藥拾遺藏器曰主金瘡生膚止血碎末傅之出會州葉如白斂衝洞根拾遺藏器曰味苦平無毒主熱毒蛇犬蟲癰瘡等毒出嶺南恩州取根隂乾功用同陳家白藥而苗蔓不相似珣曰苗蔓如土𤓰根亦相似味辛温主平完毒氣及蛇傷取根磨水服之諸毒悉皆吐出也突厥白宋開寶藏器曰味苦主金瘡生血止血補腰續筋出突厥國色白如灰乃云石灰諸藥合成者志曰今所用者出潞州其根黄白色狀似茯苓而虚軟苗髙三四尺春夏葉如薄荷花似牽牛而紫上有白稜二月八月采根曝乾威靈仙宋開寶釋名時珍曰威言其性猛也靈仙言其功神也集解志曰出商州上洛山及華山并平澤以不聞水聲者良生先于衆草方莖數葉相對冬月丙丁戊己日采根用恭曰九月末至十二月采根隂乾餘月並不堪采頌曰今陜西及河東河北汴東江湖州郡皆有之初生作蔓莖如釵股七月内生花六出淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青色根稠密多鬚似穀每年朽敗九月采根時珍曰其根每年旁引年深轉茂一根叢鬚數百條長者二尺許初時黄黒色乾則深黑俗稱鐵脚威靈仙以此别有數種根鬚一様但色或黄或白皆不可用根氣味苦温無毒元素曰味甘純陽入太陽經杲曰可升可降隂中陽也時珍曰味微辛鹹不苦忌茗麫湯主治諸風宣通五臟去腹内冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼療折傷久服無有温疫瘧開寶推新舊積滯消胸中痰唾散皮膚大腸風邪李杲發明頌曰唐貞元中嵩陽子周君巢作威靈仙傳云威靈仙去衆風通十二經脈朝服暮效疎宣五臟冷膿宿水變病微利不瀉人服此四肢輕徤手足微煖並得清涼先時商州有人病手足不遂不履地者數十年良醫殫技莫能療所親置之道旁以求救者遇一新羅僧見之告曰此疾一藥可活但不知此土有否因為之入山求索果得乃威靈仙也使服之數日能步履其後山人鄧思齊知之遂傳其事此藥治丈夫婦人中風不語手足不遂口眼喎斜言語蹇滯筋骨節風遶臍風胎風頭風暗風心風風狂大風皮膚風痒白癜風熱毒風瘡頭旋目眩手足頑痺腰膝疼痛久立不得曾經損墜䐴腰痛腎臟風壅傷寒瘴氣憎寒壯熱頭痛流涕黄疸黒疸頭面浮腫腹内宿滯心頭痰水膀胱宿膿口中涎水冷熱氣壅肚腹脹滿好喫茶滓心痛注氣膈氣冷氣攻衝脾肺諸氣痰熱欬嗽氣急坐臥不安氣衝眼赤攻耳成膿隂汗盜汗大小腸秘服此立通氣痢痔疾瘰癧疥癬婦人月水不來動經多日氣血衝心産後祕塞孩子無辜並皆治之其法采得根隂乾月餘搗末温酒調一錢七空腹服之如人本性殺藥可加及六錢利過兩行則減之病除乃停服其性甚善不獨諸藥但惡茶及麵湯以甘草巵子代飲可也又以一味洗焙為末以好酒和令微濕入在竹筒内𦂳塞九蒸九曝如乾添酒洒之以白蜜和丸梧子大每服二十至三十丸温酒下崔元亮海上集驗方著其詳如此恭曰腰腎脚膝積聚腸内諸冷病積年不瘥者服之無不立效宗奭曰其性快多服疏人五臟真氣震亨曰威靈仙屬木治痛風之要藥也在上下者皆宜服之尤效其性好走亦可横行故崔元亮言其去衆風通十二經脈朝服暮効凡采得聞流水聲者知其性好走也須不聞水聲者乃佳時珍曰威靈仙氣温味微辛鹹辛泄氣鹹泄水故風濕痰飲之病氣壯者服之有捷效其性大抵疎利久服恐損真氣氣弱者亦不可服之附方舊四新一十六脚氣入腹脹悶喘急用威靈仙末毎服二錢酒下痛減一分則藥亦減一分簡便方腰脚諸痛千金方用威靈仙末空心温酒服一錢逐日以微利為度經驗方用威靈仙一斤洗乾好酒浸七日為末麵糊丸梧子大以浸藥酒毎服二十丸腎臟風壅腰膝沉重威靈仙末蜜丸梧子大温酒服八十丸平明微利惡物如青膿膠即是風毒積滯如末利再服一百丸取下後食粥補之一月仍常服温補藥孫兆方名放杖丸集驗筋骨毒痛因患楊梅瘡服輕粉毒藥年久不愈者威靈仙三斤水酒十瓶封煮一炷香出火毒逐日飲之以愈為度集簡方破傷風病威靈仙半兩獨頭蒜一個香油一錢同搗爛熱酒衝服汗出即愈衛生易簡方手足麻痺時發疼痛或打撲傷損痛不可忍或癱瘓等證威靈仙炒五兩生川烏頭五靈脂各四兩為末醋糊丸梧子大每服七丸用鹽湯下忌茶普濟方男婦氣痛不拘久近威靈仙五兩生韭根二錢半烏藥五分好酒一盞雞子一個灰火煨一宿五更視雞子殻軟為度去渣温服以乾物壓之側睡向塊邊也再煎次日服覺塊刺痛是其驗摘𤣥方噎塞膈氣威靈仙一把醋蜜各半盌煎五分服之吐出宿痰愈唐珤經驗方停痰宿飲喘欬嘔逆全不入食威靈仙焙半夏薑汁浸焙為末用皂角水熬膏丸綠豆大每服七丸至十丸薑湯下一日三服一月為驗忌茶麵腹中痞積威靈仙楮桃兒各一兩為末每温酒服三錢名化鐵丸普濟大腸冷積威靈仙末蜜丸梧子大一更時生薑湯下十丸至二十丸經驗良方腸風瀉血久者威靈仙雞冠花各二兩米醋二升煮乾炒為末以雞子白和作小餅炙乾再研每服二錢陳米飲下日二服聖濟痔瘡腫痛威靈仙三兩水一斗煎湯先熏後洗冷再温之外科精義諸骨哽咽威靈仙一兩二錢砂仁一兩沙糖一盞水二鍾煎一鍾温服乾坤生意用威靈仙米醋浸二日晒研末醋糊丸梧子大每服二三丸半茶半湯下如欲吐以銅青末半匙入油一二點茶服探吐聖濟錄治雞鵞骨哽赤莖威靈仙五錢井華水煎服即軟如綿吞下也甚效飛絲纒隂腫痛欲斷以威靈仙搗汁浸洗一人病此得效李慺怪證方痘瘡黑陷鐵脚威靈仙炒研一錢腦子一分温水調服取下瘡痂為效意同百祥丸儒門事親茜草本經上品校正併入有名未用别錄苗根釋名蒨音茜茅蒐音捜茹藘音如閭地血别錄染緋草蜀本血見愁土宿風車草土宿過山龍補遺牛蔓時珍曰按陸佃云許氏説文言蒐乃人血所化則草鬼為蒐以此也陶隱居本草言東方有而少不如西方多則西草為茜又以此也陸璣云齊人謂之茜徐人謂之牛蔓又草之盛者為蒨牽别為茹連覆為藘則蒨茹藘之名又取此義也人血所化之説恐亦俗𫝊耳土宿真君本草云四補草其根茜草也一名西天王草一名四岳近陽草一名鐵塔草風車兒草藏器曰有名未用苗根即茜根也茜苗二字相似𫝊寫之誤爾宜併之集解别錄曰茜根生喬山山谷二月三月采根曝乾又曰苗根生山隂谷中蔓草木上莖有刺實如椒𢎞景曰此即今染絳茜草也東間諸處乃有而少不如西多詩云茹藘在阪者是也保昇曰染緋草葉似棗葉頭尖下闊莖葉俱濇四五葉對生節間蔓延草木上根紫赤色所在皆有八月采頌曰今圃人亦作畦種蒔故史記云千畆巵茜其人與千戸侯等言其利厚也時珍曰茜草十二月生苗蔓延數尺方莖中空有筋外有細刺數寸一節每節五葉葉如烏藥葉而糙澀面青背綠七八月開花結實如小椒大中有細子根修治斆曰凡使用銅刀於槐砧上剉日乾勿犯鉛鐵氣勿用赤柳草根真相似只是味酸濇誤服令人患内障眼速服甘草水止之即毒氣散氣味苦寒無毒權曰甘大明曰酸入藥炒用震亨曰熱元素曰微酸鹹温隂中之隂别錄曰苗根鹹平無毒之才曰畏鼠姑汁制雄黄主治寒濕風痺黄疸補中本經止血内崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳又苗根主痺及熱中傷跌折别錄治六極傷心肺吐血瀉血甄權止鼻洪尿血産後血運月經不止帶下撲損淤血泄精痔瘻瘡癤排膿酒煎服大明通經脈治骨節風痛活血行血時珍發明藏器曰茜草主蠱毒煮汁服周禮庶民掌除蠱毒以嘉草攻之嘉草者蘘荷與茜也主蠱為最震亨曰俗人治痛風用草藥取速效如石缺為君過山龍等佐之皆性熱而燥不能養隂却能燥濕病之淺者濕痰得燥而開淤血得熱而行故亦暫效若病深而血少者則愈刼愈虚而病愈深矣時珍曰茜根色赤而氣温味微酸而帶鹹色赤入營氣温行滯味酸入肝而鹹走血手足厥隂血分之藥也專于行血活血俗方用治女子經水不通以一兩煎酒服之一日即通甚效名醫别錄言其乆服益精氣輕身日華子言其泄精殊不相合恐未可慿附方舊三新八吐血不定茜根一兩搗末每服二錢水煎冷服亦可水和二錢服周應簡要濟衆方吐血躁渴及解毒用茜根雄黒豆去皮甘草炙等分為末井水丸彈子大每温水化服一丸聖濟錄鼻血不止茜根艾葉各一兩烏梅肉二錢半為末煉蜜丸梧子大毎烏梅湯下五十丸本事方五旬行經婦人五十後經水不止者作敗血論用茜根一名過山薑一兩阿膠側柏葉炙黄芩各五錢生地黄一兩小兒胎髮一枚燒灰分作六帖每帖水一盞半煎七分入髮灰服之唐珤經驗方女子經閉方見前發明心痺心煩内熱茜根煮汁服類傷寒要解中蠱毒吐下血如猪肝茜草根蘘荷葉各三分水四升煮二升服即愈自當呼蠱主姓名也陳延之小品方黑髭烏髮茜草一斤生地黄三斤取汁以水五大盌煎茜絞汁將滓再煎三度以汁同地黄汁微火煎如膏以瓶盛之每日空心温酒服半匙一月髭髮如漆也忌蘿蔔五辛聖濟錄螻蛄漏瘡茜根燒灰千年石灰等分為末油調傅之儒門事親方脱肛不收茜根石榴皮各一握酒一盞煎七分温服聖惠方預解瘡疹時行瘡疹正發服此則可無患茜根煎汁入少酒飲之竒效良方附錄血藤宋圖經頌曰生信州葉如蔢蕳葉根如大拇指其色黄彼人五月采用攻血治氣塊時珍曰按虞搏云血藤即過山龍理亦相近未知的否姑附之剪草日華集解藏器曰剪草生山澤間葉如茗而細江東用之頌曰生潤州二月三月采曝乾用時珍曰按許叔微本事方言剪草狀如茜草又如細辛婺台二州皆有之惟婺州者可用其説殊詳今遍詢訪無識者或云即茜草也未有的據根氣味苦涼無毒頌曰平主治諸惡瘡疥癬風瘙瘻蝕有蟲浸酒服大明主一切失血時珍發明元素曰上部血須用剪草牡丹皮天門冬麥門冬時珍曰許學士本事方云剪草治勞瘵吐血損肺及血妄行名曰神傅膏其法每用一斤淨洗晒為末入生蜜二斤和為膏以器盛之不得犯鐵器一日一蒸九蒸九曝乃止病人五更起面東坐不得語言以匙抄藥四匙食之良久以稀粟米飲壓之藥只冷服米飲亦勿大熱或吐或否不妨如久病肺損咯血只一服愈尋常嗽血妄行每服一匙可也有一貴婦病瘵得此方九日藥成前一夕病者夢人戒令翌日勿亂服藥次日將服藥屋上土墜器中不可用再合成將服為籍覆器又不得食再合未就而夫人卒矣此藥之異有如此若小小血妄行只一啜而愈也此藥絶妙若此而世失𫝊惜哉附方新二風蟲牙痛剪草細辛藁本等分煎水熱漱少頃自止中藏經風瘡瘙痒滑肌散治風邪客于肌中渾身瘙痒致生瘡疥及脾肺風毒攻衝生瘡乾濕日久不瘥用剪草七兩不見火輕粉一錢為末摻之乾者麻油調摻和劑局方防己本經中品釋名解離本經石解時珍曰按東垣李杲云防己如險健之人幸災樂禍能首為亂階若善用之亦可禦敵其名或取此義解離因其紋解也集解别錄曰防己生漢中川谷二月八月采根隂乾當之曰其莖如葛蔓延其根外白内黄如桔梗内有黑紋如車輻解者良𢎞景曰今出宜都建平大而青白色虚軟者好黑㸃木强者不佳服食亦須之頌曰今黔中亦有之但漢中出者破之文作車輻解黄實而香莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通然他處者青白虚軟又有腥氣皮皺上有丁足子名木防己蘇恭言木防己不任用而古方張仲景治傷寒有増減木防己湯及防己地黄湯五物防己湯黄茋六物等湯孫思邈治遺尿小便澀亦有三物木防己湯藏器曰如陶所説漢木二防己即是根苗為名修治斆曰凡使勿用木條色黄腥皮皺上有丁足子不堪用惟要心有花文黄色者細剉以車前草根相對蒸半日晒乾取用時珍曰今人多去皮剉酒洗晒乾用氣味辛平無毒别錄曰苦温普曰神農辛黄帝岐伯桐君苦無毒李當之大寒權曰苦有小毒元素曰大苦辛寒隂也泄也之才曰殷孽為之使殺雄黄毒惡細辛畏萆薢女菀鹵鹹伏消石主治風寒温瘧熱氣諸癎除邪利大小便本經療水腫風腫去膀胱熱傷寒熱邪氣中風手脚攣急通腠理利九竅止洩散癰腫惡結諸瘑疥癬蟲瘡别錄治濕風口面喎斜手足拘痛散留痰肺氣喘嗽甄權治中下濕熱腫洩脚氣行十二經元素木防己主治男子肢節中風毒風不語散結氣擁腫温瘧風水腫去膀胱熱甄權發明𢎞景曰防己是療風水要藥藏器曰治風用木防己治水用漢防己元素曰去下焦濕腫及痛并泄膀胱火邪必用漢防己草龍膽為君黄蘖知母甘草佐之防己乃太陽本經藥也杲曰本草十劑云通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱通其滯塞亦能瀉大便補隂瀉陽助秋冬瀉春夏之藥也比之於人則險而健者也幸災樂禍能首為亂階然善用之亦可敵兇突險此瞑眩之藥也故聖人存而不廢大抵聞其臭則可惡下咽則令人身心煩亂飲食減少至于十二經有濕熱壅塞不通及下注脚氣除膀胱積熱而庇其基本非此藥不可真行經之仙藥無可代之者若夫飲食勞倦隂虚生内熱元氣糓食已虧以防己泄大便則重亡其血此不可用一也如人大渴引飲是熱在上焦肺經氣分宜滲泄而防己乃下焦血分藥此不可用二也外傷風寒邪𫝊肺經氣分濕熱而小便黄赤乃至不通此上焦氣病禁用血藥此不可用三也大抵上焦濕熱者皆不可用下焦濕熱流入十二經致二隂不通者然後審而用之附方舊三新九皮水胕腫按之没指不惡風水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己黄茋桂枝各三兩茯苓六兩甘草三兩毎服一兩水一升煎半升服日二服張仲景方風水惡風汗出身重脈浮防己黄茋湯主之防己一兩黄茋二兩二錢半白术七錢半炙甘草半兩剉散每服五錢生薑四片棗一枚水一盞半煎八分温服良久再服腹痛加芍藥仲景方風濕相搏關節沉痛微腫惡風方同上小便淋濇三物木防己湯用木防己防風葵子各二兩㕮咀水五升煎二升半分三服千金方膈間支飲其人喘滿心下痞堅面黎黒其脈沉𦂳得之數十日醫吐下之不愈木防己湯主之虚者即愈實者三日復與之不愈去石膏加茯苓芒消主之用木防己三兩人參四兩桂枝二兩石膏雞子大十二枚水六升煮二升分服張仲景方傷寒喘急防己人參等分為末桑白湯服二錢不拘老小肺痿喘嗽漢防己末二錢漿水一盞煎七分細呷儒門事親肺痿咯血多痰者漢防己葶藶等分為末糯米飲每服一錢古今錄驗鼻衂不止生防己末新汲水服二錢仍以少許㗜之聖惠方霍亂吐利防己白芷等分為末新汲水服二錢聖惠方目睛暴痛防己酒浸三次為末每一服二錢温酒下𤣥摘方解雄黄毒防己煎汁服之實主治脱肛焙研煎飲代茶肘后通草本經中品釋名木通士良附支本經丁翁吳普萬年藤甄權子名燕覆時珍曰有細細孔兩頭皆通故名通草即今所謂木通也今之通草乃古之通脱木也宋本草混注為一名實相亂今分出之集解别錄曰通草生石城山谷及山陽正月二月采枝隂乾𢎞景曰今出近道遶樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良或云即葍藤莖也恭曰此物大者徑三寸每節有二三枝枝頭有五葉子長三四寸核黒瓤白食之甘美南人謂為燕覆子或名鳥覆子遇七八月采之藏器曰江東人呼為畜葍子江西人呼為拏子如算袋瓤黄子黒食之去皮蘇云色白者乃㺅葍也頌曰今澤潞漢中江淮湖南州郡亦有之藤生蔓大如指其莖榦大者徑三寸一枝五葉頗類石韋又似芍藥二葉相對夏秋開紫花亦有白花者結實如小木𤓰食之甘美即陳士良本草所謂桴棪子也其枝今人謂之木通而俗間所謂通草乃通脱木也古方所用通草皆今之木通其通脱木稀有用者或以木通為蔔萄苖者非矣按張氏燕吳行紀載揚州甘泉東院兩廊前有通草其形如椿少葉子垂稍際如苦棟與今所説不同或别一物也時珍曰今之木通有紫白二色紫者皮厚味辛白者皮薄味淡本經言味辛别錄言味甘是二者皆能通利也氣味辛平無毒别錄曰甘權日微寒普曰神農黄帝辛雷公苦杲曰味甘而淡氣平味薄降也陽中隂也主治除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲本經療脾疸常欲眠心煩噦出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墮胎去三蟲别錄治五淋利小便開關格治人多睡主水腫浮大甄權利諸經脈寒熱不通之氣詵理風熱小便數急疼小腹虚滿宜煎湯并蔥飲有效士良安心除煩止渴退熱明耳目治鼻塞通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉月候不勻天行時疾頭痛目眩羸劣乳結及下乳大明利大小便令人心寛下氣藏器主諸瘻瘡㗋痺咽痛濃煎含嚥珣通經利竅導小腸火杲發明杲曰本草十劑通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱之滯又通大便通草甘淡能助西方秋氣下降利小便專瀉氣滯也肺受熱邪津液氣化之原絶則寒水斷流膀胱受濕熱癃閉約縮小便不通宜此治之其症胸中煩熱口燥舌乾咽乾大渇引飲小便淋瀝或閉塞不通脛痠脚熱並宜通草主之凡氣味與之同者茯苓澤瀉燈草豬苓琥珀瞿麥車前子之類皆可以滲濕利小便泄其滯氣也又曰木通下行泄小腸火利小便與琥珀同功無他藥可比時珍曰木通手厥隂心包絡手足太陽小腸膀胱之藥也故上能通心清肺治頭痛利九竅下能泄濕熱利小便通大腸治遍身拘痛本經及别錄皆不言及利小便治淋之功甄權日華子輩始發揚之葢其能泄丙丁之火則肺不受邪能通水道水源旣清則津液自化而諸經之濕與熱皆由小便泄去故古方導赤散用之亦瀉南補北扶西抑東之意楊仁齋直指方言人遍身胸腹𨼆熱疼痛拘急足冷皆是伏熱傷血血屬于心宜木通以通心竅則經絡流行也附方舊二新一心熱尿赤面赤唇乾咬牙口渴導赤散用木通生地黄炙甘草等分入水竹葉七片水煎服錢氏方婦人血氣木通濃煎三五盞飲之即通孟詵本草金瘡踒折通草煮汁釀酒日飲鼠瘻不消方同上根主治項下癭瘤甄權子氣味甘寒無毒詵曰平南人多食之北人不知其功主治厚腸胃令人能食下三焦惡氣續五臟斷絶氣使語聲足氣通十二經脈和核食之孟詵除三焦客熱胃口熱閉胃不下食士良止渴利小便時珍通脱木法象釋名通草綱目活莌音奪離南頌曰爾雅離南活莌即通脱也山海經名冦脱又名倚商杲曰隂竅濇而不利水腫閉而不行用之立通因有通草之名與木通同功嘉謨曰白瓤中藏脱木得之故名通脱集解藏器曰通脱木生山側葉似蓖麻其莖空心中有白瓤輕白可愛女人取以飭物俗名通草頌曰郭璞言生江南髙丈許大葉似荷而肥莖中瓤正白今園圃亦有種蒔者或作蜜煎充果食之甘美時珍曰蔓生山中莖大者圍數寸氣味甘淡寒無毒杲曰甘平降也陽中隂也主治利隂竅治五淋除水腫癃閉瀉肺李杲解諸毒蟲痛蘇頌明目退熱下乳催生汪機發明杲曰通草瀉肺利小便甘平以緩隂血也與燈草同功宜生用之時珍曰通草色白而氣寒味淡而體輕故入太隂肺經引熱下降而利小便入陽明胃經通氣上達而下乳汁其氣寒降也其味淡升也附方新一洗頭風痛新通草瓦上燒存性研末二錢熱酒下牙關𦂳者幹口灌之王璆百一選方花上粉主治諸蟲瘻惡瘡痔疾納之藏器療瘰癧及胸中伏氣攻胃咽蘇頌附錄天壽根圖經頌曰出台州每歲土貢其性涼治胸膈煩熱上人常用有效釣藤别錄下品校正自木部移入此釋名𢎞景曰出建平亦作弔藤療小兒不入餘方時珍曰其刺曲如釣鈎故名或作弔從簡耳集解恭曰釣藤出梁州葉細長其莖間有刺若釣鈎頌曰今秦中興元府有之三月采宗奭曰湖南湖北江南江西山中皆有之藤長八九尺或一二丈大如苺指其中空小人用致酒甕中盜取酒以氣吸之涓涓不斷時珍曰狀如葡萄藤而有鈎紫色古方多用皮后世多用鈎取其力鋭爾氣味甘微寒無毒保昇曰苦權曰甘平時珍曰初微甘後微苦平主治小兒寒熱十二驚癎别錄小兒驚啼瘛瘲熱壅客忤胎風權大人頭旋目眩平肝風除心熱小兒内釣腹痛發斑疹時珍發明時珍曰釣藤手足厥隂藥也足厥隂主風手厥隂主火驚癎眩運皆肝風相火之病釣藤通心包于肝木風靜火息則諸證自除或云入數寸于小麥中蒸熟喂馬易肥附方新三小兒驚熱釣藤一兩消石半兩甘草炙一分為散毎服半錢温水服日三服名延齡散聖濟錄卒得癎疾釣藤甘草炙各二錢水五合煎二合每服棗許日五夜三度聖惠方斑疹不快釣藤鈎子紫草茸等分為末每服一字或半錢温酒服錢氏方附錄倒掛藤拾遺藏器曰味苦無毒主一切老血及産後諸疾結痛血上欲死煮汁服之生深山有逆刺如懸鈎倒掛于樹葉尖而長黄藤綱目集解時珍曰黄藤生嶺南狀若防己俚人常服此藤縱飲食有毒亦自然不發席辨刺史云甚有效氣味甘苦平無毒主治飲食中毒利小便煮汁頻服即解時珍白兔藿本經上品釋名白葛普集解别録曰生交州山谷𢎞景曰此藥解毒莫之與敵而人不復用不聞識者恭曰荆襄山谷今有之蔓生山南人謂之白葛苗似蘿藦葉圓厚莖有白毛與衆草異用藿療毒有効而交廣又有白花藤亦解毒用根不用苗保昇曰蔓生葉圓者蓴今襄州北汝州南岡上有五月六月采苗日乾氣味苦平無毒主治蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒不可入口者皆消除之又去血可末著痛上立清毒入腹者煮汁飲即解本經風邪熱極煮汁飲搗末傅諸毒妙李珣白花藤唐本草集解恭曰生嶺南交州廣州平澤苗似野葛葉似女貞莖葉俱無毛而白花其根似葛而骨柔皮厚肉白大療毒用根不用苗保昇曰蔓生白花葉有細毛根似牡丹骨柔皮白而厚凌冬不凋斆曰凡使勿用菜花藤真相似只是味酸濇白花藤味甘采得去根細剉隂乾用氣味苦寒無毒主治解諸藥菜肉中毒漬酒主虚勞風熱唐本發明時珍曰蘇言用根雷言用苗都可用爾按葛洪肘后方云席辨刺史在嶺南日久言俚人皆因飲食入毒多不即覺漸不能食或心中漸脹先寒似瘴急含白銀一宿變色者即是也銀青是藍藥銀黄赤是薗藥薗音混草名也但取白花藤四兩出嶲州者為上不得取近野葛生者洗切同乾藍實四兩水七升煮取半空腹頓服少悶勿怪其毒即解白英本經上品校正併入别錄鬼目釋名縠菜别錄白草同上白幕拾遺排風同上子名鬼目時珍曰白英謂其花色縠菜象其葉文排風言其功用鬼目象其子形别錄有名未用復出鬼目雖苗子不同實一物也故併之集解别錄曰白英生益州山谷春采葉夏采莖秋采花冬采根又曰鬼目一名來甘實赤如五味十月采𢎞景曰鬼目俗人呼為白草子是矣又曰白英方藥不復用此有斛菜花益州乃有苦菜土人專食之充健無病疑或是此恭曰白英鬼目草也蔓生葉似王瓜小長而五椏實圓若龍葵子生青熟紫黒東人謂之白草陶云白草似識之而不力辨藏器曰白英鬼目菜也蔓生三月延長爾雅名符郭璞云似葛葉有毛子赤色如耳璫珠若云子黑誤矣江東夏月取其莖葉煮粥食極解熱毒時珍曰此俗名排風子是也正月生苗白色可食秋開小白花子如龍葵子熟時紫赤色吳志云孫皓時有鬼目菜緣棗樹長丈餘葉廣四寸厚三分人皆異之即此物也又羊蹄草一名鬼目嶺南有木果亦名鬼目葉似楮子大如鴨子七八月熟黄色味酸可食皆與此同名異物也根苗氣味甘寒無毒主治寒熱八疸消渴補中益氣久服輕身延年本經葉作羮飲甚療勞𢎞景煩熱風疹丹毒瘴瘧寒熱小兒結熱煮汁飲之藏器鬼目子也氣味酸平無毒主治明目别錄附方新一目赤頭旋眼花面腫風熱上攻用排風子焙甘草炙菊花焙各一兩為末每服二錢臥時温水下聖濟錄蘿藦唐本草校正併入拾遺斫合子釋名雚音貫芄蘭詩疏白環藤拾遺實名雀瓢陸璣斫合子拾遺羊婆奶綱目婆婆鍼線包藏器曰漢髙帝用子傅軍士金瘡故名斫合子時珍曰白環即芄字之訛也其實嫩時有漿裂時如瓢故有雀瓢羊婆奶之稱其中一子有一條白絨長二寸許故俗呼婆婆鍼線包又名婆婆鍼袋兒也集解𢎞景曰蘿藦作藤生摘之有白乳汁人家多種之葉厚而大可生啖亦蒸煮食之諺云去家千里勿食蘿藦枸杞言其補益精氣强盛隂道與枸杞葉同也恭曰按陸機詩疏云蘿藦一名芄蘭幽州謂之雀瓢然雀瓢是女青别名也蘿藦葉似女青故亦名雀瓢女青葉似蘿藦兩葉相對子似瓢形大如棗許故名雀瓢根似白薇莖葉並臭生平澤别錄云葉嫩時似蘿藦圓端大莖實黑藏器曰蘿藦東人呼為白環藤生籬落間折之有白汁一名雀瓢其女青終非白環二物相似不能分别又曰斫合子作藤生蔓延籬落間至秋霜合子如柳絮一名雞腸一名薰桑時珍曰所合子即蘿藦子也三月生苗蔓延籬垣極易繁衍其根白軟其葉長而後大前尖根與莖葉斷之皆有白乳如構汁六七月開小長花如鈴狀紫白色結實長二三寸大如馬兠鈴一頭尖其殻青軟中有白絨及漿霜后枯裂則子飛其子輕薄亦如兠鈴子商人取其絨作坐褥代綿云甚輕暖詩云芄蘭之支童子佩觿芄蘭之葉童子佩韘觿音畦解結角錐也此物實尖垂于支間似之韘音涉張弓指彄也此葉后彎似之故以比興也一種莖葉及花皆似蘿藦但氣臭根紫結子圓大如豆生青熟赤為異此則蘇恭所謂女青似蘿藦陳藏器所謂二物相似者也蘇恭言其根似白微子似瓢形則誤矣當從陳説此乃藤生女青與蛇銜根之女青名同物異宜互攷之子葉同氣味甘辛温無毒時珍曰甘微辛主治虛勞補益精氣强隂道葉煮食功同子唐本擣子傅金瘡生膚止血搗葉傅腫毒藏器取汁傅丹毒赤腫及蛇蟲毒即消蜘蛛傷頻治不愈者搗封二三度能爛絲毒即化作膿也時珍附方新二補益虛損極益房勞用蘿藦四兩枸杞根皮五味子柏子仁酸棗仁乾地黄各三兩為末毎服方寸匕酒下日三服千金方損傷血出痛不可忍用籬上婆婆鍼袋兒擂水服渣罨瘡口立效袖珍赤地利唐本草校正併入拾遺五毒草釋名赤薜荔綱目五毒草拾遺五蕺拾遺蛇䒽拾遺山蕎麥圖經時珍曰並未詳集解恭曰所在山谷有之蔓生葉似蘿藦根皮赤黒肉黄赤二月八月采根日乾頌曰所在皆有今惟華山有之春夏生苗作蔓繞草木上莖赤葉青似蕎麥葉七月開白花亦如蕎麥結子青色根若菝葜皮紫赤肉黄赤八月采根晒乾收藏器曰五毒草生江東平地花葉並如蕎麥根𦂳硬似狗脊亦名蛇䒽名同物異時珍曰五毒草即赤地利今併為一根修治斆曰凡采得細剉用藍葉并根同入生絹袋盛之蒸一伏時去藍晒用氣味苦平無毒藏器曰酸平伏丹砂主治赤白冷熱諸痢斷血破血帶下赤白生肌肉唐本主癰疽惡瘡毒腫赤白游疹蟲蠶蛇犬咬並醋摩傅之亦擣莖葉傅之恐毒入腹煮汁飲藏器發明時珍曰唐張仲文備急方治青赤黄白等痢鹿茸丸方中用之則其功長于涼血解毒可知矣附方舊二小兒熱瘡身面皆有如火燒者赤地利末粉之火瘡滅瘢赤地利末油調塗聖惠紫葛唐本草集解恭曰生山谷中苗似葡萄長丈許根紫色大者徑二三寸保昇曰所在皆有今出雍州葉似蘡薁其根皮肉俱紫色三八月采根皮日乾大明曰紫葛有二種此是藤生者頌曰今惟江寧府及台州生之春生冬枯似葡萄而紫色根皮氣味甘苦寒無毒大明曰苦滑冷燒灰制消石主治癰腫惡瘡擣米醋和封之恭主癱緩攣急并熱毒風通小腸大明生肌散血時珍附方舊二産后煩渇血氣上冲也紫葛三兩水二升煎一升去滓呷之金瘡傷損生肌破血用紫葛二兩順流水三盞煎一盞半分三服酒煎亦妙並經效方烏蘞苺唐本草釋名五葉苺𢎞景蘢草同拔爾雅龍葛同赤葛綱目五爪龍同赤潑藤時珍曰五葉如白蘞故曰烏蘞俗名五爪龍江東呼龍尾亦曰虎葛曰龍曰葛並取蔓形赤潑與赤葛及拔音相近集解𢎞景曰五葉苺生蘺援間作藤擣根傅癰癤有效恭曰蔓生平澤葉似白蘞四月五月采之保昇曰莖端五葉開花青白色所在有之夏采苗用時珍曰堘塹間甚多其藤柔而有稜一枝一䰅凡五葉葉長而光有疎齒面青背淡七八月結苞成簇青白色花大如粟黄色四出結實大如龍葵子生青熟紫内有細子其根白色大者如指長一二尺擣之多涎滑傅滋醫學集成謂即紫葛楊起簡便方謂即老鴉眼睛草斗門方謂即何首烏並誤矣氣味酸苦寒無毒主治癰癤瘡腫虫咬擣根傅之𢎞景風毒熱腫游丹擣傅并飲汁恭涼血解毒利小便根擂酒服消癤腫神效時珍附方新五小便尿血五葉藤隂乾為末每服二錢白湯下衛生易簡方㗋痺腫痛五爪龍草車前草馬蘭菊各一握擣汁徐嚥祖𫝊方也醫學正𫝊項下熱腫俗名􅞩蟇瘟五葉藤擣傅之丹溪纂要一切腫毒發背乳癰便毒惡瘡初起者並用五葉藤或根一握生薑一塊擣爛入好酒一盌絞汁熱服取汁以渣傅之即散一用大蒜代薑亦可壽域神方跌撲損傷五爪龍擣汁和童尿熱酒服之取汗簡便方葎草唐本草校正併入有名未用勒草釋名勒草别錄葛勒蔓蜀圖經來苺草别本時珍曰此草莖有細刺善勒入膚故名勒草訛為葎草又訛為來苺皆方音也别錄勒草即此今併為一集解恭曰葎草生故墟道旁葉似蓖麻而小且薄蔓生有細刺亦名葛葎蔓古方亦時用之保昇曰野處多有之葉似大麻花黄白色子若大麻子俗名葛勒蔓夏采莖葉曝乾用别錄曰勒草生山谷如栝樓時珍曰二月生苗莖有細刺葉對節生一葉五尖微似蓖麻而有細齒八九月開細紫花成簇結子狀如黄麻子氣味甘苦寒無毒主治勒草主瘀血止精益盛氣别錄葎草主五淋利小便止水痢除瘧虚熱渴煮汁或生擣汁服恭生汁一合服治傷寒汗後虛熱宗奭療膏淋久痢疥癩頌潤三焦消五穀益五臟除九蟲辟温疫傅蛇蠍傷時珍附方舊三新六小便石淋葛葎掘出根挽斷以盃于坎中承取汁服一升石當出不出更服方范汪小便膏淋葎草擣生汁三升酢二合合和頓服當尿下白汁尿血淋瀝同上産婦汗血汚衣赤色方同上久痢成疳葛勒蔓末以管吹入肛門中不過數次如神新久瘧疾用葛葎草一握一名勒蔓去兩頭秋冬用乾者恒山末等分以淡漿水二大盞浸藥星月下露一宿五更煎一盞分二服以吐痰愈遍體癩瘡葎草一擔以水二石煮取一石潰之不過三作愈並韋宙獨行方烏癩風瘡葛葎草三秤切洗益母草一秤切以水二石五斗煮取一石五斗去滓入瓮中浸浴一時方出坐密室中又暖湯浴一時乃出暖臥取汗勿令見風明日又浴如浴時瘙痒不可忍切勿搔動少頃漸定后隔三日一作以愈為度聖濟錄羊桃本經下品釋名鬼桃本經羊膓同萇楚爾雅銚芅音姚弋或作御弋細子並未詳集解别錄曰羊桃生山林川谷及田野二月采隂乾𢎞景曰山野多有勝似家桃又非山桃花甚赤子小細而苦不堪食詩云隰有萇楚即此方藥不復用保昇曰生平澤中處處有之苗長而弱不能為樹葉花皆似桃子細如棗核今人呼為細子其根似牡丹郭璞云羊桃葉似桃其花白色子如小麥亦似桃形陸機詩疏云葉長而狹花紫赤色其枝莖弱過一尺引蔓于草上今人以為汲灌重而善没不如楊柳也近下根刀切其皮著熱灰中脱之可韜筆管也時珍曰羊桃莖大如指似樹而弱如蔓春長嫩條柔軟葉大如掌上緑下白有毛狀似苧麻而團其條浸水有涎滑莖根氣味苦寒有毒藏器曰甘無毒主治熛熱身暴赤色除小兒熱風水積聚惡瘍本經去五臟五水大腹利小便益氣可作浴湯别錄煮汁洗風痒及諸瘡腫極效恭根浸酒服治風熱羸老藏器附方舊一新三傷寒變慝四肢煩疼不食多睡羊桃十斤擣熟浸熱湯三斗日正午時入坐一炊久不過三次愈千金傷寒毒攻手足腫痛羊桃煮汁入少鹽漬之肘後水氣鼓脹大小便濇羊桃根桑白皮木通大㦸炒各半斤剉水一斗煮五升熬如稀餳每空心茶服一匙二便利食粥補之聖惠方蜘蛛咬毒羊桃葉擣傅之立愈備急方絡石本經上品釋名石鯪吳普作鯪石石龍藤别錄懸石同耐冬恭雲花普雲英普雲丹普石血恭雲珠别錄又名畧石領石明石石蹉恭曰俗名耐冬以其包絡石木而生故名絡石山南人謂之石血療産後血結大良也集解别錄曰絡石生太山川谷或石山之隂或髙山巖石上或生人間五月采𢎞景曰不識此藥方法無用者或云是石類旣生人間則非石猶如石斛繫石為名耳恭曰此物生隂濕處冬夏常青實黒而圓其莖蔓延遶樹石側若在石間者葉細厚而圓短遶樹生者葉大而薄人家亦種之為飾保昇曰所在有之生木石間凌冬不凋葉似細橘葉莖節著處即生根鬚包絡石旁花白子黑六月七月采莖葉日乾藏器曰在石者良在木者隨木性有功與薜荔相似更有石血地錦等十餘種藤並是其類大畧皆主風血暖腰脚變白不老蘇恭言石血即絡石殊誤矣絡石葉圓正青石血葉尖一頭赤色時珍曰絡石帖石而生其蔓折之有白汁其葉小于指頭厚實木强面青背淡濇而不光有尖葉圓葉二種功用相同葢一物也蘇恭所説不誤但欠詳耳莖葉脩治雷曰凡采得用粗布揩去毛子以熟甘草水浸一伏時切晒用氣味苦温無毒别錄曰微寒普曰神農苦小當雷公苦平無毒扁鵲桐君甘無毒之曰大寒藥中君也采無時時珍曰味甘微酸不苦之才曰杜仲牡丹為之使惡鐵落畏貝母菖蒲殺殷蘗毒主治風熱死肌癰傷口乾舌焦癰腫不消㗋舌腫閉水漿不下本經大驚入腹除邪氣養腎主腰髖痛堅筋骨利關節久服輕身明目潤澤好顔色不老延年通神别錄主一切風變白宜老藏器蝮蛇瘡毒心悶服汁并洗之刀斧傷瘡傅之立瘥恭發明時珍曰絡石性質耐久氣味平和神農列之上品李當之稱為藥中之君其功主筋骨關節風熱癰腫變白耐老即醫家鮮知用者豈以其近賤而忽之耶服之當浸酒耳仁存堂方云小便白濁緣心腎不濟或由酒色遂至已甚謂之上淫葢有虚熱而腎不足故土邪干水史載之言夏則土燥水濁冬則土堅水清即此理也醫者往往峻補其疾反甚惟服博金散則水火旣濟源潔而流清矣用絡石人參茯苓各二兩龍骨煅一兩為末每服二錢空心米飲下日二服附方舊二新二小便白濁方見上㗋痺腫塞喘息不通須㬰欲絶神驗方用絡石草一兩水一升煎一大盞細細呷之少頃即通外臺祕要癰疽焮痛止痛靈實散用鬼繫腰生竹籬隂濕石岸間絡石而生者好絡木者無用其藤柔細兩葉相對形生三角用莖葉一兩洗晒勿見火皂莢刺一兩新瓦炒黄甘草節半兩大𤓰蔞一箇取仁炒香乳香没藥各二錢每服二錢水一盞酒半盞慢火煎至一盞温服外科精要木蓮拾遺釋名薜荔拾遺木饅頭綱目鬼饅頭時珍曰木蓮饅頭象其實形也薜荔音壁利未詳山海經作草荔集解藏器曰薜荔夤緣樹木三五十年漸大枝葉繁茂葉長二三寸厚若石韋生子似蓮房打破有白汁停久如漆中有細子一年一熟子亦入藥采無時頌曰薜荔絡石極相類莖葉粗大如藤狀木蓮更大于絡石其實若蓮房時珍曰木蓮延樹木垣牆而生四時不凋厚葉堅强大于絡石不花而實實大如盃微似蓮蓬而梢長正如無花果之生者六七月實内空而紅八月後則滿腹細子大如稗子一子一鬚其味微濇其殻虚輕烏鳥童兒皆食之葉氣味酸平無毒主治背癰乾末服之下利即愈頌主風血暖腰脚變白不衰器治血淋痛濇藤葉一握甘草炙一分日煎服之時珍發明慎微曰圖經言薜荔治背瘡近見宜興縣一老舉人年七十餘患發背村中無醫藥急取薜荔葉爛研絞汁和蜜飲數升以滓傅之後用他藥傳帖遂愈其功實在薜荔乃知圖經之言不妄藤汁主治白癜風癧瘍風惡瘡疥癬塗之大明木蓮氣味甘平濇無毒時珍曰嶺南人言食之發瘴主治壯陽道尤勝頌固精消腫散毒止血下乳治久痢腸痔心痛隂􅒃時珍附方新八驚悸遺精木饅頭炒白牽牛等分為末每服二錢用米飲調下乾坤祕韞隂㿉囊腫木蓮即木饅頭燒研酒服二錢心又方木饅頭子小茴香等分為末毎空酒服二錢取効集簡酒痢腸風黒散子治風入臟或食毒積熱大便鮮血疼痛肛出或久患酒痢木饅頭燒存性㯶櫚皮燒存性烏梅去核粉草炙等分為末毎服二錢水一盞煎服惠民和劑局方腸風血下大便更濇木饅頭燒枳殻炒等分為末每服二錢槐花酒下楊倓家藏方大腸脫下木饅頭連皮子切炒茯苓猪苓等分為末每服二錢米飲下亦治夢遺名鎖陽丹普濟方一切癰疽初起不問發於何處用木蓮四十九個揩去毛研細酒解開温服功與忍冬草相上下陳自明外科精要乳汁不通木蓮二個猪前蹄一個爛煮食之并飲汁盡一日即通無子婦人食之亦有乳也集簡方附錄地錦拾遺藏器曰味甘温無毒主破老血産後血結婦人瘦損不能飲食腹中有塊淋瀝不盡赤白帶下天行心悶並煎服之亦浸酒生淮南林下葉如鴨掌藤蔓著地節處有根亦緣樹石冬月不死山人産後用之一名地噤時珍曰别有地錦草與此不同見草之六扶芳藤拾遺釋名滂藤集解藏器曰生吳郡藤苗小時如絡石蔓延樹本山人取楓樹上者用亦如桑上寄生之意忌采塚墓間者隋朝稠禪師作青飲進煬帝止渴者即此莖葉氣味苦小温無毒主治一切血一切氣一切冷大主風血腰脚去百病久服延年變白不老剉細浸酒飲藏器常春藤拾遺釋名土鼓藤拾遺龍鱗薜荔日華藏器曰小兒取其藤於地打作鼓聲故名土鼓李邕改為常春藤集解藏器曰生林薄間作蔓繞草木上其葉頭尖結子正圓熟時如珠碧色氣味莖葉苦子甘温無毒主治風血羸老腹内諸冷血閉强腰脚變白煮服浸酒皆宜藏器凡一切癰疽腫毒初起取莖葉一握研汁和酒温服利下惡物去其根本時珍要外科精附方新二丁瘡黑凹用髮􅀈劄住將尖葉薜荔搗汁和蜜一盞服之外以葱蜜搗傅四圍惠聖方衂血不止龍鱗薜荔研水飲之聖濟錄千歲蘽别錄上品校正併入有名未用别錄蘽根釋名蘽蕪别錄苣𤓰拾遺藏器曰此藤冬只凋葉大者盤薄故曰千歲蘽集解别錄曰千歲蘽生太山山谷𢎞景曰藤生如葡萄葉似鬼桃蔓延木上汁白今俗人方藥都不識用仙經數處須之藏器曰蔓似葛葉下白其子赤條中有白汁陸璣草木疏云一名苣𤓰連蔓而生蔓白子赤可食酢而不美幽州人謂之推蘽毛詩云葛蘽注云似葛之草蘇恭謂為蘡薁深是妄言頌曰處處有之藤生蔓延木上葉如葡萄而小四月摘其莖汁白而味甘五月開花七月結實八月采子青黒微赤冬惟凋葉春夏間取汁用陶陳二氏所説得之宗奭曰唐開元末訪隱民姜撫年幾百歲召至集賢院言服常春藤使白髮還黒長生可致藤生太湖終南帝遣使多取以賜老臣詔天下使自求之擢撫銀青光祿大夫號冲和先生又言終南山有旱藕餌之延年狀類葛粉帝取之作湯餅賜大臣右驍騎將軍甘守誠云常春藤乃千歲蘽也旱藕乃牡蒙也方家久不用故撫易名以神之民以酒漬藤飲之多暴死乃止撫内慙乃請求藥牢山遂逃去今書此以備世疑時珍曰按千歲蘽原無常春之名惟陳藏器本草土鼓藤下言李邕名為常春藤浸酒服羸老變白則撫所用乃土鼓藤也其葉與千歲蘽不同或名同耳正誤見果部蘡薁下氣味甘平無毒主治補五臟益氣續筋骨長肌肉去諸痺久服輕身不飢耐老通神明别錄蘽根主治緩筋令不痛别錄忍冬别錄上品釋名金銀藤綱目鴛鴦藤綱目鷺鷥滕綱目老翁鬚綱目左纒藤綱目金釵股綱目通靈草土宿蜜桶藤𢎞景曰處處有之藤生凌冬不凋故名忍冬時珍曰其花長瓣垂鬚黄白相半而藤左纒故有金銀鴛鴦以下諸名金釵股貴其功也土宿真君云蜜桶藤隂草也取汁能伏硫制汞故有通靈之稱集解别錄曰忍冬十二月采隂乾恭曰藤生繞覆草木上莖苗紫赤色宿蔓有薄皮膜之其嫩蔓有毛葉似胡豆亦上下有毛花白蘂紫今人或以絡石當之非矣時珍曰忍冬在處有之附樹延蔓莖微紫色對節生葉葉似薜荔而青有濇毛三四月開花長寸許一蒂兩花二瓣一大一小如半邊狀長蘂花初開者蘂瓣俱色白經二三日則色變黄新舊相參黄白相映故呼金銀花氣甚芬芳四月采花隂乾藤葉不拘時采隂乾氣味甘温無毒權曰辛藏器曰小寒云温者非也主治寒熱身腫久服輕身長年益壽别錄治腹脹滿能止氣下澼甄權熱毒血痢水痢濃煎服藏器治飛尸遁尸風尸沉尸尸注鬼擊一切風濕氣及諸腫毒癰疽疥癬楊梅諸惡瘡散熱解毒時珍發明𢎞景曰忍冬煮汁釀酒飲補虛療風此旣長年益壽可常采服而仙經少用凡易得之草人多不肯為之更求難得者貴逺賤近庸人之情也時珍曰忍冬莖葉及花功用皆同昔人稱其治風除脹解痢逐尸為要藥而後世不復知用後世稱其消腫散毒治瘡為要藥而昔人並未言及乃知古今之理萬變不同未可一轍論也按陳自明外科精要云忍冬酒治癰疽發背初發便當服此其効甚竒勝于紅内消洪内翰邁沈内翰括諸方所載甚詳如瘍醫丹陽僧江西僧鑒清金陵王琪王尉子駿海州劉秀才純臣等所載療癰疽發背經效竒方皆是此物故張相公云誰知至賤之中乃有殊常之效正此類也附方舊一新十七忍冬酒治癰疽發背不問發在何處發眉發頥或頭或項或背或腰或脇或乳或手足皆有竒效鄉落之間僻陋之所貧乏之中藥材難得但䖍心服之俟其疽破仍以神異膏貼之其效甚妙用忍冬藤生取一把以葉入沙盆研爛入生餅子酒少許稀稠得所塗于四圍中留一口洩氣其藤只用五兩木槌槌損不可犯鐵大甘草節生用一兩同入沙瓶内以水二盌文武火慢煎至一盌入無灰好酒一大盌再煎十數沸去滓分為三服一日一夜喫盡病勢重者一日二劑服至大小腸通利則藥力到沈内翰云如無生者只用乾者然力終不及生者效速陳自明外科精要忍冬圓治消渴愈後預防發癰疽先宜服此用忍冬草根莖花葉皆可不拘多少入瓶内以無灰好酒浸以糠火煨一宿取出晒乾入甘草少許碾為細末以浸藥酒打麵糊丸梧子大每服五十丸至百丸湯酒任下此藥不特治癰疽大能止渴外科精要五痔諸瘻方同上一切腫毒不問已潰未潰或初起發熱用金銀花俗名甜藤采花連莖葉自然汁半盌煎八分服之以渣傅上敗毒托裏散氣和血其功獨勝萬表積善堂方丁瘡便毒方同上㗋痺乳蛾方同上敷腫拔毒金銀藤大者燒存性葉焙乾為末各三錢大黄焙為末四錢凡腫毒初發以水酒調搽四圍留心洩氣楊誠經騐方癰疽托裏治癰疽發背腸癰奶癰無名腫毒惞痛實熱狀類傷寒不問老幼虚實服之未成者内消已成者即潰忍冬葉黄茋各五兩當歸一兩甘草八錢為細末每服二錢酒一盞半煎一盞隨病上下服日再服以渣傅之和劑局方惡瘡不愈左纒藤一把搗爛入雄黄五分水二升瓦礶煎之以紙封七重穿一孔待氣出以瘡對孔薰之三時久大出黄水後用生肌藥取效選竒方輕粉毒癰方同上瘡久成漏忍冬草浸酒日日常飲之戴原禮要訣熱毒血痢忍冬藤濃煎飲聖惠方五種尸疰飛尸者遊走皮膚洞穿臟腑每發刺痛變動不常也遁尸者附骨入肉攻鑿血脈毎發不可見死尸聞哀哭便作也風尸者淫躍四末不知痛之所在毎發恍惚得風雪便作也沉尸者纒結臟腑冲引心脇每發絞切遇寒冷便作也尸注者舉身沉重精神錯雜常覺昏廢毎節氣至則大作也並是身中尸鬼引接外邪宜用忍冬莖葉剉數斛煮取濃汁煎稠毎服雞子大許温酒化下一日二三服肘後方鬼擊身青作痛用金銀花一兩水煎飲之李樓怪病奇方中野菌毒急采鴛鴦草啖之即今忍冬草也洪邁夷堅志口舌生瘡赤梗蜜桶藤髙脚地銅盤馬蹄香等分以酒搗汁雞毛刷上取涎出即愈普濟方忍冬膏治諸般腫痛金刃傷瘡惡瘡用金銀藤四兩吸鐵石三錢香油一斤熬枯去滓入黄丹八兩待熬至滴水不散如常攤用乾坤祕韞甘藤宋嘉祐校正自木部移入此釋名甜藤嘉祐感藤時珍曰甘感音相近也又有甜藤甘露藤皆此類並附之忍冬一名甜藤與此不同集解藏器曰生江南山谷其藤大如雞卵狀如木防己斫斷吹之氣出一頭其汁甘美如蜜汁氣味甘平無毒主治調中益氣通血氣解諸熱止渴藏器除煩悶利五臟治腎釣氣其葉研傅蛇蟲咬大明解熱痢及膝腫時珍附錄甘露藤嘉祐藏器曰生嶺南藤蔓如筯人服之得肥一名肥藤味甘温無毒主風血氣諸病久服調中温補令人肥健好顔色大明曰止消渴潤五臟除腹内諸冷甜藤拾遺藏器曰生江南山林下蔓如葛味甘寒無毒主熱煩解毒調中氣令人肥健搗汁和米粉作糗餌食甜美止洩又治剝馬血毒入肉及狂犬牛馬熱黄𫝊蛇咬瘡又有小葉尖長氣辛臭者搗傅小兒腹中閃含水藤海藥校正自木部移入此併入拾遺大瓠藤釋名大瓠藤集解珣曰按劉欣期交州記云含水藤生嶺南及北海邊山谷狀若葛葉似枸杞多在路旁行人乏水處便喫此藤故以為名藏器曰安南朱厓儋耳無水處皆種大瓠藤取汁用之藤狀如瓠斷之水出飲之清美時珍曰顧微廣州記云水藤去地一丈斷之更生根至地水不絶山行口渴斷取汁飲之陳氏所謂大瓠藤葢即此物也藤中水氣味甘平無毒藏器曰寒主治解煩渴心躁瘴癘丹石發動亦宜服之李珣止渴潤五臟去濕痺天行時氣利小便其葉搗傅中水爛瘡皮皸藏器治人體有損痛沭髮令長時珍記廣州附錄鼠藤拾遺珣曰顧微廣州記云鼠愛食此藤故名其咬處人取為藥藏器曰生南海海畔山谷作藤繞樹莖葉滑淨似枸杞花白有節心虚苗頭有毛彼人食之如甘蔗味甘温無毒主丈夫五勞七傷隂痿益陽道小便數白腰脚痛冷除風氣壯筋骨補衰老好顔色濃煮服之取微汗亦浸酒服性温稍令人悶無苦也天仙藤宋圖經集解頌曰生江淮及浙東山中春生苗蔓作藤葉似菖葉圓而小有白毛四時不凋根有鬚夏月采取根苗南人多用之氣味苦温無毒主治解風勞同麻黄治傷寒發汗同大黄墮胎氣蘇頌流氣活血治心腹痛時珍附方新六疝氣作痛天仙藤一兩好酒一盌煮至半盌服之神效孫天仁集效方痰注臂痛天仙藤白术羌活白芷梢各三錢片子薑黄六錢半夏製五錢每服五錢薑五片水煎服仍間服千金五套丸楊仁齋直指方妊娠水腫始自兩足漸至喘悶似水足趾出水謂之子氣乃婦人素有風氣或衝任有血風不可作水妄投湯藥宜天仙藤散主之天仙藤洗微炒香附子炒陳皮甘草烏藥等分為末每服三錢水一大盞薑三片木𤓰三片紫蘇三葉煎至七分空心服一日三服小便利氣脈通腫漸消不須多服此乃淮南名醫陳景初祕方也得于李伯時家陳自明婦人良方産後腹痛兒枕痛天仙藤五兩炒焦為末毎服炒生薑汁童子小便和細酒調服經騐婦人方一切血氣腹痛即上方用温酒調服肺熱鼻􅖟桐油入黄連末用天仙藤燒熱油傅之摘𤣥方紫金藤宋圖經釋名山甘草集解頌曰生福州山中春初單生葉青色至冬凋落其藤似枯條采皮晒乾氣味缺主治丈夫腎氣蘇頌消損傷淤血搗傅惡瘡腫毒時珍附方新二紫金藤丸補腎臟暖丹田興陽道減小便填精髓駐顔色潤肌肉治元氣虛面目黎黒口乾舌濇夢想虚驚耳鳴目淚腰胯沉重百節酸疼項筋𦂳急背脾勞倦隂汗盜汗及婦人子宫久冷月水不調或多或少赤白帶下並宜服之用紫金藤巴㦸天去心三兩吳茱茰髙良薑肉桂青鹽各二兩為末酒糊丸梧子大每温酒下二十丸日三服和劑方死胎不下紫金藤葵根各七錢土牛膝三兩土當歸四錢肉桂二錢麝香三分為末米糊丸梧子大硃砂為衣每服五十丸乳香湯下極騐觀葛靜方南藤宋開寶校正自木部移入此併入有名未用别錄丁公寄圖經石南藤釋名石南藤圖經丁公藤開寶丁公寄别錄丁父别錄風藤志曰生依南樹故號南藤藏器曰丁公寄即丁公藤也始因丁公用有效因以得名集解别錄曰丁公寄生石間蔓延木上葉細大枝赤莖大如磧黄有汁七月七日采頌曰南藤即丁公藤也生南山山谷今泉州榮州有之生依南木莖如馬鞭有節紫褐色葉如杏葉而尖采無時又曰天台石南藤四時不凋土人采葉治腰痛時珍曰今江南湖南諸大山有之細藤圓膩紫錄色一節一葉葉深綠色似杏葉而微短厚其莖貼樹處有小紫瘤疣中有小孔四時不凋莖葉皆臭而極辣白花蛇食其葉氣味辛温無毒别錄曰甘主治金瘡痛延年别錄主風血補衰老起陽强腰脚除痺變白逐冷氣排風邪煮汁服冬月浸酒服藏器煮汁服治上氣欬嗽時珍發明志曰按南史云解叔謙雁門人母有疾夜禱聞空中語云得丁公藤治之即瘥訪醫及本草皆無此藥至宜都山中見一翁伐木云是丁公藤療風乃拜泣求翁并示以漬酒法受畢失翁所在母服之遂愈也時珍曰近俗醫治諸風以南藤和諸藥熬膏市之號南藤膏白花蛇喜食其葉故治諸風猶捷附錄烈節宋圖經頌曰生榮州多在林箐中春生蔓苗莖葉俱似丁公藤而纎細無花實九月采莖曝乾味辛温無毒主肢節風冷筋脈急痛作湯浴之佳時珍曰楊倓家藏經騐方有烈節酒治歴節風痛用烈節松節牛膝熟地黄當歸各一兩為粗末絹袋盛之以無灰酒二百盞浸三日每用一盞入生酒一盞温服表弟武東叔年二十餘患此痛不可忍涪城馬東之以此治之而安清風藤宋圖經釋名青藤綱目尋風藤綱目集解頌曰生台州天台山中其苗蔓延木上四時常青土人采莖用氣味缺主治風疾蘇頌治風濕流注歴節鶴膝麻痺瘙痒損傷瘡腫入酒藥中用時珍附方新二風濕痺痛青藤根三兩防己一兩㕮咀入酒一瓶煮飲普濟方一切諸風青藤膏用青藤出太平荻港上者二三月采之不拘多少入釡内微火熬七日夜成膏收入甆器内用時先備梳三五把量人虚實以酒服一茶匙畢將患人身上拍一掌其後遍身發痒不可當急以梳梳之要痒止即飲冷水一口便解風病皆愈也避風數日良集簡方百稜藤宋圖經釋名百靈藤綱目集解頌曰生台州山中春生苗蔓延木上無花葉冬采皮入藥土人用氣味缺主治盜汗蘇頌治一切風痛風瘡以五斤剉水三斗煮汁五升熬膏每酒服一匙日三服時珍附方新三頭風腦痛百靈藤十斤水一石煎汁三斗入糯米三斗作飯候冷拌神麯炒末九兩同入甕中如常釀酒經三五日更炊糯米冷投之待熟澄清毎温飲一小盞服後渾身汗出為效聖惠方一切風痺不拘久近百靈藤五斤水三斗煎一斗濾汁再煎至三升入牛膝附子仙靈脾赤箭何首烏乳香鹿角膠各二兩為末同煎别入白蜜五合熬如餳狀瓷瓶收之每服一匙温酒下一日二服忌毒物滑物聖惠方大風瘡疾百靈藤四兩水一斗煮三升去滓入粳米四合煮粥於密室中浴畢乃食暖臥取汗汗後皮膚起如麩片毎隔日一作五六十日後漸愈毛髮即生聖惠方省藤拾遺校正自木部移入此釋名赤藤綱目紅藤綱目集解藏器曰生南地深山皮赤大如指堪縛物片片自解也氣味苦平無毒主治蚘蟲煮汁服之齒痛打碎含之煮粥飼狗去瘑藏器治諸風通五淋殺蟲時珍發明時珍曰赤藤善殺蟲利小便洪邁夷堅志云趙子山苦寸白蟲病醫令戒酒而素性耽之一日寓居邵武天王寺夜半醉歸口渴甚見廡間甕水映月瑩然即連酌飲之其甘如飴迨曉蟲出盈席心腹頓寛宿疾遂愈皆驚異之視所飲水乃寺僕織草履浸紅藤根水也附方新一五淋濇痛赤藤即做草鞋者白茯苓苧麻根等分為末百沸湯下毎服一錢如神方究原紫藤宋開寶集解藏器曰藤皮著樹從心重重有皮四月生紫花可愛長安人亦種飾庭也江東呼為招豆藤其子作角角中仁熬香著酒中令酒不敗敗酒中用之亦正其花挼碎栻酒醋白腐壞氣味甘微温有小毒主治作煎如糖服下水癊病藏器落鴈木海藥校正自木部移入此釋名珣曰藤蘿髙丈餘雁過皆綴其中或云鴈銜至代州鴈門而生以此為名集解珣曰按徐表南州記云落鴈木生南海山野中蔓生四邊如刀削代州鴈門亦有之蜀中雅州亦有頌曰雅州出者苗作蔓纒繞大木苗葉形色大都似茶無花實彼人四月采苗入藥用莖葉氣味甘平温無毒主治風痛傷折脚氣腫腹滿虛脹以枌木皮同煮汁洗之立效又婦人隂瘡浮泡以椿木皮同煮汁洗之李珣産後血氣痛并折傷内損諸疾煮汁服蘇頌附錄折傷木唐本草恭曰生資州山谷藤繞樹木上葉似莽草葉而光厚八月九月采莖日乾味甘鹹平無毒主傷折筋骨疼痛散血補血産後血悶止痛酒水各半煮濃汁飲毎始王木唐本草恭曰生資州藤繞樹木上葉似蘿藦葉二月八月采莖隂乾味苦平無毒主傷折跌筋骨生肌破血止痛以酒水各半煮濃汁飲之風延苺拾遺藏器曰生南海山野中他處無有也蔓繞草木上細葉南都賦云風衍蔓延于衡臯是也味苦寒無毒主小兒發熱發强驚癎寒熱熱淋利小便解煩明目並煮服之珣曰主三消五淋下痰小兒赤白毒痢蛇毒瘴溪毒一切瘡腫並宜煎服千里及拾遺校正併入圖經千里光集解藏器曰千里及藤生道旁籬落間葉細而厚宣湖間有之頌曰千里急生天台山中春生苗秋有花土人采花葉入服藥又筠州有千里光生淺山及路旁葉似菊而長背有毛枝幹圓而青春生苗秋有黄花不結實采莖葉入眼藥名黄花演葢一物也氣味苦平有小毒頌曰苦甘寒無毒主治天下疫氣結黄瘴瘧蟲毒煮汁服取吐下亦搗傅蛇犬咬藏器同甘草煮汁飲退熱明目不入衆藥蘇頌同小青煎服治赤痢腹痛時珍附方新一爛弦風眼千里光草以笋殻葉包煨熟捻汁滴入目中經騐良方藤黄海藥校正自木部移入此釋名樹名海藤珣曰按郭義恭廣志云出岳鄂等州諸山厓樹名海藤花有蘂散落石上彼人收之謂之沙黄就樹采者輕妙謂之臘黄今人訛為銅黄銅藤音謬也此與石淚采之無異畫家及丹竈家時用之時珍曰令畫家所用藤黄皆經煎煉成者䑛之麻人按周達觀真臘記云國有畫黄乃樹脂畨人以刀斫樹枝滴下次年收之似與郭氏說微不同不知即一物否也氣味酸濇有毒主治蚛牙蛀齒㸃之便落李珣附錄諸藤一十九種地龍藤拾遺藏器曰生天目山繞樹蟠屈如龍故名吳中亦有而小異味若無毒主風血羸老腹内腰脚諸冷食不調不作肌膚浸酒服之龍手藤藏器曰出安荔浦石上向陽者葉如龍手采無時味甘温無毒主偏風口喎手足癱緩補虚益陽去冷氣風痺以醇酒浸近火令温空心服之取微汗牛領藤藏器曰生嶺南髙山形褊如牛領取之隂乾味甘温無毒主腹内冷腰膝痛弱小便白數陽道乏煮汁或浸酒服牛妳藤藏器曰生深山大如樹牛好食之其中有粉味甘温無毒主救荒令人不飢其根食之令人髮落鬼膊藤藏器曰生江南林澗邊葉如梨葉子如樝子藤味苦温無毒浸酒服去風血同葉搗傅癱腫斑珠藤藏器曰生山谷中不凋子如珠而斑冬月取之味甘温無毒浸酒服主風血羸瘦婦人諸疾息王藤藏器曰生嶺南山谷冬月不凋味苦温無毒主産後腹痛血露不盡濃煮汁服萬一藤藏器曰生嶺南蔓如小豆一名萬吉主蛇蛟杵末水和傅之曼遊藤藏器曰生無為天門山谷狀如寄生著大樹葉如柳春花色紫蜀人謂之沉蘤藤味甘温無毒久服長生延年去久嗽治癬百丈青藏器曰生江南林澤藤蔓𦂳硬葉如薯蕷對生味苦平無毒解諸毒物天行瘴瘧疫毒並煮汁服亦生搗汁服其根令人下利温藤藏器曰生江南山谷著樹不凋莖葉味甘温無毒浸酒服主風血積冷藍藤藏器曰生新羅國根如細辛味辛温無毒主冷氣欬嗽煮汁服𤓰藤宋圖經頌曰生施州四時有葉無花采皮無時味甘涼無毒主諸熱毒惡瘡同刺猪苓洗去粗皮焙乾等分搗羅用甘草水調貼之金稜藤頌曰生施州四時有葉無花采無時味辛温無毒主筋骨疼痛與續筋根馬接脚同洗去粗皮焙乾等分為末酒服二錢無所忌含春藤頌曰生台州其苗延木冬夏常青采葉治諸風有效獨用藤頌曰生施州四時有葉無花葉上有倒刺采皮無時味苦辛熱無毒主心氣痛和小赤頭葉焙等分研末酒服一錢祁婆藤頌曰生天台山中蔓延木上四時常有土人采葉治諸風有效野猪尾頌曰生施州藤纒大木四時有葉無花味苦濇涼無毒主心氣痛解熱毒同百藥頭等分焙研為末每酒服二錢石合草頌曰生施州藤纒木上四時有葉無花土人采葉味甘涼無毒主一切惡瘡斂瘡口焙研温水調貼骨路支拾遺藏器曰味辛平無毒主上氣浮腫水氣嘔逆婦人崩中餘血癥瘕殺三虫生崑崙國苗似凌霄藤根如青木香安南亦有之名飛藤此條原附錄紫葳之后鈔書遺落附于此也本草綱目卷十八下
