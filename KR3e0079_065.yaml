body:
  text: 本草綱目卷二十五明李時珍撰穀之四造釀類二十九種七附藥粥五十三種藥酒十種大豆䜴别録中品釋名時珍曰按劉熈釋名云豉嗜也調和五味可甘嗜也許慎説文謂豉為配鹽幽菽者乃鹹豉也集解𢎞景曰䜴出襄陽錢塘者香美而濃入藥取中心者佳藏器曰蒲州豉味鹹作法與諸䜴不同其味烈陜州有豉汁經十年不敗入藥並不如今之豉心為其無鹽故也詵曰陜府豉汁甚勝常豉其法以大豆為黄蒸每一斗加鹽四升椒四兩春三日夏二日即成半熟加生薑五兩既潔淨且精也時珍曰豉諸大豆皆可為之以黑豆者入藥有淡䜴鹹䜴治病多用淡䜴汁及鹹者當隨方法其豉心乃合䜴時取其中心者非剝皮取心也此説見外䑓秘要造淡豉法用黒大豆二三斗六月内淘淨水浸一宿瀝乾蒸熟取出攤席上候微温蒿覆每三日一㸔候黄衣上遍不可太過取晒簸淨以水拌乾濕得所以汁出指間為準安甕中築實桑葉葢厚三寸宻封泥於日中晒七日取出曝一時又以水拌入甕如此七次再蒸過攤去火氣甕收築封即成矣造鹹豉法用大豆一斗水浸三日淘蒸攤罯候上黄取出簸淨水淘漉乾每四斤入鹽一斤薑絲半斤椒橘蘇茴杏仁拌勻入甕上面水浸過一寸以箬葢封口晒一月乃成也造豉汁法十月至正月用好豉三斗清麻油熬令烟㫁以一升拌豉蒸過攤冷晒乾拌再蒸凡三遍以白鹽一斗搗和以湯淋汁三四斗入淨釡下椒薑葱橘絲同煎三分減一貯於不津器中香美絶勝也有麩䜴𤓰䜴醤䜴諸品皆可為之但充食品不入藥用也淡䜴氣味苦寒無毒思邈曰苦甘寒濇得醯良杲曰隂中之隂也主治傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虚勞喘吸兩脚疼冷殺六畜胎子諸毒别録治時疾熱病發汗熬末能止盜汗除煩生搗為丸服治寒熱風胸中生瘡煮服治血痢腹痛研塗隂莖生瘡藥性治瘧疾骨蒸中毒藥蠱氣犬咬大明下氣調中治傷寒温毒發癍嘔逆時珍黒千金治温毒膏用之蒲州豉氣味鹹寒無毒主治解煩熱熱毒寒熱虚勞調中發汗通關節殺腥氣傷寒鼻塞陜州豉汁亦除煩熱藏器發明𢎞景曰豉食中常用春夏之氣不和蒸炒以酒漬服之至佳依康伯法先以醋酒溲蒸曝燥麻油和再蒸曝之凡三過末椒薑治和進食大勝今時油䜴也患脚人常將漬酒飲之以滓傅脚皆瘥頌曰古今方書用䜴治病最多江南人善作䜴凡得時氣即先用葱䜴湯服之取汗徃徃便瘥也時珍曰陶説康伯䜴法見博物志云原出外國中國謂之康伯乃傳此法之姓名耳其䜴調中下氣最妙黑豆性平作䜴則温既經蒸罯故能升能散得葱則發汗得鹽則能吐得酒則治風得薤則治痢得蒜則止血炒熟則又能止汗亦麻黄根節之義也附方舊三十一新一十八傷寒發汗頌曰葛洪肘后方云傷寒有數種庸人卒不能分别者今取一藥兼療之凡初覺頭痛身熱脉洪一二日便以葱䜴湯治之用葱白一虎口䜴一升綿褁水三升煮一升頓服取汗更作加葛根三兩再不汗加麻黄三兩肘后又法用葱湯煮米粥入鹽豉食之取汗三又法用豉一升小男溺升煎一升分服取汗傷寒不解傷寒不止不解已三四日胸中悶惡者用豉一升鹽一合水四升煮一升半分服取吐此秘法也梅師方辟除瘟疫豉和白术浸酒常服之梅師傷寒懊憹吐下後心中懊憹大下後身熱不去心中痛者並用巵子豉湯吐之肥巵子十四枚水二盞煮一盞入䜴半兩同煮至七分去滓服得吐止后服傷寒論傷寒餘毒傷寒後毒氣攻手足及身體虚腫用豉五合微炒以酒一升半同煎五七沸任性飲之簡要濟衆傷寒目翳燒豉二七枚研末吹之肘后傷寒暴痢藥性論曰以豉一升薤白一握水三升煮薤熟納豉更煮色黑去豉分為二服血痢不止用豉大蒜等分杵丸梧子大每服三十丸鹽湯下王氏博濟血痢如刺藥性論曰以豉一升水漬相淹煎兩沸絞汁頓服不瘥再作赤白重下葛氏用豆豉熬小焦搗服一合日三或炒焦以水浸汁服亦騐外臺用䜴心炒為末一升分四服酒下入口即㫁也臟毒下血烏犀散用淡䜴十文大蒜二枚煨同擣丸梧子大煎香菜湯服二十丸日二服安乃止永絶根本無所忌廬州彭大祥云此藥甚妙但大蒜九蒸乃佳仍以冷虀水送下昔朱元成言其姪及陸子楫提刑皆服此數十年之疾更不復作也䆒原方小便血條淡豆豉一撮煎湯空腹飲或入酒服危氏得效方瘧疾寒熱煮䜴湯飲數升得大吐即愈肘后方小兒寒熱惡氣中人以濕䜴研丸雞子大以摩腮上及手足心六七遍又摩心臍上旋旋呪之了破豉丸㸔有細毛棄道中即便瘥也食醫心鏡方盜汗不止詵曰以䜴一升微炒香清酒三升漬三日取汁冷暖任服不瘥更作三兩劑即止齁喘痰積凡天雨便發坐卧不得飲食不進乃肺竅久積冷痰遇隂氣觸動則發也用此一服即愈服至七八次即出惡痰數升藥性亦隨而出即㫁根矣用江西淡豆䜴一兩蒸搗如泥入砒霜末一錢枯白礬三錢丸緑豆大每用冷茶冷水送下七丸甚者九丸小兒五丸即髙枕仰卧忌食熱物等皆效方風毒膝攣骨節痛用䜴三五升九蒸九暴以酒一斗浸經宿空心隨性温飲食醫心鏡手足不隨豉三升水九升煮三升分三服又法豉一升微熬嚢貯漬三升酒中三宿温服常令微醉為佳方肘后頭風疼痛䜴湯洗頭避風取瘥孫真人方卒不得語煮豉汁加八美酒服之肘后喉痺不語煮豉汁一升服覆取汗仍着桂末于舌下嚥之千金咽生瘜肉鹽豉和搗塗之先刺破出血乃用神效聖濟總録口舌生瘡胸膈疼痛者用焦䜴末含一宿即瘥聖惠方舌上血出如針孔者䜴三升水三升煮沸服一升日三服葛氏方墮胎血下煩滿用豉一升水三升煮三沸調鹿角末方寸匕子母秘録方妊娠動胎豉汁服炒華佗方也同上婦人難産乃兒枕破與敗血褁其子也以勝金散逐其敗血即順矣用鹽䜴一兩以舊青布褁了燒赤乳細入麝香一錢為末取秤鍾燒紅淬酒調服一大盞中郭稽方小兒胎毒淡䜴煎濃汁與三五口其毒自下又能助脾氣消乳食聖惠小兒哯乳用鹹豉七箇去皮膩粉一錢同研丸黍米大每服三五丸藿香湯下全幼心鑑小兒丹毒作瘡出水䜴炒烟盡為末油調傅之姚和衆方小兒頭瘡以黄泥褁煨熟取研以蓴菜油調傅之勝金發背癰腫已潰未潰用香䜴三升入少水擣成泥炤腫處大小作餅厚三分瘡有孔勿覆孔上鋪豉餅以艾列於上灸之但使温温勿令破肉如熱痛即急易之患當減快一日二次灸之如先有孔以汁出為妙千金方一切惡瘡熬豉為末傅之不過三四次出楊氏産乳隂莖生瘡痛爛者以䜴一分蚯蚓濕泥二分水研和塗上乾即易之禁熱食酒蒜芥菜藥性論蠼螋尿瘡杵豉傅之良千金蟲刺螫人䜴心嚼敷少頃見豉中有毛即瘥若不見再傅晝夜勿絶見毛為度外䑓蹉跌破傷筋骨用䜴三升水三升漬濃汁飲之止心悶千金毆傷瘀聚腹中悶滿豉一升水三升煮三沸分服不瘥再作千金解蜀椒毒䜴汁飲之千金方中牛馬毒豉汁和人乳頻服之效衛生易簡小蝦蟇毒小蝦蟇有毒食之令人小便秘澀臍下悶痛有至死者以生豉一合投新汲水半椀浸濃汁頓飲之即愈話茆亭客中酒成病䜴葱白各半升水二升煮一升頓服千金方服藥過劑悶亂者䜴汁飲之千金雜物眯目不出用豉三七枚浸水洗目視之即出總録方刺在肉中嚼䜴塗之千金方小兒病淋方見蒸餅發明下腫從脚起䜴汁飲之以滓傅之肘后方豆黄食療校正原附大豆下今分出釋名時珍曰造法用黒豆一斗蒸熟鋪席上以蒿覆之如􅝛醤法待上黄取出晒乾搗末收用氣味甘温無毒詵曰忌豬肉主治濕痺膝痛五臓不足脾胃氣結積壯氣力潤肌膚益顔色填骨髓補虚損能食肥健人以鍊豬脂和丸每服百丸神騐秘方也肥人勿服詵秘出延年録方生嚼塗隂痒汗出時珍附方新二脾弱不食餌此當食大豆黄二升大麻子三升熬香為末每服一合飲下日四五服任意千金方打擊青腫大豆黄為末水和塗之外䑓秘要豆腐日用集解時珍曰豆腐之法始於漢淮南王劉安凡黑豆黄豆及白豆泥豆豌豆緑豆之類皆可為之造法水浸磑碎濾去滓煎成以鹽􅒾汁或山礬葉或酸漿醋澱就釡收之又有入缸内以石膏末收者大抵得鹹苦酸辛之物皆可收斂爾其面上凝結者揭取眼乾名豆腐皮入饌甚佳也氣味甘鹹寒有小毒原曰性平頌曰寒而動氣瑞曰發腎氣瘡疥頭風杏仁可解時珍曰按延壽書云有人好食豆腐中毒醫不能治作腐家言萊菔入湯中則腐不成遂以萊菔湯下藥而愈大抵暑月恐有人汗尤宜慎之主治寛中益氣和脾胃消脹滿下大腸濁氣寗原清熱散血時珍附方新四休息久痢白豆腐醋煎食之即愈普濟方赤眼腫痛有數種皆肝熱血凝也用消風熱藥服之夜用鹽收豆腐片貼之酸漿者勿用證治要訣杖瘡青腫豆腐切片貼之頻易一法以燒酒煮貼之色紅即易不紅乃已拔萃方燒酒醉死心頭熱者用熱豆腐細切片遍身貼之貼冷即換之甦省乃止陳廩米别録下品釋名陳倉米古名老米俗名火米時珍有屋曰廩無屋曰倉皆官積也方曰倉圎曰囷皆私積也老亦陳也火米有三有火蒸治成者有火燒治成者又有畬田火米與此不同集解𢎞景曰陳廩米即粳米久入倉陳赤者以廩軍人故曰廩爾方中多用之人以作醋勝於新粳米也藏器曰廩米吳人以粟為良漢地以粳為善亦猶吳紵鄭縞貴近賤逺之意確論其功粟當居前宗奭曰諸家註説不言是粳是粟然二米陳者性皆冷煎煮亦無膏膩粉食令人自利與經説稍戾時珍曰廩米北人多用粟南人多用粳及秈並水浸蒸晒為之亦有火燒過治成者入倉陳久皆氣過色變故古人謂之紅粟紅腐陳陳相因也氣味鹹酸温無毒藏器曰廩米熱食即熱冷食即冷假以火氣也體自温平同馬肉飡發痼疾時珍曰廩米年久其性多凉但炒食則温爾豈有熱食即熱者乎主治下氣除煩渇調胃止洩别録補五臟澀腸胃日華暖脾去憊氣宜作湯食士良炊飯食止痢補中益氣堅筋骨通血脉起陽道以飯和酢搗封毒腫惡瘡立瘥北人以飯置甕中水浸令酸食之暖五臟六腑之氣研米服去卒心痛孟詵寛中消食多食易饑寗原調腸胃利小便止渴除熱時珍發明時珍曰陳倉米煮汁不渾初時氣味俱盡故冲淡可以養胃古人多以煮汁煎藥亦取其調腸胃利小便去濕熱之功也千金方治洞注下利炒此米研末飲服者亦取此義日華子謂其澀腸胃寇氏謂其冷利皆非中論附方新五霍亂大渴能殺人以黄倉米三升水一斗煮汁澄清飲良永類鈐方反胃膈氣不下食者大倉散用倉米或白米日西時以水微拌濕自想日氣如在米中次日晒乾袋盛掛風處每以一撮水煎和汁飲之即時便下勻又方陳倉米炊飯焙研每五兩入沈香末半兩和每米飲服二三錢普濟方諸般積聚太倉丸治脾胃饑飽不時生病及諸般積聚百物所傷陳倉米四兩以巴豆二十一粒去皮同炒至米香豆黒勿令米焦擇去豆不用入去白橘皮四兩為末糊丸梧子大每薑湯服五丸日二服百一𨕖方暑月吐瀉陳倉米二升麥芽四兩黄連四兩切同蒸熟焙研為末水丸梧子大每服百丸白湯送下飯拾遺釋名缺集解時珍曰飯食諸穀皆可為之各隨米性詳見本條然有入藥諸飯不可類從者應當别出大抵皆取粳秈粟米者爾新炊飯主治人尿牀以熱飯一盞傾尿牀處拌與食之勿令病者知又乗熱傅腫毒良時珍寒食飯饋飯也主治滅瘢痕及雜瘡研末傅之藏器燒灰酒服治食本米飲成積黄瘦腹痛者甚效孫思邈傷寒食復用此飯燒研米飲服二三錢效時珍祀竈飯主治卒噎取一粒食之即下燒研搽鼻中瘡時珍盆邉零飯主治鼻中生瘡燒研傅之時珍齒中殘飯主治蝎蛟毒痛傅之即止時珍飱飯飱音孫即水飯也主治熱食解渴除煩時珍荷葉燒飯主治厚脾胃通三焦資助生發之氣時珍發明李杲曰易水張潔古枳术丸用荷葉褁燒飯為丸葢荷之為物色青中空象乎震卦風木在人為足少陽膽同手少陽三焦為生化萬物之根蒂用此物以成其化胃氣何由不上升乎更以燒飯和藥與白术協力滋養穀氣令胃厚不致再傷其利廣矣大矣時珍曰按韓􅐂醫通云東南人不識北方炊飯無甑類乎為燒如燒菜之意遂訛以荷葉包飯入灰火燒煨雖丹溪亦未之辯但以新荷葉煮湯入粳米造飯氣味亦全也凡粳米造飯用荷葉湯者寛中芥葉湯者豁痰紫蘇湯者行氣解肌薄荷湯者去熱淡竹葉湯者辟暑皆可類推也青精乾石飯宋圖經釋名烏飯頌曰按陶隠居登真隠訣載太極真人青精乾石飯法音信之為言飱也謂以酒蜜藥草輩溲而曝之也亦作迎凡内外諸書並無此字惟施於此飯之名耳陳藏器本草名烏飯集解頌曰登真隠訣載南燭草木名状註見木部本條下其作飯法以生白粳米一斛五斗舂治淅取一斛二斗用南燭木葉五斤燥者三斤亦可雜莖皮煮取汁極令清冷以溲米米釋炊之從四月至八月末用新生葉色皆深九月至三月用宿葉色皆淺可隨時進退其斤兩又采軟枝莖皮於石臼中擣碎假令四五月中作可用十許斤熟舂以斛二斗湯浸染得一斛也比來只以水漬一二宿不必用湯漉而炊之初米正作紅色蒸過便如紺色若色不好亦可淘去更以新汁漬之洒濩皆用此汁惟令飯作正青色乃止髙格曝乾當三蒸曝每蒸輒以葉汁溲令浥浥每日可服二升勿復血食填胃補髓消滅三蟲上元寳經云子服草木之王氣與神通子食青燭之津命不復殞此之謂也今茅山道士亦作此飯或以寄逺重蒸過食之甚香甘也藏器曰烏飯法取南燭莖葉搗碎清汁浸粳米九浸九蒸九曝米粒𦂳小黑如㻨珠袋盛可以適逺方也時珍曰此飯乃仙家服食之法而今之釋家多於四月八日造之以供佛耳造者又入柹葉白楊葉數十枝以助色或又加生鐵一塊者止知取其上色不知乃服食家所忌也氣味甘平無毒主治日進一合不饑益顔色堅筋骨能行藏器益腸胃補髓滅三蟲久服變白却老蘇頌極出太真人法粥拾遺釋名糜時珍曰粥字象米在釡中相屬之形釋名云煮米為粥使糜爛也粥濁於糜育育然也厚曰饘薄曰酏小麥粥主治止消渴煩熱時珍寒食粥用杏仁和諸花作之主治咳𠻳下血氣調中藏器糯米􅐕米黍米粥氣味甘温無毒主治益氣治脾胃虚寒洩痢吐逆小兒痘瘡白色時珍粳米秈米粟米粱米粥氣味甘温平無毒主治利小便止煩渴養腸胃時珍發明時珍曰按羅天益寳鑑云粳粟米粥氣薄味淡陽中之隂也所以淡滲下行能利小便韓􅐂醫通云一人病淋素不服藥予令專啖粟米粥絶去他味旬餘減月餘痊此五穀治病之理也又張來粥記云每日起食粥一大椀空腹胃虛穀氣便作所補不細又極柔膩與腸胃相得最為飲食之妙訣齊和尚説山中僧每将旦一粥甚繫利害如不食則終日覺臓腑燥涸葢粥能暢胃氣生津液也大抵養生求安樂亦無深逺難知之事不過寝食之間爾故作此勸人每日食粥勿大笑也又蘇軾帖云夜饑甚吴子野勸食白粥云能推陳致新利膈益胃粥既快美粥後一覺妙不可言也此皆著粥之有益如此諸穀作粥詳見本條古方有用藥物粳粟粱米作粥治病甚多今畧取其可常食者集於下方以備參考云赤小豆粥利小便消水腫脚氣辟邪癘緑豆粥解熱毒止煩渴御米粥治反胃利大腸薏苡仁粥除濕熱利腸胃蓮子粉粥健脾胃止洩痢芡實粉粥固精氣明耳目菱實粉粥益腸胃解内熱栗子粥補腎氣益腰脚薯預粥補腎精固腸胃芋粥寛腸胃令人不饑百合粉粥潤肺調中蘿蔔粥消食利膈胡蘿蔔粥寛中下氣馬齒莧粥治痺消腫油菜粥調中下氣莙薘菜粥健胃益脾波薐菜粥和中潤燥薺菜粥明目利肝芹菜粥去伏熱利大小腸芥菜粥豁痰辟惡葵菜粥潤燥寛腸韭菜粥温中暖下葱豉粥發汗解肌伏苓粉粥清上實下松子仁粥潤心肺調大腸酸棗仁粥治煩熱益膽氣枸把子粥補精血益腎氣薤白粥治老人冷利生薑粥温中辟惡花椒粥辟瘴禦寒茴香粥和胃治疝胡椒粥茱萸粥辣米粥並治心腹疼痛麻子粥胡麻粥郁李仁粥並潤腸治痺蘇子粥下氣利膈竹葉湯粥止渴清心豬腎粥羊腎粥鹿腎粥並補腎虚諸疾羊肝粥雞肝粥並補肝虚明目羊汁粥雞汁粥並治勞損鴨汁粥鯉魚汁粥並消水腫牛乳粥補虚羸酥蜜粥養心肺鹿角膠入粥食助元陽治諸虚炒麫入粥食止白痢燒鹽入粥食止血痢麨尺沼切拾遺校正原附粟下今分出釋名糗去九切時珍曰麨以炒成其臭香故糗從臭麨從炒省也劉熙釋名云糗齲也飯而磨之使齲碎也集解恭曰麨蒸米麥熬過磨作之藏器曰河東人以麥為之北人以粟為之東人以粳米為之炒乾飯磨成也粗者為乾糗糧米麥麨氣味甘苦微寒無毒藏器曰酸寒主治寒中除熱渴消石氣蘇頌和水服解煩熱止洩實大腸藏器炒米湯止煩渴時珍餻綱目釋名粢時珍曰餻以黍糯合粳米粉蒸成状如凝膏也單糯粉作者曰粢米粉合豆末糖蜜蒸成者曰餌釋名云粢慈軟也餌而也相粘而也揚雄方言云餌謂之餻或謂之粢或謂之􅀈音令或謂之餣音浥然亦微有分别不可不知之也氣味甘温無毒時珍曰粳米餻易消導粢餻最難尅化損脾或積小兒尤宜禁之主治粳餻飬脾胃厚腸益氣和中粢餻益氣暖中縮小便堅大便效時珍發明時珍曰晚粳米餻可代蒸餅丸脾胃藥取其易化也糯米粢可代糯糊丸丹藥取其相粘也九日登髙米餻亦可入藥按聖惠方治山瘴瘧有餻角飲九月九日取米餻角隂乾半兩寒食飯二百粒豉一百粒獨蒜一枚恒山一兩以水二盞浸一夜五更煎至一盞頓服當下利為度附方新一老人泄瀉乾餻一兩薑湯泡化代飯簡便方糭綱目釋名角黍時珍曰糭俗作粽古人以菰蘆葉褁黍米煮成尖角如㯶櫚葉心之形故曰糭曰角黍近世多用糯米矣今俗五月五日以為節物相餽送或言為祭屈原作此投江以飼蛟龍也氣味甘温無毒主治五月五日取㯶尖和截瘧藥良時珍寒具綱目釋名捻頭錢乙環餅要術饊時珍曰寒具冬春可留數月及寒食禁烟用之故名寒具捻頭捻其頭也環餅象環釧形也饊易消散也服虔通俗文謂之餲張楫廣雅謂之粰􅦴楚辭謂之粔籹雜字解詁謂之膏環集解時珍曰錢乙方中有捻頭散葛洪肘後有捻頭湯醫書不載按鄭𤣥註周禮云寒具米食也賈思勰要術云環餅一名寒具以水搜入牛羊脂和作之入口即碎林洪清供云寒具捻頭也以糯粉和麫麻油煎成以餹食之可留月餘宜禁烟用觀此則寒具即今饊子也以糯粉和麫入少鹽牽索紐捻成環釧之形油煎食之劉禹錫寒具詩云纎手搓成玉數尋碧油煎出嫩黄深夜來春睡無輕重壓褊佳人纒臂金氣味甘鹹温無毒主治利大小便潤腸温中益氣時珍附方新二錢氏捻頭散治小兒小便不通用延胡索苦楝子等分為末毎服半錢或一錢以捻頭湯食前調下如無捻頭滴油數㸃代之錢氏小兒方血痢不止地榆晒研為末每服二錢摻在羊血上炙熱食之以捻頭煎湯送下或以地榆煮汁熬如飴状一服三合捻頭湯化下蒸餅綱目釋名時珍曰按劉熈釋名云餅者并也溲麫使合并也有蒸餅湯胡餅索餅酥餅之屬皆隨形命名也集解時珍曰小麥麫修治食品甚多惟蒸餅其來最古是酵糟發成單麫所造丸藥所須且能治疾而本草不載亦一缺也惟臘月及寒食日蒸之至皮裂去皮懸之風乾臨時以水浸脹擂爛濾過和脾胃及三焦藥甚易消化且麫已過性不助濕熱其以果菜油膩諸物為饀者不堪入藥氣味甘平無毒主治消食養脾胃温中化滯益氣和血止汗利三焦通水道時珍發明時珍曰按愛竹談藪云宋寜宗為郡王時病淋日夜凡三百起國醫罔措或舉孫琳治之琳用蒸餅大蒜淡豆豉三物搗丸令以温水下三十丸曰今日進三服病當減三之一明日亦然三日病除已而果然賜以千緡或問其説琳曰小兒何縁有淋只是水道不利三物皆能通利故爾若琳者其可與語醫矣附方新六積年下血寒食蒸餅烏龍尾各一兩皂角七挺去皮酥炙為末蜜丸米飲每服二十丸聖惠方下痢赤白治營衛氣虚風邪襲入腸胃之間便痢赤白臍腹㽲痛裏急後重煩渴脹滿不進飲食用乾蒸餅蜜拌炒二兩御米殻蜜炒四兩為末煉蜜丸芡子大每服一丸水一盞煎化熱服妙傳信適用方崩中下血陳年蒸餅燒存性米飲服二錢盜汗自汗每夜卧時帶饑喫蒸餅一枚不過數日即止醫林集要一切折傷寒食蒸餅為末每服二錢酒下甚騐方肘后湯火傷灼饅頭餅燒存性研末油調塗傅之肘后方女麴拾遺校正原附小麥下今分出釋名䴷子音桓黄子時珍曰此乃女人以完麥罨成黄子故有諸名集解恭曰女麴完小麥為飯和成罨之待上黄衣取晒氣味甘温無毒主治消食下氣止洩痢下胎破冷血蘇頌黄蒸拾遺校正原附小麥下今分出釋名黄衣蘇恭麥黄時珍曰此乃以米麥粉和罨待其薫蒸成黄故有諸名集解恭曰黄蒸磨小麥粉拌水和成餅麻葉褁待上黄衣取晒藏器曰黄蒸與䴷子不殊北人以小麥南人以粳米六七月作之生緑塵者佳時珍曰女麴蒸麥飯罨成黄蒸磨米麥粉罨成稍有不同也氣味主治並同女麴蘇恭温補能消諸生物藏器温中下氣消食除煩日華治食黄黄汗時珍附方新一廕黄疸疾或黄汗染衣涕唾皆黄用好黄蒸二升每夜以水二升浸微暖於銅器中平旦絞汁半升極效必效方麴宋嘉祐釋名酒母時珍曰麴以米麥包罨而成故字從麥從米從包省文㑹意也酒非麴不生故曰酒母書云若作酒醴爾惟麴糵是矣劉熈釋名云麴朽也欝使生衣敗朽也集解藏器曰麴六月作者良入藥須陳久者炒香用時珍曰麴有麥麫米造者不一皆酒醋所須俱能消導功不甚逺造大小麥麴法用大麥米或小麥連皮井水淘淨晒乾六月六日磨碎以淘麥水和作塊楮葉包紥懸風處七十日可用矣造麫麴法三伏時用白麫五斤緑豆五斤以蓼汁煮爛辣蓼末五兩杏仁泥十兩和踏成餅楮葉褁懸風處候生黄收之造白麴法用麫五斤糯米粉一斗水拌微濕篩過踏餅楮葉包掛風處五十日成矣又米麴法用糯米粉一斗自然蓼汁和作圎丸楮葉包掛風處七七日晒收此數十麴皆可入藥其各地有入諸藥草及毒藥者皆有毒惟可造酒不可入藥也小麥麴氣味甘温無毒震亨曰麩皮麴凉入大腸經主治消穀止痢别録平胃氣消食痔治小兒食癎蘇恭調中下氣開胃療臟腑中風寒藏器主霍亂心膈氣痰逆除煩破癥結孟詵補虚去冷氣除腸胃中塞不下食令人有顔色吴瑞落胎并下鬼胎日華止河魚之疾梁簡帝勸醫文大麥麴氣味同前主治消食和中下生胎破血取五升以水一斗煮三沸分五服其子如糜令母肥盛時珍麫麴米麴氣味同前主治消食積酒積糯米積研末酒服立愈餘功同小麥麴時珍金出千附方舊五新四米穀食積炒麴末白湯調服二錢日三服三焦滯氣陳麴炒萊菔子炒等分每用三錢水煎入麝香少許服普濟小腹堅大如盤胸滿食不能消化用麴末湯服方寸匕日三千金水痢百起六月六日麴炒黄馬藺子等分為末米飲服方寸匕無馬藺子用牛骨灰代之普濟方赤白痢下水穀不消以麴熬粟米粥服方寸匕日四五服肘后方酒毒便血麴一塊濕紙包煨為末空心米飲服二錢神效傷寒食復麴一餅煮汁飲之良類要方胎動不安或上搶心下血者生麴餅研末水和絞汁服三升肘后狐刺尿瘡麴末和獨頭蒜杵如麥粒納瘡孔中蟲出愈古今録騐神麴藥性論釋名集解時珍曰昔人用麴多是造酒之麴後醫乃造神麴專以供藥力更勝之葢取諸神聚㑹之日造之故得神名賈思勰齊民要術雖有造神麴古法繁瑣不便近時造法更簡易也葉氏水雲録云五月五日或六月六日或三伏日用白麫百斤青蒿自然汁三升赤小豆末杏仁泥各三升蒼耳自然汁野蓼自然汁各三升以配白虎青龍朱雀𤣥武勾陳螣蛇六神用汁和麫豆杏仁作餅麻葉或楮葉包罯如造醬黄法待生黄衣晒收之氣味甘辛温無毒元素曰陽中之陽也入足陽明經凡用須火炒黄以助土氣陳久者良主治化水穀宿食癥結積滯健脾暖胃藥性養胃氣治赤白痢元素消食下氣除痰逆霍亂泄痢脹滿諸疾其功與麴同閃挫腰痛者煆過淬酒温服有效婦人産後欲回乳者炒研酒服二錢日二即止甚騐時珍發明時珍曰按倪維徳啓微集云神麴治目病生用能發其生氣熟用能斂其暴氣也附方舊一新六胃虚不尅神麴半斤麥芽五升杏仁一升各炒為末煉蜜丸彈子大每食後嚼化一丸普濟方壯脾進食療痞滿暑泄麴术丸用神麴炒蒼术泔制炒等分為末糊丸梧子大每米飲服五十丸冷者加乾薑或吴茱萸肘后百一選方健胃思食養食丸治脾胃俱虚不能消化水穀胸膈痞悶腹脇膨脹連年累月食減嗜卧口無味神麴六兩麥糵炒三兩乾薑炮四兩烏梅肉焙四兩為末蜜丸梧子大每米飲服五十丸日三服和劑局方虚寒反胃方同上暴泄不止神麴炒二兩茱萸湯泡炒半兩為末醋糊丸梧子大每服五十丸米飲下選百一方産後運絶神麴炒為末水服方寸匕千金方食積心痛陳神麴一塊燒紅淬酒二大椀服之摘𤣥方紅麴丹溪補遺集解時珍曰紅麴本草不載法出近世亦奇術也其法白粳米一石五斗水淘浸一宿作飯分作十五處入麴母三斤搓揉令勻併作一處以帛宻覆熱即去帛攤開覺温急堆起又宻覆次日日中又作三堆過一時分作五堆再一時合作一堆又過一時分作十五堆稍温又作一堆如此數次第三日用大桶盛新汲水以竹籮盛麴作五六分蘸濕完又作一堆如前法作一次第四日如前又蘸若麴半沈半浮再依前法作一次又蘸若盡浮則成矣取出日乾收之其米過心者謂之生黄入酒及鮓醢中鮮紅可愛未過心者不甚佳入藥以陳久者良氣味甘温無毒瑞曰醸酒則辛熱冇小毒發腸風痔瘻脚氣哮喘痰𠻳諸疾主治消食活血健脾燥胃治赤白痢下水穀震亨醸酒破血行藥勢殺山嵐瘴氣治打撲傷損吴瑞治女人血氣痛及産後惡血不盡擂酒飲之良時珍發明時珍曰人之水穀入於胃受中焦濕熱薫蒸游溢精氣日化為紅散布臓腑經絡是為營血此造化自然之微妙也造紅麴者以白米飯受濕熱欝蒸變而為紅即成真色久亦不渝此乃人窺造化之巧者也故紅麴有治脾胃營血之功得同氣相求之理附方新四濕熱泄痢丹溪青六丸用六一散加炒紅麴五錢為末蒸餅和丸梧子大每服五七十丸白湯下日三服丹溪心法小兒吐逆頻併不進乳食手足心熱用紅麴年久者三錢半白术麩炒一錢半甘草炙一錢為末每服半錢煎棗子米湯下經濟小兒頭瘡因傷濕入水成毒濃汁不止用紅麴嚼罨之甚效百一選方心腹作痛赤麴香附乳香等分為末酒服方摘𤣥糵米别録中品釋名𢎞景曰此是以米作糵非别米名也恭曰糵猶孽也生不以理之名也皆當以可生之物生之取其糵中之米入藥按食經用稻糵稻即穬穀之總名陶謂以米作糵非矣米豈能更生乎集解宗奭曰糵米粟糵也時珍曰别録止云糵米不云粟作也蘇恭言凡穀皆可生者是矣有粟黍穀麥豆諸糵皆水浸脹候生芽曝乾去鬚取其中米炒研麫用其功皆主消導余併集於左方日華子謂糵米為作醋黄子者亦誤矣粟糵一名粟芽氣味苦温無毒宗奭曰今穀神散中用之性温於麥蘖主治寒中下氣除熱别録除煩消宿食開胃日華為末和脂傅面令皮膚悦澤陶𢎞景稻糵一名穀芽氣味甘温無毒主治快脾開胃下氣和中消食化積時珍附方新一啓脾進食穀神丸用穀糵四兩為末入薑汁鹽少許和作餅焙乾入炙甘草砂仁白术麩炒各一兩為末白湯㸃服之或丸服澹寮方穬麥糵一名麥芽氣味鹹温無毒主治消食和中别録破冷氣去心腹脹滿藥性開胃止霍亂除煩悶消痰飲破癥結能催生落胎日華補脾胃虚寛腸下氣腹鳴者用之元素消化一切米麫諸果食積時珍發明好古曰麥芽神麴二藥胃氣虚人宜服之以代戊巳腐熟水穀豆蔲縮砂烏梅木𤓰芍藥五味子為之使時珍曰麥糵穀芽粟糵皆能消導米麫諸果食積觀造餳者用之可以類推矣但有積者能消化無積而久服則消人元氣也不可不知若久服者須同白术諸藥兼用則無害也矣附方舊三新五快膈進食麥糵四兩神麴二兩白术橘皮各一兩為末蒸餅丸梧子大每人參湯下三五十丸效穀勞嗜卧飽食便卧得穀勞病令人四肢煩重嘿嘿欲卧食畢輒甚用大麥蘖一升椒一兩並炒乾薑三兩擣末每服方寸匕白湯下日三肘后腹中虚冷食輒不消羸瘦弱乏因生百疾大麥糵五升小麥麫半升豉五合杏仁二升皆熬黄香搗篩糊丸彈子大每服一丸白湯下肘后方産後腹脹不通轉氣急坐卧不安以麥糵一合為末和酒服良久通轉神驗此乃供奉輔太初傳與崔郎中方也李絳兵部手集方産後青腫乃血水積也乾漆大麥糵等分為末新瓦中鋪漆一層糵一層重重令滿鹽泥固濟煆赤研末熱酒調服二錢産後諸疾並宜驗婦人經方産後祕塞五七日不通不宜妄服藥丸宜用大麥芽炒黄為末每服三錢沸湯調下與粥間服婦人良方妊娠去胎外䑓治妊娠欲去胎麥糵一升蜜一升服之即下升小品用大麥芽一升水三煮二升分三服神效産後回乳産婦無子食乳乳不消令人發熱惡寒用大麥糵二兩炒為末毎服五錢白湯下甚良丹溪纂要方飴餹别録上品釋名餳音徐盈切時珍曰按劉熈釋名云餹之清者曰飴形怡怡然也稠者曰餳强硬如鍚也如餳而濁者曰餔方言謂之餦餭音長皇楚辭云粔籹蜜餌用餦餭是也嘉謨曰因色紫類琥珀方中謂之膠飴乾枯者名餳集解𢎞景曰方家用飴乃云膠飴是濕餹如厚蜜者其寜結及牽白者餳餹不入藥用韓保昇曰飴即軟餹也北人謂之餳糯米粳米秫粟米蜀秫米大麻子枳椇子黄精白术並堪熬造惟以糯米作者入藥粟米者次之餘但可食耳時珍曰飴餳用麥糵或穀芽同諸米熬煎而成古人寒食多食餳故醫方亦收用之氣味甘大温無毒入太隂經宗奭曰多食動脾氣震亨曰飴餹屬土而成於火大發濕中之熱冦氏謂其動脾風言未而遺本矣時珍曰凡中滿吐逆秘結牙􅉶赤目疳病者切宜忌之生痰動火最甚甘屬脾腎病毋多食甘甘傷腎骨痛而齒落皆指此物也主治補虚乏止渴去血别録補虚冷益氣力止腸鳴咽痛治唾血消痰潤肺止𠻳思邈健脾胃補中治吐血打損瘀血者熬焦酒服能下惡血又傷寒大毒𠻳於蔓菁薤汁中煮一沸頓服之良孟詵脾弱不思食人少用能和胃氣亦用和藥冦宗奭解附子草烏頭毒時珍發明𢎞景曰古方建中湯多用之餹與酒皆用米糵而餹居上品酒居中品是餹以和潤為優酒以醺亂為劣也成無已曰脾欲緩急食甘以緩之膠飴之甘以緩中也好古曰飴乃脾經氣分藥也甘能補脾之不足時珍曰集異記云邢曹進河朔健将也為飛矢中目拔矢而鏃留于中鉗之不動痛困俟死忽夢胡僧令以米汁注之必愈廣詢于人無悟者一日一僧丐食肖所夢者叩之僧云但以寒食餳㸃之如法用之清凉頓減酸楚至夜瘡痒用力一鉗而出旬日而瘥附方舊二新九老人煩渴寒食大麥一升水七升煎五升入赤餳二合渴即飲之奉親書蛟龍癥病凡人正二月食芹菜誤食蛟龍精者為蛟龍病發則似痼面色青黄每服寒食餳五合日三服吐出蛟龍有兩頭可驗吐蚘者勿用金匱要畧魚臍疔瘡寒食餳塗之良乾者燒灰千金方瘭疽毒瘡臘月飴餹晝夜塗之數日則愈千金方誤吞稻芒白餳頻食簡便方魚骨骾咽不能出用飴餹丸雞子黄大吞之不下再吞肘后誤吞錢釵及竹木取飴餹一斤漸漸食盡便出外䑓箭鏃不出醫説良服藥過劑悶亂者飴餹食之千金草烏頭毒及大雄附子毒並食飴餹即解總録手足瘑瘡炒臘月餹薄之千金方火燒成瘡白餹燒灰粉之即燥易瘥小品方醬别録下品釋名時珍曰按劉熈釋名云醤者将也能制食物之毒如将之平暴惡也集解時珍曰麫醤有大麥小麥甜醤麩醤之屬豆醤有大豆小豆豌豆及豆油之屬豆油法用大豆三升水煮糜以麫二十四斤拌罨成黄毎十斤入鹽八斤井水四十斤攪晒成油收取之大豆醤法用豆炒磨成粉一斗入麫三斗和勻切片罨黄晒之每十斤入鹽五斤井水淹過晒成收之小豆醤法用豆磨凈和麫罨黄次年再磨每十斤入鹽五斤以臘水淹過晒成收之豌豆醤法用豆水浸蒸軟晒乾去皮毎一斗入小麥一斗磨麫和切蒸過􅝛黄晒乾每十斤入鹽五斤水二十斤晒成收之麩醤法用小麥麩蒸熟罨黄晒乾磨碎每十斤入鹽三斤熟湯二十斤晒成收之甜麫醤用小麥麫和劑切片蒸熟􅝛黄晒簸每十斤入鹽三斤熟水二十斤晒成收之小麥麫醤用生麫水和布包踏餅罨黄晒鬆每十斤入鹽五斤水二十斤晒成收之大麥醤用黒豆一斗炒熟水浸半日同煮爛以大麥麫二十斤拌勻篩下麫用煮豆汁和劑切片蒸熟罨黄晒搗每一斗入鹽二斤井水八斤晒成黒甜而汁清又有麻滓醤用麻枯餅搗蒸以麫和勻罨黄如常用鹽水晒成色味甘美也氣味鹹冷利無毒時珍曰麫醤鹹豆醤甜醤豆油大麥醤麩醤皆鹹甘詵曰多食發小兒無辜生痰動氣妊娠合雀肉食之令兒面黒頌曰麥醤和鯉魚食生口瘡主治除熱止煩滿殺百藥及熱湯火毒别録殺一切魚肉菜蔬蕈毒并治蛇蟲蜂蠆等毒日華醤汁灌入下部治大便不通灌耳中治飛蛾蟲蟻入耳塗猘犬咬及湯火傷灼未成瘡者有效又中砒毒調水服即解出袖珍方發明𢎞景曰醤多以豆作純麥者少入藥當以豆醤陳久者彌好也又有魚醤肉醤皆呼為醢不入藥用詵曰小麥醤殺藥力不如豆醤又有麞鹿兎雉及鱧魚醤皆不可久食也宗奭曰聖人不得醤不食意欲五味和五臓悦而受之此亦安樂之一端也時珍曰不得醤不食亦兼取其殺飲食百藥之毒也附方舊六手指掣痛醤清和蜜温熱浸之愈乃止千金􅕅瘍風駁醤清和石硫黄細末日日揩之外䑓秘要妊娠下血豆醤二升去汁取豆炒研酒服方寸匕日三古今録驗妊娠尿血豆醤一大盞熬乾生地黄二兩為末毎服一錢米飲下普濟方浸淫瘡癬醤瓣和人尿塗之千金翼解輕粉毒服輕粉口破者以三年陳醤化水頻潄之簡頻湖集方榆仁醤食療校正原附醤下今分出集解時珍曰造法取榆仁水浸一伏時袋盛揉洗去涎以蓼汁拌晒如此七次同發過麫麴如造醤法下鹽晒之每一升麴四斤鹽一斤水五斤崔寔月令謂之􅛙䤅是也音牟偷氣味辛美温無毒主治利大小便心腹惡氣殺諸蟲不宜多食孟詵蕪荑醤食療校正原附醤下今分出集解時珍曰造法與榆仁醤同氣味辛美微臭温無毒多食落髮主治殺三蟲功力强於榆仁醤孟詵發明張從正曰北人亦多食乳酪酥脯甘美之物皆生虫之萌也而不生虫者葢食中多胡荽蕪荑鹵汁殺九虫之物也醋别録下品釋名酢音醋醯音兮苦酒𢎞景曰醋酒為用無所不入愈久愈良亦謂之醯以有苦味俗呼苦酒丹家又加餘物謂為華池左味時珍曰劉熈釋名云醋措也能措置食毒也古方多用酢字也集解恭曰醋有數種有米醋麥醋麴醋糠醋糟醋餳醋桃醋葡萄大棗蘡薁等諸雜果醋㑹意者亦極酸烈惟米醋二三年者入藥餘止可噉不可入藥也詵曰北人多為糟醋江河人多為米醋小麥醋不及糟醋為多妨忌也大麥醋良藏器曰蘇言葡萄大棗諸果堪作醋縁渠是荆楚人土地儉嗇果敗則以醸酒也糟醋猶不入藥况於果乎時珍曰米醋三伏時用倉米一斗淘凈蒸飯攤冷􅝛黄晒簸水淋凈别以倉米二斗蒸飯和勻入甕以水淹過宻封暖處三七日成矣糯米醋秋社日用糯米一斗淘蒸用六月六日造成小麥大麴和勻用水二斗入甕封醸三七日成矣粟米醋用陳粟米一斗淘浸七日再蒸淘熟入甕宻封日夕攪之七日成矣小麥醋用小麥水浸三日蒸熟􅝛黄入甕水淹七七日成矣大麥醋用大麥米一斗水浸蒸飯􅝛黄晒乾水淋過再以麥飯二斗和勻入水封閉三七日成矣餳醋用餳一斤水三升煎化入白麴末二兩瓶封晒成其餘糟糠等醋皆不入藥不能盡紀也米醋氣味酸苦温無毒詵曰大麥醋微寒餘醋並同𢎞景曰多食損人肌臟藏器曰多食損筋骨亦損胃不益男子損人顔色醋發諸藥不可同食時珍曰酸屬木脾病毋多食酸酸傷脾肉䐢而唇掲制服茯苓丹參人不可食醋鏡源曰米醋煮四黄丹砂膽礬常山諸藥也主治消癰腫散水氣殺邪毒别録理諸藥消毒扁鵲治産後血運除癥塊堅積消食殺惡毒破結氣心中酸水痰飲藏器下氣除煩治婦人心痛血氣并産後及傷損金瘡出血昏運殺一切魚肉菜毒日華醋磨青木香止卒心痛血氣痛浸黄蘖含之治口瘡調大黄末塗腫毒煎生大黄服治痃癖甚良孟詵散瘀血治黄疸黄汗好古曰張仲景治黄汗有黄茋芍藥桂枝苦酒湯治黄疸有麻黄醇酒湯用苦酒清酒方見金匱要畧發明宗奭曰米醋比諸醋最釅入藥多用之穀氣全也故勝糟醋産婦房中常以火炭沃醋氣為佳酸益血也以磨雄黄塗蜂蠆毒亦取其收而不散之義今人食酸則齒軟謂其水生木水氣弱木氣强故如是造靴皮者須得醋而紋發故知其性收斂不負酸收之意時珍曰按孫光憲北夢瑣言云一婢抱兒落炭火上燒灼以醋泥傅之旋愈無痕又一少年眼中常見一鏡趙卿謂之曰來晨以魚鱠奉候及期延至從容久之少年飢甚見䑓上一甄芥醋旋旋啜之遂覺胸中豁然眼花不見卿云君喫魚鱠太多魚畏芥醋故權誑而愈其疾也觀此二事可證别録治􅏴腫殺邪毒之騐也大抵醋治諸瘡腫積塊心腹疼痛痰水血病殺魚肉菜及諸蟲毒氣無非取其酸收之意而又有散瘀解毒之功李廷飛云醋能少飲辟邪勝酒王戩自幼喜食醋年踰八十猶能臨陣也附方舊二十新十三身體卒腫醋和蚯蚓屎傅之千金白虎風毒以三年釅醋五升煎五沸切葱白三升煎一沸漉出以布染乗熱褁之痛止乃已外䑓秘要霍亂吐利塩醋煎服甚良如宜方霍亂煩脹未得吐下以好苦酒三升飲之千金方足上轉筋以故綿浸醋中甑蒸熱褁之冷即易勿停取瘥止外䑓出汗不滴瘦却腰脚并耳聾者米醋浸荆三稜夏四日冬六日為末醋湯調下二錢即瘥經騐後方腋下胡臭三年釅酢和石灰傅之外䑓􅐇瘍風病酢和硫黄末傅之外䑓秘要癰疽不潰苦酒和雀屎如小豆大傅瘡頭上即穿也肘后方舌腫不消以酢和釡底墨厚傅舌之上下脱則更傅須臾即消千金方木舌腫强餹醋時時含潄普濟方牙齒疼痛大醋煮枸杞白皮一升取半升含𠻳即瘥肘后方鼻中出血酢和胡粉半棗許服嚢又法用醋和土塗隂乾即易之千金方塞耳治聾以醇酢微火炙附子削尖塞之千金方面􅍍雀卵苦酒潰米常常拭之肘后方中砒石毒飲釅醋得吐即愈不可飲水廣記服硫發癰酢和豉研膏傅之燥則易千金方食雞子毒飲醋少許即消廣記渾身虱出方見石部塩石毒殺傷螫清醋急飲一二盌令毒氣不散然後用藥濟急方蠍刺螫人酢磨附子汁傅之醫學心鏡蜈蚣咬毒醋磨生鐡𫝊之篋中方蜘蛛咬毒同上方蠼螋尿瘡以醋和胡粉傅之千金方諸蟲入耳凡百節蚰蜒蟻入耳以苦酒注入起行即出錢相公箧中方湯火傷灼即以酸醋淋洗并以醋泥塗之甚妙亦無瘢痕也狼烟入口以醋少許飲之秘方足上凍瘡以醋洗足研藕傅之胎死不下月未足者大豆煮醋服三升立便分解未下再服子母秘録胞衣不下腹滿則殺人以水入醋少許噀面神効聖惠方鬼擊卒死吹醋少許入鼻中千金乳癰堅硬以罐成醋燒熱石投之二次温漬之冷則更燒石投之不過三次即愈千金疔腫初起用麫圍住以針亂刺瘡上銅器煎醋沸傾入圍中令容一盞冷即易三度根即出也酒别録中品校正拾遺糟筍酒社酒今併為一釋名時珍曰按許氏説文云酒就也所以就人之善惡也一説酒字篆文象酒在鹵中之状飲饍標題云酒之清者曰醸濁者曰盎厚曰醇薄曰醨重醸曰酎一宿曰醴美曰醑未榨曰醅紅曰醍緑曰醽白曰醝集解恭曰酒有黍秫粳糯粟麴蜜葡萄等色凡作酒醴須麴而葡萄蜜等酒獨不用麴諸酒醇醨不同惟米酒入藥用藏器曰凡好酒欲熟時皆能候風潮而轉此是合隂陽也詵曰酒有紫酒薑酒桑椹酒葱豉酒葡萄酒蜜酒及地黄牛膝虎骨牛旁大豆枸杞通草仙靈脾狗肉等皆可和醸作酒俱各有方宗奭曰戰國䇿云帝女儀狄造酒進之於禹説文云少康造酒即杜康也然本草已著酒名素問亦有酒漿則酒自黄帝始非儀狄矣古方用酒有醇酒春酒白酒清酒美酒糟下酒粳酒秫黍酒葡萄酒地黄酒蜜酒有灰酒新熟無灰酒社壇餘胙酒今人所用有糯酒煮酒小豆麴酒香藥麴酒鹿頭酒羔兒等酒江浙湖南北又以糯粉入衆藥和為麴曰餅子酒至於官務中亦有四夷酒中國不可取以為法今醫家所用正宜斟酌但飲酒惟取其味不顧入藥何如爾然久之未見不作疾者葢此物損益兼行可不慎歟漢賜丞相上尊酒糯為上稷為中粟為下今入藥佐使專用糯米以清水白麫麴所造為正古人造麴未見入諸藥所以功力和厚皆勝餘酒今人又以糵造者葢止是醴非酒也書云若作酒醴爾惟麴糵酒則用麴醴則用糵氣味甚相遼治療豈不殊也頴曰入藥用東陽酒最佳其酒自古擅名事林廣記所載醸法其麴亦用藥今則絶無惟用麩麫蓼汁拌造假其辛辣之力蓼亦解毒清香逺達色復金黄飲之至醉不頭痛不口乾不作㵼其水秤之重於他水隣邑所造俱不然皆水土之美也處州金盆露水和薑汁造麴以浮飯造醸醇美可尚而色香劣於東陽以其水不及也江西麻姑酒以泉得名而麴有羣藥金陵瓶酒麴米無嫌而水有鹼且用灰味太甘多能聚痰山東秋露白色純味烈蘇州小瓶酒麴有葱及紅豆川烏之類飲之頭痛口渴淮南緑豆酒麴有緑豆能解毒然亦有灰不美時珍曰東陽酒即金華酒古蘭陵也李太白詩所謂蘭陵美酒鬱金香即此常飲入藥俱良山西㐮陵酒薊州薏苡酒皆清烈但麴中亦有藥物黄酒有灰秦蜀有咂嘛酒用稻麥黍秫藥麴小罌封醸而成以筒吸飲穀氣既雜酒不清美並不可入藥米酒氣味苦甘辛大熱有毒詵曰久飲傷神損壽軟筋骨動氣痢醉卧當風則成癜風醉浴冷水成痛痺服丹砂人飲之頭痛吐熱士良曰凡服丹砂北庭石亭脂鍾乳諸石生薑並不可長用酒下能引石藥氣入四肢滯血化為癰疽藏器曰凡酒忌諸甜物酒漿照人無影不可飲祭酒自耗不可飲酒合乳飲令人氣結同牛肉食令人生蟲酒後卧黍穣食猪肉患大風時珍曰酒後食芥及辣物緩人筋骨酒後飲茶傷腎臟腰脚重墜膀胱冷痛兼患痰飲水腫消渴攣痛之疾一切毒藥因酒得者難治又酒得鹹而解者水制火也酒性上而醎潤下也又畏枳椇葛花赤豆花緑豆粉者寒勝熱也主治行藥勢殺百邪惡毒氣别録通血脉厚腸胃潤皮膚散濕氣消憂發怒宣言暢意藏器養脾氣扶肝除風下氣孟詵解馬肉桐油毒丹石發動諸病熱飲之甚良時珍糟底酒三年臘糟下取之開胃下食暖水臟温腸胃消宿食禦風寒殺一切蔬菜毒日華止嘔噦摩風瘙腰膝疼痛孫思邈老酒臘月醸造者可經數十年不壊和血養氣暖胃辟寒發痰動火時珍春酒清明醸造者亦可經久常服令人肥白孟詵蠼螋尿瘡飲之至醉須臾蟲出如米也李絳兵部手集社壇餘胙酒拾遺治小兒語遲納口中佳又以噴屋四角辟蚊子藏器飲之治聾時珍曰按海録碎事云俗傳社酒治聾故李濤有社翁今日没心情為寄治聾酒一瓶之句糟筍節中酒氣味鹹平無毒主治飲之主噦氣嘔逆或加小兒乳及牛乳同服又摩􅕅瘍風藏器東陽酒氣味甘辛無毒主治用制諸藥良發明𢎞景曰大寒凝海惟酒不氷明其性熱獨冠羣物藥家多用以行其勢人飲多則體弊神昏是其有毒故也博物志云王肅張衡馬均三人冐霧晨行一人飲酒一人飽食一人空腹空腹者死飽食者病飲酒者健此酒勢辟惡勝於他食之效也好古曰酒能引諸經不止與附子相同味之辛者能散苦者能下甘者能居中而緩用為導引可以通行一身之表至極髙分味淡者則利小便而速下也古人惟以麥造麴醸黍已為辛熱有毒今之醖者加以烏頭巴豆砒霜薑桂石灰竈灰之類大毒大熱之藥以増其氣味豈不傷冲和損精神涸榮衛竭天癸而夭夫人壽耶震亨曰本草止言酒熱而有毒不言其濕中發熱近於相火醉後振寒戰慄可見矣又性喜升氣必隨之痰鬱于上溺澀于下恣飲寒凉其熱内鬱肺氣大傷其始也病淺或嘔吐或自汗或瘡疥或鼻皶或泄利或心脾痛尚可散而去之其久也病深或消渴或内疽或肺痿或鼓脹或失明或哮喘或勞瘵或癲癎或痔漏為難名之病非具眼未易處也夫醇酒性大熱飲者適口不自覺也理宜冷飲有三益焉過于肺入於胃然後微温肺得溫中之意可以補氣次得寒中之温可以養胃冷酒行遲傳化以漸人不得恣飲也今則不然圖取快喉舌焉爾頴曰人知戒早飲而不知夜飲更甚既醉既飽睡而就枕熱擁傷心傷目夜氣收斂酒以發之亂其清明勞其脾胃停濕生瘡動火助慾因而致病者多矣朱子云以醉為節可也機曰按扁鵲云過飲腐腸爛胃潰髄蒸筋傷神損壽昔有客訪周顗出美酒二石顗飲一石二斗客飮八斗次明顗無所苦客已脇穿而死矣豈非犯扁鵲之戒乎時珍曰酒天之美禄也麫麴之酒少飲則和血行氣壮神禦寒消愁遣興痛飲則傷神耗血損胃亾精生痰動火邵堯犬詩云美酒飲教微醉後此得飲酒之妙所謂醉中趣壺中天者也若夫沈湎無度醉以為常者輕則致疾敗行甚則喪邦亾家而隕軀命其害可勝言哉此大禹所以疏儀狄周公所以著酒誥為世範戒也附方舊十一新六驚怖卒死温酒灌之即醒鬼擊諸病卒然着人如刀刺状胸脇腹内切痛不可抑按或吐血鼻血下血一名鬼排以醇酒吹兩鼻内良肘后馬氣入瘡或馬汗馬毛入瘡皆致腫痛煩熱入腹則殺人多飲醇酒至醉即愈妙肘后方虎傷人瘡但飲酒常令大醉當吐毛出梅師蛇咬成瘡煖酒淋洗瘡上日三次廣利方蜘蛛瘡毒同上方毒蜂螫人方同上咽傷聲破酒一合酥一匕乾薑末二匕和服日二次方十便良三十年耳聾酒三升漬牡荆子一升七日去滓任性飲之千金方天行餘毒手足腫痛欲㫁作坑深三尺燒熱灌酒着屐居坑上以衣壅之勿令泄氣類要方下部痔慝掘地作小坑燒赤以酒沃之納吴茱萸在内坐之不過三度良外䑓産後血悶清酒一升和生地黄汁煎服梅師身面疣目盗酸酒酻洗而呪之曰疣疣不知羞酸酒酻洗你頭急急如律令呪七遍自愈外䑓斷酒不飲酒七升硃砂半兩瓶浸𦂳封安豬圈内任豬揺動七日取出頓飲千又方正月一日酒五升淋碓頭杵下取飲之金方丈夫脚冷不隨不能行者用淳酒三斗水三斗入瓷中灰火温之漬脚至膝常着灰火勿令冷三日止方千金海水傷裂凡人為海水醎物所傷及風吹裂痛不可忍用蜜半斤水酒三十斤防風當歸羌活荆芥各二兩為末煎湯浴之一夕即愈使琉球録附諸酒方時珍曰本草及諸書並有治病醸酒諸方今輯其簡要者以備恭考藥品多者不能盡録愈瘧酒治諸瘧疾頻頻温飲之四月八日水一石麴一斤為末俱投水中待酢煎之一石取七斗待冷入麴四斤一宿上生白沬起炊秫一石冷投三日酒成賈思勰齊民要術屠蘇酒陳延之小品方云此華佗方也元旦飲之辟疫癘一切不正之氣造法用赤木桂心七錢五分防風一兩菝葜五錢蜀椒桔梗大黄五錢七分烏頭二錢五分赤小豆十四枚以三角絳嚢盛之除夜懸井底元旦取出置酒中煎數沸舉家東向從少至長次第飲之藥滓還投井中嵗飲此水一世無病割時珍曰蘇虺鬼名此藥屠鬼爽故名或云草庵名也逡巡酒補虚益氣去一切風痺濕氣久服益壽耐老好顔色造法三月三日收桃花三兩三錢五月五日收馬藺花五兩五錢六月六日收脂麻花六兩六錢九月九日收黄甘菊花九兩九錢隂乾十二月八日取臘水三斗待春分取桃仁四十九枚好者去皮尖白麫十斤正同前花和作麴紙包四十九日用時白水一瓶麴一丸麫一塊封良久成矣如淡再加一丸五加皮酒去一切風濕痿痺壮筋骨填精髓用五加皮洗刮去骨煎汁和麴米醸成飲之或切碎袋盛浸酒煮飲或加當歸牛膝地榆諸藥白楊皮酒治風毒脚氣腹中痰癖如石以白楊皮切片浸酒起飲女貞皮酒治風虛補腰膝女貞皮切片浸酒煮飲之仙靈脾酒治偏風不遂强筋堅骨仙靈脾一斤袋盛浸無灰酒二斗宻封三日飲之聖惠方薏苡仁酒去風濕强筋骨健脾胃用絶好薏苡仁粉同麴米醸酒或袋盛煮酒飲天門冬酒潤五臟和血脉久服除五勞七傷癲癎惡疾常令酒氣相接勿令大醉忌生冷十日當出風疹毒氣三十日乃已五十日不知風吹也冬月用天門冬去心煮汁同麴米醸成初熟微酸久乃味佳方千金百靈藤酒治諸風百靈藤十斤水一石煎汁三斗入糯米三斗神麴九斤如常醸成三五日更炊糯飯投之即熟澄清日飲以汗出為效聖惠方白石英酒治風濕周痺肢節濕痛及腎虚耳聾用白石英磁石煆醋淬七次各五兩絹袋盛浸酒中五六日温飲酒少更添之聖濟總録地黄酒補虚弱壮筋骨通血脉治腹痛變白髮用生肥地黄絞汁同麴米封宻器中五七日啓之中有緑汁真精英也宜先飲之乃濾汁藏貯加牛膝汁效更速亦有加羣藥者牛膝酒壮筋骨治痿痺補虚損除久瘧用牛膝煎汁和麴米釀酒或切碎袋盛浸酒煮飲當歸酒和血脉堅筋骨止諸痛調經水當歸煎汁或釀或浸並如上法菖蒲酒治三十六風一十二痺通血脉治骨痿久服耳目聰明石菖蒲煎汁或醸或浸並如上法枸杞酒補虚弱益精氣去冷風壮陽道止目淚健腰脚用甘州枸杞子煮爛搗汁和麴米醸酒或以子同生地黄袋盛浸酒煮飲人參酒補中益氣通治諸虚用人參末同麴米醸酒或袋盛浸酒煮飲薯蕷酒治諸風眩運益精髓壮脾胃用薯蕷粉同麴米釀酒或同山茱萸五味子人參諸藥浸酒煮飲茯苓酒治頭風虚眩暖腰膝主五勞七傷用茯苓粉同麴米醸酒飲之菊花酒治頭風明耳目去痿痺消百病用甘菊花煎汁同麴米醸酒或加地黄當歸枸把諸藥亦佳黄精酒壮筋骨益精髓變白髮治百病用黄精蒼术各四斤枸杞根柏葉各五斤天門冬三斤煮汁一石同麴十斤糯米一石如常醸酒飲桑椹酒補五臟明耳目治水腫不下則滿下之則虚大腹則十無一活用桑椹搗汁煎過同麴米如常釀酒飲术酒治一切風濕筋骨諸病駐顏色耐寒暑用术三十斤去皮搗以東流水三石漬三十日取汁露一夜浸麴米醸成飲蜜酒孫真人曰治風疹風癬用沙蜜一斤糯飯一升麫麴五兩熟水五升同入瓶内封七日成酒尋以蜜入酒代之亦良蓼酒久服聰明耳目脾胃徤壮以蓼煎汁和麴米醸酒飲薑酒詵曰治偏風中惡疰忤心腹冷痛以薑浸酒煖服一椀即止一法用薑汁和麴造酒如常服之佳葱豉酒詵曰解煩熱補虚勞治傷寒頭痛寒熱及冷痢腸痛解肌發汗並以葱根豆䜴浸酒煮飲茴香酒治卒腎氣痛偏墜牽引及心腹痛茴香浸酒煮飲之舶茴尤妙縮砂酒消食和中下氣止心腹痛砂仁炒研袋盛浸酒煮飲莎根酒治心中客熱膀胱脇下氣鬱常憂不樂以莎根一斤切熬香袋盛浸酒日夜服之當令酒氣相續茵蔯酒治風疾筋骨攣急用茵蔯蒿炙黄一斤秫米一石麴三斤如常醸酒飲青蒿酒治虚勞久瘧青蒿搗汁煎過如常醸酒飲百部酒治一切久近咳𠻳百部根切炒袋盛浸酒頻頻飲之海藻酒治癭氣海藻一斤洗淨浸酒日夜細飲黄藥酒治諸癭氣萬州黄藥切片袋盛浸酒煮飲仙茆酒治精氣虚寒陽痿膝弱腰痛痺緩諸虛之病用仙茆九蒸九晒浸酒飲通草酒續五臟氣通十二經脉利三焦通草子煎汁同麴米醸酒飲南藤酒治風虛逐冷氣除痺痛强腰脚石南藤煎汁同麴米醸酒飲松液酒治一切風痺脚氣於大松下掘坑置甕承取其津液一斤醸糯米五斗取酒飲之松節酒治冷風虛弱筋骨攣痛脚氣緩痺松節煮汁同麴米醸酒飲松葉煎汁亦可柏葉酒治風痺歴節作痛東向側柏葉煮汁同麴米釀酒飲椒柏酒元旦飲之辟一切疫癘不正之氣除夕以椒三七粒東向側柏葉七枝浸酒一瓶飲竹葉酒治諸風熱病清心暢意淡竹葉煎汁如常醸酒飮槐枝酒治大麻痿痺槐枝煮汁如常醸酒飲枳茹酒治中風身直口僻眼急用枳殻刮茹浸酒飲之牛蒡酒治諸風毒利腰脚用牛蒡根切片浸酒飲之巨勝酒治風虛痺弱腰膝疼痛用巨勝子二升炒香薏苡仁二升生地黄半斤袋盛浸酒飲麻仁酒治骨髓風毒痛不能動者取大麻子中仁炒香袋盛浸酒飲之桃皮酒治水腫利小便桃皮煎汁同秫米醸酒飲紅麴酒治腹中及産後瘀血紅麴浸酒煮飲神麴酒治閃肭腰痛神麴燒赤淬酒飲之柘根酒治耳聾方具柘根下磁石酒治腎虚耳聾用磁石木通菖蒲等分袋盛酒浸日飲蠶沙酒治風緩頑痺諸節不隨腹内宿痛用原蠶沙炒黄袋盛浸酒飲花蛇酒治諸風頑痺癱緩攣急疼痛惡瘡疥癩用白花蛇肉一條袋盛同麴置於缸底糯飯葢之三七日取酒飲又有羣藥煮酒方甚多烏蛇酒治療醸法同上蚺蛇酒治諸風痛痺殺蟲辟瘴治癩風疥癬惡瘡用蚺蛇肉一斤羌活一兩袋盛同麴置於缸底糯飯葢之醸成酒飲亦可浸酒詳見本條藥頴曰廣西蛇酒罈上安蛇數寸其麴則采山中草不能無毒也蝮蛇酒治惡瘡諸瘻惡風頑痺癲疾取活蝮蛇一條同醇酒一斗封埋馬溺處周年取出蛇已消化每服數杯當身體習習而愈也紫酒治卒風口偏不語及角弓反張煩亂欲死及鼓脹不消以雞屎白一升炒焦投酒中待紫色去滓頻飲豆淋酒破血去風治男子中風口喎隂毒腹痛及小便尿血婦人産後一切中風諸病用黒豆炒焦以酒淋之温飲霹靂酒治疝氣偏墜婦人崩中下血胎産不下以鐵器燒赤浸酒飲之龜肉酒治十年咳𠻳醸法詳見龜條虎骨酒治臂脛疼痛歴節風腎虚膀胱寒痛虎脛骨一具炙黄槌碎同麴米如常醸酒飲亦可浸酒詳見虎條麋骨酒治隂虛腎弱久服令人肥白麋骨煮汁同麴米如常醸酒飲之鹿頭酒治虚勞不足消渴夜夢鬼物補益精氣鹿頭煮爛搗泥連汁和麴米醸酒飲少入葱椒鹿茸酒治陽虛痿弱小便頻數勞損諸虚用鹿茸山藥浸酒服詳見鹿茸下戊戌酒詵曰大補元陽頴曰其性大熱隂虚無冷病人不宜飲之用黄狗肉一隻煮糜連汁和麴米醸酒飲之羊羔酒大補元氣健脾胃益腰腎宣和化成殿真方用米一石如常浸漿嫩肥羊肉七斤麴十四兩杏仁一斤同煮爛連汁拌末入木香一兩同醸勿犯水十日熟極甘滑一法羊肉五斤蒸爛酒浸一宿入消梨七个同搗取汁和麴米醸酒飲之腽肭臍酒助陽氣益精髓破癥結冷氣大補益人腽肭臍酒浸擂爛同麴米如常醸酒飲燒酒綱目釋名火酒綱目阿刺吉酒飲膳正要集解時珍曰燒酒非古法也自元時始創其法用濃酒和糟入甑蒸令氣上用器承取滴露凡酸壊之酒皆可蒸燒近時惟以糯米或粳米或黍或秫或大麥蒸熟和麴醸甕中七日以甑蒸取其清如水味極濃烈葢酒露也頴曰暹羅酒以燒酒復燒二次入珍寳異香其墰每個以檀香十數斤燒烟薫令如漆然後入酒蠟封埋土中二三年絶去燒氣取出用之㑹有人携至舶能飲三四盃即醉價直數倍也有積病飲一二盃即愈且殺蠱予親見二人飲此打下活蟲長二寸許謂之魚蠱云氣味辛甘大熱有大毒時珍曰過飲敗胃傷膽喪心損壽甚則黒腸腐胃而死與薑蒜同食令人生痔毒鹽冷水緑豆粉解其主治消冷積寒氣燥濕痰開鬱結止水泄治霍亂瘧疾噎膈心腹冷痛隂毒欲死殺蟲辟瘴利小便堅大便洗赤目腫痛有效時珍發明時珍曰燒酒純陽毒物也面有細花者為真與火同性得火即然同乎焰消北人四時飲之南人止暑月飲之其味辛甘升揚發散其氣燥熱勝濕袪寒故能開怫鬱而消沈積通膈噎而散痰飲治泄瘧而止冷痛也辛先入肺和水飲之則抑使下行通調水道而小便長白熱能燥金耗血大腸受刑故令大便燥結與薑蒜同飲即生痔也若夫暑月飲之汗出而膈快身凉赤目洗之淚出而腫消赤散此乃從治之方焉過飲不節殺人頃刻近之市沽又加以砒石草烏辣灰香藥助而引之是假盜以方矣善攝生者宜戒之按劉克用病機賦云有人病赤目以燒酒入鹽飲之而痛止腫消葢燒酒性走引鹽通行經絡使鬱結開而邪熱散此亦反治劫劑也附方新七冷氣心痛燒酒入飛鹽飲即止隂毒腹痛燒酒温飲汗出即止嘔逆不止真火酒一盃新汲井水一盃和服甚妙瀕湖寒濕泄瀉小便清者以頭燒酒飲之即止耳中有核如棗核大痛不可動者以火酒滴入仰之半時即可箝出李樓竒方風蟲牙痛燒酒浸花椒頻頻潄之寒痰咳𠻳燒酒四兩猪脂蜜香油茶末各四兩同浸酒内煮成一處每日挑食以茶下之取效葡萄酒綱目集解詵曰葡萄可醸酒藤汁亦佳時珍曰葡萄酒有二様醸成者味佳有如燒酒法者有大毒醸者取汁同麴如常醸糯米飯法無汁用乾葡萄末亦可魏文帝所謂葡萄醸酒甘於麴米醉而易醒者也燒者取葡萄數十斤同大麴醸酢取入甑蒸之以器承其滴露紅色可愛古者西域造之唐時破髙昌始得其法按梁四公記云髙昌獻蒲桃乾凍酒杰公曰蒲桃皮薄者味美皮厚者味苦八風谷凍成之酒終年不壊葉子奇草木子云元朝於冀寧等路造蒲桃酒八月至太行山辨其真偽真者下水即流偽者得水即氷凍矣久藏者中有一塊雖極寒其餘皆氷獨此不氷乃酒之精液也飲之令人透腋而死酒至二三年亦有大毒飲膳正要云酒有數等出哈𠻳火者最烈西畨者次之平陽太原者又次之或云葡萄久貯亦自成酒芳甘酷烈此真葡萄酒也醸酒氣味甘辛熱微毒時珍曰有熱疾齒疾瘡疹人不可飲之主治暖腰腎駐顔色耐寒時珍燒酒氣味辛甘大熱有大毒時珍曰大熱大毒甚於燒酒北人習而不覺南人切不可輕生飲之主治益氣調中耐饑强志正要消痰破癖汪頴糟綱目釋名粕綱目集解時珍曰糯秫黍麥皆可蒸醸酒醋熬煎餳飴化成糟粕酒糟須用臘月及清明重陽造者瀝乾入少鹽收之藏物不敗揉物能軟若榨乾者無味矣醋糟用三伏造者良酒糟氣味甘辛無毒主治温中消食除冷氣殺腥去草菜毒潤皮膚調臟腑蘇恭罯撲損瘀血浸水洗凍瘡搗傅蛇蛟蜂叮毒日華發明時珍曰酒糟有麴糵之性能活血行經止痛故治傷損有功按許叔微本事方云治踠折傷筋骨痛不可忍者用生地黄一斤藏𤓰薑糟一斤生薑四兩都炒熱布裹罨傷處冷即易之曽有人傷折醫令捕一生龜将殺用之夜夢龜傳此方用之而愈也又類編所載只用藏𤓰薑糟一物入赤小豆末和勻罨於㫁傷處以杉片或白桐片夾之云不過三日即痊可也附方新四手足皸裂紅糟臘猪脂薑汁鹽等分研爛炒熱擦之裂内甚痛少頃即合再擦數次即安袖珍方鶴膝風病酒醅糟四兩肥皂一個去子􅉭消一兩五味子一兩砂糖一兩薑汁半甌研勻日日塗之加入燒酒尤妙也暴發紅腫痛不可忍者臘糟糟之談埜翁試騐方杖瘡青腫用濕綿紙鋪傷處以燒過酒糟搗爛厚鋪紙上良久痛處如蟻行熱氣上升即散方簡便大麥醋糟氣味酸微寒無毒主治氣滯風壅手背脚膝痛炒熱布裹熨之三兩換當愈孟詵乾餳糟氣味甘温無毒主治反胃吐食暖脾胃化飲食益氣緩中時珍發明時珍曰餳以糵成暖而消導故其糟能化滯緩中飬脾止吐也按繼洪澹寮方云甘露湯治反胃嘔吐不止服此利胸膈飬脾胃進飲食用乾餳糟六兩生薑四兩二味同搗作餅或焙或晒入炙甘草末二兩鹽少許㸃湯服之常熟一富人病反胃徃京口甘露寺設水陸泊舟岸下夢一僧持湯一盃與之飲罷便覺胸快次早入寺供湯者乃夢中所見僧常以此湯待賔故易名曰甘露湯予在臨汀療一小吏旋愈切勿忽之附方新一脾胃虚弱平胃散等分末一斤入乾糖糟炒二斤半生薑一斤半紅棗三百個煮取肉焙乾通為末逐日㸃湯服摘𤣥米粃食物釋名米皮糠時珍曰粃亦紕薄之義也集解頴曰米粃即精米上細糠也昔陳平食糠覈而肥也時珍曰糠諸粟穀之殻也其近米之細者為米粃味極甜儉年人多以豆㴮或草木花實可食者和劑蒸煮以救饑云氣味甘平無毒主治通腸開胃下氣磨積塊作糗食不饑充滑膚體可以頥養汪頴舂杵頭細糠别録中品校正禹錫曰自草部移入此集解時珍曰凡穀皆有糠此當用粳稻粟秫之糠也北方多用杵南方多用碓入藥並同丹家言糠火鍊物力倍於常也氣味辛甘熱震亨曰穀殻屬金糠之性則熱也主治卒噎刮取含之别録呷亦可煎湯之燒研水服方寸匕令婦人易産時珍母出子秘録發明𢎞景曰治噎用此亦是舂搗義爾天下事理多相影嚮如此附方舊一新一膈氣噎塞飲食不下用碓觜上細糠蜜丸彈子大時時含嚥津液聖惠咽喉妨礙如有物吞吐不利杵頭糠人參各一錢石蓮肉炒一錢水煎服日三次聖濟總録本草綱目卷二十五
