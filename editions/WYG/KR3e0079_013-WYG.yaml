  text: 本草綱目卷二明李時珍撰序例下藥名同異五物同名獨揺草羗活天麻鬼臼薇銜鬼督郵四物同名堇堇菜烏頭蒴藋芮石龍苦菜貝母苦苣龍葵敗醬鬼目白英紫葳羊蹄麂目紅豆赤小豆相思子紅豆蔲海紅豆白藥桔梗栝樓白藥子藥㑹州白豚耳猪耳莧馬齒菘菜車前三物同名美草甘草山薑旋花山薑美草杜若蒼术蜜香木香沉香多木香女萎萎㽔紫葳蔓楚鬼督郵徐長卿獨揺草赤箭土蓀黄茋牡蒙猢猻百枝萆薢狗脊防風接骨草山蒴藋攀倒甑續斷虎鬚欵冬花燈心草沙參鹿腸敗醤腸斑龍𤣥參解毒子苦藥子山豆根鬼臼羊乳􅳶羊乳枸把沙參豕首猪頭冬天門蠡實山石榴金罌子杜䳌花小蘗狗骨犬骨刺猫兒鬼箭苦蘵敗醤草酸漿苦參仙人杖枸杞竹立死仙人草木蓮木饅頭木芙蓉木蘭白幕天雄白薇白英立制石理石石膽礜石守田半夏草狼尾菵草水玉半夏石水精玻瓈芑地黄白黍薏苡黄牙金闕石金牙硫黄石花璚枝菜汁烏韮鍾乳石淡竹葉水竹葉鴨跖草碎骨子牛舌牛之舌羊蹄車前虎膏虎脂星天南狶簽酸漿米漿水草燈籠草三葉酸石龍蜥蜴絡石葒草木蜜大棗枳椇蜜香石蜜乳糖蜂蜜櫻桃二物同名淫羊藿仙靈脾天門冬黄芝芝草黄精黑三稜京三稜烏芋知母蝭母沙參地精人參烏何首龍衘蛇含黄精金釵股釵子股忍冬藤薺苨枯梗沙參杏葉神草人參赤箭芰草黄茋菱長生草羗活草紅茂仙茅長松門參婆蘿水香蘭草澤蘭兒草知母芫花千兩金淫羊藿續隨子墻蘼蛇床營實香草蘭草草零陵逐馬𤣥參丹參百兩金牡丹金草百兩牡䝉紫參王孫香菜香薷羅勒地筋白茅根菅茅根都梁香蘭草澤蘭杜蘅杜若香馬蹄香蘇爵牀水蘇鼠姑牡丹蟲鼠婦孩兒菊蘭草澤蘭漏蘆飛亷麻鬼油蘭根蘭草白茅地血紫草茜草木芍藥牡丹藥赤芍白及連及黄精蕳根蘭草防風藥實貝母子黄藥夏枯草乃東草茺蔚黄昏合歡王孫夜合合歡烏何首戴椹黄茋花旋覆甘露子地蠶子甘蕉雷丸竹苓兎葵馬薊木薊大龍珠赤珠芻石龍不死草卷相冬麥門苦薏野菊心蓮子烏韭石髪冬麥門地葵蒼耳子地膚紫河車蚤休衣人胞伏兎飛亷茯苓草蒿青蒿子青葙黄蒿鼠麵蒿黄花馬肝石何首烏烏鬚石火杴茺蔚狶簽露葵葵菜蓴益明茺蔚地膚千金藤解毒之草陳思岌忍冬金銀藤麥門冬香茅鼠麴草菁茅麗春罌粟蒿仙女仙人掌草名射干旱蓮鱧腸連翹石髪烏韭陟釐蘭華蘭草連翹羊婆奶沙參子蘿藦大蓼葒草馬蓼石衣烏韭陟釐鬼鍼鬼釵草草馬齒爛血見愁茜草地錦山葱茖葱藜蘆地椒野小椒水楊梅斑杖虎杖甑攀倒雞腸草蘩縷之類鵞不食草鹿葱萱草藜蘆地節葳㽔枸杞􅉭草芭茅莽草鳳尾草金星草貫衆扁竹扁蓄射干莞草白芷􅌲芋妓女萱草苗地膚紫金牛草根似巴㦸射干通草木通木通脱天豆雲實芮石龍重臺蚤休𤣥參臙脂菜藜葵落羊腸羊之腸羊桃白草白歛白英更生菊翹雀燕尾草蘭草慈姑白昌商陸蒲水菖􅆨草雲實茺蔚地䒽草地利赤紅内消紫荆皮何首烏龍鬚席草海菜水萍浮萍慈姑林蘭石斛木蘭承露仙人肝藤根伏雞子象膽象之膽蘆薈水葵水莕蓴杜蘭石斛木蘭冬葵子葵菜姑活馬尾馬之尾商陸水芝芡實冬𤓰屏風防風水莕三白草候農之草牽牛鵶臼烏臼木鴞鳩鳥天葵兎葵落葵赤葛何首烏烏歛母猢猻頭鱧腸地錦鹿藿野緑豆葛苗水花浮萍浮石酸母酸模草酢漿菩提子薏苡子無患景天慎火草螢火蟲山芋山藥旱芋鬼葢人參地菌相思子木紅豆蟲郎君子王𤓰土𤓰菝葜石南風藥南藤蘿藦雀瓢百合雞骨香沉香香降真黄𤓰胡𤓰栝樓胡菜胡荽芸薹甜藤甘藤忍冬白馬骨獸之骨又木名金罌金櫻子安石榴胡豆蠶豆豌豆朹子山查楊梅金盞銀臺水仙花行王不留木綿古貝杜仲水栗芰實草根萍蓬陽桃獼猴桃五歛子胡王使者𦍑活翁白頭獐頭獐首土菌獨揺白楊扶移䓆蓂大薺白棘桑上寄生桑耳鼠矢鼠糞茰山茱苦心知母沙參日及木槿扶桑芨堇頭烏烏犀犀角皂莢梫木桂木名又大青大青草扁青石茒蓴菀女文蛤海蛤子五倍樺木樺皮蓉木芙絡石草石榛棒子厚朴果蠃蠮螉栝樓風藥石南澤蘭將軍大黄硫黄椑鼠李漆柿石鯪絡石藤穿山甲冬青凍青女貞石芝芝草石腦櫬梧桐木槿鈆華胡粉黄丹處石慈石𤣥石石腦太石芝糧一餘寒水石石膏石凝水石緑緑青緑鹽石英紫石英水晶石鹽礜石鹽光明蜃車螯蜃蛟石蠶沙虱子甘露占斯樟寄生雀甕蟲鷸田間小鳥魚狗鳥地蠶蠐螬子甘露地雞土菌鼠婦沙虱水蟲石蠶鴂伯勞杜䳌青蚨蚨蟬銅錢蟪蛄蟬蛄螻鼯鼠螻蛅鼺鼠飛生飛生蟲鼫鼠蝸蠃蝸牛螺螄負蠜鼠負䘀螽負盤蜚蠊行夜黄頰魚鱤魚魚黄顙土龍蚯蚓鼉龍白魚鱎魚衣魚魚師有毒之魚魚狗鳥魚虎土奴魚魚狗鳥人魚䱱魚鯢魚鯊魚吹沙魚鮫魚天狗獾狗鳥魚水狗獺狗鳥魚山雞翟雉鷩雉扶老秃鶖木靈夀鬼鳥姡獲烏鬼車鳥醴泉瑞水名津人口中無心薇衘草鼠麴朝開暮落花木槿臺狗溺比類隐名土青木香馬兠鈴野天麻茺蔚鬼油麻漏蘆甜桔梗薺苨山牛蒡大薊草續斷石龍芻杜牛膝天名精野脂麻𤣥參甜葶藶菥蓂水羊乳丹參天蔓菁天名精草甘遂蚤休黄芫花蕘花杏葉沙參薺苨野雞冠青箱子山莧菜牛膝黄大㦸芫花胡薄荷積雪草龍腦薄荷水蘇青蛤粉青黛野紅花大㦸竹園荽海金沙野園荽鵞不食草野胡蘿蔔草鴟頭貫衆野茴香馬芹野甜𤓰上𤓰野萱花射干野天門冬百部黒狗脊貫衆草血竭地錦水巴㦸香附土細辛杜衡獐耳細辛及已草鳶頭鳶尾草天雄草如蘭状草附子香附土附子草烏頭木藜蘆鹿驪山蕎麥赤地利金蕎麥羊蹄鬼蒟蒻天南星山大黄酸模牛舌大黄羊蹄土萆薢土茯苓刺猪苓土茯苓白菝葜萆薢赤薜荔赤地利龍鱗薜荔長春