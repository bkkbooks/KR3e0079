body:
  text: 本草綱目卷十三目録草之二山草類下三十九種黄連本經胡黄連開寳黄芩本經秦艽本經柴胡本經前胡本經防風本經獨活羌活本經土當歸綱目都管草圖經升麻本經苦参本經白鮮本經延胡索開寳貝母本經山慈姑嘉祐石蒜圖經水仙㑹編白茅本經地筋州録即菅茅芒拾遺龍膽本經細辛本經杜衡本經辛附木細及己别録鬼督郵唐本徐長卿本經白微本經白前别録草犀拾遺釵子股海藥吉利草綱目硃砂根綱目辟虺雷拾遺錦地羅綱目紫金牛圖經拳参圖經鐵線草圖經金絲草綱木右附方舊七十一新二百一十四本草綱目卷十三
