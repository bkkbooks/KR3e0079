body:
  text: 本草綱目卷四中明李時珍撰百病主治藥下九漏雖有九名皆取象耳但分部位可也雙治草部苦參浸酒服忍冬浸牽牛煨猪腎黄茋何首烏土茯苓萆薢栝樓根白及牛蒡葉地榆虎薊根積雪草白歛土𤓰根通草黄藥子剪草茜根灰漏籃子側子馬兠鈴半夏荆芥穂薺薴香白芷蛇含草麋衘萞麻子狼毒芫花根附子天南星諸蒿灰藜灰穀菜麥麪和鹽炒塗苦瓠蕎麥灰果木桃花大腹皮楸葉􅆈膏神方栁枝燒熏栁根鬚煎洗乳香榆白皮盧㑹石南葉柞木枝火土燭燼土蜂窠金石胡粉鐵華粉硃砂爐甘石孔公孽殷孽古塚灰石灰赤石脂水銀水銀粉特生礜礜石北亭砂砒石代赭石石膽禹餘糧慈石毛黄礬白礬石消石蜜陀僧食鹽石硫黄石硫赤戎鹽雄雌黄蟲介斑蝥芫青地膽葛上亭長同蜘蛛胡􅎙蜋蟾蜍頭蜈蚣露蜂房樗雞鯪鯉甲蜥蜴白花蛇自死蛇并骨蛇蛻蝮蛇膽并屎烏蛇蛇吞蛙鼉甲蚺蛇膽鯉腸鱗鮆鮓鱧肝腸鱗魚并血鰻鱺魚鰾膠海豚魚海鰻鱺黿甲秦龜甲文蛤牡蠣粉甲香大田螺禽獸啄木鳥鴛鴦烏鴉頭青䳡子規肉鸛腦鷹頭燒塗痔漏鵩鳥䑕漏炙食猪膏猳猪屎羊屎牡狗莖狗肉引蟲狗骨并頭骨馬通汁牛膽并脾烏牛耳垢脇漏出水野猪皮牛屎猫頭骨并腦及眼睛肉舌皮毛鹿皮并齒狸頭骨幷肉狐屎幷足兔皮毛鼹鼠牡鼠屎土撥鼠猬心肝癰疽深為疽淺為癰大為癰小為癤腫瘍草部甘草行汚濁之血消五發之疽消腫導毒傅一切發背癰疽用末和大麥粉湯和熱未成者内消已成者即潰仍以水炙一兩水浸一夜服之或以黒鈆汁淬酒服或取汁􅆈膏陰囊癰水炙煎服二十日即消忍冬癰疽不問發背發頥發眉發腦發乳諸處擣葉入少酒塗四圍内以五兩同甘草節一兩水煎入酒再煎分三服重者一二服大腸通利即効功勝紅内消其滓亦可丸服或擣汁同酒煎服逺志一切癰疽發背癤毒惡候死血陰毒在中不痛者即痛或憂怒等氣在中作痛不可忍者即止熱者即涼潰者即斂為末毎服三錢温酒浸取清服其滓塗之紅内消癰疽毒瘡水􅆈入酒時飲滓為丸服連翹消腫止痛十二經瘡藥不可無此癰腫初起煮服取汁木蓮一切癰疽初起四十九個研細絞汁服功同忍冬背癰取末服下利即愈常春藤一切腫痛研汁入酒服利惡物去其根本絡石同上秦芄發背初起同牛乳煎服取利山慈姑同蒼耳擂酒服取汗豨薟同乳香研枮礬酒服取汗􅆈膏貼一切癰疽發背惡瘡丁腫喉痺地菘擣汁日服蒼耳擂酒取汗紫花地丁同蒼耳擂酒取汁渣同麪塗烏斂苺擂酒熱服取汗渣塗迎春花酒服末取汗馬藺花葉同松毛牛膝煎服曲節草同甘草煎服香附子已潰未潰以薑汁炒硏日服草烏頭陰疽不起同南星桂心薑汁熱服未破内消乆潰能去黒爛牽牛諸毒初起氣壯者煎醋服利膿血玅決明同甘草煮服幷塗石韋發背冷酒服石胡荽同穿山甲當歸尾擂酒服幷塗之地錦草同乳没等擂酒服并塗積雪草野菊栝樓天門冬並擂酒服滓塗升麻除風腫行瘀血為瘡家聖藥腫毒卒起磨醋塗之羌活散癰腫敗血入太陽經地榆諸瘡痛加之黄芩痒者加之黄連諸瘡痛痒皆屬心火龍膽癰腫口乾紫草活血利腸當歸芍藥芎藭和血止痛三稜消堅硬黄葵花腫痛及惡瘡膿水為瘡家聖藥鹽收經年用尤妙胡黄連同穿山甲貼芭蕉同生薑貼生地黄杵塗木香葢之龍葵擣塗或入麝或同􅞩蟇大黄醋調貼同五倍黄蘗貼烏頭同黄蘗貼商陸擦石癰切鹽擣傅一毒莨菪子貼石癰堅硬天麻都管草醋貼箬葉紅藍花苧根益母草金絲草大㦸水仙根飛亷馬鞭草漏盧蘘荷根鴨跖草續斷大薊根薇衘火炭母澤蘭地楊梅地蜈蚣薑黄蒲公英蓼實紫河車半夏天南星王不留洗白芍栝樓根醋調三七蒺藜苗􅆈膏苦參土𤓰根獨用將石蒜牡丹皮大青草烏頭小青鬼臼根蘿摩葉射干醋磨羊蹄根醋磨蒟蒻石菖蒲芫花膠和金星草半夏雞子白調莽草螺靨草水堇水莕草毛莨水蓴葉海芋根蒲黄海藻葉海根水蕕草防已􅂖菜黒大豆生研豌豆並主一應癰腫初起緑豆粉一應癰疽初起惡心同乳香甘草服以䕶心胡麻油大毒發背以一斤煎沸入醋二盌分五次服毒不内攻入葱煎黒熱塗自消翻白草擂酒服茄子消石收成膏酒服治發背惡瘡磨醋塗腫毒生合熱毒豆豉作餅灸大蒜灸一切腫毒陰毒苦瓠切片灸囊癰葱白米粉炒黒醋調塗赤小豆同雞子白塗一切癰疽粢米粉炒黒雞子白塗麥粉一切癰疽發背熱痛炒黒醋調貼痛即止乆則腫消蕎麥粉癰疽發背同硫黄末傅疽頭凹黒煮食即起山藥生塗或同蓖麻糯米蔓青同鹽塗或同蕓薹紫芥子同栢葉塗無不愈者麥麪米醋冬𤓰食之苦茄醋磨蕺草百合生乾薑醋調生薑猪膽調白芥子醋調萊菔子醋調馬齒莧秦狄藜醋杵旱堇皂角蕈醋磨桑黄果木野葡桃根晒研水調茱萸醋和並塗一切癰腫橡子醋磨塗石癰胡桃背癰骨疽未成者同槐花末熱酒服之油者塗諸腫烏藥行氣止痛同孕中有癰牛皮膠煎服槐花癰疽發背初起炒衝酒服取汁即愈黄蘗諸瘡痛不可忍者加之和雞子白塗頭同川烏末傅之柞木葉同荷蒂甘草節萱草地榆煎服癰疽即消膿血即乾紫荆皮活血行氣消腫解毒同獨活白芷芍藥木蠟為末葱湯調塗發背癰疽初起酒調塗之内同白芷酒服皂子六月六日吞七枚可免瘡癤木芙蓉花葉散熱解毒調一切癰疽發背惡瘡蜜塗之已成即潰已潰排膿菊或同蒼耳葉燒用或同花葉煎洗扶桑花葉同芙蓉牛蒡葉蜜擣塗巴豆樹根一切癰疽發背大患末塗之妙不可言松脂一切癰疽同銅青萞麻擣貼入膏藥用楓木皮癰疽已成擂酒服并傅櫰香頭疽腫毒麻木調塗七日腐肉黄楊擣塗癤子楮實桑白皮並塗石癰桑葉塗穿掌毒即愈紫檀磨醋皂莢煎膏榆白皮醋調塗癰腫水楊栁湯熱湯並沃洗腫