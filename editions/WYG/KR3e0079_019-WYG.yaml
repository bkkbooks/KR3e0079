五倍子檉乳質汗琥珀紫檀香地骨皮云止血神妙刺桐花桑白皮灰和馬屎塗赤煑汁服縫金瘡腸出桑葉同苧金櫻葉軍中名一捻金桑皮汁桑柴灰杉皮灰㯶皮灰栁花楮實釣樟緋帛灰綿紙灰撥火杖灰敗船茹灰甑帶灰燈花並止血定痛楓香傅金瘡筋斷旋花根金瘡筋斷杵汁滴入并貼日三易半月愈蘇方木刀斧傷指或斷者末𫝊蠒裏數日如故雞子白皮誤割舌斷先以套之牛蒡根葉𫝊之永不畏風鐵􅅡塗金瘡風水不入朱鼈佩之刃劍不能傷女人襌襠多熨止血熱湯故帛染搨泠水浸之並止血人氣吹之斷血栝樓根箭鏃針刺入肉擣塗日三易之莨菪根箭頭不出為丸貼臍惡刺傷人煑汁滴之巴豆箭鏃入肉同蜣蜋塗之拔出雄黄鹽藥山獺屎並𫝊藥箭毒薔薇根蓖麻子雙杏仁獨栗子黒豆並嚼塗鏃刃針刺入肉不出桑灰汁鱗蛇膽羊屎同猪脂車脂石油並塗針箭竹刺入肉松脂針入肉中𫝊裹五日根出不痛不痒鼠腦針刺竹木入肉擣塗即出箭鏑針刀在咽喉胸膈諸處同肝擣塗之象牙諸鐵及雜骨魚刺入肉刮末厚𫝊其刺自軟箭物自出也人爪針折及竹木刺入肉並刮末同酸􅀥仁塗之次日出也齒垢塗竹木入肉令不爛或加黑虱一枚牛膝白茅根白梅並嚼鐵華粉晚蠶蛾蠮螉馬肉蛆魚鰾並擣鴉炙研醋調雞毛灰烏雄雞肉擣陳熏肉切片鹿角鹿腦狐唇狐屎並塗竹木刺入肉人尿刺入肉温漬之跌仆折傷腸出杖瘡内治活血大黄同當歸煎服或同桃仁𤣥胡索豆淋酒服劉寄奴同𤣥胡索骨碎補水煎服土當歸煎酒服或同葱白荆芥水煎服三七磨酒虎杖煎酒蒲黄酒服黄葵子酒服五爪龍汁和童尿酒服婆婆鍼袋兒擂水服并𫝊即蘿摩何首烏同黒豆皂角等丸服治損寛筋黒大豆煮汁頻飲豆豉水煎寒食蒸餅酒服紅麴酒服生薑汁同香油入酒補骨脂同茴香辣桂末酒服乾藕同茴香末日服荷葉燒研童尿服利血甚効白萵苣子同乳香烏梅白术服止痛胡桃擂酒杏枝松節白楊皮並煎酒服甜𤓰葉琥珀没藥桂並調酒服枎栘木皮浸酒夜合樹皮擂酒服并封之和血消腫松楊破惡血養好血當歸蓬莪荗三稜赤芍藥牡丹皮蘇方木馬蘭澤蘭敗蒲灰童尿酒服不拘有無瘀血推陳致新勝于他藥白馬蹄燒研酒服化血為水羊角沙餹水炒焦酒服止痛鹿角惡血骨痛酒服日三黄明膠同冬𤓰皮炒焦酒服取汁亦治多年損痛雄雞血和酒熱飲至醉痛立止也鴉右翅瘀血攻心面青氣短七枚燒研酒服當吐血愈鮑魚煎服主損傷瘀血在四肢不収者水蛭酒服行血或加大黄牽牛取利麻油入酒服燒熱地卧之覺即疼腫俱消黄茄種消青腫焙末酒服二錢一夜平重陽収化為水服散惡血猪肉傷損血在胸膈不食者生刴温水送下一錢即思食内治接骨骨碎補研汁和酒服以滓𫝊之或研入黄米粥裹之地黄折臂斷筋損骨研汁和酒服一月即連續仍炒熱貼白及酒服二錢不減自然銅也黄麻灰同髪灰乳香酒服接骨木煎服賣子木去血中留飲續絶補髓自然銅散血止痛乃接骨要藥銅屑酒服古文錢同真珠甜𤓰子末酒服銅鈷鉧水飛酒服二錢不過再服生鐵煎酒散血鐵漿粉閃肭脱臼同黍米葱白炒焦酒服仍水醋調𫝊無名異酒服散血入乳没接骨烏古瓦煆研酒服接骨神方胡粉同當歸莪茂末蘇木湯服䗪蟲接骨神藥擂酒服或焙存性酒服三錢或入自然銅末乾一用乳没龍骨自然銅等分麝香少許毎服三分入䗪末一個酒服又可代杖秘方毎又土鼈炒乾巴豆霜半夏等分研末黄酒服一二分接骨如神龜血酒服擣肉封之蟹擂酒連飲數盌以滓封之半日骨内有聲即接乾者燒研酒服鶚骨燒研同煆過古錢等分毎酒服一錢接骨極効鵰骨燒末酒服二錢隨病上下鷹骨同上人骨同乳香紅絹灰酒服少媍髪一團包乳香一塊炒過酒服一字玅外治散瘀接骨大黄薑汁調塗一夜變色鳯仙花葉擣塗頻上一夜即平半夏水調塗一夜即消附子煎猪脂醋塗糯米寒食浸至小滿晒研如用水調塗之白楊皮血瀝在骨肉間痛不可忍雜五木煎湯服之黄土瘀血凝痛欲死蒸熱布裹更互熨之死者亦活也白礬泡湯熨之止痛沙閃出骨竅同緑豆蠶炒𫝊烏雞一切折傷獸觸胸腹者連毛擣爛醋和隔布搨之待振寒欲吐除取下再上牛馬血折傷垂死破牛或馬腹納入浸熱血中愈苧葉和石灰擣収地黄炒熱杵泥燈心嚼牛膝旋花根紫蘇三七莨菪子蛇牀栝樓根白斂土𤓰根茜根地錦骨碎補水萍威靈仙何首烏稻穣黍米燒麥麩醋炒麥麪水和并服稗草緑豆粉炒紫豆黄豆腐貼頻易酒糟葱白煨蘿蔔生薑同葱白麪炒汁同酒調麪桃仁李核仁肥皂醋調鹽楊梅和核硏桑白皮煎膏降真香麒麟竭水桐皮乳香没藥落雁木質汗桑葉巵子同麪擣蜜栗子石青故緋炊單布蛤蚧弔脂海螵蛸鰾膠水煮鼈肉生擣龜肉攝龜並生擣熊肉貼羊脂野駝脂犁牛酥牛髓猪髓並摩黄牛屎炒罯白馬屎炒罯諸朽骨唾磨塗猪肉炙貼牛肉炙貼烏氊鹽醋煮熱裹並消瘀血青腫紫荆皮傷跟青腫童尿浸研和薑苄汁塗之釡底墨塗手搔瘡腫母猪蹄煮洗傷撻諸敗瘡栗子筋骨斷碎瘀血腫痛生嚼塗之有効蟹肉筋骨折傷斷絶連黄擣泥㣲納罯筋即連也五靈脂骨折腫痛同白及乳没油調塗接骨同茴香先傅乳香次塗小米粥次上藥帛裹木夾三五日狗頭骨接骨燒研熱醋調塗牛蹄甲接骨同乳没燒研黄米糊和𫝊蕓薹子同黄米龍骨接骨鞋底灰同麫和腸出熱雞血金瘡腸出乾人屎末抹之桑白皮縫合以血塗之慈石金瘡腸出納入同滑石末米飲日服二錢人參脇腹腸出急抹油内入人參枸杞汁淋之喫羊腎粥十日愈小麥金瘡腸出煮汁噀面大麥煮汁洗貼推入但飲米糜泠水墜損腸出噴其身面則入杖瘡内治童尿杖畢即和酒服免血攻心三七酒服三錢血不冲心仍嚼塗之紅麴擂洒服大黄煎酒服下去瘀血外以薑汁或童尿調塗一夜黑者紫二夜紫者白無名異臨時服之杖不甚傷䗪蟲方見折傷白蠟酒服一兩人骨燒末酒服外並杖不痛治半夏末破者水調塗一夜血散鳯仙花葉已破者頻塗一夜血散冬用乾葱白炒罯酒糟隔紙罯之豆腐熱貼色淡為度蘿蔔擣貼羊肉熱貼猪肉熱貼芙蓉同皂角雞子白緑豆粉同雞子白黄土同雞子童尿不住上石灰油調或和猪血燒三次研滑石同大黄赤石脂水粉同水銀赤石脂雄黄同蜜陀僧或同無名異乳香煎油或入没藥米粉牛蒡根葉塗之永不畏風大豆黄末黍米炒焦馬齒莧杵赤龍皮燒五倍子醋炒血竭蜜陀僧香油􅆈膏松香黄蠟並􅆈膏雞子黄熬油猪膽汁埽未毛鼠同桑椹浸油埽之黄𤓰六月六日缾収浸水埽之猪蹄湯洗羊皮臥之消青腫本草綱目卷四中
