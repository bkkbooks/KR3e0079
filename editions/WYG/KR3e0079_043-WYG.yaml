body:
  text: 本草綱目卷十五明李時珍撰草之四隰草類上五十三種菊本經上品釋名節華本經女節别録女華别録女莖别録日精别録更生别録傅延年别錄治蘠爾雅金蕋綱目隂成别録周盈别録時珍曰按陸佃埤雅云菊本作蘜從鞠鞠窮也月令九月菊有黄華華事至此而窮盡故謂之蘜節華之名亦取其應節候也崔寔月令云女節女華菊華之名也治蘠日精菊根之名也抱朴子云仙方所謂日精更生周盈皆一菊而根莖花實之名異也頌曰唐天寳單方圖載白菊云原生南陽山谷及田野中頴川人呼為囬峰菊汝南名荼苦蒿上黨及建安郡順政郡並名羊歡草河内名地薇蒿集解别録曰菊花生雍州川澤及田野正月采根三月采葉五月采莖九月采花十一月采實皆隂乾𢎞景曰菊有兩種一種莖紫氣香而味甘葉可作羮食者為真菊一種青莖而大作蒿艾氣味苦不堪食者名苦薏非真菊也葉正相似惟以甘苦别之南陽酈縣最多今近道處處有之取種便得又有白菊莖葉都相似惟花白五月取之仙經以菊為妙用但難多得宜常服之藏器曰白菊生平澤五月花紫白色頌曰處處有之以南陽菊潭者為佳初春布地生細苗夏茂秋花冬實然種類頗多惟紫莖氣香葉厚至柔者嫩時可食花微大味甚甘者為真其莖青而大葉細氣烈似蒿艾花小味苦者名苦薏非真也南陽菊亦有兩種白菊葉大如艾葉莖青根細花白蕋黄其黄菊葉似茼蒿花蕋都黄今服餌家多用白者又有一種開小小花瓣下如小珠子謂之珠子菊云入藥亦佳宗奭曰菊花近世有二十餘種惟單葉花小而黄緑葉色深小而薄九月應候而開者是也鄧州白菊單葉者亦入藥餘皆醫經不用瑞曰花大而白者為甘菊花小而黄者為黄菊花小而氣惡者為野菊時珍曰菊之品凡百種宿根自生莖葉花色品品不同宋人劉蒙泉范至能史正志皆有菊譜亦不能盡収也其莖有株蔓紫赤青緑之殊其葉有大小厚薄尖秃之異其花有千葉單葉有心無心有子無子黄白紅紫間色深淺大小之别其味有甘苦辛之辨又有夏菊秋菊冬菊之分大抵惟以單葉味甘者入藥菊譜所載甘菊鄧州黄鄧州白者是矣甘菊始生于山野今則人皆栽植之其花細碎品不甚髙蕋如蜂窠中有細子亦可捺種嫩葉及花皆可食白菊花稍大味不甚甘亦秋月采之菊之無子者謂之牡菊燒灰撒地中能死鼃黽説出周禮花葉根莖實並同氣味苦平無毒别録曰甘損之曰甘者入藥苦者不入藥杲曰苦甘寒可升可降隂中微陽也時珍曰本經言菊花味苦别録言菊花味甘諸家以甘者為菊苦者為苦薏惟取甘者入藥謹按張華博物志言菊有兩種苗花如一惟味小異苦者不中食范至能譜序言惟甘菊一種可食仍入藥餌其餘黄白二花皆味苦雖不可餌皆可入藥其治頭風則白者尤良據此二説則是菊類自有甘苦二種食品須用甘菊入藥則諸菊皆可但不得用野菊名苦薏者爾故景煥牧竪閑談云真菊延齡野菊泄人正如黄精益夀鉤吻殺人之意之才曰术及枸杞根桑根白皮為之使主治諸風頭眩腫痛目欲脱淚出皮膚死肌惡風濕痺久服利血氣輕身耐老延年本經療腰痛去來陶陶除胸中煩熱安腸胃利五脉調四肢别録緩陶陶縱貎治頭目風熱風旋倒地腦骨疼痛身上一切㳺風令消散利血脉並無所忌甄權作枕明目葉亦明目生熟並可食大明養目血去翳膜元素主肝氣不足好古白菊氣味苦辛平無毒主治風眩能令頭不白𢎞景染髭髪令黒和巨勝茯苓宻丸服之去風眩變白不老益顔色藏器發明震亨曰黄菊花属土與金有水與火能補隂血故養目時珍曰菊春生夏茂秋花冬實偹受四氣飽經露霜葉枯不落花稿不零味兼甘苦性禀平和昔人謂其能除風熱益肝補隂葢不知其得金水之精英尤多能益金水二臟也補水所以制火益金所以平木木平則風息火降則熱除用治諸風頭目其㫖深微黄者入金水隂分白者入金水陽分紅者行婦人血分皆可入藥神而明之存乎其人其苗可􅂼葉可啜花可餌根實可藥嚢之可枕醸之可飲自本至末罔不有功宜乎前賢比之君子神農列之上品隠士采入酒斚騷人餐其落英費長房言九日飲菊酒可以辟不祥神仙傳言康風子朱孺子皆以服菊花成仙荆州記言胡廣久病風羸飲菊潭水多夀菊之貴重如此是豈羣芳可伍哉鍾㑹菊有五美賛云圓花髙懸凖天極也純黄不雜后土色也早植晚發君子徳也冐霜吐穎象貞質也盃中體輕神仙食也米西京雜記言采菊花莖葉雜秫釀酒至次年九月始熟用之附方舊六新十六服食甘菊玉凾方云王子喬變白增年方用甘菊三月上寅日采苖名曰玉英六月上寅日采葉名曰容成九月上寅日采花名曰金精十二月上寅日采根莖名曰長生四味並隂乾百日取等分以成日合𢷬千杵為末每酒服一錢匕或以蜜丸梧子大酒服七丸一日三服百日輕潤一年髮白變黒服之二年齒落再生五年八十嵗老翁變為兒童也孟詵云正月采葉五月五日采莖九月九日采花服食白菊太清靈寳方引九月九日白菊花二斤茯苓一斤並𢷬羅為末每服二錢温酒調下日三服或以煉過松脂和九雞子大每服一丸主頭眩久服令人好顔色不老藏器曰抱朴子言劉生丹法用白菊汁蓮花汁地血汁樗汁和丹蒸服也白菊花酒天寳單方治丈夫婦人乆患頭風眩悶頭髪乾落胸中痰壅每發即頭旋眼昏不覺欲倒者是其候也先炙兩風池各二七壯并服此酒及散永瘥其法春末夏初収白菊軟苖隂乾𢷬末空腹取一方寸匕和無灰酒服之日再服漸加三方寸匕若不飲酒者但和羮粥汁服亦得秋八月合花収暴乾切取三大斤以生絹袋盛貯三大斗酒中經七日服之日三次常令酒氣相續為佳蘇頌圖經風熱頭痛菊花石膏川芎各三錢為末每服一錢半茶調下簡便方膝風疼痛菊花陳艾葉作䕶膝久則自除也吳旻扶夀方癍痘入目生翳障用白菊花榖精草緑豆皮等分為末每用一錢以乾柿餅一枚粟米泔一盞同煮候泔盡食柿日食三枚淺者五七日逺者半月見効仁齋直指方病後生瞖白菊花蟬脱等分為散每用二三錢入宻少許水煎服大人小兒皆宜屢驗救急方疔腫垂死菊花一握搗汁一升入口即活此神驗方也冬月采根肘后方女人隂腫甘菊苖搗爛煎湯先熏後洗危氏得効方酒醉不醒九月九日眞菊花為末飲服方寸匕外臺秘要眼目昬花雙美丸用甘菊花一斤紅椒去目六両為末用新地黄汁和丸梧子大每服五十丸臨臥茶清下瑞竹堂方花上水主治益色壯陽治一切風大明野菊拾遺釋名苦薏時珍曰薏乃蓮子之心此物味苦似之故與之同名集解藏器曰苦薏生澤畔莖如馬蘭花如菊菊甘而薏苦語曰苦如薏是也時珍曰苦薏處處原野極多與菊無異但葉薄小而多尖花小而蕋多如蜂窠狀氣味苦辛惨烈根葉莖花氣味苦辛温有小毒震亨曰野菊花服之大傷胃氣主治調中止洩破血婦人腹内宿血宜之藏器治癰腫疔毒瘰癧眼瘜時珍附方新四癰疽丁腫一切無名腫毒孫氏集効方用野菊花連莖搗爛酒煎熱服取汗以渣傅之即愈入衛生易簡方用野菊花莖葉蒼耳草各一握共搗酒一椀絞汁服以渣傅之取汗即愈或六月六日采蒼耳葉九月九日采野菊花為末每酒服三錢亦可天泡濕瘡野菊花根棗木煎湯洗之醫學集成瘰癧未破野菊花根𢷬爛煎酒服以渣傅之自消不消亦自破也瑞竹堂經騐方菴䕡音淹閭品本經上釋名覆閭時珍曰菴草屋也閭里門也此草乃蒿属老莖可以葢覆菴閭故以名之貞元廣利方謂之菴䕡蒿云又史注云菴廬軍行宿室也則閭似當作廬集解别録曰菴䕡子生雍州川谷亦生上黨及道邉十月采實隂乾𢎞景曰狀如蒿艾之類近道處處有之仙經亦時用之人家種此辟蛇也頌曰今江淮亦有之春生苖葉如艾蒿髙二三尺七月開花八月結實九月采實時珍曰菴䕡葉不似艾似菊葉而薄多細丫面背皆青髙者四五尺其莖白色如艾莖而粗八九月開細花淡黄色結細實如艾實中有細子極易繁衍藝花者以之接菊子氣味苦微寒無毒别録曰微温普曰神農雷公桐君岐伯苦小温無毒李當之温權曰辛苦時珍曰降也隂中微陽入足厥隂經血分之才曰荆實薏苡為之使主治五臟瘀血腹中水氣臚脹留熱風寒濕痺身體諸痛久服輕身延年不老本經療心下堅隔中寒熱周痺婦人月水不通消食明目駏驉食之神仙别録益氣主男子隂痿不起治心腹脹滿甄􅁠腰脚重痛膀胱痛及骨節煩痛不下食大明擂酒飲治閃挫腰痛及婦人産後血氣痛時珍發明頌曰本經言久服輕身不老而古方少有服食者惟入諸雜治藥中如胡治治驚邪狸骨丸之類大方中用之孫思邈千金翼韋宙獨行方主踠折瘀血並單用菴䕡煮汁服亦可末服今人治打撲多用此法或飲或散其效最速時珍曰吴普本草及名醫别録並言駏驉食菴䕡神仙此亦謂其多夀爾駏驉乃獸名似騾而小前足長後足短不能自食每負蹷鼠為之囓食附方舊一新二瘀血不散變成癰腫生菴䕡蒿𢷬汁一升服之廣利方月水不通婦人宿有風冷留血積聚月水不通菴䕡子一升桃仁二升酒浸去皮尖研勻入瓶内以酒二斗浸封五日後每飲三合日三服聖惠方産後血痛菴䕡子一両水一升童子小便二盃煎飲集頻湖簡方附録對廬别録有名未用曰味苦寒無毒主疥瘡久不瘳生死肌除大熱煮汁洗之似菴䕡八月采蓍音尸品本經上釋名時珍曰按班固白虎通載孔子云蓍之為言耆也老人厯年多更事久事能盡知也陸佃埤雅云草之多夀者故字從耆博物志言蓍千歳而三百莖其本已老故知吉凶集解别録曰蓍實生少室山谷八月九月采實日乾恭曰此草所在有之其莖可為筮陶氏誤以楮實為之楮實味甘此味苦今正之頌曰今蔡州上蔡縣白龜祠旁其生如蒿作叢髙五六尺一本一二十莖至多者五十莖生便條直所以異於衆蒿也秋後有花出于枝端紅紫色形如菊花結實如艾實史記龜筴傳云龜千嵗乃逰于蓮葉之上蓍百莖共一根所生之處獸無虎狼蟲無毒螫徐廣註云劉向言龜千嵗而靈蓍百年而一本生百莖也褚先生云蓍滿百莖其下必有神龜守之其上常有青雲覆之傳云天下和平王道得而蓍莖長丈其叢生滿百莖方今取蓍者八十莖已上長八尺者即已難得但得滿六十莖以上長六尺者即可用矣今蔡州所上皆不言如此則此類亦神物故不常有也時珍曰蓍乃蒿属神草也故易曰蓍之徳圓而神天子蓍長九尺諸侯七尺大夫五尺士三尺張華博物志言以末大於本者為主次蒿次荆皆以月望浴之然則無蓍揲卦亦可以荆蒿代之矣實氣味苦酸平無毒主治益氣充肌膚明目聰慧先知久服不饑不老輕身本經葉主治痞疾時珍附方新一腹中痞塊蓍葉獨蒜穿山甲末食鹽同以好醋搗成餅量痞大小貼之兩炷香為度其痞化為膿血從大便出劉松石保夀堂方艾别録中品釋名冰臺爾雅醫草别録黄草埤雅艾蒿時珍曰王安石字説云艾可乂疾久而彌善故字從乂陸佃埤雅云博物志言削冰令圓舉而向日以艾承其影則得火則艾名冰臺其以此乎醫家用炙百病故曰炙草一灼謂之一壯以壯人為法也集解别録曰艾葉生田野三月三日采暴乾頌曰處處有之以複道及四明者為佳云此種炙百病尤勝初春布地生苖莖類蒿葉背白以苖短者為良三月三日五月五日采葉暴乾陳久方可用時珍曰艾葉本草不著土産但云生田野宋時以湯隂複道者為佳四明者圖形近代惟湯隂者謂之北艾四明者謂之海艾自成化以來則以蘄州者為勝用充方物天下重之謂之蘄艾相傳他處艾炙酒壜不能透蘄艾一炙則直透徹為異也此草多生山原二月宿根生苖成叢其莖直生白色髙四五尺其葉四布狀如蒿分為五尖椏上復有小尖面青背白有茸而柔厚七八月葉間出穗如車前穂細花結實累累盈枝中有細子霜後始枯皆以五月五日連莖刈取暴乾収葉先君月池子諱言聞甞著蘄艾傳一卷有讃云産于山陽采以端午治病炙疾功非小補又宗懔荆楚歳時記云五月五日雞未鳴時采艾似人形者攬而取之収以炙病甚騐是日采艾為人懸于戸上可禳毒氣其莖乾之染麻油引火㸃炙炷滋潤炙瘡至愈不疼亦可代蓍策及作燭心葉修治宗奭曰艾葉乾𢷬去青滓取白入石硫黄末少許謂之硫黄艾炙家用之得米粉少許可𢷬為末入服食藥用時珍曰凡用艾葉須用陳久者治令細軟謂之熟艾若生艾炙火則傷人肌脉故孟子云七年之病求三年之艾㨂取凈葉揚去塵屑入石臼内木杵㨶熟羅去渣滓取白者再搗至柔爛如綿為度用時焙燥則炙火得力入婦人丸散須以熟艾用醋煮乾搗成餅子烘乾再搗為末用或以糯糊和作餅及酒炒者皆不佳洪氏容齋随筆云艾難著力若入白茯芩三五片同碾即時可作細末亦一異氣味苦微温無毒恭曰生寒熟熱元素曰苦温隂中之陽時珍曰苦而辛生温熟熱可升可降陽也入足太隂厥隂少隂之經苦酒香附為之使主治炙百病可作煎止吐血下痢下部䘌瘡婦人漏血利隂氣生􅡌肉辟風寒使人有子作煎勿令見風别録搗汁服止傷血殺蚘蟲𢎞景主衂血下血膿血痢水煮及丸散任用蘇恭止崩血腸痔血搨金瘡止腹痛安胎苦酒作煎治癬甚良搗汁飲治心腹一切冷氣鬼氣甄􅁠治帯下止霍亂轉筋痢後寒熱大明治帶脉為病腹脹滿腰溶溶如坐水中好古温中逐冷除濕時珍發明詵曰春月采嫩艾作菜食或和麫作餛飩如彈子吞三五枚以飯壓之治一切鬼惡氣長服止冷痢又以嫩艾作乾餅子用生薑煎服止瀉痢及産後瀉血甚妙頌曰近世有單服艾者或用蒸木𤓰和丸或作湯空腹飲甚補虚羸然亦有毒發則熱氣衝上狂躁不能禁至攻眼有瘡出血者誠不可妄服也震亨曰婦人無子多由血少不能攝精俗醫謂子宫虚冷投以辛熱或服艾葉不知艾性至熱入火炙則氣下行入藥服則氣上行本草止言其温不言其熱世人喜温率多服之久久毒發何甞歸咎于艾哉予考蘇頌圗經而因黙有感焉時珍曰艾葉生則微苦太辛熟則微辛太苦生温熟熱純陽也可以取太陽真火可以回垂絶元陽服之則走二隂而逐一切寒濕轉肅殺之氣為融和炙之則透諸經而治百種病邪起沉疴之人為康泰其功亦大矣蘇恭言其生寒蘇頌言其有毒一則見其能止諸血一則見其熱氣上衝遂謂其性寒有毒誤矣葢不知血隨氣而行氣行則血散熱因久服致火上衝之故爾夫藥以治病中病則止若素有虚寒痼冷婦人濕鬱帶漏之人以艾和歸附諸藥治其病夫何不可而乃妄意求嗣服艾不輟助以辛熱藥性久偏致使火躁是誰之咎歟於艾何尤艾附丸治心腹少腹諸痛調女人諸病頗有深功膠艾湯治虚痢及姙娠産後下血尤著竒效老人丹田氣弱臍腹畏冷者以熟艾入布袋兠其臍腹妙不可言寒濕脚氣亦宜以此夾入襪内附方舊二十四新二十七傷寒時氣温疫頭痛壯熱脉盛以乾艾葉三升水一斗煮一升頓服取汗肘后方姙娠傷寒壯熱赤斑變為黒斑溺血用艾葉如雞子大酒三升煮二升半分為二服傷寒類要姙娠風寒卒中不省人事狀如中風用熟艾三両米醋炒極熱以絹包熨臍下良久即甦婦人良方中風口喎以葦筒長五寸一頭刺入耳内四面以麫宻封不透風一頭以艾炙之七壯患右炙左患左炙右勝金方中風口噤熟艾炙承漿一穴頰車二穴各五壯千金方中風掣痛不仁不隨並以乾艾斛許揉團納瓦甑中並下塞諸孔獨留一目以痛處著甑囙而燒艾熏之一時即知矣肘后方舌縮口噤以生艾搗傅之乾艾浸濕亦可聖濟録咽喉腫痛醫方大成用嫩艾搗汁細嚥之經騐方用青艾和莖葉一握同醋搗爛傅于喉上冬月取乾艾亦得李臣所傳方也癲癎諸風熟艾于隂囊下榖道正門當中間隨年歳炙之斗門方鬼擊中惡卒然着人如刀刺狀胸脇腹内㽲刺切痛不可按或即吐血鼻中出血下血一名鬼排以熟艾如雞子大三枚水五升煎二升頓服肘后方小兒臍風撮口艾葉燒灰填臍中以帛縛定効或隔蒜炙之候口中有艾氣立愈簡便方狐惑蟲䘌病人齒無色舌上白或喜睡不知痛痒處或下痢宜急治下部不曉此者但攻其上而下部生蟲食其肛爛見五臟便死也燒艾于管中熏下部令烟入或少加雄黄更妙罌中燒烟亦可肘后方頭風久痛蘄艾揉為九時時嗅之以黄水出為度青嚢雜纂頭風面瘡痒出黄水艾二両醋一升砂鍋煎取汁每薄紙上貼之一日二三上御藥院方心腹惡氣艾葉搗汁飲之性藥論脾胃冷痛白艾末沸湯服二錢衛生易簡方蚘蟲心痛如刺口吐清水白熟艾一升水三升煮一升服吐蟲出或取生艾搗汁五更食香脯一片乃飲一升當下蟲出肘后方口吐清水乾蘄艾煎湯啜之怪證竒方霍亂吐下不止以艾一把水三升煮一升頓服要外臺秘老小白痢艾薑丸用陳北艾四両乾薑炮三両為末醋煮倉米糊丸梧子大每服七十丸空心米飲下甚有竒效永類方諸痢久下艾葉陳皮等分煎湯服之亦可為末酒煮爛飯和丸每鹽湯下二三十丸聖濟總録暴泄不止陳艾一把生薑一塊水煎熱服編生生糞後下血艾葉生薑煎濃汁服三合千金方野雞痔病先以槐柳湯洗過以艾灸上七壯取效郎中王及乗騾入西川數日病痔大作如胡𤓰貫於腸頭其熱如火忽至僵仆無計有主郵者云湏炙即瘥乃用上法炙三五壯忽覺一道熱氣入膓中因大轉瀉血穢併出瀉後遂失胡𤓰所在矣經騐良方姙娠下血張仲景曰婦人有漏下者有半産後下血不絶者有姙娠下血者並宜膠艾湯主之阿膠二両艾葉三両芎藭甘草各二両當歸地黄各三両芍藥四両水五升清酒五升煮取三升乃納膠令消盡每温酒一升日三服金匱要略姙娠胎動或腰痛或搶心或下血不止或倒産子死腹中艾葉一雞子大酒四升煮二升分二服肘后方胎動廹心作痛艾葉雞子大以頭醋四升煎二升分温服子母秘録婦人崩中連日不止熟艾雞子大阿膠炒為末半両乾薑一錢水五盞先煮艾薑至二盞半傾出入膠烊化分三服一日服盡初虞世古今録騐産後瀉血不止乾艾葉半両炙熟老生薑半両濃煎湯一服立妙孟詵食療本草産後腹痛欲死因感寒起者陳蘄艾二斤焙乾搗鋪臍上以絹覆住熨斗熨之待口中艾氣出則痛自止矣楊誠經騐方忽然吐血一二口或心衂或内崩熟艾三團水五升煮二升服一方燒灰水服二錢千金方鼻血不止艾灰吹之亦可以艾葉煎服聖惠方盜汗不止熟艾二錢白茯神三錢烏梅三个水一鍾煎八分臨卧温服通妙真人方火眼腫痛以艾燒烟起用盌覆之候烟盡盌上刮煤下以温水調化洗眼即瘥更入黄連尤佳斗門方面上皯􅍍艾灰桑灰各三升以水淋汁再淋至三遍以五色布納于中同煎令可丸時每以少許傅之自爛脱甚妙外臺秘要婦人面瘡名粉花瘡以定粉五錢菜子油調泥盌内用艾一二圑燒烟熏之候烟盡覆地上一夜取出調搽永無瘢痕亦易生肉談埜翁試騐方身面疣目艾火炙三壯即除聖惠方鵞掌風病蘄艾真者四五两水四五碗煮五六滚入大口瓶内盛之用麻布二層縛之将手心放瓶上熏之如冷再熱如神陸氏積德堂方瘡疥熏法熟蘄艾一両木鱉子三錢雄黄二錢硫黄一錢為末揉入艾中分作四條每以一條安隂陽瓦中置被裏烘熏後服通聖散醫方摘要小兒疳瘡艾葉一兩水一升煮取四合服備急方小兒爛瘡艾葉燒灰傅之良子母秘録臁瘡口冷不合熟艾燒烟熏之經騐方白􅋪風瘡乾艾隨多少以浸麴釀酒如常法日飲之覺痺即瘥肘后方疔瘡腫毒艾蒿一擔燒灰于竹筒中淋取汁以一二合和石灰如糊先以針刺瘡至痛乃㸃藥三遍其根自拔玉山韓光以此治人神騐貞觀初衢州徐使君訪得此方予用治三十餘人得效孫真人千金方發背初起未成及諸熱腫以濕紙搨上先乾處是頭著艾炙之不論壯數痛者炙至不痛不痛者炙至痛乃止其毒即散不散亦免内攻神方也李絳兵部手集癰疽不合瘡口冷滯以北艾煎湯洗後白膠熏之方直指咽喉骨哽用生蒿艾數升水酒共一斗煮四升細細飲之當下外臺秘要誤吞銅錢艾蒿一把水五升煎一升頓服便下錢相公篋中方諸蟲蛇傷艾炙數壯甚良集簡方風蟲牙痛化蠟少許攤紙上鋪艾以筯卷成筒燒烟隨左右熏鼻及烟令滿口呵氣即疼止腫消靳季謙病此月餘一試即愈普濟方實氣味苦辛暖無毒主治明目療一切鬼氣甄權壯陽助水臟腰膝及暖子宫大明發明詵曰艾子和乾薑等分為末宻丸梧子大空心每服三丸以飯三五匙壓之日再服治百惡氣其鬼神速走出田野之人與此甚相宜也附録夏臺别録有名未用曰味甘主百疾濟絕氣𢎞景曰此藥神竒乃爾不復識用可恨也時珍曰艾名氷臺此名夏臺艾炙百病能回絶氣此主百病濟絕氣恐是一物重出也故附于艾後千年艾綱目集解時珍曰千年艾出武當太和山中小莖髙尺許其根如蓬蒿其葉長寸餘無尖椏面青背白秋開黄花如野菊而小結實如青珠丹顆之狀三伏日采葉暴乾葉不似艾而作艾香搓之即碎不似艾葉成茸也羽流以充方物葉氣味辛微苦温無毒主治男子虚寒婦人血氣諸痛水煎服之時珍茵陳蒿本經上品釋名藏器曰此雖蒿類經冬不死更因舊苖而生故名因陳後加蒿字耳時珍曰按張楫廣雅及吳普本草並作因塵不知何義集解别録曰茵蔯生太山及邱陵坡岸上五月及立秋采隂乾𢎞景曰今處處有之似蓬蒿而葉緊細秋後莖枯經冬不死至春又生韓保昇曰葉似青蒿而背白大明曰茵蔯出和州及南山嶺上一名石茵蔯頌曰近道皆有之不及太山者佳春初生苖髙三五寸似蓬蒿而葉緊細無花實五月七月采莖葉隂乾今謂之山茵蔯江寜府一種茵蔯葉大根粗黄白色至夏有花實階州一種白蒿一似青蒿而背白本土皆以為茵蔯入藥今南方醫人用山茵蔯乃有數種或著其説云山茵蔯汴京及北地用者如艾蒿葉細而背白其氣亦如艾味苦乾則色黒江南所用者莖葉都似家茵蔯而大髙三四尺氣極芬香味甘辛俗又名龍腦薄荷吳中所用乃石香葇也葉至細色黄味辛甚香烈性温若誤作解脾藥服大令人煩以本草論之但有茵蔯蒿無山茵蔯註云葉似蓬蒿而緊細今汴京北地所用山茵蔯是也大體世方用山茵蔯療體痛解傷寒發汗行肢節滯氣化痰利膈治勞倦最要詳本草正經惟療黄胆利小便與世方都不應今試取汴京所用山茵蔯為解肌發汗藥灼然少效江南山茵蔯療傷寒腦痛絕勝比見諸醫議論謂家茵蔯亦能解肌下隔去胸中煩方家少用但可研作飲服之本草所無自出俗方茵蔯蒿當别是一物主療自異不得為山茵蔯也此説亦未可據但以功較之則江南者為勝以經言之則非本草所出醫方所用更當考論爾斆曰凡使須用葉有八角者隂乾去根細剉勿令犯火時珍曰茵蔯昔人多蒔為􅂼故入藥用山茵蔯所以别家茵蔯也洪舜俞老圃賦云酣糟紫薑之掌沭醯青蔯之絲是也今淮揚人二月二日猶采野茵蔯苖和粉麫作茵蔯餅食之後人各據方土所傳遂致淆亂今山茵蔯二月生苖其莖如艾其葉如淡色青蒿而背白葉紋緊細而扁整九月開細花黄色結實大如艾子花實並與菴閭花實相似亦有無花實者莖葉氣味苦平微寒無毒普曰神農岐伯雷公苦無毒黄帝辛無毒權曰苦辛有小毒大明曰石茵蔯苦凉無毒伏􅔈砂張元素曰苦甘隂中微陽入足太陽經主治風濕寒熱邪氣熱結黄疸久服輕身益氣耐老靣白悦長年白兎食之仙本經治通身發黄小便不利除頭熱去伏瘕别録通闗節去滯熱傷寒用之藏器石茵蔯治天行時疾熱狂頭痛頭旋風眼疼瘴瘧女人癥瘕并閃損乏絕大明發明𢎞景曰仙經曰白蒿白兎食之仙而今茵蔯乃云此恐是誤耳宗奭曰張仲景治傷寒熱甚發黄身面悉黄者用之極效一僧因傷寒後發汗不徹有留熱面身皆黄多熱期年不愈醫作食治不對而食不減予與此藥服五日病减三分之一十日减三分之二二十日病悉去方用山茵蔯山梔子各三分秦芃升麻各四錢為散每用三錢水四合煎二合去滓食後温服以知為度此藥以山茵蔯為本故書之王好古曰張仲景茵蔯梔子大黄湯治濕熱也梔子蘖皮湯治燥熱也如苖澇則濕黄苖旱則燥黄濕則瀉之燥則潤之可也此二藥治陽黄也韓祗和李思訓治隂黄用茵蔯附子湯大抵以茵蔯為君主而佐以大黄附子各隨其寒熱也附方舊二新六茵蔯􅃵除大熱黄疸傷寒頭痛風熱瘴瘧利小便以茵蔯細切煮羮食之生食亦宜鏡食醫心遍身風痒生瘡疥用茵蔯煮濃汁洗之立瘥千金方􅊓瘍風病茵蔯蒿両握水一斗五升煮取七升先以皂筴湯洗次以此湯洗之冷更作隔日一洗不然恐痛也功崔行纂要風疾攣急茵蔯蒿一斤秫米一石麴三斤和勻如常法釀酒服之聖濟總録癎黄如金好眠吐涎茵蔯蒿白鮮皮等分水二鍾煎服日二服三十六黄方遍身黄疸茵蔯蒿一把同生薑一塊𢷬爛于胸前四肢日日擦之男子酒疸用茵蔯蒿四根巵子七箇大田螺一箇連殻𢷬爛以百沸白酒一大盞冲汁飲之秘方也眼熱赤腫山茵蔯車前子等分煎湯細茶調散服數服直指方青蒿本經下品釋名草蒿本經方潰本經菣音牽去聲􅀈蒿蜀本香蒿衍義保昇曰草蒿江東人呼為􅀈蒿為其氣息似􅀈也北人呼為青蒿爾雅云蒿菣也孫炎注云荆楚之間謂蒿為菣郭璞注云今人呼青蒿香中炙啖者為菣是也時珍曰晏子云蒿草之髙者也按爾雅諸蒿獨菣得單稱為蒿豈以諸蒿葉背皆白而此蒿獨青異于諸蒿故􅁘集解别録曰青蒿生華隂川澤𢎞景曰處處有之即今青蒿人亦取雜香菜食之保昇曰嫩時醋淹為葅自然香葉似茵蔯蒿而背不白髙四尺許四月五月采日乾入藥詩云呦呦鹿鳴食野之蒿即此蒿也頌曰青蒿春生苖葉極細可食至夏髙四五尺秋後開細淡黄花花下便結子如粟米大八九月采子隂乾根莖子葉並入藥用乾炙作飲香尤佳宗奭曰青蒿得春最早人剔以為蔬根赤葉香沈括夢溪筆談云青蒿一類自有二種一種黄色一種青色本草謂之青蒿亦有所别也陜西銀綏之間蒿叢中時有一両窠逈然青色者土人謂之香蒿莖葉與常蒿一同但常蒿色淡青此蒿深青如松檜之色至深秋餘蒿並黄此蒿猶青其氣分芳恐古人所用以深青者為勝不然諸蒿何甞不青時珍曰青蒿二月生苖莖粗如指而肥軟莖葉色並深青其葉微似茵蔯而面背俱青其根白硬七八月間開細黄花頗香結實大如麻子中有細子修治斆曰凡使惟中為妙到膝即仰到腰即俛使子勿使葉使根勿使莖四件若同使翻然成痼疾采得葉用七嵗兒七箇溺浸七日七夜漉出晒乾葉莖根子氣味苦寒無毒時珍曰伏硫黄主治疥瘙痂痒惡瘡殺蝨治留熱在骨節間明目本經鬼氣尸疰伏留婦人血氣腹内滿及冷熱久痢秋冬用子春夏用苖並𢷬汁服亦暴乾為末小便入酒和服藏器補中益氣輕身補勞駐顔色長毛髪令黒不老兼去蒜髪殺風毒心痛熱黄生𢷬汁服并貼之大明治瘧疾寒熱時珍生𢷬傅金瘡止血止疼良蘇恭燒灰隔紙淋汁和石灰煎治惡瘡瘜肉黶瘢孟詵發明頌曰青蒿治骨蒸勢勞為最古方單用之時珍曰青蒿得春木少陽之氣最早故所主之證皆少陽厥隂血分之病也按月令通纂言伏内庚日采青蒿懸于門庭内可辟邪氣隂乾為末冬至元旦各服二錢亦良觀此則青蒿之治鬼疰伏尸盖亦有所伏也附方舊四三新十男婦勞瘦青蒿細剉水三升童子小便五升同煎取一升半去滓入器中煎成膏丸如梧子大每空心及臥時温酒吞下二十丸斗門方虚勞寒熱肢體倦疼不拘男婦八九月青蒿成實時采之去枝梗以童子小便浸三日晒乾為末每服二錢烏梅一箇煎湯服苑靈方骨蒸鬼氣童子小便五大斗澄清青蒿五斗八九月揀帯子者最好細剉相和納大釡中以猛火煎取三大斗去滓溉釜令淨再以㣲火煎可二大斗入猪膽一枚同煎一大斗半去火待冷以甆器盛之每欲服時取甘草二三両炙熟為末以煎和𢷬千杵為丸空腹粥飲下二十丸漸加至三十丸止上崔元亮海方骨蒸煩熱青蒿一握猪膽汁一枚杏仁四十箇去皮尖炒以童子小便一大盞煎五分空心温服十便良方虚勞盗汗煩熱口乾用青蒿一斤取汁􅆈膏入人參末麥門冬末各一兩􅆈至可丸九如梧子大每食後未飲服二十丸名青蒿煎聖方總録瘧疾寒熱肘後方用青蒿一握水二升𢷬汁服之四存仁方用五月五日天未明時采青蒿隂乾両桂心一両為末未發前酒服二錢每經騐方用端午日采青蒿葉隂乾桂心等分為末服一錢先寒用熱酒先熱用冷酒發日五更服之切忌發物温瘧痰甚但熱不寒用青蒿二両童子小便浸焙黄丹半両為末每服二錢白湯調下存仁方赤白痢下五月五日采青蒿艾葉等分同豆豉𢷬作餅日乾名蒿豉丹每用一餅以水一盞半煎服聖濟總録鼻中衂血青蒿𢷬汁服之并塞鼻中極騐衛生易簡方酒痔便血青蒿用葉不用莖用莖不用葉為末糞前冷水糞後水酒調服永類鈐方金瘡撲損肘后方用青蒿𢷬封之血止則愈一方用青蒿麻葉石灰等分五月五日𢷬和晒乾臨時為末搽之牙齒腫痛青蒿一握煎水潄之濟急方毒蜂螫人嚼青蒿封之即安肘後方耳出濃汁青蒿末綿裹納耳中聖惠方鼻中息肉青蒿灰石灰等分淋汁熬膏㸃之聖濟總録子氣味甘冷無毒主治明目開胃炒用治勞瘦壯徤人小便浸用之治惡瘡疥癬風􅇙煎水洗之大明治鬼氣為末酒服方寸匕孟詵功同葉時珍附方新一積熱眼澀三月三日或五月五日采青蒿花或子隂乾為末每并華水空心服二錢久服明目可夜看書名青金散十便良方節間蟲見蟲部黄花蒿綱目釋名臭蒿集解大明曰臭蒿一名草蒿時珍曰香蒿臭蒿通可名草蒿此蒿與青蒿相似但此蒿色緑𢃄淡黄氣辛臭不可食人家采以罨醤黄酒麴者是也葉氣味辛苦凉無毒主治小兒風寒驚熱時珍子氣味辛凉無毒主治治勞下氣開胃止盗汗及邪氣鬼毒大明白蒿本經上品釋名蘩爾雅由胡爾雅蔞蒿食療蔏音商時珍曰白蒿有水陸二種爾雅通謂之蘩以其易蘩衍也曰蘩皤蒿即今陸生艾蒿也辛薫不羙曰蘩由胡即今水生蔞蒿也辛香而羙曰蘩之醜秋為蒿則通指水陸二種而言謂其春時各有種名至秋老則皆呼為蒿矣曰藾曰蕭曰荻皆老蒿之通名象秋氣肅賴之氣集解别録曰白蒿生中山川澤二月采𢎞景曰蒿類甚多而俗中不聞呼白蒿者方藥家既不用皆無復識之恭曰爾雅皤蒿即白蒿也所在有之葉頗似細艾上有白毛錯澀粗于青蒿從初生至秋白于衆蒿禹錫曰蓬蒿可以為茹故詩箋云以豆薦蘩葅也陸機詩疏云凡艾白色為皤今白蒿先諸草發生香羙可食生蒸皆宜頌曰此草古人以為葅今人但食蔞蒿不復食此或疑白蒿即蔞蒿而孟詵食療又别著蔞蒿條所説不同明是二物乃知古今食品之異也又今階州以白蒿為茵蔯其苖葉亦相似然以入藥恐不可用也時珍曰白蒿處處有之有水陸二種本草所用葢取水生者故曰生中山川澤不曰山谷平地也二種形狀相似但陸生辛薫不及水生者香羙爾詩云呦呦鹿鳴食野之苹苹即陸生皤蒿俗呼艾蒿是矣鹿食九種解毒之草白蒿其一也詩云于以采蘩于沼于沚左傳云蘋蘩藴藻之菜可以薦于鬼神羞于王公並指水生白蒿而言則本草白蒿山之為蔞蒿無疑矣鄭樵通志謂苹為蔞蒿非矣鹿乃獸蔞乃水蒿陸機詩疏謂苹為牛尾蒿亦非矣牛尾蒿色青不白細葉直上狀如牛尾也蔞蒿生陂澤中二月發苖葉似嫩艾而岐細面青背白其莖或赤或白其根白脆采其根莖生熟葅曝皆可食盖嘉疏也景差大招云吴酸蒿蔞不沾薄謂吴人善調酸瀹蔞蒿為虀不沾不薄而甘羙此正指水生者也苖根氣味甘平無毒思邈曰辛平時珍曰發瘡疥主治五臟邪氣風寒濕痺補中益氣長毛髪令黒療心懸少食常饑久服輕身耳目聰明不老本經生挼醋淹為葅食甚益人𢷬汁服去熱黄及心痛曝為末米飲空心服一匙治夏月暴水痢燒灰淋汁煎治淋瀝疾孟詵利膈開胃殺河豚魚毒時珍發明𢎞景曰服食家七禽散云白兎食白蒿仙與菴䕡同法耳時珍曰本經列白蒿于上品有功無毒而古今方家不知用豈不得服之之訣與附方舊一惡瘡􅋪疾但是惡疾遍體面目有瘡者皆可服之用白艾蒿十束如升大煮取汁以麴及米一如釀酒法候熟稍服之梅師方子氣味缺主治鬼氣為末酒服之良孟詵角蒿唐本草集解恭曰角蒿似白蒿花如瞿麥紅赤可愛子似王不留行黒色作角七月八月采保昇曰葉似蛇牀青蒿子角似蔓菁青黒而細秋熟所在皆有之宗奭曰莖葉如青蒿開淡紅紫花大約徑三四分花罷結角長二寸許微彎斆曰凡使勿用紅蒿井邪蒿二味真似角蒿只是此香而角短爾采得于槐砧上細剉用之氣味辛苦有小毒主治乾濕䘌諸惡瘡有蟲者唐本治口齒瘡絕勝宗奭附方舊二新一齒齦宣露多是疳也角蒿燒灰夜塗上切忌油膩沙糖乾棗外臺秘方口瘡不瘥入胸中並生者不拘大人小兒以角蒿灰塗之有汁吐去一宿效千金方月蝕耳瘡用蒿灰摻之良集簡方䕲蒿拾遺釋名莪蒿爾雅蘿蒿同上抱娘蒿時珍曰陸農師云䕲之為言髙也莪亦峩也莪科髙也可以覆蠶故謂之蘿抱根叢生故曰抱娘集解時珍曰䕲蒿生髙崗似小薊宿根先于百草爾雅云莪蘿是也詩小雅云菁菁者莪陸璣注云即莪蒿也生澤國漸洳處葉似斜蒿而細科二月生莖葉可食又可蒸香羙頗似蔞蒿但味帯麻不似蔞蒿香甘氣味辛温無毒主治破血下氣煮食之藏器馬先蒿本經中品釋名馬新蒿唐本馬矢蒿本經練石草别録爛石草同上虎麻時珍曰蒿氣如馬矢故名馬先乃馬矢字訛也馬新又馬先之訛也𢎞景曰練石草一名爛石草即馬矢蒿今方藥不復用之集解别録曰馬先蒿練石草並生南陽川澤恭曰葉大如茺蔚花紅白色二月八月采莖葉隂乾用八月九月實熟俗謂之虎麻是也一名馬新蒿所在有之茺蔚苖短小其子夏中熟二物初生極相似也禹錫曰按爾雅云蔚牡菣註云即蒿之無子者詩云匪莪伊蔚陸璣云牡蒿也二月始生七月開花似胡麻花而紫赤八月生角似小豆角鋭而長一名馬新蒿是也頌曰郭璞以牡菣為無子而陸璣云有子二説小異今當用有子者為正時珍曰别録牡蒿馬先蒿原是二條陸璣所謂有子者乃馬先蒿而復引無子之牡蒿釋之誤矣牡蒿詳見本條氣味苦平無毒别録曰練石草寒主治寒熱鬼疰中風濕痺女子帯下病無子本經練石草治五癃破石淋膀胱中結氣利水道小便别録惡瘡𢎞景附方舊一大瘋􅋪疾骨肉疽敗眉鬚堕落身體痒痛以馬先蒿一名馬矢蒿一名爛石草炒𢷬末每服方寸匕食前温酒下一日三服一年都瘥肘后方隂地厥宋圖經集解頌曰生鄧州順陽縣内鄉山谷葉似青蒿莖青紫色花作小穂微黄根似細辛七月采根用時珍曰江浙亦有之外家采制丹砂硫黄根苖氣味甘苦微寒無毒主治腫毒風熱蘇頌附方新一男婦吐血後胸膈虚熱隂地厥紫荷車貫衆甘草各半両每服三錢水煎服聖濟總録牡蒿别録下品釋名齊頭蒿時珍曰爾雅蔚牡菣蒿之無子者則牡之名以此也諸蒿葉皆尖此蒿葉獨奓而秃故有齊頭之名集解别録曰牡蒿生田野五月八月采𢎞景曰方藥不復用恭曰齊頭蒿也所在有之葉似防風細薄而無光澤時珍曰齊頭蒿三四月生苖其葉扁而本狹末奓有秃岐嫩時可茹鹿食九草此其一也秋開細黄花結實大如車前實而内子微細不可見故人以為無子也苗氣味苦微甘温無毒主治充肌膚益氣令人暴肥不可久服血脉滿盛别録擂汁服治隂腫時珍附方新一瘧疾寒熱齊頭蒿根滴滴金根各一把擂生酒一鍾未發前服以滓傅寸口男左女右二日便止海上名方九牛草宋圖經集解頌曰生筠州山岡上二月生苖獨莖髙一尺葉似艾葉圓而長背有白毛面青五月采苗用時珍曰陳嘉謨本草蒙筌以此為蘄艾謬矣苖氣味微苦有小毒主治解風勞治身體痛與甘草同煎服不入衆藥用蘇頌茺蔚本經上品釋名益母本經益明本經貞蔚别録蓷爾雅音推野天麻㑹編猪麻綱目火杴本經鬱臭草圖經苦低草圖經夏枯草外臺土質汗綱目時珍曰此草及子皆茺盛密蔚故名茺蔚其功宜于婦人及明目益精故有益母之稱其莖方類麻故謂之野天麻俗呼為猪麻猪喜食之也夏至後即枯故亦有夏枯之名近効方謂之土質汗林億云質汗出西畨乃熱血合諸藥煎成治金瘡折傷益母亦可作煎治折傷故名為土質汗也禹錫曰爾雅萑蓷注云今茺蔚也又名益母劉歆云蓷臭穢也臭穢即茺蔚也陸璣云蓷益母也故曾子見之感思集解别録曰茺蔚生海濵地澤五月采𢎞景曰今處處有之葉如荏方莖子形細長有三稜方用亦稀頌曰今園圃及田野極多郭璞註爾雅云葉似荏方莖白華華生節間節節生花實似雞冠子黒色莖作四方稜五月采又云九月采實醫方稀有用實者宗奭曰茺蔚初春生時亦可浸洗陶去苦水煮作菜食凌冬不凋悴也時珍曰茺蔚近水濕處甚繁春初生苗如嫩蒿入夏長三四尺莖方如黄麻莖其葉如艾葉而背青一梗三葉葉有尖岐寸許一節節節生穗叢簇抱莖四五月間穂内開小花紅紫色亦有微白色者每蕚内有細子四粒粒大如同蒿子有三稜褐色藥肆往往以作巨勝子貨之其草生時有臭氣夏至後即枯其根白色蘇頌圖經謂其葉似荏其子黒色似雞冠子九月采實寇宗奭􅄛義謂其凌冬不凋者皆誤傳也此草有白花紫花二種莖葉子穗皆一様但白者能入氣分紅者能入血分别而用之可也按閨閣事宜云白花者為益母紫花者為野天麻返魂丹註云紫花者為益母白花者不是陳藏器本草云茺蔚生田野間人呼為臭草天麻生平澤似馬鞭草節節生紫花花中有子如青葙子孫思邈千金方云天麻草莖如火麻冬生苗夏着赤花如鼠尾花此皆似以茺蔚天麻為二物盖不知其是一物二種凡物花皆有赤白如牡丹芍藥菊花之類是矣又按郭璞爾雅註云蓷音推即茺蔚又名益母葉似荏白華華生節間又云藬音推方莖葉長而鋭有穗穗間有花紫縹色可以為飲江東呼為牛嶺據此則是蓷藬名本相同但以花色分别之其為一物無疑矣宋人重修本草以天麻草誤註天麻尤為謬失陳藏器本草又有鏨菜云生江南隂地似益母方莖對節白花主産後血病此即茺蔚之白花者故其功主血病亦相同子修治時珍曰凡用微炒香亦或蒸熟烈日曝燥舂簸去殻取仁用氣味辛甘微温無毒别録曰甘微寒時珍曰甘辛温灰制硫黄主治明目益精除水氣久服輕身本經療血逆大熱頭痛心煩别錄産後血脹大明春仁生食補中益氣通血脉填精髓止渴潤肺吳瑞治風解熱順氣活血養肝益心安魂定魄調女人經脉崩中𢃄下産後胎前諸病久服令人有子時珍發明震亨曰茺蔚子活血行氣有補隂之功故名益母凡胎前産後所恃者血氣也胎前無滯産後無虚以其行中有補也時珍曰茺蔚子味甘微辛氣温隂中之陽手足厥隂經藥也白花者入氣分紫花者入血分治婦女經脉不調胎産一切血氣諸病妙品也而醫方鮮知用時珍常以之同四物香附諸藥治人獲效甚多盖包絡生血肝藏血此物能活血補隂故能明目益精調經治女人諸病也東垣李氏言瞳子散大者禁用茺蔚子為其辛温主散能助火也當歸雖辛温而兼苦甘能和血故不禁之愚謂目得血而能視茺蔚行血甚㨗瞳子散大血不足也故禁之非助火也血滯病目則宜之故曰明目莖大明曰苖葉根同功氣味藏器曰寒時珍曰莖葉味辛微苦花味微苦甘根味甘並無毒鏡源曰制硫黄雌黄砒石主治􅐊􅇙可作浴湯本經𢷬汁服主浮腫下水消􅁖毒丁腫乳癰丹逰等毒併傅之又服汁主子死腹中及産後血脹悶滴汁入耳中主聤耳𢷬傅蛇虺毒蘇恭入面藥令人光澤治粉刺藏器活血破血調經解毒治胎漏産難胎衣不下血運血風血痛崩中漏下尿血瀉血疳痢痔疾打撲内損瘀血大便小便不通時珍發明時珍曰益母草之根莖花葉實並皆入藥可同用若治手足厥隂血分風熱明目益精調女人經脉則單用茺蔚子為良若治腫毒瘡瘍消水行血婦人胎産諸病則宜並用為良盖其根莖花葉専于行而子則行中有補故也附方舊十四新七濟隂返魂丹昝殷産宝曰此方乃吉安文江髙師禹備禮求于名醫所得者其效神妙活人甚多能治婦人胎前産後諸疾危證用野天麻又名益母又名火杴又名負擔即茺蔚子也葉似艾葉莖類火麻方梗凹面四五六月節節開花紅紫色如蓼花南北隨處皆有白花者不是于端午小暑或六月六日花正開時連根收采隂乾用葉及花子忌鐵器以石器碾為細末煉宻丸如彈子大隨證嚼服用湯使其根燒存性為末酒服功與黒神散不相上下其藥不限丸數以病愈為度或丸如梧子大每服五七十丸又可搗汁濾净熬膏服之胎前臍腹痛或作聲者水飲下胎前産後臍腹刺痛胎動不安下血不止當歸湯下然産後以童子小便化下一丸能安魂定魄血氣自調順諸病不生又能破血痛養脉息調經絡並温酒下心胎衣不下及横生不順死胎不下經日脹滿心悶痛並用炒塩湯下省産後血運眼黒血熱口渴煩悶如見鬼神狂言不人事以童子小便和酒化下産後結成血塊臍腹奔痛時發寒熱有冷汗或面垢顔赤五心煩熱並用童子小便酒下或薄荷自然汁下便産後惡露不盡結滯刺痛上衝心胸滿悶童子小酒下産後瀉血水以棗湯下産後痢疾米湯下艾産後血崩漏下糯米湯下膠湯下月水不調温酒下産後赤白𢃄下煎産後中風牙闗𦂳急半身不遂失音不語童便酒下兩産後氣喘欬𠻳胸隔不利惡心吐酸水面目浮腫脇疼痛舉動失力温酒下下産後月内欬𠻳自汗發熱久則變為骨蒸童便酒産後鼻衂舌黒口乾童便酒下産後兩太陽穴痛呵欠心忪氣短羸瘦不思飲食血風身熱手足頑麻百節疼痛並米飲化下産後大小便不通煩躁口苦者薄荷湯下婦人久無子息温酒下益母膏近效方治産婦諸疾及折傷内損有瘀血每天隂則痛神方也三月采益母草一名負擔一名夏枯草連根葉莖花洗擇令淨于箔上攤暴水乾以竹刀切長五寸勿用鐵刀置于大鍋中以水浸過二三寸煎煮候草爛水减三之二漉去草取汁約五六斗入盆中澄半日以綿濾去濁滓以清汁入釜中慢火煎取一斗如稀餳狀瓷瓶封收每取梨大暖酒和服日再服或和羮粥亦可如逺行即更煉至可丸収之服至七日則疼漸平復也産婦惡露不盡及血運一二服便瘥其藥無忌又能治風益心力外臺秘要女人難産益母草搗汁七大合煎減半頓服立止無新者以乾者一大握水七合煎服韋宙獨行方胎死腹中益母草搗熟以暖水少許和絞取汁頓服之韋宙獨行方産後血運心氣欲絶益母草研汁服一盞絶妙子母秘録産後血閉不下者益母草汁一小盞入酒一合温服聖惠方𢃄下赤白益母草花開時采搗為末每服二錢食前温湯下集騐方小便尿血益母草搗汁服一升立瘥此蘇澄方也外臺秘要赤白雜痢困重者益母草日乾陳鹽梅燒存性等分為末每服三錢白痢乾薑湯赤痢甘草湯下名二靈散衛生家寳方小兒疳痢垂死者益母草嫩葉同米煮粥食之取足以瘥為度甚佳飲汁亦可廣利方痔疾下血益母草葉𢷬汁飲之鏡食醫心一切癰瘡婦人妬乳乳癰小兒頭瘡及浸淫黄爛熱瘡疥疽隂蝕並用天麻草切五升以水一斗半煮一斗分數次洗之以殺痒千金急慢疔瘡聖惠方用益母草搗封之仍絞五合服即消小醫方大成用益母草四月連花采之燒存性先以尖刀十字劃開疔根令血出次遶根開破捻出血拭乾以稻草心蘸藥撚入瘡口令到底良久當有紫血出捻令血凈再撚藥入見紅血乃止一日夜撚藥三五度重者二日根爛出輕者一日出有瘡根脹起即是根出以針挑之出後仍傅藥生肌易愈忌風寒房室酒肉一切毒物癤毒已破益母草搗傅甚炒斗門方勒乳成癰益母為末水調塗乳上一宿自瘥生𢷬亦得聖惠方喉閉腫痛益母草𢷬爛新汲水一盌絞濃汁頓飲隨吐愈冬月用根衛生易簡方聤耳出汁茺蔚莖葉汁滴之聖惠方粉刺黒斑閨閣事宜云五月五日収𢃄根天麻紫花者晒乾燒灰以商陸根搗自然汁加酸醋和捜灰作餅炭火煆過収之半年方用入面藥甚能潤肌蘇頌曰唐天后錬益母草澤面法五月五日采根苗具者勿令著土暴乾搗羅以麫水和成團如雞子大再暴乾仍作一爐四旁開竅上下置火安藥中央大火燒一炊久即去大火留小火養之勿令火絶經一伏時出之甆器中研治篩再研三日収用如澡豆法日用一方每十両加滑石一両胭脂一錢馬咬成瘡苦低草切細和醋炒塗之人孫真方新生小兒益母草五兩煎水浴之不生瘡疥簡要濟衆鏨菜音慙拾遺集解藏器曰鏨菜生江南隂地似益母方莖對節白花時珍曰此即益母之白花者乃爾雅所謂蓷是也其紫花者爾雅所謂藬是也蓷藬皆同一音乃一物二種故此條亦主血病與益母功同郭璞獨指白花者為益母昝殷謂白花者非益母皆欠詳審嫩苗可食故謂之菜寇宗奭言茺蔚嫩苖可煮食正合此也苖氣味辛平無毒主治破血産後腹痛煮汁服藏器薇衘薇音眉品本經上釋名糜衘本經鹿衘唐本吳風草唐本無心吳普無顛吴普承膏别録承􅡌吳普恭曰南人謂之吳風草一名鹿銜草言鹿有疾衘此草即瘥也時珍曰據蘇説則薇衘麋衘當作鹿衘也鹿麋一類也按酈道元水經注云魏興錫山多生薇衘草有風不偃無風獨搖則吳風亦當作無風乃通藏器曰一名無心草非草之無心者方藥少用集解别録曰薇衘生漢中川澤及寃句邯鄲七月采莖葉隂乾恭曰此草叢生似茺蔚及白頭翁其葉有毛赤莖又有大小二種楚人謂大者為大吳風草小者為小吳風草保昇曰葉似茺蔚叢生有毛其花黄色其根赤黒色莖葉氣味苦平無毒别錄曰微寒之才曰得秦皮良主治風濕痺厯節痛驚癎吐舌悸氣賊風鼠瘻癰腫本經暴癥逐水療痿躄久服輕身明目别録婦人服之絕産無子藏器煎水洗漂疽甲疽惡瘡時珍出外科精義發明時珍曰麋衘乃素問所用治風病自汗藥而後世不知用之誠缺略也素問黄帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名酒風治之以澤㵼术各三五分麋衘五分合以三指撮為後飯後飯者先服藥也附方新二年深惡瘡無心草根釣苓根狼毒白丁香各五錢麝香一字為末掺之又方無心草根乾薑各二錢釣苓根三錢為末掺之並外科精義小兒破傷風病拘急口禁沒心草半両白附子炮二錢半為末每服一字薄荷酒灌下聖濟錄附錄無心草宋圖經頌曰生秦州及商州鳯翔各縣皆出之三月開花五月結實六七月采根苖隂乾用性温無毒主積血逐氣塊益筋節補虚損潤顔色療澼洩腹痛時珍曰麋衘一名無心草此草功用與之相近其圖形亦相近恐即一物也故附之俟訪攷焉鼠耳草亦名無心與此不同夏枯草本經下品釋名夕句本經乃東本經燕面别錄鐵色草震亨曰此草夏至後即枯盖禀純陽之氣得隂氣則枯故有是名集解别録曰夏枯草生蜀郡川谷四月采恭曰處處有之生平澤冬至後生葉似旋復三月四月開花作穗紫白色似丹參花結子亦作穗五月便枯四月采之時珍曰原野間甚多苖髙一二尺許其莖微方葉對節生似旋復葉而長大有細齒背白多故莖端作穗長一二寸穗中開淡紫小花一穗有細子四粒丹溪云無子亦欠察矣嫩苖瀹過浸去苦味油鹽拌之可食正誤宗奭曰今謂之臭鬱自秋便生經冬不悴春開白花夏結子震亨曰臭鬱草有臭味即茺蔚是也夏枯草無臭味明是両物俱生于春夏枯先枯而無子鬱臭後枯而結子莖葉氣味苦辛寒無毒之才曰土𤓰為之使伏汞砂主治寒熱瘰癧鼠瘻頭瘡破癥散癭結氣脚腫濕痺輕身本經發明震亨曰本草言夏枯草大治瘰􅊓散結氣有補養厥隂血脉之功而不言及觀其退寒熱虚者可使若實者以行散之藥佐之外以艾炙亦漸取效時珍曰黎居士易簡方夏枯草治目疼用沙糖水浸一夜用取其能解内熱緩肝火也樓全善云夏枯草治目珠疼至夜則甚者神效或用苦寒藥㸃之反甚者亦神效盖目珠連目本即係也属厥隂之經夜甚及㸃苦寒藥反甚者夜與寒亦隂故也夏枯禀純陽之氣補厥隂血脉故治此如神以陽治隂也一男子至夜目珠疼連眉稜骨及頭半邉腫痛用黄連膏㸃之反甚諸藥不效炙厥隂少陽疼隨止半日又作月餘以夏枯草二両香附二両甘草四錢為末每服一錢半清茶調服下咽則疼減半至四五服良愈矣附方舊一新六明目補肝肝虚目睛痛冷淚不止血脉痛羞明怕日夏枯草半両香附子一両為末每服一錢臘茶湯調下簡要濟衆赤白𢃄下夏枯草花開時采隂乾為末每服二錢米飲下食前徐氏家傳方血崩不止夏枯草為末每服方寸匕米飲調下聖惠方産後血運心氣欲絶者夏枯草搗絞汁服一琖大妙徐氏家傳方撲傷金瘡夏枯草口嚼爛罟上即愈衛生易簡汗斑白㸃夏枯草煎濃汁日日洗之乾坤生意瘰癧馬刀不問已潰未潰或日久成漏用夏枯草六兩水二鍾煎七分食逺温服虚甚者則煎汁熬膏服并塗患處兼以十全大補湯加香附貝母逺志尤善此物生血乃治瘰癧之聖藥也其草易得其功甚多薛已外科經騐方劉寄奴草唐本草釋名金寄奴大明烏藤菜綱目時珍曰按李延壽南史云宋髙祖劉裕小字寄奴微時伐荻新州遇一大蛇射之明日往聞杵臼聲尋之見童子數人皆青衣于榛林中搗藥問其故答曰我主為劉寄奴所射今合藥傅之裕曰神何不殺之曰寄奴王者不可殺也裕叱之童子皆散乃収藥而反每遇金瘡傅之即愈人因稱此草為劉寄奴草鄭樵通志云江南人因漢時謂劉為卯金刀乃呼劉為金是以又有金寄奴之名江東人謂之烏藤菜云集解恭曰劉寄奴草生江南莖似艾蒿長三四尺葉似山蘭草而尖長一莖直上有穂葉互生其子似稗而細保昇曰今出越州蒿之類也髙四五尺葉似菊其花白色其實黄白色作穗夏月収苖乾之頌曰今河中府孟州漢中滁州亦有之春生苖莖似艾蒿上有四稜髙二三尺以來葉青似柳四月開碎小黄白花形如瓦松七月結實似泰而細根淡紫色似萵苣六月七月采苖及花子通用時珍曰劉寄奴一莖直上葉似蒼术尖長糙澀而深背淡九月莖端分開數枝一枝攅簇十朶小花白瓣黄蕋如小菊花狀花罷有白絮如苦買花之絮其子細長亦如苦買子所云實如黍稗者似與此不同其葉亦非蒿類子苗同修治斆曰凡采得去莖葉只用實以布拭去薄殻令凈拌酒蒸從巳至申暴乾用時珍曰莖葉花子皆可用氣味苦温無毒主治破血下脹多服令人下痢蘇恭下血止痛治産後餘疾止金瘡血極效别録心腹痛下氣水脹血氣通婦人經脉癥結止霍亂水瀉大明小兒尿血新者研末服時珍附方舊一新七大小便血劉寄奴為末茶調空心服二錢即止集簡方折傷瘀血在腹内者劉寄奴骨碎補延胡索各一両水二升煎七合入酒及童子小便各一合頓温服之千金方血氣脹滿劉寄奴穗實為末每服三錢酒煎服不可過多令人吐利此破血之仙藥也衛生易簡方霍亂成痢劉寄奴草煎汁飲聖濟總録湯火傷灼劉寄奴搗末先以糯米漿雞翎掃上後乃摻末並不痛亦無痕大騐之方凡湯火傷先以塩末摻之䕶肉不壞後乃摻藥為妙事本方風入瘡口腫痛劉寄奴為末掺之即止聖惠方小兒夜啼劉寄奴半両地龍炒一分甘草一寸水煎灌少許聖濟總録赤白下痢隂陽交帶不問赤白劉寄奴烏梅白薑等分水煎服赤加梅白加薑艾元英如宜方曲節草宋圗經釋名六月凌音令圖經六月霜綱目綠豆青圗經蛇藍時珍曰此草性寒故有凌霜緑豆之名集解頌曰曲節草生均州四月生苖莖方色青有節葉似劉寄奴而青軟七八月着花似薄荷結子無用五月六月采莖葉隂乾莖葉氣味甘平無毒主治發背瘡消癰腫㧞毒同甘草作末米汁調服蘇頌麗春草宋圗經釋名仙女蒿圗經定參草頌曰麗春草生檀嵎山川谷檀嵎山在髙宻界河南淮陽郡穎川及譙郡汝南郡等並呼為龍羊草河北近山鄴郡汲郡並名叢蘭艾上黨紫團山亦有名定參草又名仙女蒿今所在有之甚療癊黄人莫能知時珍曰此草有殊功而不著其形状今罌粟亦名麗春草九仙子亦名仙女嬌與此同名恐非一物也當俟博訪花及根氣味缺主治癊黄黄疸蘇頌發明頌曰唐天寳中頴川郡楊正進方名醫皆用有效其方云麗春草療因時患傷熱變成癊黄遍身壯熱小便黄赤眼如金色面又青黒心頭氣痛遶心如刺頭旋欲倒兼脇下有瘕氣及黄疸等經用有騐其藥春三月采花隂乾一升搗散每平明空腹取三方寸匕和生麻油一盞頓服日一服隔五日再進以知為度其根療黄疸搗汁一盞空腹頓服須臾即利三両行其疾立已一劑不能全愈隔七日更一劑永瘥忌酒麫猪魚蒜粉酪等旋覆花本經下品釋名金沸草本經金錢花綱目滴滴金綱目盗庚爾雅夏菊綱目戴椹别録宗奭曰花緣繁茂圎而覆下故曰旋覆時珍曰諸名皆因花狀而命也爾雅云蕧盗庚也盖庚者金也謂其夏開黄花盗竊金氣也酉陽雜爼云金錢花一名毘尸沙自梁武帝時始進入中國集解别録曰旋覆生平澤川谷五月采花日乾二十日成𢎞景曰出近道下濕地似菊花而大别有旋葍根出河南北國亦有形似芎藭惟合旋葍膏用之餘無所用非此旋覆花根也保昇曰葉似水蘇黄花如菊六月至九月采花頌曰今所在皆有二月以後生苖多近水旁大似紅藍而無刺長一二尺以來葉似柳莖細六月開花如菊花小銅錢大深黄色上黨田野人呼為金錢花七八月采花今近道人家圈圃所蒔金錢花花葉並同極易繁盛恐即旋覆也宗奭曰旋覆葉如大菊又如艾蒿秋開花大如梧桐子花淡黄色其香過于菊别有旋花乃鼔子花非此花也見本條時珍曰花狀如金錢菊水澤邉生者花小瓣單人家栽者花大蕋簇盖壤瘠使然其根細白俗傳露水滴下即生故易繁盖亦不然花修治斆曰采得花去蕋并殻皮及蒂子蒸之從巳至午㬠乾用氣味鹹温有小毒别録曰甘微温冷利權曰甘無毒大明曰無毒宗奭曰苦甘辛主治結氣脇下滿驚悸除水去五臟間寒熱補中下氣本經消胸上痰結唾如膠漆心胸痰水膀胱留飲風氣濕痺皮間死肉目中眵䁾利大腸通血脉益色澤别録主水腫逐大腹開胃止嘔逆不下食甄權行痰水去頭目風宗奭消堅軟痞治噫氣好古發明頌曰張仲景治傷寒汗下後心下痞堅噫氣不除有七物旋復代赭湯雜治婦人有三物旋復湯胡洽居士治痰飲在兩脇脹滿有旋覆花九用之尤多成無已曰鞭則氣堅旋覆之鹹以軟痞堅也震亨曰寇宗奭言其行痰水去頭目風亦走散之藥病人涉虚者不宜多服冷利大腸宜戒之時珍曰旋覆乃手太隂肺手陽明大腸藥也所治諸病其功只在行水下氣通血脉爾李衛公言嗅其花能損目唐慎微本草誤以旋花根方收附此下今改正之附方舊一新三中風壅滯旋覆花洗浄焙研煉宻丸梧子大夜卧以茶湯下五丸至七丸十丸方經騐半産漏下虚寒相摶其脉弦芤旋覆花湯用旋覆花三両葱十四莖新絳少許水三升煮一升頓服金匱要畧月蝕耳瘡旋覆花燒研羊脂和塗之集簡方小兒眉癬小兒眉毛眼睫因癬退不生用野油化即旋覆花赤箭即天麻苖防風等分為末洗淨以油調塗之論總微葉主治傅金瘡止血大明治疔瘡腫毒時珍根主治風濕别録青葙本經下品釋名草蒿本經萋蒿本經崑崙草唐本野雞冠綱目雞冠莧綱目子名草决明本經時珍曰青葙名義未詳胡麻葉亦名青蘘此草又多生于胡麻地中與之同名豈以其相似而然耶青蒿亦名草蒿其功相似而名亦相同何哉其子明目與决明子同功故有草决明之名其花葉似雞冠嫩苖似莧故謂之雞冠莧鄭樵通志言俗名牛尾蒿者誤集解别録曰青葙生平谷道旁三月采莖葉隂乾五月六月采子𢎞景曰處處有之似麥柵花其子甚細别有草蒿或作草藁主療殊相類形名又相似可疑而實兩種也恭曰此草苖髙尺餘葉細軟花紫白色實作角子黒而扁光似莧實而大生下濕地四月五月荆襄人名為崑崙草頌曰今江淮州郡近道亦有之二月生青苖長三四尺葉濶似栁而軟莖似蒿青紅色六月七月内生花上紅下白子黒光而扁似莨菪根亦似蒿根而白直下獨莖生根六月八月采子時珍曰青葙生田野間嫩苖似莧可食長則髙三四尺苖葉花實與雞冠花一様無别但雞冠花穗或有大而扁或團者此則稍間出花穗尖長四五寸狀如兎尾水紅色亦有黄白色者子在穗中與雞冠子及莧子一様難辨蘇恭言其結角誤矣蕭炳言黄花者名陶珠術與陳藏器所説不同又有天靈草亦此類也並附于下附録桃朱術炳曰青葙一種花黄者名陶朱術苖相似藏器曰桃朱術生園中細如芹花紫子作角以鏡向旁敲之則子自發五月五日乃収子𢃄之令婦人為夫所愛鴈來紅時珍曰莖葉穗子並與雞冠同其葉九月鮮紅望之如花故名吳人呼為老少年一種六月葉紅者名十様錦天靈草時珍曰按土宿真君本草云狀如雞冠花葉亦如之折之有液如乳生江湖荆南陂池間五月取汁可制雄硫煮雌煉砂思蓂子斆曰思蓂子鼠細子二件真似青葙子只是味不同思蓂子味苦煎之有涎莖葉修治斆曰凡用先燒鐵杵臼乃𢷬用之氣味苦微寒無毒主治邪氣皮膚中熱風瘙身癢殺三蟲本經惡瘡疥􅀢痔蝕下部䘌瘡别録𢷬汁服大療温癘蘇恭止金瘡血大明子氣味苦微寒無毒權曰苦平主治唇口青本經治五臟邪氣益腦髓鎮肝明耳目堅筋骨去風寒濕痺大明治肝臟熱毒衝眼赤障青盲翳腫惡瘡疥瘡甄權發明炳曰理眼有青葙子丸宗奭曰青葙子經中不言治眼惟藥性論日華子始言治肝明目今人多用治眼殊與經意不相當時珍曰青葙子治眼與决明子莧實同功本經雖不言治眼而云一名草决明主唇口青則其明目之功可知矣目者肝之竅唇口青者足厥隂經之證古方除熱亦多用之青葙子之為厥隂藥又可知矣况用之治目往往有騐尤可徴據魏畧云初平中有青牛先生常服青葙子丸年百餘嵗如五六十者附方舊一鼻衂不止眩冐欲死青葙子汁三合灌入鼻中貞元廣利方雞冠宋嘉祐釋名時珍曰以花狀命名集解時珍曰雞冠處處有之三月生苖入夏髙者五六尺矬者纔數寸其葉青柔頗似白莧菜而窄􅕏有赤脉其莖赤色或圓或扁有筋起六七月稍間開花有紅白黄三色其穗圓長而尖者儼如青葙之穂扁卷而平者儼如雄雞之冠花大有圍一二尺者層層卷出可愛子在穗中黒細光滑與莧實一様其穗如秕麥狀花最耐久霜後始焦苗氣味甘凉無毒主治瘡痔及血病時珍子氣味甘凉無毒主治止腸風瀉血赤白痢藏器崩中𢃄下入藥炒用大明花氣味同上主治痔漏下血赤白下痢崩中赤白𢃄下分赤白用時珍附方新十吐血不止白雞冠花醋浸煮七次為末每服二錢熱酒下經騐方結隂便血雞冠花椿根白皮等分為末煉蜜丸梧子大每服三十丸黄茋湯下日二服聖濟總録糞後下血白雞冠花并子炒煎服聖惠方五痔肛腫久不愈變成瘻瘡用雞冠花鳯眼草各一兩水二盌煎湯頻洗衛生寳鑑下血脱肛白雞冠花防風等分為末糊丸梧子大空心米飲每服七十丸一方白雞冠花炒㯶櫚灰𦍑活一兩為末每服二錢米飲下永類鈐方經水不止紅雞冠花一味晒乾為末每服二錢空心酒調下忌魚腥猪肉孫氏集效方産後血痛白雞冠花酒煎服之李樓竒方婦人白𢃄白雞冠花晒乾為末每旦空心酒服三錢赤𢃄用紅者孫氏集效方白𢃄沙淋白雞冠花苦壼蘆等分燒存性空心火酒服之摘𤣥赤白下痢雞冠花煎酒服赤用紅白用白集簡方紅藍花宋開寳釋名紅花開寳黄藍頌曰其花紅色葉頗似藍故有藍名集解志曰紅藍花即紅花也生梁漢及西域博物志云張騫得種于西域今魏地亦種之頌曰今處處有之人家塲圃所種冬月布子于熟地至春生苖夏乃有花花下作梂彚多刺花出梂上圃人乗露采之采已復出至盡而罷梂中結實白顆如小豆大其花暴乾以染真紅又作胭脂特珍曰紅花二月八月十二月皆可以下種雨後布子如種麻法初生嫩葉苖亦可食其葉如小薊葉至五月開花如大薊花而紅色侵晨采花搗熟以水淘布袋絞去黄汁又搗以酸粟米泔清又淘又絞袋去汁以青蒿覆一宿晒乾或揑成薄餅隂乾収之入藥搓碎用其子五月収采淘淨搗碎煎汁入醋拌蔬食極肥美又可為車脂及燭花氣味辛温無毒元素曰入心養血謂其苦温隂中之陽故入心佐當歸生新血好古曰辛而甘苦温肝經血分藥也入酒良主治産後血運口噤腹内􅁖血不盡絞痛胎死腹中並酒煮服亦主蠱毒開寳多用破留血少用養血震亨活血潤燥止痛散腫通經時珍發明時珍曰血生于心包藏于肝属于衝任紅花汁與之同類故能行男子血脉通女子經水多則行血少則養血按養疴慢筆云新昌徐氏婦病産運已死但胸膈微熱有名醫陸氏曰血悶也得紅花數十斤乃可活遂亟購得以大鍋煮湯盛三桶于窻格之下舁婦寢其上熏之湯冷再加有頃指動半日乃蘇按此亦得唐許𦙍宗以黄茋湯熏栁太后風病之法也附方舊五新三六十二種風張仲景治六十二種風兼腹内血氣痛用紅花一大兩分為四分以酒一大升煎鍾半頓服之不止再服圖經本草一切腫疾紅花熟搗取汁服不過三服便瘥外臺秘要喉痺壅塞不通者紅藍花搗絞取汁一小升服之以瘥為度如冬月無生花以乾者浸濕絞汁煎服極騐廣利方熱病胎死紅花酒煮汁飲二三盞熊氏補遺胎衣不下方同上乳楊氏産産後血運心悶氣絕紅花一兩為末分作二服酒二盞煎一盞連服如口噤斡開灌之或入小便尤妙子母録聤耳出水紅藍花三錢半枯礬五錢為末以綿杖繳凈吹之無花則用枝葉一方去􅈨聖惠方噎膈拒食端午采頭次紅花無灰酒拌焙乾血竭𤓰子様者等分為末無灰酒一盞隔湯頓熱徐嚥初服二分次日四分三日五分簡楊起便方子主治天行瘡痘水吞數顆開寳功與花同蘇頌附方舊三新一血氣刺痛紅藍子一升搗碎以無灰酒一大升拌子暴乾重搗篩蜜丸梧子大空心酒下四十丸張仲景方瘡疽不出紅花子紫草茸各半兩蟬蛻二錢半水酒鍾半煎减半量大小加减服龎安常傷寒論女子中風血熱煩渴以紅藍子五合熬搗旦日取半大匙以水一升煎取七合去渣細細嚥之貞元廣利方苗主治生搗塗遊腫開寳畨紅花綱目釋名洎夫藍綱目撒法卽集解時珍曰畨紅花出西畨囘囘地面及天方國即彼地紅藍花也元時以入食饌用按張華博物志言張騫得紅藍花種于西域則此即一種或方域地氣稍有異耳氣味甘平無毒主治心憂鬱積氣悶不散活血久服令人心喜又治驚悸時珍附方新一傷寒發狂驚怖恍惚用撒法即二分水一盞浸一宿服之天方國人所傳玉璽醫林集要燕脂綱目釋名􅭤赦時珍曰按伏候中華古今注云燕脂起自紂以紅藍花汁凝作之調脂飾女面産于燕地故名燕脂或作􅭤赦匈奴人名妻為閼氐音同燕脂謂其顔色可愛如燕脂也俗作臙肢胭支者並謬也集解時珍曰燕脂有四種一種以紅藍花汁染胡粉而成乃蘇鶚演義所謂燕脂葉似薊花似蒲出西方中國謂之紅藍以染粉為婦人面色者也一種以山燕脂花汁染粉而成乃叚公路比戸録所謂端州山間有花叢生葉類藍正月開花似蓼土人采含苞者為燕脂粉亦可染帛如紅藍者也一種以山榴花汁作成者鄭䖍胡木草中載之一種以紫􅑭染綿而成者謂之胡燕脂李珣南海藥譜載之今南人多用紫􅑭燕脂俗呼紫梗是也大抵皆可入血病藥用又落葵子亦可取汁和粉助面亦謂之胡燕脂見菜部氣味甘平無毒主治小兒聤耳浸汁滴之開寳活血解痘毒時珍附方新五乳頭裂破燕脂蛤粉為末傅之危氏得效方嬰孩鵝口白厚如紙用坏子燕脂以乳汁調塗之一宿效男用女乳女用男乳集簡方漏瘡腫痛猪膽七箇綿燕脂十箇洗水和勻搽七次即可救急方防痘入目臙脂嚼汁㸃之集簡方痘瘡倒䧟乾燕脂三錢胡桃燒存性一箇研末用胡荽煎酒服一錢再服取效救急方大薊小薊别録中品釋名虎薊𢎞景馬薊范汪貓薊𢎞景刺薊日華山牛蒡日華雞項草圖經千針草圖經野紅花綱目𢎞景曰大薊是虎薊小薊是貓薊葉並多刺相似田野甚多方藥少用時珍曰薊猶髻也其花如髻也曰虎曰貓因其苖狀猙獰也曰馬者大也牛蒡因其根似牛蒡根也雞項因其莖似雞之項也千針紅花皆其花狀也鄭樵通志謂爾雅之蘩曰狗毒者即此未知是否藏器曰薊門以多薊得名當以北方者為勝也集解别録曰大小薊五月采恭曰大小薊葉雖相似功力有殊大薊生山谷根療癰腫小薊生平澤不能消腫而俱能破血頌曰小薊處處有之俗名青刺薊二月生苗二三寸時併根作菜茹食甚羙四月髙尺餘多刺心中出花頭如紅藍花而青紫色北人呼為千針草四月采苗九月采根並隂乾用大薊苗根與此相似但肥大爾宗奭曰大小薊皆相似花如髻但大薊髙三四尺葉皺小薊髙一尺許葉不皺以此為異作菜雖有微芒不害人大薊根葉同氣味甘温無毒𢎞景曰有毒權曰苦平大明曰葉凉主治女子赤白沃安胎止吐血鼻衂令人肥徤别録𢷬根絞汁服半升主崩中血下立瘥甄權葉治腸癰腹臟瘀血作運撲損生研酒并小便任服又惡瘡疥癬同鹽研罯之大明小薊根苗同氣味甘温無毒大明曰凉主治養精保血别録破宿血生新血暴下血血崩金瘡出血嘔血等絞取汁温服作煎和糖合金瘡及蜘蛛蛇蠍毒服之亦佳藏器治熱毒風并胸膈煩悶開胃下食退熱補虚損苖去煩熱生研汁服並大明作菜食除風熱夏月熱煩不止𢷬汁半升服立瘥孟詵發明大明曰小薊力㣲只可退熱不似大薊能徤養下氣也恭曰大小薊皆能破血但大薊兼療癰腫而小薊專主血不能消腫也附方舊五新九心熱吐血口乾用刺薊葉及搗根絞取汁每頓服二小盞聖惠方舌硬出血不止刺薊搗汁和酒服乾者為末冷水服普濟丸九竅出血方同上簡要濟衆卒瀉鮮血小薊葉搗汁温服一升梅師方崩中下血大小薊根一升酒一斗漬五宿任飲亦可酒煎服或生搗汁温服白又方小薊莖葉洗切研汁一盞入生地黄汁一盞术半両煎减半温服千金方墮胎下血小薊根葉益母草五両水二大盌煮汁一盌再煎至一盞分二服一日服盡聖濟總録金瘡出血不止小薊苖𢷬爛塗之孟詵食療本草小便熱淋馬薊根搗汁服聖惠方鼻塞不通小薊一把水二升煮取一升分服外臺秘要方小兒浸淫瘡痛不可忍發寒熱者刺薊葉新水調傅瘡上乾即易之簡要濟衆方癬瘡作痒刺薊葉搗汁服之千金方婦人隂痒小薊煮湯日洗三次廣濟方諸瘻不合虎薊根貓薊根酸棗根枳根杜衡各一把斑蝥三分炒為末蜜丸棗大日一服并以小丸納瘡中肘后方丁瘡惡腫千針草四両乳香一両明􅈨五錢為末酒服二錢出汗為度普濟方續斷本經上品釋名属折本經接骨别録龍豆别録南草時珍曰續斷屬折接骨皆以功命名也集解别録曰續斷生常山山谷七月八月采隂乾普曰出梁州七月七日采𢎞景曰按桐君藥録云續斷生蔓延葉細莖如荏大根本黄白有汁七月八月采根今皆用莖葉節節斷皮黄皺狀如雞脚者又呼為桑上寄生時人又有接骨樹髙丈餘許葉似蒴藋皮主金瘡廣州又有續斷藤一名諸藤斷其莖以器承取汁飲療虚損絶傷用沐頭長髪折枝挿地即生恐皆非真李當之云是虎薊與此大􅆾但虎薊亦療血恭曰所在山谷皆有今俗用者葉似苧而莖方根如大薊黄白色陶説非也頌曰今陜西河中興元舒越晉絳諸州亦有之三月以後生苖榦四稜似苧蔴葉兩兩相對而生四月開花紅白色似益母花根如大薊赤黄色謹按范汪方云續斷即是馬薊與小薊葉相似但大于小薊爾葉似旁翁菜而小厚兩邉有刺刺人其花紫色與今越州所圗者相類而市之貨者亦有數種少能辨其粗良醫人但以節節斷皮黄皺者為真斆曰凡使勿用草茅根緣真相似若誤服令人筋軟時珍曰續斷之説不一桐君言是蔓生葉似荏李當之范汪並言是虎薊日華子言是大薊一名山牛蒡蘇恭蘇頌皆言葉似苧麻根似大薊而名醫别録復出大小薊條頗難依據但自漢以來皆以大薊為續斷相承久矣究其實則二蘇所云似與桐君相符當以為正今人所用以州中來色赤而瘦折之有烟塵起者為良焉鄭樵通志謂范汪所説者乃南續斷不知何據盖以别川續斷耳根修治斆曰凡采得根横切剉之又去向裏硬筋以酒浸一伏時焙乾入藥用氣味苦微温無毒别録曰辛普曰神農雷公黄帝李當之苦無毒扁鵲辛無毒之才曰地黄為之使惡雷丸主治傷寒補不足金瘡癰瘍折跌續筋骨婦人乳難久服益氣力本經婦人崩中漏血金瘡血内漏止痛生􅡌肉及踠傷惡血腰痛闗節緩急别録去諸温毒通宣血脉甄權助氣補五勞七傷破癥結瘀血消腫毒腸風痔瘻乳癰瘰癧婦人産前後一切病胎漏子宫冷面黄虚腫縮小便止泄精尿血大明發明時珍曰宋張叔潜秘書知劒州時其閣下病血痢一醫用平胃散一両入川續斷末二錢半每服二錢水煎服即愈紹興壬子㑹稽時行痢疾叔潜之子以方傳人往往有騐小兒痢服之效附方舊二新二小便淋瀝生續斷搗絞汁服即馬薊根也初虞氏古今録騐妊娠胎動両三月墮預宜服此川續㫁酒浸杜仲薑汁炒去絲各二両為末棗肉煮爛杵和丸梧子大每服三十丸米飲下産後諸疾血運心悶煩熱厭厭氣欲絶心頭硬乍寒乍熱續㫁皮一握水三升煎二升分三服如人行一里再服無所忌此藥救産後垂死子母秘録打撲傷損閃肭骨接用節骨草葉搗爛罨之立效衛生易簡方苦芺音襖品别録下釋名鉤芺爾雅苦板時珍曰凡物樨曰芺此物嫩時可食故以名之集解𢎞景曰苦芺處處有之傖人取莖生食之保昇曰所在下濕地有之莖圓無刺可生噉子若貓薊五月五日采苖暴乾恭曰今人以為漏蘆非也時珍曰爾雅鉤芺即此苦芺也笑大如拇指中空莖頭有薹似薊初生可食許慎説文言江南人食之下氣今浙東人清明節采其嫩苖食之云一年不生瘡疥亦搗汁和米為食其色青久留不敗造化指南云苦芺大者名苦藉葉如地黄味苦初生有白毛入夏抽莖有毛開白花甚繁結細實其無花實者名地膽草汁苦如膽也處處濕地有之入爐火家用苖氣味苦微寒無毒主治面目通身漆瘡燒灰傅之亦可生食别録燒灰療金瘡極騐𢎞景治丹毒大明煎湯洗痔甚騐汪頴下氣解熱時珍漏盧本經上品釋名野蘭本經莢蒿蘇恭鬼油麻日華時珍曰屋之西北黒處謂之漏凡物黒色謂之盧此草秋後即黒異于衆草故有漏盧之稱唐韻作􅀢其莢如麻故俗呼為鬼油麻云集解别録曰漏盧生喬山山谷八月采根隂乾𢎞景曰喬山應是黄帝所塟處乃在上郡及出近道市人取苗用之俗中取根名鹿驪根苦酒摩以療瘡疥恭曰此藥俗名莢蒿莖葉似白蒿花黄生莢長似細麻之莢大如筯許有四五瓣七八月後皆黒異于衆草蒿之類也常用其莖葉及子未見用根其鹿驪山南謂之木黎蘆有毒非漏盧也今人以馬薊似苦芺者為漏盧亦非也志曰别本言漏盧莖大如筯髙四五尺子房似油麻房而小江東人取其苗用勝于根江寜及上黨者佳陶云鹿驪蘇云木黎蘆亦非也漏盧自别藏器曰南人用苖北土用根乃樹生如茱茰樹髙二三尺有毒殺蠱山人以洗瘡疥保昇曰葉似角蒿今曹兖州下濕處最多六月七月采莖日乾黑于衆草大明曰花苗並可用形并氣味似乾牛蒡頭上有白花子頌曰今汴東州郡及奉海州皆有之舊説莖葉似白蒿花黄白莢莖若筯大房類油麻而小今諸郡所圖上惟單州者差相類沂州者花葉頗似牡丹秦州者花似單葉寒菊紫色五七枝同一幹海州者花紫碧如單葉蓮花花蕚下及根旁有白茸裹之根如蔓青而細又類葱本黒色淮甸人呼為老翁花三州所生花雖别而葉頗相類但秦海州者葉更作鉅齒狀一物而殊類如此醫家何所適從當依舊説似單州出者為勝又本草飛亷一名漏盧云與苦芺相類其根生則肉白皮黒乾則黒如𤣥参七八月采花隂乾用所説與秦州海州所圖漏盧花葉及根頗相近然彼人但名漏盧不曰飛亷也斆曰一種真似漏盧只是味苦酸誤服令人吐不止時珍曰按沈存中筆談云今方家所用漏盧乃飛亷也飛亷一名漏盧苖似苦芺根如牛蒡綿頭者是也采時用根今閩中所謂漏盧莖如油麻髙六七尺秋深枯黒如漆采時用苖乃真漏盧也餘見飛亷下根苖修治斆曰凡采得漏盧細剉以生甘草相對拌蒸之從巳至申㨂出晒乾用氣味鹹寒無毒别録曰大寒藏器曰有毒杲曰無毒足陽明本經藥也之才曰連翹為之使主治皮膚熱毒惡瘡疽痔濕痺下乳汁久服輕身益氣耳目聰明不老延年本經止遺溺熱氣瘡痒如麻豆可作浴湯别録通小膓泄精尿血腸風風赤眼小兒壯熱撲損續筋骨乳癰瘰癧金瘡止血排膿補血長肉通經脉大明發明𢎞景曰此藥久服甚益人而服食方罕見用之近道出者惟療瘻疥耳市人皆取苖用時珍曰漏盧下乳汁消熱毒排膿止血生肌殺蟲故東垣以為手足陽明藥而古方治癰疽發背以漏盧湯為首稱也龎安常傷寒論治癰疽及預解時行痘疹熱用漏盧葉云無則以山巵子代之亦取其寒能解熱盖不知其能入陽明之故也附方舊二新六腹中蚘蟲漏盧為末以餅臛和方寸匕服之外臺秘要小兒無辜疳病肚脹或時泄痢冷熱不調以漏盧一両杵為散每服一錢以猪肝一両入塩少許白煮熟空心頓食之聖惠方冷勞泄痢漏盧一両艾葉炒四両為末米醋三升入藥末一半同熬成膏入後末和丸梧子大每温水下三十九聖濟總録産後𢃄下方同上乳汁不下乃氣脉壅塞也又治經絡凝滯乳内脹痛邪畜成癰服之自然内消漏盧二両半蛇退十條炙焦𤓰蔞十个燒存性為末每服二錢温酒調下良久以熱羮湯投之以通為度和劑方厯節風痛筋脉拘攣古聖散用漏盧麩炒半両地龍去土炒半両為末生薑二両取汁入蜜三両同煎三五沸入好酒五合盛之每以二盃調水一錢温服聖濟總録一切癰疽發背初發二日但有熱證便宜服漏盧湯退毒下膿乃是宣熱㧞毒之劑熱退即住服漏盧用有白茸者連翹生黄茋沉香各一両生粉草半両大黄微炒一両為細末每服二錢姜棗湯調下李迅癰疽集驗方白秃頭瘡五月収漏盧草燒灰猪膏和塗之聖濟總録飛亷本經上品釋名漏蘆别録木禾别録飛雉同上飛輕同伏兎同伏豬同天薺同時珍曰飛亷神禽之名也其狀鹿身豹文雀頭蛇尾有角能致風氣此草附莖有皮如箭羽復療風邪故有飛亷飛雉飛輕諸名集解别録曰飛亷生河内川澤正月采根七月八月采花隂乾𢎞景曰處處有之極似苦芺惟葉多刻缺葉下附莖輕有皮起似箭羽其花紫色俗方殆無用而道家服其枝莖可得長生又入神枕方今既别有漏蘆則此漏蘆乃别名爾恭曰此有兩種一種生平澤中是陶氏所説者一種生山岡上者葉頗相似而無刻缺且多毛其莖赤無羽其根直下更無旁枝生則肉白皮黒中有黒脉日乾則黒如𤣥參用莖葉及根療疳蝕殺蟲與平澤者俱有騐今俗以馬薊似苦芺者為漏蘆並非是也保昇曰葉似苦芺莖似軟羽花紫色子毛白所在平澤皆有五月六月采日乾斆曰凡使勿用赤脂蔓與飛亷形狀相似只赤脂蔓見酒則色便如血以此可表識之頌曰今秦州所圖漏蘆花似單葉寒菊紫色五七枝同一幹海州所圖漏蘆花紫碧色如單葉蓮花花蕚下及根旁有白茸裹之根黒色如蔓菁而細又類䓤本與陶蘇所説飛亷相近然彼但謂之漏蘆今醫家罕有用飛亷者不能的識時珍曰飛亷亦蒿類也蘇頌圗經疑海州所圖之漏蘆是飛亷沈存中筆談亦言飛亷根如牛蒡而綿頭古方漏蘆散下云用有白茸者則是有白茸者乃飛亷無疑矣今考二物氣味功用俱不相逺似可通用豈或一類有數種而古今名稱各處不同乎根及花修治斆曰凡用根先刮去粗皮杵細以苦酒伴一夜漉出日乾細杵用氣味苦平無毒權曰苦鹹有毒之才曰得烏頭良忌麻黄主治骨節熱脛重酸疼久服令人身輕本經頭眩頂重皮間邪風如蜂螫針刺魚子細起熱瘡癰疽痔濕痺止風邪欬𠻳下乳汁久服益氣明目不老可煮可乾用别録主留血療疳蝕殺蟲蘇恭小兒疳痢為散水漿服大效蕭炳治頭風旋運時珍發明時珍曰葛洪抱朴子書言飛亷單服可輕身延年又言服飛亷煎可逺涉疾行力數倍于常本經别録所列亦是良藥而後人不知用何哉附方舊一疳䘌蝕口及下部用飛亷蒿燒灰搗篩以両錢七著痛處其痛則忍之若不痛非疳也下部蟲如馬尾大相纒出無數十日瘥二十日平復千金翼方苧麻别録下品釋名時珍曰苧麻作紵可以積紵故謂之紵凡麻絲之細者為絟粗者為紵陶𢎞景云苧即今績苧麻是也麻字從广從林音𣲖象屋下林麻之形广音掩集解頌曰苧麻舊不著所出州土今閩蜀江浙多有之剝其皮可以績布苗髙七八尺葉如楮葉而無乂面青背白有短毛夏秋間着細穂青花其根黄白而輕虛二月八月采按陸璣草木疏云苧一科數十莖宿根在土中至春自生不須栽種荆揚間歳三刈諸園種之歳再刈便剥取其皮以竹刮其表厚處自脱得裏如筋者煮之用緝布今江浙閩中尚復如此宗奭曰苧如蕁麻花如白楊而長成穗每一朶凡數十穗青白色時珍曰苧家苧也又有山苧野苧也有紫苧葉面紫白苧葉面青其背皆白可刮洗煮食救荒味甘美其子茶褐色九月収之二月可種宿根亦自生根氣味甘寒無毒權曰甘平大明曰甘滑冷無毒主治安胎貼熱丹毒别録治心膈熱漏胎下血産前後心煩天行熱疾大渴大狂服金石藥人心熱罯毒箭蛇蟲咬大明漚苧汁止消渴别録發明震亨曰苧根大能補隂而行滯血方藥或惡其賤似未曽用也藏器曰苧性破血將苧麻與産婦枕之止血運産後腹痛以苧安腹上即止也又蠶咬人毒入肉取苧汁飲之今人以子近蠶種則蠶不生是矣附方舊四新七痰哮欬𠻳苧根煆存性為末生豆腐蘸三五錢食即效未全可以肥猪肉二三片蘸食甚妙醫學正傳小便不通聖惠方用麻根蛤粉半両為末每服二錢空心新汲水下貼摘𤣥方用苧根洗研攤絹上少腹連隂際須臾即通小便血淋苧根煎湯頻服大妙亦治諸淋聖惠方五種淋疾苧麻根両莖打碎用水一盌半煎半盌頓服即通大妙斗門方姙娠胎動忽下黄汁如膠或如小豆汁腹痛不可忍者苧根去黒皮切二升銀一斤水九升煮四升每服以水一升入酒半升煎一升分作二服一方不用銀梅師方肛門腫痛生苧根搗爛坐之良瀕湖集簡方脱肛不收苧根搗爛煎湯熏洗之聖恵方癰疽發背初起未成者苧根熟搗傳上日夜數易腫消則瘥圖經本草五色丹毒苧根煮濃汁日三浴之秘外臺要雞魚骨哽談野翁試騐方用苧麻根搗汁以匙挑灌之立效醫方大成用野苧麻根搗碎丸如龍眼大魚骨魚湯下雞骨雞湯下葉氣味同根主治金瘡傷折血出瘀血時珍發明時珍曰苧麻葉甚散血五月五日収取和石灰搗作團晒乾収貯遇有金瘡折損者研末傅之即時血止且易痂也按李仲南永類方云凡諸傷瘀血不散者五六月収野苧葉蘇葉擂爛傅金瘡上如瘀血在腹内順流水絞汁服即通血皆化水以生猪血試之可騐也秋冬用乾葉亦可附方新三驟然水瀉日夜不止欲死不拘男婦用五月五日采麻葉隂乾為末每服二錢冷水調下勿喫熱物令人悶倒只喫冷物小兒半錢楊子建䕶命方冷痢白凍方同上蛇虺咬傷青麻嫩頭搗汁和酒等分服三盞以渣傅之毒從竅中出以渣棄水中即不發㸔傷䖏有竅是雄蛇無竅是雌蛇以針挑破傷處成竅傅藥摘𤣥方􅔾麻􅔾音項唐本草釋名白麻時珍曰􅔾一作䔛又作檾種必連頃故謂之䔛也集解恭曰􅔾即䔛麻也今人取皮作布及索者實似大麻子九月十月采隂乾頌曰處處有之北人種以績布及打䋲索苗髙四五尺或六七尺葉似苧而薄花黄實殻如蜀葵其中子黒色時珍曰􅔾麻今之白麻也多生卑濕䖏人亦種之葉大似桐葉團而有尖六七月開黄花結實如半磨形有齒嫩青老黒中子扁黒狀如黄葵子其莖輕虚潔白北人取皮作麻以莖蘸硫黄作焠燈引火甚速其嫩子小兒亦食之實氣味苦平無毒主治赤白冷熱痢炒研為末每蜜湯服一錢癰腫無頭者吞一枚蘇恭生眼翳瘀肉起倒睫拳毛時珍根主治亦治痢古方用之蘇頌附方新一一切眼疾􅔾麻子一升為末以豶猪肝批片蘸末炙熟再蘸再炙末盡乃為末每服一字陳米飲下日三服聖濟總録目生翳膜久不愈者用檾實以栁木作磑磨去殻馬尾篩取黄肉去焦殻每十両可得四両非此法不能去殻也用猪肝薄切滚藥慢炙熟為末醋和丸梧子大每服三十丸白湯下一方以檾實内袋中蒸熟暴為末蜜丸温水下聖濟總録大青别録中品釋名時珍曰其莖葉皆深青故名集解别録曰大青三四月采莖隂乾𢎞景曰今出東境及邉道紫莖長尺許莖葉皆用頌曰今江東州郡及荆南眉蜀濠諸州皆有之春生青紫莖似石竹苗葉花紅紫色似馬蓼亦似芫花根黄三月四月采莖葉隂乾用時珍曰處處有之髙二三尺莖圓葉長三四寸面青背淡對節而生八月開小花紅色成簇結青實大如椒顆九月色赤莖葉氣味苦大寒無毒權曰甘時珍曰甘微鹹不苦主治時氣頭痛大熱口瘡别録除時行熱毒甚良𢎞景治温疫寒熱甄權治熱毒風心煩悶渴疾口乾小兒身熱疾風􅇙及金石藥毒塗罯腫毒大明主熱毒痢黄疸喉痺丹毒時珍發明頌曰古方治傷寒黄汗黄疸等有大青湯又治傷寒頭身强腰脊痛葛根湯内亦用大青大抵時疾多用之時珍曰大青氣寒味微苦鹹能解心胃熱毒不特治傷寒也朱肱活人書治傷寒發赤斑煩痛有犀角大青湯大青四物湯故李象先指掌賦云陽毒則狂斑煩亂以大青升麻可回困篤附方新五喉風喉痺大青葉搗汁灌之取效止衛生易簡方小兒口瘡大青十八銖黄連十二銖水三升煮一升服一日二服以瘥為度千金方熱病下痢困篤者大青湯用大青四両甘草赤石脂三両膠二両䜴八合水一斗煮三升分三服不過二劑瘥肘后方熱病發斑赤色煩痛大青四物湯用大青一両阿膠甘草各二錢半豉二合分三服每用水一盞半煎一盞入膠烊化服十又犀角大青湯用大青七錢半犀角二錢半梔子枚豉二撮分二服每服水一盞半煎八分温服南陽活人書肚皮青黑小兒卒然肚皮青黒乃血氣失養風寒乗之危惡之候也大青為末納口中以酒送下保㓜大全方小青宋圖經集解頌曰小青生福州三月生花彼土人當月采葉用之葉氣味缺主治生𢷬傅癰腫瘡􅂒甚效蘇頌治血痢腹痛研汁服解蛇毒時珍附方新二蛇虺螫傷衛生易簡方用小青一握細研入香白芷半両酒調服手挼患處候黄水出為效汁摘𤣥方用小青大青牛膝葉同搗和酒服以渣傅之中暑發昬小青葉井水浸去泥控乾入沙糖擂汁急灌之夀域方胡盧巴宋嘉祐釋名苦豆集解禹錫曰胡盧巴出廣州并黔州春生苖夏結子子作細莢至秋采今人多用嶺南者或云是畨蘿蔔子未審的否頌曰今出廣州或云種出海南諸畨盖其國蘆菔子也舶客将種蒔于嶺外亦生然不及畨中來者真好今醫家治元臟虚冷為要藥而唐已前方不見用本草不著盖是近出修治時珍曰凡入藥淘凈以酒浸一宿晒乾蒸熟或炒過用氣味苦大温無毒杲曰純陽主治元臟虚冷氣得附子硫黄治腎虚冷腹脇脹滿面色青黒得蘹香子桃仁治膀胱氣甚效嘉祐治冷氣疝瘕寒濕脚氣益右腎暖丹田時珍發明宗奭曰膀胱氣用此合桃仁麩炒等分為末半為散半以酒糊和丸梧子大每服五七十丸空心鹽酒下其散以熱米飲下與丸子相間空心服日各一二服時珍曰胡盧巴右腎命門藥也元陽不足冷氣􅇓伏不能歸元者宜之宋惠民和劑局方有胡盧巴丸治大人小兒小腸奔豚偏墜及小腹有形如卵上下走痛不可忍者用胡盧巴八錢茴香六錢巴㦸去心川烏頭炮去皮各二錢楝實去核四錢吴茱茰五錢並炒為末酒糊丸梧子大每服十五丸小兒五丸塩酒下太醫薛已云一人病寒疝隂囊腫痛服五苓諸藥不效與此而平也又張子和儒門事親云有人病目不覩思食苦豆即胡盧巴頻頻不缺不周歳而目中微如蟲行入眥漸明而愈按此亦因其益命門之功所謂益火之原以消隂翳是也附方新六小膓氣痛胡盧巴炒研末每服二錢茴香酒下直指方腎臟虛冷腹脇脹滿胡盧巴炒二両熟附子硫黄各七錢五分為末酒煮麴糊丸梧桐子大每鹽湯下三四十丸聖濟總録冷氣疝瘕胡盧巴酒浸晒乾蕎麥炒研麫各四両小茴香一両為末酒糊丸梧子大每服五十丸空心塩湯或塩酒下服至両月大後出白膿則除根方廣心法附餘隂㿗腫痛偏墜或小膓疝氣下元虚冷久不愈者沉香内消丸主之沉香木香各半両胡盧巴酒浸炒小茴香炒各二両為末酒糊丸梧子大每服五七十丸塩酒下氣攻頭痛胡盧巴炒三稜酒浸焙各半両乾薑炮二錢半為末薑湯或温酒每服二錢濟生方寒濕脚氣腿膝疼痛行步無力胡盧巴酒浸一宿焙破故紙炒香各四両為末以木𤓰切頂去瓤安藥在内令滿用頂合住簽定爛蒸搗丸梧子大每服七十丸空心温酒下楊氏家藏方蠡實本經中品釋名荔實别録馬藺子唐本馬楝子圖經馬薤禮記注馬帚爾雅鐵掃帚救荒劇草本經旱蒲禮記豕首本經三堅𢎞景曰方藥不用俗無識者惟天名精亦名豕首恭曰此即馬藺子也月令仲冬荔挺出鄭𤣥注云荔馬薤也通俗文云一名馬藺本草謂之荔實頌曰馬藺子北人訛為馬楝子廣雅云馬薤荔也髙誘云荔挺出荔草挺出也講禮者不識呼為荔挺又作馬莧並誤矣馬莧亦名豚耳即馬齒也時珍曰爾雅云茾音瓶馬帚也此即荔草謂其可為馬刷故名今河南北人呼為鐵掃帚是矣集解别録曰蠡實生河東川谷五月采實隂乾頌曰今陜西諸郡及鼎澧州亦有之近汴尤多葉似薤而長厚三月開紫碧花五月結實作角子如麻大而赤色有稜根細長通黄色人取以為刷三月開花五月采實並隂乾用許慎説文云荔似蒲而小根可為刷髙誘云河北平澤率生之江東頗多種于階庭但呼為旱蒲不知即馬薤也時珍曰蠡草生荒野中就地叢生一本三二十莖苖髙三四尺葉中抽莖開花結實正誤宗奭曰蠡實陶𨼆居言方藥不用俗無識者本草諸家所注不相應若果是馬藺則日華子本草不當更言可為蔬菜盖馬藺葉出土已硬又無味馬牛皆不食豈堪人食今不敢以蠡實為馬藺更俟博識時珍曰别録蠡實亦名荔實則蠡乃荔字之訛也張揖廣雅云荔又名馬藺其説已明又按周憲王救荒本草言其嫩苗味苦􅨘熟換水浸去苦味油塩調食則馬藺亦可作菜矣冦氏但據陶説疑之欠考矣陶氏不識之藥多矣今正其誤實修治時珍曰凡入藥炒過用治疝則以醋拌炒之氣味甘平無毒保昇曰寒頌曰山人服之云大温甚有竒效主治皮膚寒熱胃中熱氣風寒濕痺堅筋骨令人嗜食久服輕身本經止心煩滿利大小便長肌膚肥大别録療金瘡血内流癰腫有效蘇恭婦人血氣煩悶産後血運并經脉不止崩中𢃄下消一切瘡癤止鼻衂吐血通小腸消酒毒治黄病殺蕈毒傅蛇蟲咬大明治小腹疝痛腹内冷積水痢諸病時珍附方舊一新六諸冷極病醫所不治者馬藺子九升洗凈空腹服一合酒下日三服千金方寒疝諸疾寒疝不能食及腹内一切諸疾消食肥肌馬藺子一升每日取一把以麫拌煮吞之服盡愈方姚僧坦集騐喉痺腫痛衛生易簡方用蠡實一合升麻五分水一升煎三合入少蜜攪匀細呷大騐一聖惠方用馬藺子二升升麻一両為末蜜丸水服錢又方馬藺子八錢牛蒡子六錢為末空心温水服方寸匕水痢百病張文仲備急方用馬藺子以六月六日麫熬各等分為末空心米飲服方寸匕如無六月六日麫常麫亦可牛骨灰亦可又方馬藺子乾薑黄連各等分為散熟湯服二方寸匕入腹即㫁也冷熱皆治常用神效不得輕之忌猪肉冷水腸風下血有疙瘩瘡破者不治馬藺子一斤研破酒浸夏三冬七日晒乾何首烏半斤雄黄雌黄各四両為末以浸藥酒打糊丸梧子大每服三十丸温酒下日三服見效普濟方花實及根葉主治去白蟲本經療喉痺多服令人溏洩别録主癰疽惡瘡時珍發明頌曰蠡草花實皆入藥列仙傳云冦先生宋人好種荔食其葩實是矣時珍曰按葉水東日記云北方田野人患胸腹飽脹者取馬楝花擂凉水服即泄數行而愈按此則多服令人泄之説有騐而蠡實之為馬藺更無疑矣附方舊三新六睡死不寤蠡實根一握杵爛以水絞汁稍稍灌之外臺秘要喉痺口噤馬藺花二両蔓荆子一両為末温水服一錢喉痺腫痛喘息欲死者外臺秘要用馬藺根葉二両氷一升半煮一盞細飲之立瘥之聖惠方用根搗汁三合蜜一合慢火熬成徐徐㸃日五七度一方單汁飲之口噤者灌下無生者以刷煎汁沙石熱淋馬藺花七枚燒故筆頭二七枚燒粟米一合炒為末每服二錢酒下日二服名通神散小便不通馬藺花炒茴香炒葶藶炒為末每酒服二錢十便良方一切癰疽發背惡瘡用鐵掃帚同松毛牛膝以水煎服乾坤生意靣上瘢黶取鐵掃帚地上自落葉并子煎湯頻洗數次自消壽域神方面皰鼻皶馬藺子花杵傅之佳肘后方附録必似勒拾遺藏器曰辛温無毒主冷氣胸閉不消心腹脹滿生崑崙狀似馬藺子惡實别録中品釋名鼠粘别録牛蒡别録大力子綱目蒡翁菜綱目便牽牛綱目蝙蝠刺時珍曰其實狀惡而多刺鈎故名其根葉皆可食人呼為牛菜術人隠之呼為大力也俚人謂之便牽牛河南人呼為夜乂頭頌曰實殻多刺鼠過之則綴惹不可脱故謂之鼠粘子亦如羊負来之比集解别録曰惡實生魯山平澤恭曰魯山在鄧州東北此草葉大如芋子殻似粟狀實細長如茺蔚子頌曰惡實即牛蒡子也處處有之葉大如芋葉而長實似葡萄核而褐色外殻似栗梂而小如指頭多刺根有極大者作菜茹益人秋後采子入藥時珍曰牛蒡古人種子以肥壤栽之剪苖汋淘為蔬取根煮暴為脯云甚益人今人亦罕食之三月生苖起莖髙者三四尺四月開花成叢淡紫色結實如楓梂而小蕚上細刺百十攅簇之一梂有子數十顆其根大者如臂長者近尺其色灰黔七月采子十月采根子修治斆曰凡用㨂淨以酒拌蒸待有白霜重出以布拭去焙乾𢷬粉用氣味辛平無毒藏器曰苦元素曰辛温陽中之隂升也杲曰辛平陽也降也主治明目補中除風傷别録風毒腫諸瘻藏器研末浸酒每日服三二盞除諸風去丹石毒利腰脚又食前熟挼三枚吞之散諸結節筋骨煩熱毒甄權吞一枚出癰疽頭蘇恭炒研煎飲通利小便孟詵潤肺散氣利咽膈去皮膚風通十二經元素消斑􅇙毒時珍發明杲曰鼠粘子其用有四治風濕癮疹咽喉風熱散諸腫瘡瘍之毒利凝滯腰膝之氣是也附方舊五一新十風水身腫欲裂鼠粘子二両炒研為末每温水服二錢日三服聖惠方風熱浮腫咽喉閉塞牛蒡子一合半生半熟為末熱酒服一寸匕經騐方痰厥頭痛牛蒡子炒旋覆花等分為末臘茶清服一錢日二服聖惠方頭痛連睛鼠粘子石膏等分為末茶清調服醫方摘要咽膈不利疏風壅涎唾牛蒡子微炒荆芥穗一両炙甘草半両為末食後湯服二錢當緩緩取效寇氏本草衍義懸癰喉痛風熱上搏也惡實炒甘草生等分水煎含嚥名啟闗散普濟方喉痺腫痛牛蒡子六分馬藺子六分為散每空心温水服方寸匕日再服仍以牛蒡子三両塩二両研勻炒熱包熨喉外廣濟方咽喉痘疹牛蒡子二錢桔梗一錢半粉甘草節七分水煎服痘疹要訣風熱癮疹牛蒡子炒浮萍等分以薄荷湯服二錢日二服初虞世古今録騐風齲牙痛鼠粘子炒煎水含𠻳吐之延年方小兒痘瘡時出不快壯熱狂躁咽膈壅塞大便祕澁小兒咽喉腫不利若大便利者勿服牛蒡子炒一錢二分荆芥穗二分甘草節四分水一盞同煎至七分温服已出亦可服名必勝散和劑局方婦人吹乳鼠粘一錢麝香少許温酒服一小盞效聖惠方天行時疾生牛蒡根搗汁五合空腹分為二服服訖取桑葉一把炙黄以水一升煮取五合頓服取汁無葉用枝孫真人食忌熱攻心煩恍惚以牛蒡根搗汁一升食後分為二服食醫心鏡傷寒搐搦汗後覆盖不宻致腰背手足搐搦者牛蒡根散主之牛蒡根十條麻黄牛膝天南星各六錢剉于盆内研細好酒一升同研以新布絞取汁以炭火半秤燒一地坑令赤掃净傾藥汁入坑内再燒令黑色取出于乳鉢内細研每服一錢温酒下日三服朱肱活人書一切風疾十年二十年者牛蒡根一升生地黄枸把子牛膝各三升用袋盛藥浸無灰酒三升内每任意飲之外臺秘要方老人中風口目撁動煩悶不安牛蒡根切一升去皮晒乾杵為麫白米四合淘凈和作餺飥豉汁中煮加葱椒五味空心食之恒服極效壽親養老書老人風濕久痺筋攣骨痛服此壯腎潤皮毛益氣力牛蒡根一升切生地黄一升切大豆二升炒以絹袋盛浸集一斗酒中五六日任性空心温服二三盞日二服驗方頭面忽腫熱毒風氣内攻或連手足赤腫觸着痛者牛蒡子根一名蝙蝠刺洗淨研爛酒煎成膏絹攤貼腫處仍以熱酒服一二匙腫消痛减斗門方頭風掣痛不可禁者磨膏主之取牛蒡莖葉搗取濃汁二升無灰酒一升塩花一匙頭糠火煎稠成膏以摩痛處風毒自散摩時須極力令熱乃效冬月用根篋中方頭風白屑牛蒡葉搗汁熬稠塗之至明皂筴水洗去聖惠方喉中熱腫鼠粘根一升水五升煎一升分三服延年方小兒咽腫牛蒡根搗汁細嚥之方普濟熱毒牙痛熱毒風攻頭面齒齦腫痛不可忍牛蒡根一斤搗汁入塩花一錢銀器中熬成膏每用塗齒齦上重者不過三度瘥聖恵方項下癭疾鼠粘子根一升水三升煮取一升半分三服或為末蜜丸常服之救急方耳卒腫痛牛蒡根切絞汁二升銀鍋内熬膏塗之録聖濟總小便不通臍腹急痛牛蒡葉汁生地黄汁二合和勻入蜜二合每服一合入水半盞煎三五沸調滑石末一錢服聖濟總録癤子腫毒鼠粘子葉貼之千金方石瘻出膿堅實寒熱鼠粘子葉為末和雞子白封之外臺秘要諸瘡腫毒牛蒡根三莖洗煮爛搗汁入米煮粥食一捥甚良普濟方積年惡瘡反花瘡漏瘡不瘥者牛蒡根搗和臘月猪脂日日封之千金方月水不通結成癥塊腹肋脹大欲死牛蒡根二斤剉蒸三遍以生絹袋盛之以酒二斗浸五日每食前温服一盞普濟方葈耳本經中品釋名胡葈本經常思𢎞景蒼耳爾雅卷耳詩經爵耳詩疏猪耳綱目耳璫詩疏地葵本經葹音施羊負來𢎞景道人頭圖經進賢菜記事珠喝起草綱目野茄綱目縑絲草頌曰詩人謂之卷耳爾雅謂之蒼耳廣雅謂之葈耳皆以實得名也陸璣詩疏云其實正如婦人耳璫今或謂之耳璫草鄭康成謂是白胡葈幽州人呼為爵耳博物志云洛中有人驅羊入蜀胡葈子多刺粘綴羊毛遂至中國故名羊負來俗呼為道人頭𢎞景曰傖人皆食之謂之常思菜以葉覆麥作黄衣者方用甚稀時珍曰其葉形如葈麻又如茄故有葈耳及野茄諸名其味滑如葵故名地葵與地膚同名詩人思夫賦卷耳之章故名常思菜張揖廣雅作常葈亦通集解别録曰葈耳生安陸川谷及大安田野實熟時采頌曰今處處有之陸氏詩疏云其葉青白似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子正如婦人耳璫郭璞云形如鼠耳叢生如盤今之所有皆類此但不作蔓生時珍曰嘗按周憲王救荒本草云蒼耳葉青白類粘糊菜葉秋間結實比桑椹短小而多刺嫩苗􅨘熟水浸淘拌食可救飢其子炒去皮研為麫可作燒餅食亦可熬油㸃燈實修治大明曰入藥炒熟搗去刺用或酒拌蒸過用氣味甘温有小毒别録曰苦權曰甘無毒恭曰忌猪肉馬肉米泔害人主治風頭寒痛風濕周痺四肢拘攣痛惡肉死肌膝痛久服益氣藏器治肝熱明目甄權治一切風氣填髓暖腰脚治瘰癧瘡疥及瘙癢大明炒香浸酒服去風補益時珍附方舊三新四久瘧不瘥蒼耳子或根莖亦可焙研末酒糊丸梧子大每酒服三十丸日二服生者搗汁服亦可朱氏集騐方大腹水腫小便不利蒼耳子灰葶藶末等分每服二錢水下日二服千金方風濕攣痺一切風氣蒼耳子三両炒為末以水一升半煎取七合去滓呷之鏡食醫心牙齒痛腫蒼耳子五升水一斗煮取五升熱含之冷即吐去吐後復含不過一劑瘥莖葉亦可或入塩少許孫真人千金翼鼻淵流涕蒼耳子即縑絲草子炒研為末每白湯㸃服一二錢證治要訣眼目昬暗葈耳實一升為末白米半升作粥日食之普濟方嗜酒不已毡中蒼耳子七枚燒灰投酒中飲之即不嗜陳藏器本草莖葉修治斆曰凡采得去心取黄精以竹刀細切拌之蒸從巳至亥時出去黄精隂乾用氣味苦辛微寒有小毒恭曰忌猪肉馬肉米泔伏硇砂主治溪毒别録中風傷寒頭痛孟詵大風癲癎頭風濕痺毒在骨髓腰膝風毒夏月采曝為末水服一二七冬月酒服或為丸每服二三十丸日三服滿百日病出如瘑疥成汁出或斑駁駁甲錯皮起皮落則飢如凝脂令人省睡除諸毒螫殺蟲疳濕䘌久服益耳目聰明輕身强志蘇恭挼葉安舌下出涎去目黄好睡燒灰和臘猪脂封丁腫出根煮酒服主狂犬咬毒藏器發明時珍曰蒼耳藥久服去風熱有效最忌猪肉及風邪犯之則遍身發出赤丹也按蘇沈良方云葈耳根苖葉實皆洗濯隂乾燒灰湯淋取濃汁泥連両竈煉之灰汁耗即旋取傍釜中熱灰湯益之一日夜不絶火乃旋得霜乾甆瓶収之每日早晚酒服二錢補煖去風駐顔尤治皮膚風令人膚革清淨每澡沐入少許尤佳宜州學昌從諌服此十餘年至七八十紅潤輕徤皆此藥力也斗門方云婦人血風攻腦頭旋悶絶忽死倒地不知人事者用喝起草嫩心隂乾為末以酒服一大錢其功甚效此物善通頂門連腦盖即蒼耳也附方舊十二新十六萬應膏治一切癰疽發背無頭惡瘡腫毒疔癤一切風痒臁瘡杖瘡牙疼喉痺五月五日采蒼耳根葉數擔洗淨晒萎細剉以大鍋五口入水煮爛以篩濾去粗滓布絹再濾復入凈鍋武火煎滚文火熬稠攪成膏以新罐貯封每以敷貼即愈牙疼即敷牙上喉痺敷舌上或噙化二三次即效每日用酒服一匙極有效集簡方一切風毒并殺三蟲膓痔能進食若病胃脹滿心悶發熱即宜服之五月五日午時附地刈取葈耳葉洗暴搗下篩每服方寸匕酒或漿水下日二夜三若覺吐逆則以蜜丸服凖計方寸匕數也風輕者日二服若身體作粟或麻豆出此為風毒出也可以針刺潰去黄汁乃止七月七九月九亦可采用一切風氣蒼耳嫩葉一石切和麥蘖五升作塊于蒿艾中罯二十日成麴取米一斗炊作飯㸔冷暖入麴三升釀之封二七日成熟每空心暖服神騐封此酒可両重布不得令宻宻則溢出忌馬肉猪肉孟詵食療方草諸風頭運蒼耳葉晒乾為末每服一錢酒調下日三服若吐則以蜜丸梧子大每服二十丸十日全好矣楊氏經騐方血風腦運方見發明下毒攻手足腫痛欲㫁蒼耳搗汁漬之并以滓傅之立效春用心冬用子翼千金卒中水毒初覺頭目微痛惡寒骨節强急日醒暮劇手足逆冷三日則蠱蝕下部六七日膿潰食至五臟殺人也搗常思草絞汁服一二升并以綿染𨗳其下部肘后方毒蛇溪毒沙虱射工等所傷口噤眼黒手足强直毒攻腹内成塊逡廵不救蒼耳嫩苖一握取汁和酒温灌之以滓厚傅傷處勝金方疫病不染五月五日午時多采蒼耳嫩葉隂乾収之臨時為末冷水服二錢或水煎舉家皆服能辟邪惡千金方風瘙瘾疹身痒不止用蒼耳莖葉子等分為末每服二錢豆淋酒調下聖惠方面上黒斑蒼耳葉焙為末食後米飲調服一錢一月愈方摘𤣥赤白汗斑蒼耳嫩葉尖和青塩擂爛五六月間擦之五七次效摘𤣥方大風癘疾袖珍方用嫩蒼耳荷葉等分為末每服二錢温酒下日二服乾坤生意用蒼耳葉為末以大楓子油和丸梧子大每服三四十丸以茶湯下日二服又方五月五日或六月六日五更帶露采蒼耳草搗取汁熬作錠子取半斤鱧魚一尾剖開不去肚腸入藥一錠線縫以酒二盌慢火煮熟令喫不過三五箇魚即愈也忌塩一百日卒得惡瘡蒼耳桃皮作屑納瘡中反花惡瘡有肉如飯粒破之血出随生反出用蒼耳葉搗汁服三合并塗之日二上聖濟總録一切丁腫詵曰危困者用蒼耳根葉搗和小兒尿絞汁冷服一升日三服㧞根甚騐養生方用蒼耳根苗燒灰和醋淀塗之乾再上不十次即㧞根出根邵真人方蒼耳根三両半烏梅肉五箇連鬚葱三酒二鍾煎一鍾熱服取汗齒風動痛蒼耳一握以漿水煮入塩含潄外臺秘要纒喉風病蒼耳根一把老薑一塊研汁入酒服聖濟總録赤目生瘡作痛道人頭末二両乳香一錢每用一錢燒烟㗜鼻聖濟總録鼻衂不止蒼耳莖葉搗汁一小盞服聖惠方五痔下血五月五日采蒼耳莖葉為末水服方寸匕甚效千金翼赤白下痢蒼耳草不拘多少洗浄用水煮爛去滓入蜜用武火熬成膏每服一二匙白湯下醫方摘𤣥産後諸痢蒼耳葉搗絞汁温服半中盞日三四服聖惠方誤吞銅錢蒼耳頭一把以水一升浸水中十餘度飲水愈肘后方花蜘蛛毒咬人與毒蛇無異用野縑絲即道人頭搗汁一盞服仍以渣傅之摘𤣥方花主治白􅋪頑癢時珍天名精本經上品校正時珍曰據蘇沈二説併入唐本鶴虱開寳地菘别録有名未用埊松釋名天蔓菁别録天門精别録地菘唐本埊松别録埊與地同玉門精别録麥句薑本經蟾蜍蘭别録􅞩蟇藍本經蚵蚾草綱目豕首本經彘顱别録活鹿草異苑劉㦎草㦎音胡革反皺面草綱目母豬芥綱目實名鶴虱根名杜牛膝恭曰天名精即活鹿草也别録一名天蔓菁南人名為地菘葉與蔓菁菘菜相類故有此名其味甘辛故有薑稱狀如藍而􅞩蟇好居其下故名􅞩蟇藍香氣似蘭故又名蟾蜍蘭時珍曰天名精乃天蔓菁之訛也其氣如豕彘故有豕首彘顱之名昔人謂之活鹿草俗人因其氣臊訛為狐狸臊者是也爾雅云茢甄豕首也郭璞注云江東呼為豨首可以煼蠶蛹食藏器曰郭璞注爾雅蘧麥云即麥句薑者非也陶公注釣樟條云有一草似狼牙氣辛臭名為地菘人呼為劉㦎草主金瘡按異苑云宋元嘉中青州劉㦎射一麞剖五臟以此草塞之蹶然而起㦎怪而㧞草便倒如此三度㦎因宻録此草種之主折傷愈多人因以名之既有活鹿之名雅與麞字相合陶蘇俱説是地菘定非二物正誤𢎞景曰天名精即今之豨薟亦名豨首夏月杵汁服之除熱病味至苦而云甘或非是也恭曰豨首苦而臭名精辛而香全不相類也禹錫曰蘇恭云天名精南人名地菘陳藏器本草解紛亦言天名精為地菘開寳本草不當重出地菘條例宜刋削時珍曰按沈括筆談云世人既不識天名精又妄認地菘為火杴本草又出鶴虱一條都成紛亂不知地菘即天名精其葉似菘又似蔓菁故有二名鶴虱即其實也又别録有名未用埊菘即此地菘亦係誤出今並正之合而為一集解别録曰天名精生平原川澤五月采保昇曰地菘也小品方名天蔓菁又名天蕪精葉似山南菘菜夏秋抽條頗似薄荷花紫白色味辛而香志曰地菘所在皆有生人家及路旁隂處髙二三寸葉似菘葉而小又曰鶴虱出波斯者為勝今上黨亦有力勢薄于波斯者恭曰鶴虱生西戎子似蓬蒿子而細合莖葉用之頌曰天名精江湖間皆有之狀如韓保昇所説又曰鶴虱江淮衡湘皆有之春生苖葉皺似紫蘇大而尖長不光莖髙二尺許七月生黄白花似菊八月結實子極尖細乾即黄黒色南人呼其葉為火杴按火杴即豨薟雖花實相類而别是一物不可雜用時珍曰天名精嫩苗綠色似皺葉菘芥微有狐氣淘淨煠之亦可食長則起莖開小黄花如小野菊花結實如同蒿子亦相似最粘人衣狐氣尤甚炒熟則香故諸家皆云辛而香亦巴人食負蠜南人食山禁之意爾其根白色如短牛膝此物最賤而唐本草言鶴虱出西戎宋本草言出波斯者何哉盖當時人不知用之惟西戎波斯始知入藥且土産所宜故爾亦苜蓿云出西域而不知中國飼馬者即是也詳見豨薟下葉根同氣味甘寒無毒别録曰埊菘辛無毒時珍曰微辛甘有小毒生汁吐人之才曰垣衣地黄為之使主治瘀血血瘕欲死下血止血利小便久服輕身耐老本經除小蟲去痺除胸中結熱止煩渴逐水大吐下别録破血生肌止鼻衂殺三蟲除諸毒腫丁瘡瘻痔金瘡内射身癢癮􅇙不止者揩之立已唐本地菘主金瘡止血解惡蟲蛇螫毒挼以傅之開寳吐痰止瘧治牙痛口𦂳喉痺時珍埊松主眩痺别録有名未用發明時珍曰天名精併根苗而言也地菘埊松皆言其苗葉也鶴虱言其子也其功大抵只是吐痰止血殺蟲解毒故擂汁服之能止痰瘧潄之止牙疼挼之傅蛇咬亦治豬瘟病也按孫天仁集效方云凡男婦乳蛾喉嚨腫痛及小兒急慢驚風牙闗𦂳急不省人事者以鶴虱草一名皺面草一名母猪芥一名杜牛膝取根洗淨搗爛入好酒絞汁灌之良久即甦仍以渣傅項下或醋調搽亦妙朱端章集騐方云余被檄任淮西幕府時牙疼大作一刀鑷人以草藥一捻湯泡少時以手蘸湯挹痛處即定因求其方用之治人多效乃皺面地菘草也俗人訛為地葱沈存中筆談専辯地菘其子名鶴虱正此物也錢季誠方用鶴虱一枚擢置齒中髙監方以鶴虱煎米醋潄口或用防風鶴虱煎水噙潄仍研草塞痛處皆有效也附方舊二新九男女吐血皺面草即地菘晒乾為末每服一二錢以茅花泡湯調服日二次易衛生簡咽喉腫塞傷寒藴要治痰涎壅滯喉腫水不可下者地菘一名鶴虱草連根葉搗汁鵞翎掃入去痰最妙者聖濟總録用杜牛膝皷搥草同搗汁灌之不得下灌鼻得吐為妙又方土牛膝春夏用莖秋冬用根一把青礬半両同研㸃患處令吐膿血痰沫即愈纒喉風腫蚵蚾草即皺面草細研以生蜜和丸彈子大每噙一二丸即愈乾者為末蜜丸亦可名救生丸經效濟世丸諸骨哽咽地菘馬鞭草各一握去根白梅肉一箇白礬一錢搗作彈丸綿裹含嚥其骨自軟而下也方普濟風毒瘰癧赤腫地菘搗傅乾即易之聖惠方疔瘡腫毒鶴虱草葉浮酒糟同搗傅之立效孫氏集效方發背初起地菘杵汁一升日再服瘥乃止傷寒類要惡瘡腫毒地菘搗汁日服三四次外臺秘要惡蛇咬傷地菘搗傅之易簡方鶴虱唐本草氣味苦辛有小毒大明曰涼無毒主治蚘蟯蟲為散以肥肉臛汁服方寸匕亦入丸散用唐本蟲心痛以淡醋和半匕服立瘥開寳殺五臟蟲止瘧傅惡瘡大明發明頌曰鶴虱殺蟲方中為最要藥初虞世古今録騐方療蚘咬心痛取鶴虱十両搗篩蜜丸梧子大以蜜湯空腹吞四五十丸忌酒肉韋雲患心痛十年不瘥于雜方内合服之便愈李絳兵部手集方治小兒蚘虫嚙心腹痛亦單用鶴虱研末以肥猪肉汁下之五嵗一服二分虫出即止也附方新一大膓蟲出不㫁㫁之復生行坐不得鶴虱末水調半両服自愈怪疾竒方豨薟音喜杴唐本校正併入唐本豬膏母釋名希仙綱目火杴草唐本豬膏母唐本虎膏唐本狗膏唐本粘糊菜救荒時珍曰韻書楚人呼豬為豨呼草之氣味辛毒為薟此草氣臭如豬而味薟螫故謂之豨薟猪膏虎膏狗膏皆因其氣似及治虎狗傷也火杴當作虎薟俗音訛爾近人復訛豨薟為希仙矣救荒本草言其嫩苗煠熟浸去苦味油塩調食故俗謂之粘糊菜集解恭曰豨薟田野皆食之一名火杴葉似酸漿而狹長花黄白色三月四月采苗葉暴乾又曰豬膏母生平澤下濕地所在皆有一名虎膏一名狗膏葉似蒼耳莖圓有毛頌曰豨薟處處有之春生苗葉似芥葉而狹長文粗莖髙二三尺秋初有花如菊結實頗似鶴虱夏采葉暴乾用藏器曰猪膏草葉似荏有毛保昇曰猪膏葉似蒼耳両枝相對莖葉俱有毛黄白色五月六月采苗日乾時珍曰按蘇恭唐本草謂豨薟似酸漿豬膏母似蒼耳列為二種而成納進豨薟丸表言此藥與本草所述相異多生沃壤髙三尺許節葉相對張詠豨薟丸表言此草金稜銀線素莖紫荄對節而生蜀號火杴莖葉頗同蒼耳又按沈括筆談云世人妄認地菘為火杴有單服火杴法者乃是地菘不當用火杴火杴乃本草名豬膏母者後人不識重複出條也按此數説各異而今人風痺多用豨薟丸將何適從耶時珍常聚諸草訂視則豬膏草素莖有直􅏢兼有斑㸃葉似蒼耳而微長似地菘而稍薄對節而生莖葉皆有細毛肥壤一株分枝數十八九月開小花深黄色中有長子如同蒿子外蕚有細刺粘人地菘則青莖圓而無稜無斑無毛葉皺似菘芥亦不對節觀此則似與成張二氏所説相合今河南陳州采豨薟充方物其狀亦是豬膏草則沈氏謂豨薟即豬膏母者其説無疑矣蘇恭所謂似酸漿者乃龍葵非豨薟蓋誤認爾但沈氏言世間單服火杴乃是地菘不當用豬膏母似與成張之説相反今按豨薟豬膏母條並無治風之説惟本經地菘條有去痺除熱久服輕身耐老之語則治風似當用地菘然成張進御之方必無虚謬之理或者二草皆有治風之功乎而今服豬膏母之豨薟者復往往有效其地菘不見有服之者則豨薟之為豬膏尤不必疑矣豨薟氣味苦寒有小毒又曰豬膏母辛苦平無毒藏器曰有小毒蘇恭曰豬膏無毒誤矣主治豨薟治熱䘌煩滿不能食生𢷬汁三合服多則令人吐又曰豬膏母主金瘡止痛㫁血生肉除諸惡瘡消浮腫搗封之湯漬散傅並良蘇恭主久瘧痰癊搗汁服取吐搗傅虎傷狗咬蜘蛛咬蠶咬蠼螋溺瘡藏器治肝腎風氣四肢麻痺骨痛膝弱風濕諸瘡時珍發明頌曰蜀人單服豨薟法五月五日六月六日九月九日采葉去根莖花實淨洗暴乾入甑中層層洒酒與蜜蒸之又暴如此九過則氣味極香羙熬搗篩末蜜丸服之云甚益元氣治肝腎風氣四肢麻痺骨間冷腰痛無力者亦能行大腸氣諸州所説皆云性寒有小毒與唐本同惟文州及髙郵州云性熱無毒服之補益安五臟生毛髪兼主風濕瘡飢肉頑痺婦人久冷尤宜用須去粗莖留枝葉花實蒸暴兩説不同豈單用葉則寒而有毒并枝花實則熱而無毒乎抑土地所産不同而然歟時珍曰生搗汁服則令人吐故云有小毒九蒸九暴則補人去痺故云無毒生則性寒熟則性温云熱者非也慎微曰按江陵府節度使成訥進豨薟丸方表略云臣有弟訮年二十一中風伏枕五年百醫不瘥有道人鍾針因覩此患曰可餌豨薟丸必愈其草多生沃壤髙三尺許節葉相對當夏五月以來収之每去地五寸剪刈以温水洗去泥土摘葉及枝頭凡九蒸九暴不必太燥但以取足為度仍熬搗為末煉蜜丸如梧子大空心温酒或米飲下二三十丸服至二千丸所患愈加不得憂慮是藥攻之力服至四千丸必得復至五千丸當復丁壯臣依法修合令訮服之果如其言服後須喫飯三五匙壓之五月五日采者佳奉勑宣付醫院詳録又知益州張詠進豨薟丸表畧云切以餐石飲水可作充膓之饌餌松含柏亦成救病之功是以療飢者不在于羞珍愈病者何煩於異術倘獲濟時之藥輒陳鄙物之形不恥管窺輒干天聴臣因换龍興觀掘得一碑内説修養氣術并藥方二件依方差人訪問采覓其草頗有異金稜銀線素莖紫荄對節而生蜀號火杴莖葉頗同蒼耳不費登髙厯險每常求少獲多急采非難廣收甚易倘勤久服旋見神功誰知至賤之中乃有殊常之效臣自服至百服眼目清明即至千服髭鬚烏黒筋力輕徤效騐多端臣本州有都押衙羅守一曽因中風墜馬失音不語臣與十服其病立瘥又和尚智嚴年七十忽患偏風口眼喎斜時時吐涎臣與十服亦便得痊今合一百劑差職貢史元奏進附方新五風寒泄瀉火杴丸治風氣行于腸胃泄瀉火杴草為末醋糊丸梧子大每服三十丸白湯下聖濟總録癰疽腫毒一切惡瘡豨薟草端午采者一両乳香一両白􅈨燒半両為末每服二錢熱酒調下毒重者連進三服得汗妙乾坤秘韞發背丁瘡豨薟草五葉草即五𤓰龍野紅花即小薊大蒜等分擂爛入熱酒一盌絞汁服得汗立效乾坤生意丁瘡腫毒端午采豨薟草日乾為末每服半両熱酒調下汗出即愈極有效騐集簡方反胃吐食火杴草焙為末蜜丸梧子大每沸湯下五十丸百一選方附録類鼻别録有名未用曰味酸温無毒主痿痺生田中髙地葉如天名精羙根五月采時珍曰此似豬膏草也古今名謂或不同故附于此羊屎柴時珍曰按乾坤生意云一名牛屎柴生山野中葉類鶴虱四月開白花其葉主癰疽發背搗傅之冬月用根可以毒魚箬綱目釋名篛與箬同寮葉時珍曰箬若竹而弱故名其生踈遼故又謂之遼集解時珍曰箬生南方平澤其根與莖皆似小竹其節籜與葉皆似蘆荻而葉之面青背淡柔而靭新舊相代四時常青南人取葉作笠及裹茶塩包米糭女人以襯鞵底葉氣味甘寒無毒主治男女吐血衂血嘔血咯血下血並燒存性温湯服一錢匕又通小便利肺氣喉痺消癰腫時珍附方新一十二一切眼疾籠篛燒灰淋汁洗之久之自效經騐方咽喉閉痛寮葉燈心草燒灰等分吹之甚妙集簡方耳忽作痛或紅腫内脹將經霜青箬露在外將朽者燒存性為末傅入耳中其疼即止楊起簡便方肺壅鼻衂箬葉燒灰白麫三錢研勻井花水服二錢聖濟總録經血不止箬葉灰蠶紙灰等分為末每服二錢米飲下聖濟總録腸風便血茶蔞内箬葉燒存性每服三匙空心糯米湯下或入麝香少許王璆百一選方男婦血淋亦治五淋多年煮酒瓶頭箬葉三五年至十年者尤佳每用七箇燒存性入麝香少許陳米飲下日三服有人患此二服愈福建煮過夏月酒多有之百一選尿白如注小腹氣痛茶籠内箬葉燒存性入麝香少許米飲下經騐方小便澀滯不通乾箬葉一両燒灰滑石半両為末每米飲服三錢普濟方男婦轉脬方同上吹奶乳癰五月五日糭箬燒灰酒服二錢即散累效濟急仙方痘瘡倒靨箬葉灰一錢麝香少許酒服張德恭痘疹便覽方蘆别録下品校正併入拾遺江中采出蘆釋名葦音偉葭音加花名蓬蕽唐本笋名虇音拳時珍曰按毛萇詩疏云葦之初生曰葭未秀曰蘆長成曰葦葦者偉大也蘆者色盧黒也葭者嘉羙也集解恭曰蘆根生下濕地莖葉似竹花若荻花名蓬蕽二月八月采根日乾用頌曰今在處有之生下濕陂澤中其狀都似竹而葉抱莖生無枝花白作穂若茅花根亦若竹根而節疎其根取水底味甘辛者其露出及浮水中者並不堪用按郭璞注爾雅云葭即蘆也葦即蘆之成者菼薍似葦而小中實江東呼為烏蓲音萑或謂之藡即荻也至秋堅成即謂之萑音桓兼似而細長髙數尺江東謂之蒹其花皆名艻音調其萌皆名虇堪食如竹笋若然則蘆葦通為一物也所謂兼乃今作簾者是也所謂菼者今以當薪者是也而人罕能别兼菼與蘆葦也又北人以葦與蘆為二物水旁下濕所生者皆名葦其細不及指大人家池圃所植者皆名蘆其幹差大深碧色者亦難得然則蘆葦皆可通用矣時珍曰蘆有數種其長丈許中空皮薄色白者葭也蘆也葦也短小于葦而中空皮厚色青蒼者菼也薍也荻也萑也其最短小而中實者蒹也簾也皆以初生已成得名其身皆如竹其葉皆長如箬葉其根入藥性味皆同其未解葉者古謂之紫籜斆曰蘆根須要逆水生并黄泡肥厚者去鬚節并赤黄皮用根氣味甘寒無毒主治消渴客熱止小便利别録療反胃嘔逆不下食胃中熱傷寒内熱彌良蘇恭解大熱開胃治噎噦不止甄權寒熱時疾煩悶瀉痢人渴孕婦心熱大明笋氣味小苦冷無毒寗宗曰忌巴豆主治膈間客熱止渴利小便解河豚及諸魚蟹毒寗原解諸肉毒時珍發明時珍曰按雷公炮炙論序云益食加觴須煎蘆朴注云用逆水蘆根并厚朴二味等分煎湯服葢蘆根甘能益胃寒能降火故也附方舊六新六骨蒸肺痿不能食者蘇遊蘆根飲主之蘆根麥門冬地骨皮生薑各十両橘皮茯苓各五両水二斗煮八升去滓分五服取汗乃瘥外臺秘要勞復食復欲死並以蘆根煮濃汁飲肘后方嘔噦不止厥逆者蘆根三斤切水煮濃汁頻飲二升必效若以童子小便煮服不過三升愈肘后方五噎吐逆心膈氣滯煩悶不下食蘆根五両剉以水三大盞煮取二盞去滓温服金匱玉函方反胃上氣蘆根茅根各二両水四升煮二升分服千金方霍亂煩悶蘆根三錢麥門冬一錢水煎服千金方霍亂脹痛蘆根一升生薑一升橘皮五両水八升煎三升分服太平聖惠方食狗肉毒心下堅或腹脹口乾忽發熱妄語蘆根煮汁服梅師方中馬肉毒方同上聖惠鯸鮧魚毒方同上千金食蟹中毒方同上千金中藥箭毒方同上千金莖葉氣味甘寒無毒主治霍亂嘔逆肺癰煩熱癰疽燒灰淋汁煎膏蝕惡肉去黒子時珍蘀治金瘡生肉滅瘢徐之才江中采出蘆令夫婦和同用之有法藏器發明時珍曰古方煎藥多用勞水及陳蘆火取其水不强火不盛也蘆中空虚故能入心肺治上焦虚熱附方新六霍亂煩渴腹脹蘆葉一握水煎服茹又方蘆葉五錢糯米二錢半竹一錢水煎入薑汁蜜各半合煎両沸時時呷之聖惠方吐血不止蘆狄外皮燒灰勿令白為末入蚌粉少許研勻麥門冬湯服一二錢三服可救一人聖惠方肺癰欬嗽煩滿微熱心胸甲錯葦莖湯用葦莖切二升水二斗煮汁五升入桃仁五十枚薏苡仁𤓰瓣各半升煮取二升服當吐出膿血而愈玉張仲景金匱函方發背潰爛陳蘆葉為末以葱椒湯洗淨傅之神效乾坤秘韞癰疽惡肉白炭灰白荻灰等分煎膏塗之蝕盡惡肉以生肉膏貼之亦去黒子此藥只可留十日久則不效葛洪肘后方小兒秃瘡以塩湯洗淨蒲葦灰傅之聖濟總錄蓬蕽氣味甘寒無毒主治霍亂水煮濃汁服大騐蘇恭煮汁服解中魚蟹毒蘇頌燒灰吹鼻止衂血亦入崩中藥時珍附方新二乾霍亂病心腹脹痛蘆蓬茸一把水煮濃汁頓服一升小品方諸般血病水蘆花紅花槐花白雞冠花茅花等分水二鍾煎一鍾服萬表積善堂方甘蕉别録下品釋名芭蕉衍義天苴史記注芭苴時珍曰按陸佃埤雅云蕉不落葉一葉舒則一葉焦故謂之蕉俗謂乾物為巴巴亦蕉意也稽聖賦云竹布實而根苦蕉舒花而株稿芭苴乃蕉之音轉也蜀人謂之天苴曹叔雅異物志云芭蕉結實其皮赤如火其肉甜如蜜四五枚可飽人而滋味常在牙齒間故名甘蕉集解𢎞景曰甘蕉本出廣州今江東並有根葉無異惟子不堪食耳恭曰甘蕉出嶺南者子大味甘北間者但有花無實頌曰今二廣閩中川蜀皆有而閩廣者實極甘羙可啖他處雖多而作花者亦少近時中州種之甚盛皆芭蕉也其類亦多有子者名甘蕉卷心中抽幹作花初生大蕚似倒垂菡蓞有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙故謂之牙蕉其實亦有青黄之别品類亦多最甘羙曝乾可寄逺北土得之以為珍果其莖解散如絲閩人以灰湯練治紡績為布謂之蕉葛宗奭曰芭蕉三年已上即有花自心中抽出一莖止一花全如蓮花瓣亦相似但色微黄綠中心無蕋悉是花葉也花頭常下垂每一朶自中夏開直至中秋後方盡凡三葉開則三葉脱落也時珍曰按萬震南州異物志云甘蕉即芭蕉乃草類也望之如樹株大者一圍餘葉長丈許廣尺餘至一尺其莖虚軟如芋皆重皮相裹根如芋魁青色大者如車轂花着莖末大如酒盃形色如蓮花子各為房實隨花長每花一闔各有六子先後相次子不俱生花不俱落也蕉子凡三種未熟時皆苦澀熟時皆甜而脆味如葡萄可以療飢一種子大如拇指長六七寸鋭似羊角両両相抱者名羊角蕉剝其皮黄白色味最甘羙一種子大如雞卵有類牛乳者名牛乳蕉味微减一種子大如蓮子長四五寸形正方者味最弱也並可蜜藏為果又顧玠海槎録云海南芭蕉常年開花結實有二種板蕉大而味淡佛手蕉小而味甜通呼為蕉子不似江南者花而不寳又范成大虞衡志云南中芭蕉有數種極大者凌冬不凋中抽一條長數尺節節有花花褪葉根有實去皮取肉軟爛如綠柿味極甘冷四季恒實土人以飼小兒云去客熱謂之蕉子又名牛蕉子以梅汁漬曝壓扁味甘酸有微霜名芭蕉乾一種雞子蕉小于牛蕉亦四季實一種牙蕉子小于雞蕉尤香嫩甘羙惟秋初結子一種紅蕉葉瘦類蘆箬花色正紅如榴花日折一両葉其中有一㸃鮮緑可愛春開至秋盡猶芳俗名羙人蕉一種膽瓶蕉根出土時肥飽狀如膽瓶也又費信星槎勝覽云南畨阿魯諸國無米糓惟種芭蕉椰子取實代糧也氣味甘大寒無毒恭曰性冷不益人多食動冷氣主治生食止渴潤肺蒸熟晒裂舂取仁食通血脉填骨髓孟詵生食破血合金瘡解酒毒乾者解肌熱煩渴吴瑞除小兒客熱壓丹石毒時珍根氣味甘大寒無毒恭曰寒頌曰甘蕉芭蕉性相同也主治癰腫結熱别録𢷬爛傅腫去熱毒𢷬汁服治産後血脹悶蘇恭主黄疸孟詵治天行熱狂煩悶消渴患癰毒并金石發動躁熱口乾並絞汁服之又治頭風逰風大明附方舊四新六發背欲死芭蕉根𢷬爛塗之肘后方一切腫毒方同上赤逰風􅇙方同上風熱頭痛方同上風蟲牙痛芭蕉自然汁一椀煎熱含𠻳普濟方天行熱狂芭蕉根𢷬汁飲之日華子本草消渴飲水骨節煩熱用生芭蕉根𢷬汁時飲一二合聖惠方血淋澀痛芭蕉根旱蓮草各等分水煎服日二惠聖方産後血脹𢷬芭蕉根絞汁温服二三合瘡口不合芭蕉根取汁抹之良指直方蕉油以竹筒挿入皮中取出瓶盛之氣味甘冷無毒主治頭風熱止煩渴及湯火傷梳頭止女人髮落令長而黒大明暗風癎病涎作運悶欲倒者飲之取吐有竒效蘇頌附方新一小兒截驚以芭蕉汁薄荷汁煎勻塗頭頂留顖門塗四肢留手足心勿塗甚效峰鄧筆雜興葉主治腫毒初發研末和生薑汁塗之時珍方聖惠附方新一岐毒初起芭蕉葉熨斗内燒存性入輕粉麻油調塗一日二上或消或破皆無痕也指仁齋直方花主治心痺痛燒存性研塩湯㸃服二錢日華蘘荷别録中品校正自菜部移入此併入有名未用蘘草為一釋名覆葅别錄蘘草别録􅀈苴音博葍苴説文嘉草𢎞景曰本草白蘘荷而今人呼赤者為蘘荷白者為覆苴盖食以赤者為勝入藥以白者為良葉同一種爾時珍曰覆苴許氏説文作葍苴司馬相如上林賦作猼苴與芭蕉音相近離騷大招云醢豚若狗膾苴􅐜王逸注云苴􅐜音博蘘荷也見本草而今之本草無之則脱漏亦多矣集解别録曰蘘草生淮南山谷頌曰蘘荷荆襄江湖間多種之北地亦有春初生葉似甘蕉根似薑牙而肥其葉冬枯根堪為葅其性好隂在木下生者尤美潘岳閑居賦云蘘荷依隂時藿向陽是也宗懍荆楚嵗時記云仲冬以塩藏蘘荷用備冬儲又以防蠱史㳺急就篇云蘘荷冬日藏其來逺矣然有赤白二種白者入藥赤者堪噉及作梅果多用之宗奭曰蘘荷八九月間淹貯以偹冬月作蔬果治病止用白者時珍曰蘇頌圖經言荆襄江湖多種今訪之無復識者惟楊慎丹鉛録云急就章註蘘荷即今甘露考之本草形性相同甘露即芭蕉也崔豹古今註云蘘荷似芭蕉而白色其子花生根中花未敗時可食乆則消爛矣根似薑宜隂翳地依䕃而生又按王旻山居録云蘘荷宜樹隂下二月種之一種永生不須鋤耘但加糞耳八月初踏其苗令死則根滋茂九月初取其傍生根為葅亦可醤藏十月中以糠覆其根下則過冬不凍死也修治斆曰凡使勿用革牛草真相似其革牛草腥澀凡使白蘘荷以銅刀刮去粗皮一重細切入砂盆中研如膏取自然汁鍊作煎新器攤冷如乾膠狀刮取用之桹氣味辛温有小毒思邈曰辛微温濇無毒主治中蠱及瘧𢷬汁服别録溪毒沙蟲蛇毒𢎞景諸惡瘡根心主稻麥芒入目中不出以汁注目即出蘇恭赤眼澀痛𢷬汁㸃之時珍蘘草氣味苦甘寒無毒大明曰平主治温瘧寒熱酸嘶邪氣辟不祥别録發明𢎞景曰中蠱者服蘘荷汁并臥其葉即呼蠱主姓名多食損藥力又不利脚人家種之亦云辟蛇頌曰按于寳捜神記云外姊夫蔣士先得疾下血言中蠱其家宻以蘘荷置于席下忽大笑曰蠱我者張小小也乃收小小小小亡走自此解蠱藥多用之往往騐也周禮庶氏以嘉草除蠱毒宗懔謂嘉草即蘘荷是也陳藏器云蘘荷茜根為主蠱之最謂此時珍曰别録菜部蘘荷謂根也草部蘘草謂葉也其主治亦頗相近今併為一云附方舊八新一卒中蠱毒下血如雞肝晝夜不絶臟腑敗壊待死者以蘘荷葉宻置病人席下勿令知之必自呼蠱主姓名也梅師方喉中似物吞吐不出腹脹羸瘦取白蘘荷根𢷬汁服蠱立出也梅師方喉舌瘡爛酒漬蘘荷根半日含潄其汁瘥乃止外臺秘要方吐血痔血向東蘘荷根一把𢷬汁三升服之肘后方婦人腰痛方同上月信澀滯蘘荷根細切水煎取二升空心入酒和服經騐方風冷失聲咽喉不利蘘荷根二両𢷬絞汁入酒一大盞和勻細細服取瘥肘后方傷寒時氣温病初得頭痛壯熱脉盛者用生蘘荷根葉合𢷬絞汁服三四升肘後方雜物入目白蘘荷根取心𢷬絞取汁滴入目中立出濟普方麻黄本經中品釋名龍沙本經卑相别録卑鹽别録時珍曰諸名殊不可解或云其味麻其色黄未審然否張揖廣雅云龍沙麻黄也狗骨麻黄根也不知何以分别如此集解别録曰麻黄生晋地及河東立秋采莖隂乾令青𢎞景曰今出青州彭城滎陽中牟者為勝色青而多沫蜀中亦有不好恭曰鄭州鹿臺及閩中沙苑河旁沙洲上最多同州沙苑亦多其青徐者亦不復用禹錫曰按段成式酉陽雜俎云麻黄莖頭開花花小而黄叢生子如覆盆子可食頌曰今近汴京多有之以滎陽中牟者為勝春生苖至夏五月則長及一尺以来稍上有黄花結實如百合瓣而小又似皂筴子味甜微有麻黄氣外皮紅裏仁子黒根紫赤色俗説有雌雄二種雌者於三月四月内開花六月結子雄者無花不結子至立秋後收莖隂乾時珍曰其根皮色黄赤長者近尺附録雲花子時珍曰按葛洪肘后方治馬疥有雲花草云狀如麻黄而中堅實也莖修治𢎞景曰用之折去節根水煮十餘沸以竹片掠去上沫沫令人煩根節能止汗故也氣味苦温無毒别録曰㣲温普曰神農雷公苦無毒扁鵲酸李當之平權曰甘平元素曰性温味苦而甘辛氣味俱薄輕清而浮陽也升也手太隂之藥入足太陽經兼走手少隂陽明時珍曰麻黄微苦而辛性熱而輕揚僧繼洪云中牟有麻黄之地冬不積雪為泄内陽也故過用則洩真氣觀此則性熱可知矣服麻黄自汗不止者以冷水浸頭髪仍用撲法即止凡服麻黄藥須避風一日不爾病復作也凡用湏佐以黄芩則無赤眼之患之才曰厚朴白微為之使惡辛夷石韋主治中風傷寒頭痛温瘧發表出汗去邪熱氣止欬逆上氣除寒熱破癥堅積聚本經五臟邪氣緩急風脅痛字乳餘疾止好唾通腠理解肌洩邪惡氣消赤黑斑毒不可多服令人虚别録治身上毒風􅇙痺皮肉不仁主壯熱温疫山嵐瘴氣甄權通九竅調血脉開毛孔皮膚大明去榮中寒邪洩衛中風熱元素散赤目腫痛水腫風腫産後血滯時珍發明𢎞景曰麻黄療傷寒解肌第一藥頌曰張仲景治傷寒有麻黄湯及葛根湯大小青龍湯皆用麻黄治肺瘻上氣有射干麻黄湯厚朴麻黄湯皆大方也杲曰輕可去實麻黄葛根之属是也六淫有餘之邪客于陽分皮毛之間腠理閉拒榮衛氣血不行故謂之實二藥輕清成象故可去之麻黄微苦其形中空隂中之陽入足太陽寒水之經其經循背下行本寒而又受外寒故宜發汗去皮毛氣分寒邪以泄表實若過發則汗多亡陽或飲食勞倦及雜病自汗表虚之證用之則脱人元氣不可不禁好古曰麻黄治衛實之藥桂枝治衛虚之藥二物雖為太陽證藥其實榮衛藥也心主榮為血肺主衛為氣故麻黄為手太隂肺之劑桂枝為手少隂心之劑傷寒傷風而欬𠻳用麻黄桂枝即湯液之源也時珍曰麻黄乃肺經專藥故治肺病多用之張仲景治傷寒無汗用麻黄有汗用桂枝厯代明醫解釋皆隨文傳㑹未有䆒其精微者時珍常釋思之似有一得與昔人所解不同云津液為汗汗即血也在榮則為血在衛則為汗夫寒傷榮榮血内濇不能外通于衛衛氣閉固津液不行故無汗發熱而憎寒夫風傷衛衛氣外泄不能内䕶于榮榮氣虚弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖属乎太陽而肺實受邪氣其證時兼面赤怫鬰欬𠻳有痰喘而胸滿諸證者非肺病乎盖皮毛外閉則邪熱内攻而肺氣膹鬰故用麻黄甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利氣汗後無大熱而喘者加以石膏朱肱活人書夏至後加石膏知母皆是泄肺火之藥是則麻黄湯雖太陽發汗重劑實為發散肺經火鬰之藥也腠理不宻則津液外泄而肺氣自虚虚則補其母故用桂枝同甘草外散風邪以救表内伐肝木以防脾佐以芍藥泄木而固脾泄東所以補西也使以薑棗行脾之津液而和營衛也下後微喘者加厚朴杏仁以利肺氣也汗後脉沉遲者加人參以益肺氣也朱肱加黄芩為陽旦湯以瀉肺熱也皆是脾肺之藥是則桂枝雖太陽解肌輕劑實為理脾救肺之藥也此千古未發之秘㫖愚因表而出之又少隂病發熱脉沉有麻黄附子細辛湯麻黄附子甘草湯少隂與太陽為表裏乃趙嗣其所謂熟附配麻黄補中有發也一錦衣夏月飲酒達旦病水泄數日不止水穀直出服分利消導升提諸藥則反劇時珍診之脉浮而緩大腸下弩復發痔血此因肉食生冷茶水過雜抑遏陽氣在下木盛土衰素問所謂久風成飱泄也法當升之揚之遂以小續命湯投之一服而愈昔仲景治傷寒六七日大下後脉沉遲手足厥逆咽喉不利唾膿血泄利不止者用麻黄湯平其肝肺兼升發之即斯理也神而明之此類是也附方舊五新七天行熱病初起一二日者麻黄一大兩去節以水四升煮去沫取二升去滓着米一匙及豉為稀粥先以湯浴後乃食粥厚覆取汗即愈孟詵必用方傷寒雪煎麻黄十斤去節杏仁四升去皮熬大黄一斤十二両先以雪水五石四斗漬麻黄于東向竈釜中三宿後納大黄攪勻桑薪煮至二石去滓納杏仁同煮至六七斗絞去滓置銅器中更以雪水三斗合煎令得二斗四升藥成丸如彈子大有病者以沸白湯五合研一丸服之立汗出不愈再服一丸封藥勿令洩氣千金方傷寒黄疸表熱者麻黄醇酒湯主之麻黄一把去節綿裹羙酒五升煮取半升頓服取小汗春月用水煮千金方裏水黄腫張仲景云一身面目黄腫其脉沉小便不利甘草麻黄湯主之麻黄四両水五升煮去沫入甘草二両煮取三升每服一升重覆汗出不汗再服慎風寒千金云有患氣急久不瘥變成水病從腰以上腫者宜以此發汗水腫脉沉属少隂其脉浮者為氣虚脹者為氣皆非水也麻黄附子湯汗之麻黄三両水七升煮去沫入甘草二両附子炮一枚煮取二升半每服八分日三服取汗張仲景金櫃要略風痺冷痛麻黄去根五両桂心二両為末酒二升慢火熬如餳每服一匙熱酒調下至汗出為度避風聖惠方小兒慢脾風因吐泄後而成麻黄長五寸十箇去節白术指面大二塊全蠍二箇生薄荷葉包煨為末二嵗以下一字三嵗以上半錢薄荷湯下聖惠方尸咽痛痺語聲不出麻黄以青布裹燒烟筒中熏之聖惠方産後腹痛及血下不盡麻黄去節為末酒服方寸匕一日二三服血下盡即止子母秘録心下悸病半夏麻黄丸用半夏麻黄等分末之煉蜜丸小豆大每飲服三丸日三服金匱要略痘瘡倒黶寇宗奭曰鄭州麻黄去節半両以蜜一匙同炒良久以水半升煎數沸去沫再煎去三分之一去滓乗熱服之避風其瘡復出也一法用無灰酒煎其效更速仙源縣筆工李用之子病斑瘡風寒倒黶已困用此一服便出如神中風諸病麻黄一秤去根以王相日乙卯日取東流水三石三斗以淨鐺盛五七斗先煮五沸掠去沫逐旋添水盡至三五斗漉去麻黄澄定濾去滓取清再熬至一斗再澄再濾取汁再熬至升半為度宻封収之一二年不妨每服一二匙熱湯化下取汗熬時要勤攪勿令着底恐焦了仍忌雞犬隂人見之此劉守真秘方也宣明方根節氣味甘平無毒主治止汗夏月雜粉撲之𢎞景發明權曰麻黄根節止汗以故竹扇杵末同撲之又牡蠣粉粟粉并麻黄根等分為末生絹袋盛貯盗汗出即撲手摩之時珍曰麻黄發汗之氣駛不能禦而根節止汗效如影響物理之妙不可測度如此自汗有風濕傷風風温氣虚血虚脾虚隂虚胃熱痰飲中暑亡陽柔痓諸證皆可隨證加而用之當歸六黄湯加麻黄根治盗汗尤捷盖其性能行周身肌表故能引諸藥外至衛分而固膜理也本草但知撲之之法而不知服餌之功尤良也附方新八盗汗隂汗麻黄根牡蠣粉為末撲之盗汗不止麻黄根椒目等分為末每服一錢無灰酒下外以麻黄根故蒲扇為末撲之竒效良方小兒盗汗麻黄根三分故蒲扇灰一分為末以乳服三分日服三仍以乾薑三分同為末三分撲之古今録騐諸虚自汗夜卧即甚久則枯瘦黄茋麻黄根各一両牡蠣米泔浸洗煆過為散每服五錢水二盞小麥百粒煎服局和濟方虚汗無度麻黄根黄茋等分為末飛麫糊作丸梧子大每用浮麥湯下百丸以止為度騐談埜翁試方産後虚汗黄茋當歸各一両麻黄根二両每服一両煎湯下隂囊濕瘡腎有勞熱麻黄根石硫黄各一両米粉一合為末傅之千金方内外障翳麻黄根一両當歸身一錢同炒黒色入麝香少許為末㗜鼻頻用此南京相國寺東黒孩兒方也普濟木賊宋嘉祐釋名時珍曰此草有節面糙澀治木骨者用之磋擦則光淨猶云木之賊也集解禹錫曰木賊出秦隴華成諸郡近水地苖長尺許叢生每根一幹無花葉寸寸有節色青凌冬不凋四月采之頌曰所在近水地有之采無時今用甚多時珍曰叢叢直上長者二三尺狀似鳬茈苖及悰心草而中空有節又似麻黄莖而稍粗無枝葉莖氣味甘微苦無毒時珍曰温主治目疾退翳膜消積塊益肝膽療腸風止痢及婦人月水不㫁崩中赤白嘉祐解肌止淚止血去風濕疝痛大腸脱肛時珍發明禹錫曰木賊得牛角腮麝香治休息久痢得禹餘粮當歸芎藭治崩中赤白得槐蛾桑耳治腸風下血得槐子枳實治痔疾出血震亨曰木賊去節烘過發汗至易本草不曽言及時珍曰木賊氣温味微甘苦中空而輕陽中之隂升也浮也與麻黄同形同性故亦能發汗解肌升散火鬱風濕治眼目諸血疾也附方舊三新九目昬多淚木賊去節蒼术泔浸各一両為末每服二錢茶調下或蜜丸亦可急喉痺塞木賊以牛糞火燒存性每冷水服一錢血出即安也聖惠方舌硬出血木賊煎水潄之即止聖惠方血痢不止木賊五錢水煎温服一日一服聖惠方瀉血不止方同上日二服廣利方腸痔下血多年不止用木賊枳殻各二両乾薑一両大黄二錢半並于銚内炒黒存性為末每粟米飲服二錢甚效也蘇頌圗經本草大腸脱肛木賊燒存性為末摻之按入即止一加龍骨三因方婦人血崩血氣痛不可忍逺年近日不瘥者雷氏木賊散主之木賊一両香附子一両朴硝半両為末每服三錢色黒者酒一盞煎紅赤者水一盞煎和滓服日二服臍下痛者加乳香沒藥當歸各一錢同煎忌生冷硬物猪魚油膩酒麫醫壘元戎月水不㫁木賊炒三錢水一盞煎七分温服日一服聖惠方胎動不安木賊去節川芎等分為末每服三錢水一盞入金銀一錢煎服聖濟總録小腸疝氣木賊細剉微炒為末沸湯㸃服二錢緩服取效一方用熱酒下寇氏本草衍義誤吞銅錢木賊為末雞子白調服一錢聖惠方附録問荆藏器曰味苦平無毒主結氣瘤痛上氣氣急煮汁服之生伊沒洲渚間苖如木賊節節相接一名接續草石龍芻本經上品釋名龍鬚本經龍修山海經龍華别録龍珠本經懸莞别録草續㫁本經縉雲草綱目方賔别録西王母簮時珍曰刈草包束曰芻此草生水石之處可以刈束養馬故謂之龍芻述異記周穆王東海島中養八駿處有草名龍芻是矣故古語云一束龍芻化為龍駒亦孟子芻豢之義龍鬚王母簮因形也縉雲縣名属今處州仙都山産此草因以名之崔豹古今注云世言黄帝乗龍上天羣臣攀龍鬚墜地生草名曰龍鬚者謬也江東以草織席名西王母席亦豈西王母騎虎而墮其鬚乎集解别録曰石龍芻生梁州山谷濕地五月七月采莖暴乾以九節多珠者良𢎞景莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾藏器曰今出汾州沁州石州亦處處有之保昇曰叢生莖如綖所在有之俗名龍鬚草可為席八月九月采根暴乾時珍曰龍鬚叢生狀如粽心草及鳬茈苖直上夏月莖端開小穗花結細實並無枝葉今吴人多栽蒔織席他處自生者不多也本經明言龍芻一名龍鬚而陶𢎞景言龍芻似龍鬚但多節似以為二物者非矣莖氣味苦微寒無毒别録曰㣲温主治心腹邪氣小便不利淋閉風濕鬼疰惡毒久服補虚羸輕身耳目聰明延年本經補内虚不足痞滿身無潤澤出汗除莖中熱痛療蚘蟲腫不消食别録敗席主治淋及小便卒不通彌敗有垢者方尺煮汁服之藏器龍常草别録有名未用釋名粽心草時珍曰俚俗五月采繫角黍之心呼為粽心草是也集解别録曰生河水旁狀如龍芻冬夏生時珍曰按爾雅云􅀢鼠莞也鄭樵解為龍芻郭璞云纎細似龍鬚可為席蜀中出者好恐即此龍常也盖是龍鬚之小者爾故其功用亦相近云莖氣味鹹温無毒主治輕身益隂氣療痺寒濕别録燈心草宋開寳釋名虎鬚草綱目碧玉草綱目集解志曰燈心草生江南澤地叢生莖圓細而長直人將為席宗奭曰陜西亦有之蒸熟待乾折取中心白穰燃燈者是謂熟草又有不蒸者但生乾剥取為生草入藥宜用生草時珍曰此即龍鬚之類但龍鬚緊小而瓤實此草稍粗而瓤虚白吳人栽蒔之取瓤為燈炷以草織席及蓑他處野生者不多外丹家以之伏硫砂雷公炮炙論序云􅔈遇赤鬚永留金鼎注云赤鬚亦呼虎鬚草煮􅔈能住火不知即此虎鬚否也莖及根修治時珍曰燈心難研以粳米粉漿染過晒乾研末入水澄之浮者是燈心也晒乾用氣味甘寒無毒元素曰辛甘陽也吴綬曰淡平主治五淋生煮服之敗席煮服更良開寳瀉肺治隂竅濇不利行水除水腫癃閉元素治急喉痺燒灰吹之甚捷燒灰塗乳上飼小兒止夜啼震亨降心火止血通氣散腫止渴燒灰入輕粉麝香治隂疳時珍附方舊一新九破傷出血燈心草嚼爛傅之立止勝金方衂血不止燈心一両為末入丹砂一錢米飲每服二錢聖濟總録喉風痺塞瑞竹堂方用燈心一握隂陽瓦燒存性又炒塩一匙每吹一捻數次立愈心一方用燈心灰二錢蓬砂末一錢吹之一方燈箬葉燒灰等分吹之酒惠濟方用燈心草紅花燒灰服一錢即消痘瘡煩喘小便不利者燈心一把鼈甲二両水一升半煎六合分二服龎安常傷寒論夜不合眼難睡燈草煎湯代茶飲即得睡方集簡通利水道白飛霞自制天一丸用燈心十斤米粉漿染晒乾研末入水澄去粉取浮者晒乾二両五錢赤白茯苓去皮共五両滑石水飛五両猪苓二両澤瀉三両人參一斤切片熬膏和藥丸如龍眼大硃砂為衣每用一丸任病换引大叚小兒生理向上本天一生水之妙諸病以水道通利為捷徑也韓氏醫通濕熱黄疸燈草根四両酒水各半入瓶内煮半日露一夜温服集𤣥方燈花燼見火部本草綱目卷十五
