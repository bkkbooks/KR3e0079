body:
  text: 本草綱目卷二十二目錄穀部李時珍曰太古民無粒食茹毛飲血神農氏出始嘗草別榖以教民耕蓻又嘗草別藥以救民疾夭軒轅氏出教以烹飪制為方劑而後民始得遂養生之道周官有五榖六穀九榖之名詩人有八榖百穀之詠榖之類可謂繁矣素問云五榖為養麻麥稷黍豆以配肝心脾肺腎職方氏辨九州之穀地官辨土宜種稑之種以教稼穡樹蓺皆所以重民天也五方之氣九州之產百榖各異其性豈可終日食之而不知其氣味損益乎於是集草實之可食者為榖部凡七十三種分為四類曰麻麥稻曰稷粟曰菽豆曰造釀舊本米穀部三品共五十九種今併入九種移一種入菜部自草部移入一種神農本草經七種梁陶𢎞景註名醫别錄一十九種陶𢎞景註唐本草二種唐蘇恭藥性本草一種唐甄權本草拾遺十一種唐陳藏器海藥本草一種唐李珣食療本草三種唐孟詵開寳本草二種宋馬志嘉祐本草三種宋掌禹錫圖經本草二種宋蘇頌日用本草一種元吴瑞本草補遺一種元朱震亨救荒本草一種周憲王食鑑本草一種明寗原食物本草三種明汪穎本草綱目一十五種明李時珍附註魏李當之藥録宋雷斆炮炙吴普本草藥對齊徐之才唐楊損之刪繁孫思邈千金蕭炳四聲良食性南唐陳士蜀韓保升重註囊金張元素珍珠宋寇宗奭衍義元李杲法象王好古湯液汪機㑹編明王綸集要陳嘉謨䝉筌穀之一麻麥稻類十二種胡麻本經油麻即亞麻圖經胡即壁虱麻大麻本經麻蕡即小麥别録大麥别録穬麥别録雀麥唐本燕麥即蕎麥嘉祐苦蕎麥綱目稻别録糯米即粳別録秈綱目右附方舊七十三新一百六十六本草綱目卷二十二目録
