body:
  text: 本草綱目卷七明李時珍撰土凡六十一種白堊音惡品本經下釋名白善土别錄白土粉衍義畫粉時珍曰土以黄為正色則白者為惡色故名堊後人諱之呼為白善集解别録曰白堊生邯鄲山谷采無時𢎞景曰即今畫家用者甚多而賤俗方稀用頌曰胡居士云始興小桂縣晉陽鄉有白善而今處處皆有之人家往往用以浣衣西山經云大次之山其陽多堊中山經云葱聾之山其中有大谷多白黒青黄堊有五色入藥惟白者耳宗奭曰白善土京師謂之白土粉切成方塊賣于人浣衣時珍曰白土處處有之用燒白甆器坯者修治斁曰凡使勿用色青并底白者搗篩末以鹽湯飛過曬乾用則免結澁人腸也毎堊二兩用鹽一分大明曰入藥燒用不入湯飲氣味苦温無毒别録曰辛無毒不可乆服傷五臟令人羸瘦權曰甘温煖主治女子寒熱癥瘕月閉積聚本經隂腫痛漏下無子洩痢别録療女子血結澀腸止痢甄權治鼻洪吐血痔瘻洩精男子水臟冷女子子宫冷大明合王瓜等分為末湯㸃二錢服治頭痛宗奭發明時珍曰諸土皆能勝濕補脾而白堊土則兼入氣分也附方新九衂血不止白土末五錢井華水調服二服除根瑞竹堂方水泄不化日夜不止白堊煅乾薑炮各一兩楮葉生研二兩為末糊丸綠荳大每米飲下二十丸普濟方翻胃吐食男婦皆治白善土煅赤以米醋一兩研乾薑二錢半炮為末毎服一錢調下服一斤以上為妙千金翼卒暴欬𠻳白善土粉白礬一兩為末薑汁糊丸梧子大臨臥薑湯服二十丸普濟方風赤爛眼倒睫拳毛華佗方用白土一兩銅青一錢為末毎以半錢泡湯洗丸乾坤生意加焰硝半兩為末湯泡杏仁杵和皁子大毎用涼水浸一丸洗眼乾坤秘韞小兒熱丹白土一分寒水石半兩為末新水調塗錢乙小兒方疿子瘙痒舊屋梁上刮赤白堊末傅之普濟方代指腫痛豬膏和白善土傅之肘後方臁瘡不乾白善土煅研末生油調搽集𤣥方甘土拾遺集解藏器曰甘土出安西及東京龍門土底澄取之洗膩服如灰水和塗衣去油垢主治草藥及諸菌毒熱湯調末服之藏器赤土綱目氣味甘温無毒主治主湯火傷研末塗之時珍附方新三牙宣疳䘌赤土荆芥葉同研揩之日三次普濟方風疹瘙痒甚不能忍者赤土研末空心温酒服一錢御藥院方身面印文刺破以醋調赤土傅之乾又易以黒滅為度千金方黄土拾遺釋名藏器曰張司空言三尺以土日糞三尺以下日土凡用當去上惡物勿令入客水氣味甘平無毒藏器曰土氣乆觸令人面黄掘土犯地脈令人土氣身腫掘土犯神殺令人生腫毒主治洩痢冷熱赤白腹内熱毒絞結痛下血取乾土水煑三五沸絞去滓暖服一二升又解諸藥毒中肉毒合口椒毒野菌毒藏器發明時珍曰按劉跂錢乙傳云元豐中皇子儀國公病瘛瘲國醫未能治長公主舉乙入進黄土湯而愈神宗召見問黄土愈疾之狀乙對曰以土勝水水得其平則風自退爾上悦擢太醫丞又夷堅志云吳少師得疾數月消瘦毎日飲食入咽如萬蟲攅攻且痒且病皆以為勞瘵迎名醫張鋭診之鋭令明旦勿食遣卒詣十里外取行路黄土至以温酒二升攪之投藥百粒飲之覺痛幾不堪及登溷下馬蝗千餘宛轉其半已困死吳亦憊甚調理三日乃安因言夏月出師燥渴飲澗水一盃似有物入咽遂得此病鋭曰蟲入人臟勢必孶生饑則聚咂精血飽則散處臟腑茍知殺之而不能掃取終無益也是以請公枵腹以誘之蟲乆不得土味又喜酒故乗饑畢集一洗而空之公大喜厚賂謝之以禮送歸附方舊二新十小兒喫土用乾黄土一塊研末濃煎黄連湯調下救急方烏紗驚風小兒驚風遍身都烏者急推向下將黄土一盌搗末入乆醋一鍾炒熱包定慰之引下至足刺破為妙訣小兒秘卒患心痛畫地作王字撮取中央土水一升服良陳藏器本草目卒無見黄土攪水中澄清洗之肘後方牛馬肉毒及肝毒取好土三升水煑清一升服即愈一方入頭髪寸截和之髮皆貫肝而出也肘後方内痔痛腫朝陽黄土黄連末皮硝各一兩用豬膽汁同研如泥毎日旋丸棗大納入肛内過一夜隨大便去之内服烏梅黄連二味丸藥集孫氏効方攧撲欲死一切傷損從髙墜下及木石迮落馬撲車淤血凝滯氣絶欲死者亦活用淨土五升蒸熱以故布重裹作二包更互熨之勿大熱破肉取痛止則已神效之方孫真人千金方杖瘡末破乾黄土末童尿入雞子清調塗刷上乾即上隨以熱水洗去復刷復洗數十次以紫轉紅為度仍刺兩胯以防血攻隂也攝生方湯火傷灼醋調黄土塗之談野翁方蜈蚡螫傷畫地作王字内取土摻之即愈集簡方蜂蟻叮螫反手取地上土傅之或入醋調千金方蠼螋尿瘡畫地作蠼螋形以刀細取腹中土唾和塗之再塗即愈孫真人云予得此疾經五六日不愈或教此法遂瘳乃知萬物相感莫曉其由也千金方鑄鍾黄土拾遺主治卒心痛疰忤惡氣温酒服一錢藏器鑄鏵鉏孔中黄土拾遺主治丈夫隂囊温痒及隂汗細末撲之藏器東壁土别錄下品氣味甘温無毒主治下部瘡脱肛别錄止洩痢霍亂煩悶藏器温瘧㸃目去瞖同蜆殻為末傅豌豆瘡甄權療小兒風臍𢎞景摩乾濕二癬極效蘇恭發明𢎞景曰此屋之東壁上土也常先見日故爾又可除油垢衣勝石灰滑石藏器曰取其向陽乆乾也宗奭曰乆乾之説不然蓋東壁先得太陽真火烘炙故治瘟疫初出少火之氣壯及當午則壯火之氣衰故不用南壁而用東壁時珍曰昔一女忽嗜河中汚泥日食數盌玉田隠者以壁間敗土調水飲之遂愈又凡脾胃濕多吐瀉霍亂者以東壁土新汲水攪化澄清服之即止蓋脾主土喜燥而惡濕故取太陽真火所照之土引真火生發之氣補土而勝濕則吐瀉自止也嶺南方治瘴瘧香椿散内用南壁土近方治反胃嘔吐用西壁土者或取太陽離火所照之氣或取西方收斂之氣然皆不過借氣補脾胃也附方舊三新九急心痛五十年陳壁土枯礬二錢為末蜜丸艾湯服集𤣥方霍亂煩悶向陽壁土煑汁服聖濟錄藥毒煩悶欲死者東壁土調水三升頓飲之肘後方解烏頭毒不拘川烏草烏毒用多年陳壁土泡湯服之冷水亦可通變要法六畜肉毒東壁土末水服一錢即安集𤣥方目中瞖膜東壁土細末日㸃之淚出佳肘後方肛門凸出故屋東壁上土一升研末以長皁莢挹末粉之仍炙皁莢更互熨之外臺秘要疿子瘙痒乾壁土末傅之隨手愈普濟方耳瘡唇瘡東壁土和胡粉傅之救急方癧破經年膿水不絶用百年茅屋廚中壁土為末入輕粉調傅半月即乾愈永類方諸般惡瘡拔毒散東牆上土大黄等分為末用無根水井華水調搽乾再上瑞竹堂方發背癰節多年煙熏壁土黄蘖等分為末薑汁拌調攤貼之更以茅香湯調服一錢七經驗方太陽土綱目主治人家動土犯禁主小兒病氣喘但按九宫看太陽在何宫取其土煎湯飲之喘即定時珍傳出正附録執日天星上土藏器曰取和薰草柏葉以塗門户方一尺令盜賊不來執日六癸上土時珍曰抱朴子云常以執日取六癸上土市南門土嵗破土月建土合作人着朱鳥地上辟盜二月上壬日土藏器曰泥屋之四角宜蠶清明日戌上土時珍曰同狗毛作泥塗房戸内孔穴蛇鼠諸蟲永不入神后土時珍曰逐月旦日取泥屋之四角及塞鼠穴一年鼠皆絶迹此李處士禁鼠法也神后正月起申順行十二辰天子藉田三推犁下土拾遺釋名時珍曰月全天子以元日祈穀于上帝親載耒耜率三公九卿諸侯大夫躬耕天子三推三公五推卿諸侯九推反執爵于太寢命曰勞酒主治水服主驚悸癲邪安神定魄強志藏之入官不懼利見大官宜婚市王者封禪五色上次之藏器附録社稷壇土藏器曰牧宰臨官自取塗門户令盜賊不入境也春牛土藏器曰收角上土置户上令人宜田時珍曰宋時立春日進春牛御藥院取牛睛以充眼藥今人鞭春時庶民爭取牛土云宜蠶取土撒簷下云辟蚰蜒富家土蔵器曰七月丑日取中庭土泥竈令人富勿令人知時珍曰除日取富家田中土泥竈招吉亭部中土時珍曰取作泥塗竈水火盜賊不經塗屋四角鼠不食蠶塗倉鼠不食稻塞穴百日鼠皆絶去出隂陽雜書云道中熱土拾遺主治夏月暍死以土積心口少冷即易氣通則甦藏器亦可以熱土圍臍旁令人尿臍中仍用熱土大蒜等分搗水去滓灌之即活時珍十字道上土主治主頭面黄爛瘡同竈下土等分傅之時珍車輦土拾遺主治惡瘡出黄汁取鹽車邊脂角上土塗之藏器行人暍死取車輪土五錢水調澄清服一盌即甦又小兒初生無膚色赤因受胎未得土氣也取車輦土碾傅之三日後生膚時珍市門土拾遺釋名時珍曰日中為市之處門柵也主治婦人易産入月帶之産時酒服一錢藏器户限下土拾遺釋名時珍曰限即門閾也主治産後腹痛熱酒服一錢又治吹奶和雄雀糞暖酒服方寸匕藏器千步峰綱目集解時珍曰此人家行步地上髙起土也乃人往來鞋履沾積而成者技家言人宅有此主興旺主治便毒初發用生薑蘸醋磨泥塗之時珍鞋底下土拾遺主治適他方不伏水土刮下和水服即止藏器柱下土拾遺主治腹痛暴卒水服方寸匕藏器胞衣不下取宅中柱下土研末雞子清和服之思邈牀脚下土拾遺主治猘犬咬和水傅之灸七壯藏器燒尸塲上土綱目主治邪瘧取帶黑土同葱搗作丸塞耳或繋膊上即止男左女右時珍附方新四好魘多夢燒人灰置枕中履中自止本草拾遺尸厥卒死不知人者燒尸塲土二三錢擂細湯泡灌之即活如無以竈心土代之何氏方小兒夜啼燒尸塲土置枕邊集簡方脚底多汗燒人塲上土鋪于鞋底内蹉之灰亦可集𤣥方塚上土拾遺主治瘟疫五月一日取土或磚石入瓦器中埋着門外階下合家不患時氣又正旦取古塚磚呪懸大門上一年無疫疾藏器附方新一腸癰死人塚上土作泥塗之良千金方桑根下土拾遺主治中惡風惡水而肉腫者水和傅上灸二三十壯熱氣透入即平藏器胡燕窠土拾遺主治無毒同屎作湯浴小兒去驚邪𢎞景主風瘙癮疹及惡刺瘡浸淫瘑瘡遍身至心者死並水和傅之三兩日瘥藏器治口吻白秃諸瘡時珍附方舊三新八濕瘑疥瘡胡燕窠大者用托子處土為末以淡鹽湯洗拭乾傅之日一上品小方黄水肥瘡燕窠土一分麝香半分研傅之普濟方浸淫濕瘡發於心下者不早治殺人用胡燕窠中土研末水和傅葛氏口角爛瘡燕窠泥傅之良救急方白秃頭瘡百年屋下燕窠泥蠮螉窠研末剃後麻油調搽聖濟錄蠼螋尿瘡遶身汗出以燕窠中土和猪脂苦酒傅之外臺秘要瘭疽惡瘡着手足肩背累累如赤豆出汁剝痂以温醋米泔洗淨用胡燕窠土和百日男兒屎傅之千金方皮膚中毒名癥疰用醋和燕窠土傅之千金方風瘙隠疹胡燕窠土水和傅之千金方小兒丹毒向陽燕窠土為末雞子白和傅衞生易簡方一切惡瘡燕窠内外泥糞研細油調搽一加黄蘗末瑞竹堂方百舌窠中土拾遺主治蚯蚓及諸惡蟲咬瘡醋調傅之藏器土蜂窠拾遺釋名蠮螉窠時珍曰即細腰蜂也氣味甘平無毒主治癰腫風頭别錄小兒霍亂吐瀉炙研乳汁服一錢聖恵醋調塗腫毒及蜘蛛咬藏器醋調塗蜂蠆毒宗奭治丁腫乳蛾婦人難産時珍附方新六女人難産土蜂兒窠水泡湯飲之取時逢單是男雙是女最驗婦人良方腫毒焮痛陳藏器本草用醋和泥蜂窠塗之則直指加川烏頭等分云未結則㪚已結破也丁瘡腫毒土蜂窠煅蛇皮燒等分酒服一錢直指方咽喉乳蛾土蜂窠一箇為末先用楮葉擦破病人舌令血出以醋和末用翎㸃之令痰涎出為效後用竹根擂水服數口取利瑞竹堂方手足發指毒痛不可忍用壁間泥蜂窠為末入乳香少許研勻以醋調塗乾即以醋潤之方竒效蠼螋尿瘡螟蛉窠水調傅之集𤣥方蜣蜋轉丸拾遺釋名土硝藏器曰此蜣蜋所推丸也藏在土中掘地得之正圓如人捻作彌乆者佳氣味鹹苦大寒無毒主治湯淋絞汁服療傷寒時氣黄疸煩熱及霍亂吐瀉燒存性酒服治項癭塗一切瘻瘡藏器鬼屎拾遺集解藏器曰生隂濕地如屎亦如地錢黄白色主治人馬反花瘡刮取和油塗之藏器鼠壤土拾遺釋名時珍曰柔而無塊曰壤主治中風筋骨不隨冷痺骨節疼手足拘急風掣痛偏枯死肌多收曝乾蒸熱袋盛更互熨之藏器小兒尿和塗丁腫思邈鼢鼠壤土拾遺集解藏器曰此是田中尖嘴小䑕也隂穿地中不能見日主治鬼疰氣痛􅐕米泔汁和作餅燒熱綿裹熨之又主腫毒和醋傅之極效藏器孕婦腹内鍾鳴研末二錢麝香湯下立愈時珍屋内壖下蟲塵土拾遺釋名時珍曰壖音軟平聲河邊地及垣下地皆謂之壖主治惡瘡乆不乾油調傅之藏器蟻蛭土拾遺釋名蟻封時珍曰垤音迭髙起也封聚土也主治狐刺瘡取七粒和醋搽又死胎在腹及胞衣不下炒三升囊盛搨心下自出也藏器白蟻泥綱目主治惡瘡腫毒用松木上者同黄丹各炒黑研和香油塗之取愈乃止時珍蚯蚓泥綱目釋名蚓螻音婁六一泥氣味甘酸寒無毒主治赤白乆熱痢取一升炒煙盡沃汁半升濾淨飲之藏器小兒隂囊忽虛熱腫痛以生甘草汁入輕粉末調塗之以鹽研傅瘡去熱毒及蛇犬傷日華𫝊狂犬傷出犬毛神效蘇恭附方舊五新十七斷截熱瘧邵氏青囊方用五月五日午時取蚯蚓糞以麵和丸梧子大硃砂為衣毎服三丸無根水下忌生冷即止皆效或加菖蒲末獨頭蒜同丸傷寒譫語蚯蚓屎涼水調服簡便方小便不通蚯蚓糞朴硝等分水和傅臍下即通皆效方小兒吐乳取田中地龍糞一兩研末空心以米湯服半錢不過二三服效聖恵方小兒卵腫地龍糞以薄荷汁和塗之危氏得效方婦人吹乳用韭地中蚯蚓屎研細篩過米醋調厚傅乾則換三次即愈涼水調亦可藺氏經驗方時行腮腫柏葉汁調蚯蚓泥塗之丹溪方一切丹毒水和蛐蟮泥傅之外臺脚心腫痛因乆行乆立致者以水和蚯蚓糞厚傅一夕即愈永類鈴方耳後月蝕燒蚯蚓糞豬脂和傅子母秘錄聤耳出水成瘡蚯蚓糞為末傅之并吹入千金方齒斷宣露蚯蚓水和成團煅赤研末臘豬脂調傅之日三方千金咽喉骨哽五月五日午時韭畦中面東勿語取蚯蚓泥取之毎用少許擦喉外其骨自消名六一泥蜈蚣螫傷蚯蚓泥傅之效集效方金瘡困頓蚯蚓屎末水服方寸匕日三服千金方解射罔毒蚯蚓屎末井水服二方寸匕千金方吐血不止石榴根下地龍糞研末新汲水服三錢聖恵反胃轉食地龍糞一兩木香三錢大黄七錢為末毎服五錢無根水調服忌煎􅘤酒醋椒薑熱物一二服其效如神邵真人經驗方燕窩生瘡韭地蛐蟮屎米泔水和煅過入百草霜等分研末香油調塗之摘𤣥方小兒頭熱鼻塞不通濕地龍糞捻餅貼􅇟上日數易之聖恵方足臁爛瘡韭地蚯蚓泥乾研入輕粉清油調傅便民圖外腎生瘡蚯蚓屎二分綠荳粉一分水研塗之乾又上之便民圖纂螺螄泥綱目主治性涼主反胃吐食取螺螄一斗水浸取泥晒乾毎服一錢火酒調下時珍白鱓泥綱目主治火帶瘡水洗取泥炒研香油調傅時珍豬槽上垢土拾遺主治難產取一合和麵半升烏豆二十顆煑汁服藏器火燄丹毒赤黑色取槽下泥傅之乾又上時珍犬尿泥綱目主治妊娠傷寒令子不落塗腹上乾即易時珍驢尿泥拾遺主治蜘蛛咬傅之藏器尿坑泥綱目主治主蜂蠍諸蟲咬取塗之時珍糞坑底泥綱目主治發背諸惡瘡隂乾為末新水調傅其痛立止時珍附方新一丁腫糞下土蟬蜕全蠍等分搗作錢大餅香油煎滚温服以滓傅瘡四圍丁自出也總聖濟錄簷溜下泥綱目主治猪咬蜂螫蟻叮蛇傷毒並取塗之又和羊脂塗腫毒丹毒時珍附方新一蠍蠆螫叮蠍有雌雄雄者痛在一處以井底泥封之乾則易雌者痛牽諸處以瓦溝下泥封之若無雨以新汲水從屋上淋下取泥肘後方田中泥綱目主治馬蝗入人耳取一盆枕耳邊聞氣自出人誤吞馬蝗入腹者酒和一二升服當利出時珍井底泥証類主治塗湯火瘡證類療妊娠熱病取傅心下及丹田可護胎氣時珍附方新五頭風熱痛井底泥和大黄芒硝末傅之千金方胎衣不下井底泥一雞子大井華水服即下集𤣥方臥忽不寤勿以火照但痛嚙其踵及足拇趾甲際而多唾其面以井底泥塗其目令人垂頭入井中呼其姓名便甦也肘後方小兒熱癤井底泥傅其四圍談野翁方蜈蚣螫人井底泥頻傅之千金方烏爹泥綱目釋名烏壘泥綱目孩兒茶時珍曰烏爹或作烏丁皆畨語無正字集解時珍曰烏爹泥出南畨𤓰哇暹羅諸國今雲南老撾暮雲塲地方造之云是細茶末入竹筒中堅塞兩頭埋汚泥溝中日乆取出搗汁熬制而成其塊小而潤澤者為上塊大而焦枯者次之氣味苦濇平無毒主治清上膈熱化痰生津塗金瘡一切諸瘡生肌定痛止血收濕時珍附方新八鼻淵流水孩兒茶末吹之良本草權度牙疳口瘡孩兒茶硼砂等分為末搽之母積徳堂方治走馬牙疳用孩兒茶雄黄貝等分為末米泔潄淨搽之下疳隂瘡外科用孩兒茶末米泔洗淨傅之神效或加胡黄連等分纂竒方孩兒茶一錢真珠一分片腦半分為末傅之片唐氏用孩兒茶一錢輕粉一分腦一分為末搽之痔瘡腫痛孩兒茶麝香為末唾津調傅孫氏集效方脱肛氣熱孩兒茶二分熊膽五分片腦一分為末人乳搽肛上熱汁自下而肛收也亦治痔瘡董炳方彈丸土拾遺主治婦人難產熱酒服一錢藏器自然灰拾遺集解藏器曰生南海畔狀如黄土灰可澣衣琉璃瑪瑙玉石以此灰埋之即爛如泥至易雕刻主治白癜風癧瘍風重淋取汁和醋傅之以布揩破乃傅之為瘡勿怪藏器伏龍肝别錄下品釋名竈心土𢎞景曰此竈中對釡月下黄土也以竈有神故號為伏龍肝并以迂隠其名爾今人又用廣州鹽城屑以療漏血瘀血亦是近月之土蓋得火燒之義也斅曰凡使勿誤用竈下土其伏龍肝是十年以來竈額内火氣積乆自結如赤色石中黄其形貌八稜取得研細以水飛過用時珍曰按廣濟厯作竈忌日云伏龍在不可移作則伏龍者乃竈神也後漢書言隂子萬臘日晨炊而竈神見形註云宜市買豬肝泥竈令婦孝則伏龍肝之名義又取此也臨安陳輿言砌竈時納豬肝一具于土俟其日乆與土為一乃用之始與名符蓋本于此獨孤滔丹書言伏龍肝取經十年竈下掘深一尺有色如紫甃者是真可縮賀伏丹砂蓋亦不知豬肝之義而用竈下土以為之也氣味辛微温無毒權曰鹹大明曰熱微毒主治婦人崩中吐血止欬逆血醋調塗癰腫毒氣别錄止鼻紅腸風帶下尿血洩精催生下胞及小兒夜啼大明治心痛狂顛風邪蠱毒妊娠䕶胎小兒臍瘡重舌風噤反胃中惡卒魘諸瘡時珍附方舊十六新十七卒中惡氣伏龍肝末一雞子大水服取吐千金方魘寐暴絶竈心對鍋底土研末水服二錢更吹入鼻即甦千金方中風口噤不語心煩恍惚手足不隨或腹中痛滿或時絶而復甦伏龍肝末五升水八升攪澄清濯之千金方狂顛謬亂不識人伏龍肝末水服方寸匕日三服千金方小兒夜啼伏龍肝末二錢硃砂一錢麝香少許為末蜜丸綠豆大每服五丸桃符湯下普濟方小兒重舌釡下土和苦酒塗之千金方重舌腫木伏龍肝末牛蒡汁調塗之聖恵方冷熱心痛伏龍肝末方寸匕熱以水温冷以酒服外臺秘要反胃吐食竈中土年乆者為末米飲服三錢經驗百一選方卒然欬𠻳釡月土一分䜴七分搗丸梧桐子大每飲下四十丸肘後方吐血䘐血伏龍肝末半升新汲水一升淘汁和蜜服廣利方吐血瀉血心腹痛伏龍肝地罏土多年煙壁土等分每服五錢水二盌煎一盌澄清空心服白粥補之普濟方婦人血漏伏龍肝半兩阿膠蠶沙炒各一兩為末每空肚酒服二三錢以知為度寇氏衍義赤白帶下日乆黄瘁六脈微濇伏龍肝炒烟盡等分為末入龍腦麝香各少許每服三錢温酒或淡醋湯下一年者半月可安全大方産後血氣攻心痛惡物不下用竈中心土研末酒服二錢㵼出惡物立效救急方妊娠熱病伏龍肝末一雞子許水調服之仍以水和塗臍方寸乾又上傷寒類要子死腹中母氣欲絶伏龍肝末三錢水調下十全博效方横生逆產竈中心對鍋底􅁟細研毎服一錢酒調仍搽母臍中救急方胞衣不下竈下土一寸醋調納臍中續服甘草湯三四合寳產中諸蠱毒伏龍肝末一雞子大水服取吐千金方六畜肉毒方同上隂冷發悶冷氣入腹腫滿殺人釡月下土和雞子白傅之千金方男隂卒腫方同上諸腋狐臭伏龍肝末頻傅之千金方聤耳出汁綿裹伏龍肝末塞之日三易録聖濟小兒臍瘡伏龍肝末傅之聖恵方小兒丹毒多年竈下黄土末和屋漏水傅之新汲水亦可雞子白或油亦可乾即易肘後方小兒熱癤釡下土生椒末等分醋和塗之千金方臁瘡乆爛竈内黄土年乆者研細末黄蘗黄丹赤石脂輕粉末等分清油調入油絹中貼之勿動數日愈縱痒忍之良濟急方發背欲死伏龍肝末酒調厚傅之乾即易平乃止千金方一切癰腫伏龍肝以蒜和作泥貼之乾再易或雞子黄和亦可秘外臺要杖瘡腫痛釡月下土為末油和塗之臥羊皮上頻塗千金方灸瘡腫痛竈中黄土末煑汁淋之千金方土墼音急綱目釋名煤赭時珍曰此是燒石灰窑中流結土渣也輕虛而色赭主治婦人鼈瘕及頭上諸瘡凡人生痰核如指大紅腫者為末以菜子油調搽其腫即消或出膿以膏藥貼之時珍附方新一白秃臘梨灰窑内燒過紅土墼四両百草霜一兩雄黄一兩膽礬六錢榆皮三錢輕粉一錢為末豬膽汁調剃頭後搽之百發百中神方也陸氏積徳堂方甘鍋綱目釋名銷金銀鍋吳人收瓷器屑碓舂為末篩澄取粉呼為滓粉用膠水和劑作鍋以銷金銀者主治偏墜疝氣研末熱酒調服二錢又主煉眉瘡湯火瘡研末入輕粉少許傅之鍋上黝爛肉時珍砂鍋綱目集解時珍曰沙土埏埴燒成者主治消積塊黄腫用年乆者研末水飛過作丸毎酒服五錢時珍瓷器唐本草集解恭曰定州者良餘皆不如時珍曰此以白土為坯坯燒成者古人以代白堊用今饒州者亦良氣味平無毒主治婦人帶下白崩止嘔吐破血止血水磨塗瘡滅瘢唐本研末傅癰腫可代鍼又㸃目去翳時珍附方舊二新七鼻衂不止定州白瓷細末吹少許立止經驗方吐血不止上色白瓷器末二錢皁莢子仁煎湯下連服三服即愈聖濟方小便淋痛真定瓷器煅研二兩生熟地黄末各一兩毎用二錢木通煎湯服傳信適用方一切􅀈􅋜處州瓷器為末發時用二錢以手指㸃津液蘸藥㸃舌下嚥之即效普濟方目生翳膜用細料白瓷鍾一箇大火煅過研末紙篩加雄黄二分為末早晚各㸃少許不可多用牛角簪撥出翳膜為妙若紅用人退末㸃四角即愈方孫天人集效身面白丹白瓷瓦末和豬脂塗之梅師方赤黑丹疥或痒或燥不急治遍身即死白瓷末豬脂和塗之聖濟錄湯火傷灼多能鄙事用青瓷盌片為末水飛過和桐油傅數次瘥一活幼口議用景徳鎮瓷器打碎埋竈内炭火鋪上夜取出去火毒為末入黄丹少許傅之立愈烏古瓦唐本草集解時珍曰夏桀始以泥坯燒作瓦氣味甘寒無毒主治以水煑及漬汁飲止消渴取屋上年深者良唐本煎湯服解人心中大熱甄權止小便煎汁服大明研末塗湯火傷藏器治折傷接骨時珍附方舊一新六暑月暍死屋上兩畔瓦熱熨心頭冷即易之千金方折傷筋骨秘傳神效散治跌撲傷損骨折骨碎筋斷痛不可忍此藥極能理傷續斷累用累驗用路上牆脚下往來人便溺處乆碎瓦片一塊洗淨火煅米醋淬五次黄色為度刀刮細末毎服三錢好酒調下在上食前在下食後不可以輕易而賤之誠神方也邵以正真人經驗方湯火傷灼取多年屋上吻獸為末油和塗之立効儒門事親方灸牙痛法取土底年深既古且潤三角瓦一塊令三姓童子候星初出時指第一星下火于瓦上灸之本草拾遺唇吻生瘡新瓦為末生油調塗𤣥集方瘢痕凸起熱瓦頻熨之千金方蜂蠆螫傷瓦摩其上唾二七遍置瓦於故處方千金古磚拾遺主治噦氣水煑汁服之乆下白痢虚寒者秋月小腹多冷者並燒熱布裹坐之令熱氣入腹良又治婦人五色帶下以麫作煎餅七箇安于燒赤黄磚上以黄𤓰蔞傅麫上安布兩重令患者坐之令藥氣入腹熏之當有蟲出如蠶子不過三五度瘥藏器附方新三寒濕脚氣磚燒紅以陳臭米泔水淬之乗熱布包三塊用􅂰夾住綿被覆之三五次愈方扶夀赤眼腫痛新磚浸糞池中年乆取放隂處生花刷下入腦子和㸃之普濟方臀生濕瘡日以新磚坐之能去濕氣集𤣥方煙膠綱目集解時珍曰此乃熏硝牛皮竈上及燒瓦窑上黒土也主治頭瘡白秃疥瘡風癬癢痛流水取牛皮竈岸為末麻油調塗或和輕粉少許時珍附方新三牛皮血癬烟膠三錢寒水石三錢白礬二錢花椒一錢半為末臘猪脂調搽積徳堂方消渴引飲瓦窰突上黒煤乾似鐵屎者半斤為末入生薑四兩同搗絹袋盛水五升浸汁每飲五合聖濟録胞衣不下竈突後黑土三指撮五更酒下陳藏器墨宋開寳釋名烏金綱目陳𤣥綱目𤣥香綱目烏玉玦時珍曰古者以黒土為墨故字從黒土許慎説文云墨烟煤所成土之類也故從黒土劉熙釋名云墨者晦也集解宗奭曰墨松之烟也世有以粟草灰偽為者不可用須松烟墨方可入藥年逺烟細者為佳粗者不可用今髙麗國每貢墨於中國不知何物合不宜入藥鄜延有石油其煙甚濃其煤可為墨墨光如漆不可入藥時珍曰上墨以松煙用梣皮汁解膠和造或加香藥等物今人多以窰突中墨烟再三以麻油入内用火燒過造墨謂之墨煙墨光雖黒而非松煙矣用者詳之石墨見石炭下烏賊魚腹中有墨馬之寳墨各見本條氣味辛温無毒主治止血生肌膚合金瘡治産後血暈崩中卒下血醋磨服之又止血痢及小兒客忤揭篩温水服之又眯目物芒入目㸃摩瞳子上開寳利小便通月經治癰腫時珍發明震亨曰墨屬金而有火入藥甚健性又能止血附方舊十新六吐血不止金墨磨汁同萊菔汁飲或生地黄汁亦可集簡方䘐血不止眩冐欲死濃墨汁滴入鼻中梅師方熱病䘐血出數升者取好墨為末雞子白丸梧子大用生地黄汁下一二十丸少頃再服仍以蔥汁磨墨滴入鼻内即止外臺秘要大小便血好墨細末二錢阿膠化湯調服熱多者尤相宜寇氏本草衍義卒淋不通好墨燒一兩為末毎服一字温水服普濟方赤白下痢薑墨丸用乾薑好墨各五兩為末醋漿和丸梧子大毎服三四十丸米飲下日夜六七服愈肘後方崩中漏下青黄赤白使人無子好墨一錢水服日二服肘後方墮胎血溢不止墨三兩火燒醋淬三次出火毒沒藥一兩為末毎服二錢醋湯下普濟方婦人難産墨一寸末之水服立瘥肘後方胎死腹中新汲水磨金墨服之普濟方胞衣不出痛引腰脊好墨温酒服二錢肘後方癰腫發背醋磨濃墨塗四圍以猪膽汁塗之乾又上一夜即消趙氏方客忤中惡多於道間門外得之令人心腹絞痛脹滿氣沖心胸不即治殺人搗墨水和服二錢肘後方飛絲入目磨濃墨㸃之即出千金方塵物入目方同上産後血暈心悶氣絶以丈夫小便研濃墨一升服子母秘錄釡臍墨四聲釋名釡月中墨四聲鐺墨開寳釡煤綱目釡炲綱目鍋底墨時珍曰大者曰釡曰鍋小者曰鐺氣味辛温無毒主治中惡蠱毒吐血血運以酒或水温服二錢亦塗金瘡止血生肌開寳消食積舌腫喉痺口瘡陽毒發狂時珍發明頌曰古方治傷寒黑奴丸用釡底墨竈突墨梁上塵三物同合諸藥為其功用相近耳附方舊七新六卒心氣痛鐺墨二錢熱小便調下千金方中惡心痛鐺墨五錢鹽一錢研勻熱水一盞調下千金方轉筋入腹釡底墨末和酒服一錢肘後方霍亂吐下鍋底墨煤半錢竈額上墨半錢百沸湯一盞急攪數千下以盌覆之通口服一二口立止方經驗吐血咯血鍋底墨炒過研細井華水服二錢連進三服濟急方婦人逆産以手中指取釡下墨交畫兒足下即順千金方産血不下鍋底墨煙熱酒服二錢編生生舌卒腫大如豬脬狀滿口不治殺人釡墨和酒塗之千金方鼻氣壅塞水服釡墨一錢千金方鼻中息肉方同上三五日愈普濟方聤耳膿血月下灰吹滿耳深入無苦即自出肘後方小兒口瘡釡底墨時時搽之普濟方手搔瘡腫作膿用鍋臍墨研細清油調搽簡便方百草霜綱目釋名竈突墨綱目竈額墨時珍曰此乃竈額及煙罏中墨煙也其質輕細故謂之霜氣味辛温無毒主治消化積滯入下食藥中用蘇頌止上下諸血婦人崩中帶下胎前産後諸病傷寒陽毒發狂黄疸瘧痢噎膈咽喉口舌一切諸瘡時珍發明時珍曰百草霜釡底墨梁上倒掛塵皆是烟氣結成但其體質有輕虚結實之異重者歸中下二焦輕者入心肺之分古方治陽毒發狂黒奴丸三者並用而内有麻黄大黄亦是攻解三焦結熱兼取火化從治之義其消積滯亦是取其從化故疝膈瘧痢諸病多用之其治失血胎産諸病雖是血見黒則止亦不離從化之理附方新二十䘐血不止百草霜末吹之立止也䘐血吐血劉長春經驗方治吐血及傷酒食醉飽低頭掬損肺臟吐血汗血口鼻妄行但聲未失者用鄉外人家百草霜末糯米湯服二錢兩一方百草霜五錢槐花末二毎服二錢茅根湯下齒縫出血百草霜末摻之立止簡集方婦人崩中百草霜二錢狗膽汁拌勻分作二服當歸酒下經驗方胎動下血或胎已死百草霜二錢㯶灰一錢伏龍肝五錢為末毎服一二錢白湯入酒及童尿調下筆峰雜興方胎前産後逆生横生瘦胎前産後虚損月候不調崩中百草霜白芷等分為末毎服二錢童子小便醋各少許調勻熱湯化服不過二服杜壬方婦人白帶百草霜一兩香金墨半兩研末毎服三錢猪肝一葉批開入藥在内紙裹煨熟細嚼温酒送之永類方臟毒下血百草霜五錢以米湯調露一夜次早空心服邵真人經驗方暴作瀉痢百草霜末米飲調下二錢方續千金一切痢下初起一服如神名鐵刷丸百草霜三錢金墨一錢半夏七分巴豆煑十四粒研勻黄蠟三錢同香油化開和成劑量大小每服三五丸或四五十丸薑湯下灊江方小兒積痢駐車丸用百草霜二錢巴豆煨去油一錢研勻以飛羅麵糊和丸綠荳大毎服三五丸赤痢甘草湯下白痢米飲下紅白薑湯下全幼心鑑挾熱下痢膿血竈突中墨黄連各一兩為末每酒下二錢日二服聖恵方寒熱瘧疾方見鈆丹下魘寐卒死鍋底墨水灌二錢并吹鼻醫説尸厥不醒脈動如故竈突墨彈丸漿水和飲仍針百㑹足大趾中趾甲側千金方咽中結塊不通水食危困欲死百草霜蜜和丸芡子大每新汲水化一丸灌下甚者不過二丸名百靈丸普濟方鼻瘡膿臭百草霜末冷水服二錢三因方白秃頭瘡百草霜和豬脂塗之簡便方頭瘡諸瘡以醋湯洗淨百草霜入膩粉少許生油調塗立愈證類本草瘭疽出汗着手足有背累累如米用竈突墨竈屋塵釡下土研勻水一斗煑三沸取汁洗日三四度外臺秘要梁上塵唐本草釋名倒掛塵名烏龍尾綱目烟珠修治斆曰凡梁上塵須去烟火大逺髙堂殿上者拂下篩淨末用時珍曰凡用倒掛塵燒令烟盡篩取末入藥雷氏所説似是梁上灰塵今人不見用氣味辛苦微寒無毒大明曰平主治腹痛噎膈中惡鼻䘐小兒軟瘡唐本食積止金瘡血出齒齗出血時珍附方舊七新十二翻胃吐食梁上塵黑驢尿調服之集簡方霍亂吐利屋下倒掛塵滚湯泡澄清服即止衛生易簡方小便不通梁上塵二指撮水服之外臺秘要大腸脱肛烏龍尾即梁上塵同鼠尿燒烟于桶内坐上薰之數次即不脱也濟急喉痺乳蛾烏龍尾枯礬猪牙皁莢以鹽炒黄等分為末或吹或㸃皆妙孫氏集効方牙痛㗜鼻壁上掃土用鹽炒過為末隨左右㗜鼻普濟方鼻中息肉梁塵吹之普濟方夜臥魘死勿用火照急取梁塵納鼻中即活瑣碎錄卒自縊死梁上塵如荳大各納一筒中四人同時極力吹兩耳及鼻中即活外臺秘要經血不止烏龍尾炒烟盡荆芥穂各半兩為末毎服二錢茶下聖濟錄婦人胎動十月未足欲産梁上塵竈突墨等分酒服方寸匕方千金横生逆産梁上塵酒服方寸匕子母秘錄婦人妬乳醋和梁上塵塗之千金方石癰不膿梁上塵灰葵根莖灰等分用醋和傅之千金方發背腫痛廚内倒弔塵為末以生蔥極嫩心同搗膏傅之留頂一日一換乾以水潤之瀕湖集簡方無名惡瘡梁上倒掛塵二條韭地蚯蚓泥少許生蜜和捻作餅如錢大隂乾用蜜水調頻傅之便楊起簡方小兒頭瘡浸淫成片梁上塵和油瓶下滓以皁莢湯洗後塗之子母秘錄小兒赤丹屋塵和臘猪脂傅之千金方老𠻳不止故茅屋上塵年乆着烟火者和石黄欵冬花婦人月經衣帶為末水和塗茅上待乾入竹筒中燒烟吸嚥無不瘥也陳藏器本草門臼塵綱目主治止金瘡出血又諸般毒瘡切蒜蘸擦至出汗即消時珍寡婦牀頭塵土拾遺主治耳上月割瘡和油塗之藏器瓷甌中白灰拾遺集解藏器曰瓷器物初燒時相隔皆以灰為泥然後燒之但為瓷裏有灰即收之備用主治游腫醋摩傅之藏器香爐灰綱目主治跌撲金刅傷損罨之止血生肌香爐岸疥瘡時珍鍛竈灰别錄下品集解𢎞景曰此鍛鐵竈中灰耳兼得鐵力故也主治癥瘕堅積去邪惡氣别錄恭曰療暴瘕有効古方貳車丸中用之附方新一産後隂脱鐵罏中紫塵羊脂二味和勻布裹炙熱熨推納上徐氏胎産方冬灰本經下品釋名宗奭曰諸灰一􅅡而成其體輕力劣惟冬灰則經三四月方撒罏其灰既曉夕燒灼其力全燥烈而體益重故也集解别録曰冬灰生方谷川澤𢎞景曰此即今浣衣黄灰爾燒諸蒿藜積聚鍊作之性亦烈荻灰尤烈恭曰冬灰本是藜灰餘草不真又有青蒿灰柃灰一作苓字乃燒木葉作並入染家用亦蝕惡肉時珍曰冬灰乃冬月竈中所燒薪柴之灰也專指作蒿藜之灰亦未必然原本一名藜灰生方谷川澤殊為不通此灰既不當言川澤又豈獨方谷乃有耶今人以灰淋汁取鹻浣衣發麵令晢治瘡蝕惡肉浸藍靛染青色氣味辛微温有毒主治去黑子肬息肉疽蝕疥瘙本經煑豆食大下水腫蘇恭醋和熱灰熨心腹泠氣痛及血氣絞痛泠即易藏器治犬咬熱灰傅之又治溺死凍死蝕諸癰疽惡肉時珍發明時珍曰古人治人溺水死用竈中灰一石埋之從頭至足惟露七孔良乆即甦凡蠅溺水死試以灰埋之少頃即便活甚驗蓋灰性暖而能拔水也附方新七人溺水死方見上墮水凍死只有㣲氣者勿以火炙用布包袋盛熱灰放在心頭冷即換待眼開以温酒與之普濟方隂冷疼悶冷氣入腹腫滿殺人醋和熱灰頻熨之千金方湯火傷灼餅罏中灰麻油調傅不得着水仍避風寇氏衍義犬咬傷人苦酒和灰傅之或熱湯和之千金方石鹼補遺釋名灰鹼花鹼時珍曰狀如石類鹼故亦得鹼名集解時珍曰石鹼出山東濟寜諸處彼人采蒿蓼之屬開窖浸水漉起晒乾燒灰以原水淋汁毎百引入粉麵二三斤乆則凝淀如石連汁貨之四方澣衣發麵甚獲利也他處以竈灰淋濃汁亦去垢發麵氣味辛苦温微毒主治去濕熱止心痛消痰磨積塊去食滯洗滌垢膩量虚實用過服損人震亨殺齒蟲去目瞖治噎膈反胃同石灰爛肌肉潰癰疽瘰癧去瘀肉㸃痣魘疣贅痔核神效時珍附方新六多年反胃方見鉛下消積破氣石鹼三錢山查三兩阿魏五錢半夏皁莢水制過一兩為末以阿魏化醋煑糊丸服摘𤣥方一切目疾白鹼揀去黑碎者厚紙七層包掛風處四十九日取研極細日日㸃之普濟方拳毛倒睫用刀微劃動以藥泥眼胞上睫自起也石鹼一錢石灰一錢醋調塗之摘𤣥方蟲牙疼痛花鹻填孔内立止儒門事親痣黶疣贅花鹼礦灰以小麥稈灰汁煎二味令乾等分為末以針刺破水調㸃之三日三上即去須新合乃効聖劑録本草綱目卷七
