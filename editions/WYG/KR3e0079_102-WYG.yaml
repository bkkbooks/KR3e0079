body:
  text: 本草綱目卷四十三明李時珍撰鱗之一龍類九種龍本經上品釋名時珍曰按許慎説文龍字篆文象形生肖論云龍耳虧聰故謂之龍梵書名那伽集解時珍曰爾雅翼云龍者鱗蟲之長王符言其形有九似頭似駝角似鹿眼似鬼耳似牛項似蛇腹似蜃鱗似鯉爪似鷹掌似虎背有八十一鱗具九九陽數聲如戞銅盤口有鬚髯頷有明珠喉有逆鱗頭有博山又名尺木龍無尺木不能升天呵氣成雲既能變水又能變火埤雅云龍火得濕則熖得水則燔以人火逐之即息故人之相火似之龍卵生思抱雄鳴上風雌鳴下風因風而化釋典云龍交則變為二小蛇又小説載龍性粗猛而愛美玉空青嗜燕肉畏鐵及菵草蜈蚣楝葉五色絲故食燕者忌渡水祈雨者用燕鎮水患者用鐵激龍者用菵草祭屈原者用楝葉色絲裹糭投江醫家用龍骨當知其性如此龍骨别録曰生晉地川谷及太山巖水岸土穴中死龍處採無時𢎞景曰今多出梁益巴中骨欲得脊腦作白地錦文䑛之著舌者良齒小强猶有齒形角强而實皆是龍蜕非實死也斆曰剡州滄州太原者為上其骨細文廣者是雌骨粗文狹者是雄五色具者上白色黄色者中黒色者下凡經落不淨及婦人採者不用普曰色青白者良恭曰今並出晉地生硬者不好五色具者良其青黄赤白黒亦應隨色與臟腑相合如五芝五石莢五石脂而本經不論及頌曰今河東州郡多有之李肇國史補云春水至時魚登龍門蜕骨甚多人採為藥有五色者龍門是晉地與本經合豈龍骨即此魚之骨乎又孫光憲北夢鎻言云五代時鎮州闘殺一龍鄉豪曹寛取其雙角角前一物如藍色文如亂錦人莫知識則龍亦有死者矣宗奭曰諸說不一終是臆度曾有崖中崩出一副皮體頭角皆備不知蛻耶斃耶謂之蛻斃則有形之物不得生見死方可見謂之化則其形獨不可化與璣曰經文言死龍之骨若以謂蛻終是臆説時珍曰龍骨本經以為死龍陶氏以為蛻骨蘇冦諸說皆兩疑之竊謂龍神物也似無自死之理然觀蘇氏所引鬬死之龍及左傳云豢龍氏醢龍以食述異記云漢和帝時大雨龍墮宮中帝命作羹賜羣臣博物志云張華得龍肉鮓言得醋則生五色等説是龍固有自死者矣當以本經為正修治斆曰凡用龍骨先煎香草湯浴兩度搗粉絹袋盛之用燕子一隻去腸肚安袋于内懸井面上一宿取出研粉入補腎藥中其効如神時珍曰近世方法但煅赤為粉亦有生用者事林廣記云用酒浸一宿焙乾研粉水飛三度用如急用以酒煮焙乾或云凡入藥須水飛過晒乾毎觔用黒豆一斗蒸一伏時晒乾用否則著人腸胃晚年作熱也氣味甘平無毒别録曰㣲寒權曰有小毒忌魚及鐵器之才曰得人參牛黄良畏石膏時珍曰許洪云牛黄惡龍骨而龍骨得牛黄更良有以制伏也其氣收陽中之陰入手足少陰厥陰經主治心腹鬼疰精物老魅欬逆洩痢膿血女子漏下癥瘕堅結小兒熱氣驚癎本經心腹煩滿恚怒氣伏在心下不得喘息腸癰内疽陰蝕四肢痿枯夜卧自驚汗出止汗縮小便溺血養精神定魂魄安五臟白龍骨主多寐洩精小便洩精别録逐邪氣安心神止夜夢鬼交虛而多夢紛紜止泠痢下膿血女子崩中帶下甄權懷孕漏胎止腸風下血鼻洪吐血止㵼痢渴疾健脾澀腸胃日華益腎鎮驚止陰瘧收濕氣脱肛生肌斂瘡時珍發明斆曰氣入丈夫腎臟中故益腎藥宜用之時珍曰澀可去脱故成氏云龍骨能收斂浮越之正氣固大腸而鎮驚又主帶脈為病附方舊十一新七健忘久服聰明益智慧用白龍骨逺志等分為末食後酒服方寸匕日三千金勞心夢洩龍骨逺志等分為末煉蜜丸如梧子大硃砂為衣毎服三十丸蓮子湯下心統暖精益陽前方去硃砂毎冷水空心下三十丸經騐睡即洩精白龍骨四分韭子五合為散空心酒服方寸匕梅師方遺尿淋瀝白龍骨桑螵蛸等分為末毎鹽湯服二錢方梅師老瘧不止龍骨末方寸匕先發一時酒一升半煮三沸及熱服盡温覆取汗即効後肘泄㵼不止白龍骨白石脂等分為末水丸梧子大紫蘇木𤓰湯下量大人小兒用心鑑傷寒毒痢傷寒八九日至十餘日大煩渴作熱三焦有瘡􅉶下痢或張口吐舌目爛口舌生瘡不識人用此除熱毒止痢龍骨半觔水一斗煑四升沈之井底冷服五合漸漸進之外臺方熱病下痢欲死者龍骨半觔研水一斗煑取五升候極冷稍飲得汗即愈効肘後方久痢休息不止者龍骨四兩打碎水五升煑取二升半分五服冷飲仍以米飲和丸毎服十丸肘後方久痢脫肛白龍骨粉撲之姚和衆方鼻衂眩胃欲死者龍骨末吹之梅師方吐血衂血九竅出血並用龍骨末吹入鼻中昔有人衂血一斛衆方不止用此即斷三陳言因方耳中出血龍骨末吹入之三因方男婦溺血龍骨末水服方寸匕日三方千金小兒臍瘡龍骨煅研敷之聖恵方陰囊汗癢龍骨牡蠣粉撲之醫宗三法龍齒修治同龍骨或云以酥炙氣味澀涼無毒當之曰大寒之才曰平得人參牛黄良畏石膏鐡器主治殺精物大人驚癎諸痙癲疾狂走心下結氣不能喘息小兒五驚十二癎本經小兒身熱不可近大人骨間寒熱殺蠱毒别録鎮心安魂魄甄權治煩悶熱狂鬼魅日華發明時珍曰龍者東方之神故其骨與角齒皆主肝病許叔㣲云肝藏魂能變化故魂逰不定者治之以龍齒即此義也龍角修治同骨氣味甘平無毒之才曰畏乾漆蜀椒理石主治驚癎瘈瘲身熱如火腹中堅及熱洩久服輕身通神明延年别録小兒大熱甄權心熱風癎以爛角磨濃汁二合食上服日二次蘇頌方出韋丹發明頌曰骨齒醫家常用角則稀使惟深師五邪丸用之云無角用齒而千金治心病有角齒同用者龍腦主治其形肥軟能斷痢陶𢎞景龍胎主治産後餘疾女人經閉𢎞景曰比來巴中數得龍胞形體具存云治産後餘疾正當末服頌曰許孝宗篋中方言龍胎岀蜀中山澗大類乾魚鱗煎時甚腥臊治女經積年不通同瓦松景天各少許以水兩盞煎一盞去滓分二服少頃腹中轉動便下按此物方家罕知而昔人曽用世當有識者時珍曰胞胎俱出巴蜀皆主血疾葢一物也龍涎機曰龍吐涎沫可制香時珍曰龍涎方藥鮮用惟入諸香云能收腦麝數十年不散又言焚之則翠烟浮空出西南海洋中云是春間羣龍所吐涎沫浮出畨人採得貨之毎兩千錢亦大有魚腹中剖得者其狀初若脂膠黄白色乾則成塊黄黒色如百藥煎而膩理久則紫黒如五靈脂而光澤其體輕飄似浮石而腥臊弔拾遺釋名吉弔時珍曰弔舊無正條惟蘇頌圖經載吉弔脂云龍所生也陳藏器拾遺有予脂一條引廣州記云予蛇頭鱉身膏主蛭刺云云今攷廣州記及太平御覽止云弔蛇頭龜身膏至輕利等語並無所謂蛇頭鱉身子膏主蛭刺之說葢弔字似予龜字以鱉至輕利三字似主蛭刺傳冩訛誤陳氏遂承其誤耳弔既龍種豈有鱉身病中亦無蛭刺之證其誤可知今改正之精名紫稍花集解藏器曰裴淵廣州記云弔生嶺南蛇頭龜身水宿亦木棲其膏至輕利以銅及瓦器盛之浸出惟雞卵殻盛之不漏其透物甚于醍醐摩理毒腫大騐須曰姚和衆延齡至寶方云吉弔脂出福建州甚難得須以琉璃瓶盛之更以樟木盒重貯之不爾則透氣失去也孫光憲北夢𤨏言云海上人言龍毎生二卵一為吉弔多與鹿游或于水邉遺瀝值流槎則枯着木枝如蒲槌狀其色㣲青黄復似灰色號紫稍花坐湯多用之時珍曰按裴姚二説相同則弔脂即吉弔脂無疑矣又陳自明婦人良方云紫稍花生湖澤中乃魚蝦生卵干竹木之上狀如餹潵去木用之此説與孫説不同近時房中諸術多用紫稍花皆得于湖澤其色灰白而輕鬆恐非真者當以孫説為正或云紫稍花與龍涎相類未知是否弔脂一名弔膏氣味有毒主治風腫癰毒􅐊疹赤瘙瘑疥痔瘻皮膚頑痺踠跌折傷内損瘀血以脂塗上炙手熱摩之即透藏器治聾耳不問年月每日㸃入半杏仁許便差蘇頌方出延齡紫稍花氣味甘溫無毒主治益陽祕精療真元虚憊陰痿遺精餘瀝白濁如脂小便不禁囊下濕癢女人陰寒冷帶入丸散及坐湯用時珍如又和劑玉霜丸注云無紫稍花以木賊代之附方新二陽事痿弱紫稍花生龍骨各二錢麝香少許為末􅁡丸梧子大毎服二十丸燒酒下欲解飲生薑甘草湯集簡方陰癢生瘡紫稍花一兩胡椒半兩煎湯温洗數次即愈總㣲論蛟龍綱日附方時珍曰按任昉述異記云蛟乃龍屬其眉交生故謂之蛟有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍也梵書名宫毗羅集解時珍曰按裴淵廣州記云蛟長丈餘似蛇而四足形廣如揗小頭細頸頸有白嬰胃前赭色背上青斑脇邉若錦尾有肉環大者數圍其卵亦大能率魚飛得鱉可免王子年拾遺録云漢昭帝釣於渭水得白蛟若蛇無鱗甲頭有軟角牙出蜃外命大官作鮓食甚美骨青而肉紫據此則蛟亦可食也附録蜃之刄切時珍曰蛟之屬有蜃其狀亦似蛇而大有角如龍狀紅鬛腰以下鱗盡逆食燕子能吁氣成樓臺城郭之狀將雨即見名蜃樓亦曰海市其脂和蠟作燭香凡百歩烟中亦有樓閣之形月令云雉入大水為蜃陸佃云蛇交龜則生龜交雉則生蜃物異而感同也類書云蛇與雉交而生子曰蟂以蛇四足能害人陸禋云蟂音梟即蛟也或曰蜃也又魯至剛云正月蛇與雉交生卵遇雷即入土數丈為蛇形經二三百年乃能升騰卵不入土但為土爾觀此數説則蛟蜃皆是一類有生有化也一種海蛤與此同名羅願以為雉化之蜃未知然否詳介部車螯下精氣味缺有毒時珍曰按張仲景金匱要畧云春夏二時蛟龍帶精入芹菜中人食之則病蛟龍癥痛不可思治以硬餹日服二三升當吐出如蜥蝪狀也唐醫周顧治此用雄黄朴硝煑服下之髓主治傅靣令人好顔色又主易産時珍别出東方朔傳鼉龍本經中品釋名鮀魚本經土龍藏器曰本經鮀魚合改作鼉鼉形如龍聲甚可畏長一丈者能吐氣成雲致雨既是龍類宜去其魚時珍鼉字象其頭腹足尾之形故名博物志謂之土龍鮀乃魚名非此物也今依陳氏改正之集解别録曰鮀魚甲生南海池澤取無時𢎞景曰即鼉甲也皮可冐鼔性至難死沸湯沃口入腹良久乃剥之藏器曰鼉性嗜睡恒閉目力至猛能攻江岸人于穴中掘之百人掘須百人牽之一人掘亦一人牽之不然終不可出頌曰今江湖極多形似守宫鯪鯉輩而長一二丈背尾俱有鱗甲夜則鳴吼舟人畏之時珍曰鼉穴極深漁人以篾纜繫餌探之候其吞鈎徐徐引出性能横飛不能上騰其聲如鼔夜鳴應更謂之鼉鼔亦曰鼉更俚人聴之以占兩其枕瑩淨勝于魚枕生卵甚多至百亦自食之南人珍其肉以為嫁娶之敬陸佃云鼉身具十二生肖肉惟蛇肉在尾最毒也鼉甲修治酥炙或酒炙用氣味酸㣲溫有毒權曰甘平有小毒日華曰無毒蜀漆為之使畏芫花甘遂狗膽主治心腹癥瘕伏堅積聚寒熱女子小腹陰中相引痛崩中下血五色及瘡疥死肌本經五邪涕泣時驚腰中重痛小兒氣癃皆潰别録小腹氣疼及驚恐孟詵除血積婦人帶下百邪魍魎甄權療牙齒疳慝宣露口華殺蟲治瘰􅊓瘻瘡風頑瘙疥惡瘡炙燒酒浸服之功同鼈甲藏器治陰瘧時珍發明時珍曰鼉甲所主諸證多屬厥陰其功只在平肝木治血殺蟲也千金方治風癲有鼉甲湯今藥肆多懸之云能辟蠧亦殺蟲之意附方舊一腸風痔疾頌曰用皮及骨燒灰米飲空心服二錢甚者入紅雞冠花白礬為末和之肉氣味甘有小毒頌曰肉色似雞而發冷氣痼疾藏器曰梁周興嗣嗜此肉後為鼉所噴便生惡瘡此物有靈不食更佳其涎最毒陶曰肉至補益亦不必食主治少氣吸吸足不立地别録濕氣邪氣諸蟲腹内癥瘕惡瘡藏器脂主治摩風及惡瘡張鼎肝主治五尸病用一具炙熟同蒜虀食肘後鯪鯉别録下品釋名龍鯉郭璞穿山甲圖經石鯪魚時珍曰其形肖鯉穴陵而居故曰鯪鯉而俗稱為穿山甲郭璞賦謂之龍鯉臨海記云尾刺如三角菱故謂石鯪集解頌曰鯪鯉即今穿山甲也生湖廣嶺南及金商均房諸州深山大谷中皆有之𢎞景曰形似鼉而短小又似鯉而有四足黒色能陸能水日中出岸張開鱗甲如死狀誘蟻入甲即閉而入水開甲蟻皆浮出因接而食之時珍曰鯪鯉狀如鼉而小背如鯉而澗首如䑕而無牙腹無鱗而有毛長舌尖喙尾與身等尾鱗夫厚有三角腹内臟腑俱全而胃獨大常吐舌誘蟻食之曾剖其胃約蟻升許也甲修治時珍曰方用或炮或燒或酥炙醋炙童便炙或油煎土炒蛤粉炒當各隨本方未有生用者仍以尾甲乃力勝氣味鹹㣲寒有毒主治五邪驚啼悲傷燒灰酒服方寸匕别録小兒驚邪婦人鬼魅悲泣及疥癬痔漏大明療蟻瘻瘡癲及諸疰疾𢎞景燒灰傅惡瘡又治山嵐瘴瘧甄權除痰瘧寒熱風痺强直疼痛通經脈下乳汁消癰腫排膿血通竅殺蟲時珍發明𢎞景曰此物食蟻故治蟻瘻時珍曰穿山甲入厥陰陽明經古方鮮用近世風瘧瘡科通經下乳用為要藥蓋此物穴山而居寓水而食出陰入陽能竄經絡達于病所故也按劉伯溫多能鄙事云凡油籠滲漏剥穿山甲裏面肉靨投入自至漏處補住又永州記云此物不可於隄岸上殺之恐血入土則隄岸滲漏觀此二説是山可使穿隄可使漏而又能至滲處其性之走竄可知矣諺曰穿山甲王不留婦人食了乳長流亦言其迅速也李仲南言其性専行散中病即止不可過服又按徳生堂經騐方云凡風濕冷痺之證因水濕所致渾身上下强直不能屈伸痛不可忍者于五積散加穿山甲七片㸔病在左右手足或臂脇疼痛處即于鯪鯉身上取甲炮熟同全蝎炒十一箇葱薑同水煎入無灰酒一匙熱服取汗避風甚良附方舊五新十八中風癱瘓手足不舉用穿山甲左癱用右甲右瘓用左甲炮熟大川烏頭炮熟紅海蛤如碁子大者各二兩為末每用半兩𢷬葱白汁和成厚餅徑寸半隨左右貼脚心縳定宻室安坐以脚浸熱湯盆中待身麻汗出急去藥宜謹避風自然手足可舉半月再行一次除根忌口逺色調養亦治諸風疾衛生寶鑑熱瘧不寒穿山甲一兩乾棗十箇同燒存性為末每服二錢發日五更井花水服楊氏家藏下痢裏急穿山甲蛤粉等分同砂研末毎服一錢空心溫酒下方普濟腸痔氣痔出膿血用穿山甲燒存性一兩肉豆蔲三枚為末毎米飲服二錢甚者加蝟皮灰一兩中病即止衍義䑕痔成瘡腫痛用穿山甲尾尖處一兩炙存性龞甲酥炙一兩麝香半錢為末毎服一錢真茶湯服取效直指方蟻瘻不愈鯪鯉甲二七枚燒灰猪脂調傅方千金婦人陰􅒃硬如卵狀隨病之左右取穿山甲之左右邉五錢以沙炒焦黄為末每服二錢酒下摘𤣥方乳汁不通涌泉散用穿山甲炮研末酒服方寸匕日二服外以油梳梳乳即通單驤方乳嵓乳癰方同上吹奶疼痛穿山甲炙焦本通各一兩自然銅生用半兩為末毎服二錢酒下取效圖經痘瘡變黑穿山甲蛤粉炒為末毎服五分入麝香少許溫酒服即發紅色如神直指方腫毒初起穿山甲挿入穀芒熱灰中炮焦為末二兩入麝香少許毎服二錢半溫酒下仁齋直指方馬疔腫毒穿山甲燒存性貝母等物為末酒調服三四次乃用下藥利去惡物即愈鮑氏方便毒便癰穿山甲半兩猪苓二錢並以醋炙研末酒服二錢外穿山甲末和麻油輕粉塗之或只以土塗之直指瘰癧潰壞集騐方用鯪鯉甲二十一片燒研傅之外夀域方用穿山甲土炒斑蝥熟艾等分為末傅之以烏桕葉貼上炙四壯效眉鍊癬瘡生眉中者穿山甲前膞炙焦為末清油和輕粉調傅直指方蟻入耳内鯪鯉甲燒研水調灌入即出肘後聤耳出濃穿山甲燒存性入麝香少許吹之三日水乾即愈方鮑氏小兒耳内疼痛穿山甲二箇夾土狗二箇同炒焦黄為末毎吹一字入耳内亦治耳聾普濟方耳鳴耳聾卒聾及腎虚耳内如風水鐘鼔聲用穿山甲一大片以蛤粉炒赤蝎稍七箇麝香少許為末以麻油化蠟和作挺子綿裹塞之攝生方火眼赤痛穿山甲一片為末鋪白紙上捲作繩燒烟熏之夀域方倒睫拳毛穿山甲竹刀刮去肉將羊腎脂抹甲上炙黄如此七次為末隨左右眼用一字㗜鼻内口中噙水日用三次二月取效儒門事親肉氣味甘濇溫有毒時珍曰按張果醫說云鯪鯉肉最動風風疾人纔食數臠其疾一發四肢頓癈時珍竊謂此物性竄而行血風人多血虚故也然其氣味俱惡亦不中用石龍子本經中品釋名山龍子别録泉龍繁露註石蝪音易蜥蝪别録豬婆蛇綱目守宫時珍曰此物生山石間能吐雹可祈雨故得龍子之名蜥蝪本作析易許慎云易字篆文象形陸佃云蝪善變易吐雹有陰陽析易之義周易之名葢取乎此今俗呼為豬婆蛇是矣𢎞景曰守宫蝘蜓也而此亦名守宫殊難分别詳見守宫條集解别録曰石龍子生平陽川谷及荆州山石間五月取著石上令乾保昇曰山南襄申處處有之三四八九月採去腹中物黒乾𢎞景曰其類有四種形大純黄者為蛇醫母亦名蛇舅不入藥用似蛇醫而形小尾長見人不動者為龍子形小而五色尾青碧可愛者為蜥蝪並不螫人一種緣籬壁形小色黒者為蝘蜓言螫人必死亦未聞中之者恭曰龍子即蜥蝪形細而長尾與身類似蛇有四足去足便是蛇形以五色者為雄入藥良色不備者力劣也蛇師生山谷頭大尾小而短色青黄或白斑也蝘蜓生人家屋壁間似蛇師即守宫也一名蠑螈爾雅互言之並非真說頌曰爾雅以蠑螈蜥蝪蝘蜓守宫為一物方言以在草為蜥蝪蛇醫在壁為守宫蝘蜓字林以蠑螈為蛇醫據諸說當以在草澤者為蠑螈蜥蝪在屋壁者為蝘蜓守宫也入藥以草澤者為良時珍曰諸說不定大抵是水旱二種有山石草澤屋壁三者之異本經惟用石龍後人但稱蜥蝪寔一物也且生山石間正與石龍山龍之名相合自與草澤之蛇師屋壁之蝘蜓不同蘇恭言蛇師生山谷以守宫為蠑螈蘇頌以草澤者入藥皆與本經相戾術家祈雨以守宫為蜥蝪謬誤尤甚今將三者攷正于左其義自明矣生山石間者曰石龍即蜥蜴俗呼豬婆蛇似蛇有四足頭扁尾長形細長七八寸大者一二尺有細鱗金碧色其五色全者為雄入藥尤勝生草澤間者曰蛇醫又名蛇師蛇舅母水蜥蝪蠑螈俗亦呼豬婆蛇蛇有傷則㘅草以敷之又能入水與魚合故得諸名狀同石龍而頭大尾短形粗其色青黄亦有白斑者不入藥用生屋壁間者曰蝘蜓即守宫也似蛇醫而短小灰褐色並不螫人詳本條又按夷堅志云劉居中見山中大蜥蝪百枚長三四尺光膩如脂吐雹如彈丸成頃風雷作而雨雹也宗奭曰有人見蜥蝪従石罅中出飲水數十次石下有冰雹一二升行未數里雨雹大作今人用之祈雨葢此取義修治時珍曰古方用酥炙或酒炙惟治𫝊尸勞瘵天靈葢丸以石蜥蝪連腸肚以醋炙四十九遍用之亦一異也氣味鹹寒有小毒之才曰惡硫黄蕪荑斑蝥主治五癃邪結氣利小便水道破石淋下血别録消水飲陰㿉滑竅破血娠婦忌用時珍發明宗奭曰蜥蝪能吐雹祈雨故能治癃淋利水道時珍曰其功長於利水故千金治癥結水腫尸疰留飲有蜥蝪丸外臺治陰㿉用之皆取其利水也劉涓子用同斑蝥地膽治瘻疾取其利小便解二物之毒也附方新二小兒陰㿉用蜥蝪一枚燒灰酒服外臺祕要諸瘻不愈用蜥蝪炙三枚地膽炒三十枚斑蝥炒四十枚為末蜜丸小豆大毎服二丸白湯下治諸法不效者劉涓子鬼遺方肝主治缺附方新一去生胎蜥蝪肝蛇脫皮等分以苦酒和勻摩妊婦臍上及左右令溫胎即下也聖恵守宫綱目釋名壁宫蘇恭壁虎時珍蝎虎蘇恭蝘蜓音􅅯殄縁𢎞景曰蝘蜓喜籬壁間以朱飼之滿三觔殺乾末以塗女人身有交接事便脱不爾如赤誌故名守宫而蜥蝪亦名守宫殊難分别按東方朔云若非守宫則蜥蝪是矣恭曰蝘蜓又名蝎虎以其常在屋壁故名守宫亦名壁宮飼朱㸃婦人謬説也時珍曰守宫善捕蝎蝇故得虎名春秋考異郵云守宫食蠆土勝水也㸃臂之說淮南萬畢術張華博物志彭乗墨客揮犀皆有其法大抵不真恐别有術今不傳矣揚雄方言云秦晉西夏謂之守宫亦曰蠦􅫢南陽人呼為蝘蜓在澤中者謂之蜥蝪楚人謂之蠑螈集解時珍曰守宫處處人家牆壁有之狀如蛇醫而灰黒色扁首長頸細鱗四足長者六七寸亦不聞噬人南方有十二時蟲即守宫之五色者附見於下附録十二時蟲時珍曰十二時蟲一名避役出容州交州諸處生人家籬壁樹木間守宫之類也大小如指狀同守宫而腦上連背有肉鬛如冠幘長頸長足身青色大者長尺許尾與身等囓人不可療嶺南異物志言其首隨十二時變色見者主有喜慶博物志言其陰多緗緑日中變易或青或緑或丹或紅北户録言不能變十二色但黄褐青赤四色而已竊按陶𢎞景言石龍五色者為蜥蝪陸佃言蜥蝪能十二時變易故得易名若然則此蟲亦蜥蝪矣而生籬壁間葢五色守宫爾陶氏所謂守宫螫人必死及㸃臂成誌者恐是此物至若尋常守宫既不堪㸃臂亦未有螫人至死者也氣味鹹寒有小毒主治中風癰瘓手足不舉或歴節風痛及風痓驚癎小兒疳痢血積成痞癘風瘰癧療蝎螫時珍發明時珍曰守宫舊附見于石龍下云不入藥用近時方術多用之楊仁齋言驚癎皆心血不足其血與心血相類故治驚癎取其血以補心其説近似而實不然葢守宫食蝎蠆蝎蠆乃治風要藥故守宫所治風痓驚癎諸病亦猶蜈蝎之性能透經絡也且入血分故又治血病瘡瘍守宮袪風石龍利水功用自别不可不知附方新十四小兒臍風用壁虎後半截焙為末男用女乳女用男乳調勻入稀雞矢少許摻舌根及牙闗仍以手蘸摩兒取汁出甚妙筆峯雜興方久年驚癎守宮膏用守宫一箇剪去四足連血研爛入珍珠麝香龍腦香各一字研勻以薄荷湯調服仍先或吐或下去痰涎而后用此大有神效竒效方小兒撮口用硃砂末安小瓶内捕活蝎虎一箇入瓶中食砂末月餘待體赤陰乾為末毎薄荷湯服三四分方廣附餘心虚驚癎用褐色壁虎一枚連血研爛入硃砂麝香末少許薄荷湯調服繼服二陳湯神效仁齋直指癰瘓走痛用蝎虎即蝘蜓一枚炙黄陳皮五分罌粟殻一錢甘草乳香没藥各二錢半為末毎服三錢水煎服醫學正傳癧節風痛不可忍者壁虎丸用壁虎三枚生研臍螬三枚紙包煨研地龍五條生研草烏頭三枚生研木香五錢乳香末二錢半麝香一錢龍腦五分合研成膏入酒糊搗丸如梧桐子大毎日空心乳香酒服三十丸取效總録破傷中風身如角弓反張筋急口噤者用守宫丸治之守宫炙乾去足七枚天南星酒浸三日晒乾一兩膩粉半錢為末以薄麵糊丸緑豆大毎以七丸酒灌下少頃汗出得解更與一服再汗即瘥或加白附子一兩以蜜丸聖恵方癘風成癩袪風散用東行蝎虎一條焙乾大蠶沙五升水淘炒各為末以小麥麵四升拌作絡索曝乾研末毎服一二合煎柏葉湯下日三服取效衛生寶鑑瘰癧初起用壁虎一枚焙研毎日服半分酒服青囊血積成塊用壁虎一枚白麵和一鴨子大包裹研爛作餅烙熟食之當下血塊不過三四次即愈甚驗青囊小兒疳疾蝎虎丹治一切疳痩下痢證候全備及無辜疳毒如邪病者用乾雄蝎虎一箇㣲炙蝸牛殻蘭香根靛花雄黄麝香各一分龍腦半分各研為末米醋煑糊丸黍米大毎脂麻湯下十丸日二服取效竒效良方蠆蝎螫傷端午日午時收壁虎一枚以雞膽開一竅盛之陰乾毎以一星敷上即止神效青囊反胃膈氣地塘蟲即壁虎也七箇砂鍋炒焦木香人參硃砂各一錢半乳香一錢為末􅁡丸梧子大毎服七丸木香湯下早晚各一服丹溪摘𤣥癰瘡大痛壁虎焙乾研末油調傅之即止要醫方摘糞主治爛赤眼時珍附方新一胎赤爛眼昏暗用蝎虎數枚以罐盛黄土按實入蝎虎在内勿令損傷以紙封口穿數孔出氣候有糞數粒去糞上一㸃黑者只取一頭白者唾津研成膏塗眼睫周回不得揩拭來早以溫漿水洗三次甚效聖濟總録蛤蚧宋開寶釋名蛤蠏日華僊蟾志曰一雌一雄常自呼其名時珍曰蛤蚧因聲而名僊蟾因形而名嶺南人呼蛙為蛤又因其首如蛙蟾也雷斆以雄為蛤以雌為蚧亦通集解志曰蛤蚧生嶺南山谷及城牆或大樹間形如大守宫身長四五寸尾與身等最惜其尾見人取之多自囓斷其尾而去藥力在尾尾不全者不效揚雄方言云桂林之中守宫能鳴者俗謂之蛤蚧葢相似也禹錫曰按嶺表録異云蛤蚧首如􅞩蟇背有細鱗如蠶子上黄色身短尾長多巢於榕木及城樓間雌雄相隨旦暮則鳴或云鳴一聲是一年者俚人采鬻云治肺疾珣曰生廣南水中夜即居於榕樹上雌雄相隨投一獲二近日西路亦有之其状雖小滋力一般俚人採之割腹以竹張開曝乾鬻之頌曰人欲得首尾全者以兩股長柄鐵乂如黏黐等狀伺於榕木間以乂刺之一股中腦一股著尾故不能囓也入藥須雌雄兩用或云陽人用雄陰人用雌斆曰雄為蛤皮粗口大身小尾粗雌為蚧皮細口尖身大尾小時珍曰按段公路北户録云其首如蟾蜍背緑色上有黄斑㸃如古錦紋長尺許尾短其聲最大多居木竅間亦守宫蜥蝪之類也又顧玠海槎緑云廣西横州甚多蛤蚧北牡上下相呼累日情洽乃交兩相抱負自墮于地人往捕之亦不知覺以手分劈雖死不開乃用熟稿草細纒蒸過曝乾售之煉為房中之藥甚效尋常捕者不論牝牡但可為雜藥及獸醫方中之用耳修治斆曰其毒在眼須去眼及甲上尾上腹上肉毛以酒浸透隔兩重紙緩焙令乾以磁器盛懸屋東角上一夜用之力可十倍勿傷尾也日華曰凡用去頭足洗去鱗鬛内不淨以酥炙用或用蜜炙李珣曰凡用須炙令黄色熟搗口含少許奔走不喘息者為始真也宜丸散中用氣味鹹平百小毒日華曰無毒主治久咳𠻳肺勞傳尸殺鬼物邪氣下淋瀝通水道開寶下石淋通月經治肺氣療欬血日華肺痿咯血欬𠻳上氣治折傷海華補肺氣益精血定喘止𠻳療肺癰消渴助陽道時珍發明宗奭曰補肺虚勞𠻳有功時珍曰昔人言補可去弱人參羊肉之屬蛤蚧補肺氣定喘止渴功同人參益陰血助精扶羸功同羊肉近世治勞損痿弱許叔㣲治消渴皆用之俱取其滋補也劉純云氣液衰陰血竭者宜用之何大英云定喘止𠻳莫佳於此附方舊二久𠻳肺癰宗奭曰久𠻳不愈肺積虚熱成癰欬出膿血曉夕不止喉中氣塞胸膈噎痛用蛤蚧阿膠鹿角膠生犀角羚羊角各二錢半用河水三升銀石器内文火熬至半升濾汁時時仰卧細呷日一服張刑部子臯病此田樞宻况授方服之遂愈喘𠻳靣浮并四肢浮者蛤蚧一雌一雄頭尾全者法酒和蜜塗之炙熱紫團人參似人形者半兩為末化蠟四兩和作六餅毎煑糯米薄粥一盞投入一餅攪化細細熱呷之普濟鹽龍綱目集解時珍曰按何逺春渚紀聞云宋徽宗時將軍蕭注破南蠻得其所養鹽龍長尺餘籍以銀盤中置玉盂以玉筯摭海鹽飼之毎鱗中出鹽則收取云能興陽事毎以溫酒服一錢七後龍為蔡京所得及死以鹽封數日取用亦有力愚按此物生于殊方古所不載而有此功亦希物也因附于此以俟鱗之二蛇類一十七種蛇蛻本經下品釋名蛇皮甄權蛇殻俗名龍退綱目龍子衣本經龍子皮别録弓皮本經蛇符别録蛇筋呉普盤時珍曰蛇字古文象其宛轉有曲之形蛻音脫又音退退脫之義也龍弓符筋並後世瘦隠之名耳集解别録曰生荆州川谷及田野五月五日十五日取之良𢎞景曰草中少見虺蝮蛻惟有長者多是赤􅠠黄頷軰其皮不可辨但取石上完全者為佳頌曰南中木石上及人家牆屋間多有之蛇蛻無時但著不淨即蛻或大飽亦脫于斆曰凡使勿用青黄蒼色者只用白色如銀者先地下掘坑深一尺二寸安蛻于中一宿取出醋浸炙乾用時珍曰今人用蛇蛻先以皂莢水洗淨纒竹上或酒或醋或􅁡浸炙黄用或燒存性或鹽泥固煅各隨方法氣味鹹甘平無毒火熬之良權曰有毒婦畏磁石及酒孕忌用主治小兒百二十種驚癎蛇癎癲疾瘈瘲弄舌揺頭寒熱腸痔蠱毒本經大人五邪言語僻越止嘔逆明目燒之療諸惡瘡别録喉痺百鬼魅甄權炙用辟惡止小兒驚悸客熱煎汁傳癧􅅑白癜風催生日華安胎孟詵止瘧藏器曰正發日取塞兩耳又以手持少許并服鹽醋汁令吐辟惡去風殺蟲燒末服治婦人吹奶大人喉風退目翳消木舌𫝊小兒重舌重齶唇𦂳解顱靣瘡月蝕天泡瘡大人丁腫漏瘡腫毒煮湯洗諸惡蟲傷時珍發明宗奭曰蛇蛻従口退出眼睛亦退今眼藥及去翳膜用之取此義也時珍曰入藥有四義一能辟惡取其變化性靈也故治邪僻鬼魅蠱瘧諸疾二能去風取其屬㢲性竄也故治驚癎癜駮喉舌諸疾三能殺蟲故治惡瘡痔漏疥癬諸疾用其毒也四有蛻義故治翳膜胎産皮膚諸疾㑹意従類也附方舊十一新二十二喉痺心鏡治小兒喉痺腫痛燒末以乳汁服一錢纒喉風疾氣閉者桂壬方用蛇蛻炙當歸等分為末溫酒服一錢取吐一方用蛇皮揉碎燒烟竹筒吸入即破梅一方蛇皮裹白一枚噙嚥大小口瘡蛇蛻皮水浸軟拭口内一二遍即愈仍以藥貼足心鑑嬰孩寶小兒木舌蛇蛻燒灰乳和服少許千金方小兒重舌千金小兒重齶並用蛇蛻灰醋調傅之聖恵方小兒口𦂳不能開合飲食不語即死蛇蛻燒灰拭淨傅之千金方小兒解顱蛇蛻熬末以豬頰車髓和塗之日三四易千金方小兒頭瘡小兒靣瘡小兒月蝕並用蛇蛻燒灰臘豬脂和傅之肘後方小兒吐血蛇蛻灰乳汁調服半錢子母秘録痘後目瞖周宻齊東埜語云小兒痘後障瞖用蛇蛻一條洗焙天花粉五分為末以羊肝破開夾藥縛定末泔水煑食予女及甥皆用此得效真竒方也卒生瞖膜蛇蛻皮一條洗晒細剪以白􅋗和作餅炙焦黒色為末食後溫水服一錢日二次聖恵方小便不通全蛇蛻一條燒存性研溫酒服之胎痛欲産日月未足者以全蛻一條絹袋盛遶腰繫之千金方横生逆生胞衣不下千金用蛇蛻炒焦為末向東酒服一刀圭即順生十全博救方用鹽泥固煅研二錢榆白湯服濟秘覽治逆生須㬰不救用蛇蛻一具蟬蛻十四箇頭髪一握並燒存性分二服酒下仍以小針刺兒足心三七下擦鹽少許即生婦人産難蛇蛻泡水浴産門自易寶鑑婦人吹乳蛇皮一尺七寸燒末溫酒一盞服産乳腫毒無頭蛇蛻灰猪脂和塗肘後石癰無毒堅硬如石用蛇蛻皮貼之經宿即愈總録諸漏有膿蛇蛻灰水和傅上即蟲出千金方丁腫魚臍外臺用蛇蛻雞子大水四升煑三四沸服汁立瘥雞直指治魚臍瘡出水四畔浮漿用蛇蛻燒存性研子清和傅惡瘡似癲十年不瘥者全蛻一條燒灰猪脂和傅仍燒一條溫酒服千金方癜風白駮聖恵用蛇皮灰醋調塗中外臺用蛻摩數百遍令熱葉草勿回顧陷甲入肉痛苦用蛇皮一具燒灰雄黄一彈丸同研末先以溫漿洗瘡針破貼之初虞世方耳忽大痛如有蟲在内奔走或血水流出或乾痛不可忍者蛇退皮燒存性研鵝翎吹之立愈經驗秘方也楊拱醫方摘要蚺蛇蚺音髯品别録下釋名南蛇綱目埋頭蛇時珍曰蛇屬紆行此蛇身大而行更紆徐冉冉然也故名蚺蛇或云鱗甲有毛如髯也産於嶺南以不舉首者為真故世稱為南蛇埋頭蛇集解頌曰蚺蛇陶𢎞景言出晉安蘇恭言出桂廣以南高賀等州今嶺南諸郡皆有之𢎞景曰大者二三圍在地行不舉頭者是真舉頭者非真其膏膽能相亂韓保昇曰大者徑尺長丈許若蛇而粗短恭曰其形似鱧頭似鼉尾圓無鱗性難死土人截其肉作膾謂為珍味藏器曰其膾著醋能卷人筋終不可脱惟以芒草作筋乃可段成式酉陽雜爼云蚺蛇長十丈嘗吞鹿鹿消盡乃遶樹則腹中之骨穿鱗而出養瘡時肪腴甚美或以婦人衣投之則蟠而不起時珍曰按劉恂録異記云蚺蛇大者五六丈圍四五尺小者不下三四丈身有斑紋如故錦纈春夏于山林中伺鹿吞之蛇遂羸瘦待鹿消乃肥壯也或言一年食一鹿也又顧玠海槎録云蚺蛇吞鹿及山馬従後脚入毒氣呵及角自解脱其膽以小者為佳王濟手記云横州山中多蚺蛇大者十餘丈食麞鹿骨角隨腐土人採葛藤塞入穴中蛇嗅之即靡乃發穴取之肉極腴美皮可冐鼔及飾刀劒樂器范成大虞衡志云寨兵捕蚺蛇滿頭挿花蛇即注視不動乃逼而斷其首待其騰擲力竭乃斃舁歸食之又按山海經云巴蛇食象三年而出其骨君子服之無心腹之疾郭璞注云今蚺蛇即其類也南裔志蚺蛇賛曰蚺惟大蛇既洪且長采色駮映其文錦章食馬吞鹿腴成養瘡賔饗嘉食是豆是觴膽段成式曰其膽上旬近頭中旬近心下旬近尾頌曰嶺表録云雷州有養蛇户毎嵗五月五日即舁蛇入官取膽暴乾以充土貢毎蛇以軟草藉于藍中盤屈之將取則出于地土用杈柺十數翻轉蛇腹按定約分寸于腹間剖出肝膽膽狀若鴨子大取訖内肝于腹以線縫合舁歸放之或言蛇被取膽者他日捕之則逺逺露腹瘡以明無膽又言取後能活三年木知的否時珍曰南人嗜蛇至于發穴捜取能容蚺之再活露腹乎𢎞景曰真膽挾長通黑皮膜極薄砥之甘苦摩以注水即沈而不散恭曰試法剔取粟許著淨水中浮游水上回旋行走者為真其徑沈者猪膽血也勿多著亦沈散也陶未得法耳詵曰人多以猪膽虎膽偽之雖水中走但遲耳氣味甘苦寒有小毒主治目腫痛心腹䘌痛下部䘌瘡别録小兒八癎甄權殺五疳水化灌鼻中除小兒腦熱疳瘡䘌漏灌下部治小兒疳痢同麝香傅齒疳宣露孟詵破血止血痢蟲蠱下血藏器明目去翳膜療大風時珍發明時珍曰蚺稟已土之氣其膽受甲乙風木故其味苦中有甘所主皆厥陰太陰之病能明目凉血除疳殺蟲一慎㣲曰顔􅅤養嫂失明須用蚺蛇膽含求不得有童子以一合授含含視之蚺蛇膽也童子化為青烏而去含用之嫂日遂明附方舊二新二小兒急疳瘡水調蚺蛇膽傅之聖恵小兒疳痢羸瘦多睡坐則閉目食不下用蚺蛇膽豆許二枚煑通草汁研化隨意飲之并塗五心下部楊氏産乳齒䘌宣露出膿血用蚺蛇膽三錢枯白礬一錢杏仁四十七枚研勻以布揩齦嗍令血盡日三摻之愈乃止恵聖痔瘡腫痛蚺蛇膽研香油調塗立效醫方摘要肉氣味甘溫有小毒四月勿食主治飛尸游蠱喉中有物吞吐不出藏器除疳瘡辟瘟疫瘴氣孟詵除手足風痛殺三蟲去死肌皮膚風毒癘風疥癬惡瘡時珍發明權曰度嶺南食蚺蛇瘴毒不侵時珍曰按栁子厚捕蛇説云永州之野産異蛇黒質白章觸草木盡死無禦之者然得而腊之以為餌可已大風攣踠廔癘去死肌殺三蟲又張鷟朝野僉載云泉州盧元欽患癘風惟鼻未倒五月五日取蚺蛇進貢或言肉可治風遂取食之三五日頻可百日平復附方新三蚺蛇酒治諸風癱緩筋攣骨痛痺木瘙痒殺蟲辟瘴及癘風疥癬惡瘡用蚺蛇肉一觔羌活一兩絹袋盛之用糯米二斗蒸熟安麴於缸底置蛇於麴上乃下飯宻葢待熟取酒以蛇焙研和藥其酒毎隨量溫飲數盃忌風及慾事亦可袋盛浸酒飲集簡方急疳蝕爛蚺蛇肉作膾食之聖恵方狂犬囓人蛇脯為末水服五分日三服無蚺蛇他蛇亦可外臺秘要膏𢎞景曰真膏纍纍如梨豆子著他蛇膏皆大如梅李子也氣味甘平有小毒主治皮膚風毒婦人産後腹痛餘疾别録多入藥用亦療伯牛疾𢎞景癩也綿裹塞耳聾時珍出外臺牙長六七寸主治佩之辟不祥利逺行時珍志異物鱗蛇綱目集解時珍曰按方輿勝覽云鱗蛇出安南雲南鎮康州臨安沅江盂養諸處巨蟒也長丈餘有四足有黄鱗黒鱗二色能食麋鹿春冬居山夏秋居水能傷人土人殺而食之取膽治疾以黄鱗者為上甚貴重之珍按此亦蚺蛇類但多足耳陶氏注蚺蛇分真假其亦此類與膽氣味苦寒有小毒主治解藥毒治惡瘡及牙疼時珍及出勝覽一統志白花蛇宋開寶釋名蘄蛇綱目褰鼻蛇宗奭諸蛇鼻向下獨此鼻向上背有方勝花文以此得名集解志曰白花蛇生南地及蜀郡諸山中九月十月採捕火乾白花者良頌曰今黔中及蘄州鄧州皆有之其文作方勝白花喜螫人足黔人有被螫者立斷之續以木脚此蛇入人室屋中作爛爪氣者不可嚮之須速辟除之時珍曰花蛇湖蜀皆有今惟以蘄蛇擅名然蘄地亦不多得市肆所貨官司所取者皆自江南興國州諸山中來其蛇龍頭虎口黒質白花脇有二十四個方勝文腹有念珠班口有四長牙尾上有一佛指甲長一二分腸形如連珠多在石南藤上食其花葉人以此尋獲先撒沙土一把則燔而不動以又取之用䋲懸起劙刀破腹去腸物則反尾洗滌其腹葢䕶創爾乃以竹支定屈曲盤起紮縛炕乾出蘄地者雖乾枯而眼光不陷他處者則否矣故羅願爾雅翼云蛇死目皆閉惟蘄州花蛇日開如生舒蘄兩界者則一開一閉故人以此驗之又按元稹長慶集云巴蛇凡百類惟褰鼻白花蛇人常不見之毒人則毛髪豎立飲於溪澗則泥沙盡沸鷣鳥能食其小者巴人亦用禁術制之熏以雄黄烟則腦裂也此説與蘇頌所説黔蛇相合然今蘄蛇亦不甚毒則黔蜀之蛇雖同有白花而類性不同故入藥獨取蘄産者也修治頌曰頭尾各一尺有火毒不可用只用中段乾者以酒浸去皮骨炙過收之則不蛀其骨刺須逺棄之傷人毒與生者同也宗奭曰凡用去頭尾換酒浸三日火炙去盡皮骨此物甚毒不可不防時珍曰黔蛇長大故頭尾可去一尺蘄蛇止可頭尾各去三寸亦有單用頭尾者大蛇一條只得淨肉四兩而已久留易蛀惟取肉宻封藏之十年亦不壤也按聖濟總録云凡用花蛇春秋酒浸三宿夏一宿冬五宿取出炭火焙乾如此三次以砂瓶盛埋地中一宿出火氣去皮骨取肉用肉氣味甘鹹溫有毒時珍曰得酒良主治中風濕痺不仁筋脉拘急口靣喎斜半身不遂骨節疼痛脚弱不能久立暴風瘙痒大風疥癬開寶黔頌曰花蛇治風速于諸蛇人治疥癬遍體諸藥不效者生取此蛇劑斷以磚燒紅沃醋令氣蒸置蛇于上以盆覆一夜如此三次去骨取肉芼以五味令爛頓食之瞑睡一晝夜乃醒瘡疕隨皮便退其疾便愈治肺風鼻塞浮風􅐊􅇙身上白癜風癧瘍斑㸃甄權通治諸風破傷風小兒風熱急慢驚風搐搦瘰癧漏疾楊梅瘡痘瘡倒陷時珍發明斆曰蛇性竄能引藥至于有風疾處故能治風時珍曰風善行數變蛇亦善行數蛻而花蛇又食石南所以能透骨捜風截驚定搐為風痺驚搐癩癬惡瘡要藥取其内走臟腑外徹皮膚無處不到也凡服蛇藥酒切忌見風附方新十三驅風膏治風癱癘風遍身疥癬用白花蛇肉四兩酒炙天麻七錢半薄荷荆芥各二錢半為末好酒二升蜜四兩石器熬成膏每服一盞溫湯服日三服急於暖處出汗十日效醫壘元戎世傳白花蛇酒治諸風無新久手足緩弱口眼喎斜語言蹇澀或筋脉攣急肌肉頑痺皮膚燥痒骨節疼痛或生惡瘡疥癩等疾用白花蛇一條溫水洗淨頭尾各去三寸酒浸去骨刺取淨内一兩入全蝎炒當歸防風羌活各一錢獨活白芒天麻赤芍藥甘草升麻各五錢剉碎以絹袋盛貯用糯米二斗蒸熟如常造酒以袋置缸中待成取酒同袋宻封煑熟置陰地七日出毒毎溫飲數盃常令相續此方乃蘄人板卬以侑蛇饋送者不知所始也瀕湖集簡方瑞竹白花蛇酒治諸風癘癬用白花蛇一條酒潤去皮骨取肉絹袋盛之蒸糯米一斗安麴於缸底置蛇於麴上以飯安蛇上用物宻葢三七日取酒以蛇晒乾為末毎服三五分溫酒下仍以濁酒并糟作餅食之尤佳瑞竹堂經驗方瀕湖白花蛇酒治中風傷酒半身不遂口目喎斜膚肉􅍙痺骨節疼痛及年久疥癬惡瘡風癩諸症用白花蛇一條取龍頭虎口黒質白花尾有佛指甲目光丕陷者為真以酒洗潤透去骨刺取肉四兩真羌活二兩當歸身二兩真天麻二兩真秦艽二兩五加皮二兩防風一兩各剉勻以生絹袋盛之入金華酒壜内懸胎安置入糯米生酒醅五壺浸袋箬葉宻封安壜於大鍋内水煑一日取起埋陰地七日取出毎飲一二盃仍以滓日乾碾末酒糊丸梧子大毎服五十丸用煑酒吞下切忌見風犯慾及魚羊鵞􅋗發風之物雞峯白花蛇膏治營衛不和陽少陰多手足舉動不快用白花蛇酒煑去皮骨瓦焙取肉一兩天麻狗脊各二兩為細末以銀盂盛無灰酒一升浸之重湯煑稠如膏銀匙攪之入生薑汁半盃同熬匀瓶收毎服半匙頭用好酒或白湯化服日二次神效極佳備急方治癩白花蛇膏白花蛇五寸酒浸去皮骨炙乾雄黄一兩水飛研勻以白沙蜜一觔杏仁一觔去皮研爛同煉為膏毎服一錢溫酒化下日三須先服通天再造散下去蟲物乃服此除根三因總録白花蛇散治腦風頭痛時作時止及偏頭風用白花蛇酒浸去皮骨天南星漿水煑軟切炒各一兩石膏荆芥各二兩地骨皮二錢半為末毎服一錢茶下日三服聖濟總録潔古白花蛇散治大風病白花蛇烏稍蛇各取淨肉二錢酒炙雄黄二錢大黄五錢為末毎服二錢白湯下三日一服家珍三蛇愈風丹治癘風手足麻木眉毛脱落皮膚瘙痒及一切風瘡白花蛇烏稍蛇土蝮蛇各一條並酒浸取肉晒乾苦參頭末四兩為末以皂角一觔切酒浸去酒以水一椀挼取濃汁石器熬膏和丸梧子大毎服七十丸煎通聖散下以粥飯壓之日三服三日一浴取汗避風大治例無蝮蛇有楓子肉二兩三因白花蛇散治九漏瘰癧發項腋之間痒痛憎寒發熱白花蛇酒浸取肉二兩焙生犀角一兩二錢五分鎊研黒牽牛五錢半生半炒青皮五錢為末毎服二錢入膩粉五分五更時糯米飲調下痢下惡毒為度十日一服可絶病根忌發物俗傳白花蛇丸治楊梅瘡先服發散藥後服此用花蛇肉酒炙龜板酥炙穿山甲炙蜂房炙澒粉朱砂各一錢為末紅􅀥肉搗丸梧子大毎服七丸冷茶下日三忌魚肉服盡即愈後服土茯苓藥調之方廣心法附餘治楊梅瘡用花蛇肉一錢銀硃二錢鉛二錢汞二錢為末作紙撚九條毎用一條于燈盞内香油浸㸃燈安烘爐裏放被中葢卧熏之勿透風一日三次托痘花蛇散治痘瘡黒陷白花蛇連骨炙勿令焦三錢大丁香七枚為末毎服五分以水和淡酒下神效移時身上發熱其瘡頓出紅活也王氏手集頭氣味有毒主治癜風毒癩時珍附方新一紫癜風除風㪚以白花蛇頭二枚酒浸炙蝎稍一兩炒防風一兩右為末毎服一錢溫酒下日一服聖濟總録目睛主治小兒夜啼以一隻為末竹瀝調少許灌之普濟烏蛇宋開寶附釋名烏稍蛇綱目黑花蛇綱目集解志曰烏蛇生商洛山背有三稜色黒如漆性善不噬物江東有黒稍蛇能纒物至死亦此類也頌曰蘄州黄州山中有之乾寧記云此蛇不食生命亦不害人多在蘆叢中吸南風及其花氣最難採捕多于蘆枝上得之其身烏而光頭圓尾尖眼有赤光至枯死眼不陷如活者稱之重七錢至一兩者為上十兩至一鎰者為中粗大者力彌减也作偽者用他蛇熏黑亦能亂真但眼不光耳宗奭曰烏蛇脊高世稱劒脊烏稍尾細長能穿小銅錢一百文者佳有身長丈餘者其性畏䑕狼蛇類中惟此入藥最多斆曰凡一切蛇須辨雌雄州土蘄州烏蛇頭上有逆毛二寸一路可長半分已來頭尾相對使之入藥如神只重一兩以下彼處得此多留進供蛇腹下有白帶子一條長一寸者雄也宜入藥用採得去頭及皮鱗帶子剉斷苦酒浸一宿漉出栁木炭火炙乾再以酥炙於屋下已地上掘坑埋一夜再炙乾用或以酒煑乾用亦可時珍曰烏蛇有二種一種劒脊細尾者為上一種長大無劒脊而尾稍粗者名風稍蛇亦可治風而力不及肉氣味甘平無毒論曰有小毒主治諸風頑痺皮膚不仁風瘙􅐊􅇙疥癬開寶熱毒風皮肌生癩眉髭脱落瘑疥等瘡甄權功與白花蛇同而性善無毒時珍附方舊二新五大風朝野僉載云商州有人患大風家人惡之山中為起茅屋有烏蛇墮酒罌中病人不知飲酒漸瘥罌底見有蛇骨始知其由丸治例治大風用烏蛇三條蒸熟取肉焙研末蒸餅米粒大以喂烏雞待盡殺雞烹熟取肉焙研末酒服一錢或蒸餅丸服不過三五雞即愈秘韞用大烏蛇一條打死盛之待爛以水二碗浸七日去皮骨入糙未一升浸一日晒乾用白雞一隻餓一日以米飼之待毛羽脱去殺雞煑熟食以酒下之喫盡以熱湯一盆浸洗大半日其病自愈紫白癜風烏蛇肉酒炙六兩枳殻麩炒牛膝天麻各二兩熟地黄四兩白蒺藜炒五加皮防風桂心各二兩剉片以絹袋盛于無灰酒二斗中浸之宻封七日毎溫服一小盞忌雞鵝魚肉發物聖恵靣瘡䵟皰烏蛇肉二兩燒灰臘猪脂調傅聖恵嬰兒撮口不能乳者烏蛇酒浸去皮骨炙半兩麝香一分為末毎用半分荆芥煎湯調灌之聖恵破傷中風項强身直定命散主之用白花蛇烏蛇並取向後二寸酒洗潤取肉蜈蚣一條全者炙右為末毎服三錢溫酒調服普濟方膏主治耳聾綿裹豆許塞之神效時珍恵出聖膽主治大風癘疾木舌脹塞時珍附方新二大風龍膽膏治大風疾神效用冬𤓰一箇截去五寸長去穰掘地坑深三尺令淨安爪於内以烏蛇膽一箇消梨一箇置於爪上以土隔葢之至三七日㸔一度𤓰未甚壤候七七日三物俱化為水在𤓰皮内取出毎用一茶脚以酒和服之三兩次立愈小可風疾毎服一匙頭王氏博濟方木舌塞脹不治殺人用蛇膽一枚焙乾為末傅舌上有涎吐去聖恵皮王治風毒氣眼生瞖唇𦂳唇瘡時珍附方新一小兒緊唇脾熱唇瘡並用烏蛇皮燒灰酥和傅之聖恵卵主治大風癩疾時珍曰聖濟總録治癩風用烏蛇卵和諸藥為丸服云與蛇肉同功金蛇宋開寶附附銀蛇釋名金星地鱔圖經銀蛇亦名錫蛇時珍曰金銀錫以色與功命名也金星地鱔以形命名也集解頌曰金蛇生賔州澄州大如中指長尺許常登木飲露體作金色照日有光白者名銀蛇近皆少捕信州上饒縣靈山鄉出一種金星地鱔酷似此蛇冬月收捕亦能解毒時珍曰按劉恂嶺表銀異云金蛇一名地鱔白者名錫蛇出黔州出桂州者次之大如拇指長尺許鱗甲上分金銀解毒之功據此則地鱔即金蛇非二種矣肉氣味鹹平無毒主治解中金藥毒令人肉作雞脚裂夜含銀至曉變為金色者是也取蛇四寸炙黄煮汁頻飲以差為度銀蛇解銀藥毒開寶解衆毒止洩瀉除邪熱蘇頌療乆痢時珍發明藏器曰嶺南多毒蛇解毒之藥金蛇白藥是矣時珍曰聖濟總録治久痢不止有金星地鱔散用金星地鱔醋炙鉛丹白礬燒各五錢為末毎服二錢米飲下日二水蛇綱目釋名公蠣蛇集解時珍曰水蛇所在有之生水中大如鱓黄黒色有纈紋囓人不甚毒陶𢎞景言公蠣蛇能化鱧者即此也水中又有一種泥蛇黒色穴居成羣囓人有毒與水蛇不同張文仲備急方言山中一種蛇與公蠣相似亦不囓人也肉氣味甘鹹寒無毒主治消渴煩熱毒痢時珍附方新一聖恵水蛇丸治消渴四肢煩熱口乾心躁水蛇一條活者剥皮炙黄為末蝸牛五十箇水浸五日取涎入天花粉末煎稠入麝香一分粟飯和丸緑豆大毎服十丸薑湯下皮主治燒灰油調傅小兒骨疽膿血不止又治手指天蛇毒瘡時珍附方新二小兒骨瘡海上方詩云小兒骨痛不堪言出血流膿實可憐尋取水蛇皮一箇燒灰油抹傅庝邊天蛇毒劉松篁經驗方云㑹水彎陳玉田妻病天蛇毒瘡一老翁用水蛇一條去頭尾取中截如手指長剖去骨肉勿令病者見以蛇皮包手指自然束𦂳以紙外裹之頓覺遍身皆凉其病即愈數日後解視手指有一溝如小繩蛇皮内宛然有一小蛇頭目俱全也蛇婆拾遺集解藏器曰蛇婆生東海水中一如蛇常自浮游採取無時時珍曰按此所言形狀功用似是水蛇然無考證如各列條氣味鹹平無毒主治赤白毒痢蠱毒下血五野雞病惡瘡炙食或燒末米飲服二錢藏器黄頷蛇綱目附赤楝蛇釋名黄喉蛇俗名赤楝蛇一名桑根蛇時珍曰頷喉下也以色名赤楝桑根象形陶氏作赤􅠠集解時珍曰按肘後千金外臺諸方多用自死蛇及蛇吞蛙䑕並不云是某蛇惟本草有蝮蛇腹中䑕陶氏注云術家所用赤􅠠黄頷多在人家屋間吞䑕子雀雛見腹中大者破取乾之又蛇蛻注云草間不甚見虺蝮蛻多是赤􅠠黄頷輩據此則古方所用自死蛇及蛇吞蛙䑕當是二蛇雖蛇蛻亦多用之赤楝紅黒節節相間儼如赤楝桑根之狀黄頷黄黒相間喉下色黄大者近丈皆不甚毒丐兒多養為戲弄死即食之又有竹根蛇肘後謂之青蝰蛇不入藥用最毒喜縁竹木與竹同色大者長四五尺其尾三四寸有異㸃者名熇尾蛇毒尤猛烈中之者急炙三四壯毒即不行仍以藥傅之又有菜花蛇亦長大黄緑色方家亦有用之者肉氣味甘溫有小毒王治釀酒或入丸散主風癩頑癬惡瘡自死蛇漬汁塗大疥煮汁浸臂腕作痛燒灰同猪脂塗風癬漏瘡婦人妬乳猘犬咬傷時珍梅出肘後師千金諸方附方新三猘犬囓傷自死蛇一枚燒焦為末納入瘡孔中千金方貓鬼野道歌哭不自由五月五日自死赤蛇燒灰井華水服方寸匕日一服千金方惡瘡似癩及馬疥大如錢者自死蛇一條水漬至爛去骨取汁塗之隨手瘥千金蛇頭主治燒灰主乆瘧及小腸癰入丸散用時珍附方新二發背腫毒蛇頭燒灰醋和傅之日三易千金􅞩蟇瘻瘡五月五日蛇頭及野猪脂同水衣封之佳千金方骨主治久瘧勞瘧炙入丸散用時珍附方新一一切冷漏自死蛇取骨為末封之大痛以杏仁膏摩之即止千金方涎氣味大有毒思邈曰江南山間人一種蠱毒以蛇涎合藥著飲食中使人病瘕積年乃死但以雄黄蜈蚣之藥治之乃佳蛇吞䑕主治䑕瘻蟻瘻有細孔如鍼者以臘月猪脂煎焦去滓塗之時珍金出千蛇吞鼃主治噎膈勞𠻳蛇瘻時珍附方新三噎膈用蛇含蝦蟇泥包燒存性研末米飲服乆勞咳𠻳吐臭痰者尋水邉蛇吞青鼃未嚥者連蛇打死黄泥固濟煅研空心酒服一二錢至效忌生冷五七日永不發也秘韞方蛇瘻不愈蛇腹鼃燒灰封之千金蝮蛇别録下品釋名反鼻蛇時珍曰按王介甫字説云蝮觸之則復其害人也人亦復之故謂之蝮集解𢎞景曰蝮蛇黄黒色如土白斑黄頷尖口毒最烈虺形短而扁毒與􅚣同蛇類甚衆惟此二種及青蝰為猛不即療多死恭曰蝮蛇作地色鼻反口長身短頭尾相似山南漢沔間多有之一名􅚣蛇無二種也頌曰蝮蛇形不長頭扁口尖頭斑身赤文斑亦有青黒色者人犯之頭足貼著東間諸山甚多草行不可不慎藏器曰蝮蛇錦文亦有與地同色者衆蛇之中此獨胎産著足斷足著手斷手不爾合身麋爛七八月毒盛時囓樹以洩其毒樹便死又吐涎沫于草木上著人成瘡身腫名曰蛇漠瘡卒難治療方與蛇螫同時珍曰蝮與虺陶氏言是二種蘇公言是一種今按爾雅云蝮虺身博三寸首大如擘是以蝮虺為一種也郭璞云蝮蛇惟南方有之一名反鼻細頸大頭焦尾鼻上有鍼錦文如綬文間有毛如猪鬛大者長七八尺虺則所在有之俗呼土虺與地同色顔師古云以俗名證之郭説為是又北史高道穆云復用元顥乃養虺成蛇是皆以蝮􅚣為二種矣葢蝮長大虺短小自不難辨陶説為是柳子厚蝮蛇文云目兼蜂蠆色混泥塗其頸蹙恧其腹次且褰鼻鈎牙穴出榛居蓄怒而蟠㘅毒而趨亦頗盡其狀也抱朴子曰蛇類最多惟蝮中人甚急但即時以刀割去瘡肉投於地其沸如火炙須臾焦盡人乃得活王充論衡云蝮蛇含太陽火氣而生故利牙有毒附録千嵗蝮頌曰東間一種千嵗蝮狀如蝮而短有四脚能跳來囓人人或中之必死其囓已即跳上木作聲云斫木斫木者不可救也若云博叔博叔者猶可急治之用細辛雄黄等分為末内瘡中日三四易之又以栝樓根桂末著管中宻塞勿令走氣佩之中毒急敷之緩即不救時珍曰按字林云䎼聴形如蜥蝪出魏興居樹上見人則跳來囓之囓已還樹垂頭聴聞哭聲乃去即此也其狀頭尾一般大如搗衣杵俗名合木蛇長一二尺談埜翁方名斫木蛇又名望板歸救之用嫩黄荆葉搗爛敷之膽氣味苦㣲寒有毒主治䘌瘡别録殺下部蟲甄權療諸漏研傅之若作痛杵杏仁摩之時珍臺出外肉氣味甘溫有毒主治釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒别録五痔腸風瀉血甄權大風諸惡風惡瘡瘰癧皮膚頑痺半身枯死手足臟腑間重疾藏器曰取活蛇一枚著器中投以醇酒一斗封定埋馬溺處周年取開蛇已消化酒味猶存有患諸證者不過服一升許當覺身習習而愈然有小毒不可頓服若服他藥不復得力又曰生癩者取一枚或他蛇亦可燒熱坐上當有赤蟲如馬尾出仍取蛇肉塞鼻中發明時珍曰癩疾感天地肅殺之氣而成惡疾也蝮蛇禀天地陰陽毒烈之氣而生惡物也以毒物而攻毒病葢從其類也附方舊一白癩大蝮蛇一條勿令傷以酒一斗漬之糠火溫令稍熱取蛇一寸和臘月猪脂搗傅方肘後脂藏器曰摩著物皆透也主治綿裹塞耳聾亦傅腫毒時珍皮主治燒灰療丁腫惡瘡骨疽蘇恭蛻主治身癢疥癬瘑瘡蘇恭骨主治赤痢燒灰飲服三錢雜蛇亦可藏器屎器中養取之主治痔瘻蘇恭腹中死䑕有小毒主治䑕瘻别録寸千金云燒末酒服方匕日二不過三日大驗蚖别録集解别録曰蚖類一名蚖短身土色而無文時珍曰蚖與蝮同類即虺也長尺餘蝮大而􅚣小其毒則一食經所謂虺色如土小如蝮蛇者是也詳見蝮下舊本作蚖類一名蚖誤矣當作蚖蝮類一名􅚣􅚣即虺字蚖􅚣字象相近傳寫脱誤爾陶氏注蝮即蚖亦誤矣蚖既是蝮别録不應兩出今並改正氣味缺主治療痺内漏别録治破傷中風大風惡疾時珍附方新一破傷風牙闗𦂳急口噤不開口面喎斜肢體弛緩用土虺蛇一條去頭尾腸皮骨醋炙地龍五條去泥醋炙天南星八錢重一枚炮右為末醋煮麵糊丸如緑豆大毎服三丸至五丸生薑酒下仍食稀葱白粥取汗即瘥昔宫使明光祖向任統制官被重傷服此得效普濟方藍蛇拾遺集解藏器曰出蒼梧諸縣狀如蝮有約従約斷之頭毒尾良嶺南人呼為藍藥主治用頭合毒藥毒人至死以尾作脯食之即愈時珍兩頭蛇拾遺釋名枳首蛇爾雅越王蛇時珍曰枳兩也郭璞云㑹稽人言是越王弩絃所化故名越王蛇江東人名越王約髮博物志云馬鱉食牛血所化然亦自有種類非盡化生也集解藏器曰兩頭蛇大如指一頭無口目兩頭俱能行云見之不吉故孫叔敖埋之恐後人見之必死也時珍曰按爾雅中央有枳首蛇中國之異氣也劉恂嶺表録云嶺外極多長尺餘大如小指背有錦丈腹下鮮紅人視為常不以為異羅願爾雅翼云寧國甚多數十同穴黒鱗白章又一種夏月兩後出如蚯蚓大有鱗其尾如首亦名兩頭蛇又張耒雜志云黄州兩頭蛇一名山蚓云是老蚓所化行不類蛇宛轉甚鈍此即羅氏所云者也肉氣味時珍曰按南越志云無毒夷人餌之主治瘧疾山人收取乾之佩于項上時珍天蛇綱目集解時珍曰按沈存中筆談云天蛇生幽陰之地邇雨後則出越人深畏之其大如筯而匾長三四尺色黄赤澆之以醋則消或以石灰糁之亦死又云天蛇不知何物人遭其螫仍為露水所濡則遍身潰爛或云草間花蜘蛛者非矣廣西一吏為蟲所毒舉身潰爛一醫視云天蛇所螫不可為矣仍以藥傅其一有腫處以鉗拔出如蛇十餘而疾終不起又錢塘一田夫忽病癩通身潰爛號呼欲絶西溪寺僧視之曰此天蛇毒非癩也以秦皮煮汁一斗令其恣飲初日减半三日頓愈又水蛇治天蛇毒見前茍印拾遺集解藏器曰苟印一名茍斗出潮州如蛇有四足膏主治滴耳中治聾令左右耳徹藏器蛇角綱目釋名骨咄犀亦作骨篤碧犀時珍曰按陶九成輟耕録云骨咄犀大蛇之角也當作蠱毒謂其解蟲毒如犀角也唐書有古都國亦産此則骨咄又似古都之訛也集解時珍曰按大明㑹典云蛇角出哈宻衛劉郁西域記云骨篤犀即大蛇角出西畨曹昭格古論云骨篤犀碧犀也色如淡碧玉稍有黄色其文理似角扣之聲清越如玉磨刮嗅之有香燒之不臭最貴重能消腫解毒洪邁松漠紀聞云骨咄犀犀不甚大紋如象牙帶黄色作刀靶者已為無價之寶也氣味有毒主治消腫毒解諸毒蠱毒以毒攻毒也時珍諸蛇綱目釋名時珍曰蛇字古作它俗作虵有余移佗三音篆文象其宛轉屈曲之形其行委佗故名嶺南人食之或呼為訛或呼為茅鱓按山海經云海外西南人以蟲為蛇號蛇為魚則自古已然矣集解時珍曰蛇類璅語不可類從者萃族於左以便考閲蛇在禽為翼火天文象形居南方在卦為巽風已為蛇在神為𤣥武北方之神𤣥龜纁蛇相合也在物為毒蟲出説文有水火草木土五種出北戸録青黄赤白黑金翠斑花諸色見各條毒蟲也而有無毒者金蛇水蛇無毒鱗蟲也而有生毛者蝮蛇文間有毛山海經云長蛇毛如彘毫也卵生也而有胎産者蝮蛇胎生腹行也而有四足者鱗蛇千嵗蝮茍印蜥蝪皆有足又有冠者雞冠蛇頭上有冠最毒角者三角蛇有角翼者西山經云太華山有蛇六足四翼名曰肥􅖆飛者山海經云柴桑多飛蛇荀子云螣蛇無足而飛獸首者大荒經云肅慎國有琴蛇獸首蛇身人面者江湖紀聞云嶺表有人面蛇能呼人姓名害人惟畏蜈蚣兩首者枳首蛇兩身者北山經云渾夕之山有蛇曰肥遺一首兩身見則大旱管子曰涸水之精名曰蟡狀如蛇一首兩身長八尺呼其名可取魚鱉岐尾者廣志云出雲南鈎尾者張文仲云鈎蛇尾如鈎能鈎人獸入水食之熇尾者葛洪云熇尾蛇似青蝰其尾三四寸有異色最毒柂形者張文仲云柂蛇形似柂長七八尺中人必死削船柂煮汁浸之杵形者即合木蛇又有青蝰即竹根蛇白蝰蒼虺文蝮白頸黑甲赤目黄口之類張文仲云惡蛇甚多四五月青蝰蒼虺白頸大蝪六七月白蝰文蝮黒甲亦目黄口反鈎三角之類皆毒之猛烈者又南方有呴蛇人若傷之不死終身伺其主雖百衆人中亦來取之惟百里外乃免耳蛇出以春出則食物蛇以春夏為晝秋冬為夜其蟄以冬蟄則含土至春吐出即蛇黄石其舌雙物理論云舌者心苗火旺于己巳為蛇故蛇雙舌其耳聾埤雅云蛇聾虎齆其聴以目埤雅其蟠向壬淮南子其毒在涎弄蛇洗淨涎則無毒也蛇涎着人生蛇漠瘡吐涎成絲能害人目段成式云蛇怒時毒在頭尾其珠在口陸佃云龍珠在頷蛇珠在口懷味之蛇多喜投暗見人張口吐氣如燼其行也紆淮南子云蛇屬紆行其食也吞有牙無齒皮數解脱變化論云龍易骨蛇易皮性曉方藥出稽聖賦又異􅁐云田父見蛇被傷一蛇銜草傅之遂去其人採草治瘡名曰蛇銜蛇交蛇則雄入雌腹交已即退出也段成式云人見蛇交三年死李廷飛云人見蛇交主有喜蛇交雉則生蜃及蟂詳見蛟龍魯至剛云蛇交雉生卵遇雷入土久則成蛟不入土但為雉耳述異記云江淮中有獸名能乃蛇精所化也冬則為雉春復為蛇蛇以龜鱉為雌埤雅云大要純雌以蛇為雄蛇求於龜鱉則生龜鱉蛇求於雉則生蜃蛟物異而感同也又與鱧鱓通氣見本條入水交石斑魚見本條入山與孔雀匹禽經云鵲見蛇則噪而奔孔見蛇則喜而躍竹化蛇蛇化雉異苑云大元中汝南人伐木見一竹中央已成蛇形而枝葉如故又桐廬民伐竹見蛇化雉頭頃已就身猶蛇也乃知竹化蛇蛇化雉䕫憐蛇蛇憐風出莊子水蛇化鱓名蛇鱓有毒螣蛇化龍神蛇能乗雲霧而飛游千里螣蛇聴孕出變化論又抱朴子云螣蛇不交蟒蛇目圓出述異記大蛇曰蟒巴蛇吞象山海經云巴蛇食象三年而出其骨蚺蛇吞鹿詳見條本𤣥蛇吞麈大鹿也出山海經活褥蛇能捕䑕唐書云貞觀中波斯國獻之狀同䑕色正青能捕䑕食蛇䑕能捕蛇唐書云􅄢賔國有食蛇䑕尖喙赤尾能食蛇被蛇螫者以䑕嗅而尿之立愈蛇吞䑕而有囓蛇之䑕狼冦曰嘗見一烏蛇長丈餘有䑕狼囓蛇頭曳之而去亦相畏伏耳蛇吞蛙而有制蛇之田父洽聞記云蝦蟇大者名田父見蛇則銜其尾良久蛇死尾後數寸皮不損而肉已盡矣蛇令豹止而有食蛇之貘淮南子云蛇令豹止物相制也貘乃白豹食蛇及鐵龜蛇同氣而有呷蛇之龜見攝龜𤣥龜食蟒王起云以小制大禽之制在氣也蝍蛆甘帶出莊子蝍蛆蜈蚣也帶蛇也陸佃云蜈蚣見大蛇能以氣禁之啖其腦眼蟾蜍食蝍蛆蝍蛆食蛇蛇食蟾蜍物畏其天也墨客揮犀云蜈蚣逐蛇蛇即張口乃入其腹食之鴆步則蛇出鵙鳴則蛇結出禽經鴆鳥能禹步禁呪使大石自轉取蛇食之蛇入口即麋也鸛亦然鵙伯勞也鸛鶴鷹鶻鶖皆鳥之食蛇者也蛇鷹蛇鶻餘見本條虎猴麂麝牛皆獸之食蛇者也玃猴食蛇牛食蛇則獨肝有毒蛇所食之蟲則蛙䑕燕雀蝙蝠鳥雛所食之草則芹茄石楠茱茰蛇粟噇子也所憎之物則蘘荷菴䕡蛇芮草鵞糞所畏之藥則雄黄雌黄羖羊角蜈蚣千金云入山佩武都雄黄雌黄或燒羖羊角烟或筒盛蜈蚣則蛇不敢近誤觸萵菜則目不見物出續墨客揮犀炙以桑薪則足可立出藏器曰蛇有足見之不佳惟桑薪火炙之則見不足怪也陶𢎞景曰五月五日燒地令熱以酒沃之置蛇于上則足見蛇蟠人足淋以熱尿或沃以熱湯則自解蛇入人竅炙以艾炷或辣以椒末則自出以艾炷炙蛇尾或割破蛇尾塞以椒末即出内解蛇毒之藥則雄黄貝母大蒜薤白蒼耳外治蛇蠚之藥則大青鶴蝨苦苣堇菜射菵薑黄乾薑白礬黑豆葉黄荆葉蛇含草犬糞鵝糞蔡苴機糞本草綱目卷四十三
