body:
  text: 本草綱目卷八明李時珍撰金石之一金類二十八種金别録中品校正併入拾遺金漿釋名黄牙鏡源太真時珍曰按許愼説文云五金黄為之長乆埋不生衣百錬不輕從革不違生於土故字左右注象金在土中之形爾雅云黄金謂之璗美者謂之鏐餅金謂之鈑絶澤謂之銑獨孤滔云天生牙謂之黄牙梵書謂之蘇伐羅𢎞景曰仙方名金為太真集解别録曰金屑生益州采無時𢎞景曰金之所生處處皆有梁益寜三州多有出水沙中作屑謂之生金建平晉安亦有金沙出石中燒鎔鼓鑄為碢雖被火亦未熟猶須更錬髙麗扶南及西域外國成器皆錬熟可服藏器曰生金生嶺南夷獠峒穴山中如赤黒碎石金鐵屎之類南人云毒蛇齒落在石中又云蛇屎着石上及鵷鳥屎着石上皆碎取毒處為生金有大毒殺人本草言黄金有毒誤矣生金與黄金全别也常見人取金掘地深丈餘至紛子石石皆一頭黒焦石下有金大者如指小者猶麻豆色如桑黄咬時極軟即是真金夫匠竊而吞者不見有毒其麩金出水沙中氊上淘取或鵝鴨腹中得之即便打成器物亦不重鍊煎取金汁便堪鎮心志曰今醫家所用皆鍊熟金薄及以水煮金器取汁用之則無毒矣皇朝収復嶺表詢訪彼人並無蛇屎之説藏器傳聞之言非矣頌曰今饒信南劍澄州所出采亦多端或有若山石狀者若米豆粒者此類皆未經火並為生金珣曰山海經所説諸山出金極多不能備録廣州記云大食國出金最多貨易並用金錢異物志云金生麗水又蔡州𤓰子金雲南出顆塊金在山石間采之黔南遂府吉州水中並産麩金嶺表録云五嶺内富州賔州澄州涪縣江溪河皆産金居人多飬鵞鴨取屎以淘金片日得一兩或半兩有終日不獲一星者其金夜眀宗奭曰顆塊金即穴山至百十尺見伴金石定見金也其石褐色一頭如火燒黒之狀其金色深赤黄麩金即在江沙水中淘汰而得其色淺黄皆是生金得之皆當鑄錬麩金耗多入藥當用塊金色既深則金氣足餘須防藥制成及㸃化者此等焉得有造化之氣如紫雪之類用金煮汁盖假其自然之氣爾又東南金色深西南金色淡亦土地所宜也時珍曰金有山金沙金二種其色七青八黄九紫十赤以赤為足色和銀者性柔試石則色青和銅者性硬試石則有聲寳貨辨疑云馬蹄金象馬蹄難得橄㰖金出荆湖嶺南胯子金象帶胯出湖南北𤓰子金大如𤓰子麩金如麩片出湖南及髙麗沙金細如沙屑出蜀中葉子金出雲南地鏡圖云黄金之氣赤夜有火光及白鼠或云山有薤下有金凡金曽在塜墓間及為􅁫釧溲器者陶隠居謂之辱金不可合煉寳藏論云金有二十種又外國五種還丹金出丹穴中體含月砂色尤赤合丹服之希世之寳也麩金出五溪漢江大者如𤓰子小者如麥性平無毒山金出交廣南韶諸山銜石而生馬蹄金乃最精者二蹄一斤毒金即生金出交廣山石内赤而有大毒殺人錬十餘次毒乃已此五種皆眞金也水銀金丹砂金雄黃金雌黄金硫黄金曽青金石緑金石膽金毋砂金白錫金黒鈆金並藥制成者銅金生鐵金熟鐵金鍮石金并藥㸃成者已上十五種皆假金也性頑滯有毒外國五種乃波斯紫磨金東夷青金林邑赤金西戎金占城金也金屑氣味辛苦有毒大明曰無毒珣曰生者有毒熟者無毒宗奭曰不曰金而更加屑字者是已經磨屑可用之義必須烹錬鍜屑為薄方可入藥金薄亦同生金有毒能殺人且難解有中其毒者惟鷓鵠肉可解之若不經鍜屑即不可用金性惡錫畏水銀得餘甘子則體柔亦相感耳時珍曰洗金以鹽駱駝驢馬脂皆能柔金金遇鈆則碎翡翠石能屑金亦物性相制也金蛇能解生金毒晉賈后飲金屑酒而死則生金有毒可知矣凡用金薄須辨出銅薄主治鎮精神堅骨髓通利五臟邪氣服之神仙别録療小兒驚傷五臟風癎失志鎮心安䰟魄甄權癲癎風熱上氣欬𠻳傷寒肺損吐血骨蒸勞極作渴並以薄入丸散服李珣破冷氣除風青霞子金漿拾遺氣味同金主治長生神仙久服腸中盡為金色藏器發明𢎞景曰生金辟惡而有毒不錬服之殺人仙經以醯蜜及猪肪牡荆酒軰錬至柔軟服之成仙亦以合水銀作丹砂醫方都無用者當是慮其有毒爾損之曰生者殺人百錬者乃堪服水銀合膏飲即不錬頌曰金屑古方不見用者惟作金薄入藥甚便又古方金石凌紅雪紫雪軰皆取金銀煮汁此通用經錬者假其氣爾時珍曰金乃西方之行性能制水故療驚癎風熱肝膽之病而古方罕用惟服食家言之淮南三十六水法亦化為漿服餌葛洪抱朴子言餌黄金不亞千金液其法用豕負革肪苦酒錬之百遍即柔或以樗皮治之或以牡荆酒慈石消之為水或以雄黄雌黄合餌皆能地仙又言丹砂化為聖金服之昇仙别録陳藏器亦言乆服神仙其説盖自秦皇漢武時方士傳流而來豈知血肉之軀水穀為頼可能堪此金石重墜之物乆在腸胃乎求生而喪生可謂愚也矣故太清法云金禀中宫隂已之氣性本剛服之傷損肌肉又東觀秘記云亡人以黄金塞九竅則尸不朽此雖近於理然亦誨盗矣曷若速化歸虛之為愈也哉附方新五風眼爛弦金環燒紅掠上下臉肉日數次甚妙集簡方牙齒風痛火燒金􅁫針之立止集簡方輕粉破口凡水腫及瘡病服輕粉後口瘡齦爛金噐煮汁頻頻含漱能殺粉毒以愈為度外臺秘要水銀入耳能蝕人腦以金枕耳邊自出也張仲景方水銀入肉令人筋孿惟以金物熨之水銀當出蝕金候金白色是也頻用取效此北齊徐玉方也遺本草拾銀别録中品校正併入開寳生銀釋名白金綱目鋈時珍曰爾雅白金謂之銀其美者曰鏐説文云鋈白金也梵書謂之阿路巴集解别録曰銀屑生永昌采無時𢎞景曰銀之所出處亦與金同但是生土中也錬餌法亦似金永昌屬益州今屬寜州恭曰銀與金生不同處所在皆有而以虢州者為勝此外多鈆穢為劣髙麗作帖者云非銀􅑭所出然色青不如虢州者志曰生銀出饒州樂平諸坑銀􅑭中狀如硬錫文理粗錯自然者真頌曰銀在􅑭中與銅相雜土人采得以鈆再三煎錬方成故為熟銀生銀則生銀􅑭中狀如硬錫其金坑中所得乃在土石中滲漏成條若絲髮狀土人謂之老翁鬚極難得方書用生銀必得此乃真珣曰按南越志波斯國有天生藥銀用為試藥指環又燒朱粉甕下多年沉積有銀號盃鉛銀光軟甚好與波斯銀功力相似秖是難得今時燒錬家毎一斤生鉛只得一二銖山海經云東北樂平郡堂少山出銀甚多黔中生銀體頂不堪入藥宗奭曰銀出於􅑭須煎錬成故名熟銀其生銀即不自􅑭中出而特然生者又謂之老翁鬚其入用大同世之術士以硃砂而成以鉛汞而成以焦銅而成者既無造化之氣豈可入藥不可不别時珍曰閩浙荆湖饒信廣滇貴州交趾諸處山中皆産銀有􅑭中錬出者有沙土中錬出者其生銀俗稱銀笋銀牙者也亦曰出山銀獨孤滔丹房鏡源所謂鉛坑中出褐色石形如笋打破即白名曰自然牙曰自然鉛亦曰生鉛此有變化之道不堪服食者是也管子云上有鉛下有銀地鏡圖云山有葱下有銀銀之氣入夜正白流散在地其精變為白雄雞寳藏論云銀有十七種又外國四種天生牙生銀坑内石縫中狀如亂絲色紅者上入火紫白如草根者次之銜黒石者最竒生樂平鄱陽産鉛之山一名龍牙一名龍鬚是正生銀無毒為至藥根本也生銀生石􅀈中成片塊大小不定狀如硬錫母砂銀生五溪丹砂穴中色理紅光黒鉛銀得子母之氣此四種為真銀有水銀銀草砂銀曽青銀石緑銀雄黄銀雌黄銀膽礬銀靈草銀皆是以藥制成者丹陽銀銅銀鐵銀白錫銀皆以藥㸃化者十三種皆假銀也外國四種新羅銀波斯銀林邑銀雲南銀並精姸銀屑修治𢎞景曰醫方鎮心丸用之不可正服為屑見當以水銀研令消也恭曰方家用銀屑取成銀薄以水銀消之為泥合消石及鹽研為粉燒出水銀淘去鹽石為粉極細用之乃佳不得只磨取屑耳時珍曰入藥只用銀薄易細若用水銀鹽消制者反有毒矣龍木論謂之銀液又有錫薄可偽宜辨之氣味辛平有毒珣曰大寒無毒詳生銀下主治安五臟定心神止驚悸除邪氣久服輕身長年别録定志去驚癎小兒癲疾狂走甄權破冷除風青霞子銀薄堅骨鎮心明目去風熱癲癎入丸散用李珣生銀氣味辛寒無毒獨孤滔云鉛内銀有毒保昇曰畏黄連甘草飛亷石亭脂砒石惡羊血馬目毒公火明曰冷微毒畏慈石惡錫忌生血時珍曰荷葉蕈灰能粉銀羚羊角烏賊魚骨鼠尾龜殻生薑地黄慈石俱能瘦銀羊脂紫蘇子油皆能柔銀主治熱狂驚悸發癎恍惚夜卧不安讝語邪氣鬼祟服之明目鎮心安神定志小兒諸熱丹毒並以水磨服之功勝紫雪開寳小兒中惡熱毒煩悶水磨服之大眀煮水入葱白粳米作粥食治胎動不安漏血時珍發明好古曰白銀屬肺頌曰銀屑葛洪肘後方治癰腫五石湯中用之宗奭曰本草言銀屑有毒生銀無毒釋者畧漏不言盖生銀已發於外無藴鬰之氣故無毒􅑭銀藴於石中鬰結之氣全未敷暢故有毒也時珍曰此説非矣生銀初煎出如縵理乃其天真故無毒鎔者投以少銅則成絲文金花銅多則反敗銀去銅則復還銀而初入少銅終不能出作偽者又制以藥石鉛錫且古法用水銀煎消制銀薄成泥入藥所以銀屑有毒銀本無毒其毒則諸物之毒也今人用銀器飲食遇毒則變黒中毒死者亦以銀物探試之則銀之無毒可徴矣其入藥亦是平肝鎮怯之義故太清服錬書言銀稟四方辛隂之神結精為質性剛戾服之能傷肝是也抱朴子言銀化水服可成地仙者亦方士謬言也不足信斆曰凡使金銀銅鐵只可渾安在藥中借氣生藥力而已勿入藥服能消人脂附方舊二新四妊娠腰痛如折者銀一兩水三升煎二升服之子母秘録胎動欲墮痛不可忍銀五兩苧根二兩清酒一盞水一大盞煎一盞温服婦人良方胎熱横悶生銀五兩葱白三寸阿膠炒半兩水一盞煎服亦可入糯米作粥食聖惠方風牙疼痛文銀一兩燒紅淬燒酒一盞熱漱飲之立止集簡方口鼻疳蝕穿唇透頰銀屑一兩水三升銅噐煎一升日洗三四次聖濟録身面赤疪常以銀揩令熱乆乆自消千金翼附録黄銀拾遺恭曰黄銀本草不載俗云為噐辟惡乃為瑞物藏器曰黄銀載在瑞物圖經既堪為器眀非瑞物時珍曰按方汋泊宅編云黄銀出蜀中色與金無異但上石則白色熊太古冀越集云黄銀絶少道家言鬼神畏之六帖載唐太宗賜房𤣥齡帶云世傳黄銀鬼神畏之春秋運斗樞云人君秉金徳而生則黄銀見世人以鍮石為黄銀非也鍮石即藥成黄銅也烏銀藏器曰今人用硫黄熏銀再宿瀉之則色黒矣工人用為器飬生者以器煮藥兼於一二丈處夜承露醴飲之長年辟惡錫恡脂綱目集解時珍曰此乃波斯國銀􅀈也一作悉藺脂主治目生翳膜用火燒銅鍼輕㸃乃傅之不痛又主一切風氣及三焦消渴飲水並入丸藥用時珍附方新一小兒天弔多涎搐搦不定錫恡脂一兩水淘黒汁令盡水銀一分以少􅀥肉研不見星牛黄半分麝香半分研勻粳米飯丸黍米大毎服三十二丸新汲水下名保命丹普濟方銀膏唐本草集解恭曰其法用白錫和銀薄及水銀合成之凝硬如銀合錬有法時珍曰今方士家有銀脆恐即世物也氣味辛大寒有毒主治熱風心虚驚悸恍惚狂走膈上熱頭面熱風衝心上下安神定志鎮心明目利水道治人心風徤忘亦補牙齒缺落蘇恭硃砂銀日華集解時珍曰此乃方士用諸藥合硃砂鍊制而成者鶴頂新書云丹砂受青陽之氣始生􅑭石二百年成丹砂而青女孕三百年而成鉛又二百年而成銀又二百年復得太和之氣化而為金又曰金公以丹砂為子是隂中之陽陽死隂凝乃成至寳氣味冷無毒大明曰畏石亭脂慈石鐵忌一切血主治延年益色鎮心安神止驚悸辟邪治中惡蟲毒心熱煎煩憂忘虚劣大眀赤銅唐本草釋名紅銅綱目赤金𢎞景屑名銅落銅末銅花銅粉銅砂時珍曰銅與金同故字從金同也集解𢎞景曰銅為赤金生熟皆赤而本草無用今銅青及大錢皆入方用並是生銅應在下品之例也時珍曰銅有赤銅白銅青銅赤銅出川廣雲貴諸處山中土人穴山采礦錬取之白銅出雲南青銅出南番惟赤銅為用最多且可入藥人以爐甘石錬為黄銅其色如金砒石錬為白銅雜錫錬為銅山海經言出銅之山四百六十七今則不知其幾也寳藏論云赤金一十種丹陽銅武昌白慢銅一生銅生銀銅皆不由陶冶而生者無毒宜作鼎器波斯青銅可為鏡新羅銅可作鍾石綠石青白青等銅並是藥制成鐵銅以苦膽水浸至生赤煤熬錬成而黒堅錫坑銅大軟可㸃化自然銅見本條鶴頂新書云銅與金銀同一根源也得紫陽之氣而生緑緑二百年而生石銅始生于中其氣禀陽故質剛戾管子云上有陵石下有赤銅地鏡圖云山有慈石下有金若銅草莖黄秀下有銅器銅器之精為馬為僮抱朴子云銅有牝牡在火中尚赤時令童男童女以水灌之銅自分為兩叚凸起者牡也凹下者牝也以牝為雌劒牡為雄劍帶之入江湖則蛟龍水神皆畏避也赤銅屑修治時珍曰即打銅落下屑也或以紅銅火鍜水淬亦自落下以水淘淨用好酒入沙鍋内炒見火星取研末用氣味苦平微毒時珍曰蒼术粉銅巴豆牛脂軟銅慈姑乳香啞銅物性然也賊風反折熬使極熱投酒中服五合日三或以五斤燒赤納二斗酒中百遍如上服之又治腋臭以醋和如麥飯袋盛先刺腋下􅎃去血封之神效唐本明目治風眼接骨銲齒療女人血氣及心痛大明同五倍子能染鬚髮時珍發明時珍曰太清服錬法云銅秉東方乙隂之氣結成性利服之傷腎既云傷腎而又能接骨何哉藏器曰赤銅屑主傷寒能銲人骨及六畜有損者細研酒服直入骨損處六畜死後取骨視之猶有銲痕可驗打熟銅不堪用惟微曰朝野僉載云定州崔務墜馬折足醫者取銅末和酒服之遂瘥及亡後十年改塟視其脛骨折處猶有銅束之也附方舊一腋下狐臭崔氏方用清水洗淨又用清酢漿洗淨㣲揩破取銅屑和酢熱揩之甚驗外臺自然銅宋開寳釋名石髓鉛志曰其色青黄如銅不從礦錬故號自然銅集解志曰自然銅生邕州山巖間出銅處于坑中及石間采得方圓不定其色青黄如銅頌曰今信州火山軍銅坑中及石間皆有之信州出一種如亂銅絲狀云在銅坑中山氣熏蒸自然流出亦若生銀老翁鬚之類入藥最好火山軍出者顆塊如銅而堅重如石醫家謂之銗石用之力薄采無時今南方醫者説自然銅有兩三體一體大如麻黍或多方解纍纍相綴至如斗大者色煌煌眀爛如黄金鍮石入藥最上一體成塊大小不定亦光眀而赤一體如薑鐵屎之類又有如不治而成者形大小不定皆出銅坑中撃之易碎有黄赤有青赤錬之乃成銅也其説分析頗精而未常見似亂絲者又云今市人多以銗石為自然銅燒之成青熖如硫黄者是也此亦有二三種一種有殻如禹餘粮撃破其中光眀如鑑色黄類鍮石也一種青黄而有墻壁成文如束針一種碎理如團砂者皆光眀如銅色多青白而赤少者燒之皆成烟滔頃刻都盡今醫家多誤以此為自然銅市中所貨往往是此而自然銅用須火煆此乃畏火不必形色只此可辨也獨孤滔曰自然銅出信州鉛山縣銀塲銅坑中深處有銅鑛多年鑛氣結成似馬氣勃也色紫重食之苦濇者是真今人以大石為自然銅誤矣承曰今辰州川澤中出一種自然銅形圓似蛇含大者如胡桃小者如粟外有皮黒色光潤破之與銗石無别但北銗石不作臭氣耳入藥用之殊驗斆曰石髓鉛即自然銅勿用方金牙直相似若誤餌之吐殺人石髓鉛似乾銀泥味㣲甘也時珍曰按寳藏論云自然銅生曽青石緑穴中狀如寒林草根色紅膩亦有墻壁又一類似丹砂光眀堅硬有稜中含銅脉尤佳又一種似木根不紅膩隨手碎為粉至為精眀近銅之山則有之今俗中所用自然銅皆非也修治斆曰采得石髓鉛搥碎同甘草湯煮二伏時至眀漉出攤令乾入臼中搗了重篩過以醋浸一宿至眀用六一混泥瓷盒子盛二升文武火中飬三日夜才乾用盖盖了火煆兩伏時去土研如粉用凡脩事五兩以醋兩鎰為度時珍曰今人只以火煆醋淬七次研細水飛過用氣味辛平無毒大明曰凉主治折傷散血止痛破積聚開寶消瘀血排膿續筋骨治產後血邪安心止驚悸以酒磨服大眀發明宗奭曰有人以自然銅飼折翅胡鴈後遂飛去今人打撲損研細水飛過同當歸没藥各半錢以酒調服仍手摩病處震亨曰自然銅世以為接骨之藥然此等方儘多大扺宜補氣補血補胃俗工惟在速效迎合病人之意而銅非煆不可用若新出火者其火毒金毒相扇挾香藥熱毒雖有接骨之功燥散之禍甚於刀劒戒之時珍曰自然銅接骨之功與銅屑同不可誣也但接骨之後不可常服即便理氣活血可爾附方新三心氣刺痛自然銅火煆醋淬九次研末醋調一字服即止衛生易簡方項下氣癭自然銅貯水甕中逐日飲食皆用此水其癭自消或火燒烟氣乆乆吸之亦可楊仁齋直指方暑濕癱瘓四肢不能動自然銅燒紅酒浸一夜用烏頭炮五靈脂蒼术酒浸各一兩當歸二錢酒浸為末酒糊丸梧子大毎服七丸酒下覺四肢麻木即止陸氏積徳堂方銅礦石礦音古猛切亦作􅑭唐本草釋名時珍曰礦粗惡也五金皆有粗石銜之故名麥之粗者􅜿犬之惡者亦曰獷集解恭曰銅礦石狀如薑石而有銅星鎔之取銅也出銅山中許愼説文云礦銅鐵撲石也氣味酸寒有小毒主治丁腫惡瘡為末傅之驢馬脊瘡臭腋磨汁塗唐本銅青宋嘉祐釋名銅緑集解藏器曰生熟銅皆有青即是銅之精華大者即空緑以次空青也銅青則是銅噐上緑色者淘洗用之時珍曰近時人以醋制銅生緑取収晒乾貨之氣味酸平微毒主治婦人血氣心痛合金瘡止血明目去膚赤息肉藏器主風爛眼淚血之才治惡瘡疳瘡吐風痰殺蟲時珍發明時珍曰銅青乃銅之液氣所結酸而有小毒能入肝膽故吐利風痰眀目殺疳皆肝膽之病也抱朴子云銅青塗木入水不腐附方舊二新十一風痰卒中碧林丹治痰涎潮盛卒中不語及一身風癱用生緑二兩乳細水化去石慢火熬乾取辰日辰日辰位上脩合再研水麝香一分糯米粉糊和丸彈子大隂乾卒中者毎丸作二服薄荷酒研下餘風硃砂酒化下吐出青碧涎㵼下惡下大效治小兒用緑雲丹銅緑不計多少研粉醋麫糊丸芡子大每薄荷酒化服一丸須􅁷吐涎如膠神效經驗方爛弦風眼銅青水調塗盌底以艾熏乾刮下塗爛處衛生易簡方赤髮秃落油磨銅錢末塗之即生普濟方面黶黒痣以草劃破銅緑末傅之三日勿洗水自落厚者再上之聖濟録走馬牙疳銅青滑石杏仁等分為末擦之立愈邵眞人經驗方口鼻疳瘡銅青枯礬等分研傅之緑又方人中白一錢銅三分研傅之楊梅毒瘡銅緑醋煮研末燒酒調搽極痛出水次日即乾或加白礬等分研糝簡便方臁瘡頑癬銅緑七分研黄蠟一兩化熬以厚紙拖過表裏别以紙隔貼之出水妙亦治楊梅瘡及虫咬筆峯雜興腸風痔瘻方見宻陀僧下諸蛇螫毒銅青傅之千金方百蟲入耳生油調銅緑滴入衛生家寳方頭上生虱銅青眀礬末摻之摘𤣥方鈆日華釋名青金説文黒錫金公綱目水中金時珍曰鈆易㳂流故謂之鈆錫為白錫故此為黒錫而神仙家折其字為金公隠其名為水中金集解頌曰鉛生蜀郡平澤今有銀坑處皆有之燒礦而取時珍曰鉛生山穴石間人挾油燈入至數里隨礦脉上下曲折斫取之其氣毒人若連月不出則皮膚痿黄腹脹不能食多致疾而死地鏡圖云草青莖赤其下多鉛鉛錫之精為老婦獨孤滔云嘉州利州出草節鉛生鉛未鍜者也打破脃燒之氣如硫黄紫背鉛即熟鉛鉛之精華也有變化能碎金剛鑚雅州出釣脚鉛形如皂子大又如蝌斗子黒色出山澗沙中可乾汞盧氏鉛粗惡力劣信州鉛雜銅氣隂平鉛出劍州是銅鐵之苖並不可用寳藏論云鉛有數種波斯鉛堅白為天下第一草節鉛出犍為銀之精也銜銀鉛銀坑中之鈆也内含五色並妙上饒樂平鉛次于波斯草節負版鉛鐵苗也不可用倭鉛可勾金上宿真言本草云鉛乃五金之祖故有五金狴犴追䰟使者之稱言其能伏五金而死八石也雌黄乃金之苖而中有鉛氣是黄金之祖矣銀坑有鉛是白金之祖矣信鉛雜銅是赤金之祖矣與錫同氣是青金之祖矣硃砂伏于鉛而死于硫硫戀于鉛而伏于硒鐵戀于磁而死于鉛雄戀于鉛而死于五知故金公變化最多一變而成胡粉再變而成黄丹三變而成宻陀僧四變而為白霜雷氏炮炙論云令鉛住火須仗脩天如要形堅豈忘紫背註云脩天補天石也紫背天葵也修治時珍曰凡用以鐵銚溶化寫瓦上濾去渣脚如此數次収用其黒錫灰則以鉛沙取黒灰白錫灰不入藥氣味甘寒無毒藏器曰小毒主治鎮心安神治傷寒毒氣反胃嘔􅎪蛇蜴所咬炙熨之大明療癭瘤鬼氣疰忤錯為末和青木香傅瘡腫惡毒藏器消瘰癧􅏴腫明目固牙烏鬚髮治實女殺蟲墜痰治噎膈消渴風癎解金石藥毒時珍黒錫灰主治積聚殺蟲同㯽榔末等分五更米飲服震亨發明好古曰黒錫屬腎時珍曰鉛秉北方癸水之氣隂極之精其體重實其性濡滑其色黒内通于腎故局方黒錫丹宣眀補真丹皆用之得汞交感即能治一切隂陽混淆上盛下虛氣升不降發為嘔吐眩運噎膈反胃危篤諸疾所謂鎭墜之劑有反正之功但性帶隂毒不可多服恐傷人心胃耳鉛性又能入肉故女子以鉛珠紝耳即自穿孔實女無竅者以鉛作鋌逐日紝之乆乆自開此皆昔人所未知者也鉛變化為胡粉黄丹宻陀僧鉛白霜其功皆與鉛同但胡粉入氣分黄丹入血分宻陀僧鎭墜下行鉛白霜專治上焦胸膈此為異耳方士又鑄為梳梳鬚髮令光黒或用藥煮之尤佳附方舊四新十七烏鬚明目黒鉛半斤鍋内鎔汁旋入桑條灰桞木攪成沙篩末毎早揩牙以水漱口洗目能固牙眀目黒鬚髮勝金方揩牙烏髭黒鉛消化以不蛀皂莢寸切投入炒成炭入塩少許研勻日用揩牙摘去白髭黒者更不白也又方黒錫一斤炒灰埋地中五日入升麻細辛訶子同炒黒日用揩牙百日效普濟牙齒動摇方同上烏鬚鉛梳鉛十兩錫三兩婆羅得三箇針砂熟地黄半兩莤根胡桃皮一兩没石子訶黎勒皮硫黄石橊皮慈石皂礬烏麻油各二錢半為末先化鉛錫入末一半桞木攪勻傾入梳模子印成脩齒餘末同水煮梳三日三夜水耗加之取出帛重重包五日毎以熟皮襯手梳一百下須先以皂莢水洗淨拭乾普濟腎臟氣發攻心面黒欲死及諸氣奔豚喘急鉛二兩石亭脂二兩木香一兩麝香一錢先化鉛炒乾入亭脂急炒熖起以醋噴之傾入地坑内覆住待冷取研粟飯丸芡子大毎用二丸熱酒化服取汗或下或通氣即愈如大便不通再用一丸入𤣥眀粉五分服聖劑方婦人血氣冷痛攻心方同上風癎吐沫反目抽掣乆患者黒鉛水銀結砂南星炮各一兩為末糯飯丸菉豆大一嵗一丸乳汁下方普濟反胃噦逆黒鉛化汁以桞木槌研成粉一兩入米醋一升砂鍋熬膏入蒸餅末少許擣丸小豆大毎服一丸薑湯下聖劑多年反胃不止紫背鉛二兩石亭脂二兩塩鹵汁五兩燒鉛以鹵汁淬盡與亭脂同炒熖起挑于水上熖止研匀蒸餅和丸梧子大毎服二十丸煎石蓮乾柿湯下方聖濟消渴煩悶黒鉛水銀等分結如泥常􅅤豆許吞津聖惠方寸白虫病先食豬肉一片乃以沙餹水調黒鉛灰四錢五更服之虫盡下食白粥一日許學士病嘈雜服此下二虫一寸㫁一長二尺五寸節節有斑文也本事方水腫浮滿烏錫五兩皂莢一挺炙酒二十煮六沸頻服至小便出二三升即消千金翼小便不通黒鉛錯末一兩生薑半兩燈心一握井水煎服先以炒葱貼臍聖惠方卒然欬𠻳爐中鉛屑桂心皂莢等分為末蜜丸如梧子大毎飲下十五丸忌葱備急方瘰癧結核鉛三兩鐵器炒取黒灰醋和塗上故帛貼之頻換去惡汁如此半月不痛不破内消為水而愈劉禹錫𫝊信方􅏴疽發背黒鉛一斤甘草三兩微炙瓶盛酒一斗浸甘草乃鎔鉛投酒中如此九度去滓飲酒醉卧即愈經驗方金石藥毒黒鉛一斤鎔化投酒一升如此十餘次待酒至半升頓飲勝金方取輕粉毒出山黒鉛五斤打壺一把盛燒酒十五斤納土茯苓半斤乳香三錢封固重湯煮一日夜埋土中出火毒毎日早晚任性飲數盃後用瓦盆接小便自有粉出為驗服至筋骨不痛乃止醫方摘要解砒霜毒煩躁如狂心腹疼痛四肢厥冷命在須㬰黒鉛四兩磨水一盌灌之華陀危病方解硫黄毒黒錫煎湯服即解集簡方鈆霜日華釋名鈆白霜修治頌曰鈆霜用鈆雜水銀十五分之一合練作片置醋甕中密封經乆成霜時珍曰以鈆打成錢穿成串瓦盆盛生醋以串横盆中離醋三寸仍以瓦盆覆之置隂處候生霜刷下仍合住氣味甘酸冷無毒宗奭曰鈆霜塗木𤓰即失酸味金克木也主治消痰止驚悸解酒毒去胸隔煩悶中風痰實止渴大眀去膈熱涎塞宗奭治吐逆鎮驚去怯黒鬚髪時珍發明頌曰鈆霜性極冷治風痰及嬰孺驚滯藥今醫家用之尤多時珍曰鈆霜乃鈆汞之氣交感英華所結道家謂之神符白雪其墜痰去熱定驚止瀉盖有竒効但非乆服常用之物爾病在上焦者宜此清鎭附方舊二新九小兒驚熱心肺積熱夜臥多驚鈆霜牛黄各半分鐵粉一分研匀毎服一字竹瀝調下聖濟録驚風癎痰喉閉牙𦂳鈆白霜一字蟾酥少許為末烏梅肉蘸藥於齦上揩之仍吹通闗藥良乆便開普濟方消渴煩熱鈆白霜枯白礬等分為末蜜丸芡子大綿褁含化曣汁末又方鈆白霜一兩根黄消石各一兩為毎冷水服一錢聖濟録喉痺腫痛鈆白霜甘草半兩青黛一兩為末醋糊丸芡子大毎含臙一丸立效聖濟録懸癰腫痛鈆白霜一分甘草半生半炙一分為末綿裹含嚥聖惠方口疳齦爛氣臭血出不拘大人小兒鈆白霜銅緑各二錢白礬豆許為末掃之宣眀方鼻衂不止鈆白霜末新汲水服一字十全博救方痔瘡腫痛鈆白霜白片腦各半字酒調塗之隨手見效嬰童百問室女經閉恍惚煩熱鈆霜半兩生地黄汁一合調下日三服聖惠方梳髮令黒鈆霜包梳日日梳之勝於染者普濟粉錫本經下品釋名解錫本經鈆粉綱目鈆華綱目胡粉𢎞景定粉藥性瓦粉湯液光粉日華白粉湯液水粉綱目官粉𢎞景曰即今化鈆所作胡粉也而謂之粉錫似與今乖時珍曰鈆錫一類也古人名鈆為黒錫故名粉錫釋名曰胡者餬也和脂以餬面也定瓦言其形光白言其色俗呼吳越者為官粉韶州者為韶粉辰州者為辰粉正誤恭曰鈆丹胡粉實用炒錫造陶言化鈆誤矣震亨曰胡粉是錫粉非鈆粉也古人以錫為粉婦以附面者其色類肌肉不可入藥用志曰粉錫黄丹二物俱是化鈆為之英公李勣序云鈆錫莫辨者謂此也按李含光音義云黄丹胡粉皆是化鈆未聞用錫者參同契云胡粉投炭中色壊還為鈆抱朴子内篇云愚人不信黄丹胡粉是化鈆所作蘇㳟以二物俱炒錫作大誤矣時珍曰錫炒則成黒灰豈有白粉蘇恭已誤而朱震亨復踵其誤何哉集解時珍曰按墨子云禹造粉張華博物志云紂燒鈆錫作粉則粉之來亦逺矣今金陵杭州韶州辰州皆造之而辰粉尤真其色帶青彼人言造法毎鈆百斤鎔化削成薄片卷作筒安木甑内甑下甑中各安醋一瓶外以塩泥固濟紙封甑縫風爐安火四兩飬一七便掃入水缸内依舊封飬次次如此鈆盡為度不盡者留炒作黄丹毎粉一斤入豆粉二兩蛤粉四兩水内攪匀澄去清水用細灰按成溝紙隔數層置粉于上將乾截成瓦定形待乾収起而范成大虞衡志言桂林所作鈆粉最有名謂之桂粉以黒鈆着糟甕中罨化之何孟春餘冬録云嵩陽産鈆居民多造胡粉其法鈆塊懸酒缸内封閉四十九日開之則化為粉矣化不白者炒為黄丹黄丹滓為宻陀僧三物収利甚博其鈆氣有毒工人必食肥猪犬肉飲酒及鐵漿以厭之枵腹中其毒輒病至死長幼為毒薰蒸多痿黄癱攣而斃其法畧皆不同盖巧者時出新意以速化為利故爾又可見昔人炒錫之謬相感志云韶粉蒸之不白以蘿蔔瓮子蒸之則白氣味辛寒無毒權曰甘辛凉時珍曰胡粉能制硫黄又雌黄得胡粉而失色胡粉得雌黄而色黒盖相惡也又入酒中去酸味収蟹不沙主治伏尸毒螫殺三蟲本經去鼈瘕療惡瘡止小便利墮胎别録治積聚不消炒焦止小兒疳痢甄權治癰腫瘻爛嘔逆療癥瘕小兒疳氣大眀止疶痢久積痢宗奭治食復勞復墜痰消脹治疥癬狐臭黒鬚髮時珍發明𢎞景曰胡粉金色者療尸蟲彌良藏器曰乆痢成疳者胡粉和水及雞子白服以糞黒為度為其殺蟲而止痢也時珍曰胡粉即鈆之變黒為白者也其體用雖與鈆及黄丹同而無消塩火燒之性内有豆粉蛤粉雜之止能入氣分不能入血分此為稍異人服食之則大便色黒者此乃還其本質所謂色壊還為鈆也亦可入膏藥代黄丹用附方舊十四新三十勞復食復欲死者水服胡粉少許肘後方小兒脾泄不止紅棗二十箇去核將官粉入内以隂陽瓦焙乾去棗研粉毎服三分米湯下孫真人集效方赤白痢下頻數腸痛定粉一兩雞子清和炙焦為末冷水服一錢肘後方小兒無辜疳下痢赤白胡粉熟蒸熬令色變以飲服半錢子母秘録小兒腹脹胡粉􅐭熬色變以摩腹上録子母秘腹皮青色不速治須臾死方同上小兒夜啼水服胡粉三豆大曰三服子母秘錄身熱多汗胡粉半斤雷丸四兩為末粉身千金方婦人心痛急者好官粉為末葱汁