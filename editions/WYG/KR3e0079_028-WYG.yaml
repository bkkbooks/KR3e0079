瘧不止黄丹炒半兩青蒿童尿浸二兩為末毎服二錢寒多酒服熱多茶服仁存堂方小兒癉瘧壯熱不寒黄丹二錢蜜水和服冷者酒服名鬼哭丹劉涓子鬼遺方風癎發止驅風散用鈆丹二兩白礬二兩為末用三角磚相闘以七層紙鋪磚上鋪丹於紙上礬鋪丹上以十斤桞木柴燒過為度取研毎服二錢温酒下王氏博濟方客忤中惡道間門外得之令人心腹刺痛氣衝心胸脹滿不治害人真丹方寸七蜜三合和灌之肘後方一切目疾昬障治只障不治蜂蜜半斤銅鍋熬起紫色塊入飛過真黄丹二兩水一盌再練至水氣盡以細生絹鋪薄紙一層濾浄瓶封理地内三七毎日㸃眼七次藥粘則洗之一方入訶子肉四箇保夀堂方赤眼痛黄丹蜂蜜調貼太陽穴立効眀目經驗方赤目及瞖鈆丹白礬等分為末㸃之又方鈆丹烏賊骨等分合研白蜜蒸㸃之千金方眼生珠管鈆丹半兩鯉魚膽汁和如膏日㸃三五次惠方聖痘疹生瞖黄丹輕粉等分為末吹少許入耳内左患吹右右患吹左疹痘方小兒重舌黄丹一豆大安舌下子母秘録小兒口瘡糜爛黄丹一錢生蜜一兩相和蒸黒毎以雞毛蘸搽甚效普濟方腋下胡臭黄丹入輕粉唾調頻摻之普濟方婦人逆產真丹塗兒足下集驗方蚰蜒入耳黄丹酥蜜杏仁等分熬膏綿裹包塞之聞香即出抽取聖惠方蠍蠆螫人醋調黄丹塗之肘後方金瘡出血不可以藥速合則内潰傷肉只以黄丹滑石等分為末傅之集𤣥方外痔腫痛黄丹滑石等分為末新汲水調日五上之嬰童百問血風臁瘡黄丹一兩黄蠟一兩香油五錢熬膏先以葱椒湯洗貼之陸氏積徳堂方逺近臁瘡黄丹飛炒黄蘗酒浸七日焙各一兩輕粉半兩研細以苦茶洗浄輕粉塡滿次用黄丹䕶之外以蘗末攤膏貼之勿掲動一七見效孫氏集效方宻陀僧唐本草釋名没多僧唐本爐底恭曰宻陀没多並胡言也集解恭曰出波斯國形似黄龍齒而堅重亦有白亦色者作理石文頌曰今嶺南閩中銀銅冶處有之是銀鉛脚其初采礦時銀銅相雜先以鉛同煎錬銀隨鉛出又采山木葉燒灰開地作爐塡灰其中謂之灰池置銀鈆於灰上更加火鍜鈆滲灰下銀住灰上罷火候冷出銀其灰池感鈆銀氣積乆成此物未必自胡中來也承曰今市中所貨是小瓶實鈆丹鍜成者大塊尚有瓶形銀冶所出最良而罕有貨者外國者未嘗見之時珍曰宻陀僧原取銀冶者今既難得乃取煎銷銀舖爐㡳用之造黄丹者以脚滓鍊成宻陀僧其似瓶形者是也修治斆曰凡使搗細安瓷鍋中重紙袋盛桞蛀末焙之次卜東流水浸滿火煮一伏時去桞末紙袋取用氣味鹹辛平有小毒大明曰甘平無毒時珍曰制狼毒主治久痢五痔金瘡面上瘢䵟面膏藥用之唐本保昇曰五痔謂牡酒腸血氣也鎮心補五臟治驚癎欬𠻳嘔逆吐痰大眀療反胃消渴瘧疾下痢止血殺蟲消積治諸瘡消腫毒除胡臭染髭髮時珍發明時珍曰宻陀僧感鈆銀之氣其性重墜下沉直走下焦故能墜痰止吐消積定驚癎治瘧痢止消渇療瘡腫洪邁夷堅志云驚氣入心絡瘖不能言語者用宻陀僧末一匕茶調服即愈昔有人伐薪為狼所遂而得是疾或授此方而愈又一軍校采藤逄惡蛇病此亦用之而愈此乃驚則氣亂宻陀僧之重以去怯而平肝也其功力與鈆丹同故膏藥中用代鈆丹云附方舊三新一十五痰結胸中不散宻陀僧一兩醋水各一盞煎乾為末毎服二錢以酒水各一小盞煎一盞温服少頃當吐出痰涎為妙聖惠方消渴飲水神效丸用宻陀僧二兩研末湯浸蒸餅丸梧子大濃煎蠶蠒鹽湯或茄根湯或酒下一日五丸日増五丸至三十丸止不可多服五六服後以見水惡心為度惡心時以乾物壓之日後自定甚竒選竒方赤白下痢宻陀僧三兩燒黄色研粉每服一錢醋茶下日三服聖惠方腸風痔瘻銅青宻陀僧各一錢麝香少許為末津和塗之濟急方小兒初生遍身如魚脬又如水晶破則成水流滲又生者宻陀僧生研擫之仍服蘇合香丸救急方驚氣失音方見發眀腋下胡臭漿水洗浄油調宻陀僧塗之以一錢用熱蒸餅一箇切開摻末夾之集簡方香口去臭宻陀僧一錢醋調𠻳口普濟方大人口瘡宻陀僧鍜研掺之聖濟方小兒口瘡不能吮乳宻陀僧末醋調塗足心瘡愈洗去蔡醫博方也黎居士簡易方鼻内生瘡宻陀僧香白芷等分為末蠟燭油調搽之簡便方鼻皶赤皰宻陀僧二兩細研入乳調夜塗旦洗聖惠方痘瘡瘢黶方同上譚氏䵟􅍍斑㸃方同上外臺夏月汗斑如疹用宻陀僧八錢雄黄四錢先以薑片擦熱仍以薑片蘸末擦之次日即焦活人心綂骨疽出骨一名多骨瘡不時出細骨乃母受胎未及一月與六親骨肉交合感其精氣故有多骨之名以宻陀僧末桐油謂匀攤貼之即愈夀域方血風臁瘡宻陀僧香油入粗盌内磨化油紙攤膏反覆貼之孫氏集效方陰汗濕痒宻陀僧末傅之末戴氏加蛇牀子錫拾遺釋名白鑞音臘鈏音引賀時珍曰爾雅錫謂之鈏郭璞注云白鑞也方術家謂之賀盖錫以臨賀出者為美也集解别録曰錫生桂陽山谷𢎞景曰今出臨賀猶是桂陽地界鉛與錫相似而人用大異時珍曰錫出雲南衡州許愼説文云錫者銀鉛之間也土宿本草云錫受太隂之氣而生二百年不動成砒砒二百年而錫始生錫稟隂氣故其質柔二百年不動遇太陽之氣乃成銀今人置酒於新錫器内浸漬日乆或殺人者以砒能化錫嵗月尚近便被采取其中藴毒故也又曰砒乃錫根銀色而鈆質五金之中獨錫易制失其藥則為五金之賊得其藥則為五金之媒星槎勝覽言滿剌加國於山溪中淘沙取錫不假煎鍊成塊名曰斗錫也正誤恭曰臨賀采者名鈆一名白鑞唯此一處資天下用其錫出銀處皆有之體相似而入用大異時珍曰蘇恭不識鉛錫以錫為鉛以鉛為錫其謂黄丹胡粉為炒錫皆由其不識故也今正之氣味甘寒㣲毒獨孤滔曰羖羊角五靈脂伏龍肝馬鞭草皆能縮賀硇砒能硬錫巴豆萞麻薑汁地黄能制錫松脂銲錫錫礦縮銀主治惡毒風瘡大眀發明時珍曰洪邁夷堅志云汝人多病癭地饒風沙沙入井中飲其水則生癭故金房間人家以錫為井䦨皆夾錫錢鎭之或沉錫井中乃免此患附方新二解砒霜毒錫器於粗石上磨水服之濟急方楊梅毒瘡黒鈆廣錫各二錢半結砂蜈蚣二條為末紙卷作小撚油浸一夜㸃燈日照瘡二次七日見效集𤣥方古鏡拾遺校正併入本經錫銅鏡鼻釋名鑑照子時珍曰鏡者景也有光景也鑑者監也監於前也軒轅内傳言帝會王母鑄鏡十二隨日用之此鏡之始也或云始於堯臣尹夀氣味辛無毒大明曰平微毒主治驚癎邪氣小兒諸惡煮汁和諸藥煮服文字彌古者佳藏器辟一切邪魅女人鬼交飛尸蟲毒催生及治暴心痛並火燒淬酒服百蟲入耳鼻中將鏡就敲之即出大眀小兒疝氣腫硬煮汁服時珍發明時珍曰鏡乃金水之精内眀外暗古鏡如古劍若有神眀故能辟邪魅忤惡凡人家宜懸大鏡可辟邪魅劉根𫝊云人思形狀可以長生用九寸眀鏡照面熟視令自識已身形乆則身神不散疾患不入葛洪抱朴子云萬物之老者其精悉能託人形惑人唯不能易鏡中真形故道士入山以眀鏡徑九寸以上者背之則邪魅不敢近自見其形必反却走轉對之視有踵者山神無踵者老魅也羣書所載古鏡靈異往往可證謾撮於左方龍江録云漢宣帝有寳鏡如八銖錢能見妖魅帝嘗佩之異聞記云隋時王度有一鏡嵗疫令持鏡諸里中有疾者照之即愈樵牧閑談云孟昶時張敵得一古鏡徑尺餘光照寢室如燭舉家無疾號無疾鏡西京雜記云漢髙祖得始皇方鏡廣四尺髙五尺表裏有眀照之則影倒見以手捧心可見腸胃五臟人疾病照之則知病之所在女子有邪心則膽張心動酉陽雜爼云無勞縣舞溪石窟有方鏡徑丈照人五臟云是始皇照骨鏡松窗録云葉法善有一鐵鏡照物如水人有疾病照見臟腑宋史云秦寜縣耕夫得鏡厚三寸徑尺二照見水底與日争輝病熱者照之心骨生寒雲仙録云京師王氏有鏡六鼻常有雲烟照之則左右前三方事皆見黄巢將至照之兵甲如在目前筆談云吳僧一鏡照之知未來吉凶出處又有火鏡取火水鏡取水皆鏡之異者也附方新一小兒夜啼眀鑑掛􅇃脚上聖惠方錫銅鏡鼻本經下品釋名𢎞景曰此物與胡粉異類而共條者古無純銅作鏡皆用錫雜之即今破古銅鏡鼻爾用之當燒赤納酒中若醯中出入百遍乃可搗也志曰凡鑄鏡皆用錫不爾即不眀白故言錫銅鏡鼻今廣陵者為勝時珍曰錫銅相和得水澆之極硬故鑄鏡用之考工記云金錫相半謂之鑑燧之劑是也氣味酸平無毒權曰㣲寒藥訣曰冷無毒主治女子血閉癥瘕伏陽孕絶本經伏尸邪氣别録産後餘疹刺痛三十六候取七枚投醋中熬呷之亦可入當歸芍藥煎服甄權附方新一小兒客忤面青驚痛銅照子鼻燒赤少酒淬過與兒飲聖惠方鏡鏽即鏡上緑也俗名楊妃垢主治腋臭又療下疳瘡同五倍子末等分米泔洗後傅之時珍古文錢日華釋名泉孔方兄上清童子綱目青蚨時珍曰管子言禹以厯山之金鑄幣以救人困此錢之始也至周太公立九府泉法泉體圓含方輕重以銖周流四方有泉之象故曰泉後轉為錢魯褒錢神論云為世神寳親愛如兄字曰孔方又昔有錢精自稱上清童子青蚨血塗子母錢見虫部集解頌曰凡鑄銅之物多和以錫考工記云攻金之工金有六劑是也藥用古文錢銅弩牙之類皆有錫故其用近之宗奭曰古錢其銅焦赤有毒能腐蝕壊肉非特為有錫也此説非是但取周景王時大泉五十及寳貨秦半兩漢莢錢大小五銖吳大錢五百大錢當千宋四銖二銖及梁四柱北齊常平五銖之類方可用時珍曰古文錢但得五百年之外者即可用而唐髙祖所鑄開元通寳得輕重大小之中尤為古今所重綦毋氏錢神論云黄金為父白銀為毋鈆為長男錫為適婦其性堅剛須水終始體圓應天孔方効地此乃鑄錢之法也三伏鑄錢其汁不清俗名爐凍盖火尅金也唐人端午於江心鑄鏡蓋此意也氣味辛平有毒時珍曰同胡桃嚼即碎相制也主治瞖障明目療風赤眼鹽鹵浸用婦人生産横逆心腹痛月膈五淋燒以醋淬用大明大青錢煮汁服通五淋磨入目主盲障膚赤和薏苡根煮服止心服痛藏器發明宗奭曰古錢有毒治目中障瘀腐蝕壞肉婦人横逆産五淋多用之予少時常患赤目腫痛數目不能開客有教以生薑一塊洗浄去皮以古青銅錢刮汁㸃之初甚苦熱淚蔑面然終無損後有患者教之往往疑惑信士㸃之無不一㸃遂愈更不須再但作瘡者不可用也時珍曰以胡桃同嚼食二三枚能消便毒便毒属肝金伐木也附方舊一新二十一時氣欲死大錢百文水一斗煮八升入麝香末三分稍飲至盡或吐或下愈肘後方時氣温病頭痛壯熱脉大始得一日者比輪錢一百五十七文水一斗煮取七升服汁須臾復以水五升更煮一升以水二升投中合得三升出錢飲汁當吐毒出也肘後方心腹煩滿及胸脇痛欲死者比輪錢二十枚水五升煮三升分三服肘後方急心氣痛古文錢一箇打碎大核桃三箇同炒熱入醋一盌冲服楊誠經驗方霍亂轉筋青銅錢四十九枚木𤓰一兩烏梅炒五枚水二盞煎分溫服聖濟録慢脾驚風利痰竒效用開元通寳錢背後上下有兩月痕者其色淡黒頗小以一箇放鐡匙上炭火燒四圍上下各出珠子取出候冷傾入盞中作一服以南木香湯送下或人參湯亦可錢雖利痰非胃家所好須以木香佐之楊仁齊直指方下血不止大古錢四百文酒三升煮二升分三服普濟方赤白帶下銅錢四十文酒四升煮取二升分三服千金方小便氣淋比輪錢三百文水一斗煮取三升温服千金方沙石淋痛古文錢煮汁服普濟方傷水喘急因年少飲冷水驚恐所致者古文錢七枚洗浄白梅七箇水一鍾同浸三宿空心一呷良乆得吐效仁存方唇腫黒痛痒不可忍四文大錢于石上磨猪脂汁塗之不過數遍愈幼幼新書口内熱瘡青錢二十文燒赤投酒中服之立瘥陳藏器本草眼赤生瘡連年不愈古錢一文生薑石一箇洗浄以錢于石上磨之蜜取濃汁三四滴在盞覆瓦上以艾炙瓦内七壯熏蜜取㸃之效普濟方赤目浮瞖古錢一文塩方寸匕治篩㸃之千金方日卒不見錢于石上磨汁注眥中普濟方目生珠管及膚瞖銅錢青一兩細墨半兩為末醋丸白豆大毎以一丸乳汁新汲水各少許浸化㸃之聖惠方腋下胡臭古文錢十文鐵線串燒醋淬十次入麝香研末調塗應急良方趺撲傷損半兩錢五箇火煆醋淬四十九次甜𤓰子五錢真珠二錢研末毎服一字好酒調隨上下食前後青囊誤吞鐵錢古文銅錢十箇白梅肉十箇淹過即爛搗丸緑豆大毎服一丸流水吞下即吐出聖濟録百蟲入耳青錢十四文煎猪膏二合少少滴之聖濟録便毒初起方見發明下銅弩牙别録下品釋名時珍曰黄帝始作弩劉熈釋名云弩怒也有怒勢也其柄曰臂似人臂也鉤絃者曰牙似人牙也牙外曰郭下曰懸刀合名之曰機頌曰藥用銅弩牙以其有錫也氣味平微毒主治婦人難産血閉月水不通陰陽隔塞别録發明𢎞景曰銅弩牙治諸病燒赤納酒中飲汁古者彌勝劉元素曰弩牙速産以機發而不折因其用而為使也附方舊一誤吞珠錢哽在咽者銅弩牙燒赤納水中冷飲汁直愈聖惠方諸銅器綱目氣味有毒時珍曰銅器盛飲食茶酒經夜有毒煎湯飲損人聲藏器曰銅器上汗有毒令人發惡瘡内疽主治霍亂轉筋腎堂及臍下疰痛並炙器隔衣熨其臍腹腎堂大眀古銅器畜之辟邪祟時珍發明時珍曰趙希鵠洞天録云山精水魅多厯年代故能為邪祟三代鍾鼎彛器厯年又過之所以能辟祟也銅鈷鉧一作鈷䥈熨斗也主治折傷接骨搗末研飛和少酒服不過二方寸匕又盛灰火熨臍腹冷痛時珍銅秤錘主治產難横生燒赤淬酒服大眀銅匙柄主治風眼赤爛及風熱赤眼瞖膜燒熱烙之頻用妙時珍鐵本經下品校正併入别録生鐵拾遺勞鐵釋名黒金説文烏金時珍曰鐵截也剛可截物也於五金属水故曰黒金集解别録曰鐵出牧羊平澤及枋城或析城采無時𢎞景曰生鐵是不破鑐鎗釜之類銅鐵是雜鍊生鑐作刃䥥者鑐音柔頌曰鐵今江南西蜀有爐冶處皆有之初鍊去礦用以鑄瀉器物者為生鐵再三銷拍可以作鐷者為鑐鐵亦謂之熟鐵以生柔相雜和用以作刀劍鋒刃者為鋼鐵鍜家燒鐵赤沸砧上打下細皮屑者為鐵落鍜竈中飛出如塵紫色而輕虛可以􅉷磨銅器者為鐵精作鍼家磨鑢細末者謂之鍼砂取諸鐵于器中水浸之經乆色青沫出可以染皂者為鐵漿以鐵拍作片叚置醋糟中積乆衣生刮取者為鐵華粉入火飛鍊者為鐵粉又馬銜秤錘車轄及鋸杵刀斧並俗用有効時珍曰鐵皆取礦上炒成秦晉淮楚湖南閩廣諸山中皆産鐵以廣鐵為良甘肅上錠鐵色黒性堅宜作刀劍西畨出賔鐵尤勝寳藏論云鐵有五種荆鐵出當陽色紫而堅利上饒鐵次之賔鐵出波斯堅利可切金玉太原蜀山之鐵頑滯剛鐵生西南瘴海中山石上狀如紫石英水火不能壊穿珠切玉如上也土宿本草云鐵受太陽之氣始生之初鹵石産焉一百五十年而成慈石二百年孕而成鐵又二百年不經采鍊而成銅銅復化為白金白金化為黄金是鐵與金銀同一根源也今取慈石碎之内有鐵片可驗矣鐵禀太陽之氣而隂氣不交故燥而不潔性與錫相得管子云上有赭下有鐵鐵本經恭曰此柔鐵也即熟鐵藏器曰經用辛苦者曰勞鐵氣味辛平有毒大明曰畏慈石火炭能制石亭脂毒斆曰鐵遇神砂如泥似粉時珍曰鐵畏皂莢豬犬脂乳香朴消硇砂塩鹵荔枝貘食鐵而蛟龍畏鐵凡諸草木藥皆忌鐵器而補腎藥尤忌之否則反消肝腎上肝傷氣毋氣愈虛矣主治堅肌耐痛本經勞鐵療賊風燒赤投酒中飲藏器生鐵别録中品氣味辛微寒微毒見鐵下主治下部及脱肛别録鎮心安五臟治癎疾黒鬂髮治癬及惡瘡疥蜘蛛咬蒜磨生油調傅大明散瘀血消丹毒時珍發明恭曰諸藥療病並不入散皆煮取汁用之藏器曰鐵砂鐵精並入丸散時珍曰鐵於五金色黒配水而其性則制木故癎疾宜之素問治陽氣太盛病狂善怒者用生鐵落正取伐木之義日華子言其鎮心安五臟豈其然哉本草載大清服食法言服鐵傷肺者乃肝字之誤附方舊五新一脱肛歴年不入者生鐵二斤水一斗煮汁五升洗之日再集驗方熱甚耳聾燒鐵投酒中飲之仍以慈石塞耳目易亱去之千金方小兒丹毒燒鐵淬水飲一合草陳氏本小兒燥瘡一名爛瘡燒鐵淬水中二七遍浴之二三起作漿子母秘録打撲瘀血在骨節及脇外不去以生鐵一斤酒三升煮一升服肘後方熊虎傷毒生鐵煮令有味洗之肘後方鋼鐵别録中品校正併入開寳鐵粉拾遺鍼砂釋名跳鐵音條集解時珍曰鋼鐵有三種有生鐵夾熟鐵鍊成者有精鐵百鍊出鋼者有西南海山中生成狀如紫石英者凡刀劒釜鑿諸刃皆是鋼鐵其鍼砂鐵粉鐵精亦皆用鋼鐵者按沈括筆談云世用鋼鐵以柔鐵包生鐵泥封鍊令相入謂之團鋼亦曰灌鋼此乃偽鋼也真鋼是精鐵百鍊至斤兩不耗者純鋼也此乃鐵之精純其色眀􅉷磨之黯然青且黒與常鐵異亦有鍊盡無鋼者地産不同也又有地溲淬柔鐵二三次即鋼可切玉見石腦油下凡鐵内有硬處不可打者多鐵核以香油塗燒之即散氣味甘平無毒主治金瘡煩滿熱中胸膈氣塞食不化别録鐵粉宋開寳恭曰乃鋼鐵飛鍊而成者人多取雜鐵作屑飛之其體重真鋼者不爾也氣味鹹平無毒主治安心神堅骨髓除百病變黒潤肌膚令人不老體徤能食久服令人身重肥黒合和諸藥各有所主開寳化痰鎮心抑肝邪特異許叔㣲發明見鐵落下附方新六驚癎發熱鐵粉水調少許服之聖惠方急驚涎潮壯熱悶亂鐵粉二錢硃砂一錢為末毎服一字薄荷湯調下楊氏家藏方傷寒陽毒狂言妄語亂走毒氣在臟也鐵粉二兩龍膽草一兩為末磨刀水調服一錢小兒五分全幼心鑑頭痛鼻塞鐵粉二兩龍腦半分研匀每新汲水服一錢聖惠方雌雄疔瘡鐵粉一兩蔓青根三兩搗如泥封之日二換集𤣥方風熱脱肛鐵粉研同白欽末傅上按入直指方鍼砂拾遺藏器曰此是作鍼家磨鑢細末也須眞鋼砂乃堪用人多以柔鐵砂雜和之飛為粉人莫能辨也亦堪染皂主治功同鐵粉和没食子染鬚至黒藏器消積聚腫滿黄疸平肝氣散癭時珍附方新十風濕脚痛鍼砂川烏頭為末和匀炒熱綿包熨之摘𤣥方風痺暖手鐵砂四兩硇砂三錢黒脚白礬六錢研末以熱醋或水拌濕油紙裹置袋内任意執之冷再拌聖濟録脾勞黄病鍼砂四兩醋炒七次乾漆燒存性二錢香附三錢平胃散五錢為末蒸餅丸梧子大任湯使下摘𤣥方濕熱黄瘡助脾去濕鍼砂丸用鍼砂不拘多少擂盡鏽淘洗白色以米醋於鐵銚内浸過一指炒乾再炒三五次候通紅取出用陳粳米半升水浸一夜搗粉作塊煮半熟杵爛入鍼砂二兩半百草霜炒一两半搗千下丸梧子大毎服五十丸用五加皮牛膝根木𤓰浸酒下初服若泄瀉其病源去也乾坤生意水腫尿少鍼砂醋煮炒乾豬苓生地龍各三錢為末葱涎研和傅臍中約一寸厚縛之待小便多為度日二易之入甘遂更妙徳生堂方泄瀉無度諸藥不効方同上不用甘遂醫學正𫝊虛寒下痢腸滑不禁鍼砂七錢半官桂一錢枯礬一錢為末以涼水調攤臍上下縳之當覺大熱以水潤之可用三四次名玉胞肚仁存方項下氣癭鍼砂入水缸中浸之飲食皆用此水十日一換砂半年自消散楊仁齋直指方染白鬚髮鐵砂醋炒七次一兩訶子白芨各四錢百藥煎六錢緑礬二錢為末用熱醋調刷鬚髮菜葉包住次早酸漿洗去此不壊鬚亦不作紅洗又方鍼砂蕎麫各一兩百藥煎為末茶調夜塗且再以訶子五錢没石子醋炒一箇百藥煎少許水和塗一夜温漿洗去黒而且光鐵落本經中品釋名鐵液别録鐵屑拾遺鐵蛾𢎞景曰鐵落是染皂鐵漿也恭曰是鍜家燒鐵赤沸砧上鍜之皮甲落者若以漿為鐵落則鋼浸之汁復謂何等落是鐵皮滋液黒於餘鐵故又名鐵液時珍曰生鐵打鑄皆有花出如蘭如蛾故俗謂之鐵蛾今煙火家用之鐵末浸醋書字於紙背後塗墨如碑字也氣味辛平無毒别録曰甘主治風熱惡瘡瘍疽瘡痂疥氣在皮膚中本經除胸膈中熱氣食不下止煩去黒子可以染皂别録治驚邪癲癎小兒客忤消食及冷氣並煎服之大眀主鬼打鬼疰邪氣水漬沫出澄清暖飲一二杯藏器炒熱投酒中飲療賊風痙又褁以熨腋下療胡臭有驗蘇恭平肝去怯治善怒發狂時珍發明時珍曰按素問病態論云帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者暴折而不决故善怒病名陽厥曰何以知之曰陽明者常動巨陽少陽不動而動大疾此其候也治之當奪其食則已夫食入於隂長氣於陽故奪其食則已以生鐵落為飲夫生鐵落者下氣疾也此素問本文也愚嘗釋之云陽氣怫鬱而不得疏越少陽膽木挾三焦少陽相火巨陽隂火上行故使人易怒如狂其巨陽少陽之動脉可胗之也奪其食不使胃火復助其邪也飲以生鐵落金以制木也木平則火降故曰下氣疾速氣即火也又李仲南永類方云腫藥用鐵蛾及人砂入丸子者一生須斷塩盖塩性濡潤腫若再作不可為矣制法用上等醋煮半日去鐵人取醋和蒸餅為丸毎薑湯服三四十丸以効為度亦只借鐵氣爾故日華子云煎汁服之不留滯於臟腑借鐵虎之氣以制肝木使不能尅脾土土不受邪則水自消矣鐵精鐵粉鐵華粉鐵砂鐵漿入藥皆同此意附方新一小兒丹毒鍜鐵屎研末豬脂和傅之千金方鐵精本經中品釋名鐵花𢎞景曰鐵精鐵之精華也出鍜竈中如塵紫色輕者為佳亦以摩瑩銅器用之氣味平微温主治明目化銅本經療驚悸定心氣小兒風癎陰㿉脱肛别録發明見鐵落附方舊五新二下痢脱肛鐵精粉之至寳方女人陰脱鐵精羊脂布裹炙熱熨推之聖惠方男子陰腫鐵精粉傅之子母秘録疔腫拔根鐵渣一兩輕粉一錢麝香少許為末針畫十字口㸃藥入内醋調麫糊傅之神効普濟方食中有蟲腹内堅痛面目青黄淋露骨立病變無常用爐中鐵精研末雞肝和丸梧子大食前酒下五丸不過十日愈肘後蛇骨刺人毒痛鐵精粉豆許吹入瘡内肘後方鐵華粉宋開寳釋名鐵𦙍粉日華鐵艷粉鐵霜修治志曰作鐵華粉法取鋼鍜作葉如笏或團平面磨錯令光浄以塩水洒之于醋甕中隂䖏埋之一百日鐵上衣生即成粉矣刮取細搗篩入乳鉢研如麫和合諸藥為丸散此鐵之精華功用強於鐵粉也大明曰懸於醬瓿上生霜者名鐵𦙍粉淘去粗滓鹹味烘乾用氣味鹹平無毒主治安心神堅骨髓強志力除風邪養血氣延年變白去百病隨所熱熱和諸藥用棗膏為丸開寳止驚悸虛癎鎮五臟去邪氣治徤忘冷氣心痛痃癖癥結脱肛痔瘻宿食等及傅竹木刺入肉大明發明見鐵落附方新一婦人陰挺鐵孕粉一錢龍腦半錢研水調刷産門危氏得效方鐵鏽拾遺釋名鐵衣藏器曰此鐵上赤衣也刮下用主治惡瘡疥癬和油塗之蜘蛛蟲咬蒜磨塗之藏器平肝墜熱消瘡腫口舌瘡醋磨塗蜈蚣咬時珍發明時珍曰按陶華云鐵鏽水和藥服性沉重最能墜熱開結有神也附方新八風瘙􅐊疹鏽鐵磨水塗之集簡方湯火傷瘡青竹燒油同鐵鏽搽之堂積徳方丁腫初起多年土内鏽釘火鍜醋淬刮下鏽末不論遍次煆取収之毎用少許人乳和挑破傅之仍炒研二錢以虀水煎滚待冷調服普濟方脚腿紅腫熱如火炙俗名赤遊風用鐵鏽水冷解之惠濟方重舌腫脹鐵鏽鎻燒紅打下鏽研末水調一錢噙嚥生生編小兒口瘡鐵鏽末水調傅之集簡方内熱遺精鐵鏽末冷水服一錢三服止心活人綂婦人難產雜草燒鑊鏽白芷等分為末毎服一錢童尿米醋各半和服見效救急方鐵􅋹拾遺釋名刀煙綱目刀油時珍曰以竹木􅅡火於刀斧刃上燒之津出如漆者是也江東人多用之主治惡瘡蝕􅉶金瘡毒物傷皮肉止風水不入入水不爛手足􅀈折瘡根結筋瘰癧毒腫染髭髮令永黒及熱未凝時塗之少頃當乾硬用之須防水又殺蟲立效藏器附方新一項邊癧子以桃核于刀上燒烟熏之陳氏本草鐵漿拾遺集解藏器曰陶氏謂鐵落為鐵漿非也此乃取諸鐵於器中以水浸之經乆色青沫出即堪染皂者承曰鐵漿是以生鐵漬水服餌者旋入新水日乆鐵上生黄膏則力愈勝唐太妃所服者乃此也若以染皂者為漿其酸苦臭澀不可近矧服食乎氣味鹹寒無毒主治鎮心明目主癲癎發熱急黄狂走六畜顛狂人為蛇犬虎狼毒刺惡蟲等囓服之毒不入肉也兼解諸毒入腹藏器附方舊二新三時氣生瘡胸中熱鐵漿飲之梅師方一切丁腫鐵漿日飲一升金方千發背初起鐵漿飲二升取利外臺秘要蛇皮惡瘡鐵漿頻塗之翁談野方漆瘡作痒鐵漿頻洗愈外臺諸鐵器綱目集解時珍曰舊本鐵器條繁今撮為一大抵皆是借其氣平木解毒重墜無他義也鐵杵拾遺即藥杵也主治婦人横産胞衣不下燒赤淬酒飲自順藏器鐵秤錘宋開寳氣味辛温無毒主治賊風止産後血瘕腹痛及喉痺熱塞燒赤淬酒熱飲開寳治男子疝痛女子心腹妊娠脹滿漏胎卒下血時珍附方新四喉痺腫痛菖蒲根嚼汁燒秤錘淬一盃飲之普濟方舌腫咽痛咽生息肉舌腫秤錘燒赤淬醋一盞嚥之聖惠方誤吞竹木秤錘燒紅淬酒飲之集𤣥方便毒初起極力提起令有聲以鐵秤錘摩壓一夜即散集簡方鐵銃綱目主治催生燒赤淋酒入内孔中流出乘熱飲之即産舊銃尤良鐵斧綱目主治婦人産難横逆胞衣不出燒赤淬酒服亦治産後血瘕腰腹痛時珍發明時珍曰古人轉女為男法懐妊三月名曰始胎血脉未流象形而變是時宜服藥用斧置牀底繫刃向下勿令本婦知恐不信以雞試之則一窠皆雄也盖胎化之法亦理之自然故食牡雞取陽精之全於天産者佩雄黄取陽精之全於地産者操弓矢藉斧斤取剛物之見於人事者氣類濳感造化宻移物理所必有故妊婦見神像異物多生鬼怪即其徴矣象牙犀角紋逐象生山藥雞冠形隨人變以雞卵告竈而抱雏以苕菷掃猫而成孕物且有感况於人乎藏器曰凡人身有弩肉可聼人家釘棺下斧聲之時便下手速擦二七遍以後自得消平産婦勿用鐵刀拾遺主治蛇咬毒入腹取兩刃於水中相摩飲其汁百蟲入耳以兩刀於耳門上摩敲作聲自出藏器磨刀水服利小便塗脱肛痔核産腸不上耳中卒痛時珍大刀環綱目主治産難數日不出燒赤淬酒一盃頓服時珍剪刀股綱目主治小兒驚風錢氏有剪刀股丸用剪刀環頭研破煎湯服藥時珍鐵鋸拾遺主治誤吞竹木入咽燒故鋸令赤漬酒熱飲藏器布鍼綱目主治婦人横產取二七枚燒赤淬酒七遍服時珍附方新一眼生偷鍼布鍼一箇對井睨視已而折為兩叚投井中勿令人見張泉醫説鐵鏃綱目主治胃熱呃逆用七十二箇煎湯啜之時珍鐵甲綱目主治憂鬱結滯善怒狂易入藥煎服時珍鐵鎖綱目主治齆鼻不聞香臭磨石上取末和猪脂綿裹塞之經日肉出瘥普濟鑰匙日華主治婦人血噤失音衝惡以生薑醋小便同煎服弱房人亦可煎服大眀鐵釘拾遺主治酒醉齒漏出血不止燒赤注孔中即止時珍藏器曰有犯罪者遇恩赦免取枷上鐵及釘等収之後入官帶之得除免鐵鏵即挿也綱目主治心虚風邪精神恍惚健忘以久使者四斤燒赤投醋中七次打成塊水二斗浸二七日毎食後服一小盞時珍附方新三小兒傷寒百日内患壯熱用鐵鏵一斤燒赤水二斗淬三七次煎一半入桞葉七片浴之聖濟録積年齒􅉶舊鐵鏵頭一枚炭火燒赤捻硫黄一分豬脂一分于上熬沸以綿色桞枚揾藥熱烙齒縫數次愈普濟方灌頂油法治腦中熱毒風除目中翳障鎭心眀目生油二斤故鐵鏵五兩打碎硝石半兩寒水石一兩馬牙消半兩曽青一兩綿裹入油中浸七日每以一錢頂上摩之及滴少許入鼻内甚妙此大食國胡商方聖惠方鐵犁鑱尖日華主治得水制硃砂水銀石亭脂毒大眀車轄即車軸鐵鎋頭一名車缸宋開寳主治喉痺及喉中熱塞燒赤投酒中熱飲開寳主小兒大便下血燒赤淬水服時珍附方舊一新一小兒下血方見上妊娠欬𠻳車缸一枚燒赤投酒中冷飲聖惠方走注氣痛車缸燒赤濕布裹熨病上千金方馬銜即馬勒口鐵也大明曰古舊者好亦可作醫工鍼也宋開寳主治小兒癎婦人難産臨時持之并煮汁服一盞開寳治馬喉痺腫連頰吐血氣數煎水服之聖惠馬鐙綱目主治田野燐火人血所化或出或没來逼奪人精氣但以馬鐙相戞作聲即滅故張華云金葉一振遊光斂色時珍石之二玉類一十四種玉别錄中品校正併入别録玉屑釋名𤣥真時珍曰按許慎説文云玉乃石之美者有五徳潤澤以温仁也鰓理自外可以知中義也其聲舒揚逺聞智也不撓而折勇也鋭亷而不技潔也其字象三王連貫之形葛洪抱朴子云𤣥真者玉之别名也服之令人身飛輕舉故曰服𤣥真者其命不極集解别錄曰玉泉玉屑生藍田山谷采無時𢎞景曰好玉出藍田及南陽徐善亭部界中日南盧容水中外國于闐踈勒諸處皆善潔白如豬膏叩之鳴者是真也其比類者甚多相似宜精别之所以燕石入笥卞氏長號也珣曰異物志云玉出崑崙别寳經云凡石韞玉但將石映燈看之内有紅光眀如初出日便知有玉也頌曰今藍田南陽日南不聞有玉惟于闐國出之晉鴻臚卿張匡鄴使于闐作行程記載其國采玉之地云玉河在于闐城外其源出崑山西流一千三百里至于闐界牛頭山乃疏為三河一曰白玉河在城東三十里二曰緑玉河在城西二十里三曰烏玉河在緑玉河西七里其源雖一而其玉隨地而變故其色不同毎嵗五六月大水暴漲則玉墮流而至玉之多寡由水之大小七八月水退乃可取彼人謂之捞玉其國中有禁器用服食往往用玉中國所有亦自彼來王逸玉論載玉之色曰赤如雞冠黄如蒸栗白如截舫黒如純漆謂之玉符而青玉獨無説焉今青白者常有黒者時有黄赤者絶無雖禮之六器亦不能得其真者今儀州出一種石如蒸栗色彼人謂之栗玉或云亦黄玉之類但少潤澤聲不清越為不及也然服食者惟貴純白他色亦不取焉承曰儀州栗玉乃黄石之光瑩者非玉也玉堅而有理火刃不可傷此石小刀便可雕刻與階州白石同體而異色爾時珍曰按太平御覽云交州出白玉夫餘出赤玉挹婁出青玉大秦出菜玉西蜀出黒玉藍田出美玉色如藍故曰藍田淮南子云鍾山之玉炊以爐炭三日三夜而色澤不變得天地之精也觀此諸説則産玉之處亦多矣而今不出者地方恐為害也故獨以于闐玉為貴焉古禮𤣥珪蒼璧黄琮赤璋白琥𤣥璜以象天地四時而立名爾禮記云石藴玉則氣如白虹精神見於山川也博物志云山有穀者生玉尸子云水圓折者有珠方折者有玉玉鏡圖云二月山中草木生光下垂者有玉玉之精如美女玉書云玉有山𤣥文水蒼文生于山而木潤産於水而流芳藏于璞而文采露於外觀此諸説則玉有山産水産二種中國之玉多在山于闐之玉則在河也其石似玉者珷玞琨珉􅋛瓔也北方有鑵子玉雪白有氣眼乃藥燒成者不可不辨然皆無温潤稗官載火玉色赤可烹鼎䁔玉可辟寒寒玉可辟暑香玉有香軟玉質柔觀日玉洞見日中宫闕此皆希世之寳也宗奭曰燕玉出燕北體柔脆如油和粉色不入藥用玉屑别録修治𢎞景曰玉屑是以玉為屑非别一物也仙經服㲄玉先搗如米粒乃以苦酒焙消令如泥亦有合為漿者凡服玉皆不得用已成器物及塜中玉璞恭曰餌玉當以消作水者為佳屑如麻豆服者取其精潤臟腑滓穢當完出也又為粉服者即使人淋壅屑如麻豆其義殊深化水法在淮南三十六水法中氣味甘平無毒珣曰鹹寒無毒時珍曰惡鹿角養丹砂主治除胃中熱喘息煩滿止渴屑如麻豆服之久服輕身長年别録潤心肺助聲喉滋毛髮大明滋養五臟止煩躁宜共金銀麥門冬等同煎服有益李珣附方新三小兒驚啼白玉二錢半寒水石半兩為末水調塗心下聖惠方痃癖鬼氣往來疼痛及心下不可忍者不拘大人小兒白玉赤玉等分為末糊丸梧子大每服三十丸薑湯下惠方聖面身瘢痕眞玉日日磨之乆則自滅聖濟録玉泉本經釋名玉札本經玉漿開寳璚漿普曰玉泉一名玉屑𢎞景曰此當是玉之精華者質色眀澈可消之為水故名玉泉今人無復的識者通一為玉爾志曰按别本注云玉泉者玉之泉液也以仙室玉池中者為上故一名玉液今仙經三十六水法中化玉為玉漿稱為玉泉服之長年不老然功劣於自然泉液也宗奭曰本經言玉泉生藍田山谷采無時今藍田無玉而泉水古今不言采陶氏言玉為水故名玉泉如此則當言玉水不當言玉泉泉乃流布之義今詳泉字乃漿之誤去古既逺文字脱誤也道藏經有金飯玉漿之文唐李商隠有璚漿未飲結成氷之詩是采玉為漿斷無疑矣别本所注不可取也若如所言則舉世不能得亦漫立此名耳時珍曰玉泉作玉漿甚是别本所注乃玉髓也别録自有條諸家未深攷爾修治青霞子曰作玉漿法玉屑一升地榆草一升稻米一升取白露二升銅器中煮米熟絞汁玉屑化為水以藥納入所謂神仙玉漿也藏器曰以玉殺朱草汁化成醴朱草瑞草也術家取蟾蜍膏軟玉如泥以苦酒消之成水氣味甘平無毒普曰神農岐伯雷公甘李當之平畏欵冬花青竹主治五臟百病柔筋強骨安䰟魄長肌肉益氣利血脈久服耐寒暑不饑渴不老神仙人臨死服五斤三年色不變本經療婦人帶下十二病除氣癃明耳目久服輕身長年别錄治血塊大眀發明慎徼曰天寳遺事楊貴妃含玉嚥津以解肺渇王莽遺孔休玉曰君面有疪美玉可以滅瘢後魏李預得餐玉之法乃采訪藍田掘得若環璧襍器形者大小百餘枚槌作屑日食之經年云有效驗而好酒損志及疾篤謂妻子曰服玉當屏居山林排棄嗜欲而吾酒色不絶自致於死非藥之過也尸體必當有異於人勿使速殯令後人知餐服之功時七月中旬長安毒熱停尸四日而體色不變口無穢氣𢎞景曰張華云服玉用藍田榖玉白色者平常服之則應神仙有人臨死服五斤死經三年其色不變古來發塜見尸如生者其身腹内外無不大有金玉漢制隨宜王公皆用珠􅃭玉匣是使不朽故也鍊服之法水屑雖曰性平而服玉者亦多發熱如寒食散狀金玉既天地重寳不比餘石若未深解節度勿輕用之志曰抱朴子云服金者夀如金服玉者夀如玉但其道遲成須服一二百斤乃可知也玉可以烏米酒及地榆酒化之為水亦可以葱漿消之為䊀亦可餌以為丸亦可以燒為粉服之一年以上入水不沾入火不灼刃之不傷百毒不死不可用已成之器傷人無益得璞玉乃可用也赤松子以𤣥蟲血漬玉為水服之故能乗烟霞上下玉屑與水服之俱令人不死所以不及金者令人數數發熱似寒食散狀也若服玉屑宜十日一服雄黄丹砂各一刀圭散髪洗木冷水迎風而行則不發熱也董君異常以玉醴與盲人服旬日而目愈也時珍曰漢武帝取金莖露和玉屑服云可長生即此物也但玉亦未必能使生者不死惟使死者不朽爾養尸招盗反成暴棄曷若速朽歸虛之為見理哉白玉髓别録有名未用校正併入拾遺玉膏釋名玉脂綱目玉膏拾遺玉液集觧别録曰生藍田玉石間時珍曰此即玉膏也别本以為玉泉者是矣山海經云宻山上多丹木丹水出焉西流注於稷澤其中多白玉是有玉膏其源沸沸湯湯黄帝是食是嚮是生𤣥玉玉膏所出以灌丹木黄帝乃取宻山之玉禜而投之鍾山之陽瑾瑜之玉為良堅栗精宻澤而有光五色發作以和柔剛天地鬼神是食是嚮君子服之以禦不祥謹按宻山亦近于闐之間是食者服食也是嚮者祭祀也服之者佩服也玉膏即玉髓也河圖玉版云少室之山有白玉膏服之成仙十洲記云瀛洲有玉膏如酒名曰玉醴飲數升輒醉令人長生抱朴子云生玉之山有玉膏流出鮮眀如水精以無心草末和之須㬰成水服之一升長生皆指此也藏器曰今玉石間水飲之亦長生潤澤氣味甘平無毒主治婦人無子不老延年别録青玉别録有名未用釋名糓玉時珍曰穀一作㲄又作玨谷角二音二玉相合曰㲄此玉常合生故也集解别録曰生藍田𢎞景曰張華言合玉漿用㲄玉正縹白色不夾石大者如升小者如雞子取於穴中者非今作器物玉也出裴鄉縣舊穴中黄初時詔征南將軍夏侯上求之時珍曰按格古論云古玉以青玉為上其色淡青而帶黄色緑玉深緑色者佳淡者次之菜玉非青非緑如菜色此玉之最低者氣味甘平無毒主治婦人無子輕身不老長年别録附録璧玉别録曰味甘無毒主眀目益氣使人多精生子時珍曰璧瑞玉圜也此玉可為璧故曰璧玉璧外圓象天内方象地爾雅云璧大六寸謂之瑄肉倍好謂之璧好倍肉謂之瑗玉英别録曰味甘主風瘙皮膚痒生山竅中眀白可作鏡一名石鏡十二月采合玉石别録曰味甘無毒主盈氣療消渇輕身辟糓生常山中邱如彘肋時珍曰此即碾玉砂也玉須此石碾之乃光青琅玕本經下品校正併入拾遺石闌干釋名石䦨干拾遺石珠别録青珠時珍琅玕象其聲也可碾為珠故得珠名集解别録曰石欄干生蜀郡平澤采無時𢎞景曰此蜀都賦所稱青珠黄環者也琅玕亦是崑崙山上樹名又九真經云大丹名恭曰琅玕有數種色以青者入藥為勝是琉璃之類火齊寳也今出雋州以西烏白蠻中及于闐國藏器曰石闌干生大海底髙尺餘如樹有根莖莖上有孔如物㸃之漁人以綱罾得之初從水出㣲紅後漸青頌曰今秘書中有異魚圖載琅玕青色生海中云海人以綱於海㡳取之初出水紅色乆而青黒枝柯似珊瑚而上有孔竅如䖝蛀繫之有金石之聲乃與珊瑚相類其説與别録生蜀郡平澤及薊恭所云不同人莫能的識謹按尚書雍州厥貢球琳琅玕爾雅云西北之美者有崑崙墟之璆琳琅玕孔安國郭璞注皆以為石之似珠者而山海經云崑崙山有琅玕若然是石之美者明瑩若珠之色而狀森植爾大扺古人謂石之美者多謂之珠廣雅謂琉璃珊瑚皆為珠是也已上所説皆出西北山中而今圖乃云海㡳得之盖珍貴之物山海或俱産焉今醫家亦以難得而稀用也宗奭曰書云雍州厥貢球琳琅玕西域記云天竺國正出此物蘇恭云是琉璃之類琉璃乃火成之物琅玕非火成者安得同類時珍曰按許慎説文云琅玕石之似玉者孔安國云石之似珠者總龜云生南海石厓間狀如筍質似玉玉冊云生南海崖石内自然感隂陽之氣而成似珠而赤列子云蓬萊之山珠玕之樹叢生據諸説則琅玕生於西北山中及海山厓間其云生於海㡳綱取者是珊瑚非琅玕也在山為琅玕在水為珊瑚珊瑚亦有碧色者今囬囬地方出一種青珠與碧靛相似恐是琅玕所作者也山海經云開眀山北有珠樹淮南子云曽城九重有珠樹在其西珠樹即琅玕也餘見珊瑚下氣味辛平無毒之才曰殺錫毒得水銀良畏雞骨主治身痒火瘡􅏴瘍疹瘙死肌本經白秃浸淫在皮膚中煮鍊服之起陰氣可化為丹别録療手足逆臚𢎞景石䦨干主石淋破血產後惡血磨服或煮服亦火燒投酒中服藏器珊瑚唐本草釋名鉢擺娑福羅梵書集解恭曰珊瑚生南海又從波斯國及師子國來頌曰今廣州亦有云生海㡳作枝柯狀眀潤如紅玉中多有孔亦有無孔者枝柯多者更難得采無時謹按海中經云取珊瑚先作鐵網沉水底珊瑚貫中而生嵗髙三二尺有枝無葉因絞網出之皆摧折在網中故難得完好者不知今之取者果爾否漢積翠池中有珊瑚髙一丈三尺二本三柯上有四百六十條云是南越王趙佗所獻夜有光景晉石崇家有珊瑚髙六七尺今並不聞有此髙大者宗奭曰珊瑚有紅油色者細縱文可愛有如鈆丹色者無縱文為下品入藥用紅油色者波斯國海中有珊瑚洲海人乗大舶墮鐵網水底取之珊瑚所生磐石上白如菌一嵗而黄二嵗變赤枝幹交錯髙三四尺人没水以鐵發其根繫網舶上絞而出之失時不取則腐蠧時珍曰珊瑚生海底五七株成林謂之珊瑚林居水中直而軟見風日則曲而硬變紅色者為上漢趙佗謂之火樹是也亦有黒色者不佳碧色者亦良昔人謂碧者為青琅玕俱可作珠許愼説文云珊瑚色赤或生於海或生於山據此説則生於海者為珊瑚生於山者為琅玕尤可徴矣互見琅玕下氣味甘平無毒主治去目中瞖消宿血為末吹鼻止鼻衂唐本明目鎮心止驚癎大明㸃眼去飛絲時珍發明珣曰珊瑚主治與金相似宗奭曰今人用為㸃眼筯治目醫藏器曰珊瑚刺之汁流如血以金投之為丸名金漿以玉投之為玉髓乆服長生附方舊一小兒麩瞖未堅不可亂藥宜以珊瑚研如粉日少少㸃之三日愈錢相公篋中方馬腦宋嘉祜釋名瑪瑙文石摩羅迦𨽻佛書藏器曰赤爛紅色似馬之腦故名亦云馬腦珠胡人云是馬口吐出者謬言也時珍曰按増韻云玉属也文理交錯有似馬腦因以名之拾遺記云是鬼血所化更謬集解藏器曰馬瑙生西國玉石間亦美石之類重寳也來中國者皆以為器又入日本國用砑木不熱者為上熱者非真也宗奭曰馬腦非玉非石自是一類有紅白黒三種亦有文如纒絲者西人以小者為玩好之物大者研為器時珍曰馬腦出西南諸國云得自然灰即軟可刻也曹昭格古論云多出北地南畨西畨非石非玉堅而且脆刀刮不動其中有人物鳥獸形者最貴顧薦負暄録云馬腦品類甚多出産有南北大者如斗其質堅硬碾造費工南馬腦産大食等國色正紅無瑕可作杯􅕌西北者色青黒寜夏𤓰沙羌地砂磧中得者尤竒有柏枝馬腦花如柏枝有夾胎馬腦正視瑩白側視則若凝血一物二色也截子馬腦黒白相間合子馬腦漆黒中有一白線間之錦紅馬腦其色如錦纒絲馬腦紅白如絲此皆貴品漿水馬腦有淡水花醬斑馬腦有紫紅花曲􅀈馬腦粉紅花皆價低又紫雲馬腦出和州土馬腦出山東沂州亦有紅色雲頭纒絲胡桃花者又竹葉馬腦出淮右花如竹葉並可作卓而屏風金陵雨花臺小馬腦止可充玩耳試馬腦法以砑木不熱者為眞氣味辛寒無毒主治辟惡熨目赤爛藏器主目生障瞖為末日㸃時珍寶石綱目集解時珍曰寳石出西畨囬鶻地方諸坑井内雲南遼東亦有之有紅緑碧紫數色紅者名剌子碧者名靛子翠者名馬價珠黄者名木難珠紫者名蠟子又有鴉鶻石猫精石石榴子紅扁豆等名色皆其類也山海經言騍山多玉凄水出焉西注於海中多采石采石即寳石也碧者唐人謂之瑟瑟紅者宋人謂之靺鞨今通呼為寳石以鑲首餙器物大者如指頭小者如豆粒皆碾成珠狀張勃吳録云越雋雲南河中出碧珠須祭而取之有縹碧緑碧此即碧色寳石也主治去翳明目入㸃藥用之灰塵入目以珠拭拂即去時珍玻瓈拾遺釋名頗黎綱目水玉拾遺時珍曰本作頗黎頗黎國名也其瑩如水其堅如玉故名水玉與水精同名集解藏器曰玻瓈西國之寳也玉石之類生土中或云千嵗水所化亦未必然時珍曰出南畨有酒色紫色白色瑩澈與水精相似碾開有雨㸃花者為眞列丹家亦用之藥燒者有氣眼而輕𤣥中記云大秦國有五色頗黎以紅色為貴梁四公子記云扶南人來賣碧頗黎鏡廣一尺半重四十斤内外皎潔向眀視之不見其質蔡絛云御庫有玻黎毋乃大食所貢狀如鐵滓煆之但作珂子狀青紅黄白數色氣味辛寒無毒主治驚悸心熱能安心明目去赤眼熨熱腫藏器摩翳障大明水精抬遺釋名水晶綱目水玉綱目石英時珍曰瑩澈晶光如水之精英㑹意也山海經謂之水玉廣推謂之石英集解時珍曰水精亦頗黎之属有黒白二色倭國多水精第一南水精白北水精黒信州武昌水精濁性堅而脆刀刮不動色澈如泉清眀而瑩置水中無股不見珠者佳古語云水化謬言也藥燒成者有氣眼謂之硝子一名海水精抱朴子言交廣人作假木精盌是此氣味辛寒無毒主治熨目除熱淚藏器亦入㸃目藥穿串吞咽中推引諸哽物時珍附録火珠時珍曰説文謂之火齊珠漢書謂之玫瑰音枚囬唐書云東南海中有羅刹國出火齊珠大者如雞卵狀類水精圓白照數尺日中以艾承之則得火用炙艾炷不傷人今占城國有之名朝霞大火珠又續漢書云哀牢夷出火精琉璃則火齊乃火精之訛正與水精對碝石音耎時珍曰出鴈門石次於玉白色如氷亦有赤者山海經云北山多碝石禮云上佩碝玫是也琉璃拾遺釋名火齊時珍曰漢書作流離言其流光陸離也火齊與火珠同名集解藏器曰集韻云琉璃火齊珠也南州異物志云琉璃本質是石以自然灰治之可為器石不得此則不可釋佛經所謂七寳者琉璃車渠馬腦玻璃眞珠是也時珍曰按魏畧云大秦國出金銀琉璃有赤白黄黒青緑縹紺紅紫十種此乃自然之物澤潤光采踰於衆玉今俗所用皆銷冶石汁以衆藥灌而為之虗脆不貞格古論云石琉璃出髙麗刀刮不動色白厚半寸許可㸃燈眀於牛角者異物志云南天竺諸國出火齊狀如雲母色如紫金重沓可開折之則薄如蟬翼積之乃如紗縠亦琉璃雲母之類也按此石今人以作燈球眀瑩而堅耐乆蘇頌言亦可入藥未見用者主治身熱目赤以水浸冷熨之藏器雲母本經上品釋名雲華雲珠雲英雲液雲砂本經磷石時珍曰雲母以五色立名詳見下文按荆南志云華容方臺山出雲母土人候雲所出之處于下掘取無不大獲有長五六尺可為屏風者但掘時忌作聲也據此則此石乃雲之根故得雲母之名而雲母之根則陽起石也抱朴子有云服雲母十年雲氣常覆其上服其母以致其子理自然也集解别録曰雲母生太山山谷齊山廬山及琅琊北定山石間二月采之雲華五色具雲英色多青雲珠色多赤雲液色多白雲砂色青黄磷石色正白𢎞景曰按仙經雲母有八種向日視之色青白多黒者名雲母色黄白多青者名雲英色青白多赤者名雲珠如沐露乍黄乍白者名雲砂黄白皛皛者名雲液皎然純白眀澈者名磷石此六種並好服各有時月其黯黯純黒有文斑斑如鐵者名雲膽色雜黒而強肥者名地涿此二種並不可服錬之有法宜精細不爾入腹大害人今江東惟用廬山者為勝青州者亦好以沙土飬之嵗月生長頌曰今兖州雲夢山及江州淳州杭越間亦有之生土石間作片成層可析眀滑光白者為上其片有絶大而瑩潔者今人以餙燈籠亦古扇屏之遺意也江南生者多青黒不堪入藥謹按方書用雲母皆以白澤者為貴惟中山衛叔卿單服法用雲母五色具者葛洪抱朴子云雲母有五種而人不能别當舉以向日看之隂地不見雜色也五色並具而多青者名雲英宜春服之五色並具而多赤者名雲珠宜夏服之五色並具而多白者名雲液宜秋服之五色並具而多赤者名雲母宜冬服之但有青黄二色者名雲砂宜季夏服之皛皛純白者名磷石四時可服也古方服五雲甚多然脩錬節度恐非文字可詳不可輕餌也損之曰青赤黄紫白者並堪服白色輕簿通透者為上黒者不任用令人淋瀝發瘡修治斆曰凡使黄黒者厚而頑赤色者經婦人手把者並不中用須要光莹如水色者為上毎一斤用小地膽草紫背天葵生甘草地黄汁各一鎰乾者細剉濕者取汁了于瓷堝中安置下天池水三鎰着火煮七日夜水火勿令失度雲母自然成碧玉漿在堝底却以天池水猛投其中攪之浮如蝸涎者即去之如此三度淘浄取沉香一兩搗作末以天池水煎沉香湯二升以末分為三度再淘雲母漿了日晒任用抱朴子曰服五雲之法或以桂葱水玉化之為水或以露于鐵器中以原水熬之為水或以消石合於筒中理之為水或以蜜溲為酪或以秋露漬之百日韋囊挺以為粉或以無顚草樗血合餌之服至一年百疾除三年反老成童五年役使鬼神胡演曰錬粉法八九月間取雲母以礬石拌匀入瓦鑵内封口三伏時則自柔軟去礬次日取百草頭上露水漬之百日韋囊挺以為粉時珍曰道書言塩湯煮雲母可為粉又云雲母一斤塩一斗漬之銅器中蒸一日臼中搗成粉又云雲母一斤白塩一升同搗細入重布袋挼之沃令塩味盡懸髙處風吹自然成粉氣味甘平無毒權曰有小毒惡徐長卿忌羊血粉乏才曰澤㵼為之使畏鮀甲及流水𢎞景曰錬之用礬則柔爛亦是相畏也百草上露乃勝東流水亦有用五月茅屋溜水者獨孤滔曰制汞伏丹砂主治身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目久服輕身延年本經下氣堅肌續絶補中療五勞七傷虚損少氣止痢久服悦澤不老耐寒暑志髙神仙别録主下痢腸澼補腎冷甄權發明保昇曰雲母属金故色白而主肺宗奭曰古雖有服錬法今人服者至少謹之至也惟合雲母膏治一切癰毒瘡等方見和劑局方慎微曰眀皇雜録云開元中名醫紀朋觀人顔色談笑知病淺深不待胗脉帝召入掖庭看一宫人毎日昃則笑歌啼號若狂疾而足不能履地朋視之曰此必因食飽而大促力頓仆於地而然乃飲雲母湯熟寐而失所苦問之乃言太華公主載誕某當主謳惧聲不能清長因喫㹠蹄羹飽而歌大曲唱罷覺胸中甚熱戲於砌臺因墜下乆而方甦遂病此也又經効方云青城山丈人觀主康道豊治百病雲母粉方用雲母一斤折開揉入大瓶内築實上澆水銀一兩封固以十斤頂火煆赤取出却拌香葱紫連翹草二件合搗如泥後以夾絹袋盛于大水盆内揺取粉餘滓未盡再添草藥重搗取粉以木盤一面于灰上印一淺坑鋪紙傾粉在内候乾焙之以麵糊丸梧子大遇有病者服之無不効知成都府辛諌議曽患大風衆醫不愈道豊進此服之神驗抱朴子曰他物理之即朽着火即焦而五雲入猛火中經時不焦理之不腐故服之者長生入水不濡入火不燒踐棘不傷時珍曰昔人言雲母壅尸亡人不朽盗發馮貴人冢形貌如生因共姦之發晉幽公冡百尸縱横及衣服皆如生人中並有雲母壅之故也附方舊七新七服食雲母上白雲母二十斤薄擘以露水八斗作湯分半淘洗一次又作二斗作湯納芒消十斤木器中漬二十日取出絹袋盛懸屋上勿見風日令燥以鹿皮為囊揉之從旦至午篩滓復揉得好粉五斗餘者棄之以粉一斗納崖蜜二斤攪糊入竹筒中薄削封口漆固理北垣南厓下入地六尺覆上春夏四十日秋冬三十日出之當成水若洞洞不消更理三十日此水能治萬病及勞氣風疼毎以温水一合和服之日三服十日小便當變黄二十日腹中寒澼消三十日齲齒更生四十日不畏風寒五十日諸病皆愈顔色日少長生神仙千金方痰飲頭痛往來寒熱雲母粉二兩錬過桓山一兩為末毎服方寸匕湯服取吐忌生葱生菜深師方牝瘧多寒雲母燒二日夜龍骨蜀漆燒去腥等分為散未發前漿水服半錢仲景金匱方小兒下痢赤白及水痢雲母粉半兩煮白粥調食之食醫心鑑赤白久痢積年不愈飲調雲母粉方寸匕服二服立見神効千金方婦人帶下水和雲母粉方寸匕服立見神効千金方小便淋疾温水和雲母粉服三錢千金方婦人難産經日不生雲母粉半兩温酒調服入口即産不順者即順萬不失一陸氏云此是何徳楊方也已救三五十人積徳堂方粉滓面䵟雲母粉杏仁等分為末黄牛乳拌畧蒸夜塗旦洗聖濟録風􅇙遍身百計不愈煆雲母粉清水調服二錢良千金方一切惡瘡雲母粉傅之千金方火瘡敗壞雲母粉和生羊髓塗之聖惠方金瘡出血雲母粉傅之絶妙事林廣記風熱汗出水和雲母粉服三錢不過再服立愈千金翼白石英本經下品釋名時珍曰徐鍇云英亦作瑛玉光也合五種石英皆石之似玉而有光莹者集解别録曰白石英生華隂山谷及太山大如指長二三寸六面如削白澈有光長五六寸者彌佳其黄端白稜名黄石英赤端白稜名赤石英青端赤稜名青石英黒澤有光名黒石英二月采亦無時𢎞景曰今醫家用新安所出極細長白澈者夀陽入公山多大者不正用之仙經大小並有用惟須精白無瑕雜者如此説則大者為佳其四色英今不復用恭曰白石英所在皆有今澤州虢州洛州山中俱出虢州者大徑三四寸長五六寸今通以澤州者為勝宗奭曰白石英狀如紫石英但差大而六稜白色若水精時珍曰澤州有英雞食石英性最補見禽部氣味甘微温無毒别錄曰辛普曰神農甘岐伯黄帝雷公扁鵲無毒之才曰惡馬目毒公主治消渴陰痿不足欬逆胸膈間久寒益氣除風濕痺久服輕身長年本經療肺痿下氣利小便補五臟通日月光耐寒熱别録治肺癰吐膿欬逆上氣疸黄甄權實大腸好古五色石英主治心腹邪氣女人心腹痛鎮心胃中冷氣益毛髮悦顔色治驚悸安䰟定魄壯陽道下乳隨臟而治青治肝赤治心黄治脾白治肺黒治腎大明發明藏器曰濕可去枯白石英紫石英之属是也時珍曰白石英手太隂陽明氣分藥也治痿痺肺癰枯燥之病但係石類止可暫用不宜乆服頌曰古人服食惟白石英為重紫石英但入五石飲其黄赤青黒四種本草雖有名而方家都不見用者乳石論以鍾乳為乳以白石英為石是六英之貴惟白石也又曰乳者陽中之隂石者隂中之陽故陽生十一月後甲子服乳隂生五月後甲子服石然而相反畏惡動則為害不淺故乳石之發方治雖多而罕有濟者誠不可輕餌也宗奭曰紫白二石英攻疾可暫煮汁用未聞乆服之益張仲景只令㕮咀不為細末豈無意焉若乆服宜詳審附方舊二新七服石英法白石英一斤打成豆大于砂盆中和粗砂着水挼二三千下洗浄又挼仍安桞其中入蒿葉少許同水熟挼至光浄即以綿袋盛懸門上每日未梳前以水或酒吞七粒用飯二匙壓下小腹一切穢惡白酒牛肉石家所忌者皆不忌乆則新石推出陳石石常在小腹内温暖則氣息調和經脉通達腰腎堅強百病自除石若得力一斤即止若不得力十斤亦須服此物光滑既無浮碎着人腸胃作瘡又無石氣發作諸病也者又法澤州白石英光浄無㸃瞖者打小豆大去細水淘浄袋盛懸鐺内清水五大升煮汁一升澄清平早服以汁煮粥更佳服後飲酒三二盃可行百步一袋可煮二十度如無力以布褁埋南墻下三尺土内百日又堪用也石煮豬肉法白石英一兩袋盛水三升煮四升豬肉一斤同葱椒塩煮以汁作羮食包石蒸羊肉法白石英三兩打作小塊精羊肉一斤之荷葉褁之于一石米飯中蒸熟取出去石切肉和葱椒作小錕鈍煮熟毎旦空腹冷漿水吞一百箇後以冷飯壓之百無禁忌永不發動升石煮牛乳法白石英五兩搗碎蜜絹盛以牛乳三酒三升同煎至四升去石以瓶収之毎食前暖服三合治虛損勞瘦皮燥隂痿却弱煩疼石飼㹀牛法白石英三斤搗篩取十嵗以上生犢㹀牛一隻毎日和豆與食經七日即可収乳毎旦熱服一升餘者作粥食百無所忌潤飬臟腑悅澤肌肉令人體徤龍凡服石並忌芥菜蔓菁蕪荑葵菜薺苨宜食冬𤓰葵壓石氣孫真人千金翼風虚冷痺諸陽不足及腎虗耳聾益精保神白石英三兩坩鍋内火蝦酒淬三次入瓶中宻封勿洩氣毎早温服一鍾以少飯壓之浸一法磁石火煆醋淬五次白石英各五兩絹袋盛一升酒中五六日温服將盡更添酒千金翼驚悸善忘心臟不安上膈風熱化痰安神白石英一兩硃砂一兩為散毎服半錢食後煎金銀湯下簡要濟衆方石水腫堅脹滿用白石英十兩槌豆大瓷瓶盛好酒二斗浸之以泥重封將馬糞及糠火燒之常令小沸從卯至午住火次日暖一中盞飲之日三度酒盡可再燒一度聖惠方紫石英本經上品集解别録曰紫石英生太山山谷采無時普曰生太山或㑹稽欲令如削紫色達頭如樗蒲者𢎞景曰今第一用太山石色重澈下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黒明澈又有林邑石腹裏必有一物如眼吳興石四面纔有紫巴無光澤㑹稽諸暨石形色如石橊子先時並雜用今惟采太山最勝仙經不正用而俗方重之禹錫曰按嶺表録云瀧州山中多紫石英其色淡紫其質瑩澈隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比之北中白石英其力倍矣宗奭曰紫石英眀澈如水精但色紫而不匀時珍曰按太平御覽云自大峴至太山皆有紫石英太山所出甚壊瑋平氏陽山縣所出色深特好烏程縣北壟山所出甚光眀但小黒東莞縣爆山所出舊以貢獻江夏礬山亦出之永嘉固陶村小山所出芒角甚好但小薄爾修治時珍曰凡入丸散用火煆醋淬七次碾末水飛過晒乾入藥氣味甘温無毒别録曰辛普曰神農扁鵲味甘平李當之大寒雷公大温岐伯甘無毒之才曰長石為之使畏扁青附子惡鮀甲黄蓮麥句薑得伏苓人參療心中結氣得天雄菖蒲療霍亂時珍曰服食紫石英乍寒乍熱者飲酒良主治心腹欬逆邪氣補不足女子風寒在子宮絶孕十年無子久服温中輕身延年本經療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安䰟􅅎填下膲止消渴除胃中久寒散癰腫令人悦澤别録養肺氣治驚癎蝕膿甄權發明好古曰紫石英入手少隂足厥隂經權曰虛而驚悸不安者宜加用之女子服之有子頌曰乳石論無單服紫石者惟五石散中用之張文仲備急方有鎭心單服紫石煮水法胡治及千金方則多雜諸藥何用今方治婦人及心病時有使者時珍曰紫石英手少隂足厥隂血分藥也上能鎭心重以去怯也下能益肝濕以去枯也心生血肝藏血其性暖而補故心神不安肝血不足及女子血海虚寒不孕者宜之别録言其補心氣甄權言其養肺者殊昧氣陽血隂營衛之别惟本經所言諸證甚得此理附方舊二新一虚勞驚悸補虛止驚令人能食紫石英五兩打如豆大水淘一遍以水一斗煮取三升細細服或煮粥食水盡可再煎之張文仲方風熱瘛瘲風引湯治風熱瘛瘲及驚癎瘛瘲紫石英白石英寒水石石膏乾薑大黄龍齒牡蠣甘草滑石等分㕮咀水一升煎去三分食後温呷無不効者仲景金匱方癰腫毒氣紫石英火燒醋淬為末生薑米醋煎傅之摩亦得本日華草菩薩石日華釋名放光石陰精石綱目義見下集解宗奭曰嘉州蛾眉山出菩薩石色瑩白眀澈若太山狼牙石上饒水精之類日中照之有五色如佛頂圓光因以名之時珍曰出蛾眉五臺匡廬岩竇間其質六稜或大如棗栗其色􅉷潔映日則光采㣲芒有小如櫻珠則五色粲然可喜亦石英之類也丹爐家煆制作五金三黄匱氣味甘平無毒主治解藥毒蟲毒及金石藥發動作癰疽渴疾消撲損瘀血止熱狂驚癎通月經解風腫除淋並水磨服蛇蟲蜂蠍狼犬毒箭等傷並末傅之大明明目去翳時珍本草綱目卷八
