body:
  text: 本草綱目卷十九目錄草之八水草類二十二種内附四種澤瀉本經酸惡附蔛草唐本羊蹄本經酸模日華蛇牛舌麕舌舌附龍舌草綱目菖蒲本經白菖别録香蒲本經蒲黄本經菰别錄苦草綱目水萍本經蘋吳普萍蓬草拾遺莕菜唐本草蓴别錄水藻綱目海藻本經海藴拾遺海帶嘉祐昆布别錄越王餘算拾遺石帆日華水松綱目右附方舊四十八新七十一本草綱目卷十九目錄
  hash: sha256:d07eab87796c69ea55fa0e4c8bf506ccccf6a3769e061c2be8918f7f8584621f
