吸嚥取吐止一日一熏惟食白粥七日後以羊肉羮補之千金方水腫上氣欬嗽腹脹熏黄一兩欵冬花二分熟艾一分以蠟紙鋪艾洒二末于上荻管捲成筒燒煨吸嚥三十口則瘥三日盡一劑百日斷鹽醋外臺秘要手足甲疽熏黄蛇皮等分為末以泔洗淨割去甲入肉處傅之一頃痛定神效近效方雌黄本經中品釋名坐七火切時珍曰生山之隂故曰雌黄土宿本草云陽石氣未足者為雌已足者為雄相距五百年而結為石造化有夫婦之道故曰雌雄集解别録曰雌黄生武都山谷與雄黄同山生其隂山有金金精熏則生雌黄采無時𢎞景曰今雌黄出武都仇池者謂之武都仇池黄色小赤出扶南林邑者謂之崑崙黄色如金而似雲母甲錯畫家所重既有雌雄之名又同山之隂陽合藥便當以武都為勝仙經無單服法惟以合丹砂雄黄飛鍊為丹爾金精是雌黄銅精是空青而服空青反勝于雌黄其義難了斆曰雌黄一塊重四兩拆開得千重軟如爛金者佳其夾石及黑如鐡色者不可用時珍曰按獨孤滔丹房鑑源云背隂者雌黄也淄成者即黒色輕乾如焦錫塊臭黄作者硬而無衣試法但于甲上磨之上色者好又燒熨斗底以雌劃之如赤黄線一道者好舶上來如噀血者上湘南者次之青者尤佳葉子者為上造化黄金非此不成亦能柔五金乾汞轉硫黄伏粉霜又云雄黄變鐡雌黄變錫修治斆曰凡修治勿令婦人雞犬新犯淫人有患人不男人非形人及曽是刑獄臭穢之地犯之則雌黄黒如鐡色不堪用也反損人壽每四兩用天碧枝和陽草粟遂子草各五兩入瓷鍋中煮三伏時其色如金汁一垜在鍋底下用東流水猛投于中如此淘三度去水拭乾臼中搗篩研如塵用又曰雌得芹花立便成庾芹花一名立起草形如􅆚藥煮雌能住火也氣味辛平有毒别録曰大寒不入湯用土宿真君曰芎藭地黄獨帚益母羊不食草地榆五加皮瓦松冬瓜汁皆可制伏又雌見鈆及胡粉則黑主治惡瘡頭秃痂疥殺毒蟲虱身痒邪氣諸毒錬之久服輕身増年不老本經蝕鼻内息肉下部䘌瘡身面白駁散皮膚死􅡌及恍惚邪氣殺蜂蛇毒久服令人腦滿别録治冷痰勞嗽血氣蟲積心腹痛癲癎解毒時珍發明保昇曰雌黄法土故色黄而主脾時珍曰雌黄雄黄同産但以山隂山陽受氣不同分别故服食家重雄黄取其得純陽之精也雄黄則兼有隂氣故爾若夫治病則二黄之功亦彷彿大要皆取其温中捜肝殺蟲解毒袪邪焉爾附方舊七新五反胃吐食雌黄一分甘草生半分為末飯丸梧子大以五葉草糯米煎湯每服四丸聖濟録停痰在胃喘息不通呼吸欲絶雌黄一兩雄黄一錢為末化蠟丸彈子大每服一丸半夜時投熱糯米粥中食之濟生方心痛吐水不下飲食發止不定雌黄二兩醋二斤慢火煎成膏用乾蒸餅和丸梧子大每服七丸薑湯下聖惠方婦人久冷血氣攻心痛不止以葉子雌黄二兩細研醋一升煎濃和丸小豆大每服十五丸醋湯下聖惠方小腹痛滿天行病小腹滿不得小便雌黄末蜜丸納尿孔中入半寸肘後方癲癎瘛瘲眼暗嚼舌雌黄黄丹炒各一兩為末入麝香少許以牛乳汁半升熬成膏和杵千下丸麻子大每温水服三五丸直指方肺勞欬嗽雌黄一兩入瓦合内不固濟坐地上以火焙之厚二寸以炭一斤簇定頂火煆三分去一退火出毒為末糖酥和丸粟米大每日空心杏仁湯下三丸斗門方久嗽暴嗽金粟丸用葉子雌黄一兩研以紙筋泥固濟小合子一個令乾盛藥水調赤石脂封口更以泥封待乾架在地上炭火十斤簇煆候火消三分之一去火候冷取出當如鏡面光明紅色鉢内細研蒸餅丸粟米大每服三丸五丸甘草水服服後睡良久勝金方腎消尿數乾薑半兩以鹽四錢炒黄成顆雌黄一兩半為末蒸餅和丸緑豆大每服十丸至三十丸空心鹽湯下聖濟録小便不禁顆塊雌黄一兩半研乾薑半兩鹽四錢同炒薑色黄為末水和蒸餅丸緑豆大每服十丸至二十丸空心鹽湯下之經驗方烏癩蟲瘡雌黄粉醋和雞子黄調塗之聖惠方牛皮頑癬雌黄末入輕粉和豬膏傅之直指方石膏本經中品釋名細理石别録寒水石綱目震亨炅煆細研醋調封丹竈其固宻甚於脂膏此葢兼質與能而得名正與石脂同意時珍曰其文理細宻故名細理石其性大寒如水故名寒水石與凝水石同名異物集解别録曰石膏生齊山山谷及齊盧山魯蒙山采無時細理白澤者良黄者令人淋𢎞景曰二郡之山即青州徐州也今出錢塘縣皆在地中雨後時時自出取之如碁子白徹最佳彭城者亦好近道多有而大塊用之不及彼也仙經不須此恭曰石膏方解石大體相似而以未破為異今市人皆以方解代石膏未見有真石膏也石膏生于石旁其方解不因石而生端然獨處大者如升小者如拳或在土中或生溪水其上皮隨土及水苔色破之方解大者方尺今人以此為石膏療風去熱雖同而解肌發汗不如真者大明曰石膏通亮理如雲母者上又名方解石斆曰凡使勿用方解石方解雖白不透明其性燥若石膏則出剡州若山縣義情山其色瑩淨如水精性良善也頌曰石膏今汾孟虢耀州興元府亦有之生于山石上色致瑩白與方解石肌理形段剛柔絶相類今難得真者用時惟以破之皆作方稜者為方解石今石膏中時時有瑩徹可愛有縱理而不方解者或以為石膏然據本草又似長石或又謂青石間往往有白脉貫徹類肉之膏肋者為石膏此又本草所謂理石也不知石膏定是何物今且依市人用方解石爾閻孝忠曰南方以寒水石為石膏以石膏為寒水石正與汴京相反乃大誤也石膏潔白堅硬有墻壁寒水石則軟爛以手可碎外微靑黒中有細文又一種堅白全類石膏而敲之成方者名方解石也承曰陶言錢塘山中雨後時自出今錢塘人鑿山取之甚多搗作齒藥貨用浙人呼為寒水石入藥最勝他處者宗奭曰石膏紛辯不决未悉厥理本草只言生齊山盧山蒙山細理白澤者良即知他處者非石膏也震亨曰本草藥之命名多有意義或以色或以形或以氣或以質或以味或以能或以時是也石膏固濟丹爐茍非有膏豈能為用此葢兼質與能而得名昔人以方解為石膏誤矣石膏味甘而辛本陽明經藥陽明主肌肉其甘也能緩脾益氣止渴去火其辛也能解肌出汗上行至頭又入太隂少陽彼方解石止有體重質堅性寒而已求其有膏而可為三經之主治者焉在哉時珍曰石膏有軟硬二種軟石膏大塊生于石中作層如壓扁米糕形毎層厚數寸有紅白二色紅者不可服白者潔凈細文短宻如束針正如凝成白蠟狀鬆軟易碎燒之即白爛如粉其中明潔色帶微青而文長細如白絲者名理石也與軟石膏乃一物二種碎之則形色如一不可辨矣硬石膏作塊而生直理起稜如馬齒堅白撃之則段段横解光亮如雲母白石英有墻壁燒之亦易散仍硬不作粉其似硬石膏成塊撃之塊塊方解墻壁光明者名方解石也燒之則姹散亦不爛與硬石膏乃一類二種碎之則形色如一不可辨矣自陶𢎞景蘇恭大明雷斆蘇頌閻孝忠皆以硬者為石膏軟者為寒水石至朱震亨始斷然以軟者為石膏而後人遵用有驗千古之惑始明矣葢昔人所謂寒水石者即軟石膏也所謂硬石膏者乃長石也石膏理石長石方解石四種性氣皆寒俱能去大熱結氣但石膏又能解肌發汗為異爾理石則石膏之類長石即方解之類俱可代用各從其類也今人以石膏收豆腐乃昔人所不知修治斆曰凡使石臼中搗成粉羅過生甘草水飛過澄晒篩研用時珍曰古法惟打碎如豆大絹包入湯煮之近人因其性寒火煆過用或糖拌炒過則不妨脾胃氣味辛微寒無毒别録曰甘大寒好古曰入足陽明手太隂少陽經氣分之才曰雞子為之使惡莽草巴豆馬目毒公畏鐡主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡本經除時氣頭痛身熱三膲大熱皮膚熱腸胃中結氣解􅡌發汗止消渴煩逆腹脹暴氣喘咽熱亦可作浴湯别録治傷寒頭痛如裂壯熱皮如火燥和蔥煎茶去頭痛甄權治天行熱狂頭風旋下乳揩齒益齒大明除胃熱肺熱散隂邪緩脾益氣李杲止陽明經頭痛發熱惡寒日晡潮熱大渴引飲中暑潮熱牙痛元素發明成無已曰風陽邪也寒隂邪也風喜傷陽寒喜傷隂營衞隂陽為風寒所傷則非輕劑所能獨散必須輕重之劑同散之乃得隂陽之邪俱去營衞之氣俱和是以大青龍湯以石膏為使石膏乃重劑而又專達肌表也又云熱淫所勝佐以苦甘知母石膏之苦甘以散熱元素曰石膏性寒味辛而淡氣味俱薄體重而沉降也隂也乃陽明經大寒之藥善治本經頭痛牙痛止消渴中暑潮熱然能寒胃令人不食非腹有極熱者不宜輕用又陽明經中熱發熱惡寒燥熱日晡潮熱肌肉壯熱小便濁赤大渴引飲自汗苦頭痛之藥仲景用白虎湯是也若無以上諸證勿服之多有血虚發熱象白虎證及脾胃虚勞形體病證初得之時與此證同醫者不識而誤用之不可勝救也杲曰石膏是陽明藥也故仲景治傷寒陽明證身熱目痛鼻乾不得卧身以前胃之經也胷前肺之室也邪在陽明肺受火制故用辛寒以清肺氣所以有白虎之名又治三膲皮膚大熱入手少陽也凡病脉數不退者宜用之胃弱者不可用宗奭曰孫兆言四月以後天氣熱時宜用白虎但四方氣候不齊嵗中運氣不一亦宜兩審其説甚雅時珍曰東垣李氏云立夏前多服白虎湯者令人小便不禁此乃降令太過也陽明津液不能上輸于肺肺之清氣亦復下降故爾初虞世古今録驗方治諸蒸病有五蒸湯亦是白虎加人參茯苓地黄葛根因病加減王燾外臺秘要治骨蒸勞熱久嗽用石膏文如束鍼者一斤粉甘草一兩細研如麫日以水調三四服言其無毒有大益乃養命上藥不可忽其賤而疑其寒名醫録言睦州楊士丞女病骨蒸内熱外寒衆醫不瘥處州吳醫用此方而體遂凉愚謂此皆少壯肺胃火盛能食而病者言也若衰暮及氣虚血虚胃弱者恐非所宜廣濟林訓導年五十病痰嗽發熱或令單服石膏藥至一斤許遂不能食而欬益頻病益甚遂至不起此葢用藥者之瞀瞀也石膏何與焉楊士瀛云石膏煆過最能收瘡暈不至爛肌按劉跂錢乙𫝊云宗室子病嘔泄醫用温藥加喘乙曰病本中熱奈何以剛劑燥之將不得前後溲宜與石膏湯宗室與醫皆不信後二日果來召乙曰仍石膏湯證也竟如言而愈又按古方所用寒水石是凝水石唐宋以來諸方所用寒水石即今之石膏也故寒水石諸方多附于後近人又以長石方解石為寒水石不可不辨之附方舊四新二十五傷寒發狂踰垣上屋寒水石二錢黄連一錢為末煎甘草冷服名鵲石散事本方風熱心躁口乾狂言渾身壯熱寒水石半斤燒半日淨地坑内盆合四靣濕土擁起經宿取出入甘草末天竺黄各二兩龍腦二分糯米糕丸彈子大蜜水磨下集驗方解中諸毒方同上乳石發渴寒水石一塊含之以瘥為度聖濟録男女隂毒寒水石不拘多少為末用兩餾飯搗丸栗子大日乾每用一丸炭火煅紅燒研以滚酒調服飲蔥醋湯投之得汗愈蔡氏經驗必用方小兒丹毒寒水石末一兩和水塗之集𤣥方小兒身熱石膏一兩青黛一錢為末糕糊丸龍眼大每服一丸燈心湯化下普濟方骨蒸勞病外寒内熱附骨而蒸也其根在五臟六腑之中必因患後得之骨肉日消飲食無味或皮燥而無光蒸盛之時四肢漸細足趺腫起石膏十兩研如乳粉水和服方寸七日再以身凉為度外臺秘要熱盛喘嗽石膏二兩甘草炙半兩為末每服三錢生薑蜜調下方普濟痰熱喘嗽痰涌如泉石膏寒水石各五錢為末每人參湯服三錢保命集食積痰火瀉肺火胃火白石膏火煅出火毒半斤為末醋和丸梧子大每服四五十丸白湯下丹溪方胃火牙疼好軟石膏一兩火煅淡洒淬過為末入防風荆芥細辛白芷五分為末日用揩牙甚效保壽堂方老人風熱内熱目赤頭痛視不見物石膏三兩竹葉五十片沙糖一兩粳米三合水三大盞煎石膏竹葉去滓取二盞煮粥入糖食養老方風邪眼寒乃風入頭系敗血凝滯不能上下流通故風寒客之而眼寒也石膏煅二兩川芎二兩甘草炙半兩為末每服一錢蔥白茶湯調下日二服宣明方頭風涕淚疼痛不已方同上鼻衂頭痛心煩石膏牡蠣一兩為末每新汲水服二錢并滴鼻内方普濟筋骨疼痛因風熱者石膏三錢飛羅麫七錢為末水和煅紅冷定滚酒化服被葢取汗連服三日即除根筆峰雜興雀目夜昬百治不効石膏末每服一錢豬肝一片薄批摻藥在上纒定沙瓶煮熟切食之一日一服明目方濕温多汗妄言煩渴石膏炙甘草等分為末每服二錢匕漿水調下論龎安時傷寒小便卒數非淋令人瘦石膏半斤搗碎肘水一斗煮五升日服五合後方小兒吐瀉黄色者傷熱也玉露散用石膏寒水石各五錢生甘草二錢半為末滚湯調服一錢小錢乙兒方水瀉腹鳴如雷有火者石膏火煅倉米飯和丸梧子大黄丹為衣米飲下二十丸不二服效方李樓竒乳汁不下石膏三兩水二升煮三沸三日飲盡妙子母秘録婦人乳癰一醉膏用石膏煅紅出火毒研每服三錢温酒下添酒盡醉睡覺再進一服陳日華經驗方油傷火灼痛不可忍石膏末傅之良梅師方金瘡出血寒水石瀝青等分為末乾摻勿經水積徳堂方刀瘡傷濕潰爛不生肌寒水石煅一兩黄丹二錢為末洗敷甚者加龍骨一錢孩兒茶一錢堂種徳方瘡口不斂生肌肉止疼痛去惡水寒水石燒赤研二兩黄丹半兩為末摻之名紅玉散局和濟方口瘡咽痛上膈有熱寒水石煅三兩朱砂三錢半腦子半字為末摻之于三因方附録玉火石頌曰宻州九仙山東南隅地中出一種石青白而脆撃之内有火謂之玉火石彼醫用之其味甘微辛温療傷寒發汗止頭目昬眩痛功與石膏等土人以當石膏用之龍石膏别録曰有名未用無毒主消渴益壽生杜陵如鐵脂中黄理石本經中品釋名肌石别錄立制石本經時珍曰理石即石膏之順理而微硬有肌者故曰理石肌石𢎞景曰仙經時呼為長理石石膽一名立制此今又名立制疑必相亂集解别録曰理石如石膏順理而細生漢中山谷及盧山采無時𢎞景曰漢中屬梁州盧山屬青州今出寧州俗用亦稀恭曰此石夾兩石間如石脉打用之或在土中重叠而生皮正赤肉白作鍼理文全不似石膏市人或刮削去皮以代寒水石并以當礜石並是假偽今盧山亦無此物見出襄州西汎水側宗奭曰理石如長石但理石如石膏順理而細其非順理而細者為長石療體亦不相逺時珍曰理石即石膏中之長文細直如絲而明潔色帶微青者唐人為石膏為寒水石長石為石膏故蘇恭言其不似石膏也此石與軟石膏一類二色亦可通用詳石膏下氣味甘寒無毒别録曰大寒之才曰滑石為之使惡麻黄主治身熱利胃解煩益精明目破積聚去三蟲本經除營衞中去來大熱結熱解煩毒止消渴及中風痿痺别録漬酒服療癖令人肥悦蘇恭附録白肌石别録有名未用曰味辛無毒主强筋骨止渴不飢隂熱不足一名肌石一名洞石生廣卷山青石間時珍曰按此即理石也其形名氣味主療皆同長石本經中品釋名方石本經直石别録土石别録硬石膏綱目集解别録曰長石理如馬齒方而潤澤玉色生長子山谷及太山臨淄采無時𢎞景曰長子縣屬上黨臨淄縣屬青州俗方仙經並無用此者恭曰此石狀同石膏而厚大縱理而長文似馬齒今均州遼坂山有之土人以為理石頌曰今惟潞州有之如蘇恭所説按本經理石長石二物味効亦别又云理石似石膏順理而細陶隠居言亦呼為長理石今靈寳丹用長理石為一物醫家相承用者乃似石膏與今潞州所出長石無異而諸郡無復出理石者醫方亦不見單用往往呼長石為長理石時珍曰長石即俗呼硬石膏者狀似軟石膏而塊不扁性堅硬潔白有粗理起齒稜撃之則片片横碎光瑩如雲母白石英亦有墻壁似方解石但不作方塊爾燒之亦不粉爛而易散方解燒之亦然但烢聲為異爾昔人以此為石膏又以為方解今人以此為寒水石皆誤矣但與方解乃一類二種故亦名方石氣味功力相同通用無妨唐宋諸方所用石膏多是此石昔醫亦以取効則亦可與石膏通用但不可解肌發汗耳氣味辛苦寒無毒主治身熱胃中結氣四肢寒厥利小便通血脉明目去瞖眇下三蟲殺蠱毒久服不饑本經止消渴下氣除脇肋間邪氣别録方解石别録下品釋名黄石志曰敲破塊塊方解故以為名集解别録曰方解石生方山采無時𢎞景曰本經長石一名方石療體相似疑即此也恭曰此物大體與石膏相似不附石而生端然獨處大者如升小者如拳甚大者方尺或在土中或生溪水其上皮隨土及水苔色破之方解今人以為石膏用療風去熱雖同而解肌發汗不及也志曰今沙州大烏山出者佳頌曰方解石本草言生方山陶隐居疑與長石為一物蘇恭云療熱不减石膏若然似可通用但主頭風不及石膏也其肌理形段剛柔皆同但以附石不附石為言豈得功力頓異如雌黄雄黄亦有端然獨處者亦有附石生者不聞别有名號功力相異也時珍曰方解石與硬石膏相似皆光潔如白石英但以敲之段段片碎者為硬石膏塊塊方稜者為方解石蓋一類二種亦可通用唐宋諸方皆以此為石膏今人又以為寒水石雖俱不是而其性寒治熱之功大抵不相逺惟解肌發汗不能如硬石膏為異爾氣味苦辛大寒無毒之才曰惡巴豆主治胷中留熱結氣黄膽通血脉去蠱毒别録滑石本經上品釋名畫石衍義液石别録膋石音遼脱石音奪冷石𢎞景畨石别録共石宗奭曰滑石今謂之畫石因其軟滑可寫畫也時珍曰滑石性滑利竅其質又滑膩故以名之表畫家用刷紙代粉最白膩膋乃脂膏也因以名縣脱乃肉無骨也此物最滑膩無硬者為良故有諸名集解别録曰滑石生赭陽山谷及太山之隂或掖北白山或卷山采無時𢎞景曰滑石色正白仙經用之為泥今出湘州始安郡諸處初取軟如泥久漸堅强人多以作􅊘中明器物赭陽屬南陽掖縣屬青州東萊卷縣屬司州滎陽又有冷石小青黄並冷利能熨油汚衣物恭曰此石所在皆有嶺南始安出者白如凝脂極軟滑出掖縣者理粗質青有黑㸃惟可為器不可入藥齊州南山神通寺南谷亦大有色青白不佳而滑膩則勝藏器曰始安掖縣所出二石形質既異所用又殊始安者軟滑而白宜入藥東萊者硬濇而青乃作器石也斆曰凡使有多般其白滑石如方解石色似氷白畫石上有白膩文者真也烏滑石似㙠畫石上有青白膩文入用亦妙緑滑石性寒有毒不入藥用黄滑石似金顆顆圓畫石上有青黒色者勿用殺人冷滑石青蒼色畫石上作白膩文亦勿用之頌曰今道永萊濠州皆有之凡二種道永州出者白滑如凝脂南城志云膋成縣出膋石即滑石也土人以為燒器烹魚食是也萊濠州出者理粗質青有黑㸃亦謂之斑石二種皆可作器甚精好初出軟柔彼人就穴中制作用力殊少也本草所載土地皆是北方而今醫家所用白色者自南方來或云沂州所出甚白佳與本草所云太山之隂相合而彼土不取為藥今濠州所供青滑石云性寒無毒主心氣濇滯與本經大同小異又張勃吳録地理志及大康地記云欝林州布山縣馬湖馬嶺山皆有虺甚毒殺人有冷石可以解之石色赤黒味苦屑之著瘡中并以切齒立蘇一名切齒石今人多用冷石作粉治疿瘡或云即滑石也但味之甘苦不同爾時珍曰滑石廣之桂林各色及猺峒中皆出之即古之始安也白黑二種功皆相似山東蓬萊縣桂府村所出者亦佳故醫方有桂府滑石與桂林者同稱也今人亦以刻圖書不甚堅牢滑石之根為不灰木滑石中有光明黄子為石腦芝修治斆曰凡用白滑石先以刀刮淨研粉以牡丹皮同煮一伏時去牡丹皮取滑石以東流水淘過晒乾用氣味甘寒無毒别録曰大寒之才曰石韋為之使惡曽青制雄黄主治身熱洩澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣久服輕身耐饑長年本經通九竅六腑津液去留結止渴令人利中别録燥濕分水道實大腸化食毒行積滯逐凝血解燥渴補脾胃降心火偏主石淋為要藥震亨療黄疸水腫脚氣吐血衂血金瘡血出諸瘡腫毒時珍發明頌曰古方治淋瀝多單使滑石又與石韋同搗末飲服刀圭更駛又主石淋取十二分研粉分作兩服水調下煩熱定即停後服權曰滑石療五淋主産難服其末又末與丹參蜜猪脂為膏入其月即空心酒下彈丸大臨産倍服令胎滑易生除煩熱心燥元素曰滑石氣温味甘治前隂竅濇不利性沉重能泄上氣令下行故曰滑則利竅不與諸淡滲藥同好古曰入足太陽經滑能利竅以通水道為至燥之劑豬苓湯用滑石阿膠同為滑劑以利水道蔥豉生薑同煎去滓澄清以解利淡味滲洩為陽故解表利小便也若小便自利者不宜用時珍曰滑石利竅不獨小便也上能利毛腠之竅下能利精溺之竅蓋甘淡之味先入于胃滲走經絡逰益精氣上輸于肺下通膀胱肺主皮毛為水之上源膀胱司津液氣化則能出故滑石上能發表下利水道為蕩熱燥濕之劑發表是蕩上中之熱利水道是蕩中下之熱發表是燥上中之濕利水道是燥中下之濕熱散則三焦寧而表裏和濕去則䦨門通而隂陽利劉河間之用益原散通治表裏上下諸病蓋是此意但未發出爾附方舊六新一十三益元散又名天水散太白散六一散解中暑傷寒疫癘飢飽勞損憂愁思慮驚恐悲怒𫝊染并汗後遺熱勞復諸疾兼解兩感傷寒百藥酒食邪熱毒治五勞七傷一切虚損内傷隂痿驚悸健忘癎瘛煩滿短氣痰嗽肌肉疼痛腹脹悶痛淋閟濇痛服石石淋療身熱嘔吐泄瀉腸澼下痢赤白除煩熱胸中積聚寒熱止渴消畜水婦人産後損液血虚隂虚熱甚催生下乳治吹乳乳癰牙瘡齒疳此藥大養脾腎之氣通九竅六腑去留結益精氣壯筋骨和氣通經脉消水穀保真元明耳目安䰟定魄强志輕身駐顔益壽耐勞役飢渴乃神驗之仙藥也白滑石水飛過六兩粉甘草一兩為末每服三錢蜜少許温水調下實熱用新汲水下解利用蔥䜴湯下通乳用豬肉麫湯調下催生用香油漿下凡難産或死胎不下皆由風熱燥濇結滯𦂳歛不能舒緩故也此藥力至則結滯頓開而瘥矣劉河間傷寒直格膈上煩熱多渴利九竅滑石二兩搗水三大琖煎二盞去滓入粳米煮粥食聖惠女勞黄疸日晡發熱惡寒小腹急大便溏黑額黑滑石石膏等分研末大麥汁服方寸匕日三小便大利愈腹滿者難治千金方傷寒衂血滑石末飯丸梧子大每服十丸微嚼破新水嚥下立止湯晦叔云鼻衂乃當汗不汗所致其血紫黑時不以多少不可止之且服温和藥調其營衞待血鮮時急服此藥止之也本事方乳石發動煩熱煩渴滑石粉半兩水一盞絞白汁頓服聖惠方暴得吐逆不下食生滑石末二錢七温水服仍以細麫半盞押定寇氏衍義氣壅闗格不通小便淋結臍下妨悶兼痛滑水粉一兩水調服廣利方小便不通滑石末一升以車前汁和塗臍之四畔方四寸乾即易之冬月水和楊氏産乳婦人轉脬因過忍小便而致滑石末蔥湯服二錢聖惠方妊娠子淋不得小便滑石末水和泥臍下二寸秘外臺要伏暑水泄白龍丸滑石火煆過一兩硫黄四錢為末麫糊丸緑豆大每用淡薑湯隨大小服普濟方伏暑吐泄或吐或泄或瘧小便赤煩渴玉液散用桂府滑石燒四兩藿香一錢丁香一錢為末米湯服二錢普濟方霍亂及瘧方同上痘瘡狂亂循衣摸床大熱引飲用益原散加朱砂二錢氷片三分麝香一分每燈草湯下二三服王氏痘疹方風毒熱瘡遍身出黄水桂府滑石末傅之次日愈先以虎杖豌豆甘草等分煎湯洗後乃搽普濟方隂下濕汗滑石一兩石膏煆半兩枯白礬少許研摻之集簡方脚指縫爛方同上杖瘡腫痛滑石赤石脂大黄等分為末茶湯洗淨貼趙氏經驗方熱毒怪病目赤鼻脹大喘渾身出斑毛髪如鐡乃因中熱毒氣結于下焦用滑石白礬各一兩為末作一服水三盌煎減半不住飲之夏子益竒疾方不灰木宋開寳釋名無灰木見下集解頌曰不灰木出上黨今澤潞山中皆有之葢石類也其色白如爛木燒之不燃以此得名或云滑石之根也出滑石處皆有之采無時藏器曰要燒成灰但斫破以牛乳煮了黄牛糞燒之即成灰時珍曰不灰木有木石二種石類者其體堅重或以紙裹蘸石腦油然燈徹夜不成灰人多用作小刀靶開山圖云徐無山出不灰之木生火之石山在今順天府玉田縣東北庚辛玉冊云不灰木隂石也生西南蠻夷中黎州茂州者好形如針文全若木燒之無烟此皆言石者也伏深齊地記云東武城有勝火木其木經野火燒之不滅謂之不灰木楊慎丹鉛録云太平寰宇記云不灰木俗多為鋌子燒之成炭而不灰出膠州其葉如蒲草今人束以為燎謂之萬年火把此皆言木者也時珍常得此火把乃草葉束成而中夾松脂之類一夜僅燒一二寸爾附録松石頌曰今處州出一種松石如松幹而實石也或云松久化為石人多取傍山亭及琢為枕雖不入藥與不灰相類故附之氣味甘大寒無毒獨孤滔曰煮汞結草砂煆三黄匱五金主治熱疿瘡和棗葉石灰為粉傅之開寳除煩熱陽厥時珍發明時珍曰不灰木性寒而同諸熱藥治隂毒劉河間宣明方治陽絶心腹痞痛金針丸中亦用服之葢寒熱並用所以調停隂陽也附方新四肺熱欬嗽卧時盛者不灰木一兩半太隂𤣥精石二兩甘草炙半兩貝母一兩半天南星白礬水煮過半兩為末每服半錢薑湯下聖濟録咽喉腫痛五心煩熱不灰木以牛糞燒赤四兩太隂𤣥精石煆赤四兩真珠一錢為末糯米粥丸芡子大每服一丸以生地黄汁粟米泔研化服日二次聖濟録霍亂煩滿氣逆腹脹手足厥冷不灰木陽起石煆阿魏半兩巴豆去心杏仁去皮各二十五個為末粟飯丸櫻桃大穿一孔每服一丸燈上燒烟盡研末薑湯下以利為度聖濟録隂毒腹痛回陽丹用不灰木煆牡蠣煆髙良薑炒川烏頭炮白􅆚藥各一錢為末入麝香少許每用一錢男用女唾調塗外腎女用男唾調塗乳上得汗即愈玉機㣲義五色石脂本經上品校正併入五種石脂釋名時珍曰膏之凝者曰脂此物性粘固濟爐鼎甚良蓋兼體用而名也集解别録曰五色石脂生南山之陽山谷中又曰青石脂生齊區山及海涯黄石脂生嵩髙山色如鶯雛黑石脂生潁川陽城白石脂生太山之隂赤石脂生濟南射陽又太山之隂並采無時普曰五色石脂一名五色符青符生南山或海涯黄符生嵩山色如㹠腦鴈雛黒符生洛西山空地白符生少室天婁山或太山赤符生少室或太山色絳滑如脂𢎞景曰今俗惟用赤石白石二脂好者出吳郡亦出武陵建平義陽義陽者出􅸁縣界東八十里狀如㹠腦赤者鮮紅可愛隨采復生餘三色石脂無正用但黑石脂入畫用爾恭曰義陽即申州所出乃桃花石非石脂也白石脂今出慈陽諸山勝於餘處者赤石脂今出虢州盧氏縣澤州陵川縣又慈州吕鄉縣宜州諸山亦有並色理鮮膩為佳二脂太山不聞有之舊出蘇州餘杭山今不收采承曰今蘇州見貢赤白二石脂但入藥不甚佳惟延州山中所出最良揭兩石中取之頌曰白石脂赤石脂今惟潞州出之潞與慈州相近也宗奭曰赤白石脂四方皆有以理膩粘舌綴唇者為上修治斆曰凡使赤脂研如粉新汲水飛過三度晒乾用時珍曰亦有火煆水飛者氣味五種石脂並甘平大明曰並温無毒畏黄岑大黄官桂主治黄疸洩痢腸澼濃血隂蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不饑輕身延年五石脂各隨五色補五臟本經治洩痢血崩帶下吐血衂血濇精淋瀝除煩療驚悸壯筋骨補虚損久服悦色治瘡癤痔漏排膿大明青石脂氣味酸平無毒普曰青符神農甘雷公酸無毒桐君辛無毒李當之大寒主治養肝膽氣明目療黄疸洩痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不饑延年别録黄石脂氣味苦平無毒普曰黄符雷公苦李當之小寒之才曰曽青為之使惡細辛畏蜚蠊黄連甘草斆曰服之忌卵味主治養脾氣安五臟調中大人小兒洩痢腸澼下膿血去白蟲除黄疸癰疽久服輕身延年别録黑石脂别録曰一名石墨一名石湼時珍曰此乃石脂之黑者亦可為墨其性粘舌與石炭不同南人謂之畫眉石許氏説文云黛畫眉石也氣味鹹平無毒普曰黒符桐君甘無毒主治養腎氣强隂主隂蝕瘡止腸澼洩痢療口瘡咽痛久服益氣不饑延年别録白石脂氣味甘酸平無毒普曰白符一名隨岐伯雷公酸無毒桐君甘無毒扁鵲辛李當之小寒權曰甘辛杲曰温之才曰得厚朴米汁飲止便膿燕屎為之使惡松脂畏黄芩頌曰畏黄連甘草飛㢘馬目毒公主治養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不饑輕身延年别録濇大腸甄權附方舊四新二小兒水痢形之不勝湯藥白石脂半兩研粉和白粥空肚食之子母秘録小兒滑泄白龍丸白石脂白龍骨等分為末水丸黍米大每量大小木𤓰紫蘇湯下全㓜心鑑久泄久痢白石脂乾薑等分研百沸湯和麫為稀糊捜之併手丸梧子大每米飲下三十丸斗門方兒臍汁出赤腫白石脂末􅆈温撲之日三度勿揭動韋宙獨行方兒臍血出多啼方同上冦氏衍義粉滓面䵟白石脂六兩白歛十二兩為末雞子白和夜塗且洗聖濟録赤石脂氣味甘酸辛大温無毒普曰赤符神農雷公甘黄帝扁鵲無毒李當之小寒之才曰畏芫花惡大黄松脂頌曰古人亦單服食云發則心痛飲熱酒不解用綿裹蔥豉煮水飲之主治養心氣眀目益精療腹痛腸澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顔色益智不饑輕身延年别録補五臟虛乏甄權補心血生肌肉厚腸胃除水濕收脱肛時珍發明𢎞景曰五色石脂本經療體亦相似别録分條具載今俗惟用赤白二脂斷下痢耳元素曰赤白石脂俱甘酸陽中之隂固脱杲曰降也陽中隂也其用有二固腸胃有收歛之能下胎衣無推蕩之峻好古曰濇可去脱石脂為收歛之劑赤入丙白入庚時珍曰三石脂皆手足陽明藥也其味甘其氣温其體重其性濇濇而重故能收濕止血而固下甘而温故能益氣生肌而調中中者腸胃肌肉驚悸黄疸是也下者腸澼泄痢崩帶失精是也五種主療大抵相同故本經不分條目但云各隨五色補五臟别録雖分五種而性味主治亦不甚相逺但以五味配五色為異亦是强分爾赤白二種一入氣分一入血分故時用尚之張仲景用桃花湯治下痢便膿血取赤石脂之重濇入下焦血分而固脱乾薑之辛温暖下焦氣分而補虛粳米之甘温佐石脂乾薑而潤腸胃也附方舊五新七小兒疳㵼赤石脂末米飲調服半錢立瘥加京芎等分更妙斗門方大腸寒滑小便精出赤石脂乾薑各一兩胡椒半兩為末醋糊丸梧子大每空心米飲下五七十丸有人病此熱藥服至一斗二升不效或敎服此終四劑而息冦氏衍義赤白下痢赤石脂末飲服一錢普濟方冷痢腹痛下白凍如魚腦桃花丸赤石脂煆乾薑炮等分為末蒸餅和丸量大小服日三服和劑局方老人氣痢虛冷赤石脂五兩水飛白麫六兩水煮熟入蔥醬作臛空心食三四次即愈養老方傷寒下痢便膿血不止桃花湯主之赤石脂一斤一半全用一半末用乾薑一兩粳米半升水七升煮米熟去滓每服七合納末方寸七日三服愈乃止景仲方痢後脱肛赤石脂伏龍肝為末傳之一加白礬錢氏小兒方反胃吐食絶好赤石脂為末蜜丸梧子大每空心薑湯下一二十丸先以巴豆仁一枚勿令破以津吞之後乃服藥惠聖方痰飲吐水無時節者其原因冷飲過度遂令脾胃氣弱不能消化飲食飲食入胃皆變成冷水反吐不停赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自住稍加至三七服盡一斤則終身不吐痰水又不下痢補五臟令人肥健有人痰飲服諸藥不效用此遂愈千金翼方心痛徹背赤石脂乾薑蜀椒各四分附子炮二分烏頭炮一分為末蜜丸梧子大先食服一丸不住稍増之張仲景金匱方經水過多赤石脂破故紙一兩為末每服二錢米飲下普濟方小便不禁赤石脂煆牡蠣煆各三兩鹽一兩為末湖丸梧子大每鹽湯下十五丸普濟方桃花石唐本草集解恭曰桃花石出申州鍾山縣似赤石脂但䑛之不着舌者是也珣曰其狀亦似紫石英色若桃花光潤而重目之可愛頌曰今信陽州有之形塊似赤石脂紫石英輩采無時陶𢎞景言赤石脂出義陽者狀如㹠腦鮮紅可愛蘇恭非之云是桃花石久服肥人今土人以療痢功用亦不相逺宗奭曰桃花石有赤白二種有赤地淡白㸃如桃花片者有淡白地赤㸃如桃花片者人往往鐫磨為器用人亦罕服之時珍曰此即赤白石脂之不粘舌堅而有花㸃者非别一物也故其氣味功用皆同石脂昔張仲景治痢用赤石脂名桃花湯和劑局方治冷痢有桃花丸皆即此物耳氣味甘温無毒主治大腸中冷膿血痢久服令人肥悦能食唐本爐甘石綱目釋名爐先生土宿真君曰此物㸃化為神藥絶妙九天三清俱尊之曰爐先生非小藥也時珍曰爐火所重其味甘故名集解時珍曰爐甘石所在坑冶處皆有川蜀湘東最多而太原澤州陽城髙平靈丘融縣及雲南者為勝金銀之苖也其塊大小不一狀似羊腦鬆如石脂亦粘舌産于金坑者其色微黄為上産于銀坑者其色白或帶青或帶緑或粉紅赤銅得之即變為黄今之黄銅皆此物㸃化也造化指南云爐甘石受黄金白銀之氣熏陶三十年方能結成以大穢浸及砒煮過皆可㸃化不减三黄崔昉外丹本草云用銅三斤爐甘石一斤錬之即成鍮石一斤半非石中物取出乎真鍮石生波斯如黄金燒之赤而不黑修治時珍曰凡用爐甘石以炭火煆紅童子小便淬七次水洗淨研粉水飛過晒用氣味甘温無毒主治止血消腫毒生肌明目去瞖退赤收濕除爛同龍腦㸃治目中一切諸病時珍發明時珍曰爐甘石陽明經藥也受金銀之氣故治目病為要藥時珍常用爐甘石煆淬海螵蛸硼砂各一兩為細末以㸃諸目病甚妙入朱砂五錢則性不粘也附方新十五目暴赤腫爐甘石火煆尿淬風化消等分為末新水化一粟㸃之御藥院方諸般翳膜爐甘石青礬朴消等分為末每用一字沸湯化開温洗日三次宣明方一切目疾真爐甘石半斤用黄連四兩剉豆大銀石器内水二盌煮二伏時去黄連為末入片腦二錢半研匀罐收每㸃少許頻用取效泡又方爐甘石煆一錢盆消一錢為末熱湯洗目中諸病石連光明散治眼中五輪八廓諸證神效爐甘石半斤取如羊腦鴨頭色者以桑柴灰一汁火煆赤研末用雅州黄連各四兩切片煎水浸石澄取粉晒乾用鈆粉二定以二連水浸過炒之雄黄研末每用甘石鈆粉各三分雄黄一分片腦半分研匀㸃眼甚妙張氏方目暗昬花爐甘石火煆童尿淬七次代赭石火煆醋淬七次黄丹水飛各四兩為末白沙蜜半斤以銅鐺鍊去白沫更添清水五六盌熬沸下藥文武火熬至一盌滴水不散以夾紙濾入瓷器收之頻㸃日用衞生易簡方爛弦風眼劉長春方治風眼流淚爛弦白爐甘石四兩火煆童尿淬七次地上出毒三日細研每用椒湯洗目後臨卧㸃三四次次早以茶湯洗去甚妙末又方爐甘石一斤火煆黄連四兩煎水淬七次為入片腦每用㸃目為宣明眼科方用爐甘石石膏各一錢海螵蛸三分末入片腦麝香各少許收㸃衞生易簡方用爐甘石二兩以黄連一兩煎水入童尿半盞再熬下朴消一兩又熬成以火煆石淬七次洗淨為末入蜜陀僧末一兩研匀收㸃之聤耳出汁爐甘石礬石各二錢胭脂半錢麝香少許為末繳淨吹之普濟方齒疏陷物爐甘石煆寒水石等分為末每用少許擦牙忌用刷牙久久自宻集𤣥方漏瘡不合童尿制爐甘石牡蠣粉外塞之内服滋補藥雜病治例下泔隂瘡爐甘石火煆醋淬五次一兩孩兒茶三錢為末麻油調傳立愈通妙邵真人方隂汗濕痒爐甘石一分真蚌粉半分研粉撲之直指方井泉石宋嘉祐釋名時珍曰性寒如井泉故名集解禹錫曰井泉石近道處處有之以出饒陽郡者為勝生田野中間穿地深丈餘得之形如土色圓方長短大小不等内實而外圓重重相叠采無時又一種如薑石者時人多指為井泉石非是頌曰深州城西二十里劇家村出之修治禹錫曰凡用細研水飛過不爾令人淋氣味甘大寒無毒主治諸熱解心臟熱結熱嗽小兒熱疳雀目青盲眼赤腫痛消腫毒得决明菊花療小兒眼疳生翳膜得大黄巵子治眼瞼腫赤嘉祐附方新四膀胱熱閉小便不快井泉石海金沙車前子滑石各一兩為末每服二錢蜜湯下録聖濟風毒赤目井泉石半兩井中苔焙穀精草一兩䜴焙一合為末每服二錢空心井華水服聖濟録産後搐搦俗名雞爪風舒筋散用井泉石四兩另研天麻酒浸木香各一兩人參川芎官桂丁香各半兩為末每服三錢大豆淋酒調下出汗即愈宣明方痤疿瘙痒井泉石生三兩寒水石煆四兩腦子半錢為末撲之聖濟録無名異宋開寳釋名時珍曰無名異庾詞也集解志曰無名異出大食國生于石上狀如黑石炭畨人以油錬如黳石嚼之如餳頌曰今廣州山石中及宜州八星龍濟山中亦有之黒褐色大者如彈丸小者如黑石子采無時斆曰無名異形如石炭味别時珍曰生川廣深山中而桂林極多一包數百枚小黒石子也似蛇黄而色黒近處山中亦時有之用以煮蟹殺腥氣煎煉桐油收水氣塗剪剪燈則燈自斷也氣味甘平無毒頌曰鹹寒伏硫黄主治金瘡折傷内損止痛生肌肉開寳消腫毒癰疽醋摩傅之蘇頌收濕氣時珍發明時珍曰按雷斆炮炙論序云無名止楚截指而似去甲毛崔昉外丹本草云無名異陽石也昔人見山雞被網損其足脱去􅋦一石摩其損處遂愈而去乃取其石理傷折大效人因傅之附方新十打傷腫痛無名異為末酒服􅂒下四肢之末血皆散矣集驗方損傷接骨無名異甜𤓰子各一兩乳香没藥各一錢為末每服五錢熱酒調服小兒三錢服畢以黄米粥塗紙上摻左顧牡蠣末褁之竹箆夾住多能鄙事臨杖預報無名異末臨時温服三五錢則杖不甚痛亦不甚傷談埜翁試驗方赤瘤丹毒無名異末蔥汁調塗立消簡便方痔漏腫痛無名異炭火煆紅米酸淬七次為細末以温水洗瘡綿裹筋頭填末入瘡口數次愈簡便方天泡濕瘡無名異末井華水調服之普濟方臁瘡潰爛無名異虢丹細研清油調搽濕則乾搽之濟急方股隂􅗢癧無名異二錢麝香一字研酒半盌午後空腹服立效鄙多能事拳毛倒睫無名異末紙卷作撚㸃燈吹殺熏之睫自起保命集消渴引飲無名異一兩黄連二兩為末蒸餅丸緑豆大每服百丸以茄根蠶繭煎湯送下聖濟録脚氣痛楚無名異末化牛皮膠調塗之頻换衞生易簡方蜜栗子綱目集解時珍曰蜜栗子生川廣江浙金坑中狀如蛇黄而有刺上有金線纒之色紫褐亦無名異之類也丹爐家采作五金匱藥制三黄主治金瘡折傷有效時珍石鍾乳本經上品釋名留公乳别録虚中吳普蘆石别録鵞管石綱目夏石别録黄石砂藥性時珍曰石之津氣鍾聚成乳滴溜成石故名石鍾乳蘆與鵞管象其空中之狀也集解别録曰石鍾乳生少室山谷及太山采無時普曰生太山山谷隂處岸下溜汗所成如乳汁黄白色空中相通二月三月采隂乾𢎞景曰第一出始興而江陵及東境名山石洞亦皆有惟通中輕薄如鵞翎管碎之如爪甲中無鴈齒光明者為善長挺乃有一二尺者色黄以苦酒洗刷則白仙經少用而俗方所重恭曰第一始興其次廣連澧朗郴等州者雖厚而光潤可愛餌之並佳今陜州青溪房州三洞出者亞於始興自餘非其土地不可輕服多發淋渴止可搗篩白練裹之合諸藥草浸酒服之陶云有一二尺者謬説也思邈曰乳石必須土地清白光潤羅紋鳥翮蟬翼一切皆成白者可用其非土地者慎勿服之殺人甚于鴆毒志曰别本注云凡乳生于深洞幽穴皆龍蛇潛伏或龍蛇毒氣或洞口隂陽不均或通風氣鴈齒濇或黄或赤乳無潤澤或煎煉火色不調一煎已後不易水則生火毒服即令人發淋又乳有三種石乳者其山洞純石以石津相滋隂陽交備蟬翼紋成其性温竹乳者其山洞遍生小竹以竹津相滋乳如竹狀其性平茅山之乳者其山有土石相雜遍生茅草以茅津相滋為乳乳色稍黑而滑潤其性微寒一種之中有上中下色皆以光澤為好餘處亦有不可輕信炳曰如蟬翅者上爪甲者次鵞管者下明白而薄者可服頌曰今道州江華縣及連英韶階峽州山中皆有之生嵓穴隂處溜山液而成空中相通長者六七寸如鵞翎管狀色白微紅唐李補闕鍊乳法云取韶州鍾乳無問厚薄但令顔色明淨光澤者即堪入鍊惟黄赤二色不任用柳宗元書亦云取其色之美而已不必惟土之信是此藥所重惟在明白者不必如上所説數種也今醫家但以鵞管中空者為最又本經中品載殷孽云鍾乳根也孔公孽殷孽根也石花石牀並與殷孽同又有石腦亦鍾乳之類凡此五種醫家亦復稀用但用鍾乳爾時珍曰按范成大桂海志所説甚詳明云桂林接宜融山洞穴中鍾乳甚多仰視石脉漏起處即有乳牀白如玉雪石液融結成者乳牀下垂如倒數峰小山峰端漸鋭且長如氷柱柱端輕薄中空如鵞翎乳水滴瀝不已且滴且凝此乳之最精者以竹管仰承取之鍊冶家又以鵞管之端尤輕明如雲母爪甲者為勝修治斆曰凡使勿用頭粗厚并尾大者為孔公石不用色黒及經大火驚過并久在地上収者曽經藥物制者並不得用須要鮮眀薄而有光潤者似鵞翎筒子為上有長五六寸者凡修事法鍾乳八兩用沉香零陵香藿香甘松白茅各一兩水煮過再煮汁方用煮乳一伏時漉出以甘草紫背天葵各二兩同煮漉出拭乾緩火焙之入臼杵粉篩過入鉢中令有力少壯者二三人不住研三日三夜勿歇然後以水飛澄過絹籠於日中晒乾入鉢再研二萬遍乃以瓷盒收之慎微曰太清經鍊鍾乳法取好細末置金銀器中瓦一片宻葢勿令洩氣蒸之自然化作水也李補闕鍊乳法見後氣味甘温無毒普曰神農辛桐君黄帝醫和甘扁鵲甘無毒權曰有大毒之才曰蛇牀為之使惡牡丹𤣥石牡蒙畏紫石英蓑草忌羊血時珍曰相感志云服乳石忌參术犯者多死土宿真君曰鍾乳産于陽洞之内陽氣所結伏之可柔五金麥門冬獨蒜韭實胡蔥胡荽猫兒眼草皆可伏之主治欬逆上氣明目益精安五臟通百節利九竅下乳汁本經益氣補虚損療脚弱疼冷下焦傷竭强隂久服延年益壽好顔色不老令人有子不鍊服之令人淋别録主泄精寒嗽壯元氣益陽事通聲甄權補五勞七傷大明補髓治消渴引飲青霞子發明慎微曰柳宗元與崔連州書云草木之生也依于土有居山之隂湯或近木或附石其性移焉况石鍾乳直産於石石之精粗疎宻尋尺特異而穴之上下土之厚薄石之髙下不可知則其依而産者固不一性然由其精密而出者則油然而清汩然而輝其竅滑以夷其肌㢘以微食之使人榮華温柔其氣宣流生胃通腸夀考康寧其粗疎而下者則奔突結􅉣乍大乍小色如枯骨或類死灰奄頓不發叢齒積類重濁頑璞食之使人偃蹇壅欝泄火生風㦸喉痒肺幽闗不聰心煩喜怒肝舉氣剛不能和平故君子慎取其色之美而不必惟土之信以求其至精凡為此也震亨曰石鍾乳為慓悍之劑内經云藥石之氣悍仁哉言也凡藥氣之偏者可用于暫而不可久夫石藥又偏之甚者也自唐時太平日久膏粱之家惑於方士服食致長生之説以石藥體厚氣厚習以成俗迨宋至今猶未巳也斯民何辜受此氣悍之禍而莫之能救哀哉本草讚其久服延年之功柳子厚又從而述美之予不得不深言也時珍曰石鍾乳乃陽明經氣分藥也其氣慓疾令陽氣暴充飲食倍進而形體壯盛昧者得此自慶益肆淫佚精氣暗損石氣獨存孤陽愈熾久之營衛不從發為淋渴變為癰疽是果乳石之過耶抑人之自取耶凡人陽明氣衰用此合諸藥以救其衰疾平則止夫何不可五榖五肉久嗜不已猶有偏絶之弊况石藥乎種樹書云凡果樹作穴納鍾乳末少許固宻則子多而味美納少許于老樹根皮間則樹復茂信然則鍾乳益氣令人有子之説亦可類推但恐嗜欲者未獲其福而先受其禍也然有秉賦異常之人又不可執一而論張果醫説載武帥雷世賢多侍妾常餌砂母鍾乳日夜煎錬以濟其欲其妾父苦寒泄不嗜食求丹十粒服之即覺臍腹如火少焉熱狂投井中救出遍身發紫泡數日而死而世賢服餌千計了無病惱異哉沈括筆談載夏英公性豪侈而賦稟異于人纔睡即身冷而僵如死者常服仙茅鍾乳硫黄莫知紀極每晨以鍾乳粉入粥食之有小吏竊食遂發疽死此與終身服附子無恙者同一例也沈括又云醫之為術苟非得之于心未見能臻其妙也如服鍾乳當終身忌术术能動鍾乳也然有藥勢不能蒸須要其動而激發者正如火少必借風氣鼓之而後發火盛則鼔之反為害此自然之理也凡服諸藥皆宜倣此又十便良方云凡服乳人服乳三日即三日補之服乳十日即十日補之欲飽食以牛羊麞鹿等骨煎汁任意作羮食之勿食倉米臭肉及犯房事一月後精氣滿盛百脉流遍身體覺熱遶臍肉起此為得力可稍近房事不可頻數令藥氣頓竭彌更害人戒之慎之名之為乳以其狀人之乳也與神丹相配與凡石迥殊故乳稱石語云上士服石服其精下士服石服其滓滓之與精其力逺也此説雖明快然須真病命門火衰者宜之否則當審附方新十一李補闕服乳法主五勞七傷欬逆上氣治寒嗽通聲音明目益精安五臟通百節利九竅下乳汁益氣補虚損療脚弱疼冷下焦傷竭强隂久服延年益壽不老令人有子取韶州鍾乳無問厚薄但顔色明淨光澤者即堪入鍊惟黄赤二色不任用置于金銀器中大鐺著水沉器煮之令如魚眼沸水減即添乳少三日三夜乳多七日七夜候乾色變黄白即熟如疑生更煮滿十日最佳取出去水更以清水煮半日其水色清不變即止乳無毒矣入瓷鉢中玉槌著水研之覺乾濇即添水常令如稀米泔狀研至四五日揩之光膩如書中白魚便以水洗之不隨水落者即熟落者更研乃澄取暴乾每用一錢半温酒空腹調下兼和丸散用其煮乳黄濁水切勿服服之損人咽喉傷肺令人頭痛或下利不止其有犯者但食猪肉解之孫真人千金方鍾乳煎治風虛勞損腰脚無力補益强壯用鍾乳粉鍊成者三兩以夾練袋盛之牛乳一大升煎減三之一去袋飲乳分二服日一作不吐不利虛冷人微溏無苦一袋可煮三十度即力盡别作袋每煎訖須濯淨令通氣其滓和麫餵雞生子食之此崔尚書方也翼孫真人千金鍾乳酒安五臟通百節利九竅主風虚補下膲益精明目鍾乳鍊成粉五兩以夾練袋盛之清酒六升瓶封湯内煮減三之二取出添滿封七日日飲三合忌房事蔥䜴生食硬食要外臺秘鍾乳丸治丈夫衰老陽絶肢冷少氣減食腰疼脚痺下氣消食和中長肌鍾乳粉二兩兎絲子酒浸焙石斛各一兩吳茱茰湯泡七次炒半兩為末煉蜜和丸梧子大每服七丸空心温酒或米湯下日二服服訖行數百歩覺胸口熱稍定即食乾飯豆醬忌食粗臭惡食及聞尸穢等氣初服七日勿為陽事過七日乃可行不宜傷多服過半劑覺有功乃續服此曹公卓方也和劑局方元氣虛寒方見陽起石下一切勞嗽胷膈痞滿焚香透膈散用鵞管石雄黄佛耳草欵冬花等分為末每用一錢安香爐上焚之以筒吸烟入喉中日二次宣明肺虚喘急連綿不息生鍾乳粉光明者五錢蠟三兩化和飯甑内蒸熟研丸梧子大毎温水下一丸聖濟録吐血損肺鍊成鍾乳粉每服二錢糯米湯下立止十便良方大腸冷滑不止鍾乳粉一兩肉豆蔲煨半兩為末煮棗肉丸梧子大每服七十丸空心米飲下濟生方乳汁不通氣少血衰脉濇不行故乳少也鍊成鍾乳粉二錢濃煎漏蘆湯調下或與通草等分為末米飲服方寸七日三次外臺秘要精滑不禁大府溏泄手足厥冷方見陽起石下孔公孽本經中品釋名孔公石綱目通石時珍曰孔竅空通附垂于石如木之芽孽故曰孔公孽而俗訛為孔公爾恭曰此孽次于鍾乳狀如牛羊角中有孔通故名通石别録誤以此為殷孽之根而俗猶呼為孔公孽是也集解别録曰孔公孽殷孽根也青黄色生梁山山谷𢎞景曰梁山屬馮翊郡此即今鍾乳牀也亦出始興皆大塊打破之凡鍾乳之類有三種同一體從石室上汁溜積久盤結者為鍾乳牀即孔公孽也其以次小巃嵸者為殷孽大如牛羊角長一二尺今人呼此為孔公孽也殷孽復溜輕好者為鍾乳雖同一類而療體各異貴賤懸殊三鍾同根而所生各處當是隨其土地為勝爾保昇曰鍾乳之類凡五種鍾乳殷孽孔公孽石牀石花也雖同一體而主療各異頌曰孔公孽殷孽既是鍾乳同生則有孽處皆當有乳今不聞有之豈用之既寡則采者亦稀乎抑時人不知孽中有乳不盡采乎不能盡究也恭曰孔公孽次于鍾乳别録誤以為殷孽之根殷孽即孔公孽之根俗人乃以孔公孽為殷孽陶氏依之以孔公孽為鍾乳牀非矣時珍曰以薑石通石二石推之則似附石生而粗者為殷孽接殷孽而生以漸空通者為孔公孽接孔公孽而生者為鍾乳當從蘇恭之説為優蓋殷孽如人之乳根孔公孽如乳房鍾乳如乳頭也氣味辛温無毒普曰神農辛岐伯鹹扁鵲酸無毒大明曰甘煖權曰甘有小毒之才曰木蘭為之使惡細辛术忌羊血主治傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁本經男子隂瘡女子隂蝕及傷食病常欲眠睡别録主腰冷膝痺毒氣能使喉聲圓亮甄權輕身充肌青霞子發明𢎞景曰二孽不堪丸散止可水煮湯并酒浸飲之甚療脚弱脚氣附方新一風氣脚弱孔公孽二斤石斛五兩酒二斗浸服肘後方殷孽本經中品釋名薑石時珍曰殷隐也生于石上隐然如木之孽也恭曰此即孔公孽根也盤結如薑故名薑石俗人乃以孔公孽為之誤矣詳孔公孽下集解别録曰殷孽鍾乳根也生趙國山谷又梁山及南海采無時𢎞景曰趙國屬冀州亦出始興氣味辛温無毒之才曰惡防己畏术主治爛傷瘀血洩痢寒熱鼠瘻癥瘕結氣脚冷疼弱本經熏筋骨弱并痔瘻及下乳汁别録發明見孔公孽下附録石牀唐本草恭曰味甘温無毒酒漬服與殷孽同功一名乳牀一名逆石一名石笋生鍾乳堂中采無時鍾乳水滴下凝積生如笋狀久漸與上乳相接為柱也陶謂孔公孽為乳牀非也殷孽孔公孽在上石牀石花在下性體雖同上下有别石花唐本草恭曰味甘温無毒主腰脚風冷漬酒服與殷孽同功一名乳花生乳穴堂中乳水滴石上散如霜雪者三月九月采之大明曰壯筋骨助陽道宗奭曰石花白色圓如覆大馬杓上有百十枝每枝各槎牙分岐如鹿角上有細文起以指撩之錚錚然有聲其體甚脆不禁觸撃多生海中石上世方難得家中曽得一本本條所注皆非是時珍曰石花是鍾乳滴于石上迸散日久積成如花者蘇恭所説甚明冦宗奭所説乃是海中石梅石柏之類亦名石花不入藥用非本草石花正自誤矣石骨恭曰石骨服之力勝鍾乳似骨如玉堅潤生五石脂中土殷孽别録下品釋名土乳唐本志曰此則土脂液也生于土穴狀如殷孽故名集解别録曰生髙山厓上之隂色白如脂采無時𢎞景曰此猶似鍾乳孔公孽之類故亦有孽名但在厓上爾今不知用恭曰此即土乳也出渭州鄣縣三交驛西北坡平地上窟中見有六十餘坎昔人采處土人云服之亦同鍾乳而不發熱陶及本草云生厓上非也時珍曰此即鍾乳之生於山厓土中者南方名山多有之人亦掘為石山貨之充玩不知其為土鍾乳也氣味鹹平無毒主治婦人隂蝕大熱乾痂别録石腦别録中品釋名石飴餅别録石芝綱目化公石時珍曰其狀如結腦故名昔有化公服此又名化公石集解别録曰石腦生名山土中采無時𢎞景曰此石亦鍾乳之類形如曽青而白色黑斑而軟易破今茅山東及西平山並有之鑿土龕取出恭曰出徐州宋里山初在爛石中入土一丈以下得之大如雞卵或如棗許觸著即散如麫黄白色土人號為握雪礜石云服之長生保昇曰蘇恭引握雪礜石為注非矣時珍曰按抱朴子内篇云石腦芝生滑石中亦如石中黄子狀但不皆有耳打破大滑石千計乃可得一枚初破之在石中五色光明而自得服一升得長生乃石芝也别録所謂石腦及諸仙服食當是此物也蘇恭所説本是石腦而又以注握雪礜石誤矣握雪乃石上之液與此不同見後本條氣味甘温無毒主治風寒虚損腰脚疼痺安五臟益氣别錄發明𢎞景曰俗方不見用仙經有劉君導仙散用之又真誥云李整采服療風痺虛損而得長生恭曰隋時化公所服亦名石腦時珍曰真誥載姜伯真在大横山服石腦時時使人身熱而不渴即此石髓拾遺集解藏器曰石髓生臨海華葢山石窟土人采取澄淘如泥作丸如彈子有白有黄彌佳時珍曰按列仙傳言卭疏煮石髓服即鍾乳也仙經云神山五百年一開石髓出服之長生王烈入山見石裂得髓食之因撮少許與􅄞康化為青石北史云龜茲國北大山中有如膏者流出成川行數里入地狀如醍醐服之齒髪更生病人服之皆愈方鎮編年録云髙展為并州判官一日見砌間沫出以手撮塗老吏面皺皮頓改為少年色展以為神藥問承天道士道士曰此名地脂食之不死乃發砌無所見此數説皆近石髓也氣味甘温無毒主治寒熱羸瘦無顔色積聚心腹脹滿食飲不消皮膚枯槁小便數疾癖塊腹内腸鳴下痢腰脚疼冷性壅宜寒瘦人藏器石腦油宋嘉祐校正併入拾遺石漆釋名石油綱目石漆拾遺猛火油雄黄油硫黄油綱目集解禹錫曰石腦油宜以瓷器貯之不可近金銀器雖至完宻直爾透過道家多用俗方不甚須宗奭曰真者難收多滲蝕器物入藥最少燒錬家研生砒入油再研如膏入坩鍋内瓦葢置火上俟油泣盡出之又研又入油又上火錬之砒即伏矣時珍曰石油所出不一出陜之肅州鄜州延州延長及雲南之緬甸廣之南雄者自石岩流出與泉水相雜汪汪而出肥如肉汁土人以草挹入缶中黑色頗似淳漆作雄硫氣土人多以然燈甚明得水愈熾不可入食其烟甚濃沈存中宦西時掃其煤作墨光黒如漆勝于松烟張華博物志載延壽縣南山石泉注為溝其水有脂挹取著器中始黄後黑如凝膏然之極明謂之石漆段成式酉陽雜爼載髙奴縣有石脂水膩浮水上如漆采以膏車及然燈康譽之昨夢録載猛火油出髙麗東日烘石熱所出液也惟真琉璃器可貯之入水涓滴烈焰遽發餘力入水魚鼈皆死邊人用以禦敵此數説皆石腦油也國朝正徳末年嘉州開鹽井偶得油水可以照夜其光加倍沃之以水則焰彌甚撲之以灰則滅作雄硫氣土人呼為雄黄油亦曰硫黄油近復開出數井官司主之此亦石油但出于井爾葢皆地産雄硫石脂諸石源脉相通故有此物王氷謂龍火得濕而焰遇水而燔光焰詣天物窮方止正是此類皆隂火也附録地溲時珍曰溝澗流水及引水灌田之次多有之形狀如油又如泥色如黄金甚腥烈冬月收取以柔鐡燒赤投之二三次剛可切玉氣味辛苦有毒獨孤滔曰化銅制砒主治小兒驚風化涎可和諸藥作丸散嘉祐塗瘡癬蟲癩治鍼箭入肉藥中用之時珍發明時珍曰石油氣味與雄硫同故殺蟲治瘡其性走竄諸器皆滲惟瓷器琉璃不漏故錢乙治小兒驚熱膈實嘔吐痰涎銀液丸中用和水銀輕粉龍腦蠍尾白附子諸藥為丸不但取其化痰亦取其能透經絡走闗竅也石炭綱目釋名煤炭石墨鐡炭烏金石綱目焦石時珍曰石炭即烏金石上古以書字謂之石墨今俗呼為煤炭墨音相近也拾遺記言焦石如炭嶺表録言康州有焦石穴即此也集解時珍曰石炭南北諸山産處亦多昔人不用故識之者少今則人以代薪炊㸑煆錬鐡石大為民利土人皆鑿山為穴横入十餘丈取之有大塊如石而光者有踈散如炭末者俱作硫黄氣以酒噴之則解入藥用堅塊如石者昔人言夷陵黒土為刼灰者即此踈散者也孝經援神契云王者徳至山陵則出黒丹水經言石炭可書然之難盡烟氣中人酉陽雜爼云無勞縣出石墨㸑之彌年不消夷堅志云彰徳南郭村井中産石墨宜陽縣有石墨山汧陽縣有石墨洞燕之西山楚之荆州興國州江西之廬山袁州豐城贑州皆産石炭可以炊㸑並此石也又有一種石墨䑛之粘舌可書字畫眉名畫眉石者即黒石脂也見石脂下附録然石時珍曰曹叔雅異物志云豫章有石黄色如理踈以水灌之便熱可以烹鼎冷則再灌張華謂之然石髙安亦有之氣味甘辛温有毒時珍曰人有中煤氣毒者昬瞀至死惟飲冷水即解獨孤滔曰去錫暈制三黄硇砂消石主治婦人血氣痛及諸瘡毒金瘡出血小兒痰癎時珍附方新五金瘡出血急以石炭末厚傅之瘡深不宜速合者加滑石醫學集成誤吞金銀及錢在腹中不下者光明石炭一杏核大硫黄一皂子大為末酒下普濟方腹中積滯烏金石即鐡炭也三兩自然銅為末醋熬一兩當歸一兩大黄童尿浸晒一兩為末每服二錢紅花酒一盞童尿半盞同調食前服日二服張子和儒門親事月經不通巴豆去油如緑豆大三丸以烏金石末一錢調湯送下即通衞生易簡方産後兒枕刺痛黒白散用烏金石燒酒淬七次寒水石煆為末等分每用粥飲服一錢半即止未止再服㓗古保命集石灰本經中品釋名石堊𢎞景堊灰本經希灰别録鍜石日華白虎綱目礦灰綱目集解别録曰石灰生中州川谷𢎞景曰近山生石青白色作竈燒竟以水沃之即熱蒸而解俗名石堊頌曰所在近山處皆有之燒青石為灰也又名石鍜有風化水化二種風化者取鍜了石置風中自解此為有力水化者以水沃之熱蒸而解其力差劣時珍曰今人作窑燒之一層柴或煤炭一層在下上累青石自下發火層層自焚而散入藥惟用風化不夾石者良氣味辛温有毒大明曰甘無毒獨孤滔曰伏雌黄硫黄硇砂去錫暈主治疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉本經療髓骨疽别録治瘑疥蝕惡肉止金瘡血甚良甄權生肌長肉止血白癜癧瘍瘢疵痔瘻癭贅疣子婦人粉刺産後隂不能合解酒酸治酒毒暖水臟治氣大明墮胎保昇散血定痛止水瀉血痢白帶白淫收脱肛隂挺消積聚結核貼口喎黑鬚髪時珍發明𢎞景曰石灰性至烈人以度酒飲之則腹痛下利古今多以搆塚用捍水而辟蟲故古塚中水洗諸瘡皆即瘥恭曰别録及今人用療金瘡止血大效若五月五日采蘩縷葛葉鹿活草槲葉􅆚藥地黄葉蒼耳葉青蒿葉合石灰搗為團如雞卵暴乾末以療瘡生肌大妙神驗權曰止金瘡血和雞子白敗舩茹甚良不入湯飲頌曰古方多用合百草團末治金瘡殊勝今醫家或以臘月黄牛膽汁捜和納入膽中風乾研用更勝草藥者古方以諸草雜石灰熬煎㸃􅂒痣黑子丹竈家亦用之時珍曰石灰止血神品也但不可着水着水即爛肉附方舊十四新三十二人落水死裹石灰納下部中水出盡即活千金方痰厥氣絶心頭尚温者千年石灰一合水一盞煎滚去清水再用一盞煎極滚澄清灌之少頃痰下自甦𤣥集方中風口喎新石灰醋炒調如泥塗之左塗右右塗左立便牽正冦氏衍義風牙腫痛二年石灰細辛等分研搽即止普濟方蟲牙作痛礦灰沙糖和塞孔中普濟方風蟲牙痛百年陳石灰為末四兩蜜三兩和勻鹽泥固濟火煅一日研末擦牙神效名神仙失笑散張三丰方乾霍亂病千年石灰沙糖水調服二錢或淡醋湯亦可名落盞湯摘𤣥方偏墜氣痛陳石灰炒五倍子山巵子等分為末麫和醋調敷之一夜即消醫方摘要婦人血氣方見獸部猪血下産後血渴不煩者新石灰一兩黄丹半錢渴時漿水調服一錢名桃花散張潔古活法機要白帶白淫風化石灰一兩白茯苓三兩為末和丸梧子大每服二三十丸空心米飲下絶妙集𤣥方水瀉不止方同上酒積下痢石灰五兩水和作團黄泥包煅一日夜去泥為末醋和丸梧子大每服三十丸薑湯空心下摘𤣥方血痢十年石灰三升熬黄水一斗投之澄清一服一升日三服崔知悌方虚冷脱肛石灰燒熱故帛裹坐冷即易之聖惠方産門不閉産後隂道不閉或隂脱出石灰一斗熬黄以水二斗投之澄清熏肘後方産門生合不開用銅錢磨利割開以陳石灰傅之即愈通變方腹脇積塊風化石灰半斤瓦器炒極熱入大黄末一兩炒紅取起入桂末半兩略燒入米醋和成膏攤絹上貼之内服消塊藥甚效丹溪心法瘧疾寒熱一日一發或三日一發古城石灰二錢頭垢五靈脂各一錢研末飯丸皂子大每服一丸五更無根水下即止集𤣥方老小暴嗽石灰一兩蛤粉四錢為末蒸餅丸豌豆大焙乾每服三十丸温虀汁下普濟方卒暴吐血石灰于刀頭上燒研井水下二錢普濟方髪落不止乃肺有勞熱瘙痒用石灰三升水拌炒焦酒三升浸之每服三合常令酒氣相接則新髪更生神驗千金方染髪烏鬚礦灰一兩水化開七日用鈆粉一兩研勻好醋調搽油紙包一夜先以皂角水洗淨乃用𤣥集方身面疣目苦酒浸石灰六七日取汁頻滴之自落千金方面黶疣痣水調礦灰一盞好糯米全者半插灰中半在灰外經宿水色變如水精先以針微撥動㸃少許于上經半日汁出剔去藥不得着水二日而愈也集𤣥方疣痣瘤贅石灰一兩用桑灰淋汁􅆈成膏刺破㸃之普濟方癰疽瘀肉石灰半斤蕎麥稭灰半斤淋汁煎成霜蜜封每以針畫破塗之自腐方普濟疔瘡惡腫石灰半夏等分為末傅之普濟方腦上癰癤石灰入飯内搗爛合之李樓竒方痰核紅腫寒熱狀如瘰癧石灰火煅為末以白果肉同搗貼之蜜調亦可統活人心痄􅾚腫痛醋調石灰傅之便簡方多年惡瘡多年石灰研末雞子清和成塊煅過再研薑汁調傅救急方瘻瘡不合古塚中石灰厚傅之千金方痔瘡有蟲古石灰川烏頭炮等分為末燒飯丸梧子大毎服二三十丸白湯下活法機要疥瘡有蟲石灰淋汁洗之數次孫真人方血風濕瘡千年陳石灰研搽痛即止瘡即愈神效蘭氏方火燄丹毒醋和石灰塗之或同青靛塗摘𤣥方卒發風􅇙醋漿和石灰塗之隨手滅元希聲侍郎秘方也外臺秘要夏月疿疱石灰煅一兩蛤粉二兩甘草一兩研撲之集𤣥方湯火傷灼年久石灰傅之或加油調肘後方杖瘡腫痛新石灰麻油調搽甚妙集簡方刀刃金瘡石灰裹之定痛止血又速愈瘡深不宜速合者入少滑石傅之肘後方誤吞金銀或錢在腹内不下石灰硫黄一皂子大同研為末酒調服之寳孫用和秘方馬汗入瘡石灰傅之摘𤣥方螻蛄咬人醋和石灰塗之惠聖方蚯蚓咬人其毒如大風眉鬚皆落以石灰水浸之良經驗方古墓中石灰名地龍骨主治頑瘡瘻瘡膿水淋漓歛諸瘡口棺下者尤佳時珍艌船油石灰名水龍骨主治金瘡跌撲傷損破皮出血及諸瘡瘻止血殺蟲時珍附方新三軟癤不愈爛舩底油石灰研末油調傅之胡氏方下體癬瘧艌船灰牛糞燒烟熏之一日一次即安醫方摘𤣥血風臁瘡船上舊油灰將泥作釡火煅過研末入輕粉少許苦茶洗淨傅之忌食發物邵真人經驗方石麫綱目集解時珍曰石麫不常生亦瑞物也或曰饑荒則生之虐𤣥宗天寳三戴武威畨禾縣醴泉涌出石化為麫貧民取食之憲宗元和四年山西雲蔚代三州山谷間石化為麫人取食之宋真宗祥符五年四月慈州民饑鄉寧縣山生石脂如麫可作餅餌仁宗嘉祐七年三月彭城地生麫五月鍾離縣地生麫哲宗元豐三年五月青州臨昫益都石皆化麫人取食之捜集於此以備食者考求云氣味甘平無毒主治益氣調中食之止饑時珍浮石日華校正併入拾遺水花釋名海石綱目水花集解時珍曰浮石乃江海間細沙水沫凝聚日久結成者狀如水沫及鍾乳石有細孔如蛀窠白色體虚而輕今皮作家用磨皮垢甚妙海中者味鹹入藥更良抱朴子曰燒泥為瓦燔木為炭水沫為浮石此皆去其柔脆變為堅剛也交州記云海中有浮石輕虚可以磨脚煮水飲之止渴即此也氣味鹹平無毒時珍曰大寒主治煮汁飲止渴治淋殺野獸毒大明止欬𢎞景去目瞖宗奭清金降火消積塊化老痰震亨消瘤癭結核疝氣下氣消瘡腫時珍發明藏器曰水花主逺行無水止渴和苦栝樓為丸每且服二十丸永無渴也震亨曰海石治老痰積塊鹹能軟堅也時珍曰浮石乃水沫結成色白而體輕其質玲瓏肺之象也氣味鹹寒潤下之用也故入肺除上焦痰熱止欬嗽而軟堅清其上源故又治諸淋按余琰席上腐談云肝屬木當浮而反沈肺屬金當沈而反浮何也肝實而肺虚也故石入水則沈而南海有浮水之石木入水則浮而南海有沈水之香虛實之反如此附方新十二欬嗽不止浮石末湯服或蜜丸服肘後方消渴引飲本事方浮石舶上青黛等分麝香少許為末温湯服一錢又方白浮石蛤粉蟬殻等分為末鯽魚膽汁七個調服三錢神效血淋砂淋小便濇痛用黄爛浮石為末每服三錢生甘草煎湯調服直指方石淋破血浮石滿一手為末以水三升酢一升和煮二升澄清每服一升傳信適用方小腸疝氣莖縮囊腫者直指方用浮石為末每服二錢木通赤茯苓麥門冬煎湯調下丹溪方用海石香附等分為末每服二錢薑汁調下頭核腦痺頭枕後生痰核正者為腦側者為痺用輕虚白浮石燒存性為末入輕粉少許麻油調掃塗之勿用手按即漲或加焙乾黄牛糞尤好亦治頭􅗢直指方底耳有膿海浮石一兩沒藥一錢麝香一字為末繳淨吹之普濟方疳瘡不愈海浮石燒紅醋淬數次二兩金銀花一兩為末每服二錢半水煎服病在上食後在下食前一年者半年愈儒門事親疔瘡發背白浮石半兩沒藥二錢半為末醋糊丸梧子大每服六七丸臨卧冷酒下普濟方諸般惡瘡方同上附録暈石拾遺藏器曰生海底狀如薑石紫褐色極𦂳似石是鹹水結成自然生暈味鹹寒無毒主石淋磨汁飲之亦燒赤投酒中飲石芝綱目集解葛洪曰芝有石木草菌肉五類各近百種道家有石芝圖石芝者石象芝也生于海隅名山島嶼之涯有積石處其狀如肉有頭尾四足如生物附於大石赤者如珊瑚白者如截肪黒者如澤漆青者如翠羽黄者如紫金皆光明洞徹大者十餘斤小者三四斤須齋祭取之搗末服其類有七明九光芝生臨水髙山石厓之間狀如盤盌不過徑尺有莖連綴之起三四寸有七孔者名七明九孔者名九光光皆如星百歩内夜見其光常以秋分伺之搗服方寸匕入口則噏然身熱五味甘美得盡一斤長生不老可以夜視也玉脂芝生于有玉之山玉膏流出千百年凝而成之有鳥獸之形色無常彩多似𤣥玉蒼玉及水精得而末之以無心草汁和之須㬰成水服至一升長生也石蜜芝生少室石户中有深谷不可過但望見石蜜從石户上入石偃葢中良久輙有一滴得服一升長生不老也石桂芝生石穴中有枝條似桂樹而實石也髙尺許光明而味辛時珍曰神仙之説渺茫不知有無然其所述之物則非無也貴州普定分司署内有假山山間有樹根幹枝條皆石而中有葉如榴裊裊茂翠開花似桂微黄嘉靖丁巳僉事焦希程賦詩紀之以比康子斷松化石之事而不知其名時珍按圖及抱朴子之説此乃石桂芝也海邊有石梅枝幹横斜石柏葉如側柏亦是石桂之類云主治諸芝搗末或化水服令人輕身長生不老葛洪本草綱目卷九
