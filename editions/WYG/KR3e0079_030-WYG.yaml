body:
  text: 本草綱目卷九明李時珍撰金石之三石類上三十二種丹砂本經上品釋名朱砂時珍曰丹乃石名其字從井中一㸃象丹在井中之形義出許慎説文後人以丹為朱色之名故呼朱砂集解别錄曰丹砂生符陵山谷采無時光色如雲母可拆者良作末名真朱𢎞景曰即今朱砂也俗醫别取武都仇池雄黄夾雌黄者名為丹砂用之謬矣符陵是涪州接巴郡南今無復采者乃出武陵西川諸蠻夷中皆通屬巴地故謂之巴砂仙經亦用越砂即出廣州臨漳者此二處並好惟須光明瑩徹為佳如雲母片者謂之雲母砂如樗蒱子紫石英形者謂之馬齒砂亦好如大小豆及大塊圓滑者謂之豆砂細末碎者謂之末砂此二種粗不入藥用但可畫用爾朱砂皆鑿坎入數丈許雖同出一郡縣亦有好惡地有水井勝火井也仙方煉餌最為長生之寳㳟曰丹砂大畧二種有土砂石砂其土砂復有塊砂末砂體並重而色黄黒不任畫用療瘡疥亦好但不入心腹之藥然可燒之出水銀乃多也其石砂有十數品最上者為光明砂云一顆别生一石龕内大者如雞卵小者如棗栗形似芙蓉破之如雲母光明照徹在龕中石臺上生得此者帶之辟惡為上其次或出石中或出水内形塊大者如拇指小者如杏仁光明無襍名馬牙砂一名無重砂入藥及畫俱善俗間亦少有之其磨􅓕新井别井水井火井芙蓉石末石堆豆末等砂形類頗相似入藥及畫當擇去其襍土石便可用矣别有越砂大者如拳小者如雞鴨卵形雖大其襍土石不如細而明凈者經言末之名真朱者謬矣豈有一物以全末殊名乎斆曰砂凡百等不可一一論有妙硫砂如拳許大或重一鎰有十四靣靣如鏡若遇隂沉天雨即鏡靣上有紅漿汁出有梅柏砂如梅子許大夜有光生照見一室有白庭砂如帝珠子許大面上有小星現有神座砂金座砂玉座砂不經丹竈服之而自延壽次有白金砂澄水砂隂成砂辰錦砂芙蓉砂鏡靣砂箭鏃砂曹末砂土砂金星砂平靣砂神末砂等不可一一細述也頌曰今出辰州宜州階州而辰砂為最生深山石崖間土人采之穴地數十丈始見其苗乃有石謂之朱砂牀砂生石上其大塊者如雞子小者如石榴子狀若芙蓉頭箭鏃連牀者紫黯若鐡色而光明瑩澈碎之嶄岩作墻壁又似雲母片可拆者真辰砂也無石者彌佳過此皆淘土石中得之非生於石牀者宜砂絶有大塊者碎之亦作墻壁但罕有類物狀而色亦深赤為用不及辰砂葢出土石間非白石牀所生也然近宜州鄰地春州融州皆有砂故其水盡赤每烟霧鬱蒸之氣亦赤黄色土人謂之朱砂氣尤能作瘴癘為人患也階砂又次之不堪入藥唯可畫色爾凡砂之絶好者為光明砂其次謂之顆塊其次謂之鹿簌其下謂之末砂惟光明砂入藥餘並不用宗奭曰丹砂今人謂之朱砂辰州砂多出蠻峒錦州界狤獠峒老鴉井其井深廣數十丈先聚薪于井焚之其青石壁迸裂處即有小龕龕中自有白石牀其石如玉牀上乃生砂小者如箭鏃大者如芙蓉光明可鑑研之鮮紅砂泊牀大者重七八兩至十兩晃州所出形如箭鏃帶石者得自土中非此比也承曰金州商州亦出一種砂色微黄作土氣陜西河東河北汴東汴西並以入藥長安蜀州研以代銀朱作漆器又信州近年出一種砂極有大者光芒墻壁畧類宜州所産然有砒氣破之多作生砒色若入藥用見火恐殺人今浙中市肆往往貨之不可不審時珍曰丹砂以辰錦者為最麻陽即古錦州地佳者為箭鏃砂結不實者為肺砂細者為末砂色紫不染紙者為舊坑砂為上品色鮮染紙者為新坑砂次之蘇頌陳承所謂階州金商州砂者乃陶𢎞景所謂武都雄黄非丹砂也范成大桂海志云本草以辰砂為上宜砂次之然宜州出砂處與湖北大牙山相連北為辰砂南為宜硃地脉不殊無甚分别老者亦出白石牀上蘇頌乃云宜砂出土石間非石牀所生是未識此也别有一種色紅質嫩者名土坑砂乃土石間者不甚耐火邕州亦有砂大者數十百兩作塊黑暗少墻壁不堪入藥唯以燒取水銀頌云融州亦有今融州無砂乃邕州之訛也臞仙庚辛玉冊云丹砂石以五溪山峒中産者得正南之氣為上麻陽諸山與五溪相接者次之雲南波斯西胡砂並光潔可用柳州一種砂全似辰砂唯塊圎如皂角子不入藥用商州黔州土丹砂宣信州砂皆内含毒氣及金銀銅鉛氣不可服張果丹砂要訣云丹砂者萬靈之主居之南方或赤龍以建號或朱鳥以為名上品生於辰錦二州石穴中品生於交桂下品生於衡邵名有數種清濁異體真偽不同辰錦上品砂生白石牀之上十二枚為一座色如未開蓮花光明耀日亦有九枚為一座七枚五枚者次之每座中有大者為主四圍小者為臣朝䕶四面雜砂一二斗抱之中有芙蓉頭成顆者亦入上品又有如馬牙光明者為上品白光若雲母為中品又有紫靈砂圓長似笋而紅紫為上品石片稜角生青光為下品交桂所出但是座上及打石得形似芙蓉頭靣光明者亦入上品顆粒而通明者為中品片段不明徹者為下品衡邵所出雖是紫砂得之砂石中者亦下品也有溪砂生溪州砂石之中土砂生土穴之中土石相雜故不入上品不可服餌唐李徳裕黄冶論云光明砂者天地自然之寳在石室之間生雪牀之上如初生芙蓉紅芭未拆細者環拱大者處中有辰居之象有君臣之位光明外徹采之者尋石脉而求此造化之所鑄也土宿真君曰丹砂受青陽之氣始生􅑭石二百年成丹砂而青女孕又二百年而成鉛又二百年成銀又二百年復得太和之氣化而為金故諸金皆不若丹砂金為上也修治斆曰凡修事朱砂靜室焚香齋沐後取砂以香水浴過拭乾碎搗之鉢中更研三伏時取一瓷鍋子每朱砂一兩同甘草二兩紫背天葵一鎰五方草一鎰着砂上以東流水煮三伏時勿令水闕去藥以東流水淘淨乾􅆈又研如粉用小瓷瓶入青芝草山鬚草半兩葢之下十斤火煆從已至午方歇候冷取出細研用如要服則以􅆈蜜丸細麻子大空腹服一丸時珍曰今法惟取好砂研末以流水飛三次用其末砂多雜石末鐡屑不堪入藥又法以絹袋盛砂用蕎麥灰淋汁煮三伏時取出流水浸洗過研粉飛晒用又丹砂以石膽消石和埋土中可化為水氣味甘微寒無毒普曰神農甘岐伯苦有毒扁鵲苦李當之大寒權曰有大毒大明曰凉微毒之才曰惡慈石畏鹹水忌一切血時珍曰丹砂别錄云無毒岐伯甄權言有毒似相矛盾按何孟春餘冬録云丹砂性寒而無毒入火則熱而有毒能殺人物性逐火而變此説是也丹砂之畏慈石鹹水者水克火也斆曰鐡遇神砂如泥似粉土宿真君曰丹砂用隂地厥地骨皮車前草馬鞭草皂莢石韋决明瞿麥南星白附子烏頭三角酸藕荷桑椹地榆紫河車地丁皆可伏制而金公以砂為子有相生之道可變化主治身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神明不老能化為汞本經通血脉止煩滿消渴益精神悦澤人面除中惡腹痛毒氣疥瘻諸瘡輕身神仙别録鎮心主尸疰抽風甄權潤心肺治瘡痂息肉并塗之大明治驚癎解胎毒痘毒驅邪􅒻能發汗時珍發明保昇曰朱砂法火色赤而主心杲曰丹砂純隂納浮溜之火而安神明凡心熱者非此不能除好古曰乃心經血分主藥主命門有餘青霞子曰丹砂外包八石内含金精稟氣於甲受氣於丙出胎見壬結塊成庚増光歸戊隂陽升降各本其原自然不死若以氣衰血敗體竭骨枯八石之功稍能添益若欲長生久視保命安神須餌丹砂且丹石見火悉成灰燼丹砂伏火化為黄銀能重能輕能神能靈能黒能白能暗能明一斛人擎力難升舉萬斤遇火輕速上騰鬼神尋求莫知所在時珍曰丹砂生於炎方秉離火之氣而成體陽而性隂故外顯丹色而内含真汞其氣不熱而寒離中有隂也其味不苦而甘火中有土也是以同逺志龍骨之類則養心氣同當歸丹參之類則養心血同枸把地黄之類則養腎同厚朴川椒之類則養脾同南星川烏之類則袪風可以明目可以安胎可以觧毒可以發汗隨佐使而見功無所往而不可夏子益竒疾方云凡人自覺本形作兩人並行並卧不辨真假者離魂病也用辰砂人參茯苓濃煎日飲真者氣􅐩假者化也類編云錢丕少卿夜多惡夢通宵不寐自慮非吉遇鄧州推官胡用之曰昔常如此有道士敎戴辰砂如箭鏃者渉旬即驗四五年不復有夢因觧髻中一絳囊遺之即夕無夢神魂安靜道書謂丹砂辟惡安魂觀此二事可徴矣抱朴子曰臨沅縣廖氏家世世夀考後徙去子孫多夭折他人居其故宅復多夀考疑其井水赤乃掘之得古人埋丹砂數十斛也飲此水而得夀况錬服者乎頌曰鄭康成註周禮以丹砂石膽雄黄礬石慈石為五毒古人惟以攻瘡瘍而本經以丹砂為無毒故多錬治服食鮮有不為藥患者豈五毒之説勝乎當以為戒宗奭曰朱砂鎮養心神但宜生使若鍊服少有不作疾者一醫疾服伏火者數粒一旦大熱數夕而斃沈存中云表兄李勝鍊朱砂為丹嵗餘沐浴再入鼎誤遺一塊其徒丸服之遂發懵冐一夕而斃夫生硃砂初生小兒便可服因火力所變遂能殺人不可不謹陳文中曰小兒初生便服朱砂輕粉白蜜黄連水欲下胎毒此皆傷脾敗陽之藥輕粉下痰損心朱砂下涎損神兒實者服之軟弱弱者服之易傷變生諸病也時珍曰葉石林避暑録載林彦振謝任伯皆服伏火丹砂俱病腦疽死張杲醫説載張慤服食丹砂病中消數年發鬢疽而死皆可為服丹之戒而周宻野語載臨川周推官平生孱弱多服丹砂烏附藥晚年發背疽醫悉歸罪丹石服解毒藥不効􅅑醫老祝胗脉曰此乃極隂證正當多服伏火丹砂及三建湯乃用小劑試之復作大劑三日後用膏敷貼半月而瘡平凡服三建湯一百五十服此又與前諸説異葢人之臟腑稟受萬殊在智者辨其隂陽脉證不以先入為主非妙入精微者不能企此附方舊八新二十六服食丹砂三皇真人鍊丹方丹砂一斤研末重篩以醇酒沃之如泥狀盛以銅盤置髙閣上勿令婦人見燥則復以酒沃令如泥隂雨疾風則藏之書酒三斗乃暴之三百日當紫色齋戒沐浴七日靜室飯丸麻子大常以平旦向日吞三丸一月三蟲出半年諸病瘥一年鬚髪黑三年神人至太上𤣥變經小神丹方真丹末三斤白蜜六斤攪合日曝至可丸丸麻子大每旦服十丸一年白髪反黑齒落更生身體潤澤老翁成少抱朴子内編明目輕身去三尸除瘡癩美酒五升浸朱砂五兩五宿日乾研末蜜丸小豆大每服二十丸白湯下久服見效衞生易簡方神注丹方白茯苓四兩糯米酒煮軟竹刀切片隂乾為末入朱砂末二錢以乳香水打糊丸梧子大朱砂末二錢為衣陽日二丸隂日一丸要秘精新汲水下要逆氣過精温酒下並空心王好古醫壘元戎烏髭變白小雌雞二隻只與烏麻油一件同水飼之放卵時收取先放者打竅以朱砂末填入糊定同衆卵抱出雞取出其藥自然結實研粉蒸餅和丸緑豆大每酒下五七丸不惟變白亦且愈疾張潞方小兒初生六日解胎毒温腸胃壯氣血朱砂豆大細研蜜一棗大調與吮之一日令盡姚和衆至寳方預解痘毒初發時或未出時以朱砂末半錢蜜水調服多者可少少者可無重者可輕也丹溪方初生兒驚月内驚風欲死朱硃磨新汲水塗五心最驗方斗門小兒驚熱夜卧多啼朱砂半兩牛黄一分為末每服一字犀角磨水調下普濟方急驚搐搦丹砂半兩天南星一個一兩重者炮裂酒浸大蠍三個為末每服一字薄荷湯下錄聖濟驚忤不語打撲驚忤血入心竅不能言語朱砂為末以雄猪心血和丸麻子大每棗湯下七丸直指方客忤卒死真丹方寸匕蜜三合和灌之肘後方癲癎狂亂歸神丹治一切驚憂思慮多忘及一切心氣不足癲癎狂亂豶豬心二個切入大朱砂二兩燈心三兩在内麻扎石器煮一伏時取砂為末以伏神末二兩酒打薄糊丸梧子大每服九丸至十五丸至二十五丸麥門冬湯下甚者乳香人參湯下百一選方産後癲狂敗血及邪氣入心如見祟物顛狂用大辰砂一二錢研細飛過用飲兒乳汁三四茶匙調濕以紫項地龍一條入藥滚三滚刮淨去地龍不用入無灰酒一盞分作三四次服何氏方心虛遺精豬心一個批片相連以飛過朱硃末摻入線縳白水煮熟食之唐珤經驗方離魂異病方見發明夜多惡夢方見發明男婦心痛朱砂明礬枯等分為末沸湯調服摘𤣥方心腹宿癥及卒得癥朱砂研細捜飯以雄雞一隻餓二日以飯飼之收糞曝燥為末温酒服方寸匕日三服服盡更作愈乃止外臺秘要霍亂轉筋身冷心下微温者朱砂研二兩蠟三兩和丸著火籠中熏之周圍厚覆勿令烟洩兼牀下著火令腹微煖良久當汗出而甦外臺秘要辟瘴正陽丹砂三兩水飛每服半錢温蜜湯下普濟録傷寒發汗外臺秘要治傷寒時氣瘟疫頭痛壮熱脉盛始得一二日者取真丹一兩水一斗煮一升頓服覆被取汗忌生血物肘後用真丹末酒調遍身塗之向火坐得汗愈辟禳瘟疫上品朱砂一兩細研蜜和丸麻子大常以太嵗日平旦一家大小勿食諸物向東各吞三七丸勿令近齒永無瘟疫外臺諸般吐血朱砂蛤粉等分為末酒服二錢又方丹砂半兩金箔四片蚯蚓三條同硏丸小豆大每冷酒下二丸聖濟録妊婦胎動朱砂末一錢和雞子白三枚攪匀頓服胎死即出未死即安普濟方子死腹中不出朱砂一兩水煮數沸為末酒服立出十全博救方目生障瞖生辰砂一塊日日擦之自退王居雲病此用之如故普濟方目膜息肉丹砂一兩五月五日研匀銅器中以水漿一盞浸七日暴乾銅刀刮下再研瓶收每㸃少許眥上聖濟録目生弩肉及珠管真丹貝母等分為末㸃注日三四度肘後方面上皯􅍍雞子一枚去黄朱砂末一兩入雞子内封固入白伏雌下抱至雛出取塗面即去不過五度面白如玉此乃陳朝張貴妃常用方出西王母枕中方外臺秘要沙蜂叮螫朱砂末水塗之摘𤣥方木蛭瘡毒南方多雨有物曰木蛭大類􅈹涕生於古木之上聞人氣則閃閃而動人過其下墮人體間即立成瘡久則遍體惟以朱砂麝香塗之即愈張杲醫説産後舌出不收丹砂傅之暗擲盆盎作墮地聲驚之即自收集簡方水銀本經中品釋名汞别録澒汞同靈液綱目姹女藥性時珍曰其狀如水似銀故名水銀澒者流動貌方術家以水銀和牛羊豕三脂杵成膏以通草為炷照於有金寳處即知金銀銅鐡鈆玉龜蛇妖怪故謂之靈液頌曰廣雅水銀謂之澒丹竈家名汞其字亦通用爾集解别録曰水銀生符陵平土出於丹砂𢎞景曰今水銀有生熟此云生符陵平土者是出朱砂腹中亦有别出沙地者青白色最勝出於丹砂者是今燒粗末朱砂所得色小白濁不及生者甚能消化金銀使成泥人以鍍物是也燒時飛着釡上灰名汞粉俗呼為水銀灰最能去風恭曰水銀出於朱砂皆因熱氣未聞朱砂腹中自出之者火燒飛取人皆解法南人蒸取之得水銀雖少而朱砂不損但色少變黑爾頌曰今出秦州啇州道州邵武軍而秦州乃来自西羗界經云出於丹砂者乃是山石中采粗次朱砂作爐置砂於中下承以水上覆以盆器外加火煆養則烟飛於上水銀溜於下其色小白濁陶氏言别出沙地者青白色今不聞有此西羗人亦云如此燒取但其山中所生極多至於一山自拆裂人采得砂石皆大塊如升斗碎之乃可燒煆故西來水銀極多於南方者又取草汞法用細葉馬齒莧乾之十斤得水銀八兩或十兩先以槐木槌之向日東作架曬之三二日即乾如經年久燒存性盛入瓦甕内封口埋土坑中四十九日取出自成矣時珍曰汞出於砂為真汞雷斆言有草汞陶𢎞景言有沙地汞淮南子言弱土之氣生白礜石礜石生白澒蘇頌言陶説者不聞有之按陳霆墨談云拂林國當日沒之處地有水銀海周圍四五十里國人取之近海十里許掘坑井數十乃使健夫駿馬皆貼金箔行近海邊日照金光晃耀則水銀滚沸如潮而來其勢若粘裹其人即回馬疾馳水銀隨赶若行緩則人馬俱撲滅也人馬行速則水銀勢逺力微遇坑塹而溜積於中然後取之用香草同煎則成花銀此與中國所産不同按此説似與陶氏沙地所出相合又與陳藏器言人服水銀病拘孿但炙金物熨之則水銀必出蝕金之説相符葢外畨多丹砂其液自流為水銀不獨鍊砂取出信矣胡演丹藥秘訣云取砂汞法用瓷瓶盛朱砂不拘多少以紙封口香湯煮一伏時取入氷火鼎内炭塞口鐡盤葢定鑿地一孔放盌一個盛水連盤覆鼎於盌上鹽泥固縫周圍加火煆之待冷取出汞自流入盌矣邕州溪峒燒取極易以百兩為一銚銚之制似豬脬外糊厚紙數重貯之即不走漏若撒失在地但以川椒末或茶末收之或以真金及鍮石引之即上嘉謨曰取去汞之砂殻名天流可㸃化修治斆曰凡使勿用莗汞并舊朱漆中者經别藥制過者在尸中過者半生半死者其朱砂中水銀色微紅收得後用葫蘆貯之免遺失若先以紫背天葵并夜交藤自然汁二味同煮一伏時其毒自退若修十兩二汁合七鎰氣味辛寒有毒權曰有大毒大明曰無毒之才曰畏慈石砒霜宗奭曰水銀得鈆則凝得硫則結併棗肉研則散别法煆為膩粉粉霜唾研之死虱銅得之則明灌尸中則後腐以金銀銅鐡置其上則浮得紫河車則伏得川椒則收可以勾金可以涌泉匱葢藉死水銀之氣也土宿真君曰荷葉松葉松脂榖精草萱草金星草瓦松夏枯草忍冬莨菪子鴈來紅馬蹄香獨脚蓮水慈姑皆能制汞主治疹瘻痂瘍白秃殺皮膚中蝨墮胎除熱殺金銀銅錫毒鎔化還復為丹久服神仙不死本經以傅男子隂隂消無氣别錄利水道去熱毒藏器主天行熱疾除風安神鎮心治惡瘡瘑疥殺蟲催生下死胎大明治小兒驚熱涎潮宗奭鎮墜痰逆嘔吐反胃時珍發明𢎞景曰還復為丹事出仙經酒和日暴服之長生權曰水銀有大毒朱砂中液也乃還丹之元母神仙不死之藥能伏錬五金為泥抱朴子曰丹砂燒之成水銀積變又還成丹砂其去凡草木逺矣故能令人長生金汞在九竅則死人為之不朽况服食乎藏器曰水銀入耳能食人腦至盡入肉令百節攣縮倒隂絶陽人患瘡疥多以水銀塗之性滑重直入肉宜謹之頭瘡切不可用恐入經絡必緩筋骨百藥不治也宗奭曰水銀入藥雖各有法極須審謹有毒故也婦人多服絶娠今有水銀燒成丹砂醫人不曉誤用不可不謹唐韓愈云太學士李干遇方士栁泌能燒水銀為不死藥以鈆滿一鼎按中為空實以水銀葢封四際蟯為丹砂服之下血四年病益急乃死余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記耳聞者不説今直取目見親與之逰而以藥敗者六七公以為世誡工部尚書歸登自説服水銀得病有若燒鐡杖自顛貫其下摧而為火射竅節以出狂痛呼號泣絶其裀席得水銀發且止唾血十數年以斃殿中御史李虚中疽發其背死刑部尚書李遜謂余曰我為藥誤遂死刑部侍郎李建一旦無病死工部尚書孟簡邀我於萬州屏人曰我得秘藥不可獨不死今遺子一器可用棗肉為丸服之别一年而病後有人至訊之曰前所服藥誤方且下之下則平矣病二嵗卒東川節度御史大夫盧坦溺血肉痛不可忍乞死金吾將軍李道古以栁泌得罪食泌藥五十死海上此皆可為戒者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰强食今惑者皆曰五榖令人夭三牲皆殺人當務減節一筵一饌禁忌十之二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始動曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已時珍曰水銀乃至隂之精稟沉着之性得凡火煆煉則飛騰靈變得人氣熏蒸則入骨鑽筋絶陽蝕腦隂毒之物無似之者而大明言其無毒本經言其久服神仙甄權言其還丹元母抱朴子以為長生之藥六朝以下貪生者服食致成廢篤而䘮厥軀不知若干人矣方士固不足道本草其可妄言哉水銀但不可服食爾而其治病之功不可掩也同黑鈆結砂則鎮墜痰涎同硫黄結砂則極救危病此乃應變之兵在用者能得肯綮而執其樞機焉餘見鈆白霜及靈砂下附方舊五新二十四初生不乳咽中有噤物如麻豆許用水銀米粒大與之下咽即愈聖惠方小兒癎疾能壓一一切熱水銀小豆許安盞中沉湯内煮食頃與服勿仰兒頭恐入腦也方聖濟急驚墜涎水銀半兩生南星一兩麝香半分為末入石腦油同搗和丸緑豆大每服一丸薄荷湯下失心風疾水銀一兩藕節八個研成砂子丸如芡子大每服二丸磨刀水下一二服經驗方精魅鬼病水銀一兩漿水一升炭火煎減三分取水銀一豆許神符裏吞之晚又服一二日止廣濟方反胃吐食水不能停黑鈆水銀各一錢半結砂舶硫黄五錢官桂一錢為末每服六錢一半米湯一半自然薑汁調作一處服聖濟録消渴煩熱水銀一兩鈆一兩結砂皂筴一挺酥炙麝香一錢為末每服半錢白湯下聖濟録膽熱衂衊血上妄行水銀朱砂麝香等分為末每服半錢新汲水下宣明方血汗不止方同上妊婦胎動母欲死子尚在以此下之水銀朱砂各半兩研膏以牛膝半兩水五大盞煎汁入蜜調服半匙聖惠方婦人難産水銀二兩先煮後服立出梅師方胎死腹中其母欲死水銀二兩吞之立出梅師方婦人斷産水銀以麻油煎一日空心服棗大一丸永斷不損人婦人良方觧金銀毒水銀一兩服之即出千金方誤吞金銀及鐶子釵子以汞半兩吞之再服即出聖惠方百蟲入耳水銀豆許傾入耳中以耳向下撃銅物數聲即出能食人腦非急切勿用聖濟録頭上生蝨水銀和蠟燭油揩之一夜皆死摘𤣥方腋下胡臭水銀胡粉等分以面脂和頻摻之千金方少年靣皰水銀胡粉等分研臘豬脂和夜塗旦拭勿見水三度瘥肘後方老小口瘡水銀一分黄連六分水二升煮五合含之日十次方普濟白癜風痒水銀數拭之即消千金方蟲癬瘙痒水銀胡粉等分研傅之又水銀蕪荑和酥傅外臺秘要痔蟲作痒水銀棗膏各二兩同研綿裹納下部明日蟲出梅師方惡肉毒瘡一女年十四腕軟處生物如黄豆大半在肉中紅紫色痛甚諸藥不效一方士以水銀四兩白紙二張揉熟蘸銀擦之三日自落而愈李樓怪證方一切惡瘡水銀黄連胡粉熬黄各一兩研匀傅之乾則以唾調肘後方楊梅毒瘡水銀黑鈆各一錢結砂黄丹一錢乳香沒藥各五分為末以紙卷作小撚染油㸃燈日照瘡三次七日見效方廣附餘用水銀黑鈆結砂銀朱各二錢白花蛇一錢為末作紙撚七條頭日用三條自後日用一條香油㸃燈於爐中放被内熏之勿透風頭上有瘡連頭葢之丹一方水銀一錢二分黒鈆白錫各八分共結砂黄四分朱砂六分為末分作十二紙撚以香油浸燈盞内㸃于小桶中以被圍病人坐之以􅈹細細吸烟三日後口出惡物為效痘後生瞖水銀一錢虢丹五錢研作六丸坩鍋糊定火煆一日取出薄綿裹之左醫塞右耳右瞖塞左耳自然墜下危氏方水銀粉宋嘉祐釋名汞粉輕粉拾遺峭粉日華膩粉時珍曰輕言其質峭言其狀膩言其性昔蕭史與秦穆公錬飛雲丹第一轉乃輕粉即此修治時珍曰升錬輕粉法用水銀一兩白礬二兩食鹽一兩同研不見星鋪於鐡器内以小烏盆覆之篩竈灰鹽水和封固盆口以炭升二炷香取開則粉升於盆上矣其白如雪輕盈可愛一兩汞可升粉八錢又法水銀一兩皂礬七錢白鹽五錢同研如上升錬又法先以皂礬四兩鹽一兩焰消五錢共炒黄為麴水銀一兩又麴二兩白礬一錢研匀如上升錬海客論云諸礬不與水銀相合而緑礬和鹽能制水銀成粉何也葢水銀者金之魂魄緑礬者鐡之精華二氣同根是以暫制成粉無鹽則色不白氣味辛冷無毒大明曰畏慈石石黄忌一切血本出于丹砂故也時珍曰温燥有毒升也浮也黄連土茯苓陳醬黒鈆鐡漿可制其毒主治通大腸轉小兒疳痺瘰癧殺瘡疥癬蟲及􅈹上酒皶風瘡瘙痒藏器治痰涎積滯水腫鼔脹毒瘡時珍發明宗奭曰水銀粉下膈涎并小兒涎潮瘛藥多用然不可常服及過多多則損人若兼驚則危須審之葢驚為心氣不足不可下下之裏虚驚氣入心不可治其人本虚更須禁此慎之至也劉完素曰銀粉能傷牙齒蓋上下齒齦屬手足陽明之經毒氣感於腸胃而精神氣血水榖既不勝其毒則毒即循經上行而至齒齦嫩薄之分為審也時珍曰水銀乃至隂毒物因火煆丹砂而出加以鹽礬鍊而為輕粉加以硫黄升而為銀朱輕飛靈變化純隂為燥烈其性走而不守善刼痰涎消積滯故水腫風痰濕熱毒瘡被刼涎從齒齦而出邪鬰為之暫開而疾因之亦愈若服之過劑或不得法則毒氣被蒸竄入經絡筋骨莫之能出痰涎既去血液耗亡筋失所養營衞不從變為筋攣骨痛發為癰腫疳漏或手足􅀈裂蟲癬頑痺經年累月遂成廢痼其害無窮觀丹客升錬水銀輕粉鼎器稍失固濟鐡石撼透况人之筋骨皮肉乎陳文中言輕粉下痰而損心氣小兒不可輕用傷脾敗陽必變他證初生尤宜慎之而演山氏謂小兒在胎受母飲食熱毒之氣畜在胷膈故生下個個發驚宜三日之内與黄連去熱膩粉散毒又與人參朱砂蜜湯解清心肺積毒既化兒可免此患二説不同各有所見一謂無胎毒者不可輕服一謂有胎毒者宜預解之用者宜審附方舊三新三十二小兒初生浴湯中入鹽少許拭乾以膩粉少許摩其身既不畏風又散諸氣鑑全㓜心初生鎖肚證由胎中熱毒結於肛門兒生之後閉而不通三日者急令婦人咂兒前後心手足心并臍七處四五次以輕粉半錢蜜少許温水化開時時與少許以通為度全㓜心鑑小兒涎喘服藥不退者用無雄雞子一個取清入輕粉抄十錢拌和銀器盛置湯瓶上蒸熟三嵗兒盡食當吐痰或泄而愈氣實者乃可用演山活㓜口議㓜兒哯乳不止服此立效膩粉一錢鹽䜴七粒去皮研匀丸麻子大每服三丸藿香湯下活㓜口議小兒喫泥及䑋肚用膩粉一分沙糖和丸麻子大空心米飲湯下一丸良久泄出泥土瘥經驗方大小便閉脹悶欲死二三日則殺人膩粉一錢生麻油一合相和空心服聖惠方大便壅結膩粉半錢沙糖一彈丸研丸梧子大每服五丸臨卧温水下普又方膩粉二錢黄丹一錢為末毎米飲服一錢濟方血痢腹痛膩粉五錢定粉三錢同研水浸蒸餅心少許和丸緑豆大毎服七丸或十丸艾一枚水一盞煎湯下秘寳方消中嗜食多因外傷脾熱内積憂思啖食醎物及麫致脾胃乾燥飲食倍常不生肌肉大便反堅小便無度輕粉一錢為末薑汁拌匀長流水下齒浮是效後服豬肚丸補之效危氏得方一切虚風不二散用膩粉一兩湯煮五度如麻脚慢火焙乾麝香半兩細研每服一字温水調下孫用和秘寳方水氣腫滿汞粉一錢烏雞子去黄盛粉蒸餅包蒸熟取出苦葶藶炒一錢同蒸餅杵丸緑豆大每車前湯下三五丸日三服神效醫壘元戎痘瘡生瞖輕粉黄丹等分為末左目患吹右耳右目吹左耳即退王氏痘疹方女人面脂太真紅玉膏輕粉滑石杏仁去皮等分為末蒸過入腦麝少許以雞子清調匀洗面畢傅之旬日後色如紅玉事閨閤宜抓破面皮生薑自然汁調輕粉末搽之更無痕迹救急方牙齒疼痛輕粉一錢大蒜一瓣杵餅安膈骨前陷中先以銅錢隔了用蜆殻葢定扎住一宿愈左疼安右右疼安左方摘𤣥風蟲牙疳膿血有蟲輕粉一錢黄連一兩為末摻之普濟方小兒耳爛輕粉棗子灰等分研油調傅摘𤣥方底耳腫痛汁水不絶輕粉一錢麝香一分為末摻之方簡便爛弦風眼膩粉末口津和㸃大眥日二三次聖惠方小兒頭瘡蔥汁調膩粉塗之末又方雞子黄炒出油入麻油及膩粉傅之集簡方小兒生癬豬脂和輕粉抹之直指方牛皮惡癬五更食炙牛肉一片少刻以輕粉半錢温酒調下直指方楊梅瘡癬嶺南衞生方用汞粉大風子肉等分為末塗之即愈醫方摘𤣥用輕粉二錢杏仁四十二個去皮洗瘡拭乾搽之不過三次即愈乾則以鵞膽汁調楊梅毒瘡醫學統㫖用輕粉一錢雄黄丹砂各二錢半槐花炒龜版炙各一兩為末糊丸梧子大每服一錢冷茶下日二服七日愈二楊誠經驗方用輕粉胡桃仁槐花炒研紅棗肉各錢搗丸分作三服初日雞湯下二日酒下三日茶下三日服盡五日瘡乾七日痂落定一方用豶豬腎一對去膜批開各摻輕粉一錢北麻油二錢􅨘熟頓食不破口腫牙仍服金銀花藥紙一方用大雞卵一個去黄留白入輕粉一錢攪匀糊飯上蒸熟食下疳隂瘡輕粉末乾摻之即結靨而愈萬表積善堂方臁瘡不合以虀汁温洗拭乾用蔥汁調輕粉傅之縳一方輕粉五分黄蠟一兩以粉摻紙上以蠟鋪之在瘡上黄水出即愈永類方癰疽惡瘡楊梅諸瘡水銀一兩朱砂雄黄各二錢半白礬緑礬各二兩半研匀罐盛燈盞蓋定鹽泥固濟文武火鍊升罐口掃收每以三錢入乳香沒藥各五分洒太乙膏上貼之絶效名曰五寳霜粉霜綱目釋名水銀霜白雪綱目白靈砂時珍曰以汞粉轉升成霜故曰粉霜抱朴子云白雪粉霜也以海鹵為匱葢以土鼎勿洩精華七日乃成要足陽氣勿為隂侵惟薑藕地丁河車可以煉之㸃化在仙為𤣥壺在人為精原在丹為木精在造化為白雪在天為甘露修治時珍曰升鍊法用真汞粉一兩入瓦罐内令匀以燈盞仰蓋罐口鹽泥塗縫先以小炭火鋪罐底四圍以水濕紙不住手在燈盞内擦勿令間斷逐漸加火至罐頸住火冷定取出即成霜如白蠟按外臺秘要載古方崔氏造水銀霜法云用水銀十兩石硫黄十兩各以一鐺􅆈之良久銀熱黄消急傾入一鐺少緩即不相入仍急攪之良久硫成灰銀不見乃下伏龍肝末十兩鹽末一兩攪之别以鹽末鋪鐺底一分入藥在上又以鹽末葢靣一分以瓦盆覆之鹽土和泥塗縫炭火煆一伏時先文後武開盆刷下凡一轉後分舊土為四分以一分和霜入鹽末二兩如前法飛之訖又以土一分鹽末二兩和飛如前凡四轉土盡更用新土如此七轉乃成霜用之此法後人罕知故附于此云氣味辛温有毒時珍曰畏蕎麥稈炭硫黄主治下痰涎消積滯利水與輕粉同功時珍發明元素曰粉霜輕粉亦能潔凈府去膀胱中垢膩既毒而損齒宜少用之時珍曰其功過與輕粉同附方新六小兒急驚搐搦涎盛粉霜二錢白牽牛炒輕粉各一錢為末每服一字薄荷湯下吐涎為效全嬰方小兒燥渴粉霜一字大兒半錢蓮花湯調下冬月用蓮肉保㓜大全風熱驚狂神白丹治傷寒積熱及風生驚搐或如狂病諸藥不効粉霜一兩以白麫六錢和作餅子炙熟同研輕粉半兩鈆白霜二錢半為末滴水丸梧子大每服十丸至十五丸米飲下宣明方癍疹生瞖粉霜八分朱砂一錢為末水調少許傾入耳内鴻飛集腋下胡臭粉霜水銀等分以面脂和塗之聖濟録楊梅惡瘡粉霜一味搽之集簡方銀朱綱目釋名猩紅紫粉霜時珍曰昔人謂水銀出於丹砂鎔化還復為朱者即此也亦名由此集解時珍曰胡演丹藥秘訣云开錬銀朱用石亭脂二斤新鍋内鎔化次下水銀一斤炒作青砂頭炒不見星研末罐盛石版蓋住鐡線縳定鹽泥固濟大火煆之待冷取出貼罐者為銀朱貼口者為丹砂今人多以黄丹及礬紅雜之其色黄黯宜辨之真者謂之水華朱每水銀一斤燒朱一十四兩八分次朱三兩五錢氣味辛温有毒主治破積滯刼痰涎散結胸療疥癬惡瘡殺蟲及虱功同粉霜時珍發明時珍曰銀朱乃硫黄同汞升錬而成其性燥烈亦能爛齦攣筋其功過與輕粉同也今厨人往往以之染色供饌宜去之附方新十二小兒肉釣多啼銀朱半錢乳香煨蒜各一錢為末研九黍米大半嵗五丸薄荷湯下心鑑男女隂毒銀朱輕粉各一錢用五日獨蒜一枚搗和作餅貼手心男左女右兩手合定放隂下頃間氣回汗出即愈但口中微有氣即活唐瑶經驗方痰氣結胸鶴頂丹不問隂陽虚實炒過陷胸瀉心等藥用銀朱半兩明礬一兩同碾以熨斗盛火瓦盞盛藥鎔化急刮搓丸每服一錢真茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀朱破積故也㓜曽世榮活全書正水腫病大便利者銀朱半兩硫黄煆四兩為末麫糊丸梧子大每飲下三十丸普濟方咽喉疼痛銀朱海螵蛸末等分吹之取涎急救方火焰丹毒銀朱調雞子清塗之李樓怪症方湯火灼傷銀朱研細菜油調傅二次愈多能鄙事疽瘡發背銀朱白礬等分煎湯温洗却用桑柴火逺逺炙之日三次甚効救急方魚臍丁瘡四面赤中央黑銀朱水和丸每服一丸温酒下名走馬丹普濟方楊梅毒瘡銀朱官香等分為末以紙卷作撚㸃燈置桶中以鼻吸烟一日一作七日愈又方銀朱二錢孩兒茶一錢龍掛香一錢皂角子一錢為末如上法用收又方銀朱輕粉各一錢黄蠟清油各一兩化開和以油紙攤貼瘡痂自脱也筋骨疼痛猩紅三錢枯礬四錢為末作三紙撚每旦以一撚蘸油㸃火熏臍被覆卧之取汗纂要竒方日久頑瘡不收者銀朱一錢千年地下石灰五分松香五錢香油一兩為末化攤紙上貼之應急良方臁瘡不歛方同上血風臁瘡生脚股上乃濕毒成風也黄蠟一兩鎔化入銀朱一兩攪攤紙上刺孔貼之簡便方黄水濕瘡銀朱鹽梅和搗傅之集𤣥方癬瘡有蟲銀朱牛骨髓桐油調搽醫方摘要頭上生虱銀朱浸醋日日梳頭頭包銀朱紙以盌覆燒之茶清洗下烟子揉之包一夜至旦虱盡死積徳堂方靈砂證類釋名二氣砂慎微曰茅亭客話載以靈砂餌胡孫鸚䳇鼠犬等變其心輙㑹人言丹之通為靈者時珍曰此以至陽勾至隂脱隂反陽故曰靈砂修治慎微曰靈砂用水銀一兩硫黄六銖細研炒作青砂頭後入水火既濟爐抽之如束鍼紋者成就也時珍曰按胡寅丹藥秘訣云升靈砂法用新鍋安逍遥爐上蜜揩鍋底文火下燒入硫黄二兩鎔化投水銀半斤以鐡匙急攪作青砂頭如有焰起噴醋解之待汞不見星取出細研盛入水火鼎内鹽泥固濟下以自然火升之乾水十二盞為度取出如束鍼紋者成矣庚辛玉冊云靈砂者至神之物也硫汞制而成形謂之丹基奪天地造化之功竊隂陽不測之妙可以變化五行錬成九還其未升鼎者謂之青金丹頭已升鼎者乃曰靈砂靈砂有三以一伏時周天火而成者謂之金鼎靈砂以九度抽添用周天火而成者謂之九轉靈砂以地數三十日炒煉而成者謂之醫家老火靈砂並宜桑灰淋醋煮伏過用乃良氣味甘温無毒主治五臟百病養神安魂魄益氣明目通血脉止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈慎微主上盛下虚痰涎壅盛頭旋吐逆霍亂反胃心腹冷痛升降隂陽既濟水火調和五臟輔助元氣研末糯糊為丸棗湯服最能鎮墜神丹也時珍發明時珍曰硫黄陽精也水銀隂精也以之相配夫婦之道純隂純陽二體合璧故能奪造化之妙而升降隂陽既濟水火為扶危拯急之神丹但不可久服爾蘇東坡言此藥治久患反胃及一切吐逆小兒驚吐其效如神有配合隂陽之妙故也時珍常以隂陽水送之尤妙附方新七伏熱吐瀉隂陽丸用硫黄半兩水銀一錢研墨薑汁糊丸小豆大三嵗三丸冷水下大人三四十丸鄭氏小兒方諸般吐逆方同上霍亂吐逆不問虚實冷熱二氣散一名青金丹用水銀硫黄等分研不見星每服一字至半錢生薑湯調下錢氏小兒方脾疼反胃靈砂一兩蚌粉一兩同炒赤丁香胡椒各四十九粒為末自然薑汁煮半夏粉糊丸梧子大每薑湯下二十丸普濟方冷氣心痛靈砂三分五靈脂一分為末稀糊丸麻子大每服二十丸食前石菖蒲生薑湯下直指方九竅出血因暴驚而得其脉虛者靈砂三十粒人參湯下三服愈此證不可錯認作血得熱則流妄用凉藥誤事楊仁齋直指方養正丹又名交泰丹乃寳林真人谷伯陽方也却邪輔正助陽接真治元氣虧虚隂邪交蕩上盛下虛氣不升降呼吸不足頭旋氣短心怯膽悸虚煩狂言盗汗腹痛腰痛反胃吐食霍亂轉筋欬逆又治中風涎潮不省人事陽氣欲脱四肢厥冷傷寒隂盛自汗唇青脉沉婦人産後月候不匀帶下腹痛用黑盞一隻入黑鈆鎔汁次下水銀次下朱砂末炒不見星少頃乃下硫黄末急攪有焰洒醋解之取出研末糯粉煮糊丸録豆大每服二十丸鹽湯下四味皆等分此藥升降隂陽既濟心腎神效不可具述和濟局方雄黄本經中品釋名黄金石本經石黄唐本熏黄普曰雄黄生山之陽是丹之雄所以名雄黄也恭曰出石門者名石黄亦是雄黄而通名黄金石石門者為劣爾惡者名熏黄止用熏瘡疥故名之藏器曰今人敲取石黄中精明者為雄黄外黑者為熏黄雄黄燒之不臭熏黄燒之則臭以此分别權曰雄黄金之苗也故南方近金冶處時有之但不及西來者真好爾宗奭曰非金苗也有金窟處無雄黄時珍曰雄黄入㸃化黄金用故名黄金石非金苗也集解别錄曰雄黄生武都山谷燉煌山之陽采無時𢎞景曰武都氐羗也是為仇池宕昌亦有之小劣燉煌在凉州西數千里近來紛擾皆用石門始興石黄之好者耳凉州黄好者作雞冠色不臭而堅實其黯黑及虚軟者不好也恭曰宕昌武都者為佳塊方數寸明徹如雞冠或以為枕服之辟惡其青黑堅者不入藥用貞觀年中以宕州新出有得方數尺者但重脆不可全致之耳禹錫曰水經注云黄水出零陵縣西北連巫山溪出雄黄頗有神異常以冬月祭祀鑿石深數丈方采得之故溪水取名焉又抱朴子云雄黄當得武都山中出者純而無雜其赤如雞冠光明曄曄者乃可用其但純黄似雌黄色無光者不任作仙藥可合理病藥耳頌曰今階州即古武都山中有之形塊如丹砂明徹不夾石其色如雞冠者真有青黑色而堅者名熏黄有形色似真而氣臭者名臭黄並不入服食只可療瘡疥其臭以醋洗之便去足以亂真尤宜辨又階州接西戎界出一種水窟雄黄生于山岩中有水流處其石名青烟石白鮮石雄黄出其中其塊大者如胡桃小者如栗豆上有孔竅其色深紅而微紫體極輕虚而功用更勝丹竈家尤貴重之時珍曰武都水窟雄黄北人以充丹砂但研細色帶黄爾丹房鑑源云雄黄千年化為黄金武都者上西番次之鐡色者上雞冠次之以沉水銀脚鐡抺上拭了旋有黄衣生者為真一云驗之可以㶸蟲死者為真細嚼口中含湯不臭辣者次之斆曰凡使勿用臭黄氣臭黑雄黄色如烏雞頭夾膩黄一重黄一重石並不堪用真雄黄並鷓鴣鳥肝色者為上修治斆曰每雄黄三兩以甘草紫背天葵地膽碧稜花各五兩細剉東流水入坩鍋中煮三伏時漉出搗如粉水飛澄去黒者晒乾再研用其内有刼鐡石又號赴矢黄能刼于鐡並不入藥用思邈曰凡服食用武都雄黄須油煎九日九夜乃可入藥不爾有毒慎勿生用時珍曰一法用米醋入蘿蔔汁煮乾用良抱朴子曰餌法或以蒸煮或以消石化為水或以豬脂裹蒸之于赤土下或以松脂和之或以三物鍊之如布白如水服之令人長生除百病殺三蟲伏火者可㸃銅成金變銀成金氣味苦平寒有毒别錄曰甘大温權曰辛有大毒大明曰微毒土宿真君曰南星地黄蒿苣五加皮紫河車地榆五葉藤黄岑白芷當歸地錦鵞腸草雞腸草苦參鵞不食草圓桑蝟脂皆可制雄黄主治寒熱鼠瘻惡瘡疽痔死􅡌殺精物惡鬼邪氣百蟲毒勝五兵鍊食之輕身神仙本經療疥蟲􅉶瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺諸蛇虺毒解藜蘆毒悦澤人靣餌服之者皆飛入腦中勝鬼神延年益壽保中不饑得銅可作金别録主疥癬風邪癲癎嵐瘴一切蟲獸傷大明搜肝氣瀉肝風消涎積好古治瘧疾寒熱伏暑泄痢酒飲成癖驚癎頭風眩運化腹中瘀血殺勞蟲疳蟲時珍發明權曰雄黄能殺百毒辟百邪殺蟲毒人佩之鬼神不敢近入山林虎狼伏渉川水毒物不敢傷抱朴子曰帶雄黄入山林即不畏蛇若蛇中人以少許傅之登時愈吳楚之地暑濕鬰蒸多毒蟲及射工沙虱之類但以雄黄大蒜等分合搗一丸佩之或已中者塗之亦良宗奭曰焚之蛇皆逺去治蛇咬方見五靈脂下唐書云甄立言究習方書為太常丞有尼年六十餘患心痛鼓脹身體羸瘦已二年立言胗之曰腹内有蟲當是誤食髪而然令餌雄黄一劑須臾吐出一蛇如拇指無目燒之猶有髪氣乃愈又明皇雜録云有黄門奉使交廣回太醫周顧曰此人腹中有蛟龍上驚問黄門有疾否曰臣馳馬大庾嶺熱困且渴遂飲澗水竟腹中堅痞如石周遂以消石雄黄煮服之立吐一物長數寸大如指視之鱗甲皆具此皆殺蠱毒之驗也頌曰雄黄治瘡瘍尚矣周禮􅅑醫療􅅑以五毒攻之鄭康成注云今醫方有五毒之藥作之合黄堥置石膽丹砂雄黄礬石慈石其中燒之三日三夜其烟上着雞羽掃取以注瘡惡肉破骨則盡出也楊億筆記載楊嵎少時有瘍生於頰連齒輔車外腫若覆甌内潰出膿血痛楚難忍百療彌年不瘥人令依鄭法燒藥注之少頃朽骨連牙潰出遂愈信古方攻病之速也黄堥音武即今有蓋瓦合也時珍曰五毒蘗范注東陽方變為飛黄散治緩疽惡瘡蝕惡肉其法取瓦盆一個安雌黄于中丹砂居南慈石居北曽青居東白石英居西礜石居上石膏次之鍾乳居下雄黄覆之雲母布于下各二兩末以一盆葢之羊毛泥固濟作三隅竈以陳葦燒一日取其飛黄用之夫雄黄乃治瘡殺毒要藥也而入肝經氣分故肝風肝氣驚癎痰涎頭痛眩運暑瘧泄痢積聚諸病用之有殊功又能化血為