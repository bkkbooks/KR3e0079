body:
  text: 本草綱目卷十八上明李時珍撰草之七蔓草類二十四種附二種菟絲子本經上品釋名菟縷别錄菟虆别錄菟蘆本經菟丘廣雅赤綱别錄玉女爾雅唐蒙爾雅火燄草綱目野狐絲綱目金線草禹錫曰按吕氏春秋云或謂菟絲無根也其根不屬地茯苓是也抱朴子云菟絲之草下有伏菟之根無此菟則絲不得生于上然實不屬也伏菟抽則兔絲死又云菟絲初生之根其形以兔握故割其血以和丹服立能變化則菟絲之名因此也𢎞景曰舊言下有茯苓上有菟絲不必爾也頌曰抱朴所説今未見豈别一類乎孫炎釋爾雅云唐也蒙也女蘿也菟絲也一物四名而本草唐蒙為一名詩云蔦與女蘿毛萇云女蘿菟絲也而本草菟絲無女蘿之名惟松蘿一名女蘿豈二物皆是寄生同名而本草脱漏乎震亨曰菟絲未嘗與茯苓共類女蘿附松而生不相關涉皆承訛而言也時珍曰毛詩注女蘿即兔絲吳普本草兔絲一名松蘿陸佃言在木為女蘿在草為兔絲二物殊别皆由爾雅釋詩誤以為一物故也張楫廣雅云菟丘兔絲也女蘿松蘿也陸璣詩疏言兔絲蔓草上黄赤如金松蘿蔓松上生枝正青無雜蔓者皆得之詳見木部松蘿下又兔絲茯苓説見茯苓下集解别錄曰菟絲子生朝鮮川澤田野蔓延草木之上九月采實暴乾色黄而細者為赤綱色淺而大者為菟虆功用並同𢎞景曰田野墟落中甚多皆浮生藍紵麻蒿上其實仙經俗方並以為補藥須酒浸一宿用宜丸不宜煮大明曰苗莖似黄絲無根株多附田中草被纒死或生一葉開花結子不分明子如碎黍米粒八月九月以前采之頌曰今近道亦有之以寃句者為勝夏生苗初如細絲遍地不能自起得他草梗則纒繞而生其根漸絶於地而寄空中或云無根假氣而生信然時珍曰按寧獻王庚辛玉册云火燄草即菟絲子陽草也多生荒園古道其子入地初生有根及長延草物其根自斷無葉有花白色微紅香亦襲人結實如粃豆而細色黄生于梗上尤佳惟懷孟林中多有之入藥更良子修治斆曰凡使勿用天碧草子眞相似只是味酸濇并粘也菟絲采得去殻了用苦酒浸二日漉出以黄精自然汁相對浸一宿至明用微火煎至乾入臼中燒熱鐵杵一去三千餘杵成粉用之時珍曰凡用以温水淘去沙泥酒浸一宿曝乾搗之不盡者再浸曝搗須臾悉細又法酒浸四五日蒸曝四五次研作餅焙乾再研末或云曝乾乾時入紙條數枚同搗即刻成粉且省力也氣味辛甘平無毒之才曰得酒良薯蕷松枝為之使惡雚菌主治續絶傷補不足益氣力肥健人本經養肌强隂堅筋骨主莖中寒精自出溺有餘瀝口苦躁渴寒血為積久服明目輕身延年别録治男女虚冷添精益髓去腰疼膝冷消渇熱中久服去面䵟悦顔色甄權補五勞七傷治鬼交泄精尿血潤心肺大明補肝臟風虚好古發明斆曰菟絲子稟中和凝正陽之氣一莖從樹感枝而成從中春上陽結實故偏補人衛氣助人筋脈頌曰抱朴子仙方單服法取實一斗酒一斗浸曝乾再浸又曝令酒盡乃止搗篩每酒服二錢日二服此藥治腰膝去風兼能明目久服令人光澤老變為少十日外飲啖如湯沃雪也附方舊六新五消渴不止菟絲子煎汁任意飯之以止為度事林廣記陽氣虛損簡便方用菟絲子熟地黄等分為末酒糊丸梧子大每服五十丸氣虚人參湯下氣逆沉香湯下經驗方用菟絲子酒浸十日水淘杜仲焙研蜜灸一兩以薯蕷末酒煮糊丸梧子大每空心酒下五十丸白濁遺精茯菟丸治思慮太過心腎虚損眞陽不固漸有遺瀝小便白濁夢寐頻泄菟絲子五兩白茯苓三兩石蓮肉二兩為末酒糊丸梧子大每服三五十丸空心鹽湯下和劑局方小便淋瀝菟絲子煮汁飲范汪方小便赤濁心腎不足精少血燥口乾煩熱頭運怔忡菟絲子麥門冬等分為末蜜丸梧子大鹽湯每下七十丸腰膝疼痛或頑麻無力菟絲子洗一兩牛膝一兩同入銀器内酒浸一寸五分暴為末將原酒煮糊丸梧子大每空心酒服三二十丸經驗方肝傷目暗菟絲子三兩酒浸三日暴乾為末雞子白和丸梧子大空心温酒下二十丸聖惠方身面卒腫洪大用菟絲子一升酒五升漬二三宿每飲一升日三服不消再造肘后方婦人横生菟絲子末酒服二錢一加車前子等分聖惠方睂錬癬瘡菟絲子炒研油調傅之山居四要穀道赤痛菟絲子熬黄黒為末雞子白和塗之肘后方痔如蟲咬方同上苗氣味甘平無毒玉册云汁伏三黄硫汞結草砂主治研汁塗面去面䵟本經挼碎煎湯浴小兒療熱肺𢎞景附方舊二新一面瘡粉刺菟絲子苗絞汁塗之不過三上肘后方小兒頭瘡菟絲苗煮湯頻洗之子母秘錄目中赤痛野狐漿草搗汁㸃之聖惠方附錄難火蘭拾遺藏器曰味酸温無毒主冷氣風痺開胃下食去腹脹久服明目生巴中胡國狀似菟絲子而微長五味子本經上品釋名荎藸爾雅音知除𤣥及别錄會及恭曰五味皮肉甘酸核中辛苦都有鹹味此則五味其也本經但云味酸當以木為五行之先也集解别録曰五味子生齊山山谷及代郡八月采實隂乾𢎞景曰今第一出髙麗多肉而酸甜次出青州冀州味過酸其核並似豬腎又有建平者少肉核形不相似味苦亦良此藥多膏潤烈日暴之乃可搗篩恭曰蔓生木上其葉似杏而大子作房如落葵大如蘡子出蒲州及藍田山中今河中府嵗貢之保昇曰蔓生莖赤色花黄白子生青熟紫亦具五色味甘者佳頌曰今河東陜西州郡尤多杭越間亦有之春初生苗引赤蔓於髙木其長六七尺葉尖圓似杏葉三四月開黄白花類蓮花狀七月成實叢生莖端如豌豆許大生青熟紅紫入藥主曝不去子今有數種大抵相近雷斆言小顆皮皺泡者有白樸鹽霜一重其味酸鹹苦辛甘皆全者為眞也時珍曰五味今有南北之分南産者色紅北産者色黑入滋補藥必用北産者乃良亦可取根種之當年就旺若二月種子次年乃旺須以架引之修治斆曰凡用以銅刀劈作兩片用蜜浸蒸從已至申却以漿浸一宿焙乾用時珍曰入補藥熟用入𠻳藥生用氣味酸温無毒好古曰味酸微苦鹹味厚氣輕隂中微陽入手太隂血分足少隂氣分時珍曰酸鹹入肝而補腎辛苦入心而補肺甘入中宫益脾胃之才曰蓯蓉為之使惡萎㽔勝烏頭主治益氣欬逆上氣勞傷羸瘦補不足强隂益男子精本經養五臟除熱生隂中肌别錄治中下氣止嘔逆補虚勞令人體悦澤甄權明目暖水臟壯筋骨治風消食反胃霍亂轉筋痃癖奔豚冷氣消水腫心腹氣脹止渴除煩熱解酒毒大明生津止渴治瀉痢補元氣不足收耗散之氣瞳子散大李杲治喘欬燥𠻳壯水鎭陽好古發明成無己曰肺欲收急食酸以收之以酸補之芍藥五味之酸以收逆氣而安肺杲曰收肺氣補氣不足升也酸以收逆氣肺寒氣迎則宜此與乾薑同治之又五味子收肺氣乃火熱必用之藥故治𠻳以之為君但有外邪者不可驟用恐閉其邪氣必先發散而後用之乃良有痰者以半夏為佐喘者阿膠為佐但分兩少不同耳宗奭曰令華州以西至秦多産之方紅熟時彼人采得蒸爛研濾汁熬成稀膏量酸甘入蜜煉勻待冷收器中肺虚寒人作湯時時飲之作果可以寄逺本經言其性温今食之多致虛熱小兒益甚藥性論謂其除熱氣日華子謂其暖水臟除煩熱後學至此多惑今旣用治肺虚寒則更不取其除熱之説震亨曰五味大能收肺氣宜其有補腎之功收肺氣非除熱乎補腎非暖水臟乎乃火熱𠻳必用之藥寇氏所謂食之多致虚熱者葢收補之驟也何惑之有又黄昏𠻳乃火氣浮入肺中不宜用涼藥宜五味子倍子斂而降之思邈曰五六月宜常服五味子湯以益肺金之氣在上則滋源在下則補腎其法以五味子一大合木臼搗細甕瓶中以百沸湯投之入少蜜封置火邊良久湯成任飲元素曰孫真人千金月令言五月常服五味以補五臟之氣遇夏月季夏之間困乏無力無氣以動與黄茋麥門冬少加生黄蘗煎湯服之使人精神頓加兩足筋力涌出也葢五味子之酸輔人參能瀉丙火而補庚金收斂耗散之氣好古曰張仲景八味丸用此補腎亦兼述類象形也璣曰五味治喘𠻳須分南北生津止渴潤肺補腎勞𠻳宜用北者風寒在肺宜用南者愼微曰抱朴子云五味者五行之精其子有五味淮南公羡門子服之十六年面色如玉女入水不霑入火不灼附方新一十一久嗽肺脹五味二兩粟殻白餳炒過半兩為末白餳丸彈子大每服一丸水煎服方衛生家寳久欬不止丹溪方用五味子五錢甘草一錢半五倍子風化消各二錢為末乾噙草攝生方用五味子一兩真茶四錢晒研為末以甘五錢煎膏丸綠豆大每服三十丸沸湯下數日即愈也痰嗽并喘五味子白礬等分為末每服三錢以生猪肺灸熟蘸末細嚼白湯下漢陽庫兵黄六病此百藥不效於岳陽遇一道人傳此兩服病遂不發普濟方陽事不起新五味子一斤為末酒服方寸匕日三服忌猪魚蒜醋盡一劑即得力百日以上可御十女四時勿絶藥功能知千金方腎虚遺精北五味子一斤洗淨水浸挼去核再以水洗核取盡餘味通置砂鍋中布濾過入好冬蜜二斤炭火慢熬成膏瓶收五日出火性每空心服一二茶匙百滚湯下劉公石保夀堂方腎虚白濁及兩脅并背脊穿痛五味子一兩炒赤為末醋湖丸梧子大每醋湯下三十丸經驗良方五更腎泄凡人每至五更即溏泄一二次經年不止者名曰腎泄葢隂盛而然脾惡濕濕則濡而困困則不能治水水性下流則腎水不足用五味子以强腎水養五臟吳茱萸以除脾濕則泄自止矣五味去梗二兩茱萸湯泡七次五錢同炒香為末每旦陳米飲服二錢許叔微本事方女人隂冷五味子四兩為末以口中玉泉和丸兔矢大頻納隂中取效近效方爛弦風眼五味子蔓荆子煎湯頻洗之談野翁種子方赤遊風丹漸漸腫大五味子焙研熱酒服服一合自消神效保幼大全蓬蘽音累品本經上校正自果部移入此釋名覆盆别錄陵蘽别錄隂蘽别錄寒苺會編割田藨音苞時珍曰蓬蘽與覆盆同類故别錄謂一名覆盆此種生于丘陵之間藤葉繁衍蓬蓬累累異於覆盆故曰蓬蘽陵蘽即藤也其實八月始熟俚人名割田藨集解别錄曰蓬蘽生荆山平澤及寃句𢎞景曰蓬蘽是根名方家不用乃昌容所服以易顔者也覆盆是實名李當之云是人所食苺子以津汁為味其核微細今藥中用覆盆小異未詳孰是恭曰覆盆蓬蘽乃一物異名本謂實非根也李云苺子者近之矣然生處不同沃地則子大而甘瘠地則子細而酸此乃子有酸味根無酸味陶以根酸子甘列入果部重出二條殊為孟浪志曰蓬蘽乃覆盆之苗莖覆盆乃蓬蘽之子也按切韻苺音茂其子覆盆也蘽者藤也則蓬蘽明是藤蔓矣陶言蓬蘽是根蘇言是子一物異名皆非矣頌曰蓬蘽是覆盆苗處處有之秦吳尤多苗短不過尺莖葉皆有刺花白子赤黄如半彈丸大而下有蒂承之如柿蒂小兒多食之五月采實其苗葉采無時江南謂之苺然其地所生差晚三月始有苗八九月花開十月實用則同士良曰今觀采取之家説蓬蘽似蠶苺子紅色而大其味酸甘葉似野薔薇有刺覆盆子小其苗各别諸家本草不識故皆説蓬蘽是覆盆子之根大明曰苺子是蓬蘽子也樹苺是覆盆子也宗奭曰蓬蘽非覆盆也别是一種雖枯敗而枝梗不散今人不見用此藏器曰其類有三種惟四月熟狀如覆盆而味甘美者為是覆盆子餘不堪入藥璣曰蓬蘽徽人謂之寒苺沿塹作叢蔓生莖小葉密多刺其實四五十顆作一朶一朶大如盞而霜後始紅蘇頌圖經以此註覆盆誤矣江南覆盆亦四五月熟何嘗差晚耶覆盆莖粗葉疎結實大而疎散不似寒苺莖細葉密結實小而成朶一則夏熟一則秋熟豈得同哉時珍曰此類凡五種予嘗親采以爾雅所列者校之始得其的諸家所説皆未可信也一種藤蔓繁衍莖有倒刺逐節生葉葉大如掌狀類小葵葉面青背白厚而有毛六七月開小白花就蒂結實三四十顆成簇生則青黄熟則紫黯微有黒毛狀如熟椹而扁冬月苗葉不凋者俗名割田藨即本草所謂蓬蘽也一種蔓小於蓬蘽亦有鈎刺一枝五葉葉小而面背皆青光薄而無毛開白花四五月實成子亦小於蓬蘽而稀疎生則青黄熟則烏赤冬月苗凋者俗名插田藨即本草所謂覆盆子爾雅所謂茥缺盆也此二者俱可入藥一種蔓小於蓬蘽一枝三葉葉面青背淡白而微有毛開小白花四月實熟其色紅如櫻桃者俗名􅘥田藨即爾雅所謂藨者也故郭璞註云藨即苺也子似覆盆而大赤色酢甜可食此種不入藥用一種樹生者樹髙四五尺葉似櫻桃葉而狹長四月開小白花結實與覆盆子一様但色紅為異俗亦名藨即爾雅所謂山苺陳藏器本草所謂懸鈎子者也詳見本條一種就地生蔓長數寸開黄花結實如覆盆而鮮紅不可食者本草所謂蛇苺也見本條如此辨析則蓬蘽覆盆自定矣李當之陳士良陳藏器寇宗奭汪璣五説近是而欠明悉陶𢎞景以蓬蘽為根覆盆為子馬志蘇頌以蓬蘽為苗覆盆為子蘇恭以為一物大明以樹生者為覆盆皆臆説不可據氣味酸平無毒别錄曰鹹士良曰甘酸微熱主治安五臟益精氣長隂令人堅强志倍力有子久服輕身不老本經療暴中風身熱大驚别錄益顔色長髮耐寒濕恭發明見覆盆子下附方新一長髮不落蓬蘽子榨油日塗之聖惠方苗葉同覆盆覆盆子别錄上品校正自果部移入此釋名茥爾雅音奎缺盆爾雅西國草圖經畢楞伽圖經大麥莓音母插田藨音苞烏藨子綱目當之曰子似覆盆之形故名之宗奭曰益腎臟縮小便服之當覆其溺器如此取名也時珍曰五月子熟其色烏赤故俗名烏藨大麥苺插田藨亦曰栽秧藨甄權本草一名馬瘻一名陸荆殊無義意集解别錄曰五月采藏器曰佛說蘇密那花㸃燈正言此花也此花有三種以四月熟狀如覆盆味甘美者為是餘不堪入藥今人取茅苺當覆盆誤矣宗奭曰處處有之秦州永興華州尤多長條四五月紅熟山中人及時采來賣其味酸甘外如荔枝大如櫻桃軟紅可愛失時則就枝生蛆食之多熱收時五六分熟便可采烈日曝乾今人取汁作煎為果采時著水則不堪煎時珍曰蓬蘽子以八九月熟故謂之割田藨覆盆以四五月熟故謂之插田藨正與别錄五月采相合二藨熟時色皆烏赤故能補腎其四五月熟而色紅者乃􅘥田藨也不入藥用陳氏所謂以茅苺當覆盆者葢指此也正誤詵曰覆盆江東名懸鈎子大小形狀氣味功力同北土無懸鈎南地無覆盆是土地有前後生非兩種物也時珍曰南土覆盆極多懸鈎是樹生覆盆是藤生子狀雖同而覆盆色烏赤懸鈎色紅赤功亦不同今正之修治詵曰覆盆子五月采之烈日曝乾不爾易爛雷曰凡使用東流水淘去黄葉并皮蒂取子以酒拌蒸一宿以東流水淘兩遍又晒乾方用時珍曰采得搗作薄餅晒乾密貯臨時以酒拌蒸尤妙氣味甘平無毒權曰甘辛微熱主治益氣輕身令髮不白别錄補虚續絶强隂健陽悦澤肌膚安和五臟温中益力療癆損風虚補肝明目竝宜擣篩每旦水服三錢志男子腎精虚竭隂痿能令堅長女子食之有子權食之令人好顔色榨汁塗髮不白藏器益腎臟縮小便取汁同少蜜煎為稀膏點服治肺氣虚寒宗奭發明時珍曰覆盆蓬蘂功用大抵相近雖是二物其實一類而二種也一早熟一晚熟兼用無妨其補益與桑椹同功若樹苺則不可混采者也附方新一陽事不起覆盆子酒浸焙研為末每旦酒服三錢集簡方葉氣味微酸鹹平無毒主治挼絞取汁摘目中去膚赤出蟲如絲線藏器明目止淚收濕氣時珍發明頌曰按崔元亮海上集驗方治目暗不見物冷淚浸淫不止及青盲天行目暗等疾取西國草一名畢楞伽一名覆盆子日曝乾搗極細以薄綿裹之用飲男乳汁浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒麵油物時珍曰按洪邁夷堅志云潭州趙太尉母病爛弦疳眼二十年有老嫗云此中有蟲吾當除之入山取草蔓葉咀嚼留汁入筒中還以皂紗蒙眼滴汁潰下弦轉盻間蟲從紗上出數日下弦乾復如法滴上弦又得蟲數十而愈後以治人多驗乃覆盆子葉也葢治眼妙品附方新二牙疼點眼用覆盆子嫩葉搗汁點目眥三四次有蟲隨眵淚出成塊也無新葉乾者煎濃汁亦可即大麥苺也摘𤣥方臁瘡潰爛覆盆葉為末用酸漿水洗後糝之日一次以愈為度直指方根主治痘後目瞖取根洗擣澄粉日乾蜜和少許點於瞖丁上日二三次自散百日内治之久即難療時珍口活幼議懸鈎子拾遺校正自果部移入此釋名沿鈎子日用葥爾雅音箭山苺爾雅木苺郭璞樹苺日華藏器曰莖上有刺如懸鈎故名集解藏器曰生江淮林澤間莖上有刺其子如苺子酸美人多食之璣曰樹苺枝梗柔軟有刺頗類金櫻四五月結實如覆盆子采之擎蒂而中實味酸覆盆則蒂脱而中虚味甘為異時珍曰懸鈎樹生髙四五尺其莖白色有倒刺其葉有細齒青色無毛背後淡青頗似櫻桃葉而狹長又似地棠花葉四月開小白花結實色紅今人亦通呼為藨子爾雅云葥山苺也郭璞注云今之木苺也實似藨苺而大可食孟詵大明並以此為覆盆誤矣氣味酸平無毒主治醒酒止渴除痰去酒毒藏器搗汁服解射工沙虱毒時珍葉主治燒研水服主㗋中塞藏器根皮氣味苦平無毒主治子死腹中不下破血婦人赤帶下久患赤白痢膿血腹痛殺蟲毒卒下血並濃煮汁飲之藏器附方新二血崩不止木苺根四兩酒一盌煎七分空心温服臞仙乾坤生意崩中痢下治婦人崩中及下痢日夜數十起欲死者以此入腹即活懸鈎根薔薇根柿根菝葜各一斛剉入釡中水淹上四五寸煮減三之一去滓取汁煎至可丸丸梧子大每温酒服十丸日三服千金翼蛇苺别錄下品釋名蛇藨音苞地苺會編蠶苺璣曰近地而生故曰地苺瑞曰蠶老時熟紅于地其中空者為蠶苺中實極紅者為蛇殘苺人不噉之恐有蛇殘也集解𢎞景曰蛇苺園野多有之子赤色極似苺子而不堪啖亦無以此為藥者保昇曰所在有之生下濕地莖頭三葉花黄子赤儼若覆盆子根似敗醬四月五月采子二月八月采根宗奭曰田野道旁處處有之附地生葉如覆盆子但光潔而小微有皺紋花黄比蒺藜花差大春末夏初結紅子如荔枝色璣曰蛇苺莖長不盈尺莖端惟結實一顆小而光潔誤食脹人非若覆盆苗長大而結實數顆微有黒毛也時珍曰此物就地引細蔓節節生根每枝三葉葉有齒刻四五月開小黄花五出結實鮮紅狀似覆盆而面與蒂則不同也其根甚細本草用汁當是取其莖葉并根也仇逺稗史訛作蛇繆草言有五葉七葉者天言俗𫝊食之能殺人亦不然止發冷涎耳汁氣味甘酸大寒有毒主治胸腹大熱不止别錄傷寒大熱及溪毒射工毒甚良𢎞景通月經協瘡腫傅蛇傷大明主孩子口噤以汁灌之孟詵傅湯火傷痛即止時珍附方舊二新一口中生瘡天行熱甚者蛇苺自然汁半升稍稍嚥之傷寒類要傷寒下䘌生瘡以蛇苺汁服二合日三服仍水漬烏梅令濃入崖蜜飲之肘后方水中毒病蛇苺根搗末服之并導下部亦可飲汁一二升夏月欲入水先以少末投中流更無所畏又辟射工家中以器貯水浴身亦宜投少許肘后使君子宋開寳釋名留求子志曰俗傳潘州郭使君療小兒多是獨用此物後醫家因號為使君子也時珍曰按嵇含南方草木狀謂之留求子療嬰孺之疾則自魏晉已用但名異耳集解志曰生交廣等州形如巵子稜瓣深而兩頭尖似訶梨勒而輕頌曰今嶺南州郡皆有之生山野中及水岸其莖作藤如手指大其葉如兩指頭長二寸三月生花淡紅色久乃深紅有五瓣七八月結子如拇指大長一寸許大類巵子而有五稜其殻青黑色内有仁白色七月采之宗奭曰其仁味如椰子醫家亦兼用殻時珍曰原出海南交趾今閩之紹武蜀之眉州皆栽種之亦易生其藤如葛繞樹而上葉青如五加葉五月開花一簇一二十葩紅色輕盈如海棠其實長寸許五瓣合成有稜先時半黄老則紫黑其中仁長如榧仁色味如栗久則油黑不可用氣味甘温無毒主治小兒五疳小便白濁殺蟲療瀉痢開寶健脾胃除虛熱治小兒百病瘡癬時珍發明時珍曰凡殺蟲藥多是苦辛惟使君子榧子甘而殺蟲亦異也凡大人小兒有蟲病但每月上旬侵晨空腹食使君子仁數枚或以殻煎湯嚥下次日蟲皆死而出也或云七生七煨食亦良忌飲熱茶犯之即瀉此物味甘氣温旣能殺蟲兼益脾胃所以能斂虚熱而止瀉痢為小兒諸病要藥俗醫乃謂殺蟲至盡無以消食鄙俚之言也木有蠧屋有蟻國有盗福耶禍耶修養者先去三蟲可類推矣附方新六小兒脾疳使君子盧㑹等分為末米飲每服一錢儒門事親小兒痞塊腹大肌瘦面黄漸成疳疾使君子仁三錢木鼈子仁五錢為末水丸龍眼大毎以一丸用雞子一箇破頂入藥在内飯上蒸熟空心食之楊起簡便單方小兒蛔痛口流涎末使君子仁為末米飲五更調服一錢全幼心鑑小兒虚腫頭面隂囊俱浮用使君子一兩去殻蜜五錢灸盡為末每食後米湯服一錢簡便方頭􅖟面瘡使君子仁以香油少許浸三五個臨臥時細嚼香油送下久久自愈普濟方蟲牙疼痛使君子煎湯頻潄集簡方木鼈子宋開寶校正自木部移入此釋名木蟹志曰其核似鼈蟹狀故以為名集解志曰出朗州及南中七八月采實頌曰今湖廣諸州及杭越全岳州皆有之春生苗作藤生葉有五椏狀如山藥青色面光四月生黄花六月結實似栝樓而極大生青熟紅黄色肉上有軟刺每一實有核三四十枚其狀扁而如鼈八九月采之嶺南人取嫩實及苗葉作茹蒸食宗奭曰木鼈子蔓歲一枯但根不死春旋生苗葉如蒲萄其子一頭尖者為雄凡植時須雌雄相合麻纒定及其生也則去雄者方結實時珍曰木鼈核形扁礧砢大如圍碁子其仁青綠色入藥去油者仁氣味甘溫無毒時珍曰苦微甘有小毒主治折傷消結腫惡瘡生肌止腰痛除粉刺䵟􅍍婦人乳癰肛門腫痛開寶醋磨消腫毒大明治疳積痞塊利大腸瀉痢痔瘤瘰癧時珍發明璣曰按劉績霏雪錄云木鼈子有毒不可食昔薊門有人生二子恣食成痞其父得一方以木鼈子煮豬肉食之其幼子當夜長子明日死友人馬文誠方書亦載此方因著此為戒時珍曰南人取其苗及嫩實食之無恙則其毒未應至此或者與豬肉不相得或犯他物而然不可盡咎木鼈也附方舊一新十九酒疸脾黄木鼈子磨醋服一二盞見利效劉長春濟急方脚氣腫痛木鼈子仁毎個作兩邊麩炒過切碎再炒去油盡為度每兩入厚桂半兩為末熱酒服二錢令醉得汗愈夢祕授方也永類方濕瘡脚腫行履難者木鼈子四兩去皮甘遂半兩為末以猪腰子一箇去膜切片用藥四錢在中濕紙包煨熟空心米飲送下服後便申兩脚如大便行者只喫白粥二三日為妙楊珙醫方摘要隂疝偏墜痛甚者木鼈子一箇磨醋調黄蘗芙蓉末傅之即愈壽域神方久瘧有母木鼈子穿山甲炮等分為末每服三錢空心溫酒下醫方摘要腹中痞塊木鼈子仁五兩用豶豬腰子二副批開入在内簽定煨熟同搗爛入黄連三錢末蒸餅和丸綠豆大每白湯下三十丸醫方集成小兒疳疾木鼈子仁使君子仁等分搗泥米飲丸芥子大每服五分米飲下一二日服孫天仁集效方疳病目矇不見物用木鼈子仁二錢胡黄連一錢為末米糊丸龍眼大入雞子内蒸熟連雞子食之為妙同上倒睫拳毛因風入脾經致使風庠不住手擦日久赤爛拳毛入内將木鼈子仁槌爛以絲帛包作條左患塞右鼻右患塞左鼻其毛自分上下次服蟬蜕藥為妙孫天仁集效方肺虚久嗽木鼈子欵冬花各一兩為末每用三錢焚之吸烟良久吐涎以茶潤㗋如此五六次後服補肺藥一方用木鼈子一箇雄黄一錢聖濟錄小兒鹹􅀈大木鼈子三四箇磨水飲以雪糕壓下即吐出痰重者三服效𤣥摘方水瀉不止木鼈仁五箇母丁香五箇麝香一分研末米湯調作膏納臍中貼之外以膏藥䕶住方吳旻扶壽精痢疾禁口木鼈仁六箇研泥分作二分用麵燒餅一箇切作兩半只用半餅作一竅納藥在内乘熱覆在病人臍上一時再換半箇熱餅其痢即止遂思飲食邵眞人經驗方腸風瀉血木鼈子以桑柴燒存性候冷為末每服一錢煨葱白酒空心服之名烏金散方普濟肛門痔痛孫用祕寶方用木鼈仁三枚砂盆擂如泥入百沸湯一盌乘熱先熏後洗日用三次仍塗少許作瀕湖集簡方用木鼈仁帶潤者雌雄各五箇乳細七九盌覆濕處勿令乾每以一丸唾化開貼痔上其痛即止一夜一丸自消也江夏鐵佛寺蔡和尚病此痛不可忍有人傳此而愈用治數人皆有效瘰癧經年木鼈仁二箇去油研以雞子白和入瓶内安甑中蒸熟食後食之每日一服半月效小兒丹瘤木鼈子仁研如泥醋調傅之一日三五上效外科精義耳卒熱腫木鼈子仁一兩赤小豆大黄各半兩為末每以少許生油調塗之聖惠方風牙腫痛木鼈子仁磨醋搽之普濟方畨木鼈綱目釋名馬錢子綱目苦實把豆綱目火失刻把都時珍曰狀似馬之連錢故名馬錢集解時珍曰畨木鼈生回回國今西土卬州諸處皆有之蔓生夏開黄花七八月結實如栝樓生青熟赤亦如木鼈其核小於木鼈而色白彼人言冶一百二十種病每證各有湯引或云以豆腐制過用之良或云能毒狗至死仁氣味苦寒無毒主治傷寒熱病咽㗋痺痛消痞塊竝含之嚥汁或磨水噙嚥時珍附方新四㗋痺作痛畨木鼈青木香山豆根等分為末吹之楊拱醫方摘要􅅶㗋風腫畨木鼈仁一箇木香三分同磨水調熊膽三分膽礬五分以雞毛掃患處取效唐珤經驗方㿀瘡入目苦實把豆兒即馬錢子半箇輕粉水花銀硃各五分片腦麝香枯礬少許為末左目吹右耳右目吹左耳日二次田日華飛鴻集病欲去胎苦實把豆兒研膏納入北戸三四寸簡集方馬兜鈴宋開寶校正併入唐本草獨行根釋名都淋藤肘后獨行根唐本土青木香唐本雲南根綱目三百兩銀藥宗奭曰蔓生附木而上葉脱時其實尚垂狀如馬項之鈴故得名也時珍曰其根吐利人微有香氣故有獨行木香之名嶺南人用治蠱隱其名為三百兩銀藥肘后方作都淋葢誤𫝊也集解志曰獨行根生古堤城旁所在平澤叢林中皆有之山南名為土青木香一名兜鈴根蔓生葉似蘿藦而圓且澀花青白色其子大如桃李而長十月以後枯則頭開四系若囊其中實薄扁似榆莢其根扁而長尺許作葛根氣亦似漢防己二月八月采根頌曰馬兜鈴今關中河東河北江淮夔浙州郡皆有之春生苗作蔓繞樹而生葉如山蕷葉而厚大背白六月開黄紫花頗類枸杞花七月結實如大棗狀似鈴作四五瓣其根名雲南根微似木香大如小指赤黄色七八月采實暴乾實修治斆曰凡采得實去葉及蔓以生絹袋盛於東屋角畔待乾劈開去革膜取淨子焙用氣味苦寒無毒權曰平時珍曰微苦辛杲曰味厚氣薄隂中微陽入手太隂經主治肺熱欬嗽痰結喘促血痔瘻瘡開寶肺氣上急坐息不得欬逆連連不止甄權清肺氣補肺去肺中濕熱元素發明時珍曰馬兜鈴體輕而虚熟則懸而四開有肺之象故能入肺氣寒味苦微辛寒能清肺熱苦辛能降肺氣錢乙補肺阿膠散用之非取其補肺乃取其清熱降氣也邪去則肺安矣其中所用阿膠糯米則正補肺之藥也湯劑中用多亦作吐故崔氏方用以吐蠱其不能補肺又可推矣附方舊三新二水腫腹大喘急馬兜鈴煎湯日服之千金方肺氣喘急馬兜鈴二兩去殻及膜酥半兩入盌内拌勻慢火炒乾甘草灸一兩為末每股一錢水一盞煎六分温呷或噙之濟簡要衆一切心痛不拘大小男女大馬兜鈴一箇燈上燒存性為末溫酒服立效摘𤣥方解蛇蠱毒飲食中得之咽中如有物嚥不下吐不出心下熱悶兜鈴一兩煎水服即吐出纂崔行功要方痔瘻腫痛以馬兜鈴於瓶中燒烟熏病處良日華木草獨行根氣味辛苦冷有毒大明曰無毒志曰有毒不可多服吐利不止主治鬼疰積聚諸毒熱腫蛇毒水磨為泥封之日三四次立瘥水煮一二兩取汁服吐蠱毒又搗末水調塗丁腫大效唐本治血氣大明利大腸治頭風瘙痒秃瘡時珍精出義附方舊一新四五種蠱毒肘后方云席辨刺史言嶺南俚人多於食中毒人漸不能食胸背漸脹先寒似瘴用都淋藤十兩水一斗酒二升煮三升分三服毒逐小便出十日愼食毒物不瘥更服土人呼為三百兩銀藥出又支太醫云兜鈴根一兩為末水煎頓服當吐蠱未盡再服或為末水調服亦驗中草蠱毒此術在西良之西及嶺南人中此毒入咽欲死者用兜鈴苗一兩為未溫水調服一錢即消化蠱出神效聖惠方腸風漏血馬兜鈴藤榖精草荆三稜川烏頭炒過三味各等分煎水先熏後洗之普濟方丁腫復發馬兜鈴根搗爛用蜘蛛網裹傅少時根出肘后方惡蛇所傷青木香半兩煎湯飲之袖珍方榼藤子宋開寶校正自术部移入此釋名象豆開寶榼子日華合子拾遺時珍曰其子象榼形故名之集解藏器曰按廣州記云榼藤子生廣南山林間作藤著樹如通草藤其實三年方熟角如弓袋子若雞卵其外紫黑色其殻用貯丹藥經年不壞取其中仁入藥灸用時珍曰子紫黒色微光大一二寸圓而褊人多剔去肉作藥瓢垂于腰間也仁氣味濇甘平無毒主治五痔蠱毒飛尸㗋痺以仁為粉微熬水服一二匕亦和大豆澡面去䵟􅍍藏器治小兒脱肛血痢瀉血竝燒灰服或以一枚割瓤熬研空腹熱酒服二錢不過三服必效開寶解諸藥毒時珍草木狀附方舊三新一㗋痺腫痛榼藤子燒研酒服一錢聖惠方五痔下血榼藤子燒存性米飲服二錢有功寇氏衍義腸風下血華陀中藏經用榼藤子二箇不蛀皂莢子四十九箇燒存性為末毎服二錢溫酒下少頃再飲酒一盞趂口服極效聖惠方用榼藤子三枚厚重者濕紙七重包煨熟去殻取肉為末每服一錢食前黄茋湯下日一服附錄合子草拾遺藏器曰子及葉有小毒主蠱毒及蛇咬搗傅瘡上蔓生岸旁葉尖花白子中有兩片如合子預知子宋開寶釋名聖知子日華聖先子日華盍合子日華仙沼子日華志曰相傳取子二枚綴衣領上遇有蠱毒則聞其有聲當預知之故有諸名時珍曰仙沼疑是仙棗之訛集解志曰預知子有皮殻其實如皂莢子頌曰舊不著所出州土今淮蜀黔壁諸州皆有之作蔓生依火木上葉綠有三角面深背淺七月八月有實作房生青熟深紅色每房有子五七枚如皂莢子班褐色光潤如飛蛾今蜀人極貴重之云亦難得采無時其根冬月采之隂乾治蠱其功勝于子也山民目為聖無憂子仁氣味苦寒無毒大明曰溫雙仁者可帶主治殺蟲療蠱治諸毒去皮研服有效開寶治一切風補五勞七傷其功不可備述治痃癖氣塊消宿食止煩悶利小便催生中惡失音髮落天行溫疾塗一切蛇蟲蠶咬治一切病每日吞二七粒不過三十粒永瘥大明附方新三預知子丸治心氣不足精神恍惚語言錯忘忪悸煩鬰憂愁慘慽喜怒多恐健忘少睡夜多異夢寤即驚魘或發狂眩暴不知人並宜服此預知子去皮白茯岺枸杞子石菖蒲伏神栢子仁人參地骨皮逺志山藥黄精蒸熟朱砂水飛等分為末煉蜜丸芡子大每嚼一丸人參湯下和劑局方耳卒聾閉八九月取石榴開一孔留蓋入米醋滿中葢定麵裹煻火中煨熟取出入少仙沼子黒李子末取水滴耳中腦痛勿驚如此二夜又點一耳聖惠方癘風有蟲眉落聲變預知子膏用預知子雄黄各二兩為末以乳香三兩同水一斗銀鍋煮至五升入二末熬成膏瓶盛之每服一匙溫酒調下有蟲如尾隨大便而出聖惠方根氣味苦冷無毒主治解蠱毒石臼搗篩每用三錢溫水服立已蘇頌牽牛子别錄下品釋名黑丑綱目草金鈴炮灸論盆甑草綱目狗耳草救荒𢎞景曰此藥始出田野人牽牛謝藥故以名之時珍曰近人隱其名為黒丑白者為白丑葢以丑屬牛也金鈴象子形盆甑狗耳象葉形段成式酉陽雜俎云盆甑草蔓如薯蕷結實後斷之狀如盆甑是矣集解𢎞景曰牽牛作藤生花狀如藊豆黄色子作小房實黒色形如梂子核恭曰此花似旋花作碧色不黄亦不似藊豆頌曰處處有之二月種子三月生苗作藤蔓繞籬牆髙者或二三丈其葉青有三尖角七月生花微紅帶碧色似鼓子花而大八月結實外有白皮裹作毬每毬内有子四五枚大如蕎麥有三稜有黑白二種九月後收之宗奭曰花朶如鼔子花但碧色日出開日西萎其核如木㺅梨子而色黒謂子似蕎麥非也時珍曰牽牛有黑白二種黒者處處野生尤多其蔓有白毛斷之有白汁葉有三尖如楓葉花不作瓣如旋花而大其實有蒂裹之生青枯白其核與棠梂子核一様但色淺黑爾白者人多種之其蔓微紅無毛有柔刺斷之有濃汁葉團有斜尖竝如山藥莖葉其花小于黑牽牛花淺碧帶紅色其實蒂長寸許生青枯白其核白色稍粗人亦采嫩實蜜煎為果食呼為天茄因其蒂似茄也子修治斆曰凡采得子晒乾水淘去浮者再晒拌酒蒸從已至未晒乾收之臨用舂去黒皮時珍曰今多只碾取頭末去皮麩不用亦有半生半熟用者氣味苦寒有毒權曰甘有小毒詵曰多食稍冷杲曰辛熱雄烈泄人元氣大明曰味薟得青木香乾薑良主治下氣療脚滿水腫除風毒利小便别錄治痃癖氣塊利大小便除虚腫落胎甄權取腰痛下冷膿瀉蠱毒藥并一切氣壅滯大明和山茱萸服去水病孟詵除氣分濕熱三焦壅結李杲逐痰消飲通大腸氣祕風祕殺蟲達命門時珍發明宗奭曰牽牛丸服治大腸風祕壅結不可久服亦行脾腎氣故也好古曰牽牛以氣藥引則入氣以大黄引則入血利大腸下水積色白者瀉氣分濕熱上攻喘滿破血中之氣震亨曰牽牛屬火善走黑者屬水白者屬金若非病形與證俱實不脹滿不大便祕者不可輕用驅逐致虚先哲深戒杲曰牽牛非神農藥也名醫續注云味苦寒能除濕氣利小便治下注脚氣此説氣味主治俱誤矣何也凡用牽牛少則動大便多則泄下如水乃瀉氣之藥其味辛辣久嚼猛烈雄壯所謂苦寒安在哉夫濕者水之别稱有形者也若肺先受濕濕氣不得施化致大小便不通則宜用之蓋牽牛感南方熱火之化所生火能平金而泄肺濕去則氣得周流所謂五臟有邪更相平也今不問有濕無濕但傷食或有熱證俱用牽牛尅化之藥豈不誤哉况牽牛止能泄氣中之濕熱不能除血中之濕熱濕從下受之下焦主血血中之濕宜苦寒之味反以辛藥泄之傷人元氣且牽牛辛烈比之諸辛藥泄氣尤甚其傷人必矣經云辛泄氣辛走氣辛泄肺氣病者無多食辛况飲食失節勞役所傷是胃氣不行必火乘之腸胃受火邪名曰熱中脾胃主血當血中泄火以黄芩之苦寒泄火當歸身之辛溫和血主地黄之苦寒涼血益血少加紅花之辛溫以泄血絡桃仁之辛溫除燥潤腸仍不可專用須于補中益氣泄隂火之藥内加而用之何則上焦元氣已自虚弱若反用牽牛大辛熱氣味俱陽之藥以泄水泄元氣利其小便竭其津液是謂重虛重則必死輕則天人故張文懿云牽牛不可耽嗜脱人元氣見人有酒食病痞者多服牽牛丸散取快一時藥過仍痞隨服隨效效後復痞以致久服脱人元氣猶不知悔也張仲景治七種濕熱小便不利無一藥犯牽牛者仲景豈不知牽牛能泄濕利小便乎為濕病之根在下焦是血分中氣病不可用辛辣之藥泄上焦太隂之藥是血病瀉氣使氣血俱損也經云毋盛盛毋虚虚毋絶人長命此之謂也用者戒之白牽牛亦同時珍曰牽牛自宋以後北人常用取快及劉守真張子和出又倡為通用下藥李明之目擊其事故著此説極力闢之然東漢時此藥未入本草故仲景不知假使知之必有用法不應捐棄况仲景未用之藥亦多矣執此而論蓋矯枉過中矣牽牛治水氣在脾喘滿腫脹下焦鬱遏腰背脹重及大腸風祕氣祕卓有殊功但病在血分及脾胃虚弱而痞滿者則不可取快一時及常服暗傷元氣也一宗室大人年幾六十平生苦腸結病旬日一行甚於生産服養血潤燥藥則泥膈不快服消黄通利藥則若罔知如此三十餘年矣時珍胗其人體肥膏梁而多憂鬱日吐酸痰盌許乃寛又多火病此乃三焦之氣壅滯有升無降津液皆化為痰飲不能下滋腸腑非血燥比也潤劑留滯消黄徒入血分不能通氣俱為痰阻故無效也乃用牽牛末皂莢膏丸與服即便通利自是但覺腸結一服就順亦不妨食且復精爽葢牽牛能走氣分通三焦氣順則痰逐飲消上下通快矣外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者七晝夜醫用通利藥不效遣人叩予予思此乃濕熱之邪在精道壅脹隧路病在二隂之間故前阻小便後阻大便病不在大腸膀胱也乃用楝實茴香穿山甲諸藥入牽牛加倍水煎服一服而減三服而平牽牛能達右腎命門走精隧人所不知惟東垣李明之知之故明之治下焦陽虚天眞丹用牽牛以鹽水炒黒入佐沉香杜仲破故紙官桂諸藥深得補瀉兼施之妙方見醫學發明又東垣治脾濕太過通身浮腫喘不得臥腹如皷海金沙散亦以牽牛為君則東垣未盡棄牽牛不用但貴施之得道耳附方舊八新三十搜風通滯風氣所攻臟腑積滯用牽牛子以童尿浸一宿長流水上洗半日生絹袋盛掛風處令乾每日鹽湯下三十粒極能搜風亦消虚腫久服令人體清瘦斗門方三焦壅塞胸膈不快頭昬目眩涕唾痰涎精神不爽利膈丸用牽牛子四兩半生半炒不蛀皂莢酥炙二雨為末生薑自然汁煮糊丸梧子大每服二十丸荆芥湯下王衮博濟方一切積氣宿食不消黑牽牛頭為末四兩用蘿蔔剜空安末葢定紙封蒸熟取出入白荳蔲末一錢搗丸梧子大每服一二十丸白湯下名順氣丸普濟方男婦五積五般積氣成聚用黑牽牛一斤生搗末八兩餘滓以新瓦炒香再搗取四兩煉蜜丸梧子大至重者三十五丸陳橘皮生薑煎湯臥時服半夜未動再服三十丸當下積聚之物尋常行氣每服卜丸甚妙博濟方胸膈食積牽牛末一兩巴豆霜三箇研末水丸梧子大每服二三十丸食後隨所傷湯下儒門事親氣築奔衝不可忍牛郎丸用黒牽牛半兩炒檳榔二錢半為末每服一錢紫蘇湯下普濟方追蟲取積方同上用酒下亦消水腫腎氣作痛黒曰牽牛等分炒為末每服三錢用豬腰子切縫入茴香百粒川椒五十粒摻牽牛末入内扎定紙包煨熟空心食之酒下取出惡物效楊仁齋直指方傷寒結胸心腹硬痛用牽牛頭末一錢白糖化湯調下鄭氏家傳方大便不通簡要方用牽牛子半生半熟為末每服二錢薑湯下未通再以茶服一方加大黄等分一方加生檳榔等分大腸風祕結濇牽牛子微炒搗頭末一兩桃仁去皮尖麩炒半兩為末熟蜜丸梧子大每湯服三十丸義寇氏衍水蠱脹滿白牽牛黑牽牛各取頭末二錢大麥麵四兩和作燒餅臥時烙熟食之以茶下降氣為驗河間宣明方諸水飲病張子和云病水之人如長川泛溢非盃杓可取必以神禹決水之法治之故名禹功散用黒牽牛頭末四兩茴香一兩炒為末每服一二錢以生薑自然汁調下當轉下氣也儒門事親隂水陽水黑牽牛頭末三兩大黄末三兩陳米飯鍋糕一兩為末糊九梧子大每服五十丸薑湯下欲利服百丸醫方捷徑水腫尿濇牽牛末每服方寸匕以小便利為度千金方濕氣中滿足脛微腫小利不利氣急欬嗽黒牽牛末一兩厚朴制半兩為末每服二錢薑湯下或臨時水丸每棗湯下三十丸普濟方水氣浮腫氣促坐臥不得用牽牛子二兩微炒搗末以烏牛尿浸一宿平旦入葱白一握煎十餘沸空心分二服水從小便中出聖惠方脾濕腫滿方見海金沙下風毒脚氣捻之没指者牽牛子搗末蜜丸小豆大每服五丸生薑湯下取小便利乃止亦可吞之其子黑色正如梂小核肘后方小兒腫病大小便不利黑牽牛白牽牛各二兩炒取頭末并華水和丸綠豆大毎服二十丸蘿蔔子煎湯下聖濟總錄小兒腹脹水氣流腫膀胱實熱小便赤濇牽牛生研一錢青皮湯空心下一加木香減半丸服方鄭氏小兒疳氣浮腫常服自消黑牽牛白牽牛各半生半炒取末陳皮青皮等分為末糊丸綠豆大毎服三歲兒服二十丸米湯下鄭氏小兒方疳氣耳聾疳氣攻腎耳聾隂腫牽牛末一錢豬腰子半箇去膜薄切摻入内加少鹽濕紙包煨空心食鄭氏方小兒雀目牽牛子末毎以一錢用羊肝一片同麵作角子二箇灸熟食米飲下普濟方風熱赤眼白牽牛末以蔥白煮研丸綠豆大每服五丸蔥湯下服訖睡半時衛生家寶方面上風刺黒牽牛酒浸三宿為末先以薑汁擦面後用藥塗之摘𤣥方面上粉刺㿔子如米粉黑牽牛末對入面脂藥中日日洗之聖惠方面上雀斑黒牽牛末雞子清調夜傅旦洗摘𤣥方馬脾風病小兒急驚肺脹喘滿胸髙氣急脅縮鼻張悶亂欬嗽煩渴痰潮聲嗄俗名馬脾風不急治死在旦夕白牽牛半生半炒黑牽牛半生半炒大黄煨檳榔各取末一錢毎用五分蜜湯調下痰盛加輕粉一字名牛黄奪命散全幼心鑑小兒夜啼黑牽牛末一錢水調傅臍上即止生生編臨月滑胎牽牛子一兩赤土少許研末覺胎轉痛時白榆皮煎湯下一錢王衮博濟方小便血淋牽牛子二兩半生半炒為末每服二錢薑湯下良久熱茶服之經驗良方腸風瀉血牽牛五兩牙皂三兩水浸三日去皂以酒一升煮乾焙研末蜜丸梧子大每服七丸空心酒下日三服下出黄物不妨病減後日服五丸米飲下本事方痔漏有蟲黒白牽牛各一兩炒為末以豬肉四兩切碎炒熟蘸末食盡以白米飯三匙壓之取下白蟲為效又方白牽牛頭末四兩没藥一錢為細末欲服藥時先日勿夜飲次早空心將豬肉四兩灸切片蘸末細細嚼食取下膿血為效量人加減用忌酒色油膩三日儒門事親漏瘡水溢乃腎虚也牽牛末二錢半入切開豬腎中竹葉包定煨熟空心食溫酒送下借腎入腎一縱一横兩得其便惡水旣泄不復淋瀝直指方一切癰疽發背無名腫毒年少氣壯者用黑白牽牛各一合布包搥碎以好醋一盌熬至八分露一夜次日五更溫服以大便出膿血為妙名濟世散張三丰仙方濕熱頭痛黑牽牛七粒砂仁一粒研末井華水調汁仰灌鼻中待涎出即愈聖濟錄氣滯腰痛牽牛不拘多少以新瓦燒赤安于上自然一半生一半熟不得撥動取末一兩入硫黄术二錢半同研勻分作三分每分用白麵三匙水和捍開切作碁子五更初以水一盞煮熟連湯溫下痛即已未住隔日再作予常有此疾每發一服痛即止許學士本事方旋花本經上品釋名旋葍蘇恭筋根本經續筋根圖經鼓子花圖經㹠腸草圖經美草别錄天劒草綱目纒枝牡丹恭曰旋花即平澤旋葍也其根似筋故一名筋根炳曰旋葍當作葍旋音福鏇用根入藥别有旋覆音璇伏用花入藥今云旋葍誤矣頌曰别錄言其根主續筋故南人呼為續筋根一名㹠腸草象形也宗奭曰世俗謂之鼔子花言其花形肖也時珍曰其花不作瓣狀如軍中所吹鼔子故有旋花鼓子之名一種干葉者色似粉紅牡丹俗呼為纒枝牡丹集解别錄曰旋花生豫州平澤五月采隂乾保昇曰此旋葍花也所在川澤皆有蔓生葉似薯蕷而狹長花紅色根無毛節蒸煮堪啖味甘美名筋根二月八月根日乾宗奭曰今河北汴西關陜田野中甚多最難鋤艾治之又生四五月開花其根寸截置土灌漑涉旬苗生韓保昇説是矣時珍曰旋花田野堘塹皆生逐節蔓延葉如波菜葉而小至秋開花如白牽牛之花粉紅色亦有千葉者其根白色大如筋不結子葉頌曰黔南施州出一種旋花粗莖大無花不作蔓恐别是一物也正誤别錄曰花一名金沸𢎞景曰旋花東人呼為山薑南人呼為美草根似杜若亦似髙良薑腹中冷痛煮服甚效作九散服辟榖止飢近有人從江南還用此術與人斷榖皆得半百日不飢不瘦但志淺嗜深不能久服爾其葉似薑花赤色味辛狀如荳蔲此旋花即其花也今山東甚多又註旋覆花曰别有旋葍根出河南來北國亦有形似芎藭惟合旋葍膏用之餘無所入恭曰旋花乃旋葍花也陶説乃山薑爾山薑味辛都非此類又因旋覆花名金沸遂作此花别名皆誤矣又云從北國來者根似芎藭與髙良薑全無彷彿亦誤也氣味花甘根辛溫無毒時珍曰花根莖葉竝甘滑微苦能制雄黄主治面皯黑色媚好益氣根主腹中寒熱邪氣本經利小便久服不飢輕身續筋骨合金瘡别錄搗汁服主丹毒熱藏器補勞損益精氣時珍發明時珍曰凡藤蔓之屬象人之筋所以多治筋病旋花根細如筋可啖故别錄言其久服不飢時珍自京師還見北士車夫每載之云暮歸煎湯飲可補損傷則益氣續筋之説尤可徵矣附方舊一新一被斫斷筋旋葍根搗汁瀝瘡中仍以滓傅之日三易半月即斷筋便續此方出蘇景中療奴有效者王燾外臺祕要祕精益髓太乙金鎖丹用五色龍骨五兩覆盆子五兩蓮花蕊四兩未開者隂乾鼓子花三兩五月五日采之雞頭子仁一百顆並為末以金櫻子二百枚去毛木臼搗爛水七升煎濃汁一升去渣和藥杵二干下九梧子大每空心溫鹽酒下三十丸服之至百日永不泄如要泄以冷水調車前末半合服之忌葵菜䔖謙齋瑞竹堂方紫葳本經中品校正自木部移入此釋名凌霄蘇恭陵苕本經陵時郭璞女葳甄權茇華本經武威吳普瞿陵吳普鬼目吳氏時珍曰俗謂赤艷曰紫葳葳此花赤艷故名附木而上髙數丈故曰凌霄正誤𢎞景曰是瞿麥根方用至少博物志云郝晦行太行山北得紫葳華必當竒異今瞿麥處處有之不應乃在太行山恭曰紫葳瞿麥皆本經藥體性旣乖生處亦不相關爾雅云苕一名陵苕郭璞注云一名陵時又名凌霄此為眞也頌曰孔穎達詩疏亦云苕一名陵時今本草無陵時之名惟鼠尾草有之豈所傳不同抑陶蘇之誤耶時珍曰按吳氏本草紫葳一名瞿陵陶𢎞景誤作瞿麥字爾鼠尾止名陵翹無陵時蘇頌亦誤矣並正之集解别錄曰紫葳生西海川谷及山陽恭曰此凌霄花也連莖葉用詩云有苕之華云其黄矣爾雅云陵苕黄華蔈白華茇山中亦有白花者頌曰今處處皆有多生山中人家園圃亦或栽之初作蔓生依大本久延至巔其花黄赤夏中乃盛今醫家多采花乾之入女科藥用時珍曰凌霄野生蔓纔數尺得木而上即髙數丈年久者藤大如杯春初生枝一枝數葉尖長有齒深青色自夏至秋開花一枝十餘朶大如牽牛花而頭開五瓣赭黄色有細點秋深更赤八月結莢如豆莢長三寸許其子輕薄如榆仁馬兜鈴仁其根長亦如兜鈴根狀秋後采之隂乾花根同氣味酸微寒無毒普曰神農雷公岐伯辛扁鵲苦鹹黃帝甘無毒權曰畏鹵鹹時珍曰花不可近鼻聞傷腦花上露入目令人昬矇主治婦人産乳餘疾崩中癥瘕血閉寒熱羸瘦養胎本經産後奔血不定淋瀝主熱風風癎大小便不利腸中結實甄權酒齇熱毒風刺婦人血膈遊風崩中帶下大明莖葉氣味苦平無毒主治痿躄益氣别錄熱風身痒遊風風􅇙瘀血帶下花及根功同大明治㗋痺熱痛涼血生肌時珍發明時珍曰凌霄花及根甘酸而寒莖葉帶苦手足厥隂經藥也行血分能去血中伏火故主産乳崩漏諸疾及血熱生風之證也附方舊二新十一婦人血崩凌霄花為末毎酒服二錢後服四物湯丹溪纂要糞後下血凌霄花浸酒頻飲之普濟方消渴飲水凌霄花一兩搗碎水一盞半煎一盞分二服聖濟錄嬰兒不乳百日内小兒無故口青不飲乳用凌霄花大藍葉芒消大黄等分為末以羊髓和丸梧子大每研一丸以乳送下便可喫乳熱者可服寒者勿服昔有人休官後雲遊湖湘修合此方救危甚多普濟方久近風癎凌霄花或根葉為末每服三錢溫酒下服畢解髪不住手梳口噙冷水溫則吐去再噙再梳至二十口乃止如此四十九日絶根百無所忌方賢竒效方通身風痒凌霄花為末酒服一錢醫學正傳大風癘疾潔古家珍用凌霄花五錢地龍焙殭蠶炒全蠍炒各七箇為末每服二錢溫酒下先以藥湯浴過服此出臭汗為效儒門事親加蟬蜕五品各九箇作一服鼻上酒皶王璆百一選方用凌霄花山巵子等分為末每茶服二錢日二服數日除根臨川曾子仁用之有效膩楊氏家藏方用凌霄花半兩硫黄一兩胡桃四箇粉一錢研膏生絹包楷走皮趨瘡滿頰滿頂浸滛濕爛延及兩耳痒而出水發歇不定田野名悲羊瘡用凌霄花并葉煎湯日日洗之楊仁齋直指方婦人隂瘡紫葳為末用鯉魚腦或膽調搽方摘𤣥耳卒聾閉凌霄葉杵取自然汁滴之斗門方女經不行凌霄花為末每服二錢食前溫酒下徐氏胎産方附録骨路支此條鈔書遺落詳見下卷之末營實牆蘼音眉品本經上釋名薔薇别錄山棘别錄牛棘本經牛勒别錄刺花綱目時珍曰此草蔓柔靡依牆援而生故名牆蘼其莖多棘刺勒人牛喜食之故有山刺牛勒諸名其子成簇而生如營星然故謂之營實集解别錄曰營實生零陵川谷及蜀郡八月九月采隂乾𢎞景曰營實即薔薇子也以白花者為良莖葉可煮作飲其根亦可煮釀酒保昇曰所在有之蔓生莖間多刺其花有百葉八出六出或赤或白子若杜棠子時珍曰薔薇野生林塹間春抽嫩蕻小兒搯去皮刺食之旣長則成叢似蔓而莖硬多刺小葉尖薄有細齒四五月開花四出黄心有白色粉紅二者結子成簇生青熟紅其核有白毛如金櫻子核八月采之根采無時人家栽玩者莖粗葉大延長數丈花亦厚大有白黄紅紫數色花最大者名佛見笑小者名木香皆香艷可人不入藥用南畨有薔薇露云是此花之露水香馥異常營實氣味酸溫無毒别錄曰微寒主治癰疽惡瘡結肉跌筋敗瘡熱氣隂蝕不瘳利關節本經久服輕身益氣别錄治上焦有熱好瞑時珍附方新一眼熱昬暗營實枸杞子地膚子各二兩為末每服三錢溫酒下聖惠方根氣味苦濇冷無毒主治止洩痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌别錄治熱毒風除邪氣止赤白痢腸風瀉血通結血治牙齒痛小兒疳蟲肚痛癰疽疥癬大明頭瘡白秃甄權除風熱濕熱縮小便止消渴時珍發明時珍曰營實薔薇根能入陽明經除風熱濕熱生䏎殺蟲故癰疽瘡癬古方常用而洩痢消渴遺尿好瞑亦皆陽明病也附方舊七新五消渴尿多薔薇根一把水煎日服之千金方小便失禁薔薇根煮汁飲或為末酒服野生白花者更良聖惠方少小尿牀薔薇根五錢煎酒夜飲外臺祕要小兒疳痢頻數用生薔薇根洗切煎濃汁細飲以愈為度千金方口咽痛痒語聲不出薔薇根皮射干一兩甘草炙半兩每服二錢水煎服之普濟方口舌糜爛薔薇根避風打去土煮濃汁溫含冷吐冬用根皮夏用枝葉口瘡日久延及胸中生瘡三年已上不瘥者皆效金千方小兒月蝕薔薇根四兩地榆二錢為末先以鹽湯洗過傅之全幼心鑒癰腫癤毒潰爛疼痛用薔薇皮更灸熨之千金方筋骨毒痛因患楊梅瘡服輕粉毒藥成者野薔薇根白皮洗三斤水酒十斤煮一炷香每日任飲以愈為度鄧筆峰雜興方用刺薔薇根三錢五加皮木𤓰當歸茯苓各二錢以酒二盞煎一盞日服一次金瘡腫痛薔薇根燒灰毎白湯服方寸匕一日三服抱朴子箭刺入肉膿囊不出以薔薇根末摻之服鼠撲十日即穿皮出也外臺祕要骨哽不出薔薇根末水服方寸匕日三同上葉主治下疳瘡焙研洗傅之黄花者更良攝生方月季花綱目釋名月月紅見下勝春瘦客鬭雪紅集解時珍曰處處人家多栽插之亦薔薇類也青莖長蔓硬刺葉小於薔薇而花深紅千葉厚瓣逐月開放不結子也氣味甘溫無毒主治活血消腫傅毒時珍附方新一瘰癧未破用月季花頭二錢沉香五錢芫花炒三錢碎剉入大鯽魚腹中就以魚腸封固酒水各一盞煮熟食之即愈魚須安糞水内遊死者方效此是家傳方活人多矣談埜翁試驗方栝樓本經中品校正併入圖經天花粉釋名果羸音裸𤓰蔞綱目天𤓰别錄黄𤓰别錄地樓本經澤姑别錄根名白藥圖經天花粉圖經瑞雪時珍曰羸與蓏同許愼云木上曰果地下曰蓏此物蔓生附木故得兼名詩云果羸之實亦施于宇是矣栝樓即果羸二字音轉也亦作􅌝􅌣後人又轉為𤓰蔞愈轉愈失其眞矣古者𤓰姑同音故有澤姑之名齊人謂之天𤓰象形也雷斆炮灸論以圖者為栝長者為樓亦出牽强但分雌雄可也其根作粉潔白如雪故謂之天花粉蘇頌圖經重出天花粉謬矣今削之集解别錄曰栝樓生𢎞農川谷及山隂地根入土深者良生鹵地者有毒二月八月采根曝乾三十日成𢎞景曰出近道藤生狀如土𤓰而葉有乂入土六七尺大二三圍者服食亦用之實入摩膏用恭曰出陜州者白實最佳頌曰所在有之三四月生苗引藤蔓葉如甜𤓰葉而窄作乂有細毛七月開花似壺蘆花淺黄色結實在花下大如拳生青至九月熟赤黄色其形有正圓者有鋭而長者功用皆同根亦名白藥皮黄肉白時珍曰其根直下生年久者長數尺秋後掘者結實有粉夏月掘者有筋無粉不堪用其實圓長青時如𤓰黄時如熟柿山家小兒亦食之内有扁子大如絲𤓰子殻色褐仁色綠多脂作青氣炒乾搗爛水熬取油可點燈實修治斆曰凡使皮子莖根其效各别其栝圓黄皮厚蒂小樓則形長赤皮蒂粗隂人服樓陽人服栝並去殻皮革膜及油用根亦取大二三圍者去皮搗爛以水澄粉用時珍曰栝樓古方全用後世乃分子瓤各用氣味苦寒無毒時珍曰味甘不苦主治胸痺悦澤人面别錄潤肺燥降火治欬嗽滌痰結利咽㗋止消渴利大腸消癰腫瘡毒時珍子炒用補虚勞口乾潤心肺治吐血腸風瀉血赤白痢手面皺大明發明震亨曰栝樓實治胸痺者以其味甘性潤甘能補肺潤能降氣胸中有痰者乃肺受火逼失其降下之令令得甘緩潤下之助則痰自降宜其為治嗽之要藥也且又能洗滌胸膈中垢膩鬱熱為治消渴之神藥時珍曰張仲景治胸痺痛引心背欬唾喘息及結胸滿痛皆用栝樓實乃取其甘寒不犯胃氣能降上焦之火使痰氣下降也成無已不知此意乃云苦寒以瀉熱葢不嘗其味原不苦而隨文傳㑹爾附方舊十二新八痰欬不止𤓰蔞仁一兩文蛉七分為末以薑汁澄濃脚丸彈子大噙之方摘𤣥乾欬無痰熟𤓰蔞搗爛絞汁入蜜等分加白礬一錢熬膏頻含嚥汁楊起簡便方欬嗽有痰熟𤓰蔞十箇明礬二兩搗和餅隂乾研末糊丸梧子大每薑湯下五七十丸醫方摘要痰喘氣急􅌝􅌣二箇明礬一棗大同燒存性研末以熟蘿蔔蘸食藥盡病除普濟方熱欬不止用濃茶湯一鍾蜜一鍾大熟𤓰蔞一箇去皮將瓤入茶蜜湯洗去子以盌盛于飯上蒸至飯熟取出時時桃三四匙嚥之摘𤣥方肺熱痰欬胸膈塞滿用𤓰蔞仁半夏湯泡七次焙研各一兩薑汁打麵糊丸梧子大每服五十丸食後薑湯下嚴用和濟生方肺痿欬血不止用栝樓五十箇連瓤丸焙烏梅肉五十箇焙杏仁去皮尖炒二十一箇為末每用一捻以豬肺一片切薄摻末入内灸熟冷嚼嚥之日二服聖濟錄酒痰欬嗽用此救肺𤓰蔞仁青黛等分硏末薑汁蜜丸芡子大每噙一丸丹溪心法飲酒發熱即上方研膏日食數匙一男子年二十病此服之而愈摘𤣥方飲酒痰澼兩脅脹滿時復嘔吐腹中如水聲栝樓實去殻焙一兩神麴炒半兩為末每服二錢葱白湯下聖惠方小兒痰喘欬嗽膈熱久不瘥𤓰蔞實一枚去子為末以寒食麵和作餅子灸黄再研末每服一錢溫水化下日三服效乃止劉河間宣明方婦人夜熱痰嗽月經不調形瘦者用𤓰蔞仁一兩青黛香附童尿浸晒一兩五錢為末蜜調噙化之法丹溪心胸痺痰嗽胸痛徹背心腹痞滿氣不得通及治痰嗽大𤓰蔞去瓤取子炒熟和殻研末麵糊九梧子大每水飲下二三十丸日二服杜壬方胸中痺痛引背喘息欬唾短氣寸脈沉遲關上𦂳數用大栝樓實一枚切薤白半斤以白酒七斤煮二升分再服加半夏四兩更善金仲景匱方清痰利膈治欬嗽用肥大栝樓洗取子切焙半夏四十九箇湯洗十次搥焙等分為末用洗栝樓水并瓤同熬成膏和丸梧子大每薑湯下三五十丸良楊文蔚方中風喎斜用𤓰蔞絞汁和大麥麵作餅灸熟熨之正便止勿令太過聖惠方熱病頭痛發熱進退用大栝樓一枚取瓤細剉置甆盌中用熱湯一盞沐之葢定良久去滓服聖惠方時疾發黄狂悶煩熱不識人者大𤓰蔞實黄者一枚以新汲水九合浸淘取汁入蜜半合朴消八分盡分再服便瘥經蘇頌圖本草小兒黄疸眼黄脾熱用青𤓰蔞焙研每服一錢水半盞煎七分臥時服五更瀉下黄物立可名逐黄散普濟方酒黄疸疾方同上小便不通腹脹用𤓰蔞焙研每服二錢熱酒下頻服以通為度紹興劉駐云魏明州病此御醫用此方治之得效聖惠方消渴煩亂黄栝樓一箇酒一盞洗去皮子取瓤煎成膏入白礬末一兩丸梧子大每采飲下十丸方聖惠燥渴腸祕九月十月熟􅌝􅌣實取瓤拌乾葛粉銀石器中慢火炒熟為末食後夜臥各以沸湯㸃服二錢寇宗奭衍義吐血不止栝樓泥固煅存性研三錢糯米飲服日再服錄聖惠腸風下血栝樓一箇燒灰赤小豆半兩為末毎空心酒服一錢普濟方久痢五色大熟𤓰蔞一箇煅存性出火毒為末作一服溫酒服之胡大卿一僕患痢半年杭州一道人傳此而愈本事方大腸脱肛生栝樓搗汁溫服之以豬肉汁洗手挼之令暖自入葛洪肘后方小兒脫肛唇白齒焦久則兩頰光眉赤唇焦啼哭黄𤓰蔞一箇入白礬五錢在内固濟煅存性為末糊九梧子大每米飲下二十丸摘𤣥方牙齒疼痛𤓰蔞皮露蜂房燒灰擦牙以烏桕根荆柴根葱根煎湯漱之危氏得效方咽㗋腫痛語聲不出經進方用栝樓皮白僵蠶炒甘草炒各二錢半為末每服三錢半薑湯下或以綿裹半錢含嚥一日二服名發聲散御藥院方堅齒烏鬚大栝樓一箇開頂入青鹽二兩杏仁去皮尖三七粒原頂合扎定蚯蚓泥和鹽固濟炭火煅存性研末每日揩牙三次令熱百日有驗如先有白鬚拔去以藥投之即生黑者其治口齒之功未易具陳普濟方面黑令白栝樓瓤三兩杏仁一兩豬􅏬一具同研如膏每夜塗之令人光潤冬月不皺聖濟錄胞衣不下栝樓實一箇取子細研以酒與童子小便各半盞煎七分溫服無實用根亦可陳良甫婦人良方乳汁不下𤓰蔞子淘洗控乾炒香瓦上翕令白色酒服一錢七合面臥一夜流出姚僧坦集騐方乳癰初發大熟栝樓一枚熟搗以白酒一斗煮取四升去滓溫服一升日三服子母祕錄諸癰發背初起微赤栝樓搗末并華水服方寸匕方梅師便毒初發黄𤓰蔞一箇黄連五錢水煎連服效李仲南永類方風瘡疥癩生栝樓一二箇打碎酒浸一日夜熱飲臞仙乾坤祕韞熱遊丹腫栝樓子仁末二大兩釅醋調塗方楊氏産乳集驗楊梅瘡痘小如指頂遍身者先服敗毒散後用此解皮膚風熱不過十服愈用栝樓皮為末每服三錢燒酒下日三服集簡方根修治天花粉周憲王曰秋冬采根去皮寸切水浸逐日換水四五日取出搗泥以絹衣濾汁澄粉晒乾用氣味苦寒無毒時珍曰甘微苦酸微寒之才曰枸把為之使惡乾薑畏牛膝乾漆反烏頭主治消渴身熱煩滿大熱補虚安中續絶傷本經除腸胃中痼熱八疸身面黄唇乾口燥短氣止小便利通月水别錄治熱狂時疾通小腸消腫毒乳癰發背痔瘻瘡癤排膿生肌長肉消撲損瘀血大明發明恭曰用根作粉潔白美好食之大宜虚熱人杲曰栝樓根純隂解煩渴行津液心中枯痼者非此不能除與辛酸同用導腫氣成無已曰津液不足則為渴栝樓根味苦微寒潤枯燥而通行津液是為渴所宜也時珍曰栝樓根味甘微苦酸其莖葉味酸酸能生津感召之理故能止渴潤枯微苦降火甘不傷胃昔人只言其苦寒似未深察附方舊十二新十二消渴飲水千金方作粉法取大栝樓根去皮寸切水浸五日逐日易水取出搗研濾過澄粉晒乾每服方寸匕水化下日三服亦可入粥及乳酪中食之肘后方用栝樓根薄切灸取五兩水五升煮四升隨意飲之斗外臺祕要用生栝樓根三十斤以水一石煮取一半去滓以牛脂五合煎至水盡用煖酒先食服如雞子大日三服最妙聖惠方用栝樓根黄連三兩為末蜜丸梧子大每服三十丸日二每又玉壺丸用栝樓根人參等分為末蜜丸梧子大服三十丸麥門冬湯下傷寒煩渴思飲栝樓根三兩水五升煮一升分二服先以淡竹瀝一斗水二升煮好銀二兩半冷飲汁然後服此外臺祕傳百合病渴栝樓根牡蠣熬等分為散飲服方寸匕永類方黑疸危疾𤓰蔞根一斤搗汁六合頓服隨有黄水從小便出如不出再服楊起簡便方小兒發黄皮肉面目皆黄用生栝樓根搗取汁二合蜜二大匙和勻暖服日一服廣利方小兒熱病壯熱頭痛用栝樓根末乳汁調服半錢聖惠方虛熱欬嗽天花粉一兩人參三錢為末每服一錢米湯下集簡方偏疝痛極劫之立住用綿袋包暖隂囊取天花粉五錢以醇酒一盌浸之自卯至午微煎滚露一夜次早低凳坐定兩手按膝飲下即愈未下再一服本草蒙筌小兒囊腫天花粉一兩灸甘草一錢半水煎入酒服全幼心鑒耳卒烘烘栝樓根削尖以臘豬脂煎三沸取塞耳三日即愈肘后方耳聾未久栝樓根三十斤細切以水煮汁如常釀酒久服甚良肘后方産後吹乳腫硬疼痛輕則為妬乳重則為乳癰用栝樓根末一兩乳香一錢為末溫酒每服二錢李仲南永類方乳汁不下栝樓根燒存性研末飲服方寸匕或以五錢酒水煎服楊氏産乳癰腫初起孟詵食療用栝樓根苦酒熬燥搗篩以苦酒和塗紙上貼之末楊文蔚方用栝樓根赤小豆等分為醋調塗之天泡濕瘡天花粉滑石等分為末水調搽之普濟方楊梅天泡天花粉川芎窮各四兩槐花一兩為末米糊丸梧子大每空心淡薑湯下七八十丸簡便方折傷腫痛栝樓根搗塗重布裏之熱除痛即止后葛洪肘方箭鏃不出栝樓根搗傅之日三易自出崔元亮海上方鍼刺入肉方同上痘後目障天花粉蛇蜕洗焙等分為末羊子肝批開入藥在内米泔汁煮熟切食次女病此服之旬餘而愈周密齊東野語莖葉氣味酸寒無毒主治中熱傷暑别錄王𤓰本經中品釋名土𤓰本經鉤􅌣郭璞老鴉𤓰圖經馬瓟𤓰瓟音雹赤雹子衍義野甜𤓰綱目師姑草土宿公公鬚頌曰月令四月王𤓰生即此也均房間人呼為老鴉𤓰亦曰菟𤓰按爾雅云蔩菟𤓰郭璞注云似土𤓰而土𤓰自謂之藈姑又名鉤􅌣則菟𤓰别是一物也又曰芴菲亦謂之土𤓰别是一物非此土𤓰也異類同名甚多不可不辨時珍曰土𤓰其根作土氣其實似𤓰也或云根味如𤓰故名土𤓰王字不知何義𤓰似雹子熟則色赤鴉喜食之故俗名赤雹老鴉𤓰一葉之下一鬚故俚人呼為公公鬚與地黄苗名婆婆奶可為屬對集解别錄曰生魯地平澤田野及人家垣牆間三月采根隂乾𢎞景曰今土𤓰生籬院間子熟時赤如彈丸其根不入大方正單行小小爾鄭𤣥注月令四月王𤓰生以為菝葜殊謬矣恭曰四月生苗延蔓葉似栝樓葉但無乂缺有毛刺五月開黄花花下結子如彈丸生青熟赤根似葛而細多糝謂之土𤓰根北間者其子纍纍相連大如棗皮黄肉白苗子相似根狀不同若療黄疸破血南者大勝也宗奭曰王𤓰其殻徑寸長二寸許上微圓下尖長七八月熟紅赤色殻中子如螳螂頭者今人又謂之赤雹子其根即土𤓰根也於細根上又生淡黄根三五相連如大指許根與子兩用時珍曰王𤓰三月生苗其蔓多鬚嫩時可茹其葉圓如馬蹄而有尖面青背淡澁而不光六七月開五出小黄花成簇結子纍纍熟時有紅黄二色皮亦粗澁根不似葛但如栝樓根之小者澄粉甚白膩須深掘二三尺乃得正根江西人栽之沃土取根作蔬食味如山藥根氣味苦寒無毒權曰平藏器曰有小毒能吐下人取汁制雄汞主治消渴内痺瘀血月閉寒熱酸疼益氣愈聾本經療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水治馬骨刺人瘡别錄天行熱疾酒黄病壯熱心煩悶熱勞排膿消撲損瘀血破癥癖落胎大明主蠱毒小兒閃癖痞滿痰瘧并取根及葉搗汁少少服當吐下藏器利大小便治面黑面瘡時珍附方舊五新七小兒發黄土𤓰根生搗汁三合與服不過三次蘇頌圖經黄疸變黑醫所不能治用土𤓰根汁平旦溫服一小升午刻黄水當從小便出不出再服小便如泔乃腎虚也王𤓰散用王𤓰根一兩白石脂二兩菟絲子酒浸二兩桂心一兩牡蠣粉一兩為末每服二錢大麥粥飲下衛生寶鑒小便不通土𤓰根搗汁入少水解之筒吹入下部肘后方大便不通上方吹入肛門内二便不通前後吹之取通肘后方乳汁不下土𤓰根為末酒服一錢一日二服楊氏産乳方經水不利帶下少腹滿或經一月再見者土𤓰根散主之土𤓰根芍藥桂枝䗪蟲各三兩為末酒服方寸匕日三服仲景金匱方婦人隂㿗方同上一切漏疾土𤓰根搗傅之燥則易千金方中諸蠱毒土𤓰根大如指長三寸切以酒半升漬一宿服當吐下外臺祕要面上痱㾦土𤓰根搗末漿水和匀入夜别以漿水洗面塗藥且復洗之百日光彩射人夫妻不相識也曾用有效肘後方耳聾灸法濕土𤓰根削半寸塞耳内以艾灸七壯毎旬一炙愈乃止聖濟錄子氣味酸苦平無毒主治生用潤心肺治黄病炒用治肺痿吐血腸風瀉血赤白痢大明主蠱毒甄權反胃吐食時珍附方新八消渴飲水雹𤓰去皮毎食後嚼二三兩五七度瘥聖惠方𫝊尸勞瘵赤雹兒俗名王𤓰焙為末每酒服一錢十藥神書反胃吐食馬雹兒燈上燒存性一錢入好棗肉平胃散末二錢酒服食即可下即野甜𤓰北方多有之丹溪纂要痰熱頭風懸栝樓一箇赤雹兒七箇焙大力子即牛旁子焙四兩為末每食後茶或酒服三錢忌動風發熱之物筋骨痛攣馬雹兒子炒開口為末酒服一錢日二服集簡方赤目痛濇不可忍小圓𤓰􅕕籬上大如彈丸紅色皮上有刺者九月十月采日乾槐花炒赤芍藥等分為末毎服二錢臨臥溫酒下家衛生寶方瘀血作痛赤雹兒燒存性研末無灰酒空心服二錢集簡方大腸下血王𤓰一兩燒存性地黄二兩黄連半兩為末蜜丸梧子大米飲下三十丸指南方葛本經中品校正併入開寶葛粉釋名雞齊本經鹿藿别錄黄斤别錄時珍曰葛從曷諧聲也鹿食九草此其一種故曰鹿藿黄斤未詳集解别錄曰葛根生汶山山谷五月采根曝乾𢎞景曰即今之葛根人皆蒸食之當取入土深大者破而日乾之南康廬陵間最勝多肉而少筋甘美但為藥不及耳恭曰葛雖除毒其根入土五六寸已上者名葛脰脰者頸也服之令人吐以有微毒也本經葛穀即是其實也頌曰今處處有之江浙猶多春生苗引藤蔓長一二丈紫色葉頗似楸葉而小色青七月著花粉紫色似豌豆花不結實根形大如手臂紫黒色五月五日午時采根曝乾以入土深者為佳今人多作粉食宗奭曰澧鼎之間冬月取生葛搗爛入水中揉出粉澄成垜入沸湯中良久色如膠其體甚靭以蜜拌食􅎄入生薑少許尤妙又切入茶中待賓雖甘而無益又將生葛根煮熟作果實賣吉州南安亦然時珍曰葛有野生有家種其蔓延長取治可作絺綌其根外紫内白長者七八尺其葉有三尖如楓葉而長面青背淡其花成穗纍纍相綴紅紫色其萸如小黄豆莢亦有毛其子綠色扁扁如鹽梅子核生嚼腥氣八九月采之本經所謂葛穀是也唐蘇恭亦言葛穀是實而宋蘇頌謂葛花不結實誤矣其花晒乾亦可食葛根氣味甘辛平無毒别錄曰生根汁大寒好古曰氣平味甘升也陽也陽明經行經的藥也主治消渴身大熱嘔吐諸痺起隂氣解諸毒本經療傷寒中風頭痛解肌發表出汗開腠理療金瘡止脇風痛别錄治天行上氣嘔逆開胃下食解酒毒甄權治胸膈煩熱發狂止血痢通小腸排膿破血𫝊蛇蠱囓罯毒箭傷太明殺野葛巴豆百藥毒之才生者墮胎蒸食消酒毒可斷穀不飢作粉尤妙藏器作粉止渴利大小便解酒去煩熱壓丹石傅小兒熱瘡搗汁飲治小兒熱痞開寶猘狗傷搗汁飲并末傅之蘇恭散鬱火時珍發明𢎞景曰生葛搗汁飲解溫病發熱五月五日中時取根為屑療金瘡斷血為要藥亦療瘧及瘡至良頌曰張仲景治傷寒有葛根湯以其主大熱解肌發腠理故也元素曰升陽生津脾虚作渴者非此不除勿多用恐傷胃氣張仲景治太陽陽明合病桂枝湯内加麻黄葛根又有葛根黄芩黄連解肌湯是用此以斷太陽入陽明之路非即太陽藥也頭顱痛如破乃陽明中風可用葛根葱白湯為陽明仙藥若太陽初病未入陽明而頭痛者不可便服升麻葛根發之是反引邪氣入陽明為引賊破家也震亨曰凡㿀痘已見紅㸃不可用葛根升麻湯恐表虚反増㿀爛也杲曰乾葛其氣輕浮鼓舞胃氣上行生津液又解肌熱治脾胃虛弱泄瀉聖藥也徐用誠曰葛根氣味俱薄輕而上行浮而微降陽中隂也其用有四止渴一也解酒二也發散表邪三也發瘡疹難出四也時珍曰本草十劑云輕可去實麻黄葛根之屬葢麻黄乃太陽經藥兼入肺經肺至皮毛葛根乃陽明經藥兼入脾經脾主肌肉所以二味藥皆輕揚發散而所入逈然不同也附方舊十五新八數種傷寒庸人不能分别今取一藥兼治天行時氣初覺頭痛内熱脈洪者葛根四兩水二升入豉一升煮取半升服生薑汁尤佳傷寒類要時氣頭痛壯熱生葛根洗淨搗汁一大盞䜴一合煎六分去滓分服汗出即瘥未汗再服若心熱加巵子仁十枚聖惠方傷寒頭痛二三日發熱者葛根五兩香䜴一升以童子小便八升煎取二升分三服食䓤粥取汗梅師方妊娠熱病葛根汁二升分二服傷寒類要預防熱病急黄賊風葛粉二升生地黄一升香豉半升為散每食後米飲服方寸匕日三服有病五服龎安常傷寒論辟瘴不染生葛搗汁一小盞服去熱毒氣也聖惠方煩躁熱渴葛粉四兩先以水浸粟米半升一夜漉出拌勻煮熟以糜飲和食食醫心鏡小兒熱渴久不止葛根半兩水煎服方聖惠乾嘔不息葛根搗汁服一升瘥肘后方小兒嘔吐壯熱食癎葛粉二錢水二合調勻傾入錫鑼中重湯盪熟以糜飲和食昝殷食醫心鏡心熱吐血不止生葛搗汁半升頓服立瘥廣利方衂血不止生葛搗汁服三服即止聖惠方熱毒下血因食熱物發者生葛根二斤搗汁一升入藕一升和服梅師方傷筋出血葛根搗汁飲乾者煎服仍熬屑傅之外臺祕要䐴腰疼痛生葛根嚼之嚥汁取效乃止肘后方金創中風痓强欲死生葛根四大兩以水三升煮取一升去滓分服口噤者灌之若乾者搗末調三指撮仍以此及竹瀝多服取效貞元廣利方服藥過劑苦煩生葛汁飲之乾者煎汁服后肘方酒醉不醒生葛汁飲二升便愈千金方諸藥中毒發狂煩悶吐下欲死葛根煮汁服肘后方解中鴆毒氣欲絶者葛粉三合水三盞調服口噤者灌之聖惠方虎傷人瘡生葛煮濃汁洗之仍搗末水服方寸匕日夜五六服梅師方葛穀氣味甘平無毒主治下痢十歲已上本經解酒毒時珍葛花氣味同穀主治消酒别錄𢎞景曰同小豆花乾末酒服飲酒不醉也腸風下血時珍葉主治金瘡止血挼傅之别錄蔓主治卒㗋痺燒研水服方寸匕蘇恭消癰腫時珍附方新三婦人吹乳葛蔓燒灰酒服二錢三服效衛生易簡方癤子初起葛蔓燒灰水調𫝊之即消千金方小兒口噤病在咽中如麻豆許令兒吐沫不能乳食葛蔓燒灰一字和乳汁㸃之即瘥聖惠方附錄鐵葛拾遺藏器曰根味甘溫無毒主一切風血氣羸弱令人性健久服治風緩偏風生山南峽中葉似枸杞根如葛黒色黄環本經下品狼跋子别錄下品釋名凌泉本經大就本經就葛唐本生芻吳普根韭吳普實名狼跋子别錄度穀唐本時珍曰此物葉黃而圓故名黄環如蘿藦呼白環之義亦是葛類故名就葛跋乃狼足名其莢似之故曰狼跋子集解别錄曰黄環生蜀郡山谷三月采根隂乾普曰蜀黄環一名生芻二月生苗正赤髙二尺葉黄圓端大經日葉有汁黄白五月實圓三月采根黄色從理如車輻解𢎞景曰似防己亦作車輻理解蜀都賦云青珠黄環即此或云是大㦸花定非矣用甚稀市人尠有識者又曰狼跋子出交廣形扁扁制搗以雜木投水中魚無大小皆浮出而死恭曰黄環惟襄陽大有餘處雖有亦稀巴西人謂之就葛今園庭亦種之作藤生大者莖徑六七寸根亦葛類陶云似防己者近之取葛根誤食之吐利不止土漿解之此真黄環也今太常收劍南來者乃雞屎葛根非黄環也其花紫色其子名狼跋子角生似皂莢交廣送入太常者正是黄環子也花實與葛同時時珍曰吳普所説甚詳而唐宋本草不收何也范子計然云黄環出魏郡以黄色者為善黄環根也氣味苦平有毒普曰神農黄帝有毒桐君扁鵲苦權曰大寒有小毒之才曰鳶尾為之使惡茯苓防己乾薑主治蠱毒鬼疰鬼魅邪氣在臟中除欬逆寒熱本經治上氣急及百邪甄權治痰嗽消水腫利小便時珍附方新一水腫黄環根晒乾每服五錢水煎服小便利為效儒門事親狼跋子氣味苦寒有小毒主治惡瘡蝸疥殺蟲魚别錄苦酒磨塗瘡疥效𢎞景天門冬本經上品釋名虋冬音門顚勒本經顚棘爾雅天棘綱目萬歲藤禹錫曰按爾雅云蘠蘼虋冬注云門冬也一名滿冬抱朴子云一名顚棘或名地門冬或名筵門冬在東岳名淫羊藿在中岳名天門冬在西岳名菅松在北岳名無不愈在南岳名百部在京陸山阜名顚勒在越人名浣草雖處處有之其名不同其實一也别有百部草其根有百許如一而苗小異其苗似菝葜惟可治欬不中服食須分别之時珍曰草之茂者為虋俗作門此草蔓茂而功同麥門冬故曰天門冬或曰天棘爾雅云髦顚棘也因其細葉如髦有細棘也顚天音相近也按救荒本草云俗名萬歲藤又名婆蘿樹其形與治肺之功頗同百部故亦名百部也蘠蘼乃營實苗而爾雅指為門冬葢古書錯簡也集解别錄曰天門冬生奉髙山谷二月三月七月八月采根曝乾𢎞景曰奉髙泰山下縣名也今處處有之以髙地大根味甘者為好桐君藥錄云蔓生葉有刺五月花白十月實黒根數十枚張華博物志云天門冬莖間有逆刺若葉滑者名絺體一名顚棘挼根入湯可以浣縑素白如絨紵類也今越人名為浣草勝於用灰此非門冬乃相似爾按此説與桐君之説相亂今人所采皆是有刺者本名顚勒亦粗相似用此浣衣則淨不復更有門冬恐門冬自一種或即是浣草耶又有百部根亦相類但苗異爾恭曰此有二種一種苗有刺而濇一種無刺而滑皆是門冬俗云顚棘浣草者形貌詺之雖作數名終是一物二根浣垢俱淨門冬浣草互名也詺音命目之也頌曰處處有之春生藤蔓大如釵股髙至丈餘葉如茴香極尖細而疎滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬夏生細白花亦有黄色及紫色者秋結黒子在其根枝旁入伏後無花暗結子其根白或黄紫色大如手指圓實而長二三寸大者為勝一科一二十枚同撮頗與百部根相類洛中出者大葉粗􅆬殊不相類嶺南者無花餘無他異禹錫曰抱朴子言生髙地根短味甜氣香者為上生水側下地葉似細蘊而微黄根長而味多苦氣臭者次之若以服食令人下氣為益又遲也入山便可蒸煮啖之斷穀或為散仍取汁作酒服散尤佳時珍曰生苗時亦可以沃地栽種子亦堪種但晚成根修治𢎞景曰門冬采得蒸剝去皮食之甚甘美止飢雖曝乾猶脂潤難搗必須曝於日中或火烘之今人呼苗為棘刺煮作飲宜人而終非眞棘刺也頌曰二三七八月采根蒸剝去皮四破去心曝乾用斆曰采得去皮心用柳木甑及柳木柴蒸一伏時洒酒令遍更添火蒸作小架去地二尺攤于上曝乾用氣味苦平無毒别錄曰甘大寒好古曰氣寒味微苦而辛氣薄味厚陽中之隂入手太隂足少隂經氣分之藥之才曰垣衣地黄貝母為之使畏曽青捐之曰服天門冬禁食鯉魚誤食中毒者浮萍汁解之搗汁制雄黄硇砂主治諸暴風濕偏痺强骨髓殺三蟲去伏尸久服輕身益氣延年不飢本經保定肺氣去寒熱養肌膚利小便冷而能補别錄肺氣欬逆喘息促急肺萎生癰吐膿除熱通腎氣止消渴去熱中風治濕疥宜久服煮食之令人肌體滑澤白淨除身上一切惡氣不潔之疾甄權鎭心潤五臟補五勞七傷吐血治嗽消痰去風熱煩悶大明主心病嗌乾心痛渴而欲飲痿蹷嗜臥足下熱而痛好古潤燥滋隂清金降火時珍陽事不起宜常服之思邈發明權曰天門冬冷而能補患人五虛而熱者宜加用之和地黄為使服之耐老頭不白宗奭曰治肺熱之功為多其味苦專泄而不專收寒多人禁服之元素曰苦以泄滯血甘以助元氣及治血妄行此天門冬之功也保定肺氣治血熱侵肺上氣喘促宜加人參黄茋為主用之神效嘉謨曰天麥門冬並入手太隂祛煩解渴止欬消痰而麥門冬兼行手少隂清心降火使肺不犯邪故止欬立效天門冬行足少隂滋腎助元全其母氣故清痰殊功葢腎主津液燥則凝而為痰得潤劑則化所謂治痰之本也好古曰手太隂足太隂經營衛枯涸宜以濕劑潤之天門冬人參五味枸把子同為生脈之劑此上焦獨取寸口之意趙繼宗曰五藥雖為生脈之劑然生地黄貝母為天門冬之使地黄車前為麥門冬之使茯苓為人參之使若有君無使是獨行無功也故張三丰與胡濙尚書長生不老方用天門冬三月地黄一斤乃有君而有使也禹錫曰抱朴子言入山便可以天門冬蒸煮啖之取足以斷穀若有力可餌之或作散酒服或搗汁作液膏服至百日丁壯兼倍駛于术及黄精也二百日强筋髓駐顔色與煉成松脂同蜜丸服尤善杜紫微服之御八十妾一百四十歲日行三百里慎微曰列仙傳云赤松子服天門冬齒落更生細髮復出太原甘始服天門冬在人間三百餘年聖化經云以天門冬茯苓等分為末日服方寸匕則不畏寒大寒時單衣汗出也時珍曰天門冬清金降火益水之上源故能下通腎氣入滋補方合羣藥用之有效若脾胃虚寒人單餌旣久必病腸滑反成痼疾此物性寒而潤能利大腸故也附方舊三新十四服食法孫眞人枕中記云八九月采天門冬根曝乾為末每服方寸匕日三服無問山中人間久服補中益氣治虚勞絶傷年老衰損偏枯不隨風濕不仁冷痺惡瘡癰疽癩疾鼻柱敗爛者服之皮脱蟲出釀酒服去癥病積聚風痰顚狂三蟲伏尸除濕痺輕身益氣令人不飢百日還年耐老釀酒初熟微酸久停則香美諸酒不及也忌鯉魚臞仙神隠云用乾天門冬十斤杏仁一斤搗末蜜漬毎服方寸匕名仙人糧辟穀不飢天門冬二斤熟地黄一斤為末煉蜜丸彈子大每溫酒化三丸日三服居山逺行辟穀良服至十日身輕目明二十日百病愈顔色如花三十日髮白更黒齒落重生五十日行及奔馬百日延年麻又法天門冬搗汁微火煎取五斗入白蜜一斗胡炒末二升合煎至可丸即止火下大豆黄末和作餅徑三寸厚半寸一服一餅一日三服百日已上有益又法天門冬末一升松脂末一升蠟蜜一升和煎丸如梧子大每日早午晚各服三十丸天門冬酒補五臟調六腑令人無病天門冬三十斤去心搗碎以水二石煮汁一石糯米一斗細麴十斤如常炊釀酒熟日飲三盃天門冬膏去積聚風痰補肺療欬嗽失血潤五臟殺三蟲伏尸除瘟疫輕身益氣令人不飢以天門冬流水泡過去皮心搗爛取汁砂鍋文武炭火煮勿令大沸以十斤為率熬至三斤却入蜜四兩熬至滴水不散瓶盛埋土中一七去火毒每日早晚白湯調服一匙若動大便以酒服之醫方摘要肺痿欬嗽吐涎沫心中溫溫咽燥而不渴生天門冬搗汁一斗酒一斗飴一升紫苑四合銅器煎至可丸每服杏仁大一丸日三服肘后方隂虚火動有痰不堪用燥劑者天門冬一斤水浸洗去心取肉十二兩石臼搗爛五味子水洗去核取肉四兩晒乾不見火共搗九梧子大每服二十丸茶下日三服簡便方滋隂養血溫補下元三才丸用天門冬去心生地黄二兩二味用柳甑箄以酒洒之九蒸九晒待乾秤之人參一兩為末蒸棗肉搗和丸梧子大每服三十丸食前溫酒下日三服潔古活法機要虛勞體痛天門冬末酒服方寸匕日三忌鯉魚千金方肺勞風熱止渴去熱天門冬去皮心煮食或曝乾為末蜜丸服尤佳亦可洗面孟詵食療婦人骨蒸煩熱寢汗口乾引飲氣喘天門冬十兩麥門冬八兩並去心為末以生地黄三斤取汁熬膏和丸梧子大每服五十丸以逍遥散去甘草煎湯下活法機要風顚發作則吐耳如蟬鳴引脇牽痛天門冬去心皮曝搗為末酒服方寸匕日三服久服良外臺祕要小腸偏墜天門冬三錢烏藥五錢以水煎服吳球活人心統面黑令白天門冬曝乾同蜜搗作丸日用洗面錄聖濟總口瘡連年不愈者天門冬麥門冬並去心𤣥參等分為末煉蜜丸彈子大毎噙一九乃僧居寮所傳方也齊徳之外科精義諸般癰腫新掘天門冬三五兩洗淨沙盆擂細以好酒濾汁頓服未效再服必愈此祖傳經驗方也虞傅醫學正傳百部别錄中品釋名婆婦草日華野天門冬綱目時珍曰其根多者百十連屬如部伍然故以名之集解𢎞景曰山野處處有之其根數十相連似天門冬而苦强但苗異爾博物志云九眞一種草似百部但長大爾懸火上令乾夜取四五寸切短含嚥汁主暴嗽甚良名為嗽藥疑此即百部也其土肥潤是以長大也藏器曰天門冬根有十餘莖圓短實潤味甘百部多者五六十莖長尖内虚味苦不同苗蔓亦别今人以門冬當百部説不明也頌曰今江湖淮陜齊魯州郡皆有之春生苗作藤蔓葉大而尖長頗似竹葉而青色而光根下一撮十五六枚黄白色二三八月采曝乾用時珍曰百部亦有細葉如茴香者其莖青肥嫩時亦可煮食其根長者近尺新時亦肥實但乾則虚瘦無脂潤爾生時擘開去心曝之鄭樵通志言葉如薯蕷者謬矣根修治斆曰凡采得以竹刀劈去心皮花作數十條懸簷下風乾却用酒浸一宿漉出焙乾剉用或一窠八十三條者號曰地仙苗若修士餌之可千歲也氣味甘微溫無毒權曰甘無毒大明曰苦無毒恭曰微寒有小毒時珍曰苦微甘無毒主治欬嗽上氣火炙酒漬飲之别錄治肺熱潤肺甄權治𫝊尸骨蒸勞治疳殺蚘蟲寸白蟯蟲及一切樹木蛀蟲燼之即死殺虱及蠅蠓大明𢎞景曰作湯洗牛犬去虱火炙酒浸空腹飲治疥癬去蟲蠶咬毒藏器發明時珍曰百部亦天門冬之類故皆治肺病殺蟲但百部氣溫而不寒寒嗽宜之天門冬性寒而不熱熱嗽宜之此為異耳附方舊五新五暴欬嗽張文仲方用百部根漬酒每溫服一升日三服葛洪方用百部生薑各搗汁等分煎服二合煎續十全方用百部藤根搗自然汁和蜜等分沸湯膏噙嚥普濟方治卒欬不止用百部根懸火上炙乾每含嚥汁勿令人知小兒寒嗽百部丸用百部炒麻黄去節各七錢半為末杏仁去皮尖炒仍以水畧煮三五沸研泥入熟蜜和丸皂子大每服二三丸溫水下錢乙小兒方三十年嗽百部根二十斤搗取汁煎如飴服方寸匕日三服深師加蜜二斤外臺加飴一斤千金方遍身黄腫掘新鮮百條根洗搗罨臍上以糯米飯半升拌水酒半合揉軟葢在藥上以帛包住待一二日後口内作酒氣則水從小便中出腫自消也百條根一名野天門冬一名百奶狀如葱頭其苗葉柔細一根下有百餘箇數楊氏經驗方誤吞銅錢百部根四兩酒一升漬一宿溫服一升日再服外臺祕要百蟲入耳百部炒研生油調一字于耳門上聖濟錄熏衣去虱百部秦芃為末入竹籠燒烟熏之自落亦可煮湯洗衣經驗方附錄白并别錄曰味苦無毒主肺欬上氣行五臓令百病不起一名王富一名箭簳生山陵葉如小竹根黄皮白三月四月采根曝乾時珍曰此物氣味主治俱近百部故附之何首烏宋開寶釋名交藤本傳夜合本傳陳知白開寶馬肝石綱目地精本傳桃柳藤日華九眞藤綱目赤葛斗門瘡帚綱目紅内消大明曰其藥本草無名因何首烏見藤夜交何即采食有功因以采人為名爾時珍曰漢武時有馬肝石能治人髮故後人隱此名亦曰馬肝石赤者能消腫毒外科呼為瘡帚紅内消斗門方云取根若獲九數者服之乃仙故名九真藤集解頌曰何首烏本出順州南河縣今在處有之嶺外江南諸州皆有以西洛嵩山及河南栢城縣者為勝春生苗蔓延竹木牆壁間莖紫色葉葉相對如薯蕷而不光澤夏秋開黄白花如葛勒花結子有稜似蕎麥而雜小纔如粟大秋冬取根大者如拳各有五稜瓣似小甜𤓰有赤白二種赤者雄白者雌一云春采根秋采花九蒸九曝乃可服此藥本名交藤因何首烏服而得名也唐元和七年僧文象遇茅山老人遂傳此事李翺乃著何首烏傳云何首烏者順州南河縣人祖名能嗣父名延秀能嗣本名田兒生而閹弱年五十八無妻子常慕道術隨師在山一日醉臥山野忽見有藤二株相去三尺餘苗蔓相交久而方解解了又交田兒驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之答曰子旣無嗣其藤乃異此恐是神仙之藥何不服之遂杵為末空心酒服一錢七日而思人道數月似强健因此常服又加至二錢經年舊疾皆痊髮烏容少十年之内即生數男乃改名能嗣又與其子延秀服皆壽百六十歲延秀生首烏首烏服藥亦生數子年百三十歲髮猶黑有李安期者與首烏鄉里親善竊得方服其壽亦長遂敘其事傳之云何首烏味甘性溫無毒茯苓為使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虚敗劣長筋力益精髓壯氣駐顔黒髮延年婦人惡血痿黄産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名何首烏本出處州江南諸道皆有苗如木藁葉有光澤形如桃柳其背偏皆單生不相對有雌雄雄者苗色黄白雌者黄赤根逺不過三尺夜則苗蔓相交或隱化不見春末夏中秋初三時候晴明日兼雌雄采之乘潤以布帛拭去泥生勿損皮烈日曝乾密器貯之每月再曝用時去皮為末酒下最良遇有疾即用茯苓湯下為使凡服用偶日二四六八日服訖以衣覆汗出導引尤良忌猪肉血羊血無鱗魚觸藥無力其根形大如拳連珠其有形如鳥獸山岳之狀者珍也掘得去皮生喫得味甘甜可作糧讃曰神效助道著在仙書雌雄相交夜合晝疏服之去穀日居月諸返老還少變安病軀有緣者遇最爾自如南明州刺史李逺附錄云何首烏以出南河縣及嶺恩州韶州潮州賀州廣州潘州四㑹縣者為主邕州桂州康州春州髙州勒州循州晉興縣出者次之眞仙草也五十年者如拳大號山奴服之一年髮髭青黑一百年者如盌大號山哥服之一年顔色紅悦一百五十年者如盎大號山伯服之一年齒落更生二百年者如斗栲栳大號山翁服之一年顔如童子行及奔馬三百年者如三斗栲栳大號山精純陽之體久服成地仙也時珍曰凡諸名山深山産者即大而佳也根修治志曰春夏秋采其根雌雄共用乘濕以布拭去土曝乾臨時以苦竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵器愼微曰方用新采者去皮銅刀切薄片入甑内以瓷鍋蒸之旋以熱水從上淋下勿令滿溢直候無氣息乃取出曝乾用時珍曰近時治法用何首烏赤白各一斤竹刀刮去粗皮米泔浸一夜切片用黒豆三斗毎次用三升三合三勺以水泡過砂鍋内鋪豆一層首烏一層重重鋪盡蒸之豆熟取出去豆將何首烏晒乾再以豆蒸如此九蒸九晒乃用氣味苦濇微溫無毒時珍曰茯苓為之使忌諸血無鱗魚蘿蔔蒜葱鐵器同于地黄能伏硃砂主治瘰癧消癰腫療頭面風瘡治五痔止心痛益血氣黑髭髮悦顔色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾開寶久服令人有子治腹臟一切宿疾冷氣腸風大明瀉肝風好古發明時珍曰何首烏足厥隂少隂藥也白者入氣分赤者入血分腎主閉藏肝主疏泄此物氣溫味苦濇苦補腎温補肝能收斂精氣所以能養血益肝固精益腎健筋骨烏髭髪為滋補良藥不寒不燥功在地黄天門冬諸藥之上氣血太和則風虛癰腫瘰癧諸疾可知矣此藥流傳雖久服者尚寡嘉靖初邵應節眞人以七寶美髯丹方上進世宗肅皇帝服餌有效連生皇嗣於是何首烏之方天下大行矣宋懷州知州李治與一武臣同官怪其年七十餘而輕健面如渥丹能飲食叩其術則服何首烏丸也乃傳其方後治得病盛暑中半體無汗已二年竊自憂之造丸服至年餘汗遂浹體其活血治風之功大有補益其方用赤白何首烏各半斤米泔浸三夜竹刀刮去皮切焙石臼為末煉蜜丸梧子大每空心溫酒下五十丸亦可末服附方舊四新十二七寶美髯丹烏鬚髮壯筋骨固精氣續嗣延年用赤白何首烏各一斤米泔水浸三四日瓷片刮去皮用淘淨黒豆二升以砂鍋木甑鋪豆及首烏重重鋪葢蒸之豆熟取出去豆暴乾換豆再蒸如此九次曝乾為末赤白茯苓各一斤去皮研末以水淘去筋膜及浮者取沉者捻塊以人乳十盌浸勻晒乾研末牛膝八兩去苗酒浸一日同何首烏第七次蒸之至第九次止晒乾當歸八兩酒浸晒枸杞子八兩酒浸晒兔絲子八兩酒浸生芽研爛晒補骨脂四兩以黒脂麻炒香並忌鐵器石臼為末煉蜜和丸彈子大一百五十丸毎日三丸清晨温酒下午時薑湯下臥時鹽湯下其餘竝丸梧子大毎日空心酒服一百丸久服極驗忌見前積善堂方服食滋補和劑局方何首烏丸專壯筋骨長精髓補血氣久服黑鬚髪壯陽道令人多子輕身延年月計不足歲計有餘用何首烏三斤銅刀切片乾者以米泔水浸軟切之牛膝去苗一斤切以黑豆一斗淘淨用本甑鋪豆一層鋪藥一層重重鋪盡瓦鍋蒸至豆熟取出去豆曝乾換豆又蒸如此三次為未蒸棗肉和丸梧子大每服三五十丸空心溫酒下忌見前隂鄭巖山中丞方只用赤白何首烏各半斤去粗皮乾石臼杵未毎旦無灰酒服二錢竹積善堂方用赤白何首烏各半極大者八月采以刀削去皮切片用米泔水浸一宿晒乾以壯婦男兒乳汁拌晒三度候乾木臼舂為末以蜜雲棗肉和杵為丸如梧子大毎服二十丸每十日加十丸至百丸止空心溫酒鹽湯任下一方不用人乳分筆峯雜興方用何首烏雌雄各半斤分作四分一用當歸汁浸一分生地黄汁浸一分旱蓮汁浸一分人乳浸三日取出各曝乾瓦焙石臼為末蒸棗肉和丸梧子大每服四十丸空心百沸湯下禁忌見前骨軟風疾腰膝疼行步不得遍身瘙痒用何首烏大而有花紋者同牛膝各一斤以好酒一斤浸七宿曝乾木臼杵末棗肉和丸梧子大每一服三五十丸空心酒下經驗方寛筋治損何首烏十斤生黒豆半斤同煎熟皂莢一斤燒存性牽牛十兩炒取頭末薄荷十兩木香牛膝各五兩川烏頭炮二兩為末酒糊丸梧子大每服三十丸茶湯下永類方皮裏作痛不問何處用何首烏末薑汁調成膏塗之以帛裹住火炙鞋底熨之經驗方自汗不止何首烏末津調封臍中集簡方腸風臟毒下血不止何首烏二兩為末食前米飲服二錢聖惠方小兒龜背龜尿調紅内消貼背上骨節久久自安破傷血出何首烏末傅之即止神效筆峰雜興方瘰癧結核或破或不破下至胸前者皆治之用九眞藤一名赤葛即何首烏其葉如杏其根如雞卵亦類癧子取根洗淨日日生嚼并取葉搗塗之數服即止其藥久服延年黒髮用之神效斗門方癰疽毒瘡紅内消不限多少瓶中文武火熬煎臨熱入好無灰酒相等再煎數沸時時飲之其滓焙研為末酒煮麵糊丸梧子大空心溫酒下三十丸疾退宜常服之即赤何首烏也建昌産者良陳自明外科精要大風癘疾何首烏大而有花紋者一斤米泔浸一七九蒸九晒胡麻四兩九蒸九晒為末毎酒服二錢日二聖惠方疥癬滿身不可治者何首烏艾葉等分水煎濃湯洗浴甚能解痛生肌肉王衮博濟方莖葉主治風瘡疥癬作痒煎湯洗浴甚效時珍本草綱目卷十八上
