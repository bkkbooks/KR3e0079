body:
  text: 本草綱目卷八目録金石部李時珍曰石者氣之核土之骨也大則為岩巖細則為砂塵其精為金為玉其毒為礜為磇氣之凝也則結而為丹青氣之化也則液而為礬汞其變也或自柔而剛乳鹵成石是也或自動而靜草木成石是也飛走舍靈之為石自有情而之无情也雷震星隕之為石自无形而成有形也大塊資生鴻鈞鑪韝金石雖若頑物而造化无窮焉身家攸賴財劑衛養金石雖曰死瑶而利用无窮焉是以禹貢周官列其土産農經軒典詳其性功亦良相良醫之所當注意者也迺集其可以濟國郤病者一百六十種為金石部分為四類曰金曰玉曰石曰鹵舊本玉石部三品共二百五十三種今併入二十八種移三十二種入水部三十九種入土部三種入服器部一種入介部一種入人部神農本草經四十一種梁陶𢎞景註名醫别録三十二種同上唐本草一十四種唐蘇恭本草拾遺一十七種唐陳藏器藥性本草一種唐甄權開寶本草九種宋馬志嘉祐本草八種宋掌禹錫圖經本草三種宋蘇頌日華本草八種宋人大明證類本草一種宋唐慎微本草綱目二十六種明李時珍附註魏李當之藥録宋雷斆炮炙呉普本草藥對齊徐之才唐孫思邈千金唐楊損之刪繁李珣海藥蕭炳四聲蜀韓保昇重註陳承别説宋冦宗奭衍義囊金張元素珍珠元李杲注象朱震亨補遺王好古湯液明汪機㑹編徐用誠發揮王綸集要金石之一金類二十八種金别錄銀别録錄黄銀烏附錫恡脂綱目礦即銀銀膏唐本硃砂銀日華赤銅唐本自然銅開寳銅礦石唐本銅青嘉祐鉛日華鉛霜日華粉鉛本經粉即胡鉛丹本經丹即黄宻陀僧唐本錫拾遺古鏡拾遺古文錢日華銅弩牙别錄諸銅器綱目銅匙銅盆銅瓶鈷鈕汁秤錘銅器鐵本經鋼鐵别錄鐵落本經鐵精本經鐵華粉開寳鐵鏽拾遺鐵爇拾遺鐵漿拾遺諸鐵器綱目刀鐶鐵杵脱秤錘鋸鐵釡針鐵刀鏃剪刀故布箭犁鑰匙轄鐵釘銜鐵鏵鐙車馬馬鑱右附方舊五十二新一百八十三金石之二玉類一十四種玉别錄白玉髓别錄青玉别錄玉璧玉玉英合石附青琅玕本經珊瑚唐本馬腦嘉祐寶石綱目玻瓈拾遺水精拾遺石火珠瑌附琉璃拾遺雲母本經白石英本經紫石英本經菩薩石日華右附方舊一十二新一十八本草綱目卷八目錄
