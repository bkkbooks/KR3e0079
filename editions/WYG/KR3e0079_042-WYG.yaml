body:
  text: 本草綱目卷十五目録草之四隰草類上五十三種菊本經野菊拾遺菴䕡本經附對廬蓍本經艾别録附夏臺千年艾綱目茵陳蒿本經青蒿本經黄花蒿綱目白蒿本經角蒿唐本䕲蒿拾遺馬先蒿本經隂地厥圗經牡蒿别録九牛草圗經茺蔚本經草即益母鏨草拾遺薇蓹本經附無心草夏枯草本經劉寄奴草唐本曲節草圖經霜即六月麗春草圗經旋覆花本經青葙子本經靈陶朱術鴈來紅天草思蓂子附雞冠花嘉祐紅藍花開寳畨紅花綱目燕脂綱目大薊小薊别録續㫁本經苦芺别録漏蘆本經飛廉本經苧蔴别録􅔾蔴唐本麻即白大青别録小青圗經胡盧巴嘉祐蠡實本經必即馬藺子似勒附惡實别録蒡即牛葈耳本經耳即蒼天名精本經即蝨地菘鶴豨薟唐本箬綱目蘆别録甘蕉别錄蘘荷别録麻黄本經附雲花草木賊嘉祐附問荆石龍芻本經草即龍須龍常草别錄草即㯶心燈心草開寳右附方舊一百四十四新二百八十六本草綱目卷十五目錄
