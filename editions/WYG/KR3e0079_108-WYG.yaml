body:
  text: 本草綱目卷四十六明李時珍撰介之二蛤蚌類二十九種附一種牡蠣本經上品釋名牡蛤别録蠣蛤本經古賁異物志蠔𢎞景曰道家方以左顧是雄故名牡蠣右顧則牝蠣也或以尖頭為左顧藏器曰萬物皆有牝牡惟蠣是鹹水結成塊然不動隂陽之道何從而生宗奭曰本經不言左顧止從陶説而段成式亦云牡蠣言牡非謂雄也且如牡丹豈有牝丹乎此物無目更何顧盻時珍曰蛤蚌之屬皆有胎生卵生獨此化生純雄無雌故得牡名曰蠣曰蠔言其根大也集解别録曰牡蠣生東海池澤采無時𢎞景曰今出東海永嘉晉安云是百歲鵰所化十一月采以大者為好其生著石皆以口在上舉以腹向南視之口斜向東則是左顧出廣州南海者亦同但多右顧不堪用也丹方及煑鹽者皆以泥釜云耐水火不破漏皆除其甲口止取朏朏如粉耳頌曰今海旁皆有之而通泰及南海閩中尤多皆附石而生磈礧相連如房呼為蠣房晉安人呼為蠔莆初生止如拳石四面漸長至一二丈者嶄巖如山俗呼蠔山毎一房内有肉一塊大房如馬蹄小者如人指面毎潮来諸房皆開有小蟲入則合之以充腹海人取者皆鑿房以烈火逼之挑取其肉當食品其味美好更有益也海族為最貴時珍曰南海人以其蠣房砌墻燒灰粉壁食其肉謂之蠣黄保昇曰又有􅀈蠣形短不入藥用斆曰有石牡蠣頭邊皆大小夾沙石真似牡蠣只是圓如龜殻海牡蠣可用只丈夫服之令人無鬚也其真牡蠣用火煆過以瑿試之隨手走起者是也瑿乃千年琥珀修治宗奭曰凡用須泥固燒為粉亦有生用者斆曰凡真牡蠣先用二十箇以東流水入鹽一兩煑一伏時再入火中煆赤研粉用時珍曰按温隱居云牡蠣将童尿浸四十九日五日一換取出以硫黄末和米醋塗上黄泥固濟煆過用氣味鹹平㣲寒無毒之才曰貝母為之使得甘草牛膝逺志蛇牀子良惡麻黄辛夷吳茱萸伏􅔈砂主治傷寒寒熱温瘧洒洒驚恚怒氣除拘緩鼠瘻女子帶下赤白乆服強骨節殺邪鬼延年本經除留熱在關節營衛虚熱去来不定煩滿心痛氣結止汗止渇除老血療洩精澀大小腸止大小便治喉痺欬嗽心脇下痞熱别録粉身止大人小兒盜汗同麻黄根蛇牀子乾薑為粉去隂汗藏器治女子崩中止痛除風熱風瘧鬼交精出孟詵男子虚勞補腎安神去煩熱小兒驚癎李恂去脇下堅滿瘰癧一切瘡好古化痰耎堅清熱除濕止心脾氣痛痢下赤白濁消疝瘕積塊癭疾結核時珍發明權曰病虚而多熱者宜同地黄小草用之好古曰牡蠣入足少隂為耎堅之劑以柴胡引之能去脇下硬以茶引之能消項上結核以大黄引之能消股間腫以地黄為使能益精收澁止小便腎經血分之藥也成無巳曰牡蠣之鹹以消胸膈之儲以泄水氣使痞者消硬者耎也元素曰牡水之主以制陽光則渇飲不思故蛤蠣之類能止渇也附方舊七新十四心脾氣痛氣實有痰者牡蠣煆粉酒服二錢丹溪心法瘧疾寒熱牡蠣粉杜仲等分為末蜜丸梧子大毎服五十丸温水下普濟方氣虚盜汗上方為末毎酒服方寸匕千金方虚勞盜汗牡蠣粉麻黄根黄茋等分為末毎服二錢水二盞煎七分温服日一本事方産后盜汗牡蠣粉麥麩炒黄等分毎服一錢用猪肉汁調下經騐消渇飲水臘日或端午日用黄泥固濟牡蠣煆赤研末毎服一錢用活鯽魚煎湯調下只二三服愈方經騐百合變渇傷寒傳成百合病如寒無寒如熱無熱欲臥不卧欲行不行欲食不食口苦小便赤色得藥則吐利變成渇疾久不瘥者用牡蠣熬二兩括樓根二兩為細末毎服方寸匕用米飲調下日三服取效張仲景金匱玉函方病后常衂小勞即作牡蠣十分石膏五分為末酒服方寸匕亦可蜜丸日三服肘后方小便淋閟服血藥不效者用牡蠣粉黄蘗炒等分為末毎服一錢小茴香湯下取效醫學集成小便數多牡蠣五兩燒灰小便三升煎二升分三服神效意乾坤生夢遺便溏牡蠣粉醋糊丸梧子大毎服三十丸米飲下日二服丹溪方水病囊腫牡蠣煆粉二兩乾薑炮一兩研末冷水調糊掃上須臾囊熱如火乾則再上小便利即愈一方用葱汁白麪同調小兒不用乾薑初虞世古今録騐方月水不止牡蠣煆研米醋搜成團再煆研末以米醋調艾葉末熬膏丸梧子大毎醋湯下四五十丸普濟方金瘡出血牡蠣粉傅之肘后破傷濕氣口禁強直用牡蠣粉酒服二錢仍外傅之取效三因方發背初起古賁粉灰以雞子白和塗四圍頻上取效千金方癰腫未成用此㧞毒水調牡蠣粉末塗之乾更上姚僧坦集騐方論男女瘰癧經騐用牡蠣煆研末四兩𤣥参末三兩麫糊丸梧子大毎服三十丸酒下日三服服盡除根初虞世云瘰癧不拘已破未破用牡蠣四兩甘草一兩為末毎食后用臘茶湯調服一錢其效如神甲疽潰痛弩肉裹趾甲膿血不瘥者用牡蠣頭厚處生研為末毎服二錢紅花煎酒調下日三服仍用敷之取效勝金方面色黧黑牡蠣粉研末蜜丸梧子大毎服三十丸白湯下日一服并炙其肉食之普濟方肉氣味甘温無毒主治煑食治虚損調中解丹毒婦人血氣以薑醋生食治丹毒酒後煩熱止渇藏器炙食甚美令人細肌膚美顔色蘇頌蚌宋嘉祐釋名時珍曰蚌與蛤同類而異形長者通曰蚌圓者通曰蛤故蚌從中蛤從合皆象形也後世混稱蛤蚌者非也集解𢎞景曰雀入大水為蜃蜃即蚌也藏器曰生江漢渠瀆間老蚌含珠殻堪為粉非大蛤也時珍曰蚌類甚繁今處處江湖中有之惟洞庭漢沔獨多大者長七寸状如牡蠣輩小者長三四寸状如石决明輩其肉可食其殻可為粉湖沔人皆印成錠市之謂之蚌粉亦曰蛤粉古人謂之蜃灰以飾墻壁闉墓壙如今用石灰也肉氣味甘鹹冷無毒宗奭曰性㣲冷多食發風動冷氣震亨曰馬刀蚌蛤螄蜆大同小異寇氏止言冷而不言濕濕生熱熱久則氣上升而生痰生風何冷之有主治止渇除熱解酒毒去眼赤孟詵明目除濕主婦人勞損下血藏器除煩解熱毒血崩帶下痔瘻壓丹石藥毒以黄連末納入取汁㸃赤眼眼暗日華蚌粉氣味鹹寒無毒日華曰能制石亭脂鏡源曰能制硫黄主治諸疳止痢并嘔逆醋調塗癰腫日華爛殻粉治反胃心胸痰飲用米飲服藏器解熱燥濕化痰消積止白濁帶下痢疾除濕腫水嗽明目擦隂瘡濕瘡疿痒時珍發明時珍曰蚌粉與海蛤粉同功皆水産也治病之要只在清熱行濕而已日華言其治疳近有一兒病疳専食此粉不復他食亦一異也附方新六反胃吐食用真正蛤粉毎服稱過二錢搗生薑汁一盞再入米醋同調送下急救良方痰飲咳嗽用真蚌粉新瓦炒紅入青黛少許用淡虀水滴麻油數㸃調服二錢類編云徽宗時李防禦為入内醫官時有寵妃病痰嗽終夕不寐面浮如盤徽宗呼李治之詔令供狀三日不效當誅李憂惶技窮與妻泣别忽聞外呌賣欬𠻳藥一文一貼喫了即得睡李市一貼視之其色淺碧恐藥性獷悍併二服自試之無他及取三貼為一入内授妃服之是夕嗽止比曉面消内侍走報天顔大喜賜金帛直萬緍李恐索方乃尋訪前賣藥人飲以酒厚價求之則此方也云自少時從軍見主帥有此方剽得以度餘生耳癰疽赤腫用米醋和蚌蛤灰塗之待其乾即易之千金雀目夜盲遇夜不能視物用建昌軍螺兒蚌粉三錢為末水飛過雄猪肝一葉披開納粉扎定以第二米泔煑七分一仍别以蚌粉蘸食以汁送下一日作與夜明砂同功直指方脚指濕爛用蚌蛤粉乾搽之壽域積聚痰涎結于胸膈之間心腹疼痛日夜不止或乾嘔噦食者炒粉丸主之用蚌粉一兩以巴豆七粒同炒赤去豆不用醋和粉丸梧子大毎服二十丸薑酒下丈夫臍腹痛茴香湯下女人血氣痛童便和酒下孫氏仁存方馬刀本經下品校正併入拾遺齊蛤釋名馬蛤别錄齊蛤吴普蜌爾雅音陛蠯品脾排三音出周禮蝏䗒音亭蠯單母音善母􅯢岸􅯢音掣名時珍曰俗稱大為馬其形象刀故曰蛤曰庳皆蚌字之音轉也古今方言不同也説文云圓者曰蠣長者曰蠯江漢人呼為單姥汴人呼為􅯢岸吴普本草言馬刀即齊蛤而唐宋本草失收陳藏器重出齊蛤今併為一集解别録曰馬刀生江湖池澤及東海取無時𢎞景曰李當之言生江漢長六七寸食其肉似蚌今人多不識大抵似今蝏䗒而未見方用韓保昇曰生江湖中細長小蚌也長三四寸濶五六分頌曰今處處有之多在沙泥中頭小鋭人亦謂之蚌藏器曰齊蛤生海中状如蛤兩頭尖小海人食之别無功用時珍曰馬刀似蚌而小形狹而長其類甚多長短大小厚薄斜正雖有不同而性味功用大抵則一殻煉粉用氣味辛㣲寒有毒得水爛人腸又曰得水良茶曰得火良時珍曰按吴普云神農岐伯桐君鹹有毒扁鵲小寒大毒藏器曰逺志蠟皆畏齊蛤主治婦人漏下赤白寒熱破石淋殺禽獸賊鼠本經能除五臟間熱肌中鼠鼷止煩滿補中去厥痺利機關别録消水癭氣癭痰飲時珍肉同蚌􅒕䗯音咸進宋嘉祐釋名生䗯嘉祐􅒕蛤水土記集解藏器曰􅒕䗯生東海似蛤而扁有毛頌曰似蛤而長身扁宗奭曰順安軍界河中亦有之與馬刀相似肉頗冷人以作鮓食不堪致逺殻主治燒末服治痔病藏器肉宗奭曰多食發風蜆宋嘉祐釋名扁螺時珍曰蜆晛也殻内光耀如初出日采也隋書云劉臻父顯嗜蜆呼蜆為扁螺集解藏器曰處處有之小如蚌黒色能候風雨以殻飛時珍曰溪湖中多有之其類亦多大小厚薄不一漁家多食之耳肉氣味甘鹹冷無毒藏器曰㣲毒多食發嗽及冷氣消腎主治治時氣開胃壓丹石藥毒及疔瘡下濕氣通乳糟煮食良生浸取汁洗疔瘡蘇恭去暴熱明目利小便下熱氣脚氣濕毒解酒毒目黄浸汁服治消渇日華生蜆浸水洗痘癰無瘢㾗時珍爛殻氣味鹹温無毒主治止痢𢎞景治隂瘡蘇恭療失精反胃日華燒灰飲服治反胃吐食除心胸痰水藏器化痰止嘔治吞酸心痛及暴嗽燒灰塗一切濕瘡與蚌粉同功時珍附方舊一新二卒嗽不止用白蜆殻搗為細末以熟米飲調毎服一錢日三服甚效出急救良方痰喘咳嗽用白蜆殻多年陳者燒過存性為極細末以米飲調服一錢日三服急救方反胃吐食用黄蜆殻并田螺殻並取久在泥中者各等分炒成白灰毎二兩入白梅肉四個搗和為丸再入砂合子内葢定泥固煆存性研細末毎服二錢用人参縮砂湯調下不然用陳米飲調服亦可凡覺心腹脹痛將發反胃即以此藥治之百一方真珠宋開寳釋名珍珠開寳蚌珠南方志蠙珠禹貢集解李珣曰真珠出南海石决明産也蜀中西路女𤓰出者是蚌蛤産光白甚好不及舶上者采耀欲穿須得金剛鑚也頌曰今出亷州北海亦有之生於珠牡亦曰珠母蚌類也按嶺表録異云亷州邉海中有洲島島上有大池謂之珠池毎嵗刺史親監珠户入池採老蚌剖取珠以充貢池雖在海上而人疑其底與海通池水乃淡此不可測也土人採小蚌肉作脯食亦徃徃得細珠如米乃知此池之蚌大小皆有珠也而今之取珠牡者云得之海旁不必是池中也其北海珠蚌種類小别人取其肉或有得珠者不甚光瑩亦不常有不堪入藥又蚌中一種似江珧者腹亦有珠皆不及南海者竒而且多宗奭曰河北溏濼中亦有圍及寸者色多㣲紅珠母與亷州者不相類但清水急流處其色光白濁水及不流處其色暗也時珍曰按亷州志云合浦縣海中有梅青嬰三池蜑人毎以長繩繫腰携籃入水拾蚌入籃即振繩令舟人急取之若有一線之血浮水則塟魚腹矣又熊太古冀越集云禹貢言淮夷蠙珠後世乃出嶺南今南珠色紅西洋珠色白北海珠色㣲青各隨方色也予嘗見蜑人入海取得珠子樹數擔其樹状如栁枝蚌生於樹不可上下樹生于石蜑人鑿石得樹以求蚌甚可異也又南越志云珠有九品以五分至一寸八九分者為大品有光彩一邊似度金者名璫珠次則走珠滑珠等品也格古論云南畨珠色白圓耀者為上廣西者次之北海珠色微青者為上粉白油黄者下也西畨馬價珠為上色青如翠其老色夹石粉青油烟者下也凡蚌聞雷則㾭瘦其孕珠如懐孕故謂之珠胎中秋無月則蚌無胎左思賦云蚌蛤珠胎與月盈虧是矣陸佃云蚌蛤無隂陽牝牡須雀蛤化成故能生珠專一於隂精也龍珠在頷蛇珠在口魚珠在眼􅀈珠在皮鼈珠在足蛛珠在腹皆不及蚌珠也修治李珣曰凡用以新完未經鑚綴者研如粉方堪服食不細則傷人臟腑斆曰凡用以新者絹袋盛之置牡蠣四兩於平底鐺中以物四向支穩然後着珠於上乃下地榆五花皮五方草各剉四兩籠住以漿水不住火煑三日夜取出用甘草湯淘净於臼中搗細重篩更研二萬下方可服食慎㣲曰抱朴子云真珠徑寸以上服食令人長生以酪漿漬之皆化如水銀以浮石蜂巢蛇黄等物合之可引長三四尺為丸服之時珍曰凡入藥不用首飾及見尸氣者以人乳浸三日煮過如上搗研一法以絹袋盛入豆腐腹中煑一炷香云不傷珠也氣味鹹甘寒無毒主治鎮心㸃目去膚瞖障膜塗面令人潤澤好顔色塗手足去皮膚逆臚綿褁塞耳主聾開寶磨瞖墜痰甄權除面䵟止洩合知母療煩熱消渇合左纒根治小兒麩豆瘡入眼李珣除小兒驚熱宗奭安魂魄止遺精白濁解痘疔毒主難産下死胎胞衣時珍發明時珍曰真珠入厥隂肝經故能安魂定魄明目治聾附方舊三新九安魂定魄真珠末豆大一粒蜜一蜆殻和服日三尤宜小兒肘后卒忤不言真珠末用雞冠血和丸小豆大以三四粒納口中肘后灰塵迷目用大珠拭之則明也格古論婦人難産真珠末一兩酒服立出千金胞衣不下真珠一兩研末苦酒服千金子死腹中真珠末二兩酒服立出外臺癍痘不發珠子七枚為末新汲水調服儒門事親痘瘡疔毒方見殻部豌豆下肝虚目暗茫茫不見真珠末一兩白蜜二合鯉魚膽二枚和合銅器煎至一半新綿漉過瓶盛頻㸃取瘥聖惠方青盲不見方同上小兒中風手足拘急真珠末水飛一兩石羔末一錢毎服一錢水七分煎四分温服日三聖惠方目生頑瞖真珠一兩地榆二兩水二大盌煮乾取真珠以醋浸五日熱水淘去醋氣研細末用毎㸃少許以愈為度石决明别録上品釋名九孔螺日華殻名千里光時珍曰决明千里光以功名也九孔螺以形名也集解𢎞景曰俗云是紫貝人皆水漬熨眼頗明又云是鰒魚甲附石生大者如手明耀五色内亦含珠恭曰此是鰒魚甲也附石生状如蛤惟一片無對七孔者良今俗用紫貝全非頌曰今嶺南州郡及莱州海邊皆有之采無時舊注或以為紫貝或以為鰒魚甲按紫貝即今砑螺殊非此類鰒魚乃王莽所嗜者一邊着石光明可愛自是一種與决明相近也决明殻大如手小者如三兩指大可以浸水洗眼七孔九孔者良十孔者不佳海人亦噉其肉宗奭曰登莱海邊甚多人采肉供饌及乾充苞苴肉與殻兩可用時珍曰石决明形長如小蚌而扁外皮甚粗細孔雜雜内則光耀背側一行有孔如穿成者生於石崖之上海人泅水乗其不意即易得之否則緊粘難脱也陶氏以為紫貝雷氏以為真珠牡楊倞註荀子以為龜甲皆非矣惟鰒魚是一種二類故功用相同吴越人以糟决明酒蛤蜊為美品者即此修治珣曰凡用以麫裹煨熟磨去粗皮爛搗再乳細如麫方堪入藥斆曰毎五兩用鹽半兩同東流水入瓷器内煑一伏時搗末研粉再用五花皮地榆阿膠各十兩以東流水淘三度日乾再研一萬下入藥服至十兩永不得食山龜令人䘮目時珍曰今方家只以鹽同東流水煑一伏時研末水飛用殻氣味保昇曰寒功宗奭曰肉與殻同主治目障瞖痛青盲乆服益精輕身别録明目磨障日華肝肺風熱青盲内障骨蒸勞極李珣水飛㸃外障瞖寇宗奭通五淋時珍附方舊一新四羞明怕日用千里光黄菊花甘草各一錢水煎冷服明目集騐方痘後目翳用石决明火煆研谷精草各等分共為細末以猪肝蘸食鴻飛集小便五淋用石决明去粗皮研為末飛過熟水服二錢毎日二服如淋中有軟硬物即加朽木末五分勝金方肝虚目翳凡氣虚血虚肝虚眼白俱赤夜如雞喙生浮瞖者用海蚌殻燒過成灰木賊焙各等分為末毎服三錢用薑棗同水煎和渣通口服毎日服二次經騐方青盲雀目用石决明一兩燒過存性外用蒼术三兩去皮為末毎服三錢以猪肝披開入藥末在内扎定砂礶煮熟以氣薰目待冷食肝飲汁龍目論解白酒酸用石决明不拘多少數個以火煆過研為細末將酒盪熱以决明末攪入酒内葢住一時取飲之其味即不酸海蛤本經上品釋名時珍曰海蛤者海中諸蛤爛殻之總稱不專指一蛤也舊本云一名魁蛤則又指是一物矣係是誤書今削之集解别録曰海蛤生東海保昇曰今登莱滄州海沙湍處皆有四五月淘沙取之南海亦有之恭曰海蛤細如巨勝子光凈瑩滑者好其粗如半杏仁者為㹠耳蛤不堪入藥時珍曰按沈存中筆談云海蛤即海邊沙泥中得之大者如棊子小者如油麻粒黄白色或黄赤相雜葢非一類乃諸蛤之殻為海水礲礪目久光瑩都無舊質蛤類至多不能分别其為何蛤故通謂之海蛤也餘見下條正誤吴普曰海蛤頭有文文如鋸齒時珍曰此乃魁蛤非海蛤也葢誤矣今正之𢎞景曰海蛤至滑澤云從雁屎中得之二三十過方為良今人多取相類者磨蕩之日華曰此是雁食鮮蛤糞出者有文彩為文蛤無文彩為海蛤鄉人又以海邊爛蛤殻風濤打磨瑩净者偽作之藏器曰二説皆非也海蛤是海中爛殻乆在沙泥風波淘洗自然圓净無文有大有小以小者為佳非一一從雁腹中出也文蛤是未爛時殻猶有文者二物本同一類正如爛蜆蚌殻所主亦與生者不同也假如雁食蛤殻豈擇文與不文耶宗奭曰海蛤文蛤陳説極是今海中無雁豈有糞耶蛤有肉時猶可食也肉既無矣安得更糞過二三十次耶陶説謬矣時珍曰海蛤是諸蛤爛殻文蛤自是一種陳氏言文蛤是未爛時殻則亦泛指諸蛤未爛者矣其説未稳但海中蛤蚌名色雖殊性味相類功用亦同無甚分别也修治斆曰凡使海蛤勿用游波蟲骨真相似只是面上無光誤餌之令人狂走欲投水如鬼􅑂惟醋解之立愈其海蛤用漿水煑一伏時毎一兩入地骨皮柏葉各二兩同煑一伏時東流水淘三次搗粉用保昇曰取得以半天河煑五十刻以枸杞汁拌匀入䈽竹筒内蒸一伏時搗用氣味苦鹹平無毒吴普曰神農苦岐伯甘扁鵲鹹權曰有小毒之才曰蜀㯃為之使畏狗膽甘遂芫花主治欬逆上氣喘息煩滿胸痛寒熱本經療隂痿别録主十二水滿急痛利膀胱大小腸唐本治水氣浮腫下小便治嗽逆上氣項下瘤癭甄權療嘔逆胸脇脹急腰痛五痔婦人崩中帶下日華止消渇潤五臟治服丹石人有瘡蕭炳清熱利濕化痰飲消積聚除血痢婦人血結胸傷寒反汗搐搦中風癱瘓時珍附方舊二新七水癊腫滿藏器曰用海蛤杏仁漢防己棗肉各二兩葶藶六兩為末研丸梧子大一服十丸服至利下水為妙水腫發熱小便不通者海蛤湯主之海蛤木通猪苓澤㵼滑石黄葵子桑白皮各一錢燈心三分水煎服日二聖惠方石水肢瘦其腹獨大者海蛤丸主之海蛤煆粉防己各七錢半葶藶赤茯苓桑白皮各一兩陳橘皮郁李仁各半兩為末蜜丸如梧子大毎米飲下五十丸日二次聖濟總録氣腫濕腫用海蛤海帶海藻海螵蛸海昆布鳬􅗔荔枝殻等分流水煎服日二次何氏血痢内熱海蛤末蜜水調服二錢日二傳信傷寒血結胸脹痛不可近仲景無方宜海蛤散主之并刺期門穴用􅀈蛤滑石甘草各一兩芒硝半兩為末毎服二錢雞子清調服更服桂枝紅花湯發其汗則愈盖膻中血聚則小腸壅小腸壅則血不行服此則小腸通則血流行而胸膈利矣朱䏙活人書傷寒搐搦寇宗奭曰傷寒出汗不徹手脚搐者用海蛤川烏頭各一兩川山甲二兩為末酒丸如彈子大揑扁置所患足心下别擘葱白盖藥以帛纒定於暖室中熱水浸脚至膝上水冷又添候遍身汗出為度凡三日一作以知為度中風癱瘓方同上又具鯪鯉甲下衂血不止蛤粉一兩羅七遍槐花半兩炒焦研勻毎服一錢新汲水調下方楊氏家藏文蛤本經上品釋名花蛤時珍曰皆以形名也集解别録曰文蛤生東海表有文取無時𢎞景曰小大皆有紫斑保昇曰今出萊州海中三月中旬采背上有斑文恭曰大者圓三寸小者圓五六分時珍曰按沈存中筆談云文蛤即今吴人所食花蛤也其形一頭小一頭大殻有花斑的便是修治同海蛤氣味鹹平無毒主治惡瘡蝕五痔本經欬逆胸痺腰痛脇急鼠瘻大孔出血女人崩中漏下别録能止煩渇利小便化痰軟堅治口鼻中蝕疳時珍發明時珍曰按成無巳云文蛤之鹹走腎以勝水氣附方舊一新一傷寒文蛤散張仲景云病在陽當以汗解反以冷水噀之或灌之更益煩熱欲水不渇者此散主之文蛤五兩為末毎服方寸匕沸湯下甚效疳蝕口鼻數日欲盡文蛤燒灰以臘猪脂和塗之千金翼蛤蜊梨祐宋嘉釋名時珍曰蛤類之利於人者故名集解機曰蛤蜊生東南海中白殻紫唇大二三寸者閩浙人以其肉充海錯亦作為醤醯其殻火煆作粉名曰蛤蜊粉也肉氣味鹹冷無毒藏曰此物性雖冷乃與丹石人相反食之令腹結痛主治潤五臟止消渇開胃治老癖為寒熱婦人血塊宜煑食之禹錫煑食醒酒𢎞景發明時珍曰按髙武痘疹正宗云俗言蛤蜊海錯能發疹多致傷損脾胃生痰作嘔作瀉此皆嘻笑作罪也又言痘毒入目者以蛤蜊汁㸃之可代空青夫空青得銅之精氣而生性寒可治赤目若痘毒是臟腑毒氣上衝非空青可治蛤蜊雖寒而濕中有火亦不可不知矣蛤蜊粉釋名海蛤粉時珍曰海蛤粉者海中諸蛤之粉以别江湖之蛤粉蚌粉也今人指稱但曰海粉蛤粉宼氏所謂衆蛤之灰是矣近世獨取蛤蜊粉入藥然貨者亦多衆蛤也大抵海中蚌蛤蚶蠣性味鹹寒不甚相逺功能軟散小異大同非若江湖蚌蛤無鹹水浸漬但能清熱利濕而已今藥肆有一種状如線粉者謂之海粉得水則易爛盖後人因名售物也然出海中沙石間故功亦能化痰耎堅修治震亨曰蛤粉用蛤蜊燒煆成粉不入煎劑時珍曰按吴球云凡用蛤粉取紫口蛤蜊殻炭火煆成以熟栝樓連子同搗和成團風乾用最妙正誤機曰丹溪有言蛤粉即是海石寇氏以海石註蛤粉則二物可通用矣海石即海蛤蛤粉即蛤蜊殻燒成也時珍曰海石乃海中浮石也詳見石部汪氏誣引朱寇之説為證陳嘉謨本草又引為據今考二公本書並無前説今正其誤氣味鹹寒無毒主治熱痰濕痰老痰頑痰疝氣白濁帶下同香附末薑汁調服主心痛震亨清熱利濕化痰飲定喘嗽止嘔逆消浮腫利小便止遺精白濁心脾疼痛化積塊解結氣消癭核散腫毒治婦人血病油調塗湯火傷時珍發明震亨曰蛤粉能降能消能耎能燥時珍曰寒制火而鹹潤下故能降焉寒散熱而鹹走血故能消焉堅者耎之以鹹取其屬水而性潤也濕者燥之以渗取其經火化而利小便也好古曰蛤粉乃腎經血分之藥故主濕嗽腎滑之疾附方舊一新三氣虚水腫昔滁州酒庫攅司陳通患水腫垂死諸醫不治一嫗令以大蒜十個搗如泥入蛤粉丸梧子大毎食前白湯下二十丸服盡小便下數桶而愈普濟方心氣疼痛真蛤粉炒過白佐以香附末等分白湯淬服聖惠方白濁遺精㓗古云陽盛隂虚故精泄也真珠粉丸主之用蛤粉煆一斤黄柏新瓦炒過一斤為細末白水丸如梧子大毎服一百丸空心用温酒下日二次蛤粉味鹹而且能補腎隂黄柏苦而降心火也雀目夜盲真蛤粉炒黄為末以油蠟化和丸皂子大内於猪腰子中麻紥定蒸食之一日一服儒門事親蟶丑真切宋嘉祐釋名集解藏器曰蟶生海泥中長二三寸大如指兩頭開時珍曰蟶乃海中小蚌也其形長短大小不一與江湖中馬刀􅒕蜆相似其類甚多閩粤人以田種之候潮泥壅沃謂之蟶田呼其肉為蟶腸肉氣味甘平無毒詵曰天行病後不可食主治補虚主冷痢煑食之去胸中邪熱煩悶飯後食之與服丹石人相宜治婦人産後虚損嘉祐擔羅拾遺集解藏器曰蛤類也生新羅國彼人食之氣味甘平無毒主治熱氣消食雜昆布作羮主結氣藏器車螯宋嘉祐釋名蜃音腎時珍曰車螯俗訛為昌娥蜃與蛟蜃之蜃同名異物周禮鼈人掌互物春獻鼈蜃秋獻龜魚則蜃似為大蛤之通稱亦不專指車螯也集解藏器曰車螯生海中是大蛤即蜃也能吐氣為樓臺春夏依約島溆常有此氣頌曰南海北海皆有之采無時其肉食之似蛤蜊而堅硬不及近世癰疽多用其殻北中者不堪用背紫色者海人亦名紫貝非矣時珍曰其殻色紫璀粲如玉斑㸃如花海人以火炙之則殻開取肉食之鍾疏云車螯蚶蠣眉目内缺獷殻外緘無香無臭瓦礫何殊宜充庖厨永為口食羅願云雀入淮為蛤雉入海為蜃大蛤也肉可以食殻可飾器物灰可闉塞墻壁又可為粉飾面俗呼蛤粉亦或生珠其為用多矣又臨海水土記云似車螯而角不正者曰移角似車螯而殻薄者曰姑勞似車螯而小者曰羊蹄出羅江昔人皆謂雉化者乃蛟蜃之蜃而陳氏羅氏以為蛤蜃之蜃似誤詳鱗部蛟龍下肉氣味甘鹹冷無毒詵曰不可多食主治解酒毒消渇并癰腫藏器殻氣味同肉主治瘡癤腫毒燒赤醋淬二度為末同甘草等分酒服并以醋調傅之日華消積塊解酒毒治癰疽發背焮痛時珍發名時珍曰車螯味鹹氣寒而降隂中之隂也入血分故宋人用治癰疽取惡物下云有竒功亦須審其氣血虚實老少如何可也今外科尠知用者附方新二車螯轉毒散治發背癰疽不問淺深大小利去病根則免傳變用車螯即昌娥紫背光厚者以鹽泥固濟煆赤出火毒一兩生甘草末一錢半輕粉五分為末毎服四錢用栝樓一個酒一盞煎一盞調服五更轉下惡物為度未下再服甚者不過二服外科精要六味車螯散治症同上用車螯四個黄泥固濟煆赤出毒研末燈心三十莖栝樓一個取仁炒香甘草節炒二錢通作一服將三味入酒二盌煎半盌去滓入蜂蜜一匙調車螯末二錢膩粉少許空心温服下惡涎毒為度本事魁蛤别録上品校正時珍曰宋嘉祐别出蛆條今據郭璞説合併為一釋名魁陸别録蚶一作魽瓦屋子嶺表録瓦壟子時珍曰魁者羮斗之名蛤形肖之故也蚶味甘故從甘案嶺表録異云南人名空慈子尚書盧鈞以其殻似瓦屋之壟改為瓦屋瓦壟也廣人重其肉炙以薦酒呼為天臠廣人謂之蜜丁名醤别録云一名活東誤矣活東蝌斗也見爾雅伏老頌曰説文云老伏翼化為魁蛤故名伏老集解别録曰魁蛤生東海正圓兩頭空表有文采無時𢎞景曰形似紡輕小狹長外有縱横文理云是老蝠所化方用至少保昇曰今出莱州形圓長似大腹㯽榔兩頭有孔藏器曰蚶生海中殻如瓦屋時珍曰案郭璞爾雅註云魁陸即今之蚶也状如小蛤而圓厚臨海異物志云蚶之大者徑四寸背上溝文似瓦屋之壟肉味極佳今浙東以近海田種之謂之蚶田肉氣味甘平無毒鼎曰寒炳曰温凡食訖以飯壓之否則令人口乾時珍曰案劉恂田炙食益人過多即壅氣主治痿痺洩痢便膿血别録潤五臟止消渇利關節服丹石人宜食之免生瘡腫熱毒鼎心脊冷氣腰脊冷風利五臟徤胃令人能食藏器温中消食起陽蕭炳益血色日華殻修治日華曰凡用取陳久者炭火煆赤米醋淬三度出火毒研粉氣味甘鹹平無毒主治燒過醋淬醋丸服治一切血氣冷氣癥癖日華消血塊化痰積震亨連肉燒存性研傅小兒走馬牙疳有效時珍發明時珍曰鹹走血而耎堅故瓦壟子能消血塊散痰積車渠海藥校正自玉石部移入此釋名海扇時珍案韻會云車渠海中大貝也背上壟文如車輪之渠故名車溝曰渠鎦積霏雪録云海扇海中甲物也其形如扇背文如瓦屋三月三日潮盡乃出梵書謂之牟婆各掲拉婆集解李珣曰車渠云是玉石之類生西國形如蚌蛤有文理西域七寳此其一也時珍曰車渠大蛤也大者長二三尺濶尺許厚二三寸殻外溝壟如蚶殻而深大皆縱文如瓦溝無横文也殻内白晳如玉亦不甚貴畨人以飾器物謬言為玉石之類或云玉中亦有車渠而此蛤似之故也沈存中筆談云車渠大者如箕背有渠壟如蚶殻以作器緻如白玉楊慎丹鉛録云車渠作盃注酒滿過一分不溢試之果然殻氣味甘鹹大寒無毒主治安神鎮宅解諸毒藥及蟲螫同玳瑁等分磨人乳服之極騐珣發明時珍曰車渠葢瓦壟之大者故其功用亦相彷彿貝子本經下品釋名貝齒别録白貝日華海􅚔俗作􅖝音巴時珍曰貝字象形其中二㸃象其齒㓨其下二㸃象其垂尾古者貨貝為寳龜用為交易以二為朋今獨雲南用之呼為海􅚔以一為庄四庄為手四手為苗五苗為索頌曰貝腹下㓗白有􅈓如魚齒故曰貝齒集解别録曰貝子生東海池澤采無時𢎞景曰出南海此是小小白貝子人以飭軍容服物者珣曰雲南極多用為錢貨交易頌曰貝子貝類之最小者亦若蝸状長寸許色徴白赤有深紫黒者今多穿與小兒戲弄北人用綴衣及氊帽為飭鬚頭家用以飭鑑畫家用以砑物時珍曰貝子小白貝也大如拇指頂長寸許背腹皆白諸貝皆背隆如龜背腹下兩開相向有齒刻如魚齒其中肉如蝌蚪而有首尾故魏子才六書精藴云貝介蟲也背穹而渾以象天之陽腹平而拆以象地之隂貝類不一按爾雅云貝在陸曰贆音搮在水曰蜬音函大曰魧音杭小曰鰿音脊黒曰𤣥赤曰貽黄質白文曰餘貾音池白質黄文曰餘泉博而標曰蚆音巴大而險曰蜠音囷小而狹曰􅜽音責又古有相貝經甚詳其文云朱仲受之於琴髙以遺㑹稽太守嚴助曰徑尺之貝三代之正瑞靈竒之秘寳其次則盈尺状如赤電黒雲者謂之紫貝素質紅章謂之珠貝青池緑文謂之綬貝黒文黄畫謂之霞貝紫貝愈疾珠貝明目綬貝消氣障霞貝服蛆虫雖不能延齡增壽其禦害一也復有下此者鷹喙蟬脊但逐濕去水無竒功也貝之大者如輪可以明目南海貝如硃礫白駁性寒味甘可止水毒浮貝使人寡慾勿近婦人黒白各半是也濯貝使人善驚勿近童子黄唇齒有赤駁是也雖貝使人病瘧黒鼻無皮是也皭貝使人胎消勿示孕婦赤帶通脊是也惠貝使人善忘赤熾内殻有赤絡是也醟貝使童子愚女人滛青唇赤鼻是也碧貝使人盜脊上有縷勾唇雨則重霽則輕是也委貝使人惡夜行能伏鬼魅百獸赤而中圓雨則輕霽則重是也修治珣曰凡入藥燒過用斆曰凡使物用花蟲殻真相似只是無效貝子以蜜醋相對浸之蒸過取出以清酒淘研氣味鹹平有毒主治目瞖五癃利水道鬼疰蠱毒腹痛下血本經温疰寒熱解肌散結熱别録燒研㸃目去瞖𢎞景傷寒狂熱甄權下水氣浮腫小兒疳蝕吐乳李珣治鼻淵出膿血下痢男子隂瘡解漏脯麵臛諸毒射罔毒藥箭毒時珍附方舊四新四目花瞖痛貝子一兩燒研如麫入龍腦少許㸃之若有瘜肉加真珠末等分金千鼻淵膿血貝子燒研毎生酒服二錢日三服二便關格不通悶脹二三日則殺人以貝齒三枚甘遂三銖為末漿水和服須臾即通也肘后方小便不通白海􅚔一對生一個燒一個為末温酒服田氏方下疳隂瘡白海􅚔三個煆紅研末搽之簡便單方食物中毒貝子一枚含之自吐中聖惠治漏脯毒麫臛毒及射罔在諸肉有毒並用貝子燒研水調半錢服中射罔毒方同上藥箭簇毒貝齒燒研水服三錢日三服千金方紫貝唐本草釋名文貝綱目砑螺時珍曰南州異物志云文貝甚大質白文紫無姿自然不假外飾而光彩煥爛故名頌曰畫家用以砑物故名曰砑螺也集解恭曰紫貝出東南海中形似貝子而大二三寸背有紫斑而骨白南夷采以為貨市宗奭曰紫貝背上深紫有黒㸃頌曰貝類極多古人以為寳貨而紫貝尤貴後世不用見賤而藥中亦希使之時珍曰按陸機詩疏云紫貝質白如玉紫㸃為文皆行列相當大者徑一尺七八寸交趾九真以為盃盤修治同貝子氣味鹹平無毒主治明目去熱毒唐本小兒癍疹目瞖時珍附方新一癍疹入目紫貝一個即砑螺也生研細末用羊肝切片掺上紥定米泔煮熟瓶盛露一夜空心嚼食之嬰童百問珂唐本草釋名馬軻螺綱目珬恤時珍曰珂馬勒飭也此貝似之故名徐𠂻作馬珂通典云老鵰入海為珬即軻也集解别録曰珂生南海采無時白如蚌恭曰珂貝類也大如鰒皮黄黒而骨白堪以為飭時珍曰按徐表異物志云馬軻螺大者圍九寸細者圍七八寸長三四寸脩治斆曰珂要冬采色白膩者幷有白旋水文勿令見火即無用也凡用以銅刀刮末研細重羅再研千下不入婦人藥也氣味鹹平無毒主治目瞖斷血生肌唐本消瞖膜及筋􅀢肉刮㸃之李珣去面黒時珍附方新二目生浮瞖馬珂三分白龍腦半錢枯過白礬一分研勻㸃之聖惠方面黒令白馬珂白附子珊瑚鷹矢白等分為末毎夜人乳調傅旦以漿水洗之同上石􅨒音刼綱目釋名紫􅎕音劫與蜐同紫虈音枵龜脚俗名集解時珍曰石蜐生東南海中石上蚌蛤之屬形如龜脚亦有爪状殻如蟹螯其色紫可食真臘記云有長八九寸者江淹石蜐賦云亦有足翼得春雨則生花故郭璞賦云石蜐應節而揚葩荀子云東海有紫􅎕魚鹽是矣或指為紫貝及石决明者皆非矣氣味甘鹹無毒主治利小便時珍淡菜宋嘉祐釋名殻菜浙人所呼海蜌音陛東海夫人時珍曰淡以味殻以形夫人以似名也集解藏器曰東海夫人生東南海中似珠母一頭小中啣少毛味甘美南人好食之詵曰常時燒食即苦不宜人與少米先煑熟後除去毛再入蘿蔔或紫蘇或冬𤓰同煑即更妙日華曰雖形状不典而甚益人時珍曰按阮氏云淡菜生海藻上故治癭與海藻同功氣味甘温無毒日華曰不宜多食多食令人頭目悶闇得㣲利即止藏器曰多食發丹石令人腸結乆食脱人髮主治虚勞傷憊精血衰少及吐血久痢腸鳴腰痛疝瘕婦人帶下産後瘦瘠藏器産後血結腹内冷痛治癥瘕潤毛髮治崩中帶下燒食一頓令飽孟詵煑熟食之能補五臟益陽事理腰脚氣能消宿食除腹中冷氣痃癖亦可燒汁沸出食之日華消癭氣時珍海蠃拾遺校正時珍曰唐本甲香今併為一釋名流螺圖經假豬螺交州記厴名甲香時珍曰蠃與螺同亦作蠡蠃從虫羸省文盖蟲之羸形者也厴音掩閉藏之貌集解頌曰海螺即流螺厴曰甲香生南海今嶺外閩中近海州郡及明州皆有之或只以台州小者為佳其螺大如小拳青黄色長四五寸諸螺之中此肉味最厚南人食之南州異物志云甲香大者如甌面前一邊直攙長數寸圍殻岨峿有刺其厴雜衆香燒之益芳獨燒則臭今醫家稀用惟合香者用之又有小甲香状若螺子取其帶修合成也海中螺類絶有大者珠螺瑩㓗如珠鸚鵡螺形如鸚鵡頭並可作杯梭尾螺形如梭今釋子所吹者皆不入藥時珍曰螺蚌屬也大者如斗出日南漲海中香螺厴可雜甲香老鈿螺光彩可飾鏡背者紅螺色㣲紅青螺色如翡翠蓼螺味辛如蓼紫貝螺即紫貝也鸚鵡螺質白而紫頭如鳥形其肉常雜殻出食出則寄居䖝入居螺還則䖝出也肉為魚所食則殻浮出人因取之作杯肉氣味甘冷無毒主治目痛累年或三四十年生蠃取汁洗之或入黄連末在内取汁㸃之藏器合菜煑食治心痛孫思邈甲香修治斆曰凡使用生茅香皂角同煑半日石臼搗篩用之經騐方曰凡使用黄泥同水煑一日温水浴過再以米泔或灰汁煑一日再浴過以蜜酒煑一日浴過煿乾用頌曰傳信方載其法云毎甲香一斤以泔斗半㣲火煮一復時換泔再煮凡二換漉出衆手括去香上涎物以白米三合水一斗㣲火煮乾又以蜜三合水一斗煮三伏時乃以炭火燒地令熱洒酒令閏鋪香於上以新瓦盖上一伏時待冷硬石臼木杵搗爛入沉香末三兩麝一分和搗印成以瓶貯之埋過經乆方燒凡燒此香須用大火爐多着熱灰剛炭猛燒令盡去之爐旁着火煖水即香不散此法出於劉兖奉禮也宗奭曰甲香善能管香烟與沉檀龍麝香用之尤佳氣味鹹平無毒主治心腹滿痛氣急止痢下淋唐本和氣清神主腸風痔瘻李珣瘻瘡疥癬頭瘡嚵瘡甲疽蛇蠍蜂螫藏器甲煎拾遺集解藏器曰甲煎以諸藥及美果花燒灰和臘成口脂所主與甲香畧同三年者良時珍曰甲煎以甲香同沉麝諸藥花物治成可作口脂及焚爇也唐李義山詩所謂沉香甲煎為廷燎者即此氣味辛温無毒主治甲疽小兒頭瘡吻瘡口旁嚵瘡耳後月蝕瘡蜂蛇蠍之瘡並傅之藏器田蠃别録上品集解𢎞景曰田螺生水田中及湖瀆岸側形圓大如梨橘小者如桃李人煑食之保昇曰状類蝸牛而尖長青黄色春夏采之時珍曰螺蚌屬也其殻旋文其肉視月盈虧故王充云月毁於天蚌消於淵説卦云離為蠃為蚌為龜為鼈為蟹皆以其外剛而内柔也肉氣味甘大寒無毒主治目熱赤痛止渇别録煮汁療熱醒酒用真珠黄連末内入良久取汁注目中止目痛𢎞景煮食利大小便去腹中結熱目下黄脚氣衝上小腹急硬小便赤澀手足浮腫生浸取汁飲之止消渇搗肉傅熱瘡藏器壓丹石毒孟詵利濕熱治黄疸搗爛貼臍引熱下行止禁口痢下水氣淋閉取水搽痔瘡胡臭燒研治瘰癧癬瘡時珍附方舊二十一新二消渇飲水日夜不止小便數者心鏡用田螺五升水一斗浸一夜渇即飲之毎日一換水及螺或煮食飲汁亦妙三聖惠用糯米二升煮稀粥一斗冷定入田中活螺升在内待食粥盡吐沫出乃收飲之立效肝熱目赤藥性論用大田螺七枚洗浄新汲水養去泥穢換水一升浸洗取起於净器中着少鹽花於甲内承取自然汁㸃目逐個用了放去之爛弦風眼方法同上但以銅緑代塩花飲酒口糜螺蚌煮汁飲聖惠酒醉不醒用水中螺蚌葱豉煮食飲汁即解肘后小便不通腹脹如鼓用田螺一枚塩半匕生搗傅臍下一寸三分即通熊彦誠曽得此疾異人授此方果愈類編禁口痢疾用大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行即思食矣甚效丹溪腸風下血因酒毒者大田螺五箇燒至殻白肉乾研末作一服熱酒下百一大腸脱肛脱下三五寸者用大田螺二三枚將井水養三四日去泥用雞爪黄連研細末入厴内待化成水以濃茶洗净肛門將雞翎蘸掃之以軟帛托上自然不再復發也徳生堂經騐方反胃嘔噎田螺洗净水養待吐出泥澄取晒半乾丸梧子大毎服三十丸藿香湯下爛殻研服亦可經騐方水氣浮腫用大田螺大蒜車前子等分搗膏攤貼臍上水從便旋而下象山縣民病此得是方而愈仇逺稗史酒疸諸疸用田螺將水養數日去泥取出生搗爛入好酒内用布帛濾過將汁飲之日三服日效夀域脚氣攻注用生大田螺搗爛傅兩股上便覺冷趨至足而安又可傅丹田利小便董守約曽用有效稗史痔漏疼痛乾坤生意用田螺一個入片腦一分在内取水搽之仍先以冬𤓰湯洗净孫氏用田螺一枚用針刺破入白礬末同埋一夜取螺内水掃瘡上又善能止痛也甚妙袖珍用馬齒莧湯洗浄搗活螺螄傅上其病即愈腋氣胡臭乾坤生意用田螺一個水養俟厴開挑巴豆仁一個在内取置盃内夏一夜冬七夜自然成水常取搽之久久絶根又方大田螺一箇入麝香三分在内埋露地七七日取出看患洗拭以墨塗上再洗看有墨處是患竅以螺汁㸃之三五次即瘥瘰癧潰破用田螺連肉燒存性香油調搽集要方疔瘡惡腫用田螺入氷片化水㸃瘡上普濟風蟲癬瘡用螺螄十個槿樹皮末一兩同入碗内蒸熱搗爛入礬紅三錢以鹽水調搽孫氏繞指毒瘡生手足指上以活田螺一枚生用搗碎縛之即瘥多能鄙事妬精隂瘡大田螺二個和殻燒存性入輕粉同研傅之效醫林集要殻氣味甘平無毒主治燒研主尸疰心腹痛失精止㵼别録爛者燒研水服止反胃去卒心痛藏器爛殻研細末服之止下血小兒驚風有痰瘡瘍膿水時珍附方新三心脾痛不止者水甲散主之用田螺殻溪間者亦可以松柴片層層叠上燒過火吹去松灰取殻研末以烏沉湯寛中散之類調服二錢不傳之妙集要小兒頭瘡田螺殻燒存性清油調搽之聖惠小兒急驚逺年白田螺殻燒灰入麝香少許水調灌之普濟蝸蠃别録釋名螺螄時珍曰師衆多也其形似蝸牛其類衆多故有二名爛殻名鬼眼睛集解别録曰蝸螺生江夏溪水中小于田螺上有稜時珍曰處處湖溪有之江夏漢沔尤多大如指頭而殻厚於田螺惟食泥水春月人采置鍋中蒸之其肉自出酒烹糟煮食之清明後其中有蟲不堪用矣藏器曰此物難死誤入泥壁中數年猶活也肉氣味甘寒無毒主治燭舘眀目下水别録止渇藏器醒酒解熱利大小便消黄疸水腫治反胃痢疾脱肛痔漏時珍字又曰燭舘二疑訛誤附方新七黄疸酒疸小螺螄養去泥土令净每日用水煮食飲汁有效李仲南永類方黄疸吐血病後身面俱黄吐血成盆諸藥不效用螺十個水漂去泥搗爛露一夜五更取清服二三次血止即愈一人病此用之經騐小山怪證方五淋白濁螺螄一盌連殻炒熱入白酒三盌煮至一盌挑肉食之以此酒下數次即效扶夀精方小兒脱肛螺螄二三升鋪在桶内坐之少頃即愈簡便痘疹目瞖水煮螺螄常食佳濟急仙方白遊風腫螺螄肉入塩少許搗泥貼之神效葉氏摘𤣥方爛殻時珍曰泥中及墻壁上年久者良火煆過用氣味同主治痰飲積及胃脘痛震亨反胃膈氣痰嗽鼻淵脱肛痔疾瘡癤下疳湯火傷時珍發眀時珍曰螺乃蚌蛤之屬其殻大抵與蚌粉蛤粉蚶蜆之類同功合而觀之自可神悟附方新十卒得欬嗽屋上白螺或白蜆殻搗為末酒服方寸匕肘后方濕痰心痛白螺螄殻洗净燒存性研末酒服方寸匕立止正傳膈氣疼痛白玉散用壁上陳白螺螄燒研毎服一錢酒下甚效孫氏小兒軟癤用鬼眼睛即墻上白螺螄殻燒灰入倒掛塵等分油調塗之壽域隂頭生瘡用溪港年久螺螄燒灰傅之竒效湯火傷瘡用多年乾白螺螄殻煆研油調傅澹寮楊梅瘡爛古墻上螺螄殻辰砂等分片腦少許為末搽之小兒哮疾向南墻上年乆螺螄為末日晡時以水調成日落時舉手合掌􅀈依吞之即效摘葉氏𤣥方瘰癧已破土墻上白螺螄殻為末日日傅之談埜翁方痘瘡不收墻上白螺螄殻洗净煆研摻之醫方摘要蓼蠃拾遺集解藏器曰蓼螺生永嘉海中味辛辣如蓼時珍曰按韻㑹云蓼螺紫色有斑文今寕波出泥螺状如蠶豆可代充海錯肉氣味辛平無毒主治飛尸遊蠱生食之浸以薑醋彌佳藏器寄居蟲拾遺釋名寄生蟲集解藏器曰陶註蝸牛云海邊有大似蝸牛火炙殻便走出食之益人按寄居在螺殻間非螺也候螺蛤開即自出食螺蛤欲合已還殻中海族多被其寄又南海一種似蜘蛛入螺殻中負殻而走觸之即縮如螺火炙乃出一名􅀈無别功用時珍曰案孫愐云寄居在龜殻中者名曰蝞則寄居亦非一種也氣味缺主治益顔色美心志𢎞景海月拾遺釋名玉珧音姚江珧馬頰馬甲藏器曰海月蛤類也似半月故名水沫所化煮時猶變為水時珍曰馬甲玉珧皆以形色名萬震贊云厥甲美如珧玉是矣集解時珍曰劉恂嶺表録云海月大如鏡白色正圓常死海旁其柱如搔頭尖其甲美如玉段成式雜爼云玉珧形似蚌長二三寸廣五寸上大下小殻中柱炙食味如牛頭胘項王氏宛委録云奉化縣四月南風起江瑶一上可得數百如蚌梢大肉腥靭不堪惟四肉柱長寸許白如珂雪以雞汁瀹食肥美過火則味盡也附録海鏡時珍曰一名鏡魚一名瑣􅖜一名膏藥盤生南海兩片相合成形殻圓如鏡中甚瑩滑映日光如雲母内有少肉如蚌胎腹有寄居蟲大如豆状如蟹海鏡飢則出食入則鏡亦飽矣郭璞賦云瑣􅖜腹蟹水母目鰕即此氣味甘辛平無毒主治消渇下氣調中利五臟止小便消腹中宿物令人易飢能食生薑醤同食之藏器海燕綱目集解時珍曰海燕出東海大一寸状扁面圓背上青黒腹下白脆似海螵蛸有紋如蕈茵口在腹下食細沙口旁有五路正勾即其足也臨海水土記云陽遂足生海中色青黒腹白有五足不知頭尾生時體耎死即乾脆即此物也臨海異物志載燕魚長五寸隂雨則飛起又餘此或同名者也氣味鹹温無毒主治隂雨發損痛煮汁服取汗即解亦入滋陽藥時珍郎君子海藥集解珣曰郎君子生南海有雌雄状似杏仁青碧色欲騐真假口内含熱放醋中雌雄相逐逡巡便合即下卵如粟状者真也亦難得之物時珍曰顧玠海槎録云相思子状如螺中實如石大如豆藏箧笥積歲不壞若置醋中即盤旋不已案此即郎君子也氣味缺主治婦人難産手把之便生極騐本草綱目卷四十六
