body:
  text: 本草綱目卷三十六目錄木之三灌木類五十種内附一種桑本經柘嘉祐奴柘拾遺楮别錄枳本經枳即枳實殻枸橘綱目梔子本經附木㦸酸棗本經白棘本經㽔核本經山茱茰本經胡頺子拾遺子即盧都金櫻子蜀本郁李本經䑕李本經子即牛李女貞本經冬青綱目枸骨綱目衞矛本經山礬綱目南燭開寳五加本經枸杞本經溲疏本經楊櫨唐本石南本經牡荆别錄蔓荆本經欒荆唐本石荆拾遺紫荆開寳木槿日華扶桑綱目木芙蓉綱目山茶綱目蠟梅綱目伏牛花開寳宻蒙花開寳木綿綱目柞木嘉祐黄楊木綱目不凋木拾遺賣子木唐本木天蓼唐本放杖木拾遺接骨木唐本靈壽木拾遺楤木拾遺木麻拾遺大空唐本右附方舊八十七新二百零七本草綱目卷三十六目録
