body:
  text: 本草綱目卷十四目録草之三芳草類五十六種當歸本經芎藭本經蘼蕪本經蛇牀本經藁本本經附徐黄蜘蛛香綱目白芷香本經芍藥本經牡丹本經附鼠姑木香本經甘松香開寳山柰綱目㢘薑拾遺杜若本經山薑藥性髙良薑别錄即紅豆䓻豆蔲别錄果即草白豆蔲開寳縮砂蔤開寳益智子開寳蓽茇開寳蒟醬唐本肉豆蔲唐本補骨脂開寳即破故紙薑黄唐本鬱金唐本蓬莪荗開寳荆三稜開寳莎根香附子别錄瑞香綱目茉莉綱目附素馨鬱金香開寳茅香開寳白茅香拾遺排草香綱目迷迭香拾遺䔾車香拾遺艾納香開寳兠納香海藥線香綱目藿香嘉祐薰草零陵香别錄蘭草本經澤蘭本經馬蘭日華香薷别錄石香葇開寳爵牀本經赤車使者唐本假蘇荆芥本經薄荷唐本積雪草本經蘇哵錄荏别錄蘇即白水蘇本經蘇即雞薺薴拾遺附石薺薴右附方舊八十一新三百七十一本草綱目卷十四目錄
