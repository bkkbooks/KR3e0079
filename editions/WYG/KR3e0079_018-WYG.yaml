body:
  text: 本草綱目卷四上明李時珍撰百病主治藥下痛風屬風寒溼熱挾痰及血虚汚血風寒風溼草木麻黄風寒風溼風熱痺痛發汗羌活風溼相摶一身盡痛非此不除同松節煮酒日飲防風主周身骨節盡痛乃治風去溼仙藥蒼术散風除溼燥痰解鬱發汗通治上中下溼氣作溼氣身痛􅆈汁膏㸃服桔梗寒熱風痺滯氣作痛在上者宜加之茜根治骨節痛燥溼行血紫葳除風熱血滯作痛蒼耳子風溼周痺四肢拘痛為末煎服牽牛子除氣分溼熱氣壅腰脚痛羊躑躅風溼痺痛走注同糯米黒豆酒水煎服取吐利風痰注痛同生南星搗餅蒸四五次收之臨時焙丸温酒下三丸静卧避風芫花風溼痰注作痛草烏頭風溼痰涎歴節走痛不止入豆腐中煮過晒研每服五分仍外傅痛處烏頭附子並燥溼痰為引經藥百靈蕂酒石南蕂酒青蕂酒並主風溼骨痛頑痺薏苡仁乆風溼痺筋急不可屈申同風溼身痛日晡甚者麻黄杏仁甘草煎服豆豉松節去筋骨痛能燥血中之溼歴節風痛四肢如脱浸酒日服桂枝引諸藥横行手臂同椒薑浸酒絮熨隂痺海桐皮腰膝注痛血脈頑痺同諸藥浸酒服五加皮風溼骨節攣痛浸酒服枸杞根及苖去皮膚骨節間風子補蟲腎獸蠶沙浸酒蠍梢肝風蚯蚓脚風宜用穿山甲風痺疼痛引經通竅守宫通經絡入血分諸歴節風痛同地龍草烏頭藥丸服白花蛇骨節風痛烏蛇同上水龜風溼拘攣筋骨疼痛同天花粉枸杞子雄黄麝香槐花煎服版亦入隂虚骨痛方五靈脂散血活血止諸痛引經有効虎骨筋骨毒風走注疼痛脛骨尤良虎風疼膝腫同通草煮服取汗白同没藥末服頭風溼痛同附子末服骨浸酒飲風痰風熱草部半夏天南星並治風痰溼痰熱痰凝滯歴節走注右臂溼痰作痛南星蒼术煎服大㦸甘遂並治溼氣化為痰飲流注胸膈經絡發為上下走注疼痛痳痺能泄臟腑經隧之溼大黄泄脾胃血分之溼熱膿酥炒煎服治腰脚風痛取下冷惡物即止威靈仙治風溼痰飲為痛風要藥上下皆宜利腰膝積年冷病諸痛為术酒下或丸服以㣲為効黄芩三焦濕熱風熱歴節腫痛秦芄除陽明風溼溼熱養血榮筋龍膽草木通煎服防己木鼈子並主溼熱腫痛在下加之薑黄治風痺臂痛能入手臂破血中之滯氣紅藍花活血滯止痛菜瘦人宜之果白芥子暴風毒腫痰飲流入四肢經絡作痛桃仁血滯風痺攣痛橘皮下滯氣化溼痰血風痰痳木或手木或十指痳木皆是溼痰死以一斤去白逆流水五盌煮爛去滓至一盌頓服取吐乃吐痰之聖藥也檳榔一切風氣木能下行石枳殻風痺淋痺散痰流滯黄蘗除下焦溼熱痛腫下身甚者加之伏苓滲溼熱竹瀝化熱痰蘇方木活血止痛滑石㵕溼獸熱禽羚羊角入肝平風舒筋止熱毒風歴節掣痛効羊脛骨除溼熱止腰脚筋骨痛浸酒服補虚草部當歸芎藭芍藥地黄丹參並養新血破宿血止痛牛膝補肝腎逐惡血治風寒溼痺膝痛不可屈申能行諸藥下行痛在下者加之石斛脚膝冷痛痺弱酒浸酥蒸服滿一鎰永不骨痛天麻諸風溼痺不仁補肝虛利腰膝腰脚痛同半夏細辛袋盛蒸熱互熨汗出則愈萆薢狗脊寒溼膝痛腰背强補肝腎土茯苓治瘡毒筋骨痛去風溼利闗節𤨏陽潤燥榖養筋木罌粟殻收歛固氣能入腎治骨痛尤宜松脂歴節風酸痛鍊浄和酥煎服乳香補腎活血定諸經之痛沒藥遂經絡滯血定痛同歴節諸風痛不止虎脛骨术酒服外治白花菜傅風溼痛芥子走注風毒痛同醋塗萞麻油入膏㧞風邪出外鵜鶘油入膏引藥氣入内羊脂入膏引藥氣入内㧞邪出外野駝脂摩風痛牛皮膠同薑汁化貼骨節痛驢骨浴歴節風蠶沙蒸熨頭痛有外感痰氣虚腎血虚痛風熱痛溼熱屬風寒熱厥厥真偏右虚痰左屬熱引經太陽麻黄藁本羗活蔓荆陽明白芷葛根升麻石膏少陽柴胡芎藭太隂蒼术半夏少隂細辛厥隂吳茱茰芎藭溼熱痰溼草部黄芩一味酒浸炒研茶服治風溼溼熱相火偏正諸般頭痛荆芥散風熱清頭目末作枕去頭項風同石膏服去風熱頭痛薄荷除風熱清頭目蜜丸服菊花頭目風熱腫痛同石膏芎藭末服蔓荆實頭痛腦鳴目涙酒太陽頭痛為末浸服水蘇風熱痛同皂莢芫花丸服半夏痰厥頭痛非此不除同蒼术用栝樓熱病頭痛洗瓤温服香附子氣鬱頭痛同川芎末常服服偏頭風同烏頭甘草丸大黄熱厥頭痛酒炒三次為末茶服鈎藤平肝風心熱茺蔚子血逆大熱頭痛木通青黛大青白蘚皮茵陳白蒿澤蘭沙參丹參知母呉藍景天並主天行頭痛前胡旋覆花菜果竹笋並主痰熱頭痛東風菜鹿藿苦茗並治風熱頭痛熏清上止痛同葱白煎服巴豆烟過服止氣虚頭痛楊梅頭痛為末茶服橘皮木石枳殻並治痰氣頭痛櫸皮時行頭痛熱結在腸枸把寒熱頭痛竹茹飲酒人頭痛煎服竹葉竹瀝白瀝並痰熱頭痛黄蘗巵子茯苓白堊土並溼熱頭痛止合王􅆶為末服疼石膏陽明頭痛如裂壮熱如火風風熱同竹葉煎煎風寒同葱茶煎痰同川芎甘草鐵粉頭痛鼻塞同龍腦水服光明鹽獸人犀角傷寒頭痛寒熱諸毒氣痛童尿寒熱頭痛至極者一盞入葱豉煎服陶隱居盛稱之風寒溼厥草榖菜果芎藭風入腦户頭痛行氣開鬱必用之藥風熱及氣虚為末茶服偏頭風浸酒服服卒厥同烏藥末防風頭面風去來蜜偏正頭風同白芷丸服天南星風痰頭痛同荆芥丸服風痰氣同茴香丸服婦人頭為末酒服烏頭附子浸酒服煮豆食治頭風風同白芷末服治風毒痛鍾同川芎或同髙良薑服治寒痛同葱汁丸或同乳全蠍丸治氣虚痛同全蠍韭根丸腎厥痛同釡墨止痰厥痛天雄頭面風去來痛草烏頭偏正頭風同蒼术葱汁丸服白附子偏正頭風同牙皂末服服痰厥痛同半夏南星丸地膚子雷頭風腫同生薑擂酒服取汗杜衡風寒頭痛初起末服發汗蒴藋煎酒取汗萞麻子同川芎燒服取汗萆薢同虎骨旋覆花末服取汗南藤醸酒服並治頭風通草燒研酒服治洗頭風菖蒲頭風淚下杜若風入腦户痛腫涕淚胡盧巴氣攻痛同三稜乾薑末酒服牛膝腦中痛當歸煮酒地黄芍藥並血虚痛葳􅅋天麻人參黄茋蒼耳大豆黄卷並頭風痺胡麻頭面遊風百合頭風目眩胡荽葱白生薑並風寒頭痛杏仁時行頭痛解􅡌粥風虚痛欲破研汁入食得大汗即解茱茰厥隂頭痛嘔涎同薑蜜水服取汗蜀椒枳椇木石蟲獸柏實並主頭風桂枝傷風頭痛自汗烏藥􅂔厥頭痛及産後頭痛同川芎末茶服皂莢時氣頭痛燒研同薑蜜水服取汗山茱茰腦骨痛辛夷伏牛花空青曾青並風眩頭痛石硫黄腎厥頭痛頭風同消石丸服藥同胡粉丸服同食塩丸服同烏丸服蜂子全蠍白殭蠶葱湯服或入高凉薑或以蒜制為末服治痰厥腎厥痛白花蛇腦風頭痛及偏頭風同南星荆芥諸藥末服魚鰾八般頭風同芎芷末衡酒熱飲醉醒則愈羊肉頭腦大風汗出虚勞羊屎雷頭風病研酒服吐痰見風及痰飲外治糓精草為末㗜鼻調糊貼腦燒烟熏鼻𤣥胡索同牙皂青黛為丸𤓰蒂藜盧細辛蒼耳子大黄逺志蓽茇髙凉薑牽牛同砂仁楊梅末蕓薹子皂莢白棘鍼同丁香麝香雄黄同細辛𤣥精石消石人中白同地龍末羊膽為丸旱連汁蘿葡汁大蒜汁苦瓠汁並㗜鼻艾葉揉丸嚊之取出黄水萞麻仁同棗肉紙卷挿入鼻内半夏烟木槿子烟龍腦烟並熏鼻燈火焠之蕎麥麵作大餅更互合頭出汗之或作小餅貼四眼角炙黄蠟和鹽作兠鍪合之即止麝香同皂莢末安頂上炒鹽熨之茱茰葉蒸熱枕之治大寒犯腦痛亦浴頭桐木皮冬青葉石南葉牡荆根槵子皮莽草葶藶豉汁驢頭汁並治頭風全蠍同地龍土狗五倍子末柚葉同葱白山豆根南星同川烏烏頭草烏頭同巵子葱汁乳香同萞麻仁决明子並貼太陽穴露水八月朔旦取磨墨㸃太陽止頭疼桂木隂而即發痛酒調塗頂額井底泥同消黄傅朴消熱痛塗頂上訶子同芒消醋摩之牛蒡根同酒煎膏摩之緑豆作枕去頭風良决明菊花皆麥麫頭皮虛腫薄如裹水水嚼傅之良巵子蜜和傅舌上追涎去風甚妙眩運眩是目黒運是頭旋皆是氣虚挾痰挾火挾風或挾血虚或兼外感四氣風虛草菜天麻頭眩風虚内作非此不能除為治風藥名定風草首風旋運消痰定風同川芎蜜丸服术頭忽暗運瘦削食土同麫丸服荆芥頭旋目眩尿産後血運欲死童調服白芷頭風血風眩運蜜丸服蒼耳子諸風頭運蜜丸服酒女人血風頭旋悶絶不省為末服能通頂門菊苖男女頭風眩運髪落有痰發則昬倒四月收陽乾為末毎服酒二錢秋月收花浸酒或醸酒服藋蒴根頭風旋運同獨活石膏煎酒服産後血運煎服貝母洗惡風寒目眩項直杜若風入腦户眩倒目􅍃􅍃鈎藤平肝風心火頭旋目眩排風子目赤頭旋同甘草菊花末當歸失血眩運芎藭煎服芎藭首風旋運紅藥子産後血運附子烏頭薄荷細辛木香紫蘇水蘇白蒿飛亷卷柏蘼蕪𦍑活藁本地黄人参黄茋升麻柴胡山藥並治風虚眩運生薑木蟲鱗獸松花頭旋腦腫浸酒飲槐實風眩欲倒吐涎如醉瀁瀁如舟車中辛夷眩冐身兀兀如在車船上蔓荆實腦鳴昬悶伏牛花丁香伏神茯苓山茱茰地骨皮全蠍白花蛇烏蛇並頭風眩運鹿茸眩運或見一為二半兩煎酒入麝服驢頭中風頭眩身顫心肝浮熱同䜴煮食兎頭骨肝羚羊角羊頭蹄及頭骨羊肉牛胃猪腦豬血熊腦並主風眩瘦弱痰熱草菜天南星風痰眩運吐逆同半夏天麻白麫煮丸半夏痰逆昬運同甘草防風煎服同風痰眩運研末水沉粉入硃砂丸服金花丸南星寒水石天麻雄黄白麫煮丸服白附子風痰同石膏砂龍腦丸服硃大黄溼熱眩運炒末茶服旋覆花天花粉前胡桔梗黄芩黄連澤瀉白芥子熱痰煩運同黑芥子大㦸甘遂果芒消硃砂丸服木橘皮荆瀝竹瀝頭風眩運月眩心頭瀁瀁欲吐枳殻黄蘗巵子金石石膽女人頭運天地轉動名曰心眩非血風也以胡餅劑和切小塊焙乾毎服一塊竹茹湯下雲母中風寒熱如在舟船上同恒山服吐痰飲石膏風熱鈆汞結砂流黄消石並除上盛下虚痰涎眩運硃砂雄黄蟲禽白殭蠶並風痰鶻嘲頭風目眩炙食一枚鷹頭頭目虚運同川芎末服鴟頭頭風旋運同蕳茹白术丸服外治甘蕉油吐痰𤓰蒂吐痰可痰門吐法用茶子頭中䲭響為末㗜鼻眼目有赤目傳變物内障昬盲外障瞖膜傷眯目赤腫草部黄連消末赤腫瀉肝膽心火不可乆服人赤目痛痒出淚羞明浸雞子白㸃蒸乳㸃爛同冬青煎㸃乳同乾薑杏仁煎㸃熱水調貼足心服弦風赤同人槐花輕粉蒸熨風盲瞖羊肝丸胡黄連浸人乳㸃赤目小兒塗足心黄芩消腫赤瘀血芍藥目赤濇痛補肝明目桔梗赤目腫痛牽肝風盛黒睛痛同牛丸服白牽牛風熱赤目同葱白煮丸龍膽赤腫痰肉髙起痛不可忍除肝膽邪熱去目中黄佐柴胡為眼疾必用之藥暑月目濇同黄連汁㸃漏膿同當歸末服葳㽔目痛眥爛涙出連赤目濇痛同芍藥當歸黄煎洗白芷赤目弩肉頭風侵目痒涙同一切目疾雄黄丸服薄荷去風熱研爛弦以薑汁浸泡湯洗荆芥頭目一切風熱疾為末酒服藍葉赤目熱痛同車前淡竹葉煎服山茵陳赤腫同車前子末服王𤓰子赤目痛濇同槐花芍藥丸服香附子肝虚睛痛羞明同夏苦草末沙糖水服頭風睛痛同川芎末茶服防己目睛暴痛酒洗三次末服夏枯草補養厥隂血脉故冶目痛如神菖蒲諸般赤目搗汁熬膏㸃之鍼同鹽傅挑地黄血熱睡起目赤煮粥食貼暴赤痛小兒蓐内目赤並之地膚子風熱赤目同地黄作餅晒研服苦参細辛並明目益肝膽止風眼下涙黄茋連翹又洗爛弦大黄並主熱毒赤目赤芍藥白芨防風羗活白蘚皮柴胡澤蘭麻黄並主風熱赤目腫毒野狐漿草汁積雪草汁瞿麥汁車前草汁並㸃赤目葉亦貼之千里及汁㸃爛弦風眼五味子同蔓荆子煎覆盆草汁滴風爛眼去蟲五