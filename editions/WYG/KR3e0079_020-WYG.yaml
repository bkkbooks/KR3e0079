body:
  text: 本草綱目卷四下明李時珍撰百病主治藥下五絶縊死半夏五絶死但心頭温者以末吹鼻皆可活皂莢末五絶死者吹其耳鼻梁上塵五絶死吹耳鼻葱心五絶死刺其耳鼻出血即愈藍汁縊死灌之雞冠血縊死者徐徐抱住解繩不得割斷安脚卧之緊挽其髮一人摩其胸脇一人屈其臂及足脛待其氣囘刺血滴入口中即活或桂湯亦可雞屎白縊死心下猶温者酒服棗許溺死皂莢吹其耳鼻及綿包納入下部出水即活梁塵亦可食鹽溺死放大凳上髙其後脚鹽擦臍中待水流出但心頭温者皆活石灰裏納下部出水竈灰埋之露其七孔白沙亦可老薑溺死人横安牛背上扶定牽牛徐行出水後以薑擦牙壓死麻油墻壁物卒壓死心頭温者將身盤坐緊提其髮用半夏吹鼻取􅅉以油和薑汁灌之餘同折傷豆豉趺死煎服童尿熱灌凍死竈灰冬月凍死畧有氣者炒灰包熨心上冷即換待氣回少與酒粥不可近火即死驚死醇酒驚怖死俗名嚇死灌之諸蟲傷蛇虺蠶蛾蜈蚣蚯蚓蜂蠆蝸牛蜘蛛沙蠼螋射工虱蛭螻蟻蠅辟諸蟲蛇虺傷内治貝母酒服至醉毒水自出絲𤓰根擂生酒飲醉立愈白芷水服半兩扎定兩頭水出即消或同雄黄麝香細辛酒服甘草毒蛇傷人目黒口噤毒氣入腹同白礬末冷水服二錢蒜一升乳二升煮食仍煮童尿熱漬之麻油米醋並急飲二盌毒即散兔葵薺苨長松惡實辟虺雷草犀白兔藿黄藥子蘘荷地榆鬼臼決明葉蛇苺冬葵根葉海根莧菜並主蛇蟲虺蝮傷擣汁或為末服五葉藤茴香半邊蓮櫻桃葉小青大青水蘋並擣汁服滓傅絡石服汁並洗紫荆皮煎服并洗木香青黛同雄黄鬼針茱茰並水服外塗之水蘇小薊苧根葉金鳯花葉蒼耳並酒服外塗之重臺酒服外同續隨子塗磨刀水鐵漿雄黄犀角並服之令毒不攻内五靈脂同雄黄酒灌外鼻外塗之治艾葉隔蒜灸之蜀椒塗之口蛇入人破尾納椒末入内自出母猪尾血蛇入人七孔割血滴之蛇含草蛇䒽草馬藺草天名精續隨子蜈蚣草鹿蹄草益母草菩薩草天南星預知子魚腥草扁豆葉慈姑葉山慈姑山豆根獨行根赤薜荔千里及灰藋葉烏桕皮梫木皮旱堇汁水芹馬蘭狼牙蕁麻山漆薄荷紫蘇葛根通草葎草蚤休地菘豨薟海芋荏葉水莕極效酸漿醋草芋葉藜葉甜藤蕨根白苣萵苣菰根乾薑薑汁韭根汁獨蒜薤白酒糟巴豆榧子桑汁楮汁楮葉同麻葉桂心同栝樓末白礬或入雄黄丹砂胡粉食鹽鹽藥鐵精粉蚯蚓泥簷溜下泥蜜蜘蛛甲煎牛酥入塩生蠶蛾擣蝦蟇擣五靈脂猪齒灰猪耳垢牛耳垢人耳塞同頭垢井泥蚯蚓泥人齒垢梳垢鼠屎鼬鼠屎食蛇鼠屎雙頭鹿腹中屎並塗一切蛇偒秦皮洗并𫝊人尿洗之抹以口津以蛇纒人足尿之或沃温湯男子陰毛蛇傷以口含之咽汁雞子合蛇傷處鴆喙刮末傅之虺佩之辟蛇麝香傅蜈蚣燒𫝊雄黄同乾薑傅並佩之辟蛇虺蜈蚣傷蝸牛蛞蝓烏雞屎五靈脂獨蒜蕓薹子油蛇含香附爵莧菜馬齒莧菩薩草人參蚯蚓泥胡椒茱茰楝葉汁生薑汁調蚌粉桑根汁雄黄井底泥食鹽生鐵磨醋耳塞頭垢同苦參地上土尿坑泥城東腐木漬汁之並塗雞冠血塗蜈中蚣毒舌脹出口者含滿咽汁雞子合之蜘蛛咂咬處麻鞋底灸熨亂髮燒熏燈火照熏牛血猪血並主誤吞蜈蚣飲之至飽當吐出也蜂蠆傷内治貝母酒外服治雄黄磨醋菩薩石梳垢麝香牛酥牛角灰牛屎灰蟹殻燒甲煎楮汁莧汁茱茰蛇含葵花灰藋人參嚼白兔藿五葉藤尿坑泥簷溜下泥並塗蜂傷小薊惡實葵葉鬼針並塗蠍傷仍取汁服芋葉苦苣冬𤓰葉馬齒莧胡麻油韭汁乾薑薄荷青蒿大麻葉苦李仁楝葉汁藍汁酒糟藜葉蜀椒食茱茰木槿葉齒中殘飯半夏附子磨醋黄丹硇砂土㯽榔地上土白礬同南星丹砂食鹽蝸牛蛞蝓五靈脂海螵蛸驢耳垢守宮塗蠍傷蜘蛛蝙蝠傷熱酒洗赤龍浴水冷水温湯並浸洗葱白隔灸槐枝炮熨皂莢灸熨油梳炙熨雞子木盌並合之撥火杖蠍傷取横井土自安蜘蛛傷内治醇酒山中草蜘蛛毒人一身生絲飲醉并洗之貝母酒服蒼耳葉煎酒小薊煎糖飲并傅之秦皮煎服鬼針汁藍青汁羊乳牛乳並飲及傅外治芋葉葱胡麻油山豆根通草豨薟藜葉灰藋合歡皮舊簟灰蔓青汁桑汁雄黄鼠負蚯蚓土蜂窠赤翅蜂驢尿泥雞冠血麝香猴屎頭垢並塗之驢屎汁人屎汁並浸洗白礬傅壁䗂毒蠼螋傷内治醇酒蠼螋狀如小蜈蚣蚰蜓八足嘴有二鬚能夾人成瘡又能尿人影成瘡纍纍蠚人惡寒且熱但外飲酒至醉良治米醋豆豉茶葉梨葉雞腸草魚腥草馬鞭草大黄豨薟蒺藜巴豆敗醬草故蓑衣灰舊簟灰鹿角汁犀角汁羊鬚灰麝香烏雞翅灰燕窠土地上土食鹽胡粉雄黄丹砂並塗槐白皮浸醋洗雞子合之蠶蛓傷苦苣萵苣赤薜荔苧根預知子􅀈桐皮百部灰藋田父麝香並塗蠶咬紫荆皮洗蠶咬蠶繭草諸蟲如蠶咬毒入腹煮飲草犀服汁解惡蛓毒豉茖葱馬齒莧食茱茰松脂青黛韭汁燕窠土雄黄牛耳垢狐屎並傅惡蛓蟲傷丁香傅桑蝎傷麻油燈熏蝎蟲傷蛇退洗惡蟲傷蒜同麫胡𤓰根灰藋葉馬鞭草乾薑葱汁韭汁茶葉杏仁巴豆桑灰雄黄丹砂蟻蛭蜜蠟頭垢並傅狐尿蛓瘡烏雞搨狐尿瘡髮烟熏狐尿瘡人尿驢尿白馬尿並浸狐尿刺瘡蚯蚓蝸牛傷石灰鹽湯並主中蚯蚓咬毒形如大風泡湯浸之良葱蜀羊泉同黄丹百舌窠中土同醋鴨通並𫝊蚯蚓咬吹火筒蚓呵小兒陰腫吹之即消蓼子浸蝸牛吹射工沙虱毒内治山慈姑吐之蒼耳葉煎酒雄黄磨酒牛膝煎水草犀汁莧汁馬齒莧汁梅葉汁蘘荷汁狼毒汁鬼臼汁懸鈎子汁浮萍末知母末射干末白礬末同甘草丹砂末斑蝥燒溪狗蟲燒鸂􅈑炙食鵞血鴨血並主射工沙虱溪外毒中人寒熱生瘡治萵苣蒜白芥子芥子葱茖葱茱茰同蒜葱煮汁雞腸草梨葉皂莢末和醋白雞屎和􅄳鸀鳿毛屎芫青鼠負熊膽麝香白礬並