body:
  text: 本草綱目卷四十三目録鱗部李時珍曰鱗蟲有水陸二種鱗屬皆卵生而蝮蛇胎產水族皆不瞑而河豚目眨藍蛇之尾能解頭毒沙魚之皮還消鱠積非知者孰能察之唐宋本草蟲魚不分今析為鱗部九十四種分四類曰龍曰蛇曰魚曰無鱗魚神農本草經七種梁陶𢎞景註名醫别録一十種梁陶𢎞景註唐本草一種唐蘓恭本草拾遺二十八種唐陳藏器食療本草六種宋孟詵張鼎開寳本草一十一種宋馬志嘉祐本草一種宋掌禹錫日華本草一種宋人大明食鑑本草一種明寗原本草綱目二十八種明李時珍附註魏吳普本草論宋雷斆炮炙李當之藥録封齊徐之才藥唐甄權藥性唐李珣海藥孫思邈千金食治楊損之刪繁南唐陳士良食性宋蘇頌圖經蜀韓保昇重註唐慎微類證宋冦宗奭衍義囊金張元素珍珠陳承别説象元李杲法王好古湯液遺元朱震亨補吳瑞日用物明汪穎食汪機㑹編筌陳嘉謨䝉鱗之一龍類九種龍本經弔拾遺花即紫稍蛟龍綱目蜃附鼉龍本經鯪鯉别録甲即穿山石龍子本經蜴即蜥守宫綱目蟲十二時附蛤蚧開寳鹽龍綱目右附方舊十九新四十五鱗之二蛇類十七種蛇蜕本經蚺蛇别録鱗蛇綱目白花蛇開寳烏蛇開寶金蛇開寶附銀蛇水蛇綱目蛇婆拾遺黄頷蛇綱目附赤棟蛇蝮蛇别録附斫木蛇蚖别録藍蛇拾遺兩頭蛇拾遺天蛇綱目茍印拾遺蛇角綱目犀即骨咄諸蛇綱目右附方舊十六新六十本草綱目卷四十三目録
