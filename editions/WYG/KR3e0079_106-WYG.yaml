body:
  text: 本草綱目卷四十五明李時珍撰介之一龜鱉類一十七種附二種水龜本經上品釋名𤣥衣督郵時珍曰説文云龜頭與蛇同爾雅龜有十種郭璞隨文傅會殊欠分明盖山澤水火四種乃因帝龜所生之地而名也甚大至一尺已以上者在水曰寶龜亦曰蔡龜在山曰靈龜皆國之守寳而未能變化者也年至百千則具五色而或大或小變化無常在水曰神龜在山曰筮龜皆龜之聖者也火龜則生炎地如火䑕也攝龜則呷蛇龜也文龜則蟕蠵瑇瑁也後世不分山澤水火之異通以小者為神龜年久者為靈龜誤矣神龜難得今人取水中常龜入藥古今總標水龜而諸龜可該矣集解時珍曰甲蟲三百六十而神龜為之長龜形象離其神在坎上隆而文以法天下平而理以法地背隂向陽蛇頭龍頸外骨内肉腸屬於首能運任脉廣肩大腰卵生思抱其息以耳雌雄尾交亦與蛇匹或云大腰無雄者謬也今人視其底甲以辨雌雄龜以春夏出蟄脱甲秋冬藏穴導引故靈而多壽南越志云神龜大如拳而色如金上下兩邊如鋸齒爪至利能縁樹食蟬抱朴子云千歲靈龜五色具焉如玉如石變化莫測或大或小或遊於蓮葉之上或伏於茋叢之下張世南質龜論云龜老則神年至八百反大如錢夏則㳺於香荷冬則藏於藕節其息有黒氣如煤煙在荷心状甚分明人見此氣勿輙驚動但潜含油管噀之即不能遁形矣或云龜聞鉄聲則伏被蚊􅏐則死香油抹眼則入水不沉老桑煮之則易爛皆物理制伏之妙也龜甲釋名神屋本經敗龜版日華敗将日華漏天機圖經時珍曰並隐名也集解别録曰龜甲生南海池澤及海水中采無時勿令中濕濕即有毒陶𢎞景曰此用水中神龜長一尺二寸者為善厴可供卜殻可入藥亦入仙方當以生龜炙取韓保昇曰湖州江州交州者骨白而厚其色分明供卜入藥最良大明曰卜龜小而腹下曽鑚十遍者名敗龜版入藥良蘇頌曰今江湖間皆有之入藥湏用神龜神龜版當心前一處四方透明如琥珀色者最佳其頭方脚短殻圓版白者陽龜也頭尖脚長殻長版黄者隂龜也隂人用阦阦人用阥今醫家亦不知如此分别時珍曰古者取龜用秋攻龜用春今之采龜者聚至百十生鋸取甲而食其肉彼有龜王龜相龜将等名皆視其腹背左右之文以别之龜之直中文名曰千里其首之横文第一級左右有斜理皆接乎千里者即龜王也他龜即無此矣言占事帝王用王文用相武用将各依等級其説與逸禮所載天子一尺二寸諸侯八寸大夫六寸士庻四寸之説相合亦甚有理若夫神龜寶龜世所難得則入藥亦當依此用之可也日華用卜龜小甲盖取便耳又按經云龜甲勿令中濕一名神屋陶言厴可供卜殻可入藥則古者上下甲皆用之至日華始用龜版而後人遂主之矣正誤吴球曰先賢用敗龜版補隂借其氣也今人用鑚過及煮過者性氣不存矣惟靈山諸谷因風墜自敗者最佳田池自敗者次之人打壊者又次之時珍曰按陶氏用生龜炙取日華用灼多者皆以其有生性神靈也日敗者謂鑚灼陳久如敗也吴氏不達此理而反用自死枯敗之版復謂灼者失性謬矣縱有風墜自死者亦山龜耳淺學立異誤世鄙人據以為談故正之修治以龜甲鋸去四邊石上磨浄灰火炮過塗酥炙黄用亦有酒炙醋炙猪脂炙燒灰用者氣味甘平有毒甄權曰無毒時珍曰按經云中濕者有毒則不中濕者無毒矣之才曰惡沙參蜚蠊畏狗胋瘦銀主治甲治漏下赤白破癥瘕痎瘧五痔隂蝕濕痺四肢重弱小兒􅇟不合久服輕身不飢本經驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服益氣資智使人能食燒灰治小兒頭瘡難燥女子隂瘡别録殻主久𠻳斷瘧𢎞景殻炙末酒服主風脚弱蕭炳版治血麻痺日華燒灰治脱肛甄權下甲補隂主隂血不足去瘀血止血痢續筋骨治勞倦四肢無力震亨治腰脚酸痛補心腎益大膓止久痢久洩主難産消癰腫燒灰傅臁瘡時珍發明震亨曰敗龜版屬金水大有補隂之功而本草不言惜哉蓋龜乃隂中至隂之物禀北方之氣而生故能補隂治血治勞也時珍曰龜鹿皆靈而有壽龜首常藏向腹能通任脉故取其甲以補心補腎補血皆以養隂也鹿鼻常反向尾能通督脉故取其角以補命補精補氣皆以養陽也乃物理之𤣥微神工之能事觀龜甲所主諸病皆屬隂虚血弱自可心解矣又見龜甲附方舊二新十二補隂丸丹溪方用龜下甲酒炙熟地黄九蒸九晒各六兩黄栢䀋水浸炒知母酒炒各四兩石器為末以猪脊髓和丸梧子大每服百丸空心温酒下一方去地黄加五味子炒一兩瘧疾不止龜版燒存性研末酒服方寸匕海上名方抑結不散用龜下甲酒炙五兩側栢葉炒一兩半香附童便浸炒一兩為末米糊丸梧子大毎空心温酒服一百丸胎産下痢用龜甲一枚醋炙為末水飲服一錢日一經騐方難産催生秘録用龜甲燒末酒服方寸匕開摘𤣥治産三五日不下垂死及矮小女子交骨不者用乾龜殻一個酥炙婦人頭髪一握燒灰川芎當歸各一兩毎服秤七錢水煎服如人行五里許再一服生胞死胎俱下腫毒初起敗龜甲一枚燒研酒服四錢小品婦人乳毒同上方小兒頭瘡龜甲燒灰敷之恵聖方月蝕耳瘡同上口吻生瘡同上臁瘡朽臭生龜一枚取殻醋炙黄更煆存性出火氣入輕粉麝香葱湯洗浄搽敷之急救方人咬傷瘡龜版骨鱉肚骨各一片燒研油調搽之葉氏摘𤣥豬咬成瘡龜版燒研香油調搽之葉氏摘𤣥肉氣味甘酸温無毒𢎞景曰作羮臛大補而多神靈不可輕殺書家所載甚多此不具説思邈曰六甲日十二月俱不可食損人神不可合猪肉菰米𤓰莧食害人主治釀酒治大風緩急四肢拘攣或久癱緩不收皆瘥蘇恭煮食除濕痺風痺身腫踒折孟詵治筋骨疼痛及一二十年寒𠻳止㵼血血痢時珍發明時珍曰按周處風土記云江南五月五日煮肥龜入鹽䜴蒜蓼食之名曰葅龜取隂内陽外之義也附方舊一新六熱氣濕痺腹内激熱用龜肉同五味煮食之微泄為效普濟方筋骨疼痛用烏龜一個分作四脚毎用一脚入天花粉枸杞子各一錢二分雄黄五分麝香五分槐花三錢水一椀煎服纂要竒方十年欬𠻳或二十年醫不效者生龜三枚治如食法去腸以水五升煮取三升浸麴釀秫米四升如常飲之令盡永不發又方用生龜一枚着炊巾令人溺之浸至三日燒研以醇酒一升和末如乾飯頓服湏臾大吐𠻳囊出則愈小兒減半痢及㵼血烏龜肉以沙糖水拌椒和炙煮食之多度即愈普濟方勞瘵失血田龜煮取肉和葱椒醤油煮食補隂降火治虚勞失血咯血欬𠻳寒熱累用經騐吴球便民食療年久痔漏田龜二三個煮取肉入茴香葱醤常常食累騐此疾大忌糟醋等熱物便民食療血氣味鹹寒無毒主治塗脱肛甄權治打撲傷損和酒飲之仍擣生龜肉塗之時珍膽汁氣味苦寒無毒主治痘後目腫經月不開取㸃之良時珍溺采取頌曰按孫光憲北夢𤨏言云龜性妬而與蛇交惟取龜置瓦盆中以鑑照之龜見其影則滛發失尿急以物收取之又法以紙炷火以㸃其尻亦致失尿但差緩耳時珍曰今人惟以猪鬃或松葉刺其鼻即尿出似更簡㨗也主治滴耳治聾藏器㸃舌下治大人中風舌瘖小兒驚風不語摩胸背治龜胸龜背時珍發明時珍曰龜尿走竅透骨故能治瘖聾及龜背染鬚髪也按岣嶁神書言龜尿磨瓷器能令軟磨墨書石能入數分即此可推矣附方舊一新二小兒龜背以龜尿摩其胸背久久即差孫真人中風不語烏龜尿㸃少許於舌下神妙壽域鬚髪早白以龜尿調水蛭細末日日撚之自黒末忌粗談野翁方秦龜别録上品釋名山龜宋奭曰龜則四方皆有但秦地山中多老龜極大而壽故取為用以地别名集解别錄曰秦龜生山之隂土中二月八月采保昇曰今江南嶺南處處有之冬月藏土中春夏秋即出㳺溪谷古人獨取秦地者耳𢎞景曰此即山中龜不入水者其形大小無定方藥希用恭曰秦龜即蟕蠵更無别也士良曰秦人呼蟕蠵為山龜是矣藏器曰蟕蠵生海水中秦龜生山隂是深山中大龜如碑下趺者食草根竹萌冬蟄春出卜人亦取以占山澤掲甲亦可餙器物頌曰蟕蠵生嶺南别是一種山龜非秦龜也龜類甚多罕能遍識盖近世貨幣不用知卜者稀故尔弗貴也時珍曰山中常龜鹿喜食之其大而可卜者曰靈龜年至百嵗能變化者曰筮龜或伏於茋草之下或㳺於卷耳芩葉之上抱朴子所謂山中已日稱時君者為龜即此也其蟕蠵或以為山龜或云生海水中其説不定按山海經蠵龜生深澤中應劭注漢書云靈蠵大龜也雌曰蟕蠵雄曰玳瑁觀此則秦龜是山龜蟕蠵是澤龜與爾雅山龜澤龜水龜相合盖一種二類故其占卜入藥餙器功用尤同甲修治李珣曰經卜者更妙以酥或酒炙黄用氣味苦温無毒主治除濕痺氣身重四肢關節不可動揺别録頑風冷痺關節氣壅婦人赤白帶下破積癥孟詵補心宗奭治鼠瘻時珍發明宗奭曰大龜靈於物故方家用以補心然甚有騐時珍曰見龜甲附方新一鼠瘻劉涓子用山龜殻炙狸骨炙甘草炙雄黄桂心乾薑等分為末飲服方寸匕仍以艾炙瘡上用蜜和少許入瘡中良頭主治隂乾炙研服令人長逺入山不迷孟詵𢎞景曰前臑骨佩之亦然耳蠵龜綱目釋名蟕蠵音兹夷靈蠵漢書靈龜郭璞注􅔢鼊音拘璧一作蚼􅨐負􅀢音戱備雜爼作係臂者非皮名龜筒時珍曰蟕蠵鳴聲如兹夷故名􅔢鼊者南人呼龜皮之音也負􅀢者有力貌今碑趺象之或云大者為蟕蠵􅀢負小者為􅔢鼊甚通集解𢎞景曰蟕蠵生廣州恭曰即秦龜也藏器曰蟕蠵生海邊甲有文堪為物餙非山龜也保昇曰蘇恭之説非通論也按郭璞爾雅注云蟕蠵出涪陵郡大龜也其縁甲文似瑇瑁能鳴甲亦可卜俗呼靈龜是矣頌曰蟕蠵别是一種山龜之大者非秦龜也嶺表録云潮循間甚多人立背上可負而行鄉人取殻以生得全者為貴初用木換出其肉龜被楚毒鳴吼似牛聲振山谷古人謂生龜脱筒指此工人以其甲通明黄色者煮拍䧟瑇瑁為器謂之龜筒入藥亦以生脱為主日華曰蟕蠵即􅔢鼊也皮可寳裝餙物時珍曰蟕蠵諸説不一按山海經云蟕龜生深澤中注云大龜也甲有文采似瑇瑁而薄應劭注漢書云靈蠵大龜也雄曰瑇瑁雌曰蟕蠵據此二説皆出古典質以衆論則蟕蠵即􅔢鼊之大者當以藏器日華為凖也至於海邊山居水食瑇瑁之屬非若山龜不能入水也故功用専於解毒與瑇瑁相同自可意會劉欣期交州記云蚼􅨐似瑇瑁大如笠四足縵胡無指爪其甲有黒珠文采斑似錦文但薄而色淺不任作器惟堪貼餙今人謂之鼊皮臨海水土記云其形如龜鱉身其甲黄㸃有光廣七八寸長二三尺彼人以亂瑇瑁肉味如黿可食卵大如鴨卵正圓生食美於鳥卵酉陽雜爼云係臂状如龜生南海捕者必先祭後取之附録􅡷􅠦音迷麻鼂音朝時珍曰按臨海水土記云􅡷􅠦状似􅔢鼊而甲薄形大如龜味極美一枚有膏三斛又有鼂亦如􅔢鼊腹如羊胃可啖並生海邊沙中肉氣味甘平無毒主治去風熱利腸胃時珍血氣味鹹平㣲毒主治療俚人毒箭傷𢎞景中刀箭悶絶者刺飲便安日華蛇藏器曰南人用燋銅及汁毒亦多養此用龜筒釋名鼊皮氣味甘鹹平無毒主治血疾及中刀箭毒煎汁飲大明解藥毒蠱毒時珍瑇瑁宋開寳釋名玳瑁音代麻又音毒目􅎱時珍曰其功解毒毒物之所嫉者故名集解藏器曰瑇瑁生嶺南海畔山水間大如扇似龜甲中有文士良曰其身似龜首嘴如鸚鵡頌曰今廣南皆有龜類也大者如盤其腹背甲皆有紅㸃斑文入藥須用生者乃靈凢遇飲食有毒則必自揺動死者則不能神矣今人多用雜龜筒作器皿皆殺取之又經煮拍故生者殊難得時珍曰按范成大虞衡志云玳瑁生海洋深處状如龜黿而殻稍長背有甲十二片黒白斑文相錯而成其帬邊缺如鋸齒無足而有四鬛前長後短皆有鱗斑文如甲海人養以䀋水飼以小魚又顧玠海槎録云大者難得小者時時有之但老者甲厚而色明小者甲薄而色暗世言鞭血成斑謬矣取時必倒懸其身用滚醋潑之則甲逐片應手落下南方異物志云大者如籧篨背上有鱗大如扇取下乃見其文煮柔作器治以鮫魚皮瑩以枯木葉即光輝矣陸佃云瑇瑁不再交望卵影抱謂之護卵附錄撒八兒時珍曰按劉郁西域記云出西海中乃玳瑁遺精蛟魚吞食吐出年深結成者其價如金偽作者乃犀牛糞也竊謂此物貴重如此必有功用亦不知果是玳瑁遺精否亦無所詢證姑附於此以俟博識甲氣味甘寒無毒宗奭曰入藥用生者性味全也既經湯火即不堪用與生熟犀義同主治解嶺南百藥毒藏器破癥結消癰毒止驚癎日華療心風解煩熱行氣血利大小腸功與肉同士良磨汁服解蠱毒生佩之辟蠱毒蘇頌解痘毒鎮心神急驚客忤傷熱結狂言時珍發明時珍曰玳瑁解毒清熱之功同於犀角古方不用至宋時至寳丹始用之也又見鼈甲附方舊一新二解蠱毒生玳瑁磨濃汁水服一盞即消楊氏産乳預解痘毒遇行時服此未發内消已發稀少用生玳瑁生犀角各磨汁一合和勻温服半合日三服最良靈苑方痘瘡黒䧟乃心熱血凝也用生玳瑁生犀角同磨汁一合入猪心血少許紫草湯五匙和勻温服痘聞人䂓疹論迎風目淚乃心腎虚熱也用生玳瑁羚羊角各一兩石燕子一雙為末毎服一錢薄荷湯下日一服鴻飛集肉氣味甘平無毒主治諸風毒逐邪熱去風傷風熱行氣血鎮心神利大小腸通婦人經脉士良血主治解諸藥毒刺血飲之開寳綠毛龜䝉筌釋名緑衣使者綱目集解時珍曰緑毛龜出南海之内鄉及唐縣今惟蘄州以充方物養鬻者取自溪澗畜水缸中飼以魚鰕冬則除水乆乆生毛長四五寸毛中有金線脊骨有三稜底中如象牙色其大如五銖錢者為真他龜久養亦生毛但大而無金線底色黄黑為異尔南齊書載永明中有獻青毛神龜者即此也又録異記云唐𤣥宗時方士獻徑寸小龜金色可愛云置椀中能辟蛇虺之毒此亦龜之異也修治時珍曰此龜古方無用者近世滋補方徃徃用之大抵與龜甲同功劉氏先天丸用之其法小龜九枚以活鯉二尾安釡中入水覆以米篩安龜在篩上蒸熟取肉晒乾其甲仍以酥炙黄入藥用又有連甲肉頭頸俱用者氣味甘酸平無毒主治通任脉助陽道補隂血益精氣治痿弱時珍縛置額端能禁邪瘧收藏書笥可辟蠧蟲嘉謨瘧龜拾遺集解藏器曰生蒿山石下偏頭大嘴氣味無毒主治老瘧發作無時名㾬瘧俚人呼為妖瘧用此燒灰頓服二錢當㣲利用頭彌佳或發時煮湯坐於中或懸於病人卧處藏器鶚龜拾遺集解藏器曰生南海状如龜長二三尺兩目在側如鶚亦呼水龜非前水龜也附録旋龜時珍曰按山海經云杻陽之山怪水出焉中多旋龜鳥首虺尾聲如破木佩之已聾亦此類也氣味無毒主治婦人難産臨月佩之臨時燒末酒服藏器攝龜蜀本草釋名呷蛇龜日華作夾蛇陵龜郭璞鴦龜陶𢎞景蠳龜抱朴子恭曰鴦龜腹折見蛇則呷而食之故楚人呼呷蛇龜江東呼陵龜居丘陵也時珍曰既以呷蛇得名則攝亦蛇音之轉而蠳亦鴦音之轉也集解𢎞景曰鴦小龜也處處有之狹小而長尾用卜吉凶正與龜相反保昇曰攝龜腹小中心横折能自開闔好食蛇也肉氣味甘寒有毒詵曰此物噉蛇肉不可食殻亦不堪用主治生研塗撲損筋脉傷士良生搗罯蛇傷以其食蛇也陶𢎞景尾主治佩之辟蛇蛇咬則刮末傅之便愈抱朴子甲主治人咬瘡潰爛燒灰傅之時珍𤣥出摘賁龜音奔綱目釋名三足龜爾雅集解時珍曰按山海經云狂水西注伊水中多三足龜食之無大疾可以已腫唐書云江州獻六眼龜大明會典云暹羅國獻六足龜宋史云趙霆獻兩頭龜此又前人所未知者也肉氣味主治食之辟時疾消腫山海經鼈本經中品釋名團魚俗名神守時珍曰鼈行蹩躄故謂之鼈淮南子云鼈無耳而守神神守之名以此陸佃云魚滿三千六百則蛟龍引之而飛納鼈守之則免故鼈名守神河伯從事古今注集解時珍曰鼈甲蟲也水居陸生穹脊連脇與龜同類四緣有肉裙故曰龜甲裹肉鼈肉裹甲無耳以目為聽純雌無雄以蛇及黿為匹故萬畢術云燒黿脂可以致鼈也夏日孚乳其抱以影埤雅云卵生思抱其状隨日影而轉在水中上必有浮沫名鼈津人以此取之今有呼鼈者作聲撫掌望津而取百十不失管子云涸水之精名曰蟡以名呼之可取魚鼈正此類也類從云鼉一鳴而鼈伏性相制也又畏蚊生鼈遇蚊叮則死七鼈得蚊煮而爛而熏蚊者復用鼈甲物相報復如此異哉淮南子云膏之殺鼈類之不可推也鼈甲修治别録曰鼈甲生丹陽池澤采無時頌曰今處處有之以岳州沅江所出甲有九肋者為勝入藥以醋炙黄用𢎞景曰采得生取甲剔去肉者為好凡有連厭及乾巖者便真若肋骨出者是煮熟不可用斆曰凡使要緑色九肋多裙重七兩者為上用六一泥固瓶子底待乾安甲於中以物搘起若治癥塊定心藥用頭醋入瓶内大火煎盡三升乃去裙肋骨炙乾入用若治勞去熱藥不用醋用童子小便煎盡一斗二升乃去裙留骨石臼搗粉以雞䏶皮裹之取東流水三升盆盛閣於盆上一宿取用力有萬倍也時珍曰按衛生寳鑑云凡鼈甲以煆竈灰一斗酒五升浸一夜煮令爛如膠漆用更佳桑柴灰尤妙氣味鹹平無毒之才曰惡礬石理石主治心腹癥瘕堅積寒熱去痞疾息肉隂蝕痔核惡肉本經療温瘧血瘕腰痛小兒脇下堅别録宿食癥塊痃癖冷瘕勞瘦除骨熱骨節間勞熱結實壅塞下氣婦人漏下五色下瘀血甄權去血氣破癥結惡血墮胎消瘡腫腸癰并撲損瘀血日華補隂補氣震亨除老瘧瘧母隂毒腹痛勞復食復斑痘煩喘小兒驚癎婦人經脉不通難産産後隂脫丈夫隂瘡石淋斂潰癰時珍發明宗奭曰經中不言治勞惟藥性論言治勞瘦骨熱故虚勞多用之然甚有據但不可過劑耳時珍曰鼈甲乃厥隂肝經血分之藥肝主血也試常思之龜鼈之属功各有所主鼈色青入肝故所主者瘧勞寒熱痃瘕驚癎經水癰腫隂瘡皆厥隂血分之病也瑇瑁色赤入心故所主者心風驚熱傷寒狂亂痘毒腫毒皆少隂血分之病也秦龜色黄入脾故所主者頑風濕痺身重蠱毒皆太隂血分之病也水龜色黒入腎故所主者隂虛精弱腰脚痠痿隂瘧洩痢皆少隂血分之病也介蟲隂類故並主隂經血分之病從其類也附方舊十三新六老瘧勞瘧用鼈甲醋炙研末酒服方寸匕隔夜一服清早一服臨時一服無不㫁者入雄黄少許更佳肘后奔豚氣痛上冲心腹鼈甲醋炙三兩京三稜煨二兩桃仁去皮尖四兩湯浸研汁三升煎二升入末煎良久下醋一升煎如餳以缾收之毎空心酒服半匙聖濟録血瘕癥癖甄權曰用鼈甲琥珀大黄等分作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服也痃癖癥積甄權曰用鼈甲醋炙黄研末牛乳一合毎調一匙朝朝服之婦人漏下甄權曰鼈甲醋炙研末清酒服方寸匕日二又用乾薑鼈甲訶黎勒皮等分為末糊丸空心下三十丸日再婦人難産鼈甲燒存性研末酒服方寸匕立出梅師勞復食復篤病初起受勞傷食致復欲死者鼈甲燒研水服方寸匕肘后方小兒癎疾用鼈甲炙研乳服一錢日二亦可蜜丸服子母録卒得腰痛不可俛仰用鼈甲炙研末酒服方寸匕日二肘后方沙石淋痛用九肋鼈甲醋炙研末酒服方寸匕日三服石出瘥肘后方隂虚夢泄九肋鼈甲燒研毎用一字以酒半盞童尿半盞葱白七寸同煎去葱日脯時服之出臭汗為度醫壘元戎吐血不止鼈甲蛤粉各一兩同炒色黄熟地黄一兩半晒乾為末毎服二錢食后茶下聖濟録癍痘煩喘小便不利者用鼈甲二兩燈心一把水一升半煎六合分二服凡患大小便有血者中壊也黒厭無膿者十死不治龎安時傷寒論癰疽不歛不拘發背一切瘡用鼈甲燒存性研掺甚妙李樓怪症竒方腸癰肉痛鼈甲燒存性研水服一錢日三傳信方隂頭生瘡人不能治者鼈甲一枚燒研雞子白和傅千金方瀋唇緊裂用鼈甲及頭燒研傅之類要人咬指爛久欲脱者鼈甲燒灰傅之葉氏摘𤣥方肉氣味甘平無毒頌曰久食性冷損人藏器曰禮記食鼈去醜為頸下有軟骨如龜形者也食之令人患水病凡鼈之三足者赤足者獨目者頭足不縮者其目四䧟者腹下有王字卜字文者腹有蛇文者是蛇化也在山上者名旱鼈並有毒殺人不可食𢎞景曰不可合雞子食莧菜食昔有人剉鼈以赤莧同包置濕地經旬皆成生鼈又有裹鼈甲屑經五月皆成鼈者思邈曰不可合猪兎鴨肉食損人不可合芥子食生惡瘡妊婦食之令子短項時珍曰案三元參贊書言鼈性冷發水病有冷勞氣癥瘕人不宜食之生生編言鼈性熱戴原禮言鼈之陽聚于上甲久食令人生發背似與性冷之説相反盖鼈性本不熱食之者和以椒薑熱物太多失其本性耳鼈性畏葱及桑灰凡食鼈者宜取沙河小鼈斬頭去血以桑灰湯煮熟去骨甲換水再煮入葱醤作羮膳食乃良其膽味辣破入湯中可代椒而辟腥氣李九華云鼈肉主聚鼈甲主散食鼈剉甲少許入之庻幾稍平又言薄荷煮鼈能害人此皆人之所不知者也主治傷中益氣補不足别録熱氣濕痺腹中激熱五味煮食當㣲泄藏器婦人漏下五色羸瘦宜常食之孟詵婦人帶下血瘕腰痛日華去血熱補虚久食性冷蘓頌補隂震享作臛食治久痢長髭鬚作丸服治虚勞痃癖脚氣時珍附方新三痃癖氣塊用大鼈一枚以蠶沙一斗桑柴灰一斗淋汁五度同煮如泥去骨再煮成膏擣丸梧子大毎服十丸日三聖恵方寒濕脚氣疼不可忍用團魚二個水二斗煮一斗去魚取汁加蒼耳蒼术尋風藤各半斤煎至七升去渣以盆盛熏蒸待温浸洗神效乾坤生意骨蒸欬𠻳潮熱團魚丸用團魚一個柴胡前胡貝母知母杏仁各五錢同煮待熟去骨甲裙再煮食肉飲汁将藥焙研為末仍以骨甲裙煮汁和丸梧子大每空心黄茋湯下三十丸日二服服盡仍治参茋藥調之竒效方脂主治除日㧞白髮取脂塗孔中即不生欲再生者白犬乳汁塗之藏器頭隂乾主治燒灰療小兒諸疾婦人産後隂脱下墜尸疰心腹痛恭傳歴年脱肛不愈日華附方舊一新二小兒尸疰勞瘦或時寒熱用鼈頭一枚燒灰新汲水服半錢日一服聖惠方産後隂脱千金用鼈頭五枚燒研井華水服方寸匕日三録騐加葛根二兩酒服大腸脱肛久積虚冷以鼈頭炙研米飲服方寸匕日二服仍以末塗腸頭上千金頭血主治塗脫肛出甄權風中血脉口眼喎僻小兒疳勞潮熱時珍發明時珍曰按千金方云目瞤唇動口喎皆風入血脉急以小續命湯服之外用鼈血或鷄冠血調伏龍肝散塗之乾則再上甚妙盖鼈血之性急縮走血故治口喎脱肛之病附方新二中風口喎鼈血調烏頭末塗之待正則即掲去肘后方小兒疳勞治潮熱徃来五心煩燥盜汗欬𠻳用鼈血丸主之以黄連胡黄連各稱二兩以鼈血一盞吴茱萸一兩同入内浸過一夜炒乾去茱血研末入柴胡川芎蕪荑各一兩人參半兩使君子仁二十個為末煮粟米粉糊和為丸如黍米大毎用熟水量大小日服三全㓜心鑑卵主治鹽藏煨食止小兒下痢時珍爪主治五月五日收藏衣領中令人不忘肘后納鼈宋圖經集解頌曰鼈之無裙而頭足不縮者名曰納亦作魶肉氣味有毒頌曰食之令人昏塞以黄茋吴藍煎湯服之即解甲氣味有小毒主治𫝊尸勞及女子經閉蘇頌能奴来切鼈綱目釋名三足鼈集解時珍曰爾雅云鼈三足為能郭璞云今吴興陽羨縣君山池中出之或以鯀化黄能即此者非也肉氣味大寒有毒頌曰食之殺人時珍曰安姚福庚巳編云太倉民家得三足鼈命婦烹食畢入卧少頃形化為血水止存髪耳隣人疑其婦謀害訟之官時知縣黄廷宣鞠問不决乃别取三足鼈令婦如前烹治取死囚食之入獄亦化如前人遂辨其獄竊謂能之有毒不應如此然理外之事亦未可以臆㫁也而山海經云從水多三足鼈食之無蠱近亦有人誤食而無恙者何哉盖有毒害人亦未必至於骨肉頓化也主治折傷主痛化血生擣塗之道家辟諸厭穢死氣或畫像止之蘇恭朱鼈拾遺集解藏器曰生南海大如錢腹赤如血云在水中着水馬脚皆令仆倒也時珍曰按淮南子云朱鼈浮波必有大雨主治丈夫佩之刀劒不能傷女人佩之有媚色藏器珠鼈綱目集解時珍曰按山海經云葛山澧水有珠鼈状如肺而有目六足有珠一統志云生髙州海中状如肺四目六足而吐珠吕氏春秋云澧水魚之美者名曰珠鼈六足有珠淮南子云蛤蟹珠鼈與月盛衰埤雅云鼈珠在足蚌珠在腹皆指此也氣味甘酸無毒主治食之辟疫癘時珍黿拾遺釋名時珍曰按説文云黿大鼈也甲蟲惟黿最大故字從元元者大也集解頌曰黿生南方出江湖中大者圍一二丈南人捕食之肉有五色而白者多其卵圓大如鷄鴨子一産一二百枚人亦掘取以鹽淹食煮之白不凝藏器曰性至難死剔其肉盡口猶咬物可張鳥鳶𢎞景曰此物老曰能變為魅非急弗食之時珍曰黿如鼈而大背有􅀈􅀈青黄色大頭黄頸腸屬於首以鼈為雌卵生思化故曰黿鳴鼈應淮南子云燒黿脂以致鼈皆氣類相感也張鼎云其脂摩鉄則明或云此物在水食魚與人其體具十二生肖肉裂而懸之一夜便覺垂長也甲氣味甘平無毒主治炙黄酒浸治瘰癧殺蟲逐風惡瘡痔瘻風頑疥瘙功同鼈甲藏器五臟邪氣殺百蟲毒百藥毒續筋骨日華婦人血熱蘇頌肉氣味甘平㣲毒主治濕氣邪氣諸蟲藏器食之補益陶𢎞景脂主治摩風及惡瘡孟詵膽氣味苦寒有毒主治喉痺以生薑薄荷汁化少許服取吐時珍蟹本經中品釋名螃䲒蟹譜郭索揚雄方言横行介士蟹譜無腸公子抱朴子雄曰蛝螘雌曰博帶廣雅蜕宗奭曰此物之来秋初如蟬殻名蟹之意必取此義時珍曰按傳胘蟹譜云蟹水蟲也故字從蟲亦魚屬也故古人從魚以其横行則曰螃䲒以其行聲則曰郭索以其外骨則曰介士以其内空則曰無腸集解别録曰蟹生伊洛池澤諸水中取無時𢎞景曰蟹類甚多蝤蛑擁劍蟛螖皆是並不入藥海邊又有蟛蜞似蟛螖而大似蟹而小不可食蔡謨初渡江不識蟛蜞啖之幾死嘆曰讀爾雅不熟為學者所誤也頌曰今淮海汴京河北陂澤中多有之伊洛乃反難得也今人以為食品佳味俗傳八月一日取稻芒兩枝長一二寸許東行輸送芒長故今南方捕蟹差早則有銜芒須霜後輸芒方可食之否則毒尤猛也其類甚多六足者名蛫音詭四足者名牝皆有大毒不可食其殻闊而多黄者名蟙生南海中其螯最鋭斷物如芟刈也食之行風氣其扁而最大後足闊者名蝤蛑南人謂之撥掉子以其後脚如掉也一名蟳隨潮退殻一退一長其大者如升小者如盞楪兩螯如手所以異於衆蟹也其力至強八月能與虎鬬虎不如也一螯大一螯小者名擁劍一名桀歩常以大螯鬬小螯食物又名執火以其螯赤也其最小無毛者名蟛螖音越吴人訛為彭越爾雅云螖蠌小者螃郭璞註云即蟛螖也時珍曰蟹横行甲蟲也外剛内柔於卦象離骨眼蜩腹䖱腦鱟足二螯八脆利鉗尖爪殻脆而堅有十二星㸃雄者臍長雌者臍團腹中之黄應月盈􅃜其性多躁引聲噀沫至死乃已生於流水者色黄而醒生於止水者色紺而馨佛書言其散子後即自枯死霜前食物故有毒霜後将蟄故味美所謂入海輸芒者亦謬談也蟛蜞大於蟛螖生於陂池田港中故有毒令人吐下似蟛蜞而生於沙穴中見人便走者沙狗也不可食似蟛蜞而生海中潮至出穴而望者望潮也可食兩螯極小如石者蚌江也不可食生溪澗石穴中小而殻堅赤者石蟹也野人食之又海中有紅蟹大而色紅飛蟹能飛善化國有百足之蟹海中蟹大如錢而腹下又有小蟹如榆莢者蟹奴也居蚌腹者蠣奴也又名寄居蟹並不可食蟹腹中有蟲如小木鼈子而白者不可食大能發風也宗奭曰取蟹以八九月蟹浪之時伺其出水而拾之夜則以火照捕之時黄與白滿殻也修治時珍曰凡蟹生烹鹽藏糟枚酒浸醤汁浸皆為佳品但久留易沙見燈亦沙得椒易䐈得皂莢或蒜及韶粉可免沙䐈得白芷則黄不散得葱及五味子同煮則色不變藏蟹名曰蝑蟹音㵼氣味鹹寒有小毒𢎞景曰未被霜甚有毒云食水茛所致人中之不療多死也獨螯獨目兩目相向六足四足腹下有毛腹中有骨頭背有星㸃足斑目赤者並不可食有毒害人冬𤓰汁紫蘇汁蒜汁豉汁蘆根汁皆可解之鼎曰娠婦食之令子横生宗奭曰此物極動風風疾人不可食屢見其事時珍曰不可同柿及荆芥食發霍亂動風木香汁可解詳柿下主治胸中邪氣熱結痛喎僻面腫能敗漆燒之致鼠本經灌𢎞景曰仙方用之化漆為水服之長生以黒犬血之三日燒之諸鼠畢至頌曰其黄能化漆為水故塗漆瘡用之其螯燒烟可集鼠於庭也解結散血愈漆瘡養筋益氣别録散諸熱治胃氣理經脉消食以醋食之利胑節去五臟中煩悶氣益人孟詵産後肚痛血不下者以酒食之筋骨折傷者生搗炒罯之日華能續斷絶筋骨去殻同黄搗爛㣲炒納入瘡中筋即連也藏器小兒解顱不合以螯同白及末搗塗以合爲度宗奭殺茛菪毒解鱓魚毒漆毒治瘧及黄疸搗膏塗疥瘡癬瘡搗汁滴耳聾時珍蝤蛑氣味鹹寒無毒主治解熱氣治小兒痞氣煮食日華蟛蜞氣味鹹冷有毒主治取膏塗濕癬疽瘡藏器石蟹主治搗傅久疽瘡無不瘥者藏器發明慎㣲曰蟹非蛇鱔之穴無所寄故食鱔中毒者食蟹即解性相畏也沈栝筆談云關中無蟹土人怪其形状收乾者懸門上辟瘧不但人不識鬼亦不識也時珍曰諸蟹性皆冷亦無甚毒為蝑最良鮮蟹和以薑醋侑以醇酒咀黄持螯畧賞風味何毒之有饕嗜者乃頓食十許枚兼以葷羶雜進飲食自倍腸胃乃傷腹痛吐利亦所必致而歸咎於蟹蟹亦何咎哉洪邁夷堅志云襄陽一盜被生漆塗兩目發配不能覩物有村叟令尋石蟹搗碎濾汁㸃之則漆隨汁出而瘡愈也用之果明如初漆之畏蟹莫䆒其義附方新三濕熱黄疸蟹燒存性研末酒糊丸如梧桐子大每服五十丸白湯下日服二次簡集方骨節離脱生蟹搗爛以熱酒傾入連飲數椀其渣塗之半日内骨内谷谷有聲即好乾蟹燒灰酒服亦好唐瑶經騐方中鱓魚毒食蟹即解董炳騐方蟹爪主治破胞墮胎别録破宿血止産後血閉酒及醋湯煎服良日華能安胎鼎頌曰胡洽方治孕婦僵仆胎上搶心有蟹爪湯墮生胎下死胎辟邪魅時珍附方新二千金神造湯治子死腹中并雙胎一死一生服之令死者出生者安神騐方也用蟹爪一升甘草二尺東流水一斗以葦薪煮至二升濾去滓入真阿膠三兩令烊頓服或分二服若人困不能服者灌入即活下胎蟹爪散治妊婦有病欲去胎用蟹爪二合桂心瞿麥各一兩牛膝二兩為末空心温酒服一錢千金殻主治燒存性蜜調塗凍瘡及蜂薑傷酒服治婦人兒枕痛及血崩腹痛消積時珍附方新三崩中腹痛毛蟹殻燒存性米飲服一錢證治要訣蜂蠆螯傷蟹殻燒存性研末蜜調塗之同上熏辟壁虱蟹殻燒烟熏之摘𤣥鹽蟹汁主治喉風腫痛滿含細嚥即消時珍鱟魚音后祐宋嘉釋名時珍曰按羅願爾雅翼云鱟者候也鱟善候風故謂之鱟集解藏器曰鱟生南海大小皆牝牡相隨牝無目得牡始行牡去則牝死時珍曰鱟状如恵文冠及熨斗之形廣尺餘其甲瑩滑青黒色􅌯背骨眼眼在背上口在腹下頭如蜣蜋十二足似蟹在腹兩旁長五六尺尾長一二尺有三稜如㨑莖背上有骨如角髙七八寸如石珊瑚状毎過海相負示背乗風而遊俗呼鱟㠶亦曰鱟簰其血碧色腹有子如黍粟米可為醯醤尾有珠如粟其行也雌常負雄失其雌則雄即不動漁人取之必得其雙雄小雌大置之水中雄浮雌沉故閩人婚禮用之其藏伏沙上亦自飛躍皮殻甚堅可為冠亦屈為杓入香中能發香氣尾可為小如意脂燒之可集鼠其性畏蚊螫之即死又畏隙光射之亦死而日中暴之徃徃無恙也南人以其肉作鮓醤小者名鬼鱟食之害人肉氣味辛鹹平㣲毒藏器曰無毒瘡詵曰多食發𠻳及癬主治治痔殺蟲孟詵尾主治燒焦治腸風㵼血崩中帶下及産後痢日華發眀藏器曰骨及尾燒灰米飲服大主産後痢但須先服生地黄蜜煎等訖然後服此無不斷膽主治大風􅋪疾殺蟲時珍附方新一鱟膽散治大風􅋪疾用鱟魚膽生白礬生緑礬膩粉水銀麝香各半兩研不見星毎服一錢井華水下取下五色涎為妙聖濟總録殻主治積年呷𠻳時珍附方新一積年咳𠻳呀呷作聲用鱟魚殻半兩貝母煨一兩桔梗一分牙皂一分去皮酥炙為末煉蜜丸彈子大毎含一丸嚥汁服三丸即吐出惡涎而瘥聖惠本草綱目卷四十五
