body:
  text: 本草綱目卷二十八目錄菜之三蓏菜類十一種内附一種茄開寳苦茄拾遺壺盧日華苦瓠本經敗瓢綱目冬𤓰本經南𤓰綱目越𤓰開寳𤓰即梢胡𤓰嘉祐𤓰即黄絲𤓰綱目附天羅勒苦𤓰救荒右附方舊二十五新一百零八菜之四水菜類六種紫菜食療石蓴拾遺石花菜食鑑鹿角菜食性龍鬚菜綱目睡菜綱目菜之五芝栭類十五種内附四種芝本經木耳本經杉菌圖經皁角蕈綱目香蕈日用葛花菜綱目天花蕈日用蘑菰蕈綱目雞㙡綱目舵菜綱目土菌拾遺地芩鬼葢附鬼筆竹蓐食療雚菌本經附蜀格地耳别録石耳日用右附方舊七新二十六本草綱目卷二十八目録
