body:
  text: 本草綱目卷五目録水部李時珍曰水者坎之象也其文横則為縱則為其體純陰其用純陽上則為雨露霜雪下則為海河泉井流止寒温氣之所鍾既異甘淡鹹苦味之所入不同是以昔人分别九州水土以辨人之美惡壽夭蓋水為萬化之源土為萬物之母飲資于水食資于土飲食者人之命脈也而營衛賴之故曰水去則營竭穀去則衛亡然則水之性味尤慎疾衛生者之所當潛心也今集水之闗于藥食者凡四十三種分為二類曰天曰地舊本水類共三十二種散見玉石部名醫别録一種梁陶𢎞景註本草拾遺二十六種唐陳藏器嘉祐本草四種宋掌禹錫本草綱目一十一種明李時珍附註魏李常之樂録齊徐之才藥對呉普本草草唐蘇恭本宋雷效炮炙孫思邈千金唐李珣海藥唐孟詵食療甄權藥性性陳士良食楊損之刪繁註蜀韓保昇重宋馬志開寳冦宗奭衍義蘇頌圖經大明日華唐慎㣲證類珠囊金張元素珍元李杲法象明汪穎食物王好古湯液汪機㑹編朱震亨補遺王綸集要水之一天水類一十三種雨水拾遺潦水綱目霜水拾遺甘露拾遺甘露蜜拾遺明水拾遺冬霜拾遺臘雪嘉祐雹拾遺夏氷拾遺神水綱目半天河别錄屋漏水拾遺右附方舊一新三水之二地水類三十種流水拾遺井泉水嘉祐節氣水綱目醴泉拾遺玉井水拾遺乳穴水拾遺温湯拾遺碧海水拾遺鹽膽水拾遺阿井水綱目山岩泉水拾遺古塚中水拾遺糧罌中水拾遺赤龍浴水拾遺車轍水綱目地漿别錄熱湯嘉祐生熟湯拾遺虀水綱目漿水嘉祐甑氣水拾遺銅壺滴漏水綱日三家洗盌水拾遺磨刀水綱目浸藍水綱目豬槽中水拾遺市門溺坑水拾遺洗手足水綱目洗兒湯綱目諸水有毒拾遺右附方舊一十八新四十七互攷鐵漿水菊潭淬鐵水水石中黄玉泉湯漚麻石腦油米泔水酒茶醋蜜餲餹水蚯蚓沙餹水蝸牛繅絲湯燖雞湯螺螄水燖猪湯蜆子水洗禪水蟹化漆水胞衣水本草綱目卷五目錄
