body:
  text: 本草綱目卷三十二明李時珍撰果之四味類一十三種内附四種秦椒本經中品校正自木部移入此釋名大椒爾雅檓毁花椒集解别録曰秦椒生㤗山山谷及秦嶺上或瑯琊八月九月采實𢎞景曰今從西來形似椒而大色黄黒味亦頗有椒氣或云即今樛樹子樛乃豬椒恐謬恭曰秦椒樹葉及莖子都似蜀椒但味短實細爾藍田秦嶺間大有之頌曰今秦鳳明越金商州皆有之初秋生花秋末結實九月十月采之爾雅云檓大椒郭璞注云椒叢生實大者為檓也詩唐風云椒聊之實繁衍盈升陸璣疏義云椒樹似茱茰有針刺葉堅而滑澤味亦辛香蜀人作茶呉人作茗皆以其葉合煮為香今成臯諸山有竹葉椒其木亦如蜀椒小毒熱不中合藥也可入飲食中及蒸鷄豚用東海諸島上亦有椒枝葉皆相似子長而不圓甚香其味似橘皮島上麞鹿食其葉其肉自然作椒橘香今南北所生一種椒其實大於蜀椒與陶氏及郭陸之說正相合當以實大者為秦椒也宗奭曰此秦地所産者故言秦椒大率椒株皆相似但秦椒葉差大粒亦大而紋低不若蜀椒皺紋為髙異也然秦地亦有蜀椒種時珍曰秦椒花椒也始産於秦今處處可種最易蕃衍其葉對生尖而有刺四月生細花五月結實生青熟紅大於蜀椒其目亦不及蜀椒目光黒也范子計然云蜀椒出武都赤色者善秦椒出隴西天水粒細者善蘇頌謂其秋初生花葢不然也修治同蜀椒椒紅氣味辛温有毒别録曰生温熟寒有毒權曰苦辛之才曰惡苦蔞防葵畏雌黄主治除風邪氣温中去寒痺堅齒髪明目久服輕身好顔色耐老増年通神本經療喉痺吐逆疝瘕去老血産後餘疾腹痛出汗利五臟别録上氣欬嗽久風濕痺孟詵治惡風遍身四肢􅍙痺口齒浮腫揺動女人月閉不通産後惡血痢多年痢療腹中冷痛生毛髪滅瘢甄權能下腫濕氣震亨附方舊六膏痺尿多其人飲少用秦椒二分出汗𤓰蔕二分為末水服方寸匕日三服類傷寒要手足心腫乃風也椒鹽末等分醋和傅之良肘後方損瘡中風以麪作餫飩包秦椒於灰中燒之令熟斷開口封於瘡上冷即易之孟詵食療久患口瘡大椒去閉口者水洗麪拌煮作粥空腹吞之以飯壓下重者可再服以瘥為度食療本草牙齒風痛秦椒煎醋含潄孟詵食療百蟲入耳椒末一錢醋半盞浸良久少少滴入自出金續千方蜀椒本經中品校正自木部移入此釋名巴椒别録漢椒日華川椒綱目南椒炮炙論蓎藙唐毅㸃椒時珍曰蜀古國名漢水名今川西成都廣漢潼川諸處是矣巴亦國名又水名今川東重慶䕫州順慶閬中諸處是矣川則巴蜀之總稱因岷沱黒白四大水分東西南北為四川也集解别録曰蜀椒生武都山谷及巴郡八月采實隂乾𢎞景曰蜀郡北郡人家種之皮肉厚腹裏白氣味濃江陽晉康及建平間亦有而細赤辛而不香力勢不如巴郡者恭曰今出金州西域者最佳頌曰今歸峽及蜀川陜洛間人家多作園圃種之木高四五尺似茱茰而小有針刺葉堅而滑可煮飲食四月結子無花但生於枝葉間顆如小豆而圓皮紫赤色八月采實焙乾江淮北上亦有之莖葉都相類但不及蜀中者良而皮厚裏白味烈也時珍曰蜀椒肉厚皮皺其子光黒如人之瞳人故謂之椒目他椒子雖光黒亦不似之若土椒則子無光彩矣修治斆曰凡使南椒須去目及閉口者以酒拌濕蒸從已至午放冷密葢無氣後取出便入磁器中勿令傷風也宗奭曰凡用秦椒蜀椒並微炒使出汗乗熱入竹筒中以梗搗去裏面黄殻取紅用未盡再搗或只炒熱隔紙鋪地上以碗覆待冷碾取紅用椒紅氣味辛温有毒别録曰大熱多食令人乏氣喘促口閉者殺人詵曰五月食椒損氣傷心令人多忘李廷飛曰久食令人失明傷血脉之才曰杏仁為之使得鹽味佳畏欵冬花防風附子雄黄可收水銀中其毒者凉水麻仁漿解之主治邪氣欬逆温中逐骨節皮膚死肌寒熱痺痛下氣久服頭不白輕身増年本經除六腑寒冷傷寒温瘧大風汗不出心腹留飲宿食腸澼下痢洩精女子字乳餘疾散風邪瘕結水腫黄疸鬼疰蠱毒殺蟲魚毒久服開腠理通血脉堅齒髪明目調關節耐寒暑可作膏藥别録治頭風下淚腰脚不遂虚損留結破血下諸石水治欬𠻳腹内冷痛除齒痛甄權破癥結開胸治天行時氣産後宿血壯陽療隂汗暖腰膝縮小便止嘔逆大明通神去老益血利五臟下乳汁滅瘢生毛髪孟詵散寒除濕解鬱結消宿食通三焦温脾胃補右腎命門殺蚘蟲止泄瀉時珍發明頌曰服食方單服椒紅補下宜用蜀椒乃佳叚成式言椒氣下達餌之益下不上衝也時珍曰椒純陽之物乃手足太隂右腎命門氣分之藥其味辛而麻其氣温以熱禀南方之陽受西方之隂故能入肺散寒治欬嗽入脾除濕治風寒濕痺水腫瀉痢入右腎補火治陽衰溲數足弱久痢諸症一婦年七十餘病瀉五年百藥不效予以感應丸五十丸投之大便二日不行再以平胃摻加椒紅茴香棗肉為丸與服遂瘳毎因怒食舉發服之即止此除濕消食温脾補腎之驗也按嵗時記言嵗旦飲椒栢酒以辟疫癘椒乃玉衡星精服之令人體健耐老栢乃百木之精為仙藥能伏邪鬼故也呉猛真人服椒訣云椒禀五行之氣而生葉青皮紅花黄膜白子黒其氣馨香其性下行能使火熱下達不致上薰芳草之中功皆不及其方見下時珍竊謂椒紅丸雖云補腎不分水火未免誤人大抵此方惟脾胃及命門虚寒有濕鬱者相宜若肺胃素熱者大宜逺之故丹溪朱氏云椒屬火有下達之能服之既久則火自水中生故世人服椒者無不被其毒也又上清訣云凡人吃飯傷飽覺氣上衝心胸痞悶者以水吞生椒一二十顆即散取其能通三焦引正氣下惡氣消宿食也又戴原禮云凡人嘔吐服藥不納者必有蚘在膈間蚘聞藥則動動則藥出而蚘不出但於嘔吐藥中加炒川椒十粒良葢蚘見椒則頭伏也觀此則張仲景治蚘厥烏梅丸中用蜀椒亦此義也許叔微云大凡腎氣上逆須以川椒引之歸經則安附方舊十二新二十三椒紅丸治元臟傷憊目暗耳聾服之百日覺身輕少睡足有力是其效也服及三年心智爽悟目明倍常面色紅悅髭髪光黒用蜀椒去目及合口者炒出汗曝乾搗取紅一斤以生地黄搗自然汁入銅器中煎至一升候稀稠得所和椒末丸梧子大毎空心暖酒下三十丸合藥時勿令婦人鷄犬見詩云其椒應五行其仁通六義欲知先有功夜間無夢寐四時去煩勞五臟調元氣明目腰不痛身輕心健記别更有異能三年精自秘回老返嬰童康強不思睡九蟲頓消亡三尸自逃避若能久餌之神仙應可冀補益心腎仙方椒苓丸補益心腎明目駐顔順氣祛風延年真川椒一斤炒去汗白茯苓十兩去皮為末煉密丸梧子大毎服五十丸空心鹽湯下忌鐡器邵真人經驗方虚冷短氣川椒三兩去目并合口者以生絹袋盛浸無灰酒五升中三日隨性飲之腹内虚冷用生椒擇去不折者用四十粒以漿水浸一宿令合口空心新汲水吞下久服暖臟腑駐顔黒髪明目令人思飲食斗門方心腹冷痛以布褁椒安痛處用熨斗熨令椒出汗即止孫真人方冷蟲心痛川椒四兩炒出汗酒一椀淋之服酒壽域神方隂冷入腹有人隂冷漸漸冷氣入隂􅇸腫滿日夜疼悶欲死以布褁椒包嚢下熱氣大通日再易之以消為度千金呃噫不止川椒四兩炒研麪糊丸梧子大毎服十丸醋湯下神效邵以正經驗方傳尸勞疰最殺勞蟲用真川椒紅色者去子及合口以黄草紙二重隔之炒出汗取放地上以砂盆葢定以火灰密遮四旁約一時許為細末去殻以老酒浸白糕和丸梧子大毎服四十丸食前鹽湯下服至一斤其疾自愈此藥兼治諸痺用肉桂煎湯下腰痛用茴香湯下腎冷用鹽湯下昔有一人病此遇異人授是方服至二斤吐出一虫如蛇而安遂名神授丸陳言三因方歴節風痛白虎歴節風痛甚肉理枯虚生蟲遊走痒痛兼治痺疾半身不遂即上治勞疰神授丸方寒濕脚氣川椒二三升疎布嚢盛之日以踏脚實人所用大全良方諸瘡中風生蜀椒一升以少麪和搜褁椒勿令漏氣分作兩褁于煻灰火中燒熟刺頭作孔當瘡上罨之使椒氣射入瘡中冷即易之須㬰瘡中出水及遍體出冷汗即瘥也韋宙獨行方瘡腫作痛生椒末釜下土蕎麥粉等分研醋和傅之要外臺秘嚢瘡痛痒紅椒七粒葱頭七箇煮水洗之一人途中苦此湘山寺僧授此方數日愈名驅風散經驗方手足皴裂椒四合以水煮之去渣漬之半食頃出令燥須㬰再浸候乾塗豬羊腦髓極妙勝金方漆瘡作痒譚氏方用漢椒煎湯洗之相感志云凡至漆所嚼川椒塗鼻上不生漆瘡夏月濕㵼川椒炒取紅肉荳􅅳煨各一兩為末粳米飯丸梧子大毎量人米飲服百丸餐㵼不化及久痢小椒一兩炒蒼术二兩土炒研末醋糊丸梧子大毎米飲服五十丸普濟久冷下痢或不痢腰腹若冷用蜀椒三升酢漬一宿麴三升同椒一升拌作粥食不過三升瘥千金方老小洩瀉小兒水㵼及人年五十以上患㵼用椒二兩醋二升煮醋盡慢火焙乾碾末磁器貯之毎服二錢七酒及米飲下譚氏水瀉奶疳椒一分去目碾漠酥調少少塗腦上日三度姚和仲延齡方食茶面黄川椒紅炒碾漠糊丸梧子大毎服十丸茶湯下簡便方傷寒齒衂傷寒嘔血繼而齒縫出血不止用開口川椒四十九粒入醋一盞同煎熟入白􅈨少許服之直指方風蟲牙痛總録用川椒紅漠水和白麪九皂子大燒熱咬之數度愈一一方花椒四錢牙皂七七箇醋椀煎漱之頭上白秃花椒漠豬脂調傳三五度便愈普濟方婦人秃鬢漢椒四兩酒浸密室内日日搽之自然長也聖惠方蠍螫作痛川椒嚼細塗之㣲麻即止杏林摘要百蟲入耳川椒碾細浸醋灌之自出方危氏毒蛇咬螫以閉口椒及葉擣封之良肘後方蛇入人口因熱取凉臥地上有蛇入口不得出者用刀破蛇尾納生椒二三粒褁定須㬰即自退出也聖惠方小兒暴驚啼哭絶死蜀椒左顧牡蠣各六銖以酢漿水一升煮五合毎灌一合千金方舌蹇語吃川椒以生麪包丸毎服十粒醋湯送下救急方痔漏脫肛毎日空心嚼川椒一錢凉水送下三五次即收同上腎風嚢痒川椒杏仁研膏塗掌心合隂嚢而臥甚效直指方椒目氣味苦寒無毒權曰苦辛有小毒主治水腹脹滿利小便蘇恭治十二種水氣及腎虚耳卒鳴聾膀胱急甄權止氣喘震亨發明權曰椒氣下達故椒目能治腎虚耳鳴用巴豆菖蒲同碾細以松脂黄蠟溶和為挺納耳中抽之治腎氣虚耳中如風水鳴或如打鐘磬之聲卒暴聾者一日一易神驗宗奭曰椒目治盗汗有功將目㣲炒碾細用半錢以生猪上唇煎湯一合睡時調服無不效葢椒目能行水又治水蠱也震亨曰諸喘不止用椒目炒碾二錢白湯調服二三服以上劫之後乃隨痰火用藥時珍曰椒目下達能行渗道不行穀道所以能下水燥濕定喘消蠱也附方新五水氣腫滿椒目炒搗如膏毎酒服方寸匕千金方留飲腹痛椒目二兩巴豆一兩去皮心熬搗以棗膏和丸麻子大每枚服二丸吞下其痛即止又方椒目十四枚巴豆一䜴十六枚合搗為二丸服之取吐利肘後方痔漏腫痛椒目一撮碾細空心水服三錢如神上海方崩中帶下椒目炒碾細毎温酒服一鈎金匱鈎𤣥眼生黒花年久不可治者椒目炒一兩蒼术炒一兩為末醋糊丸梧子大毎服二十丸醋湯下本事方葉氣味辛熱無毒主治奔豚伏梁氣及内外腎釣并霍亂轉筋和艾及葱碾以醋拌罨之大明殺蟲洗脚氣及漆瘡時珍根氣味辛熱㣲毒主治腎與膀胱虚冷血淋色瘀者煎湯細飲色鮮者勿服時珍要出證治訣崖椒宋圖經釋名野椒集解頌曰施州一種崖椒葉大於蜀椒彼土人四季采皮入藥時珍曰此即俗名野椒也不甚香而子灰色不黒無光野人用炒鷄鴨食椒紅氣味辛熱無毒忌鹽時珍曰有毒主治肺氣上喘兼􅠲嗽并野薑為末酒服一錢七蘇頌蔓椒本經下品校正自木部移入此釋名豬椒别録豕椒别録彘椒别録豨椒𢎞景狗椒别録金椒圖經時珍曰此椒蔓生氣臭如狗彘故得諸名集解别景曰蔓椒生雲中山谷及邱冡間采莖根煮釀酒𢎞景曰山野處處有之俗呼為樛子似椒欓而小不香一名豨椒可以蒸病出汗時珍曰蔓椒野生林箐間枝軟如蔓子葉皆似椒山人亦食之爾雅云椒榝醜捄謂其子叢生也陶氏所謂樛子當作捄子諸椒之通稱非獨蔓椒也實根莖氣味苦温無毒主治風寒濕痺歴節疼除四肢厥氣膝痛煎湯蒸浴取汗本經根主痔燒末服并煮汁浸之蔵器賊風攣急孟詵通身水腫用枝葉煎如汁熬如􅄳狀毎空心服一匙日三服時珍金出千地椒宋嘉祐校正自草部移入此集解禹錫曰地椒出上黨郡其苖覆地蔓生莖葉甚細花作小朶色紫白因舊莖而生時珍曰地椒出北地即蔓椒之小者貼地生葉形小味㣲辛土人以煮羊肉食香美實氣味辛温有小毒主治淋渫腫痛可作殺蛀蟲藥嘉祐附方新一牙痛地花椒川芎藭尖等分為漠擦之海上名方胡椒唐本草校正自木部移入此釋名昧履支時珍曰胡椒因其辛辣似椒故得椒名實非椒也集解恭曰胡椒生西戎形如鼠李子調食用之味甚辛辣慎㣲曰按叚成式酉陽雜俎云胡椒出摩伽陁國呼為昧履支其苖蔓生莖極柔弱葉長寸半有細條與葉齊條條結子兩兩相對其葉晨開暮合合則褁其子于葉中形似漢椒至辛辣六月采今食料用之時珍曰胡椒今南番諸國及交趾滇南海南諸地皆有之蔓生附樹及作棚引之葉如扁豆山藥輩正月開黄白花結椒纍纍纒藤而生狀如梧桐子亦無核生青熟紅青者更辣四月熟五月采收曝乾乃皺今遍中國食品為日用之物也實氣味辛大温無毒時珍曰辛熱純陽走氣助火昬目發瘡珣曰多食損肺令人吐血主治下氣温中去痰除臟腑中風冷唐本去胃口虚冷氣宿食不消霍亂氣逆心腹卒痛冷氣上衝李珣調五臟壯腎氣治冷痢殺一切魚肉鼈蕈毒大明去胃寒吐水大腸寒滑宗奭暖腸胃除寒濕反胃虚脹冷積隂毒牙齒浮熱作痛時珍發明宗奭曰胡椒去胃中寒痰食已則吐水甚驗大腸寒滑亦可用須以他藥佐之過劑則走氣也震亨曰胡椒屬火而性燥食之快膈喜之者衆積久則脾胃肺氣大傷凡病氣疾人益大其禍也牙齒痛必用胡椒蓽茇者散其中浮熱也時珍曰胡椒大辛熱純陽之物腸胃寒濕者宜之熱病人食之䡃火傷氣隂受其害時珍自少嗜之嵗嵗病目而不疑及也後漸知其弊遂痛絶之目病亦止纔食一二粒即便昏澀此乃昔人所未試者葢辛走氣熱助火此物氣味俱厚故也病咽㗋口齒者亦宜忌之近醫毎以緑豆同用治病有效葢豆寒椒熱隂陽配合得宜且以豆制椒毒也按張從正儒門事親云噎膈之病或因酒得或因氣得或因胃火醫氏不察火裏燒薑湯中煮桂丁香未已荳􅅳繼之蓽茇未已胡椒繼之雖曰和胃胃本不寒雖曰補胃胃本不虚况三陽既結食必上潮止宜湯丸小小潤之可也時珍竊謂此說雖是然亦有食入反出無火之證又有痰氣鬱結得辛熱暫開之證不可執一也附方舊二新一十五心腹冷痛胡椒三七枚清酒吞之或云一嵗一粒孟詵食療心下大痛夀域方用椒四十九粒乳香一錢研匀男用生薑女用當歸酒下又方用椒五分没藥三錢研細分二服温酒下酒又方胡椒緑豆各四十九粒研爛下神効霍亂吐利孫真人用胡椒三十粒以飲吞之粒直指方用胡椒四十九粒緑豆一百四十九研勻木𤓰湯服一錢反胃吐食戴原禮方用胡椒醋浸日乾如此七次為漠酒糊丸梧子大毎服三四十丸醋湯下聖惠方用胡椒七錢半煨薑一兩水煎分二服丸是齋百一方用胡椒半夏湯泡等分為漠薑汁糊梧子大毎薑湯下三十丸夏月冷瀉及霍亂用胡椒碾漠飯丸梧子大毎米飲下四十丸衛生易簡方赤白下痢胡椒緑豆各一嵗一粒為漠糊丸梧子大紅用生薑白用米湯下集簡方大小便閉關格不通脹悶二三日則殺人胡椒二十一粒打碎水一盞煎六分去滓入芒硝半兩煎化服總録小兒虚脹塌氣丸用胡椒一兩蠍尾半兩為漠麪糊丸粟米大毎服五七丸陳米飲下一加萊菔子半兩錢乙方虚寒積癖在背膜之外流於兩脇氣逆喘急久則營衛凝滯潰為癰疽多致不救用胡椒二百五十粒蠍尾四箇生木香二錢半為漠粟米飯丸緑豆大毎服二十丸橘皮湯下名磨積丸濟生方房勞隂毒胡椒七粒葱心二寸半麝香一分搗爛以黄蠟溶和做成條子挿入隂内少頃汗出即愈孫氏集効方驚風内釣胡椒木鱉子仁等分為末醋調黒豆末和杵丸緑豆大毎服三四十丸荆芥湯下聖惠發散寒邪胡椒丁香各七粒碾碎以葱白搗膏和塗兩手心合掌握定夾于大腿内側温覆取汗則愈傷寒藴要傷寒欬逆日夜不止寒氣攻胃也胡椒三十粒打碎麝香半錢酒一鍾煎半鍾熱服聖惠方風蟲牙痛衛生易簡方用胡椒蓽茇等分為末蠟丸麻子大毎用一丸塞蛀孔中韓氏醫通治風虫客寒三般牙痛呻吟不止用胡椒九粒緑豆十一粒布褁搥碎以絲綿包作一粒患處咬定涎出吐去立愈普濟方用胡椒一錢半以羊脂拌打四十丸擦之追涎阿伽陁丸治婦人血崩用胡椒紫檀香鬱金茜根小蘗皮等分為漠水丸梧子大毎服二十丸阿膠湯下時珍曰按酉陽雜俎胡椒出摩伽陁國此方之名因此而訛者也沙石淋痛胡椒朴硝等分為末毎服用二錢白湯下日二名二抝散普濟方蜈蚣咬傷胡椒嚼封之即不痛多能鄙事畢澄茄宋開寳校正自草部移入此釋名毗陵茄子時珍曰皆畨語也集解藏器曰畢澄茄生佛誓國狀似梧桐子及蔓荆子而㣲大珣曰胡椒生南海諸國向隂者為澄茄向陽者為胡椒按顧㣲廣州志云澄茄生諸海國乃嫩胡椒也青時就樹采摘柄粗而蔕圎頌曰今廣州亦冇之春夏生葉青滑可愛結實似梧桐子微大八月九月采之時珍曰海南諸畨皆有之蔓生春開白花夏結黒實與胡椒一類二種正如大腹之與檳榔相近耳修治斆曰凡采得去柄及皺皮了用酒浸蒸之從已至酉杵細晒乾入藥用實氣味辛温無毒珣曰辛苦微温主治下氣消食去皮膚風心腹間氣脹令人能食療鬼氣能染髪及香身藏器治一切冷氣痰澼并霍亂吐瀉肚腹痛腎氣膀胱冷大明暖脾胃止嘔吐噦逆時珍附方舊一新五脾胃虚弱胸膈不快不進飲食用畢澄茄為漠薑汁打神麴糊丸梧子大毎薑湯下七十丸日二服濟生方噎食不納畢澄茄白豆􅅳等分為漠乾䑛之壽域神方反胃吐食吐出黒汁治不愈者用畢澄茄為末米糊丸桐子大毎薑湯下三四十九日服愈後服平胃散三百帖永類鈐方傷寒欬逆呃噫日夜不定者用畢澄茄高良薑各等分為末毎服二錢水六分煎十沸入酢少許服之蘇頌圖經痘瘡入目羞明生瞖畢澄茄末吹少許入鼻中三五次效飛鴻集鼻塞不通肺氣上攻而致者畢澄茄丸用畢澄茄半兩薄荷葉三錢荆芥穗一錢半為末蜜丸芡子大時時含咽御藥院方附録山胡椒唐本草恭曰所在有之似胡椒色黒顆粒大如黒豆味卒大熱無毒主心腹冷痛破滯氣俗用有效呉茱茰本經中品校正自木部移入此釋名藏器曰茱茰南北總有入藥以呉地者為好所以有呉之名也時珍曰茱茰二字義未詳茰有俞由二音集解别録曰吴茱茰生上谷及寃句九月九日采隂乾陳久者良頌曰今處處有之江淮蜀漢猶多木高丈餘皮青緑色葉似椿而濶厚紫色三月開紅紫細花七月八月結實似椒子嫩時㣲黄至熟則深紫或云顆粒緊小經久色青緑者是呉茱萸顆粒大經久色黄黒者是食茱茰恐亦不然按周處風土記云俗尚九月九日謂之上九茱茰到此日氣烈熟色赤可折其房以揷頭云辟惡氣禦冬又續齊諧記云汝南桓景隨費長房學道長房謂曰九月九日汝家有灾厄宜令急去各作絳嚢盛茱茰以繋臂上登高飲菊花酒此禍可消景如其言舉家登高山夕還見鷄大牛羊一時暴死長房聞之曰此代之矣故人至此日登高飲酒戴茱茰嚢由此爾時珍曰茱茰枝柔而肥葉長而皺其實結於稍頭纍纍成簇而無核與椒不同一種粒大一種粒小小者入藥為勝淮南萬畢術云井上宜種茱茰葉落井中人飲其水無瘟疫懸其子於屋辟鬼魅五行志云舍東種白楊茱茰増年除害修治斆曰凡使去葉梗毎十兩以鹽二兩投東流水四斗中分作一百度洗之自然無涎日乾入九散用之若用醋煮者毎十兩用醋一鎰煮三十沸後入茱茰熬乾用宗奭曰凡用呉茱茰須深湯中浸去苦烈汁七次始可焙用氣味辛温有小毒權曰辛苦大熱有毒好古曰辛苦熱氣味俱厚陽中隂也半浮半沉入足太隂經血分少隂厥隂經氣分思邈曰陳久者良閉口者有毒多食傷神令人起伏氣咽喉不通時珍曰辛熱走氣動火昏目發瘡之才曰蓼實為之使惡丹參消石白堊畏紫石英主治温中下氣止痛除濕血痺逐風邪開腠理欬逆寒熱本經利五臟去痰冷逆氣飲食不消心腹諸冷絞痛中惡心腹痛别録霍亂轉筋胃冷吐瀉腹痛産後心痛治遍身􅍙痺刺痛腰脚軟弱利大腸壅氣腸風痔疾殺三蟲甄權殺惡蟲毒牙齒蟲䘌鬼魅疰氣藏器下産後餘血治腎氣脚氣水腫通闗節起陽健脾大明主痢止瀉厚腸胃肥健人孟詵治痞滿塞胷咽膈不通潤肝燥脾好古開鬱化滯治吞酸厥隂痰涎頭痛隂毒腹痛疝氣血痢喉舌口瘡時珍發明頌曰叚成式言椒氣好下茱茰氣好上言其衝膈不可為服食之藥故多食衝眼又脫髪也宗奭曰此物下氣最速腸虚人服之愈甚元素曰氣味俱厚浮而降腸中隂也其用有三去胸中逆氣滿塞止心腹感寒㽲痛消宿酒為白豆􅅳之使也杲曰濁隂不降厥氣上逆咽膈不通食則令人口開目瞪隂寒隔氣塞不得上下此病不已令人寒中腹滿膨脹下利宜以呉茱茰之苦熱泄其逆氣用之如神諸藥不可代也不宜多用恐損元氣好古曰衝脉為病逆氣裏急宜此主之震坤合見其色緑故仲景呉茱茰湯當歸四逆湯方治厥隂病及温脾胃皆用此也時珍曰茱茰辛熱能散能温苦熱能燥能堅故其所治之症皆取其散寒温中燥濕解鬱之功而已案朱氏集驗方云中丞常子正苦疾飲每食飽或隂晴節變率同十日一發頭疼背寒嘔吐酸汁即數日伏枕不食服藥罔效宣和初為順昌司禄于太守蔡達道席上得呉仙丹方服之遂不再作毎遇飲食過多腹滿服五七十丸便已少頃小便作茱茰氣酒飲皆隨小水而去前後痰藥甚衆無及此者用呉茱茰湯泡七次茯苓等分為末煉蜜丸梧子大毎熟水下五十丸梅楊卿方只用茱茰酒浸三宿以茯苓末拌之日乾毎吞百粒温酒下又咽喉口舌生瘡者以茱茰末醋調貼兩足心移夜便愈其性雖熱而能引熱下行葢亦從治之義而謂茱茰之性上行不下者似不然也有人治小兒痘瘡口噤者齧茱茰一二粒拌之即開亦取其辛散耳附方舊二十五新二十一風􅍙痒痺茱茰一升酒五升煮取一升半温洗之立止孟詵食療賊風口偏不能語者茱茰一升薑䜴三升清酒五升和煎五沸待冷服半升一日三服得少汗即瘥同上冬月感寒呉茱茰五錢煎湯服之取汗頭風作痛茱茰煎濃湯以綿染頻拭髪根良千金翼方嘔涎頭痛呉茱茰湯用茱茰一升棗二十枚生薑一大兩人參一兩以水五升煎取三升毎服七合日三服仲景方嘔吐胸滿方同上脚氣冲心呉茱茰生薑擂汁飲甚良孟詵方腎氣上噦腎氣自腹中起上築于咽喉逆氣連屬而不能出或至數十聲上下不得喘息此由寒傷胃脘腎虚氣逆上乗于胃與氣相併難經謂之噦素問云病深者其聲噦宜服此方如不止炙期門闗元腎俞穴用呉茱茰醋炒熱橘皮附子去皮各一兩為末麪糊丸梧子大毎薑湯下七十丸孫氏存仁方隂毒傷寒四肢逆冷用茱茰一升酒拌濕絹袋二箇包蒸極熱更互熨足心候氣透痛亦即止累有効聖惠方中惡心痛呉茱茰五合酒三升煮沸分三服楊氏産乳心腹冷痛方同上千金冷氣腹痛呉茱茰二錢擂爛以酒一鍾調之用香油一盞入鍋煎熱傾茱酒入鍋煎一滚取服立止唐珤經驗方脾元氣痛發歇不可忍用茱茰一兩桃仁一兩和炒茱焦去茱取桃仁去皮尖研細葱白三莖煨熟酒浸温服方經驗寒疝往來吴茱茰一兩生薑半兩清酒一升煎温分服肘後方小腸疝氣奪命丹治逺年近日小腸疝氣偏墜掣疼臍下撮痛以致悶亂及外腎腫硬日漸滋長及隂間濕痒成瘡用呉茱茰去梗一斤分作四分四兩酒浸四兩醋浸四兩湯浸四兩童子小便浸一宿同焙乾澤㵼二兩為末酒糊丸梧子大毎服五十丸空心鹽湯或酒吞下如宜方名星斗丸和劑局方小兒腎縮乃初生受寒所致用呉茱茰硫黄各半兩同大蒜研塗其腹仍以蛇床子烟熏之聖惠方婦人隂寒十年無子者用呉茱茰川椒各一升為末煉蜜丸彈子大綿褁納隂中日再易之但子宫開即有子也經心録子腸脱出茱茰三升酒五升煎二升分三服兵部手集醋心上攻如濃醋用茱茰一合水三盞煎七分頓服近有人心如蜇破服此二十年不發也累用有效同上食已吞酸胃氣虚冷者呉茱茰湯泡七次焙乾薑泡等分為末湯服一錢聖惠方轉筋入腹茱茰炒二兩酒二盞煎一盞分二服得下即安聖濟録霍亂乾嘔不止呉茱茰泡炒乾薑炮等分水煎服之同上多年脾泄老人多此謂之水土同化吴茱茰三錢炮過入水煎汁入鹽少許通口服葢茱茰能暖膀胱水道既清大腸自固他藥雖熱不能分解清濁也存孫氏仁方臟寒泄瀉倦怠減食呉茱茰湯泡過炒猪臟半條去脂洗浄裝滿紥定文火煮熟搗丸梧子大毎服五十丸米飲下日二服普濟滑痢不止方同上下痢水泄呉茱茰泡炒黄連炒各二錢水煎服未止再服聖惠方赤白下痢和劑局方戊巳丸治脾胃受濕下痢腹痛米穀不化用吴茱茰黄連白芍藥各一兩同炒為末蒸餅丸梧子大毎服二三十丸米飲下血百一選方變通丸治赤白痢日夜無度及腸風下用川黄連二兩呉茱茰二兩湯泡七次同炒香揀出各自為末粟米飯丸梧子大另收毎服三十丸赤痢甘草湯下黄連丸白痢乾薑湯下茱茰丸赤白痢各用十五丸未湯下此乃浙西河山純老以傳蘇韜光者救人甚效鄧筆峰襍興方二色丸治痢及水泄腸風用呉茱茰二兩黄連二兩同炒香各自為末以百草霜末二兩同黄連作丸以白芍藥末二兩同茱茰作丸各用飯丸梧子大各收毎服五十丸赤痢烏梅湯下連霜白痢米飲下茱芍赤白痢各半服之赤痢臍痛茱茰合黒豆湯吞之千金方腸痔常血下部痒痛如虫咬者掘地作坑燒赤以酒沃之搗茱茰二升入坑乗熱坐有孔板熏之冷乃下不過三四度愈肘後方腹中癥痛茱茰三升搗和酒煮熟布褁熨癥上冷更炒熱更番熨之癥移走逐熨之消乃止姚僧坦集騐方産後盗汗嗇嗇惡寒茱茰一鷄子大酒三升浸半日煮服千金翼口瘡口疳茱茰末醋調塗足心一夕愈集簡方咽喉作痛方同上牙齒疼痛茱茰煎酒含漱之孟詵本草小兒頭瘡呉茱茰炒焦為末入汞粉少許猪脂醋調塗之聖惠方小兒瘭瘡一名火灼瘡一名火爛瘡茱茰煎酒拭之良兵部手集老小風疹方同上金千癰疽發背及發乳諸毒用呉茱茰一升搗為末用苦酒調塗帛上貼之外臺秘要隂下濕痒呉茱茰煎湯頻洗取効同上骨在肉中不出者嚼茱茰封之骨當腐出食孟詵療魚骨入腹刺痛不得出者呉茱茰水煎一盞温服其骨必軟出未出再服同上蛇咬毒瘡用呉茱茰一兩為未冷水和作三服立安勝金方肩疽白秃並用呉茱茰鹽淹過炒研醋和塗之活㓜口議寒熱怪病寒熱不止數日四肢堅如石擊之似鐘磬聲日漸瘦惡用茱茰木香等分煎湯飲之愈夏子益方葉氣味辛苦熱無毒主治霍亂下氣止心腹痛冷氣内外腎釣痛鹽碾罨之神驗乾即易轉筋者同艾搗以醋和罨之大明治大寒犯腦頭痛以酒拌葉盛袋蒸熟更互枕熨之痛止為度時珍枝主治大小便卒關格不通取南行枝如手第二指中節含之立下蘇頌集出姚僧坦驗方根及白皮氣味同葉主治殺三蟲本經蟯蟲治喉痺欬逆止洩注食不消女子經産餘血療白癬别録殺牙齒蟲止痛藏器治中惡腹中刺痛下痢不禁療漆瘡甄權附方舊二新二寸白蟲茱茰東北隂細根大如指者勿洗去土四寸切以水酒各一升浸一宿平旦分再服當取蟲下千金方肝勞生蟲眼中赤脉呉茱茰根為末一兩半粳米半合鷄子白三箇化蠟一兩半和丸小豆大毎米湯下三十丸當取蟲下脾勞發熱有蟲在脾中為病令人好嘔者取東行茱茰根大者一尺大春子八升橘皮二兩三物㕮咀以酒一斗浸一宿㣲火薄暖之絞去滓平旦空腹服一升取蟲下或死或半爛或下黄汁凡作藥時切忌言語剛繁方腎熱肢腫拘急茱茰根一合半桑白皮三合酒二升煮一升日二服普濟方食茱茰唐本草校正自木部移入此併入拾遺欓子釋名榝音殺藙音毅艾子圖經越椒博雅欓子拾遺辣子𢎞景曰禮記名藙而俗中呼為榝子當是不識藙字也恭曰爾雅云椒榝醜梂陸璣詩疏云椒榝屬也並有榝名陶説誤矣時珍曰此即欓子也蜀人呼為艾子楚人呼為辣子古人謂之藙及榝子因其辛辣蜇口惨腹使人有殺毅黨然之狀故有諸名蘇恭謂茱茰之開口者為食茱茰孟詵謂茱茰之閉口者為欓子馬志謂粒大色黄黒者為食茱茰粒𦂳小色青緑者為呉茱茰陳藏器謂呉食二茱茰是一物入藥以呉地者為良不當重出此條只可言漢與呉不可言食與不食時珍竊謂數說皆因茱茰二字相混致誤耳不知呉茱食茱乃一類二種茱茰取呉地者入藥故名呉茱茰欓子則形味似茱茰惟可食用故名食茱茰也陳藏器不知食茱茰即欓子重出欓子一條正自誤矣按曹憲博雅云欓子越椒茱茰也鄭樵通志云欓子一名食茱茰以别呉茱茰禮記三牲用藙是食茱茰也二說足正諸人之謬集解藏器曰欓子出閩中江東其木髙大似樗莖間有刺其子辛辣如椒南人淹藏作果品或以寄逺呉越春秋云越以甘蜜丸欓報呉増封之禮則欓之相贈尚矣頌曰食茱茰南北皆有之其木亦甚高大有長及百尺者枝莖青黄上有小白㸃葉類油麻其花黄色蜀人呼為艾子禮記所謂藙者是也藙艾聲相近也宜入食羮中能發辛香時珍曰食茱茰欓子辣子一物也高木長葉黄花緑子叢簇枝上味辛而苦土人八月采搗濾取汁入石灰攪成名曰艾油亦曰辣米油始辛辣蜇口入食物中用周處風土記以椒欓薑為三香則自古尚之矣而今貴人罕用之實氣味辛温大熱無毒時珍曰有小毒動脾火病目者忌之頴曰發瘡痔浮腫虚恚之才曰畏紫石英主治功同呉茱茰力少劣爾療水氣用之佳蘇荼心腹冷氣痛中惡除欬逆去臟腑冷温中甚良孟詵療蠱毒飛尸着喉口者刺破以子揩之令出血當下涎沫煮汁服之去暴冷腹痛食不消殺腥物藏器治冷痢帶下暖胃燥濕時珍附方新二赤白帶下欓子石菖蒲等分為末毎日鹽酒温服二錢經驗方乆瀉虚痢腹痛者欓子丸治之欓子肉豆蔲各一兩陳米一兩半以米一分同二味炒黄為末一分生研為末粟米粥丸梧子大毎陳米飲下五十丸日三服普濟方鹽麩子開寳校正自木部移入此釋名五􅚰音倍鹽膚子綱目鹽梅子同上鹽梂子同上木鹽通志天鹽靈草篇叛奴鹽拾遺酸桶拾遺藏器曰蜀人謂之酸桶亦曰酢桶呉人謂之鹽麩戎人謂之木鹽時珍曰其味酸鹹故有諸名山海經云橐山多構木郭璞注云構木出蜀中七八月吐穗成時如有鹽粉可以酢羮即此也後人訛為五倍矣集解藏器曰鹽麩子生呉蜀山谷樹狀如椿七月子成穗粒如小豆上有鹽似雪可為羮用嶺南人取子為末食之酸鹹止渴將以防瘴時珍曰􅀈木即構木東南山原甚多木狀如椿其葉兩兩對生長而有齒面青背白有細毛味酸正葉之下節節兩邊有直葉貼莖如箭羽狀五六月開花青黄色成穗一枝纍纍七月結子大如細豆而扁生青熟㣲紫色其核淡緑狀如腎形核外薄皮上有薄鹽小兒食之滇蜀人采為木鹽葉上有蟲結成五倍子八月取之詳見蟲部後魏書云勿吉國水氣鹹凝鹽生樹上即此物也别有咸平樹鹹草酸角皆其類也附見於左附録咸平樹真臘國人不能為酸但用咸平樹葉及莢與子為之酸角雲南臨安諸處有之狀如猪牙皂莢浸水和羮酸美如醋鹹草扶桑東有女國産鹹草葉似邪蒿而氣香味鹹彼人食之子氣味酸鹹㣲寒無毒鹽霜制汞硫主治除痰飲瘴瘧喉中熱結喉痺止渴解酒毒黄疸飛尸蠱毒天行寒熱欬嗽變白生毛髪去頭上白屑搗末服之藏器生津降火化痰潤肺滋腎消毒止痢收汗治風濕眼病時珍發明時珍曰鹽麩子氣寒味酸而鹹隂中之隂也鹹能耎而潤故降火化痰消毒酸能收而澀故生津潤肺止痢腎主五液入肺為痰入脾為涎入心為汗入肝為淚自入為唾其本皆水也鹽麩五倍先走腎肝有救水之功所以痰涎盗汗風濕下淚涕唾之證皆宜用之樹白皮主治破血止血蠱毒血痢殺蚘蟲并煎服之開寳根白皮主治酒疸搗碎米泔浸一宿平旦空腹温服一二升開寳諸骨鯁以醋煎濃汁時呷之時珍發明時珍曰按本草集議云鹽麩子根能軟鷄骨岑公云有人被鷄骨哽項腫可畏用此根煎醋啜至三碗便吐出也又彭醫官治骨哽以此根搗爛入鹽少許綿褁以線繫定吞之牽引上下亦釣出骨也醋林子圖經校正自外類移入此釋名時珍曰以味得名集解頌曰醋林子生四川卭州山野林箐中木高丈餘枝葉繁茂三月開白花四出九月十月子熟纍纍數十枚成朶生青熟赤畧類櫻桃而蔕短熟時采之隂乾連核用土人以鹽醋收藏充果食其葉味醋夷獠人采得入鹽和魚䰼食云勝用醋也實氣味酸温無毒主治久痢不瘥及痔漏下血蚘咬心痛小兒疳蚘心痛脹滿黄痩下寸白蟲單搗為末酒服一錢匕甚效鹽醋藏者食之生津液醒酒止渴多食令人口舌粗拆也蘇頌茗唐本草校正自木部移入此釋名苦􅟒􅟒途二音唐本檟爾雅蔎音設荈音舛頌曰郭璞云早采為茶晚采為茗一名荈蜀人謂之苦荼陸羽云其名有五一荼二檟三蔎四茗五荈時珍曰楊慎丹鉛録云茶即古荼字音途詩云誰謂荼苦其甘如薺是也顔師古云漢時荼陵始轉途音為宅加切或言六經無茶字未深攷耳集解神農食經云荼茗生益州及山陵道旁凌冬不死三月三日采乾恭曰茗生山南澤中山谷爾雅云檟苦荼郭璞註云樹小似巵子冬生葉可煮作羮飲頌曰今閩浙蜀江湖淮南山中皆有之通謂之荼春中始生嫩葉蒸焙去苦水末之乃可飲與古所食殊不同也陸羽茶經云茶者南方嘉木自一尺二尺至數十尺其巴川峽山有兩人合抱者伐而掇之木如𤓰蘆葉如巵子花如白薔薇實如棕櫚莘如丁香根如胡桃其上者生爛石中者生櫟壌下者生黄土藝法如㮔𤓰三嵗可采陽岸隂林紫者上緑者次筍者上芽者次葉卷者上舒者次在二月三月四月之間茶之筍者生於爛石之間長四五寸若蕨之始抽凌露采之茶之芽者發于叢薄之上有三枝四枝五枝於枝顛采之采得蒸焙封乾有千類萬狀也畧而言之如胡人靴者蹙縮然如犎牛臆者廉沾然出山者輪囷然拂水者涵澹然皆茶之精好者也如竹籜如霜荷皆茶之瘠老者也其别者有名南芽枸把芽枇杷葉皆治風疾又有皂莢芽槐芽柳芽乃上春摘其芽和茶作之故今南人輸官茶往往雜以衆葉惟茅蘆竹筍之類不可入自餘山中草木芽葉皆可和合椿柹尤竒真茶性冷惟雅州䝉山出者温而主疾毛文錫茶譜云蒙山有五頂上有茶園其中頂曰上清峯昔有僧人病冷且久遇一老父謂曰蒙之中頂茶當以春分之先後多聚人力俟雷發聲併手采擇三日而止若獲一兩以本處水煎服即能祛宿疾二兩當眼前無疾三兩能固肌骨四兩即為地仙矣其僧如說獲一兩餘服之未盡而疾瘳其四頂茶園采摘不廢惟中峯草木繁密雲霧蔽虧鷙獸時出故人跡不到矣近嵗稍貴此品製作亦精于他處陳承曰近世蔡㐮述閩茶極備惟建州北苑數處産者性味與諸方畧不同今亦獨名蠟茶上供御用碾治作餅日晒得火愈良其他者或為芽或為末收貯若㣲見火便硬不可久收色味俱敗惟鼎州一種芽茶性味畧類建茶今汴中及河北京西等處磨為末亦冐蠟茶者是也宗奭曰苦茶即今茶也陸羽有茶經丁謂冇北苑茶録毛文錫有茶譜蔡宗顔有荼對皆甚詳然古人謂茶為雀舌麥顆言其至嫩也又有新芽一發便長寸餘其粗如針最為上品其根幹水土力皆有餘故也雀舌麥顆又在下品前人未知耳時珍曰茶有野生種生種者用子其子大如指頂正圓黒色其仁入口初甘後苦最㦸人喉而閩人以榨油食用二月下種一坎須百顆乃生一株葢空殻者多故也畏水與日最宜坡地䕃處清明前采者上穀雨前者次之此後皆老茗爾采蒸揉焙修造皆有法詳見茶譜茶之稅始于唐徳宗盛于宋元及于我朝乃與西番互市易馬夫茶一木爾下為民生日用之資上為朝廷賦稅之助其利博哉昔賢所稱大約謂唐人尚茶茶品益衆有雅州之䝉頂石花露芽穀芽為第一建寧之北苑龍鳳團為上供蜀之茶則有東川之神泉獸目硤州之碧澗明月䕫州之真香卭州之火井思安黔陽之都濡嘉定之峨眉瀘州之納溪玉壘之沙坪楚之茶則有荆州之仙人掌湖南之白露長沙之鐡色蘄州蘄門之圑面夀州霍山之黄芽廬州之六安英山武昌之樊山岳州之巴陵辰州之溆浦湖南之寳慶茶陵呉越之茶則有湖州顧渚之紫筍福州方山之生芽洪州之白露雙并之白毛廬山之雲霧常州之陽羡池州之九華丫山之陽坡袁州之界橋睦州之鳩坑宣州之陽坑金華之舉岩會稽之日鑄皆産茶有名者其他猶多而猥雜更甚按陶隱居註苦茶云酉陽武昌廬江晋陵皆有好茗飲之宜人凡所飲物有茗及木葉天門冬苗菝葜葉皆益人餘物並冷利又巴東縣有真茶火煏作卷結為飲亦令人不眠俗中多煮檀葉及大皂李葉作茶飲並冷利南方有𤓰蘆木亦似茗也今人采櫧櫟山􅈨南燭烏藥諸葉皆可為飲以亂茶云葉氣味苦甘㣲寒無毒藏器曰苦寒久食令人痩去人脂使人不睡飲之宜熱冷則聚痰胡洽曰與榧同食令人身重李廷飛曰大渴及酒後飲茶水入腎經令人腰脚膀胱冷痛兼患水腫攣痺諸疾大抵飲茶宜熱宜少不飲尤佳空腹最忌時珍曰服威靈仙土茯苓者忌飲茶主治瘻瘡利小便去痰熱止渴令人少睡有力悅志神農食經下氣消食作飲加茱茰葱薑良蘇恭破熱氣除瘴氣利大小腸藏器清頭目治中風昬憒多睡不醒好古治傷暑合醋治泄痢甚效陳承炒煎飲治熱毒赤白痢同芎藭葱白煎飲止頭痛吴瑞濃煎吐風熱痰涎時珍發明好古曰茗茶氣寒味苦入手足厥隂經治隂證湯藥内入此去格拒之寒及治伏陽大意相似經云苦以泄之其體下行所以能清頭目機曰頭目不清熱熏上也以苦泄其熱則上清矣且茶體輕浮采摘之時芽蘗初萌正得春升之氣味雖苦而氣則薄乃隂中之陽可升可降利頭目葢本諸此汪頴曰一人好燒鵞炙煿日常不缺人咸防其生癰疽後卒不病訪知其人毎夜必啜凉茶一椀乃知茶能解炙煿之毒也楊士瀛曰薑茶治痢薑助陽茶助隂並能消暑解酒食毒且一寒一熱調平隂陽不問赤白冷熱用之皆良生薑細切與真茶等分新水濃煎服之蘇東坡以此治文潞公有效時珍曰茶苦而寒隂中之隂沉也降也最能降火火為百病火降則上清矣然火有五火有虚實若少壯胃健之人心肺脾胃之火多盛故與茶相宜温飲則火因寒氣而下降熱飲則茶借火氣而升散又兼解酒食之毒使人神思闇爽不昏不睡此茶之功也若虚寒及血弱之人飲之既久則脾胃惡寒元氣暗損土不制水精血潛虚成痰飲成痞脹成痿痺成黄痩成嘔逆成洞瀉成腹痛成疝瘕種種内傷此茶之害也民生日用蹈其弊者往往皆是而婦嫗受害更多習俗移人自不覺耳况真茶既少雜茶更多其為患也又可勝言哉人有嗜茶成癖者時時咀啜不止久而傷營傷精血不華顔色黄瘁痿弱抱病不悔尤可嘆惋晋干寳捜神記載武官周時病後啜茗一斛二升乃止纔減升合便為不足有客令更進五升忽吐一物狀如牛脾而有口澆之以茗盡一斛二升再澆五升則溢出矣人遂謂之斛茗瘕嗜茶者觀此可以戒矣陶隱居雜録言丹丘子黄山君服茶輕身換骨壺公食忌言苦茶久食羽化者皆方士謬言誤世者也按唐補闕毋炅茶序云釋滯消壅一日之利暫佳瘠氣侵精終身之累斯大獲益則功歸茶力貽患則不謂茶灾豈非福近易知禍逺難見乎又宋學士蘇軾茶說云除煩去膩世故不可無茶然暗中損人不少空心飲茶入鹽直入腎經且冷脾胃乃引賊入室也惟飲食後濃茶漱口既去煩膩而脾胃不知且苦能堅齒消蠧深得飲茶之妙古人呼茗為酪奴亦賤之也時珍早年盛氣毎飲新茗必至數椀輕汗發而肌骨清頗覺痛快中年胃氣稍損飲之即覺為害不痞悶嘔惡即腹冷洞泄故備述諸說以警同好焉又濃茶能令人吐乃酸苦漏泄為隂之義非其性能升也附方舊六新十三氣虚頭痛用上春茶末調成膏置瓦盞内覆轉以巴豆四十粒作二次燒烟熏之晒乾乳細毎服一字别入好茶末食後煎服立效醫方大成熱毒下痢孟詵曰赤白下痢以好茶一斤炙搗末濃煎一二盞服久患痢者亦宜服之直指用臘茶赤痢以蜜水煎服白痢以連皮自然薑汁同水煎服二三服即愈和經驗良方用臘茶二錢湯㸃七分入麻油一蜆殻服須㬰腹痛大下即止一少年用之有効烏一方蠟茶末以白梅肉和丸赤痢甘草湯下白痢梅湯下各百凡煎一方建茶合醋熱服即止大便下血榮衛氣虚或受風邪或食生冷或啖炙煿或飲食過度積熱腸間使脾胃受傷糟粕不聚大便下利清血臍腹作痛裏急後重及酒毒一切下血並皆治之用細荼半斤碾末川百藥煎五箇燒存性毎服二錢米飲下日二服普濟方産後秘塞以葱涎調蠟荼末丸百丸茶服自通不可用大黄利藥利者百無一生郭稽中婦人方久年心痛十年五年者煎湖茶以頭醋和勻服之良兵部手集腰痛難轉煎茶五合投醋二合頓服療孟詵食嗜茶成癖一人病此一方士令以新鞋盛茶令滿任意食盡再盛一鞋如此三度自不喫也男用女鞋女用男鞋用之果愈也集簡方解諸中毒芽茶白礬等分研末冷水調下簡便方痘瘡作痒房中宜燒茶烟恒熏之隂嚢生瘡用蠟靣茶為末先以甘草湯洗後貼之妙經驗方脚椏濕爛茶葉嚼爛傅之有效攝生方蠼螋尿瘡初如糝粟漸大如豆更大如火烙漿炮疼痛至甚者速以草茶并蠟茶俱可以生油調𫝊藥至痛乃止方勝金風痰顛疾茶芽巵子各一兩煎濃汁一椀服良久探吐摘𤣥方霍亂煩悶茶末一錢煎水調乾薑末一錢服之即安聖濟總録月水不通茶清一瓶入沙糖少許露一夜服雖三箇月胎亦通不可輕視鮑氏痰喘欬嗽不能睡臥好末茶一兩白僵蠶一兩為末放盌内葢定傾沸湯一小盞臨臥再添湯㸃服瑞竹堂方茶子氣味苦寒有毒主治喘急欬嗽去痰垢搗仁洗衣除油膩時珍附方新三上氣喘急時有欬嗽茶子百合等分為末蜜丸梧子大毎服七丸新汲水下聖惠方喘嗽齁䶎不拘大人小兒用糯米泔少許磨茶子滴入鼻中令吸入口服之口咬竹筒少頃涎出如線不過二三次絶根屢驗經驗良方頭腦鳴響狀如虫蛀名大白蟻以茶子為末吹入鼻中取効楊拱醫方摘要臯蘆拾遺校正自木部移入此釋名𤓰蘆𢎞景苦䔲藏器曰南越志云龍川縣有臯蘆一名𤓰蘆葉似茗土人謂之過羅或曰物羅皆夷語也集解𢎞景苦菜註曰南方有𤓰蘆亦似茗苦摘取其葉作屑煮飲即通夜不睡煮鹽人惟資此飲而交廣最所重客來先設乃加以香芼之物李珣曰按此木即臯蘆也生南海諸山中葉似茗而大味苦澀出新平縣南人取作茗飲極重之如蜀人飲茶也時珍曰臯蘆葉狀如茗而大如手掌挼碎泡飲最苦而色濁風味比茶不及逺矣今廣人用之名曰苦䔲葉氣味苦平無毒時珍曰寒胃冷者不可用主治煮飲止渴明目除煩令人不睡消痰利水藏器通小腸治淋止頭痛煩熱李珣噙嚥清上膈利咽喉時珍本草綱目卷三十二
