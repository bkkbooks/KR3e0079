body:
  text: 本草綱目卷二十三明李時珍撰穀之二稷粟類一十八種稷别録上品釋名穄音祭粢音咨時珍曰稷從禾從畟畟音即諧聲也又進力治稼也詩云畟畟良耜是矣種稷者必畟畟進力也南人承北音呼稷為穄謂其米可供祭也禮記祭宗廟稷曰明粢爾雅云粢稷也羅願云稷穄粢皆一物語音之輕重耳赤者名􅓱白者名芑黒者名秬註見黍下集解𢎞景曰稷米人亦不識書記多云黍與稷相似又註黍米云穄米與黍米相似而粒殊大食之不宜人言發宿病詩云黍稷稻粱禾麻菽麥此八穀也俗猶莫能辨證况芝英乎蘇恭曰吕氏春秋云飯之美者有陽山之穄髙誘註云開西謂之􅓱音糜冀州謂之䵖音牽去聲廣雅云䵖穄也禮記云稷曰明粢爾雅云粢稷也説文云稷乃五穀長田正也此乃官名非穀號也先儒以稷為粟類或言粟之上者皆説其義而不知其實也按氾勝之種植書有黍不言稷本草有稷不載穄穄即稷也楚人謂之稷關中謂之糜呼其米為黄米其苗與黍同類故呼黍為秈秫陶言與黍相似者得之矣藏器曰稷穄一物也塞北最多如黍黒色詵曰稷在八穀之中最為下苗黍乃作酒此乃作飯用之殊塗頌曰稷米出粟處皆能種之今人不甚珍此惟祠事用之農家惟以備他穀之不熟則為糧耳宗奭曰稷米今謂之穄米先諸米熟其香可愛故取以供祭祀然發故疾只堪作飯不粘其味淡時珍曰稷與黍一類二種也粘者為黍不粘者為稷稷可作飯黍可釀酒猶稻之有粳與糯也陳藏器獨指黒黍為稷亦偏矣稷黍之苗似粟而低小有毛結子成枝而殊散其粒如粟而光滑三月下種五六月可收亦有七八月收者其色有赤白黄黒數種黒者禾稍髙今俗通呼為黍子不復呼稷矣北邉地寒種之有補河西出者顆粒尤硬稷熟最早作飯疎爽香美為五穀之長而屬土故祀穀神者以稷配社五穀不可遍祭祭其長以該之也上古以厲山氏之子為稷主至成湯始易以后稷皆有功於農事者云正誤吴瑞曰稷苗似蘆粒亦大南人呼為蘆穄孫炎正義云稷即粟也時珍曰稷黍之苗雖頗似粟而結子不同粟穂叢聚攢簇稷黍之粒疎散成枝孫氏謂稷為粟誤矣蘆穄即蜀黍也其莖苗髙大如蘆而今之祭祀者不知稷即黍之不粘者徃徃以蘆穄為稷故吴氏亦襲其誤也今並正之稷米氣味甘寒無毒詵曰多食發二十六種冷病氣不與瓠子同食發冷病但飲黍穰汁即瘥又不可與附子同服主治益氣補不足别録治熱壓丹石毒發熱解苦瓠毒日華作飯食安中利胃宜脾心鏡涼血解暑時珍編生生發明時珍曰按孫真人云稷脾之穀也脾病宜食之汜勝之云燒黍稷則瓠死此物性相制也稷米黍穰能解苦瓠之毒淮南萬畢術云祠塚之黍啖兒令不思母此亦有所厭耶附方新四補中益氣羊肉一脚熬湯入河西稷米葱鹽煮粥食之飲膳正要卒啘不止粢米粉井華水服之良肘后癰疽發背粢米粉熬黒以雞子白和塗練上剪孔貼之乾則易神效葛氏方辟除瘟疫令不相染以穄米為末頓服之肘后方根主治心氣痛産難時珍附方新二心氣疼痛髙粱根煎湯温服甚效横生難産重陽日取髙粱根名爪龍隂乾燒存性研末酒服二錢即下黍别録中品校正别録中品丹黍米今併為一釋名赤黍曰虋音門曰􅓱音糜白黍曰芑音起黒黍曰秬音距一稃二米曰秠音疕並爾雅時珍曰按許慎説文云黍可為酒從禾入水為意也魏子才六書精藴云禾下從􅈛象細粒散垂之形汜勝之云黍者暑也待暑而生暑後乃成也詩云誕降嘉種維秬維秠維􅓱維芑􅓱即虋音轉也郭璞以虋芑為粱粟以秠即黒黍之二米者羅願以秠為來牟皆非矣集解𢎞景曰黍荆郢州及江北皆種之其苗如蘆而異於粟粒亦大今人多呼秫粟為黍非矣北人作黍飯方藥釀黍米酒皆用秫黍也别録丹黍米即赤黍米也亦出北間江東時有而非土所宜多入神藥用又有黒黍名秬釀酒供祭祀用恭曰黍有數種其苗亦不似蘆雖似粟而非粟也頌曰今汴洛河陕間皆種之爾雅云虋赤苗芑白苗秬黒黍是也李巡云秠是黒黍中一稃有二米者古之定律者以上黨秬黍之中者累之以生律度衡量後人取此黍定之終不能協律或云秬乃黍之中者一稃二米之黍也此黍得天地中和之氣而生葢不常有有則一穗皆同二米粒並均勻無小大故可定律他黍則不然地有肥瘠嵗有凶穰故米有大小不常矣今上黨民間或值豐嵗徃徃得二米者但稀濶故不以充貢爾時珍曰黍乃稷之粘者亦有赤白黄黒數種其苗色亦然郭義恭廣志有赤黍白黍黄黍大黒黍牛黍燕頷馬革驢皮稻尾諸名俱以三月種者為上時五月即熟四月種者為中時七月即熟五月種者為下時八月乃熟詩云秬鬯一鹵則黍之為酒尚也白者亞於糯赤者最粘可蒸食俱可作餳古人以黍粘履以黍雪桃皆取其粘也菰葉褁成糭食謂之角黍淮南萬畢術云穫黍置溝即生蠐螬正誤頌曰粘者為秫可以釀酒北人謂為黄米亦曰黄糯不粘者為黍可食如稻之有粳糯也時珍曰此誤以黍為稷以秫為黍也葢稷之粘者為黍粟之粘者為秫粳之粘者為糯别録本文著黍秫糯稻之性味功用甚明而註者不諳徃徃謬誤如此今俗不知分别通呼秫與黍為黄米矣黍米此通指諸黍米也氣味甘温無毒久食令人多熱煩别録緩詵曰性寒有小毒發故疾久食昏五臟令人好睡人筋骨絶血脉小兒多食令久不能行小猫天食之其脚跼屈合葵菜食成痼疾合牛肉白酒食生寸白蟲李廷飛曰五種黍米多食閉氣主治益氣補中别録燒灰和油塗杖瘡止痛不作瘢孟詵嚼濃汁塗小兒鵞口瘡有效時珍發明思邈曰黍米肺之穀也肺病宜食之主益氣時珍曰按羅願云黍者暑也以其象火為南方之穀葢黍最粘滯與糯米同性其氣温暖故功能補肺而多食作煩熱緩筋骨也孟氏謂其性寒非矣附方舊二新二男子隂易黍米二兩煮薄粥和酒飲發汗即愈聖濟總録心痛不瘥四十年者黍米淘汁温服隨意經驗方湯火灼傷末成瘡者黍米女麴等分各炒焦研末鷄子白調塗之煮粥亦可肘后方閃肭脱臼赤黒腫痛用黍米粉鐵漿粉各半斤葱一斤同炒存性研末以醋調服三次後水調入少醋貼之集成丹黍米别録中品蓮即赤黍也爾雅謂之虋瑞曰浙人呼為紅米江南多白黍間有紅者呼為赤蝦米宗奭曰丹黍皮赤其米黄惟可為糜不堪為飯粘着難解原曰穗熟色赤故屬火北人以之釀酒作糕氣味甘微寒無毒思邈曰微温大明曰温有小毒不可合蜜及葵同食宗奭曰動風性熱多食難消餘同黍米主治欬逆上氣霍亂止洩利除熱止煩渴别録下氣止欬𠻳退熱大明治鼈瘕以新熱者淘泔汁生服一升不過三二度愈孟詵附方舊二新二男子隂易用丹黍米三兩煮薄酒和飲令發汗即愈傷寒類要小兒鵞口不乳者丹黍米嚼汁塗之子母秘録飲酒不醉取赤黍漬以狐血隂乾酒飲時取一丸置舌下舍之令人不醉萬畢術方令婦不妬取虋即赤黍也同薏苡等分為丸常服之同上穰莖并根氣味辛熱有小毒詵曰醉卧黍穰令人生厲人家取其莖穗作提拂掃地用以煮汁入藥更佳主治煮汁飲之解苦瓠毒浴身去浮腫和小豆煮汁服下小便孟詵燒灰酒服方寸匕治妊娠尿血丹黍根莖煮汁服利小便止上喘時珍附方舊一新三通身水腫以黍莖掃箒煑湯浴之脚氣衝心黍穰一石煑汁入椒目一升更煎十沸漬脚三四度愈外䑓秘要天行豌瘡不拘人畜用黍穰濃煮汁洗之一莖者是穄穰不可用千金瘡腫傷風中水痛劇者黍穰燒烟熏令汗出愈千金方蜀黍食物釋名蜀秫俗名蘆穄食物蘆粟並俗木稷廣雅荻粱同上髙粱時珍曰蜀黍不甚經見而今北方最多按廣雅荻粱木稷也葢此亦黍稷之類而髙大如蘆荻者故俗有諸名種始自蜀故謂之蜀黍集解頴曰蜀黍北地種之以備缺糧餘及牛馬穀之最長者南人呼為蘆穄時珍曰蜀黍宜下地春月布種秋月收之莖髙丈許状似蘆荻而内實葉亦似蘆穗大如帚粒大如椒紅黒色米性堅實黄赤色有二種粘者可和糯秫釀酒作餌不粘者可以作糕煮粥可以濟荒可以養畜稍可作箒莖可織箔席編籬供㸑最有利於民者今人祭祀用以代稷者誤矣其穀殻浸水色紅可以紅酒博物志云地種蜀黍年久多蛇米氣味甘澀温無毒主治温中澀腸胃止霍亂粘者與黍米功同時珍根主治煮汁服利小便止喘滿燒灰酒服治産難有效時珍附方新一小便不通止喘紅秫散用紅秫黍根二兩扁蓄一兩半燈心百莖每服各半兩流水煎服張文叔方玉蜀黍綱目釋名玉髙粱集解時珍曰玉蜀黍種出西土種者亦罕其苗葉俱似蜀黍而肥矮亦似薏苡苗髙三四尺六七月開花成穗如秕麥状苗心别出一苞如㯶魚形苞上出白鬚垂垂久則苞拆子出顆顆攅簇子亦大如㯶子黄白色可煠炒食之炒拆白花如炒拆糯穀之狀米氣味甘平無毒主治調中開胃時珍根葉氣味主治小便淋􅅹沙石痛不可忍煎湯頻飲時珍粱别録中品校正别録中品有青粱米黄粱米白􅆝米今併為一釋名時珍曰粱者良也穀之良者也或云種出自梁州或云粱米性涼故得粱名皆各執己見也粱即粟也考之周禮九穀六穀之名有粱無粟可知矣自漢以後始以大而毛長者為粱細而毛短者為粟今則通呼為粟而粱之名反隠矣今世俗稱粟中之大穗長芒粗粒而有紅毛白毛黄毛之品者即粱也黄白青赤亦隨色命名耳郭義恭廣志有解粱貝粱遼東赤粱之名乃因地命名也集解𢎞景曰凡云粱米皆是粟類惟其牙頭色異為分别耳汜勝之云粱是秫粟則不爾也黄粱出青冀州東間不見有白粱處處有之襄陽竹根者為佳青粱江東少有又漢中一種枲粱粒如粟而皮黒可食釀酒甚清美恭曰粱雖粟類細論則别黄粱出蜀漢商𢎞間穗大毛長穀米俱粗於白粱而收子少不耐水旱食之香美勝於諸粱人號竹根黄陶以竹根為白粱非矣白粱穗大多毛且長而穀粗扁長不似粟圓也米亦白而大食之香美亞於黄粱青粱殻穗有毛而粒青米亦微青而細於黄白粱其粒似青稞而少粗早熟而收薄夏月食之極為清涼但味短色惡不如黄白粱故人少種之作餳清白勝於餘米頌曰粱者粟類也粟雖粒細而功用則無别也今汴洛河陕間多種白粱而青黄稀有因其損地力而收穫少也宗奭曰黄粱白粱西洛農家多種為飯尤佳餘用不甚相宜黄粱米别録中品氣味甘平無毒主治益氣和中止洩别録去客風頑痺日華止霍亂下痢利小便除煩熱時珍發明宗奭曰青粱白粱性皆微涼獨黄粱性味甘平豈非得土之中和氣多耶頌曰諸粱比之他穀最益脾胃附方舊四新一霍亂煩躁黄粱米粉半升水升半和絞如白粉頓服外䑓霍亂大渴不止多飲則殺人黄粱米五升水一斗煮清三升稍稍飲之肘后小兒鼻乾無涕腦熱也用黄米粉生礬末各一兩每以一錢水調貼􅇟上日二次普濟小兒赤丹用土畨黄米粉和鷄子白塗之兵部手集小兒生瘡滿身面如火燒以黄粱米研粉和蜜水調之以瘥為度外䑓白粱米别録中品氣味甘微寒無毒主治除熱益氣别録除胸膈中客熱移五臟氣緩筋骨凡患胃虚并嘔吐食及水者以米汁二合薑汁一合和服之佳孟詵炊飯食之和中止煩渴時珍附方舊二霍亂不止白粱米五合水一升和煮粥食千金方手足生疣取白粱米粉鐵銚炒赤研末以衆人唾和塗之厚一寸即消肘后青粱米别録中品氣味甘微寒無毒主治胃痺熱中消渴止洩痢利小便益氣補中輕身長年煮粥食之别録健脾治洩精大明發明時珍曰今粟中有大而青黒色者是也其穀芒多米少稟受金水之氣其性最涼而宜病人詵曰青粱米可辟穀以純苦酒浸三日百蒸百晒藏之逺行日一餐之可度十日若重餐之四百九十日不饑也又方以米一斗赤石脂三斤水漬置暖處一二日上青白衣搗為丸如李大日服三丸亦不饑也按靈寶五符經中白鮮米九蒸九暴作辟穀糧而此用青粱米末見出處附方新七補脾益胃羊肉湯入青粱米葱鹽煮粥食正要脾虚泄痢青粱米半升神麯一合日日煮粥食即愈養老書冷氣心痛桃仁二兩去皮水研絞汁入青粱米四合煮粥常食養老書五淋澀痛青粱米四合入醤水煮粥下上蘇末三兩每日空心食之上同老人血淋車前五合綿褁煮汁入青粱米四合煮粥飲汁亦能明目引熱下行乳石發渴青粱米煮汁飲之外䑓一切毒藥及鴆毒煩懣不止用甘草三兩水五升煮取二升去滓入黍米粉一兩白蜜三兩煎如薄粥食之外䑓粟别録中品釋名秈粟時珍曰粟古文作㮚象穗在禾上之形而春秋題辭云粟乃金所立米為陽之精故西字合米為粟此鑿説也許慎云粟之為言續也續於穀也古者以粟為黍稷粱秫之總稱而今之粟在古但呼為粱後人乃專以粱之細者名粟故唐孟詵本草言人不識粟而近世皆不識粱也大抵粘者為秫不粘者為粟故呼此為秈粟以别秫而配秈北人謂之小米也集解𢎞景曰粟江南西間所種皆是其粒細於粱熟舂令白亦當白粱呼為白粱粟或呼為粢米恭曰粟類多種而並細於諸粱北土常食與粱有别粢乃稷米陶註非矣詵曰粟顆粒小者是今人多不識之其粢米粒粗大隨色别之南方多畬田種之極易舂粒細香美少虛怯秪於灰中種之又不鋤治故也北田所種多鋤之即難舂不鋤即草翳死都由土地使然爾時珍曰粟即粱也穗大而毛長粒粗者為粱穗小而毛短粒細者為粟苗俱似茅種類凡數十有青赤黄白黒諸色或因姓氏地名或因形似時令隨義賦名故早則有趕麥黄百日糧之類中則有八月黄老軍頭之類晚則有鴈頭青寒露粟之類按賈思勰齊民要術云粟之成熟有早晚苗稈有髙下收實有息耗質性有强弱米味有美惡山澤有異宜順天時量地利則用力少而成功多任性返道勞而無穫大抵早粟皮薄米實晚粟皮厚米少粟米即小米氣味鹹微寒無毒時珍曰鹹淡宗奭曰生者難化熟者滯氣隔食生蟲藏器曰胃冷者不宜多食粟浸水至敗者損人瑞曰與杏仁同食令人吐㵼鴈食粟足重不能飛主治養腎氣去脾胃中熱益氣陳者苦寒治胃熱消渴利小便别録止痢壓丹石熱孟詵水煮服治熱腹痛及鼻䘐為粉和水濾汁解諸毒治霍亂及轉筋入腹又治卒得鬼打藏器解小麥毒發熱士良治反胃熱痢煮粥食益丹田補虚損開腸胃時珍編生生發明𢎞景曰陳粟乃三五年者尤解煩悶服食家亦将食之宗奭曰粟米利小便故能益脾胃震亨曰粟屬水與土陳者最硬難化得漿水乃化也時珍曰粟之味鹹淡氣寒下滲腎之穀也腎病宜食之虚熱消濁洩痢皆腎病也滲利小便所以洩腎邪也降胃火故脾胃之病宜食之附方舊五新四胃熱消渴以陳粟米炊飯乾食之良醫方心鏡反胃吐食脾胃氣弱食不消化湯飲不下用粟米半升杵粉水丸梧子大七枚煮熟入少鹽空心和汁吞下或云納醋中吞之得下便已心鏡鼻䘐不止粟米粉水煮服之普濟嬰孩初生七日助穀神以導達腸胃研粟米煮粥如飴每日哺少許姚和衆方孩子赤丹嚼粟米傅之兵部手集小兒重舌嚼粟米哺之秘録雜物眯目不出用生粟米七粒嚼爛取汁洗之即出總録湯火灼傷粟米炒焦投水澄取汁煎稠如糖頻傳之能止痛滅瘢痕一方半生半炒研末酒調傅之崔行功纂要熊虎爪傷嚼粟塗之葛氏方粟泔汁主治霍亂卒熱心煩渴飲數升立瘥臭泔止消渴尤良蘇恭酸泔及澱洗皮膚瘙疥殺蟲飲之主五痔和臭樗皮煎服治小兒疳痢藏器附方新二眼熱赤腫粟米泔澱極酸者生地黄等分研勻攤絹上方圓二寸貼目上熨之乾即易總録疳瘡月蝕寒食泔澱𫝊之良千金粟糠主治痔漏脱肛和諸藥薫之時珍粟奴主治利小腸除煩懣時珍發明時珍曰粟奴即粟苗成穗時生黒黴者古方不用聖惠治小腸結澀不通心煩悶亂有粟奴湯用粟奴苦竹鬚小豆葉炙甘草各一兩燈心十寸葱白五寸銅錢七文水煎分服取效乃止粟廩米見後陳廩米下粟蘖米見後蘖米下粟糗見後麨下秫音术品别録中釋名衆音終爾雅糯秫唐本糯粟唐本黄糯時珍曰秫字篆文象其禾體柔弱之形俗呼糯粟是矣北人呼為黄糯亦曰黄米釀酒劣於糯也集解恭曰秫是稻秫也今人呼粟糯為秫北土多以釀酒而汁少於黍米凡黍稷粟秫粳糯三穀皆有秈糯也禹錫曰秫米似黍米而粒小可作酒宗奭曰秫米初搗出淡黄白色亦如糯不堪作飯最粘故宜作酒時珍曰秫即粱米粟米之粘者有赤白黄三色皆可釀酒熬糖作餈糕食之蘇頌圗經謂秫為黍之粘者許慎説文謂秫為稷之粘者崔豹古今註謂秫為稻之粘者皆誤也惟蘇恭以粟秫分秈糯孫炎註爾雅謂秫為粘粟者得之秫米即黄米氣味甘微寒無毒詵曰性平不可常食擁五臓氣動風迷悶人時珍曰按養生集云味酸性熱粘滯易成黄積病小兒不宜多食主治寒熱利大腸療漆瘡别録治筋骨攣急殺瘡疥毒熱生搗和鷄子白傅毒腫良孟詵主犬咬凍瘡嚼傅之日華治肺瘧及陽盛隂虛夜不得眠及食鵞鴨成癥妊娠下黄汁時珍發明𢎞景曰北人以此米作酒煮糖肥軟易消方藥不正用惟嚼以塗漆瘡及釀諸藥醪爾時珍曰秫者肺之穀也肺病宜食之故能去寒熱利大腸大腸者肺之合而肺病多作皮寒熱也千金治肺瘧方用之取此義也靈樞經岐伯治陽盛隂虚夜不得瞑半夏湯中用之取其益隂氣而利大腸也大腸利則陽不盛矣方見半夏條又異苑云宋元嘉中有人食鴨成癥瘕醫以秫米研粉調水服之須臾煩躁吐出一鴨雛而瘥也千金方治食鴨肉成病胸滿面赤不能食以秫米泔一盞飲之附方舊三新三赤痢不止秫米一把鯽魚鮓二臠葱白一虎口煮粥食之普濟方筋骨攣急詵曰用秫米一石麴三斗地黄一斤茵蔯蒿炙黄半斤一依釀酒法服之良肺瘧寒熱痰聚胸中病至令人心寒寒甚乃熱善驚如有所見恒山三錢甘草半錢秫米三十五粒水煎未發時分作三次服千金妊娠下水黄色如膠或如小豆汁秫米黄茋各一兩水七升煎三升分三服梅師浸滛惡瘡有汁多發於心不早治周身則殺人熬秫米令黄黒杵末傅之方肘后久泄胃弱黄米炒為粉每用數匙沙糖拌食簡便根主治煮湯洗風孟詵穇子衫惨二音救荒釋名龍爪粟鴨爪稗時珍曰穇乃不粘之稱也亦不實之貌也龍爪鴨爪象其穗岐之形集解周憲王曰穇子生水田中及下濕地葉似稻但差短稍頭結穗彷彿稗子穗其子如黍粒大茶褐色擣米煮粥炊飯磨麵皆宜時珍曰穇子山東河南亦五且種之苗如茭黍八九月抽莖有三稜如水中藨草之莖開細花簇簇結穗如粟穗而分數岐如鷹爪之状内有細子如黍粒而細赤色其桴甚薄其味粗澀氣味甘濇無毒主治補中益氣厚腸胃濟饑稗音敗綱目釋名時珍曰稗乃禾之卑賤者也故字從卑集解𢎞景曰稗子亦可食又有烏禾生野中如稗荒年可代糧而殺蟲煮以沃地螻蚓皆死藏器曰稗有二種一種黄白色一種紫黒色紫黒者似芑有毛北人呼為烏禾時珍曰稗處處野生最能亂苗其莖葉穗粒並如黍稷一斗可得米三升故曰五穀不熟不如稊稗稊苗似稗而穗如粟有紫毛即烏禾也爾雅謂之􅂒音迭周憲王曰稗有水稗旱稗水稗生田中旱稗苗葉似穇子色深緑根下葉帶紫色稍頭出扁穗結子如黍粒茶褐色味微苦性温以煮粥炊飯磨麫食之皆宜稗米氣味辛甘苦微寒無毒頴曰辛脆主治作飯食益氣宜脾故曹植有芳菰精稗之稱時珍苗根主治金瘡及傷損血出不已搗傅或研末摻之即止甚驗時珍狼尾草拾遺釋名稂音郎蕫蓈爾作童粱狼茅爾雅孟爾雅宿田翁詩疏守田詩疏時珍曰狼尾其穗象形也秀而不成嶷然在田故有宿田守田之稱集解藏器曰狼尾生澤地似茅作穗廣志云子可作黍食爾雅云孟狼尾似茅可以覆屋是也時珍曰狼尾莖葉穗粒並如粟而穗色紫黄有毛荒年亦可采食許慎説文云禾粟之穗生而不成者謂之蕫蓈其秀而不實者名狗尾草見草部附録蒯草蔵器曰蒯草苗似茅可織席為索子亦堪食如粳米米氣味甘平無毒主治作飯食之令人不饑藏器東廧音墻拾遺釋名集解蔵器曰東廧生河西苗似蓬子似葵九月十月熟可為飯食河西人語曰貸我東廧償爾田粱廣志云東廧子粒似葵青黒色并涼間有之時珍曰相如賦東廧彫胡即此魏書云烏丸地宜東廧似穄可作白酒又廣志云粱禾蔓生其子如葵子其米粉白如麵可作饘粥六月種九月收牛食之尤肥此亦一穀似東廧者也子氣味甘平無毒主治益氣輕身久服不饑堅筋骨能步行藏器菰米綱目釋名茭米文選彫蓬爾雅彫苽説文􅀢唐韻作胡彫胡時珍曰菰本作苽茭草也其中生菌如瓜形可食故謂之苽其米須霜彫時采之故謂之彫苽或訛為雕胡枚乘七發謂之安胡爾雅齧彫蓬薦黍蓬也孫炎註云彫蓬即茭米古人以為五飯之一者鄭樵通志云彫蓬即米茭可作飯食故謂之齧其黍蓬即茭之不結實者惟堪作薦故謂之薦楊慎巵言云蓬有水陸二種彫蓬乃水蓬彫苽是也黍蓬乃旱蓬青科是也青科結實如黍羌人食之今松州有焉珍按鄭楊二説不同然皆有理葢蓬類非一種故也集解𢎞景曰菰米一名彫胡可作餅食藏器曰彫胡是菰蔣草米古人所貴故内則云魚宜苽皆水物也曹子建七啓云芳菰精稗謂二草之實可以為飯也頌曰菰生水中葉如蒲葦其苗有莖梗者謂之菰蒋草至秋結實乃彫胡米也古人以為美饌今饑嵗人猶采以當糧葛洪西京雜記云漢太液池邊皆是彫胡紫籜緑節蒲叢之類葢菰之有米者長安人謂之彫胡菰之有首者謂之緑節葭蘆之未解葉者謂之紫籜也宗奭曰菰蒋花如葦結青子細若青麻黄長幾寸野人收之合粟為粥食之甚濟饑也時珍曰彫胡九月抽莖開花如葦䒒結實長寸許霜後采之大如茅針皮黒褐色其米甚白而滑膩作飯香脆杜甫詩波漂菰米沈雲黒者即此周禮供御乃六穀九穀之數管子書謂之鴈膳故收米入此其茭笋菰根别見菜部氣味甘冷無毒主治止渴藏器解煩熱調腸胃時珍蓬草子拾遺釋名集解時珍曰陳藏器本草載蓬草子不具形状珍按蓬類不一有彫蓬即菰草也見菰米下有黍蓬即青科也又有黄蓬草飛蓬草不識陳氏所指果何蓬也以理推之非黄蓬即青科爾黄蓬草生湖澤中葉如菰蒲秋月結實成穗子細如彫胡米饑年人采食之須浸洗曝舂乃不苦澀青科西南夷人種之葉如茭黍秋月結實成穗有子如赤黍而細其稃甚薄曝舂炊食又粟類有七稜青科八稜青科麥類有青稞黄稞皆非此類乃物異名同也其飛蓬乃藜蒿之類末大本小風易拔之故號飛蓬子如灰藋菜子亦可濟荒又魏畧云鮑出遇饑嵗采蓬實日得數斗為母作食西京雜記云宫中正月上辰出池邊盥濯食蓬餌以袚邪氣此皆不知所采乃何蓬也大抵三種蓬子亦不甚相逺子氣味酸澀平無毒主治作飯食之益饑無異粳米藏器芮草音綱拾遺釋名皇爾雅守田同上守氣同時珍曰皇茵音相近也集解藏器曰芮草生水田中苗似小麥而小四月熟可作飯時珍曰爾雅皇守田郭璞云一名守氣生廢田中似燕麥子如彫胡可食米氣味甘寒無毒主治作飯去熱利腸胃益氣力久食不饑藏器蒒草海藥釋名自然穀海藥禹餘糧集解藏器曰博物志云東海洲上有草名曰蒒有實食之如大麥七月熟民斂穫至冬乃訖呼為自然穀亦曰禹餘糧此非石之禹餘糧也珣曰蒒實如毬子八月收之彼民常食中國未曽見也時珍曰按方孝孺集有海米行葢亦蒒草之類也其詩云海邊有草名海米大非蓬蒿小非薺婦女携籃晝作羣采摘仍於海中洗歸來滌釡燒松枝煮米為飯充朝饑莫辭苦澀咽不下性命聊假須臾時子氣味甘平無毒主治不饑輕身藏器補虚羸損乏温腸胃止嘔逆久食徤人李珣薏苡仁本經上品校正據千金方自草部移入此釋名解蠡音禮本經芑實音起别録􅀢米别録音感陶氏作簳珠雷氏作􅀈米回囘米救荒本草薏珠子圗經時珍曰薏苡名義未詳其葉似蠡實葉而解散又似芑黍之苗故有解蠡芑實之名􅀢米乃其堅硬者有􅀢强之意苗名屋菼救荒本草云回回米又呼西畨蜀秫俗名草珠兒集解别録曰薏苡仁生真定平澤及田野八月采實采根無時𢎞景曰真定縣屬常山郡近道處處多有人家種之出交趾者子最大彼土呼為簳珠故馬援在交趾餌之載還為種人讒以為珍珠也實重纍者為良取仁用志云今多用梁漢者氣劣於真定取青白色者良取子於甑中蒸使氣餾曝乾挼之得仁矣亦可磨取之頌曰薏苡所在有之春生苗莖髙三四尺葉如黍葉開紅白花作穗五六月結實青白色形如珠子而稍長故人呼為薏珠子小兒多以線穿如貫珠為戲九月十月采其實斆曰凡使勿用􅀈米顆大無味時人呼為粳􅀈是也薏苡仁顆小色青味甘咬着粘人齒也時珍曰薏苡人多種之二三月宿根自生葉如初生芭芽五六月抽莖開花結實有二種一種粘牙者尖而殻薄即薏苡也其米白色如糯米可作粥飯及磨麫食亦可同米釀酒一種圓而殻厚堅硬者即菩提子也其米少即粳􅀈也但可穿作念經數珠故人亦呼為念珠云其根並白色大如匙柄糺結而味甘也薏苡仁修治斆曰凡使每一兩以糯米一兩同炒熟去糯米用亦有更以鹽湯煮過者氣味甘微寒無毒詵曰平主治筋急拘攣不可屈伸久風濕痺下氣久服輕身益氣本經除筋骨中邪氣不仁利腸胃消水腫令人能食别録炊飯作麫食主不饑温氣煮飲止消渴殺蚘蟲藏器治肺痿肺氣積膿血欬嗽涕唾上氣煎服破毒腫甄權去乾濕脚氣大驗孟詵徤脾益胃補肺清熱去風勝濕炊飯食治冷氣煎飲利小便熱淋時珍發明宗奭曰薏苡仁本經云微寒主筋急拘攣拘攣有兩等素問註中大筋受熱則縮而短故攣急不伸此是因熱而拘攣也故可用薏苡若素問言因寒則筋急者不可更用此也葢受寒使人筋急寒熱使人筋攣若但受熱不曽受寒亦使人筋緩受濕則又引長無力也此藥力勢和緩凡用須加倍即見效震亨曰寒則筋急熱則筋縮急因於堅强縮因於短促若受濕則㢮㢮則引長然寒與濕未嘗不挾熱三者皆因於濕然外濕非内濕啓之不能成病故濕之為病因酒而魚肉繼之甘滑陳久燒炙并辛香皆致濕之因也時珍曰薏苡仁屬土陽明藥也故能健脾益胃虚則補其母故肺痿肺癰用之筋骨之病以治陽明為本故拘攣筋急風痺者用之土能勝水除濕故泄痢水腫用之按古方小續命湯註云中風筋急拘攣語遲脉弦者加薏苡仁亦扶脾抑肝之義又後漢書云馬援在交趾嘗餌薏苡實云能輕身資慾以勝瘴氣也又張師正倦游録云辛稼軒忽患疝疾重墜大如盃一道人教以薏珠用東壁黄土炒過水煮為膏服數服即消程沙随病此稼軒授之亦效本草薏苡乃上品養心藥故此有功頌曰薏苡仁心肺之藥多用之故范汪治肺癰張仲景治風濕胸痺並有方法濟生方治肺損咯血以熟豬肺切蘸薏苡仁末空心食之薏苡補肺豬肺引經也趙君猷言屢用有效附方舊五新九薏苡仁飯治冷氣用薏苡仁舂熟炊為飯食氣味欲如麥飯乃佳或煮粥亦好方廣濟薏苡仁粥治久風濕痺補正氣利腸胃消水腫除胸中邪氣治筋脉拘攣薏苡仁為末同粳米煮粥日日食之良風濕身疼日晡劇者張仲景麻黄杏仁薏苡仁湯主之麻黄三兩杏仁二十枚甘草薏苡仁各一兩以水四升煮取二升分再服金匱要畧水腫喘急用郁季仁二兩研以水濾汁煮薏苡仁飯日二食之獨行方沙石熱淋痛不可忍用玉秼即薏苡仁也子葉根皆可用水煎熱飲夏月冷飲以通為度楊氏經驗方消渴飲水薏苡仁煮粥飲并煮粥食之周痺緩急偏者薏苡仁十五兩大附子十枚炮為末每服方寸匕日三張仲景方肺痿咳唾膿血薏苡仁十兩杵破水煎一升酒少許服之梅師肺癰咳唾心胸甲錯者以淳苦酒煮薏苡仁令濃微温頓服肺有血當吐出愈范汪方肺癰咯血薏苡仁三合搗爛水二大盞一盞入酒少許分二服濟生喉卒癰腫吞薏苡仁二枚良外䑓癰疽不潰薏苡仁一枚吞之姚僧坦方孕中有癰薏苡仁煮汁吞頻頻飲之方婦人良補遺牙齒䘌痛薏苡仁桔梗生研末㸃服不拘大人小兒永類方根氣味甘微寒無毒主治下三蟲本經煮汁糜食甚香去蚘蟲大效𢎞景煮服墮胎藏器治卒心腹煩滿及胸脇痛者剉煮濃汁服三升乃定蘇頌方出肘后擣汁和酒服治黄疸有效時珍附方舊二新二黄疸如金薏苡根煎湯頻服蛔蟲心痛薏苡根一斤切水七升煮三升服之蟲死盡出也梅師經水不通薏苡根一兩水煎服之不過數服效海上方牙齒風痛薏苡根四兩水煮含潄冷即易之延年秘録葉主治作飲氣香益中空膈蘇頌暑月煎飲暖胃益氣血初生小兒浴之無病時珍録出瑣碎罌子粟宋開寳釋名米囊子開寳御米同上象穀時珍曰其實状如罌子其米如粟乃象乎穀而可以供御故有諸名集解藏器曰嵩陽子云罌粟花有四葉紅白色上有淺紅暈子其囊形如髇頭箭中有細米頌曰處處有之人多蒔以為飾花有紅白二種微腥氣其實形如缾子有米粒極細南人隔年糞地九月布子涉冬至春始生苗極繁茂不爾則不生生亦不茂俟缾焦黄乃采之宗奭曰其花亦有千葉者一罌凡數千萬粒大小如葶􅐗子而色白時珍曰罌粟秋種冬生嫩苗作蔬食甚佳葉如白苣三四月抽薹結青苞花開則苞脱花凡四瓣大如仰盞罌在花中鬚蘂裏之花開三日即謝而罌在莖頭長一二寸大如馬兠鈴上有葢下有蒂宛然如酒罌中有白米極細可煮粥和飯食水研濾漿同緑豆粉作腐食尤佳亦可取油其殻入藥甚多而本草不載乃知古人不用之也江東人呼千葉者為麗春花或謂是罌粟别種葢亦不然其花變態本自不常有白者紅者紫者粉紅者杏黄者半紅者半紫者半白者艷麗可愛故曰麗春又曰賽牡丹曰錦被花詳見游黙齋花譜米氣味甘平無毒宗奭曰性寒多食利二便動膀胱氣主治丹石發動不下飲食和竹瀝煮作粥食極美開寳冦曰服石人研此水煮加蜜作湯飲甚宜行風氣逐邪熱治反胃胸中痰滯頌治瀉痢潤燥時珍附方舊一新一反胃吐食罌粟粥用白罌粟米三合人参末三大錢生山芋五寸細切研三物以水二升三合煮取六合入生薑汁及鹽花少許和勻分服不計早晚亦不妨别服湯丸圗經泄痢赤白罌粟子炒罌粟殻炙等分為末煉蜜丸梧子大每服三十丸米飲下有人經驗百一選方殻修治時珍曰凡用以水洗潤去蒂及筋膜取外薄皮隂乾細切以米醋拌炒入藥亦有蜜炒蜜炙者氣味酸濇微寒無毒時珍曰得醋烏梅橘皮良主治止瀉痢固脱肛治遺精久欬斂肺澀腸止心腹筋骨諸痛時珍發明杲曰收斂固氣能入腎故治骨病􅀹宜震亨曰今人虛勞欬嗽多用粟殻止刼及濕熱泄痢者用之止澀其治病之功雖急殺人如劍宜深戒之又曰治嗽多用粟殻不必疑但要先去病根此乃收后藥也治痢亦同凡痢須先散邪行滯豈可遽投粟殻龍骨之藥以閉塞腸胃邪氣得補而愈甚所以變症作而淹延不已也時珍曰酸主收澀故初病不可用之泄瀉下痢既久則氣散不固而腸滑肛脱欬嗽諸病既久則氣散不收而肺脹痛劇故俱宜此澀之固之收之斂之按楊氏直指方云粟殻治痢人皆薄之固矣然下痢日久腹中無積痛當止澀者豈容不澀不有此劑何以對治乎但要有輔佐耳又王碩易簡方云粟殻治痢如神但性𦂳澀多令嘔逆故人畏而不敢服若用醋制加以烏梅則用得法矣或同四君子藥尤不致閉胃妨食而獲奇功也附方新八熱痢便血粟殻醋炙一兩陳皮半兩為末每服三錢烏梅湯下普濟方久痢不止罌粟殻醋炙為末蜜丸彈子大每服一丸水一盞薑三片煎八分温服又方粟殻十兩去膜分作三分一分醋炒一分蜜炒一分生用並為末蜜丸芡子大每服三十丸米湯下集要百中散用粟殻蜜炙厚朴薑制各四兩為細末每服一錢米飲下忌生冷小兒下痢神仙救苦散治小兒赤白痢下日夜百行不止用罌粟殻半兩醋炒為末再以銅器炒過檳榔半兩炒赤研末各收每用等分赤痢蜜湯服白痢沙餹湯下忌口味全幼心鑑水泄不止罌粟殻一枚去蒂膜烏梅肉大棗肉各十枚水一盞煎七分温服經騐久嗽不止穀氣素壮人用之即效粟殻去筋蜜炙為末每服五分蜜湯下危氏方久欬虚嗽賈同知百勞散治欬嗽多年自汗用罌粟殻二兩半去蒂膜醋炒取一兩烏梅半兩焙為末每服二錢臥時白湯下宣明方嫩苗氣味甘平無毒主治作蔬食除熱潤燥開胃厚腸時珍阿芙蓉綱目釋名阿片時珍曰俗作鴉片名義未詳或云阿方音稱我也以其花色似芙蓉而得此名集解時珍曰阿芙蓉前代罕聞近方有用者云是罌粟花之津液也罌粟結青苞時午后以大針刺其外面青皮勿損裏面硬皮或三五處次早津出以竹刀刮收入瓷器隂乾用之故今市者猶有苞片在内王氏醫林集要言是天方國種紅罌粟花不令水淹頭七八月花謝后刺青皮取之者案此花五月實枯安得七八月后尚有青皮或方土不同乎氣味酸澀温微毒主治瀉痢脱肛不止能澀丈夫精氣時珍發明時珍曰俗人房中術用之京師售一粒金丹云通治百病皆方伎家之術耳附方新四久痢阿芙蓉小豆許空心温水化下日一服忌葱蒜漿水若渴飲蜜水解之集要赤白痢下鴉片木香黄連白术各一分研末飯丸小豆大壯者一分老幼半分空心米飲下忌酸物生冷油膩茶酒麺無不止者口渴畧飲米湯落一方罌粟花未開時外有兩片青葉包之花開即收取為末每米飲服一錢神効赤痢用紅花者白痢用白花者一粒金丹真阿芙蓉一分粳米飯擣作三丸每服一丸未効再進一丸不可多服忌醋令人腸斷風癱熱酒下口目喎邪羌活湯下百節痛獨活湯下正頭風羌活湯下偏頭風川芎湯下眩運防風湯下隂毒豆淋酒下瘧疾桃栁枝湯下痰喘葶􅐗湯下久嗽乾薑阿膠湯下勞嗽欵冬花湯下吐泄霍香湯下赤痢黄連湯下白痢薑湯下禁口痢白术湯下諸氣痛木香酒下熱痛巵子湯下臍下痛燈心湯下小腸氣川楝茴香湯下血氣痛乳香湯下脇痛熱酒下噎食生薑丁香湯下女人血崩五靈脂湯下小兒慢脾風砂仁湯下龔雲林醫鑑本草綱目卷二十三
