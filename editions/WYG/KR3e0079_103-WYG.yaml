body:
  text: 本草綱目卷四十四目録鱗之四魚類三十一種鯉魚本經鱮魚綱目魚即鰱鱅魚拾遺鱒魚綱目魚即赤眼鯇魚拾遺魚即草青魚開寶竹魚綱目鰶魚開寶白魚開寶鯼魚食療鱤魚綱目石首魚開寳附墨頭魚勒魚綱目鱭魚食療鰣魚食療嘉魚開寳鯧魚拾遺鯽魚别録附䲙魚魴魚食療即鯿鱸魚嘉祐鱖魚開寶附鰧魚鯊魚綱目杜父魚拾遺石斑魚綱目石鮅魚拾遺黄鯝魚綱目鰷魚綱目鱠殘魚食鑑魚即銀鱵魚綱目鱊魚綱目金魚綱目附丹魚右附方舊十三新六十鱗之四鱗魚二十八種附録九種鱧魚本經鰻鱺魚别録海鰻鱺日華鱓魚别録鰌魚綱目鱣魚拾遺魚即黄鱘魚拾遺牛魚拾遺鮠魚拾遺魚即鮰鮧魚别録魚即鮎䱱魚綱目魚即孩兒鯢魚拾遺黄顙魚食療河豚魚開寳海豚魚拾遺比目魚食療鮹魚拾遺鮫魚唐本魚即沙烏賊魚本經附柔魚章魚綱目海鷂魚拾遺魚即少陽文鰩魚拾遺魚虎拾遺魚師綱目海蛇拾遺鰕别録海鰕拾遺海馬拾遺附録鮑魚别録魚即薧鱁鮧拾遺膠即鰾魚鱠拾遺魚鮓拾遺魚脂拾遺魚魫綱目魚鱗綱目魚子綱目諸魚有毒拾遺右附方舊九新六十本草綱目卷四十四目録
