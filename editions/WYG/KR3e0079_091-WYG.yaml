body:
  text: 本草綱目卷三十八目録服器部李時珍曰敝帷敝葢聖人不遺木屑竹頭賢者注意無棄物也中流之壺拯溺雪窖之氊救危無微賤也服帛器物雖屬尾𤨏而倉卒值用亦奏竒功豈可藐眎而漫不經神耶舊本散見草木玉石蟲魚人部今集其可備醫用者凡七十九種為服器部分為二部曰服帛曰器物名醫别録三種梁陶𢎞景註唐本草唐蘇恭本草拾遺三十五種唐陳藏器藥性本草一種唐甄權開寶本草一種宋馬志嘉祐本草一種宋掌禹錫本草綱目三十五種明李時珍附註魏吳普本草註蜀韓保昇重唐李珣海藥宋蘇頌圖經宋唐慎微證類元朱震亨補遺㓂宗奭衍義服器之一服帛類二十五種錦拾遺絹綱目帛拾遺布拾遺綿拾遺褌襠拾遺衣附月經汗衫綱目孝子衫拾遺缺病人衣綱目缺衣帶拾遺缺頭巾綱目幞頭綱目皮巾子綱目皮腰袋綱目繳脚布拾遺敗天公拾遺即笠故蓑衣拾遺氊屜綱目皮鞾綱目麻鞋唐本草鞋拾遺履屧鼻繩唐本自經死繩拾遺靈牀鞋拾遺死人枕席拾遺右附方舊七新六十三服器之二器物類五十四種紙綱目青紙綱目印紙拾遺桐油繖紙綱目厯日綱目鍾馗綱目桃符藥性桃橛拾遺救月杖拾遺撥火杖拾遺吹火筒綱目鑿柄木拾遺鐵椎柄拾遺銃楔綱目弓鞘拾遺馬鞭綱目箭笴及鏃拾遺弓弩絃别録紡車絃綱目梭頭拾遺連枷關綱目楤擔尖綱目梳箆拾遺鍼線袋拾遺蒲扇拾遺蒲席别録簟綱目簾箔嘉祐漆器綱目硏硃石槌拾遺燈盞綱目燈盞綱目燈盞油綱目車脂開寶敗船茹别録故木砧拾遺杓拾遺筯拾遺甑唐本鍋蓋綱目飯籮拾遺蒸籠綱目炊單布綱目故炊帚拾遺弊帚綱目簸箕舌綱目竹籃拾遺魚笱綱目魚網拾遺草麻繩索綱目馬絆繩綱目縳豬繩綱目牛牶綱目厠籌拾遺尿桶綱目右附方舊十六新六十六本草綱目卷三十八目録
