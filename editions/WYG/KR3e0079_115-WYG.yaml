body:
  text: 本草綱目卷五十目録獸部李時珍曰獸地產也豢者曰畜周制庖人供六畜馬牛雞羊犬豕六獸麇鹿狼麕兔野豕也辨其死生鮮薧之物獸人辨其名物凡祭祀賔客供其死獸生獸皮毛筋骨入于玉府冥氏攻猛獸穴氏攻蟄獸鳴呼聖人之于養生事死辨物用物之道可謂慎且備矣後世如黄羊黄鼠今為御供犏尾貂皮盛為時用山獺之異狗寳之功皆服食所須而典籍失載羵羊之問宣父獨知鼨鼠之對終軍能究地生之羊彭侯之肉非博雅君子孰能别之况物之性理萬殊人之用舍宜慎盖不但多識其名而已也於是集諸獸之可供膳食藥物服器者為獸部凡八十六種分為五類曰畜曰獸曰鼠曰寓爾雅釋獸有䑕屬寓屬邢昺註曰猴類漸肖于人寄寓山林故曰寓屬曰怪舊本獸部三品共五十八種今併入五種移一種入鱗部一種入禽部自蟲部移入三種神農本草經十五種梁陶𢎞景註名醫别録十二種梁陶𢎞景註唐本草八種唐蘇恭本草拾遺一十五種唐陳藏器炮炙論一種唐雷斆蜀本草一種蜀韓保昇開寳本草四種宋馬志嘉祐本草一種宋掌禹錫圖經本草一種宋蘇頌證類本草一種宋唐慎微本草衍義一種宋寇宗奭日用本草一種元吳瑞食物本草一種明汪頴食鑑本草一種明寗原本草綱目二十三種明李時珍附註魏李當之藥録齊徐之才藥對吳普本草性唐甄權藥宋雷斆炮炙孫思邈千金唐李珣海藥唐孟詵食療楊損之刪繁食性南唐陳士良蕭炳四聲日華宋人大明金張元素珍珠囊李杲法象王好古湯液遺元朱震亨補明汪機㑹編王綸集要陳嘉謨蒙詮獸之一畜類二十八種附七種豕本經狗本經羊本經封大尾羊胡羊洮羊􅀢羊羊地生羊羵羊附黄牛綱目牛本經馬本經驢唐本騾食鑑駝開寳駱唐本酥别録醍醐唐本乳腐嘉祐阿膠本經黄明膠綱目牛黄本經鮓荅綱目狗寳綱目底野迦唐本諸血拾遺諸朽骨拾遺震肉拾遺敗鼓皮别録氊拾遺六畜爪甲蹄本經六畜心綱目諸肉有毒拾遺解諸肉毒綱目右附方舊一百五十六新五百三十七本草綱目卷五十目録
