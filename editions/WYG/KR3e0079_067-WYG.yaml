body:
  text: 本草綱目卷二十六明李時珍撰菜之一葷辛類三十二種内附七種韭别錄中品釋名草鍾乳拾遺起陽草侯氏藥譜葉頌曰案許慎說文韭字象出地上形一種而久生故謂之韭一歳三四割其根不傷至冬壅培之先春復生信乎乆生者也藏器曰俗謂韭是草鍾乳言其温補也時珍曰韭之莖名韭白根名韭黃花名韭菁禮記謂韭為豐本言其美在根也薤之美在白韭之美在黃黃乃未出土者集解時珍曰韭叢生豐本長葉青翠可以根分可以子種其性内生不得外長葉髙三寸便剪剪忌日中一歳不過五剪收子者只可一剪八月開花成叢收取醃藏供􅄿謂之長生韭言剪而復生乆而不乏也九月收子其子黒色而扁須風處隂乾勿令浥鬱北人至冬移根于土窖中培以馬屎暖則即長髙可尺許不見風日其葉黃嫩謂之韭黃豪貴皆珍之韭之為菜可生可熟可菹可乆乃菜中最有益者也羅願爾雅翼云物久必變故老韭為莧頌曰鄭𤣥言政道得利隂物變為陽故葱變為韭可騐葱冷而韭温氣味辛微酸温濇無毒時珍曰生辛濇熟甘酸大明曰熱宗奭曰春食則香夏食則臭多食則能昬神暗目酒後尤忌詵曰熱病後十日食之即發困五月多食乏氣力冬月多食動宿飲吐水不可與蜜及牛肉同食主治歸心安五臟除胃中熱利病人可久食别録時珍曰案千金方作可久食不利病人葉煮鯽魚鮓食斷卒下痢根入生髪膏用𢎞景根葉煮食温中下氣補虚益陽調和臟腑令人能食止洩血膿腹中冷痛生擣汁服主胸痺骨痛不可觸者又解藥毒療狂狗咬人數發者亦塗諸蛇虺蠍薑惡蟲毒藏器煮食充肺氣除心腹痼冷痃癖擣汁服治肥白人中風失音日華煮食歸腎壯陽止洩精暖腰膝甯原熟以鹽醋空心喫十頓治胸膈噎氣擣汁服治胸痺刺痛如錐即吐出胸中惡血甚騐又灌初生小兒吐去惡水惡血永無諸病詵主吐血唾血衂血尿血婦人經脈逆行打撲傷損及膈噎病擣汁澄清和童尿飲之能消散胃脘瘀血甚效震亨飲生汁主上氣喘息欲絶解肉脯毒煮汁飲止消渴盜汗熏産婦血運洗腸痔脫肛時珍發明𢎞景曰此菜殊辛臭雖煮食之便出猶熏灼不如葱薤熟即無氣最是養生所忌頌曰菜中此物最温而益人宜常食之昔人正月節食五辛以辟癘氣謂韭薤葱蒜薑也宗奭曰韭黄未出糞上最不益人食之滯氣蓋含抑鬱未申之氣故也孔子曰不時不食正謂此類花食之亦動風思邈曰韭味酸肝病宜食之大益人心時珍曰韭葉熱根温功用相同生則辛而散血熟則甘而補中入足厥隂經乃肝之菜也素問言心病宜食韭葉食鑑本草言歸腎文雖異而理則相貫蓋心乃肝之子腎乃肝之母母能令子實虚則補其母也道家曰為五葷之一謂其能昏人神而動虚陽也有一貧叟病噎膈食入即吐胷中刺痛或令取韭汁入鹽梅鹵汁少許細呷得入漸加忽吐稠涎數升而愈此亦仲景治胸痺用薤白皆取其辛温能散胃脘痰飲惡血之義也震亨曰心痛有食熱物及怒鬱致死血留於胃口作痛者宜用韭汁桔梗加入藥中開提氣血有腎氣上攻以致心痛者宜用韭汁和五苓散為丸空心茴香湯下蓋韭性急能散胃口血滯也又反胃宜用韭汁二盃入薑汁牛乳各一盃細細温服蓋韭汁消血薑汁下氣消痰和胃牛乳能解熱潤燥補虚也一人臘月飲刮刴酒三盃自后食必屈曲下膈硬濇微痛右脈甚濇關脈沈此汚血在胃脘之口氣因鬱而成痰隘塞食道也遂以韭汁半琖細細冷呷盡半斤而愈附方舊十一新二十一胸痺急痛詵曰胸脾痛如錐刺不得俛仰自汗出或徹背上不治或至死可取生韭或根五斤洗擣汁服之食療本草隂陽易病男子隂腫小腹絞痛頭重眼花宜豭䑕屎湯煮之用豭䑕屎十四枚韭根一大把水二琖煮七分去滓再煎二沸温服得汗愈未汗再服人南陽活書傷寒勞復方同上卒然中惡擣韭汁灌鼻中便甦食醫心鏡臥忽不寤勿以火照之但痛齧拇指甲際而唾其面則活取韭擣汁吹入鼻中冬月則用韭根方肘後風忤邪惡韭根一把烏梅十四箇呉茱萸炒半升水一斗煮之仍以病人櫛内入煮三沸櫛浮者生沈者死煮至三升分三服金匱要畧喘息欲絕韭汁飲一升效夜出盜汗韭根四十九根水二升煮一升頓服千金方消渴引飲韭苗日用三五兩或炒或作羮勿入鹽入醬無妨喫至十斤即住極效過清明勿喫有人病此引飲无度得此方而愈秦憲副方㗋腫難食韭一把擣熬傅之冷即易千金方水穀痢疾韭葉作羮粥􅨘炒任食之良鏡食醫心脫肛不收生韭一斤切以酥拌炒熟綿裹作二包更互熨之以入為度聖惠痔瘡作痛用盆盛沸湯以器蓋之留一孔用洗淨韭菜一把泡湯中乗熱坐孔上先熏後洗數次自然脫體也袖珍方小兒胎毒初生時以韭汁少許灌之即吐出惡水惡血永無諸疾本四聲草小兒腹脹韭根擣汁和猪肋煎服一合間日一服取愈祕錄小兒患黃韭根擣汁日滴鼻中取黃水取效同上痘瘡不發韭根煎湯服之海上方産後嘔水産後因怒哭傷肝嘔青綠水用韭葉一斤取汁入薑汁少許和飲遂愈摘𤣥方産後血運韭菜切安瓶中沃以熱醋令氣入鼻中即省丹溪心法赤白帶下韭根擣汁和童尿露一夜空心温服取效海上仙方鼻衂不止韭根葱根同擣棗大塞入鼻中頻易兩三度即止千金方五般瘡癬韭根炒存性擣末以猪脂和塗之數度愈經騐方金瘡出血韭汁和風化石灰日乾每用為末傅之效瀕湖集簡方刺傷中水腫痛煮韭熱榻之金千漆瘡作痒韭葉杵傅斗門方猘狗咬傷七日當一發三七日不發乃脫也急於無風處以冷水洗淨即服韭汁一盌隔七日又一盌四十九日共服七盌須百日忌食酸鹹一年忌食魚腥終身忌食狗肉方得保全否則十有九死徐本齋云此法出肘後方有風犬一日咬三人止一人用此得活親見有效簡便百虫入耳韭汁灌之即出千金方聤耳出汁韭汁日滴三次聖恵方牙齒虫􅉶韭菜連根洗擣同人家地板上泥和傅痛處腮上以紙蓋住一時取下有細虫在泥上可除根泥又方韭根十箇川椒二十粒香油少許以水桶上同擣傅病牙頰上良久有虫出數次即愈也解肉脯毒凡肉宻器蓋過夜者為鬱肉屋漏沾著者為漏脯皆有毒擣韭汁飲之文仲備急方食物中毒生韭汁服數升良千金韭子修治大明曰入藥揀淨蒸熟暴乾簸去黒皮炒黃用氣味辛甘温無毒時珍曰陽也伏石鍾乳乳香主治夢中洩精溺血别録暖腰膝治鬼交甚效日華補肝及命門治小便頻數遺尿女人白淫白帶時珍發明頌曰韭子得龍骨桑螵蛸主漏精補中葛洪孫思邈諸方多用之𢎞景曰韭子入棘刺諸丸主漏精時珍曰棘刺九方見外臺祕要治諸勞洩小便數藥多不録案梅師方治遺精用韭子五合白龍骨一兩為末空心酒服方寸匕千金方治夢遺小便數用韭子二兩桑螵蛸一兩微炒研末每旦酒服二錢三因方治下元虚冷小便不禁或成白濁有家韭子丸蓋韭乃肝之菜入足厥隂經腎主閉藏肝主疎洩素問曰足厥隂病則遺尿思想無窮入房太甚發為筋痿及為白淫男隨溲而下女子綿綿而下韭子之治遺精漏泄小便頻數女人帶下者能入厥隂補下焦肝及命門之不足命門者藏精之府故同治云附方舊三新四夢遺溺白藏器曰韭子每日空心生吞一二十粒鹽湯下聖惠治虚勞傷腎夢中洩精用韭子二兩微炒為末食前温酒服二錢匕虛勞溺精用新韭子二升十月霜後采之好酒八合漬一宿以晴明日童子向南擣一萬杵平旦温酒服方寸匕日再服之外臺祕要夢洩遺尿韭子一升稻米二斗水一斗七升煮粥取汁六升分三服千金方玉莖强中玉莖强硬不痿精流不住時時如針刺揑之則痛其病名强中乃腎滯漏疾也用韭子破故紙各一兩為末每服三錢水一盞煎服日三即住經騐方腰脚無力韭子一升揀淨蒸兩炊久暴乾簸去黒皮炒黃擣粉安息香二大兩水煮一二百沸慢火炒赤色和擣為丸梧子大如乾入少蜜每日空腹泗下三十丸以飯三五匙壓之大佳崔元亮海上方女人帶下及男子腎虚冷夢遺用韭子七升醋煮千沸焙研末煉蜜丸梧子大每服三十丸空心温酒下千金方烟熏虫牙用瓦片煆紅安韭子數粒清油數㸃待烟起以筒吸引至痛處良久以温水潄吐有小虫出為效未盡再熏救急易方山韭千金釋名蒮音育韯音纎並未詳集解頌曰蒮山韭也山中往往有之而人多不識形性亦與家韭相類但根白葉如燈心苗耳韓詩云六月食鬰及薁謂此也時珍曰案爾雅云蒮山韭也許慎說文云韯山韭也金幼孜北征録云北邊雲臺戎地多野韭沙葱人皆采而食之即此也蘇氏以詩之鬱即此未知是否又呂忱字林云簽童嚴水韭也野生水涯葉如韭而細長可食觀此則知野韭又有山水二種氣味或不相逺也氣味鹹寒濇無毒主治宜腎主大小便數去煩熱治毛髪千金發明時珍曰蒮腎之菜也腎病宜食之諸家本草不載而孫思邈千金方收之他書蒮字多訛作藿字藿乃豆葉也陳直奉親養老書有蒮菜羮即此也其方治老人脾胃氣弱飲食不强用蒮菜四兩鯽魚肉五兩煮羮下五味并少麫食每三五日一作之云極補益附錄孝文韭拾遺藏器曰辛温無毒主腹内冷脹滿洩痢腸辟温中補虚令人能行生塞北山谷狀如韭人多食之云是後魏孝文帝所種又有諸葛韭孔明所種此韭更長彼人食之時珍曰此亦山韭也但因人命名耳葱别録中品釋名芤綱目菜伯同和事草同鹿胎時珍曰葱從怱外直中空有怱通之象也芤者草中有孔也故字從孔芤脉象之葱初生曰葱針葉曰葱青衣曰葱袍莖曰葱白葉中涕曰葱苒諸物皆宜故云菜伯和事集解恭曰葱有數種山葱曰茖葱療病以胡葱其人間食葱有二種一種凍葱經冬不死分莖栽蒔而無子一種漢葱冬即葉枯食用入藥凍葱最善氣味亦佳也保昇曰葱凡四種冬葱即凍葱也夏衰冬盛莖葉俱軟美山南江左有之漢葱莖實硬而味薄冬即葉枯胡葱莖葉粗硬根若金燈茖葱生於山谷不入藥用頌曰入藥用山葱胡葱食品用冬葱漢葱又有一種樓葱亦冬葱類江南人呼為龍角葱荆楚間多種之其皮赤每莖上出岐如入角故云瑞曰龍角即龍爪葱又名羊角葱莖上生根移下蒔之時珍曰冬葱即慈葱或名太官葱謂其莖柔細而香可以經冬太官上供宜之故有數名漢葱一名木葱其莖粗硬故有木名冬葱無子漢葱春末開花成叢青白色其子味辛色黒有皺文作三瓣狀收取隂乾勿令浥鬱可種可栽葱莖白氣味辛平葉温根鬚汁並無毒𢎞景曰葱有寒熱白冷青熱傷寒湯中不得用青也宗奭曰葱主發散多食昬人神詵曰葱宜冬月食不可過多損鬚髪發人虚氣上冲五臟閉絕為其開骨節出汗之故也思邈曰正月食生葱令人面上起遊風生葱同蜜食作下利燒葱同蜜食壅氣殺人張仲景曰生葱合棗食令人病合犬雉肉食多令人病血時珍曰服地黄常山人忌食葱主治作湯治傷寒寒熱中風面目浮腫能出汗本經傷寒骨肉碎痛㗋痺不通安胎歸目益目睛除肝中邪氣安中利五臟殺百藥毒根治傷寒頭痛别録主天行時疾頭痛熱狂霍亂轉筋及奔豚氣脚氣心腹痛目眩止心迷悶大明通關節止衂血利大小便孟詵治陽明下痢下血李杲達表和裏止血甯原除風濕身痛麻痺蟲積心痛止大人陽脫隂毒腹痛小兒盤腸内釣婦人妊娠溺血通乳汁散乳癰利耳鳴􅂗猘犬傷制蚯蚓毒時珍殺一切魚肉毒士良發明元素曰葱莖白味辛而甘平氣厚味薄升也陽也入手太隂足陽明經專主發散以通上下陽氣故活人書治傷寒頭痛如破用連鬚葱白湯主之張仲景治少隂病下利清穀裏寒外熱厥逆脉微者白通湯主之内用葱白若面色赤者四逆湯加葱白腹中痛者去葱白成無已解之云腎惡燥急食辛以潤之葱白辛温以通陽氣也時珍曰葱乃釋家五葷之一生辛散熟甘溫外實中空肺之菜也肺病宜食之肺主氣外應皮毛其合陽明故所治之症多屬太隂陽明皆取其發散通氣之功通氣故能解毒及理血病血者氣之帥也氣通則血活矣金瘡磕損折傷血出疼痛不止者王璆百一方用葱白砂糖等分研封之云痛立止更無痕瘢也葱葉亦可用又葱管吹鹽入玉莖内治小便不通及轉脬危急者極有捷效余常用治數人得騐附方舊十二二新三十感冐風寒初起即用葱白一握淡豆䜴半合泡湯服之取汗頻湖集簡方附方本四十四條今少一條係原本闕傷寒頭痛如破者連鬚葱白半斤生薑二兩水煮温服活人書時疾頭痛發熱者以連根葱白二十根和米煮粥入醋少許熱食取汗即解濟生祕覽數種傷寒初起一二日不能分别者用上法取汗傷寒勞復因交接者腹痛卵腫用葱白擣爛苦酒一盞和服之金千方風溼身痛生葱擂爛入香油數㸃水煎調川芎藭鬱金末一錢服取吐丹溪心法妊娠傷寒赤斑變為黒斑尿血者以葱白一把水三升煮熱服汁食葱令盡取汗傷寒類要六月孕動困篤難救者葱白一大握水三升煎一升去滓頓服楊氏産乳胎動下血病痛搶心用葱白煮濃汁飲之未死即安已死即出未效再服一方加川芎一方用銀器同米煮粥及羮食之宋師方卒中惡死或先病或平居寢臥奄忽而死皆是中惡急取葱心黄刺入鼻孔中男左女右入七八寸鼻目血出即甦無又法用葱刺入耳中五寸以鼻中血出即活也如血出即不可治矣相傳此扁鵲祕方也崔氏纂要小兒卒死無故者取葱白納入下部及兩鼻孔中氣通或啑即活陳氏經騐方小兒盤腸内釣腹痛用葱湯洗兒腹仍以炒葱擣貼臍上良久尿出痛止寳湯氏嬰孩鑑隂毒腹痛厥逆唇青卵縮六脉欲絕者用葱一束去根及青留白二寸烘熱安臍上以熨斗火熨之葱壞則易良久熱氣透入手足温有汗即瘥乃服四逆湯若熨而手足不温不可治人朱肱南陽活書脫陽危症凡人大吐大泄之後四肢厥冷不省人事或與女子交後小腹腎痛外腎搐縮冷汗出厥逆須臾不救先以葱白炒熱熨臍後以葱白三七莖擂爛用酒煮灌之陽氣即回此華佗救卒病方也卒心急痛牙關𦂳閉欲絕以老葱白五莖去皮鬚擣膏以匙送入咽中灌以蔴油四兩但得下咽即甦少頃虫積皆化黄水而下永不厚發累得救人瑞竹堂方霍亂煩躁坐臥不安葱白二十莖大棗二十枚水三升煎二升分服深師方蚘虫心痛用葱莖白二寸鉛粉二錢擣丸服之即止葱能通氣粉能殺虫也楊氏經騐方腹皮麻痺不仁者多煮葱白食之即自愈危氏方小便閉脹不治殺人葱白三斤剉炒帕盛二箇更互熨小腹氣透即通也許學士本事方大小便閉擣葱白和酢封小腹上仍灸七壯外臺秘要大腸虚閉勻氣散用連鬚葱一根薑一塊鹽一捻淡䜴三七粒擣作餅烘揜臍中紥定良久氣通即通不通再作楊氏直指方小兒虚閉葱白三根煎湯調生蠻阿膠末服仍以葱頭染蜜挿入肛門少頃即通全幼心鑑急淋隂腫泥葱半斤煨熱杵爛貼臍上外臺小便淋澀或有白者以赤根樓葱近根截一寸許安臍中以艾灸七壯經騐方小兒不尿乃胎熱也用大葱白切四片用乳汁半盞同煎片時分作四服即通不飲乳者服之即飲乳若臍四旁有青黒色及口撮者不可救也全幼心鑑腫毒尿閉因腫毒未潰小便不通用葱切入蔴油煎至黒色去葱取油時塗腫處即通普濟水廕病腫葱根白皮煮汁服一盞當下水出病已困者取根擣爛坐之取氣水自下聖濟録隂囊腫痛葱白乳香擣塗即時痛止腫消又方用煨葱入鹽杵如泥塗之小便溺血葱白一握鬱金一兩水一升煎二合温服一日三次濟普方腸痔有血葱白三斤煮湯熏洗立效外臺赤白下痢葱白一握細切和米煮粥日日食之食醫心鏡便毒初起葱白炒熱布包熨數次乃用傅藥即消永類方用葱根和蜜擣𫝊以紙宻䕶之外服通氣藥即愈癰疽腫硬烏金散治癰癤腫硬無頭不變色者米粉四兩葱白一兩同炒黒研末醋調貼一伏時又換以消為度外科精義一切腫毒葱汁漬之日四五度乳癰初起葱汁一升頓服即㪚並千金疔瘡惡腫刺破以老葱生蜜杵貼兩時疔出以醋湯洗之神效聖濟録小兒秃瘡今泔洗淨以羊角葱擣泥入蜜和塗之神效楊氏刺瘡金瘡百治不效葱煎濃汁漬之甚良金瘡瘀血在腹者大葱白二十枚蔴子三升杵碎水九升煮一升半頓服當吐出膿血而瘉未盡再服並千金方血壅怪病人徧身忽然肉出如錐既痒且痛不能飲食名血壅不速治必潰膿血以赤皮葱燒灰淋洗飲䜴湯數盞自安方夏子益怪病奇解金銀毒葱白煮汁飲之外臺秘要腦破骨折蜜和葱白擣勻厚封立效肘後方自縊垂死葱心刺耳鼻中有血出即甦葉主治煨研傅金瘡水入􅀈腫鹽研傅蛇虫傷及中射工溪毒日華主水病足腫蘇頌利五臟益目精發黃疸思邈發明頌曰煨葱治打撲損見劉禹鍚𫝊信方云得于崔給事取葱新折者煻火煨熱剝皮其間有涕便將罨損處仍多煨續續易熱者崔云頃在澤潞與李抱真作判官李相方以毬杖按毬子其軍將以杖相格因傷李相拇指并爪甲劈裂遽索金創藥裹之强索酒飲而面色愈青忍痛不止有軍吏言此方遂用之三易面色却赤斯須云已不痛凡十數度用熱葱并涕纒褁其指遂畢席笑語時珍曰按張氏經騐方云金創折傷血出用葱白連葉煨熱或鍋烙炒熱擣爛傅之冷即再易石城尉戴堯臣試馬損大指血出淋漓余用此方再易而痛止翌日洗面不見痕跡宋推官鮑縣尹皆得此方每有殺傷氣未絕者亟食用此活人甚衆又凡人頭目重悶疼痛時珍每用葱葉挿入鼻内二三寸并耳内氣通即便清爽也附方舊三新二水病足腫葱莖葉煮湯漬之日三五次妙韋宙獨行方小便不通葱白連葉擣爛入蜜合外腎上即通永類鈐方瘡傷風水腫毒取葱青葉和乾薑黄檗等分煮湯浸洗立愈食療蜘蛛咬瘡徧身生瘡青葱葉一莖去尖入蚯蚓一條在内待化成水取㸃咬處即愈李絳兵部手集代指毒痛取萎黄葱葉煮汁熱漬之千金方汁氣味辛温滑無毒主治溺血飲之解藜蘆及桂毒别録散瘀血止衂血痛治頭痛耳聾消痔漏解衆藥毒時珍能消玉為水化五石仙方所用𢎞􅕺發明時珍曰葱汁即葱涕功同葱白古方多用葱涎丸藥亦取其通散上焦風氣也勝金方取汁入酒少許滴鼻中治䘐血不止云即覺血從腦散下也又唐瑶經騐方以葱汁和蜜少許服之亦佳云隣媪用此甚效老僕試之亦騐二物同食害人向以能治此疾恐人脾胃不同非甚急不可輕試也慎㣲曰三洞要録云葱者菜之伯也能消金錫玉石神仙消金玉漿法于冬至日以壺盧盛葱汁及根埋廷中次年夏至發出盡化為水以法漬金玉銀青石各三分自消矣暴乾如飴食之可休糧亦曰金漿也附方舊四新二䘐血不止方見上金瘡出血不止取葱炙熱挼汁塗之即止師梅方火熖丹毒從頭起者生葱汁塗之痔瘻作痛葱涎白蜜和塗之先以木鱉子煎湯熏洗其冷如水即效一人苦此早間用之午刻即安也唐仲舉方解鉤吻毒面青口噤欲死以葱涕啖之即解千金鬚主治通氣孟詵療飽食房勞血滲入大腸便血腸澼成痔口乾研末每服二錢温酒下時珍附方舊一㗋中腫塞氣不通者葱鬚隂乾為末每用二錢入蒲州膽礬末一錢和勻每用一字吹之杜壬方花主治心脾痛如錐刀刺腹脹用一升同呉茱萸一升水八合煎七合去滓分三服立效頌亮出崔元方實氣味辛大温無毒主治明目補中氣不足本經温中益精日華宜肺歸頭思邈附方舊一眼暗補中葱子半升為末每取一匙煎湯一升半去滓入米煮粥食之亦可為末蜜丸梧子大食後米湯服一二十丸日三服食醫心鏡茖葱音格千金釋名山葱集解保昇曰茖葱生山谷不入藥用頌曰爾雅云茖山葱也說文云茖葱生山中細莖大葉食之香美於常葱宜入藥用時珍曰茖葱野葱也山原平地皆有之生沙地者名沙葱生水澤者名水葱野人皆食之開白花結子如小葱頭世俗不察胡葱即蒜葱誤指此為胡葱詳見胡葱下保昇言不入藥用蘇頌言入藥宜用山葱胡葱今攷思邈千金食性自有茖葱功用而諸本失收今採補之氣味辛微温無毒時珍曰佛家以茖葱為五葷之一見蒜下主治除瘴氣惡毒久食强志益膽氣思邈主諸惡蛓狐尿刺毒山溪中沙蝨射工等毒煮汁浸或擣𫝊大效亦兼小蒜茱萸輩不獨用也蘇恭子氣味同葱主治洩精思邈胡葱宋開寶釋名蒜葱綱目回回葱時珍曰按孫真人食忌作葫葱因其根似葫蒜故也俗稱蒜葱正合此義元人飲膳正要作回回葱似言其來自胡地故曰胡葱耳集解詵曰胡葱生蜀郡山谷狀似大蒜而小形圓皮赤稍長而銳五月六月採保昇曰葱凡四種冬葱夏枯漢葱冬枯胡葱莖葉粗短根若金燈茖葱生于山谷頌曰胡葱類食葱而根莖皆細白或云根莖微短如金燈或云似大蒜而小皮赤而銳時珍曰胡葱即蒜葱也孟詵韓保昇所說是矣非野葱也野葱名茖葱似葱而小胡葱乃人種蒔八月下種五月收取葉似葱而根似蒜其味如薤不甚􅆨江西有水晶葱蒜根葱葉葢其類也李廷飛延夀書言胡葱即藠子蓋因相似而誤爾今俗皆以野葱為胡葱因不識蒜葱故指茖葱為之謬矣修治斆曰凡採得依紋擘碎用緑梅子相對拌蒸一伏時去梅子砂盆中研如膏瓦器晒乾用氣味辛温無毒時珍曰生則辛平熟則甘温詵曰亦是薰物乆食傷神損性令人多㤀損目明絕血脈發痼疾患胡臭䘌齒人食之轉甚思邈曰四月勿食葫葱令人氣喘多驚主治温中下氣消穀能食殺蟲利五臟不足氣孟詵療腫毒保昇發明時珍曰方術煮溪澗白石為糧及煮牛馬驢骨令軟皆用胡葱則亦軟堅之物也陶𢎞景言葱能化五石消桂為水則是諸葱皆能軟石故今人採茖葱煮石謂之胡葱也附方新一身面浮腫小便不利喘急用胡葱十莖赤小豆三合消石一兩以水五升煮葱豆至熟同擂成膏每空心温酒服半匙聖惠方子主治中諸毒肉吐血不止萎黃悴者以一升水煮冷服半升日一夜一血定乃止孟詵薤音械經别録中釋名藠子音呌或作蕎者非莜子音釣火葱綱目菜芝别錄鴻薈音㑹時珍曰薤本文作䪥韭類也故字從韭從䪥音㮣諧聲也今人因其根白呼為藠子江南人訛為莜子其葉類葱而根如蒜收種宜火熏故俗人稱為火葱羅願云物莫美于芝故薤為菜芝蘇頌復附莜子於蒜條誤矣集解别録曰薤生魯山平澤恭曰薤是韭類葉類韭而闊多白而無實有赤白二種白者甜而美赤者苦而無味頌曰薤處處有之春秋分蒔至冬葉枯爾雅云葝山薤也生山中莖葉與家薤相類而根差長葉差大僅若鹿葱體性亦與家薤同今人少用宗奭曰薤葉如金燈葉差狹而更光皎古人言薤露者以其光滑難竚之義時珍曰薤八月栽根正月分蒔宜肥壤數枝一本則茂而根大葉狀似韭韭葉中實而背有劍春薤葉中空似細葱葉而有稜氣亦如葱秋月開細花紫白色根如小蒜一本數顆相依而生五月葉青則掘之否則肉不滿也其根煮食芼酒糟藏醋浸皆宜故内則云切葱薤實諸醯以柔之白樂天詩云酥暖薤白酒謂以酥炒薤白投酒中也一種水晶葱葱葉蒜根與薤相似不臭亦其類也按王禎農書云野薤俗名天薤生麥原中葉似薤而小味益辛亦可供食但不多有即爾雅山薤是也薤白氣味辛苦温滑無毒好古曰入手陽明經頌曰薤宜去青留白白冷而青熱也詵曰發熱病不宜多食三四月勿食生者大明曰生食引涕唾不可與牛肉同食令人作癥瘕主治金瘡瘡敗輕身不饑耐老本經歸骨除寒熱去水氣温中散結氣作羮食利病人諸瘡中風寒水氣腫痛擣塗之别錄煮食耐寒調中補不足止久痢冷瀉肥健人日華治洩痢下重能泄下焦陽明氣滯李杲好古曰下重者氣滯也四逆散加此以泄氣滯治少隂病厥逆洩痢及胸痺刺痛下氣散血安胎時珍心病宜食之利産婦思邈治女人帶下赤白作羮食之骨哽在咽不去者食之即下孟詵補虚解毒蘓頌白者補益赤者療金瘡及風生􅡌肉蘓恭與蜜同擣塗湯火傷甚速宗奭温補助陽道時珍發明𢎞景曰薤性温補仙方及服食家皆須之偏入諸膏用不可生噉葷辛為忌詵曰薤白色者最好雖有辛不葷五臟學道人長服之可通神安䰟􅅎益氣續筋力頌曰白薤之白性冷而補又曰莜子煮與蓐婦飲易産亦主脚氣時珍曰薤味辛氣温諸家言其温補而蘓頌圖經獨謂其冷補按杜甫薤詩云束比青芻色圓齊玉筯頭衰年關膈冷味暖併無憂亦言其温補與經文相合則冷補之說蓋不然也又按王禎云薤生則氣辛熟則甘美種之不蠧食之有益故學道人資之老人宜之然道家以薤為五葷之一而諸氏言其不葷何耶薛用弱齊諧志云安陸郭坦兄得天行病後遂能大餐每日食至一斛五年家貧行乞一日大饑至一園食薤一畦大蒜一畦便悶極卧地吐一物如籠漸漸縮小有人撮飯於上即消成水而病尋瘳也按此亦薤散結蒜消癥之騐也宗奭曰薤葉光滑露亦難竚千金治肺氣喘急方中用之亦取其滑泄之義附方舊十五新八胸痺刺痛張仲景栝樓薤白湯治胸痺痛徹心背喘息欬唾短氣㗋中燥痒寸脉沈遲關脉弦數不治殺人用栝樓實一枚薤白半斤白酒七升煮二升分二服千金治胸痺半夏薤白湯用薤白四兩半夏一合枳實半兩生薑一兩栝樓實半枚㕮咀以白胾漿三升煮一升温服日三汁肘後治胸痛瘥而復發薤根五升擣飲之立瘥酨音在酢漿也卒中惡死卒死或先病或平居寢臥奄忽而死皆是中惡以薤汁灌入鼻中便省肘後霍亂乾嘔不止者以薤一虎口以水三升煮取一半頓服不過三作即已韋宙獨行方奔豚氣痛薤白擣汁飲之後肘方赤痢不止薤同黄蘗煮汁服之陳藏器赤白痢下薤白一握同米煮粥日食之鏡食醫心小兒疳痢薤白生擣如泥以粳米粉和蜜作餅炙熟與食不過三兩服楊氏産乳産後諸痢多煮薤白食仍以羊腎脂同炒食之范汪方妊娠胎動腹内冷痛薤白一升當歸四兩水五升煮二升分三服古今錄騐鬱肉脯毒杵薤汁服二三升良洪葛方瘡犯惡露甚者殺人薤白擣爛以帛褁煨熟去帛傅之冷即易換亦可擣作餅以艾灸之熱氣入瘡水出即瘥也梅師方手指赤色隨月生死以生薤一把苦酒煮熟擣爛塗之愈乃止肘後方疥瘡痛癢煮薤葉擣爛塗之同上灸瘡腫痛薤白一升猪脂一斤切以苦酒浸一宿微火煎三上三下去滓塗之梅師方手足瘑瘡生薤一把以熱醋投入以封瘡上取效千金毒蛇螫傷薤白擣傅徐玉方虎犬咬傷薤白擣汁飲之并塗之日三服瘥乃止葛洪方諸魚骨哽薤白嚼柔以繩繫中吞到哽處引之即出同上誤吞􅁫鐶取薤白曝萎煮熟切食一大束􅁫即隨出葛洪方目中風翳作痛取薤白截斷安膜上令遍痛作復為之范汪方咽㗋腫痛薤根醋擣傅腫處冷即易之聖惠附錄蓼蕎拾遺藏器曰味辛温無毒主霍亂腹冷脹滿冷氣攻擊腹滿不調産後血攻胸膈刺痛煮服之生平澤其苗如葱韭時珍曰此亦山薤之類方名不同耳蒜别録下品釋名小蒜别録茆蒜音卯葷菜時珍曰蒜字從祘音蒜諧聲也又象蒜根之形中國初惟有此後因漢人得胡蒜於西域遂呼此為小蒜以别之故伏候古今注云蒜茆蒜也俗謂之小蒜胡國有蒜十子一株名曰胡蒜俗謂之大蒜是矣蒜乃五葷之一故許氏說文謂之葷菜五葷即五辛謂其辛臭昬神伐性也練形家以小蒜大蒜韭芸薹胡荽為五葷道家以韭薤蒜芸薹胡荽為五葷佛家以大蒜小蒜興渠慈葱茖葱為五葷興渠即阿魏也雖各不同然皆辛熏之物生食増恚熟食發媱有損性霛故絕之也集解别録曰蒜小蒜也五月五日採之𢎞景曰小蒜生葉時可煮和食至五月葉枯取根名薍子正爾噉之亦甚熏臭保昇曰小蒜野生處處有之小者一名薍音亂一名蒿音力苗葉根子皆似葫而細數倍也爾雅云蒚山蒜也說文云蒜葷菜也菜之美者雲夢之葷生山中者名蒚頌曰本草謂大蒜為葫小蒜為蒜而說文所謂葷菜者乃大蒜也蒚即小蒜也書傳載物之别名不同如此用藥不可不審宗奭曰小蒜即蒚也苗如葱釙根白大者如烏芋子兼根煮食謂之宅蒜時珍曰家蒜有二種根莖俱小而瓣少辣甚者蒜也小蒜也根莖俱大而瓣多辛而帶甘者葫也大蒜也按孫炎爾雅正義云帝登蒚山遭蕕芋毒將死得蒜囓食乃解遂收植之能殺腥羶蟲魚之毒又孫愐唐韻云張騫使西域始得大蒜種歸據此則小蒜之種自蒚移栽從古已有故爾雅以蒚為山蒜所以别家蒜也大蒜之種自胡地移來至漢始有故别録以葫為大蒜所以見中國之蒜小也乂王禎農書云一種澤蒜最易滋蔓隨劚隨合熟時採子漫散種之呉人調鼎多用此根作葅更勝葱韭也按此正别録所謂小蒜是也其始自野澤移來故有澤名而冦氏誤作宅字矣諸家皆以野生山蒜澤蒜解家蒔之小蒜皆失於詳攷小蒜雖出於蒚既經人力栽培則性氣不能不移故不得不辨蒜小蒜根也氣味辛温有小毒𢎞景曰味辛性熱損人不可長食思邈曰無毒三月勿乆食傷人志性黃帝書云同生魚食令人奪氣隂核疼瑞曰脚氣風病人及時病後忌食之主治歸脾腎主霍亂腹中不安消穀理胃温中除邪痺毒氣别錄主溪毒𢎞景下氣治蠱毒傅蛇蟲沙虱瘡日華恭曰此蒜與胡葱相得主惡蛓毒山溪中沙虱水毒大效山人狸獠時用之塗丁腫甚良孟詵葉主治心煩痛解諸毒小兒丹疹思邈發明頌曰古方多用小蒜治中冷霍亂煮汁飲之南齊褚澄治李道念雞瘕便瘥宗奭曰華佗用蒜虀即此蒜也時珍曰按李延夀南史云李道念病已五年丞相禇澄診之曰非冷非熱當是食白㵸雞子過多也取蒜一升煮食吐出一物涎裹視之乃雞雛翅足俱全澄曰未盡也更吐之凡十二枚而愈或以蒜字作蘓字者誤矣范曄後漢書云華佗見一人病噎食不得下令取餅店家蒜虀大可二升飲之立吐一蛇病者懸蛇于車造佗家見壁北縣蛇數十乃知其奇又夏子益奇疾方云人頭面上有光他人手近之如火熾者此中蠱也用蒜汁半兩和酒服之當吐出如蛇狀觀三書所載則蒜乃吐蠱要藥而後人鮮有知者附方舊七新七時氣温病初得頭痛壯熱脈大即以小蒜一升杵汁三合頓服不過再作便瘉方肘後霍亂脹滿不得吐下名乾霍亂小蒜一升水三升煮一升頓服肘後方霍亂轉筋入腹殺人以小蒜鹽各一兩擣傳臍中灸七壯立止聖濟録積年心痛不可忍不拘十年五年者隨手見効濃汁煮小蒜食飽勿著鹽曽用之有效再不發也兵部手集水毒中人一名中溪一名中溼一名水病似射工而無物初得惡寒頭目微疼旦醒暮劇手足逆冷三日則生虫食下不痒不痛過六七日虫食五臟注下不禁以小蒜三升煮微熱大熱即無力以浴身若身發赤斑文者毋以他病治之也肘後方射工中人成瘡者取蒜切片貼瘡上灸七壯千金止截瘧疾小蒜不拘多少研泥入黄丹少許丸如芡子大每服一丸面東新汲水下至妙唐慎微隂腫如刺汗出者小蒜一升韭根一升楊栁根二斤酒三升煎沸乘熱熏之永類方惡核腫結小蒜呉茱萸等分擣傅即散肘後五色丹毒無常及發足踝者杵蒜厚傅頻易葛氏小兒白秃頭上團團白色以蒜切日揩之子母祕録蛇蠍螫人小蒜擣汁服以滓傅之肘後蜈蚣咬瘡嚼小蒜塗之良肘後方蚰蜒入耳小蒜洗淨擣汁滴之未出再滴李絳兵部手集山蒜拾遺釋名蒚音歴澤蒜集解頌曰江南一種山蒜似大蒜而臭藏器曰澤蒜根如小蒜葉如韭又生石間者名石蒜與蒜無異時珍曰山蒜澤蒜石蒜同一物也但分生于山澤石間不同耳人間栽蒔小蒜始自三種移成故猶有澤蒜之稱爾雅云蒚山蒜也今京口有蒜山産蒜是也處處有之不獨江南又吕忱字林云􅀢水中蒜也則蒜不但産于山而又産于水也别有山慈姑水仙花老鴉蒜石蒜之類根葉皆佀蒜而不可食其花亦異並見草部下氣味辛温無毒主治山蒜治積塊及婦人血瘕用苦醋磨傅多效蘓頌澤蒜石蒜並温補下氣滑水源藏器葫别錄下品釋名大蒜𢎞景葷菜𢎞景曰今人謂葫為大蒜蒜為小蒜以其氣類相似也時珍曰按孫愐唐韻云張騫使西域始得大蒜葫荽則小蒜乃葷中土舊有而大蒜出胡地故有胡名二蒜皆屬五故通可稱葷詳見蒜下集解别録曰蒜大蒜也五月五日採獨子者入藥尤佳保昇曰葫出梁州者大徑二寸最美少辛涇陽者皮亦甚辣頌曰今處處園圃種之每顆六七瓣初種一瓣當年便成獨子葫至明年則復其本矣其花中有實亦作葫瓣狀而極小亦可種之時珍曰大小二蒜皆八月種春食苗夏初食薹五月食根秋月收種北人不可一日無者也氣味辛温有毒乆食損人目𢎞景曰性最熏臭不可食俗人作虀以噉鱠肉損性伐命莫此之甚惟可生食不中煮也恭曰此物煮羮臛為􅄿中之俊而陶云不中煮當是未經試耳藏器曰初食不利目多食却明乆食令人血清使毛髮白時珍曰久食傷肝損眼故嵇康養生論云葷辛害目此為甚耳今北人嗜蒜宿炕故盲瞽最多陳氏乃云多食明目與别錄相左何耶震亨曰大蒜屬火性熱喜散快膈善化肉暑月人多食之傷氣之禍積久自見養生者忌之化肉之功不足論也頌曰多食傷肺傷脾傷肝膽生痰助火昬神思邈曰四月八月食葫傷神令人喘悸口味多爽多食生葫行房傷肝氣令人面無色生葫合青魚鮓食令人腹内生瘡腸中腫又成疝瘕發黄疾合蜜食殺人凡服一切補藥不可食之主治歸五臟散癰腫􅉶瘡除風邪殺毒氣别録下氣消穀化肉蘓恭去水惡痒氣除風濕破冷氣爛痃癖伏邪惡宣通温補療瘡癬殺鬼去痛藏器健脾胃治腎氣止霍亂轉筋腹痛除邪祟解温疫療勞瘧冷風傳風損冷痛惡瘡蛇蟲蠱毒溪毒沙蝨並擣貼之熟醋浸經年者良日華温水擣爛服治中暑不醒擣貼足心止鼻䘐不止和豆豉丸服治暴下血通水道宗奭擣汁飲治吐血心痛煮汁飲治角弓反張同鯽魚丸治膈氣同蛤粉丸治水腫同黃丹丸治痢瘧孕痢同乳香丸治腹痛擣膏敷臍能達下焦消水利大小便貼足心能引熱下行治泄瀉暴痢及乾濕霍亂止䘐血納肛中能通幽門治關格不通時珍發明宗奭曰葫氣極葷置臭肉中反能掩臭凡中暑毒人爛嚼三兩瓣温水送之下咽即知但禁飲冷水又鼻衂不止者擣貼足心衂止即拭去時珍曰葫蒜入太隂陽明其氣薫烈能通五臟達諸竅去寒濕辟邪惡消􅏴腫化癥積肉食此其功也故王禎稱之云味久不變可以資生可以致逺化臭腐為神奇調鼎俎代醢醬携之旅塗則炎風瘴雨不能加食不餲腊毒不能害夏月食之解暑氣北方食肉麫尤可無乃食經之上品日用之多助者也蓋不知其辛能散氣熱能助火傷肺損目昬神伐性之害荏苒受之而不悟也嘗有一婦衂血一晝夜不止諸治不効時珍令以蒜傅足心即時血止真奇方也又葉石林避暑録云一僕暑月馳馬忽仆地欲絕同食王相教用大蒜及道上熱土各一握硏爛以新汲水一琖和取汁决齒灌之少頃即甦相傳徐州市門忽有版書此方咸以為神仙救人云藏器曰昔有患痃癖者夢人教每日食大蒜三顆初服遂至􅉂眩吐逆下部如火後有人教取數片合皮截却兩頭吞之名曰内灸果獲大效也頌曰經言葫散癰腫按李絳兵部手集方云毒瘡腫毒號呌臥眠不得人不能别者取獨頭蒜兩顆擣爛蔴油和厚𫝊瘡上乾即易之屢用救人無不神效盧坦侍郎肩上瘡作連心痛悶用此便瘥又李僕射患腦癰乆不瘥盧與此方亦瘥又葛洪肘後方云凡背腫取獨顆蒜横截一分安腫頭上炷艾如梧子大灸蒜百壯不覺漸消多灸為善勿令大熱若覺痛即孽起蒜蒜焦更換新者勿令損皮肉洪嘗苦小腹下患一大腫灸之亦瘥數用灸人無不應效又江寧府紫極宫刻石記其事云但是發背及癰疽惡瘡腫核初起有異皆可灸之不計壯數惟要痛者灸至不痛不痛者灸至痛極而止疣贅之類灸之亦便成痂自脫其效如神乃知方書無空言者但人不能以意詳審則不得盡應耳時珍曰按李迅論蒜錢灸法云癰疽之發著灸勝于用藥緣熱毒中鬲上下不通必得毒氣發洩然後解散凡初發一日之内便用大獨頭蒜切如小錢厚貼頂上灸之三壯一易大㮣以百壯為率一使瘡不開大二使内肉不壞三瘡口易合一舉而三得之但頭及項以上切不可用此恐引氣上更生大禍也又史源記蒜灸之功云母氏背痺作痒有赤暈半寸白粒如黍灸二七壯其赤隨消信宿有赤流下長二寸舉家歸咎于灸外醫用膏䕶之日増一暈二十二日横斜約六七寸痛楚不勝或言一尼病此得灸而愈子奔問之尼云劇時昬不知人但問范奉議坐守灸八百餘壯方甦約艾一篩子亟歸以炷如銀杏大灸十數殊不覺乃灸四旁赤處皆痛每一壯燼則赤隨縮入三十餘壯赤暈收退蓋灸遲則初發處肉已壤故不痛直待灸到好肉方痛也至夜則火焮滿背瘡髙阜而熱夜得安寢矣至曉如覆一甌髙三四寸上有百數小竅色正黒調理而安蓋髙阜者毒外出也小竅多毒不聚也色正黑皮肉壞也非艾火出其毒於壞肉之裏則内逼五臟而危矣庸醫𫝊貼凉冷消散之說何可信哉附方舊十六新三十一背瘡灸法凡覺背上腫硬疼痛用濕紙貼尋瘡頭用大蒜十顆淡䜴半合乳香一錢細研隨瘡頭大小用竹片作圈圍定填藥於内二分厚著艾灸之痛灸至痒痒灸至痛以百壯為率與蒜錢灸法同功外科精要疔腫惡毒用門臼灰一撮羅細以獨蒜或新蒜薹染灰擦瘡口候瘡自然出少汗再擦少頃即消散也雖發背癰腫亦可擦之五色丹毒無常色及發足踝者擣蒜厚傳乾即易之肘後方關格脹滿大小便不通獨頭蒜燒熟去皮綿褁納下部氣立通也外臺祕要乾濕霍亂轉筋用大蒜擣塗足心立愈永類鈐方水氣腫滿大蒜田螺車前子等分熬膏攤貼臍中水從便漩而下數日即愈象山民人患水腫一卜者傳此用之有效仇逺稗史山嵐瘴氣生熟大蒜各七片共食之少頃腹嗚或吐血或大便泄即愈用攝生妙方瘧疾寒熱肘後用獨頭蒜炭上燒之酒服方寸匕簡便用桃仁半片放内關穴上將獨蒜擣爛罨之縳住男左女右即止隣嫗用此治人屢效普濟方端午日取獨頭蒜煨熟入礬紅等分擣丸芡子大每白湯嚼下一丸寒瘧冷痢端午日以獨頭蒜十箇黄丹二錢擣丸梧子大每服九丸長流水下甚妙普濟方泄瀉暴痢大蒜擣貼兩足心亦可貼臍中千金方下痢禁口及小兒泄痢方並同上腸毒下血蒜連丸用獨蒜煨擣和黄連末為丸日日米湯服之濟生方暴下血病用葫蒜五七枚去皮研膏入豆䜴擣丸梧子大每米飲下五六十丸無不愈者寇宗奭本草衍義鼻血不止服藥不應用蒜一枚去皮研如泥作錢大餅子厚一豆許左鼻血出貼左足心右鼻血出貼右足心兩鼻俱出俱貼之立瘥簡要濟衆方血逆心痛生蒜擣汁服二升即愈肘後鬼疰腹痛不可忍者獨頭蒜一枚香墨如棗大擣和醬汁一合頓服永類鈐方心腹冷痛法醋浸至二三年蒜食至數顆其效如神湖李時珍瀕集簡方夜啼腹痛面青冷證也用大蒜一枚煨研日乾乳香五分擣丸芥子大每服七丸乳汁下危氏得效方寒濕氣痛端午日收獨蒜同辰粉擣塗之唐珤經騐方鬼毒風氣獨頭蒜一枚和雄黄杏仁研為丸空腹飲下三丸静坐少時當下毛出即安孟詵食療本草狗咽氣塞喘息不通須臾欲絕用獨頭蒜二枚削去兩頭塞鼻中左患塞右右患塞左候口中膿血出立效聖惠㗋痺腫痛大蒜塞耳鼻中日二易之肘後方魚骨哽咽獨頭蒜塞鼻中自出千便良方牙齒疼痛獨頭蒜煨熟切熨痛處轉易之亦主蟲痛外臺祕要睂毛動揺目不能交睫喚之不應但能飲食用蒜三兩杵汁調酒飲即愈夏子益奇疾方腦瀉鼻淵大蒜切片貼足心取效止摘𤣥方頭風苦痛易簡方用大蒜研汁㗜鼻中地聖濟録用大蒜七箇去皮先燒紅地以蒜逐箇于上磨成膏子却以僵蠶一兩去頭足安蒜上碗覆一夜勿令透氣只取蠶硏末㗜入鼻中口内含水甚效小兒驚風總録方同上小兒臍風獨頭蒜切片安臍上以艾灸之口中有蒜氣即止黎居士簡易方小兒氣淋宋寧宗為郡王時病淋日夜凡三百起國醫㒺措或舉孫琳治之琳用大蒜淡豆䜴蒸餅三物擣丸令以温水下三十丸曰今日進三服病當減三之一明日亦然三日病除已而果然賜以千緡或問其說琳曰小兒何縁有淋只是水道不利三物皆能通利故也愛竹翁談藪產後中風角弓反張不語用大蒜三十瓣以水三升煮一升灌之即甦張傑子母祕録金瘡中風角弓反張取蒜一升去心無灰酒四升煮極爛并滓服之須臾得汗即瘥外臺祕要婦人隂腫作痒蒜湯洗之効乃止永類鈐方隂汗作痒大蒜淡䜴擣丸梧子大硃砂為衣每空腹燈心湯下三十丸小便淋瀝或有或無用大蒜一箇紙包煨熟露一夜空心新水送下朱氏集騐方小兒白秃團團然切蒜日日揩之祕録閉口椒毒氣閉欲絕者煮蒜食之張仲景方射工溪毒獨頭蒜切三分厚貼上灸之令蒜氣射入即瘥梅師方蜈蝎螫傷獨頭蒜摩之即止梅師蛇虺螫傷孟詵曰即時嚼蒜封之六七易仍以蒜一升去皮以乳二升煮熟空心頓服明日又進外以去皮蒜一升𢷬細小便一升煮三四沸浸損處梅師用獨頭蒜酸草擣絞傅咬處脚肚轉筋大蒜擦足心令熱即安仍以冷水食一瓣攝生方食蟹中毒乾蒜煮汁飲之集騐方蛇瘕面光發熱如火炙人飲蒜汁一盌吐出如蛇狀即安危氏方五辛菜拾遺集解時珍曰五辛菜乃元旦立春以葱蒜韭蓼蒿芥辛嫩之菜雜和食之取迎新之義謂之五辛盤杜甫詩所謂春日春盤細生菜是矣氣味辛温無毒時珍曰熱病後食多損目主治歲朝食之助發五臟氣常食温中去惡氣消食下氣藏器蕓薹唐本草釋名寒菜胡居士方胡菜同上薹菜埤雅薹芥沛志油菜綱目曰時珍此菜易起薹須採其薹食則分枝必多故名蕓薹而淮人謂之薹芥即今油菜為其子可榨油也羌隴氐胡其地苦寒冬月多種此菜能歴霜雪種自胡來故服䖍通俗文謂之胡菜而胡洽居士百病方謂之寒菜皆取此義也或云塞外有地名雲臺戌始種此菜故名亦通集解恭曰别録云蕓薹乃人間所噉菜也宗奭曰蕓薹不甚香經冬根不死辟蠧於諸菜中亦不甚佳時珍曰蕓薹方藥多用諸家註亦不明令人不識為何菜珍訪考之乃今油菜也九月十月下種生葉形色微似白菜冬春採薹心為茹三月則老不可食開小黄花四瓣如芥花結莢收子亦如芥子灰赤色炒過榨油黃色燃燈甚明食之不及蔴油近人因有油利種者亦廣云莖葉氣味辛温無毒大明曰凉别録曰春月食之能發膝痼疾詵曰先患腰脚者不可多食食之加劇又損陽氣發瘡及口齒病胡臭人不可食又能生腹中諸蟲道家特忌以為五葷之一主治風遊丹腫乳癰唐本草破癥瘕結血開寳治産後血風及瘀血日華煮食治腰脚痺擣葉傅女人吹奶藏器治瘭疽豌豆瘡散血消腫伏蓬砂時珍發明藏器曰蕓薹破血故産婦宜食之馬志曰今俗方言病人得喫蕓薹是宜血病也思邈曰貞觀七年三月予在内江縣飲多至夜覺四體骨肉疼痛至曉頭痛額角有丹如彈丸腫痛至午通腫目不能開經日幾斃予思本草蕓薹治風遊丹腫遂取葉擣傳隨手即消其騐如神也亦可擣汁服之附方新八赤火丹毒方見上天火熱瘡初起似疿漸如水泡似火燒瘡赤色急速能殺人蕓薹葉擣汁調大黄芒消生鐵衣等分塗之近效方風熱腫毒蕓薹苗葉根蔓菁根各三兩為末以雞子清和貼之即消無蔓菁即以商陸根代之甚効也近效方手足瘭疽此疽喜著手足肩背累累如赤豆剝之汁出用蕓薹葉煮汁服一升并食乾熟菜數頓少與鹽醬冬月用子研水服千金方異疽似癰而小有異膿如小豆汁今日去明日滿用蕓薹擣熟布袋盛於熱灰中煨熟更互熨之不過三二度無葉用乾者千金豌豆斑瘡蕓薹葉煎湯洗之外臺祕要血痢腹痛日夜不止以蕓薹葉擣汁二合入蜜一合温服聖惠方腸風下血同上子氣味辛温無毒主治夢中洩精與鬼交思邈取油傅頭令髪長黑藏器行滯血破冷氣消腫散結治産難産後心腹諸疾赤丹熱腫金瘡血痔時珍發明時珍曰蕓薹菜子葉同功其味辛氣温能温能散其用長於行血滯破結氣故古方消腫散結治産後一切心腹氣血痛諸遊風丹毒熱腫瘡痔諸藥咸用之經水行後加入四物湯服之云能斷産又治小兒驚風貼其頂􅇟則引氣上出也婦人方治産難歌云黃金花結粟米實細研酒下十五粒靈丹功效妙如神難産之時能救急附方新十二蕓薹散治産後惡露不下血結衝心刺痛將來纔遇胃寒踏冷其血必往來心腹間刺痛不可忍謂之血母并治産後心腹諸疾産後三日不可無此用蕓薹子炒當歸桂心赤芍藥等分每酒服二錢趕下惡物楊氏産乳産後血運蕓薹子生地黄等分為末每服三錢薑七片酒水各半盞童便半盞煎七分温服即甦温隠居海上方補血破氣追氣丸治婦人血刺小腹痛不可忍亦可常服補血虚破氣塊甚效用蕓薹子微炒桂心各一兩髙良薑半兩為末醋糊丸梧子大每淡醋湯下五丸沈存中靈苑方腸風臟毒下血蕓薹子生用甘草炙為末每服二錢水煎服之普濟方頭風作痛蕓薹子一分大黃三分為末㗜鼻風熱牙痛蕓薹子白芥子角茴香等分為末㗜鼻左㗜右右㗜左聖惠小兒天釣蕓薹子生烏頭去皮尖各二錢為末每用一錢水調塗頂上名塗頂散聖濟總録風瘡不愈陳菜子油同穿山甲末熬成膏塗之即愈攝生衆妙方熱癤腫毒蕓薹子狗頭骨等分為末醋和傅之千金方傷損接骨蕓薹子一兩小茴香炒二合龍骨少許為末醋調成膏攤紙上貼之乾坤祕韞湯火傷灼菜子油調蚯蚓屎搽之楊起簡便單方蜈蚣螫傷菜子油傾地上擦地上油摻之即好勿令四眼人見陸氏積徳堂方菘别錄上品釋名白菜時珍曰按陸佃埤雅云菘性凌冬晚凋四時常見有松之操故曰菘今俗謂之白菜其色青白也集解𢎞景曰菘有數種猶是一類止論其美與不美菜中最為常食宗奭曰菘葉如蕪菁綠色差淡其味微苦葉嫩稍闊頌曰揚州一種菘葉圓而大或若箑啖之無渣絕勝他上者疑即牛肚菘也時珍曰菘即今人呼為白菜者有二種一種莖圓厚微青一種莖扁薄而白其葉皆淡青白色燕趙遼陽揚州所種者最肥大而厚一本有重十餘斤者南方之菘畦内過冬北方者多入窖内燕京圃人又以馬糞入窖壅培不見風日長出苗葉皆嫩黃色脆美無滓謂之黃芽菜豪貴以為嘉品蓋亦倣韭黄之法也菘子如蕓薹子而色灰黒八月以後種之二月開黃花如芥花四瓣三月結角亦如芥其菜作葅食尤良不宜蒸晒正誤恭曰菘有三種牛肚菘葉最大厚味甘紫菘葉薄細味少苦白菘似蔓菁也菘菜不生北土有人將子北種初一年即半為蕪菁二年菘種都絕將蕪菁子南種亦二年都變土地所宜如此頌曰菘南北皆有之與蔓菁相類梗長葉不光者為蕪菁梗短葉闊厚而肥痺者為菘舊說北上無菘今京洛種菘都類南種但肥厚差不及爾機曰蔓菁菘菜恐是一種但在南土葉高而大者為菘秋冬有之在北土葉短而小者為蔓菁春夏有之即時珍曰白菘即白菜也牛肚菘即最肥大者紫菘蘆菔也開紫花故曰紫菘蘓恭謂白菘似蔓菁者誤矣根葉俱不同而白菘根堅小不可食又言南北變種者蓋指蔓菁紫菘而言紫菘根似蔓菁而葉不同種類亦别又言北土無菘者自唐以前或然近則白菘紫菘南北通有惟南土不種蔓菁種之亦易生也蘓頌漫為兩可之言汪機妄起臆斷之辨俱屬謬誤今悉正之莖葉氣味甘温無毒大明曰凉微毒多食發皮膚風瘙痒詵曰發風冷内虚人不可食有熱人食亦不發病性冷可知本草言性温未解其意𢎞景曰性和利人多食似小冷張仲景言藥中有甘草食菘即令病不除也頌曰有小毒不可食多多則以生薑解之瑞曰夏至前食發氣動疾有足疾者忌之時珍曰氣虚胃冷人多食惡心吐沫氣壯人則相宜主治通利腸胃除胸中煩解酒渇别録消食下氣治瘴氣止熱氣嗽冬汁尤佳蕭炳和中利大小便甯原附方舊一新二小兒赤遊行於上下至心即死菘菜擣傅之即止張傑子母祕録漆毒生瘡白菘菜擣爛塗之飛絲入目白菜揉爛帕包滴汁三二㸃入目即出普濟方子氣味甘平無毒主治作油塗頭長髪塗刀劍不鏥音秀𢎞景附方舊一酒醉不醒菘菜子二合細研井華水一盞調為二服聖惠方芥别録上品釋名時珍曰按王安石字說云芥者界也發汗散氣界我者也王禎農書云其氣味辛烈菜中之介然者食之有剛介之象故字從介集解𢎞景曰芥似菘而有毛味辣可生食及作葅其子可以藏冬𤓰又有莨音郎作葅甚辣恭曰芥有三種葉大子麤者葉可食子入藥用葉小子細者葉不堪食子但作虀又有白芥子粗大白色如白粱米甚辛美從西戎來頌曰芥處處有之有青芥似菘有毛味極辣紫芥莖葉純紫可愛作虀最美有白芥見本條其餘南芥旋芥花芥石芥之類皆菜茹之美者不能悉録大抵南土多芥相傳嶺南無蕪菁有人擕種至彼種之皆變作芥地氣使然耳時珍曰芥有數種青芥又名刺芥似白菘有柔毛有大芥亦名皺葉芥大葉皺紋色尤深綠味更辛辣二芥宜入藥用有馬芥葉如青芥有花芥葉多缺刻如蘿蔔英有紫芥莖葉皆紫如蘓有石芥低小皆以八九月下種冬月食者俗呼臘菜春月食者俗呼春菜四月食者謂之夏芥芥心嫩薹謂之芥藍㵸食脆美其花三月開黃色四出結莢一二寸子大如蘓子而色紫味辛研末泡過為芥醬以侑肉食辛香可愛劉恂嶺南異物志云南土芥髙五六尺子大如雞子此又芥之異者也莖葉氣味辛温無毒詵曰煮食動氣與風生食發丹石不可多食大葉者良細葉有毛者害人甯源曰有瘡瘍痔疾便血者忌之思邈曰同兎肉食成惡邪病同鯽魚食發水腫主治歸鼻除腎經邪氣利九竅明耳目安中久食温中别録止欬嗽上氣除冷氣日華主欬逆下氣去頭面風孟詵通肺豁痰利膈開胃時珍發明時珍曰芥性辛熱而散故能通肺開胃利氣豁痰久食則積温成熱辛散太盛耗人真元肝木受病昬人眼目發人瘡痔而别録謂其能明耳目者蓋知暫時之快而不知積久之害也素問云辛走氣氣病無多食辛多則肉胝而唇褰此類是矣陸佃云望梅生津食芥墮淚五液之自外至也慕而涎垂媿而汗出五液之自内生也附方新四牙齦腫爛出臭水者芥菜稈燒存性研末頻傅之即愈飛絲入目青菜汁㸃之如神摘𤣥方漆瘡搔痒芥菜煎湯洗之千金方痔瘡腫痛芥葉擣餅頻坐之方談埜翁經效子氣味辛熱無毒時珍曰多食昬目動火洩氣傷精主治歸鼻去一切邪惡疰氣㗋痺𢎞景疰氣發無常處及射工毒丸服之或擣末醋和塗之隨手有騐蘇恭治風毒腫及麻痺醋研傅之撲損瘀血腰痛腎冷和生薑研塗貼之又治心痛酒調服之日華研末作醤食香美通利五臟孟詵研末水調塗頂􅇟止䘐血吳瑞温中散寒豁痰利竅治胃寒吐食肺寒欬嗽風冷氣痛口噤唇𦂳消散癰腫瘀血時珍發明時珍曰芥子功與菜同其味辛其氣散故能利九竅通經絡治口噤耳聾鼻䘐之證消瘀血癰腫痛痺之邪其性熱而温中故又能利氣豁痰治𠻳止吐主心腹諸痛白芥子辛烈更甚治病尤良見後本條附方舊五新十八感寒無汗水調芥子末填臍内以熱物隔衣熨之取汗出妙楊起簡便單方身體麻木芥菜子末醋調塗之濟生祕覧中風口噤舌本縮者用芥菜子一升研入醋二升煎一升傅頷頰下效聖惠方小兒唇𦂳用馬芥子擣汁曝濃揩破頻塗之方崔氏纂要喉痺腫痛芥子末水和傅喉下乾即易之又用辣芥子研末醋調取汁㸃入喉内待喉内鳴却用陳麻骨燒烟吸入立愈並聖惠方耳卒聾閉芥子末人乳汁和以綿褁塞之外臺祕要雀目不見真紫芥菜子炒黒為末用羊肝一具分作八服每用芥末三錢捻肝上笋籜褁定煮熟冷食以汁送下聖濟總錄目中翳膜芥子一粒輕手挼入眼中少頃以井華水雞子清洗之總錄眉毛不生芥菜子半夏等分為末生薑自然汁調搽數次即生方孫氏集效鬼疰勞氣芥子三升研末絹袋盛入三斗酒中七日温服一日三次濟廣方熱痰煩運方見白芥霍亂吐瀉芥子擣細水和傅臍上聖濟總錄反胃吐食芥子末酒服方寸匕日三服千金方上氣嘔吐芥子末蜜丸梧子大井華水寅時下七丸申時再服千金方臍下絞痛方同上腰脊脹痛芥子末調酒貼之立效方摘𤣥走注風毒作痛用小芥子末和雞子白塗之聖惠一切癰腫猪膽汁和芥子末貼之日三上猪脂亦可千金方癰腫熱毒家芥子末同柏葉擣塗無不愈者大騐得山芥更妙千金翼熱毒瘰癧小芥子末醋和貼之看消即止恐損肉肘後五種瘻疾芥子末以水蜜和傅乾即易之廣濟方射工中人有瘡用芥子末和酒厚塗之半日痛即止千金方婦人經閉不行至一年者臍腹痛腰腿沉重寒熱往來用芥子二兩為末每服二錢熱酒食前服仁存方隂證傷寒腹痛厥逆芥菜子研末水調貼臍上生生編白芥宋開寳附釋名胡芥蜀本草蜀芥時珍曰其種來自胡戎而盛於蜀故名集解恭曰白芥子粗大白色如白梁米甚辛美從戎中來藏器曰白芥生太原河東葉如芥而白為茹食之甚美保昇曰胡芥近道亦有之葉大子白且粗入藥及啖最佳而人間未多用之時珍曰白芥處處可種但人知蒔之者少爾以八九月下種冬生可食至春深莖高二三尺其葉花而有丫如花芥葉青白色莖易起而中空性脆最畏狂風大雪須謹護之乃免折損三月開黄花香郁結角如芥角其子大如梁未黄白色又有一種莖大而中實者尤高其子亦大此菜雖是芥類逈然别種也然入藥勝於芥子莖葉氣味辛温無毒時珍曰肘後方言熱病人不可食胡芥為其性暖也主治冷氣藏器安五臟功與芥同日華子氣味辛温無毒主治發汗主胸膈痰冷上氣面目黄赤又醋研傅射工毒别錄禦惡氣遁尸飛尸及暴風毒腫流四肢疼痛𢎞景燒烟及服辟邪魅日華藏器曰入鎮宅方用欬嗽胸脇支滿上氣多唾者每用温酒吞下七粒思邈利氣豁痰除寒暖中散腫止痛治喘嗽反胃痺木脚氣筋骨腰節諸痛時珍發明震亨曰痰在脇下及皮裏膜外非白芥子莫能芥達古方控涎丹用白芥子正此義也時珍曰白子辛能入肺温能發散故有利氣豁痰温中開胃散痛消腫辟惡之功按韓􅐂醫通云凡老人苦於痰氣喘嗽胸滿懶食不可妄投燥利之藥反耗真氣􅐂因人求治其親静中處三子養親湯治之隨試隨效蓋白芥子白色主痰下氣寛中紫蘇子紫色主氣定喘且嗽蘿蔔子白種者主食開痞䧏氣各微炒研破看所主為君每劑不過三四錢用生絹袋盛入煑湯飲之勿煎太過則味苦辣若大便素實者入蜜一匙冬月加薑一片尤良南陵未齋子有辭賛之附方舊一新八反胃上氣白芥子末酒服一二錢普濟方熱痰煩運白芥子黑芥子大㦸甘遂􅉭消硃砂等分為末糊丸梧子大每服二十丸薑湯下名白芥丸普濟冷痰痞滿黑芥子白芥子大㦸甘遂胡椒桂心等分為末糊丸梧子大每服十丸薑湯下名黒芥丸普濟方腹冷氣起白芥子一升微炒研末湯浸蒸餅丸小豆大每薑湯吞十丸甚妙續傳信方脚氣作痛方見白芷小兒乳癖白芥子研末水調攤膏貼之以平為期本草權度防痘入目白芥子末水調塗足心引毒歸下令瘡疹不入目全幼心鑑腫毒初起白芥子末醋調塗之瀕湖集簡方胸脇痰飲白芥子五錢白术一兩為末棗肉和搗丸梧子大每白湯服五十丸摘𤣥方蕪菁别錄上品釋名蔓菁唐本九英菘食療諸葛菜藏器曰蕪菁北人名蔓菁今并汾河朔間燒食其根呼為蕪根猶是蕪菁之號蕪菁南北之通稱也塞北河西種者名九英蔓菁亦曰九英菘根葉長大而味不美人以為軍糧禹錫曰爾雅云須薞蕪詩谷風云采葑采菲毛萇註云葑須也孫炎云葑一名葑蓯禮坊記云葑蔓菁也陳宋之間謂之葑陸璣云葑蕪菁也幽州人謂之芥郭璞云薞蕪似羊蹄葉細味酸可食揚雄方言云蘴蕘蔓菁也陳楚謂之豐齊魯謂之蕘闗西謂之蕪菁趙魏謂之大芥然則葑也須也蕪菁也蔓菁也薞蕪也蕘也芥也七者一物也時珍曰按孫愐云蔓蔓菁苖也其説甚通掌禹錫以薞蕪釋蔓菁陳藏器謂薞蕪是酸模當以陳説為優詳見草部酸模下劉禹錫嘉話錄云諸葛亮所止令兵士獨種蔓菁者取其纔出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易尋而採五也冬有根可食六也比諸蔬其利甚博至今蜀人呼為諸葛菜江陵亦然又朱輔山溪蠻叢笑云猫獠猺狫地方産馬王菜味澀多刺即諸葛菜也相傳馬殷所遺故名又䝉古人呼其根為沙吉木兒集解𢎞景曰别錄蕪菁蘆菔同條蘆菔是今温菘其根可食葉不中噉蕪菁根細於温菘而葉似菘好食西川惟種此其子與温菘甚相似而俗方無用惟服食家鍊餌之而不言蘆菔子恐不用也俗人蒸其根及作葅食但小薫臭爾恭曰蕪菁北人名蔓菁根葉及子皆是菘類與蘆菔全别體用亦殊陶言蕪菁似蘆菔蘆菔葉不堪食是江表不産二物理喪其真也菘子黑色蔓菁子紫赤色大小相似蘆菔子黄赤色而大數倍且不圓也大明曰蔓菁比蘆菔梗短而細葉大連地上生厚闊短肥而痺其色紅頌曰蕪菁南北皆有北土尤多四時常有春食苖夏食心亦謂之薹子秋食莖冬食根河朔多種以備飢歲莱中之最有益者惟此爾其子夏秋熟時採之宗奭曰蔓菁夏月則枯當此之時蔬圃復種謂之雞毛菜食心正在春時諸菜之中有益無損於世有功采擷之餘收子為油燃燈甚明西人食之河東太原所出其根極大他處不及也又出西畨吐谷渾地機曰葉是蔓菁根是蘆菔時珍曰别錄以蕪菁蘆菔同條遂致諸説猜度或以二物為一種或謂二物全别或謂在南為萊菔在北為蔓菁殊無定見今按二物根葉花子都别非一類也蔓菁是芥屬根長而白其味辛苦而短莖粗葉大而􅌋闊夏初起薹開黄花四出如芥結角亦如芥其子均圓似芥子而紫赤色蘆菔是菘屬根圓亦有長者有紅白二色其味辛甘而永葉不甚大而糙亦有花葉者夏初起薹開淡紫花結角如蟲狀腹大尾尖子似胡盧巴不均不圓黄赤色如此分之自明白矣其蔓菁六月種者根大而葉蠧八月種者葉美而根小惟七月初種者根葉俱良擬賣者純種九茨九英根大而味短削淨為葅甚佳今燕京人以瓶醃藏謂之閉甕菜根葉氣味苦温無毒時珍曰辛甘苦宗奭曰多食動氣主治利五臟輕身益氣可長食之别錄常食通中令人肥健蘇頌消食下氣治嗽止消渴去心腹冷痛及熱毒風腫乳癰妬乳寒熱孟詵發明詵曰九英菘出河西葉大根亦粗長和羊肉食甚美常食都不見發病冬日作葅煑羮食消宿食下氣治𠻳諸家商畧其性冷而本草云温恐誤也附方舊八新四預禳時疾立春後遇庚子日温蔓菁汁合家大小並服之不限多少一年可免時疾法神仙教子鼻中䘐血諸葛菜生擣汁飲千便良方大醉不堪連日病困者蔓菁菜入少米煮熟去滓冷飲之良肘後方飲酒辟氣乾蔓菁根二七枚蒸三遍碾末酒後水服二錢即無酒氣也千金一切腫毒生蔓菁根一握入鹽花少許同擣封之日三易之燒肘後方用蔓菁葉不中水者灰和臘猪脂封之丁腫有根用大鍼刺作孔削蔓菁根如鍼大染鐵生衣刺入孔中再以蔓菁根鐵生膩衣等分擣塗于上有膿出即易須臾根出立瘥忌油生冷五辛粘滑陳臭肘後方乳癰寒熱蔓菁根并葉去土不用水洗以鹽和擣塗之熱即换不過三五次即瘥冬月只用根此方已救十數人須避風李綘兵部手集女子妬乳生蔓菁根擣和鹽醋漿水煮汁洗之五六度良又方和雞子白封之亦妙食療隂腫如斗生蔓菁根擣封之治人所不能治者集療方豌豆斑瘡蔓菁根擣汁挑瘡破塗之三食頃根出矣肘後方犬咬傷瘡重發者用蔓菁根擣汁服之佳肘後小兒頭秃蕪菁葉燒灰和脂傅之千金飛絲入眼蔓菁菜揉爛帕包滴汁三兩㸃即出也普濟方子氣味苦辛平無毒主治明目别錄療黄疸利小便水煮汁服主癥􅛎積聚少少飲汁治霍亂心腹脹末服之主目暗為油入面膏去黒䵟皺文蘇恭和油傅蜘蛛咬藏器壓油塗頭能變蒜髪孟詵入丸藥服令人肥健尤宜婦人蕭炳發明藏器曰仙經言蔓菁子九蒸九曝擣末長服可斷穀長生蜘蛛咬者恐毒入内擣末酒服亦以油和傅之蔓菁園中無蜘蛛是其相畏也時珍曰蔓菁子可升可降能汗能吐能下能利小便又能明目解毒其功甚偉而世罕知用之何哉夏初采子炒過榨油同蔴油鍊熟一色無異西人多食之㸃燈甚明但烟亦損目北魏祖珽囚地窖中因蕪菁子油燈傷明即此也附方舊四新十八明目益氣蕪菁子一升水九升煮汁盡日乾如此三度研細水服方寸匕日三亦可研水和米煮粥食外臺祕要常服明目使人洞視膓腑用蕪菁子三升以苦酒三升煮熟日乾研篩末以井華水服方寸匕日三無所忌抱朴子云服盡一斗能夜視有所見物千金方青盲眼障但瞳子不壞者十得九愈用蔓菁子六升蒸之氣遍合甑取下以釡中熱湯淋之乃曝乾還淋如是三遍即收杵為末食上清酒服方寸匕日再服崔元亮海上方虚勞目暗方同上法普濟方補肝明目蕪菁子淘過一斤黄精二斤同和丸九蒸九晒為末每空心米飲服二錢日再服乾又方蔓菁子二升決明子一升和匀以酒五升煮曝為末每服二錢温水調下日二惠並聖風邪攻目視物不明肝氣虚者用蔓菁子四兩入甆瓶中燒黑無聲取出入蛇蜕二兩又燒成灰為末每服半錢食後酒下日三服聖濟總錄服食辟糓蕪菁子熟時采之水煑三過令苦味盡曝擣為末每服二錢温水下日三次久可辟􅂖蘇頌圖經本草黄汗染衣涕唾皆黄用蔓菁子擣末平日以井華水服一匙日再服加至兩匙以知為度每夜以帛浸小便逐日看之漸白則瘥不過五升已來也外臺秘要黄疸如金睛黄小便赤用生蔓菁子末熟水服方寸匕日三服孫真人食忌急黄黄疸及内黄腹結不通用蔓菁子擣末水絞汁服當時􅅉鼻中出黄水及下利則愈以子壓油每服一盞更佳陳藏器本草拾遺熱黄便結用蕪菁子擣末水和絞汁服少頃當瀉一切惡物沙石草髪並出孟詵食療本草二便闗格脹悶欲絶蔓菁子油一合空腹服之即通通後汗出勿怪聖惠方心腹作脹蔓菁子一大合揀淨擣爛水一升和研濾汁一盞頓服少頃自利或自吐或得汗即愈外臺秘要霍亂脹痛蕪菁子水煮汁飲之方瀕湖集簡妊娠溺澀蕪菁子末水服方寸匕日二服子母祕錄風􅇙入腹身體强舌乾硬用蔓菁子三兩為末每温酒服一錢聖惠方瘭疽發熱疽着手足肩背纍纍如米起色白刮之汁出復發熱用蕪菁子熟擣帛褁展轉其上日夜勿止肘後方骨疽不愈愈而復發骨從孔中出者蕪菁子擣傅之用帛褁定日一易之千金方小兒頭秃蔓菁子末和酢傅之一日三上千金方眉毛脱落蔓菁子四兩炒研醋和塗之聖惠面黶痣㸃蔓菁子研末入面脂中夜夜塗之亦去面皺聖惠方花氣味辛平無毒主治虚勞眼暗久服長生可夜讀書三月三日采花隂乾為末毎服二錢空心井華水下慎㣲萊菔音來北唐本草釋名蘆萉郭璞云蘆音羅萉音比與菔同蘿蔔音羅北雹突爾雅註紫花菘同上温菘同上土酥保昇曰萊菔俗名蘿蔔按爾雅云突蘆萉孫炎註云紫花菘也俗呼温菘似蕪菁大根俗名雹突一名蘆菔是也頌曰紫花菘温菘皆南人所呼吳人呼楚菘廣南人呼秦菘時珍曰按孫愐廣韻言魯人名菈蓮音拉荅秦人名蘿蔔王禎農書言北人蘿蔔一種四名春曰破地錐夏曰夏生秋曰蘿蔔冬曰土酥謂其潔白如酥也珍按菘乃菜名因其耐冬如松栢也萊菔乃根名上古謂之蘆萉中古轉為萊菔後世訛為蘿蔔南人呼為蘿瓝瓝與雹同見晉灼漢書註中陸佃乃言萊菔能制麵毒是來麰之所服以菔音服蓋亦就文起義耳王氏溥濟方稱乾蘿蔔為仙人骨亦方士謬名也集解𢎞景曰蘆菔是今温菘其根可食俗人蒸其根及作葅食但小薫臭爾葉不中啖又有突根細而過辛不宜服之恭曰萊菔即蘆菔也嫩葉為生菜食大葉可熟啖陶氏言不中食理喪其真也江北河北秦晉最多登萊亦好頌曰萊菔南北通有北土尤多有大小二種大者肉堅宜蒸食小者白而脆宜生啖河朔極有大者而江南安州洪州信陽者甚大重至五六斤或近一秤亦一時種蒔之力也瑞曰夏月復種者名夏蘿蔔形小而長者名蔓菁蘿蔔時珍曰萊菔今天下通有之昔人以蕪菁萊菔二物混註已見蔓菁條下圃人種菜菔六月下種秋采苖冬掘根春末抽高薹開小花紫碧色夏初結角其子大如大蔴子圓長不等黄赤色五月亦可再種其葉有大者如蕪菁細者如花芥皆有細柔毛其根有紅白二色其状有長圓二類大抵生沙壤者脆而甘生瘠地者堅而辣根葉皆可生可熟可葅可醤可䜴可醋可餹可腊可飯乃蔬中之最有利益者而古人不深詳之豈因其賤而忽之耶抑未諳其利耶氣味根辛甘葉辛苦温無毒詵曰性冷思邈曰平不可與地黄同食令人髪白為其澀營衞也時珍曰多食萊菔動氣惟生薑能制其毒又伏硇砂主治散服及炮煮服食大下氣消糓和中去痰癖肥健人生擣汁服止消渴試大有驗唐本利闗節理顔色練五臟惡氣制麫毒行風氣去邪熱氣蕭炳利五臟輕身令人白淨肌細孟詵消痰止欬治肺痿吐血温中補不足同羊肉銀魚煮食治勞痩欬嗽日華同猪肉食益人生擣服治禁口痢汪頴擣汁服治吐血衂血吳瑞寛胸膈利大小便生食止渴寛中煮食化痰消導寗原殺魚鯹氣治豆腐積汪機主吞酸化積滯解酒毒散瘀血甚效末服治五淋丸服治白濁煎湯洗脚氣飲汁治下痢及失音并烟熏欲死生擣塗打撲湯火傷時珍發明頌曰萊菔功同蕪菁然力猛更出其右斷下方亦用其根燒熟入藥尤能制麫毒昔有婆羅門僧東來見食麥麫者驚云此大熱何以食之又見食中有蘆菔乃云賴有此以解其性自此相傳食麫必啖蘆菔炳曰擣爛制麫作餺飥食之最佳飽食亦不發熱酥煎食之下氣凡人飲食過度生嚼嚥之便消慎微曰按楊億談苑云江東居民言種芋三十畝計省米三十斛種蘿蔔三十畝計益米三十斛則知蘿蔔果能消食也宗奭曰服地黄何首烏人食萊菔則令人髭髪白世皆以為此物味辛下氣速也然生薑芥子更辛何止能散而已蓋萊菔辛而又甘故能散緩而又下氣速也所以散氣用生薑下氣用萊菔震亨曰萊菔屬土有金與水寇氏言其下氣速人往往煮食過多停滯成溢飲豈非甘多而辛少乎時珍曰萊菔根葉同功生食升氣熟食降氣蘇寇二氏止言其下氣速孫真人言久食澀營衞亦不知其生則噫氣熟則洩氣升䧏之不同也大抵入太隂陽明少陽氣分故所主皆肺脾腸胃三焦之病李九華云萊菔多食滲人血則其白人髭髮蓋亦由此非獨因其下氣澀營衛也按洞微志云齊州有人病狂云夢中見紅裳女子引入宮殿中小姑令歌每日遂歌云五靈樓閣曉玲瓏天府由來是此中惆悵悶懷言不盡一丸蘿蔔火吾宮有一道士云此犯大麥毒也少女心神小姑脾神醫經言蘿蔔制麫毒故曰火吾宮火者毁也遂以藥幷蘿蔔治之果愈又按張杲醫説云饒民李七病鼻䘐甚危醫以蘿蔔自然汁和無灰酒飲之即止蓋血隨氣運氣滯故血妄行蘿蔔下氣而酒導之故也又云有人好食豆腐中毒醫治不效忽見賣豆腐人言其妻誤以蘿蔔湯入鍋中遂致不成其人心悟乃以蘿蔔湯飲之而瘳物理之妙如此又延壽書載李師逃難入石窟中賊以烟熏之垂死摸得蘿蔔菜一束嚼汁嚥下甦此法備急不可不知附方舊二新二十一食物作酸蘿蔔生嚼數片或生菜嚼之亦佳絶妙乾者熟者鹽醃者及人胃冷者皆不效瀕湖集簡方反胃噎疾蘿蔔蜜煎浸細細嚼嚥良普濟方消渴飲水獨勝散用出了子蘿蔔三枚淨洗切片日乾為末毎服二錢煎猪肉湯澄清酒下日三服漸増至三錢生者擣汁亦可或以汁煮粥食之圖經本草肺痿欬血蘿蔔和羊肉或鯽魚煮熟頻食方普濟鼻䘐不止蘿蔔擣汁半盞入酒少許熱服并以汁注鼻中皆良或以酒煎沸入蘿蔔再煎飲之衞生易簡方下痢禁口蘿蔔擣汁一小盞蜜一盞水一盞同煎早一服午一服日晡米飲吞阿膠丸百粒如無蘿蔔以子擂汁亦可一方加枯礬七分同煎一方只用蘿蔔菜煎湯日日飲之淡普濟方用蘿蔔片不拘新舊染蜜噙之嚥汁味再換覺思食以肉煮粥與食不可過多痢後腸痛方同上大腸便血大蘿蔔皮燒存性荷葉燒存性蒲黄生用等分為末每服一錢米飲下普濟腸風下血蜜炙蘿蔔任意食之昔一婦人服此有效百一選方酒疾下血連旬不止用大蘿蔔二十枚留青葉寸餘以井水入罐中煮十分爛入淡醋空心任食壽親養老方大腸脱肛生萊菔擣實臍中束之覺有瘡即除摘𤣥方小便白濁生蘿蔔剜空留葢入吳茱茰填滿葢定簽住糯米飯上蒸熟取去茱茰以蘿蔔焙研末糊丸梧子大每服五十丸鹽湯下日三服普濟沙石諸淋疼不可忍用蘿蔔切片蜜浸少時炙乾數次不可過焦細嚼鹽湯下日三服名瞑眩膏普濟遍身浮腫出了子蘿蔔浮麥等分浸湯飲之聖濟總録脚氣走痛蘿蔔煎湯洗之仍以蘿蔔晒乾為末鋪襪内聖濟總錄偏正頭痛生蘿蔔汁一蜆殻仰臥隨左右注鼻中神效王荆公病頭痛有道人傳此方移時遂愈也以此治人不可勝數方如宜失音不語蘿蔔生擣汁入薑汁同服普濟方㗋痺腫痛蘿蔔汁和皂莢漿服取吐同上滿口爛瘡蘿蔔自然汁頻漱去涎妙瀕湖集簡方烟熏欲死方見發明下湯火傷灼生蘿蔔擣塗之子亦可聖濟總錄花火傷肌方同上打撲血聚皮不破者用蘿蔔或葉擣封之邵氏方子氣味辛甘平無毒主治研汁服吐風痰同醋研消腫毒日華下氣定喘治痰消食除脹利大小便止氣痛下痢後重發瘡疹時珍發明震亨曰萊菔子治痰有推墻倒壁之功時珍曰萊菔子之功長于利氣生能升熟能降升則吐風痰散風寒發瘡疹降則定痰喘欬嗽調下痢後重止内痛皆是利氣之效予曽用果有殊績附方舊二新十四上氣痰嗽喘促唾膿血以萊菔子一合研細煎湯食上服之食醫心鏡肺痰欬嗽萊菔子半升淘淨焙乾炒黄為末以糖和丸芡子大綿褁含之嚥汁甚妙勝金方􅋜喘痰促遇厚味即發者蘿蔔子淘浄蒸熟晒研薑汁浸蒸餅丸綠豆大每服三十丸以口津嚥下日三服名清金丸醫學集成痰氣喘息蘿蔔子炒皂莢燒存性等分為末薑汁和煉蜜丸梧子大毎服五七十丸白湯下簡便單方乆嗽痰喘蘿蔔子炒杏仁去皮尖炒等分蒸餅丸麻子大毎服三五丸時時津嚥醫學集成高年氣喘蘿蔔子炒研末蜜丸梧子大每服五十丸白湯下濟生祕覽宣吐風痰勝金方用蘿蔔子末温水調服三錢良久吐出涎沫如是攤緩風者以此吐後用𦂳疎藥疎後服和氣散取瘥丹溪吐法用蘿蔔子半升擂細以水一碗濾取汁入香油及蜜些須温服後以桐油浸過晒乾鵞翎探吐中風口禁蘿蔔子牙皂莢各二錢以水煎服取吐丹溪方小兒風寒蘿蔔子生研末一錢温䓤酒服之取微汗大效衛生易簡方風祕氣祕蘿蔔子炒一合擂水和皂莢末二錢服立通壽域神方氣脹氣蠱萊菔子研以水煎汁浸宿砂一兩一夜炒乾又浸又炒凡七次為末每米飲服一錢如神朱氏集騐方小兒盤腸氣痛用蘿蔔子炒黄研末乳香湯服半錢楊仁齋直指方年久頭風萊菔子生薑等分擣取汁入麝香少許搐入鼻中立止普濟方牙齒疼痛蘿蔔子十四粒生研以人乳和之左疼㸃右鼻右疼㸃左鼻瘡疹不出蘿蔔子生研末米飲服二錢良易衞生簡方花主治用糟下酒藏食之甚美明目士良生薑别錄中品校正原附乾薑下今分出今自草部移入此釋名時珍曰按許慎説文薑作疆云禦濕之菜也王安石字説云薑能疆禦百邪故謂之薑初生嫩者其尖微紫名紫薑或作子薑宿根謂之母薑也集解别錄曰生薑乾薑生犍為山谷及荆州揚州九月采之頌曰處處有之以漢温池州者為良苖高二三尺葉似箭竹葉而長兩兩相對苖青根黄無花實秋時采根時珍曰薑宜原隰沙地四月取母薑種之五月生苖如初生嫰蘆而葉稍闊似竹葉對生葉亦辛香秋社前後新芽頓長如列指狀采食無筋謂之子薑秋分後者次之霜後則老矣性惡濕洳而畏日故秋熱則無薑呂氏春秋云和之美者有楊樸之薑楊樸地名在西蜀春秋運斗樞云璇星散而為薑氣味辛微温無毒藏器曰生薑温要熱則去皮要冷則留皮元素曰辛而甘温氣味俱厚浮而升陽也天之才曰秦椒為之使殺半夏莨菪毒惡黄芩黄連䑕糞𢎞景曰久服少志少智傷心氣今人噉辛辣物惟此最常故論語云毎食不撤薑言可常食但不可多爾有病者是所宜矣恭曰本經言薑久服通神明主痰氣即可常噉陶氏謬為此説檢無所據思邈曰八九月多食薑至春多患眼損壽減筋力孕婦食之令兒盈指杲曰古人言秋不食薑令人瀉氣葢夏月火旺宜汗散之故食薑不禁辛走氣瀉肺故秋月則禁之晦菴語錄亦有秋薑夭人天年之語時珍曰食薑久積熱患目珍屢試有准凡病痔人多食兼酒立發甚速癰瘡人多食則生惡肉此皆昔人所未言者也相感志云糟薑瓶内入蟬蜕雖老薑無筋亦物性有所伏耶主治久服去臭氣通神明本經歸五臟除風邪寒熱傷寒頭痛鼻塞欬逆上氣止嘔吐去痰下氣别錄去水氣滿療欬嗽時疾和半夏主心下急痛和杏仁作煎下􅇥痛氣實心胸擁隔冷熱氣神效擣汁和蜜服治中熱嘔逆不能下食甄權散煩悶開胃氣汁作煎服下一切結實衝胸膈惡氣神騐孟詵破血調中去冷氣汁解藥毒藏器除壯熱治痰喘脹滿冷痢腹痛轉筋心滿去胸中臭氣狐臭殺腹内長蟲張鼎益脾胃散風寒元素解菌蕇諸物毒吳瑞生用發散熟用和中解食野禽中毒成喉痺浸汁㸃赤眼擣汁和黄明膠􅆈貼風濕痛甚妙時珍乾生薑主治治嗽温中治脹滿霍亂不止腹痛冷痢血閉病人虚而冷宜加之甄權薑屑和酒服治偏風孟詵肺經氣分之藥能益肺好古發明成無已曰薑棗味辛甘專行脾之津液而和營衞藥中用之不獨專於發散也杲曰生薑之用有四制半夏厚朴之毒一也發散風寒二也與棗同用辛温益脾胃元氣温中去濕三也與芍藥同用温經散寒四也孫真人云薑為嘔家聖藥蓋辛以散之嘔乃氣逆不散此藥行陽而散氣也或問生薑辛温入肺何以云入胃口曰俗以心下為胃口者非矣咽門之下受有形之物及胃之系便是胃口與肺系同所以能入肺而開胃口也曰人云夜間勿食生薑令人閉氣何也曰生薑辛温主開發夜則氣本收歛反開發之則違天道矣若有病人則不然也生薑屑比之乾薑則不熱比之生薑則不温以乾生薑代乾薑者以其不僣故也俗言上牀蘿蔔下牀薑薑能開胃蘿蔔消食也時珍曰薑辛而不葷去邪辟惡生啖熟食醋醤糟鹽蜜煎調和無不宜之可蔬可和可果可藥其利博矣凡早行山行宜含一塊不犯露霧清濕之氣及山嵐不正之邪案方廣心法附餘云凡中風中暑中氣中毒中惡乾霍亂一切卒暴之病用薑汁與童尿服立可解散葢薑能開痰下氣童尿降火也頌曰崔元亮集騐方載敕腸薑茶治痢方以生薑切細和好茶一兩盌任意呷之便瘥若是熱痢留薑皮冷痢去皮大妙楊士嬴曰薑能助陽茶能助隂二物皆消散惡氣調和隂陽且解濕熱及酒食暑氣之毒不問赤白通宜用之蘇東坡治文潞公有效附方舊二十新三十痰澼卒風生薑二兩附子一兩水五升煮取二升分再服忌猪肉冷水金千胃虚風熱不能食用薑汁半盃生地黄汁少許蜜一匙水二合和服之食療本草瘧疾寒熱脾胃聚痰發為寒熱生薑四兩擣自然汁一酒盃露一夜于發日五更面北立飲即止未止再服易簡寒熱痰嗽初起者燒薑一塊含咽之本草衍義欬嗽不止生薑五兩􅄳半升火煎熟食盡瘉叚侍御用之有效初虞世必効方久患欬噫生薑汁半合蜜一匙􅋩温呷二服瘉外臺祕要方小兒欬嗽生薑四兩􅋩湯浴之千金方暴逆氣上嚼薑兩三片屢効寇氏衍義乾嘔厥逆頻嚼生薑嘔家聖藥也嘔吐不止生薑二兩醋漿二合銀器煎取四合連滓呷之又殺腹内長蟲食醫心鏡心痞嘔噦心下痞堅生薑八兩水三升煑一升半夏五合洗水五升煮一升取汁同煑一升半分再服千金反胃羸弱兵部手集用母薑二斤擣汁作粥食軟傳信適用方用生薑切片蔴油煎過為末梀醮末嚼嚥霍亂欲死生薑五兩牛兒屎一升水四升煎二升分再服即止梅師方霍亂轉筋入腹欲死生薑三兩擣酒一升煮三兩沸服仍以薑擣貼痛處外臺秘要霍亂腹脹不得吐下用生薑一斤水七升煮二升分三服肘后方腹中脹滿綿裹煨薑内下部冷即易之梅師胸脇滿痛凡心胸脇下有邪氣結實硬痛脹滿者生薑一斤擣渣留汁慢炒待潤以絹包于患處欵欵熨之冷再以汁炒再熨良久豁然寛快也陶華傷寒槌法大便不通生薑削長二寸塗鹽内下部立通外臺冷痢不止生薑煨研為未共乾薑末等分以醋和麫作餛飩先以水煮又以清飲煮過停冷吞二七枚以粥送下日一度食療消渴飲水乾生薑末一兩以鯽魚膽汁和丸梧子大毎服七丸米飲下聖惠濕熱發黄生薑時時周身擦之其黄自退也一方加茵蔯蒿尤妙傷寒槌法暴赤眼腫宗奭曰用古銅錢刮薑取汁于錢唇㸃之淚出今日㸃明日愈勿疑汁一治暴風客熱目赤睛痛腫者臘月取生薑擣絞隂乾取粉入銅青末等分毎以少許沸湯泡澄清温洗淚出妙舌上生胎諸病舌胎以布染井水抹後用薑片時時擦之自去陶華方滿口爛瘡生薑自然汁頻頻漱吐亦可為末搽之甚效牙齒疼痛老生薑瓦焙入枯礬末同擦之有人日夜呻吟用之即愈普濟方喉痺毒氣生薑二斤擣汁蜜五合煎勻每服一合日五服食鳩中毒食竹雞毒食鷓鴣毒方並見禽部本條中萵苣毒中諸藥毒猘犬傷人並飲生薑汁即解品小虎傷入瘡内服生薑汁外以汁洗之用白礬末傅上秘覽蝮蛇螫人薑末傅之乾即易千金蜘蛛咬人炮薑切片貼之良千金刀斧金瘡生薑嚼傅勿動次日即生肉甚妙扶壽方閃抝手足生薑葱白擣爛和麵炒熱􅝛之跌撲傷損薑汁和酒調生麵貼之百虫入耳薑汁少許滴之腋下狐臭薑汁頻塗絶根赤白瘢風生薑頻擦之良並易簡兩耳凍瘡生薑自然汁熬膏塗暇日記發背初起生薑一塊炭火炙一層刮一層為末以猪膽汁調塗海上方疔瘡腫毒方見白芷下諸瘡痔漏久不結痂用生薑連皮切大片塗白礬末炙焦研細貼之勿動良普濟産後血滯冲心不下生薑五兩水八升煮服産後肉線一婦産後用力垂出肉線長三四尺觸之痛引心腹欲絶一道人令買老薑連皮三斤擣爛入蔴油二斤拌勻炒乾先以熟絹五尺折作方結令人輕輕盛起肉線使之屈曲作三團納入産戸乃以絹袋盛薑就近熏之冷則更換熏一日夜縮入大半二日盡入也云此乃魏夫人祕傳怪病方也但不可使線㫁㫁則不可治之矣脉溢怪症有人毛竅節次血出不止皮脹如鼓須臾目鼻口被氣脹合此名脉溢生薑自然汁和水各半盞服即安並夏子益奇疾方薑皮氣味辛凉無毒主治消浮腫腹脹痞滿和脾胃去瞖時珍附方舊一拔白換黑刮老生薑皮一大升干久用油胒鍋内不須洗刷固濟勿令通氣令精細人守之文武火煎之不得火急自旦至夕即可成矣研為末拔白後先以小物㸃蔴子大入孔中或先㸃鬚下然後拔之以指撚入三日後當生黑者神効季􅀸用之有騐蘇頌圖經本草葉氣味辛温無毒主治食鱠成癥擣汁飲即消張機附方新一打傷瘀血薑葉一升當歸三兩為末温酒服方寸匕日三范汪東陽方乾薑本經中品校正自草部移至此釋名白薑見下集解𢎞景曰乾薑今惟出臨海章安數村作之蜀漢薑舊美荆州有好薑而不能作乾者凡作乾薑法水淹三日去皮置流水中六日更刮去皮然後晒乾置瓷缸中釀三日乃成頌曰造法采根于長流水洗過日晒為乾薑以漢温池州者為良陶説乃漢州乾薑法也時珍曰乾薑以母薑造之今江西襄均皆造以白凈結實者為良故人呼為白薑又曰均薑凡入藥並宜炮用氣味辛温無毒禇曰苦辛好古曰大熱保昇曰久服令人目暗餘同生薑時珍曰大清外術言孕婦不可食乾薑令胎内消蓋其性熱而辛散故也主治胸滿欬逆上氣温中止血出汗逐風溼痺腸澼下痢生者尤良本經寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血别錄治腰腎間疼冷冷氣破血去風通四肢闗節開五臟六腑宣諸絡脉去風毒冷痺夜多小便甄權消痰卞氣治轉筋吐瀉腹臟反胃乾嘔瘀血撲損止鼻紅解冷熱毒開胃消宿食大明主心下寒痞目睛久赤好古發明元素曰乾薑氣薄味厚半沉半浮可升可降陽中之隂也又曰大辛大熱陽中之陽其用有四通心助陽一也去臟腑沉寒痼冷二也發諸經之寒氣三也治感寒腹痛四也腎中無陽脉氣欲絶黒附子為引水煎服之名薑附湯亦治中焦寒邪寒滛所勝以辛散之也又能補下焦故四逆湯用之乾薑本辛炮之稍苦故止而不移所以能治裏寒非若附子行而不止也理中湯用之者以其回陽也李杲曰乾薑生辛炮苦陽也生則逐寒邪而發表炮則除胃冷而守中多用則耗散元氣辛以散之是壯火食氣故也須以生甘草緩之辛熱以散裏寒同五味子用以温肺同人參用以温胃也好古曰乾薑心脾二經氣分藥也故補心氣不足或言乾薑辛熱而言補脾今理中湯用之言泄不言補何也蓋辛熱燥濕泄脾中寒濕邪氣非泄正氣也又云服乾薑以治中者必僣上不可不知震亨曰乾薑入肺中利肺氣入腎中燥下溼入肝經引血藥生血同補隂藥亦能引血藥入氣分生血故血虚發熱産後大熱者用之止唾血痢血須炒黒用之有血脱色白而天不澤脉懦者此大寒也宜乾薑之辛温以益血大熱以温經時珍曰乾薑能引血藥入血分氣藥入氣分又能去惡養新有陽生隂長之意故血虚者用之凡人吐血䘐血下血有隂無陽者亦宜用之乃熱因熱用從治之法也附方舊十六新十二脾胃虚冷不下食傾久羸弱成瘵者用温州白乾薑漿水煮透取出焙乾擣末陳廪米煑粥飲丸梧子大毎服三五十丸白湯下其効如神蘇頌圖經脾胃虚弱飲食減少易傷難化無力肌痩用乾薑頻硏四兩以白􅄳切塊水浴過入鐵銚溶化和丸梧子大毎空心米飲下三十丸十便方頭運吐逆胃冷生痰也用川乾薑炮二錢半甘草炒一錢二分水一鐘半煎減半服累用有效傳信適用方心脾冷痛暖胃消痰二薑丸用乾薑高良薑等分炮研末糊丸梧子大毎食後猪皮湯下三十丸和劑局方心氣卒痛乾薑末米飲服一錢外臺秘要隂陽易病傷寒後婦人得病雖瘥未滿百日不可與男合為病拘急手足拳腹痛欲死丈夫名隂易婦人名陽易速宜汗之即愈滿四日不可治也用乾薑四兩為末毎用半兩白湯調服覆衣被出汗後手足伸即愈傷寒類要方中寒水瀉乾薑炮研末粥飲服二錢即效千金方寒痢青色乾薑切大豆大每米飲服六七枚日三夜一累用得效肘后方血痢不止乾薑燒黒存性放冷為末每服一錢米飲下神妙姚氏集騐脾寒瘧疾外臺用乾薑高良薑等分為末毎服一錢水一盞煎至七分服又乾薑炒黑為末臨發時以温酒服三錢匕冷氣欬嗽結脹者乾薑末熱酒調服半錢或􅄳糖丸噙姚僧坦方欬嗽上氣用合州乾薑炮皂莢炮去皮子及蛀者桂心紫色者去皮並擣篩等分鍊白蜜和擣三千杵丸梧子大毎飲服三丸嗽發即服日三五服禁食䓤麫油膩其効如神禹錫在淮南與李亞同幕府李每治人而不出方或誚其吝李曰凡人患嗽多進冷藥若見此方用藥熱燥必不肯服故但出藥即多効也試之信然劉禹錫傳信方虚勞不眠乾薑為末湯服三錢取微汗出千金方吐血不止乾薑為末童子小便調服一錢良鼻䘐不止乾薑削尖煨塞鼻中即止齆鼻不通乾薑末蜜調塞鼻中利廣方冷淚目昬乾薑粉一字炮湯㸃洗之聖濟錄赤眼澀痛白薑末水調貼足心甚妙普濟方目忽不見令人嚼母薑以舌日䑛六七次以明為度聖濟錄目中卒痛乾薑削圓滑内眥中有汁出拭之未盡更易千金牙痛不止川薑炮川椒等分為末摻之方御藥院斑豆厥逆斑豆服凉藥多手足厥冷脉微用乾薑炮一錢半粉甘草炙一錢半水二鐘煎一鐘服龎安常傷寒論癰疽初起乾薑一兩炒紫研末醋調傅四圍留頭自愈此乃東昌申一齋奇方也諸症辨疑瘰癧不歛乾薑為末薑汁打糊和作劑以黄丹為衣每日隨瘡大小入藥在内追膿盡生肉口合為度如不合以䓤白汁調大黄末搽之即愈救急方虎狼傷人乾薑末傅之肘後猘犬傷人乾薑末水服二七生薑汁服亦良并以薑炙熱熨之蛇蠍螫人乾薑雄黄等分為末袋盛佩之遇螫即以傅之便定廣川方附錄天竺乾薑拾遺藏器曰味辛溫無毒主冷氣寒中宿食不消腹脹下痢腰背痛痃癖氣塊惡血積聚生婆羅門國一名胡乾薑狀似薑小黄色也同蒿宋嘉祐釋名蓬蒿時珍曰形氣同乎蓬蒿故名集解機曰本草不著形狀後人莫識時珍曰茼蒿八九月下種冬春采食肥莖花葉微似白蒿其味辛甘作蒿氣四月起薹高二尺餘開深黄色花狀如單瓣菊花一花結子近百成毬如地菘及苦蕒子最易繁茂此菜自古已有孫思邈載在千金方菜類至宋嘉祐中始補入本草今人常食者而汪機乃不能識輒敢擅自修纂誠可笑嘅氣味甘辛平無毒禹錫曰多食動風氣薫人心令人氣滿主治安心氣養脾胃消痰飲利腸胃思邈邪蒿宋嘉祐釋名時珍曰此蒿葉紋皆邪故名集解藏器曰邪蒿根莖似青蒿而細軟時珍曰三四月生苖葉似青蒿色淺不臭根葉皆可茹氣味辛温平無毒詵曰生食微動風作羮食良不與胡荽同食令人汗臭氣主治胸膈中臭爛惡邪氣利腸胃通血脉續不足氣孟詵煮熟和醤醋食治五臟惡邪氣厭糓者治脾胃腸癖大渴熱中暴疾惡瘡食醫心鑑胡荽宋嘉祐釋名香荽拾遺胡菜外臺蒝荽時珍曰荽許氏説文作葰云薑屬可以香口也其莖柔葉細而根多鬚綏綏然也張騫使西域始得種歸故名胡荽今俗呼為蒝荽蒝乃莖葉布散之貎俗作芫花之芫非矣藏器曰石勒諱胡故并汾人呼胡荽為香荽集解時珍曰胡荽處處種之八月下種晦日尤良初生柔莖圓葉葉有花岐根軟而白冬春采之香美可食亦可作葅道家五葷之一立夏後開細花成簇如芹菜花淡紫色五月收子子如大麻子亦辛香按賈思勰齊民要術云六七月布種者可竟冬食春月挼了沃水生芽種者小小供食而已王禎農書云胡荽於蔬菜中子葉皆可用生熟俱可食甚有益於世者宜肥地種之正誤李延飛曰胡荽蕎子也吳瑞曰胡荽俗呼藠子根苖如蒜時珍曰蕎子即藠子乃薤也李吳二氏云並作胡荽誤矣根葉氣味辛温微毒詵曰平微寒無毒可和生菜食此是葷菜損人精神華陀云胡臭口臭􅉶齒及脚氣金瘡人皆不可食病更加甚藏器曰久食令人多忘根發痼疾不可同斜蒿食令人汗臭難産時珍曰凡服一切補藥及藥中有白术牡丹者不可食此伏石鍾乳主治消糓治五臟補不足利大小腸通小腹氣拔四肢熱止頭痛療沙􅇙豌豆瘡不出作酒歕之立出通心竅嘉祐補筋脉令人能食治腸風用熱餅裹食甚良孟詵合諸菜食氣香令人口爽辟飛尸鬼疰蠱毒吳瑞辟魚肉毒􅑔原發明時珍曰胡荽辛温香竄内通心脾外達四肢能辟一切不正之氣故痘瘡出不爽快者能發之諸瘡皆屬心火營血内攝于脾心脾之氣得芳香則運行得臭惡則壅滯故爾按楊士嬴直指方云痘疹不快宜用胡荽酒歕之以辟惡氣床帳上下左右皆宜掛之以禦汗氣胡臭天癸淫佚之氣一應穢惡所不可無若兒虚弱及天時隂寒用此最妙如兒壯實及春夏晴暖陽氣發越之時加以酒麴助虐以火益火胃中熱熾毒血聚畜則變成黒䧟矣不可不慎附方舊五新四􅇙痘不快用胡荽二兩切以酒二大盞煎沸沃之以物蓋定勿令洩氣候冷去滓微微含噴從項背至足令遍勿噀頭面經騐後方熱氣結滯經年數發者胡荽半斤五月五日采隂乾水七升煑取一升半去滓分服未瘥更服春夏葉秋冬根莖並可用必効方孩子赤丹胡荽汁塗之譚氏方面上黒子蒝荽煎湯日日洗之小試産後無乳乾胡荽煎湯飲之効經騐方小便不通胡荽二兩葵根一握水二升煎一升入滑石末一兩分三四服聖濟總錄肛門脱出胡荽切一升燒烟熏即入子母秘錄解中蠱毒胡荽根擣汁半升和酒服立下神騐必効方蛇虺螫傷胡荽苖合口椒等分擣塗之千金子氣味辛酸平無毒妙用主治消糓能食思邈蠱毒五痔及食肉中毒吐下血煑汁冷服又以油煎塗小兒秃瘡藏器發痘疹殺魚腥時珍附方舊三新四食諸肉毒吐下血不止痿黄者胡荽子一升煮令發裂取汁冷服半升日夜各一服即止食療本草腸風下血胡荽子和生菜以熱餅裹食之普濟方痢及瀉血胡荽子一合炒擣末毎服二錢赤痢砂糖水下白痢薑湯下瀉血白湯下日二普濟方痔漏脱肛胡荽子一升粟糠一升乳香少許以小口瓶燒烟熏之儒門事親腸頭挺出秋冬擣胡荽子醋煑熨之甚効孟詵食療本草牙齒疼痛胡菜子即胡荽子五升以水五升煑取一升含潄外臺秘要五痔作痛胡荽子炒末空心温酒服二錢數服效海上仙方胡蘿蔔綱目釋名時珍曰元時始自胡地來氣味微似蘿蔔故名集解時珍曰胡蘿蔔今北上山東多蒔之淮楚亦有種之者八月下種生苖如邪蒿肥莖有白毛辛臭如蒿不可食冬月掘根生熟皆可啖兼果蔬之用根有黄赤二種微帶蒿氣長五六寸大者盈握狀似鮮掘地黄及羊蹄根三四月莖高二三尺開碎白花攅簇如葢狀似蛇牀花子亦如蛇牀子稍長而有毛褐色又如蒔蘿子亦可調和食料按周憲王救荒本草云野胡蘿蔔苖葉花實皆同家胡蘿蔔但根細小味甘生食蒸食皆宜花子皆大於蛇牀又金㓜孜北征錄云交河北有沙蘿蔔根長二尺許大者徑寸下支生小者如筋其色黄白氣味辛而微苦亦似蘿蔔氣此皆胡蘿蔔之類也根氣味甘辛微温無毒主治下氣補中利胸膈腸胃安五臟令人健食有益無損時珍子主治久痢時珍芒斳音芹品本經下釋名芹菜别錄水英本經楚葵𢎞景曰斳字俗作芹字論其主治合在上品未解何意乃在下品二月三月作英時可作葅及熟瀹食故名水英時珍曰靳當作􅀈从􅋄靳諧聲也後省作芹从斤亦諧聲也其性冷滑如葵故爾雅謂之楚葵呂氏春秋菜之美者有雲夢之芹雲夢楚地有蘄州蘄縣俱音淇羅願爾雅翼云地多産芹故字从芹蘄亦音芹徐鍇注説文蘄字从􅋄蘄諸書無字惟説文别出䓄字音銀疑相承誤出也據此則蘄字亦當从斳作􅀈字也集解别錄曰水斳生南海池澤恭曰水斳即芹菜也及有兩種荻芹白色取根赤芹取莖葉並堪作葅生菜保昇曰芹生水中葉似芎藭其花白色而無實根亦白色詵曰水芹生黒滑地食之不如高田者宜人置酒醤中香美高田者名曰芹餘田者皆有蟲子在葉間視之不見食之令人為患𢎞景曰又有渣芹可以為生菜亦可生啖時珍曰芹有水芹旱芹水芹生江湖陂澤之涯旱芹生平地有赤白二種二月生苖其葉對節而生似芎藭其莖有節稜而中空其氣芬芳五月開細白花如蛇牀花楚人採以濟飢其利不小詩云觱沸檻泉言采其芹杜甫詩云飯煑青泥坊底芹又云香芹碧澗羮皆美芹之功而列子言鄉豪嘗芹蜇口惨腹蓋未得食芹之法耳莖氣味甘平無毒思邈曰苦酸冷濇無毒詵曰和醋食損齒鼈瘕不可食李廷飛曰赤芹害人不可食主治女子赤沃止血養精保血脉益氣令人肥健嗜食本經去伏熱殺石藥毒擣汁服孟詵飲汁去小兒暴熱大人酒後熱鼻塞身熱去頭中風熱利口齒利大小腸藏器治煩渴崩中帶下五種黄病大明發明張仲景曰春秋二時龍帶精入芹菜中人誤食之為病面青手青腹滿如妊痛不可忍作蛟龍病俱服硬􅄳三二升日三度吐出蜥蝪便瘥時珍曰芹菜生水涯蛟龍雖云變化莫測其精那得入此大抵是蜥蜴虺蛇之類春夏之交遺精於此故爾且蛇喜嗜芹尤可為證别有馬芹見後附方舊一新二小兒吐瀉芹菜切細煑汁飲之不拘多少子母秘錄小便淋痛水芹菜白根者去葉擣汁井水和服聖惠方小便出血水芹擣汁日服六七合聖惠方花氣味苦寒無毒主治脉溢蘇恭堇音勤草唐本釋名苦堇爾雅堇葵唐本旱芹綱目禹錫曰爾雅云齧苦堇也郭璞云即堇葵本草言味甘而此云苦堇古人語倒猶甘草謂之大苦也時珍曰其性滑如葵故得葵名集解恭曰堇菜野生非人所種葉似蕺菜花紫色禹錫曰説文云堇根如薺葉如細柳子如米蒸以食之甘滑内則云堇茸枌榆是矣時珍曰此旱芹也其性滑利故洪舜俞賦云烈有椒桂滑有堇榆一種黄花者有毒殺人即毛芹也見草部毛萇又烏苖亦名堇有毒各見本條下菜氣味甘寒無毒主治擣汁洗馬毒瘡并服之又塗蛇蝎毒及癰腫唐本久食除心下煩熱主寒熱䑕瘻瘰癧生瘡結核聚氣下瘀血止霍亂及生擣汁半升服能殺鬼毒即吐出孟詵發明詵曰堇葉止霍亂與香茂同功香茂即香薷也附方舊二新一結核氣堇菜日乾為末油􅋩成膏摩之日三五度便瘥孟詵食療濕熱氣旱芹菜日乾為末糊丸梧子大毎服四十丸空心温酒下大殺百蟲毒壽域神方蛇咬瘡生杵堇汁塗之萬年術紫堇音芹經宋圖釋名赤芹綱目蜀芹圖經楚葵同上苔菜同上水萄菜時珍曰堇蘄芹斳四字一音也詳下集解頌曰紫堇生江南吳興郡淮南名楚葵宜春郡名蜀芹豫章郡名苔菜晋陵郡名水萄菜也時珍曰蘇頌之説出於唐𤣥宗天寳單方中不言紫堇形狀今按軒轅述寳藏論云赤芹即紫芹也生水濱葉形如赤芍藥青色長三寸許葉上黄色味苦澀其汁可以煑雌制汞伏硃砂擒三黄號為起貧草又土宿真君本草云赤芹生隂厓陂澤邉水石間狀類赤芍藥其葉深綠而背甚赤莖葉似蕎麥花紅可愛結實亦如豼蕎麥其根似蜘蛛嚼之極酸苦澀江淮人三四月采苖當蔬食之南方頗少太行王屋諸山最多也苖氣味酸平微毒花氣味酸微温無毒主治大人小兒脱肛蘇頌附方舊一脱肛凡大人小兒脱肛毎天冷及喫冷食即暴痢不止則下脱久療不瘥者春間收紫堇花二斤曝乾為散加磁毛末七兩相和研細塗肛上納入即使人噀冷水於面上即吸入腸中每日一塗藥而噀面不過六七度即瘥矣又以熱酒半升和散一方寸匕空腹服之日再服漸加至二方寸匕以瘥為度若五歲以下小兒即以半杏子許和酒服之忌生冷陳倉米等物天寳單方馬蘄音芹草唐本釋名牛蘄爾雅胡芹通志野茴香綱目時珍曰凡物大者多以馬名此草似芹而大故也俗稱野茴香以其氣味子形微似也金光明經三十二品香藥謂之葉婆你集解恭曰馬蘄生水澤旁苖似鬼針恭菜等嫩時可食花青白色子黄黒色似防風子調食味用之香似橘皮而無苦味保昇曰花若芹花子如防風子而扁大爾雅云茭牛蘄也孫炎釋云似芹而葉似鋭可食菜也一名茭一名馬蘄子入藥用時珍曰馬蘄與芹同類而異種處處卑濕地有之三四月生苖一本叢生如蒿白毛䝉茸嫩時可茹葉似水芹而微小似芎藭葉而色深五六月開碎花攅簇如蛇牀及蒔蘿花青白色結實亦似蒔蘿子但色黒而重爾其根白色長者尺許氣亦香而堅硬不可食蘇恭所謂鬼針即鬼釵草也方莖椏葉子似杈脚着人衣如針與此稍異苖氣味甘辛温無毒主治益脾胃利胸膈去冷氣作茹食時珍子氣味甘辛温無毒主治心腹脹滿開胃下氣消食調味用之唐本炒研醋服治卒心痛令人得睡孟詵温中暖脾治反胃時珍附方慢脾驚風馬芹子丁香白僵蠶等分為末每服一錢炙橘皮煎湯下名醒脾散普濟方蘹香唐本草校正自草部移入此釋名茴香八月珠頌曰蘹香北人呼為茴香聲相近也𢎞景曰煑臭肉下少許即無臭氣臭醤入末亦香故曰囘香時珍曰俚俗多懐之衿衽咀嚼恐蘹香之名或以此也集解頌曰今交廣諸畨及近郡皆有之入藥多用畨舶者或云不及近處者有力三月生葉似老胡荽極疎細作叢至五月莖粗高三四尺七月生花頭如傘葢黄色結實如麥而小青色北人呼為土茴香八九月采實隂乾今近道人家園圃種之甚多川人多煑食其莖葉宗奭曰云似老胡荽者誤矣胡荽葉如蛇牀雖有葉之名但散如絲髪特異諸草也時珍曰茴香宿根深冬生苖作叢肥莖絲葉五六月開花如蛇牀花而色黄結子大如麥粒輕而有細稜俗呼為大茴香今惟以寧夏出者第一其他處小者謂之小茴香自畨舶來者實大如柏實裂成八瓣一瓣一核大如豆黄褐色有仁味更甜俗呼舶茴香又曰八角茴香廣西左右江峒中亦有之形色與中國茴香逈别但氣味同爾北人得之咀嚼薦酒子氣味辛平無毒思邈曰苦辛微寒濇權曰苦辛得酒良炒黄用好古曰陽也浮也入手足少隂太陽經主治諸瘻霍亂及蛇傷唐本膀胱胃間冷氣及育腸氣調中止痛嘔吐馬志治乾濕脚氣腎勞㿗疝隂疼開胃下氣大明補命門不足李杲暖丹田吳緩發明詵曰茴香國人重之云有助陽道未得其方法也好古曰茴香本治膀胱藥以其先丙故曰小腸也能潤丙燥以其先戊故從丙至壬又手足少隂二藥以開上下經之通道所以壬與丙交也時珍曰小茴香性平理氣開胃夏月祛蠅辟臭食料宜之大茴香性熱多食傷目發瘡食料不宜過用古方有去鈴丸用茴香二兩連皮生薑四兩同入坩器内淹一伏時慢火炒之入鹽一兩為末糊丸梧子大每服三五十丸空心鹽酒下此方本治脾胃虚弱病茴香得鹽則引入腎經發出邪氣腎不受邪病自不生也亦治小腸疝氣有効附方舊四新十六開胃進食茴香二兩生薑四兩同擣匀入凈器内濕紙蓋一宿次以銀石器中文武火炒黄焦為末酒糊丸梧子大毎服十丸至二十五丸温酒下經騐方瘴瘧發熱連背項者茴香子擣汁服之孫真人方大小便閉皷脹氣促八角茴香七個大麻仁半兩為末生䓤白三七根同硏煎湯調五苓散末服之日一服普濟小便頻數茴香不拘多少淘浄入鹽少許炒研為末炙糯米糕蘸食之傷寒脱陽小便不通用茴香末以生薑自然汁調傅腹上外用茴香末入益元散服之摘𤣥方腎消飲水小便如膏油用茴香炒苦梀子炒等分為末毎食前酒服二錢保命集腎邪冷氣力弱者用大茴香六兩分作三分用生附子一箇去皮分作三分第一度用附子一分茴香一分同炒黄出火毒一夜去附子研茴香為末空心鹽酒下一錢第二度用二味各一分同炒存性出火毒以附子去一半留一半同茴香為末如前服第三度各一分同炒存性出火毒全研為末如前服之朱氏集騐方腎虚腰痛茴香炒硏以猪腰子批開摻末入内濕紙裹煨熟空心食之鹽酒送下戴原禮要訣腰痛如刺簡便方用八角茴香炒研毎服二錢食前鹽湯下外以糯米一二升炒熱袋盛拴於痛處活人心統思仙散用八角茴香杜仲各炒硏三錢木香一錢水一鍾酒半鍾煎服腰重刺脹八角茴香炒為末食前酒服二錢方直指疝氣入腎茴香炒作二包更換熨之簡便方小腸氣墜直指用八角茴香小茴香各三錢乳香少許水服取汗核孫氏集効方治小腸疝氣痛不可忍用大茴香荔枝炒黒各等分研末毎服一錢温酒調下研瀕湖集簡方用大茴香一兩花椒五錢炒毎酒服一錢膀胱疝痛本事方用舶茴香杏仁各一兩䓤白焙乾五錢為末毎酒服二錢嚼胡桃送下集要治疝氣膀胱小腸痛用茴香鹽炒晚蠶沙鹽炒等分為末煉蜜丸彈子大毎服一丸温酒嚼下疝氣偏墜大茴香末一兩小茴香末一兩用牙猪尿胞一個連尿入二末於内繫定罐内以酒煮爛連胞搗丸如梧子大毎服五十丸白湯下仙方也鄧才筆峯雜興脇下刺痛小茴香一兩炒枳殻五錢麸炒為末每服二錢鹽酒調服神效袖珍方辟除口臭茴香煑羮及生食並得昝殷食醫心鏡蛇咬久潰小茴香擣末傅之千金莖葉氣味與子同主治煮食治卒惡心腹中不安甄權治小腸氣卒腎氣衝脇如刀刺痛喘息不得生擣汁一合投熱酒一合和服孟詵發明頌曰范汪方療惡毒癰腫或連隂卵髀間疼痛苖攣急牽入小腹不可忍一宿即殺人者用茴香葉擣汁一升服之日三四服其滓以貼腫上冬月用根此是外國神方永嘉以來用之起死回生神騐蒔蘿宋開寳校正自草部移入此釋名慈謀勒開寳小茴香時珍曰蒔蘿慈謀勒皆番言也集解藏器曰蒔蘿生佛誓國實如馬芹子辛香珣曰按廣州記云生波斯國馬芹子色黑而重蒔蘿子色褐而輕以此為别善滋食味多食無損即不可與阿魏同食奪其味也頌曰今嶺南及近道皆有之三月四月生苖花實大類蛇牀而簇生辛香六七月采實今人多用和五味不聞入藥用時珍曰其子簇生狀如蛇牀子而短微黑氣辛臭不及茴香嘉謨曰俗呼蒔蘿椒内有黒子但皮薄其色似褐不紅耳苖氣味辛温無毒主治下氣利膈時珍子氣味辛温無毒主治小兒氣脹霍亂嘔逆腹冷不下食兩肋痞滿藏器健脾開胃氣温腸殺魚肉毒補水臟治腎氣壯筋骨日華主膈氣消食滋食味李珣附方新二閃挫腰痛蒔蘿作末酒服二錢匕永類鈐方牙齒疼痛舶上蒔蘿蕓薹子白芥子等分研末口中含水隨左右㗜鼻神効聖惠方附錄蜀胡爛拾遺藏器曰子味辛平無毒主冷氣心腹脹滿補腎除婦人血氣下痢殺牙齒蟲生安南似蘹香子可和食數低拾遺藏器曰子味丼温無毒主冷風冷氣下宿食不消脹滿生西番北土兼似蘹香胡人以作羮食之池得勒拾遺藏器曰根辛温無毒破冷氣消食生西國草根也胡人食之馬思荅吉時珍曰味苦温無毒去邪惡氣温中利膈順氣止痛生津解渴令人口香元時飲膳用之云極香料也不知何狀故附之羅勒宋嘉祐附釋名蘭香嘉祐香菜綱目瞖子草禹錫曰北人避石勒諱呼羅勒為蘭香時珍曰按鄴中記云石虎諱言勒改羅勒為香菜今俗人呼為瞖子草以其子治瞖也集解禹錫曰羅勒處處有之有三種一種似紫蘇葉一種葉大二十步内即聞香一種堪作生菜冬月用乾者子可安入目中去瞖少頃濕脹與物俱出也時珍曰香菜須三月棗葉生時種之乃生否則不生常以魚腥水米泔水泥溝水澆之則香而茂不宜糞水臞仙神隱書言園邊水側宜廣種之飢年亦可濟用其子大如蚤褐色而不光七月收之即𢎞景曰術家取羊角馬蹄燒作灰撒濕地遍踏之生羅勒俗呼為西王母菜食之孟人氣味辛温微毒禹錫曰不可多食壅闗節澀營衛令人血脉不行又動風發脚氣主治調中消食去惡氣消水氣宜生食療齒根爛瘡為使用之甚良患啘嘔者取汁服半合冬月用乾者煑汁其根燒灰傅小兒黄爛瘡禹錫主辟飛尸鬼疰蠱毒吳瑞發明時珍曰按羅天益云蘭香味辛氣温能和血潤燥而掌禹錫言多食澀營衛血脉不行何耶又東垣李氏治牙疼口臭神功丸中用蘭香云無則以藿香代之此但取其去惡氣而已故飲膳正要云與諸菜同食味辛香能辟腥氣皆此意也附方新二鼻疳赤爛蘭香葉燒灰二錢銅青五分輕粉二字為末日傅三次錢乙小兒方反胃欬噫生薑四兩擣爛入蘭香葉一兩椒末一錢鹽和麫四兩裹作燒餅煨熟空心喫不過三度効反胃入甘蔗汁和之普濟方子主治目瞖及塵物入目以三五顆安目中少頃當濕脹與物俱出又主風赤眵淚嘉祐發明時珍曰按普濟方云昔廬州知錄彭大辨在臨安暴得赤眼後生瞖一僧用蘭香子洗晒毎納一粒入眥内閉目少頃連膜而出也一方為末㸃之時珍常取子試之水中亦脹大蓋此子得濕即脹故能染惹眵淚浮膜爾然目中不可著一塵而此子可納三五顆亦不妨碍蓋一異也附方新二目昬浮瞖蘭香子毎用七個睡時水煎服之久久有効也海上名方走馬牙疳小兒食肥甘腎受虚熱口作臭息次第齒黑名曰崩砂漸至齦爛名曰潰槽又或血出名曰宣露重則齒落名曰腐根用蘭香子末輕粉各一錢蜜陀僧醋淬研末半兩和匀毎以少許傅齒及齦上立効内服甘露飲活幼口議白花菜食物釋名羊角菜集解時珍曰白花菜三月種之柔莖延蔓一枝五葉葉大如拇指秋間開小白花長蕋結小角長二三寸其子黒色而細狀如初眠蠶沙不光澤菜氣羶臭惟宜鹽葅食之穎曰一種黄花者名黄花菜形狀相同但花黄也氣味苦辛微毒穎曰多食動風氣滯臟腑令人胃中悶滿傷脾主治下氣汪頴煎水洗痔擣爛敷風濕痺痛擂酒飲止瘧時珍菜音空綱目校正併入草部拾遺􅀈菜釋名􅀈菜音罩辣米菜時珍曰蔊味辛辣如火焊人故名亦作􅀈陳藏器本草有􅀈菜云辛菜也南人食之不著形狀今攷唐韻玉篇並無􅀈字止有􅀈字云辛菜也則􅀈乃蔊字之訛爾集解時珍曰蔊菜生南地田園間小草也冬月布地叢生長二三寸柔梗細葉二月開細花黄色結細角長一二分角内有細子野人連根葉拔而食之味極辛辣呼為辣米菜沙地生者尤伶仃故洪舜俞老圃賦云蔊有拂士之風林洪山家清供云朱文公飲後輒以蔊莖供蔬品蓋旰江建陽嚴陵人皆喜食之也氣味辛温無毒李廷飛曰蔊菜細切以生蜜洗伴或畧汋食之爽口消食多食發痼疾生熱主治去冷氣腹内久寒飲食不消令人能食藏器利胸膈豁冷痰心腹痛時珍草豉拾遺校正自草部移入此集解藏器曰生巴西諸國草似韭狀豉出花中彼人食之氣味辛平無毒主治惡氣調中益五臟開胃令人能食藏器本草綱目卷二十六
