body:
  text: 本草綱目卷四十一明李時珍撰蟲之三化生類三十二種蠐螬本經中品釋名蟦蠐音墳本經蜰蠐音肥别録乳齊𢎞景地蠶郭璞應條吳普時珍曰蠐螬方言其蠀螬象蠧物聲或謂齊人曹氏子所化謬也蟦蜰言其肥乳齊言其通乳别録作㪍齊誤集解别錄曰蠐螬生河内平澤及人家積糞草中取無時反行者良𢎞景曰大者如足大趾以背滚行乃駛於脚雜猪蹄作羹於乳母不能别之時珍曰其狀如蠶而大身短節促足長有毛生樹根及糞土中者外黄内黒生舊茅屋土者外白内黯皆濕熱之氣熏蒸而化宋齊丘所謂燥濕相育不母而生是矣久則羽化而去正誤𢎞景曰詩云領如蝤蠐今以蠐字在下恐倒爾恭曰此蟲一名蝤蠐有在糞聚中或在腐木中其在腐栁中者内外潔白糞土中者皮黄内黒黯形色既異土木又殊當以木中者為勝宜冬月采之宗奭曰諸腐木根下多有之構木津甘故根下尤多亦有生于糞土中者雖肥大而腹中黒不若木中者雖瘦而稍白研汁可用斆曰蠐螬須使桑樹栢樹中者妙韓保昇曰按爾雅註云蟦蠐螬在糞土中蝤蠐蝎蝎蛣􅔒又云蝎桑蠧並木中蠧也正與本經蟦蠐生積糞草中相合蘓恭言當以木中者為勝則此外恐非也切謂不然今諸朽樹中蠧蟲通謂之蝎莫知其主療惟桑樹中者近方用之而有名未用曽用未識類中有桑蠧一條即此也葢生産既殊主療亦别雖有毒無毒易見而相使相惡難主且蝎不號蠐螬蟦不名蛣􅔒自當審之藏器曰蠐螬居糞土中身短足長背有毛筋但從夏入秋蛻而為蟬飛空飲露能鳴高潔蝤蠐一名蝎一名蠧在朽木中食木心穿木如錐身長足短口黒無毛節慢至春雨後化為天牛兩角而水牛色黒背有白㸃上下緣木飛騰不遙出處既殊形質又别陶蘓乃混註之葢千慮一失也惟郭璞注爾雅謂蠐螬在糞土中蝤蠐桑蠧在木中囓桑似蝸牛長角喜囓桑樹者為是也頌曰今醫家與蓐婦下乳藥用糞土中者其效殊速乃知蘓恭之説不可據也修治斆曰凡收得後隂乾與糯米同炒至米焦黒取出去米及身上口畔肉毛并黒塵子作三四截研粉用之時珍曰諸方有乾研及生取汁者又不拘此例也氣味鹹㣲温有毒别錄曰㣲寒惡之才曰蜚蠊為之使附子主治惡血血瘀痺氣破折血在脇下堅滿痛月閉目中淫膚青翳白膜本經療吐血在胸腹不去破骨踒折血結金瘡内塞産後中寒下乳汁别錄取汁滴目去翳障主血止痛藥性傅惡瘡日華汁主赤白遊􅇙􅇙擦破塗之藏器取汁㸃喉痺得下即開蘓頌主唇𦂳口瘡丹􅇙破傷風瘡竹木入肉芒物眯目時珍發明𢎞景曰同猪蹄作羹食甚下乳汁頌曰張仲景治雜病大䗪蟲丸方中用之取其去脇下堅滿也時珍曰許學士本事方治筋急養血地黄丸中用之取其治血瘀痺也按陳氏經騐方云晉書吳中書郎盛沖母王氏失明婢取蠐螬蒸熟與食王以為羙沖還知之抱母慟哭母目即開與本草治目中青翳白膜藥性論汁滴目中去翳障之説相合予嘗以此治人得騐因錄以傳人又按魯伯嗣嬰童百問云張太尹傳治破傷風神效方用蠐螬將駝脊背揑住待口中吐水就取抹瘡上覺身麻汗出無有不活者子弟額上跌破七日成風依此治之時間就愈此又符療踒折傳惡瘡金瘡内塞主血止痛之說也葢此藥能行血分散結滯故能治已上諸病附方舊五新四小兒臍瘡蠐螬研末傅之不過數次千金方小兒唇𦂳蠐螬研末豬脂和傅之千金方赤白口瘡蠐螬研汁頻搽取效大觀丹毒浸淫走串皮中名火丹以蠐螬擣爛塗之刪繁方癰疽痔漏蠐螬研末傅之日一上子母秘錄虎傷人瘡蠐螬擣爛塗之日上唐瑤經騐方竹木入眼蠐螬擣塗之立出肘后麥芒入眼以新布覆目中持蠐螬從布上摩之芒着布上出也千金方斷酒不飲蠐螬研末酒服永不飲千金方乳蟲綱目釋名土蛹集解時珍曰按白獺髓云廣中韶陽屬邑鄉中有乳田其法掘地成窖以粳米粉鋪入窖中葢之以草壅之以糞候雨過氣蒸則發開而米粉皆化成蛹如蠐螬狀取蛹作汁和粳粉蒸成乳食味甚甘美也此亦蠐螬之類出自人為者淮南萬畢術所謂置黍溝中即生蠐螬廣雅所為土蛹蠁蟲者皆此物也服食用此代蠐螬更覺有功無毒氣味甘温無毒主治補虛羸益胃氣温中明目時珍木蠧蟲拾遺釋名蝎音曷蝤蠐音囚齊蛣􅔒音乞屈蛀蟲時珍曰蠧古又作螙食木蟲也會意爾雅云蝤蠐蝎也蝎蛣􅔒也郭璞云凡木中螙蟲通名為蝎但所居各異耳集解藏器曰木蠧一如蠐螬節長足短生腐木中穿木如錐至春雨化為天牛蘓恭以為蠐螬深誤矣詳蠐螬下時珍曰似蠶而在木中食木者為蝎似蠶而在樹上食葉者為蠋似蠋而小行則首尾相就屈而後伸者為尺蠖似尺蠖而青小者為螟蛉三蟲皆不能穴木至夏俱羽化為蛾惟穴木之蠧宜入藥用氣味辛平有小毒主治血瘀勞損月閉不調腰脊痛有損血及心腹間疾藏器發明時珍曰各木性味良毒不同而蠧亦隨所居所食而異未可一槩用也古方用蠧多取桑栁構木者亦各有義焉桑蠧蟲别錄校正自有名未用移入此釋名桑蝎音曷氣味甘温無毒主治心暴痛金瘡肉生不足别錄胸下堅滿障翳瘀腫治風􅇙日華治眼得效蜀本去氣補不足治小兒乳霍藏器小兒驚風口瘡風疳婦人崩中漏下赤白墮胎下血産後下痢時珍附方新二崩中漏下赤白用桑蝎燒灰温酒服方寸匕日二千金墮胎下血不止桑本中蝎蟲燒末酒服方寸匕日二蟲屎亦可普濟方糞主治腸風下血婦人崩中産痢小兒驚風胎癬咽喉骨哽時珍附方新四腸風下血枯桑樹下蟲矢燒存性酒服一錢聖惠産後下痢日五十行用桑木裏蠧蟲糞炒黄急以水沃之稀稠得所服之以瘥為度此獨孤訥祭酒方也必效方小兒胎癬小兒頭生瘡手爬處即延生謂之胎癬先以葱塩湯洗淨用桑木蛀屑燒存性入輕粉等分油和敷之聖惠咽喉骨骾桑木上蟲糞米醋煎呷永類鈐方栁蠧蟲綱目集解時珍曰栁蠧生栁木中甚多内外潔白至春夏化為天牛諸家註蠐螬多取之亦誤矣氣味甘辛平有小毒主治瘀血腰脊瀝血痛心腹血痛風􅇙風毒目中膚翳功同桑蠧時珍糞主治腸風下血産後下痢口瘡耳腫齒齦風毒時珍附方新三口瘡風疳小兒病此用栁木蛀蟲矢燒存性為末入麝香少許搽之雜木亦可新㓜㓜書齒齦風腫用栁蠧末半合赤小豆炒黒豆炒各一合栁枝一握地骨皮一両毎用三錢煎水熱潄御藥院方耳腫風毒腫起出血取栁蟲糞化水取清汁調白礬末少許滴之後肘桃蠧蟲日華校正本經原附桃核仁下今分入此集解别錄曰食桃樹蟲也藏器曰桃蠧辟鬼皆隨出而各有功也氣味辛温無毒主治殺鬼邪惡不祥本經食之肥人悦顔色日華糞主治辟温疫令不相染為末水服方寸匕子母秘錄桂蠧蟲綱目集解藏器曰此桂樹中䖝辛美可啖時珍曰按漢書陸賈傳南越尉陀獻桂蠧二器又大業拾遺錄云隋時始安獻桂蠧四瓶以蜜漬之紫色辛香有味啖之去痰飲之疾則此物自漢隋以來用充珍味矣氣味辛温無毒主治去冷氣藏器除寒痰澼飲冷痛時珍糞主治獸骨哽煎醋潄嚥時珍柘蠧蟲拾遺集解藏器曰陶註詹糖云偽者以柘蟲屎為之此即柘蠧在木間食木之屎也詹糖燒之香而此屎不香既不相似亦難為之屎主治破血藏器棗蠧蟲綱目集解時珍曰此即蝤蠐之在棗樹中者屎主治聤耳出膿水研末同麝香少許吹之時珍普濟竹蠧蟲綱目集解時珍曰竹蠧生諸竹中狀如小蠶老則羽化為硬翅之蛾氣味缺主治小兒蠟梨頭瘡取慈竹内者擣和牛溺塗之時珍發明時珍曰竹蠧蟲古方未見用者惟袖珍方治小兒蠟梨用之按淮南萬畢術云竹蟲飲人自言其誠高誘註云以竹蟲三枚竹黄十枚和匀每用一大豆許燒入酒中令人飲之勿至大醉叩問其事必得其誠也此法傳自古典未試其果驗否姑載之蛀末主治聤耳出膿水湯火傷瘡時珍附方新六聤耳出水苦竹蛀屑狼牙白斂等分為末和勻頻摻之聖惠耳出臭膿用竹蛀䖝末臙脂坯子等分麝香少許為末吹之朱氏集驗耳膿作痛因水入耳内者如聖散用箭簳内蛀末一錢膩粉一錢麝香半錢為末以綿杖繳盡送藥入耳以綿塞定有惡物放令流出甚者三度必愈普濟湯火傷瘡竹蠧蛀末傅之見外臺秘要濕毒臁瘡枯竹蛀屑黄蘖末椒茶湯洗淨分先以葱之日一上牙齒疼痛蛀竹屑陳皮各一両為末烏梅肉同研如泥傅之出救急方蘆蠧蟲拾遺集解藏器曰出蘆節中狀如小蠶氣味甘寒無毒主治小兒飲乳後吐逆不入腹取蟲二枚煑汁飲之嘔逆與哯乳不同乳飽後哯出者為哯乳也藏器蒼耳蠧蟲綱目釋名麻蟲集解時珍曰蒼耳蠧蟲生蒼耳梗中狀如小蠶取之但看梗有大蛀眼者以刀截去兩頭不蛀梗多收線縳掛簷下其蟲在内經年不死用時取出細者以三條當一用之氣味缺主治疔腫惡毒燒存性研末油調塗之即效或以麻油浸死收貯每用一二枚擣傅即時毒散大有神效時珍發明時珍曰蒼耳治疔腫腫毒故蟲亦與之同功古方不見用近時方法每用之附方新三一切疔腫及無名腫毒惡瘡劉松石經驗方用蒼耳草梗中蟲一條白梅肉三四分同搗如泥貼之立愈江聖濟總錄用麻蟲即蒼耳草内蟲炒黄色白殭蠶茶各等分為末蜜調塗之蟲又用蒼耳節内蟲四十九條搥碎入人言少頃許搥成塊刺瘡令破傅之少頃以手撮出根即愈青蒿蠧蟲集解時珍曰此青蒿節間蛾也狀如小蠶久亦成氣味缺主治急慢驚風用蟲擣和硃砂汞粉各五分丸粟粒大一嵗一丸乳汁服時珍發明時珍曰古方不見用者保嬰集用治驚風云十不失一其詩云一半硃砂一半雪其功只在青蒿節任教死去也還魂服時須用生人血皂莢蠧蟲綱目集解氣味辛主治蠅入人耳害人研爛同鱓魚血㸃之危氏茶蛀蟲綱目集解時珍曰此裝茶籠内蛀蟲也取其屎用蛀屑主治聤耳出汁研末日日繳淨摻之時珍惠出聖蚱蟬本經中品釋名蜩音調齊女時珍曰按王充論衡云蠐螬化腹蜟腹蜟折背出而為蟬則是腹蜟者育于腹也蟬者變化相禪也蚱音窄蟬聲也蜩其音調也崔豹古今注言齊王后怨王而死化為蟬故蟬名齊女此謬説也按詩人美莊姜為齊侯之子螓首蛾眉螓亦蟬名人隱其名呼為齊女義盖取此其品甚多詳辨見下集解别錄曰蚱蟬生楊栁上五月采蒸乾之勿令蠧𢎞景曰蚱蟬啞蟬雌蟬也不能鳴蟬類甚多此云栁上乃詩云鳴蜩嘒嘒者形大而黒五月便鳴俗云五月不鳴嬰兒多災故其治療亦專主小兒昔人噉之故禮有雀鷃蜩􅢮而傴僂丈人掇之也其四五月鳴而小紫青色者蟪蛄也莊子云蟪蛄不知春秋是矣離騷誤以蟪蛄為寒螿爾寒螿九月十月中鳴聲甚淒急七八月鳴而色青者名蛁蟟二月中便鳴者名䗿母似寒螿而小恭曰蚱蟬鳴蟬也諸蟲皆以雄為良陶云雌蟬非矣頌曰按玉篇云蚱蟬聲也正與月令仲夏蟬始鳴相合恭説得之爾雅云蝒馬蜩乃蟬之最大者即此也蟬類雖衆獨此一種入藥醫方多用蟬殻亦此殻也本生土中云是蜣蜋所轉丸久而化成此蟲至夏登木而蛻宗奭曰蚱蟬夏月身與聲俱大始終一般聲乗昏夜出土中升高處拆背殻而出日出則畏人且畏日炙乾其殻不能蛻也至時寒則墜地小兒畜之雖數日亦不飲食古人言其飲風露觀其不糞而溺亦可見矣時珍曰蝉諸蜩總名也皆自蠐螬腹蜟變而為蟬亦有轉丸化成者皆三十日而死俱方首廣額兩翼六足以脇而鳴吸風飲露溺而不糞古人食之夜以火取謂之耀蟬爾雅淮南子揚雄方言陸機草木疏陳藏器本草諸書所載往往混亂不一今考定于左庶不誤用也夏月始鳴大而色黒者蚱蟬也又曰蝒音綿曰馬蜩豳詩五月鳴蜩者是也頭上有花冠曰螗蜩曰蝘曰胡蟬蕩詩如蜩如螗者是也具五色者曰蜋蜩見夏小正並可入藥用小而有文者曰螓曰麥蚻小而色青緑者曰茅蜩曰茅䘁秋月鳴而色青紫者曰蟪蛄曰蛁蟟曰蜓蚞曰螇螰曰蛥蚗音舌決小而色青赤者曰寒蟬曰寒蜩曰寒螿曰蜺未得秋風則瘖不能鳴謂之啞蟬亦曰瘖蟬二三月鳴而小於寒螿者曰􆂵母並不入藥蚱蟬氣味鹹甘寒無毒甄權曰酸主治小兒驚癎夜啼癲病寒熱本經驚悸婦人乳難胞衣不出能墮胎别錄小兒癎絶不能言蘓恭小兒驚哭不止殺疳蟲去壯熱治腸中幽幽作聲藥性發明藏器曰本功外其腦煮汁服之主産後胞衣不下自有正傳時珍曰蟬主産難下胞衣亦取其能退蛻之義聖惠治小兒發癎有蚱蟬湯蚱蟬散蚱蟬丸等方今人只知用蛻而不知用蟬也附方新三百日𤼵驚蚱蟬去翅足炙三分赤芍藥三分黄芩二分水二盞煎一盞温服聖惠方破傷風病無問表裏角弓反張秋蟬一箇地膚子炒八分麝香少許為末酒服二錢上同頭風疼痛蚱蟬二枚生研入乳香硃砂各半分丸小豆大每用一丸隨左右納鼻中出黄水為效聖濟總錄蟬蛻釋名蟬殻枯蟬腹蜟並别錄金牛兒修治時珍曰凡用蛻殻沸湯洗去泥土翅足漿水煮過晒乾用氣味鹹甘寒無毒主治小兒驚癎婦人生子不下燒灰水服治久痢别錄小兒壯熱驚癎止渇藥性研末一錢井華水服治啞病藏器除目昏障翳以水煎汁服治小兒瘡疹出不快甚良宗奭治頭風眩運皮膚風熱痘疹作癢破傷風及丁腫毒瘡大人失音小兒噤風天弔驚哭夜啼隂腫時珍發明好古曰蟬蛻去翳膜取其蜕義也蟬性蛻而退翳蛇性竄而袪風因其性而為用也時珍曰蟬乃土木餘氣所化飲風吸露其氣清虚故主療皆一切風熱證古人用身後人用蜕大抵治臟腑經絡當用蟬身治皮膚瘡瘍風熱當用蟬蛻各從其類也又主啞病夜啼者取其晝鳴而夜息也附方舊二四新十小兒夜啼心鑑治小兒一百二十日内夜啼用蟬蛻四十九箇去前截用後截為末分四服鈎藤湯調灌之下普濟蟬花散治小兒夜啼不止狀若鬼祟用蟬蛻半截為末一字薄荷湯入酒少許調下或者不信將上半截為末前湯調下即復啼也古人立方莫知其妙小兒驚啼啼而不哭煩也哭而不啼躁也用蟬蛻二七枚去翅足為末入硃砂末一字蜜調與吮之口活㓜議小兒天弔頭目仰視痰塞内熱用金牛兒即蟬蛻以漿水煑一日晒乾為末每用一字冷水調下衛生易簡方小兒噤風初生口噤不乳用蟬蛻二七枚全蠍去毒二七枚為末入輕粉末少許乳汁調灌全㓜心鑑破傷風病發熱醫學正傳用蟬蛻炒研酒服一錢神效即普濟方用蟬蛻為末葱涎調塗破處時取去惡水立效名追風散頭風旋運蟬殻一兩㣲炒為末不時酒下一錢白湯亦可聖惠皮膚風癢蟬蛻薄荷葉等分為末酒服一錢日三集驗痘瘡作癢蟬蛻三七枚甘草灸各一錢水煎服之心鑑痘後目翳蟬蛻為末每服一錢羊肝煎湯下日二錢氏聤耳出膿蟬蛻半兩燒存性麝香半錢炒右為末綿裹塞之追出惡物效海上小兒隂腫多因坐地風襲及蟲蟻所吹用蟬蛻半兩煎水洗仍服五苓散即腫消痛止危氏胃熱吐食清膈散用蟬蛻五十箇去泥滑石一兩為末每服二錢水一盞入蜜調服衛生家寶方丁瘡毒腫不破則毒入腹青囊雜纂用蟬蛻炒為末蜜水調服一錢外以津和塗之候醫方大成用蟬蛻殭蠶等分為末醋調塗瘡四圍根出拔去再塗蟬花類證釋名冠蟬禮註胡蟬毛詩螗蜩同上蝘時珍曰花冠以象名也胡其狀如胡也唐黒色也古俗謂之胡蟬江南謂之螗蜀人謂之蟬花集解慎㣲曰蟬花所在有之生苦竹林者良花出頭上七月采頌曰出蜀中其蟬頭上有一角如花冠狀謂之蟬花彼人齎蛻至都下醫工云入藥最竒宗奭曰乃是蟬在殻中又出而化為花自頂中出也時珍曰蟬花即冠蟬也禮記所謂􅢮則冠而蟬有緌者是矣緌音㽔冠纓也陸雲寒蟬賦云蟬有五德頭上有幘文也含氣吸露清也黍稷不享亷也處不巢居儉也應候有常信也陸佃埤雅云螗首方廣有冠似蟬而小鳴聲清亮宋祁方物贊云蟬之不蛻者至秋則花其頭長一二寸黄碧色並指此也氣味甘寒無毒主治小兒天弔驚癎瘈瘲夜啼心悸慎㣲功同蟬蛻又止瘧時珍蜣蜋本經下品釋名蛣蜣音詰羗推丸𢎞景推車客綱目黑牛兒同上鐵甲將軍同上夜遊將軍𢎞景曰莊子云蛣蜣之智在於轉丸喜入糞土中取屎丸而推却之故俗名推丸時珍曰崔豹古今注謂之轉丸弄丸俗呼推車客皆取此義也其蟲深目高鼻狀如羗胡背負黒甲狀如武士故有蜣蜋將軍之稱集解别錄曰蜣蜋生長沙池澤𢎞景曰其類有三四種以大而鼻頭扁者為真韓保昇曰此類多種所在有之以鼻高目深者入藥名胡蜣蜋宗奭曰蜣蜋有大小二種大者名胡蜣蜋身黒而光腹翼下有小黄子附母而飛晝伏夜出見燈光則來宜入藥用小者身黒而暗晝飛夜伏狐並喜食之小者不堪用惟牛馬脹結以三十枚研水灌之絶佳時珍曰蜣蜋以土包糞轉而成丸雄曳雌推置于坎中覆之而去數日有小蜣蜋出葢孚乳于中也附錄蜉蝣時珍曰蜉蝣一名渠畧似蛣蜣而小大如指頭身狹而長有角黄黑色甲下有翅能飛夏月雨後叢生糞土中朝生暮死猪好啖之人取炙食云美於蟬也葢蜣蜋蜉蝣腹蜟天牛皆蠐螬蠧蝎所化此亦蜣蜋之一種不可不知也或曰蜉蝣水蟲也狀似蠶蛾朝生暮死蜣蜋修治别錄曰五月五日採取蒸藏之臨用去足火灸勿置水中令人吐氣味鹹寒有毒好古曰酸肉之才曰畏羊角羊石膏主治小兒驚癎瘈瘲腹脹寒熱大人癲疾狂陽本經手足端寒肢満賁豚擣丸塞下部引痔蟲出盡永瘥别錄治小兒疳蝕藥性能墮胎治疰忤和乾姜傅惡瘡出箭頭日華燒末和醋傅蜂漏藏器去大腸風熱權度治大小便不通下痢赤白脫肛一切痔瘻丁腫附骨疽瘡癧瘍風灸瘡出血不止鼻中息肉小兒重舌時珍𤼵明時珍曰蜣蜋乃手足陽明足厥隂之藥故所主皆三經之病總㣲論言古方治小兒驚癎蜣蜋為第一而後醫未見用之葢不知此義耳頌曰箭鏃入骨不可移者楊氏家藏方用巴豆㣲炒同蜣蜋擣塗斯須痛定必㣲痒忍之待極痒不可忍乃撼動拔之立出此方傳於夏侯鄆鄆初為閬州有人額有箭痕問之云從馬侍中征田悦中箭侍中與此藥立出後以生肌膏傅之乃愈因以方付鄆云凡諸瘡皆可療也鄆至洪州逆旅主人妻患瘡呻吟用此立愈簷翰院叢記云李定言石藏用近世良醫也有人承溜浣手覺物入爪甲内初若絲髪數日如線伸縮不能始悟其為龍伏藏也乃叩藏用求治藏用曰方書無此以意治之耳末蜣蜋塗指庶免震厄其人如其言後因雷火遶身急針挑之果見一物躍出亦不為災醫説亦載此事附方舊七六新十小兒驚風不拘急慢用蜣蜋一枚杵爛以水一小盞於百沸湯中盪熱去滓飲之小兒疳疾土裹蜣蜋煨熟與食之韓氏醫通小兒重舌蜣蜋燒末唾和傅舌上子母秘錄膈氣吐食用地牛兒二箇推屎蟲一公一母同入罐中待蟲食盡牛兒以泥裹煨存性用去泥陳皮二錢以巴豆同炒過去豆將陳皮及蟲為末每用一二分吹入咽中吐痰三四次即愈孫氏集效方赤白下痢黒牛散治赤白痢噤口痢及泄瀉用黒牛兒即蜣蜋一名鐡甲將軍燒研毎服半錢或一錢燒酒調服小兒以黄酒服立效李延壽方大腸脫肛蜣蜋燒存性為末入氷片研匀摻肛上托之即入醫學集成大小便閉經月欲死者本事推車散用推車客七箇男用頭女用身土狗七箇男用身女用頭新瓦焙研末用虎目樹南向皮煎汁調服只一服即通蜣楊氏經驗方治大小便不通六七月尋牛糞中大蜋十餘枚線穿隂乾收之臨時取一箇全者放淨磚上四面以灰火烘乾當腰切斷如大便不通用上截小便不通用下截各為細末取井華水服之二便不通全用即解大腸閉塞蜣蜋炒去翅足為末熱酒服一錢聖惠小便轉胞不通用死蜣蜋二枚燒末井華水一盞調服千金小便血淋蜣蜋研水服鮑氏痔漏出水唐氏方用蜣蜋一枚隂乾入氷片少許為細末紙撚蘸末入孔内漸漸生肉藥自退出即愈先袖珍方用蜣蜋焙乾研末以礬湯洗過貼之一切漏瘡不拘蜂瘻䑕瘻蜣蜋燒末醋和傅千金附骨疽漏蜣蜋七枚同大麥擣傅劉涓子方一切惡瘡及沙虱水弩惡疽五月五日取蜣蜋蒸過隂乾為末油和傅之聖惠丁腫惡瘡楊栁上大烏殻硬蟲或地上新糞内及泥堆中者生取以蜜湯浸死新瓦焙焦為末先以燒過針撥開好醋調傅之普濟方無名惡瘡忽得不識者用死蜣蜋杵汁塗之廣利灸瘡血出不止用死蜣蜋燒研猪脂和塗千金方大赫瘡疾急防毒氣入心先灸後用乾蜣蜋為末和鹽水傅四圍如韭菜濶日一上之肘後癧瘍風病取塗中死蜣蜋杵爛揩瘡令熱封之一宿瘥外臺秘要鼻中息肉蜣蜋十枚納青竹筒中油紙密封置厠坑内四十九日取出晒乾入麝香少許為末塗之當化為水也聖惠沙塵入目取生蜣蜋一枚以其背於眼上影之自出肘后方下部䘌蟲痛痒膿血旁生孔竅蜣蜋七枚五月五日收者新牛糞半兩肥羊肉一兩炒黄同擣成膏丸蓮子大炙熱綿裹納肛中半日即大便中蟲出四度永瘥董炳集驗方心主治丁瘡頌曰按劉禹錫纂栁州救三死方云元和十一年得丁瘡凡十四日益篤善藥傅之莫效長慶賈方伯教用蜣蜋心一夕百苦皆已明年正月食羊肉又大作再用如神驗其法用蜣蜋心在腹下度取之其肉稍白是也貼瘡半日許再易血盡根出即愈蜣蜋畏羊肉故食之即發其法葢出葛洪肘後方轉丸見土部附錄天社蟲别錄有名末用曰味甘無毒主絶孕益氣蟲狀如犬大腰食草木葉三月采時珍曰按張揖廣雅云天社蜣蜋也與此不知是一類否天牛綱目釋名天水牛綱目八角兒同上一角者名獨角仙時珍曰此蟲有黒角如八字似水牛角故名亦有一角者集解藏器註蠐螬云蝎蠧在朽木中食木心穿如錐刀口黒身長足短節慢無毛至春雨後化為天牛兩角狀如水牛亦有一角者色黒背有白㸃上下縁木飛騰不逺時珍曰天牛處處有之大如蟬黒甲光如漆甲上有黄白㸃甲下有翅能飛目前有二黒角甚長前向如水牛角能動其喙黒而扁如鉗甚利亦似蜈蚣喙六足在腹乃諸樹蠧蟲所化也夏月有之出則主雨按爾雅蠰囓桑也郭璞註云狀似天牛長角體有白㸃善囓桑樹作孔藏之江東呼為囓髪此以天牛囓桑為二物也而蘓東坡天水牛詩云兩角徒自長空飛不服箱為牛竟何益利吻穴枯桑此則謂天牛即囓桑也大抵在桑樹者即為囓桑爾一角者名獨角仙入藥並去甲翅角足用氣味有毒主治瘧疾寒熱小兒急驚風及丁腫箭鏃入肉去痣靨時珍發明時珍曰天牛獨角仙本草不載宋金以來方家時用之聖惠治小兒急驚風吹鼻定命丹宣明方㸃身面痣靨芙蓉膏中俱用獨角仙葢亦毒物也藥多不錄蝎化天牛有毒蠐螬化蟬無毒又可見蠐螬與蝎之性味良惡也附方新三疔腫惡毒透骨膏用八角兒楊栁上者隂乾去殻四箇如冬月無此用其窠代之蟾酥半錢巴豆仁一箇粉霜雄黄麝香少許先以八角兒研如泥入溶化黄蠟少許同衆藥末和作膏子密收每以針刺瘡頭破出血用榆條送膏子麥粒大入瘡中以雀糞二箇放瘡口瘡回即止不必再用也忌冷水如針破無血繫是着骨疔即男左女右中指甲末刺出血糊藥又無血即刺足大拇血糊藥如都無血必難醫也箭鏃入肉用天水牛取一角者小瓶盛之入硇砂一錢同水數滴在内待自然化水取滴傷處即出也寒熱瘧疾猪膏丸治瘧疾發渇往來不定臘猪膏二兩獨角仙一枚獨頭蒜一箇樓葱一握五月五日三家粽尖於五月五日五更時淨處露頭赤脚舌挂上齶回面向北擣一千丸皂子大每以新綿裹一丸繫臂男左女一聖惠附錄飛生蟲拾遺藏器曰狀如囓髪頭上有角其角無毒主難産燒末水服少許亦可執之時珍曰此亦天牛别類也與鼺䑕同功故亦名飛生螻蛄本經下品釋名蟪蛄本經天螻本經􅕪斛經本螻蟈月令仙姑古今注石䑕古今注梧䑕荀子土狗俗名時珍曰周禮註云螻臭也此蟲氣臭故得螻名曰姑曰婆曰娘子皆稱蟲之名蟪蛄同蟬名螻蟈同蛙名石䑕同碩䑕名梧䑕同飛生名皆名同物異也集解别録曰螻蛄生東城平澤夜出者良夏至取暴乾𢎞景曰此物頗協鬼神昔人獄中得其力今人夜見多打殺之言為鬼所使也頌曰今處處有之穴地糞壤中而生夜則出外求食荀子所謂梧䑕五技而窮蔡邕所謂碩䑕五能不成一技者皆指此也魏書碩䑕乃大䑕與此同名而技不窮固不同耳五技者能飛不能過屋能緣不能窮木能游不能度谷能穴不能掩身能走不能免人宗奭曰此蟲立夏後至夜則鳴聲如蚯蚓月令螻蟈鳴者是矣時珍曰螻蛄穴土而居有短翅四足雄者善鳴而飛雌者腹大羽小不善飛翔吸風食土喜就燈光入藥用雄或云用火燒地赤置螻於上任其跳死覆者雄仰者雌也類從云磨鐵致蛄汗韀引兔物相感也氣味鹹寒無毒日華曰涼有毒去翅足炒用主治産難出肉中刺潰癰腫下哽噎解毒除惡瘡本經水腫頭面腫日華利大小便通石淋治瘰癧骨哽時珍治口瘡甚效震亨發明𢎞景曰自腰以前甚澀能止大小便自腰以後甚利能下大小便朱震亨曰螻蛄治水甚效但其性急虛人戒之頌曰今方家治石淋導水用螻蛄七枚鹽二兩新瓦上鋪葢焙乾研末每温酒服一錢七即愈也附方舊一十新二十種水病腹滿喘促不得卧聖惠方以螻蛄五枚焙乾為末食前白湯服一錢小便利為效楊氏加甘遂末一錢商陸汁一匙取下水為效忌鹽一百日小便秘者聖惠用螻蛄下截焙研水服半錢立通乾保命集用螻蛄一箇葡萄心七箇同研露一夜日研末酒服乾坤秘韞用端午日取螻蛄隂乾分頭尾焙收治上身用頭末七箇治中用腹末七箇治下用尾末七箇食前酒服大腹水病肘後用螻蛄灸熱日食十箇遂普濟半邊散治水病用大㦸芫花甘大黄各三錢為末以土狗七枚五月能飛者擣葱鋪新瓦上焙之待乾去翅足每箇剪作兩半邊分左右記收欲退左即以左邊七片焙研入前末二錢以淡竹葉天門冬煎湯五更調服候左退三日後服右邊如前法㗜鼻消水面浮甚者用土狗一箇輕粉二分半為末毎㗜少許入鼻内黄水出盡為妙楊氏家藏石淋作痛方見發明下小便不通葛洪方用大螻蛄二枚取小體以水一升漬飲須臾即通談壽域方用土狗下截焙研調服半錢生研亦可野翁方加車前草同擣汁服唐氏經驗方用土狗後截和麝擣納臍中縳定即通管醫方摘要用土狗一箇灸研入氷片麝香少許翎吹入莖内大小便閉經月欲死普濟方用土狗推車客各七枚並男用頭女用身瓦焙焦為末以向南樗皮煎汁飲一服神效胞衣不下困極腹脹則殺人螻蛄一枚水煮二十沸灌入下喉即出也延年方臍風出汗螻蛄甘草等分並灸為末傅之總錄牙齒疼痛土狗一箇舊糟裹定濕紙包煨焦去糟研末傅之立止本事𦂳唇裂痛螻蟈燒灰傅之千金方塞耳治聾螻蛄五錢穿山甲炮五錢麝香少許為末葱汁和丸塞之外用㗜鼻藥即通普濟頸項瘰癧用帶殻螻蛄七枚生取肉入丁香七粒於殻内燒過與肉同研用紙花貼之救急方箭鏃入肉以螻蛄杵汁滴上三五度自出千金方鍼刺在咽同上誤吞鈎線螻蛄去身吞其頭數枚勿令本人知聖惠方螢火本經下品釋名夜光本經熠燿音煜躍即炤音照夜炤景天救火據火挾火並吳普宵燭古今注丹鳥宗奭曰螢常在大暑前後飛出是得大火之氣而化故明炤如此時珍曰螢從熒省熒小火也㑹意豳風熠燿宵行宵行乃蟲名熠燿其光也詩注及本草皆誤以熠燿為螢名矣集解别錄曰螢火生階地池澤七月七日取隂乾𢎞景曰此是腐草及爛竹根所化初時如蛹腹下已有光數日變而能飛方術家捕置酒中令死乃乾之俗用亦稀時珍曰螢有三種一種小而宵飛腹下光明乃茅根所化也呂氏月令所謂腐草化為螢者是也一種長如蛆蠋尾後有光無翼不飛乃竹根所化也一名蠲俗名螢蛆明堂月令所謂腐草化為蠲者是也其名宵行茅竹之根夜視有光復感濕熱之氣遂變化成形爾一種水螢居水中唐李子卿水螢賦所謂彼何為而化草此何為而居泉是也入藥用飛螢氣味辛㣲温無毒主治明目本經療青盲甄權小兒火瘡傷熱氣蠱毒鬼疰通神精别錄發明時珍曰螢火能辟邪明目葢取其炤幽夜明之義耳神仙感應篇載務成螢火丸事蹟甚詳而龎安常總病論亦極言其效驗云曽試用之一家五十餘口俱染疫病惟四人帶此者不病也許叔㣲傷寒歌亦稱之予亦恒欲試之因循未暇耳龎翁為蘓黄器重友想不虛言神仙感應篇云務成子螢火丸主辟疾病惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刄盜賊兇害昔漢冠軍將軍武威太守劉子南從道士尹公受得此方永平十二年於北界與虜戰敗績士卒畧盡子南被圍矢下如雨未至子南馬數尺矢輒墮地虜以為神乃解去子南以方敎子弟為將皆未嘗被傷也漢末青牛道士得之以傳安定皇甫隆隆以傳魏武帝乃稍有人得之故一名冠將丸又名武威丸用螢火鬼箭羽蒺藜各一兩雄黄雌黄各二兩羖羊角煆存性一兩半礬石火燒二兩鐵錘柄入鐵處燒焦一兩半俱為末以雞子黄丹雄雞冠一具和擣千下丸如杏仁作三角絳囊盛五丸帶於左臂上從軍繫腰中居家掛户上甚辟盜賊也附方新二黑髪七月七日夜取螢火蟲二七枚撚髪自黒也便民圖纂方明目勞傷肝氣目暗方用螢火二七枚納大鯉魚膽中隂乾百日為末每㸃少許極妙一方用白犬膽聖惠方衣魚本經下品釋名白魚本經蟫魚覃淫尋三音蛃魚郭璞壁魚圖經蠧魚宗奭曰衣魚生久藏衣帛中及書紙中其形稍似魚其尾又分二岐故得魚名時珍曰白其色也壁其居也蟫其狀態也丙其尾形也集解别錄曰衣魚生咸陽平澤頌曰今處處有之衣中乃少而書卷中甚多身白有厚粉以手觸之則落段成式云補闕張周見壁上瓜子化為壁魚因知列子朽爪化魚之言不虚也俗傳壁魚入道經中食神仙字則身有五色人得吞之可致神仙唐張易蠧之之子乃多書神仙字碎剪置瓶中取魚投之冀其食而不能得遂致心疾書此以解俗説之惑時珍曰衣魚其蠧衣帛書畫始則青色老則有白粉碎之如銀可打紙箋按段成式言何諷於書中得一髪長四寸捲之無端用力絶之兩端滴水一方士云此名脉望乃衣魚三食神仙字則化為此夜持向天可以墜星求丹又異於吞魚致仙之說大抵謬妄宜辯正之氣味鹹温無毒甄權曰有毒草大明曰畏芸草莽萵苣主治婦人疝瘕小便不利小兒中風項强背起摩之本經療淋塗瘡滅瘢墮胎别錄小兒淋閉以摩臍及小腹即通陶𢎞景合鷹屎殭蠶同傅瘡瘢即滅蘓頌主小兒臍風撮口客忤天弔風癎口喎重舌目翳目眯屎血轉胞小便不通時珍發明時珍曰衣魚乃太陽經藥故所主中風項强驚癎天弔目翳口喎淋閉皆手足太陽經病也范汪方治小便不利取二七枚擣分作數丸頓服即通濟書云明帝病篤勅臺省求白魚為藥此乃神農藥古方盛用而今人罕知矣附方舊五新七小兒胎寒腹痛汗出用衣中白魚二七枚絹包于兒腹上回轉摩之以愈為度方聖惠小兒撮口壁魚兒研末每以少許塗乳令兒吮之聖惠小兒客忤項强欲死衣魚十枚研傅乳上吮之入咽立愈或以二枚塗母手中掩兒臍得吐下愈外仍以摩項强處小兒天弔目晴上視用壁魚兒乾者十箇濕者五箇用乳汁和研灌之聖惠方小兒癎疾白魚酒用衣中白魚七枚竹茹一握酒一升煎二合温服之外臺偏風口喎取白魚摩耳左喎摩右右喎摩左正乃已外臺秘要小兒重舌衣魚燒灰傅舌上千金翼目中浮翳書中白魚未注少許於翳上日二外臺沙塵入目不出者杵白魚以乳汁和滴目中即出或為末㸃之千金小便不通白魚散用白魚滑石亂髪等分為散飲服半錢七日三金匱要畧小便轉胞不出納衣魚一枚於莖中千金方婦人尿血衣中白魚二十枚納入隂中子母秘錄䑕婦本經下品釋名䑕負𢎞景負蟠煩雅爾䑕姑𢎞景䑕粘蜀本蜲􅡂别錄蛜蝛伊威本經濕生蟲圖經地雞綱目地虱𢎞景曰䑕婦爾雅作䑕負言䑕多在坎中背粘負之故曰䑕負今作婦字殊似乖理韓保昇曰多在甕器底及土坎中常惹着䑕背故名俗亦謂之䑕粘猶棄耳名羊負來也時珍曰按陸佃埤雅云䑕負食之令人善淫故有婦名又名䑕姑猶䑕婦也䑕粘猶䑕負也然則婦負二義俱通矣因濕化生故俗名濕生蟲曰地雞地虱者象形集解别錄曰䑕婦生魏郡平谷及人家地上五月五日采頌曰今處處有之多在下濕處甕器底及土坎中詩云蛜蝛在室鄭𤣥言家無人則生故也宗奭曰濕生蟲多足大者長三四分其色如蚓背有横紋蹙起用處絶少時珍曰形似衣魚稍大灰色氣味酸温無毒大明曰無毒主治氣癃不得小便婦人月閉血瘕癎痓寒熱利水道墮胎日華治久瘧寒熱風蟲牙齒疼痛小兒撮口驚風鵞口瘡痘瘡倒靨解射工毒蜘蛛毒蚰蜒入耳時珍發明頌曰張仲景治久瘧大鱉甲丸中用之以其主寒熱也時珍曰古方治驚瘧血病多用之葢厥隂經藥也太平御覽載葛洪瘧方用䑕負蟲十四枚各以槽釀之丸十四丸瘧發時水吞下便愈而葛洪肘後方治瘧疾寒熱用䑕負四枚餹裹為丸水下便斷又用䑕負豆䜴各十四枚擣丸芡子大未發前日湯服二丸將發時再服二丸便止又蜘蛛毒人或瘡取此蟲食其絲即愈詳蜘蛛下附方舊一新八産婦尿秘䑕婦七枚熬研末酒服千金撮口臍風聖惠用䑕負蟲杵絞汁少許灌之服陳氏生杵䑕負及雀甕汁之鵞口白瘡地雞研水塗之即愈壽域方風蟲牙痛濕生蟲一枚綿裹咬之勿令人知聖惠風牙疼痛濕生蟲巴豆仁胡椒各一枚研匀飯丸緑豆大綿裹一丸咬之良久涎出吐去效不可言經效濟世方痘瘡倒靨濕生蟲為末酒服一字即起痘疹論蚰蜒入耳濕生蟲研爛塗耳邊自出或攤紙上作撚安入耳中亦出衛生寶鑑射工溪毒䑕婦豆䜴巴豆各三枚脂和塗之後肘附錄丹戩别錄有名未用曰味辛有毒主心腹積血生蜀郡狀如䑕婦青股赤頭七月七日采一名飛龍䗪蟲音蔗品本經中釋名地鼈本經土鼈别錄地蜱蟲綱目簸箕蟲衍義蚵蚾蟲綱目過街𢎞景曰形扁扁如鼈故名土鼈宗奭曰今人呼為簸箕蟲亦形象也時珍曰按陸農師云䗪逢申日則過街故名過街袖珍方名蚵蚾蟲鮑氏方名地蜱蟲集解别錄曰生河東川澤及沙中人家牆壁下土中濕處十月采暴乾𢎞景曰形扁如鼈有甲不能飛小有臭氣恭曰此物好生䑕壤土中及屋壁下狀似䑕婦而大者寸餘形小似鼈無甲而有鱗小兒多捕以負物為戯時珍曰處處有之與燈蛾相牝牡氣味鹹寒有毒甄權曰鹹苦蒲之才曰畏皂莢菖屋遊主治心腹寒熱洗洗音洒血積癥瘕破堅下血閉生子大良本經月水不通破留血積聚藥性通乳脉用一枚擂水半合濾服勿令知之宗奭行産後血積折傷瘀血治重舌木舌口瘡小兒腹痛夜啼時珍發明頌曰張仲景治雜病方及久病積結有大黄䗪蟲丸又有大鼈甲丸及婦人藥並用之以其有破堅下血之功也附方新七大黄䗪蟲丸治産婦腹痛有乾血用䗪蟲二十枚去足桃仁二十枚大黄二兩為末煉蜜杵和分為四丸每以一丸酒一升煑取二合温服當下血也張仲景方木舌腫强塞口不治殺人䗪蟲炙五枚食鹽半兩為末水二盞煎十沸時時熱含吐涎瘥乃止聖惠方重舌塞痛地鼈蟲和生薄荷研汁帛包捻舌下腫處一名地蜱蟲也鮑氏方腹痛夜啼􅀢蟲炙芍藥芎藭各二錢為末每用一字乳汁調下聖惠方折傷接骨楊拱摘要方用土鼈焙存性為末每服二三錢接骨神效一方生者擂汁酒服袖珍方用蚵蚾即土鼈六錢隔紙砂鍋内焙乾自然銅二兩用火煆醋淬七次為末每服二錢温酒調下病在上食後病在下食前神效董炳集驗方用土鼈隂乾一箇臨時旋研入藥乳香沒藥龍骨自然銅火煆醋淬各等分麝香少許為末每服三分入土鼈末以酒調下須先整定骨乃服藥否則接挫也此乃家傳秘方慎之又可代杖蜚蠊費亷品本經中釋名石薑唐本盧蜰音肥負盤唐本滑蟲唐本茶婆蟲綱目香娘子𢎞景曰此有兩三種以作亷薑氣者為真南人啖之故名恭曰此蟲辛臭漢中人食之名石薑亦名盧蜰一名負盤南人謂之滑蟲時珍曰蜚蠊行夜蛗螽三種西南夷皆食之混呼為負盤俗又訛盤為婆而諱稱為香娘子也集解别錄曰生晉陽山澤及人家屋間形似蠶蛾腹下赤二月八月及立秋採𢎞景曰形似䗪蟲而輕小能飛本生草中八九月知寒多入人家屋裏逃爾保昇曰金州房州等處有之多在林樹間百十為聚山人啖之謂之石薑郭璞註爾雅所謂蜰即負盤臭蟲也藏器曰狀如蝗蜀人食之左傳蜚不能災者即此時珍曰今人家壁間竈下極多甚者聚至千百身似蠶蛾腹背俱赤兩翅能飛喜燈火光其氣甚臭其屎尤甚羅願云此物好以清旦食稻花日出則散也水中一種酷似之氣味鹹寒有毒恭曰辛䍶而臭主治瘀血癥堅寒熱破積聚喉咽閉内寒無子本經通利血脉别錄食之下氣蘓恭發明時珍曰徐之才藥對云立夏之先蜚蠊先生為人參茯苓使主腹中七節保神守中則西南夷食之亦有謂也又吳普本草載神農云主婦人癥堅寒熱尤為有理此物乃血藥故宜於婦人行夜别錄校正併入拾遺負盤釋名負盤别錄􅂒盤蟲𢎞景氣蠜𢎞景曰行夜今小兒呼􅂒盤蟲或曰氣蠜即此也藏器曰氣盤有短翅飛不逺好夜中行人觸之即氣出雖與蜚蠊同名相似終非一物戎人食之味極辛􅀈蘓恭所謂巴人重負蠜是也時珍白負盤有三行夜蜚蠊蛗螽皆同名而異類夷人俱食之故致混稱也行夜與蜚蠊形狀相類但以有亷薑氣味者為蜚蠊觸之氣出者為氣盤作分别爾張杲醫說載鮮于叔明好食負盤臭蟲每使人採取三五升浮温水上洩盡臭氣用酥及五味熬作餅食云味甚佳即此物也氣味辛温有小毒主治腹痛寒熱利血别錄竈馬綱目釋名竈雞俗名集解時珍曰竈馬處處有之穴竈而居按酉陽雜俎云竈馬狀如促織稍大脚長好穴竈旁俗言竈有馬足食之兆附錄促織時珍曰促織蟋蟀也一名蛬一名蜻蛚陸機詩義疏云似蝗而小正黒有光澤如漆有翅及角善跳好鬭立秋後則夜鳴豳風云七月在野八月在宇九月在户十月蟋蟀入我牀下是矣古方未用附此以俟氣味缺主治竹刺入肉取一枚搗傅時珍䘀螽音負終拾遺校正併入拾遺蚱蜢釋名負蠜音煩蚱蜢時珍曰此有數種䘀螽總名也江東呼為蚱蜢謂其瘦長善跳窄而猛也螽亦作􅏑集解藏器曰䘀螽狀如蝗蟲有異斑者與蚯蚓異類同穴為雌雄得之可入媚藥時珍曰䘀螽在草上者曰草螽在土中者曰土螽似草螽而大者曰螽負斯似螽斯而細長者曰蟿螽爾雅云䘀螽蠜也草螽蠜也斯螽蜙蝑也蟿螽螇蚸也土螽蠰螇也數種皆類蝗而大小不一長角修股善跳有青黒斑數色亦能害稼五月動股作聲至冬入土穴中芒部夷人食之蔡邕月令云其類乳于土中深埋其卵至夏始出陸佃云草蟲鳴于上風蚯蚓鳴于下風因風而化性不忌而一母百子故詩云喓喓草蟲趯趯䘀螽蝗亦螽類大而方首首有王字沴氣所生蔽天而飛性畏金聲北人炒食之一生八十一子冬有大雪則入土而死氣味辛有毒主治五月五日候交時收取夫婦佩之令相愛媚藏器附錄吉丁蟲拾遺藏器曰甲蟲也背正緑有翅在甲下出嶺南賔澄諸州人取帶之令人喜好相愛媚藥也金龜時珍曰此亦吉丁之類媚藥也大如刀豆頭面似鬼其甲黒硬如龜狀四足二角身首皆如泥金裝成葢亦蠧蟲所化者段公路北户錄云金龜子甲蟲也出嶺南五六月生草蔓上大如榆莢背如金貼行則成雙死則金色隨滅故以飬粉令人有媚也竺法真羅浮山疏云山有金花蟲大如斑蝥文采如金形似龜可養玩數日宋祁益部記云利州山中有金蟲其體如蜂綠色光若泥金俚人取作婦女釵鐶之飾鄭樵通志云爾雅蛂蟥蛢也甲蟲大如虎豆綠色似金四書所載皆一物也南土諸山中亦時有之腆顆蟲拾遺藏器曰出嶺南狀似􅂒盤褐色身扁帶之令人相愛也彼人重之叩頭蟲時珍曰蟲大如斑蝥而黒色按其後則叩頭有聲能入人耳灌以生油則出劉敬叔異苑云叩頭蟲形色如大豆咒令叩頭又令吐血皆從所教殺之不祥佩之令人媚愛晉傳咸有賦媚蝶時珍曰北戸錄云嶺南有鶴子草蔓花也當夏開形如飛鶴翅羽觜距皆全云是媚草採曝以代面靨蔓上春生雙蟲食葉收入粉奩以葉飼之老則蛻而為蝶赤黄色女子收而佩之如細鳥皮令人媚悦號為媚蝶鵡洞㝠記云漢武時勒畢國獻細鳥大如蠅狀如鸚可候日晷後皆自死宮人佩其皮者輒蒙愛幸也木䖟音萌品本經中釋名魂常本經云時珍曰䖟以翼鳴其聲䖟䖟故名陸佃蟁害民故曰蟁䖟害甿故曰䖟亦通集解别錄曰木䖟生漢中川澤五月取之頌曰今處處有之而襄漢近地尤多𢎞景曰此䖟狀似䖟而小不噉血近道草中不見有之市人亦少賣者方家惟用蜚䖟耳恭曰䖟有數種並能噉血揚浙以南江嶺間大有木䖟長大綠色始如蜩蟬咂牛馬或至顛仆蜚䖟狀如蜜蜂黄黒色今俗多用之又一種小者名鹿䖟亦名牛䖟大如蠅囓牛馬亦猛市人採賣之三種同體以療血為本雖小有異同用之不為嫌木䖟倍大而陶云似䖟而小不噉血葢未之識耳藏器曰木䖟從木葉中出卷葉如子形圓著葉上破之初出如白蛆漸大子化拆破便飛即能囓物塞北亦有嶺南極多如古度化蟻耳木䖟是葉内者蜚䖟是已飛者正如蠶蛹與蛾總是一物不合重出應功用不同後人異註耳時珍曰金㓜孜北征錄云北虜長樂鎮草間有䖟大者如蜻蜓拂人面嘬􅏐元稹長慶集云巴蜀山谷間春秋常雨五六月至八九月則多䖟道路羣飛咂牛馬血流囓人毒劇而毒不留肌故無治術據此則藏器之說似亦近是又段成式云南方溪澗中多水蛆長寸餘色黒夏末變為䖟螫人甚毒觀此則䖟之變化有木有水非一端也氣味苦平有毒主治目赤痛眥傷淚出瘀血血閉寒熱酸􅀈無子本經蜚䖟本經中品釋名䖟蟲蜚與飛同集解别錄曰蜚䖟生江夏川谷五月取腹有血者良𢎞景曰此即方家所用䖟蟲噉牛馬血者伺其腹滿掩取乾之恭曰木䖟蜚䖟鹿䖟俱食牛馬血非獨此也但得即堪用之何假血充應如養鷹饑即為用若伺其飽何能除疾宗奭曰蜚䖟今人多用之大如蜜蜂腹凹褊㣲黄綠色雄霸州順安軍沿塘濼界河甚多以其惟食牛馬等血故治瘀血血閉也時珍曰採用須從陶説蘓恭以饑鷹為喻比擬殊乖修治入丸散去翅足炒熟用氣味苦㣲寒有毒之才曰惡麻黄主治逐瘀血破血積堅痞癥瘕寒熱通利血脉及九竅本經女子月水不通積聚除賊血在胸腹五臟者及喉痺結塞别錄破癥結消積膿墮胎日華發明頌曰淮南子云䖟破積血斵木愈齲此以類推也時珍曰按劉河間云䖟食血而治血因其性而為用也成無巳云苦走血血結不行者以苦攻之故治畜血用䖟蟲乃肝經血分藥也古方多用今人稀使附方舊二新一蛇螫血出九竅皆有者取䖟蟲初食牛馬血腹滿者三七枚燒研湯服肘後病篤去胎䖟蟲十枚灸搗為末酒服胎即下産乳撲墜瘀血䖟蟲二十枚牡丹皮一兩為末酒服方寸匕血化為水也若久宿血在骨節中者二味等分備急方附錄扁前别錄有名未用曰味甘有毒主䑕瘻癃閉利水道生山陵中狀如牛䖟赤翼五月八月採之蚊子時珍曰蚊處處有之冬蟄夏出晝伏夜飛細身利喙咂人膚血大為人害一名白鳥一名暑蟁或作恭民謬矣化生于木葉及爛灰中産子于水中為孑孓蟲仍變為蚊也龜鼈畏之螢火蝙蝠食之故煑鼈入數枚即易爛也藏器曰嶺南有蚊子木葉如冬青實如枇杷熟則蚊出塞北有蚊母草葉中有血蟲化而為蚊江東有蚊母鳥一名鷏每吐蚊一二升也蚋子時珍曰按元稹長慶集云蜀中小蚊名蚋子又小而黒者為蟆子㣲不可見與塵相浮上下者為浮塵子皆巢于巴蛇鱗中能透衣入人肌膚囓成瘡毒人極苦之惟搗楸葉傅之則瘥又祝穆方輿勝覽云雲南烏蒙峽中多毒蛇鱗中有蟲名黄蠅有毒囓人成瘡但勿搔以冷水沃之擦鹽少許即愈此亦蚋蟆之類也竹蝨綱目釋名竹佛子綱目天厭子集解時珍曰竹蝨生諸竹及草木上皆有之初生如粉㸃久便能動百十成簇形大如蝨蒼灰色或云濕熱氣化或云蟲卵所化古方未有用者惟南宮從􅒖嶁神書云江南巴卭吳越荆楚之間春秋竹内有蟲似蝨而蒼取之隂乾可治中風即此也氣味有毒主治中風半身不遂能透經絡追涎時珍附方新一中風偏痺半身不遂者用麻黄以湯熬成糊攤紙上貼不病一邊上下令徧但除七孔其病處不糊以竹蝨焙為末三錢老人加麝香一錢研勻熱酒調服就卧須臾藥行如風聲口吐出惡水身出臭汗如膠乃急去糊紙别温麻黄湯浴之暖卧將息淡食十日手足如故也岣嶁坤書本草綱目卷四十一
