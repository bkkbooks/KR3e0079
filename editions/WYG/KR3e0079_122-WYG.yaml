body:
  text: 本草綱目卷五十二明李時珍撰人之一凡三十五種内附二種髪髲音被本經釋名􅙎音總甄權髲髢音剃亦作鬄曰李當之曰髪髲是童男髪𢎞景不知髪髲審是何物髲字書記所無或作蒜字今人呼斑髪為蒜髪書家亦呼亂髪為鬈恐即鬈也童男之理或未全明恭曰此髪髲根也年久者用之神效字書無髪字即髪字誤矣既有亂髪則髪髲去病用陳久者如船如敗天翁蒲席皆此例也甄立言本草作􅙎􅙎赤髪也鬈乃髪美貎有聲無質陶説非矣宗奭曰髪髲亂髪自是兩等髪髲味苦即陳舊經年歳者加橘皮半夏取陳者入藥更良之義今人謂之頭髲其亂髪條中自無用髲之義二義甚明不必過搜索也時珍曰髪髲乃剪髢下髪也亂髪乃梳櫛下髪也按許慎説文云大人曰髠小兒曰髢顧野王玉篇云髲鬄也鬄髪髲也二説甚明古者刑人鬄髪婦人以之被髻故謂之髪髲周禮云王后夫人之服有以髪髢為首餙者是矣又詩云鬒髪如雲不屑髢也甄權所謂髪􅙎雷斆所謂二十男子項心剪下髪者得之矣李當之以為童男髪陶𢎞景以為鬈髪蘇恭以為髪根宗奭以為陳髪者並誤且顧野王在蘇恭之前恭不知玉篇有髲字亦欠考毛萇詩傳云被之僮僮被首餙也編髪為之即此髲也修治斆曰髪髲是男子二十已來無疾患顏貎紅白於項心剪下髪者入丸藥膏中用先以苦參水浸一宿漉出入瓶子以火煆赤放冷研用時珍曰今人以皂莢水洗淨晒乾入礶固濟煆存性用亦良氣味苦温無毒别録小寒主治五癃關格不通利小便水道療小兒驚大人痓仍自還神化本經合雞子黄煎之消為水療小兒驚熱百病别録止血悶血運金瘡傷風血痢入藥燒存性用煎膏長肉消瘀血大明發明韓保昇曰本經云自還神化李當之云神化之事未見别方按異苑云人髪變為鱓魚神化之異應此者也又藏器曰生人髪掛果樹上烏鳥不敢來食其實又人逃走取其髪於緯車上却轉之則迷亂不知所適此皆神化時珍曰髮者血之餘埋之土中千年不朽煎之至枯復有液出誤食入腹變為癥蟲煆治服餌令髪不白此正神化之應驗也附方舊二新四石淋痛澀髮髲燒存性研末每服用一錢井水服之肘后方傷寒黄病髮髲燒研水服一寸七日三傷寒類要胎衣不下亂髮頭髮撩結口中真人方小兒客忤因見生人所致取來人􅇟上髪十莖㫁兒衣帶少許合燒研末和乳飲兒即愈千金方急肚疼病用本人頭髪三十根燒過酒服即以水調芥子末封在臍内大汗如雨即安談埜翁方瘭癌惡瘡生髮灰米湯服二錢外以生髮灰三分皂莢刺灰二分白芨一分為末乾掺或以豬胆汁調直指方亂髪别録釋名血餘綱目人退時珍曰頭上曰髪屬足少隂陽明耳前曰鬂屬手足少陽目上曰眉屬手足陽明唇上曰髭屬手陽明頦下曰鬚屬足少陰陽明兩頰曰髯屬足少陽其經氣血盛則美而長氣多血少則美而短氣少血多則少而惡氣血俱少則其處不生氣血俱熱則黄而赤氣血俱衰則白而落素問云腎之華在髮王氷註云腎主髓腦者髓之海髮者腦之華腦减則髮素滑壽註云水出高原故腎華在髮髮者血之餘血者水之類也今方家呼髮為血餘盖本此義也龍木論謂之人退焉葉世傑草木子云精之榮以鬚氣之榮以眉血之榮以髮類苑云髪屬心稟火氣而上生鬚屬腎稟水氣而下生眉屬肝稟木氣而側生故男子腎氣外行而有鬚女子宦人則無鬚而眉髮不異也説雖不同亦各有理終不若分經者為的劉安君云欲髮不落梳頭滿千遍又云髮冝多梳齒冝數叩皆攝精益腦之理爾又崑齋吳玉有白髮辨言髪之白雖有遲早老少皆不係壽之修短由祖傳及隨事感應而已援引古今為証亦自有理文多不録氣味苦微温無毒主治欬𠻳五淋大小便不通小兒驚癎止血鼻衂燒灰吹之立已别録燒灰療轉胞小便不通赤白痢哽噎癰腫狐尿刺尸疰疔腫骨疽雜瘡蘇恭消瘀血補隂甚㨗震亨發明時珍曰髪乃血餘故能治血病補隂療驚癎去心竅之血劉君安以已髪合頭垢等分燒存性每服豆許三丸名曰還精丹令頭不白又老唐方亦用自己亂髮洗淨每一兩入川椒五十粒泥固入瓶煆黑研末每空心酒服一錢令髮長黒此皆補隂之驗也用椒者取其下逹爾𢎞景曰俗中嫗母為小兒作雞子煎用其父梳頭亂髮雜雞子黄熬良乆得汁與兒服去痰熱療百病附方舊十六新二十四孩子熱瘡亂髪一團如梨子大鷄子黄十箇煮熟同干銚子内熬至甚乾始有液出旋置盞中液盡為度用傅瘡上即以苦参粉粉之神妙詳見雞子黄下劉禹錫傳信方小兒斑疹髮灰飲服三錢子母秘録小兒斷臍即用清油調髮灰傅之不可傷水臍濕不乾亦傅之小兒重舌欲死者以亂髮灰半錢調傅舌下不住用之簡要濟衆小兒燕口兩角生瘡髮灰三錢飲汁服子母秘録小兒吻瘡髮灰和豬脂塗之聖惠方小兒驚啼亂油髮燒研乳汁或酒服少許良千金鼻血眩冐欲死者亂髮燒研水服方寸匕仍吹之梅師方鼻血不止血餘燒灰吹之立止永不發男用母髮女用父髮香聖惠用亂髮灰一錢人中白五分麝少許為末㗜鼻名三竒散肺疽吐血髮灰一錢米醋二合白湯一琖調服三因方欬嗽有血小兒胎髮灰入麝香少許酒下每箇作一服男用女女用男朱氏集騐齒縫出血頭髮切入銚内炒存性研掺之華佗中藏經肌膚出血胎髮燒灰傅之即止或吹入鼻中證治要訣諸竅出血頭髮敗㯶陳蓮蓬並燒灰等分每服三錢木香湯下聖惠方上下諸血或吐血或心衂或内崩或舌上出血如簮孔或鼻衂或小便出血並用亂髮灰水服方寸匕一日三服聖濟無故遺血亂髮及爪甲燒灰酒服方寸匕千金方小便尿血髮灰二錢醋湯服永類方血淋苦痛亂髮燒存性二錢入麝少許米飲服聖惠方大便瀉血血餘半兩燒灰雞冠花栢葉各一兩為末卧時酒服二錢來早以温酒一盞投之一服見效普濟胎産便血髮灰每飲服二錢昝殷産寶女人漏血亂髮洗浄燒研空心温酒服一錢婦人良方月水不通童男童女髮各三兩燒灰斑蝥二十一枚糯米炒黄麝香一錢為末每服一錢食前熱薑酒下普濟方婦人隂吹胃氣下泄隂吹而正喧此穀氣之實也冝豬膏髮煎導之用豬膏半斤亂髮鷄子大三枚和煎髮消藥成矣分再服病從小便中出也張仲景方女勞黄疸因大熱大勞交接後入水所致身目俱黄發熱惡寒小腹滿急小便難用膏髪煎治之即上方肘后方黄疸尿赤亂髮灰水服一錢日三次秘方也肘后大小便閉亂髮灰三指撮㧞半升水服姚氏乾霍亂病脹滿煩躁亂髮一團燒灰塩湯二升和服取吐十便良方尸疰中惡子母秘錄用亂髮如鷄子大燒研水服梧一方用亂髮灰半兩杏仁半兩去皮尖研煉蜜丸子大每温酒日下二三十丸破傷中風亂髪如鷄子大無油器中熬焦黒研以好酒一盞沃之入何首烏末二錢灌之少頃再灌本草衍義沐髪中風方同上令髪長黒亂髪洗晒油煎焦枯研末擦髮良惠聖擦落耳鼻頭髪瓶盛泥固煆過研末以擦落耳鼻乘熱蘸髮灰綴定軟帛縳住勿令動自生合也經騐良方聤耳出濃亂髮裹杏仁末塞之聖惠方吞髪在咽取自己亂髮燒灰水服一錢延齡至寶方􅀈蚣螫咬頭髮燒烟熏之疔腫惡瘡亂髮䑕屎等分燒灰針入瘡内大良聖惠方瘡口不合亂髮露蜂房蛇蜕皮各燒存性一錢用温酒食前調服神妙蘇沈良方下疳濕瘡髮灰一錢棗核七箇燒研洗貼心鑑大風癘瘡用新竹筒十箇内裝黑豆一層頭髪一層至滿以稻穅火盆内煨之候汁滴出以盞接承翎埽瘡上數日即愈亦治諸瘡邵真人經騐方頭垢别録釋名梳上者名百齒霜𢎞景曰術云頭垢浮針以肥膩故耳今當用悦澤人者其垢可丸也氣味鹹苦温有毒主治淋閉不通别録療噎疾酸漿煎膏用之立愈又治勞復𢎞景中蠱毒蕈毒米飲或酒化下並取吐為度大明附方舊九新十五天行勞復含頭垢棗核大一枚良類要預防勞復傷寒初愈欲令不勞復者頭垢燒研水丸梧子大飲服一丸外臺秘要頭身俱痛煩悶者頭垢豆許水服囊盛蒸豆熨之肘后小兒霍亂梳垢水服少許小兒哭疰方同上百邪鬼魅方同上並千金婦人吹乳百齒霜以無根水丸梧子大每服三丸食後屋上倒流水下隨左右暖卧取汁甚效或以胡椒七粒同百齒霜和丸熱酒下得汗立愈衛生寶鑑婦人乳癤酒下梳垢五丸即退消婦人足瘡經年不愈名裙風瘡用男子頭垢桐油調作隔紙膏帖之並簡便臁脛生瘡頭垢枯礬研匀豬膽調傅壽域方下疳濕瘡蠶繭盛頭垢再以一繭合定煆紅出火毒研搽楊氏小兒𦂳唇頭垢塗之肘后方菜毒脯毒凡野菜諸脯肉馬肝馬肉毒以頭垢棗核大含之嚥汁能起死人或白湯下亦可小品方自死肉毒故頭巾中垢一錢熱水服取吐猘犬毒人頭垢蝟皮等分燒灰水服一盃口噤者灌之瘡犬咬人瘡重發者以頭垢少許納中用熱牛屎封之諸蛇毒人梳垢一團尿和傅上仍炙梳出汗熨之並千金方蜈蚣螫人頭垢苦参末酒調傅之篋中蜂蠆螫人頭垢封之蟲蟻螫人同上簡並集竹木刺肉不出頭垢塗之即出劉涓子飛絲入目頭上白屑少許揩之即出物類相感志赤目腫痛頭垢一芥子納入取淚摘𤣥方噫吐酸漿漿水煎頭垢豆許服一盃效普濟方耳塞日華釋名耳垢綱目腦膏日華泥丸脂時珍曰修真指南云腎氣從脾右畔上入於耳化為耳塞耳者腎之竅也腎氣通則無塞塞則氣不通故謂之塞氣味鹹苦温有毒主治顛狂鬼神及嗜酒大明蛇蟲蜈蚣螫者塗之良時珍附方新六蛇蟲螫傷人耳垢蚯蚓屎和塗出盡黄水立愈壽域方破傷中風用病人耳中膜并刮爪甲上末唾調塗瘡口立效儒門事親方抓瘡傷水腫痛難忍者以耳垢封之一夕水盡出而愈鄭師甫云予常病此一丐傳此方疔疽惡瘡生人腦即耳塞也鹽泥等分研匀以蒲公英汁和作小餅封之大有效聖惠一切目疾耳塞晒乾每以粟許夜夜㸃之方聖惠小兒夜啼驚熱用人耳塞石蓮心人参各五分乳香二分燈花一字丹砂一分為末每薄荷湯下五分普濟膝頭垢綱目主治唇𦂳瘡以綿裹燒研傅之外臺爪甲綱目釋名筋退時珍曰爪甲者筋之餘膽之外候也靈樞經云用應爪爪厚色黄者膽厚爪薄色紅者膽薄爪堅色青者膽急爪耎色赤者膽緩爪直色白者膽直爪惡色黑者膽結氣味甘鹹無毒主治鼻衂細刮㗜之立愈衆人甲亦可宗奭催生下胞衣利小便治尿血及隂陽易病破傷中風去目瞖時珍懐妊婦人爪甲取末㸃目去瞖障藏器附方舊三十新二十斬三尸法太上𤣥科云常以庚辰日去手爪甲午日去足爪每年七月十六日將爪甲燒灰和水服之三尸九蟲皆滅名曰斬三尸一云甲寅日三尸遊兩手剪去手爪甲甲午日三尸遊兩足剪去足爪甲消除脚氣每寅日割手足甲少侵肉去脚氣外臺秘要破傷中風手足十指甲香油炒研熱酒調呷服之汁出便好普濟治破傷風手足顫掉搐揺不已用人手足指甲燒存性六錢薑制南星獨活丹砂各二錢為末分作二服酒下立效隂陽易病用手足爪甲二十片中衣襠一片燒灰分三服温酒下男用女女用男小兒腹脹父母指爪甲燒𫝊乳上飲之千金小便轉胞自取爪甲燒灰水服男女淋疾同上並肘后小便尿血人指甲半錢頭髪一錢半燒研末每服一錢空心温酒下聖濟録妊婦尿血取夫指甲燒灰酒服千金方胞衣不下取本婦手足爪甲燒灰酒服即令有力婦人抱起將竹筒於胷前趕下聖惠諸痔腫痛蠶繭内入男子指甲令滿外用童子頂髮纒裹燒存性研末蜜調傅之仍日日吞牛膽制過槐子甚效萬表積善堂方針刺入肉凡針折入肉及竹木刺者刮人指甲末用酸棗擣爛塗之次日定出聖惠方飛絲入目刮爪甲末同津液㸃之其絲自聚㧞出也危氏得效方物入目中左手爪甲刀刮屑末燈草蘸㸃瞖上三次即出也癍痘生瞖一切目疾並以木賊擦取爪甲末同朱砂末等分研匀以露水捜丸芥子大每以一粒㸃入目内聖惠目花生瞖刀刮爪甲細末和乳㸃之集簡方目生珠管手爪甲燒灰貝齒燒灰龍骨各半兩為末日㸃三四次聖惠方積年瀉血百藥不效用人指甲炒焦麝香各二錢半乾薑炮三兩白礬枯過敗皮巾燒灰各一兩為末每粥飲一錢日二服聖濟總録鼻出衂血刀刮指甲細末吹之即止試騐簡便方牙齒日華釋名時珍曰兩旁曰牙當中曰齒腎主骨齒者骨之餘也女子七月齒生七歲齒齔三七腎氣平而真牙生七七腎氣衰齒稿髮素男子八月齒生八歲齒齠三八腎氣平而真牙生五八腎氣衰齒稿髮墮錢乙云小兒變蒸蜕齒如花之易苖不及三十六齒者由蒸之不及其數也氣味甘鹹熱有毒主治除勞治瘧蠱毒氣入藥燒用藏器治乳癰未潰痘瘡倒黶時珍發明時珍曰近世用人牙治痘瘡䧟伏稱為神品然一㮣用之貽害不淺夫齒者腎之標骨之餘也痘瘡則毒自腎出方長之際外為風寒穢氣所冐腠理閉塞血澁不行毒不能出或變黑倒黶宜用此物以酒麝逹之竄入腎經發出毒氣使熱令復行而瘡自紅活盖刼劑也若伏毒在心昏冐不省人事及氣虚色白痒塌不能作膿熱疿紫泡之證止冝觧毒補虛茍誤用此則欝悶聲啞反成不救可不慎哉高武痘疹管見云左仲恕言變黑歸腎者宜用人牙散夫既歸腎矣人牙豈能復治之乎附方舊一新七痘瘡倒黶錢氏小兒方用人牙燒存性入麝香少許温酒服半錢聞人規痘疹論云人牙散治痘瘡方出風寒外襲或變黒或青紫此倒黶也宜温肌發散使熱氣復行而斑自出用人齒脫落者不拘多少瓦罐固濟煆過出火毒研末出不快而黑䧟者獖豬血調下一錢因服凉藥血澀倒䧟者入麝香温酒服之其效如神水無價散用人牙貓牙豬牙犬牙等分火煆研末蜜調服一字乳癰未潰人牙齒燒研酥調貼之肘後方五般聤耳出膿血水人牙燒存性麝香少許為末吹之名佛牙散普濟方漏瘡惡瘡乾水生肌用人牙灰油髮灰雄鷄肉金灰各等分為末入麝香輕粉少許油調傅之直指方隂疽不發頭凹況黯不疼無熱服内補散不起必用人牙煆過穿山甲炙各一分為末分作兩服用當歸麻黄煎酒下外以薑汁和麵傅之又方川烏頭硫黄人牙煆過為末酒服亦妙楊仁齋直指方人屎别録附人中黄釋名人糞别録大便時珍曰屎糞乃糟粕所化故字從米㑹意也氣味苦寒無毒主治時行大熱狂走解諸毒𢷬末沸湯沃服之别録傷寒熱毒水漬飲之彌善新者封丁腫一日根爛蘓恭骨蒸勞復癰腫發背瘡漏痘瘡不起時珍糞清釋名黄龍湯𢎞景還元水菽園記人中黄𢎞景曰近城市人以空罌塞口納糞中積年得汁甚黑而苦名為黄龍湯療瘟病埀死者皆瘥大明曰臘月截淡竹去青皮浸渗取汁治天行熱疾中毒名糞清浸皂莢甘蔗治天行熱疾名人中黄震亨曰人中黄以竹筒入甘草末於内竹木塞兩頭冬月浸糞缸中立春取出懸風處隂乾破竹取草晒乾用汪機曰用粽皮綿紙上鋪黄土澆糞汁淋土上濾取清汁入新甕内椀覆定埋土中一年取出清若泉水全無穢氣年乆者彌佳比竹筒渗法更妙主治天行熱狂熱疾中毒蕈毒惡瘡大明熱毒濕毒大解五臓實熱飯和作丸清痰消食積降隂火震亨附方舊十三新二十勞復食復人屎燒灰酒服方寸匕千金方熱病發狂奔走似癲如見鬼神乆不得汗及不知人事者以人中黄入大礶内以泥固濟煆半日去火毒研末新汲水服三錢未退再服斗門方大熱狂渇乾陳人屎為末於隂地淨黄土中作五六寸小坑將末三兩匙於坑中以新汲水調匀良乆澄清細細與飲即觧世俗謂之地清㓂宗奭衍義勞極骨蒸亦名伏運傳尸此方甚騐用人屎小便各一升新粟米飯五升六月六日麴半餅以缾盛封宻室中二七日並消亦無惡氣每旦服一合午再服之神效張文仲備急方骨蒸熱勞取人屎乾者燒令外黑納水中澄清每旦服一小升薄晚服童便一小升以瘥為度既常服可就作坑燒屎三升夜以水三升漬之稍稍减服此方神妙非其人莫浪傳之外臺秘要嘔血吐痰心煩骨蒸者人中黄為末每服三錢茜根汁竹瀝姜汁和匀服之丹溪心法鼻衂不止人屎尖燒灰水服一二錢并吹鼻中千金方噎膈反胃諸藥不效真阿魏一錢野外乾人屎三錢為末五更以薑片蘸食能起死人乃趙王囦方也永類鈐方噎食不下人屎入蘿蔔内火煆三炷香取研每服三分黄酒下三服效海上名方痘瘡不起儒門事親治痘瘡倒黶及灰白下䧟用童子糞乾者新瓦煆過每一兩入龍腦一分研匀每服半錢至一錢蜜水調下四靈無價散治痘瘡黑䧟腹脹危篤者此為刼劑用人糞猫糞豬糞犬糞等分臘月初旬收埋高燥黄土窖内至臘八日取出炒罐盛之塩泥固濟炭火煆令烟盡為度取出為末入麝香少許研匀瓷器宻封收之一歲一字二歲半錢三歲一錢蜜水調下湏更瘡起此乃以毒攻毒用火化者從治之義也發背欲死燒屎灰醋和傅之乾即易肘后方一切癰腫未潰用乾人屎末麝香各半錢研匀以豆大津調貼頭外以醋麵作錢䕶之膿潰去藥宗奭衍義丁腫初起刮破以熱屎尖傅之乾即易不過十五遍即根出立瘥千金五色丹毒黄龍湯飲二合并塗之良千金方九漏有蟲乾人屎乾牛屎隔綿貼之蟲聞其氣即出若痒則易之蟲盡乃止千金疳蝕口鼻唇頰穿者綿裹人屎貼之必有蟲出十便良方小兒唇緊人屎灰傅之崔知悌方小兒隂瘡人屎灰傅之要外臺秘産後隂脫人屎炒赤為末酒服方寸匕日二服千金方鬼䑛頭瘡取小兒糞和臘豬脂𫝊之千金方金瘡腸出乾人屎末粉之即入千金方鍼瘡血出不止用人屎燒研傅之千金方馬血入瘡腫痛用人糞一鷄子大服之并塗之金千方毒蛇咬螫人屎厚封之即消千金蠱毒百毒及諸熱毒時氣熱病口鼻出血用人屎尖七枚燒灰水調頓服温覆取汗即愈勿輕此方神騐者也外臺秘要諸毒卒惡熱悶欲死者新糞汁水和服或乾者燒末漬汁飲名破棺湯蘇恭解藥箭毒毒箭有三種交廣夷人用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著筒中潰箭鏃此二種􅅻傷皮肉便洪膿沸爛而死若中之便飲汁并塗之惟此最妙又一種用射菵煎塗箭鏃亦宜此方姚僧坦集騐方野葛芋毒山中毒菌欲死者並飲糞汁一升即活肘后方漏肉脯毒人屎燒灰酒服方寸匕肘后方惡犬咬傷左盤龍即人屎也厚封之数日即愈藺氏經騐方心腹急痛欲死用人屎同蜜擂匀新汲水化下生生編小兒胎屎綱目主治惡瘡食􅂒肉除面印字一月即瘥藏器治小兒鬼䑛頭燒灰和臘豬脂塗之時珍人尿奴弔切亦作溺别録釋名溲素問小便素問輪廻酒綱目還元湯時珍曰尿從尸从水㑹意也方家謂之輪廻酒還元湯隠語也飲入於胃遊溢精氣上輪於脾脾氣散精上歸於肺通調水道下輸膀胱水道者䦨門也主分泌水穀糟粕入於大腸水汁渗入膀胱膀胱者州都之官津液之府氣化則能出矣陰陽應象論云清陽為天濁隂為地地氣上為雲天氣下為雨故清陽出上竅濁隂出下竅氣味鹹寒無毒主治寒熱頭痛温氣童男者尤良别録主久𠻳上氣失聲及癥積滿腹蘓恭明目益聲潤肌膚利大腸推陳致新去欬嗽肺痿鬼氣痓病停久者服之佳恐冷則和熱湯服藏器止勞渇潤心肺療血悶熱狂撲損瘀血在内運絶止吐血鼻衂皮膚皴裂難産胎衣不下蛇犬咬大明滋隂降火甚速震亨殺蟲解毒療瘧中暍時珍發明𢎞景曰若人初得頭痛直飲人尿數升亦多愈合葱豉作湯服彌佳宗奭曰人溺湏童子者佳産後温飲一盃壓下敗血惡物有飲過七日者過多恐乆遠血臟寒令人發帶病人亦不覺若氣血虚無熱者尤不宜多服此物性寒故熱勞方中用之震亨曰小便降火甚速常見一老婦年逾八十貎似四十詢其故常有惡病人教服人尿四十餘年矣且老徤無他病而何謂之性寒不宜多服耶凡隂虚火動熱蒸如燎服藥無益者非小便不能除時珍曰小便性温不寒飲之入胃隨脾之氣上歸於肺下通水道而入膀胱乃其舊路也故能治肺病引火下行凡人精氣清者為血濁者為氣濁之清者為津液清之濁者為小便小便與血同類也故其味鹹而走血治諸血病也按褚澄遺書云人喉有竅則欬血殺人喉不停物毫髮必欬血既渗入愈渗愈欬愈欬愈㵕惟飲溲溺則百不一死若服寒凉則百不一生又吳球諸証辨疑云諸虛吐衂咯血湏用童子小便其效甚速盖溲溺滋隂降火消瘀血止吐衂諸血但取十二歲以下童子絶其烹炮鹹酸多與米飲以助水道每用一盞入薑汁或韭汁二三㸃徐徐服之日進二三服寒天則重湯温服乆自有效也又成無已云傷寒少隂證下利不止厥逆無脉乾嘔欲飲水者加人尿豬膽汁鹹苦寒物於白通湯薑附藥中其氣相從可去格拒之患也附方舊七新三十八頭痛至極童便一盞豉心半合同煎至五分温服聖濟總録熱病咽痛童便三合含之即止聖惠方骨蒸發熱三歲童便五升煎取一升以蜜三匙和之每服二碗半日更服此後常取自己小便服之輕者二十日重者五十日瘥二十日後當有蟲如蚰蜒在身常出十步内聞病人小便臭者瘥也台州月仙觀道士張病此自服神騐孟詵必效男婦怯証男用童女便女用童男便斬頭去尾日進二次乾燒餅壓之月餘全愈聖惠久嗽涕唾肺痿時時寒熱頰赤氣急用童便去頭尾少許五合取大粉甘草一寸四破浸之露一夜去甘草平旦頓服或入甘草末一錢同服亦可一日一劑童子忌食五辛熱物姚僧坦集騐肺痿欬嗽鬼氣疰病停叉臭溺日日温服之集騐方吐血鼻洪人溺薑汁和匀服一升子日華齒縫衂血童便温熱含之立止聖惠方消渇重者衆人溺坑中水取一盞服之勿令病人知三度瘥聖惠方癥積滿腹諸藥不瘥者人溺一服一升下血片塊二十日即出也蘓恭本草絞腸沙痛童子小便服之即止聖惠方卒然腹痛令人騎其腹溺臍中肘后方下痢休息杏仁去皮麫炒研以猪肝一具切片水洗血淨置淨鍋中一重肝一重杏仁鋪盡以童便二升同煎乾放冷任意食之聖惠方瘧疾渇甚童便和蜜煎沸頓服簡便方瘴癘諸瘧無問新乆童便一升入白蜜二匙攪去白沫頓服取吐碧緑痰出為妙若不然終不除也聖惠中暍昏悶夏月人在途中熱死急移隂處就掬道上熱土擁臍上作窩令人溺滿暖氣透臍即甦乃服地漿蒜水等藥林億云此法出自張仲景其意殊絶非常情所能及本草所能關實救急之大術也盖臍乃命蒂暑暍傷氣温臍所以接其元氣之意中惡不醒令人尿其面上即甦此扁鵲法也肘后方三十年癎一切氣塊宿冷惡病苦参二斤童子小便一斗二升煎取六升和糯米及麵如常法作酒服但腹中諸疾皆治酒放二三年不壞多作救人神效聖惠金瘡中風自己小便日洗二三次不妨入水聖惠金瘡血出不止飲人尿五升千金方打傷瘀血攻心者人尿煎服一升日服蘇恭本草折傷跌撲童便入少酒飲之推陳致新其功甚大薛已云予在居庸見覆車被傷七人仆地呻吟俱令嚾此皆得無事凡一切傷損不問壯弱及有無瘀血俱宜服此若脇脹或作痛或發熱煩燥口渴惟服此一甌勝似他藥他藥雖效恐無瘀血反致誤人童便不動臟腑不傷氣血萬無一失軍中多用此屢試有騐外科發揮杖瘡腫毒服童便良千金方火燒悶絶不省人事者新尿頓服二三升良千金方刺在肉中温小便漬之千金人咬手指瓶盛熱尿浸一夜即愈通變要法蛇犬咬傷日華子云以熱尿淋患處千金方治蝮蛇傷人令婦人尿於瘡上良蛇纒人足就令尿之便觧肘后方蜂蠆螫傷人尿洗之肘后方蜘蛛咬毒乆􅆨人溺於大甕中坐浸仍取烏鷄屎炒浸酒服之不爾恐毒殺人草陳藏器本百蟲入耳小便少少滴入聖惠方勞聾已久童子小便乘熱少少頻滴之聖惠方赤目腫痛自已小便乘熱抹洗即閉目少頃此以真氣退去邪熱也方普濟腋下狐臭自己小便乘熱洗兩腋下日洗数次乆則自愈集簡方傷胎血結心腹痛取童子小便日服二升良楊氏産乳子死腹中以夫尿二升煮沸飲之千金方中土菌毒合口椒毒人尿飲之肘后方解諸菜毒小兒尿和乳汁服二升海上方催生下胞人溺一升入葱薑各一分煎二三沸熱飲便下日華子本草痔瘡腫痛用熱童尿入礬三分洗之一日二三次效救急方溺白垽音魚覲切唐本草釋名人中白時珍曰滓淀為垽此乃人溺澄下白垽也以風日乆乾者為良入藥並以瓦煆過用氣味鹹平無毒大明曰凉主治鼻衂湯火灼瘡唐本燒研主惡瘡蘓恭治傳尸熱勞肺痿心膈熱羸瘦渇疾大明降火消瘀血治咽喉口齒生瘡疳䘌諸竅出血肌膚汗血時珍發明震亨曰人中白能㵼肝火三焦火並膀胱火從小便中出盖膀胱乃此物之故道也時珍曰人中白降相火消瘀血盖鹹能潤下走血故也今人病口舌諸瘡用之有效降火之騐也張果醫説云李士常苦鼻衂僅存喘息張思順用人中白散即時血止又延陵鎭官魯棠鼻血如傾白衣變紅頭空空然張潤之用人中白藥治之即止並不再作此皆散血之騐也附方舊一新十四大衂久衂人中白一團鷄子大綿五兩燒研每服二錢温水服聖惠方諸竅出血方同上鼻衂不止五七日不住者人中白新瓦煏乾入麝香少許温酒調服立効經騐方膚出汗血方同上偏正頭痛人中白地龍炒等分為末羊膽汁丸芥子大每新汲水化一丸注鼻中畜之名一滴金普濟方水氣腫滿人尿煎令可丸每服一小豆大日三服千金方脚氣成漏跟有一孔深半寸許其痛異常用人中白煆有水出滴入瘡口戴原禮證治要訣小兒霍亂尿滓末乳上服之良千金方鼻中息肉人中白瓦焙每温湯服一錢朱氏集騐方痘瘡倒陷臘月收人中白火煆為末温水服三錢䧟者自出儒門事親口舌生瘡溺桶垽七分枯礬三分研匀有涎拭去数次即愈方集簡小兒口疳人中白煆黄蘗蜜炙焦為末等分入氷片少許以青皮拭净掺之累效騐陸氏經方走馬牙疳以小便盆内白屑取下入瓷瓶内鹽泥固濟煆紅研末入麝香少許貼之此汴梁李提領方也香又方用婦人尿桶中白垢火煆一錢銅緑三分麝一分和匀貼之尤有神效痘疹煩熱人中白或老糞缸白垢洗淨研末每白湯或酒服二錢痘疹便覧方秋石䝉筌釋名秋氷時珍曰淮南子丹成號曰秋石言其色白質堅也近人以人中白煉成白質亦名秋石言其亦出於精氣之餘也再加升打其精緻者謂之秋氷此盖倣海水煎鹽之義方士亦以鹽入爐火煆成僞者宜辨之嘉謨曰秋石湏秋月取童子溺每缸入石膏末七錢桑條攪澄定傾去清液如此二三次乃入秋露水一桶攪澄如此数次滓穢滌淨鹹味减除以重紙鋪灰上晒乾完全取起輕清在上者為秋石重濁在下者刮去古人立名實本此義男用童女溺女用童男溺亦一隂一陽之道也世醫不取秋時雜收人溺但以皂莢水澄晒為隂煉煆為陽煉盡失於道何合於名媒利敗人安能應病况經火煉性却變温耶氣味鹹温無毒主治虚勞冷疾小便遺數漏精白濁時珍滋腎水養丹田返本還元歸根復命安五臟潤三焦消痰欬退骨蒸軟堅塊明目清心延年益夀嘉謨發明時珍曰古人惟取人中白人尿治病取其散血滋隂降火殺蟲觧毒之功也王公貴人惡其不潔方士遂以人中白設法煆煉治為秋石葉夢得水雲錄極稱隂陽二煉之妙而𤨏碎録乃云秋石味鹹走血使水不制火乆服令人成渴疾盖此物既經煆煉其氣近温服者多是淫慾之人藉此放肆虚陽妄作真水愈涸安得不渴耶况甚則加以陽藥助其邪火乎惟丹田虚冷者服之可耳觀病淋者水虚火極則煎熬成沙成石小便之煉成秋石與此一理也附方新十二秋石還元丹乆服去百病强骨髓補精血開心益志補暖下元悦色進食乆則臍下常如火暖諸般冷疾皆愈乆年冷勞虚憊者服之亦壯盛其法以男子小便十石更多尤妙先搘大鍋一口於空室内上用深瓦甑接鍋口以紙筋杵石灰泥甑縫并鍋口勿令通風候乾下小便約鍋中七八分以來竈下用熖火煮之若湧出即少少添冷小便候煎乾即人中白也入好礶子内如法固濟入炭爐中煆之旋取二三兩再研如粉煮棗瓤和丸如緑豆大每服五七丸漸加至十五丸空心温酒或塩湯下其藥常要近火或時復養火三五日則功效更大也經騐良方隂陽二鍊丹世之鍊秋石者但得火鍊一法此藥湏兼隂陽二煉方為至藥火煉乃陽中之隂得火而凝入水則釋歸於無體盖質去味存此離中之虚也水煉乃隂中之陽得水而凝遇曝而潤千歲不變味去質留此坎中之實也二物皆出於心腎二臟而流於小腸水火螣蛇𤣥武正氣外假天地之水火凝而為體服之還補太陽相火二臟實為養命之本空心服陽煉日午服隂煉此法極省力與常法功用不侔乆疾服之皆愈有人得瘦疾且嗽諸方不效服此即瘳有人病顚腹鼓日乆加喘滿埀困亦服此而安也陽煉法用人尿十餘石各用桶盛每石入皂莢汁一碗竹杖急攪百千下候澄去清留垽併作一桶如前攪澄取濃汁一二斗濾淨入鍋熬乾刮下擣細再以清湯煮化筲箕鋪紙淋過再熬如此数次直待色白如雪方止用沙盒固濟火煆成質傾出如藥未成更煆一二次候色如瑩玉細研入砂盒内固濟頂火養七畫夜取出攤土上去火毒為末棗膏丸梧子大每空心温酒下三十丸隂煉法用人尿四五石以大缸盛入新水一半攪千回澄定去清留垽又入新水攪澄直候無臭氣澄下如膩粉方以曝乾刮下再研以男兒乳和如膏烈日晒乾盖假太陽真氣也如此九度為末棗膏和丸梧子大每午日温酒下三十丸葉石林水雲録秋氷乳粉丸固元陽壯筋骨延年不老却百病用秋氷五錢頭生男乳晒粉五錢頭生女乳晒粉五錢乳香二錢五分麋香一分為末煉蜜丸芡子大金箔為衣烏金紙包黄蠟匱收勿令洩氣每月用乳汁化服一丸仍日飲乳汁助之火秋氷法用童男童女尿垽各一桶入大鍋内桑柴熬乾刮下入河水一桶攪化隔紙淋過復熬刮下再以水淋鍊之如此七次其色如霜或有一斤入礶内上用鉄燈盞盖定鹽泥固濟升打三炷香㸔秋石色白如玉再研再如前升打燈盞上用水徐徐擦之不可多多則不結不可少少則不升自辰至未退火冷定其盞上升起者為秋氷味淡而香乃秋石之精英也服之滋腎水固元陽降痰火其不升者即尋常秋石也味鹹苦蘸肉食之亦有小補楊氏頥貞堂經騐方直指秋石丸治濁氣干清精散而成膏淋黄白赤黯如肥膏蜜油之狀用秋石鹿角膠炒桑螵蛸炙各半兩白茯苓一兩為末糕糊丸梧子大每服五十丸人参湯下仁齋直指方秋石交感丹治白濁遺精秋石一兩白茯苓五錢兎絲子炒五錢為末用百沸湯一盞井華水一盞煮糊丸梧子大每服一百丸鹽湯下鄭氏家傳方秋石四精丸治思慮色欲過度損傷心氣遺精小便数秋石白茯苓各四兩蓮肉芡實各二兩為末蒸棗肉和丸梧子大每空心鹽湯下三十丸永類鈐方秋石五精丸常服補益秋石一兩蓮肉六兩真川椒紅五錢小茴香五錢白茯苓二兩為末棗肉和丸梧子大每服三十丸鹽湯温酒空心下秋石法用童男童女潔淨無體氣疾病者沭浴更衣各聚一石用潔淨飲食及鹽湯與之忌葱蒜韭薑辛䍶羶腥之物待尿滿缸以水攪澄取人中白各用陽城瓦礶鹽泥固濟鍼線札定打火一炷香連換鐵線打七火然後以男女者秤匀和作一處研開以河水化之隔紙七層濾過仍熬成秋石其色雪白用潔淨香濃乳汁和成日晒夜露但乾即添乳汁取日精月華四十九日数足收貯配藥劉氏保壽堂經騐方腫脹忌鹽只以秋石拌飲食得腫脹消以鹽入礶煆過少少用之摘𤣥方赤白帶下真秋石研末蒸棗肉擣丸梧子大每服六十丸空心醋湯下摘𤣥方噎食反胃秋石每用一錢白湯下妙醫方摘要服丹發熱有人服伏火丹藥多腦後生瘡熱氣冉冉而上一道人教炙風市数十壯而愈仍時復作又教以隂煉秋石用大豆黄卷煎湯下遂愈和其隂陽也王清明餘話方淋石宋嘉祐校正自玉石部移入此集解藏器曰此是患石淋人溺中出者正如小石收之為用時珍曰此是淫慾之人精氣欝結隂火煎熬遂成堅質正如滚水結鹼鹵水煎鹽小便煉成秋石同一義理也氣味鹹温無毒主治石淋水磨服之當得碎石隨溺出人明噎病吐食俗名澀飯病藏器癖石綱目集解時珍曰有人專心成癖及病癥塊凝結成石如牛黄狗寶鮓答之類皆諸獸之病也觀夫星隕為石沙淋石淋及釋氏顱􅇟結成舍利子皆精氣凝結而然故格物論云石者氣之核也群書所載如寶圭化石老樹化石皆無情之燮異也魚蛇蝦蟹皆能化石乃有情之變異也世説戴貞婦登山望夫化而為石此盖志一不分遂入於無情也宋史載石工采石䧟入石穴三年掘出猶活見風遂化為石此盖吞納石氣乆而與之俱化也夫生形尚全化石則頑心癥癖之化石亦其理也程子遺書云波斯人發古墓見肌膚都盡惟心堅如石鋸開中有山水如畫旁有一女凭䦨凝睇盖此女有愛山水癖遂致融結如此宋濓云一浮屠行大般三昧法示寂後焚之惟心不化狀如佛像非金非石又一人行禪觀法及死火葬心内包觀音像悉具醫書云一人病癥死火化有塊如石此皆癥癖頑凝成石之蹟故併録之主治消堅癖治噎膈時珍乳汁别録釋名妳汁綱目仙人酒時珍曰乳者化之信故字從孚化省文也方家隠其名謂之仙人酒生人血白硃砂種種名色盖乳乃隂血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎已産則赤變為白上為乳汁此造化𤣥微自然之妙也邪術家乃以童女矯揉取乳及造反經為乳諸説巧立名謂以弄貪愚此皆妖人所為王法所誅君子當斥之可也凡入藥並取首生男兒無病婦人之乳白而稠者佳若色黄赤清而腥穢如涎者並不可用有孕之乳謂之忌妳小兒飲之吐㵼成疳鬾之病最為有毒也氣味甘鹹平無毒大明曰凉主治補五臟令人肥白恱澤療目赤痛多淚解獨肝牛肉毒合濃豉汁服之神效别録和雀屎去目中弩肉蘓恭益氣治痩悴恱皮膚潤毛髪㸃眼止淚大明發明𢎞景曰漢張蒼年老無齒妻妾百数常服人乳故年百歲餘身肥如瓠宗奭曰人乳汁治目之功多何也人心生血肝藏血脾受血則能視盖水入於經其血乃成又曰上則為乳汁下則為月水故知乳汁則血也用以㸃眼豈不相宜血為隂故性冷臟寒人如乳餅酥酪之類不可多食雖曰牛羊乳然亦不出乎隂陽之造化耳老人患口瘡不能食但飲人熱乳甚良時珍曰人乳無定性其人和平飲食冲淡其乳必平其人暴躁飲酒食辛或有火病其乳必熱凡服乳湏熱飲若晒曝為粉入藥尤佳南史載宋何尚之積年勞病飲婦人乳而瘥又言穰城老人年二百四十歲惟飲曾孫婦乳也按白飛霞醫通云服人乳大能益心氣補腦髓止消渴治風火證養老猶宜每用一吸即以紙塞鼻孔按唇貼齒而潄乳與口津相和然後以鼻内使氣由明堂入腦方可徐徐嚥下如此五七吸為一度不潄而吸何異飲酪止於腸胃而已附方舊三新十二服乳歌仙家酒仙家酒兩个壺盧盛一斗五行釀出真醍醐不離人間處處有丹田若是乾涸時嚥下重樓潤枯杇清晨能飲一升餘返老還童天地乆虚損勞瘵德生丹用無病婦人乳三酒盃將磁碟晒極熱置乳於中次入麝香末少許木香末二分調匀服後飲濃茶一酒盞即陽敗次日服接命丹接命丹用乳三酒盃如前晒碟盛人乳并人胞末一具調服服畢靣膝俱赤如醉思睡只以白粥少少養之集簡方虚損風疾接命丹治男婦氣血衰弱痰火上升虚損之證又治中風不語左癱右緩手足疼痛動履不便飲食少進諸證用人乳二盃香甜白者為佳以好梨汁一盃和匀銀石器内頓滚滚每日五更一服能消痰補虚生血延壽此乃以人補人其妙無加攝生衆妙方中風不語舌根强硬三年陳醬五合人乳汁五合相和研以生布絞汁隨時少少與服良乆當語聖惠方卒不得語人乳半合羙酒半升和服范汪方失音不語人乳竹瀝各二合温服摘𤣥月經不通日飲人乳三合千金方眼熱赤腫人乳半合古銅錢十文銅器中磨令變色稀稠成煎瓶收日㸃数次或以乳浸黄連蒸熱洗之聖惠方初生不尿人乳四合葱白一寸煎滚分作四服即利劉涓子鬼遺方初生吐乳人乳二合蘧篨篾少許鹽二粟大同煎沸入牛黄米許與服劉涓子鬼遺方癰膿不出人乳汁和麫傅之比膮膿盡出不可近手千金方臁脛生瘡人乳桐油等分和匀以鵞翎掃塗神效𤣥摘噉蛇牛毒牛噉蛇者毛髪向後其肉殺人但飲人乳汁一升立愈金匱要畧中牛馬毒人乳飲之良千金百蟲入耳人乳滴之即出聖惠方婦人月水宋嘉祐附月經衣釋名月經素問天癸素問紅鉛時珍曰女子隂類也以血為主其血上應太隂下應海潮月有盈虧潮有朝夕月事一月一行與之相符故謂之月水月信月經經者常也有常軌也天癸者天一生水也邪術家謂之紅鉛謬名也女人之經一月一行其常也或先或後或通或塞其病也復有變常而古人並未言及者不可不知有行期只吐血衂血或眼耳出血者是謂逆行有三月一行者是謂居經俗名按季有一年一行是謂避年有一生不行而受胎者是謂暗經有受胎之後月月行經而産子者是謂盛胎俗名垢胎有受胎数月血忽大下而胎不隕者是謂漏胎此雖以氣血有餘不足言而亦異於常矣女子二七天癸至七七天癸絶其常也有女年十二十三而産子如楮記室所載平江蘇逹鄉女十二受孕者有婦年五十六十而産子如遼史所載堪布妻六十餘生二男一女者此又異常之尤者也學醫者之於此類恐亦冝留心焉氣味鹹平無毒主治解毒箭並女勞復𢎞景月經衣主治金瘡血湧出炙熱熨之又主虎狼傷及箭鏃入腹藏器發明時珍曰女人入月惡液腥穢故君子遠之為其不潔能損陽生病也煎膏治藥出痘持戒修鍊性命者皆避忌之以此也博物志云扶南國有竒術能令刀斫不入惟以月水塗刀便死此是穢液壞人神氣故合藥忌觸之此説甚為有據今有方士邪術鼓弄愚人以法取童女初行經水服食謂之先天紅鉛巧立名色多方配合謂参同契之金華悟真篇之首經皆此物也愚人信之吞嚥穢滓以為秘方徃徃發出丹􅇙殊可嘆惡按蕭子真金丹詩云一等旁門性好淫强陽復去採他隂口含天癸稱為藥似恁洳沮枉用心嗚呼愚人觀此可自悟矣凡紅鉛方今並不録附方舊七新五熱病勞復丈夫熱病後交接復發忽卵縮入腸腸痛欲死燒女人月經赤衣為末熟水服方寸匕即定扁鵲方女勞黄疸氣短聲沉用女人月經和血衣燒灰酒服方寸匕一日再服三日瘥孟詵必效方霍亂困篤童女月經衣和血燒灰酒服方寸匕百方不瘥者用之千金方小兒驚癎發熱取月候血和清黛水調服一錢入口即瘥量兒加减惠聖方令婦不妬取婦人月水布裹蝦䗫於厠前一尺入地五寸埋之張華博物志癰疽發背一切腫毒用胡燕窠土䑕坌土榆白皮栝樓根等分為末以女人月經衣水洗取汁和傅腫上乾即易之潰者封其四圍五日瘥千金方男子隂瘡因不忌月事行房隂物潰爛用室女血衲瓦上燒存性研末麻油調傅之解藥箭毒交州夷人以焦銅為毒藥於鏃鋒上中人即沸爛湏臾骨壞但服月水屎汁解之博物志箭鏃入腹或肉中有聚血以婦人月經衣燒灰酒服方寸匕千金方馬血入瘡剥馬刺傷以婦人月水塗之神效姚僧坦集騐方虎狼傷瘡月經衣燒末酒服方寸匕日三陳藏器人血拾遺集解時珍曰血猶水也水榖入於中焦泌别薰蒸化其精㣲上注於肺流溢於中布散於外中焦受汁變化而赤行於隧道以奉生身是之謂血命曰營氣血之與氣異名同類清者為營濁者為衛營行於隂衛行於陽氣主煦之血主濡之血體屬水以火為用故曰氣者血之帥也氣升則升氣降則降氣熱則行氣寒則凝火活則紅火死則黑邪犯陽經則上逆邪犯隂經則下流盖人身之血皆生於脾攝於心藏於肝布於肺而施化於腎也仙家煉之化為白汁隂盡陽純也萇𢎞死忠血化為碧人血入土年乆為燐皆精靈之極也氣味鹹平有毒主治羸病人皮肉乾枯身上麩片起又狂犬咬寒熱欲發者並刺血熱飲之藏器發明時珍曰肉乾麩起燥病也不可卒潤也飲人血以潤之人之血可勝刺乎夫潤燥治狂犬之藥亦夥矣奚俟於此耶始作方者不仁甚矣其無後乎虐其殘賊亦有以酒飲人血者此乃天戮之民必有其報不必責也諸方用血惟不悖於理者收附於下附方新六吐血不止就用吐出血塊炒黑為末每服三分以麥門冬湯調服盖血不歸元則積而上逆以血導血歸元則止矣吳球諸証辨疑衂血不止聖濟總録用白紙一張接衂血令滿於燈上燒灰作一服新汲水下勿用病人知儒門事親就用本衂血紙撚蘸㸃眼内左㸃右右㸃左此法大妙金瘡内漏取瘡中所出血以水和服之千金産乳血運取釅醋和産婦血如棗大服之聖惠方小兒赤疵針又脚中取血貼之即落千金方小兒疣目以針决其四邊取患瘡膿汁傅之忌水三日即潰落也千金人精宋嘉祐集解時珍曰營氣之粹化而為精聚於命門命門者精血之府也男子二八而精滿一升六合養而充之可得三升損而䘮之不及一升謂精為䘒者精非血不化也謂精為寶者精非氣不養也故血盛則精長氣聚則精盈邪術家蠱惑愚人取童女交姤飲女精液或以己精和其天癸吞嚥服食呼為鉛汞以為秘方放恣貪淫甘食穢滓促其天年吁愚之甚矣又將誰尤按鮑景翔云神為氣主神動則氣隨氣為水母氣聚則水生故人之一身貪心動則津生哀心動則淚生愧心動則汗生慾心動則精生氣味甘温主治和鷹屎滅瘢𢎞景塗金瘡血出湯火瘡時珍附方舊三新一靣上黶子人精和鷹屎白塗之数日愈千金方身靣粉瘤人精一合青竹筒盛於火上燒以器承取汁宻封器中数上塗之取效止肘後方瘰癧腫毒女人精汁頻頻塗之湯火傷灼令不痛易愈無痕肘後用人精鷹屎白日日塗之千金用女人精汁頻頻塗之口津唾綱目釋名靈液綱目神水綱目金漿綱目醴泉時珍曰人舌下有四竅兩竅通心氣兩竅通腎液心氣流入舌下為神水腎液流入舌下為靈液道家謂之金漿玉醴溢為醴泉聚為華池散為津液降為甘露所以灌溉臟腑潤澤肢體故修養家嚥津納氣謂之清水灌靈根人能終日不唾則精氣常留顔色不稿若乆唾則損精神成肺病皮膚枯涸故曰遠唾不如近唾近唾不如不唾人有病則心腎不交腎水不上故津液乾而真氣耗也秦越人難經云腎主五液入肝為淚入肺為涕入脾為涎入心為汗自入為唾也氣味甘鹹平無毒主治瘡腫疥癬皶皰五更未語者頻塗擦之又明目退瞖消腫解毒辟邪粉水銀時珍發明時珍曰唾津乃人之精氣所化人能每旦潄口擦齒以津洗目及常時以舌䑛拇指甲揩目乆乆令人光明不昏又能退瞖凡人有雲醫但每日令人以舌䑛数次乆則真氣熏及自然毒散瞖退也范東陽方云凡人魘死不得呌呼但痛咬脚跟及拇指甲際多唾其面徐徐喚之自省也按黄震日抄云晉時南陽宗定伯夜遇鬼問之答曰我新死鬼也問其所惡曰不喜唾耳急持之化為羊恐其變化因大唾之賣得千錢乃知鬼真畏唾也附方新四代指腫痛以唾和白硇砂搜麫作椀子盛唾令滿著硇末少許以指浸之一日即瘥方千金手足發疣以白梁米粉鐡鐺炒赤研末以衆人唾和𫝊厚一寸即消肘后方腋下狐氣用自己唾擦腋下数過以指甲去其垢用熱水洗手数遍如此十餘日則愈毒蛇螫傷急以小便洗去血隨取口中唾頻頻塗之楊拱醫方摘要齒垽音居近切宋嘉祐釋名齒垢氣味鹹温無毒主治和黑蝨研塗出箭頭及惡刺破癰腫蘇恭塗蜂螫時珍附方新二竹木入肉針撥不盡者以人齒垢封之即不爛也葉氏通變要法毒蛇螫傷先以小便洗去血次以牙垽封而護之甚妙且不腫痛醫方摘要人汗綱目集解時珍曰汗出於心在内則為血在外則為汗故曰奪汗者無血奪血者無汗氣味鹹有毒飲食食之令人生疔毒時珍眼淚綱目集解時珍曰淚者肝之液五臟六腑津液皆上渗於目凡悲哀笑欬則火激於中心系急而臟腑皆揺揺則宗脉感而液道開津上溢故涕泣出焉正如甑上水滴之意也氣味鹹有毒凡母哭泣墮子目令子傷睛生翳時珍人氣綱目主治下元虚冷日令童男女以時隔衣進氣臍中甚良凡人身體骨節痺痛令人更互呵熨久久經絡通􅂒又鼻衂金瘡噓之能令血斷時珍發明時珍曰醫家所謂元氣相火仙家所謂元陽真火一也天非此火不能生物人非此火不能有生故老人虚人與二七以前少隂同寢藉其薰蒸最為有益杜甫詩云暖老湏燕玊正此意也但不可行淫以䘮寶促生耳近時術家令童女以氣進入鼻竅臍中精門以通三田謂之接補此亦小法不得其道者反以致疾按謝承續漢書云大醫史循宿禁中寒疝病發求火不得衆人以口更噓其背至旦遂愈劉敬叔異苑云孫家奚奴治虎傷蛇噬埀死者以氣禁之皆安又葛洪抱朴子云人在氣中氣在人中天地萬物無不湏氣以生善行氣者内以養身外以却惡然行之有法從子至巳為生氣之時從午至亥為死氣之時常以生氣時鼻中引氣入多出少閉而数之從九九八八七七六六五五而止乃微吐之勿令耳聞習之既熟增至千数此為胎息或春食東方青氣夏食南方赤氣秋食西方白氣冬食北方黒氣四季食中央黄氣亦有大效故善行氣者可以避飢渇可以延年命可以行水土可以居水中可以治百病可以入瘟疫以氣嘘水則水逆流嘘火則火遥㓕虚沸湯則手可探物嘘金瘡則血即自止嘘兵刃則刺不能入嘘箭矢則矢反自射嘘犬則不吠嘘虎狼則伏退噓蛇蜂則不動吳越有禁呪行氣之法遇有大疫可與同牀不相傳染遇有精魅或聞聲或現形擲石放火以氣禁之皆自絶或毒蛇所傷噓之即愈若在百里之外遥以我手嘘呪男左女右亦即可安夫氣出於無形用之其效至此而況絶穀延年乎時珍按此即吾内養浩然靈氣也符篆家取祖氣即此但彼徒皆氣餒庸人依倣安得騐哉人魄綱目釋名時珍曰此是縊死人其下有物如麩炭即時掘取便得稍遲則深入矣不掘則必有再縊之禍盖人受隂陽二氣合成形體魂魄聚則生散則死死則魂升於天魄降於地魄屬隂其精沉淪入地化為此物亦猶星隕為石虎死目光墜地化為白石人血入地為燐為碧之意也主治鎮心安神魄定驚怖顛狂磨水服之髭鬚類證釋名時珍曰觜上曰髭頥下曰鬚兩頰曰髯詳見亂髮下主治燒研𫝊癰瘡愼微發明愼微曰唐李勣病醫云得鬚灰服之方止太宗聞之遂自剪髭燒灰賜服復令傅癰立愈故白樂天詩云剪鬚燒藥賜功臣又宋吕夷簡疾仁宗曰古人言髭可治疾今朕剪髭與之合藥表朕意也隂毛拾遺主治男子隂毛主蛇咬以口含二十條嚥汁令毒不入腹藏器横生逆産用夫陰毛二七莖燒研猪膏和丸大豆大吞之千金方婦人隂毛主五淋及隂陽易病時珍附方新二隂陽易病病後交接卵腫或縮入腹絞痛欲死取婦人隂毛燒灰飲服仍以洗隂水飲之聖濟總録牛脹欲死婦人隂毛草裹與食即愈外臺秘要人骨拾遺釋名時珍曰許愼云骨者肉之核也靈樞經云腎主骨有骨度篇論骨之大小長短廣狹甚詳見本書主治骨病接骨臁瘡並取焚棄者藏器發明時珍曰古人以掩暴骨為仁德每獲隂報而方伎之流心乎利欲乃收人骨為藥餌仁術固如此乎且犬不食犬骨而人食人骨可乎父之白骨惟親生子刺血瀝之即渗入又酉陽雜俎云荆州一人損脛張七政飲以藥酒破肉去骨一片塗膏而愈二年復痛張曰所取骨寒也尋之尚在牀下以湯洗綿裹收之其痛遂止氣之相應如此孰謂枯骨無知乎仁者當悟矣附方新四代杖燒過人骨為末空心酒服三錢受杖不腫不作瘡乆服皮亦厚也醫林集要接骨燒過童子骨一兩乳香二錢喜紅絹一方燒灰為末熱酒調服先以桐木片札定立效醫林集要臁瘡燒過人骨碎者為末掺之壽域神方折傷死童子骨煆過香𤓰子仁炒乾為末好酒下止痛極速扶壽精方天靈蓋宋開寶釋名腦盖骨綱目仙人盖綱目頭顱骨志曰此乃死人頂骨十字觧者方家婉其名耳藏器曰此是天生天賜盖押一身之骨􅇟門未合即未有也時珍曰人之頭圓如盖穹窿象天泥丸之宫神靈所集修煉家取坎補離復其純乾聖胎圓成乃開顱􅇟而出入之故有天靈盖諸名也發明藏器曰凡用彌腐爛者乃佳有一片如三指濶者取得用煻灰火罨一夜待腥穢氣盡却用童兒溺於甆鍋子中煮一伏時漉出於屋下掘一坑深一尺置骨於中一伏時其藥魂歸神妙陽人使隂陽人使陽好古曰方家有用檀香湯洗過酥炙用或燒存性者男骨色不赤女骨色赤以此别之也氣味鹹平無毒時珍曰有毒主治傳尸尸疰鬼氣伏連久瘴勞瘧寒執無時者燒令黒研細白飲和服亦合丸散用開寳治肺痿乏力羸瘦骨蒸盜汗等酥炙用大明退心經藴寒之氣本草權度發明楊士灜曰天靈盖治尸疰尸疰者鬼氣也伏而未起故令淹纒得枯骸枕骨治之則魂氣飛越不復附人故得瘥也陳承曰神農本經人部惟髮髲一物其餘皆出後世醫家或禁術之流竒怪之倫耳近見醫家用天靈盖治傅尸病未有一效殘忍傷神殊非仁人之用心茍有可易仁者冝盡心焉必不得已則冝以年深漬朽絶尸氣者可也附方舊一新十天靈盖散追取勞蟲天靈二指大以檀香煎湯洗過酥炙一氣呪七遍云雷公神電母聖逄傅尸便湏定急急如律令尖梹榔五枚阿魏二分麝香三分辰砂一分安息香三分甘遂三分為末每服三錢用童便四升入銀石器内以葱白薤白各二七莖青蒿二握桃枝甘草各二莖五寸長者柳枝桑枝酸榴枝各二莖七寸長同煎至一升分作二次五更初調服前藥一服蟲不下約人行十里又進一服天明再進取下蟲物名狀不一急擒入油鐺煎之其蟲觜青赤黄色可治黑白色難治然亦可㫁傳染之患凡修合先湏齋戒於逺處淨室勿令病人聞藥氣及鷄犬猫畜孝子婦人一切觸穢之物見之蟲下後以白粥補之数日之後夢人哭泣相别是其騐也上清紫庭仙方虚損骨蒸千金方用天靈盖如梳大炙黄以水五升煮取二升分三服起死神方也張仲文偹急方用人頭骨炙三兩麝香十兩為末擣千杵丸梧子大每服七丸飲下日再服若胸前有青脉出者以針刺㸔血色未黑者七日瘥小兒骨蒸體瘦心煩天靈盖酥炙黄連等分研末每服半錢米飲下日二服聖惠方諸瘧寒熱天靈盖煆研末水服一字取效聖惠方膈氣不食天靈盖七个每个用黑豆四十九粒層層隔封水火升降楊梅色冷定取出去豆不用研末每服一錢温酒下孫氏集效方青盲不見方見龍腦香下痘瘡陷伏灰平不長煩燥氣急用天靈盖燒研酒服三分然一方入雄黄二分其瘡自起發痘疹經騐方下部疳瘡天靈盖煆研末先以黄蘗湯洗浄掺之神效研又一方入紅褐小紅棗等分同燒劉氏經騐方臁瘡濕爛人項骨燒研二錢龍骨三錢金絲硫黄一錢為末用冬蘿蔔芽隂乾熬水洗之乃貼劉松石保夀堂方小兒白秃大豆髑髏骨各燒灰等分以臘豬脂和塗姚僧坦集騐方人胞拾遺釋名胞衣拾遺胎衣綱目紫河車綱目混沌衣綱目混元母蒙筌佛袈裟綱目仙人衣時珍曰人胞包人如衣故曰胞衣方家諱之别立諸名焉丹書云天地之先陰陽之祖乾坤之槖籥鉛汞之匡廓胚胎將兆九九数足我則乘而載之故謂之河車其色有紅有録有紫以紫者為良修治吳球曰紫河車古方不分男女近世男用男女用女一云男病用女女病用男初生者為佳次則健壯無病婦人者亦可取得以清米泔擺浄竹器盛於長流水中洗去筋膜再以乳香酒洗過篾籠盛之烘乾研末亦有瓦焙研者酒煮擣爛者甑蒸擣晒者以蒸者為佳董炳云今人皆酒煮火焙及去筋膜大誤矣火焙水煮其子多不肓惟蒸擣和藥最良筋膜乃初結真氣不可剔去也氣味甘鹹温無毒主治血氣羸瘦婦人勞損靣䵟皮黑腹肉諸病漸瘦者治浄以五味和之如䭔􅀈法與食之勿令婦知藏器餅􅀈音甲也治男女一切虚損勞極癲癎失志恍惚安心養血益氣補精吳球發明震亨曰紫河車治虚勞當以骨蒸藥佐之氣虚加補氣藥血虚加補血藥以側栢葉烏藥葉俱酒洒九蒸九曝同之為丸大能補益名補腎丸時珍曰人胞雖載於陳氏本草昔人用者尤少近因丹溪朱氏言其功遂為時用而括蒼吳球始創大造丸一方尤為世行其方藥味平補雖無人胞亦可服餌其説詳見本方下按隋書云琉球國婦人産乳必食子衣張師正倦游録云八桂獠人産男以五味煎調胞衣曾親啖之此則諸獸生子自食其衣之意非人類也崔行功小兒方云凡胎衣冝藏於天德月德吉方深埋緊築令男長夀若為豬狗食令兒顚狂蟲蟻食令兒瘡癬鳥鵲食令兒惡死棄於火中令兒瘡爛近於社廟汚水井竈街巷皆有所禁按此亦銅山西崩洛鍾東應自然之理也今復以之蒸煮炮炙和藥擣餌雖曰以人補人取其同類然以人食人獨不犯崔氏之禁乎其異於琉球獠人者亦幾希矣附方舊一新六河車丸治婦人瘵疾勞𠻳虚損骨蒸等證用紫河車初生男子者一具以長流水中洗淨熟煮擘細焙乾研山藥二兩人参一兩白茯苓半兩為末酒糊丸梧子大麝香養七日每服三五十丸温服塩湯下永類鈐方大造丸吳球云紫河車即胞衣也兒孕胎中臍系於胞胞系母脊受母之蔭父精母血相合生成真元所鍾故曰河車雖禀後天之形寔得先天之氣超然非他金石草木之類可比愚每用此得效用之女人尤妙盖本其所自出各從其類也若無子及多生女月水不調小産難産人服之必主有子危疾將絶者一二服可更活一二日其補隂之功極重百發百中乆服耳聰目明鬚髮烏黑延年益壽有奪造化之功故名大造丸用紫河車一具男用女胎女用男胎初生者米泔洗淨新瓦焙乾研末或以淡酒蒸熟擣晒研末氣力尤全且無火毒敗龜版年乆者童便浸三日酥炙黄二兩或以童便浸過石上磨淨蒸熟晒研尤妙黄蘗去皮鹽酒浸炒一兩半杜仲去皮酥炙一兩半牛膝去苖酒浸晒一兩二錢􅏂生地黄二兩半入砂仁六錢白伏苓二兩絹袋盛入瓦礶酒煮七次去伏苓砂仁不用杵地黄為膏聼用天門冬去心麥門冬去心人参去蘆各一兩二錢夏月加五味子七錢各不犯鐵器為末同地黄膏入酒米糊丸如小豆大每服八九十丸空心鹽湯下冬月酒下女人去龜板加當歸二兩以乳煮糊為丸男子遺精女子帶下並加牡蠣粉一兩世醫用陽藥滋補非徒無益為害不小盖邪火只能動欲不能生物龜板黄蘗補陽補隂為河車之佐加以杜仲補腎強腰牛膝益精壯骨四味通為足少隂經藥古方加陳皮名補腎丸也生地黄凉血滋隂得伏苓砂仁同黄蘗則走少隂白飛霞以此四味為天一生水丸也天麥門冬能保肺氣不令火炎使肺氣下行生水然其性有降無升得人参則鼓動元氣有升有降故同地黄為固本丸也又麥門冬人参五味子三味名生脉散皆為肺經藥此方配合之意大抵以金水二臟為生化之原加河車以成大造之功故也一人病弱陽事大痿服此二料體貎頓異連生四子一婦年六十已衰憊服此壽至九十尤强徤一人病後不能作聲服此氣壯聲出一人病痿足不任地者半年服此後能逺行諸證辨疑五勞七傷吐血虚瘦用初生胞衣長流水中洗去惡血待清汁出乃止以酒煮爛搗如泥入白伏神末和丸梧子大每米飲下百丸忌鐵器朱氏集騐方久癲失志氣虚血弱者紫河車治淨爛煮食之劉氏經騐方大小癎疾初生胎衣一具長流水洗淨仍以水浸春三夏一秋五冬七日焙乾為末羗活天麻防風各半兩白殭蠶白附子各一兩南星二兩川烏一个全蠍二十一个為末糊丸梧子大硃砂為衣每服五十丸好酒下乾坤秘韞解諸蠱毒不拘草蠱蛇蠱蜣蜋蠱其狀入􅍋刺痛欲死用胞衣一具洗切曝乾為末熟水調服一錢七梅師方目赤生瞖初生孩兒胞衣曝乾焙研細末日日傅目眥中愈乃止千金胞衣水拾遺修治藏器曰此乃衣埋地下七八年化為水澄徹如氷南方人以甘草升麻和諸藥缾盛埋之三五年後掘出取為藥也氣味辛凉無毒主治小兒丹毒諸熱毒發寒熱不歇狂言妄語頭上無辜髪􅆆虚痞等症天行熱病飲之立效藏器反胃久病飲一鍾當有蟲出時珍初生臍帶拾遺釋名命蒂時珍曰胎在母腹臍連於胞胎息隨母胎出母腹臍帶既剪一㸃真元屬之命門丹田臍乾自落如𤓰脱蒂故臍者人之命蒂也以其當心腎之中前直神闕後直命門故謂之臍臍之為言齊也主治燒末飲服止瘧藏器解胎毒傅臍瘡時珍附方新三臍汁不乾綿裹落下臍帶燒研一錢入當歸頭末一錢麝香一字掺之全㓜心鑑預解胎毒初生小兒十三日以本身剪下臍帶燒灰以乳汁調服可免痘惠或入硃砂少許大保㓜全痘風赤眼初生小兒臍帶血乘熱㸃之妙海上方人勢綱目釋名隂莖時珍曰人隂莖非藥物也陶九成輟耕録載杭州沈生犯姦事露引刀自割其勢流血經月不合或令尋所割勢擣粉酒服不数日而愈觀此則下蠶室者不可不知此法也故附於此云主治下蚕室創口不合時珍人膽拾遺氣味苦凉有毒主治鬼氣尸疰伏連藏器久瘧噎食金瘡時珍發明時珍曰北虜戰塲中多取人膽汁傅金瘡云極效但不可再用他藥必傷爛也若先敷他藥即不可用此此乃殺場救急之法收膽乾之亦可用無害於理也有等殘忍武夫殺人即取其膽和酒飲之云令人勇是雖軍中謬術君子不為也附方新三久瘧連年噎食不下用生人膽一箇盛糯米令滿入麝香少許突上隂乾一半青者治瘧一半黒者治噎並為末每服十五粒瘧用陳皮湯下噎用通草湯下俱出普濟方鬼瘧進退不定者用人膽硃砂雄黄麝香等分為末醋糊丸緑豆大每綿裹一丸納鼻中即瘥男左女右一丸可治二人聖惠方人肉拾遺主治瘵疾藏器發明時珍曰張杲醫説言唐開元中明人陳藏器著本草拾遺載人肉療羸瘵閭閻有病此者多割股按陳氏之先已有割股割肝者矣而歸咎陳氏所以罪其筆之於書而不立言以破惑也本草可輕言哉嗚呼身體髮膚受之父母不敢毁傷父母雖病篤豈肯欲子孫殘傷其支體而自食其骨肉乎此愚民之見也按何孟春余冬録云江伯兒母病割脇肉以進不愈禱於神欲殺子以謝神母愈遂殺其三歲子事聞大祖皇帝怒其絶倫滅理杖而配之下禮部議曰子之事親有病則拜托良醫至於呼天禱神比懇切至情不容已者若卧氷割股事屬後世乃愚昧之徒一時激發務為詭異以驚世駭俗希求旌表規避徭役割股不已至於割肝割肝不已至於殺子違道傷生莫此為甚自今遇此不在旌表之例嗚呼聖人立教高出千古韙哉如此又陶九成輟耕録載古今亂兵食人肉謂之想肉或謂之兩脚羊此乃盗賊之無人性者不足誅矣木乃伊綱目集解時珍曰按陶九成輟耕録云天方國有人年七八十歲願捨身濟衆者絶不飲食惟澡身啖蜜經月便溺皆蜜既死國人殮以石棺仍滿用蜜浸之䥴年月於棺瘞之俟百年後起封則成蜜劑遇人折傷肢體服少許立愈雖彼中亦不多得亦謂之蜜人陶氏所載如此不知果有否姑附卷末以俟博識方民綱目李時珍曰人禀性於乾坤而囿形於一氣横目二足雖則皆同而風土氣習自然不一是故蝨處頭而黑豕居遼而白水食者腥草食者羶膏梁藜莧腸胃天淵菒褐羅紈肌膚玉石居養所移其不能齊者亦自然之勢也故五方九州水土各異其民生長氣息亦殊乃集方民附於部末以備醫診云東方海濵傍水魚鹽之地其民食魚而嗜鹹黑色踈理其病多瘡痬其治宜砭石西方陵居多風水土剛彊其民不衣而褐華食而肥脂其病生於内其治宜毒藥北方地髙陵居風寒氷冽其民野處而乳食其病臟寒生滿其治宜炙􅌊南方地下水土弱霧露所聚其民嗜酸而食胕緻理而赤色其病多攣痺其治宜微鍼中央地平濕其民食雜而不勞其病多痿躄其治宜導引按蹻素問九州殊題水泉各異風聲氣習剛柔不同青州其音角羽其泉鹹以酸其氣舒遲其人聲緩荆揚其音角徴其泉酸以苦其氣慓輕其人聲急梁州其音商徴其泉苦以辛其氣剛勇其人聲塞兖豫其音宫徴其泉甘以苦其氣平静其人聲端雍冀其音商羽其泉辛以鹹其氣駃烈其人聲㨗徐州其音角宫其泉酸以甘其氣悍勁其人聲雄出河圖括地象堅土之人剛弱土之人懦壚土之人細息土之人羙耗土之人醜出孔子家語山林之民毛而瘦得木氣多也川澤之民黑而津得水氣多也邱陵之民團而長得火氣多也墳衍之民晢而方得金氣多也原隰之民豐而痺得土氣多也出宋太史集荆州一男二女揚州二男五女青州二男二女兖州二男三女幽州一男三女并州二男三女豫州二男三女雍州三男二女冀州五男三女出周禮土地生人各以類應故山氣多男澤氣多女水氣多瘖風氣多聾林氣多癃木氣多傴石氣多力下氣多尰險氣多癭谷氣多痺邱氣多狂廣氣多仁陵氣多貪暑氣多夭寒氣多夀輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重中土多聖賢出淮南子鴻烈解人傀公囘切怪異也綱目李時珍曰太初之時天地絪緼一氣生人乃有男女男女搆精乃自化生如草木之始生子一氣而後有根及子為種相繼也人之變化有出常理之外者亦司命之師所當知博雅之士所當識故撰為人傀附之部末以􅊀多聞𤯝咎之徴易曰一隂一陽之謂道男女搆精萬物化生乾道成男坤道成女此盖言男女生生之機亦惟陰陽造化之良能焉耳齊司徒褚澄言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏經言月水止後一三五日成男二四六日成女東垣李杲言血海始净一二日成男三四五日成女聖濟經言因氣而左動陽資之則成男因氣而右動隂資之則成女丹溪朱震亨乃非褚氏而是東垣主聖濟左右之說而立論歸於子宫左右之系諸說可謂悉矣時珍竊謂褚氏未可非也東垣未盡是也盖褚氏以精血之先後言道藏以日數之竒偶言東垣以女血之盈虧言聖濟丹溪以子宫之左右言各執一見㑹而觀之理自得矣夫獨男獨女之胎則可以日數論而駢胎品胎之感亦可以日數論乎稽之諸史載一産三子四子者甚多其子有半男半女或男多女少男少女多西樵野記載國朝天順時揚州民家一産五男皆育成觀此則一三五日為男二四六日為女之說豈其然哉焉有一日受男而二日復受女之理乎此則褚氏聖濟丹溪主精血子宫左右之論為有見而道藏東垣日數之論為可疑矣王叔和脉經以脉之左右浮沉辨猥生之男女髙陽生脉訣以脉之縱横逆順别駢品之胎形恐亦臆度非確見也王氷元珠宻語言人生三子主太平人生三女國淫失政人生十子諸侯競位人生肉塊天下饑荒此乃就人事而論則氣化所感又别有所關也夫乾為父坤為母常理也而有五種非男不可為父五種非女不可為母何也豈非男得陽氣之虧而女得隂氣之塞耶五不女螺紋鼓角脉也螺者牝竅内旋有物如螺也紋者竅小即實女也皷者無竅如皷角者有物如角古名陰挺是也脉者一生經水不調及崩帶之類是也五不男天犍漏怯變也天者陽痿不用古云天宦是也犍者陽勢閹去寺人是也漏者精寒不固常自遺洩也怯者舉而不强或見敵不興本變者體兼男女俗名二形晋書以為亂氣所生謂之人疴其類有三有值男即女值女即男者有半月隂半月陽者有可妻不可夫者此皆具體而無用者也胎足十月而生常理也而有七月八月生者十二三月生者十四五月生者或云氣虚也虞摶醫學正傳言有十七八月至二十四五月而生劉敬叔異苑言太原温磐石母孕三年乃生豈亦氣虚至於許久耶今有孕七月而生子者多可育八月而生者多難育七變而八不變也孕魏畧云黄牛羗人孕六月而生十慱物志云獠人七月而生晋書云符堅母孕二月生劉搠母孕十三月生云漢書云堯及昭帝皆以十四月生三十國春秋劉聰母孕十五月乃生搜神記云黄帝母名附寶孕二十五月而生帝胞門子臟為竒恒之府所以為生人之户常理也而有自脇産自額産自背産自髀産者何也豈子臟受氣駁雜而其系有不同如宋史所記男隂生於􅆃女隂生于頭之類耶史記云陸終氏娶鬼方之女孕而左脇出三人右脇出三人六人子孫傳國千年天將興之必有尤物如修己背折而生禹簡狄胸拆而生契也妻魏志云黄初六年魏郡太守孔羡表言汝南屈雍王氏以去年十月十二日生男兒從右腋下小腹上而出其母自若無他畏痛今瘡已愈母子全安異苑云晋時魏興李宣妻樊氏義熈中懷孕不生而額上有瘡兒從瘡出長為軍將名胡兒又云晋時常山趙宣母妊身如常而髀上作痒搔之成瘡兒從瘡出母子平安出野史云莆田尉舎之左有市人妻生男從股髀間瘡合母子無可証屈雍之事浮屠氏言釋迦生於摩耶之右脇亦此理也嵩山記云陽翟有婦人妊三十月乃生子從母背上出五歲便入山學道期瑯琊鈔云我朝成化中宿州一婦孕脇腫如􅏴及兒從􅏴出瘡痏隨合其子名佛記兒孕時珍曰我明隆慶五年二月唐山縣民婦有左脇腫起兒從脇生俱無恙陽生隂長孤陽不生獨隂不長常理也而有思士不妻而感思女不夫而孕婦女生鬚丈夫出潼男子産兒者何也豈其氣脉時有變易如女國自孕雄雞生卵之類耶史記云姜源見巨人跡履之而生棄有娀氏吞𤣥鳥卵而生契皆不夫而孕也宣政録云宋宣和初朱節妻年四十一夕頷痒至明鬚長尺餘草木子云元至正間京師一逹婦髭鬚長尺餘也漢書云南陽李元全家疫死止一孫初生数旬蒼頭李善自哺乳之乳為生潼唐書云元德秀兄子襁褓䘮親德秀自乳之數日乳中潼流能食乃止蓐宋史云宣和六年都城有賣青果男子孕而生子母不能收易七人始免而逃去脹西樵野記云明嘉靖乙酉横涇傭農孔方忽患膨憒憒幾数月自脇産一肉塊剖視之一兒支體毛髮悉具也男生而覆女生而仰溺水亦然隂陽秉賦一定不移常理也而有男化女女化男者何也豈乖氣致妖而變化反常耶京房易占云男化為女宫刑濫也女化為男婦政行也春秋潜潭巴云男化女賢人去位女化男賤人為王此雖以人事言而其臟腑經絡變易之微不可測也漢書云哀帝建平中豫章男子化為女子嫁人生一子年越雋男子化為女子續漢書云獻帝建安二十李時珍曰我朝隆慶二年山西御史宋纁疏言静樂縣民李良雨娶妻張氏已四載矣後因貧出其妻自傭於人隆慶元年正月偶得腹痛時作時止二年二月初九日大痛不止至四月内腎囊不覺退縮入腹變為女人隂戸次月經水亦行始換女粧時年二十八矣襄王十三年有女子化為丈夫洪範五行傳云魏晋書云惠帝元康中安豐女子周世寕以漸化為男子至十七八而性氣成又孝武皇帝寕康初南郡女子唐氏漸化為丈夫唐南史云劉宋文帝元嘉二年燕有女子化為男書云僖宗光啓二年春鳳翔郿縣女子朱齔化為丈夫旬日而死人異于物常理也而有人化物物化人者何也豈人亦太虚中一物並囿于氣交得其靈則物化人失其靈則人化物耶抑譚子所謂至媱者化為婦人至暴者化為猛虎心之所變不得不變孔子所謂物老則羣精附之為五酉之怪者耶譚子化書云老楓化為羽人自無情而之有情也賢婦化為貞石自有情而之無情也世説武昌貞婦望夫化而為石宋史云崑山石工采石䧟入石穴三年掘出猶活見風遂化為石幽㝠録云陽羡小吏吳龕於溪中拾一五色浮石歸置床頭至夜化為女子熊左傳云堯殛鯀於羽山其神化為黄熊入於淵黄龍類也續漢書云靈帝時江夏黄氏母浴水化為黿入於淵化捜神記云魏文帝黄初中清河宋士宗母浴於室為鼈入於水時復還家為異苑云宋文帝元嘉中高平黄秀入山經日遂化熊淮南子云牛哀病七日化而為虎摶殺其兄貙小虎也有五指郡國志云藤州夷人徃徃化貙博物志云江漢有貙人能化為虎虎唐書云武后時郴州左史因病化虎擒之乃止而毛生矣又憲宗元和二年商州役夫将化為虎衆以水沃之乃不果牛顧㣲廣州記云湞陽縣俚民一兒年十五六牧牛日䑛兒甚快䑛處悉白俄兒病死殺牛以供客食此牛者男女二十餘人悉化為虎隋書云文帝七年相州一桑門化為蛇繞樹自抽長二丈許歲抱朴子云狐狼猴玃滿三百皆能變人叅同契云燕雀不生鳯狐兎不字馬常理也而有人産蟲獸神鬼怪形異物者何也豈其視聽言動觸于邪思随形感應而然耶又有人生于卵生于馬者何也豈有神異慿之或因有感遘而然耶博物志云徐偃王之母産卵棄之孤獨老母取覆之出一兒後繼徐國曰異說云漢末有馬生人名馬異及長亡入胡地人具四肢七竅常理也而荒裔之外有三首比肩飛頭垂尾之民此雖邉徼餘氣所生同于鳥獸不可與吾同胞之民例論然亦異矣山海經云三首國一身三首在崑崙東望爾雅云北方有比肩民半體相合迭食而迭南方異物志云嶺南溪峒中有飛頭蠻項有赤痕至夜以耳為翼飛去食蟲物将曉復還如故也搜神記載吳将軍朱桓一婢頭能夜飛即此種也欲永昌志云西南徼外有濮人生尾如龜長三四寸坐則先穿地作孔若誤折之便死也是故天地之造化無窮人物之變化亦無窮賈誼賦所謂天地為爐兮造化為工隂陽為炭兮萬物為銅合散消息兮安有常則千變萬化兮未始有極忽然為人兮何足控摶化為異物兮又何足患此亦言變化皆由于一氣也膚學之士豈可恃一隅之見而㮣指古今六合無窮變化之事物為迂怪耶夲草綱目卷五十二
