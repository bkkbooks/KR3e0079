  text: 本草綱目卷二十五目録穀之四造釀類二十九種附藥粥五十三種樂酒七十種大豆豉别録豆黄食療豆腐日用陳廩米别録飯拾遺青精乾石飯圗經粥拾遺附諸藥粥麨拾遺米餻綱目糭綱目寒具綱目蒸餅綱目女麴唐本黄蒸唐本麴嘉祐神麴藥性紅麴丹溪補遺糵米别録芽即麥飴餹别録醤别録榆仁醤食療蕪荑醤食療醋别録酒别録附諸藥酒燒酒綱目葡萄酒綱目糟綱目米粃食物舂杵頭細糠别録右附方舊八十新一百本草綱目卷二十五目録
