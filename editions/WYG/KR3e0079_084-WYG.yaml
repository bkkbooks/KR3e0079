body:
  text: 本草綱目卷三十五目錄木之二喬木類五十二種内附四種蘗木本經蘗即黄檀桓拾遺小蘗唐本黄櫨嘉祐厚朴本經勒浮爛羅附杜仲本經椿樗唐本漆本經梓本經楸拾遺桐本經梧桐綱目罌子桐拾遺附郢桐海桐開寶附雞桐楝本經槐本經檀拾遺莢蒾唐本秦皮本經合歡本經皂莢本經附鬼皂角肥皂莢綱目無患子開寶欒華本經無食子唐本子即沒食訶黎勒唐本子即訶婆羅得開寶櫸别錄柳本經檉柳開寶水楊唐本白楊唐本枎栘拾遺松楊拾遺榆本經榔榆拾遺蕪荑本經蘇方木唐本烏木綱目樺木開寶綟木拾遺櫚木拾遺櫚即花椶櫚嘉祐橉木拾遺柯樹拾遺烏桕木唐本巴豆本經大風子補遺海紅豆海藥相思子綱目豬腰子綱目石𤓰綱目右附方舊一百三十五新三百二十二本草綱目卷三十五目録
