body:
  text: 本草綱目卷四十五目録介部李時珍曰介蟲三百六十而龜為之長周官鱉人取互物以時籍春獻鱉蜃秋獻龜魚祭祀供蠯蠃蚳以授醢人則介物亦供饌所不廢况可充藥品乎唐宋本草混入蟲魚今析為介部四十六種分二類曰龜鱉曰蚌蛤神農本草經八種梁陶𢎞景註名醫别録五種梁陶𢎞景註唐本草二種唐蘓恭本草拾遺一十種唐陳藏器海藥本草二種唐李珣蜀本草一種蜀韓保昇開寳本草二種宋馬志嘉祐本草八種宋掌禹錫圖經本草一種宋蘓頌本草綱目六種明李時珍本草蒙筌一種明陳嘉謨附註魏吳普本草對齊徐之才藥李當之藥録唐甄權藥性宋雷斆炮炙論孫思邈千金唐孟詵張鼎食療南唐陳士良食性楊損之刪繁義宋寇宗奭衍蕭炳四聲大明日華金張元素珍珠囊朱震亨補遺元李呆法象吳瑞日用王好古湯液明汪穎食物明寗源食鑑明汪機會編介之一龜魚類十七種附二種水龜本經秦龜别録蠵龜綱目附龜􅠦瑇瑁開寶附散八兒緑毛龜蒙筌瘧龜拾遺鶚龜拾遺旋龜攝龜蜀本賁龜綱目鼈本經納鼈圖經能鼈綱目朱鼈拾遺珠鼈綱目黿拾遺蟹本經鱟嘉祐右附方舊一十九新四十六本草綱目卷四十五目録
