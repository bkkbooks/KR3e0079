body:
  text: 本草綱目卷四十九明李時珍撰禽之三林禽類十七種附二種斑鳩宋嘉祐釋名斑隹音錐錦鳩范汪方鵓鳩左傳註祝鳩時珍曰鳩鵓其聲也斑錦其色也隹者尾短之名古者庖人以尸祝登尊俎謂之祝鳩此皆鳩之大而有斑者其小而無斑者曰隹曰􅼁音葵曰荆鳩曰楚鳩也鳩之子曰䳕鳩曰役鳩曰糠鳩曰即鷱曰辟鷱揚雄方言混列諸鳩不足據集解禹錫曰斑鳩是處有之春分化為黄褐侯秋分化為斑䳡黄褐侯青䳡也宗奭曰斑鳩冇有斑者有無斑者有灰色者有大者有小者雖有此數色其用則一也嘗養之數年並不見春秋分變化時珍曰鳴鳩能化鷹而斑鳩化黄褐侯之説不知所出處今鳩小而灰色及大而班如梨花㸃者並不善鳴惟項下斑如真珠者聲大能鳴可以作媒引鳩入藥尤良鳩性慤孝而拙于為巢纔架數莖往往墮卵天将雨即逐其雌霽則呼而反之故曰鷦巧而危鳩拙而安或云雄呼晴雌呼雨鳩肉氣味甘平無毒主治明目多食益氣助隂陽嘉祐久病虚損人食之補氣宗奭食之令人不噎時珍發明時珍曰范汪方治目有斑䳡丸總録治目有錦鳩丸倪惟賢氏謂斑鳩補腎故能明目竊謂鳩能益氣則能明目矣不獨補腎已爾古者仲春羅氏獻鳩以養國老仲秋授年老者以鳩杖云鳩性不噎食之且復助氣也血主治熱飲解蠱毒良時珍屎主治治聤耳出膿疼痛及耳中生盯矃同夜明沙末等分吹之時珍青䳡音錐拾遺釋名黄褐侯拾遺集解蔵器曰黄褐侯状如鳩而緑褐色聲如小兒吹竿時珍曰鳩有白鳩緑鳩今夏月出一種糠鳩㣲帶紅色小而成羣掌禹錫所謂黄褐侯秋化斑佳恐即此也好食桑椹及半夏苗昔有人食之過多患喉痺醫用生姜解之愈肉氣味甘平無毒主治蟻瘻惡瘡五味淹炙食之極美蔵器安五臓助氣補虛損排膿活血并一切瘡癤癰瘻嘉祐鳲鳩拾遺釋名布穀列子鴶鵴音戞匊獲穀爾雅註郭公蔵器曰布穀鳲鳩也江東呼為獲穀亦曰郭公北人名撥穀時珍曰布穀名多皆各因其聲似而呼之如俗呼阿公阿㜑割麥插禾脫却破袴之類皆因其鳴時可為農候故耳或云鳲鳩即月令鳴鳩也鳴乃鳲字之訛亦通禽經及方言並謂鳴鳩即戴勝郭璞云非也集解蔵器曰布穀似鷂長尾牝牡飛鳴以翼相拂擊時珍曰按毛詩疏義云鳲鳩大如鳩而帶黄色啼鳴相呼而不相集不能為巢多居樹穴及空鵲巢中哺子朝自上下暮自下上也二月穀雨後始鳴夏至後乃止張華禽經註云仲春鷹化為鳩仲秋鳩復化為鷹故鳩之目猶如鷹之目列子云鷂之為鸇鸇之為布穀布穀久復為鷂是矣禽經又云鳩生三子一為鶚肉氣味甘温無毒主治安神定志令人少睡汪頴脚脛骨主治令人夫妻相愛五月五日收帶之各一男左女右云置水中自能相隨也蔵器桑鳸食物釋名竊脂爾雅青雀郭璞蠟觜雀時珍曰鳸意同扈止也左傳少皥氏以鳥名官九鳸為九農正所以止民無淫也桑鳸乃鳸之在桑間者其觜或淡白如脂或凝黄如蠟故古名竊脂俗名蠟觜淺色曰竊陸機謂其好盜食脂肉殆不然也集解時珍曰鳸鳥處處山林有之大如鴝鵒蒼褐色有黄斑㸃好食粟稻詩云交交桑鳸有鶯其羽是矣其觜喙㣲曲而厚壮光􅉷或淺黄淺白或淺青淺黒或淺𤣥淺丹鳸類有九種皆以喙色故聲音别之非謂毛色也爾雅云春鳸鳻鶞夏鳸竊𤣥秋鳸竊藍冬鳸竊黄桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖老扈鷃鷃是矣今俗多畜其雛教作戯舞肉氣味甘温無毒主治肌肉虛羸益皮膚汪穎伯勞宋嘉祐釋名伯鷯夏小正註博勞詩疏伯趙左傳鵙豳詩音臭鴂孟子音決時珍曰按曹植惡鳥論云鵙聲嗅嗅故以名之感隂氣而動殘害之鳥也謂其為惡聲者愚人信之通士畧之世傳尹吉甫信后妻之䜛殺子伯竒後化為此鳥故所鳴之家以為凶者好事傅㑹之言也伯勞象其聲也伯趙其色皂也趙乃皂訛集解時珍曰伯勞即鷃也夏鳴冬止乃月令候時之鳥本草不著形状而後人無識之者郭璞註爾雅云鵙似鶷􅗾而大服䖍云鶷􅗾音轄乾白項鴉也張華註禽經云伯勞形似鴝鵒鴝鵒喙黄伯勞喙黒許慎説文云鴝鵒似鵙而有幘顔師古註漢書謂鴂為子規王逸註楚詞謂鴂為巧婦揚雄方言謂鵙為鶡鵙陳正敏遯齋閒覽謂鵙為梟李筆國史補謂鴂為布穀楊慎丹鉛錄謂鵙為駕犁九說各異竊謂鵙既可以候時必非希見之鳥今通攷其得失王說已謬不必致辯據郭説則似今苦鳥據張許二說則似今之百舌似鴝鵒而有幘者然鵙好單栖鳴則蛇結而百舌不能制蛇為不同也據顔説則子規名鷤鴂音弟桂伯勞名鴂音決且月令起于北方子規非北鳥也據楊說鶡鵙乃寒號蟲惟晉地有之據陳說則謂其目擊斷然以為梟矣而不具其形似與陳蔵器鴞即梟之説不合而爾雅䲭鴞一名鸋鴂與此不同據李説則布穀一名鴶鵴字音相近又與月令鳲鳩拂其羽相犯據楊說則駕犁乃鷑鳩小如鴝鵒三月即鳴與禮記五月鵙始鳴豳風七月鳴鵙之義不合八説不同如此要之當以郭説為準案爾雅謂鵲鵙之醜其飛也鬷歛足竦翅也既以鵲鵙並稱而今之苦鳥大如鳩黒色以四月鳴其鳴曰苦苦又名姑惡人多惡之俗以為婦被其姑苦死所化頗與伯竒之説相近但不知其能制蛇否淮南子云伯勞之血塗金人不敢取附録鷑鳩時珍曰鷑鳩爾雅名鵧鷑音批及又曰􅟇鴔音匹汲戴勝也一曰鵯鵊訛作批鵊鳥羅願曰即祝鳩也江東謂之烏臼音匊又曰鴉䳎小于烏能逐烏三月即鳴今俗謂之駕犁農人以為候五更輒鳴曰架架格格至曙乃止故滇人呼為榨油郎亦曰鐵鸚鵡能啄鷹鶻烏鵲乃隼屬也南人呼為鳳凰皂𨽻汴人呼為夏雞古有催明之鳥名喚起者盖即此也其鳥大如燕黑色長尾有岐頭上戴勝所巢之處其類不得再巢必相鬭不已楊氏指此為伯勞乃謂批鴂為䳾鷄俱誤矣月令三月戴勝降于桑毛氣味平有毒主治小兒繼病取毛帶之繼病者母有娠乳兒兒病如瘧痢他日相繼腹大或瘥或發他人有娠相近亦能相繼也北人未識此病嘉祐發明時珍曰按淮南子云男子種蘭美而不芳繼子得食肥而不澤情不相往来也益情在腹中之子故也繼病亦作鬾病鬾乃小鬼之名謂兒羸瘦如鬾鬼也大抵亦丁奚疳病􅂿枝主治小兒語遲鞭之即速語嘉祐發明時珍曰案羅氏爾雅翼云本草言伯勞所踏樹枝鞭小兒令速語者以其當萬物不能鳴時而獨能鳴之故以類求之也鸜鵒音劬欲唐本草釋名鴝鵒周禮哵哵鳥廣韻八哥俗名寒臯萬畢術時珍曰此鳥好浴水其晴瞿瞿然故名王氏字說以為其行欲也尾而足勾故曰鴝鵒従勾從欲省亦通哵哵其聲也天寒欲雪則羣飛如告故曰寒臯臯者告也集解恭曰鸜鵒似鵙而有幘者是也蔵器曰五月五日取雛剪去舌端即能效人言又可使取火也時珍曰鸜鵒巢于鵲巢樹穴及人家屋脊中身首俱黑兩翼下各有白㸃其舌如人舌剪剔能作人言嫩則口黄老則口白頭上有幘者亦有無幘者周禮鴝鵒不踰濟地氣使然也肉氣味甘平無毒詵曰寒主治五痔止血炙食或為散飲服唐本炙食一枚治吃噫下氣通靈日華治老嗽臘月臘日取得五味醃炙食或作羮食或搗散蜜丸服之非臘日者不可用孟詵附方目晴主治和乳汁研滴目中令人目明能見霄外之物蔵器百舌拾遺釋名反舌鶷􅗾音轄軋時珍曰按易通云能反復如百鳥之音故名鶷鳥亦象聲今俗呼為牛屎哵哥為其形似鴝鵒而氣臭也梵書名舎羅集解蔵器肖百舌今之鶯也時珍曰百舌處處有之居樹孔窟穴中状如鴝鵒而小身畧長灰黑色㣲有斑㸃喙亦尖黒行則頭俯好食蚯蚓立春後則鳴囀不已夏至後則無聲十月後則蔵蟄人或畜之冬月則死月令仲夏反舌無聲即此蔡邕以為蝦蟇者非矣陳氏謂即鶯服䖍通俗文以鶷􅗾為白脰鳥者亦非矣音雖相似而毛色不同肉氣味缺主治炙食治小兒久不語及殺蟲蔵器窠及糞主治諸蟲咬研末塗之蔵器練鵲宋嘉祐集解禹錫曰練鵲似鴝鵒而小黑褐色食槐子者佳冬春間采之時珍曰其尾鵒長白毛如練帶者是也禽經云冠鳥性勇纓鳥性樂帶鳥性仁張華云帶鳥練鵲之類是也今俗呼為拖白練氣味甘温平無毒主治益氣治風疾細剉炒香袋盛浸酒中毎日取酒温飲服之嘉祐鸎食物釋名黄鳥詩經黄鸝説文黧黄爾雅倉庚月令商爾雅作庚青鳥左傳黄伯勞時珍曰禽經云鸎鳴嚶嚶故名或云鸎項有文故從賏賏項􅅚也或作鶯鳥羽有文也詩云有鶯其羽是矣其色黄而帶黧故有黄鸝諸名陸機云齊人謂之搏黍周人謂之楚雀幽州謂之黄鸝秦人謂之黄鸝鶹淮人謂之黄伯勞唐𤣥宗呼為金衣公子或謂之黄袍集解時珍曰鸎處處有之大于鸜鵒雌雄雙飛體毛黄色羽及尾有黒色相間黑眉尖觜青脚立春後即鳴麥黄椹熟時尤甚其音圓滑如織機聲乃應節趨時之鳥也月令云仲春倉庚鳴說文云倉庚鳴則蠶生冬月則蔵蟄入田塘中以泥自裹如卵至春始出肉氣味甘温無毒主治補益陽氣助脾汪頴食之不妬時珍發明頴曰此鳥感春陽先鳴所以補人時珍曰按山海經云黄鳥食之不妬楊夔止妬論云梁武帝郄后性妬或言倉庚為膳療妬遂令茹之妬果減半啄木鳥宋嘉祐釋名斲木爾雅鴷時珍曰此鳥斲裂樹木取蠧食故名禽經云鴷志在木鵜志在水集解禹錫曰異物志云啄木有大有小有褐有斑褐者是䳄斑者是雄穿木食蠧俗云雷公采藥吏所化也山中一種大如鵲青黒色頭上有紅毛者土人呼為山啄木時珍曰啄木小者如雀大者如鴉面如桃花喙足皆青色剛爪利觜觜如錐長數寸舌長于咮其端有針刺啄得蠧以舌鈎出食之博物志云此鳥能以觜畫字令蟲自出魯至剛云今閩廣蜀人巫家收其符字以收驚療瘡毒也其山啄木頭上有赤毛野人呼為火老鴉能食火炭王元之詩云淮南啄木大如鴉頂似仙鶴堆丹砂即此也亦入藥用其功相同肉氣味甘酸平無毒主治痔瘻及牙齒疳䘌蟲牙燒存性研末納孔子中不過三次嘉祐追勞蟲治風癎時珍發明禹錫曰淮南子云啄木愈齲以類相攝也荆楚嵗時記云野人以五月五日取啄木主齒痛時珍曰追勞治癎治瘻皆取制蟲之義也附方舊一新二瘻瘡膿水不止不合用啄木一隻或火老鴉亦可䀋泥固濟煆存性研末酒下二錢匕姚大夫方追勞取蟲用啄木禽一隻硃砂四兩精猪肉四兩餓令一晝夜将二味和勻服之至盡以䀋泥固濟煅一夜五更取出勿打破連泥埋入土中三尺次日取出破開入銀石器内研末以無灰酒入麝香少許作一服須謹候安排待蟲出速鉗入油鍋煎之後服局方嘉禾散一劑胡雲翺經騐方多年癎病取臘月啄木鳥一箇無灰酒三升先以瓦礶鋪荆芥穂一寸厚安鳥于上再以穂盖一寸傾酒入内鹽泥固濟炭火煅之酒乾為度放冷取出為末入石膏二兩鐵粉一兩炮附子一兩硃砂麝香各一分龍腦一錢共研勻毎服一錢先服温水三兩口以温酒一盞調服即卧發時又一服間日再服不過十服即愈保幼大全舌主治齲齒作痛以綿裹尖咬之梅師附方新一啄木散治蟲牙啄木舌一枚巴豆一枚研勻毎以猪騣一莖㸃少許于牙根上立瘥惠聖血主治庚日向西熱飲令人面色如朱光彩射人時珍嶁出􅒖神書腦主治魯至剛俊靈機要云三月三日取啄木以丹砂大青拌肉餌之一年取腦和雄黄半錢作十丸每日向東水服一丸久能變形怒則如神鬼喜則常人也慈烏宋嘉祐釋名慈鴉嘉祐孝烏説文寒鴉時珍曰烏字篆文象形鴉亦作鵶禽經鵶鳴啞啞故謂之鵶此鳥初生母哺六十日長則反哺六十日可謂慈孝矣北人謂之寒鴉冬月尤甚也集解禹錫曰慈鴉北土極多似烏鴉而小多羣飛作鴉鴉聲不羶臭可食時珍曰烏有四種小而純黑小觜反哺者慈烏也似慈烏而大觜腹下白不反哺者雅烏也似雅烏而大白項者燕烏也似鴉烏而小赤觜穴居者山烏也山烏一名鷁出西方燕烏一名白脰一名鬼雀一名鶷􅗾音轄軋禽經云慈烏反哺白脰不祥人觜善警𤣥烏吟夜又云烏鳥背飛而向啼也又蜀徼有火鴉能銜火肉氣味酸鹹平無毒主治補勞治瘦助氣止咳嗽骨蒸羸弱者和五味醃炙食之良嘉祐詵曰北帝攝鬼録中亦曰慈鴉卵烏鴉宋嘉祐釋名鴉烏小爾雅老雅雅與鴉同鸒音預鵯鶋音匹居楚烏詩義問大觜烏禽經集解時珍曰烏鴉大觜而性貪鷙好鳥善避繒繳古有鴉經以占吉凶然北人喜鴉惡鵲南人喜鵲惡鴉惟師曠以白項者為不祥近之肉氣味酸澀平無毒詵曰肉澀臭不可食止可治病蔵器曰肉及卵食之令人昏忘把其毛亦然盖未必昏為其羶臭耳主治瘦病欬嗽骨蒸勞疾臘月以瓦瓶泥固燒存性為末每飲服一錢又治小兒癎疾及鬼魅嘉祐治暗風癎疾及五勞七傷吐血欬嗽殺蟲時珍發明頌曰烏鴉今人多用治急風而本經不著宜于臘月捕取翅羽觜足全者泥固煅過入藥治諸風烏犀丸中用之見和劑局方時珍曰聖濟總録治破傷中風牙闗𦂳急四肢强直有金烏散煅過入藥品多不録附方新五五勞七傷吐血欬嗽烏鴉一枚栝樓穰一枚白礬少許入鴉肚中縫扎煑熟作四服方壽域神暗風癎疾用臘月烏鴉一箇鹽泥固濟于瓶中煅過放冷取出為末入硃砂末半兩毎服一錢酒下日三服不過十日愈子又方用渾烏鴉一箇瓶固煅研胡桃七枚蒼耳心七枚為末每服一錢空心熱酒下並保幼大全疝氣偏墜即前胡桃蒼耳方加入新生兒衣一副煅研入之同上經脉不通積血不散用烏鴉散主之烏鴉去皮毛炙三分當歸焙好墨各三分延胡索炒蒲黄炒水蛭以糯米炒過各半兩芫青糯米炒過一分為末每服一錢酒下總錄虛勞瘵疾烏鴉一隻絞死去毛腸入人參片花椒各五錢縫合水煑熟食以湯下鴉骨參椒焙研棗肉丸服食吴球便民療烏目氣味無毒主治吞之令人見諸魅或研汁注目中夜能見鬼蔵器頭主治土蜂瘻燒灰傅之聖恵心主治卒得欬嗽炙熟食之肘后膽主治㸃風眼紅爛時珍翅羽主治従髙墜下瘀血搶心面青氣短者取右翅七枚燒研酒服當吐血便愈蘇頌后出肘治鍼刺入肉以三五枚炙焦研末醋調傅之數次即出甚效又治小兒痘瘡不出復入時珍附方新一痘瘡復陷十二月取老鴉左翅辰日燒灰用獖猪血和丸芡子大毎服一丸以獖猪尾血同温水化服當出也聞人規痘疹論鵲别録下品釋名飛駁鳥陶宏景喜鵲食經乾鵲新語時珍曰鵲篆文作舄象形鵲鳴唶唶故謂之鵲鵲色駁雜故謂之駁靈能報喜故謂之喜性最惡濕故謂之乾佛經謂之芻尼小説謂之神女集解時珍曰鵲烏屬也大如鴉而長尾尖觜黑爪緑背白腹尾翮黑白駁雜上下飛鳴以音感而孕以視而抱季冬始巢開户背太嵗向太乙知来嵗風多巢必卑下故曰乾鵲知来往往知往段成式云鵲有隠巢木如梁令鷙鳥不見人若見之主富貴也鵲至秋則毛毨頭秃淮南子云鵲矢中蝟蝟即反而受啄火勝金也雄鵲肉氣味甘寒無毒日華曰涼主治石淋消結熱可燒作灰以石投中解散者是雄也别録蔵器曰燒灰淋汁飲之令淋石自下治消渇疾去風及大小腸澀并四肢煩熱胸膈痰結婦人不可食蘇頌冬至埋鵲于圊前辟時疾温氣時珍出肘后發明𢎞景曰凡鳥之䳄雄難别者其翼左覆右者是雄右覆左者是䳄又燒毛作屑納水中沈者是䳄浮者是雄今云投石恐止是鵲餘鳥未必爾腦主治𢎞景曰五月五日取鵲腦入術家用時珍曰按淮南萬畢術云丙寅鵲腦令人相思髙誘註云取鵲腦䳄雄各一道中燒之丙寅日入酒中飲令人相思又媚藥方中亦有用之者則陶氏所謂術家者亦此類耳巢主治多年者燒之水服療顛狂鬼魅及蠱毒仍呼祟物名號亦傅瘻瘡良日華正旦燒灰撒門内辟盜其重巢柴燒研飲服方寸匕一日三服治積年漏下不斷困篤者一月取效時珍出洞天録及千金方重巢者連年重産之巢也附方新一小便不禁重鵲巢中草一箇燒灰毎服二錢匕以薔薇根皮二錢煎湯服之日二恵聖山鵲食物釋名鷽渥學二音爾雅音汗同上山鷓俗名青嘴烏酉陽雜爼集解時珍曰山鵲處處山林有之状如鵲而烏色有文采赤嘴赤足尾長不能逺飛亦能食鷄雀諺云朝鷽叫晴暮鷽叫雨説文以此為知来事之鳥字説云能效鷹鸇之聲而性惡其類相值則搏者皆指此也鄭樵以為喜鵲誤矣有文采如戴花勝人名戴鵀戴鳻氣味甘温無毒主治食之解諸果毒汪頴鶻嘲宋嘉祐音鶻骨猾二釋名鶻鵃爾雅鶻鳩左傳屈鳩爾雅鷽鳩渥學二音阿鵴雜俎􅀈鷜音藍呂時珍曰其目似鶻其形似鷽鷽山鵲也其聲啁嘲其尾屈促其羽如繿縷故有諸名阿鵴乃鷽鳩之訛也陸佃云凡鳥朝鳴曰嘲夜鳴曰㖡此鳥喜朝鳴故也禽經云林鳥朝嘲水鳥夜㖡是矣集解禹錫曰鶻嘲南北總有似山鵲而小短尾有青毛冠多聲青黑色在深林間飛翔不逺北人呼為􅀈鷜鳥東都賦云鶻嘲春鳴是也時珍曰此鳥春来秋去好食桑椹易醉而性淫或云鶻嘲即戴勝未審是否鄭樵以為鸜鵒非矣肉氣味鹹平無毒主治助氣益脾胃主頭風目眩煑炙食之頓盡一枚至驗嘉祐頭今江東俚人呼頭風為瘇先従兩項邊筋起直上入頭頭悶目眩者是矣杜䳌拾遺釋名杜宇禽經子嶲音攜子規亦作秭歸鶗鴂音弟桂亦作鷤鴂催歸亦作思歸怨鳥周燕説文陽雀時珍曰蜀人見鵑而思杜宇故呼杜䳌説者遂謂杜宇化鵑誤矣鵑與子巂子規鶗鴂催歸諸名皆因其聲似各隨方音呼之而已其鳴若曰不如歸去諺云陽雀叫鶗鴂央是矣禽經云江左曰子規蜀右曰杜宇甌越曰怨鳥服䖍注漢書以鷤鴂為伯勞誤矣名同物異也伯勞一名鴂音决不音桂集解蔵器曰杜鵑小如鷂鳴呼不已蜀王本紀云杜宇為望帝淫其臣鱉靈妻乃禪位亡去時子規鳥鳴故蜀人見䳌鳴而悲望帝荆楚嵗時記云杜䳌初鳴先聞者主别離學其聲令人吐血登厠聞之不祥厭法但作狗聲應之異苑云有人山行見一羣聊學之嘔血便殞人言此鳥啼至血出乃止故有嘔血之事時珍曰杜䳌出蜀中今南方亦有之状如雀鷂而色慘黒赤口有小冠春暮即鳴夜啼達旦鳴必向北至夏尤甚晝夜不止其聲哀切田家候之以興農事惟食蟲蠧不能為巢居他巢生子冬月則蔵蟄肉氣味甘平無毒主治瘡瘻有蟲薄切炙熱貼之蟲盡乃已時珍發明時珍曰按呂氏春秋云肉之美者巂燕之翠則昔人亦嘗食之矣鸚䳇食物釋名鸚哥俗名乾臯時珍曰按字説云鸚䳇如嬰兒之學母語故字従嬰母亦作鸚鵡熊太古云大者為鸚䳇小者為鸚哥則䳇義又取乎此師曠謂之乾臯李昉呼為隴客梵書謂之臊佗集解時珍曰鸚䳇有數種緑鸚䳇出隴蜀而滇南交廣近海諸地尤多大如烏鵲數百羣飛南人以為鮓食紅鸚䳇紫赤色大亦如之白鸚䳇出西洋南番大如母鷄五色鸚䳇出海外諸國大于白而小于緑者性尤慧利俱丹咮鈎吻長尾赤足金睛深目上下目瞼皆能眨動舌如嬰兒其趾前後各二異于衆鳥其性畏寒即發顫如瘴而死飼以餘甘子可解或云摩其背則瘖或云雄者喙變丹雌者喙黑不變張思正倦逰録云海中有黄魚能化鸚䳇此必又一種也有秦吉了鳥鳯皆能人言並附于左附録秦吉了時珍曰即了哥也唐書作結遼鳥番音也出嶺南容管亷邕諸州峒中大如鸜鵒紺黒色夾腦有黄肉冠如人耳丹咮黄距人舌人目目下連頸有深黄文頂尾有分縫能效人言音頗雄重用熟鷄子和飯飼之亦有白色者鳥鳯按范成大虞衡志云鳥鳯出桂海左右兩江峒中大如喜鵲紺碧色項毛似雄鷄頭上有冠尾垂二弱骨長一尺四五寸至秒始有毛其形畧似鳯音聲清越如笙簫能度小曲合宮商又能為百烏之音彼處亦自難得鸚䳇肉氣味甘鹹温無毒主治食之已虛嗽汪頴禽之四山禽類一十三種附一種鳯凰拾遺釋名瑞鶠時珍曰禽經云雄鳯雌凰亦曰瑞鶠鶠者百鳥偃伏也羽蟲三百六十鳯為之長故從鳥従凡凡總也古作朋字象形凰者美也大也集解時珍曰鳯南方朱鳥也按韓詩外傳云鳯之象鴻前麟後燕頷鷄喙蛇頸魚尾鸛顙鴛顋龍文龜背羽備五采髙四五尺翺翔四海天下有道則見其翼若竿其聲若簫不啄生蟲不折生草不羣居不侣行非梧桐不棲非竹實不食非醴泉不飲山海經云丹穴之山有鳥状如鷄五采而文飲食自然自歌自舞見則天下安寧蔡衡云象鳯有四赤多者鳯青多者鸞黄多者鵷紫多者鸑鷟白多者鷫鸘又羣書立名各異文繁不録按羅存齊爾雅翼云南恩州北甘山壁立千仭猿狖不能至鳯凰巢其上惟食蟲魚遇大風雨飄墮其雛小者猶如鶴而足差短鳯凰臺氣味辛平無毒主治勞損積血利血脉安神治驚邪癲癎鷄癎發熱狂走水磨服之蔵器發明蔵器曰鳯凰脚下白物如石者名鳯凰臺鳯雖靈鳥時或来儀候其棲止處掘土二三尺取之状如圓石白似卵者是也然鳯非梧桐不棲非竹實不食那復近地而有臺入土乎正物有自然之理不可曉也今有鳯處未必有竹有竹處未必有鳯恐是麟鳯洲有之如漢時所貢續弦膠煎鳯髓造成者曷足怪哉時珍曰按呂氏春秋云流沙之西丹山之南有鳯鳥之卵沃民所食則所産之地不以為異也續絃膠洞㝠記以為鸞血作成故雷公炮炙論云斷弦折劍遇鸞血而如初陳氏以為鳯髓所作要皆誑言不必深辯孔雀别録下品釋名越鳥時珍曰孔大也李昉呼為南客梵書謂之摩由邏集解𢎞景曰出廣益諸州方家罕用恭曰交廣多有劒南元無時珍曰按南方異物志云孔雀交趾雷羅諸州甚多生髙山喬木之上大如雁髙三四尺不減于鶴細頸隆背頭裁三毛長寸許數十羣飛棲逰岡陵晨則鳴聲相和其聲曰都䕶雌者短尾無金翠雄者三年尾尚小五年乃長二三尺夏則脫毛至春復生自背至尾有圓文五色金翠相繞如錢自愛其尾山棲必先擇置尾之地雨則尾重不能髙飛南人因往捕之或暗伺其過生斷其尾以為方物若回顧則金翠頓減矣山人養其雛為媒或探其卵雞伏出之飼以猪腸生菜之屬聞人拍手歌舞則舞其性妬見采服者必啄之北户録云孔雀不匹以音影相接而孕或雌鳴下風雄鳴上風亦孕冀越集云孔雀雖有雌雄将乳時登木哀鳴蛇至即交故其血膽猶傷人禽經云孔見蛇則宛而躍者是矣肉氣味鹹涼㣲毒蔵器曰無毒主治解藥毒蠱毒日華發明時珍曰按紀聞云山谷夷人多食之或以為脯腊味如雞鶩能解百毒人食其肉者自後服藥必不效為其解毒也又續博物志云李衛公言鵞驚鬼孔雀辟惡鵁鶄厭火血主治生飲解蠱毒良日華發明時珍曰熊太古言孔雀與蛇交故血膽皆傷人而日華及異物志言其血與首能解大毒似不相合按孔雀之肉既能解毒何血獨傷人耶盖亦猶雉與蛇交時即有毒而蛇伏蟄時即無毒之意耳屎氣味㣲寒主治女子帶下小便不利别録治崩中帶下可傅惡瘡日華尾氣味有毒宗奭曰不可入目令人昏翳駝鳥拾遺釋名駝蹄鷄綱目食火鷄同上骨托禽時珍曰駝象形托亦駝字之訛集解蔵器曰駝鳥如駝生西戎髙宗永徽中吐火羅獻之髙七尺足如槖駝鼓翅而行日三百里食銅鐵也時珍曰此亦是鳥也能食物所不能食者按草李延壽後魏書云波斯國有鳥形如駝能飛不髙食與肉亦噉火日行七百里郭義恭廣志云安息國貢大雀雁身駝蹄蒼色舉頭髙七八尺張翅丈餘食大麥其卵如甕其名駝鳥劉郁西域記云富浪有大鳥駝蹄髙丈餘食火炭卵大如升費信星槎録云竹步國阿丹國俱出駝蹄鷄髙者六七尺其蹄如駝彭乘墨客揮犀云骨托禽出河州状如鵰髙三尺餘其名自呼能食鐵石宋祁唐書云開元初康國貢駝鳥卵鄭曉吾學編云洪武初三佛臍國貢火鷄大于鶴長三四尺頸足亦似鶴銳嘴軟紅冠毛色如青羊足二指利爪能傷人腹致死食火炭諸書所記稍有不同實皆一物也屎氣味無毒主治人誤吞鐵石入腹食之立消蔵器鷹本經中品釋名角鷹綱目鷞鳩時珍曰鷹以膺擊故謂之鷹其頂有毛角故曰角鷹其性爽猛故曰鷞鳩昔少皥氏以鳥官名有祝鳩鳲鳩鶻鳩睢鳩鷞鳩五氏盖鷹與鳩同氣禪化故得稱鳩也禽經云小而鷙者皆曰隼大而鷙者皆曰鳩是矣爾雅翼云在北為鷹在南為鷂一云大為鷹小為鷂梵書謂之嘶那夜集解時珍曰鷹出遼海者上北地及東北胡者次之北人多取雛養之南人八九月以媒取之乃鳥之疏暴者有雉鷹兔鷹其類以季夏之月習擊孟秋之月祭鳥隋魏彦深鷹賦頗詳其畧云資金方之猛氣擅火徳之炎精指重十字尾貴合盧嘴同鈎利脚等荆枯或白如散花或黒如㸃漆大文若錦細斑似纈身重若金爪剛如鐵毛衣屢改厥色無常寅生酉就總號為黄二周作鷂三嵗成蒼雌則體大雄則形小察之為易調之實難薑以取熱酒以排寒生于窟急者好眠巢于木者常立雙骹長者起遲六翮短者飛肉氣味缺主治食之治野狐邪魅蔵器頭主治五痔燒灰飲服藥性治痔瘻燒灰入麝香少許酥酒服之治頭風眩運一枚燒灰酒服時珍出王右軍法帖及温隠居海上方附方新一頭目虛運車風一箇即鷹頭也去毛焙川芎一兩為末酒服三錢選竒觜及爪主治五痔狐魅燒灰水服蔵器睛主治和乳汁研之日三注眼中三日見碧霄中物忌烟熏藥性骨主治傷損接骨燒灰每服二錢酒服隨病上下食前食後時珍毛主治斷酒水煮汁飲即止酒也屎白氣味㣲寒有小毒主治傷撻滅痕本經燒灰酒服治中惡藥性燒灰酒服方寸匕主邪惡勿令本人知蘇恭消虚積殺勞蟲去面皰䵟􅍍時珍發明𢎞景曰單用不能滅瘢湏合殭蠶衣魚之屬為膏乃效附方舊二新四奶癖冦曰凡小兒膈下硬如有物乃俗名奶癖者也只服温脾化積丸藥不可轉瀉用黄鷹屎一錢蜜佗僧一兩舶上硫黄錢一分丁香二十一箇為末毎服一字三嵗已上半用乳汁或白麵湯調下並不轉瀉一復時取下青黒物後服補藥以醋石榴皮炙黒半兩蛜􅖉一分木香一分麝香半錢為末毎服一錢薄酒調下連喫二服面皰鷹屎白二分胡粉一分蜜和傅之外臺滅痕千金用鷹屎白和人精傅日三二兩殭蠶一兩半為末蜜和傅聖恵用鷹屎總錄用鷹屎白白附子各一兩為末醋和傅日三五次痕滅止食哽鷹糞燒灰水服方寸匕外臺鵰音凋綱目釋名鷲音就經山海鷻說文音團時珍曰禽經云鷹以膺之鶻以猾之隼以尹之鵰以周之鷲以就之鷻以搏之皆言其擊搏之異也梵書謂之掲羅闍集解時珍曰鵰似鷹而大尾長翅短土黄色鷙悍多力盤旋空中無細不覩皂鵰即鷲也出北地色皂青鵰出遼東最俊者謂之海東青羌鷲出西南夷黄頭赤目五色皆備鵰類能搏鴻鵠獐鹿犬豕又有虎鷹翼廣丈餘能摶虎也鷹鵰雖鷙而畏燕子物無大小也其翮可為箭羽劉郁西域記云皂鵰一産三卵者内有一卵化犬短毛灰色與犬無異但尾背有羽毛數莖耳隨母影而走所逐無不獲者謂之鷹背狗骨氣味缺主治折傷斷骨燒灰毎服二錢酒下在上食後在下食前骨即接如初時珍出接骨方發明時珍曰鷹鶚鵰骨皆能接骨盖鷙鳥之力在骨故以骨治骨從其類也屎主治諸鳥獸骨硬燒灰酒服方寸匕時珍出外臺袐要鶚綱目釋名魚鷹禽經鵰鷄詩疏睢䧱周詩王睢音疽沸波淮南子下窟烏時珍曰鶚状可愕故謂之鶚其視睢健故謂之睢能入穴取食故謂之下窟烏翺翔水上扇魚令出故曰沸波禽經云王睢魚鷹也尾上白者曰白鷢集解時珍曰鶚鵰類也似鷹而土黄色深目好峙雄雌相得鷙而有别交則雙翔别則異處能翺翔水上捕魚食江表人呼為食魚鷹亦啖蛇詩云闗闗睢鳩在河之洲即此其肉腥惡不可食陸機以為鷲揚雄以為白鷢黄氏以為杜鵑皆誤矣禽經云鳩生三子一為鶚鳩尸鳩也杜預以王睢為尸鳩或以此也骨主治接骨時珍附方新一接骨用下窟烏即鶚也取骨燒存性以古銅錢一箇煅紅醋淬七次為末等分酒服一錢不可過多病在下空心在上食後服極有效驗須先夾縳定乃服此唐藺道人方觜主治蛇咬燒存性研末一半酒服一半塗之時珍鴟别録下品釋名雀鷹詩疏鳶詩經鷣音淫隼本作鵻音筍鷂時珍曰鴟鳶二字篆文象形一云鴟其聲也鳶攫物如射也隼擊物隼也鷂目擊遥也詩疏云隼有數種通稱為鷂雀鷹春化布穀爾雅謂之茅鴟齊人謂之擊正或謂之題肩爾雅云鷣負雀也梵書謂之阿黎耶集解𢎞景曰鴟即俗呼老鴟者又有鵰鶚並相似而大時珍曰鴟似鷹而稍小其尾如舵極善髙翔専捉鷄雀鴟類有數種按禽經云善搏者曰鷂竊𤣥者曰鵰骨曰鶻瞭曰鷂展曰鸇奪曰鵽又云鶻生三子一為鴟鶻小于鴟而最猛捷能擊鳩鴿亦名鷸子一名籠脫鸇色青向風展翅迅揺搏捕鳥雀鳴則大風一名晨風鵽小于鸇其脰上下亦取鳥雀如攘掇一名鷸子又月令二月鷹化為鳩七月鳩化為鷹荘子云鷂為鸇鸇為布榖布穀復為鷂皆指此屬也隼鶻雖鷙而有義故曰鷹不擊伏隼不擊胎鶻握鳩而自暖乃至旦而見釋此皆殺中有仁也鴟頭修治𢎞景曰雖不限雌雄雄者當勝用須㣲炙不用蠧者古方治頭面方有鴟頭酒氣味鹹平無毒時珍曰按段成式云唐肅宗張后専權毎進酒置鴟腦于内云令人乆醉健忘則鴟頭亦有㣲毒矣主治頭風目眩顛倒癎疾别錄附方舊二癲癎瘈瘲飛鴟頭三枚鉛丹一斤為末蜜丸梧子大毎酒服三丸日三次千金方旋風眩冒鴟頭丸用鴟頭一枚炒黄真䕡茹白术各一兩川椒半兩炒去汁為末蜜和丸梧子大毎酒下二十丸聖恵肉氣味缺主治食之治癲癎孟詵食之消鷄肉鵪鶉成積時珍骨主治鼻衂不止取老鴟翅闗大骨㣲炙研末吹之時珍總出聖濟録鴟鵂拾遺釋名角鴟說文怪鴟爾雅雚音丸老兔爾雅鉤鵅音格鵋䳢音忌欺轂轆鷹蜀人所呼呼咵鷹楚人所呼夜食鷹吴人所呼時珍曰其状似鴟而有毛角故曰鴟曰角曰雚雚字象鳥頭目有角形也老兔也象頭目形鵂怪皆不祥也鈎鵅轂轆呼咵皆其聲似蜀人又訛鉤格為鬼各哥集解蔵器曰鈎鵅即爾雅鵋䳢也江東呼為鈎鵅其室状似鴟有角怪鳥也夜飛晝伏入城城空入室空常在一處則無害若聞其聲如笑者宜速去之北土有訓狐二物相似各有其類訓狐聲呼其名兩目如猫兒大如鴝鵒作笑聲當有人死又有鵂鶹亦是其類㣲小而黄夜能入人家拾人手爪知人吉凶有人獲之嗉中猶有爪甲故除爪甲者埋之户内為此也時珍曰此物有二種鴟鵂大如鴟鷹黄黒斑色頭目如猫有毛角兩耳晝伏夜出鳴則雌雄相喚其聲如老人初若呼後若笑所至多不祥荘子云鴟鵂夜拾蚤察毫末晝出而不見丘山何承天纂文云鴟鵂白日不見人夜能拾蚤虱俗訛蚤為人爪妄矣一種鵂鶹大如鴝鵒毛色如鷂頭目亦如猫鳴則後竅應之其聲連囀如云休留休留故名曰鵂鶹江東呼為車載板楚人呼為快扛鳥蜀人呼為春哥兒皆言其鳴主有人死也試之亦驗說文謂之䲵音爵言其小也蔵器所謂訓狐者乃鴞也所謂鵂鶹者乃鴟鵂之小者也並誤矣周禮硩蔟氏掌覆夭鳥之巢以方書十日之號十二支之號十二辰之號十二嵗之號二十有八宿之號懸其巢則去續博物志云鵂鶹鸛鵲其抱以聒肉氣味缺主治瘧疾用一隻去毛腸油􅨘食之時珍出隂憲副方附方新一風虛眩運大頭鷹閉殺去毛煮食以骨燒存性酒服便民食療肝主治入法術家用時珍鴞拾遺釋名梟鴟音嬌土梟爾雅山鴞音灼鷄鴞十六國史鵩漢書訓狐拾遺流離詩經􅀈魂時珍曰鴞梟訓狐其聲也鵩其色如服色也俚人訛訓狐為幸胡者是也鴟與鴞二物也周公合而詠之後人遂以鴟鴞為一鳥誤矣􅀈字韻書無攷當作匈擁切􅀈魂流離言其不祥也吴球方作逐魂梟長則食母故古人夏至磔之而其字従鳥首在木上集解蔵器曰鴞即梟也一名鵩吴人呼為􅀈魂惡聲鳥也賈誼云鵩似鴞其實一物也入室主人當去此鳥盛午不見物夜則飛行常入人家捕鼠食周禮硩蔟氏掌覆夭鳥之巢註云惡鳴之鳥若鴞鵩鬼車之屬時珍曰鴞鵩鵂鶹梟皆惡鳥也說者往往混註賈誼謂鵩似鴞蔵器謂鴞與訓狐為二物許慎張華謂鴞鵩鵂鶹為一物王逸謂鵩即訓狐陳正敏謂梟為伯勞宗懔謂土梟為鴝鵒各執一説今通攷據并咨詢野人則鴞梟鵩訓狐一物也鵂鶹一物也蔵器所謂訓狐之状者鵂鶹也鴞即今俗所呼幸胡者是也處處山林時有之少美好而長醜惡状如母鷄有斑文頭如鴝鵒目如猫目其名自呼好食桑椹古人多食之故禮云不食鴞胖謂脇側薄弱也荘子云見彈而求鴞炙前涼錄云張天錫言北方美物桑椹甘香鷄鴞革饗皆指此物也按巴蜀異物志云鵩如小鷄體有文色土俗因名之不能逺飛行不出域盛宏之荆州記云巫縣有鳥如雌鷄其名為鴞楚人謂之鵩陸機詩疏云鴞大如鳩綠色入人家凶賈誼所賦鵩是也其肉甚美可為羮臛炙食劉恂嶺表録云北方梟鳴人以為怪南中晝夜飛鳴與鳥鵲無異桂林人家家羅取使捕鼠以為勝狸也合諸說觀之則鴞鵩訓狐之為一物明矣又按郭義恭廣志云鴞楚鳩所生也不能孳乳如騾駏驉焉然梟長則食母是自能孳乳矣抑所食者即鴆耶淮南子云甑瓦投之能止梟鳴性相勝也肉氣味甘温無毒主治鼠瘻炙食之蔵器風癎噎食病時珍附方新二風癎風癎攷寳鑑第九卷名神應丹惺神散醫方大成下册噎食取鵩鳥未生毛者一對用黄泥固濟煅存性為末毎服一匙以温酒服壽域神方頭主治痘瘡黑陷用臘月者一二枚燒灰酒服之當起時珍保出雲岐子命集目主治吞之令人夜見鬼物蔵器鴆音沈去聲别録下品校正自外類移于此釋名䲰日與運日同别録同力鳥陶宏景集解别録白鴆生南海𢎞景曰鴆與䲰日是兩種鴆鳥状如孔雀五色雜斑髙大黑頸赤喙出廣之深山中䲰日状如黒傖鷄作聲似云同力故江東人呼為同力鳥並啖蛇人誤食其肉立死並療蛇毒昔人用鴆毛為毒酒故名鴆酒頃不復爾又海中有物赤色状如龍名海薑亦有大毒甚于鴆羽恭曰鴆鳥出商州以南江嶺間大有人皆諳識其肉腥有毒不堪啖云羽畫酒殺人亦是浪證郭璞云鴆大如鵰長頸赤喙食蛇説文廣雅淮南子皆以鴆為䲰日交廣人亦云䲰日即鴆一名同力鳥更無如孔雀者陶為人所誑也時珍曰按爾雅翼云鴆似鷹而大状如鴞紫黒色赤喙黑目頸長七八寸雄名運日雌名隂諧運日鳴則晴隂諧鳴則雨食蛇及橡實知木石有蛇即為禹步以禁之須臾木倒石崩而蛇出也蛇入口即爛其屎溺着石石皆黄爛飲水處百蟲吸之皆死惟得犀角即解其毒又楊亷夫鐵厓集云鴆出蘄州黄梅山中状類訓狐聲如擊腰鼓巢于大木之顛巢下數十步皆草不生也毛氣味有大毒入五臓爛殺人别録喙主治帶之殺蝮蛇毒别録時珍曰蛇中人刮末塗之登時愈也姑獲鳥拾遺釋名乳母鳥𤣥中記夜行遊女同天帝少女同無辜鳥同隠飛𤣥中記鬼鳥拾遺譩譆杜預左傳注鉤星嵗時記時珍曰昔人言此鳥産婦所化隂慝為妖故有諸名集解蔵器曰姑獲能收人魂魄𤣥中記云姑獲鳥鬼神類也衣毛為飛鳥脫毛為女人云是産婦死後化作故胸前有兩乳喜取人子養為己子凡有小兒家不可夜露衣物此鳥夜飛以血㸃之為誌兒輒病驚癎及疳疾謂之無辜疳也荆川多有之亦謂之鬼鳥周禮庭氏以救日之弓救月之矢射矢鳥即此也時珍曰此鳥純雌無雄七八月夜飛害人尤毒治鳥綱目集解時珍曰按千寳搜神記云越地深山有治鳥大如鳩青色穿樹作巢大如五六升器口徑數寸飭以土堊赤白相間状如射侯伐木者見此樹即避之犯之則能役虎害人燒人廬舍白日見之鳥形也夜聞其鳴鳥聲也時或作人形長三尺入澗中取蟹就人間火炙食山人謂之越祀之祖又段成式酉陽雜俎云俗説昔有人遇洪水食都樹皮餓死化為此物居樹根者為猪都居樹中者為人都居樹尾者為鳥都烏都左脇下有鏡印濶一寸一分南人食其窠味如木芝也竊謂獸有山都山􅀈木客而鳥亦有治鳥山蕭木客鳥此皆戾氣所賦同受而異形者與今附于左附録木客鳥時珍曰按異物志云木客鳥大如鵲千百為羣飛集有度俗呼黄白色有翼有綬飛獨髙者為君長居前正赤者為五伯正黒者為鈐下緗色雜赤者為功曹左脇有白帶者為主簿各有章色廬陵郡東有之獨足鳥一名山蕭鳥廣州志云獨足鳥閩廣有之大如鵠其色蒼其聲自呼臨海志云獨足文身赤口晝伏夜飛或時晝出羣鳥噪之惟食蟲豸不食稻粱聲如人嘯将雨轉鳴即孔子所謂一足之鳥商羊者也山海經云羭次之山有鳥状如梟人面而一足名曰槖蜚音肥冬則蟄服之不畏雷孫愐唐韻云􅀢土精也似雁一足黄色毁之殺人窠表主治作履􅦘治脚氣時珍俎出雜鬼車鳥拾遺釋名鬼鳥拾遺九頭鳥同上蒼鸆白澤圖竒鶬時珍曰鬼車妖鳥也取周易載鬼一車之義似鶬而異故曰竒鶬集解蔵器曰鬼車晦暝則飛鳴能入人家收人魂氣相傳此鳥昔有十首犬囓其一猶餘九首其一常滴血血着人家則凶荆楚人夜聞其飛嗚但滅燈打門捩狗耳以厭之言其畏狗也白澤圖蒼鸆有九首及孔子與子夏見竒鶬九首皆此物也荆楚嵗時頭以為姑獲者非矣二鳥相似故同名鬼鳥時珍曰鬼車状如鵂鶹而大者翼廣丈許晝盲夜瞭見火光輒墮按劉恂嶺表録云鬼車出秦中而嶺外尤多春夏之交稍遇隂晦則飛鳴而過聲如刀車嗚愛入人家鑠人魂氣血滴之家必有凶咎便民圖云冬月鬼車夜飛鳴聲自北而南謂之出巢主雨自南而北謂之歸巢主晴周宻齊東野語云宋李夀翁守長沙曽捕得此鳥状類野鳬赤色身圓如箕十頸環簇有九頭其一獨無而滴鮮血毎頸兩翼飛則霍霍並進又周漢公主病此鳥飛至砧石即薨嗚呼怪氣所鍾妖異如此不可不知諸鳥有毒拾遺凡鳥自死目閉自死足不伸白鳥𤣥首𤣥鳥白首三足四距六指四翼異形異色並不可食食之殺人本草綱目卷四十九
