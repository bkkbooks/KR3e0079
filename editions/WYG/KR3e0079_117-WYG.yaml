body:
  text: 本草綱目卷五十下明李時珍撰獸之一畜類二十四種牛本經上品校正别録上品牛乳拾遺犢臍屎今併為一釋名時珍曰許慎云牛件也牛為大牲可以件事分理也周禮謂之大牢牢乃豢畜之室牛牢大故名大牢内則謂之一元大武元頭也武足跡也猶史記稱牛為四蹄今人稱牛為一頭之義梵書謂之瞿摩帝牛之牡者曰牯曰特曰犅曰㹍牝者曰泮曰㹀南牛曰悞北牛曰搸純色曰犧黑曰白曰㹊赤曰駁曰犂去勢曰犍又曰犗無角曰牛子曰犢生二歳曰㸽三歳曰犙四歳曰牭五歳曰六歳曰犕集解藏器曰牛有數種本經不言黄牛烏牛水牛但言牛爾南人以水牛為牛北人以黄牛烏牛為牛牛種既殊入用當别時珍曰牛有牛水牛二種牛小而水牛大牛有黄黑赤白駁雜數色水牛色青蒼大腹鋭頭其狀類豬角若擔矛能與虎鬭亦有白色者鬱林人謂之州留牛又廣南有稷牛即果下牛形最卑小爾雅謂之犤牛王會篇謂之紈牛是也牛齒有下無上察其齒而知其年三嵗二齒四嵗四齒五嵗六齒六嵗以後毎年接脊骨一節也牛耳聾其聴以鼻牛瞳堅而不横其聲曰牟項垂曰胡蹄肉曰百葉曰膍角胎曰䚡鼻木曰􅆢嚼草復出曰齝腹草未化曰聖虀牛在畜屬土在卦屬坤土緩而和其性順也造化權輿云乾陽為馬坤隂為牛故馬蹄圓牛蹄坼馬病則臥隂勝也牛病則立陽勝也馬起先前足臥先後足從陽也牛起先後足臥先前足從隂也獨以乾健坤順為説盖知其一而已黄牛肉氣味甘温無毒𢎞景曰􅀈牛惟勝青牛為良水牛惟可充食日華曰黄牛肉微毒食之發藥毒動病不如水牛詵曰黄牛動病黑牛尤不可食牛者稼穡之資也不可多殺牛若自死者血脈已絶骨髓已竭不可食之藏器曰牛病死者發痼疾痃癖令人洞下疰病黑牛白頭者不可食獨肝者有大毒令人痢血至死北人牛瘦多以蛇從鼻灌之故肝獨也水牛則無之時珍曰張仲景云噉蛇牛毛髪白而後順者是也中其毒者惟人乳可以解之内則云牛夜鳴則􅂒臭不可食病死者有大毒令人生疔暴亡食經云牛自死白首者食之殺人疥牛食之發痒黄牛水牛肉合豬肉及黍米酒食並生寸白蟲合韭薤食令人熱病合生薑食損齒煮牛肉入杏仁蘆葉易爛相宜詵曰惡馬食牛肉即馴亦物性也主治安中益氣養脾胃别錄補益腰脚止消渴及唾涎孫思邈發明時珍曰韓􅐂言牛肉補氣與黄茋同功觀丹溪朱氏倒倉法論而引申觸類則牛之補土可心解矣今天下日用之物雖嚴法不能禁亦因肉甘而補皮角有用也朱震亨倒倉論曰腸胃為積榖之室故謂之倉倒者推陳以致新也胃屬土受物而不能自運七情五味有傷中宫停痰積血互相纒糾發為癰瘓為勞瘵為蠱脹成形成質為窠為臼以生百病而中宫愆和自非丸散所能去也此方出自西域異人其法用黄肥牡牛肉二十斤長流水煮成糜去滓濾取液再熬成琥珀色收之毎飲一鍾隨飲至數十鍾寒月温飲病在上則令吐在下則令利在中則令吐而利在人活變吐利後渴即服其小便一二碗亦可蕩滌餘垢睡二日乃食淡粥養半月即精神强健沉疴悉亡也須五年忌牛肉盖牛坤土也黄土色也以順徳配乾牡之用也肉者胃之樂也熟而為液無形之物也故能由腸胃而透肌膚毛竅爪甲無所不到在表者因吐而得汗在清道者自吐而去在濁道者自利而除有如洪水泛漲陳莝順流而去盎然渙然潤澤枯槁而有精爽之樂也既王綸云牛肉本補脾胃之物非吐下藥也特飲之滿而溢爾借補為㵼故病去而胃得補亦竒法也但病非腸胃者似難施之附方新五小刀圭韓飛霞曰凡一切虚病皆可服之用小牛犢兒未交感者一隻臘月初八日或戊巳日殺之去血燖毛洗浄同臟腑不遺分寸大銅鍋煑之毎十觔入黄茋十兩人參四兩茯苓六兩官桂良薑各五錢陳皮三兩甘草蜀椒各二兩食鹽二兩淳酒二斗同煑水以八分為率文火煑至如泥其骨皆槌碎併濾取稠汁待冷以甕盛之埋于土内露出甕面凡飲食中皆任意食之或以酒調服更妙肥犬及鹿皆可依此法作之返本丸補諸虚百損用黄犍牛肉去筋膜切片河水洗數遍仍浸一夜次日再洗三遍水清為度用無灰好酒同入壜内重泥封固桑柴文武火煑一晝夜取出如黄沙為佳焦黑無用焙乾為末聴用山藥鹽炒過蓮肉去心鹽炒過並去鹽白茯苓小茴香炒各四兩為末毎牛肉半觔入藥末一觔以紅棗蒸熟去皮和搗丸梧子大毎空心酒下五十丸日三服乾坤生意腹中痞積牛肉四兩切片以風化石灰一錢擦上蒸熟食常食痞積自下經騐秘方腹中癖積黄牛肉一觔恒山三錢同煑熟食肉飲汁癖必自消甚效筆峯雜興牛皮風癬毎五更炙牛肉一觔食以酒調輕粉敷之直指方水牛肉氣味甘平無毒日華曰冷微毒宜忌同黄牛主治消渴止啘洩安中益氣養脾胃别錄補虚壮徤强筋骨消水腫除濕氣藏器附方舊二新一水腫尿澀牛肉一觔熟蒸以薑醋空心食之心鏡手足腫痛傷寒時氣毒攻手足腫痛欲斷牛肉裹之腫消痛止范汪方白虎風痛寒熱發歇骨節微腫用水牛肉脯一兩炙黄燕窠土伏龍肝飛羅麵各二兩砒黄一錢為末每以少許新汲水和作彈丸大于痛處摩之痛止即取藥抛於熱油鐺中聖惠頭蹄水牛者良氣味涼食經云患冷人勿食蹄中巨筋多食令人生肉刺主治下熱風孟詵附方舊一水腫脹滿小便澀者用水牛蹄一具去毛煑汁作羮切食之或以水牛尾條切作腊食或煮亦佳食醫心鏡鼻水牛者良主治消渴同石燕煑汁服藏器治婦人無乳作羮食之不過兩日乳下無限氣壮人尤效孟詵療口眼喎斜不拘乾濕者以火炙熱於不患處熨之即漸止宗奭皮水牛者良主治水氣浮腫小便澀少以皮蒸熟切入豉汁食之心鏡􅆈膠最良詳阿膠乳氣味甘微寒無毒𢎞景曰􅀈牛乳佳恭曰􅀈牛乳性平生飲令入利熱飲令入口乾温可也水牛乳作酪濃厚勝􅀈牛造石蜜須之藏器曰黑牛乳勝黄牛凡服乳必煑一二沸停冷啜之熱食即壅不欲頓服與酸物相反令人腹中癥結患冷氣人忌之合生魚食作􅛎時珍曰凡取以物撞之則易得餘詳乳酪下制蓁芁不灰木主治補虚羸止渴别錄養心肺解熱毒潤皮膚日華冷補下熱氣和蒜煎沸食去冷氣痃癖藏器患熱風人宜食之孟詵老人煑食有益入薑葱止小兒吐乳補勞思邈治反胃熱噦補益勞損潤大腸治氣痢除疸黄老人煑粥甚宜時珍發明震亨曰反胃􅀈膈大便燥結宜牛羊乳時時嚥之並服四物湯為上策不可用人乳人乳有飲食之毒七情之火也時珍曰乳􅋩萆茇治痢有效盖一寒一熱能和隂陽耳按獨異志云唐太宗苦氣痢衆醫不效下詔訪問金吾長張寳藏曽困此疾即具疏以乳煎蓽茇方上服之立愈宣下宰臣與五品官魏徵難之逾月不擬上疾復發復進之又平因問左右曰進方人有功未見除授何也徴懼曰未知文武二吏上怒曰治得宰相不妨授三品我豈不及汝耶即命與三品文官授鴻臚寺卿其方用牛乳半觔蓽茇三錢同煎減半空腹頓服附方舊三新八風熱毒氣煎過牛乳一升生牛乳一升和匀空腹服之日三服千金方小兒熱噦牛乳二合薑汁一合銀器文火煎五六沸量兒與服之下虚消渴心脾中熱下焦虚冷小便多者牛羊乳毎飲三四合廣利方病後虚弱取七嵗以下五嵗以上黄牛乳一升水四升煎取一升稍稍飲至十日止外臺方補益勞損千金翼崔尚書方鍾乳粉一兩袋盛以牛乳一升煎減三分之一去袋飲乳日三又方白石英末三觔和黒豆與十嵗以上生犢㹀牛食毎日與一兩七日取牛乳或熱服一升或作粥食其糞以種菜食百無所忌能潤臟腑澤肌肉令人壮健脚氣痺弱牛乳五升硫黄三兩􅋩取三升每服三合羊乳亦可或以牛乳五合􅋩調硫黄末一兩服取汁尤良肘后肉人怪病人頂生瘡五色如櫻桃状破則自頂分裂連皮剝脱至足名曰肉人常飲牛乳自消夏子益竒疾方重舌出涎特牛乳飲之聖惠蚰蜒入耳牛乳少少滴入即出若入腹者飲一二升即化為水聖惠方蜘蛛瘡毒牛乳飲之良生生編血氣味鹹平無毒主治解毒利腸治金瘡折傷垂死又下水蛭煑柈醋食治血痢便血時珍發明時珍曰按元史云布智兒從太祖征囘囘身中數矢血流滿體悶仆㡬絶太祖命取一牛剖其腹納之牛腹中浸熱血中移時遂甦又云李庭從伯顔攻郢州砲傷左脇矢貫於胷㡬絶伯顔命剖水牛腹納其中良久而甦何孟春云予在職方時問各邊将無知此術者非讀元史弗知也故書於此以備緩急附方新一誤吞水蛭腸痛黄瘦牛血熱飲一二升次早化豬脂一升飲之即下出也肘后脂黄牛者良煉過用氣味甘温微毒多食發痼疾瘡瘍鑑源云牛脂軟主治諸瘡疥癬白秃亦入面脂時珍附方新五消渴不止栝樓根􅋩用生栝樓根切十觔以水三斗煑至一斗濾浄入煉浄黄牛脂一合慢火熬成膏瓶收毎酒服一杯日三總錄腋下胡􅆨牛脂和胡粉塗之三度永瘥氏姚食物入鼻介介作痛不出用牛脂一棗大納鼻中吸入脂消則物隨出也外臺方走精黄病面目俱黄多睡舌紫甚面裂若爪甲黒者死用豉半兩牛脂一兩􅋩過綿裹烙舌去黒皮一重濃􅋩䜴湯飲之三十六黄方髓黑牛黄牛㸺牛者良煉過用氣味甘温無毒主治補中填骨髓久服增年本經安五臟平三焦續絶傷益氣力止洩利去消渴皆以清酒暖服之别錄平胃氣通十二經脈思邈治瘦病以黑牛髓地黄汁白宻等分煎服孟詵潤肺補腎澤肌悦面理折傷擦損痛甚妙時珍附方新三補精潤肺壮陽助胃用煉牛髓四兩胡桃肉四兩杏仁泥四兩山藥末半觔煉宻一觔同搗成膏以瓶盛湯煑一日毎服一匙空心服之瑞竹方勞損風濕陸杭膏用牛髓羊脂各二升白宻薑汁酥各三升􅋩三上三下令成膏隨意以温酒和服之經心錄手足皴裂牛髓敷之腦水牛黄牛者良氣味甘温微毒心鏡曰牛熱病死者勿食其腦令生腸癰主治風眩消渴蘇恭脾積痞氣潤皴裂入面脂用時珍附方新四吐血咯血五勞七傷用水牛腦一枚塗紙上隂乾杏仁煑去皮胡桃仁白蜜各一觔香油四兩同熬乾為末毎空心燒酒服二錢七乾坤秘韞偏正頭風不拘逺近諸藥不效者如神用白芷芎藭各三錢為細末以黄牛腦子搽末在上瓷器内加酒頓熟乗熱食之盡量一醉醒則其病如失甚驗保夀堂方脾積痞氣牛腦丸治男婦脾積痞病大有神效黄㸺牛腦子一箇去皮筋擂爛皮硝末一觔蒸餅六箇晒研和匀糊丸梧子大每服三十丸空心好酒下日三服百日有驗錄聖濟總氣積成塊牛腦散用牛腦子一箇去筋雄雞肫一箇連黄並以好酒浸一宿搗爛入木香沉香砂仁各三兩皮硝一碗杵千下入生銅鍋内文武火焙乾為末入輕粉三錢令匀毎服二錢空心燒酒服日三服同上心已下黄牛者良主治虚忘補心别錄脾主治補脾藏器臘月淡煑日食一度治痔瘻和朴消作脯食消痞塊時珍醫出千金通肺已下水牛者良主治補肺藏器肝主治補肝明目别錄治瘧及痢醋煑食之孟詵婦人隂䘌納之引蟲時珍腎主治補腎氣益精别錄治濕痺孫思邈胃黄牛水牛俱良氣味甘温無毒𢎞景曰青牛腸胃合犬肉犬血食病人主治消渴風眩補五臟醋煑食之詵補中益氣解毒養脾胃時珍附方新一噉蛇牛毒牛肚細切水一斗煑一升服取汗即瘥金匱要畧膍一名百葉時珍曰膍音毗言其有比列也牛羊食百草與他獸異故其胃有膍有胘有蜂窠亦與他獸異也胘即胃之厚處主治熱氣水氣治痢解酒毒藥毒丹石毒發熱同肝作生以薑醋食之藏器膽臘月黄牛青牛者良𢎞景曰膽原附黄條中今拔出於此以類相從耳氣味苦大寒無毒主治可丸藥本經除心腹熱渴止下痢及口焦燥益目精别錄臘月釀槐子服明目治疳濕彌佳蘇恭釀黑豆百日後取出毎夜吞一枚鎮肝明目藥性釀南星末隂乾治驚風有竒功蘇頌除黄殺蟲治癰腫時珍發明時珍曰淮南子萬畢術云牛膽塗熱釡釡即鳴牛膽塗桂莫知其誰註云能變亂人形詳見本書􅒖嶁云蛙得牛膽則不鳴此皆有所制也附方舊一新二穀疸食黄用牛膽汁一枚苦參三兩龍膽草一兩為末和少蜜丸梧子大毎薑湯下五十丸男子隂冷以食茱萸納牛膽中百日令乾毎取二七枚嚼納隂中良久如火金千痔瘻出水用牛膽蝟膽各一枚􅕹粉五十文麝香二十文以三味和匀入牛膽中懸四十九日取出為丸如大麥大以紙撚送入瘡内有惡物流出為騐也經驗胞衣附方新一臁瘡不歛牛胞衣一具燒存性研搽海上方㗋白水牛者良主治小兒呷氣思邈療反胃吐食取一具去膜及兩頭逐節以醋浸炙燥燒存性毎服一錢米飲下神效時珍生出法天意發明時珍曰牛㗋嚨治呷氣反胃皆以類相從也按普濟方云反胃吐食藥物不下結腸三五日至七八日大便不通如此者必死昔金州周禪師得正胃散方於異人十痊八九君子收之可濟人命用白水牛喉一條去兩頭節并筋膜脂肉及如阿膠黑片收之臨時旋炙用米醋一盞浸之微火炙乾淬之再炙再淬醋盡為度研末厚紙包收或遇隂濕時微火烘之再收遇此疾毎服一錢食前陳米飲調下輕者一服立效靨水牛者良主治㗋痺氣癭古方多用之時珍齒主治小兒牛癎外臺發明時珍曰六畜齒治六癎皆比類之義也耳珠先生有固牙法用牛齒三十枚瓶盛固濟燬赤為末毎以水一盞末二錢􅋩熱含潄冷則吐去有損動者以末揩之此亦以類從也牛角䚡釋名角胎時珍曰此即角尖中堅骨也牛之有䚡如魚之有䚡故名胎者言在角内也蔵器曰水牛黄㸺牛者可用餘皆不及久在糞土爛白者亦佳氣味苦温無毒甄權曰苦甘主治下閉血瘀血疼痛女人帶下血燔之酒服本經燒灰主赤白痢宗奭黄牛者燒之主婦人血崩大便下血血痢宗奭水牛者燒之止婦人血崩赤白帶下冷痢瀉血水洩藥性治水腫時珍酒千金徐王用之發明時珍曰牛角䚡筋之粹骨之餘而䚡又角之精也乃厥隂少隂血分之藥燒之則性澀故止血痢崩中諸病附方舊四新二大腸冷痢㸺牛角䚡燒灰飲服二錢日二次小兒滯下㸺牛角胎燒灰水服方寸匕千金大便下血黄牛角䚡一具燬末煑豉汁服二錢日三神效近效方赤白帶下牛角䚡燒令煙斷附子以鹽水浸七度去皮等分為末毎空心酒服二錢七孫用和方鼠乳痔疾牛角腮燒灰酒服方寸匕塞上方蜂蠆螫瘡牛角䚡燒灰醋和傅之肘后方角氣味苦寒無毒之才曰平主治水牛者燔之治時氣寒熱頭痛别錄煎汁治熱毒風及壯熱日華㸺牛者治㗋痺腫塞欲死燒灰酒服一錢小兒飲乳不快似㗋痺者取灰塗乳上嚥下即瘥蘇頌亮出崔元方治淋破血時珍附方舊二新一石淋破血牛角燒灰酒服方寸匕日五服總錄血上逆心煩悶刺痛水牛角燒末酒服方寸匕子母秘錄赤秃髮落牛角羊角燒灰等分豬脂調塗惠聖方骨氣味甘温無毒主治燒灰治吐血鼻洪崩中帶下腸風瀉血水瀉日華治邪瘧燒灰同豬脂塗疳瘡蝕人口鼻有效時珍便出十發明時珍曰東夷以牛骨占卜吉凶無往不中牛非含智之物骨有先事之靈宜其可入藥治病也附方新二鼻中生瘡牛骨狗骨燒灰臘豬脂和敷千金水穀痢疾牛骨灰同六月六日麴炒等分為末飲服方寸匕乃御傳方也張文仲方蹄甲青牛者良主治婦人崩中漏下赤白蘇恭燒灰水服治牛癎和油塗臁瘡研末貼臍止小兒夜啼時珍諸出集要方附方新五卒魘不寤以青牛蹄或馬蹄臨人頭上即活肘后損傷接骨牛蹄甲一箇乳香沒藥各一錢為末入甲内燒灰以黄米粉糊和成膏敷之祕韞牛皮風癬牛蹄甲驢糞各一兩燒存性研末油調抓破敷之五七日即愈蘭氏經驗方臁脛爛瘡牛蹄甲燒灰桐油和敷海上方玉莖生瘡牛蹄甲燒灰油調敷之奚囊隂莖黄牛烏牛水牛並良主治婦人漏下赤白無子蘇恭牯牛卵囊主治疝氣一具煑爛入小茴香鹽少許拌食呉球毛主治臍毛治小兒久不行蘇恭耳毛尾毛隂毛並主通淋閉時珍發明時珍曰古方牛耳毛隂毛尾毛治淋多用之豈以牛性順而毛性下行耶又治瘧病盖禳之之義耳附方舊一新二卒患淋疾牛耳中毛燒取半錢水服尾毛亦可集騐方小兒石淋特牛隂頭毛燒灰漿水服一刀圭日再張文仲方邪氣瘧疾外臺用黑牛尾燒末酒服方寸匕日三服片一用牯牛隂毛七根黄荆葉七縛内闗上亦效口涎日華曰以水洗老牛口用鹽塗之少頃即出或以荷葉包牛口使耕力乏涎出取之主治反胃嘔吐日華水服二匙終身不噎思邈吮小兒治客忤灌一合治小兒霍亂入鹽少許頓服一盞治㗋閉口噤時珍居出外臺胡士方附方新七噎膈反胃集成用糯米末以牛涎拌作小丸煑熟食危氏得效香牛飲用牛涎一盞入麝香少許銀盞頓熱先以帛𦂳束胃脘令氣喘解開乗熱飲之仍以丁香汁入粥與食普濟千囀丹用牛涎好蜜各半觔木鱉仁三十箇研末入銅器熬稠毎以兩匙和粥與食日三服小兒流涎取東行牛口中涎沫塗口中及頤上自愈外臺方小兒口噤身熱吐沫不能乳方同上方聖惠損目破睛牛口涎日㸃二次避風黑睛破者亦瘥射后身面疣目牛口涎頻塗之自落千金鼻津主治小兒中客忤水和少許灌之又塗小兒鼻瘡及濕癬時珍諸出外臺方耳垢烏牛者良時珍曰以鹽少許入牛耳中癢即易取主治蛇傷惡蛓毒恭蛓毛蟲也治癰腫未成膿封之即散疳蟲蝕鼻生瘡反毒蛇螫人竝傅之時珍附方新三疔瘡惡腫黑牛耳垢敷之聖惠方脇漏出水不止用烏牛耳垢傅之即瘥鼻衂不止牛耳中垢車前子末等分和匀塞之良總錄溺黄犍㸺牛黒牯牛者良氣味苦辛微温無毒之才曰寒主治水腫腹脹脚滿利小便别錄附方舊三新五水腫尿澀小品用烏犍牛尿半升空腹飲小便利良肘后用黄犍牛尿毎飲三升老幼減半水氣喘促小便澀用沙牛尿一斗訶梨皮末十觔先以銅器熬尿至三升入末熬至可丸丸梧子大毎服茶下三十丸日三服當下水及惡物為效普濟方風毒脚氣以銅器取烏犢牛尿三升飲之小便利則消肘后脚氣脹滿尿澀取烏犢牛尿一升一日分服消乃止方楊炎南行久患氣脹烏牛尿一升空心温服氣散止廣濟方癥癖鼓脹烏牛尿一升微火煎如稠飴空心服棗許當鳴轉病出隔日更服之千金翼霍亂厥逆服烏牛尿二升千金方刺傷中水服烏牛尿二升三服止梅師屎稀者名牛洞烏牯黄牯牛者良氣味苦寒無毒鏡源云牛屎抽銅暈燒火能養一切藥力主治水腫惡氣乾者燔之敷鼠瘻惡瘡别錄燒灰敷炙瘡不瘥藏器敷小兒爛瘡爛痘及癰腫不合能滅瘢痕時珍絞汁治消渴黄癉脚氣霍亂小便不通蘇恭發明時珍曰牛屎散熱解毒利溲故能治腫疸霍亂疳痢傷損諸疾燒灰則收濕生肌拔毒故能治癰疽瘡瘻爛痘諸疾也宋書云孫法宗苦頭創夜有女人至曰我天使也事本不闗善人使者誤及爾但取牛糞煑敷之即驗如其言果瘥此亦一異也附方舊七新二十二水腫溲澀黄牛屎一升絞汁飲溲利瘥勿食鹽梅師濕熱黄病黄牛糞日乾為末麫糊丸梧子大毎食前日湯下七十丸簡便方霍亂吐下不止四肢逆冷外臺用黄牛屎半升水二升煑三沸服半升止聖惠用烏牛糞絞汁一合以百日兒乳汁一合和温服疳痢垂死新牛屎一升水一升攪澄汁服不過三服必效方卒死不省四肢不收取牛洞一升和温酒灌之或以濕者絞汁亦可此扁鵲法也肘后卒隂腎痛牛屎燒灰酒和敷之良梅師脚跟腫痛不能著地用黄牛屎入鹽炒熱罨之王永輔惠濟方妊娠腰痛牛屎燒末水服方寸匕日三外臺妊娠毒痛􅀈牛屎燒灰水服方寸匕日三并以酢和封千金方子死腹中濕牛糞塗腹上良産寳小兒口噤白牛糞塗口中取瘥總錄小兒夜啼牛屎一塊安席下勿令母知食療小兒頭瘡野外久乾牛屎不壊者燒灰入輕粉麻油調搽普濟小兒白秃牛屎厚封之秘錄小兒爛瘡牛屎燒灰封之減瘢痕千金痘瘡潰爛王兑白龍散以臘月黄牛屎燒取白灰敷之或臥之即易痂疕而無瘢痕癰腫不合牛屎燒末用鷄子白和封乾即易之神騐也千金月令鼠瘻瘰癧千金五白散白牛屎白馬屎白羊屎白鷄屎白豬屎各一升於石上燒灰漏蘆末二兩以豬膏一升煎亂髪一兩同熬五六沸塗之神騐肘后治鼠瘻有核濃血用熱牛屎封之日三蜣蜋瘻疾熱牛屎封之日數易當有蜣蜋出千金乳癰初起牛屎和酒敷之即消方姚僧坦燥瘑瘡痒熱牛屎塗之千金瘡傷風水痛劇欲死者牛屎燒烟熏令汁出即愈外臺秘要􅭏磕傷損黄牛屎炒熱封之裹定即效簡便湯火燒灼濕牛屎搗塗之姚和衆惡犬咬傷洗浄毒以熱牛屎封之即時痛止千金蜂蠆螫痛牛屎燒灰苦酒和敷千金方背瘡潰爛黄黑牛糞多年者晒乾為末入百草霜匀細摻之方談埜翁黄犢子臍屎新生未食草者收乾之主治九竅四肢指岐間血出乃暴怒所為燒此末水服方寸匕日四五服良藏器僧出姚坦方主中惡霍亂及鬼擊吐血以一升和酒三升煑汁服時珍后出肘屎中大豆洗晒收主治小兒驚癎婦人難産蘇恭附方舊一新二小兒牛癎白牛屎中豆日日服之良總徵論婦人難産牛屎中大豆一枚擘作兩片一書父一書子仍合住水吞之立産昝殷産寳齒落不生牛屎中大豆十四枚小開豆頭以注齒根數度即生千金方聖虀時珍曰按劉恂嶺表錄異云廣之容南好食水牛肉或炮或炙食訖即啜聖虀消之調以薑桂鹽醋腹遂不脹聖虀如青苔狀乃牛腸胃中未化草也主治食牛肉作脹解牛肉毒時珍齝草音痴一名牛囀草即牛食而復出者俗曰囘噍主治絞汁服止噦藏器療反胃霍亂小兒口噤風時珍發明時珍曰牛齝治反胃噎膈雖取象囘噍之義而沾濡口涎為多故主療與涎之功同附方新四反胃噎膈大刀奪命丸牛囀草杵頭糠各半觔糯米一升為末取黄母牛涎和丸龍眼大煑熟食之入沙糖二兩尤妙醫學正傳霍亂吐利不止用烏牛齝草一團人參生薑各三兩甜漿水一升半煑汁五合服劉涓子鬼遺方小兒流涎用牛噍草絞汁少少與服濟普方初生口噤十日内者用牛口齝草絞汁灌之聖惠鼻牶音卷穿鼻繩木也主治木牶主小兒癎别錄治消渴煎汁服或燒灰酒服時珍草牶燒研傅小兒鼻下瘡别錄燒灰吹纒㗋風甚效時珍附方新一消渴牛鼻木二箇洗剉男用牝牛女用牡牛人參甘草半兩大白梅一箇水四碗煎三碗熱服甚妙普濟方馬本經中品校正别錄上品出馬乳今併為一釋名時珍曰按許慎云馬武也其字象頭髦尾足之形牡馬曰隲音質曰兒牝馬曰騇曰課曰草去勢曰騸一嵗曰䭴音注二嵗曰駒三嵗曰騑四嵗曰駣音桃名色甚多詳見爾雅及説文梵書謂馬為阿濕婆集解别錄曰馬出雲中𢎞景曰馬色類甚多入藥以純白者為良其口眼蹄皆白者谷中時有兩三爾小小用則不必拘也時珍曰别錄以雲中馬為良雲中今大同府也大抵馬以西北方者為勝東南者劣弱不及馬應月故十二月而生其年以齒别之在畜屬火在辰屬午或云在卦屬乾屬金馬之眼光照人全身者其齒最少光愈近齒愈大馬食杜衡善走食稻則足重食鼠屎則腹脹食鷄糞則生骨眼以僵蠶烏梅拭牙則不食得桑葉乃解掛鼠狼皮於槽亦不食遇海馬骨則不行以豬槽飼馬石灰泥馬槽馬汗著門並令馬落駒繫獼猴於廏辟馬病皆物理當然耳肉以純白牡馬者為良氣味辛苦冷有毒詵曰有小毒士良曰有大毒思邈曰無毒乃日華曰只堪煑食餘食難消漬以清水搦洗血盡煑不然則毒不出患疔腫或曰以冷水煑之不可盖釡鼎曰馬生角馬無夜眼白馬青蹄白馬黑頭者並不可食令人癲馬鞍下肉色黒及馬自死者並不可食殺人馬黑脊而斑臂者漏不可食蕭炳曰患痢生疥人勿食必加劇妊婦食之令子過月乳母食之令子疳瘦生詵曰同倉米蒼耳食必得惡病十有九死同薑食氣𠻳同豬肉食成霍亂食馬肉毒發心悶者飲清酒則解飲濁酒則加𢎞景曰秦穆公云食駿馬肉不飲酒必殺人時珍曰食馬中毒者飲蘆菔汁食杏仁可解主治傷中除熱下氣長筋骨强腰脊壯健强志輕身不飢作脯治寒熱痿痺别錄煑汁洗頭瘡白秃時珍惠出聖附方舊一豌豆瘡毒馬肉煑清汁洗之兵部手集鬐膏鬐項上也白馬者良氣味甘平有小毒鑑源云馬脂柔五金主治生髪别錄治面䵟手足皴粗入脂澤用療偏風口喎僻時珍發明時珍曰按靈樞經曰卒口僻急者頰筋有寒則急引頰移頰筋有熱則縱緩不收以桑鈎鈎之以生桑灰置坎中坐之以馬膏熨其急頰以白酒和桂末塗其緩頰且飲美酒噉炙肉為之三拊而已靈樞無註本世多不知此方之妙竊謂口頰喎僻乃風中血脈也手足陽明之筋絡於口㑹太陽之筋絡於目寒則筋急而僻熱則筋緩而縱故左中寒則逼熱於右右中寒則逼熱於左寒者急而熱者緩也急者皮膚頑痺榮衛凝滯治法急者緩之緩者急之故用馬膏之甘平柔緩以摩其急以潤其痺以通其血脈用桂酒之辛熱急束以塗其緩以和其榮衛以通其經絡桑能治風痺通節竅也病在上者酒以行之甘以助之故飲美酒噉炙肉云乳時珍曰漢時以馬乳造為酒置桐馬之官謂挏撞而成也桐音同氣味甘冷無毒思邈曰性冷利同魚鱠食作瘕主治止渴治熱别錄作酪性温飲之消肉蘇恭心已下並用白馬者良主治喜忘别錄豬肘后方治心昏多忘牛馬鷄心乾之為末酒服方寸匕日三則聞一知十加詵曰患痢人食馬心則痞悶甚肺主治寒熱小兒莖萎掌禹錫曰小兒無莖萎疑誤時珍曰按千金方無小兒二字肝氣味有大毒𢎞景曰馬肝及鞍下肉殺人時珍曰按漢武帝云食肉毋食馬肝又云文成食馬肝而死韋莊云食馬留肝則其毒可知矣方家以䜴汁鼠矢解之附方新一月水不通心腹滯悶四肢疼痛用赤馬肝一片炙研毎食前熱酒服一錢通乃止惠聖腎時珍曰按熊太古冀越集云馬有墨在腎牛有黄在膽造物之所鍾也此亦牛黄狗寳之類當有功用惜乎前人不知漫記於此以俟白馬隂莖修治藏器曰凡收當取銀色無病白馬春月游牝時力勢正强者生取隂乾百日用斆曰用時以銅刀破作七片将生羊血拌蒸半日晒乾以粗布去皮及乾血挫碎用氣味甘鹹平無毒主治傷中絶脈隂不起强志益氣長肌肉肥徤生子本經小兒驚癎别錄益丈夫隂氣詵曰隂乾同肉蓯蓉等分為末蜜丸梧子大毎空心酒下四十丸日再百日見效甄權曰主男子隂痿房中術偏用之駒胞衣主治婦人天癸不通煅存性為末毎服三錢入麝香少許空腹新汲水下不過三服良孫氏集效眼白馬者生殺取之氣味平無毒主治驚癎腹滿瘧疾别錄小兒鬾病與母帶之蘇恭夜眼在足膝上馬有此能夜行故名主治卒死尸厥齲齒痛時珍附方舊一新二卒死尸厥用白馬前脚夜目二枚白馬尾十四莖合燒以苦酒丸如小豆大白湯灌下二丸須臾再服即甦肘后蟲牙齲痛用馬夜眼如米大綿裹納孔中有涎吐去永㫁根源或加生附子少許立玉機微義用馬夜眼燒存性敷之愈牙齒已下並用白馬者良氣味甘平有小毒主治小兒馬癎水磨服别錄燒灰唾和塗癰疽丁腫出根效藏器附方舊一新三腸癰未成馬牙燒灰鷄子白和塗之千金方疔腫未破白馬齒燒灰先以針刺破乃封之用濕麫圍腫處醋洗去之根出大驗肘后赤根疔瘡馬牙齒搗末臘豬脂和敷根即出也燒灰亦可千金方蟲牙作痛馬牙一枚煅熱投醋中七次待冷含之即止方唐瑤經騐骨氣味有毒主治燒灰和醋傅小兒頭瘡及身上瘡孟詵止邪瘧燒灰和油傅小兒耳瘡頭瘡隂瘡瘭疽有漿如火灼敷乳頭飲兒止夜啼時珍諸出小品外臺方附方舊一辟瘟疫氣絳袋盛馬骨佩之男左女右肘后方頭骨氣味甘微寒有小毒韓保鼎曰大熱宜藏器曰頭骨埋於午地蠶浸於上流絶水蜝蟲主治喜眠令人不睡燒灰水服方寸匕日三夜一作枕亦良别錄治齒痛燒灰傅頭耳瘡日華療馬汗氣入瘡痛燒灰傅之白汁出良時珍附方新三膽虚不眠用馬頭骨灰乳香各一兩酸棗仁炒二兩為末毎服二錢温酒服聖惠膽熱多眠馬頭骨灰鐵粉各一兩硃砂半兩龍腦半分為末煉蜜丸梧子大毎服三十丸竹葉湯下聖惠方臁瘡潰爛三四年馬牙匡骨燒研先以土窖過小便洗數次搽之脛骨氣味甘寒無毒主治煅存性降隂火中氣不足者用之可代黄芩黄連朱震亨懸蹄赤白馬俱入用氣味甘平無毒甄權曰熱主治驚邪瘈瘲乳難辟惡氣鬼毒蠱疰不祥本經止衂内漏齲齒赤馬者治婦人赤崩白馬者治白崩别錄主癲癎齒痛蜀本療腸癰下瘀血帶下殺蟲又燒灰入鹽少許摻走馬疳蝕甚良時珍諸出鈎𤣥方赤馬者辟瘟瘧孟詵附方舊四新五損傷瘀血在腹用白馬蹄燒烟盡研末酒服方寸匕日三夜一血化為水也鬼劉涓子遺方婦人血病方同上五色帶下白馬左蹄燒灰酒服方寸七日三臺外腸癰腹痛其状兩耳輪甲錯腹痛或遶臍有瘡如粟下膿血用馬蹄灰和鷄子白塗即拔毒氣出千金蟲蝕肛爛見五臟則死以豬脂和馬蹄灰綿裹導入下部日數度瘥肘后方齲齒疼痛削白馬蹄塞之不過三度千金方赤秃頭瘡出膿晝開夜合馬蹄燒灰生油調塗聖惠方小兒夜啼馬蹄末敷乳上飲之總錄辟禳瘟疫以絳囊盛馬蹄屑佩之男左女右肘后皮主治婦人臨産赤馬皮催生良孟詵治小兒赤秃以赤馬皮白馬蹄燒灰和臘豬脂傅之良時珍惠出聖鬐毛即騣也一名鬛氣味有毒主治小兒驚癎女子崩中赤白别錄思邈曰赤用赤馬白用白馬燒灰服止血塗惡瘡日華尾主治女人崩中小兒客忤時珍發明時珍曰馬尾濟生方治崩中十灰散中用之又延夀書云刷牙用馬尾令齒疎損近人多用燒灰揩拭最腐齒齦不可不知附方舊二小兒客忤小兒中馬毒客忤燒馬尾煙於前毎日熏之瘥乃止聖惠方腹内蛇癥白馬尾切細酒服初服五分一七次服三分一匕更服二分一匕不可頓服殺人千金翼腦氣味有毒詵曰食之令人癲主治㫁酒臘月者温酒服之孫思邈血氣味有大毒詵曰凡生馬血入人肉中一二日便腫起連心即死有人剥馬傷手血入肉一夜致死汗氣味有大毒𢎞景曰患瘡人觸馬汗馬氣馬毛馬尿馬屎者並令加劇詵曰馬汗入瘡毒攻心欲死者燒粟幹灰淋汁浸洗出白沫乃毒氣也嶺南有人用此得力附方新二黥刺雕青以白馬汗搽上再以汗調水蛭末塗之子和飲酒欲㫁刮馬汗和酒服之千金白馬溺氣味辛微寒有毒主治消渴破癥堅積聚男子伏梁積疝婦人瘕積銅器承飲之别錄洗頭瘡白秃漬惡刺瘡日十次愈乃止孟詵熱飲治反胃殺蟲時珍發明時珍曰馬尿治癥瘕有驗按祖台之志怪云昔有人與其奴皆患心腹痛病奴死剖之得一白鼈赤眼仍活以諸藥納口中終不死有人乗白馬觀之馬尿墮鼈而鼈縮遂以灌之即化成水其人乃服白馬尿而疾愈此其徴效也反胃亦有蟲積者故亦能治之附方舊二新一肉癥思肉用白馬尿三升飲之當吐肉出不出者死食髪成瘕咽中如有蟲上下是也白馬尿飲之佳千金伏梁心積銅器盛白馬尿一升旦旦服之妙小品婦人乳腫馬尿塗之立愈産寳小兒赤疵生身上者馬尿頻洗之千金蟲牙疼痛隨左右含馬溺不過三五度瘥千金利骨取牙白馬尿浸茄科三日炒為末㸃牙即落或煎巴豆㸃牙亦落勿近好牙鮑氏狐尿刺瘡痛甚者熱白馬尿漬之千金痞塊心痛僵蠶末二錢白馬尿調服并傅塊上摘𤣥方白馬通時珍曰馬屎曰通牛屎曰洞豬屎曰零皆諱其名也凡屎必達胴腸乃出故曰通曰洞胴即廣腸也氣味微温無毒鑑源云馬屎煴火養一切藥力主治止渴止吐血下血鼻衂金瘡出血婦人崩中别錄敷頂止衂徐之才絞汁服治産後諸血氣傷寒時疾當吐下者藏器治時行病起合隂陽垂死者絞汁三合日夜各二服又治杖瘡打損傷瘡中風作痛者炒熱包熨五十遍極效孟詵絞汁灌之治卒中惡死酒服治産後寒熱悶脹燒灰水服治久痢赤白和豬脂塗馬咬人瘡及馬汗入瘡剝死馬骨刺傷人毒攻欲死者時珍諸出小品方附方舊五新十五吐血不止燒白馬通以水研絞汁一升服梅師方衂血不止錄驗用綿裹白馬屎塞之乾千金用赤馬糞絞汁飲一二升並滴鼻内者浸水亦可口鼻出血用赤馬糞燒灰温酒服一錢鈐方乆痢赤白馬糞一丸燒灰水服肘后方卒中惡死吐利不止不知是何病不拘大人小兒馬糞一丸絞汁灌之乾者水煑汁亦可此扁鵲法也后肘攪腸沙痛欲死者用馬糞研汁飲之立愈經驗方小兒卒忤馬屎三升燒末以酒三斗煑二沸取汁浴兒避風千金小兒躽啼面青腹强是忤客氣新馬糞一團絞汁灌之總錄傷寒勞復馬屎燒末冷酒服方寸匕便驗聖惠方熱毒攻肢手足腫痛欲脱以水煑馬屎汁漬之外臺風蟲牙痛白馬屎汁隨左右含之不過三口愈聖惠鼻齆不聞新馬屎汁含滿口灌入即通聖惠筋骨傷破以熱白馬屎傅之無瘢金千疔腫傷風作腫以馬屎炒熨瘡上五十遍極效聖惠方多年惡瘡或痛痒生釁用馬糞并齒同研爛傅上不過數次武丞相在蜀時脛有瘡痒不可忍用此而瘥兵部手集諸瘡傷水或傷風寒痛劇用馬屎燒烟熏令汁出愈千金方凍指欲墮馬糞煑水漬半日即愈千金積聚脹滿白馬糞同蒜搗膏傅患處效活人心鏡一切漏疾白馬通汁毎服一升良千金屎中粟主治金創小兒寒熱客忤不能食蘇恭治小兒脇痛時珍通千金有馬粟丸附方舊一剝馬中毒被骨刺破欲死以馬腸中粟屎搗摶以尿洗之大效絞汁飲之亦可臺外白馬頭蛆見蟲部馬絆繩主治􅋩水洗小兒癎蘇恭燒灰摻鼻中生瘡時珍東行馬蹄下土𢎞景曰作方術可知女人外情時珍曰淮南萬畢術云東行白馬蹄下土合三家井中泥置人臍下即臥不能起也驢唐本草釋名時珍曰驢臚也臚腹前也馬力在膞驢力在臚也集解時珍曰驢長頰廣額􅀈耳修尾夜鳴應更性善䭾負有褐黑白三色入藥以黑者為良女直遼東出野驢似驢而色駁鬃尾長骨格大食之功與驢同西土出山驢有角如羚羊詳羚羊下東海島中出海驢能入水不濡又有海馬海牛海豬海獾等物其皮皆供用蔵器曰海驢海馬海皮毛在陸地皆候風潮則毛起物性如此肉已下通用烏驢者良氣味甘涼無毒思邈曰酸平呉瑞曰食驢肉飲荆芥茶殺人妊婦食之難産同鳬茈食令人筋急病死者有毒主治解心煩止風狂釀酒治一切風日華主風狂憂愁不樂能安心氣同五味煑食或以汁作粥食孟詵補血益氣治逺年勞損煑汁空心飲療痔引蟲時珍野驢肉同功正要發明宗奭曰驢肉食之動風脂肥尤甚屢試屢騐日華子以為止一切風狂未可慿也頭肉主治煑汁服二三升治多年消渴無不瘥者又以漬麴醖酒服去大風動揺不伏者孟詵亦洗頭風風屑日華同薑虀煑汁日服治黄疸百藥不治者時珍文出張仲方附方舊一中風頭眩心肺浮熱肢軟骨疼語蹇身顫用烏驢頭一枚如食法䜴汁煑食心鏡脂主治敷惡瘡疥癬及風腫日華和酒服三升治狂癲不能語不識人和烏梅為丸治多年瘧未發時服二十丸又生脂和生椒搗熟綿裹塞耳治積年聾疾孟詵和酒等分服治卒欬嗽和鹽塗身體手足風腫時珍出千金附方舊一新一滴耳治聾烏驢脂少許鯽魚膽一箇生油半兩和匀納縷葱管中七日取滴耳中日二聖惠眼中瘜肉驢脂白鹽等分和匀注兩目眥頭日三次一月瘥千金方髓氣味甘温無毒主治耳聾時珍附方新二多年耳聾重者用三兩度初起者一上便效用驢前脚脛骨打破向日中瀝出髓以瓷盒盛收毎用綿㸃少許入耳内側臥候藥行其髓不可多用以白色者為上黄色者不堪又方驢髓以針砂一合水二合浸十日取清水少許和髓攪匀滴少許入耳中外以方新磚半箇燒赤潑醋鋪磁石末一兩在磚上枕之至晚如此三度即通效並普濟方血時珍曰熱血以麻油一盞和攪去抹煑熟即成白色此亦可異昔無言及者氣味鹹涼無毒主治利大小腸潤燥結下熱氣時珍乳氣味甘冷利無毒思邈曰酸寒小兒熱急黄多服使利唐本療大熱止消渴孫思邈小兒熱急驚邪赤痢蕭炳小兒癎疾客忤天弔風疾日華卒心痛連腰臍者熱服三升孟詵蜘蛛咬瘡器盛浸之蚰蜒及飛蟲入耳滴之當成水藏器頻熱飲之治氣鬱解小兒熱毒不生痘疹浸黄連取汁㸃風熱赤眼時珍諸出千金方附方舊一新三心熱氣癎黑驢乳暖服三合日再服廣利方小兒口噤驢乳豬乳各二升煎一升五合服千金重舌出涎方同上撮口胎風先炙兩乳中三壮後用此方大驗用烏驢乳一合以東引槐枝三寸長十根火煨一頭出津拭浄浸乳中取乳滴口中甚妙方聖惠隂莖氣味甘温無毒主治强隂壯筋時珍駒衣主治㫁酒煅研酒服方寸匕外臺皮主治煎膠食之治一切風毒骨節痛呻吟不止和酒服更良孟詵膠食主鼻洪吐血腸風血痢崩中帶下其生皮覆瘧疾人良日華詳見阿膠附方舊一新一中風喎僻骨疼煩躁者用烏驢皮燖毛如常治浄蒸熟入豉汁中和五味煑食心鏡牛皮風癬生驢皮一塊以朴硝醃過燒灰油調搽之名一掃光李樓竒方毛主治骨頭中一切風病用一觔炒黄投一斗酒中漬三日空心細飲令醉暖臥取汗明日更飲如前忌陳倉米麪孟詵附方新二小兒客忤剪驢膞上旋毛一彈子以乳汁􅋩飲外臺襁褓中風取驢背前交脊中毛一拇指大入麝香豆許以乳汁和銅器中慢炒為末乳汁和灌之千金骨主治煑湯浴厯節風孟詵牝驢骨煑汁服治多年消渴極效時珍頭骨主治燒灰和油塗小兒顱解時珍懸蹄主治燒灰傅癰疽散膿水和油傅小兒解顱以瘥為度時珍附方舊一新三腎風下注生瘡用驢蹄二十片燒灰蜜陀僧輕粉各一錢麝香半錢為末傅之方竒效天柱毒瘡生脊大椎上大如錢赤色出水驢蹄二片胡粉熬一分麝香少許為末醋和塗之乾則摻之聖惠飲酒穿腸飲酒過度欲至穿腸者用驢蹄硬處削下水煑濃汁冷飲之襄州散將樂小蠻得此方有效經驗方鬼瘧不止用白驢蹄剉炒砒霜各二分大黄四兩菉豆三分雄黄一分硃砂半分研丸梧子大未發平旦冷水服二丸即止七日忌油肘后溺氣味辛寒有小毒主治浸蜘蛛咬瘡良蔵器治反胃噎病狂犬咬傷癬癘惡瘡並多飲取瘥風蟲牙痛頻含漱之良時珍諸出千金方發明震亨曰一婦病噎用四物加驢尿與服以防其生蟲數十帖而愈時珍曰張文仲備急方言幼年患反胃毎食羮粥諸物須臾吐出貞觀中許奉御兄弟及柴蒋諸名醫奉勅調治竟不能療漸疲困候絶旦夕忽一衛士云服驢小便極驗遂服二合後食止吐一半哺時再服二合食粥便定次日奏知則宫中五六人患反胃者同服一時俱瘥此物稍有毒服時不可過多須熱飲之病深者七日當效後用屢驗附方新三狐尿刺瘡烏驢尿頓熱漬之千金白玷風驢尿薑汁等分和匀頻洗濟聖錄耳聾人中白一分乾地龍一條為末以烏驢駒尿一合和匀瓷器盛之毎滴少許入耳聖惠屎主治熬之熨風腫漏瘡絞汁主心腹疼痛諸疰忤癥癖反胃不止牙齒痛治水腫每服五合良畫體成字者為燥水用牝驢屎不成字者為溼水用駁驢屎唐本燒灰吹鼻止衂甚效和油塗惡瘡濕癬時珍附方新四卒心氣痛驢屎絞汁五合熱服即止肘后方經水不止及血崩用黑驢屎燒存性丸麫糊丸梧子大每空心黄酒下五七十神妙龔雲林醫鑑疔瘡中風腫痛用驢屎炒熨瘡上五十遍極效普濟方小兒眉瘡黒驢屎燒研油調塗立效聖惠方耳垢主治刮取塗蠍螫崔氏尾軸垢主治新久瘧無定期者以水洗汁和麫如彈丸二枚作燒餅未發前食一枚發食一枚效恭溺下泥主治傅蜘蛛傷藏器驢槽主治小兒拗哭不止令三姓婦人抱兒臥之移時即止勿令人知藏器發明時珍曰錦囊詩云繫蟹懸門除鬼疾畫驢挂壁止兒啼言闗西人以蟹壳懸之辟邪瘧江左人畫倒驢挂之止夜啼與驢槽止哭之義同皆厭禳法耳騾食鑑釋名時珍曰騾古文作驘從馬從􅢓諧聲集解時珍曰騾大于驢而健于馬其力在腰其後有鎖骨不能開故不孳乳其類有五牡驢交馬而生者騾也牡馬交驢而生者為駃騠音決題牡驢交牛而生者為􅀈􅦢音它陌牡牛交驢而生者為䮰􅐒音謫冢牡牛交馬而生者為駏驢今俗通呼為騾矣肉氣味辛苦温有小毒甯原曰騾性頑劣肉不益人孕婦食之難産時珍曰古方未見用騾者近時小藉時有其方云按吕氏春秋云趙簡子有白騾甚愛之其臣陽城胥渠有疾醫云得白騾肝則生不得則死簡子聞之曰殺畜活人不亦仁乎乃殺騾取肝與之胥渠病愈此亦剪鬚以救功臣之意書之于此以備醫案蹄主治難産燒灰入麝香少許酒服一錢普濟方屎主治打損諸瘡破傷中風腫痛炒焦裹熨之冷即易時珍駝宋開寶釋名槖駝漢書駱駝時珍曰駝能負囊槖故名方音訛為駱駝也集解馬志曰野駝家駝生塞北河西其脂在兩峯内入藥俱可頌曰野駝今惟西北畨界有之家駝則此中人家蓄養生息者入藥不及野駝時珍曰駝状如馬其頭似羊長項垂耳脚有三節背有兩肉峯如鞍形有蒼褐黄紫數色其聲曰􅕫其食亦齝其性耐寒惡熱故夏至退毛至盡毛可為毼其糞烟亦直上如狼烟其力能負重可至千觔日行二三百里又能知泉源水脈風候凡伏流人所不知駝以足踏處即得之流沙夏多熱風行旅遇之即死風將至駝必聚鳴埋口鼻於沙中人以為驗也其臥而腹不著地屈足露明者名明駝最能行逺于闐有風脚駝其疾如風日行千里土畨有獨峯駝西域傳云大月氐出一封駝脊上有一峯隆起若封土故俗呼為封牛亦曰􅥠牛穆天子傳謂之物牛爾雅謂之犦牛嶺南徐聞縣及海康皆出之南史云滑國有兩脚駝諸家所未聞也駝脂即駝峯脂在峯内謂之峯子油入藥以野駝者為良宗奭曰家駝峯蹄最精人多煑熟糟食氣味甘温無毒鑑源曰能柔五金主治頑痺風瘙惡瘡毒腫死肌筋皮攣縮踠損筋骨火炙摩之取熱氣透肉亦和米粉作煎餅食之療痔開寳治一切風疾皮膚痺急及惡瘡腫漏爛並和藥傅之大明主虚勞風有冷積者以燒酒服調之正要附方新一周痺野駝脂錬浄一觔入好酥四兩和匀毎服半匙加至一匙日三服聖濟總錄肉氣味甘温無毒主治諸風下氣壮筋骨乳氣味甘冷無毒主治補中益氣壮筋骨令人不饑正要黄氣味苦平微毒主治風熱驚疾時珍發明時珍曰駱駝黄似牛黄而不香戎人以亂牛黄而功不及之毛主治婦人赤白帶下最良蘇恭頷毛療痔燒灰酒服方寸七時珍纂出崔行功要附方新一隂上疳瘡駝絨燒灰水澄過入炒黄丹等分為末搽之即效龔氏經驗方屎主治乾研㗜鼻止衂冦宗奭燒烟殺蚊虱博物志酪音洛草唐本釋名潼音董集解恭曰牛羊水牛馬乳並可作酪水牛乳作者濃厚味勝􅀈牛馬乳作酪性冷驢乳尤冷不堪作酪也藏器曰酪有乾濕乾酪更强時珍曰酪潼北人多造之水牛􅀈牛􅏚牛羊馬駱之乳皆可作之入藥以牛酪為勝盖牛乳亦多爾按飲膳正要云造法用乳半杓鍋内炒過入餘乳熬數十沸常以杓縱横攪之乃傾出鑵盛待冷掠取浮皮以為酥入舊酪少許紙封放之即成矣又乾酪法以酪晒結掠去浮皮再晒至皮盡却入釡中炒少時器盛曝冷可作塊收用氣味甘酸寒無毒時珍曰水牛馬駝之酪冷􅀈牛羊乳酪温詵曰患冷患痢人勿食羊乳酪合酢食成上瘕主治熱毒止渴解散發利除胸中虚熱身面上熱瘡肌瘡唐本止煩渴熱悶心膈熱痛日華潤燥利腸摩腫生精血補虚損壮顔色時珍發明時珍曰按戴原禮云乳酪血液之屬血燥所宜也附方舊三火丹􅐊􅇙以酪和鹽煑熱摩之即消千金翼蚰蜒入耳華陀方用牛酪灌入即出若入腹則飲二升即化為黄水廣利方馬出黑汗水化乾酪灌之藏器酥别錄上品釋名酥油北虜名馬思哥油集解𢎞景曰酥出外國亦從益州來本牛羊乳所作也恭曰酥乃酪作其性與酪異然牛酥勝羊酥其犛牛酥復勝家牛也思邈曰㸺牛犛牛乳者為上白羊者次之詵曰水牛酥與羊酥同功其羊酥勝牛酥汪機曰牛乳冷羊乳温牛酥不離寒病之兼熱者宜之羊酥不離温病之兼寒者宜之各有所長也犛酥雖勝然而難得時珍曰酥乃酪之浮面所成今人多以白羊脂雜之不可不辨按􅋯仙神隠云造法以乳入鍋􅋩二三沸傾入盆内冷定待面結皮取皮再􅋩油出去渣入在鍋内即成酥油一法以桶成乳以木安板搗半日焦沫出撇取煎去焦皮即成酥也凡入藥以微火溶化濾淨用之良沙牛白羊酥氣味甘微寒無毒主治補五臟利大小腸治口瘡别錄除胸中客熱益心肺思邈除心熱肺痿止渴止嗽止吐血潤毛髪日華益虚勞潤臟腑澤肌膚和血脈止急痛治諸瘡温酒化服良時珍犛牛酥氣味甘平無毒主治去諸風濕痺除熱利大便去宿食思邈合諸膏摩風腫踠跌血瘀藏器發明時珍曰酥本乳液潤燥調營與血同功按生生編云酥能除腹内塵垢又追毒氣發出毛孔間也附方舊二新一蜂螫用酥塗之妙聖惠蟲咬以酥和血塗之聖惠方眯目以酥少許隨左右納鼻中垂頭少頃令流入目中物與淚同出也聖濟總錄醍醐唐本草集解𢎞景曰佛書稱乳成酪酪成酥酥成醍醐色黄白作餅甚甘肥是也恭曰醍醐出酥中乃酥之精液也好酥一石有三四升醍醐熱拌煉貯器中待凝穿中至底便津出取之陶言黄白作餅乃未達之言也韓保昇曰在酥中盛冬不凝盛夏不融者是也宗奭曰作酪時上一重凝者為酥酥上如油者為醍醐熬之即出不可多得極甘美用處亦少斆曰醍醐乃酪之漿凡用以重綿濾過銅器煎三兩沸用藏器曰此物性滑物盛皆透惟雞子殻及壺蘆盛之乃不出也氣味甘冷利無毒主治風邪痺氣通潤骨髓可為摩藥功優於酥唐本添精補髓益中填骨久服延年百鍊彌佳孫思邈主驚悸心熱頭疼明目傅腦頂心日華治月蝕瘡潤養瘡痂最宜宗奭發明機曰酥酪醍醐大抵性皆潤滑宜於血熱枯燥之人其功亦不甚相逺也附方舊三新二風虚濕痺醍醐二兩温酒每服一匙効心鏡中風煩熱及膚瘙痒醍醐四兩毎服半匙温酒和服日一一切肺病咳𠻳膿血不止用好酥五十觔煉三遍當出醍醐毎服一合日三服以瘥為度神効外臺方鼻中涕血以三煉酥中精液灌鼻中日三夜一良外臺小兒鼻塞不通不能食乳劉氏用醍醐二合木香零陵香各四分湯􅋩成膏塗頭上并塞鼻中外臺乳腐宋嘉祐釋名乳餅集解時珍曰諸乳皆可造今惟以牛乳者為勝爾􅋯仙神隠書云造乳餅法以牛乳一斗絹濾入釡煎五沸水解之用醋㸃入如豆腐法漸漸結成漉出以帛裹之用石壓成入鹽甕底收之又造乳團法用酪五升􅋩滚入冷漿水半升必自成塊未成更入漿一盞至成以帛包搦如乳餅様收之又造乳線法以牛乳盆盛晒至四邊清水出􅋩熱以酸漿㸃成漉出揉擦數次扯成塊又入釡盪之取出捻成薄皮竹籖捲扯數次掤定晒乾以油煠熟食氣味甘微寒無毒詵曰水牛乳涼􅀈牛乳温主治潤五臟利大小便益十二經脈微動氣孟詵治赤白痢切如豆大麫拌酸漿水煑二十沸頓服小兒服之彌良蕭炳附方新一血痢不止乳腐一兩漿水一鍾煎服普濟方阿膠本經上品釋名傅致膠本經井𢎞景曰出東阿故名阿膠時珍曰阿在今山東兖州府陽穀縣東北六十里即古之東阿縣也有官舍禁之酈道元水經註云東阿有井大如輪深六七丈嵗常煑膠以貢天府者即此也其井乃濟水所注取井水煑膠用攪濁水則清故人服之下膈疎痰止吐盖濟水清而重其性趨下故治淤濁及逆上之痰也集解别錄曰阿膠出東平郡東阿縣煑牛皮作之𢎞景曰今東都亦能作之用皮有老少膠有清濁熬時須用一片鹿角即成膠不爾不成也膠有三種清而薄者畫家用清而厚者名覆盆膠入藥用濁而黒者不入藥但可膠物爾頌曰今鄆州亦能作之以阿縣城北井水作煑者為真其井官禁真膠極難得貨者多偽其膠以烏驢皮得阿井水煎成乃佳爾今時方家用黄明膠多是牛皮本經阿膠亦用牛皮是二皮可通用但今牛皮膠制作不甚精止可膠物故不堪入藥也陳藏器言諸膠皆能療風止洩補虚而驢皮膠主風為是此阿膠所以勝諸膠也時珍曰凡造諸膠自十月至二三月間用沙牛水牛驢皮者為上豬馬騾駝皮者次之其舊皮鞋履等物者為下俱取生皮水浸四五日洗刮極淨熬煑時時攪之恒添水至爛濾汁再熬成膠傾盆内待凝近盆底者名坌膠煎膠水以鹹苦者為妙大抵古方所用多是牛皮後世乃貴驢皮若偽者皆雜以馬皮舊革鞍靴之類其氣濁臭不堪入藥當以黄透如琥珀色或光黒如瑿漆者為真真者不作皮臭夏月亦不濕軟修治𢎞景曰凡用皆火炙之斆曰凡用洗以豬脂浸一夜取出柳木火上炙燥研用時珍曰今方法或炒成珠或以麫炒或以火炙或以蛤粉炒或以草灰炒或酒化成膏或水化膏當各従本方氣味甘平無毒别錄曰微温張元素曰性平味淡氣味俱薄浮而升陽也入手少隂足少隂厥隂經使得火良薯蕷為之畏大黄主治心腹内崩勞極洒洒音􅀢如瘧状腰腹痛四肢酸痛女子下血安胎久服輕身益氣本經丈夫小腹痛虚勞羸瘦隂氣不足脚酸不能久立養肝氣别錄堅筋骨益氣止痢藥性黄頌曰止洩痢得連蠟尤佳療吐血衂血血淋尿血腸風下痢女人血痛血枯經水不調無子崩中帶下胎前産後諸疾男女一切風病骨節疼痛水氣浮腫虚勞咳嗽喘急肺痿唾膿血及癰疽腫毒和血滋隂除風潤燥化痰清肺利小便調大腸聖藥也時珍發明藏器曰諸膠皆主風止洩補虚而驢皮主風為最宗奭曰驢皮煎膠取其發散皮膚之外也用烏者取烏色屬水以制熱則生風之義如烏蛇烏鴉烏雞之類皆然時珍曰阿膠大要只是補血與液故能清肺益隂而治諸證按陳自明云補虚用牛皮膠去風用驢皮膠成無已云隂不足者補之以味阿膠之甘以補隂血楊士瀛云凡治喘𠻳不論肺虚肺實可下可温須用阿膠以安肺潤肺其性和平為肺經要藥小兒驚風後瞳人不正者以阿膠倍人參煎服最良阿膠育神人參益氣也又痢疾多因傷暑伏熱而成阿膠乃大腸之要藥有熱毒留滯者則能疎導無熱毒留滯者則能平安數説足以發明阿膠之藴矣附方舊四新十四攤緩偏風治攤緩風及諸風手脚不遂腰脚無力者驢皮膠微炙熟先煑葱豉粥一升别又以水一升煑香䜴二合去滓入膠更煑七沸膠烊如餳頓服之乃暖喫葱豉粥如此三四劑即止若冷喫粥令人嘔逆廣濟方肺風喘促涎潮眼竄用透明阿膠切炒以紫蘇烏梅肉焙研等分水煎服之直指老人虚秘阿膠炒二錢葱白三根水煎化入蜜二匙温服胞轉淋閟阿膠三兩水二升煑七合温服千金方赤白痢疾黄連阿膠丸治腸胃氣虚冷熱不調下痢赤白裏急厚重腹痛小便不利用阿膠炒過水化成膏一兩黄連三兩伏苓二兩為末搗丸梧子大毎服五十丸粟米湯下日三和劑局方吐血不止千金翼用阿膠炒二兩蒲黄六合生地黄三升水五升煑三升分服砂經驗治大人小兒吐血用阿膠炒蛤粉各一兩辰少許為末藕節搗汁入蜜調服肺損嘔血并開胃用阿膠炒三錢木香一錢糯米一合半為末毎服一錢百沸湯㸃服日一普濟大衂不止口耳俱出用阿膠炙蒲黄半兩毎服二錢水一盞生地黄汁一合煎至六分温服急以帛繫兩乳聖惠月水不調阿膠一錢蛤粉炒成珠研末熱酒服即安一方入辰炒末半錢月水不止阿膠炒焦為末酒服二錢秘韞妊娠尿血阿膠炒黄為末食前粥飲下二錢聖惠妊娠血痢阿膠二兩酒一升半煑一升頓服妊娠下血不止阿膠三兩炙為末酒一升半煎化服即愈又方用阿膠末二兩生地黄半觔擣汁入清酒二升分三服梅師方妊娠胎動刪繁用阿膠炙研二兩香豉一升葱一升水三升煑取一升入膠化服升産寶膠艾湯用阿膠炒熟艾葉二兩葱白一水四升煑一升分服産後虚閟阿膠炒枳殻炒各一兩滑石二錢半為末蜜丸梧子大毎服五十丸温水下未通再服和劑局方久嗽經年阿膠炒人參各二兩為末毎用三錢豉湯一盞葱白少許煎服日三次聖濟總錄黄明膠綱目釋名牛皮膠食療水膠外臺海犀膏正誤權曰白膠一名黄明膠頌曰今方家所用黄明膠多是牛皮本經阿膠亦用牛皮是二膠亦通用但今牛皮膠制作不精故不堪用止以膠物耳而鹿角膠本經謂之白膠處處能作但功倍干牛膠故鮮有真者時珍曰案本經白膠一名鹿角膠煑鹿角作之阿膠一名傳致膠煑牛皮作之其説甚明黄明膠即今水膠乃牛皮所作其色黄明非白膠也但非阿井水所作耳甄權以黄明為鹿角白膠唐慎微又采黄明諸方附之並誤矣今正其誤以附阿膠之後但其功用亦與阿膠彷彿茍阿膠難得其真牛皮膠亦可權用其性味皆平補宜于虚熱若鹿角膠則性味熱補非虚熱者所宜不可不致辯也氣味甘平無毒主治吐血衂血下血血淋下痢妊婦胎動血下風濕走注疼痛打撲傷損湯火灼瘡一切癰疽腫毒活血止痛潤燥利大小腸時珍附方新二十四肺痿吐血黄明膠炙乾花桑葉隂乾各二兩研末毎服三錢生地黄汁調下方普濟肺破出血或𠻳血不止用海犀膏即水膠一大片炙黄塗酥再炙研末用白湯化三錢服之即止斗門方吐血咯血黄明膠一兩切片炙黄新綿一兩燒研毎服一錢食後米飲服日再食療衂血不止黄明膠盪耎帖山根至髪際三因妊娠下血黄明膠二兩酒煑化頓服之肘后方欬嗽不瘥黄明膠炙研毎服一錢人參末二錢薄豉湯二盞葱白少許煎沸嗽時温呷三五日即止食療腎虚失精水膠三兩研末以酒二盌化服日三服千金面上木痺牛皮膠化和桂末厚塗一二分良葉氏摘𤣥方寒濕脚氣牛皮膠一塊細切麫炒成珠研末毎服一錢酒下其痛立止萬氏風濕走痛牛皮膠一兩薑汁半盃同化成膏攤紙上熱貼之冷即易甚效一加乳香没藥一錢鄧筆峯方脚底木硬牛皮膠生薑汁化開調南星末塗上烘物熨之尸脚坼裂烊膠著布上烘貼之千金方破傷中風黄明膠燒存性研末酒服二錢取汗普濟方趺撲傷損真牛皮膠一兩乾冬𤓰皮一兩剉同炒存性研末毎服五錢熱酒一鍾調服仍飲酒二三鍾暖臥微汗痛止一宿接元如故藺氏湯火傷灼水煎膠如糊冷掃塗之斗門一切腫毒已成未成用水膠一片水漬耎當頭開孔貼之未有膿者自消已漬者令膿自出玉燾外臺秘要諸般癰腫黄明膠一兩水半升化開入黄丹一兩煑匀以翎掃上瘡口如未成者塗其四圍自消本事方便毒初起水膠溶化塗之即散直指方乳癤初發黄明水膠以濃醋化塗之立消楊起簡便方背疽初發阮氏經驗方用黄明牛皮膠四兩酒一盌重湯頓化隨意飲盡不能飲者滚白湯飲之服此毒不内攻不傳惡症之談埜翁試効方以新瓦上燒存性研末酒二盌服唐氏經驗方又加穿山甲四片同燒存性云極妙無比瘰癧結核黒牛皮膠溶化攤膏貼之已潰者將膏搓作線長寸許紝入孔中頻換拭之取効楊氏經驗小兒痘瘢黄明膠炒研末温酒調服一錢匕痘已出者服之無瘢未出者服之㵼下物入耳中以麻繩剪令頭散著膠粘上徐引出之金千牛黄本經上品釋名丑寶時珍曰牛屬丑故隠其名金光明經謂之瞿盧折娜集解别録曰牛黄生隴西及晉地特牛膽中得之即隂乾百日使燥無令見日月光普曰牛死則黄入膽中如雞子黄也𢎞景曰舊云神牛出入鳴吼者有之夜視有光走入牛角中以盆水承而吐之即墮落水中今人多就膽中得之一子大如鷄子黄相重疊藥中之貴莫復過此一子及三二分好者值五六千至一萬也多出梁州益州恭曰牛黄今出萊州宻州淄州青州雋州戎州牛有黄者必多吼喚喝迫而得者謂之生黄最佳黄有三種散黄粒如麻豆漫黄若鷄卵中黄漿在肝膽間圓黄為塊形有大小並在肝膽中多生于􅀈特牛其􅀈牛未聞有黄也頌曰今出登萊州他處或有不甚佳凡牛有黄者身上夜有光眼如血色時復鳴吼恐懼人又好照水人以盆水承之伺其吐出乃喝迫即墮下水中取得隂乾百日一子如雞子黄大重叠可揭折輕虚而氣香者佳然人多偽之試法但揩摩手甲上透甲黄者為真雷曰此有四種喝迫而得者名生神黄殺死在角中得者名角中黄牛病死後心中剝得者名心黄初在心中如黄漿汁取得便投水中沾水乃硬如碎蒺藜及豆與帝珠子者是也肝膽中得者名肝黄大抵皆不及生黄為勝宗奭曰牛黄輕鬆自然微香西戎有犛牛黄堅而不香又有駱駝黄極易得亦能相亂不可不審之修治斆曰凡用單搗細研如塵絹裹定以黄嫰牛皮裹懸井中一宿去水三四尺明早取之氣味苦平有小毒日華曰甘涼普曰無毒蒲之才曰人參為之使得牡丹菖利耳目惡龍骨龍膽地黄常山蜚蠊畏牛膝乾漆時珍曰别録言牛黄惡龍膽而錢乙治小兒急驚疳病涼驚丸麝香丸皆兩用之何哉龍膽治驚癎解熱殺蟲與牛黄主治相近亦肝經藥也不應相惡如此主治驚癎寒熱熱盛狂痙除邪逐鬼本經療小兒百病諸癎熱口不開大人狂顛又墮胎久服輕身増年令人不忘别錄主中風失音口噤驚悸天行時疾徤忘虚乏日華安魂定魄辟邪魅卒中惡小兒夜啼甄權益肝膽定精神除熱止驚痢辟惡氣除百病思邈清心化熱利痰涼驚甯原痘瘡紫色發狂譫語者可用時珍方出王氏發明李杲曰牛黄入肝治筋病凡中風入臟者必用牛雄腦麝之劑入骨髓透肌膚以引風出若風中腑及血脈者用之恐引風邪流入於骨髓如油入麫莫之能出也時珍曰牛之黄牛之病也故有黄之牛多病而易死諸獸皆有黄人之病黄者亦然因其病在心及肝瞻之間凝結成黄故還能治心及肝膽之病正如人之淋石復能治淋也按宋史云宗澤知萊州使者取牛黄澤云方春疫癘牛飲其毒則結為黄今和氣流行牛無黄矣觀此則黄為牛病尤可徵矣附方舊四新四初生三日去驚邪辟惡氣以牛黄一豆許以赤蜜如酸棗許研匀綿蘸令兒吮之一日令盡姚和衆方七日口噤牛黄為末以淡竹􅅹化一字灌之更以豬乳滴之外臺初生胎熱或身體黄者以真牛黄一豆大入蜜調膏乳汁化開時時滴兒口中形色不實者勿多服方錢氏小兒小兒熱驚牛黄一杏仁大竹􅅹薑汁各一合和匀與服總微論驚癎嚼舌迷悶仰目牛黄一豆許研和蜜水灌之廣利方小兒驚候小兒積熱毛焦睡語欲發驚者牛黄六分硃砂五錢同研以犀角磨汁調服一錢總微論腹痛夜啼牛黄一豆許乳汁化服仍書田字於臍下聖惠方痘瘡黑陷牛黄二粒硃砂一分研末蜜浸臙脂取汁調搽一日一上王氏痘疹方鮓荅綱目集解時珍曰鮓荅生走獸及牛馬諸畜肝膽之間有肉囊裹之多至升許大者如雞子小者如栗如榛其状白色似石非石似骨非骨打破層叠嘉靖庚子年蘄州侯屠殺一黄牛得此物人無識者有畨僧云此至寶也牛馬猪畜皆有之可以祈雨西域有蜜咒則霖雨立至不知咒者但以水浸㮽弄亦能致雨後攷陶九成輟耕錄所載鮓荅即此物也其言曰蒙古人禱雨惟以浄水一盆浸石子數枚淘漉玩弄宻持咒語良久輙雨石子名鮓荅大者如鷄卵小者不等乃走獸腹中所産獨牛馬者最妙盖牛黄狗寳之類也又按京房易占云兵强主武則牛腹生石據此則鮓荅狗寳同一類也但生于狗腹者為狗寶耳氣味甘鹹平無毒主治驚癎毒瘡時珍狗寶綱目集解時珍曰狗寳生癩狗腹中狀如白石帶青色其理層叠亦難得之物也按賈似道悦生隨抄云任邱縣民家一犬甚惡後病衰為衆犬所噬而死剖之其心已化似石非石其重如石而包膜絡之如寒灰觀其脈理猶是心不知何緣致此嘗聞人患石淋有石塊刀斧不能破又嘗見龍脛骨中髓皆是白石虎目光落地亦成白石星之光氣落地則成石松亦化石蛇蠏蠶皆能成石萬物變化如此不可一槩㫁也時珍嘗静思之牛之黄狗之寳馬之墨鹿之玉犀之通天獸之鮓荅皆物之病而人以為寳人靈於物而猶不免此病况物乎人之病淋有沙石者非獸之鮓荅乎人之病癖有心似金石者非狗之寶乎此皆囿於物而不能化者故禽鳥有生卵如石者焉按程氏遺書載有波斯人發閩中古塜棺内俱盡惟心堅如石鋸開觀之有山水青碧如畫傍有一女靚粧凭欄盖此女有愛山癖朝夕注意故融結如此又宋潜溪文集載臨川浮屠法循行􅀈舟三昧法示寂後火焚惟心不化出五色光有佛像髙三寸非骨非石百體具足又徽水有優婆塞行禪觀之法及死火𦵏心内包觀音像如刻成此皆志局於物用志不分精靈氣液因感而凝形正如孕女感異像而成鬼胎之類非祥也病也有情之無情也氣味甘鹹平有小毒主治噎食及癰疽瘡瘍時珍附方新四噎食病數月不愈者用狗寳為末毎服一分以威靈仙二兩鹽二錢搗如泥將水一鍾攪匀去滓調服日二不過三日愈後服補劑杏林摘要狗寳丸治癰疽發背諸毒初覺壯熱煩渴者用癩狗寳一兩臘月黒狗膽臘月鯉魚膽各一枚蟾酥二錢蜈蚣炙七條硇砂乳香没藥輕粉雄黄烏金石各一錢粉霜三錢麝香一分同為末用首生男兒乳一合黄蠟三錢熬膏和丸綠豆大毎服一丸或三丸以白丁香七枚研調新汲水送下暖臥汗出為度不過三服立效後食白粥補之濟生方赤疔瘡狗寳丸用狗寳八分蟾酥二錢龍腦二錢麝香一錢為末好酒和丸麻子大毎服三丸以生葱三寸同嚼細用熱葱酒送下暖臥汗出為度後服流氣追毒藥貼拔毒膏取愈通𤣥論反胃膈氣丁丹崖祖傳狗寳丸用硫黄水銀各一錢同炒成金色入狗寳三錢為末以鷄卵一枚去白留黄和藥攪匀紙封泥固煻火煨半日取出研細毎服五分燒酒調服不過三服見效楊氏頤真堂方底野迦唐本草集解恭曰出西戎彼人云用豬膽作之狀似久壞丸藥赤黒色胡人時將至此甚珍重之試用有效頌曰宋時南海亦或有之氣味苦寒無毒主治百病中惡客忤邪氣心腹積聚唐本草諸血集解時珍曰獸畜有水陸之産方上之殊寒熱温涼之不同有毒無毒之各異陳氏㮣以諸血立條主病似欠分明姑存其舊而已其各血主治俱見本條氣味甘平主治補人身血不足或患血枯皮上膚起面無顔色者皆不足也竝宜生飲又解諸藥毒菌毒止渴除丹毒去煩熱藏器諸朽骨拾遺集解時珍曰朽骨不分何骨然亦當取所知無毒之骨可也主治骨蒸東牆腐骨磨醋塗痕令滅又塗􅐇瘍風瘡癬白爛者東牆向陽也藏器治風牙痛止水痢時珍附方舊一新三骨蒸發熱多取諸朽骨洗浄土氣釡煑入桃柳枝各五斗煑枯再入棘針三斗煑減半去滓以酢漿水和之煑三五沸令患者正坐散髮以湯從頂淋之唯熱為佳若心悶可少進冷粥當得大汗出惡氣汗乾乃粉身食豉粥拾遺水痢不止朽骨灰六月六日麴炒等分為末飲服方寸匕乃御傳方也張文仲方風牙作痛東牆下朽骨削牙煻火中煨熱病處咬之冷即易要外臺秘打擊青腫牆上朽骨和唾於石上磨塗之乾即易千金方震肉拾遺集解藏器曰此六畜為天雷所霹􅋬者因其事而用之也時珍曰按雷書云雷震六畜肉不可食令人成大風疾主治小兒夜驚大人因驚失心作脯食之藏器敗皷皮别錄下品校正原在草部宋本移入獸部集解宗奭曰此是穿敗者不言是何皮馬驢皮皆可為之當以黄牛皮者為勝唐韓退之所謂牛溲馬勃敗皷之皮醫師收蓄待用無遺者也今用處絶少尤好煎膠氣味平無毒主治中蠱毒别錄𢎞景曰燒作屑水和服之病人即喚蠱主姓名往呼本主取蠱即瘥與白蘘荷同功治小便淋􅅹塗月蝕耳瘡並燒灰用時珍對出藥附方舊三中蠱毒梅師方云凡中蠱毒或下血如鵞肝或吐血或心腹切痛如有物咬不即治之食人五臟即死欲知是蠱但令病人吐水沉者是浮者非也用敗皷皮燒灰酒服方寸匕須臾自呼蠱主姓名根外臺袐要云治蠱取敗皷皮廣五寸長一尺薔薇五寸如拇指大水一升酒三升煑二升服之當下蠱蟲即愈月蝕瘡集驗用救月蝕皷皮掌大一片以苦酒二升漬一宿塗之或燒灰豬脂調塗外臺氊拾遺集解時珍曰氊屬甚多出西北方皆畜毛所作其白其黒者本色也其青烏黄赤者染色也其氊毯褐􅖯􅉊毺氆氌等稱者因物命名也大抵入藥不甚相逺烏氊氣味無毒主治火燒生瘡令不著水風止血除賊風燒灰酒服二錢七治産後血下不止久臥吸人脂血損顔色上氣藏器附方新四墜損疼痛故馬氊兩段酒五升鹽一抄煮熱裹之冷即易三五度瘥廣濟方牙疳鼻疳氁褐不拘紅黒燒存性白􅈨燒枯各一錢尿捅白碱一錢半燒過同研搽神效簡便夜夢魘寐以赤􅖯一尺枕之即安肘后赤白崩漏氊燒灰酒服二錢白崩用白氊紅崩用紅氊海上六畜毛蹄甲本經下品集解𢎞景曰六畜謂牛羊豬馬鷄駝也驢騾亦其類各條已有主療亦不必出此矣時珍曰此係本經一品姑存以見古蹟氣味鹹平有毒主治鬼疰蠱毒寒熱驚癎癲痓狂走駱駝毛尤良本經六畜心集解時珍曰古方多用六畜心治心病從其類也而又有殺時驚氣入心怒氣入肝諸心損心諸肝損肝之説與之相反主治心昏多忘心虚作痛驚悸恐惑時珍附方新二徤忘心孔昏塞多忘喜誤取牛馬豬鷄羊犬心乾之為末向日酒服方寸匕日三服聞一知十外臺蛕蟲心痛用六畜心生切作四臠縱横割路納硃砂或雄黄于中吞之蟲死即愈集驗諸肉有毒拾遺牛獨肝黑牛白頭牛馬生疔死羊獨角黑羊白頭豬羊心肝有孔馬生角白羊黑頭馬鞍下黒肉馬肝白馬黑頭六畜自死首北向馬無夜眼白馬青蹄六畜自死口不閉猘犬肉犬有懸蹄六畜疫病瘡疥死鹿白臆鹿文如豹諸畜帶龍形獸岐尾諸獸赤足諸畜肉中有米星獸竝頭禽獸肝青諸獸中毒箭死脯沾屋漏米甕中肉脯六畜肉熱血不斷祭肉自動諸肉經宿未煑六畜五臟著草自動脯曝不燥生肉不歛水六畜肉得鹹酢不變色肉煑不熟肉煑熟不歛水六畜肉墮地不沾塵肉落水浮肉汁器盛閉氣六畜肉與犬犬不食者乳酪煎膾已上竝不可食殺人病人令人生癰腫疔毒諸心損心諸腦損陽滑精六畜脾一生不可食諸肝損肝諸血損血敗陽經夏臭脯痿人隂成水病魚餒肉敗諸脂燃燈損目本生命肉令人神魂不安春不食肝夏不食心秋不食肺冬不食腎四季不食脾解諸肉毒綱目中六畜肉毒六畜乾屎末黄蘗末伏龍肝末末赤小豆燒東壁土末白扁豆並水服飲人乳汁死人頭垢一錢水服起豆豉汁服馬肉毒蘆根汁甘草汁嚼杏仁飲美酒馬肝毒豬骨灰狗屎灰牡鼠屎人頭垢豆豉並水服牛馬生疔澤蘭根擂水生菖蒲擂酒豬牙灰水服甘菊根擂水甘草煎湯服取汁牛肉毒豬脂化湯飲豬牙灰水服甘草湯獨肝牛毒人乳服之狗肉毒杏仁研水服羊肉毒甘草煎水服豬肉毒杏仁研汁朴消煎汁豬屎絞汁水豬骨灰調韭菜汁大黄湯藥箭肉毒大豆煎汁鹽湯諸肉過傷本畜骨灰水服芫荽煎汁生韭汁食肉不消還飲本汁即消食本獸腦亦消本草綱目卷五十下
