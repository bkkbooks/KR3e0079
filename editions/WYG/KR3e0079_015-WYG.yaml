body:
  text: 本草綱目卷三上明李時珍撰百病主治藥上諸風有中臟破中腑痛風傷風中經麻痺中氣痰厥吹鼻皂莢末細辛末半夏末梁上塵葱莖挿鼻耳熏鼻巴豆烟蓖麻烟黄茋湯擦牙白梅肉南星末蜈蚣末蘇合丸白礬鹽龍腦南星吐痰藜蘆或煎或散皂莢末酒服食鹽煎湯人參蘆或煎或散𤓰蔕赤小豆虀汁調服萊菔子擂汁桐油掃入桔梗蘆為末湯服二錢牙皂萊菔子為末煎灌附子尖研末茶服牛蒡子末羌活酒服常山末水煎醋蜜和服膽礬末醋調灌牙皂晉礬末水服大鰕煮熟食鰕飲汁探吐苦茗茶探吐石綠醋糊為丸每化一丸砒霜研末湯服少許地松搗汁豨薟㨶汁離鬲草汁芭蕉油汁石胡荽汁三白草汁蘇方木煎酒調乳香末二錢服治男女中風口禁立吐惡物出橘紅一斤熬逆流水一盌服乃吐痰聖藥也貼喎南星末薑汁調貼蓖麻仁搗貼炒石灰醋調貼烏頭末龜血調貼雞冠血蝸牛搗貼生鹿肉切貼鮎魚尾切貼皂角末醋調貼伏龍肝鼈血調貼鱓魚血蛞蝓搗貼寒食麵醋貼桂末水調貼馬膏桂酒大麥麵栝樓汁調蟹膏貼衣魚摩之蜘蛛向火摩之牛角䚡炙熨水牛鼻火炙熨之大蒜膏貼合谷穴巴豆貼手掌心各經主治藳本手太陽羌活足太陽白芷手陽明葛根足陽明黄芪手少陽柴胡足少陽防風手太隂升麻足太隂細辛手少隂獨活足少隂芎藭手足厥隂發散麻黄發散賊風風寒風熱風濕身熱麻痺不仁熬膏服之治風病取汗荆芥散風熱袪表邪清頭目行瘀血主賊風頑痺喎斜同薄荷熬膏服治偏風研末童尿酒服治產後中風神效薄荷治賊風散風熱風寒利闗節發毒汗為小兒風涎要藥葛根發散肌表風寒風熱止渴白芷解利陽明及肺經風寒風熱皮膚風痺瘙痒利九竅表汗不可缺之升麻發散陽明風邪葱白散風寒風熱風濕身痛生薑散風寒風濕桂枝治一切風冷風濕骨節孿痛解肌開腠理抑肝氣扶脾土熨隂痺黄荆根治肢體諸風心風頭風解肌發汗鐵線草治男女諸風産後風發出粘汗水萍治熱毒風濕麻痺左癱右瘓三十六風蜜丸酒服取汗治風熱瘙痒煎水浴取汗風寒風濕草部羌活一切風寒風濕不問乆新透闗利節為太陽厥隂少隂要藥防風三十六般風去上焦風邪頭目滯氣經絡留濕一身骨節痛除風去濕仙藥藳本一百六十惡風頭面身體風濕手足軃曳石菖蒲浸酒服治三十六風一十二痺主骨痿丸服治中風濕痺不能屈伸豨薟治肝腎風氣麻痺癱瘓諸病九蒸九晒丸服葈耳大風濕痺毒在骨髓為末水服或丸服百日病出如丹如疥如駁起皮亦可釀酒牛蒡根風毒緩弱浸酒服老人中風口目瞤動風濕乆痺筋攣骨痛一二十年風疾病茵蔯蒿風濕攣縮釀酒服浴風痺白术逐風濕舌木強消痰益胃蒼术大風頑痺筋骨軟弱散風除濕解鬱汁釀酒治一切風濕筋骨痛車前子水蓼陸英飛廉忍冬坐拏草蒴藋伏牛花石南藤百靈藤酒青藤酒鉤吻並主風邪濕痺骨痛拘攣防己中風濕不語拘攣口目喎斜瀉血中濕熱茵芊年乆風濕痺痛拘急軟弱艾葉炙諸風口噤浴風濕麻痺白附子諸風冷氣失音頭面遊風足弱無力風喎同僵蠶全蝎研末酒服附子烏頭天雄並主風濕痰氣麻痺拘攣不遂通經絡開氣道燥濕痰草烏頭惡風冷痰癱緩年乆麻痺芫花毒風冷痰四肢拘攣羊躑躅賊風走皮中淫淫痛風濕痺痛不遂言蹇酒蒸為末牛乳酒服亦效蓖麻子油酒煮日服治偏風不遂作膏通闗㧞風邪出外穀菜大豆炒焦投酒中飲主風痺癱緩口噤口喎破傷中風産後風痙頭風煮食治濕痺膝痛醋蒸卧治四肢孿縮豆豉浸酒治膝孿不遂骨痛大豆黄卷巨勝釀酒治風痺痛麻仁骨髓風毒痛不能動炒香浸酒飲麻勃一百二十種惡風黑色遍身苦痺攣麥麩醋蒸熨風濕痺痛薏苡久風濕痺筋急拘攣亦煮酒服茄子腰脚風血積冷筋攣痛煎汁果熬膏入粟粉麝香朱砂丸服木秦椒治風濕痺蜀椒大風肉枯生蟲遊走痺痛死肌寒熱腰脚不遂散寒除濕為丸吳茱茰煎酒治頑風痺痒治同薑豉煎酒冷服取汁賊風口喎不語栢葉釀酒松節酒秦皮風寒濕痺五加皮名追風使治一切風濕痿痺攣急宜釀酒皂莢通闗節捜肝風瀉肝氣蔓荆實除賊風搜肝氣筋骨間寒濕痺頭旋腦鳴欒荆子大風諸蟲風不遂部蠶沙風緩頑痺不隨炒浸酒服亦蒸熨蝎半身不遂抽掣口目喎斜研入麝香酒服竹蝨半身不遂同麝鱗香浸酒服出汗介守宮中風癱緩同諸藥煎服鯪鯉甲中風癱緩寒熱風痺及風濕強直痛不可忍烏蛇酒白花蛇酒蚺蛇酒痒並主賊風頑痺痛大風瘡癬有蟲鱓魚逐十二風邪濕氣作臛取汗水龜釀酒主大風緩急拘禽攣煮食除風痺痛部雞屎白炒研豆淋酒服主風寒濕痺口噤不肖人事五靈脂散血活血引經有功乳癱緩熱酒服二錢風冷痺痛同没川烏丸服鴈肪鵜鶘油主風痺透經絡獸引藥氣入内部羊脂賊風痿痺腫痛徹毒氣引藥入内熊脂風痺青羖羊角炒研酒服治風痰恍惚悶絶復甦驢毛骨中一切風炒黄浸酒服取汗狸骨一切遊風羊脛骨酒虎脛骨酒並主諸金風注痛石雄黄除百節中大風捜肝氣金牙石一切腰脚不遂火煅酒淬飲河砂風濕頑痺冷風癱緩晒熱坐之冷即易取汗鼠壤土蒸熨中風冷痺偏枯死肌風熱濕熱草部甘草瀉火利九竅百脉黄芩黄連菊花秦芃並治風熱濕熱𤣥參大青苦參白鮮皮白頭翁白英青葙子敗醬桔梗並治風熱大黄蕩滌濕熱下一切風熱柴胡治濕痺拘攣平肝膽三焦包絡相火少陽寒熱必用之藥升麻去皮膚肌肉風熱白微暴中風身熱腹滿忽忽不知人龍葵治風消熱令人少睡麥門冬清肺火止煩熱天門冬風濕偏痺及熱中風牡丹皮寒熱中風瘛瘲驚癎煩熱手足少隂厥隂四經伏火釣藤肝風心熱大人頭眩小兒十二驚癎紫葳及莖葉熱風遊風風刺蒺藜諸風瘙痒穀大便結果胡麻久食不生風熱風病人宜食之綠豆浮風風疹白扁豆行風氣除濕熱茶茗中風昏憒多睡梨汁除風熱不語木葉亦作煎部槐實氣熱煩悶枝釀酒治大風痿痺白皮治中風皮膚不仁身直不得屈申煎酒及水服膠一切風熱口噤筋攣四肢不收頑痺周身如蟲行側栢葉凡中風不省口噤手足軃曳便取一握同葱白搗酒煎服能退風和氣不成廢人花桑枝炒香煎飲治風氣拘攣身體風疹乆服終身不患偏風葉煎酒治一切風蒸罨風痛出汗白楊皮毒風緩弱氣在皮膚中浸酒服皂莢子疎導五臟風熱丸服治腰脚風痛不能行巵子去熱毒風除煩悶黄蘖皮腎經風熱地骨皮腎家風濕痺檉葉逺近一切風煎汁和竹瀝服荆瀝除風熱開經絡導痰涎日飲之竹瀝暴中風痺大熱煩悶失音不語子冒風痙破傷風噤養血清痰並宜同薑汁飲之竹葉痰熱中風不語煩熱天竹黄諸風熱痰涎蟲失音不語獸蟬花一切風熱瘙痒犀角大熱風毒毷氉煩悶中風失音羚羊角一切熱毒風濕注伏在骨間及毒風卒死金子癎痙疾石石膏風熱煩躁鐵華粉平肝除風熱鐵落勞鐵赤銅並除賊風反折燒赤浸酒飲痰氣草部天南星中風中氣痰厥不省人事同木香煎服諸風口噤同蘇葉生薑煎服半夏消痰除濕防痰厥中風同甘草風煎服前胡化痰熱下氣散風旋覆花風氣濕痺胸上痰結留飲丸中風壅滯蜜服香附子心肺虚氣客熱行肝氣升降諸氣煎湯浴風疹木香中氣不省人事研末服之行肝氣調諸氣藿香升降諸氣蘇葉散風寒行氣利肺蘇子治腰脚中濕氣風結治風順氣化痰利膈竅腸煮粥食治風寒濕痺四肢攣急不能踐地𤣥胡索除風治氣活血通經絡蘭葉浴風痛俗名風藥大㦸甘遂並治經絡痰飲留滯麻痺隠痛牽引走注威靈仙治諸風宣通五臟去冷滯痰水利腰膝牽牛子除風毒下果一切壅滯木杏仁頭靣風氣往來煩熱散風降氣化痰風逐日生吞治偏風不遂失音不語肺中熱陳橘皮理氣除濕痰枳實枳殻大風在皮膚中如麻豆苦痒麻木破氣勝濕化痰枳茹漬酒服治中風身直及口僻目斜檳榔除一切風一切氣宣利臟腑烏藥治中風中氣氣順則風散氣降則痰下龍腦香入骨治骨痛散經絡壅滯蘇合香安息香通諸竅臟腑一切不正之蟲氣獸麝香入肉治風在骨髓錢中風不省香油灌二白殭蠶散風痰酒服七枚治口噤發汗並一金切風症風疹石鈆霜墜中風痰濕礬石除風消痰血滯草部當歸芎藭並主一切風一切氣一切虚破惡血養新血蜜丸服治風痰行氣解鬱丹參除風邪留熱骨節痛四肢不遂破宿血生新血漬酒飲治風毒足軟名奔馬草芍藥治風除血痺瀉肝安脾肺飲風毒在骨髓痛同虎骨浸酒地黄逐血痺填骨髓茺蔚子治風解熱風莖葉治血痛地榆汁釀酒治風痺補腦虎杖煮酒治風在骨節間薑黄止暴風痛除風熱理血中之氣紅藍花治六十二種風及血氣痛子煎服治女子中風煩渴穀菜麻仁中風出汗下氣逐一切風利血脈韭汁肥白人中果風失音木桃仁血滯風痺大便結酒浸作丸治偏風蘇方木男女中風口噤同乳香服乳香中風口噤燒烟熏口目喎斜活血止痛蟲獸蜜蠟暴風身冷如癱化貼并裹手足阿膠男女一切風病骨節痛不隨醍醐酒服治中風煩熱野駝脂一切風疾皮膚急痺酒服并摩之風虚草部天麻主肝氣不足風虚内作頭運目旋麻痺不仁語言不遂為定風神藥黄芪風虚自汗逐五臟惡血瀉隂火去虛熱無汗則發有汗則止人參補元氣定魂魄止煩躁生津液消痰沙參去皮肌浮風宣五臟風氣養肝氣長松煮酒治一切風虛黄精補中除風濕葳㽔治中風暴熱不能動揺虛風濕毒風温自汗灼熱一切虛乏牛膝寒濕痿痺拘攣膝痛強筋補肝臟風虛石龍芮骨碎補巴㦸天狗脊萆薢菝葜土茯苓何首烏並主風虚風濕痺痛軟弱補肝腎利闗節列當煮酒去風血補腰腎白及腎中邪氣風痱不收補肺氣仙茅一切風氣腰脚風冷攣痺不能行九蒸九晒浸酒服淫羊藿一切冷風攣急不遂老人昏耄浸酒服治偏風蛇牀子男女風虛濕痺毒風腰胯酸痛風浴大身痒補骨脂風虚冷痺骨髓傷敗一切風氣痛作丸服兎絲子補肝風虛利腰脚覆盆子勞損風虚補肝明目石斛脚膝軟弱乆冷風痺骨酥浸蒸服至一鎰永不痛絡石木蓮葉扶芳藤並主風血暖腰脚菜一切冷氣浸酒飲果薯蕷去冷風頭靣遊風強筋骨壯脾胃栗腎虛腰脚無力日食十顆栗楔治筋骨風痛松子諸風骨木節風部松葉風痛脚痺浸酒服出汗松節風虚乆痺骨節痛能燥血中之濕杜仲海桐皮山茱茰枸杞子並主風虛腰脚痛冬青子浸酒去風虛神木治周痺偏風毒風不語石南逐諸風脚弱南燭熬膏治一切風強筋益氣不彫木浸酒去風氣補虚放杖木為風痺腎弱要藥木天蓼釀酒治風勞石虛冷有奇効部磁石周痺風濕肢節中痛男女風虛同白石英浸水煮粥食白石英風虛冷痺諸陽不足燒淬酒飲孔公孽風冷膝痺同石斛浸酒飲石腦石鍾乳陽起石代赭石禹餘糧石硫黄並主風冷濕痺雲母粉中風寒熱如在舟車海蠶諸風冷氣虛勞烏雞中風舌強煩熱麻痺酒煮食練鵲浸酒飲治風麋角風虛冷痺暖腰膝壯陽痙風即痓病屬太陽督脈二經其證發熱口噤如癎身體強直角弓反張甚則搐搦傷風有汗者為柔痓産傷寒濕無汗者為剛痓之金瘡折傷癰疽後俱有破傷風濕發痙症風寒風濕草部麻黄桂枝术並主風寒風濕痙羌活風寒風濕傷金瘡癎痙人産後中風口噤不知事酒水煎服葛根金瘡中風寒發痙欲死煮汁服乾者為末荆芥散風濕風熱欲産後中風口噤四肢強直角弓反張或搐搦死為末豆淋酒服入童尿尤妙防風主金瘡中風濕内痙天南星打撲傷損金瘡破傷風及傷濕牙闗緊急角弓反張同防風末熱酒小便調服名玉真散三服即甦灌服一錢仍灸印堂南星半夏等分為末薑汁竹瀝口