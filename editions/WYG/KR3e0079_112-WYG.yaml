body:
  text: 本草綱目卷四十八明李時珍撰禽之二原禽類二十三種附一種雞本經上品釋名燭夜時珍曰徐鉉云雞稽也能稽時也廣志云大曰蜀小曰荆雛曰􅙿梵書雞曰鳩七咤集解别錄曰鷄生朝鮮平澤𢎞景曰雞屬甚多朝鮮乃𤣥莵樂浪不應總是鷄所出也馬志曰入藥取朝鮮者良爾頌曰今處處人家畜養不聞自朝鮮來時珍曰雞類甚多五方所産大小形色往往亦異朝鮮一種長尾鷄尾長三四尺遼陽一種食鷄一種角鷄味俱肥美大勝諸鷄南越一種長鳴鷄晝夜啼呌南海一種石鷄潮至即鳴蜀中一種鶤鷄楚中一種傖鷄竝髙三四尺江南一種矮鷄脚纔二寸許也鷄在卦屬巽在星應􅄧無外腎而虧小腸凡人家無故羣鷄夜鳴者謂之荒鷄主不祥若黄昏獨啼者主有火患謂之盜啼老鷄能人言者牝鷄雄鳴者雄鷄生卵者竝殺之即已俚人畜鷄無雄即以鷄卵告竈而伏出之南人以鷄卵畫墨煑熟騐其黄以卜吉凶又以鷄骨占年其鳴也知時刻其棲也知隂晴太清外術言蓄蠱之家鷄輒飛去萬畢術言其羽焚之可以致風五行志言雄鷄毛燒着酒中飲之所求必得古人言鷄能辟邪則鷄亦靈禽也不獨充庖而已諸鷄肉氣味食忌詵曰鷄有五色者𤣥鷄白首者六指者四距者鷄死足不申者竝不可食害人時珍曰延壽書云閹鷄能啼者有毒四月勿食抱鷄肉令人作癰成漏男女虚乏𢎞景曰小兒五歲以下食鷄生蚘蟲鷄肉不可合葫蒜芥李食不可合犬肝犬腎食竝令人洩痢同兎食成痢同魚汁食成心瘕同鯉魚食成癰癤同獺肉食成遁口同生葱食成蟲痔同糯米食生蚘蟲發明宗奭曰巽為風為鷄鷄鳴于五更者日至巽位感動其氣而然也今有風病人食之無不發作巽為鷄信可騐矣震亨曰鷄屬土而有金木火又屬巽能助肝火冦言動風者習俗所移也鷄性補能助濕中之火病邪得之為有助也若魚肉之類皆然且西北多寒中風者誠有之東南氣温多濕有風者非風也皆濕生痰痰生熱熱生風耳時珍曰禮記云天産作陽地産作隂鷄卵生而地産羽不能飛雖為陽精實屬風木是陽中之隂也故能生熱動風風火相扇乃成中風朱駁冦説為非亦非矣頌曰鷄肉雖有小毒而補虚羸是要故食治方多用之丹雄鷄肉氣味甘微温無毒扁鵲曰辛主治女人崩中漏下赤白沃通神殺惡毒辟不祥本經補虚温中止血能愈久傷乏瘡不瘥者别錄補肺孫思邈發明普曰丹雄鷄一名載丹宗奭曰即朱鷄也時珍曰鷄雖屬木分而配之則丹雄鷄得離火陽明之象白雄鷄得庚金太白之象故辟邪惡者宜之烏雄鷄屬木烏雌鷄屬水故胎産宜之黄雌鷄屬土故脾胃宜之而烏骨者又得水木之精氣故虚熱者宜之各從其類也吳球云三年鏾鷄常食治虚損養血補氣附方新二辟禳瘟疫冬至日取赤雄鷄作腊至立春日煮食至盡勿分他人肘后方百蟲入耳鷄肉炙香塞耳中引出總錄白雄鷄肉氣味酸微温無毒藏器曰甘寒主治下氣療狂邪安五臟傷中消渇别錄調中除邪利小便去丹毒風日華發明藏器曰白雄鷄養三年能為鬼神所使時珍曰按陶𢎞景真誥云學道山中宜養白鷄白犬可以辟邪今術家祈禳皆用白鷄其原本此是乃異端一説耳鷄亦何神何妖哉附方舊三新四癲邪狂妄自賢自聖行走不休白雄鷄一隻煮以五味和作􅅅粥食心鏡驚憤邪僻治因驚憂佈追或激憤惆悵致志氣錯越心行違僻者白雄鷄一頭治如食法真珠四兩薤白四兩水三升煮二升盡食之飲汁令盡肘后卒然心痛白鷄一頭治如食法水三升煮二升去鷄煎取六合入苦酒六合眞珠一錢煎取六合納麝香二豆許頓服之肘后赤白痢下白雄鷄一隻如常作臛及餛飩空心食心鏡卒得欬嗽白鷄一隻苦酒一斗煮取三升分三服并淡食鷄肘后水氣浮腫小豆一升白雄鷄一隻治如食法以水三斗煮熟食之飲汁令盡肘后方肉壊怪病凡口鼻出腥臭水以椀盛之狀如鐵色蝦魚走躍捉之即化為水此肉壊也但多食鷄饌即愈夏子益竒疾方烏雄鷄肉氣味甘微温無毒主治補中止痛别錄止肚痛心腹惡氣除風濕麻痺諸虚羸安胎治折傷并癰疽生搗塗竹木刺入肉日華發明時珍曰按李廷飛云黄鷄宜老人烏鷄宜産婦暖血馬益卿云妊婦宜食牡鷄肉取陽精之全于天産者此亦胎教宜見虎豹之意耳又唐崔行功纂要云婦人産死多是富貴家擾攘致婦驚悸氣亂故耳惟宜屏除一切人令其獨産更爛煮牡鷄取汁作粳米粥與食自然無恙乃和氣之效也葢牡鷄汁性滑而濡不食其肉恐難消也今俗産家每産後即食鷄啖卵氣壯者幸而無恙氣弱者因而成疾皆由不解此意也附方舊四新六補益虚弱詵曰虚弱人用烏雄鷄一隻洗净五味煮極爛食生即反損人或五味淹炙食亦良反胃吐食用烏雄鷄一隻治如食法入胡荽子半斤在腹内烹食二隻愈老人中風煩熱語澁每用烏雄鷄一隻切葱白一握煮臛下麻汁五味空心食之養老書脚氣煩懣用烏雄鷄一隻治如食法入米作􅃵食養老書寒疝絞痛用烏雄鷄一頭治如食法生地黄七斤同剉著甑中蒸之以器盛取汁清旦温服至晚令盡當下諸寒癖證以白粥食之久疝不過三服肘后卒得欬𠻳烏雄鷄一隻治如食法酒漬半日飲之肘后腎虚耳聾烏雄鷄一隻治净以無灰酒三升煮熟乘熱食三五隻效狐尿刺瘡棘人腫痛欲死破烏鷄搨之良肘后方猫眼睛瘡身面上瘡似猫兒眼有光采無膿血但痛痒不常飲食减少名曰寒瘡多喫鷄魚葱韭自愈夏子益竒疾方打傷攧撲及牛馬觸動胸腹破血四肢摧折以烏鷄一隻連毛杵一千二百下苦酒三升和匀以新布搨病處將膏塗布上覺寒振欲吐徐徐取下須臾再上一鷄少頃再作以愈為度肘后方黑雌鷄肉氣味甘酸温平無毒主治作羮食治風寒濕痺五緩六急安胎别錄安心定志除邪辟惡氣治血邪破心中宿血治癰疽排膿補新血及産後虚羸益色助氣日華治反冐及腹痛踒折骨痛乳癰又新産婦以一隻治净和五味炒香投二升酒中封一宿取飲令人肥白又和烏油麻二升􅆈香入酒中極效孟詵發明時珍曰烏色屬水牝象屬隂故烏雌所治皆血分之病各從其類也附方新二中風舌强不語目晴不轉煩熱烏雌鷄一隻治净以酒五升煮取二升去滓分作三次連服之食葱薑粥暖卧取小汗飲膳正要死胎不下烏鷄一隻去毛以水三升煮二升去鷄用帛蘸汁摩臍下自出婦人良方虚損積勞治男女因積虚或大病後虚損沉困酸疼盗汗少氣喘惙或小腹拘急心悸胃弱多卧少起漸至瘦削若年深五臟氣竭則難治也用烏雌鷄一頭治如食法以生地黄一斤切飴糖一升納腹内縛定銅器貯于瓶中蒸五升米熟取出食肉飲汁勿用鹽一月一作神効姚生坦方黄雌鷄肉氣味甘酸鹹平無毒日華曰性温患骨熱人勿食主治傷中消渇小便數而不禁腸澼洩痢補益五臟絶傷療五勞益氣力别錄治勞劣添髓補精助陽氣暖小腸止洩精補水氣日華補丈夫陽氣治冷氣疾着牀者漸漸食之良以光粉諸石末和飯飼雞煑食甚補益孟詵治産後虚羸煑汁煎藥服佳時珍發明時珍曰黄者土色雌者坤象味甘歸脾氣温益胃故所治皆脾胃之病也丹溪朱氏謂鷄屬土者當指此鷄而發他鷄不得侔此附方舊三新六水癖水腫詵曰腹中水癖水腫以黄雌鷄一隻如常治净和赤小豆二升同煮汁飲日二夜一時行黄疾時行發黄用金色脚黄雌鷄治如食法煮熟食之并飲汁令盡不過再作亦可少下鹽豉肘后方消渇飲水小便數以黄雌鷄煮汁冷飲并作羮食肉心鏡下痢禁口黄肥雌鷄一隻如常為臛作濕餛飩空心食之心鏡脾虚滑痢用黄雌鷄一隻炙以鹽醋塗煮熟食之心鏡脾胃弱乏人痿黄瘦黄雌鷄肉五兩白麪七兩切肉作餛飩下五味煮熟空心食之日一作益顔色補藏府夀親産後虚羸黄雌鷄一隻去毛背上開破入生百合三枚白粳米半升縫合入五味汁中煮熟開腹取百合并飯和汁作羮食之并食肉惠聖病後虚汗傷寒後虚弱日夜汁出不止口乾心躁用黄雌鷄一隻去腸胃治净麻黄根一兩水七大盞煮汁三大盞去滓及鷄入肉蓯蓉酒浸一宿刮净一兩牡蠣煆粉二兩煎取一盞半一日服盡聖惠老人噎食不通黄雌鷄肉四兩切茯苓二兩白麪六兩作餛飩入䜴汁煮食三五服效養老書烏骨雞氣味甘平無毒主治補虚勞羸弱治消渇中惡鬼擊心腹痛益産婦治女人崩中帶下一切虚損諸病大人小兒下痢禁口竝煑食飲汁亦可搗和丸藥時珍發明時珍曰烏骨鷄有白毛烏骨者黑毛烏骨者斑毛烏骨者有骨肉俱烏者肉白骨烏者但觀鷄舌黑者則肉骨俱烏入藥更良鷄屬木而骨反烏者巽變坎也受水木之精氣故肝腎血分之病宜用之男用雌女用雄婦人方科有烏鷄丸治婦人百病煮鷄至爛和藥或并骨研用之按太平御覽云夏侯𢎞行江陵逢一大鬼引小鬼數百行𢎞潜捉末後以小鬼問之曰此廣州大殺也持弓㦸往荆揚二州殺人若中心腹者死餘處猶可救𢎞曰治之有方乎曰但殺白烏骨鷄薄心即瘥時荆揚病心腹者甚衆𢎞用此治之十愈八九中惡用烏鷄自𢎞始也此説雖涉迂怪然其方則神妙謂非神傳不可也鬼擊卒死用其血塗心下亦效附方新三赤白帶下白果蓮肉江米各五錢胡椒一錢為末烏骨鷄一隻如常治净裝木𤓰腹煮熟空心食之遺精白濁下元虚憊者用前方食之良脾虚滑泄烏骨母鷄一隻治净用豆䓻一兩草果二枚燒存性摻入鷄腹内紥定煮熟空心食之反毛鷄主治反胃以一隻煮爛去骨入人參當歸食鹽各半兩再同煑爛食之至盡時珍生出乾坤意發明時珍曰反毛鷄即翻翅鷄也毛翮皆反生向前治反胃者述類之義耳泰和老鷄氣味甘辛熱無毒主治内托小兒痘瘡時珍發明時珍曰江西泰和吉水諸縣俗傳老鷄能發痘瘡家家畜之近則五六年逺則一二十年待痘瘡發時以五味煮爛與兒食之甚則加胡椒及桂附之屬此亦陳文中治痘用木香異攻散之意取其能助濕熱發膿也風土有宜不宜不可以為法鷄頭丹白雄鷄者良主治殺鬼東門上者良本經治蠱禳惡辟瘟時珍發明時珍曰古者正旦磔雄鷄祭門戸以辟邪鬼葢鷄乃陽精雄者陽之體頭者陽之㑹東門者陽之方以純陽勝純隂之義也千金轉女成男方中用之亦取此義也按應邵風俗通云俗以鷄祭門戸鷄乃東方之牲東方旣作萬物觸户而出也山海經祠鬼神皆用雄鷄而今治賊風有鷄頭散治蠱用東門鷄頭治鬼痱用雄鷄血皆以禦死辟惡也又崔食月令云十二月東門磔白鷄頭可以合藥周禮鷄人凡祭祀禳釁供其鷄牲注云禳郊及疆却災變也作宫室器物取血塗釁隙淮南子曰鷄頭已瘻此類之推也附方新一卒魘死昏東門上鷄頭為末酒服之千金方鷄冠血三年雄鷄者良氣味鹹平無毒主治烏鷄者主乳難别錄治目淚不止日㸃三次良孟詵亦㸃暴赤目時珍丹鷄者治白癜風日華並療經絡間風熱塗頰治口喎不正塗面治中惡卒飲之治縊死欲絶及小兒卒驚客忤塗諸瘡癬蜈蚣蜘蛛毒馬嚙瘡百蟲入耳時珍發明時珍曰鷄冠血用三年老雄者取其陽氣充溢也風中血脈則口僻喎冠血鹹而走血透肌鷄之精華所聚本乎天者親上也丹者陽中之陽能僻邪故治中惡驚忤諸病烏者陽形隂色陽中之隂故治産乳目淚諸病其治蜈蚣蜘蛛諸毒者鷄食百蟲制之以所畏也高武痘疹正宗云鷄冠血和酒服發疽最佳鷄屬巽屬風頂血至清至高故也附方舊八新十一益助陽氣詵曰丹雄鷄冠血和天雄太陽粉各四分桂心二分丸服之鬼擊卒死烏鷄冠血瀝口中令嚥仍破此鷄搨心下冷乃棄之道邊妙肘后卒死寢死治卒死或寢卧奄忽而絶皆是中惡用雄鷄冠血塗面上乾則再上仍吹入鼻中并以灰營死人一周肘后卒然忤死不能言用鷄冠血和真珠丸小豆大納三四丸入口中效肘后方卒縊垂死心中猶温者勿斷繩刺鷄冠血滴口中以安心神或云男用雌女用雄肘后小兒卒驚似有痛處不知疾狀用雄鷄冠血少許滴口中妙譚氏小兒小兒解顱丹雄鷄冠上血滴之以赤芍藥末粉之甚良普濟隂毒卒痛用雄鷄冠血入熱酒中飲之暖卧取汗藴傷寒要女人隂血女人交接違理血出用雄鷄冠血塗之集騐爛弦風眼鷄冠血㸃之日三五度聖惠對口毒瘡熱鷄血頻塗之取散皆效方發背癰疽用雄鷄冠血滴疽上血盡再換不過五六鷄痛止毒散數日自愈保夀堂方浸淫瘡毒不早治周身殺人以鷄冠血塗之日四五度肘后燥癬作痒雄鷄冠血頻頻塗之范汪方馬咬成瘡腫痛用鷄冠血塗之䭸馬用雌鷄壮馬用雄鷄肘后方蜈蚣咬瘡鷄冠血塗之篋錢相公中方蜘蛛咬瘡同上中蜈蚣毒舌脹出口是也雄鷄冠血浸舌并咽之􅇎青囊纂諸蟲入耳鷄冠血滴入即出勝金鷄血烏鷄白鷄者良氣味鹹平無毒主治踒折骨痛及痿痺中惡腹痛乳難别錄治剝驢馬被傷及馬咬人以熱血浸之白癜風癧瘍風以雄鷄翅下血塗之藏器熱血服之主小兒下血及驚風解丹毒蠱毒鬼排隂毒安神定志時珍曰肘后治驚邪恍惚大方中亦用之附方舊一新九隂毒鷄血衝熱酒飲鬼排卒死用烏雄鷄血塗心下即甦風俗通解百蠱毒白鷄血熱飲之廣記驚風不醒白烏骨雄鷄血抹唇上即醒集成縊死未絶鷄血塗喉下千金黄疸困篤用半斤大雄鷄背上破開不去毛帶熱血合患人胸前冷則換之日換數鷄拔去積毒即愈此鷄有毒人不可食犬亦不食也唐珪經驗方筋骨折傷急取雄鷄一隻刺血量患人酒量或一椀或半椀和飲痛立止神驗青囊雜物眯目不出以鷄肝血滴少許即出聖惠蚰蜓入耳生油調鷄心血滴耳即出金瘡腸出以乾人屎末抹入桑皮線縫合熱鷄血塗之生生編肪烏雄鷄者良氣味甘寒無毒主治耳聾别錄頭秃髪落時珍附方新一年久耳聾用鍊成鷄肪五兩桂心十八銖野葛六銖同以文火煎三沸去滓每用棗許以􅓗筒炙溶傾入耳中如此十日耵聹自出長寸許也千金翼腦白雄鷄者良主治小兒驚癎燒灰酒服治難産蘓恭心烏雄鷄者良主治五邪别錄肝雄鷄者良氣味甘苦温無毒時珍曰微毒内則云食鷄去肝為不利人也主治起隂别錄補腎治心腹痛安漏胎下血以一具切和酒五合服之孟詵療風虚目暗治女人隂蝕瘡切片納入引蟲出盡良時珍附方新三隂痿不起用雄鷄肝三具兎絲子一升為末雀卵和丸小豆大每服一百九酒下日二千金肝虚目暗老人肝虚目暗烏雄鷄肝一具切以豉和米作羮成粥食之養老書睡中遺尿雄鷄肝桂心等分搗丸小豆大每服一九米飲下日三服遺精加白龍骨膽烏雄鷄者良氣味苦微寒無毒主治目不明肌瘡别錄月蝕瘡遶耳根日三塗之孟詵燈心蘸㸃胎赤眼甚良水化搽痔瘡亦效時珍附方新四沙石淋瀝用雄鷄膽乾者半兩鷄屎白炒一兩研勻温酒服一錢以利為度十便良方耳瘑䏙目黑雌鷄膽汁塗之日三聖惠眼熱流淚五倍子蔓荆子煎湯洗後用雄鷄膽㸃之摘𤣥方塵沙眯目鷄膽汁㸃之醫説腎雄鷄者良主治􅙄鼻作臭用一對與脖前肉等分入䜴七粒新瓦焙研以鷄子清和作餅安鼻前引蟲出忌隂人鷄犬見十便良方嗉主治小便不禁及氣噎食不消時珍附方新三氣噎不通鷄嗉兩枚連食以濕紙包黄泥固煆存性為末入木香沉香丁香末各一錢棗肉和丸梧子大每汁下三丸小便不禁雄鷄喉嚨及膍胵并屎白等分為末麥粥清服之方衛生易簡發背腫毒鷄嗉及肫内黄皮焙研濕則乾摻乾則油調搽之醫林正宗膍胵裏黄皮一名鷄内金膍胵音脾䲭鷄肫也近人諱之呼肫内黄皮為鷄内金男用雌女用雄氣味甘平無毒主治洩痢小便頻遺除熱止煩别錄止泄精竝尿血崩中帶下腸風瀉血日華治小兒食瘧療大人淋漓反胃消酒積主喉閉乳蛾一切口瘡牙疳諸瘡時珍附方舊二新十八小便遺失用鷄膍胵一具并腸燒存性酒服男用雌女用雄集騐小便淋瀝痛不可忍鷄肫内黄皮五錢隂乾燒存性作一服白湯下立愈醫林集要膈消飲水鷄内金洗晒乾栝樓根炒五兩為末糊丸梧桐子大每服三十丸温水下日三總錄反胃吐食鷄膍胵一具燒存性酒調服男用雌女用雄千金消導酒積鷄膍胵乾葛為末等分麫糊丸梧子大每服五十丸酒下袖珍方禁口痢疾鷄内金焙研乳汁服之小兒瘧疾用鷄膍胵黄皮燒存性乳服男用雌女用雄千金喉閉乳蛾鷄肫黄皮勿洗隂乾燒末用竹管吹之即破愈青囊方一切口瘡鷄内金燒灰傅之立效活㓜新書鵞口白瘡鷄肫黄皮為末乳服半錢子母秘錄走馬牙疳經騐用鷄肫黄皮不落水者五枚枯􅈨五錢研搽立愈分心鑑用鷄肫黄皮燈上燒存性入枯􅈨黄栢末等麝香少許先以米泔洗漱後貼之隂頭疳蝕鷄内金不落水拭净新瓦焙脆出火毒為細末先以米泔水洗瘡乃搽之亦治口疳經騐方穀道生瘡久不愈用鷄膍胵燒存性為末乾貼之如神總錄脚脛生瘡雄鷄肫内皮洗净貼之一日一易十日愈小山竒方瘡口不合鷄膍胵皮日貼之發背初起用鷄肫黄皮不落水者隂乾臨時温水潤開貼之隨乾隨潤不過三五箇即消方楊氏經騐發背已潰用鷄肫黄皮同綿絮焙末搽之即愈金顋瘡蝕初生如米豆久則穿蝕用鷄内金焙欝金等分為末鹽漿潄了貼之忌米食總錄小兒疣目鷄肫黄皮擦之自落集要方鷄骨哽咽活鷄一隻打死取出鷄内金洗净燈草褁于火上燒存性竹筒吹入咽内即消不可見肉攝生方腸男用雌女用雄主治遺溺小便數不禁燒存性每服三指酒下别錄止遺精白濁消渇時珍附方舊一小便頻遺心鏡用雄鷄腸一具作臛和酒服普濟用雄鷄腸水煮汁服日三次肋骨烏骨鷄者艮主治小兒羸瘦食不生肌别錄附方新二小兒􅇟陷因臟腑壅熱氣血不榮用烏鷄骨一兩酥炙黄生地黄焙二兩為末每服半錢引飲調下聖惠方瘡中朽骨久疽久漏中有朽骨以烏骨鷄脛骨實以砒石鹽泥固濟煆紅出毒以骨研末飯丸粟米大每以白紙撚送一粒入竅中以拔毒膏藥封之其骨自出醫學正傳距白雄鷄者良主治産難燒研酒服蘓恭下骨哽以鷄足一雙燒灰水服時珍臺出外翮翎白雄鷄者良主治下血閉左翅毛能起隂别錄治婦人小便不禁消隂㿗療骨哽蝕癰疽止小兒夜啼安席下勿令母知時珍發明時珍曰翅翮形鋭而飛揚乃其致力之處故能破血消腫潰癰下哽按葛洪云凡古井及五月井中有毒不可輒入即殺人宜先以鷄毛試之毛直下者無毒回旋者有毒也又感應志云五兩日以白鷄左翅燒灰揚之風立至以黑犬皮毛燒灰揚之風立止也巽為風鷄屬巽於此可見附方舊二新七隂腫如斗取鷄翅毛一孔生兩莖者燒灰飲服左腫取右翅右腫取左翅雙腫並取肘后方隂卒腫痛鷄翮六枚燒存性蛇牀子末等分隨左右𫝊之肘后方婦人遺尿雄鷄翎燒灰酒服方寸匕日三千金翼咽喉骨哽白雄鷄左右翮大毛各一枚燒灰水服外臺腸内生癰雄鷄頂上毛并屎燒末空心酒服千金决癰代鍼白鷄翅下兩邊第一毛燒灰水服即破外臺解蜀椒毒鷄毛燒烟吸之并水調一錢服之千金方馬汗入瘡鷄毛燒灰酒服方寸匕集騐方蠼螋尿瘡烏鷄翅毛燒灰油調傅之蟲畏鷄故也瑣碎錄尾毛主治刺入肉中以二七枚和男子乳封之當出孟詵解蜀椒毒燒烟吸之并以水調灰服又治小兒痘瘡後生癰燒灰和水傅之時珍附方新一小便不禁雄鷄翎燒研酒服方寸匕外臺祕要屎白雄鷄屎乃有白臘月收之白鷄烏骨者更良素問作鷄矢氣味微寒無毒主治消渇傷寒寒熱破石淋及轉筯利小便止遺尿滅瘢痕别錄治中風失音痰迷炒服治小兒客忤蠱毒治白虎風貼風痛日華治賊風風痺破血和黑豆炒酒浸服之亦治蟲咬毒藏器下氣通利大小便治心腹鼔脹消癥瘕療破傷中風小兒驚啼以水淋汁服解金銀毒以醋和塗蜈蚣蚯蚓咬毒時珍發明頌曰按素問云心腹滿旦食不能暮食名為鼓脹治之以鷄屎醴一劑知二劑巳王氷注云本草鷄屎利小便並不治蠱脹今方法當用湯漬服之耳時珍曰蠱脹生於濕熱亦有積滯成者鷄屎能下氣消積通利大小便故治鼓脹有殊功此岐伯神方也酉者一宿初來之酒醅也又按范注方云宋青龍中司徒吏顔奮女苦風疾一髀偏痛一人令穿地作坑取鷄屎荆葉然之安脛入坑中熏之有長蟲出遂愈也附方舊十四新三十一鷄矢醴普濟方云治鼔脹旦食不能暮食由脾虚不能制水水反勝土水穀不運氣不宣流故令中滿其脈沉實而滑宜鷄矢醴主之何大英云諸腹脹大皆屬於熱精氣不得滲入膀胱别走于腑濫于皮裏膜外故成脹滿小便短澁鷄矢性寒利小便誠萬金不傳之寶也用臘月乾鷄矢白半斤袋盛以酒醅一斗潰七日温服三盃日三或為末服二錢亦可宣明用鷄矢桃仁大黄各一錢水煎服服正傅用鷄矢炒研沸湯淋汁調木香㯽榔末二錢一方用鷄矢川芎藭等分為末酒糊丸服牽牛酒治一切肚腹四肢腫脹不拘鼔脹氣脹濕脹水脹等有峨嵋一僧用此治人得效其人牽牛來謝故名用乾鷄矢一升炒黄以酒醅三椀煮一椀濾汁飲之少頃腹中氣大轉動利下即自脚下皮㱀消也未盡隔日再作仍以田贏二枚滚酒瀹食後用白粥調理積善堂經驗方小兒腹脹黄瘦用乾鷄矢一兩丁香一錢為末蒸餅丸小豆大每米湯下十丸日三服活㓜全書心腹鼈瘕及宿癥并卒得癥以飯飼白雄鷄取糞同小便于瓦器中熬黄為末每服方寸匕温酒服之日四五服或雜飯飼之以消為度亦佳集驗方食米成瘕好食生來口中出清水以鷄矢同白米各半合炒為末以水一鍾調服良久吐出如米形即瘥昔慎恭道病此饑瘦如勞蜀僧道廣處此方而愈醫説反胃吐食以烏骨鷄一隻與水飲四五日勿與食將五蒲蛇二條竹刀切與食待鷄下糞取隂乾為末水丸粟米大每服一分桃仁湯下五七服即愈證治發明中諸菜毒發狂吐下欲死用鷄矢燒末水服方寸匕葛氏方石淋疼痛鷄矢白日中半乾炒香為末以酸漿飲服方寸匕日二當下石出古今錄騐小兒血淋鷄矢尖白如粉者炒研糊丸菉豆大每服三五丸酒下四五服效産後遺溺不禁鷄矢燒灰酒服方寸匕産寶轉筋入腹其人臂脚直其脈上下微弦用鷄矢為末水六合和方寸匕温服合張仲景方中風寒痺口噤不知人以鷄矢白一升炒黄入酒三升攪澄清飲葛氏白虎風痛詵曰鋪飯於患處以丹雄鷄食之良久取熱糞封之取訖使伏于患人牀下破傷中風腰脊反張牙𦂳口噤四肢强直用鷄矢白一升大豆五升炒黄以酒沃之微烹令豆澄下隨量飲取汁避風經驗方産後中風口噤瘈瘲角弓反張黑豆二升半同鷄矢白一升炒熟入清酒一升半浸取一升入竹瀝服取汁産寶角弓反張四肢不隨煩亂欲死鷄矢白一升淸酒五升搗篩合揚千遍乃飲大人服一升少小五合日二服肘后小兒口噤面赤者屬心白者屬肺用鷄矢白如棗大綿褁以水一合煮分二服一方酒研服之千金方小兒𦂳唇鷄矢白研末傅之有涎易去聖惠小兒驚啼鷄矢白燒灰米飲服二字千金方頭風痺木用臘月烏鷄矢一升炒黄為末絹袋盛漬三升酒中頻頻温服令醉千金方喉痺腫痛鷄矢白含之燕汁聖惠牙齒疼痛鷄矢白燒末綿裹咬痛處立瘥經騐方鼻血不止鷄矢取有白色半截者燒灰吹之唐氏經驗方牙齒不生不拘大人小兒用雄鷄矢雌鷄矢十五顆焙研入麝香少許先以針挑破出血傅之年髙者不過二十日年少者十日必生普濟但用烏鷄雌雄糞入舊麻鞋底燒存性等分入麝香少許三日夜不住擦令熱為佳李察院亮卿常用有效耳聾不聽鷄矢白炒半升烏豆炒一升以無灰酒二升乘熱投入服取汗耳如鼔鼙勿訝外臺面目黄疸鷄矢白小豆􅐕米各二分為末分作三服水下當有黄汁出也肘後方子死腹中雌鷄糞二十一枚水二升五合煮之下米作粥食産寶乳妬乳癰鷄矢白炒研酒服方寸匕三服愈寶産乳頭破裂方同上内癰未成取伏鷄屎水和服即瘥千金頭瘡白秃雄鷄屎末和陳醬苦酒洗之千金消滅瘢痕以猪脂三升飼烏鷄一隻三日後取矢同白芷當歸各一兩煎十沸去滓入鷹矢白半兩調傅外臺耳中惡瘡鷄矢白炒研傅之惠聖瘰癧瘻瘡雄鷄矢燒灰臘猪脂和傅之千金食金中毒已死取鷄矢半升水淋取汁一升飲之日三肘後方縊死未絶鷄矢白如棗大酒半盞和灌口鼻肘后尸脚折裂無冬夏者鷄屎煮湯漬半日取瘥乃止千金射工溪毒白鷄矢白者二枚以餳和塗瘡上肘后骨疽不合骨從孔中出掘地作坑口小裏大深三尺以乾鷄屎二升同艾及荆葉搗碎入坑内燒令烟出以疽口就熏用衣擁之勿令洩氣半日當有蟲出甚效千金方隂毒腹痛鷄糞烏豆地膚子各一把亂髪一團同炒烟起傾入好酒一椀浸之去滓熱服即止生生編小兒心痛白烏骨鷄屎五錢晒研松脂五錢為末葱頭汁和丸梧子大黄丹為衣每醋湯服五丸忌生冷硬物三四日立效嬰童百問雞子即雞卵也黄雌者為上烏雌者次之氣味甘平無毒思邈曰微寒畏醇醋張鼎曰勿多食令人腹中有聲動風氣和葱蒜食之氣短同韭子食成風痛共鱉肉食損人共獺肉食成遁尸同兎肉食成洩痢妊婦以鷄子鯉魚同食令兒生瘡同糯米食令兒生蟲時珍曰小兒患痘疹忌食鷄子及聞煎食之氣令生翳膜主治除熱火灼爛瘡癎痓可作虎魄神物别錄𢎞景曰用欲毈子黄白混雜者煮作之極相似惟不拾芥爾又煮白合銀口含須臾色如金也鎮心安五臟止驚安胎治妊娠天行熱疾狂走男子隂囊濕痒及開喉聲失音醋煮食之治赤白久痢及産後虚痢光粉同炒乾止疳痢及婦人隂瘡和豆淋酒服治賊風麻痺醋浸令壊傅疵䵟作酒止産後血運暖水臟縮小便止耳鳴和蠟沙治耳鳴聾及疳痢日華益氣以濁水煑一枚連水服之主産後痢和蠟煎止小兒痢藏器小兒發熱以白蜜一合和三顆攪服立瘥孟詵形太平御覽云正旦吞烏鷄子一枚可以練岣嶁神書云八月晦日夜半面北吞烏鷄子一枚有事可隠形發明時珍曰卵白象天其氣清其性微寒卵黄象地其氣渾其性温卵則兼黄白而用之其性平精不足者補之以氣故卵白能淸氣治伏熱目赤咽痛諸疾形不足者補之以味故卵黄能補血治下痢胎産諸疾卵則兼理氣血故治上列諸疾也附方舊八新二十三天行不解己汗者用新生鷄子五枚傾盞中入水一鷄子攪渾以水一升煮沸投入納少醬啜之令汗出愈許仁則方天行嘔逆食入即吐鷄子一枚水煮三五沸冷水浸少頃吞之外臺傷寒發狂煩燥熱極吞生鷄子一枚效食鑑三十六黄急救方用鷄子一顆連殻燒􅁅研酢一合和之温服鼻中蟲出為效身體極黄者不過三枚神效外臺袐要白虎風病藏器曰取鷄子揩病處咒願送糞堆頭上不過三次瘥白虎是糞神愛喫鷄子也身面腫滿鷄子黄白相和塗腫處乾再上肘后方年深哮喘鷄子畧敲損浸尿缸中三四日煮食能去風痰集成心氣作痛鷄子一枚打破醋二合調服肘后小兒疳痢肚脹用鷄子一箇開孔入巴豆一粒輕粉一錢用紙五十重裹于飯上蒸三度放冷去殻研入麝香少許糊和丸米粒大食後温湯下二丸至三丸經驗方預解痘毒保和方用鷄卵一枚活地龍一條入卵内飯上蒸熟去地龍與兒食每歲立春日食一枚終身不出痘也李氏用鷄卵一枚童便浸七日水煮食之永不出疽煮李㨗用頭生鷄子三五枚浸厠坑内五七日取出熟與食數日再食一枚永不出痘徐都司得于浙人之方痘瘡出瘢鷄子一箇酒醅浸七日白殭蠶二七枚和勻揩赤塗之甚效聖惠雀卵面皰鷄卵醋浸壞取出傅之聖惠妊娠時疾冷胎不動以鷄子七枚納井中令冷取出打破吞之子母祕錄病欲去胎鷄子一枚入鹽三指撮服張文仲方胎動下血藏器曰鷄子二枚打破以白粉和稀食之子死腹中用三家鷄卵各一枚三家鹽各一撮三家水各一升同煮令婦東向飲之千金方産後血多不止烏鷄子三枚醋半升酒二升和攪煮取一升分四服拾遺産後心痛鷄子煮酒食即安備急方産後口乾舌縮用鷄子一枚打破水一盞攪服經騐方婦人白帶用酒及艾葉煮鷄卵日日食之袖珍方頭風白屑新下烏鷄子三枚沸湯五升攪作三度沭之甚良集驗腋下胡臭鷄子兩枚煮熟去殻熱夾待冷棄之三乂路上勿回顧如此三次效肘后方乳石發渇水浸鷄子取清生服甚良總錄解野葛毒已死者抉開口後灌鷄子三枚須臾吐出野葛乃甦肘后方胡蔓野毒即斷腸草一葉入口百竅流血惟急取鳯凰胎即鷄卵抱未成雛者已成者不用研爛和麻血灌之吐出毒物乃生少遲即死嶺南衛生方癰疽發背初作及經十日以上腫赤焮熱日夜疼痛百藥不效者用毈鷄子一枚新狗屎如鷄子大攪勻微火熬令稀稠得所捻作餅子于腫頭上貼之以帛包抹時時看視覺餅熱即易勿令轉動及歇氣經一宿定如日多者三日貼之一日一易至瘥乃止此方穢惡不可施之貴人一切諸方皆不能及但可備擇而已千金方蛛蠍蛇傷鷄子一箇輕敲小孔合之立瘥兵部手集蠼螋尿瘡同上法身體發熱不拘大人小兒用鷄卵三枚白蜜一合和服立痰普濟方卵白氣味甘微寒無毒主治目熱赤痛除心下伏熱止煩滿欬逆小兒下泄婦人産難胞衣不出竝生呑之醋浸一宿療黄疸破大煩熱别錄産後血閉不下取白一枚入醋一半攪服藏器和赤小豆末塗一切熱毒丹腫顋痛神效冬月以新生者酒漬之宻封七日取出每夜塗面去䵟􅍍皶皰令人悦色時珍發明宗奭曰産後血運身痙直口目向上牽急不知人取鷄子一枚去殻分清以荆芥末二錢調服即安甚敏捷烏鷄子尤善附方舊四新六時行發黄醋酒浸鷄子一宿吞其白數枚肘后方下痢赤白生鷄子一箇取白攤連紙上日乾摺作四重包肥烏梅十箇安熨斗中以白炭燒存性取出碗覆冷定研末入水銀粉少許大人分二服小兒三服空心井華水調下如覺微利不須再服類澄蚘蟲攻心口吐清水以鷄子一枚去黄納好漆入鷄子殻中和合仰頭吞之蟲即出也古今錄騐五種遁尸其狀腹脹氣急冲心或磥磈踊起或牽腰脊以鷄卵白七枚頓吞之良千金咽塞鼻瘡及乾嘔頭痛食不下用鷄子一枚開一竅去黄留白着米酢煻火頓沸取下更頓如此三次乘熱飲之不過一二度即愈普濟方面生皰瘡鷄子以三歲苦酒浸之三宿待軟取白塗之肘后湯火燒灼鷄子清和酒調洗勤洗即易生肌忌發物或主傅之亦可經驗祕方頭髮垢䐈鷄子白塗之少頃洗去光澤不燥頻湖面黑令白鷄子三枚酒浸宻封四七日每夜以白傅面如雪白也普濟塗面駐顔鷄子一枚開孔去黄留白入金華胭脂及硇砂少許紙封與鷄抱之俟别卵抱出以塗面洗之不落半年尚紅也普濟卵黄氣味甘温無毒主治醋煑治産後虚痢小兒發熱煎食除煩熱鍊過治嘔逆和常山末為丸竹葉湯服治久瘧藥性炒取油和粉傅頭瘡日華卒乾嘔者生吞數枚良小便不通者亦生吞之數次效補隂血解熱毒治下痢甚驗時珍發明時珍曰鷄子黄氣味俱厚隂中之隂故能補形昔人謂其與阿膠同功正此意也其治嘔逆諸瘡則取其除熱引蟲而已頌曰鷄子入藥最多而髪煎方特竒劉禹錫傳信方云亂髪鷄子膏治孩子熱瘡用鷄子五枚煮熟去白取黄亂髪如鷄子大相和於鐵銚中炭火熬之初甚乾少頃即髪焦乃有液出旋取置椀中以液盡為度取塗瘡上即以苦參末粉之頃在武陵生子蓐内便有熱瘡塗諸藥無益而日益劇蔓延半身晝夜號啼不乳不睡因閲本草髪髪條云合鷄子黄煎之消為水療小兒驚熱下痢註云俗中嫗母為小兒作鷄子煎用髪雜熬之良久得汁與小兒服去痰熱主有病又鷄子條云療火瘡因是用之果如神效也附方舊三新十一赤白下痢鷄卵一枚取黄去白入胡粉滿殻燒存性以酒服一錢匕氏葛方妊娠下痢絞痛用烏鷄子一枚開孔去白留黄入黄丹一錢在内厚紙裹定泥固煨乾為末每服三錢米飲下一服愈者是男兩服愈者是女三因方子死腹中鷄子黄一枚薑汁一合和服當下小腸疝氣鷄子黄攪温水服之三服效小兒癎疾鷄子黄和乳汁攪服不過三兩枚自定普濟小兒頭瘡煮熱鷄子黄炒令油出以麻油膩粉搽之事林廣記鼠瘻已潰鷄卵一枚米下蒸半日取黄熬令黑先拭瘡令乾以藥納孔中三度即愈金千方脚上臭瘡熟鷄子黄一箇黄䗶一錢煎油塗之湯火傷瘡熱鷄子一個取黄炒取油入膩粉十文攪勻掃上三五日永除瘢痕集騐方杖瘡已破鷄子黄熬油搽之甚效驗唐瑶經方天泡水瘡方同上消滅瘢痕鷄子五七枚煮熟取黄炒黑拭塗日三久久自滅聖惠方妊娠胎漏血下不止血盡則子死用鷄子黄十四枚以好酒二升煮如􅄳服之未瘥再作以瘥為度普濟方耳疳出汁鷄子黄炒油塗之甚妙談埜翁方抱出卵殻時珍曰俗名混沌池鳯凰蜕用抱出者取其蜕脱之義也李石續博物志云踏鷄子殻令人生白癜風主治研末磨障翳日華傷寒勞復熬令黄黑為末熱湯和一合服取汗出即愈蘓頌方出深師燒灰油調塗癬及小兒頭身諸瘡酒服二錢治反胃時珍附方舊二新七小便不通鷄子殻海蛤滑石等分為末每服半錢米飲下日三聖惠方小兒煩滿欲死鷄子殻燒末酒服方寸匕子母祕錄癍痘入目鷄子殻燒研入片腦少許㸃之鴻飛集頭瘡白秃鷄子殻七箇炒研油和傅之秘錄頭上軟癤用抱出鷄卵殻燒存性研末入輕粉少許清油調傅危氏方耳疳出濃用抱出鷄卵殻炒黄為末油調灌之疼即止杏林摘要玉莖下疳鷄卵殻炒研油調傅之同上外腎癰瘡抱出鷄卵殻黄連輕粉等亦為細末用鍊過香油調塗醫林正宗痘瘡惡證癍痘倒䧟毒氣壅遏於裏則為便血昏睡不醒其證甚惡用抱出鷄子殻去膜新瓦焙研每服半錢熱湯調下嬰兒以酒調抹唇舌上并塗風池胸背神效卵殻中白皮主治久欬氣結得麻黄紫苑服立效别錄發明時珍曰按仙傳外科云有人偶含刃在口割舌已垂未斷一人用鷄子白皮袋之摻止血藥於舌根血止以臘化蜜調冲和膏敷鷄子皮上三日接住乃去皮只用蜜蠟勤敷七日全安若無連效以金鎗藥參治之此用鷄子白皮無他但取其柔軟而薄䕶舌而透藥也附方新二欬嗽日久鷄子白皮炒十四枚麻黄三兩焙為末每服方寸匕飲下日二必效方風眼腫痛鷄子白皮枸杞白皮等分為末吹鼻中一日三次聖濟總錄雞白蠧肥脂本經𢎞景曰不知是何物恐别一種耳藏器曰今鷄亦有白臺如卵而硬有白無黄云是牡鷄所生名父公臺臺字似槖字疑傳誤也機曰此本經文列于黑雌鷄條下似指雌鷄之肥脂如蠧蟲之肥白因其似而名之也時珍曰蠧音妬而藏器以為槖何耶今牡鷄生子亦時或有之然不當有肥脂字當以機説為近否則必雌鷄之生腸也本經有其名不具其功葢脱簡之文窠中草主治頭療白秃和白頭翁草燒灰猪脂調傅日華天絲入眼燒灰淋清汁洗之良時珍祕出不自方附方舊一新一小兒夜啼鷄窠草安席下勿令母知日華本草産後遺尿鷄窠草燒末酒服一錢匕聖惠方燖鷄湯主治消渇飲水無度用燖雄鷄水濾澄服之不過二鷄之水愈神效楊氏經驗方附方新一鷄眼作痛剥去皮以燖鷄湯洗之簡便方雉别錄中品釋名野雞宗奭曰雉飛若矢一往而墮故字從矢今人取其尾置舟車上欲其快速也漢吕太后名雉髙祖改雉為野鷄其實鷄類也時珍曰黄氏韻㑹云雉理也雉有文理也故尚書謂之華蟲曲禮謂之疏趾雉類甚多亦各以形色為辨耳禽經云雉介鳥也素質五采備曰翬雉青質五采備日鷂雉朱黄曰鷩雉白曰鵫雉音罩𤣥曰海雉爾雅云鷂雉青質五采鴇雉黄色自呼翟雉山雉也長尾鷮雉長尾走且鳴秋秩海雉也梵書謂雉曰迦頻闇羅集解時珍曰雉南北皆有之形大如鷄而斑色繡翼雄者文采而尾長雌者文暗而尾短其性好鬬其名曰鷕鷕音杳其交不再其卵褐色將卵時雌避其雄而潜伏之否則雄食其卵也月令仲冬雉始雊謂陽動則雉鳴而勾其頸也孟冬雉入大水為蜃蜃大蛤也陸佃埤雅云蛇交雉則生蜃蜃蛟類也類書云蛇與雉交而生子曰蟂蟂水蟲也陸禋續水經云蛇雉遺卵於地千年而為蛟龍之屬似蛇四足能害人魯至剛俊靈機要云正月蛇與雉交生卵遇雷入土數丈為蛇形經二三百年成蛟飛騰若卵不入土仍為雉耳又任昉述異記云江淮中有獸名能音耐乃蛇精所化也冬則為雉春復為蛇晉時武庫有雉張華曰必蛇化也視之果得蛇蜕此皆異類同情造化之變易不可臆測者也肉氣味酸微寒無毒恭曰温日華曰平微毒秋冬益春夏毒有痢人不可食頌曰周禮庖人供六禽雉是其一亦食品之貴然有小毒不可常食損多益少詵曰久食令人瘦九月至十一月稍有補他月則發五痔諸瘡疥不與胡桃同食發頭風眩運及心痛與菌輩木耳同食發五痔立下血同蕎麥食生肥蟲卵同葱食生寸白蟲自死􅆶甲不申者殺人正誤思邈曰黄帝書云丙午日勿食鷄雉肉丈夫燒死目盲女人血死妄見野鷄肉同家鷄子食成遁尸尸鬼纒身𢎞景曰雉非辰屬正是離禽丙午不可食明王於火也時珍曰雉屬離火鷄屬巽木故鷄煮則冠變雉煮則冠紅明其屬火也春夏不可食者為其食蟲蟻及與蛇交變化有毒也能發痔及瘡疥令人瘦病者為其能生蟲與鷄肉同也有鄙人者假黄帝為書謂丙午日不可食及成遁尸之説乃不經謬談而陶氏和之孫氏取之皆誤矣今正其誤主治補中益氣力止洩痢除蟻瘻别錄發明時珍曰雉肉諸家言其發痔下痢人不可食而别錄用治痢瘻何邪葢雉在禽上應胃上故能補中而又食蟲蟻故能治蟻瘻取其制伏耳若久食及食非其時則生蟲有毒故不宜也附方舊三新一脾虚下痢日夜不止野鷄一隻如食法入橘皮葱椒五味和作餛飩煮空心食之鏡食醫心産後下痢用野鷄一隻作餛飩食之同上消渇飲水小便數用野鷄一隻五味煮取三升已來汁飲之肉亦可食甚效同上心腹脹滿野鷄一隻不拘雄雌茴香炒馬芹子炒川椒炒陳皮生薑等分用醋以一夜蒸餅和雉肉作饀料外以麫皮包作餛飩煮熟食仍早服嘉禾散辰服此午服導氣抧殻丸朱氏集騐方腦主治塗凍瘡時珍嘴主治蟻瘻孫思邈尾主治燒灰和麻油傅天火丹毒時珍屎主治久瘧時珍附方新一久瘧不止雄野鷄屎熊膽五靈脂恒山等分為末醋糊丸黑豆大正發時冷水下一丸聖惠鸐雉音狄食療釋名鸐鷄禽經山鷄同上山雉時珍曰翟美羽貌雉居原野鸐居山林故得山名大者為鷮集解頌曰伊洛江淮間一種雉小而尾長者為山鷄人多畜之樊中即爾雅所謂鸐山鷄也時珍曰山鷄有四種名同物異似雉而尾長三四尺者鸐雉也似鸐而尾長五六尺能走且鳴者鷮雉也俗通呼為鸐矣其二則鷩雉錦鷄也鷮鸐皆勇健自愛其尾不入叢林雨雪則岩伏木栖不敢下食往往餓死故師曠云雪封枯原文禽多死南方𨽻人多挿其尾於冠其肉皆美于雉傳云四足之美有麃兩足之美有鷮肉氣味甘平有小毒詵曰發五痔久食瘦人和蕎麥食生肥蟲同䜴食害人卵同葱食生寸白蟲餘並同雉主治五臟氣喘不得息者作羮臛食孟詵炙食補中益氣時珍鷩雉敝鼈二音拾遺釋名山雞禽經錦雞同上金雞綱目采雞周書鵕䴊音峻儀時珍曰鷩性憋急耿介故名鵕䴊儀容俊秀也周有鷩冕漢有鵕䴊冠皆取其文明俊秀之義鷩與鸛同名山鷄鸐大而鷩小鷩與鷊同名錦鷄鷊文在綬而鷩文在身以此為異大抵皆雉屬也按禽經云首有采毛曰山鷄腹有采色曰錦鷄項有采裳曰避株是山鷄錦鷄又稍有分别而俗通呼為一矣葢是一類不甚相遠也集解藏器曰鷩似雉五色山海經云小華之山多赤鷩養之禳火災是也時珍曰山鷄出南越諸山中湖南湖北亦有之狀如小鷄其冠亦小背有黄赤文綠項紅腹紅嘴利距善鬬以家鷄鬬之即可獲此乃爾雅所謂鷩山鷄者也逸周書謂之采鷄錦鷄則小於鷩而背文揚赤膺前五色炫燿如孔雀羽此乃爾雅所謂鶾大鷄者也逸周書謂之大鶾音汗二種大袛同類而錦鷄文尤燦爛如錦或云錦鷄乃其雄者亦通劉敬叔異苑云山鷄愛其羽毛照水即舞目眩多死照鏡亦然與鸐鷄愛尾餓死皆以文累其身者也附錄吐綬雞時珍曰出巴峽及閩廣山中人多畜玩大如家鷄小者如鴝鵒頭頰似雉羽色多黑雜以黄白圓㸃如真珠斑項有嗉囊内藏肉綬常時不見每春夏晴明則向日擺之頂上先出兩翠角二寸許乃徐舒其頷下之綬長濶近尺紅碧相間采色煥爛踰時悉歛不見或剖而視之一旡所覩此鳥生亦反哺行則避草木故禽經謂之避株食物本草謂之吐錦鷄古今注謂之錦囊恭氏詩話謂之真珠鷄倦游錄謂之孝鳥詩經謂之鷊音厄卭有㫖鷊是矣肉氣味甘温微毒主治食之令人聰慧汪穎養之禳火灾藏器鶡雞曷渇二音拾遺釋名時珍曰其羽色黑黄而褐故曰鶡青黑色者名曰䲸音介性耿介也青鳯亦名鶡取象於此也集解藏器曰鶡鷄出上黨魏武帝賦云鶡鷄猛氣其鬬期於必死今人以鶡為冠象此也時珍曰鶡狀類雉而大黄黑色首有毛角如冠性愛其黨有被侵者直往赴鬬雖死猶不置故古者虎賁戴鶡冠禽經云鶡糓鳥也􅂖不知死是矣性復粗暴每有所攫應手摧碎上黨即今潞州肉氣味甘平無毒主治炙食令人勇徤藏器炙食令人肥潤汪穎白鷴圖經校正原附雉條今分出釋名白鶾音寒閑客時珍曰按張華云行止閑暇故曰鷴李昉命為閑客薛氏以為雉類汪氏以為白雉按爾雅白雉名鶾南人呼閑字如寒則鷴即鶾音之轉也當作白鶾如錦鷄謂之文鶾也鶾者羽美之貎又西京雜記云南粤王獻白鷴黑鷴各一葢雉亦有黑色者名鸕雉彼通呼為鶾矣集解頌曰白鷴出江南雉類也白色而背有細黑文可畜彼人亦食之穎曰即白雉也時珍曰鷴似山鷄而色白有黑文如連􅀈尾長三四尺體備冠距紅頰赤嘴丹𤓰其性耿介李太白言其卵可以鷄伏亦有黑鷴肉氣味甘平無毒主治補中解毒汪穎鷓鴣唐本草釋名越雉時珍曰按禽經云隨陽越雉也飛必南翥晉安曰懷南江左曰逐影張華注云鷓鴣其名自呼飛必南向雖東西回翔開翅之始必先南翥其志懷南不徂北也集解孔志約曰鷓鴣生江南形似母鷄鳴云鈎輈格磔者是有鳥相似不作此鳴者則非矣頌曰今江西閩廣蜀夔州郡皆有之形似母鷄頭如鶉臆前有白圓㸃如真珠背毛有紫赤浪文時珍曰鷓鴣性畏霜露早晚稀出夜栖以木葉蔽身多對啼今俗謂之其鳴曰行不得也哥哥其性好潔獵人因以􅤽竿粘或用煤誘取南人專以炙食充庖云肉白面脆味勝鷄雉肉氣味甘温無毒日華曰微毒詵曰不可與竹笋同食令人小腹脹自死者不可食或言此鳥天地之神每月取一隻饗至尊所以自死者不可食主治嶺南野葛菌子毒生金毒及温瘧久病欲死者合毛熬酒漬服之或生擣汁服最良唐本酒服主蠱氣欲死日華能利五臟益心力聰明孟詵發明時珍曰按南唐書云丞相馮延已苦腦痛不已太醫吳廷詔曰公多食山鷄鷓鴣其毒發也投以甘草湯而愈此物多食鳥頭半夏苗故以此解其毒爾又類説云楊𤣥之通判廣州歸楚州因多食鷓鴣遂病咽喉間生癰潰而膿血不止寢食俱廢醫者束手適楊吉老赴郡邀診之曰但先啖生薑一斤乃可投藥初食覺甘香至半斤覺稍寛盡一斤覺辛辣粥食入口了旡滯礙此鳥好啖半夏毒發耳故以薑制之也觀此二説則鷓鴣多食亦有微毒矣而其功用又能解毒解蠱功過不相掩也凡鳥獸自死者皆有毒不可食為其受厲氣也何獨鷓鴣即神取饗帝乎鄙哉其言也脂膏主治塗手皸􅏿令不龜裂蘓頌竹雞拾遺釋名山菌子藏器雞頭鶻蘓東坡集泥滑滑穎曰山菌子即竹雞也時珍曰菌子言味美如菌也蜀人呼為鷄頭鶻南人呼為泥滑滑因其聲也集解藏器曰山菌子生江東山林間狀如小雞無尾時珍曰竹雞生江南川廣處處有之多居竹林形比鷓鴣差小褐色多斑赤文其性好啼見其儔必鬬捕者以媒誘其鬬因而網之諺云家有竹雞啼白蟻化為泥葢好食蟻也亦辟壁虱附錄杉雞時珍曰按臨海異物志云閩越有杉雞常居杉樹下頭上有長黄毛冠頰正青色如垂縷亦可食如竹雞肉氣味甘平無毒時珍曰按磨小説云崔魏公暴亡太醫梁新診之曰中食毒也僕曰好食竹雞新曰竹雞多食半夏苗也命搗薑汁抉齒灌之遂甦則吳廷紹楊吉老之治鷓毒葢祖乎此主治野雞病殺蟲煮炙食之藏器英雞拾遺集解藏器曰英雞出澤州有石英處常食碎石英狀如雞而雉尾體熱無毛腹下毛赤飛翔不遠腸中常有石英人食之取英之功也今人以石英末飼雞取卵食終不及此肉氣味甘温無毒主治益陽道補虚損令人肥健悦澤能食不患冷常有實氣而不發也藏器秧雞食物集解時珍曰秧雞大如小雞白頰長嘴短尾背有白斑多居田澤畔夏至後夜鳴逹旦秋後即止一種䳾音鄧雞亦秧雞之類也大如雞而長脚紅冠雄者大而色褐雌者稍小而色斑秋月即無其聲甚大人益食之肉氣味甘温無毒主治蟻瘻汪穎鶉嘉祐釋名時珍曰鶉性醇竄伏淺草無常居而有常匹隨地而安莊子所謂聖人鶉居是矣其行遇小草即旋避之亦可謂醇矣其子曰􅀈宗奭曰其卵初生謂之羅鶉至秋初謂之早秋中秋已後謂之白唐一物四名也集解禹錫曰鶉蝦蟇所化也楊億談苑云正道二年夏秋汴人鬻鶉者車載積市皆蛙所化猶冇未全變者列子所謂蛙聲為鶉也宗奭曰鶉有雌雄常於田野屢得其卵何得言化也時珍曰鶉大如雞雛頭細而無尾毛有斑㸃甚肥雄者足髙雌者足卑其性畏寒其在田野夜則羣飛晝則草伏人能以聲呼取之畜令鬬摶萬畢術云蝦蟇得𤓰化為鶉交州記云南海有黄魚九月變為鶉以鹽炙食甚肥美葢鶉始化成終以卵生故四時常有之鴽則始由鼠化終復為鼠故夏有冬無肉氣味甘平無毒禹錫曰四月以前未堪食不可合猪肝食令人生黑子合菌子食令人發痔主治補五臟益中續氣實筋骨耐寒暑消結熱和小豆生薑煑食止洩痢酥􅋩食令人下焦肥嘉祐小兒患疳及下痢五色旦旦食之有效冦宗奭發明時珍曰按董炳集驗方云魏秀才妻病腹大如鼓四肢骨立不能貼席惟衣被懸卧榖食不下者數日矣忽思鶉食如法進之遂運劇少頃雨汗莫能言但有更衣狀扶而圊小便突出白液凝如鵞脂如此數次下盡遂起此葢中焦濕熱積久所致也詳本草鶉解熱結療小兒疳亦理固然也董氏所説如此時珍謹按鶉乃蛙化氣性相同蛙與蝦蟇皆解熱治疳利水消腫則鶉之消鼔脹葢亦同功云鷃拾遺釋名鵪一作䳺鸋音寧鴽音如鳸時珍曰鷃不木處可謂安寧自如矣莊子所謂騰躍不過數仞下翔蓬蒿之間者也張華註禽經謂之籬鷃即此鵪則鷃音之轉也青州謂之鴾母亦曰鷃雀又鳸有九種此其一也集解藏器曰鷃是小鳥鶉類也一名鴽鄭𤣥註禮記雉兎鶉鷃以鷃為鴽人多食之時珍曰鷃候鳥也常晨鳴如鷄趨民收麥行者以為候春秋運斗樞云立春雨水鶉鵪鳴是矣鵪與鶉兩物也形狀相似俱黑色但無斑者為鵪也今人總以鵪鶉名之按夏小正云三月田䑕化為鴽八月鴽化為田䑕註云鵪也爾雅云鶉子鴿鴽子鸋註云鵪鶉屬也鴽鵪也禮記云鶉羮鴽釀之以蓼註云鴽小不可為羮以酒蓼釀之蒸煮食也據數説則鶉與鵪為兩物明矣因其俱在田野而形狀彷彿故不知别之則夫鶉也始由蝦蟇海魚所化終即自卵生故有斑而四時常有焉鷃也始由䑕化終復為䑕故無斑而夏有冬無焉本原既殊性療當别何可混邪肉氣味甘平無毒主治諸瘡隂􅉶煮食去熱時珍鷸音述拾遺集解藏器曰鷸如鶉色蒼觜長在泥塗間作鷸鷸聲村民云田鷄所化亦鵪鶉類也蘓秦所謂鷸蚌相持者即此時珍曰説文云鷸知天將兩則鳴故知天文者冠鷸今田野間有小鳥未雨則啼者是矣與翡翠同名而物異肉氣味甘温無毒主治補虚甚暖人藏器鴿宋嘉祐釋名鵓鴿食療飛奴時珍曰鴿性淫而易合故名鵓者其聲也張九齡以鴿傳書目為飛奴梵書名迦布徳迦集解宗奭曰鴿之毛色於禽中品第最多惟白鴿入藥凡鳥皆雄乘雌此獨雌乗雄故其性最淫時珍曰處處人家畜之亦有野鴿名品雖多大要毛羽不過青白皂綠鵲斑數色眼目有大小黄赤綠色而已亦與鳩為匹偶白鴿肉氣味鹹平無毒詵曰暖主治解主藥毒及人馬久患疥食之立愈嘉祐調精益氣治惡瘡疥癬風瘡白癜癧瘍風炒熟酒服雖益人食多恐减藥力孟詵附方舊一新一消渇飲水不知足用白花鴿一隻切作小片以上蘓􅋩含咽心鏡預解痘毒每至除夜以白鴿煑炙飼兒仍以毛􅋩湯浴之則出痘希少血主治解諸藥百蠱毒時珍廣出事林記卵主治解瘡毒痘毒時珍附方新一預解痘毒小兒食之永不出痘或出亦希用白鴿卵一對入竹筒封置厠中半月取出以卵白和辰砂三錢丸菉豆大每服三十丸三豆飲下毒從大小便出也灊江方屎名左盤龍時珍曰野鴿者尤良其屎皆左盤故宣明方謂之左盤龍也氣味辛温微毒主治人馬疥瘡炒研傅之驢馬和草飼之嘉祐消腫及腹中痞塊汪穎消瘰癧諸瘡療破傷風及隂毒垂死者殺蟲時珍附方舊四新六帶下排膿宗奭野鴿糞一兩炒微焦白术麝香各一分赤芍藥青木香各半兩延胡索炒赤一兩柴胡三分為末温無灰酒空心調服一錢候膿盡即止後服補子臟藥破傷中風病傳入裏用左蟠龍即野鴿糞江鰾白僵蠶各炒半錢雄黄一錢為末蒸餅丸梧子大每服十五丸温酒下取效保命集隂症腹痛面青甚者鴿子糞一大抄研末極熱涸一鍾和勻澄清頓服即愈劉氏蛕蟲腹痛白鴿屎燒研飲和服之外臺冷氣心痛鴿屎燒存性酒服一錢即止項上瘰癧左盤龍炒研末飯和丸梧桐子大每服三五十丸米飲下張子和方頭痒生瘡白鴿屎五合醋煮三沸杵傅之日三上聖惠頭瘡白秃鴿屎研末傅之先以醋泔洗净亦可燒研摻之同上反花瘡毒初生惡肉如米粒破之血出肉隨生反出于外用鵓鴿屎三兩炒黄為末温漿水洗後傅之聖惠方鵞掌風鴿屎白雄鷄屎炒研􅋩水日洗突厥雀拾遺釋名鵽鳩音奪冦雉藏器曰雀從北來當有賊下邊人候之故名時珍曰案唐書云髙宗時突厥犯塞有鳴鵽羣飛入塞邊人驚曰此鳥一名突厥雀南飛則突厥必入冦已而果然案此即爾雅鵽鳩冦雉也然則奪冦之義亦由此矣集解藏器曰突厥雀生塞北狀如雀而身赤時珍曰案郭璞云鵽鳩生北方沙漠池大如鴿形似雌雉䑕脚旡後趾岐尾為鳥憨急羣飛張華云鵽生關西飛則雌前雄後隨其行止莊周云青鵽愛其子而忘其母肉氣味甘熱無毒主治補虚暖中藏器雀别錄中品釋名瓦雀賔雀時珍曰雀短尾小鳥也故字從小從佳佳音錐短尾也栖宿簷瓦之間馴近階除之際如賔客然故曰瓦雀賔雀又謂之嘉賔也俗呼老而斑者為麻雀小而黄口者為黄雀集解時珍曰雀處處有之羽毛斑褐頷觜皆黑頭如顆蒜目如擘椒尾長二寸許𤓰距黄白色躍而不步其視驚瞿其目夜盲其卵有斑其性最淫小者名黄雀八九月羣飛田間體絶肥背有脂如披綿性味皆同可以炙食作鮓甚美案逸周書云季秋雀入大水為蛤雀不入水國多滛泆又臨海異物志云南海有黄雀魚常以六月化為黄雀十月入海為魚則所謂雀化蛤者葢此類若家雀則未常變化也又有白雀緯書以為瑞應所感肉氣味甘温無毒𢎞景曰雀肉不可合李食不可諸肝食妊婦食雀肉飲酒令子多滛食雀肉豆醤令子靣䵟凡服白术人忌之主治冬三月食之起陽道令人有子藏器壯陽益氣暖腰膝縮小便治血崩帶下日華益精髓縮五臟不足氣宜常食之不可停輟孟詵發明宗奭曰正月以前十月以後宜食之取其隂陽静定未泄也故卵亦取第一畨者頌曰今人取雀肉和蛇牀子熬膏和藥丸服補下有效謂之驛馬丸此法起于唐世云明皇服之有驗時珍曰聖濟總錄治虚寒雀附丸用肥雀肉三四十枚同附子熬膏丸藥亦祖此意也附方新八補益老人治老人臟腑虚損羸瘦陽氣之弱雀兒五隻如常治粟米一合葱白三莖先炒雀熟入酒一合煑少時入水二盞下葱米作粥食食治方心氣勞傷朱雀湯治心氣勞傷因變諸疾用雄雀一隻取肉炙赤小豆一合人參赤茯苓大棗肉紫石英小麥各一兩紫苑遠志肉丹參各半兩甘草炙二錢半細剉拌勻每服三錢用水一盞煎六分去滓食遠温服竒效方腎冷偏墜疝氣用生雀三枚燎毛去腸勿洗以舶上茴香三錢胡椒一錢縮砂桂肉各二錢入肚内濕紙褁煨熟空心服之酒下良直指方小腸疝氣用帶毛雀兒一枚去腸入金絲礬末五錢縫合以桑柴火煨成炭為末空心無灰酒服年深者二服愈瑞竹堂方赤白痢下臘月取雀兒去腸肚皮毛以巴豆仁一枚入肚内缾固濟煆存性研末以好酒煑黄蠟百沸取蠟和丸梧子大每服一二十丸紅痢甘草湯下白痢乾薑湯下普濟方内外目障治目昏生瞖遠視似有黑花及内障不見物用雀兒十箇去翅足觜連腸胃骨肉研爛磁石煆醋淬七次水飛神麴炒青鹽肉蓯蓉酒浸炙各一兩兎絲子酒浸三日晒三兩為末以酒二升少入煉蜜同雀鹽研膏和丸梧子大每温酒下二十丸日二服聖惠方雀卵氣味酸温無毒五月取之主治下氣男子隂痿不起强之令熱多精有子别錄和天雄兎絲子末為丸空心酒下五丸治男子隂痿不起女子帶下便溺不利除疝瘕孟詵發明𢎞景曰雀利隂陽故卵亦然術云雀卵和天雄服之令莖不衰頌曰按素問云胸脇肢滿者妨於食病至則先聞臊臭出清液先唾血四肢清目眩時時前後血病名血枯得之年少時有所大脱血若醉入房中氣竭肝傷故月事衰少不來治之以烏鰂魚骨藘茹二物并合之丸以雀卵大如小豆以五丸為後飯飲鰂骨汁以利腸中及腸肝也飲後藥先為後飯本草三藥益不治血枯而經法用之是攻其所生所起耳時珍曰今人知雀卵能益男子陽虚不知能治女子血枯葢雀卵益精血耳肝主治腎虚陽弱聖惠四雄丸用之頭血主治雀盲别錄𢎞景曰雀盲乃人患黄昏時無所見如雀目夜盲也日二取血㸃之腦氣味平主治綿裹塞耳治聾又塗凍瘡孟詵時珍曰按張子和方臘月雀腦燒灰油調塗之亦可喙及脚脛骨主治小兒乳癖每用一具煮汁服或燒灰米飲調服時珍雄雀屎一名白丁香俗名青丹拾遺雀蘓炮炙論修治日華曰凡鳥左翼掩右者是雄其屎頭尖挺直斆曰凡使勿用雀兒糞雀兒口黄未經滛者也其雀蘓底坐尖在上是雄兩頭圓者是雌隂人使雄陽人使雌臘月采得去兩畔附着者鉢中研細以甘草水浸一夜去水焙乾用時珍曰别錄止用雄雀屎雌雄分用則出自雷氏也氣味苦温微毒主治療目痛决癰疽女子帶下溺不利除疝瘕别錄療齲齒陶𢎞景和首生男子乳㸃目中弩肉赤脈貫童子者即消神效和􅁡丸服治癥瘕久痼諸病和少乾薑服之大肥悦人蘓恭癰癤不潰者㸃塗即潰急黄欲死者湯化服之立甦腹中痃癖諸塊伏梁者和乾薑桂心艾葉為丸服之能令消爛藏器和天雄乾薑丸服能强隂孟詵消積除脹通咽塞口噤女人乳腫瘡瘍中風風蟲牙痛發明時珍曰雀食諸穀易致消化故所治疝瘕積脹痃癖及目瞖弩肉癰疽瘡癤咽噤齒齲諸症皆取其能消爛之義也附方舊六新八霍亂不通脹悶欲死因傷飽取凉者用雄雀糞二十一粒研末温酒服未效再服總錄目中瞖膜治目熱生赤白膜以雄雀屎和人乳㸃上自爛肘后方風蟲牙痛雄雀屎綿褁塞孔中日二易之效外臺咽喉噤塞雄雀屎末温水灌半錢外臺小兒口噤中風用雀屎水丸麻子大飲下二丸即愈千金方小兒不乳用雀屎四枚抹之與吮總微小兒痘黶白丁香末入麝少許米飲服一錢保㓜大全婦人吹乳白丁香半兩為末以温酒服一錢聖惠破傷風瘡作白痂無血者殺人最急以黄雀糞直者研末熱酒服半錢普濟破决癰癤諸癰已成膿懼鍼者取雀屎塗瘡頭即易决梅師方瘭瘡作痛用雀屎燕窠土研傅之直指浸滛瘡癬洗凈以雀屎醬瓣和研日塗之翼千金喉痺乳蛾白丁香二十個以沙糖和作三丸毎以一丸綿褁含嚥即時遂愈甚者不過一丸極有竒效普濟方面鼻酒皶白丁香十二粒蜜半兩早夜㸃久久自去聖惠方蒿雀拾遺集解藏器曰蒿雀似雀青黑色在蒿間塞外彌多食之美於諸雀肉氣味甘温無毒主治食之益陽道補精髓藏器腦主治塗凍瘡手足不皸藏器巧婦鳥拾遺釋名鷦鷯詩疏桃蟲詩經蒙鳩荀子女匠方言黄脰草俗曰時珍按爾雅云桃蟲鷦其雌曰鳩揚雄方言云自關而東謂之巧雀或謂之女匠自關而西謂之襪雀或謂之巧女燕人謂之巧婦江東謂之桃雀亦曰有呼鳩性拙鷦性巧故得諸名集解藏器曰巧婦小於雀在林藪間為窠窠如小袋時珍曰鷦鷯處處有之生蒿木之間居藩籬之上狀似黄雀而小灰色有斑聲如吹嘘喙如利錐取茅葦毛毳為窠大如雞卵而繋之以麻髪至為精宻懸於樹上或一房二房故曰巢林不過一枝毎食不過數粒小人畜馴教其作戯也又一種鷦鷯爾雅謂之剖葦似雀而青灰斑色長尾好食葦蠧亦顦類也肉氣味甘温無毒主治炙食甚美令人聰明汪頴窠主治燒烟熏手令婦人巧蠶藏器治膈氣噎疾以一枚燒灰酒服或一服三錢時珍簡出衛生易方燕别錄中品釋名乙鳥説文𤣥鳥禮記鷙鳥古今注鷾鴯莊子游波泡炙論天女易占時珍曰燕字篆文象形乙者其鳴自呼也𤣥其色也鷹鷂食之則死能制海東青鶻故有鷙鳥之稱能興波祈雨故有游波之號雷斆云海蝎江枯投游波而立汛是矣京房云人見白燕主生貴女故燕名天女集解别錄曰燕生髙山平谷𢎞景曰燕有兩種紫胸輕小者是越燕不入藥用有斑黒而聲大者是胡燕可入藥用胡燕作窠長能容二疋絹者令人家富也若窠戸北向而尾屈色白者是數百歲燕仙經謂之肉芝食之延年時珍曰燕大如雀而身長籋口豐頷布翅岐尾背飛向宿營巢避戊巳日春社來秋社去其來也衘泥巢於屋宇之下其去也伏氣蟄於窟穴之中或謂其渡海者謬談也𤣥鳥至時祈髙禖可以求嗣或以為吞燕卵而生子者怪説也或云燕蟄於井底燕不入屋井虚也燕巢有艾則不居凡狐貉皮毛見燕則毛脱物理使然肉氣味酸平有毒𢎞景曰燕肉不可食損人神氣入水為蛟龍所吞亦不宜殺之時珍曰淮南子言燕入水為蜃蛤故髙諉註謂蛟龍嗜燕人食燕者不可入水而祈禱家用燕召龍切謂燕乃蟄而不化者化蛤之説未審然否但燕肉既有毒自不必食之主治出痔蟲瘡蟲别錄胡燕卵黄主治卒水浮腫每吞十枚别錄秦燕毛主治解諸藥毒取二七枚燒灰水服時珍屎氣味辛平有毒主治蟲毒鬼疰逐不祥邪氣破五癃利小便熬香用之别錄頌曰胡洽治症病青羊脂丸中用之療痔殺蟲去目瞖蘓恭治口瘡瘧疾孫思邈作湯浴小兒驚癎𢎞景附方舊三新三解蠱毒藏器曰取燕屎三合炒獨蒜去皮十枚和擣丸梧子大每服三丸蠱當隨利而出厭瘧疾藏器曰燕屎方寸匕發日平旦和酒一升令病人兩手捧住吸氣慎勿入口害人下石淋用燕屎末以冷水服五錢旦服至食時當尿石水下通小便用燕屎豆䜴各一合糊丸梧子大每白湯下三丸日三服千金止牙痛用燕子屎丸梧桐子大於疼處咬之丸化即疼止袖珍小兒卒驚似有痛處而不知用燕窠中糞􅋩湯洗浴之救急方窠中土見土部燕蓐草即窠草見草部之九石燕日華釋名土燕綱目集解詵曰石燕在乳穴石洞中者冬月采之堪食餘月止可治病炳曰石燕似蝙蝠口方食石乳汁時珍曰此非石部之石燕也廣志云燕有三種此則土燕乳于巖穴者是矣肉氣味甘暖無毒主治壯陽暖腰膝添精補髓益氣潤皮膚縮小便禦風寒嵐瘴温疫氣日華詵曰治法取石燕二七枚和五味炒熟以酒一斗浸三日毎夜卧時飲一二盞甚能補益令人徤力能食伏翼本經上品校正時珍曰本經上品有伏翼條又有天䑕屎今依李當之本草合而為一釋名蝙蝠音編福天鼠本經仙鼠唐本飛鼠宋本夜燕恭曰伏翼者以其晝伏有翼也時珍曰伏翼爾雅作服翼齊人呼為仙鼠仙經列為肉芝集解别錄曰伏翼生太山川谷及人家屋間立夏後采隂乾天鼠屎生合浦山谷十一月十二月采𢎞景曰伏翼非白色倒懸者不可服恭曰伏翼即仙鼠也在山孔中食諸乳石精汁皆千歲純白如雪頭上有冠大如鳩鵲隂乾服之令人肥徤長生夀千歲其大如鶉未白者已百歲而並倒懸其腦重也其屎皆白色入藥當用此屎頌曰恭説乃仙經所謂肉芝者然今蝙蝠多生古屋中白而太者葢稀其屎亦有白色料其出乳石孔者當應如此耳宗奭曰伏翼日亦能飛但畏鷙鳥不敢出耳此物善服氣故能夀冬月不食可知矣時珍曰伏翼形似䑕灰黑色有薄肉翅連合四足及尾如一夏出冬蟄日伏夜飛食蚊蚋自能生育或云鼉虱化蝠䑕亦化蝠蝠又化魁蛤恐不盡然生乳穴者甚大或云燕避戊巳蝠伏庚申此理之不可曉者也若夫白色者自有此種爾仙經以為千百歲服之令人不死者乃方士誑言也陶氏蘓氏從而信之迂矣按李石續博物志云唐陳子真得白蝙蝠大如鴉服之一夕大泄而死又宋劉亮得白蝙蝠白蟾蛤仙丹服之立死嗚呼書此足以破惑矣其説始載於抱朴子書葛洪誤世之罪通乎天下又唐書云吐畨有天䑕狀如雀大如貓皮可為裘此則别是一種䑕非此天䑕也伏翼修治斆曰凡使要重一斤者先拭去肉上毛及去𤓰腸留肉翅并嘴脚以好酒浸一宿取出以黄精自然汁五兩塗炙至盡炙乾用時珍曰近世用者多煆存性耳氣味鹹平無毒日華曰微熱有毒之才曰莧實雲實為之使主治目瞑癢痛明目夜視有精光久服令人熹樂媚好無憂本經日華曰久服解愁療五淋利水道别錄主女人生子餘疾帶下病無子蘓恭治久欬上氣久瘧瘰癧金瘡内漏小兒鬾病驚風時珍藏器曰五月五日取倒懸者晒乾和桂心薰陸香燒烟辟蚊子夜明砂鼈甲為末燒烟亦辟蚊發明時珍曰蝙蝠性能瀉人故陳子真等服之皆致死觀後治金瘡方皆玫下利其毒可知本經謂其無毒久服熹樂無憂日華云久服解愁者皆誤後世之言適足以増憂益愁而已治病可也服食不可也附方舊三新八仙乳丸治上焦熱晝常好瞑用伏翼五兩重一枚連腸骨炙燥雲實炒五兩威靈仙三兩牽牛炒莧實各二兩丹砂鉛丹各一兩膩粉半兩為末蜜丸綠豆大每服七丸木通湯下以知為度普濟久欬上氣十年二十年諸藥不效用蝙蝠除翅足燒焦研末米飲服之百一方久瘧不止范汪方用蝙蝠七個去頭翅足擣千下丸梧子大每服一丸清湯下鷄鳴時一丸禺中一丸久瘧不止㐲翼丸用蝙蝠一枚炙蛇蜕皮一條燒蜘蛛一枚去足炙鼈甲一枚醋炙麝香半錢為末五月五日午時研勻入煉蜜和丸麻子大每温酒下五丸聖恵方小兒驚癎用入蟄蝙蝠一個入成塊硃砂三錢在腹内以新瓦合煆存性候冷為末空心分四服兒小分五服白湯下成醫學集小兒慢驚返魂丹治小兒慢驚及天弔夜啼用蝙蝠一枚去腸翅炙黄焦人中白乾蠍焙麝香各一分為末煉蜜丸綠豆大每服乳汁下三丸聖惠方多年瘰癧不愈神效方用蝙蝠一個猫頭一個俱撒上黒豆燒至骨化為末摻之乾即油調傅内服連翹湯集要金瘡出血不止成内漏用蝙蝠二枚燒末水服方寸匕當下水而血消也鬼遺方腋下胡臭用蝙蝠一個以赤石脂末半兩塗遍黄泥包固晒乾煆存性以田螺水調塗腋下待毒氣上冲急服下藥行一二次妙乾坤袐韞乾血氣痛蝙蝠一箇燒存性毎酒服一錢即愈生生編婦人斷産蝙蝠一個燒研以五朝酒酵調下摘𤣥方腦主治塗面去女子面皰服之令人不忘藏器血及膽主治滴目令人不睡夜中見物藏器𢎞景曰伏翼自及膽術家用為洞視法天鼠屎本經釋名鼠法本經石肝同上夜明砂日華黑砂星𢎞景曰方家不用俗不識也李當之曰即伏翼屎也方言名天䑕爾修治時珍曰凡采得以水淘去灰土惡氣取細砂晒乾焙用其砂乃蚊蚋眼也氣味辛寒無毒之才曰惡白歛白微主治面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸本經去面上黑皯别錄燒灰酒服方寸匕下死胎蘓恭炒服治瘰癧日華治馬撲損痛以三枚投熱酒一升取清服立止數便瘥蘓頌出續傳信方擣熬為末拌飯與三歲小兒食之治無辜病甚騐慎微治疳有效宗奭治目盲障瞖明目除瘧時珍發明時珍曰夜明砂及蝙蝠皆厥隂肝經血分藥也能活血消積故所治目瞖盲障瘧鬾疳驚淋帶瘰癧癰腫皆厥隂之病也按類説云定海徐道亨患赤眼食蟹遂成内障五年忽夢一僧以藥水洗之令服羊肝丸求其方僧曰用洗浄夜明砂當歸蟬蜕木賊去節各一兩為末黑羊肝四兩水煑爛和丸梧子大食後熟水下五十丸如法服之遂復明也附方舊一一新十内外障瞖夜明砂末北入猪肝内煮食飲汁效直指方青盲不見夜明砂糯米炒黄一兩柏葉炙一兩為末牛膽汁和丸梧子大每夜卧時竹葉湯下二十丸至五更米飲下二十丸瘥乃止聖惠小兒雀目夜明砂炒研猪膽汁和丸綠豆大每米飲下五丸一方加黄芩等分為末米泔煑猪肝取汁調服半錢五瘧不止聖惠用夜明砂末毎冷茶服一錢立效硃又方治瘧發作無時經久不瘥用蝙蝠糞五十粒砂半兩麝香一錢為末糯米飯丸小豆大未發時白湯下十丸胎前瘧疾夜明砂末三錢空心温酒服經騐秘方欬嗽不止蝙蝠去翅足燒酒為末一錢食後白湯下壽域神方小兒鬾病以紅紗袋盛夜明砂佩之方直指一切疳毒夜明砂五錢入瓦瓶内以精猪肉三兩薄切入瓶内水煑熟了前以肉與兒食飲其汁取下服中胎毒次用生薑四兩和皮切炒同黄連末一兩糊丸黍米大米飲服日三次心全㓜鑑聤耳出汁夜明砂二錢麝香一字為末拭浄摻之聖惠潰腫排膿夜明砂一兩桂半兩乳香一分為末入乾砂糖半兩井水調傅直指方腋下胡臭夜明砂末䜴汁調風蚛牙痛夜明砂炒吳茱茰湯泡炒等分為末蟾酥和九麻子大綿褁二丸含之吐延方普濟䴎鼠纍壘二音本經下品校正鼺䑕原在獸部今據爾雅説文移入禽部釋名鼺鼠本經鼯䑕爾雅耳䑕山海經夷由爾雅鴺禽經飛生鳥𢎞景時珍曰案許慎説文云䴎飛走且乳之鳥也故字從鳥又名飛生本經從䑕以形似也此物肉翹連尾飛不能上易至礧墜故謂之䴎俗謂癡物為䴎義取乎此亦名鼯鼠與螻蛄同名集解别錄曰鼺䑕生山都平谷𢎞景曰此䑕即鼯䑕飛生鳥也狀如蝙蝠大如䲭鳶毛紫色暗夜行飛人取其皮毛與産婦持之令易生頌曰今湖嶺山中多有之南人見之多以為怪宗奭曰關西山中甚有毛極宻俱向下飛不能致逺人捕取皮為暖㡌時珍曰案郭氏註爾雅云鼯䑕狀如小狐似蝙蝠肉翅四足翅尾項脇毛皆紫赤色背上蒼艾色腹下黄色喙頷雜白色脚短𤓰長尾長三尺許飛而乳子子即隨母後聲如人呼食火烟能從髙赴下不能從下上髙性喜夜鳴山海經云耳䑕狀如䑕兎首麋耳以其尾飛食之不眯可禦百毒即此也其形翅聯四足及尾與蝠同故曰以尾飛生嶺南者好食龍眼氣味微温有毒主治墮胎令易産本經發明頌曰人取其皮毛與産婦臨蓐時持之令兒易生而小品方乃入服藥用飛生一枚槐子故弩箭羽各十四枚合擣丸梧子大以酒服二丸即易産也時珍曰䴎能飛而且産故寢其皮懷其爪皆能催生其性相感也濟生方治難産金液丸用其腹下毛為丸服之寒號蟲宋開寳校正自蟲部入此釋名鶡鴠獨舂屎名五靈脂時珍曰楊氏丹鉛錄謂寒號蟲即鶡鵈今從之鶡鴠詩作盍旦禮作曷旦説文作䳚鴠廣志作侃旦唐詩作渇旦皆隨義借名耳楊雄方言云自關而西謂之鶡鴠自關而東謂之城旦亦曰倒懸周魏宋楚謂之獨舂郭璞云鶡鴠夜鳴求旦之鳥夏月毛盛冬月襍體晝夜鳴呌故曰寒號曰鶡旦古刑有城旦春謂晝夜舂米也故又有城旦獨舂之名月令云仲冬曷旦不鳴葢冬至陽生漸暖故也其屎名五靈脂者謂狀如凝脂而受五行之靈氣也集解志曰五靈脂出北地寒號蟲糞也禹錫曰寒號蟲四足有肉翅不能逺飛頌曰今惟河東州郡有之五靈脂色黒如鐵采無時時珍曰曷旦乃候時之鳥也五臺諸山甚多其狀如小鷄四足有肉翅夏月毛采五色自鳴若曰鳯凰不如我至冬毛落如鳥雛忍寒而號曰得過且過其屎恒集一處氣甚臊惡粒大如豆采之有如糊者有粘塊如餹者人亦以沙石雜而貨之凡用以餹心潤澤者為真肉氣味甘温無毒主治食之補益人汪頴五靈脂修治頌曰此物多夾沙石絶難修治凡用研為細末以酒飛去沙石晒乾收用氣味甘温無毒惡人參損人主治心腹冷氣小兒五疳辟疫治腸風通利氣脈女子血閉開寳療傷冷積蘓頌凡血崩過多者半炒半生酒服能行血止血治血氣刺痛甚效震亨止婦人經水過多赤帶不絶胎前産後血氣諸痛男女一切心腹脇肋少腹諸痛疝痛血痢腸風腹痛身體血痺刺痛肝瘧發寒熱反胃消渇及痰涎挾血成窠血貫瞳子血凝齒痛重舌小兒驚風五癎癲疾殺蟲解藥毒及蛇蠍蜈蚣傷時珍發明宗奭曰五靈脂引經有功不能生血此物入肝最速也常有人病目中瞖往來不定此乃血所病也肝受血則能視目病不治血為背理也用五靈脂之藥而愈又有人被毒蛇所傷良久昏憒一老僧以酒調藥二錢灌之遂甦仍以滓傅咬處少頃復灌二錢其苦皆去問之乃五靈脂一兩雄黄半兩同為末耳其后有中蛇毒者用之咸效時珍曰五靈脂足厥隂肝經藥也氣味俱厚隂中之隂故入血分肝主血諸痛皆屬于木諸蟲皆生于風故此藥能治血病散血和血而止諸痛治驚癎除瘧痢消積化痰療疳殺蟲治血痺血眼諸症皆屬肝經也失笑散不獨治婦人心痛血痛凡男女老㓜一切心腹脇肋少腹痛疝氣并胎前産後血氣作痛及血崩經溢百藥不效者俱能奏功屢用屢騐真近世神方也又案李仲南云五靈脂治崩中非止治血之藥乃去風之劑風動物也衝任經虚被風傷襲營血以致崩中暴下與荆芥防風治崩義同方悟古人識見深奥如此此亦一説但未及肝血虚滯亦有生風之意附方舊六新三十一失笑散治男女老少心痛腹痛少腹痛小腸疝氣諸藥不效者能行能止婦人妊娠心痛及産後心痛少腹痛血氣痛尤妙用五靈脂蒲黄等分研末先以醋二盃調末熬成膏入水一盞􅋩至七分連藥熱服未止再服一方以酒代醋一方以醋糊和丸童尿酒服和劑局方紫金丸治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食又治久有瘀血月水不調黄瘦不食亦療心痛功與失笑散同以五靈脂水淘浄炒末一兩以好米醋調希慢火熬膏入真蒲黄末和丸龍眼大每服一丸以水與童子小便各半盞􅋩至七分温服少頃再服惡露即下血塊經閉者酒磨服之楊氏産乳靈脂散治丈夫脾積氣痛婦人血崩諸痛飛過五靈脂炒烟盡研末毎服一錢温酒調下此藥氣惡難喫燒存性乃妙也或以酒水童便煎服名抽刀散治産后心腹脇肋腰胯痛能散惡血如心煩口渇者加炒蒲黄减半霹靂酒下腸風下血者􅋩烏梅柏葉湯下中風麻痺痛者加草烏半錢同童尿水酒煎服永類鈐方産后血運治産婦血運不知人事用五靈脂二兩半生半炒為末每服一錢白水調下如口噤者斡開灌之入喉即愈圖經産后腹痛五靈脂香附桃仁等分研末醋糊丸服一百丸或用五靈脂末神麴糊丸白术陳皮湯下丹溪方兒枕作痛五靈脂慢炒研末酒服二錢産寳血氣刺痛五靈脂生研三錢酒一盞煎沸熱服靈苑方卒暴心痛五靈脂炒一錢半乾薑炮三分為末熱酒服立愈事林廣記心脾蟲痛不拘男女用五靈脂㯽榔等分為末水煎石菖蒲調服三錢作餅猪肉一二丸海上仙方小兒蚘痛五靈脂末二錢靈礬火飛半錢每服一錢水一盞煎五分温服當吐虫出愈閻孝忠集效方經血不止五靈脂炒烟盡研每服二錢當歸兩片酒一盞煎六分熱服三五度取效經效方血崩不止頌曰用五靈脂十兩研末水五盌煎三盌去滓澄清再煎為膏入神麴末二兩和丸梧子大每服二十丸空心温酒下便止極效服集要用五靈脂燒研以鐵杵錘燒紅淬酒調以效為度胎衣不下惡血冲心用五靈脂半生半炒研末每服二錢温酒下産寳子腸脱出五靈脂燒烟薰之先以塩湯洗净危氏吐血嘔血五靈脂一兩盧㑹三錢研末滴水丸芡子大每漿水化服二丸黄又治血妄行入胃吐不止五靈脂一兩茋半兩為末新汲水服二錢吐逆不止不拘男女連日粥飲湯藥不能下者即效五靈脂治净為末狗膽汁和丸芡子大每服二丸煎生薑酒磨化猛口熱吞不得潄口急將温粥少許壓之經驗化食消氣五靈脂一兩木香半兩巴豆四十枚煨熟去油為末糊丸菉豆大毎白湯下五丸普濟方久瘧不止或一日二發或一日二三發或二三日一發用五靈脂頭垢各一錢古城石灰二錢研末飰丸皂子大每服一丸五更無根水下即止神効方也海上消渇飲水竹籠散用五靈脂黑豆去皮等分為末每服三錢冬𤓰皮湯下無皮用葉亦可日二服不可更服熱藥宜八味丸去附子加五味子若小渇者二三服即止保命集中風癱緩追魂散即五靈脂研末以水飛去上靣黑濁下靣沙石研末每服二錢熱酒調下日一服細服小續命湯竒效方手足冷麻冦曰風冷氣血閉手足身體疼痛冷麻五靈脂二兩沒藥一兩乳香半兩川烏頭一兩半炮去皮為术滴水丸如彈子大每用一丸生薑温酒磨服本草衍義骨折腫痛五靈脂白及各一兩乳香沒藥各三錢為末熟水同香油調塗患處乾坤袐韞損傷接骨五靈脂一兩茴香一錢為末先以乳香末于極痛處傅上以小黄米粥塗之乃摻二末于粥上帛褁木牌子夾定三五日效儒門事親五疳潮熱肚脹髪焦不可用大黄黄芩損傷胃氣恐生别症五靈脂水飛一兩胡黄連五錢為末雄猪膽汁丸香米大每服一二十丸米飲下鑑全㓜心欬嗽肺脹皺肺丸用五靈脂二兩胡桃仁八個柏子仁半兩研勻滴水和丸小豆大每服二十丸甘草湯下普濟痰血凝結紫芝丸用五靈脂水飛半夏湯泡等分為末薑汁浸蒸餅丸梧子大每飲下二十丸百一方酒積黄腫五靈脂末一兩入麝香少許飯丸小豆大每米飲下一丸普濟方目生浮瞖五靈脂海螵蛸各等分為細末熟猪肝日蘸食經明目驗方重舌脹痛五靈脂一兩淘浄為末􅋩米醋漱經驗良方惡血齒痛五靈脂末米醋􅋩汁含咽直指方血痣潰血一人舊有一痣偶抓破血出一線七日不止欲死或用五靈脂末摻上即止也楊拱醫方選要血潰怪病凡人目中白珠渾黒而物如常毛髪堅直如鐵條能飲食而不語如醉名曰血潰以五靈脂為末湯服二錢即愈夏子益竒疾方大風瘡􅋪油調五靈脂末塗之摘𤣥方蟲虺螫􅀢凡蜈蚣蛇蠍毒虫傷以五靈脂末塗之立愈𤣥金匱鈎毒蛇傷螫同上本草綱目卷四十八
