body:
  text: 本草綱目卷十八目錄草之七蔓草類七十三種附四十一種菟絲子本經難火蘭附五味子本經蓬櫐本經覆盆子别錄懸鈎子拾遺蛇苺别錄使君子開寶木鼈子開寶畨木鼈綱目馬兜鈴開寶即土青木香榼藤子開寶預知子開寶牽牛子别錄旋花本經太乙金鎖即鼓子花紫葳本經即凌霄花骨路支附營實牆蘼本經月季花綱目栝樓本經即天花粉王𤓰本經即土𤓰葛本經黄環本經即鼔跋子天門冬本經百部别錄白并附何首烏别錄萆薢别錄菝葜别錄土茯苓綱目白蘞本經女萎李當之赭魁本經鵞抱圖經伏雞子拾遺仰盆人肝藤附千金藤開寶陳鬼岌附九仙子綱目山豆根開寶黄藥子開寶解毒子唐本即苦藥子奴會子藥實根附白藥子唐本陳甘白藥㑹州白藥衝洞根突厥白附威靈仙開寶茜根本經血藤附剪草日華防己本經通草本經通脱木法象天夀根附釣藤别錄倒掛藤附黄藤綱目白菟藿本經白花藤唐本白英本經即鬼目排風子蘿藦唐本赤地利唐本紫葛唐本烏蘞苺唐本即五葉藤葎草唐本羊桃本經絡石本經木蓮拾遺地錦附扶芳藤拾遺常春藤拾遺千歲蘽别錄忍冬别錄即金銀花甘藤嘉祐甜藤甘露附含水藤海藥天仙藤圖經紫金藤圖經南藤開寳烈節附清風藤圖經百稜藤圖經省藤拾遺紫藤開寶落鴈木唐本每折傷木風延母始王木附千里及拾遺即千里光藤黄拾遺右附方舊一百三十七新三百二十八附録諸藤一十九種本草綱目卷十八目録
