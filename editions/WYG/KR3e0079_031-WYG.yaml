  text: 本草綱目卷十目錄金石之四石類下三十九種陽起石本經慈石本經𤣥石别録代赭石本經禹餘粮本經太一餘粮本經石中黃子唐本空青本經曾青本經緑青本經扁青本經白青本經青綠膚碧石青附石膽本經礬即膽礜石本經特生礜石别錄握雪礜石唐本砒石開寳土黃綱目金星石嘉祐附金石婆娑石開寳礞石嘉祐花乳石嘉祐白羊石圖經金牙石别録金剛石綱目附石砮越砥石别録刀石即磨薑石唐本麥飯石圖經水中白石拾遺河沙拾遺杓上砂綱目石燕唐本石蟹開寳石蛇圖經石蠶開寳石鼈綱目蛇黃唐本霹靂碪拾遺雷墨綱目右附方舊二十五新九十五本草綱目卷十目錄
