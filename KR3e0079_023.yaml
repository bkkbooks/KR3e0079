body:
  text: 本草綱目卷六目録火部李時珍曰水火所以養民而民賴以生者也本草醫方皆知辨水而不知辨火誠缺文哉火者南方之行其文橫則為三卦直則為火字炎上之象也其氣行于天藏于地而用于人太古燧人氏上觀下察鑽木取火教民熟食使無腹疾周官司烜氏以燧取明火于日鑑取明水于月以供祭祀司爟氏掌火之政令四時變國火以救時疾曲禮云聖王用水火金木飲食必時則古先聖王之于火政天人之間用心亦切矣而後世慢之何哉今撰火之切于日用灸焫者凡一十一種為火部云本草拾遺一種唐陳藏器本草綱目一十一種明李時珍附注元朱震亨火凡一十一種陽火隂火綱目燧火綱目桑柴火綱目炭火綱目蘆火竹火綱目艾火綱目珠陽燧火附神針火綱目火針綱目燈火綱目燈花拾遺燭燼綱目右附方新一十三本草綱目卷六目録
  hash: sha256:874f168ceb678e6a5227e4500c1fc0819d3f2567b8733554fafcff596332214a
