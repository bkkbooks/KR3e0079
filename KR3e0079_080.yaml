body:
  text: 本草綱目卷三十三目録果之五蓏類九種內附一種甜瓜嘉祐瓜蒂西瓜日用葡萄本經櫻薁綱目萄即野葡獼猴桃開寶梨即藤甘蔗别録沙糖唐本石蜜唐本刺蜜拾遺附馝齊右附方舊十二新四十果之六水果類六種外附二十二種蓮藕本經紅白蓮花拾遺芰實别録即菱芡實本經頭即雞烏芋别録臍即葧慈姑日華附録諸果綱目二十一種拾遺一種諸果有毒並另附於末津符子必思答甘劍子楊搖子海梧子木竹子櫓罟子羅晃子㯆子夫編子白緣子繫彌子人面子黃皮果四味果千歲子侯騷子酒杯藤子蕳子山棗隈支以上俱綱目靈牀上果子拾遺諸果有毒拾遺右附方舊十五新六十三本草綱目卷三十三目録
