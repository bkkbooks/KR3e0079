body:
  text: 本草綱目卷四十二明李時珍撰蟲之四濕生類二十三種內附五種外附録七種蟾蜍别録下品釋名鼀􅖚音蹙秋􅖚􅠴音施䗇鼀踘蹴苦蠪音籠蚵蚾何皮癩􅞩蟇時珍曰蟾蜍説文作詹諸詩得此􅖚􅠴韓詩注戚施蟾蜍也後世名苦蠪其聲也蚵蚾其皮礧砢也集解别録曰蟾蜍生江湖池澤五月五日取東行者隂乾用𢎞景曰此是腹大皮上多靡磊者其行汁甚有毒大囓之口皆腫五月五日取東行者五枚反縛著密室中閉之明旦視自解者取為術用能使人縛亦自解蕭炳曰腹下有丹書八字以足畫地者真蟾蜍也頌曰今處處有之别録謂􅞩蟇一名蟾蜍以為一物非也按爾雅鼀􅖚蟾蜍也郭璞云似􅞩蟇居陸地則非一物明矣蟾蜍多在人家下濕處形大背上多䨾磊行極遲緩不能跳躍亦不解鳴蝦蟇多在陂澤間形小皮上多黑斑點能跳接百蟲舉動極急二物雖一類而功用小别亦當分而用之蟾蜍屎謂之土檳榔下濕處往往有之亦能主疾宗奭曰世傳三足者為蟾人遂為三足枯蟾以罔衆但以水沃半日其偽自見蓋無三足者也時珍曰蟾蜍鋭頭皤腹促眉濁聲土形有大如盤者自然論云蟾蜍吐生擲糞自其口出也抱朴子云蟾蜍千嵗頭上有角腹下丹書名曰肉芝能食山精人得食之可仙術家取用以起霧祈雨辟兵解縛今有技者聚蟾為戲能聽指使物性有靈於此可推許氏説文謂三足者為蟾而冦氏非之固是但龜鱉皆有三足則蟾之三足非怪也若謂入藥必用三足則謬矣􅒖嶁神書載蟾寶之法用大蟾一枚以長尺鐵釘四箇釘腳四下以炭火自早灸至午去火放水一盞於前當吐物如皂莢子大有金光人吞之可越江湖也愚謂縱有此術誰敢吞之方技誑説未足深信漫記於此以備袪疑修治蜀圖經曰五月五日取得日乾或烘乾用一法去皮爪酒浸一宿又用黃精自然汁浸一宿塗酥灸乾用時珍曰今人皆於端午日捕取風乾黃泥固濟煅性存用之永類鈐方云蟾目赤腹無八字者不可用崔實四民月令云五月五日取蟾蜍可治惡瘡即此也亦有酒浸取肉者錢仲陽治小兒冷熱疳瀉如聖丸用乾者酒煮成膏丸藥亦一法也氣味辛涼微毒主治隂蝕疽癘惡瘡猘犬傷瘡能合玉石别録燒灰傅瘡立驗又治溫病發斑困篤者去腸生搗食一二枚無不瘥者𢎞景飲藏器曰搗爛絞汁或燒末服殺疳蟲治鼠漏惡瘡燒灰傅一切有蟲惡癢滋胤瘡藥性治疳氣小兒面黃癖氣破癥結燒灰油調傅惡瘡日華主小兒勞瘦疳疾最良蘇頌治一切五疳八痢腫毒破傷風病脫肛時珍發明時珍曰蟾蜍土之精也上應月魄而性靈異穴土食蟲又伏山精制蜈蚣故能入陽明經退虛熱行濕氣殺蟲􅉶而為疳病癰疽諸瘡要藥也别録云治猘犬傷肘後亦有方法按沈約宋書云張收為猘犬所傷人云宜噉􅞩蟇膾食之遂愈此亦治癰疽疔腫之意大抵是物能攻毒拔毒耳古今諸方所用蝦蟇不甚分别多是蟾蜍讀者當審用之不可因名迷實也附方舊七新十七腹中冷癖水穀癊結心下停痍兩脅痞滿按之鳴轉逆害飲食大蟾蜍一枚去皮腸支解之芒硝強人一升中人七合弱人五合水七升煮四升頓服得下為度肘後方小兒疳積治小兒疳積腹大黃瘦骨立頭生瘡結如麥穗用立秋後大蝦蟇去首足腸以清油塗之隂陽瓦炙熟食之積穢自下連服五六枚一月之後形容改變妙不可言五疳八痢面黃肌瘦好食泥土不思乳食用大乾蟾蜍一枚燒存性皂角去皮弦一錢燒存性蛤粉水飛三錢麝香一錢為末糊丸粟米大每空心米飲下三四十丸日二服名五疳保童丸全嬰方小兒疳泄下痢用蝦蟇燒存性研飲服方寸匕子母祕録走馬牙疳侵蝕口鼻乾蚵蚾黃泥裹固煆過黃連各二錢半青黛一錢為末入麝香少許和研傅之鄭氏小兒方疳蝕腮穿金鞭散治疳瘡腮穿牙落以抱退雞子軟白皮包活土狗一箇放入大蝦蟇口內草縛泥固煆過取出研末貼之以愈為度方普濟小兒口瘡五月五日蝦蟇灸研末傅之即瘥祕録一切疳􅉶無問去處皆能治之蝦蟇燒灰醋和傅一日三五度梅師方隂蝕欲盡蝦蟇灰兔屎等分為末傅之後肘月蝕耳瘡五月五日蝦蟇燒末豬膏和傅外臺方小兒蓐瘡五月五日取蟾蜍灸研末傳之即瘥祕録小兒臍瘡出汁久不瘥蝦蟇燒末傅之日三甚驗一加牡蠣等分外臺一切濕瘡蟾蜍燒灰豬脂和傅千金方小兒癬瘡蟾蜍燒灰豬脂和傅方外臺癩風蟲瘡乾蝦蟇一兩灸長肥皂一條灸去皮子蘸酒再灸為末以竹管引入羊腸內繫定以麩鋪甑內置藥麩上蒸熟入麝香半錢去麩同搗為丸如梧子大每溫酒服二十一丸直指附骨壞瘡久不瘥濃汁不已或骨從瘡孔中出用大蝦蟇一個亂頭髮一雞子大豬油四兩煎枯去滓待凝如膏先以桑根皮烏頭煎湯洗拭乾煅龍骨末糝四邊以前膏貼之錦囊祕覽發背腫毒未成者用活蟾一箇繫放瘡上半日蟾必昏憒置水中救其命再易一箇如前法其蟾必踉蹡再易一箇其蟾如舊則毒散矣纍驗極效合若勢重者以活蟾一箇或二三箇破開連肚乘熱瘡上不久必臭不可聞再易二三次即愈慎勿以微物見輕也醫林集要腫毒初起大蝦蟇一箇刴碎同炒石灰研如泥傅之頻易余居士方破傷風病用蟾二兩半切刴如泥入花椒一兩同酒炒熟再入酒二盞半溫熱服之少頃通身汗出神效猘犬咬傷肘後治猘犬傷每七日一發生食蝦蟇膾絶良亦可燒灸食之勿令本人知之自後再不發也袖珍治風犬傷即用蝦蟇後足搗爛水調服之先於頂心拔去血髮三兩根則小便內見沫也腸頭挺出蟾蜍皮一片瓶內燒煙燻之并傅之孫真人佩禳瘧疾五月五日收大蝦蟇晒乾紙封絳囊貯之男左女右繫臂上勿令知之楊氏家藏方折傷接骨大蝦蟇生研如泥劈竹裹縛其骨自痊奚囊備急方大腸痔疾蟾蜍一箇以磚砌四方安于內泥住火煅存性為末以豬廣腸一截札定兩頭煮熟切碎蘸蟾末食之如此三四次其痔自落頭主治功同蟾蜍蟾酥采治宗奭曰眉間白汁謂之蟾酥以油單紙裹眉裂之酥出紙上隂乾用時珍曰取蟾酥不一或以手揑眉稜取白汁於油紙上及桑葉上插背隂處一宿即自乾或安置竹筒內盛之真者輕浮入口味甜也或以蒜及胡椒等辣物納口中則蟾身白汁出以竹箆刮下麵和成塊乾之其汁不可入人目令人赤腫盲或以紫草汁洗點即消氣味甘辛溫有毒主治小兒疳疾腦疳甄權曰端午日取眉脂以硃砂麝香為丸如麻子大治小孩子疳瘦空心服一丸如腦疳以乳汁調滴鼻中甚妙酥同牛酥或吳茱萸苗汁調摩腰眼隂囊治腰腎冷并助陽氣又療蟲牙日華治齒縫出血及牙疼以紙絍少許按之立止宗奭發背疔瘡一切惡腫時珍附方新九拔取疔黃蟾酥以麵丸梧子大每用一丸安舌下即黃出也青囊雜纂拔取疔毒蟾酥以白麵黃丹搜作劑每丸麥粒大以指爬動瘡上插入重者桃破納之仍以水澄膏貼之方危氏疔瘡惡腫蟾酥一錢巴豆四箇搗爛飯丸錠子如緑豆大每服一丸薑湯下良久以萹蓄根黃荆子研酒半碗服取行四五次以粥補之乾坤祕韞諸瘡腫硬針頭散用蟾酥麝香各一錢研勻乳汁調和入罐中待乾每用少許津調傅之外以膏護住毒氣自出不能為害也命保集一切瘡毒蟾酥一錢白麵二錢硃砂少許井華水調成小錠子如麥大每用一錠井華水服如瘡勢緊急五七錠蔥湯亦可汗出即愈喉痺乳蛾等證用癩蝦蟇眉酥和草烏尖末豬牙皂角末等分為丸小豆大每研一丸點患處效活人心統一切齒痛疳蝕齲齒瘀腫用蚵蚾一枚鞭其頭背以竹箆刮眉間即有汁出取少許點之即止也類編風蟲牙痛不可忍聖惠用蟾酥一片水浸軟入麝香少許研勻以粟米大綿裹咬定吐涎愈一方用胡椒代麝香一方用蟾酥染絲綿上剪一分絍入齒縫根裏忌熱物半日效乾者以熱湯化開破傷風病蟾酥二錢湯化為糊乾蠍酒炒天麻各半兩為末合搗丸緑豆大每服一丸至二丸豆淋酒下聖惠方蝦蟇本經下品釋名蟼蟇蟼音驚又音加土時珍曰按王荆公字説云俗言蝦蟇懷取置逺處一夕復還其所雖或遐之常慕而返故名蝦蟇或作蝦蟆蝦言其聲蟆言其斑也爾雅作蟼蟇集解藏器曰别録蝦蟇一名蟾蜍誤矣蝦蟇蟾蜍二物各别陶氏以蟾蜍注蝦蟇遂致混然無别今藥家亦以蟾蜍當蝦蟇矣蝦蟇在陂澤中背有黑點身小能跳接百蟲解作呷呷聲舉動極急蟾蜍在人家濕處身大青黑無點多痱㿔不能跳不解作聲行動遲緩又有蛙蛤螻蟈長肱石榜蠼子之類或在水田中或在溝渠側未見别功周禮蟈氏掌去蛙黽焚牡菊以灰灑之則死牡菊乃無花菊也斆曰蝦蟇有多般勿誤用有黑虎身小黑嘴腳小斑有䖲黃前腳大後腿小斑色有尾子一條有黃􅀈遍身黃色腹下有臍帶長五七分住立處帶下有自然汁出有螻蟈即夜鳴腰細口大皮蒼黑色者有蟾即黃斑頭上有肉角其蝦蟇皮上腹下有斑點腳短即不鳴叫者是也時珍曰蝦蟇亦能化鶉出淮南子蝦蟇青鼀畏蛇而制蜈蚣三物相值彼此皆不能動故關尹子云蝍蛆食蛇蛇食蛙鼀食蝍蛆或云月令螻蟈鳴反舌無聲皆謂蝦蟇也山吳瑞曰長肱石雞也一名錦襖子六七月谷間有之性味同水雞修治斆曰凡使蝦蟆先去皮并腸及爪子隂乾每箇用真牛酥一分塗灸乾若使黑虎即連頭尾皮爪並隂乾酒浸三日漉出焙用氣味辛寒有毒大明曰溫無毒主治邪氣破癥堅血癰腫隂瘡服之不患熱病本經主百邪鬼魅塗癰腫及熱結腫藥性治熱狂貼惡瘡解煩熱治犬咬日華發明頌曰蝦蟇蟾蜍二物雖同一類而功用小别亦當分而用之時珍曰古方多用蝦蟇近方多用蟾蜍蓋古人通稱蟾為蝦蟇耳今考二物功用亦不甚逺則古人所用多是蟾蜍且今人亦只用蟾蜍有效而蝦蟇不復入藥矣按張杲醫説載托青雜説云有人患腳瘡冬月頓然無事夏月臭爛痛不可言遇一道人云爾因行草上惹蛇交遺瀝瘡中有蛇兒冬伏夏出故也以生蝦蟇搗傅之日三即換凡三日一小蛇自瘡中出以鐵鉗取之其病遂愈朱震亨曰蝦蟇屬土與水味甘性寒南人喜食之本草言服之不患熱病由是病人亦煮食之本草之意或炙或乾或燒入藥用之非若世人煮羹入椒鹽而啜其湯也此物本濕化大能發濕久則濕化熱此乃土氣厚自然生火也附方舊三新三風熱邪病蝦蟇燒灰硃砂等分為末每服一錢酒服日三甚有驗外臺祕要狂言鬼語卒死用蝦蟇燒末酒服方寸匕日三外臺祕要噎膈吐食用蛇含蝦蟇泥包煅存性研末每服一錢酒下壽域方瘰癧潰爛用黑色蝦蟇一枚去腸焙研油調傅之忌鐵器頭上軟癤煅蟇剝皮貼之收毒即愈活幼全書蝮蛇螫傷生蝦蟇一枚搗爛傳之外臺肝主治蛇螫人牙入肉中痛不可堪搗傅之立出時珍肘出後膽主治小兒失音不語取汁點舌上立愈時珍集出孫氏效方腦主治青盲明目别録蛙别録下品釋名長股别録田雞綱目青雞同上坐魚同上蛤魚宗奭曰蛙後腳長故善躍大其聲則曰蛙小其聲則曰蛤時珍曰蛙好嗚其聲自呼南人食之呼為田雞云肉味如雞也又曰坐魚其性好坐也按爾雅蟾蛙俱列魚類而東方朔傳云長安水多蛙魚得以家給人足則古昔關中已常食之如魚不獨南人也蛙亦作蛙字集解别録曰蛙生水中取無時𢎞景曰凡蜂蟻蛙蟬其類最多大有青脊者俗名土鴨其鳴甚壯一種黑色者南人名蛤子食之至美一種小形善鳴者名蛙子即此也保升曰蛙蝦蟇之屬居陸地青脊善鳴聲作蛙者是也頌曰今處處有之似蝦蟇而背青緑色尖嘴細腹俗謂之青蛙亦有背作黃路者謂之金線蛙陶氏所謂土鴨即爾雅所謂在水曰黽者是也俗名石鴨所謂蛤子即今水雞是也閩蜀浙東人以為佳饌時珍曰田雞水雞土鴨形稱雖異功用則一也四月食之最美五月漸老可採入藥考工記云以脰鳴者蛙黽之屬農人占其聲之早晚大小以卜豐歉故唐人章孝子標詩云田家無五行水旱卜蛙聲蛙亦能化為鴽見列氣味甘寒無毒宗奭曰平小時珍曰按延壽書云蛙骨熱食之便苦淋妊娠食蛙令子壽夭小蛙食多令人尿閉臍下酸痛有至死者擂車前水飲可解吳瑞曰正月出者名黃蛤不可食主治小兒赤氣肌瘡臍傷止痛氣不足别録小兒熱瘡殺尸疰病蟲去勞劣解熱毒日華食之解勞熱宗奭利水消腫燒灰塗月蝕瘡時珍饌食調疳瘦補虛損尤宜産婦搗汁服治蝦蟇瘟病嘉謨發明頌曰南人食蛙蛤云補虛損尤宜産婦時珍曰蛙産於水與螺蚌同性故能解熱毒利水氣但係濕化之物其骨性復熱而今人食者每同辛辣及脂油煎􅀈是抱薪救火矣安能求其益哉按戴原禮證治要訣云凡渾身水腫或單腹脹者以青蛙一二枚去皮灸食之則自消也嘉謨曰時行面赤項腫名蝦蟇瘟以金線蛙搗汁水調空腹頓飲極效曽活數人附方新六蛤饌治水腫用活蛙三箇每箇口內安銅錢一箇上著胡黃連末少許以雄豬肚一箇茶油洗淨包蛙札定煮一宿取出去皮腸食肉并豬肚以酒送下忌酸鹹魚麵雞鵝羊肉宜食豬鴨壽域神方水蠱腹大動搖有水聲皮膚黑色用乾青蛙二枚以酥炒乾螻蛄七枚炒苦壺蘆半兩炒右為末每空心溫酒服二錢不過三服聖惠方毒痢禁口水蛙一箇并腸肚搗碎瓦烘熱入麝香五分作餅貼臍上氣通即能進食也諸痔疼痛青蛙丸用青色蛙長腳者一箇燒存性為末雪糕和丸如梧子大每空心先喫飯二匙次以枳殼湯下十五丸直指方蟲蝕肛門蟲蝕腎腑肛盡腸穿用青蛙一枚雞骨一分燒灰吹入數用大效外臺􅂒瘡如眼上高下深顆顆纍垂如瞽眼其中帶青頭上各露一舌毒孔透裏者是也用生井蛙皮燒存性為末蜜水調傅之方直指蝌斗拾遺釋名活師山海經活東爾雅玄魚古今注懸針同上水仙子俗名蝦蟇臺時珍曰蝌斗一作蛞斗音濶按羅願爾雅翼云其狀如魚其尾如針又并其頭尾觀之有似斗形故有諸名玄魚言其色懸針狀其尾也集解藏器曰活師即蝦蟇兒生水中有尾如鮽魚漸大則腳生尾脫時珍曰蝌斗生水中蝦蟇青蛙之子也二三月蛙蟇曳腸於水際草上纒繳如索日見黑點漸至春水時鳴以䀨之則蝌斗皆出謂之䀨子所謂蝦蟇聲抱是矣蝌斗狀如河豚頭圓身上青黑色始出有尾無足稍大則足生尾脫崔豹云聞雷尾脫亦未必然陸農師云月大盡則先生前兩足小盡則先生後兩足主治火飈熱瘡及疥瘡並搗碎傅之又染髭髮取青胡桃子上皮和搗為泥染之一染不變也藏器發明時珍曰俚俗三月三日皆取小蝌斗以水吞之云不生瘡亦解毒治瘡之意也按危氏得效方染髭髮用蝌斗黑桑椹各半斤瓶密封懸屋東百日化泥取塗鬚髮永黑如漆也又岣螻神書云三月三日取蝌斗一合隂乾候椹熟時取汁一升浸埋東壁下百日取出其色如漆以塗髭髮永不白也卵主治眀目藏器溪狗拾遺集解藏器曰溪狗生南方溪澗中狀似蝦蟇尾長三四寸氣味有小毒主治溪毒及遊蠱燒末水服一二錢匕藏器山蛤宋圖經校正原附蝦蟇下今分出集解頌曰山蛤在山石中藏蟄似蝦蟇而大黃色能吞氣飲風露不食雜蟲山人亦食之主治小兒勞瘦及疳疾最良蘇頌田父宋圖經校正原附蝦蟇下今分出釋名蜦音論集解頌曰按洽聞記云蝦蟇大者名田父能食蛇蛇行被逐殆不能去因􅔷其尾久之蛇死尾後數寸皮不損肉已盡矣世傳蛇噉蛙今此乃食蛇其説頗怪當别是一種也時珍曰按文字集略云蜦蝦蟇也大如屨能食蛇此即田父也切謂蛇吞鼠而有食蛇之鼠蛇制豹而有噉蛇之貘則田父伏蛇亦此類耳非怪也主治蠶咬取脊背上白汁和蟻子灰塗之蘇頌獨出韋宙行方蜈蚣本經下品釋名􅀈􆃂爾雅蝍蛆爾雅天龍𢎞景曰莊子蝍蛆甘帶淮南子云螣蛇遊霧而殆於蝍蛆蝍蛆蜈蚣也性能制蛇見大蛇便緣上噉其腦恭曰山東人呼蜘蛛一名蝍蛆亦能制蛇而蛛蜘條無制蛇之説莊子淮南並謂蜈蚣也頌曰按爾雅􅀈藜蝍蛆也郭注云似蝗而大腹角能食蛇腦乃别似一物時珍曰按張揖廣雅及淮南子注皆謂蝍蛆為蜈蚣與郭説異許慎以蝍蛆為蟋蟀能制蛇又以蝍蛆為馬蚿因馬蚿有蛆蟝之名並誤矣集解别録曰蜈蚣生大吳川谷及江南頭足赤者良𢎞景曰今赤足者多出京口長山髙麗山茅山於腐爛積草處得之勿令傷暴乾黃足者甚多而不堪用人以火灸令赤當之非真也蜈蚣囓人以桑汁白鹽塗之即愈蜀圖曰生山南川谷及出襄鄧隨唐等州土石間人家屋壁中亦有形似馬陸身扁而長黑頭赤足者良七八月採之宗奭曰蜈蚣背光黑緑色足赤腹黃有被毒者以烏雞屎或大蒜塗之效性畏蛞蝓不敢過所行之路觸其身即死故蛞蝓能治蜈蚣毒時珍曰蜈蚣西南處處有之春出冬蟄節節有足雙鬚岐尾性畏蜘蛛以溺射之即斷爛也南方有極大者而本草失載按段成式酉陽雜俎云綏定縣蜈蚣大者能以氣吸蛇及蜴蜥相去三四尺骨肉自消沈懷逺南越志云南方晉安有山出蜈蚣大者長丈餘能啖牛俚人然炬遂得以皮鞔鼓肉曝為脯美於牛肉葛洪遐觀賦云南方蜈蚣大者長百步頭如車箱肉白如瓠越人爭買為羹灸張采明道雜志云黃州岐亭有拘羅山出大蜈蚣袤丈尺土人捕得燻乾商人販入北方貨之有致富者蔡絛叢話云嶠南蜈蚣大者二三尺螫人至死惟見托胎蟲則局縮不敢行蟲乃登首陷其腦而食之故被蜈蚣傷者搗蟲塗之痛立止也珍按托胎蟲即蛞蝓也蜈蚣能制龍蛇蜴蜥而畏蝦蟇蛞蝓蜘蛛亦莊子所謂物畏其天隂符經所謂禽之制在氣也修治斆曰凡使勿用千足蟲真相似只是頭上有白肉面并嘴尖若誤用并把著腥臭氣入頂能致死也凡治蜈蚣先以蜈蚣木末或栁蛀末於土器中炒令木末焦黑去木末以竹刀刮去足甲用時珍曰蜈蚣木不知是何木也今人惟以火灸去頭足用或去尾足以薄荷葉火煨用之氣味辛溫有毒時珍曰畏蛞蝓蜘蛛雞屎桑皮白鹽主治鬼疰蠱毒噉諸蛇蟲魚毒殺鬼物老精溫瘧去三蟲本經療心腹寒熱積聚墮胎去惡血别録治癥癖日華小兒驚癎風搐臍風口噤丹毒秃瘡瘰癧便毒痔漏蛇瘕蛇瘴蛇傷時珍發明頌曰本經云療鬼疰故胡洽方治尸疰惡氣痰嗽諸方多用之今醫家治小兒口噤不開不能乳者以東走蜈蚣去足灸研用豬乳二合調半錢分三四服溫灌之有效時珍曰蓋行而疾者惟風與蛇蜈蚣能制蛇故亦能截風蓋厥隂經藥也故所主諸證多屬厥隂按揚士瀛直指方云蜈蚣有毒惟風氣暴烈者可以當之風氣暴烈非蜈蚣能截能擒亦不易止但貴藥病相當耳設或過劑以蚯蚓桑皮解之又云瘭瘡一名蛇瘴蠻煙瘴雨之鄉多毒蛇氣人有不伏水土風氣而感觸之者數月以還必發蛇瘴惟赤足蜈蚣最能伏蛇為上藥白芷次之又聖濟總録云嶺南朴蛇瘴一名鎖喉瘴項大腫痛連喉用赤足蜈蚣一二節研細水下即愈據此則蜈蚣之治蛇蠱蛇毒蛇瘕蛇傷諸病皆此意也然蜈蚣又治痔漏便毒丹毒等病并陸羽茶經載枕中方治瘰􅊓一法則蜈蚣自能除風攻毒不獨治蛇毒而已也附方舊五新十三小兒撮口但看舌上有瘡如粟米大是也以蜈蚣汁刮破指甲研傅兩頭肉即愈如無生者乾者亦可子母祕録小兒急驚萬金散蜈蚣一條全者去足灸為末丹砂輕粉等分研勻隂陽乳汁和丸菉豆大每嵗一丸乳下聖惠天弔驚風目久不下眼見白睛及角弓反張聲不出者雙金散主之用大蜈蚣一條去頭足酥灸用竹刀批開記定左右又以麝香一錢亦分左右各記明研末包定每用左邊者吹左鼻右邊者吹右鼻各少許不可過多若眼未下再吹些須眼下乃止直指破傷中風欲死聖惠用蜈蚣研末擦牙追去涎沫立瘥儒門事親用蜈蚣頭烏頭尖附子底蠍稍等分為末每用一字或半字熱酒灌之仍貼瘡上取汗愈口眼喎斜口內麻木者用蜈蚣三條一蜜灸一酒浸一紙裹煨並去頭足天南星一箇切作四片一蜜炙一酒浸一紙裹煨一生用半夏白芷各五錢通為末入麝少許每服一錢熱調下日一服通變要法腹內蛇癥誤食菜中蛇精成蛇瘕或食蛇肉成瘕腹內常飢食物即吐以赤足蜈蚣一條灸研末酒服簡衛生易方蝮蛇螫傷蜈蚣燒末傅之射工毒瘡大蜈蚣一枚灸研和酢傅之方千金天蛇頭瘡生手指頭上用蜈蚣一條燒煙燻一二次即愈或為末豬膽汁調塗之效竒丹毒瘤腫用蜈蚣一條白礬一皂子大雷丸一箇百部二錢研末醋調傅之本草衍義瘰癧潰瘡荼蜈蚣二味灸至香熟搗篩為末先以甘草湯洗淨傅之枕中方聤耳出膿誤蚣末吹之鮑氏小兒秃瘡大蜈蚣一條鹽一分入油內浸七日取油搽之極效上海方便毒初起黃腳蜈蚣一條瓦焙存性為末酒調服取汁即散濟生祕覽痔瘡疼痛直指用赤足蜈蚣焙為末入片腦少許唾調傅之孫氏集效用蜈蚣三四條香油煮一二沸浸之再入五倍子末二三錢瓶收密封如遇痛不可忍點上油即時痛止大效腹大如箕用蜈蚣三五條酒灸研末每服一錢以雞子二箇打開入末在內攪勻紙糊沸湯煮熱食之日一服連進三服廖心活人統腳肚轉筋蜈蚣燒豬脂和傅肘後女人趾瘡甲內惡肉突出不愈蜈蚣一條焙研傅之外以南星末醋和傅四圍醫方摘要馬陸本經下品釋名百足本經百節衍義千足炮灸論馬蚿音弦馬蠸音拳馬蠲郭璞馬軸别録馬䗃爾雅飛蚿蟲李當之刀環蟲蘇恭蛩𢎞景曰此蟲甚多寸寸斷之亦便寸行故魯連子云百足之蟲死而不僵莊子蚿憐蛇是矣集解别録曰馬陸生玄菟川谷𢎞景曰李當之云此蟲長五六寸狀如大蛩夏月登樹鳴冬則入蟄今人呼為飛蚿蟲今有一種細黃蟲狀如蜈蚣而甚長俗名土蟲雞食之醉悶至死方家既不復用市人亦無取者未詳何者的是恭曰此蟲大如細筆管長三四寸斑色亦如蚰蜒襄陽人名為馬蚿亦呼馬蚰又名刀環蟲以其死側卧狀如刀環也有人自毒服一枚便死也斆曰千足蟲頭上有白肉而赤觜尖把著腥臭氣入人頂能致死也宗奭曰百節身如槎節節有細蹙文起紫黑色光潤百足死則側卧如環長二三寸大者如小指古墻壁中甚多入藥至鮮時珍曰馬蚿處處有之形大如蚯蚓紫黑色其足比比至百而皮極硬節節有橫文如金線首尾一般大觸之即側卧局縮如環不必死也能毒雞犬陶氏所謂土蟲乃蛆蜒也死亦側踡如環雞喜食之當以李當之之説為準也正誤藏器曰按土蟲無足如一條衣帶長四五寸身扁如韭葉背上有黃黑襇頭如鏟子行處有白涎生濕地雞嗅即死陶云土蟲似蜈蚣者乃蚰蜒非色土蟲亦非馬陸也蘇云馬陸如蚰蜒亦誤矣按蚰蜒黃不斑其足無數時珍曰按假成式酉陽雜俎云度古俗呼土蠱身形似衣帶色類蚯蚓長一尺餘首如鏟背上有黃黑橺梢觸即斷常趂蚓掩之則蚓化為水有毒雞食之輒死據此則陳藏器所謂土蟲者蓋土蠱也陶氏誤以蚰蜒為馬陸陳氏亦誤以土蠱為土蟲矣修治雷曰凡收得馬陸以粳頭炒至粳焦黑取出去粳竹刀刮去頭足研末用氣味辛溫有毒主治腹中大堅癥破積聚息肉惡瘡白秃本經療寒熱痞結脅下滿别録辟邪瘧時珍發明時珍曰馬陸係神農藥雷氏備載炮灸之法而古方鮮見用者惟聖惠逐邪丸用之其方治久瘧發歇無時用百節蟲四十九枚濕生蟲四十九枚砒霜三錢粽子角七枚五月五日日未出時于東南上尋取兩般蟲至午時向南研勻丸小豆大每發日早男左女右手把一丸嗅之七遍立效修時忌孝子婦人師尼雞犬見之亦合别録療寒熱之説大抵毒物止可外用不敢輕入丸散中山蛩蟲拾遺集解藏器曰生山林間狀如百足而大烏斑色長二三寸更有大如指者名馬陸能登木羣吟已見本經時珍曰按本經馬陸一名百足狀如大蛩而此云狀如百足而大更大者為馬陸則似又指百足為一物矣蓋此即馬陸之在山而大者耳故曰山蛩雞犬皆不敢食之氣味有大毒主治人嗜酒不已取一節燒灰水服便不喜聞酒氣過一節則毒人至死又燒黑傅惡瘡亦治蠶病白僵燒灰粉之藏器附録蚰蜒拾遺藏器曰狀如蜈蚣而甚長色正黃不斑大者如叉股其足無數好脂油香故入人耳及諸竅中以驢乳灌之即化為水時珍曰處處有之牆屋爛草中尤多狀如小蜈蚣而身圓不扁尾後秃而無岐多足大者長寸餘死亦踡屈如環故陶𢎞景誤以為馬陸也其入人耳用龍腦地龍硇砂單吹之皆效或以香物引之淮南子云菖蒲去蚤虱而來蛉蛩即此蟲也揚雄方言云一名入耳一名蚨虷一名䖡蚭一名蜟蚳又一種草鞋蟲形亦相似而身扁亦能入人耳中蠼螋拾遺音瞿搜藏器曰狀如小蜈蚣色青黑長足可能溺人影令人發瘡如熱痱而大若繞腰匝不療山中者溺毒更猛惟扁豆葉傅之即瘥諸方大有治法時珍曰蠼螋喜伏氍㲣之下故得此名或作蛷螋按周禮赤茇氏凡隙屋除其貍蟲蛷螋之屬乃求而搜之也其蟲隱居牆壁及器物下長不及寸狀如小蜈蚣青黑色二鬚六足足在腹前尾有又岐能夾人物俗名搜夾子其溺射人影令人生瘡身作寒熱古方用犀角汁雞腸草汁馬鞭草汁梨葉汁茶葉末紫草末羊髭灰鹿角末燕窠土但得一品塗之皆效孫真人千金方云豫曾六月中得此瘡經五六日治不愈有人教畫地作蠼螋形以刀細取腹中土以唾和塗之再塗即愈方知萬物相感莫曉其由蚯蚓本經下品釋名螼蚓音頃引朐䏰音蠢閏堅蠶音遣忝蜿蟺音阮善曲蟺土蟺綱目土龍别録地龍子藥性寒蜸寒蚓附蚓吳普歌女時珍曰蚓之行也引而後申其塿如丘故名蚯蚓爾雅謂之螼蚓巴人謂之朐䏰皆方音之轉也蜿蟺曲蟺象其狀也東方虬賦云乍逶迤而鱔曲或宛轉而蛇行任性行止擊物便曲是矣術家言蚓可興雲又知隂晴故有土龍龍子之名其鳴長吟故曰歌女大明曰路上踏殺者名千人踏入藥更良集解别録曰白頸蚯蚓生平土三月取暴乾𢎞景曰入藥用白頸是其老者取得去土鹽之日暴須臾成水道術多用其屎呼為蚓塿亦曰六一泥以其食細泥無沙石入合丹泥釡用時珍曰今處處平澤膏壤地中有之孟夏始出仲冬蟄結雨則先出晴則夜鳴或云結時能化為百合也與蛗螽同穴為雌雄故郭璞贊云蚯蚓土精無心之蟲交不以分睡于蛗螽是矣今小兒隂腫多以為此物所吹經驗方云蚯蚓咬人形如大風眉鬚皆落惟以石灰水浸之良昔浙江將軍張韶病此每夕蚯蚓鳴於體中有僧教以鹽湯浸之數遍遂瘥宗奭曰此物有毒崇寧末年隴州兵士暑月跣足為蚯蚓所中遂不救後數日又有人被其毒或教以鹽湯浸之并飲一杯乃愈也修治𢎞景曰若服乾蚓須熬作屑斆曰凡收得用糯米泔浸一夜漉出以無灰酒浸一日焙乾切每一兩以蜀椒糯米各二錢半同熬至米熟揀出用時珍曰入藥有為末或化水或燒灰者各隨方法白頸蚯蚓氣味鹹寒無毒權曰有小毒之才曰畏蔥鹽主治蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲本經化為水療傷寒伏熱狂謬大腹黃疸别録溫病大熱狂言飲汁皆瘥炒作屑去蛔蟲去泥鹽化為水主大行諸熱小兒熱病癲癎塗丹毒傅漆瘡藏器蔥化為汁療耳聾蘇恭治中風癎疾喉痺日華解射菵毒蜀本炒為末主蛇傷毒藥性治腳風蘇煩主傷寒瘧疾大熱狂煩及大人小兒小便不通急慢驚風歷節風痛腎臟風注頭風齒痛風熱赤眼木舌喉痺鼻瘜聤耳秃瘡瘰癧卵腫脫肛解蜘蛛毒療蚰蜒入耳時珍發明𢎞景曰乾蚓熬作屑去蛔蟲甚有效宗奭曰腎臟風下注病不可闕也頌曰腳風藥必須此物為使然亦有毒有人因腳病藥中用此果得竒效病愈服之不輟至二十餘日覺躁憒但欲飲水不已遂致委頓大抵攻病用毒藥中病即當止也震亨曰蚯蚓屬土有水與木性寒大解熱毒行濕病時珍曰蚓在物應土德在星禽為軫水上食稿壤下飲黃泉故其性寒而下行性寒故能解諸熱疾下行故能利小便治足疾而通經絡也術家云蚓血能柔弓弩恐亦誑言爾諸家言服之多毒而郭義恭廣志云閩越山蠻啖蚯蚓為羞豈地與人有不同與附方舊九新三十四傷寒熱結六七日狂亂見鬼欲走以大蚓半斤去泥用人溺煮汁飲或生絞汁亦可肘後方陽毒結胸按之極痛或通而復結喘促大躁狂亂取生地龍四條洗淨研如泥入生薑汁少許蜜一匙薄荷汁少許新汲水調服若熱熾者加片腦少許即與揉心下片時自然汗出而解不應再服一次神效傷寒藴要諸瘧煩熱太燥用上方服之甚效亦治瘴瘧直指小便不通蚯蚓搗爛浸水濾取濃汁半碗服立通斗門老人尿閉白頸蚯蚓茴香等分杵汁飲之即愈朱氏集驗方小兒尿閉乃熱結也用大地龍數條去泥入蜜少許研傅莖卵仍燒蠶蛻紙硃砂龍腦麝香同研少許以麥門冬燈心煎湯調服全幼小兒急驚五福丸用生蚯蚓一條研爛入五福化毒丹一丸同研以薄荷湯少許化下普濟方云梁國材言洋州進士李彥直家專貨此藥一服千金以糊十口梁傳其方親試屢驗不可不筆於册以救嬰兒驚風悶亂乳香丸治小兒慢驚風心神悶亂煩懊筋脈拘急胃虛蟲動反折啼叫用乳香半錢胡粉一錢研勻以白頸蚯蚓生揑去上搗爛和丸麻子大每服七丸至十五丸蔥白煎湯下普濟方慢驚虛風用平正附子去皮臍生研為末以白頸蚯蚓於末內衮之候定刮蚓上附末丸黃米大每服十丸米飲下百一方急慢驚風五月五日取蚯蚓竹刀截作兩段急跳者作一處慢跳者作一處各研爛入硃砂末和作丸記明急驚用急跳者慢驚用慢跳者每服五七丸薄荷湯下應驗方小兒卵腫用地龍連土為末津調傅之錢氏方勞復卵腫或縮入腹中絞痛身體重頭不能舉小腹急熱拘急欲死用蚯蚓二十四枚水一斗煮取三升頓服取汗或以蚯蚓數升絞汁服之並良肘後方手足腫痛欲斷取蚓三升以水五升絞汁二升半服之肘後代指疼痛蚯蚓杵傅之聖惠風熱頭痛地龍炒研薑汁半夏餅赤茯苓等分為末一字至半錢生薑荆芥湯下普濟頭風疼痛龍珠丸用五月五日取蚯蚓和腦麝杵丸梧子大每以一丸納鼻中隨左右先塗薑汁在鼻立愈總録偏正頭痛不可忍者聖惠龍香散用地龍去土焙乳香等分為末每以一字作紙撚燈上燒煙以鼻嗅之淡寮方加人指甲等分云徐介翁方也每服一捻香爐上慢火燒之以紙筒引煙入鼻熏之口噙冷水有涎吐去仍以好茶一盞點呷即愈風赤眼痛地龍十條灸為末茶服三錢聖惠風蟲牙痛鹽化地龍水和麵納齒上又以皂莢去皮研末塗上蟲即出又同玄胡索篳茇末塞耳普濟牙齒裂痛死曲蟺為末傅之即止千金翼齒縫出血不止用地龍末枯礬各一錢麝香少許研勻擦之聖惠方牙齒動搖及外物傷動欲落諸藥不效者乾地龍炒五倍子炒等分為末先以生薑揩牙後傅擦之御藥院方木舌腫滿不治殺人蚯蚓一條以鹽化水塗之良久漸消聖惠方咽喉卒腫不下食地龍十四條搗塗喉外又以一條著鹽化水入蜜少許服之方聖惠喉痺塞口普濟用韭地紅小蚯蚓數條醋擂取食之即吐出痰血二三碗神效以聖惠用地龍一條研爛雞子白攪和灌入即通鼻中瘜肉地龍炒一分牙皂一挺為末蜜調塗之清水滴盡即除聖惠耳卒聾閉蚯蚓入鹽安蔥內化水點之立效勝金聤耳出膿生地龍釡上墨生豬脂等分研勻蔥汁和捻作挺子綿裹塞之聖惠方用地龍為末吹之耳中耵聹乾結不出用白蚯蚓入蔥葉中化為水滴耳令滿不過數度即易挑出蚰蜒入耳地龍為末入蔥內化水點入則蚰蜒亦化為水聖惠方白秃頭瘡乾地龍為末入輕粉麻油調搽普濟方瘰癧潰爛流串者用荆芥根下段煎湯溫洗良久看瘡破紫黑處以針刺去血再洗三四次用韭菜地上蚯蚓一把五更時收取炭火上燒紅為末每一匙入乳香沒藥輕粉各半錢穿山甲九片灸為末油調傅之如神此武進朱守仁所傳有驗方保命集龍纒瘡毒水缸底蚯蚓一條連泥搗傳即愈蜘蛛咬瘡遍身皆有以蔥一枚去尖頭將蚯蚓入葉中緊揑兩頭勿令泄氣頻搖動即化為水以點咬處甚效談氏小兒方陽證脫肛以荆芥生薑煎湯洗之用地龍蟠如錢樣者去土一兩朴硝二錢為末油調傅之全幼心鑑中蠱下血如爛肝者以蚯蚓十四枚苦酒三升潰至蚓死服水已死者皆可治肘後方癘風痛癢白頸蚯蚓去土以棗肉同搗丸梧子大每美酒下六十丸忌薑蒜活人心統對口毒瘡已潰出膿取韭地蚯蚓搗細涼水調傅日換三四次扶壽精耳聾氣閉蚯蚓川芎藭各兩半為末每服二錢麥門冬湯下服後低頭伏睡一夜一服三夜立效聖濟總録口舌糜瘡地龍吳茱萸研末醋調生麵和塗足心立效摘玄方蚯蚓泥見土部蝸牛瓜媧渦三音别録中品釋名蠡牛蠡音螺藥性蚹螺爾雅音附螺䗂蝓爾雅音移俞山蝸𢎞景蝸螺山海經作倮櫐蜒蚰螺俗名土牛兒𢎞景曰蝸牛山蝸也形似瓜字有角如牛故名莊子所謂戰於蝸角是矣時珍曰其頭偏戾如蝸其形盤旋如渦故有媧渦二者不獨如瓜字而已其行延引故曰蜒蚰爾雅謂之蚹螺孫炎注云以其負螺殼而行故名蚹螺集解負殼景曰蝸牛生山中及人家頭形如蛞蝓但背殼耳大明曰此即負殼蜒蚰也保升曰蝸牛生池澤草樹間形似小螺白色頭有四黑角行則頭出驚則首尾俱縮入殼中頌曰凡用蝸牛以形圓而大者為勝久雨乍晴竹林池沼間多有之其城牆隂處一種扁而小者無力不堪用時珍曰蝸身有涎能制蜈蝎夏熱則自懸葉下往往升高涎枯則自死也氣味鹹寒有小毒畏鹽主治賊風喎僻踠跌大腸脫肛筋急及驚癎别録生研汁飲止消渴甄權治小兒臍風撮口利小便消喉痺止鼻衄通耳聾治諸腫毒痔漏制蜈蚣蝎蠆毒研爛塗之時珍發明頌曰入嬰孩藥最勝時珍曰蝸牛所主諸病大抵取其解熱消毒之功耳附方舊二新十九小便不通蝸牛搗貼臍下以手摩之加麝香少許更妙易間大腸脫肛聖惠治大腸久積虛冷每因大便脫肛用蝸牛一兩燒灰豬脂和傅立縮又治上症及痢後脫肛用乾蝸牛一百枚炒研每用一錢以飛過赤汁磁石末五錢水一盞煎半盞調服日三痔瘡腫痛丹溪用蝸牛浸油塗之或燒研傅之次濟生用蝸牛一枚入麝香少許在內碗盛日取水塗之發背初起活蝸牛二百箇以新汲水一盞湯瓶中封一夜取涎水入真蛤粉旋調掃傅瘡上日十餘度熱痛止則瘡便愈集驗方瘰癧未潰連殼蝸牛七箇丁香七粒同燒研紙花貼之危氏瘰癧已潰蝸牛燒研輕粉少許用豬脊髓調傅危氏方喉痺腫塞用蝸牛綿裹水浸含咽須臾立通咽又用蝸牛七枚白梅肉三枚研爛綿含立效喉風腫痛端午日午時取蜒蚰十餘條同鹽三四箇小瓶內封固俟化成水收水點之唐氏喉塞口噤蜒蚰灸二七枚白梅肉炒二七枚二錢研為末每水調半錢服得吐立礬半生半燒通聖惠方耳腮痄腫及喉下諸腫用蝸牛同麵研傅之面上毒瘡初起者急尋水蜒蚰一二條用醬少許共搗塗紙上貼之即退紙上留一小孔出氣此乃凌漢章祕傳極效方也談野翁試驗方赤白翳膜生蝸牛一枚搗丹砂末于內火上灸沸以綿染汁傅眥中日二聖惠方鼻血不止蝸牛煿乾一枚烏賊骨半錢研末吹之聖濟總録撮口臍風乃胎熱也用蝸牛五枚去殼研汁塗口取效乃止勻又方用蝸牛十枚去殼研爛入蒔蘿末半分研塗之取效甚良滴耳聾閉蝸牛膏用蝸牛一兩石膽鍾乳粉各二錢半為末瓷盒盛之火煅赤研末入片腦一字每以酒調一字滴入耳中無不愈者並聖惠方蚰蜒入耳蝸牛椎爛置于耳邊即出也瑞竹堂方染鬚方用蜒蚰四十條以京墨水養之三日埋馬屎中一月取出以白絲頭試之如即黑到尾再入馬屎中埋七日再取試之性緩乃以撚鬚庶不致黑皮膚也普濟方消渴引飲不止崔元亮海上方用蝸牛十四枚形圓而大者以水三合密器浸一宿取水飲之不過一劑愈聖惠用蝸牛焙半兩蛤粉龍膽草桑根白皮炒各二錢半研末每服一錢楮葉湯下蝸殼主治一切疳疾頌牙𧈟面上赤瘡鼻上酒􅖟久利下脫肛時珍附方舊二新一一切疳疾用自死蝸殼七枚皮薄色黃白者洗淨不得少有塵滓日乾內酥蜜于殼中以瓷盞盛之紙糊盞面置吹飯上蒸之下饋時即坐甑中仍裝飯又蒸飯熟取出研如水淀漸漸與喫一日令盡取效止韋丹方牙𧈟作痛蝸牛殼三十枚燒研日日揩之良聖惠大腸脫肛蝸牛殼去土研末羊脂溶化調塗送入即愈李延夀方蛞蝓音濶俞品本經中釋名陵蠡音螺本經附蝸别録土蝸同托胎蟲俗鼻涕蟲俗蜒蚰螺詳下文集解别録曰蛞蝓生太山池澤及隂地沙石垣下八月取之𢎞景曰蛞蝓無殼不應有蝸名附蝸即蝸牛也豈以其頭形似蝸牛故亦名蝸與保升曰蛞蝓即蝸牛也而别録復有蝸牛一條雖數字不同而主療無别是後人誤出正如草部有雞腸而復出蘩縷也按爾雅云附螺螔蝓郭注云蝸牛也玉篇亦云螔蝓蝸牛也此則一物明矣形似小螺白色生池澤草樹間頭有四角行則角出驚之則縮首尾俱能藏入殼中蘇恭以蛞蝓為無殼蝸牛非矣今本經一名陵蠡别録又有土蝸馬名蝸蠡皆螺殼之屬不應無殼也今下濕處有一種蟲大黃蝸牛無殼而有角者云是蝸牛之老者也宗奭曰蛞蝓蝸牛二物也蛞蝓二角身肉止一段蝸牛四角背上别有肉以負殼行若為一物經中焉得分為二條蜀本又謂蛞蝓為蝸牛之老者甚無謂也時珍曰按爾雅無蛞蝓止云蚹螺螔蝓郭注云蝸牛也别録無螔蝓止云蛞蝓一名蚹蝸據此則螔蝓是蚹螺蛞蝓是蚹蝸蓋一類二種如蝦蟇與蛙故其主治功用相似而皆制蜈蠍名謂稱呼相通而俱曰蝸與蜒蚰螺也或以為一物或以為二物者皆失深考惟許慎説文云蚹螺背負殼者曰蝸牛無殼者曰蛞蝓一言決矣正誤𢎞景曰蛞蝓入三十六禽限又是四種角蟲之類營室星之精方家無復用者恭曰陶説誤矣三十六禽亥上有壁水貐乃毫豬毛如蝟簪山海經云貐彘身人面音如嬰兒爾雅云猰㺄類貙迅走食人三者並非蛞蝓蛞蝓乃無殼蝸蠡也氣味鹹寒無毒主治賊風喎僻軼筋及脫肛驚癎攣縮本經軼喎苦乖切口戾也音跌車轉也蜈蚣蠍毒衍義腫毒焮熱熱瘡腫痛時珍發明宗奭曰蜈蜈畏蛞蝓不過所行之路觸其身即死故人取以治蜈蚣毒時珍曰按蔡絛鐵圍叢話云嶠南地多蜈蚣大者二三尺螫人致死惟見托胎蟲則局促不行蟲乃登其首陷其腦而死故人以此蟲生搗塗蜈蚣傷立時疼痛止也又大全良方云痔熱腫痛者用大蛞蝓一箇研泥入龍腦一字燕脂坯子半錢同傅之先以石薜煮水熏洗尤妙五羊大帥趙尚書夫人病此止以蛞蝓京墨研塗亦妙大抵與蝸牛同功附方新一腳脛爛瘡臭穢不可近用蜒蚰十條瓦焙研末油調傅之立效救急方緣桑螺類證釋名桑牛天螺綱目集解慎微曰此螺全似蝸牛黃色而小雨後好援桑葉時珍曰此螺諸木上皆有獨取桑上者正如桑螵蛸之意氣味缺主治大腸脫肛燒研和豬脂塗之立縮慎微出范汪方治小兒驚風用七枚焙研米飲服時珍出宮氣方發明震亨曰小兒驚風以蜜丸通聖散服之間以桑樹上牛兒隂乾焙研為末服之以平其風時珍曰桑牛蝸牛蛞蝓三物皆一類而形略殊故其性味功用皆相倣佛而桑牛治驚又與殭蠶螵蛸同功皆食桑者其氣能入肝平風也溪鬼蟲拾遺釋名射工拾遺射影詩疏水弩同抱槍雜俎含沙詩注短狐廣雅水狐玄記蜮音或勢時珍曰此蟲足角如弩以氣為矢因水含沙以射人影成病故有射弩諸名酉陽雜俎謂之抱槍云大如蛣蜣腹下足刺似槍螫人有毒也玄中記云視其形蟲也見其氣鬼也其頭喙如狐也五行傳云南方淫惑之氣所生故謂之蜮詩云如鬼如蜮則不可得即此物也集解藏器曰射工出南方有溪毒處山林間大如雞子形似蛣蜣頭有一角長寸餘角上有四岐黑甲下有翅能飛六七月取之沙氣多短狐則生鸀鳿鸂鶒之屬治之慎微曰玄中記云水狐蟲長三四寸其色黑廣寸許背上有甲厚三分其口有角向前如弩以氣射人去二三步即中人十死六七也博物志云射工江南山溪水中甲蟲也長一二寸口有弩形以氣射人影令人發瘡不治殺人周禮壼涿氏掌除水蟲以抱土之鼓驅之以禁石投之即此物也時珍曰射工長二三寸廣寸許形扁前濶後狹頗似蟬狀故抱朴子言其狀如鳴蜩也腹軟背硬如鱉負甲黑色故陸機言其形如鱉也六七月甲下有翅能飛作鉍鉍聲濶頭尖喙有二骨眼其頭目醜黑如狐如鬼喙頭有尖角如爪長一二分有六足如蟹足二足在喙下大而一爪四足在腹下小而岐爪或時雙屈前足抱拱其喙正如橫弩上矢之狀冬則蟄於谷間所居之處大雪不積氣起如蒸掘下一尺可得隂乾留用蟾蜍鴛鴦能食之鵝鴨能辟之故禽經云鵝飛則蜮沉又有水虎亦水狐之類有鬼彈乃溪毒之類葛洪所謂溪毒似射工而無物者皆此屬也並附之附録水虎時珍曰襄沔記云中廬縣有涑水注沔中有物如三四嵗小兒甲如鱗鯉射不能入秋曝沙上膝頭似虎掌爪常沒水出膝示人小兒弄之便咬人人生得者摘其鼻可小小使之名曰水虎鬼彈又按南中志云永昌郡有禁水惟十一二月可渡餘月則殺人其氣有惡物作聲不見其形中人則青爛名曰鬼彈角主治帶之辟溪毒藏器隂乾為末佩之亦辟射工毒時珍子出抱朴發明時珍曰按葛洪肘後方云溪毒中人一名中水一名中溪一名水病似射工而無物春月多病之頭痛惡寒狀如傷寒二三日則腹中生蟲食人下部漸蝕五臟注下不禁雖良醫不能療也初得則下部若有瘡正赤如截肉為陽毒最急若瘡如蟲囓為隂毒小緩皆殺人不過二十日方家用藥與傷寒溫病相似或以小蒜煮湯浴之及諸藥方又云江南射工毒蟲在山間水中人行或浴則此蟲含沙射人形影則病有四種初得皆如傷寒或似中惡一種遍身有黑黶子四邊悉赤犯之如刺一種作瘡久即穿陷一種突起如石一種如火灼熛瘡也療之並有方法王允論衡云短狐含太陽毒氣而生故有弓矢射人中人如火灼也沙蝨綱目釋名􅵙䗠音楩旋廣雅蓬活萬畢術地牌集解時珍曰按郭義恭廣志云沙蝨在水中色赤大不過蟣入人皮中殺人葛洪抱朴子云蝨水陸皆有之雨後人晨暮踐沙必著人如毛髮刺人便入皮裏可以針挑取之正赤如丹不挑入肉能殺人凡遇有此蟲處行還以火灸身則蟲隨火去也又肘後方云山水間多沙蝨甚細略不可見人入水中及隂行草中此蟲多著人鑽入皮裏令人皮上如芒針刺赤如黍豆刺三日之後寒熱發瘡蟲漸入骨則殺人嶺南人初有此以茅葉或竹葉挑刮去之仍塗苦苣汁已深者針桃取蟲于正如疥蟲也愚按溪毒射工毒沙蝨毒三者相近俱似傷寒故有挑沙刮沙之法今俗病風寒者皆以麻及桃栁枝刮其遍身亦曰刮沙盎始於刮沙病也沙病亦曰水沙水傷寒初起如傷寒頭痛壯熱嘔惡手足指末微厥或腹痛悶亂須臾殺人者謂之攪腸沙也附録沙蟲時珍曰按録異記云潭袁處吉等州有沙蟲即毒蛇鱗甲中蟲蛇被苦每入急水中碾出人中其毒三日即死此亦沙蝨之類也水黽拾遺釋名水馬拾遺集解藏器曰水黽羣遊水上水涸即飛長寸許四腳非海馬之水馬也時珍曰水蟲甚多此類亦有數種今有一種水爬蟲扁身大腹而背硬者即此也水爬水馬之訛耳一種水蠆長身如蝎能變蜻蜓氣味有毒主治令人不渴殺雞犬藏器䜴蟲拾遺釋名䜴母蟲集解時珍曰陳藏器拾遺有䜴蟲而不言出處形狀按葛洪肘後方云江南有射工蟲在溪澗中射人影成病或如傷寒或似中惡或口不能語或惡寒熱四肢拘急身體有瘡取水上浮走䜴母蟲一枚口中含之便瘥已死亦活此蟲正黑如大豆浮遊水上也今有水蟲大如豆而光黑即此矣名䜴母者亦象豆形也氣味有毒主治殺禽獸蝕息肉傅惡瘡藏器白梅裏含之除射工毒時珍砂挼子拾遺釋名倒行狗子拾遺睡蟲同上集解藏器曰是處有之生砂石中作旋孔大如大豆背有刺能倒行性好睡亦呼為睡蟲氣味有毒主治生取置枕中令夫婦相好合射罔用能殺飛禽走獸藏器蛔蟲拾遺釋名蛔音回俗作蛔並與蛔同人龍綱目集解時珍曰蛔人腹中長蟲也按巢元方病源云人腹有九蟲伏蟲長四分羣蟲之主也蛔蟲長五六寸至一尺發則心腹作痛上下口喜吐涎及清水貫傷心則死白蟲長一寸色白頭小生育轉多令人精氣損弱腰腳疼長一尺亦能殺人肉蟲狀如爛杏令人煩悶肺蟲狀如蠶令人嗽嗽成勞殺人胃蟲狀如蝦蟇令人嘔逆喜噦弱蟲又名鬲蟲狀如瓜瓣令人多唾赤蟲狀如生肉動作腹鳴蟯蟲至微形如菜蟲居胴腸中令人生癰疽疥癬瘑癘痔瘻疳𧈟齲齒諸病諸蟲皆依腸胃之間若人臟腑氣實則不為害虛則侵蝕變生諸疾也又有尸蟲與人俱生為人大害其狀如犬馬尾或如薄筋依脾而居三寸許有頭尾凡服補藥必須先去此蟲否則不得藥力凡一切癥瘕久皆成蟲紫庭真人云九蟲之中六蟲傳變為勞瘵而胃蛔寸白三蟲不傳其蟲傳變或如嬰兒如鬼形如蝦蟇如守宮如蜈蚣如螻蟻如蛇如鱉如蝟如鼠如蝠如蝦如豬肝如血汁如亂髮亂絲等狀凡蟲在腹上旬頭向上中旬向中下旬向下服藥須於月初四五日五更時則易效也張子和云巢氏之衍九蟲詳矣然蟲之變不可勝窮要之皆以濕熱為主蟲得木氣乃生得雨氣乃化豈非風木主熱雨澤主濕耶故五行之中皆有蟲諸木有蠧諸果有螬諸菽有蚄五穀有螟螣蝥蠈麥杇蛾飛栗破蟲出草腐螢化皆木之蟲也烈火有鼠爛灰生蠅皆火之蟲也穴蟻牆蠍田螻石蝪皆土之蟲也蝌斗馬蛭魚鱉蛟龍皆水之蟲也昔有冶工破一釡見其斷處臼中有一蟲如米蟲色正赤此則金中亦有蟲也氣味大寒主治目中膚赤熱痛取大者洗淨斷之令汁滴目中三十年膚赤亦瘥藏器治一切眼疾及生膚翳赤白膜小兒胎赤風赤眼燒末傅之或以小兒吐出者隂乾為末入汞粉少許唾津調塗之又治一切冷瘻時珍附方新三玉筯煎治小兒胎赤眼風赤眼用小兒吐出蛔蟲二條磁盒盛之紙封埋濕地五日取出化為水磁瓶收每日以銅筯點之普濟方逺年風眼赤暗用蛔蟲五條日乾為末膩粉一錢石膽半錢為末點之日二三度普濟方一切冷瘻人吐蛔蟲燒灰先以甘草湯洗淨塗之無不瘥者慎口味千金方風驢肚內蟲綱目集解時珍曰凡人畜有風病瘡病腸肚內必有蟲聖惠方治目翳用此物云以烏驢者為良也主治目中膚翳取三七枚曝乾入石膽半錢同研磁盒收藏勿令見風每日點三五次其翳自消聖惠蠱蟲拾遺釋名時珍曰造蠱者以百蟲置皿中俾相啖食取其存者為蠱故字從蟲從皿皿器也集解藏器曰古人愚質造蠱圖富皆取百蟲入甕中經年開之必有一蟲盡食諸蟲即此名為蠱能隱形似鬼神與人作禍然終是蟲鬼咬人至死者或從人諸竅中出信候取之曝乾有患蠱人燒灰服之亦是其類自相伏耳又云凡蠱蟲療蠱是知蠱名即可治之如蛇蠱用蜈蚣蠱蟲蜈蚣蠱用蝦蟇蠱蟲蝦蟇蠱用蛇蠱蟲之類是相伏者乃可治之時珍曰按蠱毒不一皆是變亂元氣多因飲食行之與人為患則蠱主吉利所以小人因而造之南方又有蜥蝪蠱蜣蜋蠱馬蝗蠱金蠶蠱草蠱桃生蠱等毒諸方大有主治之法不能悉紀主治蠱毒燒灰服少許立愈藏器金蠶綱目釋名食錦蟲集解時珍曰按陳藏器云故錦灰療食錦蟲蠱毒注云蟲屈如指環食故緋帛錦如蠶之食葉也今考之此蟲即金蠶也蔡絛叢話云金蠶始於蜀中近及湖廣閩粵浸多狀如蠶金色日食蜀錦四寸南人畜之取其糞置飲食中以毒人人即死也蠶得所欲日置他財使人暴富然遣之極難水火兵刃所不能害必倍其所致金銀錦物置蠶於中投之路旁人偶收之蠶隨以往謂之嫁金蠶不然能入人腹殘囓腸胃完然而出如尸蟲也有人守福清民訟金蠶毒治求不得或令取兩刺蝟入其家捕之必獲蝟果於榻下牆隙擒出夫金蠶甚毒若有鬼神而蝟能制之何耶又幕府燕間録云池州進士鄒閬家貧一日啓户護一小籠內有銀器持歸覺股上有物蠕蠕如蠶金色爛然遂撥去之仍復在舊處踐之斫之投之水火皆即如故閬以問友人友人曰此金蠶也備告其故閬歸告妻云吾事之不可送之家貧何以生為遂吞之家人謂其必死寂無所苦竟以壽終豈至誠之盛妖不勝正耶時珍竊謂金蠶之蠱為害甚大故備書二事一見此蠱畏蝟一見至誠勝邪也夷堅志言中此蠱者吮白礬味甘嚼黑豆不腥以石榴根皮煎汁吐之醫學正傳用樟木屑煎汁吐之亦一法也愚意不若以蝟皮治之為勝其天附録諸蟲綱目一種拾遺二種别録五種唼臘蟲時珍曰按裴淵廣州記云林任縣有甲蟲嗜臭肉人死食之都盡紛紛滿屋不可驅張華博物志云廣州西南數郡人將死便有飛蟲狀如麥集入舍中人死便食不可斷遣惟殘骨在乃去惟以梓板作器則不來林邑國記云廣西南界有唼臘蟲食死人惟豹皮覆尸則不來此三説皆一物也其蟲雖不入藥而為人害不可不知灰藥拾遺藏器曰出嶺南陶家狀如青灰以竹筒盛之云是蛔所作凡以拭物令人喜好相愛置家中損小兒雞犬也黃蟲别録有名未用曰味苦主寒熱生地上赤頭長足有角羣居七月七日採之地防又曰令人不飢不渴生黃陵狀如蠕居土中梗雞又曰味甘無毒主治痺益符又曰主閉一名無舌蜚厲又曰主婦人寒熱本草綱目卷四十二
