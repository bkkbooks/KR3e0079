body:
  text: 本草綱目卷三十七目録木之四寓木類一十二種茯苓本經琥珀别録瑿嘉祐豬苓本經雷丸本經桑上寄生本經松蘿本經楓栁唐本桃寄生綱目栁寄生綱目占斯别録石刺木拾遺右附方舊十五新四十木之五苞木類四種竹本經天竹黄開寶仙人杖嘉祐鬼齒拾遺右附方舊十七新二十木之六雜木類七種附録一十九種淮木本經城東腐木别録東家雞栖木拾遺古厠木拾遺古櫬板拾遺震燒木拾遺河邊木拾遺右附方新一本草綱目卷三十七目録
