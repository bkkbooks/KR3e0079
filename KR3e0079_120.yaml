body:
  text: 夲草綱目卷五十一下明李時珍撰獸之二獸類十四種狐别録下品釋名時珍曰埤雅云狐孤也狐性疑疑則不合類故從孤或云狐知虚實以虚擊實實即孤也亦通集解𢎞景曰江東無狐狐岀北方及益州形似貍而黄善為魅恭曰形似小黄狗鼻尖尾大全不似貍恭曰今江南時有之汴洛尤多性多疑審聽故捕者多用罝時珍曰南北皆有北方最多有黄黑白三種白色者尤稀尾有白錢文者佳日伏穴夜出竊食聲如嬰兒氣極臊烈毛皮可為裘腋毛純白謂之狐白許慎云妖獸鬼所乘也有三德其色中和小前大後死則首丘或云狐知上伏不度阡陌或云狐善聽氷或云狐有媚珠或云狐至百歲禮北斗變為男婦以惑人又能擊尾以出火或云狐魅畏狗千年老狐以千年枯木燃照則見真形或云犀角置穴狐不敢歸山海經云青丘之山有狐九尾能食人食之不蠱鼎曰狐媚見人或乂手有禮或祇揖無度或静處獨語或祼形見人肉氣味甘温無毒詵曰有小毒禮記云食狐去首為害人也主治同腸作臛食治瘡疥久不瘥蘇恭煑炙食補虚損及五臟邪氣患蠱毒寒熱者宜多食之孟詵作膾生食暖中去風補虚勞蘇頌附方舊一狐肉羔治驚病恍惚語言錯謬歌笑無度及五臟積冷蠱毒寒熱諸病用狐肉一斤及五臟治凈入豉汁煑熟入五味作羮或作粥食京中以羊骨汁鯽魚代豉汁亦妙心鏡五臟及腸肚氣味苦微寒有毒主治蠱毒寒熱小兒驚癎别録補虚勞随臟而補治惡瘡疥生食治狐魅日華作羮臛治大人見鬼孟詵肝燒灰治風癎及破傷風口𦂳搐強時珍鑑古方治諸風驚癎有狐肝散及衛生寳神應散普濟方治破傷中風金烏散中並用之附方新四勞瘧瘴瘧野狐肝一具隂乾重五日五更初北斗下受氣為末粳米作丸菉豆大每以一丸緋帛裹繫手中指男左女右聖惠方鬼瘧寒熱野狐肝膽一具新瓶内隂乾阿魏一分為末醋糊丸芡子大發時男左女右把一丸嗅之仍以緋帛包一丸置手中指聖惠中惡蠱毒臘月狐腸燒末水服方寸七千金牛病疫疾㳟曰狐腸燒灰水灌之勝獺也膽臘月收之主治人卒暴亡即取雄狐膽温水研灌入喉即活移時者無及矣蘇頌信出續傳方辟邪瘧解酒毒時珍術萬畢云狐血漬黍令人不醉高誘註云以狐血漬黍米麥門冬隂乾為丸飲時以一丸置舌下含之令人不醉也附方新一狐膽丸治邪瘧發作無時狐膽一箇砞砂砒霜各半兩阿魏麝香黄丹菉豆粉各一分以為末五月五日午時用粽子尖和丸梧子大空心及發前冷醋湯服二丸忌熱物聖惠方隂莖氣味甘微寒有毒思邈曰有小毒主治女子絶産隂中痒小兒隂㿗卵腫别録婦人隂脫時珍附方新一小兒隂腫狐隂莖炙為末空心酒服千金方頭主治燒之辟邪同貍頭燒灰傅瘰癧時珍千金目主治破傷中風時珍發明時珍曰狐目治破傷風方見劉氏保夀堂方云神效無比臘月收取狐目隂乾臨時用二目一副炭火微燒存性研末無灰酒服之又淮南萬畢術云狐目貍腦䑕去其穴謂塗穴辟鼠也鼻主治狐魅病同豹鼻煑食時珍唇主治惡刺入肉杵爛入鹽封之聖惠口中涎液主治入媚藥嘉謨曰取法小口瓶盛肉置狐常行處狐爪不得徘徊於上涎入瓶中乃收之也四足主治痔漏下血時珍附方新一痔漏反花瀉血者用狐手足一副隂乾穿山甲蝟皮各三兩黄明膠白附子五靈脂蜀烏頭川芎藭乳香各二兩剉細入砂鍋内固濟候乾炭火煆紅為末入木香末一兩以芫荽煎酒調下二錢日三服屢效永類鈐方皮主治辟邪魅時珍尾主治燒灰辟惡日華疫頭尾燒灰治牛和水灌之雄狐屎恭曰在竹木及石上尖頭者是也主治燒之辟惡别録去瘟疫氣蘇恭治肝氣心痛顔色蒼蒼如死灰喉如喘息者以二升燒灰和薑黄三兩搗末空腹酒下方寸匕日再甚效蘇頌海出崔元亮上方療惡刺入肉燒臘月豬脂封之千金附方舊一新一鬼瘧寒熱雄狐屎蝙蝠屎各一分為末醋糊丸芡子大發時男左女右手把一丸嗅之一切惡瘻中有冷瘜肉者用正月狐糞乾末食前新汲水下一錢日二千金貉音鶴衍義校正原係猯下今分出釋名時珍曰按字説云貉與獾同穴各處故字從各説文作貈亦作狢爾雅貈子曰貊音陌其子曰貓音惱原本以貊作貆者訛矣集解宗奭曰貉形如小狐毛黄褐色時珍曰貉生山野間狀如貍頭鋭鼻尖斑色其毛深厚温滑可為裘服與獾同穴而異處日伏夜出捕食蟲物出則獾隨之其性好睡人或蓄之以竹叩醒已而復寐故人好睡者謂之貉睡俗作渴睡謬矣俚人又言其非好睡乃耳聾也故見人乃知趨走考工記云貉踰汶則死土氣使然也王浚川言北曰狐南曰貉星禽書言氐土貉是千歲獨狐化成者並非也肉氣味甘温無毒主治元臟虚勞及女子虚憊蘇頌貒音湍草唐本釋名獾㹠藏器豬獾時珍曰貒團也其狀團肥也爾雅云貒子曰䝏其足蹯其跡夙歹蹯足掌也夙歹指頭跡也集解頌曰貒似犬而矮尖喙黑足褐色與獾貉三種大抵相類而頭足小别郭璞註爾雅云貒一名獾以為一物然方書説其形狀差别也宗奭曰貒肥矮毛微灰色頭連脊毛一道黑短尾尖嘴而黑蒸食極美時珍曰貒即今豬獾也處處山野間有之穴居狀似小豬㹠形體肥而行鈍其耳聾見人乃走短足短尾尖喙褐毛能孔地食蟲蟻𤓰果其肉帶土氣皮毛不如狗獾蘇頌所註乃狗獾非貒也郭璞謂獾即貒亦誤也肉氣味甘酸平無毒主治水脹久不瘥垂死者作羔食之下水大效蘇恭豉聖惠用粳米葱作粥食服丹石動熱下痢赤白久不瘥煑肉露一宿空腹和醬食一頓即瘥瘦人煑和五味食長肌肉孟詵肉宗奭曰野獸中惟貒最甘美益瘦人治上氣虗乏欬逆勞熱和五味煑食吳瑞膏主治蜣蜋蠱毒胸中哽噎怵怵如蟲行欬血以酒和服或下或吐或自消也崔行功胞主治蠱毒以臘月乾者湯摩如雞子許空腹服之唐本草骨主治上氣欬嗽多研酒服三合日二取瘥孟詵獾食物釋名狗獾音歡天狗時珍曰獾又作貆亦狀其肥鈍之貎蜀人呼為天狗集解汪頴曰狗獾處處山野有之穴土而居形如家狗而脚短食果實有數種相似其肉味甚甘美皮可為裘時珍曰貒猪獾也獾狗獾也二種相似而畧殊狗獾似小狗而肥尖喙矮足短尾深毛褐色皮可為裘領亦食蟲蟻爪果又遼東女直地面有海獾皮可供衣裘亦此類也肉氣味甘酸平無毒主治補中益氣宜人汪頴小兒疳瘦殺蛕蟲宜噉之蘇頌功與貒同時珍木狗綱目集解時珍曰按熊太古冀越集云木狗生廣東左右江山中形如黑狗能登木其皮為衣縟能運動血氣元世祖有足疾取以為袴人遂貴重之此前所未聞也珍甞聞蜀人言川西有𤣥豹大如狗黑色尾亦如狗其皮作裘縟甚暖冬月逺行用其皮包肉食數日猶温彼土亦珍貴之此亦木狗之屬也故附見於此云皮主治除脚痺風濕氣活血脉暖腰膝時珍豺音儕草唐本釋名犲狗時珍曰按字説云豺能勝其類又知祭獸可謂才矣故字從才埤雅云豺柴也俗名體瘦如豺是矣集解時珍曰豺處處山中有之狼屬也俗名犲狗其形似狗而頗白前矮後高而長尾其體細瘦而健猛其毛黄褐色而鬇鬡其牙如錐而噬物辟行虎亦畏之又喜食羊其聲如犬人惡之以為引魅不祥其氣臊臭可惡羅願云世傳狗為豺之舅見狗輙跪亦相制耳肉氣味酸熱有毒詵曰豺肉食之損人精神消人脂肉令人瘦皮氣味熱主治冷痺軟脚氣熟之以纒裹病上即瘥蘇恭療諸疳痢腹中諸瘡煑汁飲或燒灰酒服之亦可傅䘌齒瘡孟詵又曰燒灰和酒灌解槽牛馬便馴良附人治小兒夜啼百法不效同狼屎中骨燒灰等分水服少許即定時珍録出總狼拾遺釋名毛狗時珍曰禽書云狼逐食能倒立先卜所向獸之良者也故字從良爾雅云牡曰貛牝曰狼其子曰獥音呌集解藏器曰狼大如狗蒼色鳴聲則諸孔皆沸時珍曰狼犲屬也處處有之北方尤多喜食之南人呼為毛狗是矣其居有穴其形大如犬而鋭頭尖喙白頰駢脇高前廣後脚不甚高能食雞鴨鼠物其色雜黄黑亦有蒼灰色者其聲能大能小能作兒啼以魅人野俚尤惡其冬鳴其腸直故鳴則後竅皆沸而糞為烽烟直上不斜其性善顧而食戾踐藉老則其胡如袋所以䟦胡疐尾進退兩患其象上應奎星頴曰狽足前短能知食所在狼足後短負之而行故曰狼狽狼筋藏器曰狼筋如織絡袋子又若筋膠所作大小如鴨卵人有犯盗者熏之即脚攣縮因之獲賊也或言是狼䏶下筋又言是蟲所作未知孰是時珍曰按李石續博物志云唐時有狼巾一作狼筋狀如大蝸兩頭光帶黄色有叚祐失金帛集奴婢於庭焚之一婢臉瞤乃竊器者此即陳氏所謂狼筋也愚謂其事盖術者所為未必實有是理而羅氏爾雅翼觧為狼䏶中筋大於雞卵謬矣肉氣味鹹熱無毒味勝狐犬主治補益五臟厚腸胃填骨髓腹有冷積者宜食之時珍正出飲膳要膏主治補中益氣潤燥澤皺塗諸惡瘡時珍發明時珍曰臘月煉凈收之禮記云小切狼臅膏與稻米為􅓞謂以狼胸臆中膏和米作粥縻也古人多食狼肉以膏煎和飲食故内則食狼去腸周禮獸人冬獻狼取其膏聚也諸方亦時用狼之靨牙皮糞而夲草並不著其功用止有陳藏器述狼筋疑似一説可謂缺矣今通據飲膳正要諸書補之云牙主治佩之辟邪惡氣刮末水服治猘犬傷燒灰水服方寸匕治食牛中毒時珍諸出小品方喉靨主治噎病日乾為末每以半錢入飯内食之妙聖惠皮主治暖人辟邪惡氣嗉下皮搓作條勒頭能去風止痛正要皮淮南子萬畢術云狼當戸羊不敢出尾主治繫馬胸前辟邪氣令馬不驚正要屎主治瘰癧燒灰油調封之又治骨哽不下燒灰水服之時珍金出外臺千方屎中骨主治小兒夜啼燒灰水服二黍米大即定又能斷酒千金附方新一破傷風狼虎穿腸骨四錢炙黄桑花蟬蜕各二錢為末每服一錢米湯調下若口乾者不治經騐方兎别録中品釋名明眎時珍曰按魏子才六書精要云兎字篆文象形一云吐而生子故曰兎禮記謂之明眎言其目不瞬而瞭然也説文兎子曰婏音萬狡兎曰㕙音俊曰􅀢音䜛梵書謂兎為舍迦集解頌曰兎處處有之為食品之上味時珍曰按事類合壁云兎大如貍而毛褐形如䑕而尾短耳大而鋭上唇缺而無脾長鬚而前足短尻有九孔趺居趫㨗善走䑛雄豪而孕五月而吐子其大者為㚟音綽似兎而大青色首與兎同足與鹿同故字象形或謂兎無雄而中秋望月中顧兎以孕者不經之説也今雄兎有二卵古樂府有雄兎脚撲速雌兎眼迷離可破其疑矣主物簿云孕環之兎懷於左腋毛有文采至百五十年環轉於腦能隱形也王廷相雅述云兎以潦為鼈鼈以旱為兎熒惑不明則雉生兎肉氣味辛平無毒詵曰酸冷時珍曰甘塞按内則云食兎去尻不利人也風俗通云食兎髕多令人面生髕骨𢎞景曰兎肉為羮益人妊娠不可食令子缺唇不可合白雞肉及肝心食令人靣黄合獺肉食令人病遁尸與薑橘同食令人心痛霍亂又不可同芥食藏器曰兎尻有孔子從口出故妊婦忌之非獨為缺脣也大抵乆食絶人血脉損元氣陽事令人痿黄八月至十月可食餘月傷人神氣兎死而眼合者殺人主治補中益氣别録熱氣濕痺止渇健脾炙食壓丹石毒日華臘月作醬食去小兒豌豆瘡藥性凉血解熱毒利大腸時珍發明宗奭曰兎者明月之精有白毛者得金之氣入藥尤效凡兎至秋深時可食金氣全也至春夏則味變矣然作醬必用五味既患豌豆瘡又食此物發毒太甚恐斑爛損人時珍曰兎至冬月齕木皮已得金氣而氣内實故味美至春食草麥而金氣衰故不美也今俗以飼小兒云令出痘稀盖亦因其性寒而觧熱耳故又能治消渴壓丹石毒若痘已出及虚寒者宜戒之劉純治例云反胃結腸甚者難治常食兎肉則便自行又可證其性之寒利矣附方舊一消渇羸痩用兎一隻去皮𤓰五臟以水一斗半煎稠去滓澄冷渴即飲之極重者不過二兎方崔元亮海上血氣味鹹寒無毒主治凉血活血解胎中熱毒催生易産時珍附方新六蟾宫丸乾坤秘韞治小兒胎毒遇風寒即發痘疹服此可免雖出亦稀用兎二隻臘月八月刺血於漆盤内以細麵炒熟和丸緑豆大每服三十丸緑豆湯下每一兒食一劑永安甚效楊氏經騐方加硃砂三錢酒下名兎砂丸兎血丸小兒服之終身不出痘瘡或出亦稀少臘月八日取生兎一隻刺血和蕎麥麵少加雄黄四五分候乾丸如緑豆大初生小兒以乳汁送下二三丸遍身發出紅㸃是其徴騐也但兒長成常以兎肉啖之尤妙劉氏保壽堂方催生丹治産難臘月兎血以蒸餅染之紙裹隂乾為末每服二錢乳香湯下指迷方心氣痛瑞竹堂方用臘兎血和茶末四兩乳香末二兩搗丸芡子大每温醋化服一丸譚埜翁方臘月八日取活兎血和麫丸梧子大每白湯下二十一丸腦主治塗凍瘡别録催生滑胎時珍同髓治耳聾蘇恭附方舊二新二催生散用臘月兎腦髓一箇攤紙上夾匀隂乾剪作符子于面上書生字一箇候母痛極時用釵股夾定燈上燒灰煎丁香酒調下博濟方催生丹臘月取兎腦髓一箇塗紙上吹乾入通明乳香末二兩同研令匀於臘日前夜安桌子上露星月下設茶果齋戒焚香望北拜告曰大道弟子某修合救世上難生婦人藥願降威靈佑助此藥速令生産禱畢以紙包藥露一夜天未明時以豬肉搗和丸芡子大紙袋盛懸透風處每服一丸温醋湯下良乆未下更用冷酒下一丸即瘥乃神仙方也經騐方手足皸裂用兎腦髓生塗之聖惠發腦發背及癰疽熱癤惡瘡用臘月兎頭搗爛入瓶内宻封惟乆愈佳毎用塗帛上厚封之熱痛即如水也頻換取瘥乃止勝金骨主治熱中消渇煑汁服别録消頌曰崔元亮海上方治渴羸瘦小便不禁兎骨和大麥苖煑汁服極效煑汁服止霍亂吐利時珍之外臺用治鬼疰瘡疥刺風日華塗藏器曰醋磨乆疥妙頭骨臘月收之氣味甘酸平無毒主治頭眩痛癲疾别録連皮毛燒存性米飲服方寸匕治天行嘔吐不止以瘥為度蘇頌力出必效連毛燒灰酒服治産難下胎及産後餘血不下日華陸氏用葱湯下燒末傅婦人産後隂脫癰疽惡瘡水服治小兒疳痢煑汁服治消渇不止時珍附方舊一新一預解痘毒十二月取兎頭煎湯浴小兒凉熱去毒令出痘稀飲膳正要産後腹痛兎頭炙熱摩之即定必效肝主治目暗别録明目補勞治頭旋眼眩日華丸和决明子作服甚明目切洗生食如羊肝法治丹石毒發上衝目暗不見物孟詵發明時珍曰按劉守真云兎肝明目因其氣有餘以補不足也眼科書云兎肝能瀉肝熱盖兎目瞭而性冷故也附方新一風熱目暗肝腎氣虚風熱上攻目腫暗用兎肝一具米三合和豉汁如常煑粥食濟普皮毛臘月收之主治燒灰酒服方寸匕治産難及胞衣不出餘血搶心脹刺欲死者極驗蘇恭煎湯洗豌豆瘡藥性頭皮灰主䑕瘻及鬼疰毒氣在皮中如鍼刺者毛灰主炙瘡不瘥藏器皮灰治婦人帶下毛灰治小便不利餘見敗筆下時珍附方舊一新一婦人帶下兎皮燒烟盡為末酒服方寸匕以瘥為度外臺火燒成瘡兎腹下白毛胋之候毛落即瘥百一方屎臘月收之釋名明月砂聖惠翫月砂集騐兎蕈炮炙論主治目中浮瞖勞瘵五疳疳瘡痔瘻殺蟲解毒時珍發明時珍曰兎屎能觧毒殺蟲故治目疾疳勞瘡痔方中徃徃用之諸家本草並不言及亦缺漏也按沈存中良方云江隂萬融病勞四體如焚寒熱煩躁一夜夢一人腹擁一月光明使人心骨皆寒及寤而孫元規使人遺藥服之遂平扣之則明月丹也乃悟所夢附方舊二新五明月丹治勞瘵追蟲用兎屎四十九粒硇砂如兎屎大四十九粒為末生蜜丸梧子大月望前以水浸甘草一夜五更初取汁送下七丸有蟲下急鉗入油鍋内煎殺三日不下再服效良蘇沈方五疳下痢兎屎炒半兩乾蝦蟇一枚燒灰為末綿裹如蓮子大納下部日三易之方聖惠大小便祕明月砂一匙安臍中冷水滴之令透自通也聖惠痔瘡下蟲不止者用翫月砂慢火炒黄為末每服二錢入乳香五分空心温酒下日三服即兎糞也集騐方月蝕耳瘡望夜取兎屎納蝦蟇腹中同燒末𫝊之肘後痘瘡入目生瞖用兎屎日乾為末每服一錢茶下即安普濟方痘後目瞖直徃山中東西地上不許囘顧尋兎屎二七粒以雌雄檳榔各一枚同磨不落地井水調服百無一失其效如神藺氏經騐方敗筆唐本草集解時珍曰上古殺青書竹帛至蒙恬以兎毫作筆後世復以羊䑕諸毛為之惟兎毫入藥用筆頭灰氣味微寒無毒主治水服治小便不通小便數難淋瀝隂腫脫肛中惡唐本酒服二錢治男子交婚之夕莖萎藥性酒服二錢治難産漿飲服二錢治咽㗋痛不下飲食時珍方出范汪發明時珍曰筆不用新而用敗者取其沾濡膠墨也膠墨能利小便胎産故耳附方舊二新一小便不通數而微腫用陳乆筆頭一枚燒灰水服外臺心痛不止敗筆頭三箇燒灰無根水服立效經騐方難産催生勝金方聖妙寸金散用敗筆頭一枚燒灰研生藕汁一盞調下立産若母虚弱及素有冷疾者温汁服之陸氏治難産第一方用兎毫筆頭三箇燒灰金箔三片以蠟和丸酒服山獺綱目集解時珍曰山獺出廣之宜州嵠峒及南丹州土人號為揷翹其性淫毒山中有此物凡牝獸皆避去獺無偶則抱木而枯􅀈女春時成羣入山以采物為事獺聞婦人氣必躍來抱之次骨而入牢不可脱因扼殺之負歸取其隂一枚直金一兩若得抱木死者尤竒貴峒獠甚珍重之私貨出界者罪至死然本地亦不常有方士多以䑕璞猴胎僞之試之之法但令婦人摩手極熱取置掌心以氣呵之即趯然而動盖隂氣所感也此説出范石湖虞衡志周草窗齊東野語中而不載其形狀亦缺文也隂莖氣味甘熱無毒主治陽虚隂痿精寒而清者酒磨少許服之獠人以為補助要藥時珍骨主治解藥箭毒研少許敷之立消時珍水獺别録下品釋名水狗時珍曰王氏字説云正月十月獺兩祭魚知報本反始獸之多賴者其形似狗故字從犬從頼大者曰獱音賔曰猵音編又桓譚鹽鐵論以獨為猵羣為獺如猨之與獨也集解𢎞景曰獺多出溪岸邊有兩種入藥惟取以魚祭天者一種獱獺形大而頸如馬身似蝙蝠不入藥用頌曰江湖多有之四足俱短頭與身尾皆褊毛色若故紫帛大者身與尾長三尺餘食魚居水中亦休木上甞縻置大水甕中在内旋轉如風水皆成旋渦西戎以其皮飾毳服領袖云垢不着染如風霾瞖目但就拭之即去也時珍曰獺狀似青狐而小毛色青黒似狗膚如伏翼長尾四足水居食魚能知水信為穴鄉人以占潦旱如鵲巢知風也古有熊食鹽而死獺飲酒而斃之語物之性也今川沔漁舟徃徃馴畜使之捕魚甚㨗亦有白色者或云獱獺無雌以猨為雌故云猨鳴而獺候肉氣味甘鹹寒無毒思邈曰甘温𢎞景曰不可雜兎肉食主治煑汁服療疫氣温病及牛馬時行病别録水氣脹滿熱毒風日華骨蒸熱勞血脉不行榮衛虚滿及女子經絡不通血熱大小腸祕消男子陽氣不宜多食蘇頌發明詵曰患熱毒風水虚脹者取水獺一頭去皮連五臟及骨頭炙乾為末水服方寸七日二服十日瘥若冷氣虚脹者服之甚益也只治熱不治冷為其性寒耳附方舊一折傷水獺一箇支觧入罐内固濟待乾煆存性為末以黄米煑粥攤患處糁獺末於粥上布裹之立止疼痛經騐後方肝頌曰諸畜肝葉皆有定數惟獺肝一月一葉十二月十二葉其間又有退葉用之須見形乃可騐不爾多僞也氣味甘温有毒甄權曰鹹微熱無毒頌曰肉及五臟皆寒惟肝温也主治鬼疰蠱毒止久嗽除魚鯁竝燒灰酒服之别録治上氣咳嗽虚勞嗽病藥性傳尸勞極虚汗客熱四肢寒瘧及産勞蘇頌殺蟲時珍發明宗奭曰獺肝治勞用之有騐頌曰張仲景治冷勞有獺肝丸崔氏治九十種蠱疰傳尸骨蒸伏連殗􅀈諸鬼毒癘疾有獺肝丸二方俱妙詵曰疰病一門悉患者以肝一具火燒水服方寸匕日再服之葛洪云尸疰鬼疰乃五尸之一又挾諸鬼邪為害其病變動乃有三十六種至九十九種大畧使人寒熱沉沉黙黙不知病之所苦而無處不惡積月累年淹滯至死死後傳之乃至滅門覺有此候惟以獺肝一具隂乾為末水服方寸匕日三以瘥為度時珍曰按朝野僉載云五月五日午時急砍一竹竹節中必有神水瀝取和獺肝為丸治心腹積聚病甚效也附方舊二新一鬼魅獺肝末水服方寸匕日三千金翼腸痔有血獺肝燒末水服一錢後肘方下血不止用獺肝一副煑熟入五味食之妙飲膳正要腎氣味同肉主治益男子蘇頌膽氣味苦寒無毒主治眼翳黒花飛蠅上下視物不明入㸃藥中蘇頌正誤宗奭曰古語云蟾肪軟玉獺肝分盃謂以膽塗竹刀或犀角箆上畫酒中即分也甞試之不騐盖妄傳耳但塗盃唇使酒稍高於盞靣耳不可不正之附方新一月水不通獺肝丸用乾獺膽一枚乾狗膽硇砂川椒炒去汗目各一分水蛭炒黄十枚為末醋糊丸緑豆大每服五丸當歸酒下日一服聖惠方髓主治去瘢痕時珍發明時珍曰按集異記云吳主鄧夫人為如意傷頰血流啼呌太醫云得白獺髓雜玉與琥珀傅之當滅此痕遂以百金購得白獺合膏而痊但琥珀太多猶有赤㸃如痣骨主治含之下魚骨鯁陶𢎞景煑汁服治嘔噦不止藥性足主治手足皴裂蘇恭煑汁服治魚骨鯁并以爪爬㗋下藏器為末酒服殺勞瘵蟲時珍皮毛主治煑汁服治水癊病亦作褥及履屧着之藏器産母帶之易産張傑屎主治魚臍瘡研末水和敷之即膿出痛止藏器曰亦主驢馬蟲顙及牛疫疾研水灌之治下痢燒末清旦飲服一小盞三服愈赤用赤糞白用白糞時珍録出古今騐海獺拾遺集解藏器曰海獺生海中似獺而大如犬脚下有皮如胼拇毛着水不濡人亦食其肉海中又有海牛海馬海驢等皮毛在陸地皆候風潮猶能毛起説出博物志時珍曰大獱小獺此亦獺也今人以其皮為風領云亞於貂焉如淳注博物志云海獱頭如馬自腰以下似蝙蝠其毛似獺大者五六十斤亦可烹食腽肭獸上烏忽切下女骨切宋開寶附釋名骨豽説文作貀與肭同海狗時珍曰唐韻腽肭肥貎或作骨貀訛為骨訥皆畨言也集解藏器曰骨肭獸生西畨突厥國胡人呼為阿慈勃他你其狀似狐而大長尾臍似麝香黄赤色如爛骨甄權曰腽肭臍是新羅國海内狗外腎也連而取之李珣曰按臨海志云出東海水中狀若鹿形頭似狗長尾每日出即浮在水面崑崙家以弓矢射之取其外腎隂乾百日味甘香美也頌曰今東海旁亦有之舊説似狐長尾今滄州所圖乃是魚類而豕首兩足其臍紅紫色上有紫斑㸃全不相類醫家多用之異魚圖云試其臍於臘月衝風處置盂水浸之不凍者為真也斆曰腽肭臍多僞者海中有獸號曰水烏龍海人取其腎以充腽肭臍其物自别眞者有一對則兩重薄皮裹丸核其皮上自有肉黄毛一穴三莖收之器中年年濕潤如新或置睡犬頭上其犬忽驚跳若狂者為真也宗奭曰今出登莱州其狀非狗非獸亦非魚也但前脚似獸而尾即魚身有短宻淡青白毛毛上有深青黑㸃乆則亦淡腹脇下全白色皮厚靱如牛皮邊將多取以飾鞍韉其臍治腹臍積冷衰脾腎勞極有功不待别試也似狐長尾之説今人多不識之時珍曰按唐書云骨貀獸出遼西營州及結骨國一統志云腽肭臍出女直及三佛齊國獸似狐脚高如犬走如飛取其腎漬油名腽肭臍觀此則似狐之説非無也盖似狐似鹿者其毛色爾似狗者其足形也似魚者其尾形也入藥用外腎而曰臍者連臍取之也又異物志豽獸出朝鮮似貍蒼黑色無前兩足能捕䑕郭璞云晉時召陵扶夷縣獲一獸似狗豹文有角兩脚據此則豽有水陸二種而藏器所謂似狐長尾者其此類與膃肭臍一名海狗腎修治斆曰用酒浸一日紙裹炙香剉搗或於銀器中以酒煎熟合藥時珍曰以漢椒樟腦同收則不壞氣味鹹大熱無毒李珣曰味甘香美大温主治鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸痩藏器治男子宿癥氣塊積冷勞氣腎精衰損多色成勞痩悴藥性補中益腎氣暖腰膝助陽氣破癥結療驚狂癎疾日華五勞七傷隂痿少力腎虚背膊勞悶面黒精冷最良海藥發明時珍曰和劑局方治諸虚損有腽肭臍丸今之滋補丸藥中多用之精不足者補之以味也大抵與蓯蓉𤨏陽之功相近亦可同糯米法麵釀酒服猾音滑論炮炙集解斆曰海中有獸名曰猾其髓入油中油即沾水水中生火不可救止以酒噴之即滅不可於屋下收故曰水中生火非猾髓而莫能時珍曰此獸之髓水中生火與樟腦相同其功亦當與樟腦相似也第今無識之者獸之三䑕類一十二種内附九種䑕别録下品校正舊在蟲魚部今據爾雅移入獸部釋名䶆䑕音錐老䑕綱目首䑕史記家鹿時珍曰此即人家常䑕也以其尖喙善穴故南陽人謂之鼪䑕其壽最長故俗稱老䑕其性疑而不果故曰首䑕嶺南人食而諱之謂為家鹿䑕字篆文象其頭齒腹尾之形集解𢎞景曰入藥用牡䑕即父鼠也其膽纔死便消不易得也時珍曰䑕形似兎而小青黑色有四齒而無牙長鬚露眼前爪四後爪五尾文如織而無毛長與身等五臟俱全肝有七葉膽在肝之短葉間大如黄豆正白色貼而不垂衛生家寳方言其膽紅色者何耶䑕孕一月而生多者六七子惠州獠民取初生閉目未有毛者以蜜養之用獻親貴挾而食之聲猶唧唧謂之蜜唧淮南子云魚食巴豆而死䑕食巴豆而肥叚成式云䑕食鹽而身輕食砒而即死易云艮為䑕春秋運斗樞云玉樞星散而為䑕抱朴子云䑕夀三百歲善慿人而卜名曰仲能知一年中吉悉凶及千里外事䑕類頗繁爾雅説文所載後世未能知後世所知者二書復未盡載可見格物無窮也附録鼨䑕音終郭璞云其大如拳其文如豹漢武帝曾獲得以問終軍者䶄䑕音平許慎云一名䶃䑕音含斑文􅂒􅂒音離艾孫愐云小䑕也相啣而行李時珍云按秦記及草木子皆載群䑕數萬相啣而行以為䑕妖者即此也鼩鼱音劬精似䑕而小即今地䑕也又爾雅説文有鼸鼶鼮鼣鼭鼤䶅䶈八䑕皆無考證音歉斯廷吠時文鶴博也水䑕李時珍云似䑕而小食菱芡魚蝦或云小魚小蟹所化也氷䑕東方朔云生北荒積氷下皮毛甚柔可為席卧之却寒食之已熱火䑕李時珍云出西域及南海火州其山有野火春夏生秋冬死䑕産於中甚大其毛及草木之皮皆可織布汚則燒之即潔名火浣布鼵䑕音突郭璞云鳥䑕同穴山在今隴西首陽山之西南其鳥為䳜音涂狀如家雀而黄黒色其䑕為鼵狀如家䑕而色小黄尾短鳥居穴外䑕居穴内蹷䑕音蹶爾雅云北方有比肩獸蹷與卬卬巨虚比為囓甘草即有難卬卬巨虚負而走其名曰蹷李時珍曰今契丹及交河北境有跳兎頭目毛色皆似兎而𤓰足似䑕前足僅寸許後足近尺尾亦長其端有毛一跳數尺止即蹷仆此即蹷䑕也土人掘食之郭璞以卬卬巨虚為獸名兎前鼠後張揖註漢書云卬卬青獸狀如馬巨虚似騾而小本草稱巨虚食菴䕡子而仙則是物之至駿者也牡䑕氣味甘微温無毒日華曰凉牝鼠並不入藥主治療踒折續筋骨生擣傅之三日一易别録豬脂煎膏治打撲折傷凍瘥湯火傷詵曰臘月以油煎枯去滓熬膏收用頌曰油煎入蠟𫝊湯火傷滅瘢痕極良煎油治小兒驚癎日華五月五日同石灰搗收傅金瘡神效時珍煎膏治諸瘡瘻臘月燒之辟惡氣𢎞景正梅師云旦朝所居處埋䑕辟瘟疫也發明劉完素曰䑕善穿而用以治瘡瘻者因其性而為用也附方舊五新八䑕瘻潰爛䑕一枚亂髪一雞子大以三歳臘豬脂煎令消盡以半塗之以半酒服姚云不傳之妙法也葛氏滅諸瘢痕大䑕一枚以臘豬脂四兩煎至銷盡濾凈日塗三五次先以布拭赤避風普濟方瘡腫熱痛靈䑕膏用大雄䑕一枚清油一斤煎焦滴水不散濾再煎下炒紫黄丹五兩栁枝不住攪匀滴水成珠下黄蠟一兩熬帶黑色成膏甆瓶收之出火毒每用攤貼去痛而凉經騐方潰癰不合老䑕一枚燒末傅之千金方蛇骨刺人痛甚用死䑕燒傅肘后破傷風病角弓反頭和尾牙噤肢強用䑕一灰以臘豬脂和傅之師梅項強身急取活䑕去五臟乘熱貼之即瘥也婦人狐瘕因月水來或悲或驚或逢疾風暴雨被濕致成狐瘕精神恍惚令人月水不通胸脇腰背痛引隂中小便難嗜食欲嘔如有孕狀其瘕手足成形者殺人未成者可治用新䑕一枚以新絮裹之黄泥固住入地坎中桑薪燒其上一日夜取出去絮入桂心末六銖為末每酒服方寸匕不過二服當自下外臺素女經令子易産取䑕燒末井花水服方寸匕日三子母秘録乳汁清少死䑕一頭燒末酒服方寸匕勿令婦知同上杖瘡腫痛未毛䑕同桑椹子入麻油中浸釀臨時取塗甚效西湖志湯火傷瘡小老䑕泥包燒研菜油調塗之談埜翁方小兒傷乳腹脹煩悶欲睡燒鼠二枚為末日服二錢湯下保㓜大全䑕肉已下並用牡鼠氣味甘熱無毒主治小兒哺露大腹炙食之别録小兒疳疾腹大貪食者黄泥裹燒熟去骨取肉和五味豉汁作羮食之勿食骨甚瘦人孟詵主骨蒸勞極四肢勞痩殺蟲及小兒疳痩酒熬入藥蘇頌炙食治小兒寒熱諸疳時珍附方舊三新一水鼓石水腹脹身腫者以肥䑕一枚取肉煑粥空心食之兩三頓即愈心鏡小兒癥瘕老䑕肉煑汁作粥食之姚和衆方乳汁不通䑕肉作羮食勿令知之書産箭鏃入肉大雄䑕一枚取肉薄批焙研每服二錢熱酒下瘡痒則出矣集要肝主治箭鏃不出搗塗之聤耳出汁每用棗核大乗熱塞之能引蟲也時珍膽主治目暗𢎞景㸃目治青盲雀目不見物滴耳治聾時珍發明時珍曰癸水之位在子氣通於腎開竅於耳注精於瞳子其標為齒鼠亦屬子宮癸水其目夜明在卦屬艮其精在膽故膽能治耳聾青盲晴能明目而骨能生齒皆腎病也諸家本草不言䑕膽治聾而葛洪肘后方甚穪其妙云能治三十年老聾若卒聾者不過三度也有人側卧瀝膽入耳盡膽一箇須臾汁從下耳出初時益聾十日乃瘥矣後世群方祖此亦多用之附方舊一新三耳卒聾閉以䑕膽汁二枚滴之如雷鳴時即通本事方多年老聾衛生家寶方勝金透關散用活䑕一枚繫定熱湯浸死破㗋取膽真紅色者是也用川烏頭一箇炮去皮華隂細辛二錢膽礬半錢為末以膽和匀再焙乾研細入麝香半字用鵝翎管吹入耳中口含茶水日二次十日見效永除根本取聖惠治乆聾臘月取䑕膽二枚熊膽一分水和旋緑豆大滴耳中日二次青盲不見雄䑕膽鯉魚膽各二枚和匀滴之立效聖惠方䑕印即外腎也主治令人媚恱時珍曰按南宮從岣嶁神書鼠印合歡註云雄䑕外腎之上有文似卬兩腎相對有符篆朱文九遍者尤佳以十一二月或五月五日七月七日正月朔旦子時面北向子位刮取隂乾如篆刻下佩於青囊中男左女右繫臂上人見之無不懽悦所求如心也脂主治湯火傷蘇頌耳聾時珍附方新一耳聾䑕脂半合青鹽一錢蚯蚓一條同和化以綿蘸捻滴耳中塞之聖惠方腦主治針棘竹木諸刺在肉中不出搗爛厚塗之即出箭鏑針刃在咽㗋胸膈諸隐處者同肝擣塗之又塗小兒解顱以綿褁塞耳治聾時珍總出肘后録頭主治瘻瘡鼻􅖟湯火傷瘡時珍附方舊一新二鼻􅖟濃血正月取䑕頭燒灰以臘月豬脂調敷之外臺湯火傷灼死䑕頭以臘月豬脂煎令消盡傅之則不作瘢神效千金方斷酒不飲臘䑕頭燒灰柳花末等分每睡時酒服一盃千金目主治明目能夜讀書術家用之陶𢎞景發明見膽下附方舊一目澀好眠取一目燒研和魚膏㸃入目皆兼以絳囊盛兩枚佩之肘后涎氣味有毒墜落食中食之令人生䑕瘻或發黄如金脊骨主治齒折多年不生者研末日日揩之甚効藏器發明見膽下牙雷公炮炙論序云長齒生賴雄䑕之骨末附方新一牙齒疼痛老䑕一箇去皮以硇砂擦上三日肉爛化盡取骨瓦焙為末入蟾酥二分樟腦一錢每用少許㸃牙根上立止孫氏集效方四足及尾主治婦人墮胎易出别録燒服催生日華皮主治燒灰封癰疽口冷不合者生剝貼附骨疽瘡即追膿出時珍糞𢎞景曰兩頭尖者是牡䑕屎氣味甘微寒無毒時珍曰有小毒食中誤食令人目黄成疸主治小兒疳疾大腹葱豉同煎服治時行勞復别録頌曰張仲景及古今名方多用之治癎疾明目日華煑服治傷寒勞復發熱男子隂易腹痛通女子月經下死胎研末服治吹奶乳癰解馬肝毒塗䑕瘻瘡燒存性傅折傷疔腫諸瘡猫犬傷時珍發明時珍曰䑕屎入足厥隂經故所治皆厥隂血分之病上列諸證是矣附方舊八新十五傷寒勞復外臺用雄䑕屎二十枚豉五合水二升煑一升頓服活人書䑕屎豉湯治勞復發熱用雄䑕屎二七枚巵子十四枚枳殻三枚為粗末水一盞葱白二十豉三十粒煎一盞分三服男子隂易及勞復豭䑕屎湯用豭䑕屎兩頭尖者十四枚韭根一大把水二盞煎一盞温服得粘汗為效未汗再服南陽活人方大小便秘雄䑕屎末傅臍中立效普濟室女經閉牡䑕屎一兩炒研空心温酒服二錢千金方子死腹中雄䑕屎二七枚水三升煑一升取汁作粥食胎即下産後隂脫以温水洗軟用雄䑕屎燒烟熏之即入熊氏婦人吹奶鼠屎七粒紅棗七枚去核包屎燒存性入麝香少許温酒調服集要方乳癰初起雄䑕屎七枚研末温酒服取汗即散壽域方乳癰已成用新濕䑕屎黄連大黄各等分為末以黍米粥清和塗四邊即散姚僧坦方䑕瘻潰壊新䑕屎一百粒收宻器中五六十日杵碎即傅之效千金方疔瘡惡腫䑕屎亂髮等分燒灰針瘡頭納入大良普濟方鬼擊吐血胸腹刺痛鼠屎燒末水服方寸匕不省者灌之肘后方折傷瘀血傷損筋骨疼痛䑕屎燒末豬脂和傅急裹不過半日痛止梅師方中馬肝毒雄鼠屎三七枚和水研飲之梅師馬咬踏瘡腫痛作熱䑕屎二七枚故馬鞘五寸和燒研末豬脂調敷之梅師狂犬咬傷䑕屎二升燒末傅之梅師方猫咬成瘡雄䑕屎燒灰油和傅之曽經効騐壽域兒齒不生雌䑕屎兩頭圓者三七枚一日一枚拭其齒勿食鹹酸或入麝香少許尤妙小品小兒白秃䑕屎瓦煆存性同輕粉麻油塗之妙百一方小兒鹽齁䑕屎燒研水酒空心服之一歲一錢小兒燕窩生瘡䑕屎研末香油調搽毒蛇傷螫野鼠屎水調塗之邵真人經騐方壤土見鼹䑕音偃品别録下釋名田䑕禮記鼢䑕音憤隐䑕時珍曰田䑕偃行地中能壅土成坌故得諸名集解别録曰鼹䑕在土中行五月取令乾燔之𢎞景曰此即鼢䑕也一名隱䑕形如䑕而大無尾黑色尖鼻甚强常穿地中行討掘即得今山林中别有大如水牛者一名隱䑕藏器曰隱䑕隂穿地中而行見日月光則死於深山林木下土中有之其大如牛者名同物異耳頌曰處處田隴間多有之月令田䑕化為鴽者即此其形類䑕而肥多膏旱歲為田害宗奭曰鼹脚絶短僅能行尾長寸許目極小項尤短最易取或安竹弓射取飼鷹陶引如水牛者釋之誤矣時珍曰許慎言鼢乃伯勞所化月令季春田䑕化為鴽夏小正八月鴽為䑕是二物交化如鷹鳩然也鴽乃鶉類隆慶辛未夏秋大水蘄黄頻江之地鼢䑕遍野皆櫛魚所化蘆稼之根囓食殆盡則鼢之化不獨一種也肉氣味鹹寒無毒主治燔之療癰疽諸瘻蝕惡瘡隂䘌爛瘡别録久食去風主瘡疥痔瘻藏器治風熱久積血脉不行結成癰疽可消又小兒食之殺蚘蟲蘇頌膏主治摩諸瘻藏器糞主治蛇虺螫傷腫痛研末豬脂調塗時珍壤土見隠䑕拾遺釋名鼴䑕音偃偃䑕綱目䑕母同鼳古役反集解𢎞景註鼹䑕曰諸山林中有獸大如水牛形似豬灰赤色下脚似象胸前尾上皆白有力而鈍亦名隱䑕人取食之肉亦似牛多以作脯乃云是䑕王其精溺一滴落地輙成一鼠灾年則多出也藏器曰此是獸類非䑕之儔大如牛而前脚短皮入鞦轡用莊子所謂鼴䑕飲河不過滿腹者陶言是䑕王精滴成䑕遍訪山人無其説亦不能土中行此乃妄説陶誤信爾頌曰鼴䑕出滄州及胡中似牛而䑕首黑足大者千斤多伏於水又能堰水放沫彼人食其肉時珍曰按異物志云䑕母頭脚似䑕口鋭蒼色大如水牛而畏狗見則主水灾晋書云宣城郡出隱䑕大如牛形似䑕褲脚類象而驢蹄毛灰赤色胸前尾上白色有力而鈍金樓子云晋寧縣境出大䑕狀如牛土人謂之偃牛時出山遊毛落田間悉成小䑕苖稼盡耗梁書云倭國有山䑕如牛又有大蛇能吞之據此則隱䑕非無而陶説有本諸家闢之大甚者未深考耳又爾雅云鼹身似䑕而馬蹄長鬚而賊一歲千斤秦人謂之小驢者即此物也膏主治痔瘻惡瘡陶𢎞景鼫䑕音石綱目釋名碩䑕與鼫同出周易䶂䑕音酌出廣雅雀䑕出埤雅􅥨䑕音俊出唐韻訛時珍曰碩大也似䑕而大也關西方音轉鼫為䶂䶂為雀蜀人謂之􅥨䑕取其毛作筆俊亦大也集解時珍曰鼫䑕處處有之居土穴樹孔中形大於䑕頭似兎尾有毛青黄色善鳴能人立交前兩足而舞好食粟豆與鼢䑕俱為田害鼢小居田而鼫大居山也范成大云賔州鼫䑕專食山豆根土人取其腹乾之入藥名鼫䑕肚陸機謂此亦有五枝與螻蛄同名者誤矣肚氣味甘寒無毒主治咽㗋痺痛一切熱氣研末含嚥神效時珍志出虞衡竹䶉留栁二音綱目釋名竹㹠時珍曰䶉狀其肥㹠言其美也集解時珍曰竹䶉食竹根之䑕也出南方居土穴中大如兎人多食之味如鴨肉燕山録云煑羊以䶉煑鼈以蛟物性相感也肉氣味甘平無毒主治補中益氣解毒時珍土撥䑕拾遺釋名鼧鼥音駝撥塔喇巴噶出正要䑕時珍曰按唐書有鼧鼥即此也鼧鼥言其肥也唐韻竹􅂒鼥音僕朴俗訛為土撥耳蒙古人名塔喇巴噶集解藏器曰土撥䑕生西畨山澤間穴土為窠形如獺夷人掘取食之魏志云大秦國出辟毒䑕似近此也時珍曰皮可為裘甚暖濕不能透肉氣味甘平無毒時珍曰按飲饍正要云雖肥而煑之無油味短多食難尅化微動風主治野雞瘻瘡煑食肥美藏器頭骨主治小兒夜臥不寜懸之枕邉即安時珍貂䑕綱目釋名栗䑕爾雅翼松狗時珍曰貂亦作鼦羅願云此䑕好食栗及松皮夷人呼為栗䑕松狗集解時珍曰按許慎説文云貂䑕屬大而黄黑色出丁零國今遼東高麗及女直韃靼諸胡皆有之其䑕大如獺而尾粗其毛深寸許紫黒色蔚而不耀用皮為裘㡌風領寒月服之得風更暖着水不濡得雪即消拂面如熖拭昧即出亦竒物也惟近火則毛易脱漢制侍中冠金璫餙首前揷貂尾加以附蟬取其内勁而外温毛帶黄色者為黄貂白色者為銀貂肉氣味甘平無毒毛皮主治塵沙眯目以裘袖收之即去時珍黄䑕綱目釋名禮䑕韓文拱䑕同上鼲䑕音渾貔貍時珍曰黄䑕晴暖則出坐穴口見人則交其前足拱而如揖乃竄入穴即詩所謂相䑕有體人而無禮韓文所謂禮䑕拱而立者也古文謂之鼲䑕遼人呼為貔貍或以貔貍為竹飀貍貛者非胡人亦名令邦集解時珍曰黄䑕出太原大同延綏及沙漠諸地皆有之遼人尤為珍貴狀類大䑕黄色而足短善走極肥穴居有土窖如牀榻之狀者則牝牡所居之處秋時畜豆粟草木之實以禦冬各為小窖别而貯之村民以水灌穴而捕之味極肥美如豚子而脆皮可為裘領遼金元時以羊乳飼之用供上膳以為珍饌千里贈遺今亦不甚重之矣最畏鼠狼能入穴啣出也北胡又有青䑕皮亦可用銀䑕白色如銀古名鼳䑕音吸抱朴子言南海白䑕重數斤毛可為布也百感録云西北有獸類黄鼠短喙無目性狡善聽聞人足音輙逃匿不可卒得土人呼為瞎撞亦黄䑕類也肉氣味甘平無毒正要云多食發瘡主治潤肺生津煎膏貼瘡腫解毒止痛時珍發明時珍曰黄䑕北方所食之物而方書無載按經騐良方有靈䑕膏云治諸瘡腫毒去痛退熱用大黄䑕一個清油一斤慢火煎焦水上試油不散乃濾滓澄清再煎次入炒紫黄丹五兩柳枝不住攪匀滴水成珠下黄蠟一兩熬黑乃成去火毒三日如常攤貼鼬䑕音佑綱目釋名黄䑕狼綱目鼪䑕音生去聲䑕音谷地猴時珍曰按廣雅䑕狼即鼪也江東呼為鼪其色黄赤如柚故名此物健於捕䑕及禽畜又能制蛇虺莊子所謂騏驥捕䑕不如貍鼪者即此集解時珍曰鼬處處有之狀似䑕而身長尾大黄色帶赤其氣極臊臭許慎所謂似貂而大色黄而赤者是也其毫與尾可作筆嚴冬用之不折世所謂䑕鬚栗尾者是也肉氣味甘臭温有小毒主治煎油塗瘡疥殺蟲時珍心肝氣味臭微毒主治心腹痛殺蟲時珍附方新一心腹痛用黄䑕心肝肺一具隂乾瓦焙為末入乳香没藥孩兒茶血竭末各三分每服一錢燒酒調下立止海上仙方鼷䑕拾遺釋名甘口䑕時珍曰鼷乃䑕之極小者嚙人不痛故曰甘口今處處有之集解藏器曰鼷䑕極細卒不可見食人及牛馬等皮膚成瘡至死不覺爾雅云有螫毒左傳云食郊牛角者皆此物也博物志云食人死膚令人患惡瘡醫書云正月食䑕殘多為䑕瘻小孔下血者皆此病也治之之法以豬膏摩之及食貍肉為妙鼷無功用而為人害故著之食蛇䑕綱目集解時珍曰按唐書云罽賔國貢食蛇䑕喙尖尾赤能食蛇有被蛇螫者以䑕嗅而尿之即愈今雖不聞説此恐時有貢者存此以備考證尿主治蛇虺傷螫時珍猬本經中品校正舊在蟲魚部今據爾雅移入獸部釋名彚古猬字俗作蝟毛刺爾雅蝟䑕時珍曰按説文彚字篆文象形頭足似䑕故有䑕名宗奭曰蝟皮治胃逆開胃氣有功其字從蟲從胃深有理焉集解别録曰猬生楚山川谷田野取無時勿使中濕𢎞景曰處處野中時有此獸人犯之便藏頭足毛刺人不可得能跳入虎耳中而見鵲便自仰腹受啄物相制如此其脂烊鐵中入少水銀則柔如鉛錫蜀圖經曰猬狀如貒㹠大者如㹠小者如𤓰脚短尾長寸餘蒼白色脚似豬蹄者佳䑕脚者次之去肉取皮火乾又有山枳䑕皮正相似但尾端有兩岐為别又有虎䑕皮亦相類但以味酸為别乂有山㹠頗相似而皮類兎皮其色褐味甚苦俱不堪用時珍曰猬之頭觜似䑕刺毛似豪豬踡縮則形如芡房及栗房攅毛外刺尿之即開炙轂子云刺端分兩頭者為猬如棘針者為䖶與蜀説不同廣韻云似猬而赤尾者名暨居宗奭曰乾猬皮並刺作刷治紕帛絶佳世有養者去而復來正誤恭曰猬極獰鈍大如㹠小如𤓰惡鵲聲故反腹受啄欲掩取之猶􅛔蚌也虎耳不受雞卵且去地三尺猬何能跳之而入野俗鄙言遂為雅記深可怪也宗奭曰唐註擯陶理以當然時珍曰按淮南子云猬使虎申蛇今豹止又云鵲屎中猬緯書云火爍金故鵲啄蝟觀此則陶説非妄也而蘇氏斥之㓂氏和之非矣蜈蚣制龍蛇蜒蚰􅀈蝓制蜈蚣豈在大小利鈍耶物畏其天耳蜀圖經所謂虎䑕即􅂒䑕亦猬中一種也孫愐云􅂒䑕能飛食虎豹談藪云虎不敢入山林而居草薄者畏木上有􅂒鼠也䑕見虎過則咆噪㧞毛投之虎必生蟲瘡潰爛至死􅂒􅂒音相近耳猬能制虎觀此益可徴矣今正其誤皮修治細剉炒黒入藥氣味苦平無毒甄權曰甘有小毒得酒良畏桔梗麥門冬主治五痔隂蝕下血赤白五色血汁不止隂腫痛引腰背酒煑殺之本經療腹痛疝積燒灰酒服别録治腸風瀉血痔痛有頭多年不瘥炙末飲服方寸匕燒灰吹鼻止衂血甚解一切藥力藥性附方舊五新八五痔下血衍義云用猬皮合穿山甲等分燒存性入肉豆蔲一半空腹熱米飲服一錢妙作外臺用猬皮三指大熏黄如棗大熟艾一錢穿地坑調和取便熏之取口中有烟氣為佳火氣稍盡即停三日將息更熏之三度永瘥勿犯風冷羮臛將養切忌雞魚豬生冷二十日後補之腸痔有蟲猬皮燒末生油和塗肘后方腸風下血白刺猬皮一枚銚内煿焦去皮留刺木賊半兩炒黑為末每服二錢熱酒調下楊氏家藏方蠱毒下血猬皮燒末水服方寸匕當吐出毒千金方五色痢疾猬皮燒灰酒服二錢壽域方大腸脫肛猬皮一斤燒磁石煆五錢桂心五錢為末每服二錢米飲下葉氏摘𤣥塞鼻止衂猬皮一枚燒末半錢綿裹塞之聖惠方鼻中瘜肉猬皮炙為末綿裹塞之日三千金眼睫倒刺蝟刺棗針白芷青黛等分為末隨左右目㗜鼻中口含冷水瑞竹堂方反胃吐食猬皮燒灰酒服或煑汁或五味淹炙食普濟小兒驚啼狀如物刺用猬皮三寸燒末傅乳頭飲兒子母秘録猘犬傷人蝟皮頭髪等分燒灰水服外臺方肉氣味甘平無毒藏器曰食之去骨誤食令人瘦劣諸節漸小也主治反胃炙黄食之亦煑汁飲又主瘻藏器炙食肥下焦理胃氣令人能食孟詵脂氣味同肉詵曰可煑五金八石伏雄黄柔鐵主治腸風瀉血日華溶滴耳中治聾藏器塗秃瘡疥癬殺蟲時珍附方新一虎爪傷人刺猬脂日日傅之内服香油腦主治狼瘻時珍心肝主治蟻瘻蜂瘻瘰癧惡瘡燒灰酒服一錢時珍膽主治㸃目止淚化水塗痔瘡時珍治鷹食病宼宗奭附方新一痘後風眼發則兩臉紅爛眵淚用刺胃膽汁用簮㸃入痒不可當二三次即愈尤勝烏鴉膽也董炳集騐方獸之四寓類怪類共八種内附九種獼猴類證釋名沐猴史記為猴説文胡孫格古論王孫柳文馬留倦游録狙時珍曰按班固白虎通云猴候也見人設食伏機則慿高四望善於候者也猴好拭面如沐故謂之沐而後人訛沐為母又訛母為獮愈訛愈失矣説文云為字象母猴之形即沐猴也非牝也猴形似胡人故曰胡孫莊子謂之狙養馬者厩中畜之能辟馬病胡俗稱馬留云梵書謂之摩斯咤集解慎微曰獮猴有數種總名禺屬取色黄面赤尾長者用人家養者不主病為其食雜物違本性也按抱朴子云猴八百歲變為猨猨五百歲變為玃玃千歲變為蟾蜍時珍曰猴處處深山有之狀似人眼如愁胡而頰陷有嗛嗛音歉藏食處也腹無脾以行消食尻無毛而尾短手足如人亦能𥪡行聲嗝嗝若欬孕五月而生子生子多浴於澗其性躁動害物畜之者使坐杙上鞭棓旬月乃馴也其類有數種小而尾短者猴也似猴而多髯者豦也似猴而大者玃也大而尾長赤目者禺也小而尾長仰鼻者狖也似狖而大者果然也似狖而小者蒙頌也似狖而善躍越者獑􅂒也似猴而長臂者猨也似猨而金尾者狨也似猨而大能食猨猴者獨也不主病者並各以類附之附録玃音却時珍曰玃老猴也生蜀西徼外山中似猴而大色蒼黒能人行善攫持人物又善顧盻故謂之玃純牡無牝故又名玃父亦曰猳玃善攝人婦女為偶生子又神異經云西方有獸名􅀈大如驢狀如猴善縁木純牝無牡群居要路執男子合之而孕此亦玃類而牝牡相反者豦音據按郭璞云建平山中有之大如狗狀如猴黄黑色多髯鬛好奮頭舉石擲人西山經云崇吾之山有獸焉狀如禺而長臂善投名曰舉父即此也肉氣味酸平無毒主治諸風勞釀酒彌佳作脯食治久瘧慎微食之辟瘴疫時珍發明時珍曰異物志言南方以獮猴頭為鮓臨海志言粤民喜啖猴頭羮又巴徼人捕猴塩藏火熏食云甚美頭骨主治瘴瘧作湯浴小兒驚癎鬼魅寒熱慎微附方舊一鬼瘧進退不定用胡孫頭骨一枚燒研空心温酒服一錢臨發再服聖惠方手主治小兒驚癎口禁愼微屎主治塗蜘蛛咬愼微小兒臍風撮口及急驚風燒末和生蜜少許灌之時珍衛出心鑑及生方皮愼微曰治馬疫氣時珍曰馬經言馬厩畜母猴辟馬瘟疫逐月有天癸流草上馬食之永無疾病矣狨戎松二音拾遺釋名猱難逃切時珍曰狨毛柔長如絨可以藉可以緝故謂之狨而猱字亦從柔也或云生於西戎故從戎也猱古文作􅚽象形今呼長毛狗為猱取此象集解藏器曰狨生山南山谷中似猴而大毛長黄赤色人將其皮作鞍褥時珍曰楊億談苑云狨出川峽深山中其狀大小類猨長尾作金色俗名金線狨輕㨗善縁木甚愛其尾人以藥矢射之中毒即自齧其尾也宋時文武三品以上許用狨座以其皮為褥也附録猨時珍曰猨善援引故謂之猨俗作猿産川廣深山中似猴而長大其臂甚長能引氣故多夀或言其通臂者誤矣臂骨作笛甚清亮其色有青白𤣥黄緋數種其性静而仁慈好食果實其居多在林木能越數丈著地即泄瀉死惟附子汁飲之可免其行多群其鳴善啼一鳴三聲凄切入人肝脾范氏桂海志云猨有金絲者黄色玉面者黑色及身面俱黑者或云黄是牡黑是牝牝能嘯牡不能也王濟曰詢記云廣人言猨初生毛黑而雄老則變黄潰去勢囊轉雄為雌與黒者交而孕數百歲黄又變白也時珍按此説與列子貐變化為猨莊子獱狙以猨為雌之言相合必不妄也獨時珍曰獨似猨而大其性獨一鳴即止能食猨猴故諺曰獨一鳴而猨散獨夫蓋取諸此或云即黄腰也又見虎下肉及血氣味缺主治食之調五痔病久坐其皮亦良藏器脂主治瘡疥塗之妙同上果然拾遺釋名禺音遇狖音又或作貁􅂒蜼狖壘二音或作􅚦仙猴時珍曰郭璞云果然自呼其名羅願云人捕其一則舉群啼而相赴雖殺之不去也謂之果然以來之可必也大者為然為禺小者為􅀈為蜼南人名仙猴俗作猓􅛊集解藏器曰案南州異物志云交州有果然獸其名自呼狀大於猨其體不過三尺而尾長過頭鼻孔向天雨則挂木上以尾塞鼻孔其毛長柔細滑白質黒文如蒼鴨脇邊斑毛之狀集之為裘褥甚溫暖爾雅蜼仰鼻而長尾即此也時珍曰果然仁獸也出西南諸山中居樹上狀如猨白面黑頰多髯而毛采斑斕尾長於身其末有岐雨則以岐塞鼻也喜群行老者前少者後食相讓居相愛生相聚死相赴柳子所謂仁讓孝慈者是也古者畫蜼為宗彛亦取其孝讓而有智也或言猶豫之猶即狖也其性多疑見人則登樹上下不一甚至奔觸破頭折脛故人以比心疑不决者而俗呼駭愚為癡􅚦也附録蒙頌時珍曰蒙頌一名蒙貴乃蜼之又小者也紫黑色出交趾畜以捕䑕勝於貓貍獑猢音慚胡許氏許文作􅂒􅂒乃蝯蜼之屬黑身白腰如帶手有長毛白色似握版之狀蜀地志云獑猢似猴而甚㨗在樹上歘然騰躍如飛鳥也肉氣味鹹平無毒主治瘴瘧寒熱同五味煑臛食之併坐其皮取效藏器發明時珍曰案鍾毓果然賦云似猴象猨黒頰青身肉非佳品惟皮可珍而呂氏春秋云肉之美者玃猱之炙亦性各有不同耶猩猩本作狌音生綱目釋名時珍曰猩猩能言而知來猶惺惺也集解時珍曰猩猩自爾雅逸周書以下數十説今參集之云出哀牢夷及交趾封溪縣山谷中狀如狗及獼猴黄毛如猨白耳如豕人面人足長髪頭顔端正聲如兒啼亦如犬吠成羣伏行阮汧云封溪俚人以酒及草屐置道側猩猩見即呼人祖先姓名罵之而去頃復相與甞酒著屐因而被擒檻而養之將烹則推其肥者泣而遣之西胡取其血染毛罽不黯刺血必箠而問其數至一斗乃已又按禮記亦云猩猩能言而郭義恭廣志云猩猩不能言山海經云猩猩能知人言三説不同大抵猩猩畧似人形如猨猴類耳縱使能言當若鸚䳇之屬亦不必盡如阮氏所説也又羅願爾雅翼云古之説猩猩者如豕如狗如猴今之説猩猩者與狒狒不相逺云如婦人被髪袒足無膝群行遇人則手掩其形謂之野人據羅説則似乎後世所謂野女野婆者也豈即一物耶附録野女唐蒙博物志云日南有野女群行覓夫其狀白色徧體無衣襦周宻齊東野語云野婆出南丹州黄髪椎髻裸形跣足儼然若一媪也群雌無牡上下山谷如飛猱自腰已下有皮盖膝每遇男子必負去求合甞為健夫所殺死以手䕶腰間剖之得印方寸瑩若蒼玉有文類符篆也時珍曰合此二説與前阮氏羅氏之説觀之則野女似即猩猩矣又雄䑕卵有文如符篆治烏腋下有鏡印則野婆之印篆非異也亦當有功用但人未知耳肉氣味甘鹹温無毒主治食之不昧不飢令人善走窮年無厭可以辟穀時珍經出逸書山海水經發明時珍曰逸書言猩猩肉食之令人不昧其猩猩可知矣古人以為珍味故荀子言猩猩能言笑二足無毛而人啜其羮食其肉吕氏春秋云肉之美者猩猩之唇獾獾之炙是矣狒狒音費拾遺釋名與狒同亦作􅢈梟羊山海經野人方輿志人熊時珍曰爾雅作狒説文作從􅀢從囟從内象形許愼云北人呼為土螻今人呼為人熊按郭璞謂山都即狒狒稍似差别抑名同物異與集解藏器曰狒狒出西南夷爾雅云狒狒如人被髪迅走食人山海經云梟羊人面長唇黒身有毛反踵見人則笑笑則上唇掩目郭璞云交廣及南康郡山中亦有此物大者長丈餘俗呼為山都宋建武中獠人進雌雄二頭帝問土人丁鑾鑾曰其面似人紅赤色毛似獼猴有尾能人言如鳥聲善知生死力負千鈞反踵無膝睡則倚物獲人則先笑而後食之獵人因以竹筒貰臂誘之俟其笑時抽手以錐釘其唇着額候死而取之髪極長可為頭髲血堪染靴及緋飲之使人見鬼也帝乃命工圖之時珍曰按方輿志云狒狒西蜀及處州山中亦有之呼為人熊人亦食其掌剥其皮閩中沙縣㓜山有之長丈餘逢人則笑呼為山大人或曰野人及山魈也又鄧顯明南康記云山都形如崑崙人通身生毛見人輙閉日開口如笑好在深澗中翻石覓蟹食之珍按鄧氏所説與北山經之山􅏈述異記之山都永嘉記之山鬼神異經之山􅀈𤣥中記之山精海録雜事之山丈文字指歸之旱魃搜神記之治鳥俱相類乃山怪也今並附之以備考證附録山都時珍曰任眆述異記云南康有神曰山都形如人長二丈餘黒色赤目黄髪深山樹中作窠狀如鳥卵高三尺餘内甚光彩體質輕虚以鳥毛為褥二枚相連上雄下雌能變化隱形罕覩其狀若木客山猱之類也山􅏈時珍曰北山經云山􅏈狀如犬而人面善投見人則笑其行如風見則天下大風木客又曰幽明録云生南方山中頭靣語言不全異人但手脚爪如鈎利居絶岩間死亦殯殮能與人交易而不見其形也今南方有鬼市亦類此又有木客鳥見禽部山􅀈又曰東方朔神異經云西方深山有人長丈餘袒身捕蝦蟹就人火炙食之名曰山􅀈其名自呼人犯之則發寒熟盖鬼魅耳所在亦有之惟畏爆竹煏􅘤聲劉義慶幽明録云東昌縣山岩間有物如人長四五尺裸身被髪髪長五六寸能作呼嘯聲不見其形每從澗中發石取蝦蟹就火炙食永嘉記云安國縣有山鬼形如人而一脚僅長一尺許好盗伐木入鹽炙石蟹食人不敢犯之能令人病及焚居也𤣥中記云山精如人一足長三四尺食山蟹夜出畫伏千歲蟾蜍能食之抱朴子云山精形如小兒獨足向後夜喜犯人其名曰魃呼其名則不能犯人白澤圖云山之精狀如鼓色赤一足名曰䕫亦曰􅏈文呼之可使取虎豹海録雜事云嶺南有物一足反踵手足皆三指雄曰山丈雌曰山姑能夜叩人門求物也神異記云南方有魃一名旱母長二三尺祼形目在頂上行走如風見則大旱遇者得之投溷中則旱除文字指歸云旱魃山鬼也所居之處天不雨女魃入人家能竊物以出旱魃入人家能竊物以歸時珍謹按諸説雖少有參差大抵俱是怪類今俗所謂獨脚鬼者是也邇來處處有之能隱形入人家淫亂致人成疾放火竊物大為家害法術不能驅醫藥不能治呼為五通七郎諸神而祀之盖未知其原如此盖備載之非但博聞而已其曰呼其名則無害千歲蟾蜍能食之者非治法歟引申觸類必有能制之者又有治鳥亦此類見禽部精怪之屬甚夥皆為人害惟白澤圖𤣥中記抱朴子酉陽雜俎諸書載之頗悉起居者亦不可不知然正人君子則徳可勝妖自不敢近也肉氣味無毒主治作脯連脂薄割炙熱貼人癬疥能引蟲出頻易取瘥藏器罔兩綱目集解時珍曰罔兩一作魍魎又作方良周禮方相氏執戈入壙以驅方良是矣罔兩好食亡者肝故驅之其性畏虎柏故墓上樹石虎植柏國語云木石之怪䕫罔兩水石之怪龍罔象即此述異記云秦時陳倉人獵得獸若彘若羊逢二童子曰此名弗述又名蝹在地下食死人腦但以柏揷其首則死此即罔兩也雖於藥石無與而於死人則關故録之其方相有四目若二目者為魌皆鬼物也古人設人像之昔費長房識李娥藥丸用方相腦則其物亦入辟邪方藥而法失傳矣彭侯綱目集解時珍曰按白澤圖云木之精名曰彭侯狀如黒狗無尾可烹食千歲之木有精曰賈朏狀如豚食之味如狗搜神記云吳時敬叔伐大樟樹血出中有物人靣狗身敬叔云此名彭侯乃烹而食之味如狗也肉氣味甘酸温無毒主治食之辟邪令人志壯白澤封綱目集解時珍曰按江隣幾雜志云徐積於廬州河次得一小兒手無指無血懼而埋之此白澤圖所謂封食之多力者也田九成西湖志云董表儀撤屋握土得一肉塊術士云太歲也棄之亦無害及山海經敦隅之山及開明南北東南海外並有視肉郭璞註云聚肉形如牛肝有兩目食之無盡尋復生如舊也此皆封類可食者但人不知耳又海中一種土肉正黒長五寸大如小兒臂有腹無口目有三十足可炙食此又蟲魚之肉類乎封者也夲草綱目卷五十一下
