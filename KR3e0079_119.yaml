body:
  text: 本草綱目卷五十一上明李時珍撰獸之二獸類二十四種内附十一種獅綱目釋名狻猊音酸倪爾雅作狻麑虓許交切之時珍曰獅為百獸長故謂獅虓象其聲也梵書謂之僧伽彼説文云一名白澤今攷瑞應圖白澤能言語非獅也集解時珍曰獅子岀西域狀如虎而小黄色亦如金色猱狗而頭大尾長亦有青色者銅頭鐵額鉤爪鋸牙弭耳昻鼻目光如電聲吼如雷有耏髯牡者尾上茸毛大如斗日走五百里為毛蟲長怒則威在齒喜則威在尾每一吼則百獸辟易馬皆溺血爾雅言其食虎豹虞世南言其拉虎吞貔裂犀分象陶九成言其食諸禽獸以氣吹之羽毛紛落熊太古言其乳入牛羊馬乳中皆化成水雖死後虎豹不敢食其肉蠅不敢集其尾然博物志載魏武帝至白狼山見物如貍跳至獅子頭殺之唐史載髙宗時伽毘耶國獻天鐵獸能擒獅象則獅雖猛悍又有制之者也西域畜之七日取未開目者調習之若稍長則難馴矣屎時珍曰陶氏註蘓合香誤以為獅屎陳氏正其誤言獅屎極臭赤黒色今攷補於此主治服之破宿血殺百蟲燒之去鬼氣藏器虎别録中品釋名烏䖘音徒左傳作於莵漢書作烏擇大蟲肘后李耳時珍曰虎象其聲也魏子才云其文従虚從凡象其蹲踞之形從人者非也楊雄方言云陳魏之間謂之李父江淮南楚之間謂之李耳或謂之䖘自闗東西謂之伯都珍按李耳當作狸兒盖方音轉狸為李兒為耳也今南人猶呼虎為貓即此意也郭璞謂虎食物值耳則止故呼李耳觸其諱應劭謂南郡李翁化為虎故呼李耳皆穿鑿不經之言也爾雅云虎淺毛曰虦貓音棧白虎曰甝音含黑虎曰音育似虎而五指曰貙音傴似虎而非真曰彪似虎而有角曰虒音嘶集觧頌曰虎本經不載所出今多山林虎皆有之時珍曰按格物論云虎山獸之君也狀如猫而大如牛黄質黑章鋸牙鉤𤓰鬚健而尖舌大如掌生倒刺項短鼻齆夜視一目放光一目看物聲吼如雷風從而生百獸震恐易卦通騐云立秋虎始嘯仲冬虎始交或云月暈時乃交又云虎不再交孕七月而生又云虎知衝破能畫地觀竒偶以卜食今人效之謂之虎卜虎噬物隨月旬上下而囓其首尾其摶物三躍不中則捨之人死於虎則為倀鬼導虎而行虎食狗則醉狗乃虎之酒也聞羊角烟則走惡其臭也虎害人獸而蝟鼠能制之智無大小也獅駮酋耳黄腰渠搜能食虎勢無强弱也抱朴子云虎五百嵗則變白又海中有虎鯊能變虎古有貙虎變人貙人變虎之説亦自有是理也附錄酋耳瑞應圖云酋耳似虎絶大不食生物見虎豹即殺之太平則至郭璞云即騶虞也白虎黑文尾長於身駮山海經云駮狀如馬白身黒尾一角鋸牙能食虎豹周書謂之茲白説苑云師曠言鵲食猬猬食駿駿食豹豹食駮駮食虎渠搜逸周書云渠搜西戎露犬也能食虎豹一云犴胡犬也能逐虎黄腰蜀志名黄腰獸鼬身貍首長則食母形雖小而能食虎及牛鹿也又孫愐云豰音斛似豹而小腰以上黄以下黒形類犬食獼猴名黄腰䶂鼠見猬下虎骨修治頌曰虎骨用頭及脛骨色黄者佳凡虎身數物俱用雄虎者勝藥箭射殺者不可入藥其毒浸潰骨血間能傷人也時珍曰凡用虎之諸骨並槌碎去髓塗酥或酒或醋各隨方法炭火炙黄入藥氣味辛微熱無毒之才曰平主治邪惡氣殺鬼疰毒止驚悸治惡瘡鼠瘻頭骨尤良别錄治筋骨毒風攣急屈伸不得走注疼痛治尸疰腹痛傷寒温氣温瘧殺犬咬毒甄權雜朱畫符療邪頭骨作枕辟惡夢魘置户上辟鬼陶𢎞景煑汁浴之去骨節風毒腫和醋浸膝止脚痛腫脛骨尤良初生小兒煎湯浴之辟惡氣去瘡疥驚癎鬼疰長大無病孟詵追風定痛徤骨止久痢脱肛獸骨骾咽時珍發明頌曰李絳兵部手集有虎骨酒治臂脛痛崔元亮海上方治腰脚不隨並有虎脛骨酒方宗奭曰風從虎者風木也虎金也木受金制焉得不從故虎嘯而風生自然之道也所以治風病攣急屈伸不得走疰骨節風毒癲疰驚癎諸病皆此義也汪機曰虎之强悍皆賴於脛雖死而脛猶矻立不仆故治脚脛無力用之時珍曰虎骨通可用凡辟邪疰治驚癎温瘧瘡疽頭風當用頭骨治手足諸風當用脛骨腰背諸風當用脊骨各從其類也按呉球諸證辨疑云虎隂也風陽也虎嘯風生陽出隂藏之義故其骨能追風定痛虎之一身筋節氣力皆出前足故以脛骨為勝附方舊十新八徤忘驚悸預知散用虎骨酥炙白龍骨逺志肉等分為末生薑湯服日三服久則令人聰慧永類鈐方臂脛疼痛虎骨酒治之不計深淺皆效用虎脛骨二大兩搗碎炙黄羚羊角屑一大兩新芍藥二大兩切三物以無灰酒浸之養至七日秋冬倍之每日空腹飲一盃若要速服即以銀器物成於火爐中暖養三二日即可服也兵部手集腰脚不隨攣急冷痛取虎脛骨五六寸刮去肉膜塗酥炙黄搗細絹袋盛之以瓶盛酒一斗浸之煻火微温七日後任情飲之當微利便效也以又方虎腰脊骨一具前兩脚全骨一具並於石上斧槌碎安鐵床上文炭火炙待脂出則投無灰濃酒中宻封春夏七日秋冬三七日任性日飲三度患十年以上者不過三劑七年以下者一劑必瘥方崔元亮海上白虎風痛走注兩膝熱腫用虎脛骨塗酥炙黄黒附子炮製去皮各一兩為末毎服二錢服酒下日再經驗良方厯節痛風虎脛骨酒炙三兩没藥七兩為末每服二錢温酒下日三服聖濟總錄厯節走痛百節皆痛不可忍用虎頭骨一具塗酥炙黄槌碎絹袋盛置二斗清酒中浸五宿隨性飲之妙聖惠方筋骨急痛虎骨和通草煑汁空肚服半升覆臥少時汗出為效切忌熱食損齒小兒不可與食恐齒不生食療休息痢疾經年不愈取大蟲骨炙黄焦搗末飲服方寸七日三取效張文仲方痔漏脱肛虎脛骨兩節以蜜二兩炙赤搗末蒸餅丸梧子大毎凌晨温酒下二十丸取效勝金肛門凸出虎骨燒末水服方寸匕日三外臺獸骨骾咽虎骨為末水服方寸七外臺惡犬咬傷虎骨刮末水服方寸匕并𫝊之小品方湯火傷灼虎骨炙焦研敷神效龔氏易簡方月蝕疳瘡虎頭骨二兩搗碎豬脂一觔熬膏塗之神效方小兒白秃虎骨末油調塗之濟普足瘡嵌甲以橘皮湯浸洗輕剪去甲以虎骨末敷之痛即止便民圖纂臁脛爛瘡以虀汁洗拭刮虎骨末敷之便民圖纂威骨藏器曰虎有威骨如乙字長一寸在脇兩傍破肉取之尾端亦有不及脇骨令人有威帶之臨官佳無官則為人所憎肉氣味酸平無毒宗奭曰微鹹𢎞景曰俗方言熱食虎肉壞人齒詵曰正月勿食虎傷神時珍曰虎肉作土氣味不甚佳鹽食稍可主治惡心欲嘔益氣力止多唾别錄食之治瘧辟三十六種精魅入山虎見畏之孟詵附方新一脾胃虚弱惡心不欲飲食虎肉半觔切以葱椒醬調炙熟空心冷食夀親養老方膏主治狗嚙瘡别錄納下部治五痔下血孟詵服之治反胃煎消塗小兒頭瘡白秃時珍附方新一一切反胃虎脂半觔切清油一觔瓦瓶浸一月宻封勿令洩氣毎以油一兩入無灰酒一盞温服以瘥為度油盡再添夀域神方血主治壮神强志時珍曰獵人李次口云熱刺虎之心血飲之能壮神志又抱朴子云三月三日殺取虎血雞血等分和合以初生草似胡麻子取其實合用可以移形易貌肚主治反胃吐食取生者勿洗存滓穢新瓦固煅存性入平胃散末一兩和匀毎日白湯服三錢神效時珍夀出保堂方腎主治瘰癧時珍曰千金治瘰癧雌黄芍藥丸中用之𡊮達禽蟲述云虎腎懸于腹象口隠於頤膽主治小兒驚癎藏器小兒疳痢神驚不安研水服之孟詵睛修治頌曰虎睛多偽須自獲者乃真斆曰凡使虎睛須問獵人有雌有雄有老有嫩有殺得者惟中毒自死者勿用之能傷人虎睛以生羊血浸一宿漉出微火焙乾搗粉用時珍曰千金治狂邪有虎睛湯虎睛丸並用酒浸炙乾用主治癲疾别録瘧病小兒熱疾驚悸孟詵驚啼客忤疳氣鎮心安神日華明目去翳時珍附方舊二新一虎睛丸治癎疾發作涎潮搐搦時作譫語虎睛一對微炒犀角屑大黄逺志去心各一兩梔子仁半兩為末煉蜜丸緑豆大毎温酒服二十丸小兒驚癎掣搐用虎睛細研水調灌之良經騐方小兒夜啼用大虎眼睛一隻為散以竹瀝調少許與喫姚和衆方邪瘧時作生虎睛一枚臘月豬血少許硃砂阿魏各一分為末端午日取粽尖七枚和丸黍米大毎綿包一丸塞耳中男左女右聖惠方虎魄藏器曰凡虎夜視一目放光一目看物獵人候而射之弩箭纔及目光即墮入地得之如白石者是也宗奭曰陳氏所謂乙骨及目光墮地之説終不免於誣也時珍曰乙骨之説不為怪目光之説亦猶人縊死則魄入於地隨即掘之狀如麩炭之義按茅亭客話云獵人殺虎記其頭項之處月黒掘下尺餘方得狀如石子琥珀此是虎之精魄淪入地下故主小兒驚癎之疾其説甚詳冦氏未達此理耳主治驚邪辟惡鎮心藏器鼻主治癲疾小兒驚癎别錄懸户上令生男𢎞景按時珍曰河魚圖云虎鼻懸門中一年取熬作屑與婦飲便生貴子勿令人及婦知知則不騐又云懸于門上宜子孫帶印綬此與古者胎教欲見虎豹皆取其勇壮之義同也牙主治丈夫隂瘡及疽瘻孫思邈殺勞蟲治猘犬傷發狂刮末酒服方寸匕時珍附方新一白虎風痛大虎牙一副四箇赤足蜈蚣十條酒浸三日晒乾天麻二兩乳香没藥各一兩麝香半兩為末毎服二錢温酒下一日三服聖濟總錄爪頌曰爪并指骨毛俱可用以雄虎為勝主治繫小兒臂辟惡魅别錄時珍曰外臺辟惡魅用虎爪蟹爪赤朱雄黄為末松脂和丸每正旦焚之皮一名臯毘見荘子主治瘧疾藏器辟邪魅時珍發明時珍曰按應劭風俗通云虎者陽物百獸之長能辟鬼魅今人卒中惡病燒皮飲之或繫衣服亦甚騐也起居雜記云虎豹皮上睡令人神驚其毛入瘡有大毒鬚主治齒痛𢎞景思酉陽雜俎云許逺齒痛仙人鄭逺㧞虎鬚令揷之痛即愈屎主治惡瘡别錄鬼氣藏器療瘭疽痔漏燒研酒服治獸骨骾時珍附方舊一瘭疽著手足肩背累累如米起色白刮之汁出愈而復發虎屎白者以馬尿和之晒乾燒灰粉之千金屎中骨主治為屑治火瘡别錄破傷風時珍附方新一斷酒虎屎中骨燒灰酒服方寸匕即不飲千金方豹别錄中品釋名程列子失刺孫時珍曰豹性暴故曰豹按許氏説文云豹之脊長行則脊隆豸豸然具司殺之形故字從豸從勺王氏字説云豹性勺物而取程度而食故字從勺又名曰程列子云青寜生程程生馬沈氏筆談云秦人謂豹為程至今延州猶然東胡謂之失刺孫集解𢎞景曰豹至稀有入用亦鮮惟尾可貴恭曰隂陽家有豹尾神車駕鹵簿有豹尾車名可尊重耳真豹尾有何可貴未審陶據奚説頌曰今河洛唐郢間或有之然豹有數種山海經有𤣥豹詩有赤豹尾赤而文黒也爾雅有白豹即貘也毛白而文黒郭璞注云貘能食銅鐵與貘同名不知入藥果用何類古今醫方鮮見之宗奭曰豹毛赤黄其文黒如錢而中空比比相次又有土豹毛更無紋色亦不赤其形亦小此各有種非能變形也聖人假喻耳恐醫家不知故書之時珍曰豹遼東及西南諸山時有之状似虎而小白面團頭自惜其毛采其文如錢者曰金錢豹宜為裘如艾葉者曰艾葉豹次之又西域有金線豹文如金線海中有水豹上應箕宿禽蟲述云虎生三子一為豹則豹有變者冦氏未知爾豹畏蛇與䶂鼠而獅駮渠搜能食之淮南子云蝟令虎申蛇令豹止物有所制也廣志云狐死首丘豹死首山不忘本也豹胎至美為八珍之一肉氣味酸平無毒思邈曰温微毒正月勿食傷神損夀主治安五臟補絶傷輕身益氣冬食利人别錄壯筋骨强志氣耐寒暑令人猛徤日華辟鬼魅神邪宜腎孫思邈發明詵曰豹肉令人志性粗豪食之便覺少頃消化乃定乆食亦然宗奭曰此獸猛捷過虎故能安五臟補絶傷輕身壯筋骨也脂主治合生髪膏朝塗暮生孟詵亦入面脂時珍鼻主治狐魅同狐鼻水煑服藏器與時珍曰按外臺治夢鬼交及狐狸精魅載崔氏方中用之頭骨主治燒灰淋汁去頭風白屑孟詵作枕辟邪時珍出五行志皮藏器曰不可藉睡令人神驚其毛入人瘡中有毒時珍曰按林邑記云廣西南界有唼臘蟲食死人尸不可驅逐惟以豹皮覆之則畏而不來貘音陌亦作貊宋圖經校正原附豹下今分出釋名時珍曰按陸佃云皮為坐毯臥褥能消膜外之氣故字從膜省文集解頌曰郭璞云似熊而頭小脚卑黒白駁文毛淺有光澤能舐食銅鐵及竹骨蛇虺其骨節强直中實少髓或云與爾雅貘白豹同名唐世多畫貘作屏白樂天有賛序之今黔蜀及峨眉山中時有貘象鼻犀目牛尾虎足土人鼎釡多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍛鐵皆碎落火亦不能燒人得之詐充佛牙佛骨以䛘俚俗時珍曰世傳羚羊角能碎金剛石者即此物相畏耳按説文云貘似熊黄白色出蜀中南中志云貘大如驢状似熊蒼白色多力䑛鐵消干觔其皮温暖埤雅云貘似熊獅首豺髲鋭鬐卑脚糞可為兵切玉尿能消鐵為水又有囓鐵豻昆吾兎皆能食銅鐵亦貘類也並附之附錄囓鐵時珍曰按神異經云南方有獸角足大小状如水牛毛黒如漆食鐵而飲水糞可為兵其利如綱名曰囓鐵唐史云叶火羅獻大獸髙七尺食銅鐵日行三百里豻禽書云豻應并星胡狗也狀似狐而黒身長七尺頭生一角老則有鱗能食虎豹蛟龍銅鐵獵人亦畏之狡兎拾遺記云狡兎生昆吾山形如兎雄黄雌白食丹石銅鐵昔呉王武庫兵器皆盡掘得二兎一白一黄腹中腎膽皆鐵取鑄為劍切玉如泥皮主治寝之可驅温癘辟濕氣邪氣蘇頌膏主治癰腫能透肌骨時珍曰段成式云貘膏性利銅鐵瓦器盛之悉透惟以骨盛則不漏尿主治吞銅鐵入腹者水和服之即化為水象宋開寳釋名時珍曰許慎説文云象字篆文象耳牙鼻足之形王安石字説云象牙感雷而文生天象感氣而文生故天象亦用此字南越志云象聞雷聲則牙花暴出逡巡復没古語云犀因望月紋生角象為聞雷花發牙伽耶出北户錄集解頌曰爾雅云南方之美者有梁山之犀象焉今多出交趾潮循諸州彼人捕得争食其肉云肥堪作炙陳藏器云象具十二生肖肉各有分段惟鼻是其本肉炙食糟食更美又膽不附肝隨月在諸肉間如正月即在虎肉也徐鉉云象膽隨四時春在前左足夏在前右足秋後左足冬後右足也淳化中一象春斃大宗命取膽不獲使問鉉鉉以此對果得于前左足世傳荆蠻山中亦有野象然楚粤之象皆青黒惟西方拂林大食諸國乃多白象樊綽雲南記皆言其事時珍曰象出交廣雲南及西域諸國野象多至成羣畨人皆畜以服重酋長則飭而乗之有灰白二色形體擁腫面目醜陋大者身長丈餘髙稱之大六尺許肉倍數牛目纔若豕四足如柱無指而有爪甲行則先移左足臥則以臂著地其頭不能俯其頸不能囘其耳下軃其鼻大如臂下垂至地鼻端甚深可以開合中有小肉爪能拾針芥食物飲水皆以鼻卷入口一身之力皆在於鼻故傷之則死耳後有穴薄如鼓皮刺之亦死口内有食齒兩吻出兩牙夾鼻雄者長六七尺雌者纔尺餘耳交牝則在水中以胸相貼與諸獸不同許慎云三年一乳古訓云五嵗始産六十年骨方足其性能久識嗜芻豆甘蔗與酒而畏烟火獅子巴蛇南人殺野象多設机穽以䧟之或埋象鞋於路以貫其足捕生象則以雌象為媒而誘獲之飼而狎之久則漸解人言使象奴牧之制之以鈎左右前脚罔不如命也其皮可作甲鞔鼓濕時切條可貫器物甄權曰西域重象牙用飾牀座中國貴之以為笏象毎蜕牙自埋藏之崑崙諸國人以木牙潜易取焉日華曰象蹄底似犀可作帶牙真臘風土記云象牙殺取者上也自死者次之蜕干山中多年者下矣或謂一嵗一換牙者非也氣味甘寒無毒主治諸鐵及雜物入肉刮牙屑和水敷之立出治癎病刮齒屑炒黄研末飲服開寳諸物刺咽中磨水服之亦出舊梳屑尤佳蘇頌主風癎驚悸一切邪魅精物熱疾骨蒸及諸瘡竝宜生屑入藥時珍發明時珍曰世人知然犀可見水怪而不知沉象可驅水怪按周禮壼涿氏掌水蟲欲殺其神者以橭木貫象齒而沉之則其神死而淵為陵註云橭木山榆也以象齒作十字貫于木而沈之則龍罔象之類死也又按陶貞白云凡夏月合藥宜置象牙于傍合丹竈以象牙夾竈得雷聲乃能發光觀此則象之辟邪又不止干驅怪而已宜乎其能治心肝驚癎迷惑邪魅之疾也而昔人罕解用之何哉附方舊二新四小便不通脹急者象牙生煎服之救急小便過多象牙燒灰飲服之總錄痘疹不收象牙屑銅銚炒黄紅色為末每服七八分或一錢白水下王氏痘疹方諸獸骨鯁象牙磨水吞之永類方骨刺入肉象牙刮末以水煑白梅肉調塗自軟衆簡要濟鐵箭入肉象牙刮末水和敷之即出也肉氣味甘淡平無毒主治燒灰和油塗秃瘡多食令人體重開寳生煮汁服治小便不通燒灰飲服治小便多日華發明時珍曰按吕氏春秋云肉之美者􅀈象之約又爾雅翼云象肉肥脆少類豬肉味淡而含滑則其通小便者亦淡滲滑竅之義燒之則從火化故又能縮小便也膽修治斆曰凡使勿用雜膽其象膽乾了上有青竹文斑光膩其味微帶甘入藥勿便和衆藥須先擣成粉乃和衆藥氣味苦寒微毒主治明目治疳日華治瘡腫以水化塗之治口臭以綿裹少許貼齒根平旦潄去數度即瘥海藥發明時珍曰象膽明目能去塵膜也與熊膽同功雷斆炮炙論云象膽揮粘是矣附方新一内障目翳如偃月或如棗花用象膽半兩鯉魚膽七枚熊膽一分牛膽半兩麝香一分石決明末一兩為米糊丸菉豆大毎茶下十丸日二總録睛主治目疾和人乳滴目中藏器皮主治下疳燒灰和油敷之又治金瘡不合時珍發明時珍曰象肉壅腫人以斧刃刺之半日即合故近時治金瘡不合者用其皮灰骨主治解毒時珍胸前小横骨燒灰酒服令人能浮開寳附方新一象骨散治脾胃虚弱水穀不消噫氣吞酸吐食霍亂泄㵼膿血臍腹疼痛裏急頻併不思飲食諸證用象骨四兩炒肉豆蔲炮枳殻炒各一兩訶子肉炮甘草各二兩乾薑半兩炮為末毎服三錢水一盞半煎至八分和滓熱服食前日三次宣明方犀本經中品釋名兕時珍曰犀字篆文象形其牸名兕亦曰沙犀爾雅翼云兕與牸字音相近猶羖之為牯也大抵犀兕是一物古人多言兕後人多言犀北音多言兕南音多言犀為不同耳詳下文梵書謂犀曰朅伽集解别錄曰犀出永昌山谷及益州永昌即今滇南也𢎞景曰今出武陵交州寧州諸逺山犀有二角以額上者為勝又有通天犀角上有一白縷直上至端夜露不濡入藥至神騐或云此是水犀角出水中漢書所謂駭雞犀者置米飼雞皆驚駭不敢啄置屋上鳥雀不敢集又有牸犀角甚長文理似犀不堪入藥恭曰牸是雌犀文理膩細斑白分明俗謂之斑犀服用為上入藥不如雄犀藏器曰犀無水陸二種但以精粗言之通天者腦上之角經千嵗長且鋭白星徹端能出氣通天則能通神破水駭雞故曰通天抱朴子言此犀刻為魚銜之入水水開三尺是也頌曰犀角今以南海者為上黔蜀者次之犀似水牛豬首大腹卑脚脚似象有三蹄黒色舌上有刺好食棘刺皮上毎一孔生三毛如豕有一角二角三角者爾雅云兕似牛犀似豕郭璞注云兕一角色青重千觔犀似水牛三角一在頂上一在額上一在鼻上鼻上者食角也又名奴角小而不墮亦有一角者劉恂嶺表錄異云犀有二角一角額上為兕犀一在鼻上為胡㡌犀牯犀亦有二角皆謂之毛犀而今人多傳一角之説此數種角俱有粟文觀紋之粗細為貴賤貴者有通天花文犀有此角者必自惡其影常飲濁水不欲照見也絶品者有百物之形或云犀之通天者乃其病理不可知也角文有倒挿者一半已下通有正挿者一半以上通有腰鼓揷者中㫁不通其類極多故波斯呼象牙為白暗犀角為黑暗言難識也犀中最大者墮羅犀一株重七八觔云是牯犀額角其花多作撒豆斑色深者堪作帶胯斑散色淺者可作器皿耳或云兕乃犀之雌者亦似水牛而青色皮堅厚可以為鎧未知的否唐醫呉士臯言海人取犀先於山路多植朽木如豬羊棧其犀前脚直常依木而息爛木忽折倒仆久不能起因格殺之又云犀毎嵗一退角必自埋于山中海人潜作木角易之再三不離其處若直取之則後蔵于别處不可尋矣李珣曰通天犀乃胎時見天上物過形於角上故曰通天但于月下以水盆映之則知按五溪記云山犀食竹木其小便即竟日不盡夷獠以弓矢采之名曰黔犀又異物志云山東海水中有牛樂聞絲竹彼人動樂則牛出聴因而采之有鼻角頂角以鼻角為上本草止知山犀未見水犀宗奭曰川犀南犀紋細烏犀有紋顯露黄犀紋絶少皆不及西畨者紋高雨脚顯也物像黄外黒者為正透物像黒外黄者為倒透盖以烏色為正以形像肖物為貴既曰通犀必須文頭顯著黄黒分明有雨脚潤骨者為第一時珍曰犀出西畨南畨滇南交州諸處有山犀水犀兕犀三種又有毛犀似之山犀居山林人多得之水犀出入水中最為難得並有二角鼻角長而額角短水犀皮有珠甲而山犀無之兕犀即犀之牸者亦曰沙犀止有一角在頂文理細膩斑白分明不可入藥盖牯角文大而悖角文細也洪武初九真曾貢之謂之獨角犀是矣陳藏器謂犀無水陸郭璞謂犀有三角蘇頌謂毛犀為牯犀皆出訛傳今並正之毛犀即旄牛也見本條犀角紋如魚子形謂之粟紋紋中有眼謂之粟眼黒中有黄花者為正透黄中有黒花者為倒透花中復有花者為重透並名通犀乃上品也花如椒豆斑者次之烏犀純黒無花者為下品其通天夜視有光者名夜明犀故能通神開水飛禽走獸見之皆驚又山海經有白犀白色開元遺事有辟寒犀其色如金交趾之所貢冬月暖氣襲人白孔六帖有辟暑犀唐文宗得夏月能清暑氣嶺表錄異有辟塵犀為簪梳帶胯塵不近身杜陽編有蠲忿犀云為帶令人蠲去忿怒此皆希世之珍故附見之犀角畨名低宻修治𢎞景曰入藥惟雄犀生者為佳若犀片及見成器物皆被蒸煑不堪用頌曰凡犀入藥有黒白二種以黒者為勝角尖又勝生犀不獨未經水火者盖犀有捕得殺取者為上蜕角者次之宗奭曰鹿取茸犀取尖其精鋭之力盡在是也以西畨生犀磨服為佳入湯散則屑之斆曰凡使勿用奴犀牸犀病水犀攣子犀無潤犀惟取烏黒肌皺折裂光潤者錯屑入臼杵細研萬匝乃用李珣曰凡犀角鋸成當以薄紙裹于懷中蒸燥乗熱搗之應手如粉故歸田錄云翡翠屑金人氣粉犀氣味苦酸鹹寒無毒别錄曰微寒李珣曰大寒無毒甄權曰牯犀角甘辛有小毒甄元素曰苦酸寒陽中之隂也入陽明經之之才曰松脂為之使惡雷丸雚菌時珍曰升麻為使惡烏頭烏喙斆曰忌鹽及妊婦勿服能消胎氣主治百毒鬼疰邪鬼瘴氣殺鈎吻鴆羽蛇毒除邪不迷惑魘寐久服輕身本經傷寒温疫頭痛寒熱諸毒氣令人駿徤别錄辟中惡毒氣鎮心神解大熱散風毒治發背癰疽瘡腫化膿作水療時疾熱如火煩毒入心狂言妄語藥性治心煩止驚鎮肝明目安五臟補虚勞退熱消痰解山瘴溪毒日華主風毒攻心毷氉熱悶赤痢小兒麩豆風熱驚癎海藥燒灰水服治卒中惡心痛飲食中毒藥毒熱毒筋骨中風心風煩悶中風失音皆瘥以水磨服治小兒驚熱山犀水犀功用相同孟詵磨汁治吐血下血衂血及傷寒畜血發狂譫語發黄發斑痘瘡稠宻内熱黑陷或不結痂瀉肝涼心清胃解毒時珍發明時珍曰犀角犀之精靈所聚足陽明藥也胃為水穀之海飲食藥物必先受之故犀角能解一切諸毒五臟六腑皆稟氣于胃風邪熱毒必先干之故犀角能療諸血及驚狂班痘之證抱朴子云犀食百草之毒及衆木之棘所以能解毒凡蠱毒之鄉有飲食以此角攪之有毒則生白沬無毒則否以之煑毒藥則無復毒熱也北户錄云凡中毒箭以犀角刺瘡中立愈由犀食百毒棘刺也昔温嶠過武昌牛渚磯下多怪物嶠然犀角照之而水族見形淮南子云犀角置穴狐不敢歸則犀之精靈辟邪不惑于此益可見矣附方舊六新七吐血不止以鵞鴨肝用生犀角生桔梗一兩為末毎酒服二錢總錄中忤中惡鬼氣其證或暮夜登厠或出郊外驀然倒地厥冷握拳口鼻出清血須臾不救似乎尸厥但腹不鳴心腹暖爾勿移動令人圍繞燒火打鼓或燒蘇合香安息香麝香之類候醒乃移動用犀角五錢麝香硃砂各二錢五分為末毎水調二錢服即效華陀方臥忽不寤若以火照之則殺人但唾其面痛囓其踵及大趾甲際即活以犀角為枕即令不魘小兒驚癎不知人嚼舌仰目者犀角濃磨水服之立效為末亦可廣利方痘瘡稠宻不拘大人小兒生犀于澀器中新汲水磨濃汁冷飲服之錢氏小兒方消毒解熱生犀角尖磨濃汁頻飲之同上服藥過劑犀角燒末水服方寸匕外臺中毒煩困方同上食雉中毒吐下不止用生犀角末方寸匕新汲水調服即瘥聖惠方蠼螋尿瘡狀如茱萸中央白膿惡寒壯熱磨犀角汁塗之千金方瘭疽毒瘡喜着十指狀如代指根深至肌能壞筋骨毒氣入臟殺人宜燒鐵烙之或炙百壯日飲犀角汁取瘥千金方山嵐瘴氣犀角磨水服之良集簡方下痢鮮血犀角地榆生地黄各一兩為末煉蜜丸彈子大毎服一丸水一升煎五合去滓温服方聖惠犛牛毛俚來三音綱目釋名毛犀廣志貓牛漢書注犘牛音麻㸲牛音作竹牛昨夢錄犨牛音抽毛時珍曰犛者髦也其髦可為旌旄也其體多長而身角如犀故曰毛犀汲冡周書作犛牛顔師古作貓牛爾雅作犘牛音皆相近也山海經作㸲牛西人呼為竹牛因角理如竹也或云竹即㸲音之轉而犨又竹音之轉也楊慎丹鉛錄云毛犀即彖也状如犀而角小善知吉凶古人呼為貓豬交廣人謂之豬神是矣集解時珍曰犛牛出西南徼外居深山中野牛也状及毛尾俱同牦牛牦小而犛大有重千觔者其尾名曰犛亦可為旌旄纓㡌之用唐宋西徼諸州貢之中山經云荆山多犛牛郭璞註云牦牛之屬也其色黒又昨夢錄云西夏竹牛重數百觔角甚長而黄黒相間製弓極勁彼人以偽犀角卒莫能辨曹昭格古論云毛犀即犛牛也角之花斑皆類山犀而無粟紋其理似竹不甚為竒故謂毛犀觀此則犛之角勝于牦而牦之毛尾勝于犛也又有野牛與此相類者並附于左附錄犩牛音危又名䕫牛如牛而大肉重數千觔出蜀山中􅀈牛廣志云出日南及潯州大賔縣色青黄與蛇同穴性嗜鹽人裹手塗鹽取之其角如玉可為器海牛齊地志云出登州海島中形似牛鼉脚鮎毛其皮甚軟可供百用脂可然燈寰宇志名潜牛廣志名􅀈牛月支牛𤣥中記云出西胡及大月氏國今日割取肉明日其創即復合也山牛状如牛而角有枝如鹿茸角氣味酸鹹涼無毒主治驚癎熱毒諸血病時珍黄氣味苦平主治驚癎癲狂發明時珍曰犛牛亦有黄彼人以亂牛黄但堅而不香云功用亦相近也其角亦可亂犀但無粟紋蘇頌圖經誤以為牯犀角者是也亦可用而功不及犀昨夢錄格古論説之詳矣牦牛音毛綱目釋名犣牛音鬛爾雅犏牛音偏後時珍曰牦與旄同或作毛漢書云冉䮾夷出牦牛一名犣牛重千觔毛可為旄觀此則旄牛之名盖取諸此顔師古云牦牛即犏牛也而葉盛水東日記云毛牛與封牛合則生犏牛亦類毛牛偏氣使然故謂之犏然則犏又毛之遺種耶集解時珍曰牦牛出甘肅臨洮及西南徼外野牛也人多畜養之狀如水牛體長多力能載重迅行如飛性至粗梗髀膝尾背胡下皆有黒毛長尺許其尾最長大如斗亦自愛䕶草木鈎之則止而不動古人取為旌旄今人以為纓㡌毛雜白色者以茜染紅色山海經云潘侯之山有旄牛狀如牛而四足節生毛即此也其肉味美故吕氏春秋云肉之美者牦象之肉也㗋靨主治項下癭氣時珍發明時珍曰牦牛古方未見用者近世􅋯仙夀域方載治癭氣方用其喉靨亦因類之義也其方用犏牛喉脆骨二寸許一節連兩邊扇動脆骨取之或煑或燒仰臥頓服仍取巧舌即靨子也嚼爛噙之食頃乃嚥病人容貌必瘦減而癭自内消矣不過二服即愈云神妙無比也野馬綱目集解時珍曰按郭璞云野馬似馬而小出塞外今西夏甘肅及遼東山中亦有之取其皮為裘食其肉云如家馬肉但落地不沾沙耳爾雅云驨如馬一角似鹿茸不角者騏也山海經云北海有獸狀如馬色青名曰騊駼此皆野馬類也肉氣味甘平有小毒主治人病馬癎筋脈不能自收周痺肌肉不仁思邈葱心鏡治上證用肉一觔豉汁煮熟入五味白作腌腊及羮粥頻食之白煮亦可隂莖氣味酸鹹温無毒主治男子隂痿縮少精思邈發明時珍曰野馬孫思邈千金方載有功用而本草不收今采補之野豬唐本草集解宗奭曰野豬陜洛間甚多形如家豬但腹小脚長毛色褐作羣行獵人惟敢射最後者若射中前者則散走傷人其肉赤色如馬肉食之勝家豬牝者肉更美詵曰冬月在林中食橡子其黄在膽中三嵗乃有亦不常得時珍曰野豬處處深山中有之惟闗西者時或有黄其形似豬而大牙出口外如象牙其肉有至二三百觔者能與虎鬭或云能掠松脂曳沙泥塗身以禦矢也最害田稼亦啖蛇虺淮南子曰野彘有芁莦槎櫛堀虚連比以象宫室隂以防雨景以蔽日亦其知也范至能虞衡志云嶺南一種嬾婦似山豬而小善害田禾惟以機軸紡織之器置田所則不復近也肉氣味甘平無毒宗奭曰微動風詵曰不發病減藥力與家豬不同但青蹄者不可食微動風時珍曰服巴豆藥者忌之主治癲癎補肌膚益五臟令人虚肥不發風虚氣孟詵炙食治腸風瀉血不過十頓日華附方舊一久痔下血野豬肉二觔著五味炙空腹食之作羮亦得食醫心鏡脂臘月鍊過取之主治鍊浄和酒日三服令婦人多乳十日後可供三四兒素無乳者亦下孟詵悦色除風腫毒治疥癬日華黄氣味甘平無毒主治金瘡止血生肉療癲癎水研如棗核許服之日二服效唐本研水服治血痢疰病藏器治惡毒風小兒肝氣客忤天弔日華膽主治惡熱毒氣孟詵鬼疰癲癎小兒諸疳水研棗許服日二時珍方出衛生齒主治燒灰水服治蛇咬毒藏器頭骨主治邪瘧聖惠方中用之附方新一積年下血野豬頭一枚桑西枝一握附子一枚同入瓶内煅過為末毎服二錢粥飲空心服聖惠方外腎主治連皮燒存性研米飲服治崩中帶下及腸風瀉血血痢日華皮主治燒灰塗鼠瘻惡瘡時珍中外臺方用豪豬綱目釋名蒿豬唐本山豬通志豲􅸃音原俞􅀈豬音丸鸞豬時珍曰説文云豪豕鬛如筆管者能激毫射人故也郭璞曰呉楚呼為鸞豬星禽云璧水􅸃豪豬也集解頌曰豪豬陜洛江東諸山中並有之髦間有豪如箭能射人時珍曰豪豬處處深山中有之多者成羣害稼状如豬而項脊有棘鬛長近尺許粗如筯其状似笄及㡌刺白本有黒端怒則激去如矢射入羌人以其皮為鞾郭璞云􅀈豬自為牝牡而孕也張師正倦遊錄曰南海有泡魚大如斗身有棘刺能化為豪豬巽為魚坎為豕豈巽變坎乎肉氣味甘大寒有毒頌曰不可多食發風令人虚羸主治多膏利大腸蘇頌肚及屎氣味寒無毒主治水病熱風鼓脹同燒存性空心温酒服二錢匕用一具即消孟詵乾燒服之治黄疸蘇恭連屎燒研酒服治水腫脚氣奔豚時珍發明詵曰此豬多食苦參故能治熱風水脹而不治冷脹也時珍曰豪豬本草不載惟孟氏食療本草蝟條説之熊本經上品釋名時珍曰熊者雄也熊字篆文象形俗呼熊為豬熊羆為人熊馬熊各因形似以為别也述異記云在陸曰熊在水曰能即鯀所化者故熊字從能續捜神記云熊居樹孔中東土人擊樹呼為子路則起不呼則不動也又狒狒亦名人熊見本條集解别錄曰熊生雍州山谷十一月取之𢎞景曰今東西諸山皆有之自非易得頌曰今雍洛河東及懷慶衛山中皆有之形類大豕而性輕捷好攀緣上髙木見人則顛倒自投于地冬蟄入穴春月乃出其足名蹯為八珍之一古人重之然胹之難熟熊性惡鹽食之即死出淮南子時珍曰熊如大豕而竪目人足黒色春夏臕肥時皮厚筋弩每升木引氣或墮地自快俗呼跌臕即莊子所謂熊經鳥申也冬月蟄時不食饑則䑛其掌故其美在掌謂之熊蹯其行山中雖數千里必有跧伏之所在石巖枯木山中人謂之熊館劉敬叔異苑云熊性惡穢物及傷殘捕者置此物于穴則合穴自死或為棘刺所傷出穴爪之至骨即斃也陸佃埤雅云其膽春近首夏在腹秋在左足冬在右足熊羆皆壯毅之物屬陽故書以喻不二心之臣而詩以為男子之祥也附錄羆魋音頽時珍曰熊羆魋三種一類也如豕色黒者熊也大而色黄白者羆也小而色黄赤者魋也建平人呼魋為赤熊陸機謂羆為黄熊是矣羆頭長脚髙猛憨多力能拔樹木虎亦畏之遇人則人立而攫之故俗呼為人熊闗西呼􅀈熊羅願爾雅翼云熊有豬熊形如豕有馬熊形如馬即羆也或云羆即熊之雄者其白如熊白而理粗味減功用亦同脂釋名熊白𢎞景曰脂即熊白乃背上肪色白如玉味甚美寒月則有夏月則無其腹中肪及身中脂煎錬過亦可作藥而不中噉修治斆曰凡取得每一觔入生椒十四個同錬過器盛收之氣味甘微寒無毒别錄曰微温日華曰涼其脂燃燈烟損人眼令失光明主治風痺不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白秃面上皯皰久服强志不飢輕身長年本經飲食嘔吐别錄治風補虚損殺勞蟲酒鍊服之日華長髪令黒悦澤人面蘇恭治面上䵟􅍍及瘡藥性附方舊二新一令髪長黑熊脂蔓荆子末等分和匀醋調塗之聖惠方髪毛黄色以熊脂塗髪梳散入床底伏地一食頃即出便盡黒不過用脂一升效千金白秃頭癬熊白傳之肉氣味甘平無毒别錄曰微温𢎞景曰有痼疾不可食熊肉令終身不除鼎曰若腹中有積聚寒熱者食之永不除也十月勿食之傷神主治風痺筋骨不仁功與脂同孫思邈補虚羸孟詵發明時珍曰按劉河間云熊肉振羸兎目明眎因其氣有餘以補不足也附方舊二中風痺疾中風心肺風熱手足風痺不隨筋脈五緩恍惚煩燥熊肉一觔切入豉汁中和葱薑椒鹽作腌腊空腹食之脚氣風痺五緩筋急用熊肉半觔如上法食之並食醫心鏡掌修治聖惠方云熊掌難胹得酒醋水三件同煑熟即大如皮毬也主治食之可禦風寒益氣力日華膽頌曰熊膽隂乾用然多偽者但取一粟許滴水中一道若線不散者為真時珍曰按錢乙云熊膽佳者通明毎以米粒㸃水中運轉如飛者良餘膽亦轉但緩爾周宻齊東埜語云熊膽善辟塵試之以浄水一器塵幕其上投膽米許則凝塵豁然而開也氣味苦寒無毒權曰惡防己地黄主治時氣熱盛變為黄疸暑月久痢疳䘌心痛疰忤蘇恭治諸疳耳鼻瘡惡瘡殺蟲日華小兒驚癎瘈瘲以竹􅅹化兩豆許服之去心中涎甚良孟詵退熱清心平肝明目去翳殺蛕蟯蟲時珍發明時珍曰熊膽苦入心寒勝熱手少隂厥隂足陽明經藥也故能涼心平肝殺蟲為驚癎疰忤翳障疳痔蟲牙蚘痛之劑焉附方舊四新六赤目障翳熊膽丸毎以膽少許化開入冰片一二片銅器㸃之絶竒或淚痒加生薑粉些須齊東埜語初生目閉由胎中受熱也以熊膽少許蒸水洗之一日七八次如三日不開服四物加甘草天花粉全㓜心鑑小兒鼻蝕熊膽半分湯化抹之聖惠方十年痔瘡熊膽塗之神效一切方不及也外臺腸風痔瘻熊膽半兩入片腦少許研和豬膽汁塗之夀域方蛕蟲心痛熊膽一大豆和水服之大效外臺小兒驚癎方見主治風蟲牙痛熊膽三錢片腦四分毎以豬膽汁調少許􅖗之攝生方水弩射人熊膽塗之更以雄黄同酒磨服即愈斗門方諸疳羸瘦熊膽使君子末等分研匀瓷器蒸溶蒸餅丸麻子大毎米飲下二十丸保㓜大全腦髓主治諸聾蘇恭療頭旋摩頂去白秃風屑生髪日華血主治小兒客忤蘇恭骨主治作湯浴厯節風及小兒客忤孟詵麢羊本經中品釋名羚羊俗麙羊音鈐九尾羊時珍曰按王安石字説云鹿則比類而環角外向以自防麢則獨棲懸角木上以逺害可謂靈也故字從鹿從靈省文後人作羚許慎説文云麙山羊也大而細角山海經作羬云狀如羊而馬尾費信星槎勝覽云阿丹國羚羊自胸中至尾垂九塊名九尾羊集解别録曰羚羊角出石城及華隂山谷采無時𢎞景曰今出建平宜都諸蠻山中及西域多兩角一角者為勝角多節蹙蹙圓繞别有山羊角極長惟一邊有節節亦疎大不入藥用乃爾雅云羱羊者羌夷以為羚羊能陟峻岅恭曰羚羊南山商洛間大有今出梁州真州洋州亦貢其角細如人指長四五寸而文蹙細山羊或名野羊大者如牛角可為鞍橋又有山驢大如鹿皮可作靴有兩角大小如山羊角俗人亦用之陶氏所謂一邊有粗文者是此非山羊夜也藏器曰山羊山驢羚羊三種相似而羚羊有神宿防患以角掛樹不著地但角彎中深鋭𦂳小有掛痕者為真如此分别其疎慢無痕者非也真角耳邉聴之集集鳴者良陶言一角者謬也頌曰今秦隴龍蜀金商州山中皆有之戎人多捕得來貨其形似羊青色而大其角長一二尺有節如人手指握痕又最堅勁郭璞註爾雅云麢似羊而大其角細而圓鋭好在山崖間羱似呉羊其角大而墮出西方本草諸註各異觀今所市者與爾雅之羚羊陶註之山羊蘇註之山驢大都相似今人相承用之以為羱羊細角長四五寸者往往彎中有磨角成痕處詳諸説此乃真羱羊角而世多不用何也又閩廣山中出一種野羊彼人亦謂之羚羊也陳氏謂耳邊聴之鳴者良今牛羊諸角但殺之者聴之皆有聲不獨羚角也自死角則無聲矣宗奭曰諸角附耳皆集集有聲不如有掛痕一説為盡之然有偽作者宜察焉時珍曰羚羊似羊而青色毛粗兩角短小羱羊似呉羊兩角長大山驢驢之身而羚之角但稍大而節疎慢耳陶氏言羚羊有一角者而陳氏非之按寰宇志云安南髙石山出羚羊一角極堅能碎金剛石則羚固有一角者矣金剛石出西域狀如紫石英百錬不消物莫能擊惟羚羊角扣之則自然冰泮也又貘骨偽充佛牙物亦不能破用此角擊之即碎皆相畏耳羚羊皮西人以以作座褥附錄山驢恭曰見上文時珍曰南史云滑國出野驢有角廣志云驢羊似驢山海經云晉陽懸甕之山女几之山荆山綸山並多閭郭璞註云閭即羭也似驢而岐蹄馬尾角如麢羊一名山驢俗人亦用其角以代羚羊又北山經云太行之山有獸名䮝狀如麢羊而四角馬尾有距善旋其名自叫此亦山驢之類也羚羊角修治斆曰凡用有神羊角甚長有二十四節内有天生木胎此角有神力抵千牛凡使不可單用須要不折元對繩縳鐵銼銼細重重宻裹避風以旋旋取用搗篩極細更研萬匝入藥免刮人膓氣味鹹寒無毒别録曰苦微寒甄權曰甘温能縮銀主治明目益氣起隂去惡血注下辟蠱毒惡鬼不祥常不魘寐本經除邪氣驚夢狂越僻謬療傷寒時氣寒熱熱在肌膚濕風注毒伏在骨間及食噎不通久服强筋骨輕身起隂益氣利丈夫别錄治中風筋攣附骨疼痛作末蜜服治卒熱悶及熱毒痢血疝氣摩水塗腫毒孟詵治一切熱毒風攻注中惡毒風卒死昏亂不識人散産後惡血衝心煩悶燒末酒服之治小兒驚癎治山瘴及噎塞藥性治驚悸煩悶心胸惡氣瘰􅐇惡瘡溪毒藏器平肝舒筋定風安魂散血下氣辟惡解毒治子癎痙疾時珍發明時珍曰羊火畜也而羚羊則屬木故其角入厥隂肝經甚捷同氣相求也肝主木開竅于目其發病也目暗障翳而羚羊角能平之肝主風在合為筋其發病也小兒驚癎婦人子癎大人中風搐搦及筋脈攣急厯節掣痛而羚角能舒之魂者肝之神也發病則驚駭不寧狂越僻謬魘寐卒死而羚角能安之血者肝之藏也發病則瘀滯下注疝痛毒痢瘡腫瘻癧産後血氣而羚角能散之相火寄于肝膽在氣為怒病則煩懣氣逆噎塞不通寒熱及傷寒伏熱而羚角能降之羚之性靈而筋骨之精在角故又能辟邪惡而解諸毒碎佛牙而燒烟走蛇虺也本經别錄甚著其功而近俗罕能發揚惜哉附方舊七新四噎塞不通羚羊角屑為末飲服方寸匕并以角摩噎上外臺胸脇通滿羚羊角燒末水服方寸匕子母秘錄腹痛熱滿方同上墮胎腹痛血出不止羚羊角燒灰三錢豆淋酒下普濟産後煩悶汗出不識人千金用羚羊角燒末東流水服方寸匕未愈再服湯又方加芍藥枳實等分炒研末服血氣逆煩羚羊角燒末水服方寸匕肘后方臨産催生羚羊角一枚刮尖末酒服方寸匕産寶小兒下痢羚羊角中骨燒末飲服方寸匕秘錄遍身赤丹羚羊角燒灰鷄子清和塗之神效外臺赤癍如瘡瘙痒甚則殺人羚羊角磨水摩之數百遍為妙肘后方山嵐瘴氣羚羊角末水服一錢集簡方肉氣味甘平無毒主治惡瘡藏器和五味炒熟投酒中經宿飲之治筋骨急强中風北人恒食南人食之免蛇蟲傷孟詵肺氣味同肉主治水腫鼓脹小便不利時珍發明時珍曰羚羊肺本草不收千金翼載大醫山璉治韋司業水腫莨菪丸用之盖取其引藥入肺以通小便之上源也其方用羚羊肺一具沸湯微煠過曝乾為末莨菪子一升用三年醋浸一伏時蒸熟搗爛和丸梧子大每用四十丸麥門冬湯食後服候口中乾妄語為騐數日小便大利即瘥無羚羊以青羊膽代之亦可膽氣味苦寒無毒主治面上皯􅍍如雀卵色以二升同煑三沸塗四五次良時珍附方新一面䵴羚羊膽牛膽各一枚醋二升同煑三沸頻塗之外臺鼻主治炙研治五尸遁尸邪氣時珍用外臺方中之山羊日用釋名野羊圖經羱羊時珍曰羊之在原野者故名集解𢎞景曰山羊即爾雅羱羊出西夏似呉羊而大角角墮者能陟峻坂羌夷以為羚羊角極長惟一邊有節節亦疎大不入藥用恭曰山羊大如牛或名野羊善鬭至死角堪為鞍橋頌曰閩廣山中一種野羊彼人謂之羚羊其皮厚硬不堪炙食其肉頗肥呉瑞曰山羊似羚羊色青其角有掛痕者為羚羊無者為山羊時珍曰山羊有二種一種大角盤環肉至百觔者一種角細者説文謂之莧羊音桓陸氏云羱羊狀如驢而羣行其角甚大以時墮角暑天塵露在上生草戴行故代都賦云羱羊養草以盤桓肉氣味甘熱無毒頌曰南方野羊多噉石香薷故膓藏頗熱不宜多食之主治男人食之肥軟益人治冷勞山嵐瘧痢婦人赤白帶下蘇頌療筋骨急强虚勞益氣利産婦不利時疾人呉瑞鹿本經中品校正本經上品白膠中品鹿茸今併為一條釋名斑龍時珍曰鹿字篆文象其頭角身足之形爾雅云鹿牡曰䴥音加牝曰麀音攸其子曰麛音迷絶有力曰麉音堅斑龍名出澹寮方按乾寜記云鹿與遊龍相戲必生異角則鹿得稱龍或以此與梵書謂之宻利迦羅集解時珍曰鹿處處山林中有之馬身羊尾頭側而長髙脚而行速牡者有角夏至則解大如小馬黄質白斑俗稱馬鹿牝者無角小而無斑毛雜黄白色俗稱麀鹿孕六月而生子鹿性淫一牡常交數牝謂之聚麀性喜食龜能别良草食則相呼行則同旅居則環角外向以防害臥則口朝尾閭以通督脈殷仲堪云鹿以白色為正述異記云鹿千嵗為蒼又五百嵗為白又五百嵗為𤣥𤣥鹿骨亦黒為脯食之可長生也埤雅云鹿乃仙獸自能樂性六十年必懷璚于角下斑痕紫色行則有涎不復急走故曰鹿戴玉而角斑魚懷珠而鱗紫沈存中筆談云北狄有駝鹿極大而色蒼黄無斑角大而有文堅瑩如玉茸亦可用名苑云鹿之大者曰塵羣鹿隨之視其尾為準其尾能辟塵拂氈則不蠧置茜帛中嵗久紅色不黯也鹿茸修治别錄曰四月五月解角時取隂乾使時燥恭曰鹿茸夏收之隂乾百不收一且易臭惟破之火乾大好斆曰凡使鹿茸用黄精自然汁浸兩日夜漉出切焙搗用免渴人也又法以鹿茸鋸作片每五兩用羊脂三兩拌天靈盖末塗之慢火炙令内外黄脆以鹿皮裹之安室中一宿則藥魂歸矣乃慢火焙乾搗末用日華曰只用酥炙炒研宗奭曰茸上毛光以酥薄塗匀于烈熖中灼之候毛盡微炙不以酥則火熖傷茸矣時珍曰澹寮濟生諸方有用酥炙酒炙及酒蒸焙用者當各隨本方發明抱朴子曰南山多鹿每一雄遊牝百數至春羸瘦入夏惟食菖莆即肥當角解之時其茸甚痛獵人得之以索繫住取茸然後斃鹿鹿之血未散也宗奭曰茸最難得不破及不出却血者盖其力盡在血中故也此以如紫茄者為上名茄子茸取其難得耳然此大嫩血氣未具其實少力堅者又太老惟長四五寸形如分岐馬鞍茸端如瑪瑙紅玉破之䏎如朽木者最善人亦將麋角偽為之不可不察按沈存中筆談云月令冬至麋角解夏至鹿角解隂陽相反如此今人以麋鹿茸作一種者疎矣或刺麋鹿血以代茸云茸亦血此大誤矣麋茸利補陽鹿茸利補隂須佐以他藥則有功凡含血之物肉差易長筋次之骨最難長故人自胚胎至成人二十年骨髓方堅惟麋鹿角自生至堅無兩月之久大者至二十餘觔計一日夜須生數兩凡骨之生無速于此雖草木易生亦不及之此骨之至强者所以能補骨血堅陽道益精髓也頭者諸陽之㑹上鍾于茸角豈可與凡血為比哉時珍曰按熊氏禮記疏云鹿是山獸屬陽情淫而遊山夏至得隂氣解角從陽退之象麋是澤獸屬隂情淫而遊澤冬至得陽氣而解角從隂退之象也餘見角下氣味甘温無毒别録曰酸微温甄權曰苦辛可麻勃為之使詵曰鹿茸不以臭齅之中有小白蟲視之不見入人鼻必為蟲顙藥不及也主治漏下惡血寒熱驚癎益氣强志生齒不老本經療虚勞洒洒如瘧羸瘦四肢酸疼腰脊痛小便數利洩精溺血破瘀血在腹散石淋癰腫骨中熱疽癢安胎下氣殺鬼精物久服耐老不可近丈夫隂令痿别錄補男子腰腎虚冷脚膝無力夜夢鬼交精溢自出女人崩中漏血赤白帶下炙末空心酒服方寸匕壯筋骨日華生精補髓養血益陽强筋徤骨治一切虚損耳聾目暗眩運虚痢時珍發明時珍曰按澹寮方云昔西蜀市中嘗有一道人貨斑龍丸一名茸珠丹每大醉髙歌曰尾閭不禁滄海竭九轉靈丹都慢説惟有斑龍頂上珠能補玉堂闗下穴朝野遍傳之其方盖用鹿茸鹿角膠鹿角霜也又戴原禮證治要訣治頭眩運甚則屋轉眼黒或如物飛或見一為二用茸珠丹甚效或用鹿茸半兩無灰酒三盞煎一盞入麝香少許温服亦效云茸生于頭類之相從也附方舊一新八斑龍丸治諸虚用鹿茸酥炙或酒炙亦可鹿角膠炒成珠鹿角霜陽起石煅紅酒淬肉從容酒浸酸棗仁栢子仁黄茋蜜炙各一兩當歸黒附子炮地黄九蒸九烙各八錢辰硃砂半錢各為末酒糊丸梧子大每空心温酒下五十丸澹寮鹿茸酒治陽事虚痿小便頻數面色無光用嫩鹿茸一兩去毛切片山藥末一兩絹袋裹置酒壜中七日開瓶日飲三盞將茸焙作丸服普濟方隂虚腰痛不能反側鹿茸炙兎絲子各一兩舶茴香半兩為末以羊腎二對去酒煑爛搗泥和丸梧子大隂乾每服三五十丸温酒下日三服本事方精血耗涸耳聾口渴腰痛白濁上燥下寒不受峻補者鹿茸酒蒸當歸酒浸各一兩焙為末烏梅肉煮膏搗丸梧子大毎米飲服五十丸生濟方腰膝疼痛傷敗者鹿茸塗酥炙紫為末毎服酒服一錢續千金方小便頻數鹿茸一對酥炙為末毎服二錢温酒下日三服鄭氏家傳方虚利危困因血氣衰弱者鹿茸酥炙一兩為末入麝香五分以燈心煑棗肉和丸梧子大每空心米飲下三五十丸濟生方飲酒成泄骨立不能食但飲酒即泄用嫩鹿茸酥炙肉蓯蓉煨一兩生麝香五分為末陳白米飯丸梧子大毎米飲下五十丸名香茸丸普濟方室女白帶因衝任虚寒者鹿茸酒蒸焙二兩金毛狗脊白歛各一兩為末用艾煎醋打糯米糊丸梧子大每温酒下五十丸日二濟生角頌曰七月采角以鹿年久者其角更好煑以為膠入藥彌佳斆曰鹿角要黄色緊重尖好者此鹿食靈草所以異衆鹿也修治詵曰凡用鹿角麋角並截段錯屑以蜜浸過微火焙令小變色曝乾搗篩為末或燒飛為丹服之至妙以角寸截泥裹于器中大火燒一日如玉粉也時珍曰按崔行功要纂方鹿角粉法以鹿角寸截炭火燒過搗末水和成團以絹袋三五重盛之再煅再和如此五度以牛乳和再燒過研用氣味鹹温無毒杜仲為之使主治惡瘡癰腫逐邪惡氣留血在隂中除少腹血痛腰脊痛折傷惡血益氣别錄猫鬼中惡心腹疼痛蘇恭水磨汁服治脱精尿血夜夢鬼交醋磨汁塗瘡瘍癰腫熱毒火炙熱熨小兒重舌鵝口瘡日華宻炙研末酒服輕身强骨髓補陽道絶傷又治婦人夢與鬼交者清酒服一撮即出鬼精燒灰治婦人胞中餘血不盡欲死以酒服方寸匕日三甚妙孟詵發明時珍曰鹿角生用則散熱行血消腫辟邪熟用則益腎補虚强精活血鍊霜熬膏則專于滋補矣附方舊十六新十九服鹿角法鹿角屑十兩生附子三兩去皮臍為末每服二錢空心温酒下令人少睡益氣力通神明彭祖方腎消尿數鹿角一具炙搗篩温酒每服方寸匕日二臺外骨虚勞極面腫垢黒脊痛不能久立血氣衰憊髪落齒枯甚則喜唾用鹿角二兩牛膝酒浸焙一兩半為末煉蜜丸梧子大毎服五十丸空心鹽酒下濟生腎虚腰痛如錐刺不能動揺鹿角屑三兩炒黄研末空心温酒服方寸匕日三肘后方卒腰脊痛不能轉側鹿角五寸燒赤投二升酒中浸一宿飲梅師婦人腰痛鹿角屑炒黄研酒服方寸匕日五六服楊氏産乳妊娠腰痛鹿角截五寸長燒赤投一升酒中又燒又浸如此數次細研空心酒服方寸匕産寳産後腹痛血不盡者鹿角燒研豉汁服方寸匕日二子母秘錄妊娠下血不止鹿角屑當歸各半兩水三盞煎減半頓服不過二服普濟方胎死腹中鹿角屑三寸七煮葱豉湯和服立出百一方墮胎血瘀不下狂悶寒熱用鹿角屑一兩為末豉湯服一錢日三須臾血下聖惠方胞衣不下鹿角屑三分為末薑湯調下産乳産後血運鹿角一段燒存性出火毒為末酒調灌下即醒楊拱醫方摘要婦人白濁滑數虚冷者鹿角屑炒黄為末酒服二錢婦人良方筋骨疼痛鹿角燒存性為末酒服一錢日二食後喜嘔鹿角燒末二兩人參一兩為末薑湯服方寸匕日三肘后方小兒噦疾鹿角粉大豆末等分相和乳調塗乳上飲之古今錄騐小兒瘧疾鹿角生研為末先發時以乳調一字服千金小兒滯下赤白者用鹿角灰髪灰等分水服三錢日二千金方小兒重舌鹿角末塗舌下日三姚和衆方小兒流涎脾熱也鹿角屑末米飲服一字濟普方面上皯皰鹿角尖磨濃汁厚塗之神效面上風瘡鹿角尖磨酒塗之聖惠咽喉骨骾鹿角為末含之嚥津斗門方蹉跌損傷血瘀骨痛鹿角末酒服方寸匕日三千金方竹木入肉不出者鹿角燒末水和塗上立出久者不過一夕千金方蠼螋尿瘡鹿角燒末苦酒調服外臺五色丹毒鹿角燒末猪脂和敷肘后方發背初起鹿角燒灰醋和塗之日五六易千金方乳發初起不治殺人鹿角磨濃汁塗之并令人朔去黄水隨手即散梅師方吹奶掀痛鹿角屑炒黄為末酒服二錢仍以梳梳之騐唐氏經方下注脚瘡鹿角燒存性入輕粉同研油調塗之集要癤毒腫毒鹿角尖磨濃汁塗之甚妙瀕湖方癰疽有蟲鹿角燒末苦酒和塗磨汁亦可妖魅猫鬼病人不肯言鬼以鹿角屑搗末水服方寸匕即言實也録騐白膠一名鹿角膠本經粉名鹿角霜甄權曰白膠一名黄明膠時珍正誤見黄明膠修治别録曰白膠生雲中煑鹿角作之𢎞景曰今人少復煑作惟合角弓用之其法先以米瀋汁漬七日令軟煑煎如作阿膠法耳又一法剉角令細入乾牛皮一片即易消爛不爾雖百年無一熟也恭曰鹿角麋角但煮濃汁重煎即為膠矣何必使爛欲求爛亦不難陶未見耳詵曰作膠法細破寸截以河水浸七日令軟方煑之斆曰采全角鋸開並長三寸以物盛于急水中浸一百日取出刀刮去黄皮拭浄以醶醋煮七日旋旋添醋勿令少歇成時不用著火只從子至戌一日足角軟如粉搗爛每一兩入無灰酒一鎰煑成膠隂乾研篩用時珍曰今人呼煮爛成粉者為鹿角霜取粉熬成膠或只以濃汁熬成膏者為鹿角膠按胡􅀈衛生方云以米泔浸鹿角七日令軟入急流水中浸七日去粗皮以東流水桑柴火煮七日旋旋添水入醋少許搗成霜用其汁加無灰酒熬成膠用又邵以正濟急方云用新角三對寸截盛于長流水浸三日刮浄入楮實子桑白皮黄蠟各二兩鐵鍋中水煮三日夜不可少停水少即添湯日足取出刮浄晒研為霜韓􅐂醫通云以新鹿角寸截囊盛于流水中浸七日以瓦缶入水桑柴火煮毎一觔入黄蜡半觔以壺掩住水水旋添其角軟以竹刀刮浄搗為霜用氣味甘平無毒别録曰温黄得久良畏大主治傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎乆服輕身延年本經療吐血下血崩中不止四肢作痛多汗淋露折跌傷損别錄男子損臟氣氣弱勞損吐血婦人服之令有子安胎去冷治漏下赤白藥性炙搗酒服補虚勞長肌益髓令人肥徤悦顔色又治勞嗽尿精尿血瘡瘍腫毒時珍發明斆曰凡使鹿角勝于麋角頌曰今醫家多用麋茸麋角云力𦂳于鹿也時珍曰蘇東坡良方云鹿陽獸見隂而角解麋隂獸見陽而角解故補陽以鹿角為勝補隂以麋角為勝其不同如此但云鹿勝麋麋勝鹿疎矣按此説與沈存中鹿茸利補隂麋茸利補陽之説相反以理與功推之蘇説為是詳見茸下附方舊七新一異類有情丸韓氏醫通云此方自製者凡丈夫中年覺衰便可服餌盖鹿乃純陽龜虎屬隂血氣有情各從其類非金石草木比也其方用鹿角霜治法見上龜板酒浸七日酥炙研各三兩六錢鹿茸燻乾酒洗淨酥塗炙研虎脛骨長流水浸七日蜜塗酥炙各二兩四錢水火煉蜜入豶豬脊髓九條搗丸梧子大毎空心鹽湯下五七九十丸如厚味善飲者加豬膽汁一二合以寓降火之義盜汗遺精鹿角霜二兩生龍骨炒牡蠣煅各一兩為末酒糊丸梧子大每鹽湯下四十丸濟普虚勞尿精白膠二兩炙為末酒二升和温服外臺虚損尿血白膠三兩炙水二升煮一升四合分服外臺小便不禁上熱下寒者鹿角霜為末酒糊和丸梧桐子大每服三四十丸空心温酒下普濟小便頻數鹿角霜白茯苓等分為末酒糊丸梧子大毎服三十丸鹽湯下梁氏總要男子陽虚甚有補益方同上湯火灼瘡白膠水煎令稠待冷塗之斗門方齒主治䑕瘻留血心腹痛不可近丈夫隂蘓恭骨氣味甘微熱無毒主治安胎下氣殺鬼精物乆服奈老可酒浸服之孟詵作酒主内虚續絶傷補骨除風思邈燒灰水服治小兒洞注下痢時珍附方新一補益虚羸鹿骨煎用鹿骨一具枸杞根二升各以水一斗煎汁五升和匀共煎五升日二服千金肉氣味甘温無毒詵曰九月已後正月已前堪食他月不可食發冷痛白臆者豹文者並不可食鹿肉脯炙之不動及見水而動或曝之不燥者並殺人不可同雉肉蒲白鮠魚蝦食發惡瘡禮記云食鹿去胃主治補中益氣力强五臟生者療中風口僻割片薄之别錄同華陀云中風口偏者以生肉生椒搗貼正即除之補虚瘦弱調血脈孟詵養血生容治産後風虚邪僻時珍肉外臺有鹿湯發明思邈曰壼居士言鹿性多警烈能别良草止食葛花葛葉鹿葱鹿藥白髙水斤甘草薺苨齊頭蒿山蒼耳他草不食處必山岡故産則歸下澤饗神用其肉者以其性烈清淨也凡藥餌之人乆食鹿肉服藥必不得力為其食解毒之草制諸藥也𢎞景曰野獸之中麞鹿可食生則不羶腥又非十二辰屬八卦無主且温補于人生死無尤道家許聴為補過其餘雖鷄犬牛羊補益于亡魂有愆責並不足食宗奭曰三禮取鹿腊亦取此義且味亦勝他肉時珍曰邵氏言鹿之一身皆益人或煮或蒸或脯同酒食之良大抵鹿乃仙獸純陽多夀之物能通督脈又食良草故其肉角有益無損陶説亦妄耳頭肉氣味平主治消渴夜夢鬼物煎汁服作膠彌善蘓恭於宗奭曰頭可釀酒須作漿時稍益葱椒附方新一老人消渴鹿頭一箇去毛煮爛和五味空心食以汁嚥之鄙事蹄肉氣味平主治諸風脚膝骨中疼痛不能踐地同豉汁五味煮食孫思邈脂主治癰腫死肌温中四肢不隨頭風通腠理不可近隂蘇恭時珍曰此乃本經麋脂正文而蘇氏以註鹿脂二脂功或同耶附方新一面上皯皰鹿脂塗之日再聖惠方髓煉淨入藥氣味甘温無毒主治丈夫女子傷中絶脈筋急痛欬逆以酒和服之良别錄同蜜煮服壯陽道令有子同地黄汁煎膏服填骨髓壯筋骨治嘔吐日華補隂强陽生精益髓潤燥澤肌時珍發明頌曰髓可作酒唐方多有其法時珍曰鹿髓近方稀用者刪繁方治肺虚毛悴酥髓湯用之御藥院方滋補藥用其脊髓和酒熬膏丸藥甚為有理白飛霞醫通云取鹿腦及豬骨髓鍊成膏每一兩加鍊蜜二兩鍊匀瓷器宻收用和滋補丸藥劑甚妙凡腰痛屬腎虚寒者以和古方摩腰膏薑汁化一粒擦腎堂則暖氣透入丹田如火大補元陽此法甚佳人鮮知之附方新一鹿髓煎治肺痿􅠲𠻳傷中脈絶用鹿髓生地黄汁各七合酥蜜各一兩杏仁桃仁各三兩去皮炒酒一升同搗取汁先煎杏仁桃仁地黄汁減半入三味煎如稀餳每含一匙嚥下日三聖惠腦主治入面脂令人悦澤蘇頌刺入肉内不出以腦敷之燥即易半日當出深師精主治補虚羸勞損時珍發明韓􅐂曰王師授予鹿䘒丸方云鹿禀純陽而䘒者天地初分之氣牝牡相感之精也醫書稱鹿茸角血髓大有補益而此䘒則入神矣其法用初生牡鹿三五隻苑圃馴養每日以人參煎湯同一切草藥任其飲食乆之以硫黄細末和入從少至多燥則漸減周而復始大約三年之内一旦毛脱筋露氣盛陽極却以牝鹿隔苑誘之欲交不得則精洩于外或令其一交即設法取其精瓦器收之香粘如餳是為䘒也用和鹿角霜一味為丸空心鹽酒下大起胎羸虚瘵危疾凡服滋補丸藥用此入鍊蜜和劑絶妙時珍曰按老子云骨弱筋柔而握固未知牝牡之合而䘒作者精之至也䘒音子催切赤子隂也今作鹿精之名亦未為穏血主治隂痿補虚止腰痛鼻衂折傷狂犬傷蘇恭和酒服治肺痿吐血及崩中帶下日華諸氣痛欲危者飲之立愈汪頴大補虚損益精血解痘毒藥毒時珍發明頌曰近世有服鹿血酒者云得于射生者因采捕入山失道數日饑渴將委頓惟獲一生鹿刺血數升飲之飢渴頓除及歸遂覺血氣充盛異人有效而服之者刺鹿頭角間血酒和飲之更佳時珍曰近世韓飛霞補益方有斑龍晏法孫氏解痘毒有隂陽二血丸皆古所未知者而沈存中又以刺血代茸為非亦一説也附方新二斑龍晏用馴養牡鹿一二隻每日以人參一兩煎水與飲將滓拌土産草料米豆以時餵之勿雜他水草百日之外露筋可用矣晏法夜前減其食次早將布縳鹿於床首低尾昻令有力者抱定前足有角者執定角無角者以木囊頭拘之使頭不動用三棱針刺其眼之大眥前毛孔名天池穴以銀管長三寸許挿向鼻梁坐定咂其血飲藥酒數盃再咂再飲以醉為度鼻中流出者亦可接和酒飲飲畢避風行升降工夫為一晏也用生飢藥敷鹿穴養之月可一度一鹿可用六七年不拘男女老少服之終身無疾而夀乃仙家服食丹方二十四品之一也藥酒以八珍散加沉香木香煑之隂陽二血丸治小兒痘瘡未出者稀已出者減用鹿血兎血各以青紙盛置灰上晒乾乳香没藥各一兩雄黄黄連各五錢硃砂麝香一錢為末煉蜜丸綠豆大毎服十丸空心酒下兒小者減之孫氏集效方鼻血時作乾鹿血炒枯將酒酻薰二三次仍用酒酻半盃和服之腎氣味甘平無毒主治補腎氣别錄補中安五臟壯陽氣作酒及煑粥食之日華附方舊一腎虚耳聾用鹿腎一對去脂膜切以䜴汁入粳米二合煑粥食亦可作羮聖惠方膽氣味苦寒無毒主治消腫散毒時珍筋主治勞損續絶蘇恭塵沙眯目者嚼爛挼入目中則粘出時珍附方舊一骨鯁鹿筋漬軟槎索令𦂳大如彈丸持筋端吞至鯁處徐徐引之鯁著筋出外臺靨主治氣癭以酒漬炙乾再浸酒中含嚥汁味盡更易十具乃愈深師皮主治一切漏瘡燒灰和豬脂納之日五六易愈乃止時珍糞主治經日不産乾濕各三錢研末薑湯服立效經騐胎糞主治解諸毒時珍曰按范曄漢書云冉䮾夷出鹿食藥草其胎中麑糞可療毒也麋本經下品釋名時珍曰陸佃云麋喜音聲斑固云麋性淫迷則麋之名義取乎此爾雅云牡曰麔音咎牝曰麎音辰其子曰䴠音天集解别錄曰麋生南山山谷及淮海邊十月取之𢎞景曰今海陵間最多千百為羣多牝少牡時珍曰麋鹿屬也牡者有角鹿喜山而屬陽故夏至解角麋喜澤而屬隂故冬至解角麋似鹿而色青黒大如小牛肉蹄目下有二竅為夜目故淮南子云孕女見麋而子四目也博物志云南方麋千百為羣食澤草踐處成泥名曰麋畯人因耕穫之其鹿所息處謂之鹿塲也今獵人多不分别往往以麋為鹿牡者猶可以角退為辨牝者通目為麀鹿矣麋脂一名官脂本經用時珍曰别錄言十月取脂煉過收而周禮冬獻狼夏獻麋註云狼膏聚麋膏散聚則温散則涼以順時也氣味辛温無毒忌桃李畏大黄主治癰腫惡瘡死肌寒熱風寒濕痺四肢拘緩不收風頭腫氣通腠理本經柔皮膚不可近隂令痿别録治少年氣盛面生瘡皰化脂塗之時珍正誤𢎞景曰人言麋一牡輒交十餘牝交畢即死其脂墮地經年人得之名曰道脂酒服至良夫麋性乃爾婬快不應痿人隂一方言不可近隂令隂不痿此乃有理恭曰遊牝畢即死者虚傳也遍問山澤人無此説肉氣味甘温無毒詵曰多食令人弱房發脚氣妊婦食之令子目病𢎞景曰不可合猪肉雉肉食發痼疾合蝦及生菜梅李食損男子精氣主治益氣補中治腰脚孟詵補五臟不足氣禹錫發明時珍曰按陸農師云鹿以陽為體其肉食之燠麋以隂為體其肉食之寒觀此則别錄麋脂令人隂痿孟詵言多食肉令人弱房及角肉不同功之説亦此意也茸修治與鹿茸同氣味甘温無毒主治隂虚勞損一切血病筋骨腰膝酸痛滋隂益腎時珍麋角修治斆曰麋角以頂根上有黄毛若金線兼旁生小尖色蒼白者為上詵曰凡用麋角可五寸截之中破炙黄為末入藥時珍曰麋鹿茸角今人罕能分别陳自明以小者為鹿茸大者為麋茸亦臆見也不若親視其采取時為有準也造麋角膠麋角霜並與鹿角膠鹿角霜同法又集靈方云用麋角一雙水浸七日刮去皮錯屑以銀瓶盛牛乳浸一日乳耗再加至不耗乃止用油紙宻封瓶口别用大麥鋪鍋中三寸上安瓶再以麥四周填滿入水浸一伏時水耗旋加待屑軟如麵取出焙研成霜用氣味甘熱無毒主治風痺止血益氣力别錄刮屑熬香酒服大益人𢎞景傳出彭祖中酒服補虚勞添精益髓益血脈暖腰膝壯陽悦色療風氣偏治丈夫日華作粉常服治丈夫冷氣及風筋骨疼痛若卒心痛一服立瘥漿水磨泥塗面令人光華赤白如玉可愛孟詵滋隂養血功與茸同時珍發明詵曰麋角常服大益陽道不知何因與肉功不同也煎膠與鹿角膠同功茸亦勝鹿茸仙方甚重之恭曰麋茸功力勝鹿茸角煑膠亦勝白膠詳見鹿茸鹿角下日華曰麋角屬隂故治腰膝不仁補一切血病也時珍曰鹿之茸角補陽右腎精氣不足者宜之麋之茸角補隂左腎血液不足者宜之此乃千古之微秘前人方法雖具而理未發出故論者紛紜又楊氏家藏方治虚損有二至丸兩角並用但其藥性過温止宜於陽虚寒濕血痺者耳於左腎無與焉孫思邈千金方言麋角丸凡一百一十方惟容成子羔所服者特出衆方之外子羔服之羽化今觀其方比二至丸似可常服並集於下附方新五麋角丸補心神安臟腑填骨髓理腰脚能久立聰耳明目髪白更黒貌老還少凡麋角取當年新角連腦頂者為上看角根有研痕處亦堪用蜕角根下平者不堪取角五具或四具三具二具一具為一劑去尖一大寸即角長七八寸取勢截㫁量把鎊得即于長流水中以竹器盛懸浸十宿如無長流水處即于淨盆中滿著水浸每夜易換軟即將出削去皺皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即乾握瀝去舊水置新絹上曝乾擇去惡物粗骨皮及鎊不匀者以無灰美酒於大磁器中浸經兩宿其藥及酒俱入淨釡中初用武火煮一食久後以文火微煎如蟹目沸以栁木箆徐徐攪不得住手時時添酒以成煎為度煎時皆須平旦下手不得經宿仍看屑如稀膠即以牛乳五升酥一片以次漸下後項藥仍以糜角一條炙令黄為末與諸藥同製之檳榔通草秦芁肉蓯蓉人參兎絲子酒浸兩宿别搗晒乾甘草各一兩右搗為末將膠再煎一食頃似稀稠粥即止火少時投諸藥末相和稠粘堪作丸即以新器盛貯以衆手一時丸如梧子大如粘手著少酥塗手其服餌之法空腹以酒下之初服三十丸日加一丸加至五十丸為度日二服至一百日内忌房室服經一月腹内諸疾自相驅逐有微利勿怪漸後多泄氣能食患氣者加枳實青木香各一兩服至二百日面皺光澤一年齒落更生强記身輕若風日行數百里二年令人肥飽少食七十已上服之却成後生三年腸作筋體預見未明四年常飽不食自見仙人三十下服之不輟顔一定而不變修合時須在淨室中勿令隂人雞犬孝子等見婦人服之尤佳如飲酒食麵口乾眼澀内熱者即服三黄丸微利之如此一度發動已後方始調暢也千金二至丸補虚損生精血去風濕壮筋骨用鹿角鎊細以真酥一兩無灰酒一升慢火炒乾取四兩麋角鎊細以真酥二兩米醋一升煑乾慢火炒乾取半兩蒼耳子酒浸一宿焙半觔山藥白茯苓黄茋蜜炙各四兩當歸酒浸焙五兩肉蓯蓉酒浸焙逺志去心人參沉香各二兩熟附子一兩通為末酒煑糯米糊丸梧子大每服五十丸温酒鹽湯任下日二服楊氏家藏方麋角丸治五痿皮緩毛瘁血脈枯稿肌膚薄著筋骨羸弱飲食不美四肢無力爪枯髪落眼昏唇燥用麋角屑一觔酒浸一宿大附子生去皮臍一兩半熟地黄四兩用大麥米一升以一半藉底以一半在上以二布中隔覆炊一日取出藥麥各焙為末以浸藥酒添清酒煑麥粉為糊和杵三千下丸如梧子大每服五十丸食前用温酒或米湯送下日三服熟一方只用麋角鎊屑酥炒黄色五兩附子末半兩酒糊丸服麋角霜丸補元臟駐顔色用麋角一副水浸七日刮去皺皮鎊為屑盛在一銀瓶内以牛乳汁浸一日常令乳髙二寸如乳耗更添直候不耗用油單紙重宻封瓶口别用大麥一斗安在别瓶内約厚三寸上安麋角瓶更用大麥周圍填實露瓶口不住火蒸一伏時如鍋内水耗即旋添熱湯須頻看角屑粉爛如麵即住火取出用細篩子漉去乳焙乾毎料八兩附子炮製去皮乾山藥各三兩右為末蒸棗肉和丸如梧子大毎服十五丸至二十丸空心用温鹽酒送下煉蜜丸亦可總錄麋角丸彭祖丸使人丁壯不老房室不勞損氣力顔色不衰者莫過麋角其法刮為末十兩用生附子一枚合之雀卵和丸日服二十丸温酒下二十日大効亦可單熬為末酒服亦令人不老但性緩不及附子者彭祖服食經骨主治虚勞至良煮汁釀酒飲令人肥白美顔色禹錫皮主治作靴韈除脚氣孟詵雙頭鹿拾遺釋名荼苜机時珍曰荼苜机音蔡茂机畨言也出博物志舊本訛作荼苴机又作余義亦荼苜之訛也集解藏器曰按張華博物志云荼苜机出永昌郡是兩頭鹿名也似鹿兩頭其胎中屎以四月取之范燁後漢書云雲陽縣有神鹿兩頭能食毒草華陽國志云此鹿出雲陽南郡熊舍山即余義也時珍曰按盛𢎞之荆州記云武陵郡雲陽山㸃蒼山産兩頭獸似鹿前後有頭一頭食一頭行山人時或見之叚成式雜俎云雙頭鹿矢名耶希夷人謂鹿為耶謂屎為希按唐韻屎字又音希即此義也胎中屎主治敷惡瘡蛇虺毒藏器麂宋開寳附釋名􅕱即古麂字時珍曰麂味甘旨故從旨又字説云山中有虎麂必鳴以告其聲几几然故曰麂大者曰麖集解馬志曰麂生東南山谷頌曰今有山林處皆有之而均房湘漢間尤多乃麞類也按爾雅云麂大麕旄尾狗足謂毛長也南人往往食其肉然堅靭不及麞味美其皮作履舄勝於諸皮又有一種類麂而大者名麖不堪藥用山海經云女几之山多麖麂即此宗奭曰麂麞屬而小於麞其口兩邊有長牙好鬬其皮為第一無出其右者但皮多牙傷痕其聲如擊破鈸四方皆有山深處頗多時珍曰麂居大山中似麞而小牡者有短角黧色豹脚脚矮而力勁善跳越其行草莽但循一徑皮極細膩鞾韈珍之或云亦好食蛇符瑞志有銀麂白色今施州山中出一種紅麂紅色肉氣味甘平無毒主治五痔病煠熟以薑醋進之大有效藏器頭骨氣味辛平無毒主治燒灰飲服治飛尸藏器皮主治作鞾􅀈除濕氣脚痺時珍麞别録中品釋名麕音君亦作麏時珍曰獵人舞采則麞麋注視麞喜文章故字從章陸氏曰麞性驚慞故謂之麞又善聚散故又名麕囷圓倉也爾雅云麕牡曰麌音語牝曰麜音栗其子曰麆音助大者曰麃音庖古語云四足之美有麃是矣集解頌曰麞今陂澤淺草中多有之其類甚多麕乃總名也有有牙者有無牙者其牙不能噬囓時珍曰麞秋冬居山春夏居澤似鹿而小無角黄黒色大者不過二三十觔雄者有牙出口外俗稱牙麞其皮細軟勝於鹿皮夏月毛毨而皮厚冬月毛多而皮薄也符瑞志有銀麞白色云王者刑罸中理則出運斗樞云樞星散為麞鹿正誤詵曰麞中往往得香如栗子大不能全香亦治惡病時珍曰麞無香有香者麝也俗稱土麞呼為香麞是矣今正之肉氣味甘温無毒詵曰八月至十一月食之勝羊十二月至七月食之動氣多食令人消渴苦瘦惡者食之發痼疾不可合鵠肉食成癥疾又不可合梅李蝦食病人主治補益五臟别錄益氣力悦澤人面思邈釀酒有袪風之功寗原發明𢎞景曰俗云白肉是麞其膽白易驚怖也詵曰肉同麋肉釀酒良道家以其肉供養名為白脯云不屬十二辰不是腥膩無禁忌也時珍曰麞膽白性怯飲水見影輒奔道書謂麋鹿無魂也藏器曰人心粗豪者以其心肝曝乾為末酒服一具便即小膽若怯者食之則轉怯不知所為附方舊一新一通乳麞肉煑食勿令婦知子母秘録消瘤用麞肉或鹿肉剖如厚脯炙熱榻之可四炙四易出膿便愈不除再以新肉用之外臺秘要髓腦主治益氣力悦澤人面别録治虚風時珍曰千金治暗風薯蕷煎治虚損天門冬煎竝用之頌曰唐方有麞髓並麞骨酒竝補下骨氣味甘微温無毒主治虚損洩精别錄益精髓悦顔色日華有時珍曰千金治産後虚損麞骨湯煑汁煎藥麝本經上品釋名射父爾雅香麝時珍曰麝之香氣逺射故謂之麝或云麝父之香來射故名亦通其形似麞故俗呼香麞梵書謂麝香曰莫訶婆伽集解别錄曰麝生中臺山谷及益州雍州山中春分取香生者益良𢎞景曰麝形似麞而小黒色常食柏葉又噉蛇其香正在隂莖前皮内别有膜袋裹之五月得香往往有蛇皮骨今人以蛇蜕皮裹香云彌香是相使也麝夏月食蛇蟲多至寒則香滿入春臍内急痛自以爪剔出著屎溺中覆之常在一處不移曾有遇得乃至一斗五升者此香絶勝殺取者昔人云是精溺凝作殊不爾也今出羌夷者多真好出隨郡義陽晉溪諸蠻中者亞之出益州者形扁仍以皮膜裹之多偽凡真香一子分作三四子刮取血膜雜以餘物裹以四足膝皮而貨之貨者又復偽之彼人言但破看一片毛共在裹中者為勝今惟得活者看取必當全真耳頌曰今陜西益州河東諸路山中皆有而秦州文州諸蠻中尤多蘄州光州或時亦有其香絶小一子纔若彈丸往往是真盖彼人不甚作偽爾其香有三等第一生香名遺香乃麝自剔出者然極難得價同明珠其香聚處逺近草木不生或焦黄也今人帶香過園林則𤓰果皆不實是其騐也其次臍香乃捕得殺取之其三心結香乃獸見大獸捕逐驚畏失心狂者墜死人有得之破心見血流出脾上作乾血塊者不堪入藥又有一種水麝其香更竒臍中皆水􅅹一滴於斗水中用洒衣物其香不歇唐天寳中虞人曾一獻之養於囿中毎以針刺其臍捻以真雄黄則臍復合其香倍于肉麝此説載在酉陽雜俎近不復聞有之或有之而人不識矣慎微曰楊億談苑云商汝山中多麝遺糞常在一處不移人以是獲之其性絶愛其臍為人逐急即投巖舉爪剔裂其香就縶而死猶拱四足保其臍故李商隠詩云投巖麝自香許渾詩云尋麝采生香時珍曰麝居山麞居澤以此為别麝出西北者香結實出東南者謂之土麝亦可用而力次之南中靈貓囊其氣如麝人以雜之見本條麝臍香修治斆曰凡使麝香用當門子尤妙以子日開之徴研用不必苦細也氣味辛苦無毒甄權曰苦辛忌大蒜李廷飛曰麝香不可近鼻有白䖝入腦患癩久帶其香透闗令人成異疾主治辟惡氣殺鬼精物去三蟲蠱毒温瘧驚癎久服除邪不夢寤魘寐本經療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒去面䵴目中膚翳婦人産難墮胎通神仙别録佩服及置枕間辟惡夢及尸疰鬼氣又療蛇毒𢎞景爪抱朴子云入山辟蛇以麝香丸著足中有効因麝噉蛇故以厭之也治蛇蠶咬沙蟲溪瘴毒辟蠱氣殺臟腑蟲治瘧疾吐風痰療一切虚損惡病納子宫暖水臟止冷帶下日華熟水研服一粒治小兒驚癎客忤鎮心安神止小便利又能蝕一切癰瘡膿水藥性又云入十香丸服令人百毛九竅皆香除百病治一切惡氣及驚怖恍惚孟詵療鼻窒不聞香臭好古通諸竅開經絡透肌骨解酒毒消𤓰果食積治中風中氣中惡痰厥積聚癥瘕時珍發明李杲曰麝香入脾治内病凡風病在骨髓者宜用之使風邪得出若在肌肉用之反引風入骨如油入麵之不能出也朱震亨曰五臟之風不可用麝香以瀉衛氣口鼻出血乃隂盛陽虚有升無降當補陽抑隂不可用腦麝輕揚飛竄之劑婦人以血為主凡血海虚而寒熱盜汗者宜補養之不可用麝香之散琥珀之燥嚴用和曰中風不省者以麝香清油灌之先通其闗則後免語蹇癱瘓之證而他藥亦有效也時珍曰嚴氏言風病必先用麝香而丹溪謂風病血病必不可用皆非通論盖麝香走竄能通諸竅之不利開經絡之壅遏若諸風諸氣諸血諸痛驚癎癥瘕諸病經絡壅閉孔竅不利者安得不用為引導以開之通之耶非不可用也但不可過耳濟生方治食𤓰果成積作脹者用之治飲酒成消渴者用之云果得麝則壞酒得麝則敗此得用麝之理者也附方舊七新十三中風不省麝香二錢研末入清油二兩和匀灌之其人自甦也濟生方中惡客忤項强欲死麝香少許乳汁塗兒口中取効醋調亦可廣利方小兒驚啼發歇不定真麝香一字清水調服日三廣利小兒中水單以麝香如大豆三枚奶汁調分三四服破傷風水毒腫痛不可忍麝香末一字納瘡中出盡膿水便效普濟方中惡霍亂麝香一錢醋半盞調服聖惠方小兒邪瘧以麝香研墨書去邪辟魔四字於額上騐經諸果成積傷脾作脹氣急用麝香一錢生桂末一兩飯和丸菉豆大大人十五丸小兒七丸白湯下盖木得麝則落木得桂即枯故也濟生消渴飲水因飲酒或食果實過度雖能食而口渴飲水數尿以麝香當門子酒和作十餘丸枳梖子煎湯送下盖麝香敗酒壞果枳梖亦敗酒也生濟偏正頭痛久不除者晴明時將髪分開用麝香五分皂角末一錢薄紙裹置患處以布包炒鹽于上熨之冷則易如此數次永不再發簡便單方五種蠱毒麝香雄黄等分為末以生羊肝如指大以刀割開裹藥吞之衛生口内肉毬有根如線五寸餘如釵股吐出乃能食物捻之則痛徹心者麝香一錢研水服之日三自消夏子益竒疾方催生易産續千金方麝香一錢水研服立下舊濟生勝金散治人弱難産麝香一錢鹽䜴一兩以青布裹之燒紅為末以秤錘淬酒服二錢即下郭稽中云婦人産難及横逆生者乃兒枕破而敗血裹子服勝金散逐其敗血自生也死胎不下麝香當門子一枚桂心末二錢温酒服即下本事方痔瘡腫毒麝香當門子印城鹽等分塗之不過三次外臺鼠咬成瘡麝香封之妙經騐蠶咬成瘡蜜調麝香傅之廣利方山嵐瘴氣水服麝香三分解之集簡方蟲牙作痛香油抺筯頭蘸麝香末綿裹炙熱咬之換二三次其蟲即死㫁根甚妙醫方摘要肉氣味甘温無毒詵曰蠻人常食之似麞肉而腥氣云食之不畏蛇毒也主治腹中癥病時珍附方新一小兒癥病麝肉二兩切焙蜀椒三百枚炒搗末以雞子白和丸小豆大每服二三丸湯下以知為度范汪方靈貓拾遺釋名靈貍作蛉者非香貍雜俎神貍離騷註類時珍曰自為牝牡又有香氣可謂靈而神矣集解藏器曰靈貓生南海山谷狀如貍自為牝牡其隂如麝功亦相似按異物志云靈貓一體自為隂陽刳其水道連囊以酒洒隂乾其氣如麝若雜入麝香中罕能分别用之亦如麝焉頌曰香貍出南方人以作膾生如北地狐生法其氣甚香微有麝氣時珍曰按段成式言香貍有四外腎則自能牝牡者或由此也劉郁西域記云黒契丹出香貍文似上豹其肉可食糞溺皆香如麝氣楊慎丹鉛錄云予在大理府見香貓如貍其文如金錢豹此即楚辭所謂乗赤豹兮載文貍王逸註為神貍者也南山經所謂亶爰之山有獸焉狀如貍而有髦其名曰類自為牝牡食者不妬列子亦云亶爰之獸自孕而生曰類疑即此物也又星禽真形圖心月狐有牝牡兩體其神貍乎珍按劉楊二説與異物志所説相合則類即靈貍無疑矣類貍字音亦相近也肉氣味甘温無毒隂氣味辛温無毒主治中惡氣飛尸蠱疰心腹卒痛狂邪鬼神鬼瘧疫氣夢寐邪魘鎮心安神藏器貓蜀本草釋名家貍時珍曰貓苗茅二音其名自呼陸佃云鼠害苗而貓捕之故字從苗禮記所謂迎貓為其食田鼠也亦通格古論云一名烏圓或謂蒙貴即貓非矣集解時珍曰貓捕鼠小獸也處處畜之有黄黒白駁數色貍身而虎面柔毛而利齒以尾長腰短目如金銀及上齶多稜者為良或云其睛可定時子午卯酉如一線寅申己亥如滿月辰戌丑未如棗核也其鼻端常冷惟夏至一日則煖性畏寒而不畏暑能畫地卜食隨月旬上下囓鼠首尾皆與虎同隂類之相符如此其孕也兩月而生一乳數子恒有自食之者俗傳牝貓無牡但以竹箒掃背數次則孕或用斗覆貓於竈前以刷箒頭擊斗祝竈神而求之亦孕此與以雞子祝竈而抱雛者相同俱理之不可推者也貓有病以烏藥水灌之甚良世傳薄荷醉貓死貓引竹物類相感然耳肉氣味甘酸温無毒主治勞疰鼠瘻蠱毒集解時珍曰本草以貓貍為一類註解然貍肉入食貓肉不佳亦不入食品故用之者稀胡濙易簡方云凡預防蠱毒自少食貓肉則蠱不能害此亦隋書所謂貓鬼野道之蠱乎肘后治鼠瘻核腫或已潰出膿血者取貓肉如常作羮空心食之云不傳之法也昔人皆以癧子為鼠涎毒所致此乃淮南子所謂狸頭治癙及鼠囓人瘡又云狐目狸腦鼠去其穴皆取其相制之義耳頭骨氣味甘温無毒主治鬼疰蠱毒心腹痛殺蟲治疳及痘瘡變黒瘰癧癙瘻惡瘡時珍發明時珍曰古方多用貍今人多用貓雖是二種性氣相同故可通用孫氏治痘瘡倒黶用人貓豬犬四類骨方見人類附方新九心下鼈瘕用黒貓頭一枚燒灰酒服方寸匕日三夀域痰齁發喘貓頭骨燒灰酒服三錢便止醫學正傳貓鬼野道病歌哭不自由臘月死貓頭燒灰水服一錢匕日二千金方多年瘰癧不愈用貓頭蝙蝠各一個俱撒上黒豆同燒存性為末摻之乾則油調内服五香連翹湯取效集要走馬牙疳黑貓頭燒灰酒服方寸匕夀域方小兒隂瘡貓頭骨燒灰𫝊之即愈鼠咬瘡痛貓頭燒灰油調敷之以瘥為度趙氏方收歛癰疽貓頭一箇煅研雞子十個煑熟去白以黄煎出油入白蠟少許調灰傅之外以膏䕶住神妙要醫方摘對口毒瘡貓頭骨燒存性研毎服三五錢酒服呉球便民食療方腦紙上隂乾主治瘰癧鼠瘻潰爛同莽草等分為末納孔中時珍金出千眼睛主治瘰癧鼠瘻燒灰井華水服方寸匕日三出外臺牙主治小兒痘瘡倒黶欲死同人牙豬牙犬牙燒炭等分研末蜜水服一字即便發起時珍發明時珍曰痘疹歸腎則變黑凡牙皆腎之標能入腎發毒也内有貓牙又能解毒而熱證亦可用云舌主治瘰癧鼠瘻生晒研敷千金涎主治瘰癧刺破塗之時珍肝主治勞瘵殺蟲取黑貓肝一具生晒研末毎朔望五更酒調服之時珍指出直胞衣主治反胃吐食燒灰入硃砂末少許壓舌下甚效時珍經出楊氏騐皮毛主治瘰癧諸瘻癰疽潰爛時珍附方新六乳癰潰爛見内者貓兒腹下毛坩鍋内煅存性入輕粉少許油調封之濟生秘覽瘰癧鼠瘻以石菖蒲生研盒之微破以貓兒皮連毛燒灰用香油調傅内服白歛末酒下多多為上仍以生白歛搗爛入酒少許傅之效證治要訣鬢邊生癤貓頸上毛豬頸上毛各一把鼠屎一粒燒研油調傅之夀域鬼䑛頭瘡貓兒毛燒灰膏和傅之千金鼻擦破傷貓兒頭上毛剪碎唾粘𫝊之衛生易簡鼠咬成瘡貓毛燒灰入麝香少許唾和封之貓鬚亦可救急易方尿以薑或蒜擦牙鼻或生葱紝鼻中即遺出主治蜓蚰諸蟲入耳滴入即出時珍事出儒門親屎修治臘月采乾者泥固燒存性收用主治痘瘡倒陷不發瘰癧潰爛惡瘡蠱疰蠍螫鼠咬時珍散痘黶有無價見人類燒灰水服治寒熱鬼瘧發無期度者極驗蜀本草附方舊一新七小兒瘧疾烏貓屎一錢桃仁七枚同煎服一盞立瘥温居士方腰脚錐痛支腿者貓兒屎燒灰唾津調塗之永類鈴方蠱疰腹痛雄貓屎燒灰水服外臺瘰癧潰爛臘貓屎以隂陽瓦合鹽泥固濟煅過研末油調搽之儒門事親鬼䑛頭秃貓兒屎燒灰臘豬脂和傅之千金鼠咬成瘡貓屎揉之即愈夀域方蠍螫作痛貓兒屎塗之三五次即瘥心鏡齁哮痰欬貓糞燒灰砂糖湯服一錢葉氏摘𤣥貍别錄中品釋名野貓時珍曰按埤雅云獸之在里者故從里穴居薶伏之獸也爾雅云貍子曰􅡐音曳其足蹯其跡􅚵音鈕指頭着地處也集解𢎞景曰貍類甚多今人用虎貍無用貓貍者然貓貍亦好又有色黄而臭者肉亦主鼠瘻頌曰貍處處有之其類甚多以虎斑文者堪用貓斑者不佳南方一種香貍其肉甚香微有麝香宗奭曰貍形類貓其文有二一如連錢一如虎文皆可入藥肉味與狐不相逺江南一種牛尾貍其尾如牛人多糟食未聞入藥時珍曰貍有數種大小如狐毛雜黄黒有斑如貓而圓頭大尾者為貓貍善竊雞鴨其氣臭肉不可食有斑如貙虎而尖頭方口者為虎貍善食蟲鼠果實其肉不臭可食似虎貍而尾有黒白錢文相間者為九節貍皮可供裘領宋史安陸州貢野貓花貓即此二種也有文如豹而作麝香氣者為香貍即靈貓也南方有白面而尾似牛者為牛尾貍亦曰玉面貍專上樹木食百果冬月極肥人多糟為珍品大能醒酒張揖廣雅云玉面貍人捕畜之鼠皆帖伏不敢出也一種似貓貍而絶小黄斑色居澤中食蟲鼠及草根者名􅀈音迅又登州島上有海貍貍頭而魚尾也肉氣味甘平無毒詵曰温正月勿食傷神時珍曰内則食貍去正脊為不利人也反藜蘆主治諸疰别録治温鬼毒氣皮中如鍼刺時珍御出太平覽作羮臛治痔及䑕瘻不過三頓甚妙蘇頌臺出外補中益氣去遊風孫思邈附方新二腸風痔瘻下血年深日近者如聖散用臘月野貍一枚蟠在鑵肉炒大棗半升枳殻半觔甘草四兩豬牙皂角二兩同入罐内盖定瓦上穿一孔鹽泥固濟煅令乾作一地坑以十字瓦支住罐子用炭五秤煅至黒烟盡青烟出取起濕土罨一宿為末每服二錢鹽湯下一方以貍作羮其骨燒灰酒服方楊氏家藏風冷下血脱肛疼痛野貍一枚大瓶盛之泥固火煅存性取研入麝香二錢每食前米飲服二錢聖惠方膏主治鼷䑕咬人成瘡用此摩之并食貍肉時珍肝主治鬼瘧時珍附方新一鬼瘧經久或發或止野貓肝一具瓶盛熱豬血浸之封口懸乾去血取肝研末猢猻頭骨虎頭骨狗頭骨各一兩麝香一分為末醋糊丸茨子大發時手把一丸嗅之仍以緋帛包一丸繫中指上聖惠方隂莖主治女人月水不通男子隂㿗燒灰東流水服别錄骨頭骨尤良氣味甘温無毒主治風疰尸疰鬼疰毒氣在皮中淫濯如鍼刺著心腹痛走無常處及䑕瘻惡瘡别錄燒灰酒服治一切遊風保鼎炒末治噎病不通飲食藥性燒灰水服治食野鳥肉中毒頭骨炙研或燒灰酒服二錢治尸疰邪氣腹痛及痔瘻十服後見驗孟詵宗奭曰炙骨和雄黄麝香為丸服治痔及瘻甚效殺蟲治疳瘰癧時珍發明頌曰華佗治尸疰有貍骨散用其頭時珍曰貍骨貓骨性相近可通用之衛生寶鑑治諸風心癎神應丹用貍全身燒過入藥附方舊一新一瘰癧腫痛久不瘥用貍頭蹄骨並塗酥炙黄為散每日空心米飲下一錢七惠聖瘰癧已潰貍頭燒灰頻傅之千金屎五月收乾主治燒灰水服主鬼瘧寒熱孟詵燒灰和臘豬脂傅小兒鬼䑛頭瘡千金風貍拾遺校正原附貍下今分出釋名風母綱目風生獸同平猴同狤􅠝音吉屈能時珍曰風貍因風騰越死則得風復生而又治風疾故得風名狤􅠝言其詰崛也集解藏器曰風貍生邕州以南似兎而短棲息高樹上候風而吹至他樹食果子其尿如乳甚難得人取養之乃可得時珍曰今攷十洲記之風生獸廣州異物志之平猴嶺南異物志之風母酉陽雜俎之狤􅠝虞衡志之風貍皆一物也但文有大同小異爾其獸生嶺南及蜀西徼外山林中其大如貍如癩其狀如猿猴而小其目赤其尾短如無其色青黄而黑其文如豹或云一身無毛惟自鼻至尾一道有青毛廣寸許長三四分其尿如乳汁其性食蜘蛛亦啖薰陸香晝則踡伏不動如蝟夜則因風騰躍甚捷越巖過樹如鳥飛空中人網得之見人則如羞而叩頭乞憐之態人檛擊之倐然死矣以口向風須臾復活惟碎其骨破其腦乃死一云刀斫不入火焚不焦打之如皮囊雖鐵擊其頭破得風復起惟石菖蒲塞其鼻即死也一云此獸常持一杖指飛走悉不能去見人則棄之人獲得擊打至極乃指示人人取以指物令所欲如意也二説見十洲記及嶺南志未審然否腦主治酒浸服愈風疾時珍志出嶺南和菊花服至十觔可長生十洲記屎主治諸風藏器大風疾虞衡志本草綱目卷五十一上
