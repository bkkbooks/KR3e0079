body:
  text: 本草綱目卷二十九目録果部李時珍曰木實曰果草實曰蓏可以備藥輔助粒食素問云五果為助五果者以五味五色應五臟李杏桃栗棗是矣古書欲知五穀之收否但看五果之盛衰李主小豆杏主大麥桃主小麥栗主稻棗主禾禮記內則列果品菱椇榛瓜之類周官職方氏辨五地之物山林宜皂物柞栗之屬川澤宜膏物菱芡之屬丘陵宜核物梅李之屬甸師掌野果蓏場人樹果蓏珍異之物以時藏之觀此則果蓏之土産常異性味良毒豈可縱嗜欲而不知物理乎於是集草木之實號為果蓏者為果部凡一百二十七種分為六類曰五果曰山曰夷曰味曰蓏曰木舊本果部三品共五十三種今移一種入菜部四種入草部自木部移入併附三十一種草部移入四種菜部移入一種外類移入四種神農本草經十一種梁陶𢎞景注名醫别録十七種同上唐本草十一種唐蘇恭本草拾遺二十種唐陳藏器海藥本草一種唐李珣食性本草一種唐陳士良食療本草一種唐孟詵開寶本草十九種宋馬志嘉祐本草二種宋掌禹錫圗經本草五種宋蘇頌日華本草二種宋人大明食物本草一種明汪頴日用本草一種元吳瑞本草會編一種明汪機本草綱目三十三種明李時珍附注魏吳普本草論宋雷斆炮灸李當之本草對齊徐之才藥唐甄權藥性唐蕭炳四聲孫思邈千金楊損之刪繁蜀韓保升重注唐慎微證類宋寇宗奭衍義囊金張元素珍珠元李杲注象朱震亨補遺王好古湯液明寧原食鑑果之一五果類十一種李别録附徐李杏别録巴旦杏綱目梅本經樃梅綱目桃本經栗别録天師栗綱目棗本經仲思棗開寶苦棗食性右附方舊一百一十三新一百零八本草綱目卷二十九目録
