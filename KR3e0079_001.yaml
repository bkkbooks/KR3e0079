body:
  text: 本草綱目圖卷上之上明李時珍撰從來圖繪絢飾為工未睱析其形似是以博物君子每多樝梨橘柚之疑兹集詳考互訂擬肖逼真雖遐方異物按圖可索奚第多識其名已也金石部一金類金石部二玉類金石部三石類上金石部四石類下石部一鹵石類本草綱目圖卷上之上欽定四庫全書本草綱目圖卷上之中明李時珍撰草部一山草類上草部二山草類下草部三芳草類草部四隰草類上本草綱目圖卷上之中
