body:
  text: 本草綱目卷五十一目録獸之二獸類三十八種内附十一種獅綱目虎别録搜酋耳駮馬渠黄腰附豹别録貘圖經象開寳犀本經犛牛綱目支犩牛􅀈牛海牛日牛山牛附牦牛綱目野馬綱目野豬唐本草豪豬綱目熊本經附羆魋麢羊本經附山驢山羊日用鹿本經麋本經雙頭鹿拾遺麂開寳麞别録麝本經靈貓拾遺貓蜀本草貍别録風貍拾遺狐别録貉衍義貒唐本草貛食物木狗綱目豺唐本草狼拾遺别録敗筆唐本草山獺綱目水獺别録海獺拾遺腽肭獸開寳猾炮炙論右附方舊八十七新一百四十六獸之三䑕類一十二種内附九種䑕别録冷鼨䑕􅂒䑕􅂒􅂒鼩鼱水鼠鼠火䑕鼵䑕蟨鼠附鼹鼠别録隱鼠拾遺鼫鼠綱目竹䶉綱目土撥鼠拾遺貂鼠綱目黄鼠綱目鼬鼠綱目狼即鼠鼷鼠拾遺食蛇鼠綱目猬本經右附方舊二十四新四十二獸之四寓類怪類共八種内附九種獮猴類證附玃豦狨拾遺附猨獨果然拾遺湖蒙頌獑附猩猩綱目附野女狒狒拾遺客山都山􅏈木山􅀈附罔兩綱目彭侯綱目封綱目右附方舊一新無本草綱目卷五十一目録
