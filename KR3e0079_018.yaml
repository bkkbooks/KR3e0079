body:
  text: 本草綱目卷四上明李時珍撰百病主治藥下痛風屬風寒溼熱挾痰及血虛汚血風寒風溼草木麻黃風寒風溼風熱痺痛發汗羌活風溼相摶一身盡痛非此不除同松節煮酒日飲防風主周身骨節盡痛乃治風去溼仙藥蒼术散風除溼燥痰解鬱發汗通治上中下溼氣作溼氣身痛熬汁膏點服桔梗寒熱風痺滯氣作痛在上者宜加之茜根治骨節痛燥溼行血紫葳除風熱血滯作痛蒼耳子風溼周痺四肢拘痛為末煎服牽牛子除氣分溼熱氣壅腰腳痛羊躑躅風溼痺痛走注同糯米黑豆酒水煎服取吐利風痰注痛同生南星搗餅蒸四五次收之臨時焙丸溫酒下三丸靜卧避風芫花風溼痰注作痛草烏頭風溼痰涎歷節走痛不止入豆腐中煮過晒研每服五分仍外傅痛處烏頭附子並燥溼痰為引經藥百靈蕂酒石南蕂酒青蕂酒並主風溼骨痛頑痺薏苡仁久風溼痺筋急不可屈申同風溼身痛日晡甚者麻黃杏仁甘草煎服豆豉松節去筋骨痛能燥血中之溼歷節風痛四肢如脫浸酒日服桂枝引諸藥橫行手臂同椒薑浸酒絮尉隂痺海桐皮腰膝注痛血脈頑痺同諸藥浸酒服五加皮風溼骨節攣痛浸酒服枸杞根及苖去皮膚骨節間風子補蟲腎獸蠶沙浸酒蠍梢肝風蚯蚓腳風宜用穿山甲風痺疼痛引經通竅守宫通經絡入血分諸歷節風痛同地龍草烏頭藥丸服白花蛇骨節風痛烏蛇同上水龜風溼拘攣筋骨疼痛同天花粉枸杞子雄黃麝香槐花煎服版亦入隂虛骨痛方五靈脂散血活血止諸痛引經有效虎骨筋骨毒風走注疼痛脛骨尤良虎風疼膝腫同通草煮服取汗白同沒藥末服頭風溼痛同附子末服骨浸酒飲風痰風熱草部半夏天南星並治風痰溼痰熱痰凝滯歷節走注右臂溼痰作痛南星蒼术煎服大戟甘遂並治溼氣化為痰飲流注胸膈經絡發為上下走注疼痛淋痺能泄臟腑經隧之溼大黃泄脾胃血分之溼熱膿酥炒煎服治腰腳風痛取下冷惡物即止威靈仙治風溼痰飲為痛風要藥上下皆宜利腰膝積年冷病諸痛為术酒下或丸服以微為效黃芩三焦濕熱風熱歷節腫痛秦芄除陽明風溼溼熱養血榮筋龍膽草木通煎服防己木鱉子並主溼熱腫痛在下加之薑黃治風痺臂痛能入手臂破血中之滯氣紅藍花活血滯止痛菜瘦人宜之果白芥子暴風毒腫痰飲流入四肢經絡作痛桃仁血滯風痺攣痛橘皮下滯氣化溼痰血風痰淋木或手木或十指淋木皆是溼痰死以一斤去白逆流水五碗煮爛去滓至一碗頓服取吐乃吐痰之聖藥也檳榔一切風氣木能下行石枳殼風痺淋痺散痰流滯黃蘗除下焦溼熱痛腫下身甚者加之伏苓滲溼熱竹瀝化熱痰蘇方木活血止痛滑石滲溼獸熱禽羚羊角入肝平風舒筋止熱毒風歷節掣痛效羊脛骨除溼熱止腰腳筋骨痛浸酒服補虛草部當歸芎藭芍藥地黃丹參並養新血破宿血止痛牛膝補肝腎逐惡血治風寒溼痺膝痛不可屈申能行諸藥下行痛在下者加之石斛腳膝冷痛痺弱酒浸酥蒸服滿一鎰永不骨痛天麻諸風溼痺不仁補肝虛利腰膝腰腳痛同半夏細辛袋盛蒸熱互尉汗出則愈萆薢狗脊寒溼膝痛腰背強補肝腎土茯苓治瘡毒筋骨痛去風溼利關節瑣陽潤燥榖養筋木罌粟殼收斂固氣能入腎治骨痛尤宜松脂歷節風酸痛鍊淨和酥煎服乳香補腎活血定諸經之痛沒藥遂經絡滯血定痛同歷節諸風痛不止虎脛骨术酒服外治白花菜傅風溼痛芥子走注風毒痛同醋塗萞麻油入膏拔風邪出外鵜鶘油入膏引藥氣入內羊脂入膏引藥氣入內拔邪出外野駝脂摩風痛牛皮膠同薑汁化貼骨節痛驢骨浴歷節風蠶沙蒸尉頭痛有外感痰氣虛腎血虛痛風熱痛溼熱屬風寒熱厥厥真偏右虛痰左屬熱引經太陽麻黃藁本羌活蔓荆陽明白芷葛根升麻石膏少陽柴胡芎藭太隂蒼术半夏少隂細辛厥隂吳茱茰芎藭溼熱痰溼草部黃芩一味酒浸炒研茶服治風溼溼熱相火偏正諸般頭痛荆芥散風熱清頭目末作枕去頭項風同石膏服去風熱頭痛薄荷除風熱清頭目蜜丸服菊花頭目風熱腫痛同石膏芎藭末服蔓荆實頭痛腦鳴目淚酒太陽頭痛為末浸服水蘇風熱痛同皂莢芫花丸服半夏痰厥頭痛非此不除同蒼术用栝樓熱病頭痛洗瓤溫服香附子氣鬱頭痛同川芎末常服服偏頭風同烏頭甘草丸大黃熱厥頭痛酒炒三次為末茶服鈎藤平肝風心熱茺蔚子血逆大熱頭痛木通青黛大青白蘚皮茵陳白蒿澤蘭沙參丹參知母吳藍景天並主天行頭痛前胡旋覆花菜果竹笋並主痰熱頭痛東風菜鹿藿苦茗並治風熱頭痛熏清上止痛同蔥白煎服巴豆煙過服止氣虛頭痛楊梅頭痛為末茶服橘皮木石枳殼並治痰氣頭痛櫸皮時行頭痛熱結在腸枸把寒熱頭痛竹茹飲酒人頭痛煎服竹葉竹瀝白瀝並痰熱頭痛黃蘗巵子茯苓白堊土並溼熱頭痛止合王瓜為末服疼石膏陽明頭痛如裂壯熱如火風風熱同竹葉煎煎風寒同蔥茶煎痰同川芎甘草鐵粉頭痛鼻塞同龍腦水服光明鹽獸人犀角傷寒頭痛寒熱諸毒氣痛童尿寒熱頭痛至極者一盞入蔥豉煎服陶隱居盛稱之風寒溼厥草榖菜果芎藭風入腦户頭痛行氣開鬱必用之藥風熱及氣虛為末茶服偏頭風浸酒服服卒厥同烏藥末防風頭面風去來蜜偏正頭風同白芷丸服天南星風痰頭痛同荆芥丸服風痰氣同茴香丸服婦人頭為末酒服烏頭附子浸酒服煮豆食治頭風風同白芷末服治風毒痛鍾同川芎或同髙良薑服治寒痛同蔥汁丸或同乳全蠍丸治氣虛痛同全蠍韭根丸腎厥痛同釡墨止痰厥痛天雄頭面風去來痛草烏頭偏正頭風同蒼术蔥汁丸服白附子偏正頭風同牙皂末服服痰厥痛同半夏南星丸地膚子雷頭風腫同生薑擂酒服取汗杜衡風寒頭痛初起末服發汗蒴藋煎酒取汗萞麻子同川芎燒服取汗萆薢同虎骨旋覆花末服取汗南藤釀酒服並治頭風通草燒研酒服治洗頭風菖蒲頭風淚下杜若風入腦户痛腫涕淚胡盧巴氣攻痛同三稜乾薑末酒服牛膝腦中痛當歸煮酒地黃芍藥並血虛痛葳𬎼天麻人參黃茋蒼耳大豆黃卷並頭風痺胡麻頭面遊風百合頭風目眩胡荽蔥白生薑並風寒頭痛杏仁時行頭痛解􅡌粥風虛痛欲破研汁入食得大汗即解茱茰厥隂頭痛嘔涎同薑蜜水服取汗蜀椒枳椇木石蟲獸柏實並主頭風桂枝傷風頭痛自汗烏藥氣厥頭痛及産後頭痛同川芎末茶服皂莢時氣頭痛燒研同薑蜜水服取汗山茱茰腦骨痛辛夷伏牛花空青曾青並風眩頭痛石硫黃腎厥頭痛頭風同消石丸服藥同胡粉丸服同食鹽丸服同烏丸服蜂子全蠍白殭蠶蔥湯服或入高涼薑或以蒜制為末服治痰厥腎厥痛白花蛇腦風頭痛及偏頭風同南星荆芥諸藥末服魚鰾八般頭風同芎芷末衡酒熱飲醉醒則愈羊肉頭腦大風汗出虛勞羊屎雷頭風病研酒服吐痰見風及痰飲外治穀精草為末嗅鼻調糊貼腦燒煙熏鼻玄胡索同牙皂青黛為丸瓜蒂藜盧細辛蒼耳子大黃逺志蓽茇髙涼薑牽牛同砂仁楊梅末蕓薹子皂莢白棘針同丁香麝香雄黃同細辛玄精石消石人中白同地龍末羊膽為丸旱連汁蘿葡汁大蒜汁苦瓠汁並嗅鼻艾葉揉丸嚊之取出黃水萞麻仁同棗肉紙卷插入鼻內半夏煙木槿子煙龍腦煙並熏鼻燈火焠之蕎麥麵作大餅更互合頭出汗之或作小餅貼四眼角炙黃蠟和鹽作兜鍪合之即止麝香同皂莢末安頂上炒鹽尉之茱茰葉蒸熱枕之治大寒犯腦痛亦浴頭桐木皮冬青葉石南葉牡荆根槵子皮莽草葶藶豉汁驢頭汁並治頭風全蠍同地龍土狗五倍子末柚葉同蔥白山豆根南星同川烏烏頭草烏頭同巵子蔥汁乳香同萞麻仁決明子並貼太陽穴露水八月朔旦取磨墨點太陽止頭疼桂木隂而即發痛酒調塗頂額井底泥同消黃傅朴消熱痛塗頂上訶子同芒消醋摩之牛蒡根同酒煎膏摩之緑豆作枕去頭風良決明菊花皆麥麵頭皮虛腫薄如裹水水嚼傅之良巵子蜜和傅舌上追涎去風甚妙眩運眩是目黑運是頭旋皆是氣虛挾痰挾火挾風或挾血虛或兼外感四氣風虛草菜天麻頭眩風虛內作非此不能除為治風藥名定風草首風旋運消痰定風同川芎蜜丸服术頭忽暗運瘦削食土同麵丸服荆芥頭旋目眩尿産後血運欲死童調服白芷頭風血風眩運蜜丸服蒼耳子諸風頭運蜜丸服酒女人血風頭旋悶絶不省為末服能通頂門菊苖男女頭風眩運髮落有痰發則昏倒四月收陽乾為末每服酒二錢秋月收花浸酒或釀酒服藋蒴根頭風旋運同獨活石膏煎酒服産後血運煎服貝母洗惡風寒目眩項直杜若風入腦户眩倒目昏昏鈎藤平肝風心火頭旋目眩排風子目赤頭旋同甘草菊花末當歸失血眩運芎藭煎服芎藭首風旋運紅藥子産後血運附子烏頭薄荷細辛木香紫蘇水蘇白蒿飛亷卷柏蘼蕪羌活藁本地黃人參黃茋升麻柴胡山藥並治風虛眩運生薑木蟲鱗獸松花頭旋腦腫浸酒飲槐實風眩欲倒吐涎如醉漾漾如舟車中辛夷眩冒身兀兀如在車船上蔓荆實腦鳴昏悶伏牛花丁香伏神茯苓山茱茰地骨皮全蠍白花蛇烏蛇並頭風眩運鹿茸眩運或見一為二半兩煎酒入麝服驢頭中風頭眩身顫心肝浮熱同䜴煮食兔頭骨肝羚羊角羊頭蹄及頭骨羊肉牛胃豬腦豬血熊腦並主風眩瘦弱痰熱草菜天南星風痰眩運吐逆同半夏天麻白麵煮丸半夏痰逆昏運同甘草防風煎服同風痰眩運研末水沉粉入硃砂丸服金花丸南星寒水石天麻雄黃白麵煮丸服白附子風痰同石膏砂龍腦丸服硃大黃溼熱眩運炒末茶服旋覆花天花粉前胡桔梗黃芩黃連澤瀉白芥子熱痰煩運同黑芥子大戟甘遂果芒消硃砂丸服木橘皮荆瀝竹瀝頭風眩運月眩心頭漾漾欲吐枳殼黃蘗巵子金石石膽女人頭運天地轉動名曰心眩非血風也以胡餅劑和切小塊焙乾每服一塊竹茹湯下雲母中風寒熱如在舟船上同恆山服吐痰飲石膏風熱鉛汞結砂流黃消石並除上盛下虛痰涎眩運硃砂雄黃蟲禽白殭蠶並風痰鶻嘲頭風目眩炙食一枚鷹頭頭目虛運同川芎末服鴟頭頭風旋運同蕳茹白术丸服外治甘蕉油吐痰瓜蒂吐痰可痰門吐法用茶子頭中鴟響為末嗅鼻眼目有赤目傳變物內障昏盲外障翳膜傷眯目赤腫草部黃連消末赤腫瀉肝膽心火不可久服人赤目痛癢出淚羞明浸雞子白點蒸乳點爛同冬青煎點乳同乾薑杏仁煎點熱水調貼足心服弦風赤同人槐花輕粉蒸尉風盲翳羊肝丸胡黃連浸人乳點赤目小兒塗足心黃芩消腫赤瘀血芍藥目赤澀痛補肝明目桔梗赤目腫痛牽肝風盛黑睛痛同牛丸服白牽牛風熱赤目同蔥白煮丸龍膽赤腫痰肉髙起痛不可忍除肝膽邪熱去目中黃佐柴胡為眼疾必用之藥暑月目澀同黃連汁點漏膿同當歸末服葳㽔目痛眥爛淚出連赤目澀痛同芍藥當歸黃煎洗白芷赤目弩肉頭風侵目癢淚同一切目疾雄黃丸服薄荷去風熱研爛弦以薑汁浸泡湯洗荆芥頭目一切風熱疾為末酒服藍葉赤目熱痛同車前淡竹葉煎服山茵陳赤腫同車前子末服王瓜子赤目痛澀同槐花芍藥丸服香附子肝虛睛痛羞明同夏苦草末沙糖水服頭風睛痛同川芎末茶服防己目睛暴痛酒洗三次末服夏枯草補養厥隂血脈故冶目痛如神菖蒲諸般赤目搗汁熬膏點之針同鹽傅挑地黃血熱睡起目赤煮粥食貼暴赤痛小兒蓐內目赤並之地膚子風熱赤目同地黃作餅晒研服苦參細辛並明目益肝膽止風眼下淚黃茋連翹又洗爛弦大黃並主熱毒赤目赤芍藥白芨防風羌活白蘚皮柴胡澤蘭麻黃並主風熱赤目腫毒野狐漿草汁積雪草汁瞿麥汁車前草汁並點赤目葉亦貼之千里及汁點爛弦風眼五味子同蔓荆子煎覆盆草汁滴風爛眼去蟲五