  text: 本草綱目卷四十九目録禽之三林禽類一十七種斑鳩嘉祐青䳡拾遺侯即黃褐鳲鳩拾遺穀即布桑鳸食物嘴即蠟伯勞嘉祐鸜鵒唐本百舌拾遺練鵲嘉祐鶯食物啄木鳥嘉祐慈烏嘉祐烏鴉嘉祐鵲别録山鵲食物鶻嘲嘉祐杜鵑拾遺鸚鵡食物鳯秦吉了鳥附右附方舊五新九禽之四山禽類一十一種附二種鳯凰拾遺孔雀别録駝鳥拾遺鷹本經雕綱目鶚綱目鷹即魚鴟别録鴟鵂拾遺梟拾遺鴆别録姑獲鳥拾遺治鳥綱目足木客獨附鬼車鳥拾遺諸鳥有毒拾遺右附方舊四新九本草綱目卷四十九目録
