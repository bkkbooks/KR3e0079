body:
  text: 本草綱目卷四十入目録禽之二原禽類二十三種附一種雞本經雉别録鸐雉食療雞即山鷩雉拾遺雞即錦鶡雞拾遺鷴圖經鷓鴣唐本竹雞拾遺附杉雞英雞拾遺秧雞食物鶉嘉祐鷃拾遺鷸拾遺鴿嘉祐突厥雀拾遺雀别録蒿雀拾遺巧婦鳥拾遺鷯即鷦燕别録石燕日華伏翼本經蝠即蝙鸓鼠本經生即飛寒號蟲開寶脂即五靈右附方舊八十二新二百三十七本草綱目卷四十八目録
