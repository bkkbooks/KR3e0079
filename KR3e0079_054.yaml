  text: 本草綱目卷二十目録草之九石草類十九種內附八種石斛本經骨碎補開寶石韋本經金星草嘉祐石長生本經附紅茂草石莧圖經附石垂景天本經佛甲草圖經虎耳草綱目石胡荽四聲螺厴草拾遺草即鏡靣酢奬草唐本葉酸草三附地錦嘉祐瘡即血見愁金小草附離鬲草拾遺仙人草拾遺仙人掌草圖經崖棕圖經回雞翁藤半天野蘭附紫背金盤圖經白龍鬚綱目右附方舊十新四十七本草綱目卷二十目録
