body:
  text: 本草綱目總目醫家類卷一序例上卷二序例下卷三百病主治藥上卷四百病主治藥下卷五水部二類水一天水類一十三種水二地水類三十種卷六火部一類火一凡一十一種卷七土部一類土一凡六十種卷八金石部五類金石一金類二十八種石二玉類一十四種卷九石三石類上三十二種卷十石四石類下三十九種卷十一石五鹵石類二十種附録二十七種卷十二草部一十一類草一山草類上三十一種卷十三草二山草類下三十九種卷十四草三芳草類五十六種卷十五草四隰草類上五十三種卷十六草五隰草類下七十三種卷十七草六上下毒草類四十七種卷十八草七上下蔓草類七十三種附録一十九種卷十九草八水草類二十二種卷二十草九石草類一十九種卷二十一草十苔類一十六種草十一雜草類九種五十三種有名未用一百卷二十二穀部四類穀一麻麥稻類一十二種卷二十三穀二稷粟類一十八種卷二十四穀三菽豆類一十四種卷二十五穀四造釀類二十九種卷二十六菜部五類菜一葷辛類三十二種卷二十七菜二柔滑類四十一種卷二十八菜三蓏菜類一十一種菜四水菜類六種菜五芝栭類一十五種卷二十九果部六類果一五果類一十一種卷三十果二山果類三十四種卷三十一果三夷果類三十二種卷三十二果四味類一十三種卷三十三果五蓏類九種果六水果類六種附録二十三種卷三十四木部六類木一香木類三十五種卷三十五木二喬木類五十二種卷三十六木三灌木類五十種卷三十七木四寓木類一十種木五苞木類四種木六雜木類七種附録二十種卷三十八服器部二類服器一服帛類二十五種服器二器物類五十四種卷三十九蟲部四類蟲一卵生類上二十二種卷四十蟲二卵生類下二十一種卷四十一蟲三化生類三十一種卷四十二蟲四濕生類二十三種卷四十三鱗部四類鱗一龍類九種鱗二蛇類一十七種卷四十四鱗三魚類二十八種鱗四無鱗魚類三十一種附録九種卷四十五介部二類介一龜鱉類一十七種卷四十六介二蚌蛤類二十九種卷四十七禽部四類禽一水禽類一十三種卷四十八禽二原禽類二十二種卷四十九禽三林禽類一十七種禽四山禽類一十三種附録一種卷五十獸部四類獸一畜類二十八種卷五十一獸二獸類三十八種獸三鼠類一十二種獸四寓類怪類共八種卷五十二人部一類人一凡三十五種右通計一十六部六十二類一千八百八十二種臣等謹案本草綱目五十二卷明李時珍撰時珍字東壁蘄州人官四川蓬溪知縣是編取神農以下諸家本草薈粹成書復者芟之闕者補之訛者糾之凡一十六部六十二類一千八百八十二種每藥標正名為綱附釋名為目次以集解辨疑正誤次以氣味主治附方其分部之例首水火次土次金石次草榖菜果木次服器次蟲鱗介禽獸終之以人前有圖三卷又序例二卷百病主治藥二卷于陰陽標本君臣佐使之論最為詳析考諸家本草舊有者一千五百一十八種時珍所補者又三百七十四種搜羅羣籍貫串百氏自謂嵗厯三十書采八百餘家稿凡三易然後告成者非虛語也其書初刻于萬厯間弇州山人王世貞為之序其子建元又獻之于朝有進疏一篇冠于卷首國朝順治間錢塘吳育昌重訂付梓於是業醫者無不家有一編明史方伎傳極稱之蓋集本草之大成者無過于此矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀本草綱目原序紀稱望龍光知古劒覘寶氣辨明珠故萍實商羊非天明莫洞厥後博物稱華辨字稱康析寶玉稱倚頓亦僅僅晨星耳楚蘄陽李君東璧一日過豫弇山園謁豫留飲數日豫窺其人晬然貌也癯然身也津津然談議也真北斗以南一人解其裝無長物有本草綱目數十卷謂豫曰時珍荆楚鄙人也幼多羸疾質成鈍椎長耽典籍若啖蔗飴遂漁獵羣書摉羅百氏凡子史經傳聲韻農圃醫卜星相樂府諸家稍有得處輒著數言古有本草一書自炎皇及漢梁唐宋下逮國朝注解羣氏舊矣第其中舛繆差訛遺漏不可枚數乃敢奮編摩之志僣纂述之權嵗厯三十稔書考八百餘家稿凡三易復者芟之闕者緝之訛者繩之舊本一千五百一十八種今增藥三百七十四種分為一十六部著成五十二卷雖非集成亦粗大備僣名曰本草綱目願乞一言以託不朽豫開卷細玩每藥標正名為綱附釋名為目正始也次以集解辨疑正誤詳其土産形狀也次以氣味主治附方著其體用也上自墳典下及傳竒凡有相關靡不備采如入金谷之園種色奪目如登龍君之宫寶藏悉陳如對冰壺玉鑑毛髮可指數也博而不繁詳而有要綜核究竟直窺淵海茲豈僅以醫書覯哉實性理之精微格物之通典帝王之祕籙臣民之重寶也李君用心加惠何勤哉噫碔玉莫剖朱紫相傾弊也久矣故辨專車之骨必俟魯儒博支機之石必訪賣卜豫方著弇州巵言恚博古如丹鉛巵言後乏人也何幸覩茲集哉茲集也藏之深山石室無當盍鍥之以共天下後世味太元如子雲者時萬歷嵗庚寅春上元日弇州山人鳳洲王世貞拜撰重訂本草綱目原序大凡書不足以集大成其編纂不足以備體用則綱目勿稱焉載籍極博猶為考信是也曩東璧李先生荆楚博雅君子也成本草綱目一書人第知先生綜核羣籍文成億萬分十六部五十二卷不知以彼其才嵗厯三十霜書采八百餘家稿三易然後告成事焉其間圖象繪形芟復補闕繩訛解惑仍其舊而新是圖如舊本千五百一十有八種而外所增三百七十有四蓋李氏之新書也亦既勤且詳進乎大道矣然未敢自信請王弇州先生為玄晏往余寓目而遊心焉先生之書觀止於發凡與遺表中獨是輯成治法見其炮製一準乎雷公且有用苗用根用子與葉之别申言寒熱溫涼之性升降浮沉之理味有五曰甘曰鹽曰酸曰苦曰辛治有三曰汗曰吐曰下以越宣通瀉補輕重滑澀燥濕之十劑復權衡大小緩急竒偶復之間明晰大毒小毒無毒畏惡相反之忌至於分引經絡列諸驗方衷夫藥性易不云乎本乎天者親上本乎地者親下亦各從其類也矧清陽之氣出上竅濁陰之氣行下竅清陽發腠理濁陰走五臟亦大彰明較著者也豈第物産從地名從主人便參稽觀覽云爾哉斯又先生之精微焉者也於是孝子之事親與國手之活人鏡觀此書許世子栽杏叟之之事吾知免矣然本草非先生昉也始於炎黃既於岐髙盛於漢衍於梁浸淫於唐宋曰綱曰目至先生而大備比於史事紫陽溫公分路揚鑣何多讓焉先生是書自昔仁廟間一刻再刻其圖似是而非者有焉其文烏焉魯魚者有焉余與友人黼明錢子恫圖刻之未工商讐較之獨眘踵事增華為重訂梓宇內久推第一善本今年春黼明子倦於事且謂余歸里以來無所事事盡授余行世余惟宇內同人咸知余與黼明子於先生之書相與以有成也今復研訂一過不惜洛陽紙貴夫庸知作者之與行世者不功相半乎順治乙未淡寧子玉函吳育昌謹序進本草綱目疏湖廣黃州府儒學增廣生員李建元謹奏為遵奉明例訪書進獻本草以備采擇事臣伏讀禮部儀制司勘合一欵恭請聖明敕儒臣開書局纂修正史移文中外凡名家著述有關國家典章及紀君臣事迹他如天文樂律醫術方技諸書但成一家名言可以垂於方來者即訪求解送以備采入藝文志如已刻行者即刷印一部送部或其家自欲進獻者聽奉此臣故父李時珍原任楚府奉祠奉敕進封文林郎四川蓬溪知縣生平篤學刻意纂修曾著本草一部甫及刻成忽值數盡撰有遺表令臣代獻臣切思之父有遺命而子不遵何以承先志父有遺書而子不獻何以應朝命矧今修史之時又值取書之會臣不揣謭陋不避斧鉞謹述故父遺表臣父時珍幼多羸疾長成鈍椎耽嗜典籍若啖蔗飴考古證今奮發編摩苦志辨疑訂誤留心纂述諸書伏念本草一書關係頗重注解羣氏謬誤亦多行年三十力肆校讐厯嵗七旬功始成就野人炙背食芹尚欲獻之天子微臣採珠聚玉敢不上之明君昔炎皇辨百穀嘗百草而分别氣味之良毒軒轅師岐伯遵伯髙而剖析經絡之本標遂有神農本草三卷藝文録為醫家一經及漢末而李當之始加校修至梁末而陶𢎞景益以注釋古藥三百六十五種以應重卦唐髙宗命司空李績重修長史蘇恭表請伏定增藥一百一十四種宋太祖命醫官劉翰詳校宋仁宗再詔補注增藥一百種召醫唐慎微合為證類修補衆本草五百種自是人皆指為全書醫則目為奧典夷考其間玼瑕不少有當析而混者如葳㽔女萎二物而併入一條有當併而析者如南星虎掌一物而分為二種生薑薯蕷菜也而列草品檳榔龍眼果也而列木部八榖生民之天也不能明辨其種類三菘日用之蔬也罔克的别其名稱黑豆赤菽大小同條硝石芒硝水火混注以蘭花為蘭草卷丹為百合此寇氏衍義之舛謬謂黃精即鉤吻旋花即山薑乃陶氏别録之差訛歐漿若膽草菜重出掌氏之不審天花栝樓兩處圖形蘇氏之欠明五倍子構蟲窠也而認為木實大蘱草田字草也而指為浮萍似兹之類不可枚陳略摘一二以見錯誤若不類分品列何以印定羣疑臣不揣猥愚僣肆刪述重伏者芟之遺缺者補之如磨刀水潦水桑柴火艾火鎖陽山奈土茯苓畨木鱉金枯樟腦蝎虎狗蠅白蠟水蛇狗寶秋蟲之類並今方所用而古本則無三七地羅九仙子蜘蛛香豬腰子勾金皮之類皆方物土苴而禆官不載今增新藥凡三百七十四種類析舊本分為一十六部雖非集成實亦粗備有數名或散見各部總標正名為綱餘各附釋為目正始也次以集解辨疑正誤詳其出産形狀也次以氣味主治附方著其體用也上自墳典下至傳竒凡有相關靡不收采雖命醫書實該物理我太祖髙皇帝首設醫院重設醫學沛仁心仁術於九有之中世宗肅皇帝既刻醫方選要又刻衛生易簡藹仁政仁聲於率土之逺伏願皇帝陛下體道守成遵祖繼志當離明之正位司考文之大權留情民瘼再修司命之書特詔良臣著成昭代之典治身以治天下書當與日月爭光夀國以夀萬民臣不與草木同朽臣不勝冀望屏營之至臣建元為此一得之愚上干九重之覽或準行禮部轉發史館采擇或行醫院重修父子銜恩存殁均戴臣無任瞻天仰聖之至本草綱目凡例一神農本草三卷三百六十種分上中下三品梁陶𢎞景增藥一倍隨品附入唐宋重修各有增附或併或退品目雖存舊額淆混義意俱失今通列一十六部為綱六十類為目各以類從三品書名俱注各藥之下一覽可知免尋索也一舊本玉石水土混同諸蟲鱗介不别或蟲入木部或木入草部今各列為部首以水火次之以土水火為萬物之先土為萬物母也次之以金石從土也次之以草穀菜果木從微至巨也次之以服器從草木也次之以蟲鱗介禽獸終之以人從賤至貴也一藥有數名今古不同但標正名為綱餘皆附於釋名之下正始也仍注各本草名目紀原也一唐宋增入藥品或一物再出三出或二物三物混注今俱考正分别歸併但標其綱而附列其目如標龍為綱而齒角骨腦胎涎皆列為目標粱為綱而赤黃粱米皆列為目之類一諸因首以釋名正名也次以集解解其出産形狀采取也次以辨疑正誤辨其可疑正其謬誤也次以修制謹炮炙也次以氣味明性也次以主治録功也次以發明疏義也次以附方著用也或欲去方是有體無用矣舊本附方二千九百三十五今增八千一百六十一一唐宋以朱墨圈蓋分别古今經久訛謬今既板刻但直書諸家本草名目於藥名主治之下便覽也一諸家本草重復者刪去疑誤者辨正采其精粹各以人名書於諸欵之下不沒其實且是非有歸也一諸物有相類而無功用宜參考者或有功用而人卒未識者俱附録之無可附者附於各部之末蓋有隱於古而顯於今者如莎根即香附子陶氏不識而今則盛行辟虺雷昔人罕言而今充方物之類雖冷僻不可遺也一唐宋本所無金元我明諸醫所用者增入三十九種時珍續補三百七十四種雖曰醫家藥品其考釋性理實吾儒格物之學可裨爾雅詩疏之缺一舊本序例重繁今止取神農為正而旁采别録諸家附於下益以張李諸家用藥之例一古本百病主治藥略而不切王氏集要祝氏證治亦約而不純今分病原列之以便施用雖繁不紊也一神農舊目及宋本總目附於例後存古也
