body:
  text: 本草綱目卷十二下明李時珍撰草之一山草類上一十八種赤箭本經上品天麻宋開寳校正天麻係宋本重出今併為一釋名赤箭芝藥性獨揺芝抱朴子定風草藥性離母本經合離草抱朴子神草吴普鬼督郵本經𢎞景曰赤箭亦是芝類其莖如箭簳赤色葉生其端根如大魁又云如芋有十二子為衛有風不動無風自揺如此亦非俗所見而徐長卿亦名鬼督郵又有鬼箭莖有羽其主療並相似而益大乖異並非此赤箭也頌曰按抱朴子云仙方有合離草一名獨搖芝一名離母所以謂之合離離母者此草下根如芋魁有㳺子十二枚周環之以倣十二辰也去大魁數尺皆有細根如白髮雖相須而實不相連但以氣相屬爾如兎絲之草下有茯苓之根無此則絲不得上亦不相屬也然則赤箭之異陶隠居已云非俗所見兔絲之下有伏莵亦不聞有見者殆其種類時有神異者而如此爾時珍曰赤箭以状而名獨揺定風以性異而名離母合離以根異而名神草鬼督郵以功而名天麻即赤箭之根開寳本草重出一條詳後集解下集解别録曰赤箭生陳倉川谷雍州及太山少室三月四月八月采根暴乾𢎞景曰陳倉今屬雍州扶風郡志曰天麻生鄆州利州太山勞山諸處五月采根暴乾葉如芍藥而小當中抽一莖直上如箭簳莖端結實状若續隨子至葉枯時子黄熟其根連一十二枚猶如天門冬之類形如黄𤓰亦如蘆菔大小不定彼人多生噉或蒸煑食之今多用鄆州者佳恭曰赤箭是芝類莖似箭簳赤色端有花葉赤色逺看如箭有羽四月開花結實似枯苦棟子核作五六稜中有肉如麪日暴則枯萎其根皮肉汁大類天門冬惟無心脉爾去根五六寸有十餘子衛之似芋可生噉之無乾服之法頌曰赤箭今江湖間亦有之然不中藥用其苗如蘇恭所説但本經云三月四月八月采根不言用苗而今方家乃三月四月采苗七月八月九月采根與本經參差不同難以兼著故但從今法又曰天麻今汴京東西湖南淮南州郡皆有之春生苗初出若芍藥獨抽一莖直上高四五尺如箭簳状青赤色故名赤箭芝莖中空依半以上貼莖微有尖小葉稍頭生成穂開花結子如豆粒大其子至夏不落却透虚入莖中潛生土内其根形如黄𤓰連生一二十枚大者至重半斤或五六兩其皮黄白色名曰龍皮肉名天麻二月三月五月八月肉采初得乘潤刮去皮沸湯畧煑過暴乾收之嵩山衡山人或取生者蜜煎作果食甚珍之宗奭曰赤箭天麻苗也與天麻治療不同故後人分為二條承曰今醫家見用天麻即是赤箭根開寳本草又於中品出天麻一條云出鄆州今之赤箭根苗皆自齊鄆而來者為上蘇頌圖經所載天麻之狀即赤箭苗之未長大者也赤箭用苗有自表入裏之功天麻用根有自内達外之理根則抽苗徑直而上苗則結子成熟而落返從簳中而下至土而生此粗可識其外内主治之理今翰林沈括最為博識嘗云古方用天麻不用赤箭用赤箭不用天麻則天麻赤箭本為一物明矣機曰赤箭天麻一物也經分為二以根與苗主治不同也産不同地者各有所宜也時珍曰本經止有赤箭後人稱為天麻甄權藥性論云赤箭芝一名天麻本自明白宋人馬志重修本草重出天麻遂致分辨如此沈括筆談云神農本草明言赤箭采根後人謂其莖如箭疑當用莖盖不然也譬如鳶尾牛膝皆因莖葉相似其用則根何足疑哉上品五芝之外補益上葉赤箭為第一世人惑於天麻之説遂止用之治風良可惜哉沈公此説雖是但根莖並皆可用天麻子從莖中落下俗名還筒子其根暴乾肉色堅白如羊角色呼羊角天麻蒸過黄皺如乾瓜者俗呼醤瓜天麻皆可用者一種形尖而空薄如𤣥參状者不堪用抱朴子云獨揺芝生高山深谷之處所生左右無草其莖大如手指赤如丹素葉似小莧根有大魁如斗細者如雞子十二枚繞之人得大者服之延年按此乃天麻中一種神異者如人參中之神參也斆曰凡使天麻勿用御風草二物相似只是葉莖不同御風草根莖斑葉背白有青㸃使御風草即勿使天麻若同用令人有腸結之患正誤藏器曰天麻生平澤似馬鞭草節節生紫花花中有子如箱子子性寒作飲去熱氣莖葉搗傅癰腫承曰藏器所説與赤箭不相干乃别一物也時珍曰陳氏所說乃一種天麻草是益母草之類是也嘉祐本草誤引入天麻下耳今正其誤修治斆曰修事天麻十両剉安于瓶中用蒺藜子一鎰緩火熬焦盖于天麻上以三重紙封繫從巳至未取出蒺藜炒過葢繫如前凡七遍用布拭上氣汗刀劈焙乾單搗用若用御風草亦同此法時珍曰此乃治風痺藥故如此修事也若治肝經風虚惟洗净以濕紙包於糠火中煨熟取出切片酒浸一宿焙乾用赤箭氣味辛温無毒志曰天麻辛平無毒大明曰甘暖權曰赤箭芝一名天麻味甘平無毒好古曰苦平隂中之陽也主治殺鬼精物蠱毒惡氣乆服益氣力長隂肥健本經輕身増年消癰腫下支滿寒疝下血别録天麻主諸風濕痺四肢拘攣小兒風癎驚氣利腰膝强筋力乆服益氣輕身長年開寳治冷氣􅍙痺攤緩不隨語多恍惚善驚失志甄權助陽氣補五勞七傷鬼疰通血脉開竅服食無忌大明治風虚眩運頭痛元素發明杲曰肝虚不足者宜天麻芎藭以補之其用有四療大人風熱頭痛小兒風癎驚悸諸風麻痺不仁風熱語言不遂時珍曰天麻乃肝經氣分之藥素問云諸風掉眩皆屬于木故天麻入厥隂之經而治諸病按羅天益云眼黑頭旋風虚内作非天麻不能治天麻乃定風草故為治風之神藥今有乆復天麻藥遍身發出紅丹者是其袪風之騐也宗奭曰天麻須别藥相佐使然後見其功仍須加而用之人或蜜漬為果或蒸煑食當深思則得矣附方新二天麻丸消風化痰清利頭目寛胸利膈治心忪煩悶頭運欲倒項急肩背拘倦神昬多睡肢節煩痛皮膚瘙痒偏正頭痛鼻齆面目虚浮並宜服之天麻半兩芎藭二兩為末煉蜜丸如芡子大毎食後嚼一丸茶酒任下普濟方腰脚疼痛天麻半夏細辛各二兩絹袋二箇各盛藥令匀蒸熱文互熨痛處汗出則愈數十再熨衛生易簡方還筒子主治定風補虛功同天麻時珍附方新一益氣固精補血黒髪益夀有竒效還筒子半兩芡實半兩金銀花二兩破故紙酒浸春三夏一秋二冬五日焙研末二兩各研末蜜糊丸梧子大每服五十丸空心鹽湯温酒任下鄭西泉所𫝊方方鄧才雜興术直律切品本經上釋名山薊本經楊枹音孚枹薊馬薊綱目山薑别録山連别録吃力伽日華時珍曰按六書本義术字篆文象其根幹枝葉之形吳普本草一名山芥一名天薊因其葉似薊而味似薑芥也西域謂之吃力伽故外臺秘要有吃力伽散揚州之域多種白术其状如枹故有楊枹及枹薊之名今人謂之吴术是也枹乃鼓槌之名古方二术通用後人始有蒼术之分詳見下集解别録曰术生鄭山山谷漢中南鄭二月三月八月九月采根暴乾𢎞景曰鄭山即南鄭也今處處有以蒋山白山茅山者為勝十一月十二月采者好多脂膏而甘其苗可作飲甚香美术有二種白术葉大有毛而作椏根甜而少膏可作丸散用赤术葉細無椏根小苦而多膏可作煎用東境术大而無氣烈不任用今市人賣者皆以米粉塗令白非自然矣用時宜刮去之頌曰术今處處有之以茅山嵩山者為佳春生苗青色無椏莖作蒿幹状青赤色長三二尺以來夏開花紫碧色亦似刺薊花或有黄白色者入伏後結子至秋而苗枯根似薑而旁有細根皮黒心黄白色中有膏液紫色其根乾濕並通用陶隠居言术有二種則爾雅所謂枹薊即白术也今白术生杭越舒宣州高山崗上葉葉相對上有毛方莖莖端生花淡紫碧紅數色根作椏生二月三月八月九月采暴乾用以大塊紫花為勝古方所用术者皆白术也宗奭曰蒼术長如大小指肥實皮色褐其氣味辛烈須米泔浸洗去皮用白术粗促色微褐其氣亦微辛苦而不烈古方及本經止言术不分蒼白二種亦宜兩審時珍曰蒼术山薊也處處山中有之苗高二三尺其葉抱莖而生稍間葉似棠梨葉其脚下葉有三五又皆有鋸齒小刺根如老薑之状蒼黒色肉白有油膏白术枹薊也吴越有之人多取根栽蒔一年即稠嫩苗可茹葉稍大而有毛根如指大状如鼓槌亦有大如拳者彼人剖開暴乾謂之削术亦曰片术陳自良言白而肥者是浙木瘦而黄者是幕阜山所出其力劣昔人用术不分赤白自宋以來始言蒼术苦辛氣烈白术苦甘氣和各自施用亦頗有理並以秋采者佳春采者虚軟易壊嵇含南方草术状云藥有乞力伽即术也瀕海所産一根有至數斤者采餌尤良嘉謨曰浙术俗名雲頭术種平壌頗肥大由糞力也易潤油歙术俗名狗頭术雖瘦小得土氣充也甚燥白勝于浙术寧國昌化池州者並同歙术境相隣也术白术也氣味甘温無毒别録曰甘權曰甘辛杲曰味苦而甘性温味厚氣薄陽中隂也可升可降好古曰入手太陽少隂足太隂陽明少隂厥隂六經之才曰防風地榆為之使權曰忌桃李菘菜雀肉青魚嘉謨曰咀後人乳汁潤之制其性也脾病以陳壁土炒遇竊土氣以助脾也主治風寒濕脾死肌痙疸止汗除熱消食作煎餌乆服輕身延年不饑本經主大風在身面風眩頭痛目淚岀消痰水逐皮間風水結腫除心下急滿霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食别録治心腹脹滿滿腹中冷痛胃虚下利多年氣痢除寒熱止嘔逆甄權反胃利小便主五勞七傷補腰膝長肌肉治冷氣痃癖氣塊婦人冷癥瘕大明除濕益氣和中補陽消痰逐水生津止渇止瀉痢消足脛濕腫除胃中熱肌熱得枳實消痞滿氣分佐黄苓安胎清熱元素理胃益脾補肝風虚主舌本强食則嘔胃脘痛身體重心下急痛心下水痞衝脉為病逆氣裏急臍腹痛好古發明好古曰本草無蒼白术之名近世多用白术治皮間風出汗消痰補胃和中利腰臍間血通水道上而皮毛中而心胃下而腰臍在氣主氣在血主血無汗則發有汗則止與黄耆同功元素曰白术除濕益燥和中補氣其用有九温中一也去脾胃中濕二也除胃中熱三也强脾胃進飲食四也和胃生津液五也止肌熱六也四肢困倦嗜卧目不能開不思飲食七也止渇八也安胎九也凡中焦不受濕不能下利必須白术以逐水益脾非白术不能去濕非枳實不能消痞故枳术丸以之為君機曰脾惡濕濕勝則氣不得施化津何由生故曰膀胱者津液之府氣化則能出焉用白术以除其濕則氣得周流而津液生矣附方舊七新二十四枳术丸消痞强胃乆服令人食自不停也白术一兩黄壁土炒過去土枳實麩炒去麩一兩為末荷葉包飯燒熟搗和丸梧子大每服五十丸白湯下氣滯加橘皮一兩有火加黄連一兩有痰加半夏一兩有寒加乾薑五錢木香三錢有食加神麯麥蘗各五錢潔古家珍枳术湯心下堅大如盤邊如旋盃水飲所作寒氣不足則手足厥逆腹滿脅鳴相逐陽氣不通即水冷隂氣不通即骨疼陽前通則惡寒隂前通則痺不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分宜此主之白术一兩枳實七個水五升煑三升分三服胸中軟即散仲景金匱玉函白术膏服食滋補止乆泄痢上好白术十斤切片入瓦鍋内水淹過二寸文武火煎至一半傾汁入器内以渣再煎如此三次乃取前後汁同熬成膏入器中一夜傾去面上清水收之毎服二三匙蜜湯調下千金良方參术膏治一切脾胃虚捐益元氣白术一斤人參四兩切片以流水十五碗浸一夜桑柴文武火煎取濃汁熬膏入煉蜜收之毎以白湯㸃服集簡方胸膈煩悶白术末水服方寸匕千金方心下有水白术三兩澤瀉五兩水三升煎一升半分三服梅師方五飲酒癖一留飲水停心下二癖飲水在兩脅下三痰飲水在胃中四溢飲水在五臓間五流飲水在腸間皆因飲食冐寒或飲茶過多致此倍术丸用白术一斤乾薑炮桂心各半斤為末蜜丸梧子大毎温水服二三十丸惠民和劑局方四肢腫滿白术三兩㕮咀毎服半兩水一盞半大棗三枚煎九分温服日三四服不拘時候本事方中風口噤不知人事白术四兩酒三升煑取一升頓服千金方産後中寒遍身冷直口噤不識人白术二兩澤瀉一兩生薑五錢水一升煎服至寳頭忽眩運經夕不瘥四體漸羸飲食無味好食黄土用术三斤麴三斤搗篩酒和丸梧子大毎飲服二十丸日三服忌菘菜桃李青魚外臺秘要濕氣作痛白术切片煎汁熬膏白湯㸃服集簡方中濕骨痛术一兩酒三盞煎一盞頓服不飲酒以水煎之三因良方婦人肌熱血虚者吃力伽散用白术白茯苓白芍藥各一兩甘草半兩為散薑棗煎服臺王燾外秘要小兒蒸熱脾虚羸瘦不能飲食方同上風瘙病丙穩禾疹白术為末酒服方寸匕日二服千金方面多䵟􅍍雀卵色苦酒漬术日日拭之極效肘後方自汗不止白术末飲服方寸匕日二服千金方脾虚盜汗白术四兩切片以一兩同牡蠣炒一兩同石斛炒一兩同麥麩揀术為末每服三錢食逺粟米湯下日三服丹溪方老小虚汗白术五錢小麥一撮水煑乾去麥為末用黄耆湯下一錢全幼心鑑産後嘔逆别無他疾者白术一兩二錢生薑一兩五錢酒水各二升煎一升分三服婦人良方脾虚脹滿脾氣不和冷氣客于中壅遏不通是為脹滿寛中丸用白术二兩橘皮四兩為末酒糊丸梧子大每食前木香湯送下三十丸效指迷方脾虚洩瀉白术五錢白芍藥一兩冬月用肉豆蔲煨為末米飲丸梧子大每米飲下五十丸日二丹溪心法濕瀉暑瀉白术車前子等分炒為末白湯下二三錢簡便方乆瀉滑腸白术炒茯苓各一兩糯米炒二兩為末棗肉拌食或丸服之方簡便老小滑瀉白术半斤黄土炒過山藥四兩炒為末飯丸量人大小米湯服或加人參三錢方瀕湖集簡老人常瀉白术二兩黄土拌蒸焙乾去土蒼术五錢泔浸炒茯苓一兩為末米糊丸梧子大毎米湯下七八十丸簡便方小兒乆瀉脾虚米穀不化不進飲食温白丸用白术炒二錢半半夏麴二錢半丁香半錢為末薑汁麪糊丸黍米大毎米飲隨大小服之全幼心鑑瀉血萎黄腸風痔漏脫肛瀉血面色萎黄積年不瘥者白术一斤黄土炒過研末乾地黄半斤飯上蒸熟搗和乾則入少酒丸梧子大毎服十五丸米飲下日三服普濟方孕婦束胎白术枳殻麩炒等分為末燒飯丸梧子大一月一日毎食前温水下三十丸胎瘦則易産也保命集牙齒日長漸至難食名髓溢病白术煎湯潄服取效即愈也張鋭雞峯備急良方蒼术釋名赤术别録山精抱朴仙术綱目山薊時珍曰異術言木者山之精也服之令人長生辟穀致神仙故有山精仙术之號术有赤白二種主治雖近而性味止發不同本草不分蒼白亦未可據今将本經并别録甄權大明四家所說功用參考分别各自附方庶使用者有所依慿修治大明曰用木以米泔浸一宿入藥宗奭曰蒼木辛烈須米泔浸洗再换泔浸二日去上粗皮用時珍曰蒼术性燥故以糯米泔浸去其油切片焙乾用亦有用脂麻同炒以制其燥者氣味苦温無毒别録曰甘權曰甘辛時珍曰白木甘而微苦性温而和赤术甘而辛烈性温而燥隂中陽也可升可降入足太隂陽明手太隂陽明太陽之經忌同白术主治風寒濕痺死肌痙疸作煎餌乆服輕身延年不饑本經主頭痛消痰水遂皮間風水結腫除心下急滿及霍亂吐下不止暖胃消穀嗜食别録除惡氣弭災沴𢎞景主大風􅍙痺心腹脹痛水腫脹滿除寒熱止嘔逆下泄冷痢甄權治筋骨軟弱痃癖氣塊婦人冷氣癥瘕山嵐瘴氣温疾大明明目暖水臓劉完素除濕發汗健胃安脾治痿要藥李杲散風益氣總解諸鬱震亨治濕痰留飲或挾瘀血成窠囊及脾濕下流濁瀝帶下滑瀉腸風時珍發明宗奭曰蒼术氣味辛烈白术微辛苦而不烈古方及本經止言术未分蒼白只縁陶隠居言术有二種自此人多貴白者往往将蒼术置而不用如古方平胃散之類蒼术為最要藥功效尤速殊不詳本草原無白术之名嵇康曰聞道人遺言餌术黄精令人乆夀亦無白字用宜兩審杲曰本草但言术不分蒼白而蒼术别有雄壮上行之氣能除濕下安太隂使邪氣不傳入脾也以其經泔浸火炒故能出汗與白术止汗特異用者不可以此代彼葢有止發之味其餘主治則同元素曰蒼术與白术主治同但比白术氣重而體沈若除上濕發汗功最大若補中焦除脾胃濕力少不如白术腹中窄狹者須用之震亨曰蒼术治濕上中下皆有可用又能總觧諸鬱痰火濕食氣血六鬱皆因傳化失常不得升降病在中焦故藥必兼升降将欲升之必先降之将欲降之必先升之故蒼术為足陽明經藥氣味辛烈强胃强脾發穀之氣能徑入諸經疎洩陽明之濕通行斂濇香附乃隂中快氣之藥下氣最速一升一降故鬱散而平楊士瀛曰脾精不禁小便漏濁淋不止腰背酸疼宜用蒼术以斂脾精精生于穀故也𢎞景曰白术少膏可作丸散赤术多膏可作煎用昔劉涓子挼取其精而丸之名守中金丸可以長生頌曰服食多單餌术或合白茯苓或合石菖蒲並擣末但日水服晚再進乆乆彌佳斸取生术去土水浸再三煎如飴糖酒調飲之更善今茅山所造术煎是此法也陶隠居言取其精丸之今乃是膏煎恐非真也慎微曰梁庾肩吾答陶隠居賚术煎啓云緑葉抽條紫花標色百邪外禦六府内充山精見書華神在録木榮火謝盡采擷之難啓旦移申窮淋漉之劑又謝术蒸啓云味重金漿芳踰玉液足使坐致延生伏深銘感又葛洪抱朴子内篇云南陽文氏漢末逃難壺山中饑困欲死有人教之食术遂不饑數十年乃還郷里顔色更少氣力轉勝故术一名山精神農藥經所謂必欲長生常服山精是也時珍曰按吐納經云紫微夫人术序云吾察草木之勝速益于已者並不及术之多驗也可以長生乆視逺而更靈山林隠逸得服术者五嶽比肩又神仙傳云陳子皇得餌术要方其妻姜氏得疲病服之自愈顔色氣力如二十時也時珍謹按已上諸説皆似蒼术不獨白术今服食家亦呼蒼术為仙术故皆列于蒼术之後人張仲景辟一切惡氣用赤术同豬蹄甲燒烟陶隐居亦言术能除惡氣弭灾沴故今病疫及嵗旦人家徃徃燒蒼木以辟邪氣類編載越民髙氏妻病恍惚譫語亡夫之鬼慿之其家燒蒼木烟鬼遽求去夷堅志載江西一士人為女妖所染其鬼将别曰君為隂氣所浸必當暴泄但多服平胃散為良中有蒼术能去邪也許叔微本事方云微患飲辟三十年始因少年夜坐寫文左向伏几是以飲食多墜左邊中夜必飲酒數杯又向左卧壮時不覺三五年後覺酒止從左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月止右邊有汗左邊絶無遍訪名醫及海上方間或中病止得月餘復作其補如天雄附子礜石輩利如牽牛甘遂大㦸備嘗之矣自揣必有癖囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以决之故積至五七日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼术一斤去皮切片為末油麻半兩水二錢研濾汁大棗五十枚煑去皮核搗和丸梧子大毎日空腹温服五十丸増至一二百丸忌桃李雀肉服三月而疾除自此常服不嘔不痛胸膈寛利飲啖如故暑月汗亦周身燈下能書細字皆术之力也初服時必覺微燥以山巵子末沸湯㸃服解之乆服亦自不燥矣附方舊三新三十服术法烏髭髮駐顔色壮筋骨明耳目除風氣潤肌膚乆服令人輕健蒼术不計多少米泔水浸三日逐日换水取出刮去黒皮切片暴乾慢火炒黄細擣為末毎一斤用蒸過白茯苓末半斤煉蜜和丸梧子大空心卧時熱水下十五丸别用术末六兩甘草末一兩拌和作湯㸃服吞丸尤妙忌桃李雀蛤及三白諸血經驗方蒼术膏鄧才筆峰雜興方除風濕健脾胃變白駐顔補虚損大有功效蒼术新者刮去皮薄切米泔水浸二日一日一换取出以井華水浸過二寸春秋五日夏三日冬七日漉出以生絹袋盛之放在一半原水中揉洗津液出紐乾将渣又搗爛袋盛于一半原水中揉至汁盡為度将汁入大砂鍋中慢火熬成膏毎一斤入白蜜四兩熬二炷香每膏一斤入水澄白茯苓末半斤攪匀瓶收毎服三匙侵早臨卧各一服以温酒送下忌醋及酸物桃李雀蛤菘菜青魚等物力吳球活人心統蒼术膏治脾經濕氣少食足腫無傷食酒色過度勞逸有傷骨熱用鮮白蒼术二十斤浸刮去粗皮晒切以米泔浸一宿取出同溪水一石大砂鍋慢火煎半乾去渣再入石南葉三斤刷去紅衣楮實子一斤川當歸半斤甘草四兩切同煎黄色漉去渣再煎如稀粥乃入白蜜三斤熬成膏毎服三五錢空心好酒調服蒼术丸蕯謙齋瑞竹堂方云清上實下兼治内外障眼茅山蒼术洗刮浄一斤分作四分用酒醋懦泔童尿各浸三日一日一换取出洗搗晒焙以黒脂麻同炒香共為末酒煑麪糊丸梧子大毎空心白湯下五十丸脚李仲南永類方八制蒼术丸疎風順氣養腎治腰濕氣脾痛蒼术一斤洗刮浄分作四分用酒醋米泔塩水各浸三日晒乾又分作四分用川椒紅茴香補骨脂黒牽牛各一兩同炒香揀去不同只取术研末醋糊丸梧子大毎服五十丸空心鹽酒送下五十嵗後加沉香末一兩蒼术散治風濕常服壮筋骨明目蒼术一斤粟米泔浸過竹刀刮去皮半斤以無灰酒浸半斤以童子小便浸春五夏三秋七冬十日取出浄地上掘一坑炭火煆赤去炭将浸藥酒缸入坑内却放木在中以瓦器葢定泥封一宿取出為末毎服一錢空心温酒或鹽湯下萬表積善堂方六制蒼术散治下元虚損偏墜莖痛茅山蒼术浄刮六斤分作六分一斤倉米泔浸二日炒一斤酒浸二日炒一斤青鹽半斤炒黄去鹽一斤小茴香四兩炒黄去茴一斤大茴香四兩炒黄去茴一斤用桑椹子汁浸二日炒取术為末毎服三錢空心溫酒下固真丹瑞竹堂方固真丹燥濕養脾助胃固真茅山蒼术刮浄一斤分作四分一分青鹽一兩炒一分川椒一兩炒一分川楝子一兩炒一分小茴香破故紙各一兩炒並揀术研末酒煑麪糊丸梧子大毎空心米飲下五十丸乾坤生意平補固真丹治元臓乆虚遺精白濁婦人赤白帶下崩漏金州蒼术刮浄一斤分作四分一分川椒一兩炒一分破故紙一兩炒一分茴香食塩各一兩炒一分川楝肉一兩炒取浄术為末入白茯苓末二兩酒洗當歸末二兩酒煑麪糊丸梧子大毎空心鹽酒下五十丸固元丹治元臓乆虚遺精白濁五淋及小腸膀胱疝氣婦人赤白帶下血崩便血等疾以小便頻數為效好蒼术刮浄一斤分作四分一分小茴香食鹽各一兩同炒一分川椒補骨脂各一兩同炒一分川烏頭川楝子肉各一兩同炒一分用醇醋老酒各半斤同煑乾焙連同炒藥通為末用酒煑糊丸梧子大毎服五十丸男以温酒女以醋湯空心下此髙司法方也王璆百一選方少陽丹蒼术米泔浸半日刮皮晒乾為末一斤地骨皮温水洗浄去心晒研一斤熟桑椹二十斤入甆盆揉爛絹袋壓汁和末加糊傾入盤内日晒夜露采日精月華待乾研末煉蜜和丸赤小豆大毎服二十丸無灰酒下日三服一年變髮返黑三年面如童子劉松石保夀堂方交感丹補虚損固精氣烏髭髪此鐡甕城申先生方也乆服令人有子茅山蒼术刮浄一斤分作四分用酒醋米泔鹽湯各浸七日晒研川椒紅小茴香各四兩炒研陳米糊和丸梧子大毎服四十丸空心温酒下聖濟總録交加丸升水降火除百病蒼木刮浄一斤分作四分一分米泔浸炒一分鹽水浸炒一分川椒炒一分破故紙炒黄蘗皮刮浄一斤分作四分一分酒炒一分童尿浸炒一分小茴香炒一分生用揀去各藥只取术蘗為末煉蜜丸梧子大毎服六十丸空心鹽湯下鄧才筆峯雜興方坎離丸滋隂降火開胃進食强筋骨去濕熱白蒼术刮浄一斤分作四分一分川椒一兩炒一分破故紙一兩炒一分五味子一兩炒一分川芎藭一兩炒只取术研末川蘗皮四斤分作四分一斤酥炙一斤入乳汁炙一斤童尿炙一斤米泔炙各十二次研末和匀煉蜜丸梧子大毎服三十丸早用酒午用茶晚用白湯下方積善堂不老丹補脾益腎服之七十亦無白髪茅山蒼术刮浄米泔浸軟切片四斤一斤酒浸焙一斤醋浸焙一斤鹽四兩炒一斤椒四兩炒赤何首烏各二斤泔浸竹刀刮切以黒豆紅棗各五升同蒸至豆爛曝乾地骨皮去骨一斤各取浄末以桑椹汁和成劑鋪盆内汁高三指日晒夜露取日月精華待乾以石臼搗末煉蜜和丸梧子大毎空心酒服一百丸此皇甫敬之方也王海藏醫壘元戎靈芝丸治脾腎氣虚添補精髓通利耳目蒼术一斤米泔水浸春夏五日秋冬七日逐日换水竹刀刮皮切晒石臼為末棗肉蒸和丸梧子大毎服三五十丸棗湯空心服竒效良方補脾滋腎生精强骨真仙方也蒼术去皮五斤為末米泔水漂澄取底用脂麻二升半去殻研爛絹袋濾去渣澄漿拌木暴乾毎服三錢米湯或酒空心調服孫氏集效方面黄食少男婦面無血色食少嗜卧蒼术一斤熟地黄半斤乾薑炮冬一兩春秋七錢夏五錢為末糊丸梧子大每温水下五十丸拔濟生萃方小兒癖疾蒼术四兩為末羊肝一具竹刀批開撒术末線縛入砂鍋煑熱搗作丸服編生生食生米男子婦人因食生熟物留滯腸胃遂至生䖝乆則好食生米否則終日不樂至憔悴萎黄不思飲食以害其生用蒼术米泔水浸一夜剉焙為末蒸餅丸梧子大毎服五十丸食前米飲下日三服益昌伶人劉清嘯一娼名曰花翠年逾笄病此惠民局監趙尹以此治之兩旬而愈葢生米留滯腸胃受濕則穀不磨而成此疾蒼术能去濕暖胃消穀也楊氏家藏經驗方腹中虚冷不能飲食食輒不消羸弱生病术二斤麴一斤炒為末蜜丸梧子大每服三十丸米湯下日三服大冷加乾薑三兩腹痛加當歸三兩羸弱加甘草二兩肘後方脾濕水瀉注下困弱無力水穀不化腹痛甚者蒼术二兩白芍藥一兩黄苓半兩淡桂二錢毎服一兩水一盞半煎一盞温服脉弦頭微痛去芍藥加防風二兩保命集暑月暴瀉壮脾温胃飲食所傷麴术丸用神麴炒蒼术米泔浸一夜焙等分為末糊丸梧子大每服三五十丸米飲下和劑局方飱瀉乆痢椒术丸用蒼术二兩川椒一兩為末醋糊丸梧子大毎服二十丸食前温水下惡痢乆者加桂保命集脾濕下血蒼术二兩地榆一兩分作二服水二盞煎一盞食前温服乆痢虚滑以此下桃花丸保命集腸風下血蒼术不拘多少以皂角挼濃汁浸一宿煑乾焙研為末麪糊丸如梧子大毎服五十丸空心米飲下日三服婦人良方濕氣身痛蒼术泔浸切水煎取濃汁熬膏白湯㸃服簡便方補虚明目健骨和胃蒼木泔浸四兩生地黄焙二兩為末酒糊丸梧子大每温酒下三五十丸日三服普濟方青盲雀目聖惠方用蒼术四兩泔浸一夜切焙研末毎服三錢豬肝三兩批開摻藥在内扎定入粟米一合水一碗砂鍋煑熟熏眼臨卧食肝飲汁不拘大人小兒皆治又方不計時月乆近用蒼术二兩泔浸焙搗為末毎服一錢以好羊子肝一斤竹刀切破摻藥在内麻扎以粟米泔煑熟待冷食之以愈為度眼目昬濇蒼术半斤泔浸七日去皮切焙木賊各二兩為末毎服一錢茶酒任下聖惠方嬰兒目濇不開或出血蒼术二錢入猪膽中扎煑将藥氣熏眼後更嚼取汁與服妙幼幼新書風牙腫痛蒼木鹽水浸過燒存性研末揩牙去風熱濟普方臍蟲怪病腹中如鐡石臍中水出旋變作䖝行遶身匝痒難忍撥掃不盡用蒼术濃煎湯浴之仍以蒼术末入麝香少許水調服夏子益竒疾方苗主治作飲甚香去水𢎞景亦止自汗狗脊本經中品釋名强膂别録扶筋别録百枝本經狗青吳普恭曰此藥苗似貫衆根長多岐状如狗之脊骨而肉作青緑色故以名之時珍曰强膂扶筋以功名也别録又名扶葢乃扶筋之誤本經狗脊一名百枝别録萆薢一名赤節而吳普本草謂百枝為萆薢赤節為狗脊皆似誤也集解别録曰狗脊生常山川谷二月八月采根暴乾普曰狗脊如萆薢莖節如竹有刺葉圓赤根黄白亦如竹根毛有刺岐伯經云莖一節葉端圓青赤皮白有赤脉𢎞景曰今山野處處有之與菝葜相似而小異其莖葉小肥其節疎其莖大直上有刺葉圓有赤脉根凸凹巃嵸如羊角强細者是頌曰今太行山淄温眉州亦有之苗尖細碎青色高一尺以來無花其莖葉似貫衆而細其根黒色長三四寸多岐似狗之脊骨大有兩指許其肉青緑色春秋采根暴乾今方亦有用金毛者陶氏所説乃有刺萆薢非狗脊也今江左俗猶用之斆曰凡使狗脊勿用透山藤根形状一般只是入頂苦不可餌也時珍曰狗脊有二種一種根黑色如狗脊骨一種有金黄毛如狗形皆可入藥其莖細而葉花兩兩對生正似大葉蕨比貫衆葉有齒面背皆光其根大如拇指有硬黒鬚簇之吳普陶𢎞景所説根苗皆似菝葜蘇恭蘇頌所說即真狗脊也按張揖廣雅云菝葜狗脊也張華博物志云菝葜與萆薢相亂一名狗脊觀此則昔人以菝葜為狗脊相承之誤乆矣然菝葜萆薢狗脊三者形状雖殊而功用亦不甚相逺根修治斆曰凡修事火燎去鬚細剉了酒浸一夜蒸之從巳至申取出晒乾用時珍曰今人惟剉炒去毛鬚用氣味苦平無毒别録曰甘微温普曰神農苦桐君黄帝岐伯雷公扁鵲甘無毒李當之小温權曰苦辛微熱之才曰萆解為之使惡敗醤莎草主治腰背強闗機緩急周痺寒濕膝痛頗利老人本經療失溺不節男女脚弱腰痛風邪淋露少氣目闇堅脊利俛仰女子傷中闗節重别録男子女人毒氣軟脚腎氣虚弱續筋骨補益男子甄權强肝腎健骨治風虚時珍附方新四男子諸風四寳丹用金毛狗脊鹽泥固濟煆紅去毛蘇木萆薢川烏頭生用等分為末米醋和丸梧子大毎服二十丸温酒鹽湯下普濟方室女白帶衝任虚寒鹿葺丸用金毛狗脊燎去毛白歛各一兩鹿葺酒蒸焙一兩為末用艾煎醋汁打糯米糊丸梧子大毎服五十丸空心温酒下濟生方固精強骨金毛狗脊志逺肉白伏神當歸身等分為末煉蜜丸梧子大毎酒服五十丸集簡方病後足腫但節食以養胃氣外用狗脊煎湯漬洗吳授藴要貫衆本經下品釋名貫節本經貫渠本經百頭本經又名虎卷扁苻草鴟頭别録黑狗脊綱目鳳尾草圖經時珍曰此草莖葉如鳳尾其根一本而衆枝貫之故草名鳳尾根名貫衆貫節貫渠渠者魁也呉普本草作貫中俗名貫仲管仲者皆謬稱也爾雅云濼音灼貫衆即此也别録一名伯萍一名藥藻皆字訛也金星草一名鳯尾草與此同名宜互考之𢎞景曰近道皆有之葉如大蕨其根形色毛芒全似老鴟頭故呼為草鴟頭集解别録曰貫衆生𤣥山山谷及寃句少室山二月八月采根隂乾普曰葉青黄色兩兩相對莖有黒毛叢生冬夏不死四月花白七月實黑聚相連卷旁生三月八月采根五月采葉保昇曰苗似狗脊状如雉尾根直多枝皮黒肉赤曲者名草鴟頭所在山谷隂處則有之頌曰今陕西河東州郡及荆襄間多有之而少有花者春生苗赤葉大如蕨莖幹三稜葉緑色似雞翎又名鳳尾草其根紫黑色形如大𤓰下有一黑鬚毛又似老鴟郭璞注爾雅云葉圓鋭莖毛黑布地冬不死廣雅謂之貫節是矣時珍曰多生山隂近水處數根叢生一根數莖莖大如筋其涎滑其葉兩兩對生如狗脊之葉而無鋸齒青黄色面深背淺其根曲而有尖觜黒鬚叢族亦似狗脊根而大状如伏鴟根氣味苦微寒有毒之才曰雚菌赤小豆為之使㐲石鍾乳主治腹中邪熱氣諸毒殺三蟲本經去寸白破癥瘕除頭風止金瘡别録為末水服一錢止鼻血有效蘇頌治下血崩中帶下産後血氣脹痛斑疹毒漆毒骨哽解豬病時珍發明時珍曰貫衆大治婦人血氣根汁能制三黄化五金㐲鍾乳結砂制汞且能解毒軟堅王海藏治夏月豆出不快快斑散用之云貫衆有毒而能解腹中邪熱之毒病因内感而發之於外者多效非古法之分輕也又黄山谷煑豆帖言荒年以黑豆一升挼浄入貫衆一斤剉如骰子大同以水煑文火斟酌至豆熱取出日乾覆令展盡餘汁簸去貫衆毎日空心啗豆五七粒能食百草木枝葉有味可飽又王璆百一選方言滁州蒋教授因食鯉魚玉蟬羮為肋肉所硬凡藥皆不效或令以貫衆濃煎汁一盞分三服連進至夜一路而出亦可為末水服一錢觀此可知其軟堅之功不但治血治瘡而已也附方新一十五鼻衂不止貫衆根末水服一錢普濟方諸般下血腸風酒痢血痔鼠痔下血黑狗脊黄者不用須内肉赤色者即本草貫衆也去皮毛剉焙為末每服二錢空心米飲下或醋糊丸梧子大毎米飲下三四十丸或燒存性出火毒為末入麝香少許米飲服二錢普濟方女人血崩貫衆半兩煎酒服之立止集簡方産後亡血過多心腹徹痛者用貫衆状如刺蝟者一個全用不剉只揉去毛及花蕚以好醋蘸濕慢火炙令香熟候冷為末米飲空心毎服二錢甚效方婦人良赤白帶下年深諸藥不能療者用上方治之亦驗名獨聖湯方同上年深刻𠻳出膿血貫衆蘇方木等分毎服三錢水一盞生薑三片煎服日二服乆欬漸成勞瘵鳳尾草為末用魚鮓蘸食之聖惠方豆瘡不快快斑散用貫衆赤芍藥各一錢升麻甘草各五分入淡竹葉三片水一盞半煎七分温服王海藏方頭瘡白秃貫衆白芷為末油調塗之調又方貫衆燒末油塗聖惠方漆瘡作癢油調貫衆末塗之千金方雞魚骨哽貫衆縮砂甘草等分為粗末綿包少許含之嚥汁乆則隨痰自出普濟方解輕粉毒齒縫出血臭腫貫衆黄連各半兩煎水入氷片少許時時潄之陸氏積徳堂方血痢不止鳳尾草根即貫衆五錢煎酒服陳解元吉言所𫝊集簡方便毒腫痛貫衆酒服二錢良鄙多能事花主治惡瘡令人洩别録巴㦸天本經上品釋名不凋草日華三蔓草時珍曰名義殊不可曉集解别録曰巴㦸天生巴郡及下邳山谷二月八月采根隂乾𢎞景曰今亦用建平宜都者根状如牡丹而細外赤内黒用之打去心恭曰其苗俗名三蔓草葉似茗經冬不枯根如連珠宿根青色嫩根白紫用之亦同以連珠多肉厚者為勝大明曰紫色如小念珠有小孔子堅硬難搗宗奭曰巴㦸天本有心乾縮時偶自落或抽去故中心或空非自有小孔也今人欲要中間紫色則多偽以大豆汁沃之不可不察頌曰今江淮河東州郡亦有但不及蜀川者佳多生山林内内地生者葉似麥門冬而厚大至秋結實今方家多以紫色為良蜀人云都無紫色者采時或用黒豆同煑欲其色紫殊失氣味尤宜辨之又有一種乃山葎根正似巴㦸但色白土人采得以醋水煑之乃以雜巴㦸莫能辨也但擊破視之中紫而鮮㓗者偽也其中雖紫又有㣲白糁有粉色而理小暗者真也真巴㦸嫩時亦白乾時亦煑治使紫力劣弱耳根修治斆曰凡使須用枸把子湯浸一宿待稍軟漉出再酒浸一伏時漉出同菊花熬焦黄去菊花以布拭乾用時珍曰今法惟以酒浸一宿剉焙入藥若急用只以温水浸軟去心也氣味辛甘微温無毒大明曰苦之才曰覆盆子為之使惡雷丸丹参朝生主治大風邪氣隂痿不起强筋骨安五臓補中増志益氣本經療頭面遊風小腹及隂中相引痛補五勞益精利男子别録治男子夜夢鬼交精洩強隂下氣治風癩甄權治一切風療水脹日華治脚氣去風疾補血海時珍經出仙發明好古曰巴㦸天腎經血分藥也權曰病人虚損加而用之宗奭曰有人嗜酒日須五七盃後患脚氣甚危或教以巴㦸半兩糯米同炒米微轉色去米不用大黄一兩剉炒同為末熟蜜丸温水服五七十丸仍禁酒遂愈附録巴棘别録曰味苦有毒主惡疥瘡出䖝生髙地葉白有刺根連數十枚一名女木逺志本經上品釋名苗名小草本經細草本經棘菀本經葽繞本經時珍曰此草服之能益智强志故有逺志之稱世説載謝安云處則為逺志出則為小草記事珠謂之醒心杖集解别録曰逺志生太山及寃句川谷四月采根葉隂乾𢎞景曰寃句屬兖州濟隂郡今此藥猶從彭城北蘭陵來用之去心取皮一斤止得三兩爾亦入仙方用小草状似麻黄而青志曰莖葉似大青而小比之麻黄陶不識也禹錫曰按爾雅云葽繞蕀􅀢郭璞注云今逺志也似麻黄赤華葉鋭而黄其上謂之小草頌曰今河陕洛西州郡亦有之根形如蒿根黄色苗似麻黄而青又如畢豆葉亦有似大青而小者三月開白花根長及一尺泗州出者花紅根葉俱大於他處商州出者根又黑色俗傳夷門出者最佳四月采根晒乾古方通用逺志小草今醫但用逺志稀用小草時珍曰逺志有大葉小葉二種陶𢎞景所說者小葉也馬志所說者大葉也大葉者花紅根修治斆曰凡使須去心否則令人煩悶仍用甘草湯浸一宿暴乾或焙乾用氣味苦温無毒之才曰逺志小草得茯苓冬葵子龍骨良畏珍珠藜蘆蜚蠊齊蛤𢎞景曰藥無齊蛤恐是百合也權曰是蠐螬也恭曰藥録下卷有齊蛤陶說非也主治欬逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力乆服輕身不老本經利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黄别録殺天雄附子烏頭毒煎汁飲之之才治健忘安魂魄令人不迷堅壮陽道甄權長肌肉助筋骨婦人血噤失音小兒客忤日華腎積奔豚好古治一切癰疽時珍葉主治益精補隂氣止虚損夢洩别録發明好古曰逺志腎經氣分藥也時珍曰逺志入足少隂腎經非心經藥也其功専於強志益精治善忘益精與志皆腎經之所藏也腎精不足則志氣衰不能上通于心故迷惑善忘靈樞經云腎藏精精合志腎盛怒而不止則傷志志傷則喜忘其前言腰痛不可以俛仰屈伸毛悴色夭又云人之善忘者上氣不足下氣有餘腸胃實而心肺虚虚則營衛留于下乆之不以時上故善忘也陳言三因方逺志酒治癰疽云有竒功葢亦補腎之力爾葛洪抱朴子云陵陽子仲服逺志二十年有子三十七人能坐在立亡也附方舊三新四心孔惽塞多忘善誤丁酉日宻自至市買逺志着巾角中還為末服之勿令人知肘後方胸痺心痛逆氣膈中飲食不下小草丸用小草桂心乾薑細心蜀椒出汗各三兩附子二分炮六物搗下篩蜜和丸梧子大先食米汁下三丸日三服不知稍増以知為度忌猪肉冷水生葱菜方范汪東陽㗋痺作痛逺志肉為末吹之涎出為度直指方腦風頭痛不可忍逺志末㗜鼻宣明方吹乳腫痛逺志焙研酒服二錢以滓傅之袖珍方一切癰疽逺志酒治一切癰疽發背癤毒惡㗋浸大有死血隂毒在中則不痛傅之即痛有憂怒等氣積怒攻則痛不可忍傅之即不痛或藴熱在内熱逼人手不可近傅之即清涼或氣虚冷潰而不歛傅之即斂此本韓大夫宅用以救人方極驗若七情内鬱不問虚實寒熱治之皆愈用逺志不以多少米泔浸洗槌去心為末毎服三錢温酒一盞調澄少頃飲其清以滓傅患處三因方小便赤濁逺志甘草水煑半斤伏神益智仁各二兩為末酒糊丸梧子大毎空心棗湯下五十丸普濟百脉根唐本草集解恭曰出肅州巴西葉似苜蓿花黄根如逺志二月八月采根日乾時珍曰按唐書作柏脉根肅州嵗貢之千金外臺大方中亦時用之今不復聞此或者名稱又不同也根氣味苦微寒無毒主治下氣止渇去熱除虚勞補不足酒浸或水煑丸散兼用唐本淫羊藿本經中品釋名仙靈脾唐本放杖草日華棄杖草日華千兩金日華乾雞筋日華黄連祖日華三枝九葉草圖經剛前本經𢎞景曰服之使人好為隂陽西川北部有淫羊一日百遍合葢食此藿所致故名淫羊藿時珍曰豆葉曰藿此葉似之故亦名藿仙靈脾千兩金放杖剛前皆言其功力也雞筋黄連祖皆因其根形也栁子厚文作仙靈毗人臍曰毗此物補下於理尤通集解别録曰淫羊藿生上郡陽山山谷恭曰所在皆有葉形似小豆而圓薄莖細亦堅俗名仙靈脾是也頌曰江東陜西泰山漢中湖湘間皆有之莖如粟稈葉青似杏葉上有刺根紫色有鬚四月開白花亦有紫花者碎小獨頭子五月采葉晒乾湖湘出者葉如小豆枝莖堅細經冬不凋根似黄連闗中呼為三枝九葉草苗髙一二尺許根葉俱堪用蜀本草言生處不聞水聲者良時珍曰生大山中一根數莖莖粗如線髙一二尺一莖二椏一椏三葉葉長二三寸如杏葉及豆藿面光背淡甚薄而細齒有微刺根葉修治斆曰凡使時呼仙靈脾以夾刀夾去葉四畔花枝毎一斤用羊脂四兩拌炒待脂盡為度氣味辛寒無毒普曰神農雷公辛李當之小寒權曰甘平可單用保昇曰性温時珍曰甘香微辛温之才曰薯蕷紫芝為之使得酒良主治隂痿絶傷莖中痛利小便益氣力強志本經堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫乆服令人有子别録機曰無子字誤當作有子丈夫絶陽無子女人絶隂無子老人昬耄中年健忘一切冷風勞氣筋骨攣急四肢不仁補腰膝強心力大明發明時珍曰滛羊藿味甘氣香性温不寒能益精氣乃手足陽明三焦命門藥也真陽不足者宜之附方舊三新五仙靈脾酒益丈夫興陽理腰膝冷用淫羊藿一斤酒一斗浸三日逐時飲之心食醫鏡偏風不遂皮膚不仁宜服仙靈脾酒仙靈脾一斤細剉生絹袋盛于不津器中用無灰酒二升浸之重封春夏三日秋冬五日後毎日暖飲常令醺然不得大醉酒盡再合無不效驗合時切忌雞犬婦人見聖恵方三焦欬𠻳腹滿不飲食氣不順仙靈脾覆盆子五味子炒各一兩為末煉蜜丸梧子大每薑茶下二十丸聖濟録目昬生翳仙靈脾生王𤓰即小栝樓紅色者等分為末毎服一錢茶下日二服聖濟總録病後青盲日近者可治仙靈脾一兩淡豆豉一百粒水一盌半煎一盌頓服即瘳百一選方小兒雀目仙靈脾根晚蠶蛾各半兩炙甘草射干各二錢半為末用羊子肝一枚切開摻藥二錢紥定以黒豆一合米泔一盞煑熟分二次食以汁送之方普濟痘疹入目仙靈脾威靈仙等分為末毎服五分米湯下痘疹便覽牙齒虚痛仙靈脾為粗末煎湯頻潄大效竒效方仙茅宋開寳釋名獨茅開寳茅爪子開寳婆羅門參珣曰其葉似茅乆服輕身故名仙茅梵音呼為河輪勒陁頌曰其根獨生始因西域婆羅門僧獻方於唐𤣥宗故今江南呼為婆羅門參言其功補如人參也集解珣曰仙茅生西域葉似茅其根粗細有節或如筆管有節文理黄色多延自武城來蜀中諸州亦皆有之今大庾嶺蜀川江湖兩浙諸州亦有之葉青如茅而軟且畧濶面有縱文又似初生椶櫚秧髙尺許至冬盡枯春初乃生三月有花如梔子花黄色不結實其根獨莖而直大如小指下有短細肉根相附外皮稍粗褐色内肉黄白色二月八月采根暴乾用衡山出者花碧五月結黒子時珍曰蘇頌所說詳盡得之但四五月中抽莖四五寸開小花深黄色六出不似巵子處處大山中有之人惟取梅嶺者用而會典成都嵗貢仙茅二十一斤根修治斆曰采得以清水洗刮去皮於槐砧上用銅刀切豆許大以生稀布袋盛於烏豆水中浸一宿取出用酒拌濕蒸之從巳至亥取出暴乾勿犯鐡器及牛乳斑人鬢鬚大明曰彭祖單服法以竹刀刮切糯米泔浸去赤汁出毒後無妨損氣味辛温有毒珣曰甘微温有小毒又曰辛平宣而復補無大毒有小熱小毒主治心腹冷氣不能食腰脚風冷攣痺不能行丈夫虚勞老人失溺無子益陽道乆服通神強記助筋骨益肌膚長精神明目開寳治一切風氣補暖腰脚清安五臓乆服輕身益顔色丈夫五勞七傷明耳目填骨髓李珣開胃消食下氣益房事不倦大明發明頌曰五代唐筠州刺史王顔著續傳信方因圖書編録西域婆羅門僧服仙茅方當時盛行云五勞七傷明目益筋骨宣而復補云十斤乳石不及一斤仙茅表其功力也本西域道人所傳開元元年婆羅門僧進此藥明皇服之有效當時禁方不𫝊天寳之亂方書流散上都僧不空三藏始得此方𫝊與司徒李勉尚書路嗣供給事齊杭僕射張建封服之皆得力路公乆服金石無效得此藥其益百倍齊給事守晉雲日少氣力風疹繼作服之遂愈八九月采得竹刀刮去黑皮切如豆粒米泔浸兩宿隂乾搗篩熟蜜丸梧子大毎旦空心酒飲任便下二十丸忌鉄器禁食牛乳及黑牛肉大減藥力機曰五臺山有仙茅患大風者服之多瘥時珍曰按許真君書云仙茅乆服長生其味甘能養肉辛能養肺苦能養氣鹹能養骨滑能養膚酸能養筋宜和苦酒服之必效也又范成大虞衡志云廣西英州多仙茅其羊食之舉體悉化為筋不復有血肉食之補人名乳羊沈括筆談云夏文荘公稟賦異於人但睡則身冷如逝者既覺須令人温之良乆乃能動常服仙茅鍾乳硫黄莫知紀極觀此則仙茅葢亦性熱補三焦命門之藥也惟陽弱精寒稟賦素怯者宜之若體壮相火熾盛者服之反能動火按張果醫説云一人中仙茅毒舌脹出口漸大與肩齊因以小刀𠢐之隨破隨合𠢐至百數始有血一㸃出曰可救矣煑大黄朴硝與服以藥摻之應時消縮此皆火盛性淫之人過服之害也𢎞治間東海張弼梅嶺仙茅詩有使君昨日纔持去今日人來乞墓銘之句皆不知服食之理惟藉藥縱恣以速其生者於仙茅何尤附方新二仙茅丸壮筋骨益精神明目黒髭鬚仙茅二斤糯米泔浸五日去赤水夏月浸三日銅刀刮剉隂乾取一斤蒼术二斤米泔浸五日刮皮焙乾取一斤枸把子一斤車前子十二兩白茯苓去皮茴香炒栢子仁去殻各八兩生地黄焙熟地黄焙各四兩為末酒煮糊丸如梧子大毎服五十丸食前温酒下日二服聖濟總録定喘下氣補心腎神秘散用白仙茅半兩米泔浸三宿晒炒團參二錢半阿膠一兩半炒雞膍脛一兩燒為末毎服二錢糯米飲空心下日二三因方𤣥參本經中品釋名黑參綱目𤣥臺吴普重臺本經鹿腸吴普正馬别録逐馬藥性馥香開寳野脂麻綱目鬼藏吴普時珍曰𤣥黑色也别録一名端一名咸多未詳𢎞景曰其莖微似人參故得參名志曰合香家用之故俗呼馥草集解别録曰𤣥參生河間川谷及寃句三月四月采根暴乾普曰生寃句山陽三月生苗其葉有毛四四相值似芍藥黑莖莖方髙四五尺葉亦生枝間四月實黑𢎞景曰今出近道處處有之莖似人參而長大根甚黑亦微香道家時用亦以合香恭曰𤣥參根苗並臭莖亦不似人參未見合香志曰其莖方大髙四五尺紫赤色而有細毛葉如掌大而尖長根生青白乾即紫黑新者潤膩陶云莖似人參蘇言根苗並臭似未深識頌曰二月生苗葉似脂麻對生又如槐栁而尖長有鋸齒細莖青紫色七月開花青碧色八月結子黑色又有白花者莖方大紫赤色而有細毛有節若竹者髙五六尺其根一根五七枚三月八月采暴乾或云蒸過日乾時珍曰今用𤣥參正如蘇頌所云其根有腥氣故蘇頌以為臭也宿根多地蠶食之故其中空花有紫白二種根修治斆曰凡采得後須用蒲草重重相隔入甑蒸兩伏時晒乾用勿犯銅器餌之噎人㗋䘮人目氣味苦微寒無毒别録曰鹹普曰神農桐君黄帝雷公苦無毒岐伯寒元素曰足少隂腎經君藥也治本經須用之才曰惡黄耆乾薑大棗山茱萸反藜蘆主治腹中寒熱積聚女子産乳餘疾補腎氣令人明目本經主暴中風傷寒身熱支滿狂邪忽忽不知人温瘧洒洒血瘕下寒血除胸中氣下水止煩渇散頸下核癰腫心腹痛堅癥定五臓乆服補虚明目強隂益精别録熱風頭痛傷寒勞復治暴結熱散瘤瘻瘰癧甄權治遊風補勞損心驚煩躁骨蒸𫝊尸邪氣止健忘消腫毒大明滋隂降火解斑毒利咽㗋通小便血滯時珍發明元素曰元參乃樞機之劑管領諸氣上下清肅而不濁風藥中多用之故活人書治傷寒陽毒汗下後毒不散及心下懊憹煩不得眠心神顛倒欲絶者俱用𤣥參以此論之治胸中氤氲之氣無根之火當以𤣥參為聖劑也時珍曰腎水受傷真隂失守孤陽無根發為火病法宜壯水以制火故𤣥參與地黄同功其消瘰癧亦是散火劉守真言結核是火病附方舊二新七諸毒鼠瘻𤣥參漬酒日日飲之開寳本草年乆瘰癧生𤣥參搗傅之日二易之廣利方赤脉貫瞳𤣥參為末以米泔煑猪肝日日蘸食之濟急仙方發斑咽痛𤣥參升麻湯用𤣥參升麻甘草各半兩水三盞煎一盞半温服南陽活人書急㗋痺風不拘大人小兒𤣥參鼠粘子半生半炒各一兩為末新水服一盞立瘥聖惠方鼻中生瘡𤣥參末塗之或以水浸軟塞之衛生易簡方三焦積熱𤣥參黄連大黄各一兩為末煉蜜丸梧子大毎服三四十丸白湯下小兒丸粟米大丹溪方小腸疝氣黒參㕮咀炒為丸毎服一錢半空心酒服出汗即效孫大仁集效方燒香治癆經驗方用𤣥參一斤甘松六兩為末煉蜜一斤和匀入瓶中封閉地中埋罯十日取出更用灰末六兩煉蜜六兩同和入瓶更罯五日取出燒之常令聞香疾自愈頌曰初入瓶中封固煑一伏時破瓶取搗入蜜别以瓶盛埋地中罯過用亦可熏衣地榆本經中品校正併入别録有名未用酸赭釋名玉豉酸赭𢎞景曰其葉似榆而長初生布地故名其花子紫黑色如豉故又名玉豉時珍曰按外丹方言地榆一名酸赭其味酸其色赭故也今蘄州俚人呼地榆為酸赭又訛赭為棗則地榆酸赭為一物甚明其主治之功亦同因併别録有名未用酸赭為一云集解别録曰地榆生桐柏及寃句山谷二月八月采根暴乾又曰酸赭生昌陽山采無時頌曰今處處平原川澤皆有之宿根三月内生苗初生布地獨莖直上髙三四尺對分出葉葉似榆葉而稍狹細長似鋸齒狀青色七月開花如椹子紫黑色根外黑裏紅似栁根𢎞景曰其根亦入釀酒道方燒作灰能爛石故煑石方用之其葉山人乏茗時采作飲亦好又可煠茹根氣味苦微寒無毒别録曰甘酸權曰苦平元素曰氣微寒味微苦氣味俱薄其體沉而降隂中陽也専主下焦血杲曰味苦酸性微寒沉也隂也之才曰得髪良惡麥門冬伏丹砂雄黄硫黄主治婦人乳産痓痛七傷帶下五漏止痛止汗除惡肉療金瘡本經止膿血諸瘻惡瘡熱瘡補絶傷産後内塞可作金瘡膏消酒除渇明目别録止冷熱痢疳痢極效開寳止吐血鼻衂腸風月經不止血崩産前後諸血疾并水瀉大明治膽氣不足李杲汁釀酒治風痺補腦擣汁塗虎犬蛇蟲傷時珍酸赭味酸主内漏止血不足别録發明頌曰古者斷下多用之炳曰同樗皮治赤白痢宗奭曰其性沉寒入下焦若熱血痢則可用若虚寒人及水瀉白痢即未可輕使時珍曰地榆除下焦熱治大小便血證止血取上截切片炒用其稍則能行血不可不知楊士瀛云諸瘡痛者加地榆癢者加黄芩附方舊八新六男女吐血地揄三兩米醋一升煑十餘沸去滓食前稍温服一合聖惠方婦人漏下赤白不止令人黄瘦方同上血痢不止地榆晒研毎服二錢摻在羊血上炙熱食之以捻頭煎湯送下一方以地榆煑汁作飲毎服三合聖濟赤白下痢骨立者地榆一斤水三升煑一升半去滓再煎如稠餳絞濾空腹服三合日再服崔元亮海上方乆病腸風痛痒不止地榆五錢蒼术一兩水二鍾煎一鍾空心服日一服活法機要下血不止二十年者取地榆鼠尾草各二兩水二升煑一升頓服若不斷以水漬屋塵飲一小盃投之肘後方結隂下血腹痛不止地榆四兩炙甘草三兩毎服五錢水一盞入縮砂四七枚煎一盞半分二服宣明方小兒疳痢地榆煑汁熬如飴糖與服便已肘後方毒蛇螫人新地榆根擣汁飲兼以漬瘡肘後方虎犬咬傷地榆煑汁飲并為末傅之亦可為末白湯服日三忌酒梅師方代指腫痛地榆煑汁漬之半日愈千金方小兒濕瘡地榆煑濃汁日洗二次千金方小兒面瘡焮赤腫痛地榆八兩水一斗煎五升温洗之衛生總微方煑白石法七月七日取地榆根不拘多少隂乾百日燒為灰復取生者與灰合搗萬下灰三分生末一分合之若石二三斗以水浸過三寸以藥入水攪之煑至石爛可食乃已臞仙神隠書葉主治作飲代茶甚解熱蘇恭丹參本經上品釋名赤參别録山參日華郗蟬草本經木羊乳吴普逐馬𢎞景奔馬草時珍曰五參五色配五臓故人參入脾曰黄參沙參入肺曰白參𤣥參入腎曰黑參牡蒙入肝曰紫參丹參入心曰赤參其苦參則右腎命門之藥也古人拾紫參而稱苦參末逹此義爾炳曰丹參治風軟脚可逐奔馬故名奔馬草曽用實有效集解别録曰丹參生桐柏川谷及太山五月采根暴乾𢎞景曰此桐柏在義陽是淮水發源之山非江東臨海之桐柏也今近道處處有之莖方有毛紫花時人呼為逐馬普曰莖葉小房如荏有毛根赤色四月開紫花二月五月采根隂乾頌曰今陜西河東州郡及隨州皆有之二月生苗髙一尺許莖方有稜青色葉相對如薄荷而有毛三月至九月開花成穗紅紫色似蘇花根赤色大者如指長尺餘一苗數根恭曰冬采者良夏采者虛惡時珍曰處處山中有之一枝五葉葉如野蘇而尖青色皺毛小花成穗如蛾形中有細子其根皮丹而肉紫根氣味苦微寒無毒普曰神農桐君黄帝雷公苦無毒岐伯鹹李當之大寒𢎞景曰乆服多眼赤故應性熱今云微寒恐謬也權曰平之才曰畏鹽水反藜蘆主治心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕止煩滿益氣本經養血去心腹痼疾結氣腰脊强脚痺除風邪留熱乆服利人别録漬酒飲療風痺足軟𢎞景主中惡及百邪鬼魅腹痛氣作聲音鳴吼能定精甄權養神定志通利闗脉治冷熱勞骨節疼痛四肢不遂頭痛赤眼熱温狂悶破宿血生新血安生胎落死胎止血崩帶下調婦人經脉不匀血邪心煩惡瘡疥癬癭贅腫毒丹毒排膿止痛生肌長肉大明活血通心包絡治疝痛時珍發明時珍曰丹參色赤味苦氣平而降隂中之陽也入手少隂厥隂之經心與包絡血分藥也按婦人明理論云四物湯治婦人病不問産前産後經水多少皆可通用惟一味丹參散主治與之相同葢丹參能破宿血補新血安生胎落死胎止崩中帶下調經脉其功大類當歸地黄芎藭芍藥故也附方舊三新四丹參散治婦人經脉不調或前或後或多或少産前胎不安産後惡血不下兼治冷熱勞腰脊痛骨節煩疼用丹參洗浄切晒為末每服二錢温酒調下婦人明理方落胎下血丹參十二兩酒五升煑取三升温服一升一日三服亦可水煑千金方寒疝腹痛小腹隂中相引痛白汗出欲死以丹參一兩為末每服二錢熱酒調下聖惠方小兒身熱汗出拘急因中風起丹參半兩鼠尿炒三十枚為末毎服三錢漿水下聖濟總録驚癎發熱丹參摩膏用丹參雷丸各半兩猪膏二兩同煎七上七下濾去滓盛之每以摩兒身上日三次千金方婦人乳癰丹參白芷芍藥各二兩㕮咀以醋淹一夜猪脂半斤微火煎成膏去滓傅之孟詵必效方熱油火灼除痛生肌丹參八兩剉以水微調取羊脂二斤煎三上三下以塗瘡上肘後方紫參本經中品釋名牡蒙本經童腸别録馬行别録衆戎别録五鳥花綱目時珍曰紫參王孫並有牡蒙之名古方所用牡蒙多是紫參也按錢起詩集云紫參幽芳也五葩連蕚狀如飛禽羽舉故俗名五鳥花集解别録曰紫參生河西及寃句山谷三月采根火炙使紫色普曰紫參一名牡蒙生河西或商山圓聚生根黄赤有文皮黑中紫五月花紫赤實黑大如豆𢎞景曰今方家皆呼為牡蒙用之亦少恭曰紫參葉似羊蹄紫花青穗其根皮紫黑肉紅白肉淺皮深所在有之長安見用者出蒲州牡蒙乃王孫也葉似及已而大根長尺餘皮肉亦紫色根苗不相似頌曰今河中晉解齊及淮蜀州郡皆有之苗長一二尺莖青而細其葉青似槐葉亦有似羊蹄者五月開花白色似葱花亦有紅紫而似水葒者根淡紫黑色如地黄狀肉紅白色肉淺而皮深三月采根火炙紫色又云六月采晒乾用時珍曰紫參根乾紫黑色肉帶紅白状如小紫草范子計然云紫參出三輔有三色以青赤色為善根氣味苦寒無毒别録曰微寒普曰牡蒙神農黄帝苦李當之小寒之才曰畏辛夷主治心腹積聚寒熱邪氣通九竅利大小便本經療腸胃大熱唾血衂血腸中聚血癰腫諸瘡止渇益精别録治心腹堅脹散瘀血治婦人血閉不通甄權主狂瘧瘟瘧􅀈血汁出好古治血痢好古牡蒙治金瘡破血生肌肉止痛赤白痢補虚益氣除脚腫發隂陽蘇恭發明時珍曰紫參色紫黒氣味俱厚隂也沉也入足厥隂之經肝臓血分藥也故治諸血病及寒熱瘧痢癰腫積塊之屬厥隂者古方治婦人腸覃病烏啄丸所用牡蒙即此物也唐蘇恭註王孫引陳延之小品方牡蒙所主之證正是紫參若王孫則止治風濕痺證不治血病故今移附于此附方舊一新二紫參湯治痢下紫參半斤水五升煎二升入甘草二兩煎取半升分三服張仲景金匱玉圅吐血不止紫參人參阿膠炒等分為末烏梅湯服一錢一方去人參加甘草以糯米湯服聖惠方面上酒刺五參丸用紫參丹參人參苦參沙參各一兩為末胡桃仁杵和丸梧子大每服三十丸茶下普濟王孫木經中品校正併入拾遺旱藕釋名牡蒙𢎞景黄孫别録黄昬别録旱藕普曰楚名王孫齊名長孫又名海孫吴名白功草又名蔓延時珍曰紫參一名牡蒙本部合歡一名黄昏皆與此名同物異集解别録曰王孫生海西川谷及汝南城郭垣下普曰蔓延赤文整延相當𢎞景曰今方家皆呼為黄昬云牡蒙市人少識者恭曰按陳延之小品方述本草牡蒙一名王孫徐之才藥對有牡蒙無王孫此則一物明矣牡蒙葉似及已而大根長尺餘皮肉皆紫色藏器曰旱藕生太行山中状如藕時珍曰王孫葉生顛頂似紫河車葉按神農及吴普本草紫參一名牡蒙陶𢎞景亦曰今方家呼紫參為牡蒙其王孫並無牡蒙之名而陶氏于王孫下乃云又名牡蒙且無形状唐蘇恭始以紫參牡蒙為二物謂紫參葉似羊蹄王孫葉似及已但古方所用牡蒙皆為紫參後人所用牡蒙乃王孫非紫參也不可不辨唐𤣥宗時隠民姜撫上言終南山有旱藕餌之延年状類葛粉帝取作湯餅賜大臣右驍騎将軍甘守誠曰旱藕者牡蒙也方家乆不用撫易名以神之爾據此牡蒙乃王孫也葢紫參止治血證積聚瘧痢而王孫主五臓邪氣痺痛療百病之文自可推也蘇恭引小品方牡蒙所主之證乃紫參非王孫故今移附紫參之下根氣味苦平無毒普曰神農雷公苦無毒黄帝甘蔵器曰旱藕甘平無毒主治五臓邪氣寒濕痺四肢疼酸膝冷痛本經療百病益氣别録旱藕主長生不饑黑毛髪藏器紫草本經中品釋名紫丹别録紫芺音襖茈䓞廣雅音紫戾藐爾雅音邈地血吴普鴉衘草時珍曰此草花紫根紫可以染紫故名爾雅作茈草徭獞人呼為鴉衘草集解别録曰紫草生碭山山谷及楚地三月采根隂乾𢎞景曰今出襄陽多從南陽新野來彼人種之即是今染紫者方藥都不復用博物志云平氏陽山紫草特好魏國者染色殊黒比年東山亦種之色小淺於北者恭曰所在皆有人家或種之苗似蘭香莖赤節青二月開花紫白色結實白色秋月熟時珍曰種紫草三月逐壟下子九月子熟時刈草春社前後采根隂乾其根頭有白毛如葺未花時采則根色鮮明花過時采則根色黯惡采時以石壓扁曝乾收時忌人溺及驢馬糞并烟氣皆令草黄色根修治斆曰凡使毎一斤用蠟二兩溶水拌蒸之待水乾取去頭并兩畔髭細剉用氣味苦寒無毒權曰甘平元素曰苦温時珍曰甘鹹寒入手足厥隂經主治心腹邪氣五疳補中益氣利九竅本經通水道療腫脹滿痛以合膏療小兒瘡及面皶别録治惡瘡瘑癬甄權治斑疹痘毒活血涼血利大腸時珍發明頌曰紫草古方稀用今醫家多用治傷寒時疾發瘡疹不出者以此作藥使其發出韋宙獨行方治豌豆瘡煑紫草湯飲後人相承用之其效尤速時珍曰紫草味甘鹹而氣寒入心包絡及肝經血分其功長於涼血活血利大小腸故痘疹欲出未出血熱毒盛大便閉濇者宜用之已出而紫黑便閉者亦可用若已出而紅活及白陷大便利者切宜忌之故楊士瀛直指方云紫草治痘能導大便使發出亦輕得木香白木佐之尤為有益又曽世榮活幼新書云紫草性寒小兒脾氣實者猶可用脾氣虚者反能作瀉古方惟用葺取其初得陽氣以類觸類所以用發痘瘡今人不逹此理一概論之非也附方舊二新六消解痘毒紫草一錢陳皮五分葱白三寸新汲水煎服直指方癭童疹痘三四日隠隠将出未出色赤便閉者紫草二兩剉以百沸湯一盞泡封勿泄氣待温時服半合其瘡雖出亦輕大便利者勿用煎服亦可經騐後方痘毒黑疔紫草三錢雄黄一錢為末以胭脂汁調銀簮挑破㸃之極妙集簡方癰疽便閉紫草栝樓實等分新水煎服直指方小兒白秃紫草煎汁塗之聖惠方小便卒淋紫草一兩為末毎食前用井華水服二錢千金翼産後淋瀝方同上産寳惡蟲咬人紫草煎油塗之聖惠方火黄身熱午後却凉身有赤㸃或黒㸃者不可治宜烙手足心背心百㑹下亷内服紫草湯紫草吴藍一兩木香及黄連一兩水煎服三十六黄方白頭翁本經下品釋名野丈人本經胡王使者本經柰何草别錄𢎞景曰處處有之近根處有白茸状似白頭老翁故以為名時珍曰大人胡使柰何皆状老翁之意集解别録曰白頭翁生嵩山山谷及田野四月采恭曰其葉似芍藥而大抽一莖莖頭一花紫色似木槿花實大者如雞子白毛寸餘皆披下似纛頭正似白頭老翁故名焉陶言近根有白茸似不識也太常所貯蔓生者乃是女萎其白頭翁根似續斷而扁保昇曰所在有之有細毛不滑澤花蕊黄二月采花四月采實八月采根皆日乾頌曰處處有之正月生苗作叢生状似白微而柔細稍長葉生莖頭如杏葉上有細白毛而不滑澤近根有白茸根紫色深如蔓菁其苗有風則静無風而搖與赤箭獨活同也陶註未述莖葉蘇註言葉似芍藥實如雞子白毛寸餘者皆誤矣宗奭曰白頭翁生河南洛陽界其新安山野中屢嘗見之正如蘇恭所説至今本處山中及人賣白頭翁丸言服之夀考不失古人命名之義陶氏所說失於不審宜其排叱也機曰寇宗奭以蘇恭為是蘇頌以陶說為是大抵此物用根命名取像當准蘇頌圖經而恭說恐别是一物也根氣味苦温無毒别録曰有毒吴綬曰苦辛寒權曰甘苦有小毒豚實為之使大明曰得酒良花子莖葉同主治温瘧狂􅀈寒熱癥瘕積聚癭氣逐血止腹痛療金瘡本經鼻衂别録止毒痢𢎞景赤痢腹痛齒痛百節骨痛項下瘤癧甄權一切風氣暖腰膝明目消贅大明發明頌曰俗醫合補下藥甚驗亦衝人杲曰氣厚味薄可升可降隂中陽也張仲景治熱痢下重用白頭翁湯主之葢腎欲堅急食苦以堅之痢則下焦虚故以純苦之劑堅之男子隂疝偏墜小兒頭秃氊腥鼻衂無此不效毒痢有此獲功吴綬曰熱毒下痢紫血鮮血者宜之附方舊二新三白頭翁湯治熱痢下重用白頭翁二兩黄連黄蘗秦皮各三兩水七升煑二升每服一升不愈更服婦人産後痢虚極者加甘草阿膠各二兩仲景金匱王函方下痢咽腫春夏病此宜用白頭翁黄連各一兩末香二兩水五升煎一升半分三服聖惠方隂㿗偏腫白頭翁根生者不限多少搗傅腫處一宿當作瘡二十日愈外臺秘要外痔腫痛白頭翁草一名野丈人以根搗塗之逐血止痛衛生易簡方小兒秃瘡白頭翁根搗傅一宿作瘡半月愈肘後方花主治瘧疾寒熱白秃頭瘡時珍白及本經下品校正併入别録白給釋名連及草本經甘根本經白給時珍曰其根白色連及而生故曰白及其味苦而曰甘根反言也吴普作白根其根有白亦通金光明經謂之罔達羅喝悉多又别録有名未用白給即白及也性味功用皆同係重出今併為一集解别録曰白及生北山川谷及寃句及越山又曰白給生山谷葉如藜蘆根白相連九月采普曰莖葉如生薑藜蘆十月花直上紫赤色根白連二月八月九月采𢎞景曰近道處處有之葉似杜若形根似菱米節間有毛方用亦稀可以作糊保昇曰今出申州葉似初生椶苗葉及藜蘆三四月抽出一薹開紫花七月實熟黄黒色冬凋根似菱有三角白色角頭生芽八月采根用頌曰今江淮河陜漢黔諸州皆有之生石山上春生苗長一尺許葉似栟櫚兩指大青色夏開紫花二月七月采根時珍曰韓保昇所説形状正是但一科止抽一莖開花長寸許紅紫色中心如舌其根如菱米有臍如鳬茈之臍又如扁殻螺旋紋性難乾根氣味苦平無毒别録曰辛微寒白給辛平無毒普曰神農苦黄帝辛李當之大寒雷公辛無毒大明曰甘辛杲曰苦甘微寒性濇陽中之隂也之才曰紫石英為之使惡理石畏李核杏仁反烏頭主治癰腫惡瘡敗疽傷隂死肌胃中邪氣賊風鬼擊痱緩不收本經除白癬疥蟲結熱不消隂下痿面上皯皰令人肌滑甄權止驚邪血邪血痢癎疾風痺赤眼癥結温熱瘧疾發背瘰癧腸風痔瘻撲損刀箭瘡湯火瘡生肌止痛大明止肺血李杲白給主伏蟲白㿅腫痛别録發明恭曰山野人患手足皸拆者嚼以塗之有效為其性粘也頌曰今醫家治金瘡不瘥及癰疽方多用之震亨曰凡吐血不止宜加白及時珍曰白及性濇而收得秋金之令故能入肺止血生肌治瘡也按洪邁夷堅志云台州獄吏憫一大囚囚感之因言吾七次犯死罪遭訊拷肺皆損傷至于嘔血人𫝊一方只用白及為末米飲日服其效如神後其囚凌遲劊者剖其胸見肺間竅穴數十處皆白及填補色猶不變也洪貫之聞其説赴任洋州一卒忽苦咯血甚危用此救之一日即止也摘𤣥云試血法吐在水盌内浮者肺血也沉者肝血也半浮半沉者心血也各隨所見以羊肺羊肝羊心煑熟蘸白及末日日食之附方舊一新八鼻衂不止津調白及末塗山根上仍以水服一錢立止經驗方心氣疼痛白及石榴皮各二錢為末煉蜜丸黄豆大毎服三丸艾醋湯下生生編重舌鵝口白及末乳汁調塗足心聖惠方婦人隂脫白及川烏頭等分為末絹裹一錢納隂中入三寸腹内熱即止日用一次廣濟方疔瘡腫毒白及末半錢以水澄之去水攤於厚紙上貼之方袖珍打跌骨折酒調白及末二錢服其功不減自然銅古銖錢也永類方刀斧傷損白及石膏煆等分為末摻之亦可收口濟急方手足皸裂白及末水調塞之勿犯水方濟急湯火傷灼白及末油調傅之趙真人方三七綱目釋名山漆綱目金不换時珍曰彼人言其葉左三右四故名三七葢恐不然或云本名山漆謂其能合金瘡如漆粘物也此説近之金不换貴重之稱也集解時珍曰生廣西南丹諸州番峒深山中采根暴乾黄黑色團結者状畧似白及長者如老乾地黄有節味微甘而苦頗似人參之味或云試法以末摻猪血中血化為水者乃真近傳一種草春生苗夏髙三四尺葉似菊艾而勁厚有岐尖莖有赤稜夏秋開黄花蕊如金絲盤紐可愛而氣不香花乾則吐絮如苦蕒絮根葉味甘治金瘡折傷出血及上下血病甚效云是三七而根大如牛蒡根與南中來者不類恐是劉寄奴之屬甚易繁衍根氣味甘微苦温無毒主治止血散血定痛金刃箭傷跌撲杖瘡血出不止者嚼爛塗或為末摻之其血即止亦主吐血衂血下血血痢崩中經水不止産後惡血不下血運血痛赤目癰腫虎咬蛇傷諸病時珍發明時珍曰此藥近時始出南人軍中用為金瘡要藥云有竒功又云凡杖撲傷損瘀血淋漓者隨嚼爛罨之即止青腫者即消散若受杖時先服一二錢則血不衝心杖後尤宜服之産後服亦良大抵此藥氣温味甘微苦乃陽明厥隂血分之藥故能治一切血病與麒麟竭紫釧相同附方新八吐血衂血山漆一錢自嚼米湯送下或以五分加入八核湯瀕湖集簡方赤痢血痢三七三錢研末米泔水調服即愈同上大腸下血三七研末同淡白酒調一二錢服三服可愈加五分入四物湯亦可同上婦人血崩方同上産後血多山漆研末米湯服一錢同上男婦赤眼十分重者以山漆根磨汁塗四圍甚妙同上無名癰腫疼痛不止山漆磨米醋調塗即散已破者研末乾塗虎咬蛇傷山漆研末米飲服三錢仍嚼塗之並同上葉主治折傷跌撲出血傅之即止青腫經夜即散餘功同根時珍本草綱目卷十二下
