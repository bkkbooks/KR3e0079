body:
  text: 本草綱目卷七目錄土部李時珍曰土者五行之主坤之體也具五色而以黄為正色具五味而以甘為正味是以禹貢辨九州之土色周官辨十有二壤之土性蓋其為徳至柔而剛至靜有常兼五行生萬物而不與其能坤之徳其至矣哉在人則脾胃應之故諸土入藥皆取其禆助戊巳之功今集土屬六十一種為土部舊本三十九種散見玉石部神農本經二種梁陶𢎞景註名醫别錄三種梁陶𢎞景唐本草三種唐蘇恭本草拾遺二十八種唐陳藏器四聲本草一種唐蕭炳開寳本草一種宋馬志證類本草一種宋唐慎微衍義補遺一種元朱震亨本草綱目二十一種明李時珍附註魏李當之藥錄齊徐之才藥對吳普本草性宋雷斆炮炙唐甄權藥孫思邈千金唐楊損之刪繁宋掌禹錫補註李珣海藥蘇頌圗經蜀韓保昇重註大明日華宋冦宗奭衍義元王好古湯液金張元素珍珠囊明汪機㑹編元李杲法象陳嘉謨䝉筌土凡六十一種白堊本經甘土拾遺赤土拾遺黄土拾遺東壁土别錄太陽土綱目清天星土六癸上土上壬日土明戌上土神后土附天子藉田三推犁下土拾遺家社稷壇土春牛土富土亭部中土附道中熱土拾遺車輦土拾遺市門土拾遺戸限下土拾遺千歩峯綱目鞋底下土拾遺柱下土拾遺牀脚下土拾遺燒尸塲上土綱目塚上土拾遺桑根下土拾遺胡燕窠土拾遺百舌窠中土拾遺土蜂窠拾遺蜣螂轉丸拾遺鬼屎拾遺鼠壤土拾遺鼢鼠壤土拾遺屋内壖下蟲塵土拾遺蟻垤土拾遺白蟻泥綱目蚯蚓泥綱目螺螄泥綱目白鱓泥綱目豬槽上垢土拾遺犬尿泥綱目驢尿泥拾遺尿坑泥綱目糞坑底泥綱目簷溜下泥綱目田中泥綱目井底泥證類烏爹泥綱目彈丸土拾遺自然灰拾遺伏龍肝别錄土墼綱目甘鍋綱目砂鍋綱目白瓷器唐本烏古瓦唐本古磚拾遺煙膠綱目墨開寳釡臍墨四聲百草霜綱目梁上塵唐本門臼塵綱目寡婦牀頭塵土拾遺瓷甌中白灰拾遺香罏火綱目鍛竈灰别錄冬灰本經石鹼補遺右附方舊五十六新一百七十五本草綱目卷七目録
