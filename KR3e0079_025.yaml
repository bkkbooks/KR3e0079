body:
  text: 本草綱目卷七目録土部李時珍曰土者五行之主坤之體也具五色而以黃為正色具五味而以甘為正味是以禹貢辨九州之土色周官辨十有二壤之土性蓋其為德至柔而剛至靜有常兼五行生萬物而不與其能坤之德其至矣哉在人則脾胃應之故諸土入藥皆取其禆助戊巳之功今集土屬六十一種為土部舊本三十九種散見玉石部神農本經二種梁陶𢎞景注名醫别録三種梁陶𢎞景唐本草三種唐蘇恭本草拾遺二十八種唐陳藏器四聲本草一種唐蕭炳開寶本草一種宋馬志證類本草一種宋唐慎微衍義補遺一種元朱震亨本草綱目二十一種明李時珍附注魏李當之藥録齊徐之才藥對吳普本草性宋雷斆炮炙唐甄權藥孫思邈千金唐楊損之刪繁宋掌禹錫補注李珣海藥蘇頌圗經蜀韓保升重注大明日華宋冦宗奭衍義元王好古湯液金張元素珍珠囊明汪機會編元李杲法象陳嘉謨蒙筌土凡六十一種白堊本經甘土拾遺赤土拾遺黃土拾遺東壁土别録太陽土綱目清天星土六癸上土上壬日土明戌上土神后土附天子藉田三推犁下土拾遺家社稷壇土春牛土富土亭部中土附道中熱土拾遺車輦土拾遺市門土拾遺戶限下土拾遺千步峯綱目鞋底下土拾遺柱下土拾遺牀腳下土拾遺燒尸場上土綱目冢上土拾遺桑根下土拾遺胡燕窠土拾遺百舌窠中土拾遺土蜂窠拾遺蜣螂轉丸拾遺鬼屎拾遺鼠壤土拾遺蚡鼠壤土拾遺屋內壖下蟲塵土拾遺蟻垤土拾遺白蟻泥綱目蚯蚓泥綱目螺螄泥綱目白鱓泥綱目豬槽上垢土拾遺犬尿泥綱目驢尿泥拾遺尿坑泥綱目糞坑底泥綱目簷溜下泥綱目田中泥綱目井底泥證類烏爹泥綱目彈丸土拾遺自然灰拾遺伏龍肝别録土墼綱目甘鍋綱目砂鍋綱目白瓷器唐本烏古瓦唐本古磚拾遺煙膠綱目墨開寶釡臍墨四聲百草霜綱目梁上塵唐本門臼塵綱目寡婦牀頭塵土拾遺瓷甌中白灰拾遺香罏火綱目鍛竈灰别録冬灰本經石鹼補遺右附方舊五十六新一百七十五本草綱目卷七目録
