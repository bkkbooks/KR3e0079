  text: 本草綱目卷九目録金石之三石類上三十二種丹砂本經水銀本經水銀粉嘉祐粉即輕粉霜綱目銀朱綱目靈砂證類雄黄本經雌黄本經石膏本經石即寒水石附玉火龍石膏理石本經附白肌石長石本經方解石别録滑石本經不灰木開寳附松石五色石脂本經桃花石唐本爐甘石綱目井泉石嘉祐無名異開寳蜜栗子綱目石鍾乳本經孔公孽本經殷孽本經石石骨石牀花附土殷孽别録石腦别録石髓拾遺石腦油嘉祐附地溲石炭綱目附然石石灰本經石麫綱目浮石日華附暈石石芝綱目右附方舊六十九新三百一十七本草綱目卷九目錄
