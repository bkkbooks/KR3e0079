body:
  text: 本草綱目卷四目録百病主治藥下痛風頭痛眩運眼目耳面鼻唇口舌咽喉音聲牙齒鬚髪胡臭丹毒風瘙疹疿癧瘍癜風癭瘤疣痣瘰九漏癰疽諸瘡上下外傷諸瘡漆瘡凍瘡湯火皴裂炙瘡金鏃竹木傷跌仆折傷腸出杖瘡五絶縊死凍死溺死驚死壓死諸蟲傷蛇虺蠶蛓蜈蚣蚯蚓蜂蠆蝸牛蜘蛛射工蠼螋沙虱蛭除螻蛄蟲蟻辟諸蠅蚰蜒諸獸傷虎狼驢馬熊羆猪猫咬犬猘鼠咬人諸毒金石蟲魚草木禽獸果菜蠱毒諸物哽咽婦人經水帶下崩中漏下月水不止五十行經胎前子煩胎啼産難死胎生胎産後下乳斷産回乳隂病隂寒隂脱隂吹不隂腫痛門隂痒隂蝕産門合産生合小兒初生諸病沐浴無皮解毒目閉便閉血眼不啼腎縮不乳解吐乳𩕄䧟𩕄腫流涎項耎夜啼龜背臍腫語遲臍風行遲驚癎諸疳痘瘡本草綱目卷四目錄
