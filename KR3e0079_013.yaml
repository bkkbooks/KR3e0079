暑濕燥火發病多在上地之六氣霧露雨雪水泥發病多在乎下人之六味酸苦甘辛鹹淡發病多在乎中發病者三出病者亦三風寒之邪結搏于皮膚之間滯于經絡之內留而不去或發痛注麻痺腫癢拘攣皆可汗而出之痰飲宿食在胸膈為諸病皆可涌而出之寒濕固冷火熱客下焦發為諸病皆可泄而出之吐中有汗下中有補經云知其要者一言而終是之謂也吐法凡病在胸膈中脘已上者皆宜吐之考之本草吐藥之苦寒者瓜蒂巵子茶末豆䜴黃連苦參大黃黃芩辛苦而寒者常山藜蘆欎金甘而寒者桐油甘而溫者牛肉甘苦而寒者地黃人參蘆苦而溫者青木香桔梗蘆逺志厚朴辛苦而溫者薄荷芫花菘蘿辛而溫者蘿蔔子穀精草蔥根鬚杜衡皂莢辛而寒者膽礬石緑石青辛而溫者蝎稍烏梅烏頭附子尖輕粉酸而寒者晉礬緑礬虀汁酸而平者銅緑井酸而平者赤小豆酸而溫者飯漿醎而寒者青鹽滄鹽白米飲甘而寒者牙消辛而熱者砒石諸藥惟常山膽礬瓜蒂有小毒藜蘆芫花烏附砒石冇大毒他皆吐藥之無毒者凡用法先宜少服不涌漸加之仍以雞羽撩之不出以虀投之不吐再投且投且探無不吐者吐至瞑眩慎勿驚疑但飲氷水新水立解強者可一吐而安弱者作三次吐之吐之次日有頓快者有轉甚者引之未盡也俟數日再吐之吐後不禁物惟忌飽食酸醎硬物乾物油肥之物吐後心火既降隂道必強大禁房室悲憂病人既不自責必歸罪于吐法也不可吐者有八性剛暴好怒喜淫者病勢已危老弱氣衰者自吐不止者陽敗血虗者吐血咯血衄血嗽血崩血溺血者病人粗知醫書不辨邪正者病人無正性反復不定者左右多嘈雜之言者皆不可吐吐則轉生他病反起謗端雖懇切求之不可強從也汗法風寒暑濕之邪入于皮膚之間而未深欲速去之莫如發汗所以開玄府而遂邪氣也然有數法有溫熱發汗寒涼發汗薰漬發汗導引發汗皆所以開玄府而逐邪氣也以本草校之荆芥薄荷白芷陳皮半夏細辛蒼术天麻生薑蔥白皆辛而溫者也蜀椒胡椒茱茰大蒜皆辛而熱者也青皮防己秦艽其辛而平者乎麻黃人參大棗其甘而溫者乎葛根赤茯苓其甘而平者乎桑白皮其甘而寒者乎防風當歸其甘辛而溫者乎官桂桂枝其甘辛而大熱者乎厚朴桔梗其苦而溫者乎黃芩知母枳實苦參地骨皮柴胡前胡其苦而寒者乎羌活獨活其苦辛而微溫者乎升麻其苦甘且平者乎芍藥其酸而微寒者乎浮萍其辛酸而寒者乎凡此皆發散之屬也善擇者當熱而熱當寒而寒不善擇者反此則病有變也發汗中病則止不必盡劑凡破傷風小兒驚風飱泄不止酒病火病皆宜汗之所謂火欎則發之也下法積聚陳莝于中留結寒熱于內必用下之陳莝去而腸胃潔癥瘕盡而營衛通下之者所以補之也庸工妄投當寒反熱當熱反寒故謂下為害也考以本草下之寒者戎鹹之醎犀角之酸醎滄鹽澤㵼之甘醎枳實之苦酸膩粉之辛澤漆之苦辛杏仁之苦甘下之微寒者豬膽之苦下之大寒者牙消之甘大黃牽牛瓜蒂苦瓠牛膽藍汁羊蹄根苗之苦大戟甘遂之苦甘朴消􅉭消之苦醎下之溫者檳榔之辛芫花之苦辛石蜜之甘皂角之辛醎下之熱者巴豆之辛下之涼者豬羊血之醎下之平者郁李仁之酸桃花之苦皆下藥也惟巴豆性熱非寒積不可輕用妄下則使人津液涸竭留毒不去胸熱口燥轉生他病也其不可下者凡四洞泄寒中者表裏俱虗者厥而唇青手足冷者小兒病後慢驚者誤下必致殺人其餘大積大聚大痞大祕大燥大堅非下不可但須寒熱積氣用之中病則止不必盡劑也病有八要六失六不治注見神農名例藥對歲物藥品立冬之日菊卷柏先生為陽起石桑螵蛸使凡十物使主二百草為之長立春之日木蘭射干為柴胡半夏使主頭痛四十五節立夏之日蜚蠊先生為人參茯苓使主腹中七節保神守中夏至之日豕首茱茰先生為牡蠣烏喙使主四肢三十二節立秋之日白芷防風先生為細辛蜀漆使主胸背二十四節禹錫曰五條出藥對中義旨淵深非俗所究而是主統之本故載之時珍曰此亦素問歲物之意出上古雷公藥對中而義不傳爾按楊慎巵言云白字本草相傳出自神農今觀其中如腸鳴幽幽勞極灑灑髮髲仍自還神化及此五條文近素問決非後世醫所能為也此文以立冬日為始則上古以建子為正也神農本草經目録時珍曰神農古本草凡三卷三品共三百六十五種首有名例數條至陶氏作别録乃拆分各部而三品亦移改又拆出青葙赤小豆二條故有三百六十七種逮乎唐宋屢經變易舊制莫考今又併入已多故存此目以備考古云耳上品藥一百二十種丹砂礬石雲母消石玉泉朴消石鍾乳滑石空青英白石曾青英紫石禹餘糧脂五色石太一餘糧菖蒲菊花黃乾地人參术天門冬兔絲子甘草牛膝茺蔚子獨活女萎子車前防葵木香麥門冬薯預薏苡仁細辛澤㵼石斛逺志戟巴天龍膽白英白蒿蓍實赤箭赤芝菴䕡子黑芝菥蓂子青芝白芝藍實黃芝蘼蕪紫芝黃連卷柏絡石蒺藜子蒲黃黃茋香蒲肉蓯蓉續斷防風漏蘆天名精五味子決明子旋花丹參蘭草飛亷子蛇牀地膚子沙參景天卿徐長茵陳蒿石龍芻杜若雲實王不留行槐實牡桂枸杞菌桂橘柚松脂柏實茯苓實蔓荆榆皮辛夷酸棗杜仲乾漆寄生桑上女貞實葡蔔㽔核蓬藟藕實莖雞頭實大棗胡麻麻蕡苦菜冬葵子龍骨莧實麝香白冬子熊脂白膠蜜蠟阿膠牡蠣石蜜龜甲蜂子蛸桑螵中品藥一百二十種雄黃石膏雌黃磁石石硫黃凝水石水銀石陽起理石扁青長石膚青石膽乾薑白青實葈耳葛根芎藭栝樓當歸苦參麻黃茈胡通草芍藥秦芁蠡實百合瞿麥知母玄參貝母白芷茅根淫羊藿紫菀黃芩紫草石龍芮茜根敗醬藁本白鮮皮狗脊酸漿萆薢紫參藿白兔營實水萍白薇王瓜薇銜地榆翹根海藻澤蘭石韋防己蒿馬先牡丹草積雪欵冬花女菀王孫竹葉蜀羊泉蘗木爵牀茰吳茱巵子白皮桑根蕪荑秦椒枳實茰山茱厚朴紫葳秦皮豬苓白棘矛衛下龍眼合歡木蘭披子五加皮梅實桃核仁薤杏核仁假蘇蓼實水蘇蔥實水斳髮髲角羖羊白馬莖莖牡狗隂鹿茸角羚羊牛角鰓犀角牛黃鴈肪豚卵鱉甲麋脂甲鮀魚丹雄雞蠡魚鯉魚膽石龍子烏賊魚骨露蜂房海蛤蚱蟬文蛤蠶白殭下品藥一百二十五種孔公蘗鐡殷蘗鉛丹鐵粉粉錫鐵落鼻錫鏡代赭玕青琅戎鹽礜石大鹽石灰鹵鹽白堊冬灰半夏附子虎掌烏頭鳶尾天雄大黃葶藶花旋覆桔梗藜蘆莨菪子鈎吻草蒿射干蛇含白斂常山子青葙蜀漆雚菌甘遂白及大戟蕘花澤漆牙子茵芋躅羊躑貫衆芫花姑活萹蓄别羈狼毒商陸鬼臼羊蹄翁白頭羊桃䕡茹女青烏韭連翹鹿藿石下長卿蚤休石長生夏枯草陸英屈草藎草巴豆牛扁蜀椒皂莢莽草栁花雷丸楝實皮梓白郁李仁桐葉石南松蘿黃環根藥實溲疏蔓椒鼠李欒花淮木苦瓠大豆黃卷甲腐婢屎六畜毛蹄燕瓜蒂屎天鼠鼺鼠蟹伏翼蛇蛻蝦蟇猬皮馬刀蠮螉蜣螂石蠶蛞蝓雀甕白頸蚯蚓樗雞蠐螬斑貓螻蛄熒火蜈蚣衣魚馬陸鼠婦地膽水蛭木虻貝子蜚虻蜚蠊蟅蟲宋本草舊目録李時珍曰舊目不録可也録之所以存古迹也又以見三品之沮亂不必泥古也新舊藥合一千八十二種三百六十種神農本經白字一百八十二種名醫别録墨字一百一十四種唐本先附一百三十三種今附開寶所附一百九十四種有名未用八十二種新補一十七種新定已上皆宋嘉祐本草所定者四百八十八種陳藏器餘二種唐本餘一十三種海藥餘八種食療餘一百種圖經外類已上皆唐愼微續收補入者玉石部上品七十三種下品九十三種中品八十七種草部上品之上八十七種中品之上六十二種上品之下五十三種中品之下七十八種下品之上六十二種下品之下一百五種木部上品七十二種下品九十九種中品九十二種人部三品二十五種獸部上品二十種種下品二十一中品一十七種禽部三品五十六種蟲魚部上品五十種種下品八十一中品五十六種果部三品五十二種米榖部上品七種八種下品一十中品二十三種菜部上品三十種種下品二十二中品一十三種有名未用一百九十四種圖經外類一百種本草綱目卷二
