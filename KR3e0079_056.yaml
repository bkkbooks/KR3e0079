body:
  text: 本草綱目卷二十一目録草之十苔類十六種內附五種陟釐别録乾苔食療井中苔别録船底苔食療石蘂拾遺地衣日華皮即仰天垣衣别録屋遊别録昨葉何草唐本紫即瓦松衣附烏韭本草附百蘂草土馬騣嘉祐卷柏本經草地柏含生附玉柏别録石松拾遺桑花日華附艾納馬勃别録右附方舊三新三十三草之十一雜草及有名未用共一百五十三種雜草九種百草拾遺百草花拾遺井口邊草拾遺樹孔中草綱目産死婦人冢上草拾遺燕蓐草嘉祐雞窠草嘉祐豬窠草大明牛齝草見獸部牛下神農本經二種名以下俱有未用屈草别羇名醫别録七十八種離婁草神護草黃護草雀醫草本甘草益決草九熟草兊耳異草灌草䒻草莘草英草封華㥏華節華讓實羊實桑莖實可聚實蒲隂實馬顛馬逢兔棗鹿良雞涅犀洛雀梅燕齒土齒金莖白背青雌白辛赤舉赤涅赤赫黃秫黃辨紫給紫藍糞藍巴朱柴紫文石路石曠石敗石石劇石藝竹付祕惡盧精唐夷知杖河煎區余王明師絲并苦索千良達戈共船虹姑活白女腸白扇根黃白支父陛根疥拍腹五母麻五色符救赦人者常吏之生載慶腂芥本草拾遺一十三種鴆鳥漿七仙草缺吉祥草雞腳草兔肝草斷罐草千金䥶土落草倚待草藥王草筋子根廅藥無風獨搖草海藥本草一種宜南草開寶本草一種陀得花圖經外類二十種建水草百藥祖催風使刺虎石逍遙黃寮郎黃花子百兩金地茄子田母草田麻芥心草苦芥子布里草茆質汙胡堇草小兒羣獨腳仙撮石合草露筋草本草綱目三十八種九龍草荔枝草水銀草透骨草蛇痕草鵝項草蛇魚草九里香草白延草環腸草劄耳草銅鼓草蠶繭草野芕草纎霞草牛脂艻鴨腳青天仙蓮雙頭蓮豬藍子天芥菜佛掌花郭公刺籩箕柴碎米柴羊屎柴山枇杷柴三角風葉下紅滿江紅隔山消石見穿醉醒草墓頭回羊茅阿兒只阿息兒奴哥撒兒本草綱目卷二十一目録
