body:
  text: 本草綱目卷五十上明李時珍撰獸之一畜類二十八種附七種豕本經下品釋名猪本經豚同上豭音加彘音滯豶音墳時珍曰説文豕字象毛足而後有尾林氏小説云豕食不潔故謂之豕坎為豕水畜而性趨下也牡曰豭曰牙牝曰彘曰豝曰䝏牡去勢曰豶四蹄白曰􅘻豬髙五尺曰􅙊豕之子曰豬曰豚曰豰一子曰特二子曰師三子曰豵末子曰么生三月曰豯六月曰䝋何承天纂文云梁州曰䝕河南曰彘吳楚曰豨漁陽以大豬為豝齊徐以小豬為䝒頌曰揚雄曰燕朝鮮謂豬為豭闗東謂之彘南楚曰豨吳揚曰豬其實一種也禮記謂之剛鬛崔豹古今注謂之㕘軍集解頌曰凡豬骨細筋多髙大有重百餘斤食物至寡甚易畜養之甚易生息時珍曰豬天下畜之而各有不同生青兖徐淮者耳大生燕冀者皮厚生梁雍者足短生遼東者頭白生豫州者味短生江南者耳小謂之江豬生嶺南者白而極肥豬孕四月而生在畜屬水在卦屬坎在禽應室星豭豬肉氣味酸冷無毒凡豬肉苦㣲寒有小毒江豬肉酸平有小毒豚肉辛平有小毒别録曰豭豬肉治疾凡豬肉能閉血脉弱筋骨虚人肌不可久食病人金瘡者尤甚思邈曰他豬肉久食令人少子精發宿病豚肉久食令人徧體筋肉碎痛乏氣江豬多食令人體重作脯少有腥氣詵曰久食殺藥動風發疾傷寒瘧疾痰痼痔漏諸疾食之必再發時珍曰北豬味薄煮之汁清南豬味厚煮之汁濃毒尤甚入藥用純黒豭豬凡白豬花豬􅘻豬牝豬病豬黄臕豬米豬並不可食黄臕煑之汁黄米豬肉中有米説文豕食于星下則生息米周禮豕盲視而交睫者星皆指此也令反烏梅桔梗黄連胡黄連犯之令人瀉利及蒼耳人動風合生薑食生面䵟發風合蕎麥食落毛髪患風病合葵菜食少氣合百花菜吴茱萸食發痔疾合胡荽食爛人臍合牛肉食生蟲合羊肝雞子鯽魚豆黄食滯氣合龜鼈肉食傷人凡煮豬肉得皂莢子桑白皮髙良薑黄蠟不發風氣得舊籬篾易熟也主治療狂病久不愈别録壓丹石解熱毒宜肥熱人食之拾遺補腎氣虚竭千金療水銀風并中土坑惡氣日華發明時珍曰按錢乙法小兒疳病麝香丸以豬膽和丸豬肝湯服疳渴者以豬肉湯或燖豬湯服其意盖以豬屬水而氣寒能去火熱耶虚𢎞景曰豬為用最多惟肉不宜多食令人暴肥盖風所致也震亨曰豬肉補氣世俗以為補誤矣惟補陽爾今之虛損者不在陽而在隂以肉補隂是以火濟水盖肉性入胃便作濕熱熱生痰痰生則氣不降而諸證作矣諺云豬不薑食之發大風中年血氣衰面發黒䵟也韓􅐂曰凡肉有補惟豬肉無補人習之化也附方舊五新十五禁口痢疾臘肉脯煨熟食之炒李樓竒方小兒刮腸痢疾禁口閉目至重者精豬肉一兩薄切炙香以膩粉末半錢鋪上令食或置鼻頭聞香自然要食也活幼口議上氣欬嗽煩滿用猪肉切作鎚子豬脂煎熟食之心鏡浮腫脹滿不食用豬脊肉一雙切生以蒜薤食之心鏡身腫攻心用生豬肉以漿水洗壓乾切膾蒜薤啖之一日三次下氣去風乃外國方也張文仲方破傷風腫新殺豬肉乗熱割片貼患處連換三片其腫立消簡便白虎風病用豬肉三串以大麻子一合酒半盞相和口含噀上将肉擘向病處呪曰相州張如意張得興是汝白虎本師急出乃安肉于床下瘥則送于路神驗近效風狂歌笑行走不休用豭豬一斤煮熟切膾和醬食或羮粥炒任服之食醤心鏡解丹石毒發熱困篤用肥豬肉五斤葱薤半斤煮食或作臛食必腹鳴毒下以水淘之沙石盡則愈千金翼解鍾乳毒下利不止食豬肉則愈千金翼服石英法白石英一斤袋盛水三斗煎四丹以豬肉一斤鹽䜴煮食一日一作同上傷損不食凡打撲傷損三五日水食不入口用生豬肉二大錢打爛温水洗去血水再擂爛以隂陽湯打和以半錢用鷄毛送入咽内却以隂陽湯灌下之其食蟲聞香􅀢開瘀血而上胸中自然開解此乃損血凝聚心間蟲食血飽他物蟲不来探故也謂之騙通之法邵氏打傷青腫炙豬肉榻之千金小兒重舌取三家屠肉切指大摩舌上立啼千金方小兒痘瘡豬肉煮汁洗之譚氏方小兒火丹豬肉切片貼之漆瘡作癢宜啖豬肉嚼穄穀塗之千金男女隂蝕肥豬肉煮汁洗不過二十斤瘥金千方山行辟蛭山中草木枝上有石蛭着人足則穿肌入肉中害人但以蠟豬膏和鹽塗足脛趾即不着人也千金方竹刺入肉多年燻肉切片包之即出救急方豭豬頭肉已下並用豭豬者良豶豬亦可氣味有毒時珍曰按生生編云豬肉毒惟在首故有病者食之生風發疾主治寒熱五癃鬼毒千金同五味煮食補虛乏氣力去驚癎五痔下丹石亦發風氣食療臘豬頭燒灰治魚臍瘡發明時珍曰按名醫錄云學究任道病體瘡腫黒状狹而長北醫王通曰此魚臍瘡也一因風毒藴結二因氣血凝滯三因誤食人汗而然乃以一異散敷之日數易而愈懇求其方曰但雪𤣥一味耳任遍訪四方無知之者有名醫郝允曰聖恵方治此用臘豬頭燒灰鷄卵白調傅即此也又圖纂云五月戊辰日以豬頭祀竈所求如意以臘豬耳懸梁上令人豐足此亦厭禳之物也項肉俗名槽頭肉肥脆能動風主治酒積面黄腹脹以一兩切如泥合甘遂末一錢作丸紙裹煨香食之酒下當利出酒布袋也時珍濟出普脂膏修治時珍曰凡凝者為肪為脂釋者為膏為油臘月煉净收用恭曰十二月上亥日取入新瓶埋亥地百日用之名膒脂毎升入鷄子白十四枚更良𢎞景曰勿令中水臘月者厯年不壊項下膏謂之負革肪入道家煉五金用氣味甘㣲寒無毒反烏梅梅子主治煎膏藥解斑蝥芫青毒别録解地膽亭長野葛硫黄毒諸肝毒利腸胃通小便除五疸水腫生毛髪時珍破冷結散宿血孫思邈利血脉散風熱潤肺入膏藥主諸瘡蘇頌殺蟲治皮膚風塗惡瘡日華治癰疽蘇恭悦皮膚作手膏不皸裂陶宏景胎産衣不下以酒多服佳徐之才鬐膏生髪恱面别録附方舊五新二千八傷寒時氣豬膏如彈丸温水化服日三次肘后方五種疸疾黄疸轂疸酒疸黒疸女勞疸黄汗如黄蘗汁用豬脂一斤温熱服日三當利乃愈肘后方赤白帶下煉豬脂三合酒五合煎沸頓服千金方小便不通豬脂一斤水二升煎三沸飲之立通千金方闗格閉塞豬脂薑汁各二升㣲火煎至二升下酒五合和煎分服千金痘瘡便秘四五日用肥豬臕一塊水煑熟切如豆大與食自然蔵府滋潤痂疕易落無損于兒仲陳文方卒中五尸仲景用豬脂一鷄子苦酒一升煑沸灌之肘后方中諸肝毒豬膏頓服一升千金方食髪成瘕心腹作痛咽間如有蟲上下嗜食與油者是也用豬脂二升酒三升煑三沸服日三次上氣欬嗽豬肪四兩煑百沸以来切和醤醋食之心鏡肺熱暴瘖豬脂油一斤煉過入白蜜一斤再煉少頃濾净冷定不時挑服一匙即愈無疾常服亦潤肺萬氏方小兒噤風小兒百日内風噤口中有物如蝸牛或如黄頭白蟲者薄豬肪擦之即消聖恵方小兒蚘病嬴瘦豬膏服之千金方産後虚汗豬膏姜汁白蜜各一升酒五合煎五上五下毎服方寸匕千金翼胞衣不下豬脂一兩水一盞煎五七沸服之當下聖恵方吹奶寒熱用豬肪冷水浸搨熱即易之立效子母秘錄髮落不生以酢泔洗净布揩令熱以臘豬脂入生鐵煑三沸塗之遍生千金翼冬月唇裂煉過豬脂日日塗之十便良方熱毒攻手腫痛欲脫豬膏和羊屎塗之外臺手足皴破豬脂着熱酒中洗乏千金方代指疼痛豬膏和白墡土傅之小品方口瘡塞咽用豬膏白蜜一斤黄連末一兩合煎取汁熬稠每服棗許日五服千金疥瘡有蟲豬膏煎芫花塗之肘后鼠瘻瘰􅊓用豬膏淹生地黄煑六七沸塗之漏瘡不合以紙粘臘豬脂納瘡中日五夜三千金翼漆瘡作痒豬膏頻塗之千金咽喉骨哽吞豬膏一團不瘥更吞之千金方身面疣目以豬脂揩之令血出少許神騐不可知千金誤吞鐵釘豬脂多食令飽自然裹出普濟方雜物入目豬脂煑取水面如油者仰卧去枕㸃鼻中不過數度與物俱出聖惠方蜈蚣入耳炙豬肪掩耳自出梅師蟲蟻入耳方法同上發背發乳豬脂切片冷水浸貼日易四五十片甚妙急救方腦氣味甘寒有毒時珍曰禮記云食豚去腦孫真人食忌云豬腦損男子陽道臨房不能行事酒後尤不可食延壽書云今人以鹽酒食豬腦是自引賊也主治風眩腦鳴凍瘡别録主癰腫塗紙上貼之乾則易治手足皸裂出血以酒化洗併塗之時珍附方新一喉痺已破瘡口痛者豬腦髓蒸熟入薑醋喫之即愈普濟方髓氣味甘寒無毒主治撲損惡瘡頌塗小兒解顱頭瘡及臍腫眉瘡瘑疥服之補骨髓益虛勞時珍發明時珍曰按丹溪治虚損補隂丸多用豬脊髓和丸取其通腎命以骨入骨以髓補髓也附方新七骨蒸勞傷豬脊髓一條豬膽汁一枚童便一盞柴胡前胡胡黄連烏梅各一錢韭白七根同煎七分温服不過三服其效如神瑞竹堂方小兒顱解豬牙車骨煎取髓傅三日方千金小兒臍腫豬頰車髓十二銖杏仁半兩研傅千金小兒眉瘡豬頸骨髓六七枚白膠香二錢同入銅器熬傅待冷為末麻油調塗小兒瘑瘡豬牙車骨年久者槌碎炙令髓出熱取塗之小品小兒頭瘡豬􅀈骨中髓和膩粉成劑火中煨香研末先温鹽水洗浄敷之亦治肥瘡出汗普濟方小兒疳瘡方同上血氣味鹹平無毒思邈曰澀平忌時珍曰服地黄何首烏諸補藥者之云能損陽也同黄豆食滯氣主治生血療賁豚暴氣及海外瘴氣日華中風絶傷頭風眩運及淋􅅹蘇恭卒下血不止清酒和炒食之思邈清油炒食治嘈雜有蟲時珍壓丹石解諸毒吴瑞發明時珍曰按陳自明云婦人嘈雜皆血液淚汗變而為痰或言是血嘈多以豬血炒食而愈盖以血導血歸原之意爾此固一說然亦有蚘蟲作嘈雜者蟲得血腥則飽而伏也附方新五交接隂毒腹痛欲死豭豬血乗熱和酒飲之肘后中滿腹脹旦食不能暮食用不着鹽水豬血漉去水晒乾為末酒服取洩甚效李樓竒方杖瘡血出豬血一升石灰七升和劑燒灰再以水和丸又燒凡三次為末敷之效外臺中射罔毒豬血飲之即解肘后蜈蚣入腹豬血灌之或飽食少頃飲桐油當吐出心血主治調硃砂末服治驚癎顛疾吴瑞治卒惡死及痘瘡倒靨時珍發明時珍曰古方治驚風癲疾痘疾多用豬心血盖以心歸心以血導血之意用尾血者取其動而不息也豬為水畜其血性寒而能解毒制陽故也韓飛霞云豬心血能引藥入本經實非其補沈存中云豬血得龍腦直入心經是矣附方新三心病邪熱蕊珠丸用豬心血一箇淀花末一匙硃砂末一兩同研丸梧子大毎酒服二十丸竒效痘瘡黑陷臘月收豶豬心血瓶乾之毎用一錢入龍腦少許研匀酒服須臾紅活神效無乾血用生血沈存中方婦人催生開骨膏用豬心血和乳香末丸梧子大硃砂為衣面東酒吞一丸未下再服婦人良方尾血主治痘瘡倒靨用一匙調龍腦少許新汲水服又治卒中惡死時珍附方舊一新一卒中惡死斷豬尾取血飲并縛豚枕之即活此乃長桑君授扁鵲法也出魏夫人傳肘后方蛇入七孔割母豬尾血滴入即出也千金方心氣味甘鹹平無毒頌曰多食耗心氣不可合吴茱茰食主治驚邪憂恚别録虚悸氣逆婦人産後中風血氣驚恐思邈補血不足虚劣蘇頌五臓主小兒驚癎出汗蘇恭發明劉完素曰豬水畜也故心可以鎮恍惚附方舊一新三心虚自汗不睡者用豶豬心一箇帶血破開入人參當歸各二兩煑熟去藥食之不過數服即愈證治要訣心虚嗽血沉香末一錢半夏七枚入豬心中以小便濕紙包煨熟去半夏食之證治要訣産後風邪心虚驚悸用豬心一枚五䜴汁煑食之心鏡急心疼痛豬心一枚每蔵入胡椒一粒同鹽酒煑食肝入藥用子肝氣味苦温無毒時珍曰餌藥人不可食之合魚鱠食生癰疽合鯉魚腸子食傷人神合鵪鶉食生面䵟延壽書云豬臨殺驚氣入心絶氣歸肝俱不可多食必傷人主治小兒驚癎蘇恭切作生以薑醋食主脚氣當微洩若先利即勿服蔵器治冷勞臓虚冷洩久滑赤白帶下以一葉薄批揾着訶子末炙之再揾再炙盡末半兩空腹細嚼陳米飲送下蘇頌補肝明目療肝虚浮腫時珍發明時珍曰肝主蔵血故諸血病用為嚮導入肝千金翼治痢疾有豬肝丸治脫肛有豬肝散諸眼目方多有豬肝散皆此意也附方舊六新八休息痢疾豶豬肝一具切片杏仁炒一兩於淨鍋内一重肝一重杏仁入童子小便二升文火煎乾取食日一次千金浮腫脹滿不下食豬肝一具洗切着葱䜴薑椒炙食之或單煑羹亦可心鏡身面卒腫生豬肝一具細切醋洗入蒜醋食之勿用鹽腫自足起方法同上風毒脚氣豬肝作生膾食之取利水腫溲澀豬肝尖三塊菉豆四撮陳倉米一合同水煑粥食毒從小便出也中蠱腹痛支太醫秘方以豬肝一具蜜一升共煎分二十服或為丸服肘后食即汗出乃脾胃虚也豬肝一斤薄切瓦焙乾為末煑白粥布絞汁衆手丸梧子大空心飲下五十丸日五心鏡目難逺視肝虚也豬肝一具細切去皮膜葱白一握用䜴汁作羹待熟下雞子三箇食之普濟方肝熱目赤瘮痛用豬肝一具薄切水洗浄以五味食之食醫心鏡牙疳危急豬肝一具煑熟蘸赤芍藥末任意食之後服平胃散二三貼即效節要女人隂痒炙豬肝納入當有蟲出肘后打擊青腫炙豬肝貼之千金急勞疾悴日晚即寒熱驚悸煩渇用豶豬肝一具切絲生甘草末十五兩於鐺中布肝一重摻甘草一重以盡為度取童便五升文武火煑乾擣爛衆手丸梧子大每空心米飲下二十丸漸加三十丸聖惠方脾俗名聯貼氣味澀平無毒時珍曰諸獸脾味如泥其屬土也可驗思邈曰凡六畜脾人一生莫食之主治脾胃虚熱同陳橘紅人參生姜葱白陳米煑羹食之蘇頌附方新二脾積痞塊豬脾七箇每箇用新針一箇刺爛以皮硝一錢擦之七箇並同以瓷器盛七日鐵器焙乾又用水紅花子七錢同搗為末以無灰酒空心調下一年以下者一服可愈五年以下者二服十年以下者三服保壽堂方瘧發無時胡椒吳茱萸高良薑各二錢為末以豬脾一條作膾炒熟一半滚藥一半不滚以墨記定並作錕鈍煑熟有藥者吞之無藥者嚼下一服效衛生家寳方肺氣味甘微寒無毒頌曰得大麻仁良若與白花菜合食令人氣滯發霍亂八月和飴食至冬發疽主治補肺蘇頌療肺虚欬嗽以一具竹刀切片麻油炒熟同粥食又治肺虚嗽血煑蘸薏苡仁末食之時珍諸出要訣方腎俗名腰子氣味鹹冷無毒思邈曰平日華曰雖補腎而久食令人少子詵曰久食令人傷腎頌曰冬月不可食損人真氣兼發虚壅主治理腎氣通膀胱别録補膀胱水臓暖膝治耳聾日蕐補虚壯氣消積滯蘇頌除冷利孫思邈止消渇治産勞虚汗下痢崩中時珍發明時珍曰豬腎别録謂其理腎氣通膀胱日蕐亦曰補水臓膀胱暖腰膝而又曰雖補腎久食令人少子孟詵亦曰久食令人腎虚兩相矛盾如此何哉盖豬腎性寒不能補命門精氣方藥所用借其引導而已别録理字通字最為有理日蕐暖腰膝補膀胱水臓之說為非矣腎有虚熱者宜食之若腎氣虚寒者非所宜矣今人不達此意往往食豬腎為補不可不審又千金治消渇有豬腎薺苨湯補腎虚勞損諸病有腎瀝湯方甚多皆用豬羊腎煑湯煎藥俱是引導之意附方舊四新十九腎虚遺精多汗夜夢鬼交用豬腎一枚切開去膜入附子末一錢濕紙褁煨熟空心食之飲酒一盃不過三五服效經騐方腎虚隂痿羸瘦精衰少力用豶豬腎一對切片枸杞葉半斤以豉汁一盞同椒鹽煑羹食經驗方腎虚腰痛用豬腰子一枚切片以椒鹽淹去腥水入杜仲末三錢在内荷葉包煨食之酒下本草權度閃肭腰痛用豶豬腎一枚批片鹽椒淹過入甘遂末三錢荷葉包煨熟食酒送下儒門事親老人耳聾豬腎一對去膜切以粳米二合葱白二根薤白七根人參二分防風一分為末同煑粥食奉親養老方老人脚氣嘔逆者用豬腎一對以醋蒜五味治食之日作一服或以葱白粳米同煑粥食亦可奉親養老方卒然腫滿用豬腎批開入甘遂末一錢紙裹煨熟食以小便利為效否則再服肘后方肘傷冷痛豬腎一對桂心二兩水八升煑三升分三服肘后卒得欬嗽豬腎二枚乾薑三兩水七升煑二升稍服取汁肘后方久嗽不瘥豬腎二枚入椒四七粒水煑啖之張文仲方心氣虚損豬腰子一枚水二碗煑至一碗半切碎入人參當歸各半兩煑至八分喫腰子以汁送下未盡者同滓作丸服百一選方酒積面黄腹脹不消豬腰子一箇批開七刀葛根粉一錢摻上合定毎邊炙三遍半手扯作六塊空心喫之米湯送下聖濟總録久泄不止豬腎一箇批開摻骨碎補末煨熟食之神效頻湖集簡方赤白下痢腰痛用豬腎二枚研爛入陳皮椒醤作餛飩空心食之食醫心鏡赤白帶下常炙豬腎食之張文仲方崩中漏下方同上産後蓐勞寒熱用豬腎一對切細片以鹽酒拌之先用粳米一合葱椒煑粥鹽醋調和将腰子鋪於盆底以熱粥傾于上葢之如作􅝛生粥食之濟生産後虚汗發熱肢體疼痛亦名蓐勞永類鈐方用豬腎一對切水三升粳米半合椒鹽葱白煑粥食梅師用豬腎同葱䜴和成作􅌜食之小兒躽啼小兒五十日以來胎寒腹痛躽啼弄舌微熱而驚此癎候也豬腎一具當歸一兩焙以清酒一升煑七合每以杏仁大與嚥之日三夜一聖惠方小兒頭瘡豬腰子一箇批開去心膜入五倍子輕粉末等分在内以沙糖和麵固濟炭火炙焦為末清油調塗方經騐良𫝊尸勞療豬腰子一對童子小便二盞無灰酒一盞新瓷瓶盛之泥封炭火温養自戌至子時止待五更初温熟取開飲酒食腰子病篤者只一月效平日瘦怯者亦可用之葢以血養血絶勝金石草木之藥也邵真人經騐方癰疽發背初起者用豶豬腰子一雙同飛麵搗如泥塗之即愈􅏬音夷亦作胰時珍曰一名腎脂生兩腎中間似脂非脂似肉非肉乃人物之命門三焦發原處也肥則多痩則少盖頥養頼之故謂之頥氣味甘平微毒頌曰男子多食損陽主治肺痿欬嗽和棗肉浸酒服亦治痃癖羸瘦蔵氣繒又合膏練帛療肺氣乾脹喘急潤五臓去皴􅀈䵟􅍍殺斑蝥地膽毒治冷痢成虚蘇頌一切肺病欬𠻳膿血不止以薄竹筒盛於煻火中煨熟食上啖之良心鏡通乳汁之才附方舊二新九豬􅏬酒治冷痢久不瘥此是脾氣不足暴冷入脾舌上生瘡飲食無味或食下還吐小腹雷鳴時時心悶乾皮細起膝脛酸痛羸瘦漸成鬼氣及婦人血氣不通逆飯憂煩四肢無力丈夫痃癖兩肋虚脹變為水氣服之皆效此法出於𫝊尸方取豬􅏬一具細切與青蒿葉相和以無灰酒一大升微火温之藥熟納􅏬中使消盡又取桂心末一小兩内酒中每旦温服一小盞午夜各再一服甚騐忌麵油􅕹等食崔元亮海上方膜内氣塊豬􅏬一具炙蘸𤣥胡索末食之衛生易簡方肺氣欬嗽豬􅏬一具苦酒煑食不過二服肘后方二十年嗽豬􅏬三具大棗百枚酒五升漬之秋冬七日春夏五日絞去滓七日服盡忌鹽逺年肺氣豬􅏬一具膩粉一兩瓷瓶固濟上留小竅煅烟盡為末每服二錢漿水下服石發熱豬腎脂一具勿中水以火炙取汁毎服三合日夜五六服石隨大便下總録撥雲去翳用豬􅏬子一枚五錢㽔仁五分青鹽一錢共搗千下令如泥毎㸃少許取下膜翳為效孫氏集效方赤白癜風豬􅏬一具酒浸一時飯上蒸熟食不過十具壽域方面粗醜黑皮厚䵟􅍍者豬􅏬五具蕪青子二兩杏仁一兩土𤓰根一兩淳酒浸之夜塗旦洗老者少少者白神騐肘后手足皴裂以酒桴豬􅏬洗并傅之后肘唇燥𦂳裂豬􅏬浸酒搽之葉氏摘𤣥方肚氣味甘微温無毒主治補中益氣止渇斷暴痢虚弱别録補虚損殺勞蟲釀黄糯米蒸搗為丸治勞氣并小兒疳蚘黄瘦病日蕐主骨蒸熱勞血脈不行補羸助氣四季宜食蘇頌消積聚癥瘕治惡瘡吳普發明時珍曰豬水畜而胃屬土故方藥用之補虚以胃治胃也附方舊二新九補益虚羸用豬肚一具入人參五兩蜀椒一兩乾薑一兩半葱白七箇粳米半升在内宻縫煑熟食千金翼水瀉不止用豶豬肚一枚入蒜煑爛搗膏丸梧子大每米飲服三十丸丁必卿云予次日五更必水瀉一次百藥不效用此方入平胃散末三兩丸服遂安普濟消渇飲水日夜飲水數斗者心鏡用雄豬肚一枚煑取汁入少䜴渇即飲之肚亦可食煑粥亦可末仲景豬肚黄連丸治消渇用雄豬肚一枚入黄連五兩栝樓根白梁米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸如梧子大毎服三十丸米飲下食醫心鏡老人脚氣豬肚一枚洗浄切作片以水洗布絞乾和蒜椒醤醋五味常食亦治熱勞養老方温養胎氣胎至九月消息用豬肚一枚如常着五味煑食至盡千金髓赤白癜風白煑豬肚一枚食之頓盡忌房事外臺疥瘡痒痛豬肚一枚同皂莢煑熟云莢食之救急頭瘡白秃普濟用新破豬肚勿洗熱榻之須臾蟲出不盡再作煅孫氏方用豬肚一箇入砒一兩札定以黄泥固濟存性為末油和傅以椒湯洗蟲牙疼痛用新殺豬肚尖上涎絹包咬之數次虫盡即愈唐氏用枳殻末拌之腸氣味甘微寒無毒主治虚渇小便數補下焦虚竭孟詵止小便日蕐去大小腸風熱宜食之蘇頌潤腸治燥調血痢臓毒時珍洞腸治人洞腸挺出血多孫思邈腸洞腸廣也附方新三腸風臓毒救急用豬大腸一條入芫荽在内煑食竒效用豬臓入黄連末在内煑爛搗丸梧子大毎米飲服三十丸如又方豬臓入槐花末令滿縳定以醋煑爛搗為丸梧桐子大毎服二十丸温酒下脇熱血痢方法同上臓寒洩瀉體倦食減用豬大臟一條去脂洗浄以吳茱萸末填滿縳定蒸熟搗丸梧子大每服五十丸米飲下竒效良方脬亦作胞氣味甘鹹寒無毒主治夢中遺溺疝氣墜痛隂囊濕痒玉莖生瘡發明時珍曰豬胞所主皆下焦病亦以類從爾蘄有一妓病轉脬小便不通腹脹如鼔數月垂死一醫用豬脬吹脹以翎管安上挿入隂孔捻脬氣吹入即大尿而愈此法載在羅天益衛生寳鑑中知者頗少亦機巧妙術也附方新八夢中遺溺用豬脬洗炙食之千金産後遺尿豬胞豬肚各一箇糯米半升入脬内更以脬入肚内同五味煑食醫林集要産後尿床方法同上疝氣墜痛用豬脬一枚洗入小茴香大茴香破故紙川楝子等分填滿入青鹽一塊縳定酒煑熟食之酒下其藥焙搗為丸服之消渇無度乾豬胞十箇剪破去蒂燒存性為末每温酒服一錢聖濟總録腎風囊癢用豬尿胞火炙以鹽酒吃之救急玉莖生瘡臭腐用豬胞一枚連尿去一半留一半以煅紅新磚焙乾為末入黄丹一錢摻之三五次瘥先須以葱椒湯洗竒效方白秃癲瘡洗刮令浄以豬胞乗熱裹之當引蟲出膽氣味苦寒無毒主治傷寒熱渇别録骨熱勞極消渇小兒五疳殺蟲蘇頌敷小兒頭瘡治大便不通以葦筒納入下部三寸灌之立下蔵器通小便敷惡瘡殺疳􅉶治目赤目翳明目清心臓涼肝脾入湯沭髪去膩光澤時珍發明成無巳曰仲景以豬膽汁和醋少許灌穀道中通大便神效盖酸苦益隂潤燥而瀉便也又治少隂下利不止厥逆無脈乾嘔煩者以白通湯加豬膽汁主之若調寒熱之逆者冷熱必行則熱物冷服下嗌之後冷體既消熱性便發故病氣自愈此所以和人尿豬膽鹹苦之物於白通熱劑之中使其氣相從而無拒格之患也又云霍亂病吐下已斷汗出而厥四肢厥急脈微欲絶者通脈四逆湯加豬膽汁主之葢陽氣太虚隂氣獨勝純與陽藥恐隂氣格拒不得入故加豬膽汁苦入心而通脈寒補肝而和隂不致格拒也汪機曰朱奉議治傷寒五六日癍出有豬膽雞子湯時珍曰方家用豬膽取其寒能勝熱滑能潤燥苦能入心又能去肝膽之火也附方舊六新十四少隂下利不止厥逆無脈乾嘔者以白通湯加豬膽汁主之葱白四莖乾薑一兩生附子一枚水三升煑一升入人尿五合豬膽汁一合分服仲景傷寒論或瀉或止久而不愈二聖丸用黄連黄蘗末各一兩以豬膽煑熟和丸如菉豆大量兒大小每米飲服之總微論赤白下痢十二月豬膽百枚俱盛黑豆入内着麝香少許隂乾每用五七粒為末生薑湯調服方竒效濕􅉶下痢不止乾嘔羸瘦多睡面赤以膽汁和薑汁釅醋同灌下部捻令醋氣上至咽㗋乃止當下五色惡物及虫而愈也拾遺熱病蟲􅉶上下用豬膽一枚醋一合煎沸服虫立死也梅師瘦病欬嗽豬膽和人溺薑汁橘皮訶梨勒皮同煑汁飲之拾遺方小便不通豬膽一枚熱酒和服時又用豬膽連汁籠住隂頭一二汁入自通消渴無度雄豬膽五箇定粉一兩同煎成丸芡子大每含化二丸嚥下日二聖濟總録傷寒癍出豬膽雞子湯用豬膽汁苦酒各三合雞子一箇合煎三沸分服汗出即愈張文仲方疔瘡惡腫十二月豬膽風乾和生葱搗傅普濟方目翳目盲豬膽文火煎稠丸黍米大每納一粒目中良目赤腫痛豬膽汁一枚和鹽碌五分㸃之普濟方火眼赤痛豬膽一箇銅錢三文同置盞内蒸乾取膽丸粟米大安眼中聖惠方㧞白換黑豬膽塗孔中即生黑者聖惠方小兒初生豬膽入湯浴之不生瘡疥姚和衆産後風瘡因出風早用豬膽一枚栢子油一兩和傅杏林採要湯火傷瘡豬膽調黄蘗末塗之外臺瘭疽出汁生手足肩背纍纍如赤豆剥浄以豬膽塗之千金喉風閉塞臘月初一日取豬膽不拘大小五六枚用黄連青黛薄荷僵蠶白礬朴硝各五錢裝入膽内青紙包了将地掘一孔方㴱各一尺以竹横懸此膽在内以物盖定候至立春日取出待風吹去膽皮青紙研末宻收毎吹少許神騐乃萬金不傳之方騐邵真人經方膽皮主治目翳如重者取皮曝乾作兩股繩如筋大燒灰出火毒㸃之不過三五度瘥時珍秘出外臺要膚汪機曰豬膚王好古以為豬皮吴綬以為燖豬時刮下黑膚二說不同今攷禮運疏云革膚内厚皮也膚革外厚皮也則吳說為是淺膚之義氣味甘寒無毒主治少隂下痢咽痛時珍發明張仲景曰少隂下痢咽痛胸滿心煩者豬膚湯主之用豬膚一斤水一斗煑五升取汁入白蜜一升白粉五合熬香分六服成無已曰豬水畜也其氣先入腎解少隂客熱加白蜜以潤燥除煩白粉以益氣斷利也耳垢主治蛇傷狗咬塗之别録鼻唇氣味甘鹹微寒無毒多食動風主治上唇治凍瘡痛痒思邈煎湯調蜀椒目末半錢夜服治盜汗宗奭鼻治目中風翳燒灰水服方寸匕日二服時珍金出千舌主治徤脾補不足令人能食和五味煑汁食孟詵靨音掩俗名咽舌是矣又名豬氣子王璽曰在豬喉系下肉團一枚大如棗微扁色紅主治項下癭氣瓦焙研末每夜酒服一錢時珍發明見羊靨下附方新二癭氣杏林摘要用豬靨七枚酒熬三錢入水瓶中露一夜取出炙食二服效醫林集要開結散豬靨焙四十九枚沉香二錢真硃砂罐煅四十九粒沉香二錢橘紅四錢為末臨卧冷酒徐徐服二錢五服見效重者一料愈以除日合之忌酸鹹油膩澀氣之物齒氣味甘平主治小兒驚癎五月五日取燒灰服别録又治蛇咬日蕐中牛肉毒者燒灰水服一錢又治痘瘡倒䧟時珍骨主治中馬肝漏脯菓菜諸毒燒灰水服方寸七日三服頰骨燒灰治痘䧟煎汁服解丹藥毒時珍附方新三主消渴疾豬脊湯用豬脊骨一尺二寸大棗四十九枚新蓮肉四十九粒炙甘草二兩西木香一錢水五椀同煎取汁渴則飲之三因方浸滛諸瘡豬牙車骨年久者椎破燒令脂出乗熱塗之普濟方下痢紅白臘豬骨燒存性研末温酒調服三錢豚卵釋名豚顛本經豬石子别録曰隂乾蔵之勿令敗頌曰豚卵當是豬子也時珍曰豚卵即牡豬外腎也牡豬小者多犗去卵故曰豚卵濟生方謂之豬石子者是也三因治消渴方中有石子薺苨湯治産後蓐勞有石子湯並用豬腎為石子誤矣氣味甘温無毒主治驚癎癲疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮本經除隂莖中痛孫思邈治隂陽易病少腹急痛用熱酒吞二枚即瘥時珍癎又古今録騐治五莨菪散中用之附方新一驚癎中風壯熱掣瘲吐舌出沫用豚卵一雙細切當歸二分以醇酒三升煑一升分服普濟母豬乳時珍曰取法須馴豬待兒飲乳時提後脚急以手捋而承之非此法不得也氣味甘鹹寒無毒主治小兒驚癎及鬼毒去來寒熱五癃綿蘸吮之蘇恭小兒天弔大人豬雞癎病日蕐發明時珍曰小兒體屬純陽其驚癎亦生於風熱豬乳氣寒以寒治熱謂之正治故錢乙云初生小兒至滿月以豬乳頻滴之最佳張煥云小兒初生無乳以豬乳代之出月可免驚癎痘疹之患楊士瀛云小兒口噤不開豬乳飲之甚良月内胎驚同硃砂牛乳少許抺口中甚妙此法諸家方書未知用予傳之東宮吴觀察子病此用之有效附方舊一斷酒白豬乳一升飲之千金蹄已下並用母豬者氣味甘鹹小寒無毒主治煑汁服下乳汁解百藥毒洗傷撻諸敗瘡别録滑肌膚去寒熱蘇頌煮羹通乳脈托癰疽壓丹石煮清汁洗癰疽漬熱毒消毒氣去惡肉有效時珍方外科精要洗癰疽有豬蹄湯數用豬蹄煮汁去油煎衆藥蘸洗也附方舊五新二婦人無乳外臺用母豬蹄一具水二斗煑五六升飲之或加通草六分癀濟用母豬蹄四枚水二斗煑一斗入土𤓰根通草漏蘆各三兩再煑六升去滓納葱䜴作粥或羔食之或身體微熱有少汗出佳未通再作癰疽發背母豬蹄一雙通草六分綿裹煑羔食之梅師乳發初起方同上天行熱毒攻手足腫痛欲斷用母豬蹄一具去毛以水一斗葱白一握煑汁入少鹽漬之肘后老人面藥令面光澤用母豬蹄一具煑漿如膠夜以塗面曉則洗去千金翼硇砂損隂豬蹄一具浮萍三兩水三升煑汁半升漬之冷即出以粉傅之臺外懸蹄甲一名豬腿有思邈曰酒浸半日炙焦用時珍曰按古方用左蹄甲者又有用後蹄甲者未詳其義也氣味鹹平無毒主治五痔伏熱在腹中腸癰内蝕本經同赤木燒烟薰辟一切惡瘡仲景附方舊二新五肺氣齁喘豬爪甲二枚燒灰研入麝香一分同研搽服普濟定喘化痰用豬蹄甲四十九箇洗浄每甲納半夏白礬各一字罐盛固濟煅赤為末入麝香一錢七每用糯米飲下半錢經騐良方火欬喘急豬蹄甲四十九枚以瓶子盛之安大南星一枚葢之鹽泥固濟煅烟出為度取出入欵冬花半兩麝香龍腦少許研匀每服一錢食後煎桑白皮湯下名黑金散録總小兒寒熱及熱氣中人用豬後蹄甲燒灰乳汁調服一撮日二服千金痘瘡入目豬蹄爪甲燒灰浸湯濾净洗之甚效普濟方癍痘生翳半年已上者一月取效一年者不治用豬懸蹄三兩瓦瓶固濟煅蟬蛻一兩羚羊角一分為末每歲一字三歳已上三錢温水調服一日三服方錢氏小兒小兒白秃豬蹄甲七箇每箇入白礬一塊棗兒一箇燒存性研末入輕粉麻油調搽不過五上愈尾主治臘月者燒灰水服治喉痺和豬脂塗赤秃髪落時珍金出千毛主治燒灰麻油調塗湯火傷留竅出毒則無痕時珍䄂出珍附方新一赤白崩中豬毛燒灰三錢以黑豆一椀好酒一碗半煑一碗調服屎一名豬零日華曰取東行牡豬者為良頌曰今人又取南行豬零合太乙丹時珍曰古方亦有用豭豬屎者各隨本方豬零者其形纍纍零落而下也氣味寒無毒主治寒熱黄疸濕痺别録主蠱毒天行熱病並取一升浸汁頓服日蕐燒灰發痘瘡治驚癎除熱解毒治瘡時珍血溜出血不止取新屎壓之吴瑞發明時珍曰御藥院方治痘瘡黑䧟無價散錢仲陽治急驚風癎惺惺丸皆用之取其除熱解毒也附方舊一新十六小兒客忤偃啼面青豭豬屎二升水絞汁温浴之小兒夜啼豬屎燒灰淋汁浴兒并以少許服之聖惠方小兒隂腫豬屎五升煑熱袋盛安腫上千金方霧露瘴毒頭痛心煩項强顫掉欲吐用新豬屎二升酒一升絞汁暖服取汗瘥千金中豬肉毒豬屎燒灰水服方寸七外臺婦人血崩老母豬屎燒灰酒服三錢李樓方解一切毒母豬屎水和服之千金攪腸沙痛用母豬生兒時抛下糞日乾為末以白湯調服口唇生核豬屎絞汁温服千金方白秃髪落臘月豬屎燒灰敷肘后疔瘡入腹牡豬屎和水絞汁服三合立瘥聖惠方十年惡瘡母豬屎燒存性傅之方外臺消蝕惡肉臘月豶豬糞燒存性一兩雄黄㯽榔各一錢為末敷洗直指方胻疽青爛生於腨脛間惡水淋漓經年瘡冷敗為㴱疽青黑好肉虚腫百藥不瘥或瘥而復發先以藥蝕去惡肉後用豭豬屎散甚效以豬屎燒研為末納瘡孔令滿白汁出吮去更傅有惡肉再蝕去乃傅以平為期有騐千金方男女下疳母豬糞黄泥包煅存性為末以米泔洗淨搽立效簡便單方雀瘻有蟲母豬屎燒灰以臘月豬膏和敷當有蟲出千金方赤遊火丹母豬屎水絞汁服并傅之外臺燖豬湯主治解諸毒蟲魘蘇頌産後血刺心痛欲死温飲一盞汪機治消渴濾浄飲一碗勿令病人知又洗諸瘡良時珍豬窠中草主治小兒夜啼宻安席下勿令母知日華縳豬繩主治小兒驚啼發歇不定用臘月者燒灰水服少許蔵器狗本經中品釋名犬說文地羊時珍曰狗叩也吠聲有節如叩物也或云為物茍且故謂之狗韓非云蠅營狗茍是矣卷尾有懸蹄者為犬犬字象形故孔子曰視犬字如畫狗齊人名地羊俗又諱之以龍稱狗有烏龍白龍之號許氏說文云多毛曰龎長喙曰獫音歛短喙曰猲音歇去勢曰猗髙四尺曰熬狂犬曰猘音折生一子曰􅸉曰玂音其二子曰獅三子曰􅚧集解時珍曰狗類甚多其用有三田犬長喙善獵吠犬短喙善守食犬體肥供饌凡本草所用皆食犬也犬以三月而生在畜屬木在卦屬艮在禽應婁星豺見之跪虎食之醉犬食畨木鱉則死物性制伏如此又遼東有鷹背狗乃鷹産三卵一鷹一鵰一犬也以禽乳獸古所未聞詳見鷹條又有老木之精狀如黑狗而無尾名曰彭侯可以烹食無情化有情精靈之變也肉黄犬為上黑犬白犬次之氣味鹹酸温無毒反商陸畏杏仁同蒜食損人同菱食生癲也思邈曰白犬合海鮋食必得惡病時珍曰鮋小魚道家以犬為地厭不食之凡犬不可炙食令人消渴妊婦食之令子無聲熱病後食之殺人服食人忌食九月勿食犬傷神瘦犬有病猘犬發狂自死犬有毒懸蹄犬傷人赤股而躁者氣臊犬目赤者並不可食主治安五臓補絶傷輕身益氣别録宜腎思邈補胃氣壯陽道暖腰膝益氣力日華補五勞七傷益陽事補血脈厚腸胃實下焦填精髓和五味煑空心食之凡食犬不可去血則力少不益人孟詵發明𢎞景曰白狗烏狗入藥用黄狗肉大補虚勞牡者尤勝大明曰黄犬大補益人餘色微補古言薯蕷凉而能補犬肉暖而不補雖有此言服終有益但因食穢不食者衆震亨曰世言犬能治勞損陽虚之疾然人病多是隂虚若陽果虚其死甚易亦安能措手哉時珍曰脾胃屬土喜暖惡寒犬性温暖能治脾胃虚寒之疾脾胃温和而腰腎受癊矣若素常氣壯多火之人則宜忌之丹溪獨指隂虚立說矯枉過偏矣齊生治真陽虚憊諸虚證有黄犬肉丸藥多不載附方舊三新五戊戌酒大補元氣用黄犬肉一隻煑一伏時搗如泥和汁拌炊糯米三斗入麴如常釀酒候熟每旦空心飲之養老方戊戍丸治男子婦人一應諸虚不足骨蒸潮熱等證用黄童子狗一隻去皮毛腸肚同外腎於砂碢内用酒醋八分水二升入地骨皮一斤前胡黄茋肉蓯蓉各四兩同煑一日去藥再煑一夜去骨再煑肉如泥擂濾入當歸末四兩蓮肉蒼术末各一斤厚朴橘皮末十兩甘草末八兩和杵千下丸梧子大毎空心鹽酒下五七十丸乾坤秘韞脾胃虚冷腹滿刺痛肥狗肉半斤以水同鹽䜴煑粥頻食一兩頓心境虚寒瘧疾黄狗肉煑臛入五味食之氣水鼔脹狗肉一斤切和米煑粥空腹食之心鏡浮腫屎澀肥狗肉五斤熱蒸空腹食之心鏡卒中惡死破白狗榻心上即活肘后方痔漏有蟲鈐方用狗肉煑汁空腹服能引蟲也七危氏用熟犬肉蘸藍汁空心食日效蹄肉氣味酸平主治煑汁能下乳汁别録血白狗者良氣味鹹温無毒𢎞景曰白狗血和白雞肉烏雞肉白雞肝白羊肉蒲子羔等食皆病人時珍曰黑犬血灌蠏燒之集䑕主治白狗血治癲疾發作烏狗血治産難横生血上搶心和酒服之别録補安五臓日華熱飲治虚勞吐血又解射罔毒㸃眼治痘瘡入目又治傷寒熱病發狂見鬼及鬼擊病辟諸邪魅時珍發明時珍曰術家以犬為地厭能禳辟一切邪魅妖術按史記云秦時殺狗磔四門以禦災殺白犬血題門以辟不祥則自古已然矣又華陀别傳云瑯琊有女子右股病瘡痒而不痛愈而復作陀取稻糖色犬一隻繫馬馬走五十里乃斷頭向痒處合之須臾一蛇在皮中動以鉤引出長三尺許七日而愈此亦怪證取狗之血腥以引其蟲耳附方舊二新四熱病發狂傷寒時氣温病六七日熱極發狂見鬼欲走取白狗從背破取血乗熱攤胸上冷乃去之此治垂死者亦活無白犬但純色者亦可肘后方鬼擊之病脇腹絞痛或即吐血衂血下血一名鬼排白犬頭取熱血一升飲之百一方小兒卒癎刺白犬血一升飲之并塗身上葛氏方卒得瘑瘡常時生兩脚間用白犬血塗之立愈肘后方兩脚癬瘡白犬血塗之立瘥竒效疔瘡惡腫取白犬血頻塗之有效肘后心血主治心痺心痛取和蜀椒末丸梧子大每服五丸日五服時珍后出肘乳汁白犬者良主治十年青盲取白犬生子目未開時乳頻㸃之狗子目開即瘥蔵器赤秃髪落頻塗甚妙時珍附方新二抜白白犬乳塗之千金斷酒白犬乳酒服千金脂并􅏬白犬者良主治手足皴皺入面脂去䵟􅍍柔五金時珍腦主治頭風痺鼻中瘜肉下部䘌瘡别録猘犬咬傷取本犬腦敷之後不復發時珍后出肘附方新一眉髪火瘢不生者蒲灰以正月狗腦和敷日三則生聖惠方涎主治諸骨硬脫肛及誤吞水蛭時珍附方新三諸骨哽咽狗涎頻滴骨上自下仇逺稗史大腸脫肛狗涎抹之自上也方扶壽精誤吞水蛭以蒸餅半箇絞出狗涎喫之連食二三其物自散徳生堂方心主治憂恚氣除邪别録治風痺鼻衂及下部瘡狂犬咬日華腎氣味平微毒時珍曰内則食犬去腎為不利人也主治婦人産後腎勞如瘧者婦人體熱用豬腎體冷用犬腎蔵器肝時珍曰按沈周雜記云狗肝色如泥土臭味亦然故人夜行土上則肝氣動葢相感也又張華物類志云以狗肝和土泥竈令婦妾孝順則狗肝應土之說相符矣主治肝同心腎搗塗狂犬咬又治脚氣攻心切生以薑醋進之取洩先洩者勿用蔵器附方舊一新一下痢腹痛狗肝一具切入米一升煑粥合五味食心鏡心風發狂黄石散用狗肝一具批開以黄丹硝石各一錢半研匀擦在肝内用麻縳定水一升煑熟細嚼以本汁送下蔵楊氏家膽青犬白犬者良氣味苦平有小毒斆曰鮭魚挿樹立便乾枯狗膽塗之却還榮勝主治明目本經膽鼎曰上伏日采酒服之敷痂瘍惡瘡别録療鼻􅙄鼻中瘜肉甄權主鼻衂聤耳止消渴殺蟲除積能破血凡血氣痛及傷損者熱酒服半箇瘀血盡下時珍治刀箭瘡日華去腸中膿水又和通草桂為丸服令人隐形孟詵發明慎微曰按魏志云河内太守劉勲女病左膝瘡痒華陀視之用繩繫犬後足不得行斷犬腹取膽向瘡口須臾有蟲若蛇着瘡上出長三尺病愈也附方舊二新七眼赤澀痒犬膽汁注目中效聖惠肝虚目暗白犬膽一枚營火蟲二七枚隂乾為末㸃之聖惠目中膿水上伏日采犬膽酒服之聖濟總録聤耳出膿用狗膽一枚枯礬一錢調匀綿裹塞耳内三四次即瘥竒效良方拔白換黑狗膽汁塗之千金血氣撮痛不可忍者用黑狗膽一箇半乾半濕剜開以箆子排丸菉豆犬蛤粉衮過每服四十丸以鐵淬酒送下痛立止經騐方反胃吐食不拘丈夫婦人老少逺年近日用五靈脂末黄狗膽汁和丸龍眼大每服一丸好酒半盞磨化服不過三服即效本事痞塊疳積五靈脂炒烟盡真阿魏去砂研等分用黄雄狗膽汁和丸黍米大空心津嚥三十丸忌羊肉醋麵簡便赤白下痢臘月狗膽一百枚每枚入黑豆充滿麝香少許毎服一枚赤以甘草白以乾薑湯送下方竒效良牡狗隂莖釋名狗精六月上伏日取隂乾百日别録氣味鹹平無毒思邈曰酸主治傷中隂痿不起令强熱大生子除女子帶下十二疾本經治絶陽及婦人隂瘻日華補精髓孟詵隂卵主治婦人十二疾燒灰服蘇恭皮主治腰痛炙熱黄狗皮褁之頻用取瘥燒灰治諸風時珍發明時珍曰淮南萬畢術云黑犬皮毛燒灰揚之止天風則治風之義有取乎此也毛主治産難蘇恭頸下毛主小兒夜蹄綘囊盛繫兒背上蔵器燒灰湯服一錢治邪瘧尾燒灰敷犬傷時珍附方舊一湯火傷瘡狗毛細剪以烊膠和毛敷之痂落即瘥梅師齒氣味平微毒主治癲癎寒熱卒風疿伏日取之别録磨汁治犬癎燒研醋和敷發背及馬鞍瘡同人齒燒灰湯服治痘瘡倒䧟有效時珍頭骨黄狗者良氣味甘酸平無毒主治金瘡止血别録燒灰治久痢勞痢和乾薑莨菪炒見烟為丸空心白飲服十丸極效甄權燒灰壯陽止瘧日華治癰疽惡瘡解顱女人崩中帶下時珍領骨主小兒諸癎諸瘻燒灰酒服蘇恭附方舊三新十小兒久痢狗頭燒灰白湯服千金小兒解顱黄狗頭骨炙為末雞子白和塗之直指赤白久痢臘月狗頭骨一兩半燒灰紫笋茶末一兩為末每服二錢米飲下聖惠方赤白帶下不止者狗頭燒灰為末毎酒服一錢日三服聖惠産後血亂奔入四肢并違墮以狗頭骨灰酒服二錢甚效經騐方打損接骨狗頭一箇燒存性為末熱醋調塗暖卧衛生易簡附骨疽瘡狗頭骨燒烟日熏之聖惠癰疽節毒狗頭骨灰芸臺子等分為末水和敷之千金惡瘡不愈狗頭骨灰同黄丹末等分敷之壽域方長肉生肌老狗頭腦骨瓦炒二兩桑白皮一兩當歸二錢半為末麻油調敷直指鼻中瘜肉狗頭灰方寸七苦丁香半錢研末吹之即化為水或同硇砂少許尤妙朱氏集騐夢中洩精狗頭鼻梁骨燒研臥時酒服一錢頭風白屑作痒狗頭骨燒灰淋汁沭之聖惠方骨白狗者良氣味甘平無毒主治燒灰生肌敷馬瘡别録燒灰療諸瘡瘻及妬乳癰腫𢎞景燒灰補虚理小兒驚癎客忤蜀本煎汁同米煑粥補婦人令有子蔵器燒灰米飲日服治休息久痢豬脂調敷鼻中瘡時珍附方舊二産後煩懣不食者白犬骨燒研水服方寸匕千金翼桃李哽咽狗骨煑湯摩頭上子母秘録屎白狗者良氣味熱有小毒丹房鑑源云白狗糞煑銅主治疔瘡水絞汁服治諸毒不可入口者蘇恭瘭疽徹骨痒者燒灰塗瘡勿令病者知又和臘豬脂敷瘻瘡腫毒疔腫出根蔵器燒灰服發痘瘡倒黶治癨亂癥積止心腹痛解一切毒時珍發明時珍曰狗屎所治諸病皆取其解毒之功耳附方舊三新五小兒癨亂卒起者用白狗屎一丸絞汁服之心痛欲死狗屎炒研酒服二錢神效勞瘧􅂒瘧久不愈用白狗糞燒灰發前冷水服二錢聖惠方月水不調婦人産後月水往來乍多乍少白狗糞燒末酒服方寸七日三服千金魚肉成癥并治諸毒用狗糞五升燒末綿褁於五升酒中浸二宿取清月三服癥即便出也外臺漏脯中毒犬屎燒末酒服方寸七肘后發背癰腫用白犬屎半升水絞取汁服以滓敷之日再外臺疔瘡惡腫牡狗屎五月五日燒灰塗敷數易之又治馬鞍瘡神騐聖惠屎中粟白狗者良一名白龍沙主治噎膈風病痘瘡倒䧟能解毒也時珍附方新二噎隔不食黄犬乾餓數日用生粟或米乾飼之俟其下糞淘洗米粟令淨煑粥入薤白一握泡熟去薤入沉香末二錢食之永類鈐方痘瘡倒黶用白狗或黑狗一隻餵以生粟米候下屎取未化米為末入麝香少許新汲水服二錢保㓜大全屎中骨主治寒熱小兒驚癎别録羊本經中品校正别録另出羊乳今併為一釋名羖亦作􅗑羝音低羯時珍曰說文云羊字象頭角足尾之形孔子曰牛羊之字以形似也董子云羊祥也故吉禮用之牡羊曰羖曰羝牝羊曰􅀈曰牂音臧白曰粉黒曰羭多毛曰羖䍽胡羊曰䍲羺無角曰􅩫曰䍫去勢曰羯羊子曰羔羔五月曰羜音宁六月曰􅧌音務七月曰􅀢音達未卒歳曰䍮音兆内則謂之柔毛又曰少牢古今注謂之長髯主簿云集解别録曰羖羊生河西𢎞景曰羊有三四種入藥以青色羖羊為勝次則烏羊其䍲羺羊及虜中無角羊止可啖食為藥不及都下者然其乳髓則肥好也頌曰羊之種類甚多而羖羊亦有褐色黑色白色者毛長尺餘亦謂之羖䍽羊北人引大羊以此為羊首又謂之羊頭說曰河西羊最佳河東羊亦好若驅至南方則筋力自勞損安能補益人今南方羊多食野草毒草故江浙羊少味而發疾南人食之即不憂也惟淮南州郡或有佳者可亞北羊北羊至南方一二年亦不中食何况於南羊盖土地使然也宗奭曰羖䍽羊出陜西河東尤狠健毛最長而厚入藥最佳如供食則不如北地無角白大羊也又同華之間有小羊供饌在諸羊之上時珍曰生江南者為吴羊頭身相等而毛短生秦晉者為夏羊頭小身大而毛長土人二歳而剪其毛以為氊物謂之綿羊廣南英州一種乳羊食仙茅極肥無復血肉之分食之甚補人諸羊皆孕四月而生其目無神其腸薄而縈曲在畜屬火故易繁而性熱也在卦屬兌故外柔而内剛也其性惡濕喜燥食鈎吻而肥食仙茅而肪食仙靈脾而淫食躑躅而死物理之宜忌不可測也契丹以其骨占灼謂之羊卜亦有一靈耶其皮極薄南番以書字吴人以畫采為燈附録大尾羊時珍曰羊尾皆短而哈宻及大食諸畨有大尾羊細毛薄皮尾上旁廣重一二十斤行則以車載之唐書謂之靈羊云可療毒胡羊方國志云大食國出胡羊髙三尺餘其尾如扇每歳春月割取脂再縫合之不取則脹死葉盛水東日記云莊浪衛近雪山有饕羊土人歳取其脂不久復滿洮羊出臨洮諸地大者重百斤郭義恭廣志云西域驢羊大如驢即此類也􅀢羊此思切皆出西北地其皮蹄可以割黍封羊其背有肉封如駝出凉州郡縣亦呼為駝羊地生羊出西域劉有出使西域記以羊臍種于土中溉以水聞雷而生臍臍與地連及長驚以水聲臍乃斷便能行囓草至秋可食臍内復有種名瓏種羊段公路北户録云大秦國有地生羊其羔生土中國人築墻圍之臍與地連割之則死但走馬擊鼓以駭之驚鳴臍絶便逐水草吳䇿淵頴集云西域地生羊以脛骨種土中聞雷聲則羊子從骨中生走馬驚之則臍脫也其皮可為褥一云漠北人種羊角而生大如兎而肥美三說稍異未知果種何物也當以劉說為是然亦神矣造化之妙微哉羵羊土之精也其肝上也有雌雄不食季桓子曾掘土得之又千歳樹精亦為青羊羊肉氣味苦甘大熱無毒詵曰温頌曰本經云甘素問云苦葢經以味言素問以理言羊性熱屬火故配於苦羊之齒骨五臓皆温平惟肉性大熱也時珍曰熱病及天行病瘧疾病後食之必發熱致危妊婦食之令子多熱白羊黑頭黒羊白頭獨角者並有毒食之生癰禮曰羊􅀈毛而毳者羶又云煑羊以杏仁或瓦片則易糜以胡桃則不臊以竹䶉則助味中羊毒者飲甘草湯則解銅器煑之男子損陽女子暴下物性之異如此不可不知汪機曰及半夏菖蒲同蕎麵豆醤食發痼疾同醋食傷人心主治暖中字乳餘疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚别録止痛利産婦思邈治風眩瘦病丈夫五勞七傷小兒驚癎孟詵開胃徤力日華發明頌曰肉多入湯劑胡洽方有大羊肉湯治婦人産後大虚心腹絞痛厥逆醫家通用大方也宗奭曰仲景治寒疝羊肉湯服之無不騐者一婦冬月生産寒入子户腹下痛不可按此寒疝也醫欲投抵當湯予曰非其治也以仲景羊肉湯減水二服即愈李㫤曰羊肉有形之物能補有形肌肉之氣故曰補可去弱人參羊肉之屬人參補氣羊肉補形凡味同羊肉者皆補血虚盖陽生則隂長也時珍曰按開河記云隋大總管麻叔謀病風逆起坐不得煬帝命太醫令巢元方視之曰風入腠理病在胸臆須用嫩肥羊蒸熟糝藥食之則瘥如其言未盡劑而痊自後每殺羊羔同杏酪五味日食數枚觀此則羊肉補虚之功益可證矣附方舊八新十六羊肉湯張仲景治寒勞虚羸及産後心腹疝痛用肥羊肉一斤水一斗煑汁八升入當歸五兩黄茋八兩生薑六兩煑取二升分四服胡洽方無黄茋千金方有芍藥金匱要畧産後厥痛胡洽大羊肉湯治婦人産後大虚心腹絞痛厥逆用羊肉一斤當歸芍藥甘草各七錢半用水一斗煑肉取七升入諸藥煑二升服産後虚羸腹痛冷氣不調及腦中風汗自出白羊肉一斤切治如常調和食之心鏡産後帶下産後中風絶孕帶下赤白用羊肉二斤香䜴大蒜三兩水一斗煑五升納酥一升更煑二升服千金方崩中垂死肥羊肉三斤水二斗煑一斗三升入生地黄一升乾薑當歸三兩煑三升分四服千金補益虚寒用精羊肉一斤碎白石英三兩以肉包之外用荷葉裹定於一石米下蒸熟取出去石英和葱薑作小餛飩子毎日空腹以泠漿水吞一百枚甚補益千金翼壯陽益腎用白羊肉半斤切生以蒜薤食之三日一度甚妙心鏡五勞七傷虚泠用肥羊肉一腿宻葢煑爛絞取汁服并食肉骨蒸久冷羊肉一斤山藥一斤各爛煑研如泥下米煑粥食之飲饍正要骨蒸𫝊尸用羊肉一拳大煑熟皂莢一尺炙以無灰酒一升銅鐺内煑三五沸去滓入黒錫一兩令病人先啜肉汁乃服一合當吐蟲如馬尾為效外臺虚寒瘧疾羊肉作臛餅飽食之更飲酒暖臥取汗燕國公常見有騐集騐方脾虚吐食羊肉半斤作生以蒜薤醤䜴五味和拌空腹食之心鏡虚泠反胃羊肉去脂作生以蒜薤空腹食之立效外臺壯胃健脾羊肉三斤切粱米二升同煑下五味作粥食飲饍正要老人膈痞不下飲食用羊肉四兩切白麫六兩橘皮末一分薑汁捜如常法入五味作臛食每日一次大效多能鄙事胃寒下痢羊肉一片莨菪子末一兩和以綿裹納下部二度瘥外臺方身面浮腫商陸一升米二斗煑取一斗去滓羊肉一斤切入肉煑熟下葱䜴五味調和如臛法食之肘后方腰痛脚氣木瓜湯治腰膝痛脚氣羊肉一脚草菓五枚粳米二升回回豆即胡豆半升木𤓰二斤取汁入砂糖四兩鹽少許煑肉食之正要消渴利水羊肉一脚瓠子六枚薑汁半合白麵二兩同鹽葱炒食正要捐傷青腫用新羊肉貼之千金方婦人無乳用羊肉六兩麞肉八兩䑕肉五兩作臛啖之崔氏傷目青腫羊肉煑熟熨之聖惠方小兒嗜土買市中羊肉一斤令人以繩繫於地上拽至家洗淨炒炙食或煑汁亦可姚和衆頭上白秃羊肉如作脯法炙香熱搨上不過數次瘥后肘方頭蹄白羊者良氣味甘平無毒大明曰凉補震亨曰羊頭蹄肉性極水水腫人食之百不一愈主治風眩瘦疾小兒驚癎蘇恭腦熱頭眩日華安心止驚緩中止汗補胃治丈夫五勞骨熱熱病後宜食之泠病人勿多食孟詵頭心鏡云已上諸證並宜白羊或蒸或煑或作膾食療腎虚精竭附方新三老人風眩用白羊頭一具如常治食之五勞七傷白羊頭蹄一具淨治更以稻草燒烟薰令黄色水煑半熟納胡椒畢撥乾薑各一兩葱豉各一升再煑去藥食日一具七日即愈千金虚寒腰痛用羊頭蹄一具草果四枚桂一兩薑半斤哈昔泥一豆許胡椒煑食要正皮主治一切風及脚中虚風補虚勞去毛作羔臛食孟詵濕皮臥之散打傷青腫乾皮燒服治蠱毒下血時珍脂青羊者良氣味甘熱無毒丹房鑑源云柔銀軟銅主治生脂止下痢脫肛去風毒産後腹中絞痛思邈治鬼疰蘇頌有胡洽方青羊脂丸去遊風及黑䵟日華熟脂主賊風痿痺飛尸辟温氣止勞痢潤肌膚殺蟲治瘡癬入膏藥透肌肉經絡徹風熱毒氣時珍附方新十三下痢腹痛羊脂阿膠蠟各二兩黍米二升煑粥食之千金妊娠下痢羊脂如棊子大十枚温酒一升服日三千金虚勞口乾千金用羊脂一雞子大淳酒半升棗七枚漬七日食立愈絞外臺用羊脂雞子大納半斤酢中一宿汁含之卒汗不止牛羊脂温酒頻化服之外臺脾横𤓰赤煎羊脂摩之外臺産後虛羸令人肥白健壯羊脂二斤生地黄汁一斗薑汁五升白蜜三升煎如飴温酒服一盃日三小品婦人隂脫煎羊脂頻塗之廣利方發背初起羊脂豬脂切片泠水浸貼熱則易之數日瘥外臺牙齒疳􅉶黑羖羊脂莨菪子等分入盃中燒烟張口熏之千金方小兒口瘡羊脂煎薏苡根塗之活㓜心書豌豆如疥赤黑色者煎青羊脂摩之千金方赤丹如疥不治殺人煎青羊脂摩之數次愈集騐誤吞釘鍼多食豬羊脂久則自出肘后血白羊者良氣味鹹平無毒時珍曰按夏子益竒疾方云凡豬羊血久食則鼻中毛出晝夜長五寸漸如繩痛不可忍摘去復生惟用乳石硇砂等分為丸臨臥服十丸自落也主治女人血虚中風及産後血悶欲絶者熱飲一升即活蘇恭熱飲一升治産後血攻下胎衣治卒驚九竅出血解莽草毒胡蔓草毒又解一切丹石毒發時珍諸出延夀方發明時珍曰外臺云凡服丹石人忌食羊血十年一食前功盡亡此物能制丹砂水銀輕粉生銀硇砂砒霜硫黄乳石鍾乳空青曾青雲母石陽起石孔公蘖等毒凡覺毒發刺飲一升即解又服地黄何首烏諸補藥者亦忌之嶺表異録言其能解胡蔓草毒羊血解毒之功用如此而本草並不言及誠缺文也附方舊二新五衂血一月不止刺羊血熱飲即瘥聖惠産後血攻或下血不止心悶而青身泠欲絶者新羊血一盞飲之三兩服妙梅師大便下血羊血煑熟拌醋食最效民吴球便食療硫黄毒發氣悶用羊血熱服一合效聖惠方食葅吞蛭蛭噉臓血腸痛黄瘦飲熱羊血一二升次早化豬脂一升飲之蛭即下也肘后方誤吞蜈蚣刺豬羊血灌之即吐出昔有店婦吹火筒中有蜈蚣入腹店婦仆地號呌可畏道人劉復真用此法而愈三元延壽書妊娠胎死不出及胎衣不下産後諸疾狼狽者刺羊血熱飲一小盞極效聖惠方乳白􅳶者佳氣味甘温無毒主治補寒泠虚乏别録潤心肺治消渇甄權療虚勞益精氣補肺腎氣和小腸氣合脂作羮補腎虚及男女中風張鼎利大腸治小兒驚癎含之治口瘡日華主心卒痛可温服之又蚰蜓入耳灌之即化成水孟詵治大人乾嘔及反胃小兒噦啘及舌腫並時時温服之時珍解蜘蛛咬毒頌曰劉禹錫傳信方云貞元十年崔員外言有人為蜘蛛咬腹大如妊徧身生絲其家棄之乞食有僧教啖羊乳未幾疾平也發明𢎞景曰牛羊乳實為補腎故北人食之多肥健恭曰北人肥健由不啖鹹腥方土使然何闗飲乳陶以未達故屢有此言時珍曰方土飲食兩相資之陶說固偏蘇說亦過丹溪言反胃人宜時時飲之取其開胃脘大腸之燥也附方舊一新二小兒口瘡羊乳細濾入含之數次愈小品方漆瘡作痒羊乳傅之翼千金面黑令白白羊乳三斤羊􅏬三副和搗每夜洗浄塗之旦洗去總録腦氣味有毒詵曰發風病和酒服迷人心成風疾男子食之損精氣少子白羊黑頭食其腦作腸癰主治入面脂手膏潤皮膚去䵟􅍍塗損傷丹瘤肉刺時珍附方新二發丹如瘤生綿羊腦同朴消研塗之瑞竹堂方足指肉刺刺破以新酒酢和羊腦塗之一合愈古今録騐髓氣味甘温無毒主治男子女人傷中隂陽氣不足利血脈益經氣以酒服之别録却風熱止毒久服不損人孫思邈和酒服補血主女人血虚風悶孟詵潤肺氣澤皮毛滅瘢痕時珍酥删繁治肺虚毛悴髓湯中用之附方新五肺痿骨蒸煉羊脂煉羊髓各五兩煎沸下煉蜜及生地黄汁各五合生薑汁一合不住手攪微火熬成膏每日空心温酒調服一匙或入粥食飲膳正要目中赤翳白羊髓傅之千金舌上生瘡羊脛骨中髓和胡粉塗之妙聖惠白秃頭瘡生羊骨髓調輕粉搽之先以泔水洗浄一日二次數日愈經騐方痘痂不落痘瘡痂疕不落滅瘢方用羊􅀈骨髓煉一兩輕粉一錢和成膏塗之陳文仲方心下並也用白羝羊者良氣味甘温無毒日華曰有孔者殺人主治止憂恚膈氣别録補心蔵器附方新一心氣鬱結羊心一枚咱夫蘭即回回紅花浸水一盞入鹽少許徐徐塗心上炙熟食之令人心安多喜正要肺氣味同心詵曰自三月至五月其中有蟲狀如馬尾長二三寸須去之不去令人痢下主治補肺止欬嗽别録傷中補不足去風邪思邈治渇止小便數同小豆葉煑食之蘇恭通肺氣利小便行水解毒時珍附方舊一新六久嗽肺痿作燥羊肺湯用羊肺一具洗浄以杏仁柿霜真豆粉真酥各一兩白蜜二兩和匀灌肺中白水煑食之葛可久方欬嗽上氣積年垂死用莨菪子炒熟羊肺切曝等分為末以七月七日醋拌每夜服二方寸七粥飲下隔日一服千金水腫尿短青羖羊肺一具微􅨘切曝為末莨菪子一升以三年醋漬搗爛蜜丸梧子大食後麥門冬飲服四丸日三小便大利佳千金小便頻數下焦虚冷也羊肺一具切作羮入少羊肉和鹽䜴食不過三具集騐方渇利不止羊肺一具入少肉和鹽豉作羮食不過三具愈普濟方解中蠱毒生羊肺一具割開入雄黄麝香等分吞之濟生方鼻中瘜肉羊肺湯用乾羊肺一具白术一兩肉蓯蓉通草乾薑芎藭各二兩為末食後米飲服五兩千金方腎氣味同心主治補腎氣虚弱益精髓别録補腎虛耳聾隂弱壯陽益胃止小便治虛損盜汗日華合脂作羮療勞痢甚效蒜薤食之一升療癥􅛎蘇恭治腎虚消渴時珍發明時珍曰千金外臺深師諸方治腎虛勞損消渇脚氣有腎瀝湯方甚多皆用羊腎煑湯煎藥盖用為引嚮各從其類也附方舊二新六下焦虛泠脚膝無力陽事不行用羊腎一枚煑熟和米粉六兩鍊成乳粉空腹食之妙心鏡腎虚精竭羊腎一雙切於豉汁中以五味米糅作羮粥食心鏡五勞七傷陽虚無力經騐用羊腎一對去脂切肉蓯蓉一兩酒浸一夕去皮和作羹下葱鹽五味食對正要治陽氣衰敗腰脚疼痛五勞七傷用羊腎三羊肉半斤葱白一莖枸杞葉一斤同五味煑成汁下米作粥食之虚損勞傷羊腎一枚米一升水一斗煑九升服日三肘后方腎虚腰痛千金用羊腎去膜隂乾為末酒服二方寸七日三正要治卒腰痛羊腎一對咱夫蘭一錢水一盞浸汁入鹽少許塗抹腎上徐徐炙熟空腹食之老人腎硬治老人腎蔵虚寒内腎結硬雖服補藥不入用羊腎子一對杜仲長二寸濶一寸一片同煮熟空心食之令人内腎柔軟然後服補藥鷄峯備急方脇破腸出以香油抹手送入煎人參枸杞子汁温淋之喫羊腎粥十日即愈危氏羊石子即羊外腎也主治腎虚精滑時珍丹本事金鎻用之肝青羖羊者良氣味苦寒無毒頌曰温小𢎞景曰合豬肉及梅子豆食傷人心思邈曰合生椒食傷人五臓最損小兒合苦筍食病青盲妊婦食之令子多厄主治補肝治肝風虚熱目赤暗痛熱病後失明並用子肝七枚作生食神效亦切片水浸貼之蘇恭解蠱毒吴瑞發明時珍曰按倪維徳原機啓微集云羊肝補肝與肝合引入肝經故専治肝經受邪之病今羊肝丸治目有效可徵汪機曰按三元延夀書云凡治目疾以青羊肝為佳有人年八十餘瞳子瞭然夜讀細字云别無服藥但自小不食畜獸肝耳或以本草羊肝明目而疑之盖羊肝明目性也他肝則否凡畜獸臨殺之時忿氣聚於肝肝之血不利於目宜矣附方舊四新十一目赤熱痛看物如隔紗宜補肝益精用青羊肝一具切洗和五味食之鏡心肝虚目赤青羊肝薄切水浸吞之極效龍木論病後失明方同上小兒赤眼羊肝切薄片井水浸貼普濟翳膜羞明有淚肝經有熱也用青羊子肝一具竹刀切和黄連四兩為丸梧子大食逺茶清下七十丸日三服忌鐵器豬肉冷水醫鏡目病昏昏以銅器煮青羊肝用麵餅覆器上鑚兩孔如人眼大以目向上熏之不過三度千金方目病失明青羖羊肝一斤去膜切片入新瓦内炕乾同決明子半升蓼子一合炒為末以白蜜漿服方寸匕日三不過三劑目明至一年能夜見文字食療不能逺視羊肝一具去膜細切以葱㳿一勺炒為末以水煑熟去滓入米煑粥食多能鄙事青盲内障白羊子肝一具黄連一兩熟地黄二兩同搗丸梧子大食逺茶服七十丸日三服崔承元病内障喪明有人惠此方報徳服之遂明信𫝊方牙疳腫痛羯羊肝一具煮熟蘸赤石脂末任意食之醫林集要虚損勞瘦用新豬脂煎取一升入葱白一握煎黄平旦服至三日以枸杞一斤水三斗煮汁入羊肝一具羊脊膂肉一條麵末半斤着葱豉作羮食千金方病後嘔逆天行病後嘔逆食即反出用青羊肝作生淡食不過三度食不出矣外臺休息痢疾五十日以上一二年不瘥變成疳下如泔淀者用生羊肝一具切絲入三年醋中吞之心悶則止不悶更服一日勿食物或以薑薤同食亦可不過二三具臺外小兒癎疾青羊肝一具薄切水洗和五味醤食之婦人隂􅉶作痒羊肝納入引蟲集簡方膽青羯羊者良氣味苦寒無毒主治青盲明目别録㸃赤障白翳風涙眼解蠱毒甄權療疳濕時行熱熛瘡和醋服之良蘇恭治諸瘡能生人身血脈思邈同蜜蒸九次㸃赤風眼有效朱震亨發明時珍曰肝開竅於目膽汁減則目暗目者肝之外候膽之精華也故諸膽皆治目病夷堅志載二百味草花膏治爛弦風赤眼流淚不可近光及一切暴赤目疾用羯羊膽一枚入蜂蜜於内蒸之候乾研為膏每含少許並㸃之一日淚止二日腫消三日痛定蓋羊食百草蜂採百花故有二百花草之名又張三丰真人碧雲膏臘月取羯羊膽十餘枚以蜜裝滿紙套籠住懸簷下待霜出掃下㸃之神效也附方舊三新四病後失明羊膽㸃之日二次肘后大便秘塞羊膽汁灌入即通金千目為物傷羊膽二枚鷄膽三枚鯉魚膽二枚和匀日日㸃之聖惠方面黑皯皰羖羊膽牛膽各一箇淳酒三升煑三沸夜夜塗之肘后産婦面䵟産婦面如雀卵色以羊膽豬胰細辛等分煎三沸夜塗旦以漿水洗之録驗代指作痛崔氏云代指乃五臓熱注而然刺熱湯中七度刺泠水中三度即以羊膽塗之立愈甚效外臺方小兒疳瘡羊膽二枚和醤汁灌下部外臺胃一名羊膍胵氣味甘温無毒思邈曰羊肚和飯飲久食令人多唾清水成反胃作噎病主治胃反止虚汗治虚羸小便數作羮食三五瘥孟詵附方舊一新六久病虚羸不生肌肉水氣在脇下不能飲食四肢煩熱者用羊胃一枚白术一升切水二斗煮九升分九服日三不過三劑瘥張文仲方補中益氣羊肚一枚羊腎四枚地黄三兩乾薑昆布地骨皮各二兩白术桂心人參厚朴海藻各一兩五錢甘草秦椒各六錢為末同腎入肚中縫合蒸熟搗爛晒為末酒服方寸匕千金中風虚弱羊肚一具粳米二合和椒薑䜴葱作羮食之正要胃虚消渇羊肚爛煑空腹食之古今録騐下虚尿牀羊肚盛水煑熟空腹食四五頓瘥千金項下瘰􅕅用羊膍胵燒灰香油調敷蛇傷手腫新剥羊肚一箇帶糞割一口将手入浸即時痛止腫消集要脬主治下虚遺溺以水盛入炙熟空腹食之四五次愈孫思邈􅏬白羊者良主治潤肺燥諸瘡瘍入面脂去䵟􅍍澤肌膚滅瘢痕時珍附方新三逺年欬嗽羊􅏬三具大棗百枚酒五升漬七日飲之肘后方婦人帶下羊􅏬一具以酢洗浄空心食之不過三次忌魚肉滑物犯之即死外臺痘瘡瘢痕羊􅏬二具羊乳一斤甘草末二兩和匀塗之明旦以豬蹄湯洗去千金舌主治補中益氣正要用羊舌二枚羊皮二具羊腎四枚蘑菰糟薑作羮肉汁食之靨即會咽也氣味甘淡温無毒主治氣癭時珍發明時珍曰按古方治癭多用豬羊靨亦述類之義故王荆公癭詩有内療煩羊靨之句然癭有五氣血肉筋石也夫靨屬肺肺司氣故氣癭之證服之或效他癭恐亦少力附方舊一新二項下氣癭外臺用羊靨一具去脂酒浸炙熟含之嚥汁日一具七日瘥千金用羊靨七枚隂乾海藻乾薑各二兩桂心昆布逆流水邊栁髪各一兩為末蜜丸芡子大每含一丸嚥津二襍病治例用羊靨豬靨各二枚昆布海藻海帶各錢洗焙牛旁子炒四錢右為末搗二靨和丸彈子大每服一丸含化嚥汁睛主治目赤及翳膜曝乾為末㸃之時珍金出千熟羊眼中白珠二枚於細石上和棗核磨汁㸃目翳羞明頻用三四日瘥孟詵發明時珍曰羊眼無瞳其睛不應治目豈以其神蔵於内耶筋主治塵物入目熟嚼納背中仰卧即出千金翼羖羊角青色者良氣味鹹温無毒别録曰苦微寒取之無時勿使中濕濕即有毒甄權曰大寒縮兎絲為之使鑑源云羖羊角灰賀賀錫也出賀州主治青肓明目止驚悸寒洩久服安心益氣輕身殺疥蟲入山燒之辟惡鬼虎狼本經療百節中結氣風頭痛及蠱毒吐血婦人産後餘痛别録燒之辟蛇灰治漏下退熱主山障溪毒日華附方舊三新七風疾恍惚心煩腹痛或時悶絶復甦以青羖羊角屑微炒為末無時温酒服一錢聖惠氣逆煩滿水羊角燒研水服方寸匕普濟方吐血喘欬青羖羊角炙焦二枚桂末二兩為末每服一七糯米飲下日三服同上産後寒熱心悶極脹百病羖羊角燒末酒服方寸匕子母秘録水洩多時羖羊角一枚白礬末填滿燒存性為末每新汲水服二錢聖惠方小兒癎疾羖羊角燒存性以酒服少許普濟赤秃髪落羖羊角牛角燒灰等分豬脂調敷普濟赤癍瘭子身面卒得赤癍或瘭子腫起不治殺人羖羊角燒灰雞子清和塗甚妙肘后打撲傷痛羊肉灰以沙糖水拌瓦焙焦為末毎熱酒下二錢仍探痛處簡便脚氣疼痛羊角一副燒過為末熱酒調塗以帛裹之取汁永不發也齒三月三日取之氣味温主治小兒羊癎寒熱别録頭骨已下並用羖羊者良氣味甘平無毒時珍曰按張景陽七命云耶溪之鋌赤山之精消以羊骨鏵以鍛成註云羊頭骨能消鐵也主治風眩瘦疾小兒驚癎蘇恭脊骨氣味甘熱無毒主治虛勞寒中羸瘦别録補腎虚通督脈治腰痛下痢時珍附方舊一新八老人胃弱羊脊骨一具槌碎水五升煎取汁二升入青粱米四合煮粥常食食治方老人虚弱白羊脊骨一具剉碎水煑取汁枸杞根剉一斗水五斗煑汁一斗五升合汁同骨煑至五升去骨瓷盒盛之每以一合和温酒一盞調服多能鄙事腎虚腰痛心鏡用羊脊骨一具槌碎煑和蒜薤食飲少酒妙水正要用羊脊骨一具槌碎肉蓯蓉一兩草果五枚煑汁下葱醤作羮食腎虚耳聾羖羊脊骨一具炙研磁石煅醋淬七次白术黄茋乾薑炮白茯苓一兩桂三分為末每服五錢水煎服普濟虛勞白濁羊骨為末酒服方寸匕日三千金小便膏淋羊骨燒研榆白皮煎湯服二錢聖惠方洞注下痢羊骨灰水服方寸匕千金方疳瘡成漏膿水不止用羊羔兒骨鹽泥固濟煅過研末五錢入麝香雄黄末各一錢填瘡口三日外必合總微論尾骨主治益腎明目補下焦虚泠正要附方新一虚損昏聾大羊尾骨一條水五碗煑减半入葱白五莖荆芥一握陳皮一兩麵三兩煑熟取汁捜麵作索餅同羊肉四兩煑熟和五味食多能鄙事脛骨音行亦作䯒又名􅀈骨胡人名頗兒必入藥煅存性用氣味甘温無毒詵曰性熱有宿熱人勿食鑑源云羊􅀈骨伏硇主治虚冷勞孟詵脾弱腎虚不能攝精白濁除濕熱徤腰脚固牙齒去䵟􅍍治誤吞銅錢時珍發明杲曰齒者骨之餘腎之標故牙疼用羊脛骨以補之時珍曰羊脛骨灰可以磨鏡羊頭骨可以消鐵故誤吞銅鐵者用之取其相制也按張景陽七命云耶溪之鋌赤山之精消以華骨鏵以鍛成註云羊頭骨能消鐵也又名醫録云漢上張成忠女七八歳誤吞金饋子一雙胸膈痛不可忍憂惶無措一銀匠炒末藥三錢米飲服之次早大便取下叩求其方乃羊脛灰一物耳談野翁亦有此方皆巧哲格物䆒理之妙也附方新十一擦牙固齒食鑑用火煅羊脛骨為末入飛鹽二錢同研匀日用又方燒白羊脛骨灰一兩升麻一兩黄連五錢為末日用煅瀕湖方用羊脛骨燒過香附子燒黑各一兩青鹽過生地黄燒黑各五錢研用濕熱牙疼用羊脛骨灰二錢白芷當歸牙皂青鹽各一錢為末擦之方東垣脾虚白濁過慮傷脾脾不能攝精遂成此疾以羊脛骨灰一兩薑制厚朴末二兩麵糊丸梧子大米飲下百丸日二服一加茯苓一兩半濟生方虚勞瘦弱用頗兒必四十枚以水一升熬減大半去滓及油待凝任食正要筋骨攣痛用羊脛骨酒浸服之月水不斷羊前左脚脛骨一條紙裹泥封令乾煅赤入棕櫚灰等分每服一錢温酒服之䵟􅍍醜陋治人面體黧黑皮厚狀醜用羖羊脛骨為末雞子白和敷旦以白粱米泔洗之三日如素神效肘后誤吞銅錢羊脛骨燒灰以煑稀粥食神效談埜翁方咽喉骨哽羊脛骨灰米飲服一錢聖惠懸蹄毛主治轉筋醋煑裹脚孟詵氊又見鬚羖羊者良主治小兒口瘡蠼螋尿瘡燒灰和油敷時珍出廣濟附方新二香瓣瘡生面上耳瘡浸淫水出久不愈用羖羊鬚荆芥乾棗肉各二錢燒存性入輕粉半錢每洗拭清油調搽二三次必愈聖惠方口吻瘡方同上溺主治傷寒熱毒攻手足腫痛欲斷以一升和鹽豉搗漬之李時珍屎青羖羊者良氣味苦平無毒時珍曰制粉霜主治燔之主小兒洩痢腸鳴驚癎别録燒灰理聤耳并罯竹刺入肉治箭鏃不出日華燒灰淋汁沭頭不過十度即生髪長黑和雁肪塗頭亦良蔵器燒頌曰屎納鯽魚腹中瓦缶固濟灰塗髪易生而黑甚效煑湯灌下部治大人小兒腹中諸疾泔熱大小便不通燒烟熏鼻治中惡心腹刺痛亦熏諸瘡中毒痔瘻等治骨蒸彌良蘇恭附方舊五新十六疳痢欲死新羊屎一升水一升漬一夜絞汁頭服日午乃食極重者不過三服總録嘔逆酸水羊屎十枚酒二合煎一合頓服未定更服之兵部手集反胃嘔食羊糞五錢童子小便一大盞煎六分去滓分三服聖惠小兒流涎白羊屎頻納口中千金心氣疼痛不問逺近以山羊糞七枚油頭髪一團燒灰酒服永斷根孫氏集效方妊娠熱病青羊屎研爛塗臍以安胎氣外臺秘要傷寒肢痛手足疼欲脫取羊屎煑汁漬之瘥乃止或和豬膏塗之亦佳外臺時疾隂腫囊及莖皆熱腫以羊屎黄蘗煮汁洗之外臺疔瘡惡腫青羊屎一升水二升漬少時煑沸絞汁一升頓服廣濟方裏外臁瘡羊屎燒存性研末入輕粉塗之集要痘風瘡證羊屎燒灰清油調敷之全如心鑑小兒頭瘡羊糞煎湯洗浄仍以羊糞燒灰同屋上懸煤清油調塗普濟頭風白屑烏羊糞煎汁洗之聖惠髪毛黄赤羊屎燒灰和臘豬脂塗之日三夜一取黑乃止惠聖方木刺入肉乾羊屎燒灰豬脂和塗不覺自出千金箭鏃入肉方同上反花惡瘡鯽魚一箇去腸以羯羊屎填滿燒存性先以米泔洗過搽之漯癧已破羊屎燒五錢杏仁燒五錢研末豬骨髓調搽海上濕瘑浸淫新羊屎絞汁塗之乾者燒烟薰之總聖濟録雷頭風病羊屎焙研酒服二錢普濟方慢脾驚風活脾散用羊屎二十一箇炮丁香一百粒胡椒五十粒為末每服半錢用六年東日照處壁土煎湯調下聖濟録羊胲子乃羊腹内草積塊也主治翻胃煅存性每一斤入棗肉平胃散末一半和匀每服一錢空心沸湯調下葉氏摘𤣥黄羊綱目釋名羳羊音煩璽耳羊時珍曰羊腹帶黄故名或云幼稚曰黄此羊肥小故也爾雅謂之羳出西畨也其耳甚小西人謂之蠒耳集解時珍曰黄羊出闗西西畨及桂林諸處有四種狀與羊同但低小細肋腹下帶黄色角似羖羊喜臥沙地生沙漠能走善臥獨居而尾黑者名黑尾黄羊生野草内或羣至數十者名曰黄羊生臨洮諸處甚大而尾似麞鹿者名洮羊其皮皆可為衾褥出南方桂林者則深褐色黒脊口斑與鹿相近也肉氣味甘温無毒正要云煑湯少味腦不可食主治補中益氣治勞傷虚寒時珍髓主治補益功同羊髓正要本草綱目卷五十上
