  text: 本草綱目卷四十目録蟲之二卵生類下二十二種青蚨拾遺蛺蝶綱目蜻蛉别録蝏即蜻樗雞本經子即紅娘棗貓綱目斑蝥本經芫青别録葛上亭長别録地膽本經蜘蛛别録草蜘蛛拾遺壁錢拾遺螲蟷拾遺蛛即土蜘􅙴開寳水蛭本經蟻綱目附白蟻青腰蟲拾遺蛆綱目蠅綱目狗蠅綱目附壁蝨牛蟲綱目人蝨右附方舊二十新八十一本草綱目卷四十目録
