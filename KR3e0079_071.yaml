body:
  text: 本草綱目卷二十八明李時珍撰菜之三蓏菜類一十一種内附一種茄音伽寳宋開釋名落蘇拾遺崑崙𤓰御覧草鼈甲頌曰按段成式云茄音加乃蓮莖之名今呼茄菜其音若伽未知所自也時珍曰陳藏器本草云茄一名落蘇名義未詳按五代貽子録作酪酥蓋以其味如酥酪也於義似通杜寳拾遺録云隋焬帝改茄曰崑崙紫𤓰又王隱君養生主論治瘧方用乾茄諱名草鼈甲葢以鼈甲能治寒熱茄亦能治寒熱故爾集解頌曰茄子處處有之其類有數種紫茄黄茄黄南北有白茄青水茄惟北土有之入藥多用茄其餘惟可作菜茄爾江南一種藤茄作蔓生皮薄似壺蘆亦不聞中藥宗奭曰新羅國出一種茄形如鷄子淡光微紫色蔕長味甘今中國已遍有之時珍曰茄種宜於九月黄熟時收取洗淨曝乾至二月下種移栽株高二三尺葉大如掌自夏至秋開紫花五瓣相連五稜如縷黄蕊緑蒂蒂包其茄茄中有瓤瓤中有子子如脂麻其茄有團如括樓者長四五寸者有青茄紫茄白茄白茄亦名銀茄更勝青者諸茄至老皆黄蘇頌以黄茄為一種似未深究也王禎農書云一種渤海茄白色而堅實一種畨茄白而扁甘脆不澀生熟可食一種紫茄形紫蒂長味甘一種水茄形長味甘可以止渴洪容齋隨筆云浙西常茄皆皮紫其白者為水茄江南常茄皆皮白其紫者為水茄亦一異也劉珣嶺表録云交嶺茄樹經冬不凋有二三年漸成大樹者其實如𤓰也茄葉摘布路上以灰圍之則子必繁謂之嫁茄茄子氣味甘寒無毒志曰几久冷人不可多食損人動氣發瘡及痼疾李廷飛曰秋後食多損目時珍曰按生生編云茄性寒利多食必腹痛下利女人能傷子宫也主治寒熱五臓勞孟詵治温疾傳尸勞氣醋摩傅腫毒大明老裂者燒灰治乳裂震亨散血止痛消腫寛腸時珍發明宗奭曰蔬圃中惟此無益開寳本草並無主治止説損人後人雖有處治之法終與正文相失圃人又下於暖處厚加糞瓖遂於小滿前後求貴價以售既不以時損人益多不時不食烏可忽也震亨曰茄属土故甘而喜降大腸易動者忌之老實治乳頭裂茄根煑湯漬凍瘡折蒂燒灰治口瘡俱獲竒効皆甘以緩火之意也時珍曰段成式酉陽雜俎言茄厚腸胃動氣發疾葢不知茄之性滑不厚腸胃也附方舊五新十婦人血黄黄茄子竹刀切隂乾為末每服二錢温酒調下摘𤣥方腸風下血經霜茄連蒂燒存性為末每日空心温酒服二錢七靈苑方久患下血大茄種三枚每用一枚濕紙包煨熟安瓶内以無灰酒一升半沃之蠟紙封閉三日去茄暖飲普濟方腹内鼈癥陳醬茄兒燒存性入麝香輕粉少許脂調貼之夀域方卵㿉偏墜用雙蒂茄子懸于房門上出入用眼視之茄蔫所患亦蔫茄乾亦乾矣又方用雙茄懸門上每日抱兒視之二三次釘鍼于上十餘日消矣劉松石保夀堂方大風熱痰用黄老茄子大者不計多少以新瓶盛埋土中經一年盡化為水取出入苦參末同丸梧子大食已及卧時酒下三十丸甚効此方出江南人傳經蘓頌圖本草腰脚拘攣腰脚風血積冷筋急拘攣疼痛者取茄子五十斤切洗以水五斗煑取濃汁濾去滓更入小鐺中煎至一升以來即入生粟粉同煎令稀稠得所取出搜和更入麝香朱砂末同丸如梧子大毎日用秫米酒送下三十丸近暮再服一月乃瘥男子女人通用皆騐圖經本草磕撲青腫老黄茄極大者切片如一指厚新瓦焙研為末欲卧時温酒調服二錢匕一夜消盡無㾗迹也勝金墜損跌撲散血止痛重陽日收老茄子百枚去蒂四破切之消石十二兩擣碎以不津器先鋪茄子一重乃下消石一重如此間鋪令盡以紙數層密封安置淨處上下用新磚承覆勿犯地氣至正月後取出去紙兩重日中曝之遂日如此至二三月度茄已爛開瓶傾出濾去滓别入新器中以薄綿葢頭又曝至成膏乃可用每以酒調半匙空腹飲之日再惡血散則痛止而愈矣若膏久乾硬即以飯飲化動用之圖經本草發背惡瘡用上方以酒服半匙更以膏塗瘡口四圍覺冷如水瘡乾便瘥其有根本在膚腠者亦可内消同上熱毒瘡腫生茄子一枚割去二分去瓤二分似罐子形合于瘡上即消也如已出膿再用取瘥聖濟總録牙齒腫痛隔年糟茄燒灰頻頻乾擦立効海上名方蟲牙疼痛黄茄種燒灰擦之効摘𤣥方喉痺腫痛糟茄或醤茄細嚼嚥汁德生堂方婦人乳裂秋月冷茄子裂開者隂乾燒存性研末水調塗補遺方蔕主治燒灰米飲服二錢治腸風下血不止及血痔吳瑞燒灰治口齒瘡䘌生切擦癜風時珍發明時珍曰治癜風用茄蔕蘸硫附末掺之取其散血也白癜用白茄蒂紫癜用紫茄蔕亦各從其類耳附方新一風蛀牙痛茄蔕燒灰掺之或加細辛末等分日用之仁存方花主治金瘡牙痛時珍附方新一牙痛秋茄花乾之旋燒研塗痛處立止海上名方根及枯莖葉主治凍瘡皴裂煑湯漬之良開寳散血消腫治血淋下血血痢隂挺齒䘌口蕈時珍附方新八血淋疼痛茄葉熏乾為末每服二錢温酒或鹽湯下隔年者尤佳經騐良方腸風下血方同上米飯下久痢不止茄根燒灰石榴皮等分為末以沙糖水服之簡便單方女隂挺出茄根燒存性為末油調在紙上捲筒安入内一日一上乾坤生意口中生蕈用醋潄口以茄母燒灰飛鹽等分米醋調稀時時擦之摘𤣥方牙齒䘌痛茄根擣汁頻塗之潄陳茄樹燒灰傅之先以露蜂房煎湯過海上名方牙痛取牙茄科以馬尿浸三日晒炒為末每用㸃牙即落真妙鮑氏方夏月趾腫不能行走者九月收茄根懸簷下逐日煎湯洗之簡便苦茄拾遺集解藏器曰苦茄野生嶺南樹小有刺子主治醋摩塗癰腫根亦可作湯浴又主瘴氣藏器壺蘆日華釋名瓠𤓰説文匏𤓰論語時珍曰壺酒器也蘆飲器也此物各象其形又可為酒飲之器因以名之俗作葫蘆者非矣葫乃蒜名蘆乃葦属也其圓者曰匏亦曰瓢因其可以浮水如泡如漂也凡蓏属皆得稱𤓰故曰瓠𤓰瓠𤓰古人壺瓠𤓰三名皆可通稱初無分别故孫愐唐韻云瓠音壺又音䕶瓠臚瓢也陶隱居本草作瓠􅕕云是瓠類也許慎説文云瓠匏也又云瓢瓠也匏大腹瓠也陸璣詩疏云壺瓠也又云匏瓠也莊子云有五石之瓠諸書所言其字皆當與壺同音而後世以長如越𤓰首尾如一者為瓠音護瓠之一頭有腹長柄者為懸瓠無柄而圓大形扁者為匏匏之有短柄大腹者為壺壷之細腰者為蒲蘆各分名色逈異於古以今叅詳其形狀雖各不同而苗葉皮子性味則一故兹不復分條焉懸瓠今人所謂茶酒瓢者是也蒲蘆今之藥壺盧是也郭義恭廣志謂之約腹壺以其腹有約束也亦有大小二種也集解𢎞景曰瓠與冬𤓰氣類同輩又有瓠􅕕亦是瓠類小者名瓢食之乃勝瓠此等皆利水道所以在夏月食之大約不及冬𤓰也恭曰瓠與瓠􅕕𤓰全非類例三物苖葉相似而實形則異瓠形似越𤓰長尺餘頭尾相似夏中便熟秋末便枯瓠􅕕形狀大小非一夏末始實秋中方熟取其為器經霜乃堪瓠與甜瓠􅕕體性相類啖之俱勝冬𤓰陶言不及是未悉此等原種各别也時珍曰長瓠懸瓠壺盧匏𤓰蒲盧名狀不一其實一類各色也處處有之伹有遲早之殊陶氏言瓠與冬𤓰氣類同輩蘇氏言瓠與瓠􅕕全非類例皆未可慿數種並以正二月下種生苗引蔓延緣其葉似冬𤓰葉而稍圓有柔毛嫩時可食故詩云幡幡瓠葉采之烹之五六月開白花結實白色大小長短各有種色瓤中之子齒列而長謂之瓠犀竊謂壺匏之属既可烹晒又可為器大者可為甕盎小者可為瓢樽為要舟可以浮水為笙可以奏樂膚瓤可以養豕犀瓣可以澆燭其利博矣壺瓠氣味甘平滑無毒恭曰甘冷多食令人吐利扁鵲曰患脚氣虚脹冷氣者食之永不除也主治消渴惡瘡鼻口中肉爛痛思邈利水道𢎞景消熱服丹石人宜之孟詵除煩治心熱利小腸潤心肺治石淋大明發明時珍曰按名醫錄云浙人食匏𤓰多吐㵼謂之發暴葢此物以暑月壅成故也惟與香葇同食則可免附方新一腹脹黄腫用亞腰壺盧連子燒存性每服一個食前温酒下不飲酒者白湯下十餘日見効簡便方葉氣味甘平無毒主治為茹耐饑思邈蔓鬚花主治解毒時珍附方新一預解胎毒七八月或三伏日或中秋日剪壺盧鬚如環子脚者隂乾於除夜煎湯浴小兒則可免出痘唐珤經騐方子主治齒齗或腫或露齒揺疼痛用八兩同牛膝四兩每服五錢煎水含潄日三四次御藥院方苦瓠本經下品釋名苦匏國語苦壺蘆集解别錄曰苦瓠生晋地𢎞景曰今瓠忽有苦者瓠如膽不可食非别生一種也又有瓠􅕕亦是類恭曰本經所論都是苦瓠􅕕爾陶謂瓠中苦者大誤矣瓠中時有苦者不入藥用無所主療亦不堪啖瓠與瓠􅕕原種各别非甘者變為苦也保昇曰瓠即匏也有甘苦二種甘者大苦者小機曰瓠壼有原種是甘忽變為苦者俗謂以鷄糞壅之或牛馬踐踏則變為苦陶説亦有所見未可盡非也時珍曰詩云瓠有苦葉國語云苦匏不材於人共濟而已皆指苦壺而言即苦瓠也瓠壺同音陶氏以瓠作䕶音釋之所以不穩也應劭風俗通云燒穰可以殺瓠或云畜瓠之家不燒穣種𤓰之家不焚漆物性相畏也蘇恭言服苦瓠過分吐利不止者以黍穣灰汁解之盖取乎此凡有苦瓠須細理瑩淨無黶翳者乃佳不爾有毒瓤及子氣味苦寒有毒主治大水面目四肢浮腫下水令人吐本經利石淋吐呀嗽囊結疰蠱痰飲又煮汁漬隂療小便不通蘇恭煎汁滴鼻中出黄水去傷冷鼻塞黄疸藏器吐蚘蟲大明治癰疽惡瘡疥癬齲齒有蟲䘌者又可制汞時珍附方舊八新十七急黄病苦瓠一枚開孔以水煮之攪取汁滴入鼻中去黄水陳藏器黄疸腫滿苦壺蘆瓤如大棗許以童子小便二合浸之一時取兩酸棗大納兩鼻中深吸氣待黄水出良愈又方用瓠瓤熬黄為末毎服半錢日一服十日然有吐者當詳之傷寒類要大水脹滿頭面洪大用瑩凈好苦瓠白瓤捻如豆粒以二麵裏煑一沸空心服七枚至午當出水一斗日水自出不止大痩乃瘥二年内忌醎物一聖惠用苦壺盧瓤一兩微炒為末每日粥飯服錢通身水腫苦瓠膜炒二兩苦葶藶五分擣合九小豆大每服五丸日三水下止又用苦瓠膜五分大棗七枚擣丸一服三丸如人行十里許又服三丸水出更服一丸即止並千金方石水腹腫四肢皆瘦削用苦瓠膜炒一兩杏仁半兩炒去皮尖為末糊丸小豆大毎飲下十丸日三水下止聖濟總録水蠱洪腫苦瓠瓤一枚水二升煮至一升煎至可丸如小豆大毎米飲下十丸待小便利作小豆羮食勿飲水小便不通脹急者用苦瓠子三十枚炒螻三個焙為末毎冷水服一錢濟並聖總録小兒閃癖取苦瓠未破者煑令熱解開熨之陳藏器本草風痰頭痛苦瓠膜取汁以葦管灌入鼻中其氣上衝腦門須臾惡涎流下其病立愈除根勿以昬運為疑乾者浸汁亦効其子為末吹入亦効年久頭風皆愈普濟方鼻窒氣塞苦壺盧子為末醇酒浸之夏一日冬七日日日少少㸃之聖惠方眼目昬暗七月七日取苦瓠白瓤絞汁一合以酢二升古錢七文同以微火煎减半毎日取沬納眥中神効千金弩肉血瞖秋間取小柄壺盧或小藥壺盧隂乾於𦂳小處鋸斷内穵一小孔如眼孔大遇有此病將眼皮上下用手掙開將壺盧孔合定初雖甚痛苦然瘀肉血瞖皆漸下不傷睛也劉松石經騐方齒䘌口臭苦瓠子為末蜜丸半棗大毎旦潄口了含一丸仍塗齒齗上涎出吐去妙聖恵方風蟲牙痛壺盧子半升水五升煎三升含潄之莖葉亦可不過三度聖惠方惡瘡癬癩十年不瘥者苦瓠一枚煑汁搽之日三度方肘后九瘻有孔苦瓠四枚大如盞者各穿一孔如指大湯煑十數沸取一竹筒長一尺一頭挿瓠孔中一頭注瘡孔上冷則易之用遍乃止千金方痔瘡腫痛苦壺盧苦蕒菜煎湯先熏後洗乃貼熊膽蜜陀僧膽礬片腦末良摘𤣥方下部懸癰擇人神不在日空心用井華水調百藥煎末一椀服之微利後却用秋壺盧一名苦不老生在架上而苦者切片置瘡上灸二七壯蕭端式病此連年一灸遂愈永類鈐方卒中蠱毒或吐血或下血皆枚如爛肝者苦瓠十水二升煑一升服立吐即愈又方用苦酒一升煑令消服之取吐神騐肘後方死胎不下苦壺盧燒存性研末毎服一錢空心熱酒下海上名方聤耳出膿乾瓠子一分黄連半錢為末以綿先繳淨吹入半字日二次聖惠方鼻中息肉苦壺盧子苦丁香等分入麝香少許為末紙燃㸃之聖惠方花主治一切瘻瘡霜後收曝研末傅之時珍蔓主治痳瘡煎湯浴之即愈時珍稗出仇逺史附方新一小兒白秃瓠藤同裏鹽荷葉煎濃汁洗三五次愈總録敗瓢綱目集解時珍曰瓢乃匏壺破開為之者近世方藥亦時用之當以苦瓠者為佳年久者尤妙氣味苦平無毒主治消脹殺蟲治痔漏下血崩中帶下赤白時珍附方新六中滿鼓脹用三五年陳壺蘆瓢一個以糯米一斗作酒待熟以瓢於炭火上炙熱入酒浸之如此三五次將瓢燒存性研末每服三錢酒下神効余居士選奇方大便下血敗瓢燒存性黄連等分研末每空心温酒服二錢簡便方赤白崩中舊壺盧瓢炒存性蓮房煆存性等分研末每服二錢熱水調服三服有汗為度即止甚者五服止最妙忌房事發物生冷海上方腦漏流膿破瓢白鷄冠花白螺螄殻各燒存性等分血竭麝香各五分為末以好酒酒濕熟艾連藥揉成餅占在頂門上以熨斗熨之以愈為度孫氏集效方腋下瘤癭用長柄茶壺盧燒存性研末搽之以消為度一府校老嫗右腋生一瘤漸長至尺許其狀如長瓠子久而潰爛一方士敎以此法用之遂出水消盡而愈瀕湖集簡方湯火傷灼舊壺盧瓢燒灰傅之同上冬𤓰本經上品校正今併入白𤓰子釋名白𤓰本經水芝同上地芝廣雅白志曰冬𤓰經霜後皮上如粉塗其子亦白故名白冬𤓰而子云白𤓰子也時珍曰冬𤓰以其冬熟也又賈思勰云冬𤓰正二三月種之若十月種者結𤓰肥好乃勝春種則冬𤓰之名或又以此也别録白冬𤓰原附於本經𤓰子之下宋開寳本草加作白𤓰子復分白冬𤓰為别録一種遂致諸註辯説紛紛今併為一集解别錄曰白𤓰子生嵩髙平澤冬𤓰仁也八月采之頌曰今處處園圃蒔之其實生苖蔓下大者如斗而更長皮厚而有毛初生正青緑經霜則白粉人家多藏蓄彌年作菜果入藥須霜後取置之經年破出核洗燥乃擂取仁用之亦堪單作服餌時珍曰冬𤓰三月生苗引蔓大葉團而有尖莖葉皆有刺毛六七月開黄花結實大者徑尺餘長三四尺嫩時緑色有毛老則蒼色有粉其皮堅厚其肉肥白其瓤謂之𤓰練白虚如絮可以浣練衣服其子謂之𤓰犀在瓤中成列霜後取之其肉可煮為茹可蜜為果其子仁亦可食蓋兼蔬果之用凡收𤓰忌酒漆麝香及糯米觸之必爛白冬𤓰氣味甘微寒無毒𢎞景曰冷利主治小腹水脹利小便止渴别錄擣汁服止消渴煩悶解毒𢎞景益氣耐老除心胸滿去頭面熱孟詵消熱毒癰腫切片摩疿子甚良大明利大小腸壓丹石毒蘇頌發明詵曰熱者食之佳冷者食之瘦人煑食練五臟為其下氣故也欲得體瘦輕徤者則可長食之若要肥則勿食也宗奭曰凡患發背及一切癰疽者削一大塊置瘡上熱則易之分散熱毒氣甚良震亨曰冬𤓰性走而急寇氏謂其分散熱毒氣蓋亦取其走而性急也久病者隂虚者忌之孫真人言九月勿食令人反胃須被霜食之乃佳諸詵曰取𤓰一顆和桐葉與猪食之一冬更不要與物食自然不饑長三四倍也附方舊八新六積熱消渴白𤓰去皮每食後喫二三兩五七度良孟詵食療消渴不止冬𤓰一枚削皮埋濕地中一月取出破開取清水日飲之或燒熟絞汁飲之聖濟總録消渴骨蒸大冬𤓰一枚去瓤入黄連末填滿安瓮内待𤓰消盡同研丸梧子大毎服三四十丸煎冬𤓰湯下騐經産後痢渴久病津液枯竭四肢浮腫口舌乾燥用冬𤓰一枚黄土泥厚五寸煨熟絞汁飲亦治傷寒痢渴古今録騐小兒渴痢冬𤓰汁飲之千金小兒鬾病寒熱如疳用冬𤓰萹蓄各四兩水二升煎湯浴之千金方嬰孩寒熱冬𤓰炮熟絞汁飲子母秘録水病危急冬𤓰不拘多少任意喫之神效無比兵部手集十種水氣浮腫喘滿用大冬𤓰一枚切蓋去瓤以赤小豆填滿蓋合煨簽定以紙筋泥固濟日乾用糯糠兩大籮入𤓰在内至火盡取出切片同豆焙乾為末水糊丸梧子大每服七十丸煎冬𤓰子湯下日三服小便利為度楊氏家藏方發背欲死冬𤓰截去頭合瘡上𤓰爛截去更合之𤓰未盡瘡已小歛矣乃用膏貼之後肘方痔瘡腫痛冬𤓰煎湯洗之袖珍方馬汗入瘡乾冬𤓰燒研洗淨傅之食魚中毒冬𤓰汁飲之良小品方面黒令白冬𤓰一個竹刀去皮切片酒一升半水一升煑爛濾去滓熬成膏瓶收每夜塗之聖濟總録𤓰練𤓰瓤氣味甘平無毒主治絞汁服止煩躁熱渴利小腸治五淋壓丹石毒甄權洗面澡身去䵟􅍍令人悦澤白晢時珍附方新二消渴煩亂冬𤓰瓤乾者一兩水煎飲聖惠方水腫煩渴小便少者冬𤓰白瓤水煑汁淡飲之聖濟總録白𤓰子别錄曰冬𤓰仁也八月采之正誤恭曰此甘𤓰也甘字似白字後人誤寫耳當改從甘字志曰本草註白𤓰子冬𤓰仁也蘓氏所言殊為孟浪且甘𤓰即甜𤓰𤓰亦有青白二種其子色黄主療與冬𤓰全異但冬𤓰經霜有白衣其子亦白白𤓰之號因斯而得况諸方惟用冬𤓰子不見用甘𤓰子者蘓説不可凴也氣味甘平無毒别錄曰寒久服寒中主治令人悦澤好顔色益氣不饑久服輕身耐老本經除煩滿不樂可作面脂别錄去皮膚風及黑䵟潤肌膚大明治腸癰時珍發明頌曰冬𤓰仁亦堪單作服餌又研末作湯飲及作面脂藥並令人好顔色光澤宗懍荆楚嵗時記云七月采𤓰犀以為面脂即𤓰瓣也亦堪作澡豆宗奭曰服食方亦稀用之附方舊二新五服食法取冬𤓰仁七升以絹袋盛投三沸湯中須臾取曝乾如此三度又與清苦酒漬之二宿曝乾為末日服方寸匕令人肥悦明目延年不老又法取子三升去皮為丸空心服三十丸令人白淨如玉孟詵食療補肝明目治男子五勞七傷明目用冬𤓰仁方同上外臺秘要悦澤面容白𤓰仁五兩桃花四兩白楊皮二兩為末食後飲服方寸匕日三服欲白加𤓰仁欲紅加桃花三十日面白五十日手足俱白一方有橘皮無楊皮肘後方多年損傷不瘥者𤓰子末温酒服之孫真人方消渴不止小便多用乾冬𤓰子麥門冬黄連各二兩水煎飲之冬𤓰苖葉俱治消渴不拘新乾摘𤣥方男子白濁陳冬𤓰仁炒為末每空心米飲服五錢方救急易女子白帶方同上𤓰皮主治可作丸服亦入面脂蘇頌主驢馬汗入瘡腫痛隂乾為末塗之又主折傷損痛時珍附方新二跌撲傷損用乾冬𤓰皮一兩真牛皮膠一兩剉入鍋内炒存性研末每服五錢好酒熱服仍飲酒一甌厚葢取微汗其痛即止一宿如初極効摘𤣥方損傷腰痛冬𤓰皮燒研酒服一錢生生編葉主治治腫毒殺蜂療蜂叮大明主消渴瘧疾寒熱又焙研傅多年惡瘡時珍附方新一積熱瀉痢冬𤓰葉嫩心拖麵煎餅食之海上名方藤主治燒灰可出繡黥煎湯洗黑䵟并瘡疥大明擣汁服解木耳毒煎水洗脱肛燒灰可淬銅鐵伏砒石時珍南𤓰綱目集解時珍曰南𤓰種出南畨轉入閩浙今燕京諸處甚亦有之矣二月下種宜沙沃地四月生苖引蔓繁一蔓可延十餘丈節節有根近地即著其莖中空其葉狀如蜀葵大如荷葉八九月開黄花如西𤓰花結𤓰正圓大如西𤓰皮上有稜如甜𤓰一本可結數十顆其色或緑或黄或紅經霜收置暖處可留至春其子如冬𤓰子其肉厚色黄不可生食惟去皮穰㵸食味如山藥同猪肉煮食更良亦可蜜煎按王禎農書云浙中一種隂𤓰宜隂地種之秋熟黄色如金皮膚稍厚可藏至春食之如新疑此即南𤓰也氣味甘温無毒時珍曰多食發脚氣黄疸不可同羊肉食令人氣壅主治補中益氣時珍越𤓰宋開寳釋名稍𤓰食物菜𤓰時珍曰越𤓰以地名也俗名稍𤓰南人呼為菜𤓰集解藏器曰越𤓰生越中大者色正白越人當果食之亦可糟藏時珍曰越𤓰南北皆有二三月下種生苗就地引蔓青葉黄花並如冬𤓰花葉而小夏秋之間結𤓰有青白二色大如瓠子一種長者至二尺許俗呼羊角𤓰其子狀如胡𤓰子大如麥粒其𤓰生食可充果蔬醬䜴糖醋藏浸皆宜亦可作葅氣味甘寒無毒詵曰生食多冷中動氣令人心痛臍下癥結發諸瘡又令人虚弱不能行不益小兒天行病後不可食又不得與牛乳酪及鮓同食時珍曰按蕭子真云菜𤓰能暗人耳目觀驢馬食之即眼爛可知矣主治利腸胃止煩渴開寳利小便去煩熱解酒毒宣洩熱氣燒灰傅口吻瘡及隂莖熱瘡藏器和飯作鮓久食益腸胃心鏡胡𤓰宋嘉祐釋名黄𤓰藏器曰北人避石勒諱改呼黄𤓰至今因之時珍曰張騫使西域得種故名胡𤓰按杜寳拾遺録云隋大業四年避諱改胡𤓰為黄𤓰與陳氏之説微異今俗以月令王𤓰生即此誤矣王𤓰土𤓰也見草部集解時珍曰胡𤓰處處有之正二月下種三月生苖引蔓葉如冬𤓰葉亦有毛四五月開黄花結𤓰圍二三寸長者至尺許青色皮上有瘄㿔如疣子至結老則黄赤色其𤓰與菜𤓰子同一種五月種者霜時𤓰白色而短並生熟可食兼蔬蓏之用糟醬不及菜𤓰也氣味甘寒有小毒詵曰不可多食動寒熱多瘧病積瘀熱發疰氣令人虚熱上逆少氣損隂血發瘡疥脚氣虚腫百病天行病後不可食之小兒切忌滑中生疳蟲不可多用醋主治清熱解渴利水道甯原附方舊二新五小兒熱痢嫩黄𤓰同蜜食十餘枚良海上名方水病肚脹四肢浮腫用胡𤓰一個破開連子以醋煑一半至爛空心俱食之須臾下水也千金方小兒出汗香𤓰丸用黄連胡黄連黄蘗川大黄煨熟鱉甲醋炙柴胡蘆薈青皮等分為末用大黄𤓰黄色一個割下下頭填藥至滿蓋定簽住慢火煨熟同擣入麺糊丸緑豆大毎服二三丸大者五七丸至十丸食後新水下兒錢乙小方咽喉腫痛老黄𤓰一枚去子入硝填滿隂乾為末每以少許吹之醫林集要杖瘡焮腫六月六日取黄𤓰入甕瓶中水浸之毎以水掃於瘡上立効醫林集要火眼赤痛五月取老黄𤓰一條上開小孔去瓤入芒硝令滿懸隂處待硝透出刮下留㸃眼甚効夀域神方湯火傷灼五月五日搯黄𤓰入瓶内封掛簷下取水刷之良醫方摘要葉氣味苦平有小毒主治小兒閃癖一歲用一葉生挼攪汁服得吐下良藏器根主治擣傅狐刺毒腫大明絲𤓰綱目釋名天絲𤓰本事天羅事類合璧布𤓰同上蠻𤓰本事魚鰦時珍曰此𤓰老則筋絲羅織故有絲羅之名昔人謂之魚鰦或云虞刺始自南方來故曰蠻𤓰集解時珍曰絲𤓰唐宋以前無聞今南北皆有之以為常蔬二月下種生苖引蔓延樹竹或作棚架其葉大如蜀葵而多了尖有細毛刺取汁可染緑其莖有稜六七月開黄花五出微似胡𤓰花蕋瓣俱黄其𤓰大寸許長一二尺甚則三四尺深緑色有皺㸃𤓰頭如鱉首嫩時去皮可烹可曝㸃茶充蔬老則大如杵筋絡纒紐如織成經霜乃枯惟可藉鞾履滌釡器故村人呼為洗鍋羅𤓰内有隔子在隔中狀如䒷蔞子黑色而扁其花苞及嫩葉卷鬚皆可食也𤓰氣味甘平無毒入藥用老者主治痘瘡不快枯者燒存性入朱砂研末蜜水調服甚妙震亨煮食除熱利腸老者燒存性服去風化痰凉血解毒殺蟲通經絡行血脈下乳汁治大小便下血痔漏崩中黄積疝痛卵腫血氣作痛癰疽瘡腫齒䘌痘疹胎毒時珍暖胃補陽固氣和胎生生編發明穎曰絲𤓰本草諸書無考惟痘瘡及脚癰方中燒灰用之亦取其性冷解毒耳時珍曰絲𤓰老者筋絡貫串房隔聨屬故能通人脉絡臟腑而去風解毒消腫化痰袪痛殺蟲治諸血病附方新二十八痘瘡不快初出或未出多者令少少者令性稀老絲𤓰近蒂三寸連皮燒存研末砂糖水服直指方癰疽不歛瘡口太深用絲𤓰擣汁頻抹之直指方風熱腮腫絲𤓰燒存性研末水調搽之嚴月軒方肺熱面瘡苦絲𤓰牙皂莢並燒灰等分油調搽𤣥摘方玉莖瘡潰絲𤓰連子擣汁和五倍子末頻搽之丹溪方坐板瘡疥絲𤓰皮焙乾為末燒酒調搽之攝生衆妙方天泡濕瘡絲𤓰汁調辰粉頻搽之手足凍瘡老絲𤓰燒存性和臘猪脂塗之海上方肛門酒痔絲𤓰燒存性研末酒服二錢嚴月軒方痔漏脱肛絲𤓰燒灰多年石灰雄黄各五錢為末以猪膽雞子清及香油和調貼之收上乃止効孫氏集方腸風下血霜後乾絲𤓰燒存性為末空心酒服二錢一名蠻𤓰一名天羅一名天絲𤓰是矣許叔微本事方下血危篤不可救者絲𤓰即天羅一個燒存性槐花減半為末每空心米飲服二錢普濟方酒痢便血腹痛或如魚腦五色者乾絲𤓰一枚連皮燒研空心酒服二錢一方煨食之俗名魚鰦是也經騐方血崩不止老絲𤓰燒灰棕櫚燒灰等分鹽酒或鹽湯服奇效良方經脈不通乾絲𤓰一個為末用白鴿血調成餅日乾研末每服二錢空心酒下先服四物湯三服海上名方乳汁不通絲𤓰連子燒存性研酒服一二錢被覆取汗即通簡便單方乾血氣痛婦人血氣不行上衝心膈變為乾血氣者用絲𤓰一枚燒存性空心温酒服夀域神方小腸氣痛遶臍衝心連蒂老絲𤓰燒存性研末每服三錢熱酒調下甚者不過二三服即消卵腫偏墜絲𤓰架上初結者留下待𤓰結盡葉落取下燒存性為末煉蜜調成膏每服好酒服一匙如在左左睡在右右睡劉松石保夀堂方腰痛不止天羅布𤓰子仁炒焦擂酒服以渣傳之熊氏補遺喉閉腫痛天羅𤓰研汁灌之普濟卒然中風防風荆芥一兩升麻半兩薑三片水一琖煎半琖以絲𤓰子研取漿半琖和勻灌之如手足麻痒以羗活煎湯洗之唐珤經騐方化痰止嗽天羅即絲𤓰燒存性為末棗肉和丸彈子大毎服一丸温酒化下攝生妙用方風蟲牙痛經霜乾絲𤓰燒存性為末擦之直指方風氣牙痛百藥不効者用此大能去風惟蛀牙不効天羅即生絲𤓰一個擦鹽火燒存性研末頻擦涎盡即愈腮腫以氷調貼之馬敏叔云此乃嚴月軒家傳屢効之方一試即便可睡也食積黄疸絲𤓰連子燒存性為末毎服二錢因麵得病麵湯下因酒得病酒温下連進數服愈衛生易簡方小兒浮腫天羅燈草葱白等分煎濃汁服并洗之普濟方水蠱腹脹老絲𤓰去皮一枚剪碎巴豆十四粒同炒豆黄去豆以𤓰同陳倉米再炒熟去𤓰研米為末糊丸梧子大毎服百丸白湯下葢米收胃氣巴豆逐水絲𤓰象人脉絡借其氣以引之也此乃元時杭州名醫宋㑹之之方鈎鮮于樞𤣥葉主治癬瘡頻挼摻之療癰疽丁腫卵㿗時珍附方新六蠱癬清晨采露水絲𤓰葉七片逐擦七下如神忌雞魚發物攝生衆妙方隂子偏墜絲𤓰葉燒存性三錢雞子殻燒灰二錢温酒調服余居士選奇方頭瘡生蛆頭皮内時有蛆出以刀切破擠絲𤓰葉汁搽之蛆出盡絶根小山怪證方湯火傷灼絲𤓰葉焙研入辰粉一錢蜜調搽之生者搗傅一日即好也海上名方魚臍丁瘡絲𤓰葉即虞刺葉也連鬚葱白韭菜等分同入石鉢内研爛取汁以熱酒和服以渣貼腋下病在左手貼左腋右手貼右腋病在左脚貼左胯右脚貼右胯在中貼心臍用帛縛住候肉下紅線處皆白則散矣如冇潮熱亦用此法却令人抱住恐其顚倒則難救矣危氏得効方刀瘡神藥古石灰新石灰絲𤓰根葉初種放兩葉者韭菜根各等分搗一千下作餅隂乾為末擦之止血定痛生肌如神効侍御蘓海峯所傳董炳集驗方藤根氣味同葉主治齒䘌腦漏殺蟲解毒時珍附方新七預解痘毒五六月取絲𤓰蔓上卷鬚隂乾至正月初一日子時用二兩半煎湯父母只令一人知温浴小兒身面上下以去胎毒永不出痘縱出亦少也體仁彚編諸瘡久潰絲𤓰老根熬水掃之大凉即愈應騐方喉風腫痛絲𤓰根以瓦瓶盛水浸飲之海上名方腦崩流汁鼻中時時流臭黄水腦痛名控腦砂有存蟲食腦中也用絲𤓰藤近根三五尺燒性毎服一錢温酒下以愈為度醫學正傳牙宣露痛海上妙方用絲𤓰藤隂乾臨時火煆存性研搽即止最妙煎惠生堂方用絲𤓰藤一握川椒一撮燈心一把水濃汁潄吐其痛立住如神咽喉骨鯁七月七日取絲𤓰根隂乾燒存性毎服二錢以原鯁物煑湯服之筆峯雜興腰痛不止絲𤓰根燒存性為末每温酒服二錢神効甚捷鄧筆峯雜興附錄天羅勤拾遺藏器曰生江南平地主溪毒挼碎傅之時珍曰陳氏注此不詳又江南呼絲𤓰為天羅疑即此物然無的據姑附之苦𤓰救荒釋名錦荔枝救荒癩葡萄時珍曰苦以味名𤓰及荔枝葡萄皆以實及莖葉相似得名集解周憲王曰錦荔枝即癩葡萄蔓延草木莖長七八尺莖有毛澀葉似野葡萄而花又開黄花實大如雞子有皺紋似荔枝時珍曰苦𤓰原出南番今閩廣皆種之五月下子生苖引蔓莖葉卷鬚並如葡萄而小七八月開小黄花五瓣如椀形結𤓰長者四五寸短者二三寸青色皮上痱㿔如癩及荔枝殻狀熟則黄色自裂内有紅瓤褁子瓤味甘可食其子形扁如𤓰子亦有痱㿔南人以青皮煑肉及鹽醬充蔬苦澀有青氣按費信星槎勝覽云蘓門荅剌國一等𤓰皮若荔枝未剖時甚臭如爛蒜剖開如囊味如酥香甜可口疑此即苦𤓰也𤓰氣味苦寒無毒主治除邪熱解勞乏清心明目時珍生生編子氣味苦甘無毒主治益氣壯陽時珍菜之四水菜類六種紫菜食療釋名紫䓴音軟集解詵曰紫菜生南海中附石正青色取而乾之則紫色時珍曰閩越海邊悉有之大葉而薄彼人挼成餅狀晒乾貨之其色正紫亦石衣之屬也氣味甘寒無毒藏器曰多食令人腹痛發氣吐白沫飲熱醋少許即消主治熱氣煩塞咽喉煮汁飲之孟詵病癭瘤脚氣者宜食之時珍發明震亨曰凡癭結積塊之疾宜常食紫菜乃鹹能軟堅之義石蓴拾遺校正自草部移入此集解藏器曰石蓴生南海附石而生似紫菜色青氣味甘平無毒主治下水利小便藏器主風秘不通五膈氣并臍下結氣煮汁飲之胡人用治疳疾李珣石花菜食鑑釋名璚枝時珍曰並以形名也集解時珍曰石花菜生南海沙石間高二三寸狀如珊瑚有紅白二色枝上有細齒以沸湯泡去砂屑沃以薑醋食之甚脆其根埋沙中可再生枝也一種稍粗而似雞爪者謂之雞脚菜味更佳二物久浸皆化成膠凍也郭璞海賦所謂水物則玉珧海月土肉石華即此物也氣味甘鹹大寒滑無毒主治去上焦浮熱發下部虚寒寗原鹿角菜食性釋名猴葵時珍曰按沈懷遠南越志云㺅葵一名鹿角葢鹿角以形名㺅葵因其性滑也集解士良曰鹿角菜生海州登萊沂宻諸處海中時珍曰鹿角菜生東南海中石厓間長三四寸大如鐵線分了如鹿角狀紫黄色土人米曝貨為海錯以水洗醋拌則脹起如新味極滑美若久浸則化如膠狀女子用以梳髪粘而不亂氣味甘大寒滑無毒詵曰微毒丈夫不可久食發痼疾損腰腎經絡血氣令人脚冷痺少顔色主治下熱氣療小兒骨蒸熱勞服丹石人食之能下石力士良解麫熱大明龍鬚菜綱目集解時珍曰龍鬚菜生東南海邊石上叢生無枝葉狀如柳根鬚長者尺餘白色以醋浸食之和肉蒸食亦佳博物志一種石髪似指此物與石衣之石髪同名也氣味甘寒無毒主治癭結熱氣利小便時珍睡菜綱目釋名瞑菜瞑音眡綽菜醉草嬾婦葴記事未詳集解時珍曰按嵇含南方草木狀云綽菜夏生池沼間葉類慈姑根如藕條南海人食之令人思睡呼為瞑菜段公路北戸錄云睡菜五六月生田塘中土人采根為鹽葅食之好睡郭憲洞㝠記有却睡萆食之令人不睡與此相反也珍按苦菜龍葵皆能使人不睡却睡之草其此類乎氣味甘微苦寒無毒主治心膈邪熱不得眠時珍菜之五芝栭類十五種内附四種芝本經上品校正併入本經青赤黄白黒紫六芝釋名苬音囚時珍曰芝本作之篆文象草生地上之形後人借之字為語辭遂加草以别之也爾雅云苬芝也註云一嵗三華瑞草或曰生於剛處曰菌生於柔處日芝昔四皓采芝羣仙服食則芝亦菌屬可食者故移入菜部集解别錄曰青芝生泰山赤芝生霍山黄芝生嵩山白芝生華山黑芝生常山紫芝生高夏山谷六芝皆六月八日秉𢎞景曰南嶽本是衡山漢武帝始以小霍山代之此赤芝當生衡山也郡縣無髙夏名恐是山名也此六芝皆仙草之類俗所稀見族類甚多形色瓌異並載芝草圖中今俗所用紫芝乃是朽木株上所生狀如木檽名為紫芝止療痔不宜合諸補丸藥也凡得芝草便正爾食之無餘節度故皆不云服法也恭曰五芝經云皆以五色生於五嶽諸方所獻白芝未必華山黒芝又非常嶽且多黄白稀有黒青者然紫芝最多非五芝類但芝自難得縱獲一二豈得終久服耶禹錫曰王充論衡云芝生於土土氣和故芝草生瑞命禮云王者仁慈則芝草生是也時珍曰芝類甚多亦有花實者本草惟以六芝標名然其種屬不可不識神農經云山川雲雨四時五行隂陽晝夜之精以生五色神芝為聖王休祥瑞應圖云芝草常以六月生春青夏紫秋白冬黑葛洪抱朴子云芝有石芝木芝肉芝菌芝凡數百種也石芝石象生於海隅石山島嶼之涯肉芝狀如肉附於大石頭尾具有乃生物也赤者如珊瑚白者如截肪黒者如澤漆青者如翠羽黄者如紫金皆光明洞徹如堅氷也大者十餘斤小者三四斤凡求芝草入名山必以三月九月乃山開出神藥之月必以三輔時出三竒吉門到山須六隂之日明堂之時帶靈寳符牽白犬抱白鷄包白鹽一斗及開山符檄著大石上執吳唐草一把入山山神喜必得見芝須禹歩往采以王相專和支干相生之日刻以骨刀隂乾為末服乃有功効若人不至精久齋行穢徳薄又不曉入山之術雖得其圖鬼神不以與人終不可得見也曰菌芝生深山之中大木之上泉水之側其狀或如宫室如龍虎如車馬如飛鳥五色無常凡百二十種自有圖也曰木威喜芝乃松脂淪地千年化為茯苓萬嵗其上生小木狀似蓮花夜視有光持之甚滑燒之不焦帶之辟兵服之神仙曰飛節芝生千嵗老松上皮中有脂狀如飛形服之長生曰木渠芝寄生大木上狀如蓮花九莖一叢味甘而辛曰黄蘗芝生於千嵗黄蘗根下有細根如縷服之地仙曰建木芝生於都廣其皮如纓其實如鸞曰叅成芝赤色有光扣其枝葉如金石之音曰樊桃芝其本如龍其花如丹蘿其實如翠鳥並可服食曰千嵗芝生枯木下根如坐人刻之有血血塗二足可行水隱形又可治病已上皆木芝也曰獨搖芝無風自動其莖大如手指葉似莧根有大魁如斗周遶有細子十二枚繞之相去丈許生髙山深谷服之神仙曰牛角芝生虎夀山及吴陵上狀似葱而特出如牛角長三四尺青色曰龍仙芝似昇龍相負之形曰案珠芝莖黄葉赤實如李而紫色曰白苻芝似梅大雪而花季冬而實曰朱草芝九曲三葉葉有實也其莖如針曰五徳芝狀似樓殿五色各具方莖紫氣已上皆草芝也有百二十種人得服之神仙曰玉暗芝生於有玉之山狀似鳥獸色無常彩多似山水蒼玉亦如鮮明水晶曰七孔九光芝芝生於臨水石厓之門狀如盤盌有莖葉此芝葉有七孔夜見其光食至七枚七孔洞徹一名螢火芝曰石蜜芝生少室石戶中石上終難得曰桂芝生石穴中似桂樹乃石也光明味辛曰石腦芝石中黄皆石芝類也千嵗燕千嵗蝙蝠千嵗龜萬嵗蟾蜍山中見小人皆肉芝類也凡百二十種又按採芝圖云鳳凰芝生名山金玉間服食一年與鳳凰俱也曰燕胎芝形如葵紫色有燕象曰黒雲芝生山谷之隂黒葢赤理墨莖味醎苦又有五色龍芝五方芝天芝地芝人芝山芝土芝石芝金芝水芝火芝雷芝甘露芝青雲芝雲氣芝白虎芝車馬芝太一芝䓁名狀不一張華博物志云名山生神芝不死之草上芝為車馬中芝人形下芝六畜形又按段成式酉陽雜俎云屋柱無故生芝者白主䘮赤主血黑主賊黄主喜形如人面者亡財如牛馬者逺役如龜蛇者蠶耗時珍嘗疑芝乃腐朽餘氣所生正如人生瘤贅而古今皆以為瑞草又云服食可仙誠為迂謬近讀成式之言始知先得我所欲言其揆一也又方士以木積濕處用藥傅之即生五色芝嘉靖中王金嘗生以獻世宗此昔人所未言者不可不知青芝一名龍芝别録氣味酸平無毒時珍曰五色之芝配以五行之味葢亦據理而已未必其味便隨五色也即如五畜以羊屬火五果以杏為心皆云味苦之義之才曰青赤黄白黒紫六芝並以薯蕷為之使得髪良得蔴子仁白𤓰子牡桂甚益人惡常山畏扁青茵蔯蒿主治明目補肝氣安精魂仁恕久食輕身不老延年神仙本經不忘強志唐本赤芝一名丹芝本經氣味苦平無毒主治胸中結益心氣補中増智慧不忘久食輕身不老延年神仙本經黄芝一名金芝本經氣味甘平無毒主治心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙本經白芝一名玉芝本經素芝氣味辛平無毒主治欬逆上氣益肺氣通利口鼻強志意湧悍安魄久食輕身不老延年神仙本經黑芝一名𤣥芝本經氣味鹹平無毒主治􅜡利水道益腎氣通九竅聰察久服輕身不老延年神仙本經紫芝一名木芝本經氣味甘温無毒甄權曰平主治耳聾利闗節保神益精氣堅筋骨好顔色久服輕身不老延年本經療虚勞治痔時珍附方新一紫芝丸治虛勞短氣胸脇苦傷手足逆冷或時煩燥口乾目視􅀈􅀈腹内時痛不思飲食此藥安神保精也紫芝一兩半山芋焙天雄炮去皮栢子仁炒巴㦸天去心白茯苓去皮枳實去瓤麩炒各三錢五分生地黄焙麥門冬去心焙五味子炒半夏制炒附子炒去皮牡丹皮人参各七錢五分遠志去心蓼實各二錢五分𤓰子仁炒澤㵼各五錢為末煉蜜丸梧子大每服十五丸漸至三十丸温酒下日三服聖濟總録木耳本經中品校正自桑根白皮條分出釋名木檽而軟二音木菌窘捲二音木㙡音縱樹雞韓文木蛾時珍曰木耳生於朽木之上無枝葉乃濕熱餘氣所生曰耳曰南蛾象形也曰檽以軟濕者佳也曰雞曰㙡因味似也楚人謂雞為㙡曰菌猶蝈也亦象形也蝈乃貝子之名或曰地生為菌木生為蛾北人曰蛾南人曰蕈集解别錄曰五木耳生犍為山谷六月多兩時采即暴乾𢎞景曰此云五木耳而不顯言是何木惟老桑樹生桑耳有青黄赤白者軟濕者人采以作葅無復藥用恭曰桑槐楮榆栁此為五木耳並堪啖楮耳人常食槐耳療痔煑漿粥安諸木上以草覆之即生蕈爾時珍曰木耳各木皆生其良毒亦必隨木性不可不審然今貨者亦多雜木惟桑柳楮榆之耳為多云氣味甘平有小毒權曰蕈耳古槐桑樹上者良柘木者次之其餘樹上多動風氣發痼疾令人肋下急損經絡背膊悶人藏器曰木耳惡蛇虫從下過者有毒楓木上生者令人笑不止采歸色變者有毒夜視有光者欲爛不生虫者並有毒並生𢷬冬𤓰蔓汁解之時珍曰按張仲景云木耳赤色及仰生者並不可食主治益氣不饑輕身強志本經斷穀治痔時珍發明頌曰一人患痔諸藥不効用木耳煑羮食之而愈極騐時珍曰按生生編云柳蛾補胃木耳衰精言老栁之蛾能補胃理氣木耳乃朽木所生得一隂之氣故有衰精冷腎之害也附方新六眼流冷淚木耳一兩燒存性木賊一兩為末毎服二錢以清米泔煎服惠濟方血注脚瘡桑耳楮耳牛屎菰各五錢胎髪灰男用女女用男三錢研末油和塗之或乾塗之良奇効方崩中漏下木耳半斤炒見煙為末每服二錢一分頭髪灰三分共二錢四分以應二十四氣好酒調服出汗孫氏集効方新久洩痢乾木耳一兩炒鹿角膠二錢半炒為末每服三錢温酒調下日二御藥院方血痢下血木耳炒研五錢酒服即可亦用井花水服或以水煑塩醋食之以汁送下普濟方一切牙痛木耳荆芥等分煎湯頻潄普濟方桑耳釋名桑檽唐本桑蛾宋本桑雞綱目桑黄藥性桑臣藥性桑上寄生𢎞景曰斷穀方桑檽又呼為桑上寄生名同物異也時珍曰桑檽以下皆軟耳之名桑黄以下皆硬菰之名其功性則一也氣味甘平有毒詵曰寒無毒大明曰温微毒權曰桑槐耳甘辛平無毒主治黑者主女人漏下赤白汁血病癥瘕積聚隂痛隂陽寒熱無子本經療月水不調其黄熟陳白者止久洩益氣不飢其金色者治癖飲積聚腹痛金瘡别錄治女子崩中帶下月閉血凝産後血凝男子痃癖甄權止血衂腸風瀉血婦人心腹痛大明利五臟宣腸胃氣排毒氣壓丹石人發熱和葱豉作羮食孟詵附方舊四新十少小鼻衂小勞輒出桑耳熬焦𢷬末毎發時以杏仁大塞鼻中數度即可斷方肘後五痔下血桑耳作羮空心飽食三日一作待孔卒痛如鳥喙狀取大小豆各一升合𢷬作兩囊蒸之及熱更互坐之即瘥聖惠方脱肛瀉血不止用桑黄一兩熟附子一兩為末煉蜜丸梧子大每米飲下二十丸聖惠血淋疼痛桑黄槲白皮各二錢水煎服日一次惠聖方月水不斷肉色黄瘦血竭暫止數日復發小勞輒劇久疾失治者皆可服之桑黄焙研毎服二錢食前熱酒下日二服普濟方崩中漏下桑耳炒黒為末酒服方寸匕日三服取効方千金赤白帶下桑耳切碎酒煎服蘇頌圖經遺尿且澀桑耳為末每酒下方寸匕日三服聖濟總録留飲宿食桑耳二兩巴豆一兩去皮五升米下蒸過和棗膏𢷬丸麻子大每服一二丸取利止范汪方心下急痛桑耳燒存性熱酒服二錢集簡方瘰癧潰爛桑黄菰五錢水紅豆一兩百草霜三錢青苔二錢片腦一分為末雞子白調傅以車前艾葉桑皮煎湯洗之纂奇方咽喉痺痛五月五日收桑上木耳白如魚鱗者臨時𢷬碎綿包彈子大蜜湯浸含之立効便民方面上黑斑桑耳焙研每食後熱湯服一錢一月愈摘𤣥方足趾肉刺先以湯浸刮去一層用黒木耳貼之自消爛不痛近効方槐耳釋名槐檽唐本槐菌唐本槐雞蜀本赤雞綱目槐蛾恭曰此槐樹上菌也當取堅如桑耳者權曰煑漿粥安槐木上草覆之即生蕈耳氣味苦辛平無毒主治五痔脱肛下血心痛婦人隂中瘡痛蘇恭治風破血益力甄權附方舊二新四腸痔下血槐樹上木耳為末飲服方寸匕日三服肘後方崩中下血不問年月逺近用槐耳燒存性為末每服方寸匕温酒下産寳方産後血疼欲死者槐雞半兩為末酒濃煎飲服立愈婦人良方蚘蟲心痛槐木耳燒存性為末水服棗許若不止飲熱水一升蚘虫立出張文中備急方月水不斷勞損黄瘦暫止復發小勞輒劇者槐蛾炒黄赤石脂各一兩為末食前熱酒服二錢桑黄亦可聖惠方臟毒下血槐耳燒二兩乾漆燒一兩為末每服一錢温酒下聖濟總録榆耳八月采之主治令人不飢時珍附方新一服食方淮南萬畢術云八月榆檽以美酒漬曝同青梁米紫莧實蒸熟為末毎服三指撮酒下令人辟穀不飢柳耳主治補胃理氣時珍附方新一反胃吐痰栁樹蕈五七個煎湯服即愈活人心統柘耳釋名柘黄主治肺癰咳唾膿血腥臭不問膿成未成用一兩研末同百齒霜二錢糊丸梧子大米飲下三十丸効甚㨗時珍楊櫨耳藏器曰出南山氣味平無毒主治老血結塊破血止血煑服之藏器杉菌宋圖經集解頌曰杉菌出宜州生積年杉木上狀若菌采無時氣味甘辛微温無毒主治心脾氣疼及暴心痛蘇頌皂莢蕈綱目集解時珍曰生皂莢樹上木耳也不可食采得焙乾備用氣味辛有毒主治積垢作痛泡湯飲之微泄效未已再服又治腫毒初起磨醋塗之良時珍附方新一腸風瀉血皂莢樹上蕈瓦焙為末毎服一錢温酒下許學士本事方香蕈日用釋名時珍曰蕈從覃覃延也蕈味雋永有覃延之意集解瑞曰蕈生桐栁枳椇木上紫色者名香蕈白色者名肉蕈皆因濕氣薰蒸而成生山僻處者有毒殺人頴曰香蕈生深山爛楓木上小於菌而薄黃黒色味甚香美最為佳品時珍曰蕈品不一宋人陳仁玉著菌譜甚詳今錄其畧於此云芝菌皆氣茁也括自商山茹芝而五臺天花亦甲羣彚仙居介乎天台蒼之間叢山入天仙靈所宫爰産異菌林居巖栖者一左右芼之乃藜莧之至腴近或以羞王公登玉食矣曰合蕈又名台蕈生台之韋羗山寒極雪收春氣欲動土鬆芽活此菌侯也具質外褐色肌理玉㓗芳香韻味一發釡鬲聞於百歩山人曝乾以售香味减於生者他山雖産其柄髙而香劣不及矣二曰稠膏蕈生孟溪諸山秋中雨零露浸釀山膏木腴發為菌花生絶頂樹杪初如蕊珠圓瑩類輕酥滴乳淺黄白色味尤甘已乃張􅏛大若掌味頓渝矣春時亦生而膏液少食之之法下鼎似沸漉起参和衆味而特全於酒切勿攪動則涎腥不可食矣亦可蒸熟致逺三曰松蕈生松隂采無時凡物松出無不可爱者四曰麥蕈生溪邊沙壤中味殊美絶類蘑菰五曰玉蕈初寒時生潔晳可愛作羮微靭俗名寒蒲蕈六曰黃蕈叢生山中黄色俗名黃纉蕈又名黃㹠七曰紫蕈赭肌紫色産山中為下品八曰四季蕈生林木中味甘而理粗峭九曰鵞膏蕈生髙山中狀類鵞子久而繖開味殊甘滑不减稠膏然與杜蕈相亂不可不慎杜蕈土菌也氣味甘平無毒主治益氣不飢治風破血吳瑞松蕈治溲濁不禁食之有効菌譜葛花菜綱目釋名葛乳時珍曰諸名山皆有之惟太和山采取云乃葛之精華也秋霜浮空如芝菌涌生地上其色赤脆葢蕈類也氣味苦甘無毒主治醒酒治酒積時珍志太和天花蕈日用釋名天花菜集解瑞曰天花菜出山西五臺山形如松花而大香氣如蕈白色食之甚美時珍曰五臺多蛇蕈感其氣而生故味美而無益其價頗珍叚成式酉陽雜俎云代北有樹雞如柸棬俗呼胡孫根其此類與氣味甘平無毒時珍曰按正要云有毒主治益氣殺蟲吴瑞蘑菰蕈綱目釋名肉蕈集解時珍曰蘑菰出山東淮北諸處埋桑楮諸木於土中澆以米泔待菰生采之長二三寸本小末大白色柔軟其中空虚狀如未開玉簪花俗名雞腿蘑菰謂其味如雞也一種狀如羊肚有蜂窠眼者名羊肚菜氣味甘寒無毒正要曰有毒動氣發病不可多食主治益腸胃化痰理氣時珍編出生生雞㙡綱目釋名雞菌時珍曰南人謂為雞㙡皆言其味似之也集解時珍曰雞㙡出雲南生沙地間丁蕈也髙脚繖頭土人米烘寄遠以充方物㸃茶烹肉皆宜氣味皆似香蕈而不及其風韻也又廣西横州出雷菌遇雷過即生須疾采之稍遲則腐或老故名作羮甚美亦如雞㙡之屬此數種其價並珍氣味甘平無毒主治益胃清神治痔時珍舵菜綱目集解時珍曰此即海舶舵上所生菌也亦不多得氣味鹹甘寒無毒主治癭結氣痰飲時珍土菌拾遺校正自草部移入此釋名杜蕈菌譜地蕈拾遺菰子食物地雞爾雅獐頭藏器曰地生者為菌木生者為檽江東人呼為蕈爾雅云中馗菌也孫炎註云地蕈子也或云地雞亦云獐頭郭璞註云地蕈似釘葢江東名為土菌可啖凡菌從地中出者皆主瘡疥牛糞上黒菌尤佳若燒灰地上經秋雨生菌重臺者名仙人㡌大主血病時珍曰中馗祌名又槌名也此菌釘上若繖其狀如槌及中馗之㡌故以名之氣味甘寒有毒詵曰菌子有數般槐樹上者良野田中者有毒殺人又多發冷氣令人腹中微微痛發五臟風擁經脉動痔病令人昏昏多睡背膞四肢無力藏器曰菌冬春無毒夏秋有毒有蛇虫從下過也夜中有光者欲爛無虫者煮之不熟者煑訖照人無影者上有毛下無紋者仰卷赤色者並有毒殺人中其毒者地漿及糞汁解之頌曰凡煑菌投以薑屑飯粒若色黑者殺人否則無毒時珍曰按菌譜云杜蕈生土中與山中鵞膏蕈相亂俗言毒蠚之氣所成食之殺人甚美有惡食肉不食馬肝未為不知味也凡中其毒者必笑不止解之以苦茗白礬勺新水併咽之無不立愈又按楊士瀛直指方云廣南人殺毒蛇覆之以草以水灑之數日菌生采乾為末入酒毒人遇再飲酒毒發立死又陳氏拾遺云南夷以胡蔓草毒人至死懸尸于樹汁滴地上生菌子收之名菌藥毒人至烈此皆不可不知故併記之馬勃亦菌類見草部主治燒灰傅瘡疥藏噐附方新一疔腫黒牯牛抛糞石上待生菌子焙乾豨薟草等分為末以竹筒去兩頭緊縛合住疔上用水和末一錢入筒内少頃沸起則根㧞出未出再作二三次醫學正傳附錄鬼蓋别錄有名未用曰味甘平無毒主小兒寒熱癎叢生坦墻下赤色旦生暮死一名地葢𢎞景曰一名朝生即今鬼繖也藏器曰一名鬼屋生隂濕處如菌其葢黒而莖赤和醋傅腫毒惡瘡馬脊腫杜正倫曰鬼繖有小毒夏日得雨聚生糞堆見治日即消黒時珍曰此亦土菌之類朝生暮死者燒灰疔腫以鍼刺破四邊納灰入内經宿出根地芩别錄曰味苦無毒主小兒癎除邪養胎風痺洗洗寒熱目中青瞖女子帶下生腐木積草處大雨生葢如朝生黄白色四月采之時珍曰此即鬼葢之色黄白者其功亦相近鬼筆拾遺藏器曰鬼筆生糞穢處頭如筆紫色朝生暮死名朝生暮落花小兒呼為狗溺薹主治瘡疽䘌疥癰瘻並日乾研末和油塗之凡菌從地出者皆主瘡疥牛糞上黒菌尤佳時珍曰此亦鬼葢之類而無繖者紅紫鬆虛如花之狀故得花名研末傅下疳瘡竹蓐食療校正併入拾遺竹肉釋名竹肉拾遺竹菰綱目竹蕈時珍曰草更生曰蓐得溽濕之氣而成也陳藏器本草作竹肉因其味也集解詵曰慈竹林夏月逢雨滴汁着地生蓐似鹿角白有色可食藏器曰竹肉生苦竹枝上如雞子似肉臠大毒以灰汁煑三度煉訖然後依常菜茹食之煉不熟者㦸人㗋出血手爪盡脫應别有功人未盡識之時珍曰此即竹菰也生朽竹根節上狀如木耳紅色段成式酉陽雜俎云江淮有竹肉大如彈丸味如白樹雞即此物也惟苦竹生者有毒耳氣味甘鹹寒無毒藏器曰苦竹肉有大毒主治一切赤白痢和薑醤食之孟詵苦竹肉灰汁鍊過食殺三蟲毒邪氣破老血藏器雚菌音桓郡品本經下校正自草部移入此釋名雚蘆本經時珍曰雚當作萑乃蘆葦之屬此菌生於其下故名也若雚音觀乃鳥名與萑蘆無闗集解别錄曰雚茵生東海池澤及渤海章武八月采取隂乾𢎞景曰出北來此亦無有形狀似菌云鸛屎所化生一名鸛菌單末之猪肉臛和食可以遣蚘蟲恭曰雚菌今出渤海蘆葦澤中鹽鹵地自然有此菌爾非鸛屎所化生也其菌色白輕虚表裏相似與衆菌不同療蚘有効保昇曰今出滄州秋雨以時即有天旱久霖即稀日乾者良氣味鹹平有小毒别錄曰甘微温權曰苦得酒良畏雞子主治心痛温中去長蟲白㿅蟯蟲蛇螫毒殺癥瘕諸蟲本經疽蝸去蚘蟲寸白惡瘡别錄除腹内冷痛治白秃甄權附方舊一蚘蟲攻心如刺吐清汁者萑菌一兩杵末羊肉臛和食之日一頓大効外臺秘要附錄蜀格别錄曰味苦平無毒主治寒熱痿痺女子𢃄下癰腫生山陽如萑菌而有刺地耳别録校正自有名未用移入此釋名地踏菰綱目集解别錄曰地耳生丘陵如碧石青也時珍曰地耳亦石耳之屬生於地者也狀如木耳春夏生雨中雨後即早采之見日即不堪俗名地踏菰是也氣味甘寒無毒主治明目益氣令人有子别錄石耳日用釋名靈芝靈苑方集解瑞曰石耳生天台四明河南宣州黄山巴西邊徼諸山石崖上逺望如煙時珍曰廬山亦多狀如地耳山僧采曝餽逺洗去沙土作茹勝於木耳佳品也氣味甘平無毒頴曰冷叚成式曰熱主治久食益色至老不改令人不飢大小便少吳瑞明目益精時珍附方新一瀉血脱肛石耳五兩炒白枯礬一兩蜜陀僧半兩為末蒸餅丸梧子大毎米飲下二十丸普濟方本草綱目卷二十八
