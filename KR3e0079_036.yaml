body:
  text: 本草綱目卷十二上明李時珍撰草之一山草類上一十三種甘草本經上品釋名宻甘别録宻草别録美草别録蕗草别録靈通記事珠國老别録𢎞景曰此草最為衆藥之主經方少有不用者猶如香中有沈香也國老即帝師之稱雖非君而為君所宗是以能安和草石而解諸毒也甄權曰諸藥中甘草為君治七十二種乳石毒解一千二百般草木毒調和衆藥有功故有國老之號集解别録曰甘草生河西川谷積沙山及上郡二月八月除日采根暴乾十日成陶𢎞景曰河西上郡今不復通市今出蜀漢中悉從汶山諸道中來赤皮斷理看之堅實者是枹䍐草最佳枹䍐乃西羌地名亦有火炙乾者理多虚疎又有如鯉魚腸者被刀破不復好青州間有而不如又有紫甘草細而實乏時亦可用蘇頌曰今陜西河東州郡皆有之春生青苗高一二尺葉如槐葉七月開紫花似柰冬結實作角子如畢豆根長者三四尺粗細不定皮赤色上有横梁梁下皆細根也采得去蘆頭及赤皮隂乾用今甘草有數種以堅實斷理者為佳其輕虚縱理及細靭者不堪惟貨湯家用之謹按爾雅云䖅大苦郭璞註似地黄又詩唐風云采苓采苓首陽之巔是也䖅與苓通用首陽之山在河東蒲坂縣乃今甘草所生處相近而先儒所説苗葉與今全别豈種類有不同者乎李時珍曰按沈括筆談云本草註引爾雅䖅大苦之註為甘草者非矣郭璞之註乃黄藥也其味極苦故謂之大苦非甘草也甘草枝葉悉如槐高五六尺但葉端微尖而糙濇似有白毛結角如相思角作一本生至熱時角折子扁如小豆極堅齒囓不破今出河東西界寇氏衍義亦取此説而不言大苦非甘草也以理度之郭説形狀殊不相類沈説近之今人惟以大經寸而結𦂳斷文者為佳謂之粉草其輕虚細小者皆不及之鎦積霏雪録言安南甘草大者如柱土人以架屋不識果然否也根修治雷斆曰凡使須去頭尾尖處其頭尾吐人每用切長三寸擘作六七片入甆器中盛用酒浸蒸從巳至午取出暴乾剉細用一法毎斤用酥七兩塗炙酥盡為度又法先炮令内外赤黄用時珍曰方書炙甘草皆用長流水蘸濕炙之至熟刮去赤皮或用漿水炙熟未有酥炙酒蒸者大底補中宜炙用瀉火宜生用氣味甘平無毒寇宗奭曰生則㣲凉味不佳炙則温王好古曰氣薄味厚升而浮陽也入足太隂厥隂經時珍曰通入手足十二經花徐之才曰术苦參乾漆為之使惡志逺反大㦸芫甘遂海藻權曰忌豬肉時珍曰甘草與藻㦸遂芫四物皆反而胡洽居士治痰澼以十棗湯加甘草大黄乃是痰在膈上欲令通泄以拔去病根也東垣李杲治頂下結核消腫潰堅湯加海藻丹溪朱震亨治勞瘵蓮心飲用芫花二方俱有甘草皆本胡居士之意也故陶𢎞景言古方亦有相惡相反並乃不為害非妙達精微者不能知此理主治五臓六腑寒熱邪氣堅筋骨長肌肉倍氣力金瘡尰解毒乆服輕身延年本經切尰音時勇腫也温中下氣煩滿短氣傷臓欬𠻳止渇通經脉利血氣解百藥毒為九土之精安和七十二種石一千二百種草别録主腹中冷痛治驚癎除腹脹滿補益五臓腎氣内傷令人隂不痿主婦人血瀝腰痛凡虚而多熱者加用之甄權安魂定魄補五勞七傷一切虚損驚悸煩悶健忘通九竅利百脉益精養氣壯筋骨大明生用瀉火熱熟用散表寒去咽痛除邪熱緩正氣養隂血補脾胃潤肺李杲吐肺痿之膿血消五發之瘡疽好古解小兒胎毒驚癎降火止痛時珍稍主治生用治胸中積熱去莖中痛加酒煑𤣥胡索苦棟子尤妙元素頭主治生用能行足厥隂陽明二經汚濁之血消腫導毒震亨主癰腫宜入吐藥時珍發明震亨曰甘草味甘大緩諸火黄中通理厚徳載物之君子也欲達下焦須用稍子杲曰甘草氣薄味厚可升可降隂中陽也陽不足者補之以甘甘温能除大熱故生用則氣平補脾胃不足而大㵼心火炙之則氣温補三焦元氣而散表寒除邪熱去咽痛緩正氣養隂血凡心火乘脾腹中急痛腹皮急縮者宜倍用之其性能緩急而又協和諸藥使之不争故熱藥得之緩其熱寒藥得之緩其寒寒熱相雜者用之得其平好古曰五味之用苦泄辛散酸收鹹斂甘上行而發而本草言甘草下氣何也葢甘味主中有升降浮沉可上可下可外可内有和有緩有補有泄居中之道盡矣張仲景附子理中湯用甘草恐其僭上也調胃承氣湯用甘草恐其速下也皆緩之之意小柴胡湯有柴胡黄芩之寒人參半夏之温而用甘草者則有調和之意建中湯用甘草以補中而緩脾急也鳳髓丹用甘草以緩腎急而生元氣也乃甘補之意又曰甘者令人中滿中滿者勿食甘甘緩而壅氣非中滿所宜也凡不滿而用炙甘草為之補若中滿而用生甘草為之㵼能引諸藥直至滿所甘味入脾歸其所喜此升降浮沉之理也經云以甘補之以甘㵼之以甘緩之是矣時珍曰甘草外赤中黄色兼坤離味濃氣薄資全土徳協和羣品有元老之功普治百邪得王道之化賛帝力而人不知斂神功而已不與可謂藥中之良相也然中滿嘔吐酒客之病不喜其甘而大㦸芫花甘遂海藻與之相反是亦迂緩不可以救昬昧而君子嘗見嫉於宵人之意與頌曰按孫思邈千金方論云甘草解百藥毒如湯沃雪有中鳥頭巴豆毒甘草入腹即定騐如反掌方稱大豆汁解百藥毒予毎試之不效加入甘草為甘豆湯其驗乃竒也又葛洪肘後備急方云席辯刺史嘗言嶺南俚人解蠱毒藥並是常用之物畏人得其法乃言三百頭牛藥或言三百兩銀藥乆與親狎乃得其詳凡飲食時先取炙熟甘草一寸嚼之嚥汁若中毒隨即吐出仍以炙甘草三兩生薑四兩水六升煑二升日三服或用都淋藤黄藤二物酒煎温常服則毒隨大小溲出又常帶甘草數寸隨身備急若經含甘草而食物不吐者非毒物也三百頭牛藥即土常山也三百兩銀藥即馬兜鈴藤也詳見各條附方舊十五新二十傷寒心悸脉結代者甘草二兩水三升煑一半服七合日一服傷寒類要傷寒咽痛少隂證甘草湯主之用甘草二兩蜜水炙水二升煑一升半服五合日二服張仲景傷寒論肺熱㗋痛有痰熱者甘草炒二兩桔梗米泔浸一夜一兩毎服五錢水一鍾半入阿膠半片煎服錢乙直訣肺痿多涎肺痿吐涎沫頭眩小便數而不欬者肺中冷也甘草乾薑湯温之甘草炙四兩乾薑炮二兩水三升煑一升五合分服張仲景金匱要畧肺痿乆𠻳涕唾多骨節煩悶寒熱以甘草三兩炙搗為末每日取小便三合調甘草末一錢服之廣利方小兒熱𠻳甘草二兩豬膽汁浸五宿炙研末蜜丸緑豆大食後薄荷湯下十丸名涼膈丸聖惠方初生解毒小兒初生未可便與硃砂蜜只以甘草一指節長炙碎以水二合煮取一合以綿染㸃兒口中可為一蜆殻當吐出胸中惡汁此後待兒饑渇更與之令兒智慧無病出痘稀少王璆選方初生便閉甘草枳殻煨各一錢水半盞煎服全幼心鑑小兒撮口發噤用生甘草二錢半水半盞煎六分温服令吐痰涎後以乳汁㸃兒口中金匱玉函嬰兒目澀月内目閉不開或腫羞明或出血者名慢肝風用甘草一截以豬膽汁炙為末毎用米泔調少許灌之幼幼新書小兒遺尿大甘草頭煎湯夜夜服之危氏得效方小兒尿血甘草一兩二錢水六合煎二合一嵗兒一日服盡姚和衆至寳方小兒羸瘦甘草三兩炙焦為末蜜丸緑豆大毎温水下五丸日二服金匱玉􅖘大人羸瘦甘草三兩炙毎旦以小便煮四沸頓服之良外臺秘要赤白痢下崔宣州衍所傳方用甘草一尺炙劈破以淡漿水蘸水一升半煎取八合服之立效梅師方用甘草一兩炙肉豆蔲七個煨剉以水三升煎一升分服舌腫塞口不治殺人甘草煎濃湯熱潄頻吐總聖濟録太隂口瘡甘草二寸白礬一粟大同嚼嚥汁保命集發背癰疽崔元亮海上集驗方云李北海言此方乃神授極竒秘用甘草三大兩生搗篩末大麥麪九兩和匀取好酥少許入内下沸水搜如餅狀方圓大於瘡一分熱傅腫上以紬片及故紙隔令通風冷則换之已成者膿水自出未成者腫便内消仍當喫黄芪粥為妙横又一法甘草一大兩水炙搗碎水一大升浸之器上一小刀子露一宿平明以物攪令沫出去沫服之但是瘡腫發背皆甚效蘇頌圖經諸般癰疽甘草三兩微炙切以酒一斗同浸瓶中用黑鉛一片溶成汁投酒中取出如此九度令病者飲酒至醉寢後即愈也經驗方一切癰疽諸發預期服之能消腫逐毒使毒不内攻功效不可具述用大横文粉草二斤槌碎河水浸一宿揉取濃汁再以宻絹過銀石器内慢火熬成膏以梵罐收之毎服一二匙無灰酒或白湯下曽服丹藥者亦解之或微利無妨名國老膏外科精要方癰疽秘塞生甘草二錢半井水煎服能疎導下惡物直指方乳癰初起炙甘草二錢新水煎服仍令人咂之直指方些小癰癤發熱時即用粉草節晒乾為末熱酒服一二錢連進數服痛熱皆止外科精要方痘瘡煩渇粉甘草炙栝樓根等分水煎服血脉發瘡痘也甘草能通直指方隂下懸癰生於穀道前後初發如松子大漸如蓮子數十日後赤腫如桃李成膿即破破則難愈也用横文甘草一兩四寸截斷以深澗長流水一盌河水井水不用以文武火慢慢蘸水炙之自早至午令水盡為度劈開視之中心水潤乃止細剉用無灰好酒二小盌煎至一盌温服次日再服便可保無虞此藥不能急消過二十日方得消盡興化守康朝病已破衆醫拱手服此二劑即合口乃韶州劉從周方也李迅癰疽方隂頭生瘡蜜炙甘草末頻頻塗之神效千金方隂下濕癢甘草煎湯日洗三五度古今録驗代指腫痛甘草煎湯漬之千金方凍瘡發裂甘草煎湯洗之次以黄連黄藥黄芩末入輕粉麻油調傳談埜翁方湯火瘡灼甘草煎蜜塗李樓竒方蠱毒藥毒甘草節以真麻油浸之年乆愈妙毎用嚼嚥或水煎服神效直指方小兒中蠱欲死者甘草半兩水一盞煎五分服當吐出金匱玉函牛馬肉毒甘草煑濃汁飲一二升或煎酒服取吐或下如渇不可飲水飲之即死千金方飲饌中毒未審何物卒急無藥只煎甘草薺苨湯入口便活函金匱玉方水莨菪毒菜中有水莨菪葉圓而光有毒誤食令人狂亂狀若中風或作吐以甘草煮汁服之即解金匱玉函妙方黄耆本經上品釋名黄茋綱目戴糝本經戴椹别録又名獨椹芰草别録又名蜀脂百本别録王孫藥性論名時珍曰耆長也黄耆色黄為補藥之長故今俗通作黄茋或作蓍者非矣蓍乃蓍龜之蓍音尸王孫與牡蒙同名異物集解别録曰黄耆生蜀郡山谷白水漢中二月十月采隂乾𢎞景曰第一出隴西洮陽色黄白甜美今亦難得次用黒水宕昌者色白肌理粗新者亦甘而温補又有蠶陵白水者色理勝蜀中者而冷補又有赤色者可作膏貼俗方多用道家不須恭曰今出原州及華原者最良蜀漢不復采用宜州寧州者亦佳頌曰今河東陜西州郡多有之根長一二尺以來獨莖或作叢生枝榦去地二三寸其葉扶疎作羊齒状又如蒺藜苗七月中開黄紫花其實作莢子長寸許八月中采根用其皮折之如綿謂之綿黄耆然有數種有白水耆赤水耆木耆功用並同而力不及白水者木耆短而理横今人多以苜蓿根假作黄耆折皮亦似綿頗能亂真但苜蓿根堅而脆黄耆至柔靭皮微黄褐色肉中白色此為異耳承曰黄耆本出綿上者為良故名綿黄耆非謂其柔靭如綿也今圖經所繪憲州者地與綿上相隣也好古曰綿上即山西沁州白水在陜西同州黄耆味甘柔軟如綿能令人肥苜蓿根味苦而堅脆俗呼為土黄耆能令人瘦用者宜審嘉謨曰綿上沁州鄉名今有廵檢司白水赤水二鄉俱属隴西時珍曰黄耆葉似槐葉而微尖小又似蒺藜葉而微濶大青白色開黄紫花大如槐花結小尖角長寸許根長二三尺以𦂳實如箭簳者為良嫩苗亦可淘茹食其子收之十月下種如種菜法亦可修治斆曰凡使勿用木耆草真相似只是生時葉短并根横也須去頭上皺皮蒸半日擘細於槐砧上剉用時珍曰今人但槌扁以蜜水塗炙數次以熟為度亦有以鹽湯潤透器盛於湯瓶蒸熟切用者根氣味甘微温無毒本經白水者冷補别録元素曰味甘氣温平氣薄味厚可升可降隂中陽也入手足太隂氣分又入手少陽足少隂命門之才曰茯苓為之使惡龜甲白鮮皮主治癰疽乆敗瘡排膿止痛大風癩疾五痔鼠瘻補虚小兒百病本經婦人子臓風邪氣逐五臓間惡血補丈夫虚損五勞羸瘦止渇腹痛洩痢益氣利隂氣别録主虚喘腎衰耳聾療寒熱治發背内補甄權助氣壯筋骨長肉補血破癥癖瘰癧癭贅腸風血崩帶下赤白痢産前後一切病月候不匀痰𠻳頭風熱毒赤目日華治虚勞自汗補肺氣㵼肺火心火實皮毛益胃氣去肌熱及諸經之痛元素主太隂瘧疾陽維為病苦寒熱督脉為病逆氣裏急好古發明𢎞景曰出隴西者温補出白水者冷補又有赤色者可作膏用消癰腫藏器曰虚而客熱用白水黄耆虚而客冷用隴西黄耆大明曰黄耆藥中補益呼為羊肉白水耆涼無毒排膿治血及煩悶熱毒骨蒸勞赤水耆涼無毒治血退熱毒餘功並同木耆涼無毒治煩排膿之力微於黄耆遇闕即倍用之元素曰黄耆甘温純陽其用有五補諸虚不足一也益元氣二也壯脾胃三也去肌熱四也排膿止痛活血生血内托隂疽為瘡家聖藥五也又曰補五臓諸虚治脉弦自汗瀉隂火去虚熱無汗則發之有汗則止之好古曰黄耆治氣虚盗汗并自汗及膚痛是皮表之藥治路血柔脾胃是中州之藥治傷寒尺脉不至補腎臓元氣是裏藥乃上中下内外三焦之藥也杲曰靈樞云衛氣者所以溫分肉而充皮膚肥腠理而司開闔黄耆既補三焦實胃氣與桂同功特比桂甘平不辛熱為異耳但桂則通血脉能破血而熱衛氣耆則益氣也又黄耆與人參甘草三味為除躁熱肌熱之聖藥脾胃一虚肺氣先絶必用黄耆温分肉益皮毛實腠理不令汗出以益元氣而補三焦震亨曰黄耆補元氣肥白而多汗者為宜若面黒形實而瘦者服之令人胸滿宜以三抝湯瀉之陳宗奭曰防風黄耆世多相須而用唐許𦙍宗初仕為新蔡王外兵參軍時栁太后病風不能言脉沈而口噤􅏷宗曰既不能下藥宜湯氣蒸之藥入腠理周時可瘥乃造黄耆防風湯數斛置於牀下氣如烟霧其夕便得語也杲曰防風能制黄耆黄耆得防風其功愈大乃相畏而相使也震亨曰人之口通乎地鼻通乎天口以養隂鼻以養陽天主清故鼻不受有形而受無形地主濁故口受有形而兼乎無形栁太后之病不言若以有形之湯緩不及事今投以二物湯氣滿室則口鼻俱受非智者通神不可回生也胃杲曰小兒外物驚宜用黄連安神丸鎮心藥若脾寒濕吐腹痛瀉痢青白宜用益黄散藥如脾胃伏火勞役不足之證及服巴豆之類胃虚而成慢驚者用益黄理中之藥必傷人命當於心經中以甘温補土之源更於脾土中以甘寒瀉火以酸凉補金使金旺火衰風木自平矣今立黄耆湯瀉火補金益土為神治之法用炙黄耆二錢人參一錢炙甘草五分白芍藥五分水一大盞煎半盞温服有機曰蕭山魏直著博愛心鑑三卷言小兒痘瘡惟順逆險三證順者為吉不用藥逆者為凶不必用藥惟險乃悔吝之象當以藥轉危為安宜用保元湯加減主之此方原出東垣治慢驚土衰火旺之法今借而治痘以其内固營血外䕶衛氣滋助隂陽作為膿水其證雖異其理則同去白芍藥加生薑改名曰保元湯炙黄耆三錢人參二錢炙甘草一錢生薑一片水煎服之險證者初出圓暈乾紅少潤也将長光澤頂陷不起也既出雖起慘色不明也漿行色灰不榮也漿定光潤不消也漿老濕潤不斂也結痂而胃弱内虚也痂落而口渇不食也痂後生癰腫也癰腫潰而斂遲也凡有諸證並宜此湯或加芎藭加官桂加糯米以助之詳見本書嘉謨曰人參補中黄耆實表凡内傷脾胃發熱惡寒吐泄怠卧脹滿痞塞神短脉微者當以人參為君黄耆為臣若表虚自汗亡陽潰瘍痘疹隂瘡者當以黄耆為君人參為臣不可執一也附方舊五新九小便不通綿黄耆二錢水二盞煎一盞温服小兒減半總微論酒疸黄疾心下懊痛足脛滿小便黄飲酒發赤黑黄斑由大醉當風入水所致黄耆二兩木蘭一兩為末酒服方寸七日三服肘後方氣虚白濁黄茋鹽炒半兩茯苓一兩為末毎服一錢白湯下良經驗方治渇補虚男子婦人諸虚不足煩悸焦渇面色萎黄不能飲食或先渇而後發瘡癤或先癰疽而後發渇並宜常服此藥平補氣血安和臓腑終身可免癰疽之疾用綿黄耆箭簳者去蘆六兩一半生焙一半以鹽水潤濕飯上蒸三次焙剉粉甘草一兩一半生用一半炙黄為末毎服二錢白湯㸃服早晨日午各一服亦可煎服名黄芪六一湯外科精要老人閟塞綿黄耆陳皮去白各半兩為末毎服三錢用大麻子一合研爛以水濾漿煎至乳起入白蜜一匙再煎沸調藥空心服甚者不過二服此藥不冷不熱常服無秘塞之患其效如神和劑局方腸風瀉血黄耆黄連等分為末麪糊丸緑豆大毎服三十丸米飲下孫用和秘寳方尿血沙淋痛不可忍黄耆人參等分為末以大蘿蔔一個切一指厚大四五片蜜二兩淹炙令盡不令焦㸃末食無時以鹽湯下永類方吐血不止黄耆二錢半紫背浮萍五錢為末毎服一錢薑蜜水下聖濟縂録欬𠻳膿血咽乾乃虚中有熱不可服涼藥以好黄耆四兩甘草一兩為末毎服二錢㸃湯服席延賞方肺癰得吐黄耆二兩為末毎服二錢水一中盞煎至六分温服日三四服聖惠方甲疽瘡膿生足趾甲邉赤肉突出時常舉發者黄耆二兩䕡茹一兩醋浸一宿以豬脂五合㣲火上煎取二合絞去滓以封瘡口上日三度其内自消外臺秘要胎動不安腹痛下黄汁黄耆川芎藭各一兩糯米一合水一升煎半升分服婦人良方隂汗濕痒綿黄耆酒炒為末以熟豬心㸃喫妙急趙真人濟方痒疽内固黄耆人參各一兩為末入真龍腦一錢用生藕汁和丸緑豆大毎服二十丸温水下日日服本事方莖葉主治療渇及筋攣癰腫疽瘡别録人參本經上品釋名人薓音參或省作蓡黄參呉普血參别録人䘖本經鬼葢本經神草别録土精别録地精廣雅海腴皺面還丹廣雅薓時珍曰人年深浸漸長成者根如人形有神故謂之人薓神草薓字從􅒓亦浸漸之義􅒓即浸字後世因字文繁遂以參星之字代之從簡便爾然承誤日乆亦不能變矣惟張仲景傷寒論尚作薓字别録一名人微微乃薓字之訛也其成有階級故曰人衘其草背陽向隂故曰鬼葢其在五參色黄屬土而補脾胃生隂血故有黄參血參之名得地之精靈故有土精地精之名廣五行記云隋文帝時上黨有人宅後毎夜聞人呼聲求之不得去宅一里許見人參枝葉異常掘之入地五尺得人薓一如人體四肢畢備呼聲遂絶觀此則土精之名尤可證也禮斗威儀云下有人參上有紫氣春秋運斗樞云揺光星散而為人參人君廢山瀆之利則揺光不明人參不生觀此則神草之名又可證矣集解别録曰人參生上黨山谷及遼東二月四月八月上旬采根竹刀刮暴乾無令見風根如人形者有神普曰或生邯鄲三月生葉小鋭枝黒莖有毛三月九月采根根有手足面目如人者神𢎞景曰上黨在冀州西南今來者形長而黄状如防風多潤實而甘俗乃重百濟者形細而堅白氣味薄於上黨者次用高麗者高麗即是遼東形大而虚軟不及百濟並不及上黨者其草一莖直上四五相對生花紫色高麗人作人參讚云三椏五葉背陽向隂欲來求我椵樹相尋椵音賈樹似桐甚大隂廣則多生采作甚有法今近山亦有但作之不好恭曰人參見用多是高麗百濟者潞州太行紫團山所出者謂之紫團參保升曰今沁州遼州澤州箕州平州易州檀州幽州嬀州并州並出人參葢其山皆與太行連亘相接故也珣曰新羅國所貢者有手足状如人形長尺餘以杉木夾定紅絲纒飭之又沙州參短小不堪用頌曰今河東諸州及泰山皆有之又有河北𣙜塲及閩中來者名新羅人參俱不及上黨者佳春生苖多於深山背隂近椵漆下濕潤處初生小者三四寸許一椏五葉四五年後生兩椏五葉未有花莖至十年後生三椏年深者生四椏各五葉中心生一莖俗名百尺杵三月四月有花細小如粟蕊如絲紫白色秋後結子或七八枚如大豆生青熟紅自落根如人形者神泰山出者葉榦青根白殊别江淮間出一種土人參苗長一二尺葉如匙而小與桔梗相似相對生生五七節根亦如桔梗而柔味極甘美秋生紫花又帶青色春秋采根土人或用之相傳欲試上黨參但使二人同走一含人參一空口度走三五里許其不含人參走必大喘含者氣息自如其人參乃真也宗奭曰上黨者根頗纎長根下垂有及一尺餘者或十岐者其價與銀等稍為難得土人得一窠則置板上以新綵絨飾之嘉謨曰紫圑參紫色稍扁百濟參白堅且圓名白條參俗名羊角參遼東參黄潤纎長有鬚俗名黄參獨勝高麗參近紫體虚新羅參亞黄味薄肖人形者神其類雞腿者力洪時珍曰上黨今潞州也民以人參為地方害不復采取今所用者皆是遼參其高麗百濟新羅三國今皆屬於朝鮮矣其參猶來中國互市亦可收子於十月下種如種菜法秋冬采者堅實春夏采者虚軟非地産有虚實也遼參連皮者黄潤色如防風去皮者堅白如粉偽者皆以沙參薺苨桔梗采根造作亂之沙參體虚無心而味淡薺苨體虚無心桔梗體堅有心而味苦人參體實有心而味甘微帶苦自有余味俗名金井玉䦨也其似人形者謂之孩兒參尤多􅎓偽宋蘇頌圖經本草所繪潞州者三椏五葉真人參也其滁州者乃沙參之苗葉沁州兖州者皆薺苨之苗葉其所云江淮土人參者亦薺苨也並失之詳審今潞州者尚不可得則他處者尤不可信矣近又有薄夫以人參先浸取汁自啜乃晒乾復售謂之湯參全不任用不可不察考月池翁諱言聞字子郁衘太醫吏目嘗著人參𫝊上下卷甚詳不能備録亦畧節要語於下條云耳修治𢎞景曰人參易蛀蚛惟納新器中宻封可經年不壊炳曰人參頻見風日則易蛀惟用盛過麻油瓦罐泡浄焙乾入華隂細辛與參相間收之宻封可留經年一法用淋過竈灰晒乾罐收亦可李言聞曰人參生時背陽故不喜見風日凡生用宜㕮咀熟用宜隔紙焙之或醇酒潤透㕮咀焙熟用並忌鐡器根氣味甘微寒無毒别録曰微温普曰神農小寒桐君雷公苦黄帝岐伯甘無毒元素曰性温味甘微苦氣味俱薄浮而升陽中之陽也又曰陽中微隂之才曰茯苓馬藺為之使惡溲疏鹵鹹反藜蘆一云畏五靈脂惡皂莢黑豆動紫石英元素曰人參得升麻引用補上焦之元氣瀉肺中之火得茯苓引用補下焦之元氣瀉腎中之火得麥門冬則生脉得乾薑則補氣杲曰得黄耆甘草乃甘温除大熱瀉隂火補元氣又為瘡家聖藥震亨曰人參入手大隂與藜蘆相反服參一兩入藜蘆一錢其功盡廢也言聞曰東垣李氏理脾胃瀉隂火交泰丸内用人參皂莢是惡而不惡也古方療月閉四物湯加人參五靈脂是畏而不畏也又療痰在胸膈以人參藜蘆同用而取涌越是激其怒性也此皆精微妙奥非達權衡者不能知主治補五臓安精神定魂魄止驚悸除邪氣明目開心益智乆服輕身延年本經療腸胃中冷心腹鼔痛胸脇逆滿霍亂吐逆調中止消渇通血脉破堅積令人不忘别録主五勞七傷虚損痰弱止嘔噦補五臓六腑保中守神消胸中痰治肺痿及癎疾冷氣逆上傷寒不下食凡虚而多夢紛紜者加之甄權止煩躁變酸水李珣消食開胃調中治氣殺金石藥毒大明治肺胃陽氣不足肺氣虚促短氣少氣補中緩中瀉心肺脾胃中火邪止渇生津液元素治男婦一切虚證發熱自汗眩運頭痛反胃吐食痎瘧滑瀉乆痢小便頻數淋瀝勞倦内傷中風中暑痿痺吐血𠻳血下血血淋血崩胎前産後諸病時珍發明𢎞景曰人參為藥切要與甘草同功杲曰人參甘温能補肺中元氣肺氣旺則四臓之氣皆旺精自生而形自盛肺主諸氣故也張仲景云病人汗後身熱亡血脉沉遲者下痢身涼脉微血虚者並加人參古人血脱者益氣葢血不自生須得生陽氣之藥乃生陽生則隂長血乃旺也若單用補血藥血無由而生矣素問言無陽則隂無以生無隂則陽無以化故補氣須用人參血虚者亦須用之本草十劑云補可去弱人參羊肉之屬是也葢人參補氣羊肉補形形氣者有無之象也好古曰潔古老人云以沙參代人參取其味甘也然人參補五臓之陽沙參補五臓之隂安得無異雖云補五臓亦須各用本臓藥相佐使引之言聞曰人參生用氣涼熱用氣温味甘補陽微苦補隂氣主生物本乎天味主成物本乎地氣味生成隂陽之造化也凉者高秋清肅之氣天之隂也其性降温者陽春生發之氣天之陽也其性升甘者濕土化成之味地之陽也其性浮微苦者火土相生之味地之隂也其性沉人參氣味俱薄氣之薄者生降熟升味之薄者生升熟降如土虚火旺之病則宜生參涼薄之氣以瀉火而補土是純用其氣也脾虚肺怯之病則宜熟參甘温之味以補土而生金是純用其味也東垣以相火乗脾身熱而煩氣高而喘頭痛而渇脉洪而大者用黄蘗佐人參孫真人治夏月熱傷元氣人汗大泄欲成痿厥用生脉散以瀉熱火而救金水君以人參之甘涼瀉火而補元氣臣以麥門冬之苦甘寒清金而滋水源佐以五味子之酸温生腎精而收耗氣此皆補天元之真氣非補熱火也白飛霞云人參鍊膏服回元氣於無何有之鄉凡病後氣虚及肺氣𠻳者並宜之若氣虚有火者合天門冬膏對服之正誤斆曰夏月少使人參發心痃之病好古曰人參甘温補肺之陽泄肺之隂肺受寒邪宜此補之肺受火邪則反傷肺宜以沙參代之王綸曰凡酒色過度損傷肺腎真隂隂虚火動勞𠻳吐血欬血等證勿用之葢人參入手太隂能補火故肺受火邪者忌之若誤用參耆甘温之劑則病日増服之過多則死不可治葢甘温助氣氣屬陽陽旺則隂愈消惟宜苦甘寒之藥生血降火世人不識往往服參耆為補而死者多矣百言聞曰孫真人云夏月服生脉散腎瀝湯三劑則病不生李東垣亦言生脉散清暑益氣湯乃三伏瀉火益金之聖藥而雷斆反謂發心痃乆患非矣痃乃臍旁積氣非心病也人參能養正破堅積豈有發痃之理觀張仲景治腹中寒氣上衝有頭足上下痛不可觸近嘔不能食者用大建中湯可知矣又海藏王好古言人參補陽泄隂肺寒宜用肺熱不宜用節齋王綸因而和之謂參耆能補肺火隂虚火動失血諸病多服必死二家之失皆偏矣夫人參能補元陽生隂血而瀉隂火東垣李氏之説也明矣仲景張氏言亡血血虚者並加人參又言肺寒者去人參加乾薑無令氣壅丹溪朱氏亦言虚火可補参耆之屬實火可瀉苓連之屬二家不察三氏之精微而謂人參補火謬哉夫火與元氣不兩立元氣勝則邪火退人參既補元氣而又補邪火是反復之小人矣何以與甘草苓术謂之四君子耶雖然三家之言不可盡廢也惟其語有滯故守之者泥而執一遂視人參如蛇蝎則不可也凡人面白面黄面青黧悴者皆脾肺腎氣不足可用也面赤面黒者氣壯神强不可用也脉之浮而芤濡虚大遲緩無力沉而遲濇弱細結代無力者皆虚而不足可用也若弦長𦂳實滑數有力者皆火鬱内實不可用也潔古謂喘𠻳勿用者痰實氣壅之喘也若腎虚氣短喘促者必用也仲景謂肺寒而欬勿用者寒束熱邪壅鬱在肺之欬也若自汗惡寒而欬者必用也東垣謂乆病鬱熱在肺勿用者乃火鬱于内宜發不宜補也若肺虚火旺氣短自汗者必内也丹溪言諸痛不可驟用者乃邪氣方鋭宜散不宜補也若裏虚吐利及乆病胃弱虚痛喜按者必用也節齋謂隂虚火旺勿用者乃血虚火亢能食脉弦而數涼之則傷胃温之則傷肺不受補者也若自汗氣短肢寒脉虚者必用也如此詳審則人參之可用不可用思過半矣機曰節齋王綸之説本於海藏王好古但綸又過于矯激丹溪言虚火可補須用參茋又云隂虚潮熱喘𠻳吐血盜汗等證四物加人參黄蘗知母又云好色之人肺腎受傷欬𠻳不愈瓊玉膏主之又云肺腎虚極者獨參膏主之是知隂虚勞瘵之證未嘗不用人參也節齋私淑丹溪者也而乃相反如此斯言一出印定後人眼目凡遇前證不問病之宜用不宜輒舉以藉口致使良工掣肘惟求免夫病家之怨病家亦以此説横之胸中甘受苦寒雖至上嘔下泄去死不逺亦不悟也古今治勞莫過於葛可乆其獨參湯保真湯何嘗廢人參而不用耶節齋之説誠未之深思也楊起曰人參功載本草人所共知近因病者吝財薄醫醫服算本惜費不肯用參療以致輕者致重重重者至危然有肺寒肺熱中滿血虚四證只宜散寒消熱消脹補營不用人參其説近是殊不知各加人參在内䕶持元氣力助羣藥其功更捷若曰氣無補法則謬矣古方治肺寒以温肺湯肺熱以清肺湯中滿以分消湯血虚以養營湯皆有人參在焉所謂邪之所腠其氣必虚又曰養正邪自除陽旺則生隂血貴在配合得宜爾庸醫毎謂人參不可輕用誠哉庸也好生君子不可輕命薄醫醫亦不可計利不用書此奉勉幸勿曰迂附方舊九新六十八人參膏用人參十兩細切以活水二十盞浸透入銀石器内桑柴火緩緩煎取十盞濾汁再以水十盞煎取五盞與前汁合煎成膏瓶收隨病作湯使丹溪云多慾之人腎氣衰憊欬𠻳不止用生薑橘皮煎湯化膏服之浦江鄭兄五月患痢人犯房室忽發昬運不知人事手撒目暗自汗如雨㗋中痰鳴如拽鋸聲小便遺失脉大無倫此隂虧陽絶之證也予令急煎大料人參膏仍與炙氣海十八壯右手能動再三壯唇口微動遂與膏服一盞半夜後服三盞眼能動盡三斤方能言而索粥盡五斤而痢止至十斤而全安若作風治則誤矣一人背疽服内托十宣藥已多膿出作嘔發熱六脉沉數有力此潰瘍所忌也遂與大料人參膏入竹瀝飲之參盡一十六斤竹伐百餘竿而安後經旬餘值大風㧞木瘡起有膿中有紅線一道過肩脾抵右肋予曰急作參膏以芎歸橘皮作湯入竹瀝薑汁飲乏盡三斤而瘡潰調理乃安若癰疽潰後氣血俱虚嘔逆不食變證不一者以參耆歸术等分煎膏服之最妙治中湯頌曰張仲景治胸脾心中痞堅留氣結胸胸滿脇下逆氣搶心治中湯主之即理中湯人參术乾薑甘草各三兩四味以水八升煑三升毎服一升日三服隨證加减此方自晉宋以後至唐名醫治心腹病者無不用之或作湯或蜜丸或為散皆有竒效胡洽居士治霍亂謂之温中湯陶隠居百一方云霍亂餘藥乃或難求而治中方四順湯厚朴湯不可暫缺常須預合自隨也唐石泉公王方慶云數方不惟霍亂可醫諸病皆療也四順湯用人參甘草乾薑附子炮各二兩水六升煎二升半分四服四君子湯治脾胃氣虚不思飲食諸病氣虚者以此為主人參一錢白术二錢白茯苓一錢炙甘草五分薑三片棗一枚水二鍾煎一鍾食前温服隨證加減和濟局方開胃化痰不思飲食不拘大人小兒人參焙二兩半夏薑汁浸焙五錢為末飛羅麪作糊丸緑豆大食後薑湯下三五十丸日三服聖惠方加陳橘皮五錢經驗方胃寒氣滿不能𫝊化易饑不能食人參末二錢生附子末半錢生薑二錢水七合煎二合雞子清一枚打轉空心服之聖濟總録脾胃虚弱不思飲食生薑半斤取汁白蜜十兩人參末四兩銀鍋煎成膏毎米飲調服一匙普濟方胃虚惡心或嘔吐有痰人參一兩水二盞煎一盞入竹瀝一盃薑汁三匙食逺温服以知為度老人尤宜簡便方胃寒嘔惡不能腐熟水穀食即嘔吐人參丁香藿香各二錢半橘皮五錢生薑三片水二盞煎一盞溫服㧞萃方反胃嘔吐飲食入口即吐困弱無力垂死者上黨人參三大兩拍破水一大升煑取四合熱服日再兼以人參汁入粟米雞子白薤白煮粥與噉李直方司勲於漢南患此兩月餘諸方不瘥遂與此方當時便定後十餘日遂入京師絳毎與名醫論此藥難可為儔也李絳兵部手集食入即吐人參半夏湯用人參一兩半夏一兩五錢生薑十片水一斗以杓揚二百四十遍取三升入白蜜三合煮一升半分服張仲景金匱方霍亂嘔惡人參二兩水一盞半煎汁一盞入雞子白一枚再煎温服一加丁香衛生家寳方霍亂煩悶人參五錢桂心半錢水二盞煎服聖惠方霍亂吐瀉煩躁不止人參二兩橘皮三兩生薑一兩水六升煮三升分三服總聖濟録妊娠吐水酸心腹痛不能飲食人參乾薑炮等分為末以生地黄汁和丸梧子大毎服五十丸米湯下和劑局方陽虚氣喘自汗盜汗氣短頭運人參五錢熟附子一兩分作四帖毎帖以生薑十片流水兩盞煎一盞食逺温服濟生方喘急欲絶上氣鳴息者人參末湯服方寸匕日五六服效肘後方産後發喘乃血入肺竅危証也人參末一兩蘇木二兩水二盌煮汁一盌調參末服神效聖惠方産後血運人參一兩紫蘇半兩以童尿酒水三合煎服要醫方摘産後不語人參石菖蒲石蓮肉等分毎服五錢水煎服婦人良方産後諸虚發熱自汗人參當歸等分為末用豬腰子一個去膜切小片以水三升糯米半合葱白二莖煮米熟取汁一盞入藥煎至八分食前温服永類方産後秘塞出血多以人參麻子仁枳殻麩炒為末煉蜜丸梧子大毎服五十丸米飲下濟生方横生倒産人參末乳香末各一錢丹砂末五分研匀雞子白一枚人生薑自然汁三匙攪匀冷服即母子俱安神效此施漢卿方也婦人良方開心益智人參末一兩錬成豶豬肥肪十兩以淳酒和匀毎服一盃日再服服至百日耳目聰明骨髓充盈肌膚潤澤日記千言兼去風熱痰病千金方聞雷即昬一小兒七嵗聞雷即昬倒不知人事此氣怯也以人參當歸麥門冬各二兩五味子五錢水一斗煎汁五升再以水五升煎滓取汁二升合煎成膏毎服三匙白湯化下服盡一斤自後聞雷自若矣楊起簡便方忽喘悶絶方見大黄下離魂異疾有人卧則覺身外有身一様無别但不語葢人卧則魂歸於肝此由肝虚邪襲魂不歸舍病名曰離魂用人參龍齒赤茯苓各一錢水一盞煎半盞調飛過朱硃末一錢睡時服一夜三服三夜後真者氣爽假者即化矣夏子益怪證竒疾方怔忡自汗心氣不足也人參半兩當歸半兩用豶豬腰子二個以水二盌煮至一盌半取腰子細切人參歸同煎至八分空心喫腰子以汁送下其滓焙乾為末以山藥末作糊丸緑豆大毎服五十丸食逺棗湯下不過二服即愈此昆山神濟大師方也一加乳香二錢王璆百一選方心下結氣凡心下硬按之則無常覺膨滿多食則吐氣引前後噫呃不除由思慮過多氣不以時而行則結滯謂之結氣人參一兩橘皮去白四兩為末煉蜜丸梧子大毎米飲下五六十丸聖惠方房後困倦人參七錢陳皮一錢水一盞半煎八分食前温服日再服千金不傳趙永菴方虚勞發熱愚魯湯用上黨人參銀州柴胡各三錢大棗一枚生薑三兩水一鍾半煎七分食逺温服日再服以愈為度竒效良方肺熱聲啞人參二兩訶子一兩為末噙嚥丹溪摘𤣥肺虚乆欬人參末二兩鹿角膠炙研一兩毎服三錢用薄荷豉湯一盞葱少許入銚子煎一二沸傾入盞内遇欬時温呷三五口甚佳本食療草止𠻳化痰人參末一兩明礬二兩以釅醋二升熬礬成膏入參末煉蜜和收毎以豌豆大一丸放舌下其𠻳即止痰自消簡便方小兒喘欬發熱自汗吐紅脉虚無力者人參天花粉等分毎服半錢蜜水調下以瘥為度經濟方喘欬𠻳血欬喘上氣喘急𠻳血吐血脉無力者人參末毎服三錢雞子清調之五更初服便睡去枕仰卧只一服愈年深者再服咯血者服盡一兩甚好一方以烏鷄子水磨千遍自然化作水調藥尤妙忌醋醎腥醤麪鮓醉飽将息乃佳沈存中靈苑方欬𠻳吐血人參黄耆飛羅麪各一兩百合五錢為末水丸梧子大毎服五十丸食前茅根湯下和朱氏集驗方用人參乳香辰砂等分為末烏梅肉丸彈子大毎白湯化下一丸日一服虚勞吐血甚者先以十灰散止之其人必困倦法當補陽生隂獨參湯主之好人參一兩肥棗五枚水二鍾煎一鍾服熟睡一覺即減五六繼服調理藥葛可乆十藥神書吐血下血因七情所感酒色内傷氣血妄行口鼻俱出心肺脉破血如泉湧須臾不救用人參焙側柏葉蒸焙荆芥穗燒存性各五錢為末用二錢入飛羅麪二錢以新汲水調如稀糊服少頃再啜一服立止華陀中藏經衂血不止人參栁枝寒食采者等分為末毎服一錢東流水服日三服無栁枝用蓮子心聖濟總録齒縫出血人參赤茯苓麥門冬各二錢水一鍾煎七分食前温服日再蘇東坡得此自謂神竒後生小子多患此病予累試之累如所言談埜翁試效方隂虚尿血人參焙黄耆鹽水炙等分為末用紅皮大蘿蔔一枚切作四片以蜜二兩将蘿蔔逐片蘸炙令乾再炙勿令焦以蜜盡為度毎用一片蘸藥食之仍以鹽湯送下以瘥為度三因方沙淋石淋方同上消渇引飲人參為末雞子清調服一錢日三四服子集驗用人參栝樓根等分生研為末煉蜜丸梧大毎服百丸食前麥門冬湯下日二服以愈為度名玉壺丸忌酒麪炙煿鄭氏家𫝊消渇方人參一兩粉草二兩以雄猪膽汁浸炙腦子半錢為末蜜丸芡子大毎嚼一丸冷水下聖濟總録用人參一兩葛粉二兩為末發時以燖豬湯一升入藥三錢蜜二兩慢火熬至三合状如黒餳以瓶收之毎夜以一匙含嚥不過三服取效也虚瘧發熱人參二錢二分雄黄五錢為末端午日用椶尖搗丸梧子大發日侵辰井華水吞下七丸發前再服忌諸般熱物立效一方加神麯等分丹溪纂要冷痢厥逆六脉沉細人參大附子各一兩半毎服半兩生薑十片丁香十五粒粳米一撮水二盞煎七分空心温服經驗方下痢禁口人參蓮肉各三錢以井華水二盞煎一盞細細呷之或加薑汁炒黄連三錢選經驗良方老人虚痢不止不能飲食上黨人參一兩鹿角去皮炒研五錢為末毎服方寸匕米湯調下日三服十便良方傷寒壞證凡傷寒時疫不問隂陽老幼妊婦誤服藥餌困重垂死脉沉伏不省人事七日以後皆可服之百不失一此名奪命散又名復脉湯人參一兩水二鍾𦂳火煎一鍾以井水浸冷服之少頃鼻梁有汗出脉復立瘥蘇韜光侍郎云用此救數十人予作清流宰縣倅申屠行輔之子婦患時疫三十餘日已成壊病令服此藥而安王璆百一選方傷寒厥逆身有微熱煩燥六脉沉細微弱此隂極發躁也無憂散用人參半兩水一鍾煎七分調牛膽南星末二錢熱服立甦三因方夾隂傷寒先因慾事後感寒邪陽衰隂盛六脉沉伏小腹絞痛四肢逆冷嘔吐清水不假此藥無以回陽人參乾薑炮各一兩生附子一枚破作八片水四升半煎一升頓服脉出身温即愈吴綬傷寒藴要筋骨風痛人參四兩酒浸三日晒乾土茯苓一斤山慈姑一兩為末煉蜜丸梧子大毎服一百丸食前米湯下經騐方小兒風癎瘛瘲用人參蛤粉辰砂等分為末以猳猪心和血丸緑豆大毎服五十丸金銀湯下一日二服大有神效衛生寳鑑脾虚慢驚黄耆湯見黄耆發明下痘疹險證保和湯見黄耆發明下驚後瞳斜小兒驚後瞳人不正者人參阿膠糯米炒成珠各一錢水一盞煎七分温服日再服愈乃止效直指方小兒脾風多因人參冬𤓰仁冬半兩南星一兩漿水煑過為末毎用一錢水半盞煎三分温服方本事酒毒目盲一人形實好飲熱酒忽病目盲而脉濇此熱酒所傷胃氣汚濁血死其中而然以蘇木煎湯調人參末一錢服次日鼻及兩掌皆紫黒此滯血行矣再以四物湯加蘇木桃仁紅花陳皮調人參末服數日而愈丹溪纂要酒毒生疽一婦嗜酒胸生一疽脉𦂳而濇用酒炒人參酒炒大黄等分為末薑湯服一錢得唾汗出而愈效丹溪醫案狗咬風傷腫痛人參置桑柴炭上燒存性以盌覆定少頃為末摻之立瘥經驗方蜈蚣咬傷嚼人參塗之醫學集成蜂蠆螫傷人參末傅之證治要訣脇破腸出急以油抹入煎人參枸把汁淋之内喫羊腎粥十日愈危氏得效方氣奔怌疾方見虎杖蘆氣味苦温無毒主治吐虚勞痰飲時珍發明吴綬曰人弱者以人參蘆代𤓰蒂震亨曰人參入手太隂補陽中之隂蘆則反能瀉太隂之陽亦如麻黄苗能發汗根則止汗穀屬金而糠之性熱麥屬陽而麩之性涼先儒謂物物具一太極學者可不觸類而長之乎一女子性躁味厚暑月因怒而病呃毎作則舉身跳動昬冒不知人其形氣俱實乃痰因怒鬱氣不得降非吐不可遂以人參蘆半兩逆流水一盞半煎一大盌飲之大吐頑痰數盌大汗昬睡一日而安又一人作勞發瘧服瘧藥變為熱病舌短痰𠻳六脉洪數而滑此痰蓄胸中非吐不愈以參蘆湯加竹瀝二服湧出膠痰三塊次與人參黄耆當歸煎服半月乃安沙參本經上品校正併入别録有名未用部羊乳釋名白參吴普知母别録羊乳别録羊婆奶綱目鈴兒草别録虎鬚别録苦心别録又名文希一名識美一名志取𢎞景曰此與人參𤣥參丹參苦參是為五參其形不盡相類而生療頗同故皆有參名又有紫參乃牡蒙也時珍曰沙參白色宜於沙地故名其根多白汁俚人呼為羊婆奶别録有名未用羊乳即此也此物無心味淡而别録一名苦心又與知母同名不知所謂也鈴兒草象花形也集解别録曰沙參生河内川谷及寃句般陽續山二月八月采根暴乾又名羊乳一名地黄三月采立夏後母死恭曰出華山者為善普曰二月生苗如葵葉青色根白實如芥根大如蕪菁三月采𢎞景曰今出近道叢生葉似枸把根白實者佳保昇曰其根若葵根其花白色頌曰今淄齊潞隨江淮荆湖州郡皆有之苗長一二尺以來叢生厓壁間葉似枸杞而有乂丫七月開紫花根如葵根大如指許赤黄色中正白實者佳二月八月采根而土生者葉有細有大花白瓣上仍有白粘此為小異藏器曰羊乳根如薺苨而圓大小如拳上有角節折之有白汁人取根當薺苨苖作蔓折之有白汁時珍曰沙參處處山原有之二月生苗葉如初生小葵葉而團扁不光八九月抽莖高一二尺莖上之葉則尖長如枸把葉而小有細齒秋月葉間開小紫花長一二分状如鈴鐸五出白蕊亦有白花者並結實大如冬青實中有細子霜後苗枯其根生沙地者長尺餘大一虎口黄土地者則短而小根莖皆有白汁八九月采者白而實春月采者微黄而虚小人亦往往縶蒸壓實以亂人參但體輕鬆味淡而短耳根氣味苦微寒無毒别録曰羊乳温無毒普曰沙參岐伯醎神農黄帝扁鵲無毒李當之大寒好古曰甘微苦之才曰惡防己反藜蘆主治血結驚氣除寒熱補中益肺氣本經療胸痺心腹痛結熱邪氣頭痛皮間邪熱安五臓乆服利人又云羊乳主頭腫痛益氣長肌肉别録去皮肌浮風疝氣下墜治常欲眠養肝氣宣五臓風氣甄權補虚止驚煩益心肺并一切惡瘡疥癬及身癢排膿消腫毒大明清肺火治乆欬肺痿時珍發明元素曰肺寒者用人參肺熱者用沙參代之取其味甘也好古曰沙參味甘微苦厥隂本經之藥又為脾經氣分藥微苦補隂甘則補陽故㓗古取沙參代人參葢人參性温補五臓之陽沙參性寒補五臓之隂雖云補五臓亦須各用本臓藥相佐使隨所引而相輔之可也時珍曰人參甘苦温其體重實専補脾胃元氣因而益肺與腎故内傷元氣者宜之沙參甘淡而寒其體輕虚専補肺氣因而益脾與腎故金能受火尅者宜之一補陽而生隂一補隂而制陽不可不辨之也附方舊一新二肺熱欬𠻳沙參半兩水煎服之衛生易簡方卒得疝氣小腹及隂中相引痛如絞白汗出欲死者沙參搗篩為末酒服方寸匕立瘥肘後方婦人白帶多因七情内傷或下元虚冷所致沙參為末毎服二錢米飲調下證治要訣薺苨音齊尼並上聲别録中品校正併入圖經杏參釋名杏參圖經杏葉沙參救荒菧苨菧音底爾雅甜桔梗綱目白麪根救荒苗名隱忍時珍曰薺苨多汁有濟􅠩之状故以名之濟􅠩濃露也其根如沙參而葉如杏故河南人呼為杏葉沙參蘇頌圖經杏參即此也俗謂之甛桔梗爾雅云􅠩菧苨也郭璞云即薺苨也隠忍説見下文集解𢎞景曰薺苨根莖都似人參而葉小異根味甜絶能殺毒以其與毒藥共處毒皆自然歇不正入方家用也又曰魏文帝言薺苨亂人參即此也薺苨葉甚似桔梗但葉下光明滑澤無毛為異又不如人參相對耳恭曰人參苗似五加而濶短莖圓有三四椏椏頭有五葉陶引薺苨亂人參誤矣且薺苨桔梗又有葉差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心為别爾頌曰今川蜀江浙皆有之春生苗莖都似人參而小異根似桔梗但無心為異潤州陜州尤多人家收以為果或作脯啖味甚甘美兼可寄逺二月八月采根暴乾承曰今人多以蒸過壓扁亂人參但味淡爾宗奭曰陶以根言故云薺苨亂人參蘇以苗言故以陶為悮也機曰薺苨苗莖與桔梗相似其根與人參相亂今言苗莖都似人參近於悮也當以人參薺苨桔梗三註叅看自明矣時珍曰薺苨苗似桔梗根似沙參故姦商往往以沙參薺苨通亂人參蘇頌圖經所謂杏參周憲王救荒本草所謂杏葉沙參皆此薺苨也圖經云杏參生淄州田野根如小菜根土人五月采苗葉治欬𠻳上氣救荒本草云杏葉沙參一名白麪根苖高一二尺莖色清白葉似杏葉而小微尖而背白邊有又牙杪間開五瓣白盌子花根形如野胡蘿蔔頗肥皮色灰黝中間白毛味甛微寒亦有開碧花者嫩苗􅨘熟水淘油鹽拌食根换水煮亦可食人以蜜煎充果又陶𢎞景註桔梗言其葉名隠忍可煮食之治蠱毒謹按爾雅云蒡隠荵也郭璞註云似蘇有毛江東人藏以為葅亦可瀹食葛洪肘後方云隠荵草苗似桔梗人皆食之搗汁飲治蠱毒據此則隠荵非桔梗乃薺苨苗也薺苨苗甘可食桔梗苗苦不可食尤為可證神農本經無薺苨止有桔梗一名薺苨至别録始出薺苨葢薺苨桔梗乃一類有甜苦二種則其苗亦可呼為隠荵也根氣味甘寒無毒主治解百藥毒别録殺蠱毒治蛇蠱咬熱狂温疾罯毒箭大明利肺氣和中明目止痛蒸切作羮粥食或作虀葅食昝殷食之壓丹石發動孟詵主欬𠻳消渇强中瘡毒丁腫辟沙蝨短狐毒時珍發明時珍曰薺苨寒而利肺甘而解毒乃良品也而世不知用惜哉按葛洪肘後方云一藥而兼解衆毒者惟薺苨汁濃飲二升或煑嚼之亦可作散服此藥在諸藥中毒皆自解也又張鷟朝野僉載云各醫言虎中藥箭食清泥而解野豬中藥箭豗薺苨而食物猶知解毒何况人乎又孫思邈千金方治强中為病莖長興盛不交精出消渇之後發為癰疽有薺苨丸豬腎薺苨湯方此皆本草所未及者然亦取其解熱解毒之功爾無他義附方舊四新三强中消渇豬腎薺苨湯治强中之病莖長興盛不交精液自出消渇之後即發癰疽皆由恣意色慾或餌金石所致宜此以制腎中熱也用豬腎一具薺苨石膏各三兩人參茯苓磁石知母葛根黄苓栝樓根甘草各二兩黒大豆一升水一斗半先煑豬腎大豆取汁一斗去滓下藥再煑三升分三服後人名為石子薺苨湯地又薺苨丸用薺苨大豆伏神磁石栝樓根熟地黄骨皮𤣥參石斛鹿茸各一兩人參沉香各半兩為末以豬肚治净煑爛杵和丸梧子大毎服七十丸空心鹽湯下並千金方丁瘡腫毒生薺苨根搗汁服一合以滓傅之不過三度千金翼面上皯皰薺苨肉桂各一兩為末毎用方寸匕酢漿服之日一服又滅瘢痣聖濟總録解諸蠱毒薺苨根搗末飲服方寸匕立瘥陳延之小品方解鉤吻毒鉤吻葉與芹葉相似誤食之殺人惟以薺苨八兩水六升煑取三升毎服五合日五服仲景金匱玉函解五石毒薺苨生搗汁多服之立瘥蘇頌圖經隠忍葉氣味甘苦寒無毒主治蠱毒腹痛面目青黄林露骨立煑汁一二升飲時珍主腹臓風壅欬𠻳上氣蘇頌桔梗本經下品釋名白藥别録梗草别録薺苨本經時珍曰此草之根結實而梗直故名吴普本草一名利如一名符扈一名房圖方書並無是葢亦庾詞爾桔梗薺苨乃一類有甜苦二種故本經桔梗一名薺苨而今俗呼薺苨為甜桔梗也至别録始出薺苨條分為二物然其性味功用皆不同當以别録為是集解别録曰桔梗生嵩高山谷及寃句二月采根暴乾普曰葉如薺苨莖如筆管紫赤色二月生苗𢎞景曰近道處處有二三月生苗可煑食之桔梗療蠱毒甚驗俗方用此乃名薺苨今别有薺苨能解藥毒可亂人參葉甚相似但薺苨葉下光明滑澤無毛為異葉生又不如人參相對耳恭曰薺苨桔梗葉有差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心為别耳頌曰今在處有之根如指大黄白色春生苗莖高尺餘葉似杏葉而長隋四葉相對而生嫩時亦可煑食夏開小花紫碧色頗似牽牛花秋後結子八月采根其根有心若無心者為薺苨闗中所出桔梗根黄皮似蜀葵根莖細青色葉小青色似菊葉也根修治斆曰凡使勿用木梗真似桔梗只是咬之腥澀不堪凡用桔梗須去頭上尖硬一二分已來并兩畔附枝于槐砧上細挫用生百合搗膏投水中浸一伏時濾出緩火煎令乾用毎桔梗四兩用百合二兩五錢時珍曰今但刮去浮皮米泔水浸一夜切片微炒用氣味辛微温有小毒普曰神農醫和苦無毒黄帝扁鵲辛鹹岐伯雷公甘無毒李當之大寒權曰苦辛時珍曰當以苦辛平為是之才曰節皮為之使畏白及龍膽草忌豬肉得牡礪逺志療恚怒得消石石膏療傷寒白粥解其簽味時珍曰伏砒徐之才所云節皮不知何物也主治胸脇痛如刀刺腹滿腸鳴幽幽驚恐悸氣本經利五臓腸胃補血氣除寒熱風痺温中消穀療喉咽痛下蠱毒别録治下痢破血積氣消聚痰涎去肺熱氣促𠻳逆除腹中冷痛主中惡及小兒驚癎甄權下一切氣止霍亂轉筋心腹脹痛補五勞養氣除邪辟温破癥瘕肺癰養血排膿補内漏及喉痺大明利竅除肺部風熱清利頭目咽嗌胸膈滯氣及痛除鼻塞元素治寒嘔李杲主口舌生瘡赤目腫痛時珍發明好古曰桔梗氣微温味苦辛味厚氣輕陽中之隂升也入手太隂肺經氣分及足少隂經元素曰桔梗清肺氣利咽喉其色白故為肺部引經與甘草同行為舟楫之劑如大黄苦泄峻下之藥欲引至胸中至高之分成功須用辛甘之劑升之譬如鐡石入江非舟楫不載所以諸藥有此一味不能下沉也時珍曰朱肱活人書治胸中痞滿不痛用桔梗枳殻取其通肺利膈下氣也張仲景傷寒論治寒實結胸用桔梗貝母巴豆取其温中消穀破積也又治肺癰唾膿用桔梗甘草取其苦辛清肺甘温瀉火又能排膿血補内漏也其治少隂證二三日咽痛亦用桔梗甘草取其苦辛散寒甘平除熱合而用之能調寒熱也後人易名甘桔湯通治咽喉口舌諸病宋仁宗加荆芥防風連翹遂名如聖湯極言其驗也按王好古醫壘元戎載之頗詳云失音加訶子聲不出加半夏上氣加陳皮涎𠻳加知母貝母欬渇加五味子酒毒加葛根少氣加人參嘔加半夏生薑唾膿血加紫菀肺痿加阿膠胸膈不利加枳殻心胸痞滿加枳實目赤加巵子大黄面腫加茯苓膚痛加黄耆發班加防風荆芥疫毒加鼠粘子大黄不得眠加巵子震亨曰乾欬𠻳乃痰火之邪鬱在肺中宜苦梗以開之痢疾腹痛乃肺金之氣鬱在大腸亦宜苦梗開之後用痢藥此藥能開提氣血故氣藥中宜用之附方舊十新七胸滿不痛桔梗枳殻等分水二鍾煎一鍾温服南陽活人書傷寒腹脹隂陽不和也桔梗半夏湯主之桔梗半夏陳皮各三錢薑五片水二鍾煎一鍾服南陽活人書痰𠻳喘急桔梗一兩半為末用童子小便半升煎四合去滓温服簡要濟衆方肺癰欬𠻳胸滿振寒脉數咽乾不渇時出濁唾腥臭乆乆吐膿如粳米粥者桔梗湯主之桔梗一兩甘草二兩水三升煑一升分温再服朝暮吐膿血則瘥張仲景金匱玉函方喉痺毒氣桔梗二兩水三升煎一升頓服千金方少隂咽痛少隂證二三日咽痛者可與甘草湯不瘥者與桔梗湯主之桔梗一兩甘草二兩水三升煑一升分服張仲景傷寒論口舌生瘡方同上齒䘌腫痛桔梗薏苡仁等分為末服永類方骨槽風痛牙根腫痛桔梗為末棗瓤和丸皂子大綿裹咬之仍以荆芥湯𠻳之經驗方牙疳臭爛桔梗茴香䓁分燒研傅之衛生易簡方肝風眼黒目睛痛肝風盛也桔梗丸主之桔梗一斤黒牽牛頭末三兩為末蜜丸梧子大毎服四十丸温水下日二服保命集鼻出衂血桔梗為末水服方寸匕日四服一加生犀角屑普濟方吐血下血方同上打擊瘀血在腸内乆不消時發動者桔梗為末米飲下一刀圭肘後要方中蠱下血如雞肝晝夜出血石餘四臓皆損惟心末毁或鼻破将死者苦桔梗為末以酒服方寸匕日三服不能下藥以物抝口灌之心中當煩須臾自定七日止當食豬肝肺以補之神良一方加犀角等分初虞古今録驗妊娠中惡心腹疼痛桔梗一兩剉水一鍾生薑三片煎六分温服聖惠方小兒客忤死不能言桔梗燒研三錢米湯服之仍吞麝香豆許張文仲備急方蘆頭主治吐上膈風熱痰實生研末白湯調服一錢探吐時珍長松拾遺釋名仙茆時珍曰其葉如松服之長年功如松脂及仙茆故有二名集解藏器曰長松生闗内山谷中草似松葉上有脂山人服之時珍曰長松生古松下根色如薺苨長三五寸味甘微苦類人參清香可愛按張天覺文集云僧普明居五臺山患大風眉髪俱墮哀苦不堪忽遇異人教服長松示其形状明采服之旬餘毛髮俱生顔色如故今并代間土人多以長松雜甘草山藥為湯煎甚佳然本草及方書皆不載獨釋慧祥清涼傳始叙其詳如此韓􅐂醫通云長松産太行西北諸山根似獨活而香根氣味甘温無毒主治風血冷氣宿疾温中去風藏器治大風惡疾眉髪墮落百骸腐潰毎以一兩入甘草少許水煎服旬日即愈又解諸蟲毒補益長年時珍附方新一長松酒滋補一切風虚乃廬山休休子所𫝊長松一兩五錢状似獨活而香乃酒中聖藥也熟地黄八錢生地黄黄耆蜜炙陳皮各七錢當歸厚朴黄蘗各五錢白芍藥煨人參枳殻各四錢蒼术米泔制半夏制天門冬麥門冬砂仁黄連各三錢木香蜀椒胡桃仁各二錢小紅棗肉八個老米一撮燈心五寸長一百二十根一料分十劑絹袋盛之凢米五升造酒一尊煑一袋窨乆乃飲韓氏醫通黄精别録上品校正併入拾遺救荒草釋名黄芝瑞草經戊巳芝五符經莵竹别録鹿竹别録仙人餘糧𢎞景救窮草别録米餔蒙筌野生薑蒙筌重樓别録雞格别録龍衘廣雅垂珠頌曰隋時羊公服黄精法云黄精是芝草之精也一名葳㽔一名白及一名仙人餘糧一名茍格一名馬箭一名垂珠一名莵竹時珍曰黄精為服食要藥故别録列于草部之首仙家以為芝草之類以其得坤土之精粹故謂之黄精五符經云黄精獲天地之淳精故名為戊巳芝是此義也餘糧救窮以功名也鹿竹菟竹因葉似竹而鹿兎食之也垂珠以子形也陳氏拾遺救荒草即此也今併為一嘉謨曰根如嫩薑俗名野生薑九蒸九曝可以代糧又名米餔集解别録曰黄精生山谷二月采根隂乾𢎞景曰今處處有之二月始生一枝多葉葉状似竹而短根似萎㽔萎㽔根如荻根及菖蒲概節而平直黄精根如鬼臼黄連大節而不平雖燥並柔有脂潤俗方無用此而為仙經所貴根葉花實皆可餌服酒散隨宜具在斷穀方中其葉乃與鉤吻相似惟莖不紫花不黄為異而人多惑之其類乃殊遂致死生之反亦為竒事斆曰鉤吻真似黄精只是葉頭尖有毛鉤子二箇若誤服之害人黄精葉似竹也恭曰黄精肥地生者即大如拳薄地生者猶如拇指萎㽔肥根頗同小者肌理形色大都相似今以鬼臼黄連為比殊無彷彿黄精葉似栁及龍肝徐長卿輩而堅其鉤吻蔓生葉如柿葉殊非比類藏器曰黄精葉偏生不對者名偏精功用不如正精正精葉對生鉤吻乃野葛之别名二物殊不相似不知陶公憑何說此保昇曰鉤吻一名野葛陶說葉似黄精者當是蘇説葉似柿者當别是一物頌曰黄精南北皆有以嵩山茅山者為佳三月生苗高一二尺以來葉如竹葉而短兩兩相對莖梗柔脆頗似桃枝本黄末赤四月開青白花状如小豆花結子白如黍粒亦有無子者根如嫩生薑而黄色二月采根蒸過暴甘用今遇八月采山中人九蒸九暴作果賣黄黒色而甚甘美其苗初生時人多采為菜茹謂之畢菜味極美江南人説黄精苗葉稍類鉤吻但鉤吻葉頭極尖而根細而蘇恭言鉤吻蔓生恐南北所産之異耳時珍曰黄精野生山中亦可劈根長二寸稀種之一年後極稠子亦可種其葉似竹而不尖或二葉三葉四五葉俱對節而生其根横行状如萎㽔俗采其苗􅨘熟淘去苦味食之名筆管菜陳藏器本草言青黏是萎㽔見萎㽔發明下又黄精鉤吻之説陶𢎞景雷斆韓保昇皆言二物相似蘇恭陳藏器皆言不相似蘇頌復設兩可之辭今考神農本草吳普本草並言鉤吻是野葛蔓生其莖如箭與蘇恭之説相合張華博物志云昔黄帝問天老曰天地所生有食之令人不死者乎天老曰太陽之草名黄精食之可以長生太隂之草名鉤吻不可食之入口立死人信鉤吻殺人不信黄精之益夀不亦惑乎按此但以黄精鉤吻相對待而言不言其相似也陶氏因此遂謂二物相對與神農所説鉤吻不合恐當以蘇恭所説為是而陶雷所説别一毒物非鉤吻也歴代本草惟陳藏器辨物最精審尤當信之餘見鉤吻條根修治斆曰凡采得以溪水洗浄蒸之從已至子薄切暴乾用頌曰羊公服黄精法二月三月采根入地八九寸為上細切一石以水二石五斗煑去苦味漉出囊中壓取汁澄清再煎如膏乃止以炒黒黄豆末相和得所揑作餅子如錢大初服二枚日益之亦可焙乾篩末水服詵曰餌黄精法取甕子去底釡内安置得所入黄精令滿宻葢蒸至氣溜即暴之如此九蒸九暴若生則刺人咽喉若服生者初時只可一寸半漸漸増之十日不食服止三尺五寸三百日後盡見鬼神乆必昇天根葉花實皆可食之但以相對者是正不對者名偏精也氣味甘平無毒權曰寒時珍曰忌梅實花葉子並同主治補中益氣除風濕安五臓乆服輕身延年不饑别録補五勞七傷助筋骨耐寒暑益脾胃潤心肺單服九蒸九暴食之駐顔斷穀大明補諸虚止寒熱填精髓下三尸蟲時珍發明時珍曰黄精受戊巳之淳氣故為補黄宫之勝品土者萬物之母毋得其養則水火既濟木金交合而諸邪自去百病不生矣神仙芝草經云黄精寛中益氣使五臓調良肌肉充盛骨髓堅强其力増倍多年不老顔色鮮明髪白更黑齒落更生又能先下三尸蟲上尸名彭質好寳貨百二日下中尸名彭矯好五味六十日下下尸名彭居好五色三十日下皆爛出也根為精氣花實為飛英皆可服食又按雷氏炮炙論序云駐色延年精煎神錦註云以黄精自然汁拌研細神錦于栁木甑中蒸七日以木蜜丸服之木蜜枳梖也神錦不知是何物或云朱砂也禹錫曰按抱朴子云黄精服其花勝其實服其實勝其根但花難得得其生花十斛乾之纔可得五六斗爾非大有力者不能辦也日服三合服之十年乃得其益其斷穀不及术术餌令人肥徤可以負重涉險但不及黄精甘美易食凶年可與老少代糧謂之米脯也慎微曰徐鉉稽神録云臨川士家一婢逃入深山中乆之見野草枝葉可愛取根食之乆乆不饑夜息大樹下聞草中動以為虎攫上樹避之及曉下地其身歘然凌空而去若飛鳥焉數嵗家人采薪見之捕之不得臨絶壁下網圍之俄而騰上山頂或云此婢安有仙骨不過靈藥服食爾遂以酒餌置往來之路果來食訖遂不能去擒之具述其故指所食之草即是黄精也附方舊一新四服食法聖惠方用黄精根莖不限多少細剉隂乾搗末毎日水調末服任多少一年内變老為少乆乆成地仙臞仙神隠書以黄精細切一石用水二石五斗煑之自旦至夕候冷以手挼碎布袋榨取汁煎之渣乾乾為末同入釡中煎至可丸丸如雞子大毎服一丸日三服絶糧輕身除百病渇則飲水補肝明目黄精二斤蔓菁一升淘同和九蒸九晒為末空心毎米飲下二錢日二服延年益夀聖惠方大風癩瘡營氣不清乆風入脉因而成癩鼻壊色敗用黄精根去皮㓗净溪水洗二斤暴納粟米飯中蒸至米熟時時食之聖濟總録補虚精氣黄精枸把子等分搗作餅日乾為末煉蜜丸梧子大毎湯下五十丸竒效良方萎㽔音威緌品本經上釋名女萎本經葳㽔吴普萎䔟音威移委萎爾雅萎香綱目熒爾雅音行玉竹别録地節别録時珍曰按黄公紹古今韻會云葳㽔草木葉垂之貌此草根長多鬚如冠纓下垂之緌而有威儀故以名之凡羽葢旌旗之纓緌皆象葳㽔是矣張氏瑞應圖云王者禮備則葳㽔生于殿前一名萎香則威儀之義於此可見别録作萎㽔有文也説文作萎䔟音相近也爾雅作委萎字相近也其葉光瑩而象竹其根多節故有熒及玉竹地節諸名吴普本草又有烏女蟲蟬之名宋本一名馬薫即烏萎之訛者也正誤𢎞景曰本經有女萎無萎㽔别録無女萎有萎㽔而功用正同疑女萎即萎㽔惟名異爾恭曰女萎功用及苗蔓與萎㽔全别今本經朱書是女萎功效故别録墨書乃萎㽔功效也蔵器曰本草女萎委㽔同𫝊陶云是一物蘇云二物不同於中品别出女萎一條然其主霍亂洩痢腸鳴正與上品女㽔相合則是更非二物矣頌曰觀古方書所用胡洽治時氣洞下有女萎丸治傷寒冷下結腸丸中用女萎治虚勞下痢小黄耆酒中加女萎詳此數方所用乃似中品女萎縁其性温主霍亂洩痢故也又治賊風手足枯痺四肢拘攣茵蕷酒中用女萎初虞世治身體癧瘍班駮有女萎膏乃似上品本經朱書女萎縁其主中風不能動搖及去皯好色故也又治傷寒七八日不解續命鼈中湯及治脚弱鼈甲湯並用萎㽔及延年方治風熱項急痛四肢骨肉煩熱有萎㽔飲又主虚風熱發即頭痛有萎㽔乃似上品别録墨書萎㽔縁其主虚熱温毒腰痛故也三者既白則非一物明矣且萎㽔甘平女萎甘温安得為一物時珍曰本經女萎乃爾雅委萎二字即别録萎㽔也上古鈔寫訛為女萎爾古方治傷寒風虚用女萎者即萎㽔也皆承本草之訛而稱之諸家不察因中品有女萎名字相同遂致費辯如此今正其誤只依别録書萎㽔為綱以便尋檢其治洩痢女萎乃蔓草也見本條集解别録曰萎㽔生太行山山谷及丘陵立春後采隂乾普曰葉青黄色相值如薑葉二月七月采𢎞景曰今處處有之根似黄精小異服食家亦用之頌曰今滁州舒州及漢中均州皆有之莖幹强直似竹箭簳有節葉狹而長表白裏青亦類黄精而多鬚根大如指長一二尺可啖三月間開青花結圓實時珍曰䖏處山中有之其根横生似黄精差小黄白色性柔多鬚最難燥其葉如竹兩兩相值亦可采根種之極易繁也嫩葉及根並可煑淘食茹根修治斆曰凡使勿用黄精並鉤吻二物相似萎㽔節上有鬚毛莖斑葉尖䖏有小黄㸃為不同采得以竹刀刮去節皮洗浄以蜜水浸一宿蒸了焙乾用氣味甘平無毒普曰神農苦桐君雷公扁鵲甘無毒黄帝辛之才曰畏鹵鹹主治女萎主中風暴熱不能動搖跌筋結肉諸不足乆服去面黑䵟好顔色潤澤輕身不老本經萎㽔主心腹結氣虚熱濕毒腰痛莖中寒及目痛眥爛淚出别録時疾寒熱内補不足去虚勞客熱頭痛不安加而用之良甄權補中益氣蕭炳除煩悶止消渇潤心肺補五勞七傷虚損腰脚疼痛天行熱狂服食無忌大明服諸石人不調和者煑汁飲之𢎞景主風温自汗灼熱及勞瘧寒熱痺胃虚乏男子小便頻數失精一切虚損時珍發明杲曰萎㽔能升能降陽中隂也其用有四主風淫四末兩目淚爛男子濕注腰痛女子面生黑䵟時珍曰萎㽔性平味甘柔潤可食故朱肱南陽活人書治風温自汗身重語言難出用萎㽔湯以之為君藥予毎用治虚勞寒熱痁瘧及一切不足之證用代參耆不寒不燥大有殊功不止于去風熱濕毒而已此昔人所未闡者也藏器曰陳夀魏志樊阿傳云青黏一名黄芝一名地節此即萎㽔極似偏精本功外主聰明調血氣令人强壮和漆葉為散服主五臟益精去三蟲輕身不老變白潤肌膚煖腰脚惟有熱不可服晉嵇紹有胸中寒疾毎酒後苦唾服之得愈草似竹取根花葉隂乾用昔華陀入山見仙人所服以告樊阿服之夀百嵗也頌曰陳藏器以青黏即葳㽔世無識者未敢以為信然時珍曰蘇頌註黄精疑青黏是黄精與此說不同今考黄精萎㽔性味功用大抵相近而萎㽔之功更勝故青黏一名黄芝與黄精同名一名地節與萎㽔同名則二物雖通用亦可附方舊一新六服食法二月九月采萎㽔根切碎一石以水二石煮之從旦至夕以手挼爛布囊榨取汁熬稠其渣晒為末同熬至可丸丸如雞頭子大毎服一丸白湯下日三服導氣脉强筋骨治中風濕毒去面皺顔色乆服延年臞仙神隐書赤眼濇痛萎㽔赤芍藥當歸黄連等分煎湯薫洗方衛生家寳眼見黑花赤痛昏暗甘露湯用萎㽔焙四兩毎服二錢水一盞入薄荷二葉生薑一片蜜少許同煎七分卧時温服日一服聖濟總録小便卒淋萎蕤一兩芭蕉根四兩水二大盌煎一盌半入滑石二錢分三服太平聖惠方發熱口乾小便濇用萎㽔五兩煎汁飲之外臺秘要乳石發熱萎㽔三兩炙甘草二兩生犀角一兩水四升煑一升半分三服聖惠方癎後虚腫小兒癎病瘥後血氣上虚熱在皮膚身面俱腫萎㽔葵子龍膽茯苓前胡等分為末毎服一錢水煎服聖濟總録附録鹿藥開寳志曰鹿藥甘温無毒主風血去諸冷益老起陽浸酒服之生姑臧已西苗根並似黄精鹿好食其根時珍曰胡洽居士言鹿食九種解毒之草此其一也或云即是萎㽔理亦近之姑附以俟附録委蛇音威貽别録曰味甘平無毒主消渇少氣令人耐寒生人家園中大枝長鬚多葉而兩兩相植子如芥子時珍曰此亦似是萎㽔併俟考訪知母本經中品釋名蚳母本經音遲説文作茋連母本經蝭母蝭音匙又音提或作􅀢貨母本經地參本經水參又名水須水浚􅙛爾雅音覃莐藩音沈煩苦心别録兒草别録又名兒踵草女雷女理鹿列韭逢東根野蓼昌支時珍曰宿根之旁初生子根状如蚳蝱之状故謂之蚳母訛為知母蝭母也餘多未詳集解别録曰知母生河内川谷二月八月采根暴乾𢎞景曰今出彭城形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止禹錫曰按范子云提母出三輔黄白者善郭璞釋爾雅云􅙛蝭母也生山上葉如韭頌曰今瀕河懐衛彰徳諸郡及解州滁州亦有之四月開青花如韭花八月結實根修治斆曰凡使先於槐砧上剉細燒乾木臼杵擣勿犯鐡器時珍曰凡用揀肥潤裏白者去毛切引經上行則用酒浸焙乾下行則用鹽水潤焙氣味苦寒無毒大明曰苦甘權曰平元素曰氣寒味大辛苦氣味俱厚沉而降隂也又云隂中微陽腎經本藥入足陽明手太隂經氣分時珍曰得黄蘗及酒良能伏鹽及蓬砂主治消渇熱中除邪氣肢體浮腫下水補不足益氣本經療傷寒乆瘧煩熱脇下邪氣膈中惡及風汗内疽多服令人洩别録心煩燥悶骨熱勞徃来産後蓐勞腎氣勞憎寒虚煩甄權熱勞傳尸疰痛通小腸消痰止𠻳潤心肺安心止驚悸大明涼心去熱治陽明火熱瀉膀胱腎經火熱厥頭痛下痢腰痛喉中腥臭元素瀉肺火滋腎水治命門相火有餘好古安胎止子煩辟射工溪毒時珍發明權曰知母治諸熱勞患人虚而口乾者加用之杲曰知母入足陽明手太隂其用有四瀉無根之腎火療有汗之骨蒸止虚勞之熱滋化源之隂仲景用此入白虎湯治不得眠者煩躁也煩出於肺躁出於腎君以石膏佐以知母之苦寒以清腎之源緩以甘草粳米使不速下也又凡病小便閟塞而渇者熱在上焦氣分肺中伏熱不能生水膀胱絶其化源宜用氣薄味薄淡滲之藥以瀉肺火清肺金而滋水之化源若熱在下焦血分而不渇者乃真水不足膀胱乾涸乃無隂則陽無以化法當用黄蘗知母大苦寒之藥以補腎與膀胱使隂氣行而陽自化小便自通方法詳載木部黄蘗下時珍曰腎苦燥宜食辛以潤之肺苦逆宜食辛以瀉之知母之辛苦寒涼下則潤腎燥而滋隂上則清肺金而瀉火乃二經氣分藥也黄蘗則是腎經血分藥故二藥必相須而行昔人譬之蝦與水母必相依附補隂之説詳黄蘗條附方舊二新五乆近痰𠻳自胸膈下塞停飲至於臓腑用知母貝母各一兩為末巴豆三十枚去油研匀每服一字用薑三片二面蘸藥細嚼嚥下便睡次早必瀉一行其𠻳立止壮人乃用之一方不用巴豆醫學集成乆𠻳氣急知母去毛切五錢膈紙炒杏仁薑水泡去皮尖焙五錢以水一鍾半煎一鍾食逺温服次以蘿蔔子杏仁等分為末末糊丸服五十丸薑湯下以絶病根鄧筆峯雜興方妊娠子煩因服藥致胎氣不安煩不得卧者知母一兩洗焙為末棗肉丸彈子大每服一丸人參湯下醫者不識此病作虚煩治反損胎氣産科鄭宗文得此方於陳藏器本草拾遺中用之良驗集楊歸厚産乳驗方妊娠腹痛月未足如欲産之状用知母二兩為末蜜丸梧子大每粥飲下二十丸陳延之小品方溪毒射工凡中溪毒知母連根葉搗出散服亦可投水搗絞汁飲一二升夏月出行多取其屑自隨欲入水先取少許投水上流便無畏兼辟射工亦可煑湯浴之甚佳方肘後良紫癜風疾醋磨知母擦之日三次衛生易簡方嵌甲腫痛知母燒存性研摻之多能方肉蓯蓉本經上品釋名肉松容吴普黑司命吴普時珍曰此物補而不峻故有從容之號從容和緩之貌集解别録曰肉蓯蓉生河西山谷及代郡鴈門五月五日采隂乾普曰生河西山隂地叢生二月至八月采𢎞景曰代郡鴈門屬并州多馬處便有之言是野馬精落地所生生時似肉以作羊肉羹補虚乏極佳亦可生噉河南間至多今第一出隴西形扁黄柔潤多花而味甘次出北國者形短而少花巴東建平間亦有而不嘉也恭曰此乃論草蓯蓉也陶未見肉者今人所用亦草蓯蓉刮去花代肉蓯蓉功力稍劣保昇曰出肅州福禄縣沙中三月四月掘根長尺餘切取中央好者三四寸繩穿隂乾八月始好皮有松子鱗甲其草蓯蓉四月中旬采長五六寸至一尺以來莖圓紫色大明曰生㪍落樹下并土塹上此即非馬交之處陶説誤爾又有花蓯蓉即暮春抽苗者力較微爾頌曰今陜西州郡多有之然不及西羌界中來者肉厚而力𦂳舊説是野馬遺瀝所生今西人去大木間及土塹垣中多生乃知自有種類爾或疑其初生於馬瀝後乃滋植如茜根生於人血之類是也五月采取恐老不堪故多三月采之震亨曰河西混一之後今方識其真形何嘗有所謂鱗甲者盖蓯蓉罕得人多以金蓮根用鹽盆制而為之又以草蓯蓉充之用者宜審嘉謨曰令人以嫩松稍鹽潤偽之修治斆曰凡使先須清酒浸一宿至明以㯶刷去沙土浮甲劈破中心去白膜一重如竹絲草様有此能膈人心前氣不散令人上氣也以甑蒸之從午至酉取出又用酥炙得所氣味甘微温無毒别録曰酸鹹普曰神農黄帝鹹雷公酸李當之小温主治五勞七傷補中除莖中寒熱痛養五臓强隂益精氣多子婦人癥瘕乆服輕身本經除膀胱邪氣腰痛止痢别録益髓悦顔色延年大補壮陽日御過倍治女人血崩甄權男子絶陽不興女人絶隂不産潤五臓長肌肉暖腰膝男子洩精血遺瀝女子帶下隂痛大明發明好古曰命門相火不足者以此補之乃腎經血分藥也凡服蓯蓉以治腎必妨心震亨曰峻補精血驟用反動大便滑也斆曰强筋健髓以蓯蓉鱓魚二味為末黄精汁丸服之力可十倍此説出乾寧記頌曰西人多用作食只刮去鱗甲以酒浸洗去黑汁薄切合山芋羊肉作羮極美好益人勝服補藥宗奭曰洗去黑汁氣味皆盡矣然嫩者方可作羮味苦入藥少則不效附方舊一新四補益勞傷精敗面黒用蓯蓉四兩水煑令爛薄細切研精羊肉分為四度下五味以米煑粥空心服藥性論腎虚白濁肉蓯蓉鹿茸山藥白茯苓等分為末米糊丸梧子大毎棗湯下三十丸聖濟總録汗多便閟老人虚人皆可用肉蓯蓉酒浸焙二兩研沉香末一兩為末麻子仁汁打糊丸梧子大毎服七八丸白湯下濟生方消中易饑肉蓯蓉山茱萸五味子為末蜜丸梧子大每鹽酒下二十丸醫學指南破傷風病口禁身强肉蓯蓉切片晒乾用一小盞底上穿定燒烟于瘡上熏之累效衛生總録列當宋開寳釋名栗當開寳草蓯蓉開寳花蓯蓉日華集解志曰列當生山南巖石上如藕根初生掘取隂乾用保昇曰原州泰州渭州靈州皆有之暮春抽苗四月中旬采取長五六寸至一尺以來莖圓白色采取壓扁日乾頌曰草蓯蓉根與肉蓯蓉極相類刮去花壓扁以代肉者功力殊劣即列當也根氣味甘温無毒主治男子五勞七傷補腰腎令人有子去風血煑酒浸酒服之開寳附方舊一陽事不興栗當好者二斤即列當擣篩畢以好酒一斗浸之經宿取起隨性日飲之心昝殷食醫鏡鎖陽補遺集解時珍曰鎖陽出肅州按陶九成輟耕録云鎖陽生韃靼田地野馬或與蛟龍遺精入地乆之發起如笋上豐下儉鱗甲櫛比筋脉連絡絶類男陽即肉蓯蓉之類或謂里之淫婦就而合之一得隂氣勃然怒長土人掘取洗滌去皮薄切晒乾以充藥貨功力百倍於蓯蓉也時珍疑此自有種類如肉蓯蓉列當亦未必盡是遺精所生也氣味甘温無毒主治大補隂氣益精血利大便虚人大便燥結者啖之可代蓯蓉煑粥彌佳不燥結者勿用震亨潤燥養筋治痿弱時珍本草綱目卷十二上
